  - "[PAGE 75]\n\nNamed arguments are supported, and Table 4.8 provides a list of\
    \ the common arguments that can be passed when declaring the Suffix component\n\
    \n| keyword | description | acceptable values |\n|---------|-------------|-------------------|\n\
    | direction | specifies if a suffix is an input to or an output from a solver\
    \ | Suffix.LOCAL, Suffix.IMPORT, Suffix.EXPORT, Suffix.IMPORT_EXPORT (more details\
    \ given below) |\n| datatype | specifies the particular type of data being stored\
    \ in the suffix | Suffix.FLOAT, Suffix.INT, None (more details given below) |\n\
    | initialize | provides initial values for the suffix | a rule function |\n\n\
    Table 4.8: Common declaration arguments for the Suffix component\n\nThe Suffix\
    \ component is a not an indexed component, and hence it cannot be declared with\
    \ unnamed positional arguments. The `direction` keyword argument is used to specify\
    \ the information flow for a suffix when interfacing with a solver. This argument\
    \ can be one of four possible values:\n\n+   - Suffix.LOCAL: Suffix data is local\
    \ to the model. It is not imported or exported by solver plugins and is the default.\n\
    - Suffix.IMPORT: Suffix data will be imported from solvers to the model by solver\
    \ plugins.\n- Suffix.EXPORT: Suffix data will be exported from the model to the\
    \ solver by the plugins.\n- Suffix.IMPORT_EXPORT: Suffix data is both imported\
    \ and exported by solver plugins.\n\nNot all solver plugins are guaranteed to\
    \ manage suffix information flow, but the user controls this information flow\
    \ by configuring suffix components.\n\nThe `datatype` keyword argument specifies\
    \ the type of data held in the suffix. This argument can be one of three possible\
    \ values:\n\n+   - Suffix.FLOAT: floating point data (default).\n- Suffix.INT:\
    \ integer data.\n- None: any type of data.\n\nThis argument might be optional\
    \ for some solver interfaces; however, exporting suffix data with solvers using\
    \ the `nl` file interface requires all active export suffixes have a strict datatype\
    \ (i.e., the `datatype` keyword cannot be `None`).\n\nThe following example illustrates\
    \ various suffix declarations:\n\n```\npython\n# Export integer data\nmodel.priority\
    \ = pyo.Suffix(direction=pyo.Suffix.EXPORT,\n                           dataype=pyo.Suffix.INT)\n\
    \n```"
  - "[PAGE 76]\n\n```\n# Export and import floating point data\nmodel.dual = pyo.Suffix(direction=pyo.Suffix.IMPORT_EXPORT)\n\
    ```\n\nSuffixes are not guaranteed to be compatible with all solver plugins in\
    \ Pyomo. Whether a given suffix is acceptable or not depends on both the solver\
    \ and solver interface being used. In some cases, a solver plugin will raise an\
    \ exception if it encounters a suffix type that it does not handle, but this is\
    \ not true in every situation. For example, the nl file interface is generic to\
    \ all AMPL-compatible solvers, so there is no way for Pyomo to validate that a\
    \ suffix of a given name, direction, and datatype is appropriate for a solver.\
    \ One should be careful in verifying that suffix declarations are being handled\
    \ as expected when switching to a different solver or solver interface.\n\nThe\
    \ `initialize` keyword argument can be used to define suffix values. This argument\
    \ specifies a function that is executed when the model is constructed. This function\
    \ returns a list or iterable of (component, value) tuples.\n\n```\nmodel = pyo.AbstractModel()\n\
    model.x = pyo.Var()\nmodel.c = pyo.Constraint(expr=model.x >= 1)\n\ndef foo_rule(m):\n\
    \    return ((m.x, 2.0), (m.c, 3.0))\nmodel.foo = pyo.Suffix(initialize=foo_rule)\n\
    ```\n\n# 4.9.2 Working with Suffixes\n\nConsider the following example:\n\n```\n\
    model = pyo.ConcreteModel()\nmodel.x = pyo.Var()\nmodel.y = pyo.Var([1,2,3])\n\
    model.foo = pyo.Suffix()\n```\n\nThis examples includes two variable components,\
    \ indexed and non-indexed, along with a suffix component. Conceptually, the declaration\
    \ of the suffix `foo` allows the association of `foo` with each component in the\
    \ model. For example:\n\n```\n# Assign the value 1.0 to suffix 'foo' for model.x\n\
    model.x.set_suffix_value('foo', 1.0)\n\n# Assign the value 2.0 to suffix model.foo\
    \ for model.x\nmodel.x.set_suffix_value(model.foo, 2.0)\n\n# Get the value of\
    \ suffix 'foo' for model.x\nprint(model.x.get_suffix_value('foo')) # 2.0\n```\n\
    \nSuffix values can be assigned with `set_suffix_value` and they can be accessed\
    \ with `get_suffix_value`. This example illustrates two ways of specifying the\
    \ same suffix: with a name and with a suffix component object."
  - '[PAGE 77]


    Suffix values for indexed components can also be assigned with set_suffix_value:


    ```

    # Assign the value 3.0 to suffix model.foo for model.y

    model.y.set_suffix_value(model.foo, 3.0)


    # Assign the value 4.0 to suffix model.foo for model.y[2]

    model.y[2].set_suffix_value(model.foo, 4.0)


    # Get the value of suffix ''foo'' for model.y

    print(model.y.get_suffix_value(model.foo)) # None

    print(model.y[1].get_suffix_value(model.foo)) # 3.0

    print(model.y[2].get_suffix_value(model.foo)) # 4.0

    print(model.y[3].get_suffix_value(model.foo)) # 3.0

    ```


    This example illustrates how set_suffix_value is used to set the value for an
    indexed component and a single component data object. When set_suffix_value is
    called for an indexed component, by default it sets suffix values for all elements
    or indices of the component, rather than the component itself. Because of this,
    when we try to retrieve the suffix value for the model.y component, we find that
    it is None.


    Suffix values can also be cleared, which is equivalent to setting the value None:


    ```

    model.y[3].clear_suffix_value(model.foo)


    print(model.y.get_suffix_value(model.foo)) # None

    print(model.y[1].get_suffix_value(model.foo)) # 3.0

    print(model.y[2].get_suffix_value(model.foo)) # 4.0

    print(model.y[3].get_suffix_value(model.foo)) # None

    ```


    # 4.10 Other Modeling Components


    This chapter presented details for some of the most common modeling components
    supported by Pyomo. There are other modeling components that were not thoroughly
    discussed in this chapter. These include:


    Block: The Block component provides a mechanism to declare models with repeated
    or nested structure (e.g., separate Block objects may exist on a model to represent
    different time points in a multi-period optimization). A Block consists of a collection
    of Pyomo modeling components. More discussion of blocks is provided in Chapter
    8.


    Model: The Model component provides a container for grouping Pyomo modeling components
    to form the definition of an optimization problem. Pyomo supports both abstract
    and concrete modeling representations. While "model" objects were widely used
    in this book (they are required to formulate and solve an optimization problem
    in Pyomo), we have not discussed the fact that they are components themselves.
    In fact, they inherit from the Block component.'
  - '[PAGE 78]


    Complementarity: This component is used to define complementarity conditions in
    a mathematical program with equilibrium constraints (MPEC). Several forms of the
    complementarity conditions are supported. This component is documented further
    in Chapter 13.


    ContinuousSet: This component is used to represent bounded continuous domains
    in the context of modeling differential equations. This component is documented
    further in Chapter 12.


    DerivativeVar: This component is used to represent derivatives of Var components
    in the context of modeling differential equations. This component is documented
    further in Chapter 12.


    Disjunct: This component supports the Generalized Disjunctive Programming (GDP)
    capability within Pyomo. A Disjunct component is a container for an indicator
    variable and a set of constraints that should be active when that indicator variable
    is True. This component is documented further in Chapter 11.


    Disjunction: This component supports the Generalized Disjunctive Programming (GDP)
    capability within Pyomo. A Disjunction component contains a set of Disjunct objects
    connected by a logical “OR” operator. This component is documented further in
    Chapter 11.


    Piecewise: This component supports piecewise modeling of general functions. It
    supports several different transformations to produce mixed-integer representations
    for the piecewise functions. Additional documentation for this component can be
    found at the Pyomo website.


    SOSConstraint: Special ordered sets (SOS) can be defined in Pyomo through the
    SOSConstraint component. Pyomo supports special ordered sets of type 1 and 2 (SOS1
    and SOS2). Additional documentation for this component can be found at the Pyomo
    website.


    BuildAction and BuildCheck: These components are used mainly in abstract models
    and are described in Section 10.4.'
- md: "## Chapter 5 Scripting Custom Workflows\n\nAbstract This chapter illustrates\
    \ the use of Python with Pyomo for solution analysis and the development of custom\
    \ workflows or high-level meta-algorithms. For example, the chapter shows how\
    \ to access variable and objective values, add and remove constraints, and iterate\
    \ over model components. This chapter also contains some larger examples, to illustrate\
    \ how Pyomo users can go beyond the basics and develop custom solution and analysis\
    \ strategies.\n\n### 5.1 Introduction\n\nIn previous chapters, we have described\
    \ how a generic optimization process can be executed with Pyomo to construct a\
    \ model, solve the model, and display the results. The use of Python and the Pyomo\
    \ API provides tremendous flexibility for the development of advanced workflows.\
    \ With some AMLs, a new scripting language is defined that is unique to the AML,\
    \ and the developers of the package produce a parser for the new language. This\
    \ separates the user from the underlying code of the framework itself. With Pyomo,\
    \ Python is used for both the overall framework and the modeling environment.\
    \ This provides the user with complete control over the entire solution process\
    \ giving two important high-level capabilities:\n\n- Pyomo users can leverage\
    \ existing Python libraries for analysis of data before and after solving the\
    \ optimization problem.\n- Pyomo supports development of algorithms requiring\
    \ problem transformations and multiple solves of problems with different structure\
    \ and data. Coupled with the programming capabilities of Python, this allows users\
    \ to build high-level algorithms (e.g., Bender’s decomposition, MINLP solvers,\
    \ and multi-stage initialization strategies).\n\nIn this chapter, the basics of\
    \ scripting with Pyomo will be discussed. This functionality will be demonstrated\
    \ on some examples, including a Sudoku solver.\n\n> **NOTE:** This chapter shows\
    \ the power of Pyomo that can be accessed through the Python language, and examples\
    \ in this chapter may make use of methods on components that are part of the core\
    \ Pyomo infrastructure. The developers of Pyomo try to maintain backwards compatibility\
    \ where possible. However, note that the methods described in this chapter are\
    \ more likely to change than other capabilities discussed in this book.\n\nIn\
    \ Chapter 3 we introduced a warehouse location problem. This problem solved for\
    \ the optimal locations to build warehouses to meet delivery demands. Please refer\
    \ back to Section 3.2 for a detailed description of this problem.\n\nThe following\
    \ example, which builds from the previous warehouse location example, highlights\
    \ the basic pieces found in almost any Python script to solve a problem in Pyomo:\
    \ (1) load the necessary data, (2) create the Pyomo model, (3) perform optimization\
    \ of the Pyomo model using a solver interface, and (4) retrieve and report the\
    \ solution.\n\n```python\nimport json\nimport pyomo.environ as pyo\nfrom warehouse_model\
    \ import create_wl_model\n\n# load the data from a json file\nwith open('warehouse_data.json',\
    \ 'r') as fd:\n    data = json.load(fd)\n\n# call function to create model\nmodel\
    \ = create_wl_model(data, P=2)\n\n# solve the model\nsolver = pyo.SolverFactory('glpk')\n\
    solver.solve(model)\n\n# look at the solution\nmodel.y.pprint()\n```\n\nThis script\
    \ requires two additional files. The standard Python distribution includes support\
    \ for reading and writing JSON files. The file below contains the necessary data\
    \ in JSON format.\n\n```json\n{\n    \"WH\": [\n        \"Harlingen\",\n     \
    \   \"Memphis\",\n        \"Ashland\"\n    ],\n    \"CUST\": [\n        \"NYC\"\
    ,\n        \"LA\",\n        \"Chicago\",\n        \"Houston\"\n    ],\n    \"\
    dist\": {\n        \"Harlingen\": {\n            \"NYC\": 1956,\n            \"\
    LA\": 1606,\n            \"Chicago\": 1410,\n            \"Houston\": 330\n  \
    \      },\n        \"Memphis\": {\n            \"NYC\": 1096,\n            \"\
    LA\": 1792,\n            \"Chicago\": 531,\n            \"Houston\": 567\n   \
    \     },\n        \"Ashland\": {\n            \"NYC\": 485,\n            \"LA\"\
    : 2322,\n            \"Chicago\": 324,\n            \"Houston\": 1236\n      \
    \  }\n    }\n}\n```\n\nThe warehouse model is defined with the following code.\n\
    \n```python\nimport pyomo.environ as pyo\n\ndef create_wl_model(data, P):\n  \
    \  # create the model\n    model = pyo.ConcreteModel(name=\"(WL)\")\n    model.WH\
    \ = data['WH']\n    model.CUST = data['CUST']\n    model.dist = data['dist']\n\
    \    model.P = P\n    model.x = pyo.Var(model.WH, model.CUST, bounds=(0,1))\n\
    \    model.y = pyo.Var(model.WH, within=pyo.Binary)\n\n    def obj_rule(m):\n\
    \        return sum(m.dist[w][c]*m.x[w,c] for w in m.WH for c in m.CUST)\n   \
    \ model.obj = pyo.Objective(rule=obj_rule)\n\n    def one_per_cust_rule(m, c):\n\
    \        return sum(m.x[w,c] for w in m.WH) == 1\n    model.one_per_cust = pyo.Constraint(model.CUST,\
    \ rule=one_per_cust_rule)\n\n    def warehouse_active_rule(m, w, c):\n       \
    \ return m.x[w,c] <= m.y[w]\n    model.warehouse_active = pyo.Constraint(model.WH,\
    \ model.CUST, rule=warehouse_active_rule)\n\n    def num_warehouses_rule(m):\n\
    \        return sum(m.y[w] for w in m.WH) <= m.P\n    model.num_warehouses = pyo.Constraint(rule=num_warehouses_rule)\n\
    \n    return model\n```\n\nPython allows scripting of custom workflows much more\
    \ powerful than this simple example. In this chapter, a description of the steps\
    \ to access model components and modify the model programmatically will be illustrated.\n\
    \n> **NOTE:** Scripting is possible with abstract models although it is most common\
    \ to interact with concrete models when scripting. While the examples in this\
    \ chapter focus on concrete models, a concrete model can be created from an abstract\
    \ model using `create_instance()`. See Chapter 10 for more details.\n\n### 5.2\
    \ Interrogating the Model\n\nInstances of Pyomo modeling objects (e.g., Var, Param,\
    \ Constraint) have several attributes that can be accessed programmatically. These\
    \ attributes can be interrogated to provide information about the state of the\
    \ model. In this section, we show how to iterate over model components and access\
    \ key attributes of these components. Chapter 4 provides additional details about\
    \ the attributes of Pyomo modeling components.\n\nFor example, one can access\
    \ the actual expression for the objective function. Consider the warehouse location\
    \ problem described previously. The following code will print the expression for\
    \ the objective function, the value of the objective at the solution, and the\
    \ value of one of the variables.\n\n```python\nimport json\nimport pyomo.environ\
    \ as pyo\nfrom warehouse_model import create_wl_model\n\n# load the data from\
    \ a json file\nwith open('warehouse_data.json', 'r') as fd:\n    data = json.load(fd)\n\
    \n# call function to create model\nmodel = create_wl_model(data, P=2)\n\n# solve\
    \ the model\nsolver = pyo.SolverFactory('glpk')\nsolver.solve(model)\n\n# print\
    \ the expression for the objective function\nprint(model.obj.expr)\n\n# print\
    \ the value of the objective function\n# at the solution\nprint(pyo.value(model.obj))\n\
    \n# print the value of a particular variable\nprint(pyo.value(model.y['Harlingen']))\n\
    ```\n\n#### 5.2.1 The value Function\n\nSome Pyomo component attributes may contain\
    \ Pyomo objects instead of native Python numerical values. For example, the lower\
    \ bound of a `Var` may be a simple `float` (e.g., 3.2), but it may also be a Pyomo\
    \ `Param` object with an associated value. Because of this, it is important to\
    \ use the `value` function to evaluate attributes that are expected to return\
    \ numerical values.\n\nThe use of `value` is important for converting Pyomo expressions\
    \ to numeric values. This is illustrated in the following example.\n\n```python\n\
    import pyomo.environ as pyo\n\nmodel = pyo.ConcreteModel()\nmodel.u = pyo.Var(initialize=2.0)\n\
    \n# unexpected expression instead of value\na = model.u - 1\nprint(a) # \"u -\
    \ 1\"\nprint(type(a)) # <class 'pyomo.core.expr.numeric_expr.SumExpression'>\n\
    \n# correct way to access the value\nb = pyo.value(model.u) - 1\nprint(b) # 1.0\n\
    print(type(b)) # <class 'float'>\n```\n\nIn this example, `a` contains a Pyomo\
    \ expression object (and not a numerical value as might have been expected). This\
    \ is demonstrated when we print it and check the type. The print statement is\
    \ correctly showing a description of the expression. To obtain the numeric value\
    \ of the variable (or other Pyomo components), `pyo.value` needs to be called.\
    \ Here, `b` contains the numeric value as expected.\n\nThis example illustrates\
    \ the creation of implicit expressions and how they can lead to unintended consequences.\
    \ Users are strongly encouraged to avoid generating expressions except as part\
    \ of the model construction process.\n\n> **NOTE:** It is common to forget the\
    \ `value()` function when retrieving values from Pyomo `Var` components. For example,\
    \ in the code shown below, Python will actually print the representation of the\
    \ variable object itself, not the value.\n\n```python\nprint(model.y)\n```\n\n\
    In this case, the code will print the variable name “y”, not the value."
  mdcn: "## 第5章 脚本编写自定义工作流程\n\n摘要 本章阐述如何使用Python与Pyomo进行求解分析，以及开发自定义工作流程或高级元算法。例如，本章展示了如何访问变量和目标函数值、添加和移除约束条件，以及遍历模型组件。本章还包含一些较大的示例，以说明Pyomo用户如何超越基础知识，开发自定义的求解和分析策略。\n\
    \n### 5.1 引言\n\n在前几章中，我们描述了如何使用Pyomo执行通用的优化流程，包括构建模型、求解模型和显示结果。Python和Pyomo API的使用为开发高级工作流程提供了极大的灵活性。使用一些建模语言（AML）时，会定义一种该AML独有的新脚本语言，并且该软件包的开发者会为这种新语言编写一个解析器。这将用户与框架本身的底层代码隔离开来。而在Pyomo中，Python被同时用于整体框架和建模环境。这为用户提供了对整个求解过程的完全控制，从而赋予了两个重要的高层能力：\n\
    \n- Pyomo用户可以利用现有的Python库，在求解优化问题之前和之后分析数据。\n- Pyomo支持开发需要进行问题转换以及对具有不同结构和数据的问题进行多次求解的算法。结合Python的编程能力，这使得用户能够构建高层算法（例如，本德斯分解、混合整数非线性规划求解器和多阶段初始化策略）。\n\
    \n本章将讨论使用Pyomo进行脚本编写的基础知识。该功能将在一些示例中进行演示，包括一个数独求解器。\n\n> **注意：** 本章展示了通过Python语言可访问的Pyomo的强大功能，本章中的示例可能会使用Pyomo核心基础设施组件上的方法。Pyomo的开发者会尽可能地保持向后兼容性。但是，请注意，本章描述的方法比本书讨论的其他功能更有可能发生变化。\n\
    \n在第3章中，我们介绍了一个仓库选址问题。该问题求解构建仓库的最优位置以满足配送需求。请回顾第3.2节以了解该问题的详细描述。\n\n以下示例建立在前面的仓库选址示例之上，它强调了几乎所有用于在Pyomo中求解问题的Python脚本所包含的基本组成部分：(1)\
    \ 加载必要的数据，(2) 创建Pyomo模型，(3) 使用求解器接口对Pyomo模型执行优化，以及 (4) 获取并报告解。\n\n```python\n\
    import json\nimport pyomo.environ as pyo\nfrom warehouse_model import create_wl_model\n\
    \n# load the data from a json file\nwith open('warehouse_data.json', 'r') as fd:\n\
    \    data = json.load(fd)\n\n# call function to create model\nmodel = create_wl_model(data,\
    \ P=2)\n\n# solve the model\nsolver = pyo.SolverFactory('glpk')\nsolver.solve(model)\n\
    \n# look at the solution\nmodel.y.pprint()\n```\n\n此脚本需要两个额外的文件。标准Python发行版包含对读写JSON文件的支持。以下文件以JSON格式包含必要的数据。\n\
    \n```json\n{\n    \"WH\": [\n        \"Harlingen\",\n        \"Memphis\",\n  \
    \      \"Ashland\"\n    ],\n    \"CUST\": [\n        \"NYC\",\n        \"LA\"\
    ,\n        \"Chicago\",\n        \"Houston\"\n    ],\n    \"dist\": {\n      \
    \  \"Harlingen\": {\n            \"NYC\": 1956,\n            \"LA\": 1606,\n \
    \           \"Chicago\": 1410,\n            \"Houston\": 330\n        },\n   \
    \     \"Memphis\": {\n            \"NYC\": 1096,\n            \"LA\": 1792,\n\
    \            \"Chicago\": 531,\n            \"Houston\": 567\n        },\n   \
    \     \"Ashland\": {\n            \"NYC\": 485,\n            \"LA\": 2322,\n \
    \           \"Chicago\": 324,\n            \"Houston\": 1236\n        }\n    }\n\
    }\n```\n\n仓库模型通过以下代码定义。\n\n```python\nimport pyomo.environ as pyo\n\ndef create_wl_model(data,\
    \ P):\n    # create the model\n    model = pyo.ConcreteModel(name=\"(WL)\")\n\
    \    model.WH = data['WH']\n    model.CUST = data['CUST']\n    model.dist = data['dist']\n\
    \    model.P = P\n    model.x = pyo.Var(model.WH, model.CUST, bounds=(0,1))\n\
    \    model.y = pyo.Var(model.WH, within=pyo.Binary)\n\n    def obj_rule(m):\n\
    \        return sum(m.dist[w][c]*m.x[w,c] for w in m.WH for c in m.CUST)\n   \
    \ model.obj = pyo.Objective(rule=obj_rule)\n\n    def one_per_cust_rule(m, c):\n\
    \        return sum(m.x[w,c] for w in m.WH) == 1\n    model.one_per_cust = pyo.Constraint(model.CUST,\
    \ rule=one_per_cust_rule)\n\n    def warehouse_active_rule(m, w, c):\n       \
    \ return m.x[w,c] <= m.y[w]\n    model.warehouse_active = pyo.Constraint(model.WH,\
    \ model.CUST, rule=warehouse_active_rule)\n\n    def num_warehouses_rule(m):\n\
    \        return sum(m.y[w] for w in m.WH) <= m.P\n    model.num_warehouses = pyo.Constraint(rule=num_warehouses_rule)\n\
    \n    return model\n```\n\nPython允许编写比这个简单示例强大得多的自定义工作流程脚本。在本章中，将通过示例说明访问模型组件和以编程方式修改模型的步骤。\n\
    \n> **注意：** 尽管脚本编写最常见的是与具体模型交互，但抽象模型也可以进行脚本编写。虽然本章中的示例侧重于具体模型，但可以使用`create_instance()`从抽象模型创建具体模型。更多细节请参见第10章。\n\
    \n### 5.2 询问模型\n\nPyomo建模对象（例如，`Var`, `Param`, `Constraint`）的实例具有多个可以编程访问的属性。可以查询这些属性以提供有关模型状态的信息。在本节中，我们将展示如何遍历模型组件并访问这些组件的关键属性。第4章提供了有关Pyomo建模组件属性的更多细节。\n\
