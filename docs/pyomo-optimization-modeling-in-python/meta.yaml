    # **1.2.2 *Graph Coloring Example***


    We further illustrate Pyomo''s modeling capabilities with a simple, well-known
    optimization problem: minimum graph coloring (also known as vertex coloring).
    The graph coloring problem concerns the assignment of colors to vertices of a
    graph such that no two adjacent vertices share the same color. Graph coloring
    has many practical applications, including register allocation in compilers, resource
    scheduling, and pattern matching, and it appears as a kernel in recreational puzzles
    like Sudoku.


    Let $G = (V, E)$ denote a graph with vertex set $V$ and edge set $E \subseteq
    V \times V$. Given $G$, the objective in the minimum graph coloring problem is
    to find a valid coloring that uses the minimum number of distinct colors. For
    simplicity, we assume that the edges in $E$ are ordered such that if $(v_1, v_2)
    \in E$ then $v_1 < v_2$. Let $k$ denote the maximum number of colors, and define
    the set of possible colors $C = \{1, \ldots, k\}$.


    We can represent the minimum graph coloring problem as the following integer program
    (IP):


    $$\begin{aligned} \min \quad & y \ \text{s.t.} \quad & \sum_{c \in C} x_{v,c}
    = 1 \quad & \forall v \in V \ & x_{v_1,c} + x_{v_2,c} \leq 1 \quad & \forall (v_1,
    v_2) \in E \quad & (1.1) \ & y \geq c \cdot x_{v,c} \quad & \forall v \in V, c
    \in C \ & x_{v,c} \in \{0, 1\} \quad & \forall v \in V, c \in C \end{aligned}$$


    In this formulation, the variable $x_{v,c}$ equals one if vertex $v$ is colored
    with color $c$ and zero otherwise; $y$ denotes the number of colors that are used.
    The first constraint requires that each vertex is colored with exactly one color.
    The second constraint requires that vertices that are connected by an edge must
    have different colors. The third constraint defines a lower bound on $y$ that
    guarantees that $y$ will be no less than'
  - '[PAGE 21]


    the number of colors used in a solution. The fourth and final constraint enforces
    the binary constraint on $x_{v,c}$.


    Figure 1.1 shows a Pyomo specification of the above graph coloring formulation,
    using a concrete model; the example is adapted from Gross and Yellen [27]. This
    specification consists of Python commands that define a `ConcreteModel` object,
    and then define various attributes of this object, including variables, constraints,
    and the optimization objective. Lines 10–24 define the model data. Line 28 is
    a standard Python import statement that adds all of the symbols (e.g., classes
    and functions) defined in `pyomo.environ` to the current Python namespace. Line
    31 specifies creation of the `model` object, which is an instance of the `ConcreteModel`
    class. Lines 34 and 35 define the model decision variables. Note that $y$ is a
    scalar variable, while $x$ is a two-dimensional array of variables. The remaining
    lines in the example define the model constraints and objective. The `Objective`
    class defines a single optimization objective using the `expr` keyword option.
    The `ConstraintList` class defines a list of constraints, which are individually
    added.


    When compared to custom AMLs, Pyomo models are clearly more verbose (e.g., see
    Hart et al. [30]). However, this example illustrates how Python’s clean syntax
    still allows Pyomo to express mathematical concepts intuitively and concisely.
    Aside from the use of Pyomo classes, this example employs standard Python syntax
    and methods. For example, line 41 uses Python’s generator syntax to iterate over
    all elements of the `colors` set and apply the Python `sum` function to the result.
    Although Pyomo does include some utility functions to simplify the construction
    of expressions, Pyomo does not rely on sophisticated extensions of core Python
    functionality.


    # 1.2.3 Key Pyomo Features


    Python


    Python’s clean syntax enables Pyomo to express mathematical concepts in an intuitive
    and concise manner. Furthermore, Python’s expressive programming environment can
    be used to formulate complex models and to define high-level solvers that customize
    the execution of high-performance optimization libraries. Python provides extensive
    scripting capabilities, allowing users to analyze Pyomo models and solutions,
    leveraging Python’s rich set of third-party libraries (e.g., numpy, scipy, and
    matplotlib). Finally, the embedding of Pyomo in Python allows users to learn core
    syntax through Python’s rich documentation.


    Customizable Capability


    Pyomo is designed to support a “stone soup” development model in which each developer
    “scratches their own itch.” A key element of this design is the plug-in framework
    that Pyomo uses to integrate model components, model transformations,'
