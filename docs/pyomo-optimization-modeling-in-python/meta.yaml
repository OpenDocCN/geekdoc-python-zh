  md: "# pyomo_create_model\n\nThis callback function is used to construct a model.\
    \ This function has two arguments: `options` and `model_options`. The latter argument\
    \ contains the options for constructing the model, which are specified with the\
    \ `--model-options` command-line option. The return value of this function must\
    \ be the model object created, which may be either an abstract or concrete model.\
    \ For example, the following callback function creates a model by importing the\
    \ `abstract6.py` file and then returning the `Model` object:\n\n```\ndef pyomo_create_model(options=None,\
    \ model_options=None):\n    sys.path.append(abspath(dirname(__file__)))\n    abstract6\
    \ = __import__('abstract6')\n    sys.path.remove(abspath(dirname(__file__)))\n\
    \    return abstract6.Model\n```\n\n# pyomo_create_modeldata\n\nThis callback\
    \ function creates a model data object used to create a model instance. Model\
    \ data objects are useful in contexts where a set of different data sources need\
    \ to be specified for model constructions. This function has two arguments: `options`\
    \ and `model`. The return value must be a `DataPortal` object. For example, the\
    \ following callback function creates a `DataPortal` object from the file `abstract6.dat`:\n\
