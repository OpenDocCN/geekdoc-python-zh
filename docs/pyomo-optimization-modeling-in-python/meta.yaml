    \ leveraging these transformations to support global and local optimization of\
    \ MPEC models.\n\n## 13.1 Introduction\n\nMathematical Programs with Equilibrium\
    \ Constraint (MPEC) problems arise in a large number of applications in engineering\
    \ and economic systems [15, 40, 48]. An MPEC is an optimization problem that includes\
    \ equilibrium constraints in the form of complementarity conditions. Equilibrium\
    \ constraints naturally arise as the solution to an optimization subproblem (e.g.,\
