    # 4.10 Other Modeling Components


    This chapter presented details for some of the most common modeling components
    supported by Pyomo. There are other modeling components that were not thoroughly
    discussed in this chapter. These include:


    Block: The Block component provides a mechanism to declare models with repeated
    or nested structure (e.g., separate Block objects may exist on a model to represent
    different time points in a multi-period optimization). A Block consists of a collection
    of Pyomo modeling components. More discussion of blocks is provided in Chapter
    8.


    Model: The Model component provides a container for grouping Pyomo modeling components
    to form the definition of an optimization problem. Pyomo supports both abstract
    and concrete modeling representations. While "model" objects were widely used
    in this book (they are required to formulate and solve an optimization problem
    in Pyomo), we have not discussed the fact that they are components themselves.
    In fact, they inherit from the Block component.'
