    ## 4.2.1 Indexed Components\n\nAs shown in the previous chapter, Pyomo components\
    \ can be declared as individual, atomic entities or as indexed collections. Indexed\
    \ components will appear in several of the examples in this chapter. Consider\
    \ the following model:\n\n```python\nmodel = pyo.ConcreteModel()\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    model.B = pyo.Set(initialize=['Q', 'R'])\nmodel.x = pyo.Var()\nmodel.y = pyo.Var(model.A,\
    \ model.B)\nmodel.o = pyo.Objective(expr=model.x)\nmodel.c = pyo.Constraint(expr=model.x\
    \ >= 0)\ndef d_rule(model, a):\n    return a * model.x <= 0\nmodel.d = pyo.Constraint(model.A,\
    \ rule=d_rule)\n```\n\nThe component `c` specifies a single constraint in this\
    \ model, and the component `d` specifies a collection of constraints indexed over\
    \ the set `A`. The `Constraint` component can be used to declare both simple constraints\
    \ and indexed constraints. In general, components can also be indexed by multiple\
    \ index sets. For example, `model.y` is indexed over both `A` and `B`, and it\
    \ can be referenced by `model.y[i, j]` where `i` is any valid element from `model.A`\
    \ and `j` is any valid element from `model.B` (e.g., `model.y[2, 'Q']`).\n\n>\
    \ NOTE: Any unnamed arguments in a component constructor are assumed to be index\
    \ sets for the component. They specify the set of valid indices for the component.\n\
    \nDeclaration of arguments for indexed components is often more complex. For example,\
    \ the `initialize` keyword argument can be used when declaring a single variable,\n\
    \n```python\nmodel.x = pyo.Var(initialize=3.14)\n```\n\nSpecifying a value for\
    \ these types of keyword arguments is straightforward when the component is not\
    \ indexed. When the component is indexed, however, we may want to specify a different\
    \ value for each of the indices. There are three approaches typically supported\
    \ for these kinds of keyword arguments.\n\n*   When a single scalar value is passed,\
    \ then that value is used for all the indices of the component.\n*   In many cases,\
    \ you can also pass a Python dictionary (index-value pairs) where the keys of\
    \ the dictionary are valid indices for the component.\n*   It is also possible\
    \ to pass in a Python function to provide the value for every index in the component.\
