  - '[PAGE 122]


    ponents and expressions can reference components from anywhere within the hierarchy.


    > **NOTE:** Within one block, Pyomo supports references to components from any
    other block. However, it is generally good object-oriented practice to only reference
    components from the current or lower levels in the hierarchy. This promotes reusability
    of your blocks within other models without strong assumptions about the structure
    of the owning or parent blocks.


    Note in the code snippet each block defines its own *component namespace*; while
    component names must be unique within a single block, they do not need to be globally
    unique. This allows blocks to be constructed safely without concerns about definitions
    in one block colliding or interfering with definitions in other blocks. This leads
    to all components having two forms of a name: the local name, which may be repeated
    elsewhere in the model, and a globally-unique *fully qualified* name that includes
    the names of the parent block(s) separated by periods:


    ```

    print(model.x.local_name)           # x

    print(model.x.name)                 # x

    print(model.b.x.local_name)         # x

    print(model.b.x.name)               # b.x

    print(model.b.b[1].x.local_name)    # x

    print(model.b.b[1].x.name)          # b.b[1].x

    ```


    When discussing the block hierarchy, we adopt terminology from tree structures
    and refer to the block one level up the hierarchy (toward the top-level model)
    as the *parent block*, and all components contained within a block as its *children*.
    The *root* of the block hierarchy is always the current model. Pyomo components
    all provide a set of standard methods for moving around the component hierarchy:


    `parent_component()` Each modeling object in a Pyomo model is owned by a single
    component. Calling `parent_component()` on a modeling object returns the *component*
    that holding (or owning) the modeling object. For members of an indexed component,
    `parent_component()` returns the indexed component object containing the component.
    For scalar components, the parent component is the scalar component itself.


    `parent_block()` Each modeling component is attached to a single block. Calling
    `parent_block()` on a Pyomo modeling object returns the block that owns the object''s
    `parent_component()`.


    `model()` Calling `model()` on a modeling object walks up the `parent_block()`
    calls to return the top-level (root) block.


    `__getitem__` As with models, child components can be accessed programmatically
    by attribute lookup on the block.


    `component()` Child components can also be retrieved by name using the Blocks
    `component()` method.'
