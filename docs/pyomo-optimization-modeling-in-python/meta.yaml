  - '[PAGE 162]


    Additionally, the `--timelimit` option can be used to specify the maximum runtime
    of the solver. This is typically passed to the solver, and thus this timelimit
    is enforced in a solver-dependent manner.


    Solver results are generated from solution information provided by the solver,
    and optionally a logfile of output from the solver. By default, Pyomo captures
    information about the variable values selected by the solver. However, there is
    often additional information a user may wish to collect, such as dual values for
    constraints in a linear program. For performance reasons, this data is not automatically
    collected by the `solve` subcommand, but the `--solver-suffixes` option is used
    to specify the names of the data desired. A *suffix* is simply data for a constraint
    or variable that results from the application of a solver. Suffixes can be specified
    by name, or with a regular expression. For example, the following command specifies
    that all suffixes generated by the solver are requested:


    ```

    pyomo solve --solver=glpk --solver-suffix=''.*'' concrete2.py

    ```


    The following suffixes are currently supported within Pyomo:


    +   - `dual` - constraint dual values

    - `rc` - reduced costs

    - `slack` - constraint slack values


    Note that a given solver may provide only a subset of these suffixes.


    The `--tempdir` and `--keepfiles` options can be used to archive the temporary
    files that Pyomo uses. By default, Pyomo uses temporary files automatically generated
    in system temporary directories. The `--tempdir` option is used to specify the
    directory that these files are created in. By default, temporary files are deleted
    after optimization is completed. The `--keepfiles` options disables this deletion,
    which allows the user to see the data Pyomo sends to the optimizer.


    # ### 10.2.2.5 Analyze Solver Results


    The `--postprocess` option can be used to specify a Python module that is executed
    after the solver has executed. A typical use of this option is to specify post-processing
    steps to interpret the solver results in a problem-dependent manner.


    Post-processing steps can be defined by declaring in the Python modules a `pyomo_postprocess`
    function to be used in post processing. **Figure 10.2** provides an example of
    a post-processing function that writes the final solutions to a file in the CSV
    format.


    # ### 10.2.2.6 Managing Diagnostic Output


    The `solve` subcommand includes a variety of options to control the generation
    of diagnostic output and other information useful for learning more about the
    executed workflow.'
