    \n```\npyomo solve --solver=glpk wl_abstract.py wl_data.dat\n```\n\nThe model\
    \ construction step requires a Pyomo A Pyomo model file, which is a Python file\
    \ defining a Pyomo model object. Thus, the solve subcommand can be viewed as a\
    \ generic script for analyzing a model defined by a Pyomo model file. The solve\
    \ subcommand has a variety of optional command-line arguments to customize the\
    \ optimization process; documentation of the various available options is available\
