    # Command-Line Tools and Scripting


    Pyomo models can be analyzed both using command-line tools and via Python scripts.
    The `pyomo` command line utility provides a generic interface to most Pyomo modeling
    capabilities. The `pyomo` command supports a generic optimization process. This
    process can easily be replicated in a Python script and further customized for
    a user''s specific needs.


    # Concrete and Abstract Model Definitions


    The examples in Section 1.2.1 illustrate Pyomo''s support for both concrete and
    abstract model definitions. The difference between these modeling approaches relates
    to when modeling components are initialized: concrete models immediately initialize
    components, and abstract models delay the initialization of components until a
    later model initialization action. Consequently, these modeling approaches are
    equivalent, and the choice of approach depends on the context in which Pyomo is
    used and user preference. Both types of models can be easily initialized with
    data from a wide range of data sources (e.g., csv, json, yaml, excel, and databases).


    # Object-Oriented Design


    Pyomo employs an object-oriented library design. Models are Python objects, and
    model components are attributes of these models. This design allows Pyomo to automatically
    manage the naming of modeling components, and it naturally segregates modeling
    components within different model objects. Pyomo models can be further structured
    with blocks, which support a hierarchical nesting of model components. Many of
    Pyomo''s advanced modeling features leverage this structured modeling capability.


    # Expressive Modeling Capability


    Pyomo''s modeling components can be used to express a wide range of optimization
    problems, including but not limited to:


    +   - linear programs,

    - quadratic programs,

    - nonlinear programs,

    - mixed-integer linear programs,'
