- md: "Mutable parameters require some additional overhead for memory and they require\
    \ additional processing when translating Pyomo expressions into a form that a\
    \ solver understands. Consequently, parameters are immutable by default.\n\n##\
    \ 4.7.2 Working with Param Objects\n\nPyomo assumes parameter values are specified\
    \ with a sparse representation. For example, the `Param` object `T` declares a\
    \ parameter indexed over sets `A` and `B`:\n\n```\nmodel.T = pyo.Param(model.A,\
    \ model.B)\n```\n\nHowever, not all of these values are required to be defined\
    \ in a model. For example:\n\n```\nmodel.B = pyo.Set(initialize=[1,2,3])\nw={}\n\
    w[1] = 10\nw[3] = 30\nmodel.W = pyo.Param(model.B, initialize=w)\n```\n\nParameter\
    \ `W` is defined for indices 1 and 3, but the index set `B` includes 1, 2, and\
    \ 3. If `W[2]` is accessed, an error occurs and a Python exception is thrown.\n\
    \nAs mentioned earlier, a default value can also be provided with the `default`\
    \ keyword argument. If a default value is provided, and a model tries to access\
    \ a value that has not been initialized, the default value is used (instead of\
    \ throwing an exception). Note that the parameter data is stored with a sparse\
    \ representation, even if the default value is specified. This is supported for\
    \ memory efficiency. It provides a convenient way for the modeler to reference\
    \ sparse values without adopting a specialized data structure.\n\nBecause of this\
    \ sparse representation, several methods that consider the valid keys of an indexed\
    \ parameter require specialized behavior. Let the *valid index set* refer to the\
    \ complete list of all valid indices whether initialized or not, and let the *effective\
    \ index set* denote only the set of initialized key values in an indexed component.\
    \ If no default value is declared, then the `len` function returns the size of\
    \ the effective index set, and the `in` operator tests if a specified value is\
    \ in the effective index set. Iteration is supported over values in the effective\
    \ index set, and the Python `[]` operator can be used to access individual elements\
    \ (which is the parameter value in this example).\n\nIf a default value is declared,\
    \ then all indices are equally valid in the model, whether explicitly indexed\
    \ or not. Therefore, the `len()` function returns the size of the full index set,\
    \ iteration and the `in` operator consider the full index set. Thus, when a default\
    \ value is specified, the parameter appears to be densely populated with values,\
    \ even if the underlying data structure is kept sparse for efficiency. This is\
    \ illustrated in the following example:\n\n```\nmodel = pyo.ConcreteModel()\n\
    model.p = pyo.Param([1,2,3], initialize={1:1.42, 3:3.14})\nmodel.q = pyo.Param([1,2,3],\
    \ initialize={1:1.42, 3:3.14}, default=0)\n```\n\n```\n# Demonstrating the len()\
    \ function\nprint(len(model.p)) # 2\nprint(len(model.q)) # 3\n\n# Demonstrating\
    \ the 'in' operator (checks against component keys)\nprint(2 in model.p) # False\n\
    print(2 in model.q) # True\n\n# Demonstrating iteration over component keys\n\
    print([key for key in model.p]) # [1, 3]\nprint([key for key in model.q]) # [1,\
    \ 2, 3]\n```\n\nThe methods `sparse_keys()`, `sparse_values()`, `sparse_items()`,\
    \ `sparse_iterkeys()`, `sparse_itervalues()`, and `sparse_iteritems()` define\
    \ sparse versions of the corresponding methods defined in the `IndexedComponent`\
    \ class. These methods return values only for the defined parameter values, whether\
    \ or not a default value is specified.\n\n## 4.8 Named Expressions\n\nPyomo expressions\
    \ are mathematical statements containing numbers, parameters, and variables combined\
    \ using operators such as +,-,*,/ for example. These expressions form the basis\
    \ of the algebraic representation of a model, and are stored inside constraint\
    \ and objective components on the model.\n\nThe `Expression` component provides\
    \ a mechanism for storing a Pyomo expression on a model making the expression\
    \ reusable in multiple contexts, such as a common sub-expression in one or more\
    \ constraints, without the overhead of regenerating the expression each time.\
    \ In addition, the Pyomo expression stored by the `Expression` component can be\
    \ changed at a later time, thereby updating any constraint or objective expressions\
    \ referencing it. This provides a powerful approach for modifying a model between\
    \ calls to a solver.\n\nThe following sections describe the syntax for declaring\
    \ and working with named expressions.\n\n### 4.8.1 Expression Declarations\n\n\
    The following code creates a single, non-indexed `Expression` object:\n\n```\n\
    model.e = pyo.Expression()\n```\n\nNamed and un-named arguments are supported,\
    \ and Table 4.7 provides a list of the common arguments that can be passed when\
    \ declaring the `Expression` component.\n\nThe `expr` or `rule` keywords can be\
    \ used to initialize a named expression when it is declared, as shown in the following\
    \ example:\n\n```\nmodel.x = pyo.Var()\nmodel.e1 = pyo.Expression(expr=model.x\
    \ + 1)\ndef e2_rule(model):\n    return model.x + 2\nmodel.e2 = pyo.Expression(rule=e2_rule)\n\
    ```\n\n| keyword | description | acceptable values |\n| :--- | :--- | :--- |\n\
    | <un-named> | reserved for specifying index sets | any number of Pyomo Set objects\
    \ or Python lists |\n| expr | provides the expression to store | any valid Pyomo\
    \ expression |\n| rule | provides the rule function that will be called to provide\
    \ the expression to store | a function that returns a Pyomo expression or Expression.Skip\
    \ |\n\nTable 4.7: Common declaration arguments for the `Expression` component\n\
    \nAs with the other core modeling components, the `Expression` component can be\
    \ indexed by declaring it with one or more unnamed arguments representing indexing\
    \ sets. The following example declares an indexed `Expression` component over\
    \ all members of the index set except for the first. Indices that should be left\
    \ out of the indexed `Expression` component are signified by returning the `Expression.Skip`\
    \ attribute from the rule function.\n\n```\nN = [1,2,3]\nmodel.x = pyo.Var(N)\n\
    def e_rule(model, i):\n    if i == 1:\n        return pyo.Expression.Skip\n  \
    \  else:\n        return model.x[i]**2\nmodel.e = pyo.Expression(N, rule=e_rule)\n\
    ```\n\n### 4.8.2 Working with Expression Objects\n\nA simple use for the `Expression`\
    \ component declares a single expression and uses it inside an objective and a\
    \ constraint declaration:\n\n```\nmodel.x = pyo.Var()\nmodel.e = pyo.Expression(expr=(model.x\
    \ - 1.0)**2)\nmodel.o = pyo.Objective(expr=0.1*model.e + model.x)\nmodel.c = pyo.Constraint(expr=model.e\
    \ <= 1.0)\n```\n\nThe value of the named expression can be computed using the\
    \ `value` function. Additionally, the expression stored in the named Expression\
    \ component can be updated. As the following example shows, updating the named\
    \ expression has the effect of updating the objective and constraint expressions\
    \ where it is used:\n\n```\nmodel.x.set_value(2.0)\nprint(pyo.value(model.e))\
    \  # 1.0\nprint(pyo.value(model.o))  # 2.1\nprint(pyo.value(model.c.body))  #\
    \ 1.0\n\nmodel.e.set_value((model.x - 2.0)**2)\nprint(pyo.value(model.e))  # 0.0\n\
    print(pyo.value(model.o))  # 2.0\nprint(pyo.value(model.c.body))  # 0.0\n```\n\
    \nThe Expression component does not require an expression when it is declared\
    \ on a model, but it must be assigned one before the model is solved if the named\
    \ expression is used in any active objectives or constraints. Furthermore, named\
    \ expressions that are used in objectives or constraints should not store relational\
    \ Pyomo expressions, that is, expressions using one or more of the operators <=,\
    \ <, >=, >, and ==.\n\n## 4.9 Suffix Components\n\nSuffixes provide a mechanism\
    \ for annotating a model with auxiliary data not strictly related to the model\
    \ declaration and structure. Suffixes are commonly used by solver plugins to store\
    \ extra information about the solution of a model. More generally, suffixes can\
    \ be used to\n\n- import information from a solver about the solution to a mathematical\
    \ program (e.g., constraint duals, variable reduced costs, basis information),\n\
    - export information to a solver or algorithm to configure the solution process\
    \ (e.g., warm-starting information, variable branching priorities), and\n- tag\
    \ model components with local data for later use in advanced scripting algorithms.\n\
    \nThis functionality is made available to the modeler through the `Suffix` component\
    \ class, providing an interface for annotating Pyomo modeling components with\
    \ additional data.\n\n### 4.9.1 Suffix Declarations\n\nThe following code creates\
    \ a suffix labeled `foo`:\n\n```\nmodel.foo = pyo.Suffix()\n```"
  mdcn: "可变参数在内存方面会引入一些额外的开销，并且在将Pyomo表达式转换为求解器能够理解的形式时，需要额外的处理。因此，参数默认是不可变的。\n\n\
    ## 4.7.2 使用 Param 对象\n\nPyomo 假设参数值以稀疏表示的形式指定。例如，`Param` 对象 `T` 声明了一个在集合 `A` 和\
    \ `B` 上索引的参数：\n\n```\nmodel.T = pyo.Param(model.A, model.B)\n```\n\n然而，并非所有这些值都需要在模型中定义。例如：\n\
    \n```\nmodel.B = pyo.Set(initialize=[1,2,3])\nw={}\nw[1] = 10\nw[3] = 30\nmodel.W\
    \ = pyo.Param(model.B, initialize=w)\n```\n\n参数 `W` 为索引 1 和 3 定义了值，但索引集 `B` 包含\
    \ 1、2 和 3。如果访问 `W[2]`，则会发生错误并抛出 Python 异常。\n\n如前所述，也可以使用 `default` 关键字参数提供默认值。如果提供了默认值，并且模型尝试访问尚未初始化的值，则会使用默认值（而不是抛出异常）。请注意，即使指定了默认值，参数数据也以稀疏表示存储。这样做是为了内存效率。它为建模者提供了一种方便的方式来引用稀疏值，而无需采用专门的数据结构。\n\
    \n由于这种稀疏表示，一些考虑索引参数有效键的方法需要专门的行为。令 *有效索引集* 指所有有效索引的完整列表（无论是否已初始化），令 *有效索引集* 仅表示索引组件中已初始化的键值集合。如果未声明默认值，则\
    \ `len` 函数返回有效索引集的大小，`in` 运算符测试指定值是否在有效索引集中。支持对有效索引集中的值进行迭代，并且可以使用 Python 的 `[]`\
    \ 运算符访问单个元素（在此示例中即为参数值）。\n\n如果声明了默认值，则无论是否显式索引，所有索引在模型中都具有同等的有效性。因此，`len()` 函数返回完整索引集的大小，迭代和\
    \ `in` 运算符考虑完整索引集。因此，当指定默认值时，即使底层数据结构保持稀疏以提高效率，参数看起来也是密集填充了值。以下示例说明了这一点：\n\n```\n\
    model = pyo.ConcreteModel()\nmodel.p = pyo.Param([1,2,3], initialize={1:1.42,\
    \ 3:3.14})\nmodel.q = pyo.Param([1,2,3], initialize={1:1.42, 3:3.14}, default=0)\n\
    ```\n\n```\n# 演示 len() 函数\nprint(len(model.p)) # 2\nprint(len(model.q)) # 3\n\n\
    # 演示 'in' 运算符（检查组件键）\nprint(2 in model.p) # False\nprint(2 in model.q) # True\n\
    \n# 演示遍历组件键\nprint([key for key in model.p]) # [1, 3]\nprint([key for key in model.q])\
    \ # [1, 2, 3]\n```\n\n方法 `sparse_keys()`、`sparse_values()`、`sparse_items()`、`sparse_iterkeys()`、`sparse_itervalues()`\
    \ 和 `sparse_iteritems()` 定义了 `IndexedComponent` 类中相应方法的稀疏版本。无论是否指定了默认值，这些方法仅返回已定义参数值对应的值。\n\
    \n## 4.8 命名表达式\n\nPyomo 表达式是数学陈述，包含数字、参数和变量，使用 +、-、*、/ 等运算符组合而成。这些表达式构成了模型代数表示的基础，并存储在模型的约束和目标组件内。\n\
    \n`Expression` 组件提供了一种将 Pyomo 表达式存储在模型上的机制，使得该表达式可以在多个上下文中重复使用，例如在一个或多个约束中作为公共子表达式，而无需每次都重新生成表达式所带来的开销。此外，`Expression`\
    \ 组件存储的 Pyomo 表达式可以稍后更改，从而更新任何引用它的约束或目标表达式。这提供了一种在两次求解器调用之间修改模型的强大方法。\n\n以下各节描述了声明和使用命名表达式的语法。\n\
    \n### 4.8.1 表达式声明\n\n以下代码创建了一个单独的、非索引的 `Expression` 对象：\n\n```\nmodel.e = pyo.Expression()\n\
    ```\n\n支持命名和未命名的参数，表 4.7 提供了在声明 `Expression` 组件时可以传递的常用参数列表。\n\n`expr` 或 `rule`\
    \ 关键字可用于在声明命名表达式时对其进行初始化，如下例所示：\n\n```\nmodel.x = pyo.Var()\nmodel.e1 = pyo.Expression(expr=model.x\
    \ + 1)\ndef e2_rule(model):\n    return model.x + 2\nmodel.e2 = pyo.Expression(rule=e2_rule)\n\
    ```\n\n| 关键字 | 描述 | 可接受值 |\n| :--- | :--- | :--- |\n| <未命名> | 保留用于指定索引集 | 任意数量的\
    \ Pyomo Set 对象或 Python 列表 |\n| expr | 提供要存储的表达式 | 任何有效的 Pyomo 表达式 |\n| rule |\
    \ 提供将被调用以提供要存储的表达式的规则函数 | 返回 Pyomo 表达式或 Expression.Skip 的函数 |\n\n表 4.7：`Expression`\
    \ 组件的常用声明参数\n\n与其他核心建模组件一样，`Expression` 组件可以通过声明一个或多个表示索引集的未命名参数来进行索引。以下示例声明了一个索引的\
    \ `Expression` 组件，其成员为索引集中除第一个以外的所有成员。应从索引 `Expression` 组件中排除的索引，由规则函数返回 `Expression.Skip`\
    \ 属性来表示。\n\n```\nN = [1,2,3]\nmodel.x = pyo.Var(N)\ndef e_rule(model, i):\n  \
    \  if i == 1:\n        return pyo.Expression.Skip\n    else:\n        return model.x[i]**2\n\
    model.e = pyo.Expression(N, rule=e_rule)\n```\n\n### 4.8.2 使用 Expression 对象\n\n\
    `Expression` 组件的一个简单用法是声明单个表达式，并在目标函数和约束声明中使用它：\n\n```\nmodel.x = pyo.Var()\n\
    model.e = pyo.Expression(expr=(model.x - 1.0)**2)\nmodel.o = pyo.Objective(expr=0.1*model.e\
    \ + model.x)\nmodel.c = pyo.Constraint(expr=model.e <= 1.0)\n```\n\n可以使用 `value`\
    \ 函数计算命名表达式的值。此外，存储在命名 Expression 组件中的表达式也可以更新。如下例所示，更新命名表达式会更新使用它的目标和约束表达式：\n\
    \n```\nmodel.x.set_value(2.0)\nprint(pyo.value(model.e))  # 1.0\nprint(pyo.value(model.o))\
    \  # 2.1\nprint(pyo.value(model.c.body))  # 1.0\n\nmodel.e.set_value((model.x\
    \ - 2.0)**2)\nprint(pyo.value(model.e))  # 0.0\nprint(pyo.value(model.o))  # 2.0\n\
    print(pyo.value(model.c.body))  # 0.0\n```\n\nExpression 组件在模型上声明时不需要表达式，但是，如果命名表达式在任何活动的目标函数或约束中使用，则必须在求解模型之前为其赋值。此外，在目标函数或约束中使用的命名表达式不应存储关系型\
    \ Pyomo 表达式，即使用 <=、<、>=、> 和 == 中一个或多个运算符的表达式。\n\n## 4.9 后缀组件\n\n后缀提供了一种机制，用于在模型上标注与模型声明和结构无严格关系的辅助数据。后缀通常被求解器插件用于存储关于模型解的额外信息。更一般地说，后缀可用于：\n\
    \n- 从求解器导入关于数学规划解的信息（例如，约束对偶、变量简约成本、基信息），\n- 向求解器或算法导出信息以配置求解过程（例如，热启动信息、变量分支优先级），以及\n\
    - 使用本地数据标记模型组件，以供高级脚本算法后续使用。\n\n此功能通过 `Suffix` 组件类提供给建模者，为向 Pyomo 建模组件标注附加数据提供了接口。\n\
    \n### 4.9.1 后缀声明\n\n以下代码创建一个标签为 `foo` 的后缀：\n\n```\nmodel.foo = pyo.Suffix()\n\
    ```"
