    \    OUTPUT.write(str(results))\n    OUTPUT.close()\n\n```\n\nThe solve subcommand\
    \ includes the --save-results option, which performs this operation. More generally,\
    \ this callback function is included to allow users to save problem-specific summary\
    \ of their optimization results.\n\n# pyomo_postprocess\n\nThis callback function\
    \ is executed after optimization to perform postprocessing steps. This function\
    \ has three arguments: options, instance, and results. For example, the following\
    \ function prints a simple summary of the optimization results:\n\n```\npython\n\
    def pyomo_postprocess(options=None, instance=None,\n                      results=None):\n\
    \    instance.solutions.load_from(results, \\\n                              \
    \ allow_consistent_values_for_fixed_vars=True)\n    print(\"Solution value \"\
    +str(pyo.value(instance.obj)))\n\n```\n\n# 10.2.2.4 Customizing Solver Behavior\n\
    \nThe generic workflow supported by the solve subcommand includes the execution\
    \ of a solver to optimize (or otherwise analyze) a model. A variety of command-line\
    \ options are used to control solver behavior. The --solver option is used to\
    \ specify the name of the solver constructed. This option can specify two classes\
    \ of solvers: the names of command-line executables on the user's path, and predefined\
    \ solver interfaces.\nCommand-line executables are assumed to perform I/O using\
    \ NL files. Thus, command-line executables can be optimized with any solver executable\
    \ built with the AMPL solver library.\n\nSolver options can be specified in a\
    \ generic manner using the --solver-options option. This specifies a string interpreted\
    \ as one or more option-value pairs. For example, the following option passes\
    \ the mipgap option to the glpk solver:\n\n```\nbash\npyomo solve --solver=glpk\
    \ --solver-options='mipgap=0.01' \\\nconcrete1.py\n\n```"
- md: "Additionally, the `--timelimit` option can be used to specify the maximum runtime\
    \ of the solver. This is typically passed to the solver, and thus this timelimit\
    \ is enforced in a solver-dependent manner.\n\nSolver results are generated from\
    \ solution information provided by the solver, and optionally a logfile of output\
    \ from the solver. By default, Pyomo captures information about the variable values\
    \ selected by the solver. However, there is often additional information a user\
    \ may wish to collect, such as dual values for constraints in a linear program.\
    \ For performance reasons, this data is not automatically collected by the `solve`\
    \ subcommand, but the `--solver-suffixes` option is used to specify the names\
    \ of the data desired. A *suffix* is simply data for a constraint or variable\
    \ that results from the application of a solver. Suffixes can be specified by\
    \ name, or with a regular expression. For example, the following command specifies\
    \ that all suffixes generated by the solver are requested:\n\n```\npyomo solve\
    \ --solver=glpk --solver-suffix='.*' concrete2.py\n```\n\nThe following suffixes\
    \ are currently supported within Pyomo:\n\n- `dual` - constraint dual values\n\
    - `rc` - reduced costs\n- `slack` - constraint slack values\n\nNote that a given\
    \ solver may provide only a subset of these suffixes.\n\nThe `--tempdir` and `--keepfiles`\
    \ options can be used to archive the temporary files that Pyomo uses. By default,\
    \ Pyomo uses temporary files automatically generated in system temporary directories.\
    \ The `--tempdir` option is used to specify the directory that these files are\
    \ created in. By default, temporary files are deleted after optimization is completed.\
    \ The `--keepfiles` options disables this deletion, which allows the user to see\
    \ the data Pyomo sends to the optimizer.\n\n### 10.2.2.5 Analyze Solver Results\n\
    \nThe `--postprocess` option can be used to specify a Python module that is executed\
    \ after the solver has executed. A typical use of this option is to specify post-processing\
    \ steps to interpret the solver results in a problem-dependent manner.\n\nPost-processing\
    \ steps can be defined by declaring in the Python modules a `pyomo_postprocess`\
    \ function to be used in post processing. **Figure 10.2** provides an example\
    \ of a post-processing function that writes the final solutions to a file in the\
    \ CSV format.\n\n### 10.2.2.6 Managing Diagnostic Output\n\nThe `solve` subcommand\
    \ includes a variety of options to control the generation of diagnostic output\
    \ and other information useful for learning more about the executed workflow.\n\
    \n```python\nimport csv\n\ndef pyomo_postprocess(options=None, instance=None,\n\
    \                     results=None):\n    #\n    # Collect the data\n    #\n \
    \   vars = set()\n    data = {}\n    f = {}\n    for i in range(len(results.solution)):\n\
    \        data[i] = {}\n        for var in results.solution[i].variable:\n    \
    \        vars.add(var)\n            data[i][var] = \\\n                results.solution[i].variable[var]['Value']\n\
    \        for obj in results.solution[i].objective:\n            f[i] = results.solution[i].objective[obj]['Value']\n\
    \            break\n    #\n    # Write a CSV file, with one row per solution.\n\
    \    # The first column is the function value, the remaining\n    # columns are\
    \ the values of nonzero variables.\n    #\n    rows = []\n    vars = list(vars)\n\
    \    vars.sort()\n    rows.append(['obj']+vars)\n    for i in range(len(results.solution)):\n\
    \        row = [f[i]]\n        for var in vars:\n            row.append( data[i].get(var,None)\
    \ )\n        rows.append(row)\n    print(\"Creating results file results.csv\"\
    )\n    OUTPUT = open('results.csv', 'w')\n    writer = csv.writer(OUTPUT)\n  \
    \  writer.writerows(rows)\n    OUTPUT.close()\n```\n\nFig. 10.2: A post-processing\
    \ plugin that writes final solutions in a CSV file.\n\nThe default output of the\
    \ `solve` subcommand is a terse summary of the major steps that are executed.\
    \ The `--log` and `--stream-output` options are used to print the solver output.\
    \ The `--log` option is used to print the solver output after the solver has terminated,\
    \ and the `--stream-output` option is used to print the solver output as it is\
    \ generated. Similarly, the `--summary` and `--show-results` options print different\
    \ summaries of the optimization results. The `--summary` command prints a summary\
    \ of the Pyomo model, after the results are loaded.\n\nThe `--show-results` prints\
    \ the final results. If the PyYAML package is installed, then the default results\
    \ format is YAML and the final results are stored in the file results.yml. Otherwise,\
    \ the default results format is JSON and the final results are stored in the file\
    \ results.json. The `--json` option can be used to specify the JSON results format\
    \ when the PyYAML package is installed. The `--save-results` option can be used\
    \ to specify an alternative results file.\n\nPyomo uses a standard Python logging\
    \ system to manage the printing of logging messages for the underlying software\
    \ in Pyomo. By default, logging messages representing Pyomo errors and warnings\
    \ are always printed. The `--quiet` option suppresses all log messages except\
    \ for those referring to errors. The `--warning` option enables warning messages\
    \ for Pyomo. The `--info` option enables informational, warning and error log\
    \ messages for Pyomo.\n\nThe `--verbose` option enables debugging log messages\
    \ for Pyomo. This option can be specified multiple times to enable logging messages\
    \ for different parts of Pyomo: (1) debugging for just Pyomo and (2) debugging\
    \ for all Pyomo packages. The `--debug` option enables debugging logging, and\
    \ it allows exceptions to trigger a failure in which the program stack is printed.\n\
    \n## 10.2.3 The convert Subcommand\n\nMany optimizers supported by Pyomo read\
    \ a temporary file Pyomo generates in a standard problem format. For example,\
    \ the NL format is recognized by solvers used with the AMPL modeling tool, and\
    \ the LP file format is used by a variety of commercial and open source integer\
    \ programming solvers.\n\nIt is often useful to generate these problem files directly,\
    \ both to diagnose issues with a model as well as to directly manage the execution\
    \ of a solver. The convert subcommand can be used to convert a Pyomo model into\
    \ a standard file format. For example, consider the command:\n\n```\npyomo convert\
    \ --format=lp concrete1.py\n```\n\nThis command converts the model in concrete1.py\
    \ into an LP file format, which is stored in the file unknown.lp:\n\n```\n[ 0.00]\
    \ Setting up Pyomo environment\n[ 0.00] Applying Pyomo preprocessing actions\n\
    [ 0.00] Creating model\nModel written to file 'unknown.lp'\n[ 0.05] Pyomo Finished\n\
    ```\n\nThe `--output` option can also be used to specify a filename, for which\
    \ the filename suffix specifies the file format. For example, the command\n\n\
    ```\npyomo convert --output=concrete1.lp concrete1.py\n```\n\ncreates the file\
    \ concrete1.lp, which represents the model from concrete1.py in the LP file format.\n\
    \nThe command\n\n```\npyomo help -w\n```\n\nsummarizes the file formats supported\
    \ by Pyomo.\n\n### 10.3 Data Commands for AbstractModel\n\nThe `Set` and `Param`\
    \ components of a Pyomo model are used to define data values used to construct\
    \ constraints and objectives. Previous chapters have illustrated that these components\
    \ are not necessary to develop complex models. However, the `Set` and `Param`\
    \ components can be used to define abstract data declarations, where no data values\
    \ are specified. For example:\n\n```\nmodel.A = Set(within=Reals)\nmodel.p = Param(model.A,\
    \ within=Integers)\n```\n\nData command files can be used to initialize data declarations\
    \ in Pyomo models, and in particular they are useful for initializing `AbstractModel`\
    \ data declarations. However, note that complex mappings are often accomplished\
    \ in Pyomo via scripting rather than using data command files.\n\nPyomo’s data\
    \ command files employ a domain-specific language whose syntax closely resembles\
    \ the syntax of AMPL’s data commands [2]. A data command file consists of a sequence\
    \ of commands specifying set and parameter data, or specifying where such data\
    \ is to be obtained from external sources. The following commands can be used\
    \ to declare data:\n\n- The `set` command declares set data.\n- The `param` command\
    \ declares a table of parameter data, which can also include the declaration of\
    \ the set data used to index the parameter data.\n- The `load` command loads data\
    \ from an external resources, like a spreadsheet or database.\n- The `table` command\
    \ declares a two-dimensional table of parameter data.\n\nThe following commands\
    \ can also be used in data command files:\n\n- The `include` command specifies\
    \ a data command file that is processed immediately.\n- The `data` and `end` commands\
    \ do not perform any actions, but they provide compatibility with AMPL scripts\
    \ that define data commands.\n\nFinally, the `namespace` declaration allows data\
    \ commands to be organized into named groups allowing each to be enabled or disabled\
    \ during model construction.\n\nNote that Pyomo’s data commands do *not* exactly\
    \ correspond to AMPL data commands. The `set` and `param` commands are designed\
    \ to closely match AMPL’s syntax and semantics. However, these commands only support\
    \ a subset of the corresponding declarations in AMPL. However, it is not possible\
    \ to support other AMPL"
  mdcn: "此外，可使用`--timelimit`选项来指定求解器的最大运行时间。该选项通常传递给求解器，因此该时限会以依赖于求解器的方式执行。\n\n求解器结果基于求解器提供的解信息生成，也可选择性地包含求解器输出的日志文件。默认情况下，Pyomo会捕获求解器选定的变量值信息。然而，用户可能希望收集其他附加信息，例如线性规划中约束条件的对偶值。出于性能考虑，`solve`子命令不会自动收集这些数据，但可使用`--solver-suffixes`选项来指定所需数据的名称。*后缀*仅指由求解器应用产生的约束或变量数据。后缀可以通过名称或正则表达式指定。例如，以下命令请求求解器生成的所有后缀：\n\
    \n```\npyomo solve --solver=glpk --solver-suffix='.*' concrete2.py\n```\n\n目前Pyomo支持以下后缀：\n\
    \n- `dual` - 约束对偶值\n- `rc` - 约简成本\n- `slack` - 约束松弛值\n\n请注意，特定的求解器可能仅提供这些后缀的子集。\n\
    \n`--tempdir`和`--keepfiles`选项可用于归档Pyomo使用的临时文件。默认情况下，Pyomo在系统临时目录中使用自动生成的临时文件。`--tempdir`选项用于指定创建这些文件的目录。默认情况下，优化完成后临时文件会被删除。`--keepfiles`选项禁用此删除操作，允许用户查看Pyomo发送给优化器的数据。\n\
    \n### 10.2.2.5 分析求解器结果\n\n`--postprocess`选项可用于指定一个在求解器执行完毕后运行的Python模块。该选项的典型用法是根据问题指定用于解释求解器结果的后处理步骤。\n\
    \n后处理步骤可以通过在Python模块中声明`pyomo_postprocess`函数来定义，以供后处理使用。**图10.2**提供了一个后处理函数示例，该函数将最终解以CSV格式写入文件。\n\
    \n### 10.2.2.6 管理诊断输出\n\n`solve`子命令包含多种选项，用于控制诊断输出以及其他有助于了解执行工作流信息的生成。\n\n```python\n\
    import csv\n\ndef pyomo_postprocess(options=None, instance=None,\n           \
    \          results=None):\n    #\n    # Collect the data\n    #\n    vars = set()\n\
    \    data = {}\n    f = {}\n    for i in range(len(results.solution)):\n     \
    \   data[i] = {}\n        for var in results.solution[i].variable:\n         \
    \   vars.add(var)\n            data[i][var] = \\\n                results.solution[i].variable[var]['Value']\n\
    \        for obj in results.solution[i].objective:\n            f[i] = results.solution[i].objective[obj]['Value']\n\
    \            break\n    #\n    # Write a CSV file, with one row per solution.\n\
    \    # The first column is the function value, the remaining\n    # columns are\
    \ the values of nonzero variables.\n    #\n    rows = []\n    vars = list(vars)\n\
    \    vars.sort()\n    rows.append(['obj']+vars)\n    for i in range(len(results.solution)):\n\
    \        row = [f[i]]\n        for var in vars:\n            row.append( data[i].get(var,None)\
    \ )\n        rows.append(row)\n    print(\"Creating results file results.csv\"\
    )\n    OUTPUT = open('results.csv', 'w')\n    writer = csv.writer(OUTPUT)\n  \
    \  writer.writerows(rows)\n    OUTPUT.close()\n```\n图10.2：一个将最终解写入CSV文件的后处理插件。\n\
    \n`solve`子命令的默认输出是主要执行步骤的简要摘要。`--log`和`--stream-output`选项用于打印求解器输出。`--log`选项在求解器终止后打印其输出，`--stream-output`选项在求解器生成输出时即时打印。类似地，`--summary`和`--show-results`选项打印优化结果的不同摘要。`--summary`命令在加载结果后打印Pyomo模型摘要。\n\
    \n`--show-results`打印最终结果。如果安装了PyYAML包，则默认结果格式为YAML，最终结果存储在`results.yml`文件中。否则，默认结果格式为JSON，最终结果存储在`results.json`文件中。`--json`选项可在安装PyYAML包时指定JSON结果格式。`--save-results`选项可用于指定备选的结果文件。\n\
    \nPyomo使用标准的Python日志系统来管理底层软件的日志消息打印。默认情况下，代表Pyomo错误和警告的日志消息始终被打印。`--quiet`选项抑制除错误以外的所有日志消息。`--warning`选项启用Pyomo的警告消息。`--info`选项启用Pyomo的信息、警告和错误日志消息。\n\
    \n`--verbose`选项启用Pyomo的调试日志消息。可以多次指定此选项以启用Pyomo不同部分的调试日志：(1) 仅为Pyomo启用调试，以及(2)\
    \ 为所有Pyomo包启用调试。`--debug`选项启用调试日志，并允许异常触发失败时打印程序堆栈。\n\n## 10.2.3 convert子命令\n\n\
    Pyomo支持的许多优化器会读取Pyomo以标准问题格式生成的临时文件。例如，NL格式可被与AMPL建模工具一起使用的求解器识别，而LP文件格式被多种商业和开源整数规划求解器使用。\n\
    \n直接生成这些问题文件通常很有用，既可用于诊断模型问题，也可用于直接管理求解器的执行。`convert`子命令可用于将Pyomo模型转换为标准文件格式。例如，考虑以下命令：\n\
    \n```\npyomo convert --format=lp concrete1.py\n```\n\n此命令将`concrete1.py`中的模型转换为LP文件格式，并存储为`unknown.lp`文件：\n\
    \n```\n[ 0.00] Setting up Pyomo environment\n[ 0.00] Applying Pyomo preprocessing\
    \ actions\n[ 0.00] Creating model\nModel written to file 'unknown.lp'\n[ 0.05]\
    \ Pyomo Finished\n```\n\n`--output`选项也可用于指定文件名，其中文件后缀指定文件格式。例如，命令\n\n```\npyomo\
    \ convert --output=concrete1.lp concrete1.py\n```\n\n创建文件`concrete1.lp`，该文件以LP文件格式表示`concrete1.py`中的模型。\n\
    \n命令\n\n```\npyomo help -w\n```\n\n总结了Pyomo支持的文件格式。\n\n### 10.3 AbstractModel的数据命令\n\
    \nPyomo模型的`Set`和`Param`组件用于定义用于构建约束和目标的数据值。前面的章节已经说明，开发复杂模型并不需要这些组件。但是，`Set`和`Param`组件可用于定义抽象数据声明，其中未指定数据值。例如：\n\
    \n```\nmodel.A = Set(within=Reals)\nmodel.p = Param(model.A, within=Integers)\n\
    ```\n\n数据命令文件可用于初始化Pyomo模型中的数据声明，特别是对于初始化`AbstractModel`数据声明很有用。但请注意，复杂的映射通常通过脚本在Pyomo中完成，而非使用数据命令文件。\n\
    \nPyomo的数据命令文件使用一种领域特定语言，其语法与AMPL的数据命令[2]语法非常相似。数据命令文件由一系列命令组成，用于指定集合和参数数据，或指定从外部源获取此类数据的位置。以下命令可用于声明数据：\n\
    \n- `set`命令声明集合数据。\n- `param`命令声明参数数据表，该表也可以包含用于索引参数数据的集合数据的声明。\n- `load`命令从外部资源（如电子表格或数据库）加载数据。\n\
    - `table`命令声明参数数据的二维表。\n\n以下命令也可在数据命令文件中使用：\n\n- `include`命令指定立即处理的数据命令文件。\n-\
    \ `data`和`end`命令不执行任何操作，但它们提供了与定义数据命令的AMPL脚本的兼容性。\n\n最后，`namespace`声明允许将数据命令组织成命名的组，以便在模型构建期间启用或禁用每个组。\n\
    \n请注意，Pyomo的数据命令*并不*完全对应于AMPL数据命令。`set`和`param`命令的设计旨在紧密匹配AMPL的语法和语义。然而，这些命令仅支持AMPL中相应声明的一个子集。但是，无法支持其他AMPL"
