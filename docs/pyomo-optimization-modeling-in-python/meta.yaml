    # 5.2.1 The value Function


    Some Pyomo component attributes may contain Pyomo objects instead of native Python
    numerical values. For example, the lower bound of a `Var` may be a simple `float`
    (e.g., 3.2), but it may also be a Pyomo `Param` object with an associated value.
    Because of this, it is important to use the `value` function to evaluate attributes
    that are expected to return numerical values.

    The use of `value` is important for converting Pyomo expressions to numeric values.
    This is illustrated in the following example.


    ```

    import pyomo.environ as pyo


    model = pyo.ConcreteModel()

    model.u = pyo.Var(initialize=2.0)


    # unexpected expression instead of value

    a = model.u - 1

    print(a) # "u - 1"

    print(type(a)) # <class \n    ''pyomo.core.expr.numeric_expr.SumExpression''>


    # correct way to access the value

    b = pyo.value(model.u) - 1

    print(b) # 1.0

    print(type(b)) # <class ''float''>

    ```


    In this example, `a` contains a Pyomo expression object (and not a numerical value
    as might have been expected). This is demonstrated when we print it and check
    the type. The print statement is correctly showing a description of the expression.
    To obtain the numeric value of the variable (or other Pyomo components), `pyo.value`
    needs to be called. Here, `b` contains the numeric value as expected.

    This example illustrates the creation of implicit expressions and how they can
    lead to unintended consequences. Users are strongly encouraged to avoid generating
    expressions except as part of the model construction process.


    > **NOTE:** It is common to forget the `value()` function when retrieving values
    from Pyomo `Var` components. For example, in the code shown below, Python will
    actually print the representation of the variable object itself, not the value.

    python

    print(model.y)


    In this case, the code will print the variable name “y”, not the value.'
