    \ `pyomo.dae` discretization transformations cannot currently be applied from\
    \ the `pyomo` command line, you must create a transformation object and apply\
    \ a discretization transformation to your model in a Python script.\n\n### 12.3.1\
    \ Finite Difference Transformation\n\nFinite difference methods approximate the\
    \ derivative at a particular point using a difference equation, and they are among\
    \ the simplest discretization schemes to conceptually understand and implement.\
    \ Many variations differ in the choice of points used to approximate the derivative.\
    \ The backward difference method, also called implicit or backward Euler, is the\
    \ most common variation. To illustrate the discretization equations associated\
    \ with this method we first define the following derivative and differential equation\
    \ (constraint):\n\n$$\\left(\\frac{dx(t)}{dt}, f(x(t), u(t))\\right) = 0, \\quad\
    \ t \\in [0, T].$$\n(12.7)\n\nAfter applying the backward difference method to\
    \ the continuous domain $t$, the resulting derivative and constraint pair is\n\
