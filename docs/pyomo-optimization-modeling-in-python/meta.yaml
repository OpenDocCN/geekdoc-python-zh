    # A.1 Overview


    Python is a powerful programming language that is easy to learn. Python is an
    interpreted language, so developing and testing Python software does not require
    the compilation and linking required by traditional software languages like FORTRAN
    and C. Furthermore, Python includes a command-line interpreter that can be used
    interactively. This allows the user to work directly with Python data structures,
    which is invaluable for learning about data structure capabilities and for diagnosing
    software failures.


    Python has an elegant syntax enabling programs to be written in a compact, readable
    style. Programs written in Python are typically much shorter than equivalent software
    developed with languages like C, C++, or Java because:


    +   - Python supports many high-level data types that simplify complex operations.

    - Python uses indentation to group statements, which enforces a clean coding style.

    - Python uses dynamically typed data, so variable and argument declarations are
    not necessary.


    Python is a highly structured programming language providing support for large
    software applications. Consequently, Python is a much more powerful language than
    many scripting tools (e.g., shell languages and Windows batch files). Python also
    includes modern programming language features like object-oriented programming,'
