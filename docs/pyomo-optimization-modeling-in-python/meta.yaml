    \ = \\text{True} \\quad (11.16) \\\\\nx \\geq 0, c_k \\geq 0, Y_{jk} \\in \\{\\\
    text{True}, \\text{False}\\} \\quad (11.17)\n```\n\nIn this framework, the logical\
