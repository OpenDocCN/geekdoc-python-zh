    # A.5.3 Tuples


    Tuples are similar to lists, but are intended to describe multi-dimensional objects.
    For example, it would be reasonable to have a list of tuples. Tuples differ from
    lists in that they use parentheses rather than square brackets for initialization.
    Additionally, the members of a list can be changed by assignment while tuples
    cannot be changed (i.e., tuples are immutable while lists are mutable). Although
    parentheses are used for initialization, square brackets are used to reference
    individual elements in a tuple (which is the same as for lists; this allows members
    of a list of tuples to be accessed with code that looks like access to an array).


    Suppose we have a tuple intended to represent the location of a point in a three-dimensional
    space. The origin would be given by the tuple (0,0,0). Consider the following
    Python session:


    ```

    >>> orig = (0,0,0)

    >>> pt = (-1.1, 9, 6)

    >>> pt[1]

    9

    >>> pt = orig

    >>> pt

    (0, 0, 0)

    ```


    For example, the statement


    ```

    pt[1] = 4

    ```


    would generate an error because tuple elements cannot be overwritten. Of course
    the entire tuple can be overwritten, since the assignment only impacts the variable
    containing the tuple.'
