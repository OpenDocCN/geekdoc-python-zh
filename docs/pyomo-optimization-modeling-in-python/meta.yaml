    Pyomo assumes parameter values are specified with a sparse representation. For
    example, the `Param` object `T` declares a parameter indexed over sets `A` and
    `B`:


    ```

    model.T = pyo.Param(model.A, model.B)

    ```


    However, not all of these values are required to be defined in a model. For example:


    ```

    model.B = pyo.Set(initialize=[1,2,3])

    w={}

    w[1] = 10

    w[3] = 30

    model.W = pyo.Param(model.B, initialize=w)

    ```


    Parameter `W` is defined for indices 1 and 3, but the index set `B` includes 1,
    2, and 3. If `W[2]` is accessed, an error occurs and a Python exception is thrown.


    As mentioned earlier, a default value can also be provided with the `default`
    keyword argument. If a default value is provided, and a model tries to access
    a value that has not been initialized, the default value is used (instead of throwing
    an exception). Note that the parameter data is stored with a sparse representation,
    even if the default value is specified. This is supported for memory efficiency.
    It provides a convenient way for the modeler to reference sparse values without
    adopting a specialized data structure.


    Because of this sparse representation, several methods that consider the valid
    keys of an indexed parameter require specialized behavior. Let the *valid index
    set* refer to the complete list of all valid indices whether initialized or not,
    and let the *effective index set* denote only the set of initialized key values
    in an indexed component. If no default value is declared, then the `len` function
    returns the size of the effective index set, and the `in` operator tests if a
    specified value is in the effective index set. Iteration is supported over values
    in the effective index set, and the Python `[]` operator can be used to access
    individual elements (which is the parameter value in this example).


    If a default value is declared, then all indices are equally valid in the model,
    whether explicitly indexed or not. Therefore, the `len()` function returns the
    size of the full index set, iteration and the `in` operator consider the full
    index set. Thus, when a default value is specified, the parameter appears to be
    densely populated with values, even if the underlying data structure is kept sparse
    for efficiency. This is illustrated in the following example:


    ```

    model = pyo.ConcreteModel()

    model.p = pyo.Param([1,2,3], initialize={1:1.42, 3:3.14})

    model.q = pyo.Param([1,2,3], initialize={1:1.42, 3:3.14}, \n    default=0)

    ```'
