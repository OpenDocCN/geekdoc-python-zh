    model.b.x[1].parent_block()        # is model.b

    model.b.x[1].model()               # is model

    model.b.component(''x'')             # is model.b.x

    ```


    Block components can also be created and populated, and then later added to a
    model. The code below shows creation of a block that is later added to a model.
    It also illustrates how a parent model can make use of sets and parameters contained
    in a child block.


    ```

    new_b = pyo.Block()

    new_b.x = pyo.Var()

    new_b.P = pyo.Param(initialize=5)

    new_b.I = pyo.RangeSet(10)


    model = pyo.ConcreteModel()

    model.b = new_b

    model.x = pyo.Var(model.b.I)

    ```


    > NOTE: In this example, the Block object new_b is not initialized when it is
    declared. In this manner, it is abstract until it is added to the ConcreteModel
    object. At this point, it is immediately initialized. Similarly, when a Block
    object is added to an AbstractModel, it is not initialized until the owning abstract
    model object is initialized.


    # 8.3 Blocks as Indexed Components


    As with other Pyomo components, Block components may also be indexed and initialized
    using a construction rule. However, block construction rules follow a slightly
    different convention: the first argument to a block rule is the block to be populated
    rather than the owning block. This block has already been attached to the model
    so methods like model() and parent_block() will work as expected. Within a rule,
    one can either directly populate the block by assigning components to it, or create
    a new block and return it from the rule.'
