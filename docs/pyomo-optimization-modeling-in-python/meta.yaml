    commands because Pyomo treats data commands as data declarations while AMPL treats
    data commands as part of its scripting language.


    The following subsections describe the syntax Pyomo''s data file commands except
    for the load and table commands, which are documented via Pyomo''s online documentation.
    The syntax of data commands can be quite varied, and we provide detailed examples
    to illustrate these commands. Note that all Pyomo data commands are terminated
    with a semicolon, and the syntax of data commands does not depend on whitespace.
    Thus, data commands can be broken across multiple lines – newlines and tab characters
    are ignored – and data commands can be formatted with whitespace with few restrictions.


    # ## 10.3.1 The set Command


    # ### 10.3.1.1 Simple Sets


    The set data command explicitly specifies the members of either a single set or
    an array of sets, i.e., an indexed set. A single set is specified with a list
    of data values that are included in this set. The formal syntax for the set data
    command is:


    ```


    set <setname> := [<value>] ... ;


    ```


    The data values in a set consist of either numeric values, simple strings or quoted
    strings:


    +   - Numeric values are any string that can be evaluated by Python as a numeric
    value, e.g., integer, float, scientific notation, or boolean.

    - Simple strings are sequences of alpha-numeric characters.

    - Quoted strings are simple strings that are included in a pair of single or double
    quotes. A quoted string can include quotes within the quoted string.


    There is no restriction on the values in a set declaration. A set may be empty,
    and it may contain any combination of numeric and non-numeric string values. Validation
    of set data is performed when constructing a Pyomo model, not while parsing a
    data command file. For example, the following are valid set commands:


    ```


    # An empty set

    set A := ;


    # A set of numbers

    set A := 1 2 3;


    # A set of strings

    set B := north south east west;


    # A set of mixed types

    set C :=

    0

    -1.0e+10


    ```'
  - "[PAGE 167]\n\n```\n' foo bar'\ninfinity\n\"100\"\n;\n```\n\nNote that numeric\
    \ values are automatically converted to Python integer or floating point values\
    \ when the set data specification is parsed. A quoted string can be used to define\
    \ a string value containing a numeric value. However, if the string strictly specifies\
    \ a numeric value, it will be converted by Python to a numeric type. For example,\
    \ the string “100” is included in set C, but this value is converted to a numeric\
    \ value.\n\n# 10.3.1.2 Sets of Tuple Data\n\nThe `set` data command can also specify\
    \ tuple data with the standard notation for tuples. For example, suppose set A\
    \ contains 3-tuples:\n\n```\nmodel.A = pyo.Set(dimen=3)\n```\n\nThe following\
    \ `set` data command then specifies that A is the set containing the tuples (1,2,3)\
    \ and (4,5,6):\n\n```\nset A := (1,2,3) (4,5,6) ;\n```\n\nAlternatively, set data\
    \ can simply be listed in the order that the tuple is represented:\n\n```\nset\
    \ A := 1 2 3 4 5 6 ;\n```\n\nObviously, the number of data elements specified\
    \ using this syntax should be a multiple of the set dimension.\n\nSets with 2-tuple\
    \ data can also be specified in a matrix denoting set membership. For example,\
    \ the following `set` data command declares 2-tuples in A using + to denote valid\
    \ tuples and - to denote invalid tuples:\n\n```\nset A : A1 A2 A3 A4 :=\n    1\
    \   +  -  -  +\n    2   +  -  +  -\n    3   -  +  -  - ;\n```\n\nThis data command\
    \ declares the following five 2-tuples: (‘A1’,1), (‘A1’,2), (‘A2’,3), (‘A3’,2),\
    \ (‘A4’,1).\n\nFinally, a set of tuple data can be concisely represented with\
    \ tuple *templates* that represent a *slice* of tuple data. For example, suppose\
    \ the set A contains 4-tuples:\n\n```\nmodel.A = pyo.Set(dimen=4)\n```\n\nThe\
    \ following `set` data command declares groups of tuples defined by a template\
    \ and data to complete this template:\n\n```\nset A :=\n    (1,2,*,4) A B\n  \
    \  (*,2,*,4) A B C D ;\n```"
