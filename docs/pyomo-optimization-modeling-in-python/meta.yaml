    # ## 10.3.2.1 One-dimensional Parameter Data


    One-dimensional parameter data is indexed over a single set. Suppose parameter
    B is indexed by the set A:


    ```


    model.A = pyo.Set()

    model.B = pyo.Param(model.A)


    ```


    A `param` data command can specify values for B with a list of index-value pairs:


    ```


    set A := a c e;


    param B := a 10 c 30 e 50;


    ```


    Because whitespace is ignored, this example data command file can be reorganized
    to specify the same data in a tabular format:


    ```


    set A := a c e;


    param B :=

    a 10

    c 30

    e 50

    ;


    ```


    Multiple parameters can be defined using a single `param` data command. For example,
    suppose parameters B, C, and D are one-dimensional parameters all indexed by the
    set A:


    ```


    model.A = pyo.Set()

    model.B = pyo.Param(model.A)

    model.C = pyo.Param(model.A)

    model.D = pyo.Param(model.A)


    ```


    Values for these parameters can be specified using a single `param` data command
    declaring these parameter names followed by a list of index and parameter values:


    ```


    set A := a c e;


    param : B C D :=

    a 10 -1 1.1

    c 30 -3 3.3

    e 50 -5 5.5

    ;


    ```


    The values in the `param` data command are interpreted as a list of sublists,
    where each sublist consists of an index followed by the corresponding numeric
    value.


