- md: "## 10.1.3 An Abstract Model for the Warehouse Location Problem\n\nThe warehouse\
    \ location problem (see Section 3.2) can be represented as an abstract model as\
    \ follows:\n\n```python\n# wl_abstract.py: AbstractModel version of warehouse\n\
    #     location determination problem\nimport pyomo.environ as pyo\n\nmodel = pyo.AbstractModel(name=\"\
    (WL)\")\nmodel.N = pyo.Set()\nmodel.M = pyo.Set()\nmodel.d = pyo.Param(model.N,\
    \ model.M)\nmodel.P = pyo.Param()\nmodel.x = pyo.Var(model.N, model.M, bounds=(0,\
    \ 1))\nmodel.y = pyo.Var(model.N, within=pyo.Binary)\n\ndef obj_rule(model):\n\
    \    return sum(model.d[n, m] * model.x[n, m] for n in\n        model.N for m\
    \ in model.M)\nmodel.obj = pyo.Objective(rule=obj_rule)\n\ndef one_per_cust_rule(model,\
    \ m):\n    return sum(model.x[n, m] for n in model.N) == 1\nmodel.one_per_cust\
    \ = pyo.Constraint(model.M,\n    rule=one_per_cust_rule)\n\ndef warehouse_active_rule(model,\
    \ n, m):\n    return model.x[n, m] <= model.y[n]\nmodel.warehouse_active = pyo.Constraint(model.N,\n\
    \    model.M, rule=warehouse_active_rule)\n\ndef num_warehouses_rule(model):\n\
    \    return sum(model.y[n] for n in model.N) <= model.P\nmodel.num_warehouses\
    \ = pyo.Constraint(rule=num_warehouses_rule)\n```\n\nThe sets are declared as\
    \ Pyomo Set components and the parameter data is declared as Pyomo `Param` components\
    \ with no indication as to how the data will be supplied. Pyomo is informed the\
    \ `Param` and `Var` components will be indexed by sets, but the contents of those\
    \ sets have not been declared.\n\nThe objective construction rule is defined on\
    \ as the Python function `obj_rule` and then `model.obj` is declared to be Pyomo\
    \ `Objective` component. Since this is an abstract model, the objective rule `obj_rule`\
    \ is not yet called. At this point, Pyomo knows what rule to call to construct\
    \ the objective component, but it has not called the constructor because this\
    \ is an abstract model. Constraint rules and constraint components are declared\
    \ in a similar manner.\n\nData can be expressed in several different formats.\
    \ For example, the following Pyomo data file can be used:\n\n```\n# wl_data.dat:\
    \ Pyomo format data file for the warehouse\n#     location problem\n\nset N :=\
    \ Harlingen Memphis Ashland ;\nset M := NYC LA Chicago Houston;\n\nparam d :=\n\
    \    Harlingen NYC 1956\n    Harlingen LA  1606\n    Harlingen Chicago  1410\n\
    \    Harlingen Houston  330\n    Memphis NYC  1096\n    Memphis LA  1792\n   \
    \ Memphis Chicago  531\n    Memphis Houston  567\n    Ashland NYC  485\n    Ashland\
    \ LA  2322\n    Ashland Chicago  324\n    Ashland Houston  1236\n;\n\nparam P\
    \ := 2 ;\n```\n\nThe script can be executed with the `python` command, but this\
    \ action would not actually *do* anything. This script declares the model, but\
    \ it does not define the model data or create the problem instance for the solver.\
    \ The action of applying a data file to this abstract model can be scripted explicitly\
    \ in Python code, or it can be done using the `pyomo` command. For example:\n\n\
    ```\npyomo solve --solver=glpk wl_abstract.py wl_data.dat\n```\n\nThe `--summary`\
    \ flag can be used to provide more detailed output about the solution.\n\nWhen\
    \ `pyomo` runs, it executes `wl_abstract.py` to create an `AbstractModel` with\
    \ the name `model`. This model object contains the Pyomo modeling components that\
    \ have been declared. Then `pyomo` reads the data file `wl_data.dat` and applies\
    \ this data to the `Set` and `Param` components in the same order that the components\
    \ were declared in the model. Next, the `pyomo` command constructs all of the\
    \ remaining components in declaration order: the variables, the objective, and\
    \ the constraints. After the model is constructed, `pyomo` calls the solver to\
    \ find the solution.\n\nAbstract models can be used in scripts, but a concrete\
    \ instance must be created from the `AbstractModel` object using the `create_instance`\
    \ method. The following example takes an `AbstractModel`, constructs the instance\
    \ using a data file called `wl_data.dat`, solves the instance, and prints some\
    \ results:\n\n```python\ninstance = model.create_instance('wl_data.dat')\nsolver\
    \ = pyo.SolverFactory('glpk')\nsolver.solve(instance)\ninstance.y.pprint()\n```\n\
    \nIf you don't want to write your own script, but instead want to use the `pyomo`\
    \ command, then you should not add these lines.\n\n## 10.2 The `pyomo` Command\n\
    \nThe Pyomo software distribution includes a pre-defined execution script, the\
    \ `pyomo` command, that includes a variety of subcommands supporting use of Pyomo.\
    \ The following subcommands are supported in Pyomo 6.0:\n\n- `check`: This subcommand\
    \ checks a model for errors. This is particularly useful for evaluating the logic\
    \ of rules in abstract models.\n- `convert`: This subcommand is used to convert\
    \ a Pyomo model into another format, such as an `lp` or `nl` file.\n- `help`:\
    \ Print information about the configuration and installation of Pyomo. For example,\
    \ the `-s` option provides information about available solvers:\n\n```\npyomo\
    \ help -s\n```\n\n- `run`: Execute a command from the Pyomo bin (or Scripts) directory.\
    \ For example, this provides a handy mechanism for launching Python with Pyomo\
    \ installed:\n\n```\npyomo run python\n```\n\n- `solve`: Construct and optimize\
    \ a model.\n- `test-solvers`: Execute a variety of tests to verify solver capabilities.\n\
    \nThe following sections illustrate the use of the `check`, `convert`, `help`\
    \ and `solve` subcommands, which can be customized with a variety of options.\n\
    \n### 10.2.1 The help Subcommand\n\nThe help subcommand prints information about\
    \ Pyomo’s capabilities, including information about installed plugins as well\
    \ as available solvers. The -h option prints information about the different information\
    \ available, including:\n\n- `--checkers`: This prints the model checkers that\
    \ are installed with Pyomo.\n- `--commands`, `-c`: This prints the commands installed\
    \ with Pyomo. Although much of Pyomo’s functionality can be accessed through the\
    \ pyomo command, some functionality is developed separately.\n- `--components`:\
    \ This prints the modeling components and virtual sets available in Pyomo.\n-\
    \ `--data-managers`, `-d`: This prints the data interfaces supported by the DataPortal\
    \ class. Data can also be imported through these interfaces using Pyomo data files.\n\
    - `--info`, `-i`: This prints information about the user’s PATH environment and\
    \ Python installation. This command helps diagnose issues with the execution of\
    \ Pyomo.\n- `--solvers`, `-s`: This prints information about solvers and solver\
    \ managers that can be used the optimize Pyomo models. Note that information about\
    \ NEOS solvers will be included if Pyomo can connect to the NEOS server.\n- `--transformations`,\
    \ `-t`: This prints the model transformations supported by Pyomo.\n- `--writers`,\
    \ `-w`: This prints the model writers supported by Pyomo. Specifically, this summarizes\
    \ the different file formats a Pyomo model can be converted to.\n\n```\npyomo\
    \ help --transformations\n```\n\n### 10.2.2 The solve Subcommand\n\nThe pyomo\
    \ solve subcommand automatically executes a Pyomo model as follows:\n\n1. Construct\
    \ a model.\n2. Read the instance data (if applicable).\n3. Generate a model instance\
    \ (if the model is abstract).\n4. Apply simple preprocessors to the model instance.\n\
    5. Apply a solver to the model instance.\n6. Load the results into the model instance.\n\
    7. Display the solver results.\n\nFor example, the following command solves the\
    \ warehouse location problem defined in wl_abstract.py using the LP solver glpk\
    \ using data from the file wl_data.dat:\n\n```\npyomo solve --solver=glpk wl_abstract.py\
    \ wl_data.dat\n```\n\nThe model construction step requires a Pyomo A Pyomo model\
    \ file, which is a Python file defining a Pyomo model object. Thus, the solve\
    \ subcommand can be viewed as a generic script for analyzing a model defined by\
    \ a Pyomo model file. The solve subcommand has a variety of optional command-line\
    \ arguments to customize the optimization process; documentation of the various\
    \ available options is available by specifying the --help option.\n\nHowever,\
    \ the solve subcommand can also be executed with a YAML or JSON configuration\
    \ file, which eliminates the need to specify command-line options. Consider the\
    \ following configuration file:\n\n```yaml\n# concrete1.yaml\nmodel:\n  filename:\
    \ concrete1.py\nsolvers:\n  - solver name: glpk\n```\n\nThis configuration file\
    \ can be used to configure the executions of the pyomo sub-command as follows:\n\
    \n```\npyomo solve concrete1.yaml\n```\n\nThis configuration file defines the\
    \ same logic as the first command in the previous paragraph, and the following\
    \ configuration file defines the same logic as the second command:\n\n```yaml\n\
    # abstract5.yaml\nmodel:\n  filename: abstract5.py\ndata:\n  files:\n    - abstract5.dat\n\
    solvers:\n  - solver name: glpk\n```\n\nNo command-line options are required when\
    \ using a configuration file, because all command-line options have corresponding\
    \ elements in a configuration file. Furthermore, there are configuration options\
    \ that can only be expressed in a configuration file. A template configuration\
    \ file can be generated with the --generate-config-template option."
  mdcn: "## 10.1.3 仓库选址问题的抽象模型\n\n仓库选址问题（参见第3.2节）可以表示为如下抽象模型：\n\n```python\n# wl_abstract.py:\
    \ AbstractModel version of warehouse\n#     location determination problem\nimport\
    \ pyomo.environ as pyo\n\nmodel = pyo.AbstractModel(name=\"(WL)\")\nmodel.N =\
    \ pyo.Set()\nmodel.M = pyo.Set()\nmodel.d = pyo.Param(model.N, model.M)\nmodel.P\
    \ = pyo.Param()\nmodel.x = pyo.Var(model.N, model.M, bounds=(0, 1))\nmodel.y =\
    \ pyo.Var(model.N, within=pyo.Binary)\n\ndef obj_rule(model):\n    return sum(model.d[n,\
    \ m] * model.x[n, m] for n in\n        model.N for m in model.M)\nmodel.obj =\
    \ pyo.Objective(rule=obj_rule)\n\ndef one_per_cust_rule(model, m):\n    return\
    \ sum(model.x[n, m] for n in model.N) == 1\nmodel.one_per_cust = pyo.Constraint(model.M,\n\
    \    rule=one_per_cust_rule)\n\ndef warehouse_active_rule(model, n, m):\n    return\
    \ model.x[n, m] <= model.y[n]\nmodel.warehouse_active = pyo.Constraint(model.N,\n\
    \    model.M, rule=warehouse_active_rule)\n\ndef num_warehouses_rule(model):\n\
    \    return sum(model.y[n] for n in model.N) <= model.P\nmodel.num_warehouses\
    \ = pyo.Constraint(rule=num_warehouses_rule)\n```\n\n集合被声明为Pyomo的Set组件，参数数据被声明为Pyomo的`Param`组件，但没有指明数据将如何提供。Pyomo被告知`Param`和`Var`组件将由集合索引，但这些集合的内容尚未声明。\n\
    \n目标函数构建规则定义在Python函数`obj_rule`中，然后`model.obj`被声明为Pyomo的`Objective`组件。由于这是一个抽象模型，目标规则`obj_rule`尚未被调用。此时，Pyomo知道应该调用什么规则来构建目标组件，但由于是抽象模型，它并未调用构造函数。约束规则和约束组件以类似方式声明。\n\
    \n数据可以用几种不同的格式表示。例如，可以使用以下Pyomo数据文件：\n\n```\n# wl_data.dat: Pyomo format data\
    \ file for the warehouse\n#     location problem\n\nset N := Harlingen Memphis\
    \ Ashland ;\nset M := NYC LA Chicago Houston;\n\nparam d :=\n    Harlingen NYC\
    \ 1956\n    Harlingen LA  1606\n    Harlingen Chicago  1410\n    Harlingen Houston\
    \  330\n    Memphis NYC  1096\n    Memphis LA  1792\n    Memphis Chicago  531\n\
    \    Memphis Houston  567\n    Ashland NYC  485\n    Ashland LA  2322\n    Ashland\
    \ Chicago  324\n    Ashland Houston  1236\n;\n\nparam P := 2 ;\n```\n\n脚本可以用`python`命令执行，但这实际上不会*执行*任何操作。该脚本声明了模型，但没有定义模型数据或为求解器创建问题实例。将数据文件应用到此抽象模型的操作可以在Python代码中显式脚本化，也可以使用`pyomo`命令完成。例如：\n\
    \n```\npyomo solve --solver=glpk wl_abstract.py wl_data.dat\n```\n\n可以使用`--summary`标志来提供关于解的更详细输出。\n\
    \n当`pyomo`运行时，它会执行`wl_abstract.py`来创建一个名为`model`的`AbstractModel`。此模型对象包含已声明的Pyomo建模组件。然后`pyomo`读取数据文件`wl_data.dat`，并按照模型中组件声明的相同顺序将这些数据应用于`Set`和`Param`组件。接下来，`pyomo`命令按声明顺序构建所有剩余组件：变量、目标和约束。模型构建完成后，`pyomo`调用求解器寻找解。\n\
    \n抽象模型可以在脚本中使用，但必须使用`create_instance`方法从`AbstractModel`对象创建具体实例。以下示例接受一个`AbstractModel`，使用名为`wl_data.dat`的数据文件构建实例，求解该实例，并打印一些结果：\n\
    \n```python\ninstance = model.create_instance('wl_data.dat')\nsolver = pyo.SolverFactory('glpk')\n\
    solver.solve(instance)\ninstance.y.pprint()\n```\n\n如果不想编写自己的脚本，而是想使用`pyomo`命令，则不应添加这些行。\n\
    \n## 10.2 `pyomo` 命令\n\nPyomo软件发行版包含一个预定义的执行脚本，即`pyomo`命令，它包含多种支持使用Pyomo的子命令。Pyomo\
    \ 6.0中支持以下子命令：\n\n- `check`：此子命令检查模型是否存在错误。这对于评估抽象模型中的规则逻辑特别有用。\n- `convert`：此子命令用于将Pyomo模型转换为其他格式，例如`lp`或`nl`文件。\n\
    - `help`：打印有关Pyomo配置和安装的信息。例如，`-s`选项提供有关可用求解器的信息：\n\n```\npyomo help -s\n```\n\
    \n- `run`：从Pyomo bin（或Scripts）目录执行命令。例如，这为启动安装了Pyomo的Python提供了一种便捷机制：\n\n```\n\
    pyomo run python\n```\n\n- `solve`：构建并优化模型。\n- `test-solvers`：执行各种测试以验证求解器功能。\n\
    \n以下各节说明了`check`、`convert`、`help`和`solve`子命令的使用，这些子命令可以通过多种选项进行自定义。\n\n### 10.2.1\
    \ help 子命令\n\nhelp子命令打印关于Pyomo功能的信息，包括有关已安装插件以及可用求解器的信息。-h选项打印有关可用不同信息的信息，包括：\n\
    \n- `--checkers`：打印随Pyomo一起安装的模型检查器。\n- `--commands`, `-c`：打印随Pyomo安装的命令。虽然Pyomo的许多功能可以通过pyomo命令访问，但部分功能是单独开发的。\n\
    - `--components`：打印Pyomo中可用的建模组件和虚拟集合。\n- `--data-managers`, `-d`：打印DataPortal类支持的数据接口。也可以通过这些接口使用Pyomo数据文件导入数据。\n\
    - `--info`, `-i`：打印有关用户PATH环境和Python安装的信息。此命令有助于诊断Pyomo执行时的问题。\n- `--solvers`,\
    \ `-s`：打印有关可用于优化Pyomo模型的求解器和求解器管理器的信息。注意，如果Pyomo可以连接到NEOS服务器，则会包含有关NEOS求解器的信息。\n\
    - `--transformations`, `-t`：打印Pyomo支持的模型转换。\n- `--writers`, `-w`：打印Pyomo支持的模型写入器。具体来说，这总结了Pyomo模型可以转换为的不同文件格式。\n\
    \n```\npyomo help --transformations\n```\n\n### 10.2.2 solve 子命令\n\n`pyomo solve`子命令会自动执行一个Pyomo模型，过程如下：\n\
    \n1.  构建一个模型。\n2.  读取实例数据（如果适用）。\n3.  生成模型实例（如果模型是抽象的）。\n4.  对模型实例应用简单的预处理器。\n\
    5.  对模型实例应用求解器。\n6.  将结果加载到模型实例中。\n7.  显示求解器结果。\n\n例如，以下命令使用LP求解器glpk，从文件`wl_data.dat`读取数据，求解在`wl_abstract.py`中定义的仓库选址问题：\n\
    \n```\npyomo solve --solver=glpk wl_abstract.py wl_data.dat\n```\n\n模型构建步骤需要一个Pyomo模型文件，即一个定义Pyomo模型对象的Python文件。因此，`solve`子命令可以被视为一个通用脚本，用于分析由Pyomo模型文件定义的模型。`solve`子命令有多种可选的命令行参数来自定义优化过程；可通过指定`--help`选项获取各种可用选项的文档。\n\
