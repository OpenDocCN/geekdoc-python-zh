    # 4.8 Named Expressions


    Pyomo expressions are mathematical statements containing numbers, parameters,
    and variables combined using operators such as +,-,*,/ for example. These expressions
    form the basis of the algebraic representation of a model, and are stored inside
    constraint and objective components on the model.


    The `Expression` component provides a mechanism for storing a Pyomo expression
    on a model making the expression reusable in multiple contexts, such as a common
    sub-expression in one or more constraints, without the overhead of regenerating
    the expression each time. In addition, the Pyomo expression stored by the `Expression`
    component can be changed at a later time, thereby updating any constraint or objective
    expressions referencing it. This provides a powerful approach for modifying a
    model between calls to a solver.


    The following sections describe the syntax for declaring and working with named
    expressions.


    # 4.8.1 Expression Declarations


    The following code creates a single, non-indexed `Expression` object:


    ```

    model.e = pyo.Expression()

    ```


    Named and un-named arguments are supported, and Table 4.7 provides a list of the
    common arguments that can be passed when declaring the `Expression` component.'
  - "[PAGE 73]\n\nThe `expr` or `rule` keywords can be used to initialize a named\
    \ expression when it is declared, as shown in the following example:\n\n```\n\
    model.x = pyo.Var()\nmodel.e1 = pyo.Expression(expr=model.x + 1)\ndef e2_rule(model):\n\
    \    return model.x + 2\nmodel.e2 = pyo.Expression(rule=e2_rule)\n```\n\n| keyword\
    \ | description | acceptable values |\n| :--- | :--- | :--- |\n| <un-named> |\
    \ reserved for specifying index sets | any number of Pyomo Set objects or Python\
    \ lists |\n| expr | provides the expression to store | any valid Pyomo expression\
    \ |\n| rule | provides the rule function that will be called to provide the expression\
    \ to store | a function that returns a Pyomo expression or Expression.Skip |\n\
    \nTable 4.7: Common declaration arguments for the `Expression` component\n\nAs\
    \ with the other core modeling components, the `Expression` component can be indexed\
    \ by declaring it with one or more unnamed arguments representing indexing sets.\
    \ The following example declares an indexed `Expression` component over all members\
    \ of the index set except for the first. Indices that should be left out of the\
    \ indexed `Expression` component are signified by returning the `Expression.Skip`\
    \ attribute from the rule function.\n\n```\nN = [1,2,3]\nmodel.x = pyo.Var(N)\n\
    def e_rule(model, i):\n    if i == 1:\n        return pyo.Expression.Skip\n  \
    \  else:\n        return model.x[i]**2\nmodel.e = pyo.Expression(N, rule=e_rule)\n\
    ```\n\n# 4.8.2 Working with Expression Objects\n\nA simple use for the `Expression`\
    \ component declares a single expression and uses it inside an objective and a\
    \ constraint declaration:\n\n```\nmodel.x = pyo.Var()\nmodel.e = pyo.Expression(expr=(model.x\
    \ - 1.0)**2)\nmodel.o = pyo.Objective(expr=0.1*model.e + model.x)\nmodel.c = pyo.Constraint(expr=model.e\
    \ <= 1.0)\n```"
  - '[PAGE 74]


    The value of the named expression can be computed using the `value` function.
    Additionally, the expression stored in the named Expression component can be updated.
    As the following example shows, updating the named expression has the effect of
    updating the objective and constraint expressions where it is used:


    ```

    model.x.set_value(2.0)

    print(pyo.value(model.e))  # 1.0

    print(pyo.value(model.o))  # 2.1

    print(pyo.value(model.c.body))  # 1.0


    model.e.set_value((model.x - 2.0)**2)

    print(pyo.value(model.e))  # 0.0

    print(pyo.value(model.o))  # 2.0

    print(pyo.value(model.c.body))  # 0.0

    ```


    The Expression component does not require an expression when it is declared on
    a model, but it must be assigned one before the model is solved if the named expression
    is used in any active objectives or constraints. Furthermore, named expressions
    that are used in objectives or constraints should not store relational Pyomo expressions,
    that is, expressions using one or more of the operators <=, <, >=, >, and ==.


    # ## 4.9 Suffix Components


    Suffixes provide a mechanism for annotating a model with auxiliary data not strictly
    related to the model declaration and structure. Suffixes are commonly used by
    solver plugins to store extra information about the solution of a model. More
    generally, suffixes can be used to


    +   - import information from a solver about the solution to a mathematical program
    (e.g., constraint duals, variable reduced costs, basis information),

    - export information to a solver or algorithm to configure the solution process
    (e.g., warm-starting information, variable branching priorities), and

    - tag model components with local data for later use in advanced scripting algorithms.


    This functionality is made available to the modeler through the `Suffix` component
    class, providing an interface for annotating Pyomo modeling components with additional
    data.


    # ### 4.9.1 Suffix Declarations


    The following code creates a suffix labeled `foo`:


    ```

    model.foo = pyo.Suffix()

    ```'
- md: "Named arguments are supported, and Table 4.8 provides a list of the common\
    \ arguments that can be passed when declaring the Suffix component.\n\n| keyword\
    \ | description | acceptable values |\n|---------|-------------|-------------------|\n\
    | direction | specifies if a suffix is an input to or an output from a solver\
    \ | Suffix.LOCAL, Suffix.IMPORT, Suffix.EXPORT, Suffix.IMPORT_EXPORT (more details\
    \ given below) |\n| datatype | specifies the particular type of data being stored\
    \ in the suffix | Suffix.FLOAT, Suffix.INT, None (more details given below) |\n\
    | initialize | provides initial values for the suffix | a rule function |\n\n\
    Table 4.8: Common declaration arguments for the Suffix component\n\nThe Suffix\
    \ component is not an indexed component, and hence it cannot be declared with\
    \ unnamed positional arguments. The `direction` keyword argument is used to specify\
    \ the information flow for a suffix when interfacing with a solver. This argument\
    \ can be one of four possible values:\n\n- Suffix.LOCAL: Suffix data is local\
    \ to the model. It is not imported or exported by solver plugins and is the default.\n\
    - Suffix.IMPORT: Suffix data will be imported from solvers to the model by solver\
    \ plugins.\n- Suffix.EXPORT: Suffix data will be exported from the model to the\
    \ solver by the plugins.\n- Suffix.IMPORT_EXPORT: Suffix data is both imported\
    \ and exported by solver plugins.\n\nNot all solver plugins are guaranteed to\
    \ manage suffix information flow, but the user controls this information flow\
    \ by configuring suffix components.\n\nThe `datatype` keyword argument specifies\
    \ the type of data held in the suffix. This argument can be one of three possible\
    \ values:\n\n- Suffix.FLOAT: floating point data (default).\n- Suffix.INT: integer\
    \ data.\n- None: any type of data.\n\nThis argument might be optional for some\
    \ solver interfaces; however, exporting suffix data with solvers using the `nl`\
    \ file interface requires all active export suffixes have a strict datatype (i.e.,\
    \ the `datatype` keyword cannot be `None`).\n\nThe following example illustrates\
    \ various suffix declarations:\n\n```python\n# Export integer data\nmodel.priority\
    \ = pyo.Suffix(direction=pyo.Suffix.EXPORT,\n                           datatype=pyo.Suffix.INT)\n\
    ```\n\n```python\n# Export and import floating point data\nmodel.dual = pyo.Suffix(direction=pyo.Suffix.IMPORT_EXPORT)\n\
    ```\n\nSuffixes are not guaranteed to be compatible with all solver plugins in\
    \ Pyomo. Whether a given suffix is acceptable or not depends on both the solver\
    \ and solver interface being used. In some cases, a solver plugin will raise an\
    \ exception if it encounters a suffix type that it does not handle, but this is\
    \ not true in every situation. For example, the nl file interface is generic to\
    \ all AMPL-compatible solvers, so there is no way for Pyomo to validate that a\
    \ suffix of a given name, direction, and datatype is appropriate for a solver.\
    \ One should be careful in verifying that suffix declarations are being handled\
    \ as expected when switching to a different solver or solver interface.\n\nThe\
    \ `initialize` keyword argument can be used to define suffix values. This argument\
    \ specifies a function that is executed when the model is constructed. This function\
    \ returns a list or iterable of (component, value) tuples.\n\n```python\nmodel\
    \ = pyo.AbstractModel()\nmodel.x = pyo.Var()\nmodel.c = pyo.Constraint(expr=model.x\
    \ >= 1)\n\ndef foo_rule(m):\n    return ((m.x, 2.0), (m.c, 3.0))\nmodel.foo =\
    \ pyo.Suffix(initialize=foo_rule)\n```\n\n## 4.9.2 Working with Suffixes\n\nConsider\
    \ the following example:\n\n```python\nmodel = pyo.ConcreteModel()\nmodel.x =\
    \ pyo.Var()\nmodel.y = pyo.Var([1,2,3])\nmodel.foo = pyo.Suffix()\n```\n\nThis\
    \ example includes two variable components, indexed and non-indexed, along with\
    \ a suffix component. Conceptually, the declaration of the suffix `foo` allows\
    \ the association of `foo` with each component in the model. For example:\n\n\
    ```python\n# Assign the value 1.0 to suffix 'foo' for model.x\nmodel.x.set_suffix_value('foo',\
    \ 1.0)\n\n# Assign the value 2.0 to suffix model.foo for model.x\nmodel.x.set_suffix_value(model.foo,\
    \ 2.0)\n\n# Get the value of suffix 'foo' for model.x\nprint(model.x.get_suffix_value('foo'))\
    \ # 2.0\n```\n\nSuffix values can be assigned with `set_suffix_value` and they\
    \ can be accessed with `get_suffix_value`. This example illustrates two ways of\
    \ specifying the same suffix: with a name and with a suffix component object.\n\
    \nSuffix values for indexed components can also be assigned with set_suffix_value:\n\
    \n```python\n# Assign the value 3.0 to suffix model.foo for model.y\nmodel.y.set_suffix_value(model.foo,\
    \ 3.0)\n\n# Assign the value 4.0 to suffix model.foo for model.y[2]\nmodel.y[2].set_suffix_value(model.foo,\
    \ 4.0)\n\n# Get the value of suffix 'foo' for model.y\nprint(model.y.get_suffix_value(model.foo))\
    \ # None\nprint(model.y[1].get_suffix_value(model.foo)) # 3.0\nprint(model.y[2].get_suffix_value(model.foo))\
    \ # 4.0\nprint(model.y[3].get_suffix_value(model.foo)) # 3.0\n```\n\nThis example\
    \ illustrates how set_suffix_value is used to set the value for an indexed component\
    \ and a single component data object. When set_suffix_value is called for an indexed\
    \ component, by default it sets suffix values for all elements or indices of the\
    \ component, rather than the component itself. Because of this, when we try to\
    \ retrieve the suffix value for the model.y component, we find that it is None.\n\
    \nSuffix values can also be cleared, which is equivalent to setting the value\
    \ None:\n\n```python\nmodel.y[3].clear_suffix_value(model.foo)\n\nprint(model.y.get_suffix_value(model.foo))\
    \ # None\nprint(model.y[1].get_suffix_value(model.foo)) # 3.0\nprint(model.y[2].get_suffix_value(model.foo))\
    \ # 4.0\nprint(model.y[3].get_suffix_value(model.foo)) # None\n```\n\n## 4.10\
    \ Other Modeling Components\n\nThis chapter presented details for some of the\
    \ most common modeling components supported by Pyomo. There are other modeling\
    \ components that were not thoroughly discussed in this chapter. These include:\n\
    \n- Block: The Block component provides a mechanism to declare models with repeated\
    \ or nested structure (e.g., separate Block objects may exist on a model to represent\
    \ different time points in a multi-period optimization). A Block consists of a\
    \ collection of Pyomo modeling components. More discussion of blocks is provided\
    \ in Chapter 8.\n- Model: The Model component provides a container for grouping\
    \ Pyomo modeling components to form the definition of an optimization problem.\
    \ Pyomo supports both abstract and concrete modeling representations. While \"\
    model\" objects were widely used in this book (they are required to formulate\
    \ and solve an optimization problem in Pyomo), we have not discussed the fact\
    \ that they are components themselves. In fact, they inherit from the Block component.\n\
    - Complementarity: This component is used to define complementarity conditions\
    \ in a mathematical program with equilibrium constraints (MPEC). Several forms\
    \ of the complementarity conditions are supported. This component is documented\
    \ further in Chapter 13.\n- ContinuousSet: This component is used to represent\
    \ bounded continuous domains in the context of modeling differential equations.\
    \ This component is documented further in Chapter 12.\n- DerivativeVar: This component\
    \ is used to represent derivatives of Var components in the context of modeling\
    \ differential equations. This component is documented further in Chapter 12.\n\
    - Disjunct: This component supports the Generalized Disjunctive Programming (GDP)\
    \ capability within Pyomo. A Disjunct component is a container for an indicator\
    \ variable and a set of constraints that should be active when that indicator\
    \ variable is True. This component is documented further in Chapter 11.\n- Disjunction:\
    \ This component supports the Generalized Disjunctive Programming (GDP) capability\
    \ within Pyomo. A Disjunction component contains a set of Disjunct objects connected\
    \ by a logical \"OR\" operator. This component is documented further in Chapter\
    \ 11.\n- Piecewise: This component supports piecewise modeling of general functions.\
    \ It supports several different transformations to produce mixed-integer representations\
    \ for the piecewise functions. Additional documentation for this component can\
    \ be found at the Pyomo website.\n- SOSConstraint: Special ordered sets (SOS)\
    \ can be defined in Pyomo through the SOSConstraint component. Pyomo supports\
    \ special ordered sets of type 1 and 2 (SOS1 and SOS2). Additional documentation\
    \ for this component can be found at the Pyomo website.\n- BuildAction and BuildCheck:\
    \ These components are used mainly in abstract models and are described in Section\
    \ 10.4."
