  md: '# 7.4.2 Optimal Quotas for Sustainable Harvesting of Deer


    Maintaining a healthy deer population relies on both the management of effective
    habitats and a sustainable harvesting policy. Among most hunters there is high
    demand for tags that allow them to take bucks. However, harvesting too many bucks
    within a population can limit future population growth. We consider a nonlinear
    programming formulation that determines an optimal policy for deer harvesting
    by maximizing the value of the harvest while maintaining a strong and sustainable
    deer population.


    Consider a model adapted from Bailey [5] describing the dynamics of the deer population.
    The deer population in a given area can be divided into three sub-populations:
    bucks, does, and fawns. Additionally, each year is divided into four periods:
    winter, breeding season, summer, and harvest. The model describing the population
    dynamics is based on the following assumptions:


    +   - It is assumed the sub-populations can be represented by continuous variables
    (i.e., population numbers are large enough to make this a good approximation).

    - Each season, there is a reduction in the number of bucks, does, and fawns. This
    reduction is assumed to be due to natural causes and is proportional to the size
    of the sub-populations. This reduction is captured by specifying a fractional
    survival rate depending on the period (winter, breeding, summer, harvest) and
    the sub-population in question (bucks, does, fawns).

    - New fawns are born each year during the breeding season. Fawns are born from
    does and older fawns according to a birth rate depending on the available amount
    of food. Half of them are assumed to be male and half are assumed to be female.
    After surviving one year, half of the remaining fawns become bucks and half become
    does.

    - The total yearly food supply is constant and represents a constraint based on
    habitat management.

    - All harvesting is based on hunting. Hunting quotas can be set for each sub-population,
    and these quotas are assumed to be completely filled (i.e., all hunters are successful).


    The complete derivation of the sub-population model is given in [5], resulting
    in the following set of difference equations,


    ```

    f_{y+1} = p_1 b r_y \left( \frac{p_2}{10} f_y + p_3 d_y \right) - h_y^f \quad
    (7.1)

    d_{y+1} = p_4 d_y + \frac{p_5}{2} f_y - h_y^d \quad (7.2)

    b_{y+1} = p_6 b_y + \frac{p_5}{2} f_y - h_y^b \quad (7.3)

    b r_y = 1.1 + 0.8 \frac{p_s - c_y}{p_s} \quad (7.4)

    c_y = p_7 b_y + p_8 d_y + p_9 f_y \quad (7.5)

    ```'
