    \ that will be called to access the expression that defines the objective function\
    \ | a function that returns a Pyomo expression or Objective.Skip |\n| sense |\
    \ determines if the objective is to be minimized or maximized (default is to minimize)\
    \ | minimize or maximize |\n\nThe expr keyword can be used to specify the actual\
    \ expression for the objective. One can also use the rule keyword to specify a\
    \ rule (a Python function) that returns an expression. A rule provides control\
    \ over how the objective is formed. Both options are illustrated here:\n\n```\n\
    python\nmodel.x = pyo.Var([1,2], initialize=1.0)\n\nmodel.b = pyo.Objective(expr=model.x[1]\
    \ + 2*model.x[2])\n\ndef m_rule(model):\n    expr = model.x[1]\n    expr += 2*model.x[2]\n\
    \    return expr\nmodel.c = pyo.Objective(rule=m_rule)\n\n```"
  - "[PAGE 58]\n\n# 4.4 Objectives\n\nSome solvers can perform multi-objective optimization\
    \ with two or more objectives. Multiple objectives can be declared individually\
