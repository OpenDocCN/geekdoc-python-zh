    \ 图着色示例\n\n我们通过一个简单且知名的优化问题——最小图着色（也称为顶点着色）——进一步说明 Pyomo 的建模能力。图着色问题关注将颜色分配给图的顶点，使得没有两个相邻的顶点共享相同的颜色。图着色有许多实际应用，包括编译器中的寄存器分配、资源调度和模式匹配，它也是数独等娱乐性谜题的核心。\n\
