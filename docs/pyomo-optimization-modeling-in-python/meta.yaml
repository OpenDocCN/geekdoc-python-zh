    - --data-managers, -d: This prints the data interfaces supported by the DataPortal
    class. Data can also be imported through these interfaces using Pyomo data files.

    - --info, -i: This prints information about the user’s PATH environment and Python
    installation. This command helps diagnose issues with the execution of Pyomo.

    - --solvers, -s: This prints information about solvers and solver managers that
    can be used the optimize Pyomo models. Note that information about NEOS solvers
    will be included if Pyomo can connect to the NEOS server.

    - --transformations, -t: This prints the model transformations supported by Pyomo.

    - --writers, -w: This prints the model writers supported by Pyomo. Specifically,
    this summarizes the different file formats a Pyomo model can be converted to.


    ```


    pyomo help --transformations


    ```


    # # 10.2.2 The solve Subcommand


    The pyomo solve subcommand automatically executes a Pyomo model as follows:


    +   1. Construct a model.

    2. Read the instance data (if applicable).

    3. Generate a model instance (if the model is abstract).

    4. Apply simple preprocessors to the model instance.

    5. Apply a solver to the model instance.'
