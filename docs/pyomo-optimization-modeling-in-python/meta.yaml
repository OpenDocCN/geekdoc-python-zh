    \ | 在优化之后执行后处理步骤 |\n\n表 10.2：可以在 Pyomo 模型文件中使用以自定义 `pyomo solve` 子命令工作流的回调函数。\n\
    \n表 10.2 总结了 `pyomo` 命令的回调函数及其支持的功能。每个回调函数都接受一个或多个 `keyword=value` 形式的关键字参数。例如，`pyomo_print_results`\
    \ 回调函数接受三个参数：`options`、`instance` 和 `results`。\n\n```python\ndef pyomo_print_results(options=None,\
    \ instance=None,\n                       results=None):\n    print(results)\n\
    ```\n\n表 10.2 中描述的回调函数有几个标准参数。`options` 参数是一个增强的 Python 字典，包含发送给 `solve` 子命令的命令行选项。`model`\
    \ 参数是 Pyomo 模型对象，而 `instance` 参数是由该模型构建的模型实例。如果用户使用 `ConcreteModel` 定义模型，则 `model`\
    \ 和 `instance` 参数是同一个对象。其他参数在它们关联的回调函数中描述。\n\n## pyomo_preprocess\n\n此回调函数在模型构建之前执行以执行预处理步骤。此函数有一个参数：`options`。例如，以下回调函数只是打印命令行选项：\n\
    \n```python\ndef pyomo_preprocess(options=None):\n    print(\"Here are the options\
    \ that were provided:\")\n    if options is not None:\n        options.display()\n\
    ```\n\n## pyomo_create_model\n\n此回调函数用于构建模型。此函数有两个参数：`options` 和 `model_options`。后一个参数包含构建模型的选项，这些选项通过\
    \ `--model-options` 命令行选项指定。此函数的返回值必须是创建的模型对象，可以是抽象模型或具体模型。例如，以下回调函数通过导入 `abstract6.py`\
    \ 文件然后返回 `Model` 对象来创建模型：\n\n```python\ndef pyomo_create_model(options=None, model_options=None):\n\
    \    sys.path.append(abspath(dirname(__file__)))\n    abstract6 = __import__('abstract6')\n\
    \    sys.path.remove(abspath(dirname(__file__)))\n    return abstract6.Model\n\
    ```\n\n## pyomo_create_modeldata\n\n此回调函数创建用于构建模型实例的模型数据对象。模型数据对象在需要为模型构建指定一组不同数据源的场景中非常有用。此函数有两个参数：`options`\
    \ 和 `model`。返回值必须是一个 `DataPortal` 对象。例如，以下回调函数从文件 `abstract6.dat` 创建一个 `DataPortal`\
    \ 对象：\n\n```python\ndef pyomo_create_dataportal(options=None, model=None):\n \
    \   data = pyo.DataPortal(model=model)\n    data.load(filename='abstract6.dat')\n\
    \    return data\n```\n\n## pyomo_print_model\n\n此回调函数在创建模型实例之前打印一个抽象模型。此函数有两个参数：`options`\
    \ 和 `model`。以下示例调用 `pprint` 方法打印抽象模型的详细信息：\n\n```python\ndef pyomo_print_model(options=None,\
    \ model=None):\n    if options['runtime']['logging']:\n        model.pprint()\n\
    ```\n\n## pyomo_modify_instance\n\n此回调函数在模型实例构建后对其进行修改。此函数有三个参数：`options`、`model`\
    \ 和 `instance`。以下回调函数在模型构建后固定了一个变量：\n\n```python\ndef pyomo_modify_instance(options=None,\
    \ model=None,\n                         instance=None):\n    instance.x[1].value\
    \ = 0.0\n    instance.x[1].fixed = True\n```\n\n## pyomo_print_instance\n\n此回调函数打印\
    \ Pyomo 模型实例。此函数用于打印具体模型实例，而不是抽象模型。此函数有两个参数：`options` 和 `instance`。以下示例调用 `pprint`\
    \ 方法打印模型实例的详细信息：\n\n```python\ndef pyomo_print_instance(options=None, instance=None):\n\
    \    if options['runtime']['logging']:\n        instance.pprint()\n```\n\n## pyomo_save_instance\n\
    \n此回调函数保存 Pyomo 模型实例。此函数有两个参数：`options` 和 `instance`。请注意，Pyomo 并未指定模型如何保存。然而，一个方便的机制是使用\
    \ Python 的 `pickle` 机制：\n\n```python\ndef pyomo_save_instance(options=None, instance=None):\n\
    \    OUTPUT = open('abstract7.pyomo','w')\n    OUTPUT.write(str(pickle.dumps(instance)))\n\
    \    OUTPUT.close()\n```\n\n## pyomo_print_results\n\n此回调函数打印优化生成的结果。此函数有三个参数：`options`、`instance`\
    \ 和 `results`。`results` 对象支持以 JSON 或 YAML 格式提供优化解、求解器统计等的通用摘要。因此，此回调函数可以简单地打印这些数据：\n\
    \n```python\ndef pyomo_print_results(options=None, instance=None,\n          \
    \             results=None):\n    print(results)\n```\n\n但是，`solve` 子命令包含 `--print-results`\
    \ 选项，该选项执行此操作。更一般地说，包含此回调函数是为了允许用户提供其优化结果的问题特定摘要。\n\n## pyomo_save_results\n\n\
    此回调函数用于保存优化生成的结果。此函数有三个参数：`options`、`instance` 和 `results`。此回调函数可以简单地将结果打印到文件：\n\
    \n```python\ndef pyomo_save_results(options=None, instance=None,\n           \
    \            results=None):\n    OUTPUT = open('abstract7.results','w')\n    OUTPUT.write(str(results))\n\
    \    OUTPUT.close()\n```\n\n`solve` 子命令包含 `--save-results` 选项，该选项执行此操作。更一般地说，包含此回调函数是为了允许用户保存其优化结果的问题特定摘要。\n\
    \n## pyomo_postprocess\n\n此回调函数在优化之后执行以执行后处理步骤。此函数有三个参数：`options`、`instance` 和\
    \ `results`。例如，以下函数打印优化结果的简单摘要：\n\n```python\ndef pyomo_postprocess(options=None,\
    \ instance=None,\n                      results=None):\n    instance.solutions.load_from(results,\
    \ \\\n                               allow_consistent_values_for_fixed_vars=True)\n\
    \    print(\"Solution value \"+str(pyo.value(instance.obj)))\n```\n\n## 10.2.2.4\
    \ 自定义求解器行为\n\n`solve` 子命令支持的通用工作流包括执行求解器来优化（或以其他方式分析）模型。使用各种命令行选项来控制求解器行为。`--solver`\
    \ 选项用于指定要构建的求解器的名称。此选项可以指定两类求解器：用户路径上命令行可执行文件的名称，以及预定义的求解器接口。\n\n命令行可执行文件被假定使用\
    \ NL 文件执行 I/O。因此，可以使用使用 AMPL 求解器库构建的任何求解器可执行文件进行优化。\n\n可以使用 `--solver-options`\
    \ 选项以通用方式指定求解器选项。这指定一个字符串，被解释为一个或多个选项-值对。例如，以下选项将 `mipgap` 选项传递给 glpk 求解器：\n\n\
    ```bash\npyomo solve --solver=glpk --solver-options='mipgap=0.01' \\\nconcrete1.py\n\
    ```"
