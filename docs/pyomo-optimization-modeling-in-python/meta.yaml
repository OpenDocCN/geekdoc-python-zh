    ## 2.4 Linear and Nonlinear Optimization Models\n\n### 2.4.1 Definition\n\nAn\
    \ expression in an optimization model is said to be linear if it is composed only\
    \ of sums of decision variables and/or decision variables multiplied by data.\
    \ Accordingly, a linear expression is a non-constant, linear function of the decision\
    \ variables. Assume $x$ is a variable vector, $c$ is a vector of data and are\
    \ indexed by $\\mathcal{A}$. Further assume 2 and 3 are members of $\\mathcal{A}$.\
    \ The following are linear expressions:\n\n$\\sum_{i \\in \\mathcal{A}} c_i x_i$\n\
    $\\sum_{i \\in \\mathcal{A}} x_i$\n$x_2$\n$c_3 x_2 + c_2 x_3$\n$c_3 x_2 + c_2\
    \ x_3 + 4$\n\nOn the other hand, the following expressions are not linear: $x_i^2$,\
    \ $x_2 x_3$ and $\\cosine(x_2)$.\n\nLinear expressions often result in problems\
    \ that can be solved with much less computational effort than similar models with\
    \ nonlinear expressions. Consequently, many modelers make an effort to use linear\
    \ expressions as much as possible, and some modelers strive to use only linear\
    \ expressions. Additionally, many modelers develop linear approximations to nonlinear\
    \ models in hopes of finding \"good enough\" solutions to the original nonlinear\
