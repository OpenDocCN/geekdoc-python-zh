    \ Pyomo 模型上的所有组件并遍历它们。此方法也适用于具有 `Block` 组件的层次模型。要深入了解这些方法，请查阅在线文档。\n\n## 5.3 修改\
    \ Pyomo 模型结构\n\n一个常见的用例是需要使用不同的参数值或对约束进行最小更改来重复求解模型。可变参数可用于高效地求解具有不同参数值的模型。第 3.3.5\
    \ 节展示了使用可变 `Param P` 的示例。\n\n在 Pyomo 中，可以在求解之间修改模型的结构。例如：\n\n-   目标和约束可以在不更改模型中存储的数据的情况下被激活和停用。当\
    \ Pyomo 模型发送给求解器时，停用的组件将被排除。\n-   变量可以被视为固定或未固定（默认）。\n-   Pyomo 还允许添加和删除建模组件。例如，可以从模型中添加或删除约束。\n\
    \n以下示例说明了使用这些方法修改模型结构：\n\n```\nimport pyomo.environ as pyo\n\nmodel = pyo.ConcreteModel()\n\
    model.x = pyo.Var(bounds=(0,5))\nmodel.y = pyo.Var(bounds=(0,1))\nmodel.con =\
    \ pyo.Constraint(expr=model.x + model.y == 1.0)\nmodel.obj = pyo.Objective(expr=model.y-model.x)\n\
    \n# 求解问题\nsolver = pyo.SolverFactory('glpk')\nsolver.solve(model)\nprint(pyo.value(model.x))\
    \  # 1.0\nprint(pyo.value(model.y))  # 0.0\n\n# 添加约束\nmodel.con2 = pyo.Constraint(expr=4.0*model.x\
    \ + model.y == 2.0)\nsolver.solve(model)\nprint(pyo.value(model.x)) # 0.33\nprint(pyo.value(model.y))\
    \ # 0.66\n\n# 停用约束\nmodel.con.deactivate()\nsolver.solve(model)\nprint(pyo.value(model.x))\
    \ # 0.5\nprint(pyo.value(model.y)) # 0.0\n\n# 重新激活约束\nmodel.con.activate()\nsolver.solve(model)\n\
    print(pyo.value(model.x)) # 0.33\nprint(pyo.value(model.y)) # 0.66\n\n# 删除约束\n\
    del model.con2\nsolver.solve(model)\nprint(pyo.value(model.x)) # 1.0\nprint(pyo.value(model.y))\
    \ # 0.0\n\n# 固定变量\nmodel.x.fix(0.5)\nsolver.solve(model)\nprint(pyo.value(model.x))\
    \ # 0.5\nprint(pyo.value(model.y)) # 0.5\n\n# 解除固定变量\nmodel.x.unfix()\nsolver.solve(model)\n\
    print(pyo.value(model.x)) # 1.0\nprint(pyo.value(model.y)) # 0.0\n```\n\n## 5.4\
    \ 常见脚本任务示例\n\n在本节中，我们将展示几个脚本示例，以说明前面展示的功能。更多示例可在 Pyomo Gallery（参见 [www.pyomo.org](http://www.pyomo.org)）中找到。\n\
    \n### 5.4.1 仓库选址循环与绘图\n\n以下示例构建了仓库选址问题并重复求解以找到所有可能的解。每次找到一个解后，都会添加一个新的割（cut）来排除该解，然后再次求解问题以找到下一个解。此过程重复进行，直到问题不可行，无法再找到更多解。`ConstraintList`\
    \ 组件用于包含割列表；每次循环都会向此组件添加一个新的割。\n\n```\nimport json\nimport pyomo.environ as pyo\n\
    from warehouse_model import create_wl_model\nimport matplotlib.pyplot as plt\n\
    \n# 从 json 文件加载数据\nwith open('warehouse_data.json', 'r') as fd:\n    data = json.load(fd)\n\
    \n# 调用函数创建模型\nmodel = create_wl_model(data, P=2)\nmodel.integer_cuts = pyo.ConstraintList()\n\
    objective_values = list()\ndone = False\nwhile not done:\n    # 求解模型\n    solver\
    \ = pyo.SolverFactory('glpk')\n    results = solver.solve(model)\n\n    term_cond\
    \ = results.solver.termination_condition\n    print('')\n    print('--- 求解器状态:\
    \ {0} ---'.format(term_cond))\n\n    if pyo.check_optimal_termination(results):\n\
    \        # 查看解\n        print('最优目标值 = {0}'.format(pyo.value(model.obj)))\n  \
    \      objective_values.append(pyo.value(model.obj))\n        model.y.pprint()\n\
    \n        # 创建新的整数割以排除此解\n        WH_True = [i for i in model.WH if pyo.value(model.y[i])\
    \ > 0.5]\n        WH_False = [i for i in model.WH if pyo.value(model.y[i]) < 0.5]\n\
    \        model.integer_cuts.add(\n            sum(model.y[i] for i in WH_True)\n\
    \            - sum(model.y[i] for i in WH_False)\n            <= len(WH_True)-1)\n\
    \    else:\n        done = True\n\nx = range(1, len(objective_values)+1)\nplt.bar(x,\
    \ objective_values, align='center')\nplt.gca().set_xticks(x)\nplt.xlabel('解编号')\n\
    plt.ylabel('最优目标值')\nplt.savefig('WarehouseCuts.pdf')\n```\n\n此示例生成控制台输出，显示遇到的每个解。它还使用\
    \ `matplotlib` 包生成图 5.1，显示每个获得的解的最优目标函数值。\n\n![](img/ebd5113b8e992ca06e2e931a59f910c7_88_0.png)\n\
    \n图 5.1：从仓库选址问题获得的一系列解的最优目标值。\n\n### 5.4.2 数独求解器\n\n在本节中，我们进一步说明了使用 Pyomo 在 Python\
