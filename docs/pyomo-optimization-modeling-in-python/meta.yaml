    # 10.2.3 The convert Subcommand


    Many optimizers supported by Pyomo read a a temporary file Pyomo generates in
    a standard problem format. For example, the NL format is recognized by solvers
    used with the AMPL modeling tool, and the LP file format is used by a variety
    of commercial and open source integer programming solvers.

