    \ [29].\n\nSince MPEC problems frequently arise in practice, many algebraic modeling\
    \ languages (AML) have integrated capabilities for expressing complementarity\
    \ conditions [43], including AMLs like AIMMS [1], AMPL [2, 21], GAMS [22], MATLAB\
    \ [42] and YALMIP [39]. In this chapter, we describe methods for expressing and\
    \ optimizing MPEC models. MPEC models can be easily expressed with Pyomo modeling\
    \ components for complementarity conditions. Further, Pyomo’s object-oriented\
    \ design naturally supports the ability to automate the reformulation of MPEC\
    \ models into other forms (e.g., disjunctive programs). We describe Pyomo meta-solvers\
    \ that transform MPECs as MIP or NLP problems, which are then optimized with standard\
    \ solvers. Further, we describe interfaces to specialized mixed complementarity\
    \ problem solvers, which solve MPEC problems expressed without an optimization\
    \ objective.\n\n## 13.2 Modeling Equilibrium Conditions\n\n### 13.2.1 Complementarity\
    \ Conditions\n\nFerris et al. [16] note that there are a few fundamental forms\
    \ accounting for a wide range of complementarity conditions that arise in practice.\
    \ Consider a variable $x$ and function $g(x)$. The classical form of complementarity\
    \ condition can be expressed as\n\n$$x \\geq 0 \\perp g(x) \\geq 0,$$\n\nwhich\
    \ expresses the complementarity restriction that at least one of these must hold\
    \ with equality. When the variable $x$ is bounded such that $x \\in [l, u]$, then\
    \ a *mixed complementarity condition* can be expressed as\n\n$$l \\leq x \\leq\
    \ u \\perp g(x),$$\n\nwhich expresses the complementarity restriction that at\
    \ least one of the following must hold:\n\n$$\\begin{aligned} x = l \\quad &\\\
    text{and } g(x) \\geq 0, \\\\ x = u \\quad &\\text{and } g(x) \\leq 0, \\\\ \\\
    text{or } l < x < u \\text{ and } g(x) = 0. \\end{aligned}$$\n\nThese forms can\
    \ be generalized by substituting a function $f(x)$ for the variable $x$. Thus,\
    \ a *generalized mixed complementarity condition* can be expressed as\n\n$$l \\\
    leq f(x) \\leq u \\perp g(x),$$\n\nwhich expresses the complementarity restriction\
    \ that at least one of the following must hold:\n\n$$\\begin{aligned} f(x) = l\
    \ \\quad &\\text{and } g(x) \\geq 0, \\\\ f(x) = u \\quad &\\text{and } g(x) \\\
    leq 0, \\\\ \\text{or } l < f(x) < u \\text{ and } g(x) = 0. \\end{aligned}$$\n\
    \nFor completeness, note that the complementarity condition\n\n$$f(x) \\perp g(x)\
    \ = 0$$\n\nis a special case where the function $f(x)$ is unbounded.\n\n### 13.2.2\
    \ Complementarity Expressions\n\nThe design of complementarity conditions in Pyomo\
    \ relies on the specification of Pyomo constraint expressions. A Pyomo constraint\
    \ expression defines an equality, a simple inequality, or a pair of inequalities.\
    \ For example:\n\n```\nexpr1 = expr2\nexpr3 ≤ expr4\nconst1 ≤ expr5 ≤ const2\n\
    ```\n\nwhere \\( const_i \\) are constant arithmetic expressions that may only\
    \ contain variables that are fixed, and \\( expr_i \\) are arithmetic expressions\
    \ containing unfixed variables.\n\nA complementarity condition is defined with\
    \ a pair of constraint expressions\n\n```\nl1 ≤ expr1 ≤ u1 ⊥ l2 ≤ expr2 ≤ u2,\n\
    ```\n\nwhere exactly two of the constant bounds \\( l_1, u_1, l_2 \\) and \\(\
    \ u_2 \\) are finite. The non-finite bounds values are omitted in practice, so\
    \ this condition directly describes a classical or mixed complementarity condition.\
    \ Additionally, a complementarity condition can be expressed with a simple inequality,\
    \ such as:\n\n```\nl1 ≤ expr1 ⊥ expr3 ≤ expr4.\n```\n\nThis complementarity condition\
    \ is implicitly transformed to a form with constant bounds:\n\n```\nl1 ≤ expr1\
    \ ⊥ expr3 - expr4 ≤ 0.\n```\n\nIf a simple inequality is used, then the other\
    \ constraint expression must also be a simple inequality to ensure the complementarity\
    \ condition has exactly two finite bounds.\n\n### 13.2.3 Modeling Mixed-Complementarity\
    \ Conditions\n\nPyomo’s \\( pyomo.mpec \\) package defines the \\( \\text{Complementarity}\
    \ \\) component that is used to declare complementarity conditions.\n\nFor example,\
    \ consider the \\( \\text{ralph1} \\) problem in MacMPEC [41]:\n\n```\nmin 2x\
    \ - y\n0 ≤ y ⊥ y ≥ x\nx, y ≥ 0\n```"
