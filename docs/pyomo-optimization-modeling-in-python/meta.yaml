    \                    # check if the binary variable is on or off\n           \
    \         # note, it may not be exactly 1\n                    if pyo.value(model.y[r,c,v])\
    \ >= 0.5:\n                        cut_expr += (1.0 - model.y[r,c,v])\n      \
    \              else:\n                        cut_expr += model.y[r,c,v]\n   \
