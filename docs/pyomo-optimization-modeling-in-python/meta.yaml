    We now provide some motivating examples to illustrate the use of Pyomo in specifying
    optimization models.


    # 1.2.1 Simple Examples


    Consider the following linear program (LP):


    $$\min x_1 + 2x_2$$

    $$\text{s.t.} \quad 3x_1 + 4x_2 \geq 1$$

    $$\quad 2x_1 + 5x_2 \geq 2$$

    $$\quad x_1, x_2 \geq 0$$


    This LP can be easily expressed in Pyomo as follows:


    ```

    import pyomo.environ as pyo


    model = pyo.ConcreteModel()

    model.x_1 = pyo.Var(within=pyo.NonNegativeReals)

    model.x_2 = pyo.Var(within=pyo.NonNegativeReals)

    model.obj = pyo.Objective(expr=model.x_1 + 2*model.x_2)

    model.con1 = pyo.Constraint(expr=3*model.x_1 + 4*model.x_2 >= 1)

    model.con2 = pyo.Constraint(expr=2*model.x_1 + 5*model.x_2 >= 2)

    ```


    The first line is a standard Python import statement that initializes the Pyomo
    environment and loads Pyomo''s core modeling component library. The next lines
    construct a model object and define model attributes. This example describes a
    *concrete* model. Model components are objects that are attributes of a model
    object, and the `ConcreteModel` object initializes each model component as they
    are added. The model decision variables, constraints, and objective are defined
    using Pyomo *model components*.


