    Pyomo uses a standard Python logging system to manage the printing of logging
    messages for the underlying software in Pyomo. By default, logging messages representing
    Pyomo errors and warnings are always printed. The --quiet option suppresses all
    log messages except for those referring to errors. The --warning option enables
    warning messages for Pyomo. The --info option enables informational, warning and
    error log messages for Pyomo.


    The --verbose option enables debugging log messages for Pyomo. This option can
    be specified multiple times to enable logging messages for different parts of
    Pyomo: (1) debugging for just Pyomo and (2) debugging for all Pyomo packages.
    The --debug option enables debugging logging, and it allows exceptions to trigger
    a failure in which the program stack is printed.


    # 10.2.3 The convert Subcommand


    Many optimizers supported by Pyomo read a a temporary file Pyomo generates in
    a standard problem format. For example, the NL format is recognized by solvers
    used with the AMPL modeling tool, and the LP file format is used by a variety
    of commercial and open source integer programming solvers.

    It is often useful to generate these problem files directly, both to diagnose
    issues with a model as well as to directly manage the execution of a solver. The
    convert subcommand can be used to convert a Pyomo model into a standard file format.
    For example, consider the command:


    ```

    pyomo convert --format=lp concrete1.py

    ```


    This command converts the model in concrete1.py into an LP file format, which
    is stored in the file unknown.lp:


    ```

    [ 0.00] Setting up Pyomo environment

    [ 0.00] Applying Pyomo preprocessing actions

    [ 0.00] Creating model

    Model written to file ''unknown.lp''

    [ 0.05] Pyomo Finished

    ```


    The --output option can also be used to specify a filename, for which the filename
    suffix specifies the file format. For example, the command


    ```

    pyomo convert --output=concrete1.lp concrete1.py

    ```


    creates the file concrete1.lp, which represents the model from concrete1.py in
    the LP file format.'
