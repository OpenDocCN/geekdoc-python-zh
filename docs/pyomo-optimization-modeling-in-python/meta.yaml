    # 7.4.3 Estimation of Infectious Disease Models


    Effective widespread vaccination programs have significantly minimized the impact
    of many childhood diseases. However, childhood infectious diseases continue to
    be a concern in developing countries, and outbreaks of new disease strains pose
    challenges for public health policy makers. In this example, we simulate the outbreak
    of an infectious disease within a small community of 300 individuals (representing,
    for example, a small school). We derive a basic model to describe the spread of
    infection in the population and use a nonlinear programming formulation to estimate
    key parameters in this model using the simulated data.


    We use a standard discrete time compartment model to represent the system. Individuals
    are separated into three compartments based on their status with respect to the
    disease: susceptible (S), infected (I), or recovered (R). We assume that once
    an individual has contracted the disease and recovered, they are immune from that
    point forward (i.e., they do not return to the susceptible pool). The discrete
    time model representing this system is given by:


    $$I_i = \frac{\beta I_{i-1}^\alpha S_{i-1}}{N}$$

    $$S_i = S_{i-1} - I_i$$


    These two difference equations describe the propagation of the disease in the
    population. As a generation-based model, it is assumed that all the individuals
    infected at time $i$ have recovered by time $i+1$. $I_i$ and $S_i$ are the number
    of infected and susceptible individuals at time $i$, respectively. The population
    size is given by $N$, and $\beta$ and $\alpha$ are model parameters.


    > **NOTE:** Typically, we refer to *parameters* as fixed data in our optimization
    problem. However, in this example, the parameters in our infectious disease model
    are not yet known, and we want to estimate them from existing data. As a result,
    model parameters $\beta$ and $\alpha$ become Pyomo variables in the model (since
    they are to be estimated with the optimization).


    In this example, we use least-squares to estimate the parameters from simulated
    data. Let $SI$ be the set of indices for the serial intervals. In our example,
    we are estimating over one year, comprising 26 two-week serial intervals. The
    reported cases (known input) are given by $C_i$, and the variable $\epsilon_i^I$
    is the residual between the measured and calculated cases. The full problem formulation
    is given by,'
