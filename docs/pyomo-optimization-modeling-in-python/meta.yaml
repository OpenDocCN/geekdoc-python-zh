    A tuple template consists of a tuple containing one or more * symbols instead
    of a value. These represent indices where the tuple value is replaced by the values
    from the list of values following the tuple template. In this example, the following
    tuples are in set A:


    ```

    (1, 2, ''A'', 4)

    (1, 2, ''B'', 4)

    (''A'', 2, ''B'', 4)

    (''C'', 2, ''D'', 4)

    ```


    # 10.3.1.3 Set Arrays


    The set data command can also be used to declare data for a set array. Each set
    in a set array must be declared with a separate set data command with the following
    syntax:


    ```

    set <set-name>[<index>] := [<value>] ... ;

    ```


    Set arrays can be indexed by an arbitrary set and the index value may be a numeric
    value, a non-numeric string value, or a comma-separated list of string values.
    Suppose set A is used to index a set B as follows:


    ```

    model.A = pyo.Set()

    model.B = pyo.Set(model.A)

    ```


    Then set B is indexed using the values declared for set A:


    ```

    set A := 1 aaa ''a b'';


    set B[1] := 0 1 2;

    set B[aaa] := aa bb cc;

    set B[''a b''] := ''aa bb cc'';

    ```


    # 10.3.2 The param Command


    Simple or non-indexed parameters are declared in an obvious way, as shown by these
    examples:


    ```

    param A := 1.4;

    param B := 1;

    param C := abc;

    param D := true;

    param E := 1.0e+04;

    ```


    Parameters can be defined with numeric and string data. Numeric data is defined
    with a string evaluated by Python as a numeric value, which includes integer,
    floating point, scientific notation, and boolean. Boolean values can be specified
    with a variety of strings: TRUE, true, True, FALSE, false, and False. Note that
