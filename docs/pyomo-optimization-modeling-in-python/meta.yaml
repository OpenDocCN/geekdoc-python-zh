    # Revisions for the Third Edition


    We have made several major changes while preparing the third edition of this book.
    A subtle change that permeates the book is in how we recommend that Pyomo be imported.
    A bigger change that permeates the book is an emphasis on concrete models. The
    introductory chapter starts with a concrete model, and we emphasize concrete models
    in most chapters other than the chapter devoted entirely to abstract models. This
    does not reflect a change in Pyomo’s capabilities, but rather a recognition that
    concrete models provide fewer restrictions on the specification and use of Pyomo
    models. For example, data can be loaded by the user using general Python utilities
    rather than the mechanisms supported specifically for abstract models. Thus, concrete
    models enable a more general discussion of Pyomo’s potential. Finally, we have
    reorganized much of the material, added new examples, and added a chapter on how
    modelers can improve the performance of their models. Two chapters have been dropped
    from the book: the chapter on bilevel programming and the chapter on PySP, which
    offered support for optimization under uncertainty. These capabilities are available
    in other ways and are no longer included in Pyomo software releases.


