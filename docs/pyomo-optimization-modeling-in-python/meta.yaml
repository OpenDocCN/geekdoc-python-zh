    \ `else`。\n\n## A.8 生成器与列表推导式\n\n生成器和列表推导式密切相关。列表推导式在Pyomo模型中很常用，因为它们使用简洁的语法“即时”创建一个列表。生成器允许在不实际创建列表的情况下对其进行迭代。\n\
