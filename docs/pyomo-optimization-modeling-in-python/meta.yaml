    \ 9.3 节中讨论。\n\n## 9.2 使用 LinearExpression 改进模型构建性能\n\n在本节中，我们讨论直接使用 `LinearExpression`\
    \ 类以改进模型构建时间。虽然运算符重载是构建表达式的一种非常方便的方式，但它可能计算成本很高。作为替代方案，Pyomo 支持使用原生 Python 列表创建线性表达式，这比运算符重载方法快得多。`LinearExpression`\
    \ 类的构造函数接受三个关键字参数：\n\n- `constant`：常数项\n- `linear_vars`：线性表达式中出现的 Pyomo 变量列表\n\
    - `linear_coefs`：与 `linear_vars` 列表中每个变量对应的系数列表\n\n以下示例比较了使用运算符重载和 `LinearExpression`\
    \ 构造函数创建线性表达式。为了比较时间，我们创建表达式 100,000 次。\n\n```python\nimport pyomo.environ as\
    \ pyo\nfrom pyomo.common.timing import TicTocTimer\nfrom pyomo.core.expr.numeric_expr\
    \ import LinearExpression\n\nN1 = 10\nN2 = 100000\n\nm = pyo.ConcreteModel()\n\
    m.x = pyo.Var(list(range(N1)))\n\ntimer = TicTocTimer()\ntimer.tic()\n\nfor i\
    \ in range(N2):\n    e = sum(i*m.x[i] for i in range(N1))\ntimer.toc('created\
    \ expression with sum function')\n\nfor i in range(N2):\n    coefs = [i for i\
    \ in range(N1)]\n    lin_vars = [m.x[i] for i in range(N1)]\n    e = LinearExpression(constant=0,\
    \ linear_coefs=coefs, linear_vars=lin_vars)\ntimer.toc('created expression with\
    \ LinearExpression constructor')\n```\n\n输出如下所示。\n\n```\n[ 0.00] Resetting the\
    \ tic/toc delta timer\n[+ 3.52] created expression with sum function\n[+ 0.52]\
    \ created expression with LinearExpression constructor\n```\n\n尽管使用 `LinearExpression`\
    \ 不够清晰和简洁，但在本例中它快了 6 倍以上。请注意，性能提升在很大程度上取决于表达式中的项数。\n\n## 9.3 使用持久化求解器进行重复求解\n\n\
    每次使用标准求解器接口求解 Pyomo 模型时，都必须将定义模型的通用建模组件转换为所用求解器识别的某种输入形式。对于求解器相对快速完成的情况，这种模型转换可能会引入显著的时间开销。持久化求解器接口提供了一种机制，用于减少对具有增量更改的模型进行重复求解时的总转换时间。这是通过暴露允许用户在初始步骤（完整模型被转换）之后，高效地通知求解器这些对\
    \ Pyomo 模型的增量更改的功能来实现的。\n\n使用持久化接口时，必须格外小心，以确保 Pyomo 模型及其转换后的求解器表示保持同步。这是一个必须由用户完成的手动过程。然而，通过这种权衡，对于许多常见的优化方法，可以实现显著的性能改进。\n\
    \n在第 9.3.1 节中，我们简要讨论了持久化求解器何时最有用。在第 9.3.2 – 9.3.4 节中，我们描述了如何使用持久化求解器接口。在第 9.3.5\
    \ 节中，我们使用持久化求解器接口重新实现了第 9.1.3 节中的参数扫描示例。"
