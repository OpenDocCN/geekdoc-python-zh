    model.transform_gdp = pyo.BuildAction(rule=transform_gdp)\n```\n\n## 第12章：微分代数方程\n\
    \n摘要：本章记录如何构建和求解包含微分和代数方程（DAEs）的优化问题。pyomo.dae包允许用户在优化框架内整合详细的动态模型，其灵活性足以表示各种微分方程。pyomo.dae还包含几种基于同步离散化方法的自动化求解技术，用于解决动态优化问题。\n\
    \n### 12.1 引言\n\n为了更好地理解现实世界的现象，科学家和工程师经常开发动态模型，即基于微分方程的模型。这些模型的高保真仿真在许多领域仍然是一个活跃的研究领域，因为这些仿真模型可能很复杂且计算代价高昂。但是，在开发出适合仿真的模型之后，下一个目标通常是优化动态系统的某个特定方面（例如，根据动态数据估计模型参数，或将动态系统控制到期望的设定点）。考虑文献\
