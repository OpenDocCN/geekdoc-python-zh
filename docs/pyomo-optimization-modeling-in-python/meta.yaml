    tau)x_{ij}, \\quad t \\in [t_{i-1}, t_i], \\quad \\tau \\in [0,1] \\quad (12.13)\n\
    $$\n\n$$\n\\ell_j(\\tau) = \\prod_{\\substack{k=0, \\\\ k \\neq j}}^K \\frac{(\\\
    tau - \\tau_k)}{(\\tau_j - \\tau_k)}. \\quad (12.14)\n$$\n\n与有限差分方法相比，配置方法产生的代数近似精确度显著更高。然而，它们手动实现起来要困难得多。配置方法的变体在微分变量在每个有限元上的函数表示以及配置点的选择上有所不同。在撰写本文时，`pyomo.dae`\
    \ 中的配置变换使用拉格朗日多项式来表示微分变量轮廓。配置点的选择有两个选项：平移的 Gauss-Radau 根（'LAGRANGE-RADAU'）和平移的\
    \ Gauss-Legendre 根（'LAGRANGE-LEGENDRE'）。\n\n可以使用以下方式对 Pyomo 模型应用配置离散化：\n\n```python\n\
    discretizer = pyo.TransformationFactory('dae.collocation')\ndiscretizer.apply_to(m,\
    \ nfe=7, ncp=6, scheme='LAGRANGE-RADAU')\n```\n\n关键字参数 `nfe` 指定有限元的数量，参数 `ncp`\
    \ 指定每个有限元内的配置点数。\n\n## 12.4 附加功能\n\n`pyomo.dae` 包含几个高级功能。在本节中，我们简要提及其中两个功能，这些功能将对对\
    \ PDE 约束优化或更高级最优控制策略感兴趣的用户有所帮助。\n\n### 12.4.1 应用多个离散化\n\n如前所述，可以对模型中出现的每个 `ContinuousSet`\
    \ 应用单独的离散化变换。这意味着可以将不同的有限差分或配置方案或两者的组合应用于单个 Pyomo 模型。例如，一个包含两个 `ContinuousSet`\
    \ 组件（`m.t1` 和 `m.t2`）的 Pyomo 模型，可以使用以下任何离散化方案的组合进行离散化：\n\n```python\n# 应用多个有限差分方案\n\
    discretizer = pyo.TransformationFactory('dae.finite_difference')\ndiscretizer.apply_to(m,\
    \ wrt=m.t1, nfe=10, scheme='BACKWARD')\ndiscretizer.apply_to(m, wrt=m.t2, nfe=100,\
    \ scheme='FORWARD')\n```\n\n```python\n# 应用多个配置方案\ndiscretizer = pyo.TransformationFactory('dae.collocation')\n\
    discretizer.apply_to(m, wrt=m.t1, nfe=4, ncp=6, \\\n    scheme='LAGRANGE-LEGENDRE')\n\
    discretizer.apply_to(m, wrt=m.t2, nfe=10, ncp=3, \\\n    scheme='LAGRANGE-RADAU')\n\
    ```\n\n```python\n# 应用有限差分和配置方案的组合\ndiscretizer1 = pyo.TransformationFactory('dae.finite_difference')\n\
    discretizer2 = pyo.TransformationFactory('dae.collocation')\ndiscretizer1.apply_to(m,\
    \ wrt=m.t1, nfe=10, scheme='BACKWARD')\ndiscretizer2.apply_to(m, wrt=m.t2, nfe=5,\
    \ ncp=3, \\\n    scheme='LAGRANGE-RADAU')\n```"
