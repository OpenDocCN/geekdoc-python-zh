- md: "问题是要确定每个时期 $t \\in T$ 的最优产量 $X_t$，已知需求 $d_t$。我们令 $y_t$ 为一个二元变量，表示在时期 $t$ 是否进行生产，并假设如果决定在时期\
    \ $t$ 生产，则存在一个固定成本 $c_t$。每个时期末的库存 $I_t$ 是前一期库存、生产和销售的函数，\n$$I_t = I_{t-1} + X_t\
    \ - d_t.$$\n如果我们允许库存为负（意味着未能满足需求并产生了待办订单积压），我们可以将库存表示为 $I_t = I_t^+ - I_t^-$，其中限制\
    \ $I_t^+$ 和 $I_t^-$ 均为非负。这里，$I_t^+$ 代表持有的库存，$I_t^-$ 代表订单积压。我们可以分别设定库存持有成本和缺货成本（积压订单的成本）为\
    \ $h_t^+$ 和 $h_t^-$。\n\n根据此描述，优化问题可以表述为，\n$$\\min \\sum_{t \\in T} c_t y_t + h_t^+\
    \ I_t^+ + h_t^- I_t^-$$\n$$\\text{s.t.} \\quad I_t = I_{t-1} + X_t - d_t \\quad\
    \ \\forall t \\in T$$\n$$I_t = I_t^+ - I_t^- \\quad \\forall t \\in T$$\n$$X_t\
    \ \\le P y_t \\quad \\forall t \\in T$$\n$$X_t, I_t^+, I_t^- \\ge 0 \\quad \\\
    forall t \\in T$$\n$$y_t \\in \\{0, 1\\} \\quad \\forall t \\in T$$\n其中等式 4 是一个约束，仅当指示变量\
    \ $y_t=1$ 时才允许在时期 $t$ 生产。我们问题的数据在表 8.1 中提供。\n\n表 8.1：批量生产问题数据\n\n| 参数 | 描述 | 值\
    \ |\n| :--- | :--- | :--- |\n| $c$ | 生产固定成本 | 4.6 |\n| $I_0^+$ | 初始正库存值 | 5.0\
    \ |\n| $I_0^-$ | 初始待办订单积压值 | 0.0 |\n| $h^+$ | 持有库存的单位成本 | 0.7 |\n| $h^-$ | 缺货的单位成本\
    \ | 1.2 |\n| $P$ | 最大生产量（大M值） | 5 |\n| $d$ | 需求 | [5, 7, 6.2, 3.1, 1.7] |\n\n\
    ## 8.6.1 不使用模块的公式化\n\n我们可以使用下面所示的 Pyomo 代码来表述不使用模块的批量生产问题。\n\n```python\nimport\
    \ pyomo.environ as pyo\n\nmodel = pyo.ConcreteModel()\nmodel.T = pyo.RangeSet(5)\
    \ # 时间段\n\ni0 = 5.0 # 初始库存\nc = 4.6 # 设置成本\nh_pos = 0.7 # 库存持有成本\nh_neg = 1.2\
    \ # 缺货成本\nP = 5.0 # 最大生产量\n\n# 时期 t 的需求\nd = {1: 5.0, 2:7.0, 3:6.2, 4:3.1, 5:1.7}\n\
    \n# 定义变量\nmodel.y = pyo.Var(model.T, domain=pyo.Binary)\nmodel.x = pyo.Var(model.T,\
    \ domain=pyo.NonNegativeReals)\nmodel.i = pyo.Var(model.T)\nmodel.i_pos = pyo.Var(model.T,\
    \ domain=pyo.NonNegativeReals)\nmodel.i_neg = pyo.Var(model.T, domain=pyo.NonNegativeReals)\n\
    \n# 定义库存关系\ndef inventory_rule(m, t):\n    if t == m.T.first():\n        return\
    \ m.i[t] == i0 + m.x[t] - d[t]\n    return m.i[t] == m.i[t-1] + m.x[t] - d[t]\n\
    model.inventory = pyo.Constraint(model.T, rule=inventory_rule)\n\ndef pos_neg_rule(m,\
    \ t):\n    return m.i[t] == m.i_pos[t] - m.i_neg[t]\nmodel.pos_neg = pyo.Constraint(model.T,\
    \ rule=pos_neg_rule)\n\n# 创建生产指示变量的大M约束\ndef prod_indicator_rule(m, t):\n    return\
    \ m.x[t] <= P*m.y[t]\nmodel.prod_indicator = pyo.Constraint(model.T, rule=prod_indicator_rule)\n\
    \n# 定义目标函数\ndef obj_rule(m):\n    return sum(c*m.y[t] + h_pos*m.i_pos[t] + h_neg*m.i_neg[t]\
    \ for t in m.T)\nmodel.obj = pyo.Objective(rule=obj_rule)\n\n# 求解问题\nsolver =\
    \ pyo.SolverFactory('glpk')\nsolver.solve(model)\n\n# 打印结果\nfor t in model.T:\n\
    \    print('Period: {0}, Prod. Amount: {1}'.format(t, pyo.value(model.x[t])))\n\
    \n```\n\n此示例使用了书中早期章节讨论的标准 Pyomo 语法。如果我们只考虑单时期的批量生产问题，我们的变量声明将如下所示，\n\n```python\n\
