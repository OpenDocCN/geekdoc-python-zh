    there are many Python-based solver interface packages, including open source packages
    such as PyGlpk [50] and pyipopt [51], in addition to Python interfaces for the
    commercial solvers such as CPLEX [11] and Gurobi [28].


    Several features distinguish Pyomo. First, Pyomo provides mechanisms for extending
    the core modeling and optimization functionality without requiring edits to Pyomo
    itself. Second, Pyomo supports the definition of both concrete and abstract models.
    This allows the user significant flexibility in determining how closely data is
    integrated with a model definition. Finally, Pyomo can support a broad class of
    optimization models, including both standard linear programs as well as general
    nonlinear optimization models, generalized disjunctive programs, problems constrained
    by differential equations, and mathematical programs with equilibrium conditions.'
