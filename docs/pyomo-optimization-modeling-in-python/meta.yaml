  - "[PAGE 59]\n\n# 4.5 Constraints\n\nA constraint defines one or more expressions\
    \ that place limits on the feasible values of variables. The declaration of constraint\
    \ expressions is similar to the declaration of objective function expressions.\
    \ Constraints differ from objectives in that the expressions include relationships\
    \ (equalities or inequalities). While objectives can be indexed, this feature\
    \ is infrequently used. In contrast, constraints are commonly indexed, allowing\
    \ for a collection of related constraint expressions to be constructed and stored\
    \ in a single constraint object.\n\n# 4.5.1 Constraint Declarations\n\nThe following\
    \ code creates a single, non-indexed `Constraint` object:\n\n```\nmodel.x = pyo.Var([1,2],\
    \ initialize=1.0)\nmodel.diff = pyo.Constraint(expr=model.x[2]-model.x[1] <= 7.5)\n\
    ```\n\nSeveral named arguments are supported, and Table 4.4 lists the common arguments\
    \ that can be passed when declaring a `Constraint` component.\n\nThe expression\
    \ specified by the `expr` keyword can alternatively be generated with a rule function.\
    \ For example, the `diff` constraint can also be declared as follows:\n\n```\n\
    model.x = pyo.Var([1,2], initialize=1.0)\ndef diff_rule(model):\n    return model.x[2]\
    \ - model.x[1] <= 7.5\nmodel.diff = pyo.Constraint(rule=diff_rule)\n```\n\n| keyword\
    \ | description | acceptable values |\n|---------|-------------|-------------------|\n\
    | <un-named> | reserved for specifying index sets | any number of Pyomo Set objects\
    \ or Python lists |\n| expr | provides the expression that defines the constraint\
    \ | any valid Pyomo expression with a relational operator, a 2-tuple, or a 3-tuple\
    \ |\n| rule | provides the rule function that will be called to access the expression\
    \ that defines the constraint | a function that returns a Pyomo expression with\
    \ a relational operator, a 2-tuple, a 3-tuple, or Constraint.Skip |\n\nTable 4.4:\
    \ Common declaration arguments for the `Constraint` component"
  - "[PAGE 60]\n\nConstraints can be indexed, and those indices can be used to refer\
    \ to specific elements of indexed parameters and variables when constructing expressions.\
    \ The following code fragment shows an example of this:\n\n```\nN = [1,2,3]\n\n\
    a = {1:1, 2:3.1, 3:4.5}\nb = {1:1, 2:2.9, 3:3.1}\n\nmodel.y = pyo.Var(N, within=pyo.NonNegativeReals,\
    \ initialize=0.0)\n\ndef CoverConstr_rule(model, i):\n    return a[i] * model.y[i]\
    \ >= b[i]\nmodel.CoverConstr = pyo.Constraint(N, rule=CoverConstr_rule)\n```\n\
    \nIndexed constraints are specified in the same manner as indexed objectives.\
    \ Pyomo iterates over the cross product of the indexing sets, providing an index\
    \ from each set to the rule function. The `CoverConstr` constraint in this example\
    \ implements the following mathematical model:\n\n$$a_i y_i \\geq b_i \\; \\forall\
    \ i \\in \\{1,2,3\\}$$\n\nGiven the data specified in `a` and `b`, the model instance\
    \ passed to the solver will include the following explicit constraints:\n\n$$y[1]\
    \ \\geq 1$$\n$$3.1 \\cdot y[2] \\geq 2.9$$\n$$4.5 \\cdot y[3] \\geq 3.1$$\n\n\
    Three types of constraint expressions are allowed in Pyomo:\n\n+   - *inequality\
    \ constraints* have the form\n\n  $$expr_1 \\leq expr_2 \\quad \\text{or} \\quad\
    \ expr_1 \\geq expr_2$$\n\n  where $expr_1$ and $expr_2$ may be non-constant expressions.\
    \ (Note that < and > are not supported.)\n- *equality constraints* have the form\n\
    \n  $$expr_1 = expr_2$$\n\n  where $expr_1$ and $expr_2$ may be non-constant expressions.\n\
    - *range constraints* have the form\n\n  $$lower \\leq expr_1 \\leq upper$$\n\n\
    \  where $lower$ and $upper$ are constant expressions and $expr_1$ is a non-constant\
    \ expression."
- md: "## 4.5.2 Working with Constraint Objects\n\nIn some optimization models, a\
    \ constraint might not be defined for all indices. For example, particular indices\
    \ might not be physically realizable. The rule function can return `Constraint.Skip`\
    \ (or `Constraint.NoConstraint`) to indicate that no constraint is associated\
    \ with a particular index. For example, consider the declaration of a notional\
    \ task scheduling constraint:\n\n```\nTimePeriods = [1,2,3,4,5]\nLastTimePeriod\
    \ = 5\n\nmodel.StartTime = pyo.Var(TimePeriods, initialize=1.0)\n\ndef Pred_rule(model,\
    \ t):\n    if t == LastTimePeriod:\n        return pyo.Constraint.Skip\n    else:\n\
    \        return model.StartTime[t] <= model.StartTime[t+1]\n\nmodel.Pred = pyo.Constraint(TimePeriods,\
    \ rule=Pred_rule)\n```\n\nThe value `Constraint.Skip` indicates that no constraint\
    \ is being generated, and the corresponding index value is skipped. An alternative\
    \ to this approach is to construct a sparse index set that specifies only the\
    \ valid indices in the constraint. However, this may not always be practical in\
    \ complex models (for a discussion of sparse index sets, see Section 9.4).\n\n\
    The value `Constraint.Feasible` indicates that the constraint generated for the\
    \ specified index is always feasible. Consequently, that constraint does not need\
    \ to be generated, and it is skipped. Similarly, the value `Constraint.Infeasible`\
    \ indicates that the constraint generated by the specified index is infeasible.\
    \ This might be used, for example, if a particular combination of parameter values\
    \ produced an invalid constraint. For this value, Pyomo raises an exception to\
    \ inform the user, because this typically indicates an error in the model or data.\n\
    \nAfter a constraint is declared, the constraint expression is processed to identify\
    \ the elements of the logical tuple: `(lower, body, upper)`, where the non-constant\
    \ expressions are pushed to the body. Hence, the `lower` and `upper` attributes\
    \ are constant expressions or `None`, and the `body` attribute contains a Pyomo\
    \ expression. If a `Constraint` contains an equality expression, then the `equality`\
    \ attribute is `True`, and the `lower` and `upper` attributes have the same value.\n\
    \nThe value of the constraint body can be evaluated using the `value` function.\
    \ Similarly, the `lslack` and `uslack` methods can be used to compute slack values\
    \ (the difference between the current expression value and the lower or upper\
    \ bound), as shown in the following example:\n\n```\nmodel = pyo.ConcreteModel()\n\
    model.x = pyo.Var(initialize=1.0)\nmodel.y = pyo.Var(initialize=1.0)\n\nmodel.c1\
    \ = pyo.Constraint(expr=model.y - model.x <= 7.5)\nmodel.c2 = pyo.Constraint(expr=-2.5\
    \ <= model.y - model.x)\nmodel.c3 = pyo.Constraint(\n    expr=pyo.inequality(-3.0,\
    \ model.y - model.x, 7.0))\n\nprint(pyo.value(model.c1.body)) # 0.0\n\nprint(model.c1.lslack())\
    \ # inf\nprint(model.c1.uslack()) # 7.5\nprint(model.c2.lslack()) # 2.5\nprint(model.c2.uslack())\
    \ # inf\nprint(model.c3.lslack()) # 3.0\nprint(model.c3.uslack()) # 7.0\n```\n\
    \n## 4.6 Set Data\n\nA set is a collection of data, possibly including numeric\
    \ data (e.g., real or integer values) as well as symbolic data (e.g., strings)\
    \ typically used to specify the valid indices for an indexed component. Several\
    \ classes can be used to define sets in Pyomo models:\n\n- `Set` A generic component\
    \ for declaring sets\n- `RangeSet` A component that defines a range of numbers\n\
    - `SetOf` A component that creates a set from external data without copying the\
    \ data\n\n### 4.6.1 Set Declarations\n\nThe following code creates a `Set` object:\n\
    \n```\nmodel.A = pyo.Set()\n```\n\nNamed and un-named arguments are supported,\
    \ and Table 4.5 provides a list of the common arguments that can be passed when\
    \ declaring the `Set` component.\n\nTable 4.5: Common declaration arguments for\
    \ the Set component\n\n| keyword | description | acceptable values |\n|---------|-------------|-------------------|\n\
    | <un-named> | reserved for specifying index sets | any number of Pyomo Set objects\
    \ or Python lists |\n| initialize | provides initial values to store in the set\
    \ | Python list, Python dictionary, or rule function |\n| within domain | specifies\
    \ the valid values that can be contained in the set | a Pyomo Set object or Python\
    \ list |\n| ordered | specifies whether or not order of the set should be preserved\
    \ | True, False, Set.InsertionOrder, or Set.SortedOrder |\n| bounds | specifies\
    \ the lower and upper bounds for valid values in the set | a 2-tuple, a Python\
    \ dictionary, or a rule function |\n| filter | specifies a rule for determining\
    \ membership in the set | a rule function |\n\nAn indexed set can also be specified\
    \ by providing other sets or Python lists as un-named arguments in the declaration:\n\
    \n```\nmodel.A = pyo.Set()\nmodel.B = pyo.Set()\nmodel.C = pyo.Set(model.A)\n\
    model.D = pyo.Set(model.A, model.B)\n```\n\nSimilarly, standard Python types can\
    \ be used to define a set index:\n\n```\nmodel.E = pyo.Set([1,2,3])\nf = set([1,2,3])\n\
    model.F = pyo.Set(f)\n```\n\nSet declarations can also use standard set operations\
    \ to declare a set in a constructive fashion:\n\n```\nmodel.A = pyo.Set()\nmodel.B\
    \ = pyo.Set()\nmodel.G = model.A | model.B # set union\nmodel.H = model.B & model.A\
    \ # set intersection\nmodel.I = model.A - model.B # set difference\nmodel.J =\
    \ model.A ^ model.B # set exclusive-or\n```\n\nAlso, set cross-products can be\
    \ specified with the multiplication operator:\n\n```\nmodel.A = pyo.Set()\nmodel.B\
    \ = pyo.Set()\nmodel.K = model.A * model.B\n```\n\nThe `initialize` keyword can\
    \ be used to specify the elements in a set:\n\n```\nmodel.B = pyo.Set(initialize=[2,3,4])\n\
    model.C = pyo.Set(initialize=[(1,4),(9,16)])\n```\n\nA Python dictionary can also\
    \ be passed to the `initialize` keyword to specify the elements for each index\
    \ of an indexed set:\n\n```\nF_init = {}\nF_init[2] = [1,3,5]\nF_init[3] = [2,4,6]\n\
    F_init[4] = [3,5,7]\nmodel.F = pyo.Set([2,3,4], initialize=F_init)\n```\n\nAlternatively,\
    \ a rule (a Python function) can be passed to the `initialize` keyword to provide\
    \ the elements for an indexed set. The function accepts the model and indices\
    \ and returns the desired set for that index:\n\n```\ndef J_init(model, i, j):\n\
    \    return range(0, i*j)\nmodel.J = pyo.Set(model.B, model.B, initialize=J_init)\n\
    ```\n\nThe previous examples illustrate how data can be specified or dynamically\
    \ generated to initialize a set. There are some contexts where it is simpler to\
    \ specify the set elements that should be omitted. The `filter` keyword can be\
    \ used to specify a function that returns `True` when an element belongs in a\
    \ set, and `False` otherwise. For example:\n\n```\nmodel.P = pyo.Set(initialize=[1,2,3,5,7])\n\
    def filter_rule(model, x):\n    return x not in model.P\nmodel.Q = pyo.Set(initialize=range(1,10),\
    \ filter=filter_rule)\n```\n\nHere, set P contains prime values, and set Q is\
    \ the set of all numbers except for the members of P.\n\nAfter an indexed set\
    \ is constructed in a concrete model, sets can be added for specific indices using\
    \ the Python equal operator:\n\n```\nmodel.R = pyo.Set([1,2,3])\nmodel.R[1] =\
    \ [1]\nmodel.R[2] = [1,2]\n```\n\nValidation of set data is supported in two different\
    \ ways. First, a superset can be specified with the `within` or `domain` keyword:\n\
    \n```\nmodel.B = pyo.Set(within=model.A)\n```\n\nWhen an element is added to the\
    \ set B, it is checked to confirm that it also belongs to A. This ensures B is\
    \ a subset of A.\n\nValidation of set data can also be performed by passing a\
    \ rule to the `validate` keyword argument. The rule function should return `True`\
    \ if the element that is passed in belongs in this set, and `False` otherwise\
    \ (Pyomo will throw an exception). For example, the following `C_validate` function\
    \ mimics the `within` keyword argument:\n\n```\ndef C_validate(model, value):\n\
    \    return value in model.A\nmodel.C = pyo.Set(validate=C_validate)\n```\n\n\
    Finally, note that if both the `within` and `validate` keyword arguments are specified,\
    \ then the logic specified by both are applied to validate set elements.\n\nBy\
    \ default, sets are ordered by insertion order. In some cases, we may want the\
    \ set elements to be in sorted order. This can be done using the `Set.SortedOrder`\
    \ option with the `ordered` keyword:\n\n```\nmodel.A = pyo.Set(ordered=pyo.Set.SortedOrder)\n\
    ```\n\nSets may contain data elements that are either singletons or $k$-tuples.\
    \ The `dimen` keyword is used to specify the expected dimension of the data. The\
    \ default value is one, indicating the set will contain singleton data. In some\
    \ cases, the appropriate value of the dimension can be determined from other keyword\
    \ values, but in general the user is required to specify this keyword for tuple\
    \ set data.\n\nOrdered sets may have first and last values. The `bounds` option\
    \ can be used to specify a 2-tuple defining upper and lower bounds for a set.\
    \ This option may be inferred from the `within` argument, when the set is ordered.\n\
    \nThe `RangeSet` component defines an ordered virtual set that represents a sequence\
    \ of integer or floating point values. This sequence is defined by a start value,\
    \ a final value, and a step size. If a `RangeSet` is defined with a single argument,\
    \ then the argument defines the final value. The start value defaults to 1 and\
    \ the step size defaults to 1. For example, the following defines a sequence of\
    \ integers from 1 to 10:\n\n```\nmodel.A = pyo.RangeSet(10)\n```\n\nIf a `RangeSet`\
    \ is defined with two arguments, then the first is the start value and the second\
    \ is the final value. For example, the following defines a sequence of integers\
    \ from 5 to 10:\n\n```\nmodel.C = pyo.RangeSet(5, 10)\n```\n\nFinally, if a `RangeSet`\
    \ is defined with three arguments, then they are the start value, final value\
    \ and step size respectively. For example, the following defines a sequence of\
    \ floating point values from 2.5 to 10.0 with step 1.5:\n\n```\nmodel.D = pyo.RangeSet(2.5,\
    \ 11, 1.5)\n```\n\n### 4.6.2 Working with Set Objects\n\nThe `len()` function\
    \ returns the number of elements in the set:\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    \nprint(len(model.A)) # 3\n```"
  mdcn: "## 4.5.2 使用约束对象\n\n在某些优化模型中，约束可能并非对所有索引都有定义。例如，某些索引可能在物理上无法实现。规则函数可以返回 `Constraint.Skip`（或\
    \ `Constraint.NoConstraint`），以表示特定索引没有关联的约束。例如，考虑一个假想的任务调度约束声明：\n\n```\nTimePeriods\
    \ = [1,2,3,4,5]\nLastTimePeriod = 5\n\nmodel.StartTime = pyo.Var(TimePeriods,\
    \ initialize=1.0)\n\ndef Pred_rule(model, t):\n    if t == LastTimePeriod:\n \
    \       return pyo.Constraint.Skip\n    else:\n        return model.StartTime[t]\
    \ <= model.StartTime[t+1]\n\nmodel.Pred = pyo.Constraint(TimePeriods, rule=Pred_rule)\n\
    ```\n\n值 `Constraint.Skip` 表示不生成约束，并跳过相应的索引值。此方法的另一种替代方案是构建一个稀疏索引集，该集合仅指定约束中的有效索引。然而，在复杂模型中这可能并不总是可行的（关于稀疏索引集的讨论，请参见第9.4节）。\n\
    \n值 `Constraint.Feasible` 表示为指定索引生成的约束始终是可行的。因此，该约束不需要生成，会被跳过。类似地，值 `Constraint.Infeasible`\
    \ 表示为指定索引生成的约束是不可行的。例如，当特定的参数组合产生无效约束时，可能会使用此值。对于此值，Pyomo会引发异常以通知用户，因为这通常表示模型或数据中存在错误。\n\
    \n约束声明后，约束表达式将被处理，以识别逻辑元组的元素：`(lower, body, upper)`，其中非常量表达式被推入到`body`部分。因此，`lower`\
    \ 和 `upper` 属性是常量表达式或 `None`，而 `body` 属性包含一个Pyomo表达式。如果 `Constraint` 包含一个等式表达式，则\
    \ `equality` 属性为 `True`，并且 `lower` 和 `upper` 属性具有相同的值。\n\n可以使用 `value` 函数来评估约束主体的值。类似地，可以使用\
    \ `lslack` 和 `uslack` 方法来计算松弛值（当前表达式值与下界或上界的差值），如下例所示：\n\n```\nmodel = pyo.ConcreteModel()\n\
    model.x = pyo.Var(initialize=1.0)\nmodel.y = pyo.Var(initialize=1.0)\n\nmodel.c1\
    \ = pyo.Constraint(expr=model.y - model.x <= 7.5)\nmodel.c2 = pyo.Constraint(expr=-2.5\
    \ <= model.y - model.x)\nmodel.c3 = pyo.Constraint(\n    expr=pyo.inequality(-3.0,\
    \ model.y - model.x, 7.0))\n\nprint(pyo.value(model.c1.body)) # 0.0\n\nprint(model.c1.lslack())\
    \ # inf\nprint(model.c1.uslack()) # 7.5\nprint(model.c2.lslack()) # 2.5\nprint(model.c2.uslack())\
    \ # inf\nprint(model.c3.lslack()) # 3.0\nprint(model.c3.uslack()) # 7.0\n```\n\
    \n## 4.6 集合数据\n\n集合是数据的集合，可能包括数值数据（例如实数或整数值）以及符号数据（例如字符串），通常用于指定索引组件的有效索引。有几种类可用于在Pyomo模型中定义集合：\n\
    \n- `Set`：用于声明集合的通用组件。\n- `RangeSet`：定义一个数字范围的组件。\n- `SetOf`：从外部数据创建集合而不复制数据的组件。\n\
    \n### 4.6.1 集合声明\n\n以下代码创建了一个 `Set` 对象：\n\n```\nmodel.A = pyo.Set()\n```\n\n支持命名和未命名参数，表4.5提供了在声明\
    \ `Set` 组件时可以传递的常见参数列表。\n\n表4.5：Set组件的常用声明参数\n\n| 关键字 | 描述 | 可接受的值 |\n|---------|-------------|-------------------|\n\
    | <未命名> | 保留用于指定索引集 | 任意数量的 Pyomo Set 对象或 Python 列表 |\n| initialize | 提供要存储在集合中的初始值\
    \ | Python 列表、Python 字典或规则函数 |\n| within (domain) | 指定集合中可包含的有效值 | 一个 Pyomo Set\
    \ 对象或 Python 列表 |\n| ordered | 指定是否应保留集合的顺序 | True, False, Set.InsertionOrder,\
    \ 或 Set.SortedOrder |\n| bounds | 指定集合中有效值的上下界 | 一个2元组、一个Python字典或一个规则函数 |\n|\
    \ filter | 指定用于确定集合成员资格的规则 | 一个规则函数 |\n\n也可以通过提供其他集合或Python列表作为声明中的未命名参数来指定一个索引集：\n\
    \n```\nmodel.A = pyo.Set()\nmodel.B = pyo.Set()\nmodel.C = pyo.Set(model.A)\n\
    model.D = pyo.Set(model.A, model.B)\n```\n\n类似地，可以使用标准的Python类型来定义集合索引：\n\n```\n\
    model.E = pyo.Set([1,2,3])\nf = set([1,2,3])\nmodel.F = pyo.Set(f)\n```\n\n集合声明也可以使用标准集合操作来以构造性的方式声明集合：\n\
    \n```\nmodel.A = pyo.Set()\nmodel.B = pyo.Set()\nmodel.G = model.A | model.B #\
    \ 集合并集\nmodel.H = model.B & model.A # 集合交集\nmodel.I = model.A - model.B # 集合差集\n\
    model.J = model.A ^ model.B # 集合对称差集\n```\n\n同样，可以使用乘法运算符指定集合的笛卡尔积：\n\n```\nmodel.A\
    \ = pyo.Set()\nmodel.B = pyo.Set()\nmodel.K = model.A * model.B\n```\n\n`initialize`\
    \ 关键字可用于指定集合中的元素：\n\n```\nmodel.B = pyo.Set(initialize=[2,3,4])\nmodel.C = pyo.Set(initialize=[(1,4),(9,16)])\n\
    ```\n\n也可以将Python字典传递给 `initialize` 关键字，以指定索引集中每个索引的元素：\n\n```\nF_init = {}\n\
    F_init[2] = [1,3,5]\nF_init[3] = [2,4,6]\nF_init[4] = [3,5,7]\nmodel.F = pyo.Set([2,3,4],\
    \ initialize=F_init)\n```\n\n或者，可以将规则（Python函数）传递给 `initialize` 关键字，以为索引集提供元素。该函数接受模型和索引，并返回该索引所需的集合：\n\
    \n```\ndef J_init(model, i, j):\n    return range(0, i*j)\nmodel.J = pyo.Set(model.B,\
    \ model.B, initialize=J_init)\n```\n\n前面的示例说明了如何指定或动态生成数据来初始化集合。在某些情况下，指定应被省略的集合元素更为简单。`filter`\
    \ 关键字可用于指定一个函数，当元素属于集合时返回 `True`，否则返回 `False`。例如：\n\n```\nmodel.P = pyo.Set(initialize=[1,2,3,5,7])\n\
    def filter_rule(model, x):\n    return x not in model.P\nmodel.Q = pyo.Set(initialize=range(1,10),\
    \ filter=filter_rule)\n```\n\n这里，集合P包含质数值，集合Q是除P的成员之外的所有数字的集合。\n\n在具体模型中构建索引集后，可以使用Python赋值运算符为特定索引添加集合：\n\
    \n```\nmodel.R = pyo.Set([1,2,3])\nmodel.R[1] = [1]\nmodel.R[2] = [1,2]\n```\n\
    \n集合数据的验证有两种不同的方式。首先，可以使用 `within` 或 `domain` 关键字指定一个超集：\n\n```\nmodel.B = pyo.Set(within=model.A)\n\
    ```\n\n当一个元素被添加到集合B中时，会被检查以确认它也属于A。这确保B是A的子集。\n\n集合数据的验证也可以通过向 `validate` 关键字参数传递一个规则来执行。规则函数应在传入的元素属于此集合时返回\
    \ `True`，否则返回 `False`（Pyomo将抛出异常）。例如，以下 `C_validate` 函数模拟了 `within` 关键字参数：\n\n\
    ```\ndef C_validate(model, value):\n    return value in model.A\nmodel.C = pyo.Set(validate=C_validate)\n\
    ```\n\n最后，请注意，如果同时指定了 `within` 和 `validate` 关键字参数，则两者指定的逻辑都会应用于验证集合元素。\n\n默认情况下，集合按插入顺序排序。在某些情况下，我们可能希望集合元素按排序顺序排列。这可以通过将\
    \ `ordered` 关键字与 `Set.SortedOrder` 选项一起使用来实现：\n\n```\nmodel.A = pyo.Set(ordered=pyo.Set.SortedOrder)\n\
    ```\n\n集合可以包含单元素或 k-元组的数据元素。`dimen` 关键字用于指定数据的预期维度。默认值为一，表示集合将包含单元素数据。在某些情况下，可以从其他关键字值推断出维度的适当值，但通常情况下用户需要为元组集合数据指定此关键字。\n\
    \n有序集合可以有首值和末值。`bounds` 选项可用于指定一个定义集合上下界的2元组。当集合有序时，此选项可以从 `within` 参数推断出来。\n\n\
    `RangeSet` 组件定义了一个有序的虚拟集，表示整数或浮点值的序列。此序列由起始值、终止值和步长定义。如果使用单个参数定义 `RangeSet`，则该参数定义终止值。起始值默认为1，步长默认为1。例如，以下定义一个从1到10的整数序列：\n\
    \n```\nmodel.A = pyo.RangeSet(10)\n```\n\n如果使用两个参数定义 `RangeSet`，则第一个是起始值，第二个是终止值。例如，以下定义一个从5到10的整数序列：\n\
    \n```\nmodel.C = pyo.RangeSet(5, 10)\n```\n\n最后，如果使用三个参数定义 `RangeSet`，则它们分别是起始值、终止值和步长。例如，以下定义一个从2.5到10.0，步长为1.5的浮点值序列：\n\
    \n```\nmodel.D = pyo.RangeSet(2.5, 11, 1.5)\n```\n\n### 4.6.2 使用集合对象\n\n`len()`\
    \ 函数返回集合中的元素数量：\n\n```\nmodel.A = pyo.Set(initialize=[1,2,3])\n\nprint(len(model.A))\
    \ # 3\n```"
