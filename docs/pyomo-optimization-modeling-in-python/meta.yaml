    \ `set_instance`、`remove_constraint` 和 `add_constraint` 方法的调用。\n\n以下代码块调用上述函数并报告执行时间。\n\
    \n```python\ntimer.tic()\nsolve_parametric_persistent()\ntimer.toc('Finished parameter\
    \ sweep with persistent interface')\n```\n\n输出结果如下。\n\n```\n[ 22.79] Resetting\
    \ the tic/toc delta timer\n[+ 0.91] finished parameter sweep with persistent interface\n\
