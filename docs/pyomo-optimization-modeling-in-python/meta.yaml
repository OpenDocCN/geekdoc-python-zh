    # ## Chapter 4


    # # Pyomo Models and Components: An Introduction


    **Abstract** This chapter describes the core classes used to define optimization
    models in Pyomo. Most of the discussion focuses on modeling components used to
    declare parts of a model. Included is a discussion of the options used when declaring
    the components and information about key component attributes and methods.


    # ## 4.1 An Object-Oriented AML


    Pyomo supports an object-oriented approach for representing mathematical optimization
    models. A model object is created, and then modeling components are added to this
    object to declare different parts of the model. Pyomo includes modeling components
    commonly supported by modern AMLs: variables, constraints, objectives, index sets,
    and symbolic parameters. This chapter describes the Pyomo modeling components.
    In subsequent chapters, additional components are introduced that provide enhanced
    functionality to represent advanced optimization model features.


    Users can create two types of models in Pyomo: concrete and abstract. A *concrete*
    model is constructed “on-the-fly” as each model component is declared. Therefore,
    the data associated with a concrete model must be specified before model components
    are declared. A user can leverage native Python data structures to define components
    in a concrete model. The `ConcreteModel` class is used to represent a concrete
    model.


    In contrast, an *abstract* model supports complete declaration of a model abstractly.
    A specific problem instance is not constructed until all components are declared
    and the data is provided. The `AbstractModel` class is used to create an abstract
    model. Because abstract models allow components to reference data before it is
    defined, they often rely on Pyomo data components such as `Set` and `Param` to
    provide an abstract definition of the data used to construct the model (although
    these components can be used on concrete models as well).'
  - '[PAGE 51]


    The following are the core modeling components in Pyomo:


    Var The Var component is used to represent optimization variables. Pyomo supports
    continuous and discrete variables, and includes several pre-defined domains.


    Objective The Objective component defines the function or functions to be optimized
    by the solver. This component contains the expression used to define the objective
    function, and a flag to indicate the sense (maximize or minimize).


    Constraint Constraints are used to define additional restrictions on the optimization
    variables. The Constraint component contains expressions and the appropriate relational
    operator. Pyomo supports equality (==) and general inequality (<= or >=) constraints.


    Set The Set component represents a collection of data that can include numeric
    (e.g., integer), or symbolic (e.g., string) elements. They are most commonly used
    to define valid indices for other components. Several common set operations are
    also supported.


    Param The Param component is used to represent numerical or symbolic values for
    data in the optimization problem. In contrast with simple Python data types (e.g.,
    float), Param objects support the ability to change values (meaning they are *mutable*),
    and include features like sparse representations and default values.


    Expression The Expression component can be used to create a Pyomo expression that
    can be reused in different parts of a Pyomo model. This is useful for representing
    common sub-expressions for memory efficiency. Similar to mutable parameters, the
    underlying expression can be changed between calls to the solver.


    Suffix Frequently, there is a need to provide, or receive, meta-data about a model
    or a component (e.g., dual information from a constraint). This is supported through
    the Pyomo Suffix component.


    This chapter describes each of these components in more detail. A variety of other
    modeling components are included in Pyomo, some of which are briefly discussed
    at the end of this chapter and covered in more detail in the remaining chapters
    of this book.


    > NOTE: Unless otherwise stated, the code snippets and examples used in this chapter
    refer to concrete models.


