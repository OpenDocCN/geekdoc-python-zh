  md: '# 13.2 Modeling Equilibrium Conditions


    # 13.2.1 Complementarity Conditions


    Ferris et al. [16] note that there are a few fundamental forms accounting for
    a wide range of complementarity conditions that arise in practice. Consider a
    variable $x$ and function $g(x)$. The classical form of complementarity condition
    can be expressed as


    $$x \geq 0 \perp g(x) \geq 0,$$


    which expresses the complementarity restriction that at least one of these must
    hold with equality. When the variable $x$ is bounded such that $x \in [l, u]$,
    then a *mixed complementarity condition* can be expressed as


    $$l \leq x \leq u \perp g(x),$$


    which expresses the complementarity restriction that at least one of the following
    must hold:


    $$\begin{aligned} x = l \quad &\text{and } g(x) \geq 0, \ x = u \quad &\text{and
    } g(x) \leq 0, \ \text{or } l < x < u \text{ and } g(x) = 0. \end{aligned}$$


    These forms can be generalized by substituting a function $f(x)$ for the variable
    $x$. Thus, a *generalized mixed complementarity condition* can be expressed as


    $$l \leq f(x) \leq u \perp g(x),$$


    which expresses the complementarity restriction that at least one of the following
    must hold:


    $$\begin{aligned} f(x) = l \quad &\text{and } g(x) \geq 0, \ f(x) = u \quad &\text{and
    } g(x) \leq 0, \ \text{or } l < f(x) < u \text{ and } g(x) = 0. \end{aligned}$$


    For completeness, note that the complementarity condition


    $$f(x) \perp g(x) = 0$$


    is a special case where the function $f(x)$ is unbounded.'
