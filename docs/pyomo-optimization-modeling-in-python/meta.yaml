    # 13.4 Solver Interfaces and Meta-Solvers


    Pyomo supports interfaces to third-party solvers as well as meta-solvers that
    apply transformations and third-party solvers, perhaps in an iterative manner.
    The `pyomo.mpec` package includes an interface to the `PATH` solver, as well as
    several meta-solvers. These are described in this section, and examples are provided
    employing the `pyomo` command-line interface.


    # 13.4.1 Nonlinear Reformulations


    The `mpec.simple_nonlinear` transformation provides a generic way for transforming
    an MPEC into a nonlinear program. When the MPEC only has continuous decision variables,
    the resulting model can be optimized by a wide range of solvers.


    For example, the `pyomo` command-line interface allows the user to specify a nonlinear
    solver and a model transformation applied to a model:


    ```

    pyomo solve --solver=ipopt \n             --transform=mpec.simple_nonlinear ex1a.py

    ```


    This example illustrates the use of the `ipopt` interior-point solver to solve
    a problem generated with the `mpec.simple_nonlinear` transformation. When a transformation
    is used directly like this, the results returned to the user include decision
    variables for the transformed model. Pyomo does not have general capabilities
    for mapping a solution back into the space from the original model. In this example,
    the results object includes values for the `x` variables as well as the variables
    `v` introduced when applying the transformation to the standard form as shown
    previously.


    Pyomo includes a meta-solver, `mpec_nlp` that applies the nonlinear transformation,
    performs optimization, and then returns results for the original decision variables.
    For example, `mpec_nlp` executes the same logic as the previous `pyomo` example:


    ```

    pyomo solve --solver=mpec_nlp ex1a.py

    ```


    Additionally, this meta-solver can also manipulate the `\epsilon` values in the
    model, starting with larger values and iteratively tightening them to generate
    a more accurate model.


    ```

    pyomo solve --solver=mpec_nlp \n            --solver-options="epsilon_initial=0.1
    \n                            epsilon_final=1e-7" \n            ex1a.py

    ```


    This approach may be useful when using a nonlinear solver that has difficulty
    optimizing with equality constraints.'
  - "[PAGE 206]\n\n# 13.4.2 Disjunctive Reformulations\n\nThe `mpec.simple_disjunction`\
    \ transformation provides a generic way for transforming an MPEC into a disjunctive\
    \ program. The `mpec_minlp` solver applies this transformation to create a nonlinear\
    \ disjunctive program, and then further reformulates the disjunctive model using\
    \ a “Big-M” transformation provided by the `pyomo.gdp` package. The resulting\
    \ transformation is similar to the reformulation of bilevel models described by\
    \ Fortuny-Amat and McCarl [20]. If the original model was nonlinear, then the\
    \ resulting model is a mixed-integer nonlinear program (MINLP). Pyomo includes\
    \ interfaces to solvers that use the AMPL Solver Library (ASL), so `mpec_minlp`\
    \ can optimize nonlinear MPECs with a solver like Couenne [10].\n\nIf the original\
    \ model was a linear MPEC, then the resulting model is a mixed-integer linear\
    \ program able to be globally optimized (e.g., see Hu et al. [33], Júdice [36]).\
    \ For example, the `pyomo` command can be used to execute the `mpec_minlp` solver\
    \ using a specified MIP solver:\n\n```\npyomo solve --solver=mpec_minlp \\n  \
    \          --solver-options=\"solver=glpk\" ralph1.py\n```\n\nNote that Pyomo\
    \ includes interfaces to a variety of MIP solvers, including CPLEX, Gurobi, CBC,\
    \ and GLPK.\n\n# 13.4.3 PATH and the ASL Solver Interface\n\nPyomo’s solver interface\
    \ for the AMPL Solver Library (ASL) applies the `mpec.nl` transformation, writes\
    \ an AMPL `.nl` file, executes an ASL solver, and then loads the solution into\
    \ the original model. Pyomo provides a custom interface to the PATH solver [14],\
    \ which simply allows the solver to be specified as `path` while the solver executable\
    \ is named `pathamp`.\n\nThe `pyomo` command can execute the PATH solver by simply\
    \ specifying the `path` solver name. For example, consider the `munson1` problem\
    \ from MCPLIB:\n\n```\n# munson1.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec\
    \ import Complementarity, complements\n\nmodel = pyo.ConcreteModel()\n\nmodel.x1\
    \ = pyo.Var()\nmodel.x2 = pyo.Var()\nmodel.x3 = pyo.Var()\n\nmodel.f1 = Complementarity(expr=complements(\n\
    \    model.x1 >= 0,\n    model.x1 + 2*model.x2 + 3*model.x3 >= 1))\n```"
