    \ndef obj_rule(model):\n    return sum(model.c[i]*model.x[i] for i in model.N)\n\
    model.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(model, m):\n    return\
    \ sum(model.a[i,m]*model.x[i] for i in model.N) \\\n           >= model.b[m]\n\
    model.con = pyo.Constraint(model.M, rule=con_rule)\n```\n\n这是一个存储在 `model` 变量中的抽象\
    \ Pyomo 模型。\n\n如果用户使用不同的变量名定义模型，则可以使用 `--model-name` 选项来指导 Pyomo 选择指定的名称。例如，我们可以修改前面的示例，将模型存储在\
    \ `Model` 中：\n\n```python\n# abstract6.py\nimport pyomo.environ as pyo\n\nModel\
    \ = pyo.AbstractModel()\n\nModel.N = pyo.Set()\nModel.M = pyo.Set()\nModel.c =\
    \ pyo.Param(Model.N)\nModel.a = pyo.Param(Model.N, Model.M)\nModel.b = pyo.Param(Model.M)\n\
    \nModel.x = pyo.Var(Model.N, within=pyo.NonNegativeReals)\n\ndef obj_rule(Model):\n\
    \    return sum(Model.c[i]*Model.x[i] for i in Model.N)\nModel.obj = pyo.Objective(rule=obj_rule)\n\
    \ndef con_rule(Model, m):\n    return sum(Model.a[i,m]*Model.x[i] for i in Model.N)\
    \ \\\n           >= Model.b[m]\nModel.con = pyo.Constraint(Model.M, rule=con_rule)\n\
    ```\n\n可以使用以下命令优化此模型：\n\n```\npyomo solve --solver=glpk --model-name=Model \\\n\
    \            abstract6.py abstract6.dat\n```\n\n除了为用户提供更大的灵活性外，此选项还允许用户在 Pyomo\
    \ 模型文件中定义多个模型，然后在执行 `solve` 子命令时选择要优化的模型。\n\n## 10.2.2.2 使用命名空间选择数据\n\n第 10.3.4\
    \ 节介绍了 Pyomo 数据文件中的 `namespace` 命令。此命令用于定义数据命令块，这些块可以有选择地集成到模型中。`solve` 子命令提供\
    \ `--namespace` 选项来指定一个或多个用于构建抽象模型实例的命名空间；`--ns` 是此选项的较短别名。例如，命令\n\n```\npyomo\
    \ solve --solver=glpk --namespace=data1 abstract5.py \\\n            abstract5-ns1.dat\n\
    ```\n\n使用以下数据命令创建并优化 `abstract5.py` 中的抽象模型：\n\n```\nnamespace data1 {\n    set\
    \ N := 1 2 ;\n    set M := 1 2 ;\n    param c :=\n    1 1\n    2 2 ;\n    param\
    \ a :=\n    1 1 3\n    2 1 4\n    1 2 2\n    2 2 5 ;\n    param b :=\n    1 1\n\
    \    2 2 ;\n}\n\nnamespace data2 {\n    set N := 3 4 ;\n    set M := 5 6 ;\n \
    \   param c :=\n    3 10\n    4 20 ;\n\n    param a :=\n    3 5 3\n    4 5 4\n\
    \    3 6 2\n    4 6 5 ;\n\n    param b :=\n    5 1\n    6 2 ;\n}\n```\n\n此命令指定\
    \ data1 命名空间，其最优解为 0.8。类似地，命令\n\n```\npyomo solve --solver=glpk --namespace=data2\
    \ abstract5.py \\\n            abstract5-ns1.dat\n```\n\n使用 data2 命名空间创建并优化同一模型，其最优解为\
    \ 8。data2 数据中使用了不同的索引集以及不同的目标系数。\n\n前面的示例说明了命名空间如何允许用户在单个数据命令文件中指定不同的数据集。请注意，模型可以使用多个命名空间（包括命名空间外的数据）的数据命令来构建。考虑以下数据命令：\n\
    \n```\nset N := 1 2;\n\nnamespace c1 {\n    param c :=\n    1 1\n    2 2 ;\n}\n\
    \nnamespace c2 {\n    param c :=\n    1 10\n    2 20 ;\n}\n\nnamespace data1 {\n\
    \    set M := 1 2 ;\n\n    param a :=\n    1 1 3\n    2 1 4\n    1 2 2\n    2\
    \ 2 5 ;\n\n    param b :=\n    1 1\n    2 2 ;\n}\n\nnamespace data2 {\n    set\
    \ M := 5 6 ;\n\n    param a :=\n    1 5 3\n    2 5 4\n    1 6 2\n    2 6 5 ;\n\
    \n    param b :=\n    5 1\n    6 2 ;\n}\n```\n\n这包括四个命名空间和命名空间外的数据命令。命令\n\n```\n\
    pyomo solve --solver=glpk --namespace=c1 --namespace=data2 \\\n            abstract5.py\
    \ abstract5-ns2.dat\n```\n\n使用 `c1` 和 `data2` 命名空间的数据命令以及任何命名空间之外的 `N` 数据命令，创建并优化\
    \ `abstract5.py` 中的抽象模型。请注意，如果多个命名空间包含相同组件的数据命令，则该组件将使用包含相应数据命令的第一个命名空间中的数据进行初始化。如果没有包含相应数据命令的命名空间，则使用命名空间外的数据命令初始化该组件。\n\
    \n## 10.2.2.3 自定义 Pyomo 的工作流\n\n`solve` 子命令执行的不同步骤代表了模型构建和优化的通用工作流。此工作流可以使用在 Pyomo\
    \ 模型文件中定义的各种回调函数进行自定义。这些回调函数允许用户定义额外的分析步骤，以及替换工作流中的一些默认步骤。"
