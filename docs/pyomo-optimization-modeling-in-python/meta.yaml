  md: 'real-world applications that are difficult to debug when errors occur. Additionally,
    solvers use many different input formats, but few of them are considered to be
    standards. Thus, the application of multiple solvers to analyze a single optimization
    model introduces additional complexities. Furthermore, model verification (i.e.,
    ensuring that the model communicated to the solver accurately reflects the model
    the developer intended to express) is extremely difficult without high-level languages
    for expressing models.


    AMLs are high-level languages for describing and solving optimization problems
    [26, 37]. AMLs minimize the difficulties associated with analyzing optimization
    models by enabling high-level specification of optimization problems. Furthermore,
    AML software provides rigorous interfaces to external solver packages that are
    used to analyze problems, and it allows the user to interact with solver results
    in the context of their high-level model specification.


    Custom AMLs like AIMMS [1], AMPL [2, 21], and GAMS [22] implement optimization
    model specification languages with an intuitive and concise syntax for defining
    variables, constraints, and objectives. Further, these AMLs support specification
    of abstract concepts such as sparse sets, indices, and algebraic expressions,
    which are essential when specifying large-scale, real-world problems with thousands
    or millions of constraints and variables. These AMLs can represent a wide variety
    of optimization models, and they interface with a rich set of solver packages.
    AMLs are increasingly being extended to include custom scripting capabilities,
    which enables expression of high-level analysis algorithms concurrently with optimization
    model specifications.


    A complementary strategy is to use an AML that extends a standard high-level programming
    language (as opposed to being based a proprietary language) to formulate optimization
    models that are analyzed with solvers written in low-level languages. This two-language
    approach leverages the flexibility of the high-level language for formulating
    optimization problems and the efficiency of the low-level language for numerical
    computations. This is an increasingly common approach for scientific computing
    software. The Matlab TOMLAB Optimization Environment [57] is among the most mature
    optimization software package using this approach; Pyomo strongly leverages this
    approach as well. Similarly, standard programming languages like Java and C++
    have been extended to include AML constructs. For example, modeling libraries
    like FlopC++ [19], OptimJ [47], and JuMP [13] support the specification of optimization
    models using an object-oriented design in C++, Java, and Julia, respectively.
    Although these modeling libraries sacrifice some of the intuitive mathematical
