    Population = \"More than yesterday.\"\n```\n\ncreates a variable that is not the\
    \ same as `population`. The assignment\n\n```python\npopulation = Population\n\
    ```\n\nwould cause the variable `population` to have the same value as `Population`\
    \ and therefore the same type.\n\n## A.5 Data Structures\n\nThis section summarizes\
    \ Python data structures helpful in scripting Pyomo applications. Many Python\
    \ and Pyomo data structures can be accessed by indexing their elements. Pyomo\
    \ typically starts indices and ranges with a one, while Python is zero based.\n\
    \n### A.5.1 Strings\n\nString literals can be enclosed in either single or double\
    \ quotes, which enables the other to be easily included in a string. Python supports\
    \ a wide range of string functions and operations. For example, the addition operator\
    \ (`+`) concatenates strings. To cast another type to string, use the `str` function.\
    \ The Python line:\n\n```python\nNameAge = \"SPAM was introduced in \" + str(1937)\n\
    ```\n\nassigns a string to the Python variable called `NameAge`.\n\n### A.5.2\
    \ Lists\n\nPython lists correspond roughly to arrays in many other programming\
    \ languages. Lists can be accessed element by element, as an entire list, or as\
    \ a partial list. The slicing character is a colon (`:`) and negative indices\
    \ indicate indexing from the end. The following Python session illustrates these\
    \ operations:\n\n```python\n>>> a = [3.14, 2.72, 100, 1234]\n>>> a\n[3.14, 2.72,\
    \ 100, 1234]\n>>> a[0]\n3.14\n>>> a[-2]\n100\n>>> a[1:-1]\n[2.72, 100]\n>>> a[:2]\
    \ + ['bacon', 2*2]\n[3.14, 2.72, 'bacon', 4]\n```\n\nThe addition operator concatenates\
    \ lists, and multiplication by an integer replicates lists.\n\n> NOTE: In Python,\
    \ lists can have mixed types such as the mixture of floats and integers just given.\n\
    \nThere are many list functions. Perhaps the most common is the append function,\
    \ which adds elements to the end of a list:\n\n```python\n>>> a = []\n>>> a.append(16)\n\
    >>> a.append(22.4)\n>>> a\n[16, 22.4]\n```\n\n### A.5.3 Tuples\n\nTuples are similar\
    \ to lists, but are intended to describe multi-dimensional objects. For example,\
    \ it would be reasonable to have a list of tuples. Tuples differ from lists in\
    \ that they use parentheses rather than square brackets for initialization. Additionally,\
    \ the members of a list can be changed by assignment while tuples cannot be changed\
    \ (i.e., tuples are immutable while lists are mutable). Although parentheses are\
    \ used for initialization, square brackets are used to reference individual elements\
    \ in a tuple (which is the same as for lists; this allows members of a list of\
    \ tuples to be accessed with code that looks like access to an array).\n\nSuppose\
    \ we have a tuple intended to represent the location of a point in a three-dimensional\
    \ space. The origin would be given by the tuple `(0,0,0)`. Consider the following\
    \ Python session:\n\n```python\n>>> orig = (0,0,0)\n>>> pt = (-1.1, 9, 6)\n>>>\
    \ pt[1]\n9\n>>> pt = orig\n>>> pt\n(0, 0, 0)\n```\n\nFor example, the statement\n\
    \n```python\npt[1] = 4\n```\n\nwould generate an error because tuple elements\
    \ cannot be overwritten. Of course the entire tuple can be overwritten, since\
    \ the assignment only impacts the variable containing the tuple."
