- img_proc: true
  md: "bination of parameter values is not valid. To provide this functionality for\
    \ an AbstractModel, Pyomo supports a set of components enabling execution of Python\
    \ code during the build process.\n\nThe BuildAction component can be defined in\
    \ the model to inject actions (defined through Python code) into the model construction\
    \ process. Similarly, the BuildCheck component is used to perform a user-defined\
    \ test (again, through Python code) during the model construction process and\
    \ halt construction if the test fails. These components are added to a model in\
    \ the same manner as other components, but their role is to allow a user to insert\
    \ scripting-like code into the model construction process.\n\nConsider the following\
    \ abstract model (defined in buildactions.py) illustrating the use of BuildAction\
    \ and BuildCheck components to define error checks and diagnostic output based\
    \ on our warehouse location example defined in Sections 3.2 and 10.1.3.\n\n```\n\
    import pyomo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\nmodel.N = pyo.Set()\
    \ # Set of warehouses\nmodel.M = pyo.Set() # Set of customers\nmodel.d = pyo.Param(model.N,model.M)\n\
    model.P = pyo.Param()\n\nmodel.x = pyo.Var(model.N, model.M, bounds=(0,1))\nmodel.y\
    \ = pyo.Var(model.N, within=pyo.Binary)\n\ndef checkPN_rule(model):\n    return\
    \ model.P <= len(model.N)\nmodel.checkPN = pyo.BuildCheck(rule=checkPN_rule)\n\
    \ndef obj_rule(model):\n    return sum(model.d[n,m]*model.x[n,m] for n in model.N\
    \ for m \\\n        in model.M)\nmodel.obj = pyo.Objective(rule=obj_rule)\n\n\
    def one_per_cust_rule(model, m):\n    return sum(model.x[n,m] for n in model.N)\
    \ == 1\nmodel.one_per_cust = pyo.Constraint(model.M, \\\n    rule=one_per_cust_rule)\n\
    \ndef warehouse_active_rule(model, n, m):\n    return model.x[n,m] <= model.y[n]\n\
    model.warehouse_active = pyo.Constraint(model.N, model.M, \\\n    rule=warehouse_active_rule)\n\
    \ndef num_warehouses_rule(model):\n    return sum(model.y[n] for n in model.N)\
    \ <= model.P\nmodel.num_warehouses = pyo.Constraint(rule=num_warehouses_rule)\n\
    ```"
