    -   `Complementarity`：此组件用于在具有平衡约束的数学规划中定义互补条件。支持多种互补条件形式。此组件在第13章中有进一步记录。\n-\
    \   `ContinuousSet`：此组件用于在建模微分方程时表示有界连续域。此组件在第12章中有进一步记录。\n-   `DerivativeVar`：此组件用于在建模微分方程时表示`Var`组件的导数。此组件在第12章中有进一步记录。\n\
    -   `Disjunct`：此组件支持Pyomo中的一般析取规划能力。`Disunct`组件是一个容器，包含一个指示变量和一组当该指示变量为True时应激活的约束。此组件在第11章中有进一步记录。\n\
    -   `Disjunction`：此组件支持Pyomo中的一般析取规划能力。`Disjunction`组件包含一组通过逻辑“或”运算符连接的`Disjunct`对象。此组件在第11章中有进一步记录。\n\
    -   `Piecewise`：此组件支持对一般函数进行分段建模。它支持多种不同的变换，以生成分段函数的混合整数表示。有关此组件的更多信息，请参阅Pyomo网站。\n\
    -   `SOSConstraint`：特殊有序集可以在Pyomo中通过`SOSConstraint`组件定义。Pyomo支持1型和2型特殊有序集。有关此组件的更多信息，请参阅Pyomo网站。\n\
    -   `BuildAction`和`BuildCheck`：这些组件主要用于抽象模型，并在第10.4节中描述。"
