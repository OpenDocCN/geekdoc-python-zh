  md: '# # 12.3.2 Collocation Transformation


    The second type of discretization included in `pyomo.dae` is collocation or more
    specifically, orthogonal collocation over finite elements. This approach works
    by first breaking a continuous domain into $N - 1$ segments known as finite elements.
    Over each of these segments, the profiles of the differential variables (variables
    whose derivatives appear in the model) are approximated using polynomials. The
    polynomials are defined using $K$ collocation points appearing as discretization
    points within each finite element. Continuity is enforced at the finite element
    boundaries for the differential variables. To provide a formal, mathematical representation
    of this approach applied to the derivative and differential equation (12.7) we
    have:


    $$

    \frac{dx}{dt}\bigg|_{t_{ij}} = \frac{1}{h_i} \sum_{j=0}^K x_{ij} \frac{d\ell_j(\tau_k)}{d\tau},
    \quad k=1,\dots,K, i=1,\dots,N-1 \quad (12.10)

    $$


    $$

    0 = g\left(\frac{dx}{dt}\bigg|_{t_{ij}}, f(x_{ik}, u_{ik})\right), \quad k=1,\dots,K,
    i=1,\dots,N-1 \quad (12.11)

    $$


    $$

    x_{i+1,0} = \sum_{j=0}^K \ell_j(1)x_{ij}, \quad i=1,\dots,N-1 \quad (12.12)

    $$


    where $t_{ij} = t_{i-1} + \tau_j h_i, x(t_{ij}) = x_{ij}$. Further, we note that
    the solution $x(t)$ is interpolated as follows:


    $$

    x(t) = \sum_{j=0}^K \ell_j(\tau)x_{ij}, \quad t \in [t_{i-1}, t_i], \quad \tau
    \in [0,1] \quad (12.13)

    $$


    $$

    \ell_j(\tau) = \prod_{\substack{k=0, \\ k \neq j}}^K \frac{(\tau - \tau_k)}{(\tau_j
    - \tau_k)}. \quad (12.14)

    $$


    Collocation methods produce significantly more accurate algebraic approximations
    compared to finite difference methods. However, they are much harder to implement
    manually. Variations of collocation methods differ in the functional representation
    of the differential variable profile over each finite element as well as the selection
    of the collocation points. As of this writing, the collocation transformations
    in `pyomo.dae` use Lagrange polynomials to represent differential variable profiles.
    Two options are available for the selection of collocation points: shifted Gauss-Radau
    roots (''LAGRANGE-RADAU'') and shifted Gauss-Legendre roots (''LAGRANGE-LEGENDRE'').'
