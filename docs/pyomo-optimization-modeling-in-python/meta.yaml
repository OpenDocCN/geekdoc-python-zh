  md: '# # A.2 Installing and Running Python


    as well as a rich set of built-in standard libraries available for use to quickly
    build sophisticated software applications. The goal in this Appendix is to provide
    a reference for Python constructs used in the rest of the book. A full introduction
    to Python is provided by resources such as those listed at the end of the chapter.


    Python codes are executed using an interpreter. When this interpreter starts,
    a command prompt is printed and the interpreter waits for the user to enter Python
    commands. For example, a standard way to get started with Python is to execute
    the interpreter from a shell environment and then print “Hello World”:


    ```

    % python

    Python 3.7.4 (default, Aug 13 2020, 20:35:49)

    [GCC 7.3.0] :: Anaconda, Inc. on linux

    Type "help", "copyright", "credits" or "license" for more \ information.

    >>> print ("Hello World")

    Hello World

    >>>

    ```


    On Windows the python command can be launched from the DOS shell (or other shells),
    and on *nix (which includes Macs) the python command can be launched from a bash
    or csh shell (or terminal). The Python interactive shell is similar to these shell
    environments; when a user enters a valid Python statement, it is immediately evaluated
    and its corresponding output is immediately printed.


    The interactive shell is useful for interrogating the state of complex data types.
    In most cases, this will involve single-line statements, like the print function
    shown in the previous example. Multi-line statements can also be entered into
    the interactive shell. Python uses the “...” prompt to indicate that a continuation
    line is needed to define a valid multi-line statement. For example, a conditional
    statement requires a block of statements defined on continuation lines:


    ```

    >>> x = True

    >>> if x:

    ...     print("x is True")

    ... else:

    ...     print("x is False")

    ...

    x is True

    ```


    > NOTE: Proper indentation is required for multi-line statements executed in the
    interactive shell.'
