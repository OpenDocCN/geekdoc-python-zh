  md: "# 13.3.2 Simple Nonlinear\n\nThe `mpec.simple_nonlinear` transformation begins\
    \ by applying the `mpec.standard_form` transformation. Subsequently, a nonlinear\
    \ constraint is created that defines the complementarity condition. This is a\
    \ simple nonlinear transformation adapted from Ferris et al. [17], which can be\
    \ described by three different cases:\n\n+   - If $l_1$ is finite, then the following\
    \ constraint is defined:\n  $$\\left( \\text{expr} - l_1 \\right) * v \\leq \\\
    varepsilon$$\n- If $u_1$ is finite, then the following constraint is defined:\n\
    \  $$\\left( u_1 - \\text{expr} \\right) * v \\leq \\varepsilon$$\n- If $l_2$\
    \ and $u_2$ are both finite, then the following constraints are defined:\n  $$\\\
    left( \\text{var} - l_2 \\right) * \\text{expr} \\leq \\varepsilon$$\n  $$\\left(\
    \ \\text{var} - u_2 \\right) * \\text{expr} \\leq \\varepsilon$$\n\nEach of these\
    \ cases ensure the complementarity condition is met when $\\varepsilon$ is zero.\
    \ For example, in the first case, we know $0 \\leq v$ and $0 \\leq \\text{expr}\
    \ - l_1$. When $\\varepsilon$ is zero, this constraint ensures either $v$ is zero\
    \ or $\\text{expr} - l_1$ is zero.\n\nThis transformation uses the parameter `mpec_bound`,\
    \ which defines the value for $\\varepsilon$ for every complementarity condition.\
    \ This allows for the specification of a relaxed nonlinear problem, which may\
    \ be easier to optimize with some nonlinear programming solvers. The default value\
    \ of `mpec_bound` is zero.\n\n# 13.3.3 Simple Disjunction\n\nThe `mpec.simple_disjunction`\
    \ transformation expresses a complementarity condition as a disjunctive program.\
    \ We are given a complementarity condition defined with a pair of constraint expressions\n\
    \n> $$l_1 \\leq \\text{expr}_1 \\leq u_1 \\perp l_2 \\leq \\text{expr}_2 \\leq\
    \ u_2,$$\n\nwhere exactly two of the constant bounds $l_1$, $u_1$, $l_2$ and $u_2$\
    \ are finite. Without loss of generality, we assume that either $l_1$ or $u_1$\
    \ is finite.\n\nThis transformation generates the constraints corresponding to\
    \ the conditions implied by the complementarity conditions (see Equation (13.1)).\
    \ There are three different cases:\n\n+   - If the first constraint is an equality,\
    \ then the complementarity condition is trivially replaced by that equality constraint."
