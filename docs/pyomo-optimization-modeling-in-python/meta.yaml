  md: "# 7.4 Nonlinear Programming Examples\n\nIn this section we present several\
    \ examples that illustrate the capabilities of Pyomo with nonlinear problems.\n\
    \n# 7.4.1 Variable Initialization for a Multimodal Function\n\nThe following example\
    \ illustrates the importance of effective variable initialization. Consider the\
    \ minimization of the following multimodal function:\n\n$f(x) = (2 - \\cos(\\\
    pi x) - \\cos(\\pi y))x^2 y^2$\n\nwhich has multiple local minima. The following\
    \ Pyomo model for this problem initializes the variables at $x=y=0.25$.\n\n```\n\
    # multimodal_init1.py\nimport pyomo.environ as pyo\nfrom math import pi\n\nmodel\
    \ = pyo.ConcreteModel()\nmodel.x = pyo.Var(initialize = 0.25, bounds=(0,4))\n\
    model.y = pyo.Var(initialize = 0.25, bounds=(0,4))\n\ndef multimodal(m):\n   \
    \ return (2-pyo.cos(pi*m.x)-pyo.cos(pi*m.y)) * (m.x**2) * \\n           (m.y**2)\n\
    model.obj = pyo.Objective(rule=multimodal, sense=pyo.minimize)\n\nstatus = pyo.SolverFactory('ipopt').solve(model)\n\
    pyo.assert_optimal_termination(status)\nprint(pyo.value(model.x), pyo.value(model.y))\n\
    ```\n\nThis problem can be solved with the command:\n\n```\npython multimodel_init1.py\n\
    ```\n\nIPOPT finds the solution close to our initial point $x=y=0.0178$. However,\
    \ if we change the problem and initialize the variables at $x=y=2.1$,\n\n```\n\
    model.x = pyo.Var(initialize = 2.1, bounds=(0,4))\nmodel.y = pyo.Var(initialize\
    \ = 2.1, bounds=(0,4))\n```\n\nthen IPOPT finds a different local solution at\
    \ $x=y=2.0$."
