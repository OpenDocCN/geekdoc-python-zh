    # 10.2 The `pyomo` Command


    The Pyomo software distribution includes a pre-defined execution script, the `pyomo`
    command, that includes a variety of subcommands supporting use of Pyomo. The following
    subcommands are supported in Pyomo 6.0:


    `check`

    This subcommand checks a model for errors. This is particularly useful for evaluating
    the logic of rules in abstract models.


    `convert`

    This subcommand is used to convert a Pyomo model into another format, such as
    an `lp` or `nl` file.


    `help`

    Print information about the configuration and installation of Pyomo. For example,
    the `-s` option provides information about available solvers:


    ```

    shell

    pyomo help -s

    ```


    `run`

    Execute a command from the Pyomo bin (or Scripts) directory. For example, this
    provides a handy mechanism for launching Python with Pyomo installed:


    ```

    shell

    pyomo run python

    ```


    `solve`

    Construct and optimize a model.


    `test-solvers`

    Execute a variety of tests to verify solver capabilities.


    The following sections illustrate the use of the `check`, `convert`, `help` and
    `solve` subcommands, which can be customized with a variety of options.'
