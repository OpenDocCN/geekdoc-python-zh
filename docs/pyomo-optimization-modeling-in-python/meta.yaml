  md: "# 10.3.3 The `include` Command\n\nThe `include` command allows a data command\
    \ file to execute data commands from another file. For example, the following\
    \ command file executes data commands from `ex1.dat` and then `ex2.dat`:\n\n```\n\
    include ex1.dat;\ninclude ex2.dat;\n```\n\nPyomo is sensitive to the order of\
    \ execution of data commands, since data commands can redefine set and parameter\
    \ values. The `include` command respects this data ordering; all data commands\
    \ in the included file are executed before the remaining data commands in the\
    \ current file are executed.\n\n# 10.3.4 Data Namespaces\n\nThe `namespace` keyword\
    \ is not a data command, but instead it is used to structure the specification\
    \ of Pyomo’s data commands. Specifically, a namespace declaration is used to group\
    \ data commands and to provide a group label. Consider the following data command\
    \ file:\n\n```\nset C := 1 2 3 ;\n\nnamespace ns1\n{\n    set C := 4 5 6 ;\n}\n\
    \nnamespace ns2\n{\n    set C := 7 8 9 ;\n}\n```\n\nThis data file defines two\
    \ namespaces: `ns1` and `ns2` that initialize a set `C`. By default, data commands\
    \ contained within a namespace are ignored during model construction; when no\
    \ namespaces are specified, the set `C` has values 1, 2, 3. When namespace `ns1`\
    \ is specified, then set `C` values are overridden with the set 4, 5, 6. See Section\
    \ 10.2.2.2 for an example of how namespaces are selected with the `pyomo` command.\n\
    \n# 10.4 Build Components\n\nIn a function constructing a `ConcreteModel` one\
    \ can insert Python code anywhere in the process. One can, for example, fix a\
    \ particular combination of variables, print the value of a parameter, or throw\
    \ an exception if a particular com-"
