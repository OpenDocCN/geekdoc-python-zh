    # A.5 Data Structures


    This section summarizes Python data structures helpful in scripting Pyomo applications.
    Many Python and Pyomo data structures can be accessed by indexing their elements.
    Pyomo typically starts indices and ranges with a one, while Python is zero based.


    # A.5.1 Strings


    String literals can be enclosed in either single or double quotes, which enables
    the other to be easily included in a string. Python supports a wide range of string
    functions and operations. For example, the addition operator (+) concatenates
    strings. To cast another type to string, use the `str` function. The Python line:


    ```

    python

    NameAge = "SPAM was introduced in " + str(1937)

    ```


    assigns a string to the Python variable called `NameAge`.


    # A.5.2 Lists


    Python lists correspond roughly to arrays in many other programming languages.
    Lists can be accessed element by element, as an entire list, or as a partial list.
    The slicing character is a colon (:) and negative indices indicate indexing from
    the end. The following Python session illustrates these operations:


    ```

    python

    >>> a = [3.14, 2.72, 100, 1234]

    >>> a

    [3.14, 2.72, 100, 1234]

    >>> a[0]

    3.14

    >>> a[-2]

    100

    >>> a[1:-1]

    [2.72, 100]

    >>> a[:2] + [''bacon'', 2*2]

    [3.14, 2.72, ''bacon'', 4]

    ```


    The addition operator concatenates lists, and multiplication by an integer replicates
    lists.'
  - '[PAGE 213]


    > NOTE: In Python, lists can have mixed types such as the mixture of floats and
    integers just given.


    There are many list functions. Perhaps the most common is the append function,
    which adds elements to the end of a list:


    ```

    >>> a = []

    >>> a.append(16)

    >>> a.append(22.4)

    >>> a

    [16, 22.4]

    ```


    # A.5.3 Tuples


    Tuples are similar to lists, but are intended to describe multi-dimensional objects.
    For example, it would be reasonable to have a list of tuples. Tuples differ from
    lists in that they use parentheses rather than square brackets for initialization.
    Additionally, the members of a list can be changed by assignment while tuples
    cannot be changed (i.e., tuples are immutable while lists are mutable). Although
    parentheses are used for initialization, square brackets are used to reference
    individual elements in a tuple (which is the same as for lists; this allows members
    of a list of tuples to be accessed with code that looks like access to an array).


    Suppose we have a tuple intended to represent the location of a point in a three-dimensional
    space. The origin would be given by the tuple (0,0,0). Consider the following
    Python session:


    ```

    >>> orig = (0,0,0)

    >>> pt = (-1.1, 9, 6)

    >>> pt[1]

    9

    >>> pt = orig

    >>> pt

    (0, 0, 0)

    ```


    For example, the statement


    ```

    pt[1] = 4

    ```


    would generate an error because tuple elements cannot be overwritten. Of course
    the entire tuple can be overwritten, since the assignment only impacts the variable
    containing the tuple.'
