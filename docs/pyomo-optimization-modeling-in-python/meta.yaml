    \n# 7.4.1 Variable Initialization for a Multimodal Function\n\nThe following example\
    \ illustrates the importance of effective variable initialization. Consider the\
    \ minimization of the following multimodal function:\n\n$f(x) = (2 - \\cos(\\\
    pi x) - \\cos(\\pi y))x^2 y^2$\n\nwhich has multiple local minima. The following\
    \ Pyomo model for this problem initializes the variables at $x=y=0.25$.\n\n```\n\
    # multimodal_init1.py\nimport pyomo.environ as pyo\nfrom math import pi\n\nmodel\
    \ = pyo.ConcreteModel()\nmodel.x = pyo.Var(initialize = 0.25, bounds=(0,4))\n\
    model.y = pyo.Var(initialize = 0.25, bounds=(0,4))\n\ndef multimodal(m):\n   \
    \ return (2-pyo.cos(pi*m.x)-pyo.cos(pi*m.y)) * (m.x**2) * \\n           (m.y**2)\n\
    model.obj = pyo.Objective(rule=multimodal, sense=pyo.minimize)\n\nstatus = pyo.SolverFactory('ipopt').solve(model)\n\
    pyo.assert_optimal_termination(status)\nprint(pyo.value(model.x), pyo.value(model.y))\n\
    ```\n\nThis problem can be solved with the command:\n\n```\npython multimodel_init1.py\n\
    ```\n\nIPOPT finds the solution close to our initial point $x=y=0.0178$. However,\
    \ if we change the problem and initialize the variables at $x=y=2.1$,\n\n```\n\
    model.x = pyo.Var(initialize = 2.1, bounds=(0,4))\nmodel.y = pyo.Var(initialize\
    \ = 2.1, bounds=(0,4))\n```\n\nthen IPOPT finds a different local solution at\
    \ $x=y=2.0$."
- md: "## 7.4.2 Optimal Quotas for Sustainable Harvesting of Deer\n\nMaintaining a\
    \ healthy deer population relies on both the management of effective habitats\
    \ and a sustainable harvesting policy. Among most hunters there is high demand\
    \ for tags that allow them to take bucks. However, harvesting too many bucks within\
    \ a population can limit future population growth. We consider a nonlinear programming\
    \ formulation that determines an optimal policy for deer harvesting by maximizing\
    \ the value of the harvest while maintaining a strong and sustainable deer population.\n\
    \nConsider a model adapted from Bailey [5] describing the dynamics of the deer\
    \ population. The deer population in a given area can be divided into three sub-populations:\
    \ bucks, does, and fawns. Additionally, each year is divided into four periods:\
    \ winter, breeding season, summer, and harvest. The model describing the population\
    \ dynamics is based on the following assumptions:\n\n- It is assumed the sub-populations\
    \ can be represented by continuous variables (i.e., population numbers are large\
    \ enough to make this a good approximation).\n- Each season, there is a reduction\
    \ in the number of bucks, does, and fawns. This reduction is assumed to be due\
    \ to natural causes and is proportional to the size of the sub-populations. This\
    \ reduction is captured by specifying a fractional survival rate depending on\
    \ the period (winter, breeding, summer, harvest) and the sub-population in question\
    \ (bucks, does, fawns).\n- New fawns are born each year during the breeding season.\
    \ Fawns are born from does and older fawns according to a birth rate depending\
    \ on the available amount of food. Half of them are assumed to be male and half\
    \ are assumed to be female. After surviving one year, half of the remaining fawns\
    \ become bucks and half become does.\n- The total yearly food supply is constant\
    \ and represents a constraint based on habitat management.\n- All harvesting is\
    \ based on hunting. Hunting quotas can be set for each sub-population, and these\
    \ quotas are assumed to be completely filled (i.e., all hunters are successful).\n\
    \nThe complete derivation of the sub-population model is given in [5], resulting\
    \ in the following set of difference equations,\n\n$$\n\\begin{aligned}\nf_{y+1}\
    \ &= p_1 b r_y \\left( \\frac{p_2}{10} f_y + p_3 d_y \\right) - h_y^f \\quad (7.1)\
    \ \\\\\nd_{y+1} &= p_4 d_y + \\frac{p_5}{2} f_y - h_y^d \\quad (7.2) \\\\\nb_{y+1}\
    \ &= p_6 b_y + \\frac{p_5}{2} f_y - h_y^b \\quad (7.3) \\\\\nb r_y &= 1.1 + 0.8\
    \ \\frac{p_s - c_y}{p_s} \\quad (7.4) \\\\\nc_y &= p_7 b_y + p_8 d_y + p_9 f_y\
    \ \\quad (7.5)\n\\end{aligned}\n$$\n\nwhere the value for parameters $p_1$ through\
    \ $p_9$ are calculated from the various survival rates and food consumption rates.\
    \ These values are given in Table 7.3. The variables $f_y$, $d_y$, and $b_y$ represent\
    \ the number of fawns, does, and bucks in year $y$, respectively. Likewise, $h_y^f$,\
    \ $h_y^d$, and $h_y^b$ are the unknown numbers of fawns, does, and bucks harvested\
    \ in year $y$, respectively. The birth rate $br_y$ for does is described by a\
    \ nonlinear relationship where $c_y$ is the amount of food consumed by the deer\
    \ (in pounds) and $p_s$ is the total available supply of food (again in pounds).\n\
    \nTable 7.3: Parameter values used by the deer harvesting problem.\n\n| parameter\
    \ | value | parameter | value |\n|-----------|-------|-----------|-------|\n|\
    \ $p_1$ | 0.88 | $p_7$ | 2700.0 |\n| $p_2$ | 0.82 | $p_8$ | 2300.0 |\n| $p_3$\
    \ | 0.92 | $p_9$ | 540.0 |\n| $p_4$ | 0.84 | $w_f$ | 1.0 |\n| $p_5$ | 0.73 | $w_d$\
    \ | 1.0 |\n| $p_6$ | 0.87 | $w_b$ | 10.0 |\n| $p_s$ | 700000 | | |\n\nIn the original\
    \ reference, this set of difference equations was optimized in the formulation\
    \ over a period of 20 years so that a sustainable steady-state policy could be\
    \ deduced from the values at later years. Here, instead include only one year\
    \ and add the constraint that the number of fawns, does, and bucks at year $y+1$\
    \ is equal to those at $y$. This provides the same steady-state solution with\
    \ a significantly smaller formulation.\n\nThe objective is to maximize the value\
    \ of the harvest, giving the following non-linear programming formulation,\n\n\
    $$\n\\begin{aligned}\n\\max \\quad & w_b h_y^b + w_f h_y^f + w_d h_y^d & (7.6)\
    \ \\\\\ns.t. \\quad & f_y = p_1 br_y \\left( \\frac{p_2}{10} f_y + p_3 d_y \\\
    right) - h_y^f & (7.7) \\\\\n& d_y = p_4 d_y + \\frac{p_5}{2} f_y - h_y^d & (7.8)\
    \ \\\\\n& b_y = p_6 b_y + \\frac{p_5}{2} f_y - h_y^b & (7.9) \\\\\n& br_y = 1.1\
    \ + 0.8 \\frac{p_s - c_y}{p_s} & (7.10) \\\\\n& c_y = p_7 b_y + p_8 d_y + p_9\
    \ f_y & (7.11) \\\\\n& c_y \\le p_s & (7.12) \\\\\n& b_y \\ge \\frac{1}{5} \\\
    left( 0.4 f_y + d_y \\right) & (7.13)\n\\end{aligned}\n$$\n\nwhere $w_f$, $w_d$\
    \ and $w_b$ represent the value of harvesting a fawn, doe, and buck, respectively.\
    \ As can be seen in Table 7.3, it is assumed that the value of a buck tag is 10\
    \ times the value of a doe or fawn tag. Equation (7.12) ensures that the amount\
    \ of consumed food cannot be more than the available supply, thereby restricting\
    \ the overall size of the population. Equation (7.13) ensures that the number\
    \ of bucks is large enough for effective, sustainable breeding.\n\nThe following\
    \ Pyomo model represents the optimal deer harvesting problem:\n\n```python\n#\
    \ DeerProblem.py\nimport pyomo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\
    \nmodel.p1 = pyo.Param();\nmodel.p2 = pyo.Param();\nmodel.p3 = pyo.Param();\n\
    model.p4 = pyo.Param();\nmodel.p5 = pyo.Param();\nmodel.p6 = pyo.Param();\nmodel.p7\
    \ = pyo.Param();\nmodel.p8 = pyo.Param();\nmodel.p9 = pyo.Param();\nmodel.ps =\
    \ pyo.Param();\n\nmodel.f = pyo.Var(initialize = 20, within=pyo.PositiveReals)\n\
    model.d = pyo.Var(initialize = 20, within=pyo.PositiveReals)\nmodel.b = pyo.Var(initialize\
    \ = 20, within=pyo.PositiveReals)\n\nmodel.hf = pyo.Var(initialize = 20, within=pyo.PositiveReals)\n\
    model.hd = pyo.Var(initialize = 20, within=pyo.PositiveReals)\nmodel.hb = pyo.Var(initialize\
    \ = 20, within=pyo.PositiveReals)\n\nmodel.br = pyo.Var(initialize=1.5, within=pyo.PositiveReals)\n\
    \nmodel.c = pyo.Var(initialize=500000, within=pyo.PositiveReals)\n\ndef obj_rule(m):\n\
    \    return 10*m.hb + m.hd + m.hf\nmodel.obj = pyo.Objective(rule=obj_rule, sense=pyo.maximize)\n\
    \ndef f_bal_rule(m):\n    return m.f == m.p1*m.br*(m.p2/10.0*m.f + m.p3*m.d) -\
    \ m.hf\nmodel.f_bal = pyo.Constraint(rule=f_bal_rule)\n\ndef d_bal_rule(m):\n\
    \    return m.d == m.p4*m.d + m.p5/2.0*m.f - m.hd\nmodel.d_bal = pyo.Constraint(rule=d_bal_rule)\n\
    \ndef b_bal_rule(m):\n    return m.b == m.p6*m.b + m.p5/2.0*m.f - m.hb\nmodel.b_bal\
    \ = pyo.Constraint(rule=b_bal_rule)\n\ndef food_cons_rule(m):\n    return m.c\
    \ == m.p7*m.b + m.p8*m.d + m.p9*m.f\nmodel.food_cons = pyo.Constraint(rule=food_cons_rule)\n\
    \ndef supply_rule(m):\n    return m.c <= m.ps\nmodel.supply = pyo.Constraint(rule=supply_rule)\n\
    \ndef birth_rule(m):\n    return m.br == 1.1 + 0.8*(m.ps - m.c)/m.ps\nmodel.birth\
    \ = pyo.Constraint(rule=birth_rule)\n\ndef minbuck_rule(m):\n    return m.b >=\
    \ 1.0/5.0*(0.4*m.f + m.d)\nmodel.minbuck = pyo.Constraint(rule=minbuck_rule)\n\
    \n# create the ConcreteModel\ninstance = model.create_instance('DeerProblem.dat')\n\
    status = pyo.SolverFactory('ipopt').solve(instance)\npyo.assert_optimal_termination(status)\n\
    \ninstance.pprint()\n```\n\nThe following data file represents the parameters\
    \ in Table 7.3:\n\n```\n# DeerProblem.dat\nparam p1 := 0.88;\nparam p2 := 0.82;\n\
    param p3 := 0.92;\nparam p4 := 0.84;\nparam p5 := 0.73;\nparam p6 := 0.87;\nparam\
    \ p7 := 2700;\nparam p8 := 2300;\nparam p9 := 540;\nparam ps := 700000;\n```\n\
    \nThis problem can be optimized with the command:\n\n```bash\npython DeerProblem.py\n\
    ```\n\nThe optimal solution is to harvest 62 bucks, 37 does, and no fawns. This\
    \ solution favors harvesting of bucks, but harvesting too many bucks would affect\
    \ population growth. The residual for the minbuck constraint is essentially zero,\
    \ which means that this inequality constraint is binding at the solution. Therefore,\
    \ this constraint is restricting the number of bucks that can be harvested.\n\n\
    Obviously, this solution is a function of the parameter values that determine\
    \ the value of fawns, does, and bucks in the objective function, as well as the\
    \ parameters in model for the population dynamics. Because Pyomo is built with\
    \ Python, it is straightforward to develop a script to determine the optimal solution\
    \ as a function of different parameter values, enabling more advanced analysis\
    \ of the system. Chapter 5 gives more discussion of this functionality."
  mdcn: "## 7.4.2 鹿群可持续狩猎的最优配额\n\n维持健康的鹿群数量依赖于有效栖息地的管理和可持续的狩猎政策。大多数猎人普遍希望获得猎取公鹿的许可标签。然而，在一个种群中捕猎过多公鹿可能会限制未来的种群增长。我们考虑一个非线性规划模型，该模型通过最大化捕猎价值来确定最优的狩猎策略，同时确保鹿群数量保持稳定且可持续。\n\
    \n考虑一个改编自 Bailey [5] 的模型，用于描述鹿群的动态变化。特定区域的鹿群可以分为三个子种群：公鹿、母鹿和幼鹿。此外，一年被划分为四个时期：冬季、繁殖季、夏季和狩猎季。描述种群动态的模型基于以下假设：\n\
    \n- 假设子种群可以用连续变量表示（即种群数量足够大，此近似方法有效）。\n- 每个季节，公鹿、母鹿和幼鹿的数量都会减少。这种减少被假定是自然原因造成的，并与各子种群的大小成比例。这种减少通过为每个时期（冬季、繁殖季、夏季、狩猎季）和相关子种群（公鹿、母鹿、幼鹿）指定一个存活率分数来体现。\n\
    - 每年繁殖季期间会有新的幼鹿出生。幼鹿由母鹿和年长的幼鹿所生，其出生率取决于可用食物量。假设其中一半为雄性，一半为雌性。存活一年后，剩余幼鹿中一半成为公鹿，一半成为母鹿。\n\
    - 每年的总食物供应量是恒定的，这代表了基于栖息地管理的一个约束。\n- 所有捕猎都基于狩猎。可以为每个子种群设定狩猎配额，并假设这些配额会被完全达到（即所有猎人都成功狩猎）。\n\
    \n子种群模型的完整推导过程见 [5]，得到如下差分方程组：\n\n$$\n\\begin{aligned}\nf_{y+1} &= p_1 b r_y \\\
    left( \\frac{p_2}{10} f_y + p_3 d_y \\right) - h_y^f \\quad (7.1) \\\\\nd_{y+1}\
    \ &= p_4 d_y + \\frac{p_5}{2} f_y - h_y^d \\quad (7.2) \\\\\nb_{y+1} &= p_6 b_y\
    \ + \\frac{p_5}{2} f_y - h_y^b \\quad (7.3) \\\\\nb r_y &= 1.1 + 0.8 \\frac{p_s\
    \ - c_y}{p_s} \\quad (7.4) \\\\\nc_y &= p_7 b_y + p_8 d_y + p_9 f_y \\quad (7.5)\n\
    \\end{aligned}\n$$\n\n其中，参数 $p_1$ 至 $p_9$ 的值由各种存活率和食物消耗率计算得出。这些值在表 7.3 中给出。变量\
    \ $f_y$、$d_y$ 和 $b_y$ 分别表示第 $y$ 年的幼鹿、母鹿和公鹿的数量。同样，$h_y^f$、$h_y^d$ 和 $h_y^b$ 分别是第\
    \ $y$ 年被捕获的幼鹿、母鹿和公鹿的未知数量。母鹿的出生率 $br_y$ 用一个非线性关系描述，其中 $c_y$ 是鹿群消耗的食物量（以磅计），$p_s$\
    \ 是可用的食物总供应量（同样以磅计）。\n\n表 7.3：鹿群狩猎问题使用的参数值。\n\n| 参数 | 值 | 参数 | 值 |\n|-----------|-------|-----------|-------|\n\
    | $p_1$ | 0.88 | $p_7$ | 2700.0 |\n| $p_2$ | 0.82 | $p_8$ | 2300.0 |\n| $p_3$\
    \ | 0.92 | $p_9$ | 540.0 |\n| $p_4$ | 0.84 | $w_f$ | 1.0 |\n| $p_5$ | 0.73 | $w_d$\
    \ | 1.0 |\n| $p_6$ | 0.87 | $w_b$ | 10.0 |\n| $p_s$ | 700000 | | |\n\n在原始文献中，这组差分方程在一个20年的周期内进行优化建模，以便从后期的数值中推导出可持续的稳态策略。这里，我们改为只考虑一年，并添加约束条件：第\
    \ $y+1$ 年的幼鹿、母鹿和公鹿数量等于第 $y$ 年的数量。这以显著更小的模型规模提供了相同的稳态解。\n\n目标是最大化捕猎价值，由此得到以下非线性规划模型：\n\
    \n$$\n\\begin{aligned}\n\\max \\quad & w_b h_y^b + w_f h_y^f + w_d h_y^d & (7.6)\
    \ \\\\\ns.t. \\quad & f_y = p_1 br_y \\left( \\frac{p_2}{10} f_y + p_3 d_y \\\
    right) - h_y^f & (7.7) \\\\\n& d_y = p_4 d_y + \\frac{p_5}{2} f_y - h_y^d & (7.8)\
    \ \\\\\n& b_y = p_6 b_y + \\frac{p_5}{2} f_y - h_y^b & (7.9) \\\\\n& br_y = 1.1\
    \ + 0.8 \\frac{p_s - c_y}{p_s} & (7.10) \\\\\n& c_y = p_7 b_y + p_8 d_y + p_9\
    \ f_y & (7.11) \\\\\n& c_y \\le p_s & (7.12) \\\\\n& b_y \\ge \\frac{1}{5} \\\
    left( 0.4 f_y + d_y \\right) & (7.13)\n\\end{aligned}\n$$\n\n其中 $w_f$、$w_d$ 和\
    \ $w_b$ 分别表示捕猎一头幼鹿、母鹿和公鹿的价值。如表 7.3 所示，假设一张公鹿标签的价值是母鹿或幼鹿标签价值的10倍。方程 (7.12) 确保消耗的食物量不超过可用供应量，从而限制种群的整体规模。方程\
    \ (7.13) 确保公鹿数量足够多，以进行有效的可持续繁殖。\n\n以下 Pyomo 模型代表了最优鹿群狩猎问题：\n\n```python\n# DeerProblem.py\n\
    import pyomo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\nmodel.p1 = pyo.Param();\n\
    model.p2 = pyo.Param();\nmodel.p3 = pyo.Param();\nmodel.p4 = pyo.Param();\nmodel.p5\
    \ = pyo.Param();\nmodel.p6 = pyo.Param();\nmodel.p7 = pyo.Param();\nmodel.p8 =\
    \ pyo.Param();\nmodel.p9 = pyo.Param();\nmodel.ps = pyo.Param();\n\nmodel.f =\
    \ pyo.Var(initialize = 20, within=pyo.PositiveReals)\nmodel.d = pyo.Var(initialize\
    \ = 20, within=pyo.PositiveReals)\nmodel.b = pyo.Var(initialize = 20, within=pyo.PositiveReals)\n\
    \nmodel.hf = pyo.Var(initialize = 20, within=pyo.PositiveReals)\nmodel.hd = pyo.Var(initialize\
    \ = 20, within=pyo.PositiveReals)\nmodel.hb = pyo.Var(initialize = 20, within=pyo.PositiveReals)\n\
    \nmodel.br = pyo.Var(initialize=1.5, within=pyo.PositiveReals)\n\nmodel.c = pyo.Var(initialize=500000,\
    \ within=pyo.PositiveReals)\n\ndef obj_rule(m):\n    return 10*m.hb + m.hd + m.hf\n\
    model.obj = pyo.Objective(rule=obj_rule, sense=pyo.maximize)\n\ndef f_bal_rule(m):\n\
    \    return m.f == m.p1*m.br*(m.p2/10.0*m.f + m.p3*m.d) - m.hf\nmodel.f_bal =\
    \ pyo.Constraint(rule=f_bal_rule)\n\ndef d_bal_rule(m):\n    return m.d == m.p4*m.d\
    \ + m.p5/2.0*m.f - m.hd\nmodel.d_bal = pyo.Constraint(rule=d_bal_rule)\n\ndef\
    \ b_bal_rule(m):\n    return m.b == m.p6*m.b + m.p5/2.0*m.f - m.hb\nmodel.b_bal\
    \ = pyo.Constraint(rule=b_bal_rule)\n\ndef food_cons_rule(m):\n    return m.c\
    \ == m.p7*m.b + m.p8*m.d + m.p9*m.f\nmodel.food_cons = pyo.Constraint(rule=food_cons_rule)\n\
    \ndef supply_rule(m):\n    return m.c <= m.ps\nmodel.supply = pyo.Constraint(rule=supply_rule)\n\
    \ndef birth_rule(m):\n    return m.br == 1.1 + 0.8*(m.ps - m.c)/m.ps\nmodel.birth\
    \ = pyo.Constraint(rule=birth_rule)\n\ndef minbuck_rule(m):\n    return m.b >=\
    \ 1.0/5.0*(0.4*m.f + m.d)\nmodel.minbuck = pyo.Constraint(rule=minbuck_rule)\n\
    \n# create the ConcreteModel\ninstance = model.create_instance('DeerProblem.dat')\n\
    status = pyo.SolverFactory('ipopt').solve(instance)\npyo.assert_optimal_termination(status)\n\
    \ninstance.pprint()\n```\n\n以下数据文件代表表 7.3 中的参数：\n\n```\n# DeerProblem.dat\nparam\
    \ p1 := 0.88;\nparam p2 := 0.82;\nparam p3 := 0.92;\nparam p4 := 0.84;\nparam\
    \ p5 := 0.73;\nparam p6 := 0.87;\nparam p7 := 2700;\nparam p8 := 2300;\nparam\
    \ p9 := 540;\nparam ps := 700000;\n```\n\n可以使用以下命令对此问题进行优化：\n\n```bash\npython\
    \ DeerProblem.py\n```\n\n最优解是捕猎62头公鹿、37头母鹿，不捕猎幼鹿。该解倾向于捕猎公鹿，但捕猎过多公鹿会影响种群增长。`minbuck`约束的残差基本为零，这意味着在最优解处此不等式约束是紧的。因此，正是这个约束限制了可以捕猎的公鹿数量。\n\
    \n显然，这个解是参数值的函数，这些参数值决定了目标函数中幼鹿、母鹿和公鹿的价值，以及种群动态模型中的参数。由于 Pyomo 建立在 Python 之上，可以轻松编写一个脚本，将最优解表示为不同参数值的函数，从而实现对系统的更高级分析。第\
    \ 5 章将对此功能进行更多讨论。"
