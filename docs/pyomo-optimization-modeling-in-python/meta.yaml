  md: '# # Chapter 6 Interacting with Solvers


    Abstract This chapter describes how to interface with solvers in Pyomo. Basic
    functionality supported by all interfaces includes translation of a Pyomo instance
    into the format required by a solver, solver options processing, solver invocation,
    solve status checking, and solution loading.


    # ## 6.1 Introduction


    Figure 6.1 shows a high-level view of the relationship between Pyomo and optimization
    software that we will refer to as a *solver*. Pyomo is a modeling tool and does
    not, itself, include solvers. Rather Pyomo has several interfaces to solvers.
    As shown in the figure, Pyomo translates the model into a format used by a solver.
    The results of the solver are used to populate the Var objects in the Pyomo model
    and a *Results* object is also returned that can be queried to obtain more information
    about solver execution. Additional information can be sent to the solver (e.g.,
    options) and received from the solver (e.g. dual values) but these are not shown
    in the figure.


    +   - A *shell solver* is launched as a separate sub-process by running an executable
    found on the user''s PATH environment. Pyomo interfaces with these solvers through
    files. Pyomo generates a file description of the problem, launches the solver,
    and then loads the results from log files and standard output files. This is a
    common form of solver.

    - A *direct solver* is executed as a subroutine. Pyomo interfaces with these solvers
    through libraries installed and exposed in the form of Python packages. This is
    a less common form of solver, since it relies on the existence of Python interfaces
    to solver libraries.

    - A *persistent solver* is related to a direct solver, but includes additional
    capabilities to allow for incremental modification and re-solve of a model. Persistent'
