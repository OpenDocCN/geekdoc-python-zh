    # ## Solver Integration


    Pyomo supports both tightly and loosely coupled solver interfaces. Tightly coupled
    modeling tools directly access optimization solver libraries (e.g., via static
    or dynamic linking), and loosely coupled modeling tools apply external optimization
    executables (e.g., through the use of system calls). Many optimization solvers
    read problems from well-known data formats (e.g., the AMPL nl format [24]); these
    solvers are loosely coupled with Pyomo. Solvers with Python interfaces (e.g.,
    Gurobi and CPLEX) can be tightly coupled, which avoids writing external files.


    # ## Open Source


    Pyomo is managed as an open source project to facilitate transparency in software
    design and implementation. Pyomo is licensed under the BSD license [8], which
    has few restrictions on government or commercial use. Pyomo is managed at GitHub
    [53], and through the COIN-OR project [9]. Developer and user mailing lists are
    managed on Google Groups. There is growing evidence that the reliability of open
    source software is similar to closed source software [3, 59], and Pyomo is carefully
    managed to ensure the robustness and reliability for users.


    # ## 1.3 Getting Started


    In order to execute all of the examples in this book the following software should
    be installed:


    +   - Python 3.6 or higher (although almost all examples will work with earlier
    versions of Python). Pyomo currently relies on CPython; there is only support
    for Jython and PyPy for a subset of Pyomo''s capability.

    - Pyomo 6.0, which is used throughout this book.

    - The GLPK [25] solver, which is used to generate output for most examples in
    this book. Other LP and MILP solvers can be used for these examples, but the GLPK
    software is easily installed and widely available.

    - The IPOPT [34] solver, which is used to generate output for nonlinear model
    examples. Other nonlinear optimizers can be easily used for these examples if
    they are compiled with the AMPL Solver Library [23].'
