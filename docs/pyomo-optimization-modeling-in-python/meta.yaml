    \ | The name of the model object created in the specified Pyomo module. |\n| `--path\
    \ PATH` | Give a path used to find Pyomo Python files. |\n| `--report-timing`\
    \ | Report various timing statistics during model construction. |\n| `--results-format\
    \ FORMAT` | Specify the results format: json or yaml. |\n| `--save-results FILE`\
    \ | The filename to which the results are saved. |\n| `--show-results` | Print\
    \ the results object after optimization. |\n| `--solver SOLVER` | Specify the\
    \ solver name. |\n| `--solver-executable FILE` | The executable used by the solver\
    \ interface. |\n| `--solver-io FORMAT` | The type of IO used to execute the solver.\
    \ Different solvers support different types of IO, but the following are common\
    \ options: lp - generate LP files, nl - generate NL files, python - direct Python\
    \ interface. |\n| `--stream-output` | Stream the solver output to provide information\
    \ about the solver's progress. |\n| `--solver-options STRING` | String describing\
    \ solver options. |\n| `--solver-suffix SUFFIXES` | Solution suffixes that will\
    \ be extracted by the solver (e.g., rc, dual, or slack). |\n| `--summary` | Summarize\
    \ the final solution after performing optimization. |\n| `--symbolic-solver-labels`\
    \ | When interfacing with the solver, use symbol names derived from the model.\
    \ For example, \"my_special_variable[1_2_3]\" instead of \"v1\". When using the\
    \ ASL solvers, this option generates corresponding .row (constraints) and .col\
    \ (variables) files. |\n| `--tempdir TEMPDIR` | Specify the directory where temporary\
    \ files are generated. |\n\nTable 10.1: Commonly used options for the `pyomo solve`\
    \ subcommand.\n\nThe `--help` and `--generate-config-template` options for the\
    \ `solve` subcommand require the `--solver` option. These two options provide\
    \ solver-specific summaries respectively for command-line options and configuration\
    \ files. For example, you could execute the following command to get command-line\
    \ options suitable for the `glpk` solver:\n\n```\npyomo solve --solver=glpk --help\n\
    ```\n\nTable 10.1 summarizes key options for the `solve` subcommand that are commonly\
    \ used.\n\n## 10.2.2.1 Specifying the Model Object\n\nA model file can execute\
    \ an arbitrary Python script, but the expectation of the `pyomo solve` command\
    \ is that it generates an object that contains the Pyomo model. Within the `solve`\
    \ subcommand, a model file is executed with a Python import command, and thus\
    \ it is interpreted like any other Python file.\n\nIn the simplest case, a Pyomo\
    \ model file contains Python commands to create a model object stored in the `model`\
    \ variable. For example, consider the following simple LP:\n\n```python\n# abstract5.py\n\
    import pyomo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\nmodel.N = pyo.Set()\n\
    model.M = pyo.Set()\nmodel.c = pyo.Param(model.N)\nmodel.a = pyo.Param(model.N,\
    \ model.M)\nmodel.b = pyo.Param(model.M)\n\nmodel.x = pyo.Var(model.N, within=pyo.NonNegativeReals)\n\
    \ndef obj_rule(model):\n    return sum(model.c[i]*model.x[i] for i in model.N)\n\
    model.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(model, m):\n    return\
    \ sum(model.a[i,m]*model.x[i] for i in model.N) \\\n           >= model.b[m]\n\
    model.con = pyo.Constraint(model.M, rule=con_rule)\n```\n\nThis is an abstract\
    \ Pyomo model stored in the `model` variable.\n\nIf a user defines their model\
    \ with a different variable name, then the `--model-name` option can be used to\
    \ direct Pyomo to select the specified name. For example, we can adapt the previous\
    \ example to store the model in `Model`:\n\n```python\n# abstract6.py\nimport\
    \ pyomo.environ as pyo\n\nModel = pyo.AbstractModel()\n\nModel.N = pyo.Set()\n\
    Model.M = pyo.Set()\nModel.c = pyo.Param(Model.N)\nModel.a = pyo.Param(Model.N,\
    \ Model.M)\nModel.b = pyo.Param(Model.M)\n\nModel.x = pyo.Var(Model.N, within=pyo.NonNegativeReals)\n\
    \ndef obj_rule(Model):\n    return sum(Model.c[i]*Model.x[i] for i in Model.N)\n\
    Model.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(Model, m):\n    return\
    \ sum(Model.a[i,m]*Model.x[i] for i in Model.N) \\\n           >= Model.b[m]\n\
    Model.con = pyo.Constraint(Model.M, rule=con_rule)\n```\n\nThis model can be optimized\
    \ with the following command:\n\n```\npyomo solve --solver=glpk --model-name=Model\
    \ \\\n            abstract6.py abstract6.dat\n```\n\nAside from supporting greater\
    \ flexibility for the user, this option allows users to define multiple models\
    \ in a Pyomo model file and then select the model to be optimized when the `solve`\
    \ subcommand is executed.\n\n## 10.2.2.2 Selecting Data with Namespaces\n\nSection\
    \ 10.3.4 introduces the `namespace` command in Pyomo data files. This command\
    \ is used to define blocks of data commands that are integrated optionally into\
    \ a model. The `solve` subcommand provides the `--namespace` option to specify\
    \ one or more namespaces used to construct an instance of an abstract model; the\
    \ `--ns` is a shorter alias for this option. For example, the command\n\n```\n\
    pyomo solve --solver=glpk --namespace=data1 abstract5.py \\\n            abstract5-ns1.dat\n\
    ```\n\ncreates and optimizes the abstract model in `abstract5.py` using the following\
    \ data commands:\n\n```\nnamespace data1 {\n    set N := 1 2 ;\n    set M := 1\
    \ 2 ;\n    param c :=\n    1 1\n    2 2 ;\n    param a :=\n    1 1 3\n    2 1\
    \ 4\n    1 2 2\n    2 2 5 ;\n    param b :=\n    1 1\n    2 2 ;\n}\n\nnamespace\
    \ data2 {\n    set N := 3 4 ;\n    set M := 5 6 ;\n    param c :=\n    3 10\n\
    \    4 20 ;\n\n    param a :=\n    3 5 3\n    4 5 4\n    3 6 2\n    4 6 5 ;\n\n\
    \    param b :=\n    5 1\n    6 2 ;\n}\n```\n\nThis command specifies the data1\
    \ namespace, which has an optimal solution of 0.8. Similarly, the command\n\n\
    ```\npyomo solve --solver=glpk --namespace=data2 abstract5.py \\\n           \
    \ abstract5-ns1.dat\n```\n\ncreates and optimizes the same model using the data2\
    \ namespace, which has an optimal solution of 8. A different index set is used\
    \ in the data2 data, as well as different objective coefficients.\n\nThe previous\
    \ example illustrates how namespaces allow the user to specify different data\
    \ sets within a single data command file. Note that a model can be constructed\
    \ from data commands using multiple namespaces, including data not in a namespace.\
    \ Consider the following data commands:\n\n```\nset N := 1 2;\n\nnamespace c1\
    \ {\n    param c :=\n    1 1\n    2 2 ;\n}\n\nnamespace c2 {\n    param c :=\n\
    \    1 10\n    2 20 ;\n}\n\nnamespace data1 {\n    set M := 1 2 ;\n\n    param\
    \ a :=\n    1 1 3\n    2 1 4\n    1 2 2\n    2 2 5 ;\n\n    param b :=\n    1\
    \ 1\n    2 2 ;\n}\n\nnamespace data2 {\n    set M := 5 6 ;\n\n    param a :=\n\
    \    1 5 3\n    2 5 4\n    1 6 2\n    2 6 5 ;\n\n    param b :=\n    5 1\n   \
    \ 6 2 ;\n}\n```\n\nThis includes four namespaces and data commands outside of\
    \ a namespace. The command\n\n```\npyomo solve --solver=glpk --namespace=c1 --namespace=data2\
    \ \\\n            abstract5.py abstract5-ns2.dat\n```\n\ncreates and optimizes\
    \ the abstract modeling in `abstract5.py` using data commands from the `c1` and\
    \ `data2` namespaces, as well as the data command for `N`, which is outside of\
    \ any namespace. Note that if multiple namespaces contain data commands for the\
    \ same component, then the component is initialized with the data from first namespace\
    \ containing the corresponding data command. If there is not a namespace containing\
    \ a corresponding data command, then the data commands outside of namespaces are\
    \ used to initialize the component.\n\n## 10.2.2.3 Customizing Pyomo’s Workflow\n\
    \nThe different steps that are executed by the `solve` subcommand represent a\
    \ generic workflow for model construction and optimization. This workflow can\
    \ be customized using a variety of callback functions that are defined within\
    \ a Pyomo model file. These callback functions allow the user to define additional\
    \ analysis steps, as well as replace some of the default steps in the workflow."
