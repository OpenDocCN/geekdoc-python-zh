    # ### 10.3 Data Commands for AbstractModel


    The `Set` and `Param` components of a Pyomo model are used to define data values
    used to construct constraints and objectives. Previous chapters have illustrated
    that these components are not necessary to develop complex models. However, the
    `Set` and `Param` components can be used to define abstract data declarations,
    where no data values are specified. For example:


    ```

    model.A = Set(within=Reals)

    model.p = Param(model.A, within=Integers)

    ```


    Data command files can be used to initialize data declarations in Pyomo models,
    and in particular they are useful for initializing `AbstractModel` data declarations.
    However, note that complex mappings are often accomplished in Pyomo via scripting
    rather than using data command files.


    Pyomo’s data command files employ a domain-specific language whose syntax closely
    resembles the syntax of AMPL’s data commands [2]. A data command file consists
    of a sequence of commands specifying set and parameter data, or specifying where
    such data is to be obtained from external sources. The following commands can
    be used to declare data:


    +   - The `set` command declares set data.

    - The `param` command declares a table of parameter data, which can also include
    the declaration of the set data used to index the parameter data.

    - The `load` command loads data from an external resources, like a spreadsheet
    or database.

    - The `table` command declares a two-dimensional table of parameter data.


    The following commands can also be used in data command files:


    +   - The `include` command specifies a data command file that is processed immediately.

    - The `data` and `end` commands do not perform any actions, but they provide compatibility
    with AMPL scripts that define data commands.


    Finally, the `namespace` declaration allows data commands to be organized into
    named groups allowing each to be enabled or disabled during model construction.


    Note that Pyomo’s data commands do *not* exactly correspond to AMPL data commands.
    The `set` and `param` commands are designed to closely match AMPL’s syntax and
    semantics. However, these commands only support a subset of the corresponding
    declarations in AMPL. However, it is not possible to support other AMPL'
- md: "commands because Pyomo treats data commands as data declarations while AMPL\
    \ treats data commands as part of its scripting language.\n\nThe following subsections\
    \ describe the syntax Pyomo's data file commands except for the load and table\
    \ commands, which are documented via Pyomo's online documentation. The syntax\
    \ of data commands can be quite varied, and we provide detailed examples to illustrate\
    \ these commands. Note that all Pyomo data commands are terminated with a semicolon,\
    \ and the syntax of data commands does not depend on whitespace. Thus, data commands\
    \ can be broken across multiple lines – newlines and tab characters are ignored\
    \ – and data commands can be formatted with whitespace with few restrictions.\n\
    \n## 10.3.1 The set Command\n\n### 10.3.1.1 Simple Sets\n\nThe set data command\
    \ explicitly specifies the members of either a single set or an array of sets,\
    \ i.e., an indexed set. A single set is specified with a list of data values that\
    \ are included in this set. The formal syntax for the set data command is:\n\n\
    ```\nset <setname> := [<value>] ... ;\n```\n\nThe data values in a set consist\
    \ of either numeric values, simple strings or quoted strings:\n\n- Numeric values\
    \ are any string that can be evaluated by Python as a numeric value, e.g., integer,\
    \ float, scientific notation, or boolean.\n- Simple strings are sequences of alpha-numeric\
    \ characters.\n- Quoted strings are simple strings that are included in a pair\
    \ of single or double quotes. A quoted string can include quotes within the quoted\
    \ string.\n\nThere is no restriction on the values in a set declaration. A set\
    \ may be empty, and it may contain any combination of numeric and non-numeric\
    \ string values. Validation of set data is performed when constructing a Pyomo\
    \ model, not while parsing a data command file. For example, the following are\
    \ valid set commands:\n\n```\n# An empty set\nset A := ;\n\n# A set of numbers\n\
    set A := 1 2 3;\n\n# A set of strings\nset B := north south east west;\n\n# A\
    \ set of mixed types\nset C :=\n0\n-1.0e+10\n' foo bar'\ninfinity\n\"100\"\n;\n\
    ```\n\nNote that numeric values are automatically converted to Python integer\
    \ or floating point values when the set data specification is parsed. A quoted\
    \ string can be used to define a string value containing a numeric value. However,\
    \ if the string strictly specifies a numeric value, it will be converted by Python\
    \ to a numeric type. For example, the string “100” is included in set C, but this\
    \ value is converted to a numeric value.\n\n### 10.3.1.2 Sets of Tuple Data\n\n\
    The `set` data command can also specify tuple data with the standard notation\
    \ for tuples. For example, suppose set A contains 3-tuples:\n\n```\nmodel.A =\
    \ pyo.Set(dimen=3)\n```\n\nThe following `set` data command then specifies that\
    \ A is the set containing the tuples (1,2,3) and (4,5,6):\n\n```\nset A := (1,2,3)\
    \ (4,5,6) ;\n```\n\nAlternatively, set data can simply be listed in the order\
    \ that the tuple is represented:\n\n```\nset A := 1 2 3 4 5 6 ;\n```\n\nObviously,\
    \ the number of data elements specified using this syntax should be a multiple\
    \ of the set dimension.\n\nSets with 2-tuple data can also be specified in a matrix\
    \ denoting set membership. For example, the following `set` data command declares\
    \ 2-tuples in A using + to denote valid tuples and - to denote invalid tuples:\n\
    \n```\nset A : A1 A2 A3 A4 :=\n    1   +  -  -  +\n    2   +  -  +  -\n    3 \
    \  -  +  -  - ;\n```\n\nThis data command declares the following five 2-tuples:\
    \ (‘A1’,1), (‘A1’,2), (‘A2’,3), (‘A3’,2), (‘A4’,1).\n\nFinally, a set of tuple\
    \ data can be concisely represented with tuple *templates* that represent a *slice*\
    \ of tuple data. For example, suppose the set A contains 4-tuples:\n\n```\nmodel.A\
    \ = pyo.Set(dimen=4)\n```\n\nThe following `set` data command declares groups\
    \ of tuples defined by a template and data to complete this template:\n\n```\n\
    set A :=\n    (1,2,*,4) A B\n    (*,2,*,4) A B C D ;\n```\n\nA tuple template\
    \ consists of a tuple containing one or more * symbols instead of a value. These\
    \ represent indices where the tuple value is replaced by the values from the list\
    \ of values following the tuple template. In this example, the following tuples\
    \ are in set A:\n\n```\n(1, 2, 'A', 4)\n(1, 2, 'B', 4)\n('A', 2, 'B', 4)\n('C',\
    \ 2, 'D', 4)\n```\n\n### 10.3.1.3 Set Arrays\n\nThe set data command can also\
    \ be used to declare data for a set array. Each set in a set array must be declared\
    \ with a separate set data command with the following syntax:\n\n```\nset <set-name>[<index>]\
    \ := [<value>] ... ;\n```\n\nSet arrays can be indexed by an arbitrary set and\
    \ the index value may be a numeric value, a non-numeric string value, or a comma-separated\
    \ list of string values. Suppose set A is used to index a set B as follows:\n\n\
    ```\nmodel.A = pyo.Set()\nmodel.B = pyo.Set(model.A)\n```\n\nThen set B is indexed\
    \ using the values declared for set A:\n\n```\nset A := 1 aaa 'a b';\n\nset B[1]\
    \ := 0 1 2;\nset B[aaa] := aa bb cc;\nset B['a b'] := 'aa bb cc';\n```\n\n## 10.3.2\
    \ The param Command\n\nSimple or non-indexed parameters are declared in an obvious\
    \ way, as shown by these examples:\n\n```\nparam A := 1.4;\nparam B := 1;\nparam\
    \ C := abc;\nparam D := true;\nparam E := 1.0e+04;\n```\n\nParameters can be defined\
    \ with numeric and string data. Numeric data is defined with a string evaluated\
    \ by Python as a numeric value, which includes integer, floating point, scientific\
    \ notation, and boolean. Boolean values can be specified with a variety of strings:\
    \ TRUE, true, True, FALSE, false, and False. Note that parameters cannot be defined\
    \ without data, so there is no analog to the specification of an empty set. Most\
    \ parameter data is indexed over one or more sets, and there are a number of ways\
    \ the `param` data command can be used to specify indexed parameter data.\n\n\
    ### 10.3.2.1 One-dimensional Parameter Data\n\nOne-dimensional parameter data\
    \ is indexed over a single set. Suppose parameter B is indexed by the set A:\n\
    \n```\nmodel.A = pyo.Set()\nmodel.B = pyo.Param(model.A)\n```\n\nA `param` data\
    \ command can specify values for B with a list of index-value pairs:\n\n```\n\
    set A := a c e;\n\nparam B := a 10 c 30 e 50;\n```\n\nBecause whitespace is ignored,\
    \ this example data command file can be reorganized to specify the same data in\
    \ a tabular format:\n\n```\nset A := a c e;\n\nparam B :=\na 10\nc 30\ne 50\n\
    ;\n```\n\nMultiple parameters can be defined using a single `param` data command.\
    \ For example, suppose parameters B, C, and D are one-dimensional parameters all\
    \ indexed by the set A:\n\n```\nmodel.A = pyo.Set()\nmodel.B = pyo.Param(model.A)\n\
    model.C = pyo.Param(model.A)\nmodel.D = pyo.Param(model.A)\n```\n\nValues for\
    \ these parameters can be specified using a single `param` data command declaring\
    \ these parameter names followed by a list of index and parameter values:\n\n\
    ```\nset A := a c e;\n\nparam : B C D :=\na 10 -1 1.1\nc 30 -3 3.3\ne 50 -5 5.5\n\
    ;\n```\n\nThe values in the `param` data command are interpreted as a list of\
    \ sublists, where each sublist consists of an index followed by the corresponding\
    \ numeric value.\n\nNote that parameter values do not need to be defined for all\
    \ indices. For example, the following data command file is valid:\n\n```\nset\
    \ A := a c e g;\n\nparam : B C D :=\na 10 -1 1.1\nc 30 -3 3.3\ne 50 -5 5.5\n;\n\
    ```\n\nThe index g is omitted from the `param` command, and consequently this\
    \ index is not valid for the model instance using this data. More complex patterns\
    \ of missing data can be specified using the “.” character to indicate a missing\
    \ value. This syntax is useful when specifying multiple parameters that do not\
    \ necessarily have the same index values:\n\n```\nset A := a c e;\n\nparam : B\
    \ C D :=\na . -1 1.1\nc 30 . 3.3\ne 50 -5 .\n;\n```\n\nThis example provides a\
    \ concise representation of parameters that share a common index set while using\
    \ different index values.\n\nNote that this data file specifies the data for set\
    \ A twice: (1) when A is defined and (2) implicitly when the parameters are defined.\
    \ An alternate syntax for `param` allows the user to concisely specify the definition\
    \ of an index set along with associated parameters:\n\n```\nparam : A : B C D\
    \ :=\na 10 -1 1.1\nc 30 -3 3.3\ne 50 -5 5.5\n;\n```\n\nFinally, we note that default\
    \ values for missing data can also be specified using the `default` keyword:\n\
    \n```\nset A := a c e;\n\nparam B default 0.0 :=\nc 30\ne 50\n;\n```\n\nNote that\
    \ default values can only be specified in `param` commands defining values for\
    \ a single parameter."
  mdcn: "commands because Pyomo treats data commands as data declarations while AMPL\
    \ treats data commands as part of its scripting language.\n\n以下小节将描述 Pyomo 数据文件命令的语法，load\
    \ 和 table 命令除外，后者通过 Pyomo 的在线文档进行记录。数据命令的语法可能相当多样化，我们提供详细示例来阐释这些命令。请注意，所有 Pyomo\
    \ 数据命令均以分号结束，并且数据命令的语法不依赖于空白字符。因此，数据命令可以跨多行书写——换行符和制表符会被忽略——并且可以用空白字符进行格式化，几乎没有限制。\n\
    \n## 10.3.1 set命令\n\n### 10.3.1.1 简单集合\n\nset数据命令用于显式指定单个集合或集合数组（即索引集合）的成员。单个集合通过列出包含在该集合中的数据值来指定。set数据命令的正式语法如下：\n\
    \n```\nset <setname> := [<value>] ... ;\n```\n\n集合中的数据值可以是数值、简单字符串或带引号的字符串：\n\
    - 数值是任何可以被Python计算为数值的字符串，例如整数、浮点数、科学计数法或布尔值。\n- 简单字符串是字母数字字符序列。\n- 带引号的字符串是包含在一对单引号或双引号中的简单字符串。带引号的字符串内部可以包含引号。\n\
    \n对集合声明中的值没有限制。一个集合可以是空的，并且可以包含任何数值和非数值字符串值的组合。集合数据的验证在构建Pyomo模型时进行，而不是在解析数据命令文件时进行。例如，以下是有效的set命令：\n\
    \n```\n# An empty set\nset A := ;\n\n# A set of numbers\nset A := 1 2 3;\n\n#\
    \ A set of strings\nset B := north south east west;\n\n# A set of mixed types\n\
    set C :=\n0\n-1.0e+10\n' foo bar'\ninfinity\n\"100\"\n;\n```\n\n请注意，当解析set数据规范时，数值会自动转换为Python整数或浮点值。带引号的字符串可用于定义包含数值的字符串值。但是，如果字符串严格指定了一个数值，它将被Python转换为数值类型。例如，字符串“100”包含在集合C中，但该值会被转换为数值。\n\
    \n### 10.3.1.2 元组数据的集合\n\n`set`数据命令也可以使用元组的标准表示法来指定元组数据。例如，假设集合A包含三元组：\n\n```\n\
    model.A = pyo.Set(dimen=3)\n```\n\n以下`set`数据命令指定A是包含元组 (1,2,3) 和 (4,5,6) 的集合：\n\
    \n```\nset A := (1,2,3) (4,5,6) ;\n```\n\n或者，集合数据也可以简单地按照元组的表示顺序列出：\n\n```\nset\
    \ A := 1 2 3 4 5 6 ;\n```\n\n显然，使用此语法指定的数据元素数量应该是集合维度的倍数。\n\n包含二元组数据的集合也可以用一个矩阵来指定，该矩阵表示集合成员关系。例如，以下`set`数据命令使用\
    \ + 表示有效元组，- 表示无效元组，来声明A中的二元组：\n\n```\nset A : A1 A2 A3 A4 :=\n    1   +  -  -\
    \  +\n    2   +  -  +  -\n    3   -  +  -  - ;\n```\n\n此数据命令声明了以下五个二元组：(‘A1’,1),\
    \ (‘A1’,2), (‘A2’,3), (‘A3’,2), (‘A4’,1)。\n\n最后，元组数据集可以用元组*模板*来简洁地表示，这些模板代表元组数据的一个*切片*。例如，假设集合A包含四元组：\n\
    \n```\nmodel.A = pyo.Set(dimen=4)\n```\n\n以下`set`数据命令声明了由一个模板以及用于填充该模板的数据定义的元组组：\n\
    \n```\nset A :=\n    (1,2,*,4) A B\n    (*,2,*,4) A B C D ;\n```\n\n元组模板包含一个或多个\
    \ * 符号来代替值。这些符号表示索引位置，其元组值将由元组模板后的值列表中的值替换。在此示例中，集合A中包含以下元组：\n\n```\n(1, 2, 'A',\
    \ 4)\n(1, 2, 'B', 4)\n('A', 2, 'B', 4)\n('C', 2, 'D', 4)\n```\n\n### 10.3.1.3\
    \ 集合数组\n\nset数据命令也可用于为集合数组声明数据。集合数组中的每个集合必须使用单独的set数据命令进行声明，语法如下：\n\n```\nset\
    \ <set-name>[<index>] := [<value>] ... ;\n```\n\n集合数组可以由任意集合索引，并且索引值可以是数值、非数值字符串值或逗号分隔的字符串值列表。假设集合A如下用于索引集合B：\n\
    \n```\nmodel.A = pyo.Set()\nmodel.B = pyo.Set(model.A)\n```\n\n那么集合B使用为集合A声明的值进行索引：\n\
    \n```\nset A := 1 aaa 'a b';\n\nset B[1] := 0 1 2;\nset B[aaa] := aa bb cc;\n\
    set B['a b'] := 'aa bb cc';\n```\n\n## 10.3.2 param命令\n\n简单或非索引参数以一种显而易见的方式声明，如以下示例所示：\n\
    \n```\nparam A := 1.4;\nparam B := 1;\nparam C := abc;\nparam D := true;\nparam\
    \ E := 1.0e+04;\n```\n\n参数可以用数值和字符串数据定义。数值数据由Python计算为数值的字符串定义，包括整数、浮点数、科学计数法和布尔值。布尔值可以用多种字符串指定：TRUE,\
    \ true, True, FALSE, false, 和 False。请注意，参数不能在没有数据的情况下定义，因此没有与空集指定相对应的方式。大多数参数数据在一个或多个集合上索引，并且有多种方式可以使用`param`数据命令来指定索引参数数据。\n\
    \n### 10.3.2.1 一维参数数据\n\n一维参数数据在单个集合上索引。假设参数B由集合A索引：\n\n```\nmodel.A = pyo.Set()\n\
    model.B = pyo.Param(model.A)\n```\n\n`param`数据命令可以使用索引-值对列表为B指定值：\n\n```\nset\
    \ A := a c e;\n\nparam B := a 10 c 30 e 50;\n```\n\n由于空白字符被忽略，此示例数据命令文件可以重新组织，以表格格式指定相同的数据：\n\
    \n```\nset A := a c e;\n\nparam B :=\na 10\nc 30\ne 50\n;\n```\n\n多个参数可以使用单个`param`数据命令定义。例如，假设参数B、C和D都是由集合A索引的一维参数：\n\
    \n```\nmodel.A = pyo.Set()\nmodel.B = pyo.Param(model.A)\nmodel.C = pyo.Param(model.A)\n\
    model.D = pyo.Param(model.A)\n```\n\n这些参数的值可以使用单个`param`数据命令指定，该命令声明这些参数名称，后跟索引和参数值列表：\n\
    \n```\nset A := a c e;\n\nparam : B C D :=\na 10 -1 1.1\nc 30 -3 3.3\ne 50 -5\
    \ 5.5\n;\n```\n\n`param`数据命令中的值被解释为子列表的列表，其中每个子列表由一个索引后跟相应的数值组成。\n\n请注意，不需要为所有索引定义参数值。例如，以下数据命令文件是有效的：\n\
    \n```\nset A := a c e g;\n\nparam : B C D :=\na 10 -1 1.1\nc 30 -3 3.3\ne 50 -5\
    \ 5.5\n;\n```\n\n索引g被从`param`命令中省略，因此此索引对于使用此数据的模型实例无效。更复杂的缺失数据模式可以使用“.”字符来指定一个缺失值。当指定不一定具有相同索引值的多个参数时，此语法很有用：\n\
    \n```\nset A := a c e;\n\nparam : B C D :=\na . -1 1.1\nc 30 . 3.3\ne 50 -5 .\n\
    ;\n```\n\n此示例提供了一种简洁的表示方式，用于共享公共索引集但使用不同索引值的参数。\n\n请注意，此数据文件为集合A指定了两次数据：(1) 定义A时，(2)\
    \ 隐式在定义参数时。`param`的替代语法允许用户简洁地指定索引集的定义以及关联的参数：\n\n```\nparam : A : B C D :=\n\
    a 10 -1 1.1\nc 30 -3 3.3\ne 50 -5 5.5\n;\n```\n\n最后，我们注意到缺失数据的默认值也可以使用`default`关键字指定：\n\
    \n```\nset A := a c e;\n\nparam B default 0.0 :=\nc 30\ne 50\n;\n```\n\n请注意，默认值只能在定义单个参数值的`param`命令中指定。"
