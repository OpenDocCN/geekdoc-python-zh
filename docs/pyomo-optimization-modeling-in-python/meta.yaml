  md: "# ## 4.4.1 Objective Declarations\n\nMost solvers can be applied to optimization\
    \ models with a single objective. The following code creates an Objective object:\n\
    \n```\npython\nmodel.a = pyo.Objective()\n\n```\n\nNamed and un-named arguments\
    \ are supported, and Table 4.3 provides a list of the common arguments that can\
    \ be passed when declaring the Objective component.\n\n**Table 4.3: Common declaration\
    \ arguments for the Objective component**\n\n| keyword | description | acceptable\
    \ values |\n|---------|-------------|-------------------|\n| <un-named> | reserved\
    \ for specifying index sets | any number of Pyomo Set objects or Python lists\
    \ |\n| expr | provides the expression that defines the objective function | any\
    \ valid Pyomo expression |\n| rule | provides the rule function that will be called\
    \ to access the expression that defines the objective function | a function that\
    \ returns a Pyomo expression or Objective.Skip |\n| sense | determines if the\
    \ objective is to be minimized or maximized (default is to minimize) | minimize\
    \ or maximize |\n\nThe expr keyword can be used to specify the actual expression\
    \ for the objective. One can also use the rule keyword to specify a rule (a Python\
    \ function) that returns an expression. A rule provides control over how the objective\
    \ is formed. Both options are illustrated here:\n\n```\npython\nmodel.x = pyo.Var([1,2],\
    \ initialize=1.0)\n\nmodel.b = pyo.Objective(expr=model.x[1] + 2*model.x[2])\n\
    \ndef m_rule(model):\n    expr = model.x[1]\n    expr += 2*model.x[2]\n    return\
    \ expr\nmodel.c = pyo.Objective(rule=m_rule)\n\n```"
  merge: -1
  pgno: 57
