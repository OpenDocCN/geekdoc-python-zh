  md: '# Chapter 13

    Mathematical Programs with Equilibrium Constraints


    **Abstract** This chapter documents how to formulate mathematical programs with
    equilibrium constraints (MPECs), which naturally arise in a wide range of engineering
    and economic systems. We describe Pyomo components for complementarity conditions,
    transformation capabilities that automate the reformulation of MPEC models, and
    meta-solvers leveraging these transformations to support global and local optimization
    of MPEC models.


    # 13.1 Introduction


    Mathematical Programs with Equilibrium Constraint (MPEC) problems arise in a large
    number of applications in engineering and economic systems [15, 40, 48]. An MPEC
    is an optimization problem that includes equilibrium constraints in the form of
    complementarity conditions. Equilibrium constraints naturally arise as the solution
    to an optimization subproblem (e.g., for bilevel programs), variational inequalities,
    and complementarity problems [29].


    Since MPEC problems frequently arise in practice, many algebraic modeling languages
    (AML) have integrated capabilities for expressing complementarity conditions [43],
    including AMLs like AIMMS [1], AMPL [2, 21], GAMS [22], MATLAB [42] and YALMIP
    [39]. In this chapter, we describe methods for expressing and optimizing MPEC
    models. MPEC models can be easily expressed with Pyomo modeling components for
    complementarity conditions. Further, Pyomo’s object-oriented design naturally
    supports the ability to automate the reformulation of MPEC models into other forms
    (e.g., disjunctive programs). We describe Pyomo meta-solvers that transform MPECs
    as MIP or NLP problems, which are then optimized with standard solvers. Further,
    we describe interfaces to specialized mixed complementarity problem solvers, which
    solve MPEC problems expressed without an optimization objective.'
