    \ a dictionary can be passed in where the keys correspond to the valid indices\
    \ of the variable. Additionally, this argument can be passed a rule (a Python\
    \ function) that accepts the model and variable indices as arguments and returns\
    \ the desired initial value for that variable element:\n\n```python\nmodel.A =\
    \ pyo.Set(initialize=[1,2,3])\ndef g(model, i):\n    return 3*i\nmodel.m = pyo.Var(model.A,\
    \ initialize=g)\n\nprint(pyo.value(model.m[1]))  # 3\nprint(pyo.value(model.m[3]))\
    \  # 9\n```"
