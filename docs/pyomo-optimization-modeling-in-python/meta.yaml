  md: '# ## 4.3.2 Working with Var Objects


    When generating formatted output, or scripting advanced workflows, there are several
    attributes and methods of Var commonly used. Consider the following declarations:


    ```


    model.A = pyo.Set(initialize=[1,2,3])

    model.za = pyo.Var(initialize=9.5, within=pyo.NonNegativeReals)

    model.zb = pyo.Var(model.A, initialize={1:1.5, 2:4.5, 3:5.5})

    model.zc = pyo.Var(model.A, initialize=2.1)


    ```


    The current value of the variable can be obtained with the value() function, and
    the attributes lb and ub hold values for the lower and upper bounds on the variable,
    respectively. These values may be inferred from the domain of the variable.


    ```


    print(pyo.value(model.zb[2])) # 4.5

    print(model.za.lb) # 0

    print(model.za.ub) # None


    ```


    The setlb and setupb methods are used to set the lower and upper bounds on a variable.


    Variable values can be set using the Python assignment operator,


    ```


    model.za = 8.5

    model.zb[2] = 7.5


    ```


    One can also call the set_values method to set all the variable values from a
    dictionary.


    Var components can be fixed to specific values. If the fixed attribute is True,
    then the variable has a fixed value that will not be altered by an optimizer.
    The fix method is used to fix elements of a Var, and the unfix method is used
    to unfix elements of a Var.


    ```


    model.zb.fix(3.0)

    print(model.zb[1].fixed) # True

    print(model.zb[2].fixed) # True

    model.zc[2].fix(3.0)

    print(model.zc[1].fixed) # False

    print(model.zc[2].fixed) # True


    ```


    # ## 4.4 Objectives


    An objective is a function that is either minimized or maximized by a solver.
    The solver searches for values of the variables that result in the best possible
    value of the objective function. The following sections describe the syntax for
    declaring and working with objectives.'
