    \    print(\"%s %f\" % (y, pyo.value(y)))\n```\n\n# 8.6 Blocks Example: Optimal\
    \ Multi-Period Lot-Sizing\n\nWe now demonstrate a complete model based on blocks\
    \ using a well-known multi-period optimization problem for optimal lot-sizing\
    \ [31]. Our goal in the lot-sizing"
