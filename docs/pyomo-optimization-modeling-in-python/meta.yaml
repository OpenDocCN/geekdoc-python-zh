    ```


    where \( const_i \) are constant arithmetic expressions that may only contain
    variables that are fixed, and \( expr_i \) are arithmetic expressions containing
    unfixed variables.


    A complementarity condition is defined with a pair of constraint expressions


    ```

    l1 ≤ expr1 ≤ u1 ⊥ l2 ≤ expr2 ≤ u2,

    ```


    where exactly two of the constant bounds \( l_1, u_1, l_2 \) and \( u_2 \) are
    finite. The non-finite bounds values are omitted in practice, so this condition
    directly describes a classical or mixed complementarity condition. Additionally,
    a complementarity condition can be expressed with a simple inequality, such as:


    ```

    l1 ≤ expr1 ⊥ expr3 ≤ expr4.

    ```


    This complementarity condition is implicitly transformed to a form with constant
    bounds:


    ```

    l1 ≤ expr1 ⊥ expr3 - expr4 ≤ 0.

    ```


    If a simple inequality is used, then the other constraint expression must also
    be a simple inequality to ensure the complementarity condition has exactly two
    finite bounds.


    # 13.2.3 Modeling Mixed-Complementarity Conditions


    Pyomo’s \( pyomo.mpec \) package defines the \( \text{Complementarity} \) component
    that is used to declare complementarity conditions.


    For example, consider the \( \text{ralph1} \) problem in MacMPEC [41]:


    ```

    min 2x - y

    0 ≤ y ⊥ y ≥ x

    x, y ≥ 0

    ```'
- md: "# 13.3 MPEC Transformations\n\nThe following script defines a Pyomo model for\
    \ `ralph1`:\n\n```\n# ralph1.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec\
    \ import Complementarity, complements\n\nmodel = pyo.ConcreteModel()\n\nmodel.x\
    \ = pyo.Var( within=pyo.NonNegativeReals )\nmodel.y = pyo.Var( within=pyo.NonNegativeReals\
    \ )\n\nmodel.f1 = pyo.Objective( expr=2*model.x - model.y )\n\nmodel.compl = Complementarity(\n\
    \    expr=complements(0 <= model.y,\n                     model.y >= model.x)\
    \ )\n```\n\nThe first lines in this script import Pyomo packages. The `pyomo.environ`\
    \ package initializes Pyomo's environment, and `pyomo.mpec` defines modeling components\
    \ for complementarity conditions. The subsequent lines in this script create a\
    \ model, declare variables x and y, declare an objective f1, and declare a complementarity\
    \ condition `compl`.\n\nThe complementarity condition is declared with the `Complementarity`\
    \ component. In the simplest case, this Python class takes a keyword argument\
    \ `expr` containing the value of the `complements` function. This function accepts\
    \ two Pyomo constraint expressions used to declare a complementarity condition.\n\
    \nPyomo also supports indexed components, where a set of components are initialized\
    \ over an index set using a construction rule. Thus, the `Complementarity` component\
    \ can be declared with an index set. For example, consider the following model:\n\
    \n$$\\min \\sum_{i=1}^n i(x_i - 1)^2$$\n$$0 \\le x_i \\perp 0 \\le x_{i+1} \\\
    quad i = 1, \\dots, n-1$$\n\nThe following script defines a Pyomo implementation\
    \ of the model with $n = 5$:\n\n```\n# ex1a.py\nimport pyomo.environ as pyo\n\
    from pyomo.mpec import Complementarity, complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\
    \nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                                for i in range(1,n+1)) )\n\ndef compl_(model,\
    \ i):\n    return complements(model.x[i] >= 0, model.x[i+1] >= 0)\nmodel.compl\
    \ = Complementarity( range(1,n), rule=compl_ )\n```\n\nThe complementarity conditions\
    \ are defined with a single `Complementarity` component indexed over the set $1,\
    \ \\ldots, n-1$ and initialized with a construction rule `compl_`. This rule is\
    \ a function that accepts a model instance and an index, and returns the $i$-th\
    \ complementarity condition.\n\nThe declared set of indexes may be a superset\
    \ of the indices defining complementarity conditions. If a construction rule returns\
    \ `Complementarity.Skip`, then the corresponding index is skipped. For example:\n\
    \n```\n# ex1d.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec import Complementarity,\
    \ complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1)\
    \ )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n                \
    \                for i in range(1,n+1)) )\n\ndef compl_(model, i):\n    if i ==\
    \ n:\n        return Complementarity.Skip\n    return complements(model.x[i] >=\
    \ 0, model.x[i+1] >= 0)\nmodel.compl = Complementarity( range(1,n+1), rule=compl_\
    \ )\n```\n\nThis example can also be expressed with the `ComplementarityList`\
    \ component:\n\n```\n# ex1b.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec import\
    \ ComplementarityList, complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\n\
    model.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                                for i in range(1,n+1)) )\n\nmodel.compl = ComplementarityList()\n\
    model.compl.add(complements(model.x[1]>=0, model.x[2]>=0))\nmodel.compl.add(complements(model.x[2]>=0,\
    \ model.x[3]>=0))\nmodel.compl.add(complements(model.x[3]>=0, model.x[4]>=0))\n\
    model.compl.add(complements(model.x[4]>=0, model.x[5]>=0))\n```\n\nThis component\
    \ defines a list of complementarity conditions. The list index can be used in\
    \ Pyomo, but this component simplifies the declaration of models for which the\
    \ index values are not important. The `ComplementarityList` component can also\
    \ be defined with a rule iteratively yielding complementarity conditions:\n\n\
    ```\n# ex1c.py\nimport pyomo.environ as pyo\nfrom pyomo.mpec import ComplementarityList,\
    \ complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1)\
    \ )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n                \
    \           for i in range(1,n+1)) )\n\ndef compl_(model):\n    yield complements(model.x[1]\
    \ >= 0, model.x[2] >= 0)\n    yield complements(model.x[2] >= 0, model.x[3] >=\
    \ 0)\n    yield complements(model.x[3] >= 0, model.x[4] >= 0)\n    yield complements(model.x[4]\
    \ >= 0, model.x[5] >= 0)\nmodel.compl = ComplementarityList( rule=compl_ )\n```\n\
    \nSimilarly, the construction rule may be a Python list comprehension that generates\
    \ a sequence of complementarity conditions:\n\n```\n# ex1e.py\nimport pyomo.environ\
    \ as pyo\nfrom pyomo.mpec import ComplementarityList, complements\n\nn = 5\n\n\
    model = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f =\
    \ pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n                           for i\
    \ in range(1,n+1)) )\n\nmodel.compl = ComplementarityList(\n    rule=(complements(model.x[i]\
    \ >= 0, model.x[i+1] >= 0)\n          for i in range(1,n)) )\n```\n\nPyomo supports\
    \ the automated transformation of models. Pyomo can iterate through model components\
    \ as well as nested model blocks. Thus, model components can be easily transformed\
    \ locally, and global data can be collected to support global transformations.\
    \ Further, Pyomo components and blocks can be activated and deactivated, which\
    \ facilitates *in place* transformations that do not require the creation of a\
    \ separate copy of the original model. Pyomo's `pyomo.mpec` package defines several\
    \ model transformations that can be easily applied. For example, if model defines\
    \ an MPEC model (as in our previous examples), then the following example illustrates\
    \ how to apply a model transformation:\n\n```\nxfrm = pyo.TransformationFactory(\"\
    mpec.simple_nonlinear\")\ntransformed = xfrm.create_using(model)\n```\n\nIn this\
    \ case, the mpec.simple_nonlinear transformation is applied. The following sections\
    \ describe the transformations currently supported in pyomo.mpec.\n\n## 13.3.1\
    \ Standard Form\n\nIn Pyomo, a complementarity condition is expressed as a pair\
    \ of constraint expressions\n\n$l_1 \\le expr_1 \\le u_1 \\perp l_2 \\le expr_2\
    \ \\le u_2$,\n\nwhere exactly two of the constant bounds $l_1$, $u_1$, $l_2$ and\
    \ $u_2$ are finite. The non-finite bounds are typically omitted, but the value\
    \ None can be used to express infinite bounds. Additionally, each constraint expression\
    \ can be expressed with a simple inequality of the form\n\n$expr_3 \\le expr_4$.\n\
    \nThe mpec.standard_form transformation reformulates each complementarity condition\
    \ in a model into a standard form:\n\n$l_1 \\le expr \\le u_1 \\perp l_2 \\le\
    \ var \\le u_2$,\n\nwhere exactly two of the constant bounds $l_1$, $u_1$, $l_2$\
    \ and $u_2$ are finite, and either $l_2$ is zero or both $l_2$ or $u_2$ are finite.\n\
    \nNote that this transformation creates new variables and constraints as part\
    \ of this transformation. For example, the complementarity condition\n\n$1 \\\
    le x+y \\perp 1 \\le 2x-y$,\n\nis transformed to:\n\n$1 \\le x+y \\perp 0 \\le\
    \ v$,\n\nwhere $v \\in \\mathbb{R}$ and $v = 2x - y - 1$.\n\nFor each complementary\
    \ condition object, the new variable and constraints are added as additional components\
    \ within the complementarity object. Thus, the overall structure of the MPEC model\
    \ is not changed by this transformation.\n\n## 13.3.2 Simple Nonlinear\n\nThe\
    \ `mpec.simple_nonlinear` transformation begins by applying the `mpec.standard_form`\
    \ transformation. Subsequently, a nonlinear constraint is created that defines\
    \ the complementarity condition. This is a simple nonlinear transformation adapted\
    \ from Ferris et al. [17], which can be described by three different cases:\n\n\
    -   If $l_1$ is finite, then the following constraint is defined:\n    $$\\left(\
    \ \\text{expr} - l_1 \\right) * v \\leq \\varepsilon$$\n-   If $u_1$ is finite,\
    \ then the following constraint is defined:\n    $$\\left( u_1 - \\text{expr}\
    \ \\right) * v \\leq \\varepsilon$$\n-   If $l_2$ and $u_2$ are both finite, then\
    \ the following constraints are defined:\n    $$\\left( \\text{var} - l_2 \\right)\
    \ * \\text{expr} \\leq \\varepsilon$$\n    $$\\left( \\text{var} - u_2 \\right)\
    \ * \\text{expr} \\leq \\varepsilon$$\n\nEach of these cases ensure the complementarity\
    \ condition is met when $\\varepsilon$ is zero. For example, in the first case,\
    \ we know $0 \\leq v$ and $0 \\leq \\text{expr} - l_1$. When $\\varepsilon$ is\
    \ zero, this constraint ensures either $v$ is zero or $\\text{expr} - l_1$ is\
    \ zero.\n\nThis transformation uses the parameter `mpec_bound`, which defines\
    \ the value for $\\varepsilon$ for every complementarity condition. This allows\
    \ for the specification of a relaxed nonlinear problem, which may be easier to\
    \ optimize with some nonlinear programming solvers. The default value of `mpec_bound`\
    \ is zero.\n\n## 13.3.3 Simple Disjunction\n\nThe `mpec.simple_disjunction` transformation\
    \ expresses a complementarity condition as a disjunctive program. We are given\
    \ a complementarity condition defined with a pair of constraint expressions\n\n\
    $$l_1 \\leq \\text{expr}_1 \\leq u_1 \\perp l_2 \\leq \\text{expr}_2 \\leq u_2,$$\n\
    \nwhere exactly two of the constant bounds $l_1$, $u_1$, $l_2$ and $u_2$ are finite.\
    \ Without loss of generality, we assume that either $l_1$ or $u_1$ is finite.\n\
    \nThis transformation generates the constraints corresponding to the conditions\
    \ implied by the complementarity conditions (see Equation (13.1)). There are three\
    \ different cases:\n\n-   If the first constraint is an equality, then the complementarity\
    \ condition is trivially replaced by that equality constraint."
  mdcn: "# 13.3 MPEC 变换\n\n以下脚本定义了 `ralph1` 的 Pyomo 模型：\n\n```\n# ralph1.py\nimport\
    \ pyomo.environ as pyo\nfrom pyomo.mpec import Complementarity, complements\n\n\
    model = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( within=pyo.NonNegativeReals\
    \ )\nmodel.y = pyo.Var( within=pyo.NonNegativeReals )\n\nmodel.f1 = pyo.Objective(\
    \ expr=2*model.x - model.y )\n\nmodel.compl = Complementarity(\n    expr=complements(0\
    \ <= model.y,\n                     model.y >= model.x) )\n```\n\n脚本的前几行导入 Pyomo\
    \ 包。`pyomo.environ` 包初始化 Pyomo 的环境，`pyomo.mpec` 定义了互补条件的建模组件。脚本随后的几行创建了一个模型，声明了变量\
    \ x 和 y，声明了一个目标 f1，并声明了一个互补条件 `compl`。\n\n互补条件使用 `Complementarity` 组件声明。在最简单的情况下，这个\
    \ Python 类接受一个关键字参数 `expr`，其中包含 `complements` 函数的值。该函数接受两个用于声明互补条件的 Pyomo 约束表达式。\n\
    \nPyomo 还支持索引组件，即一组组件通过构造规则在索引集上初始化。因此，`Complementarity` 组件可以使用索引集来声明。例如，考虑以下模型：\n\
    \n$$\\min \\sum_{i=1}^n i(x_i - 1)^2$$\n$$0 \\le x_i \\perp 0 \\le x_{i+1} \\\
    quad i = 1, \\dots, n-1$$\n\n以下脚本定义了 $n = 5$ 时该模型的 Pyomo 实现：\n\n```\n# ex1a.py\n\
    import pyomo.environ as pyo\nfrom pyomo.mpec import Complementarity, complements\n\
    \nn = 5\n\nmodel = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1) )\n\n\
    model.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n                       \
    \         for i in range(1,n+1)) )\n\ndef compl_(model, i):\n    return complements(model.x[i]\
    \ >= 0, model.x[i+1] >= 0)\nmodel.compl = Complementarity( range(1,n), rule=compl_\
    \ )\n```\n\n互补条件通过一个单一的 `Complementarity` 组件定义，该组件在索引集 $1, \\ldots, n-1$ 上建立索引，并使用构造规则\
    \ `compl_` 初始化。此规则是一个函数，接受一个模型实例和一个索引，并返回第 $i$ 个互补条件。\n\n声明的索引集可能是定义互补条件的索引的超集。如果构造规则返回\
    \ `Complementarity.Skip`，则相应的索引会被跳过。例如：\n\n```\n# ex1d.py\nimport pyomo.environ\
    \ as pyo\nfrom pyomo.mpec import Complementarity, complements\n\nn = 5\n\nmodel\
    \ = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                                for i in range(1,n+1)) )\n\ndef compl_(model,\
    \ i):\n    if i == n:\n        return Complementarity.Skip\n    return complements(model.x[i]\
    \ >= 0, model.x[i+1] >= 0)\nmodel.compl = Complementarity( range(1,n+1), rule=compl_\
    \ )\n```\n\n这个示例也可以使用 `ComplementarityList` 组件来表达：\n\n```\n# ex1b.py\nimport pyomo.environ\
    \ as pyo\nfrom pyomo.mpec import ComplementarityList, complements\n\nn = 5\n\n\
    model = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f =\
    \ pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n                               \
    \ for i in range(1,n+1)) )\n\nmodel.compl = ComplementarityList()\nmodel.compl.add(complements(model.x[1]>=0,\
    \ model.x[2]>=0))\nmodel.compl.add(complements(model.x[2]>=0, model.x[3]>=0))\n\
    model.compl.add(complements(model.x[3]>=0, model.x[4]>=0))\nmodel.compl.add(complements(model.x[4]>=0,\
    \ model.x[5]>=0))\n```\n\n这个组件定义了一个互补条件列表。列表索引可以在 Pyomo 中使用，但该组件简化了索引值不重要的模型的声明。`ComplementarityList`\
    \ 组件也可以通过一个迭代地生成互补条件的规则来定义：\n\n```\n# ex1c.py\nimport pyomo.environ as pyo\nfrom\
    \ pyomo.mpec import ComplementarityList, complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\
    \nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                           for i in range(1,n+1)) )\n\ndef compl_(model):\n \
    \   yield complements(model.x[1] >= 0, model.x[2] >= 0)\n    yield complements(model.x[2]\
    \ >= 0, model.x[3] >= 0)\n    yield complements(model.x[3] >= 0, model.x[4] >=\
    \ 0)\n    yield complements(model.x[4] >= 0, model.x[5] >= 0)\nmodel.compl = ComplementarityList(\
    \ rule=compl_ )\n```\n\n类似地，构造规则也可以是一个 Python 列表推导式，生成一系列互补条件：\n\n```\n# ex1e.py\n\
    import pyomo.environ as pyo\nfrom pyomo.mpec import ComplementarityList, complements\n\
    \nn = 5\n\nmodel = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( range(1,n+1) )\n\n\
    model.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n                       \
    \    for i in range(1,n+1)) )\n\nmodel.compl = ComplementarityList(\n    rule=(complements(model.x[i]\
    \ >= 0, model.x[i+1] >= 0)\n          for i in range(1,n)) )\n```\n\nPyomo 支持模型的自动变换。Pyomo\
    \ 可以遍历模型组件以及嵌套的模型块。因此，模型组件可以方便地进行局部变换，并且可以收集全局数据以支持全局变换。此外，Pyomo 组件和块可以被激活和停用，这有利于进行*原地*变换，而无需创建原始模型的单独副本。Pyomo\
    \ 的 `pyomo.mpec` 包定义了多个可以轻松应用的模型变换。例如，如果模型定义了一个 MPEC 模型（如我们之前的示例），那么以下示例说明了如何应用模型变换：\n\
    \n```\nxfrm = pyo.TransformationFactory(\"mpec.simple_nonlinear\")\ntransformed\
    \ = xfrm.create_using(model)\n```\n\n在这种情况下，应用了 `mpec.simple_nonlinear` 变换。以下各节描述了\
    \ pyomo.mpec 中当前支持的变换。\n\n## 13.3.1 标准形式\n\n在 Pyomo 中，互补条件被表达为一对约束表达式\n\n$l_1\
    \ \\le expr_1 \\le u_1 \\perp l_2 \\le expr_2 \\le u_2$，\n\n其中常数界限 $l_1$、$u_1$、$l_2$\
    \ 和 $u_2$ 中恰好有两个是有限的。非有限的界限通常被省略，但可以使用值 None 来表示无穷界限。此外，每个约束表达式都可以用形式为\n\n$expr_3\
    \ \\le expr_4$\n\n的简单不等式表示。\n\n`mpec.standard_form` 变换将模型中的每个互补条件重新表述为标准形式：\n\n\
    $l_1 \\le expr \\le u_1 \\perp l_2 \\le var \\le u_2$，\n\n其中常数界限 $l_1$、$u_1$、$l_2$\
    \ 和 $u_2$ 中恰好有两个是有限的，并且 $l_2$ 为零或 $l_2$ 和 $u_2$ 均为有限值。\n\n请注意，此变换作为其一部分创建了新的变量和约束。例如，互补条件\n\
    \n$1 \\le x+y \\perp 1 \\le 2x-y$，\n\n被变换为：\n\n$1 \\le x+y \\perp 0 \\le v$，\n\
    \n其中 $v \\in \\mathbb{R}$ 且 $v = 2x - y - 1$。\n\n对于每个互补条件对象，新的变量和约束作为附加组件添加到互补对象中。因此，MPEC\
    \ 模型的总体结构不会因此变换而改变。\n\n## 13.3.2 简单非线性\n\n`mpec.simple_nonlinear` 变换首先应用 `mpec.standard_form`\
    \ 变换。随后，创建一个定义互补条件的非线性约束。这是一个源自 Ferris 等人 [17] 的简单非线性变换，可以通过三种不同的情况来描述：\n\n- \
    \  如果 $l_1$ 是有限的，则定义以下约束：\n    $$\\left( \\text{expr} - l_1 \\right) * v \\leq\
    \ \\varepsilon$$\n-   如果 $u_1$ 是有限的，则定义以下约束：\n    $$\\left( u_1 - \\text{expr}\
    \ \\right) * v \\leq \\varepsilon$$\n-   如果 $l_2$ 和 $u_2$ 都是有限的，则定义以下约束：\n   \
    \ $$\\left( \\text{var} - l_2 \\right) * \\text{expr} \\leq \\varepsilon$$\n \
    \   $$\\left( \\text{var} - u_2 \\right) * \\text{expr} \\leq \\varepsilon$$\n\
    \n这些情况中的每一种都确保当 $\\varepsilon$ 为零时满足互补条件。例如，在第一种情况下，我们知道 $0 \\leq v$ 且 $0 \\leq\
    \ \\text{expr} - l_1$。当 $\\varepsilon$ 为零时，此约束确保要么 $v$ 为零，要么 $\\text{expr} - l_1$\
    \ 为零。\n\n此变换使用参数 `mpec_bound`，该参数定义了每个互补条件的 $\\varepsilon$ 值。这允许指定一个松弛的非线性问题，这可能使得某些非线性规划求解器更容易优化。`mpec_bound`\
    \ 的默认值为零。\n\n## 13.3.3 简单析取\n\n`mpec.simple_disjunction` 变换将互补条件表示为析取规划。给定一个由一对约束表达式定义的互补条件\n\
    \n$$l_1 \\leq \\text{expr}_1 \\leq u_1 \\perp l_2 \\leq \\text{expr}_2 \\leq u_2,$$\n\
    \n其中常数界限 $l_1$、$u_1$、$l_2$ 和 $u_2$ 中恰好有两个是有限的。不失一般性，我们假设 $l_1$ 或 $u_1$ 是有限的。\n\
    \n此变换生成与互补条件所隐含的条件相对应的约束（参见方程 (13.1)）。有三种不同的情况：\n\n-   如果第一个约束是等式，则互补条件被该等式约束简单地替代。"
