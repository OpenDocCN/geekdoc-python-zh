    \ \\quad (11.12)\n```\n\n这种构建切换决策的方法有两个显著的局限性。首先，二元选择变量与该二元变量所选择的相应约束之间的关系有些模糊不清。其次，使用“大M”松弛只是构建该问题的几种可能方法之一。通过将这种松弛硬编码到你的模型中，你实际上排除了探索其他方法（如凸包松弛）的可能性，除非付出巨大努力重写模型。\n\
