  pgno: 88
- img_proc: true
  md: "![](img/ebd5113b8e992ca06e2e931a59f910c7_89_0.png)\n\nFig. 5.2: An example\
    \ of a Sudoku puzzle prior to solving.\n\nUsing this notation, it is relatively\
    \ straightforward to define the constraints that restrict the allowable numbers\
    \ in each row and column as,\n\n$$\\sum_{c \\in COLS} y[r,c,v] = 1 \\quad \\forall\
    \ r \\in ROWS, v \\in VALUES$$\n$$\\sum_{r \\in ROWS} y[r,c,v] = 1 \\quad \\forall\
    \ c \\in COLS, v \\in VALUES$$\n\nThe Pyomo code for these constraints is:\n\n\
    ```\n# exactly one number in each row\ndef _RowCon(model, r, v):\n    return sum(model.y[r,c,v]\
    \ for c in model.COLS) == 1\nmodel.RowCon = pyo.Constraint(model.ROWS, model.VALUES,\
    \ \\n    rule=_RowCon)\n\n# exactly one number in each column\ndef _ColCon(model,\
    \ c, v):\n    return sum(model.y[r,c,v] for r in model.ROWS) == 1\nmodel.ColCon\
    \ = pyo.Constraint(model.COLS, model.VALUES, \\n    rule=_ColCon)\n```\n\nDefining\
