    While data can be specified using native Python types, Pyomo also includes modeling
    components `Set` and `Param` to define index sets and parameters respectively.
    A Pyomo `Set` component is used to declare valid indices for any indexed component.
    For example, in the context of the warehouse location problem, two sets are shown:
    $N$ stores the valid warehouse locations and $M$ stores the customer locations.
    These sets can easily be declared using the following code:


    ```

    model.N = pyo.Set()

    model.M = pyo.Set()

