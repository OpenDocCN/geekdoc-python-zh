    \ value of a variable can be retrieved and set by the user or by a solver as part\
    \ of the solution process.\n\n# ### 4.3.1 Var Declarations\n\nThe following code\
    \ creates a non-indexed Var object:\n\n```\npython\nmodel.x = pyo.Var()\n```\n\
    \nNamed and un-named arguments are supported, and Table 4.1 provides a list of\
    \ the common arguments that can be passed when declaring the Var component\n\n\
    | keyword | description | acceptable values |\n| :--- | :--- | :--- |\n| `<un-named>`\
    \ | reserved for specifying index sets | any number of Pyomo Set objects or Python\
    \ lists |\n| `within or domain` | specifies the valid domain or values for a variable\
    \ | a Pyomo Set object, Python list, or rule function |\n| `bounds` | provides\
    \ lower and upper bounds for the variable | a 2-tuple, or a rule function |\n\
    | `initialize` | provides an initial value for the variable | a scalar value,\
    \ Python dictionary of index-value pairs, or rule function |\n**Table 4.1: Common\
    \ declaration arguments for the Var component**"
