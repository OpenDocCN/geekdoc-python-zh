    # 5.2.1 The value Function


    Some Pyomo component attributes may contain Pyomo objects instead of native Python
    numerical values. For example, the lower bound of a `Var` may be a simple `float`
    (e.g., 3.2), but it may also be a Pyomo `Param` object with an associated value.
    Because of this, it is important to use the `value` function to evaluate attributes
    that are expected to return numerical values.

    The use of `value` is important for converting Pyomo expressions to numeric values.
    This is illustrated in the following example.


    ```

    import pyomo.environ as pyo


    model = pyo.ConcreteModel()

    model.u = pyo.Var(initialize=2.0)


    # unexpected expression instead of value

    a = model.u - 1

    print(a) # "u - 1"

    print(type(a)) # <class \n    ''pyomo.core.expr.numeric_expr.SumExpression''>


    # correct way to access the value

    b = pyo.value(model.u) - 1

    print(b) # 1.0

    print(type(b)) # <class ''float''>

    ```


    In this example, `a` contains a Pyomo expression object (and not a numerical value
    as might have been expected). This is demonstrated when we print it and check
    the type. The print statement is correctly showing a description of the expression.
    To obtain the numeric value of the variable (or other Pyomo components), `pyo.value`
    needs to be called. Here, `b` contains the numeric value as expected.

    This example illustrates the creation of implicit expressions and how they can
    lead to unintended consequences. Users are strongly encouraged to avoid generating
    expressions except as part of the model construction process.


    > **NOTE:** It is common to forget the `value()` function when retrieving values
    from Pyomo `Var` components. For example, in the code shown below, Python will
    actually print the representation of the variable object itself, not the value.

    python

    print(model.y)


    In this case, the code will print the variable name “y”, not the value.'
- md: "## 5.2.2 Accessing Attributes of Indexed Components\n\nThe previous examples\
    \ illustrate the procedure to access values of scalar variables. The value of\
    \ a particular index of an indexed variable can be retrieved by specifying the\
    \ exact index.\n\n```\nprint(pyo.value(model.y['Ashland']))\n```\n\nIt is also\
    \ possible to access all the values by iterating over each element of an indexed\
    \ variable.\n\n```\nfor i in model.y:\n    print('{0} = {1}'.format(model.y[i],\
    \ pyo.value(model.y[i])))\n```\n\nThe loop above iterates over the keys for the\
    \ indexed variable model.y. This example could also have been written to iterate\
    \ over the index set directly as shown below.\n\n```\nfor i in model.WH:\n   \
    \ print('{0} = {1}'.format(model.y[i], pyo.value(model.y[i])))\n```\n\nThis approach\
    \ can also be used to access different attributes of variables (e.g., lower bound\
    \ model.y[i].lb) and other model components.\n\n### 5.2.2.1 Slicing Over Indices\
    \ of Components\n\nPyomo supports advanced slicing notation to allow for more\
    \ control when looping over individual elements of a model component. For example,\
    \ we can see all of the customers that are served from a particular warehouse\
    \ with the following slicing notation:\n\n```\nfor v in model.x['Ashland', :]:\n\
    \    print('{0} = {1}'.format(v, pyo.value(v)))\n```\n\n> **NOTE:** Note that\
    \ the slicing notation is returning the component objects themselves, and not\
    \ their indices. Additional information can be found in Section 8.5.\n\n### 5.2.2.2\
    \ Iterating Over All Var Objects on a Model\n\nPyomo also provides methods to\
    \ generically loop over components on a given model or block. In this short example,\
    \ we show how to iterate over all Var objects on a model.\n\n```\n# loop over\
    \ the Var objects on the model\nfor v in model.component_objects(ctype=pyo.Var):\n\
    \    for index in v:\n        print('{0} <= {1}'.format(v[index], pyo.value(v[index].ub)))\n\
    \n# or use the following to loop over the individual\n# indices of each of the\
    \ Var objects directly\nfor v in model.component_data_objects(ctype=pyo.Var):\n\
    \    print('{0} <= {1}'.format(v, pyo.value(v.ub)))\n```\n\n> **NOTE:** These\
    \ methods can be used to find all components on a Pyomo model and iterate over\
    \ them. This approach also extends to hierarchical models with `Block` components.\
    \ For a deeper dive into these methods, consult the online documentation.\n\n\
    ## 5.3 Modifying Pyomo Model Structure\n\nA frequent use case is the need to repeatedly\
    \ solve models with different parameter values or minimal changes to the constraints.\
    \ Mutable parameters can be used to efficiently solve models with different parameter\
    \ values. An example showing the use of the mutable `Param P` is shown in Section\
    \ 3.3.5.\n\nWithin Pyomo, it is possible to modify the structure of a model between\
    \ solves. For example:\n\n- Objectives and constraints can be activated and deactivated\
    \ without changing the data stored in the model. A deactivated component will\
    \ be excluded when the Pyomo model is being sent to the solver.\n- Variables can\
    \ be treated as fixed or unfixed (the default).\n- Pyomo also allows addition\
    \ and removal of modeling components. For example, constraints can be added or\
    \ removed from a model.\n\nThe following example illustrates the use of these\
    \ approaches for modifying model structure:\n\n```\nimport pyomo.environ as pyo\n\
    \nmodel = pyo.ConcreteModel()\nmodel.x = pyo.Var(bounds=(0,5))\nmodel.y = pyo.Var(bounds=(0,1))\n\
    model.con = pyo.Constraint(expr=model.x + model.y == 1.0)\nmodel.obj = pyo.Objective(expr=model.y-model.x)\n\
    \n# solve the problem\nsolver = pyo.SolverFactory('glpk')\nsolver.solve(model)\n\
    print(pyo.value(model.x))  # 1.0\nprint(pyo.value(model.y))  # 0.0\n\n# add a\
    \ constraint\nmodel.con2 = pyo.Constraint(expr=4.0*model.x + model.y == 2.0)\n\
    solver.solve(model)\nprint(pyo.value(model.x)) # 0.33\nprint(pyo.value(model.y))\
    \ # 0.66\n\n# deactivate a constraint\nmodel.con.deactivate()\nsolver.solve(model)\n\
    print(pyo.value(model.x)) # 0.5\nprint(pyo.value(model.y)) # 0.0\n\n# re-activate\
    \ a constraint\nmodel.con.activate()\nsolver.solve(model)\nprint(pyo.value(model.x))\
    \ # 0.33\nprint(pyo.value(model.y)) # 0.66\n\n# delete a constraint\ndel model.con2\n\
    solver.solve(model)\nprint(pyo.value(model.x)) # 1.0\nprint(pyo.value(model.y))\
    \ # 0.0\n\n# fix a variable\nmodel.x.fix(0.5)\nsolver.solve(model)\nprint(pyo.value(model.x))\
    \ # 0.5\nprint(pyo.value(model.y)) # 0.5\n\n# unfix a variable\nmodel.x.unfix()\n\
    solver.solve(model)\nprint(pyo.value(model.x)) # 1.0\nprint(pyo.value(model.y))\
    \ # 0.0\n```\n\n## 5.4 Examples of Common Scripting Tasks\n\nIn this section,\
    \ we will show a few scripting examples that illustrate the capabilities shown\
    \ previously. More examples can be found in the Pyomo Gallery (see [www.pyomo.org](http://www.pyomo.org)).\n\
    \n### 5.4.1 Warehouse Location Loop and Plotting\n\nThe following example formulates\
    \ the warehouse location problem and solves it repeatedly to find every possible\
    \ solution. Each time a solution is found, a new cut is added that excludes that\
    \ solution, and the problem is solved again to find the next solution. This process\
    \ is repeated until the problem is infeasible, and no more solutions can be found.\
    \ The `ConstraintList` component is used to contain the list of cuts; each time\
    \ through the loop a new cut is added to this component.\n\n```\nimport json\n\
    import pyomo.environ as pyo\nfrom warehouse_model import create_wl_model\nimport\
    \ matplotlib.pyplot as plt\n\n# load the data from a json file\nwith open('warehouse_data.json',\
    \ 'r') as fd:\n    data = json.load(fd)\n\n# call function to create model\nmodel\
    \ = create_wl_model(data, P=2)\nmodel.integer_cuts = pyo.ConstraintList()\nobjective_values\
    \ = list()\ndone = False\nwhile not done:\n    # solve the model\n    solver =\
    \ pyo.SolverFactory('glpk')\n    results = solver.solve(model)\n\n    term_cond\
    \ = results.solver.termination_condition\n    print('')\n    print('--- Solver\
    \ Status: {0} ---'.format(term_cond))\n\n    if pyo.check_optimal_termination(results):\n\
    \        # look at the solution\n        print('Optimal Obj. Value = {0}'.format(pyo.value(model.obj)))\n\
    \        objective_values.append(pyo.value(model.obj))\n        model.y.pprint()\n\
    \n        # create new integer cut to exclude this solution\n        WH_True =\
    \ [i for i in model.WH if pyo.value(model.y[i]) > 0.5]\n        WH_False = [i\
    \ for i in model.WH if pyo.value(model.y[i]) < 0.5]\n        model.integer_cuts.add(\n\
    \            sum(model.y[i] for i in WH_True)\n            - sum(model.y[i] for\
    \ i in WH_False)\n            <= len(WH_True)-1)\n    else:\n        done = True\n\
    \nx = range(1, len(objective_values)+1)\nplt.bar(x, objective_values, align='center')\n\
    plt.gca().set_xticks(x)\nplt.xlabel('Solution Number')\nplt.ylabel('Optimal Obj.\
    \ Value')\nplt.savefig('WarehouseCuts.pdf')\n```\n\nThis example generates console\
    \ output that shows each of the solutions encountered. It also generates Figure\
    \ 5.1 with the package `matplotlib` that shows the value of the optimal objective\
    \ function for each solution obtained.\n\n![](img/ebd5113b8e992ca06e2e931a59f910c7_88_0.png)\n\
    \nFig. 5.1: Optimal objective value for a series of solutions obtained from the\
    \ warehouse location problem.\n\n### 5.4.2 A Sudoku Solver\n\nIn this section,\
    \ we further illustrate the power of scripting in Python with Pyomo. Specifically,\
    \ we will solve a feasibility problem and show how to find all the feasible solutions\
    \ to the Sudoku puzzle. We will solve the problem once, identify a feasible solution,\
    \ then add an integer cut to remove this solution from the list of possible solutions,\
    \ and solve the problem again.\n\nA typical Sudoku puzzle is shown in Figure 5.2.\
    \ In this puzzle, one must fill in the empty cells with the numbers 1 through\
    \ 9. Each row must have only one occurrence of each number. Likewise, each column\
    \ must only have one occurrence of each number. Finally, each of the nine sub-squares\
    \ must also only have one occurrence of each number. We define the sets *ROWS*,\
    \ *COLS*, and *VALUES* (all of which contain the integers 1 through 9). We then\
    \ define a binary variable $y[r, c, v]$ to indicate which number is in each of\
    \ the cells. If $y[r, c, v] = 1$, then this implies that the value $v$ has been\
    \ selected for the cell identified by row $r$ and column $c$."
