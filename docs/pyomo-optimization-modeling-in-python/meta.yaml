  md: 'Table 7.1: Python operators that have been redefined to generate Pyomo expressions.


    | Operation | Operator | Example |

    |---|---|---|

    | multiplication | * | expr = model.x * model.y |

    | division | / | expr = model.x / model.y |

    | exponentiation | ** | expr = (model.x+2.0) **model.y |

    | in-place multiplication¹ | *= | expr *= model.x |

    | in-place division² | /= | expr /= model.x |

    | in-place exponentiation³ | **= | expr **= model.x |


    ¹ This example for in-place multiplication is equivalent to `expr = expr * model.x`.

    ² This example for in-place division is equivalent to `expr = expr / model.x`.

    ³ This example for in-place exponentiation is equivalent to `expr = expr ** model.x`.


    Table 7.2: Functions supported by Pyomo for the definition of nonlinear expressions.
    This table assumes that Pyomo has been imported with `import pyomo.environ as
    pyo`.


    | Operation | Function | Example |

    |---|---|---|

    | arccosine | acos | expr = pyo.acos(model.x) |

    | hyperbolic arccosine | acosh | expr = pyo.acosh(model.x) |

    | arcsine | asin | expr = pyo.asin(model.x) |

    | hyperbolic arcsine | asinh | expr = pyo.asinh(model.x) |

    | arctangent | atan | expr = pyo.atan(model.x) |

    | hyperbolic arctangent | atanh | expr = pyo.atanh(model.x) |

    | cosine | cos | expr = pyo.cos(model.x) |

    | hyperbolic cosine | cosh | expr = pyo.cosh(model.x) |

    | exponential | exp | expr = pyo.exp(model.x) |

    | natural log | log | expr = pyo.log(model.x) |

    | log base 10 | log10 | expr = pyo.log10(model.x) |

    | sine | sin | expr = pyo.sin(model.x) |

    | square root | sqrt | expr = pyo.sqrt(model.x) |

    | hyperbolic sine | sinh | expr = pyo.sinh(model.x) |

    | tangent | tan | expr = pyo.tan(model.x) |

    | hyperbolic tangent | tanh | expr = pyo.tanh(model.x) |


