  md: '# # Chapter 12

    Differential Algebraic Equations


    Abstract This chapter documents how to formulate and solve optimization problems
    with differential and algebraic equations (DAEs). The pyomo.dae package allows
    users to incorporate detailed dynamic models within an optimization framework,
    and it is flexible enough to represent a wide variety of differential equations.
    pyomo.dae also includes several automated solution techniques based on a simultaneous
    discretization approach to solve dynamic optimization problems.


    # ## 12.1 Introduction


    In order to develop a better understanding of real-world phenomena, scientists
    and engineers often develop dynamic, or differential equation based, models. High
    fidelity simulation of these models is still an active research area in many fields,
    since these simulation models can be difficult and computationally expensive But
    after a model suitable for simulation has been developed, the next goal is often
    to optimize a particular aspect of the dynamic system (e.g., model parameter estimates
    given dynamic data, or control of the dynamic system to a desired set point).
    Consider the small optimal control problem from [35]:


    ```

    $$

    \begin{aligned}

    &\min \quad x_3(t_f) \tag{12.1} \\

    &\text{s.t.} \quad \dot{x}_1 = x_2 \tag{12.2} \\

    &\quad \dot{x}_2 = -x_2 + u \tag{12.3} \\

    &\quad \dot{x}_3 = x_1^2 + x_2^2 + 0.005 \cdot u^2 \tag{12.4} \\

    &\quad x_2 - 8 \cdot (t - 0.5)^2 + 0.5 \leq 0 \tag{12.5} \\

    &\quad x_1(0) = 0, x_2(0) = -1, x_3(0) = 0, t_f = 1 \tag{12.6}

    \end{aligned}

    $$

    ```'
