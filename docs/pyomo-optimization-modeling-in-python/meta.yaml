    \ model.VALUES, within=pyo.Binary)\n\n    # fix variables based on the current\
    \ board\n    for (r,c,v) in board:\n        model.y[r,c,v].fix(1)\n\n    # create\
    \ the objective - this is a feasibility problem\n    # so we just make it a constant\n\
    \    model.obj = pyo.Objective(expr= 1.0)\n\n    # exactly one number in each\
    \ row\n    def _RowCon(model, r, v):\n        return sum(model.y[r,c,v] for c\
    \ in model.COLS) == 1\n    model.RowCon = pyo.Constraint(model.ROWS, model.VALUES,\
    \ rule=_RowCon)\n\n    # exactly one number in each column\n    def _ColCon(model,\
    \ c, v):\n        return sum(model.y[r,c,v] for r in model.ROWS) == 1\n    model.ColCon\
    \ = pyo.Constraint(model.COLS, model.VALUES, rule=_ColCon)\n\n    # exactly one\
    \ number in each subsquare\n    def _SqCon(model, s, v):\n        return sum(model.y[r,c,v]\
    \ for (r,c) in subsq_to_row_col[s]) == 1\n    model.SqCon = pyo.Constraint(model.SUBSQUARES,\
    \ model.VALUES, rule=_SqCon)\n\n    # exactly one number in each cell\n    def\
    \ _ValueCon(model, r, c):\n        return sum(model.y[r,c,v] for v in model.VALUES)\
    \ == 1\n    model.ValueCon = pyo.Constraint(model.ROWS, model.COLS, rule=_ValueCon)\n\
    \n    return model\n```\n\n```python\n# use this function to add a new integer\
    \ cut to the model.\ndef add_integer_cut(model):\n    # add the ConstraintList\
    \ to store the IntegerCuts if\n    # it does not already exist\n    if not hasattr(model,\
    \ \"IntegerCuts\"):\n        model.IntegerCuts = pyo.ConstraintList()\n\n    #\
