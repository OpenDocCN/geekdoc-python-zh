  md: '• If both bounds on the first constraint are finite but different, then the
    disjunction has the form:


    $$\left[\begin{array}{c} Y_1 \ l_1 = expr_1 \ expr_2 \ge 0 \end{array}\right]
    \bigvee \left[\begin{array}{c} Y_2 \ expr_1 = u_1 \ expr_2 \le 0 \end{array}\right]
    \bigvee \left[\begin{array}{c} Y_3 \ l_1 \le expr_1 \le u_1 \ expr_2 = 0 \end{array}\right]$$


    $$Y_1 \vee Y_2 \vee Y_3 = True$$


    $$Y_1, Y_2, Y_3 \in \{True, False\}$$


    • Otherwise, each constraint is a simple inequality. The complementarity condition
    is reformulated as


    $$0 \le \overline{expr_1} \perp 0 \le \overline{expr_2},$$


    and the disjunction has the form:


    $$\left[\begin{array}{c} Y \ 0 = \overline{expr_1} \ 0 \le \overline{expr_2} \end{array}\right]
    \bigvee \left[\begin{array}{c} \neg Y \ 0 \le \overline{expr_1} \ 0 = \overline{expr_2}
    \end{array}\right]$$


    $$Y \in \{True, False\}$$


    This transformation makes use of modeling components and transformations from
    Pyomo''s `pyomo.gdp` package. The transformation expresses each of the disjunctive
    terms explicitly using `Disjunct` components and the `select exactly one` logical
    condition using the `Disjunction` component. The transformation adds the `Disjunct`
    and `Disjunction` components within the objects representing the complementarity
    conditions. It then recasts the modified complementarity components into simple
    `Block` components. This localizes all changes to the model to the individual
    complementarity components. Subsequent transformation of the disjunctive expressions
    to algebraic constraints can be effected through either Big-M (`gdp.bigm`) or
    Convex Hull (`gdp.chull`) transformations.


    # 13.3.4 AMPL Solver Interface


    Solvers like PATH [14] have been tailored to work with the AMPL Solver Library
    (ASL). AMPL uses `nl` files to communicate with solvers, which read `nl` files
    with the ASL. Pyomo can also create `nl` files, and the `mpec.nl` transformation
    processes `Complementarity` components into a canonical form suitable for this
    format [16].'
