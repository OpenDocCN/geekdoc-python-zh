    # A.5 Data Structures


    This section summarizes Python data structures helpful in scripting Pyomo applications.
    Many Python and Pyomo data structures can be accessed by indexing their elements.
    Pyomo typically starts indices and ranges with a one, while Python is zero based.


    # A.5.1 Strings


    String literals can be enclosed in either single or double quotes, which enables
    the other to be easily included in a string. Python supports a wide range of string
    functions and operations. For example, the addition operator (+) concatenates
    strings. To cast another type to string, use the `str` function. The Python line:


    ```

    python

    NameAge = "SPAM was introduced in " + str(1937)

    ```


    assigns a string to the Python variable called `NameAge`.


    # A.5.2 Lists


    Python lists correspond roughly to arrays in many other programming languages.
    Lists can be accessed element by element, as an entire list, or as a partial list.
    The slicing character is a colon (:) and negative indices indicate indexing from
    the end. The following Python session illustrates these operations:


    ```

    python

