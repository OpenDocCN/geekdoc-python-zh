  - "[PAGE 154]\n\n# 10.2.2.1 Specifying the Model Object\n\nA model file can execute\
    \ an arbitrary Python script, but the expectation of the `pyomo solve` command\
    \ is that it generates an object that contains the Pyomo model. Within the `solve`\
    \ subcommand, a model file is executed with a Python import command, and thus\
    \ it is interpreted like any other Python file.\n\nIn the simplest case, a Pyomo\
    \ model file contains Python commands to create a model object stored in the `model`\
    \ variable. For example, consider the following simple LP:\n\n```\npython\n# abstract5.py\n\
    import pyomo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\nmodel.N = pyo.Set()\n\
    model.M = pyo.Set()\nmodel.c = pyo.Param(model.N)\nmodel.a = pyo.Param(model.N,\
    \ model.M)\nmodel.b = pyo.Param(model.M)\n\nmodel.x = pyo.Var(model.N, within=pyo.NonNegativeReals)\n\
    \ndef obj_rule(model):\n    return sum(model.c[i]*model.x[i] for i in model.N)\n\
    model.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(model, m):\n    return\
    \ sum(model.a[i,m]*model.x[i] for i in model.N) \\\n           >= model.b[m]\n\
    model.con = pyo.Constraint(model.M, rule=con_rule)\n\n```\n\nThis is an abstract\
    \ Pyomo model stored in the `model` variable.\n\nIf a user defines their model\
    \ with a different variable name, then the `--model-name` option can be used to\
    \ direct Pyomo to select the specified name. For example, we can adapt the previous\
    \ example to store the model in `Model`:\n\n```\npython\n# abstract6.py\nimport\
    \ pyomo.environ as pyo\n\nModel = pyo.AbstractModel()\n\nModel.N = pyo.Set()\n\
    Model.M = pyo.Set()\nModel.c = pyo.Param(Model.N)\nModel.a = pyo.Param(Model.N,\
    \ Model.M)\nModel.b = pyo.Param(Model.M)\n\nModel.x = pyo.Var(Model.N, within=pyo.NonNegativeReals)\n\
    \ndef obj_rule(Model):\n    return sum(Model.c[i]*Model.x[i] for i in Model.N)\n\
    Model.obj = pyo.Objective(rule=obj_rule)\n\n```"
  - "[PAGE 155]\n\n```\npython\ndef con_rule(Model, m):\n    return sum(Model.a[i,m]*Model.x[i]\
    \ for i in Model.N) \\\n           >= Model.b[m]\nModel.con = pyo.Constraint(Model.M,\
    \ rule=con_rule)\n\n```\n\nThis model can be optimized with the following command:\n\
    \n```\n\npyomo solve --solver=glpk --model-name=Model \\\n            abstract6.py\
    \ abstract6.dat\n\n```\n\nAside from supporting greater flexibility for the user,\
    \ this option allows users to define multiple models in a Pyomo model file and\
    \ then select the model to be optimized when the `solve` subcommand is executed.\n\
    \n# ## 10.2.2.2 Selecting Data with Namespaces\n\nSection 10.3.4 introduces the\
    \ `namespace` command in Pyomo data files. This command is used to define blocks\
    \ of data commands that are integrated optionally into a model. The `solve` subcommand\
    \ provides the `--namespace` option to specify one or more namespaces used to\
    \ construct an instance of an abstract model; the `--ns` is a shorter alias for\
    \ this option. For example, the command\n\n```\n\npyomo solve --solver=glpk --namespace=data1\
    \ abstract5.py \\\n            abstract5-ns1.dat\n\n```\n\ncreates and optimizes\
    \ the abstract model in `abstract5.py` using the following data commands:\n\n\
    ```\n\nnamespace data1 {\n    set N := 1 2 ;\n    set M := 1 2 ;\n    param c\
    \ :=\n    1 1\n    2 2 ;\n    param a :=\n    1 1 3\n    2 1 4\n    1 2 2\n  \
    \  2 2 5 ;\n    param b :=\n    1 1\n    2 2 ;\n}\n\nnamespace data2 {\n    set\
    \ N := 3 4 ;\n    set M := 5 6 ;\n\n```"
  - "[PAGE 156]\n\n```\nparam c :=\n3 10\n4 20 ;\n\nparam a :=\n3 5 3\n4 5 4\n3 6\
    \ 2\n4 6 5 ;\n\nparam b :=\n5 1\n6 2 ;\n}\n```\n\nThis command specifies the data1\
    \ namespace, which has an optimal solution of 0.8. Similarly, the command\n\n\
    ```\npyomo solve --solver=glpk --namespace=data2 abstract5.py \\\nabstract5-ns1.dat\n\
    ```\n\ncreates and optimizes the same model using the data2 namespace, which has\
    \ an optimal solution of 8. A different index set is used in the data2 data, as\
    \ well as different objective coefficients.\n\nThe previous example illustrates\
    \ how namespaces allow the user to specify different data sets within a single\
    \ data command file. Note that a model can be constructed from data commands using\
    \ multiple namespaces, including data not in a namespace. Consider the following\
    \ data commands:\n\n```\nset N := 1 2;\n\nnamespace c1 {\n    param c :=\n   \
    \ 1 1\n    2 2 ;\n}\n\nnamespace c2 {\n    param c :=\n    1 10\n    2 20 ;\n\
    }\n\nnamespace data1 {\n    set M := 1 2 ;\n\n    param a :=\n    1 1 3\n    2\
    \ 1 4\n    1 2 2\n    2 2 5 ;\n\n    param b :=\n```"
  - "[PAGE 157]\n\n```\n\nnamespace data2 {\n    set M := 5 6 ;\n\n    param a :=\n\
    \    1 5 3\n    2 5 4\n    1 6 2\n    2 6 5 ;\n\n    param b :=\n    5 1\n   \
    \ 6 2 ;\n}\n```\n\nThis includes four namespaces and data commands outside of\
    \ a namespace. The command\n\n```\n\npyomo solve --solver=glpk --namespace=c1\
    \ --namespace=data2 \\n    abstract5.py abstract5-ns2.dat\n```\n\ncreates and\
    \ optimizes the abstract modeling in `abstract5.py` using data commands from the\
    \ `c1` and `data2` namespaces, as well as the data command for `N`, which is outside\
    \ of any namespace. Note that if multiple namespaces contain data commands for\
    \ the same component, then the component is initialized with the data from first\
    \ namespace containing the corresponding data command. If there is not a namespace\
    \ containing a corresponding data command, then the data commands outside of namespaces\
    \ are used to initialize the component.\n\n# 10.2.2.3 Customizing Pyomo’s Workflow\n\
    \nThe different steps that are executed by the `solve` subcommand represent a\
    \ generic workflow for model construction and optimization. This workflow can\
    \ be customized using a variety of callback functions that are defined within\
    \ a Pyomo model file. These callback functions allow the user to define additional\
    \ analysis steps, as well as replace some of the default steps in the workflow."
- md: "## 10.2 The pyomo Command\n\n| Function | Description |\n| :--- | :--- |\n\
    | pyomo_preprocess | Perform a preprocessing step before model construction |\n\
    | pyomo_create_model | Construct and return a model object |\n| pyomo_create_modeldata\
    \ | Construct and return a DataPortal object |\n| pyomo_print_model | Output model\
    \ object information |\n| pyomo_modify_instance | Modify the model instance |\n\
    | pyomo_print_instance | Output model instance information |\n| pyomo_save_instance\
    \ | Save the model instance |\n| pyomo_print_results | Print the optimization\
    \ results |\n| pyomo_save_results | Save the optimization results |\n| pyomo_postprocess\
    \ | Perform a postprocessing step after optimization |\n\nTable 10.2: Callback\
    \ functions that can be used in a Pyomo model file to customize the workflow in\
    \ the pyomo solve subcommand.\n\nTable 10.2 summarizes the pyomo command callback\
    \ functions and the functionality that they support. Each callback function takes\
    \ one or more keyword arguments in the form keyword=value. For example, the pyomo_print_results\
    \ callback function takes three arguments: options, instance, and results.\n\n\
    ```python\ndef pyomo_print_results(options=None, instance=None,\n            \
    \           results=None):\n    print(results)\n```\n\nThere are several standard\
    \ arguments for the callback functions described in Table 10.2. The options argument\
    \ is an enhanced Python dictionary containing the command-line options sent to\
    \ the solve subcommand. The model argument is the Pyomo model object, and the\
    \ instance argument is the model instance constructed from this model. In the\
    \ case where the user defines a model using ConcreteModel, then the model and\
    \ instance arguments are the same object. Other arguments are described with their\
    \ associated callback functions.\n\n## pyomo_preprocess\n\nThis callback function\
    \ is executed before model construction to perform preprocessing steps. This function\
    \ has one argument: options. For example, the following callback function simply\
    \ prints the command-line options:\n\n```python\ndef pyomo_preprocess(options=None):\n\
    \    print(\"Here are the options that were provided:\")\n    if options is not\
    \ None:\n        options.display()\n```\n\n## pyomo_create_model\n\nThis callback\
    \ function is used to construct a model. This function has two arguments: `options`\
    \ and `model_options`. The latter argument contains the options for constructing\
    \ the model, which are specified with the `--model-options` command-line option.\
    \ The return value of this function must be the model object created, which may\
    \ be either an abstract or concrete model. For example, the following callback\
    \ function creates a model by importing the `abstract6.py` file and then returning\
    \ the `Model` object:\n\n```python\ndef pyomo_create_model(options=None, model_options=None):\n\
    \    sys.path.append(abspath(dirname(__file__)))\n    abstract6 = __import__('abstract6')\n\
    \    sys.path.remove(abspath(dirname(__file__)))\n    return abstract6.Model\n\
    ```\n\n## pyomo_create_modeldata\n\nThis callback function creates a model data\
    \ object used to create a model instance. Model data objects are useful in contexts\
    \ where a set of different data sources need to be specified for model constructions.\
    \ This function has two arguments: `options` and `model`. The return value must\
    \ be a `DataPortal` object. For example, the following callback function creates\
    \ a `DataPortal` object from the file `abstract6.dat`:\n\n```python\ndef pyomo_create_dataportal(options=None,\
    \ model=None):\n    data = pyo.DataPortal(model=model)\n    data.load(filename='abstract6.dat')\n\
    \    return data\n```\n\n## pyomo_print_model\n\nThis callback function prints\
    \ an abstract model before a model instance is created. This function has two\
    \ arguments: `options` and `model`. The following example calls the `pprint` method\
    \ to print detailed information about an abstract model:\n\n```python\ndef pyomo_print_model(options=None,\
    \ model=None):\n    if options['runtime']['logging']:\n        model.pprint()\n\
    ```\n\n## pyomo_modify_instance\n\nThis callback function modifies the model instance\
    \ after it has been constructed. This function has three arguments: `options`,\
    \ `model`, and `instance`. The following callback fixes a variable after the model\
    \ is constructed:\n\n```python\ndef pyomo_modify_instance(options=None, model=None,\n\
    \                         instance=None):\n    instance.x[1].value = 0.0\n   \
    \ instance.x[1].fixed = True\n```\n\n## pyomo_print_instance\n\nThis callback\
    \ function prints the Pyomo model instance. This function is used to print the\
    \ concrete model instance rather than the abstract model. This function has two\
    \ arguments: `options` and `instance`. The following example calls the `pprint`\
    \ method to print detailed information about a model instance:\n\n```python\n\
    def pyomo_print_instance(options=None, instance=None):\n    if options['runtime']['logging']:\n\
    \        instance.pprint()\n```\n\n## pyomo_save_instance\n\nThis callback function\
    \ saves the Pyomo model instance. This function has two arguments: `options` and\
    \ `instance`. Note that Pyomo does not specify how the model is saved. However,\
    \ a convenient mechanism would be to use Python's pickle mechanism:\n\n```python\n\
    def pyomo_save_instance(options=None, instance=None):\n    OUTPUT = open('abstract7.pyomo','w')\n\
    \    OUTPUT.write(str(pickle.dumps(instance)))\n    OUTPUT.close()\n```\n\n##\
    \ pyomo_print_results\n\nThis callback function prints the results generated from\
    \ optimization. This function has three arguments: `options`, `instance`, and\
    \ `results`. The `results` object supports a generic summary of optimization solutions,\
    \ solver statistics, etc. in both the JSON or YAML formats. Thus, this callback\
    \ function can simply print this data:\n\n```python\ndef pyomo_print_results(options=None,\
    \ instance=None,\n                       results=None):\n    print(results)\n\
    ```\n\nHowever, the `solve` subcommand includes the `--print-results` option,\
    \ which performs this operation. More generally, this callback function is included\
    \ to allow users to provide problem-specific summaries of their optimization results.\n\
    \n## pyomo_save_results\n\nThis callback function is used to save the results\
    \ generated from optimization. This function has three arguments: options, instance,\
    \ and results. This callback function can simply print the results to a file:\n\
    \n```python\ndef pyomo_save_results(options=None, instance=None,\n           \
    \            results=None):\n    OUTPUT = open('abstract7.results','w')\n    OUTPUT.write(str(results))\n\
    \    OUTPUT.close()\n```\n\nThe solve subcommand includes the --save-results option,\
    \ which performs this operation. More generally, this callback function is included\
    \ to allow users to save problem-specific summary of their optimization results.\n\
    \n## pyomo_postprocess\n\nThis callback function is executed after optimization\
    \ to perform postprocessing steps. This function has three arguments: options,\
    \ instance, and results. For example, the following function prints a simple summary\
    \ of the optimization results:\n\n```python\ndef pyomo_postprocess(options=None,\
    \ instance=None,\n                      results=None):\n    instance.solutions.load_from(results,\
    \ \\\n                               allow_consistent_values_for_fixed_vars=True)\n\
    \    print(\"Solution value \"+str(pyo.value(instance.obj)))\n```\n\n## 10.2.2.4\
    \ Customizing Solver Behavior\n\nThe generic workflow supported by the solve subcommand\
    \ includes the execution of a solver to optimize (or otherwise analyze) a model.\
    \ A variety of command-line options are used to control solver behavior. The --solver\
    \ option is used to specify the name of the solver constructed. This option can\
    \ specify two classes of solvers: the names of command-line executables on the\
    \ user's path, and predefined solver interfaces.\n\nCommand-line executables are\
    \ assumed to perform I/O using NL files. Thus, command-line executables can be\
    \ optimized with any solver executable built with the AMPL solver library.\n\n\
    Solver options can be specified in a generic manner using the --solver-options\
    \ option. This specifies a string interpreted as one or more option-value pairs.\
    \ For example, the following option passes the mipgap option to the glpk solver:\n\
    \n```bash\npyomo solve --solver=glpk --solver-options='mipgap=0.01' \\\nconcrete1.py\n\
    ```"
