    # 9.3.1 When to Use a Persistent Solver


    Persistent solver interfaces are designed to be used when repeatedly solving the
    same model with minor changes. They are most useful when the solver time is not
    significantly longer than the time needed for Pyomo to translate the model to
    the solver’s input format. Of course, persistent solvers can be used no matter
    how long it takes to solve the problem. However, if the time spent solving the
    problem is significantly longer than the time needed for translation, then little
    speedup will be observed, but the complexity of the code may have increased. Linear
    programs are excellent candidates for use with persistent solver interfaces because
    most linear programs can be solved very efficiently. On the other hand, many mixed-integer
    programs are difficult to solve and are poor candidates for the persistent solver
    interfaces. Ultimately, it is necessary to use the profilers discussed in Section
    9.1 to determine how beneficial a persistent solver interface will be for any
    particular application.


    # 9.3.2 Basic Usage


    The first step in using a persistent solver is to create a Pyomo model as usual.


    ```

    import pyomo.environ as pyo

    m = pyo.ConcreteModel()

    m.x = pyo.Var()

    m.y = pyo.Var()

    m.obj = pyo.Objective(expr=m.x**2 + m.y**2)

    m.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)

    ```


    You can create an instance of a persistent solver through the `SolverFactory`.


    ```

    opt = pyo.SolverFactory(''gurobi_persistent'')

    ```


    This returns an instance of the `GurobiPersistent` class. Now we need to tell
    the solver about our model.


    ```

    opt.set_instance(m)

    ```


    This will create a gurobipy Model object and include the appropriate variables
    and constraints. We can now solve the model.


    ```

    results = opt.solve()

    ```


    Note that the model should not be passed into the `solve` method, as is done with
    most solver interfaces. We can also add or remove variables, constraints, or blocks
    and set objectives. For example,


    ```

    m.c2 = pyo.Constraint(expr=m.y >= m.x)

    opt.add_constraint(m.c2)

    ```'
  - '[PAGE 139]


    This tells the solver to add one new constraint but otherwise leave the model
    unchanged. We can now resolve the model.


    ```

    results = opt.solve()

    ```


    To remove a component, simply call the corresponding remove method.


    ```

    opt.remove_constraint(m.c2)

    del m.c2

    results = opt.solve()

    ```


    If a Pyomo component is replaced with another component with the same name, the
    first component must be removed from the solver. Otherwise, the solver will have
    multiple components. For example, the following code will run without error, but
    the solver will have an extra constraint. The solver will have both $y \geq -2*x
    + 5$ and $y \leq x$, which is not what was intended!


    ```

    m = pyo.ConcreteModel()

    m.x = pyo.Var()

    m.y = pyo.Var()

    m.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)

    opt = pyo.SolverFactory(''gurobi_persistent'')

    opt.set_instance(m)

    # WRONG:

    del m.c

    m.c = pyo.Constraint(expr=m.y <= m.x)

    opt.add_constraint(m.c)

    ```


    The correct way to do this is:


    ```

    m = pyo.ConcreteModel()

    m.x = pyo.Var()

    m.y = pyo.Var()

    m.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)

    opt = pyo.SolverFactory(''gurobi_persistent'')

    opt.set_instance(m)

    # Correct:

    opt.remove_constraint(m.c)

    del m.c

    m.c = pyo.Constraint(expr=m.y <= m.x)

    opt.add_constraint(m.c)

    ```


    In most cases, the only way to modify a component is to remove it from the solver
    instance, modify it with Pyomo, and then add it back to the solver instance. The
    only exception is with variables. Variables may be modified and then updated with
    the solver:


    ```

    m = pyo.ConcreteModel()

    m.x = pyo.Var()

    m.y = pyo.Var()

    m.obj = pyo.Objective(expr=m.x**2 + m.y**2)

    m.c = pyo.Constraint(expr=m.y >= -2*m.x + 5)

    opt = pyo.SolverFactory(''gurobi_persistent'')

    opt.set_instance(m)

    m.x.setlb(1.0)

    opt.update_var(m.x)

    ```'
