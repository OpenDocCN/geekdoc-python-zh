  md: '# Chapter 7

    Nonlinear Programming with Pyomo


    **Abstract** This chapter describes the nonlinear programming capabilities of
    Pyomo. It presents the nonlinear expressions and functions supported, and it provides
    some tips for formulating and solving nonlinear programming problems. This chapter
    also provides several real-world examples to illustrate formulating and solving
    nonlinear programming problems. Finally, it provides a brief discussion of supported
    solvers for nonlinear problems.


    # 7.1 Introduction


    It is not possible to adequately represent many applications without modeling
    nonlinear relationships. Fortunately, Pyomo has the ability to represent general
    nonlinear programming (NLP) problems in a straightforward manner. However, the
    solution of this class of problems presents several challenges that do not exist
    for linear problems. For example, most modern, efficient NLP solvers require derivatives
    of the constraints and the objective function. Since the functions are nonlinear,
    this requires accurate numerical evaluation of these derivatives. Additionally,
    in the case of non-convex problems, multiple local minima may exist due to the
    shape of the objective function or the constraints, and specifying a suitable
    starting point may be critical.


    In Section 7.2, we describe the nonlinear expressions supported in Pyomo and then
    illustrate how to build a nonlinear problem formulation within Pyomo. In Section
    7.3, we briefly discuss the solvers supported by Pyomo, and we provide a few tips
    to help effectively formulate nonlinear programming problems. Finally, we close
    this chapter with a number of small, but real-world nonlinear programming examples.'
  merge: -1
  pgno: 100
- img_proc: true
  md: '# 7.2 Nonlinear Progamming Problems in Pyomo


    Pyomo supports the following general nonlinear programming formulation:


    ```

    \min_{x} f(x) \quad \text{s.t.} \quad c(x) = 0 \quad d^L \le d(x) \le d^U \quad
    x^L \le x \le x^U

    ```


    The allowable form of the objective function f(x), the vector of equality constraints
    c(x), and the vector of inequality constraints d(x) depends entirely on the solver
    selected to provide a solution. However, Pyomo is tested extensively with local
    and global solvers that typically assume that these functions are continuous and
    smooth, with continuous first (and possibly second) derivatives. The development
    of nonlinear extensions for Pyomo has focused on this broad problem class.


    # 7.2.1 Nonlinear Expressions


    Formulating nonlinear optimization problems in Pyomo is no different from formulating
    linear or mixed-integer problems. All the Pyomo modeling components described
    throughout the book are used in the same way (e.g., Objective, Constraint) except
    they may include nonlinear expressions. Table 7.1 lists the operators currently
    supported to formulate expressions, with examples where x and y are Pyomo Var
    objects. In addition to these operators, Pyomo supports a number of nonlinear
    functions as described in Table 7.2. Note that these are Pyomo-specific functions
    Pyomo expects, and that nonlinear functions from other Python libraries are not
    supported within Pyomo expressions.


    > > **NOTE:** Passing Pyomo components (e.g., Var, Param) to nonlinear functions
    from other Python packages (e.g., math, or numpy) when creating a Pyomo expression
    will cause an exception to be raised which may be difficult to debug. This mistake
    can be avoided by always using named imports and by being explicit about where
    a nonlinear function is coming from.

    >

    > python

    > import pyomo.environ as pyo  # Use pyo.sin in Pyomo

    > import math as mt            # expressions not mt.sin

    >'
