    \ Rosenbrock Problem\n\nIn this section we present a short example to illustrate\
    \ the formulation and solution of a nonlinear Pyomo model. We consider the unconstrained\
    \ minimization of the two-variable Rosenbrock function, which is a classic problem\
    \ frequently used as an example for discussion of unconstrained nonlinear optimization\
    \ algorithms (e.g., see [45]). This problem is defined as\n\n$$\\min_{x,y} f(x,y)\
    \ = (1-x)^2 + 100(y-x^2)^2,$$\n\nand the solution is in the bottom of the banana\
    \ shaped valley at the point x=1 and y=1 (See Figure 7.1).\n\n![](img/ebd5113b8e992ca06e2e931a59f910c7_103_0.png)\n\
    \nConsider the following Pyomo model for this problem:\n\n```python\n# rosenbrock.py\n\
    # A Pyomo model for the Rosenbrock problem\nimport pyomo.environ as pyo\n\nmodel\
    \ = pyo.ConcreteModel()\nmodel.x = pyo.Var(initialize=1.5)\nmodel.y = pyo.Var(initialize=1.5)\n\
    \ndef rosenbrock(model):\n    return (1.0 - model.x)**2 \\\n        + 100.0*(model.y\
    \ - model.x**2)**2\nmodel.obj = pyo.Objective(rule=rosenbrock, sense=pyo.minimize)\n\
    \nstatus = pyo.SolverFactory('ipopt').solve(model)\npyo.assert_optimal_termination(status)\n\
