    \n### 11.1 引言\n\n许多离散优化问题的一个共同特征是在两个或多个离散选择中进行抉择。这些决策对可行问题空间施加了额外的限制。例如，一个*半连续变量*要么取值为零，要么必须大于某个给定值。这可以代数地表示为\
    \ $x = 0$ 或 $L \\leq x \\leq U$，其中 $L > 0$ 且 $U$ 可以是无穷大。当 $U$ 为有限值时，可以通过定义一个二元变量\
    \ $y$ 并引入以下约束来强制执行此性质：\n\n$$Ly \\leq x$$\n$$x \\leq Uy$$\n$$y \\in \\{0, 1\\}$$\n\
    \n当 $U$ 为无穷大时，第二个不等式被所谓的“大M”约束所取代：\n\n$$x \\leq My$$\n\n其中 $M$ 的值被选择得足够大，以不限制可行解的空间（尽管它确实意味着一个有限的\
    \ $U$）。可以很容易地看出，当 $y = 1$ 时，不等式强制 $x$ 位于连续范围 $L \\leq x \\leq U$ 内；而当 $y = 0$\
    \ 时，不等式简化为 $0 \\leq x \\leq 0$，即 $x = 0$。\n\n在这个公式中，二元变量 y 并非约束本身固有的，而是捕捉了一个逻辑条件：指示必须强制执行一组互斥约束（L\
    \ ≤ x ≤ U）中的哪一组，还是另一组（x = 0）。因此，该变量通常被称为指示变量。事实上，可以说数学规划中使用的大部分二元变量实际上都是用于捕捉模型中逻辑关系的指示变量。\n\
    \n这种构建切换决策的方法可以推广到在不同约束组之间进行切换。例如，考虑机组组合问题，其中优化问题的目标是确定一组发电机开关机的最小成本调度方案，以满足预期需求。在这种情况下，发电机可以处于几种状态之一：开启、关闭、启动和停机。选择特定状态会对发电机运行施加额外的约束。如果发电机“开启”，则输出功率被限制在最小（非零）和最大功率水平之间。相反，当发电机“关闭”时，输出功率必须为0。此外，任何时间段的输出功率必须在前一时间段输出功率的“爬坡限制”范围内。\n\
    \n这些状态选择规则的一种实现方式是表达所有约束，并基于二元状态（指示）变量使用所谓的“大M”项来松弛它们：\n\n```\nPower_{g,t} \\\
