  md: '# 1.2 Modeling with Pyomo


    The goal of Pyomo is to provide a platform for specifying optimization models
    that embodies central ideas found in modern AMLs, within a framework that promotes
    flexibility, extensibility, portability, openness, and maintainability. Pyomo
    is an AML that extends Python to include objects for optimization modeling [30].
    These objects can be used to specify optimization models and translate them into
