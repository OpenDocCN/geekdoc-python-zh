    The Expression component does not require an expression when it is declared on
    a model, but it must be assigned one before the model is solved if the named expression
    is used in any active objectives or constraints. Furthermore, named expressions
    that are used in objectives or constraints should not store relational Pyomo expressions,
    that is, expressions using one or more of the operators <=, <, >=, >, and ==.


    # ## 4.9 Suffix Components


    Suffixes provide a mechanism for annotating a model with auxiliary data not strictly
    related to the model declaration and structure. Suffixes are commonly used by
    solver plugins to store extra information about the solution of a model. More
    generally, suffixes can be used to


    +   - import information from a solver about the solution to a mathematical program
    (e.g., constraint duals, variable reduced costs, basis information),

    - export information to a solver or algorithm to configure the solution process
    (e.g., warm-starting information, variable branching priorities), and

    - tag model components with local data for later use in advanced scripting algorithms.


    This functionality is made available to the modeler through the `Suffix` component
    class, providing an interface for annotating Pyomo modeling components with additional
    data.


    # ### 4.9.1 Suffix Declarations


    The following code creates a suffix labeled `foo`:


    ```

    model.foo = pyo.Suffix()

    ```'
