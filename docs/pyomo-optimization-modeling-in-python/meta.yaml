  md: '# ### 7.3.1 Nonlinear Solvers


    Nonlinear programming solvers require the modeling framework to evaluate the objective
    function and constraints at candidate points in x. As well, many nonlinear solvers
    also require evaluation of first, and often second, derivatives at candidate points.
    However, a Pyomo user does not have to implement these computations. Instead,
    automatic differentiation (AD) tools are used to provide accurate and efficient
    numerical evaluation of the first and second derivatives without any user involvement.


    Pyomo provides interfaces for nonlinear solvers compiled for either AMPL or GAMS,
    and it utilizes the model evaluation and automatic differentiation (AD) capabilities
    provided by these tools to support efficient computation of derivatives. By supporting
    these interfaces, a wide array of solvers are immediately available for use with
    Pyomo without the need to develop individual interfaces for each solver.


    In the case of AMPL solvers, the solver code itself is compiled with the AMPL
    Solver Library (ASL) interface [23], which is in the public domain. Therefore,
    there are a number of open-source solvers available to Pyomo through this interface.
    The Pyomo-GAMS interface performs a translation of the Pyomo model into a GAMS
    model, and consequently a user will need to install GAMS to use GAMS-specific
    solvers.


    # ### 7.3.2 Additional Tips for Nonlinear Programming


    Effective formulation and solution of nonlinear programming problems can be significantly
    more challenging than linear programming problems. In this section, we provide
    a few basic tips to help with the formulation and solution of nonlinear programming
    problems.


    # #### Variable Initialization


    Solvers for nonlinear programming problems often require the initialization of
    problem variables. If initial values are not specified, then Pyomo assumes that
    the initial values are zero. However, these default values cannot be relied on
    in many applications.


    For the general nonconvex case, nonlinear programming problems can, and often
    do, have multiple local solutions. While significant advances have been made in
    global optimization (i.e., rigorous methods that provide a guarantee of global
    optimality), general large-scale problems are often still intractable, even with
    state-of-the-art global solvers. Consequently, one is often forced to employ a
    solver that only provides a guarantee of local optimality. And, it is often critical
    to initialize the problem effectively to ensure convergence to a desirable local
    solution.'
  merge: -1
  pgno: 105
- img_proc: true
  md: 'Sometimes, the undesired local solutions are not physically meaningful, and
    a sensible initialization with reasonable variable bounds is sufficient to ensure
    reliable progress to the desired solution. Other times, there may be several physically
    reasonable local solutions. The development of good nonlinear problem formulations
    often includes significant effort to provide a reasonable initialization strategy.


    # Undefined Evaluations


    Several nonlinear functions are only well defined over a specific domain (e.g.,
    log(x) is only valid for x > 0). Therefore, the modeler must take care to ensure
    the problem formulation restricts the variable values to be within a valid domain.
    This is usually accomplished by setting reasonable bounds and initial values on
    the variables.


    It is also important to note that many nonlinear solvers use first (and sometimes
    second) derivative information for the objective function and the constraints.
    Therefore, one may need to also restrict the variables to be within a valid domain
    for the derivatives of the nonlinear expressions. For example, when sqrt (x) is
    included in an expression, then specifying the bounds x ≥ 0 may not be sufficient.
    While √x is valid at x=0, its derivative, 1/√x is not. This should be considered
    when setting reasonable variable bounds.


    Finally, note that some nonlinear interior-point solvers (e.g., IPOPT) may relax
    the variable bounds slightly before solving the problem. While this has proven
    to be an effective strategy in many applications, this can sometimes cause a domain
    violation even if the modeler has specified reasonable variable bounds. One may
    need to disable this behavior in the solver or apply more conservative bounds.


    # Model Singularities and Problem Scaling


    Many nonlinear programming solvers have restrictions on the constraints (called
    constraint qualifications) that must be satisfied to guarantee convergence. In
    particular, it is often a good idea to ensure the constraints are independent
    everywhere within the solution domain (i.e., the set of active constraint gradients
    are linearly independent). Nocedal and Wright [45] discuss this issue further
    (see Chapter 12).


    Unfortunately, a model satisfying these restrictions in exact math may still exhibit
    problems when solved numerically. If the model is ill-conditioned, then many solvers
    can have difficulty converging or finding a solution efficiently. It is important
    to scale the model to provide a well-conditioned Jacobian and Hessian. This can
    be as simple as linearly scaling the variables and the constraints. In difficult
    cases, the model may need to be reformulated.'
