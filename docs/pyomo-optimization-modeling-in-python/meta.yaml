    \ 当前包含的唯一求解技术是同时离散化方法，也称为直接转录法。该方法将模型中的连续域离散化，并使用在离散点上定义的代数方程来近似微分方程。这种离散化变换的结果是一个纯代数模型，可以使用标准的非线性规划求解器进行求解。\n\
    \n`pyomo.dae` 包含两种离散化方案：有限差分和配置法。这些方案在用于近似导数的代数方程上有所不同，但它们的使用语法几乎完全相同。离散化被应用于特定的连续域，并传播到该域上的每个导数和约束。在您指定离散化方案和离散化分辨率（离散点数）后，`pyomo.dae`\
    \ 会自动向适当的 `ContinuousSet` 添加必要的离散点，并向 Pyomo 模型添加带有离散化方程的额外约束。这会将 DAE 模型转换为代数模型。\n\
    \n**注意：** 与其他 Pyomo 变换不同，`pyomo.dae` 离散化变换目前无法从 `pyomo` 命令行应用，您必须创建一个变换对象并在 Python\
    \ 脚本中对模型应用离散化变换。\n\n### 12.3.1 有限差分变换\n\n有限差分方法使用差分方程来近似特定点的导数，是最容易从概念上理解和实现的离散化方案之一。许多变体在用于近似导数的点的选择上有所不同。后向差分方法，也称为隐式或后向欧拉法，是最常见的变体。为了说明与此方法相关的离散化方程，我们首先定义以下导数和微分方程（约束）：\n\
    \n$$\\left(\\frac{dx(t)}{dt}, f(x(t), u(t))\\right) = 0, \\quad t \\in [0, T].$$\n\
    (12.7)\n\n对连续域 $t$ 应用后向差分方法后，得到的导数和约束对为\n\n$$\\frac{dx}{dt}\\bigg|_{t_{k+1}} =\
