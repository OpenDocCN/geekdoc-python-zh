    # A.11 Assignment, `copy` and `deepcopy`


    # A.11.1 References


    An assignment statement in Python associates a reference with the variable name
    given on the left-hand side of the equals sign. If the value on the right-hand
    side is a literal, then Python creates that thing in memory and assigns a reference
    to it. For example, consider the following Python session:


    ```

    >>> x = [1,2,3]

    >>> y = x

    >>> x[0] = 3

    >>> x.append(6)

    >>> print(y)

    ```


    will result in the output


    ```

    [3,2,3,6]

    ```


    But a subtle point is `y` references the same thing `x` references, not `x` itself.
    So to continue the example:


    ```

    >>> x = [1,2,3]

    >>> y = x

    >>> x[0] = 3

    >>> x = ''Norwegian Blue''

    >>> print(x, y)

    ```


    will result in the output


    ```

    Norwegian Blue [3,2,3]

    ```


    A few types in Python are *immutable*, which means their value in memory cannot
    be changed; among them are `int`, `float`, `decimal`, `bool`, `string`, and `tuple`.
    Apart from `tuple`, this is not surprising. Consider the following:


    ```

    >>> x = (1,2,3)

    >>> y = x

    >>> x[0] = 3

    ```'
