    \ are imported from the GDP package:\n\n```\npython\nfrom pyomo.gdp import Disjunct,\
    \ Disjunction\n```\n\nA disjunct is logically a container for the indicator variable\
    \ and the corresponding constraints. Here we see the power of the hierarchical\
    \ modeling approach enabled by the `Block` component: the `Disjunct` component\
    \ is naturally derived from the `Block` class. As with blocks, `Disjunct` components\
    \ may be arbitrarily indexed and initialized through rules. In addition, they\
    \ may contain any Pyomo modeling component, including not only `Sets`, `Params`,\
    \ `Vars`, and `Constraints`, but also `Blocks`, `Disjuncts`, and `Disjunctions`.\
    \ The only thing that the `Disjunct` class adds to the normal `Block` implementation\
    \ is the implicit and automatic definition of the disjunct's Boolean indicator\
    \ variable.\n\nFor our generator state example, the requisite three disjuncts\
    \ are declared as follows:\n\n```\npython\nmodel.NumTimePeriods = pyo.Param()\n\
    model.GENERATORS = pyo.Set()\nmodel.TIME = pyo.RangeSet(model.NumTimePeriods)\n\
    \nmodel.MaxPower = pyo.Param(model.GENERATORS, \\n    within=pyo.NonNegativeReals)\n\
    model.MinPower = pyo.Param(model.GENERATORS, \\n    within=pyo.NonNegativeReals)\n\
    model.RampUpLimit = pyo.Param(model.GENERATORS, \\n    within=pyo.NonNegativeReals)\n\
    model.RampDownLimit = pyo.Param(model.GENERATORS, \\n    within=pyo.NonNegativeReals)\n\
    model.StartUpRampLimit = pyo.Param(model.GENERATORS, \\n    within=pyo.NonNegativeReals)\n\
    model.ShutDownRampLimit = pyo.Param(model.GENERATORS, \\n    within=pyo.NonNegativeReals)\n\
    \ndef Power_bound(m,g,t):\n    return (0, m.MaxPower[g])\nmodel.Power = pyo.Var(model.GENERATORS,\
    \ model.TIME, \\n    bounds=Power_bound)\n\ndef GenOn(b, g, t):\n    m = b.model()\n\
    \    b.power_limit = pyo.Constraint(\n        expr=pyo.inequality(m.MinPower[g],\
    \ m.Power[g,t], \\n            m.MaxPower[g]) )\n    if t == m.TIME.first():\n\
    \        return\n    b.ramp_limit = pyo.Constraint(\n```"
