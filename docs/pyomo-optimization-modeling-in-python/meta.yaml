  md: "# 4.4 Objectives\n\nSome solvers can perform multi-objective optimization with\
    \ two or more objectives. Multiple objectives can be declared individually or\
    \ they can be indexed and defined using a rule as shown here:\n\n```\nA = ['Q',\
    \ 'R', 'S']\nmodel.x = pyo.Var(A, initialize=1.0)\ndef d_rule(model, i):\n   \
    \ return model.x[i]**2\nmodel.d = pyo.Objective(A, rule=d_rule)\n```\n\nWhen the\
    \ `Objective` object is declared as an indexed component, Pyomo iterates over\
    \ all elements of the index set during object construction, passing each set element\
    \ to the function given as the argument to the `rule` keyword. If multiple sets\
    \ are specified in an `Objective` declaration, then Pyomo iterates over the cross\
    \ product of all sets, providing an element for each set to the rule function.\n\
    \nIn some contexts, it may be convenient to not define objectives for some index\
    \ values. If the construction rule returns `Objective.Skip`, then the objective\
    \ is ignored.\n\n```\ndef e_rule(model, i):\n    if i == 'R':\n        return\
    \ pyo.Objective.Skip\n    return model.x[i]**2\nmodel.e = pyo.Objective(A, rule=e_rule)\n\
    ```\n\nBy default, the declaration of an `Objective` object indicates that the\
    \ objective is to be minimized. The `sense` keyword can be used to indicate an\
    \ objective that is maximized using `sense=pyo.maximize`\n\n# 4.4.2 Working with\
    \ Objective Objects\n\nThe objective function contains a few attributes that may\
    \ be useful for scripting or debugging. The `expr` attribute stores the expression\
    \ for the objective. The `sense` attribute indicates if the objective is to be\
    \ minimized or maximized. The `value` function can be used to compute the value\
    \ of the objective. These are illustrated in the following example:\n\n```\nA\
    \ = ['Q', 'R']\nmodel.x = pyo.Var(A, initialize={'Q':1.5, 'R':2.5})\nmodel.o =\
    \ pyo.Objective(expr=model.x['Q'] + 2*model.x['R'])\nprint(model.o.expr) # x[Q]\
    \ + 2*x[R]\nprint(model.o.sense) # minimize\nprint(pyo.value(model.o)) # 6.5\n\
    ```"
  merge: -1
