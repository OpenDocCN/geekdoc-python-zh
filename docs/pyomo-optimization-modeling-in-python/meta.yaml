    # Chapter 9

    Performance: Model Construction and Solver Interfaces


    **Abstract** This chapter documents tools for profiling model construction and
    improving the performance of both model construction and interaction with solvers.
    We begin by discussing various profiling tools which can be used to help identify
    performance bottlenecks. Pyomo has built-in profiling capabilities, but there
    are also Python packages, such as `cProfile` and `line_profiler`, dedicated to
    performance profiling. Section 9.2 discusses the LinearExpression class, which
    can be used to drastically improve model construction time for some applications.
    Section 9.3 describes how persistent solver interfaces can be used to repeatedly
    solve models with small changes very efficiently. Finally, Section 9.4 discusses
    sparse index sets.


    # 9.1 Profiling to Identify Performance Bottlenecks


    When performance is an issue, it is necessary to identify the performance bottlenecks
    before improvements can be made. This section describes various profiling tools
    which can be used to identify performance bottlenecks.


    Throughout this section, we will be revisiting the warehouse location problem
