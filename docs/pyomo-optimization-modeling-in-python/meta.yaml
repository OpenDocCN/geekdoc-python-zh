    # 9.2 Improving Model Construction Performance with LinearExpression


    In this section, we discuss using the `LinearExpression` class directly in order
    to improve model construction time. Although operator overloading is a very convenient
    way to construct expressions, it can be computationally expensive. Alternatively,
    Pyomo supports creating linear expressions using native Python lists, which can
