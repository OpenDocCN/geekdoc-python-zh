    \ \\text{min}^{-1} \\quad k_2 = \\frac{5}{3} \\text{min}^{-1} \\quad k_3 = \\\
    frac{1}{6000} \\frac{\\text{m}^3}{\\text{gmol min}}$$\n\nSince the volumetric\
    \ flowrate $F$ always appears as the numerator over the reactor volume $V$, it\
    \ is common to consider this ratio as a single variable, called the space-velocity\
