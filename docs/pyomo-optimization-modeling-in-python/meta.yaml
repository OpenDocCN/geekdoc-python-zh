  md: 'ates the expression for the objective in this model with the form:


    $x_1 + 4x_2 + 9x_3$.


    Specifically, Pyomo has treated parameter values as fixed constants, and its expressions
    simply contain the numeric constants.


    ```

    model = pyo.ConcreteModel()

    p = {1:1, 2:4, 3:9}


    model.A = pyo.Set(initialize=[1,2,3])

    model.p = pyo.Param(model.A, initialize=p)

    model.x = pyo.Var(model.A, within=pyo.NonNegativeReals)


    model.o = pyo.Objective(expr=sum(model.p[i]*model.x[i] for i in \n    model.A))

    ```


    Note that this “conversion” happens as soon as the expression is first created.
    The fact that these values come from a Param component is lost, and only the numerical
    values remain. This is done for efficiency. Consequently, these values *cannot
    be changed* once the expression is created.


    However, this behavior is different if the mutable option is specified while constructing
    the model. If this option is True, then the parameter values are not treated as
    constants. Consider the previous example again where the p parameter is now mutable:


    ```

    model = pyo.ConcreteModel()

    p = {1:1, 2:4, 3:9}


    model.A = pyo.Set(initialize=[1,2,3])

    model.p = pyo.Param(model.A, initialize=p, mutable=True)

    model.x = pyo.Var(model.A, within=pyo.NonNegativeReals)


    model.o = pyo.Objective(expr=pyo.summation(model.p, model.x))


    model.p[2] = 4.2

    model.p[3] = 3.14

    ```


    When Pyomo generates the expression for the objective in this model, it keeps
    knowledge of the Param component and now has the form:


    $p_1x_1 + p_2x_2 + p_3x_3$.


    where the values $p_i$ are Param objects with references to the parameter values.
    Here, Pyomo treats the parameter values as mutable values that may be changed
    later by the user. In this example, the parameter values are changed *after* the
    objective expression is defined, and the resulting objective is


    $x_1 + 4.2x_2 + 3.14x_3$.


    The parameters are only replaced with their numerical values when calling the
    solver. Therefore, their values can be changed between consecutive calls to a
    solver.'
