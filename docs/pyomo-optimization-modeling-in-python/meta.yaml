    ```

    set A := a c e g;


    param : B C D :=

    a 10 -1 1.1

    c 30 -3 3.3

    e 50 -5 5.5

    ;

    ```


    The index g is omitted from the `param` command, and consequently this index is
    not valid for the model instance using this data. More complex patterns of missing
    data can be specified using the “.” character to indicate a missing value. This
    syntax is useful when specifying multiple parameters that do not necessarily have
    the same index values:


    ```

    set A := a c e;


    param : B C D :=

    a . -1 1.1

    c 30 . 3.3

    e 50 -5 .

    ;

    ```


    This example provides a concise representation of parameters that share a common
    index set while using different index values.


    Note that this data file specifies the data for set A twice: (1) when A is defined
    and (2) implicitly when the parameters are defined. An alternate syntax for `param`
    allows the user to concisely specify the definition of an index set along with
    associated parameters:


    ```

    param : A : B C D :=

    a 10 -1 1.1

    c 30 -3 3.3

    e 50 -5 5.5

    ;

    ```


    Finally, we note that default values for missing data can also be specified using
    the `default` keyword:


    ```

    set A := a c e;


    param B default 0.0 :=

    c 30

    e 50

    ;

    ```


    Note that default values can only be specified in `param` commands defining values
    for a single parameter.'
- md: "## 10.3.2.2 Multi-Dimensional Parameter Data\n\nMulti-dimensional parameter\
    \ data is indexed over either multiple sets or multi-dimensional sets. Suppose\
    \ parameter B is indexed by set A with dimension 2:\n\n```\nmodel.A = pyo.Set(dimen=2)\n\
    model.B = pyo.Param(model.A)\n```\n\nThe syntax of the `param` data command remains\
    \ essentially the same when specifying values for B with a list of index and parameter\
    \ values:\n\n```\nset A := a 1 c 2 e 3;\n\nparam B :=\na 1 10\nc 2 30\ne 3 50;\n\
    ```\n\nMissing and default values are also handled in the same way with multi-dimensional\
    \ index sets:\n\n```\nset A := a 1 c 2 e 3;\n\nparam B default 0 :=\na 1 10\n\
    c 2 .\ne 3 50;\n```\n\nSimilarly, multiple parameters can be defined with a single\
    \ `param` data command. Suppose that parameters B, C, and D are parameters indexed\
    \ over set A with dimension 2:\n\n```\nmodel.A = pyo.Set(dimen=2)\nmodel.B = pyo.Param(model.A)\n\
    model.C = pyo.Param(model.A)\nmodel.D = pyo.Param(model.A)\n```\n\nThese parameters\
    \ can be defined with a single `param` command that declares the parameter names\
    \ followed by a list of index and parameter values:\n\n```\nset A := a 1 c 2 e\
    \ 3;\n\nparam : B C D :=\na 1 10 -1 1.1\nc 2 30 -3 3.3\ne 3 50 -5 5.5\n;\n```\n\
    \nSimilarly, the following `param` data command defines the index set along with\
    \ the parameters:\n\n```\nparam : A : B C D :=\na 1 10 -1 1.1\nc 2 30 -3 3.3\n\
    e 3 50 -5 5.5\n;\n```\n\nThe `param` command also supports a matrix syntax for\
    \ specifying the values in a parameter with a 2-dimensional index. Suppose parameter\
    \ B is indexed over set A with dimension 2:\n\n```\nmodel.A = pyo.Set(dimen=2)\n\
    model.B = pyo.Param(model.A)\n```\n\nThe following `param` command defines a matrix\
    \ of parameter values:\n\n```\nset A := 1 a 1 c 1 e 2 a 2 c 2 e 3 a 3 c 3 e;\n\
    \nparam B : a c e :=\n1 1 2 3\n2 4 5 6\n3 7 8 9\n;\n```\n\nAdditionally, the following\
    \ syntax can be used to specify a transposed matrix of parameter values:\n\n```\n\
    set A := 1 a 1 c 1 e 2 a 2 c 2 e 3 a 3 c 3 e;\n\nparam B (tr) : 1 2 3 :=\na 1\
    \ 4 7\nc 2 5 8\ne 3 6 9\n;\n```\n\nThis functionality facilitates the presentation\
    \ of parameter data in a natural format. In particular, the transpose syntax may\
    \ allow the specification of tables for which the rows comfortably fit within\
    \ a single line. However, a matrix may be divided column-wise into shorter rows\
    \ since the line breaks are not significant in Pyomo's data commands.\n\nFor parameters\
    \ with three or more indices, the parameter data values must be specified as a\
    \ series of slices. Each slice is defined by a template followed by a list of\
    \ index and parameter values. Suppose that parameter B is indexed over set A that\
    \ has dimension 4:\n\n```\nmodel.A = pyo.Set(dimen=4)\nmodel.B = pyo.Param(model.A)\n\
    ```\n\nThe following `param` command defines a matrix of parameter values with\
    \ multiple templates:\n\n```\nset A := (a,1,a,1) (a,2,a,2) (b,1,b,1) (b,2,b,2);\n\
    \nparam B :=\n\n    [*,1,*,1] a a 10 b b 20\n    [*,2,*,2] a a 30 b b 40\n;\n\
    ```\n\nThe B parameter consists of four values: B[a,1,a,1]=10, B[b,1,b,1]=20,\
    \ B[a,2,a,2]=30, and B[b,2,b,2]=40.\n\n## 10.3.3 The `include` Command\n\nThe\
    \ `include` command allows a data command file to execute data commands from another\
    \ file. For example, the following command file executes data commands from `ex1.dat`\
    \ and then `ex2.dat`:\n\n```\ninclude ex1.dat;\ninclude ex2.dat;\n```\n\nPyomo\
    \ is sensitive to the order of execution of data commands, since data commands\
    \ can redefine set and parameter values. The `include` command respects this data\
    \ ordering; all data commands in the included file are executed before the remaining\
    \ data commands in the current file are executed.\n\n## 10.3.4 Data Namespaces\n\
    \nThe `namespace` keyword is not a data command, but instead it is used to structure\
    \ the specification of Pyomo’s data commands. Specifically, a namespace declaration\
    \ is used to group data commands and to provide a group label. Consider the following\
    \ data command file:\n\n```\nset C := 1 2 3 ;\n\nnamespace ns1\n{\n    set C :=\
    \ 4 5 6 ;\n}\n\nnamespace ns2\n{\n    set C := 7 8 9 ;\n}\n```\n\nThis data file\
    \ defines two namespaces: `ns1` and `ns2` that initialize a set `C`. By default,\
    \ data commands contained within a namespace are ignored during model construction;\
    \ when no namespaces are specified, the set `C` has values 1, 2, 3. When namespace\
    \ `ns1` is specified, then set `C` values are overridden with the set 4, 5, 6.\
    \ See Section 10.2.2.2 for an example of how namespaces are selected with the\
    \ `pyomo` command.\n\n## 10.4 Build Components\n\nIn a function constructing a\
    \ `ConcreteModel` one can insert Python code anywhere in the process. One can,\
    \ for example, fix a particular combination of variables, print the value of a\
    \ parameter, or throw an exception if a particular combination of parameter values\
    \ is not valid. To provide this functionality for an AbstractModel, Pyomo supports\
    \ a set of components enabling execution of Python code during the build process.\n\
    \nThe BuildAction component can be defined in the model to inject actions (defined\
    \ through Python code) into the model construction process. Similarly, the BuildCheck\
    \ component is used to perform a user-defined test (again, through Python code)\
    \ during the model construction process and halt construction if the test fails.\
    \ These components are added to a model in the same manner as other components,\
    \ but their role is to allow a user to insert scripting-like code into the model\
    \ construction process.\n\nConsider the following abstract model (defined in buildactions.py)\
    \ illustrating the use of BuildAction and BuildCheck components to define error\
    \ checks and diagnostic output based on our warehouse location example defined\
    \ in Sections 3.2 and 10.1.3.\n\n```\nimport pyomo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\
    \nmodel.N = pyo.Set() # Set of warehouses\nmodel.M = pyo.Set() # Set of customers\n\
    model.d = pyo.Param(model.N,model.M)\nmodel.P = pyo.Param()\n\nmodel.x = pyo.Var(model.N,\
    \ model.M, bounds=(0,1))\nmodel.y = pyo.Var(model.N, within=pyo.Binary)\n\ndef\
    \ checkPN_rule(model):\n    return model.P <= len(model.N)\nmodel.checkPN = pyo.BuildCheck(rule=checkPN_rule)\n\
    \ndef obj_rule(model):\n    return sum(model.d[n,m]*model.x[n,m] for n in model.N\
    \ for m \\\n        in model.M)\nmodel.obj = pyo.Objective(rule=obj_rule)\n\n\
    def one_per_cust_rule(model, m):\n    return sum(model.x[n,m] for n in model.N)\
    \ == 1\nmodel.one_per_cust = pyo.Constraint(model.M, \\\n    rule=one_per_cust_rule)\n\
    \ndef warehouse_active_rule(model, n, m):\n    return model.x[n,m] <= model.y[n]\n\
    model.warehouse_active = pyo.Constraint(model.N, model.M, \\\n    rule=warehouse_active_rule)\n\
    \ndef num_warehouses_rule(model):\n    return sum(model.y[n] for n in model.N)\
    \ <= model.P\nmodel.num_warehouses = pyo.Constraint(rule=num_warehouses_rule)\n\
    ```\n\n```\npython\ndef printM_rule(model):\n    model.M.pprint()\nmodel.printM\
    \ = pyo.BuildAction(rule=printM_rule)\n\n```\n\nIn this example, we have added\
    \ a BuildCheck component with the rule checkPN_rule. This rule will check to make\
    \ sure the total number of warehouses we can place is not more than the number\
    \ of available warehouse locations. We have also added a BuildAction component\
    \ with the rule printM_rule to print the set of customer locations.\n\nWe created\
    \ a .dat file where the parameter P is larger than the available number of warehouse\
    \ locations (so it would fail the checkPN_rule build check):\n\n```\ntext\n# buildactions_fails.dat:\
    \ Pyomo format data file for the \\\n# warehouse location problem\n# Note: parameter\
    \ P is larger than the number of warehouse \\\n# locations\n\nset N := Harlingen\
    \ Memphis Ashland ;\nset M := NYC LA Chicago Houston;\n\nparam d :=\nHarlingen\
    \ NYC 1956\nHarlingen LA 1606\nHarlingen Chicago 1410\nHarlingen Houston 330\n\
    Memphis NYC 1096\nMemphis LA 1792\nMemphis Chicago 531\nMemphis Houston 567\n\
    Ashland NYC 485\nAshland LA 2322\nAshland Chicago 324\nAshland Houston 1236\n\
    ;\n\nparam P := 4 ;\n\n```\n\nSolving this with the pyomo command:\n\n```\nbash\n\
    pyomo solve --solver=glpk buildactions.py buildactions_fails.dat\n\n```\n\ngives\
    \ us output similar to the following:\n\n```\ntext\n[   0.00] Setting up Pyomo\
    \ environment\n[   0.00] Applying Pyomo preprocessing actions\n[   0.00] Creating\
    \ model\nERROR: Constructing component 'checkPN' from data=None failed:\n    \
    \    ValueError: BuildCheck 'checkPN' identified error\n[   0.01] Pyomo Finished\n\
    ERROR: Unexpected exception while running model:\n        BuildCheck 'checkPN'\
    \ identified error\n\n```\n\nAs with other components, the BuildAction and BuildCheck\
    \ components can be indexed, which allows actions and checks to be customized\
    \ based on specific data."
  mdcn: "## 10.3.2.2 多维参数数据\n\n多维参数数据通过多个集合或多维集合进行索引。假设参数 B 通过二维集合 A 进行索引：\n\n```\n\
    model.A = pyo.Set(dimen=2)\nmodel.B = pyo.Param(model.A)\n```\n\n当使用索引和参数值列表为\
    \ B 指定值时，`param` 数据命令的语法基本保持不变：\n\n```\nset A := a 1 c 2 e 3;\n\nparam B :=\n\
    a 1 10\nc 2 30\ne 3 50;\n```\n\n缺失值和默认值的处理方式在多维索引集中也相同：\n\n```\nset A := a 1 c\
    \ 2 e 3;\n\nparam B default 0 :=\na 1 10\nc 2 .\ne 3 50;\n```\n\n类似地，可以使用单个 `param`\
    \ 数据命令定义多个参数。假设参数 B、C 和 D 是通过二维集合 A 索引的参数：\n\n```\nmodel.A = pyo.Set(dimen=2)\n\
    model.B = pyo.Param(model.A)\nmodel.C = pyo.Param(model.A)\nmodel.D = pyo.Param(model.A)\n\
    ```\n\n这些参数可以使用单个 `param` 命令来定义，该命令声明参数名称，后跟索引和参数值列表：\n\n```\nset A := a 1 c 2\
    \ e 3;\n\nparam : B C D :=\na 1 10 -1 1.1\nc 2 30 -3 3.3\ne 3 50 -5 5.5\n;\n```\n\
    \n类似地，以下 `param` 数据命令同时定义了索引集和参数：\n\n```\nparam : A : B C D :=\na 1 10 -1 1.1\n\
    c 2 30 -3 3.3\ne 3 50 -5 5.5\n;\n```\n\n`param` 命令还支持使用矩阵语法来指定具有二维索引的参数值。假设参数\
    \ B 通过二维集合 A 进行索引：\n\n```\nmodel.A = pyo.Set(dimen=2)\nmodel.B = pyo.Param(model.A)\n\
    ```\n\n以下 `param` 命令定义了一个参数值矩阵：\n\n```\nset A := 1 a 1 c 1 e 2 a 2 c 2 e 3 a 3\
    \ c 3 e;\n\nparam B : a c e :=\n1 1 2 3\n2 4 5 6\n3 7 8 9\n;\n```\n\n此外，可以使用以下语法来指定参数值的转置矩阵：\n\
    \n```\nset A := 1 a 1 c 1 e 2 a 2 c 2 e 3 a 3 c 3 e;\n\nparam B (tr) : 1 2 3 :=\n\
    a 1 4 7\nc 2 5 8\ne 3 6 9\n;\n```\n\n此功能便于以自然的格式呈现参数数据。特别是，转置语法可以方便地指定那些行内容能舒适地容纳在单行内的表格。然而，由于\
    \ Pyomo 数据命令中的换行符并不重要，矩阵也可以按列拆分成更短的行。\n\n对于具有三个或更多索引的参数，其数据值必须指定为一系列切片。每个切片由一个模板定义，后跟索引和参数值列表。假设参数\
    \ B 通过具有四个维度的集合 A 进行索引：\n\n```\nmodel.A = pyo.Set(dimen=4)\nmodel.B = pyo.Param(model.A)\n\
    ```\n\n以下 `param` 命令使用多个模板定义了参数值矩阵：\n\n```\nset A := (a,1,a,1) (a,2,a,2) (b,1,b,1)\
    \ (b,2,b,2);\n\nparam B :=\n\n    [*,1,*,1] a a 10 b b 20\n    [*,2,*,2] a a 30\
    \ b b 40\n;\n```\n\n参数 B 包含四个值：B[a,1,a,1]=10, B[b,1,b,1]=20, B[a,2,a,2]=30, 和\
    \ B[b,2,b,2]=40。\n\n## 10.3.3 `include` 命令\n\n`include` 命令允许一个数据命令文件执行来自另一个文件的数据命令。例如，以下命令文件执行来自\
    \ `ex1.dat` 然后 `ex2.dat` 的数据命令：\n\n```\ninclude ex1.dat;\ninclude ex2.dat;\n```\n\
    \nPyomo 对数据命令的执行顺序敏感，因为数据命令可以重新定义集合和参数值。`include` 命令遵循这种数据顺序；被包含文件中的所有数据命令会在当前文件中剩余的数据命令执行之前执行。\n\
    \n## 10.3.4 数据命名空间\n\n`namespace` 关键字本身不是一个数据命令，而是用于构建 Pyomo 数据命令的结构。具体来说，命名空间声明用于分组数据命令并提供组标签。考虑以下数据命令文件：\n\
    \n```\nset C := 1 2 3 ;\n\nnamespace ns1\n{\n    set C := 4 5 6 ;\n}\n\nnamespace\
    \ ns2\n{\n    set C := 7 8 9 ;\n}\n```\n\n该数据文件定义了两个命名空间：`ns1` 和 `ns2`，它们初始化了一个集合\
    \ `C`。默认情况下，在模型构建过程中会忽略命名空间内包含的数据命令；当未指定命名空间时，集合 `C` 具有值 1、2、3。当指定命名空间 `ns1` 时，集合\
    \ `C` 的值会被集合 4、5、6 覆盖。有关如何使用 `pyomo` 命令选择命名空间的示例，请参见第 10.2.2.2 节。\n\n## 10.4 构建组件\n\
    \n在构建 `ConcreteModel` 的函数中，可以在过程中的任何位置插入 Python 代码。例如，可以固定变量的特定组合、打印参数值，或者在特定参数值组合无效时抛出异常。为了为\
    \ `AbstractModel` 提供此功能，Pyomo 支持一组组件，允许在构建过程中执行 Python 代码。\n\n`BuildAction` 组件可以定义在模型中，以将操作（通过\
    \ Python 代码定义）注入模型构建过程。类似地，`BuildCheck` 组件用于在模型构建过程中执行用户定义的测试（同样通过 Python 代码），如果测试失败则停止构建。这些组件以与其他组件相同的方式添加到模型中，但它们的作用是允许用户将类似脚本的代码插入到模型构建过程中。\n\
    \n考虑以下抽象模型（定义在 buildactions.py 中），它演示了如何使用 `BuildAction` 和 `BuildCheck` 组件，基于我们在第\
    \ 3.2 和 10.1.3 节定义的仓库选址示例来定义错误检查和诊断输出。\n\n```\nimport pyomo.environ as pyo\n\n\
    model = pyo.AbstractModel()\n\nmodel.N = pyo.Set() # Set of warehouses\nmodel.M\
    \ = pyo.Set() # Set of customers\nmodel.d = pyo.Param(model.N,model.M)\nmodel.P\
    \ = pyo.Param()\n\nmodel.x = pyo.Var(model.N, model.M, bounds=(0,1))\nmodel.y\
    \ = pyo.Var(model.N, within=pyo.Binary)\n\ndef checkPN_rule(model):\n    return\
    \ model.P <= len(model.N)\nmodel.checkPN = pyo.BuildCheck(rule=checkPN_rule)\n\
    \ndef obj_rule(model):\n    return sum(model.d[n,m]*model.x[n,m] for n in model.N\
    \ for m \\\n        in model.M)\nmodel.obj = pyo.Objective(rule=obj_rule)\n\n\
    def one_per_cust_rule(model, m):\n    return sum(model.x[n,m] for n in model.N)\
    \ == 1\nmodel.one_per_cust = pyo.Constraint(model.M, \\\n    rule=one_per_cust_rule)\n\
    \ndef warehouse_active_rule(model, n, m):\n    return model.x[n,m] <= model.y[n]\n\
    model.warehouse_active = pyo.Constraint(model.N, model.M, \\\n    rule=warehouse_active_rule)\n\
    \ndef num_warehouses_rule(model):\n    return sum(model.y[n] for n in model.N)\
    \ <= model.P\nmodel.num_warehouses = pyo.Constraint(rule=num_warehouses_rule)\n\
    ```\n\n```\npython\ndef printM_rule(model):\n    model.M.pprint()\nmodel.printM\
    \ = pyo.BuildAction(rule=printM_rule)\n\n```\n\n在此示例中，我们添加了一个带有规则 `checkPN_rule`\
    \ 的 `BuildCheck` 组件。此规则将检查以确保我们可以放置的仓库总数不超过可用仓库位置的数量。我们还添加了一个带有规则 `printM_rule`\
    \ 的 `BuildAction` 组件来打印客户位置的集合。\n\n我们创建了一个 .dat 文件，其中参数 P 大于可用的仓库位置数量（因此它将无法通过\
    \ `checkPN_rule` 构建检查）：\n\n```\ntext\n# buildactions_fails.dat: Pyomo format data\
    \ file for the \\\n# warehouse location problem\n# Note: parameter P is larger\
    \ than the number of warehouse \\\n# locations\n\nset N := Harlingen Memphis Ashland\
    \ ;\nset M := NYC LA Chicago Houston;\n\nparam d :=\nHarlingen NYC 1956\nHarlingen\
    \ LA 1606\nHarlingen Chicago 1410\nHarlingen Houston 330\nMemphis NYC 1096\nMemphis\
    \ LA 1792\nMemphis Chicago 531\nMemphis Houston 567\nAshland NYC 485\nAshland\
    \ LA 2322\nAshland Chicago 324\nAshland Houston 1236\n;\n\nparam P := 4 ;\n\n\
    ```\n\n使用 `pyomo` 命令解决此问题：\n\n```\nbash\npyomo solve --solver=glpk buildactions.py\
    \ buildactions_fails.dat\n\n```\n\n会得到类似以下的输出：\n\n```\ntext\n[   0.00] Setting\
    \ up Pyomo environment\n[   0.00] Applying Pyomo preprocessing actions\n[   0.00]\
    \ Creating model\nERROR: Constructing component 'checkPN' from data=None failed:\n\
    \        ValueError: BuildCheck 'checkPN' identified error\n[   0.01] Pyomo Finished\n\
    ERROR: Unexpected exception while running model:\n        BuildCheck 'checkPN'\
    \ identified error\n\n```\n\n与其他组件一样，`BuildAction` 和 `BuildCheck` 组件可以被索引，这允许根据特定数据定制操作和检查。"
