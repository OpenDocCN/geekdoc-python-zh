    # 6.2 Using Solvers


    As seen in Section 5.1 the `SolverFactory` function is used to construct a solver
    interface object. The argument passed to the solver factory specifies the name
    of the solver being used. In most cases, this is the name of the executable that
    will be used to solve the problem; however, Pyomo supports shorter names for some
    solvers. For example, the GLPK solver can be specified with


    ```

    python

    solver = pyo.SolverFactory(''glpk'')

    ```


    Once a solver object has been constructed, the solver can be invoked by calling
    the `solve()` method. The `solve()` method accepts a number of keyword arguments,
    a few of which are shown here, more or less in order of importance.


    +   - `options`: A dictionary of options to be passed to the underlying solver.

    - `tee`: If this argument is `True`, then the solver output is printed both to
    the standard output as well as saved to the log file. If `False` (the default),
    then the solver output is only saved to log file if the solver creates one.

    - `load_solutions`: If this argument is `True` (the default), then solution values
    are automatically transferred to `Var` objects on the model. If `False`,'
