    # Chapter 1 Introduction


    **Abstract** This chapter introduces and motivates Pyomo, a Python-based tool
    for modeling and solving optimization problems. Modeling is a fundamental process
    in many aspects of scientific research, engineering, and business. Algebraic modeling
    languages like Pyomo are high-level languages for specifying and solving mathematical
    optimization problems. Pyomo is a flexible, extensible modeling framework that
    captures and extends central ideas found in modern algebraic modeling languages,
    all within the context of a widely used programming language.


    ### 1.1 Modeling Languages for Optimization


    This book describes a tool for mathematical modeling: the Python Optimization
    Modeling Objects (Pyomo) software package. Pyomo supports the formulation and
    analysis of mathematical models for complex optimization applications. This capability
    is commonly associated with commercial algebraic modeling languages (AMLs) such
    as AIMMS [1], AMPL [2], and GAMS [22]. Pyomo implements a rich set of modeling
    and analysis capabilities, and it provides access to these capabilities within
    Python, a full-featured, high-level programming language with a large set of supporting
    libraries.


    Optimization models define the goals or objectives for a system under consideration.
    Optimization models can be used to explore trade-offs between goals and objectives,
    identify extreme states and worst-case scenarios, and identify key factors that
    influence phenomena in a system. Consequently, optimization models are used to
    analyze a wide range of scientific, business, and engineering applications.


    The widespread availability of computing resources has made the numerical analysis
    of optimization models commonplace. The computational analysis of an optimization
    model requires the specification of a model that is communicated to a solver software
    package. Without a language to specify optimization models, the process of writing
    input files, executing a solver, and extracting results from a solver is tedious
    and error-prone. This difficulty is compounded in complex, large-scale, real-world
    applications that are difficult to debug when errors occur. Additionally, solvers
    use many different input formats, but few of them are considered to be standards.
    Thus, the application of multiple solvers to analyze a single optimization model
    introduces additional complexities. Furthermore, model verification (i.e., ensuring
    that the model communicated to the solver accurately reflects the model the developer
    intended to express) is extremely difficult without high-level languages for expressing
    models.


    AMLs are high-level languages for describing and solving optimization problems
    [26, 37]. AMLs minimize the difficulties associated with analyzing optimization
    models by enabling high-level specification of optimization problems. Furthermore,
    AML software provides rigorous interfaces to external solver packages that are
    used to analyze problems, and it allows the user to interact with solver results
    in the context of their high-level model specification.


    Custom AMLs like AIMMS [1], AMPL [2, 21], and GAMS [22] implement optimization
    model specification languages with an intuitive and concise syntax for defining
    variables, constraints, and objectives. Further, these AMLs support specification
    of abstract concepts such as sparse sets, indices, and algebraic expressions,
    which are essential when specifying large-scale, real-world problems with thousands
    or millions of constraints and variables. These AMLs can represent a wide variety
    of optimization models, and they interface with a rich set of solver packages.
    AMLs are increasingly being extended to include custom scripting capabilities,
    which enables expression of high-level analysis algorithms concurrently with optimization
    model specifications.


    A complementary strategy is to use an AML that extends a standard high-level programming
    language (as opposed to being based on a proprietary language) to formulate optimization
    models that are analyzed with solvers written in low-level languages. This two-language
    approach leverages the flexibility of the high-level language for formulating
    optimization problems and the efficiency of the low-level language for numerical
    computations. This is an increasingly common approach for scientific computing
    software. The Matlab TOMLAB Optimization Environment [57] is among the most mature
    optimization software package using this approach; Pyomo strongly leverages this
    approach as well. Similarly, standard programming languages like Java and C++
    have been extended to include AML constructs. For example, modeling libraries
    like FlopC++ [19], OptimJ [47], and JuMP [13] support the specification of optimization
    models using an object-oriented design in C++, Java, and Julia, respectively.
    Although these modeling libraries sacrifice some of the intuitive mathematical
    syntax of a custom AML, they allow the user to leverage the flexibility of modern
    high-level programming languages. A further advantage of these AML libraries is
    that they can link directly to high-performance optimization libraries and solvers,
    which can be an important consideration in some applications.'
