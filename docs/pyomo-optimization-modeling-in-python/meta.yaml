- md: "## Chapter 10\nAbstract Models and Their Solution\n\n**Abstract** This chapter\
    \ describes how to declare and use an `AbstractModel` and data command files to\
    \ initialize abstract models. Finally, this chapter describes the `pyomo` command,\
    \ which makes it particularly easy to solve an abstract model using data command\
    \ files. Although concrete and abstract models provide similar functionality,\
    \ abstract models make a strong separation of model formulation and model data,\
    \ which is conceptually nice and practically useful in some contexts.\n\n### 10.1\
    \ Overview\n\nIn many of the examples in this book, we use a function that takes\
    \ in data and returns a `ConcreteModel`. This facilitates separating the concepts\
    \ of model and data. The `AbstractModel` class in Pyomo provides this separation\
    \ by populating the model with data only after the abstract model object has been\
    \ created.\n\n### 10.1.1 Abstract and Concrete Models\n\nPyomo supports two strategies\
    \ for model declaration: concrete models, which immediately construct model components,\
    \ and abstract models, which defer component construction. Abstract models reflect\
    \ the structure of many mathematical optimization formulations. For example, the\
    \ formulation of the warehouse location problem (WL) on page 26 is written in\
    \ a general manner describing a class of optimization problems. However, we cannot\
    \ *solve* this problem because the actual data for the problem ($N$, $M$, $d$,\
    \ and $P$) have not been specified. A solver must be given a specific instance\
    \ of a problem (with the data specified).\n\nIn Pyomo, an abstract model is declared\
    \ first, and component construction is delayed until the data is loaded and Pyomo\
    \ creates the model instance. This modeling approach is illustrated in the top\
    \ pane of Figure 10.1. An `AbstractModel` object is created, and then the data\
    \ for a particular problem is given to Pyomo, and then Pyomo performs the construction\
    \ process in order to create an *instance* of the model with all the variables,\
    \ constraint expressions, and objective expressions that can be sent to a solver.\
    \ This requires a two-pass approach where the model is declared in the first pass,\
    \ and subsequently the model is constructed using data values specified separately.\
    \ To support delayed construction, the model must be defined using construction\
    \ rules.\n\nBy contrast, concrete models support a programmatic style where the\
    \ model instance is created immediately; model components are constructed and\
    \ initialized on the first pass as Python executes the model script. This modeling\
    \ approach is illustrated in the bottom pane of Figure 10.1. A ConcreteModel object\
    \ is created, and the data needs to be present *before* each component is declared.\
    \ As Python executes your model script, the particular model instance and its\
    \ components are created immediately as Python encounters the component declaration.\
    \ Once the execution through the Python file is completed the model is ready to\
    \ be sent to the solver (i.e., a single pass). At this point, the ConcreteModel\
    \ is the specific instance.\n\n> NOTE: Construction rules can be still be used\
    \ with concrete models (the rules are immediately fired as they are encountered\
    \ in the model's Python file).\n\n![](img/ebd5113b8e992ca06e2e931a59f910c7_145_0.png)\n\
    \n![](img/ebd5113b8e992ca06e2e931a59f910c7_145_1.png)\n\nFig. 10.1: This figure\
    \ describes the construction process for both abstract and concrete models. The\
    \ top pane describes the declarative style used for abstract models. The AbstractModel\
    \ is first created. Then, given a particular realization of the data, Pyomo performs\
    \ the construction process in order to create an instance of the model that can\
    \ be sent to the solver. The bottom pane describes the programmatic style used\
    \ for concrete models. As Python executes the model script, the component objects\
    \ are constructed immediately using data previously declared. The particular model\
    \ instance is ready to be sent to the solver once the first pass is complete.\n\
    \nThe choice of which model object to use (`AbstractModel` or `ConcreteModel`)\
    \ is largely a matter of taste and preference. The biggest difference between\
    \ the use of `AbstractModel` or `ConcreteModel` relates to the specification of\
    \ data. When using an `AbstractModel`, the names and structure of the data used\
    \ in a model are declared prior to construction (but not the values themselves).\
    \ This means Pyomo is aware of the existence of the sets and parameters that *will*\
    \ be encountered when constructing the instance. More importantly, Pyomo knows\
    \ the associated names and types of these quantities and something about the relationships\
    \ among them (e.g., the variable $y$ is indexed by set $N$). This allows the user\
    \ to specify the data using any number of Pyomo supported data formats while referring\
    \ to these quantities by name. Pyomo includes many options for supplying data\
    \ to an abstract model, including a *data command file* to specify values for\
    \ set and parameter data. The syntax of Pyomo's data command files is very similar\
    \ to the data command syntax supported by AMPL [2].\n\nConcrete models facilitate\
    \ more straightforward use of native Python data types when creating a model instance.\
    \ Therefore, if you are more comfortable building models in a procedural programming\
    \ environment (like Python or MATLAB), or if your application requires a more\
    \ extensive workflow than that supported by the `pyomo` command, then a `ConcreteModel`\
    \ is more appropriate. This is especially true if your data can be easily loaded\
    \ into Python through other Python packages (e.g., pandas).\n\n> **NOTE:** In\
    \ general, an `AbstractModel` is more straightforward for users that are unfamiliar\
    \ with Python or prefer to work in some more traditional AML environments. A `ConcreteModel`\
    \ often requires Python coding on the part of the user to load the data (e.g.,\
    \ using an existing Python package for the raw data format) and apply it to the\
    \ model, but offers transparent control over execution order.\n\n### 10.1.2 An\
    \ Abstract Formulation of Model (H)\n\nConsider model (H) (see page 19), which\
    \ is reproduced here for convenience:\n\n$$\\begin{aligned}\n\\max_{x} \\sum_{i\
    \ \\in \\mathscr{A}} h_i \\cdot (x_i - (x_i/d_i)^2) \\quad (H) \\\\\n\\text{s.t.}\
    \ \\sum_{i \\in \\mathscr{A}} c_i x_i \\leq b \\\\\n0 \\leq x_i \\leq u_i, \\\
    quad i \\in \\mathscr{A}\n\\end{aligned}$$\n\nSince model (H) is an abstract model,\
    \ a natural way of expressing this model in Pyomo is with Pyomo's `AbstractModel`\
    \ class.\n\nConsider the following Pyomo model for this problem:\n\n```python\n\
    # AbstractH.py - Implement model (H)\nimport pyomo.environ as pyo\n\nmodel = pyo.AbstractModel(name=\"\
    (H)\")\n\nmodel.A = pyo.Set()\n\nmodel.h = pyo.Param(model.A)\nmodel.d = pyo.Param(model.A)\n\
    model.c = pyo.Param(model.A)\nmodel.b = pyo.Param()\nmodel.u = pyo.Param(model.A)\n\
    \ndef xbounds_rule(model, i):\n    return (0, model.u[i])\nmodel.x = pyo.Var(model.A,\
    \ bounds=xbounds_rule)\n\ndef obj_rule(model):\n    return sum(model.h[i] * \\\
    \n            (model.x[i] - (model.x[i]/model.d[i])**2) \\\n            for i\
    \ in model.A)\nmodel.z = pyo.Objective(rule=obj_rule, sense=pyo.maximize)\n\n\
    def budget_rule(model):\n    return sum(model.c[i]*model.x[i] for i in model.A)\
    \ <= model.b\nmodel.budgetconstr = pyo.Constraint(rule=budget_rule)\n```\n\nGiven\
    \ particular data for the parameters in this model, then one might be interested\
    \ in finding an optimal assignment of values to `model.x`. There are a variety\
    \ of ways to provide data to Pyomo for an abstract model. Here is data (saved\
    \ in `AbstractH.dat`) defining a suitable happiness objective for one of the authors\
    \ of this book:\n\n```\n# Pyomo data file for AbstractH.py\nset A := I_C_Scoops\
    \ Peanuts ;\nparam h := I_C_Scoops 1 Peanuts 0.1 ;\nparam d :=\n    I_C_Scoops\
    \ 5\n    Peanuts 27 ;\nparam c := I_C_Scoops 3.14 Peanuts 0.2718 ;\nparam b :=\
    \ 12 ;\nparam u := I_C_Scoops 100 Peanuts 40.6 ;\n```\n\nThis is a Pyomo data\
    \ file, which includes `set` and `param` commands closely resembling AMPL data\
    \ commands. Description of these data commands is given in Section 10.3.\n\nThe\
    \ following lines can be used to optimize an abstract model, by adding them to\
    \ the Python file defining the model:"
  mdcn: "## 第10章\n抽象模型及其求解\n\n**摘要** 本章介绍如何声明和使用`AbstractModel`以及数据命令文件来初始化抽象模型。最后，本章介绍`pyomo`命令，该命令使得使用数据命令文件求解抽象模型变得尤为简便。尽管具体模型和抽象模型提供相似的功能，但抽象模型在模型构建与模型数据之间实现了清晰的分离，这在概念上很优雅，在某些场景下也具有实际效用。\n\
    \n### 10.1 概述\n\n在本书的许多示例中，我们使用一个函数，该函数接收数据并返回一个`ConcreteModel`。这有助于分离模型和数据的概念。Pyomo中的`AbstractModel`类通过仅在抽象模型对象创建后才用数据填充模型来实现这种分离。\n\
    \n### 10.1.1 抽象模型与具体模型\n\nPyomo支持两种模型声明策略：具体模型（立即构建模型组件）和抽象模型（延迟组件构建）。抽象模型反映了许多数学优化问题的结构。例如，第26页的仓库选址问题（WL）的公式是以一般形式编写的，描述了一类优化问题。然而，我们无法*求解*这个问题，因为问题的实际数据（$N$,\
    \ $M$, $d$, 和 $P$）尚未指定。求解器必须获得一个特定的问题实例（数据已指定）。\n\n在Pyomo中，首先声明一个抽象模型，组件构建被延迟，直到数据加载完毕且Pyomo创建模型实例。这种建模方法如图10.1的上半部分所示。首先创建一个`AbstractModel`对象，然后将特定问题的数据提供给Pyomo，接着Pyomo执行构建过程，以创建一个包含所有变量、约束表达式和目标表达式的模型*实例*，该实例可以发送给求解器。这需要一个两遍的方法：第一遍声明模型，随后使用单独指定的数据值构建模型。为了支持延迟构建，模型必须使用构建规则来定义。\n\
    \n相比之下，具体模型支持一种编程风格，其中模型实例是立即创建的；当Python执行模型脚本时，模型组件在第一遍就被构建和初始化。这种建模方法如图10.1的下半部分所示。创建一个ConcreteModel对象，并且在声明每个组件*之前*数据就需要存在。当Python执行你的模型脚本时，特定的模型实例及其组件在Python遇到组件声明时立即创建。一旦Python文件的执行完成，模型就可以发送给求解器（即单遍完成）。此时，ConcreteModel就是特定的实例。\n\
    \n> 注意：构建规则仍然可以与具体模型一起使用（这些规则在模型的Python文件中遇到时会立即触发）。\n\n![](img/ebd5113b8e992ca06e2e931a59f910c7_145_0.png)\n\
    \n![](img/ebd5113b8e992ca06e2e931a59f910c7_145_1.png)\n\n图10.1：此图描述了抽象模型和具体模型的构建过程。上半部分描述了用于抽象模型的声明式风格。首先创建AbstractModel。然后，给定数据的特定实现，Pyomo执行构建过程以创建一个可以发送给求解器的模型实例。下半部分描述了用于具体模型的编程式风格。当Python执行模型脚本时，组件对象使用先前声明的数据立即构建。一旦第一遍完成，特定的模型实例就可以发送给求解器。\n\
    \n选择使用哪种模型对象（`AbstractModel`或`ConcreteModel`）在很大程度上取决于个人品味和偏好。使用`AbstractModel`或`ConcreteModel`的最大区别在于数据的指定方式。使用`AbstractModel`时，模型中使用的数据的名称和结构在构建之前就被声明（但值本身不是）。这意味着Pyomo知道在构建实例时*将*遇到的集合和参数的存在。更重要的是，Pyomo知道这些量的关联名称和类型，以及它们之间的一些关系（例如，变量$y$由集合$N$索引）。这允许用户使用任何数量的Pyomo支持的数据格式来指定数据，同时通过名称引用这些量。Pyomo包含许多选项来向抽象模型提供数据，包括一个*数据命令文件*来指定集合和参数数据的值。Pyomo数据命令文件的语法与AMPL\
    \ [2]支持的数据命令语法非常相似。\n\n具体模型在创建模型实例时更便于直接使用原生Python数据类型。因此，如果你更习惯在过程式编程环境（如Python或MATLAB）中构建模型，或者如果你的应用程序需要比`pyomo`命令支持的更广泛的工作流程，那么`ConcreteModel`更合适。如果你的数据可以通过其他Python包（例如pandas）轻松加载到Python中，这一点尤其正确。\n\
    \n> **注意：** 一般来说，对于不熟悉Python或更喜欢在更传统的AML环境中工作的用户，`AbstractModel`更直接。`ConcreteModel`通常需要用户进行Python编码来加载数据（例如，使用现有的Python包处理原始数据格式）并将其应用于模型，但提供了对执行顺序的透明控制。\n\
    \n### 10.1.2 模型（H）的抽象公式\n\n考虑模型（H）（见第19页），为方便起见在此复现：\n\n$$\\begin{aligned}\n\\\
    max_{x} \\sum_{i \\in \\mathscr{A}} h_i \\cdot (x_i - (x_i/d_i)^2) \\quad (H)\
    \ \\\\\n\\text{s.t.} \\sum_{i \\in \\mathscr{A}} c_i x_i \\leq b \\\\\n0 \\leq\
    \ x_i \\leq u_i, \\quad i \\in \\mathscr{A}\n\\end{aligned}$$\n\n由于模型（H）是一个抽象模型，在Pyomo中表达此模型的自然方式是使用Pyomo的`AbstractModel`类。\n\
    \n考虑以下针对此问题的Pyomo模型：\n\n```python\n# AbstractH.py - Implement model (H)\nimport\
    \ pyomo.environ as pyo\n\nmodel = pyo.AbstractModel(name=\"(H)\")\n\nmodel.A =\
    \ pyo.Set()\n\nmodel.h = pyo.Param(model.A)\nmodel.d = pyo.Param(model.A)\nmodel.c\
    \ = pyo.Param(model.A)\nmodel.b = pyo.Param()\nmodel.u = pyo.Param(model.A)\n\n\
    def xbounds_rule(model, i):\n    return (0, model.u[i])\nmodel.x = pyo.Var(model.A,\
    \ bounds=xbounds_rule)\n\ndef obj_rule(model):\n    return sum(model.h[i] * \\\
    \n            (model.x[i] - (model.x[i]/model.d[i])**2) \\\n            for i\
    \ in model.A)\nmodel.z = pyo.Objective(rule=obj_rule, sense=pyo.maximize)\n\n\
    def budget_rule(model):\n    return sum(model.c[i]*model.x[i] for i in model.A)\
    \ <= model.b\nmodel.budgetconstr = pyo.Constraint(rule=budget_rule)\n```\n\n给定此模型中参数的特定数据，人们可能对找到`model.x`的最优赋值感兴趣。有多种方式可以为抽象模型向Pyomo提供数据。以下是定义本书其中一位作者的合适幸福目标的数据（保存在`AbstractH.dat`中）：\n\
    \n```\n# Pyomo data file for AbstractH.py\nset A := I_C_Scoops Peanuts ;\nparam\
    \ h := I_C_Scoops 1 Peanuts 0.1 ;\nparam d :=\n    I_C_Scoops 5\n    Peanuts 27\
    \ ;\nparam c := I_C_Scoops 3.14 Peanuts 0.2718 ;\nparam b := 12 ;\nparam u :=\
    \ I_C_Scoops 100 Peanuts 40.6 ;\n```\n\n这是一个Pyomo数据文件，其中包含与AMPL数据命令非常相似的`set`和`param`命令。这些数据命令的描述在第10.3节中给出。\n\
