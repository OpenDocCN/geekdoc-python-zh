  md: "The following script defines a Pyomo model for `ralph1`:\n\n```\n# ralph1.py\n\
    import pyomo.environ as pyo\nfrom pyomo.mpec import Complementarity, complements\n\
    \nmodel = pyo.ConcreteModel()\n\nmodel.x = pyo.Var( within=pyo.NonNegativeReals\
    \ )\nmodel.y = pyo.Var( within=pyo.NonNegativeReals )\n\nmodel.f1 = pyo.Objective(\
    \ expr=2*model.x - model.y )\n\nmodel.compl = Complementarity(\n    expr=complements(0\
    \ <= model.y,\n                     model.y >= model.x) )\n```\n\nThe first lines\
    \ in this script import Pyomo packages. The `pyomo.environ` package initializes\
    \ Pyomo's environment, and `pyomo.mpec` defines modeling components for complementarity\
    \ conditions. The subsequent lines in this script create a model, declare variables\
    \ x and y, declare an objective f1, and declare a complementarity condition `compl`.\n\
    \nThe complementarity condition is declared with the `Complementarity` component.\
    \ In the simplest case, this Python class takes a keyword argument `expr` containing\
    \ the value of the `complements` function. This function accepts two Pyomo constraint\
    \ expressions used to declare a complementarity condition.\n\nPyomo also supports\
    \ indexed components, where a set of components are initialized over an index\
    \ set using a construction rule. Thus, the `Complementarity` component can be\
    \ declared with an index set. For example, consider the following model:\n\n$$\\\
    min \\sum_{i=1}^n i(x_i - 1)^2$$\n$$0 \\le x_i \\perp 0 \\le x_{i+1} \\quad i\
    \ = 1, \\dots, n-1$$\n\nThe following script defines a Pyomo implementation of\
    \ the model with $n = 5$:\n\n```\n# ex1a.py\nimport pyomo.environ as pyo\nfrom\
    \ pyomo.mpec import Complementarity, complements\n\nn = 5\n\nmodel = pyo.ConcreteModel()\n\
    \nmodel.x = pyo.Var( range(1,n+1) )\n\nmodel.f = pyo.Objective(expr=sum(i*(model.x[i]-1)**2\n\
    \                                for i in range(1,n+1)) )\n\ndef compl_(model,\
