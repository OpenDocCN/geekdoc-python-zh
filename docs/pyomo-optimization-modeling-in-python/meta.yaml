    \    return sum(c*m.y[t] + h_pos*m.i_pos[t] + h_neg*m.i_neg[t] for t in m.T)\n\
    model.obj = pyo.Objective(rule=obj_rule)\n\n# solve the problem\nsolver = pyo.SolverFactory('glpk')\n\
    solver.solve(model)\n\n# print the results\nfor t in model.T:\n    print('Period:\
    \ {0}, Prod. Amount: {1}'.format(t, pyo.value(model.x[t])))\n\n```\n\nThis example\
    \ uses standard Pyomo syntax as discussed in early chapters of the book. If we\
    \ were considering the lot-sizing problem over a single time period only, our\
    \ variable declarations would have looked like,"
  - '[PAGE 128]


    ```

    # define the variables

    model.y = pyo.Var(domain=pyo.Binary)

    model.x = pyo.Var(domain=pyo.NonNegativeReals)

    model.i = pyo.Var()

    model.i_pos = pyo.Var(domain=pyo.NonNegativeReals)

    model.i_neg = pyo.Var(domain=pyo.NonNegativeReals)

    ```


    In the multi-period case, we have the same fundamental variables and constraints
    defined over each time period. Here, the variable declarations looked like,


    ```

    # define the variables

    model.y = pyo.Var(model.T, domain=pyo.Binary)

    model.x = pyo.Var(model.T, domain=pyo.NonNegativeReals)

    model.i = pyo.Var(model.T)

    model.i_pos = pyo.Var(model.T, domain=pyo.NonNegativeReals)

    model.i_neg = pyo.Var(model.T, domain=pyo.NonNegativeReals)

    ```


    If we were considering a multi-period and multi-scenario problem (e.g., a stochastic
    programming formulation for lot-sizing under uncertainty), the variable declarations
    would have looked like,


    ```

    # define the variables

    model.y = pyo.Var(model.T, model.S, domain=pyo.Binary)

    model.x = pyo.Var(model.T, model.S, domain=pyo.NonNegativeReals)

    model.i = pyo.Var(model.T, model.S,)

    model.i_pos = pyo.Var(model.T, model.S, \n    domain=pyo.NonNegativeReals)

    model.i_neg = pyo.Var(model.T, model.S, \n    domain=pyo.NonNegativeReals)

    ```


    In each of these examples, when we add new complexity, or an additional *layer*
    onto the model, we add a new index to the variables and constraints. This approach
    is very common in the field of operations research. Unfortunately, it requires
    completely redefining the model with each new layer, and it does not readily support
    construction of hierarchical models with reusable code. Blocks provide another
    approach to easily support model reuse in an object-oriented fashion.


    # 8.6.2 A Formulation With Blocks


    We now show how blocks can be used to write this problem. Most of the constraints
    in the multi-period lot-sizing problem are defined over $t \in T$, and they can
    be logically grouped together by time. Pyomo allows us to define blocks, each
    with the variables and constraints for a single time period only, and then link
    them together to form the overall model.


    Considering the lot-sizing problem again, the variables and constraints within
    a rule can be defined to provide a block for a single period of the lot-sizing
    problem:'
  - "[PAGE 129]\n\n```\npython\n# create a block for a single time period\ndef lotsizing_block_rule(b,\
    \ t):\n    # define the variables\n    b.y = pyo.Var(domain=pyo.Binary)\n    b.x\
    \ = pyo.Var(domain=pyo.NonNegativeReals)\n    b.i = pyo.Var()\n    b.i0 = pyo.Var()\n\
    \    b.i_pos = pyo.Var(domain=pyo.NonNegativeReals)\n    b.i_neg = pyo.Var(domain=pyo.NonNegativeReals)\n\
    \n    # define the constraints\n    b.inventory = pyo.Constraint(expr=b.i == b.i0\
    \ + b.x - d[t])\n    b.pos_neg = pyo.Constraint(expr=b.i == b.i_pos - b.i_neg)\n\
    \    b.prod_indicator = pyo.Constraint(expr=b.x <= P * b.y)\nmodel.lsb = pyo.Block(model.T,\
    \ rule=lotsizing_block_rule)\n```\n\nHere, the variables and constraints for a\
    \ single time period *t* are defined within the rule. The **Block** component\
    \ is then indexed over the set model.T, and the declaration constructs a lot-sizing\
    \ block for each entry in model.T. The model object now contains a block for each\
    \ time period *t*. The final action is to provide constraints linking the blocks\
    \ together (setting the initial inventory of one block equal to the final inventory\
    \ of the previous block), and to define the objective function over all the blocks.\
    \ The full code listing for the block version of the multi-period lot-sizing problem\
    \ is shown below.\n\n```\npython\nimport pyomo.environ as pyo\n\nmodel = pyo.ConcreteModel()\n\
    model.T = pyo.RangeSet(5) # time periods\n\ni0 = 5.0 # initial inventory\nc =\
    \ 4.6 # setup cost\nh_pos = 0.7 # inventory holding cost\nh_neg = 1.2 # shortage\
    \ cost\nP = 5.0 # maximum production amount\n\n# demand during period t\nd = {1:\
    \ 5.0, 2:7.0, 3:6.2, 4:3.1, 5:1.7}\n\n# create a block for a single time period\n\
    def lotsizing_block_rule(b, t):\n    # define the variables\n    b.y = pyo.Var(domain=pyo.Binary)\n\
    \    b.x = pyo.Var(domain=pyo.NonNegativeReals)\n    b.i = pyo.Var()\n    b.i0\
    \ = pyo.Var()\n    b.i_pos = pyo.Var(domain=pyo.NonNegativeReals)\n    b.i_neg\
    \ = pyo.Var(domain=pyo.NonNegativeReals)\n\n    # define the constraints\n   \
    \ b.inventory = pyo.Constraint(expr=b.i == b.i0 + b.x - d[t])\n    b.pos_neg =\
    \ pyo.Constraint(expr=b.i == b.i_pos - b.i_neg)\n    b.prod_indicator = pyo.Constraint(expr=b.x\
    \ <= P * b.y)\n```"
- md: "## Chapter 9\nPerformance: Model Construction and Solver Interfaces\n\n**Abstract**\
    \ This chapter documents tools for profiling model construction and improving\
    \ the performance of both model construction and interaction with solvers. We\
    \ begin by discussing various profiling tools which can be used to help identify\
    \ performance bottlenecks. Pyomo has built-in profiling capabilities, but there\
    \ are also Python packages, such as `cProfile` and `line_profiler`, dedicated\
    \ to performance profiling. Section 9.2 discusses the LinearExpression class,\
    \ which can be used to drastically improve model construction time for some applications.\
    \ Section 9.3 describes how persistent solver interfaces can be used to repeatedly\
    \ solve models with small changes very efficiently. Finally, Section 9.4 discusses\
    \ sparse index sets.\n\n## 9.1 Profiling to Identify Performance Bottlenecks\n\
    \nWhen performance is an issue, it is necessary to identify the performance bottlenecks\
    \ before improvements can be made. This section describes various profiling tools\
    \ which can be used to identify performance bottlenecks.\n\nThroughout this section,\
    \ we will be revisiting the warehouse location problem as an example. The warehouse\
    \ location problem was first introduced in Section 3.2. Here, we will work with\
    \ a continuous relaxation of the problem for illustration. We rewrite the warehouse\
    \ location problem so the model is built in a function and the maximum number\
    \ of warehouses is a mutable parameter.\n\n```python\nimport pyomo.environ as\
    \ pyo # import pyomo environment\nimport cProfile\nimport pstats\nimport io\n\
    from pyomo.common.timing import TicTocTimer, report_timing\nfrom pyomo.opt.results\
    \ import assert_optimal_termination\nfrom pyomo.core.expr.numeric_expr import\
    \ LinearExpression\nimport matplotlib.pyplot as plt\nimport numpy as np\nnp.random.seed(0)\n\
    \ndef create_warehouse_model(num_locations=50, num_customers=50):\n    N = list(range(num_locations))\
    \ # warehouse locations\n    M = list(range(num_customers)) # customers\n\n  \
    \  d = dict() # distances from warehouse locations to customers\n    for n in\
    \ N:\n        for m in M:\n            d[n, m] = np.random.randint(low=1, high=100)\n\
    \    max_num_warehouses = 2\n\n    model = pyo.ConcreteModel(name=\"(WL)\")\n\
    \    model.P = pyo.Param(initialize=max_num_warehouses,\n                    \
    \    mutable=True)\n\n    model.x = pyo.Var(N, M, bounds=(0, 1))\n    model.y\
    \ = pyo.Var(N, bounds=(0, 1))\n\n    def obj_rule(mdl):\n        return sum(d[n,m]*mdl.x[n,m]\
    \ for n in N for m in M)\n    model.obj = pyo.Objective(rule=obj_rule)\n\n   \
    \ def demand_rule(mdl, m):\n        return sum(mdl.x[n,m] for n in N) == 1\n \
    \   model.demand = pyo.Constraint(M, rule=demand_rule)\n\n    def warehouse_active_rule(mdl,\
    \ n, m):\n        return mdl.x[n,m] <= mdl.y[n]\n    model.warehouse_active =\
    \ pyo.Constraint(N, M, \\\n        rule=warehouse_active_rule)\n\n    def num_warehouses_rule(mdl):\n\
    \        return sum(mdl.y[n] for n in N) <= model.P\n    model.num_warehouses\
    \ = \\\n        pyo.Constraint(rule=num_warehouses_rule)\n\n    return model\n\
    ```\n\n### 9.1.1 Report Timing\n\nPyomo has a very useful function, `report_timing`,\
    \ for profiling model construction. The following illustrates how to use `report_timing`\
    \ to profile the construction of the warehouse location problem.\n\n```python\n\
    report_timing()\nprint('Building model')\nprint('--------------')\nm = create_warehouse_model(num_locations=200,\
    \ num_customers=200)\n```\n\nThe output of the code is shown next.\n\n```\nBuilding\
    \ model\n--------------\n    0 seconds to construct Block ConcreteModel; 1 index\
    \ total\n    0 seconds to construct Set Any; 1 index total\n    0 seconds to construct\
    \ Param P; 1 index total\n    0 seconds to construct Set OrderedSimpleSet; 1 index\
    \ total\n    0 seconds to construct Set OrderedSimpleSet; 1 index total\n    0\
    \ seconds to construct Set SetProduct_OrderedSet; 1 index total\n    0 seconds\
    \ to construct Set SetProduct_OrderedSet; 1 index total\n    0.09 seconds to construct\
    \ Var x; 40000 indices total\n    0 seconds to construct Set OrderedSimpleSet;\
    \ 1 index total\n    0 seconds to construct Var y; 200 indices total\n    0.19\
    \ seconds to construct Objective obj; 1 index total\n    0 seconds to construct\
    \ Set OrderedSimpleSet; 1 index total\n    0.11 seconds to construct Constraint\
    \ demand; 200 indices total\n    0 seconds to construct Set OrderedSimpleSet;\
    \ 1 index total\n    0 seconds to construct Set OrderedSimpleSet; 1 index total\n\
    \    0 seconds to construct Set SetProduct_OrderedSet; 1 index total\n    0 seconds\
    \ to construct Set SetProduct_OrderedSet; 1 index total\n    0.62 seconds to construct\
    \ Constraint warehouse_active; 40000 indices total\n    0 seconds to construct\
    \ Constraint num_warehouses; 1 index total\n```\n\nCalling the `report_timing`\
    \ function causes Pyomo to print the time required to build each component. In\
    \ the second to last line in the output, we can see building the `warehouse_active`\
    \ constraint accounts for the majority of the model construction time. Note that\
    \ any data processing done inside the constraint rules is included, so not all\
    \ of the time is necessarily spent in Pyomo. In this example, there is not any\
    \ data processing within the rule, so we know building the expressions for the\
    \ `warehouse_active` constraint is the bottleneck.\n\n### 9.1.2 TicTocTimer\n\n\
    Pyomo also provides a `TicTocTimer` for convenient timing. In the following example,\
    \ we compare the time required to build the model and the time to write an LP\
    \ file and solve the problem with Gurobi. Suppose we have this function to solve\
    \ the model:\n\n```python\ndef solve_warehouse_location(m):\n    opt = pyo.SolverFactory('gurobi')\n\
    \    res = opt.solve(m)\n    assert_optimal_termination(res)\n```\n\nWe could\
    \ use the following script to use the `TicTocTimer` for timing:\n\n```python\n\
    timer = TicTocTimer()\ntimer.tic('start')\nm = create_warehouse_model(num_locations=200,\
    \ num_customers=200)\ntimer.toc('Built model')\nsolve_warehouse_location(m)\n\
    timer.toc('Wrote LP file and solved')\n```\n\nThe output of the code is shown\
    \ next.\n\n```\n[    0.00] start\n[+   1.22] Built model\n[+   4.05] Wrote LP\
    \ file and solved\n```\n\nThe output states it took 1.22 seconds to build the\
    \ Pyomo model and a total of 4.05 seconds to write the LP file and solve the problem.\
    \ By utilizing the `TicTocTimer`, we found that writing the LP file and solving\
    \ the problem took significantly longer than constructing the model. However,\
    \ it is not yet clear what fraction of the 4.05 seconds is spent writing the LP\
    \ file, which is where `cProfile` is useful.\n\n### 9.1.3 Profilers\n\nMany Python\
    \ packages dedicated to performance profiling exist. Two examples of such packages\
    \ are `cProfile` (https://docs.python.org/3/library/profile.html) and `line_profiler`\
    \ (https://github.com/pyutils/line_profiler). The `cProfile` package reports the\
    \ time spent in each function and the `line_profiler` package reports the time\
    \ spent on each line of a function.\n\nLet's revisit the warehouse location problem\
    \ as an example. First, we write a function to perform a parametric sweep, repeatedly\
    \ solving the warehouse location problem while varying the maximum number of warehouses,\
    \ m.P.\n\n```python\ndef solve_parametric():\n    m = create_warehouse_model(num_locations=50,\
    \ num_customers=50)\n    opt = pyo.SolverFactory('gurobi')\n    p_values = list(range(1,\
    \ 31))\n    obj_values = list()\n    for p in p_values:\n        m.P.value = p\n\
    \        res = opt.solve(m)\n        assert_optimal_termination(res)\n       \
    \ obj_values.append(res.problem.lower_bound)\n```\n\nWe first call the `solve_parametric`\
    \ function and report the time required to perform the parameter sweep.\n\n```python\n\
    solve_parametric()\ntimer.toc('Finished parameter sweep')\n```\n\nThe output of\
    \ the code is shown next.\n\n```\n[+ 7.28] finished parameter sweep\n```\n\nmodel.lsb\
    \ = pyo.Block(model.T, rule=lotsizing_block_rule)\n\n# link the inventory variables\
    \ between blocks\ndef i_linking_rule(m, t):\n    if t == m.T.first():\n      \
    \  return m.lsb[t].i0 == i0\n    return m.lsb[t].i0 == m.lsb[t-1].i\nmodel.i_linking\
    \ = pyo.Constraint(model.T, rule=i_linking_rule)\n\n# construct the objective\
    \ function over all the blocks\ndef obj_rule(m):\n    return sum(c*m.lsb[t].y\
    \ + h_pos*m.lsb[t].i_pos + \\\n               h_neg*m.lsb[t].i_neg for t in m.T)\n\
    model.obj = pyo.Objective(rule=obj_rule)\n\n### solve the problem\nsolver = pyo.SolverFactory('glpk')\n\
    solver.solve(model)\n\n# print the results\nfor t in model.T:\n    print('Period:\
    \ {0}, Prod. Amount: {1}'.format(t, \\\n        pyo.value(model.lsb[t].x)))\n\
    ```\n\nThis formulation is small, so it can be difficult to see the benefit of\
    \ blocks. However, as models grow in size and complexity, this object-oriented\
    \ modeling concept allows us to define small pieces of the model in self-contained\
    \ chunks of code, and then build the large model by pulling these pieces together.\
    \ This example was selected in part because it is a heavily studied, classic multi-stage\
    \ inventory model. One can easily imagine extensions to the model to include additional\
    \ constraints and costs. In fact, many such models have appeared in the academic\
    \ literature and in practical application. In large models, it is common to write\
    \ methods or classes to define individual blocks and reuse code within several\
    \ different, high-level optimization formulations."
  mdcn: "## 第9章\n性能：模型构建与求解器接口\n\n**摘要** 本章记录了用于分析模型构建性能以及提升模型构建和与求解器交互效率的工具。我们首先讨论可用于识别性能瓶颈的各种性能分析工具。Pyomo\
    \ 内置了性能分析功能，但也有诸如 `cProfile` 和 `line_profiler` 等专门用于性能分析的 Python 包。9.2 节讨论了 LinearExpression\
    \ 类，该类可用于显著提升某些应用中的模型构建时间。9.3 节描述了持久型求解器接口如何被用于高效地重复求解具有微小改动的模型。最后，9.4 节讨论了稀疏索引集。\n\
    \n## 9.1 通过性能分析识别瓶颈\n\n当性能成为问题时，必须在改进前识别性能瓶颈。本节描述可用于识别性能瓶颈的各种性能分析工具。\n\n在本节中，我们将以仓库选址问题为例进行回顾。仓库选址问题最初在\
    \ 3.2 节中引入。此处，为进行说明，我们将使用该问题的连续松弛形式。我们重写仓库选址问题，使模型在函数中构建，并且仓库的最大数量为可变参数。\n\n```python\n\
    import pyomo.environ as pyo # import pyomo environment\nimport cProfile\nimport\
    \ pstats\nimport io\nfrom pyomo.common.timing import TicTocTimer, report_timing\n\
    from pyomo.opt.results import assert_optimal_termination\nfrom pyomo.core.expr.numeric_expr\
    \ import LinearExpression\nimport matplotlib.pyplot as plt\nimport numpy as np\n\
    np.random.seed(0)\n\ndef create_warehouse_model(num_locations=50, num_customers=50):\n\
    \    N = list(range(num_locations)) # warehouse locations\n    M = list(range(num_customers))\
    \ # customers\n\n    d = dict() # distances from warehouse locations to customers\n\
    \    for n in N:\n        for m in M:\n            d[n, m] = np.random.randint(low=1,\
    \ high=100)\n    max_num_warehouses = 2\n\n    model = pyo.ConcreteModel(name=\"\
    (WL)\")\n    model.P = pyo.Param(initialize=max_num_warehouses,\n            \
    \            mutable=True)\n\n    model.x = pyo.Var(N, M, bounds=(0, 1))\n   \
    \ model.y = pyo.Var(N, bounds=(0, 1))\n\n    def obj_rule(mdl):\n        return\
    \ sum(d[n,m]*mdl.x[n,m] for n in N for m in M)\n    model.obj = pyo.Objective(rule=obj_rule)\n\
    \n    def demand_rule(mdl, m):\n        return sum(mdl.x[n,m] for n in N) == 1\n\
    \    model.demand = pyo.Constraint(M, rule=demand_rule)\n\n    def warehouse_active_rule(mdl,\
    \ n, m):\n        return mdl.x[n,m] <= mdl.y[n]\n    model.warehouse_active =\
    \ pyo.Constraint(N, M, \\\n        rule=warehouse_active_rule)\n\n    def num_warehouses_rule(mdl):\n\
    \        return sum(mdl.y[n] for n in N) <= model.P\n    model.num_warehouses\
    \ = \\\n        pyo.Constraint(rule=num_warehouses_rule)\n\n    return model\n\
    ```\n\n### 9.1.1 报告计时\n\nPyomo 有一个非常有用的函数 `report_timing`，用于分析模型构建性能。以下示例说明如何使用\
    \ `report_timing` 来分析仓库选址问题的构建过程。\n\n```python\nreport_timing()\nprint('Building\
    \ model')\nprint('--------------')\nm = create_warehouse_model(num_locations=200,\
    \ num_customers=200)\n```\n\n代码的输出如下所示。\n\n```\nBuilding model\n--------------\n\
    \    0 seconds to construct Block ConcreteModel; 1 index total\n    0 seconds\
    \ to construct Set Any; 1 index total\n    0 seconds to construct Param P; 1 index\
    \ total\n    0 seconds to construct Set OrderedSimpleSet; 1 index total\n    0\
    \ seconds to construct Set OrderedSimpleSet; 1 index total\n    0 seconds to construct\
    \ Set SetProduct_OrderedSet; 1 index total\n    0 seconds to construct Set SetProduct_OrderedSet;\
    \ 1 index total\n    0.09 seconds to construct Var x; 40000 indices total\n  \
    \  0 seconds to construct Set OrderedSimpleSet; 1 index total\n    0 seconds to\
    \ construct Var y; 200 indices total\n    0.19 seconds to construct Objective\
    \ obj; 1 index total\n    0 seconds to construct Set OrderedSimpleSet; 1 index\
    \ total\n    0.11 seconds to construct Constraint demand; 200 indices total\n\
    \    0 seconds to construct Set OrderedSimpleSet; 1 index total\n    0 seconds\
    \ to construct Set OrderedSimpleSet; 1 index total\n    0 seconds to construct\
    \ Set SetProduct_OrderedSet; 1 index total\n    0 seconds to construct Set SetProduct_OrderedSet;\
    \ 1 index total\n    0.62 seconds to construct Constraint warehouse_active; 40000\
    \ indices total\n    0 seconds to construct Constraint num_warehouses; 1 index\
    \ total\n```\n\n调用 `report_timing` 函数会使 Pyomo 打印构建每个组件所需的时间。在输出的倒数第二行，我们可以看到构建\
    \ `warehouse_active` 约束占了模型构建时间的大部分。请注意，约束规则内执行的任何数据处理时间也包含在内，因此并非所有时间都必然花费在 Pyomo\
    \ 本身上。在此示例中，规则内没有任何数据处理，因此我们知道构建 `warehouse_active` 约束的表达式是性能瓶颈。\n\n### 9.1.2\
    \ TicTocTimer\n\nPyomo 还提供了一个用于便捷计时的 `TicTocTimer`。在下面的示例中，我们比较构建模型所需的时间与编写 LP\
    \ 文件并使用 Gurobi 求解问题所需的时间。假设有如下函数用于求解模型：\n\n```python\ndef solve_warehouse_location(m):\n\
    \    opt = pyo.SolverFactory('gurobi')\n    res = opt.solve(m)\n    assert_optimal_termination(res)\n\
    ```\n\n我们可以使用以下脚本来利用 `TicTocTimer` 进行计时：\n\n```python\ntimer = TicTocTimer()\n\
    timer.tic('start')\nm = create_warehouse_model(num_locations=200, num_customers=200)\n\
    timer.toc('Built model')\nsolve_warehouse_location(m)\ntimer.toc('Wrote LP file\
    \ and solved')\n```\n\n代码的输出如下所示。\n\n```\n[    0.00] start\n[+   1.22] Built model\n\
    [+   4.05] Wrote LP file and solved\n```\n\n输出表明构建 Pyomo 模型花费了 1.22 秒，编写 LP 文件并求解问题总共花费了\
    \ 4.05 秒。通过使用 `TicTocTimer`，我们发现编写 LP 文件并求解问题花费的时间明显长于构建模型。然而，目前尚不清楚 4.05 秒中有多少是花费在编写\
    \ LP 文件上，而这正是 `cProfile` 派上用场的地方。\n\n### 9.1.3 性能分析器\n\n存在许多专门用于性能分析的 Python 包。这类包的例子包括\
    \ `cProfile` (https://docs.python.org/3/library/profile.html) 和 `line_profiler`\
    \ (https://github.com/pyutils/line_profiler)。`cProfile` 包报告在每个函数中花费的时间，而 `line_profiler`\
    \ 包报告在函数的每一行上花费的时间。\n\n让我们再次以仓库选址问题为例。首先，我们编写一个函数来执行参数扫描，在改变最大仓库数量 m.P 的同时反复求解仓库选址问题。\n\
    \n```python\ndef solve_parametric():\n    m = create_warehouse_model(num_locations=50,\
    \ num_customers=50)\n    opt = pyo.SolverFactory('gurobi')\n    p_values = list(range(1,\
    \ 31))\n    obj_values = list()\n    for p in p_values:\n        m.P.value = p\n\
    \        res = opt.solve(m)\n        assert_optimal_termination(res)\n       \
