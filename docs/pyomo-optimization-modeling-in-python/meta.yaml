    for a value $M$ chosen to be sufficiently big so as to not limit the space of
    feasible solutions (although it does imply a finite $U$). One can readily see
    that when $y = 1$ the inequalities enforce that $x$ lie in the continuous range
    $L \leq x \leq U$, and when $y = 0$ the inequalities reduce to $0 \leq x \leq
    0$, or $x = 0$.'
  - '[PAGE 178]


    In this formulation, the binary variable y is not intrinsic to the constraints,
    but rather captures a logical condition: indicating whether one set of mutually
    exclusive constraints (L ≤ x ≤ U) or another (x = 0) must be enforced. In this
    way, the variable is often referred to as an indicator variable. Indeed, it can
    be argued that the bulk of binary variables used in math programming are in fact
    indicator variables used to capture logic in the model.


    This approach to formulating a switching decision can be generalized to switch
    between different groups of constraints. For example, consider the Unit Commitment
    Problem, where the goal of the optimization problem is to determine the minimal
    cost schedule for turning on and off a fleet of generators in order to meet expected
    demand. In this case, a generator can exist in one of several states: on, off,
    starting up, and shutting down. Selecting a particular state implies additional
    constraints on the generator operation. If a generator is “on”, then the output
    power is bounded between the minimum (nonzero) and maximum power levels. In contrast,
    when the generator is “off”, the output power must be 0. Further, the output power
    in any time period must be within “ramp limits” of output power in the previous
    time period.


    One implementation of these state selection rules expresses all the constraints
    and relaxes them based on binary state (indicator) variables using so-called “Big-M”
    terms:


    ```

    Power_{g,t} \leq MaxPower_g \cdot GenOn_{g,t} \quad (11.1) \n Power_{g,t} \geq
    MinPower_g \cdot GenOn_{g,t} \quad (11.2) \n Power_{g,t} \leq Power_{g,t-1} +
    RampUpLimit_g + M_g \cdot (1 - GenOn_{g,t}) \quad (11.3) \n Power_{g,t} \geq Power_{g,t-1}
    - RampDownLimit_g - M_g \cdot (1 - GenOn_{g,t}) \quad (11.4) \n Power_{g,t} \leq
    MaxPower_g \cdot (1 - GenOff_{g,t}) \quad (11.5) \n Power_{g,t-1} \leq ShutDownRampLimit_g
    + MaxPower_g \cdot (1 - GenOff_{g,t}) \quad (11.6) \n Power_{g,t} \leq StartUpRampLimit_g
    + MaxPower_g \cdot (1 - GenStartUp_{g,t}) \quad (11.7) \n GenOn_{g,t} + GenOff_{g,t}
    + GenStartUp_{g,t} = 1 \quad (11.8) \n GenOn_{g,t} \leq GenOn_{g,t-1} + GenStartUp_{g,t-1}
    \quad (11.9) \n GenStartUp_{g,t} \leq GenOff_{g,t-1} \quad (11.10) \n GenOn_{g,t},
    GenOff_{g,t}, GenStartUp_{g,t}, GenShutDown_{g,t} \in \{0,1\} \quad (11.11) \n
    Power_{g,t} \in (0, MaxPower_g) \quad (11.12)

    ```


    This approach to formulating a switching decision has two significant limitations.
    First, the relationships between the binary selection variable and the corresponding
    constraints that the binary variable selects is somewhat obfuscated. Second, the
    use of “Big-M” relaxations is only one of several possible approaches to formulating
    the problem. By hard-coding that relaxation into your model, you are effectively
    precluding the possibility of exploring alternative approaches (like a hull relaxation)
    without incurring significant effort rewriting the model.


    Generalized Disjunctive Programming [54] represents an alternative approach to
    representing problems with significant logical structure. It generalizes the concepts'
  - '[PAGE 179]


    of Disjunctive Programming [6] for integer linear problems to also include nonlinear
    systems. The canonical GDP model [38] augments the objective, variables, and constraints
    of a typical MI(N)LP with Boolean variables, disjunctions, and logical constraints:


    ```

    \min \sum_{k\in K} c_k + f(x) \quad (11.13) \\

    \text{s.t.} \quad r(x) \leq 0 \quad (11.14) \\

    \bigvee_{j\in J_k} \left[ Y_{jk} \right. \left. \begin{array}{c} g_{jk}(x) \leq
    0 \\ c_k = \gamma_{j,k} \end{array} \right] \quad \forall k \in K \quad (11.15)
    \\

    \Omega(Y) = \text{True} \quad (11.16) \\

    x \geq 0, c_k \geq 0, Y_{jk} \in \{\text{True}, \text{False}\} \quad (11.17)

    ```


    In this framework, the logical decisions are represented as sets of disjunctions
    (Eqn. 11.15) and logical constraints (Eqn. 11.16). Each disjunction contains a
    number of terms (disjuncts) connected by an “OR” operator. Each disjunct contains
    a Boolean indicator variable (Y) and a set of constraints only enforced when Y
    is True. Additional constraints enforcing logical relationships among the indicator
    variables are imposed through Eqn. 11.16.


    ```

    \left[ \begin{array}{c} Y_{g,on} \\ MinPower_g \leq Power_{g,t} \leq MaxPower_g
    \\ -RampDownLimit_g \leq Power_{g,t} - Power_{g,t-1} \leq RampUpLimit_g \end{array}
    \right] \\

    \bigvee \left[ \begin{array}{c} Y_{g,off} \\ Power_{g,t} = 0 \\ Power_{g,t-1}
    \leq ShutDownRampLimit_g \end{array} \right] \\

    \bigvee \left[ \begin{array}{c} Y_{g,startup} \\ Power_{g,t} \leq StartUpRampLimit_g
    \end{array} \right] \quad (11.18)

    ```


    This modeling approach directly addresses the two limitations of typical MI(N)LP
    models discussed previously: the relationship between the switching variable and
    the constraints it implies is now explicit in the model structure, and the model
    is no longer locked into any particular relaxation.'
