    \ solution is 1. Given these two sets, an integer cut constraint that would prevent\
    \ such a solution from appearing again is defined by,\n\n$$\\sum_{(r,c,v) \\in\
    \ S_0} y[r,c,v] + \\sum_{(r,c,v) \\in S_1} (1 - y[r,c,v]) \\geq 1.$$\n\nThe following\
    \ Python code defines three functions. The first, `create_sudoku_model` creates\
