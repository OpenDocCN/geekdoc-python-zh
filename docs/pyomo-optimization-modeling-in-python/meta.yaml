    # Chapter 1 Introduction


    **Abstract** This chapter introduces and motivates Pyomo, a Python-based tool
    for modeling and solving optimization problems. Modeling is a fundamental process
    in many aspects of scientific research, engineering, and business. Algebraic modeling
    languages like Pyomo are high-level languages for specifying and solving mathematical
    optimization problems. Pyomo is a flexible, extensible modeling framework that
    captures and extends central ideas found in modern algebraic modeling languages,
    all within the context of a widely used programming language.


    # 1.1 Modeling Languages for Optimization


    This book describes a tool for mathematical modeling: the Python Optimization
    Modeling Objects (Pyomo) software package. Pyomo supports the formulation and
    analysis of mathematical models for complex optimization applications. This capability
    is commonly associated with commercial algebraic modeling languages (AMLs) such
    as AIMMS [1], AMPL [2], and GAMS [22]. Pyomo implements a rich set of modeling
    and analysis capabilities, and it provides access to these capabilities within
    Python, a full-featured, high-level programming language with a large set of supporting
    libraries.

    Optimization models define the goals or objectives for a system under consideration.
    Optimization models can be used to explore trade-offs between goals and objectives,
    identify extreme states and worst-case scenarios, and identify key factors that
    influence phenomena in a system. Consequently, optimization models are used to
    analyze a wide range of scientific, business, and engineering applications.

    The widespread availability of computing resources has made the numerical analysis
    of optimization models commonplace. The computational analysis of an optimization
    model requires the specification of a model that is communicated to a solver software
    package. Without a language to specify optimization models, the process of writing
    input files, executing a solver, and extracting results from a solver is tedious
    and error-prone. This difficulty is compounded in complex, large-scale,'
  - '[PAGE 17]


    real-world applications that are difficult to debug when errors occur. Additionally,
    solvers use many different input formats, but few of them are considered to be
    standards. Thus, the application of multiple solvers to analyze a single optimization
    model introduces additional complexities. Furthermore, model verification (i.e.,
    ensuring that the model communicated to the solver accurately reflects the model
    the developer intended to express) is extremely difficult without high-level languages
    for expressing models.


    AMLs are high-level languages for describing and solving optimization problems
    [26, 37]. AMLs minimize the difficulties associated with analyzing optimization
    models by enabling high-level specification of optimization problems. Furthermore,
    AML software provides rigorous interfaces to external solver packages that are
    used to analyze problems, and it allows the user to interact with solver results
    in the context of their high-level model specification.


    Custom AMLs like AIMMS [1], AMPL [2, 21], and GAMS [22] implement optimization
    model specification languages with an intuitive and concise syntax for defining
    variables, constraints, and objectives. Further, these AMLs support specification
    of abstract concepts such as sparse sets, indices, and algebraic expressions,
    which are essential when specifying large-scale, real-world problems with thousands
    or millions of constraints and variables. These AMLs can represent a wide variety
    of optimization models, and they interface with a rich set of solver packages.
    AMLs are increasingly being extended to include custom scripting capabilities,
    which enables expression of high-level analysis algorithms concurrently with optimization
    model specifications.


    A complementary strategy is to use an AML that extends a standard high-level programming
    language (as opposed to being based a proprietary language) to formulate optimization
    models that are analyzed with solvers written in low-level languages. This two-language
    approach leverages the flexibility of the high-level language for formulating
    optimization problems and the efficiency of the low-level language for numerical
    computations. This is an increasingly common approach for scientific computing
    software. The Matlab TOMLAB Optimization Environment [57] is among the most mature
    optimization software package using this approach; Pyomo strongly leverages this
    approach as well. Similarly, standard programming languages like Java and C++
    have been extended to include AML constructs. For example, modeling libraries
    like FlopC++ [19], OptimJ [47], and JuMP [13] support the specification of optimization
    models using an object-oriented design in C++, Java, and Julia, respectively.
    Although these modeling libraries sacrifice some of the intuitive mathematical
    syntax of a custom AML, they allow the user to leverage the flexibility of modern
    high-level programming languages. A further advantage of these AML libraries is
    that they can link directly to high-performance optimization libraries and solvers,
    which can be an important consideration in some applications.'
- md: "## 1.2 Modeling with Pyomo\n\nThe goal of Pyomo is to provide a platform for\
    \ specifying optimization models that embodies central ideas found in modern AMLs,\
    \ within a framework that promotes flexibility, extensibility, portability, openness,\
    \ and maintainability. Pyomo is an AML that extends Python to include objects\
    \ for optimization modeling [30]. These objects can be used to specify optimization\
    \ models and translate them into various formats that can be processed by external\
    \ solvers.\n\nWe now provide some motivating examples to illustrate the use of\
    \ Pyomo in specifying optimization models.\n\n### 1.2.1 Simple Examples\n\nConsider\
    \ the following linear program (LP):\n\n$$\\min x_1 + 2x_2$$\n$$\\text{s.t.} \\\
    quad 3x_1 + 4x_2 \\geq 1$$\n$$\\quad 2x_1 + 5x_2 \\geq 2$$\n$$\\quad x_1, x_2\
    \ \\geq 0$$\n\nThis LP can be easily expressed in Pyomo as follows:\n\n```python\n\
    import pyomo.environ as pyo\n\nmodel = pyo.ConcreteModel()\nmodel.x_1 = pyo.Var(within=pyo.NonNegativeReals)\n\
    model.x_2 = pyo.Var(within=pyo.NonNegativeReals)\nmodel.obj = pyo.Objective(expr=model.x_1\
    \ + 2*model.x_2)\nmodel.con1 = pyo.Constraint(expr=3*model.x_1 + 4*model.x_2 >=\
    \ 1)\nmodel.con2 = pyo.Constraint(expr=2*model.x_1 + 5*model.x_2 >= 2)\n```\n\n\
    The first line is a standard Python import statement that initializes the Pyomo\
    \ environment and loads Pyomo's core modeling component library. The next lines\
    \ construct a model object and define model attributes. This example describes\
    \ a *concrete* model. Model components are objects that are attributes of a model\
    \ object, and the `ConcreteModel` object initializes each model component as they\
    \ are added. The model decision variables, constraints, and objective are defined\
    \ using Pyomo *model components*.\n\nUsers rarely have a single instance of a\
    \ particular optimization problem to solve. Rather, they commonly have a general\
    \ optimization model and then create a particular instance of that model using\
    \ specific data. For example, the following equations represent an LP with scalar\
    \ parameters $n$ and $m$, vector parameters $b$ and $c$, and matrix parameter\
    \ $a$:\n\n$$\\min \\sum_{i=1}^n c_i x_i$$\n$$\\text{s.t.} \\quad \\sum_{i=1}^n\
    \ a_{ji} x_i \\geq b_j \\quad \\forall j = 1 \\dots m$$\n$$\\quad x_i \\geq 0\
    \ \\quad \\forall i = 1 \\dots n$$\n\nThis LP can be expressed with a concrete\
    \ model in Pyomo as follows:\n\n```python\nimport pyo.environ as pyo\nimport mydata\n\
    \nmodel = pyo.ConcreteModel()\n\nmodel.x = pyo.Var(mydata.N, within=pyo.NonNegativeReals)\n\
    \ndef obj_rule(model):\n    return sum(mydata.c[i]*model.x[i] for i in mydata.N)\n\
    model.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(model, m):\n    return\
    \ sum(mydata.a[m,i]*model.x[i] for i in mydata.N) \\\n            >= mydata.b[m]\n\
    model.con = pyo.Constraint(mydata.M, rule=con_rule)\n```\n\nThis script requires\
    \ that the data used to construct the model is available while each modeling component\
    \ is constructed. In this example, the necessary data exists in mydata.py:\n\n\
    ```python\nN = [1,2]\nM = [1,2]\nc = {1:1, 2:2}\na = {(1,1):3, (1,2):4, (2,1):2,\
    \ (2,2):5}\nb = {1:1, 2:2}\n```\n\nThis LP can also be viewed as an abstract mathematical\
    \ model, where unspecified, symbolic parameter values are later defined when the\
    \ model is initialized. For example, this LP can be expressed as an abstract model\
    \ in Pyomo as follows:\n\n```python\nimport pyo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\
    \nmodel.N = pyo.Set()\nmodel.M = pyo.Set()\nmodel.c = pyo.Param(model.N)\nmodel.a\
    \ = pyo.Param(model.M, model.N)\nmodel.b = pyo.Param(model.M)\n\nmodel.x = pyo.Var(model.N,\
    \ within=pyo.NonNegativeReals)\n\ndef obj_rule(model):\n    return sum(model.c[i]*model.x[i]\
    \ for i in model.N)\nmodel.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(model,\
    \ m):\n    return sum(model.a[m,i]*model.x[i] for i in model.N) \\\n         \
    \   >= model.b[m]\nmodel.con = pyo.Constraint(model.M, rule=con_rule)\n```\n\n\
    This example includes model components that provide abstract or symbolic definitions\
    \ of set and parameter values. The AbstractModel object defers initialization\
    \ of model components until a *model instance* is created, using user-supplied\
    \ set and parameter data. Both concrete and abstract models can be initialized\
    \ with data from a variety of different data sources, including data command files\
    \ that are adapted from AMPL's data commands. For example:\n\n```\nparam : N :\
    \ c :=\n1 1\n2 2 ;\n\nparam : M : b :=\n1 1\n2 2 ;\n\nparam a :=\n1 1 3\n1 2 4\n\
    2 1 2\n2 2 5 ;\n```\n\n### 1.2.2 Graph Coloring Example\n\nWe further illustrate\
    \ Pyomo's modeling capabilities with a simple, well-known optimization problem:\
    \ minimum graph coloring (also known as vertex coloring). The graph coloring problem\
    \ concerns the assignment of colors to vertices of a graph such that no two adjacent\
    \ vertices share the same color. Graph coloring has many practical applications,\
    \ including register allocation in compilers, resource scheduling, and pattern\
    \ matching, and it appears as a kernel in recreational puzzles like Sudoku.\n\n\
    Let $G = (V, E)$ denote a graph with vertex set $V$ and edge set $E \\subseteq\
    \ V \\times V$. Given $G$, the objective in the minimum graph coloring problem\
    \ is to find a valid coloring that uses the minimum number of distinct colors.\
    \ For simplicity, we assume that the edges in $E$ are ordered such that if $(v_1,\
    \ v_2) \\in E$ then $v_1 < v_2$. Let $k$ denote the maximum number of colors,\
    \ and define the set of possible colors $C = \\{1, \\ldots, k\\}$.\n\nWe can represent\
    \ the minimum graph coloring problem as the following integer program (IP):\n\n\
    $$\\begin{aligned} \\min \\quad & y \\\\ \\text{s.t.} \\quad & \\sum_{c \\in C}\
    \ x_{v,c} = 1 \\quad & \\forall v \\in V \\\\ & x_{v_1,c} + x_{v_2,c} \\leq 1\
    \ \\quad & \\forall (v_1, v_2) \\in E \\quad & (1.1) \\\\ & y \\geq c \\cdot x_{v,c}\
    \ \\quad & \\forall v \\in V, c \\in C \\\\ & x_{v,c} \\in \\{0, 1\\} \\quad &\
    \ \\forall v \\in V, c \\in C \\end{aligned}$$\n\nIn this formulation, the variable\
    \ $x_{v,c}$ equals one if vertex $v$ is colored with color $c$ and zero otherwise;\
    \ $y$ denotes the number of colors that are used. The first constraint requires\
    \ that each vertex is colored with exactly one color. The second constraint requires\
    \ that vertices that are connected by an edge must have different colors. The\
    \ third constraint defines a lower bound on $y$ that guarantees that $y$ will\
    \ be no less than the number of colors used in a solution. The fourth and final\
    \ constraint enforces the binary constraint on $x_{v,c}$.\n\nFigure 1.1 shows\
    \ a Pyomo specification of the above graph coloring formulation, using a concrete\
    \ model; the example is adapted from Gross and Yellen [27]. This specification\
    \ consists of Python commands that define a `ConcreteModel` object, and then define\
    \ various attributes of this object, including variables, constraints, and the\
    \ optimization objective. Lines 10–24 define the model data. Line 28 is a standard\
    \ Python import statement that adds all of the symbols (e.g., classes and functions)\
    \ defined in `pyomo.environ` to the current Python namespace. Line 31 specifies\
    \ creation of the `model` object, which is an instance of the `ConcreteModel`\
    \ class. Lines 34 and 35 define the model decision variables. Note that $y$ is\
    \ a scalar variable, while $x$ is a two-dimensional array of variables. The remaining\
    \ lines in the example define the model constraints and objective. The `Objective`\
    \ class defines a single optimization objective using the `expr` keyword option.\
    \ The `ConstraintList` class defines a list of constraints, which are individually\
    \ added.\n\nWhen compared to custom AMLs, Pyomo models are clearly more verbose\
    \ (e.g., see Hart et al. [30]). However, this example illustrates how Python’s\
    \ clean syntax still allows Pyomo to express mathematical concepts intuitively\
    \ and concisely. Aside from the use of Pyomo classes, this example employs standard\
    \ Python syntax and methods. For example, line 41 uses Python’s generator syntax\
    \ to iterate over all elements of the `colors` set and apply the Python `sum`\
    \ function to the result. Although Pyomo does include some utility functions to\
    \ simplify the construction of expressions, Pyomo does not rely on sophisticated\
    \ extensions of core Python functionality.\n\n### 1.2.3 Key Pyomo Features\n\n\
    **Python**\n\nPython’s clean syntax enables Pyomo to express mathematical concepts\
    \ in an intuitive and concise manner. Furthermore, Python’s expressive programming\
    \ environment can be used to formulate complex models and to define high-level\
    \ solvers that customize the execution of high-performance optimization libraries.\
    \ Python provides extensive scripting capabilities, allowing users to analyze\
    \ Pyomo models and solutions, leveraging Python’s rich set of third-party libraries\
    \ (e.g., numpy, scipy, and matplotlib). Finally, the embedding of Pyomo in Python\
    \ allows users to learn core syntax through Python’s rich documentation.\n\n**Customizable\
    \ Capability**\n\nPyomo is designed to support a “stone soup” development model\
    \ in which each developer “scratches their own itch.” A key element of this design\
    \ is the plug-in framework that Pyomo uses to integrate model components, model\
    \ transformations,"
  mdcn: "## 1.2 使用 Pyomo 建模\n\nPyomo 的目标是为指定优化模型提供一个平台，该平台体现了现代 AML 中的核心理念，同时具备灵活性、可扩展性、可移植性、开放性和可维护性。Pyomo\
    \ 是一种扩展 Python 的 AML，包含了用于优化建模的对象 [30]。这些对象可用于指定优化模型，并将其转换为外部求解器可以处理的各种格式。\n\n\
    我们现提供一些示例以展示如何使用 Pyomo 指定优化模型。\n\n### 1.2.1 简单示例\n\n考虑以下线性规划：\n\n$$\\min x_1 +\
    \ 2x_2$$\n$$\\text{s.t.} \\quad 3x_1 + 4x_2 \\geq 1$$\n$$\\quad 2x_1 + 5x_2 \\\
    geq 2$$\n$$\\quad x_1, x_2 \\geq 0$$\n\n这个线性规划可以很容易地用 Pyomo 表达如下：\n\n```python\n\
    import pyomo.environ as pyo\n\nmodel = pyo.ConcreteModel()\nmodel.x_1 = pyo.Var(within=pyo.NonNegativeReals)\n\
    model.x_2 = pyo.Var(within=pyo.NonNegativeReals)\nmodel.obj = pyo.Objective(expr=model.x_1\
    \ + 2*model.x_2)\nmodel.con1 = pyo.Constraint(expr=3*model.x_1 + 4*model.x_2 >=\
    \ 1)\nmodel.con2 = pyo.Constraint(expr=2*model.x_1 + 5*model.x_2 >= 2)\n```\n\n\
    第一行是标准的 Python import 语句，它初始化 Pyomo 环境并加载 Pyomo 的核心建模组件库。接下来的几行构建一个模型对象并定义其属性。此示例描述了一个\
    \ *具体* 模型。模型组件是模型对象的属性，而 `ConcreteModel` 对象在添加时初始化每个模型组件。模型的决策变量、约束和目标函数使用 Pyomo\
    \ 的 *模型组件* 定义。\n\n用户通常很少只求解特定优化问题的单个实例。相反，他们通常有一个通用的优化模型，然后使用特定数据创建该模型的一个具体实例。例如，以下方程组表示一个包含标量参数\
    \ $n$ 和 $m$、向量参数 $b$ 和 $c$ 以及矩阵参数 $a$ 的线性规划：\n\n$$\\min \\sum_{i=1}^n c_i x_i$$\n\
    $$\\text{s.t.} \\quad \\sum_{i=1}^n a_{ji} x_i \\geq b_j \\quad \\forall j = 1\
    \ \\dots m$$\n$$\\quad x_i \\geq 0 \\quad \\forall i = 1 \\dots n$$\n\n这个线性规划可以使用\
    \ Pyomo 的具体模型表示如下：\n\n```python\nimport pyo.environ as pyo\nimport mydata\n\n\
    model = pyo.ConcreteModel()\n\nmodel.x = pyo.Var(mydata.N, within=pyo.NonNegativeReals)\n\
    \ndef obj_rule(model):\n    return sum(mydata.c[i]*model.x[i] for i in mydata.N)\n\
    model.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(model, m):\n    return\
    \ sum(mydata.a[m,i]*model.x[i] for i in mydata.N) \\\n            >= mydata.b[m]\n\
    model.con = pyo.Constraint(mydata.M, rule=con_rule)\n```\n\n此脚本要求用于构建模型的数据在每个建模组件构造时都是可用的。在本例中，必要数据存在于\
    \ mydata.py 中：\n\n```python\nN = [1,2]\nM = [1,2]\nc = {1:1, 2:2}\na = {(1,1):3,\
    \ (1,2):4, (2,1):2, (2,2):5}\nb = {1:1, 2:2}\n```\n\n这个线性规划也可以被视为一个抽象的数学模型，其中未指定的符号参数值在模型初始化时被定义。例如，此线性规划可以在\
    \ Pyomo 中表示为抽象模型，如下所示：\n\n```python\nimport pyo.environ as pyo\n\nmodel = pyo.AbstractModel()\n\
    \nmodel.N = pyo.Set()\nmodel.M = pyo.Set()\nmodel.c = pyo.Param(model.N)\nmodel.a\
    \ = pyo.Param(model.M, model.N)\nmodel.b = pyo.Param(model.M)\n\nmodel.x = pyo.Var(model.N,\
    \ within=pyo.NonNegativeReals)\n\ndef obj_rule(model):\n    return sum(model.c[i]*model.x[i]\
    \ for i in model.N)\nmodel.obj = pyo.Objective(rule=obj_rule)\n\ndef con_rule(model,\
    \ m):\n    return sum(model.a[m,i]*model.x[i] for i in model.N) \\\n         \
    \   >= model.b[m]\nmodel.con = pyo.Constraint(model.M, rule=con_rule)\n```\n\n\
    此示例包含对集合和参数值提供抽象或符号定义的模型组件。`AbstractModel` 对象将模型组件的初始化延迟到创建 *模型实例* 时进行，该实例使用用户提供的集合和参数数据。具体模型和抽象模型都可以使用来自各种不同数据源的数据进行初始化，包括从\
    \ AMPL 的数据命令改编的数据命令文件。例如：\n\n```\nparam : N : c :=\n1 1\n2 2 ;\n\nparam : M :\
