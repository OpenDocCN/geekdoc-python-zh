    \ is here.\n\n```\n[ 22.79] Resetting the tic/toc delta timer\n[+ 0.91] finished\
    \ parameter sweep with persistent interface\n```\n\nNote this function was approximately\
    \ 8 times faster than the non-persistent counterpart (0.91 seconds vs 7.28 seconds).\
    \ Recall that the performance depends heavily on the application as discussed\
    \ in Section 9.3.1.\n\n# 9.4 Sparse Index Sets\n\nOften, a model makes use of\
    \ only a portion of the cross product of multiple index sets. In particular, sometimes\
    \ the members in one dimension depend on the value in another, leading to the\
    \ slang “jagged sets.”\n\nFor example, a modeler may want to have a constraint\
    \ to hold for\n\n$i \\in \\mathcal{I}, k \\in \\mathcal{K}, v \\in \\mathcal{V}_k$.\n\
    \nThere are many ways to accomplish this, but one good way is to create a set\
    \ of tuples composed of all of valid “model.k, model.V[k]” pairs. This is illustrated\
    \ in the following example where the jagged set KV is used.\n\n```\nimport pyomo.environ\
    \ as pyo\n\nmodel = pyo.AbstractModel()\n\nmodel.I = pyo.Set()\nmodel.K = pyo.Set()\n\
    model.V = pyo.Set(model.K)\n\ndef kv_init(m):\n    return ((k,v) for k in m.K\
    \ for v in m.V[k])\nmodel.KV = pyo.Set(dimen=2, initialize=kv_init)\n\nmodel.a\
    \ = pyo.Param(model.I, model.K)\n\nmodel.y = pyo.Var(model.I)\nmodel.x = pyo.Var(model.I,\
