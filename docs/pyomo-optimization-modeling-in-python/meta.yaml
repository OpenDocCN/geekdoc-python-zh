    \ x_{ij} \\frac{d\\ell_j(\\tau_k)}{d\\tau}, \\quad k=1,\\dots,K, i=1,\\dots,N-1\
    \ \\quad (12.10)\n$$\n\n$$\n0 = g\\left(\\frac{dx}{dt}\\bigg|_{t_{ij}}, f(x_{ik},\
    \ u_{ik})\\right), \\quad k=1,\\dots,K, i=1,\\dots,N-1 \\quad (12.11)\n$$\n\n\
    $$\nx_{i+1,0} = \\sum_{j=0}^K \\ell_j(1)x_{ij}, \\quad i=1,\\dots,N-1 \\quad (12.12)\n\
    $$\n\nwhere $t_{ij} = t_{i-1} + \\tau_j h_i, x(t_{ij}) = x_{ij}$. Further, we\
    \ note that the solution $x(t)$ is interpolated as follows:\n\n$$\nx(t) = \\sum_{j=0}^K\
    \ \\ell_j(\\tau)x_{ij}, \\quad t \\in [t_{i-1}, t_i], \\quad \\tau \\in [0,1]\
    \ \\quad (12.13)\n$$\n\n$$\n\\ell_j(\\tau) = \\prod_{\\substack{k=0, \\\\ k \\\
    neq j}}^K \\frac{(\\tau - \\tau_k)}{(\\tau_j - \\tau_k)}. \\quad (12.14)\n$$\n\
    \nCollocation methods produce significantly more accurate algebraic approximations\
    \ compared to finite difference methods. However, they are much harder to implement\
    \ manually. Variations of collocation methods differ in the functional representation\
    \ of the differential variable profile over each finite element as well as the\
    \ selection of the collocation points. As of this writing, the collocation transformations\
    \ in `pyomo.dae` use Lagrange polynomials to represent differential variable profiles.\
    \ Two options are available for the selection of collocation points: shifted Gauss-Radau\
    \ roots ('LAGRANGE-RADAU') and shifted Gauss-Legendre roots ('LAGRANGE-LEGENDRE').\n\
    \nA collocation discretization can be applied to a Pyomo model using:\n\n```python\n\
    discretizer = pyo.TransformationFactory('dae.collocation')\ndiscretizer.apply_to(m,\
    \ nfe=7, ncp=6, scheme='LAGRANGE-RADAU')\n```\n\nThe `nfe` keyword argument specifies\
    \ the number of finite elements and the `ncp` argument specifies the number of\
    \ collocation points within each finite element.\n\n## 12.4 Additional Features\n\
    \nThere are several advanced features included pyomo.dae. In this section, we\
    \ briefly mention two such features that will be of interest for users interested\
    \ in PDE constrained optimization or more advanced optimal control strategies.\n\
    \n### 12.4.1 Applying Multiple Discretizations\n\nAs mentioned previously, a separate\
    \ discretization transformation can be applied to each `ContinuousSet` appearing\
    \ in the model. This means different finite difference or collocation schemes\
    \ or a combination of the two can be applied to a single Pyomo model. For example,\
    \ a Pyomo model with two `ContinuousSet` components (`m.t1` and `m.t2`), could\
    \ be discretized with any of the following combinations of discretization schemes:\n\
    \n```python\n# Apply multiple finite difference schemes\ndiscretizer = pyo.TransformationFactory('dae.finite_difference')\n\
    discretizer.apply_to(m, wrt=m.t1, nfe=10, scheme='BACKWARD')\ndiscretizer.apply_to(m,\
    \ wrt=m.t2, nfe=100, scheme='FORWARD')\n```\n\n```python\n# Apply multiple collocation\
    \ schemes\ndiscretizer = pyo.TransformationFactory('dae.collocation')\ndiscretizer.apply_to(m,\
    \ wrt=m.t1, nfe=4, ncp=6, \\\n    scheme='LAGRANGE-LEGENDRE')\ndiscretizer.apply_to(m,\
    \ wrt=m.t2, nfe=10, ncp=3, \\\n    scheme='LAGRANGE-RADAU')\n```\n\n```python\n\
    # Apply a combination of finite difference and\n# collocation schemes\ndiscretizer1\
    \ = pyo.TransformationFactory('dae.finite_difference')\ndiscretizer2 = pyo.TransformationFactory('dae.collocation')\n\
    discretizer1.apply_to(m, wrt=m.t1, nfe=10, scheme='BACKWARD')\ndiscretizer2.apply_to(m,\
    \ wrt=m.t2, nfe=5, ncp=3, \\\n    scheme='LAGRANGE-RADAU')\n```"
