    \n> **NOTE:** Within one block, Pyomo supports references to components from any\
    \ other block. However, it is generally good object-oriented practice to only\
    \ reference components from the current or lower levels in the hierarchy. This\
    \ promotes reusability of your blocks within other models without strong assumptions\
    \ about the structure of the owning or parent blocks.\n\nNote in the code snippet\
    \ each block defines its own *component namespace*; while component names must\
    \ be unique within a single block, they do not need to be globally unique. This\
    \ allows blocks to be constructed safely without concerns about definitions in\
    \ one block colliding or interfering with definitions in other blocks. This leads\
    \ to all components having two forms of a name: the local name, which may be repeated\
    \ elsewhere in the model, and a globally-unique *fully qualified* name that includes\
    \ the names of the parent block(s) separated by periods:\n\n```\nprint(model.x.local_name)\
    \           # x\nprint(model.x.name)                 # x\nprint(model.b.x.local_name)\
    \         # x\nprint(model.b.x.name)               # b.x\nprint(model.b.b[1].x.local_name)\
    \    # x\nprint(model.b.b[1].x.name)          # b.b[1].x\n```\n\nWhen discussing\
    \ the block hierarchy, we adopt terminology from tree structures and refer to\
    \ the block one level up the hierarchy (toward the top-level model) as the *parent\
    \ block*, and all components contained within a block as its *children*. The *root*\
    \ of the block hierarchy is always the current model. Pyomo components all provide\
    \ a set of standard methods for moving around the component hierarchy:\n\n`parent_component()`\
    \ Each modeling object in a Pyomo model is owned by a single component. Calling\
    \ `parent_component()` on a modeling object returns the *component* that holding\
    \ (or owning) the modeling object. For members of an indexed component, `parent_component()`\
    \ returns the indexed component object containing the component. For scalar components,\
    \ the parent component is the scalar component itself.\n\n`parent_block()` Each\
    \ modeling component is attached to a single block. Calling `parent_block()` on\
    \ a Pyomo modeling object returns the block that owns the object's `parent_component()`.\n\
    \n`model()` Calling `model()` on a modeling object walks up the `parent_block()`\
    \ calls to return the top-level (root) block.\n\n`__getitem__` As with models,\
    \ child components can be accessed programmatically by attribute lookup on the\
    \ block.\n\n`component()` Child components can also be retrieved by name using\
    \ the Blocks `component()` method.\n\nThe following illustrates how to move around\
    \ the component hierarchy:\n\n```\nmodel.b.b[1].x.parent_component()  # is model.b.b[1].x\n\
    model.b.b[1].x.parent_block()      # is model.b.b[1]\nmodel.b.b[1].x.model() \
    \            # is model\nmodel.b.b[1].component('x')         # is model.b.b[1].x\n\
    model.b.x[1].parent_component()    # is model.b.x\nmodel.b.x[1].parent_block()\
    \        # is model.b\nmodel.b.x[1].model()               # is model\nmodel.b.component('x')\
    \             # is model.b.x\n```\n\nBlock components can also be created and\
    \ populated, and then later added to a model. The code below shows creation of\
    \ a block that is later added to a model. It also illustrates how a parent model\
    \ can make use of sets and parameters contained in a child block.\n\n```\nnew_b\
    \ = pyo.Block()\nnew_b.x = pyo.Var()\nnew_b.P = pyo.Param(initialize=5)\nnew_b.I\
    \ = pyo.RangeSet(10)\n\nmodel = pyo.ConcreteModel()\nmodel.b = new_b\nmodel.x\
    \ = pyo.Var(model.b.I)\n```\n\n> NOTE: In this example, the Block object new_b\
    \ is not initialized when it is declared. In this manner, it is abstract until\
    \ it is added to the ConcreteModel object. At this point, it is immediately initialized.\
    \ Similarly, when a Block object is added to an AbstractModel, it is not initialized\
    \ until the owning abstract model object is initialized.\n\n## 8.3 Blocks as Indexed\
    \ Components\n\nAs with other Pyomo components, Block components may also be indexed\
    \ and initialized using a construction rule. However, block construction rules\
    \ follow a slightly different convention: the first argument to a block rule is\
    \ the block to be populated rather than the owning block. This block has already\
    \ been attached to the model so methods like model() and parent_block() will work\
    \ as expected. Within a rule, one can either directly populate the block by assigning\
    \ components to it, or create a new block and return it from the rule.\n\nThe\
    \ following example illustrates the use of construction rules for blocks:\n\n\
    ```\nmodel = pyo.ConcreteModel()\nmodel.P = pyo.Param(initialize=3)\nmodel.T =\
    \ pyo.RangeSet(model.P)\n\ndef xyb_rule(b, t):\n    b.x = pyo.Var()\n    b.I =\
    \ pyo.RangeSet(t)\n    b.y = pyo.Var(b.I)\n    b.c = pyo.Constraint(expr=b.x ==\
    \ 1 - sum(b.y[i] for i in b.I))\nmodel.xyb = pyo.Block(model.T, rule=xyb_rule)\n\
    ```\n\nHere, an indexed Block component containing one block for each element\
    \ of the set model.T is defined. In the construction rule, we create two variables\
    \ and a set. These construction rules are just as flexible as those for other\
    \ components. The set b.I created in this example is different for each block,\
    \ and consequently the variable b.y is also a different length for each block.\
    \ This illustrates another feature of blocks. Often, different blocks contain\
    \ exactly the same model structure, just with different data. It is also possible\
    \ to construct blocks with a different structure based on data available in the\
    \ construction rule.\n\nThis example can be extended to print the constraint body\
    \ c for each of the blocks:\n\n```\nfor t in model.T:\n    print(model.xyb[t].c.body)\n\
    ```\n\nThe constraints expand appropriately and they contain fully qualified names\
    \ of variables in each of the subblocks:\n\n```\n-1.0 + xyb[1].x + xyb[1].y[1]\n\
    -1.0 + xyb[2].x + xyb[2].y[1] + xyb[2].y[2]\n-1.0 + xyb[3].x + xyb[3].y[1] + xyb[3].y[2]\
    \ + xyb[3].y[3]\n```\n\n## 8.4 Construction Rules within Blocks\n\nLike model\
    \ objects, blocks can contain other modeling components, including Set and Param\
    \ objects. Additionally, blocks can be initialized with modeling components that\
    \ are themselves constructed using rules. However, doing this exposes a subtlety\
    \ of Pyomo component construction rules.\n\nUp to this point we have frequently\
    \ referred to the first argument of a component rule as the “model”, but this\
    \ is not completely correct. The first argument to component rules is actually\
    \ the owning block of the component being constructed. For “flat” models (models\
    \ without any sub-blocks), the owning block is indeed the model, but this will\
    \ not be the case for hierarchically-structured models. If needed, the model object\
    \ can be obtained from the owning block using the aforementioned model() method.\n\
    \nFor example, consider the following alternative declaration of the `xyb` block\
    \ from the previous example:\n\n```\ndef xyb_rule(b, t):\n    b.x = pyo.Var()\n\
    \    b.I = pyo.RangeSet(t)\n    b.y = pyo.Var(b.I, initialize=1.0)\n    def _b_c_rule(_b):\n\
