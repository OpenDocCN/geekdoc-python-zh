    \n## 9.3 Repeated Solves with Persistent Solvers\n\nEach time a Pyomo model is\
    \ solved using the standard solver interfaces, the generalized modeling components\
    \ defining the model must be translated into some input form recognized by the\
    \ solver in use. For cases where the solver finishes relatively quickly, this\
    \ model translation may introduce significant timing overhead. Persistent solver\
    \ interfaces provide a mechanism for reducing overall translation time for models\
    \ that are solved repeatedly with incremental changes. This is made possible by\
    \ exposing functionality allowing users to efficiently notify the solver of these\
    \ incremental changes to the Pyomo model, after an initial step where the full\
    \ model is translated.\n\nWhen a persistent interface is used, additional care\
    \ must be taken so that the Pyomo model and its translated solver representation\
    \ are kept in sync. This is a manual process that must be done by the user. However,\
    \ with this tradeoff, significant performance improvements are possible for many\
    \ common optimization approaches.\n\nIn Section 9.3.1, we briefly discuss when\
    \ persistent solvers are most useful. In Sections 9.3.2 – 9.3.4, we describe how\
    \ to use a persistent solver interface. In Section 9.3.5, we re-implement the\
    \ parametric sweep example from Section 9.1.3 using a persistent solver interface."
