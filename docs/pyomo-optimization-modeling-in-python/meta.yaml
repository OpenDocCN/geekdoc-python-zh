    \n其中 $x_k = x(t_k)$，$t_k = kh$，$h$ 是离散点之间的步长或每个有限单元的大小。当对 Pyomo 模型应用有限差分变换时，诸如\
    \ (12.8) 的离散化方程会自动生成并作为等式约束添加到 Pyomo 模型中。\n对我们的最优控制示例应用后向有限差分方法所需的代码如下：\n\n```python\n\
    discretizer = pyo.TransformationFactory('dae.finite_difference')\ndiscretizer.apply_to(m,\
    \ nfe=20, wrt=m.t, scheme='BACKWARD')\n```\n\n关键字参数 `nfe` 代表“有限单元数”，它指定了离散化中使用的离散点数。关键字\
    \ `scheme` 指定了要应用哪种有限差分方法。目前 `pyomo.dae` 中包含三种有限差分方案：后向有限差分（'BACKWARD'）、中心有限差分（'CENTRAL'）和前向有限差分（'FORWARD'）。\n\
    \n### 12.3.2 配置变换\n\n`pyomo.dae` 中包含的第二种离散化类型是配置法，或者更具体地说，是有限元上的正交配置法。这种方法的工作原理是首先将连续域划分为\
    \ $N - 1$ 个称为有限元的段。在每个这样的段上，微分变量（导数出现在模型中的变量）的轮廓使用多项式来近似。多项式使用每个有限元内作为离散点的 $K$\
    \ 个配置点来定义。在有限元边界处对微分变量强制连续性。为了提供应用于导数和微分方程 (12.7) 的该方法的正式数学表示，我们有：\n\n$$\n\\frac{dx}{dt}\\\
    bigg|_{t_{ij}} = \\frac{1}{h_i} \\sum_{j=0}^K x_{ij} \\frac{d\\ell_j(\\tau_k)}{d\\\
    tau}, \\quad k=1,\\dots,K, i=1,\\dots,N-1 \\quad (12.10)\n$$\n\n$$\n0 = g\\left(\\\
    frac{dx}{dt}\\bigg|_{t_{ij}}, f(x_{ik}, u_{ik})\\right), \\quad k=1,\\dots,K,\
    \ i=1,\\dots,N-1 \\quad (12.11)\n$$\n\n$$\nx_{i+1,0} = \\sum_{j=0}^K \\ell_j(1)x_{ij},\
    \ \\quad i=1,\\dots,N-1 \\quad (12.12)\n$$\n\n其中 $t_{ij} = t_{i-1} + \\tau_j h_i,\
