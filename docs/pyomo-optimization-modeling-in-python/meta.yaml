    ```\n\n## 4.3 Variables\n\nPyomo variables are created using the Var class, which\
    \ can represent a single value or an indexed collection of values. Variables can\
    \ have initial values, and the value of a variable can be retrieved and set by\
    \ the user or by a solver as part of the solution process.\n\n### 4.3.1 Var Declarations\n\
    \nThe following code creates a non-indexed Var object:\n\n```python\nmodel.x =\
    \ pyo.Var()\n```\n\nNamed and un-named arguments are supported, and Table 4.1\
    \ provides a list of the common arguments that can be passed when declaring the\
    \ Var component.\n\n| keyword | description | acceptable values |\n| :--- | :---\
    \ | :--- |\n| `<un-named>` | reserved for specifying index sets | any number of\
    \ Pyomo Set objects or Python lists |\n| `within or domain` | specifies the valid\
    \ domain or values for a variable | a Pyomo Set object, Python list, or rule function\
    \ |\n| `bounds` | provides lower and upper bounds for the variable | a 2-tuple,\
    \ or a rule function |\n| `initialize` | provides an initial value for the variable\
    \ | a scalar value, Python dictionary of index-value pairs, or rule function |\n\
    \n**Table 4.1: Common declaration arguments for the Var component**\n\nThe domain\
    \ of a variable (i.e., the set of legal values) is specified with either the `domain`\
    \ or `within` keyword options to the `Var` constructor:\n\n```python\nmodel.A\
    \ = pyo.Set(initialize=[1,2,3])\nmodel.y = pyo.Var(within=model.A)\nmodel.r =\
    \ pyo.Var(domain=pyo.Reals)\nmodel.w = pyo.Var(within=pyo.Boolean)\n```\n\nIn\
    \ this example, `y` is only allowed to take on the integer values 1, 2, or 3.\
    \ The variable `r` can have any real value, and `w` is restricted to be binary\
    \ (that is 0/1 or True/False). If the domain is not specified, the default is\
    \ the `Reals` virtual set. Other virtual sets supported by Pyomo are defined in\
    \ Table 4.2. Note that these virtual sets can also be used in other contexts (e.g.,\
    \ when constructing `Param` objects).\n\n| Name | Description |\n|---|---|\n|\
    \ `Any` | The set of all possible values, except `None` |\n| `AnyWithNone` | The\
    \ set of all possible values |\n| `EmptySet` | The set with no data values |\n\
    | `Reals` | The set of floating point values |\n| `PositiveReals` | The set of\
    \ strictly positive floating point values |\n| `NonPositiveReals` | The set of\
    \ non-positive floating point values |\n| `NegativeReals` | The set of strictly\
    \ negative floating point values |\n| `NonNegativeReals` | The set of non-negative\
    \ floating point values |\n| `PercentFraction` | The set of floating point values\
    \ in the interval [0,1] |\n| `UnitInterval` | The same as 'PercentFraction' |\n\
    | `Integers` | The set of integer values |\n| `PositiveIntegers` | The set of\
    \ positive integer values |\n| `NonPositiveIntegers` | The set of non-positive\
    \ integer values |\n| `NegativeIntegers` | The set of negative integer values\
    \ |\n| `NonNegativeIntegers` | The set of non-negative integer values |\n| `Boolean`\
    \ | The set of boolean values, which can be represented as False/True, 0/1, 'False'/'True'\
    \ and 'F'/'T' |\n| `Binary` | The same as 'Boolean' |\n\n**Table 4.2: Predefined\
    \ virtual sets in Pyomo.**\n\nThe `domain` or `within` argument can also accept\
    \ a function, which is used to define the domain for individual elements of an\
    \ indexed variable. For example:\n\n```python\nmodel.A = pyo.Set(initialize=[1,2,3])\n\
    def s_domain(model, i):\n    return pyo.RangeSet(i, i+1, 1) # (start, end, step)\n\
    model.s = pyo.Var(model.A, domain=s_domain)\n```\n\nIn this example, `s` is an\
    \ indexed variable whose individual entities are defined over consecutive integer\
    \ intervals.\n\n> NOTE: While Pyomo supports a general representation for restricting\
    \ the domain of the variables, not all solvers support this general behavior.\
    \ You may need to restrict your definitions to those supported by the selected\
    \ solver.\n\nVariable bounds can be explicitly specified with the `bounds` keyword\
    \ option:\n\n```python\nmodel.A = pyo.Set(initialize=[1,2,3])\nmodel.a = pyo.Var(bounds=(0.0,None))\n\
    \nlower = {1:2.5, 2:4.5, 3:6.5}\nupper = {1:3.5, 2:4.5, 3:7.5}\ndef f(model, i):\n\
    \    return (lower[i], upper[i])\nmodel.b = pyo.Var(model.A, bounds=f)\n```\n\n\
    The `bounds` option can specify a 2-tuple with lower and upper values. Alternatively,\
    \ it can specify a function that returns a 2-tuple for each variable index. Note\
    \ that `None` can be used in place of the lower or upper bound to indicate no\
    \ bound should be enforced. In the code snippet above, `model.a` has a lower bound\
    \ of 0, and does not have an upper bound, while `model.b` has different bounds\
    \ for each of its indices. For example, `model.b[3]` has a lower bound of 6.5\
    \ and an upper bound of 7.5.\n\nThe initial value of variables can be set with\
    \ the `initialize` keyword argument as in the following example:\n\n```python\n\
    model.A = pyo.Set(initialize=[1,2,3])\nmodel.za = pyo.Var(initialize=9.5, within=pyo.NonNegativeReals)\n\
    model.zb = pyo.Var(model.A, initialize={1:1.5, 2:4.5, 3:5.5})\nmodel.zc = pyo.Var(model.A,\
    \ initialize=2.1)\n\nprint(pyo.value(model.za))  # 9.5\nprint(pyo.value(model.zb[3]))\
