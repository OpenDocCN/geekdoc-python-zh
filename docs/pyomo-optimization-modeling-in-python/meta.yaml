  md: "# 4.5 Constraints\n\nA constraint defines one or more expressions that place\
    \ limits on the feasible values of variables. The declaration of constraint expressions\
    \ is similar to the declaration of objective function expressions. Constraints\
    \ differ from objectives in that the expressions include relationships (equalities\
    \ or inequalities). While objectives can be indexed, this feature is infrequently\
    \ used. In contrast, constraints are commonly indexed, allowing for a collection\
    \ of related constraint expressions to be constructed and stored in a single constraint\
    \ object.\n\n# 4.5.1 Constraint Declarations\n\nThe following code creates a single,\
    \ non-indexed `Constraint` object:\n\n```\nmodel.x = pyo.Var([1,2], initialize=1.0)\n\
    model.diff = pyo.Constraint(expr=model.x[2]-model.x[1] <= 7.5)\n```\n\nSeveral\
    \ named arguments are supported, and Table 4.4 lists the common arguments that\
    \ can be passed when declaring a `Constraint` component.\n\nThe expression specified\
    \ by the `expr` keyword can alternatively be generated with a rule function. For\
    \ example, the `diff` constraint can also be declared as follows:\n\n```\nmodel.x\
    \ = pyo.Var([1,2], initialize=1.0)\ndef diff_rule(model):\n    return model.x[2]\
    \ - model.x[1] <= 7.5\nmodel.diff = pyo.Constraint(rule=diff_rule)\n```\n\n| keyword\
    \ | description | acceptable values |\n|---------|-------------|-------------------|\n\
    | <un-named> | reserved for specifying index sets | any number of Pyomo Set objects\
    \ or Python lists |\n| expr | provides the expression that defines the constraint\
    \ | any valid Pyomo expression with a relational operator, a 2-tuple, or a 3-tuple\
    \ |\n| rule | provides the rule function that will be called to access the expression\
    \ that defines the constraint | a function that returns a Pyomo expression with\
    \ a relational operator, a 2-tuple, a 3-tuple, or Constraint.Skip |\n\nTable 4.4:\
    \ Common declaration arguments for the `Constraint` component"
  merge: -1
  pgno: 59
- img_proc: true
  md: "Constraints can be indexed, and those indices can be used to refer to specific\
    \ elements of indexed parameters and variables when constructing expressions.\
    \ The following code fragment shows an example of this:\n\n```\nN = [1,2,3]\n\n\
    a = {1:1, 2:3.1, 3:4.5}\nb = {1:1, 2:2.9, 3:3.1}\n\nmodel.y = pyo.Var(N, within=pyo.NonNegativeReals,\
    \ initialize=0.0)\n\ndef CoverConstr_rule(model, i):\n    return a[i] * model.y[i]\
    \ >= b[i]\nmodel.CoverConstr = pyo.Constraint(N, rule=CoverConstr_rule)\n```\n\
    \nIndexed constraints are specified in the same manner as indexed objectives.\
    \ Pyomo iterates over the cross product of the indexing sets, providing an index\
    \ from each set to the rule function. The `CoverConstr` constraint in this example\
    \ implements the following mathematical model:\n\n$$a_i y_i \\geq b_i \\; \\forall\
    \ i \\in \\{1,2,3\\}$$\n\nGiven the data specified in `a` and `b`, the model instance\
    \ passed to the solver will include the following explicit constraints:\n\n$$y[1]\
    \ \\geq 1$$\n$$3.1 \\cdot y[2] \\geq 2.9$$\n$$4.5 \\cdot y[3] \\geq 3.1$$\n\n\
    Three types of constraint expressions are allowed in Pyomo:\n\n+   - *inequality\
    \ constraints* have the form\n\n  $$expr_1 \\leq expr_2 \\quad \\text{or} \\quad\
    \ expr_1 \\geq expr_2$$\n\n  where $expr_1$ and $expr_2$ may be non-constant expressions.\
    \ (Note that < and > are not supported.)\n- *equality constraints* have the form\n\
    \n  $$expr_1 = expr_2$$\n\n  where $expr_1$ and $expr_2$ may be non-constant expressions.\n\
    - *range constraints* have the form\n\n  $$lower \\leq expr_1 \\leq upper$$\n\n\
    \  where $lower$ and $upper$ are constant expressions and $expr_1$ is a non-constant\
    \ expression."
  merge: -1
  pgno: 60
- img_proc: true
  md: "In some optimization models, a constraint might not be defined for all indices.\
    \ For example, particular indices might not be physically realizable. The rule\
    \ function can return `Constraint.Skip` (or `Constraint.NoConstraint`) to indicate\
    \ that no constraint is associated with a particular index. For example, consider\
    \ the declaration of a notional task scheduling constraint:\n\n```\nTimePeriods\
    \ = [1,2,3,4,5]\nLastTimePeriod = 5\n\nmodel.StartTime = pyo.Var(TimePeriods,\
    \ initialize=1.0)\n\ndef Pred_rule(model, t):\n    if t == LastTimePeriod:\n \
    \       return pyo.Constraint.Skip\n    else:\n        return model.StartTime[t]\
    \ <= model.StartTime[t+1]\n\nmodel.Pred = pyo.Constraint(TimePeriods, rule=Pred_rule)\n\
    ```\n\nThe value `Constraint.Skip` indicates that no constraint is being generated,\
    \ and the corresponding index value is skipped. An alternative to this approach\
    \ is to construct a sparse index set that specifies only the valid indices in\
    \ the constraint. However, this may not always be practical in complex models\
    \ (for a discussion of sparse index sets, see Section 9.4).\n\nThe value `Constraint.Feasible`\
    \ indicates that the constraint generated for the specified index is always feasible.\
    \ Consequently, that constraint does not need to be generated, and it is skipped.\
    \ Similarly, the value `Constraint.Infeasible` indicates that the constraint generated\
    \ by the specified index is infeasible. This might be used, for example, if a\
    \ particular combination of parameter values produced an invalid constraint. For\
    \ this value, Pyomo raises an exception to inform the user, because this typically\
    \ indicates an error in the model or data.\n\n# 4.5.2 Working with Constraint\
    \ Objects\n\nAfter a constraint is declared, the constraint expression is processed\
    \ to identify the elements of the logical tuple: `(lower, body, upper)`, where\
    \ the non-constant expressions are pushed to the body. Hence, the `lower` and\
    \ `upper` attributes are constant expressions or `None`, and the `body` attribute\
    \ contains a Pyomo expression. If a `Constraint` contains an equality expression,\
    \ then the `equality` attribute is `True`, and the `lower` and `upper` attributes\
    \ have the same value."
