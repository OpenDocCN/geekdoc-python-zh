    # ## 5.1 Introduction


    In previous chapters, we have described how a generic optimization process can
    be executed with Pyomo to construct a model, solve the model, and display the
    results. The use of Python and the Pyomo API provides tremendous flexibility for
    the development of advanced workflows. With some AMLs, a new scripting language
    is defined that is unique to the AML, and the developers of the package produce
    a parser for the new language. This separates the user from the underlying code
    of the framework itself. With Pyomo, Python is used for both the overall framework
    and the modeling environment. This provides the user with complete control over
    the entire solution process giving two important high-level capabilities:


    +   - Pyomo users can leverage existing Python libraries for analysis of data
    before and after solving the optimization problem.

    - Pyomo supports development of algorithms requiring problem transformations and
    multiple solves of problems with different structure and data. Coupled with the
    programming capabilities of Python, this allows users to build high-level algorithms
    (e.g., Bender’s decomposition, MINLP solvers, and multi-stage initialization strategies).'
