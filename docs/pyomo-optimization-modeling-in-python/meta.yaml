- img_proc: true
  md: "```\npython\ndef C_validate(model, value):\n    return value in model.A\nmodel.C\
    \ = pyo.Set(validate=C_validate)\n```\n\nFinally, note that if both the `within`\
    \ and `validate` keyword arguments are specified, then the logic specified by\
    \ both are applied to validate set elements.\n\nBy default, sets are ordered by\
    \ insertion order. In some cases, we may want the set elements to be in sorted\
