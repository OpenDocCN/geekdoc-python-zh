  md: '# Foreword


    The book *Coding Examples from Simple to Complex—Applications in Python™* by Paul
    Aurelian Gagniuc is a very hands-on introduction to programming in Python, appealing
    to readers ranging from novices making their first steps in the universe of programming
    to more seasoned developers, that can use a very rich reference of code examples.
    Since this is the main feature of this work, teaching through examples, over 200,
    each chapter exemplifying the key concepts by exercises which are implemented,
    commented, and explained in great detail.


    The chosen language is Python, most probably one of the most popular programming
    languages nowadays. While most learning institutions introduce programming languages
    using the Python language, readers will benefit the wealth of the examples in
    this book, as well as from being exposed to more advanced programming techniques.


    The structure is well-thought, starting with traditional starting points in variable
    declaration, expressions, control statements, lists (arrays), and functions and
    continuing with objects and advanced techniques. The author focuses on imperative
    programming techniques, more suitable for beginners, however, treating also functional
    programming and object-oriented programming in the respective chapters. The examples
    support the chapters in a logical succession, one advantage being that a simplified
    solution is shown before an optimized one, useful for a deeper understanding of
    the problem.


    The book continues with the moderate examples section, in which more real-world
    usages are shown, ranging from topics such as string manipulation, more advanced
    matrix operations, sorting algorithms, bitwise operations and encodings, and statistics.
    As examples are implemented without the use of other libraries except the standard
    library, they are of great teaching value, in helping practitioners truly understand
    the inner workings of concepts.


    Where the book is of interest to more advanced developers or researchers in different
    fields is in the complex examples section, covering novel, state-of-the-art algorithms
    such'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'as spectral forest or complex usage of Markov Chains, an area in which the
    author is a renowned expert.


    Andrei Vasilateanu

    Friend and Vice Dean

    Faculty of Engineering in Foreign Languages

    National University of Science and Technology Politehnica Bucharest

    Bucharest, Romania'
