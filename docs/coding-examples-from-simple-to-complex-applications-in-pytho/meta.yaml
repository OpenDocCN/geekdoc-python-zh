  md: '# Loops


    For imperative computer programming languages, loops hold a paramount position
    [1]. They are fundamental structures that facilitate the repeated execution of
    a set of instructions, enabling efficient automation and repetitive task handling.
    From a conceptual viewpoint, a loop is a mechanism by which a process can be reiterated
    until a specific condition or set of conditions is met. This cyclic execution
    allows for the efficient handling of tasks that follow a recurrent nature. There
    are several types of loops, primarily distinguished by their control mechanisms:
    (a) For-Loop, that is generally used when the number of iterations is known in
    advance. The loop contains an initializer, a condition, and an iterator. It commences
    with the initialization, checks the condition, and post-execution, the iterator
    modifies the loop variable, leading to the next iteration or exit. (b) While-Loop,
    that is predominantly used when the number of iterations is not predetermined,
    the while loop checks a condition before every iteration. If the condition evaluates
    to true, the loop body is executed. Each iteration within a loop is commonly referred
    to as a “cycle”. In every cycle, the computational instructions are reevaluated,
    often with altered variables, leading to different outcomes in each iteration.
    It is vital to ensure that loops have a definitive termination point or a condition
    that will be met, to prevent infinite looping, which can lead to system hang-ups
    or overconsumption of computational resources. Loops are foundational constructs
    in computer programming that harness the power of computation by enabling repetitive
    execution based on conditions. Some basic examples are shown here in order to
    familiarize the reader with these structures.'
