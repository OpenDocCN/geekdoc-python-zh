    \ $i$。如果 $i$ 大于或等于 $t$，则函数返回数组 $m$。否则，它递归调用 *sequence*，将 $n$ 更新为前两个 $n$ 值的和，并继续构建序列。然后将结果打印在输出中。\n\
    \n## 8.3.6 示例 (151) – 递归生成斐波那契数列\n\n```python\ndef fibonacci(n, m, t):\n    n\
