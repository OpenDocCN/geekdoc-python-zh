    \ 函数将 *i* 的数值转换为字符串，以便与另一个字符串连接。接下来，*i* 的值增加 1。只要 *i* 的值小于 5，循环就会继续执行。一旦 *i* 达到\
    \ 5，循环停止。因此，这段代码的输出将是一系列打印语句，显示“i = 0”、“i = 1”、“i = 2”、“i = 3”和“i = 4”。换句话说，*while\
    \ true* 循环创建了一个无限循环，只有当循环内的 *if* 条件失败（*i < 5*）并执行 break 时才会退出。请注意，这段 Python 代码模拟了\
    \ *do-while* 循环的行为，其中循环体保证至少执行一次。\n\n## 4.1.3 示例 (24) – 简单的 for 循环\n\n```python\n\
