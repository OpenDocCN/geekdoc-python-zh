  md: 'This is a more useful representation of an object and its properties. Namely,
    an object named *obj* is defined. This object has four properties: *AV*, *SD*,
    *CV*, and *dx*. The *AV*, *SD*, and *CV* properties are initially set to the value
    0, while the *dx* property is assigned a function. The *dx* function takes one
    parameter, *a*, which is assumed to be an array. Within the *dx* function, several
    operations are performed to calculate statistical values based on the input array
    *a*. First, the length of the array *a* is stored in the variable *n*. Then, two
    variables *b* and *e*, are initialized to 0. A *for-loop* is used to iterate over
    the elements of the array *a*, and in each iteration, the values are accumulated
    into the variable *b*. After the loop, the mean (average) *x* is calculated by
    dividing the accumulated sum *b* by *n*. Another *for-loop* is used to calculate
    the sum of squared differences between each element of the array and the mean
    *x*. This sum is stored in variable *e*. Subsequently, the standard deviation
    *s* is computed by taking the square root of the variance, which is calculated
    by dividing *e* by (*n* - 1). The coefficient of variation *c* is computed by
    dividing the standard deviation *s* by the mean *x*. Next, the *AV*, *SD*, and
    *CV* properties of the *obj* object are updated with the calculated values of
    *x*, *s*, and *c*, respectively. Outside of the object definition, an array *a*
    is defined with a list of numerical values. The *dx* method of the *obj* object
    is called with this array *a* as an argument to perform the statistical calculations.
    Following the calculation, there are three *print* statements that display the
    results. These statements use the *print* function to output the mean (*AV*),
    standard deviation (*SD*), and coefficient of variation (*CV*) to the console.
    Note that variance: *e* / (*n* - 1). The standard deviation is the square root
    of the variance. The expression (*e* / (*n* - 1)) ** 0.5 calculates this square
    root. The use of "** 0.5" is equivalent to using the *math.sqrt()* function. An
    experimentation with both approaches yields the same results. Raising a number
    to the power of 0.5 is equivalent to taking its square root. The square root of
    a number is the inverse operation of squaring that number. Squaring a number means
    raising it to the power of 2, thus, the inverse operation is to raise it to the
    power of ½ or 0.5. One can notice further that q^0.5 × q^0.5 = q^(0.5+0.5) = q^1
    = q, where q is a number. Thus, q^0.5 is indeed the square root of q, because
    when it is multiplied by itself it gives back q.'
