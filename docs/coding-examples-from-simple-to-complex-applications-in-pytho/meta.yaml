    \ a):\n    return c3(t, a) + 5\n\ndef c3(t, a):\n    s = 1\n    return s + c4(t,\
    \ a)\n\ndef c4(t, a):\n    return c5(t, a) + c5(t, a)\n\ndef c5(t, a):\n    for\
    \ i in a:\n        t += i\n    return t\n\nb = c1(t, a)\nprint(b)\n```\n\nIn this\
    \ code snippet, we have a series of functions and variable assignments that perform\
    \ calculations based on the input values. We have a constant array $a$ containing\
    \ the elements [1, 2, 3, 4, 5]. A variable $t$ is initialized with the value 0.\
    \ Then, a variable $b$ is assigned the result of calling the function $c1$ with\
    \ the arguments $t$ and $a$. The function $c1$ takes two arguments $t$ and $a$\
    \ and returns the result of calling $c2$ with the same arguments and adding 5\
    \ to it. The function $c2$ takes two arguments $t$ and $a$ and returns the result\
    \ of calling $c3$ with the same arguments and adding 5 to it. The function $c3$\
    \ takes two arguments $t$ and $a$. Inside this function, a local variable $s$\
    \ is initialized with the value 1. The function then returns the result of calling\
    \ $c4$ with the same arguments and adding $s$ to it. The function $c4$ takes two\
    \ arguments $t$ and $a$ and returns the result of calling $c5$ twice with the\
    \ same arguments and summing the results. The function $c5$ takes two arguments\
    \ $t$ and $a$. It then iterates through the elements of array $a$, adding each\
    \ element to $t$. Then, it returns the modified value of $t$. The code concludes\
    \ by printing the value of $b$ to the console. The type of function calling demonstrated\
    \ in the code is often referred to as “function composition” or “function chaining,”\
    \ especially when functions are designed to be composed together in a sequence.\
    \ In our code, $c1$ calls $c2$, which calls $c3$, which calls $c4$, and $c4$ calls\
    \ $c5$. This creates a chain of function calls where each function in the chain\
    \ relies on the results of the previous one to calculate its own result. This\
    \ pattern is often used to break down complex operations into smaller, more manageable\
    \ pieces.\n\n## 8.2.8 Ex. (143) – Global variables and constants\n\n```python\n\
    a = 3.1415  # constant\n\nb = 11      # global variable\n\ndef compute():\n  \
    \  x = b\n    return x + x / x - x * x\n\nb = compute()\nprint(f\"{b}\\n{a}\"\
    )\n```\n\nThis code snippet demonstrates the use of constants, global variables,\
    \ a function definition, and function execution. It calculates a result based\
    \ on the value of the global variable $b$ and displays it along with the constant\
    \ $a$. Two declarations are made: A constant $a$ with the value 3.1415 and a global\
    \ variable $b$ with the value 11. The global variable $b$ is later updated with\
    \ the result of calling the *compute* function. The *compute* function takes the\
    \ current value of $b$, assigns it to a local variable $x$, and then performs\
    \ a series of mathematical operations on $x$, including addition, division, and\
    \ multiplication. The result of these operations is then returned and assigned\
    \ to $b$ outside of the *compute* function. Then, the *print* function is used\
    \ to display the value of $b$ followed by a newline character (“\\n”) and the\
    \ value of the constant $a$. Note that by convention, constants in Python are\
    \ written using uppercase. Here, in the example, the constant name is written\
    \ in lowercase letters to show that naming constants is really just a convention.\n\
    \n## 8.2.9 Ex. (144) – Pure and impure functions\n\n```python\ndef pure(x):\n\
    \    return x + x / x - x * x\n\ndef inpure(x):\n    global a\n    a = 11\n  \
    \  return x + x / x - x * x\n\na = 10\n\nb = pure(a)\nprint(str(b) + \" & \" +\
    \ str(a))\n\nc = inpure(a)\nprint(str(c) + \" & \" + str(a))\n\nd = inpure(a)\n\
    print(str(d) + \" & \" + str(a))\n```\n\nThe code illustrates the difference between\
    \ “pure” and “impure” functions. “Pure” functions only depend on their input and\
    \ do not modify any external state, while “impure” functions can modify external\
    \ variables or have side effects. First, a variable *a* is assigned the value\
    \ 10. Then, a variable *b* is assigned the result of calling the *pure* function\
    \ with the argument *a*. The *pure* function takes a single argument *x* and performs\
    \ a series of mathematical operations on it, including addition, division, and\
    \ multiplication. After that, the value of *b* is printed along with the original\
    \ value of *a*. Next, a variable *c* is assigned the result of calling the *inpure*\
    \ function with the argument *a*. The *inpure* function also takes a single argument\
    \ *x* but, in this case, it also modifies a global variable *a* by setting it\
    \ to 11 before performing the same mathematical operations as the *pure* function.\
    \ The value of *c* is printed along with the modified value of *a*. Next, a variable\
    \ *d* is assigned the result of calling the *inpure* function with the argument\
    \ *a* once more. Again, the *inpure* function modifies the global variable *a*\
    \ by setting it to 11 and performs the mathematical operations. The value of *d*\
    \ is printed along with the modified value of *a*.\n\n## 8.2.10 Ex. (145) – Procedures\
    \ vs Functions\n\n```python\na = 16\n\ndef f(x):\n    return x + x / x - x * x\n\
    \ndef p():\n    global b\n    x = a - 11\n    b = x + x / x - x * x\n\nb = f(a)\n\
    print(b)\n\np()\nprint(b)\n```\n\nIn this code, a distinction between procedures\
    \ and functions is shown. At the beginning of the code, a variable $a$ is assigned\
    \ the value 16. Then, a variable $b$ is assigned the result of calling the function\
    \ $f$ with the argument $a$, and the value of $b$ is printed to the output. The\
    \ $f$ function takes a single argument $x$ and performs a series of mathematical\
    \ operations on it, including addition, division, and multiplication. It returns\
    \ the result of these operations. Next, there is a procedure named $p$. Procedures\
    \ are similar to functions, but they do not return a value explicitly. Inside\
    \ the $p$ procedure, a new variable $x$ is declared and assigned the result of\
    \ subtracting 11 from the value of $a$. Then, $b$ is re-assigned the result of\
    \ a series of mathematical operations on $x$, including addition, division, and\
    \ multiplication. Next, the value of $b$ is printed to the output again, but this\
    \ time within the $p$ procedure. The key difference between functions and procedures\
    \ is that functions return values, while procedures do not, and in this code,\
    \ it is demonstrated how they can be used in different contexts.\n\n## 8.3 Recursion\n\
    \nFunction recursion is a powerful concept in the world of programming, including\
    \ Python. It allows a function to call itself in a repetitive and self-referential\
    \ manner, solving complex problems by breaking them down into smaller, more manageable\
    \ sub-problems. This technique is particularly useful when dealing with tasks\
    \ that exhibit a recursive structure, such as traversing tree-like data structures,\
    \ calculating factorials, and implementing various sorting algorithms [1]. Therefore,\
    \ Python provides a flexible environment for implementing recursive functions.\
    \ Elegant and/or efficient recursive solutions can be created for various computational\
    \ problems. Here, the principles of function recursion will be clearly explored\
    \ by fully understanding its benefits, and see how it works through practical\
    \ examples."
