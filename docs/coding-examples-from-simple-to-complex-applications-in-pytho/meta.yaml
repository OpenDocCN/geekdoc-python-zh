- md: "## Randomness and Programming\n\nRandomness plays a significant role in various\
    \ aspects of computer programming, and Python, as a versatile computer language,\
    \ offers powerful tools and techniques to incorporate randomness into software\
    \ applications [26]. Randomness refers to the concept of unpredictability and\
    \ uncertainty, essential for tasks like generating random numbers, shuffling data,\
    \ simulating random events, or creating games and simulations [26]. In Python,\
    \ developers can use this unpredictability via built-in functions and libraries\
    \ designed to handle randomization effectively [1]. However, this chapter will\
    \ make an introduction into the significance of randomness in computer programming,\
    \ its applications, and how Python empowers developers to implement applications,\
    \ enhancing the functionality and reliability of software.\n\n### 12.1.1 Ex. (215)\
    \ – Get complementary array by using random values\n\n```python\n# understand\
    \ randomness - get\n# complementary array by using\n# random values.\n\nimport\
    \ random\n\ndef mutate(a):\n    m = len(a)\n    n = 200\n    b = [0] * m\n\n \
    \   for i in range(n):\n        s = 0  # score.\n\n        for j in range(m):\n\
    \            b[j] = round(random.random())\n\n            # complementary array.\n\
    \            if b[j] != a[j]:\n                s += 1\n\n            # identic\
    \ array\n            # if b[j] == a[j]:\n            #     s += 1\n\n        if\
    \ s >= m:\n            return b\n\n    return \"not found by random means.\"\n\
    \na = [1, 0, 0, 1, 1, 1, 0]\nprint(mutate(a))\n```\n\nThe code from above aims\
    \ to demonstrate randomness and create a complementary array through random values.\
    \ It starts by defining two arrays, *a* and *b*, with some initial values. The\
    \ *mutate* function is defined to mutate the array *a* into a complementary array\
    \ *b* using random values. Inside the function, the code sets *m* as the length\
    \ of array *a* and variable *n* as value 200. It then initializes a variable *s*\
    \ (score) to keep track of how many elements in the *b* array differ from the\
    \ corresponding elements in the *a* array. It then enters a loop that runs *n*\
    \ times, attempting to create a complementary array. Within this loop, it resets\
    \ the score *s* to 0 for each iteration. Inside the nested loop, it generates\
    \ random values (0 or 1) using the *random* function (from the *random* library)\
    \ for each element of the *b* array. If the generated value is different from\
    \ the corresponding element in the array *a*, it increments the score *s*, indicating\
    \ a difference between the arrays. After generating a random *b* array, it checks\
    \ if the score *s* is greater than or equal to the length *m* of the array *a*.\
    \ If this condition is met, it returns the complementary array *b*. If the condition\
    \ is not met after *n* iterations, it returns the message “not found by random\
    \ means.” Outside the function, the source code prints the result of calling *mutate(a)*.\n\
    \n### 12.1.2 Ex. (216) – Take the first 20% of the closest solutions (mutation/selection)\n\
    \n```python\n# understand randomness,\n# take the first 20% of\n# the closest\
    \ solutions.\n\nimport random\n\na = [1, 0, 0, 1, 1, 1, 0]\nb = [0, 0, 0, 0, 0,\
    \ 0, 0]\n\n# Initialize c with a maximum\n# possible size based on n and m.\n\
    # The size of c will be reduced\n# Later to match the actual number\n# of elements.\n\
    \nn = 100\nm = len(a)\nc = [[None for _ in range(m + 1)] for _ in range(n)]\n\n\
    def mutate(c):\n    p = 20  # Select best X%.\n    q = round(m * (1-p / 100))\n\
    \    k = 0\n\n    for i in range(n):\n        s = 0\n\n        for j in range(m):\n\
    \            b[j] = round(random.random())\n            if b[j] == a[j]:\n   \
    \             s += 1\n            c[k][j] = b[j]\n\n        if s >= q:\n     \
    \       c[k][m] = s\n            k += 1\n\n    # Reduce the size of c to match\n\
    \    # the actual number of elements.\n\n    return c[:k]\n\ndef SMC(m):\n   \
    \ r = ''\n    for row in m:\n        r += ' '.join(str(x) for x in row) + \"\\\
    n\"\n    return r\n\nfit = mutate(c)\nprint(SMC(fit))\n```\n\nOutput:\n\n```\n\
    1 0 1 1 1 1 0 6\n0 0 0 1 1 1 0 6\n1 0 1 1 1 1 0 6\n0 0 0 1 1 1 0 6\n1 0 0 1 1\
    \ 1 1 6\n1 0 0 1 1 1 0 7\n1 1 0 1 1 1 0 6\n1 0 1 1 1 1 0 6\n1 1 0 0 0 1 0\n```\n\
    \nThis code aims to demonstrate a process of mutation and selection within an\
    \ algorithm. The code begins by defining two arrays, *a* and *b*, representing\
    \ binary sequences. Variable *a* contains a binary sequence [1,0,0,1,1,1,0], and\
    \ *b* is initialized as an array of zeros of the same length. An array *c* is\
    \ declared, which will be used to store mutated sequences. The *mutate(c)* function\
    \ is defined to perform mutation and selection. Inside this function a series\
    \ of events unfold. The length of array *a* is stored in the variable *m*, and\
    \ the value 100 is stored in *n*. Variable *k* is initialized to 0, and *p* is\
    \ set to 20, representing the percentage of best solutions to select. Variable\
    \ *q* is calculated as the number of elements to select, which is *m* multiplied\
    \ by (1 − *p*/100). Next, there is a loop that runs *n* times, where *n* is the\
    \ number of mutations to be performed, namely: Variable *s* is reset to 0, and\
    \ a sub-array is initialized in the *c* array at index *k*. Another loop iterates\
    \ through the elements of array *a* (length *m*). For each element, a random binary\
    \ value is generated and stored in the corresponding position of array *b*. If\
    \ the generated value matches the value in array *a* at the same position, *s*\
    \ is incremented, and the value is stored in the corresponding position in the\
    \ sub-array of *c*. If the value of *s* (number of matches with *a*) is greater\
    \ than or equal to *q*, the sub-array in *c* also stores the value of *s*, and\
    \ *k* is incremented. The *mutate(c)* function returns the mutated and selected\
    \ sequences stored in array *c*. Additionally, there is the *SMC(m)* function\
    \ that takes a matrix (*m*) as an argument and converts it into a human-readable\
    \ string format. It iterates through the rows and columns of the matrix, appending\
    \ each element followed by a space and adding a newline character after each row.\
    \ Then, the result *r* is returned. Thus, the code calls the *mutate(c)* function,\
    \ stores the result in the variable *fit*, and prints the result of converting\
    \ *fit* into a string format using the *SMC(fit)* function.\n\n### 12.1.3 Ex.\
    \ (217) – Find complementary matrix by using stochastic means\n\n```python\n#\
    \ Find complementary matrix\n# by using stochastic means\n# (uniform distribution).\n\
    \nimport random\n\ndef mutate(a):\n    n = len(a)\n    m = len(a[0])\n    q =\
    \ 200\n    s = 0  # score.\n\n    for k in range(q):\n        s = 0\n        b\
    \ = []\n\n        for i in range(n):\n            b.append([])\n\n           \
    \ for j in range(m):\n                b[i].append(round(random.random()))\n  \
    \              if b[i][j] != a[i][j]:\n                    s += 1\n\n        \
    \    if s >= m * n:\n                return b\n\n    return \"not found by random\
    \ means.\"\n\ndef smc(m):\n    if isinstance(m, str):\n        return m\n    r\
    \ = ''\n    for i in range(len(m)):\n        for j in range(len(m[i])):\n    \
    \        r += str(m[i][j]) + \" \"\n        r += \"\\n\"\n    return r\n\na =\
    \ [\n    [0, 0, 0],\n    [0, 1, 0],\n    [0, 0, 0],\n    ]\n\nprint(smc(mutate(a)))\n\
    ```\n\nOutput:\n\n```\n1 1 1\n1 0 1\n1 1 1\n```\n\nThis current example aims to\
    \ find a complementary matrix to a given matrix *a* using stochastic means (uniform\
    \ distribution). The code begins with the definition of matrix *a*, which is a\
    \ 3 × 3 matrix filled with numeric values, and an empty matrix *b*. Next, it calls\
    \ the *SMC* function and passes the result of the *mutate(a)* function as an argument\
    \ to print the matrix obtained after the mutation. The *mutate(a)* function is\
    \ defined to find a complementary matrix through a stochastic process. It takes\
    \ the matrix *a* as an input and performs the following steps: (i) It calculates\
    \ the dimensions of matrix *a* by getting the number of rows (*n*) and columns\
    \ (*m*). (ii) It sets a variable *q* to 200, which represents the number of attempts\
    \ to find a complementary matrix. (iii) It initializes variable *s* to 0, which\
    \ will be used to keep track of the score (the number of differences) between\
    \ the original matrix *a* and the mutated matrix *b*. (iv) It enters a loop that\
    \ runs for *q* iterations. In each iteration, it resets the score *s* to 0. Inside\
    \ the loop, it iterates through each element of the matrix *a* using nested for\
    \ loops. For each element, it generates a random number between 0 and 1 by using\
    \ the *random()* function (import *random*), then it rounds it to the nearest\
    \ integer using the *round()* function, and it assigns the result to the corresponding\
    \ element in matrix *b*. It also checks if the value in *b* differs from the value\
    \ in *a* and increments the score *s* if there is a difference. After completing\
    \ the iteration over all elements of the matrix, it checks if *s* is greater than\
    \ or equal to the total number of elements in the matrix (*m* × *n*). If this\
    \ condition is met, it returns the mutated matrix *b*, which is now complementary\
    \ to *a*. If the loop finishes all iterations and no complementary matrix is found,\
    \ it returns the string “not found by random means.” The *SMC* function is defined\
    \ to format matrix *m* as a string with rows separated by newline characters.\
    \ It iterates through the matrix and builds a string representation of the matrix.\
    \ In short, the code attempts to find a complementary matrix to the input matrix\
    \ *a* by randomly mutating its values and checking if the score of differences\
    \ reaches a certain threshold. If a complementary matrix is found, it is returned;\
    \ otherwise, a message of not found is shown."
  mdcn: "## 随机性与编程\n\n随机性在计算机编程的各个方面都扮演着重要角色，而Python作为一种通用的计算机语言，提供了强大的工具和技术，可以将随机性融入软件应用[26]。随机性指的是不可预测性和不确定性的概念，对于生成随机数、打乱数据、模拟随机事件或创建游戏和模拟等任务至关重要[26]。在Python中，开发者可以通过内置函数和专门设计用于有效处理随机化的库来利用这种不可预测性[1]。然而，本章将介绍随机性在计算机编程中的重要性、其应用，以及Python如何赋能开发者实现应用，从而增强软件的功能性和可靠性。\n\
    \n### 12.1.1 示例 (215) – 通过使用随机值获取互补数组\n\n```python\n# 理解随机性 - 通过使用\n# 随机值获取互补数组。\n\
    \nimport random\n\ndef mutate(a):\n    m = len(a)\n    n = 200\n    b = [0] *\
    \ m\n\n    for i in range(n):\n        s = 0  # 分数。\n\n        for j in range(m):\n\
    \            b[j] = round(random.random())\n\n            # 互补数组。\n          \
    \  if b[j] != a[j]:\n                s += 1\n\n            # 相同数组\n          \
    \  # if b[j] == a[j]:\n            #     s += 1\n\n        if s >= m:\n      \
    \      return b\n\n    return \"未通过随机方式找到。\"\n\na = [1, 0, 0, 1, 1, 1, 0]\nprint(mutate(a))\n\
    ```\n\n上述代码旨在演示随机性，并通过随机值创建一个互补数组。它首先定义了两个数组，*a* 和 *b*，并赋予了一些初始值。定义了 *mutate*\
    \ 函数，用于使用随机值将数组 *a* 变异为互补数组 *b*。在函数内部，代码将 *m* 设置为数组 *a* 的长度，变量 *n* 设置为值200。然后，它初始化一个变量\
    \ *s*（分数），用于跟踪数组 *b* 中有多少个元素与数组 *a* 中的对应元素不同。接着，它进入一个循环，运行 *n* 次，尝试创建一个互补数组。在这个循环中，每次迭代都将分数\
    \ *s* 重置为0。在嵌套循环内部，它使用 *random* 函数（来自 *random* 库）为数组 *b* 的每个元素生成随机值（0或1）。如果生成的值与数组\
    \ *a* 中的对应元素不同，则分数 *s* 递增，表示数组之间存在差异。在生成一个随机的 *b* 数组后，它检查分数 *s* 是否大于或等于数组 *a*\
    \ 的长度 *m*。如果满足此条件，则返回互补数组 *b*。如果在 *n* 次迭代后条件仍未满足，则返回消息“未通过随机方式找到。”在函数外部，源代码打印调用\
    \ *mutate(a)* 的结果。\n\n### 12.1.2 示例 (216) – 取最接近解的前20%（变异/选择）\n\n```python\n#\
    \ 理解随机性，\n# 取最接近解的前20%。\n\nimport random\n\na = [1, 0, 0, 1, 1, 1, 0]\nb = [0,\
    \ 0, 0, 0, 0, 0, 0]\n\n# 根据 n 和 m 初始化 c，\n# 其最大可能大小。\n# c 的大小稍后会减小\n# 以匹配实际的元素数量。\n\
    \nn = 100\nm = len(a)\nc = [[None for _ in range(m + 1)] for _ in range(n)]\n\n\
    def mutate(c):\n    p = 20  # 选择最佳的 X%。\n    q = round(m * (1-p / 100))\n    k\
    \ = 0\n\n    for i in range(n):\n        s = 0\n\n        for j in range(m):\n\
    \            b[j] = round(random.random())\n            if b[j] == a[j]:\n   \
    \             s += 1\n            c[k][j] = b[j]\n\n        if s >= q:\n     \
    \       c[k][m] = s\n            k += 1\n\n    # 减小 c 的大小以匹配\n    # 实际的元素数量。\n\
    \n    return c[:k]\n\ndef SMC(m):\n    r = ''\n    for row in m:\n        r +=\
    \ ' '.join(str(x) for x in row) + \"\\n\"\n    return r\n\nfit = mutate(c)\nprint(SMC(fit))\n\
    ```\n\n输出：\n\n```\n1 0 1 1 1 1 0 6\n0 0 0 1 1 1 0 6\n1 0 1 1 1 1 0 6\n0 0 0 1\
    \ 1 1 0 6\n1 0 0 1 1 1 1 6\n1 0 0 1 1 1 0 7\n1 1 0 1 1 1 0 6\n1 0 1 1 1 1 0 6\n\
    1 1 0 0 0 1 0\n```\n\n这段代码旨在演示算法中的变异和选择过程。代码首先定义了两个数组，*a* 和 *b*，代表二进制序列。变量 *a*\
    \ 包含一个二进制序列 [1,0,0,1,1,1,0]，*b* 被初始化为一个相同长度的全零数组。声明了一个数组 *c*，用于存储变异后的序列。定义了 *mutate(c)*\
    \ 函数来执行变异和选择。在这个函数内部，一系列事件展开。数组 *a* 的长度存储在变量 *m* 中，值100存储在 *n* 中。变量 *k* 初始化为0，*p*\
    \ 设置为20，代表要选择的最佳解的百分比。变量 *q* 计算为要选择的元素数量，即 *m* 乘以 (1 − *p*/100)。接下来，有一个循环运行 *n*\
    \ 次，*n* 是要执行的变异次数，即：变量 *s* 重置为0，并在 *c* 数组的索引 *k* 处初始化一个子数组。另一个循环遍历数组 *a* 的元素（长度为\
