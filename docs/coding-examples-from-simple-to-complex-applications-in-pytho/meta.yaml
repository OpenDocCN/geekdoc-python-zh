- md: '## Variables


    A variable can be conceptualized as a symbolic representation or an abstract entity
    that holds information [1]. This information can take various forms, from simple
    numerical values, strings of text, to more complex data structures. The central
    essence of a variable lies in its ability to change or vary, making it indispensable
    in algorithms and computational processes [1]. Variables are foundational to computer
    programming because they allow for the storage and manipulation of data. Each
    variable has an associated data type, which dictates the kind of information the
    variable can store. For instance, an integer data type variable can store whole
    numbers, whereas a floating-point data type might store numbers with decimal points.
    When a variable is declared in a computer program, a specific portion of the computer
    memory is allocated to store its value. This allocation ensures that when the
    value of the variable is called upon or modified, the program knows exactly where
    to look in memory. Each variable has a unique memory address, which acts like
    a reference point for any computational operation involving that variable. Variables
    also possess attributes such as scope (determining where in a program a variable
    can be accessed) and lifetime (indicating how long the variable remains in memory).
    The importance of these attributes becomes evident in more advanced programming
    tasks, such as managing memory or optimizing code for performance. In scientific
    computing, variables often represent physical quantities or abstract mathematical
    constructs. Their ability to change values dynamically allows for the simulation
    of real-world systems, from modeling the motion of celestial bodies to predicting
    weather patterns. Scientists can run multiple scenarios or simulations to analyze
    different outcomes and derive meaningful conclusions just by adjusting the values
    of these variables. Thus, variables serve as the backbone of computational algorithms
    and programs. Their dynamic nature, combined with the precise control they offer
    over data manipulation, makes them a cornerstone in the world of computer science
    and scientific computing. Thus, the examples shown below start from basic exercises
    that familiarize the reader with the notion of variables.


    ### 2.1.1 Ex. (1) – Commenting inside code


    ```python

    # this is a comment in Python

    """

    This is a multi-line

    comment in Python.

    It can span several lines.

    """

    ```


    Output:


    In Python, the hash “#” character is used to denote a single-line comment. Anything
    that follows the hash “#” on that same line is treated as a comment and will not
    be executed or interpreted as code by the Python engine. Instead, it is meant
    to provide context or explanations for developers reading the code. Also, multi-line
    comments or block comments are typically created using triple quotes, either triple
    single quotes ("''''") or triple double quotes ("""").


    ### 2.1.2 Ex. (2) – Naming variables


    ```python

    A = 1

    a = 2

    a1 = 3

    a_1 = 4


    print(A)

    print(a)

    print(a1)

    print(a_1)

    ```


    Output:

    1

    2

    3

    4


    This code initializes four variables with distinct names and values. The variable
    *A* is assigned the value 1, while the variable *a* is assigned the value 2. Similarly,
    *a1* is given the value 3, and *a_1* is assigned the value 4. Following these
    assignments, the values of these variables are printed out sequentially using
    the *print* function. First, the value of *A* is printed, followed by the values
    of *a*, *a1*, and finally *a_1*. It is worth noting that Python is case-sensitive,
    so the variable *A* is different from the variable *a*.


    ### 2.1.3 Ex. (3) – Write your first Python program


    ```python

    a = 3

    b = 5

    c = a + b

    print(c)

    ```


    The given Python code from above initializes a variable *a* with a value of 3
    and a variable *b* with a value of 5. It then calculates the sum of these two
    variables and assigns the result to a third variable named *c*. Next, the value
    of *c* is printed to the console or displayed using a function named *print*.
    The output of this code is 8.


    ### 2.1.4 Ex. (4) – The meaning of “a = b”


    ```python

    a = 3

    b = a

    print(b)

    ```


    This Python code begins by assigning the value 3 to the variable *a*. Following
    that, the value of *a* (which is 3) is assigned to another variable named *b*.
    Next, the *print(b)* statement outputs the value of *b*, which would display 3.
    Therefore, this source code points out the passing (reassignment) of values from
    one variable to another.


    ### 2.1.5 Ex. (5) – Assign and reassign with type change


    ```python

    # In Python, one simply assigns a

    # value to a variable to declare it.


    # Assigns a string ''text''

    # to variable a.

    a = ''text'';


    # a = 0; # For sport, one can

    # uncomment this line (a = 0;)

    # to reassign a to a numeric value.


    # Assigns a string ''text''

    # to variable b.

    b = ''text'';

    b = 0 # Reassigns b to a numeric value.

    ```


    In Python, there is no special keyword for declaring a variable, and the type
    of a variable is automatically determined by the value assigned to it. Thus, Python
    is dynamically typed, and the user can change the value and the type of a variable
    at any time. This nice feature is now present in many computer languages and is
    perhaps one of the most useful additions to modern computer programming because
    it allows software developers to focus on method rather than syntax. Therefore,
    unlike the old times, Python will not raise any errors when the user changes the
    type of a variable by simply assigning a new value of a different type.


    ### 2.1.6 Ex. (6) – Basic mathematical operations


    ```python

    a = 3

    b = 2

    c = a + b / 2 - a * b

    print(c)

    ```


    Output:

    -2


    The above Python code first assigns the value 3 to the variable *a* and the value
    2 to the variable *b*. Next, it performs a series of arithmetic operations using
    these two variables. Specifically, it divides *b* by 2, then adds the result to
    *a*, and from that sum, it subtracts the product of *a* multiplied by *b*. The
    final result of these calculations is assigned to the variable *c*. Lastly, the
    value of *c* is printed out to the console.


    ### 2.1.7 Ex. (7) – The meaning of *modulo* operator


    ```python

    a = 3

    a = a % 2

    print(a)

    ```


    Output:

    1


    The code starts by assigning the value 3 to the variable *a*. Next, it modifies
    the value of *a* by setting it to the remainder when a is divided by 2, which
    is done using the modulus (%) operator. The modulus operation determines the remainder
    of the division of *a* by 2. Thus, 3 divided by 2 gives a quotient of 1 and a
    remainder of 1. Therefore, after the modulus operation, the value of *a* becomes
    1. Next, it uses a *print(a)* statement to display the value of *a* to the console
    window.


    ### 2.1.8 Ex. (8) – The meaning of “a = a + 1”


    ```python

    a = 2

    a = a + 1

    print(a)

    ```


    Output:

    3


    The given Python code starts by assigning the value 2 to the variable *a*. It
    then increments the value of *a* by 1. Next, it prints the value of *a*, which
    would now be 3. Therefore, the output shows the value 3 in the console window.


    ### 2.1.9 Ex. (9) – The aggregate assignment


    ```python

    a = 2

    a += 1

    print(a)

    ```


    Output:

    3


    The given Python code first assigns the value 2 to the variable *a*. Then, it
    increments the value of *a* by 1 using the “+=” operator, which is shorthand for
    *a = a + 1*. After these operations, the value of *a* becomes 3. Next, the code
    prints the value of *a* to the console window by using the *print(a)* statement.


    ### 2.1.10 Ex. (10) – The plus operator


    ```python

    a = 2;

    a = a + a;

    print(a);

    ```


    Output:

    4


    The given Python code first assigns the value 2 to the variable *a*. Then, it
    increases the value of *a* by *a* using the “+” operator. Namely, the future value
    of *a* is the current value of *a* plus the current value of *a*, which is shorthand
    for *a = a + a*. After these operations, the value of *a* becomes 4. Next, it
    prints *a* using the *print(a)* statement.'
  mdcn: '## 变量


    变量可以被概念化为一个符号表示或抽象实体，它承载着信息[1]。这些信息可以采取多种形式，从简单的数值、文本字符串到更复杂的数据结构。变量的核心本质在于其能够改变或变化的能力，这使得它在算法和计算过程中不可或缺[1]。变量是计算机编程的基础，因为它们允许存储和操作数据。每个变量都有一个关联的数据类型，它规定了变量可以存储的信息种类。例如，整数数据类型的变量可以存储整数，而浮点数据类型则可能存储带小数点的数字。当在计算机程序中声明一个变量时，会分配特定的计算机内存部分来存储其值。这种分配确保了当变量的值被调用或修改时，程序确切地知道在内存中何处查找。每个变量都有一个唯一的内存地址，它就像涉及该变量的任何计算操作的参考点。变量还具有诸如作用域（决定变量在程序中的可访问位置）和生命周期（指示变量在内存中保留多长时间）等属性。这些属性的重要性在更高级的编程任务中变得显而易见，例如管理内存或优化代码性能。在科学计算中，变量通常代表物理量或抽象的数学构造。它们动态改变值的能力允许对现实世界系统进行模拟，从建模天体运动到预测天气模式。科学家只需调整这些变量的值，就可以运行多个场景或模拟来分析不同的结果并得出有意义的结论。因此，变量是计算算法和程序的支柱。它们的动态特性，结合它们对数据操作提供的精确控制，使它们成为计算机科学和科学计算领域的基石。因此，下面的示例从让读者熟悉变量概念的基本练习开始。


    ### 2.1.1 练习 (1) – 在代码中添加注释


    ```python

    # this is a comment in Python

    """

    This is a multi-line

    comment in Python.

    It can span several lines.

    """

    ```


    输出：


    在 Python 中，井号“#”字符用于表示单行注释。在同一行中井号“#”之后的所有内容都被视为注释，不会被 Python 引擎执行或解释为代码。相反，它旨在为阅读代码的开发人员提供上下文或解释。此外，多行注释或块注释通常使用三引号创建，可以是三单引号（`''''''`）或三双引号（`"""`）。


    ### 2.1.2 练习 (2) – 变量命名


    ```python

    A = 1

    a = 2

    a1 = 3

    a_1 = 4


    print(A)

    print(a)

    print(a1)

    print(a_1)

    ```


    输出：

    1

    2

    3

    4


    这段代码初始化了四个具有不同名称和值的变量。变量 *A* 被赋值为 1，而变量 *a* 被赋值为 2。类似地，*a1* 被赋值为 3，*a_1* 被赋值为
    4。在这些赋值之后，使用 *print* 函数按顺序打印出这些变量的值。首先打印 *A* 的值，然后是 *a*、*a1*，最后是 *a_1*。值得注意的是，Python
    区分大小写，因此变量 *A* 与变量 *a* 是不同的。


    ### 2.1.3 练习 (3) – 编写你的第一个 Python 程序


    ```python

    a = 3

    b = 5

    c = a + b

    print(c)

    ```


    上面的 Python 代码将变量 *a* 初始化为值 3，将变量 *b* 初始化为值 5。然后，它计算这两个变量的和，并将结果赋给第三个名为 *c* 的变量。接下来，使用名为
    *print* 的函数将 *c* 的值打印到控制台或显示出来。这段代码的输出是 8。


    ### 2.1.4 练习 (4) – “a = b” 的含义


    ```python

    a = 3

    b = a

    print(b)

    ```


    这段 Python 代码首先将值 3 赋给变量 *a*。随后，将 *a* 的值（即 3）赋给另一个名为 *b* 的变量。接下来，*print(b)* 语句输出
    *b* 的值，将显示 3。因此，这段源代码指出了值从一个变量传递（重新赋值）到另一个变量的过程。


    ### 2.1.5 练习 (5) – 赋值和类型改变的重新赋值


    ```python

    # In Python, one simply assigns a

    # value to a variable to declare it.


    # Assigns a string ''text''

    # to variable a.

    a = ''text'';


    # a = 0; # For sport, one can

    # uncomment this line (a = 0;)

    # to reassign a to a numeric value.


    # Assigns a string ''text''

    # to variable b.

    b = ''text'';

    b = 0 # Reassigns b to a numeric value.

    ```


    在 Python 中，没有用于声明变量的特殊关键字，变量的类型由赋给它的值自动确定。因此，Python 是动态类型的，用户可以随时更改变量的值和类型。这个很好的特性现在存在于许多计算机语言中，也许是现代计算机编程中最有用的补充之一，因为它允许软件开发人员专注于方法而不是语法。因此，与过去不同，当用户通过简单地赋一个不同类型的值来改变变量的类型时，Python
    不会引发任何错误。


    ### 2.1.6 练习 (6) – 基本数学运算


    ```python

    a = 3

    b = 2

    c = a + b / 2 - a * b

    print(c)

    ```


    输出：

    -2


    上面的 Python 代码首先将值 3 赋给变量 *a*，将值 2 赋给变量 *b*。接下来，它使用这两个变量执行一系列算术运算。具体来说，它将 *b* 除以
    2，然后将结果加到 *a* 上，并从该和中减去 *a* 乘以 *b* 的乘积。这些计算的最终结果被赋给变量 *c*。最后，将 *c* 的值打印到控制台。


    ### 2.1.7 练习 (7) – *取模* 运算符的含义


    ```python

    a = 3

    a = a % 2

    print(a)

    ```


    输出：

    1


    代码首先将值 3 赋给变量 *a*。接下来，它通过将 *a* 设置为 *a* 除以 2 的余数来修改 *a* 的值，这是使用取模（%）运算符完成的。取模运算确定
    *a* 除以 2 的余数。因此，3 除以 2 得到商 1 和余数 1。因此，在取模运算之后，*a* 的值变为 1。接下来，它使用 *print(a)* 语句将
    *a* 的值显示到控制台窗口。


    ### 2.1.8 练习 (8) – “a = a + 1” 的含义


    ```python

    a = 2

    a = a + 1

    print(a)

    ```


    输出：

    3


    给定的 Python 代码首先将值 2 赋给变量 *a*。然后，它将 *a* 的值增加 1。接下来，它打印 *a* 的值，此时将是 3。因此，输出在控制台窗口中显示值
    3。


    ### 2.1.9 练习 (9) – 复合赋值


    ```python

    a = 2

    a += 1

    print(a)

    ```


    输出：

    3


    给定的 Python 代码首先将值 2 赋给变量 *a*。然后，它使用“+=”运算符将 *a* 的值增加 1，这是 *a = a + 1* 的简写。执行这些操作后，*a*
    的值变为 3。接下来，代码通过使用 *print(a)* 语句将 *a* 的值打印到控制台窗口。


    ### 2.1.10 练习 (10) – 加法运算符


    ```python

    a = 2;

    a = a + a;

    print(a);

    ```


    输出：

    4


    给定的 Python 代码首先将值 2 赋给变量 *a*。然后，它使用“+”运算符将 *a* 的值增加 *a*。也就是说，*a* 的未来值是 *a* 的当前值加上
    *a* 的当前值，这是 *a = a + a* 的简写。执行这些操作后，*a* 的值变为 4。接下来，它使用 *print(a)* 语句打印 *a*。'
