    \ 的最终值被取反，使其变为负数。接下来，*b* 的值被显示到控制台。请注意，使用函数自身的返回值重复调用该函数通常被称为“函数组合”或“函数链式调用”。在我们的代码中，函数\
    \ *c* 使用其自身的返回值被多次调用，这有效地将函数调用链接在一起。在某些场景下，这是一种有用的技术，可以以简洁且可读的方式对一个值应用一系列操作或转换。\n\
    \n## 8.2.7 示例 (142) – 函数组合\n\n```python\na = [1, 2, 3, 4, 5]\nt = 0\n\ndef c1(t,\
