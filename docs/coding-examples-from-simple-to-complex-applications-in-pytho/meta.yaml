    \ * x\n\nb = compute()\nprint(f\"{b}\\n{a}\")\n```\n\n这段代码片段演示了常量、全局变量、函数定义和函数执行的使用。它根据全局变量\
    \ $b$ 的值计算一个结果，并将其与常量 $a$ 一起显示。进行了两个声明：一个值为 3.1415 的常量 $a$ 和一个值为 11 的全局变量 $b$。全局变量\
    \ $b$ 后来被更新为调用 *compute* 函数的结果。*compute* 函数接受 $b$ 的当前值，将其赋给一个局部变量 $x$，然后对 $x$\
    \ 执行一系列数学运算，包括加法、除法和乘法。这些运算的结果随后被返回，并赋给 *compute* 函数外部的 $b$。然后，使用 *print* 函数显示\
    \ $b$ 的值，后跟一个换行符（“\\n”）和常量 $a$ 的值。请注意，按照惯例，Python 中的常量使用大写字母编写。在此示例中，常量名称使用小写字母编写，以表明命名常量实际上只是一种约定。\n\
    \n## 8.2.9 示例 (144) – 纯函数与非纯函数\n\n```python\ndef pure(x):\n    return x + x /\
    \ x - x * x\n\ndef inpure(x):\n    global a\n    a = 11\n    return x + x / x\
    \ - x * x\n\na = 10\n\nb = pure(a)\nprint(str(b) + \" & \" + str(a))\n\nc = inpure(a)\n\
    print(str(c) + \" & \" + str(a))\n\nd = inpure(a)\nprint(str(d) + \" & \" + str(a))\n\
    ```\n\n这段代码说明了“纯”函数和“非纯”函数之间的区别。“纯”函数仅依赖于它们的输入，不修改任何外部状态，而非纯函数可以修改外部变量或产生副作用。首先，变量\
    \ *a* 被赋值为 10。然后，变量 *b* 被赋值为使用参数 *a* 调用 *pure* 函数的结果。*pure* 函数接受单个参数 *x*，并对其执行一系列数学运算，包括加法、除法和乘法。之后，*b*\
    \ 的值与 *a* 的原始值一起被打印出来。接下来，变量 *c* 被赋值为使用参数 *a* 调用 *inpure* 函数的结果。*inpure* 函数也接受单个参数\
    \ *x*，但在这种情况下，它在执行与 *pure* 函数相同的数学运算之前，还通过将全局变量 *a* 设置为 11 来修改它。*c* 的值与修改后的 *a*\
    \ 值一起被打印出来。接下来，变量 *d* 被赋值为再次使用参数 *a* 调用 *inpure* 函数的结果。同样，*inpure* 函数通过将全局变量 *a*\
    \ 设置为 11 来修改它，并执行数学运算。*d* 的值与修改后的 *a* 值一起被打印出来。\n\n## 8.2.10 示例 (145) – 过程与函数\n\
    \n```python\na = 16\n\ndef f(x):\n    return x + x / x - x * x\n\ndef p():\n \
    \   global b\n    x = a - 11\n    b = x + x / x - x * x\n\nb = f(a)\nprint(b)\n\
    \np()\nprint(b)\n```\n\n在这段代码中，展示了过程和函数之间的区别。在代码开头，变量 $a$ 被赋值为 16。然后，变量 $b$ 被赋值为使用参数\
    \ $a$ 调用函数 $f$ 的结果，并且 $b$ 的值被打印到输出。$f$ 函数接受单个参数 $x$，并对其执行一系列数学运算，包括加法、除法和乘法。它返回这些运算的结果。接下来，有一个名为\
    \ $p$ 的过程。过程类似于函数，但它们不显式返回值。在 $p$ 过程内部，声明了一个新变量 $x$，并将其赋值为 $a$ 的值减去 11 的结果。然后，$b$\
    \ 被重新赋值为对 $x$ 执行一系列数学运算（包括加法、除法和乘法）的结果。接下来，$b$ 的值再次被打印到输出，但这次是在 $p$ 过程内部。函数和过程的关键区别在于函数返回值，而过程不返回值，这段代码展示了它们如何在不同的上下文中使用。\n\
    \n## 8.3 递归\n\n函数递归是编程世界（包括 Python）中的一个强大概念。它允许一个函数以重复和自引用的方式调用自身，通过将复杂问题分解为更小、更易于管理的子问题来解决它们。当处理具有递归结构的任务时，这种技术特别有用，例如遍历树状数据结构、计算阶乘以及实现各种排序算法\
    \ [1]。因此，Python 为实现递归函数提供了灵活的环境。可以为各种计算问题创建优雅和/或高效的递归解决方案。这里，将通过充分理解其益处来清晰地探讨函数递归的原理，并通过实际示例了解其工作原理。"
