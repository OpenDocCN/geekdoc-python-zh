    \ For 循环，通常在迭代次数预先已知时使用。该循环包含一个初始化器、一个条件和一个迭代器。它从初始化开始，检查条件，执行后，迭代器修改循环变量，从而进行下一次迭代或退出。(b)\
    \ While 循环，主要用于迭代次数未预先确定的情况，while 循环在每次迭代前检查条件。如果条件评估为真，则执行循环体。循环内的每次迭代通常被称为一个“周期”。在每个周期中，计算指令会被重新评估，通常使用改变的变量，从而在每次迭代中产生不同的结果。确保循环有一个明确的终止点或一个将被满足的条件至关重要，以防止无限循环，这可能导致系统挂起或过度消耗计算资源。循环是计算机编程中的基础构造，它们通过基于条件的重复执行来利用计算能力。这里展示了一些基本示例，以便读者熟悉这些结构。\n\
    \n## 4.1.1 示例 (22) – While 循环\n\n```python\ni = 0\n\nwhile i < 5:\n    print(\"\
