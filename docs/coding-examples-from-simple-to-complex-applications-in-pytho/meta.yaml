    to create dynamic and interactive applications, either on desktops, tablets, phones
    or on the server side [1, 17]. Python is often referred to as an object-oriented
    language because it revolves around objects. Objects in Python are data structures
    that group together related properties and methods. These objects can represent
    real-world entities, abstract concepts, or any structured data. Objects consist
    of key-value pairs, where each key (or property) has an associated value [1].
    Constructors in Python are essentially blueprints for creating objects [1]. They
    define the structure and properties of objects that will be created based on that
    constructor [1]. Functions that serve as constructors are typically named with
    an initial capital letter. Once an object is created from a constructor, one can
    add methods to it. Methods are functions attached to an object, and they allow
    programmers to perform actions related to that object [1]. This interesting combination
    of constructors and methods enables the creation of reusable and organized code,
    promoting the principles of encapsulation and code modularity. Another important
    aspect regarding objects is JSON (JavaScript Object Notation). JSON is a lightweight
    and text-based data interchange format that plays a crucial role in web development.
    It is not exclusive to JavaScript but is widely used for data storage, configuration,
    and data exchange between a server and a client. JSON is a human-readable and
    easy-to-parse format that closely resembles Python objects. It consists of key-value
    pairs, arrays, and primitive data types. The JSON simplicity and compatibility
    with various computer languages have made it the de facto choice for transmitting
    data over the internet. In Python, JSON can be easily converted to Python objects,
    and vice versa, using built-in functions, making it an essential tool for web
    developers when working with external data sources or APIs. This chapter presents
    some examples related to concepts of Python objects, constructors, methods, and
    JSON.'
