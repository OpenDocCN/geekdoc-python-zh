    (*s0* and *s1*), and three strings (*AA*, *AM*, and *AB*) to store the aligned
    sequences and matching characters. Note that *AA* means alignment of sequence
    A, *AM* means the alignment of sequence in the middle (the connection vertical
    lines between the characters of A and B), and *AB* means alignment of sequence
    B. Additionally, the code initializes an empty string *e* for placeholder characters,
    and two empty arrays *m* and *s* for matrices used in the alignment calculations.
    It also sets variables *MMax* and *MMin* to store the maximum and minimum values
    in the alignment matrix, and initializes *x* and *y* to track their positions.
