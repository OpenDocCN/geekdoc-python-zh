    \n该代码将一个名为 *i* 的变量初始化为 0。然后，开始一个 while 循环，只要条件 *i < 5* 成立，它就会持续执行其循环体。在循环内部，调用了一个\
    \ *print* 函数，以“i = [i 的值]”的格式显示 *i* 的当前值。打印值之后，使用 *i += 1* 语句将 *i* 的值增加 1。因此，循环将打印出从\
    \ 0 到 4 的 *i* 值。一旦 *i* 达到 5，条件 *i < 5* 将不再为真，循环将终止。\n\n## 4.1.2 示例 (23) – Do while\n\
    \n```python\ni = 0\n\nwhile True:\n    print(\"i = \" + str(i))\n    i += 1\n\
