- md: "## 8.2.6 Ex. (141) – Function chaining - nested function calls\n\n```python\n\
    def c(x):\n    return x + x / x - x * x\n\na = 3\nb = c(c(c(c(a))))\nb = -b\n\n\
    print(b)\n```\n\nIn this snippet, we have a series of operations and a function\
