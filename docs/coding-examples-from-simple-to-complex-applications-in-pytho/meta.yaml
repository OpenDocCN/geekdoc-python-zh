  - '[PAGE 237]


    the request was successful, and the website content was retrieved without any
    issues. In this case, the script prints the HTML content of the website, accessed
    via *response.text*. If the status code is not 200, it suggests that there was
    an issue with fetching the webpage, such as the website being unreachable or the
    URL being incorrect. In this situation, the script outputs “Failed to retrieve
    the webpage” to indicate that it could not successfully fetch the HTML content.
    Thus, this first script is a basic example of web scraping or fetching website
    data. In the second version, the provided Python script demonstrates how to send
    a GET request with query parameters to a server using the same *requests* library.
    As before, the script imports the *requests* library, which is essential for making
    HTTP requests. The *url* variable is then defined with the desired endpoint, in
    this case, “https://springer.com/api”. To include query parameters in the GET
    request, a dictionary named *params* is created. This dictionary contains key-value
    pairs corresponding to the parameters and their values that must be send to the
    server. For example, *params* = {‘param1’: ‘value1’, ‘param2’: ‘value2’} defines
    two parameters: “param1” with the value “value1”, and “param2” with the value
    “value2”. The actual GET request is made with the line response = *requests.get(url,
    params = params)*. Here, the *requests.get* function is called with the URL and
    the params dictionary. Next, the *requests* library takes care of properly encoding
    the parameters and appending them to the URL. After sending the request, the script
    checks if it was successful by examining *response.status_code*. A status code
    of 200 indicates success. If the request is successful, *response.text* is printed,
    which contains the response data from the server. In case of a failure, indicated
    by any status code other than 200, the script prints a failure message along with
    the received status code. This approach is particularly useful for interacting
    with APIs or web services where specific data needs to be retrieved based on given
    parameters, ensuring that the request is both flexible and dynamically constructed
    based on the parameters defined in the params dictionary.'
