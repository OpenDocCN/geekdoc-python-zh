    \ 11, 6330 Cham, Switzerland\n\n本产品中的纸张可回收利用。\n\n## 前言\n\n保罗·奥雷利安·加尼乌克所著的《从简单到复杂的编程示例——Python™\
    \ 应用》一书，是一本非常实用的 Python 编程入门指南，吸引的读者范围广泛，从初涉编程宇宙的初学者到经验丰富的开发者，他们都能从中获得非常丰富的代码示例参考。由于这是本书的主要特点——通过示例进行教学，全书包含超过\
    \ 200 个示例，每一章都通过练习来阐释关键概念，这些练习都经过了实现、注释和极其详细的解释。\n\n所选用的语言是 Python，它很可能是当今最受欢迎的编程语言之一。虽然大多数教学机构使用\
    \ Python 语言来介绍编程语言，但读者将从本书丰富的示例中受益，同时也能接触到更高级的编程技术。\n\n本书结构经过深思熟虑，从变量声明、表达式、控制语句、列表（数组）和函数等传统起点开始，然后继续讲解对象和高级技术。作者专注于命令式编程技术，这更适合初学者，同时也在相应的章节中处理了函数式编程和面向对象编程。示例以逻辑顺序支持各章节，其中一个优点是在展示优化方案之前先展示简化方案，这有助于更深入地理解问题。\n\
    \n本书继续讲解中等难度示例部分，其中展示了更多现实世界的用法，涵盖的主题包括字符串操作、更高级的矩阵运算、排序算法、位运算和编码以及统计学。由于示例仅使用标准库实现，不使用其他库，因此具有很高的教学价值，有助于从业者真正理解概念的内部工作原理。\n\
    \n本书对更高级的开发者或不同领域的研究人员具有吸引力的部分在于复杂示例部分，涵盖了新颖的、最先进的算法，如谱森林或马尔可夫链的复杂应用，作者在该领域是著名的专家。\n\
    \n安德烈·瓦西拉泰亚努\n朋友兼副院长\n外语工程学院\n布加勒斯特国立理工大学\n罗马尼亚布加勒斯特\n\n## 序言\n\nPython 因其简洁性、可读性和多功能性而备受推崇，使其成为服务器端（后端）Web\
    \ 开发、数据分析、人工智能和科学计算的热门选择。本书提供了 Python™ 的全面指南，从基础概念到高级编程技术进行了探索。本作品旨在为从初学者到经验丰富的开发者和科学家的读者提供服务，旨在让他们全面了解\
    \ Python 的能力。\n\n## 本书主要特点\n\n**实践学习。** 本书包含超过 200 个实用示例，以加强对 Python 概念和计算机编程原理的理解。\n\
    \n**全面覆盖。** 本书还涵盖了 Python 基础知识，如变量、条件语句、循环、列表、函数和 JSON 处理，为初学者奠定了坚实的基础。\n\n**高级技术。**\
    \ 读者将探索高级主题，如矩阵运算、递归、面向对象编程等，以提升他们的编程技能。\n\n**实际应用。** 本书展示了 Python 的实际应用，包括数据操作、图形界面和文件操作，展示了\
    \ Python 如何应用于各种场景。\n\n**数学实现。** 本书指导如何在 Python 代码中实现数学公式和概念，对科学计算大有裨益。\n\n这本对\
    \ Python 的全面探索适用于广泛的学习者和专业人士。它系统地展开了 Python 编程，展示了其在软件工程领域的系统性和严谨性。通过本书的学习之旅，将提高读者在\
    \ Python 方面的熟练程度，使他们能够在各种项目和应用中有效地利用该语言。本书是系列丛书的一部分，旨在尽可能地镜像这些示例及其解释。因此，这些示例也可以在其他计算机语言中找到。\n\
