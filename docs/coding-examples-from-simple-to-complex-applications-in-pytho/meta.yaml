    \ 2、[0, 1, 2] 和 5。此函数计算斐波那契数列，从初始值 [0, 1, 2] 开始，并生成长度为 5 的序列。*fibonacci* 函数接受三个参数：*n*、*m*\
    \ 和 *t*。它递增 *n*，并通过将序列中的前两个值相加来更新 *m* 数组中的下一个值。它递归执行此操作，直到 *n* 大于或等于 *t*，此时返回包含斐波那契数列的\
    \ *m* 数组。接下来，*print* 函数显示存储在 *e* 变量中的斐波那契数列，前面是字符串 “Fibonacci:\\n[“，后面是 “]”。\n\
    \n## 8.3.7 示例 (152) – 递归计算数组所有元素之和\n\n```python\ndef sum_array(n, q, r):\n   \
