    \ 增加 1。只要 i 小于 5，循环就会继续执行。因此，数字 0 到 4 将依次传递给 print 函数。\n\n## 4.1.4 示例 (25) – 通过从上限减去来倒序\n\
    \n```python\nfor i in range(5):\n    print(5 - i)\n```\n\n输出：\n5 4 3 2 1\n\n给定的代码使用一个循环，其中变量\
    \ i 设置为 0。只要 i 的值小于 5，循环就会继续运行。在循环的每次迭代中，i 的值增加 1。在循环内部，有一个对 print() 的函数调用，它接受表达式\
    \ 5-i 作为其参数。这意味着对于循环的每次迭代，该函数将打印一个从 5（当 i 为 0 时）开始，并在每次后续迭代中递减 1 的值。因此，打印的数字序列将是\
