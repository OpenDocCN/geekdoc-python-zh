  md: '# Dynamically Resizable Arrays (Lists)


    Data structures are pivotal constructs that enable the systematic organization
    and management of data [1]. One of the quintessential and most universally utilized
    data structures is the array. A *dynamically resizable array* or a *list*, can
    be aptly described as a collection of items. Its salient feature is the direct
    access it offers to any indexed element, granting it significant computational
    advantages in specific scenarios. Characteristics of **classical arrays** in C++
    or Java and so on, encompass homogeneity, implying that all elements within an
    array are of the same data type, ensuring uniform memory footprint. In these classical
    computer languages, arrays are static in nature, unlike dynamic data structures
    found in Python and other modern languages. Each element in the array is associated
    with a unique index, facilitating swift access to any element with known index.
    Arrays find applications in various domains within computer science. They are
    fundamental in sorting algorithms like *QuickSort* and *MergeSort*, often employed
    for their direct access capabilities. Arrays also serve as foundational elements
    for complex data structures such as *heaps*, *hash tables*, and *dynamically resizable
    arrays*. Advantages of arrays include their speed in retrieval operations and
    efficient memory allocation due to contiguous storage. However, they have limitations,
    notably their fixed size and the relatively costly nature of insertion and deletion
    operations, particularly for elements in the middle of the array. However, from
    here on **we will refer to the list as an array**, since their behavior is basically
    the same. In other words, lists can hold different types of data and their length
    can be changed, while classic arrays have a fixed length and contain only one
    type of data, but, the rest is the same, from indexing to syntax. Note: In my
    view the name *list* is improper as it leads the mind to a 1-dimensional sequence.
    Also, to call these data structures *lists* instead of *arrays* is bordering lack
    of respect for the previous generations of'
