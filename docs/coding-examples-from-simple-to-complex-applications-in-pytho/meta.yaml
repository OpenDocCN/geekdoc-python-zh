    \ to the console. Note that repeated calling of a function with its own result\
    \ is often referred to as “function composition” or “function chaining.” In our\
    \ code, the function *c* is called multiple times with its own result, which effectively\
    \ chains the function calls together. This can be a useful technique in some scenarios\
    \ to apply a series of operations or transformations to a value in a concise and\
    \ readable manner.\n\n## 8.2.7 Ex. (142) – Function composition\n\n```python\n\
