    \ $a$。因此，代码使用数组 $a$ 调用 $bs(a)$ 函数，并将结果排序后的数组打印到控制台供用户检查。\n\n## 10.6 排列\n\n排列是数学和组合学中的一个基本概念。它们是众多现实世界问题的核心，对于理解各种对象集合中存在的排列、顺序和可能性至关重要。排列是指对象或元素按特定顺序的排列。它表示一组项目在不重复的情况下可以重新排列的所有可能方式。排列的研究涵盖了广泛的应用，从密码学和数据分析到博弈论以及其他相关领域。\n\
    \n```\na = []\n\ndef permute(s, r, l):\n    if l == r:\n        a.append(s)\n\
