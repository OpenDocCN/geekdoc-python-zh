    \ *q*。然后，将调用 *sum_array* 函数的结果赋值给变量 *f*，参数为三个：数组 *q* 的长度减 1、数组 *q* 本身以及初始值 0。*sum_array*\
    \ 函数的目的是递归地对数组元素求和。*sum_array* 函数接受三个参数：*n* 表示当前索引，*q* 是数组，*r* 是累加和。然后，它将当前索引处的元素添加到累加和中。如果索引\
    \ *n* 小于或等于 0，则函数返回累加和 *r*。否则，它使用递减的索引和更新后的累加和递归调用自身。接下来，代码向控制台打印一条消息，其中包含数组 *q*\
    \ 的总和，该总和是使用 *sum_array* 函数计算的。\n\n# 对象\n\nPython 是一种用途广泛且广受欢迎的计算机语言，它使开发人员能够在桌面、平板电脑、手机或服务器端创建动态和交互式应用程序\
    \ [1, 17]。Python 通常被称为面向对象的语言，因为它围绕对象展开。Python 中的对象是将相关属性和方法组合在一起的数据结构。这些对象可以表示现实世界的实体、抽象概念或任何结构化数据。对象由键值对组成，其中每个键（或属性）都有一个关联的值\
