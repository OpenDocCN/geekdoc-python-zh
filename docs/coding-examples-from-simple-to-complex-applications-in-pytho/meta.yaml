  mdcn: "## 9.1 构造函数与方法\n\n构造函数和方法是Python中的基本概念，在定义和操作对象方面起着至关重要的作用，而对象是Python程序的构建模块。Python中的构造函数是用于创建和初始化对象的函数。它们作为对象创建的蓝图，允许定义对象的结构和属性[1]。当程序员使用构造函数实例化一个对象时，程序员本质上是创建了一个具有自己属性和方法集的新实例。构造函数是Python面向对象编程的基本组成部分。另一方面，方法是在对象内部定义的函数。这些函数提供了一种封装和执行与对象相关的操作或动作的方式。方法对于在Python应用程序中建模对象的行为至关重要。它们可用于修改对象属性、与其他对象交互或执行特定任务。\n\
    \n```python\nclass Obj:\n    def __init__(self, a, b, c, d):\n        self.ax\
    \ = list(a)\n        self.bx = len(self.ax)\n        self.cx = c - b\n       \
    \ self.dx = d * c\n\no1 = Obj(\"some\", 66, 50, 77)\no2 = Obj(\"text\", 85, 48,\
    \ 77)\n\nprint(o1.ax, \"|\", o2.ax)\nprint(o1.bx, \"|\", o2.bx)\nprint(o1.cx,\
    \ \"|\", o2.cx)\nprint(o1.dx, \"|\", o2.dx)\n\no1.bx = 100\n\nprint(o1.bx, \"\
    |\", o2.bx)\n```\n\n输出：\ns,o,m,e | t,e,x,t\n4 | 4\n-16 | -37\n3850 | 3696\n100\
    \ | 4\n\n上述实现展示了Python中的面向对象编程，包括对象的创建、属性赋值和属性值修改。*Obj*函数是一个构造函数，接受四个参数*a*、*b*、*c*和*d*。在函数内部，*self.ax*被赋值为将字符串*a*拆分为字符数组的结果，而*self.bx*被赋值为数组*self.ax*的长度。同时，*self.cx*被赋值为*c*减去*b*的结果，*self.dx*被赋值为*d*乘以*c*的结果。一旦定义了构造函数，就使用*Obj*构造函数和不同的参数值创建了两个对象（*o1*和*o2*）。然后，使用*print*函数通过一些字符串连接来显示这些对象的各种属性。*o1*和*o2*的属性并排打印以进行比较。接着，*o1*的*bx*属性值被修改为100，其新值与未更改的*o2*的*bx*值一起打印。\n\
    \n```python\n# 此示例创建一个具有三个属性的对象。\n# cx属性是一个方法。\n\nclass Obj:\n    def __init__(self):\n\
    \        self.ax = \"this\"\n        self.bx = \"text\"\n\n    def cx(self):\n\
    \        return self.ax + \" \" + self.bx\n\n# 创建Obj类的一个实例并调用cx方法。\n\nobj = Obj()\n\
    print(obj.cx())\n```\n\n在此代码片段中，定义了一个对象。这个名为*obj*的对象有三个属性。第一个属性*ax*被赋值为字符串值“this”。第二个属性*bx*被赋值为字符串值“text”。第三个属性*cx*很独特，因为它被赋值为一个函数。这个函数代表了本示例的新颖之处，它不接受除*self*之外的任何参数。在此函数内部，有一个return语句，它使用this关键字（指代当前对象）将*obj*的*ax*和*bx*属性的值连接起来。结果是一个由空格分隔的*ax*和*bx*值组合而成的字符串。一旦对象及其属性被完全定义，代码随后使用*obj.cx()*语法调用*obj*对象的*cx*方法。此方法调用将返回连接后的字符串“this\
    \ text”。\n\n## 9.1.3 示例 (155) – 具有三个属性和一个方法的对象 (II)\n\n```python\n# 此示例创建一个具有三个属性的对象。\n\
    # cx属性是一个方法。\n\nclass MyObject:\n    def __init__(self):\n        self.ax = \"\
    this\"\n        self.bx = \"text\"\n\n    def cx(self, g):\n        t = self.ax\
    \ + g + str(len(self.bx))\n        return t\n\n# 创建类的一个实例。\n\nobj = MyObject()\n\
    \n# 使用对象的函数和属性。\n\nprint(obj.cx(\"-\"))\nprint(obj.ax)\nprint(obj.bx)\n\n# 修改属性。\n\
    obj.ax = \"super\"\nobj.bx = \"string\"\n\n# 打印修改后的属性和函数的结果。\n\nprint(obj.ax)\n\
    print(obj.bx)\nprint(obj.cx(\"+\"))\n```\n\n```\n输出：\n\nthis-4\nthis\ntext\nsuper\n\
    string\nsuper+6\n```\n\n这里定义了一个名为*MyObject*的对象，它有三个属性。第一个属性*ax*被初始化为字符串值“this”。第二个属性*bx*被赋值为字符串值“text”。第三个属性*cx*是一个方法，定义为一个接受一个参数*g*的函数。因此，引入这个参数是此处的新颖之处。在*cx*方法内部，声明了一个局部变量*t*，其值通过连接*ax*属性、参数*g*的值以及*bx*属性的长度来赋值。接下来，方法返回存储在*t*变量中的值。然后，代码按顺序输出对象的几种状态的结果以展示事件：(a)\
    \ *print(obj.cx(“–”))*; 使用参数“–”调用*obj*对象的*cx*方法，并打印方法调用的结果。结果是“this”、参数“–”和“text”属性长度的连接，得到一个包含“this-4”的字符串。(b)\
    \ *print(obj.ax)*; 显示*obj*对象的*ax*属性的值，即“this”。(c) *print(obj.bx)*; 输出*obj*对象的*bx*值，即“text”。(d)\
    \ *obj.ax = \"super\"*; 将*ax*属性的值从“this”更新为“super”。(e) *obj.bx = \"string\"*;\
    \ 将*bx*属性的值从“text”更新为“string”。(f) 接下来我们有：*print(obj.ax)*; 显示*ax*属性的更新值，现在是“super”。(g)\
    \ *print(obj.bx)*; 打印*bx*属性的更新值，现在是“string”。(h) *print(obj.cx(\"+\"))*; 使用参数“+”调用*obj*对象的*cx*方法，并打印方法调用的结果。结果是“super”、参数“+”和“string”属性长度的连接，得到一个包含“super+6”的字符串。\n\
    \n```python\nclass Obj:\n    def __init__(self):\n        self.AV = 0\n      \
    \  self.SD = 0\n        self.CV = 0\n\n    def dx(self, a):\n        n = len(a)\n\
    \        b = 0\n        e = 0\n\n        for j in a:\n            b += j\n\n \
    \       x = b / n\n\n        for j in a:\n            e += (j - x) ** 2\n\n  \
    \      s = (e / (n - 1)) ** 0.5\n        c = s / x\n\n        self.AV = x\n  \
    \      self.SD = s\n        self.CV = c\n\n# 创建Obj的一个实例并应用dx函数。\n\nobj = Obj()\n\
    a = [5, 6, 2, 9, 44, 200]\nobj.dx(a)\n\nprint('AV:', obj.AV)\nprint('SD:', obj.SD)\n\
    print('CV:', obj.CV)\n```\n\n```\n输出：\n\nAV: 44.33\nSD: 77.83\nCV: 1.75\n```\n\
    \n这是对象及其属性的一种更有用的表示。具体来说，定义了一个名为*obj*的对象。该对象有四个属性：*AV*、*SD*、*CV*和*dx*。*AV*、*SD*和*CV*属性最初被设置为值0，而*dx*属性被赋值为一个函数。*dx*函数接受一个参数*a*，假定它是一个数组。在*dx*函数内部，执行了多个操作来根据输入数组*a*计算统计值。首先，数组*a*的长度存储在变量*n*中。然后，将两个变量*b*和*e*初始化为0。使用一个*for循环*遍历数组*a*的元素，在每次迭代中，将值累加到变量*b*中。循环结束后，通过将累加和*b*除以*n*来计算平均值（均值）*x*。另一个*for循环*用于计算数组每个元素与均值*x*之间差值的平方和。这个和存储在变量*e*中。随后，通过取方差的平方根来计算标准差*s*，方差是通过将*e*除以(*n*\
    \ - 1)计算得出的。变异系数*c*是通过将标准差*s*除以均值*x*计算得出的。接下来，*obj*对象的*AV*、*SD*和*CV*属性分别用计算出的*x*、*s*和*c*的值更新。在对象定义之外，定义了一个包含数值列表的数组*a*。使用此数组*a*作为参数调用*obj*对象的*dx*方法来执行统计计算。计算之后，有三个*print*语句显示结果。这些语句使用*print*函数将均值（*AV*）、标准差（*SD*）和变异系数（*CV*）输出到控制台。注意，方差：*e*\
    \ / (*n* - 1)。标准差是方差的平方根。表达式(*e* / (*n* - 1)) ** 0.5计算这个平方根。使用“** 0.5”等同于使用*math.sqrt()*函数。对两种方法的实验得出相同的结果。将一个数提升到0.5次幂等同于取其平方根。一个数的平方根是该数平方的逆运算。平方一个数意味着将其提升到2次幂，因此，逆运算是将其提升到½或0.5次幂。可以进一步注意到\
    \ q^0.5 × q^0.5 = q^(0.5+0.5) = q^1 = q，其中q是一个数。因此，q^0.5确实是q的平方根，因为当它乘以自身时，它会得到q。"
