    \ and times\nimport datetime\ntoday = datetime.datetime.today()\nprint(today)\n\
    ```\n\nOutput:\n\n```\n2023-03-13 13:44:55.881958\n```\n\n## Chapter 2: Pythonic\
    \ thinking\n\nPython is a popular high-level programming language known for its\
