- md: "## What is Multiple Inheritance?\n\nMultiple inheritance is a type of class\
    \ inheritance where a subclass can inherit attributes and methods from multiple\
    \ parent classes. In Python, you can specify multiple parent classes in the parentheses\
    \ after the class name.\n\n## Syntax of Multiple Inheritance:\n\nTo create a subclass\
    \ with multiple inheritance, you need to define a new class and specify the parent\
    \ classes in parentheses after the class name, separated by commas. Here's an\
    \ example:\n\n```python\nclass Parent1:\n    def method1(self):\n        print(\"\
    Parent1 method called.\")\n\nclass Parent2:\n    def method2(self):\n        print(\"\
    Parent2 method called.\")\n\nclass Child(Parent1, Parent2):\n    pass\n```\n\n\
    In this example, we define two parent classes, Parent1 and Parent2, each with\
    \ their own methods. We then define a Child class that inherits from both Parent1\
    \ and Parent2 by specifying them in parentheses after the class name, separated\
    \ by commas. Since the Child class doesn't have any methods of its own, we simply\
    \ use the pass statement.\n\n## Method Resolution Order (MRO):\n\nWhen a subclass\
    \ inherits from multiple parent classes, Python determines the order in which\
    \ it searches for methods in the parent classes. This is called the Method Resolution\
    \ Order (MRO). The MRO is important because it determines which method will be\
    \ called if two or more parent classes have methods with the same name.\n\nIn\
    \ Python 3, the MRO is determined using the C3 linearization algorithm, which\
    \ guarantees that the method resolution order is consistent and respects local\
    \ precedence ordering and monotonicity. You can access the MRO of a class using\
    \ the mro() method.\n\n```python\nclass Parent1:\n    def method(self):\n    \
    \    print(\"Parent1 method called.\")\n\nclass Parent2:\n    def method(self):\n\
    \        print(\"Parent2 method called.\")\n\nclass Child(Parent1, Parent2):\n\
    \    pass\n\nprint(Child.mro()) # prints [<class '__main__.Child'>, <class '__main__.Parent1'>,\
    \ <class '__main__.Parent2'>, <class 'object'>]\n```\n\nIn this example, we define\
    \ two parent classes, Parent1 and Parent2, each with their own method. We then\
    \ define a Child class that inherits from both Parent1 and Parent2. When we call\
    \ Child.mro(), we get the method resolution order, which shows that Python will\
    \ first look for methods in Child, then Parent1, then Parent2, and finally object.\n\
    \n## Diamond Inheritance:\n\nIn multiple inheritance, a situation can arise where\
    \ a subclass inherits from two parent classes that both inherit from the same\
    \ grandparent class. This is called diamond inheritance and it can lead to ambiguity\
    \ in method resolution. To resolve this ambiguity, Python uses the C3 linearization\
    \ algorithm to determine the order in which methods are searched for.\n\n```python\n\
    class Grandparent:\n    def method(self):\n        print(\"Grandparent method\
    \ called.\")\n\nclass Parent1(Grandparent):\n    pass\n\nclass Parent2(Grandparent):\n\
    \    pass\n\nclass Child(Parent1, Parent2):\n    pass\n\nc = Child()\nc.method()\
    \ # prints \"Grandparent method called.\"\n```\n\nIn this example, we define a\
    \ Grandparent class with a method. We then define two parent classes, Parent1\
    \ and Parent2, both of which inherit from Grandparent.\n\n## Class design\n\n\
    ### Writing clean, readable classes\n\nWhen writing classes in Python, it's important\
    \ to focus not only on functionality but also on readability and maintainability\
    \ of the code. In this note, we will discuss some best practices for writing clean\
    \ and readable classes in Python, with suitable codes.\n\nBest Practices for Writing\
    \ Clean and Readable Classes in Python:\n\n- Use descriptive names for classes\
    \ and methods: It's important to use descriptive names for classes and methods\
    \ that accurately reflect their purpose. This makes it easier for other developers\
    \ to understand what the code does without having to read through the entire implementation.\n\
    \n```python\nclass Student:\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n\n    def get_name(self):\n        return self.name\n\
    \n    def get_age(self):\n        return self.age\n```\n\nIn this example, we\
    \ define a Student class with name and age attributes and get_name() and get_age()\
    \ methods. The names of the class and methods clearly indicate their purpose.\n\
    \n- Follow the Single Responsibility Principle (SRP): A class should have only\
    \ one responsibility and should be focused on that responsibility. This makes\
    \ the code easier to understand and maintain.\n\n```python\nclass Calculator:\n\
    \    def add(self, x, y):\n        return x + y\n\n    def subtract(self, x, y):\n\
    \        return x - y\n```\n\nIn this example, we define a Calculator class with\
    \ add() and subtract() methods. The class has only one responsibility, which is\
    \ to perform arithmetic operations.\n\n- Use comments to explain complex logic:\
    \ Sometimes, complex logic is necessary in a class. In such cases, it's a good\
    \ practice to use comments to explain what the code does and why it does it.\n\
    \n```python\nclass ShoppingCart:\n    def __init__(self):\n        self.items\
    \ = []\n\n    def add_item(self, item):\n        # Add an item to the shopping\
    \ cart.\n        # If the item already exists in the cart, increase the quantity\
    \ by 1. Otherwise, add a new item to the cart.\n        for i in self.items:\n\
    \            if i['name'] == item['name']:\n                i['quantity'] += 1\n\
    \                return\n        self.items.append(item)\n```\n\nIn this example,\
    \ we define a ShoppingCart class with an add_item() method. The method contains\
    \ complex logic for adding an item to the cart. We use a comment to explain the\
    \ logic and make it easier to understand.\n\n- Avoid global variables: Global\
    \ variables can make code harder to read and maintain. It's a good practice to\
    \ avoid them in classes.\n\n```python\nclass Car:\n    def __init__(self, make,\
    \ model, year):\n        self.make = make\n        self.model = model\n      \
    \  self.year = year\n\n    def get_make(self):\n        return self.make\n\n \
    \   def get_model(self):\n        return self.model\n\n    def get_year(self):\n\
    \        return self.year\n```\n\nIn this example, we define a Car class with\
    \ make, model, and year attributes and get_make(), get_model(), and get_year()\
    \ methods. We don't use any global variables in the class.\n\n- Follow the Python\
    \ style guide (PEP 8): The Python community has established a style guide called\
    \ PEP 8 that provides guidelines for writing Python code. Following the style\
    \ guide can make code more consistent and easier to read for other developers.\n\
    \n```python\nclass Rectangle:\n    def __init__(self, length, width):\n      \
    \  self.length = length\n        self.width = width\n\n    def get_area(self):\n\
    \        return self.length * self.width\n\n    def get_perimeter(self):\n   \
    \     return 2 * (self.length + self.width)\n```\n\n### Writing classes with a\
    \ single responsibility\n\nThe Single Responsibility Principle (SRP) is an important\
    \ design principle in object-oriented programming. According to the SRP, a class\
    \ should have only one responsibility and should be focused on that responsibility.\
    \ This makes the code easier to understand and maintain. In this note, we will\
    \ discuss how to write classes with a single responsibility in Python, with suitable\
    \ codes.\n\nBest Practices for Writing Classes with a Single Responsibility in\
    \ Python:\n\n- Identify the class's responsibility: The first step in writing\
    \ a class with a single responsibility is to identify what that responsibility\
    \ is. A class should have one clear responsibility and should be focused on that\
    \ responsibility.\n\n```python\nclass Circle:\n    def __init__(self, radius):\n\
    \        self.radius = radius\n\n    def get_area(self):\n        return 3.14\
    \ * self.radius ** 2\n\n    def get_circumference(self):\n        return 2 * 3.14\
    \ * self.radius\n```\n\nIn this example, we define a Circle class with radius\
    \ attribute and get_area() and get_circumference() methods. The class's responsibility\
    \ is to calculate the area and circumference of a circle.\n\n- Separate concerns\
    \ into different classes: If a class has multiple responsibilities, it's a good\
    \ practice to separate those responsibilities into different classes. This makes\
    \ the code easier to understand and maintain.\n\n```python\nclass Employee:\n\
    \    def __init__(self, name, salary):\n        self.name = name\n        self.salary\
    \ = salary\n\nclass Payroll:\n    def calculate_payroll(self, employees):\n  \
    \      for employee in employees:\n            print(f'{employee.name}: {employee.salary}')\n\
    ```\n\nIn this example, we define an Employee class with name and salary attributes\
    \ and a Payroll class with a calculate_payroll() method. The Employee class is\
    \ responsible for storing employee information, while the Payroll class is responsible\
    \ for calculating employee pay.\n\n- Avoid adding unrelated functionality: When\
    \ writing a class, it's important to avoid adding unrelated functionality. This\
