    `pytz.timezone()` 函数指定原始时区，并使用 `astimezone()` 方法将 `datetime` 对象转换到所需的时区。


    ```python

    from datetime import datetime

    import pytz


    # Create a datetime object representing the date and time in the original time
    zone

