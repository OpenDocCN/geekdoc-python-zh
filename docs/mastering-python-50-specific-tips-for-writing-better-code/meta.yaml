    List comprehensions and generator expressions are powerful features in Python
    that allow you to create new lists and generators from existing ones in a concise
    and expressive way. In this note, we will explore how to use list comprehensions
    and generator expressions to write expressive code in Python, along with some
    examples of suitable code.


    List comprehensions: List comprehensions allow you to create new lists by iterating
    over an existing list and applying a function or conditional statement to each
    element. The resulting list is created in a single line of code, making it concise
    and expressive. For example:


    ```

    # create a list of squared numbers

    numbers = [1, 2, 3, 4, 5]

    squares = [x ** 2 for x in numbers]


    # create a list of even numbers

    evens = [x for x in numbers if x % 2 == 0]

    ```


    Generator expressions: Generator expressions are similar to list comprehensions,
    but instead of creating a new list, they create a generator that yields each element
    as needed. This can be more memory-efficient than creating a new list, especially
    for large datasets. For example:


    ```

    # create a generator of squared numbers

    numbers = [1, 2, 3, 4, 5]

    squares = (x ** 2 for x in numbers)


    # create a generator of even numbers

    evens = (x for x in numbers if x % 2 == 0)

    ```'
