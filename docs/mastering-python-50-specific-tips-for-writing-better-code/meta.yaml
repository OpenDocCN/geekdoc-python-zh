    \ types. One of these data structures is namedtuple, which is a subclass of tuple\
    \ that has named fields. In this note, we will discuss how to use namedtuple and\
    \ provide some sample code.\n\nnamedtuple is defined using the collections.namedtuple()\
    \ factory function. The first argument to this function is the name of the new\
    \ tuple type, and the second argument is a string containing the names of the\
    \ fields separated by spaces or commas. Here's an example:\n\n```python\nfrom\
    \ collections import namedtuple\n\nPoint = namedtuple('Point', ['x', 'y'])\np\
    \ = Point(1, 2)\nprint(p)\nprint(p.x)\nprint(p.y)\n```\n\nIn this example, we\
    \ define a new namedtuple type called Point with two fields, x and y. We then\
    \ create a new instance of this type with values (1, 2) and print it to the console.\
    \ We also print the values of the x and y fields individually.\n\nOne advantage\
    \ of using namedtuple is that it provides a more readable and self-documenting\
    \ alternative to defining tuples or using dictionaries. For example, instead of\
    \ using a plain tuple or a dictionary to represent a 2D point, we can use a namedtuple\
    \ with fields x and y:\n\n```python\np = (1, 2)\n# vs\np = {'x': 1, 'y': 2}\n\
    # vs\nPoint = namedtuple('Point', ['x', 'y'])\np = Point(1, 2)\n```\n\nnamedtuple\
    \ also provides some convenient features, such as the ability to access fields\
    \ using dot notation instead of indexing:\n\n```python\np = (1, 2)\nx = p[0]\n\
    y = p[1]\n# vs\np = Point(1, 2)\nx = p.x\ny = p.y\n```\n\nnamedtuple instances\
    \ are immutable, which means that their values cannot be changed once they are\
    \ created. This can help to prevent bugs caused by accidental modifications of\
    \ tuples.\n\nnamedtuple can also be used in some situations where a class would\
    \ be overkill, such as when defining simple data structures that only have a few\
    \ fields. For example, a namedtuple could be used to represent a user's login\
    \ credentials:\n\n```python\nUser = namedtuple('User', ['username', 'password'])\n\
    user = User('john_doe', 'password123')\n```\n\nNamedtuple is a useful data structure\
    \ provided by Python's collections module. It can be used to create tuples with\
    \ named fields, providing a more readable and self-documenting alternative to\
    \ plain tuples or dictionaries. namedtuple instances are immutable, and they can\
    \ be used in situations where a full-fledged class would be overkill.\n\n### Using\
    \ deque\n\nIn Python, the collections module provides several useful data structures\
    \ that are not included in the standard built-in types. One of these data structures\
    \ is deque, which is a double-ended queue that provides O(1) time complexity for\
    \ adding or removing elements from either end. In this note, we will discuss how\
    \ to use deque and provide some sample code.\n\nTo use deque, you first need to\
    \ import it from the collections module:\n\n```python\nfrom collections import\
    \ deque\n```\n\nOnce you have imported deque, you can create a new instance of\
    \ the deque using the following syntax:\n\n```python\nmy_deque = deque()\n```\n\
    \nThis creates an empty deque instance. You can also pass an iterable to the deque()\
    \ constructor to initialize it with some values:\n\n```python\nmy_deque = deque([1,\
    \ 2, 3])\n```\n\nNow that you have a deque instance, you can add elements to it\
    \ using the append() method. This adds an element to the right end of the deque:\n\
    \n```python\nmy_deque.append(4)\n```\n\nYou can also add elements to the left\
    \ end of the deque using the appendleft() method:\n\n```python\nmy_deque.appendleft(0)\n\
    ```\n\nTo remove an element from the right end of the deque, you can use the pop()\
    \ method:\n\n```python\nlast_element = my_deque.pop()\n```\n\nThis removes the\
    \ last element from the deque and returns it. Similarly, to remove an element\
    \ from the left end of the deque, you can use the popleft() method:\n\n```python\n\
    first_element = my_deque.popleft()\n```\n\nThis removes the first element from\
    \ the deque and returns it.\n\nIn this example, we use the asyncio.create_task\
    \ function to create two tasks that run concurrently. We then use the asyncio.Task.all_tasks()\
    \ method to get a list of all pending tasks and print it to the console. Finally,\
