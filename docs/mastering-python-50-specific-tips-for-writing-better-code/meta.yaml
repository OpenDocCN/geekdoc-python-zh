    \n在 Python 中，偏函数是一种将函数的某些参数固定，从而创建一个新函数的方式，新函数接受剩余的参数。当我们有一个参数过多的函数，并且希望通过固定其中一些参数来简化其使用时，这会很有用。\n\
    \nPython 的 `functools` 模块提供了 `partial()` 函数，允许我们从现有函数创建偏函数。\n\n创建偏函数：\n\n要创建偏函数，我们需要从\
    \ `functools` 模块导入 `partial` 函数，并用原始函数和要固定的参数作为其参数来调用它。生成的偏函数可以用剩余的参数调用，它会自动将固定的参数传递给原始函数。\n\
    \n以下是一个创建偏函数的示例：\n\nfrom functools import partial\n\ndef multiply(x, y):\n   \
    \ return x * y\n\ndouble = partial(multiply, 2)\nprint(double(5)) # 输出: 10\n\n\
    在这个例子中，我们定义了一个 `multiply()` 函数，它接受两个参数并返回它们的乘积。然后，我们通过用 `multiply()` 函数和参数 `2`\
    \ 调用 `partial()` 函数，创建了一个名为 `double` 的偏函数。生成的偏函数将 `x` 参数固定为 `2`，可以用 `y` 参数调用它来使一个数字翻倍。\n\
    \n向偏函数传递额外参数：\n\n我们也可以在调用偏函数时传递额外的参数，它们将按照传递的顺序附加到固定的参数后面。\n\n以下是一个向偏函数传递额外参数的示例：\n\
    \nfrom functools import partial\n\ndef multiply(x, y, z):\n    return x * y *\
    \ z\n\ndouble = partial(multiply, 2)\ntriple = partial(multiply, z=3)\nprint(double(5,\
    \ 2)) # 输出: 20\nprint(triple(5, 2)) # 输出: 30\n\n在这个例子中，我们定义了一个 `multiply()` 函数，它接受三个参数并返回它们的乘积。我们创建了两个偏函数\
    \ `double` 和 `triple`，分别将 `x` 和 `z` 参数固定为 `2` 和 `3`。然后我们可以用剩余的参数调用这些偏函数，它们将被附加到固定的参数后面。\n\
    \n使用 lambda 函数创建偏函数：\n\n我们也可以使用 lambda 函数创建偏函数。当我们有一个简单的函数想要进行部分应用，而无需定义单独的函数时，这会很有用。\n\
    \n以下是一个使用 lambda 函数创建偏函数的示例：\n\nfrom functools import partial\n\ndouble = partial(lambda\
    \ x, y: x * y, 2)\nprint(double(5)) # 输出: 10\n\n在这个例子中，我们定义了一个 lambda 函数，它接受两个参数并返回它们的乘积。然后，我们通过用\
    \ lambda 函数和参数 `2` 调用 `partial()` 函数，创建了一个名为 `double` 的偏函数。生成的偏函数将 `x` 参数固定为 `2`，可以用\
    \ `y` 参数调用它来使一个数字翻倍。\n\nPython 中的偏函数提供了一种强大的方式来固定现有函数的参数，从而创建一个更易于使用的新函数。我们可以使用\
    \ `functools` 模块和 `partial()` 函数创建偏函数，并在调用它们时传递额外的参数。我们也可以使用 lambda 函数创建偏函数，而无需定义单独的函数。\n\
    \n## 函数装饰器和闭包"
