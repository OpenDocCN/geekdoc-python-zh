- md: "To create a class decorator, you define a function that takes a class as an\
    \ argument and returns a new class. The new class can inherit from the original\
    \ class or not, and can add new methods, attributes, or modify existing ones.\n\
    \nFor example, let's create a class decorator that adds a count attribute to a\
    \ class that keeps track of the number of instances created from the class:\n\n\
    ```python\ndef count_instances(cls):\n    class CountedClass(cls):\n        count\
    \ = 0\n\n        def __init__(self, *args, **kwargs):\n            super().__init__(*args,\
    \ **kwargs)\n            CountedClass.count += 1\n\n    return CountedClass\n\
    ```\n\nThe `count_instances` decorator takes a class as an argument and returns\
    \ a new class that inherits from the original class. The new class has a `count`\
    \ attribute that is initialized to 0, and a modified `__init__()` method that\
    \ increments the `count` attribute every time an instance of the class is created.\n\
    \nTo use the decorator, you just need to apply it to a class:\n\n```python\n@count_instances\n\
    class MyClass:\n    def __init__(self, value):\n        self.value = value\n```\n\
    \nNow, every time you create an instance of `MyClass`, the `count` attribute will\
    \ be incremented:\n\n```python\n>>> obj1 = MyClass(10)\n>>> obj2 = MyClass(20)\n\
    >>> obj3 = MyClass(30)\n>>> MyClass.count\n3\n```\n\nYou can also create a class\
    \ decorator that modifies the behavior of a method. For example, let's create\
    \ a class decorator that adds logging to all methods of a class:\n\n```python\n\
    def log_methods(cls):\n    for name, method in cls.__dict__.items():\n       \
    \ if callable(method):\n            def logged_method(self, *args, **kwargs):\n\
    \                print(f\"Calling method {name}\")\n                return method(self,\
    \ *args, **kwargs)\n            setattr(cls, name, logged_method)\n    return\
    \ cls\n```\n\nThe `log_methods` decorator iterates over all the attributes of\
    \ the class, and if an attribute is a method, it replaces it with a new method\
    \ that logs the name of the method before calling it.\n\nTo use the decorator,\
    \ you just need to apply it to a class:\n\n```python\n@log_methods\nclass MyOtherClass:\n\
    \    def method1(self):\n        print(\"Method 1\")\n\n    def method2(self):\n\
    \        print(\"Method 2\")\n```\n\n### Using the super function\n\nIn Python,\
    \ the `super()` function is used to call a method from a parent class, which allows\
    \ us to extend or override the behavior of the parent class in the child class.\n\
    \nThe `super()` function is commonly used in object-oriented programming to call\
    \ the constructor or methods of the parent class, while still allowing the child\
    \ class to customize its behavior.\n\nTo use the `super()` function, we call it\
    \ with two arguments: the first argument is the child class, and the second argument\
    \ is an instance of the child class.\n\nFor example, let's consider the following\
    \ class hierarchy:\n\n```python\nclass Parent:\n    def __init__(self, name):\n\
    \        self.name = name\n\n    def greet(self):\n        print(f\"Hello, {self.name}!\"\
    )\n\nclass Child(Parent):\n    def greet(self):\n        super().greet()\n   \
    \     print(\"I'm a child!\")\n```\n\nIn this example, we have a `Parent` class\
    \ with an `__init__()` method and a `greet()` method, and a `Child` class that\
    \ inherits from `Parent` and overrides the `greet()` method.\n\nIn the `Child`\
    \ class, we call the `greet()` method of the `Parent` class using `super().greet()`.\
    \ This will call the `greet()` method of the parent class, and then print \"I'm\
    \ a child!\".\n\nLet's create an instance of the `Child` class and call the `greet()`\
    \ method:\n\n```python\n>>> child = Child(\"John\")\n>>> child.greet()\nHello,\
    \ John!\nI'm a child!\n```\n\nAs you can see, the `super()` function allowed us\
    \ to call the `greet()` method of the `Parent` class, while still allowing the\
    \ `Child` class to customize its behavior.\n\nAnother example of using the `super()`\
    \ function is to call the constructor of the parent class from the child class:\n\
    \n```python\nclass Parent:\n    def __init__(self, name):\n        self.name =\
    \ name\n\nclass Child(Parent):\n    def __init__(self, name, age):\n        super().__init__(name)\n\
    \        self.age = age\n```\n\nIn this example, we have a `Parent` class with\
    \ an `__init__()` method that takes a `name` argument, and a `Child` class that\
    \ inherits from `Parent` and overrides the `__init__()` method to take an additional\
    \ `age` argument.\n\nIn the `Child` class, we call the `__init__()` method of\
    \ the `Parent` class using `super().__init__(name)`. This will call the `__init__()`\
    \ method of the parent class with the `name` argument, and then we can initialize\
    \ the `age` attribute in the child class.\n\nLet's create an instance of the `Child`\
    \ class and print its attributes:\n\n```python\n>>> child = Child(\"John\", 10)\n\
    >>> print(child.name, child.age)\nJohn 10\n```\n\nAs you can see, the `super()`\
    \ function allowed us to call the constructor of the parent class from the child\
    \ class, while still allowing the child class to customize its behavior.\n\n###\
    \ Using slots to optimize memory usage\n\nIn Python, every object has a dictionary\
    \ that stores its attributes. While this is convenient, it can also lead to high\
    \ memory usage, especially when creating large numbers of objects.\n\nTo optimize\
    \ memory usage in Python, we can use slots. Slots are a mechanism that allows\
    \ us to explicitly declare the attributes that an object can have. This allows\
    \ Python to allocate memory for these attributes directly in the object, rather\
    \ than in a dictionary.\n\nTo use slots, we define a list of attribute names as\
    \ class variables in our class, like this:\n\n```python\nclass Person:\n    __slots__\
    \ = ['name', 'age']\n\n    def __init__(self, name, age):\n        self.name =\
    \ name\n        self.age = age\n```\n\nIn this example, we have defined a `Person`\
    \ class with two attributes: `name` and `age`. We have also defined the `__slots__`\
    \ attribute as a list of strings containing the attribute names.\n\nWhen we create\
    \ an instance of this class, Python will allocate memory for the `name` and `age`\
    \ attributes directly in the object, rather than in a dictionary. This can lead\
    \ to significant memory savings when creating large numbers of objects.\n\nLet's\
    \ create a few instances of this class and check their memory usage:\n\n```python\n\
    import sys\np1 = Person(\"Alice\", 25)\np2 = Person(\"Bob\", 30)\np3 = Person(\"\
    Charlie\", 35)\n\nprint(sys.getsizeof(p1)) # prints 56\nprint(sys.getsizeof(p2))\
    \ # prints 56\nprint(sys.getsizeof(p3)) # prints 56\n```\n\nAs you can see, the\
    \ memory usage of each object is only 56 bytes, which is much smaller than the\
    \ size of a typical Python object.\n\nNote that slots have some limitations. Once\
    \ we define a class with slots, we can only assign attributes to the slots that\
    \ we have defined. If we try to assign a new attribute, we will get an `AttributeError`.\
    \ Additionally, we cannot use properties or other dynamic attributes in classes\
    \ with slots.\n\nOverall, slots can be a useful tool for optimizing memory usage\
    \ in Python, especially when creating large numbers of objects with a fixed set\
    \ of attributes. However, it's important to carefully consider the limitations\
    \ of slots before using them in a project.\n\n## Chapter 5: Concurrency and Parallelism\n\
    \nConcurrency and parallelism are essential concepts in modern programming, as\
