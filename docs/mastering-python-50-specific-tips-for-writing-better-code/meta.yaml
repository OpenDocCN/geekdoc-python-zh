    \ 和 `repeat`。\n\n`count` 函数：\n\n`count` 函数生成一个从指定值开始、按指定步长递增的无限数字序列。以下是一个示例：\n\
    \n```python\nfrom itertools import count\n\nfor i in count(start=1, step=2):\n\
