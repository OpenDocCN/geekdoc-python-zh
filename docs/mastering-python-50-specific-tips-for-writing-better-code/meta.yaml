    ```\n\n在这个例子中，我们定义了一个函数`increment`，它简单地将一个全局变量`x`递增1，执行1000000次。然后我们创建10个线程并启动它们，每个线程都调用`increment`函数。\n\
    \n如果我们运行这段代码，我们可能期望`x`的最终值是10000000（10个线程 * 每个线程1000000次递增）。然而，由于GIL的存在，`x`的实际值会小于这个数。在我的机器上，输出通常在800万到900万之间。\n\
