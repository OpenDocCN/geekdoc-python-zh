  - "[PAGE 98]\n\n+   - Use assert statements for more complex test cases.\n- Use\
    \ triple quotes for multi-line prompts and output.\n\nWriting doctests in Python\
    \ is an effective way to test functions and document their behavior. By following\
    \ best practices and including doctests for all functions, we can ensure that\
    \ our code is more reliable and maintainable.\n\n# Writing function annotations\n\
    \nFunction annotations in Python are used to specify the expected data types of\
    \ function arguments and return values. These annotations are not enforced by\
    \ the interpreter, but they can be used by other tools such as linters, type checkers,\
    \ and IDEs to provide better code completion, type checking, and documentation.\n\
    \nTo write function annotations in Python, you can use the colon syntax to indicate\
    \ the expected data type. For example, to specify that the function add expects\
    \ two integers as arguments and returns an integer, you can write:\n\n```\ndef\
    \ add(x: int, y: int) -> int:\n    return x + y\n```\n\nIn this example, the int\
    \ before the argument name and after the -> arrow indicate that x and y should\
    \ be integers, and that the return value should also be an integer.\n\nYou can\
    \ use any data type as a function annotation, including built-in types like int,\
    \ float, str, bool, and None, as well as user-defined types and even generic types\
    \ from the typing module.\n\nHere are some more examples:\n\n```\ndef greet(name:\
    \ str) -> str:\n    return f\"Hello, {name}!\"\n\ndef divide(x: float, y: float)\
    \ -> float:\n```"
  - "[PAGE 99]\n\n```\nreturn x / y\n\ndef repeat_string(s: str, n: int) -> str:\n\
    \    return s * n\n\ndef process_data(data: List[Dict[str, Any]]) -> Dict[str,\
    \ Any]:\n    # process data and return result\n```\n\nIn this last example, we\
    \ use the List and Dict types from the typing module to specify that the data\
    \ argument should be a list of dictionaries with string keys and values of any\
    \ type, and that the return value should be a dictionary with string keys and\
    \ values of any type.\n\nIt's worth noting that function annotations are optional\
    \ in Python, and they do not affect the behavior of the function in any way. However,\
    \ they can be very useful for providing documentation and improving code quality,\
    \ especially when working on larger projects with multiple developers.\n\nIn addition\
    \ to function annotations, you can also use type hints to specify the expected\
    \ types of variables and attributes. For example:\n\n```\nname: str = \"Alice\"\
    \nage: int = 30\n\nclass Person:\n    def __init__(self, name: str, age: int):\n\
    \        self.name = name\n        self.age = age\n\np = Person(\"Bob\", 25)\n\
    ```"
  - "[PAGE 100]\n\nIn this example, we use type hints to specify that the name variable\
    \ should be a string and the age variable should be an integer, and we use the\
    \ same annotations in the Person class constructor to specify the expected types\
    \ of the name and age attributes.\n\nOverall, using function annotations and type\
    \ hints can help make your code more readable, maintainable, and reliable. While\
    \ they are not required in Python, they are a powerful tool for improving code\
    \ quality and reducing errors.\n\n+   - Using default arguments\n\nIn Python,\
    \ you can define default arguments for function parameters. Default arguments\
    \ are values that are automatically assigned to a parameter if no argument is\
    \ provided for that parameter. This allows you to write functions that are more\
    \ flexible and can handle different scenarios with minimal changes to the code.\n\
    \nTo use default arguments in Python, you simply need to provide a default value\
    \ for a parameter when defining the function. For example, consider the following\
    \ function that adds two numbers:\n\n```\ndef add(x, y):\n    return x + y\n```\n\
    \nThis function works fine when you call it with two arguments:\n\n```\n>>> add(2,\
    \ 3)\n5\n```\n\nBut what if you want to use the same function to add only one\
    \ number to a fixed value? You could modify the function to take a default value\
    \ for y:\n\n```\ndef add(x, y=0):\n    return x + y\n```"
  - "[PAGE 101]\n\nNow, if you call add with only one argument, it will add that argument\
    \ to 0 (the default value of y):\n\n```\n>>> add(2)\n2\n```\n\nAnd if you call\
    \ add with two arguments, it will add them together as before:\n\n```\n>>> add(2,\
    \ 3)\n5\n```\n\nYou can also use default arguments to make a function more flexible\
    \ by allowing the user to customize some behavior without having to modify the\
    \ function code. For example, consider the following function that prints a message:\n\
    \n```\ndef greet(name, greeting=\"Hello\"):\n    print(f\"{greeting}, {name}!\"\
    )\n```\n\nThis function takes a name argument and a greeting argument that defaults\
    \ to \"Hello\". If you call the function with only a name argument, it will print\
    \ \"Hello, {name}!\":\n\n```\n>>> greet(\"Alice\")\nHello, Alice!\n```\n\nBut\
    \ you can also provide a custom greeting:\n\n```\n>>> greet(\"Bob\", \"Good morning\"\
    )\nGood morning, Bob!\n```\n\nUsing default arguments in Python can help you write\
    \ more flexible and reusable functions, and make your code easier to read and\
    \ maintain. However, you should be careful when using mutable objects (such as\
    \ lists or dictionaries) as default arguments, as their values"
  - "[PAGE 102]\n\ncan be modified across multiple calls to the same function, leading\
    \ to unexpected behavior.\n\n+   - **Using keyword arguments**\n\nIn Python, you\
    \ can use keyword arguments to pass arguments to a function in any order you like.\
    \ Keyword arguments are a way to specify which argument corresponds to which parameter\
    \ by using the parameter name as a keyword when calling the function.\n\nTo use\
    \ keyword arguments in Python, you simply need to provide the argument name and\
    \ its corresponding value when calling the function. For example, consider the\
    \ following function that takes two arguments:\n\n```\ndef greet(name, greeting):\n\
    \    print(f\"{greeting}, {name}!\")\n```\n\nTo call this function with positional\
    \ arguments, you need to provide the arguments in the correct order:\n\n```\n\
    >>> greet(\"Alice\", \"Hello\")\nHello, Alice!\n```\n\nBut you can also call this\
    \ function with keyword arguments, specifying the argument names explicitly:\n\
    \n```\n>>> greet(name=\"Bob\", greeting=\"Good morning\")\nGood morning, Bob!\n\
    ```\n\nWhen using keyword arguments, you can provide the arguments in any order\
    \ you like:\n\n```\n>>> greet(greeting=\"Hi\", name=\"Charlie\")\nHi, Charlie!\n\
    ```"
  - "[PAGE 103]\n\nUsing keyword arguments can be especially useful when calling functions\
    \ that have many parameters or when you want to provide default values for some\
    \ of the parameters. For example, consider the following function that takes three\
    \ arguments, with the third argument having a default value:\n\n```\ndef divide(x,\
    \ y, precision=2):\n    result = x / y\n    return round(result, precision)\n\
    ```\n\nIf you call this function with only two arguments, it will use the default\
    \ value for precision:\n\n```\n>>> divide(10, 3)\n3.33\n```\n\nBut you can also\
    \ provide a custom value for precision by using a keyword argument:\n\n```\n>>>\
    \ divide(10, 3, precision=4)\n3.3333\n```\n\nKeyword arguments can help make your\
    \ code more readable and easier to maintain, especially when working with functions\
    \ that have many parameters or complex argument lists. By using keyword arguments,\
    \ you can make it clear which argument corresponds to which parameter, and you\
    \ can provide default values for some of the parameters without having to modify\
    \ the function code.\n\n+   - Using *args and **kwargs\n\nIn Python, you can use\
    \ *args and **kwargs to define functions that can accept an arbitrary number of\
    \ arguments and keyword arguments, respectively. These features can be particularly\
    \ useful when you don't know ahead of time how many arguments you will"
  - "[PAGE 104]\n\nneed to pass to a function, or when you want to provide a flexible\
    \ API that can handle a variety of use cases.\n\n*args is used to pass a variable\
    \ number of positional arguments to a function. When you use *args in a function\
    \ definition, it tells Python to collect any remaining positional arguments into\
    \ a tuple. For example:\n\n```\ndef my_function(*args):\n    for arg in args:\n\
    \        print(arg)\n```\n\nIn this example, the function my_function() accepts\
    \ any number of positional arguments and prints each argument to the console.\
    \ You can call the function with any number of arguments:\n\n```\nmy_function(1,\
    \ 2, 3) # prints 1 2 3\nmy_function('a', 'b', 'c', 'd') # prints a b c d\nmy_function()\
    \ # prints nothing\n```\n\n**kwargs is used to pass a variable number of keyword\
    \ arguments to a function. When you use **kwargs in a function definition, it\
    \ tells Python to collect any remaining keyword arguments into a dictionary. For\
    \ example:\n\n```\ndef my_function(**kwargs):\n    for key, value in kwargs.items():\n\
    \        print(f\"{key}: {value}\")\n```\n\nIn this example, the function my_function()\
    \ accepts any number of keyword arguments and prints each argument key-value pair\
    \ to the console. You can call the function with any number of keyword arguments:\n\
    \n```\nmy_function(name=\"Alice\", age=25) # prints name: Alice age: 25\n```"
- md: "## Function design\n\n### Writing pure functions\n\nPython functions can be\
    \ classified into two categories: pure functions and impure functions. Pure functions\
    \ are functions that don't cause side effects and always produce the same output\
    \ for the same input. Pure functions are predictable, easy to test, and don't\
    \ rely on any external state. In this note, we'll discuss how to write pure functions\
    \ in Python and provide some sample code to illustrate the concept.\n\nAvoid modifying\
    \ global state:\n\nA pure function should not modify any global state or modify\
    \ any variables outside of its scope. This includes modifying global variables\
    \ or objects that are passed by reference to the function.\n\n```python\n# Impure\
    \ function that modifies a global variable\ncount = 0\n\ndef impure_add_one():\n\
    \    global count\n    count += 1\n\n# Pure function that doesn't modify any global\
    \ state\ndef pure_add_one(num):\n    return num + 1\n```\n\nAvoid modifying input\
    \ parameters:\n\nA pure function should not modify its input parameters. This\
    \ means that the function should create a new object or copy the input object\
    \ if it needs to modify it.\n\n```python\n# Impure function that modifies an input\
    \ parameter\ndef impure_append_list(item, lst):\n    lst.append(item)\n\n# Pure\
    \ function that creates a new list and\n# doesn't modify the input\ndef pure_append_list(item,\
    \ lst):\n    return lst + [item]\n```\n\nAvoid relying on external state:\n\n\
    A pure function should not rely on any external state that could change its behavior.\
    \ This includes reading from global variables or accessing data from external\
    \ sources like files or databases.\n\n```python\n# Impure function that relies\
    \ on external state\ndef impure_get_current_time():\n    return datetime.datetime.now()\n\
    \n# Pure function that takes a time parameter\n# and doesn't rely on external\
    \ state\ndef pure_format_time(time):\n    return time.strftime(\"%Y-%m-%d %H:%M:%S\"\
    )\n```\n\nReturn a value:\n\nA pure function should always return a value. This\
    \ value should be determined solely by the input parameters and not by any external\
    \ state.\n\n```python\n# Impure function that prints a value instead\n# of returning\
    \ it\ndef impure_print_hello(name):\n    print(\"Hello, \" + name)\n\n# Pure function\
    \ that returns a greeting string\ndef pure_get_greeting(name):\n    return \"\
    Hello, \" + name\n```\n\nHere's an example of a pure function that calculates\
    \ the area of a rectangle:\n\n```python\ndef calculate_area(length, width):\n\
    \    return length * width\n```\n\nThis function takes two input parameters (length\
    \ and width) and returns their product (the area of the rectangle). It doesn't\
    \ modify any input parameters, global state, or rely on any external state.\n\n\
    In summary, writing pure functions in Python requires avoiding modifying global\
    \ state, input parameters, or relying on external state. By following these principles,\
    \ we can create functions that are predictable, easy to test, and don't have any\
    \ unintended side effects.\n\n### Writing functions with side effects\n\nIn Python,\
    \ functions with side effects are those that modify state outside of their own\
    \ scope. These side effects can take many forms, such as modifying global variables,\
    \ changing the state of an object, or interacting with external systems like databases\
    \ or files. While pure functions are often preferred in functional programming,\
    \ there are cases where side effects are necessary to achieve a specific functionality.\
    \ In this note, we'll discuss how to write functions with side effects in Python\
    \ and provide some sample code to illustrate the concept.\n\nUse global variables\
    \ with care:\n\nGlobal variables are variables that are declared outside of any\
    \ function and are accessible from any part of the program. Functions that modify\
    \ global variables can be useful, but they can also introduce unexpected behavior\
    \ and make code hard to maintain.\n\n```python\n# Global variable\ncount = 0\n\
    \n# Function that modifies the global variable\ndef increment_count():\n    global\
    \ count\n    count += 1\n\nincrement_count()\nprint(count) # Output: 1\n```\n\n\
    In this example, we have a global variable count and a function increment_count\
    \ that modifies it. When we call increment_count, the value of count is incremented\
    \ by 1. However, using global variables can make it difficult to track where changes\
    \ are made and can introduce bugs when different parts of the program modify the\
    \ same variable.\n\nModify object state with methods:\n\nObject-oriented programming\
    \ in Python allows us to modify object state with methods. A method is a function\
    \ that is associated with a specific object or class and can modify its internal\
    \ state.\n\n```python\nclass BankAccount:\n    def __init__(self, balance):\n\
    \        self.balance = balance\n\n    def deposit(self, amount):\n        self.balance\
    \ += amount\n\n    def withdraw(self, amount):\n        self.balance -= amount\n\
    \naccount = BankAccount(100)\naccount.deposit(50)\nprint(account.balance) # Output:\
    \ 150\naccount.withdraw(25)\nprint(account.balance) # Output: 125\n```\n\nIn this\
    \ example, we have a class BankAccount that has methods deposit and withdraw that\
    \ modify the balance attribute. When we create an instance of BankAccount, we\
    \ can deposit or withdraw funds by calling the respective methods. This allows\
    \ us to encapsulate the state of the object and provides a clean interface for\
    \ interacting with it.\n\nInteract with external systems using libraries:\n\n\
    Sometimes we need to interact with external systems like databases, files, or\
    \ web services to achieve a specific functionality. In Python, we can use libraries\
    \ and modules to abstract away the details of these interactions and provide a\
    \ clean interface for our functions.\n\n```python\nimport requests\n\ndef fetch_data(url):\n\
    \    response = requests.get(url)\n    return response.content\n```\n\nIn this\
    \ example, we have a function fetch_data that uses the requests library to make\
    \ an HTTP request to a given URL and return the response content. By using a library,\
    \ we can hide the complexity of making network requests and provide a simple function\
    \ for our code to interact with.\n\nIn summary, functions with side effects in\
    \ Python can be useful for achieving specific functionality, but care should be\
    \ taken to minimize their impact on the rest of the program. By using global variables\
    \ with care, modifying object state with methods, and interacting with external\
    \ systems using libraries, we can write functions that are easier to reason about\
    \ and maintain.\n\n### Writing functions that modify mutable arguments\n\nIn Python,\
    \ mutable arguments are those that can be modified in place, such as lists, dictionaries,\
    \ and sets. When we pass a mutable argument to a function, the function can modify\
    \ it and these modifications persist outside of the function's scope. However,\
    \ modifying mutable arguments can introduce unexpected behavior and make code\
    \ hard to maintain. In this note, we'll discuss how to write functions that modify\
    \ mutable arguments in Python and provide some sample code to illustrate the concept.\n\
    \nModify arguments in place:\n\nOne way to modify mutable arguments in a function\
    \ is to modify them in place. This means that we modify the original object directly\
    \ instead of creating a new object.\n\n```python\ndef add_item_to_list(item, lst):\n\
    \    lst.append(item)\n\nmy_list = [1, 2, 3]\nadd_item_to_list(4, my_list)\nprint(my_list)\
    \ # Output: [1, 2, 3, 4]\n```\n\nIn this example, we have a function add_item_to_list\
    \ that takes an item and a list and appends the item to the list. When we call\
    \ this function with 4 and my_list, the list is modified in place and the new\
    \ value [1, 2, 3, 4] is printed.\n\nReturn a new object:\n\nAnother way to modify\
    \ mutable arguments in a function is to create a new object and return it. This\
    \ approach can be useful when we want to preserve the original object and create\
    \ a modified copy."
  mdcn: "## 函数设计\n\n### 编写纯函数\n\nPython 函数可以分为两类：纯函数和非纯函数。纯函数是指不会产生副作用，并且对于相同输入总是产生相同输出的函数。纯函数具有可预测性、易于测试，并且不依赖任何外部状态。在本笔记中，我们将讨论如何在\
    \ Python 中编写纯函数，并提供一些示例代码来说明这个概念。\n\n避免修改全局状态：\n\n纯函数不应修改任何全局状态或修改其作用域之外的任何变量。这包括修改全局变量或通过引用传递给函数的对象。\n\
    \n```python\n# 修改全局变量的非纯函数\ncount = 0\n\ndef impure_add_one():\n    global count\n\
    \    count += 1\n\n# 不修改任何全局状态的纯函数\ndef pure_add_one(num):\n    return num + 1\n\
    ```\n\n避免修改输入参数：\n\n纯函数不应修改其输入参数。这意味着如果函数需要修改输入，它应该创建一个新对象或复制输入对象。\n\n```python\n\
    # 修改输入参数的非纯函数\ndef impure_append_list(item, lst):\n    lst.append(item)\n\n# 创建新列表且不修改输入的纯函数\n\
    def pure_append_list(item, lst):\n    return lst + [item]\n```\n\n避免依赖外部状态：\n\n\
    纯函数不应依赖任何可能改变其行为的外部状态。这包括读取全局变量或从文件或数据库等外部源访问数据。\n\n```python\n# 依赖外部状态的非纯函数\n\
    def impure_get_current_time():\n    return datetime.datetime.now()\n\n# 接受时间参数且不依赖外部状态的纯函数\n\
    def pure_format_time(time):\n    return time.strftime(\"%Y-%m-%d %H:%M:%S\")\n\
    ```\n\n返回一个值：\n\n纯函数应始终返回一个值。这个值应仅由输入参数决定，而不是由任何外部状态决定。\n\n```python\n# 打印值而不是返回值的非纯函数\n\
    def impure_print_hello(name):\n    print(\"Hello, \" + name)\n\n# 返回问候字符串的纯函数\n\
    def pure_get_greeting(name):\n    return \"Hello, \" + name\n```\n\n这是一个计算矩形面积的纯函数示例：\n\
    \n```python\ndef calculate_area(length, width):\n    return length * width\n```\n\
    \n该函数接受两个输入参数（长度和宽度）并返回它们的乘积（矩形的面积）。它不修改任何输入参数、全局状态，也不依赖任何外部状态。\n\n总之，在 Python\
    \ 中编写纯函数需要避免修改全局状态、输入参数或依赖外部状态。遵循这些原则，我们可以创建可预测、易于测试且没有任何意外副作用的函数。\n\n### 编写具有副作用的函数\n\
    \n在 Python 中，具有副作用的函数是指修改其自身作用域之外状态的函数。这些副作用可以采取多种形式，例如修改全局变量、改变对象的状态或与数据库或文件等外部系统交互。虽然在函数式编程中通常更倾向于使用纯函数，但在某些情况下，副作用对于实现特定功能是必要的。在本笔记中，我们将讨论如何在\
    \ Python 中编写具有副作用的函数，并提供一些示例代码来说明这个概念。\n\n谨慎使用全局变量：\n\n全局变量是在任何函数之外声明的变量，可以从程序的任何部分访问。修改全局变量的函数可能很有用，但它们也可能引入意外行为并使代码难以维护。\n\
    \n```python\n# 全局变量\ncount = 0\n\n# 修改全局变量的函数\ndef increment_count():\n    global\
    \ count\n    count += 1\n\nincrement_count()\nprint(count) # 输出：1\n```\n\n在这个例子中，我们有一个全局变量\
    \ `count` 和一个修改它的函数 `increment_count`。当我们调用 `increment_count` 时，`count` 的值增加 1。然而，使用全局变量可能难以跟踪更改发生的位置，并且当程序的不同部分修改同一变量时可能引入错误。\n\
    \n使用方法修改对象状态：\n\nPython 中的面向对象编程允许我们使用方法修改对象状态。方法是与特定对象或类关联的函数，可以修改其内部状态。\n\n\
    ```python\nclass BankAccount:\n    def __init__(self, balance):\n        self.balance\
    \ = balance\n\n    def deposit(self, amount):\n        self.balance += amount\n\
    \n    def withdraw(self, amount):\n        self.balance -= amount\n\naccount =\
    \ BankAccount(100)\naccount.deposit(50)\nprint(account.balance) # 输出：150\naccount.withdraw(25)\n\
    print(account.balance) # 输出：125\n```\n\n在这个例子中，我们有一个 `BankAccount` 类，它有 `deposit`\
    \ 和 `withdraw` 方法来修改 `balance` 属性。当我们创建 `BankAccount` 的实例时，我们可以通过调用相应的方法来存入或取出资金。这允许我们封装对象的状态，并提供一个清晰的接口来与之交互。\n\
    \n使用库与外部系统交互：\n\n有时我们需要与数据库、文件或 Web 服务等外部系统交互以实现特定功能。在 Python 中，我们可以使用库和模块来抽象这些交互的细节，并为我们的函数提供一个清晰的接口。\n\
    \n```python\nimport requests\n\ndef fetch_data(url):\n    response = requests.get(url)\n\
    \    return response.content\n```\n\n在这个例子中，我们有一个 `fetch_data` 函数，它使用 `requests`\
    \ 库向给定 URL 发出 HTTP 请求并返回响应内容。通过使用库，我们可以隐藏发出网络请求的复杂性，并为我们的代码提供一个简单的交互函数。\n\n总之，Python\
