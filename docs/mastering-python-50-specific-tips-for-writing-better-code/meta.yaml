    \n## 集合模块\n\n### 使用 namedtuple\n\nPython 的 `collections` 模块提供了几种有用的数据结构，这些结构不包含在标准内置类型中。其中一种数据结构是\
    \ `namedtuple`，它是 `tuple` 的一个子类，具有命名字段。在本节中，我们将讨论如何使用 `namedtuple` 并提供一些示例代码。\n\
    \n`namedtuple` 使用 `collections.namedtuple()` 工厂函数定义。该函数的第一个参数是新元组类型的名称，第二个参数是一个字符串，包含由空格或逗号分隔的字段名称。以下是一个示例：\n\
    \n```python\nfrom collections import namedtuple\n\nPoint = namedtuple('Point',\
    \ ['x', 'y'])\np = Point(1, 2)\nprint(p)\nprint(p.x)\nprint(p.y)\n```\n\n在这个例子中，我们定义了一个名为\
