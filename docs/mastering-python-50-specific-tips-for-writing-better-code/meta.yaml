    \ `@repeat(3)` 装饰 `say_hello()` 函数，这通过将函数调用重复三次来修改它。\n\n当我们调用 `say_hello(\"John\"\
    )` 时，输出将是：\n\n```\nHello, John!\nHello, John!\nHello, John!\n```\n\n### 使用多个装饰器\n\
    \n我们还可以使用多个装饰器来修改函数。在这种情况下，装饰器按从上到下的顺序应用。\n\n这是一个使用多个装饰器的示例：\n\n```python\ndef\
    \ bold_decorator(func):\n    def wrapper(*args, **kwargs):\n        return f\"\
    <b>{func(*args, **kwargs)}</b>\"\n    return wrapper\n\ndef italic_decorator(func):\n\
    \    def wrapper(*args, **kwargs):\n        return f\"<i>{func(*args, **kwargs)}</i>\"\
    \n    return wrapper\n\n@bold_decorator\n@italic_decorator\ndef say_hello():\n\
    \    return \"Hello!\"\n\nprint(say_hello())\n```\n\n在这个例子中，我们定义了两个装饰器 `bold_decorator()`\
    \ 和 `italic_decorator()`，它们通过添加 HTML 标签来修改原始函数的输出。然后我们使用 `@bold_decorator` 和 `@italic_decorator`\
    \ 装饰 `say_hello()` 函数，这通过按顺序添加两个装饰器来修改它。\n\n当我们调用 `say_hello()` 时，输出将是：\n\n```\n\
    <b><i>Hello!</i></b>\n```\n\n## 编写接受参数的装饰器\n\n在 Python 中，装饰器是接受一个函数作为输入并返回修改后的函数作为输出的函数。装饰器可用于修改函数的行为，而无需更改其源代码。在某些情况下，我们可能想编写一个接受参数的装饰器。在这种情况下，我们需要定义一个接受参数并返回一个装饰器函数的函数，该装饰器函数接受原始函数作为输入。\n\
    \n### 定义一个接受参数的装饰器\n\n要定义一个接受参数的装饰器，我们定义一个接受参数并返回一个装饰器函数的函数，该装饰器函数接受原始函数作为输入。然后装饰器函数定义一个新函数，该函数以某种方式修改原始函数并返回修改后的函数。\n\
    \n这是一个接受参数的装饰器示例：\n\n```python\ndef repeat(num):\n    def decorator(func):\n \
    \       def wrapper(*args, **kwargs):\n            for i in range(num):\n    \
    \            func(*args, **kwargs)\n        return wrapper\n    return decorator\n\
    \n@repeat(3)\ndef say_hello(name):\n    print(f\"Hello, {name}!\")\n\nsay_hello(\"\
    John\")\n```\n\n在这个例子中，我们定义了一个 `repeat()` 函数，它接受一个参数 `num`，定义了一个装饰器函数，该函数接受原始函数\
    \ `func` 作为输入，定义了一个新函数 `wrapper()`，该函数将对 `func()` 的调用重复 `num` 次，并返回 `wrapper()`。然后我们使用\
    \ `@repeat(3)` 装饰 `say_hello()` 函数，这通过将函数调用重复三次来修改它。\n\n当我们调用 `say_hello(\"John\"\
    )` 时，输出将是：\n\n```\nHello, John!\nHello, John!\nHello, John!\n```\n\n### 向装饰器本身传递参数\n\
    \n在某些情况下，我们可能想向装饰器本身传递参数。在这种情况下，我们需要定义一个接受参数并返回装饰器函数的函数。\n\n这是一个接受参数的装饰器示例：\n\n\
    ```python\ndef greeting_decorator(greeting):\n    def decorator(func):\n     \
    \   def wrapper(*args, **kwargs):\n            print(greeting)\n            func(*args,\
    \ **kwargs)\n        return wrapper\n    return decorator\n\n@greeting_decorator(\"\
    Welcome!\")\ndef say_hello(name):\n    print(f\"Hello, {name}!\")\n\nsay_hello(\"\
    John\")\n```\n\n在这个例子中，我们定义了一个 `greeting_decorator()` 函数，它接受一个参数 `greeting`，定义了一个装饰器函数，该函数接受原始函数\
    \ `func` 作为输入，定义了一个新函数 `wrapper()`，该函数在调用 `func()` 之前添加问候语，并返回 `wrapper()`。然后我们使用\
    \ `@greeting_decorator(\"Welcome!\")` 装饰 `say_hello()` 函数，这通过在调用前添加问候语来修改它。\n\n\
    当我们调用 `say_hello(\"John\")` 时，输出将是：\n\n```\nWelcome!\nHello, John!\n```\n\n##\
    \ 编写类装饰器\n\nPython 装饰器是该语言的一个强大功能，允许你在不更改其源代码的情况下修改或增强函数或类的行为。它们本质上是接受另一个函数或类作为参数、对其进行修改并返回修改后版本的函数。\n\
    \n在本笔记中，我们将重点介绍在 Python 中编写类装饰器。类装饰器的工作方式与函数装饰器类似，但它们接受一个类作为参数，而不是一个函数。\n\n要在\
    \ Python 中编写类装饰器，你需要定义一个接受一个类作为参数并返回该类的修改版本的函数。修改后的类可以具有额外的方法或属性，也可以修改现有方法的行为。\n\
    \n这是一个简单的类装饰器示例，它向类添加一个 \"version\" 属性：\n\n```python\ndef add_version(cls):\n\
    \    cls.version = \"1.0\"\n    return cls\n\n@add_version\nclass MyClass:\n \
    \   pass\n\nprint(MyClass.version) # Output: 1.0\n```\n\n在上面的例子中，`add_version`\
    \ 函数接受一个类 `cls` 作为参数，向其添加一个 `version` 属性，并返回修改后的类。然后 `@add_version` 装饰器应用于 `MyClass`\
    \ 类，这通过添加 `version` 属性来修改它。\n\n你还可以链接多个类装饰器来修改一个类：\n\n```python\ndef add_version(cls):\n\
    \    cls.version = \"1.0\"\n    return cls\n\ndef add_author(cls):\n    cls.author\
    \ = \"John Doe\"\n    return cls\n\n@add_version\n@add_author\nclass MyClass:\n\
    \    pass\n\nprint(MyClass.version) # Output: 1.0\nprint(MyClass.author) # Output:\
    \ John Doe\n```\n\n在上面的例子中，`add_version` 和 `add_author` 类装饰器使用 `@` 符号链接在一起。当定义\
    \ `MyClass` 类时，两个装饰器按它们出现的顺序应用，结果是一个同时具有 `version` 和 `author` 属性的类。\n\n类装饰器还可以修改类中方法的行为。例如，以下类装饰器记录类中所有方法的执行时间：\n\
    \n```python\nimport time\n\ndef log_execution_time(cls):\n    for name, value\
    \ in vars(cls).items():\n        if callable(value):\n            def new_func(*args,\
    \ **kwargs):\n                start_time = time.time()\n                result\
    \ = value(*args, **kwargs)\n                end_time = time.time()\n         \
    \       print(f\"Execution time of {name}: {end_time - start_time}\")\n      \
    \          return result\n            setattr(cls, name, new_func)\n    return\
    \ cls\n\n@log_execution_time\nclass MyClass:\n    def method1(self):\n       \
    \ time.sleep(1)\n    def method2(self):\n        time.sleep(2)\n```"
