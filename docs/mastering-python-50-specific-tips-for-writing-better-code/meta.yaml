    \ which method will be called if two or more parent classes have methods with\
    \ the same name.\n\nIn Python 3, the MRO is determined using the C3 linearization\
    \ algorithm, which guarantees that the method resolution order is consistent and\
    \ respects local precedence ordering and monotonicity. You can access the MRO\
