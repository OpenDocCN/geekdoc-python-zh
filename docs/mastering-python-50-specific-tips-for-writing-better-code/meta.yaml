    \n## 使用 SQLite\n\nSQLite 是一个轻量级的关系数据库管理系统，包含在 Python 的标准库中。它提供了一种简单高效的方式来以持久化格式存储和检索数据。在本节中，我们将探讨如何在序列化和持久化中使用\
    \ SQLite，包括如何创建和操作表，以及如何使用 SQL 命令存储和检索数据。\n\n### 创建 SQLite 数据库\n\n使用 SQLite 的第一步是创建一个新的数据库。这可以使用\
    \ `sqlite3` 模块来完成，该模块提供了一种连接到数据库并执行 SQL 命令的简单方法。\n\n```python\nimport sqlite3\n\
    \n# Connect to a new database or open an existing one\nconn = sqlite3.connect(\"\
    my_database.db\")\n\n# Create a new table\nconn.execute(\n    \"\"\"\n    CREATE\
    \ TABLE IF NOT EXISTS users (\n        id INTEGER PRIMARY KEY AUTOINCREMENT,\n\
    \        name TEXT NOT NULL,\n        age INTEGER NOT NULL,\n        city TEXT\
    \ NOT NULL\n    )\n    \"\"\"\n)\n\n# Commit the changes\nconn.commit()\n\n# Close\
    \ the connection\nconn.close()\n```\n\n在上面的代码中，我们使用 `sqlite3.connect()` 方法创建一个新的数据库，并执行一个\
    \ SQL 命令来创建一个名为 `users` 的新表。我们为该表定义了三个列，包括一个自动递增的 `id` 列、一个不能为空的 `name` 列、一个不能为空的\
    \ `age` 列和一个不能为空的 `city` 列。\n\n### 存储和检索数据\n\n一旦我们创建了一个表，我们就可以使用 SQL 命令来存储和检索数据。\n\
    \n```python\nimport sqlite3\n\n# Connect to the database\nconn = sqlite3.connect(\"\
    my_database.db\")\n\n# Insert some data into the table\nconn.execute(\n    \"\"\
