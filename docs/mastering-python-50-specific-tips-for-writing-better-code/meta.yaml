- md: "## Using ChainMap\n\nChainMap is a built-in module in Python that provides\
    \ a way to combine multiple dictionaries or mappings into a single, unified view.\
    \ It acts as a single dictionary that contains all the keys and values from the\
    \ input dictionaries, and allows us to perform lookups and modifications on the\
    \ entire chain of mappings at once. In this note, we will discuss how to use the\
    \ ChainMap module in Python.\n\nTo use the ChainMap module, we first need to import\
    \ it. This can be done using the following code:\n\n```python\nfrom collections\
    \ import ChainMap\n```\n\nNow, let's say we have two dictionaries, one representing\
    \ the default configuration settings and the other representing the user-defined\
    \ settings. We want to merge these two dictionaries into a single dictionary with\
    \ the user-defined settings taking precedence over the default settings. We can\
    \ use the ChainMap module to do this as follows:\n\n```python\ndefault_settings\
    \ = {'debug': False, 'log_level': 'INFO', 'timeout': 30}\nuser_settings = {'log_level':\
    \ 'DEBUG', 'timeout': 60}\n\nsettings = ChainMap(user_settings, default_settings)\n\
    print(settings)\n```\n\nThis will output:\n\n```\nChainMap({'log_level': 'DEBUG',\
    \ 'timeout': 60}, {'debug': False, 'log_level': 'INFO', 'timeout': 30})\n```\n\
    \nAs we can see, the ChainMap object contains all the keys and values from both\
    \ dictionaries, with the user-defined settings taking precedence over the default\
    \ settings.\n\nWe can now perform lookups and modifications on the settings dictionary,\
    \ and these will be reflected in both the user_settings and default_settings dictionaries.\
    \ For example, to get the value of the 'log_level' key, we can use the following\
    \ code:\n\n```python\nprint(settings['log_level'])\n```\n\nThis will output:\n\
    \n```\nDEBUG\n```\n\nTo modify the value of the 'timeout' key, we can use the\
    \ following code:\n\n```python\nsettings['timeout'] = 90\nprint(default_settings['timeout'])\n\
    print(user_settings['timeout'])\n```\n\nThis will output:\n\n```\n30\n60\n```\n\
    \nAs we can see, the value of the 'timeout' key in the default_settings dictionary\
    \ has not changed, while the value in the user_settings dictionary has also remained\
    \ unchanged. This is because the ChainMap object only modifies the first dictionary\
    \ in the chain that contains the key.\n\nIn addition to dictionaries, ChainMap\
    \ can also be used with other mappings such as OrderedDicts and defaultdicts.\
    \ For example, to merge two OrderedDicts into a single OrderedDict with the keys\
    \ and values in the order they were added, we can use the following code:\n\n\
    ```python\nfrom collections import OrderedDict\n\nod1 = OrderedDict([('a', 1),\
    \ ('b', 2)])\nod2 = OrderedDict([('c', 3), ('d', 4)])\n\nod = ChainMap(od2, od1)\n\
    print(od)\n```\n\nThis will output:\n\n```\nChainMap(OrderedDict([('c', 3), ('d',\
    \ 4)]), OrderedDict([('a', 1), ('b', 2)]))\n```\n\nThe ChainMap module is a very\
    \ useful tool for combining multiple dictionaries or mappings into a single, unified\
    \ view. Its simple interface and efficient implementation make it a great choice\
    \ for dealing with complex configuration settings or other scenarios where multiple\
    \ mappings need to be combined.\n\n## Using UserDict\n\nUserDict is a built-in\
    \ module in Python that provides a convenient way to create our own dictionary-like\
    \ objects. It is a subclass of the built-in dict class, but with some additional\
    \ features that make it easier to customize the behavior of the dictionary. In\
    \ this note, we will discuss how to use the UserDict module in Python.\n\nTo use\
    \ the UserDict module, we first need to import it. This can be done using the\
    \ following code:\n\n```python\nfrom collections import UserDict\n```\n\nNow,\
    \ let's say we want to create a dictionary-like object that allows us to access\
    \ the values using both keys and attribute names. We can create a new class that\
    \ inherits from the UserDict class and implements the `__getattr__` method to\
    \ allow attribute access. Here's an example:\n\n```python\nclass MyDict(UserDict):\n\
    \    def __getattr__(self, key):\n        if key in self.data:\n            return\
    \ self.data[key]\n        elif key in self.__dict__:\n            return self.__dict__[key]\n\
    \        else:\n            raise AttributeError(f\"'MyDict' object has no attribute\
    \ '{key}'\")\n```\n\nIn this example, we define a new class called MyDict that\
    \ inherits from the UserDict class. We override the `__getattr__` method to allow\
    \ attribute access to the dictionary keys. The method first checks if the key\
    \ is in the self.data dictionary, and returns the value if it is. If the key is\
    \ not in the self.data dictionary, it checks if it is in the instance's `__dict__`\
    \ attribute, which contains the instance's attributes. If the key is not found\
    \ in either dictionary, it raises an AttributeError.\n\nWe can now create an instance\
    \ of this class and access the values using both keys and attributes. Here's an\
    \ example:\n\n```python\nd = MyDict({'a': 1, 'b': 2})\nprint(d.a)\nprint(d['b'])\n\
    ```\n\nThis will output:\n\n```\n1\n2\n```\n\nAs we can see, we can access the\
    \ values using both attributes and keys.\n\nWe can also override other methods\
    \ of the UserDict class to customize the behavior of our dictionary-like object.\
    \ For example, we can override the `__setitem__` method to allow setting values\
    \ using attributes as well as keys. Here's an example:\n\n```python\nclass MyDict(UserDict):\n\
    \    def __getattr__(self, key):\n        if key in self.data:\n            return\
    \ self.data[key]\n        elif key in self.__dict__:\n            return self.__dict__[key]\n\
    \        else:\n            raise AttributeError(f\"'MyDict' object has no attribute\
    \ '{key}'\")\n\n    def __setitem__(self, key, value):\n        self.data[key]\
    \ = value\n        setattr(self, key, value)\n```\n\nIn this example, we add a\
    \ new `__setitem__` method that sets the value using both the key and the attribute\
    \ name. We use the setattr method to set the attribute with the same name as the\
    \ key to the value. We can now create an instance of this class and set values\
    \ using both keys and attributes. Here's an example:\n\n```python\nd = MyDict()\n\
    d.a = 1\nd['b'] = 2\nprint(d.a)\nprint(d['b'])\n```\n\nThis will output:\n\n```\n\
    1\n2\n```\n\nAs we can see, we can set values using both attributes and keys.\n\
    \nThe UserDict module is a very useful tool for creating custom dictionary-like\
    \ objects that can be accessed using both keys and attributes. Its simple interface\
    \ and flexible implementation make it a great choice for scenarios where custom\
    \ dictionary behavior is needed.\n\n## Using UserList\n\nUserList is a built-in\
    \ module in Python that provides a way to create list-like objects with customized\
    \ behavior. It is a subclass of the built-in list class, but with some additional\
    \ features that make it easier to customize the behavior of the list. In this\
    \ note, we will discuss how to use the UserList module in Python.\n\nTo use the\
    \ UserList module, we first need to import it. This can be done using the following\
    \ code:\n\n```python\nfrom collections import UserList\n```\n\nNow, let's say\
    \ we want to create a list-like object that always returns the sum of the values\
    \ in the list when we call the sum method. We can create a new class that inherits\
    \ from the UserList class and implements the sum method to return the sum of the\
    \ values in the list. Here's an example:\n\n```python\nclass MyList(UserList):\n\
    \    def sum(self):\n        return sum(self.data)\n```\n\nIn this example, we\
    \ define a new class called MyList that inherits from the UserList class. We add\
    \ a new sum method that returns the sum of the values in the list by calling the\
    \ built-in sum function on the self.data attribute, which contains the list of\
    \ values.\n\nWe can now create an instance of this class and call the sum method\
    \ to get the sum of the values in the list. Here's an example:\n\n```python\n\
    l = MyList([1, 2, 3, 4])\nprint(l.sum())\n```\n\nThis will output:\n\n```\n10\n\
    ```\n\nAs we can see, the sum method returns the sum of the values in the list."
  mdcn: "## 使用 ChainMap\n\nChainMap 是 Python 中的一个内置模块，它提供了一种将多个字典或映射组合成单一、统一视图的方法。它就像一个包含所有输入字典键值的单一字典，允许我们对整个映射链进行查找和修改。在本笔记中，我们将讨论如何在\
    \ Python 中使用 ChainMap 模块。\n\n要使用 ChainMap 模块，我们首先需要导入它。可以使用以下代码完成：\n\n```python\n\
    from collections import ChainMap\n```\n\n现在，假设我们有两个字典，一个代表默认配置设置，另一个代表用户定义的设置。我们希望将这两个字典合并成一个，其中用户定义的设置优先于默认设置。我们可以使用\
    \ ChainMap 模块来实现，如下所示：\n\n```python\ndefault_settings = {'debug': False, 'log_level':\
    \ 'INFO', 'timeout': 30}\nuser_settings = {'log_level': 'DEBUG', 'timeout': 60}\n\
    \nsettings = ChainMap(user_settings, default_settings)\nprint(settings)\n```\n\
    \n这将输出：\n\n```\nChainMap({'log_level': 'DEBUG', 'timeout': 60}, {'debug': False,\
    \ 'log_level': 'INFO', 'timeout': 30})\n```\n\n如我们所见，ChainMap 对象包含了两个字典的所有键和值，其中用户定义的设置优先于默认设置。\n\
    \n我们现在可以对 settings 字典进行查找和修改，这些更改将反映在 user_settings 和 default_settings 字典中。例如，要获取\
