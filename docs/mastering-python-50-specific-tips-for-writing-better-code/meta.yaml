    +   - "Simple is better than complex": This principle encourages developers to
    write code that is easy to understand and maintain. This can be achieved by breaking
    down complex tasks into smaller, simpler functions or modules.

    - "Readability counts": This principle emphasizes the importance of writing code
    that is easy to read and understand. This can be achieved by using consistent
    indentation, commenting the code where necessary, and adhering to a consistent
    coding style.


    Let''s take a look at some sample code that demonstrates the principles of the
    Zen of Python:


    ```

    # Example 1: Beautiful is better than ugly.

