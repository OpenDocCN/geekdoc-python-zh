- md: "## 函数参数\n\n### 位置参数\n\n位置参数是函数参数最基本的形式。这些参数按照函数定义中的顺序传递给函数。\n\n```python\n\
    def add_numbers(x, y):\n    return x + y\n\nresult = add_numbers(3, 5)\nprint(result)\
    \ # Output: 8\n```\n\n在上面的例子中，`x` 和 `y` 是传递给 `add_numbers` 函数的两个位置参数。参数的顺序很重要，所以如果我们交换参数的顺序，会得到不同的结果。\n\
    \n### 关键字参数\n\n关键字参数是一种使用参数名传递参数给函数的方式。这允许我们以任何顺序传递参数，只要我们指定了参数名。\n\n```python\n\
    def subtract_numbers(x, y):\n    return x - y\n\nresult = subtract_numbers(x=10,\
    \ y=3)\nprint(result) # Output: 7\n```\n\n在上面的例子中，我们使用关键字参数将 `x` 和 `y` 传递给 `subtract_numbers`\
    \ 函数。我们也可以在同一个函数调用中混合使用位置参数和关键字参数：\n\n```python\nresult = subtract_numbers(10,\
    \ y=3)\nprint(result) # Output: 7\n```\n\n### 默认参数\n\n默认参数是一种为函数参数指定默认值的方式。如果在调用函数时未传递该参数，则使用默认值。\n\
    \n```python\ndef greet(name, greeting=\"Hello\"):\n    print(f\"{greeting}, {name}!\"\
    )\n\ngreet(\"John\") # Output: Hello, John!\ngreet(\"Mary\", \"Hi\") # Output:\
    \ Hi, Mary!\n```\n\n在上面的例子中，我们使用默认参数来指定未提供问候语时的默认问候语。如果我们传递了 `greeting` 参数，它将覆盖默认值。\n\
    \n### 可变长度参数\n\n可变长度参数允许函数接受任意数量的参数。Python 中有两种类型的可变长度参数：\n\n- `*args`：允许函数接受任意数量的位置参数。\n\
    - `**kwargs`：允许函数接受任意数量的关键字参数。\n\n```python\ndef multiply_numbers(*args):\n  \
    \  result = 1\n    for arg in args:\n        result *= arg\n    return result\n\
    \nresult = multiply_numbers(2, 3, 4)\nprint(result) # Output: 24\n\ndef print_values(**kwargs):\n\
    \    for key, value in kwargs.items():\n        print(f\"{key} = {value}\")\n\n\
    print_values(name=\"John\", age=30, city=\"New York\")\n# Output:\n# name = John\n\
    # age = 30\n# city = New York\n```\n\n在上面的例子中，我们在 `multiply_numbers` 函数中使用 `*args`\
    \ 来接受任意数量的位置参数，在 `print_values` 函数中使用 `**kwargs` 来接受任意数量的关键字参数。\n\n## 文档化函数\n\n\
    在 Python 中文档化函数是编写清晰、可维护代码的重要方面。一个文档完善的函数有助于其他开发者理解其目的、输入、输出以及任何潜在的副作用。在本笔记中，我们将讨论如何在\
    \ Python 中文档化函数，包括使用文档字符串和注解。\n\n### Python 中的文档字符串\n\n文档字符串是在 Python 中文档化函数、模块和类的一种方式。文档字符串是出现在模块、函数或类定义中的第一个语句的字符串。文档字符串可以使用内置的\
    \ `help()` 函数访问，或者在交互式 Python 会话中输入函数名后跟问号来访问。\n\nPython 中有两种类型的文档字符串：单行文档字符串和多行文档字符串。单行文档字符串用于简单函数，由用三引号括起来的单行文本组成。\n\
    \n```python\ndef add_numbers(x, y):\n    \"\"\"Add two numbers and return the\
    \ result.\"\"\"\n    return x + y\n```\n\n多行文档字符串用于更复杂的函数，由简要摘要后跟函数目的、输入、输出和任何副作用的更详细描述组成。多行文档字符串用三引号括起来，可以跨越多行。\n\
    \n```python\ndef greet(name):\n    \"\"\"\n    Greet the given name.\n\n    This\
    \ function takes a name as input and prints a greeting message to\n    the console.\n\
    \    It does not return any value.\n\n    Args:\n        name (str): The name\
    \ to greet.\n\n    Returns:\n        None\n    \"\"\"\n    print(f\"Hello, {name}!\"\
    )\n```\n\n### Python 中的注解\n\n函数注解是文档化函数的另一种方式。注解是可选的元数据，可以使用冒号语法添加到函数参数和返回值。\n\
    \n```python\ndef add_numbers(x: int, y: int) -> int:\n    \"\"\"Add two integers\
    \ and return the result.\"\"\"\n    return x + y\n```\n\n在上面的例子中，我们使用注解来指定 `x`\
    \ 和 `y` 参数应该是整数，并且函数应该返回一个整数。\n\n注解也可以用于指定默认参数值和可变长度参数。\n\n```python\ndef greet(name:\
    \ str = \"World\", *args: str, **kwargs: str) -> None:\n    \"\"\"\n    Greet\
    \ the given name and print any additional arguments and keyword arguments.\n\n\
    \    This function takes a name as input and prints a greeting message to the\
    \ console.\n    It can also take additional positional and keyword arguments,\
    \ which will be printed.\n\n    Args:\n        name (str): The name to greet.\
    \ Defaults to \"World\".\n        args (str): Additional positional arguments.\n\
    \        kwargs (str): Additional keyword arguments.\n\n    Returns:\n       \
    \ None\n    \"\"\"\n    print(f\"Hello, {name}!\")\n    if args:\n        print(\"\
    Additional arguments:\")\n        for arg in args:\n            print(f\"- {arg}\"\
    )\n    if kwargs:\n        print(\"Additional keyword arguments:\")\n        for\
    \ key, value in kwargs.items():\n            print(f\"- {key}: {value}\")\n```\n\
    \n在上面的例子中，我们使用注解来指定 `name` 参数应该是一个默认值为 `\"World\"` 的字符串，`*args` 应该是任意数量的位置字符串参数，`**kwargs`\
    \ 应该是任意数量的关键字字符串参数。\n\n在 Python 中文档化函数是编写清晰、可维护代码的重要组成部分。文档字符串和注解是强大的工具，可以帮助其他开发者理解函数的目的、输入、输出以及任何潜在的副作用。通过遵循函数文档的最佳实践，我们可以使代码更易于访问和维护。\n\
    \n## 编写文档测试\n\n在 Python 中编写文档测试是一种通过将测试用例嵌入文档字符串来测试函数的方法。这有助于确保函数按预期工作，同时也作为文档的一种形式。在本笔记中，我们将讨论如何在\
    \ Python 中编写文档测试，包括语法和最佳实践。\n\n### 语法\n\n文档测试写在函数的文档字符串中，由一系列输入/输出对组成。每个输入/输出对由一个提示、一个函数调用和预期输出组成。提示是描述测试用例的字符串，函数调用是要被求值的表达式。\n\
    \n这是一个带有文档测试的简单函数示例：\n\n```python\ndef add_numbers(x, y):\n    \"\"\"\n    Add\
    \ two numbers and return the result.\n\n    >>> add_numbers(2, 3)\n    5\n   \
    \ >>> add_numbers(-1, 1)\n    0\n    \"\"\"\n    return x + y\n```\n\n在上面的例子中，我们定义了一个\
    \ `add_numbers` 函数，它接受两个数字并返回它们的和。我们还在函数的文档字符串中包含了两个文档测试。第一个文档测试检查 `add_numbers(2,\
    \ 3)` 是否返回 5，第二个文档测试检查 `add_numbers(-1, 1)` 是否返回 0。\n\n### 运行文档测试\n\n文档测试可以使用\
    \ Python 内置的 `doctest` 模块运行。要运行模块的文档测试，只需在模块底部调用 `doctest.testmod()`。\n\n```python\n\
    import doctest\n\ndef add_numbers(x, y):\n    \"\"\"\n    Add two numbers and\
    \ return the result.\n\n    >>> add_numbers(2, 3)\n    5\n    >>> add_numbers(-1,\
    \ 1)\n    0\n    \"\"\"\n    return x + y\n\nif __name__ == '__main__':\n    doctest.testmod()\n\
    ```\n\n在上面的例子中，我们导入了 `doctest` 模块，并在模块底部调用了 `doctest.testmod()` 来运行文档测试。当模块被执行时，`testmod()`\
    \ 函数将搜索模块文档字符串中的文档测试并执行它们。如果所有测试都通过，则不会在控制台打印任何内容。如果测试失败，将在控制台打印错误消息。\n\n### 最佳实践\n\
    \n在 Python 中编写文档测试时，遵循最佳实践以确保测试有效且可维护非常重要。以下是一些建议：\n\n- 为所有函数和方法编写文档测试。\n- 每个测试用例只包含一个输入/输出对。\n\
    - 使用描述性的提示来描述输入和预期输出。\n- 避免在提示中使用函数中未定义的变量。"
