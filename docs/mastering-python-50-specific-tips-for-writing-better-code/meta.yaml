- md: "## Advanced class topics\n\n- Using descriptors to customize attribute access\n\
    \nIn Python, descriptors are a way to customize the behavior of attribute access.\
    \ They allow us to define how attributes are accessed, set, or deleted on an object.\
    \ In this note, we will discuss how to use descriptors to customize attribute\
    \ access in Python, with suitable codes.\n\nCreating a Descriptor:\n\nTo create\
    \ a descriptor, we need to define a class with one or more of the following methods:\n\
    \n- `__get__(self, instance, owner)`: This method is called when the descriptor's\
    \ value is accessed using dot notation. instance is the instance of the class\
    \ that contains the descriptor, and owner is the class itself.\n- `__set__(self,\
    \ instance, value)`: This method is called when the descriptor's value is set\
    \ using dot notation.\n- `__delete__(self, instance)`: This method is called when\
    \ the descriptor's value is deleted using del statement.\n\nHere's an example\
    \ of a simple descriptor:\n\n```python\nclass MyDescriptor:\n    def __get__(self,\
    \ instance, owner):\n        print(\"Getting the value\")\n        return instance._value\n\
    \n    def __set__(self, instance, value):\n        print(\"Setting the value\"\
    )\n        instance._value = value\n\n    def __delete__(self, instance):\n  \
    \      print(\"Deleting the value\")\n        del instance._value\n```\n\nIn this\
    \ example, we define a descriptor MyDescriptor that has `__get__()`, `__set__()`,\
    \ and `__delete__()` methods. The `__get__()` method prints a message and returns\
    \ the value of `_value` attribute of the instance. The `__set__()` method prints\
    \ a message and sets the value of `_value` attribute of the instance. The `__delete__()`\
    \ method prints a message and deletes the `_value` attribute of the instance.\n\
    \nUsing the Descriptor:\n\nOnce we have defined the descriptor, we can use it\
    \ to customize attribute access on a class. Here's an example of how to use MyDescriptor\
    \ to customize attribute access on a class:\n\n```python\nclass MyClass:\n   \
    \ def __init__(self, value):\n        self._value = value\n\n    x = MyDescriptor()\n\
    ```\n\nIn this example, we define a class MyClass that has an attribute `x` that\
    \ is an instance of MyDescriptor. When we access, set, or delete the `x` attribute\
    \ using dot notation, the corresponding method of MyDescriptor will be called.\n\
    \nAdvantages of Using Descriptors:\n\n- Reusable code: Descriptors can be reused\
    \ across multiple classes, making it easier to write DRY (Don't Repeat Yourself)\
    \ code.\n- Customizable behavior: Descriptors allow us to customize the behavior\
    \ of attribute access, making it possible to enforce constraints or perform custom\
    \ operations when an attribute is accessed, set, or deleted.\n- Easy to use: Descriptors\
    \ are easy to use, requiring only a few lines of code to define and use.\n\nDescriptors\
    \ are a powerful tool for customizing attribute access in Python. By defining\
    \ a descriptor and using it to customize attribute access on a class, we can enforce\
    \ constraints, perform custom operations, and write reusable code. However, descriptors\
    \ should be used with care, as they can make code harder to understand and maintain\
    \ if used improperly.\n\n## Using properties to control attribute access\n\nIn\
    \ Python, descriptors are a way to define customized behavior for accessing and\
    \ setting attributes of an object. A descriptor is an object that defines one\
    \ or more of the following methods: `__get__()`, `__set__()`, and `__delete__()`.\
    \ These methods allow you to control how an attribute is accessed, modified, or\
    \ deleted on an instance of a class.\n\nUsing descriptors can be useful in many\
    \ scenarios. For example, you can use descriptors to:\n\n- Validate data before\
    \ it is stored in an attribute\n- Convert data to a different format before it\
    \ is stored in an attribute\n- Create read-only or write-only attributes\n- Implement\
    \ computed attributes that are calculated on the fly\n- Implement lazy attributes\
    \ that are only calculated when needed\n\nTo define a descriptor, you need to\
    \ create a class that defines one or more of the descriptor methods. For example,\
    \ to create a descriptor that validates data before it is stored in an attribute,\
    \ you can define a class like this:\n\n```python\nclass PositiveNumber:\n    def\
    \ __set_name__(self, owner, name):\n        self.name = name\n\n    def __set__(self,\
    \ instance, value):\n        if value < 0:\n            raise ValueError(f\"{self.name}\
    \ must be positive\")\n        instance.__dict__[self.name] = value\n\n    def\
    \ __get__(self, instance, owner):\n        return instance.__dict__[self.name]\n\
    ```\n\nThis descriptor ensures that a number attribute is always positive. The\
    \ `__set_name__()` method is called when the descriptor is assigned to a class\
    \ attribute, and it sets the name of the attribute. The `__set__()` method is\
    \ called when the attribute is set, and it checks if the value is positive before\
    \ setting it. The `__get__()` method is called when the attribute is accessed,\
    \ and it returns the value of the attribute.\n\nTo use the descriptor, you need\
    \ to define a class that uses it as an attribute:\n\n```python\nclass MyClass:\n\
    \    x = PositiveNumber()\n```\n\nNow, when you create an instance of MyClass\
    \ and set the `x` attribute to a negative value, an error will be raised:\n\n\
    ```python\n>>> obj = MyClass()\n>>> obj.x = -10\nValueError: x must be positive\n\
    ```\n\nYou can also define a descriptor that converts data to a different format\
    \ before it is stored in an attribute. For example, you can define a descriptor\
    \ that stores a string as uppercase:\n\n```python\nclass UppercaseString:\n  \
    \  def __set_name__(self, owner, name):\n        self.name = name\n\n    def __set__(self,\
    \ instance, value):\n        instance.__dict__[self.name] = str(value).upper()\n\
    \n    def __get__(self, instance, owner):\n        return instance.__dict__[self.name]\n\
    ```\n\nTo use this descriptor, you can define a class like this:\n\n```python\n\
    class MyOtherClass:\n    name = UppercaseString()\n```\n\nNow, when you create\
    \ an instance of MyOtherClass and set the `name` attribute to a lowercase string,\
    \ it will be stored as uppercase:\n\n```python\n>>> obj2 = MyOtherClass()\n>>>\
    \ obj2.name = \"john\"\n>>> obj2.name\n'JOHN'\n```\n\nDescriptors can also be\
    \ used to create read-only or write-only attributes. To create a read-only attribute,\
    \ you can define a descriptor that only implements the `__get__()` method:\n\n\
    ```python\nclass ReadOnly:\n    def __set_name__(self, owner, name):\n       \
    \ self.name = name\n\n    def __set__(self, instance, value):\n        raise AttributeError(f\"\
    {self.name} is read-only\")\n\n    def __get__(self, instance, owner):\n     \
    \   return instance.__dict__\n```\n\n- Writing class decorators\n\nIn Python,\
    \ class decorators are a way to modify or extend the behavior of a class without\
    \ changing its code. A class decorator is a function that takes a class as its\
    \ argument and returns a new class that has the same name as the original class.\
    \ The new class can inherit from the original class or not, and can add new methods,\
    \ attributes, or modify existing ones."
  mdcn: "## 高级类主题\n\n- 使用描述符自定义属性访问\n\n在 Python 中，描述符是一种自定义属性访问行为的方式。它们允许我们定义如何访问、设置或删除对象上的属性。在本笔记中，我们将讨论如何在\
    \ Python 中使用描述符来自定义属性访问，并提供合适的代码示例。\n\n创建描述符：\n\n要创建描述符，我们需要定义一个包含以下一个或多个方法的类：\n\
    \n- `__get__(self, instance, owner)`：当使用点号表示法访问描述符的值时调用此方法。instance 是包含描述符的类的实例，owner\
    \ 是类本身。\n- `__set__(self, instance, value)`：当使用点号表示法设置描述符的值时调用此方法。\n- `__delete__(self,\
    \ instance)`：当使用 `del` 语句删除描述符的值时调用此方法。\n\n这是一个简单描述符的示例：\n\n```python\nclass MyDescriptor:\n\
    \    def __get__(self, instance, owner):\n        print(\"Getting the value\"\
    )\n        return instance._value\n\n    def __set__(self, instance, value):\n\
    \        print(\"Setting the value\")\n        instance._value = value\n\n   \
    \ def __delete__(self, instance):\n        print(\"Deleting the value\")\n   \
    \     del instance._value\n```\n\n在这个示例中，我们定义了一个名为 MyDescriptor 的描述符，它具有 `__get__()`、`__set__()`\
    \ 和 `__delete__()` 方法。`__get__()` 方法打印一条消息并返回实例的 `_value` 属性的值。`__set__()` 方法打印一条消息并设置实例的\
    \ `_value` 属性的值。`__delete__()` 方法打印一条消息并删除实例的 `_value` 属性。\n\n使用描述符：\n\n一旦我们定义了描述符，就可以用它来在类上自定义属性访问。以下是如何使用\
    \ MyDescriptor 在类上自定义属性访问的示例：\n\n```python\nclass MyClass:\n    def __init__(self,\
    \ value):\n        self._value = value\n\n    x = MyDescriptor()\n```\n\n在这个示例中，我们定义了一个名为\
    \ MyClass 的类，它有一个属性 `x`，该属性是 MyDescriptor 的一个实例。当我们使用点号表示法访问、设置或删除 `x` 属性时，MyDescriptor\
    \ 的相应方法将被调用。\n\n使用描述符的优点：\n\n- 代码可重用：描述符可以在多个类中重用，使得编写 DRY（不要重复自己）代码更容易。\n- 可定制行为：描述符允许我们自定义属性访问的行为，从而可以在访问、设置或删除属性时强制执行约束或执行自定义操作。\n\
    - 易于使用：描述符易于使用，只需几行代码即可定义和使用。\n\n描述符是 Python 中自定义属性访问的强大工具。通过定义描述符并使用它来在类上自定义属性访问，我们可以强制执行约束、执行自定义操作并编写可重用的代码。但是，应谨慎使用描述符，因为如果使用不当，它们可能会使代码更难理解和维护。\n\
    \n## 使用属性控制属性访问\n\n在 Python 中，描述符是一种为对象的访问和设置属性定义自定义行为的方式。描述符是一个定义了一个或多个以下方法的对象：`__get__()`、`__set__()`\
    \ 和 `__delete__()`。这些方法允许你控制类的实例上的属性如何被访问、修改或删除。\n\n在许多场景中使用描述符会很有用。例如，你可以使用描述符来：\n\
    \n- 在将数据存储到属性之前验证数据\n- 在将数据存储到属性之前将数据转换为不同的格式\n- 创建只读或只写属性\n- 实现动态计算的计算属性\n- 实现仅在需要时才计算的延迟属性\n\
    \n要定义描述符，你需要创建一个定义了一个或多个描述符方法的类。例如，要创建一个在将数据存储到属性之前验证数据的描述符，你可以定义一个像这样的类：\n\n\
    ```python\nclass PositiveNumber:\n    def __set_name__(self, owner, name):\n \
    \       self.name = name\n\n    def __set__(self, instance, value):\n        if\
    \ value < 0:\n            raise ValueError(f\"{self.name} must be positive\")\n\
    \        instance.__dict__[self.name] = value\n\n    def __get__(self, instance,\
    \ owner):\n        return instance.__dict__[self.name]\n```\n\n这个描述符确保数字属性始终为正数。`__set_name__()`\
    \ 方法在描述符被分配给类属性时调用，它设置属性的名称。`__set__()` 方法在设置属性时调用，它在设置值之前检查值是否为正数。`__get__()`\
    \ 方法在访问属性时调用，它返回属性的值。\n\n要使用描述符，你需要定义一个将其用作属性的类：\n\n```python\nclass MyClass:\n\
    \    x = PositiveNumber()\n```\n\n现在，当你创建 MyClass 的实例并将 `x` 属性设置为负值时，将会引发错误：\n\
    \n```python\n>>> obj = MyClass()\n>>> obj.x = -10\nValueError: x must be positive\n\
    ```\n\n你还可以定义一个在将数据存储到属性之前将数据转换为不同格式的描述符。例如，你可以定义一个将字符串存储为大写的描述符：\n\n```python\n\
    class UppercaseString:\n    def __set_name__(self, owner, name):\n        self.name\
    \ = name\n\n    def __set__(self, instance, value):\n        instance.__dict__[self.name]\
    \ = str(value).upper()\n\n    def __get__(self, instance, owner):\n        return\
    \ instance.__dict__[self.name]\n```\n\n要使用此描述符，你可以定义一个像这样的类：\n\n```python\nclass\
    \ MyOtherClass:\n    name = UppercaseString()\n```\n\n现在，当你创建 MyOtherClass 的实例并将\
    \ `name` 属性设置为小写字符串时，它将被存储为大写：\n\n```python\n>>> obj2 = MyOtherClass()\n>>> obj2.name\
    \ = \"john\"\n>>> obj2.name\n'JOHN'\n```\n\n描述符也可用于创建只读或只写属性。要创建只读属性，你可以定义一个只实现\
    \ `__get__()` 方法的描述符：\n\n```python\nclass ReadOnly:\n    def __set_name__(self,\
    \ owner, name):\n        self.name = name\n\n    def __set__(self, instance, value):\n\
    \        raise AttributeError(f\"{self.name} is read-only\")\n\n    def __get__(self,\
    \ instance, owner):\n        return instance.__dict__\n```\n\n- 编写类装饰器\n\n在 Python\
    \ 中，类装饰器是一种在不修改类代码的情况下修改或扩展类行为的方式。类装饰器是一个函数，它接受一个类作为参数，并返回一个与原始类同名的新类。新类可以继承自原始类，也可以不继承，并且可以添加新的方法、属性或修改现有的方法、属性。"
