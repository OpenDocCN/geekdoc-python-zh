    \ of the Person class with the name attribute set to \"Alice\" and the age attribute\
    \ set to 25. It then modifies the value of age to 26 using dot notation and prints\
    \ the new value.\n\n### Instance Variables with Default Values:\n\nInstance variables\
    \ can also have default values, just like function parameters in Python. Here's\
    \ an example:\n\n```\nclass Person:\n    def __init__(self, name, age=18):\n \
    \       self.name = name\n        self.age = age\n```\n\nIn this example, we define\
    \ a Person class with an age instance variable that has a default value of 18.\
    \ If no value is provided for age when an instance of the class is created, it\
    \ will default to 18.\n\nIn this note, we have covered the basics of using instance\
    \ variables in Python. Instance variables are an essential part of object-oriented\
    \ programming, and they allow you to store and manipulate data that is specific\
