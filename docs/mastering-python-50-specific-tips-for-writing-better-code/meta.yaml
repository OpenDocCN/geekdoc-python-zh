- md: "## Storing and Retrieving Python Objects using Shelve\n\nShelve provides a\
    \ simple way to store and retrieve Python objects using a key-value store. The\
    \ shelve module provides two main classes for working with shelves: Shelf and\
    \ DbfilenameShelf. Shelf is a dictionary-like object that stores its data in memory,\
    \ while DbfilenameShelf is a subclass of Shelf that stores its data in a persistent\
    \ file on disk.\n\n```python\nimport shelve\n\n# Create a new shelf\nwith shelve.open(\"\
    my_shelf\") as shelf:\n    # Store some data in the shelf\n    shelf[\"name\"\
    ] = \"John\"\n    shelf[\"age\"] = 30\n    shelf[\"city\"] = \"New York\"\n\n\
    # Open the shelf again and retrieve the data\nwith shelve.open(\"my_shelf\") as\
    \ shelf:\n    name = shelf[\"name\"]\n    age = shelf[\"age\"]\n    city = shelf[\"\
    city\"]\n    print(name, age, city)\n```\n\nIn the code above, we create a new\
    \ shelf using the shelve.open() method and store some data in it using dictionary-like\
    \ syntax. We then close the shelf and reopen it to retrieve the data using the\
    \ same dictionary-like syntax.\n\n### Customizing Serialization using Shelve\n\
    \nShelve provides a way to customize the serialization and deserialization of\
    \ Python objects using the pickle module. The Shelf and DbfilenameShelf classes\
    \ both accept an optional protocol argument that specifies the protocol version\
    \ to use for pickling and unpickling Python objects.\n\n```python\nimport shelve\n\
    import pickle\n\n# Define a custom class to store in the shelf\nclass Person:\n\
    \    def __init__(self, name, age, city):\n        self.name = name\n        self.age\
    \ = age\n        self.city = city\n\n    def __str__(self):\n        return f\"\
    {self.name} ({self.age}) from {self.city}\"\n\n# Create a new shelf and set a\
    \ custom protocol for pickling\nwith shelve.open(\"my_shelf\", protocol=pickle.HIGHEST_PROTOCOL)\
    \ as shelf:\n    # Store a custom object in the shelf\n    person = Person(\"\
    John\", 30, \"New York\")\n    shelf[\"person\"] = person\n\n# Open the shelf\
    \ again and retrieve the custom object\nwith shelve.open(\"my_shelf\") as shelf:\n\
    \    person = shelf[\"person\"]\n    print(person)\n```\n\nIn the code above,\
    \ we define a custom Person class and create a new shelf with a custom protocol\
    \ for pickling. We store a Person object in the shelf and then retrieve it using\
    \ the dictionary-like syntax. The Person object is automatically deserialized\
    \ to its original form.\n\nUsing shelve in serialization and persistence provides\
    \ a simple way to store and retrieve Python objects in a key-value store. By using\
    \ the shelve module in Python, we can easily store and retrieve data in a persistent\
    \ format, allowing us to maintain state across different program executions. It's\
    \ important to note that shelve uses pickle for serialization, which can have\
    \ security implications if untrusted data is being stored or retrieved. It's recommended\
    \ to only use shelve with trusted data.\n\n## Using dbm\n\ndbm (database manager)\
    \ is a module in Python that provides a simple way to store and retrieve key-value\
    \ pairs in a persistent format. In this note, we will explore how to use dbm in\
    \ serialization and persistence, including how to store and retrieve Python objects\
    \ using dbm.\n\n### Storing and Retrieving Key-Value Pairs using dbm\n\ndbm provides\
    \ a simple way to store and retrieve key-value pairs using a hash-based file format.\
    \ The dbm module provides four main classes for working with databases: dumbdbm,\
    \ gdbm, ndbm, and dbm.gnu. dumbdbm is the most basic implementation and is available\
    \ on all platforms. gdbm and ndbm provide more advanced features, but are not\
    \ available on all platforms. dbm.gnu is a more advanced implementation that is\
    \ available on most Unix-like systems.\n\n```python\nimport dbm\n\n# Open a new\
    \ database\nwith dbm.open(\"my_database\", \"c\") as database:\n    # Store some\
    \ data in the database\n    database[b\"name\"] = b\"John\"\n    database[b\"\
    age\"] = b\"30\"\n    database[b\"city\"] = b\"New York\"\n\n# Open the database\
    \ again and retrieve the data\nwith dbm.open(\"my_database\", \"r\") as database:\n\
    \    name = database[b\"name\"]\n    age = database[b\"age\"]\n    city = database[b\"\
    city\"]\n    print(name.decode(), age.decode(), city.decode())\n```\n\nIn the\
    \ code above, we create a new database using the dbm.open() method and store some\
    \ data in it using bytes-like syntax. We then close the database and reopen it\
    \ to retrieve the data using the same bytes-like syntax.\n\n### Customizing Serialization\
    \ using dbm\n\ndbm provides a way to customize the serialization and deserialization\
    \ of Python objects using the pickle module. The dbm module provides an open()\
    \ method that accepts an optional pickle_protocol argument that specifies the\
    \ protocol version to use for pickling and unpickling Python objects.\n\n```python\n\
    import dbm\nimport pickle\n\n# Define a custom class to store in the database\n\
    class Person:\n    def __init__(self, name, age, city):\n        self.name = name\n\
    \        self.age = age\n        self.city = city\n\n    def __str__(self):\n\
    \        return f\"{self.name} ({self.age}) from {self.city}\"\n\n# Open a new\
    \ database and set a custom protocol for pickling\nwith dbm.open(\"my_database\"\
    , \"c\", pickle_protocol=pickle.HIGHEST_PROTOCOL) as database:\n    # Store a\
    \ custom object in the database\n    person = Person(\"John\", 30, \"New York\"\
    )\n    database[b\"person\"] = pickle.dumps(person)\n\n# Open the database again\
    \ and retrieve the custom object\nwith dbm.open(\"my_database\", \"r\") as database:\n\
    \    person = pickle.loads(database[b\"person\"])\n    print(person)\n```\n\n\
    In the code above, we define a custom Person class and create a new database with\
    \ a custom protocol for pickling. We store a Person object in the database and\
    \ then retrieve it using the pickle.loads() method. The Person object is automatically\
    \ deserialized to its original form.\n\nUsing dbm in serialization and persistence\
    \ provides a simple way to store and retrieve key-value pairs in a persistent\
    \ format. By using the dbm module in Python, we can easily store and retrieve\
    \ data in a hash-based file format, allowing us to maintain state across different\
    \ program executions.\n\n## Using SQLite\n\nSQLite is a lightweight relational\
    \ database management system that is included in Python's standard library. It\
    \ provides a simple and efficient way to store and retrieve data in a persistent\
    \ format. In this note, we will explore how to use SQLite in serialization and\
    \ persistence, including how to create and manipulate tables, and how to store\
    \ and retrieve data using SQL commands.\n\n### Creating a SQLite Database\n\n\
    The first step in using SQLite is to create a new database. This can be done using\
    \ the sqlite3 module, which provides a simple way to connect to a database and\
    \ execute SQL commands.\n\n```python\nimport sqlite3\n\n# Connect to a new database\
    \ or open an existing one\nconn = sqlite3.connect(\"my_database.db\")\n\n# Create\
    \ a new table\nconn.execute(\n    \"\"\"\n    CREATE TABLE IF NOT EXISTS users\
    \ (\n        id INTEGER PRIMARY KEY AUTOINCREMENT,\n        name TEXT NOT NULL,\n\
    \        age INTEGER NOT NULL,\n        city TEXT NOT NULL\n    )\n    \"\"\"\n\
    )\n\n# Commit the changes\nconn.commit()\n\n# Close the connection\nconn.close()\n\
    ```\n\nIn the code above, we create a new database using the sqlite3.connect()\
    \ method and execute an SQL command to create a new table called users. We define\
    \ three columns for the table, including an id column that is automatically incremented,\
    \ a name column that must not be null, an age column that must not be null, and\
    \ a city column that must not be null.\n\n### Storing and Retrieving Data\n\n\
    Once we have created a table, we can store and retrieve data using SQL commands.\n\
    \n```python\nimport sqlite3\n\n# Connect to the database\nconn = sqlite3.connect(\"\
    my_database.db\")\n\n# Insert some data into the table\nconn.execute(\n    \"\"\
    \"\n    INSERT INTO users (name, age, city)\n    VALUES (?, ?, ?)\n    \"\"\"\
    ,\n    (\"John\", 30, \"New York\")\n)\n\n# Commit the changes\nconn.commit()\n\
    \n# Retrieve the data from the table\ncursor = conn.execute(\n    \"\"\"\n   \
    \ SELECT id, name, age, city FROM users\n    \"\"\"\n)\nfor row in cursor:\n \
    \   print(row)\n\n# Close the connection\nconn.close()\n```"
