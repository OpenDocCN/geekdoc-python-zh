    \ multiple independent iterators from a single iterable. Here's an example:\n\n\
    ```python\nfrom itertools import tee\n\ncolors = ['red', 'green', 'blue']\niter1,\
    \ iter2 = tee(colors, 2)\n\nprint(list(iter1))\nprint(list(iter2))\n```"
