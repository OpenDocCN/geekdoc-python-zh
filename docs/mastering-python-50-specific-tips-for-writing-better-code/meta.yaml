    # 检查路径是否为目录\nif os.path.isdir('/path/to/directory'):\n    print('path is a directory')\n\
    ```\n\n文件操作：\n\n`os` 模块提供了用于执行文件操作的函数，例如 `remove()` 用于删除文件，`rename()` 用于重命名文件，以及\
