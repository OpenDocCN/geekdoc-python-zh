- md: "## Writing simple decorators\n\nIn Python, a decorator is a function that takes\
    \ another function as input and returns a modified version of that function. Decorators\
    \ can be used to modify the behavior of a function without changing its source\
    \ code. They are a powerful tool in Python that can help simplify code and make\
    \ it more modular.\n\n### Defining a Simple Decorator\n\nTo define a simple decorator,\
    \ we use the @ symbol followed by the decorator function name before the function\
    \ we want to modify. The decorator function takes the original function as input,\
    \ modifies it in some way, and returns the modified function.\n\nHere's an example\
    \ of a simple decorator that adds a greeting before a function is called:\n\n\
    ```python\ndef greeting_decorator(func):\n    def wrapper():\n        print(\"\
    Hello!\")\n        func()\n    return wrapper\n\n@greeting_decorator\ndef say_hello():\n\
    \    print(\"Welcome to my program!\")\n\nsay_hello()\n```\n\nIn this example,\
    \ we define a greeting_decorator() function that takes the original function func\
    \ as input, defines a new function wrapper() that adds a greeting before calling\
    \ func(), and returns wrapper(). We then decorate the say_hello() function with\
    \ @greeting_decorator, which modifies it by adding a greeting before it is called.\n\
    \nWhen we call say_hello(), the output will be:\n\n```\nHello!\nWelcome to my\
    \ program!\n```\n\n### Passing Arguments to a Decorator\n\nWe can also modify\
    \ our decorator to accept arguments. This can be useful when we want to modify\
    \ the behavior of a function based on some external parameter.\n\nHere's an example\
    \ of a decorator that accepts an argument:\n\n```python\ndef repeat(num):\n  \
    \  def decorator(func):\n        def wrapper(*args, **kwargs):\n            for\
    \ i in range(num):\n                func(*args, **kwargs)\n        return wrapper\n\
    \    return decorator\n\n@repeat(3)\ndef say_hello(name):\n    print(f\"Hello,\
    \ {name}!\")\n\nsay_hello(\"John\")\n```\n\nIn this example, we define a repeat()\
    \ function that takes an argument num, defines a decorator function that takes\
    \ the original function func as input, defines a new function wrapper() that repeats\
    \ the call to func() num times, and returns wrapper(). We then decorate the say_hello()\
    \ function with @repeat(3), which modifies it by repeating the call to the function\
    \ three times.\n\nWhen we call say_hello(\"John\"), the output will be:\n\n```\n\
    Hello, John!\nHello, John!\nHello, John!\n```\n\n### Using Multiple Decorators\n\
    \nWe can also use multiple decorators to modify a function. In this case, the\
    \ decorators are applied in order from top to bottom.\n\nHere's an example of\
    \ using multiple decorators:\n\n```python\ndef bold_decorator(func):\n    def\
    \ wrapper(*args, **kwargs):\n        return f\"<b>{func(*args, **kwargs)}</b>\"\
    \n    return wrapper\n\ndef italic_decorator(func):\n    def wrapper(*args, **kwargs):\n\
    \        return f\"<i>{func(*args, **kwargs)}</i>\"\n    return wrapper\n\n@bold_decorator\n\
    @italic_decorator\ndef say_hello():\n    return \"Hello!\"\n\nprint(say_hello())\n\
    ```\n\nIn this example, we define two decorators, bold_decorator() and italic_decorator(),\
    \ that modify the output of the original function by adding HTML tags. We then\
    \ decorate the say_hello() function with @bold_decorator and @italic_decorator,\
    \ which modifies it by adding both decorators in sequence.\n\nWhen we call say_hello(),\
    \ the output will be:\n\n```\n<b><i>Hello!</i></b>\n```\n\n## Writing decorators\
    \ that take arguments\n\nIn Python, decorators are functions that take a function\
    \ as input and return a modified function as output. Decorators can be used to\
    \ modify the behavior of a function without changing its source code. In some\
    \ cases, we may want to write a decorator that takes arguments. In this case,\
    \ we need to define a function that takes the arguments and returns a decorator\
    \ function that takes the original function as input.\n\n### Defining a Decorator\
    \ that Takes Arguments\n\nTo define a decorator that takes arguments, we define\
    \ a function that takes the arguments and returns a decorator function that takes\
    \ the original function as input. The decorator function then defines a new function\
    \ that modifies the original function in some way and returns the modified function.\n\
    \nHere's an example of a decorator that takes arguments:\n\n```python\ndef repeat(num):\n\
    \    def decorator(func):\n        def wrapper(*args, **kwargs):\n           \
    \ for i in range(num):\n                func(*args, **kwargs)\n        return\
    \ wrapper\n    return decorator\n\n@repeat(3)\ndef say_hello(name):\n    print(f\"\
    Hello, {name}!\")\n\nsay_hello(\"John\")\n```\n\nIn this example, we define a\
    \ repeat() function that takes an argument num, defines a decorator function that\
    \ takes the original function func as input, defines a new function wrapper()\
    \ that repeats the call to func() num times, and returns wrapper(). We then decorate\
    \ the say_hello() function with @repeat(3), which modifies it by repeating the\
    \ call to the function three times.\n\nWhen we call say_hello(\"John\"), the output\
    \ will be:\n\n```\nHello, John!\nHello, John!\nHello, John!\n```\n\n### Passing\
    \ Arguments to the Decorator\n\nIn some cases, we may want to pass arguments to\
    \ the decorator itself. In this case, we need to define a function that takes\
    \ the arguments and returns the decorator function.\n\nHere's an example of a\
    \ decorator that takes arguments:\n\n```python\ndef greeting_decorator(greeting):\n\
    \    def decorator(func):\n        def wrapper(*args, **kwargs):\n           \
    \ print(greeting)\n            func(*args, **kwargs)\n        return wrapper\n\
    \    return decorator\n\n@greeting_decorator(\"Welcome!\")\ndef say_hello(name):\n\
    \    print(f\"Hello, {name}!\")\n\nsay_hello(\"John\")\n```\n\nIn this example,\
    \ we define a greeting_decorator() function that takes an argument greeting, defines\
    \ a decorator function that takes the original function func as input, defines\
    \ a new function wrapper() that adds the greeting before calling func(), and returns\
    \ wrapper(). We then decorate the say_hello() function with @greeting_decorator(\"\
    Welcome!\"), which modifies it by adding a greeting before it is called.\n\nWhen\
    \ we call say_hello(\"John\"), the output will be:\n\n```\nWelcome!\nHello, John!\n\
    ```\n\n## Writing class decorators\n\nPython decorators are a powerful feature\
    \ of the language that allow you to modify or enhance the behavior of functions\
    \ or classes without changing their source code. They are essentially functions\
    \ that take another function or class as an argument, modify it, and return the\
    \ modified version.\n\nIn this note, we will focus on writing class decorators\
    \ in Python. Class decorators work in a similar way to function decorators, but\
    \ they take a class as an argument instead of a function.\n\nTo write a class\
    \ decorator in Python, you define a function that takes a class as an argument\
    \ and returns a modified version of the class. The modified class can have additional\
    \ methods or attributes, or it can modify the behavior of existing methods.\n\n\
    Here is an example of a simple class decorator that adds a \"version\" attribute\
    \ to a class:\n\n```python\ndef add_version(cls):\n    cls.version = \"1.0\"\n\
    \    return cls\n\n@add_version\nclass MyClass:\n    pass\n\nprint(MyClass.version)\
    \ # Output: 1.0\n```\n\nIn the example above, the add_version function takes a\
    \ class cls as an argument, adds a version attribute to it, and returns the modified\
    \ class. The @add_version decorator is then applied to the MyClass class, which\
    \ modifies it by adding the version attribute.\n\nYou can also chain multiple\
    \ class decorators together to modify a class:\n\n```python\ndef add_version(cls):\n\
    \    cls.version = \"1.0\"\n    return cls\n\ndef add_author(cls):\n    cls.author\
    \ = \"John Doe\"\n    return cls\n\n@add_version\n@add_author\nclass MyClass:\n\
    \    pass\n\nprint(MyClass.version) # Output: 1.0\nprint(MyClass.author) # Output:\
    \ John Doe\n```\n\nIn the example above, the add_version and add_author class\
    \ decorators are chained together using the @ symbol. When the MyClass class is\
    \ defined, both decorators are applied in the order they appear, resulting in\
    \ a class that has both a version and author attribute.\n\nClass decorators can\
    \ also modify the behavior of methods in a class. For example, the following class\
    \ decorator logs the execution time of all methods in a class:\n\n```python\n\
    import time\n\ndef log_execution_time(cls):\n    for name, value in vars(cls).items():\n\
    \        if callable(value):\n            def new_func(*args, **kwargs):\n   \
    \             start_time = time.time()\n                result = value(*args,\
    \ **kwargs)\n                end_time = time.time()\n                print(f\"\
    Execution time of {name}: {end_time - start_time}\")\n                return result\n\
    \            setattr(cls, name, new_func)\n    return cls\n\n@log_execution_time\n\
    class MyClass:\n    def method1(self):\n        time.sleep(1)\n    def method2(self):\n\
    \        time.sleep(2)\n```"
  mdcn: "## 编写简单的装饰器\n\n在 Python 中，装饰器是一个函数，它接受另一个函数作为输入，并返回该函数的修改版本。装饰器可用于修改函数的行为，而无需更改其源代码。它们是\
