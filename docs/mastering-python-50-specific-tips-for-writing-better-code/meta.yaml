    \ by commas. Here's an example:\n\n```\nclass Parent1:\n    def method1(self):\n\
    \        print(\"Parent1 method called.\")\n\nclass Parent2:\n    def method2(self):\n\
    \        print(\"Parent2 method called.\")\n\nclass Child(Parent1, Parent2):\n\
    \    pass\n```\n\nIn this example, we define two parent classes, Parent1 and Parent2,\
    \ each with their own methods. We then define a Child class that inherits from\
    \ both Parent1 and Parent2 by specifying them in parentheses after the class name,\
    \ separated by commas. Since the Child class doesn't have any methods of its own,\
    \ we simply use the pass statement.\n\n# Method Resolution Order (MRO):"
