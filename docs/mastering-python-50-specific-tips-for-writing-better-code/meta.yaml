- md: "## Chapter 4: Classes and Objects\n\nPython is an object-oriented programming\
    \ language that is widely used by developers all over the world. It is a high-level\
    \ language that is simple to read and write, making it ideal for beginners. Python\
    \ is known for its strong support for object-oriented programming, which is a\
    \ programming paradigm that focuses on creating objects, which are instances of\
    \ classes, to represent real-world entities.\n\nClasses and objects are the building\
    \ blocks of object-oriented programming in Python. They allow developers to create\
    \ reusable and maintainable code that is easy to read and understand. A class\
    \ is a blueprint for creating objects, while an object is an instance of a class.\
    \ Python provides a simple syntax for creating and using classes and objects,\
    \ which makes it easy for developers to write object-oriented code.\n\nIn this\
    \ chapter, we will explore the basics of classes and objects in Python. We will\
    \ start by defining classes and objects and explain how they are related. We will\
    \ then look at how to create objects from classes, and how to use them to perform\
    \ various tasks. We will also cover the different attributes and methods that\
    \ can be defined in a class and how to access them from an object.\n\nWe will\
    \ also examine how inheritance works in Python, which is the mechanism for creating\
    \ new classes from existing ones. Inheritance allows developers to reuse code\
    \ and create new classes that inherit the attributes and methods of existing classes.\
    \ We will explore the different types of inheritance, including single inheritance\
    \ and multiple inheritance, and explain how to use them in your code.\n\nAdditionally,\
    \ we will look at some advanced topics related to classes and objects in Python.\
    \ We will discuss the concept of encapsulation, which is the practice of hiding\
    \ data and methods within a class to protect them from external access. We will\
    \ also cover the concept of polymorphism, which allows objects of different classes\
    \ to be used interchangeably.\n\nFinally, we will provide some practical examples\
    \ of how to use classes and objects in real-world scenarios. We will demonstrate\
    \ how to create classes for representing common objects such as bank accounts\
    \ and cars, and show how to use them to perform various operations. We will also\
    \ provide examples of how to use inheritance to create new classes that inherit\
    \ attributes and methods from existing classes.\n\nBy the end of this chapter,\
    \ you will have a thorough understanding of classes and objects in Python, and\
    \ how they can be used to create reusable and maintainable code. You will also\
    \ have a strong understanding of how to use inheritance, encapsulation, and polymorphism\
    \ to create powerful and flexible programs. Whether you are a beginner or an experienced\
    \ developer, this chapter will provide you with the knowledge and skills needed\
    \ to create high-quality object-oriented code in Python.\n\n### Class basics\n\
    \n- Creating and using classes\n\nIn Python, a class is a blueprint for creating\
    \ objects with a set of attributes and methods. It is a way of organizing and\
    \ structuring code, and it allows you to create custom data types that can be\
    \ used throughout your code. In this note, we will cover the basics of creating\
    \ and using classes in Python.\n\nCreating a Class:\n\nTo create a class in Python,\
    \ you use the class keyword followed by the name of the class. Here's an example:\n\
    \n```python\nclass Person:\n    pass\n```\n\n```python\nmy_obj = MyClass()\nmy_obj.method1()\
    \ # Output: Execution time of method1: 1.000123\nmy_obj.method2() # Output: Execution\
    \ time of method2: 2.000234\n```\n\nIn the example above, the log_execution_time\
    \ function takes a class cls as an argument and loops through all its attributes.\
    \ If an attribute is a method, a new function is created that logs the execution\
    \ time of the method using the time module. The setattr function is then used\
    \ to replace the original method with the new function. The @log_execution_time\
    \ decorator is then applied to the MyClass class, which modifies it by replacing\
    \ its methods with versions that log their execution time.\n\n- Using closures\n\
    \nClosures are a powerful feature of Python that allow you to create functions\
    \ with persistent state. A closure is a function that remembers the values of\
    \ variables that were in scope at the time it was defined. This makes it possible\
    \ to create functions that have a \"memory\" and can retain information between\
    \ calls.\n\nTo create a closure in Python, you define a function inside another\
    \ function and return it. The inner function has access to the variables in the\
    \ outer function's scope, even after the outer function has completed execution.\
    \ Here is an example:\n\n```python\ndef outer_function(x):\n    def inner_function(y):\n\
    \        return x + y\n    return inner_function\n```\n\n```python\nclosure =\
    \ outer_function(10)\nprint(closure(5)) # Output: 15\n```\n\nIn the example above,\
    \ the outer_function takes a parameter x and defines an inner function inner_function\
    \ that takes another parameter y. The inner function returns the sum of x and\
    \ y.\n\nWhen the outer_function is called with an argument of 10, it returns the\
    \ inner_function. This creates a closure that remembers the value of x as 10.\
    \ The closure is then assigned to the variable closure.\n\nWhen the closure is\
    \ called with an argument of 5, it invokes the inner_function with y equal to\
    \ 5 and returns the sum of x and y, which is 15.\n\nClosures are often used to\
    \ create functions with persistent state. For example, you can create a counter\
    \ function using a closure like this:\n\n```python\ndef counter():\n    count\
    \ = 0\n    def inner_function():\n        nonlocal count\n        count += 1\n\
    \        return count\n    return inner_function\n```\n\n```python\nmy_counter\
    \ = counter()\nprint(my_counter()) # Output: 1\nprint(my_counter()) # Output:\
    \ 2\nprint(my_counter()) # Output: 3\n```\n\nIn the example above, the counter\
    \ function defines an inner function inner_function that has access to a variable\
    \ count in the outer function's scope. The inner function increments the value\
    \ of count each time it is called and returns it.\n\nWhen the counter function\
    \ is called, it returns the inner_function. This creates a closure that remembers\
    \ the value of count as 0. The closure is then assigned to the variable my_counter.\n\
    \nEach time my_counter is called, it invokes the inner_function and returns the\
    \ current value of count. Because the closure persists between calls, the value\
    \ of count is incremented each time and the counter function behaves as expected.\n\
    \nIn summary, closures are a powerful feature of Python that allow you to create\
    \ functions with persistent state. They are created by defining a function inside\
    \ another function and returning it. The inner function has access to the variables\
    \ in the outer function's scope, even after the outer function has completed execution.\
    \ Closures are often used to create functions with persistent state, such as counters\
    \ or memoization functions.\n\n- Using functools.partial\n\nfunctools.partial\
    \ is a Python built-in module that allows you to create a new function with some\
    \ of the parameters of an existing function already \"filled in\". It is a useful\
    \ tool for making functions more flexible and reusable.\n\nTo use functools.partial,\
    \ you first need to import it:\n\n```python\nfrom functools import partial\n```\n\
    \nOnce you have imported partial, you can use it to create a new function based\
    \ on an existing function. Here is an example:\n\n```python\ndef multiply(x, y):\n\
    \    return x * y\ndouble = partial(multiply, y=2)\n\nprint(double(5)) # Output:\
    \ 10\n```\n\nIn the example above, the multiply function takes two parameters\
    \ x and y and returns their product. The partial function is used to create a\
    \ new function double based on multiply, with y set to 2. This means that double\
    \ only takes one parameter x, and always multiplies it by 2.\n\nWhen double is\
    \ called with an argument of 5, it invokes the multiply function with x equal\
    \ to 5 and y equal to 2, and returns the product of the two, which is 10.\n\n\
    partial can also be used to fill in multiple parameters of a function. Here is\
    \ an example:\n\n```python\ndef power(base, exponent):\n    return base ** exponent\n\
    \nsquare = partial(power, exponent=2)\ncube = partial(power, exponent=3)\n\nprint(square(5))\
    \ # Output: 25\nprint(cube(5)) # Output: 125\n```\n\nIn the example above, the\
    \ power function takes two parameters base and exponent and returns base raised\
    \ to the power of exponent. The partial function is used to create two new functions\
    \ square and cube based on power, with exponent set to 2 and 3, respectively.\n\
    \nWhen square is called with an argument of 5, it invokes the power function with\
    \ base equal to 5 and exponent equal to 2, and returns the square of 5, which\
