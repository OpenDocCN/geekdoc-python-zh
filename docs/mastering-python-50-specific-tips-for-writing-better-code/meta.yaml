    \ `x` 和 `y` 字段的值。\n\n使用 `namedtuple` 的一个优点是，它提供了一种比定义元组或使用字典更具可读性和自文档性的替代方案。例如，我们可以使用具有\
    \ `x` 和 `y` 字段的 `namedtuple` 来表示一个二维点，而不是使用普通元组或字典：\n\n```python\np = (1, 2)\n\
    # 对比\np = {'x': 1, 'y': 2}\n# 对比\nPoint = namedtuple('Point', ['x', 'y'])\np =\
