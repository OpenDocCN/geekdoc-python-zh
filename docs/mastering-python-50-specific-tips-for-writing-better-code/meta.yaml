    \ 模块提供了四个用于处理数据库的主要类：`dumbdbm`、`gdbm`、`ndbm` 和 `dbm.gnu`。`dumbdbm` 是最基本的实现，在所有平台上都可用。`gdbm`\
    \ 和 `ndbm` 提供了更高级的功能，但并非在所有平台上都可用。`dbm.gnu` 是一个更高级的实现，在大多数类 Unix 系统上可用。\n\n```python\n\
    import dbm\n\n# Open a new database\nwith dbm.open(\"my_database\", \"c\") as\
