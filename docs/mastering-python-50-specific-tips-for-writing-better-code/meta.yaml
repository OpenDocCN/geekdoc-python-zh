    # 重命名文件\nos.rename('old_file.txt', 'new_file.txt')\n# 获取文件状态信息\nstat_info = os.stat('file.txt')\n\
    print(stat_info.st_size)\n```\n\n遍历目录：\n\n`os` 模块提供了 `walk()` 函数，可用于遍历目录树并对文件和目录执行操作。以下是一个示例：\n\
    \n```python\nimport os\n\n# 遍历目录树\nfor dirpath, dirnames, filenames in os.walk('/path/to/directory'):\n\
    \    print('Current directory: {}'.format(dirpath))\n    print('Directories: {}'.format(dirnames))\n\
    \    print('Files: {}'.format(filenames))\n```\n\n这些只是 `os` 和 `os.path` 模块提供的众多文件和目录访问函数中的一小部分示例。通过利用这些模块，你可以方便高效地对文件和目录执行各种操作。\n\
    \n### 使用 pathlib\n\nPython 的 `pathlib` 模块提供了一个面向对象的接口来访问文件和目录。它是标准库的一部分，与 `os`\
    \ 和 `os.path` 模块相比，提供了一种更直观的方式来处理文件和目录路径。\n\n以下是如何使用 `pathlib` 模块进行文件和目录访问的一些示例：\n\
    \n创建路径：\n\n`pathlib.Path()` 函数可用于创建一个表示文件或目录路径的路径对象。以下是一个示例：\n\n```python\nfrom\
    \ pathlib import Path\n\n# 创建一个表示文件的路径对象\nfile_path = Path('/path/to/file.txt')\n\
    \n# 创建一个表示目录的路径对象\ndir_path = Path('/path/to/directory')\n```\n\n检查路径属性：\n\n`pathlib.Path()`\
    \ 对象提供了许多有用的方法来检查文件或目录路径的属性，例如 `exists()` 用于检查路径是否存在，`is_file()` 用于检查路径是否为文件，以及\
    \ `is_dir()` 用于检查路径是否为目录。以下是一个示例：\n\n```python\nfrom pathlib import Path\n\n#\
    \ 检查路径是否存在\nfile_path = Path('/path/to/file.txt')\nif file_path.exists():\n  \
    \  print('file exists')\n\n# 检查路径是否为文件\nif file_path.is_file():\n    print('path\
    \ is a file')\n\n# 检查路径是否为目录\ndir_path = Path('/path/to/directory')\nif dir_path.is_dir():\n\
    \    print('path is a directory')\n```\n\n创建目录：\n\n`pathlib.Path()` 对象提供了一个 `mkdir()`\
    \ 方法，可用于创建新目录。以下是一个示例：\n\n```python\nfrom pathlib import Path\n\n# 创建一个新目录\ndir_path\
    \ = Path('/path/to/new/directory')\ndir_path.mkdir()\n```\n\n列出目录内容：\n\n`pathlib.Path()`\
    \ 对象提供了一个 `iterdir()` 方法，可用于迭代目录的内容。以下是一个示例：\n\n```python\nfrom pathlib import\
    \ Path\n\n# 列出目录内容\ndir_path = Path('/path/to/directory')\nfor item in dir_path.iterdir():\n\
    \    print(item)\n```\n\n读写文件：\n\n`pathlib.Path()` 对象提供了用于读写文件的方法，例如 `read_text()`\
    \ 用于读取文本文件的内容，`write_text()` 用于将文本写入文件，以及 `read_bytes()` 和 `write_bytes()` 用于读写二进制文件。以下是一个示例：\n\
    \n```python\nfrom pathlib import Path\n\n# 读取文件内容\nfile_path = Path('/path/to/file.txt')\n\
    contents = file_path.read_text()\nprint(contents)\n\n# 将文本写入文件\nfile_path.write_text('Hello,\
