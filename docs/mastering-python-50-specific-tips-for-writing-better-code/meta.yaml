    \n```\n10\n10\n10\n10\n10\n```\n\n`itertools` 中的 `count`、`cycle` 和 `repeat` 函数提供了一种生成无限或有限值序列的便捷方式。通过使用这些函数，我们可以轻松创建数字序列、循环遍历可迭代对象的值，或将一个值重复指定次数。这些函数是强大的工具，可用于广泛的应用场景。\n\
