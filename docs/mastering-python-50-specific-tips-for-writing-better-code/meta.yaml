- md: "## Coroutines and asyncio\n\n### Understanding coroutines\n\nCoroutines are\
    \ a powerful feature in Python that allow for asynchronous programming. They are\
    \ functions that can pause their execution, save their state, and resume execution\
    \ from where they left off later. This makes it possible to write code that can\
    \ handle multiple tasks in parallel, without the need for multiple threads or\
    \ processes.\n\nTo use coroutines in Python, we use the asyncio module, which\
    \ provides the infrastructure for running coroutines and managing their execution.\
    \ Here are the key concepts to understand when working with coroutines in Python:\n\
    \n- async and await keywords: The async keyword is used to define a coroutine\
    \ function, while the await keyword is used to pause execution of a coroutine\
    \ until some asynchronous operation is completed.\n- Event loop: The event loop\
    \ is the heart of the asyncio module. It is responsible for scheduling and running\
    \ coroutines, and managing the execution of asynchronous operations.\n- Coroutines:\
    \ Coroutines are functions that use the async keyword to define themselves as\
    \ asynchronous functions that can be paused and resumed.\n\nHere is a simple example\
    \ of a coroutine that uses the async and await keywords:\n\n```python\nimport\
    \ asyncio\n\nasync def my_coroutine():\n    print('Coroutine started')\n    await\
    \ asyncio.sleep(1)\n    print('Coroutine resumed')\n    return 'Coroutine finished'\n\
    \nasyncio.run(my_coroutine())\n```\n\nIn this example, we define a coroutine function\
    \ called my_coroutine() using the async keyword. The function prints a message,\
    \ pauses for 1 second using the await keyword and the asyncio.sleep() function,\
    \ prints another message, and returns a value. Finally, we run the coroutine using\
    \ the asyncio.run() function.\n\nHere is another example that shows how to use\
    \ coroutines to run multiple tasks in parallel:\n\n```python\nimport asyncio\n\
    \nasync def my_coroutine(id):\n    print(f'Coroutine {id} started')\n    await\
    \ asyncio.sleep(1)\n    print(f'Coroutine {id} resumed')\n    return f'Coroutine\
    \ {id} finished'\n\nasync def main():\n    tasks = [asyncio.create_task(my_coroutine(i))\
    \ for i in range(3)]\n    results = await asyncio.gather(*tasks)\n    print(results)\n\
    \nasyncio.run(main())\n```\n\nIn this example, we define a main() coroutine function\
    \ that creates three instances of the my_coroutine() function using the asyncio.create_task()\
    \ function. We then use the asyncio.gather() function to wait for all the tasks\
    \ to complete and collect their results. Finally, we print the results.\n\nTo\
    \ summarize, coroutines are a powerful feature in Python that allow for asynchronous\
    \ programming. They are functions that can pause their execution, save their state,\
    \ and resume execution from where they left off later. To use coroutines in Python,\
    \ we use the asyncio module, which provides the infrastructure for running coroutines\
    \ and managing their execution.\n\n### Using asyncio for I/O-bound tasks\n\nAsyncio\
    \ is a library in Python that helps to write asynchronous code, which can be beneficial\
    \ for handling I/O-bound tasks. When a program performs a lot of I/O-bound tasks,\
    \ it often spends most of its time waiting for the I/O operation to complete.\
    \ By using asyncio, we can write code that efficiently manages I/O-bound tasks\
    \ and can improve the overall performance of the program.\n\nHere's how asyncio\
    \ works: Instead of waiting for the I/O operation to complete, it switches to\
    \ another task that can be executed. When the I/O operation completes, the corresponding\
    \ task is resumed. This allows the program to handle many I/O-bound tasks concurrently\
    \ without the overhead of threads or processes.\n\n### Using concurrent.futures\n\
    \nThe concurrent.futures module in Python provides a high-level interface for\
    \ asynchronously executing functions using threads or processes. This can be useful\
    \ for performing I/O-bound tasks or CPU-bound tasks in parallel. In this subtopic,\
    \ we will explore how to use the concurrent.futures module in Python to execute\
    \ functions concurrently.\n\nHere is an example that demonstrates how to use the\
    \ concurrent.futures module with threads:\n\n```python\nimport concurrent.futures\n\
    import time\n\ndef worker(num):\n    \"\"\"Worker function\"\"\"\n    print(f'Worker\
    \ {num} executing')\n    time.sleep(1)\n    return num\n\nif __name__ == '__main__':\n\
    \    with concurrent.futures.ThreadPoolExecutor() as executor:\n        results\
    \ = [executor.submit(worker, i) for i in range(5)]\n        for f in concurrent.futures.as_completed(results):\n\
    \            print(f.result())\n```\n\nIn this example, we define a function called\
    \ worker that prints a message indicating that it is executing and then sleeps\
    \ for 1 second. We then create a ThreadPoolExecutor object and use a list comprehension\
    \ to create five futures by submitting the worker function and an argument to\
    \ identify the worker to the executor.\n\nWe then use a for loop and the as_completed\
    \ function to iterate over the futures as they complete. The as_completed function\
    \ returns an iterator that yields futures as they complete. We print the result\
    \ of each future to the console when it completes.\n\nWhen we run this code, we\
    \ should see five messages printed to the console indicating that each worker\
    \ is executing concurrently in its own thread. We should also see the results\
    \ of each worker printed to the console as they complete.\n\nWe can also use the\
    \ concurrent.futures module with processes by using the ProcessPoolExecutor class\
    \ instead of the ThreadPoolExecutor class. Here is an example that demonstrates\
    \ how to use the concurrent.futures module with processes:\n\n```python\nimport\
    \ concurrent.futures\nimport time\n\ndef worker(num):\n    \"\"\"Worker function\"\
    \"\"\n    print(f'Worker {num} executing')\n    time.sleep(1)\n    return num\n\
    \nif __name__ == '__main__':\n    with concurrent.futures.ProcessPoolExecutor()\
    \ as executor:\n        results = [executor.submit(worker, i) for i in range(5)]\n\
    \        for f in concurrent.futures.as_completed(results):\n            print(f.result())\n\
    ```\n\nIn this example, we define the same worker function as before. We then\
    \ create a ProcessPoolExecutor object instead of a ThreadPoolExecutor object.\
    \ The rest of the code is the same as before. When we run this code, we should\
    \ see five messages printed to the console indicating that each worker is executing\
    \ concurrently in its own process. We should also see the results of each worker\
    \ printed to the console as they complete.\n\nThe concurrent.futures module provides\
    \ a powerful way to execute functions asynchronously using threads or processes.\
    \ By using the ThreadPoolExecutor class or the ProcessPoolExecutor class, we can\
    \ take advantage of multiple CPU cores to perform CPU-bound tasks in parallel\
    \ or execute I/O-bound tasks concurrently.\n\n### Using multiprocessing\n\nThe\
    \ multiprocessing module provides a powerful way to spawn multiple processes and\
    \ execute code concurrently. By using the Process class or the Pool class, we\
    \ can take advantage of multiple CPU cores to perform CPU-bound tasks in parallel.\
    \ However, care should be taken when using multiprocessing to ensure that shared\
    \ resources (such as memory or database connections) are accessed safely from\
    \ multiple processes.\n\nHere is an example that demonstrates how to use the Process\
    \ class:\n\n```python\nimport multiprocessing\n\ndef worker(num):\n    \"\"\"\
    Worker function\"\"\"\n    print(f'Worker {num} executing')\n    return\n\nif\
    \ __name__ == '__main__':\n    jobs = []\n    for i in range(5):\n        p =\
    \ multiprocessing.Process(target=worker,\n                                   args=(i,))\n\
    \        jobs.append(p)\n        p.start()\n```\n\nIn this example, we define\
    \ a function called worker that prints a message indicating that it is executing.\
    \ We then create a list of processes and use a for loop to create five instances\
    \ of the Process class, passing the worker function and an argument to identify\
    \ the worker as arguments to the constructor.\n\nWe then append each process to\
    \ the jobs list and start it by calling the start method. When we run this code,\
    \ we should see five messages printed to the console indicating that each worker\
    \ is executing concurrently in its own process.\n\nWe can also use the Pool class\
    \ from the multiprocessing module to create a pool of worker processes. The Pool\
    \ class provides a convenient way to create a fixed number of worker processes\
    \ and distribute tasks to them. Here is an example that demonstrates how to use\
    \ the Pool class:\n\n```python\nimport multiprocessing\n\ndef worker(num):\n \
    \   \"\"\"Worker function\"\"\"\n    print(f'Worker {num} executing')\n    return\n\
    \nif __name__ == '__main__':\n    with multiprocessing.Pool(processes=5) as pool:\n\
    \        pool.map(worker, range(5))\n```\n\nIn this example, we define the same\
    \ worker function as before. We then create a Pool object with five processes\
    \ by passing processes=5 as an argument to the constructor.\n\nWe then use the\
    \ map method of the Pool object to apply the worker function to each element in\
    \ the range from 0 to 4. The map method distributes the work across the processes\
    \ in the pool and returns the results as a list.\n\nWhen we run this code, we\
    \ should see five messages printed to the console indicating that each worker\
    \ is executing concurrently in its own process."
  mdcn: "## 协程与 asyncio\n\n### 理解协程\n\n协程是 Python 中一项强大的功能，它支持异步编程。协程是一种可以暂停执行、保存状态，并在稍后从暂停处恢复执行的函数。这使得编写能够并行处理多个任务的代码成为可能，而无需使用多线程或多进程。\n\
    \n要在 Python 中使用协程，我们使用 `asyncio` 模块，它提供了运行协程和管理其执行的基础设施。在使用 Python 协程时，需要理解以下关键概念：\n\
    \n- `async` 和 `await` 关键字：`async` 关键字用于定义协程函数，而 `await` 关键字用于暂停协程的执行，直到某个异步操作完成。\n\
    - 事件循环：事件循环是 `asyncio` 模块的核心。它负责调度和运行协程，并管理异步操作的执行。\n- 协程：协程是使用 `async` 关键字定义自身为可暂停和恢复的异步函数的函数。\n\
    \n这是一个使用 `async` 和 `await` 关键字的简单协程示例：\n\n```python\nimport asyncio\n\nasync def\
    \ my_coroutine():\n    print('Coroutine started')\n    await asyncio.sleep(1)\n\
    \    print('Coroutine resumed')\n    return 'Coroutine finished'\n\nasyncio.run(my_coroutine())\n\
    ```\n\n在这个例子中，我们使用 `async` 关键字定义了一个名为 `my_coroutine()` 的协程函数。该函数打印一条消息，使用 `await`\
    \ 关键字和 `asyncio.sleep()` 函数暂停 1 秒，打印另一条消息，并返回一个值。最后，我们使用 `asyncio.run()` 函数运行该协程。\n\
    \n这是另一个示例，展示了如何使用协程并行运行多个任务：\n\n```python\nimport asyncio\n\nasync def my_coroutine(id):\n\
    \    print(f'Coroutine {id} started')\n    await asyncio.sleep(1)\n    print(f'Coroutine\
    \ {id} resumed')\n    return f'Coroutine {id} finished'\n\nasync def main():\n\
    \    tasks = [asyncio.create_task(my_coroutine(i)) for i in range(3)]\n    results\
    \ = await asyncio.gather(*tasks)\n    print(results)\n\nasyncio.run(main())\n\
    ```\n\n在这个例子中，我们定义了一个 `main()` 协程函数，它使用 `asyncio.create_task()` 函数创建了三个 `my_coroutine()`\
    \ 函数的实例。然后，我们使用 `asyncio.gather()` 函数等待所有任务完成并收集它们的结果。最后，我们打印结果。\n\n总而言之，协程是 Python\
    \ 中一项强大的功能，它支持异步编程。协程是一种可以暂停执行、保存状态，并在稍后从暂停处恢复执行的函数。要在 Python 中使用协程，我们使用 `asyncio`\
    \ 模块，它提供了运行协程和管理其执行的基础设施。\n\n### 使用 asyncio 处理 I/O 密集型任务\n\nAsyncio 是 Python 中的一个库，有助于编写异步代码，这对于处理\
    \ I/O 密集型任务非常有益。当程序执行大量 I/O 密集型任务时，它通常会花费大部分时间等待 I/O 操作完成。通过使用 asyncio，我们可以编写高效管理\
    \ I/O 密集型任务的代码，从而提高程序的整体性能。\n\nAsyncio 的工作原理如下：它不是等待 I/O 操作完成，而是切换到另一个可以执行的任务。当\
    \ I/O 操作完成时，相应的任务会恢复执行。这允许程序并发处理许多 I/O 密集型任务，而没有线程或进程的开销。\n\n### 使用 concurrent.futures\n\
    \nPython 中的 `concurrent.futures` 模块提供了一个高级接口，用于使用线程或进程异步执行函数。这对于并行执行 I/O 密集型任务或\
    \ CPU 密集型任务非常有用。在这个子主题中，我们将探讨如何在 Python 中使用 `concurrent.futures` 模块来并发执行函数。\n\n\
    这是一个演示如何使用 `concurrent.futures` 模块与线程的示例：\n\n```python\nimport concurrent.futures\n\
    import time\n\ndef worker(num):\n    \"\"\"Worker function\"\"\"\n    print(f'Worker\
    \ {num} executing')\n    time.sleep(1)\n    return num\n\nif __name__ == '__main__':\n\
    \    with concurrent.futures.ThreadPoolExecutor() as executor:\n        results\
    \ = [executor.submit(worker, i) for i in range(5)]\n        for f in concurrent.futures.as_completed(results):\n\
    \            print(f.result())\n```\n\n在这个例子中，我们定义了一个名为 `worker` 的函数，它打印一条消息表示正在执行，然后休眠\
    \ 1 秒。然后，我们创建一个 `ThreadPoolExecutor` 对象，并使用列表推导式通过向执行器提交 `worker` 函数和一个标识 worker\
    \ 的参数来创建五个 future。\n\n然后，我们使用 `for` 循环和 `as_completed` 函数在 future 完成时迭代它们。`as_completed`\
    \ 函数返回一个迭代器，该迭代器在 future 完成时产生它们。当每个 future 完成时，我们将其结果打印到控制台。\n\n当我们运行这段代码时，我们应该会看到五条消息打印到控制台，表明每个\
    \ worker 都在自己的线程中并发执行。我们还应该看到每个 worker 完成时的结果打印到控制台。\n\n我们也可以通过使用 `ProcessPoolExecutor`\
    \ 类而不是 `ThreadPoolExecutor` 类来使用 `concurrent.futures` 模块与进程。这是一个演示如何使用 `concurrent.futures`\
    \ 模块与进程的示例：\n\n```python\nimport concurrent.futures\nimport time\n\ndef worker(num):\n\
    \    \"\"\"Worker function\"\"\"\n    print(f'Worker {num} executing')\n    time.sleep(1)\n\
    \    return num\n\nif __name__ == '__main__':\n    with concurrent.futures.ProcessPoolExecutor()\
    \ as executor:\n        results = [executor.submit(worker, i) for i in range(5)]\n\
    \        for f in concurrent.futures.as_completed(results):\n            print(f.result())\n\
    ```\n\n在这个例子中，我们定义了与之前相同的 `worker` 函数。然后，我们创建一个 `ProcessPoolExecutor` 对象而不是 `ThreadPoolExecutor`\
    \ 对象。其余代码与之前相同。当我们运行这段代码时，我们应该会看到五条消息打印到控制台，表明每个 worker 都在自己的进程中并发执行。我们还应该看到每个\
    \ worker 完成时的结果打印到控制台。\n\n`concurrent.futures` 模块提供了一种强大的方式，可以使用线程或进程异步执行函数。通过使用\
    \ `ThreadPoolExecutor` 类或 `ProcessPoolExecutor` 类，我们可以利用多个 CPU 核心来并行执行 CPU 密集型任务或并发执行\
    \ I/O 密集型任务。\n\n### 使用 multiprocessing\n\n`multiprocessing` 模块提供了一种强大的方式来生成多个进程并并发执行代码。通过使用\
    \ `Process` 类或 `Pool` 类，我们可以利用多个 CPU 核心来并行执行 CPU 密集型任务。但是，在使用 `multiprocessing`\
    \ 时应小心，以确保从多个进程安全地访问共享资源（如内存或数据库连接）。\n\n这是一个演示如何使用 `Process` 类的示例：\n\n```python\n\
    import multiprocessing\n\ndef worker(num):\n    \"\"\"Worker function\"\"\"\n\
    \    print(f'Worker {num} executing')\n    return\n\nif __name__ == '__main__':\n\
    \    jobs = []\n    for i in range(5):\n        p = multiprocessing.Process(target=worker,\n\
    \                                   args=(i,))\n        jobs.append(p)\n     \
    \   p.start()\n```\n\n在这个例子中，我们定义了一个名为 `worker` 的函数，它打印一条消息表示正在执行。然后，我们创建一个进程列表，并使用\
    \ `for` 循环创建五个 `Process` 类的实例，将 `worker` 函数和一个标识 worker 的参数作为参数传递给构造函数。\n\n然后，我们将每个进程附加到\
    \ `jobs` 列表，并通过调用 `start` 方法启动它。当我们运行这段代码时，我们应该会看到五条消息打印到控制台，表明每个 worker 都在自己的进程中并发执行。\n\
    \n我们也可以使用 `multiprocessing` 模块中的 `Pool` 类来创建一个 worker 进程池。`Pool` 类提供了一种方便的方式来创建固定数量的\
    \ worker 进程并将任务分配给它们。这是一个演示如何使用 `Pool` 类的示例：\n\n```python\nimport multiprocessing\n\
    \ndef worker(num):\n    \"\"\"Worker function\"\"\"\n    print(f'Worker {num}\
    \ executing')\n    return\n\nif __name__ == '__main__':\n    with multiprocessing.Pool(processes=5)\
    \ as pool:\n        pool.map(worker, range(5))\n```\n\n在这个例子中，我们定义了与之前相同的 `worker`\
    \ 函数。然后，我们通过向构造函数传递 `processes=5` 作为参数，创建了一个包含五个进程的 `Pool` 对象。\n\n然后，我们使用 `Pool`\
    \ 对象的 `map` 方法将 `worker` 函数应用于从 0 到 4 的每个元素。`map` 方法将工作分配到池中的进程，并以列表形式返回结果。\n\n\
    当我们运行这段代码时，我们应该会看到五条消息打印到控制台，表明每个 worker 都在自己的进程中并发执行。"
