    \ `deque`，它是一个双端队列，在两端添加或删除元素时提供 O(1) 的时间复杂度。在本节中，我们将讨论如何使用 `deque` 并提供一些示例代码。\n\
    \n要使用 `deque`，你首先需要从 `collections` 模块中导入它：\n\n```python\nfrom collections import\
    \ deque\n```\n\n导入 `deque` 后，你可以使用以下语法创建一个新的 `deque` 实例：\n\n```python\nmy_deque\
    \ = deque()\n```\n\n这将创建一个空的 `deque` 实例。你也可以向 `deque()` 构造函数传递一个可迭代对象来用一些值初始化它：\n\
    \n```python\nmy_deque = deque([1, 2, 3])\n```\n\n现在你有了一个 `deque` 实例，你可以使用 `append()`\
