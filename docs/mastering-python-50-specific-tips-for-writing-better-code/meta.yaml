    ### 使用 timedelta


    Python `datetime` 模块中的 `timedelta` 类表示一个时间持续量。它可以用于对日期和时间值执行算术运算，这使得它在处理时间间隔的文件和目录访问时非常有用。在本节中，我们将探讨如何在文件和目录访问中使用
    `timedelta`，包括如何计算时间间隔、从日期或时间中加减时间以及格式化时间间隔。


    #### 计算时间间隔


    要计算时间间隔，我们可以创建两个表示两个时间点的 `datetime` 对象，然后将一个减去另一个。结果将是一个表示两个时间点之间持续时间的 `timedelta`
    对象。


    ```python

    from datetime import datetime, timedelta

    import os


    file_path = ''/path/to/file.txt''


    # Get modification time of file

    modification_time = datetime.fromtimestamp(os.path.getmtime(file_path))


    # Get current time

    current_time = datetime.now()


    # Calculate time interval

    time_interval = current_time - modification_time

    print("Time interval:", time_interval)

    ```


    在上面的代码中，我们使用 `datetime.fromtimestamp()` 函数将文件的修改时间（通过 `os.path.getmtime()` 获取）转换为
    `datetime` 对象。然后，我们使用 `datetime.now()` 函数创建一个表示当前时间的 `datetime` 对象。最后，我们从当前时间中减去修改时间，得到一个表示时间间隔的
    `timedelta` 对象。


    #### 加减时间


    我们可以使用 `timedelta` 类对 `datetime` 对象进行加减时间操作。例如，我们可以向一个 `datetime` 对象添加一定数量的天、小时、分钟或秒。


    ```python

    from datetime import datetime, timedelta


    # Get current time

    current_time = datetime.now()


    # Add 1 day to current time

    new_time = current_time + timedelta(days=1)

    print("New time:", new_time)


    # Subtract 1 hour from current time

    new_time = current_time - timedelta(hours=1)

    print("New time:", new_time)

