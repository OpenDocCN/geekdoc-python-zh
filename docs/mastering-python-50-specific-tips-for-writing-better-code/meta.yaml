    \  print(\"End main\")\n\nasyncio.run(main())\n```"
  mdcn: "## 第六章：内置模块\n\nPython 是一种高级、解释型的编程语言，因其简洁性、多功能性和易用性，近年来获得了巨大的人气。Python 流行的众多原因之一是其丰富的内置模块库，这些模块为开发者提供了大量的函数和工具，无需从头编写代码。\n\
