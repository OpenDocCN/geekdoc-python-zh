    \ >>> add_numbers(-1, 1)\n    0\n    \"\"\"\n    return x + y\n\nif __name__ ==\
    \ '__main__':\n    doctest.testmod()\n```\n\nIn the example above, we have imported\
    \ the doctest module and called doctest.testmod() at the bottom of the module\
    \ to run the doctests. When the module is executed, the testmod() function will\
    \ search for doctests in the module's docstrings and execute them. If all tests\
    \ pass, nothing will be printed to the console. If a test fails, an error message\
    \ will be printed to the console.\n\nBest Practices:\n\nWhen writing doctests\
    \ in Python, it is important to follow best practices to ensure that the tests\
    \ are effective and maintainable. Here are some tips:\n\n+   - Write doctests\
    \ for all functions and methods.\n- Include only one input/output pair per test\
    \ case.\n- Use descriptive prompts that describe the input and expected output.\n\
    - Avoid using variables in prompts that are not defined in the function."
- md: "## Writing doctests in Python\n\nWriting doctests in Python is an effective\
    \ way to test functions and document their behavior. By following best practices\
    \ and including doctests for all functions, we can ensure that our code is more\
    \ reliable and maintainable.\n\n- Use assert statements for more complex test\
    \ cases.\n- Use triple quotes for multi-line prompts and output.\n\n## Writing\
    \ function annotations\n\nFunction annotations in Python are used to specify the\
    \ expected data types of function arguments and return values. These annotations\
    \ are not enforced by the interpreter, but they can be used by other tools such\
    \ as linters, type checkers, and IDEs to provide better code completion, type\
    \ checking, and documentation.\n\nTo write function annotations in Python, you\
    \ can use the colon syntax to indicate the expected data type. For example, to\
    \ specify that the function add expects two integers as arguments and returns\
    \ an integer, you can write:\n\n```python\ndef add(x: int, y: int) -> int:\n \
    \   return x + y\n```\n\nIn this example, the int before the argument name and\
    \ after the -> arrow indicate that x and y should be integers, and that the return\
    \ value should also be an integer.\n\nYou can use any data type as a function\
    \ annotation, including built-in types like int, float, str, bool, and None, as\
    \ well as user-defined types and even generic types from the typing module.\n\n\
    Here are some more examples:\n\n```python\ndef greet(name: str) -> str:\n    return\
    \ f\"Hello, {name}!\"\n\ndef divide(x: float, y: float) -> float:\n    return\
    \ x / y\n\ndef repeat_string(s: str, n: int) -> str:\n    return s * n\n\ndef\
    \ process_data(data: List[Dict[str, Any]]) -> Dict[str, Any]:\n    # process data\
    \ and return result\n```\n\nIn this last example, we use the List and Dict types\
    \ from the typing module to specify that the data argument should be a list of\
    \ dictionaries with string keys and values of any type, and that the return value\
    \ should be a dictionary with string keys and values of any type.\n\nIt's worth\
    \ noting that function annotations are optional in Python, and they do not affect\
    \ the behavior of the function in any way. However, they can be very useful for\
    \ providing documentation and improving code quality, especially when working\
    \ on larger projects with multiple developers.\n\nIn addition to function annotations,\
    \ you can also use type hints to specify the expected types of variables and attributes.\
    \ For example:\n\n```python\nname: str = \"Alice\"\nage: int = 30\n\nclass Person:\n\
    \    def __init__(self, name: str, age: int):\n        self.name = name\n    \
    \    self.age = age\n\np = Person(\"Bob\", 25)\n```\n\nIn this example, we use\
    \ type hints to specify that the name variable should be a string and the age\
    \ variable should be an integer, and we use the same annotations in the Person\
    \ class constructor to specify the expected types of the name and age attributes.\n\
    \nOverall, using function annotations and type hints can help make your code more\
    \ readable, maintainable, and reliable. While they are not required in Python,\
    \ they are a powerful tool for improving code quality and reducing errors.\n\n\
    ## Using default arguments\n\nIn Python, you can define default arguments for\
    \ function parameters. Default arguments are values that are automatically assigned\
    \ to a parameter if no argument is provided for that parameter. This allows you\
    \ to write functions that are more flexible and can handle different scenarios\
    \ with minimal changes to the code.\n\nTo use default arguments in Python, you\
    \ simply need to provide a default value for a parameter when defining the function.\
    \ For example, consider the following function that adds two numbers:\n\n```python\n\
    def add(x, y):\n    return x + y\n```\n\nThis function works fine when you call\
    \ it with two arguments:\n\n```python\n>>> add(2, 3)\n5\n```\n\nBut what if you\
    \ want to use the same function to add only one number to a fixed value? You could\
    \ modify the function to take a default value for y:\n\n```python\ndef add(x,\
    \ y=0):\n    return x + y\n```\n\nNow, if you call add with only one argument,\
    \ it will add that argument to 0 (the default value of y):\n\n```python\n>>> add(2)\n\
    2\n```\n\nAnd if you call add with two arguments, it will add them together as\
    \ before:\n\n```python\n>>> add(2, 3)\n5\n```\n\nYou can also use default arguments\
    \ to make a function more flexible by allowing the user to customize some behavior\
    \ without having to modify the function code. For example, consider the following\
    \ function that prints a message:\n\n```python\ndef greet(name, greeting=\"Hello\"\
    ):\n    print(f\"{greeting}, {name}!\")\n```\n\nThis function takes a name argument\
    \ and a greeting argument that defaults to \"Hello\". If you call the function\
    \ with only a name argument, it will print \"Hello, {name}!\":\n\n```python\n\
    >>> greet(\"Alice\")\nHello, Alice!\n```\n\nBut you can also provide a custom\
    \ greeting:\n\n```python\n>>> greet(\"Bob\", \"Good morning\")\nGood morning,\
    \ Bob!\n```\n\nUsing default arguments in Python can help you write more flexible\
    \ and reusable functions, and make your code easier to read and maintain. However,\
    \ you should be careful when using mutable objects (such as lists or dictionaries)\
    \ as default arguments, as their values can be modified across multiple calls\
    \ to the same function, leading to unexpected behavior.\n\n## Using keyword arguments\n\
    \nIn Python, you can use keyword arguments to pass arguments to a function in\
    \ any order you like. Keyword arguments are a way to specify which argument corresponds\
    \ to which parameter by using the parameter name as a keyword when calling the\
    \ function.\n\nTo use keyword arguments in Python, you simply need to provide\
    \ the argument name and its corresponding value when calling the function. For\
    \ example, consider the following function that takes two arguments:\n\n```python\n\
    def greet(name, greeting):\n    print(f\"{greeting}, {name}!\")\n```\n\nTo call\
    \ this function with positional arguments, you need to provide the arguments in\
    \ the correct order:\n\n```python\n>>> greet(\"Alice\", \"Hello\")\nHello, Alice!\n\
    ```\n\nBut you can also call this function with keyword arguments, specifying\
    \ the argument names explicitly:\n\n```python\n>>> greet(name=\"Bob\", greeting=\"\
    Good morning\")\nGood morning, Bob!\n```\n\nWhen using keyword arguments, you\
    \ can provide the arguments in any order you like:\n\n```python\n>>> greet(greeting=\"\
    Hi\", name=\"Charlie\")\nHi, Charlie!\n```\n\nUsing keyword arguments can be especially\
    \ useful when calling functions that have many parameters or when you want to\
    \ provide default values for some of the parameters. For example, consider the\
    \ following function that takes three arguments, with the third argument having\
    \ a default value:\n\n```python\ndef divide(x, y, precision=2):\n    result =\
    \ x / y\n    return round(result, precision)\n```\n\nIf you call this function\
    \ with only two arguments, it will use the default value for precision:\n\n```python\n\
    >>> divide(10, 3)\n3.33\n```\n\nBut you can also provide a custom value for precision\
    \ by using a keyword argument:\n\n```python\n>>> divide(10, 3, precision=4)\n\
    3.3333\n```\n\nKeyword arguments can help make your code more readable and easier\
    \ to maintain, especially when working with functions that have many parameters\
    \ or complex argument lists. By using keyword arguments, you can make it clear\
    \ which argument corresponds to which parameter, and you can provide default values\
    \ for some of the parameters without having to modify the function code.\n\n##\
    \ Using *args and **kwargs\n\nIn Python, you can use *args and **kwargs to define\
    \ functions that can accept an arbitrary number of arguments and keyword arguments,\
    \ respectively. These features can be particularly useful when you don't know\
    \ ahead of time how many arguments you will need to pass to a function, or when\
    \ you want to provide a flexible API that can handle a variety of use cases.\n\
    \n*args is used to pass a variable number of positional arguments to a function.\
    \ When you use *args in a function definition, it tells Python to collect any\
    \ remaining positional arguments into a tuple. For example:\n\n```python\ndef\
    \ my_function(*args):\n    for arg in args:\n        print(arg)\n```\n\nIn this\
    \ example, the function my_function() accepts any number of positional arguments\
    \ and prints each argument to the console. You can call the function with any\
    \ number of arguments:\n\n```python\nmy_function(1, 2, 3) # prints 1 2 3\nmy_function('a',\
    \ 'b', 'c', 'd') # prints a b c d\nmy_function() # prints nothing\n```\n\n**kwargs\
    \ is used to pass a variable number of keyword arguments to a function. When you\
    \ use **kwargs in a function definition, it tells Python to collect any remaining\
    \ keyword arguments into a dictionary. For example:\n\n```python\ndef my_function(**kwargs):\n\
    \    for key, value in kwargs.items():\n        print(f\"{key}: {value}\")\n```\n\
    \nIn this example, the function my_function() accepts any number of keyword arguments\
    \ and prints each argument key-value pair to the console. You can call the function\
    \ with any number of keyword arguments:\n\n```python\nmy_function(name=\"Alice\"\
    , age=25) # prints name: Alice age: 25\n```"
  mdcn: "## 在Python中编写文档测试\n\n在Python中编写文档测试是测试函数并记录其行为的有效方法。遵循最佳实践并为所有函数包含文档测试，可以确保我们的代码更可靠且易于维护。\n\
    \n- 对于更复杂的测试用例，使用`assert`语句。\n- 对于多行提示和输出，使用三引号。\n\n## 编写函数注解\n\nPython中的函数注解用于指定函数参数和返回值的预期数据类型。这些注解不会被解释器强制执行，但可以被其他工具（如代码检查器、类型检查器和集成开发环境）使用，以提供更好的代码补全、类型检查和文档。\n\
    \n要在Python中编写函数注解，可以使用冒号语法来指示预期的数据类型。例如，要指定函数`add`期望两个整数作为参数并返回一个整数，可以这样写：\n\n\
    ```python\ndef add(x: int, y: int) -> int:\n    return x + y\n```\n\n在这个例子中，参数名前的`int`和`->`箭头后的`int`表示`x`和`y`应该是整数，返回值也应该是整数。\n\
    \n你可以使用任何数据类型作为函数注解，包括内置类型如`int`、`float`、`str`、`bool`和`None`，以及用户定义的类型，甚至是来自`typing`模块的泛型类型。\n\
    \n这里有一些更多的例子：\n\n```python\ndef greet(name: str) -> str:\n    return f\"Hello,\
    \ {name}!\"\n\ndef divide(x: float, y: float) -> float:\n    return x / y\n\n\
    def repeat_string(s: str, n: int) -> str:\n    return s * n\n\ndef process_data(data:\
    \ List[Dict[str, Any]]) -> Dict[str, Any]:\n    # 处理数据并返回结果\n```\n\n在最后一个例子中，我们使用了`typing`模块中的`List`和`Dict`类型来指定`data`参数应该是一个字典列表，其键为字符串，值为任意类型，并且返回值应该是一个字典，其键为字符串，值为任意类型。\n\
    \n值得注意的是，函数注解在Python中是可选的，它们不会以任何方式影响函数的行为。然而，它们对于提供文档和提高代码质量非常有用，尤其是在处理涉及多个开发者的大型项目时。\n\
    \n除了函数注解，你还可以使用类型提示来指定变量和属性的预期类型。例如：\n\n```python\nname: str = \"Alice\"\nage:\
    \ int = 30\n\nclass Person:\n    def __init__(self, name: str, age: int):\n  \
    \      self.name = name\n        self.age = age\n\np = Person(\"Bob\", 25)\n```\n\
    \n在这个例子中，我们使用类型提示来指定`name`变量应该是字符串，`age`变量应该是整数，并且我们在`Person`类构造函数中使用了相同的注解来指定`name`和`age`属性的预期类型。\n\
    \n总的来说，使用函数注解和类型提示可以帮助使你的代码更具可读性、可维护性和可靠性。虽然它们在Python中不是必需的，但它们是提高代码质量和减少错误的强大工具。\n\
    \n## 使用默认参数\n\n在Python中，你可以为函数参数定义默认参数。默认参数是在未为该参数提供参数值时自动分配给该参数的值。这允许你编写更灵活的函数，能够在对代码进行最小更改的情况下处理不同的场景。\n\
    \n要在Python中使用默认参数，你只需在定义函数时为参数提供一个默认值即可。例如，考虑以下将两个数字相加的函数：\n\n```python\ndef add(x,\
    \ y):\n    return x + y\n```\n\n当你用两个参数调用此函数时，它工作正常：\n\n```python\n>>> add(2,\
    \ 3)\n5\n```\n\n但如果你想使用同一个函数将一个数字加到一个固定值上呢？你可以修改函数，为`y`提供一个默认值：\n\n```python\n\
    def add(x, y=0):\n    return x + y\n```\n\n现在，如果你只用一个参数调用`add`，它会将该参数与0（`y`的默认值）相加：\n\
    \n```python\n>>> add(2)\n2\n```\n\n如果你用两个参数调用`add`，它会像以前一样将它们相加：\n\n```python\n\
    >>> add(2, 3)\n5\n```\n\n你也可以使用默认参数使函数更灵活，允许用户自定义某些行为而无需修改函数代码。例如，考虑以下打印消息的函数：\n\
    \n```python\ndef greet(name, greeting=\"Hello\"):\n    print(f\"{greeting}, {name}!\"\
    )\n```\n\n此函数接受一个`name`参数和一个默认值为\"Hello\"的`greeting`参数。如果你只用`name`参数调用该函数，它将打印\"\
    Hello, {name}!\"：\n\n```python\n>>> greet(\"Alice\")\nHello, Alice!\n```\n\n但你也可以提供自定义的问候语：\n\
    \n```python\n>>> greet(\"Bob\", \"Good morning\")\nGood morning, Bob!\n```\n\n\
    在Python中使用默认参数可以帮助你编写更灵活、可重用的函数，并使你的代码更易于阅读和维护。然而，在使用可变对象（如列表或字典）作为默认参数时应小心，因为它们的值可能会在多次调用同一函数时被修改，导致意外行为。\n\
    \n## 使用关键字参数\n\n在Python中，你可以使用关键字参数以任意顺序向函数传递参数。关键字参数是一种通过在调用函数时使用参数名作为关键字来指定哪个参数对应哪个参数的方式。\n\
    \n要在Python中使用关键字参数，你只需在调用函数时提供参数名及其对应的值即可。例如，考虑以下接受两个参数的函数：\n\n```python\ndef\
    \ greet(name, greeting):\n    print(f\"{greeting}, {name}!\")\n```\n\n要使用位置参数调用此函数，你需要按正确的顺序提供参数：\n\
    \n```python\n>>> greet(\"Alice\", \"Hello\")\nHello, Alice!\n```\n\n但你也可以使用关键字参数调用此函数，显式地指定参数名：\n\
    \n```python\n>>> greet(name=\"Bob\", greeting=\"Good morning\")\nGood morning,\
    \ Bob!\n```\n\n使用关键字参数时，你可以按任意顺序提供参数：\n\n```python\n>>> greet(greeting=\"Hi\"\
    , name=\"Charlie\")\nHi, Charlie!\n```\n\n当调用具有许多参数的函数或希望为某些参数提供默认值时，使用关键字参数尤其有用。例如，考虑以下接受三个参数的函数，其中第三个参数具有默认值：\n\
    \n```python\ndef divide(x, y, precision=2):\n    result = x / y\n    return round(result,\
    \ precision)\n```\n\n如果你只用两个参数调用此函数，它将使用`precision`的默认值：\n\n```python\n>>> divide(10,\
    \ 3)\n3.33\n```\n\n但你也可以通过使用关键字参数为`precision`提供自定义值：\n\n```python\n>>> divide(10,\
    \ 3, precision=4)\n3.3333\n```\n\n关键字参数可以帮助使你的代码更具可读性和更易于维护，尤其是在处理具有许多参数或复杂参数列表的函数时。通过使用关键字参数，你可以清楚地表明哪个参数对应哪个参数，并且可以为某些参数提供默认值，而无需修改函数代码。\n\
    \n## 使用 *args 和 **kwargs\n\n在Python中，你可以使用`*args`和`**kwargs`来分别定义可以接受任意数量的位置参数和关键字参数的函数。当你事先不知道需要向函数传递多少个参数，或者希望提供一个可以处理各种用例的灵活API时，这些功能特别有用。\n\
    \n`*args`用于向函数传递可变数量的位置参数。当你在函数定义中使用`*args`时，它告诉Python将任何剩余的位置参数收集到一个元组中。例如：\n\
    \n```python\ndef my_function(*args):\n    for arg in args:\n        print(arg)\n\
    ```\n\n在这个例子中，函数`my_function()`接受任意数量的位置参数，并将每个参数打印到控制台。你可以用任意数量的参数调用该函数：\n\n\
    ```python\nmy_function(1, 2, 3) # 打印 1 2 3\nmy_function('a', 'b', 'c', 'd') #\
    \ 打印 a b c d\nmy_function() # 不打印任何内容\n```\n\n`**kwargs`用于向函数传递可变数量的关键字参数。当你在函数定义中使用`**kwargs`时，它告诉Python将任何剩余的关键字参数收集到一个字典中。例如：\n\
    \n```python\ndef my_function(**kwargs):\n    for key, value in kwargs.items():\n\
    \        print(f\"{key}: {value}\")\n```\n\n在这个例子中，函数`my_function()`接受任意数量的关键字参数，并将每个参数的键值对打印到控制台。你可以用任意数量的关键字参数调用该函数：\n\
    \n```python\nmy_function(name=\"Alice\", age=25) # 打印 name: Alice age: 25\n```"
