    \n此外，我们将探讨一些与 Python 中类和对象相关的高级主题。我们将讨论封装的概念，即将数据和方法隐藏在类中以保护它们免受外部访问的实践。我们还将介绍多态的概念，它允许不同类的对象可以互换使用。\n\
    \n最后，我们将提供一些在实际场景中使用类和对象的实用示例。我们将演示如何创建表示银行账户和汽车等常见对象的类，并展示如何使用它们来执行各种操作。我们还将提供如何使用继承来创建继承现有类属性和方法的新类的示例。\n\
    \n在本章结束时，你将对 Python 中的类和对象有深入的理解，以及如何使用它们来创建可复用且可维护的代码。你还将对如何使用继承、封装和多态来创建强大而灵活的程序有扎实的理解。无论你是初学者还是经验丰富的开发者，本章都将为你提供在\
    \ Python 中创建高质量面向对象代码所需的知识和技能。\n\n### 类基础\n\n-   创建和使用类\n\n在 Python 中，类是创建具有一组属性和方法的对象的蓝图。它是一种组织和构建代码的方式，允许你创建可在整个代码中使用的自定义数据类型。在本节中，我们将介绍在\
    \ Python 中创建和使用类的基础知识。\n\n创建类：\n\n要在 Python 中创建一个类，你需要使用 `class` 关键字，后跟类的名称。以下是一个示例：\n\
    \n```python\nclass Person:\n    pass\n```\n\n```python\nmy_obj = MyClass()\nmy_obj.method1()\
    \ # Output: Execution time of method1: 1.000123\nmy_obj.method2() # Output: Execution\
    \ time of method2: 2.000234\n```\n\n在上面的示例中，`log_execution_time` 函数接受一个类 `cls`\
    \ 作为参数，并遍历其所有属性。如果某个属性是一个方法，则会创建一个新函数，该函数使用 `time` 模块记录该方法的执行时间。然后，使用 `setattr`\
    \ 函数将原始方法替换为新函数。接着，将 `@log_execution_time` 装饰器应用于 `MyClass` 类，这会通过将其方法替换为记录执行时间的版本来修改该类。\n\
    \n-   使用闭包\n\n闭包是 Python 的一个强大特性，允许你创建具有持久状态的函数。闭包是一个函数，它能记住其定义时作用域内的变量值。这使得创建具有“记忆”功能并在调用之间保留信息的函数成为可能。\n\
    \n要在 Python 中创建闭包，你需要在一个函数内部定义另一个函数并返回它。内部函数可以访问外部函数作用域中的变量，即使在外部函数执行完毕后也是如此。以下是一个示例：\n\
    \n```python\ndef outer_function(x):\n    def inner_function(y):\n        return\
    \ x + y\n    return inner_function\n```\n\n```python\nclosure = outer_function(10)\n\
    print(closure(5)) # Output: 15\n```\n\n在上面的示例中，`outer_function` 接受一个参数 `x` 并定义了一个内部函数\
    \ `inner_function`，该函数接受另一个参数 `y`。内部函数返回 `x` 和 `y` 的和。\n\n当使用参数 10 调用 `outer_function`\
    \ 时，它返回 `inner_function`。这创建了一个闭包，它记住 `x` 的值为 10。然后，该闭包被赋值给变量 `closure`。\n\n当使用参数\
    \ 5 调用闭包时，它会以 `y` 等于 5 调用 `inner_function`，并返回 `x` 和 `y` 的和，即 15。\n\n闭包通常用于创建具有持久状态的函数。例如，你可以使用闭包创建一个计数器函数，如下所示：\n\
    \n```python\ndef counter():\n    count = 0\n    def inner_function():\n      \
    \  nonlocal count\n        count += 1\n        return count\n    return inner_function\n\
    ```\n\n```python\nmy_counter = counter()\nprint(my_counter()) # Output: 1\nprint(my_counter())\
    \ # Output: 2\nprint(my_counter()) # Output: 3\n```\n\n在上面的示例中，`counter` 函数定义了一个内部函数\
    \ `inner_function`，它可以访问外部函数作用域中的变量 `count`。内部函数每次被调用时都会递增 `count` 的值并返回它。\n\n\
    当调用 `counter` 函数时，它返回 `inner_function`。这创建了一个闭包，它记住 `count` 的值为 0。然后，该闭包被赋值给变量\
    \ `my_counter`。\n\n每次调用 `my_counter` 时，它都会调用 `inner_function` 并返回 `count` 的当前值。由于闭包在调用之间持续存在，`count`\
    \ 的值每次都会递增，计数器函数按预期工作。\n\n总之，闭包是 Python 的一个强大特性，允许你创建具有持久状态的函数。它们通过在一个函数内部定义另一个函数并返回它来创建。内部函数可以访问外部函数作用域中的变量，即使在外部函数执行完毕后也是如此。闭包通常用于创建具有持久状态的函数，例如计数器或记忆化函数。\n\
    \n-   使用 `functools.partial`\n\n`functools.partial` 是 Python 的一个内置模块，允许你创建一个新函数，该函数基于现有函数，但已“填充”了部分参数。它是使函数更灵活和可复用的有用工具。\n\
    \n要使用 `functools.partial`，你首先需要导入它：\n\n```python\nfrom functools import partial\n\
    ```\n\n导入 `partial` 后，你可以使用它基于现有函数创建一个新函数。以下是一个示例：\n\n```python\ndef multiply(x,\
    \ y):\n    return x * y\ndouble = partial(multiply, y=2)\n\nprint(double(5)) #\
    \ Output: 10\n```\n\n在上面的示例中，`multiply` 函数接受两个参数 `x` 和 `y` 并返回它们的乘积。`partial`\
    \ 函数用于基于 `multiply` 创建一个新函数 `double`，其中 `y` 设置为 2。这意味着 `double` 只接受一个参数 `x`，并且总是将其乘以\
    \ 2。\n\n当使用参数 5 调用 `double` 时，它会以 `x` 等于 5 和 `y` 等于 2 调用 `multiply` 函数，并返回两者的乘积，即\
    \ 10。\n\n`partial` 也可以用于填充函数的多个参数。以下是一个示例：\n\n```python\ndef power(base, exponent):\n\
    \    return base ** exponent\n\nsquare = partial(power, exponent=2)\ncube = partial(power,\
    \ exponent=3)\n\nprint(square(5)) # Output: 25\nprint(cube(5)) # Output: 125\n\
    ```\n\n在上面的示例中，`power` 函数接受两个参数 `base` 和 `exponent`，并返回 `base` 的 `exponent` 次幂。`partial`\
    \ 函数用于基于 `power` 创建两个新函数 `square` 和 `cube`，其中 `exponent` 分别设置为 2 和 3。\n\n当使用参数\
    \ 5 调用 `square` 时，它会以 `base` 等于 5 和 `exponent` 等于 2 调用 `power` 函数，并返回 5 的平方，即\
    \ 25。类似地，当使用参数 5 调用 `cube` 时，它会以 `base` 等于 5 和 `exponent` 等于 3 调用 `power` 函数，并返回\
    \ 5 的立方，即 125。\n\n总之，`functools.partial` 是一个强大的工具，通过允许你基于现有函数创建新函数（其中一些参数已填充），使函数更灵活和可复用。它对于创建相似但某些参数具有不同默认值的函数特别有用。"
