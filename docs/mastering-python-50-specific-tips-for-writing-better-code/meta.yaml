    \ Here's an example:\n\n```python\nimport pytest\n\n@pytest.fixture\ndef example_list():\n\
    \    return [1, 2, 3]\n\ndef test_example(example_list):\n    assert sum(example_list)\
    \ == 6\n```\n\nIn the code above, we define a fixture function called example_list()\
    \ that returns a list containing the values 1, 2, and 3. We use the @pytest.fixture\
    \ decorator to mark this function as a fixture. We then define a test function\
    \ called test_example() that takes example_list as an argument. The example_list\
    \ argument is automatically injected into the test function by pytest, and we\
    \ can use it to make assertions about the output of our code.\n\n### Debugging\
