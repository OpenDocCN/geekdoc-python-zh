    The groupby() function in Python''s itertools module is a powerful tool for grouping
    items in an iterable based on a key function. The key function returns a value
    for each item in the iterable, and the items with the same value are grouped together
    into a single group.


    The groupby() function works by creating an iterator that produces pairs of keys
    and groups, where the key is the value returned by the key function, and the group
    is an iterator that produces the items in the iterable that have that key.'
