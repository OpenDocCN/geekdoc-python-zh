    ### Using datetime


    The datetime module in Python provides classes to work with dates and times. It''s
    useful when working with file and directory access because it allows us to manipulate
    and format time stamps associated with file metadata. In this note, we will explore
    how to use datetime in file and directory access, including how to retrieve the
    creation time, modification time, and access time of a file, as well as how to
    convert time stamps to human-readable formats.


    Retrieving Time Stamps:


    To retrieve time stamps associated with file metadata, we can use the os.path
    module, which provides functions for working with file paths. Specifically, we
    can use the os.path.getctime(), os.path.getmtime(), and os.path.getatime() functions
    to retrieve the creation time, modification time, and access time of a file, respectively.
    These functions return time stamps in seconds since the epoch (January 1, 1970,
    00:00:00 UTC).


    ```python

    import os

    import datetime


    file_path = ''/path/to/file.txt''


    # Get creation time of file

    creation_time = os.path.getctime(file_path)

    creation_time = datetime.datetime.fromtimestamp(creation_time)

    print("Creation time:", creation_time)


    # Get modification time of file

    modification_time = os.path.getmtime(file_path)

    modification_time = datetime.datetime.fromtimestamp(modification_time)

    print("Modification time:", modification_time)


    # Get access time of file

    access_time = os.path.getatime(file_path)

    access_time = datetime.datetime.fromtimestamp(access_time)

    print("Access time:", access_time)

    ```


    In the code above, we use the fromtimestamp() method of the datetime.datetime
    class to convert the time stamps to datetime objects, which we can then manipulate
    and format.


    Converting Time Stamps:


    To convert time stamps to human-readable formats, we can use the strftime() method
    of the datetime.datetime class. This method allows us to format a datetime object
    as a string, using a format string that specifies the desired format.


    ```python

    import os

    import datetime


    file_path = ''/path/to/file.txt''


    # Get modification time of file

    modification_time = os.path.getmtime(file_path)

    modification_time = datetime.datetime.fromtimestamp(modification_time)


    # Convert modification time to a string in ISO format

    modification_time_str = modification_time.strftime("%Y-%m-%d %H:%M:%S")

    print("Modification time:", modification_time_str)


    # Convert modification time to a string in a custom format

    modification_time_str = modification_time.strftime("%b %d, %Y %I:%M:%S %p")

    print("Modification time:", modification_time_str)

    ```


    In the code above, we use the %Y, %m, %d, %H, %M, and %S format codes to represent
    the year, month, day, hour, minute, and second of the datetime object, respectively.
    We also use the %b format code to represent the abbreviated month name, %d to
    represent the day of the month, %Y to represent the year, %I to represent the
    hour in 12-hour format, %M to represent the minute, %S to represent the second,
    and %p to represent the AM or PM designation.


    Using the datetime module in file and directory access allows us to manipulate
    and format time stamps associated with file metadata. By retrieving time stamps
    using the os.path module and converting them to datetime objects, we can then
    use the strftime() method to format them as human-readable strings.


    ### Using time


    The time module in Python provides functions to work with time and date values.
    It is particularly useful when working with file and directory access because
    it allows us to manipulate and format time stamps associated with file metadata.
    In this note, we will explore how to use time in file and directory access, including
    how to retrieve the creation time, modification time, and access time of a file,
    as well as how to convert time stamps to human-readable formats.


    Retrieving Time Stamps:


    To retrieve time stamps associated with file metadata, we can use the os.path
    module, which provides functions for working with file paths. Specifically, we
    can use the os.path.getctime(), os.path.getmtime(), and os.path.getatime() functions
    to retrieve the creation time, modification time, and access time of a file, respectively.
    These functions return time stamps in seconds since the epoch (January 1, 1970,
    00:00:00 UTC).


    ```python

    import os

    import time


    file_path = ''/path/to/file.txt''


    # Get creation time of file

    creation_time = os.path.getctime(file_path)

    creation_time = time.localtime(creation_time)

    print("Creation time:", time.strftime("%Y-%m-%d %H:%M:%S", creation_time))


    # Get modification time of file

    modification_time = os.path.getmtime(file_path)

    modification_time = time.localtime(modification_time)

    print("Modification time:", time.strftime("%Y-%m-%d %H:%M:%S", modification_time))


    # Get access time of file

    access_time = os.path.getatime(file_path)

    access_time = time.localtime(access_time)

    ```


    ### Using glob


    Python''s glob module provides a way to search for files and directories that
    match a specified pattern. It uses Unix shell-style wildcards such as * and ?
    to match filenames.


    Here are some examples of how to use the glob module for file and directory access:


    Finding Files with a Specific Extension:


    The glob.glob() function can be used to find all files with a specific extension
    in a directory. Here''s an example:


    ```python

    import glob


    # find all .txt files in a directory

    dir_path = ''/path/to/directory''

    txt_files = glob.glob(f"{dir_path}/*.txt")

    print(txt_files)

    ```


    Finding Files with a Specific Name:


    The glob.glob() function can also be used to find all files with a specific name
    in a directory. Here''s an example:


    ```python

    import glob


    # find all files named ''file.txt'' in a directory

    dir_path = ''/path/to/directory''

    file_path = f"{dir_path}/file.txt"

    matching_files = glob.glob(file_path)

    print(matching_files)

    ```


    Finding Directories:


    The glob.glob() function can also be used to find all directories in a directory.
    Here''s an example:


    ```python

    import glob


    # find all directories in a directory

    dir_path = ''/path/to/directory''

    matching_dirs = glob.glob(f"{dir_path}/*/")

    print(matching_dirs)

    ```


    Recursive Search:


    The glob.glob() function can also be used to recursively search for files and
    directories in a directory and all its subdirectories. Here''s an example:


    ```python

    import glob


    # find all .txt files in a directory and its subdirectories

    dir_path = ''/path/to/directory''

    txt_files = glob.glob(f"{dir_path}/**/*.txt", recursive=True)

    print(txt_files)

    ```


    These are just a few examples of the many ways in which the glob module can be
    used for file and directory access. By utilizing this module, you can easily search
    for files and directories that match a specific pattern, which can be very useful
    for organizing and processing large numbers of files.


    ### Using shutil


    The shutil module provides a number of high-level operations on files and directories.
    Here are some examples:


    Moving Files and Directories:


    The shutil.move() function can be used to move a file or directory from one location
    to another. Here''s an example:


    ```python

    import shutil


    # move a file

    src_file = ''/path/to/source/file.txt''

    dest_dir = ''/path/to/destination''

    shutil.move(src_file, dest_dir)


    # rename a file

    src_file = ''/path/to/source/old_name.txt''

    dest_file = ''/path/to/source/new_name.txt''

    shutil.move(src_file, dest_file)


    # move a directory

    src_dir = ''/path/to/source''

    dest_dir = ''/path/to/destination''

    shutil.move(src_dir, dest_dir)


    # rename a directory

    src_dir = ''/path/to/source/old_name''

    dest_dir = ''/path/to/source/new_name''

    shutil.move(src_dir, dest_dir)

    ```


    Removing Files and Directories:


    The os.remove() function can be used to remove a file, while the shutil.rmtree()
    function can be used to remove an entire directory tree. Here''s an example:


    ```python

    import os

