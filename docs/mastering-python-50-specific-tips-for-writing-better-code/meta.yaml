    \n```python\ndef greeting_decorator(func):\n    def wrapper():\n        print(\"\
    Hello!\")\n        func()\n    return wrapper\n\n@greeting_decorator\ndef say_hello():\n\
    \    print(\"Welcome to my program!\")\n\nsay_hello()\n```\n\n在这个例子中，我们定义了一个 `greeting_decorator()`\
    \ 函数，它接受原始函数 `func` 作为输入，定义了一个新函数 `wrapper()`，该函数在调用 `func()` 之前添加问候语，并返回 `wrapper()`。然后我们使用\
    \ `@greeting_decorator` 装饰 `say_hello()` 函数，这通过在调用前添加问候语来修改它。\n\n当我们调用 `say_hello()`\
    \ 时，输出将是：\n\n```\nHello!\nWelcome to my program!\n```\n\n### 向装饰器传递参数\n\n我们还可以修改装饰器以接受参数。当我们想根据某些外部参数修改函数的行为时，这会很有用。\n\
    \n这是一个接受参数的装饰器示例：\n\n```python\ndef repeat(num):\n    def decorator(func):\n \
    \       def wrapper(*args, **kwargs):\n            for i in range(num):\n    \
    \            func(*args, **kwargs)\n        return wrapper\n    return decorator\n\
    \n@repeat(3)\ndef say_hello(name):\n    print(f\"Hello, {name}!\")\n\nsay_hello(\"\
