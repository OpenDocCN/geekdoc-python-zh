    In summary, Pythonic thinking is a way of approaching programming in Python that
    emphasizes simplicity, readability, and efficiency. It is a mindset that encourages
    developers to write code that is easy to read, maintain, and understand. By following
    the core principles of Pythonic thinking, Python developers can write code that
    is not only efficient but also elegant and easy to understand.


    ## Know your data structures


    ### Tuples


    In Pythonic thinking, it is essential to know the data structures available in
    the Python programming language and how to use them effectively. In this note,
    we will discuss tuples, one of the most commonly used data structures in Python,
    and provide code examples to demonstrate their usage.


    A tuple is an ordered collection of elements that can be of any data type. However,
    tuples are immutable, which means their elements cannot be changed once they are
    created. Tuples are typically used for grouping related data together.


    Here are some examples of tuples and how to use them:


    Creating a tuple:


    Tuples can be created using parentheses or the `tuple()` function.


    ```python

    # Creating a tuple using parentheses

    mytuple = (1, 2, 3, 4, 5)


    # Creating a tuple using the tuple() function

    mytuple = tuple([1, 2, 3, 4, 5])

    ```


    Accessing tuple elements:


    Tuple elements can be accessed using indexing. Indexing starts at 0 for the first
    element.


    ```python

    # Accessing tuple elements

    mytuple = (1, 2, 3, 4, 5)


    print(mytuple[0]) # Output: 1

    print(mytuple[2]) # Output: 3

    ```


    Slicing a tuple:


    Tuples can be sliced using the same syntax as lists.


    ```python

    # Slicing a tuple

    mytuple = (1, 2, 3, 4, 5)


    print(mytuple[1:3]) # Output: (2, 3)

    ```


    Unpacking a tuple:


    Tuples can be unpacked into multiple variables.


    ```python

    # Unpacking a tuple

    mytuple = (1, 2, 3)


    a, b, c = mytuple


    print(a) # Output: 1

    print(b) # Output: 2

    print(c) # Output: 3

    ```


    Concatenating tuples:


    Tuples can be concatenated using the `+` operator.


    ```python

    # Concatenating tuples

    tuple1 = (1, 2, 3)

    tuple2 = (4, 5, 6)


    newtuple = tuple1 + tuple2


    print(newtuple) # Output: (1, 2, 3, 4, 5, 6)

    ```


    Using tuples as keys in dictionaries:


    Since tuples are immutable, they can be used as keys in dictionaries.


    ```python

    # Using tuples as keys in dictionaries

    mydict = {(1, 2): ''value1'', (3, 4): ''value2''}


    print(mydict[(1, 2)]) # Output: ''value1''

    print(mydict[(3, 4)]) # Output: ''value2''

    ```


    In summary, tuples are an essential data structure in Pythonic thinking, and they
    can be used for a wide range of applications. They are particularly useful for
    grouping related data together, and their immutability makes them ideal for use
    as keys in dictionaries or as elements in sets.


    ### Lists


    In Pythonic thinking, it is crucial to know the available data structures and
    how to use them effectively. One of the most commonly used data structures in
    Python is the list. A list is an ordered collection of elements that can be of
    any data type. Lists are mutable, which means their elements can be changed once
    they are created. Lists are typically used for storing data that can be modified
    or changed.


    Here are some examples of lists and how to use them:


    Creating a list:


    Lists can be created using square brackets `[]` or the `list()` function.


    ```python

    # Creating a list using square brackets

    mylist = [1, 2, 3, 4, 5]


    # Creating a list using the list() function

    mylist = list([1, 2, 3, 4, 5])

    ```


    Accessing list elements:


    List elements can be accessed using indexing. Indexing starts at 0 for the first
    element.


    ```python

    # Accessing list elements

    mylist = [1, 2, 3, 4, 5]


    print(mylist[0]) # Output: 1

    print(mylist[2]) # Output: 3

    ```


    Slicing a list:


    Lists can be sliced using the syntax `start:end`. Slicing a list returns a new
    list containing the selected elements.


    ```python

    # Slicing a list

    mylist = [1, 2, 3, 4, 5]


    print(mylist[1:3]) # Output: [2, 3]

    ```


    Modifying list elements:


    Since lists are mutable, their elements can be modified.


    ```python

    # Modifying list elements

    mylist = [1, 2, 3, 4, 5]


    mylist[2] = 7


    print(mylist) # Output: [1, 2, 7, 4, 5]

    ```


    Adding elements to a list:


    Elements can be added to a list using the `append()` method or the `extend()`
    method to add multiple elements at once.


    ```python

    # Adding elements to a list

    mylist = [1, 2, 3]


    mylist.append(4)

    print(mylist) # Output: [1, 2, 3, 4]


    mylist.extend([5, 6])

    print(mylist) # Output: [1, 2, 3, 4, 5, 6]

    ```


    Removing elements from a list:


    Elements can be removed from a list using the `remove()` method or the `pop()`
    method to remove an element at a specific index.


    ```python

    # Removing elements from a list

    mylist = [1, 2, 3, 4, 5]


    mylist.remove(3)

    print(mylist) # Output: [1, 2, 4, 5]


    mylist.pop(2)

    print(mylist) # Output: [1, 2, 5]

    ```


    Sorting a list:


    Lists can be sorted using the `sort()` method or the `sorted()` function.


    ```python

    # Sorting a list

    mylist = [4, 2, 3, 1, 5]


    mylist.sort()

    print(mylist) # Output: [1, 2, 3, 4, 5]


    sortedlist = sorted(mylist, reverse=True)

    print(sortedlist) # Output: [5, 4, 3, 2, 1]

    ```


    ### Dictionaries


    In Pythonic thinking, it is essential to know the available data structures and
    how to use them effectively. One of the most commonly used data structures in
    Python is the dictionary. A dictionary is an unordered collection of key-value
    pairs, where each key is unique. Dictionaries are mutable, which means their elements
    can be changed once they are created. Dictionaries are typically used for storing
    data that can be looked up using a key.


    Here are some examples of dictionaries and how to use them:


    Creating a dictionary:


    Dictionaries can be created using curly braces `{}` or the `dict()` function.


    ```python

    # Creating a dictionary using curly braces

    mydict = {''apple'': 1, ''banana'': 2, ''orange'': 3}


    # Creating a dictionary using the dict() function

    mydict = dict(apple=1, banana=2, orange=3)

    ```


    Accessing dictionary elements:


    Dictionary elements can be accessed using the key. If the key does not exist,
    a `KeyError` will be raised.


    ```python

    # Accessing dictionary elements

    mydict = {''apple'': 1, ''banana'': 2, ''orange'': 3}


    print(mydict[''apple'']) # Output: 1

    print(mydict[''watermelon'']) # Raises KeyError: ''watermelon''

    ```


    Modifying dictionary elements:


    Since dictionaries are mutable, their elements can be modified.


    ```python

    # Modifying dictionary elements

    mydict = {''apple'': 1, ''banana'': 2, ''orange'': 3}


    mydict[''orange''] = 4


    print(mydict) # Output: {''apple'': 1, ''banana'': 2, ''orange'': 4}

    ```


    Adding elements to a dictionary:


    Elements can be added to a dictionary using the key-value syntax.


    ```python

    # Adding elements to a dictionary

    mydict = {''apple'': 1, ''banana'': 2}

    mydict[''orange''] = 3

    print(mydict) # Output: {''apple'': 1, ''banana'': 2, ''orange'': 3}

    ```


    Removing elements from a dictionary:


    Elements can be removed from a dictionary using the `del` keyword or the `pop()`
    method to remove an element using its key.


    ```python

    # Removing elements from a dictionary

    mydict = {''apple'': 1, ''banana'': 2, ''orange'': 3}


    del mydict[''orange'']

    print(mydict) # Output: {''apple'': 1, ''banana'': 2}


    mydict.pop(''banana'')

    print(mydict) # Output: {''apple'': 1}

    ```


    Checking if a key exists in a dictionary:


    To check if a key exists in a dictionary, you can use the `in` keyword.


    ```python

    # Checking if a key exists in a dictionary

    mydict = {''apple'': 1, ''banana'': 2, ''orange'': 3}


    print(''banana'' in mydict) # Output: True

    print(''watermelon'' in mydict) # Output: False

    ```


    Iterating over a dictionary:


    To iterate over a dictionary, you can use the `items()` method to get the key-value
    pairs or the `keys()` method to get the keys.'
