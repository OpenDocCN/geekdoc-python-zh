    # Coroutines and asyncio


    +   - Understanding coroutines


    Coroutines are a powerful feature in Python that allow for asynchronous programming.
    They are functions that can pause their execution, save their state, and resume
    execution from where they left off later. This makes it possible to write code
    that can handle multiple tasks in parallel, without the need for multiple threads
    or processes.


    To use coroutines in Python, we use the asyncio module, which provides the infrastructure
    for running coroutines and managing their execution. Here are the key concepts
    to understand when working with coroutines in Python:


    +   - async and await keywords: The async keyword is used to define a coroutine
    function, while the await keyword is used to pause execution of a coroutine until
    some asynchronous operation is completed.

    - Event loop: The event loop is the heart of the asyncio module. It is responsible
    for scheduling and running'
