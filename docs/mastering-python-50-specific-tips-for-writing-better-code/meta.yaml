  - "[PAGE 96]\n\nthis note, we will discuss how to write doctests in Python, including\
    \ the syntax and best practices.\n\nSyntax:\n\nDoctests are written in the docstring\
    \ of a function and consist of a series of input/output pairs. Each input/output\
    \ pair consists of a prompt, a function call, and the expected output. The prompt\
    \ is a string that describes the test case and the function call is the expression\
    \ to be evaluated.\n\nHere is an example of a simple function with a doctest:\n\
    \n```\ndef add_numbers(x, y):\n    \"\"\"\n    Add two numbers and return the\
    \ result.\n\n    >>> add_numbers(2, 3)\n    5\n    >>> add_numbers(-1, 1)\n  \
    \  0\n    \"\"\"\n    return x + y\n```\n\nIn the example above, we have defined\
    \ a function add_numbers that takes two numbers and returns their sum. We have\
    \ also included two doctests in the function's docstring. The first doctest checks\
    \ that add_numbers(2, 3) returns 5 and the second doctest checks that add_numbers(-1,\
    \ 1) returns 0.\n\nRunning Doctests:\n\nDoctests can be run using the built-in\
    \ doctest module in Python. To run doctests for a module, simply call doctest.testmod()\
    \ at the bottom of the module."
