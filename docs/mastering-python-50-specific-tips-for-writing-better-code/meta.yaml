    The datetime module in Python provides classes to work with dates and times. It''s
    useful when working with file and directory access because it allows us to manipulate
    and format time stamps associated with file metadata. In this note, we will explore
    how to use datetime in file and directory access, including how to retrieve the
    creation time, modification time, and access time of a file, as well as how to
    convert time stamps to human-readable formats.


    Retrieving Time Stamps:


    To retrieve time stamps associated with file metadata, we can use the os.path
    module, which provides functions for working with file paths. Specifically, we
    can use the os.path.getctime(), os.path.getmtime(), and os.path.getatime() functions
    to retrieve the creation time, modification time, and access time of a file, respectively.
    These functions return time stamps in seconds since the epoch (January 1, 1970,
    00:00:00 UTC).


    ```

    import os

    import datetime


    file_path = ''/path/to/file.txt''


    # Get creation time of file

    creation_time = os.path.getctime(file_path)

    creation_time = datetime.datetime.fromtimestamp(creation_time)

    ```'
