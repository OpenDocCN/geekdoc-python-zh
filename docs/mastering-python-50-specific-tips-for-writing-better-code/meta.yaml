    ```\n\n在上面的代码中，我们定义了一个自定义的 `Person` 类，并创建了一个新的数据库，设置了用于 pickle 的自定义协议。我们将一个 `Person`\
    \ 对象存储在数据库中，然后使用 `pickle.loads()` 方法检索它。`Person` 对象会自动反序列化为其原始形式。\n\n在序列化和持久化中使用\
