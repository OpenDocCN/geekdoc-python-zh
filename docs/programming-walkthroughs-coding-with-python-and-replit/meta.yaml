- md: "Another issue that you may have already noticed is that the player sinks into\
    \ the ground after some jumps – this results from the imprecision of our collision\
    \ detection.\n\nWe're going to fix these problems by making a subtle change to\
    \ how we deal with collisions with boxes. Rather than deciding that we're on the\
    \ ground when the player sprite is in collision with a box, we'll check whether\
    \ the player is 1 pixel above a collision with a box. We'll then apply the same\
    \ principle for left, right and up, stopping the player just before a collision.\n\
    \nFirst, let's give the player a `check_collision` method to make these checks:\n\
    \n```\nclass Player(Sprite):\n    # ...\n    def check_collision(self, x, y, boxes):\n\
    \        self.rect.move_ip([x,y])\n        collide = pygame.sprite.spritecollideany(self,\
    \ boxes)\n        self.rect.move_ip([-x,-y])\n        return collide\n```\n\n\
    Here, we're moving the player by a specified amount, checking for a collision,\
    \ and then moving the player back. This back and forth movement happens before\
    \ the player is drawn to the screen, so the user won’t notice anything.\n\nLet’s\
    \ change our onground check to use this method:\n\n```\ndef update(self, boxes):\n\
    \    hsp = 0\n    onground = self.check_collision(0, 1, boxes)\n```\n\nRun the\
    \ game now, and you may be able to notice a very slight difference in how the\
    \ player stands on the ground from before.\n\nThis doesn’t yet solve our horizontal\
    \ and upward collisions problems, though. For that, we’ll need to implement our\
    \ new check_collision method directly into the player’s move method. The first\
    \ thing we’ll need to do is prepare the x and y parameters for additional processing:\n\
    \n```\ndef move(self, x, y):\n    dx = x\n    dy = y\n    self.rect.move_ip([dx,dy])\n\
    ```\n\nThen we’re going to check for collisions, so we need to start passing boxes\
    \ into move. We’re going to do this for x and y separately, starting with y. We’ll\
    \ check for a collision after moving dy pixels vertically, decrementing dy until\
    \ we no longer collide with a box:\n\n```\ndef update(self, boxes):\n    # ...\n\
    \    # movement\n    self.move(hsp, self.vsp, boxes)\n\ndef move(self, x, y, boxes):\n\
    \    dx = x\n    dy = y\n\n    while self.check_collision(0, dy, boxes):\n   \
    \     dy -= 1\n\n    self.rect.move_ip([dx,dy])\n```\n\nBut wait! This code will\
    \ only work as intended if we’re moving down and dy is positive. If dy is negative,\
    \ this will just move us further into a collision, not away from it. To fix this,\
    \ we’ll need to import numpy at the top of our file, so we can use numpy.sign.\n\
    \n```\nimport pygame, numpy\n# ...\n```\n\nnumpy.sign takes an integer and returns\
    \ 1 if it’s positive, -1 if it’s negative, and 0 if it’s 0. This is exactly the\
    \ functionality we need!\n\n```\ndef move(self, x, y, boxes):\n    dx = x\n  \
    \  dy = y\n\n    while self.check_collision(0, dy, boxes):\n        dy -= numpy.sign(dy)\n\
    \n    self.rect.move_ip([dx,dy])\n```\n\nNow do the same for dx. As we’ve already\
    \ figured out the appropriate dy for our movement, we’ll include that in the collision\
    \ check.\n\n```\ndef move(self, x, y, boxes):\n    dx = x\n    dy = y\n\n    while\
    \ self.check_collision(0, dy, boxes):\n        dy -= numpy.sign(dy)\n\n    while\
    \ self.check_collision(dx, dy, boxes):\n        dx -= numpy.sign(dx)\n\n    self.rect.move_ip([dx,dy])\n\
    ```\n\nRun the game. The player should now stop when he runs into a wall or jumps\
    \ into a ceiling.\n\n## Where Next?\n\nIf you’d like to continue working on this\
