  md: "```\npython\ndef decode_message_from_bytestring(bytestring):\n    bytestring\
    \ = bytestring.split(ENDOFMESSAGE)[0]\n    message = int(bytestring, 2).to_bytes(len(bytestring)\
    \ // 8, byteorder='big')\n    message = base64.decodebytes(message).decode(\"\
    utf8\")\n    return message\n```\n\nRemember how we added a special ENDOFMESSAGE\
    \ delimiter above? Here we first split our string on that so we don’t look for\
    \ text in random data (pixels from the unmodified part of the image) and then\
    \ go backwards through our encoding pipe: first to base64 and then to text.\n\n\
    We also need a way to extract the bytestring from an image. Add the following\
    \ function to main.py to do this.\n\n```\npython\ndef decode_pixels(pixels):\n\
