    # ## Building an NLP project using spaCy


    So far, we have installed packages that are easy for the Repl.it universal dependency
    manager to install automatically, behind the scenes. Some packages are more complicated
    though. `spaCy`<sup>22</sup>, for example, is an NLP library that relies on a
    large external data file. When installing this library, you usually have to install
    this data file as a separate step.


    # ### Installing the spaCy language model


    To get this to work on Repl.it, we''ll have to manually modify the `pyproject.toml`
    file.


    Create a new repl, SpacyExample, then click on the Packages icon and search for
    “spacy”.


