  md: "We've created three simple datasets of five sentences each. The first one contains\
    \ positive sentences; the second one contains negative sentences; and the last\
    \ contains a mix of positive and negative sentences.\n\nIt's immediately obvious\
    \ to a human which sentences are positive and which are negative, but can we teach\
    \ a computer to tell them apart?\n\nWe'll use the two lists `positive_texts` and\
    \ `negative_texts` to *train* our model. That is, we'll show these examples to\
    \ the computer along with the correct answers for the question “is this text positive\
    \ or negative?”. The computer will try to find rules to tell the difference, and\
    \ then we'll test how well it did by giving it `test_texts` without the answers\
    \ and ask it to guess whether each example is positive or negative.\n\n# Understanding\
    \ vectorization\n\nThe first step in nearly all machine learning problems is to\
    \ translate your data from a format that makes sense to a human to one that makes\
    \ sense to a computer. In the case of language and text data, a simple but effective\
    \ way to do this is to associate each unique word in the dataset with a number,\
    \ from 0 onwards. Each text can then be represented by an array of numbers, representing\
    \ how often each possible word appears in the text.\n\nLet's go through an example\
    \ to see how this works. If we had the two sentences\n\n[\"nice pizza is nice\"\
    ], [\"what is pizza\"]\n\nthen we would have a dataset with four unique words\
    \ in it. The first thing we'd want to do is create a vocabulary mapping to map\
    \ each unique word to a unique number. We could do this as follows:\n\n```\n{\n\
    \    \"nice\": 0,\n    \"pizza\": 1,\n    \"is\": 2,\n    \"what\": 3\n}\n```\n\
    \nTo create this, we simply go through both sentences from left to right, mapping\
    \ each new word to the next available number and skipping words that we've seen\
    \ before. We can now convert our sentences into bag of words vectors as follows,\
    \ where we indicate the frequency of occurrence of each of the words in our vocabulary:"
  merge: -1
  pgno: 239
- img_proc: true
  md: "```\n[\n    [2, 1, 1, 0], # two \"nice\", one \"pizza\", one \"is\", zero \"\
    what\"\n    [0, 1, 1, 1]  # zero \"nice\", one \"pizza\", one \"is\", one \"what\"\
    \n]\n```\n\nEach sentence vector is always the same length as the *total* vocabulary\
    \ size. We have four words in total (across all of our sentences), so each sentence\
    \ is represented by an array of length four. Each position in the array represents\
    \ a word, and each value represents how often that word appears in that sentence.\n\
    \nThe first sentence contains the word “nice” twice, while the second sentence\
    \ does not contain the word “nice” at all. According to our mapping, the zeroth\
    \ element of each array should indicate how often the word nice appears, so the\
    \ first sentence contains a 2 in the beginning and the second sentence contains\
    \ a 0 there.\n\nThis representation is called “bag of words” because we lose all\
    \ of the information represented by the *order* of words. We don’t know, for example,\
    \ that the first sentence starts and ends with “nice”, only that it contains the\
    \ word “nice” twice.\n\nWith real data, these arrays get *very* long. There are\
    \ millions of words in most languages, so for a big dataset containing most words,\
    \ each sentence needs to be represented by a very long array, where nearly all\
    \ values are set to zero (all the words not in that sentence). This could take\
    \ up a lot of space, but luckily scikit-learn uses a clever sparse-matrix implementation\
    \ to overcome this. This doesn’t quite look like the above, but the overall concept\
    \ remains the same.\n\nLet’s see how to achieve the above using scikit-learn’s\
    \ optimised vectoriser.\n\nFirst we want to combine all of our “training” data\
    \ (the data that we’ll show the computer along with the correct labels of “positive”\
    \ or “negative” so that it can learn), so we’ll combine our positive and negative\
    \ texts into one array. Add the following code below the datasets you created.\n\
    \n```\ntraining_texts = negative_texts + positive_texts\ntraining_labels = [\"\
    negative\"] * len(negative_texts) + [\"positive\"] * len(positive_texts)\n```\n\
    \nOur dataset now looks like this:\n\n```\n['we hate you', 'they hate us', 'you\
    \ are bad', 'he is bad', 'we hate mary', 'we love you', 'they love us', 'you are\
    \ good', 'he is good', 'they love mary']\n['negative', 'negative', 'negative',\
    \ 'negative', 'negative', 'positive', 'positive', 'positive', 'positive', 'positive']\n\
    ```\n\nThe two arrays (texts and labels) are associated by index. The first text\
    \ in the first array is negative, and corresponds to the first label in the second\
    \ array, and so on.\n\nNow we need a vectoriser to transform the texts into numbers.\
    \ We can create one in scikit-learn with"
