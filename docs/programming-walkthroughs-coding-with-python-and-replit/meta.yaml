    \n⁷https://repl.it/@GarethDwyer1/cwr-01-quadratic-equations\n⁸https://repl.it/talk/all\n\
    ⁹https://repl.it/discord\n\n## Working with Files using Repl.it\n\nIn this lesson,\
    \ you'll gain experience with using and manipulating files using Repl.it. In the\
    \ previous lesson you saw how to add new files to a project, but there's a lot\
    \ more you can do.\n\nFiles can be used for many different things. In programming,\
    \ you'll primarily use them to store data or code. Instead of manually creating\
    \ files and entering data, you can also use your programs to create files and\
    \ automatically write data to these.\n\nRepl.it also offers functionality to mass\
    \ import or export files from or to the IDE; this is useful in cases when your\
    \ program writes data to multiple files and you want to export all of these for\
    \ use in another program.\n\n## Working with files using Python\n\nCreate a new\
    \ Python repl and call it `working-with-files`.\n\nAs before, you'll get a default\
    \ repl project with a `main.py` file. We need a data file to practise reading\
    \ data programmatically.\n\n1. Create a new file using the `add file` button.\n\
    2. Call the file `mydata.txt`. Previously we created a Python file (`.py`) but\
    \ in this case we are creating a plain text file (`.txt`).\n3. Type a line of\
    \ text into the file.\n\nYou should now have something similar to what you see\
    \ below.\n\nImage 2: Adding data manually to our text file\n\nGo back to the `main.py`\
    \ file and add the following code.\n\n```\n1 f = open(\"mydata.txt\")\n2 contents\
    \ = f.read()\n3 f.close()\n4 print(contents)\n```\n\nThis opens the file programmatically,\
    \ reads the data in the file into a variable called `contents`, closes the file,\
    \ and prints the file contents to our output pane.\n\nPress the Run button. If\
    \ everything went well, you should see output as shown in the image below.\n\n\
    Image 3: Reading data from a file and printing it out\n\n## Creating files using\
    \ Python\n\nInstead of manually creating files, you can also use Python to do\
    \ this. Add the following code to your `main.py` file.\n\n```\n1. f = open(\"\
    createdfile.txt\", \"w\")\n2. f.write(\"This is some data that our Python script\
    \ created.\\n\")\n3. f.close()\n```\n\nNote the `w` argument that we pass into\
    \ the `open` function now. This means that we want to open the file in “write”\
    \ mode. Be careful: if the file already exists, Python will delete it and create\
    \ a new one. There are many different ‘modes’ to work with files in different\
    \ ways which you can read about in the Python documentation¹⁰.\n\nRun the code\
    \ again and you should see a new file pop up in the files pane. If you click on\
    \ the file, you’ll find the data that the Python script wrote to it, as shown\
    \ below.\n\nImage 4: Writing data to a file and viewing it\n\n## Building a weather\
    \ logging system using Python and Repl.it\n\nNow that you can read from files\
    \ and write to them, let’s build a mini-project that records historical weather\
    \ temperatures. Our program will\n\n- Get the current temperature for a specified\
    \ set of cities.\n- Write this data to file with today’s date.\n- Print a summary\
    \ of this data to the console.\n\n## Creating a WeatherStack Account and getting\
    \ an API key\n\nWe’ll get weather data from the WeatherStack API. You’ll need\
    \ to sign up at weatherstack.com¹¹ and follow the instructions to get your own\
    \ access key. Choose the “free tier” option which is limited to 1000 calls per\
    \ month.\n\nAfter sign-up, you should see a page similar to the following containing\
    \ the API access key.\n\n¹⁰https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files\n\
    ¹¹https://weatherstack.com\n\nYou should keep this key secret to stop other people\
    \ using up all of your monthly calls.\n\n## Creating our weather reporting project\n\
    \nYou can continue to use the working-with-files project that you created earlier\
    \ if you want to, but for the demonstration we'll create a new Python repl called\
    \ weather report.\n\nIn the main.py file add the following code, but replace the\
    \ string for API_KEY with your own one.\n\n```python\nimport requests\n\n# change\
    \ the following line to use your own API key\nAPI_KEY = \"baaf201731c0cbc4af2c519cb578f907\"\
    \nWS_URL = \"http://api.weatherstack.com/current\"\n\ncity = \"London\"\n\nparameters\
    \ = {'access_key': API_KEY, 'query': city}\n\nresponse = requests.get(WS_URL,\
    \ parameters)\njs = response.json()\nprint(js)\nprint()\n```\n\nThis code asks\
    \ WeatherStack for the current temperature in London, gets the JSON version of\
    \ this and prints it out. You should see something similar to what is shown below.\n\
    \nWeatherStack returns a lot of data, but we are mainly interested in\n\n1. **The\
    \ location:** To see if we found the correct London and not one of the 29 other\
    \ places called London.\n2. **The date:** We'll record this when we save this\
    \ data to a file.\n3. **The current temperature:** This is specified by default\
    \ in Celsius, but can be customised if you prefer Fahrenheit.\n\nAdd the following\
    \ code below the existing code to extract these values into a format that's easier\
    \ to read.\n\n```\n1 temperature = js['current']['temperature']\n2 date = js['location']['localtime']\n\
    3 city = js['location']['name']\n4 country = js['location']['country']\n5 \n6\
    \ print(f\"The temperature in {city}, {country} on {date} is {temperature} degrees\
    \ Celsius\")\n```\n\nIf you run the code again, you'll see a more human-friendly\
    \ output, as shown below.\n\nImage 7: Seeing a human-readable summary of the data\n\
    \nThis is great for getting the current weather, but now we want to extend it\
    \ a bit to record weather historically.\n\nWe'll create a file called cities.txt\
    \ containing the list of cities we want to get weather data for. Our script will\
    \ request the weather for each city, and save a new line with the weather and\
    \ timestamp.\n\nAdd the cities.txt file, as in the image below (of course, you\
    \ can change which cities you would like to get weather info for).\n\nImage 8:\
    \ Creating the cities.txt file\n\nNow remove the code we currently have in main.py\
    \ and replace it with the following.\n\n```python\nimport requests\n\nAPI_KEY\
    \ = \"baaf201731c0cbc4af2c519cb578f907\"\nWS_URL = \"http://api.weatherstack.com/current\"\
    \n\ncities = []\nwith open(\"cities.txt\") as f:\n    for line in f:\n       \
    \ cities.append(line.strip())\n\nprint(cities)\n\n11\n12 for city in cities:\n\
    13     parameters = {'access_key': API_KEY, 'query': city}\n14     response =\
    \ requests.get(WS_URL, parameters)\n15     js = response.json()\n16\n17     temperature\
    \ = js['current']['temperature']\n18     date = js['location']['localtime']\n\
    19\n20     with open(f\"{city}.txt\", \"w\") as f:\n21         f.write(f\"{date},{temperature}\\\
    n\")\n```\n\nThis is similar to the code we had before, but now we\n\n- Read the\
    \ city names from our cities.txt file and put each city into a Python list.\n\
    - Loop through the cities and get the weather data for each one.\n- Create a new\
    \ file with the same name as each city and write the date and temperature (separated\
    \ by a comma) to each file.\n\nIn our previous examples we explicitly closed files\
    \ using `f.close()`. In this example, we instead open our files in a `with` block.\
    \ This is a common idiom in Python and is usually how you will open files. You\
    \ can read more about this in the files section of the Python docs¹⁵.\n\nIf you\
    \ run this code, you'll see it creates one file for each city.\n\n**Image 9: The\
    \ script creates one file for each city**\n\nIf you open up one of the files,\
    \ you'll see it contains the date and temperature that we fetched from WeatherStack.\n\
    \n¹⁵ https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files"
  mdcn: "## 打造你的专属版本\n\n如果你一直跟着教程操作，现在应该已经有了一个可以继续扩展的 Repl 个人副本。如果没有，可以从我们的示例开始。点击此处进行复制：[https://repl.it/@GarethDwyer1/cwr-01-quadratic-equations](https://repl.it/@GarethDwyer1/cwr-01-quadratic-equations)⁷。\n\
    \n## 接下来该做什么？\n\n你现在可以独立或与朋友一起创建基础程序，并且已经熟悉了 Repl.it 最重要的功能。不过还有很多值得学习的内容。在接下来的九节课中，你将通过一系列项目，在实践中深入掌握更多\
    \ Repl.it 功能和编程概念。\n\n如果遇到困难，可以从 [Repl.it 社区](https://repl.it/talk/all)⁸ 或 [Repl.it\
    \ Discord 服务器](https://repl.it/discord)⁹ 寻求帮助。\n\n⁷https://repl.it/@GarethDwyer1/cwr-01-quadratic-equations\n\
    ⁸https://repl.it/talk/all\n⁹https://repl.it/discord\n\n## 使用 Repl.it 处理文件\n\n\
    本节课中，你将学习如何使用 Repl.it 来操作和处理文件。上节课你已经了解了如何向项目添加新文件，但文件操作的功能远不止于此。\n\n文件可用于多种不同用途。在编程中，你主要会用它们来存储数据或代码。除了手动创建文件并输入数据外，你还可以使用程序来创建文件并自动写入数据。\n\
    \nRepl.it 还提供了从集成开发环境（IDE）批量导入或导出文件的功能；当你的程序将数据写入多个文件，并且希望将所有这些文件导出以供其他程序使用时，这个功能就非常有用。\n\
    \n## 使用 Python 处理文件\n\n创建一个新的 Python repl，并将其命名为 `working-with-files`。\n\n和之前一样，你会得到一个包含\
    \ `main.py` 文件的默认 repl 项目。我们需要一个数据文件来练习以编程方式读取数据。\n\n1. 使用 `添加文件` 按钮创建一个新文件。\n\
    2. 将文件命名为 `mydata.txt`。之前我们创建的是 Python 文件（`.py`），但这次我们要创建的是一个纯文本文件（`.txt`）。\n\
    3. 在文件中输入一行文本。\n\n现在你的界面应该与下图类似。\n\n图 2：手动向文本文件添加数据\n\n返回 `main.py` 文件，并添加以下代码。\n\
    \n```\n1 f = open(\"mydata.txt\")\n2 contents = f.read()\n3 f.close()\n4 print(contents)\n\
    ```\n\n这段代码以编程方式打开文件，将文件中的数据读取到名为 `contents` 的变量中，关闭文件，然后将文件内容打印到输出面板。\n\n点击运行按钮。如果一切顺利，你应该会看到下图所示的输出。\n\
    \n图 3：从文件中读取数据并打印出来\n\n## 使用 Python 创建文件\n\n除了手动创建文件，你也可以使用 Python 来完成。将以下代码添加到你的\
    \ `main.py` 文件中。\n\n```\n1. f = open(\"createdfile.txt\", \"w\")\n2. f.write(\"\
    This is some data that our Python script created.\\n\")\n3. f.close()\n```\n\n\
    注意我们现在传递给 `open` 函数的 `w` 参数。这表示我们希望以“写入”模式打开文件。请注意：如果文件已经存在，Python 会将其删除并创建一个新文件。有许多不同的“模式”可用于以不同方式处理文件，你可以在\
    \ Python 文档¹⁰中阅读相关内容。\n\n再次运行代码，你应该会在文件面板中看到一个新文件弹出。如果你点击该文件，会发现其中包含 Python 脚本写入的数据，如下图所示。\n\
    \n图 4：向文件写入数据并查看\n\n## 使用 Python 和 Repl.it 构建天气记录系统\n\n现在你已经学会了如何从文件中读取数据和向文件写入数据，让我们来构建一个记录历史天气温度的迷你项目。我们的程序将：\n\
    \n- 获取一组指定城市的当前温度。\n- 将这些数据写入文件，并附上今天的日期。\n- 将数据摘要打印到控制台。\n\n## 创建 WeatherStack\
    \ 账户并获取 API 密钥\n\n我们将从 WeatherStack API 获取天气数据。你需要在 weatherstack.com¹¹ 注册，并按照说明获取你自己的访问密钥。选择“免费套餐”选项，该选项每月限用\
    \ 1000 次。\n\n注册后，你应该会看到一个类似下图的页面，其中包含你的 API 访问密钥。\n\n¹⁰https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files\n\
    ¹¹https://weatherstack.com\n\n你应该对此密钥保密，以防止他人用光你每月的调用次数。\n\n## 创建我们的天气报告项目\n\n\
    如果你想，可以继续使用之前创建的 `working-with-files` 项目，但为了演示，我们将创建一个新的名为 `weather report` 的\
    \ Python repl。\n\n在 `main.py` 文件中添加以下代码，但请将 `API_KEY` 对应的字符串替换为你自己的密钥。\n\n```python\n\
    import requests\n\n# 将以下行更改为使用你自己的 API 密钥\nAPI_KEY = \"baaf201731c0cbc4af2c519cb578f907\"\
    \nWS_URL = \"http://api.weatherstack.com/current\"\n\ncity = \"London\"\n\nparameters\
    \ = {'access_key': API_KEY, 'query': city}\n\nresponse = requests.get(WS_URL,\
    \ parameters)\njs = response.json()\nprint(js)\nprint()\n```\n\n这段代码向 WeatherStack\
    \ 请求伦敦的当前温度，获取其 JSON 格式的数据并打印出来。你应该会看到与下图类似的内容。\n\nWeatherStack 返回了大量数据，但我们主要关注：\n\
    \n1.  **位置：** 以确认我们找到的是正确的伦敦，而不是另外 29 个名为伦敦的地方之一。\n2.  **日期：** 我们在将数据保存到文件时会记录这个。\n\
    3.  **当前温度：** 默认指定为摄氏度，但如果你偏好华氏度也可以自定义。\n\n在现有代码下方添加以下代码，将这些值提取成更易读的格式。\n\n```\n\
    1 temperature = js['current']['temperature']\n2 date = js['location']['localtime']\n\
    3 city = js['location']['name']\n4 country = js['location']['country']\n5 \n6\
    \ print(f\"The temperature in {city}, {country} on {date} is {temperature} degrees\
    \ Celsius\")\n```\n\n如果你再次运行代码，会看到更人性化的输出，如下图所示。\n\n图 7：查看数据的易读摘要\n\n这对于获取当前天气很棒，但现在我们想稍微扩展一下，以记录历史天气。\n\
    \n我们将创建一个名为 `cities.txt` 的文件，其中包含我们希望获取天气数据的城市列表。我们的脚本将请求每个城市的天气，并保存包含天气信息和时间戳的新行。\n\
    \n添加 `cities.txt` 文件，如图所示（当然，你可以更改希望获取天气信息的城市）。\n\n图 8：创建 cities.txt 文件\n\n现在，删除\
    \ `main.py` 中现有的代码，并替换为以下内容。\n\n```python\nimport requests\n\nAPI_KEY = \"baaf201731c0cbc4af2c519cb578f907\"\
    \nWS_URL = \"http://api.weatherstack.com/current\"\n\ncities = []\nwith open(\"\
    cities.txt\") as f:\n    for line in f:\n        cities.append(line.strip())\n\
    \nprint(cities)\n\n11\n12 for city in cities:\n13     parameters = {'access_key':\
    \ API_KEY, 'query': city}\n14     response = requests.get(WS_URL, parameters)\n\
    15     js = response.json()\n16\n17     temperature = js['current']['temperature']\n\
    18     date = js['location']['localtime']\n19\n20     with open(f\"{city}.txt\"\
    , \"w\") as f:\n21         f.write(f\"{date},{temperature}\\n\")\n```\n\n这与我们之前的代码类似，但现在我们：\n\
    \n- 从 `cities.txt` 文件中读取城市名称，并将每个城市放入一个 Python 列表中。\n- 遍历城市列表，获取每个城市的天气数据。\n-\
    \ 创建一个与每个城市同名的新文件，并将日期和温度（用逗号分隔）写入每个文件。\n\n在我们之前的示例中，我们使用 `f.close()` 显式关闭文件。在这个例子中，我们改为在\
    \ `with` 代码块中打开文件。这是 Python 中的常见惯用法，通常是你打开文件的方式。你可以在 Python 文档的文件部分¹⁵阅读更多相关内容。\n\
    \n运行此代码，你会看到它为每个城市创建了一个文件。\n\n**图 9：脚本为每个城市创建一个文件**\n\n如果你打开其中一个文件，会看到其中包含我们从\
    \ WeatherStack 获取的日期和温度。\n\n¹⁵ https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files"
