    # # Repl.it Audio


    ![](img/48efb5586f6da072fc1456bee6971293_128_0.png)


    Most people control their music players manually, pressing the pause button to
    pause a track or hitting a volume up control to raise the volume. With Repl.it,
    you can automate your media experience using code.


    In this tutorial, we’ll build a media player that can play audio files programmatically,
    allowing the user to pause playback, change the track, change the volume, or get
    looping information by giving text commands.


    We’ll also outline how this could be integrated into other applications, such
    as a chatbot, but we’ll leave the implementation of that as an exercise for the
    reader.


    # ## Understanding how audio works on Repl.it


    In Unix systems, including the ones that Repl.it is built on, [everything is a
    file](https://en.wikipedia.org/wiki/Everything_is_a_file)<sup>78</sup>. You might
    think of file types like PDFs, text files, image files or audio files, but in
    fact even things like printers are often “seen” as files by the underlying operating
    system.


    Repl.it uses a special file at `/tmp/audio` to control media output. There are
    more details on how to manipulate this file directly in the [audio docs](https://docs.repl.it/repls/audio)<sup>79</sup>,
    but Repl.it also provides a higher level Python library that gives us some higher
    level functions like “play_audio”. We’ll be using the library in this tutorial.


    <sup>78</sup> https://en.wikipedia.org/wiki/Everything_is_a_file

    <sup>79</sup> https://docs.repl.it/repls/audio'
- md: "## Getting a free audio file from the Free Music Archive\n\nYou can use your\
    \ own mp3 files if you prefer, but as most music is under copy protection, we'll\
    \ use a file from the [Free Music Archive](https://freemusicarchive.org) for demo\
    \ purposes.\nLet's grab the URL of a file we want so that we can use code to download\
    \ it to our Repl.it project.\nSearch for a song that you like, right-click on\
    \ the download link and press \"copy link location\", as shown below.\n\n![](img/48efb5586f6da072fc1456bee6971293_129_0.png)\n\
    \n## Downloading audio files to our project\n\nOur first goal is to download the\
    \ song and play it.\nCreate a new Python repl called `audio` and add the following\
    \ code to the `main.py` file.\n\n```python\nimport requests\n\nurl = \"https://files.freemusicarchive.org/storage-freemusicarchive-org/music/Oddio_Overplay/MIT_Concert_Choir/Carmina_Burana/MIT_Concert_Choir_-_01_-_O_Fortuna.mp3\"\
    \n\nr = requests.get(url)\nwith open(\"o_fortuna.mp3\", \"wb\") as f:\n    f.write(r.content)\n\
    ```\n\nChange the URL to the one you chose and o_fortuna.mp3 to something more\
    \ appropriate if you chose a different song.\n\nThis downloads the song, opens\
    \ up a binary file, and writes the contents of the download to the file. You should\
    \ see the new file pop up in the files tab on the left after you run this code.\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_130_0.png)\n\nInstead of downloading\
    \ the audio file using requests as shown above, you can also press the add file\
    \ button in your repl and upload an audio file from your local machine.\n\n##\
    \ Playing the audio file using Python\n\nNow that we have the file we can play\
    \ it by importing the audio module and calling the play_file method. Replace the\
    \ code in main.py with the following:\n\n```python\nfrom replit import audio\n\
    import time\n\naudio.play_file(\"o_fortuna.mp3\")\ntime.sleep(10)\n```\n\nNote\
    \ that your repl usually dies the moment there is no more code to execute, and\
    \ playing audio doesn’t keep it alive. For now, we are sleeping for 10 seconds\
    \ which keeps the repl alive and the audio playing. If you run this, you should\
    \ hear the first 10 seconds of the track before it cuts out.\nIt’s not ideal to\
    \ keep the execution loop locked up in a sleep() call as we can’t interact with\
    \ our program so we can’t control the playback in any way.\nTo keep the music\
    \ playing until the user presses a key, change the last line to:\n\n```python\n\
    choice = input(\"Press enter to stop the music. \")\n```\n\nNow the program is\
    \ blocked waiting for user input and the music will keep playing until the user\
    \ enters something.\nLet’s add some more useful controls.\n\n## Allowing the user\
    \ to pause, change volume, or get information about the currently playing track\n\
    \nThe controls we add next are based around:\n\n- source.volume: an attribute\
    \ that we can add to or subtract from to increase or decrease the volume\n- source.paused:\
    \ an attribute we can change to True or False to pause or unpause the track\n\
    - source.set_loop(): a method we can call to specify how many times a track should\
    \ loop before ending\n\nWe can also display useful information about the current\
    \ status of our media player by looking at:\n\n- source.loops_remaining: an attribute\
    \ to see how many more time a track will loop\n- source.get_remaining(): a method\
    \ to see the remaining playtime for the current track.\n\nWe’ll allow the user\
    \ to see the current information but for simplicity we’ll only update this on\
    \ each input, so our display will often display ‘out of date’ information.\n\n\
    ## Creating the prompt menu\n\nRemove the code in main.py and replace it with\
    \ the following.\n\n```python\nimport time\nfrom os import system\nfrom replit\
    \ import audio\n\nmain_message = \"\"\"\n+: volume up\n-: volume down\nk: add\
    \ loop\nj: remove loop\n<space>: play/pause\n\"\"\"\n```\n\nHere we add one more\
    \ import for `system` which we'll use to clear the screen so that the user doesn't\
    \ see old information. We then define a string that will prompt the user with\
    \ their options.\n\n## Creating the show_status() method\n\nLet's add a method\
    \ that will show the user the current status of our media player. It will take\
    \ `source` as an input, which is what the `play_media()` method that we already\
    \ used returns.\n\n```python\ndef show_status(source):\n    time.sleep(0.2)\n\
    \    system(\"clear\")\n    vbar = '|' * int(source.volume * 20)\n    vperc =\
    \ int(source.volume * 100)\n    pp = \"[]\" if source.paused else \">\"\n\n  \
    \  print(f\"Volume: {vbar} {vperc}% \\n\")\n    print(f\"Looping {source.loops_remaining}\
    \ time(s)\")\n    print(f\"Time remaining: {source.get_remaining()}\")\n    print(f\"\
    Playing: {pp}\")\n    print(main_message)\n```\n\nNote that we add a `time.sleep()`\
    \ at the top of this function. Because changing the status involves writing to\
    \ the `/tmp/audio` file we discussed before and reading the status involves reading\
    \ from this file, we want to wait a short while to ensure we don't read stale\
    \ information before showing it to the user.\n\nOtherwise our function clears\
    \ the screen, prints out a text-based volume bar along with the current volume\
    \ percentage, and shows other information such as whether the track is currently\
    \ playing or paused, how many loops are left, and how much time is left before\
    \ the track finishes.\n\nFinally, we need a loop to constantly prompt the user\
    \ for the next command which will also keep our repl alive and continue playing\
    \ the track while we are waiting for user input. Add the following `main()` function\
    \ to `main.py` and call it:\n\n```python\ndef main():\n    source = audio.play_file(\"\
    o_fortuna.mp3\")\n    time.sleep(1)\n    show_status(source)\n\n    while True:\n\
    \        choice = input(\"Enter command: \")\n        if choice == '+':\n    \
    \        source.volume += 0.1\n        elif choice == '-':\n            source.volume\
    \ -= 0.1\n        elif choice == \"k\":\n            source.set_loop(source.loops_remaining\
    \ + 1)\n        elif choice == \"j\":\n            source.set_loop(source.loops_remaining\
    \ - 1)\n        elif choice == \" \":\n            source.paused = not source.paused\n\
    \        show_status(source)\n\nmain()\n```\n\nOnce again, you should replace\
    \ the “o_fortuna” string if you downloaded or uploaded a different audio file.\n\
    \nIf you run the repl now you should hear you track play and you can control it\
    \ by inputting the various commands.\n\n![](img/48efb5586f6da072fc1456bee6971293_133_0.png)\n\
    \n## Playing individual tones\n\nInstead of playing audio from files, you can\
    \ also play specific tones or notes with the `play_tone()` method. This method\
    \ takes three arguments:\n\n- duration: how long the tone should play for\n- pitch:\
    \ the frequency of the tone (how high or low it sounds)\n- wave form: the fundamental\
    \ wave form that the tone is built on.\n\nIf you’ve ever played a musical instrument,\
    \ you’ll probably have come across notes referred to by the letters A-G. With\
    \ digital audio, you’ll specify the pitch in hertz (Hz). “Middle C” on a piano\
    \ is usually 262 Hz and the A above this is 440 Hz.\n\nLet’s write a program to\
    \ play “Twinkle Twinkle Little Star”. Create a new Python repl and add the following\
    \ code to `main.py`.\n\n```python\nimport time\nfrom replit import audio\n\ndef\
    \ play_note(note, duration):\n    note_to_freq = {\n        \"C\": 262, \"D\"\
    : 294, \"E\": 330, \"F\": 349, \"G\": 392, \"A\": 440\n    }\n    audio.play_tone(duration,\
    \ note_to_freq[note], 0)\n    time.sleep(duration)\n\nplay_note(\"C\", 2)\n```\n\
    \nAbove we set up a convenience function to play specific notes for a specific\
    \ duration. It includes a dictionary mapping the names of notes to their frequencies.\
    \ We’ve only done one octave and no sharps or flats, but you can easily extend\
    \ this to add the other notes.\n\nIt then plays the tone of the note passed in\
    \ for the specified duration. We sleep for that duration too, as otherwise the\
    \ next note will be played before the previous note is finished. We also pass\
    \ a 0 to `play_tone` which specifies the default sine waveform. You can change\
    \ it to 1, 2, or 3 for triangle, saw, or square, which you can read about in more\
    \ detail.\n\nTest that you can play a single note as expected. Now you can play\
    \ the first part of “Twinkle Twinkle Little Star” by defining all of the notes\
    \ and durations, and then looping through them, calling `play_note` on each in\
    \ turn."
  mdcn: "## 从免费音乐档案馆获取一个免费音频文件\n\n如果您愿意，可以使用自己的mp3文件，但由于大多数音乐受版权保护，我们将使用来自[免费音乐档案馆](https://freemusicarchive.org)的文件作为演示目的。\n\
    让我们获取想要文件的URL，这样我们就可以使用代码将其下载到我们的Repl.it项目中。\n搜索一首你喜欢的歌曲，右键单击下载链接并按“复制链接地址”，如下所示。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_129_0.png)\n\n## 将音频文件下载到我们的项目\n\n\
    我们的第一个目标是下载这首歌并播放它。\n创建一个新的名为 `audio` 的 Python repl，并将以下代码添加到 `main.py` 文件中。\n\
    \n```python\nimport requests\n\nurl = \"https://files.freemusicarchive.org/storage-freemusicarchive-org/music/Oddio_Overplay/MIT_Concert_Choir/Carmina_Burana/MIT_Concert_Choir_-_01_-_O_Fortuna.mp3\"\
    \n\nr = requests.get(url)\nwith open(\"o_fortuna.mp3\", \"wb\") as f:\n    f.write(r.content)\n\
    ```\n\n将URL更改为您选择的那个，如果您选择了不同的歌曲，请将 `o_fortuna.mp3` 更改为更合适的文件名。\n\n这段代码下载歌曲，打开一个二进制文件，并将下载的内容写入该文件。运行此代码后，您应该会在左侧的文件标签页中看到新文件弹出。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_130_0.png)\n\n除了像上面那样使用requests下载音频文件，您也可以按您repl中的添加文件按钮并从本地计算机上传音频文件。\n\
    \n## 使用Python播放音频文件\n\n现在我们有了文件，可以通过导入音频模块并调用 `play_file` 方法来播放它。将 `main.py` 中的代码替换为以下内容：\n\
    \n```python\nfrom replit import audio\nimport time\n\naudio.play_file(\"o_fortuna.mp3\"\
    )\ntime.sleep(10)\n```\n\n请注意，您的repl通常在执行完所有代码后就会终止，而播放音频不会使其保持活动状态。目前，我们通过休眠10秒来保持repl活动并让音频播放。如果您运行此代码，您应该会听到曲目的前10秒，然后声音中断。\n\
    将执行循环锁定在 `sleep()` 调用中并不理想，因为我们无法与程序交互，因此无法以任何方式控制播放。\n为了让音乐持续播放直到用户按下某个键，请将最后一行更改为：\n\
    \n```python\nchoice = input(\"Press enter to stop the music. \")\n```\n\n现在程序被阻塞，等待用户输入，音乐将继续播放，直到用户输入内容为止。\n\
    让我们添加一些更有用的控制功能。\n\n## 允许用户暂停、更改音量或获取当前播放曲目的信息\n\n我们接下来添加的控件围绕以下内容：\n\n-   `source.volume`：一个我们可以加减以增加或减少音量的属性\n\
    -   `source.paused`：一个我们可以更改为True或False以暂停或取消暂停曲目的属性\n-   `source.set_loop()`：一个我们可以调用以指定曲目在结束前应循环多少次的方法\n\
    \n我们还可以通过查看以下内容来显示有关媒体播放器当前状态的有用信息：\n\n-   `source.loops_remaining`：一个查看曲目还将循环多少次的属性\n\
    -   `source.get_remaining()`：一个查看当前曲目剩余播放时间的方法。\n\n我们将允许用户查看当前信息，但为了简单起见，我们只在每次输入时更新信息，因此我们的显示通常会显示“过时”的信息。\n\
    \n## 创建提示菜单\n\n删除 `main.py` 中的代码并替换为以下内容。\n\n```python\nimport time\nfrom os import\
    \ system\nfrom replit import audio\n\nmain_message = \"\"\"\n+: volume up\n-:\
    \ volume down\nk: add loop\nj: remove loop\n<space>: play/pause\n\"\"\"\n```\n\
    \n这里我们为 `system` 添加了另一个导入，我们将用它来清除屏幕，这样用户就不会看到旧信息。然后我们定义一个字符串，将提示用户可用的选项。\n\n\
    ## 创建 `show_status()` 方法\n\n让我们添加一个方法，向用户显示媒体播放器的当前状态。它将接受 `source` 作为输入，这是我们已经使用过的\
    \ `play_media()` 方法返回的对象。\n\n```python\ndef show_status(source):\n    time.sleep(0.2)\n\
    \    system(\"clear\")\n    vbar = '|' * int(source.volume * 20)\n    vperc =\
    \ int(source.volume * 100)\n    pp = \"[]\" if source.paused else \">\"\n\n  \
    \  print(f\"Volume: {vbar} {vperc}% \\n\")\n    print(f\"Looping {source.loops_remaining}\
    \ time(s)\")\n    print(f\"Time remaining: {source.get_remaining()}\")\n    print(f\"\
    Playing: {pp}\")\n    print(main_message)\n```\n\n请注意，我们在函数顶部添加了 `time.sleep()`。因为更改状态涉及写入我们之前讨论过的\
    \ `/tmp/audio` 文件，而读取状态涉及从此文件读取，所以我们想稍等片刻，以确保在向用户显示信息之前不会读取到过时的信息。\n\n否则，我们的函数会清除屏幕，打印一个基于文本的音量条以及当前音量百分比，并显示其他信息，例如曲目是正在播放还是暂停、还剩多少循环以及曲目结束前还有多少时间。\n\
    \n最后，我们需要一个循环来持续提示用户输入下一个命令，这将使我们的repl保持活动状态，并在等待用户输入时继续播放曲目。将以下 `main()` 函数添加到\
    \ `main.py` 并调用它：\n\n```python\ndef main():\n    source = audio.play_file(\"o_fortuna.mp3\"\
    )\n    time.sleep(1)\n    show_status(source)\n\n    while True:\n        choice\
    \ = input(\"Enter command: \")\n        if choice == '+':\n            source.volume\
    \ += 0.1\n        elif choice == '-':\n            source.volume -= 0.1\n    \
    \    elif choice == \"k\":\n            source.set_loop(source.loops_remaining\
    \ + 1)\n        elif choice == \"j\":\n            source.set_loop(source.loops_remaining\
    \ - 1)\n        elif choice == \" \":\n            source.paused = not source.paused\n\
    \        show_status(source)\n\nmain()\n```\n\n再次强调，如果您下载或上传了不同的音频文件，您应该替换“o_fortuna”字符串。\n\
    \n现在运行这个repl，您应该能听到曲目播放，并且可以通过输入各种命令来控制它。\n\n![](img/48efb5586f6da072fc1456bee6971293_133_0.png)\n\
    \n## 播放单个音调\n\n除了播放文件中的音频，您还可以使用 `play_tone()` 方法播放特定的音调或音符。此方法接受三个参数：\n\n-  \
    \ `duration`：音调播放的时长\n-   `pitch`：音调的频率（听起来有多高或多低）\n-   `wave form`：音调所基于的基本波形。\n\
    \n如果您弹奏过乐器，您可能遇到过用字母A-G表示的音符。对于数字音频，您将用赫兹（Hz）来指定音高。钢琴上的“中央C”通常是262 Hz，其上方的A是440\
    \ Hz。\n\n让我们写一个程序来播放“一闪一闪小星星”。创建一个新的Python repl，并将以下代码添加到 `main.py` 中。\n\n```python\n\
    import time\nfrom replit import audio\n\ndef play_note(note, duration):\n    note_to_freq\
    \ = {\n        \"C\": 262, \"D\": 294, \"E\": 330, \"F\": 349, \"G\": 392, \"\
    A\": 440\n    }\n    audio.play_tone(duration, note_to_freq[note], 0)\n    time.sleep(duration)\n\
    \nplay_note(\"C\", 2)\n```\n\n上面我们设置了一个方便函数来播放特定时长的特定音符。它包含一个将音符名称映射到其频率的字典。我们只做了一个八度，没有升降号，但您可以轻松扩展此函数以添加其他音符。\n\
    \n然后它播放传入音符的指定时长的音调。我们也休眠了该时长，否则下一个音符会在前一个音符播放完之前就开始播放。我们还向 `play_tone` 传递了一个\
    \ `0`，它指定默认的正弦波形。您可以将其更改为1、2或3，分别对应三角波、锯齿波或方波，您可以阅读更多详细信息。\n\n测试您是否能按预期播放单个音符。现在，您可以通过定义所有音符和时长，然后循环遍历它们，依次调用\
    \ `play_note`，来播放“一闪一闪小星星”的第一部分。"
