- md: "Open the templates/index.html file and change the code where it says “Hello\
    \ World!” to read “Weather” like below.\n\n```\n{% extends \"base.html\" %}\n\n\
    {% block content %}\n  <h1>Weather</h1>\n{% endblock content %}\n```\n\nClick\
    \ the refresh button as indicated below to see the result change from “Hello World!”\
    \ to “Weather”.\n\n![](img/48efb5586f6da072fc1456bee6971293_206_0.png)\n\nYou\
    \ can also press the pop-out button to the right of the URL bar to open only the\
    \ resulting web page that we’re building, as a visitor would see it. You can share\
    \ the URL with anyone and they’ll be able to see your Weather website already!\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_206_1.png)\n\n![](img/48efb5586f6da072fc1456bee6971293_207_0.png)\n\
    \nChanging the static text that our visitors see is a good start, but our web\
    \ application still doesn’t do anything. We’ll change that in the next step by\
    \ using JavaScript to get our user’s IP Address.\n\n## Calling IPIFY from JavaScript\n\
    \nAn IP address is like a phone number. When you visit “google.com”, your computer\
    \ actually looks up the name google.com to get a resulting IP address that is\
    \ linked to one of Google’s servers. While people find it easier to remember names\
    \ like “google.com”, computers work better with numbers. Instead of typing “google.com”\
    \ into your browser toolbar, you could type the IP address 216.58.223.46, with\
    \ the same results. Every device connecting to the internet, whether to serve\
    \ content (like google.com) or to consume it (like you, reading this tutorial)\
    \ has an IP address.\n\nIP addresses are interesting to us because it is possible\
    \ to guess a user’s location based on their IP address. (In reality, this is an\
    \ imprecise and highly complicated process, but for our purposes it will be more\
    \ than adequate). We will use the web service ipify.org to retrieve our visitors’\
    \ IP addresses.\n\nIn the Repl.it files tab, navigate to templates/base.html,\
    \ which should look as follows.\n\n```\n{% load static %}\n<!DOCTYPE html>\n\n\
    <html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Hello World!</title>\n\
    \    <meta charset=\"UTF-8\"/>\n    <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1\"/>\n    <link rel=\"stylesheet\" href=\"{% static 'css/style.css'\
    \ %}\">\n</head>\n<body>\n    {% block content %}{% endblock content %}\n</body>\n\
    </html>\n```\n\nThe “head” section of this template is between lines 5 and 11\
    \ – the opening and closing <head> tags. We’ll add our scripts directly below\
    \ the <link …> on line 10 and above the closing </head> tag on line 11. Modify\
    \ this part of code to add the following lines:\n\n```\n<script>\n  function use_ip(json)\
    \ {\n    alert(\"Your IP address is: \" + json.ip);\n  }\n</script>\n\n<script\
    \ src=\"https://api.ipify.org?format=jsonp&callback=use_ip\"></script>\n```\n\n\
    These are two snippets of JavaScript. The first (lines 1-5) is a function that\
    \ when called will display a pop-up box (an “alert”) in our visitor’s browser\
    \ showing their IP address from the json object that we pass in. The second (line\
    \ 7) loads an external script from ipify’s API and asks it to pass data (including\
    \ our visitor’s IP address) along to the use_ip function that we provide.\n\n\
    If you open your web app again and refresh the page, you should see this script\
    \ in action (if you’re running an adblocker, it might block the ipify scripts,\
    \ so try disabling that temporarily if you have any issues).\n\n![](img/48efb5586f6da072fc1456bee6971293_208_0.png)\n\
    \nThis code doesn’t do anything with the IP address except display it to the user,\
    \ but it is enough to see that the first component of our system (getting our\
    \ user’s IP Address) is working. This also introduces the first *dynamic* functionality\
    \ to our app – before, any visitor would see exactly the same thing, but now we\
    \ can show each visitor something related specifically to them (no two people\
    \ have the same IP address).\n\nNow instead of simply showing this IP address\
    \ to our visitor, we’ll modify the code to rather pass it along to our Repl webserver\
    \ (the “backend” of our application), so that we can use it to fetch location\
    \ information through a different service.\n\n## Adding a new route and view,\
    \ and passing data\n\nCurrently our Django application only has two routes, the\
    \ default (admin/) route and our home route (/) which is loaded as our home page.\
    \ We'll add another route at /get_weather_from_ip where we can pass an IP address\
    \ to our application to detect the location and get a current weather report.\n\
    \nTo do this, we'll need to modify the files at mysite/views.py and mysite/urls.py.\n\
    \nEdit urls.py to look as follows (add line 8, but you shouldn't need to change\
    \ anything else).\n\n```\nfrom django.contrib import admin\nfrom django.urls import\
    \ path\nfrom . import views\n\nurlpatterns = [\n    path('', views.home, name='home'),\n\
    \    path('admin/', admin.site.urls),\n    path('get_weather_from_ip/', views.get_weather_from_ip,\
    \ name=\"get_weather_from_ip\"),\n]\n```\n\nWe've added a definition for the get_weather_from_ip\
    \ route, telling our app that if anyone visits https://django-weather-tutorial-eugenedorfling.ritza.repl.co/get_weather_from_ip\
    \ then we should trigger a function in our views.py file that is also called get_weather_from_ip.\
    \ Let's write that function now.\n\nIn your views.py file, add a get_weather_from_ip()\
    \ function beneath the existing home() one, and add an import for JsonResponse\
    \ on line 2. Your whole views.py file should now look like this:\n\n```\nfrom\
    \ django.shortcuts import render\nfrom django.http import JsonResponse\n\n\n#\
    \ Create your views here.\ndef home(request):\n    return render(request, 'index.html')\n\
    \ndef get_weather_from_ip(request):\n    print(request.GET.get(\"ip_address\"\
    ))\n    data = {\"weather_data\": 20}\n    return JsonResponse(data)\n```\n\n\
    https://django-weather-tutorial-eugenedorfling.ritza.repl.co/get_weather_from_ip\n\
    \nBy default, Django passes a request argument to all views. This is an object\
    \ that contains information about our user and the connection, and any additional\
    \ arguments passed in the URL. As our application isn’t connected to any weather\
    \ services yet, we’ll just make up a temperature (20) and pass that back to our\
    \ user as JSON.\n\nIn line 10, we print out the IP address that we will pass along\
    \ to this route from the GET arguments (we’ll look at how to use this later).\
    \ We then create the fake data (which we’ll later replace with real data) and\
    \ return a JSON response (the data in a format that a computer can read more easily,\
    \ with no formatting). We return JSON instead of HTML because our system is going\
    \ to use this route internally to pass data between the front and back ends of\
    \ our application, but we don’t expect our users to use this directly.\n\nTo test\
    \ this part of our system, open your web application in a new tab and add /get_weather_from_ip?ip_address=123\
    \ to the URL. Here, we’re asking our system to fetch weather data for the IP address\
    \ 123 (not a real IP address). In your browser, you’ll see the fake weather data\
    \ displayed in a format that can easily be programmatically parsed.\n\n![](img/48efb5586f6da072fc1456bee6971293_210_0.png)\n\
    \n### Viewing the fake JSON data\n\nIn our Repl’s output, we can see that the\
    \ backend of our application has found the “IP address” and printed it out, between\
    \ some other outputs telling us which routes are being visited and which port\
    \ our server is running on:\n\n![](img/48efb5586f6da072fc1456bee6971293_210_1.png)\n\
    \n### Django print output of fake IP\n\nThe steps that remain now are to:\n\n\
    - pass the user’s real IP address to our new route in the background when the\
    \ user visits our main page\n- add more backend logic to fetch the user’s location\
    \ from the IP address\n- add logic to fetch the user’s weather from their location\n\
    - display this data to the user.\n\nLet’s start by using Ajax[^157] to pass the\
    \ user’s IP address that we collected before to our new route,\n\n[^157]: https://en.wikipedia.org/wiki/Ajax_(programming)\n\
    \nwithout our user having to explicitly visit the `get_weather_from_ip` endpoint\
    \ or refresh their page.\n\n## Calling a Django route using Ajax and jQuery\n\n\
    We'll use [Ajax through jQuery](http://api.jquery.com/jquery.ajax/) to do a “partial\
    \ page refresh” – that is, to update part of the page the user is seeing by sending\
    \ new data from our backend code without the user needing to reload the page.\n\
    \nTo do this, we need to include jQuery as a library.\n\n> Note: usually you wouldn't\
    \ add JavaScript directly to your base.html template, but to keep things simpler\
    \ and to avoid creating too many files, we'll be diverging from some good practices.\
    \ See [the Django documentation](https://docs.djangoproject.com/en/2.0/howto/static-files/)\
    \ for some guidance on how to structure JavaScript properly in larger projects.\n\
    \nIn your `templates/base.html` file, add the following script above the line\
    \ where we previously defined the `use_ip()` function.\n\n```\n<script\n  src=\"\
    https://code.jquery.com/jquery-3.3.1.min.js\"\n  integrity=\"sha256-FgpCb/KJQlLNfOu91ta32o/NMZx1twRo8QtmkMRdAu8=\"\
    \n  crossorigin=\"anonymous\"></script>\n```\n\nThis loads the entire jQuery library\
    \ from a [CDN](https://www.cloudflare.com/learning/cdn/what-is-a-cdn/), allowing\
    \ us to complete certain tasks using fewer lines of JavaScript.\n\nNow, modify\
    \ the `use_ip()` script that we wrote before to call our backend route using Ajax.\
    \ The new `use_ip()` function should be as follows:\n\n```\nfunction use_ip(json)\
    \ {\n  $.ajax({\n    url: {% url 'get_weather_from_ip' %},\n    data: {\"ip\"\
    : json.ip},\n    dataType: 'json',\n    success: function (data) {\n      document.getElementById(\"\
    weatherdata\").innerHTML = data.weather_data\n    }\n  });\n}\n```"
  mdcn: "打开 templates/index.html 文件，将其中显示 “Hello World!” 的代码修改为显示 “Weather”，如下所示。\n\
    \n```\n{% extends \"base.html\" %}\n\n{% block content %}\n  <h1>Weather</h1>\n\
    {% endblock content %}\n```\n\n点击下方所示的刷新按钮，查看结果从 “Hello World!” 变为 “Weather”。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_206_0.png)\n\n你也可以点击 URL 栏右侧的弹出按钮，以访客视角单独打开我们正在构建的结果网页。你可以将\
    \ URL 分享给任何人，他们将能看到你的天气网站！\n\n![](img/48efb5586f6da072fc1456bee6971293_206_1.png)\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_207_0.png)\n\n修改访客看到的静态文本是个好的开始，但我们的\
    \ Web 应用程序仍然没有任何实际功能。我们将在下一步中使用 JavaScript 获取用户的 IP 地址来改变这一点。\n\n## 从 JavaScript\
    \ 调用 IPIFY\n\nIP 地址就像电话号码。当你访问 “google.com” 时，你的计算机实际上会查找 google.com 这个名称，以获得一个与\
    \ Google 某台服务器相关联的 IP 地址。虽然人们发现更容易记住像 “google.com” 这样的名称，但计算机处理数字更有效。你无需在浏览器工具栏中输入\
    \ “google.com”，而是可以输入 IP 地址 216.58.223.46，结果是一样的。每个连接到互联网的设备，无论是提供内容（如 google.com）还是消费内容（如阅读本教程的你），都有一个\
    \ IP 地址。\n\nIP 地址对我们来说很有趣，因为可以根据用户的 IP 地址推测其位置。（实际上，这是一个不精确且高度复杂的过程，但就我们的目的而言，这已经足够了）。我们将使用网络服务\
    \ ipify.org 来获取访客的 IP 地址。\n\n在 Repl.it 的文件选项卡中，导航至 templates/base.html，该文件应如下所示。\n\
    \n```\n{% load static %}\n<!DOCTYPE html>\n\n<html lang=\"en\">\n<head>\n    <meta\
    \ charset=\"UTF-8\">\n    <title>Hello World!</title>\n    <meta charset=\"UTF-8\"\
    />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"\
    />\n    <link rel=\"stylesheet\" href=\"{% static 'css/style.css' %}\">\n</head>\n\
    <body>\n    {% block content %}{% endblock content %}\n</body>\n</html>\n```\n\
    \n该模板的 “head” 部分位于第 5 行和第 11 行之间——即开头的 `<head>` 标签和结尾的 `</head>` 标签之间。我们将脚本直接添加到第\
    \ 10 行的 `<link …>` 下方和第 11 行的结尾 `</head>` 标签上方。修改这部分代码，添加以下几行：\n\n```\n<script>\n\
    \  function use_ip(json) {\n    alert(\"Your IP address is: \" + json.ip);\n \
    \ }\n</script>\n\n<script src=\"https://api.ipify.org?format=jsonp&callback=use_ip\"\
    ></script>\n```\n\n这是两段 JavaScript 代码。第一段（第 1-5 行）是一个函数，调用时将在访客的浏览器中显示一个弹出框（“alert”），其中包含从我们传入的\
    \ json 对象中获取的访客 IP 地址。第二段（第 7 行）从 ipify 的 API 加载一个外部脚本，并要求它将数据（包括我们访客的 IP 地址）传递给我们提供的\
    \ use_ip 函数。\n\n如果你再次打开你的 Web 应用并刷新页面，你应该能看到这个脚本在运行（如果你启用了广告拦截器，它可能会阻止 ipify 脚本，因此如有问题，请尝试暂时禁用）。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_208_0.png)\n\n这段代码除了向用户显示 IP 地址外没有做任何其他事情，但这足以证明我们系统的第一部分（获取用户\
    \ IP 地址）正在工作。这也为我们的应用程序引入了第一个*动态*功能——在此之前，任何访客看到的内容都完全相同，但现在我们可以向每个访客展示与他们相关的内容（没有两个人的\
    \ IP 地址是相同的）。\n\n现在，我们不再仅仅是向访客显示这个 IP 地址，而是修改代码将其传递给我们的 Repl 网络服务器（我们应用程序的“后端”），以便我们可以通过不同的服务获取位置信息。\n\
    \n## 添加新的路由和视图，并传递数据\n\n目前，我们的 Django 应用程序只有两个路由：默认的 (admin/) 路由和我们作为主页加载的首页路由\
    \ (/)。我们将在 /get_weather_from_ip 处添加另一个路由，在那里我们可以将 IP 地址传递给我们的应用程序，以检测位置并获取当前的天气报告。\n\
    \n为此，我们需要修改 mysite/views.py 和 mysite/urls.py 文件。\n\n将 urls.py 编辑如下（添加第 8 行，但其他内容无需更改）。\n\
    \n```\nfrom django.contrib import admin\nfrom django.urls import path\nfrom .\
    \ import views\n\nurlpatterns = [\n    path('', views.home, name='home'),\n  \
    \  path('admin/', admin.site.urls),\n    path('get_weather_from_ip/', views.get_weather_from_ip,\
    \ name=\"get_weather_from_ip\"),\n]\n```\n\n我们添加了 get_weather_from_ip 路由的定义，告诉我们的应用程序，如果有人访问\
    \ https://django-weather-tutorial-eugenedorfling.ritza.repl.co/get_weather_from_ip，那么我们应该触发\
    \ views.py 文件中一个同样名为 get_weather_from_ip 的函数。现在我们来编写这个函数。\n\n在你的 views.py 文件中，在现有的\
    \ home() 函数下方添加一个 get_weather_from_ip() 函数，并在第 2 行添加对 JsonResponse 的导入。你整个 views.py\
    \ 文件现在应如下所示：\n\n```\nfrom django.shortcuts import render\nfrom django.http import\
    \ JsonResponse\n\n\n# Create your views here.\ndef home(request):\n    return\
    \ render(request, 'index.html')\n\ndef get_weather_from_ip(request):\n    print(request.GET.get(\"\
    ip_address\"))\n    data = {\"weather_data\": 20}\n    return JsonResponse(data)\n\
    ```\n\nhttps://django-weather-tutorial-eugenedorfling.ritza.repl.co/get_weather_from_ip\n\
    \n默认情况下，Django 会向所有视图传递一个 request 参数。这是一个包含有关我们的用户和连接信息的对象，以及 URL 中传递的任何其他参数。由于我们的应用程序尚未连接到任何天气服务，我们将只编造一个温度（20）并将其作为\
    \ JSON 返回给用户。\n\n在第 10 行，我们打印出将通过 GET 参数传递到此路由的 IP 地址（我们稍后会研究如何使用它）。然后我们创建假数据（稍后将替换为真实数据）并返回一个\
    \ JSON 响应（一种计算机更容易读取、没有格式的数据）。我们返回 JSON 而不是 HTML，因为我们的系统将在内部使用此路由在应用程序的前端和后端之间传递数据，但我们不期望用户直接使用此路由。\n\
    \n要测试我们系统的这一部分，请在新标签页中打开你的 Web 应用程序，并在 URL 后添加 /get_weather_from_ip?ip_address=123。这里，我们要求系统为\
    \ IP 地址 123（一个不真实的 IP 地址）获取天气数据。在你的浏览器中，你将看到以易于程序化解析的格式显示的假天气数据。\n\n![](img/48efb5586f6da072fc1456bee6971293_210_0.png)\n\
    \n### 查看假 JSON 数据\n\n在我们的 Repl 输出中，我们可以看到应用程序的后端找到了 “IP 地址” 并将其打印出来，位于一些其他输出之间，这些输出告诉我们正在访问哪些路由以及我们的服务器正在哪个端口上运行：\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_210_1.png)\n\n### Django 打印输出假 IP\n\
    \n剩余的步骤是：\n\n- 在用户访问我们的主页时，在后台将用户的真实 IP 地址传递到我们的新路由\n- 添加更多后端逻辑，以从 IP 地址获取用户位置\n\
    - 添加逻辑，从用户位置获取天气\n- 将此数据显示给用户。\n\n让我们开始使用 Ajax[^157] 将之前收集的用户 IP 地址传递到我们的新路由，\n\
    \n[^157]: https://en.wikipedia.org/wiki/Ajax_(programming)\n\n而无需我们的用户显式访问 `get_weather_from_ip`\
    \ 端点或刷新他们的页面。\n\n## 使用 Ajax 和 jQuery 调用 Django 路由\n\n我们将使用 [通过 jQuery 的 Ajax](http://api.jquery.com/jquery.ajax/)\
