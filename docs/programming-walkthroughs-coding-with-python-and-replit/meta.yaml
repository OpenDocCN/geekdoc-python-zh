- md: "## Adding a new route and view, and passing data\n\nCurrently our Django application\
    \ only has two routes, the default (admin/) route and our home route (/) which\
    \ is loaded as our home page. We'll add another route at /get_weather_from_ip\
    \ where we can pass an IP address to our application to detect the location and\
    \ get a current weather report.\n\nTo do this, we'll need to modify the files\
    \ at mysite/views.py and mysite/urls.py. Edit urls.py to look as follows (add\
    \ line 8, but you shouldn't need to change anything else).\n\n```\n1 from django.contrib\
    \ import admin\n2 from django.urls import path\n3 from . import views\n4\n5 urlpatterns\
    \ = [\n6     path('', views.home, name=home),\n7     path('admin/', admin.site.urls),\n\
    8     path('get_weather_from_ip/', views.get_weather_from_ip, name=\"get_weather_from_ip\"\
    ),\n9 ]\n```\n\nWe've added a definition for the get_weather_from_ip route, telling\
    \ our app that if anyone visits https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip<sup>156</sup>\
    \ then we should trigger a function in our views.py file that is also called get_weather_from_ip.\
    \ Let's write that function now.\n\nIn your views.py file, add a get_weather_from_ip()\
    \ function beneath the existing home() one, and add an import for JsonResponse\
    \ on line 2. Your whole views.py file should now look like this:\n\n```\n1 from\
    \ django.shortcuts import render\n2 from django.http import JsonResponse\n3\n\
    4\n5 # Create your views here.\n6 def home(request):\n7     return render(request,\
    \ 'index.html')\n8\n9 def get_weather_from_ip(request):\n10     print(request.GET.get(\"\
    ip_address\"))\n11     data = {\"weather_data\": 20}\n12     return JsonResponse(data)\n\
    ```\n\n<sup>156</sup>https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip\n\
    \nBy default, Django passes a request argument to all views. This is an object\
    \ that contains information about our user and the connection, and any additional\
    \ arguments passed in the URL. As our application isn’t connected to any weather\
    \ services yet, we’ll just make up a temperature (20) and pass that back to our\
    \ user as JSON.\n\nIn line 10, we print out the IP address that we will pass along\
    \ to this route from the GET arguments (we’ll look at how to use this later).\
    \ We then create the fake data (which we’ll later replace with real data) and\
    \ return a JSON response (the data in a format that a computer can read more easily,\
    \ with no formatting). We return JSON instead of HTML because our system is going\
    \ to use this route internally to pass data between the front and back ends of\
    \ our application, but we don’t expect our users to use this directly.\n\nTo test\
    \ this part of our system, open your web application in a new tab and add /get_weather_from_ip?ip_address=123\
    \ to the URL. Here, we’re asking our system to fetch weather data for the IP address\
    \ 123 (not a real IP address). In your browser, you’ll see the fake weather data\
    \ displayed in a format that can easily be programmatically parsed.\n\n![](img/48efb5586f6da072fc1456bee6971293_210_0.png)\n\
    \n## Viewing the fake JSON data\n\nIn our Repl’s output, we can see that the backend\
    \ of our application has found the “IP address” and printed it out, between some\
    \ other outputs telling us which routes are being visited and which port our server\
    \ is running on:\n\n![](img/48efb5586f6da072fc1456bee6971293_210_1.png)\n\n##\
    \ Django print output of fake IP\n\nThe steps that remain now are to:\n\n- pass\
    \ the user’s real IP address to our new route in the background when the user\
    \ visits our main page\n- add more backend logic to fetch the user’s location\
    \ from the IP address\n- add logic to fetch the user’s weather from their location\n\
    - display this data to the user.\n\nLet’s start by using Ajax[^157] to pass the\
    \ user’s IP address that we collected before to our new route,\n\n[^157]: https://en.wikipedia.org/wiki/Ajax_(programming)\n\
    \nwithout our user having to explicitly visit the `get_weather_from_ip` endpoint\
    \ or refresh their page.\n\n## Calling a Django route using Ajax and jQuery\n\n\
    We'll use [Ajax through jQuery](http://api.jquery.com/jquery.ajax/) to do a “partial\
    \ page refresh” – that is, to update part of the page the user is seeing by sending\
    \ new data from our backend code without the user needing to reload the page.\n\
    \nTo do this, we need to include jQuery as a library.\n\n> Note: usually you wouldn't\
    \ add JavaScript directly to your base.html template, but to keep things simpler\
    \ and to avoid creating too many files, we'll be diverging from some good practices.\
    \ See [the Django documentation](https://docs.djangoproject.com/en/2.0/howto/static-files/)\
    \ for some guidance on how to structure JavaScript properly in larger projects.\n\
    \nIn your `templates/base.html` file, add the following script above the line\
    \ where we previously defined the `use_ip()` function.\n\n```html\n<script\n \
    \ src=\"https://code.jquery.com/jquery-3.3.1.min.js\"\n  integrity=\"sha256-FgpCb/KJQlLNfOu91ta32o/NMZx1twRo8QtmkMRdAu8=\"\
    \n  crossorigin=\"anonymous\"></script>\n```\n\nThis loads the entire jQuery library\
    \ from a [CDN](https://www.cloudflare.com/learning/cdn/what-is-a-cdn/), allowing\
    \ us to complete certain tasks using fewer lines of JavaScript.\n\nNow, modify\
    \ the `use_ip()` script that we wrote before to call our backend route using Ajax.\
    \ The new `use_ip()` function should be as follows:\n\n```javascript\nfunction\
    \ use_ip(json) {\n  $.ajax({\n    url: {% url 'get_weather_from_ip' %},\n    data:\
    \ {\"ip\": json.ip},\n    dataType: 'json',\n    success: function (data) {\n\
    \      document.getElementById(\"weatherdata\").innerHTML = data.weather_data\n\
    \    }\n  });\n}\n```\n\nOur new `use_ip()` function makes an **asynchronous**<sup>161</sup>\
    \ call to our `get_weather_from_ip` route, sending along the IP address that we\
    \ previously displayed in a pop-up box. If the call is successful, we call a new\
    \ function (in the `success:` section) with the returned data. This new function\
    \ (line 7) looks for an HTML element with the ID of `weatherdata` and replaces\
    \ the contents with the `weather_data` attribute of the response that we received\
    \ from `get_weather_from_ip` (which at the moment is still hardcoded to be \"\
    20\").\n\n![](img/48efb5586f6da072fc1456bee6971293_212_0.png)\n\nTo see the results,\
    \ we'll need to add an HTML element as a placeholder with the id `weatherdata`.\
    \ Do this in the `templates/index.html` file as follows.\n\n```html\n{% extends\
    \ \"base.html\" %}\n\n{% block content %}\n<h1>Weather</h1>\n<p id=weatherdata></p>\n\
    {% endblock %}\n```\n\nThis adds an empty HTML *paragraph* element which our JavaScript\
    \ can populate once it has the required data.\n\nNow reload the app and you should\
    \ see our fake 20 being displayed to the user. If you don't see what you expect,\
    \ open up your browser's developer tools for **Chrome**<sup>162</sup> and **Firefox**<sup>163</sup>)\
    \ and have a look at the Console section for any JavaScript errors. A clean console\
    \ (with no errors) is shown below.\n\n![](img/48efb5586f6da072fc1456bee6971293_213_0.png)\n\
    \nNow it’s time to change out our mock data for real data by calling two services\
    \ backend – the first to get the user’s location from their IP address and the\
    \ second to fetch the weather for that location.\n\n## Using ip-api.com for geolocation\n\
    \nThe service at [ip-api.com](http://ip-api.com) is very simple to use. To get\
    \ the country and city from an IP address we only need to make one web call. We’ll\
    \ use the python `requests` library for this, so first we’ll have to add an import\
    \ for this to our `views.py` file, and then write a function that can translate\
    \ IP addresses to location information. Add the following import to your `views.py`\
    \ file:\n\n```python\nimport requests\n```\n\nand above the `get_weather_from_ip()`\
    \ function, add the `get_location_from_ip()` function as follows:\n\n```python\n\
    def get_location_from_ip(ip_address):\n    response = requests.get(\"http://ip-api.com/json/{}\"\
    .format(ip_address))\n    return response.json()\n```\n\n> Note: again we are\
    \ diverging from best practice in the name of simplicity. Usually whenever you\
    \ write any code that relies on networking (as above), you should add [exception\
    \ handling](https://docs.python.org/3/tutorial/errors.html) so that your code\
    \ can fail more gracefully if there are problems.\n\nYou can see the response\
    \ that we’ll be getting from this service by trying it out in your browser. Visit\
    \ [http://ip-api.com/json/41.71.107.123](http://ip-api.com/json/41.71.107.123)\
    \ to see the JSON response for that specific IP address."
  mdcn: "## 添加新路由和视图，并传递数据\n\n目前我们的 Django 应用只有两个路由：默认的（`admin/`）路由和作为主页加载的首页路由（`/`）。我们将在\
    \ `/get_weather_from_ip` 添加另一个路由，通过该路由可以向应用程序传递 IP 地址，以检测位置并获取当前天气报告。\n\n为此，我们需要修改\
    \ `mysite/views.py` 和 `mysite/urls.py` 文件。编辑 `urls.py` 文件使其内容如下（添加第 8 行，其他部分无需更改）：\n\
    \n```\n1 from django.contrib import admin\n2 from django.urls import path\n3 from\
    \ . import views\n4\n5 urlpatterns = [\n6     path('', views.home, name=home),\n\
    7     path('admin/', admin.site.urls),\n8     path('get_weather_from_ip/', views.get_weather_from_ip,\
    \ name=\"get_weather_from_ip\"),\n9 ]\n```\n\n我们添加了 `get_weather_from_ip` 路由的定义，告诉应用如果有人访问\
    \ `https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip<sup>156</sup>`，则应触发\
    \ `views.py` 文件中同名的 `get_weather_from_ip` 函数。现在，我们来编写该函数。\n\n在你的 `views.py` 文件中，在现有\
    \ `home()` 函数下方添加一个 `get_weather_from_ip()` 函数，并在第 2 行添加对 `JsonResponse` 的导入。你的整个\
    \ `views.py` 文件现在应该如下所示：\n\n```\n1 from django.shortcuts import render\n2 from\
    \ django.http import JsonResponse\n3\n4\n5 # Create your views here.\n6 def home(request):\n\
    7     return render(request, 'index.html')\n8\n9 def get_weather_from_ip(request):\n\
    10     print(request.GET.get(\"ip_address\"))\n11     data = {\"weather_data\"\
    : 20}\n12     return JsonResponse(data)\n```\n\n<sup>156</sup>https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip\n\
    \n默认情况下，Django 会向所有视图传递一个 `request` 参数。这是一个包含用户信息、连接信息以及 URL 中传递的任何其他参数的对象。由于我们的应用尚未连接到任何天气服务，我们将虚构一个温度值（20）并将其作为\
    \ JSON 返回给用户。\n\n在第 10 行，我们打印出将从 GET 参数传递到此路由的 IP 地址（我们稍后会学习如何使用它）。然后我们创建虚假数据（稍后将替换为真实数据）并返回一个\
    \ JSON 响应（一种计算机更容易解析的数据格式，无任何格式标记）。我们返回 JSON 而非 HTML，是因为我们的系统将内部使用此路由在应用的前后端之间传递数据，但并不期望用户直接使用它。\n\
    \n要测试系统的这一部分，请在新的浏览器标签页中打开你的 Web 应用，并在 URL 后添加 `/get_weather_from_ip?ip_address=123`。这里，我们要求系统为\
    \ IP 地址 `123`（非真实 IP 地址）获取天气数据。在浏览器中，你将以易于程序化解析的格式看到显示的虚假天气数据。\n\n![](img/48efb5586f6da072fc1456bee6971293_210_0.png)\n\
    \n## 查看虚拟 JSON 数据\n\n在我们的 Repl 输出中，我们可以看到应用的后端已找到并打印出了该“IP 地址”，以及一些其他输出，告诉我们正在访问哪些路由以及服务器运行在哪个端口上：\n\
    \n![](img/48ef5586f6da072fc1456bee6971293_210_1.png)\n\n## Django 打印虚拟 IP 的输出\n\
    \n现在剩余的步骤是：\n\n-   在用户访问主页时，在后台将用户的真实 IP 地址传递给我们的新路由\n-   添加更多后端逻辑，以便从 IP 地址获取用户的位置\n\
    -   添加逻辑以根据用户位置获取天气信息\n-   将这些数据显示给用户。\n\n让我们开始使用 Ajax[^157]，将之前收集到的用户 IP 地址传递给我们的新路由，\n\
    \n[^157]: https://en.wikipedia.org/wiki/Ajax_(programming)\n\n而无需用户显式访问 `get_weather_from_ip`\
    \ 端点或刷新页面。\n\n## 使用 Ajax 和 jQuery 调用 Django 路由\n\n我们将使用 [jQuery 中的 Ajax](http://api.jquery.com/jquery.ajax/)\
    \ 来实现“局部页面刷新”——即通过从我们的后端代码发送新数据，更新用户正在查看的页面的一部分，而无需用户重新加载页面。\n\n为此，我们需要将 jQuery\
    \ 作为一个库引入。\n\n> 注意：通常你不会直接将 JavaScript 添加到 `base.html` 模板中，但为了保持简单并避免创建太多文件，我们将偏离一些最佳实践。有关如何在大型项目中正确组织\
    \ JavaScript 的一些指导，请参阅 [Django 文档](https://docs.djangoproject.com/en/2.0/howto/static-files/)。\n\
    \n在你的 `templates/base.html` 文件中，在我们之前定义 `use_ip()` 函数的那行之上添加以下脚本：\n\n```html\n\
    <script\n  src=\"https://code.jquery.com/jquery-3.3.1.min.js\"\n  integrity=\"\
    sha256-FgpCb/KJQlLNfOu91ta32o/NMZx1twRo8QtmkMRdAu8=\"\n  crossorigin=\"anonymous\"\
    ></script>\n```\n\n这会从一个 [CDN](https://www.cloudflare.com/learning/cdn/what-is-a-cdn/)\
    \ 加载整个 jQuery 库，使我们能够使用更少的 JavaScript 代码完成某些任务。\n\n现在，修改我们之前编写的 `use_ip()` 脚本，以使用\
    \ Ajax 调用我们的后端路由。新的 `use_ip()` 函数应如下所示：\n\n```javascript\nfunction use_ip(json)\
    \ {\n  $.ajax({\n    url: {% url 'get_weather_from_ip' %},\n    data: {\"ip\"\
    : json.ip},\n    dataType: 'json',\n    success: function (data) {\n      document.getElementById(\"\
    weatherdata\").innerHTML = data.weather_data\n    }\n  });\n}\n```\n\n我们新的 `use_ip()`\
    \ 函数向 `get_weather_from_ip` 路由发起一个**异步**<sup>161</sup> 调用，并传递我们之前在弹出框中显示的 IP 地址。如果调用成功，我们将使用返回的数据调用一个新函数（在\
    \ `success:` 部分）。这个新函数（第 7 行）查找一个 ID 为 `weatherdata` 的 HTML 元素，并将其内容替换为从 `get_weather_from_ip`\
    \ 收到的响应中的 `weather_data` 属性（目前仍是硬编码的 \"20\"）。\n\n![](img/48efb5586f6da072fc1456bee6971293_212_0.png)\n\
    \n要查看结果，我们需要添加一个作为占位符的 HTML 元素，其 ID 为 `weatherdata`。请在 `templates/index.html`\
    \ 文件中按如下方式操作。\n\n```html\n{% extends \"base.html\" %}\n\n{% block content %}\n\
    <h1>Weather</h1>\n<p id=weatherdata></p>\n{% endblock %}\n```\n\n这添加了一个空的 HTML\
    \ *段落* 元素，一旦 JavaScript 获取到所需数据，就可以填充其内容。\n\n现在重新加载应用，你应该能看到虚假的 20 值显示给用户。如果结果不符合预期，请打开浏览器的开发者工具（适用于\
    \ **Chrome**<sup>162</sup> 和 **Firefox**<sup>163</sup>）并查看“控制台”部分，检查是否有 JavaScript\
    \ 错误。一个干净的控制台（没有错误）如下图所示。\n\n![](img/48efb5586f6da072fc1456bee6971293_213_0.png)\n\
    \n现在是时候通过调用两个后端服务，将我们的模拟数据替换为真实数据了——第一个服务根据用户 IP 地址获取其位置，第二个服务获取该位置的天气信息。\n\n\
    ## 使用 ip-api.com 进行地理定位\n\n[ip-api.com](http://ip-api.com) 上的服务非常易于使用。要从 IP 地址获取国家和城市信息，我们只需进行一次网络请求。我们将为此使用\
    \ Python 的 `requests` 库，因此首先需要在 `views.py` 文件中添加导入，然后编写一个能将 IP 地址转换为位置信息的函数。在你的\
    \ `views.py` 文件中添加以下导入：\n\n```python\nimport requests\n```\n\n并在 `get_weather_from_ip()`\
    \ 函数上方添加 `get_location_from_ip()` 函数，如下所示：\n\n```python\ndef get_location_from_ip(ip_address):\n\
    \    response = requests.get(\"http://ip-api.com/json/{}\".format(ip_address))\n\
    \    return response.json()\n```\n\n> 注意：同样，为了简化，我们再次偏离了最佳实践。通常，只要你编写任何依赖网络的代码（如上），就应该添加[异常处理](https://docs.python.org/3/tutorial/errors.html)，以便在出现问题时代码能够更优雅地失败。\n\
    \n你可以在浏览器中尝试访问 [http://ip-api.com/json/41.71.107.123](http://ip-api.com/json/41.71.107.123)\
    \ 来查看该特定 IP 地址的 JSON 响应，从而了解我们将从此服务获得的响应。"
