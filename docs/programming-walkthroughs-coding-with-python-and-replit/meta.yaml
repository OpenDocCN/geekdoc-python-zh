    ## Make it your own


    We’ve written a name splitter that can handle some names more complicated than
    just “John Smith”. It’s not perfect though: for example, if you put in a name
    with two consecutive spaces it will crash our program. You could fork the project
    and fix this by first writing a test with consecutive spaces and then modifying
    the code to handle this (and any other edge cases you can think of).


    You can find the name splitter repl at [https://repl.it/@GarethDwyer1/namesplitter](https://repl.it/@GarethDwyer1/namesplitter)⁶⁵


    ## Where next


    You’ve learned to do TDD in this project. It’s a popular style of programming,
    but it’s not for everyone. Even if you decide not to use TDD, having tests is
    still very useful and it’s not uncommon for large projects to have thousands or
    millions of tests.


    Take a look at the [big list of naughty strings](https://github.com/minimaxir/big-list-of-naughty-strings)⁶⁶
    for a project that collects inputs that often cause software to break. You could
    also read [How SQLite Is Tested](https://www.sqlite.org/testing.html)⁶⁷ which
    explains how SQLite, a popular lightweight database, has 150 thousand lines of
    code and nearly 100 million(!) lines of tests.


    In the next tutorial, we’ll show you how to become a Repl.it poweruser by taking
    advantage of the productivity features it offers.


    ## Productivity hacks


    The images in this chapter are mostly .gif files, click [here](https://docs.repl.it/tutorials/10-productivity-hacks)
    to access the web version of this chapter


    After coding for a while, you may find that there are some repetitive things that
    take up unnecessary time. For example, searching for and updating a variable name
    can seem laborious. Luckily, Repl.it has some built-in productivity tools that
    we''ll take a look at in this tutorial.


    Specifically, you''ll see how to:


    - Make simultaneous changes in several parts of your file using multiple cursors

    - Use keyboard shortcuts to quickly carry out tasks without the delay of reaching
    for your mouse

    - Switch to Vim or Emacs keybindings for full mouseless control.


    Similarly to learning to touch type, there is often a steep *learning curve* when
    you start to use advanced code editing features. They might even substantially
    slow you down at first, but once you master them you''ll soar past the limits
    of what you could achieve without these aids.


    ## Using the global command palette


    If you hit `Ctrl+K` (`Cmd+K` on MacOS) you''ll see the following modal pop up,
    which lets you navigate through different parts of Repl.it at lightning speed
    using only your keyboard. If you have a lot of files, it''s often useful to open
    them like this rather than scrolling through the directory structure in the files
    pane (the `find` option searches through files by their *name* while the `search`
    option searches through files by their *contents*.)


    ![](img/48efb5586f6da072fc1456bee6971293_102_0.png)


    The keyboard shortcut indicated to the right of each option shows how to activate
    that option directly without opening up the global command palette, but once it’s
    open you can type in a part of any of the options to activate that option. For
    example, in our weather project app, I can type `Cmd+K` and then type `fi` (start
    of `find`) and press `Enter` and then type `Lo` (start of `London.txt`) and press
    `Enter` again to quickly open the weather log for London.


    ![](img/48efb5586f6da072fc1456bee6971293_103_0.png)


    Image 2: Opening a file with the global command palette.


    Of course, with only six files it might be faster to reach for my mouse, but as
    the find searches through all files in all directories this method can be significantly
    faster for larger projects.


    Opening up the multiplayer, version control, and settings panes using this method
    is also faster once the habit is ingrained compared to moving the mouse to the
    small icons on the left bar. And while pressing Ctrl+Enter or Cmd+Enter to run
    your code is faster than choosing “Run” from this global command palette, Ctrl+K
    is only a single shortcut to remember and it will remind you of any other shortcuts
    you can’t recall.


    ## Using the code editing command palette


    The code command palette is similar to the global command palette, but it’s specific
    to editing and navigating your code, allowing you to do advance find+replace procedures,
    jump to specific functions and more.


    To access the code command palette press F1 or Ctrl+Shift+P (cmd+shift+P on MacOS).
    Note that if you’re using Firefox the second option will open an incognito window
    instead.


    You can use the shortcuts directly from the command palette by selecting the code
    you wish to edit and clicking on the command in the drop-down menu, or use it
    to refresh your memory on the keybindings associated with the shortcuts you use
    often.


    ![](img/48efb5586f6da072fc1456bee6971293_104_0.png)


    Let’s take a look at how these work by editing the PyGame juggling project⁶⁹ that
    we covered in a previous tutorial⁷⁰.


    Instead of carrying out the suggested operations as you usually would, use Repl.it’s
    productivity features instead.


    ### Duplicating entire lines


    Sometimes you need two very similar lines of code directly after each other. Instead
    of copying and pasting the line or typing it out again, you can use the duplicate
    row feature, which will replicate the current line either above or below.


    For example, our juggling project includes the following code to instantiate the
    initial three balls.


    ```python

    ball1 = Ball()

    ball2 = Ball()

    ball3 = Ball()

    ```


    Instead of typing out all three lines, you can type out the first one, leave your
    cursor position on that line, and press Shift+Alt+down (shift+option+down on MacOS)
    twice. This will create two copies of the line, directly below the original one,
    and then you can simply change the number in the variable to account for the second
    two balls.


    ![](img/48efb5586f6da072fc1456bee6971293_105_0.png)


    Image 4: Copying the current selected line.


    ### Deleting entire lines


    There may be instances where you’d want to delete large chunks of code at a time
    (it happens to the best of us!).


    Pressing Ctrl+Shift+K (cmd+shift+K on MacOS) deletes the line underneath your
    cursor (or if you have multiple lines selected it will delete all of them.)


    Instead of deleting the entire line, you can also delete from your cursor up to
    the end of the line or from your cursor to the beginning of the line. The shortcuts
    for these are:


    - Ctrl+Backspace (cmd+backspace on MacOS) to delete backwards

    - Ctrl+K (same on MacOS) to delete forwards


    As an example, below you can see how we might use this to first delete one of
    our elif blocks by doing two “delete line” operations. We then change our random
    speed to be constant by using a “delete to end of line” operation from the = sign
    and then typing our constant.


    ![](img/48efb5586f6da072fc1456bee6971293_106_0.png)


    ### Inserting blank lines


    It''s also common to need to add a new line of code above or below the current
    one. Instead of using your mouse or arrow keys to get to the right place and then
    pressing Enter, you can instead use an “insert line” operation.


    Press Ctrl+Shift+Enter (cmd+shift+enter on MacOS) to insert a blank line directly
    above the current one and move the cursor to the start of it (Repl.it will even
    maintain the current level of indentation for you).


    ![](img/48efb5586f6da072fc1456bee6971293_107_0.png)


    Image 6: *Inserting lines.*


    ### Indenting and dedenting lines


    When writing Python, you probably pay more attention to whitespace (spaces or
    tabs) than in other languages, which use braces to handle logic. You’re probably
    used to indenting and dedenting using Tab and Shift+Tab, which requires you to
    first place the cursor at the start of the line.


    Instead you can use Ctrl+] (cmd+] on MacOS) to indent and dedent the line no matter
    where your cursor is. For example, if you need to fix the indentation in the following
    code, you can:


    - put your cursor on the for line

    - press Ctrl+]

    - press down

    - press Shift+down

    - press Ctrl+] again twice.


