  md: '# Understanding the Repl.it IDE: a practical guide to building your first project
    with Repl.it


    Software developers can get pretty attached to their Integrated Development Environments
    (IDEs) and if you look for advice on which one to use, you’ll find no end of people
    advocating strongly for one over another: VS Code, Sublime Text, IntelliJ, Atom,
    Vim, Emacs, and no shortage of others.


    In the end, an IDE is just a glorified text editor. It lets you type text into
    files and save those files, functionality that has been present in nearly all
    computers since those controlled by punch cards.


    In this lesson, you’ll learn how to use the Repl.it IDE. It has some features
    you won’t find in many other IDEs, namely:


    +   - It’s fully online. You can use it from any computer that can connect to
    the internet and run a web browser, including a phone or tablet.

    - It’ll fully manage your environment for building and running code: you won’t
    need to mess around with making sure you have the right version of Python or the
    correct NodeJS libraries.

    - You can deploy any code you build to the public in one click: no messing around
    with servers, or copying code around.


    In the first part of this guide, we’ll cover the basics and also show you how
    multiplayer works so that you can code alone or with friends.


    # Introduction: creating an account and starting a project


    Although you don’t need an account to use Repl.it (you can just navigate to repl.it³
    and press the “start coding” button), let’s set one up in order to have access
    to all of the features.


    Visit https://repl.it/signup⁴ and follow the prompts to create a user account,
    either by entering a username and password or by logging in with Google, GitHub,
    or Facebook.


    Once you’re done, hit the + new repl button in the top right. In the example below,
    we choose to create a new Python project. Repl.it will automatically choose a
    random name for your project, or


    ³https://repl.it/

    ⁴https://repl.it/signup'
  merge: -1
  pgno: 11
- img_proc: true
  md: 'you can pick one yourself. Note that by default your repl will be public to
    anyone on the internet; this is great for sharing and collaboration, but we’ll
    have to be careful to not include passwords or other sensitive information in
    any of our projects.


    ![](img/48efb5586f6da072fc1456bee6971293_12_0.png)


    **Image 1: *Creating a new Python project***


    You’ll also notice an “Import from GitHub” option. Repl.it allows you to import
    existing software projects directly from GitHub, but we’ll create our own for
    now. Once your project is created, you’ll be taken to a new view with several
    panes. Let’s take a look at what these are.


    # ## Understanding the Repl.it panes


    You’ll soon see how configurable Repl.it is and how most things can be moved around
    to suit your fancy. However, by default, you’ll get the following layout.'
  merge: -1
  pgno: 12
- img_proc: true
  md: '![](img/48efb5586f6da072fc1456bee6971293_13_0.png)


    +   1. **Left pane: files and configuration.** This, by default, shows all the
    files that make up your project. Because we chose a Python project, Repl.it has
    gone ahead and created a main.py file.

    2. **Middle pane: code editor.** You’ll probably spend most of your time using
    this pane. It’s a text editor where you can write code. In the screenshot, we’ve
    added two lines of Python code, which we’ll run in a bit.

    3. **Right pane: output sandbox.** This is where you’ll see your code in action.
    All output that your program produces will appear in this pane, and it also acts
    as a quick sandbox to run small pieces of code, which we’ll look at more later.

    4. **Run button.** If you click the big green run button, your code will be executed
    and the output will appear on the right.

    5. **Menu bar.** This lets you control what you see in the main left pane (pane
    1). By default, you’ll see the files that make up your project but you can use
    this bar to view other things here too by clicking on the various icons. We’ll
    take a look at these options later.


    Don’t worry too much about all of the functionality offered right away. For now,
    we have a simple goal: write some code and run it.


    # Running code from a file


    Usually, you’ll enter your code as text in a file, and run it from there. Let’s
    do this now. Enter the following code in the middle pane (pane 2), and hit the
    run button.'
  merge: -1
  pgno: 13
- img_proc: true
  md: '```

    1 print("Hello World")

    2 print(1+2)

    ```


    ![](img/48efb5586f6da072fc1456bee6971293_14_0.png)


    Your script will run and the output it generates will appear on the right pane
    (pane 3). Our code output the phrase “Hello World” (it’s a long-standing tradition
    that when you learn something new the first thing you do is build a ‘hello world’
    project), and then output the answer to the sum 1 + 2. You probably won’t be able
    to turn this script into the next startup unicorn quite yet, but let’s keep going.


    # Running code from Repl.it’s REPL


    In computer programming, a REPL is a [read-eval-print loop](https://en.wikipedia.org/wiki/Read%E2%80%93eval%E2%80%93print_loop),
    and a REPL interface is often the simplest way to run short computer programs
    (and where Repl.it got its name).


    While in the previous example we saved our code to a file and then executed the
    file, it’s sometimes quicker to execute code directly.


    You can type code in the right-hand pane (pane 3) and press the “Enter” key to
    run it. Take a look at the example below where we print “Hello World” again and
    do a different sum, without changing our code file.


    ![](img/48efb5586f6da072fc1456bee6971293_14_1.png)'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'This is useful for prototyping or checking how things work, but for any serious
    program you write you’ll want to be able to save it, and that means writing the
    code in a file like in our earlier example.


    # Adding more files to your software project


    If you build larger projects, you’ll want to use more than a single file to stay
    organised, grouping related code in different files.


    So far, we’ve been using the ‘main.py’ file that was automatically created for
    us when we started the project, but we’re not limited to this file. Let’s add
    a new file, write some code in that, and import it into the main file for use.


    As an example, we’ll write code to solve [quadratic equations](https://www.mathsisfun.com/algebra/quadratic-equation.html).
    If you’ve done this before, you’ll know it can be tedious without a computer to
    go through all of the steps.


    6https://www.mathsisfun.com/algebra/quadratic-equation.html'
  merge: -1
  pgno: 15
- img_proc: true
  md: '# Example: Solve 5x² + 6x + 1 = 0


    Coefficients are: a = 5, b = 6, c = 1


    Quadratic Formula: x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}


    Put in a, b and c: x = \frac{-6 \pm \sqrt{6^2 - 4 \times 5 \times 1}}{2 \times
    5}


    Solve: x = \frac{-6 \pm \sqrt{36 - 20}}{10}


    x = \frac{-6 \pm \sqrt{16}}{10}


    x = \frac{-6 \pm 4}{10}


    x = -0.2 \text{ or } -1


    ![](img/48efb5586f6da072fc1456bee6971293_16_0.png)


    Answer: x = -0.2 \text{ or } x = -1


    And we see them on this graph.


    Check -0.2: 5×(-0.2)² + 6×(-0.2) + 1 = 5×(0.04) + 6×(-0.2) + 1 = 0.2 - 1.2 + 1
    = 0


    Check -1: 5×(-1)² + 6×(-1) + 1 = 5×(1) + 6×(-1) + 1 = 5 - 6 + 1 = 0


