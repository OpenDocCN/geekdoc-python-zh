    \ ‘GET /admin/css/fonts.css HTTP/1.1’\n```\n\n## 创建静态主页\n\n查看默认网站并不那么有趣，你会注意到没有包含你当前所见内容的文件，因此你无法轻松修改它。\n\
    \n为了用我们自己的页面替换它，我们需要修改几个文件。如果你之前创建过基本的HTML文件，你可能会惊讶于这个步骤的复杂程度。与其他框架一样，Django“让简单的事情变得困难，让困难的事情成为可能”。如果你只想显示一个基本的网页，这可能有些大材小用，但随着你的Web应用的发展，你会发现所有这些额外结构的用途。\n\
