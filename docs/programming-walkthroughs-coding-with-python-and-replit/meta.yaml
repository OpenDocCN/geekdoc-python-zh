    # Building a Discord bot with Node.js and Repl.it


    In this tutorial, we’ll use [Repl.it](https://repl.it) and Node.js to build a
    Discord Chatbot. If you’re reading this tutorial, you probably have at least heard
    of Discord and likely have an existing account. If not, Discord is a VoIP and
    Chat application that is designed to replace Skype for gamers. The bot we create
    in this tutorial will be able to join a Discord server and respond to messages
    sent by people.


    If you don’t like JavaScript, there’s also a Python version of this tutorial in
    the previous chapter.


    You’ll find it easier to follow along if you have some JavaScript knowledge and
    have used Discord or a similar app such as Skype or Telegram before. We won’t
    be covering the very basics of JavaScript, but we will explain each line of code
    in detail, so if you have any experience with programming, you should be able
    to follow along.


    # Overview and requirements


    We’ll be doing all of our coding through the Repl.it web IDE and hosting our bot
    with Repl.it as well, so you won’t need to install any additional software on
    your machine. For this tutorial you will need to create a [Discord](https://discordapp.com/)
    account (if you already have one, you can skip this). There are instructions for
    how to do this in the next section.


    In this tutorial, we will be covering:


    +   - Creating an application and a bot user in your Discord account

    - Creating a server on Discord

    - Adding our bot to our Discord server


    Let’s get through these admin steps first and then we can get to the fun part
    of coding our bot.


    # Creating a bot in Discord and getting a token


    You can sign up for a free account over at [the Discord register page](https://discordapp.com/register),
    and can download one of their desktop or mobile applications from [the Discord
    homepage](https://discordapp.com/). You can also use Discord in the browser.


    Once you have an account, you’ll want to create a Discord application. Visit [the
    Discord developer’s page](https://discordapp.com/developers/applications/) and
    press the “New application” button, as in the image below.


