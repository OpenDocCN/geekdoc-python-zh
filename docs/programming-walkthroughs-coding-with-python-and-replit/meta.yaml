    \n**_图5：你需要权限才能向GitHub上的仓库推送。_**\n\n通常在为开源项目做贡献时，你会先创建原始项目的“复刻”。这意味着你制作了该项目的一个副本，因为它是你的，所以你可以对其进行任何你想要的更改。如果你认为这些更改对其他人也有用，并且是对原始项目的明显改进，你可以发起一个“拉取请求”，请求原始项目的所有者将你的更改合并到主规范项目中。\n\
    \n在 [github.com](https://github.com)⁴⁶ 上创建账户或登录现有账户，然后导航回原始项目（https://github.com/ritza-co/flask-hello-world）。在右上角，点击“Fork”按钮，在你自己的GitHub账户中创建一个项目副本。\n\
