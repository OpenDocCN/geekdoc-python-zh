    \ to do this. Add the following code to your `main.py` file.\n\n```\nf = open(\"\
    createdfile.txt\", \"w\")\nf.write(\"This is some data that our Python script\
    \ created.\\n\")\nf.close()\n```\n\nNote the 'w' argument that we pass into the\
    \ open function now. This means that we want to open the file in 'write' mode.\
    \ Be careful: if the file already exists, Python will delete it and create a new\
    \ one. There are many different 'modes' to work with files in different ways which\
    \ you can read about in the Python documentation<sup>10</sup>.\n\nRun the code\
    \ again and you should see a new file pop up in the files pane. If you click on\
    \ the file, you'll find the data that the Python script wrote to it, as shown\
    \ below.\n\nImage 4: Writing data to a file and viewing it\n\n## Building a weather\
    \ logging system using Python and Repl.it\n\nNow that you can read from files\
    \ and write to them, let’s build a mini-project that records historical weather\
    \ temperatures. Our program will\n\n- Get the current temperature for a specified\
    \ set of cities.\n- Write this data to file with today’s date.\n- Print a summary\
    \ of this data to the console.\n\n## Creating a WeatherStack Account and getting\
    \ an API key\n\nWe’ll get weather data from the WeatherStack API. You’ll need\
    \ to sign up at weatherstack.com<sup>11</sup> and follow the instructions to get\
    \ your own access key. Choose the 'free tier' option which is limited to 1000\
    \ calls per month.\n\nAfter sign-up, you should see a page similar to the following\
    \ containing the API access key.\n\n10. https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files\n\
    11. https://weatherstack.com\n\nImage 5: Getting an API key from WeatherStack\n\
    \nYou should keep this key secret to stop other people using up all of your monthly\
    \ calls.\n\n## Creating our weather reporting project\n\nYou can continue to use\
    \ the working-with-files project that you created earlier if you want to, but\
    \ for the demonstration we'll create a new Python repl called weather report.\n\
    \nIn the main.py file add the following code, but replace the string for API_KEY\
    \ with your own one.\n\n```\nimport requests\n\n# change the following line to\
    \ use your own API key\nAPI_KEY = \"baaf201731c0cbc4af2c519cb578f907\"\nWS_URL\
    \ = \"http://api.weatherstack.com/current\"\n\ncity = \"London\"\n\nparameters\
    \ = {'access_key': API_KEY, 'query': city}\n\nresponse = requests.get(WS_URL,\
    \ parameters)\njs = response.json()\nprint(js)\nprint()\n```\n\nThis code asks\
    \ WeatherStack for the current temperature in London, gets the JSON<sup>12</sup>\
    \ version of this and prints it out. You should see something similar to what\
    \ is shown below.\n\nImage 6: Getting the current weather in JSON format\n\nWeatherStack\
    \ returns a lot of data, but we are mainly interested in\n\n1. **The location:**\
    \ To see if we found the correct London and not one of the [29 other places]<sup>13</sup>\
    \ called London.\n2. **The date:** We'll record this when we save this data to\
    \ a file.\n3. **The current temperature:** This is specified by default in Celsius,\
    \ but [can be customised]<sup>14</sup> if you prefer Fahrenheit.\n\nAdd the following\
    \ code below the existing code to extract these values into a format that's easier\
    \ to read.\n\n```\ntemperature = js['current']['temperature']\ndate = js['location']['localtime']\n\
    city = js['location']['name']\ncountry = js['location']['country']\n\nprint(f\"\
    The temperature in {city}, {country} on {date} is {temperature} degrees Celsius\"\
    )\n```\n\nIf you run the code again, you'll see a more human-friendly output,\
    \ as shown below.\n\nThis is great for getting the current weather, but now we\
    \ want to extend it a bit to record weather historically.\n\nWe’ll create a file\
    \ called `cities.txt` containing the list of cities we want to get weather data\
    \ for. Our script will request the weather for each city, and save a new line\
    \ with the weather and timestamp.\n\nAdd the `cities.txt` file, as in the image\
    \ below (of course, you can change which cities you would like to get weather\
    \ info for).\n\nNow remove the code we currently have in `main.py` and replace\
    \ it with the following.\n\n```\nimport requests\n\nAPI_KEY = \"baaf201731c0cbc4af2c519cb578f907\"\
    \nWS_URL = \"http://api.weatherstack.com/current\"\n\ncities = []\nwith open(\"\
    cities.txt\") as f:\n    for line in f:\n        cities.append(line.strip())\n\
    \nprint(cities)\n\nfor city in cities:\n    parameters = {'access_key': API_KEY,\
    \ 'query': city}\n    response = requests.get(WS_URL, parameters)\n    js = response.json()\n\
    \n    temperature = js['current']['temperature']\n    date = js['location']['localtime']\n\
    \n    with open(f\"{city}.txt\", \"w\") as f:\n        f.write(f\"{date},{temperature}\\\
    n\")\n```\n\nThis is similar to the code we had before, but now we\n\n- Read the\
    \ city names from our cities.txt file and put each city into a Python list.\n\
    - Loop through the cities and get the weather data for each one.\n- Create a new\
    \ file with the same name as each city and write the date and temperature (separated\
    \ by a comma) to each file.\n\nIn our previous examples we explicitly closed files\
    \ using f.close(). In this example, we instead open our files in a `with` block.\
    \ This is a common idiom in Python and is usually how you will open files. You\
    \ can read more about this in the [files section of the Python docs](https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files).\n\
    \nIf you run this code, you'll see it creates one file for each city.\n\nIf you\
    \ open up one of the files, you'll see it contains the date and temperature that\
    \ we fetched from WeatherStack.\n\n<sup>15</sup>https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files"
