- md: "## Image 6: We can access the spacy package via the package index\n\nSelect\
    \ the version at the top and hit the + button to add this package to your application.\
    \ Once this is complete, head across to your main.py and enter the following code:\n\
    \n```\n1 import spacy\n2 print(spacy.__version__)\n```\n\nThis should output the\
    \ version of spacy that we are using, which means that spacy has been added as\
    \ a dependency correctly.\n\nIf you take a look at your pyproject.toml file now,\
    \ you should see that it has specified spacy as a dependency.\n\n```\n1 [tool.poetry]\n\
    2 name = \"spacy-example\"\n3 version = \"0.1.0\"\n4 description = \"\"\n5 authors\
    \ = [\"Your Name <you@example.com>\"]\n6\n7 [tool.poetry.dependencies]\n8 python\
    \ = \"^3.8\"\n9 spacy = \"^2.3.2\"\n10\n11 [tool.poetry.dev-dependencies]\n12\n\
    13 [build-system]\n14 requires = [\"poetry>=0.12\"]\n15 build-backend = \"poetry.masonry.api\"\
    \n```\n\nAn important component of spaCy is a set of pretrained statistical models\
    \ that support NLP. These do not come with spaCy by default, nor are they indexed\
    \ on PyPi. One of these models is en_core_web_sm.\n\nIn your main.py file, replace\
    \ your current code with the following:\n\n```\n1 import spacy\n2\n3 nlp = spacy.load(\"\
    en_core_web_sm\")\n4 doc = nlp(\"The quick brown fox jumps over the lazy dog.\"\
    )\n5 for token in doc:\n6     print(token.text)\n```\n\nThis code should simply\
    \ break our short sentence into tokens (words), and print each one out. However,\
    \ at this point, if you run your code you will get an error, as Python cannot\
    \ find the en_core_web_sm model:\n\n```\n1 OSError: [E050] Can't find model 'en_core_web_sm'.\
    \ It doesn't seem to be a shortcut link,\n2 a Python package or a valid path to\
    \ a data directory.\n```\n\nWe will now explicitly tell our application how to\
    \ access this dependency. To do this, we need to find where the model is stored\
    \ online. First, we need to find the spaCy documentation for this model. This\
    \ can be accessed [here](https://spacy.io/models/en).\n\nSelecting the RELEASE\
    \ DETAILS button will guide us to where the model is stored online, on GitHub\
    \ (24). GitHub is a very common place to store code and related components online.\n\
    \n> (24) https://github.com/explosion/spacy-models/releases/tag/en_core_web_sm-2.3.1\n\
