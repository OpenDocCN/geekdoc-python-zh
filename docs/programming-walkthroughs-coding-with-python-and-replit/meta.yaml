    A\", \"G\", \"F\", \"F\", \"E\", \"E\", \"D\", \"D\", \"C\"]\ndurations = [2,\
    \ 2, 2, 2, 2, 2, 4, 2, 2, 2, 2, 2, 2, 4]\n\nvolume = 1\nfor i in range(len(notes)):\n\
    \    volume -= 0.05\n    play_note(notes[i], durations[i], volume=volume)\n```\n\
    \nHere we added a volume argument to our play_note() function so that we can pass\
    \ it along to play_tone(). Each time around the loop we reduce the volume by 5%.\
    \ Play it again and you should hear the song slowly fade out (if you add more\
    \ than 20 notes, the volume will hit 0 so you'll have to reduce the step or increase\
    \ the volume at some point to stop the song going silent).\n\n## Make it your\
    \ own\n\nIf you followed along you'll have your own version to extend, otherwise\
    \ you can fork our media player repl at https://repl.it/@GarethDwyer1/cwr-12-audio-player.⁸³\n\
    \nThe “Twinkle Twinkle Little Star” repl can be found at https://repl.it/@GarethDwyer1/cwr-12-audio-twinkle-twinkle⁸⁴.\n\
    \n⁸³https://repl.it/@GarethDwyer1/cwr-12-audio-player.\n⁸⁴https://repl.it/@GarethDwyer1/cwr-12-audio-twinkle-twinkle\n\
    \n## Where next\n\nControlling your audio files through a text-based interface\
    \ might feel like a downgrade from using a GUI media player, but you can use these\
    \ concepts to integrate audio controls into your other applications. For example,\
    \ you could create a [Discord chatbot](https://ritza.co/showcase/repl.it/building-a-discord-bot-with-python-and-repl-it.html)\
    \ that plays different tracks and automatically pauses or reduces the volume of\
