  md: "# Processing events: Detecting mouse clicks\n\nPyGame records all “events”,\
    \ including mouse clicks, and makes these available through `pygame.event.get():()`\
    \ . We need to check what events happened in each game loop and see if any of\
    \ them were important.\n\nIf the user clicks on an empty space, that will still\
    \ be recorded but we will simply ignore it. If the user clicks on a falling ball,\
    \ we want it to change direction.\n\nTo achieve this, add a `for` loop inside\
    \ the existing `while` loop. The entire game loop should look as follows:\n\n\
    ```\nwhile True:\n    for event in pygame.event.get():\n        if event.type\
    \ == pygame.MOUSEBUTTONDOWN:\n            if ball.rect.collidepoint(pygame.mouse.get_pos()):\n\
    \                ball.speed = [0,-1]\n    screen.fill(BACKGROUND)\n    screen.blit(ball.image,\
    \ ball.rect)\n    ball.update()\n    pygame.display.flip()\n    clock.tick(60)\n\
    ```\n\nWith this code, we loop through all events and check for left click (`MOUSEBUTTONDOWN`)\
    \ events. If we find one, we check if the click happened on top of the ball (using\
