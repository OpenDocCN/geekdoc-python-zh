    # Make it your own


    If you’ve followed along, you’ll have your own version of the repl to extend.
    Otherwise start from ours at https://repl.it/@GarethDwyer1/cwr-11-phonebook⁷⁴.


    # Where next


    You’ve learned how basic databases work. Databases are a complicated topic on
    their own and it can take years or decades to master the more advanced aspects
    of them, but they can also do more than the simple operations that we’ve covered
    here. Spend some time reading about PostgreSQL⁷⁵ and relational databases⁷⁶ in
    general, or other key-value stores⁷⁷ like the Repl.it database.


    Even without further research, the basic Create, Read, Update, and Delete (CRUD)
    operations that we covered here will get you far and you can build nearly any
    app you can imagine with just these.


    Next we’ll take a look at playing audio files programmatically so you can use
    Python to control your music.


    ⁷⁴https://repl.it/@GarethDwyer1/cwr-11-phonebook

