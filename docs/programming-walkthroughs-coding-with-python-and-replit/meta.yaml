    Image 6: Finding the credentials in the change logs.


    Luckily history is not included when other people fork your repl so this is not
    a huge problem, but it’s important to keep in mind where people might find your
    credentials.


    In our case, the worst case scenario is that someone finds our WeatherStack API
    key and uses up the quota, which is not the end of the world. A far more painful
    (and very common) scenario involves real money. For example, a developer signs
    up for a free trial on an expensive service like AWS, links a credit card, and
    then accidentally pushes the credentials for the service to GitHub or similar.
    Even if they realise their mistake and delete these within seconds, the credentials
    themselves are still available in the history of their repository. Hackers have
    bots that regularly look out for mistakes like this and use the credentials to
    spin up thousands of servers (often to mine cryptocurrency or join a botnet attack),
    potentially costing the poor developer thousands of dollars before they notice.


    # ## Rotating credentials


    Even if there’s a small chance that your API key has been exposed, it’s important
    to rotate it. This involves creating a new key, ensuring the new key works with
    your service, and then disabling the old one.


    In the case of WeatherStack, there is no option to create a new key while keeping
    the old one active, so we need to reset it and then copy the new key to our .env
    file (meaning that our app can’t function between the time that we disable the
    old key and replace it with the new one).'
