    \ tutorial is not a prerequisite for trying this one.\n\nWe’re going to focus\
    \ on basic animation and movement to create a solid base from which you can continue\
    \ on to build an entire platform game, complete with enemies, power-ups and multiple\
    \ levels.\n\n### Getting Started\n\nCreate a new repl and select “PyGame” from\
    \ the language dropdown.\n\n![](img/48efb5586f6da072fc1456bee6971293_268_0.png)\n\
    \nYou'll see “Python3 with PyGame” displayed in the default console and a separate\
    \ pane in the Repl.it IDE where you will be able to see and interact with the\
    \ game you will create.\n\nBefore we start writing code, we're going to need a\
    \ few sprites, which we've made available [here](/tutorial-files/2d-platform-game/2d-platform-game-sprites.zip).\
    \ Extract this ZIP file and add the files inside to your repl using the `upload\
    \ file` function. You can select multiple files to upload at once. Your repl's\
    \ file pane should now look like this:\n\n[206](/tutorial-files/2d-platform-game/2d-platform-game-sprites.zip)\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_269_0.png)\n\nIn this tutorial, we\
    \ will be gradually building up the `main.py` file, adding code in different parts\
    \ of the file as we go along. Each code snippets will contain some existing code\
    \ to give you an idea of where in the file the new additions should be placed.\
    \ The line `# . . .` will be used to represent existing code that has been left\
    \ out for brevity.\n\n## Setting up the scaffolding\n\nWe will start with the\
    \ following code in `main.py`, which draws a black screen:\n\n```python\nimport\
    \ pygame\n\nWIDTH = 400\nHEIGHT = 300\nBACKGROUND = (0, 0, 0)\n\ndef main():\n\
    \    pygame.init()\n    screen = pygame.display.set_mode((WIDTH, HEIGHT))\n  \
    \  clock = pygame.time.Clock()\n    while True:\n        screen.fill(BACKGROUND)\n\
    \        pygame.display.flip()\n        clock.tick(60)\n\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nAt the top of the file, we import `pygame`. Following that,\
    \ we set the width and height of the screen in pixels, and the background color.\
    \ This last value is an RGB tuple, and will make our background black. To use\
    \ a white background instead, we would write `(255, 255, 255)`.\n\nThen, in the\
    \ `main` method, we initiate PyGame, create both the screen and the clock, and\
    \ start the game loop, which is this code:\n\n```python\nwhile True:\n    screen.fill(BACKGROUND)\n\
    \    pygame.display.flip()\n    clock.tick(60)\n```\n\nThe game loop is where\
    \ everything happens. Because our game runs in real time, our code needs to constantly\
