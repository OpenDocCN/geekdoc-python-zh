    接下来，我们将看看如何以编程方式播放音频文件，以便你可以使用Python来控制你的音乐。\n\n⁷⁴https://repl.it/@GarethDwyer1/cwr-11-phonebook\n\
    ⁷⁵https://www.postgresql.org/\n⁷⁶https://en.wikipedia.org/wiki/Relational_database\n\
    ⁷⁷https://en.wikipedia.org/wiki/Key%E2%80%93value_database\n\n# Repl.it 音频\n\n\
    ![](img/48efb5586f6da072fc1456bee6971293_128_0.png)\n\n大多数人手动控制他们的音乐播放器，按下暂停按钮暂停曲目，或点击音量增大控件来提高音量。使用Repl.it，你可以使用代码自动化你的媒体体验。\n\
    \n在本教程中，我们将构建一个媒体播放器，它可以以编程方式播放音频文件，允许用户通过文本命令暂停播放、更改曲目、更改音量或获取循环信息。\n\n我们还将概述如何将其集成到其他应用程序中，例如聊天机器人，但我们将其实现留作读者的练习。\n\
    \n## 了解Repl.it上的音频工作原理\n\n在Unix系统中，包括Repl.it所构建的系统，[一切皆文件](https://en.wikipedia.org/wiki/Everything_is_a_file)<sup>78</sup>。你可能想到PDF、文本文件、图像文件或音频文件等文件类型，但事实上，即使是打印机之类的东西也经常被底层操作系统“视为”文件。\n\
    \nRepl.it使用`/tmp/audio`处的一个特殊文件来控制媒体输出。有关如何直接操作此文件的更多详细信息，请参阅[音频文档](https://docs.repl.it/repls/audio)<sup>79</sup>，但Repl.it还提供了一个更高级别的Python库，为我们提供了一些更高级别的函数，如“play_audio”。我们将在本教程中使用该库。\n\
    \n<sup>78</sup> https://en.wikipedia.org/wiki/Everything_is_a_file\n<sup>79</sup>\
    \ https://docs.repl.it/repls/audio"
