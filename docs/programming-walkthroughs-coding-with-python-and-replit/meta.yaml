- md: "## Introduction to Machine Learning with Python and Repl.it\n\nIn this tutorial,\
    \ we’re going to walk through how to set up a basic Python Repl<sup>185</sup>\
    \ that can learn the difference between two categories of sentences, positive\
    \ and negative. For example, if you had the sentence “I love it!”, we want to\
    \ train a machine to know that this sentence is associated with happy and positive\
    \ emotions. If we have a sentence like “it was really terrible”, we want the machine\
    \ to label it as a negative or sad sentence.\n\nThe maths, specifically calculus\
    \ and linear algebra, behind machine learning gets a bit hairy. We’ll be abstracting\
    \ this away with the Python library scikit-learn<sup>186</sup>, which makes it\
    \ possible to do advanced machine learning in a few lines of Python.\n\nAt the\
    \ end of this tutorial, you’ll understand the fundamental ideas of automatic classification\
    \ and have a program that can learn by itself to distinguish between different\
    \ categories of text. You’ll be able to use the same code to learn new categories\
    \ (e.g. spam/not-spam, or clickbait/non-clickbait).\n\n## Overview and requirements\n\
    \nTo follow along with this tutorial, you should have at least basic knowledge\
    \ of Python or a similar programming language. Ideally, you should also sign up\
    \ for a Repl.it<sup>187</sup> account so that you can modify and extend the bot\
    \ we build, but it’s not completely necessary.\n\nIn this tutorial, we will:\n\
    \n- Create some simple mock data - text to classify as positive or negative\n\
    - Explain vectorisation of the dataset\n- Cover how to classify text using a machine\
    \ learning classifier\n- Compare this to a manual classifier\n\n## Setting up\n\
    \nCreate a new Python Repl and open the `main.py` file that Repl created for you\
    \ automatically. Add the following two imports to the top and run the Repl so\
    \ that these dependencies are installed.\n\n```python\nfrom sklearn import tree\n\
    from sklearn.feature_extraction.text import CountVectorizer\n```\n\nIn line 1,\
    \ we import the tree module, which will give us a Decision Tree classifier that\
    \ can learn from data. In line 2, we import a vectoriser – something that can\
    \ turn text into numbers. We'll describe each of these in more detail soon!\n\n\
    Throughout the next steps, you can hit the big green “run” button to run your\
    \ code, check for bugs, and view output along the way (you should do this every\
    \ time you add new code).\n\n## Creating some mock data\n\nBefore we get started\
    \ with the exciting part, we’ll create a very simple dataset – too simple in fact.\
    \ You might not see the full power of machine learning at first as our task will\
    \ look so easy, but once we’ve walked through the concepts, it’ll be a simple\
    \ matter of swapping the data out for something bigger and more complicated.\n\
    \nOn the next lines of main.py add the following lines of code.\n\n```python\n\
    positive_texts = [\n    \"we love you\",\n    \"they love us\",\n    \"you are\
    \ good\",\n    \"he is good\",\n    \"they love mary\"\n]\n\nnegative_texts =\
    \ [\n    \"we hate you\",\n    \"they hate us\",\n    \"you are bad\",\n    \"\
    he is bad\",\n    \"we hate mary\"\n]\n\ntest_texts = [\n    \"they love mary\"\
    ,\n    \"they are good\",\n    \"why do you hate mary\",\n    \"they are almost\
    \ always good\",\n    \"we are very bad\"\n]\n```\n\nWe’ve created three simple\
    \ datasets of five sentences each. The first one contains positive sentences;\
    \ the second one contains negative sentences; and the last contains a mix of positive\
    \ and negative sentences.\n\nIt’s immediately obvious to a human which sentences\
    \ are positive and which are negative, but can we teach a computer to tell them\
    \ apart?\n\nWe’ll use the two lists `positive_texts` and `negative_texts` to `train`\
    \ our model. That is, we’ll show these examples to the computer along with the\
    \ correct answers for the question “is this text positive or negative?”. The computer\
    \ will try to find rules to tell the difference, and then we’ll test how well\
    \ it did by giving it `test_texts` without the answers and ask it to guess whether\
    \ each example is positive or negative.\n\n## Understanding vectorization\n\n\
    The first step in nearly all machine learning problems is to translate your data\
    \ from a format that makes sense to a human to one that makes sense to a computer.\
    \ In the case of language and text data, a simple but effective way to do this\
    \ is to associate each unique word in the dataset with a number, from 0 onwards.\
    \ Each text can then be represented by an array of numbers, representing how often\
    \ each possible word appears in the text.\n\nLet’s go through an example to see\
    \ how this works. If we had the two sentences\n\n```python\n[\"nice pizza is nice\"\
    ], [\"what is pizza\"]\n```\n\nthen we would have a dataset with four unique words\
    \ in it. The first thing we’d want to do is create a vocabulary mapping to map\
    \ each unique word to a unique number. We could do this as follows:\n\n```python\n\
    {\n    \"nice\": 0,\n    \"pizza\": 1,\n    \"is\": 2,\n    \"what\": 3\n}\n```\n\
    \nTo create this, we simply go through both sentences from left to right, mapping\
    \ each new word to the next available number and skipping words that we’ve seen\
    \ before. We can now convert our sentences into bag of words vectors as follows,\
    \ where we indicate the frequency of occurrence of each of the words in our vocabulary:\n\
    \n```python\n[\n  [2, 1, 1, 0], # two \"nice\", one \"pizza\", one \"is\", zero\
    \ \"what\"\n  [0, 1, 1, 1]  # zero \"nice\", one \"pizza\", one \"is\", one \"\
    what\"\n]\n```\n\nEach sentence vector is always the same length as the *total*\
    \ vocabulary size. We have four words in total (across all of our sentences),\
    \ so each sentence is represented by an array of length four. Each position in\
    \ the array represents a word, and each value represents how often that word appears\
    \ in that sentence.\n\nThe first sentence contains the word “nice” twice, while\
    \ the second sentence does not contain the word “nice” at all. According to our\
    \ mapping, the zeroth element of each array should indicate how often the word\
    \ nice appears, so the first sentence contains a 2 in the beginning and the second\
    \ sentence contains a 0 there.\n\nThis representation is called “bag of words”\
    \ because we lose all of the information represented by the *order* of words.\
    \ We don’t know, for example, that the first sentence starts and ends with “nice”,\
    \ only that it contains the word “nice” twice.\n\nWith real data, these arrays\
    \ get *very* long. There are millions of words in most languages, so for a big\
    \ dataset containing most words, each sentence needs to be represented by a very\
    \ long array, where nearly all values are set to zero (all the words not in that\
    \ sentence). This could take up a lot of space, but luckily scikit-learn uses\
    \ a clever sparse-matrix implementation to overcome this. This doesn’t quite look\
    \ like the above, but the overall concept remains the same.\n\nLet’s see how to\
    \ achieve the above using scikit-learn’s optimised vectoriser.\n\nFirst we want\
    \ to combine all of our “training” data (the data that we’ll show the computer\
    \ along with the correct labels of “positive” or “negative” so that it can learn),\
    \ so we’ll combine our positive and negative texts into one array. Add the following\
    \ code below the datasets you created.\n\n```python\ntraining_texts = negative_texts\
    \ + positive_texts\ntraining_labels = [\"negative\"] * len(negative_texts) + [\"\
    positive\"] * len(positive_texts)\n```\n\nOur dataset now looks like this:\n\n\
    ```python\n['we hate you', 'they hate us', 'you are bad', 'he is bad', 'we hate\
    \ mary', 'we love you', 'they love us', 'you are good', 'he is good', 'they love\
    \ mary']\n['negative', 'negative', 'negative', 'negative', 'negative', 'positive',\
    \ 'positive', 'positive', 'positive', 'positive']\n```\n\nThe two arrays (texts\
    \ and labels) are associated by index. The first text in the first array is negative,\
    \ and corresponds to the first label in the second array, and so on.\n\nNow we\
    \ need a vectoriser to transform the texts into numbers. We can create one in\
    \ scikit-learn with\n\n```python\nvectorizer = CountVectorizer()\n```\n\nBefore\
    \ we can use our vectorizer, it needs to run once through all the data we have\
    \ so it can build the mapping from words to indices. This is referred to as “fitting”\
    \ the vectoriser, and we can do it like this:\n\n```python\nvectorizer.fit(training_texts)\n\
    ```\n\nIf we want, we can see the mapping it created (which might not be in order,\
    \ as in the examples we walked through earlier, but each word will have its own\
    \ index). We can inspect the vectoriser’s vocabulary by adding the line\n\n```python\n\
    print(vectorizer.vocabulary_)\n```\n\n(Note the underscore at the end. Scikit-learn\
    \ uses this as a convention for “helper” attributes. The mapping is explicit only\
    \ for debugging purposes and you shouldn’t need to use it in most cases). My vocabulary\
    \ mapping looked as follows:\n\n```python\n{'we': 10, 'hate': 3, 'you': 11, 'they':\
    \ 8, 'us': 9, 'are': 0, 'bad': 1, 'he': 4, 'is': 5, 'mary': 7, 'love': 6, 'good':\
    \ 2}\n```\n\nBehind the scenes, the vectoriser inspected all of our texts, did\
    \ same basic preprocessing like making everything lowercase, split the text into\
    \ words using a built-in tokenization method, and produced a vocabulary mapping\
    \ specific to our dataset.\n\nNow that we have a vectorizer that knows what words\
    \ are in our dataset, we can use it to transform our texts into vectors. Add the\
    \ following lines of code to your Repl:\n\n```python\ntraining_vectors = vectorizer.transform(training_texts)\n\
    testing_vectors = vectorizer.transform(test_texts)\n```\n\nThe first line creates\
    \ a list of vectors which represent all of the training texts, still in the same\
    \ order, but now each text is a vector of numbers instead of a string.\n\nThe\
    \ second line does the same with the test vectors. The machine learning part isn’t\
    \ looking at our test texts (that would be cheating) – it’s just mapping the words\
    \ to numbers so that it can work with them more easily. Note that when we called\
    \ fit() on the vectoriser, we only showed it the training texts. Because there\
    \ are words in the test texts that don’t appear in the training texts, these words\
    \ will simply be ignored and will not be represented in testing_vectors.\n\nNow\
    \ that we have a vectorised representation of our problem, let’s take a look at\
    \ how we can solve it."
  mdcn: "## 使用 Python 和 Repl.it 入门机器学习\n\n在本教程中，我们将逐步讲解如何设置一个基本的 Python Repl<sup>185</sup>，使其能够学习区分两类句子：正面和负面的。例如，如果有一个句子“I\
    \ love it!”，我们希望训练机器知道这个句子与快乐和积极的情感相关联。如果有一个句子“It was really terrible”，我们希望机器将其标记为负面或悲伤的句子。\n\
    \n机器学习背后的数学，特别是微积分和线性代数，有些复杂。我们将使用 Python 库 scikit-learn<sup>186</sup> 来抽象这些内容，它使得在几行\
    \ Python 代码中进行高级机器学习成为可能。\n\n在本教程结束时，你将理解自动分类的基本概念，并拥有一个能够自主学习以区分不同类别文本的程序。你将能够使用相同的代码来学习新的类别（例如，垃圾邮件/非垃圾邮件，或标题党/非标题党）。\n\
    \n## 概览与要求\n\n要跟随本教程学习，你应该至少具备 Python 或类似编程语言的基本知识。理想情况下，你还应该注册一个 Repl.it<sup>187</sup>\
    \ 账户，这样你就可以修改和扩展我们将要构建的机器人，但这并不是完全必要的。\n\n在本教程中，我们将：\n\n-   创建一些简单的模拟数据——用于分类为正面或负面的文本\n\
    -   解释数据集的向量化过程\n-   介绍如何使用机器学习分类器对文本进行分类\n-   将其与手动分类器进行比较\n\n## 环境设置\n\n创建一个新的\
    \ Python Repl，并打开 Repl 为你自动创建的 `main.py` 文件。在文件顶部添加以下两行导入语句，并运行 Repl 以安装这些依赖项。\n\
    \n```python\nfrom sklearn import tree\nfrom sklearn.feature_extraction.text import\
    \ CountVectorizer\n```\n\n第 1 行，我们导入了 `tree` 模块，它将为我们提供一个可以从数据中学习的决策树分类器。第 2 行，我们导入了一个向量化器——一种可以将文本转换为数字的工具。我们很快会更详细地介绍它们！\n\
    \n在接下来的步骤中，你可以点击绿色的“运行”按钮来运行你的代码，检查错误，并在此过程中查看输出（每次添加新代码时你都应该这样做）。\n\n## 创建一些模拟数据\n\
    \n在开始激动人心的部分之前，我们将创建一个非常简单的数据集——事实上，它太简单了。起初你可能看不到机器学习的全部威力，因为我们的任务看起来如此简单，但是一旦我们讲解完概念，将数据替换为更大、更复杂的例子就很简单了。\n\
    \n在 `main.py` 的后续行中，添加以下代码行。\n\n```python\npositive_texts = [\n    \"we love you\"\
    ,\n    \"they love us\",\n    \"you are good\",\n    \"he is good\",\n    \"they\
    \ love mary\"\n]\n\nnegative_texts = [\n    \"we hate you\",\n    \"they hate\
    \ us\",\n    \"you are bad\",\n    \"he is bad\",\n    \"we hate mary\"\n]\n\n\
    test_texts = [\n    \"they love mary\",\n    \"they are good\",\n    \"why do\
    \ you hate mary\",\n    \"they are almost always good\",\n    \"we are very bad\"\
    \n]\n```\n\n我们创建了三个简单的数据集，每个包含五个句子。第一个包含正面句子；第二个包含负面句子；最后一个包含正面和负面句子的混合。\n\n人类能立即分辨出哪些句子是正面的，哪些是负面的，但我们能教会计算机区分它们吗？\n\
    \n我们将使用 `positive_texts` 和 `negative_texts` 这两个列表来`训练`我们的模型。也就是说，我们将向计算机展示这些例子，并附上问题“这个文本是正面的还是负面的？”的正确答案。计算机将尝试找出区分规则，然后我们将通过给它没有答案的\
    \ `test_texts` 并要求它猜测每个例子是正面还是负面，来测试它的表现如何。\n\n## 理解向量化\n\n几乎所有机器学习问题的第一步，都是将你的数据从人类能理解的格式转换为计算机能理解的格式。对于语言和文本数据，一种简单但有效的方法是将数据集中每个唯一的单词与一个数字（从\
    \ 0 开始）关联起来。然后，每个文本可以由一个数字数组表示，该数组代表每个可能的单词在文本中出现的频率。\n\n让我们通过一个例子来了解这是如何工作的。如果我们有两个句子\n\
    \n```python\n[\"nice pizza is nice\"], [\"what is pizza\"]\n```\n\n那么我们的数据集中将有四个唯一的单词。我们首先要做的是创建一个词汇表映射，将每个唯一的单词映射到一个唯一的数字。我们可以这样做：\n\
    \n```python\n{\n    \"nice\": 0,\n    \"pizza\": 1,\n    \"is\": 2,\n    \"what\"\
    : 3\n}\n```\n\n要创建这个映射，我们只需从左到右遍历两个句子，将每个新单词映射到下一个可用的数字，并跳过我们之前见过的单词。现在，我们可以将句子转换为词袋向量，如下所示，其中我们指出了我们词汇表中每个单词的出现频率：\n\
    \n```python\n[\n  [2, 1, 1, 0], # 两个 \"nice\"，一个 \"pizza\"，一个 \"is\"，零个 \"what\"\
    \n  [0, 1, 1, 1]  # 零个 \"nice\"，一个 \"pizza\"，一个 \"is\"，一个 \"what\"\n]\n```\n\n\
    每个句子向量的长度始终与词汇表的*总*大小相同。我们总共有四个单词（跨所有句子），所以每个句子由一个长度为 4 的数组表示。数组中的每个位置代表一个单词，每个值代表该单词在该句子中出现的频率。\n\
    \n第一个句子包含单词“nice”两次，而第二个句子根本不包含单词“nice”。根据我们的映射，每个数组的第 0 个元素应该表示“nice”这个单词出现的频率，所以第一个句子以\
    \ 2 开头，第二个句子在那个位置是 0。\n\n这种表示法被称为“词袋”，因为我们丢失了由单词*顺序*所代表的所有信息。例如，我们不知道第一个句子以“nice”开头和结尾，只知道它包含了“nice”这个单词两次。\n\
    \n对于真实数据，这些数组会变得*非常*长。大多数语言中有数百万个单词，因此对于一个包含大多数单词的大型数据集，每个句子需要由一个非常长的数组来表示，其中几乎所有值都设置为零（不在该句子中的所有单词）。这可能会占用大量空间，但幸运的是，scikit-learn\
    \ 使用了一种巧妙的稀疏矩阵实现来克服这个问题。这看起来并不完全像上面的例子，但总体概念保持不变。\n\n让我们看看如何使用 scikit-learn 优化的向量化器来实现上述目标。\n\
    \n首先，我们想要合并所有的“训练”数据（我们将向计算机展示这些数据以及“正面”或“负面”的正确标签，以便它能够学习），所以我们将正面和负面的文本合并到一个数组中。在你创建的数据集下方添加以下代码。\n\
    \n```python\ntraining_texts = negative_texts + positive_texts\ntraining_labels\
    \ = [\"negative\"] * len(negative_texts) + [\"positive\"] * len(positive_texts)\n\
    ```\n\n我们的数据集现在看起来像这样：\n\n```python\n['we hate you', 'they hate us', 'you are\
    \ bad', 'he is bad', 'we hate mary', 'we love you', 'they love us', 'you are good',\
    \ 'he is good', 'they love mary']\n['negative', 'negative', 'negative', 'negative',\
    \ 'negative', 'positive', 'positive', 'positive', 'positive', 'positive']\n```\n\
    \n这两个数组（文本和标签）通过索引关联。第一个数组中的第一个文本是负面的，对应于第二个数组中的第一个标签，依此类推。\n\n现在我们需要一个向量化器来将文本转换为数字。我们可以在\
    \ scikit-learn 中创建一个：\n\n```python\nvectorizer = CountVectorizer()\n```\n\n在使用我们的向量化器之前，它需要遍历我们拥有的所有数据一次，以便构建从单词到索引的映射。这被称为“拟合”向量化器，我们可以这样操作：\n\
    \n```python\nvectorizer.fit(training_texts)\n```\n\n如果我们愿意，我们可以查看它创建的映射（可能不像我们之前讲解的示例那样有序，但每个单词都会有其自己的索引）。我们可以通过添加以下行来检查向量化器的词汇表：\n\
    \n```python\nprint(vectorizer.vocabulary_)\n```\n\n（注意结尾的下划线。Scikit-learn 将此用作“辅助”属性的约定。这个映射仅用于调试目的，在大多数情况下你不需要使用它）。我的词汇表映射如下所示：\n\
    \n```python\n{'we': 10, 'hate': 3, 'you': 11, 'they': 8, 'us': 9, 'are': 0, 'bad':\
    \ 1, 'he': 4, 'is': 5, 'mary': 7, 'love': 6, 'good': 2}\n```\n\n在幕后，向量化器检查了我们所有的文本，进行了一些基本的预处理，比如将所有内容转换为小写，使用内置的分词方法将文本拆分成单词，并生成了一个特定于我们数据集的词汇表映射。\n\
    \n现在我们有了一个知道我们数据集中有哪些单词的向量化器，我们可以用它来将我们的文本转换为向量。在你的 Repl 中添加以下代码行：\n\n```python\n\
    training_vectors = vectorizer.transform(training_texts)\ntesting_vectors = vectorizer.transform(test_texts)\n\
    ```\n\n第一行创建了一个向量列表，这些向量代表所有的训练文本，顺序相同，但现在每个文本是一个数字向量而不是一个字符串。\n\n第二行对测试向量执行相同的操作。机器学习部分没有查看我们的测试文本（那将是作弊）——它只是将单词映射到数字，以便更容易处理。注意，当我们调用向量化器的\
    \ fit() 方法时，我们只向它展示了训练文本。因为测试文本中有一些单词没有出现在训练文本中，这些单词将被简单地忽略，并且不会在 testing_vectors\
    \ 中表示出来。\n\n现在我们有了问题的向量化表示，让我们看看如何解决它。"
