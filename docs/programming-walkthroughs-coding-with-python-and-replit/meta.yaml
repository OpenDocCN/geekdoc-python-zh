  - '[PAGE 190]


    Let’s tear this apart line by line to see what it does.


    +   - **Line 1** is what we had earlier. This line both tells Repl.it to install
    the third party library and brings it into this file so that we can use it.

    - In **line 2**, we create a Discord Client. We’ll use this client to send commands
    to the Discord *server* to control our bot and send it commands.

    - In **line 3** we retrieve our secret token from the environment variables (which
    Repl.it sets from our .env file).

    - In **line 5**, we define an event for our client, which defines how our bot
    should react to the “ready” event. The Discord bot is going to run *asynchronously*,
    which might be a bit confusing if you’re used to running standard synchronous
    code. We won’t go into asynchronous coding in depth here, but if you’re interested
    in what this is and why it’s used, there’s a good guide over at [RisingStack](https://blog.risingstack.com/node-hero-async-programming-in-node-js/)¹³⁸.
    In short, instead of running the code in our file from top to bottom, we’ll be
    running pieces of code in response to specific events.

    - In **lines 6-8** we define how our bot should respond to the “ready” event,
    which is fired when our bot successfully joins a server. We instruct our bot to
    output some information server side (i.e. this will be displayed in our Repl’s
    output, but not sent as a message through to Discord). We’ll print a simple I’m
    in message to see that the bot is there and print our bot’s username (if you’re
    running multiple bots, this will make it easier to work out who’s doing what).

    - **Lines 10-14** are similar, but instead of responding to an “ready” event,
    we tell our bot how to handle new messages. **Line 11** says we only want to respond
    to messages that aren’t from us (otherwise our bot will keep responding to himself
    – you can remove this line to see why that’s a problem), and **line 12** says
    we’ll send a new message to the same channel where we received a message (`msg.channel`)
    and the content we’ll send will be the same message that we received, but backwards.
    To reverse a string, we split it into its individual characters, reverse the resulting
    array, and then join it all back into a string again.


    The last line fires up our bot and uses the token we loaded earlier to log into
    Discord.


    Press the big green “Run” button again and you should see your bot reporting a
    successful channel join in the Repl output.


    > ¹³⁸ https://blog.risingstack.com/node-hero-async-programming-in-node-js/'
