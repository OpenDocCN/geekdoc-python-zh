- md: "## Extracting names from headlines using spaCy\n\nWe’ve now seen how to install\
    \ common packages like `requests` simply by importing them, how to find and install\
    \ slightly more complicated packages like `beautifulsoup` using the GUI package\
    \ manager, and how to manually install even more complicated packages like `spaCy`\
    \ (which have their own dependencies) by manually writing sections of the `pyproject.toml`\
    \ file.\n\nLet’s put everything together and use all three packages to extract\
    \ people’s names from today’s headlines. We’ll use the plaintext version of CNN\
    \ at [lite.cnn.com](https://lite.cnn.com) as it’s easier to extract text from.\n\
    \nReplace the code in your `main.py` with the following.\n\n```python\nimport\
    \ spacy\nimport requests\nfrom bs4 import BeautifulSoup\nfrom collections import\
    \ Counter\n\nnlp = spacy.load(\"en_core_web_sm\")\nresponse = requests.get(\"\
    http://lite.cnn.com/en\")\nsoup = BeautifulSoup(response.text, \"html.parser\"\
    )\n\n# https://stackoverflow.com/questions/1936466/beautifulsoup-grab-visible-webpage-text\n\
    [s.extract() for s in soup(['style', 'script', '[document]', 'head', 'title'])]\n\
    text = soup.getText()\ndoc = nlp(text)\n\nnames = []\nfor ent in doc.ents:\n \
    \   if ent.label_ == \"PERSON\":\n        names.append(ent.lemma_)\n\nprint(\"\
    These people are in the headlines today\")\nprint(Counter(names).most_common(10))\n\
    ```\n\nThis pulls the HTML from the lite version of CNN, extracts the HTML, removes\
    \ non-visible text such as CSS styles and JavaScript, and parses the resulting\
    \ text using `spaCy`.\n\nThen we loop through all of the [named entities](https://en.wikipedia.org/wiki/Named_entity)\
    \ that `spaCy` detects as part of its standard parse, and print out any that look\
    \ like people.\n\nIf you run this code, you should see a list of people making\
    \ headlines today. At the time of writing, John Lewis is mentioned in the most\
    \ headlines. (Note that named entity recognition is a difficult task and here\
    \ spaCy considers the possessive form John Lewis' to be a separate entity. We\
    \ can see that John Lewis was mentioned a total of 7 times though.)\n\n```python\n\
    import spacy\nimport requests\nfrom bs4 import BeautifulSoup\nfrom collections\
    \ import Counter\n\nnlp = spacy.load(\"en_core_web_sm\")\nresponse = requests.get(\"\
    http://lite.cnn.com/en\")\nsoup = BeautifulSoup(response.text, \"html.parser\"\
    )\n# https://stackoverflow.com/questions/1936466/beautifulsoup-grab-visible-webpage-text\n\
    [s.extract() for s in soup(['style', 'script', '[document]', 'head', 'title'])]\n\
    text = soup.getText()\ndoc = nlp(text)\n\nnames = []\nfor ent in doc.ents:\n \
    \   if ent.label_ == \"PERSON\":\n        names.append(ent.lemma_)\n\nprint(\"\
    These people are in the headlines today\")\nprint(Counter(names).most_common(10))\n\
    ```\n\n```\nThese people are in the headlines today\n[('John Lewis ', 4), ('John\
    \ Lewis', 3), ('Deborah Birx', 2), ('Jack Nicklaus', 1), ('Trader Joe 's', 1),\
    \ ('white', 1), ('Wolff', 1), ('Jeffrey Epstein', 1), ('Harvey Weinstein', 1),\
    \ ('Fahim Saleh', 1)]\n```\n\nImage 13: Using spaCy to extract people in today's\
    \ news.\n\n## Make it your own\n\nIf you followed along, you’ll already have your\
    \ own version of the repl to extend. If not, start from ours. Fork it from https://repl.it/@GarethDwyer1/cwr-03-nlp-spacy.\n\
    \n## Where next?\n\nspaCy is a very powerful NLP library and it can do far more\
    \ than simply extract people’s names. See what other interesting insights you\
    \ can automatically extract from today’s news.\n\nNow you can use the Repl.it\
    \ IDE, write programs that use files, and install third-party dependencies. Next\
    \ up, we’ll be taking a look at doing data science with Repl.it by visualising\
    \ data using matplotlib and seaborn.\n\n---\n\nSelect the version at the top and\
    \ hit the + button to add this package to your application. Once this is complete,\
    \ head across to your main.py and enter the following code:\n\n```python\nimport\
    \ spacy\nprint(spacy.__version__)\n```\n\nThis should output the version of spaCy\
    \ that we are using, which means that spaCy has been added as a dependency correctly.\n\
    If you take a look at your pyproject.toml file now, you should see that it has\
    \ specified spaCy as a dependency.\n\n```toml\n[tool.poetry]\nname = \"spacy-example\"\
    \nversion = \"0.1.0\"\ndescription = \"\"\nauthors = [\"Your Name <you@example.com>\"\
    ]\n\n[tool.poetry.dependencies]\npython = \"^3.8\"\nspacy = \"^2.3.2\"\n\n[tool.poetry.dev-dependencies]\n\
    \n[build-system]\nrequires = [\"poetry>=0.12\"]\nbuild-backend = \"poetry.masonry.api\"\
    \n```\n\nAn important component of spaCy is a set of pretrained statistical models\
    \ that support NLP. These do not come with spaCy by default, nor are they indexed\
    \ on PyPi. One of these models is en_core_web_sm.\n\nIn your main.py file, replace\
    \ your current code with the following:\n\n```python\nimport spacy\n\nnlp = spacy.load(\"\
    en_core_web_sm\")\ndoc = nlp(\"The quick brown fox jumps over the lazy dog.\"\
    )\nfor token in doc:\n    print(token.text)\n```\n\nThis code should simply break\
    \ our short sentence into tokens (words), and print each one out.\nHowever, at\
    \ this point, if you run your code you will get an error, as Python cannot find\
    \ the en_core_web_sm model:\n\n```\nOSError: [E050] Can't find model 'en_core_web_sm'.\
    \ It doesn't seem to be a shortcut link,\na Python package or a valid path to\
    \ a data directory.\n```\n\nWe will now explicitly tell our application how to\
    \ access this dependency. To do this, we need to find where the model is stored\
    \ online.\n\nFirst, we need to find the spaCy documentation for this model. This\
    \ can be accessed here<sup>23</sup>.\n\n<sup>23</sup> https://spacy.io/models/en\n\
    \n## Managing dependencies using Repl.it\n\nSelecting the RELEASE DETAILS button\
    \ will guide us to where the model is stored online, on GitHub<sup>24</sup>. GitHub\
    \ is a very common place to store code and related components online.\n\nThe GitHub\
    \ page also lets us know what version of spaCy is needed to make sure the model\
    \ runs correctly.\n\n<sup>24</sup> https://github.com/explosion/spacy-models/releases//tag/en_core_web_sm-2.3.1\n\
    \n| Feature | Description |\n| :--- | :--- |\n| Name | `en_core_web_sm` |\n| Version\
    \ | `2.3.1` |\n| spaCy | `>=2.3.0, <2.4.0` |\n| Model size | 11 MB |\n| Pipeline\
    \ | `tagger`, `parser`, `ner` |\n| Vectors | 0 keys, 0 unique vectors (0 dimensions)\
    \ |\n| Sources | OntoNotes 5 |\n| License | `MIT` |\n| Author | Explosion |\n\n\
    Image 9: *The GitHub page provides information about the requirements and features\
    \ of the model*\n\nHere we see that spaCy version should be greater than or equal\
    \ to 2.3.0, but less than 2.4.0. We should make a note of this for later, so we\
    \ can check that we have pinned an appropriate spaCy version.\n\nIf we scroll\
    \ right to the bottom of the page, you will see an “Assets” section, and under\
    \ this you will see the same Package icon we used in Repl.it with “en_core_web_sm-2.3.1.tar.gz”\
    \ next to it. This is what we have been looking for: the file containing the model.\n\
    \nImage 10: *The model can be found under the “Assets” heading*\n\nRight-click\
    \ on this file and select `copy link address`. We will need this shortly, as this\
    \ is the URL of the file.\n\nWe now need to modify our `pyproject.toml` file in\
    \ Repl.it. Open this file and add the following section to it\n\n```toml\n[tool.poetry.dependencies.en_core_web_sm]\n\
    url = \"https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-2.3.1/en_core_web_sm-2.3.1.tar.gz\"\
    \n```\n\nThe url should be the one that you copied from GitHub in the previous\
    \ step. Your whole pyproject.toml file should now look like the one below.\n\n\
    At this point that we should also check that we are using an appropriate version\
    \ of spaCy. We are using version 2.3.2, which is in the allowed range for the\
    \ model release (>=2.3.0, <2.4.0), so we do not need to modify this.\n\nFinally,\
    \ hit the run button. This will cause your configuration files to be updated and\
    \ then will run your application. If everything has gone correctly, you should\
    \ see the following in the output pane once it completes."
  mdcn: "## 使用 spaCy 从标题中提取姓名\n\n我们已经了解了如何通过简单导入来安装 `requests` 等常见包，如何使用图形界面包管理器查找并安装像\
    \ `beautifulsoup` 这样稍复杂的包，以及如何通过手动编写 `pyproject.toml` 文件的部分内容来安装像 `spaCy` 这样更复杂（拥有自身依赖项）的包。\n\
    \n现在，我们将综合运用这三个包，从今天的新闻标题中提取人名。我们将使用 [lite.cnn.com](https://lite.cnn.com) 的 CNN\
    \ 纯文本版本，因为它更易于提取文本。\n\n将你的 `main.py` 文件中的代码替换为以下内容。\n\n```python\nimport spacy\n\
    import requests\nfrom bs4 import BeautifulSoup\nfrom collections import Counter\n\
    \nnlp = spacy.load(\"en_core_web_sm\")\nresponse = requests.get(\"http://lite.cnn.com/en\"\
    )\nsoup = BeautifulSoup(response.text, \"html.parser\")\n\n# https://stackoverflow.com/questions/1936466/beautifulsoup-grab-visible-webpage-text\n\
    [s.extract() for s in soup(['style', 'script', '[document]', 'head', 'title'])]\n\
    text = soup.getText()\ndoc = nlp(text)\n\nnames = []\nfor ent in doc.ents:\n \
    \   if ent.label_ == \"PERSON\":\n        names.append(ent.lemma_)\n\nprint(\"\
    These people are in the headlines today\")\nprint(Counter(names).most_common(10))\n\
    ```\n\n此代码从精简版 CNN 拉取 HTML，提取 HTML 内容，移除 CSS 样式和 JavaScript 等不可见文本，然后使用 `spaCy`\
    \ 解析生成的文本。\n\n接着，我们遍历 `spaCy` 在其标准解析过程中检测到的所有[命名实体](https://en.wikipedia.org/wiki/Named_entity)，并打印出所有看起来是人名的部分。\n\
    \n运行此代码，你将看到今天新闻标题中出现的人名列表。在撰写本文时，**约翰·刘易斯**在标题中被提及的次数最多。（注意，命名识别是一项困难的任务，在这里\
    \ spaCy 将所有格形式 \"John Lewis'\" 视为一个独立的实体。不过我们可以看到，**约翰·刘易斯**总共被提及了 7 次。）\n\n```python\n\
    import spacy\nimport requests\nfrom bs4 import BeautifulSoup\nfrom collections\
    \ import Counter\n\nnlp = spacy.load(\"en_core_web_sm\")\nresponse = requests.get(\"\
    http://lite.cnn.com/en\")\nsoup = BeautifulSoup(response.text, \"html.parser\"\
    )\n# https://stackoverflow.com/questions/1936466/beautifulsoup-grab-visible-webpage-text\n\
    [s.extract() for s in soup(['style', 'script', '[document]', 'head', 'title'])]\n\
    text = soup.getText()\ndoc = nlp(text)\n\nnames = []\nfor ent in doc.ents:\n \
    \   if ent.label_ == \"PERSON\":\n        names.append(ent.lemma_)\n\nprint(\"\
    These people are in the headlines today\")\nprint(Counter(names).most_common(10))\n\
    ```\n\n```\nThese people are in the headlines today\n[('John Lewis ', 4), ('John\
    \ Lewis', 3), ('Deborah Birx', 2), ('Jack Nicklaus', 1), ('Trader Joe 's', 1),\
    \ ('white', 1), ('Wolff', 1), ('Jeffrey Epstein', 1), ('Harvey Weinstein', 1),\
    \ ('Fahim Saleh', 1)]\n```\n\n图片 13：*使用 spaCy 提取今日新闻中的人名*\n\n## 创建你自己的版本\n\n如果你跟着操作，你应该已经有了自己的\
    \ repl 版本可以继续扩展。如果没有，请从我们的版本开始。从 https://repl.it/@GarethDwyer1/cwr-03-nlp-spacy\
    \ 复制它。\n\n## 接下来去向何方？\n\n`spaCy` 是一个功能非常强大的 NLP 库，它能做的远不止提取人名。看看你还能从今天的新闻中自动提取哪些其他有趣的见解。\n\
    \n现在你可以使用 Repl.it IDE，编写使用文件的程序，并安装第三方依赖项。接下来，我们将探讨如何通过使用 `matplotlib` 和 `seaborn`\
    \ 进行数据可视化，在 Repl.it 上进行数据科学工作。\n\n---\n\n在顶部选择版本，然后点击 + 按钮将此包添加到你的应用程序。完成此操作后，转到你的\
    \ `main.py` 并输入以下代码：\n\n```python\nimport spacy\nprint(spacy.__version__)\n```\n\
    \n这应该会输出我们正在使用的 spaCy 版本，这意味着 spaCy 已被正确添加为依赖项。\n现在查看你的 `pyproject.toml` 文件，你应该看到它已将\
    \ spaCy 指定为依赖项。\n\n```toml\n[tool.poetry]\nname = \"spacy-example\"\nversion =\
    \ \"0.1.0\"\ndescription = \"\"\nauthors = [\"Your Name <you@example.com>\"]\n\
    \n[tool.poetry.dependencies]\npython = \"^3.8\"\nspacy = \"^2.3.2\"\n\n[tool.poetry.dev-dependencies]\n\
    \n[build-system]\nrequires = [\"poetry>=0.12\"]\nbuild-backend = \"poetry.masonry.api\"\
    \n```\n\nspaCy 的一个重要组成部分是一组支持 NLP 的预训练统计模型。这些模型默认不随 spaCy 一起提供，也没有在 PyPi 上索引。其中一个模型就是\
    \ `en_core_web_sm`。\n\n在你的 `main.py` 文件中，将当前代码替换为以下内容：\n\n```python\nimport spacy\n\
    \nnlp = spacy.load(\"en_core_web_sm\")\ndoc = nlp(\"The quick brown fox jumps\
    \ over the lazy dog.\")\nfor token in doc:\n    print(token.text)\n```\n\n此代码应该只是将我们的短句分解为词元（单词），并打印出每一个。\n\
    然而，此时如果你运行代码，会得到一个错误，因为 Python 找不到 `en_core_web_sm` 模型：\n\n```\nOSError: [E050]\
    \ Can't find model 'en_core_web_sm'. It doesn't seem to be a shortcut link,\n\
    a Python package or a valid path to a data directory.\n```\n\n我们现在将明确告知应用程序如何访问此依赖项。为此，我们需要找到该模型在线存储的位置。\n\
    \n首先，我们需要找到此模型的 spaCy 文档。可以在这里访问<sup>23</sup>。\n\n<sup>23</sup> https://spacy.io/models/en\n\
    \n## 使用 Repl.it 管理依赖项\n\n点击 **RELEASE DETAILS** 按钮将引导我们到模型在线存储的位置，在 GitHub 上<sup>24</sup>。GitHub\
    \ 是一个非常流行的在线存储代码和相关组件的地方。\n\nGitHub 页面还让我们知道需要哪个版本的 spaCy 才能确保模型正确运行。\n\n<sup>24</sup>\
    \ https://github.com/explosion/spacy-models/releases//tag/en_core_web_sm-2.3.1\n\
    \n| 功能 | 描述 |\n| :--- | :--- |\n| 名称 | `en_core_web_sm` |\n| 版本 | `2.3.1` |\n\
    | spaCy | `>=2.3.0, <2.4.0` |\n| 模型大小 | 11 MB |\n| 处理流程 | `tagger`, `parser`,\
    \ `ner` |\n| 向量 | 0 个键，0 个唯一向量（0 维） |\n| 数据来源 | OntoNotes 5 |\n| 许可证 | `MIT` |\n\
    | 作者 | Explosion |\n\n图片 9：*GitHub 页面提供了关于模型需求和特性的信息*\n\n这里我们看到 spaCy 版本应大于或等于\
    \ 2.3.0，但小于 2.4.0。我们应该记下这一点，以便稍后检查是否锁定了适当的 spaCy 版本。\n\n如果我们将页面一直滚动到底部，会看到一个 “Assets”\
    \ 部分，在此之下你会看到与我们在 Repl.it 中使用的相同的 Package 图标，旁边写着 “en_core_web_sm-2.3.1.tar.gz”。这就是我们一直在寻找的：包含模型的文件。\n\
    \n图片 10：*模型可以在 “Assets” 标题下找到*\n\n右键单击此文件并选择 `copy link address`。我们稍后会用到它，因为这是文件的\
    \ URL。\n\n我们现在需要在 Repl.it 中修改我们的 `pyproject.toml` 文件。打开此文件并添加以下部分：\n\n```toml\n\
    [tool.poetry.dependencies.en_core_web_sm]\nurl = \"https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-2.3.1/en_core_web_sm-2.3.1.tar.gz\"\
    \n```\n\n该 URL 应该是你上一步从 GitHub 复制的那个。你的整个 `pyproject.toml` 文件现在应该看起来像下面这样。\n\n\
    此时，我们还应检查是否使用了适当版本的 spaCy。我们使用的是版本 2.3.2，这在模型发布允许的范围内（>=2.3.0，<2.4.0），因此不需要修改。\n\
    \n最后，点击运行按钮。这将导致你的配置文件被更新，然后运行你的应用程序。如果一切正确，你应该会在输出窗格中看到以下内容。"
