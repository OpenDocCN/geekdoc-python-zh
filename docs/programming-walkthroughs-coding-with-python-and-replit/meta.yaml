  md: "We’ve created three simple datasets of five sentences each. The first one contains\
    \ positive sentences; the second one contains negative sentences; and the last\
    \ contains a mix of positive and negative sentences.\n\nIt’s immediately obvious\
    \ to a human which sentences are positive and which are negative, but can we teach\
    \ a computer to tell them apart?\n\nWe’ll use the two lists `positive_texts` and\
    \ `negative_texts` to `train` our model. That is, we’ll show these examples to\
    \ the computer along with the correct answers for the question “is this text positive\
    \ or negative?”. The computer will try to find rules to tell the difference, and\
    \ then we’ll test how well it did by giving it `test_texts` without the answers\
    \ and ask it to guess whether each example is positive or negative.\n\n# Understanding\
    \ vectorization\n\nThe first step in nearly all machine learning problems is to\
    \ translate your data from a format that makes sense to a human to one that makes\
    \ sense to a computer. In the case of language and text data, a simple but effective\
    \ way to do this is to associate each unique word in the dataset with a number,\
    \ from 0 onwards. Each text can then be represented by an array of numbers, representing\
    \ how often each possible word appears in the text.\n\nLet’s go through an example\
    \ to see how this works. If we had the two sentences\n\n```\n[\"nice pizza is\
    \ nice\"], [\"what is pizza\"]\n```\n\nthen we would have a dataset with four\
    \ unique words in it. The first thing we’d want to do is create a vocabulary mapping\
    \ to map each unique word to a unique number. We could do this as follows:\n\n\
    ```\n{\n    \"nice\": 0,\n    \"pizza\": 1,\n    \"is\": 2,\n    \"what\": 3\n\
    }\n```\n\nTo create this, we simply go through both sentences from left to right,\
    \ mapping each new word to the next available number and skipping words that we’ve\
    \ seen before. We can now convert our sentences into bag of words vectors as follows,\
    \ where we indicate the frequency of occurrence of each of the words in our vocabulary:"
  merge: -1
