    \ 为我们完成重复的步骤。这最终可能包含许多不同的求解器，但现在我们只编写一个：`solve_quadratic`。\n\n通过点击下面所示的新文件按钮，向你的项目添加一个新文件。将文件命名为\
    \ `solver.py`。你现在项目中有两个文件：`main.py` 和 `solver.py`。你可以通过点击它们在文件之间切换。\n\n![](img/48efb5586f6da072fc1456bee6971293_17_0.png)\n\
