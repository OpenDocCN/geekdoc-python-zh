    \ Storage” in the left-hand column. Click on “Connect” and select “Connect Your\
    \ Application”. This will change the pop-up view. Copy the “Connection String”\
    \ as you will need it shortly to connect to your database from Repl.it. It will\
    \ look something like this: `mongodb+srv://<username>:<password>@cluster0-zrtwi.gcp.mongodb.net/test?retryWrites=true&w=majority`\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_223_0.png)\n\n## Creating a Repl and\
    \ connecting to our Database\n\nFirst, we need to create a new Node.js Repl to\
    \ write the code necessary to connect to our shiny new Database. Navigate to repl.it\
    \ and create a new Repl, selecting “Node.js” as the language.\n\nA great thing\
    \ about Repl is that it makes projects public by default. This makes it easy to\
    \ share and is great for collaboration and learning, but we have to be careful\
    \ not to make our database credentials available on the open Internet.\n\nTo solve\
    \ this problem, we’ll be using `environment variables`, as we have done in previous\
    \ tutorials. We’ll create a special file that Repl.it recognizes and keeps private\
    \ for you, and in that file we declare variables that become part of our Repl.it\
    \ development environment and are accessible in our code.\n\nIn your Repl, create\
