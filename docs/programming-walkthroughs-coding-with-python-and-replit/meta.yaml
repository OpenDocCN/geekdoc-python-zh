- img_proc: true
  md: '# Building a CRM app with NodeJS, Repl.it, and MongoDB


    In this tutorial, we’ll use NodeJS on Repl.it, along with a MongoDB database to
    build a basic CRUD^[175]^ (Create, Read, Update, Delete) CRM^[176]^ (Customer
    Relationship Management) application. A CRM lets you store information about customers
    to help you track the status of every customer relationship. This can help businesses
    keep track of their clients and ultimately increase sales. The application will
    be able to store and edit customer details, as well as keep notes about them.


    This tutorial won’t be covering the basics of Node.js, but each line of code will
    be explained in detail.


    # Overview and requirements


    All of the code will be written and hosted in Repl.it, so you won’t need to install
    any additional software on your computer. In this tutorial, we’ll be covering:


    +   - Creating an account on MongoDB Atlas^[177]^

    - Connecting our database to our Repl

    - Creating a user interface to insert customer data

    - Updating and deleting database entries


    By the end of the tutorial, the application you will have created will be able
    to create, update, and delete documents in a MongoDB database. You will also have
    used a web application framework called Express^[178]^ and the Pug^[179]^ templating
    engine.


    # Creating an account on MongoDB Atlas


    MongoDB Atlas is a fully managed Database-as-a-Service. It provides a document
    database (often referred to as NoSQL), as opposed to a more traditional relational
    database like PostgreSQL.


    Head over to MongoDB Atlas^[180]^ and hit the “Try free” button. You should then
    sign up, clicking the “Get started free” button to complete the process.


    ^[175]^ https://en.wikipedia.org/wiki/Create,_read,_update_and_delete

    ^[176]^ https://en.wikipedia.org/wiki/Customer_relationship_management

    ^[177]^ https://www.mongodb.com/cloud/atlas

    ^[178]^ https://expressjs.com/

    ^[179]^ https://pugjs.org/api/getting-started.html

    ^[180]^ https://www.mongodb.com/cloud/atlas'
