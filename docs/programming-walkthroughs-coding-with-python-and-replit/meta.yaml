    ## Where next?


    We’ve completed the basics of web scraping and have looked at how the web works,
    how to extract information from web pages, and how to do some very basic text
    extraction. You will probably want to do something other than extract words from
    BBC! You can fork this Repl from https://repl.it/@GarethDwyer1/beginnerwebscraping
