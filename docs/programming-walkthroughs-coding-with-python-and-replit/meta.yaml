  md: '# # Repl.it Audio


    ![](img/48efb5586f6da072fc1456bee6971293_128_0.png)


    Most people control their music players manually, pressing the pause button to
    pause a track or hitting a volume up control to raise the volume. With Repl.it,
    you can automate your media experience using code.


    In this tutorial, we’ll build a media player that can play audio files programmatically,
    allowing the user to pause playback, change the track, change the volume, or get
    looping information by giving text commands.


    We’ll also outline how this could be integrated into other applications, such
    as a chatbot, but we’ll leave the implementation of that as an exercise for the
    reader.


    # ## Understanding how audio works on Repl.it


    In Unix systems, including the ones that Repl.it is built on, [everything is a
    file](https://en.wikipedia.org/wiki/Everything_is_a_file)<sup>78</sup>. You might
    think of file types like PDFs, text files, image files or audio files, but in
    fact even things like printers are often “seen” as files by the underlying operating
    system.


    Repl.it uses a special file at `/tmp/audio` to control media output. There are
    more details on how to manipulate this file directly in the [audio docs](https://docs.repl.it/repls/audio)<sup>79</sup>,
    but Repl.it also provides a higher level Python library that gives us some higher
    level functions like “play_audio”. We’ll be using the library in this tutorial.


    <sup>78</sup> https://en.wikipedia.org/wiki/Everything_is_a_file

    <sup>79</sup> https://docs.repl.it/repls/audio'
  merge: -1
  pgno: 128
