    # # Vim and Emacs key bindings


    Once you get hooked on keyboard shortcuts, you might wonder if you ever need to
    use your mouse again. Most of the time it only slows you down. Luckily, people
    thought of this decades ago. Before mice existed, all text editing was done using
    only a keyboard, and many developers still prefer editors that were created in
    this setting over more modern ones.


    The two main keyboard-focused text editors are called Vim<sup>71</sup> and Emacs<sup>72</sup>.
    They both have steep learning curves (and there’s a long-standing tradition that
    users of either fiercely argue about which is superior), but once you’ve put in
    the time to master them you can get rid of your mouse for good.


    If you’ve gotten used to either, you can emulate the experience in Repl.it by
    switching your keybinds. Go to the “Settings” tab and scroll down to where you
    can toggle between “default”, “emacs” and “vim”.


    <sup>71</sup>https://www.vim.org/

    <sup>72</sup>https://www.gnu.org/software/emacs/'
- md: "## Make it your own\n\nIf you want to keep hacking on the PyGame project using\
    \ your new keyboard prowess, you can continue from where we left off at [https://repl.it/@GarethDwyer1/cwr-10-productivity](https://repl.it/@GarethDwyer1/cwr-10-productivity)⁷³.\n\
    \n## Where next?\n\nNow that you have mastered the productivity features of Repl.it,\
    \ you can build proof of concept applications in no time.\n\nIn the next tutorial,\
    \ we’ll show you how to store data directly in the Repl.it key-value store, one\
    \ of the simplest varieties of database. This will cover the so-called “CRUD”\
    \ (Create, Read, Update, Delete) operations that are fundamental to any database-backed\
    \ software.\n\n⁷³[https://repl.it/@GarethDwyer1/cwr-10-productivity](https://repl.it/@GarethDwyer1/cwr-10-productivity)\n\
    \n## Using the Repl.it database\n\nIn previous tutorials we used the file system\
    \ to store data persistently. This works fine for smaller projects, but there\
    \ are some limitations to storing data directly in a file system. A more advanced\
    \ way to store data which is used by nearly any production application is a database.\n\
    \nAnother advantage of storing data in a database instead of in files is that\
    \ it separates our code and data cleanly. If we build an application on Repl.it\
    \ that processes any kind of data, it's likely that we'll want to share the code\
    \ with other people but **not** the data. Having our data cleanly separated into\
    \ a private database allows us to do exactly this.\n\nIn this tutorial, you'll\
    \ see how to store data from a Repl.it project directly in the Repl.it key-value\
    \ store, one of the simplest varieties of database, similar to a Python dictionary\
    \ and more scalable.\n\nAs a demonstration project, we'll build a basic phone\
    \ book application, storing contact information about friends and family and a\
    \ command line application to allow users to:\n\n- add new contacts\n- search\
    \ for existing contacts\n- update existing contacts\n- remove contacts.\n\nThis\
    \ will cover the so-called “CRUD” (Create, Read, Update, Delete) operations that\
    \ are fundamental to any database-backed software.\n\nNow create a new Python\
    \ repl called “phonebook”.\n\n## Adding and reading data using the Repl.it database\n\
    \nIn the main.py file import the database driver with this code:\n\n```\nfrom\
    \ replit import db\n```\n\nDatabases usually store data on a separate physical\
    \ server from where your code is running, so your code needs to know how to find\
    \ the database and how to authenticate (to prove that you are authorised to access\
    \ a specific database to stop other people reading your data).\n\nUsually we would\
    \ have to supply some kind of credentials for this (e.g. a username and password),\
    \ as well as an endpoint to indicate where the database can be found. In this\
    \ case, Repl.it handles everything automatically (as long as you are signed in),\
    \ so you can start storing data straight away.\n\nThe db object works very similarly\
    \ to a global Python dictionary but any data is persistently stored. You can associate\
    \ a specific value with a given key in the same way. Add the following to your\
    \ main.py file.\n\n```\ndb[\"Smith, John\"] = \"0123456789\"\nprint(db[\"Smith,\
    \ John\"])\n```\n\nYou should see the phone number printed to the console, as\
    \ shown below.\n\n## How is this different from a dictionary?\n\nThe main difference\
    \ between using the database and a Python dictionary is that, with the database,\
    \ the data is:\n\n- persisted between runs\n- kept separate from the code.\n\n\
    For a concrete example, consider storing the same “John Smith” contact in both\
    \ a dictionary and the database. Replace the code in your main.py file with the\
    \ following and run it.\n\n```\npython\nfrom replit import db\n\n# database\n\
    db[\"Smith, John\"] = \"0123456789\"\nprint(db[\"Smith, John\"])\n\n# dictionary\n\
    d = {}\nd[\"Smith, John\"] = \"0123456789\"\nprint(d[\"Smith, John\"])\n```\n\n\
    Here we store the information first in the database and print it from the database\
    \ and then in a dictionary and print it from there. In both cases, we see the\
    \ result printed and the syntax is exactly the same.\n\nHowever, if we comment\
    \ out the lines where we create the association between key and value, and run\
    \ the code again, we’ll see a difference.\n\n```\npython\nfrom replit import db\n\
    \n# database\n# db[\"Smith, John\"] = \"0123456789\"\nprint(db[\"Smith, John\"\
    ])\n\n# dictionary\n# d = {}\n# d[\"Smith, John\"] = \"0123456789\"\nprint(d[\"\
    Smith, John\"])\n```\n\nIn this case, the first print still works as the data\
    \ has persisted in the database. However the dictionary has been cleared between\
    \ runs so we get the error NameError: name 'd' is not defined.\n\nBecause each\
    \ Repl.it project has its own unique database which needs a secret key to access,\
    \ you can add as much data to your database and still share your project without\
    \ sharing any of your data.\n\nThe database also has some functionality that Python\
    \ dictionaries do not, such as searching keys by prefix, which we will take a\
    \ closer look at soon.\n\n## Building a basic phonebook application that can read\
    \ and store data\n\nLet’s get started with the application. We’ll build two separate\
    \ components in parallel, piece by piece:\n\n1. The database logic to create,\
    \ read, update, and delete contacts.\n2. The command line interface to prompt\
    \ the user to choose what to do, get input, and show output.\n\nWe'll keep the\
    \ code that interacts with users in our `main.py` file and the database logic\
    \ in a new module called `contacts.py`\n\nAs we don't have any contacts yet, we'll\
    \ start by allowing our users to add them.\n\n## Allowing the user to add contacts\
    \ to the phonebook\n\nLet's build the user interaction side first. We need to\
    \ be able to accept input from the user and show them prompts and output. Add\
    \ the following code to `main.py`:\n\n```\n1 def prompt_add_contact():\n2    \
    \ name = input(\"Please enter the contact's name: \")\n3     number = input(\"\
    Please enter the contact's phone number: \")\n4     print(f\"Adding {name} with\
    \ {number}\")\n5 \n6 prompt_add_contact()\n```\n\nThis doesn't actually store\
    \ the contact anywhere yet, but you can test it out to see how it prompts the\
    \ user for input and then displays a confirmation message.\n\nNext we need to\
    \ add some logic to store this in our database.\n\nCreate a new file called `contacts.py`\
    \ and add the following code.\n\n```\n1 from replit import db\n2 \n3 def add_contact(name,\
    \ phone_number):\n4     if name in db:\n5         print(\"Name already exists\"\
    )\n6     else:\n7         db[name] = phone_number\n```\n\nBecause we will use\
    \ people's names as keys in our database and because it's possible that different\
    \ people share the same name, it's possible that our users could overwrite important\
    \ phone numbers by adding a new contact with the same name as an existing one.\
    \ To prevent this, we'll ensure that they use a unique name for each contact and\
    \ only add information with this method to **new** names.\n\nBack in the `main.py`\
    \ file add two lines to import our new module and call the `add_contact` function.\
    \ The new code should look as follows:\n\n```\nimport contacts\n\ndef prompt_add_contact():\n\
    \    name = input(\"Please enter the contact's name: \")\n    number = input(\"\
    Please enter the contact's phone number: \")\n    print(f\"Adding {name} with\
    \ {number}\")\n    contacts.add_contact(name, number)\n\nprompt_add_contact()\n\
    ```\n\nTest that this works - run it twice and enter the same name both times,\
    \ with a different phone number. You should see the confirmation the first time,\
    \ but the second time it will inform you that the contact already exists, as shown\
    \ below.\n\n## Allowing users to retrieve details of stored contacts\n\nNow that\
    \ we've added a contact to our database, let's allow users to retrieve this information.\
    \ We want the user to be able to input a name and get the associated phone number\
    \ in return. We can follow a similar pattern to before: adding a function to both\
    \ our `main.py` file to handle user interaction and a separate one to our `contacts.py`\
    \ file to handle database interaction.\n\nIn `main.py` add the following function\
    \ and change the last line to call our new function instead of the `prompt_add_contact()`\
    \ one, as follows:"
  mdcn: "## 让它成为你自己的项目\n\n如果你想运用新掌握的键盘技巧继续开发 PyGame 项目，可以从我们上次中断的地方继续：[https://repl.it/@GarethDwyer1/cwr-10-productivity](https://repl.it/@GarethDwyer1/cwr-10-productivity)⁷³。\n\
    \n## 下一步方向\n\n既然你已经掌握了 Repl.it 的生产力功能，你现在可以快速构建概念验证应用程序了。\n\n在下一个教程中，我们将向你展示如何直接在\
    \ Repl.it 键值存储中存储数据，这是最简单的数据库类型之一。这将涵盖所谓的 \"CRUD\"（创建、读取、更新、删除）操作，这些操作是任何数据库支持的软件的基础。\n\
    \n⁷³[https://repl.it/@GarethDwyer1/cwr-10-productivity](https://repl.it/@GarethDwyer1/cwr-10-productivity)\n\
    \n## 使用 Repl.it 数据库\n\n在之前的教程中，我们使用文件系统来持久化存储数据。这对于较小的项目来说效果很好，但直接将数据存储在文件系统中存在一些局限性。一种更高级的数据存储方式，被几乎所有生产应用程序所使用，那就是数据库。\n\
    \n将数据存储在数据库而不是文件中的另一个优势是，它能清晰地分离我们的代码和数据。如果我们在 Repl.it 上构建一个处理任何类型数据的应用程序，我们很可能想与其他人分享代码，但**不**分享数据。将数据清晰地分离到一个私有数据库中，使我们能够做到这一点。\n\
    \n在本教程中，你将看到如何将 Repl.it 项目中的数据直接存储在 Repl.it 键值存储中，这是最简单的数据库类型之一，类似于 Python 字典，但更具可扩展性。\n\
    \n作为一个演示项目，我们将构建一个基本的电话簿应用程序，存储关于朋友和家人的联系信息，并创建一个命令行应用程序，允许用户：\n\n- 添加新联系人\n-\
    \ 搜索现有联系人\n- 更新现有联系人\n- 删除联系人。\n\n这将涵盖所谓的 \"CRUD\"（创建、读取、更新、删除）操作，这些操作是任何数据库支持的软件的基础。\n\
    \n现在，创建一个名为 \"phonebook\" 的新 Python repl。\n\n## 使用 Repl.it 数据库添加和读取数据\n\n在 main.py\
    \ 文件中，使用以下代码导入数据库驱动程序：\n\n```\nfrom replit import db\n```\n\n数据库通常将数据存储在与代码运行位置不同的物理服务器上，因此你的代码需要知道如何找到数据库以及如何进行身份验证（以证明你有权访问特定数据库，防止其他人读取你的数据）。\n\
