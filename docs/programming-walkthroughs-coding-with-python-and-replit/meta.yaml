    Because WeatherStack limits the number of calls each key can make per day, it
    would be bad if someone else used up the quota for our key and broke our app as
    a result.


    Let’s refactor the WeatherStack project to prevent our key from being made public.


    Visit https://repl.it/@GarethDwyer1/cwr-02-weather-report⁵⁹ (or your own version
    of this if you followed along previously) and create a new fork by pressing the
    pencil icon and then fork.


    ![](img/48efb5586f6da072fc1456bee6971293_84_0.png)


    Image 1: Forking our repl before refactoring it.


    We have API_KEY defined near the top of main.py, and this is the value that we
    want to keep secret. Let’s move it to a .env file instead.


    Click on the add file icon and call your new file .env. Be sure to add the initial
    full stop and don’t add any spaces.'
- md: 'Now remove the API_KEY variable from the main.py file and add it to the .env
    file, removing all quotation marks (") and spaces.


    Your .env file should look as follows (but use your own WeatherStack API instead
    of the example given here).


    ```

    API_KEY=baaf201731c0cbc4af2c519cb578f907

    ```


    ## Testing that the file is not copied into others’ forks


    If you copy your project’s URL into an incognito window (or use a separate browser),
    you’ll see all of the other files as usual, but the .env file will not be there.
    Your API key, and the entire .env file, can only be seen when you’re logged into
    the Repl.it account that created it.


    ![](img/48efb5586f6da072fc1456bee6971293_86_0.png)


    Image 3: *Checking that the .env file isn''t included in public versions of our
    repl.*


    ## Using environment variables in our script


    Our API key is now securely defined and available to the project, but we still
    need to tell our code where to find it. Because this data is stored in environment
    variables, we need to use the operating system (os) module to access it.


    At the top of your main.py file, add an import for os and load the API_KEY into
    a variable as follows.


    ```

    python

    import requests

    import os


    API_KEY = os.getenv("API_KEY")

    ```


    The getenv function looks for an environment variable of a specific name. Now
    our code (and anyone who sees it) only needs to know the name of the key that
    stores our private API key, instead of the API key itself. You should be able
    to run your code again at this point to verify that new weather entries are correctly
    added to the relevant files.


    There are many other environment variables that make various parts of an operating
    system work correctly. For example, you could also take a look at the LANG and
    PATH environment variables, which will show you that Repl.it has their servers
    configured to use US English and 8-bit unicode character encoding, and have some
    default places where the system looks for executable programs.


    ![](img/48efb5586f6da072fc1456bee6971293_87_0.png)


    Image 4: Looking at other environment variables.


    ## Time travelling to find secrets


    We removed the sensitive information from our project, but it’s not actually completely
    gone. It’s securely placed in our .env file, but it’s also still saved in the
    repl’s history.


    Repl.it saves every change you make to a project so that you can always go back
    to previous versions if you make a mistake or need to check what has changed.


    Click on the history button in the top bar, as shown below.


    ![](img/48efb5586f6da072fc1456bee6971293_87_1.png)


    Image 5: Diving into the history of our repl.


    You should see a bunch of entries from each change you’ve made to this project.
    Click through them and find the one where you deleted your API key. As you can
    see, the history viewer shows not only which lines have been changed, but also
    what was there before.


    ![](img/48efb5586f6da072fc1456bee6971293_88_0.png)


    Luckily history is not included when other people fork your repl so this is not
    a huge problem, but it’s important to keep in mind where people might find your
    credentials.


    In our case, the worst case scenario is that someone finds our WeatherStack API
    key and uses up the quota, which is not the end of the world. A far more painful
    (and very common) scenario involves real money. For example, a developer signs
    up for a free trial on an expensive service like AWS, links a credit card, and
    then accidentally pushes the credentials for the service to GitHub or similar.
    Even if they realise their mistake and delete these within seconds, the credentials
    themselves are still available in the history of their repository. Hackers have
    bots that regularly look out for mistakes like this and use the credentials to
    spin up thousands of servers (often to mine cryptocurrency or join a botnet attack),
    potentially costing the poor developer thousands of dollars before they notice.


    ## Rotating credentials


    Even if there’s a small chance that your API key has been exposed, it’s important
    to rotate it. This involves creating a new key, ensuring the new key works with
    your service, and then disabling the old one.


    In the case of WeatherStack, there is no option to create a new key while keeping
    the old one active, so we need to reset it and then copy the new key to our .env
    file (meaning that our app can’t function between the time that we disable the
    old key and replace it with the new one).


    ![](img/48efb5586f6da072fc1456bee6971293_89_0.png)


    Visit your WeatherStack account and press the `reset` button to get your new API
    key.


    ## Make it your own


    You can make a copy of the new repl below. If you fork it, the `.env` file will
    be missing, so you’ll need to create it and add your WeatherStack API key before
    it will run.

    Fork this repl from [https://repl.it/@GarethDwyer1/cwr-08-secrets-env](https://repl.it/@GarethDwyer1/cwr-08-secrets-env)⁶⁰


    ## Where next?


    There’s a lot more that you can do with `.env` files. In a later tutorial, we’ll
    use it to store database credentials (which are more important to keep safe than
    a free API key).

    You could also keep other private information in environment variables. For example,
    if you code a hangman game, you could keep the word that people need to guess
    in there so that you can share your code without spoiling the game.


    ⁶⁰[https://repl.it/@GarethDwyer1/cwr-08-secrets-env](https://repl.it/@GarethDwyer1/cwr-08-secrets-env)


    ## An introduction to pytest and doing test-driven development with Repl.it


    In this tutorial we’ll introduce test-driven development and you’ll see how to
    use `pytest` to ensure that your code is working as expected.


    `pytest` lets you specify inputs and expected outputs for your functions. It runs
    each input through your function and validates that the output is correct. `pytest`
    is a Python library and works just like any other Python library: you install
    it through your package manager and you can import it into your Python code. Tests
    are written in Python too, so you’ll have code testing other code.


    Test-driven development or TDD is the practice of writing tests before you write
    code. You can read more about TDD and why it’s popular on [Wikipedia](https://en.wikipedia.org/wiki/Test-driven_development).


    Specifically you’ll:


    - See how to structure your project to keep your tests separate but still have
    them refer to your main code files

    - Figure out the requirements for a function that can split a full name into first
    and last name components

    - Write tests for this function

    - Write the actual function.


    ## Creating a project structure for pytest


    For large projects, it’s useful to keep your testing code separate from your application
    code. In order for this to work, you’ll need your files set up in specific places,
    and you’ll need to create individual Python modules so that you can refer to different
    parts of the project easily.


    Create a new Python repl called `namesplitter`. As always, it’ll already have
    a `main.py` file, but we’re going to put our name splitting function into a different
    module called `utils`, which can house any helper code that our main application
    relies on. We also want a dedicated place for our tests.


    Create two new folders: one called `utils` and one called `tests`, using the add
    folder button. Note that when you press this button it will by default create
    a folder in your currently active folder, so select the `main.py` file after creating
    the first folder or the second folder will be created inside the first folder.


    You want both the folders to be at the root level of your project.


    Now add a file at the root level of the project called `__init__.py`. This is
    a special file that indicates to Python that we want our project to be treated
    as a “module”: something that other files can refer to by name and import pieces
    from. Also add an `__init__.py` file inside the `utils` folder and the `tests`
    folder. These files will remain empty, but it’s important that they exist for
    our tests to run. Their presence specifies that our main project should be treated
    as a module and that any code in our `utils` and `tests` folders should be treated
    as submodules of the main one.


    Finally, create the files where we’ll actually write code. Inside the `utils`
    folder create a file called `name_helper.py` and inside the `tests` folder create
    one called `test_name_helper.py`. Your project should now look as follows. Make
    sure that you have all the files and folders with exactly these names, in the
    correct places.


    ![](img/48efb5586f6da072fc1456bee6971293_91_0.png)


    Image 1: Setting up our project structure for pytest.


    ## Defining examples for the name split function


    Splitting names is useful in many contexts. For example, it is a common requirement
    when users sign up on websites with their full names and then companies want to
    send personalised emails addressing users by their first name only. You might
    think that this is as simple as splitting a name based on spaces as in the following
    example.'
