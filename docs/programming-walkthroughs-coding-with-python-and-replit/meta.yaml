    \n每个句子向量的长度始终与*总*词汇表大小相同。我们总共有四个单词（在所有句子中），所以每个句子由一个长度为四的数组表示。数组中的每个位置代表一个单词，每个值代表该单词在该句子中出现的频率。\n\
