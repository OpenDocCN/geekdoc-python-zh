    • With words = soup.text.split() we extract all the text from the page and split
    this resulting big body of text into individual words. The Python split() function
    splits on white space, which is a crude way to extract words from a piece of text,
    but it will serve our purpose for now.

    • The next line loops through all the words in that given article and keeps only
    the ones that are made up of numeric characters and which start with a capital
    letter (string.ascii_uppercase is just the uppercase alphabet). This is also an
    extremely crude way of extracting nouns, and we will get a lot of words (like
    those at the start of sentences) which are not actually proper nouns, but again
    it’s a good enough approximation for now.

    • We then add all the words that look like nouns to our all_nouns list and move
    on to the next article to do the same.

    • Finally, once we’ve downloaded all the pages, we print out the 100 most common
    nouns along with a count of how often they appeared using Python’s convenient
    Counter object.


    You should see output similar to that in the image below (though your words will
    be different, as the news changes every few hours). We have the most common “nouns”
    followed by a count of how often that noun appeared in all 10 of the articles
    we looked at.


    We can see that our crude extraction and parsing methods are far from perfect
    – words like “Twitter” and “Facebook” appear in most articles because of the social
    media links at the bottom of each article, so their presence doesn’t mean that
    Facebook and Twitter themselves are in the news today. Similarly, words like “From”
    aren’t nouns, and other words like “BBC” and “Business” are also included because
    they appear on each page, outside of the main article text.


