    \ program writes data to multiple files and you want to export all of these for\
    \ use in another program.\n\n### Working with files using Python\n\nCreate a new\
    \ Python repl and call it `working-with-files`.\n\nImage 1: Creating our files\
    \ project\n\nAs before, you'll get a default repl project with a `main.py` file.\
    \ We need a data file to practise reading data programmatically.\n\n1. Create\
    \ a new file using the `add file` button.\n2. Call the file `mydata.txt`. Previously\
