    There are many traditions in the Python data science world about how to import
    libraries. Many of the libraries have long names and get imported as easier-to-type
    shortcuts. You’ll see that nearly all examples import `pyplot` as the shorter
    `plt` before using it, as we do above. We can then generate a basic line plot
    by passing two arrays to `plt.plot()` for X and Y values. In this example, the
    first point that we plot is (1,6) (the first value from each array). We then add
    all of the plotted points joined into a line graph.


    Repl.it knows that it needs an X server to display this plot (triggered when you
    call `plt.show()`), so after running this code you’ll see “Starting X” in the
    main output console and a new graphical window will appear.


    ![](img/48efb5586f6da072fc1456bee6971293_44_0.png)


    The X server is very limited compared to a full operating system GUI. Beneath
    the plot, you’ll see some controls to pan and zoom around the image, but if you
    try to use them you’ll see that the experience is not that smooth.


    Line plots are cool, but we can do more. Let’s plot a real data set.


    # Making a scatter plot of US cities by state


    Scatter plots are often used to plot 2D data and look for correlations and other
    patterns. However, they can also loosely be used to plot geographical X-Y coordinates
    (in reality, the field of plotting geographical points is [far more complicated](https://www.gislounge.com/what-is-gis/)).
    We’ll use a subset from the [city data from simplemaps](https://simplemaps.com/data/us-cities)
    to generate our next plot. Each row of the data set represents on city in the
    USA, and gives us its latitude, longitude, and two-letter state code.


    To download the data and plot it, replace the code in your `main.py` file with
    the following.


