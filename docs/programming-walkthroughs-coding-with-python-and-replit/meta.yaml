    Now your bot will stay alive even after closing your browser or shutting down
    your development machine. Repl will still clean up your server and kill your bot
    after about one hour of inactivity, so if you don’t use your bot for a while,
    you’ll have to log into Repl and start the bot up again. Alternatively, you can
    set up a third-party (free!) service like [Uptime Robot](https://uptimerobot.com/).
    Uptime Robot pings your site every 5 minutes to make sure it’s still working –
    usually to notify you of unexpected downtime, but in this case, the constant pings
    have the side effect of keeping our Repl alive as it will never go more than an
    hour without receiving any activity.


    # # Forking and extending our basic bot


    This is not a very useful bot as is, but the possibilities are only limited by
    your creativity now! You can have your bot receive input from a user, process
    the input, and respond in any way you choose. In fact, with the basic input and
    output that we’ve demonstrated, we have most of the components of any modern computer,
    all of which are based on the [Von Neumann architecture](https://en.wikipedia.org/wiki/Von_Neumann_architecture)
    (we could easily add the missing memory by having our bot write to a file, or
    with a bit more effort link in a [SQLite database](https://www.sqlite.org/index.html)
    for persistent storage).


    If you followed along with this tutorial, you’ll have your own basic Repl bot
    to play around with and extend. If you were simply reading, you can easily fork
    this bot at [https://repl.it/@GarethDwyer1/discord-bot](https://repl.it/@GarethDwyer1/discord-bot)
    and extend it how you want (you’ll need to add your own token and recreate the
    `.env` file).


