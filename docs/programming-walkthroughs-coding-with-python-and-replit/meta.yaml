    ## pytest 简介以及使用 Repl.it 进行测试驱动开发


    在本教程中，我们将介绍测试驱动开发，你将看到如何使用 `pytest` 来确保你的代码按预期工作。


    `pytest` 允许你为函数指定输入和预期输出。它将每个输入通过你的函数运行，并验证输出是否正确。`pytest` 是一个 Python 库，其工作方式与其他
    Python 库一样：你通过包管理器安装它，并且可以将其导入到你的 Python 代码中。测试也是用 Python 编写的，因此你将拥有测试其他代码的代码。


    测试驱动开发或 TDD 是在编写代码之前编写测试的实践。你可以在 [Wikipedia](https://en.wikipedia.org/wiki/Test-driven_development)
    上阅读更多关于 TDD 及其流行原因的内容。


    具体来说，你将：


    - 了解如何构建项目结构，以将测试与主代码文件分开，但仍让它们引用主代码文件

    - 确定一个可以将全名拆分为名字和姓氏组件的函数的需求

    - 为此函数编写测试

    - 编写实际的函数。


    ## 为 pytest 创建项目结构


    对于大型项目，将测试代码与应用程序代码分开是有用的。为了使其工作，你需要将文件设置在特定位置，并且需要创建单独的 Python 模块，以便你可以轻松引用项目的不同部分。


    创建一个名为 `namesplitter` 的新 Python repl。与往常一样，它已经有一个 `main.py` 文件，但我们将把我们的名字拆分函数放入一个名为
    `utils` 的不同模块中，该模块可以存放我们的主应用程序所依赖的任何辅助代码。我们还需要一个专门的地方来存放测试。


    使用添加文件夹按钮创建两个新文件夹：一个名为 `utils`，另一个名为 `tests`。请注意，当你按下此按钮时，它默认会在当前活动文件夹中创建一个文件夹，因此在创建第一个文件夹后选择
    `main.py` 文件，否则第二个文件夹将创建在第一个文件夹内。


    你希望这两个文件夹都位于项目的根级别。


    现在在项目根级别添加一个名为 `__init__.py` 的文件。这是一个特殊文件，它向 Python 表明我们希望将我们的项目视为一个“模块”：其他文件可以通过名称引用并从中导入部分内容。同时在
    `utils` 文件夹和 `tests` 文件夹内添加一个 `__init__.py` 文件。这些文件将保持为空，但它们的存在对于我们的测试运行很重要。它们的存在指定了我们的主项目应被视为一个模块，并且
    `utils` 和 `tests` 文件夹中的任何代码都应被视为主模块的子模块。


    最后，创建我们将实际编写代码的文件。在 `utils` 文件夹内创建一个名为 `name_helper.py` 的文件，在 `tests` 文件夹内创建一个名为
    `test_name_helper.py` 的文件。你的项目现在应如下所示。确保你拥有所有具有完全这些名称的文件和文件夹，并且位于正确的位置。


    ![](img/48efb5586f6da072fc1456bee6971293_91_0.png)


    图 1：为 pytest 设置我们的项目结构。


    ## 为名字拆分函数定义示例


    在许多情况下，拆分名字都很有用。例如，当用户使用全名在网站上注册，然后公司希望发送仅以名字称呼用户的个性化电子邮件时，这是一个常见需求。你可能认为这就像根据空格拆分名字一样简单，如下例所示。'
