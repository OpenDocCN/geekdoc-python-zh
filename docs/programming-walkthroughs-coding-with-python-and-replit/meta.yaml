    # # Beginner web scraping with Python and Repl.it


    In this guide, we''ll walk through how to grab data from web sites automatically.
    Most websites are created with a *human* audience in mind - you use a search engine
    or type a URL into your web browser, and see information displayed on the page.
    Sometimes, we might want to *automatically* extract and process this data, and
    this is where web scraping can save us from boring repetitive labour. We can create
    a custom computer program to visit web sites, extract specific data and process
    this data in a particular way.


    We''ll be extracting news data from the [bbc.com](https://bbc.com/news) news website,
    but you should be able to adapt it to extract information from any website that
    you want with a bit of trial and error.


    There are many reasons you might wish to use web scraping. For example, you might
    need to:


    +   * extract numbers from a report that is released weekly and published online

    * grab the schedule for your favourite sports team as it''s released

    * find the release dates for upcoming movies in your favourite genre

    * be notified automatically when a website changes


    There are many other use cases for web scraping. However, you should also note
    that copyright law and web scraping laws are complex and differ by country. As
    long as you aren''t blatantly copying their content or doing web scraping for
    commercial gain, people generally don''t mind web scaping. However, there have
    been some legal cases involving [scraping data from LinkedIn](https://techcrunch.com/2016/08/15/linkedin-sues-scrapers/)
    and media attention from [scraping data from OKCupid](https://www.engadget.com/2016/05/13/scientists-release-personal-data-for-70-000-okcupid-profiles/).
    Web scraping can violate the law, go against a particular website''s terms of
    service, or breach ethical guidelines - so take care with where you apply this
    skill.


    With the disclaimer out of the way, let''s learn how to scrape!


    # # Overview and requirements


    Specifically, in this tutorial we''ll cover:


    +   * What a website really is and how HTML works'
- md: '## Webpages: beauty and the beast


    You have no doubt visited web pages using a web browser before. Websites exist
    in two forms:


    1.  The one you are used to, where you can see text, images, and other media.
    Different fonts, sizes, and colours are used to display information in a useful
    and (usually) aesthetic way.

    2.  The “source” of the webpage. This is the computer code that tells your web
    browser (e.g. Mozilla Firefox or Google Chrome) what to display and how to display
    it.


    Websites are created through a combination of three computer languages: HTML,
    CSS and JavaScript. This in itself is a huge and complicated field with a messy
    history, but having a basic understanding of how some of it works is necessary
    to automate web scraping effectively. If you open any website in your browser
    and right-click somewhere on the page, you’ll see a menu which should include
    an option to “view page source” – to inspect the code form of a website, before
    your web browser interprets it.


    This is shown in the image below: a normal web page on the left, with an open
    menu (displayed by right-clicking on the page). Clicking “view page source” on
    this menu produces the result on the right – we can see the code that contains
    all the data and supporting information that the web browser needs to display
    the complete page. While the page on the left is easy to read, use, and looks
    good, the one on the right is a monstrosity. It takes some effort and experience
    to make any sense of it, but it’s possible and necessary if we want to write custom
    web scrapers.


    ## Navigating the source code using Find


    The first thing to do is to work out how the two pages correspond: which parts
    of the normally displayed website match up to which parts of the code. You can
    use “find” (Ctrl + F) in the source code view to find specific pieces of text
    that are visible in the normal view to help with this. In the web page on the
    left, we can see that the story starts with the phrase “Getting a TV job”. If
    we search for this phrase in the code view, we can find the corresponding text
    within the code, on line 805.


    Image 2: Finding text in the source code of a web page.


    The `<p class="story-body__introduction">` just before the highlighted section
    is HTML code to specify that a paragraph (`<p>` in HTML) starts here and that
    this is a special kind of paragraph (an introduction to the story). The paragraph
    continues until the `</p>` symbol. You don''t need to worry about understanding
    HTML completely, but you should be aware that it contains **both** the text data
    that makes up the news article and additional data about how to display it.


    A large part of web scraping is viewing pages like this to a) identify the data
    that we are interested in and b) to separate this from the markup and other code
    that it is mixed with. Even before we start writing our own code, it can still
    be tricky first to understand other people''s.


    In most pages, there is a lot of code to define the structure, layout, interactivity,
    and other functionality of a web page, and relatively little that contains the
    actual text and images that we usually view. For especially complex pages it can
    be quite difficult, even with the help of the find function, to locate the code
    that is responsible for a particular part of the page. For this reason, most web
    browsers come with so-called “developer tools”, which are aimed primarily at programmers
    to assist in the creation and maintenance of web sites, though these tools are
    also handy for doing web scraping.


    ## Navigating the source code using developer tools


    You can open the developer tools for your browser from the main menu, with Google
    Chrome shown on the left and Mozilla Firefox on the right below. If you''re using
    a different web browser, you should be able to find a similar setting.


    **Image 3:** Opening Developer Tools in Chrome (left) and Firefox (right)


    Activating the tool brings up a new panel in your web browser, usually at the
    bottom or on the right-hand side. The tool contains an “Inspector” panel and a
    selector tool, which can be chosen by pressing the icon highlighted in red below.
    Once the selector tool is active, you can click on parts of the web page to view
    the corresponding source code. In the image below, we selected the same first
    paragraph in the normal view and we can see the `<p class="story-body__introduction">`
    code again in the panel below.


    Image 4: Viewing the code for a specific element using developer tools


    The Developer Tools are significantly more powerful than using the simple find
    tool, but they are also more complicated. You should choose a method based on
    your experience and the complexity of the page that you are trying to analyze.


    ## Downloading a web page with Python


    Now that we''ve seen a bit more of how web pages are built in our browser, we
    can start retrieving and manipulating them using Python. Since Python is not a
    web browser, we''ll only be able to retrieve and manipulate the HTML source code,
    rather than viewing the ''normal'' representation of a web page.


    We''ll do this through a Python Repl using the `requests` library. Open `repl.it`
    and choose to create a new Python Repl.


    This will take you to a working Python coding environment where you can write
    and run Python code. To start with, we''ll download the content from the BBC News
    homepage, and print out the first 1000 characters of HTML source code.


    You can do this with the following four lines of Python:


    ```python

    import requests


    url = "https://bbc.com/news"

    response = requests.get(url)

    print(response.text[:1000])

    ```


    Put this code in the `main.py` file that Repl automatically creates for you and
    press the “Run” button. After a short delay, you should see the output in the
    output pane - the beginning of HTML source code, similar to what we viewed in
    our web browser above.


    Image 6: Downloading a single page using Python


    Let’s pull apart each of these lines.


    -   In line 1, we import the Python `requests` library, which is a library that
    allows us to make web requests.

    -   In line 3, we define a variable containing the URL of the main BBC news site.
    You can visit this URL in your web browser to see the BBC News home page.

    -   In line 4, we pass the URL we defined to the `requests.get` function, which
    will visit the web page that the URL points to and fetch the HTML source code.
    We load this into a new variable called `response`.

    -   In line 5, we access the `text` attribute of our `response` object, which
    contains all of the HTML source code. We take only the first 1000 characters of
    this, and pass them to the `print` function, which simply dumps the resulting
    text to our output pane.


    We have now automatically retrieved a web page and we can display parts of the
    content. We are unlikely to be interested in the full source code dump of a web
    page (unless we are storing it for archival reasons), so let’s extract some interesting
    parts of the page, instead of only the first 1000 characters.


    ## Using BeautifulSoup to extract all URLs


    The world wide web is built from pages that link to each other using hyperlinks,
    links, or URLs. (These terms are all used more-or-less interchangeably).'
  mdcn: '## 网页：美与野兽


    你无疑之前使用过网页浏览器访问过网页。网站以两种形式存在：


    1.  你所习惯的那一种，在那里你可以看到文本、图片和其他媒体。不同的字体、大小和颜色被用来以有用且（通常）美观的方式展示信息。

    2.  网页的“源”。这是计算机代码，它告诉你的网页浏览器（例如 Mozilla Firefox 或 Google Chrome）显示什么以及如何显示。


    网站是通过结合三种计算机语言创建的：HTML、CSS 和 JavaScript。这本身就是一个庞大且复杂的领域，有着混乱的历史，但对其中一些运作方式有基本的理解对于有效地自动化网页抓取是必要的。如果你在浏览器中打开任何网站，并在页面上右键单击，你会看到一个菜单，其中应包含“查看网页源代码”选项——用于在浏览器解释之前检查网站的代码形式。


    这在下图中展示：左边是一个普通的网页，旁边是一个打开的菜单（通过右键单击页面显示）。点击这个菜单中的“查看网页源代码”，会得到右边的结果——我们可以看到包含所有数据和支撑信息的代码，浏览器需要这些信息来显示完整的页面。左边的页面易于阅读、使用且美观，而右边的页面则是一个庞然大物。需要付出一些努力并积累经验才能理解其内容，但如果我们想编写自定义的网页抓取器，这是可能且必要的。


    ## 使用查找功能导航源代码


    首先要弄清楚这两个页面如何对应：正常显示的网站的哪些部分与代码的哪些部分相匹配。你可以使用源代码视图中的“查找”（Ctrl + F）来查找在正常视图中可见的特定文本片段，以帮助完成这项工作。在左侧的网页中，我们可以看到故事以“Getting
    a TV job”这个短语开头。如果我们在代码视图中搜索这个短语，可以在第 805 行找到代码中对应的文本。


    图2：在网页源代码中查找文本。


    高亮部分前面的 `<p class="story-body__introduction">` 是 HTML 代码，用于指定一个段落（在 HTML 中是 `<p>`）从这里开始，并且这是一个特殊类型的段落（故事的引言）。该段落持续到
    `</p>` 符号。你不需要完全理解 HTML，但应该意识到它**既**包含构成新闻文章的文本数据，**也**包含关于如何显示它的附加数据。


    网页抓取的很大一部分就是查看这样的页面，以 a) 识别我们感兴趣的数据，以及 b) 将这些数据与混合其中的标记和其他代码分离。甚至在我们开始编写自己的代码之前，理解他人的代码也可能很棘手。


    在大多数页面中，有大量的代码用于定义网页的结构、布局、交互性和其他功能，而包含我们通常查看的实际文本和图片的代码相对较少。对于特别复杂的页面，即使借助查找功能，也可能很难定位负责页面特定部分的代码。因此，大多数网页浏览器都提供了所谓的“开发者工具”，主要面向程序员以协助网站的创建和维护，不过这些工具对于进行网页抓取也非常方便。


    ## 使用开发者工具导航源代码


    你可以从主菜单中打开浏览器的开发者工具，下面左边是 Google Chrome，右边是 Mozilla Firefox。如果你使用的是不同的网页浏览器，应该能找到类似的设置。


    **图3：** 在 Chrome（左）和 Firefox（右）中打开开发者工具


    激活该工具会在你的网页浏览器中打开一个新面板，通常在底部或右侧。该工具包含一个“检查器”面板和一个选择器工具，可以通过按下下面红色高亮的图标来选择。一旦选择器工具处于活动状态，你就可以点击网页的各个部分来查看相应的源代码。在下图中，我们在正常视图中选择了相同的第一个段落，可以看到下面的面板中再次出现了
    `<p class="story-body__introduction">` 代码。


    图4：使用开发者工具查看特定元素的代码


    开发者工具的功能比简单的查找工具强大得多，但也更复杂。你应该根据你的经验和你要分析的页面的复杂性来选择方法。


    ## 使用 Python 下载网页


    既然我们已经更深入地了解了网页在浏览器中是如何构建的，我们就可以开始使用 Python 来检索和操作它们了。由于 Python 不是网页浏览器，我们只能检索和操作
    HTML 源代码，而不是查看网页的“正常”表示。


    我们将通过一个 Python Repl 使用 `requests` 库来完成这个操作。打开 `repl.it` 并选择创建一个新的 Python Repl。


    这将把你带到一个可以编写和运行 Python 代码的 Python 工作环境。首先，我们将从 BBC 新闻主页下载内容，并打印出 HTML 源代码的前 1000
    个字符。


    你可以使用以下四行 Python 代码来完成：


    ```python

    import requests


    url = "https://bbc.com/news"

    response = requests.get(url)

    print(response.text[:1000])

    ```


    将此代码放入 Repl 自动为你创建的 `main.py` 文件中，然后点击“运行”按钮。稍等片刻，你应该会在输出窗格中看到输出结果——HTML 源代码的开头部分，类似于我们之前在网页浏览器中查看的内容。


    图6：使用 Python 下载单个页面


    让我们逐行解析这些代码。


    -   第 1 行，我们导入 Python 的 `requests` 库，这是一个允许我们发出网络请求的库。

    -   第 3 行，我们定义一个变量，其中包含 BBC 新闻主页的 URL。你可以在浏览器中访问此 URL 来查看 BBC 新闻主页。

    -   第 4 行，我们将定义的 URL 传递给 `requests.get` 函数，该函数将访问该 URL 指向的网页并获取 HTML 源代码。我们将此加载到一个名为
    `response` 的新变量中。

    -   第 5 行，我们访问 `response` 对象的 `text` 属性，该属性包含所有 HTML 源代码。我们只取其中的前 1000 个字符，并将它们传递给
    `print` 函数，该函数将结果文本输出到我们的输出窗格。


    我们现在自动检索了一个网页，并且可以显示部分内容。我们不太可能对一个网页的完整源代码转储感兴趣（除非我们是出于存档目的而存储它），所以让我们提取页面的一些有趣部分，而不仅仅是前
    1000 个字符。


    ## 使用 BeautifulSoup 提取所有 URL


    万维网是由通过超链接、链接或 URL 彼此链接的页面构成的。（这些术语的使用或多或少可以互换）。'
