  md: "# Downloading articles and extracting the text\n\nThe URLs aren’t that useful\
    \ to us, as we eventually want to display a summary of the *content* of each URL.\
    \ The actual text of each article isn’t included in the RSS feed that we have\
    \ (some RSS feeds contain the full text of each article), so we’ll need to do\
    \ some more work to download each article. First, we’ll add the third-party libraries\
    \ `requests` and `BeautifulSoup` as dependencies, again just using the “magic\
    \ import”. We’ll be using these to download the content of each article from the\
    \ URL and strip out extra CSS and JavaScript to leave us with plain text.\n\n\
    Now we’re ready to download the content from each article and serve that up to\
    \ the user. Modify the code in `main.py` to look as follows.\n\n```\n1  import\
    \ feedparser\n2  import requests\n3  \n4  from flask import Flask\n5  from bs4\
    \ import BeautifulSoup\n6  \n7  app = Flask(__name__)\n8  \n9  BBC_FEED = \"http://feeds.bbci.co.uk/news/world/rss.xml\"\
    \n10  LIMIT = 2\n11  \n12  def parse_article(article_url):\n13      print(\"Downloading\
    \ {}\".format(article_url))\n14      r = requests.get(article_url)\n15      soup\
    \ = BeautifulSoup(r.text, \"html.parser\")\n16      ps = soup.find_all('p')\n\
    17      text = \"\\n\".join(p.get_text() for p in ps)\n18      return text\n19\
    \  \n20  @app.route(\"/\")\n21  def home():\n22      feed = feedparser.parse(BBC_FEED)\n\
    23      article_texts = []\n24  \n25      for article in feed['entries'][:LIMIT]:\n\
    26          text = parse_article(article['link'])\n27          article_texts.append(text)\n\
    28      return str(article_texts)\n29  \n30  if __name__ == '__main__':\n31  \
    \    app.run('0.0.0.0')\n```"
