    \n## 让球从边缘反弹并随机移动\n\n为了模拟杂耍，我们希望球从“屋顶”（屏幕顶边）和“墙壁”（左右边）反弹。如果球碰到“地板”（底边），我们希望终止它并将其作为掉球从游戏中移除。\n\
