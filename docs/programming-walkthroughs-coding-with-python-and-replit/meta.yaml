    Let’s make a Discord bot that repeats everything we say but in reverse. We can
    do this in only a few lines of code. In your main.py file, add the following:


    ```

    1 import discord

    2 import os

    3

    4 client = discord.Client()

    5

    6 @client.event

    7 async def on_ready():

    8     print("I''m in")

    9     print(client.user)

    10

    11 @client.event

    12 async def on_message(message):

    13     if message.author != client.user:

    14         await message.channel.send(message.content[::-1])

    15

    16 token = os.environ.get("DISCORD_BOT_SECRET")

    17 client.run(token)

    ```


    Let’s tear this apart line by line to see what it does.


    +   - Lines 1-2 import the discord library that we installed earlier and the built-in
    operating system library, which we’ll need to access our bot’s secret token.

    - In line 4, we create a Discord Client. This is a Python object that we’ll use
    to send various commands to Discord’s servers.

    - In line 6, we say we are defining an event for our client. This line is a Python
    decorator, which will take the function directly below it and modify it in some
    way. The Discord bot is going to run asynchronously, which might be a bit confusing
    if you’re used to running standard Python. We won’t go into asynchronous Python
    in depth here, but if you’re interested in what this is and why it’s used, there’s
    a good guide over at FreeCodeCamp¹²¹. In short, instead of running


