    # # Welcome to Code with Repl.it


    In a series of tutorials, you’ll go from beginner to expert in coding with Repl.it.
    While these lessons are designed to be taken in order, they each make sense on
    their own too, so feel free to jump in wherever looks the most interesting to
    you.


    Part 1 covers the basics of using Repl.it: how to create projects, work with files,
    use third party dependencies, do plotting and graphing, and use multiplayer to
    code as part of a team.


    Part 2 covers more advanced Repl.it use. You’ll see how to pull projects from
    GitHub and collaborate on open source software, build a game, and keep your code
    secure. You’ll build a full web application using Test Driven Development (TDD),
    and find out how to be an elite hacker by using the shortcuts offered by Repl.it


    Once you’ve completed Part 1 and Part 2, you’ll be able to build nearly any project
    that you want, and deploy it for the world to use. If you’re stuck for ideas,
    you can go through the examples given in Part 3, which consists of practical tutorials
    to build everything from web scrapers to chat bots.


    Note that this set of lessons does not focus on teaching you to code, though we
    will explain some key concepts along the way. If you don’t already know how to
    code, it’s best to take this course in conjunction with a more traditional course.
    If you’re not sure what to do next, jump right in and see if you can keep up.
    We’re beginner friendly.


    # ## Part 1: The basics of Repl.it


    In this section of the course, you’ll learn the basic of Repl.it. But that doesn’t
    mean you won’t build some fun stuff along the way.


    # ### Tutorial 1: Introduction to Repl.it and using the IDE


    Learn the basics of the Repl.it IDE. Why use an online IDE and what are all those
    different panes? Build a simple program to solve your maths homework.


    # ### Tutorial 2: Working with files using Repl.it


    Computers were initially created to read and write files, and although we’ve come
    a long way files remain central to everything we do. Learn how to create them,
    read from them, write to them, and import and export them in bulk.'
  - '[PAGE 8]


    # ### Tutorial 3: Managing dependencies with Repl.it


    No one is an island, and if you build software you’ll build it on top of existing
    modules that others have written. Here we show you how to work with other people’s
    code in a variety of ways: in many cases all you need to do is import antigravity
    and fly away¹.


    # ### Tutorial 4: Data science: plotting and graphing


    Data is only useful if it can be easily understood. Plots, charts, and graphs
    are the easiest way to know what’s happening in the world around you. And did
    you know that data science is the sexiest job of the 21st century². Follow along
    to plot every city in the USA and find out if richer people live longer.


    # ### Tutorial 5: Pair programming and using multiplayer


    Did we mention that no one is an island? Coders don’t have to work alone. You
    can invite your friends to code along with you, a technique used by beginners
    and experts alike. Learn how to code collaboratively, as if you were using a Google
    Doc.


    # ## Part 2: Advanced Repl.it use


    Once you know the basics, it’s time to build larger and more complicated projects
    and keep them secure.


    # ### Tutorial 6: Running projects from GitHub


    Most open source software lives on GitHub and it’s easy to take advantage of all
    of this free software by pulling code from GitHub to Repl.it and running it with
    one click. Some software needs to be configured in specific ways so you’ll also
    learn how to modify what happens when you press that big green “run” button.


    # ### Tutorial 7: Building a game with PyGame


    Do you want to develop games? Of course, you can do that with Repl.it to. We’ll
    build a 2D juggling game using PyGame in this lesson and you’ll learn more about
    graphics programming at the same time: sprites, physics, and more.


    # ### Tutorial 8: Can you keep a secret? What about from time travellers?


    Have you been hacked? It’s only a matter of time if you haven’t. Learn how to
    keep your secrets safe, even when coding in public spaces. Pro tip: if you accidentally
    paste a password into your code and then remove it, others might still find it
    in your history, so you’ll learn how to navigate that too.'
  - '[PAGE 9]


    # Tutorial 9: Introduction to TDD using PyTest


    By this stage you’ll have made a few mistakes. Learn the TDD way and how to write
    code that tests your other code to catch frustrating errors before they can hurt
    anyone. Repetitive jobs is what computers are best at after all.


    # Tutorial 10: Become an elite hacker with productivity hacks


    Have you seen the Matrix? Learn to be the Neo of coding by getting more than one
    cursor, using keyboard shortcuts, and all of the other productivity features that
    Repl.it offers. You’ll be soon producing more code in less time.


    # Tutorial 11: Keeping your data in check with the Repl.it database


    Now that you are starting to build larger and more complicated applications, it
    is time to start using databases to keep your data clean and secure.


    # Tutorial 12: Repl audio - control (or create) your music with code


    Find, download, play, and control the volume of your music, all in code. If that’s
    not enough, create your own music too.


    This is the part where you realize that the possibilities are endless while you
    learn how to control your music with code.


    # Part 3: Building your own projects


    Once you’ve gone through everything, you might think “but what should I build?”.
    It’s a common problem and we’ve got you covered. Choose your favourite projects
    from a list (or turn on the coffee machine, order some pizza, and get through
    them all). Once you’ve gone through the step-by-step guides you can easily modify
    or extend the projects to make them your own.


    # Beginner web scraping with Python and Repl.it


    Learn more about what web scraping is, how websites are built, and how to automatically
    scrape data from websites.


    # Building news word clouds using Python and Repl.it


    Extending the beginner’s web scraping tutorial, you’ll build a more advanced scraper
    that extracts the plain text from news articles, stripping away the ‘boilerplate’
    content, such as text in sidebars.'
