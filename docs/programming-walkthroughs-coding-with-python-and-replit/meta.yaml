  md: "```\n1 import time\n2 from os import system\n3 from replit import audio\n4\
    \ \n5 main_message = \"\"\"\n6 +: volume up\n7 -: volume down\n8 k: add loop\n\
    9 j: remove loop\n10 <space>: play/pause\n11 \"\"\"\n```\n\nHere we add one more\
    \ import for `system` which we'll use to clear the screen so that the user doesn't\
    \ see old information. We then define a string that will prompt the user with\
    \ their options.\n\n# Creating the show_status() method\n\nLet's add a method\
    \ that will show the user the current status of our media player. It will take\
    \ `source` as an input, which is what the `play_media()` method that we already\
    \ used returns.\n\n```\n1 def show_status(source):\n2     time.sleep(0.2)\n3 \
    \    system(\"clear\")\n4     vbar = '|' * int(source.volume * 20)\n5     vperc\
    \ = int(source.volume * 100)\n6     pp = \"[]\" if source.paused else \">\"\n\
    7 \n8     print(f\"Volume: {vbar} {vperc}% \\n\")\n9     print(f\"Looping {source.loops_remaining}\
    \ time(s)\")\n10     print(f\"Time remaining: {source.get_remaining()}\")\n11\
    \     print(f\"Playing: {pp}\")\n12     print(main_message)\n```\n\nNote that\
    \ we add a `time.sleep()` at the top of this function. Because changing the status\
    \ involves writing to the `/tmp/audio` file we discussed before and reading the\
    \ status involves reading from this file, we want to wait a short while to ensure\
    \ we don't read stale information before showing it to the user.\n\nOtherwise\
    \ our function clears the screen, prints out a text-based volume bar along with\
    \ the current volume percentage, and shows other information such as whether the\
    \ track is currently playing or paused, how many loops are left, and how much\
    \ time is left before the track finishes.\n\nFinally, we need a loop to constantly\
    \ prompt the user for the next command which will also keep our repl alive and\
    \ continue playing the track while we are waiting for user input. Add the following\
