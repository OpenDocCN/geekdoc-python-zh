    To recap, Quicksort is one of the most efficient and most commonly used algorithms
    to sort a list of numbers. Unlike its competitor, Mergesort, Quicksort can sort
    a list in place, without the need to create a copy of the list, and therefore
    saving on memory requirements.


    The main intuition behind Quicksort is that if we can efficiently *partition*
    a list, then we can efficiently sort it. Partitioning a list means that we pick
    a *pivot* item in the list, and then modify the list to move all items larger
    than the pivot to the right and all smaller items to the left.


    Once the pivot is done, we can do the same operation to the left and right sections
    of the list recursively until the list is sorted.


    Here''s a Python implementation of Quicksort. Have a read through it and see if
    it makes sense. If not, read on below!'
