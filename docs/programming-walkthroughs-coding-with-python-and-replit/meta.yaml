  md: '# Processing events: Detecting mouse clicks


    PyGame records all “events”, including mouse clicks, and makes these available
    through `pygame.event.get()`. We need to check what events happened in each game
    loop and see if any of them were important.


    If the user clicks on an empty space, that will still be recorded but we will
    simply ignore it. If the user clicks on a falling ball, we want it to change direction.


    To achieve this, add a `for` loop inside the existing `while` loop. The entire
    game loop should look as follows:


    ```

    python

    1  while True:

    2      for event in pygame.event.get():

    3          if event.type == pygame.MOUSEBUTTONDOWN:

    4              if ball.rect.collidepoint(pygame.mouse.get_pos()):

    5                  ball.speed = [0, -1]

    6      screen.fill(BACKGROUND)

    7      screen.blit(ball.image, ball.rect)

    8      ball.update()

    9      pygame.display.flip()

    10     clock.tick(60)


    ```


    With this code, we loop through all events and check for left click (`MOUSEBUTTONDOWN`)
    events. If we find one, we check if the click happened on top of the ball (using
    `collidepoint()` which checks for overlapping coordinates), and in this case we
    reverse the direction of the ball (still no x-axis or horizontal movement, but
    we make the ball move negatively on the y-axis, which is up.)


    If you run this code again, you should now be able to click on the ball (let it
    fall for a while first) and see it change direction until it goes off the top
    of the screen.


    # Making the ball bounce off the edges and move randomly


    To simulate juggling, we want the ball to bounce off the “roof” (top edge of the
    screen) and “walls” (left and right edge). If the ball touches the “floor” (bottom
    edge) we want to kill it and remove it from the game as a dropped ball.


    To achieve this, we’ll add logic to our `update()` method (this is why we kept
    it separate from our `move()` method before). Add two lines of code to `update()`
    to make it look as follows.'
