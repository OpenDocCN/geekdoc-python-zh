    _web\\_sm-2.3.1.tar.gz\" next to it. This is what we have been looking for: the\
    \ file containing the model.\n\n*Image 10: The model can be found under the \"\
    Assets\" heading*\n\nRight-click on this file and select `copy link` address.\
    \ We will need this shortly, as this is the URL of the file.\n\nWe now need to\
    \ modify our `pyproject.toml` file in Repl.it. Open this file and add the following\
    \ section to it:\n\n```\n[tool.poetry.dependencies.en_core_web_sm]\nurl = \"https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-2.3.1/en_core_web_sm-2.3.1.tar.gz\"\
    \n```\n\nThe url should be the one that you copied from GitHub in the previous\
    \ step. Your whole pyproject.toml file should now look like the one below.\n\n\
    ## Image 11: Modifying pyproject.toml to explicitly point to the model allows\
    \ our application to find it and use it\n\nAt this point that we should also check\
    \ that we are using an appropriate version of spaCy. We are using version 2.3.2,\
    \ which is in the allowed range for the model release (>=2.3.0, <2.4.0) , so we\
    \ do not need to modify this.\n\nFinally, hit the run button. This will cause\
    \ your configuration files to be updated and then will run your application. If\
    \ everything has gone correctly, you should see the following in the output pane\
    \ once it completes.\n\n## Image 12: spaCy and the necessary components are all\
    \ found as dependencies, so the application runs successfully\n\n## Extracting\
    \ names from headlines using spaCy\n\nWe've now seen how to install common packages\
    \ like `requests` simply by importing them, how to find and install slightly more\
    \ complicated packages like `beautifulsoup` using the GUI package manager, and\
    \ how to manually install even more complicated packages like `spaCy` (which have\
    \ their own dependencies) by manually writing sections of the `pyproject.toml`\
    \ file.\n\nLet's put everything together and use all three packages to extract\
    \ people's names from today's headlines. We'll use the plaintext version of CNN\
    \ at [lite.cnn.com](https://lite.cnn.com) as it's easier to extract text from.\n\
    \nReplace the code in your `main.py` with the following.\n\n```\nimport spacy\n\
    import requests\nfrom bs4 import BeautifulSoup\nfrom collections import Counter\n\
    \nnlp = spacy.load(\"en_core_web_sm\")\nresponse = requests.get(\"http://lite.cnn.com/en\"\
    )\nsoup = BeautifulSoup(response.text, \"html.parser\")\n\n# https://stackoverflow.com/questions/1936466/beautifulsoup-grab-visible-webpage-text\n\
    [s.extract() for s in soup(['style', 'script', '[document]', 'head', 'title'])]\n\
    text = soup.getText()\ndoc = nlp(text)\n\nnames = []\nfor ent in doc.ents:\n \
    \   if ent.label_ == \"PERSON\":\n        names.append(ent.lemma_)\n\nprint(\"\
    These people are in the headlines today\")\nprint(Counter(names).most_common(10))\n\
    ```\n\nThis pulls the HTML from the lite version of CNN, extracts the HTML, removes\
    \ non-visible text such as CSS styles and JavaScript, and parses the resulting\
    \ text using `spaCy`. Then we loop through all of the [named entities](https://en.wikipedia.org/wiki/Named_entity)\
    \ that `spaCy` detects as part of its standard parse, and print out any that look\
    \ like people.\n\nIf you run this code, you should see a list of people making\
    \ headlines today. At the time of writing, John Lewis is mentioned in the most\
    \ headlines. (Note that named entity recognition is a difficult task and here\
    \ spaCy considers the possessive form John Lewis' to be a separate entity. We\
    \ can see that John Lewis was mentioned a total of 7 times though.)\n\nImage 13:\
    \ Using spaCy to extract people in today’s news.\n\n## Make it your own\n\nIf\
    \ you followed along, you’ll already have your own version of the repl to extend.\
    \ If not, start from ours. Fork it from https://repl.it/@GarethDwyer1/cwr-03-nlp-spacy27.\n\
    \n## Where next?\n\nspaCy is a very powerful NLP library and it can do far more\
    \ than simply extract people’s names. See what other interesting insights you\
    \ can automatically extract from today’s news.\n\nNow you can use the Repl.it\
    \ IDE, write programs that use files, and install third-party dependencies. Next\
    \ up, we’ll be taking a look at doing data science with Repl.it by visualising\
    \ data using matplotlib and seaborn.\n\n> (27) https://repl.it/@GarethDwyer1/cwr-03-nlp-spacy\n\
    \n## Data science with Repl.it: Plots and graphs\n\nSo far, all the programs we\
    \ have looked at have been entirely text based. They have taken text input and\
    \ produced text output, on the console or saved to files.\n\nWhile text is flexible\
    \ and powerful, sometimes a picture is worth a thousand words. Especially when\
    \ analysing data, you’ll often want to produce plots and graphs. There are three\
    \ main ways of achieving this using Repl.it.\n\n- Creating a front-end only project\
    \ and using only JavaScript, HTML and CSS.\n- Creating a full web application\
    \ with something like Flask, analysing the data in Python and passing the results\
    \ to a front end to be visualised.\n- Using Python code only, creating windows\
    \ using X and rendering the plots in there.\n\nOption 1 is great if you’re OK\
    \ with your users having access to all of your data, you like doing data manipulation\
    \ in JavaScript, and your data set is small enough to load into a web browser.\
    \ Option 2 is often the most powerful, but can be overkill if you just want a\
    \ few basic plots.\n\nHere, we’ll demonstrate how to do option 3, using Python\
    \ and Matplotlib.\n\n## Installing Matplotlib and creating a basic line plot\n\
    \nMatplotlib is a third-party library for doing all kinds of plots and graphs\
    \ in Python. We can install it by using Repl.it’s “magic import” functionality.\
    \ Matplotlib is a large and powerful library with a lot of functionality, but\
    \ we only need pyplot for now: the module for plotting.\n\nCreate a new Python\
    \ repl and add the following code.\n\n```\nfrom matplotlib import pyplot as plt\n\
    \nplt.plot([1,2,3,4,5,6], [6,3,6,1,2,3])\nplt.show()\n```"
