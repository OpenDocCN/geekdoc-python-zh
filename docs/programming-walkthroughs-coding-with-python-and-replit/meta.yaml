    What does this mean? Because no one else can edit your repl, you can share it
    far and wide. But because anyone can read your repl, you should be careful that
    you don’t share anything private or secret in it.


    # Sharing write-access: Multiplayer


    Of course, sometimes you might want others to have write access to your repl so
    that they can contribute, or help you out with a problem. In these cases, you
    can use Repl.it’s “multiplayer” functionality.


    If you invite someone to your repl, it’s different from sharing the URL with them.
    You can invite someone by clicking Share in the top right and sending them the
    secret link that starts with “https://repl.it/join”. This link will give people
    edit access to your repl.'
