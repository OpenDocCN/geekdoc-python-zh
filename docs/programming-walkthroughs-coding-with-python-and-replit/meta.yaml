    \n决策树不是最强大的机器学习模型，但它们比大多数其他算法有一个优势：在我们训练它们之后，我们可以查看内部并确切地了解它们是如何工作的。更高级的模型，如深度神经网络，在训练后几乎不可能理解。\n\
