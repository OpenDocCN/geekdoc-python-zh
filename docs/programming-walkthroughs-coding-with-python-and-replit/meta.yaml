    \ about in more detail.\n\nTest that you can play a single note as expected. Now\
    \ you can play the first part of “Twinkle Twinkle Little Star” by defining all\
    \ of the notes and durations, and then looping through them, calling `play_note`\
    \ on each in turn."
- md: "## 音频控制与音量调节\n\n我们也可以通过向 `play_tone()` 传递 `volume` 参数来控制每个音调的音量。对于音频文件，这是一个浮点数，1\
    \ 代表 100% 的音量。如果我们想实现一个 *渐弱*（gradual decrease in volume）效果，可以将代码修改如下：\n\n```python\n\
    def play_note(note, duration, volume=1):\n    note_to_freq = {\n        \"C\"\
    : 262, \"D\": 294, \"E\": 330, \"F\": 349, \"G\": 392, \"A\": 440\n    }\n   \
    \ audio.play_tone(duration, note_to_freq[note], 0, volume=volume)\n    time.sleep(duration)\n\
    \nnotes = [\"C\", \"C\", \"G\", \"G\", \"A\", \"A\", \"G\", \"F\", \"F\", \"E\"\
    , \"E\", \"D\", \"D\", \"C\"]\ndurations = [2, 2, 2, 2, 2, 2, 4, 2, 2, 2, 2, 2,\
    \ 2, 4]\n\nvolume = 1\nfor i in range(len(notes)):\n    volume -= 0.05\n    play_note(notes[i],\
    \ durations[i], volume=volume)\n```\n\n我们在这里为 `play_note()` 函数添加了一个 `volume` 参数，以便将其传递给\
    \ `play_tone()`。在循环的每次迭代中，我们将音量减少 5%。再次播放它，你应该会听到歌曲逐渐淡出（如果你添加超过 20 个音符，音量会降至 0，因此你需要减少步长或在某个时刻增加音量，以防止歌曲变得无声）。\n\
    \n## 自定义你的版本\n\n如果你跟着一起做，你会拥有自己的扩展版本；否则你可以 fork 我们的媒体播放器 repl：[https://repl.it/@GarethDwyer1/cwr-12-audio-player](https://repl.it/@GarethDwyer1/cwr-12-audio-player)。<sup>83</sup>\n\
    \n“小星星”（Twinkle Twinkle Little Star）的 repl 可以在这里找到：[https://repl.it/@GarethDwyer1/cwr-12-audio-twinkle-twinkle](https://repl.it/@GarethDwyer1/cwr-12-audio-twinkle-twinkle)。<sup>84</sup>\n\
    \n## 接下来去哪里\n\n通过基于文本的界面来控制你的音频文件，可能感觉比使用图形界面（GUI）媒体播放器有所降级，但你可以使用这些概念将音频控制集成到你的其他应用中。例如，你可以创建一个\
    \ Discord 聊天机器人[^85]，它可以播放不同的曲目，并在你加入 Discord 语音频道时自动暂停或降低你的音乐音量。或者，你可以将音频轨道集成到网页应用或游戏中（例如，根据特定条件以特定音量播放胜利或失败的声音）。\n\
    \n一旦你能用代码控制某样东西，可能性就非常广泛，所以发挥你的想象力吧！\n\n你已经完成了这个教授你 Repl.it 各种细节的教程合集，现在你应该能够构建任何你能想象到的项目了。\n\
    \n如果你需要灵感，请继续阅读第 3 部分，我们将带你完成八个实用项目，更多地关注编码概念而不是 Repl.it 功能。\n\n[^85]: https://ritza.co/showcase/repl.it/building-a-discord-bot-with-python-and-repl.it.html\n\
    \n## 使用 Python 和 Repl.it 进行初学者网页抓取\n\n在本指南中，我们将逐步介绍如何自动从网站获取数据。大多数网站都是为 *人类* 受众创建的——你使用搜索引擎或在网页浏览器中输入\
    \ URL，然后在页面上看到信息。有时，我们可能想要 *自动* 提取和处理这些数据，这就是网页抓取可以将我们从繁琐的重复劳动中拯救出来的地方。我们可以创建一个自定义的计算机程序来访问网站、提取特定数据并以特定方式处理这些数据。\n\
    \n我们将从 [bbc.com](https://bbc.com/news) 新闻网站提取新闻数据，但你应该能够通过一些试验和错误来调整它，以从你想要的任何网站提取信息。\n\
    \n你可能希望使用网页抓取的原因有很多。例如，你可能需要：\n\n-   从每周发布并在线上发布的报告中提取数字\n-   在发布时获取你最喜爱运动队的时间表\n\
    -   找到你最喜爱类型即将上映电影的上映日期\n-   当网站发生变化时自动获得通知\n\n网页抓取还有许多其他用例。但是，你也应该注意，版权法和网络抓取法很复杂，并且因国家而异。只要你不是公然复制他们的内容或为商业利益进行网页抓取，人们通常不会介意网页抓取。然而，已经有一些涉及\
    \ [从 LinkedIn 抓取数据](https://techcrunch.com/2016/08/15/linkedin-sues-scrapers/)\
    \ 的法律案件，以及 [从 OKCupid 抓取数据](https://www.engadget.com/2016/05/13/scientists-release-personal-data-for-70-000-okcupid-profiles/)\
    \ 引起的媒体关注。网页抓取可能违反法律、违反特定网站的条款服务或违反道德准则——因此请谨慎应用这项技能。\n\n免责声明到此结束，让我们学习如何进行抓取！\n\
    \n## 概述与要求\n\n具体来说，在本教程中，我们将涵盖：\n\n-   网站到底是什么以及 HTML 如何工作\n-   在网页浏览器中查看 HTML\n\
    -   使用 Python 下载网页\n-   使用 BeautifulSoup 提取抓取数据的部分\n\n我们将使用在线编程环境 Repl.it，因此你不需要在本地安装任何软件即可一步一步地跟随。如果你想将本指南调整为你自己的需求，你应该通过访问\
    \ repl.it 并遵循其注册流程来创建一个免费账户。\n\n如果你对 Python 或其他高级编程语言有基本的熟悉程度，那会有帮助，但我们将详细解释我们编写的每一行代码，所以即使你不熟悉，也应该能够跟上，或者至少能够复制结果。\n\
    \n## 网页：美丽与野兽\n\n你以前无疑使用网页浏览器访问过网页。网站以两种形式存在：\n\n1.  你习惯的那一种，你可以看到文本、图像和其他媒体。使用不同的字体、大小和颜色以一种有用的（通常是）美观的方式显示信息。\n\
    \n2.  网页的“源代码”。这是告诉你的网页浏览器（例如 Mozilla Firefox 或 Google Chrome）显示什么以及如何显示它的计算机代码。\n\
    \n网站是通过三种计算机语言的组合创建的：HTML、CSS 和 JavaScript。这本身就是一个庞大而复杂的领域，有着混乱的历史，但对其中一些工作原理有基本的了解对于有效自动化网页抓取是必要的。如果你在浏览器中打开任何网站并在页面上右键单击，你会看到一个菜单，其中应该包括一个“查看页面源代码”的选项——用于检查网站的代码形式，在你的网页浏览器解释之前。\n\
