- img_proc: true
  md: '![](img/48efb5586f6da072fc1456bee6971293_244_0.png)


    Image: 1 A visualised decision tree


    The above shows a decision tree that only learned two rules. The first rule (top
    square) is about the word “hate”. The rule is “is the number of times ‘hate’ occurs
    in this sentence less than or equal to 0.5”. None of our sentences contain duplicate
    words, so each rule will really be only about whether the word appears or not
    (you can think of the <= 0.5 rules as < 1 in this case).


    For each question in our training dataset, we can ask if the first rule is True
    or False. If the rule is True for a given sentence, we’ll move that sentence down
    the tree **left**. If not, we’ll go **right**.


    Once we’ve asked this first question for each sentence in our dataset, we’ll have
    three sentences for which the answer is “False”, because three of our training
    sentences contain the word “hate”. These three sentences go right in the decision
    tree and end up at first leaf node (an end node with no arrows coming out the
    bottom). This leaf node has value = [3,0] in it, which means that three samples
    reach this node, and three belong to the negative class and zero to the positive
    class.


    For each sentence where the first rule is “True” (the word “hate” appears less
    than 0.5 times, or in our case 0 times), we go down the left of the tree, to the
    node where value = [2,5]. This isn’t a leaf node (it has more arrows coming out
    the bottom), so we’re not done yet. At this point we have two negative sentences
    and all five positive sentences still.'
  merge: -1
  pgno: 244
- img_proc: true
  md: "The next rule is “bad <= 0.5”. In the same way as before, we’ll go down the\
    \ right path if we have more than 0.5 occurrences of “bad” and left if we have\
    \ fewer than 0.5 occurrences of “bad”. For the last two negative sentences that\
    \ we are still evaluating (the two containing “bad”), we’ll go *right* and end\
    \ up at the node with value=[2,0]. This is another leaf node and when we get here\
    \ we have two negative sentences and zero positive ones.\n\nAll other data will\
    \ go left, and we’ll end up at [0,5], or zero negative sentences and five positive\
    \ ones.\n\nAs an exercise, take each of the test sentences (not represented in\
    \ the annotated tree above) and try to follow the set of rules for each one. If\
    \ it ends up in a bucket with more negative sentences than positive ones (either\
    \ of the right branches), it’ll be predicted as a negative sentence. If it ends\
    \ up in the left-most leaf node, it’ll be predicted as a positive sentence.\n\n\
    # Building a manual classifier\n\nWhen the task at hand is this simple, it’s often\
    \ easier to write a couple of rules manually rather than using Machine Learning.\
    \ For this dataset, we could have achieved the same result by writing the following\
    \ code.\n\n```\ndef manual_classify(text):\n    if \"hate\" in text:\n       \
    \ return \"negative\"\n    if \"bad\" in text:\n        return \"negative\"\n\
    \    return \"positive\"\n\npredictions = []\nfor text in test_texts:\n    prediction\
    \ = manual_classify(text)\n    predictions.append(prediction)\nprint(predictions)\n\
    ```\n\nHere we have replicated the decision tree above. For each sentence, we\
    \ check if it contains “hate” and if it does we classify it as negative. If it\
    \ doesn’t, we check if it contains “bad”, and if it does, we classify it as negative.\
    \ All other sentences are classified as positive.\n\nSo what’s the difference\
    \ between machine learning and traditional rule-based models like this one? The\
