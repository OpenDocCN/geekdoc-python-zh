    \n**Image 8: Seeing our changes reflected in our GitHub fork.**\n\nAs you can\
    \ see, the new .replit file is visible and GitHub prompts you to make a pull request\
    \ back into the original repository. Press Pull request, create pull request,\
    \ add a comment explaining why your changes should be merged into the original\
    \ repository, and click Create pull request again.\n\n## Open a pull request\n\
    \nCreate a new pull request by comparing changes across two branches. If you need\
    \ to, you can also compare across forks.\n\n![](img/48efb5586f6da072fc1456bee6971293_68_0.png)\n\
    \nThe owner of the repository will get a notification about your proposal and\
    \ can choose to add your changes or reject them (in this case, don’t be too hopeful\
    \ about your changes being accepted as the .replit file being missing is important\
    \ to follow along the earlier steps of this tutorial ☐).\n\n## Make it your own\n\
    \nFor this tutorial, it’s important that you do the steps yourself so that everything\
