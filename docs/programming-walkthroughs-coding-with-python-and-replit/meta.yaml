    \ndef _quicksort(xs, start, end):\n    if start >= end:\n        return\n    p\
    \ = partition(xs, start, end)\n    _quicksort(xs, start, p-1)\n    _quicksort(xs,\
    \ p+1, end)\n\ndef quicksort(xs):\n    _quicksort(xs, 0, len(xs)-1)\n\n```\n\n\
    # # The Partition algorithm\n\nThe idea behind the partition algorithm seems intuitive,\
    \ but the actual algorithm to do it efficiently is pretty counter-intuitive.\n\
    \nLet's start with the easy part – the idea. We have a list of numbers that isn't\
    \ sorted. We pick a point in this list, and make sure that all larger numbers\
