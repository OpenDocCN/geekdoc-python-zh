    It looks like the computer got every example right! It’s not a difficult problem
    to solve. The words “bad” and “hate” appear only in the negative texts and the
    words “good” and “love”, only in the positive ones. Other words like “they”, “mary”,
    “you” and “we” appear in both good and bad texts. If our model did well, it will
    have learned to ignore the words that appear in both kinds of texts, and focus
    on “good”, “bad”, “love” and “hate”.


    Decision Trees are not the most powerful machine learning model, but they have
    one advantage over most other algorithms: after we have trained them, we can look
    inside and see exactly how they work. More advanced models like deep neural networks
    are nearly impossible to make sense of after training.


    The Scikit-learn tree module contains a useful function to assist in visualising
    trees. Add the following code to the end of your Repl:


    ```

