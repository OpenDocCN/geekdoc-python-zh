    # # Vim and Emacs key bindings


    Once you get hooked on keyboard shortcuts, you might wonder if you ever need to
    use your mouse again. Most of the time it only slows you down. Luckily, people
    thought of this decades ago. Before mice existed, all text editing was done using
    only a keyboard, and many developers still prefer editors that were created in
    this setting over more modern ones.


    The two main keyboard-focused text editors are called Vim<sup>71</sup> and Emacs<sup>72</sup>.
    They both have steep learning curves (and there’s a long-standing tradition that
    users of either fiercely argue about which is superior), but once you’ve put in
    the time to master them you can get rid of your mouse for good.


    If you’ve gotten used to either, you can emulate the experience in Repl.it by
    switching your keybinds. Go to the “Settings” tab and scroll down to where you
    can toggle between “default”, “emacs” and “vim”.


    <sup>71</sup>https://www.vim.org/

    <sup>72</sup>https://www.gnu.org/software/emacs/'
