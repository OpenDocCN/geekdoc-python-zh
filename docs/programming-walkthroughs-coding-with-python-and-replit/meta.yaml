  md: "# # Playing individual tones\n\nInstead of playing audio from files, you can\
    \ also play specific tones or notes with the `play_tone()` method. This method\
    \ takes three arguments:\n\n+   - duration: how long the tone should play for\n\
    - pitch: the frequency of the tone (how high or low it sounds)\n- wave form: the\
    \ fundamental wave form<sup>81</sup> that the tone is built on.\n\nIf you’ve ever\
    \ played a musical instrument, you’ll probably have come across notes referred\
    \ to by the letters A-G. With digital audio, you’ll specify the pitch in hertz\
    \ (Hz). “Middle C” on a piano is usually 262 Hz and the A above this is 440 Hz.\n\
    \nLet’s write a program to play “Twinkle Twinkle Little Star”. Create a new Python\
    \ repl and add the following code to main.py.\n\n```\npython\nimport time\nfrom\
    \ replit import audio\n\ndef play_note(note, duration):\n    note_to_freq = {\n\
    \        \"C\": 262, \"D\": 294, \"E\": 330, \"F\": 349, \"G\": 392, \"A\": 440\n\
    \    }\n    audio.play_tone(duration, note_to_freq[note], 0)\n    time.sleep(duration)\n\
    \nplay_note(\"C\", 2)\n\n```\n\nAbove we set up a convenience function to play\
    \ specific notes for a specific duration. It includes a dictionary mapping the\
    \ names of notes to their frequencies. We’ve only done one octave and no sharps\
    \ or flats, but you can easily extend this to add the other notes.\n\nIt then\
    \ plays the tone of the note passed in for the specified duration. We sleep for\
    \ that duration too, as otherwise the next note will be played before the previous\
    \ note is finished. We also pass a 0 to `play_tone` which specifies the default\
    \ sine waveform. You can change it to 1, 2, or 3 for triangle, saw, or square,\
    \ which you can read about in more detail<sup>82</sup>.\n\nTest that you can play\
    \ a single note as expected. Now you can play the first part of “Twinkle Twinkle\
    \ Little Star” by defining all of the notes and durations, and then looping through\
    \ them, calling play_note on each in turn."
  merge: -1
  pgno: 134
- img_proc: true
  md: "```\nnotes = [\"C\", \"C\", \"G\", \"G\", \"A\", \"A\", \"G\", \"F\", \"F\"\
    , \"E\", \"E\", \"D\", \"D\", \"C\"]\ndurations = [2, 2, 2, 2, 2, 2, 4, 2, 2,\
    \ 2, 2, 2, 2, 4]\n\nfor i in range(len(notes)):\n    play_note(notes[i], durations[i])\n\
    ```\n\nWe can also control the volume of each tone by passing a volume argument\
    \ to play_tone(). As for audio files, this is a float where 1 represents 100%\
    \ volume. If we wanted to implement a decrescendo (gradual decrease in volume),\
    \ we could modify our code to look as follows:\n\n```\ndef play_note(note, duration,\
    \ volume=1):\n    note_to_freq = {\n        \"C\": 262, \"D\": 294, \"E\": 330,\
    \ \"F\": 349, \"G\": 392, \"A\": 440\n    }\n    audio.play_tone(duration, note_to_freq[note],\
    \ 0, volume=volume)\n    time.sleep(duration)\n\n\nnotes = [\"C\", \"C\", \"G\"\
    , \"G\", \"A\", \"A\", \"G\", \"F\", \"F\", \"E\", \"E\", \"D\", \"D\", \"C\"\
    ]\ndurations = [2, 2, 2, 2, 2, 2, 4, 2, 2, 2, 2, 2, 2, 4]\n\nvolume = 1\nfor i\
    \ in range(len(notes)):\n    volume -= 0.05\n    play_note(notes[i], durations[i],\
    \ volume=volume)\n```\n\nHere we added a volume argument to our play_note() function\
    \ so that we can pass it along to play_tone(). Each time around the loop we reduce\
    \ the volume by 5%. Play it again and you should hear the song slowly fade out\
    \ (if you add more than 20 notes, the volume will hit 0 so you'll have to reduce\
    \ the step or increase the volume at some point to stop the song going silent).\n\
    \n# Make it your own\n\nIf you followed along you'll have your own version to\
