    # Using environment variables in our script


    Our API key is now securely defined and available to the project, but we still
    need to tell our code where to find it. Because this data is stored in environment
    variables, we need to use the operating system (os) module to access it.


    At the top of your main.py file, add an import for os and load the API_KEY into
    a variable as follows.


    ```

    python

    import requests

    import os


    API_KEY = os.getenv("API_KEY")

    ```


    The getenv function looks for an environment variable of a specific name. Now
    our code (and anyone who sees it) only needs to know the name of the key that
    stores our private API key, instead of the API key itself. You should be able
    to run your code again at this point to verify that new weather entries are correctly
    added to the relevant files.


