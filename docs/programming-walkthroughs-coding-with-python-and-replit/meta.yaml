  md: 'We won’t go over this in detail as it’s not central to our bot, but here we
    start a web server that will return “I’m alive” if anyone visits it.


    In our `index.js` file, we need to add a require statement for this server at
    the top. Add the following line near the top of `index.js`.


    ```

    const keep_alive = require(''./keep_alive.js'')

    ```


    After doing this and hitting the green “Run” button again, you should see some
    changes to your Repl. For one, you’ll see a new pane in the top right which shows
    the web output from your server. We can see that visiting our Repl now returns
    a basic web page showing the “I’m alive” string that we told our web server to
    return by default.


    ![](img/48efb5586f6da072fc1456bee6971293_194_0.png)


    Now your bot will stay alive even after closing your browser or shutting down
    your development machine. Repl will still clean up your server and kill your bot
    after about one hour of inactivity, so if you don’t use your bot for a while,
    you’ll have to log into Repl and start the bot up again. Alternatively, you can
    set up a third-party (free!) service like [Uptime Robot](https://uptimerobot.com/).
    Uptime Robot pings your site every 5 minutes to make sure it’s still working –
    usually to notify you of unexpected downtime, but in this case the constant pings
    have the side effect of keeping our Repl alive as it will never go more than an
    hour without receiving any activity. Note that you need to select the HTTP option
    instead of the Ping option when setting up Uptime Robot, as Repl.it requires regular
    HTTP requests to keep your chatbot alive.


    139 https://uptimerobot.com/'
