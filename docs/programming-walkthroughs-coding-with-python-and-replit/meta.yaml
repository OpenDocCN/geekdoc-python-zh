    \n## Make it your own\n\nIf you followed along, you’ll already have your own version\
    \ of the repl to extend. If not, start from ours. Fork it [https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting](https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting)\n\
    \n## Where next?\n\nYou’ve learned how to make some basic plots using Python and\
