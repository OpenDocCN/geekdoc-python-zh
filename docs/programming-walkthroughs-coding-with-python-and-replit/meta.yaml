    \n# 构建手动分类器\n\n当手头的任务如此简单时，手动编写几条规则通常比使用机器学习更容易。对于这个数据集，我们可以通过编写以下代码来达到相同的结果。\n\
    \n```\ndef manual_classify(text):\n    if \"hate\" in text:\n        return \"\
    negative\"\n    if \"bad\" in text:\n        return \"negative\"\n    return \"\
    positive\"\n\npredictions = []\nfor text in test_texts:\n    prediction = manual_classify(text)\n\
    \    predictions.append(prediction)\nprint(predictions)\n```\n\n这里我们复制了上面的决策树。对于每个句子，我们检查它是否包含“hate”，如果包含，我们将其分类为负面。如果不包含，我们检查它是否包含“bad”，如果包含，我们将其分类为负面。所有其他句子都被分类为正面。\n\
    那么机器学习和像这样的传统基于规则的模型有什么区别呢？直接学习规则的主要优势在于，随着数据集的增长，它并不会变得更困难。我们的数据集极其简单，但现实世界的数据集可能需要成千上万甚至数百万条规则，虽然我们可以“手工”编写更复杂的\
    \ if 语句集合，但如果我们能教会机器自己学习这些规则，那就容易多了。\n\n此外，一旦我们完善了一组手动规则，它们仍然只适用于单个数据集。但一旦我们完善了一个机器学习模型，我们可以通过简单地改变输入数据将其用于许多任务！\n\
