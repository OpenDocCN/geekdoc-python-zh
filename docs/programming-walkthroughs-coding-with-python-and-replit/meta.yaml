    \ the right and all smaller items to the left.\n\nOnce the pivot is done, we can\
    \ do the same operation to the left and right sections of the list recursively\
    \ until the list is sorted.\n\nHere's a Python implementation of Quicksort. Have\
    \ a read through it and see if it makes sense. If not, read on below!\n\n```python\n\
    def partition(xs, start, end):\n    follower = leader = start\n    while leader\
    \ < end:\n        if xs[leader] <= xs[end]:\n            xs[follower], xs[leader]\
    \ = xs[leader], xs[follower]\n            follower += 1\n        leader += 1\n\
