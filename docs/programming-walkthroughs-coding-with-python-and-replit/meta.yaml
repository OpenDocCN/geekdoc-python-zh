    \ a bucket with more negative sentences than positive ones (either of the right\
    \ branches), it’ll be predicted as a negative sentence. If it ends up in the left-most\
    \ leaf node, it’ll be predicted as a positive sentence.\n\n## Building a manual\
    \ classifier\n\nWhen the task at hand is this simple, it’s often easier to write\
    \ a couple of rules manually rather than using Machine Learning. For this dataset,\
    \ we could have achieved the same result by writing the following code.\n\n```\n\
    def manual_classify(text):\n    if \"hate\" in text:\n        return \"negative\"\
    \n    if \"bad\" in text:\n        return \"negative\"\n    return \"positive\"\
    \n\npredictions = []\nfor text in test_texts:\n    prediction = manual_classify(text)\n\
    \    predictions.append(prediction)\nprint(predictions)\n```\n\nHere we have replicated\
    \ the decision tree above. For each sentence, we check if it contains “hate” and\
    \ if it does we classify it as negative. If it doesn’t, we check if it contains\
