    on the link, your browser will figure out that the URL isn’t complete and prepend
    it with https://www.bbc.com. If you look around the source code of the main BBC
    page, you’ll find both relative and absolute URLs, which already makes scraping
    all of the URLs on the page more difficult.


    ![](img/48efb5586f6da072fc1456bee6971293_145_0.png)


    We could try to use Python’s built-in text search functions like `find()` or regular
    expressions to extract all of the URLs from the BBC page, yet it is not actually
    possible to do this reliably. HTML is a complex language which allows web developers
    to do many unusual things. For an amusing take on why we should avoid a “naive”
    method of looking for links, see [this very famous](https://stackoverflow.com/questions/1732348/regex-match-open-tags-except-xhtml-self-contained-tags)
    StackOverflow question and the first answer.


    Luckily, there is a powerful and simple-to-use HTML parsing library called [BeautifulSoup](https://www.crummy.com/software/BeautifulSoup/),
    which will help us extract all the links from a given piece of HTML. We can use
    it by modifying the code


    93 https://stackoverflow.com/questions/1732348/regex-match-open-tags-except-xhtml-self-contained-tags

    94 https://www.crummy.com/software/BeautifulSoup/


    in our Repl to look as follows.


    ```

    1 import requests

    2 from bs4 import BeautifulSoup

    3

    4 url = "https://bbc.com/news"

    5

    6 response = requests.get(url)

    7 html = response.text

    8

    9 soup = BeautifulSoup(html, "html.parser")

    10 links = soup.findAll("a")

    11 for link in links:

    12     print(link.get("href"))

    ```


    If you run this code, you’ll see that it outputs dozens of URLs, one per line.
    You’ll probably notice that the code now takes quite a bit longer to run than
    before – BeautifulSoup is not built into Python, it is a third-party module. This
    means that before running the code, Repl has to go and fetch this library and
    install it for you. Subsequent runs will be faster.


    ![](img/48efb5586f6da072fc1456bee6971293_146_0.png)


    The code is similar to what we had before with a few additions.


    -   In line 2, we import the BeautifulSoup library, which is used for parsing
    and processing HTML.

    - In line 9, we transform our HTML into “soup”. This is BeautifulSoup’s representation
    of a web page, which contains a bunch of useful programmatic features to search
    and modify the data in the page. We use the “html.parser” option to parse HTML
    which is included by default – BeautifulSoup also allows you specify a custom
    HTML parser here. For example, you could install and specify a faster parser which
    can be useful if you need to process a lot of HTML data.

    - In line 10, we find all the a elements in our HTML and extract them to a list.
    Remember, when we were looking at the URLs using our web browser (Image 7), we
    noted that the <a> element in HTML was used to define links, with the href attribute
    being used to specify where the link should go to. This line finds all of the
    HTML <a> elements.

    - In line 11, we loop through all of the links we have, and in line 12 we print
    out the href section.


    These last two lines show why BeautifulSoup is useful. To try and find and extract
    these elements without it would be remarkably difficult, but now we can do it
    in two lines of readable code!


    If we look at the URLs in the output pane, we’ll see quite a mixed bag of results.
    We have absolute URLs (starting with “http”) and relative ones (starting with
    “/”). Most of them go to general pages rather than specific news articles. We
    need to find a pattern in the links we’re interested in (that go to news articles)
    so that we can extract only those.


    Again, trial and error is the best way to do this. If we go to the BBC News home
    page and use developer tools to inspect the links that go to news articles, we’ll
    find that they all have a similar pattern. They are relative URLs which start
    with “/news” and end with a long number, e.g. /news/newsbeat-45705989


    We can make a small change to our code to only output URLs that match this pattern.
    Replace the last two lines of our Python code with the following four lines:


    ```

    1 for link in links:

    2     href = link.get("href")

    3     if href.startswith("/news") and href[-1].isdigit():

    4         print(href)

    ```


    Here we still loop through all of the links that BeautifulSoup found for us, but
    now we extract the href to its own variable immediately after. We then inspect
    this variable to make sure that it matches our conditions (starts with “/news”
    and ends with a digit), and only if it does, then we print it out.


    ![](img/48efb5586f6da072fc1456bee6971293_148_0.png)


    Image 9: Printing only links to news articles from BBC.


    ## Fetching all of the articles from the homepage


    Now that we have the link to every article on the BBC News homepage, we can fetch
    the data for each one of these individual articles. As a toy project, let’s extract
    the proper nouns (people, places, etc) from each article and print out the most
    common ones to get a sense on what things are being talked about today.


    Adapt your code to look as follows:


    ```

    1  import requests

    2  import string

    3

    4  from collections import Counter

    5

    6  from bs4 import BeautifulSoup

    7

    8

    9  url = "https://bbc.com/news"

    10

    11

    12  response = requests.get(url)

    13  html = response.text

    14 soup = BeautifulSoup(html, "html.parser")

    15 links = soup.findAll("a")

    16

    17 news_urls = []

    18 for link in links:

    19     href = link.get("href")

    20     if href.startswith("/news") and href[-1].isdigit():

    21         news_url = "https://bbc.com" + href

    22         news_urls.append(news_url)

    23

    24

    25 all_nouns = []

    26 for url in news_urls[:10]:

    27     print("Fetching {}".format(url))

    28     response = requests.get(url)

    29     html = response.text

    30     soup = BeautifulSoup(html, "html.parser")

    31

    32     words = soup.text.split()

    33     nouns = [word for word in words if word.isalpha() and word[0] in string.ascii_uppercase]

    34     all_nouns += nouns

    35

    36 print(Counter(all_nouns).most_common(100))

    ```


    This code is quite a bit more complicated than what we previously wrote, so don''t
    worry if you don''t understand all of it. The main changes are:


    - At the top, we add two new imports in addition to the `requests` library. The
    first new module is one for `string`, which is a standard Python module that contains
    some useful word and letter shortcuts. We''ll use it to identify all the capital
    letters in our alphabet. The second module is a `Counter`, which is part of the
    built-in `collections` module. This will let us find the most common nouns in
    a list, once we have built a list of all the nouns.

    - We''ve added `news_urls = []` at the top of the first `for` loop. Instead of
    printing out each URL once we''ve identified it as a “news URL”, we add it to
    this list so we can download each page later. Inside the for loop two lines down,
    we combine the root domain (“http://bbc.com”) with each `href` attribute and then
    add the complete URL to our `news_urls` list.

    - We then go into another for loop, where we loop through the first 10 news URLs
    (if you have more time, you can remove the `[:10]` part to iterate through all
    the news pages, but for efficiency, we''ll just demonstrate with the first 10).

    - We print out the URL that we''re fetching (as it takes a second or so to download
    each page, it''s nice to display some feedback so we can see that the program
    is working).

    - We then fetch the page and turn it into soup, as we did before.'
