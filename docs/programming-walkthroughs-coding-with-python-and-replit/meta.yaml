    \ but once we've picked\n        # a colour we always use it for all cities in\
    \ that state.\n        if state not in state_colors:\n            state_colors[state]\
    \ = random.choice(all_colors)\n        colors.append(state_colors[state])\nplt.scatter(lons,\
    \ lats, c=colors)\nplt.show()\n```\n\nIf you run this, you'll notice it takes\
