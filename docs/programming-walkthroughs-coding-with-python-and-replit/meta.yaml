  mdcn: "## 逐行解析分区算法\n\n我们定义 `partition` 函数，它接受三个参数：`xs` 是待排序的列表，`start` 是待考虑的第一个元素的索引，`end`\
    \ 是待考虑的最后一个元素的索引。\n\n我们需要定义 `start` 和 `end` 参数，因为我们并不总是对整个列表进行分区。在后续的排序算法中，我们将处理越来越小的子列表，但由于我们不想创建列表的新副本，我们将通过使用原始列表的索引来定义这些子列表。\n\
    \n在第2行，我们将两个指针——`follower`（跟随者）和 `leader`（引导者）——都初始化为列表中我们感兴趣片段的起始位置。引导者的移动速度将快于跟随者，因此我们将持续循环，直到引导者超出列表片段的末尾（`while\
    \ leader < end`）。\n\n我们可以选择任意元素作为基准元素，但为了简单起见，我们选择最后一个元素。因此在第4行，我们将 `leader` 元素与基准元素进行比较。引导者将遍历列表片段中的每一个元素，这意味着当循环结束时，我们将基准元素与列表中的每个元素都进行了比较。\n\
    \n如果 `leader` 元素小于或等于基准元素，我们需要将其向左移动，并将一个较大的元素（由 `follower` 跟踪）向右移动。我们在第4-5行执行此操作：如果发现\
    \ `leader` 小于或等于基准元素，就将其与 `follower` 交换。此时，`follower` 指向一个较小的元素（即刚才的 `leader`），因此我们将\
    \ `follower` 加一，以便跟踪下一个元素。这有一个副作用，即计算我们进行了多少次交换，这恰好记录了基准元素最终应放置的确切位置。\n\n无论是否进行了交换，我们都需要考虑下一个元素与基准元素的关系，因此在第7行，我们将\
    \ `leader` 加一。\n\n一旦跳出循环（第8行），我们需要将基准元素（仍在列表末尾）与 `follower`（每发现一个比基准小的元素就向前移动一次）进行交换。如果这仍然令人困惑，请再次查看我们的示例：\n\
    \n```\nxs = [8, 4, 2, 2, 1, 7, 10, 5]\n```\n\n在 `xs` 中，有4个元素小于基准。每次我们发现一个比基准小的元素，就将\
    \ `follower` 加一。这意味着在循环结束时，`follower` 将增加了4次，并指向原始列表中的索引4。通过观察，你可以看到这正是基准元素（5）的正确位置。\n\
    \n我们最后要做的就是返回 `follower` 索引，它现在指向基准元素在其*正确*位置。我们需要返回这个值，因为它定义了分区列表中的两个更小的子问题——我们现在需要对\
    \ `xs[0:4]`（前4个元素，构成一个未排序列表）和 `xs[5:]`（后3个元素，构成一个未排序列表）进行排序。\n\n```\npython\n\
    xs = [4, 2, 2, 1, 5, 7, 10, 8]\n```\n\n如果你想用另一种方式来直观理解其工作原理，手动推演一些示例（即用笔和纸写出一个短的随机顺序列表，并在算法的每一步写出新列表）会非常有帮助。你也可以观看[这个详细的YouTube视频](https://www.youtube.com/watch?v=MZaf_9lZCrc)，其中KC\
    \ Ang在不到5分钟内使用纸杯演示了算法的每一步！\n\n## 快速排序函数\n\n一旦我们搞定了分区算法，排序就变得简单了。我们将首先定义一个辅助函数\
    \ `_quicksort` 来处理递归，然后再实现一个更美观的公共函数。\n\n```\npython\ndef _quicksort(xs, start,\
    \ end):\n    if start >= end:\n        return\n    p = partition(xs, start, end)\n\
    \    _quicksort(xs, start, p-1)\n    _quicksort(xs, p+1, end)\n```\n\n要对一个列表进行排序，我们首先对其进行分区（第4行），然后对左子列表排序（第5行：从原始列表的起始位置到基准点），接着对右子列表排序（第6行：从基准点之后到原始列表的末尾）。我们递归地执行此操作，左子列表的\
    \ `end` 边界向左移动，靠近 `start`；右子列表的 `start` 边界向右移动，靠近 `end`。当 `start` 和 `end` 边界相遇时（第2行），我们就完成了！\n\
    \n第一次调用快速排序时，总是传入我们想要排序的整个列表，这意味着 `0` 是列表的起始位置，`len(xs)-1` 是列表的结束位置。我们不想每次从另一个程序调用快速排序时（例如，在任何不是调用自身的场景中）都必须记住传递这些额外的参数，因此我们将创建一个带有这些默认值的更美观的包装函数来启动这个过程。\n\
    \n```\npython\ndef quicksort(xs):\n    return _quicksort(xs, 0, len(xs)-1)\n```\n\
    \n现在，作为排序函数的用户，我们可以调用 `quicksort([4,5,6,2,3,9,10,2,1,5,3,100,23,42,1])`，只传入我们想要排序的列表。这将依次调用\
    \ `_quicksort` 函数，该函数会不断调用自身，直到列表排序完成。\n\n## 测试我们的算法\n\n我们可以编写一些基本的驱动代码来测试我们新实现的快速排序。创建一个新的Python\
    \ Repl，并将以下代码添加到 `main.py` 中。然后在导入语句之后插入本教程开头列出的代码。\n\n```\npython\nfrom datetime\
    \ import datetime\nimport random\n\n# 创建100000个1到1000之间的随机数\nxs = [random.randrange(1000)\
    \ for _ in range(10)]\n\n# 查看前几个和后几个\nprint(xs[:10])\n# 应用算法\nquicksort(xs)\n\
    # 查看结果\nprint(xs[:10])\n\n```\n\n如果你运行这段代码，你将看到排序后的列表。这符合我们的预期，但它没有告诉我们快速排序的效率如何——所以让我们更仔细地看看。将\
