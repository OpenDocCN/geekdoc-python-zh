- md: '## Make it your own


    If you followed along, you’ll already have your own version of the repl to extend.
    If not, start from ours. Fork it from [https://repl.it/@GarethDwyer1/cwr-07-juggling-with-pygame](https://repl.it/@GarethDwyer1/cwr-07-juggling-with-pygame)⁵⁵.


    ## Where next?


    You’ve learned how to make 2D games using PyGame. If you want to make more games
    but are stuck for ideas, check out [PyGame’s extensive collection of examples](https://www.pygame.org/docs/ref/examples.html)⁵⁶.


    You could also extend the juggling game more. For example, make the balls accelerate
    as they fall, or increase the speed of all balls over time.


    ⁵⁵ https://repl.it/@GarethDwyer1/cwr-07-juggling-with-pygame

    ⁵⁶ https://www.pygame.org/docs/ref/examples.html


    ## Staying safe: Keeping your passwords and other secrets secure


    While developing software fully in public has many benefits, it also means that
    we need to be extra careful about leaking sensitive information. Because all of
    our repls are public by default, we shouldn’t store passwords, access keys, personal
    information, or anything else sensitive in them.


    Even if you’re coding offline or only in private repls, it’s good practice to
    keep your code separate from any private information in any case.


    In this tutorial, we’ll look at how to use the special .env file that Repl.it
    provides to set [environment variables](https://en.wikipedia.org/wiki/Environment_variable).
    We can use these to store sensitive information and Repl.it will make sure that
    this file isn’t included when others fork our repl.


    ## Understanding .env files


    Similarly to the .replit file that we saw in a previous tutorial, the .env file
    is a special Repl.it file. If you call a file exactly .env, Repl.it will


    - Not include this file in any forks of the repl

    - Attempt to parse key-value pairs out of this file and make them available to
    the underlying operating system.


    This can be used to store all kinds of configuration, but it’s commonly used for
    passwords, API keys, and database credentials.


    ## The structure of a .env file


    A .env file consists of keys-value pairs, one per line, separated by an = sign.
    Environment variables are traditionally in ALL_CAPS and separated by underscores.
    For example, you might have a .env file with the following.


    ```

    SECRET_PASSWORD=ThisIsMySuperSecretP@ssword!!

    ```


    With this file present, your scripts can load the variable SECRET_PASSWORD from
    the operating system environment directly.


    Unlike in Python, where x = 1 and x= 1 are the same, in .env files, spaces matter
    and you should be careful to not add any extra ones.


    ## Refactoring our weather project to keep our API key secure


    In the working with files tutorial⁵⁸ we used the WeatherStack API to fetch weather
    data and save it to disk. Part of this involved getting an API key from WeatherStack.
    Because WeatherStack limits the number of calls each key can make per day, it
    would be bad if someone else used up the quota for our key and broke our app as
    a result.


    Let''s refactor the WeatherStack project to prevent our key from being made public.


    Visit https://repl.it/@GarethDwyer1/cwr-02-weather-report⁵⁹ (or your own version
    of this if you followed along previously) and create a new fork by pressing the
    pencil icon and then fork.


    ![Image 1: Forking our repl before refactoring it.](img/48efb5586f6da072fc1456bee6971293_84_0.png)


    We have API_KEY defined near the top of main.py, and this is the value that we
    want to keep secret. Let''s move it to a .env file instead.


    Click on the add file icon and call your new file .env. Be sure to add the initial
    full stop and don''t add any spaces.


    ⁵⁸http://www.codewithrepl.it/02-managing-files-using-repl-it.html

    ⁵⁹https://repl.it/@GarethDwyer1/cwr-02-weather-report


    ![Image 2: Creating the .env file to store sensitive information.](img/48efb5586f6da072fc1456bee6971293_85_0.png)


    Now remove the API_KEY variable from the main.py file and add it to the .env file,
    removing all quotation marks (") and spaces.


    Your .env file should look as follows (but use your own WeatherStack API instead
    of the example given here).


    ```

    API_KEY=baaf201731c0cbc4af2c519cb578f907

    ```


    ## Testing that the file is not copied into others’ forks


    If you copy your project’s URL into an incognito window (or use a separate browser),
    you’ll see all of the other files as usual, but the .env file will not be there.
    Your API key, and the entire .env file, can only be seen when you’re logged into
    the Repl.it account that created it.


    ![Image 3](img/48efb5586f6da072fc1456bee6971293_86_0.png)


    ## Using environment variables in our script


    Our API key is now securely defined and available to the project, but we still
    need to tell our code where to find it. Because this data is stored in environment
    variables, we need to use the operating system (os) module to access it.


    At the top of your main.py file, add an import for os and load the API_KEY into
    a variable as follows.


    ```python

    import requests

    import os


    API_KEY = os.getenv("API_KEY")

    ```


    The getenv function looks for an environment variable of a specific name. Now
    our code (and anyone who sees it) only needs to know the name of the key that
    stores our private API key, instead of the API key itself. You should be able
    to run your code again at this point to verify that new weather entries are correctly
    added to the relevant files.


    There are many other environment variables that make various parts of an operating
    system work correctly. For example, you could also take a look at the LANG and
    PATH environment variables, which will show you that Repl.it has their servers
    configured to use US English and 8-bit unicode character encoding, and have some
    default places where the system looks for executable programs.


    ## Time travelling to find secrets


    We removed the sensitive information from our project, but it''s not actually
    completely gone. It''s securely placed in our .env file, but it''s also still
    saved in the repl''s history.


    Repl.it saves every change you make to a project so that you can always go back
    to previous versions if you make a mistake or need to check what has changed.


    Click on the history button in the top bar, as shown below.


    ![Image 4](img/48efb5586f6da072fc1456bee6971293_87_1.png)


    You should see a bunch of entries from each change you''ve made to this project.
    Click through them and find the one where you deleted your API key. As you can
    see, the history viewer shows not only which lines have been changed, but also
    what was there before.


    ---


