    \ `move()` 函数被调用之前记住它的定义）。\n\n你无需剪切和粘贴一个代码块，只需按下 `Alt+↑` 或 `Alt+↓`（Mac上为 `option+↑`\
    \ 和 `option+↓`）即可将其移动。与其他操作一样，这对光标下的行或更大的选区都有效。\n\n## 添加光标\n\n有时在多个地方同时进行完全相同的修改非常有用。例如，我们可能想将\
    \ `speed` 属性重命名为 `velocity`。将光标放在你想更改的单词的任意位置，然后按下 Ctrl+D（Mac上为 cmd+D）。重复按下 Ctrl+D\
    \ 可以逐个选择匹配的单词，每个选中项都有自己的光标。现在你可以进行编辑，更改将出现在每个选中项处，如下所示。\n\n如果你想在连续的多行上添加多个光标，可以按下\
    \ Ctrl+Alt+↑ 或 Ctrl+Alt+↓（Mac上为 cmd+option+↑ 和 cmd+option+↓）。例如，如果我们想要一个正方形的游戏窗口，可以同时将宽度和高度都更改为1000，如下所示。\n\
    \n图 10：*在多行上添加光标。*\n\n## 导航到特定代码\n\n有时，尤其是在较大的项目中，你可能会在一个远离函数或对象定义的地方调用一个函数或实例化一个对象（可能在同一文件中相隔数千行，或者在完全不同的文件中）。\n\
    \n如果你正在阅读一段调用某个函数的代码，并且想快速查看该函数的实际作用，可以使用**跳转到定义**快捷键（F12 或 Mac上的 cmd+F12）。这将跳转到所选函数或类的定义处。**速览定义**具有类似功能，但它不是跳转到定义，而是在一个单独的模态窗口中打开定义。例如，下面光标位于\
    \ `Ball()` 的实例化处，我们可以快速查看该类的定义。\n\n```python\ndef move(self):\n    self.rect =\
    \ self.rect.move(self.speed)\n\ndef main():\n    clock = pygame.time.Clock()\n\
    \    ball = Ball()\n    pygame.init()\n    screen = pygame.display.set_mode((WIDTH,\
    \ HEIGHT))\n\nclass Ball:\n    def __init__(self):\n        self.image = pygame.image.load(\"\
    small_tennis.png\")\n        self.speed = [random.uniform(-4, 4), 2]\n       \
    \ self.rect = self.image.get_rect()\n\n    def update(self):\n        if self.rect.top\
    \ < 0:\n            self.speed[1] = -self.speed[1]\n            self.speed[0]\
    \ = random.uniform(-4, 4)\n        elif self.rect.left < 0 or self.rect.right\
    \ > WIDTH:\n            self.speed[0] = -self.speed[0]\n            self.move()\n\
    ```\n\n图 11：速览定义。\n\n**跳转到行**操作（Ctrl+G）允许你通过输入行号导航到特定行。这对于追踪那些告诉你某行出了问题的错误消息来源很有用，或者当与某人通话时，对方说“我在看第23行”，你可以快速跳转到同一位置。\n\
    \n最后，你可以通过按下 Ctrl+P（Mac上为 cmd+P）并搜索文件名的一部分来打开特定文件，如果你有很多文件，这比滚动文件面板更快。\n\n## Vim\
    \ 和 Emacs 键绑定\n\n一旦你迷上了键盘快捷键，你可能会想是否还需要再用鼠标。大多数情况下，鼠标只会拖慢你的速度。幸运的是，人们在几十年前就想到了这一点。在鼠标出现之前，所有的文本编辑都只使用键盘完成，许多开发者至今仍偏爱在这种环境下创建的编辑器，而不是更现代的编辑器。\n\
    \n两种主要的、以键盘为中心的文本编辑器被称为 Vim<sup>71</sup> 和 Emacs<sup>72</sup>。它们都有陡峭的学习曲线（并且存在一个由来已久的传统：两者的用户会激烈争论哪个更好），但一旦你投入时间掌握了它们，你就可以彻底摆脱鼠标。\n\
    \n如果你已经习惯了其中一种，可以通过切换 Repl.it 的键绑定来模拟这种体验。转到“Settings”标签页，向下滚动到可以在“default”、“emacs”和“vim”之间切换的位置。\n\
    \n<sup>71</sup>https://www.vim.org/\n<sup>72</sup>https://www.gnu.org/software/emacs/"
