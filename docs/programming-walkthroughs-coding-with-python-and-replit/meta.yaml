    \    def update(self):\n        self.move()\n\n    def move(self):\n        self.rect\
    \ = self.rect.move(self.speed)\n```\n\n现在修改你的游戏循环，包含对新 `update()` 方法的调用。循环应如下所示。\n\
    \n```python\nwhile True:\n    screen.fill(BACKGROUND)\n    screen.blit(ball.image,\
    \ ball.rect)\n    ball.update()\n    pygame.display.flip()\n    clock.tick(60)\n\
    ```\n\n元组 `(0, 1)` 会导致球在每个循环中将其 Y 坐标移动 1，同时保持 X 坐标不变。这会产生使球在屏幕上缓慢下落的效果。再次运行你的代码以检查是否有效。\n\
    \n点击打开 gif<sup>52</sup>\n\n当球到达屏幕底部时，它会继续下落，但现在这没问题。让我们看看如何添加点击检测。\n\n<sup>52</sup>https://i.ritzastatic.com/repl/codewithrepl/07-pygame/07-05-GIF-falling-ball.gif\n\
    \n## 处理事件：检测鼠标点击\n\nPyGame 记录所有“事件”，包括鼠标点击，并通过 `pygame.event.get()` 提供这些事件。我们需要在每个游戏循环中检查发生了什么事件，并查看其中是否有重要的事件。\n\
    \n如果用户点击空白处，这仍然会被记录，但我们只需忽略它。如果用户点击一个正在下落的球，我们希望它改变方向。\n\n为此，在现有的 `while` 循环内添加一个\
    \ `for` 循环。整个游戏循环应如下所示：\n\n```python\nwhile True:\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.MOUSEBUTTONDOWN:\n            if ball.rect.collidepoint(pygame.mouse.get_pos()):\n\
    \                ball.speed = [0, -1]\n    screen.fill(BACKGROUND)\n    screen.blit(ball.image,\
    \ ball.rect)\n    ball.update()\n    pygame.display.flip()\n    clock.tick(60)\n\
    ```\n\n使用这段代码，我们遍历所有事件并检查左键单击（`MOUSEBUTTONDOWN`）事件。如果找到一个，我们检查点击是否发生在球上（使用 `collidepoint()`\
    \ 检查坐标重叠），在这种情况下我们反转球的方向（仍然没有 X 轴或水平运动，但让球在 Y 轴上负向移动，即向上）。\n\n如果你再次运行这段代码，你现在应该能够点击球（让它先下落一会儿），并看到它改变方向，直到它飞出屏幕顶部。\n\
    \n## 让球从边缘反弹并随机移动\n\n为了模拟杂耍，我们希望球从“屋顶”（屏幕顶部边缘）和“墙壁”（左右边缘）反弹。如果球接触到“地板”（底部边缘），我们希望将其销毁并作为掉落的球从游戏中移除。\n\
    \n为此，我们将向 `update()` 方法添加逻辑（这就是为什么我们之前将其与 `move()` 方法分开）。向 `update()` 添加两行代码，使其如下所示。\n\
