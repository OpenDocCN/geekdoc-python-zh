    \n```\nDISCORD_BOT_SECRET=NDcUN5T32zcTjMYOM0Y1MTUy.Dk7JBw.ihrTSAO1GKHZSonqvuhtwta16WU\n\
    ```\n\n你需要：\n\n-   将令牌（在等号之后）替换为 Discord 在你创建自己的机器人时给你的令牌。\n-   注意**空格**。与 Python\
    \ 不同，如果你在 `.env` 文件中的等号两侧添加了空格，这些空格将成为变量名或值的一部分，因此请确保等号周围或行尾没有任何空格。\n-   再次运行代码。有时你需要刷新整个页面，以确保环境变量成功加载。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_175_0.png)\n\n让我们创建一个能重复我们说的所有话但以反转形式输出的\
    \ Discord 机器人。我们只需几行代码就能实现。在你的 `main.py` 文件中，添加以下内容：\n\n```python\nimport discord\n\
    import os\n\nclient = discord.Client()\n\n@client.event\nasync def on_ready():\n\
    \    print(\"I'm in\")\n    print(client.user)\n\n@client.event\nasync def on_message(message):\n\
    \    if message.author != client.user:\n        await message.channel.send(message.content[::-1])\n\
    \ntoken = os.environ.get(\"DISCORD_BOT_SECRET\")\nclient.run(token)\n```\n\n让我们逐行分析它的功能。\n\
    \n-   **第1-2行**导入我们之前安装的 discord 库和内置的操作系统库，后者将用于访问机器人的机密令牌。\n-   在**第4行**，我们创建了一个\
    \ Discord Client。这是一个 Python 对象，我们将用它向 Discord 服务器发送各种命令。\n-   在**第6行**，我们为客户端定义了一个事件。这行是一个\
    \ Python 装饰器，它会修改其下方的函数。Discord 机器人将*异步*运行，如果你习惯于运行标准 Python，这可能会有点令人困惑。我们不会在此深入讨论\
    \ Python 异步编程，但如果你对此以及为何使用它感兴趣，在 [FreeCodeCamp](https://medium.freecodecamp.org/a-guide-to-asynchronous-programming-in-python-with-asyncio-232e2afa44f6)\
    \ 上有一篇很好的指南。简而言之，我们将不会按照从上到下的顺序运行文件中的代码，而是将运行代码片段以响应特定事件。\n-   **第7-9行**类似，但不是响应\
    \ `on_ready` 事件，而是告诉我们的机器人如何处理新消息。**第13行**表明我们只想响应不是来自我们自己的消息（否则我们的机器人会不断响应自己——你可以删除这一行看看为什么这是个问题），**第14行**表示我们将向收到消息的同一个频道（`message.channel`）发送一条新消息，发送的内容将是我们收到的消息，但是反转的（`message.content[::-1]`\
    \ - `[::-1]` 是一个稍显特殊但很有用的 Python 惯用法，用于反转字符串或列表）。\n\n最后两行从我们之前设置的环境变量中获取机密令牌，然后告诉我们的机器人启动。\n\
    \n再次点击大的绿色“Run”按钮，你应该会在 Repl 的输出中看到你的机器人报告成功加入频道。\n\n![](img/48efb5586f6da072fc1456bee6971293_176_0.png)\n\
    \n打开 Discord，从我们在前面创建的服务器内，从屏幕右侧的面板中选择你的 ReplBotApplication。\n\n使用 Python 和 Repl.it\
    \ 构建 Discord 机器人\n\n171\n\n![](img/img-48efb5586f6da072fc1456bee6971293_177_0.png)\n\
    \n图:10 *Repl 机器人已激活*\n\n选择此机器人后，你就可以发送消息（在下面高亮显示的框中输入）并看到你的机器人作出回应！\n\n![](img/48efb5586f6da072fc1456bee6971293_178_0.png)\n\
    \n机器人每次都做出回应，将我们输入的文本反转。\n\n![](img/48efb5586f6da072fc1456bee6971293_179_0.png)\n\
    \n图:12 **我们的机器人会说话了！**\n\n## 保持我们的机器人在线\n\n你的机器人现在可以响应消息了，但仅限于你的 Repl 运行期间。如果你关闭浏览器标签页或关掉电脑，你的机器人将停止运行，不再响应\
    \ Discord 上的消息。\n\nRepl.it 只会在你运行了一个 Web 服务器的情况下，在你关闭浏览器标签页后继续运行你的代码。由于我们使用的是\
    \ Python discord.py 库，我们的机器人不需要显式的 Web 服务器，但我们可以在一个单独的线程中创建一个服务器并运行它，以保持 Repl\
    \ 的活跃状态。我们将使用 Flask[^122] 框架来实现这一点。\n\n在你的项目中创建一个新文件 `keep_alive.py`，并添加以下代码：\n\
    \n[^122]: http://flask.pocoo.org/\n\n```python\nfrom flask import Flask\nfrom\
    \ threading import Thread\n\napp = Flask('')\n\n@app.route('/')\ndef home():\n\
    \    return \"I'm alive\"\n\ndef run():\n    app.run(host='0.0.0.0', port=8080)\n\
    \ndef keep_alive():\n    t = Thread(target=run)\n    t.start()\n```\n\n我们不会详细解释这部分内容，因为它不是我们机器人的核心，但这里我们启动了一个\
    \ Web 服务器，当有人访问它时会返回 \"I'm alive\"，并且我们会提供一个在新线程中启动它的方法（让主线程留给我们的 Repl 机器人）。\n\
    \n在我们的 `main.py` 文件中，我们需要在顶部导入这个服务器。在 `main.py` 的顶部附近添加以下行：\n\n```python\nfrom\
    \ keep_alive import keep_alive\n```\n\n在 `main.py` 中，我们需要在启动机器人之前启动 Web 服务器。在\
    \ `main.py` 中，紧接在 `token = os.environ.get(\"DISCORD_BOT_SECRET\")` 这行之前，添加这三行：\n\
    \n```python\nkeep_alive()\ntoken = os.environ.get(\"DISCORD_BOT_SECRET\")\nclient.run(token)\n\
    ```\n\n完成此操作并再次点击绿色的“Run”按钮后，你应该会看到 Repl 的一些变化。首先，你将在右上角看到一个新的面板，显示来自你服务器的 Web\
    \ 输出。我们可以看到，现在访问我们的 Repl 会返回一个基本的网页，显示我们告诉 Web 服务器默认返回的 \"I'm alive\" 字符串。在右下角的面板中，你还可以看到\
    \ Flask 启动并持续运行、监听请求产生的一些额外输出。\n\n![](img/48efb5586f6da072fc1456bee6971293_181_0.png)\n\
    \n现在，即使在关闭浏览器或关闭开发机器后，你的机器人也将保持在线状态。Repl 仍会在大约一小时的不活动后清理你的服务器并终止你的机器人，因此如果你有一段时间不使用机器人，就需要登录\
    \ Repl 并重新启动它。或者，你可以设置一个第三方（免费的！）服务，如 [Uptime Robot](https://uptimerobot.com/)¹²³。Uptime\
    \ Robot 每5分钟对你的站点进行一次 ping 检查，以确保其正常工作——通常是为了在意外停机时通知你，但在这种情况下，持续的 ping 有一个副作用，即保持我们的\
    \ Repl 处于活跃状态，因为它永远不会超过一小时没有任何活动。\n\n## Fork 与扩展我们的基础机器人\n\n这个机器人目前用处不大，但从现在开始，其可能性只受你的创造力所限！你可以让你的机器人接收用户输入，处理输入，并以你选择的任何方式回应。事实上，利用我们已经展示的基础输入和输出，我们已经拥有了任何现代计算机的大部分组件，所有这些都基于[冯·诺依曼架构](https://en.wikipedia.org/wiki/Von_Neumann_architecture)¹²⁴（我们可以轻松地通过让机器人写入文件来添加缺失的存储器，或者稍微费点劲连接一个\
    \ [SQLite 数据库](https://www.sqlite.org/index.html)¹²⁵ 来实现持久化存储）。\n\n如果你跟着这个教程一起做了，你将拥有自己的基础\
    \ Repl 机器人可以玩和扩展。如果你只是阅读，你可以轻松地在 [https://repl.it/@GarethDwyer1/discord-bot](https://repl.it/@GarethDwyer1/discord-bot)¹²⁶\
    \ Fork 这个机器人，并按你想要的方式扩展它（你需要添加你自己的令牌并重新创建 `.env` 文件）。\n\n¹²³ https://uptimerobot.com/\n\
    ¹²⁴ https://en.wikipedia.org/wiki/Von_Neumann_architecture\n¹²⁵ https://www.sqlite.org/index.html\n\
    ¹²⁶ https://repl.it/@GarethDwyer1/discord-bot"
