  md: '![](img/48efb5586f6da072fc1456bee6971293_29_0.png)


    If you run the script multiple times, each file will still only contain one line
    of data: that from the most recent run. This is because when we open a file with
    in "write" mode ("w"), it overwrites it with the new data. Because we want to
    create historical weather logs, we need to change the second last line to use
    "append" mode instead ("a").


    Change


    ```

    with open(f"{city}.txt", "w") as f:

    ```


    to


    ```

    with open(f"{city}.txt", "a") as f:

    ```


    and run the script again. If you open one of the city files again, you’ll see
    it has a new line instead of the old data being overwritten. Newer data is appended
    to the end of the file. WeatherStack only updates its data every 5 minutes or
    so, so you might see exact duplicate lines if you run the script multiple times
    in quick succession.


    ![](img/48efb5586f6da072fc1456bee6971293_29_1.png)


