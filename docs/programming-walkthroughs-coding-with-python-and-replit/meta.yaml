  md: "```\n1 from replit import audio\n2 import time\n3 \n4 audio.play_file(\"o_fortuna.mp3\"\
    )\n5 time.sleep(10)\n```\n\nNote that your repl usually dies the moment there\
    \ is no more code to execute, and playing audio doesn’t keep it alive. For now,\
    \ we are sleeping for 10 seconds which keeps the repl alive and the audio playing.\
    \ If you run this, you should hear the first 10 seconds of the track before it\
    \ cuts out.\nIt’s not ideal to keep the execution loop locked up in a sleep()\
    \ call as we can’t interact with our program so we can’t control the playback\
    \ in any way.\nTo keep the music playing until the user presses a key, change\
    \ the last line to:\n\n```\n1 choice = input(\"Press enter to stop the music.\
    \ \")\n```\n\nNow the program is blocked waiting for user input and the music\
    \ will keep playing until the user enters something.\nLet’s add some more useful\
    \ controls.\n\n# Allowing the user to pause, change volume, or get information\
    \ about the currently playing track\n\nThe controls we add next are based around:\n\
    \n+   - source.volume: an attribute that we can add to or subtract from to increase\
    \ or decrease the volume\n- source.paused: an attribute we can change to True\
    \ or False to pause or unpause the track\n- source.set_loop(): a method we can\
    \ call to specify how many times a track should loop before ending\n\nWe can also\
    \ display useful information about the current status of our media player by looking\
    \ at:\n\n+   - source.loops_remaining: an attribute to see how many more time\
    \ a track will loop\n- source.get_remaining(): a method to see the remaining playtime\
    \ for the current track.\n\nWe’ll allow the user to see the current information\
    \ but for simplicity we’ll only update this on each input, so our display will\
    \ often display ‘out of date’ information.\n\n# Creating the prompt menu\n\nRemove\
    \ the code in main.py and replace it with the following."
