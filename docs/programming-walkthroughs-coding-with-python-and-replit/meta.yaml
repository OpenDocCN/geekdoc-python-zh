    # Creating and hosting a basic web application with Django and Repl.it


    ![](img/48efb5586f6da072fc1456bee6971293_196_0.png)


    In this tutorial, we’ll be using Django to create an online service that shows
    visitors their current weather and location. We’ll develop the service and host
    it using repl.it.


    To work through this tutorial, you should ideally have basic knowledge of Python
    and some knowledge of web application development. However, we’ll explain all
    of our reasoning and each line of code thoroughly , so if you have any programming
    experience you should be able to follow along as a complete Python or web app
    beginner too. We’ll also be making use of some HTML, JavaScript, and jQuery, so
    if you have been exposed to these before you’ll be able to work through more quickly.
    If you haven’t, this will be a great place to start.


    To display the weather at the user’s current location, we’ll have to tie together
    a few pieces. The main components of our system are:


    +   - A Django application, to show the user a webpage with dynamic data

    - Ipify to get our visitors’ IP address so that we can guess their location

    - ip-api to look up our visitors’ city and country using their IP address

    - Open Weather Map to get the current weather at our visitors’ location.


    The main goals of this tutorial are to:


