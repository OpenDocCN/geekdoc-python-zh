  md: 'Digital text, like images, is also represented internally by numbers, so the
    differences between a text file and an image file are not as large as you might
    assume. Any digital data can be represented as a binary string<sup>201</sup>,
    a bunch of 1s and 0s, and we can make tiny modifications to an image to encode
    a binary string within it. As an example, consider the following:


    ```

    image = [(255, 0, 0), (0, 255, 0), (0, 0, 255)]

    ```


    This is a representation of an image with three pixels: one red, one green, and
    one blue. If we encode this as an image and open it in an image viewer, we’ll
    see the three pixel image, but if we read this data with Python, it is simply
    a list of tuples, each containing three integers.


    We could also look at each value making up each pixel and calculate whether it
    is *odd* or *even*. We could encode odd numbers as 1 and even values as 0. This
    would give us the binary string “100 010 001” (as the 255 values are odd and the
    0s are even).


    If we made a small modification to the image as follows:


    ```

    image = [(254, 1, 1), (1, 255, 1), (1, 0, 254)]

    ```


    The image would look almost identical in any image viewer (we have just added
    or subtracted a minuscule amount of color from some values), but the binary string
    – using our odd/even method – would look completely different: “011 111 100”.


    Using this technique but extending it over an entire image (millions of pixels),
    we can hide a large amount of text data in any image.


    # Creating the project on Repl.it


    If you were serious about keeping your messages as secret as possible, you’d want
    to do all of these steps on an offline computer that you fully control. As a learning
    exercise though, we’ll set the project up on repl.it<sup>202</sup>. Navigate to
    their site and sign up for an account if you don’t have one.


    Create a new project, choosing “Python” as the language, and give your project
    a name.'
