    \nresponse = requests.get(WS_URL, parameters)\njs = response.json()\nprint(js)\n\
    print()\n```\n\n此代码向 WeatherStack 请求伦敦的当前温度，获取其 JSON<sup>12</sup> 版本并打印出来。你应该会看到类似下图所示的内容。\n\
    \n图 6：获取 JSON 格式的当前天气\n\nWeatherStack 返回大量数据，但我们主要关注\n\n1.  **位置：** 查看我们是否找到了正确的伦敦，而不是[另外\
    \ 29 个地方]<sup>13</sup> 中的某个叫伦敦的地方。\n2.  **日期：** 我们将在把数据保存到文件时记录它。\n3.  **当前温度：**\
