    # The Quicksort function


    Once we get the partition algorithm right, sorting is easy. We''ll define a helper
    `_quicksort` function first to handle the recursion and then implement a prettier
    public function after.


    ```

    1 def _quicksort(xs, start, end):

    2     if start >= end:

    3         return

    4     p = partition(xs, start, end)

    5     _quicksort(xs, start, p-1)

    6     _quicksort(xs, p+1, end)

    ```


    To sort a list, we partition it (line 4), sort the left sublist (line 5: from
    the start of the original list up to the pivot point), and then sort the right
    sublist (line 6: from just after the pivot point to the end of the original list).
    We do this recursively with the `end` boundary moving left, closer to `start`,
    for the left sublists and the `start` boundary moving right, closer to `end`,
    for the right sublists. When the start and end boundaries meet (line 2), we''re
    done!


    The first call to Quicksort will always be with the entire list that we want sorted,
    which means that 0 will be the start of the list and `len(xs)-1` will be the end
    of the list. We don''t want to have to remember to pass these extra arguments
    in every time we call Quicksort from another program (e.g. in any case where it
    is not calling itself), so we''ll make a prettier wrapper function with these
    defaults to get the process started.


    ```

    1 def quicksort(xs):

    2     return _quicksort(xs, 0, len(xs)-1)

    ```


    Now we, as users of the sorting function, can call `quicksort([4,5,6,2,3,9,10,2,1,5,3,100,23,42,1])`,
    passing in only the list that we want sorted. This will in turn go and call the
    `_quicksort` function, which will keep calling itself until the list is sorted.


