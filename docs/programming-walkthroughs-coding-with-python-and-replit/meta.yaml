    :\n    main()\n```\n\n这段代码看起来比实际需要的复杂一些，因为除了将球绘制到屏幕上，它还设置了一个游戏循环。虽然基本的 2D 游戏看起来是在屏幕上移动物体，但它们通常实际上是通过每秒多次重绘整个屏幕来模拟这种效果的。为了解决这个问题，我们需要在一个\
    \ `while True:` 循环中运行我们的逻辑。\n\n我们首先导入 PyGame 并设置一些全局变量：屏幕大小和背景颜色（黑色）。然后我们定义 `Ball`\
    \ 类，设置一个对象，该对象知道去哪里寻找球的图像以及如何获取图像应该被绘制的默认坐标。\n\n然后我们通过调用 `init()` 以及启动屏幕和时钟来设置\
