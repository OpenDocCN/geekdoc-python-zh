  - "[PAGE 134]\n\n# Playing individual tones\n\nInstead of playing audio from files,\
    \ you can also play specific tones or notes with the `play_tone()` method. This\
    \ method takes three arguments:\n\n+   - duration: how long the tone should play\
    \ for\n- pitch: the frequency of the tone (how high or low it sounds)\n- wave\
    \ form: the fundamental wave form that the tone is built on.\n\nIf you’ve ever\
    \ played a musical instrument, you’ll probably have come across notes referred\
    \ to by the letters A-G. With digital audio, you’ll specify the pitch in hertz\
    \ (Hz). “Middle C” on a piano is usually 262 Hz and the A above this is 440 Hz.\n\
    \nLet’s write a program to play “Twinkle Twinkle Little Star”. Create a new Python\
    \ repl and add the following code to `main.py`.\n\n```\nimport time\nfrom replit\
    \ import audio\n\ndef play_note(note, duration):\n    note_to_freq = {\n     \
    \   \"C\": 262, \"D\": 294, \"E\": 330, \"F\": 349, \"G\": 392, \"A\": 440\n \
    \   }\n    audio.play_tone(duration, note_to_freq[note], 0)\n    time.sleep(duration)\n\
    \nplay_note(\"C\", 2)\n```\n\nAbove we set up a convenience function to play specific\
    \ notes for a specific duration. It includes a dictionary mapping the names of\
    \ notes to their frequencies. We’ve only done one octave and no sharps or flats,\
    \ but you can easily extend this to add the other notes.\n\nIt then plays the\
