- md: "## Data science with Repl.it: Plots and graphs\n\nSo far, all the programs\
    \ we have looked at have been entirely **text based**. They have taken text input\
    \ and produced text output, on the console or saved to files.\n\nWhile text is\
    \ flexible and powerful, sometimes a picture is worth a thousand words. Especially\
    \ when analysing data, you'll often want to produce plots and graphs. There are\
    \ three main ways of achieving this using Repl.it.\n\n- Creating a front-end only\
    \ project and using only JavaScript, HTML and CSS.\n- Creating a full web application\
    \ with something like Flask²⁸, analysing the data in Python and passing the results\
    \ to a front end to be visualised.\n- Using Python code only, creating windows\
    \ using X²⁹ and rendering the plots in there.\n\nOption 1 is great if you're OK\
    \ with your users having access to all of your data, you like doing data manipulation\
    \ in JavaScript, and your data set is small enough to load into a web browser.\
    \ Option 2 is often the most powerful, but can be overkill if you just want a\
    \ few basic plots.\n\nHere, we'll demonstrate how to do option 3, using Python\
    \ and Matplotlib³⁰.\n\n## Installing Matplotlib and creating a basic line plot\n\
    \nMatplotlib is a third-party library for doing all kinds of plots and graphs\
    \ in Python. We can install it by using Repl.it's \"magic import\" functionality.\
    \ Matplotlib is a large and powerful library with a lot of functionality, but\
    \ we only need `pyplot` for now: the module for plotting.\n\nCreate a new Python\
    \ repl and add the following code.\n\n```\npython\nfrom matplotlib import pyplot\
    \ as plt\n\nplt.plot([1,2,3,4,5,6], [6,3,6,1,2,3])\nplt.show()\n```\n\nThere are\
    \ many traditions in the Python data science world about how to import libraries.\
    \ Many of the libraries have long names and get imported as easier-to-type shortcuts.\
    \ You'll see that nearly all examples import `pyplot` as the shorter `plt` before\
    \ using it, as we do above. We can then generate a basic line plot by passing\
    \ two arrays to `plt.plot()` for X and Y values. In this example, the first point\
    \ that we plot is (1,6) (the first value from each array). We then add all of\
    \ the plotted points joined into a line graph.\n\nRepl.it knows that it needs\
    \ an X server to display this plot (triggered when you call `plt.show()`), so\
    \ after running this code you'll see “Starting X” in the main output console and\
    \ a new graphical window will appear.\n\n![](img/48efb5586f6da072fc1456bee6971293_44_0.png)\n\
    \nThe X server is very limited compared to a full operating system GUI. Beneath\
    \ the plot, you'll see some controls to pan and zoom around the image, but if\
    \ you try to use them you'll see that the experience is not that smooth.\n\nLine\
    \ plots are cool, but we can do more. Let's plot a real data set.\n\n## Making\
    \ a scatter plot of US cities by state\n\nScatter plots are often used to plot\
    \ 2D data and look for correlations and other patterns. However, they can also\
    \ loosely be used to plot geographical X-Y coordinates (in reality, the field\
    \ of plotting geographical points is [far more complicated](https://www.gislounge.com/what-is-gis/)).\
    \ We'll use a subset from the [city data from simplemaps](https://simplemaps.com/data/us-cities)\
    \ to generate our next plot. Each row of the data set represents a city in the\
    \ US, and gives us its latitude, longitude, and two-letter state code.\n\nTo download\
    \ the data and plot it, replace the code in your `main.py` file with the following.\n\
    \n31https://www.gislounge.com/what-is-gis/\n32https://simplemaps.com/data/us-cities\n\
    \n```\nfrom matplotlib import pyplot as plt\nimport requests\nimport random\n\n\
    data_url = \"https://raw.githubusercontent.com/sixhobbits/ritza/master/data/us-cities.txt\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"us-cities.txt\", \"w\") as f:\n\
    \    f.write(r.text)\n\nlats = []\nlons = []\ncolors = []\nstate_colors = {}\n\
    \n# matplotlib uses single letter shortcuts for common colors\n# blue, green,\
    \ red, cyan, magenta, yellow, black\nall_colors = ['b', 'g', 'r', 'c', 'm', 'y',\
    \ 'k']\n\nwith open(\"us-cities.txt\") as f:\n    for i, line in enumerate(f):\n\
    \        state, lat, lon = line.split()\n        lats.append(float(lat))\n   \
    \     lons.append(float(lon))\n\n        # we assign each state a random colour,\
    \ but once we've picked\n        # a colour we always use it for all cities in\
    \ that state.\n        if state not in state_colors:\n            state_colors[state]\
    \ = random.choice(all_colors)\n        colors.append(state_colors[state])\nplt.scatter(lons,\
    \ lats, c=colors)\nplt.show()\n```\n\nIf you run this, you'll notice it takes\
    \ a little bit longer than the six point plot we created before, as it now has\
    \ to plot nearly 30 000 data points. Once it's done, you should see something\
    \ similar to the following (though, as the colours were chosen randomly, yours\
    \ might look different).\n\n```\npython\nfrom matplotlib import pyplot as plt\n\
    import requests\nimport random\n\ndata_url = \"https://raw.githubusercontent.com/sixhobbits/ritza/master/data/us-cities.txt\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"us-cities.txt\", \"w\") as f:\n\
    \    f.write(r.text)\n\nlats = []\nlons = []\ncolors = []\nstate_colors = {}\n\
    all_colors = list(\"bgcrmyk\")\nwith open(\"us-cities.txt\") as f:\n    for i,\
    \ line in enumerate(f):\n        state, lat, lon = line.split()\n        lats.append(float(lat))\n\
    \        lons.append(float(lon))\n        if state not in state_colors:\n    \
    \        state_colors[state] = random.choice(all_colors)\n        colors.append(state_colors[state])\n\
    plt.scatter(lons, lats, c=colors)\nplt.show()\n```\n\n![](img/48efb5586f6da072fc1456bee6971293_46_0.png)\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_46_1.png)\n\nImage 2: *All the cities\
    \ in the US plotted by state as a scatterplot*\n\nYou'll also notice that while\
    \ it's recognisable as the US, the proportions are not right. Mapping a 3D sphere\
    \ to a 2D plane is surprisingly difficult and there are many different ways of\
    \ doing it.\n\n## More advanced plotting with seaborn and pandas\n\nPlotting X-Y\
    \ points is a good start, but in most cases you'll want to do a little bit more.\
    \ seaborn<sup>33</sup> is a plotting library built on top of Matplotlib that makes\
    \ it easier to create good-looking visualisations.\n\nLet's do another scatter\
    \ plot based on GDP and life expectancy data to see if people live longer in richer\
    \ countries.\n\nReplace the code in `main.py` with the following. Remember how\
    \ we mentioned earlier that data scientists have traditions about how to import\
    \ certain libraries? Here you see a few more of these “short names”. We'll use\
    \ seaborn for plotting but import it as `sns`, pandas<sup>34</sup> for reading\
    \ the CSV file but import it as `pd` and NumPy<sup>35</sup> for calculating the\
    \ correlation but import it as `np`.\n\n<sup>33</sup>https://seaborn.pydata.org/\n\
    <sup>34</sup>https://pandas.pydata.org/\n<sup>35</sup>https://numpy.org/\n\n```\n\
    import requests\nimport seaborn as sns\nimport pandas as pd\nfrom matplotlib import\
    \ pyplot as plt\nimport numpy as np\n\ndata_url = \"https://raw.githubusercontent.com/holtzy/data_to_viz/master/Example_dataset/4_ThreeNum.csv\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"gdp-life.txt\", \"w\") as f:\n \
    \   f.write(r.text)\n\ndf = pd.read_csv(\"gdp-life.txt\")\nprint(df.head())\n\n\
    print(\"___\")\nprint(\"The correlation is: \", np.corrcoef(df[\"gdpPercap\"],\
    \ df[\"lifeExp\"])[0, 1])\nprint(\"___\")\n\nsns.lmplot(\"gdpPercap\", \"lifeExp\"\
    , df).set_axis_labels(\n    \"Life expectancy\", \"GDP per capita\"\n)\n\nplt.title(\"\
    People live longer in richer countries\")\nplt.tight_layout()\nplt.show()\n```\n\
    \nIf you run this, you'll see it plots each country in a similar way to our previous\
    \ scatter plot, but also adds a line showing the correlation.\n\nIn the output\
    \ pane below you can also see that the correlation coefficient between the two\
    \ variables is 0.67 which is a fairly strong positive correlation.\n\n![](img/48efb5586f6da072fc1456bee6971293_48_0.png)\n\
    \nData science and data visualisation are huge topics, and there are dozens of\
    \ Python libraries that can be used to plot data. For a good overview of all of\
    \ them and their strengths and weaknesses, you should watch Jake Vanderplas's\
    \ talk[^36].\n\n## Saving plots to PNG files\n\nWhile visualising data right after\
    \ you analyse it is often useful, sometimes you need to save the figures to embed\
    \ into reports. You can save your graphs by calling `plt.savefig()`. Change the\
    \ last line (`plt.show()`) to\n\n```\npython\nplt.savefig(\"GDPlife.png\")\n```\n\
    \nRerun the code. Instead of seeing the plot appear in the right-hand pane, you'll\
    \ see a new file in the files pane. Clicking on it will show you the PNG file\
    \ in the editing pane.\n\n[^36]: https://www.youtube.com/watch?v=FytuB8nFHPQ"
  mdcn: "## 使用 Repl.it 进行数据科学：图表与图形\n\n到目前为止，我们所看到的所有程序都是完全**基于文本**的。它们接收文本输入，并在控制台或保存到文件中产生文本输出。\n\
    \n虽然文本灵活且强大，但有时一图胜千言。尤其是在分析数据时，你通常会想要生成图表和图形。使用 Repl.it 实现这一点主要有三种方式。\n\n-   创建一个纯前端项目，仅使用\
    \ JavaScript、HTML 和 CSS。\n-   创建一个完整的 Web 应用程序，例如使用 Flask²⁸，在 Python 中分析数据，并将结果传递给前端进行可视化。\n\
    -   仅使用 Python 代码，使用 X²⁹ 创建窗口并在其中渲染图表。\n\n如果你不介意用户访问你的所有数据、喜欢用 JavaScript 进行数据操作，并且你的数据集足够小可以加载到\
    \ Web 浏览器中，那么选项 1 很棒。选项 2 通常功能最强大，但如果你只需要一些基本图表，它可能有些大材小用。\n\n在这里，我们将演示如何执行选项\
    \ 3，使用 Python 和 Matplotlib³⁰。\n\n## 安装 Matplotlib 并创建基本折线图\n\nMatplotlib 是一个用于在\
    \ Python 中绘制各种图表和图形的第三方库。我们可以使用 Repl.it 的“魔法导入”功能来安装它。Matplotlib 是一个庞大而强大的库，具有许多功能，但我们现在只需要\
    \ `pyplot`：用于绘图的模块。\n\n创建一个新的 Python repl 并添加以下代码。\n\n```\npython\nfrom matplotlib\
    \ import pyplot as plt\n\nplt.plot([1,2,3,4,5,6], [6,3,6,1,2,3])\nplt.show()\n\
    ```\n\n在 Python 数据科学领域，关于如何导入库有许多传统。许多库名称很长，通常被导入为更容易输入的快捷方式。你会看到几乎所有示例在使用 `pyplot`\
    \ 之前都将其导入为更短的 `plt`，就像我们上面所做的那样。然后，我们可以通过将两个数组传递给 `plt.plot()` 来生成基本折线图，分别作为 X\
    \ 和 Y 值。在这个例子中，我们绘制的第一个点是 (1,6)（每个数组的第一个值）。然后我们将所有绘制的点连接成一条折线图。\n\nRepl.it 知道它需要一个\
    \ X 服务器来显示此图表（在调用 `plt.show()` 时触发），因此运行此代码后，你会在主输出控制台中看到“Starting X”，并且会出现一个新的图形窗口。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_44_0.png)\n\n与完整的操作系统 GUI 相比，X 服务器非常有限。在图表下方，你会看到一些用于平移和缩放图像的控件，但如果你尝试使用它们，你会发现体验并不那么流畅。\n\
    \n折线图很酷，但我们可以做更多。让我们绘制一个真实的数据集。\n\n## 按州绘制美国城市的散点图\n\n散点图通常用于绘制二维数据并寻找相关性及其他模式。然而，它们也可以粗略地用于绘制地理\
    \ X-Y 坐标（实际上，绘制地理点的领域[要复杂得多](https://www.gislounge.com/what-is-gis/)）。我们将使用 [simplemaps\
    \ 的城市数据](https://simplemaps.com/data/us-cities) 的一个子集来生成我们的下一个图表。数据集的每一行代表美国的一个城市，并提供其纬度、经度和两位数的州代码。\n\
    \n要下载数据并绘制它，请将 `main.py` 文件中的代码替换为以下内容。\n\n31https://www.gislounge.com/what-is-gis/\n\
    32https://simplemaps.com/data/us-cities\n\n```\nfrom matplotlib import pyplot\
    \ as plt\nimport requests\nimport random\n\ndata_url = \"https://raw.githubusercontent.com/sixhobbits/ritza/master/data/us-cities.txt\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"us-cities.txt\", \"w\") as f:\n\
    \    f.write(r.text)\n\nlats = []\nlons = []\ncolors = []\nstate_colors = {}\n\
    \n# matplotlib uses single letter shortcuts for common colors\n# blue, green,\
    \ red, cyan, magenta, yellow, black\nall_colors = ['b', 'g', 'r', 'c', 'm', 'y',\
    \ 'k']\n\nwith open(\"us-cities.txt\") as f:\n    for i, line in enumerate(f):\n\
    \        state, lat, lon = line.split()\n        lats.append(float(lat))\n   \
    \     lons.append(float(lon))\n\n        # we assign each state a random colour,\
    \ but once we've picked\n        # a colour we always use it for all cities in\
    \ that state.\n        if state not in state_colors:\n            state_colors[state]\
    \ = random.choice(all_colors)\n        colors.append(state_colors[state])\nplt.scatter(lons,\
    \ lats, c=colors)\nplt.show()\n```\n\n如果你运行这个，你会注意到它比我们之前创建的六点图花费的时间稍长一些，因为它现在需要绘制近\
    \ 30,000 个数据点。完成后，你应该会看到类似以下的内容（不过，由于颜色是随机选择的，你的图表可能看起来不同）。\n\n```\npython\nfrom\
    \ matplotlib import pyplot as plt\nimport requests\nimport random\n\ndata_url\
    \ = \"https://raw.githubusercontent.com/sixhobbits/ritza/master/data/us-cities.txt\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"us-cities.txt\", \"w\") as f:\n\
    \    f.write(r.text)\n\nlats = []\nlons = []\ncolors = []\nstate_colors = {}\n\
    all_colors = list(\"bgcrmyk\")\nwith open(\"us-cities.txt\") as f:\n    for i,\
    \ line in enumerate(f):\n        state, lat, lon = line.split()\n        lats.append(float(lat))\n\
    \        lons.append(float(lon))\n        if state not in state_colors:\n    \
    \        state_colors[state] = random.choice(all_colors)\n        colors.append(state_colors[state])\n\
    plt.scatter(lons, lats, c=colors)\nplt.show()\n```\n\n![](img/48efb5586f6da072fc1456bee6971293_46_0.png)\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_46_1.png)\n\n图 2：*美国所有城市按州绘制的散点图*\n\
    \n你还会注意到，虽然可以辨认出是美国，但比例并不正确。将三维球体映射到二维平面出奇地困难，并且有许多不同的方法可以做到这一点。\n\n## 使用 seaborn\
    \ 和 pandas 进行更高级的绘图\n\n绘制 X-Y 点是一个好的开始，但在大多数情况下，你会想做更多一点。seaborn<sup>33</sup>\
    \ 是一个建立在 Matplotlib 之上的绘图库，它使创建美观的可视化图表变得更容易。\n\n让我们基于 GDP 和预期寿命数据再做一个散点图，看看人们是否在更富裕的国家活得更长。\n\
    \n将 `main.py` 中的代码替换为以下内容。还记得我们之前提到数据科学家在导入某些库时有传统吗？在这里你会看到更多这样的“短名称”。我们将使用 seaborn\
    \ 进行绘图，但将其导入为 `sns`；使用 pandas<sup>34</sup> 读取 CSV 文件，但将其导入为 `pd`；使用 NumPy<sup>35</sup>\
    \ 计算相关性，但将其导入为 `np`。\n\n<sup>33</sup>https://seaborn.pydata.org/\n<sup>34</sup>https://pandas.pydata.org/\n\
    <sup>35</sup>https://numpy.org/\n\n```\nimport requests\nimport seaborn as sns\n\
    import pandas as pd\nfrom matplotlib import pyplot as plt\nimport numpy as np\n\
    \ndata_url = \"https://raw.githubusercontent.com/holtzy/data_to_viz/master/Example_dataset/4_ThreeNum.csv\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"gdp-life.txt\", \"w\") as f:\n \
    \   f.write(r.text)\n\ndf = pd.read_csv(\"gdp-life.txt\")\nprint(df.head())\n\n\
    print(\"___\")\nprint(\"The correlation is: \", np.corrcoef(df[\"gdpPercap\"],\
    \ df[\"lifeExp\"])[0, 1])\nprint(\"___\")\n\nsns.lmplot(\"gdpPercap\", \"lifeExp\"\
    , df).set_axis_labels(\n    \"Life expectancy\", \"GDP per capita\"\n)\n\nplt.title(\"\
    People live longer in richer countries\")\nplt.tight_layout()\nplt.show()\n```\n\
    \n如果你运行这个，你会看到它以类似于我们之前散点图的方式绘制每个国家，但还添加了一条显示相关性的线。\n\n在下面的输出窗格中，你还可以看到两个变量之间的相关系数为\
    \ 0.67，这是一个相当强的正相关。\n\n![](img/48efb5586f6da072fc1456bee6971293_48_0.png)\n\n\
    数据科学和数据可视化是庞大的主题，有数十种 Python 库可用于绘制数据。要全面了解所有这些库及其优缺点，你应该观看 Jake Vanderplas 的演讲[^36]。\n\
    \n## 将图表保存为 PNG 文件\n\n虽然在分析数据后立即可视化数据通常很有用，但有时你需要将图表保存下来以嵌入报告中。你可以通过调用 `plt.savefig()`\
    \ 来保存图表。将最后一行（`plt.show()`）更改为\n\n```\npython\nplt.savefig(\"GDPlife.png\")\n\
    ```\n\n重新运行代码。你不会在右侧窗格中看到图表出现，而是会在文件窗格中看到一个新文件。点击它将在编辑窗格中显示 PNG 文件。\n\n[^36]:\
    \ https://www.youtube.com/watch?v=FytuB8nFHPQ"
