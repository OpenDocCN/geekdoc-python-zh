    ```\n\n我们来分解一下。\n\n- 第 1 行添加了 Express 的依赖项。Repl.it 会负责为我们安装它。\n- 第 2 行创建了一个新的\
    \ Express 应用，该应用将用于处理传入的请求。\n- 第 3 行添加了 `body-parser` 的依赖项。Express 服务器需要此依赖项来处理表单发送的数据，并以代码中有用的格式提供给我们。\n\
    - 第 4 行添加了一个基本 HTTP 服务器的依赖项。\n- 第 6 和 7 行告诉 Express 应用在传入的数据上使用哪些解析器。处理表单数据需要此设置。\n\
    \n接下来，我们需要为 Express 添加一种处理传入请求并为我们提供所需表单的方式。在您刚刚添加的代码下方，添加以下几行代码：\n\n```\napp.get('/',\
    \ function (req, res) {\n  res.sendFile('/index.html', {root:'.'});\n});\n\napp.get('/create',\
    \ function (req, res) {\n  res.sendFile('/create.html', {root:'.'});\n});\n```\n\
    \n- `app.get` 告诉 Express 我们希望它处理 GET 请求。\n- `'/'` 告诉 Express 它应该响应发送到根 URL 的 GET\
    \ 请求。根 URL 看起来像 ‘https://crm.hawkiesza.repl.co’——注意 URL 后面没有斜杠。\n- `'/create'`\
    \ 告诉 Express 它应该响应根 URL 之后 /create 的 GET 请求，即 ‘https://crm.hawkiesza.repl.co/create’。\n\
    - `res.sendFile` 告诉 Express 将给定的文件作为响应发送。\n\n在服务器开始接收请求和发送响应之前，我们需要告诉它开始运行。在之前的代码下方添加以下代码。\n\
    \n```\napp.set('port', process.env.PORT || 5000);\nhttp.listen(app.get('port'),\
    \ function() {\n  console.log('listening on port', app.get('port'));\n});\n```\n\
    \n- 第 1 行告诉 Express 将端口号设置为环境变量中定义的数字，或在未定义时设置为 5000。\n- 第 2-4 行告诉服务器开始监听请求。\n\
    \n现在我们有了一个监听请求的 Express 服务器，但我们还没有构建在收到请求时需要发送回去的表单。\n\n创建一个名为 index.html 的新文件，并将以下代码粘贴到其中：\n\
    \n```\n<!DOCTYPE html>\n<html>\n<body>\n<form action=\"/create\" method=\"GET\"\
    >\n  <input type=\"submit\" value=\"Create\">\n</form>\n</body>\n</html>\n```\n\
    \n这只是一段简单的 HTML 代码，在页面上放置了一个按钮。当点击此按钮时，它会向 /create 发送一个 GET 请求，服务器将根据我们上面编写的代码进行响应——在我们的例子中，它将发回我们接下来要定义的\
    \ create.html 文件。\n\n创建一个名为 create.html 的新文件，并将以下内容粘贴到其中：\n\n```\n<!DOCTYPE html>\n\
