  md: "![](img/48efb5586f6da072fc1456bee6971293_217_0.png)\n\n# Json response from\
    \ OpenWeatherMap\n\nLet’s write one last function in our views.py file to replicate\
    \ this call for our visitor’s city which we previously displayed.\n\nFirst we\
    \ need to add an import for the Python os (operating system) module so that we\
    \ can access our environment variables. At the top of views.py add:\n\n```\nimport\
    \ os\n```\n\nNow we can write the function. Add the following to views.py:\n\n\
    ```\ndef get_weather_from_location(city, country_code):\n    token = os.environ.get(\"\
    OPEN_WEATHER_TOKEN\")\n    url = \"https://api.openweathermap.org/data/2.5/weather?q={},{}&units=metric&appid={}\"\
    .format(\n        city, country_code, token)\n    response = requests.get(url)\n\
    \    return response.json()\n```\n\nIn line 2, we get our API key from the environment\
    \ variables (note, you sometimes need to refresh the repl.it page with your repl\
    \ in to properly load in the environment variables), and we then use this to format\
    \ our URL properly in line 3. We get the response from OpenWeatherMap and return\
    \ it as json.\n\nWe can now use this function in our get_weather_from_ip() function\
    \ by modifying it to look as follows:\n\n```\ndef get_weather_from_ip(request):\n\
    \    ip_address = request.GET.get(\"ip\")\n    location = get_location_from_ip(ip_address)\n\
    \    city = location.get(\"city\")\n    country_code = location.get(\"countryCode\"\
    )\n    weather_data = get_weather_from_location(city, country_code)\n    description\
    \ = weather_data['weather'][0]['description']\n    temperature = weather_data['main']['temp']\n\
    \    s = \"You're in {}, {}. You can expect {} with a temperature of {} degrees\"\
