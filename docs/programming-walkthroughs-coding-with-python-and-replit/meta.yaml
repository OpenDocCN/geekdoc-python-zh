- md: "## Adding your Discord bot to your Discord server\n\nOur Discord bot is still\
    \ just a shell at this stage as we haven’t written any code to allow him to do\
    \ anything, but let’s go ahead and add him to our Discord server anyway. To add\
    \ a bot to your server, you’ll need the Client ID from the “General Information”\
    \ page that we looked at before when we created our ReplBotApplication (ie. the\
    \ client ID, not the secret bot Token).\n\nCreate a URL that looks as follows,\
    \ but using your Client ID instead of mine at the end:\nhttps://discordapp.com/api/oauth2/authorize?scope=bot&client_id=746269162917331028\n\
    \nVisit the URL that you created in your web browser and you’ll see a page similar\
    \ to the following where you can choose which server to add your bot to.\n\nSelect\
    \ the server we created in the step before this and hit the “authorize” button.\
    \ After completing the captcha, you should get an in-app Discord notification\
    \ telling you that your bot has joined your server.\nNow we can get to the fun\
    \ part of building a brain for our bot!\n\n## Creating a Repl and installing our\
    \ Discord dependencies\n\nThe first thing we need to do is create a Python Repl\
    \ to write the code for our Discord bot. Over at repl.it[^118], create a new Repl,\
    \ choosing “Python” as your language.\nWe don’t need to reinvent the wheel, as\
    \ there is already a great Python wrapper for the Discord bot API over on GitHub[^119],\
    \ which makes it a lot faster to get set up with a basic Python discord bot. To\
    \ use library, we can simply write `import discord` at the top of `main.py`. Repl.it\
    \ will handle installing this dependency when you press the “run” button.\nOur\
    \ bot is nearly ready to go – but we still need to plug in our secret token. This\
    \ will authorize our code to control our bot.\n\n## Setting up authorization for\
    \ our bot\n\nBy default, Repl.it code is public. This is great as it encourages\
    \ collaboration and learning, but we need to be careful not to share our secret\
    \ bot token (which gives anyone who has access to it full control of your bot).\n\
    \n[^118]: https://repl.it\n[^119]: https://github.com/Rapptz/discord.py\n\nTo\
    \ get around the problem of needing to give our *code* access to the token while\
    \ allowing others to access our code but *not* our token, we'll be using [environment\
    \ variables](https://www.digitalocean.com/community/tutorials/how-to-read-and-set-environmental-and-shell-variables-on-a-linux-vps).\
    \ On a normal machine, we'd set these directly on our operating system, but using\
    \ Repl.it we don't have access to this. Repl.it allows us to set secret environment\
    \ variables through a special .env file.\n\nFirst, we need to create a new file\
    \ called exactly `.env`. Select \"Add file\" in the left pane, as shown in the\
    \ image below, and name this file `.env`. It is important not to leave out the\
    \ `.` at the beginning.\n\nOpen this new file and add a variable to define your\
    \ bot's secret token (note that this is the second token that we got while setting\
    \ up the bot – different from the Client ID that we used to add our bot to our\
    \ server). It should look something like:\n\n```\nDISCORD_BOT_SECRET=NDcUN5T32zcTjMYOM0Y1MTUy.Dk7JBw.ihrTSA01GKHZSonqvuhtwta16WU\n\
    ```\n\nYou'll need to:\n\n- **Replace** the token (after the `=` sign) with the\
    \ token that Discord gave you when creating your own bot.\n- Be careful about\
    \ **spacing**. Unlike in Python, if you put a space on either side of the `=`\
    \ in your `.env` file, these spaces will be part of the variable name or the value,\
    \ so make sure you don't have any spaces around the `=` or at the end of the line.\n\
    - Run the code again. Sometimes you'll need to refresh the whole page to make\
    \ sure that your environment variables are successfully loaded.\n\nLet’s make\
    \ a Discord bot that repeats everything we say but in reverse. We can do this\
    \ in only a few lines of code. In your main.py file, add the following:\n\n```python\n\
    import discord\nimport os\n\nclient = discord.Client()\n\n@client.event\nasync\
    \ def on_ready():\n    print(\"I'm in\")\n    print(client.user)\n\n@client.event\n\
    async def on_message(message):\n    if message.author != client.user:\n      \
    \  await message.channel.send(message.content[::-1])\n\ntoken = os.environ.get(\"\
    DISCORD_BOT_SECRET\")\nclient.run(token)\n```\n\nLet’s tear this apart line by\
    \ line to see what it does.\n\n- Lines 1-2 import the discord library that we\
    \ installed earlier and the built-in operating system library, which we’ll need\
    \ to access our bot’s secret token.\n- In line 4, we create a Discord Client.\
    \ This is a Python object that we’ll use to send various commands to Discord’s\
    \ servers.\n- In line 6, we say we are defining an event for our client. This\
    \ line is a Python decorator, which will take the function directly below it and\
    \ modify it in some way. The Discord bot is going to run asynchronously, which\
    \ might be a bit confusing if you’re used to running standard Python. We won’t\
    \ go into asynchronous Python in depth here, but if you’re interested in what\
    \ this is and why it’s used, there’s a good guide over at FreeCodeCamp[^121].\
    \ In short, instead of running the code in our file from top to bottom, we’ll\
    \ be running pieces of code in response to specific events.\n\n[^121]: https://medium.freecodecamp.org/a-guide-to-asynchronous-programming-in-python-with-asyncio-232e2afa44f6\n\
    \n- In lines 7-9 we define what kind of event we want to respond to, and what\
    \ the response should be. In this case, we’re saying that in response to the on_ready\
    \ event (when our bot joins a server successfully), we should output some information\
    \ server-side (i.e. this will be displayed in our Repl’s output, but not sent\
    \ as a message through to Discord). We’ll print a simple I’m in message to see\
    \ that the bot is there and print our bot’s user id (if you’re running multiple\
    \ bots, this will make it easier to work out who’s doing what).\n- Lines 11-14\
    \ are similar, but instead of responding to an on_ready event, we tell our bot\
    \ how to handle new messages. Line 13 says we only want to respond to messages\
    \ that aren’t from us (otherwise our bot will keep responding to himself – you\
    \ can remove this line to see why that’s a problem), and line 14 says we’ll send\
    \ a new message to the same channel where we received a message (message.channel)\
    \ and the content we’ll send will be the same message that we received, but backwards\
    \ (message.content[::-1] - ::-1 is a slightly odd but useful Python idiom to reverse\
    \ a string or list).\n\nThe last two lines get our secret token from the environment\
    \ variables that we set up earlier and then tell our bot to start up.\n\nPress\
    \ the big green “Run” button again and you should see your bot reporting a successful\
    \ channel join in the Repl output.\n\nOpen Discord, and from within the server\
    \ we created earlier, select your ReplBotApplication from the pane on the right-hand\
    \ side of the screen.\n\n## Keeping our bot alive\n\nYour bot can now respond\
    \ to messages, but only for as long as your Repl is running. If you close your\
    \ browser tab or shut down your computer, your bot will stop and no longer respond\
    \ to messages on Discord.\n\nRepl.it will keep your code running after you close\
    \ the browser tab only if you are running a web server. Because we are using the\
    \ Python discord.py library, our bot doesn’t require an explicit web server, but\
    \ we can create a server and run it in a separate thread just to keep our Repl\
    \ alive. We’ll do this using the Flask[^122] framework.\n\nCreate a new file in\
    \ your project called `keep_alive.py` and add the following code:\n\n[^122]: http://flask.pocoo.org/"
  mdcn: "## 将你的Discord机器人添加到你的Discord服务器\n\n目前我们的Discord机器人还只是一个空壳，因为我们还没有编写任何代码让它执行任何操作，但我们还是先将它添加到Discord服务器吧。要将机器人添加到服务器，你需要之前在创建ReplBotApplication时查看过的“通用信息”页面中的客户端ID（即客户端ID，而不是机器人密钥令牌）。\n\
    \n创建一个如下所示的URL，但在末尾使用你自己的客户端ID替换我的：\nhttps://discordapp.com/api/oauth2/authorize?scope=bot&client_id=746269162917331028\n\
    \n在你的网页浏览器中访问你创建的URL，你将看到一个类似于以下内容的页面，在那里你可以选择将机器人添加到哪个服务器。\n\n选择我们在上一步中创建的服务器，然后点击“授权”按钮。完成人机验证后，你应该会收到一个Discord应用内通知，告诉你机器人已加入你的服务器。\n\
    现在我们可以开始构建机器人的“大脑”这一有趣的部分了！\n\n## 创建一个Repl并安装我们的Discord依赖项\n\n我们需要做的第一件事是创建一个Python\
    \ Repl来编写Discord机器人的代码。在repl.it[^118]上，创建一个新的Repl，选择“Python”作为你的语言。\n我们不需要重新发明轮子，因为GitHub上已经有一个很棒的Discord机器人API的Python封装库[^119]，它能大大加快搭建基础Python\
    \ discord机器人的速度。要使用这个库，我们只需在`main.py`文件顶部写入`import discord`。当你按下“运行”按钮时，Repl.it会负责安装这个依赖项。\n\
    我们的机器人几乎准备就绪——但我们还需要插入我们的秘密令牌。这将授权我们的代码来控制我们的机器人。\n\n## 设置机器人的授权\n\n默认情况下，Repl.it上的代码是公开的。这很好，因为它鼓励协作和学习，但我们必须小心，不要泄露我们机器人的秘密令牌（任何获得该令牌的人都可以完全控制你的机器人）。\n\
    \n[^118]: https://repl.it\n[^119]: https://github.com/Rapptz/discord.py\n\n为了解决既需要让我们的*代码*访问令牌，又允许其他人访问我们的代码但*不能*访问令牌的问题，我们将使用[环境变量](https://www.digitalocean.com/community/tutorials/how-to-read-and-set-environmental-and-shell-variables-on-a-linux-vps)。在普通机器上，我们会在操作系统上直接设置这些变量，但使用Repl.it时我们无法访问操作系统。Repl.it允许我们通过一个特殊的.env文件来设置秘密环境变量。\n\
    \n首先，我们需要创建一个确切名为`.env`的新文件。如下图所示，在左侧面板中选择“添加文件”，并将此文件命名为`.env`。不要漏掉开头的`.`非常重要。\n\
    \n打开这个新文件，添加一个变量来定义你机器人密钥令牌（请注意，这是我们在设置机器人时获得的第二个令牌——与我们用来将机器人添加到服务器的客户端ID不同）。它应该看起来像这样：\n\
    \n```\nDISCORD_BOT_SECRET=NDcUN5T32zcTjMYOM0Y1MTUy.Dk7JBw.ihrTSA01GKHZSonqvuhtwta16WU\n\
    ```\n\n你需要：\n\n- **替换**令牌（`=`号之后的部分）为你在创建自己的机器人时Discord给你的令牌。\n- 注意**空格**。与Python不同，如果你在`.env`文件中的`=`两边放一个空格，这些空格将成为变量名或值的一部分，因此请确保你在`=`周围或行尾没有任何空格。\n\
    - 再次运行代码。有时你需要刷新整个页面，以确保你的环境变量成功加载。\n\n让我们制作一个Discord机器人，它会以相反的顺序重复我们说的每一句话。我们只需几行代码就能实现这一点。在你的main.py文件中，添加以下内容：\n\
    \n```python\nimport discord\nimport os\n\nclient = discord.Client()\n\n@client.event\n\
    async def on_ready():\n    print(\"I'm in\")\n    print(client.user)\n\n@client.event\n\
    async def on_message(message):\n    if message.author != client.user:\n      \
    \  await message.channel.send(message.content[::-1])\n\ntoken = os.environ.get(\"\
    DISCORD_BOT_SECRET\")\nclient.run(token)\n```\n\n让我们逐行拆解这段代码，看看它是如何工作的。\n\n- 第1-2行导入了我们之前安装的discord库和内置的操作系统库，后者将用于访问我们机器人的秘密令牌。\n\
    - 在第4行，我们创建了一个Discord客户端。这是一个Python对象，我们将使用它向Discord服务器发送各种命令。\n- 在第6行，我们说我们正在为客户端定义一个事件。这一行是一个Python装饰器，它会直接获取其下方的函数并以某种方式修改它。Discord机器人将异步运行，如果你习惯运行标准Python代码，这可能会有点令人困惑。我们不会在这里深入探讨异步Python，但如果你有兴趣了解这是什么以及为什么使用它，FreeCodeCamp[^121]上有一篇很好的指南。简而言之，我们不再是从上到下运行文件中的代码，而是运行代码片段来响应特定事件。\n\
    \n[^121]: https://medium.freecodecamp.org/a-guide-to-asynchronous-programming-in-python-with-asyncio-232e2afa44f6\n\
    \n- 在第7-9行，我们定义了要响应什么类型的事件，以及响应应该是什么样子。在这种情况下，我们说的是响应on_ready事件（当我们的机器人成功加入服务器时），我们应该在服务端输出一些信息（即这将显示在我们的Repl输出中，但不会作为消息发送到Discord）。我们将打印一个简单的“I'm\
    \ in”消息，看看机器人是否在那里，并打印我们机器人的用户ID（如果你运行多个机器人，这将更容易找出是谁在做什么）。\n- 第11-14行类似，但不是响应on_ready事件，而是告诉我们的机器人如何处理新消息。第13行说我们只想响应不是来自我们自己的消息（否则我们的机器人会一直回复他自己——你可以删除这一行看看为什么这是个问题），第14行说我们将向接收到消息的同一频道（message.channel）发送一条新消息，而我们将发送的内容就是接收到的相同消息，但是倒序的（message.content[::-1]——::-1是一个稍微有点奇怪但有用的Python惯用法，用于反转字符串或列表）。\n\
    \n最后两行从我们之前设置的环境变量中获取秘密令牌，然后告诉我们的机器人启动。\n\n再次点击那个大的绿色“运行”按钮，你应该能在Repl输出中看到你的机器人报告成功加入了频道。\n\
