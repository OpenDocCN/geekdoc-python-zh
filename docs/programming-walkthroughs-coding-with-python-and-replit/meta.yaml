  md: '+   - Viewing HTML in your web browser

    - Using Python to download web pages

    - Using BeautifulSoup^89 to extract parts of scraped data


    We''ll be using the online programming environment Repl.it^90 so you won''t need
    to install any software locally to follow along step by step. If you want to adapt
    this guide to your own needs, you should create a free account by going to repl.it^91
    and follow their sign up process.


    It would help if you have basic familiarity with Python or another high-level
