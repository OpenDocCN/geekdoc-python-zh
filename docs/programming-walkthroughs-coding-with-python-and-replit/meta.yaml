    Time remaining: {source.get_remaining()}\")\n    print(f\"Playing: {pp}\")\n \
    \   print(main_message)\n```\n\nNote that we add a time.sleep() at the top of\
    \ this function. Because changing the status involves writing to the /tmp/audio\
    \ file we discussed before and reading the status involves reading from this file,\
    \ we want to wait a short while to ensure we don't read stale information before\
    \ showing it to the user.\n\nOtherwise our function clears the screen, prints\
    \ out a text-based volume bar along with the current volume percentage, and shows\
    \ other information such as whether the track is currently playing or paused,\
    \ how many loops are left, and how much time is left before the track finishes.\n\
    \nFinally, we need a loop to constantly prompt the user for the next command which\
    \ will also keep our repl alive and continue playing the track while we are waiting\
    \ for user input. Add the following main() function to main.py and call it:\n\n\
    ```python\ndef main():\n    source = audio.play_file(\"o_fortuna.mp3\")\n    time.sleep(1)\n\
    \    show_status(source)\n\n    while True:\n        choice = input(\"Enter command:\
    \ \")\n        if choice == '+':\n            source.volume += 0.1\n        elif\
    \ choice == '-':\n            source.volume -= 0.1\n        elif choice == \"\
    k\":\n            source.set_loop(source.loops_remaining + 1)\n        elif choice\
    \ == \"j\":\n            source.set_loop(source.loops_remaining - 1)\n       \
