    # # Where next?


    We''ve completed the basics of web scraping and have looked at how the web works,
    how to extract information from web pages, and how to do some very basic text
    extraction. You will probably want to do something other than extract words from
    BBC! You can fork this Repl from https://repl.it/@GarethDwyer1/beginnerwebscraping
    and modify it to change which site it scrapes and what content it extracts. You
    can also join the Repl Discord Server to chat with other developers who are working
    on similar projects and who will happily exchange ideas with you or help if you
    get stuck.


    We have walked through a very flexible method of web scraping, but it’s the “quick
    and dirty” way. If BBC updates their website and some of our assumptions (e.g.
    that news URLs will end with a number) break, our web scraper will also break.


    Once you’ve done a bit of web scraping, you’ll notice that the same patterns and
    problems come up again and again. Because of this, there are many frameworks and
    other tools that solve these common problems (finding all the URLs on the page,
    extracting text from the other code, dealing with changing web sites, etc), and
    for any big web scraping project, you’ll definitely want to use these instead
    of starting from scratch.


    Some of the best Python web scraping tools are:


    +   - Scrapy: A framework used by people who want to scrape millions or even billions
    of web pages. Scrapy lets you build “spiders” – programmatic robots that move
    around the web at high speed, gathering data based on rules that you specify.

    - Newspaper: we touched on how it was difficult to separate the main text of an
    online news article from all the other content on the page (headers, footers,
    adverts, etc). This problem is an incredibly difficult one to solve. Newspaper
    uses a combination of manually specified rules and some clever algorithms to remove
    the “boilerplate” or non-core text from each article.

    - Selenium: we scraped some basic content without using a web browser, and this
    works fine for images and text. Many parts of the modern web are dynamic though
    – e.g. they only load when you scroll down a page far enough or click on a button
    to reveal more content. These dynamic sites are challenging to scrape, but Selenium
    allows you to fire up a real web browser and control it just as a human would
    (but automatically), and this allows you to access this kind of dynamic content.


    There is no shortage of other tools, and a lot can be done simply by using them
    in combination with each other. Web scraping is a vast world that we’ve only just
    touched on, but we’ll explore some more web scraping use cases in the next chapter,
    in particular, building news word clouds.


    https://discord.com/login?redirect_to=%2Fchannels%2F%40me

    https://scrapy.org/

    https://github.com/codelucas/newspaper

    https://www.seleniumhq.org/'
- md: "## Building news word clouds using Python and Repl.it\n\nWord clouds, which\
    \ are images showing scattered words in different sizes, are a popular way to\
    \ visualise large amounts of text. Words that appear more frequently in the given\
    \ text are larger, and less common words are smaller or not shown at all.\n\n\
    In this tutorial, we’ll build a web application using Python and Flask that transforms\
    \ the latest news stories into word clouds and displays them to our visitors.\n\
    \nAt the end of this tutorial, our users will see a page similar to the one shown\
    \ below, but containing the latest news headlines from BBC news. We’ll learn some\
    \ tricks about web scraping, RSS feeds, and building image files directly in memory\
    \ along the way.\n\n![](img/48efb5586f6da072fc1456bee6971293_152_0.png)\n\n##\
    \ Overview and requirements\n\nWe’ll be building a simple web application step-by-step\
    \ and explaining each line of code in detail. To follow, you should have some\
    \ basic knowledge of programming and web concepts, such as what if statements\
    \ are and how to use URLs. We’ll be using Python for this tutorial, but we won’t\
    \ assume that you’re a Python expert.\n\nSpecifically, we’ll:\n\n- Look at RSS\
    \ feeds and how to use them in Python\n- Show how to set up a basic Flask web\
    \ application\n- Use BeautifulSoup to extract text from online news articles\n\
    - Use WordCloud to transform the text into images\n- Import Bootstrap and add\
    \ some basic CSS styling\n\nWe'll be using the online programming environment\
    \ Repl.it so you won't need to install any software locally to follow along step\
    \ by step. If you want to adapt this guide to your own needs, you should create\
    \ a free account by going to repl.it and follow their sign up process.\n\n## Web\
    \ scraping\n\nWe previously looked at basic web scraping in an introduction to\
    \ web scraping. If you're completely new to the idea of automatically retrieving\
    \ content from the internet, have a look at that tutorial first.\n\nIn this tutorial,\
    \ instead of scraping the links to news articles directly from the BBC homepage,\
    \ we'll be using RSS feeds - an old but popular standardised format that publications\
    \ use to let readers know when new content is available.\n\n## Taking a look at\
    \ RSS Feeds\n\nRSS feeds are published as XML documents. Every time BBC (and other\
    \ places) publishes a new article to their home page, they also update an XML\
    \ machine-readable document at http://feeds.bbci.co.uk/news/world/. This is a\
    \ fairly simple feed consisting of a `<channel>` element, which has some metadata\
    \ and then a list of `<item>` elements, each of which represents a new article.\
    \ The articles are arranged chronologically, with the newest ones at the top,\
    \ so it's easy to retrieve new content.\n\nBuilding news word clouds using Python\
    \ and Repl.it\n\n148\n\n![](img/48efb5586f6da072fc1456bee6971293_154_0.png)\n\n\
    If you click on the link above, you won’t see the XML directly. Instead, it has\
    \ some associated styling information so that most web browsers will display something\
    \ that’s a bit more human friendly. For example, opening the page in Google Chrome\
    \ shows the page below. In order to view the raw XML directly, you can right-click\
    \ on the page and click “view source”.\n\nBuilding news word clouds using Python\
    \ and Repl.it\n\n149\n\n![](img/48efb5586f6da072fc1456bee6971293_155_0.png)\n\n\
    RSS feeds are used internally by software such as the news reader Feedly<sup>103</sup>\
    \ and various email clients. We’ll be consuming these RSS feeds with a Python\
    \ library to retrieve the latest articles from BBC.\n\n## Setting up our online\
    \ environment (Repl.it)\n\nIn this tutorial, we’ll be building our web application\
    \ using Repl.it<sup>104</sup>, which will allow us to have a consistent code editor,\
    \ environment, and deployment framework in a single click. Head over there and\
    \ create an account. Choose to create a Python Repl, and you should see an editor\
    \ where you can write and run Python code, similar to the image below. You can\
    \ write Python code in the middle pane, run it by pressing the green “run” button,\
    \ and see the output in the right pane. In the left pane, you can see a list of\
    \ files, with `main.py` added there by default.\n\n<sup>103</sup>feedly.com\n\
    <sup>104</sup>repl.it\n\n![](img/48efb5586f6da072fc1456bee6971293_156_0.png)\n\
    \n## Pulling data from our feed and extracting URLs\n\nIn the previous webscraping\
    \ tutorial<sup>105</sup> we used BeautifulSoup<sup>106</sup> to look for hyperlinks\
    \ in a page and extract them. Now that we are using RSS, we can simply parse the\
    \ feed as described above to find these same URLs. We will be using the Python\
    \ feedparser<sup>107</sup> library to do this. Let's start by simply printing\
    \ out the URLs for all of the latest articles from BBC. Switch back to the main.py\
    \ file in the Repl.it IDE and add the following code.\n\n```python\nimport feedparser\n\
    \nBBC_FEED = \"http://feeds.bbci.co.uk/news/world/rss.xml\"\nfeed = feedparser.parse(BBC_FEED)\n\
    \nfor article in feed['entries']:\n    print(article['link'])\n```\n\nFeedparser\
    \ does most of the heavy lifting for us, so we don't have to get too close to\
    \ the slightly cumbersome XML format. In the code above, we parse the feed into\
    \ a nice Python representation (line 4), loop through all of the entries (the\
    \ `<item>` entries from the XML we looked at earlier), and print out the link\
    \ elements. If you run this code, you should see a few dozen URLs output on the\
    \ right pane, as in the image below.\n\n<sup>105</sup> https://www.codementor.io/garethdwyer/beginner-web-scraping-with-python-and-repl-it-nzr27jvnq\n\
    \n<sup>106</sup> https://www.crummy.com/software/BeautifulSoup/bs4/doc/\n\n<sup>107</sup>\
    \ https://pythonhosted.org/feedparser/\n\n![](img/48efb5586f6da072fc1456bee6971293_157_0.png)\n\
    \n## Setting up a web application with Flask\n\nWe don’t just want to print this\
    \ data out in the Repl console. Instead, our application should return information\
    \ to anyone who uses a web browser to visit our application. We’ll, therefore,\
    \ install the lightweight web framework Flask<sup>108</sup> and use this to serve\
    \ web content to our visitors.\n\nIn the main.py file, we need to modify our code\
    \ to look as follows:\n\n```python\nimport feedparser\nfrom flask import Flask\n\
    \napp = Flask(__name__)\n\nBBC_FEED = \"http://feeds.bbci.co.uk/news/world/rss.xml\"\
    \n\n@app.route(\"/\")\ndef home():\n    feed = feedparser.parse(BBC_FEED)\n  \
    \  urls = []\n\n    for article in feed['entries']:\n        urls.append(article['link'])\n\
    \n    return str(urls)\n\nif __name__ == '__main__':\n    app.run('0.0.0.0')\n\
    ```\n\n<sup>108</sup>http://flask.pocoo.org/\n\nHere we still parse the feed and\
    \ extract all of the latest article URLs, but instead of printing them out, we\
    \ add them to a list (urls), and return them from a function. The interesting\
    \ parts of this code are:\n\n- Line 2: we import Flask\n- Line 4: we initialise\
    \ Flask to turn our project into a web application\n- Line 8: we use a decorator\
    \ to define the homepage of our application (an empty route, or /).\n- Lines 19-20:\
    \ We run Flask’s built-in webserver to serve our content.\n\nPress “run” again,\
    \ and you should see a new window appear in the top right pane. Here we can see\
    \ a basic web page (viewable already to anyone in the world by sharing the URL\
    \ you see above it), and we see the same output that we previously printed to\
    \ the console.\n\n![](img/48efb5586f6da072fc1456bee6971293_158_0.png)\n\n## Downloading\
    \ articles and extracting the text\n\nThe URLs aren’t that useful to us, as we\
    \ eventually want to display a summary of the *content* of each URL. The actual\
    \ text of each article isn’t included in the RSS feed that we have (some RSS feeds\
    \ contain the full text of each article), so we’ll need to do some more work to\
    \ download each article. First, we’ll add the third-party libraries `requests`\
    \ and `BeautifulSoup` as dependencies, again just using the “magic import”. We’ll\
    \ be using these to download the content of each article from the URL and strip\
    \ out extra CSS and JavaScript to leave us with plain text.\n\nNow we’re ready\
    \ to download the content from each article and serve that up to the user. Modify\
    \ the code in `main.py` to look as follows.\n\n```python\nimport feedparser\n\
    import requests\n\nfrom flask import Flask\nfrom bs4 import BeautifulSoup\n\n\
    app = Flask(__name__)\n\nBBC_FEED = \"http://feeds.bbci.co.uk/news/world/rss.xml\"\
    \nLIMIT = 2\n\ndef parse_article(article_url):\n    print(\"Downloading {}\".format(article_url))\n\
    \    r = requests.get(article_url)\n    soup = BeautifulSoup(r.text, \"html.parser\"\
    )\n    ps = soup.find_all('p')\n    text = \"\\n\".join(p.get_text() for p in\
    \ ps)\n    return text\n\n@app.route(\"/\")\ndef home():\n    feed = feedparser.parse(BBC_FEED)\n\
    \    article_texts = []\n\n    for article in feed['entries'][:LIMIT]:\n     \
    \   text = parse_article(article['link'])\n        article_texts.append(text)\n\
    \    return str(article_texts)\n\nif __name__ == '__main__':\n    app.run('0.0.0.0')\n\
    ```"
  mdcn: "## 使用 Python 和 Repl.it 构建新闻词云\n\n词云是一种以不同大小的分散单词来展示大量文本的可视化方式。在给定文本中出现频率越高的单词，显示得越大；而不常见的单词则较小或根本不显示。\n\
