  md: "# Managing dependencies using Repl.it\n\nNearly all useful programs rely to\
    \ some extent on pre-existing code in various forms. The existing code that your\
    \ code relies on is known as a dependency. You have already come across some dependencies\
    \ in previous tutorials: you used the `math` module to calculate quadratic equations\
    \ in the first tutorial and you used the `requests` module to fetch weather data\
    \ in the second tutorial.\n\nIn the first tutorial, you also wrote the `solver.py`\
    \ module, and imported this into the `main.py` file. We can think of dependencies\
    \ as falling into three broad categories:\n\n+   - Internal dependencies: other\
    \ code that you or your organisation wrote and which you fully control, e.g. the\
    \ `solver.py` file.\n- Standard dependencies: code that exists as part of the\
    \ standard language libraries, e.g. the `math` module.\n- External dependencies:\
    \ code that is written by third-party developers, e.g. the `requests` module.\n\
    \nIn this tutorial, you'll gain more experience with all three categories of dependencies.\
    \ Specifically, you'll write an NLP (natural language processing) program to analyse\
    \ sentences, using spaCy<sup>17</sup>, a third-party dependency.\n\nDependency\
    \ management is a hugely complicated area, and there is a large ecosystem of related\
    \ tools to help manage packaging and installing Python programs. We won't be covering\
    \ all of the options and background, but you can read an overview of the different\
    \ tools here<sup>18</sup>.\n\n# Understanding Repl.it's magic import tool and\
    \ the universal package manager\n\nIn nearly all programming environments, you\
    \ have to explicitly install third-party dependencies. Let's say you wanted to\
    \ use the `requests` library (which is not included in Python by default) on your\
    \ local machine. If you try to import it, you would get a `ModuleNotFoundError`\
    \ error, as shown below.\n\n```\nType \"help\", \"copyright\", \"credits\" or\
    \ \"license\" for more information.\n>>> import requests\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nModuleNotFoundError: No\
    \ module named 'requests'\n>>>\n```\n\nImage 1: Trying to use a dependency without\
    \ installing it\n\n<sup>17</sup>https://spacy.io/\n<sup>18</sup>https://modelpredict.com/python-dependency-management-tools"
  merge: -1
  pgno: 32
- img_proc: true
  md: 'In order to use this library, you would first have to install it using a command
    similar to `pip install requests`, and only then would the import statement run
    correctly.


    Repl.it, by contrast, can often do the installation for you completely automatically,
    using the [Universal Package Manager](https://blog.repl.it/upm). The moment you
    run the `import requests` line of code, the package manager will go find the correct
    package and install it, or in some cases Repl.it will even have pre-installed
    the package. Either way, your code will “just work”.


    ![](img/48efb5586f6da072fc1456bee6971293_33_0.png)


    *Image 2: Seamless external package use on another repl*


    This is super convenient, but sometimes you need more control. For example, you
    might need a specific version of a package, or the universal package manager might
    not be able to automatically install all of your dependencies. In these cases,
    you can use more advanced ways to install packages.


    # Installing packages through the GUI


    If you’re not sure exactly which package you need, you can use Repl.it’s built-in
    package manager GUI to search for packages. In the example below, we are looking
    for a package called `beautifulsoup4`.


    To use this, you need to


    +   1. Click on the packages tab from the left toolbar.

    2. Search for a package by typing in part or all of its name.

    3. Select the package you want from the search results.


    [^19]https://blog.repl.it/upm'
