    \n![](img/48efb5586f6da072fc1456bee6971293_220_0.png)\n\n在“Cluster Name”下，你可以更改集群的名称。请注意，你只能在此时更改名称——集群创建后便无法更改。完成操作后，点击“Create\
    \ Cluster”。\n\n![](img/48efb5586f6da072fc1456bee6971293_220_1.png)\n\n稍等片刻，你的集群就会被创建。创建完成后，点击左侧栏“Security”标题下的“Database\
    \ Access”，然后点击“Add New Database User”。你需要一个数据库用户来实际存储和检索数据。输入用户的用户名和密码，并记下这些详情——稍后你会用到它们。用户权限选择“Read\
    \ and write to any database”。点击“Add User”完成此步骤。\n\n![](img/48efb5586f6da072fc1456bee6971293_221_0.png)\n\
    \n接下来，你需要允许网络访问该数据库。点击左侧栏的“Network Access”，然后点击“Add IP Address”。由于我们无法从 Repl.it\
    \ 获得静态 IP，我们将允许从任何地方访问——别担心，数据库仍然受到你之前创建的用户名和密码的保护。在弹出窗口中，点击“Allow Access From\
    \ Anywhere”，然后点击“Confirm”。\n\n## 添加白名单条目\n\n使用 CIDR 表示法或单个 IP 地址添加白名单条目。[了解更多。](https://example.com)\n\
    \n![按钮：ADD CURRENT IP ADDRESS](https://example.com) ![按钮：ALLOW ACCESS FROM ANYWHERE](https://example.com)\n\
    \n**白名单条目：**\n\n```\ninput\n0.0.0.0/0\n```\n\n**备注：**\n\n```\ninput\n可选的备注，描述此条目\n\
    ```\n\n☐ 保存为临时白名单\n\n![按钮：取消](https://example.com) ![按钮：确认](https://example.com)\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_222_0.png)\n\n现在，在左侧栏的“Data Storage”下选择“Clusters”。点击“Connect”，并选择“Connect\
    \ Your Application”。这将改变弹出窗口的视图。复制“Connection String”，因为你稍后将需要它从 Repl.it 连接到你的数据库。它看起来会像这样：\n\
    \n```\nmongodb+srv://<username>:<password>@cluster0-zrtwi.gcp.mongodb.net/test?retryWrites=true&w=majority\n\
    ```\n\n![](img/48efb5586f6da072fc1456bee6971293_223_0.png)\n\n## 创建 Repl 并连接到我们的数据库\n\
    \n首先，我们需要创建一个新的 Node.js Repl 来编写连接到我们崭新数据库所需的代码。访问 repl.it 并创建一个新的 Repl，选择“Node.js”作为语言。\n\
    \nRepl 的一个优点是项目默认是公开的。这使得分享变得容易，非常适合协作和学习，但我们必须小心，不要让我们的数据库凭证暴露在公共互联网上。\n\n为了解决这个问题，我们将使用环境变量，正如我们在之前的教程中所做的那样。我们将创建一个\
    \ Repl.it 识别并为你保密的特殊文件，在该文件中，我们声明变量，这些变量成为我们 Repl.it 开发环境的一部分，并可在我们的代码中访问。\n\n\
    在你的 Repl 中，通过在左侧窗格中选择“Files”，然后点击“Add File”按钮，创建一个名为 .env 的文件。注意，拼写必须精确，否则文件将无法被识别。将你的\
    \ MongoDB 数据库用户名和密码（不是你登录 MongoDB Atlas 的详情）以下列格式添加到文件中：\n\n```\nMONGO_USERNAME=username\n\
    MONGO_PASSWORD=password\n```\n\n- 将 username 和 password 替换为你的数据库用户名和密码。\n- 空格很重要。确保等号前后没有添加任何空格。\n\
    \n现在我们已经为数据库设置了凭证，可以继续在代码中连接到它了。\n\nMongoDB 很友好地提供了一个我们可以使用的客户端。为了测试我们的数据库连接，我们将向数据库中插入一些客户数据。在你的\
    \ index.js 文件中（自动创建，位于 Files 窗格下），添加以下代码：\n\n```\nconst MongoClient = require('mongodb').MongoClient;\n\
    const mongo_username = process.env.MONGO_USERNAME\nconst mongo_password = process.env.MONGO_PASSWORD\n\
    \nconst uri = `mongodb+srv://${mongo_username}:${mongo_password}@cluster0-zrtwi.gcp.mongodb.net/crmdb?retryWrites=true&w=majority`;\n\
    \nconst client = new MongoClient(uri, { useNewUrlParser: true });\n```\n\n让我们分解这段代码，看看发生了什么以及我们还需要更改什么：\n\
    \n- 第 1 行添加了 MongoDB 客户端的依赖。正如我们之前讨论过的，Repl.it 通过为我们安装所有依赖使得事情变得简单，因此我们不必使用像 npm\
    \ 这样的工具手动操作。\n- 第 2 行和第 3 行，我们从之前设置的环境变量中检索 MongoDB 的用户名和密码。\n- 第 5 行有几个非常重要的细节我们需要正确处理。\n\
    \  - 将 @ 和下一个 / 之间的部分替换为我们从 MongoDB 复制的连接字符串中的相同部分。你可能会注意到字符串开头附近的冒号前后有 `${mongo_username}`\
    \ 和 `${mongo_password}`。这些称为模板字面量。模板字面量允许我们在字符串中放入变量，Node.js 会随后方便地用变量的实际值替换它们。\n\
    \  - 注意 / 之后和 ? 之前的 crmdb。这将是我们将使用的数据库的名称。如果数据库不存在，MongoDB 会为我们创建它。你可以根据你想要命名的数据库进行更改，但请记住你在本教程后续部分中更改成的名称。\n\
    - 第 6 行创建了我们将用于连接到数据库的客户端。\n\n### 制作一个插入客户数据的用户界面\n\n我们将制作一个 HTML 表单，用于捕获客户数据并将其发送到我们的\
    \ Repl.it 代码，然后插入到我们的数据库中。\n\n为了实际呈现和处理 HTML 表单，我们需要一种处理 HTTP GET 和 POST 请求的方法。最简单的方法是使用一个\
    \ Web 应用程序框架。Web 应用程序框架旨在支持 Web 应用程序的开发——它为你提供了一种构建应用程序的标准方式，让你无需编写样板代码就能快速开始构建应用程序。\n\
    \n一个非常简单、快速且灵活的 Node.js Web 应用程序框架是 Express<sup>181</sup>，它为 Web 应用程序的开发提供了一套强大的功能集。\n\
    \n我们需要做的第一件事是添加所需的依赖。在你的 index.js 文件最顶部（在 MongoDB 代码上方），添加以下几行：\n\n```\nlet express\
    \ = require('express');\nlet app = express();\nlet bodyParser = require('body-parser');\n\
    let http = require('http').Server(app);\n\napp.use(bodyParser.json())\napp.use(bodyParser.urlencoded({\
    \ extended: true }));\n```\n\n- 第 1 行添加了 Express 的依赖。Repl.it 会为我们处理安装。\n- 第 2\
    \ 行创建了一个新的 Express 应用程序，用于处理传入的请求。\n- 第 3 行添加了‘body-parser’的依赖。Express 服务器需要它来处理表单发送的数据，并以代码中有用的格式呈现给我们。\n\
    - 第 4 行添加了一个基本 HTTP 服务器的依赖。\n- 第 6 行和第 7 行告诉 Express 应用程序对传入的数据使用哪些解析器。这是处理表单数据所必需的。\n\
    \n接下来，我们需要添加一种让 Express 处理传入请求并为我们提供所需表单的方法。在你刚刚添加的代码下方，添加以下代码行：\n\n```\napp.get('/',\
    \ function (req, res) {\n  res.sendFile('/index.html', {root:'.'});\n});\n\napp.get('/create',\
    \ function (req, res) {\n  res.sendFile('/create.html', {root:'.'});\n});\n```\n\
    \n- app.get 告诉 Express 我们希望它处理一个 GET 请求。"
