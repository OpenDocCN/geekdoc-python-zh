    \ ☐）。\n\n## 自己动手\n\n对于本教程，自己操作这些步骤很重要，这样一切都能正确链接到你自己的GitHub账户。但如果你想要一个可以操作的示例，请使用下面这个。它与Flask应用相同，但可以动态问候单个用户，而不是静态的欢迎消息。\n\
    \n访问 https://cwr-06-github-garethdwyer1.repl.co/Gareth⁴⁷ 来查看实际效果（将URL的最后一部分替换为你自己的名字以接收个性化问候）。\n\
    \n你可以从 https://repl.it/@GarethDwyer1/cwr-06-github⁴⁸ 复刻我们的repl。\n\n## 下一步是什么\n\
    \n克隆仓库并能立即运行它们在许多场景下都很有用，从只是想尝试你发现的一个很酷的项目，到运行生产工作流。\n\n开源软件的存在仅仅是因为构建、维护和改进它的人。没有一个全球委员会决定谁可以成为开源软件开发者，你也可以成为其中一员。找一个你喜欢的项目，查看GitHub上的“Issues”选项卡，看看存在哪些问题，并尝试修复一个。GitHub上的许多问题都标有“Good\
