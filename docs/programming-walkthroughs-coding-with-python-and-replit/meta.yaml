  - "[PAGE 225]\n\nframework is designed to support the development of web applications\
    \ - it gives you a standard way to build your application and lets you get to\
    \ building your application fast without having to do the boilerplate code.\n\n\
    A really simple, fast and flexible Node.js web application framework is Express<sup>181</sup>,\
    \ which provides a robust set of features for the development of web applications.\n\
    \nThe first thing we need to do is add the dependencies we need. Right at the\
    \ top of your index.js file (above the MongoDB code), add the following lines:\n\
    \n```\n1 let express = require('express');\n2 let app = express();\n3 let bodyParser\
    \ = require('body-parser');\n4 let http = require('http').Server(app);\n5 \n6\
    \ app.use(bodyParser.json())\n7 app.use(bodyParser.urlencoded({ extended: true\
    \ }));\n```\n\n+   - Line 1 adds the dependency for Express. Repl.it will take\
    \ care of installing it for us.\n- Line 2 creates a new Express app that will\
    \ be needed to handle incoming requests.\n- Line 3 adds a dependency for ‘body-parser’.\
    \ This is needed for the Express server to be able to handle the data that the\
    \ form will send, and give it to us in a useful format to use in the code.\n-\
    \ Line 4 adds a dependency for a basic HTTP server.\n- Line 6 & 7 tell the Express\
    \ app which parsers to use on incoming data. This is needed to handle form data.\n\
    \nNext, we need to add a way for the Express to handle an incoming request and\
    \ give us the form that we want. Add the following lines of code below that which\
    \ you just added:\n\n```\n1 app.get('/', function (req, res) {\n2   res.sendFile('/index.html',\
    \ {root:'.'});\n3 });\n4 \n5 app.get('/create', function (req, res) {\n6   res.sendFile('/create.html',\
    \ {root:'.'});\n7 });\n```\n\n+   - app.get tells Express that we want it to handle\
    \ a GET request."
- md: "'/' tells Express that it should respond to GET requests sent to the root URL.\
    \ A root URL looks something like 'https://crm.hawkiesza.repl.co' - note that\
    \ there are no slashes after the URL.\n- '/create' tells Express that it should\
    \ respond to GET requests to /create after the root URL i.e. 'https://crm.hawkiesza.repl.co/create'\n\
    - res.sendFile tells Express to send the given file as a response.\n\nBefore the\
    \ server will start receiving requests and sending responses, we need to tell\
    \ it to run. Add the following code below the previous line.\n\n```\napp.set('port',\
    \ process.env.PORT || 5000);\nhttp.listen(app.get('port'), function() {\n    console.log('listening\
    \ on port', app.get('port'));\n});\n```\n\n- Line 1 tells Express to set the port\
    \ number to either a number defined as an environment variable, or 5000 if no\
    \ definition was made.\n- Line 2–4 tells the server to start listening for requests.\n\
    \nNow we have an Express server listening for requests, but we haven’t yet built\
    \ the form that it needs to send back if it receives a request. Make a new file\
    \ called index.html and paste the following code into it:\n\n```\n<!DOCTYPE html>\n\
    <html>\n<body>\n<form action=\"/create\" method=\"GET\">\n    <input type=\"submit\"\
    \ value=\"Create\">\n</form>\n\n</body>\n</html>\n```\n\nThis is just a simple\
    \ bit of HTML that puts a single button on the page. When this button is clicked\
    \ it sends a GET request to /create, which the server will then respond to according\
    \ to the code that we wrote above - in our case it will send back the create.html\
    \ file which we will define now. Make a new file called create.html and paste\
    \ the following into it:\n\n```\n<!DOCTYPE html>\n<html>\n<body>\n\n<h2>Customer\
    \ details</h2>\n\n<form action=\"/create\" method=\"POST\">\n  <label for=\"name\"\
    \ >Customer name *</label><br>\n  <input type=\"text\" id=\"name\" name=\"name\"\
    \ class=\"textInput\" placeholder=\"John Smith\" required>\n <br>\n  <label for=\"\
    address\" >Customer address *</label><br>\n  <input type=\"text\" name=\"address\"\
    \ class=\"textInput\" placeholder=\"42 Wallaby Way, Sydney\" required>\n <br>\n\
    \  <label for=\"telephone\" >Customer telephone *</label><br>\n  <input type=\"\
    text\" name=\"telephone\" class=\"textInput\" placeholder=\"+275554202\" required>\n\
    \ <br>\n  <label for=\"note\" >Customer note</label><br>\n  <input type=\"text\"\
    \ name=\"note\" class=\"textInput\" placeholder=\"Needs a new pair of shoes\"\
    >\n <br><br>\n  <input type=\"submit\" value=\"Submit\">\n</form>\n\n</body>\n\
    </html>\n```\n\nWe won’t go in-depth into the above HTML. It is a very basic form\
    \ with 4 fields (name, address, telephone, note) and a Submit button, which creates\
    \ an interface that will look like the one below.\n\n## Customer details\n\n|\
    \ 字段 | 值 |\n| --- | --- |\n| Customer name * | John Smith |\n| Customer address\
    \ * | 42 Wallaby Way, Sydney |\n| Customer telephone * | +275554202 |\n| Customer\
    \ note | Needs a new pair of shoes |\n| 提交按钮 | Submit |\n\nImage: 6 *Customer\
    \ Details*\n\nWhen the user presses the submit button a POST request is made to\
    \ /create with the data in the form - we still have to handle this request in\
    \ our code as we're currently only handling a GET request to /.\n\nIf you now\
    \ start up your application (click the “run” button) a new window should appear\
    \ on the right that displays the “create” button we defined just now in “create.html”.\
    \ You can also navigate to https://<repl_name>.<your_username>.repl.co (replace\
    \ <repl_name> with whatever you named your Repl (but with no underscores or spaces)\
    \ and <your_username> with your Repl username) to see the form. You will be able\
    \ to see this URL in your Repl itself.\n\n![](img/48efb5586f6da072fc1456bee6971293_229_0.png)\n\
    \nIf you select “create” and then fill in the form and hit submit, you’ll get\
    \ a response back that says Cannot POST /create. This is because we haven’t added\
    \ the code that handles the form POST request, so let’s do that.\n\n![](img/48efb5586f6da072fc1456bee6971293_229_1.png)\n\
    \nAdd the following code into your index.js file, below the app.get entry that\
    \ we made above.\n\n```javascript\napp.post('/create', function (req, res, next)\
    \ {\n    client.connect(err => {\n        const customers = client.db(\"crmdb\"\
    ).collection(\"customers\");\n\n        let customer = { name: req.body.name,\
    \ address: req.body.address, telephone: req.body.telephone, note: req.body.note\
    \ };\n\n        customers.insertOne(customer, function(err, res) {\n         \
    \   if (err) throw err;\n            console.log(\"1 customer inserted\");\n \
    \       });\n    })\n    res.send('Customer created');\n})\n```\n\n- **Line 1**\
    \ defines a new route that listens for an HTTP ‘POST’ request at /create.\n- **Line\
    \ 2** connects to the database. This happens asynchronously, so we define a callback\
    \ function that will be called once the connection is made.\n- **Line 3** creates\
    \ a new collection of customers. Collections in MongoDB are similar to Tables\
    \ in SQL.\n- **Line 5** defines customer data that will be inserted into the collection.\
    \ This is taken from the incoming request. The form data is parsed using the parsers\
    \ that we defined earlier and is then placed in the req.body variable for us to\
    \ use in the code.\n- **Line 6** inserts the customer data into the collection.\
    \ This also happens asynchronously, and so we define another callback function\
    \ that will get an error if an error occurred, or the response if everything happened\
    \ successfully.\n- **Line 7** throws an error if the above insert had a problem.\n\
    - **Line 8** gives us some feedback that the insert happened successfully.\n\n\
    If you now run the Repl (you may need to refresh it) and submit the filled-in\
    \ form, you’ll get a message back that says “Customer created”. If you then go\
    \ and look in your cluster in MongoDB and select the “collections” button, you’ll\
    \ see a document has been created with the details that we submitted in the form.\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_230_0.png)\n\n## Updating and deleting\
    \ database entries\n\nAs a final step in this tutorial, we want to be able to\
    \ update and delete database documents in our collection. To make things simpler,\
    \ we’re going to make a new HTML page where we can request a document and then\
    \ update or delete it.\n\nFirst, let’s make the routes to our new page. In your\
    \ index.js, add the following code below the rest of your routing code (ie. before\
    \ the MongoDB code):\n\n```\napp.get('/get', function (req, res) {\n  res.sendFile('/get.html',\
    \ {root:'.'});\n});\n\napp.get('/get-client', function (req, res) {\n    client.connect(err\
    \ => {\n        client.db(\"crmdb\").collection(\"customers\").findOne({name:\
    \ req.query.name}, function(err, result) {\n            if (err) throw err;\n\
    \            res.render('update', {oldname: result.name, oldaddress: result.address,\
    \ oldtelephone: result.telephone, oldnote: result.note, name: result.name, address:\
    \ result.address, telephone: result.telephone, note: result.note});\n        });\n\
    \    });\n});\n```\n\n- Line 1-3 as before, this tells Express to respond to incoming\
    \ GET requests on /get by sending the get.html file which we will define below.\n\
    - Line 5-12 this tells Express to respond to incoming GET requests on /get-client.\n\
    \    - Line 7 makes a call to the database to fetch a customer by name. If there\
    \ are more than 1 with the same name, then the first one found will be returned.\n\
    \    - Line 9 tells Express to render the update template, replacing variables\
    \ with the given values as it goes. Important to note here is that we are also\
    \ replacing values in the hidden form fields we created earlier with the current\
    \ values of the customer details. This is to ensure that we update or delete the\
    \ correct customer.\n\nIn your index.html file, add the following code after the\
    \ </form> tag:\n\n```\n<br>\n<form action=\"/get\" method=\"GET\">\n  <input type=\"\
    submit\" value=\"Update/Delete\">\n</form>\n```\n\nThis adds a new button that\
    \ will make a GET request to /get, which will then return get.html."
