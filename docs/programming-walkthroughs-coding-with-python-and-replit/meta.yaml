  md: '+   - Show how to set up and host a Django application using repl.it.

    - Show how to join existing APIs together to create a new service.


    By using this tutorial as a starting point, you can easily create your own bespoke
    web applications. Instead of showing weather data to your visitors, you could,
    for example, pull and combine data from any of the hundreds of APIs found at [this
    list of public APIs](https://github.com/toddmotto/public-apis)¹⁵⁰.


    # # Setting up


    You won’t need to install any software or programming languages on your local
    machine, as we’ll be developing our application directly through [repl.it](https://repl.it)¹⁵¹.
    Head over there and create an account.

    Press the + button in the top right to create a new project and search for “Django
    Template”. Give your project a name and press “Create repl”.


    ![](img/48efb5586f6da072fc1456bee6971293_197_0.png)


    By default, Django comes with a pretty complicated folder structure of existing
    files and folders. There’s also a README.md file that will open by default, giving
    you some guidance on how to find your way around.'
