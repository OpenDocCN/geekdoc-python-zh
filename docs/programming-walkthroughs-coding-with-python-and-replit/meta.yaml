    \n## 创建一个PyGame repl\n\n虽然 [PyGame](https://en.wikipedia.org/wiki/Pygame) 是一个标准的Python库，但Repl.it将其作为单独的语言提供安装。创建一个新的repl，并从语言下拉菜单中选择PyGame。\n\
