    # # Keeping our bot alive


    Your bot can now respond to messages, but only for as long as your Repl is running.
    If you close your browser tab or shut down your computer, your bot will stop and
    no longer respond to messages on Discord.


    Repl.it will keep your code running after you close the browser tab only if you
    are running a web server. Because we are using the Python discord.py library,
    our bot doesn’t require an explicit web server, but we can create a server and
    run it in a separate thread just to keep our Repl alive. We’ll do this using the
    Flask[^122] framework.


    Create a new file in your project called `keep_alive.py` and add the following
    code:


    [^122]: http://flask.pocoo.org/'
  merge: -1
