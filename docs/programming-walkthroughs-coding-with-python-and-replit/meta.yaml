    # Navigating to specific pieces of code


    Sometimes, especially in larger projects, you’ll call a function or instantiate
    an object far from where that function or object is defined (either thousands
    of lines away in the same file, or in a different file altogether).


    If you’re reading a piece of code that calls a function and you want to quickly
    see what that function actually does, you can use the **go to definition** keybinding
    (F12 or cmd+F12 on MacOS). This will jump to the definition of the function or
    class selected. The **peek definition** has a similar functionality, but instead
    of jumping to the definition, it opens in a separate modal. For example, below,
    the cursor is on the instantiation of Ball() and we can quickly see how this class
    is defined.'
