    # Building a game with PyGame and Repl.it


    ![](img/48efb5586f6da072fc1456bee6971293_70_0.png)


    So far, we’ve mainly seen how to write text-based programs, or those with a basic
    web front end. In this tutorial, we’ll instead build a 2D game using PyGame. You’ll
    use animated sprites and learn how to:


    +   - Make these sprites move

    - Recognise when a sprite is clicked with the mouse.


    The basic premise of the game is as follows. You’re a juggler, learning to juggle.
    Balls will fall down from the top of the screen, and you’ll need to click them
    to ‘throw’ them up again. After several successful throws without dropping any
    balls, more balls will be added to make the game harder.


    # Creating a PyGame repl


    Although [PyGame](https://en.wikipedia.org/wiki/Pygame) is a standard Python library,
    Repl.it provides it installed as a separate language. Create a new repl and select
    PyGame from the language dropdown.


