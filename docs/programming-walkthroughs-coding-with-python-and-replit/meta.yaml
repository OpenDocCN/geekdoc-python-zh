  md: "+   - Spacing matters. Make sure that you don't add any spaces before or after\
    \ the = sign\n\nNow that we have credentials set up for the database, we can move\
    \ on to connecting to it in our code.\n\nMongoDB is kind enough to provide a client\
    \ that we can use. To test out our database connection, we're going to insert\
    \ some customer data into our database. In your index.js file (created automatically\
    \ and found under the Files pane), add the following code:\n\n```\n1  const MongoClient\
    \ = require('mongodb').MongoClient;\n2  const mongo_username = process.env.MONGO_USERNAME\n\
    3  const mongo_password = process.env.MONGO_PASSWORD\n4  \n5  const uri = `mongodb+srv://${mongo_username}:${mongo_password}@cluster0-zrtwi.gcp.mongodb.net/crmdb?retryWrites=true&w=majority`;\n\
    6  \n7  const client = new MongoClient(uri, { useNewUrlParser: true });\n```\n\
    \nLet's break this down to see what is going on and what we still need to change:\n\
    \n+   - Line 1 adds the dependency for the MongoDB Client. As we have discussed\
    \ before, Repl.it makes things easy by installing all the dependencies for us,\
    \ so we don't have to use something like npm to do it manually.\n- Line 2 & 3\
    \ we retrieve our MongoDB username and password from the environment variables\
    \ that we set up earlier.\n- Line 5 has a few very important details that we need\
    \ to get right.\n  - Replace the section between the @ and the next / with the\
    \ same section of your connection string from MongoDB that we copied earlier.\
    \ You may notice the ${mongo_username} and ${mongo_password} before and after\
    \ the colon near the beginning of the string. These are called Template Literals.\
    \ Template Literals allow us to put variables in a string, which Node.js will\
    \ then helpfully replace with the actual values of the variables.\n  - Note crmdb\
    \ after the / and before the ?. This will be the name of the database that we\
    \ will be using. MongoDB creates the database if it doesn't exist for us. You\
    \ can change this to whatever you want to name the database, but remember what\
    \ you changed it to for future sections of this tutorial.\n- Line 6 creates the\
    \ client that we will use to connect to the database.\n\n# ## Making a user interface\
    \ to insert customer data\n\nWe're going to make an HTML form that will capture\
    \ the customer data and send it to our Repl.it code, which will then insert it\
    \ into our database.\n\nIn order to actually present and handle an HTML form,\
    \ we need a way to process HTTP GET and POST requests. The easiest way to do this\
    \ is to use a web application framework. A web application"
