    a popular way to visualise large amounts of text. Words that appear more frequently
    in the given text are larger, and less common words are smaller or not shown at
    all.


    In this tutorial, we’ll build a web application using Python and Flask that transforms
    the latest news stories into word clouds and displays them to our visitors.


    At the end of this tutorial, our users will see a page similar to the one shown
    below, but containing the latest news headlines from BBC news. We’ll learn some
    tricks about web scraping, RSS feeds, and building image files directly in memory
    along the way.


    ![](img/48efb5586f6da072fc1456bee6971293_152_0.png)


