  md: '![](img/48efb5586f6da072fc1456bee6971293_223_0.png)


    # Creating a Repl and connecting to our Database


    First, we need to create a new Node.js Repl to write the code necessary to connect
    to our shiny new Database. Navigate to repl.it and create a new Repl, selecting
    “Node.js” as the language.


    A great thing about Repl is that it makes projects public by default. This makes
    it easy to share and is great for collaboration and learning, but we have to be
    careful not to make our database credentials available on the open Internet.


    To solve this problem, we’ll be using `environment variables`, as we have done
    in previous tutorials. We’ll create a special file that Repl.it recognizes and
    keeps private for you, and in that file we declare variables that become part
    of our Repl.it development environment and are accessible in our code.


    In your Repl, create a file called `.env` by selecting “Files” in the left-hand
    pane and then clicking the “Add File” button. Note that the spelling has to be
    exact or the file will not be recognized. Add your MongoDB database username and
    password (not your login details to MongoDB Atlas) into the file in the below
    format:


    ```

    1 MONGO_USERNAME=username

    2 MONGO_PASSWORD=password

    ```


    +   - **Replace** `username` and `password` with your database username and password'
