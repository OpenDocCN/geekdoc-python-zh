- md: "## Building a game with PyGame and Repl.it\n\nSo far, we’ve mainly seen how\
    \ to write text-based programs, or those with a basic web front end. In this tutorial,\
    \ we’ll instead build a 2D game using PyGame. You’ll use animated sprites and\
    \ learn how to:\n\n- Make these sprites move\n- Recognise when a sprite is clicked\
    \ with the mouse.\n\nThe basic premise of the game is as follows. You’re a juggler,\
    \ learning to juggle. Balls will fall down from the top of the screen, and you’ll\
    \ need to click them to ‘throw’ them up again. After several successful throws\
    \ without dropping any balls, more balls will be added to make the game harder.\n\
    \n## Creating a PyGame repl\n\nAlthough [PyGame](https://en.wikipedia.org/wiki/Pygame)\
    \ is a standard Python library, Repl.it provides it installed as a separate language.\
    \ Create a new repl and select PyGame from the language dropdown.\n\n> https://en.wikipedia.org/wiki/Pygame\n\
    \nYou'll see \"Python3 with PyGame\" displayed in the default console and a separate\
    \ pane in the Repl.it IDE where you will be able to see and interact with the\
    \ game you will create.\n\nThe first thing we need is a so-called \"sprite\",\
    \ which is a basic image file that we will use in our game. Download the tennis\
    \ ball file available here⁵⁰ and save it to your local machine.\n\nNow upload\
    \ it to your repl using the upload file button and you should be able to see a\
    \ preview of the image by clicking on it in the files pane.\n\n> ⁵⁰https://raw.githubusercontent.com/ritza-co/public-images/master/small_tennis.png\n\
    \n## Displaying the sprite using PyGame\n\nOur first goal is to display the tennis\
    \ ball in a game environment using PyGame. To do this, go back to the main.py\
    \ file and add the following code.\n\n```python\nimport pygame\n\nWIDTH = 800\n\
    HEIGHT = 600\nBACKGROUND = (0, 0, 0)\n\nclass Ball:\n    def __init__(self):\n\
    \        self.image = pygame.image.load(\"small_tennis.png\")\n        self.rect\
    \ = self.image.get_rect()\n\ndef main():\n    pygame.init()\n    screen = pygame.display.set_mode((WIDTH,\
    \ HEIGHT))\n    clock = pygame.time.Clock()\n    ball = Ball()\n\n    while True:\n\
    \        screen.fill(BACKGROUND)\n        screen.blit(ball.image, ball.rect)\n\
    \        pygame.display.flip()\n        clock.tick(60)\n\nif __name__ == \"__main__\"\
    :\n    main()\n```\n\nThis code looks a bit more complicated than it needs to\
    \ be because in addition to drawing the ball to the screen, it also sets up a\
    \ game loop. While basic 2D games appear to move objects around the screen, they\
    \ usually actually simulate this effect by redrawing the entire screen many times\
    \ per second. To account for this we need to run our logic in a `while True:`\
    \ loop.\n\nWe start by importing PyGame and setting up some global variables:\
    \ the size of our screen and the background color (black). We then define our\
    \ `Ball`, setting up an object that knows where to find the image for the ball\
    \ and how to get the default coordinates of where the image should be drawn.\n\
    \nWe then set up PyGame by calling `init()` and starting the screen as well as\
    \ a clock. The clock is necessary because each loop might take a different amount\
    \ of time, based on how much logic needs to run to calculate the new screen. PyGame\
    \ has built-in logic to calculate how much time elapses between calls to `clock.tick()`\
    \ to draw frames faster or slower as necessary to keep the game experience smooth.\n\
    \nWe start the game loop and call `blit` on our ball. Blitting<sup>51</sup> refers\
    \ to moving all of the pixels from our sprite file (the tennis ball) to our game\
    \ environment. The `flip()` function updates our screen and the `tick(60)` call\
    \ means that our game will redraw the screen around 60 times per second.\n\nIf\
    \ you run this code, you should see the ball pop up in the top right pane, as\
    \ shown below.\n\n<sup>51</sup>https://en.wikipedia.org/wiki/Bit_blit\n\n## Making\
    \ our tennis ball move with each frame\n\nAlthough PyGame has a lot of built-in\
    \ logic for handling common game operations, you still need to get your hands\
    \ dirty with calculating some of the basic movements. For every loop, we need\
    \ to tell our game the new X and Y coordinates to draw the ball. As we want our\
    \ ball to move at a constant speed, we'll move the X and Y coordinates each loop.\n\
    \nAdd two methods to your Ball class: update and move, and add a speed attribute.\
    \ The new code for your Ball class should look as follows.\n\n```python\nclass\
    \ Ball:\n    def __init__(self):\n        self.image = pygame.image.load(\"small_tennis.png\"\
    )\n        self.speed = [0, 1]\n        self.rect = self.image.get_rect()\n\n\
    \    def update(self):\n        self.move()\n\n    def move(self):\n        self.rect\
    \ = self.rect.move(self.speed)\n```\n\nNow modify your game loop to include a\
    \ call to the new update() method. The loop should look as follows.\n\n```python\n\
    while True:\n    screen.fill(BACKGROUND)\n    screen.blit(ball.image, ball.rect)\n\
    \    ball.update()\n    pygame.display.flip()\n    clock.tick(60)\n```\n\nThe\
    \ (0, 1) tuple causes the ball to move its Y coordinate by 1 each loop and keep\
    \ a constant X coordinate. This has the effect of making the ball drop slowly\
    \ down the screen. Run your code again to check that this works.\n\nclick to open\
    \ gif<sup>52</sup>\n\nWhen the ball gets to the bottom of the screen, it’ll just\
    \ keep falling but that’s OK for now. Let’s see how we can add click detection.\n\
    \n<sup>52</sup>https://i.ritzastatic.com/repl/codewithrepl/07-pygame/07-05-GIF-falling-ball.gif\n\
    \n## Processing events: Detecting mouse clicks\n\nPyGame records all “events”,\
    \ including mouse clicks, and makes these available through `pygame.event.get()`.\
    \ We need to check what events happened in each game loop and see if any of them\
    \ were important.\n\nIf the user clicks on an empty space, that will still be\
    \ recorded but we will simply ignore it. If the user clicks on a falling ball,\
    \ we want it to change direction.\n\nTo achieve this, add a `for` loop inside\
    \ the existing `while` loop. The entire game loop should look as follows:\n\n\
    ```python\nwhile True:\n    for event in pygame.event.get():\n        if event.type\
    \ == pygame.MOUSEBUTTONDOWN:\n            if ball.rect.collidepoint(pygame.mouse.get_pos()):\n\
    \                ball.speed = [0, -1]\n    screen.fill(BACKGROUND)\n    screen.blit(ball.image,\
    \ ball.rect)\n    ball.update()\n    pygame.display.flip()\n    clock.tick(60)\n\
    ```\n\nWith this code, we loop through all events and check for left click (`MOUSEBUTTONDOWN`)\
    \ events. If we find one, we check if the click happened on top of the ball (using\
    \ `collidepoint()` which checks for overlapping coordinates), and in this case\
    \ we reverse the direction of the ball (still no x-axis or horizontal movement,\
    \ but we make the ball move negatively on the y-axis, which is up.)\n\nIf you\
    \ run this code again, you should now be able to click on the ball (let it fall\
    \ for a while first) and see it change direction until it goes off the top of\
    \ the screen.\n\n## Making the ball bounce off the edges and move randomly\n\n\
    To simulate juggling, we want the ball to bounce off the “roof” (top edge of the\
    \ screen) and “walls” (left and right edge). If the ball touches the “floor” (bottom\
    \ edge) we want to kill it and remove it from the game as a dropped ball.\n\n\
    To achieve this, we’ll add logic to our `update()` method (this is why we kept\
    \ it separate from our `move()` method before). Add two lines of code to `update()`\
    \ to make it look as follows.\n\n```python\ndef update(self):\n    if self.rect.top\
    \ < 0:\n        self.speed = [0, 1]\n    self.move()\n```\n\nThis checks to see\
    \ if the top of the ball is above the top of the screen. If it is, we set the\
    \ speed back to (0, 1) (moving down).\n\n*click to open gif*<sup>53</sup>\n\n\
