- md: 'Happy hacking!


    If you’re stuck for ideas, why not link up your Discord bot to the [Twitch API](https://dev.twitch.tv/)
    to get notified when your favourite streamers are online, or build a [text adventure](https://en.wikipedia.org/wiki/Interactive_fiction).


    In the next chapter, we’ll build exactly the same bot again but using NodeJS instead
    of Python. Even if you prefer Python, it’s often a good idea to build the same
    project in two languages so that you can better appreciate the differences and
    similarities.


    ## Building a Discord bot with Node.js and Repl.it


    In this tutorial, we’ll use [Repl.it](https://repl.it) and Node.js to build a
    Discord Chatbot. If you’re reading this tutorial, you probably have at least heard
    of Discord and likely have an existing account. If not, Discord is a VoIP and
    Chat application that is designed to replace Skype for gamers. The bot we create
    in this tutorial will be able to join a Discord server and respond to messages
    sent by people.


    If you don’t like JavaScript, there’s also a Python version of this tutorial in
    the previous chapter.


    You’ll find it easier to follow along if you have some JavaScript knowledge and
    have used Discord or a similar app such as Skype or Telegram before. We won’t
    be covering the very basics of JavaScript, but we will explain each line of code
    in detail, so if you have any experience with programming, you should be able
    to follow along.


    ### Overview and requirements


    We’ll be doing all of our coding through the Repl.it web IDE and hosting our bot
    with Repl.it as well, so you won’t need to install any additional software on
    your machine. For this tutorial you will need to create a [Discord](https://discordapp.com/)
    account (if you already have one, you can skip this). There are instructions for
    how to do this in the next section.


    In this tutorial, we will be covering:


    - Creating an application and a bot user in your Discord account

    - Creating a server on Discord

    - Adding our bot to our Discord server


    Let’s get through these admin steps first and then we can get to the fun part
    of coding our bot.


    ### Creating a bot in Discord and getting a token


    You can sign up for a free account over at [the Discord register page](https://discordapp.com/register),
    and can download one of their desktop or mobile applications from [the Discord
    homepage](https://discordapp.com/). You can also use Discord in the browser.


    Once you have an account, you’ll want to create a Discord application. Visit [the
    Discord developer’s page](https://discordapp.com/developers/applications/) and
    press the “New application” button, as in the image below.


    ![Creating a new Discord application](img/48efb5586f6da072fc1456bee6971293_184_0.png)


    Fill out a name for your bot and select “Create”.

    The first thing to do on the next page is to note your Client ID, which you’ll
    need to add the bot to the server. You can come back later and get it from this
    page, or copy it somewhere where you can easily find it later.


    ![Record your Client ID](img/48efb5586f6da072fc1456bee6971293_184_1.png)


    You can also rename the application and provide a description for your bot at
    this point and press “Save Changes”.

    You have now created a Discord application. The next step is to add a bot to this
    application, so head over to the “Bot” tab using the menu on the left and press
    the “Add Bot” button, as indicated below.

    Click “Yes, do it” when Discord asks if you’re sure about bringing a new bot to
    life.


    ![Adding a bot](img/48efb5586f6da072fc1456bee6971293_185_0.png)


    The last thing we’ll need from our bot is a Token. Anyone who has the bot’s token
    can prove that they own the bot, so you’ll need to be careful not to share this
    with anyone. You can get the token by pressing “Click to Reveal Token”, or copy
    it to your clipboard without seeing it by pressing “Copy”.


    ![Bot Token](img/48efb5586f6da072fc1456bee6971293_185_1.png)


    Take note of your token or copy it to your clipboard, as we’ll need to add it
    to our code soon.


    ### Creating a Discord server


    If you don’t have a Discord server to add your bot to, you can create one by either
    opening the desktop Discord application that you downloaded earlier or returning
    to the Discord home page in your browser. Press the “+” icon indicated by the
    exclamation mark, as shown below, to create a server.


    ![Creating a Discord server](img/48efb5586f6da072fc1456bee6971293_186_0.png)


    Press “Create a server” in the screen that follows, and then give your server
    a name. Once the server is up and running, you can chat with yourself, or invite
    some friends to chat with you. Soon we’ll invite our bot to chat with us as well.


    ### Adding your Discord bot to your Discord server


    Our Discord bot is still just a shell at this stage as we haven’t written any
    code to allow him to do anything, but let’s go ahead and add him to our Discord
    server anyway. To add a bot to your server, you’ll need the Client ID from the
    “General Information” page that we looked at before when we created our ReplBotApplication
    (ie. the client ID, not the secret bot Token).


    Create a URL that looks as follows, but using your Client ID instead of mine at
    the end: `https://discordapp.com/api/oauth2/authorize?scope=bot&client_id=746269162917331028`


    Visit the URL that you created in your web browser and you’ll see a page similar
    to the following where you can choose which server to add your bot to.


    ![Authorizing our bot to join our server](img/48efb5586f6da072fc1456bee6971293_187_0.png)


    Select the server we created in the step before this and hit the “authorize” button.
    After completing the captcha, you should get an in-app Discord notification telling
    you that your bot has joined your server.


    Now we can get to the fun part of building a brain for our bot!


    ### Creating a Repl and installing our Discord dependencies


    The first thing we need to do is create a Node.js Repl to write the code for our
    Discord bot. Over at [repl.it](https://repl.it), create a new Repl, choosing “Node.js”
    as your language.


    We don’t need to reinvent the wheel as there is already a great Node wrapper for
    the Discord bot API called [discord.js](https://discord.js.org/). Normally we
    would install this third-party library through [npm](https://www.npmjs.com/),
    but because we’re using Repl.it, we can skip the installation. Our Repl will automatically
    pull in all dependencies.


    In the default `index.js` file that is included with your new Repl, add the following
    line of code.


    ```javascript

    const Discord = require(''discord.js'');

    ```


    Press the “Run” button and you should see Repl.it installing the Discord library
    in the output pane on the right, as in the image below.


    ![Installing discord.js](img/48efb5586f6da072fc1456bee6971293_188_0.png)


    Our bot is nearly ready to go – but we still need to plug in our secret token.
    This will authorize our code to control our bot.


    ### Setting up authorization for our bot


    By default, Repl code is public. This is great as it encourages collaboration
    and learning, but we need to be careful not to share our secret bot token (which
    gives anyone who has access to it full control of our bot).


    To get around the problem of needing to give our *code* access to the token while
    allowing others to access our code but *not* our token, we''ll be using [environment
    variables](https://www.digitalocean.com/community/tutorials/how-to-read-and-set-environmental-and-shell-variables-on-a-linux-vps).
    On a normal machine, we''d set these directly on our operating system, but using
    Repl.it we don''t have access to this. Repl.it allows us to set secrets in environment
    variables through a special `.env` file.


    First, we need to create a new file called exactly `.env`. Select "Add file" and
    name this file `.env`. It is important not to leave out the `.` at the beginning.
    Open this new file and add a variable to define your bot''s secret token (note
    that this is the second token that we got while setting up the bot – different
    from the Client ID that we used to add our bot to our server). It should look
    something like:


    ```

    DISCORD_BOT_SECRET=NDcUN5T3ZzcTjMYOM0Y1MTUy.Dk7JBw.ihrTSAO1GKHZSonqvuhtwta16WU

    ```


