  md: '# Working with Files using Repl.it


    In this lesson, you''ll gain experience with using and manipulating files using
    Repl.it. In the previous lesson you saw how to add new files to a project, but
    there''s a lot more you can do.


    Files can be used for many different things. In programming, you''ll primarily
    use them to store data or code. Instead of manually creating files and entering
    data, you can also use your programs to create files and automatically write data
    to these.


    Repl.it also offers functionality to mass import or export files from or to the
    IDE; this is useful in cases when your program writes data to multiple files and
    you want to export all of these for use in another program.


    # Working with files using Python


    Create a new Python repl and call it `working-with-files`.


    ![](img/48efb5586f6da072fc1456bee6971293_22_0.png)


    As before, you''ll get a default repl project with a `main.py` file. We need a
    data file to practise reading data programmatically.'
