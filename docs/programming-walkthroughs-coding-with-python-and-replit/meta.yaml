    # Duplicating entire lines


    Sometimes you need two very similar lines of code directly after each other. Instead
    of copying and pasting the line or typing it out again, you can use the *duplicate
    row* feature, which will replicate the current line either above or below.


    For example, our juggling project includes the following code to instantiate the
    initial three balls.


    ```

    python

    ball1 = Ball()

    ball2 = Ball()

    ball3 = Ball()

    ```


    Instead of typing out all three lines, you can type out the first one, leave your
    cursor position on that line, and press Shift+Alt+down (shift+option+down on MacOS)
    twice. This will create two copies of the line, directly below the original one,
    and then you can simply change the number in the variable to account for the second
    two balls.'
