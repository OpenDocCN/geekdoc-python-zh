  md: '# # Where next?


    We''ve completed the basics of web scraping and have looked at how the web works,
    how to extract information from web pages, and how to do some very basic text
    extraction. You will probably want to do something other than extract words from
    BBC! You can fork this Repl from https://repl.it/@GarethDwyer1/beginnerwebscraping
    and modify it to change which site it scrapes and what content it extracts. You
    can also join the Repl Discord Server to chat with other developers who are working
    on similar projects and who will happily exchange ideas with you or help if you
    get stuck.


    We have walked through a very flexible method of web scraping, but it’s the “quick
    and dirty” way. If BBC updates their website and some of our assumptions (e.g.
    that news URLs will end with a number) break, our web scraper will also break.


    Once you’ve done a bit of web scraping, you’ll notice that the same patterns and
    problems come up again and again. Because of this, there are many frameworks and
    other tools that solve these common problems (finding all the URLs on the page,
    extracting text from the other code, dealing with changing web sites, etc), and
    for any big web scraping project, you’ll definitely want to use these instead
    of starting from scratch.


    Some of the best Python web scraping tools are:


    +   - Scrapy: A framework used by people who want to scrape millions or even billions
    of web pages. Scrapy lets you build “spiders” – programmatic robots that move
    around the web at high speed, gathering data based on rules that you specify.

    - Newspaper: we touched on how it was difficult to separate the main text of an
    online news article from all the other content on the page (headers, footers,
    adverts, etc). This problem is an incredibly difficult one to solve. Newspaper
    uses a combination of manually specified rules and some clever algorithms to remove
    the “boilerplate” or non-core text from each article.

    - Selenium: we scraped some basic content without using a web browser, and this
    works fine for images and text. Many parts of the modern web are dynamic though
    – e.g. they only load when you scroll down a page far enough or click on a button
    to reveal more content. These dynamic sites are challenging to scrape, but Selenium
    allows you to fire up a real web browser and control it just as a human would
    (but automatically), and this allows you to access this kind of dynamic content.


    There is no shortage of other tools, and a lot can be done simply by using them
    in combination with each other. Web scraping is a vast world that we’ve only just
    touched on, but we’ll explore some more web scraping use cases in the next chapter,
    in particular, building news word clouds.


