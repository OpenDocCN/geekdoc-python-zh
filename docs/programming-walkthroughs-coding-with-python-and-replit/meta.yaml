    \n机器学习分类器可以被“训练”。我们给它标记好的数据，它会尝试基于这些数据学习规则。每次获得更多数据时，它会略微更新其规则以适应新信息。分类器有很多种，但最简单的一种叫做决策树。\n\
    \n决策树通过将决策构建到树结构中来学习一组是/否规则。每个新输入沿着树向下移动，同时逐一提出各种问题。当输入一路过滤到树中的一个叶节点时，它就获得了一个标签。\n\
    \n如果这让你感到困惑，别担心！我们很快会通过一个详细的例子和图示来澄清。首先，让我们展示如何使用 Python 获得一些结果。\n\n将以下几行添加到 `main.py`：\n\
    \n```\nclassifier = tree.DecisionTreeClassifier()\nclassifier.fit(training_vectors,\
