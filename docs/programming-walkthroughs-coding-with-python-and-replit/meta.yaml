    \n![](img/48efb5586f6da072fc1456bee6971293_196_0.png)\n\n在本教程中，我们将使用Django创建一个在线服务，向访问者显示他们当前的天气和位置。我们将开发该服务并使用repl.it进行托管。\n\
    \n要学习本教程，理想情况下你应该具备Python的基础知识以及一些Web应用开发知识。但是，我们会详细解释所有的推理和每一行代码，因此即使你没有任何编程经验，作为一个完全的Python或Web应用新手，你也应该能够跟着学习。我们还将使用一些HTML、JavaScript和jQuery，所以如果你之前接触过这些，学习起来会更快。如果没有，这是一个绝佳的起点。\n\
