  - '[PAGE 219]


    # Building a CRM app with NodeJS, Repl.it, and MongoDB


    In this tutorial, we’ll use NodeJS on Repl.it, along with a MongoDB database to
    build a basic CRUD<sup>175</sup> (Create, Read, Update, Delete) CRM<sup>176</sup>
    (Customer Relationship Management) application. A CRM lets you store information
    about customers to help you track the status of every customer relationship. This
    can help businesses keep track of their clients and ultimately increase sales.
    The application will be able to store and edit customer details, as well as keep
    notes about them.


    This tutorial won’t be covering the basics of Node.js, but each line of code will
    be explained in detail.


    # Overview and requirements


    All of the code will be written and hosted in Repl.it, so you won’t need to install
    any additional software on your computer. In this tutorial, we’ll be covering:


    +   - Creating an account on MongoDB Atlas<sup>177</sup>

    - Connecting our database to our Repl

    - Creating a user interface to insert customer data

    - Updating and deleting database entries


    By the end of the tutorial, the application you will have created will be able
    to create, update, and delete documents in a MongoDB database. You will also have
    used a web application framework called Express<sup>178</sup> and the Pug<sup>179</sup>
    templating engine.


    # Creating an account on MongoDB Atlas


    MongoDB Atlas is a fully managed Database-as-a-Service. It provides a document
    database (often referred to as NoSQL), as opposed to a more traditional relational
    database like PostgreSQL.


    Head over to MongoDB Atlas<sup>180</sup> and hit the “Try free” button. You should
    then sign up, clicking the “Get started free” button to complete the process.


    <sup>175</sup>https://en.wikipedia.org/wiki/Create,_read,_update_and_delete

    <sup>176</sup>https://en.wikipedia.org/wiki/Customer_relationship_management

    <sup>177</sup>https://www.mongodb.com/cloud/atlas

    <sup>178</sup>https://expressjs.com/

    <sup>179</sup>https://pugjs.org/api/getting-started.html

    <sup>180</sup>https://www.mongodb.com/cloud/atlas'
- md: "After signing up, under “Shared Clusters”, press the “Create a Cluster” button.\
    \ You now have to select a provider and a region. For the purposes of this tutorial,\
    \ we chose Google Cloud Platform as the provider and Iowa (us-central1) as the\
    \ region, although it should work regardless of the provider and region.\n\n![](img/48efb5586f6da072fc1456bee6971293_220_0.png)\n\
    \nUnder “Cluster Name” you can change the name of your cluster. Note that you\
    \ can only change the name now - it can’t be changed once the cluster is created.\
    \ After you’ve done that, click “Create Cluster”.\n\n![](img/48efb5586f6da072fc1456bee6971293_220_1.png)\n\
    \nAfter a bit of time, your cluster will be created. Once it’s available, click\
    \ on “Database Access” under the Security heading in the left-hand column and\
    \ then click “Add New Database User”. You need a database user to actually store\
    \ and retrieve data. Enter a username and password for the user and make a note\
    \ of those details - you’ll need them later. Select “Read and write to any database”\
    \ as the user privilege. Hit “Add User” to complete this step.\n\n![](img/48efb5586f6da072fc1456bee6971293_221_0.png)\n\
    \nNext, you need to allow network access to the database. Click on “Network Access”\
    \ in the left-hand column, and “Add IP Address”. Because we won’t have a static\
    \ IP from Repl.it, we’re just going to allow access from anywhere - don’t worry,\
    \ the database is still secured with the username and password you created earlier.\
    \ In the popup, click “Allow Access From Anywhere” and then “Confirm”.\n\n## Add\
    \ Whitelist Entry\n\nAdd a whitelist entry using either CIDR notation or a single\
    \ IP address. [Learn more.](https://example.com)\n\n![Button: ADD CURRENT IP ADDRESS](https://example.com)\
    \ ![Button: ALLOW ACCESS FROM ANYWHERE](https://example.com)\n\n**Whitelist Entry:**\n\
    \n```\ninput\n0.0.0.0/0\n```\n\n**Comment:**\n\n```\ninput\nOptional comment describing\
    \ this entry\n```\n\n☐ Save as temporary whitelist\n\n![Button: Cancel](https://example.com)\
    \ ![Button: Confirm](https://example.com)\n\n![](img/48efb5586f6da072fc1456bee6971293_222_0.png)\n\
    \nNow select “Clusters”, under “Data Storage” in the left-hand column. Click on\
    \ “Connect” and select “Connect Your Application”. This will change the pop-up\
    \ view. Copy the “Connection String” as you will need it shortly to connect to\
    \ your database from Repl.it. It will look something like this:\n\n```\nmongodb+srv://<username>:<password>@cluster0-zrtwi.gcp.mongodb.net/test?retryWrites=true&w=majority\n\
    ```\n\n![](img/48efb5586f6da072fc1456bee6971293_223_0.png)\n\n## Creating a Repl\
    \ and connecting to our Database\n\nFirst, we need to create a new Node.js Repl\
    \ to write the code necessary to connect to our shiny new Database. Navigate to\
    \ repl.it and create a new Repl, selecting “Node.js” as the language.\n\nA great\
    \ thing about Repl is that it makes projects public by default. This makes it\
    \ easy to share and is great for collaboration and learning, but we have to be\
    \ careful not to make our database credentials available on the open Internet.\n\
    \nTo solve this problem, we’ll be using environment variables, as we have done\
    \ in previous tutorials. We’ll create a special file that Repl.it recognizes and\
    \ keeps private for you, and in that file we declare variables that become part\
    \ of our Repl.it development environment and are accessible in our code.\n\nIn\
    \ your Repl, create a file called .env by selecting “Files” in the left-hand pane\
    \ and then clicking the “Add File” button. Note that the spelling has to be exact\
    \ or the file will not be recognized. Add your MongoDB database username and password\
    \ (not your login details to MongoDB Atlas) into the file in the below format:\n\
    \n```\nMONGO_USERNAME=username\nMONGO_PASSWORD=password\n```\n\n- Replace username\
    \ and password with your database username and password\n- Spacing matters. Make\
    \ sure that you don't add any spaces before or after the = sign\n\nNow that we\
    \ have credentials set up for the database, we can move on to connecting to it\
    \ in our code.\n\nMongoDB is kind enough to provide a client that we can use.\
    \ To test out our database connection, we're going to insert some customer data\
    \ into our database. In your index.js file (created automatically and found under\
    \ the Files pane), add the following code:\n\n```\nconst MongoClient = require('mongodb').MongoClient;\n\
    const mongo_username = process.env.MONGO_USERNAME\nconst mongo_password = process.env.MONGO_PASSWORD\n\
    \nconst uri = `mongodb+srv://${mongo_username}:${mongo_password}@cluster0-zrtwi.gcp.mongodb.net/crmdb?retryWrites=true&w=majority`;\n\
    \nconst client = new MongoClient(uri, { useNewUrlParser: true });\n```\n\nLet's\
    \ break this down to see what is going on and what we still need to change:\n\n\
    - Line 1 adds the dependency for the MongoDB Client. As we have discussed before,\
    \ Repl.it makes things easy by installing all the dependencies for us, so we don't\
    \ have to use something like npm to do it manually.\n- Line 2 & 3 we retrieve\
    \ our MongoDB username and password from the environment variables that we set\
    \ up earlier.\n- Line 5 has a few very important details that we need to get right.\n\
    \  - Replace the section between the @ and the next / with the same section of\
    \ your connection string from MongoDB that we copied earlier. You may notice the\
    \ ${mongo_username} and ${mongo_password} before and after the colon near the\
    \ beginning of the string. These are called Template Literals. Template Literals\
    \ allow us to put variables in a string, which Node.js will then helpfully replace\
    \ with the actual values of the variables.\n  - Note crmdb after the / and before\
    \ the ?. This will be the name of the database that we will be using. MongoDB\
    \ creates the database if it doesn't exist for us. You can change this to whatever\
    \ you want to name the database, but remember what you changed it to for future\
    \ sections of this tutorial.\n- Line 6 creates the client that we will use to\
    \ connect to the database.\n\n### Making a user interface to insert customer data\n\
    \nWe're going to make an HTML form that will capture the customer data and send\
    \ it to our Repl.it code, which will then insert it into our database.\n\nIn order\
    \ to actually present and handle an HTML form, we need a way to process HTTP GET\
    \ and POST requests. The easiest way to do this is to use a web application framework.\
    \ A web application framework is designed to support the development of web applications\
    \ - it gives you a standard way to build your application and lets you get to\
    \ building your application fast without having to do the boilerplate code.\n\n\
    A really simple, fast and flexible Node.js web application framework is Express<sup>181</sup>,\
    \ which provides a robust set of features for the development of web applications.\n\
    \nThe first thing we need to do is add the dependencies we need. Right at the\
    \ top of your index.js file (above the MongoDB code), add the following lines:\n\
    \n```\nlet express = require('express');\nlet app = express();\nlet bodyParser\
    \ = require('body-parser');\nlet http = require('http').Server(app);\n\napp.use(bodyParser.json())\n\
    app.use(bodyParser.urlencoded({ extended: true }));\n```\n\n- Line 1 adds the\
    \ dependency for Express. Repl.it will take care of installing it for us.\n- Line\
    \ 2 creates a new Express app that will be needed to handle incoming requests.\n\
    - Line 3 adds a dependency for ‘body-parser’. This is needed for the Express server\
    \ to be able to handle the data that the form will send, and give it to us in\
    \ a useful format to use in the code.\n- Line 4 adds a dependency for a basic\
    \ HTTP server.\n- Line 6 & 7 tell the Express app which parsers to use on incoming\
    \ data. This is needed to handle form data.\n\nNext, we need to add a way for\
    \ the Express to handle an incoming request and give us the form that we want.\
    \ Add the following lines of code below that which you just added:\n\n```\napp.get('/',\
    \ function (req, res) {\n  res.sendFile('/index.html', {root:'.'});\n});\n\napp.get('/create',\
    \ function (req, res) {\n  res.sendFile('/create.html', {root:'.'});\n});\n```\n\
    \n- app.get tells Express that we want it to handle a GET request."
