    \nIf you’re stuck for ideas, some possible extensions are:\n\n- Make the page\
    \ look nicer by using [Bootstrap](https://getbootstrap.com/) or another CSS framework\
    \ in your template files.\n- Make the app more customizable by allowing the user\
