  md: '# # Using the Repl.it database


    ![](img/48efb5586f6da072fc1456bee6971293_115_0.png)


    In previous tutorials we used the file system to store data persistently. This
    works fine for smaller projects, but there are some limitations to storing data
    directly in a file system. A more advanced way to store data which is used by
    nearly any production application is a database.


    Another advantage of storing data in a database instead of in files is that it
    separates our code and data cleanly. If we build an application on Repl.it that
    processes any kind of data, it’s likely that we’ll want to share the code with
    other people but **not** the data. Having our data cleanly separated into a private
    database allows us to do exactly this.


    In this tutorial, you’ll see how to store data from a Repl.it project directly
    in the Repl.it key-value store, one of the simplest varieties of database, similar
    to a Python dictionary and more scalable.


    As a demonstration project, we’ll build a basic phone book application, storing
    contact information about friends and family and a command line application to
    allow users to:


    +   - add new contacts

    - search for existing contacts

    - update existing contacts

    - remove contacts.


    This will cover the so-called “CRUD” (Create, Read, Update, Delete) operations
    that are fundamental to any database-backed software.


    Now create a new Python repl called “phonebook”.'
  merge: -1
  pgno: 115
- img_proc: true
  md: '# Adding and reading data using the Repl.it database


    In the `main.py` file import the database driver with this code:


    ```

    from replit import db

    ```


    Databases usually store data on a separate physical server from where your code
    is running, so your code needs to know how to find the database and how to authenticate
    (to prove that you are authorised to access a specific database to stop other
    people reading your data).

    Usually we would have to supply some kind of credentials for this (e.g. a username
    and password), as well as an endpoint to indicate where the database can be found.
    In this case, Repl.it handles everything automatically (as long as you are signed
    in), so you can start storing data straight away.

    The `db` object works very similarly to a global Python dictionary but any data
    is persistently stored. You can associate a specific value with a given key in
    the same way. Add the following to your `main.py` file.


    ```

    db["Smith, John"] = "0123456789"

    print(db["Smith, John"])

    ```


    You should see the phone number printed to the console, as shown below.


    ![](img/48efb5586f6da072fc1456bee6971293_116_0.png)


    # How is this different from a dictionary?


    The main difference between using the database and a Python dictionary is that,
    with the database, the data is:


    +   - persisted between runs

    - kept separate from the code.


    For a concrete example, consider storing the same “John Smith” contact in both
    a dictionary and the database. Replace the code in your `main.py` file with the
    following and run it.'
  merge: -1
  pgno: 116
- img_proc: true
  md: '```

    1  from replit import db

    2

    3  # database

    4  db["Smith, John"] = "0123456789"

    5  print(db["Smith, John"])

    6

    7  # dictionary

    8  d = {}

    9  d["Smith, John"] = "0123456789"

    10 print(d["Smith, John"])

    ```


    Here we store the information first in the database and print it from the database
    and then in a dictionary and print it from there. In both cases, we see the result
    printed and the syntax is exactly the same.


    However, if we comment out the lines where we create the association between key
    and value, and run the code again, we''ll see a difference.


    ```

    1  from replit import db

    2

    3  # database

    4  # db["Smith, John"] = "0123456789"

    5  print(db["Smith, John"])

    6

    7  # dictionary

    8  # d = {}

    9  # d["Smith, John"] = "0123456789"

    10 print(d["Smith, John"])

    ```


    In this case, the first print still works as the data has persisted in the database.
    However the dictionary has been cleared between runs so we get the error NameError:
    name ''d'' is not defined.


    Because each Repl.it project has its own unique database which needs a secret
    key to access, you can add as much data to your database and still share your
    project without sharing any of your data.


    The database also has some functionality that Python dictionaries do not, such
    as searching keys by prefix, which we will take a closer look at soon.


