    # Make it your own


    We’ve written a name splitter that can handle some names more complicated than
    just “John Smith”. It’s not perfect though: for example, if you put in a name
    with two consecutive spaces it will crash our program. You could fork the project
    and fix this by first writing a test with consecutive spaces and then modifying
    the code to handle this (and any other edge cases you can think of).


    You can find the name splitter repl at [https://repl.it/@GarethDwyer1/namesplitter](https://repl.it/@GarethDwyer1/namesplitter)⁶⁵


    # Where next


    You’ve learned to do TDD in this project. It’s a popular style of programming,
    but it’s not for everyone. Even if you decide not to use TDD, having tests is
    still very useful and it’s not uncommon for large projects to have thousands or
    millions of tests.


    Take a look at the [big list of naughty strings](https://github.com/minimaxir/big-list-of-naughty-strings)⁶⁶
    for a project that collects inputs that often cause software to break. You could
    also read [How SQLite Is Tested](https://www.sqlite.org/testing.html)⁶⁷ which
    explains how SQLite, a popular lightweight database, has 150 thousand lines of
    code and nearly 100 million(!) lines of tests.


