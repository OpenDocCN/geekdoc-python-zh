    # # Adding collision detection


    Collision detection is a key element of most graphical games. In PyGame, the bulk
    of collision detection involves checking whether rectangles intersect with each
    other. Luckily, PyGame provides a number of useful built-ins for doing this, so
    we won’t have to think too much about the internal workings of collisions.


    Let’s add some collision detection now, near the top of our `update` method. We’ll
    create a variable called `onground` and set it to the result of `pygame.sprite.spritecollideany()`.


    ```

