    1 def update(self):

    2     hsp = 0 # horizontal speed

    3     onground = pygame.sprite.spritecollideany(self, boxes)

    ```


    This PyGame method takes two arguments: a single sprite and a group of sprites.
    It returns whether the sprite given as the first argument, i.e. the player, has
    a collision with any of the sprites in the group given as the second argument,
    i.e. the boxes. So we’ll know that the player is on a box when it returns `True`.


    We can pass the `boxes` group into the player’s `update` method by making a couple
    of code changes:


