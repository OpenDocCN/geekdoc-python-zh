    Add the following function to the main.py file.


    ```

    1 def get_wordcloud(text):

    2     pil_img = WordCloud().generate(text=text).to_image()

    3     img = io.BytesIO()

    4     pil_img.save(img, "PNG")

    5     img.seek(0)

    6     img_b64 = base64.b64encode(img.getvalue()).decode()

    7     return img_b64

    ```


    This is probably the hardest part of our project in terms of readability. Normally,
    we''d generate the word cloud using the wordcloud library and then save the resulting
    image to a file. However, because we don''t want to use our file system here,
    we''ll create a BytesIO Python object in memory instead and save the image directly
    to that. We''ll convert the resulting bytes to base64 in order to finally return
    them as part of our HTML response and show the image to our visitors.


