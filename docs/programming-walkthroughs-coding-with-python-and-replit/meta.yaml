- md: "## Generating word clouds from text in Python\n\nOnce again, there’s a nifty\
    \ Python library that can help us. This one will take in text and return word\
    \ clouds as images and is called wordcloud.\n\nImages are usually served as files\
    \ living on your server or from an image host like imgur<sup>109</sup>. Because\
    \ we’ll be creating small, short-lived images dynamically from the text, we’ll\
    \ simply keep them in memory instead of saving them anywhere permanently. In order\
    \ to do this, we’ll have to mess around a bit with the Python io and base64 libraries,\
    \ alongside our newly installed wordcloud library.\n\nTo import all the new libraries,\
    \ we’ll be using to process images, modify the top of our main.py to look as follows.\n\
    \n109 https://imgur.com/\n\n```python\nimport base64\nimport feedparser\nimport\
    \ io\nimport requests\n\nfrom bs4 import BeautifulSoup\nfrom wordcloud import\
    \ WordCloud\nfrom flask import Flask\nfrom flask import render_template\n```\n\
    \nWe'll be converting the text from each article into a separate word cloud, so\
    \ it'll be useful to have another helper function that can take text as input\
    \ and produce the word cloud as output. We can use base64<sup>110</sup> to represent\
    \ the images, which can then be displayed directly in our visitors' web browsers.\n\
    \nAdd the following function to the main.py file.\n\n```python\ndef get_wordcloud(text):\n\
    \    pil_img = WordCloud().generate(text=text).to_image()\n    img = io.BytesIO()\n\
    \    pil_img.save(img, \"PNG\")\n    img.seek(0)\n    img_b64 = base64.b64encode(img.getvalue()).decode()\n\
    \    return img_b64\n```\n\nThis is probably the hardest part of our project in\
    \ terms of readability. Normally, we'd generate the word cloud using the wordcloud\
    \ library and then save the resulting image to a file. However, because we don't\
    \ want to use our file system here, we'll create a BytesIO Python object in memory\
    \ instead and save the image directly to that. We'll convert the resulting bytes\
    \ to base64 in order to finally return them as part of our HTML response and show\
    \ the image to our visitors.\n\nIn order to use this function, we'll have to make\
    \ some small tweaks to the rest of our code.\n\nFor our template, in the home.html\
    \ file, change the for loop to read as follows.\n\n```html\n{% for article in\
    \ articles %}\n    <img src=\"data:image/png;base64,{{article}}\">\n{% endfor\
    \ %}\n```\n\nNow instead of displaying our article in `<p>` tags, we'll put it\
    \ inside an `<img/>` tag so that it can be displayed as an image. We also specify\
    \ that it is formatted as a png and encoded as base64.\n\nThe last thing we need\
    \ to do is modify our `home()` function to call the new `get_wordcloud()` function\
    \ and to build and render an array of images instead of an array of text. Change\
    \ the `home()` function to look as follows.\n\n> 110 https://en.wikipedia.org/wiki/Base64\n\
    \n```python\n@app.route(\"/\")\ndef home():\n    feed = feedparser.parse(BBC_FEED)\n\
    \    clouds = []\n\n    for article in feed['entries'][:LIMIT]:\n        text\
    \ = parse_article(article['link'])\n        cloud = get_wordcloud(text)\n    \
    \    clouds.append(cloud)\n    return render_template('home.html', articles=clouds)\n\
    ```\n\nWe made changes on lines 4, 8, 9, and 10, to change to a `clouds` array,\
    \ populate that with images from our `get_wordcloud()` function, and return that\
    \ in our `render_template` call.\n\nIf you restart the Repl and refresh the page,\
    \ you should see something similar to the following. We can see the same content\
    \ from the articles, however, we can now see the important keywords without having\
    \ to read the entire article.\n\nFor a larger view, you can pop out the website\
    \ in a new browser tab using the button in the top right of the Repl editor (indicated\
    \ in red above).\n\nThe last thing we need to do is add some styling to make the\
    \ page look a bit prettier and link the images to the original articles.\n\n##\
    \ Adding some finishing touches\n\nOur text looks a bit stark, and our images\
    \ touch each other, which makes it hard to see that they are separate images.\
    \ We'll fix that up by adding a few lines of CSS and importing the Bootstrap framework.\n\
    \n## Adding CSS\n\nEdit the home.html file to look as follows\n\n```html\n<html>\n\
    \  <head>\n    <title>News in WordClouds | Home</title>\n    <link rel=\"stylesheet\"\
    \ href=\"https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css\"\
    \ integrity=\"sha384-HSMxcRTRxnN+Bdg0JdbxYKrThec0KuH5zCYot1SAcp1+c8xmyTe9GYg119a69psu\"\
    \ crossorigin=\"anonymous\">\n\n    <style type=\"text/css\">\n      body {padding:\
    \ 20px;}\n      img{padding: 5px;}\n    </style>\n  </head>\n\n  <body>\n    <h1>News\
    \ Word Clouds</h1>\n    <p>Too busy to click on each news article to see what\
    \ it's about? Below you can see all the articles from the BBC front page, displayed\
    \ as word clouds. If you want to read more about any particular article, just\
    \ click on the wordcloud to go to the original article</p>\n    {% for article\
    \ in articles %}\n      <a href=\"{{article.url}}\"><img src=\"data:image/png;base64,{{article.image}}\"\
    ></a>\n    {% endfor %}\n  </body>\n</html>\n```\n\nOn **line 3** we add a title,\
    \ which is displayed in the browser tab. On **line 4**, we import [Bootstrap](https://getbootstrap.com/),\
    \ which has some nice CSS defaults right out the box (it's probably a bit heavy-weight\
    \ for our project as we have so little content and won't use most of Bootstrap's\
    \ features, but it's nice to have if you're planning on extending the project.)\n\
    \nOn **lines 6-8**, we add padding to the main body to stop the text going to\
    \ close to the edges of the screen, and also add padding to our images to stop\
    \ them touching each other.\n\nOn **line 16**, we use an `<a>` tag to add a link\
    \ to our image. We also change the Jinja templates to `{{article.url}}` and `{{article.image}}`\
    \ so that we can have images that link back to the original news article.\n\n\
    Now we need to tweak our backend code again to pass through the URL and image\
    \ for each article, as the template currently doesn't have access to the URL.\n\
    \n## Passing through the URLs\n\nTo easily keep track of pairs of URLs and images,\
    \ we'll add a basic Python helper class called `Article`. In the `main.py` file,\
    \ add the following code before the function definitions.\n\n```python\nclass\
    \ Article:\n    def __init__(self, url, image):\n        self.url = url\n    \
    \    self.image = image\n```\n\nThis is a simple class with two attributes: `url`\
    \ and `image`. We'll store the original URL from the RSS feed in `url` and the\
    \ final base64 wordcloud in `image`.\n\nTo use this class, modify the `home()`\
    \ function to look as follows.\n\n```python\n@app.route(\"/\")\ndef home():\n\
    \    feed = feedparser.parse(BBC_FEED)\n    articles = []\n\n    for article in\
    \ feed['entries'][:LIMIT]:\n        text = parse_article(article['link'])\n  \
    \      cloud = get_wordcloud(text)\n        articles.append(Article(article['link'],\
    \ cloud))\n    return render_template('home.html', articles=articles)\n```\n\n\
    We changed the name of our `clouds` list to `articles`, and populated it by initialising\
    \ `Article` objects in the for loop and appending them to this list. We then pass\
    \ across `articles=articles` instead of `articles=clouds` in the return statement\
    \ so that the template can access our list of `Article` objects, which each contain\
    \ the image and the URL of each article.\n\nIf you refresh the page again and\
    \ expand the window using the pop out button, you'll be able to click any of the\
    \ images to go to the original article, allowing readers to view a brief summary\
    \ of the day's news or to read more details about any stories that catch their\
    \ eye."
  mdcn: "## 在Python中根据文本生成词云\n\n再次，有一个好用的Python库能帮助我们。这个库可以接收文本并返回以图像形式呈现的词云，其名为`wordcloud`。\n\
    \n图像通常是以文件形式存储在服务器上，或从imgur<sup>109</sup>这样的图像托管服务获取。由于我们将从文本动态生成小型、临时存在的图像，我们只需将它们保存在内存中，而不是永久存储在任何地方。为此，我们需要稍微操作一下Python的`io`和`base64`库，以及新安装的`wordcloud`库。\n\
    \n为了导入我们将用于处理图像的所有新库，请将`main.py`文件的顶部修改如下。\n\n109 https://imgur.com/\n\n```python\n\
    import base64\nimport feedparser\nimport io\nimport requests\n\nfrom bs4 import\
    \ BeautifulSoup\nfrom wordcloud import WordCloud\nfrom flask import Flask\nfrom\
    \ flask import render_template\n```\n\n我们将把每篇文章的文本转换成独立的词云，因此有一个辅助函数会很有用，该函数接收文本作为输入并生成词云作为输出。我们可以使用`base64`<sup>110</sup>来表示图像，然后这些图像就可以直接在访问者的网络浏览器中显示。\n\
    \n向`main.py`文件添加以下函数。\n\n```python\ndef get_wordcloud(text):\n    pil_img = WordCloud().generate(text=text).to_image()\n\
    \    img = io.BytesIO()\n    pil_img.save(img, \"PNG\")\n    img.seek(0)\n   \
    \ img_b64 = base64.b64encode(img.getvalue()).decode()\n    return img_b64\n```\n\
    \n就可读性而言，这可能是我们项目中最难理解的部分。通常，我们会使用`wordcloud`库生成词云，然后将生成的图像保存到文件。然而，由于我们这里不希望使用文件系统，我们将在内存中创建一个`BytesIO`\
    \ Python对象，并将图像直接保存到该对象中。我们会将结果字节转换为base64，以便最终将其作为HTML响应的一部分返回，并向访问者显示图像。\n\n\
    为了使用此函数，我们需要对代码的其他部分进行一些小调整。\n\n对于我们的模板`home.html`文件，将`for`循环修改为如下所示。\n\n```html\n\
    {% for article in articles %}\n    <img src=\"data:image/png;base64,{{article}}\"\
    >\n{% endfor %}\n```\n\n现在，我们不再在`<p>`标签中显示文章，而是将其放入`<img/>`标签中，以便将其显示为图像。我们还指定了其格式为png，并以base64编码。\n\
    \n我们需要做的最后一件事是修改我们的`home()`函数，以调用新的`get_wordcloud()`函数，并构建和渲染图像数组而不是文本数组。将`home()`函数修改为如下所示。\n\
    \n> 110 https://en.wikipedia.org/wiki/Base64\n\n```python\n@app.route(\"/\")\n\
    def home():\n    feed = feedparser.parse(BBC_FEED)\n    clouds = []\n\n    for\
    \ article in feed['entries'][:LIMIT]:\n        text = parse_article(article['link'])\n\
    \        cloud = get_wordcloud(text)\n        clouds.append(cloud)\n    return\
    \ render_template('home.html', articles=clouds)\n```\n\n我们在第4、8、9和10行进行了更改，改为使用`clouds`数组，使用`get_wordcloud()`函数的图像填充该数组，并在`render_template`调用中返回它。\n\
    \n如果你重启Repl并刷新页面，你应该会看到类似下面的内容。我们可以看到来自文章的相同内容，然而，现在无需阅读全文就能看到重要的关键词。\n\n如需查看更大的视图，你可以使用Repl编辑器右上角的按钮（上图中用红色标出）在新浏览器标签页中弹出该网站。\n\
    \n我们需要做的最后一件事是添加一些样式，使页面看起来更美观，并将图像链接到原始文章。\n\n## 添加最后的修饰\n\n我们的文本看起来有点单调，图像彼此紧贴，使得很难看出它们是独立的图像。我们将通过添加几行CSS并导入Bootstrap框架来修复这个问题。\n\
    \n## 添加CSS\n\n将`home.html`文件修改为如下所示。\n\n```html\n<html>\n  <head>\n    <title>News\
    \ in WordClouds | Home</title>\n    <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css\"\
    \ integrity=\"sha384-HSMxcRTRxnN+Bdg0JdbxYKrThec0KuH5zCYot1SAcp1+c8xmyTe9GYg119a69psu\"\
    \ crossorigin=\"anonymous\">\n\n    <style type=\"text/css\">\n      body {padding:\
    \ 20px;}\n      img{padding: 5px;}\n    </style>\n  </head>\n\n  <body>\n    <h1>News\
    \ Word Clouds</h1>\n    <p>Too busy to click on each news article to see what\
    \ it's about? Below you can see all the articles from the BBC front page, displayed\
    \ as word clouds. If you want to read more about any particular article, just\
    \ click on the wordcloud to go to the original article</p>\n    {% for article\
    \ in articles %}\n      <a href=\"{{article.url}}\"><img src=\"data:image/png;base64,{{article.image}}\"\
    ></a>\n    {% endfor %}\n  </body>\n</html>\n```\n\n在**第3行**，我们添加了一个标题，显示在浏览器标签页中。在**第4行**，我们导入了[Bootstrap](https://getbootstrap.com/)，它开箱即带有一些不错的CSS默认设置（对于我们的项目来说可能有点重量级，因为我们的内容很少，也不会使用Bootstrap的大部分功能，但如果你计划扩展项目，拥有它还是不错的）。\n\
    \n在**第6-8行**，我们为主要的`body`添加了内边距，以防止文本过于靠近屏幕边缘，同时也为图像添加了内边距以防止它们相互紧贴。\n\n在**第16行**，我们使用`<a>`标签为图像添加了链接。我们还将Jinja模板更改为`{{article.url}}`和`{{article.image}}`，以便我们拥有可链接回原始新闻文章的图像。\n\
    \n现在我们需要再次调整后端代码，为每篇文章传递URL和图像，因为模板当前无法访问URL。\n\n## 传递URL\n\n为了轻松跟踪URL和图像的配对，我们将添加一个名为`Article`的基本Python辅助类。在`main.py`文件中，在函数定义之前添加以下代码。\n\
    \n```python\nclass Article:\n    def __init__(self, url, image):\n        self.url\
    \ = url\n        self.image = image\n```\n\n这是一个具有两个属性的简单类：`url`和`image`。我们将把来自RSS订阅源的原始URL存储在`url`中，将最终的base64词云存储在`image`中。\n\
    \n要使用此类，请将`home()`函数修改为如下所示。\n\n```python\n@app.route(\"/\")\ndef home():\n  \
    \  feed = feedparser.parse(BBC_FEED)\n    articles = []\n\n    for article in\
    \ feed['entries'][:LIMIT]:\n        text = parse_article(article['link'])\n  \
    \      cloud = get_wordcloud(text)\n        articles.append(Article(article['link'],\
    \ cloud))\n    return render_template('home.html', articles=articles)\n```\n\n\
    我们将`clouds`列表的名称更改为`articles`，并通过在for循环中初始化`Article`对象并将它们附加到此列表中来填充它。然后我们在return语句中传递`articles=articles`而不是`articles=clouds`，以便模板可以访问我们的`Article`对象列表，每个对象都包含每篇文章的图像和URL。\n\
    \n如果你再次刷新页面并使用弹出按钮扩展窗口，你将能够单击任何图像以跳转到原始文章，让读者可以查看当天新闻的简要摘要，或阅读有关任何吸引他们眼球的故事的更多详细信息。"
