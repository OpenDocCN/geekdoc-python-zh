  md: '# Example: Solve 5x² + 6x + 1 = 0


    Coefficients are: a = 5, b = 6, c = 1


    Quadratic Formula: x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}


    Put in a, b and c: x = \frac{-6 \pm \sqrt{6^2 - 4 \times 5 \times 1}}{2 \times
    5}


    Solve: x = \frac{-6 \pm \sqrt{36 - 20}}{10}


    x = \frac{-6 \pm \sqrt{16}}{10}


    x = \frac{-6 \pm 4}{10}


    x = -0.2 \text{ or } -1


    ![](img/48efb5586f6da072fc1456bee6971293_16_0.png)


    Answer: x = -0.2 \text{ or } x = -1


    And we see them on this graph.


    Check -0.2: 5×(-0.2)² + 6×(-0.2) + 1

    = 5×(0.04) + 6×(-0.2) + 1

    = 0.2 - 1.2 + 1

    = 0


    Check -1: 5×(-1)² + 6×(-1) + 1

    = 5×(1) + 6×(-1) + 1

    = 5 - 6 + 1

    = 0


    Image 5: A quadratic equation example


    Let’s make Python do the repetitive steps for us by creating a program called
    “solver”. This could eventually have a lot of different solvers, but for now we’ll
    just write one: solve_quadratic.


    Add a new file to your project by clicking on the new file button, as shown below.
    Call the file solver.py. You now have two files in your project: main.py and solver.py.
    You can switch between your files by clicking on them.'
  merge: -1
  pgno: 16
- img_proc: true
  md: "![](img/48efb5586f6da072fc1456bee6971293_17_0.png)\n\nOpen the `solver.py`\
    \ file and add the following code to it.\n\n```\npython\nimport math\n\ndef solve_quadratic(a,\
    \ b, c):\n    d = (b ** 2) - 4 * a * c\n    s1 = (-b + math.sqrt(d)) / (2 * a)\n\
    \    s2 = (-b - math.sqrt(d)) / (2 * a)\n    return s1, s2\n```\n\nNote that this\
    \ won't solve all quadratic equations as it doesn't handle cases where d, the\
    \ discriminant, is 0 or negative. However, it'll do for now.\n\nNavigate back\
    \ to the `main.py` file. Delete all the code we had before and add the following\
    \ code instead.\n\n```\npython\nfrom solver import solve_quadratic\n\nanswer =\
    \ solve_quadratic(5, 6, 1)\nprint(answer)\n```\n\nNote how we use Python's import\
    \ functionality to import the code from our new solver script into the `main.py`\
    \ file so that we can run it. Python looks for `.py` (Python) files automatically,\
    \ so you omit the `.py` suffix when importing code. Here we import the `solve_quadratic`\
    \ function (which we just defined) from the `solver.py` file.\n\nRun the code\
    \ and you should see the solution to the equation, as shown below."
