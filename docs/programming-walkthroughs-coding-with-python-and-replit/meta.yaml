    \        pass\n\n    def move(self, x, y):\n        self.rect.move_ip([x,y])\n\
    ```\n\nPyGame provides a couple of different ways to check the state of the keyboard.\
    \ By default, its event queue collects KEY_DOWN and KEY_UP events when particular\
    \ keys are pressed and released. Using a KEY_DOWN event to move the player seems\
    \ like the logical thing to do, but because the event is only triggered in same\
    \ update loop in which the key is first pressed, this would force us to rapidly\
    \ tap an arrow key to keep moving in a single direction.\n\nWe need a way to move\
    \ the player whenever an arrow key is held down, not just after it’s pressed.\
    \ So instead of relying on events, we will query the current status of all keyboard\
    \ keys with pygame.key.get_pressed():\n\n```\ndef update(self):\n    # check keys\n\
    \    key = pygame.key.get_pressed()\n```\n\nThis method returns a tuple of 0s\
    \ and 1s showing the pressed status of each key on the keyboard. We can thus detect\
    \ whether the left or right arrow key is currently pressed by indexing the tuple\
    \ with PyGame’s keyboard constants<sup>215</sup>, like so:\n\n```\ndef update(self):\n\
    \    # check keys\n    key = pygame.key.get_pressed()\n    if key[pygame.K_LEFT]:\n\
    \        self.move(-1,0)\n    elif key[pygame.K_RIGHT]:\n        self.move(1,0)\n\
    ```\n\nRun the game. You should now be able to move the player left and right,\
