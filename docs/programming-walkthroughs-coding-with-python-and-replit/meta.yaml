  - "[PAGE 41]\n\n# # Extracting names from headlines using spaCy\n\nWe’ve now seen\
    \ how to install common packages like `requests` simply by importing them, how\
    \ to find and install slightly more complicated packages like `beautifulsoup`\
    \ using the GUI package manager, and how to manually install even more complicated\
    \ packages like `spaCy` (which have their own dependencies) by manually writing\
    \ sections of the `pyproject.toml` file.\n\nLet’s put everything together and\
    \ use all three packages to extract people’s names from today’s headlines. We’ll\
    \ use the plaintext version of CNN at [lite.cnn.com](https://lite.cnn.com)$^{25}$\
    \ as it’s easier to extract text from.\n\nReplace the code in your `main.py` with\
    \ the following.\n\n```\npython\nimport spacy\nimport requests\nfrom bs4 import\
    \ BeautifulSoup\nfrom collections import Counter\n\nnlp = spacy.load(\"en_core_web_sm\"\
    )\nresponse = requests.get(\"http://lite.cnn.com/en\")\nsoup = BeautifulSoup(response.text,\
    \ \"html.parser\")\n\n# https://stackoverflow.com/questions/1936466/beautifulsoup-grab-visible-webpage-text\n\
    [s.extract() for s in soup(['style', 'script', '[document]', 'head', 'title'])]\n\
    text = soup.getText()\ndoc = nlp(text)\n\nnames = []\nfor ent in doc.ents:\n \
    \   if ent.label_ == \"PERSON\":\n        names.append(ent.lemma_)\n\nprint(\"\
    These people are in the headlines today\")\nprint(Counter(names).most_common(10))\n\
    ```\n\nThis pulls the HTML from the lite version of CNN, extracts the HTML, removes\
    \ non-visible text such as CSS styles and JavaScript, and parses the resulting\
    \ text using `spaCy`.\n\nThen we loop through all of the [named entities](https://en.wikipedia.org/wiki/Named_entity)$^{26}$\
    \ that `spaCy` detects as part of its standard parse, and print out any that look\
    \ like people.\n\nIf you run this code, you should see a list of people making\
    \ headlines today. At the time of writing, John Lewis is mentioned in the most\
    \ headlines. (Note that named entity recognition is a difficult\n\n> $^{25}$https://lite.cnn.com\n\
    $^{26}$https://en.wikipedia.org/wiki/Named_entity"
