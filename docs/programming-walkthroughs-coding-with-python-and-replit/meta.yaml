  md: '# Understanding classification


    A classifier is a statistical model that tries to predict a label for a given
    input. In our case, the input is the text and the output is either “positive”
    or “negative”, depending on whether the classifier thinks that the input is positive
    or negative.


    A machine learning classifier can be “trained”. We give it labelled data and it
    tries to learn rules based on that data. Every time it gets more data, it updates
    its rules slightly to account for the new information. There are many kinds of
    classifiers, but one of the simplest is called a Decision Tree.


    Decision trees learn a set of yes/no rules by building decisions into a tree structure.
    Each new input moves down the tree, while various questions are asked one by one.
    When the input filters all the way to a leaf node in the tree, it acquires a label.


    If that’s confusing, don’t worry! We’ll walk through a detailed example with a
    picture soon to clarify. First, let’s show how to get some results using Python.


    Add the following lines to main.py:


    ```

    1 classifier = tree.DecisionTreeClassifier()

    2 classifier.fit(training_vectors, training_labels)

    3 predictions = classifier.predict(testing_vectors)

    4 print(predictions)

    ```


    Similarly to the vectoriser, we first create a classifier by using the module
    we imported at the start. Then we call fit() on the classifier and pass in our
    training vectors and their associated labels. The decision tree is going to look
    at both and attempt to learn rules that separate the two kinds of data.


    Once our classifier is trained, we can call the predict() method and pass in previously
    unseen data. Here we pass in testing_vectors which is the list of vectorized test
    data that the computer didn’t look at during training. It has to try and apply
    the rules it learned from the training data to this new “unseen” data. Machine
    learning is pretty cool, but it’s not magic, so there’s no guarantee that the
    rules we learned will be any good yet.


    The code above produces the following output:


    ```

    1 [''positive'' ''positive'' ''negative'' ''positive'' ''negative'']

    ```


    Let’s take a look at our test texts again to see if these predictions match up
    to reality.'
