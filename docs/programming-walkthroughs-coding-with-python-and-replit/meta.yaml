  md: "5() [4, 2, 2, 1] and [7, 10, 8]) then the entire list will be sorted. Any time\
    \ we can efficiently break a problem into smaller sub-problems, we should think\
    \ of *recursion* as a tool to solve our main problem. Using recursion, we often\
    \ don’t even have to think about the entire solution. Instead, we define a base\
    \ case (a list of length 0 or 1 is always sorted), and a way to divide a larger\
    \ problem into smaller ones (e.g. partitioning a list in two), and almost by magic\
    \ the problem solves itself!\n\nBut we’re getting ahead of ourselves a bit. Let’s\
    \ take a look at how to actually implement the partition algorithm on its own,\
    \ and then we can come back to using it to implement a sorting algorithm.\n\n\
    # # A bad partition implementation\n\nYou could probably easily write your own\
    \ partition algorithm that gets the correct results without referring to any textbook\
    \ implementations or thinking about it too much. For example:\n\n```\npython\n\
    def bad_partition(xs):\n    smaller = []\n    larger = []\n    pivot = xs.pop()\n\
    \    for x in xs:\n        if x >= pivot:\n            larger.append(x)\n    \
    \    else:\n            smaller.append(x)\n    return smaller + [pivot] + larger\n\
    ```\n\nIn this implementation, we set up two temporary lists (smaller and larger).\
    \ We then take the pivot element as the last element of the list (pop takes the\
    \ last element and removes it from the original xs list).\n\nWe then consider\
    \ each element x in the list xs. The ones that are smaller than the pivot, we\
    \ store in the smaller temporary list, and the others go to the larger temporary\
    \ list. Finally, we combine the two lists with the pivot item in the middle, and\
    \ we have partitioned our list.\n\nThis is much easier to read than the implementation\
    \ at the start of this post, so why don’t we do it like this?\n\nThe primary advantage\
    \ of Quicksort is that it is an *in place* sorting algorithm. Although for the\
    \ toy examples we’re looking at, it might not seem like much of an issue to create\
    \ a few copies of our list, if you’re trying to sort terabytes of data, or if\
    \ you are trying to sort any amount of data on a very limited computer (e.g a\
    \ smartwatch), then you don’t want to needlessly copy arrays around.\n\nIn Computer\
    \ Science terms, this algorithm has a space-complexity of O(2n), where n is the\
    \ number of elements in our xs array. If we consider our example above of xs =\
    \ [8, 4, 2, 2, 1, 7, 10, 5], we’ll need to store all 8 elements in the original\
    \ xs array as well as three elements ([7, 10, 8]) in the larger array and four\
    \ elements ([4, 2, 2, 1]) in the smaller array. This is a waste of space! With\
    \ some clever tricks, we can do a series of swap operations on the original array\
    \ and not need to make any copies at all."
