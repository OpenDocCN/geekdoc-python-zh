    # Building a weather logging system using Python and Repl.it


    Now that you can read from files and write to them, let’s build a mini-project
    that records historical weather temperatures. Our program will


    +   - Get the current temperature for a specified set of cities.

    - Write this data to file with today’s date.

    - Print a summary of this data to the console.


    # Creating a WeatherStack Account and getting an API key


    We’ll get weather data from the WeatherStack API. You’ll need to sign up at weatherstack.com¹¹
    and follow the instructions to get your own access key. Choose the “free tier”
    option which is limited to 1000 calls per month.


    After sign-up, you should see a page similar to the following containing the API
    access key.


    ¹⁰https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files

    ¹¹https://weatherstack.com'
