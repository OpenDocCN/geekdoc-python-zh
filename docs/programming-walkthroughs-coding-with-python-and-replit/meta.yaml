    \ but once you master them you’ll soar past the limits of what you could achieve\
    \ without these aids.\n\n## Using the global command palette\n\nIf you hit `Ctrl+K`\
    \ (Cmd+K on MacOS) you’ll see the following modal pop up, which lets you navigate\
    \ through different parts of Repl.it at lightning speed using only your keyboard.\
