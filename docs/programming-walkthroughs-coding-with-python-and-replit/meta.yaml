    \nAs an example, we’ll write code to solve [quadratic equations](https://www.mathsisfun.com/algebra/quadratic-equation.html).\
    \ If you’ve done this before, you’ll know it can be tedious without a computer\
    \ to go through all of the steps.\n\n## Example: Solve 5x² + 6x + 1 = 0\n\nCoefficients\
    \ are: a = 5, b = 6, c = 1\n\nQuadratic Formula: x = \\frac{-b \\pm \\sqrt{b^2\
    \ - 4ac}}{2a}\n\nPut in a, b and c: x = \\frac{-6 \\pm \\sqrt{6^2 - 4 \\times\
    \ 5 \\times 1}}{2 \\times 5}\n\nSolve: x = \\frac{-6 \\pm \\sqrt{36 - 20}}{10}\n\
    \nx = \\frac{-6 \\pm \\sqrt{16}}{10}\n\nx = \\frac{-6 \\pm 4}{10}\n\nx = -0.2\
    \ \\text{ or } -1\n\n![](img/48efb5586f6da072fc1456bee6971293_16_0.png)\n\nAnswer:\
    \ x = -0.2 \\text{ or } x = -1\n\nAnd we see them on this graph.\n\nCheck -0.2:\
    \ 5×(-0.2)² + 6×(-0.2) + 1 = 5×(0.04) + 6×(-0.2) + 1 = 0.2 - 1.2 + 1 = 0\n\nCheck\
    \ -1: 5×(-1)² + 6×(-1) + 1 = 5×(1) + 6×(-1) + 1 = 5 - 6 + 1 = 0\n\nImage 5: A\
    \ quadratic equation example\n\nLet’s make Python do the repetitive steps for\
    \ us by creating a program called “solver”. This could eventually have a lot of\
