    - As your friend would see it after forking it, on an anonymous account\n\n![](img/48efb5586f6da072fc1456bee6971293_18_1.png)\n\
    \nImage 8: The owner’s view of a repl\n\n![](img/48efb5586f6da072fc1456bee6971293_19_0.png)\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_19_1.png)\n\nWhat does this mean? Because\
