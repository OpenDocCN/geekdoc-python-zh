    \ Our bot can talk!\n\n# Keeping our bot alive\n\nYour bot can now respond to\
    \ messages, but only for as long as your Repl is running. If you close your browser\
    \ tab or shut down your computer, your bot will stop and no longer respond to\
    \ messages on Discord.\n\nRepl will keep your code running after you close the\
    \ browser tab only if you are running a web server. Our bot doesn't require an\
