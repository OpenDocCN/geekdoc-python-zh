    \ ‘GET /admin/css/fonts.css HTTP/1.1’\n```\n\n## Creating a static home page\n\
    \nViewing the default website isn’t that interesting and you’ll notice that there\
    \ are no files containing the content you currently see, so you can’t easily modify\
    \ it.\n\nTo create our own page in place, we’ll have to modify several files.\
    \ If you’ve created a basic HTML file before, you might be surprised at how complicated\
    \ this step is. Like other frameworks, Django “makes the easy things hard, and\
    \ the hard things possible”. If you just want to display a basic web page, it’s\
    \ probably overkill, but as your web app grows, you’ll find use for all of the\
    \ extra structure.\n\nLet’s set up a basic “Hello world” page to make sure we\
    \ have the pieces in place. You’ll need to create several more folders and files\
    \ to achieve this.\n\nCreate a folder called templates. This is where Django will\
    \ get HTML templates for rendering pages.\n\n![](img/48efb5586f6da072fc1456bee6971293_200_0.png)\n\
    \nLet’s add the HTML templates that we will use to render our static page. Create\
    \ a file called `base.html` within the newly created templates folder and add\
    \ the following code.\n\n```html\n{% load static %}\n<!DOCTYPE html>\n\n<html\
    \ lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <title>Hello World!</title>\n\
    \    <meta charset=\"UTF-8\"/>\n    <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1\"/>\n    <link rel=\"stylesheet\" href=\"{% static 'css/style.css'\
    \ %}\">\n</head>\n<body>\n    {% block content %}{% endblock content %}\n</body>\n\
    </html>\n```\n\nThe above is a basic HTML template that our Django app will use\
    \ when rendering pages. We also link to a stylesheet that Django will get from\
    \ a folder called `static/css` which we will create soon. Note the `{% load static\
    \ %}` in the first line, this is to tell Django that we are using static files\
    \ in this template i.e. style.css.\n\nStill in the templates folder, create a\
    \ file called `index.html` and add the following code."
  mdcn: "## 分支并扩展我们的基础机器人\n\n目前这个机器人实用性不强，但现在其可能性仅受限于你的创造力！你可以让你的机器人接收用户输入、处理输入，并以你选择的任何方式做出响应。事实上，根据我们已经演示的基础输入和输出，我们已经拥有了任何现代计算机的大部分组件，而这些组件都基于冯·诺依曼架构¹⁴⁰（我们可以通过让机器人写入文件来轻松添加缺失的存储，或者稍加努力，链接到一个SQLite数据库¹⁴¹以实现持久化存储）。\n\
