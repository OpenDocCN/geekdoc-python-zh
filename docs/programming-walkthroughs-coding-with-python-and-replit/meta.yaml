  - '[PAGE 234]


    in the Pug templating language. We’re creating a hidden element to store the “old”
    name, telephone, address, and note of the customer - this is for when we want
    to do an update.


    Using the old details to update the customer is an easy solution, but not the
    best solution as it makes the query cumbersome and slow. If you add extra fields
    into your database you would have to remember to update your query as well, otherwise
    it could lead to updating or deleting the wrong customer if they have the same
    information. A better, but more complicated way is to use the unique ID of the
    database document as that will only ever refer to one customer.


    We have also put in placeholder variables for name, address, telephone, and note,
    and we have given the form 2 buttons with different actions.


    If you now run the code, you will have an index page with 2 buttons. Pressing
    the ‘Update/Delete’ button will take you to a new page that asks for a Customer
    name. Filling the customer name and pressing ‘Get customer’ will, after a little
    time, load a page with the customer’s details and 2 buttons below that say ‘Update’
    and ‘Delete’. Make sure you enter a customer name you have entered before.


    ![](img/48efb5586f6da072fc1456bee6971293_234_0.png)


    Our next step is to add the ‘Update’ and ‘Delete’ functionality. Add the following
    code below your routes in index.js:'
  - '[PAGE 235]


    ```

    1 app.post(''/update'', function(req, res) {

    2   client.connect(err => {

    3     if (err) throw err;

    4     let query = { name: req.body.oldname, address: req.body.oldaddress, telephone:
    req.body.oldtelephone, note: req.body.oldnote };

    5     let newvalues = { $set: {name: req.body.name, address: req.body.address,
    telephone: req.body.telephone, note: req.body.note } };

    6     client.db("crmdb").collection("customers").updateOne(query, newvalues, function(err,
    result) {

    7       if (err) throw err;

    8       console.log("1 document updated");

    9       res.render(''update'', {message: ''Customer updated!'', oldname: req.body.name,
    oldaddress: req.body.address, oldtelephone: req.body.telephone, oldnote: req.body.note,
    name: req.body.name, address: req.body.address, telephone: req.body.telephone,
    note: req.body.note});

    10    });

    11  });

    12 })


    13 app.post(''/delete'', function(req, res) {

    14   client.connect(err => {

    15     if (err) throw err;

    16     let query = { name: req.body.name, address: req.body.address ? req.body.address
    : null, telephone: req.body.telephone ? req.body.telephone : null, note: req.body.note
    ? req.body.note : null };

    17     client.db("crmdb").collection("customers").deleteOne(query, function(err,
    obj) {

    18       if (err) throw err;

    19       console.log("1 document deleted");

    20       res.send(`Customer ${req.body.name} deleted`);

    21     });

    22   });

    23 })

    ```


    This introduces 2 new ‘POST’ handlers - one for /update, and one for /delete.


    +   - Line 2 connects to our MongoDB database.

    - Line 3 throws an error if there was a problem connecting to the database.

    - Line 4 defines a query that we will use to find the document to update. In this
    case, we are using the details of the customer *before* it was updated. We saved
    this name earlier in a hidden field in the HTML. Trying to find the customer by
    its updated name obviously won’t work because it hasn’t been updated yet. Also,
    note that we are setting some of the fields to null if they are empty. This is
    so that the database returns the correct document when we update or'
  - '[PAGE 236]


    delete - if we search for a document that has no address with an address of “”
    (empty string), then our query won’t return anything.


    +   - **Line 5** defines the new values that we want to update our customer with.

    - **Line 6** updates the customer with the new values using the query

    - **Line 7** throws an error if there was a problem with the update.

    - **Line 8** logs that a document was updated.

    - **Line 9** re-renders the update page with a message saying that the customer
    was updated, and displays the new values.

    - **Line 15** connects to our MongoDB database.

    - **Line 16** throws an error if there was a problem connecting to the database.

    - **Line 17** defines a query that we will use to find the document to delete.
    In this case we are using all the details of the customer *before* any changes
    were made on the form to make sure we delete that specific customer.

    - **Line 18** we connect to the database and delete the customer.

    - **Line 19** throws an error if there was a problem with the delete.

    - **Line 20** logs that a document was deleted.

    - **Line 21** sends a response to say that the customer was deleted.


    # Putting it all together


    If you run your application now, you’ll be able to create, update, and delete
    documents in a MongoDB database. This is a very basic CRUD application, with a
    very basic and unstyled UI, but it should give you the foundation to build much
    more sophisticated applications.


    Some ideas for this are:

    *You could add fields to the database to classify customers according to which
    stage they are in your sales pipeline<sup>183</sup> so that you can track if a
    customer is potentially stuck somewhere and contact them to re-engage.

    *You could then integrate some basic marketing automation with a page allowing
    you to send an email or SMS to customers (though don’t spam clients!).

    *You could also add fields to keep track of customer purchasing information so
    that you can see which products do well with which customers.


    If you want to start from where this tutorial leaves off, fork the Repl at https://repl.it/@GarethDwyer1/nodejs-crm<sup>184</sup>.


    In the next chapter, we’ll be introducing using machine learning to classify text
    in Repl.it.


