  md: 'without our user having to explicitly visit the `get_weather_from_ip` endpoint
    or refresh their page.


    # Calling a Django route using Ajax and jQuery


    We''ll use [Ajax through jQuery](http://api.jquery.com/jquery.ajax/) to do a “partial
    page refresh” – that is, to update part of the page the user is seeing by sending
    new data from our backend code without the user needing to reload the page.


    To do this, we need to include jQuery as a library.


    > Note: usually you wouldn''t add JavaScript directly to your base.html template,
    but to keep things simpler and to avoid creating too many files, we''ll be diverging
    from some good practices. See [the Django documentation](https://docs.djangoproject.com/en/2.0/howto/static-files/)
    for some guidance on how to structure JavaScript properly in larger projects.


    In your `templates/base.html` file, add the following script above the line where
    we previously defined the `use_ip()` function.


    ```

    1 <script

    2   src="https://code.jquery.com/jquery-3.3.1.min.js"

    3   integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZx1twRo8QtmkMRdAu8="

    4   crossorigin="anonymous"></script>

    ```


    This loads the entire jQuery library from a [CDN](https://www.cloudflare.com/learning/cdn/what-is-a-cdn/),
    allowing us to complete certain tasks using fewer lines of JavaScript.


    Now, modify the `use_ip()` script that we wrote before to call our backend route
    using Ajax. The new `use_ip()` function should be as follows:


    ```

    1  function use_ip(json) {

    2    $.ajax({

    3      url: {% url ''get_weather_from_ip'' %},

    4      data: {"ip": json.ip},

    5      dataType: ''json'',

    6      success: function (data) {

    7        document.getElementById("weatherdata").innerHTML = data.weather_data

    8      }

    9    });

    10 }

    ```'
