  md: '# Productivity hacks


    The images in this chapter are mostly .gif files, click [here](https://docs.repl.it/tutorials/10-productivity-hacks)⁶⁸
    to access the web version of this chapter


    After coding for a while, you may find that there are some repetitive things that
    take up unnecessary time. For example, searching for and updating a variable name
    can seem laborious. Luckily, Repl.it has some built-in productivity tools that
    we’ll take a look at in this tutorial.


    Specifically, you’ll see how to:


    +   - Make simultaneous changes in several parts of your file using multiple cursors

    - Use keyboard shortcuts to quickly carry out tasks without the delay of reaching
    for your mouse

    - Switch to Vim or Emacs keybindings for full mouseless control.


    Similarly to learning to touch type, there is often a steep learning curve when
    you start to use advanced code editing features. They might even substantially
    slow you down at first, but once you master them you’ll soar past the limits of
    what you could achieve without these aids.


    # Using the global command palette


    If you hit `Ctrl+K` (Cmd+K on MacOS) you’ll see the following modal pop up, which
    lets you navigate through different parts of Repl.it at lightning speed using
    only your keyboard. If you have a lot of files, it’s often useful to open them
    like this rather than scrolling through the directory structure in the files pane
    (the `find` option searches through files by their name while the `search` option
    searches through files by their contents.)


    ⁶⁸https://docs.repl.it/tutorials/10-productivity-hacks'
