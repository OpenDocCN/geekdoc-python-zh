    \nprint(predictions)\n```\n\n## 快速排序教程：带逐行解释的Python实现\n\n在本教程中，我们将讲解[快速排序](https://en.wikipedia.org/wiki/Quicksort)算法，并进行逐行解释。我们将介绍该算法的工作原理，在Repl.it中构建它，然后计时以查看其效率。\n\
    \n### 概述与要求\n\n我们假设你已经对[排序算法](https://en.wikipedia.org/wiki/Sorting_algorithm)有所了解，并接触过快速排序的概念。学完本教程，你应该能更好地理解其工作原理。\n\
    \n我们还假设你已经学过一些更基础的计算机科学概念，尤其是快速排序所依赖的[递归](https://en.wikipedia.org/wiki/Recursion#In_computer_science)。\n\
    \n简单回顾一下，快速排序是高效且最常用的数字列表排序算法之一。与它的竞争者归并排序不同，快速排序可以就地排序，无需创建列表副本，从而节省了内存需求。\n\n\
    快速排序背后的主要直觉是：如果我们能高效地*分区*一个列表，我们就能高效地对其进行排序。对列表进行分区意味着我们选择一个*枢轴*项，然后修改列表，将所有比枢轴大的项移到右边，所有比枢轴小的项移到左边。\n\
    \n枢轴确定后，我们可以递归地对列表的左、右部分进行相同的操作，直到列表排序完成。\n\n以下是快速排序的一个Python实现。请通读一下，看看是否理解。如果不理解，请继续阅读下面的内容！\n\
    \n```python\ndef partition(xs, start, end):\n    follower = leader = start\n \
    \   while leader < end:\n        if xs[leader] <= xs[end]:\n            xs[follower],\
    \ xs[leader] = xs[leader], xs[follower]\n            follower += 1\n        leader\
    \ += 1\n    xs[follower], xs[end] = xs[end], xs[follower]\n    return follower\n\
    \ndef _quicksort(xs, start, end):\n    if start >= end:\n        return\n    p\
    \ = partition(xs, start, end)\n    _quicksort(xs, start, p-1)\n    _quicksort(xs,\
    \ p+1, end)\n\ndef quicksort(xs):\n    _quicksort(xs, 0, len(xs)-1)\n```\n\n###\
    \ 分区算法\n\n分区算法背后的想法似乎很直观，但实现它以达到高效率的实际算法却相当反直觉。\n\n让我们从简单的部分——思想——开始。我们有一个未排序的数字列表。我们在这个列表中选择一个点，并确保所有较大的数字都在该点的*右侧*，所有较小的数字都在其*左侧*。例如，给定随机列表：\n\
    \n```python\nxs = [8, 4, 2, 2, 1, 7, 10, 5]\n```\n\n我们可以选择*最后一个*元素（5）作为枢轴点。我们希望列表（分区后）看起来像这样：\n\
    \n```python\nxs = [4, 2, 2, 1, 5, 7, 10, 8]\n```\n\n请注意，这个列表并未排序，但它具有一些有趣的特性。我们的枢轴元素5位于正确的位置（如果我们将列表完全排序，这个元素不会移动）。此外，左边的所有数字都比5小，右边的所有数字都比5大。\n\
    \n由于5已经处于正确位置，在分区算法之后我们可以忽略它（不需要再次移动它）。这意味着，如果我们能够对5左边和右边的两个较小子列表（`[4, 2, 2, 1]`和`[7,\
    \ 10, 8]`）进行排序，那么整个列表就会被排序。每当我们能将一个大问题高效地分解为更小的子问题时，我们就应该考虑使用*递归*作为解决主要问题的工具。使用递归，我们通常甚至不需要考虑整个解决方案。相反，我们定义一个基本情况（长度为0或1的列表总是已排序的），以及一种将大问题分解为小问题的方法（例如，将一个列表一分为二），几乎像变魔术一样，问题就自行解决了！\n\
    \n但我们有点扯远了。让我们先看看如何实际实现分区算法本身，然后我们再回来用它来实现排序算法。\n\n### 一个较差的分区实现\n\n你可能很容易就能写出自己的分区算法，无需参考任何教科书实现或过多思考，就能得到正确的结果。例如：\n\
    \n```python\ndef bad_partition(xs):\n    smaller = []\n    larger = []\n    pivot\
    \ = xs.pop()\n    for x in xs:\n        if x >= pivot:\n            larger.append(x)\n\
    \        else:\n            smaller.append(x)\n    return smaller + [pivot] +\
    \ larger\n```\n\n在这个实现中，我们创建了两个临时列表（`smaller`和`larger`）。然后我们取列表的最后一个元素作为枢轴元素（`pop`取最后一个元素并将其从原始`xs`列表中移除）。\n\
    \n接着我们遍历列表`xs`中的每个元素x。比枢轴小的元素，我们存入`smaller`临时列表，其他的则存入`larger`临时列表。最后，我们将两个列表与中间的枢轴项合并，就完成了列表的分区。\n\
    \n这比本教程开头的实现更容易阅读，那为什么我们不这样做呢？\n\n快速排序的主要优势在于它是一个*就地*排序算法。虽然对于我们当前查看的小例子来说，创建列表的几个副本可能看起来不是什么大问题，但如果你试图对数太字节的数据进行排序，或者在非常有限的计算机（例如智能手表）上对任意数量的数据进行排序，那么你就不需要无谓地复制数组。\n\
    \n用计算机科学的术语来说，这个算法的空间复杂度是O(2n)，其中n是`xs`数组中的元素数量。如果我们考虑上面的例子`xs = [8, 4, 2, 2,\
    \ 1, 7, 10, 5]`，我们将需要在原始`xs`数组中存储所有8个元素，同时在`larger`数组中存储三个元素（`[7, 10, 8]`），在`smaller`数组中存储四个元素（`[4,\
    \ 2, 2, 1]`）。这是空间的浪费！通过一些巧妙的技巧，我们可以在原始数组上执行一系列交换操作，而完全不需要进行任何复制。"
