  md: '# Getting weather data from OpenWeatherMap


    To get weather data automatically from OpenWeatherMap<sup>167</sup>, you’ll need
    an API Key. This is a unique string that OpenWeatherMap gives to each user of
    their service and it’s used mainly to restrict how many calls each person can
    make in a specified period. Luckily, OpenWeatherMap provides a generous “free”
    allowance of calls, so we won’t need to spend any money to build our app. Unfortunately,
    this allowance is not quite generous enough to allow me to share my key with every
    reader of this tutorial, so you’ll need to sign up for your own account and generate
    your own key.


    Visit openweathermap.org<sup>168</sup>, hit the “sign up” button, and register
    for the service by giving them an email address and choosing a password. Then
    navigate to the API Keys<sup>169</sup> section and note down your unique API key
    (or copy it to your clipboard).


    ![](img/48efb5586f6da072fc1456bee6971293_215_0.png)


    This key is a bit like a password – when we use OpenWeatherMap’s service, we’ll
    always send along this key to indicate that it’s us making the call. Because Repl.it’s
    projects are public by default, we’ll need to be careful to keep this key private
    and prevent other people making too many calls using our OpenWeatherMap quota
    (potentially making our app fail when OpenWeatherMap starts blocking our calls).
    Luckily Repl.it provides a neat way of solving this problem using .env files<sup>170</sup>.


    In your project, create a new file using the “New file” button as shown below.
    Make sure that the file is in the root of your project and that you name the file
    .env (in Linux, starting a filename with a . usually indicates that it’s a system
    or configuration file). Inside this file, define the OPEN_WEATHER_'
  merge: -1
  pgno: 215
- img_proc: true
  md: 'TOKEN variable as follows, but using your own token instead of the fake one
    below. Make sure not to have a space on either side of the = sign.


    ```

    OPEN_WEATHER_TOKEN=1be9250b94bf6803234b56a87e55f

    ```


    ![](img/48efb5586f6da072fc1456bee6971293_216_0.png)


    # Creating a new file


    Repl.it will load the contents of this file into our server’s environment variables.
    We’ll be able to access this using the os library in Python, but when other people
    view or fork our Repl, they won’t see the .env file, keeping our API key safe
    and private.


    To fetch weather data, we need to call the OpenWeatherMap api, passing along a
    search term. To make sure we’re getting the city that we want, it’s good to pass
    along the country code as well as the city name. For example, to get the weather
    in London right now, we can visit (again, you’ll need to add your own API key
    in place of the string after appid=) https://api.openweathermap.org/data/2.5/weather?q=London


    To test this, you can visit the URL in your browser first. If you prefer Fahrenheit
    to Celsius, simply change the unit=metric part of the url to units=imperial.'
