    # # Creating a static home page


    Viewing the default website isn’t that interesting and you’ll notice that there
    are no files containing the content you currently see, so you can’t easily modify
    it.


    To create our own page in place, we’ll have to modify several files. If you’ve
    created a basic HTML file before, you might be surprised at how complicated this
    step is. Like other frameworks, Django “makes the easy things hard, and the hard
    things possible”. If you just want to display a basic web page, it’s probably
    over kill, but as your web app grows, you’ll find use for all of the extra structure.


    Let’s set up a basic “Hello world” page to make sure we have the pieces in place.
    You’ll need to create several more folders and files to achieve this.


    Create a folder called `templates`. This is where Django will get HTML templates
    for rendering pages.'
