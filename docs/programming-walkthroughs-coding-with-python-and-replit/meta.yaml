    \  await message.channel.send(message.content[::-1])\n\ntoken = os.environ.get(\"\
    DISCORD_BOT_SECRET\")\nclient.run(token)\n```\n\nLet’s tear this apart line by\
    \ line to see what it does.\n\n- **Lines 1-2** import the discord library that\
    \ we installed earlier and the built-in operating system library, which we’ll\
    \ need to access our bot’s secret token.\n- In **line 4**, we create a Discord\
    \ Client. This is a Python object that we’ll use to send various commands to Discord’s\
    \ servers.\n- In **line 6**, we say we are defining an event for our client. This\
    \ line is a Python decorator, which will take the function directly below it and\
