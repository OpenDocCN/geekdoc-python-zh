  md: 'To call this view function we need to add it to our url patterns. Open the
    `mysite/urls.py` file and replace the contents with the below code.


    ```

    1  from django.contrib import admin

    2  from django.urls import path

    3  from . import views

    4

    5  urlpatterns = [

    6       path('''', views.home, name=''home''),

    7       path(''admin/'', admin.site.urls),

    8  ]

    ```


    Note that we import the views file created earlier `from . import views`. Then
    we add the url pattern with an empty path '''' and point it to the `home` view
    created earlier. The `admin/` path points to the admin page that comes as a default
    with Django.


    When Django receives a request it goes through the `urlpatterns` list until it
    finds a match. In our case `<url>.com` will match the first path and return the
    `home` view that will render the `index.html` page. If we navigate to `<url>.com/admin/`,
    Django will match the pattern of the `admin/` path and return the admin page.


    Restart your server and refresh the web page on the right. You should see our
    “Hello World!” page.


    ![](img/48efb5586f6da072fc1456bee6971293_205_0.png)


    Great, we have now put all the pieces in place for our “Hello World!” web page.Let’s
    expand this and start building our weather app.'
