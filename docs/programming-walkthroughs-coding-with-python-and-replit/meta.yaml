    \ 中表示。现在我们有了问题的向量化表示，让我们看看如何解决它。\n\n## 理解分类\n\n分类器是一种统计模型，它试图为给定的输入预测一个标签。在我们的例子中，输入是文本，输出是“positive”或“negative”，取决于分类器认为输入是正面还是负面。\n\
