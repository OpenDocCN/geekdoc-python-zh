    ¹⁴⁸ http://ip-api.com/\n¹⁴⁹ https://openweathermap.org\n\n## 设置环境\n\n你无需在本地机器上安装任何软件或编程语言，因为我们将直接通过\
    \ [repl.it](https://repl.it) 进行开发。前往该网站并创建一个账户。点击右上角的 + 按钮创建一个新项目，并搜索“Django Template”。为你的项目命名，然后点击“Create\
    \ repl”。\n\n![](img/48efb5586f6da072fc1456bee6971293_197_0.png)\n\n默认情况下，Django带有一个非常复杂的现有文件和文件夹的目录结构。还会有一个默认打开的README.md文件，为你提供一些关于如何熟悉环境的指导。\n\
    \n## 在Repl.it上开发Django\n\n- 从此模板开始复刻\n- 只需点击运行即可启动服务器\n- 服务器会根据需要自动重新加载。你无需手动重启服务器。\n\
    \n### 添加你的第一个视图\n\n1.  在 `mysite` 目录下创建一个名为 `views.py` 的文件，内容如下：\n\n```python\n\
    from django.http import HttpResponse\n\ndef index(request):\n    return HttpResponse(\"\
    Hello, world.\")\n```\n\n2.  在 `mysite/urls.py` 下添加一个URL模式。它应该看起来像这样：\n\n```python\n\
    from django.contrib import admin\nfrom django.urls import path\nfrom . import\
    \ views\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('',\
    \ views.index),\n]\n```\n\n![](img/48efb5586f6da072fc1456bee6971293_199_0.png)\n\
    \n```\nSystem check identified no issues (0 silenced).\nYou have 18 unapplied\
