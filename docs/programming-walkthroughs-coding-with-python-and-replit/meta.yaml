  mdcn: "你可能已经注意到的另一个问题是，玩家在几次跳跃后会陷入地面——这是由于我们的碰撞检测不够精确造成的。\n\n我们将通过微调处理与方块碰撞的方式来解决这个问题。我们不再在玩家精灵与方块碰撞时判定玩家在地面上，而是检查玩家是否在与方块碰撞点上方1像素处。同样的原理也将应用于左、右和上方，使玩家在碰撞发生前刚好停下。\n\
