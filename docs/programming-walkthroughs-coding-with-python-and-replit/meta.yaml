- md: "## 允许用户删除联系人\n\n有时有些人我们只是不想再联系了。我们已经通过更新联系人的键并删除旧记录来移除联系人，但现在让我们也允许在没有更新的情况下直接删除。到目前为止，你应该已经熟悉了需要更新的代码部分。总结如下：\n\
    \n- 在 `main.py` 文件中添加一个新的 `prompt_*` 函数\n- 在 `contacts.py` 文件中添加一个新的 `*_contact`\
    \ 函数\n- 在 `main.py` 的菜单提示信息中添加新一行\n- 在 `main.py` 的 `main()` 函数中添加一个新的 `elif` 代码块\n\
    \n下面将依次展示这些内容。\n\n```python\ndef prompt_delete_contact():\n    name = input(\"\
    Please enter the name to delete: \")\n    contact = contacts.get_contact(name)\n\
    \    if contact:\n        print(f\"Deleting {name}\")\n        contacts.delete_contact(name)\n\
    \    else:\n        print(f\"It looks like {name} does not exist\")\n```\n\n```python\n\
    def delete_contact(name):\n    del db[name]\n```\n\n```python\nmain_message =\
    \ \"\"\"WELCOME TO PHONEBOOK\n--------------------------------\nPlease choose:\n\
    1 - to add a new contact\n2 - to find a contact\n3 - to update a contact\n4 -\
    \ to delete a contact\n--------------------------------\n\"\"\"\n```\n\n```python\n\
    def main():\n    print(main_message)\n    choice = input(\"Please make your choice:\
    \ \").strip()\n    if choice == \"1\":\n        prompt_add_contact()\n    elif\
    \ choice == \"2\":\n        prompt_get_contact()\n    elif choice == \"3\":\n\
    \        prompt_update_contact()\n    elif choice == \"4\":\n        prompt_delete_contact()\n\
    \    else:\n        print(\"Invalid input. Please try again.\")\n```\n\n输入要删除的联系人的完整名称可能有点不方便，但通常让“危险”操作不那么用户友好是可以接受的。由于没有恢复联系人的方法，让删除操作稍微困难一些是件好事。也许我们的用户在输入要删除记录的老朋友的名字时会改变主意，转而联系对方\
    \ :)。\n\n## 个性化你的程序\n\n如果你跟着教程一步步做了，你现在应该有一个自己的 repl 副本可以扩展。否则，可以从我们的起点开始：https://repl.it/@GarethDwyer1/cwr-11-phonebook<sup>74</sup>。\n\
    \n## 下一步\n\n你已经了解了基本数据库的工作原理。数据库本身就是一个复杂的主题，掌握其高级方面可能需要数年甚至数十年的时间，但它们能做的远不止我们这里涵盖的简单操作。花些时间阅读关于\
    \ PostgreSQL<sup>75</sup> 和关系型数据库<sup>76</sup> 的一般知识，或者其他像 Repl.it 数据库这样的键值存储<sup>77</sup>。\n\
    \n即使不进行进一步研究，我们这里涵盖的基本的创建、读取、更新和删除（CRUD）操作也能让你走得很远，仅凭这些你就能构建几乎任何能想象到的应用程序。\n\n\
    接下来，我们将看看如何用程序化的方式播放音频文件，这样你就可以用 Python 来控制你的音乐。\n\n- 74. https://repl.it/@GarethDwyer1/cwr-11-phonebook\n\
    - 75. https://www.postgresql.org/\n- 76. https://en.wikipedia.org/wiki/Relational_database\n\
    - 77. https://en.wikipedia.org/wiki/Key%E2%80%93value_database\n\n## Repl.it 音频\n\
    \n![img/48efb5586f6da072fc1456bee6971293_128_0.png](img/48efb5586f6da072fc1456bee6971293_128_0.png)\n\
    \n大多数人手动控制他们的音乐播放器，按暂停键暂停曲目，或按音量增加键提高音量。使用 Repl.it，你可以用代码自动化你的媒体体验。\n\n在本教程中，我们将构建一个可以编程化播放音频文件的媒体播放器，允许用户通过文本命令暂停播放、切换曲目、改变音量或获取循环信息。\n\
    \n我们还将概述如何将其集成到其他应用程序中，例如聊天机器人，但我们将把实现的细节留作读者的练习。\n\n## 理解 Repl.it 上的音频工作原理\n\n\
    在包括 Repl.it 所使用的系统在内的 Unix 系统中，[一切皆文件](https://en.wikipedia.org/wiki/Everything_is_a_file)。你可能想到的是\
    \ PDF、文本文件、图像文件或音频文件等文件类型，但实际上，即使是打印机之类的东西也经常被底层操作系统“视为”文件。\n\nRepl.it 使用位于 `/tmp/audio`\
    \ 的特殊文件来控制媒体输出。关于如何直接操作这个文件的更多细节，请参阅[音频文档](https://docs.repl.it/repls/audio)，但\
    \ Repl.it 也提供了一个更高级的 Python 库，其中包含一些像 `play_audio` 这样的高级函数。我们将在本教程中使用这个库。\n\n\
