    \ token that Discord gave you when creating your own bot.\n- Be careful about\
    \ **spacing**. If you put a space on either side of the = in your .env file, these\
    \ spaces will be part of the variable name or the value, so make sure you don't\
    \ have any spaces around the = or at the end of the line.\n- Run the code again.\
    \ Sometimes you'll need to refresh the whole page to make sure that your environment\
    \ variables are successfully loaded.\n\nIn the image below we've highlighted the\
    \ “Add file” button, the new file (.env) and how to define the secret token for\
    \ our bot's use.\n\n![](img/48efb5586f6da072fc1456bee6971293_189_0.png)\n\nLet's\
    \ make a Discord bot that repeats everything we say but in reverse. We can do\
    \ this in only a few lines of code. In your index.js file, add the following:\n\
    \n```javascript\nconst Discord = require('discord.js');\nconst client = new Discord.Client();\n\
    const token = process.env.DISCORD_BOT_SECRET;\n\nclient.on('ready', () => {\n\
    \  console.log(\"I'm in\");\n  console.log(client.user.username);\n});\n\nclient.on('message',\
    \ msg => {\n  if (msg.author.id != client.user.id) {\n    msg.channel.send(msg.content.split('').reverse().join(''));\n\
    \  }\n});\n\nclient.login(token);\n```\n\nLet’s tear this apart line by line to\
    \ see what it does.\n\n- **Line 1** is what we had earlier. This line both tells\
    \ Repl.it to install the third party library and brings it into this file so that\
    \ we can use it.\n- In **line 2**, we create a Discord Client. We’ll use this\
    \ client to send commands to the Discord *server* to control our bot and send\
    \ it commands.\n- In **line 3** we retrieve our secret token from the environment\
    \ variables (which Repl.it sets from our .env file).\n- In **line 5**, we define\
    \ an event for our client, which defines how our bot should react to the “ready”\
    \ event. The Discord bot is going to run *asynchronously*, which might be a bit\
    \ confusing if you’re used to running standard synchronous code. We won’t go into\
    \ asynchronous coding in depth here, but if you’re interested in what this is\
    \ and why it’s used, there’s a good guide over at [RisingStack](https://blog.risingstack.com/node-hero-async-programming-in-node-js/)¹³⁸.\
    \ In short, instead of running the code in our file from top to bottom, we’ll\
    \ be running pieces of code in response to specific events.\n- In **lines 6-8**\
    \ we define how our bot should respond to the “ready” event, which is fired when\
    \ our bot successfully joins a server. We instruct our bot to output some information\
    \ server side (i.e. this will be displayed in our Repl’s output, but not sent\
    \ as a message through to Discord). We’ll print a simple I’m in message to see\
    \ that the bot is there and print our bot’s username (if you’re running multiple\
    \ bots, this will make it easier to work out who’s doing what).\n- **Lines 10-14**\
    \ are similar, but instead of responding to an “ready” event, we tell our bot\
    \ how to handle new messages. **Line 11** says we only want to respond to messages\
    \ that aren’t from us (otherwise our bot will keep responding to himself – you\
    \ can remove this line to see why that’s a problem), and **line 12** says we’ll\
    \ send a new message to the same channel where we received a message (`msg.channel`)\
    \ and the content we’ll send will be the same message that we received, but backwards.\
    \ To reverse a string, we split it into its individual characters, reverse the\
    \ resulting array, and then join it all back into a string again.\n\nThe last\
    \ line fires up our bot and uses the token we loaded earlier to log into Discord.\n\
    \nPress the big green “Run” button again and you should see your bot reporting\
    \ a successful channel join in the Repl output.\n\n> ¹³⁸ https://blog.risingstack.com/node-hero-async-programming-in-node-js/\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_191_0.png)\n\nOpen Discord, and from\
    \ within the server we created earlier, select your ReplBotApplication from the\
    \ pane on the right-hand side of the screen.\n\n![](img/48efb5586f6da072fc1456bee6971293_191_1.png)\n\
    \nOnce you have selected this, you will be able to send a message (by typing into\
    \ the box highlighted below) and see your bot respond!\n\n![](img/48efb5586f6da072fc1456bee6971293_192_0.png)\n\
    \nImage:11 *Send a message to your bot*.\n\nThe bot responds each time, reversing\
    \ the text we enter.\n\n![](img/48efb5586f6da072fc1456bee6971293_193_0.png)\n\n\
    Image:12 Our bot can talk!\n\n## Keeping our bot alive\n\nYour bot can now respond\
    \ to messages, but only for as long as your Repl is running. If you close your\
    \ browser tab or shut down your computer, your bot will stop and no longer respond\
    \ to messages on Discord.\n\nRepl will keep your code running after you close\
    \ the browser tab only if you are running a web server. Our bot doesn't require\
    \ an explicit web server to run, but we can create a server and run it in the\
    \ background just to keep our Repl alive.\n\nCreate a new file in your project\
    \ called `keep_alive.js` and add the following code:\n\n```javascript\nvar http\
    \ = require('http');\n\nhttp.createServer(function (req, res) {\n    res.write(\"\
    I'm alive\");\n    res.end();\n}).listen(8080);\n```\n\nWe won’t go over this\
    \ in detail as it’s not central to our bot, but here we start a web server that\
    \ will return “I’m alive” if anyone visits it.\n\nIn our `index.js` file, we need\
    \ to add a require statement for this server at the top. Add the following line\
    \ near the top of `index.js`.\n\n```javascript\nconst keep_alive = require('./keep_alive.js')\n\
    ```\n\nAfter doing this and hitting the green “Run” button again, you should see\
    \ some changes to your Repl. For one, you’ll see a new pane in the top right which\
    \ shows the web output from your server. We can see that visiting our Repl now\
    \ returns a basic web page showing the “I’m alive” string that we told our web\
    \ server to return by default.\n\n![](img/48efb5586f6da072fc1456bee6971293_194_0.png)\n\
    \nNow your bot will stay alive even after closing your browser or shutting down\
    \ your development machine. Repl will still clean up your server and kill your\
    \ bot after about one hour of inactivity, so if you don’t use your bot for a while,\
    \ you’ll have to log into Repl and start the bot up again. Alternatively, you\
    \ can set up a third-party (free!) service like [Uptime Robot](https://uptimerobot.com/).\
    \ Uptime Robot pings your site every 5 minutes to make sure it’s still working\
    \ – usually to notify you of unexpected downtime, but in this case the constant\
    \ pings have the side effect of keeping our Repl alive as it will never go more\
    \ than an hour without receiving any activity. Note that you need to select the\
    \ HTTP option instead of the Ping option when setting up Uptime Robot, as Repl.it\
    \ requires regular HTTP requests to keep your chatbot alive.\n\n> ¹³⁹ https://uptimerobot.com/\n\
    \n## Forking and extending our basic bot\n\nThis is not a very useful bot as is,\
    \ but the possibilities are only limited by your creativity now! You can have\
    \ your bot receive input from a user, process the input, and respond in any way\
    \ you choose. In fact, with the basic input and output that we’ve demonstrated,\
    \ we have most of the components of any modern computer, all of which are based\
    \ on the [Von Neumann architecture](https://en.wikipedia.org/wiki/Von_Neumann_architecture)¹⁴⁰\
    \ (we could easily add the missing memory by having our bot write to a file, or\
    \ with a bit more effort link in a [SQLite database](https://www.sqlite.org/index.html)¹⁴¹\
    \ for persistent storage).\n\nIf you followed along this tutorial, you’ll have\
    \ your own basic Repl bot to play around with and extend. If you were simply reading,\
    \ you can easily fork my bot at [https://repl.it/@GarethDwyer1/discord-bot-node](https://repl.it/@GarethDwyer1/discord-bot-node)¹⁴²\
    \ and extend it how you want (you’ll need to add your own token and recreate the\
    \ `.env` file still). Happy hacking!\n\nIf you’re stuck for ideas, why not link\
    \ up your Discord bot to the [Twitch API](https://dev.twitch.tv/)¹⁴³ to get notified\
    \ when your favourite streamers are online, or build a [text adventure](https://en.wikipedia.org/wiki/Interactive_fiction)¹⁴⁴.\n\
    \nIn the next chapter, we’ll be looking at building our own basic web application,\
    \ using Django. This tutorial will also introduce you to HTML, JavaScript, and\
    \ jQuery and will assist you in getting to the point where you can begin to build\
    \ your own custom web applications.\n\n1. https://en.wikipedia.org/wiki/Von_Neumann_architecture\n\
    2. https://www.sqlite.org/index.html\n3. https://repl.it/@GarethDwyer1/discord-bot-node\n\
    4. https://dev.twitch.tv/\n5. https://en.wikipedia.org/wiki/Interactive_fiction"
  mdcn: "您需要：\n\n- **替换**下面的令牌（在 = 符号之后）为您在创建自己的 Discord 机器人时获得的令牌。\n- 请注意**空格**。如果您在\
    \ `.env` 文件中 `=` 的任意一侧放置了空格，这些空格将成为变量名或值的一部分，因此请确保 `=` 周围或行末没有空格。\n- 再次运行代码。有时您需要刷新整个页面，以确保环境变量已成功加载。\n\
    \n在下面的图片中，我们高亮显示了“添加文件”按钮、新文件（`.env`）以及如何为我们机器人的使用定义秘密令牌。\n\n![](img/48efb5586f6da072fc1456bee6971293_189_0.png)\n\
    \n让我们制作一个会重复我们所有话语但反向输出的 Discord 机器人。我们只需几行代码即可完成。在您的 `index.js` 文件中，添加以下内容：\n\
    \n```javascript\nconst Discord = require('discord.js');\nconst client = new Discord.Client();\n\
    const token = process.env.DISCORD_BOT_SECRET;\n\nclient.on('ready', () => {\n\
    \  console.log(\"I'm in\");\n  console.log(client.user.username);\n});\n\nclient.on('message',\
    \ msg => {\n  if (msg.author.id != client.user.id) {\n    msg.channel.send(msg.content.split('').reverse().join(''));\n\
    \  }\n});\n\nclient.login(token);\n```\n\n让我们逐行分析这段代码，看看它的作用。\n\n- **第 1 行**是之前就有的。这行代码既告诉\
    \ Repl.it 安装第三方库，又将其引入此文件，以便我们可以使用它。\n- 在**第 2 行**，我们创建了一个 Discord Client。我们将使用这个客户端向\
    \ Discord *服务器*发送命令，以控制我们的机器人并发送指令。\n- 在**第 3 行**，我们从环境变量中检索我们的秘密令牌（Repl.it 根据我们的\
    \ `.env` 文件设置这些变量）。\n- 在**第 5 行**，我们为客户端定义了一个事件，该事件规定了机器人应如何响应“就绪”事件。Discord 机器人将*异步*运行，如果您习惯了运行标准的同步代码，这可能会有点令人困惑。我们不会在此深入探讨异步编码，但如果您对此感兴趣以及为何使用它，可以在\
    \ [RisingStack](https://blog.risingstack.com/node-hero-async-programming-in-node-js/)¹³⁸\
    \ 找到一份很好的指南。简而言之，我们不是从文件顶部到底部运行代码，而是运行响应特定事件的代码片段。\n- 在**第 6-8 行**，我们定义了机器人如何响应“就绪”事件，该事件在我们的机器人成功加入服务器时触发。我们指示机器人在服务器端输出一些信息（即这将显示在我们的\
    \ Repl 输出中，但不会作为消息发送到 Discord）。我们将打印一条简单的“I'm in”消息来确认机器人在线，并打印我们机器人的用户名（如果您运行多个机器人，这将更容易分辨是谁在做什么）。\n\
    - **第 10-14 行**类似，但不是响应“就绪”事件，而是告诉我们的机器人如何处理新消息。**第 11 行**表示我们只想响应非来自我们自己的消息（否则机器人会一直回应自己——您可以移除此行来看看为什么这是个问题），而**第\
    \ 12 行**表示我们将向收到消息的同一频道（`msg.channel`）发送新消息，内容将是收到的相同消息，但顺序相反。要反转字符串，我们先将其拆分为单个字符，反转所得数组，然后将它们全部重新拼接成一个字符串。\n\
    \n最后一行启动我们的机器人，并使用我们之前加载的令牌登录 Discord。\n\n再次点击那个绿色的“运行”按钮，您应该会在 Repl 的输出中看到您的机器人报告成功加入了频道。\n\
    \n> ¹³⁸ https://blog.risingstack.com/node-hero-async-programming-in-node-js/\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_191_0.png)\n\n打开 Discord，在我们之前创建的服务器中，从屏幕右侧面板选择您的\
    \ ReplBotApplication。\n\n![](img/48efb5586f6da072fc1456bee6971293_191_1.png)\n\
    \n选择后，您就可以发送消息（在下面高亮的框中输入）并看到您的机器人响应了！\n\n![](img/48efb5586f6da072fc1456bee6971293_192_0.png)\n\
    \n图片：11 *向你的机器人发送消息*。\n\n机器人每次都会响应，反转我们输入的文本。\n\n![](img/48efb5586f6da072fc1456bee6971293_193_0.png)\n\
    \n图片：12 我们的机器人会说话了！\n\n## 保持我们的机器人在线\n\n您的机器人现在可以响应消息了，但仅当您的 Repl 正在运行时。如果您关闭浏览器标签页或关闭计算机，您的机器人将停止运行，不再响应\
    \ Discord 上的消息。\n\n只有在运行网络服务器时，Repl 才会在您关闭浏览器标签页后保持您的代码运行。我们的机器人不需要显式的网络服务器来运行，但我们可以创建一个服务器并在后台运行它，只是为了保持我们的\
    \ Repl 处于活跃状态。\n\n在项目中创建一个新文件 `keep_alive.js`，并添加以下代码：\n\n```javascript\nvar http\
    \ = require('http');\n\nhttp.createServer(function (req, res) {\n    res.write(\"\
    I'm alive\");\n    res.end();\n}).listen(8080);\n``\n\n我们不会详细讨论这个，因为它不是我们机器人的核心，但这里我们启动了一个网络服务器，如果有人访问它，它将返回“I'm\
    \ alive”。\n\n在我们的 `index.js` 文件中，我们需要在顶部添加这个服务器的 require 语句。在 `index.js` 靠近顶部的位置添加以下行。\n\
    \n```javascript\nconst keep_alive = require('./keep_alive.js')\n```\n\n完成此操作并再次点击绿色的“运行”按钮后，您应该会看到\
    \ Repl 的一些变化。首先，您会在右上角看到一个新的面板，显示来自您服务器的网络输出。我们可以看到，现在访问我们的 Repl 会返回一个基本的网页，显示我们告诉网络服务器默认返回的“I'm\
    \ alive”字符串。\n\n![](img/48efb5586f6da072fc1456bee6971293_194_0.png)\n\n现在，即使关闭浏览器或关闭开发机器，您的机器人也会保持在线。Repl\
    \ 在大约一小时的不活动后仍会清理您的服务器并终止您的机器人，所以如果您一段时间不使用机器人，您将需要重新登录 Repl 并再次启动机器人。或者，您可以设置一个第三方（免费！）服务，如\
    \ [Uptime Robot](https://uptimerobot.com/)¹³⁹。Uptime Robot 每 5 分钟 ping 一次您的网站以确保它仍在运行——通常是为了通知您意外的停机，但在这种情况下，持续的\
    \ ping 有一个副作用，就是保持我们的 Repl 处于活跃状态，因为它永远不会超过一小时没有收到任何活动。请注意，在设置 Uptime Robot 时，您需要选择\
    \ HTTP 选项而不是 Ping 选项，因为 Repl.it 需要定期的 HTTP 请求来保持您的聊天机器人在线。\n\n> ¹³⁹ https://uptimerobot.com/\n\
    \n## 分叉和扩展我们的基础机器人\n\n目前这并不是一个非常有用的机器人，但可能性现在仅限于您的创造力了！您可以让你的机器人接收用户输入，处理输入，并以您选择的任何方式响应。事实上，通过我们演示的基本输入和输出，我们拥有了任何现代计算机的大部分组件，所有这些都基于[冯·诺依曼架构](https://en.wikipedia.org/wiki/Von_Neumann_architecture)¹⁴⁰（我们可以很容易地通过让机器人写入文件来添加缺失的内存，或者稍微费点劲，链接一个[SQLite\
    \ 数据库](https://www.sqlite.org/index.html)¹⁴¹ 进行持久化存储）。\n\n如果您跟随本教程学习，您将拥有自己的基础\
    \ Repl 机器人来把玩和扩展。如果您只是阅读，您可以轻松地分叉我的机器人 [https://repl.it/@GarethDwyer1/discord-bot-node](https://repl.it/@GarethDwyer1/discord-bot-node)¹⁴²，并按需扩展它（您仍需添加自己的令牌并重新创建\
    \ `.env` 文件）。祝您编码愉快！\n\n如果您缺少想法，为什么不将您的 Discord 机器人连接到 [Twitch API](https://dev.twitch.tv/)¹⁴³，以便在您最喜欢的主播上线时收到通知，或者构建一个[文字冒险游戏](https://en.wikipedia.org/wiki/Interactive_fiction)¹⁴⁴。\n\
    \n在下一章中，我们将学习使用 Django 构建我们自己的基础 Web 应用程序。本教程还将向您介绍 HTML、JavaScript 和 jQuery，并帮助您达到可以开始构建自己的定制\
    \ Web 应用程序的水平。\n\n1. https://en.wikipedia.org/wiki/Von_Neumann_architecture\n\
    2. https://www.sqlite.org/index.html\n3. https://repl.it/@GarethDwyer1/discord-bot-node\n\
    4. https://dev.twitch.tv/\n5. https://en.wikipedia.org/wiki/Interactive_fiction"
