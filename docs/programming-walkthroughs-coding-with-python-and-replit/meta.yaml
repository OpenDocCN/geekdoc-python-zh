    \ 5 行**定义了我们想要更新客户的新值。\n- **第 6 行**使用查询将新值更新给客户。\n- **第 7 行**在更新出现问题时抛出错误。\n-\
    \ **第 8 行**记录一个文档已被更新。\n- **第 9 行**使用一条消息重新渲染更新页面，表示客户已更新，并显示新值。\n- **第 15 行**连接到我们的\
    \ MongoDB 数据库。\n- **第 16 行**在连接数据库出现问题时抛出错误。\n- **第 17 行**定义了一个查询，我们将用它来查找要删除的文档。在这个例子中，我们使用了表单更改*前*的所有客户详细信息，以确保我们删除的是那个特定的客户。\n\
    - **第 18 行**我们连接数据库并删除该客户。\n- **第 19 行**在删除出现问题时抛出错误。\n- **第 20 行**记录一个文档已被删除。\n\
    - **第 21 行**发送一条响应，说明客户已被删除。\n\n## 综合运用\n\n如果您现在运行您的应用程序，您将能够在 MongoDB 数据库中创建、更新和删除文档。这是一个非常基础的\
    \ CRUD 应用程序，具有非常基础且未加样式的 UI，但它应该为您提供构建更复杂应用程序的基础。\n\n一些可以考虑的扩展思路：\n- 您可以向数据库添加字段，根据客户在您销售管道[^183]中的阶段来对客户进行分类，以便您可以跟踪客户是否可能卡在某个环节，并联系他们以重新建立互动。\n\
    - 然后，您可以集成一些基础的营销自动化功能，提供一个允许您向客户发送电子邮件或短信的页面（不过请不要给客户发送垃圾信息！）。\n- 您也可以添加字段来跟踪客户的购买信息，以便您可以查看哪些产品与哪些客户匹配度更高。\n\
    \n如果您想从本教程结束的地方继续，请 Fork 此 Repl：https://repl.it/@GarethDwyer1/nodejs-crm[^184]。\n\
    \n在下一章中，我们将介绍在 Repl.it 中使用机器学习对文本进行分类。\n\n[^182]: https://pugjs.org/api/getting-started.html\n\
    [^183]: https://www.bitrix24.com/glossary/what-is-pipeline-management-definition-crm.php\n\
    [^184]: https://repl.it/@GarethDwyer1/nodejs-crm"
