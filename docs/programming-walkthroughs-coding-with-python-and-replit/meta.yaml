    \ /get 上传入的 GET 请求。\n- 第 5-12 行，这告诉 Express 响应 /get-client 上的传入 GET 请求。\n    -\
    \ 第 7 行对数据库进行调用，按名称获取一个客户。如果有多个同名的客户，则返回找到的第一个。\n    - 第 9 行告诉 Express 渲染更新模板，在过程中将变量替换为给定的值。这里需要注意的是，我们还使用客户详情的当前值替换了我们之前创建的隐藏表单字段中的值。这是为了确保我们更新或删除正确的客户。\n\
