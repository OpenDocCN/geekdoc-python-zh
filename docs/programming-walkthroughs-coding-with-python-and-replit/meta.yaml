  md: '# Introduction to Machine Learning with Python and Repl.it


    In this tutorial, we''re going to walk through how to set up a basic Python Repl<sup>185</sup>
    that can learn the difference between two categories of sentences, positive and
    negative. For example, if you had the sentence “I love it!”, we want to train
    a machine to know that this sentence is associated with happy and positive emotions.
    If we have a sentence like “it was really terrible”, we want the machine to label
    it as a negative or sad sentence.


    The maths, specifically calculus and linear algebra, behind machine learning gets
    a bit hairy. We’ll be abstracting this away with the Python library scikit-learn<sup>186</sup>,
    which makes it possible to do advanced machine learning in a few lines of Python.


    At the end of this tutorial, you’ll understand the fundamental ideas of automatic
    classification and have a program that can learn by itself to distinguish between
    different categories of text. You’ll be able to use the same code to learn new
    categories (e.g. spam/not-spam, or clickbait/non-clickbait).


    # Overview and requirements


    To follow along with this tutorial, you should have at least basic knowledge of
    Python or a similar programming language. Ideally, you should also sign up for
    a Repl.it<sup>187</sup> account so that you can modify and extend the bot we build,
    but it’s not completely necessary.


    In this tutorial, we will:


    +   - Create some simple mock data - text to classify as positive or negative

    - Explain vectorisation of the dataset

    - Cover how to classify text using a machine learning classifier

    - Compare this to a manual classifier


    # Setting up


    Create a new Python Repl and open the main.py file that Repl created for you automatically.
    Add the following two imports to the top and run the Repl so that these dependencies
    are installed.'
