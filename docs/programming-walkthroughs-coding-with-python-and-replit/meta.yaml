    \n你还会注意到，虽然它能被识别为美国，但比例并不正确。将三维球体映射到二维平面上出奇地困难，并且有多种不同的方法可以实现。\n\n## 使用 seaborn\
    \ 和 pandas 进行更高级的绘图\n\n绘制 X-Y 点是良好的开端，但在大多数情况下，你需要做更多一点的工作。[seaborn](https://seaborn.pydata.org/)\
