    \ telephone *\n\n+275554202\n\nCustomer note\n\nNeeds a new pair of shoes\n\n\
    Submit\n\nImage: 6 *Customer Details*\n\nWhen the user presses the submit button\
    \ a POST request is made to /create with the data in the form - we still have\
