    \ out more about it through data visualisations.\n\nNext up, we’ll explore the\
    \ multiplayer functionality of Repl.it in more detail so that you can code collaboratively\
    \ with friends or colleagues.\n\n[^38]: https://datasetsearch.research.google.com/\n\
    \n## Multiplayer: Pair programming with Repl.it\n\nSoftware developers have a\
    \ reputation for being loners, but they don’t always code by themselves. [Pair\
    \ programming](https://en.wikipedia.org/wiki/Pair_programming) is used by many\
    \ programmers to\n\n- Write bug-free code more efficiently (for example, one person\
    \ might watch for mistakes while the other codes).\n- Share knowledge (a less-experienced\
    \ programmer might ‘follow along’ while a more experienced programmer develops\
    \ something, learning from each step of the process).\n- Assess expertise (if\
    \ you’re considering a new hire, watching them code first can be helpful to assess\
    \ how good a coder they are, but coding with them allows you to also see their\
    \ experience in teamwork and communication).\n\nPair programming intuitively sounds\
    \ like it would be inefficient: after all, the two developers could instead be\
    \ working on different projects simultaneously. But on top of catching more bugs,\
    \ two people working together often display more creativity as well. You might\
    \ think of an idea based on something your buddy said that wouldn’t have come\
    \ to you alone.\n\nIf you have a friend handy, work through this tutorial together\
