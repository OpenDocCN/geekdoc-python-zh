- img_proc: true
  md: "![](img/48efb5586f6da072fc1456bee6971293_260_0.png)\n\n**Encoding a message\
    \ as a binary string**\n\nThe base64 step is not strictly necessary, but it is\
    \ useful as any file or data can be encoded as base64. This opens our project\
    \ up to future extensions such as hiding other kinds of files within image files\
    \ instead of just text strings.\n\n# Adding an ‘end of message’ delimeter\n\n\
    We’ll assume that our message will always ‘fit’ in our image. We can fit three\
    \ binary digits per pixel (one for each of the RGB values), so our resulting binary\
    \ string should be shorter than the the number of pixels in the image multiplied\
    \ by three.\n\nWe’ll also need to know when the message *ends*. The message will\
    \ only be encoded in the beginning of the image file, but if we don’t know how\
    \ long the message is, we’ll keep looking at normal pixels and trying to encode\
    \ them as text data. Let’s add an “end of string” delimiter to the end of our\
    \ message: this should be something that wouldn’t appear half way through our\
    \ actual message by chance. We’ll use the binary representation of ‘!ENDOFMESSAGE!’\
    \ for this.\n\nModify your function to look as follows, which adds this delimeter\
    \ at the end.\n\n```\npython\nimport base64\n\nENDOFMESSAGE = \"01001001010101010101011001001111010100100010100111001010001110101\\\
    \n010001010101010101100101010001010101001100000100011001001000010100100101001101000101\\\
    \n00111101\"\n\ndef encode_message_as_bytestring(message):\n    b64 = message.encode(\"\
    utf8\")\n    bytes_ = base64.encodebytes(b64)\n    bytestring = \"\".join([\"\
    {:08b}\".format(x) for x in bytes_])\n    bytestring += ENDOFMESSAGE\n    return\
    \ bytestring\n\n```\n\nNow that we can handle some basic text encoding, let’s\
    \ look at images."
