  md: '```

    1  from namesplitter.utils import name_helper

    2

    3  def test_two_names():

    4      assert name_helper.split_name("John Smith") == ["John", "Smith"]

    ```


    Note that the `namesplitter` in the first line is taken from the name of your
    Repl.it project, which defines the names of the parent module. If you called your
    project something else, you’ll need to use that name in the import line. It’s
    important to not include special characters in the project name (including a hyphen,
    so names like my-tdd-demo are out) or the import won’t work.


    The `assert` keyword simply checks that a specific statement evaluates to `True`.
    In this case, we call our function on the left-hand side and give the expected
    value on the right-hand side, and ask `assert` to check if they are the same.


    This is our most basic case: we have two names and we simply split them on the
    single space. Of course, we haven’t written the `split_name` function anywhere
    yet, so we expect this test to fail. Let’s check.


    Usually you would run your tests by typing `py.test` into your terminal, but using
    Repl.it things work better if we import `pytest` into our code base and run it
    from there. This is because a) our terminal is always already activated into a
    Python environment and b) caching gets updated when we press the `Run` button,
    so invoking our tests from outside of this means that they could run on old versions
    of our code, causing confusion.


    Let’s run them from our `main.py` file for now as we aren’t using it for anything
    else yet. Add the following to this file.


    ```

    1  import pytest

    2  pytest.main()

    ```


    Press the `Run` button. `pytest` does automatic test discovery so you don’t need
    to tell it which tests to run. It will look for files that start with `test_`
    and for functions that start with `test_` and assume these are tests. (You can
    read more about exactly how test discovery works and can be configured [here](https://docs.pytest.org/en/reorganize-docs/new-docs/user/naming_conventions.html).)


    You should see some scary looking red failures, as shown below. (`pytest` uses
    dividers such as `=======` and `-----` to format sections and these can get messy
    if your output pane is too narrow. If things look a bit wonky try making it wider
