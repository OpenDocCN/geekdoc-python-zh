    \ `xs`, there are 4 items that are smaller than the pivot. Every time we find\
    \ an item that is smaller than the pivot, we increment `follower` by one. This\
    \ means that at the end of the loop, follower will have incremented 4 times and\
    \ be pointing at index 4 in the original list. By inspection, you can see that\
    \ this is the correct place for our pivot element (5).\n\nThe last thing we do\
    \ is return the follower index, which now points to our pivot element in its *correct*\
    \ place. We need to return this as it defines the two smaller sub-problems in\
    \ our partitioned list - we now want to sort `xs[0:4]` (the first 4 items, which\
    \ form an unsorted list) and the `xs[5:]` (the last 3 items, which form an unsorted\
    \ list).\n\n```\npython\nxs = [4, 2, 2, 1, 5, 7, 10, 8]\n```\n\nIf you want another\
    \ way to visualise exactly how this works, going over some examples by hand (that\
    \ is, writing out a short randomly ordered list with a pen and paper, and writing\
    \ out the new list at each step of the algorithm) is very helpful. You can also\
    \ watch [this detailed YouTube video](https://www.youtube.com/watch?v=MZaf_9lZCrc)\
    \ where KC Ang demonstrates every step of the algorithm using paper cups in under\
    \ 5 minutes!\n\n## The Quicksort function\n\nOnce we get the partition algorithm\
    \ right, sorting is easy. We’ll define a helper `_quicksort` function first to\
    \ handle the recursion and then implement a prettier public function after.\n\n\
    ```\npython\ndef _quicksort(xs, start, end):\n    if start >= end:\n        return\n\
    \    p = partition(xs, start, end)\n    _quicksort(xs, start, p-1)\n    _quicksort(xs,\
    \ p+1, end)\n```\n\nTo sort a list, we partition it (line 4), sort the left sublist\
    \ (line 5: from the start of the original list up to the pivot point), and then\
    \ sort the right sublist (line 6: from just after the pivot point to the end of\
    \ the original list). We do this recursively with the `end` boundary moving left,\
    \ closer to `start`, for the left sublists and the `start` boundary moving right,\
    \ closer to `end`, for the right sublists. When the start and end boundaries meet\
    \ (line 2), we’re done!\n\nThe first call to Quicksort will always be with the\
    \ entire list that we want sorted, which means that `0` will be the start of the\
    \ list and `len(xs)-1` will be the end of the list. We don’t want to have to remember\
    \ to pass these extra arguments in every time we call Quicksort from another program\
    \ (e.g. in any case where it is not calling itself), so we’ll make a prettier\
    \ wrapper function with these defaults to get the process started.\n\n```\npython\n\
    def quicksort(xs):\n    return _quicksort(xs, 0, len(xs)-1)\n```\n\nNow we, as\
    \ users of the sorting function, can call `quicksort([4,5,6,2,3,9,10,2,1,5,3,100,23,42,1])`,\
