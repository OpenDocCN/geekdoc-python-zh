    \ 函数（我们刚刚定义的）。\n\n运行代码，你应该会看到方程的解，如下所示。\n\n![](img/48efb5586f6da072fc1456bee6971293_18_0.png)\n\
    \n恭喜！你已经编写了你的第一个有用的程序。\n\n## 与他人分享你的应用程序\n\n与朋友或作为团队的一部分编码更有趣。如果你想与他人分享你的代码，只需复制\
