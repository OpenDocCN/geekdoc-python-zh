  md: 'By default, Django passes a request argument to all views. This is an object
    that contains information about our user and the connection, and any additional
    arguments passed in the URL. As our application isn’t connected to any weather
    services yet, we’ll just make up a temperature (20) and pass that back to our
    user as JSON.


    In line 10, we print out the IP address that we will pass along to this route
    from the GET arguments (we’ll look at how to use this later). We then create the
    fake data (which we’ll later replace with real data) and return a JSON response
    (the data in a format that a computer can read more easily, with no formatting).
    We return JSON instead of HTML because our system is going to use this route internally
    to pass data between the front and back ends of our application, but we don’t
    expect our users to use this directly.


    To test this part of our system, open your web application in a new tab and add
    /get_weather_from_ip?ip_address=123 to the URL. Here, we’re asking our system
    to fetch weather data for the IP address 123 (not a real IP address). In your
    browser, you’ll see the fake weather data displayed in a format that can easily
    be programmatically parsed.


    ![](img/48efb5586f6da072fc1456bee6971293_210_0.png)


    # Viewing the fake JSON data


    In our Repl’s output, we can see that the backend of our application has found
    the “IP address” and printed it out, between some other outputs telling us which
    routes are being visited and which port our server is running on:


    ![](img/48efb5586f6da072fc1456bee6971293_210_1.png)


    # Django print output of fake IP


    The steps that remain now are to:


    +   - pass the user’s real IP address to our new route in the background when
    the user visits our main page

    - add more backend logic to fetch the user’s location from the IP address

    - add logic to fetch the user’s weather from their location

    - display this data to the user.


    Let’s start by using Ajax[^157] to pass the user’s IP address that we collected
    before to our new route,


    [^157]: https://en.wikipedia.org/wiki/Ajax_(programming)'
