    \ repl，你应该可以通过在文件窗格中点击它来预览图像。\n\n> ⁵⁰https://raw.githubusercontent.com/ritza-co/public-images/master/small_tennis.png\n\
    \n## 使用 PyGame 显示精灵图\n\n我们的第一个目标是在游戏环境中使用 PyGame 显示网球。为此，请返回到 `main.py` 文件并添加以下代码。\n\
    \n```python\nimport pygame\n\nWIDTH = 800\nHEIGHT = 600\nBACKGROUND = (0, 0, 0)\n\
