    5() [4, 2, 2, 1] and [7, 10, 8]) then the entire list will be sorted. Any time
    we can efficiently break a problem into smaller sub-problems, we should think
    of *recursion* as a tool to solve our main problem. Using recursion, we often
    don''t even have to think about the entire solution. Instead, we define a base
    case (a list of length 0 or 1 is always sorted), and a way to divide a larger
    problem into smaller ones (e.g. partitioning a list in two), and almost by magic
    the problem solves itself!


    But we''re getting ahead of ourselves a bit. Let''s take a look at how to actually
    implement the partition algorithm on its own, and then we can come back to using
    it to implement a sorting algorithm.


    # A bad partition implementation


    You could probably easily write your own `partition` algorithm that gets the correct
    results without referring to any textbook implementations or thinking about it
    too much. For example:


    ```

    1 def bad_partition(xs):

    2     smaller = []

    3     larger = []

    4     pivot = xs.pop()

    5     for x in xs:

    6         if x >= pivot:

    7             larger.append(x)

    8         else:

    9             smaller.append(x)

    10    return smaller + [pivot] + larger

    ```


    In this implementation, we set up two temporary lists (`smaller` and `larger`).
    We then take the `pivot` element as the last element of the list (`pop` takes
    the last element and removes it from the original `xs` list).


    We then consider each element `x` in the list `xs`. The ones that are smaller
    than the pivot, we store in the `smaller` temporary list, and the others go to
    the `larger` temporary list. Finally, we combine the two lists with the pivot
    item in the middle, and we have partitioned our list.


    This is much easier to read than the implementation at the start of this post,
    so why don''t we do it like this?


    The primary advantage of Quicksort is that it is an *in place* sorting algorithm.
    Although for the toy examples we''re looking at, it might not seem like much of
    an issue to create a few copies of our list, if you''re trying to sort terabytes
    of data, or if you are trying to sort any amount of data on a very limited computer
    (e.g a smartwatch), then you don''t want to needlessly copy arrays around.


    In Computer Science terms, this algorithm has a space-complexity of O(2n), where
    n is the number of elements in our `xs` array. If we consider our example above
    of `xs = [8, 4, 2, 2, 1, 7, 10, 5]`, we''ll need to store all 8 elements in the
    original `xs` array as well as three elements ([7, 10, 8]) in the `larger` array
    and four elements ([4, 2, 2, 1]) in the `smaller` array. This is a waste of space!
    With some clever tricks, we can do a series of swap operations on the original
    array and not need to make any copies at all.'
  - '[PAGE 252]


    # Overview of the actual partition implementation


    Let’s pull out a few key parts of the good `partition` function that might be
    especially confusing before getting into the detailed explanation. Here it is
    again for reference.


    ```

    1 def partition(xs, start, end):

    2     follower = leader = start

    3     while leader < end:

    4         if xs[leader] <= xs[end]:

    5             xs[follower], xs[leader] = xs[leader], xs[follower]

    6             follower += 1

    7         leader += 1

    8     xs[follower], xs[end] = xs[end], xs[follower]

    9     return follower

    ```


    In our good `partition` function, you can see that we do some swap operations
    (lines 5 and 8) on the `xs` that is passed in, but we never allocate any new memory.
    This means that the storage remains constant to the size of `xs`, or O(n) in Computer
    Science terms. That is, this algorithm has *half* the space requirement of the
    “bad” implementation above, and should therefore allow us to sort lists that are
    twice the size using the same amount of memory.


    The confusing part of this implementation is that although everything is based
    around our pivot element (the last item of the list in our case), and although
    the pivot element ends up somewhere in the middle of the list at the end, we don’t
    actually touch the pivot element *until the very last swap*.


    Instead, we have two other counters (`follower` and `leader`) which move around
    the smaller and bigger numbers in a clever way and implicitly keep track of where
    the pivot element should end up. We then switch the pivot element into the correct
    place at the end of the loop (line 8).


    The `leader` is just a loop counter. Every iteration it increments by one until
    it gets to the pivot element (the end of the list). The follower is more subtle,
    and it keeps count of the number of swap iterations we do, moving up the list
    more slowly than the leader, tracking where our pivot element should eventually
    end up.


    The other confusing part of this algorithm is on line 4. We move through the list
    from left to right. All numbers are currently to the *left* of the pivot but we
    eventually want the “big” items to end up on the *right*.


    Intuitively, you would then expect us to do the swapping action when we find an
    item that is *larger* than the pivot, but in fact, we do the opposite. When we
    find items that are *smaller* than the pivot, we swap the leader and the follower.


    You can think of this as pushing the small items further to the left. Because
    the leader is always ahead of the follower, when we do a swap, we are swapping
    a small element with one further left in the list. The follower only looks at
    “big” items (ones that the leader has passed over without action), so when we
    do the swap, we’re swapping a small item (leader) with a big one (follower), meaning
    that small items will move towards the left and large ones towards the right.'
