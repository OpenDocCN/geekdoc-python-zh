- md: "If you run the script multiple times, each file will still only contain one\
    \ line of data: that from the most recent run. This is because when we open a\
    \ file with in “write” mode (\"w\"), it overwrites it with the new data. Because\
    \ we want to create historical weather logs, we need to change the second last\
    \ line to use “append” mode instead (\"a\").\n\nChange\n\n```\n1  with open(f\"\
    {city}.txt\", \"w\") as f:\n```\n\nto\n\n```\n1  with open(f\"{city}.txt\", \"\
    a\") as f:\n```\n\nand run the script again. If you open one of the city files\
    \ again, you’ll see it has a new line instead of the old data being overwritten.\
    \ Newer data is appended to the end of the file. WeatherStack only updates its\
    \ data every 5 minutes or so, so you might see exact duplicate lines if you run\
    \ the script multiple times in quick succession.\n\n## Exporting our weather data\
    \ files\n\nIf you run this script every day for a few months, you’ll have a nice\
    \ data set that could be useful in other contexts too. If you want to download\
    \ all of the data from Repl.it, you can use the Download as zip functionality\
    \ to export all of the files in a repl (including the code and data files).\n\n\
    Image 12: Downloading all of our files from Repl.it\n\nOnce you’ve downloaded\
    \ the .zip file you can extract it in your local file system and find all of the\
    \ data files which can now be opened with other programs as required.\n\nImage\
    \ 13: The created data files on our local file system\n\nFrom the same menu, you\
    \ can also choose upload file or upload folder to import files into your repl.\
    \ For example, if you cleaned the files using external software and then wanted\
    \ your repl to start appending new data to the cleaned versions, you could re-import\
    \ them.\n\nRepl.it will warn you about overwriting your existing files if you\
    \ haven’t changed the names.\n\nImage 14: Be careful about overwriting your precious\
    \ data\n\n### Make it your own\n\nIf you followed along, you'll already have your\
    \ own version of the repl to extend. If not, start from ours. Fork it from https://repl.it/@GarethDwyer1/cwr-02-weather-report16.\n\
    \n### Where next?\n\nThat's it for our weather reporting project. You learned\
    \ how to work with files in Python and Repl.it, including different modes (read,\
    \ write, or append) in which files can be opened.\n\nYou also worked with an external\
    \ library, requests, for fetching data over the internet. This module is not actually\
    \ part of Python, and in the next article you'll learn more about how to manage\
    \ external modules or dependencies.\n\n## Managing dependencies using Repl.it\n\
    \nNearly all useful programs rely to some extent on pre-existing code in various\
    \ forms. The existing code that your code relies on is known as a dependency.\
    \ You have already come across some dependencies in previous tutorials: you used\
    \ the `math` module to calculate quadratic equations in the first tutorial and\
    \ you used the `requests` module to fetch weather data in the second tutorial.\n\
    \nIn the first tutorial, you also wrote the `solver.py` module, and imported this\
    \ into the `main.py` file. We can think of dependencies as falling into three\
    \ broad categories:\n\n- Internal dependencies: other code that you or your organisation\
    \ wrote and which you fully control, e.g. the `solver.py` file.\n- Standard dependencies:\
    \ code that exists as part of the standard language libraries, e.g. the `math`\
    \ module.\n- External dependencies: code that is written by third-party developers,\
    \ e.g. the `requests` module.\n\nIn this tutorial, you'll gain more experience\
    \ with all three categories of dependencies. Specifically, you'll write an NLP\
    \ (natural language processing) program to analyse sentences, using spaCy<sup>17</sup>,\
    \ a third-party dependency.\n\nDependency management is a hugely complicated area,\
    \ and there is a large ecosystem of related tools to help manage packaging and\
    \ installing Python programs. We won't be covering all of the options and background,\
    \ but you can read an overview of the different tools here<sup>18</sup>.\n\n##\
    \ Understanding Repl.it's magic import tool and the universal package manager\n\
    \nIn nearly all programming environments, you have to explicitly install third-party\
    \ dependencies. Let's say you wanted to use the `requests` library (which is not\
    \ included in Python by default) on your local machine. If you try to import it,\
    \ you would get a `ModuleNotFoundError` error, as shown below.\n\n```\nType \"\
    help\", \"copyright\", \"credits\" or \"license\" for more information.\n>>> import\
    \ requests\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nModuleNotFoundError: No module named 'requests'\n>>>\n```\n\nImage\
    \ 1: Trying to use a dependency without installing it\n\n<sup>17</sup>https://spacy.io/\n\
    <sup>18</sup>https://modelpredict.com/python-dependency-management-tools\n\nIn\
    \ order to use this library, you would first have to install it using a command\
    \ similar to `pip install requests`, and only then would the import statement\
    \ run correctly.\n\nRepl.it, by contrast, can often do the installation for you\
    \ completely automatically, using the [Universal Package Manager](https://blog.repl.it/upm).\
    \ The moment you run the `import requests` line of code, the package manager will\
    \ go find the correct package and install it, or in some cases Repl.it will even\
    \ have pre-installed the package. Either way, your code will “just work”.\n\n\
    ![](img/48efb5586f6da072fc1456bee6971293_33_0.png)\n\n*Image 2: Seamless external\
    \ package use on another repl*\n\nThis is super convenient, but sometimes you\
    \ need more control. For example, you might need a specific version of a package,\
    \ or the universal package manager might not be able to automatically install\
    \ all of your dependencies. In these cases, you can use more advanced ways to\
    \ install packages.\n\n## Installing packages through the GUI\n\nIf you’re not\
    \ sure exactly which package you need, you can use Repl.it’s built-in package\
    \ manager GUI to search for packages. In the example below, we are looking for\
    \ a package called `beautifulsoup4`.\n\nTo use this, you need to\n\n1. Click on\
    \ the packages tab from the left toolbar.\n2. Search for a package by typing in\
    \ part or all of its name.\n3. Select the package you want from the search results.\n\
    \n[^19]https://blog.repl.it/upm\n\n![](img/48efb5586f6da072fc1456bee6971293_34_0.png)\n\
    \nThis will take you to a page showing an overview and summary of the selected\
    \ package. You can install it to your repl by using the + button, as shown below.\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_34_1.png)\n\nOnce the package is installed,\
    \ we can use it in our code. Run the example shown below to extract the “Google\
    \ Search” text from the main button on the homepage.\n\n```python\nimport requests\n\
    from bs4 import BeautifulSoup\n\nr = requests.get(\"https://google.com\").text\n\
    soup = BeautifulSoup(r, \"html.parser\")\n\nprint([x.get(\"title\") for x in soup.findAll(\"\
    input\") if x.get(\"title\")])\n```\n\nThis code uses the requests library to\
    \ scrape the HTML from google.com and then uses the beautifulsoup4 library to\
    \ get the title of the button off the page and print it to the console.\n\nBecause\
    \ `requests` is one of the most commonly used Python libraries, Repl.it probably\
    \ installed it in a slightly different way from most packages. However, `beautifulsoup4`\
    \ is less common and this will have been installed in the standard way using `poetry`<sup>20</sup>.\n\
    \nIf you go back to the files tab, you'll see two new files `poetry.lock` and\
    \ `pyproject.toml` which were created automatically by the installer. Take a look\
    \ inside the `pyproject.toml` file.\n\n![](img/48efb5586f6da072fc1456bee6971293_35_0.png)\n\
    \nIn this case, line 9 says that our project relies on the `beautifulsoup4` package\
    \ and needs at least version 4.9.1. If we look at [the beautifulsoup page on PyPi](https://pypi.org/project/beautifulsoup4/)<sup>21</sup>,\
    \ we'll see that the latest stable version is 4.9.1, so if this project is run\
    \ in the future and there is a new version available, it will automatically use\
    \ the updated package.\n\n### Building an NLP project using spaCy\n\nSo far, we\
    \ have installed packages that are easy for the Repl.it universal dependency manager\
    \ to install automatically, behind the scenes. Some packages are more complicated\
    \ though. `spaCy`<sup>22</sup>, for example, is an NLP library that relies on\
    \ a large external data file. When installing this library, you usually have to\
    \ install this data file as a separate step.\n\n### Installing the spaCy language\
    \ model\n\nTo get this to work on Repl.it, we'll have to manually modify the `pyproject.toml`\
    \ file.\n\nCreate a new repl, SpacyExample, then click on the Packages icon and\
    \ search for “spacy”.\n\n<sup>20</sup> https://python-poetry.org/docs/basic-usage/\n\
