  md: '# Staying safe: Keeping your passwords and other secrets secure


    While developing software fully in public has many benefits, it also means that
    we need to be extra careful about leaking sensitive information. Because all of
    our repls are public by default, we shouldn''t store passwords, access keys, personal
    information, or anything else sensitive in them. Even if you''re coding offline
    or only in private repls, it''s good practice to keep your code separate from
    any private information in any case.


    In this tutorial, we''ll look at how to use the special .env file that Repl.it
    provides to set [environment variables](https://en.wikipedia.org/wiki/Environment_variable).
    We can use these to store sensitive information and Repl.it will make sure that
    this file isn''t included when others fork our repl.


    # Understanding .env files


    Similarly to the .replit file that we saw in a previous tutorial, the .env file
    is a special Repl.it file. If you call a file exactly .env, Repl.it will


    +   - Not include this file in any forks of the repl

    - Attempt to parse key-value pairs out of this file and make them available to
    the underlying operating system.


    This can be used to store all kinds of configuration, but it''s commonly used
    for passwords, API keys, and database credentials.


    # The structure of a .env file


    A .env file consists of keys-value pairs, one per line, separated by an = sign.
    Environment variables are traditionally in ALL_CAPS and separated by underscores.
    For example, you might have a .env file with the following.


    ```

    SECRET_PASSWORD=ThisIsMySuperSecretP@ssword!!

    ```


    With this file present, your scripts can load the variable SECRET_PASSWORD from
    the operating system environment directly.


    Unlike in Python, where x = 1 and x= 1 are the same, in .env files, spaces matter
    and you should be careful to not add any extra ones.'
