    \ as positive.\n\nSo what’s the difference between machine learning and traditional\
    \ rule-based models like this one? The main advantage of learning the rules directly\
    \ is that it doesn’t really get more difficult as the dataset grows. Our dataset\
    \ was trivially simple, but a real-world dataset might need thousands or millions\
    \ of rules, and while we could write a more complicated set of if-statements “by\
    \ hand”, it’s much easier if we can teach machines to learn these by themselves."
