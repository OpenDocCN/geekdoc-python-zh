    \ last_name]\n\ndef split_name(name):\n    names = name.split(\" \")\n\n    if\
    \ not name:\n        return [\"\", \"\"]\n\n    if len(names) == 1:\n        return\
    \ [\"\", name]\n\n    if len(names) == 2:\n        firstname, lastname = name.split(\"\
    \ \")\n        return [firstname, lastname]\n    else:\n        return split_name_three_plus(names)\n\
