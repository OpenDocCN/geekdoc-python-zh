    \ ...\n    def check_collision(self, x, y, boxes):\n        self.rect.move_ip([x,y])\n\
    \        collide = pygame.sprite.spritecollideany(self, boxes)\n        self.rect.move_ip([-x,-y])\n\
    \        return collide\n```\n\n这里，我们将玩家移动指定距离，检查碰撞，然后将玩家移回原位。这种来回移动发生在玩家绘制到屏幕之前，因此用户不会察觉。\n\
    \n让我们将地面检查改为使用此方法：\n\n```\ndef update(self, boxes):\n    hsp = 0\n    onground\
    \ = self.check_collision(0, 1, boxes)\n```\n\n现在运行游戏，你可能会注意到玩家站立在地面上的方式与之前有非常细微的差别。\n\
    \n但这尚未解决我们的水平和向上碰撞问题。为此，我们需要将新的check_collision方法直接集成到玩家的移动方法中。首先需要做的是为额外处理准备x和y参数：\n\
    \n```\ndef move(self, x, y):\n    dx = x\n    dy = y\n    self.rect.move_ip([dx,dy])\n\
    ```\n\n然后我们将检查碰撞，因此需要开始将boxes参数传入move方法。我们将分别处理x和y方向，从y方向开始。我们将在垂直移动dy像素后检查碰撞，递减dy直到不再与方块碰撞：\n\
    \n```\ndef update(self, boxes):\n    # ...\n    # movement\n    self.move(hsp,\
    \ self.vsp, boxes)\n\ndef move(self, x, y, boxes):\n    dx = x\n    dy = y\n\n\
    \    while self.check_collision(0, dy, boxes):\n        dy -= 1\n\n    self.rect.move_ip([dx,dy])\n\
    ```\n\n但等等！这段代码只有在我们向下移动且dy为正时才能正常工作。如果dy为负，这只会让我们进一步陷入碰撞，而不是远离碰撞。为了解决这个问题，我们需要在文件顶部导入numpy，以便使用numpy.sign。\n\
    \n```\nimport pygame, numpy\n# ...\n```\n\nnumpy.sign接收一个整数，如果为正返回1，为负返回-1，为0则返回0。这正是我们需要的功能！\n\
    \n```\ndef move(self, x, y, boxes):\n    dx = x\n    dy = y\n\n    while self.check_collision(0,\
    \ dy, boxes):\n        dy -= numpy.sign(dy)\n\n    self.rect.move_ip([dx,dy])\n\
    ```\n\n现在对dx做同样的处理。由于我们已经确定了移动所需的dy值，将在碰撞检查中包含它。\n\n```\ndef move(self, x, y,\
