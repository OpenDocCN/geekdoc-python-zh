  - '[PAGE 51]


    # Multiplayer: Pair programming with Repl.it


    Software developers have a reputation for being loners, but they don’t always
    code by themselves. [Pair programming](https://en.wikipedia.org/wiki/Pair_programming)
    is used by many programmers to


    +   - Write bug-free code more efficiently (for example, one person might watch
    for mistakes while the other codes).

    - Share knowledge (a less-experienced programmer might ‘follow along’ while a
    more experienced programmer develops something, learning from each step of the
    process).

    - Assess expertise (if you’re considering a new hire, watching them code first
    can be helpful to assess how good a coder they are, but coding with them allows
    you to also see their experience in teamwork and communication).


    Pair programming intuitively sounds like it would be inefficient: after all, the
    two developers could instead be working on different projects simultaneously.
    But on top of catching more bugs, two people working together often display more
    creativity as well. You might think of an idea based on something your buddy said
    that wouldn’t have come to you alone.


    If you have a friend handy, work through this tutorial together to gain real pair
    programming experience. If you’re alone, fire up two browsers (or use incognito
    mode) to sign into two Repl.it accounts simultaneously.


    # Extending our data science article using pair programming: Getting help


    Imagine that you are a developer who has come across the [previous tutorial on
    plotting and graphing](http://www.codewithrepl.it/04-data-science-and-visualisation-with-repl-it.html).
    You want to adapt the graphs shown a bit, but you haven’t used Python much, so
    you decide to ask your friend for help.


    In this scenario, you are “@Lean3Viljoen94” and the friend that you’re asking
    for help is “@GarethDwyer1”.


    Start by forking [the data science repl](https://repl.it/@GarethDwyer1/04-data-science-and-visualisation-with-replit)
    and making sure that you can run it.


    39https://en.wikipedia.org/wiki/Pair_programming

    40http://www.codewithrepl.it/04-data-science-and-visualisation-with-repl-it.html

    41https://repl.it/@GarethDwyer1/04-data-science-and-visualisation-with-replit'
- md: "## Multiplayer: Pair programming with Repl.it\n\nNow from your own fork, press\
    \ the share button, as shown below.\n\nCopy the invite link, and note that this\
    \ is different from the normal link to your repl. If you copy the link from your\
    \ URL bar, you can give people read access to your repl, but by copying the invite\
    \ link you’ll give them write access.\n\nIf you knew your friend’s Repl.it username\
    \ or the email associated with the Repl.it account, you could instead use the\
    \ Invite box at the top. Share the link with your friend and wait for them to\
    \ join.\n\nAs soon as they do, you will see that a chat box pops up in the bottom\
    \ right corner. Their profile picture or letter will be at the top of the chat\
    \ box, so you can always know who is currently active.\n\nRemember, you forked\
    \ the repl in a previous step, so you are the owner of this fork and the “host”\
    \ of this multiplayer session. If you invite multiple people and then leave, they\
    \ can continue collaborating without you, but they won’t be able to rejoin if\
    \ the host is no longer in the session.\n\nYou can use the team chat feature,\
    \ as shown below.\n\n```python\nimport requests\nimport seaborn as sns\nimport\
    \ pandas as pd\nfrom matplotlib import pyplot as plt\nimport numpy as np\n\ndata_url\
    \ = \"https://raw.githubusercontent.com/holtzy/data_to_viz/master/Example_dataset/4_ThreeNum.csv\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"gdp-life.txt\", \"w\") as f:\n \
    \   f.write(r.text)\n\ndf = pd.read_csv(\"gdp-life.txt\")\nprint(df.head())\n\n\
    print(\"___\")\nprint(\"The correlation is: \", np.corrcoef(df['GDPpercap'], df['LifeExp'])[0,1])\n\
    print(\"___\")\n\nsns.lmplot(\n    \"GDPpercap\", \"LifeExp\", df\n).set_axis_labels(\"\
    GDP per capita\", \"Life expectancy\")\n\nplt.title(\"Countries with a higher\
    \ GDP have higher life expectancy\")\nplt.tight_layout()\nplt.show()\n```\n\n\
    In the previous tutorial, we looked at GDP by country. Imagine that you are now\
    \ interested in how this is broken down by continent too. You still want to plot\
    \ each country as a separate data point, but you want them in different colours,\
    \ one for each continent. You’re not sure how to do this, so you ask for help.\n\
    \nYou can see a typing indicator to help decide if you should wait around for\
    \ a reply or go make coffee.\n\nYour friend tells you about the `hue` argument\
    \ and points out that you already have this data in the continent column in your\
    \ data frame. You add `hue=\"continent\"` to the graph and re-run it, but it doesn’t\
    \ quite work out how you expect.\n\nYour friend suggests maybe a scatter plot\
    \ without the correlation line might look better, but when you try that it results\
    \ in an error. The error message is hidden by the chat box, so you move it to\
    \ the other side of the screen.\n\nThis is getting a bit more complicated than\
    \ you bargained for. Sometimes showing is easier than telling, so your friend\
    \ starts editing the code directly instead of telling you how to do so using chat.\
    \ The code\n\n```python\nsns.scatterplot(\n    \"gdpPercap\", \"lifeExp\", df,\
    \ hue=\"continent\"\n).set_axis_labels(\"GDP per capita\", \"Life expectancy\"\
    )\n```\n\nchanges to\n\n```python\nax = sns.scatterplot(\n    \"gdpPercap\", \"\
    lifeExp\", df, hue=\"continent\"\n)\nax.set(xlabel=\"GDP per capita\", ylabel=\"\
    Life expectancy\")\n```\n\n## Make it your own\n\nIf you followed along, you’ll\
    \ already have your own version of the repl to extend. If not, start from ours.\
    \ Fork it from [https://repl.it/@GarethDwyer1/cwr-05-multiplayer](https://repl.it/@GarethDwyer1/cwr-05-multiplayer)⁴².\n\
    \n## Where next?\n\nGetting help on a single file in a program is only one use\
    \ for multiplayer, but there are many scenarios where it can be useful to see\
    \ your teammates’ changes in real time. For example, if you’re a back-end developer\
    \ you could work closely with a front-end developer, ironing out any issues with\
    \ data communication between the back- and front-end in real time, instead of\
    \ waiting for multiple iterations of several days.\n\n⁴² [https://repl.it/@GarethDwyer1/cwr-05-multiplayer](https://repl.it/@GarethDwyer1/cwr-05-multiplayer)\n\
    \nThat brings us to the end of part 1 of this series and you should now be familiar\
    \ with all of the basic features of Repl.it.\n\nIn part 2, we’ll cover more advanced\
    \ features, such as running projects from GitHub, storing secrets securely, and\
    \ productivity hacks.\n\n## Repl.it and GitHub: Using and contributing to open-source\
    \ projects\n\nYou’ve probably heard of [GitHub](https://github.com), which hosts\
    \ millions of coding projects that you can use or learn from.\n\nIn this tutorial,\
    \ we’ll see how to:\n\n- Import open-source projects from GitHub to Repl.it so\
    \ that we can run them or modify them\n- Integrate your own GitHub account with\
    \ your Repl.it account so that you can work on your private projects\n- Push changes\
    \ back to open-source projects as pull requests.\n\nWe’ll use a basic Flask `hello\
    \ world` app for the demonstrations. You can use this same project to follow along,\
    \ or pick any other project on GitHub that interests you.\n\n## Importing a project\
    \ from GitHub and running it on Repl.it\n\nWe’ll use the [Flask](https://flask.palletsprojects.com/en/1.1.x/)\
    \ application available at [https://github.com/ritza-co/flask-hello-world](https://github.com/ritza-co/flask-hello-world)\
    \ for demonstration purposes. To import it into Repl.it, press the + new repl\
    \ button, switch to the “Import From GitHub” tab, and paste in the GitHub URL,\
    \ as shown below.\n\nPress the green Import from GitHub button and you’ll see\
    \ Repl.it clone the repository and turn it into a repl. In all of our previous\
    \ projects, we used the main.py file that Repl.it automatically creates for all\
    \ new Python projects, and which it runs automatically when you press the run\
    \ button. Note how in this GitHub project, we have no main.py file, and our code\
    \ is instead in mydemoapp.py. Therefore, Repl.it will need some help from you\
    \ to define how to run the project. This is configured through another special\
    \ file named .replit. Because there was no main.py file, Repl.it automatically\
    \ created this file and will prompt you to configure it.\n\nSelect the language\
    \ (Python) from the first dropdown and type python mydemoapp.py in the “configure\
    \ the run button” input. Every time you press the run button, Repl.it will execute\
    \ the command given here. If you prefer, you can also edit the .replit file directly.\
    \ If you click on it, you’ll see it now contains the following configuration,\
    \ which matches what we provided through the GUI panel.\n\n```\nlanguage = \"\
    python3\"\nrun = \"python mydemoapp.py\"\n```\n\nIf you hit the run button, you\
    \ should see the app start. As you can see, the web application is very basic:\
    \ all it can do is display a welcome message. If the configuration panel doesn’t\
    \ pop up automatically, you can manually create a file called .replit and add\
    \ the configuration above to get the same result.\n\nSome GitHub projects are\
    \ very large and complicated, and you might not be able to run everything you\
    \ need directly on Repl.it, but in many cases it just works. Open-source projects\
    \ can be read and run by anyone, but still have restrictions on who can push changes\
    \ to them. Next we'll improve this project and request that the owner merges our\
    \ changes into the original.\n\n## Looking at the version control panel in Repl.it\n\
    \nRepl.it includes a version control tab which shows you information about the\
    \ GitHub repository and in some cases allows you to push your changes made in\
    \ Repl.it back to GitHub."
  mdcn: "## 多人协作：与 Repl.it 进行结对编程\n\n现在，从你自己的分叉项目中，按下分享按钮，如下所示。\n\n复制邀请链接，并注意这与你 repl\
    \ 的普通链接不同。如果你从地址栏复制链接，你只能给予他人对你 repl 的读取权限，但通过复制邀请链接，你将赋予他们写入权限。\n\n如果你知道你朋友的\
    \ Repl.it 用户名或与 Repl.it 账户关联的电子邮件，你也可以使用顶部的“邀请”框。将链接分享给你的朋友，并等待他们加入。\n\n一旦他们加入，你会看到右下角弹出一个聊天框。他们的头像或首字母会显示在聊天框顶部，这样你总能知道当前谁在线。\n\
    \n记住，你在之前的步骤中分叉了 repl，所以你是这个分叉的所有者，也是本次多人协作会话的“主持人”。如果你邀请了多人然后离开，他们可以在没有你的情况下继续协作，但如果主持人不再在会话中，他们将无法重新加入。\n\
    \n你可以使用团队聊天功能，如下所示。\n\n```python\nimport requests\nimport seaborn as sns\nimport\
    \ pandas as pd\nfrom matplotlib import pyplot as plt\nimport numpy as np\n\ndata_url\
    \ = \"https://raw.githubusercontent.com/holtzy/data_to_viz/master/Example_dataset/4_ThreeNum.csv\"\
    \n\nr = requests.get(data_url)\n\nwith open(\"gdp-life.txt\", \"w\") as f:\n \
    \   f.write(r.text)\n\ndf = pd.read_csv(\"gdp-life.txt\")\nprint(df.head())\n\n\
    print(\"___\")\nprint(\"The correlation is: \", np.corrcoef(df['GDPpercap'], df['LifeExp'])[0,1])\n\
    print(\"___\")\n\nsns.lmplot(\n    \"GDPpercap\", \"LifeExp\", df\n).set_axis_labels(\"\
    GDP per capita\", \"Life expectancy\")\n\nplt.title(\"Countries with a higher\
    \ GDP have higher life expectancy\")\nplt.tight_layout()\nplt.show()\n```\n\n\
    在之前的教程中，我们研究了按国家划分的 GDP。想象一下，你现在也对按大洲划分的情况感兴趣。你仍然希望将每个国家绘制为一个单独的数据点，但希望它们用不同的颜色表示，每个大洲一种颜色。你不确定如何做到这一点，于是你寻求帮助。\n\
    \n你可以看到一个输入指示器，帮助你决定是应该等待回复还是去泡杯咖啡。\n\n你的朋友向你介绍了 `hue` 参数，并指出你的数据框中已经有“大洲”这一列数据。你在图表中添加了\
    \ `hue=\"continent\"` 并重新运行，但结果并不完全符合你的预期。\n\n你的朋友建议也许不带相关线的散点图看起来会更好，但当你尝试时，却导致了一个错误。错误信息被聊天框遮挡了，于是你将它移到了屏幕的另一侧。\n\
    \n这变得比你预想的要复杂一些。有时演示比解释更容易，所以你的朋友开始直接编辑代码，而不是通过聊天告诉你如何操作。代码\n\n```python\nsns.scatterplot(\n\
    \    \"gdpPercap\", \"lifeExp\", df, hue=\"continent\"\n).set_axis_labels(\"GDP\
    \ per capita\", \"Life expectancy\")\n```\n\n变成了\n\n```python\nax = sns.scatterplot(\n\
    \    \"gdpPercap\", \"lifeExp\", df, hue=\"continent\"\n)\nax.set(xlabel=\"GDP\
    \ per capita\", ylabel=\"Life expectancy\")\n```\n\n## 创建你自己的版本\n\n如果你跟着操作了，你现在已经有了自己的\
    \ repl 版本可以扩展。如果没有，可以从我们的版本开始。从 [https://repl.it/@GarethDwyer1/cwr-05-multiplayer](https://repl.it/@GarethDwyer1/cwr-05-multiplayer)⁴²\
    \ 分叉它。\n\n## 接下来去哪里？\n\n在程序的单个文件上寻求帮助只是多人协作的一种用途，但在许多场景下，实时查看队友的更改会很有用。例如，如果你是一名后端开发者，你可以与前端开发者紧密合作，实时解决前后端数据通信的任何问题，而不是等待数天的多次迭代。\n\
    \n⁴² [https://repl.it/@GarethDwyer1/cwr-05-multiplayer](https://repl.it/@GarethDwyer1/cwr-05-multiplayer)\n\
    \n这标志着本系列第一部分的结束，你现在应该已经熟悉了 Repl.it 的所有基本功能。\n\n在第二部分中，我们将介绍更高级的功能，例如从 GitHub\
    \ 运行项目、安全存储密钥以及提高生产力的技巧。\n\n## Repl.it 与 GitHub：使用和贡献开源项目\n\n你可能听说过 [GitHub](https://github.com)，它托管了数百万个编码项目，你可以使用或从中学习。\n\
    \n在本教程中，我们将学习如何：\n\n- 从 GitHub 将开源项目导入到 Repl.it，以便我们可以运行或修改它们\n- 将你自己的 GitHub\
    \ 账户与 Repl.it 账户集成，以便你可以处理你的私有项目\n- 将更改作为拉取请求推送回开源项目。\n\n我们将使用一个基本的 Flask `hello\
    \ world` 应用进行演示。你可以使用这个相同的项目跟着操作，或者选择 GitHub 上任何你感兴趣的其他项目。\n\n## 从 GitHub 导入项目并在\
    \ Repl.it 上运行\n\n我们将使用 [https://github.com/ritza-co/flask-hello-world](https://github.com/ritza-co/flask-hello-world)\
    \ 上的 [Flask](https://flask.palletsprojects.com/en/1.1.x/) 应用程序进行演示。要将其导入 Repl.it，请按\
    \ + new repl 按钮，切换到“Import From GitHub”选项卡，并粘贴 GitHub URL，如下所示。\n\n按下绿色的 Import\
    \ from GitHub 按钮，你会看到 Repl.it 克隆仓库并将其转换为一个 repl。在我们之前的所有项目中，我们都使用了 Repl.it 为所有新\
    \ Python 项目自动创建的 main.py 文件，并且当你按下运行按钮时它会自动运行。注意，在这个 GitHub 项目中，我们没有 main.py 文件，我们的代码在\
    \ mydemoapp.py 中。因此，Repl.it 需要你的一些帮助来定义如何运行项目。这是通过另一个名为 .replit 的特殊文件配置的。因为没有\
    \ main.py 文件，Repl.it 自动创建了这个文件，并会提示你进行配置。\n\n从第一个下拉菜单中选择语言（Python），并在“configure\
    \ the run button”输入框中输入 `python mydemoapp.py`。每次你按下运行按钮时，Repl.it 都会执行此处给出的命令。如果你愿意，你也可以直接编辑\
    \ .replit 文件。如果你点击它，你会看到它现在包含以下配置，这与我们通过 GUI 面板提供的内容一致。\n\n```\nlanguage = \"\
    python3\"\nrun = \"python mydemoapp.py\"\n```\n\n如果你按下运行按钮，你应该会看到应用启动。如你所见，这个\
    \ Web 应用程序非常基础：它只能显示一条欢迎消息。如果配置面板没有自动弹出，你可以手动创建一个名为 .replit 的文件，并添加上述配置以获得相同的结果。\n\
    \n一些 GitHub 项目非常庞大和复杂，你可能无法直接在 Repl.it 上运行所有需要的内容，但在许多情况下它就是能运行。开源项目可以被任何人阅读和运行，但仍然对谁可以向其推送更改有限制。接下来，我们将改进这个项目，并请求所有者将我们的更改合并到原始项目中。\n\
    \n## 查看 Repl.it 中的版本控制面板\n\nRepl.it 包含一个版本控制选项卡，它向你显示有关 GitHub 仓库的信息，并在某些情况下允许你将在\
    \ Repl.it 中所做的更改推送回 GitHub。"
