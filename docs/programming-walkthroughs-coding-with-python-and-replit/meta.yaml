    # Hiding messages in images: steganography with Python and Repl.it


    In this tutorial, we’ll build a steganography tool in Python. Steganography is
    the practice of hiding information within other data. Unlike encryption, where
    the goal is to secure *the contents* of communication between two parties, steganography
    aims to obscure the fact that the parties are communicating at all.


    Our tool will enable the user to hide secret text within a normal-looking .png
    image file. The receiver of the image will use the same tool to reveal the hidden
    message.


    We’ll use Python to build the tool. The most popular Python image processing libraries
    are [Pillow](https://pypi.org/project/Pillow/) and [OpenCV](https://pypi.org/project/opencv-python/),
    but these are heavy libraries with many dependencies. We’ll avoid these and instead
    use the lightweight [PyPNG](https://pypi.org/project/pypng/) library which is
    written in pure Python, and therefore easier to run on various platforms.


    # A quick background on steganography


    Let’s imagine three people: Alice, Bob and Eve. Alice wants to send a private
    message to Bob, while Eve wants to intercept this message. While modern-day encryption
    can help Alice and Bob ensure that Eve doesn’t know the *contents* of their message,
    Eve can possibly still deduce interesting information just from knowing that Alice
    and Bob are communicating at all, and how frequently they communicate.


    To obscure the communication channel completely, Alice and Bob can exploit the
    fact that hundreds of millions of photos are uploaded and shared across the internet
    daily. Instead of communicating directly, Alice can leave her message hidden in
    an image at a pre-agreed location and Bob can access this message. From Eve’s
    perspective, there is now no direct communication between the two.


    A single image is made up of millions of pixels. While many formats exist, a pixel
    is most simply represented by a group of three numbers between 0 and 255, one
    number each for the red, blue, and green values of that pixel. Using this Red-Green-Blue
    scheme we can represent any colour in the [RGB color model](https://en.wikipedia.org/wiki/RGB_color_model).


    197 https://pypi.org/project/Pillow/

    198 https://pypi.org/project/opencv-python/

    199 https://pypi.org/project/pypng/

    200 https://en.wikipedia.org/wiki/RGB_color_model'
- md: "## Digital text, like images, is also represented internally by numbers, so\
    \ the differences between a text file and an image file are not as large as you\
    \ might assume. Any digital data can be represented as a [binary string](https://thehelloworldprogram.com/computer-science/what-is-binary/),\
    \ a bunch of 1s and 0s, and we can make tiny modifications to an image to encode\
    \ a binary string within it. As an example, consider the following:\n\n```python\n\
    image = [(255, 0, 0), (0, 255, 0), (0, 0, 255)]\n```\n\nThis is a representation\
    \ of an image with three pixels: one red, one green, and one blue. If we encode\
    \ this as an image and open it in an image viewer, we’ll see the three pixel image,\
    \ but if we read this data with Python, it is simply a list of tuples, each containing\
    \ three integers.\n\nWe could also look at each value making up each pixel and\
    \ calculate whether it is *odd* or *even*. We could encode odd numbers as 1 and\
    \ even values as 0. This would give us the binary string “100 010 001” (as the\
    \ 255 values are odd and the 0s are even).\n\nIf we made a small modification\
    \ to the image as follows:\n\n```python\nimage = [(254, 1, 1), (1, 255, 1), (1,\
    \ 0, 254)]\n```\n\nThe image would look almost identical in any image viewer (we\
    \ have just added or subtracted a minuscule amount of color from some values),\
    \ but the binary string – using our odd/even method – would look completely different:\
    \ “011 111 100”.\n\nUsing this technique but extending it over an entire image\
    \ (millions of pixels), we can hide a large amount of text data in any image.\n\
    \n## Creating the project on Repl.it\n\nIf you were serious about keeping your\
    \ messages as secret as possible, you’d want to do all of these steps on an offline\
    \ computer that you fully control. As a learning exercise though, we’ll set the\
    \ project up on [repl.it](https://repl.it). Navigate to their site and sign up\
    \ for an account if you don’t have one.\n\nCreate a new project, choosing “Python”\
    \ as the language, and give your project a name.\n\n<sup>201</sup> https://thehelloworldprogram.com/computer-science/what-is-binary/\n\
    <sup>202</sup> https://repl.it\n\n![](img/48efb5586f6da072fc1456bee6971293_259_0.png)\n\
    \nCreating a new repl\n\nThe first piece we need to build is a function to encode\
    \ any text message as a binary string.\n\n## Encoding a text message as a binary\
    \ string\n\nOpen the `main.py` file and add the following code:\n\n```python\n\
    import base64\n\ndef encode_message_as_bytestring(message):\n    b64 = message.encode(\"\
    utf8\")\n    bytes_ = base64.encodebytes(b64)\n    bytestring = \"\".join([\"\
    {:08b}\".format(x) for x in bytes_])\n    return bytestring\n```\n\nThis first\
    \ encodes our text as base64[^203] and then as a binary string. You can add some\
    \ print statements to see how the message is transformed in the different steps,\
    \ as shown below.\n\n[^203]: https://en.wikipedia.org/wiki/Base64\n\n![](img/48efb5586f6da072fc1456bee6971293_260_0.png)\n\
    \n**Encoding a message as a binary string**\n\nThe base64 step is not strictly\
    \ necessary, but it is useful as any file or data can be encoded as base64. This\
    \ opens our project up to future extensions such as hiding other kinds of files\
    \ within image files instead of just text strings.\n\n## Adding an ‘end of message’\
    \ delimiter\n\nWe’ll assume that our message will always ‘fit’ in our image. We\
    \ can fit three binary digits per pixel (one for each of the RGB values), so our\
    \ resulting binary string should be shorter than the number of pixels in the image\
    \ multiplied by three.\n\nWe’ll also need to know when the message *ends*. The\
    \ message will only be encoded in the beginning of the image file, but if we don’t\
    \ know how long the message is, we’ll keep looking at normal pixels and trying\
    \ to encode them as text data. Let’s add an “end of string” delimiter to the end\
    \ of our message: this should be something that wouldn’t appear half way through\
    \ our actual message by chance. We’ll use the binary representation of ‘!ENDOFMESSAGE!’\
    \ for this.\n\nModify your function to look as follows, which adds this delimiter\
    \ at the end.\n\n```python\nimport base64\n\nENDOFMESSAGE = \"01001001010101010101011001001111010100100010100111001010001110101\\\
    \n010001010101010101100101010001010101001100000100011001001000010100100101001101000101\\\
    \n00111101\"\n\ndef encode_message_as_bytestring(message):\n    b64 = message.encode(\"\
    utf8\")\n    bytes_ = base64.encodebytes(b64)\n    bytestring = \"\".join([\"\
    {:08b}\".format(x) for x in bytes_])\n    bytestring += ENDOFMESSAGE\n    return\
    \ bytestring\n```\n\nNow that we can handle some basic text encoding, let’s look\
    \ at images.\n\n## Getting pixels from an image\n\nFind a PNG image somewhere\
    \ - either one you’ve taken yourself or from a site like unsplash. You can use\
    \ any online JPG to PNG converter if you only have .jpg files available.\n\nUpload\
    \ your PNG file by clicking on the three dot menu in the repl sidebar, in the\
    \ top right corner of the files pane to the left, and selecting upload file or\
    \ by simply dragging and dropping your file within the files pane.\n\n![](img/48efb5586f6da072fc1456bee6971293_261_0.png)\n\
    \nWe’re going to write a function that extracts the raw pixel data from this image\
    \ file. Add an import to the top of the file.\n\n```python\nimport png\n```\n\n\
    And then add a new function to the bottom of main.py:\n\n```python\ndef get_pixels_from_image(fname):\n\
    \    img = png.Reader(fname).read()\n    pixels = img[2]\n    return pixels\n\
    ```\n\nThe read() method returns a 4-tuple consisting of:\n\n- width: Width of\
    \ PNG image in pixels\n- height: Height of PNG image in pixels\n- rows: A sequence\
    \ or iterator for the row data\n- info: An info dictionary containing some meta\
    \ data\n\nWe are primarily interested in the third item, “rows”, which is an iterator\
    \ containing all the pixels of the image, row by row. If you’re not familiar with\
    \ Python generators take a look at [this guide](https://realpython.com/introduction-to-python-generators/),\
    \ but they are essentially memory-efficient lists.\n\n## Encoding the image with\
    \ the message\n\nNow that we have the encoded message and pixels of the image\
    \ ready we can combine them to form our secret encoded image.\nAdd the following\
    \ function to the bottom of the main.py file. This function takes in the outputs\
    \ from the previous functions (our raw pixels and our message encoded as a binary\
    \ string), and combines them.\n\n```python\ndef encode_pixels_with_message(pixels,\
    \ bytestring):\n    '''modifies pixels to encode the contents from bytestring'''\n\
    \n    enc_pixels = []\n    string_i = 0\n    for row in pixels:\n        enc_row\
    \ = []\n        for i, char in enumerate(row):\n            if string_i >= len(bytestring):\n\
    \                pixel = row[i]\n            else:\n                if row[i]\
    \ % 2 != int(bytestring[string_i]):\n                    if row[i] == 0:\n   \
    \                     pixel = 1\n                    else:\n                 \
    \       pixel = row[i] - 1\n                else:\n                    pixel =\
    \ row[i]\n                string_i += 1\n            enc_row.append(pixel)\n \
    \       enc_pixels.append(enc_row)\n    return enc_pixels\n```\n\n[^204]: https://realpython.com/introduction-to-python-generators/\n\
    \nThis is the most complicated part of our project, but most of the code is there\
    \ to handle edge cases. The important insight is that we want to control whether\
    \ each pixel has an odd value (representing a 1 in our binary string) or an even\
    \ one (to represent a 0). By chance, half of the pixel values will already have\
    \ the correct value.\nWe simply loop through the binary string and the pixel and\
    \ ‘bump’ each value that isn’t correct by one. That is, we subtract 1 from the\
    \ value if we need to change it from odd to even or vice versa. We don’t want\
    \ any negative numbers, so if we need to change any of the 0 values, we add 1\
    \ instead.\n\n## Writing our modified pixels back to an image\n\nWe now have all\
    \ the image data, including the encoded message but it is still just a list of\
    \ pixels. Let’s add a function that will compile our pixels back into a PNG image.\n\
    Add the following function to the bottom of the `main.py` file.\n\n```python\n\
    def write_pixels_to_image(pixels, fname):\n    png.from_array(pixels, 'RGB').save(fname)\n\
    ```\n\nThe above function takes the array `pixels` and uses the `png` module to\
    \ write these to a brand new .png file.\nPlay around with these functions to make\
    \ sure you understand how they work. Before we write some wrapper code to actually\
    \ use these, we’re going to do everything backwards so that we can also extract\
    \ hidden messages from previously encoded PNG files.\n\n## Decoding messages from\
    \ image files\n\nFirst we need a function that can turn a binary string back into\
    \ readable text. As before, we’ll go via base64 for better compatibility. Add\
    \ the following function to the bottom of the `main.py` file."
  mdcn: "## 数字文本与图像一样，在内部也由数字表示，因此文本文件与图像文件之间的差异并不像你想象的那么大。任何数字数据都可以表示为[二进制字符串](https://thehelloworldprogram.com/computer-science/what-is-binary/)，即一串1和0，我们可以对图像进行微小修改，从而在其中编码一个二进制字符串。例如，考虑以下内容：\n\
    \n```python\nimage = [(255, 0, 0), (0, 255, 0), (0, 0, 255)]\n```\n\n这是一个包含三个像素的图像表示：一个红色、一个绿色和一个蓝色。如果我们将此编码为图像并在图像查看器中打开，我们将看到这个三像素图像，但如果我们用Python读取这些数据，它只是一个元组列表，每个元组包含三个整数。\n\
    \n我们也可以查看组成每个像素的每个值，并计算它是*奇数*还是*偶数*。我们可以将奇数编码为1，偶数值编码为0。这将给我们二进制字符串“100 010 001”（因为255是奇数，0是偶数）。\n\
    \n如果我们对图像进行如下微小修改：\n\n```python\nimage = [(254, 1, 1), (1, 255, 1), (1, 0, 254)]\n\
    ```\n\n在任何图像查看器中，图像看起来几乎完全相同（我们只是对某些值增加或减少了极少量的颜色），但使用我们的奇偶方法，二进制字符串看起来会完全不同：“011\
    \ 111 100”。\n\n使用这种技术，但将其扩展到整个图像（数百万个像素），我们可以在任何图像中隐藏大量的文本数据。\n\n## 在Repl.it上创建项目\n\
