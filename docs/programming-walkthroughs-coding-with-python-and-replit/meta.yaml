    To get around the problem of needing to give our *code* access to the token while
    allowing others to access our code but *not* our token, we’ll be using environment
    variables<sup>120</sup>. On a normal machine, we’d set these directly on our operating
    system, but using Repl.it we don’t have access to this. Repl.it allows us to set
    secret environment variables through a special .env file.


    First, we need to create a new file called exactly .env. Select “Add file” in
    the left pane, as shown in the image below, and name this file .env. It is important
    not to leave out the . at the beginning.


    ![](img/48efb5586f6da072fc1456bee6971293_174_0.png)


    Open this new file and add a variable to define your bot’s secret token (note
    that this is the second token that we got while setting up the bot – different
    from the Client ID that we used to add our bot to our server). It should look
    something like:


    ```

    DISCORD_BOT_SECRET=NDcUN5T32zcTjMYOM0Y1MTUy.Dk7JBw.ihrTSAO1GKHZSonqvuhtwta16WU

    ```


    You’ll need to:


    +   - Replace the token (after the = sign) with the token that Discord gave you
    when creating your own bot.

    - Be careful about **spacing**. Unlike in Python, if you put a space on either
    side of the = in your .env file, these spaces will be part of the variable name
    or the value, so make sure you don’t have any spaces around the = or at the end
    of the line.

    - Run the code again. Sometimes you’ll need to refresh the whole page to make
    sure that your environment variables are successfully loaded.'
