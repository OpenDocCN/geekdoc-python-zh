    \ inserted\");\n    });\n  });\n  res.send('Customer created');\n});\n```\n\n\
    - **第 1 行**定义了一个新路由，用于监听 /create 路径上的 HTTP 'POST' 请求。\n- **第 2 行**连接到数据库。这是异步发生的，因此我们定义了一个回调函数，一旦连接建立就会被调用。\n\
    - **第 3 行**创建了一个新的客户集合。MongoDB 中的集合类似于 SQL 中的表。\n- **第 5 行**定义了将插入集合的客户数据。这些数据来自传入的请求。表单数据使用我们之前定义的解析器进行解析，然后被放入\
    \ `req.body` 变量中，供我们在代码中使用。\n- **第 6 行**将客户数据插入集合中。这也是异步发生的，因此我们定义了另一个回调函数，如果发生错误则会获得错误信息，如果一切成功则会获得响应。\n\
