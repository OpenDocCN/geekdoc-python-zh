    \n## 处理事件：检测鼠标点击\n\nPyGame 记录所有“事件”，包括鼠标点击，并通过 `pygame.event.get()` 提供这些事件。我们需要检查每个游戏循环中发生了哪些事件，并查看其中是否有重要的事件。\n\
