    Now it’s time to move on to generating the actual word clouds.


    # Generating word clouds from text in Python


    Once again, there’s a nifty Python library that can help us. This one will take
    in text and return word clouds as images and is called wordcloud.


    Images are usually served as files living on your server or from an image host
    like imgur<sup>109</sup>. Because we’ll be creating small, short-lived images
    dynamically from the text, we’ll simply keep them in memory instead of saving
    them anywhere permanently. In order to do this, we’ll have to mess around a bit
    with the Python io and base64 libraries, alongside our newly installed wordcloud
    library.


    To import all the new libraries, we’ll be using to process images, modify the
    top of our main.py to look as follows.


    <sup>109</sup>https://imgur.com/'
  - "[PAGE 164]\n\n```\nimport base64\nimport feedparser\nimport io\nimport requests\n\
    \nfrom bs4 import BeautifulSoup\nfrom wordcloud import WordCloud\nfrom flask import\
    \ Flask\nfrom flask import render_template\n```\n\nWe'll be converting the text\
    \ from each article into a separate word cloud, so it'll be useful to have another\
    \ helper function that can take text as input and produce the word cloud as output.\
    \ We can use base64 to represent the images, which can then be displayed directly\
    \ in our visitors' web browsers.\n\nAdd the following function to the main.py\
    \ file.\n\n```\ndef get_wordcloud(text):\n    pil_img = WordCloud().generate(text=text).to_image()\n\
    \    img = io.BytesIO()\n    pil_img.save(img, \"PNG\")\n    img.seek(0)\n   \
    \ img_b64 = base64.b64encode(img.getvalue()).decode()\n    return img_b64\n```\n\
    \nThis is probably the hardest part of our project in terms of readability. Normally,\
    \ we'd generate the word cloud using the wordcloud library and then save the resulting\
    \ image to a file. However, because we don't want to use our file system here,\
    \ we'll create a BytesIO Python object in memory instead and save the image directly\
    \ to that. We'll convert the resulting bytes to base64 in order to finally return\
    \ them as part of our HTML response and show the image to our visitors.\n\nIn\
    \ order to use this function, we'll have to make some small tweaks to the rest\
    \ of our code.\n\nFor our template, in the home.html file, change the for loop\
    \ to read as follows.\n\n```\n{% for article in articles %}\n    <img src=\"data:image/png;base64,{{article}}\"\
    >{% endfor %}\n```\n\nNow instead of displaying our article in <p> tags, we'll\
    \ put it inside an <img/> tag so that it can be displayed as an image. We also\
    \ specify that it is formatted as a png and encoded as base64.\n\nThe last thing\
    \ we need to do is modify our home() function to call the new get_wordcloud()\
