    \ but because we don't want to create new copies of the list, we'll be defining\
    \ these sublists by using indexes to the original list.\n\nIn line 2, we start\
    \ off both of our pointers - `follower`, and `leader` - to be the same as the\
    \ beginning of the segment of the list that we're interested in. The leader is\
    \ going to move faster than the follower, so we'll carry on looping until the\
    \ leader falls off the end of the list segment (`while leader < end`).\n\nWe could\
    \ take any element we want as a pivot element, but for simplicity, we'll just\
    \ choose the last element. In line 4 then, we compare the `leader` element to\
    \ the pivot. The leader is going to step through each and every item in our list\
    \ segment, so this means that when we're done, we'll have compared the partition\
    \ with every item in the list.\n\nIf the `leader` element is smaller or equal\
    \ to the pivot element, we need to send it further to the left and bring a larger\
    \ item (tracked by `follower`) further to the right. We do this in lines 4-5,\
    \ where if we find a case where the `leader` is smaller or equal to the pivot,\
    \ we swap it with the `follower`. At this point, the follower is pointing at a\
    \ small item (the one that was `leader` a moment ago), so we increment `follower`\
    \ by one in order to track the next item instead. This has a side effect of counting\
    \ how many swaps we do, which incidentally tracks the exact place that our pivot\
    \ element should eventually end up.\n\nWhether or not we did a swap, we want to\
    \ consider the next element in relation to our pivot, so in line 7 we increment\
    \ `leader`.\n\nOnce we break out of the loop (line 8), we need to swap the pivot\
    \ item (still on the end of the list) with the `follower` (which has moved up\
    \ one for each element that was smaller than the pivot). If this is still confusing,\
