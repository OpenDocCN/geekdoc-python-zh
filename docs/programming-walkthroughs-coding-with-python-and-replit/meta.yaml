    # Calling a Django route using Ajax and jQuery


    We''ll use [Ajax through jQuery](http://api.jquery.com/jquery.ajax/) to do a “partial
    page refresh” – that is, to update part of the page the user is seeing by sending
    new data from our backend code without the user needing to reload the page.


    To do this, we need to include jQuery as a library.


    > Note: usually you wouldn''t add JavaScript directly to your base.html template,
    but to keep things simpler and to avoid creating too many files, we''ll be diverging
    from some good practices. See [the Django documentation](https://docs.djangoproject.com/en/2.0/howto/static-files/)
    for some guidance on how to structure JavaScript properly in larger projects.


    In your `templates/base.html` file, add the following script above the line where
    we previously defined the `use_ip()` function.


    ```

    1 <script

    2   src="https://code.jquery.com/jquery-3.3.1.min.js"

    3   integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZx1twRo8QtmkMRdAu8="

    4   crossorigin="anonymous"></script>

    ```


    This loads the entire jQuery library from a [CDN](https://www.cloudflare.com/learning/cdn/what-is-a-cdn/),
    allowing us to complete certain tasks using fewer lines of JavaScript.


    Now, modify the `use_ip()` script that we wrote before to call our backend route
    using Ajax. The new `use_ip()` function should be as follows:


    ```

    1  function use_ip(json) {

    2    $.ajax({

    3      url: {% url ''get_weather_from_ip'' %},

    4      data: {"ip": json.ip},

    5      dataType: ''json'',

    6      success: function (data) {

    7        document.getElementById("weatherdata").innerHTML = data.weather_data

    8      }

    9    });

    10 }

    ```'
- md: "Our new `use_ip()` function makes an asynchronous<sup>161</sup> call to our\
    \ `get_weather_from_ip` route, sending along the IP address that we previously\
    \ displayed in a pop-up box. If the call is successful, we call a new function\
    \ (in the `success:` section) with the returned data. This new function (line\
    \ 7) looks for an HTML element with the ID of `weatherdata` and replaces the contents\
    \ with the `weather_data` attribute of the response that we received from `get_weather_from_ip`\
    \ (which at the moment is still hardcoded to be “20”).\n\n![](img/48efb5586f6da072fc1456bee6971293_212_0.png)\n\
    \nTo see the results, we'll need to add an HTML element as a placeholder with\
    \ the id `weatherdata`. Do this in the `templates/index.html` file as follows.\n\
    \n```\n{% extends \"base.html\" %}\n\n{% block content %}\n<h1>Weather</h1>\n\
    <p id=weatherdata></p>\n{% endblock %}\n```\n\nThis adds an empty HTML paragraph\
    \ element which our JavaScript can populate once it has the required data.\n\n\
    Now reload the app and you should see our fake 20 being displayed to the user.\
    \ If you don't see what you expect, open up your browser's developer tools for\
    \ Chrome<sup>162</sup> and Firefox<sup>163</sup>) and have a look at the Console\
    \ section for any JavaScript errors. A clean console (with no errors) is shown\
    \ below.\n\n![](img/48efb5586f6da072fc1456bee6971293_213_0.png)\n\nNow it’s time\
    \ to change out our mock data for real data by calling two services backend –\
    \ the first to get the user’s location from their IP address and the second to\
    \ fetch the weather for that location.\n\n## Using ip-api.com for geolocation\n\
    \nThe service at [ip-api.com](http://ip-api.com)¹⁶⁴ is very simple to use. To\
    \ get the country and city from an IP address we only need to make one web call.\
    \ We’ll use the python `requests` library for this, so first we’ll have to add\
    \ an import for this to our `views.py` file, and then write a function that can\
    \ translate IP addresses to location information. Add the following import to\
    \ your `views.py` file:\n\n```\npython\nimport requests\n```\n\nand above the\
    \ `get_weather_from_ip()` function, add the `get_location_from_ip()` function\
    \ as follows:\n\n```\npython\ndef get_location_from_ip(ip_address):\n    response\
    \ = requests.get(\"http://ip-api.com/json/{}\".format(ip_address))\n    return\
    \ response.json()\n```\n\n> Note: again we are diverging from best practice in\
    \ the name of simplicity. Usually whenever you write any code that relies on networking\
    \ (as above), you should add [exception handling](https://docs.python.org/3/tutorial/errors.html)¹⁶⁵\
    \ so that your code can fail more gracefully if there are problems.\n\nYou can\
    \ see the response that we’ll be getting from this service by trying it out in\
    \ your browser. Visit [http://ip-api.com/json/41.71.107.123](http://ip-api.com/json/41.71.107.123)¹⁶⁶\
    \ to see the JSON response for that specific IP address.\n\n¹⁶⁴ http://ip-api.com\n\
    ¹⁶⁵ https://docs.python.org/3/tutorial/errors.html\n¹⁶⁶ http://ip-api.com/json/41.71.107.123\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_214_0.png)\n\nTake a look specifically\
    \ at the highlighted location information that we'll need to extract to pass on\
    \ to a weather service.\n\nBefore we set up the weather component, let's display\
    \ the user's current location data instead of the hardcoded temperature that we\
    \ had before. Change the `get_weather_from_ip()` function to call our new function\
    \ and pass along some useful data as follows:\n\n```\ndef get_weather_from_ip(request):\n\
    \    ip_address = request.GET.get(\"ip\")\n    location = get_location_from_ip(ip_address)\n\
    \    city = location.get(\"city\")\n    country_code = location.get(\"countryCode\"\
    )\n    s = \"You're in {}, {}\".format(city, country_code)\n    data = {\"weather_data\"\
    : s}\n    return JsonResponse(data)\n```\n\nNow, instead of just printing the\
    \ IP address that we get sent and making up some weather data, we use the IP address\
    \ to guess the user's location, and pass the city and country code back to the\
    \ template to be displayed. If you reload your app again, you should see something\
    \ similar to the following (though hopefully with your location instead of mine).\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_214_1.png)\n\nweather app, location\
    \ showing\n\nThat's the location component of our app done and dusted – let's\
    \ move on to getting weather data for that location now.\n\n## Getting weather\
    \ data from OpenWeatherMap\n\nTo get weather data automatically from OpenWeatherMap<sup>167</sup>,\
    \ you’ll need an API Key. This is a unique string that OpenWeatherMap gives to\
    \ each user of their service and it’s used mainly to restrict how many calls each\
    \ person can make in a specified period. Luckily, OpenWeatherMap provides a generous\
    \ “free” allowance of calls, so we won’t need to spend any money to build our\
    \ app. Unfortunately, this allowance is not quite generous enough to allow me\
    \ to share my key with every reader of this tutorial, so you’ll need to sign up\
    \ for your own account and generate your own key.\n\nVisit openweathermap.org<sup>168</sup>,\
    \ hit the “sign up” button, and register for the service by giving them an email\
    \ address and choosing a password. Then navigate to the API Keys<sup>169</sup>\
    \ section and note down your unique API key (or copy it to your clipboard).\n\n\
    ![](img/48efb5586f6da072fc1456bee6971293_215_0.png)\n\nOpenWeatherMap API Key\
    \ page\n\nThis key is a bit like a password – when we use OpenWeatherMap’s service,\
    \ we’ll always send along this key to indicate that it’s us making the call. Because\
    \ Repl.it’s projects are public by default, we’ll need to be careful to keep this\
    \ key private and prevent other people making too many calls using our OpenWeatherMap\
    \ quota (potentially making our app fail when OpenWeatherMap starts blocking our\
    \ calls). Luckily Repl.it provides a neat way of solving this problem using .env\
    \ files<sup>170</sup>.\n\nIn your project, create a new file using the “New file”\
    \ button as shown below. Make sure that the file is in the root of your project\
    \ and that you name the file `.env` (in Linux, starting a filename with a `.`\
    \ usually indicates that it’s a system or configuration file). Inside this file,\
    \ define the `OPEN_WEATHER_TOKEN` variable as follows, but using your own token\
    \ instead of the fake one below. Make sure not to have a space on either side\
    \ of the `=` sign.\n\n```\nOPEN_WEATHER_TOKEN=1be9250b94bf6803234b56a87e55f\n\
    ```\n\n![](img/48efb5586f6da072fc1456bee6971293_216_0.png)\n\nCreating a new file\n\
    \nRepl.it will load the contents of this file into our server's environment variables<sup>171</sup>.\
    \ We'll be able to access this using the `os` library in Python, but when other\
    \ people view or fork our Repl, they won't see the `.env` file, keeping our API\
    \ key safe and private.\n\nTo fetch weather data, we need to call the OpenWeatherMap\
    \ api, passing along a search term. To make sure we're getting the city that we\
