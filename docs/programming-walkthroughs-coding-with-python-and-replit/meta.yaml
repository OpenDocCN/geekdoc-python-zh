    Data science and data visualisation are huge topics, and there are dozens of Python
    libraries that can be used to plot data. For a good overview of all of them and
    their strengths and weaknesses, you should watch Jake Vanderplas''s talk[^36].


    # Saving plots to PNG files


    While visualising data right after you analyse it is often useful, sometimes you
    need to save the figures to embed into reports. You can save your graphs by calling
    `plt.savefig()`. Change the last line (`plt.show()`) to


    ```

    python

    plt.savefig("GDPlife.png")

    ```


    Rerun the code. Instead of seeing the plot appear in the right-hand pane, you''ll
    see a new file in the files pane. Clicking on it will show you the PNG file in
    the editing pane.


