    # # Forking and extending our basic bot


    This is not a very useful bot as is, but the possibilities are only limited by
    your creativity now! You can have your bot receive input from a user, process
    the input, and respond in any way you choose. In fact, with the basic input and
    output that we''ve demonstrated, we have most of the components of any modern
    computer, all of which are based on the Von Neumann architecture<sup>140</sup>
    (we could easily add the missing memory by having our bot write to a file, or
    with a bit more effort link in a SQLite database<sup>141</sup> for persistent
    storage).


    If you followed along this tutorial, you''ll have your own basic Repl bot to play
    around with and extend. If you were simply reading, you can easily fork my bot
    at https://repl.it/@GarethDwyer1/discord-bot-node<sup>142</sup> and extend it
    how you want (you''ll need to add your own token and recreate the .env file still).
    Happy hacking!


    If you''re stuck for ideas, why not link up your Discord bot to the Twitch API<sup>143</sup>
    to get notified when your favourite streamers are online, or build a text adventure<sup>144</sup>.


    In the next chapter, we''ll be looking at building our own basic web application,
    using Django. This tutorial will also introduce you to HTML, JavaScript, and jQuery
    and will assist you in getting to the point where you can begin to build your
    own custom web applications.


