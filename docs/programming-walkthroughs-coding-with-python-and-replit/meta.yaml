    \n## Hiding messages in images: steganography with Python and Repl.it\n\nIn this\
    \ tutorial, we’ll build a steganography tool in Python. Steganography is the practice\
    \ of hiding information within other data. Unlike encryption, where the goal is\
    \ to secure *the contents* of communication between two parties, steganography\
    \ aims to obscure the fact that the parties are communicating at all.\n\nOur tool\
    \ will enable the user to hide secret text within a normal-looking .png image\
    \ file. The receiver of the image will use the same tool to reveal the hidden\
    \ message.\n\nWe’ll use Python to build the tool. The most popular Python image\
    \ processing libraries are [Pillow](https://pypi.org/project/Pillow/) and [OpenCV](https://pypi.org/project/opencv-python/),\
    \ but these are heavy libraries with many dependencies. We’ll avoid these and\
    \ instead use the lightweight [PyPNG](https://pypi.org/project/pypng/) library\
    \ which is written in pure Python, and therefore easier to run on various platforms.\n\
    \n### A quick background on steganography\n\nLet’s imagine three people: Alice,\
    \ Bob and Eve. Alice wants to send a private message to Bob, while Eve wants to\
    \ intercept this message. While modern-day encryption can help Alice and Bob ensure\
    \ that Eve doesn’t know the *contents* of their message, Eve can possibly still\
    \ deduce interesting information just from knowing that Alice and Bob are communicating\
