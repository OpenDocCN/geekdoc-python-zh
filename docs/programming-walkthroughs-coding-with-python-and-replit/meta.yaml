    \ URL 输出，如下图所示。\n\n<sup>105</sup> https://www.codementor.io/garethdwyer/beginner-web-scraping-with-python-and-repl-it-nzr27jvnq\n\
    \n<sup>106</sup> https://www.crummy.com/software/BeautifulSoup/bs4/doc/\n\n<sup>107</sup>\
    \ https://pythonhosted.org/feedparser/\n\n![](img/48efb5586f6da072fc1456bee6971293_157_0.png)\n\
    \n## 使用 Flask 设置 Web 应用程序\n\n我们不想只是在 Repl 控制台中打印这些数据。相反，我们的应用程序应该向任何使用 Web 浏览器访问我们应用程序的人返回信息。因此，我们将安装轻量级的\
    \ Web 框架 Flask<sup>108</sup> 并使用它来向访客提供 Web 内容。\n\n在 main.py 文件中，我们需要将代码修改如下：\n\
    \n```python\nimport feedparser\nfrom flask import Flask\n\napp = Flask(__name__)\n\
    \nBBC_FEED = \"http://feeds.bbci.co.uk/news/world/rss.xml\"\n\n@app.route(\"/\"\
