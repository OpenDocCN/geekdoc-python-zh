    \    return number\n```\n\n我们要添加到`contacts.py`中的新代码非常简短，可能会让人忍不住想将这个逻辑直接放入`main.py`文件中。然而，保持良好的分层结构是明智的，因为每个文件的长度和复杂性都可能随时间增长。将用户交互代码与数据库交互代码严格分离，将使我们更易于维护代码库。\n\
    \n再次运行代码，并输入与之前相同的姓名。如果一切顺利，你将看到号码，如下例所示。\n\n![](img/48efb5586f6da072fc1456bee6971293_120_0.png)\n\
    \n## 插曲：创建主菜单\n\n我们现在已有添加和检索联系人的功能，还需要添加：\n\n-   按姓名进行部分匹配搜索\n-   更新现有联系人（姓名或号码）\n\
    -   删除联系人。\n\n但在着手解决这些问题之前，我们需要让用户能够选择他们想要激活的功能。如果是图形界面或Web应用，我们可以添加一些菜单项或按钮，但我们的命令行应用程序仅由简单控制台上的文本输入输出驱动。让我们构建一个主菜单，允许用户指定他们想做什么。\n\
    \n为了方便用户，我们将允许他们通过输入与相应菜单项关联的单个数字来进行选择。\n\n将你的`main.py`文件修改如下：\n\n```python\n\
    import contacts\nfrom os import system\n\nmain_message = \"\"\"欢迎使用电话簿\n-------------------------------------\n\
    请选择：\n1 - 添加新联系人\n2 - 查找联系人\n-------------------------------------\n\"\"\"\n\n\
    def prompt_add_contact():\n    name = input(\"请输入联系人姓名：\")\n    number = input(\"\
    请输入联系人电话号码：\")\n    print(f\"正在添加 {name}，号码为 {number}\")\n    contacts.add_contact(name,\
    \ number)\n\ndef prompt_get_contact():\n    name = input(\"请输入要查找的姓名：\")\n   \
    \ number = contacts.get_contact(name)\n    if number:\n        print(f\"{name}\
    \ 的号码是 {number}\")\n    else:\n        print(f\"看起来 {name} 不存在\")\n\ndef main():\n\
    \    print(main_message)\n    choice = input(\"请输入你的选择：\").strip()\n    if choice\
    \ == \"1\":\n        prompt_add_contact()\n    elif choice == \"2\":\n       \
    \ prompt_get_contact()\n    else:\n        print(\"输入无效，请重试。\")\n\nwhile True:\n\
    \    system(\"clear\")\n    main()\n    input(\"按回车键继续：\")\n```\n\n这看起来比我们之前的代码多很多，但如果你忽略顶部的多行字符串和我们已有的两个函数，实际增加的代码并不多。我们新的`main()`函数要求用户从菜单中选择一项，确保其选择有效，然后调用相应的函数。\n\
    \n在`main()`函数下方，我们设置了一个无限循环，以便用户可以在首次操作后持续使用我们的应用程序，无需重新运行。我们在每次运行之间调用`system(\"\
    clear\")`来清除旧的输入输出（为此我们在文件顶部也添加了新的导入）。\n\n## 扩展搜索功能\n\n我们已经允许用户通过输入确切姓名来查找联系人，但能够进行部分匹配也很有用。如果我们的用户输入“Smith”，而我们有一个“Smith,\
    \ John”和一个“Smith, Mary”，我们应该能够向用户显示这两个联系人。\n\nRepl.it数据库有一个前缀函数，可以找到所有以特定字符串开头的键。向这个前缀函数提供“Smi”将匹配“Smith”、“Smith,\
    \ John”和“Smith, Mary”，但不会匹配“John Smith”，因为它仅从每个键的开头进行匹配。\n\n你可以通过调用例如`db.prefix(\"\
    Smi\")`来使用此功能，它将返回所有匹配“Smi”前缀的键。注意，这不会返回值（在我们的例子中是电话号码），因此一旦我们有了匹配项，我们仍然需要单独查找每个电话号码。\n\
    \n我们希望我们的应用程序在存在精确匹配时优先找到它，或者只有在不存在精确匹配时才优雅地回退到返回按前缀匹配的结果列表。\n\n在`contacts.py`中添加一个新函数，用于搜索联系人并提取每个电话号码，如下所示：\n\
    \n```python\ndef search_contacts(search):\n    match_keys = db.prefix(search)\n\
    \    return {k: db[k] for k in match_keys}\n```\n\n然后在`main.py`中，修改`prompt_get_contacts()`函数，以便在必要时（当没有精确匹配时）调用此函数，如下所示：\n\
    \n```python\ndef prompt_get_contact():\n    name = input(\"请输入要查找的姓名：\")\n   \
    \ number = contacts.get_contact(name)\n    if number:\n        print(f\"{name}\
    \ 的号码是 {number}\")\n    else:\n        matches = contacts.search_contacts(name)\n\
    \        if matches:\n            for k in matches:\n                print(f\"\
    {k} 的号码是 {matches[k]}\")\n        else:\n            print(f\"看起来 {name} 不存在\"\
    )\n```\n\n再次运行代码并选择添加一个联系人。在提示时输入“Smith, Mary”以及任意电话号码。当程序重新启动时，选择查找联系人并输入“Smi”。它应该打印出我们拥有的两个“Smith”匹配项，如下所示。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_123_0.png)\n\n图5：用户菜单：他们现在可以选择要执行的操作。\n\
    \n## 允许用户更新联系人\n\n用户可能有两种方式想要更新联系人。他们应该能够：\n\n1.  更改联系人的姓名但保留相同的电话号码\n2.  更改联系人的电话号码但保留相同的姓名\n\
    \n因为我们将联系人存储为键和值，所以要完成1），我们需要创建一个新联系人并删除原始联系人；而对于2），我们可以简单地更新现有键的值。\n\n我们可以通过允许用户将任一字段留空来处理这两种情况，在这种情况下保留旧值。在你的`main.py`文件中添加以下函数。\n\
    \n```python\ndef prompt_update_contact():\n    old_name = input(\"请输入要更新的联系人姓名：\"\
    )\n    old_number = contacts.get_contact(old_name)\n    if old_number:\n     \
    \   new_name = input(f\"请输入此联系人的新姓名（留空则保持{old_name}）：\").strip()\n        new_number\
    \ = input(f\"请输入此联系人的新号码（留空则保持{old_number}）：\").strip()\n\n        if not new_number:\n\
    \            new_number = old_number\n\n        if not new_name:\n           \
    \ contacts.update_number(old_name, new_number)\n        else:\n            contacts.update_contact(old_name,\
    \ new_name, new_number)\n\n    else:\n        print(f\"看起来 {old_name} 不存在\")\n\
    ```\n\n这使用了我们`contacts.py`文件中尚不存在的两个函数。它们是：\n\n-   `update_number`：保持联系人不变但更改电话号码\n\
    -   `update_contact`：通过删除旧联系人并创建新联系人来更新姓名（可能也更新号码）\n\n在`contacts.py`中创建这两个函数，如下所示。\n\
    \n```python\ndef update_number(old_name, new_number):\n    db[old_name] = new_number\n\
    \ndef update_contact(old_name, new_name, new_number):\n    db[new_name] = new_number\n\
    \    del db[old_name]\n```\n\n注意我们如何使用Python关键字`del`从数据库中删除内容。我们将在下一节再次使用它。\n\n\
    现在我们需要允许用户从菜单中选择“更新”作为选项。在`main.py`文件中，向菜单提示中添加新行以告知用户该选项，并更新`main()`函数，以便在适当时调用新的更新函数，如下所示："
