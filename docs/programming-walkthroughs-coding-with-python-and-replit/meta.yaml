  md: "# Overview of the actual partition implementation\n\n```\ndef partition(xs,\
    \ start, end):\n    follower = leader = start\n    while leader < end:\n     \
    \   if xs[leader] <= xs[end]:\n            xs[follower], xs[leader] = xs[leader],\
    \ xs[follower]\n            follower += 1\n        leader += 1\n    xs[follower],\
    \ xs[end] = xs[end], xs[follower]\n    return follower\n```\n\nIn our good partition\
    \ function, you can see that we do some swap operations (lines 5 and 8) on the\
    \ xs that is passed in, but we never allocate any new memory. This means that\
    \ the storage remains constant to the size of xs, or O(n) in Computer Science\
    \ terms. That is, this algorithm has half the space requirement of the “bad” implementation\
    \ above, and should therefore allow us to sort lists that are twice the size using\
    \ the same amount of memory.\n\nThe confusing part of this implementation is that\
    \ although everything is based around our pivot element (the last item of the\
    \ list in our case), and although the pivot element ends up somewhere in the middle\
    \ of the list at the end, we don’t actually touch the pivot element until the\
    \ very last swap.\n\nInstead, we have two other counters (follower and leader)\
    \ which move around the smaller and bigger numbers in a clever way and implicitly\
    \ keep track of where the pivot element should end up. We then switch the pivot\
    \ element into the correct place at the end of the loop (line 8).\n\nThe leader\
    \ is just a loop counter. Every iteration it increments by one until it gets to\
    \ the pivot element (the end of the list). The follower is more subtle, and it\
    \ keeps count of the number of swap iterations we do, moving up the list more\
    \ slowly than the leader, tracking where our pivot element should eventually end\
    \ up.\n\nThe other confusing part of this algorithm is on line 4. We move through\
    \ the list from left to right. All numbers are currently to the left of the pivot\
    \ but we eventually want the “big” items to end up on the right.\n\nIntuitively,\
    \ you would then expect us to do the swapping action when we find an item that\
    \ is larger than the pivot, but in fact, we do the opposite. When we find items\
    \ that are smaller than the pivot, we swap the leader and the follower."
