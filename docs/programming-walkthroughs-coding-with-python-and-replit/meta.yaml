    \nBy the end of the tutorial, the application you will have created will be able\
    \ to create, update, and delete documents in a MongoDB database. You will also\
    \ have used a web application framework called Express^[178]^ and the Pug^[179]^\
    \ templating engine.\n\n## Creating an account on MongoDB Atlas\n\nMongoDB Atlas\
    \ is a fully managed Database-as-a-Service. It provides a document database (often\
    \ referred to as NoSQL), as opposed to a more traditional relational database\
    \ like PostgreSQL.\n\nHead over to MongoDB Atlas^[180]^ and hit the “Try free”\
    \ button. You should then sign up, clicking the “Get started free” button to complete\
    \ the process.\n\n^[175]^ https://en.wikipedia.org/wiki/Create,_read,_update_and_delete\n\
    ^[176]^ https://en.wikipedia.org/wiki/Customer_relationship_management\n^[177]^\
    \ https://www.mongodb.com/cloud/atlas\n^[178]^ https://expressjs.com/\n^[179]^\
    \ https://pugjs.org/api/getting-started.html\n^[180]^ https://www.mongodb.com/cloud/atlas\n\
    \nAfter signing up, under “Shared Clusters”, press the “Create a Cluster” button.\n\
    You now have to select a provider and a region. For the purposes of this tutorial,\
    \ we chose Google Cloud Platform as the provider and Iowa (us-central1) as the\
    \ region, although it should work regardless of the provider and region.\n\n![](img/48efb5586f6da072fc1456bee6971293_220_0.png)\n\
    \nUnder “Cluster Name” you can change the name of your cluster. Note that you\
    \ can only change the name now - it can’t be changed once the cluster is created.\
    \ After you’ve done that, click “Create Cluster”.\n\n![](img/48efb5586f6da072fc1456bee6971293_220_1.png)\n\
    \nAfter a bit of time, your cluster will be created. Once it’s available, click\
