    \    bytestring.append(str(c % 2))\n    bytestring = ''.join(bytestring)\n   \
    \ message = decode_message_from_bytestring(bytestring)\n    return message\n```\n\
    \nOnce again, this is just the reverse of what we did before. We grab the remainder\
    \ of each value to get 1 for each odd value and 0 for each even one and keep them\
