    \n## 导出我们的天气数据文件\n\n如果你每天运行这个脚本持续几个月，你将得到一个很好的数据集，它在其他情况下也可能有用。如果你想从Repl.it下载所有数据，可以使用“Download\
    \ as zip”功能来导出repl中的所有文件（包括代码和数据文件）。\n\n下载完.zip文件后，你可以在本地文件系统中解压它，找到所有数据文件，这些文件现在可以根据需要使用其他程序打开。\n\
    \n从同一菜单中，你还可以选择“upload file”或“upload folder”来将文件导入到你的repl中。例如，如果你使用外部软件清理了文件，然后希望你的repl开始将新数据追加到清理后的版本，你可以重新导入它们。\n\
    \n如果你没有更改文件名，Repl.it会警告你即将覆盖现有文件。\n\n## 个性化定制\n\n如果你已经跟着操作，那么你已经有自己的repl版本可以扩展了。如果没有，请从我们的版本开始。从\
    \ https://repl.it/@GarethDwyer1/cwr-02-weather-report 复制它。\n\n## 接下来做什么\n\n我们的天气报告项目就到这里了。你学会了如何在Python和Repl.it中处理文件，包括文件可以以不同的模式（读、写或追加）打开。\n\
    \n你还学习了使用外部库`requests`从互联网上获取数据。这个模块实际上并不属于Python，你将在下一篇文章中学习如何管理外部模块或依赖项。\n\n\
    # 使用Repl.it管理依赖项\n\n几乎所有的程序都在不同程度上依赖于各种形式的现有代码。你的代码所依赖的现有代码称为`依赖项`。你已经在之前的教程中遇到过一些依赖项：你在第一个教程中使用`math`模块来计算二次方程，在第二个教程中使用`requests`模块来获取天气数据。\n\
    \n在第一个教程中，你还编写了`solver.py`模块，并将其导入到`main.py`文件中。我们可以将依赖项分为三大类：\n\n- 内部依赖项：你或你的组织编写的、完全由你控制的其他代码，例如`solver.py`文件。\n\
    - 标准依赖项：作为标准语言库一部分存在的代码，例如`math`模块。\n- 外部依赖项：由第三方开发者编写的代码，例如`requests`模块。\n\n\
    在本教程中，你将获得更多关于所有三类依赖项的经验。具体来说，你将编写一个自然语言处理程序来分析句子，使用`spaCy`<sup>17</sup>，这是一个第三方依赖项。\n\
    \n依赖项管理是一个极其复杂的领域，并且有一个庞大的相关工具生态系统来帮助管理Python程序的打包和安装。我们不会涵盖所有的选项和背景知识，但你可以在这里阅读关于不同工具的概述<sup>18</sup>。\n\
    \n## 了解Repl.it的魔法导入工具和通用包管理器\n\n在几乎所有的编程环境中，你都必须显式安装第三方依赖项。假设你想在本地机器上使用`requests`库（Python默认不包含）。如果你尝试导入它，你会得到一个`ModuleNotFoundError`错误，如下所示。\n\
    \n```\nType \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> import requests\nTraceback (most recent call last):\n  File \"testing.py\"\
    , line 1, in <module>\nModuleNotFoundError: No module named 'requests'\n>>>\n\
    ```\n\n要使用这个库，你首先必须使用类似`pip install requests`的命令安装它，然后导入语句才能正确运行。\n\n相比之下，Repl.it通常可以使用通用包管理器<sup>19</sup>为你完全自动地完成安装。当你运行`import\
    \ requests`这行代码时，包管理器会找到正确的包并安装它，或者在某些情况下Repl.it甚至可能已经预装了该包。无论哪种方式，你的代码都会“直接运行”。\n\
    \n这非常方便，但有时你需要更多控制。例如，你可能需要一个特定版本的包，或者通用包管理器可能无法自动安装所有依赖项。在这些情况下，你可以使用更高级的方法来安装包。\n\
    \n## 通过GUI安装包\n\n如果你不确定具体需要哪个包，可以使用Repl.it内置的包管理器GUI来搜索包。在下面的示例中，我们正在寻找一个名为`beautifulsoup4`的包。\n\
    \n要使用此功能，你需要：\n\n1. 从左侧工具栏点击“packages”标签页。\n2. 通过输入部分或全部包名来搜索包。\n3. 从搜索结果中选择你需要的包。\n\
    \n这会带你到一个显示所选包概览和摘要的页面。你可以通过使用下方所示的`+`按钮将其安装到你的repl中。\n\n安装包后，我们就可以在代码中使用它了。运行下面的示例，从主页上的主按钮中提取“Google\
    \ Search”文本。\n\n```\nimport requests\nfrom bs4 import BeautifulSoup\n\nr = requests.get(\"\
    https://google.com\").text\nsoup = BeautifulSoup(r, \"html.parser\")\n\nprint([x.get(\"\
    title\") for x in soup.findAll(\"input\") if x.get(\"title\")])\n```\n\n这段代码使用requests库从google.com抓取HTML，然后使用beautifulsoup4库获取页面上按钮的标题并将其打印到控制台。\n\
    \n因为`requests`是Python中最常用的库之一，Repl.it安装它的方式可能与大多数包略有不同。然而，`beautifulsoup4`不那么常见，它将使用`poetry`<sup>20</sup>以标准方式安装。\n\
    \n如果你回到文件标签页，你会看到两个新文件`poetry.lock`和`pyproject.toml`，它们是由安装程序自动创建的。查看`pyproject.toml`文件内部。\n\
    \n在本例中，第9行表明我们的项目依赖于`beautifulsoup4`包，并且需要至少4.9.1版本。如果我们查看PyPi上的beautifulsoup页面<sup>21</sup>，会看到最新的稳定版本是4.9.1，因此如果将来运行此项目并且有新版本可用，它将自动使用更新后的包。\n\
    \n## 使用spaCy构建NLP项目\n\n到目前为止，我们已经安装了Repl.it通用依赖管理器可以轻松自动在后台安装的包。有些包则更复杂。例如，`spaCy`<sup>22</sup>是一个NLP库，它依赖于一个大型外部数据文件。在安装此库时，你通常需要单独安装此数据文件。\n\
    \n### 安装spaCy语言模型\n\n为了在Repl.it上使其工作，我们将必须手动修改`pyproject.toml`文件。\n\n创建一个新的repl，名为SpacyExample，然后点击“Packages”图标并搜索“spacy”。"
