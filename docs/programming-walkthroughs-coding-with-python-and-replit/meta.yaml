    20                 string_i += 1\n21 \n22             enc_pixels.append(enc_row)\n\
    23         return enc_pixels\n```\n\nThis is the most complicated part of our\
    \ project, but most of the code is there to handle edge cases. The important insight\
    \ is that we want to control whether each pixel has an odd value (representing\
    \ a 1 in our binary string) or an even one (to represent a 0). By chance, half\
    \ of the pixel values will already have the correct value.\nWe simply loop through\
    \ the binary string and the pixel and ‘bump’ each value that isn’t correct by\
    \ one. That is, we subtract 1 from the value if we need to change it from odd\
    \ to even or vice versa. We don’t want any negative numbers, so if we need to\
    \ change any of the 0 values, we add 1 instead.\n\n# Writing our modified pixels\
    \ back to an image\n\nWe now have all the image data, including the encoded message\
    \ but it is still just a list of pixels. Let’s add a function that will compile\
    \ our pixels back into a PNG image.\nAdd the following function to the bottom\
    \ of the `main.py` file.\n\n```\n1 def write_pixels_to_image(pixels, fname):\n\
    2     png.from_array(pixels, 'RGB').save(fname)\n```\n\nThe above function takes\
    \ the array `pixels` and uses the `png` module to write these to a brand new .png\
    \ file.\nPlay around with these functions to make sure you understand how they\
    \ work. Before we write some wrapper code to actually use these, we’re going to\
    \ do everything backwards so that we can also extract hidden messages from previously\
    \ encoded PNG files.\n\n# Decoding messages from image files\n\nFirst we need\
    \ a function that can turn a binary string back into readable text. As before,\
    \ we’ll go via base64 for better compatability. Add the following function to\
    \ the bottom of the `main.py` file."
