- md: "## Make it your own\n\nIf followed along, you’ll already have your own version\
    \ of the repl to extend. If not, start from ours. Fork it [https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting37](https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting37).\n\
    \n## Where next?\n\nYou’ve learned how to make some basic plots using Python and\
    \ Repl.it. There are millions of freely available data sets on the internet, waiting\
    \ for people to explore them. You can find many of these using [Google's Dataset\
    \ Search](https://datasetsearch.research.google.com/) service. Pick a topic that\
    \ you're interested in and try to find out more about it through data visualisations.\n\
    \nNext up, we'll explore the multiplayer functionality of Repl.it in more detail\
    \ so that you can code collaboratively with friends or colleagues.\n\n## Multiplayer:\
    \ Pair programming with Repl.it\n\nSoftware developers have a reputation for being\
    \ loners, but they don’t always code by themselves. [Pair programming](https://en.wikipedia.org/wiki/Pair_programming)\
    \ is used by many programmers to\n\n- Write bug-free code more efficiently (for\
    \ example, one person might watch for mistakes while the other codes).\n- Share\
    \ knowledge (a less-experienced programmer might ‘follow along’ while a more experienced\
    \ programmer develops something, learning from each step of the process).\n- Assess\
    \ expertise (if you’re considering a new hire, watching them code first can be\
    \ helpful to assess how good a coder they are, but coding with them allows you\
    \ to also see their experience in teamwork and communication).\n\nPair programming\
    \ intuitively sounds like it would be inefficient: after all, the two developers\
    \ could instead be working on different projects simultaneously. But on top of\
    \ catching more bugs, two people working together often display more creativity\
    \ as well. You might think of an idea based on something your buddy said that\
    \ wouldn’t have come to you alone.\n\nIf you have a friend handy, work through\
    \ this tutorial together to gain real pair programming experience. If you’re alone,\
    \ fire up two browsers (or use incognito mode) to sign into two Repl.it accounts\
    \ simultaneously.\n\n## Extending our data science article using pair programming:\
    \ Getting help\n\nImagine that you are a developer who has come across the [previous\
    \ tutorial on plotting and graphing](http://www.codewithrepl.it/04-data-science-and-visualisation-with-repl-it.html).\
    \ You want to adapt the graphs shown a bit, but you haven’t used Python much,\
    \ so you decide to ask your friend for help.\n\nIn this scenario, you are “@Lean3Viljoen94”\
    \ and the friend that you’re asking for help is “@GarethDwyer1”.\n\nStart by forking\
    \ [the data science repl](https://repl.it/@GarethDwyer1/04-data-science-and-visualisation-with-replit)\
    \ and making sure that you can run it.\n\nNow from your own fork, press the share\
    \ button, as shown below.\n\nCopy the invite link, and note that this is different\
    \ from the normal link to your repl. If you copy the link from your URL bar, you\
    \ can give people read access to your repl, but by copying the invite link you’ll\
    \ give them write access.\n\nIf you knew your friend’s Repl.it username or the\
    \ email associated with the Repl.it account, you could instead use the Invite\
    \ box at the top. Share the link with your friend and wait for them to join.\n\
    \nAs soon as they do, you will see that a chat box pops up in the bottom right\
    \ corner. Their profile picture or letter will be at the top of the chat box,\
    \ so you can always know who is currently active.\n\nRemember, you forked the\
    \ repl in a previous step, so you are the owner of this fork and the “host” of\
    \ this multiplayer session. If you invite multiple people and then leave, they\
    \ can continue collaborating without you, but they won’t be able to rejoin if\
    \ the host is no longer in the session.\n\nYou can use the team chat feature,\
    \ as shown below.\n\nIn the previous tutorial, we looked at GDP by country. Imagine\
    \ that you are now interested in how this is broken down by continent too. You\
    \ still want to plot each country as a separate data point, but you want them\
    \ in different colours, one for each continent. You’re not sure how to do this,\
    \ so you ask for help.\n\nYou can see a typing indicator to help decide if you\
    \ should wait around for a reply or go make coffee.\n\nYour friend tells you about\
    \ the hue argument and points out that you already have this data in the continent\
    \ column in your data frame. You add `hue=\"continent\"` to the graph and re-run\
    \ it, but it doesn't quite work out how you expect.\n\nYour friend suggests maybe\
    \ a scatter plot without the correlation line might look better, but when you\
    \ try that it results in an error. The error message is hidden by the chat box,\
    \ so you move it to the other side of the screen.\n\nThis is getting a bit more\
    \ complicated than you bargained for. Sometimes showing is easier than telling,\
    \ so your friend starts editing the code directly instead of telling you how to\
    \ do so using chat. The code\n\n```\nsns.scatterplot(\n    \"gdpPercap\", \"lifeExp\"\
    , df, hue=\"continent\"\n).set_axis_labels(\"GDP per capita\", \"Life expectancy\"\
    )\n```\n\nchanges to\n\n```\nax = sns.scatterplot(\n    \"gdpPercap\", \"lifeExp\"\
    , df, hue=\"continent\"\n)\nax.set(xlabel=\"GDP per capita\", ylabel=\"Life expectancy\"\
    )\n```\n\nIn our new plot, we can see that African countries tend to have low\
    \ life expectancy and low GDP, but the correlation looks weaker for the other\
    \ continents.\n\n## Make it your own\n\nIf you followed along, you'll already\
    \ have your own version of the repl to extend. If not, start from ours. Fork it\
    \ from https://repl.it/@GarethDwyer1/cwr-05-multiplayer.\n\n## Where next?\n\n\
    Getting help on a single file in a program is only one use for multiplayer, but\
    \ there are many scenarios where it can be useful to see your teammates’ changes\
    \ in real time. For example, if you’re a back-end developer you could work closely\
    \ with a front-end developer, ironing out any issues with data communication between\
    \ the back- and front-end in real time, instead of waiting for multiple iterations\
    \ of several days.\n\nThat brings us to the end of part 1 of this series and you\
    \ should now be familiar with all of the basic features of Repl.it.\n\nIn part\
    \ 2, we’ll cover more advanced features, such as running projects from GitHub,\
    \ storing secrets securely, and productivity hacks.\n\n## Repl.it and GitHub:\
    \ Using and contributing to open-source projects\n\nYou've probably heard of [GitHub](https://github.com),\
    \ which hosts millions of coding projects that you can use or learn from.\n\n\
    In this tutorial, we'll see how to:\n\n- Import open-source projects from GitHub\
    \ to Repl.it so that we can run them or modify them\n- Integrate your own GitHub\
    \ account with your Repl.it account so that you can work on your private projects\n\
    - Push changes back to open-source projects as pull requests.\n\nWe'll use a basic\
    \ Flask hello world app for the demonstrations. You can use this same project\
    \ to follow along, or pick any other project on GitHub that interests you.\n\n\
    ### Importing a project from GitHub and running it on Repl.it\n\nWe'll use the\
    \ [Flask](https://flask.palletsprojects.com/en/1.1.x/) application available at\
    \ [https://github.com/ritza-co/flask-hello-world](https://github.com/ritza-co/flask-hello-world)\
    \ for demonstration purposes. To import it into Repl.it, press the + new repl\
    \ button, switch to the “Import From GitHub” tab, and paste in the GitHub URL,\
    \ as shown below."
  mdcn: "## 打造专属版本\n\n如果你跟着教程操作，现在应该已经有了一个可以自行扩展的 repl 版本。如果没有，可以从我们的版本开始。请 Fork 它\
    \ [https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting37](https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting37)。\n\
    \n## 接下来学习什么？\n\n你已经学会了如何使用 Python 和 Repl.it 制作一些基础图表。互联网上有数百万免费的数据集，正等待人们去探索。你可以通过\
    \ [Google 的数据集搜索](https://datasetsearch.research.google/) 服务找到许多这类数据集。选择一个你感兴趣的主题，并尝试通过数据可视化更深入地了解它。\n\
    \n接下来，我们将更详细地探讨 Repl.it 的多人协作功能，让你能够与朋友或同事协同编码。\n\n## 多人协作：使用 Repl.it 进行结对编程\n\
    \n软件开发者常给人以“独行侠”的印象，但他们并非总是独自编码。许多程序员会使用 [结对编程](https://en.wikipedia.org/wiki/Pair_programming)：\n\
    -   更高效地编写无错误的代码（例如，一人负责编码，另一人负责检查错误）。\n-   共享知识（经验较少的程序员可以“跟随”经验更丰富的开发者进行开发，从每一步过程中学习）。\n\
    -   评估专业能力（如果你在考虑聘用新人，先观看他们编码有助于评估其编码水平，而与他们一起编码则能同时考察他们的团队协作和沟通经验）。\n\n结对编程直觉上听起来可能效率低下：毕竟，两位开发者本可以同时处理不同的项目。但除了能发现更多错误外，两人协作也常常能展现出更多创意。你可能会从同伴的言论中获得启发，而这是你独自思考时难以想到的。\n\
    \n如果你有朋友在身边，可以一起完成本教程，获得真实的结对编程体验。如果你独自一人，可以打开两个浏览器（或使用隐身模式）同时登录两个 Repl.it 账户。\n\
    \n## 使用结对编程扩展我们的数据科学文章：寻求帮助\n\n假设你是一名开发者，偶然发现了[之前关于绘图和制图的教程](http://www.codewithrepl.it/04-data-science-and-visualisation-with-repl-it.html)。你想对展示的图表稍作调整，但由于你不太熟悉\
    \ Python，于是决定向朋友求助。\n\n在这个场景中，你是“@Lean3iljoen94”，向其求助的朋友是“@GarethDwyer1”。\n\n\
    首先，Fork [这个数据科学 repl](https://repl.it/@GarethDwyer1/04-data-science-and-visualisation-with-replit)\
    \ 并确保你能运行它。\n\n现在，从你 Fork 的版本中，按下分享按钮，如下所示。\n\n复制邀请链接，请注意这与你 repl 的普通链接不同。如果你从地址栏复制链接，人们只能获得你\
    \ repl 的只读权限，但复制邀请链接则可以授予他们写入权限。\n\n如果你知道朋友的 Repl.it 用户名或其关联邮箱，也可以使用顶部的邀请框。将链接分享给你的朋友，并等待他们加入。\n\
    \n一旦他们加入，你会看到右下角弹出一个聊天框。他们的头像或首字母会显示在聊天框顶部，这样你就能随时知道谁正在线上。\n\n请记住，你在之前的步骤中 Fork\
    \ 了 repl，因此你是这个 Fork 版本的所有者，也是本次多人协作的“主持人”。如果你邀请了多人然后离开，他们可以在没有你的情况下继续协作，但如果主持人不再在会话中，他们将无法重新加入。\n\
    \n你可以使用团队聊天功能，如下所示。\n\n在之前的教程中，我们研究了按国家划分的 GDP。想象一下，你现在也对它按大洲的细分感兴趣。你仍然想将每个国家作为独立的数据点绘制出来，但希望它们用不同颜色区分，每个大洲一种颜色。你不确定如何实现，于是寻求帮助。\n\
    \n你可以看到一个正在输入的提示，这有助于你决定是等待回复还是去泡杯咖啡。\n\n你的朋友向你介绍了 `hue` 参数，并指出你的数据框中已经有一个“大洲”列包含了这些数据。你将\
    \ `hue=\"continent\"` 添加到图表中并重新运行，但结果并不完全符合预期。\n\n你的朋友建议，不加相关线的散点图可能看起来更好，但当你尝试时却出现了错误。错误信息被聊天框挡住了，于是你将它移到了屏幕的另一边。\n\
    \n这比你预期的要复杂一点。有时，演示比描述更容易，因此你的朋友开始直接编辑代码，而不是在聊天中告诉你如何做。代码\n\n```\nsns.scatterplot(\n\
    \    \"gdpPercap\", \"lifeExp\", df, hue=\"continent\"\n).set_axis_labels(\"GDP\
    \ per capita\", \"Life expectancy\")\n```\n\n变成了\n\n```\nax = sns.scatterplot(\n\
    \    \"gdpPercap\", \"lifeExp\", df, hue=\"continent\"\n)\nax.set(xlabel=\"GDP\
    \ per capita\", ylabel=\"Life expectancy\")\n```\n\n在我们的新图表中，我们可以看到非洲国家往往具有较低的预期寿命和较低的\
    \ GDP，但其他大洲之间的相关性看起来较弱。\n\n## 打造专属版本\n\n如果你跟着操作，现在应该已经有了一个可以自行扩展的 repl 版本。如果没有，可以从我们的版本开始。请从\
    \ https://repl.it/@GarethDwyer1/cwr-05-multiplayer Fork 它。\n\n## 接下来学习什么？\n\n\
    在程序中为单个文件获取帮助只是多人协作的一个用途，但在许多场景下，能够实时查看队友的更改非常有用。例如，如果你是后端开发者，你可以与前端开发者紧密合作，实时解决前后端数据通信的问题，而不用等待数天的多次迭代。\n\
    \n至此，我们结束了本系列的第 1 部分，现在你应该已经熟悉了 Repl.it 的所有基本功能。\n\n在第 2 部分，我们将介绍更高级的功能，例如从 GitHub\
    \ 运行项目、安全地存储机密信息以及提高生产力的技巧。\n\n## Repl.it 与 GitHub：使用和参与开源项目\n\n你可能听说过 [GitHub](https://github.com)，它托管了数百万个编码项目，你可以使用或从中学习。\n\
    \n在本教程中，我们将了解如何：\n-   将 GitHub 上的开源项目导入 Repl.it，以便运行或修改它们\n-   将你自己的 GitHub 账户与\
    \ Repl.it 账户集成，以便处理你的私有项目\n-   将更改作为 Pull Request（拉取请求）推送回开源项目。\n\n我们将使用一个基础的\
    \ Flask Hello World 应用进行演示。你可以使用这个相同的项目跟着操作，或者选择 GitHub 上任何其他你感兴趣的项目。\n\n### 从\
    \ GitHub 导入项目并在 Repl.it 上运行\n\n我们将使用 [https://github.com/ritza-co/flask-hello-world](https://github.com/ritza-co/flask-hello-world)\
    \ 上提供的 [Flask](https://flask.palletsprojects.com/en/1.1.x/) 应用作为演示。要将其导入 Repl.it，请按\
    \ + 新建 repl 按钮，切换到“Import From GitHub”（从 GitHub 导入）选项卡，然后粘贴 GitHub URL，如下所示。"
