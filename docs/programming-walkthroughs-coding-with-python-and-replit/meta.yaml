    </html>\n```\n\n上面是我们的Django应用在渲染页面时将使用的一个基本HTML模板。我们还链接了一个样式表，Django将从一个名为 `static/css`\
    \ 的文件夹中获取它，我们很快将创建这个文件夹。注意第一行的 `{% load static %}`，这是为了告诉Django我们正在此模板中使用静态文件，即style.css。\n\
