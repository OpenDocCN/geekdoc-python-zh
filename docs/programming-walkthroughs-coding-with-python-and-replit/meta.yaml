  md: '# # Data science with Repl.it: Plots and graphs


    So far, all the programs we have looked at have been entirely **text based**.
    They have taken text input and produced text output, on the console or saved to
    files.


    While text is flexible and powerful, sometimes a picture is worth a thousand words.
    Especially when analysing data, you''ll often want to produce plots and graphs.
    There are three main ways of achieving this using Repl.it.


    +   1. Creating a front-end only project and using only JavaScript, HTML and CSS.

    2. Creating a full web application with something like Flask²⁸, analysing the
    data in Python and passing the results to a front end to be visualised.

    3. Using Python code only, creating windows using X²⁹ and rendering the plots
    in there.


    Option 1 is great if you''re OK with your users having access to all of your data,
    you like doing data manipulation in JavaScript, and your data set is small enough
    to load into a web browser. Option 2 is often the most powerful, but can be overkill
    if you just want a few basic plots.


    Here, we''ll demonstrate how to do option 3, using Python and Matplotlib³⁰.


    # ## Installing Matplotlib and creating a basic line plot


    Matplotlib is a third-party library for doing all kinds of plots and graphs in
    Python. We can install it by using Repl.it''s "magic import" functionality. Matplotlib
    is a large and powerful library with a lot of functionality, but we only need
    `pyplot` for now: the module for plotting.


    Create a new Python repl and add the following code.


    ```

    python

    from matplotlib import pyplot as plt


    plt.plot([1,2,3,4,5,6], [6,3,6,1,2,3])

    plt.show()

    ```'
