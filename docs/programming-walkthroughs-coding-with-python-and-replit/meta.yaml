  md: "![](img/48efb5586f6da072fc1456bee6971293_259_0.png)\n\nCreating a new repl\n\
    \nThe first piece we need to build is a function to encode any text message as\
    \ a binary string.\n\n# Encoding a text message as a binary string\n\nOpen the\
    \ `main.py` file and add the following code\n\n```\npython\nimport base64\n\n\
    def encode_message_as_bytestring(message):\n    b64 = message.encode(\"utf8\"\
    )\n    bytes_ = base64.encodebytes(b64)\n    bytestring = \"\".join([\"{:08b}\"\
    .format(x) for x in bytes_])\n    return bytestring\n```\n\nThis first encodes\
    \ our text as base64[^203] and then as a binary string. You can add some print\
    \ statements to see how the message is transformed in the different steps, as\
    \ shown below.\n\n[^203]: https://en.wikipedia.org/wiki/Base64"
