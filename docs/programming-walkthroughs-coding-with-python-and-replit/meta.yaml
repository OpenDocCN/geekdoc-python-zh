- md: "Take a look specifically at the highlighted location information that we’ll\
    \ need to extract to pass on to a weather service.\n\nBefore we set up the weather\
    \ component, let’s display the user’s current location data instead of the hardcoded\
    \ temperature that we had before. Change the `get_weather_from_ip()` function\
    \ to call our new function and pass along some useful data as follows:\n\n```python\n\
    def get_weather_from_ip(request):\n    ip_address = request.GET.get(\"ip\")\n\
    \    location = get_location_from_ip(ip_address)\n    city = location.get(\"city\"\
    )\n    country_code = location.get(\"countryCode\")\n    s = \"You're in {}, {}\"\
    .format(city, country_code)\n    data = {\"weather_data\": s}\n    return JsonResponse(data)\n\
    ```\n\nNow, instead of just printing the IP address that we get sent and making\
    \ up some weather data, we use the IP address to guess the user’s location, and\
    \ pass the city and country code back to the template to be displayed. If you\
    \ reload your app again, you should see something similar to the following (though\
    \ hopefully with your location instead of mine).\n\nweather app, location showing\n\
    \nThat’s the location component of our app done and dusted – let’s move on to\
    \ getting weather data for that location now.\n\n## Getting weather data from\
    \ OpenWeatherMap\n\nTo get weather data automatically from OpenWeatherMap¹⁶⁷,\
    \ you’ll need an API Key. This is a unique string that OpenWeatherMap gives to\
    \ each user of their service and it’s used mainly to restrict how many calls each\
    \ person can make in a specified period. Luckily, OpenWeatherMap provides a generous\
    \ “free” allowance of calls, so we won’t need to spend any money to build our\
    \ app. Unfortunately, this allowance is not quite generous enough to allow me\
    \ to share my key with every reader of this tutorial, so you’ll need to sign up\
    \ for your own account and generate your own key.\n\nVisit openweathermap.org¹⁶⁸,\
    \ hit the “sign up” button, and register for the service by giving them an email\
    \ address and choosing a password. Then navigate to the API Keys¹⁶⁹ section and\
    \ note down your unique API key (or copy it to your clipboard).\n\nThis key is\
    \ a bit like a password – when we use OpenWeatherMap’s service, we’ll always send\
    \ along this key to indicate that it’s us making the call. Because Repl.it’s projects\
    \ are public by default, we’ll need to be careful to keep this key private and\
    \ prevent other people making too many calls using our OpenWeatherMap quota (potentially\
    \ making our app fail when OpenWeatherMap starts blocking our calls). Luckily\
    \ Repl.it provides a neat way of solving this problem using .env files¹⁷⁰.\n\n\
    In your project, create a new file using the “New file” button as shown below.\
    \ Make sure that the file is in the root of your project and that you name the\
    \ file .env (in Linux, starting a filename with a . usually indicates that it’s\
    \ a system or configuration file). Inside this file, define the OPEN_WEATHER_TOKEN\
    \ variable as follows, but using your own token instead of the fake one below.\
    \ Make sure not to have a space on either side of the = sign.\n\n```\nOPEN_WEATHER_TOKEN=1be9250b94bf6803234b56a87e55f\n\
    ```\n\n## Creating a new file\n\nRepl.it will load the contents of this file into\
    \ our server’s environment variables. We’ll be able to access this using the os\
    \ library in Python, but when other people view or fork our Repl, they won’t see\
    \ the .env file, keeping our API key safe and private.\n\nTo fetch weather data,\
    \ we need to call the OpenWeatherMap api, passing along a search term. To make\
    \ sure we’re getting the city that we want, it’s good to pass along the country\
    \ code as well as the city name. For example, to get the weather in London right\
    \ now, we can visit (again, you’ll need to add your own API key in place of the\
    \ string after appid=) https://api.openweathermap.org/data/2.5/weather?q=London\n\
    \nTo test this, you can visit the URL in your browser first. If you prefer Fahrenheit\
    \ to Celsius, simply change the unit=metric part of the url to units=imperial.\n\
    \n## Json response from OpenWeatherMap\n\nLet’s write one last function in our\
    \ views.py file to replicate this call for our visitor’s city which we previously\
    \ displayed.\n\nFirst we need to add an import for the Python os (operating system)\
    \ module so that we can access our environment variables. At the top of views.py\
    \ add:\n\n```python\nimport os\n```\n\nNow we can write the function. Add the\
    \ following to views.py:\n\n```python\ndef get_weather_from_location(city, country_code):\n\
    \    token = os.environ.get(\"OPEN_WEATHER_TOKEN\")\n    url = \"https://api.openweathermap.org/data/2.5/weather?q={},{}&units=metric&appid={}\"\
    .format(\n        city, country_code, token)\n    response = requests.get(url)\n\
    \    return response.json()\n```\n\nIn line 2, we get our API key from the environment\
    \ variables (note, you sometimes need to refresh the repl.it page with your repl\
    \ in to properly load in the environment variables), and we then use this to format\
    \ our URL properly in line 3. We get the response from OpenWeatherMap and return\
    \ it as json.\n\nWe can now use this function in our get_weather_from_ip() function\
    \ by modifying it to look as follows:\n\n```python\ndef get_weather_from_ip(request):\n\
    \    ip_address = request.GET.get(\"ip\")\n    location = get_location_from_ip(ip_address)\n\
    \    city = location.get(\"city\")\n    country_code = location.get(\"countryCode\"\
    )\n    weather_data = get_weather_from_location(city, country_code)\n    description\
    \ = weather_data['weather'][0]['description']\n    temperature = weather_data['main']['temp']\n\
    \    s = \"You're in {}, {}. You can expect {} with a temperature of {} degrees\"\
    .format(\n        city, country_code, description, temperature)\n    data = {\"\
    weather_data\": s}\n    return JsonResponse(data)\n```\n\nWe now get the weather\
    \ data in line 6, parse this into a description and temperature in lines 7 and\
    \ 8, and add this to the string we pass back to our template in line 9. If you\
    \ reload the page, you should see your location and your weather.\n\nand hit the\
    \ “Fork” button. If you didn’t create an account at the beginning of this tutorial,\
    \ you’ll be prompted to create one. (You can even use a lot of Repl functionality\
    \ without creating an account.)\n\nIf you’re stuck for ideas, some possible extensions\
    \ are:\n\n-   Make the page look nicer by using [Bootstrap](https://getbootstrap.com/)\
    \ or another CSS framework in your template files.\n-   Make the app more customizable\
    \ by allowing the user to choose their own location if the IP location that we\
    \ guess is wrong\n-   Make the app more useful by showing the weather forecast\
    \ along with the current weather. (This data is [also available](https://openweathermap.org/forecast5)\
    \ from Open Weather Map).\n-   Add other location-related data to the web app\
    \ such as news, currency conversion, translation, postal codes. See [https://github.com/toddmotto/public-apis#geocoding](https://github.com/toddmotto/public-apis#geocoding)\
    \ for a nice list of possibilities.\n\nIn the next chapter, we’ll be looking at\
    \ building our own CRM app with NodeJS and Repl.it. This tutorial will also introduce\
    \ you to setting up a MongoDB database and creating a user interface.\n\n## Building\
    \ a CRM app with NodeJS, Repl.it, and MongoDB\n\nIn this tutorial, we’ll use NodeJS\
    \ on Repl.it, along with a MongoDB database to build a basic CRUD¹⁷⁵ (Create,\
    \ Read, Update, Delete) CRM¹⁷⁶ (Customer Relationship Management) application.\
    \ A CRM lets you store information about customers to help you track the status\
    \ of every customer relationship. This can help businesses keep track of their\
    \ clients and ultimately increase sales. The application will be able to store\
    \ and edit customer details, as well as keep notes about them.\n\nThis tutorial\
    \ won’t be covering the basics of Node.js, but each line of code will be explained\
    \ in detail.\n\n## Overview and requirements\n\nAll of the code will be written\
    \ and hosted in Repl.it, so you won’t need to install any additional software\
    \ on your computer. In this tutorial, we’ll be covering:\n\n-   Creating an account\
    \ on MongoDB Atlas¹⁷⁷\n-   Connecting our database to our Repl\n-   Creating a\
    \ user interface to insert customer data\n-   Updating and deleting database entries\n\
    \nBy the end of the tutorial, the application you will have created will be able\
    \ to create, update, and delete documents in a MongoDB database. You will also\
    \ have used a web application framework called Express¹⁷⁸ and the Pug¹⁷⁹ templating\
    \ engine.\n\n## Creating an account on MongoDB Atlas\n\nMongoDB Atlas is a fully\
    \ managed Database-as-a-Service. It provides a document database (often referred\
    \ to as NoSQL), as opposed to a more traditional relational database like PostgreSQL.\n\
    \nHead over to MongoDB Atlas¹⁸⁰ and hit the “Try free” button. You should then\
    \ sign up, clicking the “Get started free” button to complete the process.\n\n\
    ¹⁷⁵ https://en.wikipedia.org/wiki/Create,_read,_update_and_delete\n¹⁷⁶ https://en.wikipedia.org/wiki/Customer_relationship_management\n\
    ¹⁷⁷ https://www.mongodb.com/cloud/atlas\n¹⁷⁸ https://expressjs.com/\n¹⁷⁹ https://pugjs.org/api/getting-started.html\n\
    ¹⁸⁰ https://www.mongodb.com/cloud/atlas"
  mdcn: "请特别关注我们将需要提取并传递给天气服务的高亮显示的位置信息。\n\n在设置天气组件之前，让我们先显示用户的当前位置数据，而不是之前写死的温度。请将\
    \ `get_weather_from_ip()` 函数修改为调用我们的新函数，并按如下方式传递一些有用数据：\n\n```python\ndef get_weather_from_ip(request):\n\
    \    ip_address = request.GET.get(\"ip\")\n    location = get_location_from_ip(ip_address)\n\
    \    city = location.get(\"city\")\n    country_code = location.get(\"countryCode\"\
    )\n    s = \"You're in {}, {}\".format(city, country_code)\n    data = {\"weather_data\"\
    : s}\n    return JsonResponse(data)\n```\n\n现在，我们不再只是打印收到的IP地址并编造一些天气数据，而是利用IP地址来推测用户的位置，并将城市和国家代码返回给模板进行显示。如果你再次重新加载你的应用，应该会看到类似于以下内容的结果（尽管希望显示的是你的位置而不是我的）。\n\
    \n天气应用，显示位置信息\n\n至此，我们应用的位置部分就彻底完成了——现在让我们继续为该位置获取天气数据。\n\n## 从OpenWeatherMap获取天气数据\n\
    \n要从OpenWeatherMap¹⁶⁷自动获取天气数据，你需要一个API密钥。这是OpenWeatherMap分配给其服务每位用户的唯一字符串，主要用于限制每人可在指定时间内进行的调用次数。幸运的是，OpenWeatherMap提供了慷慨的“免费”调用额度，因此我们无需花费任何资金来构建应用。不幸的是，这个额度还不够慷慨，不足以让我将我的密钥分享给本教程的每位读者，因此你需要注册自己的账户并生成你自己的密钥。\n\
    \n访问 openweathermap.org¹⁶⁸，点击“sign up”按钮，通过提供电子邮件地址并选择密码来注册服务。然后导航到API密钥¹⁶⁹部分，记下你唯一的API密钥（或将其复制到剪贴板）。\n\
    \n这个密钥有点像密码——当我们使用OpenWeatherMap的服务时，我们总会发送这个密钥来表明是我们发起的调用。由于Repl.it的项目默认是公开的，我们需要小心保护这个密钥的私密性，防止他人使用我们的OpenWeatherMap配额进行过多调用（这可能导致OpenWeatherMap开始阻止我们的调用，从而使我们的应用失效）。幸运的是，Repl.it提供了一种简洁的方法，使用\
    \ .env 文件¹⁷⁰来解决这个问题。\n\n在你的项目中，使用如下所示的“New file”按钮创建一个新文件。确保该文件位于项目根目录下，并将文件命名为\
    \ .env（在Linux中，以 . 开头的文件名通常表示它是系统或配置文件）。在此文件中，按如下方式定义 OPEN_WEATHER_TOKEN 变量，但请使用你自己的令牌而非下面的示例令牌。确保等号两边没有空格。\n\
    \n```\nOPEN_WEATHER_TOKEN=1be9250b94bf6803234b56a87e55f\n```\n\n## 创建新文件\n\nRepl.it会将此文件的内容加载到我们服务器的环境变量中。我们将能够使用Python的os库来访问它，但当其他人查看或fork我们的Repl时，他们将看不到\
    \ .env 文件，从而保证了我们API密钥的安全和私密。\n\n要获取天气数据，我们需要调用OpenWeatherMap的API，并传递一个搜索词。为了确保我们得到想要的城市，最好同时传递国家代码和城市名称。例如，要获取伦敦当前的天气，我们可以访问（同样，你需要在appid=后面替换为你自己的API密钥）https://api.openweathermap.org/data/2.5/weather?q=London\n\
    \n为了测试，你可以在浏览器中先访问该URL。如果你更喜欢华氏度而非摄氏度，只需将URL中的 unit=metric 部分改为 units=imperial。\n\
    \n## 来自OpenWeatherMap的JSON响应\n\n让我们在 views.py 文件中编写最后一个函数，以对我们之前显示的访客所在城市进行同样的调用。\n\
    \n首先，我们需要导入Python的 os（操作系统）模块，以便访问环境变量。在 views.py 的顶部添加：\n\n```python\nimport\
    \ os\n```\n\n现在我们可以编写这个函数了。将以下代码添加到 views.py 中：\n\n```python\ndef get_weather_from_location(city,\
    \ country_code):\n    token = os.environ.get(\"OPEN_WEATHER_TOKEN\")\n    url\
    \ = \"https://api.openweathermap.org/data/2.5/weather?q={},{}&units=metric&appid={}\"\
    .format(\n        city, country_code, token)\n    response = requests.get(url)\n\
    \    return response.json()\n```\n\n在第2行，我们从环境变量中获取API密钥（注意，有时你需要刷新包含你的repl的Repl.it页面，以正确加载环境变量），然后我们在第3行用它来正确格式化我们的URL。我们从OpenWeatherMap获取响应并将其作为json返回。\n\
    \n现在我们可以在 get_weather_from_ip() 函数中使用这个函数，将其修改如下：\n\n```python\ndef get_weather_from_ip(request):\n\
    \    ip_address = request.GET.get(\"ip\")\n    location = get_location_from_ip(ip_address)\n\
    \    city = location.get(\"city\")\n    country_code = location.get(\"countryCode\"\
    )\n    weather_data = get_weather_from_location(city, country_code)\n    description\
    \ = weather_data['weather'][0]['description']\n    temperature = weather_data['main']['temp']\n\
    \    s = \"You're in {}, {}. You can expect {} with a temperature of {} degrees\"\
    .format(\n        city, country_code, description, temperature)\n    data = {\"\
    weather_data\": s}\n    return JsonResponse(data)\n```\n\n我们现在在第6行获取天气数据，在第7和8行将其解析为描述和温度，并在第9行将其添加到我们返回给模板的字符串中。如果你重新加载页面，应该会看到你的位置和天气。\n\
    \n并点击“Fork”按钮。如果你在本教程开始时没有创建账户，系统会提示你创建一个。（实际上，你甚至无需创建账户也能使用很多Repl.it的功能。）\n\n\
    如果你缺少灵感，一些可能的扩展方向包括：\n\n-   通过在模板文件中使用 [Bootstrap](https://getbootstrap.com/)\
    \ 或其他CSS框架，使页面看起来更美观。\n-   允许用户在我们推测的IP位置错误时自行选择位置，使应用更具可定制性。\n-   通过显示天气预报以及当前天气，使应用更加实用。（此数据也可从Open\
    \ Weather Map [获取](https://openweathermap.org/forecast5)）。\n-   向Web应用添加其他与位置相关的数据，例如新闻、货币兑换、翻译、邮政编码。参见\
    \ [https://github.com/toddmotto/public-apis#geocoding](https://github.com/toddmotto/public-apis#geocoding)\
    \ 获取一份很好的可能性列表。\n\n在下一章中，我们将探讨如何使用NodeJS和Repl.it构建我们自己的CRM应用。本教程还将向你介绍如何设置MongoDB数据库和创建用户界面。\n\
    \n## 使用NodeJS、Repl.it和MongoDB构建CRM应用\n\n在本教程中，我们将使用Repl.it上的NodeJS以及MongoDB数据库来构建一个基本的CRUD¹⁷⁵（创建、读取、更新、删除）CRM¹⁷⁶（客户关系管理）应用程序。CRM允许你存储客户信息，以帮助你跟踪每个客户关系的状态。这可以帮助企业跟踪客户并最终增加销售额。该应用程序将能够存储和编辑客户详细信息，并保存关于他们的笔记。\n\
    \n本教程不会涵盖Node.js的基础知识，但每一行代码都会被详细解释。\n\n## 概述和要求\n\n所有代码都将在Repl.it中编写和托管，因此你无需在计算机上安装任何额外的软件。在本教程中，我们将涵盖：\n\
    \n-   在MongoDB Atlas¹⁷⁷上创建账户\n-   将数据库连接到我们的Repl\n-   创建一个用于插入客户数据的用户界面\n-   更新和删除数据库条目\n\
    \n在本教程结束时，你所创建的应用程序将能够在MongoDB数据库中创建、更新和删除文档。你还将使用名为Express¹⁷⁸的Web应用框架和Pug¹⁷⁹模板引擎。\n\
    \n## 在MongoDB Atlas上创建账户\n\nMongoDB Atlas是一个完全托管的数据库即服务（Database-as-a-Service）。它提供了一个文档数据库（通常称为NoSQL），而不是像PostgreSQL那样的传统关系型数据库。\n\
    \n前往MongoDB Atlas¹⁸⁰并点击“Try free”按钮。然后你应该注册，点击“Get started free”按钮完成流程。\n\n¹⁷⁵\
    \ https://en.wikipedia.org/wiki/Create,_read,_update_and_delete\n¹⁷⁶ https://en.wikipedia.org/wiki/Customer_relationship_management\n\
    ¹⁷⁷ https://www.mongodb.com/cloud/atlas\n¹⁷⁸ https://expressjs.com/\n¹⁷⁹ https://pugjs.org/api/getting-started.html\n\
    ¹⁸⁰ https://www.mongodb.com/cloud/atlas"
