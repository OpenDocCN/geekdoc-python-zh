    \ greeting).\n\nYou can fork our repl from https://repl.it/@GarethDwyer1/cwr-06-github⁴⁸\n\
    \n## Where next?\n\nCloning repositories and being able to immediately run them\
    \ is useful in many scenarios, from just wanting to try out a cool project that\
    \ you found to running production workflows.\n\nOpen-source software only exists\
    \ because of people who build, maintain, and improve it. There’s no global committee\
    \ that decides who gets to be an open-source software developer and you can be\
    \ one too. Find a project that you like, look at the “Issues” tab on GitHub to\
    \ see what problems exist, and try to fix one. Many issues on GitHub are tagged\
    \ with “Good first issue” to help direct newer developers to places where they\
    \ can get started.\n\nIn the next tutorial, we’ll do something a bit different\
    \ and build a 2D game using PyGame.\n\n## Building a game with PyGame and Repl.it\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_70_0.png)\n\nSo far, we’ve mainly seen\
    \ how to write text-based programs, or those with a basic web front end. In this\
    \ tutorial, we’ll instead build a 2D game using PyGame. You’ll use animated sprites\
    \ and learn how to:\n\n- Make these sprites move\n- Recognise when a sprite is\
    \ clicked with the mouse.\n\nThe basic premise of the game is as follows. You’re\
    \ a juggler, learning to juggle. Balls will fall down from the top of the screen,\
    \ and you’ll need to click them to ‘throw’ them up again. After several successful\
    \ throws without dropping any balls, more balls will be added to make the game\
    \ harder.\n\n## Creating a PyGame repl\n\nAlthough [PyGame](https://en.wikipedia.org/wiki/Pygame)\
    \ is a standard Python library, Repl.it provides it installed as a separate language.\
    \ Create a new repl and select PyGame from the language dropdown.\n\n[49] https://en.wikipedia.org/wiki/Pygame\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_71_0.png)\n\n**Image 2: *Choosing PyGame\
    \ from the Create New Repl screen.***\n\nYou’ll see “Python3 with PyGame” displayed\
    \ in the default console and a separate pane in the Repl.it IDE where you will\
    \ be able to see and interact with the game you will create.\n\nThe first thing\
    \ we need is a so-called “sprite”, which is a basic image file that we will use\
    \ in our game. Download the tennis ball file available [here](https://raw.githubusercontent.com/ritza-co/public-images/master/small_tennis.png)\
    \ and save it to your local machine.\n\nNow upload it to your repl using the `upload\
    \ file` button and you should be able to see a preview of the image by clicking\
    \ on it in the files pane.\n\n[^50]: https://raw.githubusercontent.com/ritza-co/public-images/master/small_tennis.png\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_72_0.png)\n\n## Displaying the sprite\
    \ using PyGame\n\nOur first goal is to display the tennis ball in a game environment\
    \ using PyGame. To do this, go back to the `main.py` file and add the following\
    \ code.\n\n```python\nimport pygame\n\nWIDTH = 800\nHEIGHT = 600\nBACKGROUND =\
    \ (0, 0, 0)\n\nclass Ball:\n    def __init__(self):\n        self.image = pygame.image.load(\"\
    small_tennis.png\")\n        self.rect = self.image.get_rect()\n\ndef main():\n\
    \    pygame.init()\n    screen = pygame.display.set_mode((WIDTH, HEIGHT))\n  \
    \  clock = pygame.time.Clock()\n    ball = Ball()\n```"
