- md: "This is a file written in Django’s template language, which often looks very\
    \ much like HTML (and is usually found in files with a .html extension), but which\
    \ contains some extra functionality to help us load dynamic data from the back\
    \ end of our web application into the front end for our users to see.\n\nThe above\
    \ extends the base.html template and adds the block content to it, in this case\
    \ “Hello World!”.\n\nDjango looks for template folders within “app” folders by\
    \ default. This is helpful when you have multiple apps within your project but\
    \ in this case we don’t so we need to tell Django where to find our templates\
    \ folder.\n\nOpen the mysite/settings.py file, scroll down to TEMPLATES and add\
    \ os.path.join(BASE_DIR, 'templates') within the square brackets next to DIRS:\
    \ like below\n\n```\n'DIRS': [os.path.join(BASE_DIR, 'templates')],\n```\n\nNow\
    \ that we have our templates added, let's add the folders and files for adding\
    \ the stylesheet.\nCreate a folder called `static` and also create a folder called\
    \ `css` within the `static` folder.\nCreate a file called `style.css` within the\
    \ `static/css/` directory and add the following code.\n\n```\nbody {\n  background-color:\
    \ lightblue;\n}\n\nh1 {\n  color: navy;\n  margin-left: 20px;\n}\n```\n\nAbove\
    \ we add basic CSS code to demonstrate how you can modify the look of your site.\n\
    \nDjango handles static files similar to templates where it automatically checks\
    \ app directories for a directory called static. Since we only have a static page\
    \ instead of apps we need to tell Django where our static directory is located.\n\
    \nOpen the mysite/settings.py file, scroll all the way down and add the following\
    \ code right after STATIC_URL ='/static/'\n\n```\nSTATICFILES_DIRS = (os.path.join(BASE_DIR,\
    \ 'static'),)\n```\n\nWithin the mysite/ directory, create a file called views.py\
    \ and add the following code.\n\n```\nfrom django.shortcuts import render\n\n\
    # Create your views here.\ndef home(request):\n    return render(request, 'index.html')\n\
    ```\n\nA view function in Django is a Python function that takes Web requests\
    \ and returns a Web response. This is where you add the logic that will return\
    \ a certain response when called. In our case we define a view that will return\
    \ the index.html page.\n\nTo call this view function we need to add it to our\
    \ url patterns. Open the `mysite/urls.py` file and replace the contents with the\
    \ below code.\n\n```\nfrom django.contrib import admin\nfrom django.urls import\
    \ path\nfrom . import views\n\nurlpatterns = [\n    path('', views.home, name='home'),\n\
    \    path('admin/', admin.site.urls),\n]\n```\n\nNote that we import the views\
    \ file created earlier `from . import views`. Then we add the url pattern with\
    \ an empty path '' and point it to the `home` view created earlier. The `admin/`\
    \ path points to the admin page that comes as a default with Django.\n\nWhen Django\
    \ receives a request it goes through the `urlpatterns` list until it finds a match.\
    \ In our case `<url>.com` will match the first path and return the `home` view\
    \ that will render the `index.html` page. If we navigate to`<url>.com/admin/`,\
    \ Django will match the pattern of the `admin/` path and return the admin page.\n\
    \nRestart your server and refresh the web page on the right. You should see our\
    \ “Hello World!” page.\n\nGreat, we have now put all the pieces in place for our\
    \ “Hello World!” web page. Let’s expand this and start building our weather app.\n\
    \nOpen the templates/index.html file and change the code where it says “Hello\
    \ World!” to read “Weather” like below.\n\n```\n{% extends \"base.html\" %}\n\n\
    {% block content %}\n  <h1>Weather</h1>\n{% endblock content %}\n```\n\nClick\
    \ the refresh button as indicated below to see the result change from “Hello World!”\
    \ to “Weather”.\n\nYou can also press the pop-out button to the right of the the\
    \ URL bar to open only the resulting web page that we’re building, as a visitor\
    \ would see it. You can share the URL with anyone and they’ll be able to see your\
    \ Weather website already!\n\nChanging the static text that our visitors see is\
    \ a good start, but our web application still doesn’t do anything. We’ll change\
    \ that in the next step by using JavaScript to get our user’s IP Address.\n\n\
    ## Calling IPIFY from JavaScript\n\nAn IP address is like a phone number. When\
    \ you visit “google.com”, your computer actually looks up the the name google.com\
    \ to get a resulting IP address that is linked to one of Google’s servers. While\
    \ people find it easier to remember names like “google.com”, computers work better\
    \ with numbers. Instead of typing “google.com” into your browser toolbar, you\
    \ could type the IP address 216.58.223.46, with the same results. Every device\
    \ connecting to the internet, whether to serve content (like google.com) or to\
    \ consume it (like you, reading this tutorial) has an IP address.\n\nIP addresses\
    \ are interesting to us because it is possible to guess a user’s location based\
    \ on their IP address. (In reality, this is an imprecise and highly complicated\
    \ process, but for our purposes it will be more than adequate). We will use the\
    \ web service ipify.org to retrieve our visitors’ IP addresses.\n\nIn the Repl.it\
    \ files tab, navigate to templates/base.html, which should look as follows.\n\n\
    ```\n{% load static %}\n<!DOCTYPE html>\n\n<html lang=\"en\">\n<head>\n    <meta\
    \ charset=\"UTF-8\">\n    <title>Hello World!</title>\n    <meta charset=\"UTF-8\"\
    />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"\
    />\n    <link rel=\"stylesheet\" href=\"{% static \"css/style.css\" %}\">\n</head>\n\
    <body>\n    {% block content %}{% endblock content %}\n</body>\n</html>\n```\n\
    \nThe “head” section of this template is between lines 5 and 11 – the opening\
    \ and closing <head> tags. We’ll add our scripts directly below the <link ...>\
    \ on line 10 and above the closing </head> tag on line 11. Modify this part of\
    \ code to add the following lines:\n\n```\n<script>\n  function use_ip(json) {\n\
    \    alert(\"Your IP address is: \" + json.ip);\n  }\n</script>\n```\n\n```\n\
    <script src=\"https://api.ipify.org?format=jsonp&callback=use_ip\"></script>\n\
    ```\n\nThese are two snippets of JavaScript. The first (lines 1-5) is a function\
    \ that when called will display a pop-up box (an “alert”) in our visitor’s browser\
    \ showing their IP address from the json object that we pass in. The second (line\
    \ 7) loads an external script from ipify’s API and asks it to pass data (including\
    \ our visitor’s IP address) along to the use_ip function that we provide.\n\n\
    If you open your web app again and refresh the page, you should see this script\
    \ in action (if you’re running an adblocker, it might block the ipify scripts,\
    \ so try disabling that temporarily if you have any issues).\n\nThis code doesn’t\
    \ do anything with the IP address except display it to the user, but it is enough\
    \ to see that the first component of our system (getting our user’s IP Address)\
    \ is working. This also introduces the first dynamic functionality to our app\
    \ – before, any visitor would see exactly the same thing, but now we can show\
    \ each visitor something related specifically to them (no two people have the\
    \ same IP address).\n\nNow instead of simply showing this IP address to our visitor,\
    \ we’ll modify the code to rather pass it along to our Repl webserver (the “backend”\
    \ of our application), so that we can use it to fetch location information through\
    \ a different service."
  mdcn: "这是一个用Django模板语言编写的文件，它看起来通常与HTML非常相似（通常以 .html 扩展名的文件形式出现），但包含一些额外的功能，帮助我们将后端数据动态加载到前端供用户查看。\n\
    \n上述代码扩展了 base.html 模板，并为其添加了 `block content`，这里的内容是 \"Hello World!\"。\n\n默认情况下，Django会在“应用（app）”文件夹内查找模板文件夹。当你的项目中有多个应用时这很有帮助，但在本例中我们没有多个应用，因此需要告诉Django在哪里可以找到我们的模板文件夹。\n\
    \n打开 mysite/settings.py 文件，向下滚动到 `TEMPLATES` 部分，在 `DIRS:` 旁边的方括号内添加 `os.path.join(BASE_DIR,\
    \ 'templates')`，如下所示：\n\n```\n'DIRS': [os.path.join(BASE_DIR, 'templates')],\n\
    ```\n\n现在我们已经添加了模板，接下来添加用于放置样式表的文件夹和文件。\n创建一个名为 `static` 的文件夹，并在 `static` 文件夹内再创建一个名为\
    \ `css` 的文件夹。\n在 `static/css/` 目录中创建一个名为 `style.css` 的文件，并添加以下代码。\n\n```\nbody\
    \ {\n  background-color: lightblue;\n}\n\nh1 {\n  color: navy;\n  margin-left:\
    \ 20px;\n}\n```\n\n以上我们添加了基本的CSS代码，以演示如何修改网站的外观。\n\nDjango处理静态文件的方式与处理模板类似，它会自动在应用目录中检查是否有名为\
    \ `static` 的目录。由于我们只有一个静态页面而不是多个应用，我们需要告诉Django我们的静态文件目录位于何处。\n\n打开 mysite/settings.py\
    \ 文件，一直滚动到末尾，在 `STATIC_URL ='/static/'` 之后立即添加以下代码：\n\n```\nSTATICFILES_DIRS =\
    \ (os.path.join(BASE_DIR, 'static'),)\n```\n\n在 mysite/ 目录中，创建一个名为 views.py 的文件，并添加以下代码。\n\
    \n```\nfrom django.shortcuts import render\n\n# 在这里创建视图。\ndef home(request):\n\
    \    return render(request, 'index.html')\n```\n\n在Django中，视图函数是一个接受Web请求并返回Web响应的Python函数。这是你添加逻辑的地方，当被调用时返回特定的响应。在我们的例子中，我们定义了一个返回\
    \ index.html 页面的视图。\n\n要调用此视图函数，我们需要将其添加到URL模式中。打开 `mysite/urls.py` 文件，并用以下代码替换其内容。\n\
    \n```\nfrom django.contrib import admin\nfrom django.urls import path\nfrom .\
    \ import views\n\nurlpatterns = [\n    path('', views.home, name='home'),\n  \
    \  path('admin/', admin.site.urls),\n]\n```\n\n请注意，我们导入了之前创建的视图文件 `from . import\
    \ views`。然后我们添加了一个路径为空 `''` 的URL模式，将其指向之前创建的 `home` 视图。`admin/` 路径指向Django自带的默认管理页面。\n\
    \n当Django收到一个请求时，它会遍历 `urlpatterns` 列表，直到找到匹配的项。在我们的例子中，`<url>.com` 将匹配第一个路径，并返回渲染\
    \ `index.html` 页面的 `home` 视图。如果我们导航到 `<url>.com/admin/`，Django将匹配 `admin/` 路径的模式，并返回管理页面。\n\
    \n重启你的服务器，并刷新右侧的网页。你应该会看到我们的“Hello World!”页面。\n\n太好了，我们现在为“Hello World!”网页的所有组件都已就位。让我们扩展它，并开始构建我们的天气应用。\n\
    \n打开 templates/index.html 文件，将写着 “Hello World!” 的代码部分改为 “Weather”，如下所示。\n\n```\n\
    {% extends \"base.html\" %}\n\n{% block content %}\n  <h1>Weather</h1>\n{% endblock\
    \ content %}\n```\n\n点击如下所示的刷新按钮，查看结果从 “Hello World!” 变为 “Weather”。\n\n你也可以点击URL栏右侧的弹出按钮，仅打开我们正在构建的、访客将看到的结果网页。你可以将URL分享给任何人，他们就能看到你的天气网站了！\n\
    \n更改访客看到的静态文本是一个好的开始，但我们的Web应用程序仍然没有任何功能。我们将在下一步通过使用JavaScript获取用户的IP地址来改变这一点。\n\
    \n## 从JavaScript调用IPIFY\n\nIP地址就像一个电话号码。当你访问 “google.com” 时，你的计算机实际上是查找名称 google.com，以获取与Google服务器之一关联的IP地址。虽然人们更容易记住像\
    \ “google.com” 这样的名称，但计算机处理数字效率更高。你可以在浏览器工具栏中输入IP地址 216.58.223.46，而不是输入 “google.com”，结果会是一样的。每个连接到互联网的设备，无论是提供内容（如\
    \ google.com）还是消费内容（如你，阅读本教程），都有一个IP地址。\n\nIP地址对我们来说很有趣，因为可以基于用户的IP地址猜测其位置。（实际上，这是一个不精确且高度复杂的过程，但就我们的目的而言，它已经足够用了）。我们将使用网络服务\
    \ ipify.org 来获取访问者的IP地址。\n\n在Repl.it的文件选项卡中，导航到 templates/base.html，它应如下所示：\n\n\
    ```\n{% load static %}\n<!DOCTYPE html>\n\n<html lang=\"en\">\n<head>\n    <meta\
    \ charset=\"UTF-8\">\n    <title>Hello World!</title>\n    <meta charset=\"UTF-8\"\
    />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"\
    />\n    <link rel=\"stylesheet\" href=\"{% static \"css/style.css\" %}\">\n</head>\n\
    <body>\n    {% block content %}{% endblock content %}\n</body>\n</html>\n```\n\
    \n此模板的“head”部分位于第5行到第11行之间——`<head>` 开始标签和结束标签之间。我们将在第10行的 `<link ...>` 正下方和第11行的结束标签\
    \ `</head>` 正上方添加我们的脚本。修改这部分代码，添加以下行：\n\n```\n<script>\n  function use_ip(json)\
    \ {\n    alert(\"Your IP address is: \" + json.ip);\n  }\n</script>\n```\n\n```\n\
    <script src=\"https://api.ipify.org?format=jsonp&callback=use_ip\"></script>\n\
    ```\n\n这是两个JavaScript代码片段。第一个（第1-5行）是一个函数，当被调用时会在我们访问者的浏览器中显示一个弹出框（一个“alert”），显示我们传入的json对象中的IP地址。第二个（第7行）从ipify的API加载一个外部脚本，并要求它将数据（包括我们访问者的IP地址）传递给我们提供的\
    \ `use_ip` 函数。\n\n如果你再次打开你的Web应用并刷新页面，你应该能看到这个脚本在运行（如果你启用了广告拦截器，它可能会阻止ipify的脚本，所以如果有任何问题，请尝试暂时禁用它）。\n\
    \n这段代码除了向用户显示IP地址外，没有做任何其他事情，但这足以看到我们系统的第一个组件（获取用户的IP地址）正在工作。这也为我们的应用引入了第一个动态功能——之前，任何访客都会看到完全相同的内容，但现在我们可以向每个访客展示与他们相关的内容（没有两个人的IP地址是相同的）。\n\
    \n现在，我们不再简单地向访客显示此IP地址，我们将修改代码，而是将其传递给我们的Repl网页服务器（我们应用程序的“后端”），以便我们可以使用它通过另一个服务获取位置信息。"
