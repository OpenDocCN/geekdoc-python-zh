    Now we can get to the fun part of building a brain for our bot!


    # # Creating a Repl and installing our Discord dependencies


    The first thing we need to do is create a Node.js Repl to write the code for our
    Discord bot. Over at [repl.it](https://repl.it), create a new Repl, choosing “Node.js”
    as your language.


    We don’t need to reinvent the wheel as there is already a great Node wrapper for
    the Discord bot API called [discord.js](https://discord.js.org/). Normally we
    would install this third-party library through [npm](https://www.npmjs.com/),
    but because we’re using Repl.it, we can skip the installation. Our Repl will automatically
    pull in all dependencies.


    In the default `index.js` file that is included with your new Repl, add the following
    line of code.


    ```

    javascript

    const Discord = require(''discord.js'');

    ```


    Press the “Run” button and you should see Repl.it installing the Discord library
    in the output pane on the right, as in the image below.


