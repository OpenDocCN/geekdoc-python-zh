    # # An introduction to pytest and doing test-driven development with Repl.it


    In this tutorial we’ll introduce test-driven development and you’ll see how to
    use pytest⁶¹ to ensure that your code is working as expected.


    pytest lets you specify inputs and expected outputs for your functions. It runs
    each input through your function and validates that the output is correct. pytest
    is a Python library and works just like any other Python library: you install
    it through your package manager and you can import it into your Python code. Tests
    are written in Python too, so you’ll have code testing other code.


    Test-driven development or TDD is the practice of writing tests before you write
    code. You can read more about TDD and why it’s popular on Wikipedia⁶².


    Specifically you’ll:


    +   - See how to structure your project to keep your tests separate but still
    have them refer to your main code files

    - Figure out the requirements for a function that can split a full name into first
    and last name components

    - Write tests for this function

    - Write the actual function.


    # ## Creating a project structure for pytest


    For large projects, it’s useful to keep your testing code separate from your application
    code. In order for this to work, you’ll need your files set up in specific places,
    and you’ll need to create individual Python **modules** so that you can refer
    to different parts of the project easily.


    Create a new Python repl called namesplitter. As always, it’ll already have a
    `main.py` file, but we’re going to put our name splitting function into a different
    module called `utils`, which can house any helper code that our main application
    relies on. We also want a dedicated place for our tests.


    Create two new folders: one called `utils` and one called `tests`, using the `add
    folder` button. Note that when you press this button it will by default create
    a folder in your currently active folder, so select the `main.py` file after creating
    the first folder or the second folder will be created inside the first folder.


    ⁶¹ https://docs.pytest.org/en/stable/

    ⁶² https://en.wikipedia.org/wiki/Test-driven_development'
