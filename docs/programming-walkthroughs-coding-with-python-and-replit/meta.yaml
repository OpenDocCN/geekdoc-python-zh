  md: "```\nimport base64\nimport feedparser\nimport io\nimport requests\n\nfrom bs4\
    \ import BeautifulSoup\nfrom wordcloud import WordCloud\nfrom flask import Flask\n\
    from flask import render_template\n```\n\nWe'll be converting the text from each\
    \ article into a separate word cloud, so it'll be useful to have another helper\
    \ function that can take text as input and produce the word cloud as output. We\
    \ can use base64 to represent the images, which can then be displayed directly\
    \ in our visitors' web browsers.\n\nAdd the following function to the main.py\
    \ file.\n\n```\ndef get_wordcloud(text):\n    pil_img = WordCloud().generate(text=text).to_image()\n\
    \    img = io.BytesIO()\n    pil_img.save(img, \"PNG\")\n    img.seek(0)\n   \
    \ img_b64 = base64.b64encode(img.getvalue()).decode()\n    return img_b64\n```\n\
    \nThis is probably the hardest part of our project in terms of readability. Normally,\
    \ we'd generate the word cloud using the wordcloud library and then save the resulting\
