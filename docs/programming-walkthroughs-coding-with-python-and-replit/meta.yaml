    ```\n\n与向量化器类似，我们首先使用开始时导入的模块创建一个分类器。然后我们调用分类器的 `fit()` 方法，并传入我们的训练向量及其关联的标签。决策树将查看这两者，并尝试学习区分这两种数据的规则。\n\
    \n一旦我们的分类器训练完成，我们就可以调用 `predict()` 方法并传入之前未见过的数据。这里我们传入 `testing_vectors`，这是计算机在训练期间未查看过的向量化测试数据列表。它必须尝试将其从训练数据中学到的规则应用到这些新的“未见过”数据上。机器学习很酷，但它不是魔法，所以我们无法保证我们学到的规则现在就一定好用。\n\
