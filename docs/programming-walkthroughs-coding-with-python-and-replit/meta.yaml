    \n![](img/48efb5586f6da072fc1456bee6971293_49_0.png)\n\n## 使其成为你自己的\n\n如果你跟着做下来，你已经拥有了自己的\
    \ repl 版本可以进行扩展。如果没有，请从我们的版本开始。Fork 它 [https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting](https://repl.it/@GarethDwyer1/cwr-04-matplotlib-plotting)\n\
    \n## 下一步去哪里？\n\n你已经学会了如何使用 Python 和 Repl.it 制作一些基础图表。互联网上有数百万个免费数据集，等待着人们去探索。你可以使用\
    \ Google 的 Dataset Search[^38] 服务找到许多这样的数据集。挑选一个你感兴趣的主题，并尝试通过数据可视化来了解更多。\n\n接下来，我们将更详细地探讨\
    \ Repl.it 的多人协作功能，以便你可以与朋友或同事协作编程。\n\n[^38]: https://datasetsearch.research.google.com/\n\
    \n## 多人协作：与 Repl.it 进行结对编程\n\n软件开发者有孤僻的名声，但他们并不总是独自编码。[结对编程](https://en.wikipedia.org/wiki/Pair_programming)被许多程序员用于：\n\
    \n-   更高效地编写无错误的代码（例如，一个人可能负责检查错误，而另一个人编码）。\n-   分享知识（经验较少的程序员可能在经验更丰富的程序员开发时“跟学”，从过程的每一步中学习）。\n\
    -   评估专业能力（如果你正在考虑聘用新人，先观看他们编码有助于评估他们的编码能力，但与他们一起编码也能让你了解他们在团队合作和沟通方面的经验）。\n\n\
    结对编程直觉上听起来效率低下：毕竟，这两个开发者本可以同时处理不同的项目。但除了能发现更多错误之外，两个人一起工作通常也会展现出更多的创造力。你可能会基于搭档说的话想到一个独自思考时不会想到的点子。\n\
    \n如果你有朋友在身边，一起完成这个教程以获得真正的结对编程经验。如果你是一个人，打开两个浏览器（或使用隐身模式）同时登录两个 Repl.it 帐户。\n\n\
    ## 使用结对编程扩展我们的数据科学文章：寻求帮助\n\n想象你是一位开发者，偶然发现了[关于绘图和图表的前面教程](http://www.codewithrepl.it/04-data-science-and-visualisation-with-repl-it.html)。你想稍微调整一下展示的图表，但你没有太多使用\
