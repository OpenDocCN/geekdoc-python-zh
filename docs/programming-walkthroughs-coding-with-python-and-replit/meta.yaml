  - '[PAGE 209]


    # Adding a new route and view, and passing data


    Currently our Django application only has two routes, the default (admin/) route
    and our home route (/) which is loaded as our home page. We''ll add another route
    at /get_weather_from_ip where we can pass an IP address to our application to
    detect the location and get a current weather report.

    To do this, we''ll need to modify the files at mysite/views.py and mysite/urls.py.

    Edit urls.py to look as follows (add line 8, but you shouldn''t need to change
    anything else).


    ```

    1 from django.contrib import admin

    2 from django.urls import path

    3 from . import views

    4

    5 urlpatterns = [

    6     path('''', views.home, name=home),

    7     path(''admin/'', admin.site.urls),

    8     path(''get_weather_from_ip/'', views.get_weather_from_ip, name="get_weather_from_ip"),

    9 ]

    ```


    We''ve added a definition for the get_weather_from_ip route, telling our app that
    if anyone visits https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip<sup>156</sup>
    then we should trigger a function in our views.py file that is also called get_weather_from_ip.
    Let''s write that function now.

    In your views.py file, add a get_weather_from_ip() function beneath the existing
    home() one, and add an import for JsonResponse on line 2. Your whole views.py
    file should now look like this:


    ```

    1 from django.shortcuts import render

    2 from django.http import JsonResponse

    3

    4

    5 # Create your views here.

    6 def home(request):

    7     return render(request, ''index.html'')

    8

    9 def get_weather_from_ip(request):

    10     print(request.GET.get("ip_address"))

    11     data = {"weather_data": 20}

    12     return JsonResponse(data)

    ```


    <sup>156</sup>https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip'
  - '[PAGE 210]


    By default, Django passes a request argument to all views. This is an object that
    contains information about our user and the connection, and any additional arguments
    passed in the URL. As our application isn’t connected to any weather services
    yet, we’ll just make up a temperature (20) and pass that back to our user as JSON.


    In line 10, we print out the IP address that we will pass along to this route
    from the GET arguments (we’ll look at how to use this later). We then create the
    fake data (which we’ll later replace with real data) and return a JSON response
    (the data in a format that a computer can read more easily, with no formatting).
    We return JSON instead of HTML because our system is going to use this route internally
    to pass data between the front and back ends of our application, but we don’t
    expect our users to use this directly.


    To test this part of our system, open your web application in a new tab and add
    /get_weather_from_ip?ip_address=123 to the URL. Here, we’re asking our system
    to fetch weather data for the IP address 123 (not a real IP address). In your
    browser, you’ll see the fake weather data displayed in a format that can easily
    be programmatically parsed.


    ![](img/48efb5586f6da072fc1456bee6971293_210_0.png)


    # Viewing the fake JSON data


    In our Repl’s output, we can see that the backend of our application has found
    the “IP address” and printed it out, between some other outputs telling us which
    routes are being visited and which port our server is running on:


    ![](img/48efb5586f6da072fc1456bee6971293_210_1.png)


    # Django print output of fake IP


    The steps that remain now are to:


    +   - pass the user’s real IP address to our new route in the background when
    the user visits our main page

    - add more backend logic to fetch the user’s location from the IP address

    - add logic to fetch the user’s weather from their location

    - display this data to the user.


    Let’s start by using Ajax[^157] to pass the user’s IP address that we collected
    before to our new route,


    > [^157]: https://en.wikipedia.org/wiki/Ajax_(programming)'
