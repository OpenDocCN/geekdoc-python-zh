    \    self.walk_animation()\n    self.move(-self.speed, 0)\nelif key[pygame.K_RIGHT]:\n\
    \    self.facing_left = False\n    self.walk_animation()\n    self.move(self.speed,\
    \ 0)\nelse:\n    self.image = self.stand_image\n\nif key[pygame.K_UP]:\n    self.move(0,\
    \ -self.speed)\n```\n\nWe also probably want to be able to jump at a different\
    \ speed to our walking pace, so let’s define another variable and use it.\n\n\
    ```python\ndef __init__(self, startx, starty):\n    # ...\n    self.speed = 4\n\
    \    self.jumpspeed = 20\n\ndef update(self):\n    # ...\n    if key[pygame.K_UP]:\n\
