    # Repl.it and GitHub: Using and contributing to open-source projects


    You’ve probably heard of [GitHub](https://github.com), which hosts millions of
    coding projects that you can use or learn from.


    In this tutorial, we’ll see how to:


    +   - Import open-source projects from GitHub to Repl.it so that we can run them
    or modify them

    - Integrate your own GitHub account with your Repl.it account so that you can
    work on your private projects

    - Push changes back to open-source projects as pull requests.


    We’ll use a basic Flask `hello world` app for the demonstrations. You can use
    this same project to follow along, or pick any other project on GitHub that interests
    you.


    # Importing a project from GitHub and running it on Repl.it


    We’ll use the [Flask](https://flask.palletsprojects.com/en/1.1.x/) application
    available at [https://github.com/ritza-co/flask-hello-world](https://github.com/ritza-co/flask-hello-world)
    for demonstration purposes. To import it into Repl.it, press the + new repl button,
    switch to the “Import From GitHub” tab, and paste in the GitHub URL, as shown
    below.


    <sup>43</sup>https://github.com

    <sup>44</sup>https://flask.palletsprojects.com/en/1.1.x/

    <sup>45</sup>https://github.com/ritza-co/flask-hello-world'
  - '[PAGE 61]


    ![](img/48efb5586f6da072fc1456bee6971293_61_0.png)


    # Image 1: Importing a repository from GitHub to Repl.it.


    Press the green Import from GitHub button and you’ll see Repl.it clone the repository
    and turn it into a repl. In all of our previous projects, we used the main.py
    file that Repl.it automatically creates for all new Python projects, and which
    it runs automatically when you press the run button. Note how in this GitHub project,
    we have no main.py file, and our code is instead in mydemoapp.py. Therefore, Repl.it
    will need some help from you to define how to run the project. This is configured
    through another special file named .replit. Because there was no main.py file,
    Repl.it automatically created this file and will prompt you to configure it.'
  - '[PAGE 62]


    ![](img/48efb5586f6da072fc1456bee6971293_62_0.png)


    # Image 2: Adding a .replit file to indicate how the project should be run.


    Select the language (Python) from the first dropdown and type python mydemoapp.py
    in the “configure the run button” input. Every time you press the run button,
    Repl.it will execute the command given here. If you prefer, you can also edit
    the .replit file directly. If you click on it, you’ll see it now contains the
    following configuration, which matches what we provided through the GUI panel.


    ```

    1 language = "python3"

    2 run = "python mydemoapp.py"

    ```


    If you hit the run button, you should see the app start. As you can see, the web
    application is very basic: all it can do is display a welcome message. If the
    configuration panel doesn’t pop up automatically, you can manually create a file
    called .replit and add the configuration above to get the same result.'
