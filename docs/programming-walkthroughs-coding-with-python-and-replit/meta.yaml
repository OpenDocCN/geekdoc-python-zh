- md: "Select the server we created in the step before this and hit the “authorize”\
    \ button. After completing the captcha, you should get an in-app Discord notification\
    \ telling you that your bot has joined your server.\n\nNow we can get to the fun\
    \ part of building a brain for our bot!\n\n## Creating a Repl and installing our\
    \ Discord dependencies\n\nThe first thing we need to do is create a Node.js Repl\
    \ to write the code for our Discord bot. Over at repl.it¹³⁴, create a new Repl,\
    \ choosing “Node.js” as your language.\n\nWe don’t need to reinvent the wheel\
    \ as there is already a great Node wrapper for the Discord bot API called discord.js¹³⁵.\
    \ Normally we would install this third-party library through npm¹³⁶, but because\
    \ we’re using Repl.it, we can skip the installation. Our Repl will automatically\
    \ pull in all dependencies.\n\nIn the default index.js file that is included with\
    \ your new Repl, add the following line of code.\n\n```\nconst Discord = require('discord.js');\n\
    ```\n\nPress the “Run” button and you should see Repl.it installing the Discord\
    \ library in the output pane on the right, as in the image below.\n\nOur bot is\
    \ nearly ready to go – but we still need to plug in our secret token. This will\
    \ authorize our code to control our bot.\n\n## Setting up authorization for our\
    \ bot\n\nBy default, Repl code is public. This is great as it encourages collaboration\
    \ and learning, but we need to be careful not to share our secret bot token (which\
    \ gives anyone who has access to it full control of our bot).\n\nTo get around\
    \ the problem of needing to give our *code* access to the token while allowing\
    \ others to access our code but *not* our token, we’ll be using [environment variables](https://www.digitalocean.com/community/tutorials/how-to-read-and-set-environmental-and-shell-variables-on-a-linux-vps).\
    \ On a normal machine, we’d set these directly on our operating system, but using\
    \ Repl.it we don’t have access to this. Repl.it allows us to set secrets in environment\
    \ variables through a special `.env` file.\n\nFirst, we need to create a new file\
    \ called exactly `.env`. Select “Add file” and name this file `.env`. It is important\
    \ not to leave out the `.` at the beginning. Open this new file and add a variable\
    \ to define your bot’s secret token (note that this is the second token that we\
    \ got while setting up the bot – different from the Client ID that we used to\
    \ add our bot to our server). It should look something like:\n\n```\nDISCORD_BOT_SECRET=NDcUN5T3ZzcTjMYOM0Y1MTUy.Dk7JBw.ihrTSAO1GKHZSonqvuhtwta16WU\n\
    ```\n\nYou’ll need to:\n\n- **Replace** the token below (after the = sign) with\
    \ the token that Discord gave you when creating your own bot.\n- Be careful about\
    \ **spacing**. If you put a space on either side of the = in your .env file, these\
    \ spaces will be part of the variable name or the value, so make sure you don’t\
    \ have any spaces around the = or at the end of the line.\n- Run the code again.\
    \ Sometimes you’ll need to refresh the whole page to make sure that your environment\
    \ variables are successfully loaded.\n\nIn the image below we’ve highlighted the\
    \ “Add file” button, the new file (.env) and how to define the secret token for\
    \ our bot’s use.\n\nLet’s make a Discord bot that repeats everything we say but\
    \ in reverse. We can do this in only a few lines of code. In your index.js file,\
    \ add the following:\n\n```\nconst Discord = require('discord.js');\nconst client\
    \ = new Discord.Client();\nconst token = process.env.DISCORD_BOT_SECRET;\n\nclient.on('ready',\
    \ () => {\n    console.log(\"I'm in\");\n    console.log(client.user.username);\n\
    });\n\nclient.on('message', msg => {\n    if (msg.author.id != client.user.id)\
    \ {\n        msg.channel.send(msg.content.split('').reverse().join(''));\n   \
    \ }\n});\n\nclient.login(token);\n```\n\nLet’s tear this apart line by line to\
    \ see what it does.\n\n- **Line 1** is what we had earlier. This line both tells\
    \ Repl.it to install the third party library and brings it into this file so that\
    \ we can use it.\n- In **line 2**, we create a Discord Client. We’ll use this\
    \ client to send commands to the Discord *server* to control our bot and send\
    \ it commands.\n- In **line 3** we retrieve our secret token from the environment\
    \ variables (which Repl.it sets from our .env file).\n- In **line 5**, we define\
    \ an event for our client, which defines how our bot should react to the “ready”\
    \ event. The Discord bot is going to run *asynchronously*, which might be a bit\
    \ confusing if you’re used to running standard synchronous code. We won’t go into\
    \ asynchronous coding in depth here, but if you’re interested in what this is\
    \ and why it’s used, there’s a good guide over at [RisingStack](https://blog.risingstack.com/node-hero-async-programming-in-node-js/).\
    \ In short, instead of running the code in our file from top to bottom, we’ll\
    \ be running pieces of code in response to specific events.\n- In **lines 6-8**\
    \ we define how our bot should respond to the “ready” event, which is fired when\
    \ our bot successfully joins a server. We instruct our bot to output some information\
    \ server side (i.e. this will be displayed in our Repl’s output, but not sent\
    \ as a message through to Discord). We’ll print a simple I’m in message to see\
    \ that the bot is there and print our bot’s username (if you’re running multiple\
    \ bots, this will make it easier to work out who’s doing what).\n- **Lines 10-14**\
    \ are similar, but instead of responding to an “ready” event, we tell our bot\
    \ how to handle new messages. **Line 11** says we only want to respond to messages\
    \ that aren’t from us (otherwise our bot will keep responding to himself – you\
    \ can remove this line to see why that’s a problem), and **line 12** says we’ll\
    \ send a new message to the same channel where we received a message (`msg.channel`)\
    \ and the content we’ll send will be the same message that we received, but backwards.\
    \ To reverse a string, we split it into its individual characters, reverse the\
    \ resulting array, and then join it all back into a string again.\n\nThe last\
    \ line fires up our bot and uses the token we loaded earlier to log into Discord.\n\
    \nPress the big green “Run” button again and you should see your bot reporting\
    \ a successful channel join in the Repl output.\n\n> [138] https://blog.risingstack.com/node-hero-async-programming-in-node-js/\n\
    \nBuilding a Discord bot with Node.js and Repl.it\n\n185\n\nImage: 9 Repl output\
    \ showing channel join\n\nOpen Discord, and from within the server we created\
    \ earlier, select your ReplBotApplication from the pane on the right-hand side\
    \ of the screen.\n\nImage:10 The Repl bot is active\n\nOnce you have selected\
    \ this, you will be able to send a message (by typing into the box highlighted\
    \ below) and see your bot respond!\n\nImage:11 *Send a message to your bot*\n\n\
    The bot responds each time, reversing the text we enter.\n\nImage:12 Our bot can\
    \ talk!\n\n## Keeping our bot alive\n\nYour bot can now respond to messages, but\
    \ only for as long as your Repl is running. If you close your browser tab or shut\
    \ down your computer, your bot will stop and no longer respond to messages on\
    \ Discord.\n\nRepl will keep your code running after you close the browser tab\
    \ only if you are running a web server. Our bot doesn't require an explicit web\
    \ server to run, but we can create a server and run it in the background just\
    \ to keep our Repl alive.\n\nCreate a new file in your project called `keep_alive.js`\
    \ and add the following code:\n\n```\nvar http = require('http');\n\nhttp.createServer(function\
    \ (req, res) {\n  res.write(\"I'm alive\");\n  res.end();\n}).listen(8080);\n\
    ```\n\nWe won’t go over this in detail as it’s not central to our bot, but here\
    \ we start a web server that will return “I’m alive” if anyone visits it.\n\n\
    In our `index.js` file, we need to add a require statement for this server at\
    \ the top. Add the following line near the top of `index.js`.\n\n```\nconst keep_alive\
    \ = require('./keep_alive.js')\n```\n\nAfter doing this and hitting the green\
    \ “Run” button again, you should see some changes to your Repl. For one, you’ll\
    \ see a new pane in the top right which shows the web output from your server.\
    \ We can see that visiting our Repl now returns a basic web page showing the “I’m\
    \ alive” string that we told our web server to return by default.\n\nNow your\
    \ bot will stay alive even after closing your browser or shutting down your development\
    \ machine. Repl will still clean up your server and kill your bot after about\
    \ one hour of inactivity, so if you don’t use your bot for a while, you’ll have\
    \ to log into Repl and start the bot up again. Alternatively, you can set up a\
    \ third-party (free!) service like [Uptime Robot](https://uptimerobot.com/). Uptime\
    \ Robot pings your site every 5 minutes to make sure it’s still working – usually\
    \ to notify you of unexpected downtime, but in this case the constant pings have\
    \ the side effect of keeping our Repl alive as it will never go more than an hour\
    \ without receiving any activity. Note that you need to select the HTTP option\
    \ instead of the Ping option when setting up Uptime Robot, as Repl.it requires\
    \ regular HTTP requests to keep your chatbot alive.\n\n139 https://uptimerobot.com/"
  mdcn: "选择上一步骤中创建的服务器，然后点击“授权”按钮。完成验证码后，你应该会收到Discord应用内的通知，告诉你机器人已加入你的服务器。\n\n现在，我们可以开始为机器人构建“大脑”的有趣部分了！\n\
    \n## 创建Repl并安装Discord依赖\n\n首先需要创建一个Node.js Repl来编写Discord机器人的代码。在repl.it¹³⁴上，创建一个新的Repl，选择“Node.js”作为语言。\n\
    \n无需重新造轮子，因为已经有了优秀的Discord机器人API的Node封装库discord.js¹³⁵。通常我们会通过npm¹³⁶安装这个第三方库，但由于使用Repl.it，我们可以跳过安装步骤。我们的Repl会自动拉取所有依赖项。\n\
    \n在新Repl默认包含的`index.js`文件中，添加以下代码行。\n\n```\nconst Discord = require('discord.js');\n\
    ```\n\n按下“运行”按钮，你应该会在右侧输出面板看到Repl.it正在安装Discord库，如下图所示。\n\n我们的机器人已基本准备就绪——但我们仍需插入密钥令牌。这将授权我们的代码来控制机器人。\n\
    \n## 为机器人设置授权\n\n默认情况下，Repl的代码是公开的。这有利于促进协作和学习，但我们需注意不要泄露机器人的密钥令牌（任何拥有此令牌的人都能完全控制我们的机器人）。\n\
    \n为了解决需要让*代码*访问令牌，同时允许他人访问代码但*无法*访问令牌的问题，我们将使用[环境变量](https://www.digitalocean.com/community/tutorials/how-to-read-and-set-environmental-and-shell-variables-on-a-linux-vps)。在普通机器上，我们会直接在操作系统上设置这些变量，但使用Repl.it时我们无法直接访问。Repl.it允许我们通过特殊的`.env`文件在环境变量中设置密钥。\n\
    \n首先，我们需要创建一个新文件，文件名必须是`.env`。选择“添加文件”，并将此文件命名为`.env`。注意不要遗漏开头的`.`。打开这个新文件，添加一个变量来定义机器人的密钥令牌（注意这是设置机器人时获得的第二个令牌——与我们用于将机器人添加到服务器的Client\
    \ ID不同）。它应该看起来像这样：\n\n```\nDISCORD_BOT_SECRET=NDcUN5T3ZzcTjMYOM0Y1MTUy.Dk7JBw.ihrTSAO1GKHZSonqvuhtwta16WU\n\
    ```\n\n你需要：\n\n- 将下面的令牌（在=号之后）**替换**为Discord在你创建机器人时提供给你的令牌。\n- 注意**空格**。如果你在`.env`文件中等号两侧放置了空格，这些空格将成为变量名或值的一部分，因此请确保等号周围或行末没有空格。\n\
    - 再次运行代码。有时你需要刷新整个页面，以确保环境变量已成功加载。\n\n下图中我们突出显示了“添加文件”按钮、新文件(.env)以及如何定义机器人使用的密钥令牌。\n\
    \n让我们创建一个Discord机器人，它会将我们说的所有话以反转形式重复。只需几行代码即可实现。在你的`index.js`文件中，添加以下内容：\n\n\
    ```\nconst Discord = require('discord.js');\nconst client = new Discord.Client();\n\
    const token = process.env.DISCORD_BOT_SECRET;\n\nclient.on('ready', () => {\n\
    \    console.log(\"I'm in\");\n    console.log(client.user.username);\n});\n\n\
    client.on('message', msg => {\n    if (msg.author.id != client.user.id) {\n  \
    \      msg.channel.send(msg.content.split('').reverse().join(''));\n    }\n});\n\
    \nclient.login(token);\n```\n\n让我们逐行拆解，看看它做了什么。\n\n- **第1行**是我们之前的代码。这行代码既告诉Repl.it安装第三方库，也将其引入到此文件中以便使用。\n\
    - 在**第2行**，我们创建了一个Discord客户端。我们将使用此客户端向Discord*服务器*发送命令，以控制机器人并下达指令。\n- 在**第3行**，我们从环境变量中检索密钥令牌（Repl.it根据我们的`.env`文件设置）。\n\
    - 在**第5行**，我们为客户端定义了一个事件，说明机器人应如何响应“ready”事件。Discord机器人将*异步*运行，如果你习惯于运行标准同步代码，这可能有点令人困惑。我们不会在此深入讨论异步编码，但如果你对此及其原因感兴趣，[RisingStack](https://blog.risingstack.com/node-hero-async-programming-in-node-js/)上有一篇不错的指南。简而言之，代码不是从文件顶部到底部顺序运行，而是响应特定事件来运行代码片段。\n\
    - 在**第6-8行**，我们定义了机器人如何响应“ready”事件，该事件在我们的机器人成功加入服务器时触发。我们指示机器人在服务器端输出一些信息（即这将显示在我们的Repl输出中，但不会作为消息发送到Discord）。我们将打印一条简单的“I'm\
    \ in”消息，以确认机器人已在线，并打印机器人的用户名（如果你运行多个机器人，这有助于区分是哪个机器人在响应）。\n- **第10-14行**类似，但不是响应“ready”事件，而是告诉机器人如何处理新消息。**第11行**表明我们只想响应非自身发送的消息（否则机器人会不断回应自己——你可以删除这行来看看为什么这会是个问题），**第12行**表明我们将向收到消息的同一频道（`msg.channel`）发送一条新消息，内容是我们收到的消息的反转形式。要反转字符串，我们先将其拆分为单个字符，反转生成的数组，然后再将所有字符重新连接成一个字符串。\n\
    \n最后一行启动机器人，并使用我们之前加载的令牌登录Discord。\n\n再次按下大的绿色“运行”按钮，你应该会在Repl输出中看到你的机器人报告已成功加入频道。\n\
    \n> [138] https://blog.risingstack.com/node-hero-async-programming-in-node-js/\n\
    \n使用Node.js和Repl.it构建Discord机器人\n\n185\n\n图：9 Repl输出显示频道已加入\n\n打开Discord，在我们之前创建的服务器内，从屏幕右侧面板选择你的ReplBotApplication。\n\
    \n图：10 Repl机器人已激活\n\n选择该机器人后，你将能够发送消息（在下方突出显示的框中输入内容），并看到你的机器人响应！\n\n图：11 *向你的机器人发送消息*\n\
    \n机器人每次都会响应，并将我们输入的文本反转。\n\n图：12 我们的机器人能对话了！\n\n## 保持机器人运行\n\n你的机器人现在可以响应消息了，但仅在你的Repl运行期间有效。如果你关闭浏览器标签页或关闭计算机，机器人将停止运行，不再响应Discord上的消息。\n\
    \n只有当你运行Web服务器时，Repl才会在关闭浏览器标签页后继续运行你的代码。我们的机器人不需要显式运行Web服务器，但我们可以创建一个服务器并在后台运行，只是为了保持我们的Repl存活。\n\
    \n在你的项目中创建一个名为`keep_alive.js`的新文件，并添加以下代码：\n\n```\nvar http = require('http');\n\
    \nhttp.createServer(function (req, res) {\n  res.write(\"I'm alive\");\n  res.end();\n\
    }).listen(8080);\n```\n\n我们不会详细讨论这个，因为它不是我们机器人的核心，但这里我们启动了一个Web服务器，如果有人访问它，将返回“I'm\
    \ alive”。\n\n在我们的`index.js`文件中，需要在顶部为此服务器添加require语句。在`index.js`顶部附近添加以下行：\n\n\
    ```\nconst keep_alive = require('./keep_alive.js')\n```\n\n完成此操作并再次按下绿色的“运行”按钮后，你应该会看到你的Repl发生一些变化。首先，你会在右上角看到一个新的面板，显示来自服务器的Web输出。我们可以看到，现在访问我们的Repl会返回一个基本的网页，显示我们告诉Web服务器默认返回的“I'm\
    \ alive”字符串。\n\n现在，即使关闭浏览器或关闭开发机器，你的机器人也会保持存活。Repl仍然会在约一小时不活动后清理你的服务器并终止机器人，因此如果你一段时间不使用机器人，你需要登录Repl并重新启动机器人。或者，你可以设置一个第三方（免费！）服务，如[Uptime\
    \ Robot](https://uptimerobot.com/)。Uptime Robot每5分钟向你的网站发送一次请求以确保其仍在工作——通常是为了通知你意外的停机，但在这种情况下，持续的请求有一个副作用，就是保持我们的Repl存活，因为它永远不会超过一小时没有收到任何活动。请注意，在设置Uptime\
    \ Robot时需要选择HTTP选项而不是Ping选项，因为Repl.it需要定期的HTTP请求来保持聊天机器人存活。\n\n139 https://uptimerobot.com/"
