- md: "## Fetching all of the articles from the homepage\n\nNow that we have the link\
    \ to every article on the BBC News homepage, we can fetch the data for each one\
    \ of these individual articles. As a toy project, let’s extract the proper nouns\
    \ (people, places, etc) from each article and print out the most common ones to\
    \ get a sense on what things are being talked about today.\n\nAdapt your code\
    \ to look as follows:\n\n```python\nimport requests\nimport string\nfrom collections\
    \ import Counter\nfrom bs4 import BeautifulSoup\n\nurl = \"https://bbc.com/news\"\
    \n\nresponse = requests.get(url)\nhtml = response.text\nsoup = BeautifulSoup(html,\
    \ \"html.parser\")\nlinks = soup.findAll(\"a\")\n\nnews_urls = []\nfor link in\
    \ links:\n    href = link.get(\"href\")\n    if href.startswith(\"/news\") and\
    \ href[-1].isdigit():\n        news_url = \"https://bbc.com\" + href\n       \
    \ news_urls.append(news_url)\n\nall_nouns = []\nfor url in news_urls[:10]:\n \
    \   print(\"Fetching {}\".format(url))\n    response = requests.get(url)\n   \
    \ html = response.text\n    soup = BeautifulSoup(html, \"html.parser\")\n\n  \
    \  words = soup.text.split()\n    nouns = [word for word in words if word.isalpha()\
    \ and word[0] in string.ascii_uppercase]\n    all_nouns += nouns\n\nprint(Counter(all_nouns).most_common(100))\n\
    ```\n\nThis code is quite a bit more complicated than what we previously wrote,\
    \ so don’t worry if you don’t understand all of it. The main changes are:\n\n\
    -   At the top, we add two new imports in addition to the requests library. The\
    \ first new module is one for string, which is a standard Python module that contains\
    \ some useful word and letter shortcuts. We’ll use it to identify all the capital\
    \ letters in our alphabet. The second module is a Counter, which is part of the\
    \ built-in collections module. This will let us find the most common nouns in\
    \ a list, once we have built a list of all the nouns.\n-   We’ve added `news_urls\
    \ = []` at the top of the first for loop. Instead of printing out each URL once\
    \ we’ve identified it as a “news URL”, we add it to this list so we can download\
    \ each page later. Inside the for loop two lines down, we combine the root domain\
    \ (“http://bbc.com”) with each href attribute and then add the complete URL to\
    \ our `news_urls` list.\n-   We then go into another for loop, where we loop through\
    \ the first 10 news URLs (if you have more time, you can remove the `[:10]` part\
    \ to iterate through all the news pages, but for efficiency, we’ll just demonstrate\
    \ with the first 10).\n-   We print out the URL that we’re fetching (as it takes\
    \ a second or so to download each page, it’s nice to display some feedback so\
    \ we can see that the program is working).\n-   We then fetch the page and turn\
    \ it into soup, as we did before.\n-   With `words = soup.text.split()` we extract\
    \ all the text from the page and split this resulting big body of text into individual\
    \ words. The Python `split()` function splits on white space, which is a crude\
    \ way to extract words from a piece of text, but it will serve our purpose for\
    \ now.\n-   The next line loops through all the words in that given article and\
    \ keeps only the ones that are made up of alphabetic characters and which start\
    \ with a capital letter (`string.ascii_uppercase` is just the uppercase alphabet).\
    \ This is also an extremely crude way of extracting nouns, and we will get a lot\
    \ of words (like those at the start of sentences) which are not actually proper\
    \ nouns, but again it’s a good enough approximation for now.\n-   We then add\
    \ all the words that look like nouns to our `all_nouns` list and move on to the\
    \ next article to do the same.\n-   Finally, once we’ve downloaded all the pages,\
    \ we print out the 100 most common nouns along with a count of how often they\
    \ appeared using Python’s convenient Counter object.\n\nYou should see output\
    \ similar to that in the image below (though your words will be different, as\
    \ the news changes every few hours). We have the most common “nouns” followed\
    \ by a count of how often that noun appeared in all 10 of the articles we looked\
    \ at.\n\nWe can see that our crude extraction and parsing methods are far from\
    \ perfect – words like “Twitter” and “Facebook” appear in most articles because\
    \ of the social media links at the bottom of each article, so their presence doesn’t\
    \ mean that Facebook and Twitter themselves are in the news today. Similarly,\
    \ words like “From” aren’t nouns, and other words like “BBC” and “Business” are\
    \ also included because they appear on each page, outside of the main article\
    \ text.\n\n![](img/48efb5586f6da072fc1456bee6971293_150_0.png)\n\nImage: 10 The\
    \ final output of our program, showing the words that appear most often in BBC\
    \ articles.\n\n## Where next?\n\nWe've completed the basics of web scraping and\
    \ have looked at how the web works, how to extract information from web pages,\
    \ and how to do some very basic text extraction. You will probably want to do\
    \ something other than extract words from BBC! You can fork this Repl from https://repl.it/@GarethDwyer1/beginnerwebscraping\
    \ and modify it to change which site it scrapes and what content it extracts.\
    \ You can also join the Repl Discord Server to chat with other developers who\
    \ are working on similar projects and who will happily exchange ideas with you\
    \ or help if you get stuck.\n\nWe have walked through a very flexible method of\
    \ web scraping, but it’s the “quick and dirty” way. If BBC updates their website\
    \ and some of our assumptions (e.g. that news URLs will end with a number) break,\
    \ our web scraper will also break.\n\nOnce you’ve done a bit of web scraping,\
    \ you’ll notice that the same patterns and problems come up again and again. Because\
    \ of this, there are many frameworks and other tools that solve these common problems\
    \ (finding all the URLs on the page, extracting text from the other code, dealing\
    \ with changing web sites, etc), and for any big web scraping project, you’ll\
    \ definitely want to use these instead of starting from scratch.\n\nSome of the\
    \ best Python web scraping tools are:\n\n-   Scrapy: A framework used by people\
    \ who want to scrape millions or even billions of web pages. Scrapy lets you build\
    \ “spiders” – programmatic robots that move around the web at high speed, gathering\
    \ data based on rules that you specify.\n-   Newspaper: we touched on how it was\
    \ difficult to separate the main text of an online news article from all the other\
    \ content on the page (headers, footers, adverts, etc). This problem is an incredibly\
    \ difficult one to solve. Newspaper uses a combination of manually specified rules\
    \ and some clever algorithms to remove the “boilerplate” or non-core text from\
    \ each article.\n-   Selenium: we scraped some basic content without using a web\
    \ browser, and this works fine for images and text. Many parts of the modern web\
    \ are dynamic though – e.g. they only load when you scroll down a page far enough\
    \ or click on a button to reveal more content. These dynamic sites are challenging\
    \ to scrape, but Selenium allows you to fire up a real web browser and control\
    \ it just as a human would (but automatically), and this allows you to access\
    \ this kind of dynamic content.\n\nThere is no shortage of other tools, and a\
    \ lot can be done simply by using them in combination with each other. Web scraping\
    \ is a vast world that we’ve only just touched on, but we’ll explore some more\
    \ web scraping use cases in the next chapter, in particular, building news word\
    \ clouds.\n\nhttps://discord.com/login?redirect_to=%2Fchannels%2F%40me\nhttps://scrapy.org/\n\
    https://github.com/codelucas/newspaper\nhttps://www.seleniumhq.org/"
  mdcn: "## 从主页获取所有文章\n\n既然我们已经获得了BBC新闻主页上每篇文章的链接，我们就可以获取这些单独文章的数据。作为一个趣味项目，我们来从每篇文章中提取专有名词（人名、地名等），并打印出最常见的名词，以了解今天都在讨论哪些话题。\n\
    \n请调整你的代码如下所示：\n\n```python\nimport requests\nimport string\nfrom collections\
    \ import Counter\nfrom bs4 import BeautifulSoup\n\nurl = \"https://bbc.com/news\"\
    \n\nresponse = requests.get(url)\nhtml = response.text\nsoup = BeautifulSoup(html,\
    \ \"html.parser\")\nlinks = soup.findAll(\"a\")\n\nnews_urls = []\nfor link in\
    \ links:\n    href = link.get(\"href\")\n    if href.startswith(\"/news\") and\
    \ href[-1].isdigit():\n        news_url = \"https://bbc.com\" + href\n       \
    \ news_urls.append(news_url)\n\nall_nouns = []\nfor url in news_urls[:10]:\n \
    \   print(\"Fetching {}\".format(url))\n    response = requests.get(url)\n   \
    \ html = response.text\n    soup = BeautifulSoup(html, \"html.parser\")\n\n  \
    \  words = soup.text.split()\n    nouns = [word for word in words if word.isalpha()\
    \ and word[0] in string.ascii_uppercase]\n    all_nouns += nouns\n\nprint(Counter(all_nouns).most_common(100))\n\
    ```\n\n这段代码比我们之前写的要复杂一些，所以如果你不能完全理解也不用担心。主要的变化在于：\n\n-   在顶部，除了 `requests` 库之外，我们添加了两个新的导入。第一个新模块是\
    \ `string`，这是一个标准的 Python 模块，包含一些有用的单词和字母快捷方式。我们将用它来识别字母表中的所有大写字母。第二个模块是 `Counter`，它是内置\
    \ `collections` 模块的一部分。一旦我们构建了所有名词的列表，这个工具就能帮我们找出列表中最常见的名词。\n-   我们在第一个 `for`\
    \ 循环的顶部添加了 `news_urls = []`。我们没有在识别出一个“新闻 URL”后就立即打印它，而是将其添加到这个列表中，以便稍后下载每个页面。在下面两行的\
    \ `for` 循环内部，我们将根域名（“http://bbc.com”）与每个 `href` 属性组合，然后将完整的 URL 添加到我们的 `news_urls`\
    \ 列表中。\n-   接着，我们进入另一个 `for` 循环，遍历前10个新闻 URL（如果你有更多时间，可以去掉 `[:10]` 部分来遍历所有新闻页面，但为了效率，我们这里只用前10个作为演示）。\n\
    -   我们打印出正在获取的 URL（因为下载每个页面大约需要一秒钟，显示一些反馈信息会比较好，这样我们就能知道程序正在运行）。\n-   然后我们获取页面并将其转换为“汤”（soup），就像之前做的那样。\n\
    -   通过 `words = soup.text.split()`，我们从页面中提取所有文本，并将这大段文本分割成单个单词。Python 的 `split()`\
    \ 函数按空白符分割，这是一种从文本中提取单词的粗糙方法，但目前对我们来说已经够用了。\n-   下一行代码遍历给定文章中的所有单词，只保留那些由字母字符组成且以大写字母开头的单词（`string.ascii_uppercase`\
    \ 就是大写字母表）。这也是提取名词的一种极其粗糙的方法，我们会得到很多实际上不是专有名词的词（比如句首的单词），但这同样是一个目前足够好的近似方法。\n\
    -   然后，我们将所有看起来像名词的单词添加到我们的 `all_nouns` 列表中，并继续处理下一篇文章。\n-   最后，一旦我们下载了所有页面，我们就使用\
    \ Python 方便的 `Counter` 对象，打印出100个最常见的名词及其出现次数。\n\n你应该会看到类似下图所示的输出（不过你的单词会不同，因为新闻每几小时就会更新）。我们得到了最常见的“名词”以及该名词在我们查看的全部10篇文章中出现的次数。\n\
    \n我们可以看到，我们粗糙的提取和解析方法远非完美——像“Twitter”和“Facebook”这样的词出现在大多数文章中，是因为每篇文章底部的社交媒体链接，所以它们的出现并不意味着Facebook和Twitter本身是今天的新闻。同样，像“From”这样的词不是名词，而像“BBC”和“Business”这样的词也包含在内，是因为它们出现在每个页面的主体文章文本之外。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_150_0.png)\n\n图：我们程序的最终输出，显示了在BBC文章中出现频率最高的词语。\n\
    \n## 接下来做什么？\n\n我们已经完成了网络爬虫的基础知识学习，了解了网络是如何工作的，如何从网页中提取信息，以及如何进行一些非常基础的文本提取。你可能不想只做从BBC提取词语的事情！你可以从\
    \ https://repl.it/@GarethDwyer1/beginnerwebscraping 复制这个 Repl，并修改它以改变爬取的网站和提取的内容。你也可以加入\
    \ Repl Discord 服务器，与其他正在处理类似项目的开发者聊天，他们会很乐意与你交流想法，或者在你遇到困难时提供帮助。\n\n我们介绍了一种非常灵活的网络爬虫方法，但这是一种“快速而粗糙”的方式。如果BBC更新了他们的网站，并且我们的一些假设（例如，新闻URL将以数字结尾）失效了，我们的网络爬虫也会失效。\n\
    \n一旦你做了一些网络爬虫，你会注意到相同的模式和问题会反复出现。正因为如此，有许多框架和其他工具可以解决这些常见问题（查找页面上的所有URL、从其他代码中提取文本、处理变化的网站等），对于任何大型的网络爬虫项目，你肯定希望使用这些工具，而不是从头开始。\n\
    \n一些最好的Python网络爬虫工具包括：\n\n-   Scrapy：这是一个为想要爬取数百万甚至数十亿网页的人设计的框架。Scrapy允许你构建“蜘蛛”——可以高速在Web上移动的程序化机器人，根据你指定的规则收集数据。\n\
    -   Newspaper：我们之前提到过，将在线新闻文章的主体文本与页面上的所有其他内容（页眉、页脚、广告等）分开是多么困难。这个问题极其难以解决。Newspaper结合了手动指定的规则和一些巧妙的算法，来移除每篇文章中的“样板”或非核心文本。\n\
    -   Selenium：我们之前在不使用网络浏览器的情况下爬取了一些基本内容，这对图片和文本效果很好。然而，现代网络的许多部分是动态的——例如，它们只有在你向下滚动页面足够远或点击按钮以显示更多内容时才加载。这些动态网站爬取起来具有挑战性，但Selenium允许你启动一个真正的网络浏览器，并像人类一样（但自动地）控制它，这使你能够访问这类动态内容。\n\
    \n其他工具不胜枚举，通过组合使用它们可以完成很多工作。网络爬虫是一个广阔的世界，我们只是初窥门径，但我们将在下一章探讨更多网络爬虫用例，特别是构建新闻词云。\n\
    \nhttps://discord.com/login?redirect_to=%2Fchannels%2F%40me\nhttps://scrapy.org/\n\
    https://github.com/codelucas/newspaper\nhttps://www.seleniumhq.org/"
