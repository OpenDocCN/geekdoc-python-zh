    Now your code''s indentation will be fixed.


    ![](img/48efb5586f6da072fc1456bee6971293_108_0.png)


    # Moving blocks of code within a file


    Sometimes you need to move a block of code up or down in the file. For example,
    our `update()` function uses our `move()` function, but `move()` is only defined
    later. For readability, it''s good to try ensure that your functions only call
    functions that have already been defined further up (assuming that someone else
    is reading the code top down, they will remember the `move()` function''s definition
    before seeing it used).


    Instead of cutting and pasting a block, you can shunt it by pressing `Alt+up`
    or `Alt+down` (`option+up` and `option+down` on MacOS). As with the others, this
    works on the line under your cursor or a larger selection.'
