    ```\n1  with open(f\"{city}.txt\", \"a\") as f:\n```\n\n然后再次运行脚本。如果你再次打开其中一个城市文件，你会看到它增加了一行新数据，而不是旧数据被覆盖。新数据会追加到文件的末尾。WeatherStack大约每5分钟才更新一次数据，因此如果你快速连续多次运行脚本，可能会看到完全重复的行。\n\
    \n## 导出天气数据文件\n\n如果你每天运行这个脚本几个月，你将拥有一个很好的数据集，这在其他情况下也可能有用。如果你想从Repl.it下载所有数据，可以使用“下载为zip”功能来导出一个repl中的所有文件（包括代码和数据文件）。\n\
