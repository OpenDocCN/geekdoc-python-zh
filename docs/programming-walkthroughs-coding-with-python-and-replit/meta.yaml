    \n## Build a 2D Platform Game with PyGame and Repl.it\n\nIn chapter 7 (Building\
    \ a game with PyGame) we introduced graphical game development with PyGame, covering\
    \ how to develop a 2D game with animated sprites and user interaction. In this\
    \ tutorial, we’ll go a step further and create a 2D platformer, where you can\
