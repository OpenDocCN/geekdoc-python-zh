  md: "```\npython\nfrom flask import Flask\nfrom threading import Thread\n\napp =\
    \ Flask('')\n\n@app.route('/')\ndef home():\n    return \"I'm alive\"\n\ndef run():\n\
    \    app.run(host='0.0.0.0',port=8080)\n\ndef keep_alive():\n    t = Thread(target=run)\n\
    \    t.start()\n\n```\n\nWe won’t go over this in detail as it’s not central to\
    \ our bot, but here we start a web server that will return “I’m alive” if anyone\
    \ visits it, and we’ll provide a method to start this in a new thread (leaving\
    \ the main thread for our Repl bot).\n\nIn our main.py file, we need to add an\
    \ import for this server at the top. Add the following line near the top of main.py.\n\
    \n```\npython\nfrom keep_alive import keep_alive\n\n```\n\nIn main.py we need\
    \ to start up the web server just before you start up the bot. Add these three\
    \ lines to main.py, just before the line with `token = os.environ.get(\"DISCORD_BOT_SECRET\"\
    )`:\n\n```\npython\nkeep_alive()\ntoken = os.environ.get(\"DISCORD_BOT_SECRET\"\
    )\nclient.run(token)\n\n```\n\nAfter doing this and hitting the green “Run” button\
    \ again, you should see some changes to your Repl. For one, you’ll see a new pane\
    \ in the top right which shows the web output from your server. We can see that\
    \ visiting our Repl now returns a basic web page showing the “I’m alive” string\
    \ that we told our web server to return by default. In the bottom-right pane,\
    \ you can also see some additional output from Flask starting up and running continuously,\
    \ listening for requests."
