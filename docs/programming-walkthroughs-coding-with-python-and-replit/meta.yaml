  md: '# Refactoring our weather project to keep our API key secure


    In the working with files tutorial⁵⁸ we used the WeatherStack API to fetch weather
    data and save it to disk. Part of this involved getting an API key from WeatherStack.
    Because WeatherStack limits the number of calls each key can make per day, it
    would be bad if someone else used up the quota for our key and broke our app as
    a result.


    Let''s refactor the WeatherStack project to prevent our key from being made public.


    Visit https://repl.it/@GarethDwyer1/cwr-02-weather-report⁵⁹ (or your own version
    of this if you followed along previously) and create a new fork by pressing the
    pencil icon and then fork.


    ![](img/48efb5586f6da072fc1456bee6971293_84_0.png)


    Image 1: Forking our repl before refactoring it.


    We have API_KEY defined near the top of main.py, and this is the value that we
    want to keep secret. Let''s move it to a .env file instead.


    Click on the add file icon and call your new file .env. Be sure to add the initial
    full stop and don''t add any spaces.


    ⁵⁸http://www.codewithrepl.it/02-managing-files-using-repl-it.html

    ⁵⁹https://repl.it/@GarethDwyer1/cwr-02-weather-report'
