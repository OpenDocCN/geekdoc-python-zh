- md: "## Forking and extending our basic bot\n\nThis is not a very useful bot as\
    \ is, but the possibilities are only limited by your creativity now! You can have\
    \ your bot receive input from a user, process the input, and respond in any way\
    \ you choose. In fact, with the basic input and output that we've demonstrated,\
    \ we have most of the components of any modern computer, all of which are based\
    \ on the Von Neumann architecture¹⁴⁰ (we could easily add the missing memory by\
    \ having our bot write to a file, or with a bit more effort link in a SQLite database¹⁴¹\
    \ for persistent storage).\n\nIf you followed along this tutorial, you'll have\
    \ your own basic Repl bot to play around with and extend. If you were simply reading,\
    \ you can easily fork my bot at https://repl.it/@GarethDwyer1/discord-bot-node¹⁴²\
    \ and extend it how you want (you'll need to add your own token and recreate the\
    \ .env file still). Happy hacking!\n\nIf you're stuck for ideas, why not link\
    \ up your Discord bot to the Twitch API¹⁴³ to get notified when your favourite\
    \ streamers are online, or build a text adventure¹⁴⁴.\n\nIn the next chapter,\
    \ we'll be looking at building our own basic web application, using Django. This\
    \ tutorial will also introduce you to HTML, JavaScript, and jQuery and will assist\
    \ you in getting to the point where you can begin to build your own custom web\
    \ applications.\n\n> ¹⁴⁰ https://en.wikipedia.org/wiki/Von_Neumann_architecture\n\
    ¹⁴¹ https://www.sqlite.org/index.html\n¹⁴² https://repl.it/@GarethDwyer1/discord-bot-node\n\
    ¹⁴³ https://dev.twitch.tv/\n¹⁴⁴ https://en.wikipedia.org/wiki/Interactive_fiction\n\
    \n## Creating and hosting a basic web application with Django and Repl.it\n\n\
    ![](img/48efb5586f6da072fc1456bee6971293_196_0.png)\n\nIn this tutorial, we’ll\
    \ be using Django to create an online service that shows visitors their current\
    \ weather and location. We’ll develop the service and host it using repl.it.\n\
    \nTo work through this tutorial, you should ideally have basic knowledge of Python\
    \ and some knowledge of web application development. However, we’ll explain all\
    \ of our reasoning and each line of code thoroughly, so if you have any programming\
    \ experience you should be able to follow along as a complete Python or web app\
    \ beginner too. We’ll also be making use of some HTML, JavaScript, and jQuery,\
    \ so if you have been exposed to these before you’ll be able to work through more\
    \ quickly. If you haven’t, this will be a great place to start.\n\nTo display\
    \ the weather at the user’s current location, we’ll have to tie together a few\
    \ pieces. The main components of our system are:\n\n- A Django application, to\
    \ show the user a webpage with dynamic data\n- Ipify to get our visitors’ IP address\
    \ so that we can guess their location\n- ip-api to look up our visitors’ city\
    \ and country using their IP address\n- Open Weather Map to get the current weather\
    \ at our visitors’ location.\n\nThe main goals of this tutorial are to:\n\n- Show\
    \ how to set up and host a Django application using repl.it.\n- Show how to join\
    \ existing APIs together to create a new service.\n\nBy using this tutorial as\
    \ a starting point, you can easily create your own bespoke web applications. Instead\
    \ of showing weather data to your visitors, you could, for example, pull and combine\
    \ data from any of the hundreds of APIs found at [this list of public APIs](https://github.com/toddmotto/public-apis).\n\
    \n¹⁴⁵ https://repl.it\n¹⁴⁶ https://www.djangoproject.com/\n¹⁴⁷ https://www.ipify.org/\n\
    ¹⁴⁸ http://ip-api.com/\n¹⁴⁹ https://openweathermap.org\n\n## Setting up\n\nYou\
    \ won’t need to install any software or programming languages on your local machine,\
    \ as we’ll be developing our application directly through [repl.it](https://repl.it).\
    \ Head over there and create an account. Press the + button in the top right to\
    \ create a new project and search for “Django Template”. Give your project a name\
    \ and press “Create repl”.\n\n![](img/48efb5586f6da072fc1456bee6971293_197_0.png)\n\
    \nBy default, Django comes with a pretty complicated folder structure of existing\
    \ files and folders. There’s also a README.md file that will open by default,\
    \ giving you some guidance on how to find your way around.\n\n## Developing Django\
    \ on Repl.it\n\n- Fork this template to get started\n- Simply hit run to start\
    \ the server\n- The server will autoreload as needed. You don’t need to restart\
    \ the server manually.\n\n### Add your first view\n\n1. Create a file under `mysite`\
    \ named `views.py` with the following contents:\n\n```python\nfrom django.http\
    \ import HttpResponse\n\ndef index(request):\n    return HttpResponse(\"Hello,\
    \ world.\")\n```\n\n2. Add a url pattern under `mysite/urls.py`. It should look\
    \ like this:\n\n```python\nfrom django.contrib import admin\nfrom django.urls\
    \ import path\nfrom . import views\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('', views.index),\n]\n```\n\n![](img/48efb5586f6da072fc1456bee6971293_199_0.png)\n\
    \n```\nSystem check identified no issues (0 silenced).\nYou have 18 unapplied\
