  md: "```\npython\ndef decode_message_from_bytestring(bytestring):\n    bytestring\
    \ = bytestring.split(ENDOFMESSAGE)[0]\n    message = int(bytestring, 2).to_bytes(len(bytestring)\
    \ // 8, byteorder='big')\n    message = base64.decodebytes(message).decode(\"\
    utf8\")\n    return message\n\n```\n\nRemember how we added a special ENDOFMESSAGE\
    \ delimiter above? Here we first split our string on that so we don't look for\
    \ text in random data (pixels from the unmodified part of the image) and then\
    \ go backwards through our encoding pipe: first to base64 and then to text.\n\n\
    We also need a way to extract the bytestring from an image. Add the following\
    \ function to main.py to do this.\n\n```\npython\ndef decode_pixels(pixels):\n\
    \    bytestring = []\n    for row in pixels:\n        for c in row:\n        \
    \    bytestring.append(str(c % 2))\n    bytestring = ''.join(bytestring)\n   \
    \ message = decode_message_from_bytestring(bytestring)\n    return message\n\n\
    ```\n\nOnce again, this is just the reverse of what we did before. We grab the\
    \ remainder of each value to get 1 for each odd value and 0 for each even one\
    \ and keep them in a string. We then call our decode function to get the plaintext.\n\
    \nThat’s it for our encoding and decoding functions; next we’ll put everything\
    \ together in our main() function.\n\n# Adding a command line wrapper script\n\
    \nAt this point, we could create a web application with a UI for people to add\
    \ text to their images. Given the fact that people who want to do steganography\
    \ probably won’t trust a web application with their data, we’ll rather create\
    \ a command line application that people can run on their own machines.\n\nAdd\
    \ the following to the top of your main.py file, right below the imports."
