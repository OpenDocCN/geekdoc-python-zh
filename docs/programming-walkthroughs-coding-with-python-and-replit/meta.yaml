- md: "Let’s take a closer look at what has changed.\n\n- We import our new libraries\
    \ on lines 2 and 5.\n- We create a new global variable `LIMIT` on line 10 to limit\
    \ how many articles we want to download.\n- Lines 12-18 define a new function\
    \ that takes a URL, downloads the article, and extracts the text. It does this\
    \ using a crude algorithm that assumes anything inside HTML `<p>` (paragraph)\
    \ tags is interesting content.\n- We modify lines 23, 25, 26, and 27 so that we\
    \ use the new `parse_article` function to get the actual content of the URLs that\
    \ we found in the RSS feed and return that to the user instead of returning the\
    \ URL directly. Note that we limit this to two articles by truncating our list\
    \ to `LIMIT` for now, as the downloads take a while and Repl’s resources on free\
    \ accounts are limited.\n\nIf you run the code now, you should see output similar\
    \ to that shown in the image below (you may need to hit refresh in the right pane).\
    \ You can see text from the first article in the top-right pane now, and the text\
    \ for the second article is further down the page. You’ll notice that our text\
    \ extraction algorithm isn’t perfect and there’s still some extra text about “Share\
    \ this” at the top that isn’t actually part of the article, but this is good enough\
    \ for us to create word clouds from later.\n\n![](img/48efb5586f6da072fc1456bee6971293_160_0.png)\n\
    \n## Returning HTML instead of plain text to the user\n\nAlthough Flask allows\
    \ us to return Python `str` objects directly to our visitors, the raw result is\
    \ ugly compared to how people are used to seeing web pages. To take advantage\
    \ of HTML formatting and CSS styling, it's better to define HTML *templates*,\
    \ and use Flask's template engine, jinja, to inject dynamic content into these.\
    \ Before we get to creating image files from our text content, let's set up a\
    \ basic Flask template.\n\nTo use Flask's templates, we need to set up a specific\
    \ file structure. Press the \"new folder\" button (next to the \"new file\" button,\
    \ on the left pane), and name the resulting new folder `templates`. This is a\
    \ special name recognised by Flask, so make sure you get the spelling exactly\
    \ correct.\n\nSelect the new folder and press the \"new file\" button to create\
    \ a new file inside our `templates` folder. Call the file `home.html`. Note below\
    \ how the `home.html` file is indented one level, showing that it is inside the\
    \ folder. If yours is not, drag and drop it into the `templates` folder so that\
    \ Flask can find it.\n\n![](img/48efb5586f6da072fc1456bee6971293_161_0.png)\n\n\
    In the `home.html` file, add the following code, which is a mix between standard\
    \ HTML and Jinja's templating syntax to mix dynamic content into the HTML.\n\n\
    ```\n<html>\n    <body>\n        <h1>News Word Clouds</h1>\n        <p>Too busy\
    \ to click on each news article to see what it's about? Below you can see all\
    \ the articles from the BBC front page, displayed as word clouds. If you want\
    \ to read more about any particular article, just click on the wordcloud to go\
    \ to the original article</p>\n        {% for article in articles %}\n       \
    \     <p>{{article}}</p>\n       {% endfor %}\n    </body>\n</html>\n```\n\nJinja\
    \ uses the special characters `{%` and `{{` (in opening and closing pairs) to\
    \ show where dynamic content (e.g. variables calculated in our Python code) should\
    \ be added and to define control structures. Here we loop through a list of articles\
    \ and display each one in a set of `<p>` tags.\n\nWe'll also need to tweak our\
    \ Python code a bit to account for the template. In the `main.py` file, make the\
    \ following changes.\n\n- Add a new import near the top of the file, below the\
    \ existing Flask import\n\n```python\nfrom flask import render_template\n```\n\
    \n- Update the last line of the `home()` function to make a call to `render_template`\
    \ instead of returning a `str` directly as follows.\n\n```python\n@app.route(\"\
    /\")\ndef home():\n    feed = feedparser.parse(BBC_FEED)\n    article_texts =\
    \ []\n\n    for article in feed['entries'][:LIMIT]:\n        text = parse_article(article['link'])\n\
    \        article_texts.append(text)\n    return render_template('home.html', articles=article_texts)\n\
    ```\n\nThe `render_template` call tells Flask to prepare some HTML to return to\
    \ the user by combining data from our Python code and the content in our `home.html`\
    \ template. Here we pass `article_texts` to the renderer as `articles`, which\
    \ matches the `articles` variable we loop through in `home.html`.\n\nIf everything\
    \ went well, you should see different output now, which contains our header from\
    \ the HTML and static first paragraph, followed by two paragraphs showing the\
    \ same article content that we pulled before. If you don't see the updated webpage,\
    \ you may need to hit refresh in the right pane again.\n\nBuilding news word clouds\
    \ using Python and Repl.it\n\n157\n\n![](img/48efb5586f6da072fc1456bee6971293_163_0.png)\n\
    \nNow it’s time to move on to generating the actual word clouds.\n\n## Generating\
    \ word clouds from text in Python\n\nOnce again, there’s a nifty Python library\
    \ that can help us. This one will take in text and return word clouds as images\
    \ and is called `wordcloud`.\n\nImages are usually served as files living on your\
    \ server or from an image host like imgur[^109]. Because we’ll be creating small,\
    \ short-lived images dynamically from the text, we’ll simply keep them in memory\
    \ instead of saving them anywhere permanently. In order to do this, we’ll have\
    \ to mess around a bit with the Python `io` and `base64` libraries, alongside\
    \ our newly installed `wordcloud` library.\n\nTo import all the new libraries\
    \ we’ll be using to process images, modify the top of our `main.py` to look as\
    \ follows.\n\n[^109]: https://imgur.com/\n\n```python\nimport base64\nimport feedparser\n\
    import io\nimport requests\n\nfrom bs4 import BeautifulSoup\nfrom wordcloud import\
    \ WordCloud\nfrom flask import Flask\nfrom flask import render_template\n```\n\
    \nWe'll be converting the text from each article into a separate word cloud, so\
    \ it'll be useful to have another helper function that can take text as input\
    \ and produce the word cloud as output. We can use `base64` to represent the images,\
    \ which can then be displayed directly in our visitors' web browsers.\n\nAdd the\
    \ following function to the `main.py` file.\n\n```python\ndef get_wordcloud(text):\n\
    \    pil_img = WordCloud().generate(text=text).to_image()\n    img = io.BytesIO()\n\
    \    pil_img.save(img, \"PNG\")\n    img.seek(0)\n    img_b64 = base64.b64encode(img.getvalue()).decode()\n\
    \    return img_b64\n```\n\nThis is probably the hardest part of our project in\
    \ terms of readability. Normally, we'd generate the word cloud using the `wordcloud`\
    \ library and then save the resulting image to a file. However, because we don't\
    \ want to use our file system here, we'll create a `BytesIO` Python object in\
    \ memory instead and save the image directly to that. We'll convert the resulting\
    \ bytes to `base64` in order to finally return them as part of our HTML response\
    \ and show the image to our visitors.\n\nIn order to use this function, we'll\
    \ have to make some small tweaks to the rest of our code.\n\nFor our template,\
    \ in the `home.html` file, change the for loop to read as follows.\n\n```\n{%\
    \ for article in articles %}\n    <img src=\"data:image/png;base64,{{article}}\"\
    >{% endfor %}\n```\n\nNow instead of displaying our article in `<p>` tags, we'll\
    \ put it inside an `<img/>` tag so that it can be displayed as an image. We also\
    \ specify that it is formatted as a png and encoded as base64.\n\nThe last thing\
    \ we need to do is modify our `home()` function to call the new `get_wordcloud()`\
    \ function and to build and render an array of images instead of an array of text.\
    \ Change the `home()` function to look as follows.\n\n[^110]: https://en.wikipedia.org/wiki/Base64\n\
    \n```python\n@app.route(\"/\")\ndef home():\n    feed = feedparser.parse(BBC_FEED)\n\
    \    clouds = []\n\n    for article in feed['entries'][:LIMIT]:\n        text\
    \ = parse_article(article['link'])\n        cloud = get_wordcloud(text)\n    \
    \    clouds.append(cloud)\n    return render_template('home.html', articles=clouds)\n\
    ```\n\nWe made changes on lines 4, 8, 9, and 10, to change to a `clouds` array,\
    \ populate that with images from our `get_wordcloud()` function, and return that\
    \ in our `render_template` call.\n\nIf you restart the Repl and refresh the page,\
    \ you should see something similar to the following. We can see the same content\
    \ from the articles, however, we can now see the important keywords without having\
    \ to read the entire article.\n\n![](img/48efb5586f6da072fc1456bee6971293_165_0.png)\n\
    \nFor a larger view, you can pop out the website in a new browser tab using the\
    \ button in the top right of the Repl editor (indicated in red above).\n\nThe\
    \ last thing we need to do is add some styling to make the page look a bit prettier\
    \ and link the images to the original articles."
