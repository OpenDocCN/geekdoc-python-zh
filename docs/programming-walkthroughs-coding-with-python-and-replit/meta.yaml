  md: '# Quicksort tutorial: Python implementation with line by line explanation


    In this tutorial, we''ll be going over the [Quicksort](https://en.wikipedia.org/wiki/Quicksort)
    algorithm with a line-by-line explanation. We''ll go through how the algorithm
    works, build it in Repl.it and then time it to see how efficient it is.


    # Overview and requirements


    We''re going to assume that you already know at least something about [sorting
    algorithms](https://en.wikipedia.org/wiki/Sorting_algorithm), and have been introduced
    to the idea of Quicksort. By the end of this tutorial, you should have a better
    understanding of how it works.


    We''re also going to assume that you''ve covered some more fundamental computer
    science concepts, especially [recursion](https://en.wikipedia.org/wiki/Recursion#In_computer_science),
    on which Quicksort relies.


    To recap, Quicksort is one of the most efficient and most commonly used algorithms
    to sort a list of numbers. Unlike its competitor, Mergesort, Quicksort can sort
    a list in place, without the need to create a copy of the list, and therefore
    saving on memory requirements.


    The main intuition behind Quicksort is that if we can efficiently *partition*
    a list, then we can efficiently sort it. Partitioning a list means that we pick
    a *pivot* item in the list, and then modify the list to move all items larger
    than the pivot to the right and all smaller items to the left.


    Once the pivot is done, we can do the same operation to the left and right sections
    of the list recursively until the list is sorted.


    Here''s a Python implementation of Quicksort. Have a read through it and see if
    it makes sense. If not, read on below!'
