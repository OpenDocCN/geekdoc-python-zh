    \ consisting of:\n\n+   - width: Width of PNG image in pixels\n- height: Height\
    \ of PNG image in pixels\n- rows: A sequence or iterator for the row data\n- info:\
    \ An info dictionary containing some meta data\n\nWe are primarily interested\
    \ in the third item, “rows”, which is an iterator containing all the pixels of\
    \ the image, row by row. If you’re not familiar with Python generators take a\
    \ look at [this guide](https://realpython.com/introduction-to-python-generators/),\
    \ but they are essentially memory-efficient lists.\n\n# Encoding the image with\
    \ the message\n\nNow that we have the encoded message and pixels of the image\
    \ ready we can combine them to form our secret encoded image.\nAdd the following\
    \ function to the bottom of the main.py file. This function takes in the outputs\
    \ from the previous functions (our raw pixels and our message encoded as a binary\
    \ string), and combines them.\n\n```\ndef encode_pixels_with_message(pixels, bytestring):\n\
    \    '''modifies pixels to encode the contents from bytestring'''\n\n    enc_pixels\
    \ = []\n    string_i = 0\n    for row in pixels:\n        enc_row = []\n     \
    \   for i, char in enumerate(row):\n            if string_i >= len(bytestring):\n\
    \                pixel = row[i]\n            else:\n                if row[i]\
    \ % 2 != int(bytestring[string_i]):\n                    if row[i] == 0:\n   \
    \                     pixel = 1\n                    else:\n                 \
    \       pixel = row[i] - 1\n                else:\n                    pixel =\
    \ row[i]\n                string_i += 1\n            enc_row.append(pixel)\n \
    \       enc_pixels.append(enc_row)\n    return enc_pixels\n```\n\n204 https://realpython.com/introduction-to-python-generators/"
