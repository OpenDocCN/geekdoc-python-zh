    \n![](img/48efb5586f6da072fc1456bee6971293_230_0.png)\n\n## 更新和删除数据库条目\n\n作为本教程的最后一步，我们希望能够更新和删除集合中的数据库文档。为了使事情更简单，我们将创建一个新的\
