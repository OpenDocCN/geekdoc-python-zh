    Make a new file called get.html with the following contents:


    ```

    1 <!DOCTYPE html>

    2 <html>

    3 <body>

    4   <form action="/get-client" method="GET">

    5     <label for="name" >Customer name *</label><br>

    6     <input type="text" id="name" name="name" class="textInput" placeholder="John
    Smith" required>

    7     <input type="submit" value="Get customer">

    8   </form>

    9 </body>

    10 </html>

    ```


    This makes a simple form with an input for the customer’s name and a button.


    ![](img/48efb5586f6da072fc1456bee6971293_232_1.png)


    Clicking this button will then make a GET call to /get-client which will respond
    with the client details where we will be able to update or delete them.

    To actually see the customer details on a form after requesting them, we need
    a templating engine to render them onto the HTML page and send the rendered page
    back to us. With a templating engine, you define a template - a page with variables
    in it - and then give it the values you want to fill into the variables. In our
    case, we’re going to request the customer details from the database and tell the
    templating engine to render them onto the page.

    We’re going to use a templating engine called Pug[^182]. Pug is a simple templating
    engine that


    [^182]: https://pugjs.org/api/getting-started.html'
  - "[PAGE 233]\n\nintegrates fully with Express. The syntax that Pug uses is very\
    \ similar to HTML. One important difference in the syntax is that spacing is very\
    \ important as it determines your parent/child hierarchy.\n\nFirst, we need to\
    \ tell Express which templating engine to use and where to find our templates.\
    \ Put the following line above your route definitions (i.e. after the other app.\
    \ lines in index.js):\n\n```\njavascript\napp.engine('pug', require('pug').__express)\n\
    app.set('views', '.')\napp.set('view engine', 'pug')\n\n```\n\nNow create a new\
    \ file called update.pug with the following content:\n\n```\npug\nhtml\n  body\n\
    \    p #{message}\n    h2= 'Customer details'\n    form(method='POST' action='/update')\n\
    \      input(type='hidden' id='oldname' name='oldname' value=oldname)\n      input(type='hidden'\
    \ id='oldaddress' name='oldaddress' value=oldaddress)\n      input(type='hidden'\
    \ id='oldtelephone' name='oldtelephone' value=oldtelephone)\n      input(type='hidden'\
    \ id='oldnote' name='oldnote' value=oldnote)\n      label(for='name') Customer\
