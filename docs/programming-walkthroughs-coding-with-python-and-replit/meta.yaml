    \n<sup>171</sup>https://wiki.archlinux.org/index.php/environment_variables\n\n\
    ![](img/48efb5586f6da072fc1456bee6971293_217_0.png)\n\nJson response from OpenWeatherMap\n\
    \nLet’s write one last function in our `views.py` file to replicate this call\
