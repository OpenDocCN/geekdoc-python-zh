    We’ll be building a simple web application step-by-step and explaining each line
    of code in detail. To follow, you should have some basic knowledge of programming
    and web concepts, such as what if statements are and how to use URLs. We’ll be
    using Python for this tutorial, but we won’t assume that you’re a Python expert.


    Specifically, we’ll:'
