    ⁸https://repl.it/talk/all\n⁹https://repl.it/discord\n\n## 使用 Repl.it 处理文件\n\n\
    在本课中，你将学习如何使用 Repl.it 操作和处理文件。在上一课中，你看到了如何向项目添加新文件，但你能做的远不止于此。\n\n文件可用于多种不同的用途。在编程中，你主要使用它们来存储数据或代码。除了手动创建文件并输入数据外，你还可以使用你的程序来创建文件并自动将数据写入其中。\n\
    \nRepl.it 还提供了从 IDE 批量导入或导出文件的功能；当你的程序将数据写入多个文件，而你希望将所有这些文件导出以在另一个程序中使用时，这会非常有用。\n\
