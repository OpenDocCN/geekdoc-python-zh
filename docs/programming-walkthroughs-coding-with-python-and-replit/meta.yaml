    \ about in more detail<sup>82</sup>.\n\nTest that you can play a single note as\
    \ expected. Now you can play the first part of “Twinkle Twinkle Little Star” by\
    \ defining all of the notes and durations, and then looping through them, calling\
    \ play_note on each in turn.\n\n```python\nnotes = [\"C\", \"C\", \"G\", \"G\"\
    , \"A\", \"A\", \"G\", \"F\", \"F\", \"E\", \"E\", \"D\", \"D\", \"C\"]\ndurations\
    \ = [2, 2, 2, 2, 2, 2, 4, 2, 2, 2, 2, 2, 2, 4]\n\nfor i in range(len(notes)):\n\
    \    play_note(notes[i], durations[i])\n```\n\nWe can also control the volume\
    \ of each tone by passing a volume argument to play_tone(). As for audio files,\
    \ this is a float where 1 represents 100% volume. If we wanted to implement a\
