    # Creating a Repl and installing our Discord dependencies


    The first thing we need to do is create a Node.js Repl to write the code for our
    Discord bot. Over at repl.it¹³⁴, create a new Repl, choosing “Node.js” as your
    language.


    We don’t need to reinvent the wheel as there is already a great Node wrapper for
    the Discord bot API called discord.js¹³⁵. Normally we would install this third-party
    library through npm¹³⁶, but because we’re using Repl.it, we can skip the installation.
    Our Repl will automatically pull in all dependencies.


