    \ see a file called ‘tree.png’. If you open it, your tree graph should look as\
    \ follows:\n\n![](img/48efb5586f6da072fc1456bee6971293_244_0.png)\n\nImage: 1\
    \ A visualised decision tree\n\nThe above shows a decision tree that only learned\
    \ two rules. The first rule (top square) is about the word “hate”. The rule is\
    \ “is the number of times ‘hate’ occurs in this sentence less than or equal to\
    \ 0.5”. None of our sentences contain duplicate words, so each rule will really\
    \ be only about whether the word appears or not (you can think of the <= 0.5 rules\
    \ as < 1 in this case).\n\nFor each question in our training dataset, we can ask\
    \ if the first rule is True or False. If the rule is True for a given sentence,\
    \ we’ll move that sentence down the tree **left**. If not, we’ll go **right**.\n\
    \nOnce we’ve asked this first question for each sentence in our dataset, we’ll\
    \ have three sentences for which the answer is “False”, because three of our training\
    \ sentences contain the word “hate”. These three sentences go right in the decision\
    \ tree and end up at first leaf node (an end node with no arrows coming out the\
    \ bottom). This leaf node has value = [3,0] in it, which means that three samples\
    \ reach this node, and three belong to the negative class and zero to the positive\
    \ class.\n\nFor each sentence where the first rule is “True” (the word “hate”\
    \ appears less than 0.5 times, or in our case 0 times), we go down the left of\
    \ the tree, to the node where value = [2,5]. This isn’t a leaf node (it has more\
    \ arrows coming out the bottom), so we’re not done yet. At this point we have\
    \ two negative sentences and all five positive sentences still.\n\nThe next rule\
    \ is “bad <= 0.5”. In the same way as before, we’ll go down the right path if\
    \ we have more than 0.5 occurrences of “bad” and left if we have fewer than 0.5\
