    \ do anything. We’ll change that in the next step by using JavaScript to get our\
    \ user’s IP Address.\n\n# # Calling IPIFY from JavaScript\n\nAn IP address is\
    \ like a phone number. When you visit “google.com”, your computer actually looks\
    \ up the the name google.com to get a resulting IP address that is linked to one\
    \ of Google’s servers. While people find it easier to remember names like “google.com”,\
    \ computers work better with numbers. Instead of typing “google.com” into your\
    \ browser toolbar, you could type the IP address 216.58.223.46, with the same\
    \ results. Every device connecting to the internet, whether to serve content (like\
    \ google.com) or to consume it (like you, reading this tutorial) has an IP address.\n\
    \nIP addresses are interesting to us because it is possible to guess a user’s\
    \ location based on their IP address. (In reality, this is an imprecise and highly\
    \ complicated process, but for our purposes it will be more than adequate). We\
