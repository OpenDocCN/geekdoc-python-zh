    \ https://repl.it/github/<githubproject>，所以我的情况是，我在浏览器中打开 https://repl.it/github/sixhobbits/flask-hello-world（你需要替换为你自己的GitHub用户名才能生效）。\n\
    \n像之前一样，重新配置 .replit 文件并打开版本控制选项卡。在“你更改了什么”下方，输入“添加 .repl 文件”或类似的信息来描述你正在做的贡献，然后点击提交并推送。\n\
    \n你会再次看到错误，并被提供将你的Repl.it账户连接到GitHub的选项，以证明你授权Repl.it代表你在GitHub上进行这些更改。\n\n你可以授予Repl.it访问你所有仓库的权限（如果你经常使用此集成功能会很有用），但默认情况下，它只会获得我们正在处理的特定仓库的权限。\n\
