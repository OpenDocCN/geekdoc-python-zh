    # # Webpages: beauty and the beast


    You have no doubt visited web pages using a web browser before. Websites exist
    in two forms:


    +   1. The one you are used to, where you can see text, images, and other media.
    Different fonts, sizes, and colours are used to display information in a useful
    and (usually) aesthetic way.

    2. The “source” of the webpage. This is the computer code that tells your web
    browser (e.g. Mozilla Firefox or Google Chrome) what to display and how to display
    it.


    Websites are created through a combination of three computer languages: HTML,
    CSS and JavaScript. This in itself is a huge and complicated field with a messy
    history, but having a basic understanding of how some of it works is necessary
    to automate web scraping effectively. If you open any website in your browser
    and right-click somewhere on the page, you’ll see a menu which should include
    an option to “view page source” – to inspect the code form of a website, before
    your web browser interprets it.


    This is shown in the image below: a normal web page on the left, with an open
    menu (displayed by right-clicking on the page). Clicking “view page source” on
    this menu produces the result on the right – we can see the code that contains
    all the data and supporting information that the web browser needs to display
    the complete page. While the page on the left is easy to read, use, and looks
    good, the one on the right is a monstrosity. It takes some effort and experience
    to make any sense of it, but it’s possible and necessary if we want to write custom
    web scrapers.'
