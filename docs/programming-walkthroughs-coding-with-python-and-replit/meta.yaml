- md: 'Let’s assume for now that we want to find all the news articles on the BBC
    News homepage, and get their URLs. If we look at the main page below, we’ll see
    there are a bunch of stories on the home page. By mousing over any of the headlines
    with the “inspect” tool, we can see that each has a unique URL which takes us
    to that news story. For example, mousing over the main “US and Canada agree new
    trade deal” story in the image below is a link to https://www.bbc.com/news/business-45702609.


    If we inspect that element using the browser’s developer tools, we can see it
    is a <a> element, which is HTML for a link, with an <href> component that points
    to the URL. Note that the href section goes only to the last part of the URL,
    omitting the https://www.bbc.com part. Because we are already on BBC, the site
