    with PyGame, covering how to develop a 2D game with animated sprites and user
    interaction. In this tutorial, we’ll go a step further and create a 2D platformer,
    where you can have an alien walk and jump around a room full of boxes. The previous
    PyGame tutorial is not a prerequisite for trying this one.


