    # Deleting entire lines


    There may be instances where you’d want to delete large chunks of code at a time
    (it happens to the best of us!).


    Pressing Ctrl+Shift+K (cmd+shift+K on MacOS) deletes the line underneath your
    cursor (or if you have multiple lines selected it will delete all of them.)


    Instead of deleting the entire line, you can also delete from your cursor up to
    the end of the line or from your cursor to the beginning of the line. The shortcuts
    for these are


    +   - Ctrl+Backspace (cmd+backspace on MacOS) to delete backwards

    - Ctrl+K (same on MacOS) to delete forwards


    As an example, below you can see how we might use this to first delete one of
    our elif blocks by doing two “delete line” operations. We then change our random
    speed to be constant by using a “delete to end of line” operation from the = sign
    and then typing our constant.'
