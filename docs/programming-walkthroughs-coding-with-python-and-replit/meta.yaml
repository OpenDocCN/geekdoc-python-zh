    Because `requests` is one of the most commonly used Python libraries, Repl.it
    probably installed it in a slightly different way from most packages. However,
    `beautifulsoup4` is less common and this will have been installed in the standard
    way using `poetry`<sup>20</sup>.


    If you go back to the files tab, you''ll see two new files `poetry.lock` and `pyproject.toml`
    which were created automatically by the installer. Take a look inside the `pyproject.toml`
    file.


    ![](img/48efb5586f6da072fc1456bee6971293_35_0.png)


    In this case, line 9 says that our project relies on the `beautifulsoup4` package
    and needs at least version 4.9.1. If we look at the [beautifulsoup page on PyPi](https://pypi.org/project/beautifulsoup4/)<sup>21</sup>,
    we''ll see that the latest stable version is 4.9.1, so if this project is run
    in the future and there is a new version available, it will automatically use
