  md: '# Hiding messages in images: steganography with Python and Repl.it


    In this tutorial, we’ll build a steganography tool in Python. Steganography is
    the practice of hiding information within other data. Unlike encryption, where
    the goal is to secure *the contents* of communication between two parties, steganography
    aims to obscure the fact that the parties are communicating at all.


    Our tool will enable the user to hide secret text within a normal-looking .png
    image file. The receiver of the image will use the same tool to reveal the hidden
    message.


    We’ll use Python to build the tool. The most popular Python image processing libraries
    are [Pillow](https://pypi.org/project/Pillow/) and [OpenCV](https://pypi.org/project/opencv-python/),
    but these are heavy libraries with many dependencies. We’ll avoid these and instead
    use the lightweight [PyPNG](https://pypi.org/project/pypng/) library which is
    written in pure Python, and therefore easier to run on various platforms.


    # A quick background on steganography


    Let’s imagine three people: Alice, Bob and Eve. Alice wants to send a private
    message to Bob, while Eve wants to intercept this message. While modern-day encryption
    can help Alice and Bob ensure that Eve doesn’t know the *contents* of their message,
    Eve can possibly still deduce interesting information just from knowing that Alice
    and Bob are communicating at all, and how frequently they communicate.


    To obscure the communication channel completely, Alice and Bob can exploit the
    fact that hundreds of millions of photos are uploaded and shared across the internet
    daily. Instead of communicating directly, Alice can leave her message hidden in
    an image at a pre-agreed location and Bob can access this message. From Eve’s
    perspective, there is now no direct communication between the two.


    A single image is made up of millions of pixels. While many formats exist, a pixel
    is most simply represented by a group of three numbers between 0 and 255, one
    number each for the red, blue, and green values of that pixel. Using this Red-Green-Blue
    scheme we can represent any colour in the [RGB color model](https://en.wikipedia.org/wiki/RGB_color_model).


    197 https://pypi.org/project/Pillow/

    198 https://pypi.org/project/opencv-python/

    199 https://pypi.org/project/pypng/

    200 https://en.wikipedia.org/wiki/RGB_color_model'
  merge: -1
  pgno: 257
- img_proc: true
  md: 'Digital text, like images, is also represented internally by numbers, so the
    differences between a text file and an image file are not as large as you might
    assume. Any digital data can be represented as a [binary string](https://thehelloworldprogram.com/computer-science/what-is-binary/),
    a bunch of 1s and 0s, and we can make tiny modifications to an image to encode
    a binary string within it. As an example, consider the following:


    ```

    python

    image = [(255, 0, 0), (0, 255, 0), (0, 0, 255)]


    ```


    This is a representation of an image with three pixels: one red, one green, and
    one blue. If we encode this as an image and open it in an image viewer, we’ll
    see the three pixel image, but if we read this data with Python, it is simply
    a list of tuples, each containing three integers.


    We could also look at each value making up each pixel and calculate whether it
    is *odd* or *even*. We could encode odd numbers as 1 and even values as 0. This
    would give us the binary string “100 010 001” (as the 255 values are odd and the
    0s are even).


    If we made a small modification to the image as follows:


    ```

    python

    image = [(254, 1, 1), (1, 255, 1), (1, 0, 254)]


    ```


    The image would look almost identical in any image viewer (we have just added
    or subtracted a minuscule amount of color from some values), but the binary string
    – using our odd/even method – would look completely different: “011 111 100”.


    Using this technique but extending it over an entire image (millions of pixels),
    we can hide a large amount of text data in any image.


    # # Creating the project on Repl.it


    If you were serious about keeping your messages as secret as possible, you’d want
    to do all of these steps on an offline computer that you fully control. As a learning
    exercise though, we’ll set the project up on [repl.it](https://repl.it). Navigate
    to their site and sign up for an account if you don’t have one.


    Create a new project, choosing “Python” as the language, and give your project
    a name.


    > <sup>201</sup>https://thehelloworldprogram.com/computer-science/what-is-binary/

    <sup>202</sup>https://repl.it'
