    <sup>196</sup>https://repl.it/discord\n\n## 在图像中隐藏信息：使用Python和Repl.it进行隐写术\n\n\
    在本教程中，我们将使用Python构建一个隐写术工具。隐写术是将信息隐藏在其他数据中的实践。与加密（其目标是确保通信双方*内容*的安全）不同，隐写术旨在模糊双方正在通信这一事实。\n\
    \n我们的工具将使用户能够将秘密文本隐藏在一个看起来普通的.png图像文件中。图像的接收者将使用相同的工具来揭示隐藏的消息。\n\n我们将使用Python来构建这个工具。最流行的Python图像处理库是[Pillow](https://pypi.org/project/Pillow/)和[OpenCV](https://pypi.org/project/opencv-python/)，但这些是依赖项繁多的重量级库。我们将避免使用它们，而是使用轻量级的[PyPNG](https://pypi.org/project/pypng/)库，它由纯Python编写，因此更容易在各种平台上运行。\n\
    \n### 隐写术简要背景\n\n让我们想象三个人：Alice、Bob和Eve。Alice想给Bob发送一条私密消息，而Eve想截获这条消息。虽然现代加密可以帮助Alice和Bob确保Eve不知道他们消息的*内容*，但Eve仍然可能仅从知道Alice和Bob正在通信以及他们通信的频率中推断出有趣的信息。\n\
    \n为了完全模糊通信渠道，Alice和Bob可以利用每天有数亿张照片在互联网上上传和共享这一事实。Alice可以不直接通信，而是将她的消息隐藏在一张预先约定位置的图片中，Bob可以访问这条消息。从Eve的角度来看，现在两人之间没有直接的通信。\n\
    \n一张图像由数百万个像素组成。虽然存在多种格式，但一个像素最简单的表示方式是三个介于0到255之间的数字，分别代表该像素的红色、蓝色和绿色值。使用这种红-绿-蓝方案，我们可以表示[RGB颜色模型](https://en.wikipedia.org/wiki/RGB_color_model)中的任何颜色。\n\
