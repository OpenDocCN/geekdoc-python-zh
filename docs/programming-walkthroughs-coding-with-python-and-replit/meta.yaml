    \ does what we expect, but it doesn’t tell us about how efficient Quicksort is\
    \ - so let’s take a closer look. Replace the code in main.py with the following,\
    \ and again add the code listed at the beginning of this tutorial after the imports\
    \ on line 3.\n\n```\n1 from datetime import datetime\n2 import random\n3 \n4 #\
    \ create 100000 random numbers between 1 and 1000\n5 xs = [random.randrange(1000)\
    \ for _ in range(100000)]\n6 \n7 # look at the first few and last few\n8 print(xs[:10],\
    \ xs[-10:])\n9 \n10 # start the clock\n11 t1 = datetime.now()\n12 quicksort(xs)\n\
    13 t2 = datetime.now()\n14 print(\"Sorted list of size {} in {}\".format(len(xs),\
    \ t2 - t1))\n15 \n16 # have a look at the results\n17 print(xs[:10], xs[-10:])\n\
    ```\n\nThe code generates a random list of 100 000 numbers and sorts this list\
    \ in around 5 seconds. You can compare the performance of Quicksort to some other\
    \ common sorting algorithms using [this Repl](https://repl.it/@GarethDwyer1/sorting).\n\
    \nIf you want to try the code from the tutorial out, visit the Repl at [https://repl.it/@GarethDwyer1/quicksort](https://repl.it/@GarethDwyer1/quicksort?language=python3).\
    \ You’ll be able to run the code, see the results, and even fork it to continue\
    \ developing or testing it on your own.\n\n194 https://repl.it/@GarethDwyer1/sorting\n\
    195 https://repl.it/@GarethDwyer1/quicksort?language=python3"
