  - '[PAGE 60]


    # # Repl.it and GitHub: Using and contributing to open-source projects


    You''ve probably heard of [GitHub](https://github.com), which hosts millions of
    coding projects that you can use or learn from.


    In this tutorial, we''ll see how to:


    +   - Import open-source projects from GitHub to Repl.it so that we can run them
    or modify them

    - Integrate your own GitHub account with your Repl.it account so that you can
    work on your private projects

    - Push changes back to open-source projects as pull requests.


    We''ll use a basic Flask hello world app for the demonstrations. You can use this
    same project to follow along, or pick any other project on GitHub that interests
    you.


    # ## Importing a project from GitHub and running it on Repl.it


    We''ll use the [Flask](https://flask.palletsprojects.com/en/1.1.x/) application
    available at [https://github.com/ritza-co/flask-hello-world](https://github.com/ritza-co/flask-hello-world)
    for demonstration purposes. To import it into Repl.it, press the + new repl button,
    switch to the “Import From GitHub” tab, and paste in the GitHub URL, as shown
    below.'
- md: '## Importing a repository from GitHub to Repl.it


    Press the green `Import from GitHub` button and you’ll see Repl.it clone the repository
    and turn it into a repl. In all of our previous projects, we used the `main.py`
    file that Repl.it automatically creates for all new Python projects, and which
    it runs automatically when you press the `run` button. Note how in this GitHub
    project, we have no `main.py` file, and our code is instead in `mydemoapp.py`.
    Therefore, Repl.it will need some help from you to define how to run the project.
    This is configured through another special file named `.replit`. Because there
    was no `main.py` file, Repl.it automatically created this file and will prompt
    you to configure it.


    ## Adding a .replit file to indicate how the project should be run


    Select the language (Python) from the first dropdown and type `python mydemoapp.py`
    in the “configure the run button” input. Every time you press the `run` button,
    Repl.it will execute the command given here. If you prefer, you can also edit
    the `.replit` file directly. If you click on it, you’ll see it now contains the
    following configuration, which matches what we provided through the GUI panel.


    ```

    language = "python3"

    run = "python mydemoapp.py"

    ```


    If you hit the `run` button, you should see the app start. As you can see, the
    web application is very basic: all it can do is display a welcome message. If
    the configuration panel doesn’t pop up automatically, you can manually create
    a file called `.replit` and add the configuration above to get the same result.


    ## Running the Flask application on Repl.it


    Some GitHub projects are very large and complicated, and you might not be able
    to run everything you need directly on Repl.it, but in many cases it just works.
    Open-source projects can be read and run by anyone, but still have restrictions
    on who can push changes to them. Next we’ll improve this project and request that
    the owner merges our changes into the original.


    ## Looking at the version control panel in Repl.it


    Repl.it includes a version control tab which shows you information about the GitHub
    repository and in some cases allows you to push your changes made in Repl.it back
    to GitHub.


    If you select this version control tab from the menu on the left, you’ll see a
    summary of the linked repository. Note that it’s already figured out what changes
    we’ve made, and it shows that the `.replit` file is new. It would be nice for
    other people who use this repository with GitHub to have the file automatically,
    so we might want to push the changes we made back to GitHub.


    Note that the owner of the repository is `ritza-co` though, so you won’t have
    write permissions for this repository. If you press the `commit & push` button,
    you’ll see an error as shown below.


    ## Forking the project to your own GitHub account


    Usually when contributing to open-source projects, you’ll first create a “fork”
    of the original project. This means that you make your own version of the project
    and, as it’s yours, you can make any changes to it that you want. If you think
    these changes would be useful to others too and are an obvious improvement over
    the original project, you can make a “pull request”, which asks the owner of the
    original project to merge your changes into the main canonical project.


    Create an account on github.com or log in to your existing one and navigate back
    to the original project (https://github.com/ritza-co/flask-hello-world). In the
    top right corner, press the Fork button to create a copy of the project in your
    own GitHub account.


    You should be taken to a new page in GitHub that looks very similar to the old
    one but which is owned by your own GitHub username. My GitHub username is sixhobbits
    so the new URL for me is https://github.com/sixhobbits/flask-hello-world (but
    yours will be different).


    Now, instead of cloning the original project into Repl.it, create a new repl and
    import this fork of the project instead. Instead of going through the import UI
    again, you can also just create and load the relevant import URL. These URLs are
    in the format https://repl.it/github/<githubproject> so in my case I open https://repl.it/github/sixhobbits/flask-hello-world
    in my browser (you need to substitute your own GitHub username for this to work).


    Configure the .replit file again and open the version control tab, as before.
    Under “what did you change” enter “add .repl file” or a similar message to describe
    what contributions you’re making, and press commit and push.


    You’ll see the error again and be presented with the option to connect your Repl.it
    account to GitHub to prove that you authorise Repl.it to make these changes to
    GitHub on your behalf.


    You can give Repl.it access to all of your repositories (useful if you want to
    use this integration a lot), but by default it will only get permission for the
    specific repository that we’re working with.


    ## Repository access


    ## Danger zone


    | | |

    |---|---|

    | Uninstall "Repl.it Online IDE" <br> This will remove the app and revoke access
    to all resources. | Uninstall |


    Press the green approve button and you’ll be directed back to Repl.it. Press the
    commit & push button again on Repl.it and this time everything should work without
    any errors.


    Navigate back to your fork of the GitHub project, and you should see that the
    changes are reflected in GitHub too.


    As you can see, the new .replit file is visible and GitHub prompts you to make
    a pull request back into the original repository. Press Pull request, create pull
    request, add a comment explaining why your changes should be merged into the original
    repository, and click Create pull request again.


    ## Open a pull request


    Create a new pull request by comparing changes across two branches. If you need
    to, you can also compare across forks.


    The owner of the repository will get a notification about your proposal and can
    choose to add your changes or reject them (in this case, don’t be too hopeful
    about your changes being accepted as the `.replit` file being missing is important
    to follow along the earlier steps of this tutorial ☒).


    ## Make it your own


    For this tutorial, it’s important that you do the steps yourself so that everything
    is correctly linked to your own GitHub account, but if you want an example to
    play with, use the one below. It’s the same as the Flask app but it can greet
    individual users dynamically instead of having a static welcome message.


    Visit [https://cwr-06-github--garethdwyer1.repl.co/Gareth](https://cwr-06-github--garethdwyer1.repl.co/Gareth)
    to see it in action (replace the last part of the URL with your own name to receive
    a personalised greeting). You can fork our repl from [https://repl.it/@GarethDwyer1/cwr-06-github](https://repl.it/@GarethDwyer1/cwr-06-github)


    Can you figure out how it works?


    ## Where next?


    Cloning repositories and being able to immediately run them is useful in many
    scenarios, from just wanting to try out a cool project that you found to running
    production workflows.


    Open-source software only exists because of people who build, maintain, and improve
    it. There’s no global committee that decides who gets to be an open-source software
    developer and you can be one too. Find a project that you like, look at the “Issues”
    tab on GitHub to see what problems exist, and try to fix one. Many issues on GitHub
    are tagged with “Good first issue” to help direct newer developers to places where
    they can get started.


    In the next tutorial, we’ll do something a bit different and build a 2D game using
    PyGame.'
  mdcn: '## 从 GitHub 将仓库导入 Repl.it


    点击绿色的 `Import from GitHub` 按钮，你会看到 Repl.it 克隆仓库并将其转换为一个 repl。在我们之前的所有项目中，我们使用的是
    Repl.it 为所有新 Python 项目自动创建的 `main.py` 文件，并且当你按下 `run` 按钮时，它会自动运行该文件。请注意，在这个 GitHub
    项目中，我们没有 `main.py` 文件，我们的代码位于 `mydemoapp.py` 中。因此，Repl.it 需要你提供一些帮助来定义如何运行项目。这通过另一个名为
    `.replit` 的特殊文件进行配置。由于没有 `main.py` 文件，Repl.it 自动创建了此文件，并会提示你进行配置。


    ## 添加一个 .replit 文件以指示项目应如何运行


    从第一个下拉菜单中选择语言（Python），并在“configure the run button”输入框中输入 `python mydemoapp.py`。每次按下
    `run` 按钮时，Repl.it 都会执行此处给出的命令。你也可以选择直接编辑 `.replit` 文件。如果你点击该文件，会看到它现在包含以下配置，这与我们通过图形界面面板提供的配置一致。


    ```

    language = "python3"

    run = "python mydemoapp.py"

    ```


    如果你点击 `run` 按钮，应该会看到应用启动。如你所见，这个 Web 应用非常基础：它唯一能做的就是显示一条欢迎消息。如果配置面板没有自动弹出，你可以手动创建一个名为
    `.replit` 的文件，并添加上述配置以获得相同的结果。


    ## 在 Repl.it 上运行 Flask 应用


    有些 GitHub 项目非常庞大和复杂，你可能无法直接在 Repl.it 上运行所有需要的内容，但在许多情况下它是直接可以工作的。开源项目可以被任何人阅读和运行，但仍然对谁可以向它们推送更改有限制。接下来我们将改进这个项目，并请求所有者将我们的更改合并到原始项目中。


    ## 查看 Repl.it 中的版本控制面板


    Repl.it 包含一个版本控制选项卡，它向你显示有关 GitHub 仓库的信息，并且在某些情况下允许你将在 Repl.it 中所做的更改推送回 GitHub。


    如果你从左侧菜单中选择此版本控制选项卡，你会看到关联仓库的摘要。请注意，它已经识别出我们所做的更改，并显示 `.replit` 文件是新的。对于其他使用此
    GitHub 仓库的人来说，能够自动获得这个文件会很好，因此我们可能希望将我们所做的更改推送回 GitHub。


    但请注意，该仓库的所有者是 `ritza-co`，因此你对该仓库没有写权限。如果你按下 `commit & push` 按钮，你会看到如下所示的错误。


    ## 将项目 fork 到你自己的 GitHub 账户


    通常在为开源项目做贡献时，你首先会创建原始项目的“fork”。这意味着你制作了项目自己的版本，并且既然是你的，你就可以对其进行任何想要的更改。如果你认为这些更改对其他人也有用，并且明显改进了原始项目，你可以发起一个“pull
    request”，请求原始项目的所有者将你的更改合并到主项目中。


    在 github.com 上创建一个账户或登录你的现有账户，并导航回原始项目（https://github.com/ritza-co/flask-hello-world）。在右上角，按下
    Fork 按钮以在你自己的 GitHub 账户中创建该项目的副本。


    你应该会被带到 GitHub 上一个看起来与旧页面非常相似的新页面，但它由你自己的 GitHub 用户名拥有。我的 GitHub 用户名是 sixhobbits，所以对我来说新的
    URL 是 https://github.com/sixhobbits/flask-hello-world（但你的会不同）。


    现在，不要将原始项目克隆到 Repl.it 中，而是创建一个新的 repl 并导入这个 fork 项目的版本。除了再次通过导入 UI 操作外，你也可以直接创建并加载相关的导入
    URL。这些 URL 的格式是 `https://repl.it/github/<githubproject>`，所以以我为例，我在浏览器中打开 `https://repl.it/github/sixhobbits/flask-hello-world`（你需要替换为你自己的
    GitHub 用户名才能使其工作）。


    再次配置 .replit 文件并打开版本控制选项卡，和之前一样。在“what did you change”下输入“add .repl file”或类似的信息来描述你所做的贡献，然后按下
    commit 和 push。


    你会再次看到错误，并看到一个选项，将你的 Repl.it 账户连接到 GitHub，以证明你授权 Repl.it 代表你对 GitHub 进行这些更改。


    你可以授予 Repl.it 对所有你的仓库的访问权限（如果你经常使用此集成功能的话很有用），但默认情况下，它只会获得我们正在处理的特定仓库的权限。


    ## 仓库访问


    ## 危险区域


    | | |

    |---|---|

    | 卸载 "Repl.it Online IDE" <br> 这将移除应用并撤销对所有资源的访问权限。 | 卸载 |


    按下绿色的批准按钮，你将被引导回 Repl.it。再次按下 Repl.it 上的 commit & push 按钮，这次应该可以毫无错误地工作。


    导航回你的 GitHub 项目的 fork，你应该也会在 GitHub 中看到这些更改已反映出来。


    如你所见，新的 .replit 文件是可见的，并且 GitHub 提示你发起拉取请求以合并回原始仓库。按下 Pull request，创建拉取请求，添加一条评论解释为什么你的更改应该被合并到原始仓库中，然后再次点击
    Create pull request。


    ## 打开一个拉取请求


    通过比较两个分支之间的更改来创建一个新的拉取请求。如果需要，你也可以跨 fork 进行比较。


    仓库的所有者会收到关于你的提议的通知，并可以选择添加你的更改或拒绝它们（在这种情况下，不要对你的更改被接受抱太大希望，因为缺少 `.replit` 文件对于按照本教程前面的步骤操作很重要
    ☒）。


    ## 将其化为己有


    对于本教程，重要的是你自己执行这些步骤，以便所有内容都正确链接到你自己的 GitHub 账户，但如果你想尝试一个示例，请使用下面这个。它与 Flask 应用相同，但它可以动态地向个别用户打招呼，而不是使用静态的欢迎消息。


    访问 [https://cwr-06-github--garethdwyer1.repl.co/Gareth](https://cwr-06-github--garethdwyer1.repl.co/Gareth)
    查看其运行效果（将 URL 的最后一部分替换为你自己的名字以收到个性化问候）。你可以从 [https://repl.it/@GarethDwyer1/cwr-06-github](https://repl.it/@GarethDwyer1/cwr-06-github)
    fork 我们的 repl。


    你能弄清楚它是如何工作的吗？


    ## 下一步是什么？


    克隆仓库并能够立即运行它们，在许多场景中都很有用，从只是想试试你发现的一个很酷的项目，到运行生产工作流。


    开源软件的存在完全依赖于构建、维护和改进它的人们。没有一个全球委员会决定谁可以成为开源软件开发者，你也可以成为其中一员。找到一个你喜欢的项目，查看 GitHub
    上的“Issues”标签，看看存在哪些问题，并尝试解决一个。GitHub 上的许多问题都被标记为“Good first issue”，以帮助指引新开发者找到可以开始的地方。


    在下一个教程中，我们将做些不同的事情，使用 PyGame 构建一个 2D 游戏。'
