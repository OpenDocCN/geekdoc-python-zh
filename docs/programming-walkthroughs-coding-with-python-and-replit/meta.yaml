- md: "# Adding some finishing touches\n\nOur text looks a bit stark, and our images\
    \ touch each other, which makes it hard to see that they are separate images.\
    \ We'll fix that up by adding a few lines of CSS and importing the Bootstrap framework.\n\
    \n## Adding CSS\n\nEdit the `home.html` file to look as follows\n\n```\nhtml\n\
    <html>\n    <head>\n        <title>News in WordClouds | Home</title>\n       \
    \ <link rel=\"stylesheet\" href=\"https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css\"\
    \ integrity=\"sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg119a69psu\"\
    \ crossorigin=\"anonymous\">\n\n        <style type=\"text/css\">\n          \
    \  body {padding: 20px;}\n            img{padding: 5px;}\n        </style>\n \
    \   </head>\n\n    <body>\n        <h1>News Word Clouds</h1>\n            <p>Too\
    \ busy to click on each news article to see what it's about? Below you can see\
    \ all the articles from the BBC front page, displayed as word clouds. If you want\
    \ to read more about any particular article, just click on the wordcloud to go\
    \ to the original article</p>\n            {% for article in articles %}\n   \
    \             <a href=\"{{article.url}}\"><img src=\"data:image/png;base64,{{article.image}}\"\
    ></a>\n            {% endfor %}\n    </body>\n</html>\n```\n\nOn **line 3** we\
    \ add a title, which is displayed in the browser tab. On **line 4**, we import\
    \ **Bootstrap**[^1], which has some nice CSS defaults right out the box (it's\
    \ probably a bit heavy-weight for our project as we have so little content and\
    \ won't use most of Bootstrap's features, but it's nice to have if you're planning\
    \ on extending the project.)\n\n[^1]: https://getbootstrap.com/\n\nOn lines 6-8,\
    \ we add padding to the main body to stop the text going to close to the edges\
    \ of the screen, and also add padding to our images to stop them touching each\
    \ other.\n\nOn line 16, we use an `<a>` tag to add a link to our image. We also\
    \ change the Jinja templates to `{{article.url}}` and `{{article.image}}` so that\
    \ we can have images that link back to the original news article.\n\nNow we need\
    \ to tweak our backend code again to pass through the URL and image for each article,\
    \ as the template currently doesn’t have access to the URL.\n\n## Passing through\
    \ the URLs\n\nTo easily keep track of pairs of URLs and images, we’ll add a basic\
    \ Python helper class called Article. In the `main.py` file, add the following\
    \ code before the function definitions.\n\n```python\nclass Article:\n    def\
    \ __init__(self, url, image):\n        self.url = url\n        self.image = image\n\
    ```\n\nThis is a simple class with two attributes: `url` and `image`. We’ll store\
    \ the original URL from the RSS feed in `url` and the final base64 wordcloud in\
    \ `image`.\n\nTo use this class, modify the `home()` function to look as follows.\n\
    \n```python\n@app.route(\"/\")\ndef home():\n    feed = feedparser.parse(BBC_FEED)\n\
    \    articles = []\n\n    for article in feed['entries'][:LIMIT]:\n        text\
    \ = parse_article(article['link'])\n        cloud = get_wordcloud(text)\n    \
    \    articles.append(Article(article['link'], cloud))\n    return render_template('home.html',\
    \ articles=articles)\n```\n\nWe changed the name of our `clouds` list to `articles`,\
    \ and populated it by initialising `Article` objects in the for loop and appending\
    \ them to this list. We then pass across `articles=articles` instead of `articles=clouds`\
    \ in the return statement so that the template can access our list of `Article`\
    \ objects, which each contain the image and the URL of each article.\n\nIf you\
    \ refresh the page again and expand the window using the pop out button, you’ll\
    \ be able to click any of the images to go to the original article, allowing readers\
    \ to view a brief summary of the day’s news or to read more details about any\
    \ stories that catch their eye.\n\n## Where next?\n\nWe’ve included several features\
    \ in our web application, and looked at how to use RSS feeds and process and serve\
    \ images directly in Python, but there are a lot more features we could add. For\
    \ example:\n\n- Our application only shows two stories at a time as the download\
    \ time is slow. We could instead look at implementing a threaded solution to downloading\
    \ web pages so that we could process several articles in parallel. Alternatively\
    \ (or in addition), we could also download the articles on a schedule and cache\
    \ the resulting images so that we don’t have to do the resource heavy downloading\
    \ and parsing each time a visitor visits our site.\n- Our web application only\
    \ shows articles from a single source (BBC), and only from today. We could add\
    \ some more functionality to show articles from different sources and different\
    \ time frames. We could also consider allowing the viewer to choose which category\
    \ of articles to view (news, sport, politics, finance, etc) by using different\
    \ RSS feeds as sources.\n- Our design and layout is very basic. We could make\
    \ our site look better and be more responsive by adding more CSS. We could lay\
    \ out the images in a grid of rows and columns to make it look better on smaller\
    \ screens such as mobile phones.\n\nIf you’d like to keep working on the web application,\
    \ simply head over to the Repl[^2] and fork it to continue your own version.\n\
    \nIn the next chapter, we’ll be looking at how to build our own Discord Chatbot.\n\
    \n[^2]: https://repl.it/@GarethDwyer1/news-to-wordcloud\n\n# Building a Discord\
    \ Bot with Python and Repl.it\n\nIn this tutorial, we’ll use Repl.it[^3] and Python\
    \ to build a Discord Chatbot. If you’re reading this tutorial, you probably have\
    \ at least heard of Discord and likely have an existing account. If not, Discord\
    \ is a VoIP and Chat application that is designed to replace Skype for gamers.\
    \ The bot we create in this tutorial will be able to join a Discord server and\
    \ respond to messages sent by people.\n\nIf you prefer JavaScript, the next chapter\
    \ is the same tutorial using NodeJS instead of Python.\n\nYou’ll find it easier\
    \ to follow along if you have some Python knowledge and have used Discord or a\
    \ similar app such as Skype or Telegram before. We won’t be covering the very\
    \ basics of Python, but we will explain each line of code in detail, so if you\
    \ have any experience with programming, you should be able to follow along.\n\n\
    [^3]: https://repl.it/\n\n## Overview and requirements\n\nWe’ll be doing all of\
    \ our coding through the Repl.it web IDE and hosting our bot with Repl.it as well,\
    \ so you won’t need to install any additional software on your machine. For this\
    \ tutorial you will need to create a Discord[^4] account (if you already have\
    \ one, you can skip this). There are instructions for how to do this in the next\
    \ section.\n\nIn this tutorial, we will be covering:\n\n- Creating an application\
    \ and a bot user in your Discord account\n- Creating a server on Discord\n- Adding\
    \ our bot to our Discord server\n\nLet’s get through these admin steps first and\
    \ then we can get to the fun part of coding our bot.\n\n[^4]: https://discord.com/\n\
    \n## Creating a bot in Discord and getting a token\n\nYou can sign up for a free\
    \ account over at the Discord register page[^5], and can download one of their\
    \ desktop or mobile applications from the Discord homepage[^6]. You can also use\
    \ Discord in the browser.\n\n[^5]: https://discord.com/register\n[^6]: https://discord.com/\n\
    \nOnce you have an account, you’ll want to create a Discord application. Visit\
    \ the Discord developer’s page[^7] and press the “New application” button, as\
    \ in the image below.\n\n[^7]: https://discord.com/developers/applications\n\n\
    Fill out a name for your bot and select “Create”.\n\nThe first thing to do on\
    \ the next page is to note your Client ID, which you’ll need to add the bot to\
    \ the server. You can come back later and get it from this page, or copy it somewhere\
    \ where you can easily find it later.\n\nYou can also rename the application and\
    \ provide a description for your bot at this point and press “Save Changes”.\n\
    \nYou have now created a Discord application. The next step is to add a bot to\
    \ this application, so head over to the “Bot” tab using the menu on the left and\
    \ press the “Add Bot” button, as indicated below. Click “Yes, do it” when Discord\
    \ asks if you’re sure about bringing a new bot to life.\n\nImage: 3 *Adding a\
    \ bot to our Discord Application*\n\nThe last thing we’ll need from our bot is\
    \ a Token. Anyone who has the bot’s token can prove that they own the bot, so\
    \ you’ll need to be careful not to share this with anyone. You can get the token\
    \ by pressing “Click to Reveal Token”, or copy it to your clipboard without seeing\
    \ it by pressing “Copy”.\n\nImage: 4 *Generating a token for our Discord bot*\n\
    \nTake note of your token or copy it to your clipboard, as we’ll need to add it\
    \ to our code soon.\n\n## Creating a Discord server\n\nIf you don’t have a Discord\
    \ server to add your bot to, you can create one by either opening the desktop\
    \ Discord application that you downloaded earlier or returning to the Discord\
    \ home page in your browser. Press the “+” icon indicated by the exclamation mark,\
    \ as shown below, to create a server."
  mdcn: "# 添加一些最终修饰\n\n我们的文本看起来有些单调，图片也相互接触，难以分辨它们是独立的图片。我们将通过添加几行CSS代码并引入Bootstrap框架来修复这个问题。\n\
    \n## 添加CSS\n\n编辑`home.html`文件，使其内容如下所示\n\n```\nhtml\n<html>\n    <head>\n    \
    \    <title>News in WordClouds | Home</title>\n        <link rel=\"stylesheet\"\
    \ href=\"https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css\"\
    \ integrity=\"sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg119a69psu\"\
    \ crossorigin=\"anonymous\">\n\n        <style type=\"text/css\">\n          \
    \  body {padding: 20px;}\n            img{padding: 5px;}\n        </style>\n \
    \   </head>\n\n    <body>\n        <h1>News Word Clouds</h1>\n            <p>Too\
    \ busy to click on each news article to see what it's about? Below you can see\
    \ all the articles from the BBC front page, displayed as word clouds. If you want\
    \ to read more about any particular article, just click on the wordcloud to go\
    \ to the original article</p>\n            {% for article in articles %}\n   \
    \             <a href=\"{{article.url}}\"><img src=\"data:image/png;base64,{{article.image}}\"\
    ></a>\n            {% endfor %}\n    </body>\n</html>\n```\n\n在**第3行**，我们添加了一个标题，它将显示在浏览器标签页中。在**第4行**，我们引入了**Bootstrap**[^1]，它自带一些很好的默认CSS样式（对于我们这个内容很少且不会用到Bootstrap大部分功能的项目来说，它可能有点过于庞大，但如果你计划扩展项目，拥有它还是很不错的）。\n\
    \n[^1]: https://getbootstrap.com/\n\n在第6-8行，我们为主要的`body`元素添加了内边距，以防止文本过于接近屏幕边缘，同时也为图片添加了内边距，防止它们相互接触。\n\
    \n在第16行，我们使用了`<a>`标签为图片添加链接。我们还修改了Jinja模板为`{{article.url}}`和`{{article.image}}`，这样我们就能让图片链接回原始新闻文章。\n\
    \n现在，我们需要再次调整后端代码，以便传递每篇文章的URL和图片，因为模板目前无法访问URL。\n\n## 传递URL\n\n为了方便地跟踪URL和图片的对应关系，我们将添加一个名为Article的基本Python辅助类。在`main.py`文件中，在函数定义之前添加以下代码。\n\
    \n```python\nclass Article:\n    def __init__(self, url, image):\n        self.url\
    \ = url\n        self.image = image\n```\n\n这是一个简单的类，有两个属性：`url`和`image`。我们将RSS订阅源中的原始URL存储在`url`中，将最终的base64编码词云存储在`image`中。\n\
    \n要使用这个类，请修改`home()`函数，使其如下所示。\n\n```python\n@app.route(\"/\")\ndef home():\n\
    \    feed = feedparser.parse(BBC_FEED)\n    articles = []\n\n    for article in\
    \ feed['entries'][:LIMIT]:\n        text = parse_article(article['link'])\n  \
    \      cloud = get_wordcloud(text)\n        articles.append(Article(article['link'],\
    \ cloud))\n    return render_template('home.html', articles=articles)\n```\n\n\
    我们将`clouds`列表的名称更改为`articles`，并通过在for循环中初始化`Article`对象并将它们追加到该列表中来填充它。然后我们在return语句中传递`articles=articles`而不是`articles=clouds`，这样模板就可以访问我们的`Article`对象列表，每个对象都包含每篇文章的图片和URL。\n\
    \n如果你再次刷新页面并使用弹出按钮展开窗口，你将能够点击任何图片跳转到原始文章，让读者可以查看当天新闻的简要摘要，或者阅读更多关于他们感兴趣的任何故事的详细信息。\n\
    \n## 下一步去哪里？\n\n我们在我们的Web应用程序中包含了几项功能，并研究了如何使用RSS订阅源以及直接在Python中处理和提供图片，但还有更多的功能我们可以添加。例如：\n\
    \n- 我们的应用程序一次只显示两个故事，因为下载时间很慢。我们可以研究实现一个线程化的解决方案来下载网页，以便我们可以并行处理多篇文章。或者（或者除了），我们也可以按计划下载文章并缓存生成的图片，这样我们就不必在每次访问者访问我们的网站时都进行资源密集型的下载和解析。\n\
    - 我们的Web应用程序只显示来自单一来源（BBC）且仅限于今天的文章。我们可以添加更多功能来显示来自不同来源和不同时间范围的文章。我们还可以考虑让观众选择查看哪个类别的文章（新闻、体育、政治、财经等），使用不同的RSS订阅源作为来源。\n\
    - 我们的设计和布局非常基础。我们可以通过添加更多CSS使我们的网站看起来更好并更具响应性。我们可以将图像排列成行列网格，使其在手机等较小屏幕上看起来更美观。\n\
    \n如果你想继续开发这个Web应用程序，只需前往Repl[^2]并fork它，以继续开发你自己的版本。\n\n在下一章中，我们将学习如何构建我们自己的Discord聊天机器人。\n\
    \n[^2]: https://repl.it/@GarethDwyer1/news-to-wordcloud\n\n# 使用Python和Repl.it构建Discord机器人\n\
    \n在本教程中，我们将使用Repl.it[^3]和Python来构建一个Discord聊天机器人。如果你正在阅读本教程，你可能至少听说过Discord，并且可能已经有一个现有账户。如果没有，Discord是一个旨在替代Skype的VoIP和聊天应用程序，专为游戏玩家设计。我们在本教程中创建的机器人将能够加入一个Discord服务器并响应人们发送的消息。\n\
    \n如果你更喜欢JavaScript，下一章是使用NodeJS而不是Python的相同教程。\n\n如果你有一些Python知识并且以前使用过Discord或类似的应用程序（如Skype或Telegram），你会发现更容易跟上。我们不会涵盖Python的非常基础的内容，但我们会详细解释每一行代码，所以如果你有任何编程经验，你应该能够跟上。\n\
    \n[^3]: https://repl.it/\n\n## 概述和要求\n\n我们将通过Repl.it网络IDE进行所有编码，并使用Repl.it托管我们的机器人，因此你不需要在你的机器上安装任何额外的软件。在本教程中，你需要创建一个Discord[^4]账户（如果你已经有一个，可以跳过这一步）。如何操作的说明在下一节中。\n\
    \n[^4]: https://discord.com/\n\n在本教程中，我们将涵盖：\n\n- 在你的Discord账户中创建一个应用和一个机器人用户\n\
    - 在Discord上创建一个服务器\n- 将我们的机器人添加到我们的Discord服务器\n\n让我们先完成这些管理步骤，然后我们就可以开始编写机器人代码的有趣部分了。\n\
    \n## 在Discord中创建机器人并获取令牌\n\n你可以在Discord注册页面[^5]注册一个免费账户，并可以从Discord主页[^6]下载他们的桌面或移动应用程序。你也可以在浏览器中使用Discord。\n\
    \n[^5]: https://discord.com/register\n[^6]: https://discord.com/\n\n一旦你有了账户，你将需要创建一个Discord应用程序。访问Discord开发者页面[^7]，并按下“New\
    \ application”按钮，如下图所示。\n\n[^7]: https://discord.com/developers/applications\n\
    \n为你的机器人填写一个名称，并选择“Create”。\n\n在下一页上，第一件事是记下你的Client ID，你将需要它来将机器人添加到服务器。你可以稍后返回此页面获取它，或者将其复制到稍后可以轻松找到的地方。\n\
    \n此时，你也可以重命名应用程序并为你的机器人提供描述，然后按下“Save Changes”。\n\n你现在已经创建了一个Discord应用程序。下一步是向此应用程序添加一个机器人，因此请使用左侧菜单转到“Bot”标签，然后按下“Add\
    \ Bot”按钮，如下所示。当Discord询问你是否确定要创建一个新的机器人时，点击“Yes, do it”。\n\n图片：3 *向我们的Discord应用程序添加一个机器人*\n\
    \n我们最后需要从机器人那里获取的是一个Token（令牌）。任何拥有机器人令牌的人都可以证明他们拥有该机器人，因此你需要小心不要与任何人分享它。你可以通过按下“Click\
    \ to Reveal Token”来获取令牌，或者通过按下“Copy”将其复制到剪贴板而不查看它。\n\n图片：4 *为我们的Discord机器人生成一个令牌*\n\
    \n记下你的令牌或将其复制到剪贴板，因为我们将很快需要将其添加到我们的代码中。\n\n## 创建Discord服务器\n\n如果你没有一个Discord服务器来添加你的机器人，你可以通过打开你之前下载的桌面Discord应用程序，或者在浏览器中返回Discord主页来创建一个。按下由感叹号指示的“+”图标，如下所示，以创建一个服务器。"
