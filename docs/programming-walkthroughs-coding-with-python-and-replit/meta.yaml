    \n## Hiding messages in images: steganography with Python and Repl.it\n\nIn this\
    \ tutorial, we'll build a steganography tool in Python. Steganography is the practice\
    \ of hiding information within other data. Unlike encryption, where the goal is\
    \ to secure *the contents* of communication between two parties, steganography\
    \ aims to obscure the fact that the parties are communicating at all.\n\nOur tool\
    \ will enable the user to hide secret text within a normal-looking .png image\
    \ file. The receiver of the image will use the same tool to reveal the hidden\
    \ message.\n\nWe'll use Python to build the tool. The most popular Python image\
    \ processing libraries are Pillow[197] and OpenCV[198], but these are heavy libraries\
    \ with many dependencies. We'll avoid these and instead use the lightweight PyPNG[199]\
    \ library which is written in pure Python, and therefore easier to run on various\
    \ platforms.\n\n[197] https://pypi.org/project/Pillow/\n[198] https://pypi.org/project/opencv-python/\n\
    [199] https://pypi.org/project/pypng/\n\n### A quick background on steganography\n\
    \nLet's imagine three people: Alice, Bob and Eve. Alice wants to send a private\
    \ message to Bob, while Eve wants to intercept this message. While modern-day\
    \ encryption can help Alice and Bob ensure that Eve doesn't know the *contents*\
    \ of their message, Eve can possibly still deduce interesting information just\
    \ from knowing that Alice and Bob are communicating at all, and how frequently\
    \ they communicate.\n\nTo obscure the communication channel completely, Alice\
    \ and Bob can exploit the fact that hundreds of millions of photos are uploaded\
    \ and shared across the internet daily. Instead of communicating directly, Alice\
    \ can leave her message hidden in a pre-agreed location in an image and Bob can\
    \ access this message. From Eve's perspective, there is now no direct communication\
    \ between the two.\n\nA single image is made up of millions of pixels. While many\
    \ formats exist, a pixel is most simply represented by a group of three numbers\
    \ between 0 and 255, one number each for the red, blue, and green values of that\
    \ pixel. Using this Red-Green-Blue scheme we can represent any colour in the RGB\
    \ color model[200].\n\n[200] https://en.wikipedia.org/wiki/RGB_color_model\n\n\
    Digital text, like images, is also represented internally by numbers, so the differences\
    \ between a text file and an image file are not as large as you might assume.\
    \ Any digital data can be represented as a binary string[201], a bunch of 1s and\
    \ 0s, and we can make tiny modifications to an image to encode a binary string\
    \ within it. As an example, consider the following:\n\n```\nimage = [(255, 0,\
    \ 0), (0, 255, 0), (0, 0, 255)]\n```\n\nThis is a representation of an image with\
    \ three pixels: one red, one green, and one blue. If we encode this as an image\
    \ and open it in an image viewer, we’ll see the three pixel image, but if we read\
    \ this data with Python, it is simply a list of tuples, each containing three\
    \ integers.\n\nWe could also look at each value making up each pixel and calculate\
    \ whether it is *odd* or *even*. We could encode odd numbers as 1 and even values\
    \ as 0. This would give us the binary string “100 010 001” (as the 255 values\
    \ are odd and the 0s are even).\n\nIf we made a small modification to the image\
    \ as follows:\n\n```\nimage = [(254, 1, 1), (1, 255, 1), (1, 0, 254)]\n```\n\n\
    The image would look almost identical in any image viewer (we have just added\
    \ or subtracted a minuscule amount of color from some values), but the binary\
    \ string – using our odd/even method – would look completely different: “011 111\
    \ 100”.\n\nUsing this technique but extending it over an entire image (millions\
    \ of pixels), we can hide a large amount of text data in any image.\n\n[201] https://en.wikipedia.org/wiki/Binary_number\n\
    \n### Creating the project on Repl.it\n\nIf you were serious about keeping your\
    \ messages as secret as possible, you’d want to do all of these steps on an offline\
    \ computer that you fully control. As a learning exercise though, we’ll set the\
    \ project up on Repl.it[202]. Navigate to their site and sign up for an account\
    \ if you don’t have one.\n\nCreate a new project, choosing “Python” as the language,\
    \ and give your project a name.\n\n![](img/48efb5586f6da072fc1456bee6971293_259_0.png)\n\
    \nCreating a new repl\n\nThe first piece we need to build is a function to encode\
    \ any text message as a binary string.\n\n[202] https://repl.it\n\n### Encoding\
    \ a text message as a binary string\n\nOpen the `main.py` file and add the following\
    \ code:\n\n```python\nimport base64\n\ndef encode_message_as_bytestring(message):\n\
    \    b64 = message.encode(\"utf8\")\n    bytes_ = base64.encodebytes(b64)\n  \
    \  bytestring = \"\".join([\"{:08b}\".format(x) for x in bytes_])\n    return\
    \ bytestring\n```\n\nThis first encodes our text as base64[203] and then as a\
    \ binary string. You can add some print statements to see how the message is transformed\
    \ in the different steps, as shown below.\n\n[203] https://en.wikipedia.org/wiki/Base64\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_260_0.png)\n\nEncoding a message as\
    \ a binary string\n\nThe base64 step is not strictly necessary, but it is useful\
    \ as any file or data can be encoded as base64. This opens our project up to future\
    \ extensions such as hiding other kinds of files within image files instead of\
    \ just text strings.\n\n### Adding an ‘end of message’ delimeter\n\nWe’ll assume\
    \ that our message will always ‘fit’ in our image. We can fit three binary digits\
    \ per pixel (one for each of the RGB values), so our resulting binary string should\
    \ be shorter than the number of pixels in the image multiplied by three.\n\nWe’ll\
    \ also need to know when the message *ends*. The message will only be encoded\
    \ in the beginning of the image file, but if we don’t know how long the message\
    \ is, we’ll keep looking at normal pixels and trying to decode them as text data.\
    \ Let’s add an “end of string” delimiter to the end of our message: this should\
    \ be something that wouldn’t appear half way through our actual message by chance.\
    \ We’ll use the binary representation of ‘!ENDOFMESSAGE!’ for this.\n\nModify\
    \ your function to look as follows, which adds this delimiter at the end.\n\n\
    ```python\nimport base64\n\nENDOFMESSAGE = \"010010010101010101010110010011110101001000100100111001010001110101010001010101010110010101000101010100110000010001100100100001010010010100110100010100111101\"\
    \n\ndef encode_message_as_bytestring(message):\n    b64 = message.encode(\"utf8\"\
    )\n    bytes_ = base64.encodebytes(b64)\n    bytestring = \"\".join([\"{:08b}\"\
    .format(x) for x in bytes_])\n    bytestring += ENDOFMESSAGE\n    return bytestring\n\
    ```\n\nNow that we can handle some basic text encoding, let’s look at images.\n\
    \n### Getting pixels from an image\n\nFind a PNG image somewhere - either one\
    \ you've taken yourself or from a site like unsplash. You can use any online JPG\
    \ to PNG converter if you only have .jpg files available.\n\nUpload your PNG file\
    \ by clicking on the three dot menu in the repl sidebar, in the top right corner\
    \ of the files pane to the left, and selecting upload file or by simply dragging\
    \ and dropping your file within the files pane.\n\n![](img/48efb5586f6da072fc1456bee6971293_261_0.png)\n\
    \nWe're going to write a function that extracts the raw pixel data from this image\
    \ file. Add an import to the top of the file.\n\n```python\nimport png\n```\n\n\
    And then add a new function to the bottom of `main.py`:\n\n```python\ndef get_pixels_from_image(fname):\n\
    \    img = png.Reader(fname).read()\n    pixels = img[2]\n    return pixels\n\
    ```\n\nThe `read()` method returns a 4-tuple consisting of:\n\n- width: Width\
    \ of PNG image in pixels\n- height: Height of PNG image in pixels\n- rows: A sequence\
    \ or iterator for the row data\n- info: An info dictionary containing some meta\
    \ data\n\nWe are primarily interested in the third item, “rows”, which is an iterator\
    \ containing all the pixels of the image, row by row. If you’re not familiar with\
    \ Python generators take a look at [this guide](https://realpython.com/introduction-to-python-generators/),\
    \ but they are essentially memory-efficient lists.\n\n### Encoding the image with\
    \ the message\n\nNow that we have the encoded message and pixels of the image\
    \ ready we can combine them to form our secret encoded image.\n\nAdd the following\
    \ function to the bottom of the `main.py` file. This function takes in the outputs\
    \ from the previous functions (our raw pixels and our message encoded as a binary\
    \ string), and combines them.\n\n```python\ndef encode_pixels_with_message(pixels,\
    \ bytestring):\n    '''modifies pixels to encode the contents from bytestring'''\n\
    \n    enc_pixels = []\n    string_i = 0\n    for row in pixels:\n        enc_row\
    \ = []\n        for i, char in enumerate(row):\n            if string_i >= len(bytestring):\n\
    \                pixel = row[i]\n            else:\n                if row[i]\
    \ % 2 != int(bytestring[string_i]):\n                    if row[i] == 0:\n   \
    \                     pixel = 1\n                    else:\n                 \
    \       pixel = row[i] - 1\n                else:\n                    pixel =\
    \ row[i]\n                string_i += 1\n            enc_row.append(pixel)\n \
    \       enc_pixels.append(enc_row)\n    return enc_pixels\n```"
  mdcn: "如果您需要帮助，[Repl Discord 服务器](https://repl.it/discord)上的朋友们非常友好，并且乐于帮助大家学习。\n\
    \n196 https://repl.it/discord\n\n## 在图像中隐藏信息：使用 Python 和 Repl.it 实现隐写术\n\n在本教程中，我们将使用\
    \ Python 构建一个隐写术工具。隐写术是将信息隐藏在其他数据中的实践。与加密不同——加密的目标是保护通信双方*内容*的安全——隐写术旨在掩盖双方正在进行通信这一事实。\n\
    \n我们的工具将使用户能够在看起来普通的 .png 图像文件中隐藏秘密文本。图像的接收者将使用相同的工具来揭示隐藏的消息。\n\n我们将使用 Python\
    \ 来构建该工具。最流行的 Python 图像处理库是 Pillow[197] 和 OpenCV[198]，但这些是依赖项众多的重量级库。我们将避开它们，转而使用轻量级的\
    \ PyPNG[199] 库，它完全用 Python 编写，因此更容易在各种平台上运行。\n\n[197] https://pypi.org/project/Pillow/\n\
    [198] https://pypi.org/project/opencv-python/\n[199] https://pypi.org/project/pypng/\n\
    \n### 关于隐写术的简要背景\n\n让我们设想三个人：爱丽丝、鲍勃和伊芙。爱丽丝想给鲍勃发送一条私密信息，而伊芙则想截获这条信息。虽然现代加密技术可以帮助爱丽丝和鲍勃确保伊芙不知道他们消息的*内容*，但伊芙仍然可能仅从得知爱丽丝和鲍勃正在通信以及他们通信的频率这一事实中推断出有趣的信息。\n\
    \n为了完全模糊通信渠道，爱丽丝和鲍勃可以利用这样一个事实：每天有数亿张照片在互联网上上传和分享。他们可以不直接通信，而是让爱丽丝将消息隐藏在预先约定好的图像位置，然后鲍勃获取这条消息。从伊芙的角度来看，两人之间现在没有直接通信了。\n\
    \n一张图像由数百万像素组成。虽然存在多种格式，但像素最简单的表示方式是一组介于 0 到 255 之间的三个数字，分别代表该像素的红色、蓝色和绿色值。使用这种\
    \ RGB（红-绿-蓝）方案，我们可以表示 RGB 颜色模型[200]中的任何颜色。\n\n[200] https://en.wikipedia.org/wiki/RGB_color_model\n\
    \n数字文本与图像一样，在内部也是用数字表示的，因此文本文件和图像文件之间的差异可能不像你想象的那么大。任何数字数据都可以表示为一个二进制字符串[201]，即一堆\
    \ 1 和 0，我们可以对图像进行微小的修改，将二进制字符串编码到其中。举个例子，考虑以下内容：\n\n```\nimage = [(255, 0, 0),\
    \ (0, 255, 0), (0, 0, 255)]\n```\n\n这表示一张有三个像素的图像：一个红色、一个绿色和一个蓝色。如果我们将此编码为图像并在图像查看器中打开它，我们将看到这三个像素的图像，但如果我们用\
    \ Python 读取这些数据，它仅仅是一个元组列表，每个元组包含三个整数。\n\n我们还可以查看组成每个像素的每个值，并计算它是*奇数*还是*偶数*。我们可以将奇数编码为\
    \ 1，偶数值编码为 0。这将给我们二进制字符串“100 010 001”（因为 255 是奇数，0 是偶数）。\n\n如果我们对图像进行如下微小修改：\n\
    \n```\nimage = [(254, 1, 1), (1, 255, 1), (1, 0, 254)]\n```\n\n在任何图像查看器中，这张图像看起来几乎一模一样（我们只是从某些值中增加或减少了一点点颜色），但二进制字符串——使用我们的奇偶方法——看起来会完全不同：“011\
    \ 111 100”。\n\n使用这种技术，并将其扩展到整个图像（数百万像素），我们可以在任何图像中隐藏大量的文本数据。\n\n[201] https://en.wikipedia.org/wiki/Binary_number\n\
    \n### 在 Repl.it 上创建项目\n\n如果你真的很想让你的消息尽可能保密，你应该在一台你完全控制的离线计算机上执行所有这些步骤。不过，作为一项学习练习，我们将在\
    \ Repl.it[202] 上设置项目。访问他们的网站，如果没有账户，请注册一个。\n\n创建一个新项目，选择“Python”作为语言，并为你的项目命名。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_259_0.png)\n创建一个新的 repl\n\n我们需要构建的第一个部分是一个函数，用于将任何文本消息编码为二进制字符串。\n\
    \n[202] https://repl.it\n\n### 将文本消息编码为二进制字符串\n\n打开 `main.py` 文件，并添加以下代码：\n\n\
    ```python\nimport base64\n\ndef encode_message_as_bytestring(message):\n    b64\
    \ = message.encode(\"utf8\")\n    bytes_ = base64.encodebytes(b64)\n    bytestring\
    \ = \"\".join([\"{:08b}\".format(x) for x in bytes_])\n    return bytestring\n\
    ```\n\n这首先将我们的文本编码为 base64[203]，然后编码为二进制字符串。你可以添加一些打印语句，查看消息在不同步骤中是如何转换的，如下所示。\n\
    \n[203] https://en.wikipedia.org/wiki/Base64\n\n![](img/48efb5586f6da072fc1456bee6971293_260_0.png)\n\
    将消息编码为二进制字符串\n\nbase64 步骤并非绝对必要，但它很有用，因为任何文件或数据都可以编码为 base64。这为我们的项目提供了未来的扩展可能性，例如将其他类型的文件隐藏到图像文件中，而不仅仅是文本字符串。\n\
    \n### 添加“消息结束”分隔符\n\n我们将假设我们的消息总能“装进”图像中。每个像素可以容纳三个二进制数字（每个 RGB 值一个），因此我们最终的二进制字符串应该短于图像的像素数乘以三。\n\
    \n我们还需要知道消息*何时结束*。消息将仅编码在图像文件的开头，但如果我们不知道消息有多长，我们将持续查看普通像素并尝试将它们解码为文本数据。让我们在消息末尾添加一个“字符串结束”分隔符：这应该是不可能在实际消息中间偶然出现的东西。为此，我们将使用‘!ENDOFMESSAGE!’的二进制表示。\n\
    \n修改你的函数如下，它在末尾添加了此分隔符。\n\n```python\nimport base64\n\nENDOFMESSAGE = \"010010010101010101010110010011110101001000100100111001010001110101010001010101010110010101000101010100110000010001100100100001010010010100110100010100111101\"\
    \n\ndef encode_message_as_bytestring(message):\n    b64 = message.encode(\"utf8\"\
    )\n    bytes_ = base64.encodebytes(b64)\n    bytestring = \"\".join([\"{:08b}\"\
    .format(x) for x in bytes_])\n    bytestring += ENDOFMESSAGE\n    return bytestring\n\
    ```\n\n现在我们已经可以处理一些基本的文本编码，让我们来看看图像。\n\n### 从图像中获取像素\n\n找一张 PNG 图像——可以是你自己拍的，或者来自\
    \ unsplash 等网站。如果你只有 .jpg 文件，可以使用任何在线 JPG 转 PNG 转换器。\n\n通过点击 repl 侧边栏右上角的三点菜单（位于左侧文件窗格的顶部），选择上传文件，或者简单地将文件拖放到文件窗格中，来上传你的\
    \ PNG 文件。\n\n![](img/48efb5586f6da072fc1456bee6971293_261_0.png)\n\n我们将编写一个函数来从该图像文件中提取原始像素数据。在文件顶部添加一个导入语句。\n\
    \n```python\nimport png\n```\n\n然后在 `main.py` 文件底部添加一个新函数：\n\n```python\ndef get_pixels_from_image(fname):\n\
    \    img = png.Reader(fname).read()\n    pixels = img[2]\n    return pixels\n\
    ```\n\n`read()` 方法返回一个 4 元组，包括：\n\n- width：PNG 图像的宽度（像素）\n- height：PNG 图像的高度（像素）\n\
    - rows：行数据的序列或迭代器\n- info：包含一些元数据的信息字典\n\n我们主要关注第三项“rows”，它是一个迭代器，包含图像的所有像素，逐行排列。如果你不熟悉\
    \ Python 生成器，可以参考[这份指南](https://realpython.com/introduction-to-python-generators/)，但它们本质上是内存高效的列表。\n\
    \n### 使用消息编码图像\n\n现在我们已经准备好了编码后的消息和图像的像素，我们可以将它们组合起来形成我们的秘密编码图像。\n\n在 `main.py`\
    \ 文件底部添加以下函数。此函数接收前一个函数的输出（我们的原始像素和编码为二进制字符串的消息），并将它们组合起来。\n\n```python\ndef encode_pixels_with_message(pixels,\
    \ bytestring):\n    '''修改像素以编码来自 bytestring 的内容'''\n\n    enc_pixels = []\n  \
    \  string_i = 0\n    for row in pixels:\n        enc_row = []\n        for i,\
    \ char in enumerate(row):\n            if string_i >= len(bytestring):\n     \
    \           pixel = row[i]\n            else:\n                if row[i] % 2 !=\
    \ int(bytestring[string_i]):\n                    if row[i] == 0:\n          \
    \              pixel = 1\n                    else:\n                        pixel\
    \ = row[i] - 1\n                else:\n                    pixel = row[i]\n  \
    \              string_i += 1\n            enc_row.append(pixel)\n        enc_pixels.append(enc_row)\n\
    \    return enc_pixels\n```"
