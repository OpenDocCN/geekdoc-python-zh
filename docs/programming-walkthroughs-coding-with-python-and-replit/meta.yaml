- md: '## Navigating the source code using developer tools


    You can open the developer tools for your browser from the main menu, with Google
    Chrome shown on the left and Mozilla Firefox on the right below. If you''re using
    a different web browser, you should be able to find a similar setting.


    ![](img/48efb5586f6da072fc1456bee6971293_141_0.png)


    ### Image 3: Opening Developer Tools in Chrome (left) and Firefox (right)


    Activating the tool brings up a new panel in your web browser, usually at the
    bottom or on the right-hand side. The tool contains an “Inspector” panel and a
    selector tool, which can be chosen by pressing the icon highlighted in red below.
    Once the selector tool is active, you can click on parts of the web page to view
    the corresponding source code. In the image below, we selected the same first
    paragraph in the normal view and we can see the `<p class=story-body__introduction”>`
    code again in the panel below.


    ![](img/48efb5586f6da072fc1456bee6971293_142_0.png)


    The Developer Tools are significantly more powerful than using the simple find
    tool, but they are also more complicated. You should choose a method based on
    your experience and the complexity of the page that you are trying to analyze.


    ## Downloading a web page with Python


    Now that we’ve seen a bit more of how web pages are built in our browser, we can
    start retrieving and manipulating them using Python. Since Python is not a web
    browser, we’ll only be able to retrieve and manipulate the HTML source code, rather
    than viewing the ‘normal’ representation of a web page.


    We’ll do this through a Python Repl using the `requests` library. Open [repl.it](https://repl.it)
    and choose to create a new Python Repl.


    ![](img/48efb5586f6da072fc1456bee6971293_143_0.png)


    This will take you to a working Python coding environment where you can write
    and run Python code. To start with, we''ll download the content from the BBC News
    homepage, and print out the first 1000 characters of HTML source code.


    You can do this with the following four lines of Python:


    ```

    import requests


    url = "https://bbc.com/news"

    response = requests.get(url)

    print(response.text[:1000])

    ```


    Put this code in the main.py file that Repl automatically creates for you and
    press the "Run" button. After a short delay, you should see the output in the
    output pane - the beginning of HTML source code, similar to what we viewed in
    our web browser above.


    ![](img/48efb5586f6da072fc1456bee6971293_144_0.png)


    ### Image 6: Downloading a single page using Python


    Let’s pull apart each of these lines.


    - In line 1, we import the Python requests library, which is a library that allows
    us to make web requests.

    - In line 3, we define a variable containing the URL of the main BBC news site.
    You can visit this URL in your web browser to see the BBC News home page.

    - In line 4, we pass the URL we defined to the requests.get function, which will
    visit the web page that the URL points to and fetch the HTML source code. We load
    this into a new variable called response.

    - In line 5, we access the text attribute of our response object, which contains
    all of the HTML source code. We take only the first 1000 characters of this, and
    pass them to the print function, which simply dumps the resulting text to our
    output pane.


    We have now automatically retrieved a web page and we can display parts of the
    content. We are unlikely to be interested in the full source code dump of a web
    page (unless we are storing it for archival reasons), so let’s extract some interesting
    parts of the page, instead of only the first 1000 characters.


    ## Using BeautifulSoup to extract all URLs


    The world wide web is built from pages that link to each other using hyperlinks,
    links, or URLs. (These terms are all used more-or-less interchangeably).


    Let’s assume for now that we want to find all the news articles on the BBC News
    homepage, and get their URLs. If we look at the main page below, we’ll see there
    are a bunch of stories on the home page. By mousing over any of the headlines
    with the “inspect” tool, we can see that each has a unique URL which takes us
    to that news story. For example, mousing over the main “US and Canada agree new
    trade deal” story in the image below is a link to https://www.bbc.com/news/business-45702609.


    If we inspect that element using the browser’s developer tools, we can see it
    is a `<a>` element, which is HTML for a link, with an `<href>` component that
    points to the URL. Note that the href section goes only to the last part of the
    URL, omitting the https://www.bbc.com part. Because we are already on BBC, the
    site can use *relative URLs* instead of *absolute URLs*. This means that when
    you click on the link, your browser will figure out that the URL isn’t complete
    and prepend it with https://www.bbc.com. If you look around the source code of
    the main BBC page, you’ll find both relative and absolute URLs, which already
    makes scraping all of the URLs on the page more difficult.


    ![](img/48efb5586f6da072fc1456bee6971293_145_0.png)


    We could try to use Python’s built-in text search functions like `find()` or regular
    expressions to extract all of the URLs from the BBC page, yet it is not actually
    possible to do this reliably. HTML is a complex language which allows web developers
    to do many unusual things. For an amusing take on why we should avoid a “naive”
    method of looking for links, see [this very famous](https://stackoverflow.com/questions/1732348/regex-match-open-tags-except-xhtml-self-contained-tags)
    StackOverflow question and the first answer.


    Luckily, there is a powerful and simple-to-use HTML parsing library called [BeautifulSoup](https://www.crummy.com/software/BeautifulSoup/),
    which will help us extract all the links from a given piece of HTML. We can use
    it by modifying the code'
  mdcn: '## 使用开发者工具浏览源代码


    你可以从主菜单中打开浏览器的开发者工具。下图左侧是Google Chrome浏览器，右侧是Mozilla Firefox。如果你使用的是其他浏览器，应该也能找到类似的设置。


    ![](img/48efb5586f6da072fc1456bee6971293_141_0.png)


    ### 图3：在Chrome（左）和Firefox（右）中打开开发者工具


    激活该工具会在你的网页浏览器中打开一个新的面板，通常位于底部或右侧。该工具包含一个“检查器”面板和一个选择器工具，可以通过点击下方红色高亮的图标来选择。一旦选择器工具被激活，你就可以点击网页的不同部分来查看对应的源代码。在下图中，我们在正常视图中选中了第一个相同的段落，我们可以在下方的面板中再次看到
    `<p class=story-body__introduction”>` 代码。


    ![](img/48efb5586f6da072fc1456bee6971293_142_0.png)


    开发者工具的功能远比简单的查找工具强大，但也更为复杂。你应该根据你的经验以及所要分析页面的复杂度来选择合适的方法。


    ## 使用 Python 下载网页


    既然我们已经更深入地了解了网页在浏览器中的构建方式，我们就可以开始使用 Python 来获取和操作它们了。由于 Python 不是网页浏览器，我们只能获取和操作
    HTML 源代码，而不是查看网页的“常规”呈现形式。


    我们将通过一个使用 `requests` 库的 Python Repl 来实现这一点。打开 [repl.it](https://repl.it) 并选择创建一个新的
    Python Repl。


    ![](img/48efb5586f6da072fc1456bee6971293_143_0.png)


    这将带你进入一个可用的 Python 编程环境，在那里你可以编写并运行 Python 代码。首先，我们将下载 BBC News 主页的内容，并打印出 HTML
    源代码的前1000个字符。


    你可以用以下四行 Python 代码完成此操作：


    ```

    import requests


    url = "https://bbc.com/news"

    response = requests.get(url)

    print(response.text[:1000])

    ```


    将这段代码放入 Repl 自动为你创建的 `main.py` 文件中，然后点击“运行”按钮。短暂延迟后，你应该会在输出窗格中看到结果 - HTML 源代码的开头部分，类似于我们之前在网页浏览器中查看的内容。


    ![](img/48efb5586f6da072fc1456bee6971293_144_0.png)


    ### 图6：使用 Python 下载单个页面


    让我们逐一分析这些代码行。


    - 在第1行，我们导入了 Python 的 requests 库，这是一个允许我们发出网络请求的库。

    - 在第3行，我们定义了一个包含 BBC 新闻主站 URL 的变量。你可以在浏览器中访问此 URL 来查看 BBC 新闻主页。

    - 在第4行，我们将定义的 URL 传递给 `requests.get` 函数，该函数将访问 URL 指向的网页并获取 HTML 源代码。我们将此加载到一个名为
    `response` 的新变量中。

    - 在第5行，我们访问 `response` 对象的 `text` 属性，该属性包含所有的 HTML 源代码。我们只取其中的前1000个字符，并将其传递给
    `print` 函数，该函数会将结果文本输出到我们的输出窗格中。


    现在我们已经自动获取了一个网页，并可以显示其部分内容。我们不太可能对整个网页的源代码转储感兴趣（除非是出于归档目的而存储），因此让我们提取页面中一些有趣的部分，而不仅仅是前1000个字符。


    ## 使用 BeautifulSoup 提取所有 URL


    万维网是由使用超链接、链接或 URL 互相链接的页面构成的。（这些术语的用法大致可以互换）。


    现在，假设我们想要找出 BBC 新闻主页上的所有新闻文章，并获取它们的 URL。如果我们查看下方的主页，会看到首页上有很多新闻报道。通过使用“检查”工具将鼠标悬停在任何一个标题上，我们可以看到每个标题都有一个指向该新闻报道的唯一
    URL。例如，在下图中将鼠标悬停在主要的“美国与加拿大达成新贸易协定”新闻上，该标题是一个指向 https://www.bbc.com/news/business-45702609
    的链接。


    如果我们使用浏览器的开发者工具检查该元素，会发现它是一个 `<a>` 元素，即 HTML 中的链接，并包含一个指向该 URL 的 `<href>` 组件。请注意，`href`
    部分仅指向 URL 的最后一部分，省略了 `https://www.bbc.com`。因为我们已经在 BBC 网站上，所以该网站可以使用*相对 URL* 而不是*绝对
    URL*。这意味着当你点击该链接时，你的浏览器会判断 URL 不完整，并在前面补上 `https://www.bbc.com`。如果你查看 BBC 主页的源代码，会发现既有相对
    URL 也有绝对 URL，这已经使得抓取页面上的所有 URL 变得更加困难。


    ![](img/48efb5586f6da072fc1456bee6971293_145_0.png)


    我们可以尝试使用 Python 内置的文本搜索函数（如 `find()`）或正则表达式从 BBC 页面中提取所有 URL，但这实际上无法可靠地完成。HTML
    是一种复杂的语言，允许网页开发者做许多不寻常的事情。关于为什么应该避免使用“天真”的方法来查找链接，可以看看[这个非常著名](https://stackoverflow.com/questions/1732348/regex-match-open-tags-except-xhtml-self-contained-tags)的
    StackOverflow 问题及其第一个回答。


    幸运的是，有一个强大且易于使用的 HTML 解析库叫做 [BeautifulSoup](https://www.crummy.com/software/BeautifulSoup/)，它将帮助我们从给定的
    HTML 代码片段中提取所有链接。我们可以通过修改代码来使用它...'
