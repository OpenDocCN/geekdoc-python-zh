    \ `requests` 来从互联网获取数据。这个模块实际上不是Python的一部分，在下一篇文章中，你将了解更多关于如何管理外部模块或依赖项的知识。\n\n\
    ## 使用Repl.it管理依赖项\n\n几乎所有有用的程序都在一定程度上依赖于各种形式的现有代码。你的代码所依赖的现有代码被称为依赖项。你在之前的教程中已经遇到过一些依赖项：你在第一个教程中使用了\
    \ `math` 模块来计算二次方程，在第二个教程中使用了 `requests` 模块来获取天气数据。\n\n在第一个教程中，你还编写了 `solver.py`\
    \ 模块，并将其导入到 `main.py` 文件中。我们可以将依赖项分为三大类：\n\n- 内部依赖项：你或你的组织编写的、你完全控制的其他代码，例如 `solver.py`\
    \ 文件。\n- 标准依赖项：作为标准语言库一部分存在的代码，例如 `math` 模块。\n- 外部依赖项：由第三方开发者编写的代码，例如 `requests`\
    \ 模块。\n\n在本教程中，你将获得更多关于所有这三类依赖项的经验。具体来说，你将使用 spaCy<sup>17</sup>（一个第三方依赖项）编写一个用于分析句子的NLP（自然语言处理）程序。\n\
    \n依赖项管理是一个极其复杂的领域，有大量的相关工具生态系统用于帮助管理和安装Python程序。我们不会涵盖所有选项和背景知识，但你可以在这里<sup>18</sup>阅读不同工具的概述。\n\
    \n## 理解Repl.it的魔法导入工具和通用包管理器\n\n在几乎所有的编程环境中，你都必须显式安装第三方依赖项。假设你想在本地机器上使用 `requests`\
    \ 库（Python默认不包含它）。如果你尝试导入它，你会得到一个 `ModuleNotFoundError` 错误，如下所示。\n\n```\nType\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> import requests\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nModuleNotFoundError: No module named 'requests'\n>>>\n```\n\n\
    图1：尝试使用未安装的依赖项\n\n<sup>17</sup>https://spacy.io/\n<sup>18</sup>https://modelpredict.com/python-dependency-management-tools\n\
    \n为了使用这个库，你首先需要使用类似 `pip install requests` 的命令来安装它，然后导入语句才能正确运行。\n\n相比之下，Repl.it通常可以使用[通用包管理器](https://blog.repl.it/upm)完全自动地为你执行安装。当你运行\
    \ `import requests` 这行代码时，包管理器会找到正确的包并安装它，或者在某些情况下，Repl.it甚至可能已经预先安装了该包。无论哪种方式，你的代码都能“正常运行”。\n\
    \n![](img/48efb5586f6da072fc1456bee6971293_33_0.png)\n\n*图2：在另一个repl上无缝使用外部包*\n\
    \n这非常方便，但有时你需要更多的控制。例如，你可能需要某个特定版本的包，或者通用包管理器可能无法自动安装你的所有依赖项。在这些情况下，你可以使用更高级的方式来安装包。\n\
    \n## 通过GUI安装包\n\n如果你不确定具体需要哪个包，可以使用Repl.it内置的包管理器GUI来搜索包。在下面的示例中，我们正在寻找一个名为 `beautifulsoup4`\
    \ 的包。\n\n要使用此功能，你需要\n\n1. 从左侧工具栏点击“包”选项卡。\n2. 通过输入其部分或全部名称来搜索包。\n3. 从搜索结果中选择你想要的包。\n\
    \n[^19]https://blog.repl.it/upm\n\n![](img/48efb5586f6da072fc1456bee6971293_34_0.png)\n\
    \n这将带你到一个页面，显示所选包的概述和摘要。你可以使用 `+` 按钮将其安装到你的repl中，如下所示。\n\n![](img/48efb5586f6da072fc1456bee6971293_34_1.png)\n\
    \n一旦包安装完毕，我们就可以在代码中使用它了。运行下面显示的示例，从主页的主按钮上提取“Google Search”文本。\n\n```python\n\
