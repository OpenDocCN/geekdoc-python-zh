  md: '```

    vectorizer = CountVectorizer()

    ```


    Before we can use our vectorizer, it needs to run once through all the data we
    have so it can build the mapping from words to indices. This is referred to as
    “fitting” the vectoriser, and we can do it like this:


    ```

    vectorizer.fit(training_texts)

    ```


    If we want, we can see the mapping it created (which might not be in order, as
    in the examples we walked through earlier, but each word will have its own index).
    We can inspect the vectoriser’s vocabulary by adding the line


    ```

    print(vectorizer.vocabulary_)

    ```


    (Note the underscore at the end. Scikit-learn uses this as a convention for “helper”
    attributes. The mapping is explicit only for debugging purposes and you shouldn’t
    need to use it in most cases). My vocabulary mapping looked as follows:


    ```

    {''we'': 10, ''hate'': 3, ''you'': 11, ''they'': 8, ''us'': 9, ''are'': 0, ''bad'':
    1, ''he'': 4, ''i\s'': 5, ''mary'': 7, ''love'':6, ''good'': 2}

    ```


    Behind the scenes, the vectoriser inspected all of our texts, did same basic preprocessing
    like making everything lowercase, split the text into words using a built-in tokenization
    method, and produced a vocabulary mapping specific to our dataset. Now that we
    have a vectorizer that knows what words are in our dataset, we can use it to transform
    our texts into vectors. Add the following lines of code to your Repl:


    ```

    training_vectors = vectorizer.transform(training_texts)

    testing_vectors = vectorizer.transform(test_texts)

    ```


    The first line creates a list of vectors which represent all of the training texts,
    still in the same order, but now each text is a vector of numbers instead of a
    string. The second line does the same with the test vectors. The machine learning
    part isn’t looking at our test texts (that would be cheating) – it’s just mapping
    the words to numbers so that it can work with them more easily. Note that when
    we called fit() on the vectoriser, we only showed it the training texts. Because
    there are words in the test texts that don’t appear in the training texts, these
    words will simply be ignored and will not be represented in testing_vectors. Now
    that we have a vectorised representation of our problem, let’s take a look at
    how we can solve it.'
