  md: 'Our new use_ip() function makes an asynchronous<sup>161</sup> call to our get_weather_from_ip
    route, sending along the IP address that we previously displayed in a pop-up box.
    If the call is successful, we call a new function (in the success: section) with
    the returned data. This new function (line 7) looks for an HTML element with the
    ID of weatherdata and replaces the contents with the weather_data attribute of
    the response that we received from get_weather_from_ip (which at the moment is
    still hardcoded to be “20”).


    ![](img/48efb5586f6da072fc1456bee6971293_212_0.png)


    To see the results, we''ll need to add an HTML element as a placeholder with the
    id weatherdata. Do this in the templates/index.html file as follows.


    ```

    {% extends "base.html" %}


    {% block content %}

    <h1>Weather</h1>

    <p id=weatherdata></p>

    {% endblock %}

    ```


    This adds an empty HTML paragraph element which our JavaScript can populate once
