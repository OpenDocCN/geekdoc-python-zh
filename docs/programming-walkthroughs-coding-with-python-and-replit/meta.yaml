- md: '## Where next?


    We''ve included several features in our web application, and looked at how to
    use RSS feeds and process and serve images directly in Python, but there are a
    lot more features we could add. For example:


    - Our application only shows two stories at a time as the download time is slow.
    We could instead look at implementing a threaded solution to downloading web pages
    so that we could process several articles in parallel. Alternatively (or in addition),
    we could also download the articles on a schedule and cache the resulting images
    so that we don’t have to do the resource heavy downloading and parsing each time
    a visitor visits our site.

    - Our web application only shows articles from a single source (BBC), and only
    from today. We could add some more functionality to show articles from different
    sources and different time frames. We could also consider allowing the viewer
    to choose which category of articles to view (news, sport, politics, finance,
    etc) by using different RSS feeds as sources.

    - Our design and layout is very basic. We could make our site look better and
    be more responsive by adding more CSS. We could lay out the images in a grid of
    rows and columns to make it look better on smaller screens such as mobile phones.


    If you’d like to keep working on the web application, simply head over to [the
    Repl](https://repl.it/@GarethDwyer1/news-to-wordcloud) and fork it to continue
    your own version.


    In the next chapter, we’ll be looking at how to build our own Discord Chatbot.


    ## Building a Discord Bot with Python and Repl.it


    In this tutorial, we''ll use Repl.it[^113] and Python to build a Discord Chatbot.
    If you''re reading this tutorial, you probably have at least heard of Discord
    and likely have an existing account. If not, Discord is a VoIP and Chat application
    that is designed to replace Skype for gamers. The bot we create in this tutorial
    will be able to join a Discord server and respond to messages sent by people.
    If you prefer JavaScript, the next chapter is the same tutorial using NodeJS instead
    of Python. You''ll find it easier to follow along if you have some Python knowledge
    and have used Discord or a similar app such as Skype or Telegram before. We won''t
    be covering the very basics of Python, but we will explain each line of code in
    detail, so if you have any experience with programming, you should be able to
    follow along.


    ### Overview and requirements


    We''ll be doing all of our coding through the Repl.it web IDE and hosting our
    bot with Repl.it as well, so you won''t need to install any additional software
    on your machine. For this tutorial you will need to create a Discord[^114] account
    (if you already have one, you can skip this). There are instructions for how to
    do this in the next section.


    In this tutorial, we will be covering:


    - Creating an application and a bot user in your Discord account

    - Creating a server on Discord

    - Adding our bot to our Discord server


    Let''s get through these admin steps first and then we can get to the fun part
    of coding our bot.


    ### Creating a bot in Discord and getting a token


    You can sign up for a free account over at [the Discord register page][^115],
    and can download one of their desktop or mobile applications from [the Discord
    homepage][^116]. You can also use Discord in the browser.


    Once you have an account, you''ll want to create a Discord application. Visit
    [the Discord developer''s page][^117] and press the “New application” button,
    as in the image below.


    ![img/48efb5586f6da072fc1456bee6971293_170_0.png](img/48efb5586f6da072fc1456bee6971293_170_0.png)


    Fill out a name for your bot and select “Create”.

    The first thing to do on the next page is to note your Client ID, which you’ll
    need to add the bot to the server. You can come back later and get it from this
    page, or copy it somewhere where you can easily find it later.


    ![img/48efb5586f6da072fc1456bee6971293_170_1.png](img/48efb5586f6da072fc1456bee6971293_170_1.png)


    You can also rename the application and provide a description for your bot at
    this point and press “Save Changes”.

    You have now created a Discord application. The next step is to add a bot to this
    application, so head over to the “Bot” tab using the menu on the left and press
    the “Add Bot” button, as indicated below. Click “Yes, do it” when Discord asks
    if you’re sure about bringing a new bot to life.


    ![img/48efb5586f6da072fc1456bee6971293_171_0.png](img/48efb5586f6da072fc1456bee6971293_171_0.png)


    *Image: 3 Adding a bot to our Discord Application*


    The last thing we’ll need from our bot is a Token. Anyone who has the bot’s token
    can prove that they own the bot, so you’ll need to be careful not to share this
    with anyone. You can get the token by pressing “Click to Reveal Token”, or copy
    it to your clipboard without seeing it by pressing “Copy”.


    ![img/48efb5586f6da072fc1456bee6971293_171_1.png](img/48efb5586f6da072fc1456bee6971293_171_1.png)


    *Image: 4 Generating a token for our Discord bot*


    Take note of your token or copy it to your clipboard, as we’ll need to add it
    to our code soon.


    ### Creating a Discord server


    If you don’t have a Discord server to add your bot to, you can create one by either
    opening the desktop Discord application that you downloaded earlier or returning
    to the Discord home page in your browser. Press the “+” icon indicated by the
    exclamation mark, as shown below, to create a server.


    ![img/48efb5586f6da072fc1456bee6971293_172_0.png](img/48efb5586f6da072fc1456bee6971293_172_0.png)


    *Image: 5 Creating a Discord server*


    Press “Create a server” in the screen that follows, and then give your server
    a name. Once the server is up and running, you can chat with yourself, or invite
    some friends to chat with you. Soon we''ll invite our bot to chat with us as well.


    ### Adding your Discord bot to your Discord server


    Our Discord bot is still just a shell at this stage as we haven’t written any
    code to allow him to do anything, but let’s go ahead and add him to our Discord
    server anyway. To add a bot to your server, you’ll need the Client ID from the
    “General Information” page that we looked at before when we created our ReplBotApplication
    (ie. the client ID, not the secret bot Token).


    Create a URL that looks as follows, but using your Client ID instead of mine at
    the end: https://discordapp.com/api/oauth2/authorize?scope=bot&client_id=746269162917331028
    Visit the URL that you created in your web browser and you’ll see a page similar
    to the following where you can choose which server to add your bot to.


    ![img/48efb5586f6da072fc1456bee6971293_173_0.png](img/48efb5586f6da072fc1456bee6971293_173_0.png)


    Select the server we created in the step before this and hit the "authorize" button.
    After completing the captcha, you should get an in-app Discord notification telling
    you that your bot has joined your server.


    Now we can get to the fun part of building a brain for our bot!


    ### Creating a Repl and installing our Discord dependencies


    The first thing we need to do is create a Python Repl to write the code for our
    Discord bot. Over at [repl.it](https://repl.it)[^18], create a new Repl, choosing
    "Python" as your language.


    We don''t need to reinvent the wheel, as there is already a great Python wrapper
    for the Discord bot API over on [GitHub](https://github.com/Rapptz/discord.py)[^19],
    which makes it a lot faster to get set up with a basic Python discord bot. To
    use library, we can simply write `import discord` at the top of `main.py`. Repl.it
    will handle installing this dependency when you press the "run" button.


    Our bot is nearly ready to go – but we still need to plug in our secret token.
    This will authorize our code to control our bot.


    ### Setting up authorization for our bot


    By default, Repl.it code is public. This is great as it encourages collaboration
    and learning, but we need to be careful not to share our secret bot token (which
    gives anyone who has access to it full


