  md: "# # Data science with Repl.it: Plots and graphs\n\nSo far, all the programs\
    \ we have looked at have been entirely text based. They have taken text input\
    \ and produced text output, on the console or saved to files.\n\nWhile text is\
    \ flexible and powerful, sometimes a picture is worth a thousand words. Especially\
    \ when analysing data, you’ll often want to produce plots and graphs. There are\
    \ three main ways of achieving this using Repl.it.\n\n+   1. Creating a front-end\
    \ only project and using only JavaScript, HTML and CSS.\n2. Creating a full web\
    \ application with something like Flask, analysing the data in Python and passing\
    \ the results to a front end to be visualised.\n3. Using Python code only, creating\
    \ windows using X and rendering the plots in there.\n\nOption 1 is great if you’re\
    \ OK with your users having access to all of your data, you like doing data manipulation\
    \ in JavaScript, and your data set is small enough to load into a web browser.\
    \ Option 2 is often the most powerful, but can be overkill if you just want a\
    \ few basic plots.\n\nHere, we’ll demonstrate how to do option 3, using Python\
    \ and Matplotlib.\n\n# ## Installing Matplotlib and creating a basic line plot\n\
    \nMatplotlib is a third-party library for doing all kinds of plots and graphs\
    \ in Python. We can install it by using Repl.it’s “magic import” functionality.\
    \ Matplotlib is a large and powerful library with a lot of functionality, but\
    \ we only need pyplot for now: the module for plotting.\n\nCreate a new Python\
    \ repl and add the following code.\n\n```\n\n1 from matplotlib import pyplot as\
    \ plt\n2 \n3 plt.plot([1,2,3,4,5,6], [6,3,6,1,2,3])\n4 plt.show()\n\n```"
  merge: -1
  pgno: 43
- img_proc: true
  md: 'There are many traditions in the Python data science world about how to import
    libraries. Many of the libraries have long names and get imported as easier-to-type
    shortcuts. You’ll see that nearly all examples import `pyplot` as the shorter
    `plt` before using it, as we do above. We can then generate a basic line plot
    by passing two arrays to `plt.plot()` for X and Y values. In this example, the
    first point that we plot is (1,6) (the first value from each array). We then add
    all of the plotted points joined into a line graph.


    Repl.it knows that it needs an X server to display this plot (triggered when you
    call `plt.show()`), so after running this code you’ll see “Starting X” in the
    main output console and a new graphical window will appear.


    ![](img/48efb5586f6da072fc1456bee6971293_44_0.png)


    The X server is very limited compared to a full operating system GUI. Beneath
    the plot, you’ll see some controls to pan and zoom around the image, but if you
    try to use them you’ll see that the experience is not that smooth.


    Line plots are cool, but we can do more. Let’s plot a real data set.


    # Making a scatter plot of US cities by state


    Scatter plots are often used to plot 2D data and look for correlations and other
    patterns. However, they can also loosely be used to plot geographical X-Y coordinates
    (in reality, the field of plotting geographical points is [far more complicated](https://www.gislounge.com/what-is-gis/)).
    We’ll use a subset from the [city data from simplemaps](https://simplemaps.com/data/us-cities)
    to generate our next plot. Each row of the data set represents on city in the
    USA, and gives us its latitude, longitude, and two-letter state code.


    To download the data and plot it, replace the code in your `main.py` file with
    the following.


    > 31https://www.gislounge.com/what-is-gis/

    32https://simplemaps.com/data/us-cities'
