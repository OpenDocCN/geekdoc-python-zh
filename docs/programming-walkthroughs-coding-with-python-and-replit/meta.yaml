    https://bbc.com\" + href\n        news_urls.append(news_url)\n\n\nall_nouns =\
    \ []\nfor url in news_urls[:10]:\n    print(\"Fetching {}\".format(url))\n   \
    \ response = requests.get(url)\n    html = response.text\n    soup = BeautifulSoup(html,\
