  md: "Changing the static text that our visitors see is a good start, but our web\
    \ application still doesn’t do anything. We’ll change that in the next step by\
    \ using JavaScript to get our user’s IP Address.\n\n![](img/48efb5586f6da072fc1456bee6971293_207_0.png)\n\
    \n# # Calling IPIFY from JavaScript\n\nAn IP address is like a phone number. When\
    \ you visit “google.com”, your computer actually looks up the the name google.com\
    \ to get a resulting IP address that is linked to one of Google’s servers. While\
    \ people find it easier to remember names like “google.com”, computers work better\
    \ with numbers. Instead of typing “google.com” into your browser toolbar, you\
    \ could type the IP address 216.58.223.46, with the same results. Every device\
    \ connecting to the internet, whether to serve content (like google.com) or to\
    \ consume it (like you, reading this tutorial) has an IP address.\n\nIP addresses\
    \ are interesting to us because it is possible to guess a user’s location based\
    \ on their IP address. (In reality, this is an imprecise and highly complicated\
    \ process, but for our purposes it will be more than adequate). We will use the\
    \ web service ipify.org to retrieve our visitors’ IP addresses.\n\nIn the Repl.it\
    \ files tab, navigate to templates/base.html, which should look as follows.\n\n\
    ```\n1. {% load static %}\n2. <!DOCTYPE html>\n3. \n4. <html lang=\"en\">\n5.\
    \ <head>\n6.     <meta charset=\"UTF-8\">\n7.     <title>Hello World!</title>\n\
    8.     <meta charset=\"UTF-8\"/>\n9.     <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1\"/>\n10.     <link rel=\"stylesheet\" href=\"{% static \"css/style.css\"\
    \ %}\">\n11. </head>\n12. <body>\n13.     {% block content %}{% endblock content\
    \ %}\n```"
