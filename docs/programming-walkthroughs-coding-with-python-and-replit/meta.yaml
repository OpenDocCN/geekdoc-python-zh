  md: '# Adding a new route and view, and passing data


    Currently our Django application only has two routes, the default (admin/) route
    and our home route (/) which is loaded as our home page. We''ll add another route
    at /get_weather_from_ip where we can pass an IP address to our application to
    detect the location and get a current weather report.

    To do this, we''ll need to modify the files at mysite/views.py and mysite/urls.py.

    Edit urls.py to look as follows (add line 8, but you shouldn''t need to change
    anything else).


    ```

    1 from django.contrib import admin

    2 from django.urls import path

    3 from . import views

    4

    5 urlpatterns = [

    6     path('''', views.home, name=home),

    7     path(''admin/'', admin.site.urls),

    8     path(''get_weather_from_ip/'', views.get_weather_from_ip, name="get_weather_from_ip"),

    9 ]

    ```


    We''ve added a definition for the get_weather_from_ip route, telling our app that
    if anyone visits https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip<sup>156</sup>
    then we should trigger a function in our views.py file that is also called get_weather_from_ip.
    Let''s write that function now.

    In your views.py file, add a get_weather_from_ip() function beneath the existing
    home() one, and add an import for JsonResponse on line 2. Your whole views.py
    file should now look like this:


    ```

    1 from django.shortcuts import render

    2 from django.http import JsonResponse

    3

    4

    5 # Create your views here.

    6 def home(request):

    7     return render(request, ''index.html'')

    8

    9 def get_weather_from_ip(request):

    10     print(request.GET.get("ip_address"))

    11     data = {"weather_data": 20}

    12     return JsonResponse(data)

    ```


    <sup>156</sup>https://django-weather-tutorial-eugenedorfing.ritza.repl.co/get_weather_from_ip'
