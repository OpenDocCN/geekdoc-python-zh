    # Sharing your application with others


    Coding is more fun with friends or as part of a team. If you want to share your
    code with others, it’s as easy as copying the URL and sending it. In this case,
    the URL is https://repl.it/@GarethDwyer1/demoproject, but yours will be different
    based on your Repl.it username and the project name you chose.


    You can copy the link and open it in an incognito tab (or a different web browser)
    to see how others would experience your project if you were to share it. By default,
    they’ll be able to see all of your files and code and run your code, but not make
    any changes. If someone else tries to make changes to your repl, it’ll automatically
    get copied (“forked”) to their account, or an anonymous account if they haven’t
    signed up for Repl.it. Any changes your friends make will only happen in their
    copies, and won’t affect your code at all.


    To understand this, compare the three versions of the same repl below.


    +   - As you see it, with all of the controls

    - As your friend would see it, a read-only version

    - As your friend would see it after forking it, on an anonymous account


    ![](img/48efb5586f6da072fc1456bee6971293_18_1.png)'
