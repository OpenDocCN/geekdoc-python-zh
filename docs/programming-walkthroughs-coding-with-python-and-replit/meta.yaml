    \n![](img/48efb5586f6da072fc1456bee6971293_14_1.png)\n\n这对于原型设计或检查事物如何工作很有用，但对于你编写的任何严肃程序，你都需要能够保存它，这意味着像我们之前的例子那样将代码写入文件中。\n\
    \n## 向你的软件项目添加更多文件\n\n如果你构建更大的项目，你会希望使用多个文件来保持组织性，将相关代码分组到不同的文件中。\n\n到目前为止，我们一直在使用项目开始时自动为我们创建的‘main.py’文件，但我们并不局限于这个文件。让我们添加一个新文件，在其中编写一些代码，然后将其导入到主文件中以供使用。\n\
