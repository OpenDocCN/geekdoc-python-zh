  md: '# # Getting weather data from OpenWeatherMap


    To get weather data automatically from OpenWeatherMap167, you’ll need an API Key.
    This is a unique string that OpenWeatherMap gives to each user of their service
    and it’s used mainly to restrict how many calls each person can make in a specified
    period. Luckily, OpenWeatherMap provides a generous “free” allowance of calls,
    so we won’t need to spend any money to build our app. Unfortunately, this allowance
    is not quite generous enough to allow me to share my key with every reader of
    this tutorial, so you’ll need to sign up for your own account and generate your
    own key.


    Visit openweathermap.org168, hit the “sign up” button, and register for the service
    by giving them an email address and choosing a password. Then navigate to the
    API Keys169 section and note down your unique API key (or copy it to your clipboard).


    ![](img/48efb5586f6da072fc1456bee6971293_215_0.png)


