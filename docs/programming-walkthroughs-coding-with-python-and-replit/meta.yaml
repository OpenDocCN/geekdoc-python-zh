  md: "```\npython\ndef split_name(name):\n    first_name, last_name = name.split()\n\
    \    return [first_name, last_name]\n\nprint(split_name(\"John Smith\"))\n# >>>\
    \ [\"John\", \"Smith\"]\n```\n\nWhile this does indeed work in many cases, names\
    \ are surprisingly complicated and it’s very common to make mistakes when dealing\
    \ with them as programmers, as discussed in [this classic article](https://www.kalzumeus.com/2010/06/17/falsehoods-programmers-believe-about-names/).\
    \ It would be a huge project to try and deal with *any* name, but let’s imagine\
    \ that you have requirements to deal with the following kinds of names:\n\n+ \
    \  - First Last, e.g. John Smith\n- First Middle Last, e.g John Patrick Smith\
    \ (John Patrick taken as first name)\n- First Middle Middle Last, e.g. John Patrick\
    \ Thomson Smith (John Patrick Thomson taken as first name)\n- First last last\
    \ Last, e.g. Johan van der Berg (note the lowercase letters, Johan taken as first\
    \ name, the rest as last)\n- First Middle last last Last, e.g. Johan Patrick van\
    \ der Berg (note the lowercase letters, Johan taken as first name, the rest as\
    \ last)\n- Last, e.g. Smith (we can assume that if we are given only one name,\
    \ it is the last name)\n\nSpecifically, you can assume that once you find a name\
    \ starting with a lowercase letter, it signifies the start of a last name, and\
    \ that all other names starting with a capital letter are part of the first and\
    \ middle names. Middle names can be combined with first names.\n\nOf course, this\
    \ does not cover all possibilities, but it is a good starting point in terms of\
    \ requirements.\n\nUsing TDD, we always write *failing tests* first. The idea\
    \ is that we should write a test about how some code *should* behave, check to\
    \ make sure that it breaks in the way we expect (as the code isn’t there). Only\
    \ then do we write the actual code and check that the tests now pass.\n\n# Writing\
    \ the test cases for our names function\n\nNow that we understand what our function\
    \ should do, we can write tests to check that it does. In the `tests/test_name_helper.py`\
    \ file, add the following code."
