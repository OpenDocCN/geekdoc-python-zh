  mdcn: "我们现在在第6行获取天气数据，在第7和第8行将其解析为描述和温度，并在第9行将其添加到我们传回模板的字符串中。如果你重新加载页面，你应该能看到你的位置和天气信息。\n\
    \n然后点击“Fork”按钮。如果你在本教程开始时没有创建账户，系统会提示你创建一个。（即使不创建账户，你也可以使用Repl的许多功能。）\n\n![](img/48efb5586f6da072fc1456bee6971293_218_0.png)\n\
    \n如果你缺乏灵感，以下是一些可能的扩展方向：\n\n- 通过在模板文件中使用[Bootstrap](https://getbootstrap.com/)或其他CSS框架，让页面看起来更美观。\n\
    - 通过允许用户在IP位置猜测错误时选择自己的位置，使应用更具可定制性。\n- 通过显示天气预报（而不仅仅是当前天气）使应用更有用。（这些数据也可以从Open\
    \ Weather Map [获取](https://openweathermap.org/forecast5)）。\n- 向Web应用添加其他与位置相关的数据，例如新闻、货币转换、翻译、邮政编码。请参阅[https://github.com/toddmotto/public-apis#geocoding](https://github.com/toddmotto/public-apis#geocoding)获取一个不错的可能性列表。\n\
    \n在下一章中，我们将学习如何使用NodeJS和Repl.it构建我们自己的CRM应用。本教程还将向你介绍如何设置MongoDB数据库和创建用户界面。\n\n\
    ## 使用NodeJS、Repl.it和MongoDB构建CRM应用\n\n在本教程中，我们将使用Repl.it上的NodeJS以及MongoDB数据库来构建一个基本的CRUD^[175]^（创建、读取、更新、删除）CRM^[176]^（客户关系管理）应用程序。CRM允许你存储客户信息，以帮助你跟踪每个客户关系的状态。这可以帮助企业跟踪他们的客户，并最终增加销售额。该应用程序将能够存储和编辑客户详细信息，以及保存关于他们的笔记。\n\
    \n本教程不会涵盖Node.js的基础知识，但每一行代码都会被详细解释。\n\n## 概述和要求\n\n所有代码都将在Repl.it中编写和托管，因此你不需要在计算机上安装任何额外的软件。在本教程中，我们将涵盖：\n\
    \n- 在MongoDB Atlas^[177]^上创建账户\n- 将我们的数据库连接到我们的Repl\n- 创建一个用于插入客户数据的用户界面\n- 更新和删除数据库条目\n\
    \n在本教程结束时，你将创建的应用程序将能够在MongoDB数据库中创建、更新和删除文档。你还将使用一个名为Express^[178]^的Web应用框架和Pug^[179]^模板引擎。\n\
    \n## 在MongoDB Atlas上创建账户\n\nMongoDB Atlas是一个完全托管的数据库即服务。它提供了一个文档数据库（通常称为NoSQL），而不是像PostgreSQL这样的更传统的关系型数据库。\n\
    \n前往MongoDB Atlas^[180]^并点击“Try free”按钮。然后你应该注册，点击“Get started free”按钮完成流程。\n\n\
    ^[175]^ https://en.wikipedia.org/wiki/Create,_read,_update_and_delete\n^[176]^\
    \ https://en.wikipedia.org/wiki/Customer_relationship_management\n^[177]^ https://www.mongodb.com/cloud/atlas\n\
    ^[178]^ https://expressjs.com/\n^[179]^ https://pugjs.org/api/getting-started.html\n\
    ^[180]^ https://www.mongodb.com/cloud/atlas\n\n注册后，在“Shared Clusters”下，点击“Create\
    \ a Cluster”按钮。\n现在你必须选择一个提供商和一个区域。出于本教程的目的，我们选择了Google Cloud Platform作为提供商，Iowa\
    \ (us-central1)作为区域，尽管无论提供商和区域如何，它都应该可以工作。\n\n![](img/48ef5586f6da072fc1456bee6971293_220_0.png)\n\
    \n在“Cluster Name”下，你可以更改集群的名称。请注意，你现在只能更改名称——集群创建后就无法更改了。完成此操作后，点击“Create Cluster”。\n\
    \n![](img/48ef5586f6da072fc1456bee6971293_220_1.png)\n\n稍等片刻，你的集群就会创建完成。一旦它可用，点击左侧栏“Security”标题下的“Database\
    \ Access”，然后点击“Add New Database User”。你需要一个数据库用户才能实际存储和检索数据。为用户输入用户名和密码，并记下这些详细信息——你稍后会需要它们。选择“Read\
    \ and write to any database”作为用户权限。点击“Add User”完成此步骤。\n\n![](img/48ef5586f6da072fc1456bee6971293_221_0.png)\n\
    \n接下来，你需要允许对数据库的网络访问。点击左侧栏中的“Network Access”，然后点击“Add IP Address”。由于我们不会从Repl.it获得静态IP，我们将只允许从任何地方访问——别担心，数据库仍然受到你之前创建的用户名和密码的保护。在弹出窗口中，点击“Allow\
    \ Access From Anywhere”，然后点击“Confirm”。\n\n![](img/48ef5586f6da072fc1456bee6971293_222_0.png)\n\
    \n**图片：4 *允许从任何地方访问***\n\n现在选择左侧栏“Data Storage”下的“Clusters”。点击“Connect”并选择“Connect\
    \ Your Application”。这将改变弹出窗口的视图。复制“Connection String”，因为你稍后将需要它从Repl.it连接到你的数据库。它看起来会像这样：`mongodb+srv://<username>:<password>@cluster0-zrtwi.gcp.mongodb.net/test?retryWrites=true&w=majority`\n\
    \n![](img/48ef5586f6da072fc1456bee6971293_223_0.png)\n\n## 创建Repl并连接到我们的数据库\n\n\
    首先，我们需要创建一个新的Node.js Repl来编写连接到我们全新的数据库所需的代码。导航到repl.it并创建一个新的Repl，选择“Node.js”作为语言。\n\
    \nRepl的一个很棒之处在于它默认将项目设为公开。这使得共享变得容易，并且非常适合协作和学习，但我们必须小心，不要让我们的数据库凭据在开放的互联网上可用。\n\
    \n为了解决这个问题，我们将使用`环境变量`，就像我们在之前的教程中所做的那样。我们将创建一个Repl.it识别并为你保密的特殊文件，在该文件中，我们声明的变量将成为我们Repl.it开发环境的一部分，并且可以在我们的代码中访问。\n\
    \n在你的Repl中，通过选择左侧窗格中的“Files”然后点击“Add File”按钮，创建一个名为`.env`的文件。注意拼写必须完全正确，否则文件将不会被识别。按照以下格式将你的MongoDB数据库用户名和密码（不是你登录MongoDB\
    \ Atlas的详细信息）添加到文件中：\n\n```\nMONGO_USERNAME=username\nMONGO_PASSWORD=password\n\
    ```\n\n- **替换** `username` 和 `password` 为你的数据库用户名和密码\n- **空格很重要。** 确保你在等号前后没有添加任何空格\n\
    \n现在我们已经为数据库设置了凭据，我们可以继续在代码中连接到它。\n\nMongoDB很贴心地提供了一个我们可以使用的客户端。为了测试我们的数据库连接，我们将向数据库中插入一些客户数据。在你的`index.js`文件中（自动创建，位于Files窗格下），添加以下代码：\n\
    \n```\nconst MongoClient = require('mongodb').MongoClient;\nconst mongo_username\
    \ = process.env.MONGO_USERNAME\nconst mongo_password = process.env.MONGO_PASSWORD\n\
    \nconst uri = `mongodb+srv://${mongo_username}:${mongo_password}@cluster0-zrtwi.gcp.mongodb.net/crmdb?retryWrites=true&w=majority`;\n\
    const client = new MongoClient(uri, { useNewUrlParser: true });\n```\n\n让我们分解一下，看看发生了什么以及我们还需要更改什么：\n\
    \n- **第1行** 添加了MongoDB客户端的依赖项。正如我们之前讨论的，Repl.it通过为我们安装所有依赖项使事情变得简单，因此我们不必使用像npm这样的工具手动操作。\n\
    - **第2行和第3行** 我们从之前设置的环境变量中检索MongoDB用户名和密码。\n- **第5行** 有一些非常重要的细节我们需要正确处理。\n \
    \   - 将@和下一个/之间的部分替换为我们之前从MongoDB复制的连接字符串中的相同部分。你可能会注意到字符串开头附近的冒号前后的`${mongo_username}`和`${mongo_password}`。这些被称为模板字面量。模板字面量允许我们将变量放入字符串中，Node.js随后会方便地用变量的实际值替换它们。\n\
    \    - 注意/之后和?之前的`crmdb`。这将是我们将使用的数据库的名称。如果数据库不存在，MongoDB会为我们创建它。你可以将其更改为任何你想要的数据库名称，但请记住你更改为什么，以便在本教程的后续部分使用。\n\
    - **第6行** 创建了我们将用于连接到数据库的客户端。\n\n## 创建用于插入客户数据的用户界面\n\n我们将创建一个HTML表单来捕获客户数据并将其发送到我们的Repl.it代码，然后将其插入到我们的数据库中。\n\
    \n为了实际呈现和处理HTML表单，我们需要一种处理HTTP GET和POST请求的方法。最简单的方法是使用Web应用框架。一个Web应用"
