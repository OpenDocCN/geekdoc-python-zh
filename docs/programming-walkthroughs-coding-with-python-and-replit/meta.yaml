  md: '# Overview of the actual partition implementation


    Let’s pull out a few key parts of the good `partition` function that might be
    especially confusing before getting into the detailed explanation. Here it is
    again for reference.


    ```

    1 def partition(xs, start, end):

    2     follower = leader = start

    3     while leader < end:

    4         if xs[leader] <= xs[end]:

    5             xs[follower], xs[leader] = xs[leader], xs[follower]

    6             follower += 1

    7         leader += 1

    8     xs[follower], xs[end] = xs[end], xs[follower]

    9     return follower

    ```


    In our good `partition` function, you can see that we do some swap operations
    (lines 5 and 8) on the `xs` that is passed in, but we never allocate any new memory.
    This means that the storage remains constant to the size of `xs`, or O(n) in Computer
    Science terms. That is, this algorithm has *half* the space requirement of the
    “bad” implementation above, and should therefore allow us to sort lists that are
    twice the size using the same amount of memory.


    The confusing part of this implementation is that although everything is based
    around our pivot element (the last item of the list in our case), and although
    the pivot element ends up somewhere in the middle of the list at the end, we don’t
    actually touch the pivot element *until the very last swap*.


    Instead, we have two other counters (`follower` and `leader`) which move around
    the smaller and bigger numbers in a clever way and implicitly keep track of where
    the pivot element should end up. We then switch the pivot element into the correct
    place at the end of the loop (line 8).


    The `leader` is just a loop counter. Every iteration it increments by one until
    it gets to the pivot element (the end of the list). The follower is more subtle,
    and it keeps count of the number of swap iterations we do, moving up the list
    more slowly than the leader, tracking where our pivot element should eventually
    end up.


    The other confusing part of this algorithm is on line 4. We move through the list
    from left to right. All numbers are currently to the *left* of the pivot but we
    eventually want the “big” items to end up on the *right*.


    Intuitively, you would then expect us to do the swapping action when we find an
    item that is *larger* than the pivot, but in fact, we do the opposite. When we
    find items that are *smaller* than the pivot, we swap the leader and the follower.


    You can think of this as pushing the small items further to the left. Because
    the leader is always ahead of the follower, when we do a swap, we are swapping
    a small element with one further left in the list. The follower only looks at
    “big” items (ones that the leader has passed over without action), so when we
    do the swap, we’re swapping a small item (leader) with a big one (follower), meaning
    that small items will move towards the left and large ones towards the right.'
