- md: "如果你多次运行脚本，每个文件仍然只包含一行数据：即最近一次运行的数据。这是因为当我们以“write”模式（\"w\"）打开文件时，它会用新数据覆盖旧数据。因为我们希望创建历史天气日志，所以需要将倒数第二行改为使用“append”模式（\"\
    a\"）。\n\n将\n```\nwith open(f\"{city}.txt\", \"w\") as f:\n```\n改为\n```\nwith open(f\"\
