    \ _quicksort(xs, start, end):\n    if start >= end:\n        return\n    p = partition(xs,\
    \ start, end)\n    _quicksort(xs, start, p-1)\n    _quicksort(xs, p+1, end)\n\n\
    def quicksort(xs):\n    _quicksort(xs, 0, len(xs)-1)\n```\n\n### The Partition\
    \ algorithm\n\nThe idea behind the partition algorithm seems intuitive, but the\
    \ actual algorithm to do it efficiently is pretty counter-intuitive.\n\nLet's\
    \ start with the easy part – the idea. We have a list of numbers that isn't sorted.\
    \ We pick a point in this list, and make sure that all larger numbers are to the\
    \ *right* of that point and all the smaller numbers are to the *left*. For example,\
    \ given the random list:\n\n```python\nxs = [8, 4, 2, 2, 1, 7, 10, 5]\n```\n\n\
    We could pick the *last* element (5) as the pivot point. We would want the list\
    \ (after partitioning) to look as follows:\n\n```python\nxs = [4, 2, 2, 1, 5,\
    \ 7, 10, 8]\n```\n\nNote that this list isn't sorted, but it has some interesting\
    \ properties. Our pivot element, 5, is in the correct place (if we sort the list\
    \ completely, this element won't move). Also, all the numbers to the left are\
    \ smaller than 5 and all the numbers to the right are greater.\n\nBecause 5 is\
    \ in the correct place, we can ignore it after the partition algorithm (we won't\
    \ need to move it again). This means that if we can sort the two smaller sublists\
    \ to the left and right of 5 ([4, 2, 2, 1] and [7, 10, 8]) then the entire list\
    \ will be sorted. Any time we can efficiently break a problem into smaller sub-problems,\
    \ we should think of *recursion* as a tool to solve our main problem. Using recursion,\
    \ we often don’t even have to think about the entire solution. Instead, we define\
    \ a base case (a list of length 0 or 1 is always sorted), and a way to divide\
    \ a larger problem into smaller ones (e.g. partitioning a list in two), and almost\
    \ by magic the problem solves itself!\n\nBut we’re getting ahead of ourselves\
    \ a bit. Let’s take a look at how to actually implement the partition algorithm\
    \ on its own, and then we can come back to using it to implement a sorting algorithm.\n\
    \n### A bad partition implementation\n\nYou could probably easily write your own\
    \ partition algorithm that gets the correct results without referring to any textbook\
    \ implementations or thinking about it too much. For example:\n\n```python\ndef\
    \ bad_partition(xs):\n    smaller = []\n    larger = []\n    pivot = xs.pop()\n\
    \    for x in xs:\n        if x >= pivot:\n            larger.append(x)\n    \
    \    else:\n            smaller.append(x)\n    return smaller + [pivot] + larger\n\
    ```\n\nIn this implementation, we set up two temporary lists (smaller and larger).\
    \ We then take the pivot element as the last element of the list (pop takes the\
    \ last element and removes it from the original xs list).\n\nWe then consider\
    \ each element x in the list xs. The ones that are smaller than the pivot, we\
    \ store in the smaller temporary list, and the others go to the larger temporary\
    \ list. Finally, we combine the two lists with the pivot item in the middle, and\
    \ we have partitioned our list.\n\nThis is much easier to read than the implementation\
    \ at the start of this post, so why don’t we do it like this?\n\nThe primary advantage\
    \ of Quicksort is that it is an *in place* sorting algorithm. Although for the\
    \ toy examples we’re looking at, it might not seem like much of an issue to create\
