    \ screen in response to those keystrokes and mouse movements, and to other events²⁰⁸\
    \ in the game. We achieve this with an infinite `while` loop. PyGame uses the\
    \ final `clock.tick(60)` line in this loop to adjust the game's framerate in line\
    \ with how long each iteration of the loop takes, in order to keep the game running\
    \ smoothly.\n\nNow let's draw something on this black screen. Our game is going\
    \ to have two sprites: an alien, which will be the player, and a box. To avoid\
