    \n```\ntemperature = js['current']['temperature']\ndate = js['location']['localtime']\n\
    city = js['location']['name']\ncountry = js['location']['country']\n\nprint(f\"\
    The temperature in {city}, {country} on {date} is {temperature} degrees Celsius\"\
    )\n```\n\n如果你再次运行代码，你会看到更友好的输出，如下所示。\n\n这非常适合获取当前天气，但现在我们想稍微扩展一下，以记录历史天气。\n\n\
