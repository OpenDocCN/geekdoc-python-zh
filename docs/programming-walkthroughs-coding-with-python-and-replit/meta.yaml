    \ This is because we haven’t added the code that handles the form POST request,\
    \ so let’s do that.\n\n![](img/48efb5586f6da072fc1456bee6971293_229_1.png)\n\n\
    Image: 8 *Cannot POST/create*\n\nAdd the following code into your index.js file,\
    \ below the app.get entry that we made above.\n\n```\napp.post('/create', function\
    \ (req, res, next) {\n  client.connect(err => {\n    const customers = client.db(\"\
