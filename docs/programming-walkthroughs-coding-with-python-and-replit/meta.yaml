    around with and extend. If you were simply reading, you can easily fork my bot
    at [https://repl.it/@GarethDwyer1/discord-bot-node](https://repl.it/@GarethDwyer1/discord-bot-node)
    $^{142}$ and extend it how you want (you’ll need to add your own token and recreate
    the `.env` file still). Happy hacking!


    If you’re stuck for ideas, why not link up your Discord bot to the [Twitch API](https://dev.twitch.tv/)
    $^{143}$ to get notified when your favourite streamers are online, or build a
    [text adventure](https://en.wikipedia.org/wiki/Interactive_fiction) $^{144}$.


    In the next chapter, we’ll be looking at building our own basic web application,
    using Django. This tutorial will also introduce you to HTML, JavaScript, and jQuery
    and will assist you in getting to the point where you can begin to build your
    own custom web applications.


    +   1. https://en.wikipedia.org/wiki/Von_Neumann_architecture

    2. https://www.sqlite.org/index.html

    3. https://repl.it/@GarethDwyer1/discord-bot-node

    4. https://dev.twitch.tv/

    5. https://en.wikipedia.org/wiki/Interactive_fiction'
- md: "## Creating and hosting a basic web application with Django and Repl.it\n\n\
    In this tutorial, we’ll be using Django to create an online service that shows\
    \ visitors their current weather and location. We’ll develop the service and host\
    \ it using repl.it¹⁴⁵.\n\nTo work through this tutorial, you should ideally have\
    \ basic knowledge of Python and some knowledge of web application development.\
    \ However, we’ll explain all of our reasoning and each line of code thoroughly,\
    \ so if you have any programming experience you should be able to follow along\
    \ as a complete Python or web app beginner too. We’ll also be making use of some\
    \ HTML, JavaScript, and jQuery, so if you have been exposed to these before you’ll\
    \ be able to work through more quickly. If you haven’t, this will be a great place\
    \ to start.\n\nTo display the weather at the user’s current location, we’ll have\
    \ to tie together a few pieces. The main components of our system are:\n\n- A\
    \ Django¹⁴⁶ application, to show the user a webpage with dynamic data\n- Ipify¹⁴⁷\
    \ to get our visitors’ IP address so that we can guess their location\n- ip-api¹⁴⁸\
    \ to look up our visitors’ city and country using their IP address\n- Open Weather\
    \ Map¹⁴⁹ to get the current weather at our visitors’ location.\n\n- Show how to\
    \ set up and host a Django application using repl.it.\n- Show how to join existing\
    \ APIs together to create a new service.\n\nBy using this tutorial as a starting\
    \ point, you can easily create your own bespoke web applications. Instead of showing\
    \ weather data to your visitors, you could, for example, pull and combine data\
    \ from any of the hundreds of APIs found at [this list of public APIs](https://github.com/toddmotto/public-apis)¹⁵⁰.\n\
    \n## Setting up\n\nYou won’t need to install any software or programming languages\
    \ on your local machine, as we’ll be developing our application directly through\
    \ [repl.it](https://repl.it)¹⁵¹. Head over there and create an account.\nPress\
    \ the + button in the top right to create a new project and search for “Django\
    \ Template”. Give your project a name and press “Create repl”.\n\nBy default,\
    \ Django comes with a pretty complicated folder structure of existing files and\
    \ folders. There’s also a README.md file that will open by default, giving you\
    \ some guidance on how to find your way around.\n\n## Developing Django on Repl.it\n\
    \n- Fork this template to get started\n- Simply hit run to start the server\n\
    - The server will autoreload as needed. You don't need to restart the server manually.\n\
    \n## Add your first view\n\n1. Create a file under mysite named views.py with\
    \ the following contents:\n\nWe won’t explain what all these different components\
    \ are for and how they tie together in this tutorial. If you want to understand\
    \ Django better, you should go through their official tutorial¹⁵².\n\nIn this\
    \ tutorial, we’ll just look at the few files that we need to modify to get our\
    \ basic application working.\n\nHit the Run button in the bar at the top and you’ll\
    \ see Repl.it install all of the required packages and start up the default Django\
    \ app.\n\n152 https://docs.djangoproject.com/en/2.0/intro/tutorial01/\n\n## Creating\
    \ a static home page\n\nViewing the default website isn’t that interesting and\
    \ you’ll notice that there are no files containing the content you currently see,\
    \ so you can’t easily modify it.\n\nTo create our own page in place, we’ll have\
    \ to modify several files. If you’ve created a basic HTML file before, you might\
    \ be surprised at how complicated this step is. Like other frameworks, Django\
    \ “makes the easy things hard, and the hard things possible”. If you just want\
    \ to display a basic web page, it’s probably over kill, but as your web app grows,\
    \ you’ll find use for all of the extra structure.\n\nLet’s set up a basic “Hello\
    \ world” page to make sure we have the pieces in place. You’ll need to create\
    \ several more folders and files to achieve this.\n\nCreate a folder called `templates`.\
    \ This is where Django will get HTML templates for rendering pages.\n\nLet's add\
    \ the HTML templates that we will use to render our static page. Create a file\
    \ called `base.html` within the newly created templates folder and add the following\
    \ code.\n\n```html\n{% load static %}\n<!DOCTYPE html>\n\n<html lang=\"en\">\n\
    <head>\n    <meta charset=\"UTF-8\">\n    <title>Hello World!</title>\n    <meta\
    \ charset=\"UTF-8\"/>\n    <meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1\"/>\n    <link rel=\"stylesheet\" href=\"{% static \"css/style.css\"\
    \ %}\">\n</head>\n<body>\n    {% block content %}{% endblock content %}\n</body>\n\
    </html>\n```\n\nThe above is a basic HTML template that our Django app will use\
    \ when rendering pages. We also link to a stylesheet that Django will get from\
    \ a folder called `static/css` which we will create soon. Note the `{% load static\
    \ %}` in the first line, this is to tell Django that we are using static files\
    \ in this template ie. `style.css`.\n\nStill in the templates folder, create a\
    \ file called `index.html` and add the following code.\n\n```html\n{% extends\
    \ \"base.html\" %}\n\n{% block content %}\n  <h1>Hello World!</h1>\n{% endblock\
    \ content %}\n```\n\nThis is a file written in Django's template language<sup>153</sup>,\
    \ which often looks very much like HTML (and is usually found in files with a\
    \ .html extension), but which contains some extra functionality to help us load\
    \ dynamic data from the back end of our web application into the front end for\
    \ our users to see.\n\nThe above extends the base.html template and adds the block\
    \ content to it, in this case “Hello World!”.\n\nDjango looks for template folders\
    \ within “app” folders by default. This is helpful when you have multiple apps\
    \ within your project but in this case we don’t so we need to tell Django where\
    \ to find our templates folder.\n\nOpen the mysite/settings.py file, scroll down\
    \ to TEMPLATES and add os.path.join(BASE_DIR, 'templates') within the square brackets\
    \ next to DIRS: like below\n\nNow that we have our templates added, let’s add\
    \ the folders and files for adding the stylesheet.\n\nCreate a folder called static\
    \ and also create a folder called css within the static folder.\n\nCreate a file\
    \ called style.css within the static/css/ directory and add the following code.\n\
    \n```css\nbody {\n  background-color: lightblue;\n}\n\nh1 {\n  color: navy;\n\
    \  margin-left: 20px;\n}\n```\n\nAbove we add basic CSS code to demonstrate how\
    \ you can modify the look of your site.\n\nDjango handles static files similar\
    \ to templates where it automatically checks app directories for a directory called\
    \ `static`. Since we only have a static page instead of apps we need to tell Django\
    \ where our static directory is located.\n\nOpen the `mysite/settings.py` file,\
    \ scroll all the way down and add the following code right after `STATIC_URL =\
    \ '/static/'`\n\n```python\nSTATICFILES_DIRS = (os.path.join(BASE_DIR, 'static'),)\n\
    ```\n\nWithin the mysite/ directory, create a file called views.py and add the\
    \ following code.\n\n```python\nfrom django.shortcuts import render\n\n# Create\
    \ your views here.\ndef home(request):\n    return render(request, 'index.html')\n\
    ```\n\nA view function in Django is a Python function that takes Web requests\
    \ and returns a Web response. This is where you add the logic that will return\
    \ a certain response when called. In our case we define a view that will return\
    \ the index.html page.\n\nTo call this view function we need to add it to our\
    \ url patterns. Open the `mysite/urls.py` file and replace the contents with the\
    \ below code.\n\n```python\nfrom django.contrib import admin\nfrom django.urls\
    \ import path\nfrom . import views\n\nurlpatterns = [\n    path('', views.home,\
    \ name='home'),\n    path('admin/', admin.site.urls),\n]\n```\n\nNote that we\
    \ import the views file created earlier `from . import views`. Then we add the\
    \ url pattern with an empty path '' and point it to the `home` view created earlier.\
    \ The `admin/` path points to the admin page that comes as a default with Django.\n\
    \nWhen Django receives a request it goes through the `urlpatterns` list until\
    \ it finds a match. In our case `<url>.com` will match the first path and return\
    \ the `home` view that will render the `index.html` page. If we navigate to `<url>.com/admin/`,\
    \ Django will match the pattern of the `admin/` path and return the admin page.\n\
    \nRestart your server and refresh the web page on the right. You should see our\
    \ “Hello World!” page.\n\nGreat, we have now put all the pieces in place for our\
    \ “Hello World!” web page. Let’s expand this and start building our weather app."
  mdcn: "## 使用 Django 和 Repl.it 创建并托管一个基础 Web 应用\n\n在本教程中，我们将使用 Django 来创建一个在线服务，该服务向访客展示他们当前的天气和位置信息。我们将通过\
    \ repl.it¹⁴⁵ 来开发和托管此服务。\n\n要完成本教程，理想情况下你应该具备基本的 Python 知识和一些 Web 应用开发经验。然而，我们会详细解释所有推理过程和每一行代码，因此即使你有任何编程经验，也应该能跟随教程，即使你是一个完全的\
    \ Python 或 Web 应用初学者也能跟上。我们还会使用一些 HTML、JavaScript 和 jQuery，如果你之前接触过这些，将会更快地完成教程。如果没有，这也将是一个很好的起点。\n\
    \n要在用户的当前位置显示天气，我们需要整合几个部分。我们系统的主要组件是：\n\n- 一个 Django¹⁴⁶ 应用程序，用于向用户展示包含动态数据的网页。\n\
    - Ipify¹⁴⁷，用于获取访客的 IP 地址，以便我们推测其位置。\n- ip-api¹⁴⁸，通过访客的 IP 地址查询其所在城市和国家。\n- Open\
    \ Weather Map¹⁴⁹，用于获取访客所在位置的当前天气。\n\n- 展示如何使用 repl.it 设置和托管一个 Django 应用程序。\n-\
    \ 展示如何将现有的 API 组合起来以创建新的服务。\n\n以此教程为起点，你可以轻松创建自己的定制化 Web 应用。例如，你可以从[这个公共 API 列表](https://github.com/toddmotto/public-apis)¹⁵⁰中成百上千的\
    \ API 中拉取和组合数据，而不是向你的访客展示天气数据。\n\n## 环境设置\n\n你不需要在本地机器上安装任何软件或编程语言，因为我们将直接通过 [repl.it](https://repl.it)¹⁵¹\
    \ 开发我们的应用程序。前往该网站并创建一个账户。\n按下右上角的 + 按钮创建一个新项目，并搜索 \"Django Template\"。为你的项目命名，然后按下\
    \ \"Create repl\"。\n\n默认情况下，Django 自带一个相当复杂的现有文件夹结构。还有一个默认打开的 README.md 文件，为你提供一些关于如何浏览项目的指导。\n\
    \n## 在 Repl.it 上进行 Django 开发\n\n- Fork 此模板以开始使用。\n- 只需点击运行即可启动服务器。\n- 服务器会根据需要自动重新加载。你无需手动重启服务器。\n\
    \n## 添加你的第一个视图\n\n1. 在 `mysite` 下创建一个名为 `views.py` 的文件，内容如下：\n\n在本教程中，我们不会解释所有这些不同组件的用途以及它们如何关联。如果你想更好地理解\
    \ Django，应该查阅他们的官方教程¹⁵²。\n\n在本教程中，我们将只关注为了使基本应用工作起来需要修改的几个文件。\n\n点击顶部栏中的 Run 按钮，你会看到\
    \ Repl.it 安装所有必需的包并启动默认的 Django 应用。\n\n152 https://docs.djangoproject.com/en/2.0/intro/tutorial01/\n\
    \n## 创建静态主页\n\n查看默认网站并不是那么有趣，你会注意到没有包含你当前看到内容的文件，因此你无法轻松修改它。\n\n要在原地创建我们自己的页面，我们需要修改几个文件。如果你之前创建过基本的\
    \ HTML 文件，你可能会惊讶于这一步的复杂程度。像其他框架一样，Django “让简单的事情变难，让困难的事情成为可能”。如果你只想显示一个基本的网页，它可能有点大材小用，但随着你的\
    \ Web 应用增长，你会发现所有这些额外结构都有其用处。\n\n让我们设置一个基本的“Hello world”页面，以确保我们所有的组件都已就位。为此，你需要创建更多的文件夹和文件。\n\
    \n创建一个名为 `templates` 的文件夹。Django 将从这里获取用于渲染页面的 HTML 模板。\n\n让我们添加将用于渲染静态页面的 HTML\
    \ 模板。在新创建的 `templates` 文件夹内创建一个名为 `base.html` 的文件，并添加以下代码。\n\n```html\n{% load\
    \ static %}\n<!DOCTYPE html>\n\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
    UTF-8\">\n    <title>Hello World!</title>\n    <meta charset=\"UTF-8\"/>\n   \
    \ <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"/>\n\
    \    <link rel=\"stylesheet\" href=\"{% static \"css/style.css\" %}\">\n</head>\n\
    <body>\n    {% block content %}{% endblock content %}\n</body>\n</html>\n```\n\
    \n以上是一个基本的 HTML 模板，我们的 Django 应用将在渲染页面时使用它。我们还链接了一个样式表，Django 将从一个名为 `static/css`\
    \ 的文件夹中获取它，我们稍后会创建这个文件夹。注意第一行的 `{% load static %}`，这是为了告诉 Django 我们在此模板中使用静态文件，即\
    \ `style.css`。\n\n仍然在 `templates` 文件夹中，创建一个名为 `index.html` 的文件，并添加以下代码。\n\n```html\n\
    {% extends \"base.html\" %}\n\n{% block content %}\n  <h1>Hello World!</h1>\n\
    {% endblock content %}\n```\n\n这是一个使用 Django 模板语言<sup>153</sup> 编写的文件，它通常看起来非常像\
    \ HTML（并且通常存在于扩展名为 .html 的文件中），但它包含一些额外功能，帮助我们将动态数据从 Web 应用的后端加载到前端供用户查看。\n\n\
    上面的代码扩展了 `base.html` 模板并向其添加了 `content` 块，在本例中是“Hello World!”。\n\nDjango 默认会在“应用”文件夹内寻找模板文件夹。当你在项目中包含多个应用时这很有用，但在本例中我们没有，所以我们需要告诉\
    \ Django 在哪里找到我们的模板文件夹。\n\n打开 `mysite/settings.py` 文件，向下滚动到 `TEMPLATES`，并在 `DIRS:`\
    \ 旁边的方括号内添加 `os.path.join(BASE_DIR, 'templates')`，如下所示：\n\n现在我们已经添加了模板，让我们为添加样式表创建文件夹和文件。\n\
    \n创建一个名为 `static` 的文件夹，并在 `static` 文件夹内创建一个名为 `css` 的文件夹。\n\n在 `static/css/` 目录中创建一个名为\
    \ `style.css` 的文件，并添加以下代码。\n\n```css\nbody {\n  background-color: lightblue;\n\
    }\n\nh1 {\n  color: navy;\n  margin-left: 20px;\n}\n```\n\n上面我们添加了基本的 CSS 代码，以演示如何修改网站的外观。\n\
    \nDjango 处理静态文件与模板类似，它会自动检查应用目录下是否有名为 `static` 的目录。由于我们只有一个静态页面而不是应用，我们需要告诉 Django\
    \ 我们的静态目录位于何处。\n\n打开 `mysite/settings.py` 文件，一直滚动到底部，在 `STATIC_URL = '/static/'`\
    \ 之后添加以下代码。\n\n```python\nSTATICFILES_DIRS = (os.path.join(BASE_DIR, 'static'),)\n\
    ```\n\n在 `mysite/` 目录内，创建一个名为 `views.py` 的文件，并添加以下代码。\n\n```python\nfrom django.shortcuts\
    \ import render\n\n# Create your views here.\ndef home(request):\n    return render(request,\
    \ 'index.html')\n```\n\nDjango 中的视图函数是一个接收 Web 请求并返回 Web 响应的 Python 函数。在这里你可以添加逻辑，以便在调用时返回特定的响应。在我们的例子中，我们定义了一个视图，它将返回\
    \ `index.html` 页面。\n\n要调用此视图函数，我们需要将其添加到 URL 模式中。打开 `mysite/urls.py` 文件，并将内容替换为以下代码。\n\
    \n```python\nfrom django.contrib import admin\nfrom django.urls import path\n\
    from . import views\n\nurlpatterns = [\n    path('', views.home, name='home'),\n\
    \    path('admin/', admin.site.urls),\n]\n```\n\n注意，我们导入了之前创建的视图文件 `from . import\
    \ views`。然后我们添加了一个带有空路径 `''` 的 URL 模式，并将其指向之前创建的 `home` 视图。`admin/` 路径指向 Django\
    \ 默认附带的管理页面。\n\n当 Django 收到一个请求时，它会遍历 `urlpatterns` 列表，直到找到匹配项。在我们的例子中，`<url>.com`\
    \ 将匹配第一个路径，并返回将渲染 `index.html` 页面的 `home` 视图。如果我们导航到 `<url>.com/admin/`，Django\
    \ 将匹配 `admin/` 路径的模式并返回管理页面。\n\n重启你的服务器，并在右侧刷新网页。你应该能看到我们的“Hello World!”页面。\n\n\
    很好，我们现在为我们的“Hello World!”网页放置好了所有组件。让我们扩展它，并开始构建我们的天气应用。"
