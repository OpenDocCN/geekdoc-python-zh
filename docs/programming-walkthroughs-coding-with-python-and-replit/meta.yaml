    +   - Look at RSS feeds and how to use them in Python

    - Show how to set up a basic Flask web application

    - Use BeautifulSoup to extract text from online news articles

    - Use WordCloud to transform the text into images

    - Import Bootstrap and add some basic CSS styling


    We''ll be using the online programming environment Repl.it99 so you won''t need
    to install any software locally to follow along step by step. If you want to adapt
    this guide to your own needs, you should create a free account by going to repl.it100
    and follow their sign up process.


    # ## Web scraping


    We previously looked at basic web scraping in an introduction to web scraping101.
    If you''re completely new to the idea of automatically retrieving content from
    the internet, have a look at that tutorial first.


    In this tutorial, instead of scraping the links to news articles directly from
    the BBC homepage, we''ll be using RSS feeds102 - an old but popular standardised
    format that publications use to let readers know when new content is available.


    # ## Taking a look at RSS Feeds


    RSS feeds are published as XML documents. Every time BBC (and other places) publishes
    a new article to their home page, they also update an XML machine-readable document
    at http://feeds.bbci.co.uk/news/world/ This is a fairly simple feed consisting
    of a <channel> element, which has some metadata and then a list of <item> elements,
    each of which represents a new article. The articles are arranged chronologically,
    with the newest ones at the top, so it''s easy to retrieve new content.


