    \ Call the file solver.py. You now have two files in your project: main.py and\
    \ solver.py. You can switch between your files by clicking on them.\n\n![](img/48efb5586f6da072fc1456bee6971293_17_0.png)\n\
    \nOpen the `solver.py` file and add the following code to it.\n\n```python\nimport\
    \ math\n\ndef solve_quadratic(a, b, c):\n    d = (b ** 2) - 4 * a * c\n    s1\
    \ = (-b + math.sqrt(d)) / (2 * a)\n    s2 = (-b - math.sqrt(d)) / (2 * a)\n  \
    \  return s1, s2\n```\n\nNote that this won't solve all quadratic equations as\
    \ it doesn't handle cases where `d`, the discriminant, is 0 or negative. However,\
    \ it'll do for now.\n\nNavigate back to the `main.py` file. Delete all the code\
    \ we had before and add the following code instead.\n\n```python\nfrom solver\
    \ import solve_quadratic\n\nanswer = solve_quadratic(5, 6, 1)\nprint(answer)\n\
    ```\n\nNote how we use Python's import functionality to import the code from our\
