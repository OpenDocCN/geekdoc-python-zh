    \ `value=[2,0]` 的节点。这是另一个叶节点，当我们到达这里时，我们有两个负面句子和零个正面句子。\n所有其他数据将向左走，我们将最终到达 `[0,5]`，即零个负面句子和五个正面句子。\n\
