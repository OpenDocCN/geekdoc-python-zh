  md: "framework is designed to support the development of web applications - it gives\
    \ you a standard way to build your application and lets you get to building your\
    \ application fast without having to do the boilerplate code.\n\nA really simple,\
    \ fast and flexible Node.js web application framework is Express<sup>181</sup>,\
    \ which provides a robust set of features for the development of web applications.\n\
    \nThe first thing we need to do is add the dependencies we need. Right at the\
    \ top of your index.js file (above the MongoDB code), add the following lines:\n\
    \n```\nlet express = require('express');\nlet app = express();\nlet bodyParser\
    \ = require('body-parser');\nlet http = require('http').Server(app);\n\napp.use(bodyParser.json())\n\
    app.use(bodyParser.urlencoded({ extended: true }));\n```\n\nLet’s break this down.\n\
    \n+   - Line 1 adds the dependency for Express. Repl.it will take care of installing\
    \ it for us.\n- Line 2 creates a new Express app that will be needed to handle\
    \ incoming requests.\n- Line 3 adds a dependency for ‘body-parser’. This is needed\
    \ for the Express server to be able to handle the data that the form will send,\
    \ and give it to us in a useful format to use in the code.\n- Line 4 adds a dependency\
    \ for a basic HTTP server.\n- Line 6 & 7 tell the Express app which parsers to\
    \ use on incoming data. This is needed to handle form data.\n\nNext, we need to\
    \ add a way for the Express to handle an incoming request and give us the form\
