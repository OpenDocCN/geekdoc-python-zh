    >\n  <br><br>\n  <input type=\"submit\" value=\"Submit\">\n</form>\n\n</body>\n\
    </html>\n```\n\nWe won’t go in-depth into the above HTML. It is a very basic form\
    \ with 4 fields (name, address, telephone, note) and a Submit button, which creates\
    \ an interface that will look like the one below.\n\n## Customer details\n\nCustomer\
