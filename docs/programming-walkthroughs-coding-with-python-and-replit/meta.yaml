  - '[PAGE 152]


    # Building news word clouds using Python and Repl.it


    Word clouds, which are images showing scattered words in different sizes, are
    a popular way to visualise large amounts of text. Words that appear more frequently
    in the given text are larger, and less common words are smaller or not shown at
    all.


    In this tutorial, we’ll build a web application using Python and Flask that transforms
    the latest news stories into word clouds and displays them to our visitors.


    At the end of this tutorial, our users will see a page similar to the one shown
    below, but containing the latest news headlines from BBC news. We’ll learn some
    tricks about web scraping, RSS feeds, and building image files directly in memory
    along the way.


    ![](img/48efb5586f6da072fc1456bee6971293_152_0.png)


    # Overview and requirements


    We’ll be building a simple web application step-by-step and explaining each line
    of code in detail. To follow, you should have some basic knowledge of programming
    and web concepts, such as what if statements are and how to use URLs. We’ll be
    using Python for this tutorial, but we won’t assume that you’re a Python expert.


    Specifically, we’ll:'
  - '[PAGE 153]


    +   - Look at RSS feeds and how to use them in Python

    - Show how to set up a basic Flask web application

    - Use BeautifulSoup to extract text from online news articles

    - Use WordCloud to transform the text into images

    - Import Bootstrap and add some basic CSS styling


    We''ll be using the online programming environment Repl.it so you won''t need
    to install any software locally to follow along step by step. If you want to adapt
    this guide to your own needs, you should create a free account by going to repl.it
    and follow their sign up process.


    # # Web scraping


    We previously looked at basic web scraping in an introduction to web scraping.
    If you''re completely new to the idea of automatically retrieving content from
    the internet, have a look at that tutorial first.


    In this tutorial, instead of scraping the links to news articles directly from
    the BBC homepage, we''ll be using RSS feeds - an old but popular standardised
    format that publications use to let readers know when new content is available.


    # # Taking a look at RSS Feeds


    RSS feeds are published as XML documents. Every time BBC (and other places) publishes
    a new article to their home page, they also update an XML machine-readable document
    at http://feeds.bbci.co.uk/news/world/. This is a fairly simple feed consisting
    of a `<channel>` element, which has some metadata and then a list of `<item>`
    elements, each of which represents a new article. The articles are arranged chronologically,
    with the newest ones at the top, so it''s easy to retrieve new content.'
