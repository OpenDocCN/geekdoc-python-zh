- md: "# Understanding classification\n\nA classifier is a statistical model that\
    \ tries to predict a label for a given input. In our case, the input is the text\
    \ and the output is either “positive” or “negative”, depending on whether the\
    \ classifier thinks that the input is positive or negative.\n\nA machine learning\
    \ classifier can be “trained”. We give it labelled data and it tries to learn\
    \ rules based on that data. Every time it gets more data, it updates its rules\
    \ slightly to account for the new information. There are many kinds of classifiers,\
    \ but one of the simplest is called a Decision Tree.\n\nDecision trees learn a\
    \ set of yes/no rules by building decisions into a tree structure. Each new input\
    \ moves down the tree, while various questions are asked one by one. When the\
    \ input filters all the way to a leaf node in the tree, it acquires a label.\n\
    \nIf that’s confusing, don’t worry! We’ll walk through a detailed example with\
    \ a picture soon to clarify. First, let’s show how to get some results using Python.\n\
    \nAdd the following lines to main.py:\n\n```\nclassifier = tree.DecisionTreeClassifier()\n\
    classifier.fit(training_vectors, training_labels)\npredictions = classifier.predict(testing_vectors)\n\
    print(predictions)\n```\n\nSimilarly to the vectoriser, we first create a classifier\
    \ by using the module we imported at the start. Then we call fit() on the classifier\
    \ and pass in our training vectors and their associated labels. The decision tree\
    \ is going to look at both and attempt to learn rules that separate the two kinds\
    \ of data.\n\nOnce our classifier is trained, we can call the predict() method\
    \ and pass in previously unseen data. Here we pass in testing_vectors which is\
    \ the list of vectorized test data that the computer didn’t look at during training.\
    \ It has to try and apply the rules it learned from the training data to this\
    \ new “unseen” data. Machine learning is pretty cool, but it’s not magic, so there’s\
    \ no guarantee that the rules we learned will be any good yet.\n\nThe code above\
    \ produces the following output:\n\n```\n['positive' 'positive' 'negative' 'positive'\
    \ 'negative']\n```\n\nLet’s take a look at our test texts again to see if these\
    \ predictions match up to reality.\n\n```\n\"they love mary\"\n\"they are good\"\
    \n\"why do you hate mary\"\n\"they are almost always good\"\n\"we are very bad\"\
    \n```\n\nThe output maps to the input by index, so the first output label (“positive”)\
    \ matches up to the first input text (“they love mary”), and the last output label\
    \ (“negative”) matches up to the last input text (“we are very bad”).\n\nIt looks\
    \ like the computer got every example right! It’s not a difficult problem to solve.\
    \ The words “bad” and “hate” appear only in the negative texts and the words “good”\
    \ and “love”, only in the positive ones. Other words like “they”, “mary”, “you”\
    \ and “we” appear in both good and bad texts. If our model did well, it will have\
    \ learned to ignore the words that appear in both kinds of texts, and focus on\
    \ “good”, “bad”, “love” and “hate”.\n\nDecision Trees are not the most powerful\
    \ machine learning model, but they have one advantage over most other algorithms:\
    \ after we have trained them, we can look inside and see exactly how they work.\
    \ More advanced models like deep neural networks are nearly impossible to make\
    \ sense of after training.\n\nThe Scikit-learn tree module contains a useful function\
    \ to assist in visualising trees. Add the following code to the end of your Repl:\n\
    \n```\nimport matplotlib.pyplot as plt\nfig = plt.figure(figsize=(5,5))\ntree.plot_tree(classifier,feature_names\
    \ = vectorizer.get_feature_names(), rounded = True, filled = True)\nfig.savefig('tree.png')\n\
    ```\n\nIn the left-hand pane, you should see a file called ‘tree.png’. If you\
    \ open it, your tree graph should look as follows:\n\n![](img/48efb5586f6da072fc1456bee6971293_244_0.png)\n\
    \nImage: 1 A visualised decision tree\n\nThe above shows a decision tree that\
    \ only learned two rules. The first rule (top square) is about the word “hate”.\
    \ The rule is “is the number of times ‘hate’ occurs in this sentence less than\
    \ or equal to 0.5”. None of our sentences contain duplicate words, so each rule\
    \ will really be only about whether the word appears or not (you can think of\
    \ the <= 0.5 rules as < 1 in this case).\n\nFor each question in our training\
    \ dataset, we can ask if the first rule is True or False. If the rule is True\
    \ for a given sentence, we’ll move that sentence down the tree **left**. If not,\
    \ we’ll go **right**.\n\nOnce we’ve asked this first question for each sentence\
    \ in our dataset, we’ll have three sentences for which the answer is “False”,\
    \ because three of our training sentences contain the word “hate”. These three\
    \ sentences go right in the decision tree and end up at first leaf node (an end\
    \ node with no arrows coming out the bottom). This leaf node has value = [3,0]\
    \ in it, which means that three samples reach this node, and three belong to the\
    \ negative class and zero to the positive class.\n\nFor each sentence where the\
    \ first rule is “True” (the word “hate” appears less than 0.5 times, or in our\
    \ case 0 times), we go down the left of the tree, to the node where value = [2,5].\
    \ This isn’t a leaf node (it has more arrows coming out the bottom), so we’re\
    \ not done yet. At this point we have two negative sentences and all five positive\
