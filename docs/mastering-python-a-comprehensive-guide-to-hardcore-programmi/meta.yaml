    your Linux. This is due to the fact that Linux can have more compatibility with
    Python 3.


    For windows users, now that you have downloaded the program, you’re ready to start.


    And yes, congratulations! You can now begin working and having fun with your Python
    programming system.


    ## Basic Python Terms You Must Learn


    As previously described, Python is a language used in computer programming. As
    such, you must be familiar with the most commonly used lingo to facilitate your
    understanding of the language. It’s like learning the ABCs before you can read
    or write your first letters.


    It’s important to remember that there may be slight variations with the different
    Python versions. The example here is from version 2. So, here goes:


    **Strings** - are the values enclosed inside double, single quotes, or triple
    quotes. They can be a word/text, or a group of words, or a Unicode, or other items.


    Example:


    ```

    mystring = ''welcome''

    mystring = "welcome"

    mystring = ''My little corner.''

    mystring = "My little corner."

    ```


    The advantage of the double quotes is that you can include values within the double
    quotes.


    The triple quotes signify long or lengthy strings. They are useful to avoid getting
    an EOL (End of the Line) error.


    **Variables** - are containers for the strings. In the Python language, these
    are usually objects. These can be numbers or strings. Remember that you have to
    declare the variables, prior to using them.


    The numbers can be floating point numbers or integers.


    Use this syntax to define integers and floating point numbers. Integers are whole
    numbers, while floating point numbers are usually numbers with decimal points.


    Example: `myint = 9` `myfloat = 9.0`


    **Statements** - are stated sentences or syntax used to call a function to compute,
    to write a value, or other procedures needed in executing or performing Python
    commands.


    **Lists** - are just like your ordinary lists for items you want to create. They
    can contain any variable/s that you want to include in your list. They can be
    comparable to arrays. The variables are usually enclosed in brackets, and the
    items or values are separated by commas. The semi-colon can be used between lists.
    Lists are immutable files - meaning they cannot be changed.


    The word-values are enclosed in single or double quotes, while numbers are not.


    Example:


    ```

    mylist1 = [''chemistry'', ''anatomy'', 2015, 2016];

    mylist2 = [10, 20, 30, 40, 50];

    mylist3 = [''grades'', ''names'', ''addresses'']

    ```


    When you add the function ''print'' and press ''enter'' or execute, this will
    appear:


    ![](img/d9be304f8d8c66853c38a3be019736b2_13_0.png)


    Take note of the variations of colors that can identify the command or function
    (red colored word), from the variables (green), and from the results (blue colored
    words).


    Examples of double quotes:


    ```

    mystring4 = ["Vanessa Redgrave", "Tom Cruise", "Mel Gibson", "Matt Damon"]

    ```


    **Loops** - are statements that can be performed or executed one after the other
    - repeatedly, or once. There are two general types of loops, the ''for'' and the
    ''while'' loops.


    **Function** - a piece of code that executes some functions or logic. Examples
    are ''print'', which prints your entry or variables; pow (power), which gets the
    answer for your numbers raised to a certain power. A specific example is this:


    To know the value of 8^9, you can use the Python function (pow). On your Python
    shell enter this statement:


    `pow(8, 9)`


    When you press the ''enter'' or the execute key, the answer will appear:


    In the specific example above, the answer is 134217728.


    ![](img/d9be304f8d8c66853c38a3be019736b2_15_0.png)


    **Modules** – are files that contain various items, such as variables, definitions
    of functions, and executable statements, among others. Modules are used in cases
    when you want to save functions that you have created for easier accessibility
    later on.


    This is because after using the Python interpreter, all the definitions, variables
    and functions you have created will be lost. Hence, you need to compile them in
    modules, so you can use them again, whenever necessary.


    Python will automatically ask you to save your files, so you will never forget
    this function. Your modules should be saved with the name you assigned to them,
    and the suffix - .py.


    It''s best to assign names based on the object, or the purpose of your module.
    This way, you can recall the names of the modules easily.


    **Shells** - are the blank boxes where you write your Python commands or statements.


    **Tuples** - are similar to lists; they are immutable. You cannot change them.
    However, you can create new Tuples to modify the old ones. They can also be used
    as keys to dictionaries.


    **Classes** - are groups of related data, similar to strings, integers, and lists
    that use related functions. To introduce or identify a class, you can use the
    function word ''class''.


    **Objects** - are used in Python language a great deal, because Python is object
    oriented. This means that the user can name his files according to what they are
    as a group, or as an individual value. An example is when a user names his data
    about Geography as ''Geo'', or his research data on climate change, as ''climchange''.


    **Concatenation** - a series of connected strings or variables used in Python
    programs. You can combine small strings to become larger strings by utilizing
    the ''join''() procedure or the plus (+) sign.


    There will be more Python terms that you will encounter as we proceed. Not all
    of them are included here.


    ## Functions of the Python Standard Library


    The Python standard library is one of the most extensive libraries in the world
    of programming. This is because it contains all the possible packages and modules
    that a programmer would need.


    There are various reference materials, modules, significant built-in functions,
    and packaging tools to assist you in learning the Python language.


    The common functions of a standard library are:


    - It provides built-in modules that are easily accessible for programmers, who
    may encounter problems in creating and executing their codes.

    - It acts as a guide to experts, who want prompt and reliable methods of creating
    and running their programs.

    - It allows quick access to Python’s system functionality and enhances programmer’s
    output.

    - It can also provide optional components essential to programming that comes
    from third parties.


    In the Python standard library, an Introduction is provided and then the essential
    materials follow. Here are some of the most basic contents of a Python standard
    library together with their specific functions.


    **Built-in Functions** (types, constants and exceptions) - these are components
    that come with the Python package. You can call in these functions when you need
    them, and when you need help in creating your statements.


    These built-in functions are readily available to Python users:


    Here are some of the most common functions:


    **abs()** - this function is used when you want to determine the absolute value
    of a particular number.


    ```

    >>> abs(35)

    35

    >>>

    ```


    **all(), all(iterable)** - this function will return a ''True'' result with a
    blank iterable, and if ALL the iterable (taken one after the other) are True.


    **any(), any(iterable)** - this will return a ''True'' result, if ANY element
    of the iterable is true. A ''False'' result is printed, when the iterable is left
    blank.


    **basestring()** - this will determine if the object is a Unicode or a string.


    **cmp()** - this is the key for comparing elements in a data. It is most useful
    in tuple.


    **dict()** - this refers to the dictionary class.


    **dir([object])** - this refers to the directory.


    ### Example:


    If you want to access the built-in directory, use this statement:


    `dir(["__builtins__"])` press ‘enter’ or execute and the built-in directory will
    appear:


    ![](img/d9be304f8d8c66853c38a3be019736b2_19_0.png)


    **getattr(), getattr(object, name[, default])** - this function is used in returning
    the value of the attributes of the specified object.


    **help()** - this function is used in asking help from the Python’s built-in functions
    and modules. It’s interactive and can help you with a lot of things you would
    want to learn.


    **input(), input([prompt]), raw_input()** - the input data can help in accessing
    history features and similar data.


    **int(), class int(x, base=10), class int(x=0)** - this function is used to return
    an integer. The types of the numeric may be a float, a complex number, a long
    number or an integer.


