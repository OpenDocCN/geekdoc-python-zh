    Keywords. The keywords are instruc ons that the interpreter recognizes and understands.
    For instance, the word “print” in the earlier program is a keyword. In Python,
    there are two main types of keywords: the func ons and the control keywords. Func
    ons are simple verbs such as print that tell the interpreter what to do while
    the control keywords control the flow of execu on.


    Modules. Python program is shipped with a large list of modules that increase
    its func onality. The modules will help you to organize your code in a manner
    that’s easy to debug and control the code.


    Program statements. The program statements are sentences or instruc ons that tell
    the control unit'
- md: '## Python 变量


    There''s so much that goes on in the main memory of the computer whenever you
    run a program. Understanding the concept of variables and data types will help
    you to write efficient programs.


    A program is simply a sequence of instructions (statements) that directs your
    computer to perform a particular task. For instance, the previous program printed
    the phrase “Hello World! This is my first program” on the screen when it was executed.
    But before you could see the output on the screen some data had to be kept in
    computer''s memory.


    The use of data applies to all programming languages—Python included—therefore,
    understanding the mechanisms of data management in the computer''s memory is the
    first step towards developing robust, efficient and powerful applications.


    A variable can be conceived as a temporary storage location in the computer''s
    main memory and specifically the Random Access Memory. This temporary storage
    location is what will hold the data that you would like to use in the program.
    In other words, the variable is a location of memory that holds data whenever
    your program is executing. So, whenever you define a variable, you''ll actually
    be reserving a temporary storage location in the computer''s memory.


    All the variables that you define must have names and an equivalent data type—a
    sort of classification of the variable that specifies the type of value the variable
    should hold. The data types help to specify what sort of mathematical, relational
    or even logical operations that you can apply to the variable without causing
    an error. Ideally, when you assign variables to data types, you can begin to store
    numbers, characters, and even constants in the computer''s main memory.


    Since Python language is an object-oriented programming language, it is not "statically
    typed." This means that the interpreter regards every variable as an object. Therefore,
    you don''t have to declare the variables before using them in your program. So,
    how can you declare variables in Python?


    Names or identifiers usually declare Python variables. Just like any other programming
    languages that you have so far learned, the conventions for naming the variables
    must strictly be adhered to. Below are some naming conventions that you should
    follow when declaring variables:


    - All variable names should always begin with a letter (A to Z and a to z) or
    an underscore. For instance, “age” is a valid variable name while “-age” isn’t
    a valid variable name.

    - Any variable name you declare cannot start with a number. For instance, 9age
    is not a valid variable name.

    - Special symbols shouldn’t be used when declaring variable names. For instance,
    name$ isn’t allowed as a variable name.

    - The maximum number of characters to use for your variable name shouldn’t exceed
    255.


    To reserve a temporary memory location in the name of a variable, you don’t have
    to use the explicit declaration like other programming languages. If you’ve had
    experience in other programming languages such as Pascal or C, I am sure you know
    that declaring a variable explicitly before assigning any value is a must.


    In Python, the declaration of variables usually occurs automatically the moment
    you assign a value to it. For instance, the statement:


    ```

    age = 10

    ```


    Automatically reserves a temporary storage location in memory space called “age”
    and assigns 10 to it.


    It is also possible to assign a single value to several variables simultaneously.
    For instance, the statement below reserves temporary memory spaces for 2 variables
    namely: age and count and assigns the value 30:


    ```

    age, count = 30

    ```


    Python language has different categories of data types that are used to define
    the storage methods and mathematical operations. Below are examples of data types
    in Python language:


    - Numbers

    - String

    - List

    - Tuple

    - Dictionary


    ## Numbers


    The Number data types store numeric values. The number objects will automatically
    be initialized whenever you assign a specific value to the variable. For instance,
    the code illustrated below creates 2 variable objects (age and count) and assigns
    them the values 10 and 30 respectively:


    ```

    age = 10

    count = 30

    ```


    If you want to delete reference to the Number object, you''ll use the word “del”
    followed by the variable name that you wish to delete. Consider the code below
    that deletes two variables: age and count that have already been declared and
    used:


    ```

    del age, count

    ```


    Python language supports four different categories of number types. These are:


    - **int**: when used in a declaration it refers to signed integers. These include
    those whole numbers that range from 8 bits to 32 bits.

    - **long**: These are long integers. They can be represented either in octal and
    hexadecimal numbering notation.

    - **float**: These are floating real point values. They may range from 8 bits
    to 64 bits long.

    - **complex**: These are complex numbers.


    ## Strings


    Strings are stored as consecutive sets of characters in the computer''s memory
    locations. Python language allows you to use either pair of single or double quotes
    when defining the strings. Other subsets of string variable types can be specified
    using the slice operator ([ ] and the [:]) with the indexes that range from 0
    at the beginning of the string. The plus (+) operator performs string concatenation
    (joining of two or more strings) while the asterisk (*) operator performs string
    repetition.


    After understanding the origin and the importance of Python, it is now a time
    to learn more about Python programming.


    ## Keywords


    It is essential to know that every computer language has specific keywords before
    you start working on your first computer program. Such words are used for a particular
    purpose and try to use them properly. Using them anyhow or anywhere will affect
    the success of your application. It is evident that using these words everywhere
    can result in error alert, thus altering with the working of the program. The
    most common keywords for Python programming are: `or`, `not`, `with`, `as`, `break`,
    `yield`, `assert`, `raise`, `class`, `while`, `return`, `try`, `continue`, `del`,
    `finally`, `except`, `def`, `for`, `global`, `from`, `is`, `None`, `if`, `lambda`,
    `nonlocal`, and `pass`.


    ## Identifier Names


    This is the name programmers use to refer to classes, variables, and functions
    they create. You will have to use this name when creating your Python program.
    The following rules will help you to create an identifier in Python successfully:


    - The identifier should not comprise any keyword.

    - Should contain underscore, numbers, and letters either uppercase, lowercase
    or both.

    - Should not begin with numbers.


    ## Creating Readable Identifiers


    Although identifiers cause no harm to the computer, they should be clear and readable.
    It is obvious that we sometimes experience problems reading and creating codes.
    However, the following rules will help you to create an identifier that is easy
    to read:


    - Ensure that you select the name that is descriptive.

    - Use abbreviations very carefully.


    **Note**: You should always stick to one rule throughout when doing your Python
    program to avoid any confusion. Be careful and ensure that everything is kept
    consistent.


    ## Flow of Control


    Working on the Python language requires a user to write the statements just like
    the shopping list because the computer starts with the first instruction and then
    proceeds to the next steps. Therefore, you should write out your desired controls
    just like the shopping list as this will ensure the computer reads them correctly.
    However, your computer will stop reading the list once it has completed the final
    instruction.


    Additionally, following all the instructions ensures that the flow of control
    is smooth and the computer can read it correctly. It makes it easy for you to
    obtain the program to perform what you want without causing issues.


    ### Indentation and Semicolons


    If you look at the computer languages, it is easy to realize the presence of curly
    brackets which are used to show the beginning and the end of the statements or
    even to differentiate blocks of code. Although your computer can read the codes,
    even if there are no indentations, but indentations make it easy for you to remember
    everything.


    Using indentation and semicolons in coding is not easy for beginners using other
    programming languages. For example, there is unnecessary information that you
    will need to enter for humans to read, even though the information might be readable
    by the computer. It is only the Python that does things differently, making it
    easy for individuals to read.'
  mdcn: '## Python 变量


    每当运行程序时，计算机的主内存中都会发生许多活动。理解变量和数据类型的概念将帮助你编写高效的程序。


    程序只是一系列指令（语句），用于指导计算机执行特定任务。例如，前面的程序在执行时会在屏幕上打印短语“Hello World! This is my first
    program”。但在你能在屏幕上看到输出之前，一些数据必须保存在计算机的内存中。


    数据的使用适用于所有编程语言——包括 Python——因此，理解计算机内存中数据管理的机制是开发健壮、高效和强大应用程序的第一步。


    变量可以被视为计算机主内存中的一个临时存储位置，特别是随机存取存储器。这个临时存储位置将保存你希望在程序中使用的数据。换句话说，变量是程序执行时保存数据的内存位置。因此，每当你定义一个变量时，实际上就是在计算机内存中预留一个临时存储位置。


    你定义的所有变量都必须有名称和相应的数据类型——一种对变量进行分类的方式，指定变量应保存的数据类型。数据类型有助于指定可以应用于变量的数学、关系甚至逻辑操作，而不会导致错误。理想情况下，当你将变量分配给数据类型时，就可以开始在计算机的主内存中存储数字、字符甚至常量。


    由于 Python 语言是一种面向对象的编程语言，它不是“静态类型”的。这意味着解释器将每个变量都视为一个对象。因此，你不必在程序中使用变量之前声明它们。那么，在
    Python 中如何声明变量呢？


    名称或标识符通常用于声明 Python 变量。就像你迄今为止学习的任何其他编程语言一样，必须严格遵守变量命名约定。以下是在声明变量时应遵循的一些命名约定：


    - 所有变量名应始终以字母（A 到 Z 和 a 到 z）或下划线开头。例如，“age”是有效的变量名，而“-age”不是有效的变量名。

    - 你声明的任何变量名都不能以数字开头。例如，9age 不是有效的变量名。

    - 声明变量名时不应使用特殊符号。例如，name$ 不允许作为变量名。

    - 变量名的最大字符数不应超过 255。


    要以变量名预留临时内存位置，你不必像其他编程语言那样使用显式声明。如果你有其他编程语言（如 Pascal 或 C）的经验，我相信你知道在赋值之前显式声明变量是必须的。


    在 Python 中，变量的声明通常在你赋值给它的那一刻自动发生。例如，语句：


    ```

    age = 10

    ```


    自动在内存空间中预留一个名为“age”的临时存储位置，并将 10 赋值给它。


    也可以同时将单个值赋给多个变量。例如，下面的语句为两个变量（即 age 和 count）预留临时内存空间，并将值 30 赋给它们：


    ```

    age, count = 30

    ```


    Python 语言有不同的数据类型类别，用于定义存储方法和数学运算。以下是 Python 语言中数据类型的示例：


    - 数字

    - 字符串

    - 列表

    - 元组

    - 字典


    ## 数字


    数字数据类型存储数值。当你将特定值赋给变量时，数字对象将自动初始化。例如，下面的代码创建了两个变量对象（age 和 count），并分别将值 10 和 30
    赋给它们：


    ```

    age = 10

    count = 30

    ```


    如果你想删除对数字对象的引用，可以使用“del”关键字，后跟要删除的变量名。考虑下面的代码，它删除了两个已经声明并使用的变量：age 和 count：


    ```

    del age, count

    ```


    Python 语言支持四种不同的数字类型类别。它们是：


    - **int**：在声明中使用时，它指的是有符号整数。这些包括从 8 位到 32 位的整数。

    - **long**：这些是长整数。它们可以用八进制和十六进制表示法表示。

    - **float**：这些是浮点实数值。它们的长度可以从 8 位到 64 位。

    - **complex**：这些是复数。


    ## 字符串


    字符串在计算机内存位置中存储为连续的字符集。Python 语言允许你在定义字符串时使用单引号或双引号。字符串变量类型的其他子集可以使用切片运算符（[ ] 和
    [:]）指定，索引从字符串开头的 0 开始。加号（+）运算符执行字符串连接（连接两个或多个字符串），而星号（*）运算符执行字符串重复。


    在了解了 Python 的起源和重要性之后，现在是时候学习更多关于 Python 编程的知识了。


    ## 关键字


    在开始编写第一个计算机程序之前，了解每种计算机语言都有特定的关键字至关重要。这些词用于特定目的，应正确使用。随意或在任何地方使用它们都会影响应用程序的成功。显然，在任何地方使用这些词都可能导致错误警报，从而影响程序的正常运行。Python
    编程中最常见的关键字是：`or`、`not`、`with`、`as`、`break`、`yield`、`assert`、`raise`、`class`、`while`、`return`、`try`、`continue`、`del`、`finally`、`except`、`def`、`for`、`global`、`from`、`is`、`None`、`if`、`lambda`、`nonlocal`
    和 `pass`。


    ## 标识符名称


    这是程序员用来引用他们创建的类、变量和函数的名称。在创建 Python 程序时，你将需要使用这个名称。以下规则将帮助你成功创建 Python 中的标识符：


    - 标识符不应包含任何关键字。

    - 应包含下划线、数字和字母（大写、小写或两者兼有）。

    - 不应以数字开头。


    ## 创建可读的标识符


    虽然标识符不会对计算机造成伤害，但它们应该清晰易读。显然，我们有时在阅读和创建代码时会遇到问题。然而，以下规则将帮助你创建易于阅读的标识符：


    - 确保选择具有描述性的名称。

    - 非常谨慎地使用缩写。


    **注意**：在编写 Python 程序时，应始终遵守一条规则，以避免任何混淆。小心并确保一切保持一致。


    ## 控制流


    使用 Python 语言时，用户需要像编写购物清单一样编写语句，因为计算机从第一条指令开始，然后继续执行后续步骤。因此，你应该像编写购物清单一样写出所需的控制语句，这将确保计算机正确读取它们。然而，一旦计算机完成最后一条指令，它就会停止读取列表。


    此外，遵循所有指令可确保控制流顺畅，计算机可以正确读取它。这使你能够轻松地让程序执行所需的操作，而不会引起问题。


    ### 缩进和分号


    如果你观察计算机语言，很容易发现花括号的存在，它们用于表示语句的开始和结束，甚至用于区分代码块。虽然你的计算机可以读取代码，即使没有缩进，但缩进可以让你更容易记住所有内容。


    对于使用其他编程语言的初学者来说，在编码中使用缩进和分号并不容易。例如，你需要输入一些不必要的信息供人类阅读，即使这些信息可能被计算机读取。只有 Python
    做事方式不同，使个人更容易阅读。'
