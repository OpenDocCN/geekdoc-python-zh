    \ 变量打印到屏幕上。\n\n类似地，访问 `stand` 函数，该函数在控制台上打印语句 \"Person standing\"。上述脚本的输出如下所示：\n\
    \n![](img/d9be304f8d8c66853c38a3be019736b2_101_0.png)\n\n## 构造函数\n\n“构造函数”是在类实例化时执行的方法。创建类对象的过程也称为实例化。要在\
