    and Protected. Variables with Public access modifier can be accessed anywhere
    within the program. Public variables names do not have leading underscore before
    their names. On the other hand, variables with private modifiers can only be accessed
    within the class. Private variable names start with double underscore. Finally,
    protected variables can be accessed within the class and within the child classes.


