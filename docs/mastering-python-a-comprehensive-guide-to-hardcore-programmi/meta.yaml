- md: "## Defining a function\n\nNow let us come to the main part of defining a function.\
    \ The function definition consists of the name of the function and the arguments\
    \ it takes as well as the sequence of statements that the function executes. The\
    \ first line of the function is known as the header and the rest of the function\
    \ is called the body.\n\nThis function, whenever called, prints the nursery rhyme\
    \ Humpty Dumpty. The first line of the function ‘def print_poem():’ is the header\
    \ of the function. The header must end in a semi colon. The name of the function\
    \ is print_poem. The rules of the function name are the same as those of variable\
    \ names, only capital and small letters and numbers or underscores. The name cannot\
    \ begin with a number and avoid using reserved words as a name. Whenever you have\
    \ used a name for a function, avoid using the same name for a variable.\n\nHere\
    \ you see the first two print statements have quotes while the last two lines\
    \ have double quotes. Although single and double quotes can both be used and it\
    \ is up to us to choose whichever but if there is a single quote or apostrophe\
    \ within a sentence then we should use double quotes outside.\n\nWhen the function\
    \ ends give an empty line. The statements in a function are indented to be grouped\
    \ together. It is four blank spaces before beginning the line of code. The interpreter\
    \ will keep on giving an (...) ellipsis until it receives an empty line.\n\nWhen\
    \ we define a function, a function object is created with the name we have given\
    \ to it. If we print the object it gives us following information about the function.\n\
    \n```\n>>> print print_poem\n<function print_poem at 0xb7e99e9c>\n>>> print type(print_poem)\n\
    <type 'function'>\n```\n\nThe **type** function is used to know the type of print_poem\
    \ and as it states it is a type of function object. The empty parenthesis in this\
    \ function definition indicates that this function takes no arguments. Now let\
    \ us take a look at a function that takes arguments and returns a value.\n\n##\
    \ Void functions, arguments and parameters\n\nAs mentioned earlier some functions\
    \ give a result or an output. The output is known as a return value. But not all\
    \ functions return a value like the function print_poem. So the function print_poem\
    \ is a void function. A function that does not give a return value is known as\
    \ a **void** function.\n\nNow let us come to arguments and parameters. Consider\
    \ a function that takes in three integers as arguments and returns the average\
    \ of these numbers.\n\n```\n>>>def calc_average(val1, val2, val3):\n    Sum =\
    \ val1+val2+val3\n    Avg=Sum/3\n    print Avg\n    return Avg\n```\n\nIn this\
    \ function three arguments are passed and within the function the arguments are\
    \ assigned to variables val1, val2 and val3. These three variables are called\
    \ parameters. Here first the average is printed on screen and then it is returned\
    \ to the main flow also where it is assigned to some variable. The call will look\
    \ like this\n\n```\n>>>average = calc_average(34,45,35)\n```\n\nThe result of\
    \ the function or return value is assigned to the variable average and that value\
    \ can then be used to compute other results.\n\n## Writing function within functions\n\
    \nWe can also make function calls within a function. Consider three functions\
    \ that print different poems: print_humpty, print_twinkle, print_oldkingcole.\
    \ These three functions print three different poems. Now if we want to print all\
    \ the three poems together we write this function\n\n```\n>>>def print_poems():\n\
    \    print_humpty()\n    print_twinkle()\n    print_oldkingcole()\n```\n\nThis\
    \ one function print_poems consists of three function calls within it. It will\
    \ print all three poems together.\n\n## Flow of execution\n\nFlow of control must\
    \ be kept in view while writing different functions and making the function calls.\
    \ The flow of control is the order in which the statements are executed. Execution\
    \ is always starting at the beginning of the program. The statements are executed\
    \ one at a time, from top to the bottom. The function definition must be written\
    \ before the call to the function. Function definition does not alter the flow\
    \ of execution but the statements inside the function definition are not executed\
    \ until the call to the function is made. Whenever the interpreter encounters\
    \ a function call it jumps to the function definition and executes the statements\
    \ inside the function. Then it comes back to where it left and completes the execution.\n\
    \nThis is simple enough but when there are many function calls nested within the\
    \ function calls the flow of control might become confusing to the programmer.\
    \ However, for the interpreter it is easy to remember and it will not get confused,\
    \ it keeps tags on where it left off and once it completes the statements within\
    \ a function definition it will come back to exactly where it left off whether\
    \ it is within another function or in the main program. If the function definition\
    \ is not written before the function call, an error would occur as the program\
    \ will not know where to go and it cannot go further below the call, as it has\
    \ a tag to return to the line from where the call has been made.\n\nAlthough the\
    \ interpreter remembers the flow of control, it is essential that the programmer\
    \ also knows about the program flow. Because the programmer has to do error control\
    \ and debugging. If there is an error, it can only be caught if the programmer\
    \ knows exactly where the program flow will go.\n\n## Debugging and exception\
    \ handling\n\nDebugging and exception handling both pertains to finding and locating\
    \ errors and trying to fix them up in a neat and clean way. The main purpose is\
    \ that the program must not hang or stop working. Instead a polite message is\
    \ given that tells the user that something is wrong and what should be done alternatively.\
    \ To do exception handling we write **try** and **catch** statements. The most\
    \ common errors occur when taking input from the user. When the program is expecting\
    \ one sort of input and something else is given to it to work upon. This results\
    \ in breaking of program or in other words errors.\n\nIn this case, first the\
    \ statements in the try block are executed and if all goes well the catch block\
    \ is ignored. If the input entered by the user is a string value an exception\
    \ occurs but instead of the program hanging up or crashing a polite message is\
    \ conveyed to the user to enter a number instead of anything else. This process\
    \ is known as catching an exception.\n\nThe error message not only helps the user\
    \ in understanding what the issue that is occurring is but it also enables the\
    \ programmer to know where exactly the error had occurred and what to do about\
    \ it. A program that has proper exception handling is easy to debug and update.\
    \ We can incur changes in such a programs much more easily than a program that\
    \ has no error handling that was done by the programmer.\n\nDebugging provides\
    \ an easy way to find logical errors. Errors that the interpreter does not have\
    \ the ability to capture but they are causing errors to occur in the program and\
    \ the program does not give a proper result because of them. Debugging is a way\
    \ of finding such errors. In Python such errors can occur by using wrong comparison\
    \ operators like <= instead of < or >= instead of >. Sometimes the programmer\
    \ might accidentally write - instead of + or mix up the operators which might\
    \ end up causing problems. The syntax would be okay for the interpreter and it\
    \ does not throw an error message but in actuality the result will be wrong because\
    \ of typing errors.\n\nIn Python, indentation and spacing is also a major cause\
    \ of errors and care should be taken while leaving spaces, especially in nested\
    \ blocks of code.\n\n## Object Oriented Programming in Python\n\nObject oriented\
    \ programming (OOP) is a programming paradigm in which the application is implemented\
    \ in the form of objects that imitate real world entities. Objects can have attributes,\
    \ methods and properties. Anything that contains some information and can perform\
    \ a function is a candidate of being implemented as an object in OOP. Consider\
    \ a scenario where you have to develop a first person shooter game using object\
    \ oriented programming. You have to think about the real world objects that have\
    \ some information and can perform some functionality in the first person shooter\
    \ game. Shooter himself is an object since shooter has a name, height, weight,\
    \ nationality etc. and can perform functions like run, sit, stand, crawl etc.\
    \ Similarly, gun is also an entity since gun can shoot, load, reload etc.\n\n\
    ## Classes\n\nA class is a basic building block of object oriented programming.\
    \ In simple words, a class serves as a blue print for an object. Another analogy\
    \ between classes and object is that of map and house. You can tell by reading\
    \ a map that how the house is"
  mdcn: "## 定义函数\n\n现在让我们进入定义函数的主要部分。函数定义由函数名、它接受的参数以及函数执行的语句序列组成。函数的第一行称为函数头，其余部分称为函数体。\n\
    \n此函数在每次调用时都会打印童谣《矮胖子》。函数的第一行 `def print_poem():` 是函数头。函数头必须以冒号结尾。函数名是 `print_poem`。函数名的规则与变量名相同，只能使用大小写字母、数字或下划线。名称不能以数字开头，并避免使用保留字作为名称。一旦为函数使用了某个名称，就应避免为变量使用相同的名称。\n\
    \n在这里，你会看到前两个 `print` 语句使用了单引号，而后两行使用了双引号。虽然单引号和双引号都可以使用，选择权在我们，但如果句子中包含单引号或撇号，那么外部就应该使用双引号。\n\
    \n函数结束时，给出一个空行。函数中的语句通过缩进来分组。在开始代码行之前，有四个空格。解释器会持续给出 `(...)` 省略号，直到它接收到一个空行。\n\
    \n当我们定义一个函数时，会创建一个以我们给定的名称命名的函数对象。如果我们打印该对象，它会给出关于该函数的以下信息。\n\n```\n>>> print\
    \ print_poem\n<function print_poem at 0xb7e99e9c>\n>>> print type(print_poem)\n\
    <type 'function'>\n```\n\n**type** 函数用于了解 `print_poem` 的类型，正如它所述，它是一种函数对象。此函数定义中的空括号表示该函数不接受任何参数。现在让我们看一个接受参数并返回值的函数。\n\
    \n## 空函数、参数和形参\n\n如前所述，有些函数会给出结果或输出。输出称为返回值。但并非所有函数都返回值，比如函数 `print_poem`。因此，函数\
    \ `print_poem` 是一个空函数。不返回值的函数称为**空**函数。\n\n现在让我们来谈谈参数和形参。考虑一个函数，它接受三个整数作为参数，并返回这些数字的平均值。\n\
    \n```\n>>>def calc_average(val1, val2, val3):\n    Sum = val1+val2+val3\n    Avg=Sum/3\n\
    \    print Avg\n    return Avg\n```\n\n在这个函数中，传递了三个参数，在函数内部，这些参数被赋值给变量 `val1`、`val2`\
    \ 和 `val3`。这三个变量称为形参。这里首先在屏幕上打印平均值，然后将其返回到主流程，也赋值给某个变量。调用将如下所示：\n\n```\n>>>average\
    \ = calc_average(34,45,35)\n```\n\n函数的结果或返回值被赋值给变量 `average`，然后该值可用于计算其他结果。\n\n\
    ## 在函数内编写函数\n\n我们也可以在函数内进行函数调用。考虑三个打印不同诗歌的函数：`print_humpty`、`print_twinkle`、`print_oldkingcole`。这三个函数打印三首不同的诗。现在，如果我们想一起打印所有三首诗，我们编写这个函数：\n\
    \n```\n>>>def print_poems():\n    print_humpty()\n    print_twinkle()\n    print_oldkingcole()\n\
    ```\n\n这个 `print_poems` 函数包含三个函数调用。它将一起打印所有三首诗。\n\n## 执行流程\n\n在编写不同函数和进行函数调用时，必须注意控制流。控制流是语句执行的顺序。执行总是从程序的开头开始。语句从上到下逐一执行。函数定义必须在调用函数之前编写。函数定义不会改变执行流程，但函数定义内的语句在调用函数之前不会执行。每当解释器遇到函数调用时，它会跳转到函数定义并执行函数内的语句。然后它返回到离开的地方并完成执行。\n\
    \n这很简单，但当函数调用中嵌套了许多函数调用时，控制流可能会让程序员感到困惑。然而，对于解释器来说，记住这一点很容易，它不会混淆，它会标记离开的位置，一旦完成函数定义内的语句，它将返回到离开的确切位置，无论是在另一个函数内还是在主程序中。如果函数定义没有在函数调用之前编写，将会发生错误，因为程序将不知道去哪里，并且无法继续向下执行，因为它有一个标签要返回到发起调用的那一行。\n\
    \n虽然解释器记住了控制流，但程序员也必须了解程序流程，这一点至关重要。因为程序员必须进行错误控制和调试。如果存在错误，只有当程序员确切知道程序流程将走向何处时，才能捕获该错误。\n\
    \n## 调试和异常处理\n\n调试和异常处理都涉及查找和定位错误，并尝试以整洁的方式修复它们。主要目的是程序不能挂起或停止工作。相反，应该给出一个礼貌的消息，告诉用户出了什么问题以及应该采取什么替代措施。为了进行异常处理，我们编写\
    \ **try** 和 **catch** 语句。最常见的错误发生在从用户获取输入时。当程序期望一种输入，而提供给它处理的是其他东西时。这会导致程序中断，或者换句话说，出现错误。\n\
    \n在这种情况下，首先执行 `try` 块中的语句，如果一切顺利，则忽略 `catch` 块。如果用户输入的是字符串值，则会发生异常，但程序不会挂起或崩溃，而是向用户传达一个礼貌的消息，要求输入数字而不是其他任何内容。这个过程称为捕获异常。\n\
    \n错误消息不仅帮助用户理解正在发生的问题，还使程序员能够确切知道错误发生的位置以及如何处理。具有适当异常处理的程序易于调试和更新。我们可以比没有程序员进行错误处理的程序更容易地对此类程序进行更改。\n\
    \n调试提供了一种查找逻辑错误的简便方法。解释器无法捕获的错误，但它们会导致程序中出现错误，并且程序由于这些错误而无法给出正确的结果。调试是查找此类错误的一种方法。在\
    \ Python 中，此类错误可能通过使用错误的比较运算符（如 `<=` 而不是 `<`，或 `>=` 而不是 `>`）而发生。有时程序员可能会意外地写 `-`\
    \ 而不是 `+`，或者混淆运算符，这最终可能导致问题。语法对解释器来说是正确的，它不会抛出错误消息，但实际上结果会因为输入错误而错误。\n\n在 Python\
    \ 中，缩进和空格也是错误的主要原因，在留空格时应特别小心，尤其是在嵌套的代码块中。\n\n## Python 中的面向对象编程\n\n面向对象编程（OOP）是一种编程范式，其中应用程序以模仿现实世界实体的对象形式实现。对象可以具有属性、方法和特性。任何包含一些信息并能执行功能的东西都是在\
    \ OOP 中实现为对象的候选者。考虑一个场景，你必须使用面向对象编程开发一个第一人称射击游戏。你必须考虑在第一人称射击游戏中具有一些信息并能执行某些功能的现实世界对象。射手本身就是一个对象，因为射手有名字、身高、体重、国籍等，并且可以执行跑步、坐下、站立、爬行等功能。同样，枪也是一个实体，因为枪可以射击、装弹、重新装弹等。\n\
    \n## 类\n\n类是面向对象编程的基本构建块。简单来说，类充当对象的蓝图。类和对象之间的另一个类比是地图和房子。你可以通过阅读地图来了解房子的布局"
