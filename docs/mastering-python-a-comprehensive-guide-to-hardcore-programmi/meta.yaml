    \ 方法。\n\n现在，当你创建 `Person` 类的对象时，构造函数将执行，你将在控制台屏幕上看到 \"Class object created\"。\n\
    \n执行以下脚本：\n\n```python\nperson1 = Person()\n```\n\n输出将是：\n\n```\nClass object\
