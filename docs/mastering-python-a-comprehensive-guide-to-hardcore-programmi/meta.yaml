    \ and hit the enter key.\n\nIf you’re using Debian-based Linux distribution such\
    \ as Ubuntu, then type: “apt-get install python” at the command prompt and press\
    \ the enter key.\n\nOn the other hand, if you're using the Red Hat/ RHEL / CentOS\
    \ Linux distributions such as Fedora, then type: “yum install python” at the command\
    \ prompt and hit the Enter key.\n\nWait for the installation to complete.\n\n\
    Update the system by typing: “su apt-get update” if you're using Debian-based\
    \ Linux distributions or “su yum update” if you're a Redhat/ RHEL / CentOS Linux\
    \ distribution user.\n\nWhat about Windows OS?\n\nBefore you download and install\
    \ Python, decide on the version of Python language that you would want to install.\
    \ As a rule of thumb, always go for the latest version. As of writing this book,\
    \ the latest version was 3.6.2.\n\nHere are steps that can help you install Python\
    \ on Windows OS:\n\nGo to [www.python.org](http://www.python.org) and download\
    \ the current version of Python. Select the appropriate version depending on the\
    \ nature of your OS (32 bit, or 64 bit).\n\nOpen the Python file that you've just\
    \ downloaded.\n\nClick on the “Accept the default settings” from the on-screen\
    \ instructions and wait for the installation process to complete.\n\nIf you're\
    \ a Mac OS X or Sierra user, then you'll find Python 2.7 already ported to the\
    \ OS. Therefore, you don't have to install or configure anything if you want to\
    \ begin using Python. However, if you wish to install the latest version of Python,\
    \ you need to use the Homebrew.\n\nIt's now time to begin developing your ML systems.\
    \ But not that fast! You should decide on what text editor you'll use. You can\
    \ opt to select your best editors to help you code and execute your program. Some\
    \ of the most popular Text Editors are Emacs, Geany, Komodo Edit and Sublime Text.\n\
    \nBut since we all know the pitfalls of the Text Editors—such as running the code\
    \ manually from the Python Shell—I won't advise you to use them. Instead, use\
    \ the Python IDLE (Integrated Development Environment). I have been using it ever\
    \ since without problems. However, you can choose an IDE that suits you.\n\nPython\
    \ IDLE has the following features:\n\n- Syntax highlighting\n- Auto-completion\
    \ of code statements\n- Smart indentation\n- Integrated debugger with the stepping,\
    \ persistent breakpoints, and call stack visibility features.\n\n## Launching\
    \ Python\n\nTo get started, you have to understand how to launch the Python app.\
    \ You can launch Python from the Terminal or use the desktop environment for starting\
    \ the IDLE app. Simply launch the Terminal and type: “idle” at the command prompt.\
    \ Now that you’ve launched the Python, it’s now time to begin coding.\n\nLet’s\
    \ now create our first program in Python. Follow these steps to write your first\
    \ Python program:\n\nOpen the Python IDLE.\n\nWrite the Python language statements\
    \ (instructions) in the IDLE window.\n\nRun the program.\n\nThat’s it! Simple.\
    \ Isn’t it?\n\nNow, here’s a quick way to see the programming process in action...Proceed\
    \ and copy/paste the following code into your Python IDLE window.\n\n```python\n\
    print(\"Hello World! This is my first Machine Learning program\")\n```\n\nRun\
    \ the program. What do you see as the output?\n\nWell, the phrase “Hello World!\
    \ This is my first Machine Learning program” appears.\n\nCongratulations! You’ve\
    \ just written your first Python code. I know you’re now excited to begin coding\
    \ ML systems. Don’t worry so much about the meaning of statements. If you are\
    \ a machine learning novice, mastering some Python programming concepts will help\
    \ you understand how to design ML applications.\n\nNext up, let’s dive in together\
    \ and get to the basics of Python programming.\n\n## An Overview of Python\n\n\
    Now that you have executed your first Python program, what else do you need to\
    \ know? Well, it’s now time to understand the vital components of any Python code\
    \ including its structure. All Python programs have the following structure:\n\
    \n```python\nimport sys\ndef main():\n    main()\n    {\n        Program statements\n\
    \    }\n```\n\nAs you can see from this program structure, all Python codes should\
    \ always start with the keyword “import.” Now, what are we importing? Python language\
    \ is object-oriented. Therefore, it has components of all the object-oriented\
    \ programming languages. One such property is inheritance or in simple terms;\
    \ code reuse. The ability to inherit features of codes in Python allows programmers\
    \ to reuse pieces of codes that had been written elsewhere.\n\nTechnically speaking,\
    \ the import statement tells the Python interpreter to declare classes that have\
    \ already been used in other Python packages without referring to their full package\
    \ names. For instance, the statement: “import sys” informs the interpreter to\
    \ include all the system libraries such as print whenever the Python program is\
    \ starting.\n\nWhat does the statement “def main():” mean?\n\nWhenever a Python\
    \ program is loaded and executed, the computer’s memory—the Random Access Memory—contains\
    \ the objects with function definitions. The function definitions provide the\
    \ programmers with the capabilities of instructing the control unit to place the\
    \ function object into the appropriate section of the computer’s memory. In other\
    \ words, it’s like instructing the control unit to check the main memory and initialize\
    \ the program that needs to be executed.\n\nThe function objects in the memory\
    \ can be specified using names. That’s where the statement “def main():” comes\
    \ in. It simply tells the control unit to start executing the Python code statements\
    \ that are placed immediately after the statement “def main():”\n\nFor example,\
    \ the Python code below creates a function object and assigns it the name “main”:\n\
    \n```python\ndef main():\n    if len(sys.argv) == 10:\n        name = sys.argv[2]\n\
    \    else:\n        name = \"Introduction to Machine Learning.\"\n    print(\"\
    Hello\"), name\n```\n\nIn the above code, the Python interpreter will run all\
    \ the function statements in the Python file by placing the set of functions objects\
    \ in the memory and linking each of them with the namespace. This will happen\
    \ when the program is initialized with the import statement.\n\nBut more fundamentally,\
    \ “What are the different elements of Python code?” Well, all Python programs\
    \ have the following components:\n\nDocumenting the program. Any statement in\
    \ the program (except the first) that starts with “#” is treated as a command\
    \ line or comment line and will be ignored during execution. This will allow you\
    \ to comment on sections of the code for proper documentation.\n\nKeywords. The\
    \ keywords are instructions that the interpreter recognizes and understands. For\
    \ instance, the word “print” in the earlier program is a keyword. In Python, there\
    \ are two main types of keywords: the functions and the control keywords. Functions\
    \ are simple verbs such as print that tell the interpreter what to do while the\
    \ control keywords control the flow of execution.\n\nModules. Python program is\
    \ shipped with a large list of modules that increase its functionality. The modules\
    \ will help you to organize your code in a manner that’s easy to debug and control\
    \ the code.\n\nProgram statements. The program statements are sentences or instructions\
    \ that tell the control unit"
  mdcn: "## Python 入门\n\n显然，要开始使用 Python 开发机器学习系统，你需要在计算机上安装它并设置编程环境。如果你是 Python 编程新手，学习\
    \ Python 安装和环境设置的基础知识将对你的长远发展大有裨益。\n\n## 安装过程\n\n下载和安装 Python 语言解释器的过程相当简单。如果你使用的是最新的\
    \ Linux 发行版——无论是 Ubuntu、Fedora 还是 Mint——你会发现最新版本的 Python 已经预装好了。你只需更新系统即可。如果你使用的是基于\
    \ Debian 的 Linux 发行版，请按照以下步骤更新系统：\n\n启动终端应用程序，在命令提示符下输入以下命令：`sudo apt-get update`\n\
    \n输入你的 root 密码并按回车键。\n等待更新过程完成。\n\n如果你使用的是基于 Redhat 的 Linux 发行版，例如 Fedora，请按照以下步骤更新系统：\n\
    \n启动终端应用程序，在命令提示符下输入以下命令：`su apt-get update`\n\n输入你的 root 密码并按回车键。\n\n等待更新过程完成。\n\
    \n另一方面，如果你使用的是 Linux 以外的其他操作系统，你需要自行下载并安装 Python。此外，如果你使用的是没有预装 Python 的旧版 Linux，则需要手动安装。\n\
    \n请按照以下步骤在 Linux 发行版上安装 Python：\n\n启动终端应用程序（确保已连接到互联网）。\n\n在命令提示符下输入“su”并按回车键。\n\
    \n输入你的 root 密码并按回车键。\n\n如果你使用的是基于 Debian 的 Linux 发行版，例如 Ubuntu，请在命令提示符下输入：“apt-get\
    \ install python”并按回车键。\n\n另一方面，如果你使用的是 Red Hat/ RHEL / CentOS Linux 发行版，例如 Fedora，请在命令提示符下输入：“yum\
    \ install python”并按回车键。\n\n等待安装完成。\n\n通过输入以下命令更新系统：如果你使用的是基于 Debian 的 Linux 发行版，则输入“su\
    \ apt-get update”；如果你是 Redhat/ RHEL / CentOS Linux 发行版用户，则输入“su yum update”。\n\
    \nWindows 操作系统怎么办？\n\n在下载和安装 Python 之前，请决定要安装的 Python 语言版本。根据经验，始终选择最新版本。截至撰写本书时，最新版本是\
    \ 3.6.2。\n\n以下步骤可帮助你在 Windows 操作系统上安装 Python：\n\n访问 [www.python.org](http://www.python.org)\
    \ 并下载当前版本的 Python。根据你的操作系统类型（32 位或 64 位）选择相应的版本。\n\n打开你刚刚下载的 Python 文件。\n\n按照屏幕上的说明点击“接受默认设置”，并等待安装过程完成。\n\
    \n如果你是 Mac OS X 或 Sierra 用户，你会发现 Python 2.7 已经移植到该操作系统。因此，如果你想开始使用 Python，无需安装或配置任何内容。但是，如果你想安装最新版本的\
    \ Python，则需要使用 Homebrew。\n\n现在是时候开始开发你的机器学习系统了。但别急！你应该决定使用哪个文本编辑器。你可以选择最适合你的编辑器来帮助你编写和执行程序。一些最受欢迎的文本编辑器包括\
    \ Emacs、Geany、Komodo Edit 和 Sublime Text。\n\n但既然我们都知道文本编辑器的缺点——例如需要从 Python Shell\
    \ 手动运行代码——我不建议你使用它们。相反，请使用 Python IDLE（集成开发环境）。我一直在使用它，没有遇到任何问题。当然，你也可以选择适合你的\
    \ IDE。\n\nPython IDLE 具有以下功能：\n\n- 语法高亮\n- 代码语句自动补全\n- 智能缩进\n- 集成调试器，支持单步执行、持久断点和调用堆栈可见性功能。\n\
    \n## 启动 Python\n\n要开始使用，你必须了解如何启动 Python 应用程序。你可以从终端启动 Python，或使用桌面环境启动 IDLE 应用程序。只需启动终端，在命令提示符下输入：“idle”。现在你已经启动了\
    \ Python，是时候开始编码了。\n\n现在让我们创建第一个 Python 程序。请按照以下步骤编写你的第一个 Python 程序：\n\n打开 Python\
    \ IDLE。\n\n在 IDLE 窗口中编写 Python 语言语句（指令）。\n\n运行程序。\n\n就是这样！很简单，不是吗？\n\n现在，这里有一个快速了解编程过程的方法……请继续，将以下代码复制/粘贴到你的\
    \ Python IDLE 窗口中。\n\n```python\nprint(\"Hello World! This is my first Machine\
    \ Learning program\")\n```\n\n运行程序。你看到的输出是什么？\n\n嗯，出现了短语“Hello World! This is\
    \ my first Machine Learning program”。\n\n恭喜！你刚刚编写了你的第一段 Python 代码。我知道你现在很兴奋，想要开始编写机器学习系统。不要过于担心语句的含义。如果你是机器学习新手，掌握一些\
    \ Python 编程概念将帮助你理解如何设计机器学习应用。\n\n接下来，让我们一起深入了解 Python 编程的基础知识。\n\n## Python 概述\n\
    \n既然你已经执行了你的第一个 Python 程序，还需要了解什么？嗯，现在是时候了解任何 Python 代码的关键组成部分，包括其结构了。所有 Python\
    \ 程序都具有以下结构：\n\n```python\nimport sys\ndef main():\n    main()\n    {\n      \
    \  Program statements\n    }\n```\n\n正如你从这个程序结构中看到的，所有 Python 代码都应该以关键字“import”开头。那么，我们导入的是什么？Python\
    \ 语言是面向对象的。因此，它具有所有面向对象编程语言的组件。其中一个特性是继承，或者简单地说，代码重用。Python 中继承代码特性的能力允许程序员重用在其他地方编写的代码片段。\n\
    \n从技术上讲，import 语句告诉 Python 解释器声明已经在其他 Python 包中使用的类，而无需引用它们的完整包名。例如，语句：“import\
    \ sys”告知解释器在 Python 程序启动时包含所有系统库，例如 print。\n\n语句“def main():”是什么意思？\n\n每当 Python\
    \ 程序被加载和执行时，计算机的内存——随机存取存储器——包含带有函数定义的对象。函数定义为程序员提供了指示控制单元将函数对象放置到计算机内存适当部分的能力。换句话说，就像指示控制单元检查主内存并初始化需要执行的程序一样。\n\
    \n内存中的函数对象可以使用名称来指定。这就是语句“def main():”的用武之地。它只是告诉控制单元开始执行紧接在语句“def main():”之后的\
    \ Python 代码语句。\n\n例如，下面的 Python 代码创建了一个函数对象并将其命名为“main”：\n\n```python\ndef main():\n\
    \    if len(sys.argv) == 10:\n        name = sys.argv[2]\n    else:\n        name\
    \ = \"Introduction to Machine Learning.\"\n    print(\"Hello\"), name\n```\n\n\
    在上面的代码中，Python 解释器将通过将一组函数对象放入内存并将每个对象与命名空间链接起来，来运行 Python 文件中的所有函数语句。这将在程序通过\
    \ import 语句初始化时发生。\n\n但更根本的是，“Python 代码有哪些不同的元素？”嗯，所有 Python 程序都包含以下组件：\n\n记录程序。程序中（第一个语句除外）任何以“#”开头的语句都被视为命令行或注释行，在执行期间将被忽略。这将允许你对代码部分进行注释，以便正确记录。\n\
    \n关键字。关键字是解释器识别和理解的指令。例如，前面程序中的单词“print”就是一个关键字。在 Python 中，关键字主要有两种类型：函数和控制关键字。函数是简单的动词，如\
    \ print，告诉解释器要做什么，而控制关键字控制执行流程。\n\n模块。Python 程序附带大量模块，这些模块增强了其功能。模块将帮助你以易于调试和控制代码的方式组织代码。\n\
    \n程序语句。程序语句是告诉控制单元的句子或指令"
