    \ 函数。这将清除画布并将海龟移回其起始位置。\n\n```python\n>>> t.reset()\n```\n\n如果你想清除屏幕并指示海龟留在原地，请输入以下代码：\n\
    \n```python\n>>> t.clear()\n```\n\n重要的是要记住，我们可以指示海龟向后或向右移动。up 命令将允许你将笔从画布上抬起，这意味着海龟将停止绘制。如果你使用\
