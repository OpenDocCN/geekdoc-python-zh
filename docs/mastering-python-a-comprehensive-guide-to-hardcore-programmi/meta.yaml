- md: '## CHAPTER 5: HOW CODING WORKS


    Since you have learned about accounting, swapping, summing, flag variable, maxis
    and mins, and simple debugging used in Python, it is now the time to start running
    some codes. I believe you have already installed Python on your computer at this
    time. If you don’t have, kindly follow the previous procedures and install it
    on your computer now.


    There are many ways a programmer can use to tell Python to execute the code he/she
    has typed. In this Chapter, we will discuss all the techniques used for launching
    a program today. In addition to learning how to type code interactively, you will
    be able to know different ways of saving the code in the file to run in your desired
    way with the help of system command lines, exec calls, icon clicks, and module
    imports among others as you will see in this chapter.


    However, if you have experience in other programming languages and you would like
    to start digging into Python, it is important to go through this chapter thoroughly.
    It is an overview of debugging techniques and will help you understand different
    ways of importing and saving codes in the file. This is essential topics for you
    to understand Python’s program architecture though we will revisit it later. Also,
    it is important to go through the sections that deal with IDLE and other IDLEs
    to help you know the available tools, especially for developing complex Python
    program.


    ## Interactive Prompt


    In this section, you will learn some interactive coding basics and then look at
    running the code before covering some preliminaries like setting up system path
    and directory. You will apply what you had previously learned about directory
    and system path here.


    ## Starting an Interactive Session


    The simplest way to start running a Python program is by typing it at the interactive
    prompt, commonly known by many programmers as Python’s interactive command line.
    In fact, there are many ways of starting this command line and these include a
    system console among others. If you have installed the interpreter as an executable
    program on the system, you can just start by typing it to Python at the operating
    system’s prompt as this is the most effective way of starting an interactive interpreter
    session. When we type the word “python” at our system shell, for example, we will
    be initiating the system to start an interactive Python session. Note that the
    character “%” at the beginning of this listing represents a generic system prompt;
    it is not an input a programmer can type by herself/himself. A Ctrl-Z will get
    out of this session if you are using Windows: therefore, try to use Ctrl-D on
    the Unix instead.


    Although a system shell has a generic notion, its accessibility varies from one
    platform to another as seen below:


    ### On Windows


    If you are using Windows, launch Command Prompt (cmd.exe) and type the word “python”
    in the console window.


    ### On macOS


    Python interactive interpreter can be started by launching Terminal from Spotlight
    or double-clicking the Terminal icon found in Applications > Utilities folder.
    In the Terminal window, type the word “python”.


    ### On the Linux and other Unix operating systems


    As a programmer, you can type this command in a terminal window or even in the
    shell to run your program.


    ### Alternatively


    Some platforms allow you to start the interactive prompt in different or additional
    ways that will not require you to type a command. Examples of such platforms include
    Windows 7 and Windows 8.


    ### Windows 7


    Apart from typing python in a shell window, a programmer can start the same interactive
    session by selecting the python menu option. This is found in the Start button
    menu for Python.


    ### Windows 8


    When using Windows 8, there is no need to have a Start button as there are many
    ways you can use to get to the tools such as search, and file explorer.


    ### Other Platforms


    If you are using other platforms other than Windows 7 and Windows 8, do not worry.
    Use the same ways as discussed above to start the Python interactive session.
    There is no need to type commands because these platforms are too specific, thus
    making it easy for you to get there. The appearance of the prompt on your computer
    shows you that you are already in the interactive Python interpreter session,
    and therefore, you are free to type any Python expression or statement there and
    run it immediately.


    ## Where to find Command Prompt on the Windows


    Starting the command-line interface is not easy for most of us, especially if
    you are a beginner. Although some Windows readers know it, Unix developers and
    beginners do not understand it because it is not prominent like console or terminal
    windows. The following procedures will help you to find your Command Prompt easily.
    If you are using Windows 7, you can find this in the Accessories section under
    the Start and then all Programs menu. Alternatively, you can type cmd in the Start→Run
    box and allow the program to run. If you are using Windows 10, you can launch
    Command Prompt by directly typing cmd on the Windows Search bar found on the taskbar.


    ## The System Path


    Usually, the system will locate your python program on its system’s path after
    typing python in the last section as you have seen previously. Depending on the
    version of the Python and platforms you are using, it is important to replace
    the word ‘python’ with your desired full one if you have not set the PATH environment
    variable of your system to include installed directory. You must make sure that
    the PATH environment is simple to allow the program to run properly.


    ## Running Code Directories


    Since we have started discussing how to run the code on your computer, it is essential
    to know where to run the code to ensure the program run without making some errors.
    You will be running code from a directory called folder, created on your Windows
    called C:/code found at the top of your main drive. Most of your interactive sessions
    will start from there. Also, ensure you save and run all your script files from
    there. However, if you have been using other programming languages like Java and
    C++ and you would like to use Python doing your program, follow the following
    instructions. They will help you understand how to get started with a working
    directory using Python programming on your computer.


    ### Unix-based Systems


    These include Linux and MacOS. For these systems, a working directory can be found
    in /usr/home or sometimes created by a mkdir command. With a working directory,
    you will be able to determine or see how the code runs.


    ### Windows


    Windows systems allow programmers to make their working code directory in the
    Command Prompt window or File Explorer easily. Search for the New Folder in the
    File Explorer, you will see File menu. Alternatively, type mkdir command in the
    Command Prompt and run it. You can locate and recall your working directory any
    time. Also, running out of one directory helps a programmer to track his/her work
    easily.


    ## How to Run Code Interactively


    Because you have learned all these preliminaries, it is now the time to start
    typing some actual code and run them interactively on your python program. Note
    that you had already started typing in the python interactive session by typing
    two lines of information text that not only gave the Python version number but
    also a few hints as illustrated in our early discussion. Usually, the result of
    our code will be displayed below the input lines when we work interactively and
    this is after pressing the Enter key. When you type the print statement at the
    prompt, for example, a Python string also called output will echo back right away.
    Therefore, there is no need of creating a source code file or run the code a compiler
    if you are not using Python language. Later, you will learn how to run multiline
    statements and such statements run as soon as they are entered in their lines
    and press Enter button twice.


    ## Reasons for the Interactive Prompt


    Even though the interactive prompt will echo the results when you run it, it will
    not save the code in the file. This shows that you cannot handle the bulk of coding
    in the interactive sessions as you may think. The interactive prompt has turned
    out to be a good place to test program files or experiment the language on the
    fly.


    ## Experimenting'
  mdcn: '## 第五章：编程如何运作


    既然你已经学习了会计、交换、求和、标志变量、最大值和最小值，以及 Python 中使用的简单调试，现在是时候开始运行一些代码了。我相信此时你已经在电脑上安装了
    Python。如果没有，请按照之前的步骤在电脑上安装它。


    程序员可以使用多种方式告诉 Python 执行他/她输入的代码。在本章中，我们将讨论当今用于启动程序的所有技术。除了学习如何交互式地输入代码外，你还将了解将代码保存到文件中以所需方式运行的不同方法，借助系统命令行、exec
    调用、图标点击和模块导入等，正如你将在本章中看到的那样。


    然而，如果你有其他编程语言的经验，并且想开始深入研究 Python，那么彻底阅读本章是很重要的。它是调试技术的概述，将帮助你理解将代码导入和保存到文件中的不同方式。这是理解
    Python 程序架构的重要主题，尽管我们稍后会重新讨论它。此外，阅读有关 IDLE 和其他 IDLE 的部分也很重要，这将帮助你了解可用的工具，特别是用于开发复杂的
    Python 程序。


    ## 交互式提示


    在本节中，你将学习一些交互式编码基础知识，然后查看运行代码，之后再介绍一些预备知识，如设置系统路径和目录。你将在此应用之前学到的关于目录和系统路径的知识。


    ## 启动交互式会话


    启动 Python 程序最简单的方法是在交互式提示符下输入它，许多程序员通常称之为 Python 的交互式命令行。事实上，启动此命令行的方法有很多，其中包括系统控制台等。如果你已将解释器作为可执行程序安装在系统上，你可以直接在操作系统提示符下输入
    Python 来启动它，这是启动交互式解释器会话最有效的方式。例如，当我们在系统 shell 中输入“python”一词时，我们将启动系统以开始交互式 Python
    会话。请注意，此列表开头的字符“%”代表通用系统提示符；它不是程序员可以自己输入的输入。如果你使用的是 Windows，按 Ctrl-Z 将退出此会话；因此，在
    Unix 上请尝试使用 Ctrl-D。


    尽管系统 shell 具有通用概念，但其可访问性因平台而异，如下所示：


    ### 在 Windows 上


    如果你使用的是 Windows，请启动命令提示符（cmd.exe）并在控制台窗口中输入“python”一词。


    ### 在 macOS 上


    可以通过从 Spotlight 启动终端或双击位于“应用程序”>“实用工具”文件夹中的终端图标来启动 Python 交互式解释器。在终端窗口中，输入“python”一词。


    ### 在 Linux 和其他 Unix 操作系统上


    作为程序员，你可以在终端窗口甚至 shell 中输入此命令来运行你的程序。


    ### 或者


    某些平台允许你以不同或额外的方式启动交互式提示符，而无需输入命令。此类平台的示例包括 Windows 7 和 Windows 8。


    ### Windows 7


    除了在 shell 窗口中输入 python 外，程序员还可以通过选择 python 菜单选项来启动相同的交互式会话。这可以在 Python 的“开始”按钮菜单中找到。


    ### Windows 8


    使用 Windows 8 时，无需“开始”按钮，因为你可以使用多种方式访问工具，例如搜索和文件资源管理器。


    ### 其他平台


    如果你使用的是 Windows 7 和 Windows 8 以外的其他平台，请不要担心。使用与上述相同的方法启动 Python 交互式会话。无需输入命令，因为这些平台非常具体，因此你可以轻松到达那里。提示符在你计算机上的出现表明你已经处于交互式
    Python 解释器会话中，因此你可以自由地在其中输入任何 Python 表达式或语句并立即运行它。


    ## 在 Windows 上哪里可以找到命令提示符


    对于大多数人来说，启动命令行界面并不容易，特别是如果你是初学者。尽管一些 Windows 读者知道它，但 Unix 开发人员和初学者并不理解它，因为它不像控制台或终端窗口那样突出。以下步骤将帮助你轻松找到命令提示符。如果你使用的是
    Windows 7，可以在“开始”和“所有程序”菜单下的“附件”部分找到它。或者，你可以在“开始”→“运行”框中输入 cmd 并允许程序运行。如果你使用的是
    Windows 10，可以通过直接在任务栏上的 Windows 搜索栏中输入 cmd 来启动命令提示符。


    ## 系统路径


    通常，在上一节中输入 python 后，系统将在其系统路径上定位你的 python 程序，正如你之前所看到的那样。根据你使用的 Python 版本和平台，如果你尚未将系统的
    PATH 环境变量设置为包含安装目录，则必须将“python”一词替换为你所需的完整名称。你必须确保 PATH 环境简单，以允许程序正常运行。


    ## 运行代码目录


    由于我们已经开始讨论如何在计算机上运行代码，因此了解在哪里运行代码以确保程序运行时不会出现某些错误至关重要。你将从一个名为文件夹的目录运行代码，该文件夹在你的
    Windows 上创建为 C:/code，位于主驱动器的顶部。你的大多数交互式会话将从那里开始。此外，确保从那里保存和运行所有脚本文件。但是，如果你一直在使用其他编程语言（如
    Java 和 C++），并且想使用 Python 进行程序设计，请按照以下说明操作。它们将帮助你了解如何使用 Python 编程在计算机上开始使用工作目录。


    ### 基于 Unix 的系统


    这些包括 Linux 和 MacOS。对于这些系统，工作目录可以在 /usr/home 中找到，有时由 mkdir 命令创建。有了工作目录，你将能够确定或查看代码的运行方式。


    ### Windows


    Windows 系统允许程序员在命令提示符窗口或文件资源管理器中轻松创建其工作代码目录。在文件资源管理器中搜索“新建文件夹”，你将看到“文件”菜单。或者，在命令提示符中输入
    mkdir 命令并运行它。你可以随时定位和调用你的工作目录。此外，从一个目录运行有助于程序员轻松跟踪他/她的工作。


    ## 如何交互式运行代码


    因为你已经学习了所有这些预备知识，现在是时候开始输入一些实际代码并在你的 Python 程序中交互式地运行它们了。请注意，你已经通过在 Python 交互式会话中输入两行信息文本开始输入，这些文本不仅给出了
    Python 版本号，还提供了一些提示，正如我们在早期讨论中所说明的那样。通常，当我们交互式工作时，代码的结果将显示在输入行下方，这是在按 Enter 键之后。例如，当你在提示符下输入
    print 语句时，一个 Python 字符串（也称为输出）将立即回显。因此，如果你不使用 Python 语言，则无需创建源代码文件或运行编译器来运行代码。稍后，你将学习如何运行多行语句，这些语句在输入行中输入并按两次
    Enter 按钮后立即运行。


    ## 交互式提示的原因


    尽管交互式提示在运行时会回显结果，但它不会将代码保存到文件中。这表明你无法像想象的那样在交互式会话中处理大量的编码。交互式提示已被证明是测试程序文件或即时实验语言的好地方。


