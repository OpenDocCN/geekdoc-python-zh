    is going to come up on the screen. This is the best way to show your users that
    you have added in a customized exception into the program, especially if this
    is just one that you personally created for this part of the code, and not one
    that the compiler will recognize on its own.


    Just like with the other examples that we discussed, we worked with some generic
    wording so we can show exactly how exceptions are supposed to work. You can easily
    go and change this whenever needed so you can get a message which is unique for
    the code that you are writing and can explain to the user exactly what just happened
    if the error message shows up on their screen.


    Exception handling is something that you will work with a lot more as you start
    to write out some more advanced codes on Python. There are a lot of times when
    you will work with either the exceptions that are recognized by the program or
    ones that you want to bring up for the code that you are writing in particular.
    Working with some of the codes will help you to deal with these exceptions, and
    it can also make sure that you can make them look good for the user. Make sure
