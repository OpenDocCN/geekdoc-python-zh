  mdcn: "在使用循环时，重要的是要记住，你需要在决定运行程序之前设置好条件。如果不设置条件或忘记了，最终会导致代码陷入无限循环，从而使计算机冻结或崩溃。务必仔细检查代码中使用循环的部分，确保你已经提前设置了这些条件。\n\
    \n在编写Python代码时，你可能会发现循环不止一种类型，因为有多种选择可供使用。我们将讨论一些最常见的循环类型，并解释何时使用每种类型。\n\n## 'while'\
    \ 循环\n\n有多种循环可以使用，但我们要看的第一种是 'while' 循环。如果你确定代码需要循环多少次，这种循环随时可以使用。因此，如果你想让代码在进入下一部分之前执行几轮，那么使用\
    \ while 循环是最佳选择。如果你想确保它不会无限次地循环，那么必须在代码开头写入一些条件来避免这个问题。\n\n如果你希望程序至少执行一次循环以检查结果是真还是假，while\
    \ 循环是最佳选择。为了了解 while 循环的工作原理，让我们看下面的例子：\n\n```\n#计算单利。要求用户输入本金、利率和年数。\n\ncounter\
    \ = 1\nwhile(counter <= 3):\n    principal = int(input(\"Enter the principal amount:\"\
    ))\n    numberofyears = int(input(\"Enter the number of years:\"))\n    rateofinterest\
    \ = float(input(\"Enter the rate of interest:\"))\n    simpleinterest = principal\
    \ * numberofyears * rateofinterest/100\n    print(\"Simple interest = %.2f\" %simpleinterest)\n\
    \    #将计数器增加1\n    counter = counter + 1\nprint(\"You have calculated simple interest\
    \ for 3 times!\")\n```\n\n在继续之前，打开你的编译器并输入所有这些内容，以便代码可以执行。完成此任务后，你会注意到输出结果将允许用户输入他们想要的任何信息，并让程序计算这些信息。例如，假设用户正在尝试处理涉及利率的事情，并且用户希望将这些数字添加到程序中以查看会发生什么。我们设置好一切，以便循环在用户的帮助下至少执行三次，但你可以进行更改，使其执行任意次数。\n\
    \n## 'for' 循环\n\n你可能想使用的另一种循环是 'for' 循环。使用 for 循环时，你会发现它与 while 循环不同，但它对于你可能尝试编写的许多代码都很有用。事实上，你会发现\
