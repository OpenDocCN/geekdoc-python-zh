- md: '## Built-In Functions


    First we give some examples of built-in functions and then we will move on to
    how we can write our own functions. There is always a need to write new functions
    for our specific purposes and once you start proper coding you will find yourself
    writing functions all the time.


    One of the most common examples of a built-in function is the **type** function
    that will tell the type of the variable or value being used. For example


    ```

    >>> type(32)

    <type ''int''>

    ```


    The same can be done with any variable. For example,


    ```

    >>> var = 32

    >>> type(var)

    <type ''int''>

    ```


    Here the name of the function is **type** so the function call will be **type**.
    Within the brackets the function takes input of a variable or value. This is known
    as the argument. Many functions take an argument but not all. There can be functions
    that do not take any arguments. Here the **type** function not only takes in an
    argument but it also gives out a result or return value. It tells us the type
    of the variable. Just like the arguments, it is not mandatory that every function
    should return a value. A function may or may not return a value.


    With the **type** function the **type cast** function can also be used. The cast
    changes the type of one variable to the other variable. Sometimes users enter
    values as input. We do not know which type of data the user is entering so we
    explicitly type cast it according to our needs so that we can store it for later
    use in our database and use it accordingly.


    ## The Type Conversion Functions


    The **type conversion** functions are named after variable names. They take in
    an argument as the value that needs to be converted. The **int** function takes
    in any value and converts it into an integer.


    ```

    >>> int(3.4556)

    3

    >>> int(4.980)

    4

    ```


    Here the floating point numbers are converted into integers but there is no rounding
    off as one would logically assume. The decimal part is simply truncated and the
    remaining number is stored as an integer. If we try to convert an invalid value
    into an integer it will not work out.


    ```

    >>> int(''Hello'')

    ValueError: invalid literal for int(): Hello

    ```


    **Float** function converts the arguments passed into floating point format.


    ```

    >>> float(3)

    3.0

    >>> float(''3.234'')

    3.234

    ```


    Here again an error will be thrown out if an invalid argument is passed to the
    function. The **str** function will convert the value passed into a string. This
    is really helpful because we can then apply the string concatenation operations
    in the arguments.


    ## Max, Min and Len Functions


    Let us now state some very commonly used functions whose definitions are internally
    provided by Python so we can freely use them whenever required without having
    to define them.


    The **max** function is used to find the maximum value from a group of values
    given. And the **min** function is used to define the minimum value from a group
    of values.


    ```

    >>> max(34, 45, 54, 20, 13)

    54

    >>> min(34, 45, 54, 20, 13)

    13

    ```


    Max and min functions can be used with string values also. In the **string** function
    the lower the function in alphabetical order the greater is its value so for the
    **max** function:


    ```

    >>> max(''Hello World'')

    w

    >>> min(''Good'')

    d

    ```


    Here one thing to note is that if there is a blank space in the string provided
    the minimal value will be the blank space.


    ```

    >>> min(''Hello World'')

    '' ''

    ```


    Another function commonly used with string is the **len** function which tells
    us the length of the string.


    ```

    >>> len(''HELLO WORLD'')

    11

    ```


    Blank space is also considered as a character so it is also included in the length.
    The **len** function can only be used to find length of strings. So even if there
    is an integer convert it to string and then find its length


    ```

    >>> len(''345'')

    3

    ```


    Sometimes in order to access a built-in function we need to import its module
    into program. For example, to import a random number generation function we would
    have to import a random library. When we call the function from this library we
    use the dot notation that is first the name of the library in which the function
    is then the function name and lastly in the braces arguments if there are any
    otherwise there will be empty brackets.


    ```

    >>> import random

    >>> x = random.random()

    >>> print x

    ```


    Any random number would be printed on the screen. We get a floating point value
    between 0.0 and 1.0. we can then convert it into an integer if we want. As we
    are discussing the random number function here it is mandatory that we mention
    another concept of deterministic and nondeterministic functions. In coding, these
    exceptions are a bit more complicated, but it is important that you learn exactly
    how you can work with them so that your code will behave the way that you want
    it. Some of these exceptions can be found in the Python library and this something
    that’s raised automatically by the program. Then there are the exceptions that
    will be raised by you because that is how you want your program to work.


    Most of the functions in computer science will always give the same value every
    time they are given the same input. For example, the **sum** function, **min**,
    **max** and **len** functions. These are called the deterministic functions because
    once we have seen the answer every time we enter the same values the result would
    be same. These are known as the deterministic functions. On the other hand, the
    functions that do not give the same value even when the input is same are known
    as non-deterministic because their outcome is not determined later. As all programs
    are based on algorithms so the numbers generated are not really random but that
    work like this. Such algorithms are called Pseudorandom algorithm.


    ## Math Functions


    One group of functions that is frequently required by basic math functions like
    log, sin, cos, sqrt. All of these can be used by importing the math library into
    the program. Once the math library is imported into the program, it becomes very
    easy to use complex mathematical operations and solve complicated equations. Here
    is a demonstration of some of the basic math functions using the dot notation.


    ```

    >>> import math

    >>> math.sqrt(2)/2.0

    0.70710678

    ```


    The trigonometric functions of sin, cos, tan etc can be performed using trigonometric
    math operations. These functions take radians in the arguments and give the results.


    ```

    >>> radians = 0.7

    >>> height = math.sin(radians)

    ```


    If we have degrees, we can first convert them into radians by dividing it with
    360 and multiplying it with twice of pi. The value of pi can be achieved by writing
    math.pi. Now pi is a variable and not a function so it is written without the
    () brackets.


    ```

    >>> degrees = 45

    >>> radians = degrees/360 * 2 * math.pi

    >>> math.sin(radians)

    0.70710678

    ```


    There are a number of other functions available in the math library. We can explore
    it through learnPython.com and other web resources.


    The names of the built-in functions are also reserved and while naming variables
    we should avoid using them as variable names.


    ## Writing Your Own Functions


    Before we go on to learning about how to write a function let us first discuss
    what the benefits of writing a function are. One might argue why we should dissect
    the program in a disjointed sequence of statements and disturb the flow of execution.


    The following is the list of main benefits of writing a function:


    - It makes the program more readable and understandable. If we name a group of
    statements that performs a specific function, we specify their use accordingly
    in the function name. Now we know whenever we will call the function it will work
    the same function that we called.

    - Functions make the program much smaller. If do not have to write the repetitive
    code again and again. We just write it once in a function and then make the call
    repeatedly.

    - If a program is wisely divided into parts, it is much easier to debug it and
    find errors in it. When we know which part of program does what we just go to
    that part and update it whenever the need arises.

    - If a program is well written and properly debugged it can be saved and then
    imported to be used in other programs.


    The function definition is very important. It should convey the meaning as to
    what the function does. It should be concise and have proper meaning. For example,
    if there is a function that calculates the sum of some number, name it sum or
    calcSum. Another important thing is to decide when to divide a program into a
    function. Ideally a function is a unit of a program so it is supposed to do a
    single task. When you are generating a student transcript there should be one
    function that calculates the grade for individual courses, one that calculates
    semester GPAs and have another that calculates the cumulative GPAs at least. Writing
    a function is a shrewd task and one learns with experience when to divide a program
    into a function and make it work.'
  mdcn: '## 内置函数


    首先我们给出一些内置函数的示例，然后我们将讨论如何编写自己的函数。为了满足特定需求，我们总是需要编写新的函数，一旦你开始正式编码，你就会发现自己一直在编写函数。


    内置函数最常见的例子之一是 **type** 函数，它会告诉你所使用的变量或值的类型。例如


    ```

    >>> type(32)

    <type ''int''>

    ```


    对任何变量都可以这样做。例如，


    ```

    >>> var = 32

    >>> type(var)

    <type ''int''>

    ```


    这里函数的名称是 **type**，所以函数调用就是 **type**。在括号内，函数接受一个变量或值作为输入。这被称为参数。许多函数接受一个参数，但并非所有函数都如此。有些函数不接受任何参数。这里的
    **type** 函数不仅接受一个参数，还会给出一个结果或返回值。它告诉我们变量的类型。就像参数一样，并非每个函数都必须返回一个值。函数可能返回也可能不返回值。


    除了 **type** 函数，还可以使用 **类型转换** 函数。转换会将一个变量的类型更改为另一个变量的类型。有时用户会输入值作为输入。我们不知道用户输入的是哪种类型的数据，因此我们根据需要显式地进行类型转换，以便我们可以将其存储在数据库中以备后用，并相应地使用它。


    ## 类型转换函数


    **类型转换** 函数以变量名命名。它们接受一个参数作为需要转换的值。**int** 函数接受任何值并将其转换为整数。


    ```

    >>> int(3.4556)

    3

    >>> int(4.980)

    4

    ```


    这里浮点数被转换为整数，但并没有像人们逻辑上假设的那样进行四舍五入。小数部分被简单地截断，剩余的数字作为整数存储。如果我们尝试将无效值转换为整数，它将无法工作。


    ```

    >>> int(''Hello'')

    ValueError: invalid literal for int(): Hello

    ```


    **Float** 函数将传入的参数转换为浮点格式。


    ```

    >>> float(3)

    3.0

    >>> float(''3.234'')

    3.234

    ```


    这里同样，如果向函数传递无效参数，将会抛出错误。**str** 函数会将传入的值转换为字符串。这非常有用，因为之后我们可以在参数中应用字符串连接操作。


    ## Max、Min 和 Len 函数


    现在让我们介绍一些非常常用的函数，它们的定义由 Python 内部提供，因此我们可以在需要时自由使用它们，而无需定义它们。


    **max** 函数用于从给定的一组值中找出最大值。而 **min** 函数用于从一组值中找出最小值。


    ```

    >>> max(34, 45, 54, 20, 13)

    54

    >>> min(34, 45, 54, 20, 13)

    13

    ```


    Max 和 min 函数也可以用于字符串值。在 **字符串** 函数中，字母顺序越靠后的值越大，因此对于 **max** 函数：


    ```

    >>> max(''Hello World'')

    w

    >>> min(''Good'')

    d

    ```


    这里需要注意的一点是，如果提供的字符串中有空格，最小值将是空格。


    ```

    >>> min(''Hello World'')

    '' ''

    ```


    另一个常用于字符串的函数是 **len** 函数，它告诉我们字符串的长度。


    ```

    >>> len(''HELLO WORLD'')

    11

    ```


    空格也被视为一个字符，因此它也包含在长度中。**len** 函数只能用于查找字符串的长度。因此，即使有一个整数，也要先将其转换为字符串，然后查找其长度。


    ```

    >>> len(''345'')

    3

    ```


    有时，为了访问内置函数，我们需要将其模块导入程序。例如，要导入一个随机数生成函数，我们需要导入一个随机库。当我们从这个库中调用函数时，我们使用点表示法，即首先是函数所在的库名，然后是函数名，最后在括号中是参数（如果有），否则将是空括号。


    ```

    >>> import random

    >>> x = random.random()

    >>> print x

    ```


    屏幕上会打印出任何随机数。我们得到一个介于 0.0 和 1.0 之间的浮点值。如果我们愿意，可以将其转换为整数。由于我们在这里讨论随机数函数，因此必须提到确定性和非确定性函数的概念。在编码中，这些异常稍微复杂一些，但重要的是你要确切了解如何处理它们，以便你的代码能够按照你希望的方式运行。其中一些异常可以在
    Python 库中找到，这是程序自动引发的。然后还有一些异常将由你引发，因为这是你希望程序运行的方式。


    计算机科学中的大多数函数在每次给定相同输入时总是给出相同的值。例如，**sum** 函数、**min**、**max** 和 **len** 函数。这些被称为确定性函数，因为一旦我们看到答案，每次输入相同的值，结果都会相同。这些被称为确定性函数。另一方面，即使输入相同也不给出相同值的函数被称为非确定性函数，因为它们的结果不是预先确定的。由于所有程序都基于算法，因此生成的数字并非真正的随机，但它们的工作方式如此。这样的算法被称为伪随机算法。


    ## 数学函数


    一组经常需要的函数是基本数学函数，如 log、sin、cos、sqrt。所有这些都可以通过将数学库导入程序来使用。一旦数学库被导入程序，使用复杂的数学运算和解决复杂的方程就变得非常容易。下面是一些使用点表示法的基本数学函数的演示。


    ```

    >>> import math

    >>> math.sqrt(2)/2.0

    0.70710678

    ```


    sin、cos、tan 等三角函数可以使用三角数学运算执行。这些函数在参数中接受弧度并给出结果。


    ```

    >>> radians = 0.7

    >>> height = math.sin(radians)

    ```


    如果我们有度数，我们可以先通过将其除以 360 并乘以 pi 的两倍将其转换为弧度。pi 的值可以通过编写 math.pi 来获得。现在 pi 是一个变量而不是一个函数，因此它不带
    () 括号编写。


    ```

    >>> degrees = 45

    >>> radians = degrees/360 * 2 * math.pi

    >>> math.sin(radians)

    0.70710678

    ```


    数学库中还有许多其他函数。我们可以通过 learnPython.com 和其他网络资源来探索它。


    内置函数的名称也是保留的，在命名变量时，我们应该避免使用它们作为变量名。


    ## 编写自己的函数


    在我们继续学习如何编写函数之前，让我们首先讨论编写函数的好处。有人可能会争辩说，为什么我们应该将程序分解为不连贯的语句序列并干扰执行流程。


    以下是编写函数的主要好处列表：


    - 它使程序更具可读性和可理解性。如果我们为一组执行特定功能的语句命名，我们就在函数名中相应地指定了它们的用途。现在我们知道，每当我们调用该函数时，它都会执行我们调用的相同功能。

    - 函数使程序变得更小。我们不必一遍又一遍地编写重复的代码。我们只需在函数中编写一次，然后重复调用它。

    - 如果程序被明智地划分成部分，调试它并找出其中的错误就容易得多。当我们知道程序的哪一部分做什么时，我们只需在需要时转到该部分并更新它。

    - 如果程序编写良好且调试正确，它可以被保存，然后导入以在其他程序中使用。


    函数定义非常重要。它应该传达函数的功能。它应该简洁并具有适当的意义。例如，如果有一个函数计算某些数字的总和，将其命名为 sum 或 calcSum。另一个重要的事情是决定何时将程序划分为函数。理想情况下，函数是程序的一个单元，因此它应该执行单一任务。当你生成学生成绩单时，应该有一个函数计算单个课程的成绩，一个函数计算学期
    GPA，至少还有一个函数计算累计 GPA。编写函数是一项精明的任务，人们通过经验学习何时将程序划分为函数并使其工作。'
