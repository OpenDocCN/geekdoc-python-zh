    ## How to define your own exceptions


    So far, we have just gone through and took a look at how you can handle exceptions
    if these are the exceptions that the program recognizes. But there will still
    be times when you want to raise some of your own exceptions. For example, you
    could work on code, and you want to make sure that your users can only access
    and use certain numbers while the rest will not be accepted. This could work well
    if you’re planning to create a game where you want to raise an exception that
    if the user tries to guess too many times than what is allowed, they will be limited.
    Once the user has exceeded the limit of how many guesses you’ve allowed them to
    make (a limit of two or three times for example), the compiler can be programmed
    to raise an exception which will tell the user they are not allowed to guess again
    since they''ve used up the number of guesses they can make.


    The compiler is not going to recognize that there is anything wrong with how many
    times the user guesses. As far as the compiler is concerned, the user can guess
    an unlimited amount of times. But when it comes to a game or another program that
    you are creating, you do not want the user to get stuck and never be able to progress
    which is why you have to set an exception for how many times they can make a guess.


    These exceptions are unique to your code, and without you writing them into the
    code as exceptions, the compiler would never recognize them as such. You can add
    any kind of exception that you would like and you can add a message as well, similar
    to what we did above.


    In this code, you have been successful in setting up your own exceptions and whenever
