    \ Fedora, follow these steps to update your system:\n\nLaunch the Terminal app\
    \ and type the following command at the command prompt: `su apt-get update`\n\n\
    Type your root password and press the Enter key.\n\nWait for the update process\
    \ to be completed.\n\nOn the other hand, if you’re using other OS’s apart from\
    \ Linux, you have to download and install Python yourself. Also, if you’re using\
