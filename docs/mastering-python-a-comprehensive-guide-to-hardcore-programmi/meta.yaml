- md: "## Objects\n\nIn Python, everything is treated as an object. Python objects\
    \ can be broadly divided into two categories:\n\n- Built-in Objects\n- Custom\
    \ Objects\n\n## Built-in Objects\n\nBuilt-in objects are the objects belonging\
    \ to primitive data types. For instance, when you assign an integer to a variable,\
    \ basically an integer object is stored in that variable. Take a look at the following\
    \ script:\n\n```python\n# creates an integer type object age\nage = 28\ntype(age)\n\
    ```\n\nIn the script above we create an integer object and assign it to age variable.\
    \ We then check the type of age variable which returns int.\n\n## Custom Objects\n\
    \nCustom objects are the objects that implement custom classes. In the previous\
    \ section we created a class Person. Let’s create object of the Person class.\
    \ Take a look at the following script:\n\n```python\nperson1 = Person()\n```\n\
    \nTo create custom object, you simply have to write the name of the class followed\
    \ by a pair of parenthesis and assign it to a named entity (variable) which is\
    \ **person1** in the above example. Now the object **person1** can be used to\
    \ access the Person class attributes and methods.\n\nTo access class attributes\
    \ or methods, you can use the object name followed by the dot operator and the\
    \ name of the attribute or the method.\n\nTake a look at the following example:\n\
    \n```python\n# accessing attributes\nf_name = person1.name\nprint(f_name)\n\n\
    # accessing methods\nperson1.stand()\n```\n\nIn the script above, the name attribute\
    \ of the Person class is accessed via person1 object and the assigned to the f_name\
    \ variable. The f_name variable is then printed on the screen.\n\nSimilarly, the\
    \ stand function is accessed which prints the statement “Person standing” on the\
    \ console. The output of the script above looks like this:\n\n![](img/d9be304f8d8c66853c38a3be019736b2_101_0.png)\n\
    \n## Constructor\n\n“Constructor” is a method that executes when a class is instantiated.\
    \ The processes of creating object of a class is also known as instantiation.\
    \ To create a constructor in Python, the `__init__` method is used. Take a look\
    \ at the following example to see constructor in action.\n\n```python\n# Creates\
    \ class Person\nclass Person:\n    # create constructor\n    def __init__(self):\n\
    \        print(\"Class object created\")\n\n    # create class methods\n    def\
    \ stand(self):\n        print(\"Person standing\")\n```\n\nIn the script above,\
    \ we again create class Person. But this time the class has a constructor which\
    \ simply prints some text on the screen. The class also contains **stand** method.\n\
    \nNow, when you create the object of the Person class, the constructor will execute\
    \ and you will see “Class object created” on the console screen.\n\nExecute the\
    \ following script:\n\n```python\nperson1 = Person()\n```\n\nThe output will be:\n\
    \n```\nClass object created\n```\n\n## Attributes\n\nWe know that a value assigned\
    \ to named entity in Python is actually an object. By the same analogy, the attributes\
    \ declared inside a class are also objects. This means that objects can contain\
    \ nested objects. Let’s create a primitive string type object and check what attributes\
    \ the object contains.\n\nTake a look at the following script:\n\n```python\n\
    # Creates a string object message\nmessage = \"I love Python\"\n\n# find all attributes\
    \ of message object\nprint(dir(message))\n```\n\nIn the script above we create\
    \ a string object named “message”. To find all the attributes of an object the\
    \ **dir** method is used. The output of the above script looks like this:\n\n\
    ![](img/d9be304f8d8c66853c38a3be019736b2_102_0.png)\n\n## Class Attributes vs.\
    \ Instance Attributes\n\nPython classes have two types of attributes: Class attributes\
    \ and Instance attributes. The instance attributes are specific to the individual\
    \ objects of a class and are not shared between the objects. On the other hand,\
    \ class attributes are shared among all the instances (objects) of a class.\n\n\
    In the script above, as usual we create Person class. The class contains one class\
    \ attribute person_count and a method **set_details**. Inside the **set_details**\
    \ method, three instance attributes are initialized with the values passed as\
    \ arguments to the **set_details** method. Inside the method, the person_count\
    \ attribute is incremented by one. Another difference you can see here is that\
    \ inside a class, the class attribute is accessed via class name whereas the instance\
    \ attributes are accessed via keyword **self**.\n\nIn the script above, we create\
    \ person1 object of Person class. We then call the **set_details** method using\
    \ the object and pass some arguments to the method. The method prints the name\
    \ of the person on console. We then print the class attribute person_count on\
    \ the screen which will display 1.\n\nIn the script above, we create person2 object\
    \ of the Person class. This time, the shared attribute person_count will be incremented\
    \ to 2 since it previously was 1.\n\nThe output of the script above looks like\
    \ this:\n\n```\nDetails for person Suzi have been stored\nPerson count 2\n```\n\
    \nFrom the output you can see class attribute person_count is being shared between\
    \ the two instances person1 and person2 while the instance attribute “name” is\
    \ not being shared.\n\n## Properties\n\nEncapsulation is one of the major building\
    \ blocks of OOP. Encapsulation refers to providing controlled access to internal\
    \ class data. The access is controlled via special methods. The special methods\
    \ are bundled with the class attributes via properties and descriptors.\n\n###\
    \ Why we need Properties?\n\nIn this section we will study properties. But first,\
    \ let’s see why we need properties.\n\nLet’s create a class named Medicine with\
    \ three attributes: name, expiration_year and expiration_month. Execute the following\
    \ script:\n\n```python\n# Creates class Medicine\nclass Medicine:\n    # Creates\
    \ Medicine class constructor\n    def __init__(self, name, expiry_year, expiry_month):\n\
    \        # initialize instance variables\n        self.name = name\n        self.expiry_year\
    \ = expiry_year\n        self.expiry_month = expiry_month\n\n    def getExpiryDate(self):\n\
    \        print('The expiration date is: ' + str(self.expiry_month) + '/' + str(self.expiry_year))\n\
    ```\n\nNow let’s create an object of the Medicine class.\n\n```python\nmedicine1\
    \ = Medicine(\"xyz\", 2020, 15)\n```\n\nIn the script above, the constructor of\
    \ the Medicine class assigns 15 as the month number to the expiry_month. To see\
    \ the expiry date, call the **getExpiryDate** method using the medicine1 object\
    \ as shown below:\n\n```python\nmedicine1.getExpiryDate()\n```\n\nTechnically,\
    \ any number can be assigned to the month. However, logically there are only 12\
    \ months in a year. So the number should be between 1 and 12. This is where properties\
    \ come handy. Using properties you can control the value assigned and retrieved\
    \ from the class members.\n\nTake a look at the following script to see how properties\
    \ can be created:\n\n```python\n# Creates class Medicine\nclass Medicine:\n  \
    \  # Creates Medicine class constructor\n    def __init__(self, name, expiry_year,\
    \ expiry_month):\n        # initialize instance variables\n        self.name =\
    \ name\n        self.expiry_year = expiry_year\n        self.expiry_month = expiry_month\n\
    \n    # Creates expiry_month property\n    @property\n    def expiry_month(self):\n\
    \        return self.__expiry_month\n\n    # Create property setter\n    @expiry_month.setter\n\
    \    def expiry_month(self, expiry_month):\n        if expiry_month < 1:\n   \
    \         self.__expiry_month = 1\n        elif expiry_month > 12:\n         \
    \   self.__expiry_month = 12\n        else:\n            self.__expiry_month =\
    \ expiry_month\n```"
