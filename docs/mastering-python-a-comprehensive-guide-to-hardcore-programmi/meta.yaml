- md: "# Mastering Python\n\nA Comprehensive Guide to Hardcore Programming, Data Analysis,\
    \ and Coding Projects\n\nVera Poe\n\nCopyright © [2024] by [vera poe] all rights\
    \ reserved.\n\nNo portion of this book may be reproduced in any form without written\
    \ permission from the publisher or author, except as permitted by U.S. Copyright\
    \ law.\n\nThis publication is designed to provide accurate and authoritative information\
    \ in regard to the subject matter covered. It is sold with the understanding that\
    \ neither the author nor the publisher is engaged in rendering legal, investment,\
    \ accounting or other professional services. While the publisher and author have\
    \ used their best efforts in preparing this book, they make no representations\
    \ or warranties with respect to the accuracy or completeness of the contents of\
    \ this book and specifically disclaim any implied warranties of merchantability\
    \ or fitness for a particular purpose. No warranty may be created or extended\
    \ by sales representatives or written sales materials. The advice and strategies\
    \ contained herein may not be suitable for your situation. You should consult\
    \ with a professional when appropriate. Neither the publisher nor the author shall\
    \ be liable for any loss of profit or any other commercial damages, including\
    \ but not limited to special, incidental, consequential, personal, or other damages.\n\
    \n# TABLE OF CONTENTS\n\n- INTRODUCTION\n- Chapter 1: Python Programming Basics\n\
    - Chapter 2: Learning Python programming language and how to read the code\n-\
    \ Chapter 3: How to read errors and troubleshooting your code\n- Chapter 4: Learn\
    \ the hardcore of Python computer programming\n- Chapter 5: How coding works\n\
    - Chapter 7: Drawing With Turtles\n- Chapter 8: Asking the Right Questions\n-\
    \ Chapter 9: Secrets and hacks of Python programming\n- Conclusion\n\n# INTRODUCTION\n\
    \nIn many cases, we hear people talking about programming and how it is hard to\
    \ use different programming languages in your program. Programming is not as difficult\
    \ as many people think. There are different types of programming languages of\
    \ which you can choose when doing a program. These languages include JavaScript,\
    \ C++, and Python. As we start learning about Python programming language, you\
    \ will understand all layers of the Python and its and how it is easy to use it\
    \ for programming. Reading this book will also empower you with the necessary\
    \ coding skills.\n\nCoding is not as severe as most people think. It is only tough\
    \ for beginners. There are many coding languages, and the most popular coding\
    \ languages include C++ and Java, which most people feel scared when they hear\
    \ about them. The pages are sometimes filled with symbols and letters that you,\
    \ as a beginner, cannot understand them. Although programming scares many people\
    \ due to the feeling that it is too hard for them to learn, Python programming\
    \ language is one of the most original programming languages for an individual\
    \ to learn about coding and even study it as a professional.\n\nIn this book,\
    \ you will be provided with the basics of Python programming. To understand better\
    \ on to get started in Python programming, the book will begin by talking about\
    \ the Python programming, steps for downloading the program if you do not have\
    \ in your computer, and importance of studying the Python programming. It will\
    \ then define some essential keywords for an individual to understand the program\
    \ and eventually talk about the effects of using Python in coding and programming.\n\
    \n# CHAPTER 1: PYTHON PROGRAMMING BASICS\n\n## How to Install Python\n\nIn this\
    \ time and age, being techy is a demand of the times, and the lack of knowledge,\
    \ classifies one as an outback. This can result to being left out from the career\
    \ world, especially in the field of programming.\n\nNumerous big shot companies\
    \ have employed their own programmers for purposes of branding, and to cut back\
    \ on IT expenses.\n\nIn the world of programming, using Python language is found\
    \ to be easier and programmer-friendly, thus, the universal use.\n\nDiscussed\
    \ below are information on how to download Python for MS Windows. In this particular\
    \ demo, we have chosen Windows because it's the most common worldwide - even in\
    \ not so progressive countries. We want to cater to the programming needs of everyone\
    \ all over the globe.\n\nPython 2.7.12 version was selected because this version\
    \ bridges the gap between the old version 2 and the new version 3.\n\nSome of\
    \ the updated functions/applications of version 3 are still not compatible with\
    \ some devices, so 2.7.12 is a smart choice.\n\n## Steps in downloading Python\
    \ 2.7.12, and installing it on Windows\n\nType python on your browser and press\
    \ the Search button to display the search results.\n\nScroll down to find the\
    \ item you are interested in. In this instance, you are looking for python. click\
    \ “python releases for windows”, and a new page opens. See image below:\n\n![](img/d9be304f8d8c66853c38a3be019736b2_6_0.png)\n\
    \nSelect the Python version, python 2.7.12, and click, or you can select the version\
    \ that is compatible to your device or OS.\n\n# Python Releases for Windows\n\n\
    - Latest Python 2 Release - Python 2.7.12\n- Latest Python 3 Release - Python\
    \ 3.5.2\n- Python 3.6.0b1 - 2016-09-12\n  - Download Windows x86 web-based installer\n\
    \  - Download Windows x86 executable installer\n  - Download Windows x86 embeddable\
    \ zip file\n  - Download Windows x86-64 web-based installer\n  - Download Windows\
    \ x86-64 executable installer\n  - Download Windows x86-64 embeddable zip file\n\
    \  - Download Windows help file\n- Python 3.6.0a4 - 2016-08-15\n  - Download Windows\
    \ x86 web-based installer\n  - Download Windows x86 executable installer\n  -\
    \ Download Windows x86 embeddable zip file\n  - Download Windows x86-64 web-based\
    \ installer\n  - Download Windows x86-64 executable installer\n  - Download Windows\
    \ x86-64 embeddable zip file\n\nThe new page contains the various python types.\
    \ Scroll down and select an option: in this instance, select Windows x86 MSI installer\
    \ and click.\n\n![](img/d9be304f8d8c66853c38a3be019736b2_7_0.png)\n\nPress the\
    \ Python box at the bottom of your screen. Click the “Run” button, and wait for\
    \ the new window to appear.\n\n![](img/d9be304f8d8c66853c38a3be019736b2_8_0.png)\n\
    \nSelect the user options that you require and press “NEXT”.\n\nYour screen will\
    \ display the hard drive where your python will be located.\n\n![](img/d9be304f8d8c66853c38a3be019736b2_8_1.png)\n\
    \nPress the “NEXT” button.\n\nPress yes, and wait for a few minutes. Sometimes\
    \ it can take longer for the application to download, depending on the speed of\
    \ your internet.\n\nAfter that, click the FINISHED button to signify that the\
    \ installation has been completed.\n\n![](img/d9be304f8d8c66853c38a3be019736b2_9_0.png)\n\
    \nYour python has been installed in your computer and is now ready to use.\n\n\
    Find it in drive C, or wherever you have saved it.\n\nThere can be glitches along\
    \ the way, but there are options which are presented in this article. If you follow\
    \ it well, there is no reason that you cannot perform this task.\n\nIt’s important\
    \ to note that there’s no need to compile programs. Python is an interpretive\
    \ language and can execute quickly your commands.\n\nYou can also download directly\
    \ from the Python website, by selecting any of these versions - 3.5.2 or 2.7.12.\
    \ and clicking ‘download’. (For this book, 2.7.12 is used, in general, for easy\
    \ discussions).\n\nSee image below:\n\n![](img/d9be304f8d8c66853c38a3be019736b2_10_0.png)\n\
    \nFollow the step by step instructions prompted by the program itself. Save and\
    \ run the program in your computer.\n\n## For Mac\n\nTo download Python on Mac,\
    \ you can follow a similar procedure, but this time, you will have to access the\
    \ “Python.mpkg” file, to run the installer.\n\n## For Linux\n\nFor Linux, Python\
    \ 2 and 3 may have been installed by default. Hence, check first your operating\
    \ system. You can check if your device has already a Python program, by accessing\
    \ your command prompt and entering this: python—version, or python3—version.\n\
    \nIf Python is not installed in your Linux, the result “command not found” will\
    \ be displayed."
  mdcn: "# 精通Python\n\n硬核编程、数据分析与编程项目综合指南\n\nVera Poe\n\n版权所有 © [2024] [vera poe]，保留所有权利。\n\
    \n未经出版商或作者书面许可，不得以任何形式复制本书的任何部分，美国版权法允许的情况除外。\n\n本出版物旨在就所涵盖的主题提供准确且权威的信息。其销售基于以下理解：作者和出版商均未提供法律、投资、会计或其他专业服务。尽管出版商和作者已尽最大努力编写本书，但他们对本书内容的准确性或完整性不作任何陈述或保证，并特别否认任何关于适销性或特定用途适用性的默示保证。销售代表或书面销售材料不得创建或扩展任何保证。本书所含的建议和策略可能不适用于您的情况。您应在适当时咨询专业人士。对于任何利润损失或任何其他商业损害，包括但不限于特殊、附带、后果性、个人或其他损害，出版商和作者均不承担任何责任。\n\
    \n# 目录\n\n- 引言\n- 第1章：Python编程基础\n- 第2章：学习Python编程语言及如何阅读代码\n- 第3章：如何阅读错误信息并进行代码故障排除\n\
    - 第4章：学习Python计算机编程的核心\n- 第5章：编码的工作原理\n- 第7章：使用海龟绘图\n- 第8章：提出正确的问题\n- 第9章：Python编程的秘诀与技巧\n\
    - 结语\n\n# 引言\n\n在许多情况下，我们听到人们谈论编程，以及在程序中使用不同的编程语言有多难。编程并不像许多人想象的那么困难。在编写程序时，您可以选择不同类型的编程语言。这些语言包括JavaScript、C++和Python。当我们开始学习Python编程语言时，您将理解Python的所有层面，以及它为何如此易于用于编程。阅读本书还将赋予您必要的编码技能。\n\
    \n编码并不像大多数人想象的那么严峻。它只是对初学者来说比较困难。有许多编码语言，最受欢迎的编码语言包括C++和Java，大多数人听到它们时会感到害怕。这些页面有时充满了符号和字母，作为初学者，您可能无法理解它们。尽管编程让许多人感到害怕，因为他们觉得学习起来太难，但Python编程语言是个人学习编码甚至将其作为专业研究的最原始编程语言之一。\n\
    \n在本书中，您将获得Python编程的基础知识。为了更好地理解如何开始Python编程，本书将首先介绍Python编程，如果您计算机上没有安装该程序，将介绍下载步骤，以及学习Python编程的重要性。然后，它将定义一些个人理解程序所必需的关键字，最后讨论在编码和编程中使用Python的效果。\n\
    \n# 第1章：Python编程基础\n\n## 如何安装Python\n\n在这个时代，精通技术是时代的要求，缺乏知识会将一个人归类为落伍者。这可能导致在职业世界中被边缘化，尤其是在编程领域。\n\
    \n许多大公司已经雇佣了自己的程序员，目的是打造品牌并削减IT开支。\n\n在编程世界中，使用Python语言被认为更容易且对程序员友好，因此得到了普遍使用。\n\
    \n下面讨论的是如何为MS Windows下载Python的信息。在这个特定的演示中，我们选择了Windows，因为它在全球范围内最常见——即使在不太发达的国家也是如此。我们希望满足全球每个人的编程需求。\n\
    \n选择Python 2.7.12版本是因为这个版本弥合了旧版本2和新版本3之间的差距。\n\n版本3的一些更新功能/应用程序仍然与某些设备不兼容，因此2.7.12是一个明智的选择。\n\
    \n## 下载Python 2.7.12并在Windows上安装的步骤\n\n在浏览器中输入python，然后按搜索按钮以显示搜索结果。\n\n向下滚动以找到您感兴趣的项目。在此示例中，您正在寻找python。单击“python\
    \ releases for windows”，将打开一个新页面。请参见下图：\n\n![](img/d9be304f8d8c66853c38a3be019736b2_6_0.png)\n\
    \n选择Python版本，python 2.7.12，然后单击，或者您可以选择与您的设备或操作系统兼容的版本。\n\n# Windows的Python版本\n\
    \n- 最新的Python 2版本 - Python 2.7.12\n- 最新的Python 3版本 - Python 3.5.2\n- Python 3.6.0b1\
    \ - 2016-09-12\n  - 下载Windows x86基于Web的安装程序\n  - 下载Windows x86可执行安装程序\n  - 下载Windows\
    \ x86可嵌入的zip文件\n  - 下载Windows x86-64基于Web的安装程序\n  - 下载Windows x86-64可执行安装程序\n\
    \  - 下载Windows x86-64可嵌入的zip文件\n  - 下载Windows帮助文件\n- Python 3.6.0a4 - 2016-08-15\n\
    \  - 下载Windows x86基于Web的安装程序\n  - 下载Windows x86可执行安装程序\n  - 下载Windows x86可嵌入的zip文件\n\
    \  - 下载Windows x86-64基于Web的安装程序\n  - 下载Windows x86-64可执行安装程序\n  - 下载Windows x86-64可嵌入的zip文件\n\
    \n新页面包含各种Python类型。向下滚动并选择一个选项：在此示例中，选择Windows x86 MSI安装程序并单击。\n\n![](img/d9be304f8d8c66853c38a3be019736b2_7_0.png)\n\
    \n按屏幕底部的Python框。单击“运行”按钮，并等待新窗口出现。\n\n![](img/d9be304f8d8c66853c38a3be019736b2_8_0.png)\n\
    \n选择您需要的用户选项，然后按“下一步”。\n\n您的屏幕将显示Python将安装到的硬盘驱动器。\n\n![](img/d9be304f8d8c66853c38a3be019736b2_8_1.png)\n\
    \n按“下一步”按钮。\n\n按“是”，并等待几分钟。有时应用程序下载可能需要更长时间，具体取决于您的互联网速度。\n\n之后，单击“完成”按钮以表示安装已完成。\n\
    \n![](img/d9be304f8d8c66853c38a3be019736b2_9_0.png)\n\n您的Python已安装在计算机中，现在可以使用了。\n\
    \n在C盘或您保存它的任何位置找到它。\n\n过程中可能会出现故障，但本文介绍了可选的解决方案。如果您遵循得当，没有理由无法完成此任务。\n\n需要注意的是，无需编译程序。Python是一种解释型语言，可以快速执行您的命令。\n\
    \n您也可以直接从Python网站下载，选择以下任一版本 - 3.5.2或2.7.12，并单击“下载”。（本书中，为便于讨论，通常使用2.7.12）。\n\n\
    请参见下图：\n\n![](img/d9be304f8d8c66853c38a3be019736b2_10_0.png)\n\n按照程序本身提示的逐步说明操作。在计算机上保存并运行程序。\n\
    \n## 对于Mac\n\n要在Mac上下载Python，您可以遵循类似的步骤，但这次您需要访问“Python.mpkg”文件来运行安装程序。\n\n##\
    \ 对于Linux\n\n对于Linux，Python 2和3可能已默认安装。因此，请先检查您的操作系统。您可以通过访问命令提示符并输入以下命令来检查您的设备是否已有Python程序：python—version，或python3—version。\n\
    \n如果Python未安装在您的Linux中，将显示结果“command not found”。"
