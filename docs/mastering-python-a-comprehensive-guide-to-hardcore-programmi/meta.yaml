- md: "## What You Learned\n\nThis chapter has shed some light on how you can use\
    \ the turtle module in Python. We learned to draw some shapes using the right\
    \ and left turns and forward and backward commands. You have also learned how\
    \ you can instruct the turtle to start drawing using down and stop drawing using\
    \ up. Finally, you understood that the turtle uses degrees to identify which direction\
    \ to turn in.\n\n## CHAPTER 8 ASKING THE RIGHT QUESTIONS\n\nMost often, we tend\
    \ to ask yes or no questions in programming, and the action performed is based\
    \ on the answer given. These questions are called conditions. A condition and\
    \ a response are combined to form the **if statement**. A condition can always\
    \ be more complicated than one single question; an if statement can also be combined\
    \ with numerous questions and responses to those questions. It is important to\
    \ remember that one question can have multiple responses.\n\nThis chapter will\
    \ help you learn more about how you can use the if statement to build a program.\n\
    \n### If Statements\n\nAn if statement has the ‘if’ keyword, a condition, and\
    \ a colon. The lines of code that follow the colon should always be within a block;\
    \ if the answer is yes, the commands that are within the block of code will run.\
    \ Let us now look at how we can write commands and blocks.\n\n### Block of Statements\n\
    \nA block is a collection of programming statements, and a block of code is a\
    \ collection of programming statements.\n\nThere are three print statements in\
    \ the above block of code, and these statements run if the condition holds true.\
    \ There will always be four spaces (shown by □□□□) before the beginning of every\
    \ line of code after the if statement.\n\nYou can enter a whitespace in Python\
    \ either by pressing the space or tab key. These spaces are meaningful and help\
    \ you differentiate between different sections of the code. When you enter the\
    \ code without any indentation, you can never identify when a specific block of\
    \ code starts. If you do use indentation, it will be easier for you to understand\
    \ the program you have written better.\n\nIt is important to remember that we\
    \ only group statements into a block if they are related. This is because these\
    \ statements will all need to be run together. If you change the indentation,\
    \ you are creating a new block. For that matter, when you start a block with four\
    \ spaces on the first line and use six spaces on the second line, it will throw\
    \ an indentation error since Python needs you to use the same indentation across\
    \ all lines of code in the block. When you start a block with four spaces, you\
    \ should continue to use four spaces across the block.\n\nThe spaces in this code\
    \ are visible to help you understand the difference. If you look at the third\
    \ line in the code, you will notice that there are six spaces instead of four.\
    \ When you run this code in Python, the IDLE will highlight the third line in\
    \ the code with a red block, and display the SyntaxError message.\n\nThere is\
    \ an error since Python did not want to see two extra spaces at the start of the\
    \ second print line.\n\n### Conditions Help Us Compare Things\n\nA condition is\
    \ a statement in a program that will allow you to compare two variables and decide\
    \ based on the criteria provided if the condition holds true or not. For instance,\
    \ if the condition is age>10, we are trying to verify if the value of the variable\
    \ age is greater than 10 or not. Hair_color == ‘Black’ is also a condition, which\
    \ is trying to verify if the variable hair_color holds the value black.\n\nThere\
    \ are numerous operators and symbols used in Python, and these are called operators.\
    \ They are used to create different conditions.\n\nFor instance, if you are only\
    \ ten years old, the condition your_age==0 will hold true, and the value returned\
    \ would be true. Otherwise, you will receive the value False. Similarly, if your\
    \ age is greater than 10, the value returned will be true.\n\nLet us now try to\
    \ look at a few more examples. In this example, we will assign the value 10 to\
    \ the variable age and write a conditional statement that will print a statement\
    \ if the value of the variable age is greater than 10.\n\n```\n>>> age = 10\n\
    >>> if age > 10:\n        print('You are too old for my jokes!')\n```\n\nSo, what\
    \ do you think will happen when you enter this code into the IDLE and press Enter?\
    \ Absolutely nothing. This is because the value returned by the variable age does\
    \ not meet the condition. So, Python does not print the statements. If you set\
    \ the value of the variable age to 20, the message will be printed on the screen.\
    \ Let us now change the condition and use the greater than equal to symbol.\n\n\
    ```\n>>> age = 10\n>>> if age >= 10:\n        print('You are too old for my jokes!')\n\
    ```\n\nThe message “You are too old for my jokes!” is printed on the screen since\
    \ the value of the variable age is equal to 10. Let us now try to use the equalto\
    \ operator in the condition.\n\n```\n>>> age = 10\n>>> if age == 10:\n       \
    \ print('What's brown and sticky? A stick!!')\n```\n\nThe following message is\
    \ printed on the screen: “What’s brown and sticky? A stick!!”\n\n### If-Then-Else\
    \ Statements\n\nApart from using the if statements to perform specific actions\
    \ if the condition is true, we can also use these statements to perform a specific\
    \ action if the condition does not hold true. For instance, you can print a message\
    \ on the screen if the age entered is 12, and another statement if the age is\
    \ not 12. In this instance, you should use the **if-then-else statement**. It\
    \ states that if the condition is true, Python should perform specific function;\
    \ if the condition is false, Python should perform other functions.\n\n```\n>>>\
    \ print(\"Want to hear a dirty joke?\")\nWant to hear a dirty joke?\n>>> age =\
    \ 12\n>>> if age == 12:\n        print(\"A pig fell in the mud!\")\n    else:\n\
    \        print(\"Shh. It's a secret.\")\nA pig fell in the mud!\n```\n\nSince\
    \ the value of the age variable is 12 and the condition is to check if the value\
    \ of the age variable is equal to 12, you will see the first print message on\
    \ your screen. You should now try to change the value of the age to any number\
    \ other than 12.\n\n```\n>>> print(\"Want to hear a dirty joke?\")\nWant to hear\
    \ a dirty joke?\n>>> age = 8\n>>> if age == 12:\n        print(\"A pig fell in\
    \ the mud!\")\n    else:\n        print(\"Shh. It's a secret.\")\nShh. It's a\
    \ secret.\n```\n\nYou will now see the second print on your system.\n\n### If\
    \ and Elif Statements\n\nYou can extend the **if statement** using an **elif statement**.\
    \ Elif is short for else-if. For instance, you can check if a person’s age is\
    \ 10, 11 or 12. You can also make the system perform different actions based on\
    \ the answer provided. It is important to remember that the if and elif statements\
    \ are different from the if-then-else statements since you can include numerous\
    \ elifs within the code.\n\n```\n>>> age = 12\n>>> if age == 10:\n        print(\"\
    What do you call an unhappy cranberry?\")\n        print(\"A blueberry!\")\n \
    \   elif age == 11:\n        print(\"What did the green grape say to the blue\
    \ grape?\")\n        print(\"Breathe! Breathe!\")\n    elif age == 12:\n     \
    \   print(\"What did 0 say to 8?\")\n        print(\"Hi guys!\")\n    elif age\
    \ == 13:\n        print(\"Why wasn't 10 afraid of 7?\")\n        print(\"Because\
    \ rather than eating 9, 7 ate pi.\")\n    else:\n        print(\"Huh?\")\nWhat\
    \ did 0 say to 8? Hi guys!\n```"
  mdcn: "## 你学到了什么\n\n本章阐明了如何在Python中使用turtle模块。我们学习了使用右转、左转、前进和后退命令来绘制一些图形。你还学会了如何指示海龟使用down命令开始绘制，以及使用up命令停止绘制。最后，你明白了海龟使用度数来确定转向的方向。\n\
    \n## 第八章 提出正确的问题\n\n在编程中，我们通常倾向于提出是或否的问题，而执行的操作则基于给出的答案。这些问题被称为条件。条件和响应组合在一起形成**if语句**。条件可以比单个问题更复杂；if语句也可以与多个问题及其响应相结合。重要的是要记住，一个问题可以有多个响应。\n\
    \n本章将帮助你进一步了解如何使用if语句来构建程序。\n\n### If语句\n\nif语句包含‘if’关键字、一个条件和一个冒号。冒号后面的代码行应始终位于一个代码块内；如果答案为是，则代码块内的命令将运行。现在让我们看看如何编写命令和代码块。\n\
    \n### 语句块\n\n代码块是编程语句的集合。\n\n在上面的代码块中，有三个print语句，如果条件成立，这些语句就会运行。在if语句之后的每一行代码开头之前，总是有四个空格（用□□□□表示）。\n\
    \n在Python中，你可以通过按空格键或制表键来输入空白字符。这些空格具有意义，有助于你区分代码的不同部分。当你输入没有任何缩进的代码时，你永远无法识别特定代码块的开始位置。如果你使用缩进，将更容易理解你编写的程序。\n\
