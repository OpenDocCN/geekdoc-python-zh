- md: '## Operators


    A few special keyboard characters are used as operators in programming to denote
    frequent mathematical operations like addition, subtraction, comparing two numeric
    values, and many such operations. Calculation-based activities are very much common
    in our daily routine.


    ### Arithmetic Operators


    | Operator | Description | Purpose | Coding Expression |

    | :--- | :--- | :--- | :--- |

    | + | Addition | Addition of **intNum1** and **intNum2**. | **intNum1 + intNum2**
    |

    | - | Subtraction | Subtraction between **intNum1** and **intNum2**. | **intNum1
    - intNum2** |

    | * | Multiplication | Multiplying **intNum1** and **intNum2**. | **intNum1 *
    intNum2** |

    | ** | Exponentiation | **intNum1** raised to the power of **intNum2**. | **intNum1
    ** intNum2** |

    | / | Division | Quotient value when intNum1 is divided by intNum2. | **intNum1
    / intNum2** |

    | // | Floor Division | Quotient value **without decimal values** when **intNum1**
    is divided by **intNum2**. | **intNum1 // intNum2** |

    | % | Modulus | Remainder value when **intNum1** is divided by **intNum2**. |
    **intNum1 % intNum2** |


    **Example 1.** Demonstrate given basic arithmetic operations using arithmetic
    operators.


    ```

    intNum1 = 6

    intNum2 = 4


    intNum1 + intNum2 = 10


    intNum1 - intNum2 = 2


    intNum1 * intNum2 = 24


    intNum1 ** intNum2 = 1296


    intNum1 / intNum2 = 1.5


    intNum1 // intNum2 = 1


    intNum1 % intNum2 = 2

    ```


    ```

    ArithmeticOperations.py

    intNum1 = 6

    intNum2 = 4


    print(''intNum1 = '', intNum1 )

    print(''intNum2 = '', intNum2 )


    result = intNum1 + intNum2

    print(''intNum1 + intNum2 ='',result)


    result = intNum1 - intNum2

    print(''intNum1 - intNum2 ='',result)


    result = intNum1 * intNum2

    print(''intNum1 * intNum2 ='',result)


    result = intNum1 ** intNum2

    print(''intNum1 ** intNum2 ='',result)


    result = intNum1 / intNum2

    print(''intNum1 / intNum2 ='',result)


    result = intNum1 // intNum2

    print(''intNum1 // intNum2 ='',result)


    result = intNum1 % intNum2

    print(''intNum1 % intNum2 ='',result)

    ```


    ## Output


    ```

    intNum1 = 6

    intNum2 = 4


    intNum1 + intNum2 = 10


    intNum1 - intNum2 = 2


    intNum1 * intNum2 = 24


    intNum1 ** intNum2 = 1296


    intNum1 / intNum2 = 1.5


    intNum1 // intNum2 = 1


    intNum1 % intNum2 = 2

    ```


    **Exercise 2.** Print basic arithmetic operations in the given tabular form.

    Integer numbers: intNum1 = 6, intNum2 = 4


    | Operations | Operator | Expression | Result |

    | --- | --- | --- | --- |

    | Add | + | 6 + 4 | 10 |

    | Subtract | - | 6 - 4 | 2 |

    | Multiply | * | 6 * 4 | 24 |

    | Divide | / | 6 / 4 | 1.5 |

    | Remainder | % | 6 % 4 | 2 |


    ## Comparison Operators


    The comparison result of two values will either be **True** or **False**, and
    these values are also known as **boolean values or truth values**. This feature
    is very important since it will help make decisions as True or False. The computer
    memory is mainly based on 1(True) or 0(False) values, called **a bit value**.
    Every data in a computer is a combination of one’s and zero’s called bit pattern.


    **Unique value or data in a computer’s memory means a group of unique bit patterns.**


    | Operator | Comparison Operation Description |

    | --- | --- |

    | == | Equal |

    | != | Not Equal |

    | < | Less than |

    | <= | Less than or equal |

    | > | Greater than |

    | >= | Greater than or equal |


    Using comparison operators, we can compare two numeric values. The following example
    shows the use of comparison operators using numeric values.


    | Operator | Operand1(Operator) Operand2 | Result |

    | --- | --- | --- |

    | == | 4 == 4 | True |

    | | 4 == 10 | False |

    | != | 6 != 4 | True |

    | | 4 != 4 | False |

    | < | 6 < 10 | True |

    | | 6 < 6 | False |

    | <= | 6 <= 6 | True |

    | | 10 <= 6 | False |

    | > | 6 > 6 | False |

    | | 10 > 6 | True |

    | >= | 4 >= 6 | False |

    | | 10 >= 6 | True |


    We can also test the above results by storing the input values in variables and
    then applying comparison operators one by one. **Philosophically, True and False
    are the only two perfect answers in this world.** In a program, it requires us
    to do decision-making based on perfect answers. Developing logic based on operators
    is the need for the implementation of decision-making. It allows flexibility in
    handling different logical situations in a program. Sense and sensibility of applying
    logical conditions are one of the core aspects of any good programmer.


    **So please, invest quality time studying this topic with special attention.**


    Let’s verify the results using comparison operators on operands 4,6 and 10.


    ```

    ComparisonOperators.py

    four = 4

    six = 6

    ten = 10


    print("*** Comparison Operators ***")

    print()

    #equals to

    print("equal (  ==  )")

    print()

    isResult = (four  == four)

    print(four,"  ==  ",four,"  | ",isResult)


    isResult = (four  == ten)

    print(four,"  ==  ",ten,"  | ",isResult)

    print("--------------------------------------------------")


    #not equals to

    print("notequal ( !=  )")

    print()

    isResult = (four != four)

    print(four," !=  ",four,"  | ",isResult)


    isResult = (four != ten)

    print(four," !=  ",ten,"  | ",isResult)

    print("--------------------------------------------------")


    #less than

    print("less than ( < )")

    print()

    isResult = (six <six)

    print(six," <  ",six,"  | ",isResult)


    isResult = (six <ten)

    print(six," <  ",ten,"  | ",isResult)

    print("--------------------------------------------------")


    #less than or equals to

    print("less than or equal ( <=  )")

    print()

    isResult = (six <= six)

    print(six,"  <=  ",six,"  | ",isResult)


    isResult = (ten <= six)

    print(ten,"  <=  ",six,"  | ",isResult)

    print("--------------------------------------------------")


    #greater than

    print("greater than ( > )")

    print()

    isResult = (six >six)

    print(six,"  >  ",six,"  | ",isResult)


    isResult = (ten >six)

    print(ten," > ",six," | ",isResult)

    print("--------------------------------------------------")


    #greater than or equal

    print("greater than or equal ( >= )")

    print()

    isResult = (six >= six)

    print(six," >= ",six," | ",isResult)


    isResult = (six >= ten)

    print(six," >= ",ten," | ",isResult)

    print("--------------------------------------------------")

    ```


    ## Output


    ```

    *** Comparison Operators ***


    equal ( == )


    4 == 4 | True

    4 == 10 | False

    --------------------------------------------------

    notequal ( != )


    4 != 4 | False

    4 != 10 | True

    --------------------------------------------------

    less than ( < )


    6 < 6 | False

    6 < 10 | True

    --------------------------------------------------

    less than or equal ( <= )


    6 <= 6 | True

    10 <= 6 | False

    --------------------------------------------------

    greater than ( > )


    6 > 6 | False

    10 > 6 | True

    --------------------------------------------------

    greater than or equal ( >= )


    6 >= 6 | True

    6 >= 10 | False

    --------------------------------------------------

    ```


    ## Logical Operators


    It also returns an ultimate value in either **True** or **False** similar to expression
    evaluation in comparison operator. It is primarily used to chain many logical
    expressions based on comparison operators. Following are types of logical operator’s
    name and their respective symbol.


    1) Logical AND ( **and** ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 2)
    Logical OR ( **or** ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 3) Logical
    NOT ( **not** )


    1) **Logical AND**: Returns **True** if and only if the result of **both logical
    expressions A and B are True** else False. The more we use this operator in a
    logical expression, the lesser the size of the data set we get out of total data.
    It is usually applied in a situation to get specific data or data of lesser range
    or size. Let’s suppose there are two integer variables, month = 10 and days =
    5. Please observe the column “**Result.**”


    | A | B | A and B | A | B | A and B = Result |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) and (True)
    = True |

    | True | False | False | month > 7 (True) | days > 7 (False) | (True) and (False)
    = False |

    | False | True | False | month < 10 (False) | days < 7 (True) | (False) and (True)
    = False |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) and
    (False) = False |


    2) **Logical OR**: Returns **False** if and only if when the result of **both
    logical expressions A and B are False** else True. The more we add OR condition
    using this operator in a logical expression, the more it increases the size of
    data as an output result. So, it is used to get a broader range of data. Let’s
    suppose there are two integer variables, month = 10 and days = 5. Please observe
    the column “**Result.**”


    | A | B | A or B | A | B | A or B = Result |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) or (True) =
    True |

    | True | False | True | month > 7 (True) | days > 7 (False) | (True) or (False)
    = True |

    | False | True | True | month < 10 (False) | days < 7 (True) | (False) or (True)
    = True |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) or (False)
    = False |


    3) **Logical NOT**: Returns just opposite, **True** when the outcome of the logical
    expression is False or returns False when the outcome of a logical expression
    is True.


    | A | not A |

    |---|---|

    | True | False |

    | False | True |


    **Please note that True/False values, also known as boolean values or truth values.**


    Usage of logical operators is quite common and plays a very important role in
    designing the logic of programs. Every programmer must and should have an obvious
    idea about the usage of these operators. It is worth the time spent if a beginner
    puts extra effort into experimenting with these operators.'
  mdcn: '## 运算符


    在编程中，一些特殊的键盘字符被用作运算符，以表示常见的数学运算，如加法、减法、比较两个数值以及许多其他运算。基于计算的活动在我们的日常生活中非常普遍。


    ### 算术运算符


    | 运算符 | 描述 | 用途 | 编码表达式 |

    | :--- | :--- | :--- | :--- |

    | + | 加法 | **intNum1** 与 **intNum2** 相加。 | **intNum1 + intNum2** |

    | - | 减法 | **intNum1** 与 **intNum2** 相减。 | **intNum1 - intNum2** |

    | * | 乘法 | **intNum1** 与 **intNum2** 相乘。 | **intNum1 * intNum2** |

    | ** | 幂运算 | **intNum1** 的 **intNum2** 次幂。 | **intNum1 ** intNum2** |

    | / | 除法 | intNum1 除以 intNum2 的商值。 | **intNum1 / intNum2** |

    | // | 整除 | **intNum1** 除以 **intNum2** 的商值，**不含小数部分**。 | **intNum1 // intNum2**
    |

    | % | 取模 | **intNum1** 除以 **intNum2** 的余数值。 | **intNum1 % intNum2** |


    **示例 1.** 使用算术运算符演示给定的基本算术运算。


    ```

    intNum1 = 6

    intNum2 = 4


    intNum1 + intNum2 = 10


    intNum1 - intNum2 = 2


    intNum1 * intNum2 = 24


    intNum1 ** intNum2 = 1296


    intNum1 / intNum2 = 1.5


    intNum1 // intNum2 = 1


    intNum1 % intNum2 = 2

    ```


    ```

    ArithmeticOperations.py

    intNum1 = 6

    intNum2 = 4


    print(''intNum1 = '', intNum1 )

    print(''intNum2 = '', intNum2 )


    result = intNum1 + intNum2

    print(''intNum1 + intNum2 ='',result)


    result = intNum1 - intNum2

    print(''intNum1 - intNum2 ='',result)


    result = intNum1 * intNum2

    print(''intNum1 * intNum2 ='',result)


    result = intNum1 ** intNum2

    print(''intNum1 ** intNum2 ='',result)


    result = intNum1 / intNum2

    print(''intNum1 / intNum2 ='',result)


    result = intNum1 // intNum2

    print(''intNum1 // intNum2 ='',result)


    result = intNum1 % intNum2

    print(''intNum1 % intNum2 ='',result)

    ```


    ## 输出


    ```

    intNum1 = 6

    intNum2 = 4


    intNum1 + intNum2 = 10


    intNum1 - intNum2 = 2


    intNum1 * intNum2 = 24


    intNum1 ** intNum2 = 1296


    intNum1 / intNum2 = 1.5


    intNum1 // intNum2 = 1


    intNum1 % intNum2 = 2

    ```


    **练习 2.** 以给定的表格形式打印基本算术运算。

    整数：intNum1 = 6, intNum2 = 4


    | 运算 | 运算符 | 表达式 | 结果 |

    | --- | --- | --- | --- |

    | 加法 | + | 6 + 4 | 10 |

    | 减法 | - | 6 - 4 | 2 |

    | 乘法 | * | 6 * 4 | 24 |

    | 除法 | / | 6 / 4 | 1.5 |

    | 余数 | % | 6 % 4 | 2 |


    ## 比较运算符


    两个值的比较结果将是 **True** 或 **False**，这些值也被称为**布尔值或真值**。这个特性非常重要，因为它将帮助我们做出 True 或 False
    的决策。计算机内存主要基于 1(True) 或 0(False) 的值，称为**位值**。计算机中的每个数据都是由 1 和 0 组合而成的，称为位模式。


    **计算机内存中的唯一值或数据意味着一组唯一的位模式。**


    | 运算符 | 比较运算描述 |

    | --- | --- |

    | == | 等于 |

    | != | 不等于 |

    | < | 小于 |

    | <= | 小于或等于 |

    | > | 大于 |

    | >= | 大于或等于 |


    使用比较运算符，我们可以比较两个数值。以下示例展示了使用数值进行比较运算符的用法。


    | 运算符 | 操作数1(运算符) 操作数2 | 结果 |

    | --- | --- | --- |

    | == | 4 == 4 | True |

    | | 4 == 10 | False |

    | != | 6 != 4 | True |

    | | 4 != 4 | False |

    | < | 6 < 10 | True |

    | | 6 < 6 | False |

    | <= | 6 <= 6 | True |

    | | 10 <= 6 | False |

    | > | 6 > 6 | False |

    | | 10 > 6 | True |

    | >= | 4 >= 6 | False |

    | | 10 >= 6 | True |


    我们也可以通过将输入值存储在变量中，然后逐一应用比较运算符来测试上述结果。**从哲学上讲，True 和 False 是这个世界上仅有的两个完美答案。** 在程序中，它要求我们基于完美答案进行决策。基于运算符开发逻辑是实现决策所必需的。它允许在处理程序中的不同逻辑情况时具有灵活性。应用逻辑条件的感知和敏感性是任何优秀程序员的核心方面之一。


    **因此，请投入高质量的时间，特别注意地学习这个主题。**


    让我们使用比较运算符对操作数 4、6 和 10 验证结果。


    ```

    ComparisonOperators.py

    four = 4

    six = 6

    ten = 10


    print("*** Comparison Operators ***")

    print()

    #equals to

    print("equal (  ==  )")

    print()

    isResult = (four  == four)

    print(four,"  ==  ",four,"  | ",isResult)


    isResult = (four  == ten)

    print(four,"  ==  ",ten,"  | ",isResult)

    print("--------------------------------------------------")


    #not equals to

    print("notequal ( !=  )")

    print()

    isResult = (four != four)

    print(four," !=  ",four,"  | ",isResult)


    isResult = (four != ten)

    print(four," !=  ",ten,"  | ",isResult)

    print("--------------------------------------------------")


    #less than

    print("less than ( < )")

    print()

    isResult = (six <six)

    print(six," <  ",six,"  | ",isResult)


    isResult = (six <ten)

    print(six," <  ",ten,"  | ",isResult)

    print("--------------------------------------------------")


    #less than or equals to

    print("less than or equal ( <=  )")

    print()

    isResult = (six <= six)

    print(six,"  <=  ",six,"  | ",isResult)


    isResult = (ten <= six)

    print(ten,"  <=  ",six,"  | ",isResult)

    print("--------------------------------------------------")


    #greater than

    print("greater than ( > )")

    print()

    isResult = (six >six)

    print(six,"  >  ",six,"  | ",isResult)


    isResult = (ten >six)

    print(ten," > ",six," | ",isResult)

    print("--------------------------------------------------")


    #greater than or equal

    print("greater than or equal ( >= )")

    print()

    isResult = (six >= six)

    print(six," >= ",six," | ",isResult)


    isResult = (six >= ten)

    print(six," >= ",ten," | ",isResult)

    print("--------------------------------------------------")

    ```


    ## 输出


    ```

    *** Comparison Operators ***


    equal ( == )


    4 == 4 | True

    4 == 10 | False

    --------------------------------------------------

    notequal ( != )


    4 != 4 | False

    4 != 10 | True

    --------------------------------------------------

    less than ( < )


    6 < 6 | False

    6 < 10 | True

    --------------------------------------------------

    less than or equal ( <= )


    6 <= 6 | True

    10 <= 6 | False

    --------------------------------------------------

    greater than ( > )


    6 > 6 | False

    10 > 6 | True

    --------------------------------------------------

    greater than or equal ( >= )


    6 >= 6 | True

    6 >= 10 | False

    --------------------------------------------------

    ```


    ## 逻辑运算符


    它也返回一个最终值，要么是 **True** 要么是 **False**，类似于比较运算符中的表达式求值。它主要用于将基于比较运算符的多个逻辑表达式链接起来。以下是逻辑运算符的名称及其各自的符号。


    1) 逻辑与 ( **and** ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 2) 逻辑或 ( **or**
    ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 3) 逻辑非 ( **not** )


    1) **逻辑与**：当且仅当**逻辑表达式 A 和 B 的结果都为 True** 时返回 **True**，否则返回 False。我们在逻辑表达式中使用此运算符越多，从总数据中得到的数据集大小就越小。它通常应用于获取特定数据或范围或大小较小的数据的情况。假设有两个整数变量，month
    = 10 和 days = 5。请注意“**结果**”列。


    | A | B | A and B | A | B | A and B = 结果 |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) and (True)
    = True |

    | True | False | False | month > 7 (True) | days > 7 (False) | (True) and (False)
    = False |

    | False | True | False | month < 10 (False) | days < 7 (True) | (False) and (True)
    = False |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) and
    (False) = False |


    2) **逻辑或**：当且仅当**逻辑表达式 A 和 B 的结果都为 False** 时返回 **False**，否则返回 True。我们在逻辑表达式中使用此运算符添加的
    OR 条件越多，输出结果的数据规模就越大。因此，它用于获取更广泛范围的数据。假设有两个整数变量，month = 10 和 days = 5。请注意“**结果**”列。


    | A | B | A or B | A | B | A or B = 结果 |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) or (True) =
    True |

    | True | False | True | month > 7 (True) | days > 7 (False) | (True) or (False)
    = True |

    | False | True | True | month < 10 (False) | days < 7 (True) | (False) or (True)
    = True |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) or (False)
    = False |


    3) **逻辑非**：返回相反的结果，当逻辑表达式的结果为 False 时返回 **True**，或者当逻辑表达式的结果为 True 时返回 False。


    | A | not A |

    |---|---|

    | True | False |

    | False | True |


    **请注意，True/False 值也被称为布尔值或真值。**


    逻辑运算符的使用非常普遍，在设计程序逻辑中扮演着非常重要的角色。每个程序员都必须并且应该对这些运算符的用法有清晰的认识。如果初学者投入额外精力去试验这些运算符，那么所花的时间是值得的。'
