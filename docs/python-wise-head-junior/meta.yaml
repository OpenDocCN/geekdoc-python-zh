    # Convert Simple Picture to Logical Conditions


    We will do some exercises by trying to get logical conditions from an English
    alphabet of very simple nature drawn using * character. We may consider 7 rows
    and 5 columns box. We have to select only those pairs of (row, col) values, which
    are helpful to make a required alphabet. We will be putting logical conditions
    only for those (row, col) value pairs matching * characters.


    **ExerciseYBA: Alphabet A needs to be fit in a 7X5 box.**


    ![](img/19247dc2edd12faecc2f050f298887d0_59_0.png)


