    ## Cursor Movement


    A moving position indicator, shown on a computer monitor where the next move or
    operation will occur. We will use this concept to explain better how each character
    of a pattern got generated on the computer screen or console screen of the programming
    IDE. In our case, keyboard characters are to be outputted using inbuilt libraries
    onto the computer screen at specific locations. So, the cursor moves to the next
    position on the screen, and then the printing of the character will be taken care
    of by inbuilt methods.


    ## Pattern 1A


    Our programming job is to print this particular logic-based pattern on one part
    of the computer screen. **Our approach will assume that the computer screen is
    a combination of rows and columns, virtually dividing it into smaller boxes**
    —the smallest box treated as a resident of just a single character only. Thus,
    the address in each smallest box on the display screen will logically become a
    unique **(row, column)** numeric combination. With this assumption, the computer
    screen will simply be a unique combination of (row, column) numeric value paired
    boxes that are uniformly spread across the screen.


    ![](img/19247dc2edd12faecc2f050f298887d0_97_0.png)


    ## Data Representation


