    \ col 的最大限制值上有所不同。因此，最好将变量 col 的最大限制捕获在一个不同的变量中。然后我们将能够仅使用一个内层 for 循环来完成整个列级重复。\n\
    \n让我们使用单个内层 for 循环更新之前的程序。\n\n## PatternG2.py\n\n```\ntotalRows = 5 # 要显示的行数\n\
