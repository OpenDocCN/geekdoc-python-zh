    The *upper_limit* value is based on how many times the value is repeated in a
    particular row.


    The **lower_limit** of col variable has the same numeric value expression for
    every value of the row. It''s consistent for all the rows.


    Likewise, we need to develop such a consistent expression for **upper_limit**,
    which should suit any number of rows.


    The other remaining variables are row & totalRows=5. Let''s try to generalize
    using these variables.


    For all the rows, the row value prints exactly the number of times the upper_limit
    of col value.


    | Column level Repetitive Action | | | |

    | :--- | :--- | :--- | :--- |

