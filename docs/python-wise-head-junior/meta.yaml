  md: '# Pattern1E


    Our programming job is to print this particular logic-based pattern on one part
    of the computer screen. Our approach will assume that the computer screen is a
    combination of rows and columns, virtually dividing it into smaller boxes—the
    smallest box treated as a resident of just a single character only. The address
    in each smallest box on the display screen will logically become a unique **(row,
    column)** numeric combination. The computer screen will simply become a unique
    combination of **(row, column)** numeric value paired boxes that are spread uniformly
    all over the screen.


    ![](img/19247dc2edd12faecc2f050f298887d0_146_0.png)


    # Data Representation


    Although logically, we can exactly locate the position of each printable character
    on the display screen by knowing it''s uniquely identifiable **(row, column)**
    numeric paired-values. For example; **(2, 4)** means character "*" at **2nd row**
    and **4th column** in the pattern.


    > The given set of row and col value pairs tries to mimic the location of each
    printable character of a given pattern on the device''s display screen. The set
    of all value pairs (row = value, col = value) represent this particular pattern.


    | Row, Col | Col = 1 | Col = 2 | Col = 3 | Col = 4 | Col = 5 | Col = 6 | Col =
    7 | Col = 8 | Col = 9 |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | Row = 1 | | | | | *(1, 5)* | | | | |

    | Row = 2 | | | | *(2, 4)* | *(2, 5)* | *(2, 6)* | | | |

    | Row = 3 | | | *(3, 3)* | *(3, 4)* | *(3, 5)* | *(3, 6)* | *(3, 7)* | | |

    | Row = 4 | | *(4, 2)* | *(4, 3)* | *(4, 4)* | *(4, 5)* | *(4, 6)* | *(4, 7)*
    | *(4, 8)* | |

    | Row = 5 | *(5, 1)* | *(5, 2)* | *(5, 3)* | *(5, 4)* | *(5, 5)* | *(5, 6)* |
    *(5, 7)* | *(5, 8)* | *(5, 9)* |


    Space is also a character like any other character. If a non-space character or
    a text is displayed on the screen after a blank area or gap, it means single or
    that many space characters have to be printed before printing any other non-space
    character(s).'
