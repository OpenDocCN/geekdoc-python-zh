    | 3 | 1 | 1 | totalRows - row | totalRows + row | ******* |

    | 4 | 0 | 0 | totalRows - row | totalRows + row | ********* |


    条件 (col >= (**totalRows – row**)) 给出了最小限制。这个特定的逻辑表达式将计算一个起始点，从该点开始打印星号（“*”）字符，直到
    **变量：col** 的最大值，该最大值将被计算为 (**totalRows + row**)。

    然后，可以在给定的值范围之间给出 **if条件**：


    (totalRows - row ) 和 (totalRows + row)。


    应用比较和逻辑运算符后，**if条件** 可以写为：


    If ( col >= ( **totalRows - row** ) and col <= ( **totalRows + row**) )


