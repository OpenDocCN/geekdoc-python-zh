    Part of the **min_val** and **max_val** expression both follows the same numeric
    pattern. We can consider this as a separate integer variable, and let’s name it
    as <u>count</u>.

    Then the logical expression can be expressed in terms of **totalRows** and count.


    | Row level Repetitive Action | | |

    | :--- | :--- | :--- |

    | Variable: row | Variable: count | Column level Repetitive Action | |

    | | | Variable: col (Printing star characters) | |

    | | | min_val | max_val |

    | 1 | 0 | 5 | totalRows -count | 5 | totalRows + count |

    | 2 | 1 | 4 | totalRows -count | 6 | totalRows + count |

    | 3 | 2 | 3 | totalRows -count | 7 | totalRows + count |

    | 4 | 3 | 2 | totalRows -count | 8 | totalRows + count |

    | 5 | 4 | 1 | totalRows -count | 9 | totalRows + count |

    | 6 | 3 | 2 | totalRows -count | 8 | totalRows + count |

    | 7 | 2 | 3 | totalRows -count | 7 | totalRows + count |

    | 8 | 1 | 4 | totalRows -count | 6 | totalRows + count |

    | 2*totalRows - 1 | 0 | 5 | totalRows -count | 5 | totalRows + count |


    The variable <u>count</u> starts to increase by value 1 from the start of the
    row=1 till the row=**totalRows** (**total number of rows**) and then starts decreases
    further by value 1 till (**totalRows** – 1) times.


    We can deal with this using an if-else conditional statement.

    The condition (col >=( **totalRows** – count ) ) gives starting point from which
    *for-loop* will start printing star(“*”) character(s) till the maximum value of
    variable col, which is (**totalRows** + count) for every value of the row. The
    **if-condition** can be given using the <u>comparison and logical operators</u>
    for the range of values between (**totalRows** – count) and (**totalRows** + count)
    as:

    If ( col >= (**totalRows** – count ) and col <= ( **totalRows** + count ) )


