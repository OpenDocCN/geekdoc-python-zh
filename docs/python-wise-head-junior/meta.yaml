    | 1 | 1 | 4 | 5 | 5 | * |

    | 2 | 1 | 3 | 4 | 6 | * * * |

    | 3 | 1 | 2 | 3 | 7 | * * * * * |

    | 4 | 1 | 1 | 2 | 8 | * * * * * * * |

    | 5 | 0 | 0 | 1 | 9 | * * * * * * * * * |


    我们知道 **totalRows = 5**（总行数）。让我们尝试使用变量 **totalRows** 来泛化变量 **col** 的列 **min_val**
    和 **max_val**。此外，我们需要将行值从0到4开始，而不是从1到5。这是为了匹配 **变量：col** 的列 **min_val** 和 **max_val**
    表达式的部分。


    | 行级重复操作 | 预期输出 |

    | :--- | :--- |

    | **变量：row** | **列级重复操作** | | | | |

    | | **变量：spaces** | | **变量：col** | | |

    | | **min_val** | **max_val** | **min_val** | **max_val** | |

    | 0 | 1 | 4 | totalRows - 0 | totalRows + 0 | * |

    | 1 | 1 | 3 | totalRows - 1 | totalRows + 1 | *** |

    | 2 | 1 | 2 | totalRows - 2 | totalRows + 2 | ***** |

    | 3 | 1 | 1 | totalRows - 3 | totalRows + 3 | ******* |

    | 4 | 0 | 0 | totalRows - 4 | totalRows + 4 | ********* |


    使用变量 **row** 来泛化变量 **col** 的列 **min_val** 和 **max_val**。


    | 行级重复操作 | 预期输出 |

    | :--- | :--- |

    | **变量：row** | **列级重复操作** | | | | |

    | | **变量：spaces** | | **变量：col** | | |

    | | **min_val** | **max_val** | **min_val** | **max_val** | |

    | 0 | 1 | 4 | totalRows - row | totalRows + row | * |

    | 1 | 1 | 3 | totalRows - row | totalRows + row | *** |

