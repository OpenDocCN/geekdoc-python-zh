  md: "Let's execute the following program.\n\n```\nPatternG1.py\n```\n\n```\ntotalRows\
    \ = 5 # number of rows to display\n\n# Row level Repetitive Action :\n# Action1.\
    \ Executes Column level Repetitive Action:\n# Action2.Move control of a program\
    \ to the next row\n#         to set the ground for printing characters column-wise.\n\
    for row in range(1,2 * totalRows):\n\n    # Column level Repetitive Action :\n\
    \    # Print characters column-wise or in the same row\n    if (row <= totalRows):\n\
    \        # inner for-loop_1:prints star * character\n        for col in range(1,\
    \ row + 1):\n            print(\"* \",end = \"\")\n\n    else:\n        # inner\
    \ for-loop_2:prints space character\n        for col in range(1,(2 * totalRows\
    \ - row) + 1):\n            print(\"* \",end = \"\")\n\n    # move control of\
    \ a program to the next row\n    # in order to switch the printing of characters\
    \ to the next line.\n    print()\n```\n\n```\nOutput\n```\n\n```\n*\n* *\n* *\
    \ *\n* * * *\n* * * * *\n* * * *\n* * *\n* *\n*\n```\n\nThe inner for-loop_1 and\
    \ inner for-loop_2 differ only in the maximum limit value of the col variable.\
    \ Therefore, it will be better if we capture the maximum limit of the col variable\
