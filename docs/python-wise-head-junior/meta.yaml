  md: "*ProblemLadderIfElse*: A college came up with an idea to encourage CS students\
    \ by refunding some percentage of their bi-semester CS Course fees. College management\
    \ laid the following conditions to be eligible for the same. Moreover, if a student\
    \ scored in Grade-0, they will be declared failed.\nIf a student scored in Grade-5,\
    \ they would be eligible for a 35% refund of the college fees.\nIf a student scored\
    \ in Grade-4, they would be eligible for a 25% refund of the college fees.\nIf\
    \ a student scored in Grade-3, they would be eligible for a 20% refund of the\
    \ college fees.\nIf a student scored in Grade-2, they would be eligible for a\
    \ 10% refund of the college fees.\nIf a student scored in Grade-1, they would\
    \ be passed with a margin.\n\n```\nLadderIfElse.py\ngrade = 6\nif grade == 1:\n\
    \    print(\"35% fee refund.\")\nelif grade == 2:\n    print(\"25% fee refund.\"\
    )\nelif grade == 3:\n    print(\"20% fee refund.\")\nelif grade == 4:\n    print(\"\
    10% fee refund.\")\nelif grade == 5:\n    print(\"Passed with margin.\")\nelif\
    \ grade == 0:\n    print(\"Failed,please retry.\")\nelse:\n    print(\"Invalid\
    \ grade ? \" , grade)\n```\n\nIt’s going to test **if-conditions** sequence-wise\
    \ unless and until any one of the **if-condition** becomes **True**. This type\
    \ of many `elif` is also called a **ladder else-if**, which is basically not a\
    \ good practice. Two or three **elif conditions** are considered okay, and furthermore,\
    \ **elif conditions** are strongly discouraged as it reduces the code readability.\n\
    **Then what is the way out?**\nThe answer is implementing a **switch-case** construct.\
    \ We use Python’s built-in dictionary construct that performs mapping between\
    \ grade value and respective printing message. Dictionary basically is a collection\
    \ of key-value pairs.\n\n| Grade (key) | Printing Message(value as string) | Dictionary\
    \ Example |\n| :--- | :--- | :--- |\n| **Mapping 0 →** | \"Failed,please retry.\"\
    \ | grade_message = 0:\"Failed,please retry.\", |\n| **Mapping 1 →** | \"35% fee\
    \ refund.\" | 1:\"35% fee refund.\", |\n| **Mapping 2 →** | \"25% fee refund.\"\
    \ | 2:\"25% fee refund.\" |\n| **Mapping 3 →** | \"20% fee refund.\" | 3:\"20%\
    \ fee refund.\", |\n| **Mapping 4 →** | \"10% fee refund.\" | 4:\"10% fee refund.\"\
    , |\n| **Mapping 5 →** | \"Passed with margin.\" | 5:\"Passed with margin.\" |\n\
    | **Mapping Other value→** | \"Invalid grade ?\" | |"
