- md: '## PART 1


    ## BASICS OF PROGRAMMING LOGIC


    ## Introduction


    Without a doubt, every subject has some key fundamental basis. If key concepts
    of any subject are truly internalized, then the rest of the learning will be productive.


    Many novice programmers and many frustrated programmers do ask similar kind of
    questions which are as follows


    “How to learn programming?”


    “How to develop logic-building skills?”


    “How to learn coding?”


    “How to improve programming logic?”


    Programming is an applied field. In my opinion, if a programmer who is weak in
    programming logic is not even a programmer. We know that complaining is the easiest
    job and if someone is an expert, they haven’t achieved anything big. So, whenever
    there is a problem, we need to think, “**what could be the easiest possible way
    out?**”


    In order to become confident in any programming language, the first step should
    be to gain some level of proficiency in self-hack programming logic. This technical
    manual is entirely dedicated to non-programmer/beginner or intermediate students
    who have reached a dead end while trying to become confident in programming. Additionally,
    if you are among those who have limited time to learn programming, this is the
    guide that can serve you well. **So, the rule of the thumb is that to learn programming
    language fast and properly, first learn the tactics of programming logic sufficiently.**


    ![](img/19247dc2edd12faecc2f050f298887d0_12_0.png)


    The most common mistake that many non-programmers/absolute beginners or trainers
    make is their focus on grammar/syntax and feature(s) of the programming language.
    Such a shallow outlook about programming language doesn’t help beginners much.
    Computer science is an applied field to solve practical problems. Therefore, it
    is a foremost and essential need that a beginner should be trained sufficiently
    in programming logic skills as the first priority. How appropriate physical exercises
    and healthy food tones the body muscles; similar is developing logical programming
    skills. It does need the right kind of logic-based programming exercises to groom
    visualization of programming logic.


    It also happens that a beginner may know almost all the programming language concepts
    but still feels something is missing. That missing element is due to insufficient
    logic-building capabilities. Without a comfortable level of logic-building skills,
    the beginner becomes stagnated, and, on top of that, they face a lot of confusion
    while developing programs.


    ## The Right Attitude


    > Failure taught me things about myself that I could have learned no other way.

    - J.K. Rowling


    By default, children are not afraid to be wrong, and so they are creative. It’s
    well-said that **hiding mistakes are a mistake of higher order**. So, it is always
    good to notice our mistakes as early as possible so that it shouldn’t give a hard
    blow in the future during the much-needed time. Experimenting and learning from
    mistakes work like a body detoxification program. Initially, any detoxification
    program doesn’t taste nice, but still, a person goes for it because they will
    love to see how the body will respond after 2-3 weeks. Anything new that we do
    take some practice. Everything valuable has a cost associated with it. Failures
    are one such type of cost that is to be paid to learn and to remember lessons.


    Getting accurate output after executing a program is just a by-product. So, the
    total learning will be failures plus the success part. So we need to think in
    this way; more initial failures will help us reduce the chances of failures in
    the future instead of thinking that we are not good learners. When a learner knowingly
    or unknowingly applies mismatching logical conditions, they may encounter unexpected
    output. This, in turn, creates curiosity about which specific logical condition
    is impacting the output differently. It’s easy for a brain to remember surprises.
    Moreover, a picture helps the brain remember more than the flowing texts, let
    it be any fact or concept. So, it’s much useful if a learner experiments with
    a weird or with some typical logical conditions and tries to find the reasons
    behind it. This will work like a self-motivating exercise, and it simply creates
    the urge to learn more.


    We all have hidden potential, and it is up to us to explore ourselves. You are
    the only person who can explore your hidden potential by taking challenges by
    experimenting with your capabilities. However, unless and until you take this
    journey of challenges, you will not know the **actual YOU**, or you will remain
    rather somebody else, a common class. *So you, I, and everybody* had to do this
    exercise of a treasure hunt within ourselves.


    It is all about the game of attitude and applying our actions in trying for excellence.
    We need to bounce back repetitively with another honest attempt. One of the main
    aims of this guide is to ignite the thought process and develop a natural tendency
    to solve problems by touching bare minimal technical details. We know that attitude
    measures altitude. The right intention gives a lot of power to manage even tough
    tasks with confidence. It is all about the perspective, the way we think, and
    approach the situation accordingly.


    ## The Clarity Principles


    Let’s help ourselves by putting these principles as our reminders. We must keep
    reminding ourselves, the important key values that help to cleanse our subconscious
    mind. Definitely, there are benefits in reminders, so give reminders to others
    or our-self.


    > You can’t manage what you can’t measure.


    - Peter Drucker


    > Science is simply common sense at its best, that is, rigidly accurate in observation,
    and merciless to fallacy in logic.


    - Thomas Huxley


    > Most of man''s problems upon this planet, in the long history of the race, have
    been met and solved either partially or as a whole by experiment based on common
    sense and carried out with courage.


    - Frances Perkins


    > I read, I study, I examine, I listen, I think, and out of all this I try to
    form an idea into which I put as much common sense as I can.


    - Marquis de Lafayette


    > Common sense is calculation applied to life.


    - Henri-Frédéric Amiel


    The most important aspect of calculation or measurement is that it gives clarity.
    We will try to tap this “clarity” factor to get the hidden programming logic right
    using the logic trace table. All learning covered by this guide majorly revolves
    around the concept of a logic trace table. In the section Programming Patterns,
    its practice is dealt with in greater detail. We can’t expect quality software
    without quality programs. Good programming logic is one of the essential qualities
    to write error-free programs and quality software.


    ## Any pre-requisite?


    The intention is to give an honest try to learn programming. No prior experience
    in a programming language is required. If you have any, it is good, and this is
    optional as we are not dealing with much of the syntactical technical matter.
    We only need very minimal language features to practice programming exercises
    to cultivate interest and confidence in programming. We are majorly dealing with
    two main technical concepts.


    - a) Conditional statements (If-statement, if-else statement)

    - b) Looping construct— just *for-loop*.


    Programming syntax of conditional statements and looping of many programming languages
    have many things in common. By learning from this book, anyone can easily experiment
    in other programming languages of their interest. The major emphasis is on learning
    the approach, not the syntax. One of the common qualities of highly successful
    people is as soon as they acquire information, their speed of implementation is
    very fast. This quality helps them to stay ahead in the competition. **The best
    thing to compete with anyone is to compete with ourselves and always try to break
    our own record.**


    ## About the book


    All the material presented here is only meant for action, a practical to-do session.
    We are not covering as a language but programming logic as a subject using programming
    language’s syntax. This book is not a product of guesswork. This book is the outcome
    of experiments conducted among college students to improve their logic-building
    skills or to learn programming from scratch but in a quick way.


    The learner has to practice the approach mentioned in the book for logic-building
    skills related to 2-dimensional simple picture-based exercises. Practice exercises
    arranged in an increasingly challenging way motivates you to refine programming
    skills continuously in a step-by-step manner. The solved exercises give a complete
    idea, and unsolved problems urge applying the logical concept. So, it is going
    to be **YOU versus YOU** in an interesting way.


    Two major requirements expected from every learner are as follows:


    - a) Intention that you want to learn programming

    - b) You need to spend some time consistently, and it depends on how quickly you
    want to become a confident programmer. **Don’t break the learning pattern for
    at least 3 months; spend at least a minimum of 20 – 30 minutes daily.** Just follow
    the mentioned course of action step by step; you will surely get a substantial
    grip on the programming.


    It’s up to you afterward to explore new horizons in programming or software development.
    I can only promise an excellent start in a short time regarding your journey of
    learning programming logic. **So, let’s start the journey of learning.**'
  mdcn: '## 第一部分


    ## 编程逻辑基础


    ## 引言


    毫无疑问，每个学科都有一些关键的基础。如果任何学科的关键概念被真正内化，那么后续的学习将会事半功倍。


    许多初学者程序员和许多感到挫败的程序员确实会问类似的问题，如下所示：


    “如何学习编程？”


    “如何培养逻辑构建能力？”


    “如何学习编码？”


    “如何提高编程逻辑？”


    编程是一个应用领域。在我看来，一个编程逻辑薄弱的程序员甚至不能算是程序员。我们知道抱怨是最容易的事情，如果一个人只是抱怨，那他并没有取得什么大的成就。所以，每当遇到问题时，我们需要思考，“**最简单的解决方法可能是什么？**”


    为了在任何编程语言中建立自信，第一步应该是达到一定程度的自我编程逻辑掌握能力。这本技术手册完全致力于帮助非程序员/初学者或中级学生，他们在试图建立编程自信时遇到了瓶颈。此外，如果你是那些学习编程时间有限的人之一，这本指南会对你很有帮助。**因此，经验法则是：要快速且正确地学习编程语言，首先要充分学习编程逻辑的策略。**


    ![](img/19247dc2edd12faecc2f050f298887d0_12_0.png)


    许多非程序员/绝对初学者或培训师最常犯的错误是他们只关注编程语言的语法/语法和功能。这种对编程语言的肤浅看法对初学者帮助不大。计算机科学是解决实际问题的应用领域。因此，首要且必要的需求是，初学者应优先接受充分的编程逻辑技能训练。就像适当的体育锻炼和健康饮食能强健身体肌肉一样，培养逻辑编程技能也需要正确的基于逻辑的编程练习来塑造编程逻辑的可视化能力。


    有时，初学者可能几乎了解所有编程语言概念，但仍然感觉缺少了什么。这种缺失是由于逻辑构建能力不足造成的。没有足够水平的逻辑构建技能，初学者就会停滞不前，而且，在开发程序时还会面临很多困惑。


    ## 正确的态度


    > 失败教会了我关于自己的事情，这些事情我无法通过其他方式学到。

    - J.K. 罗琳


    孩子们天生不怕犯错，因此他们富有创造力。有句话说得好，“**隐藏错误是更高层次的错误**”。所以，尽早发现我们的错误总是好的，这样在未来关键时刻才不会受到沉重打击。从错误中实验和学习就像身体排毒程序。起初，任何排毒程序都不好受，但人们还是会去做，因为他们想看看2-3周后身体会有什么反应。我们做的任何新事情都需要练习。一切有价值的东西都有其代价。失败就是这种代价之一，是为了学习和记住教训而必须支付的。


    执行程序后获得准确输出只是一个副产品。因此，整个学习过程包括失败和成功两部分。所以我们需要这样思考：更多的初始失败将有助于我们减少未来失败的机会，而不是认为我们不是好的学习者。当学习者有意或无意地应用不匹配的逻辑条件时，他们可能会遇到意外的输出。这反过来又引发了对哪个特定逻辑条件对输出产生不同影响的好奇心。大脑很容易记住惊喜。此外，图片比流动的文字更能帮助大脑记忆，无论是事实还是概念。因此，如果学习者尝试一些奇怪或典型的逻辑条件并试图找出背后的原因，这将非常有用。这就像一种自我激励的练习，它能激发学习更多知识的欲望。


    我们都有隐藏的潜力，探索自己取决于我们自己。你是唯一一个可以通过挑战自己的能力来探索自己隐藏潜力的人。然而，除非你踏上这段挑战之旅，否则你不会知道**真实的你**，或者你将仍然是别人，一个普通的存在。*所以你、我以及每个人*都必须进行这种在自己内心寻宝的练习。


    这完全关乎态度的游戏以及我们为追求卓越而采取的行动。我们需要用另一次诚实的尝试反复反弹。本指南的主要目标之一是点燃思维过程，并通过触及最基本的技术细节来培养解决问题的自然倾向。我们知道态度决定高度。正确的意图赋予我们力量，即使面对艰巨任务也能自信应对。这完全关乎视角、我们的思维方式以及相应处理情况的方式。


    ## 清晰原则


    让我们把这些原则作为提醒来帮助自己。我们必须不断提醒自己那些有助于净化潜意识的重要关键价值观。提醒确实有好处，所以要提醒别人或我们自己。


    > 你无法管理你无法衡量的东西。

    - 彼得·德鲁克


    > 科学本质上就是最佳的常识，即在观察上严格准确，在逻辑谬误上毫不留情。

    - 托马斯·赫胥黎


    > 在人类漫长的种族历史中，人类在这个星球上的大部分问题，都是通过基于常识并以勇气执行的实验来部分或整体解决的。

    - 弗朗西斯·珀金斯


    > 我阅读，我研究，我检查，我倾听，我思考，在所有这些之后，我试图形成一个尽可能融入常识的想法。

    - 拉法耶特侯爵


    > 常识是应用于生活的计算。

    - 亨利-弗雷德里克·阿米尔


    计算或测量最重要的方面是它能带来清晰度。我们将尝试利用这种“清晰度”因素，通过逻辑追踪表来正确获取隐藏的编程逻辑。本指南涵盖的所有学习内容主要围绕逻辑追踪表的概念展开。在“编程模式”部分，其实践将得到更详细的探讨。没有高质量的程序，就无法期望有高质量的软件。良好的编程逻辑是编写无错误程序和高质量软件的基本素质之一。


    ## 有先决条件吗？


    目的是诚实地尝试学习编程。不需要任何编程语言的先前经验。如果你有，那很好，这是可选的，因为我们不涉及太多语法技术内容。我们只需要非常基本的语言特性来练习编程练习，以培养对编程的兴趣和信心。我们主要涉及两个主要技术概念。


    - a) 条件语句（If语句，if-else语句）

    - b) 循环结构——仅*for循环*。


    许多编程语言的条件语句和循环的编程语法有许多共同之处。通过本书的学习，任何人都可以轻松地在其他感兴趣的编程语言中进行实验。重点在于学习方法，而不是语法。高度成功人士的共同品质之一是，一旦获得信息，他们的实施速度非常快。这种品质帮助他们在竞争中保持领先。**与任何人竞争的最好方式是与自己竞争，并始终努力打破自己的记录。**


    ## 关于本书


    这里提供的所有材料都是为了行动，一个实践性的待办事项环节。我们不是作为一门语言来讲解，而是使用编程语言的语法作为主题来讲解编程逻辑。这本书不是猜测的产物。这本书是在大学生中进行实验的结果，旨在提高他们的逻辑构建能力或从零开始快速学习编程。


    学习者必须按照书中提到的方法进行练习，以培养与二维简单图片练习相关的逻辑构建能力。以渐进挑战方式安排的练习激励你以循序渐进的方式不断完善编程技能。已解决的练习提供了完整的概念，而未解决的问题则促使应用逻辑概念。因此，这将是一场有趣的**你与你自己的对决**。


    对每个学习者的两个主要要求如下：


    - a) 你想学习编程的意愿

    - b) 你需要持续投入一些时间，这取决于你想多快成为一名自信的程序员。**至少3个月内不要中断学习模式；每天至少花费20-30分钟。** 只需按照提到的行动步骤逐步执行；你肯定会对编程有扎实的掌握。


    之后，探索编程或软件开发的新领域取决于你自己。我只能承诺在短时间内为你的编程逻辑学习之旅提供一个良好的开端。**那么，让我们开始学习之旅吧。**'
