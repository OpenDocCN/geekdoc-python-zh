    # counter : An integer variable\n# single input = (5 + 1) -> end of for-loop.\n\
    # The range function excludes the end boundary value and so +1 is added.\nfor\
    \ counter in range(5 + 1):\n    print(counter)\n```\n\nOutput\n\n0\n1\n2\n3\n\
    4\n5"
