    \ variable_name | col |\n| statement(s) | print(\"* \", end = \"\") |\n\n| Elements\
    \ of Column level *for-loop_2* |\n| :--- |\n| min_val | totalRows + 1 |\n| max_val\
    \ | 2*totalRows - row |\n| variable_name | col |\n| statement(s) | print(\"* \"\
    ,end = \"\") |\n\n## ROW LEVEL REPETITIVE ACTION\n\nWe have assigned unique values\
    \ to each row starting from 1 to 9.\n\nWe can represent value 9 as (2*5 – 1).\
    \ The variable **totalRows** has initially assigned the <u>value 5</u>.\n\nSo,\
    \ we can generalize the maximum limit of the **row** variable using the variable.\
    \ Let’s consider;\n\n**row** → variable **type of integer** to store integer value\
    \ one at a time and represents row number between 1 and (2*totalRows - 1).\n\n\
    We have logically divided <u>row level repetition</u> by **for-loop** into two\
    \ parts due to two different versions of the <u>column level for-loop</u>.\n\n\
    | Elements Of Row Level decrementing for-loop | |\n|---|---|\n| min_val | 1 |\n\
    | totalRows | totalRows |\n| variable_name | row |\n| statement(s) | Column level\
    \ for-loop_1 for printing star characters<br>print() # Move to the next row |\n\
    \n| Elements Of Row Level decrementing for-loop | |\n|---|---|\n| min_val | totalRows\
    \ + 1 |\n| max_val | 2*totalRows - 1 |\n| variable_name | row |\n| statement(s)\
    \ | Column level for-loop_2 for printing star characters<br>print()# Move to the\
    \ next row |\n\nSince we got all the details related to considered for-loops,\
    \ we can summarize this related information with the help of a flowchart.\n\n\
    ![](img/19247dc2edd12faecc2f050f298887d0_172_0.png)\n\nLet's execute the following\
    \ program.\n\n```\nPatternG1.py\n```\n\n```\ntotalRows = 5 # number of rows to\
    \ display\n\n# Row level Repetitive Action :\n# Action1. Executes Column level\
    \ Repetitive Action:\n# Action2.Move control of a program to the next row\n# \
    \        to set the ground for printing characters column-wise.\nfor row in range(1,2\
    \ * totalRows):\n\n    # Column level Repetitive Action :\n    # Print characters\
    \ column-wise or in the same row\n    if (row <= totalRows):\n        # inner\
    \ for-loop_1:prints star * character\n        for col in range(1, row + 1):\n\
    \            print(\"* \",end = \"\")\n\n    else:\n        # inner for-loop_2:prints\
    \ space character\n        for col in range(1,(2 * totalRows - row) + 1):\n  \
    \          print(\"* \",end = \"\")\n\n    # move control of a program to the\
    \ next row\n    # in order to switch the printing of characters to the next line.\n\
    \    print()\n```\n\n```\nOutput\n```\n\n```\n*\n* *\n* * *\n* * * *\n* * * *\
    \ *\n* * * *\n* * *\n* *\n*\n```\n\nThe inner for-loop_1 and inner for-loop_2\
    \ differ only in the maximum limit value of the col variable. Therefore, it will\
    \ be better if we capture the maximum limit of the col variable in a different\
    \ variable. Then we will be in a position to use only one inner for-loop for the\
    \ complete column level repetition.\n\nLet’s update the previous program using\
    \ a single inner for-loop.\n\n## PatternG2.py\n\n```\ntotalRows = 5 # number of\
    \ rows to display\ncolMax = 0    # defines the maximum limit for variable:col.\n\
    \n# Row level Repetitive Action :\n# Action1. Executes Column level Repetitive\
    \ Action:\n# Action2. Move control of a program to the next row so that,\n#  \
    \        printing characters should happen in a new-line.\nfor row in range(1,\
    \ 2 * totalRows):\n\n    #sets the maximum limit of the inner for-loop\n    if\
    \ (row <= totalRows):\n        colMax = row\n    else:\n        colMax = (2 *\
    \ totalRows - row)\n\n    # Column level Repetitive Action :\n    # Print characters\
    \ column-wise or in the same row\n    for col in range(1, colMax + 1):\n     \
    \       print(\"* \", end= \"\")\n\n    # Ends inner for-loop\n\n    # move control\
    \ of a program to the next row\n    # in order to switch the printing of characters\
    \ to the next line.\n    print()\n    # Ends outer for-loop\n```\n\n## Output\n\
    \n```\n*\n* *\n* * *\n* * * *\n* * * * *\n* * * *\n* * *\n* *\n*\n```\n\n## Alternative\
    \ solution2\n\nLet’s start with the trace table that we got from the previous\
    \ solution.\n\n| Row level Repetitive Action | Expected Output |\n| :--- | :---\
