    \ print(\"  \", end=\"\")\n\n    # Ends inner for-loop\n    # move control of\
    \ a program to the next row\n    # in order to switch the printing of characters\
    \ to the next line.\n    print()\n    # Ends outer for-loop\n```\n\n输出：totalRows\
