    \ row - 2*1 | row - 2*count | * * * * |\n| 7 | 3 | row - 2*2 | row - 2*count |\
    \ * * * |\n| 8 | 2 | row - 2*3 | row - 2*count | * * |\n| (2* totalRows - 1) |\
    \ 1 | row - 2*4 | row - 2*count | * |\n\nLet's implement these observations as\
    \ a different program.\n\n```\nPatternG3.py\n\ntotalRows = 5 # number of rows\
    \ to display\ncount = 0     # counter to increment the multiple of 2.\n\n# Row\
    \ level Repetitive Action :\n# Action1. Executes Column level Repetitive Action:\n\
