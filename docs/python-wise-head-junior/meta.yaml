- md: "## Learning by experiments and guesswork\n\nThe usual and common way to learn\
    \ programming is just by randomly experimenting with it. This takes much more\
    \ time to learn programming as it requires much practice. No doubt it has advantages,\
    \ especially if we want to explore the API/in-built libraries or explore the features\
    \ of a programming language. This particular learning style by guessing for beginners\
    \ may act like a killer of interest in the programming subject itself. This way,\
    \ it takes more time to learn programming, and yes, for some people, it is an\
    \ interesting way. **However, everyone can’t guess every subject area, and there\
    \ is no sure formula for guesswork for everyone to utilize.** It’s difficult for\
    \ a person to experiment with programming who couldn’t make a good guess or even\
    \ awkward guessing. The imagination regarding programming doesn’t flow for many\
    \ of them, and the person’s mind goes blank. So it should not be a surprise if\
    \ a person is good in many other activities and lacks patience in learning programming.\
    \ This is not specific to learning programming as a subject; it could happen with\
    \ learning any other subject.\n\nThe ground reality is that if imagination and\
    \ thought process doesn’t flow for a person trying to learn something, it just\
    \ doesn’t go into the head. Learning programming by guessing is a switch off to\
    \ many of them. It doesn’t reflect any standard way of learning. Instead, a systematic\
    \ approach to learning programming based on simple math and common sense makes\
    \ learners better thinkers. That approach dealt in depth at different levels of\
    \ difficulties to properly learn programming logic is covered in the next section,\
    \ **programming patterns**.\n\nIn order to do programming in patterns, the person\
    \ has to know for-loop and applying logical conditions well. Looping is the hardest.\
    \ A nested loop challenges us to think logically in two different directions simultaneously\
    \ to output a pattern, and any pattern is a 2-dimensional simple picture. These\
    \ type of activities stimulates logical thinking. During learning, getting multiple\
    \ and different thoughts are common. Let’s try to think about confusion or doubts\
    \ from a different perspective. It creates a kind of suspense and makes learning\
    \ exciting. Confusions and doubts are good for learning programming, and it is\
    \ an indication that learner’s thought process and imagination becomes active.\
    \ It does happen many times that clearing one’s doubt opens the door to explore\
    \ knowledge in areas. So, doubt basically works like a surprise knowledge capsule.\
    \ A learner needs to keep working in order to try to resolve that specific doubt\
    \ or confusion. So, whenever we have any doubt, assume we have got one more chance\
    \ to improve our intelligence.\n\nObviously, learning will not last longer if\
    \ a systematic approach does not support it. A person who is good at developing\
    \ programming logic encounters lesser obstacles whenever required to deal with\
    \ harder subjects of programming. So good programming logic is the key, and this\
    \ book is all about developing programming logic skills, and it doesn’t matter\
    \ if someone initially was a big zero in it. The content in this book surely helps\
    \ a person to become interested in programming. The exercises are designed in\
    \ a way to suit any new learner in increasing order of difficulty naturally. Some\
    \ exercises are specially included only to surprise, forcing the learner to think\
    \ out of the box.\n\n## Programming Patterns\n\nAny pattern is simply a 2-dimensional\
    \ picture. We deal with 2-dimensional types of output most of the time, whether\
    \ it’s on the desktop/web/mobile application. So is the reason to select simple\
    \ picture-based problems to address common programming logic issues. Using a programming\
    \ language, if someone is good at outputting results in two-dimensional, we can\
    \ expect that person to take care of the three-dimensional programming aspect,\
    \ such as game programming.\n\nThe main idea behind selecting pictorial pattern-based\
    \ exercises is that it clearly validates the programmer’s logic. The mismatching\
    \ output forces learner to think for an appropriate reason. This way of repetitively\
    \ working on programming logic to get the matching output greatly helps perfect\
    \ the visualization of programming logic. It is one type of reverse engineering,\
    \ and we will see how it works to improve programming skills. These exercise makes\
    \ learner alert, involved, self-motivated and sure teaches good amount of patience\
    \ with ease. This set of exercises does create curiosity a lot. The programmer’s\
    \ imagination should work in a direction to trap the programming logic. If this\
    \ happens, then programming will be an interesting job. In software development\
    \ workplaces, one programmer has to understand other programmers' programs. This\
    \ is also true; a programmer can learn good programming from other programmers.\
    \ In all cases, some mastery over the visualization of programming logic will\
    \ definitely help understand other programmer programs. So, practicing visualization\
    \ of programming logic should be the prime focus for any beginner programmer.\
    \ Looping is the only hardest thing in a program. Mastering the flow of control\
    \ in nested loops is enough to boost the confidence of beginner programmers.\n\
    \nIn a nutshell, a beginner’s confidence in programming capabilities has a direct\
    \ relation with a low/average/high level of visualization of programming logic.\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_90_0.png)\n\nWhat we are going to learn\
    \ is a simple math-based approach to find the actual program logic. This technique\
    \ requires some level of practice, and the more we practice more it will refine\
    \ our imagination to trap the programming logic.\n\n> > If you can imagine, you\
    \ can do it.\n> \n> - Enzo Ferrari\n\n**Practicing nested loops along with a correct\
    \ sense of applying logical conditions can immensely help build confidence in\
    \ a novice programmer.**\n\nIn general, programmers are always expected to be\
    \ good at programming logic. If a programmer has that confidence, further advanced\
    \ technical learning will be taken with much confidence. Every programmer might\
    \ wish to have that level of imaginative sense so that programming logic should\
    \ get click naturally, matching the demand of the problem to be solved. It will\
    \ be just wishful thinking to expect clarity about the visualization of programming\
    \ logic without proper practice. Solid groundwork requires a reasonable level\
    \ of clarity about visualization of programming logic and acquiring talent in\
    \ programming.\n\nThe most important protocol that makes visualization of programming\
    \ logic work correctly is to understand the intelligence involved in the flow\
    \ of data. The trick to getting this intelligence is to express data flow in one\
    \ or more logical expressions using our version of the observation table known\
    \ as the logic trace table. The logical expression is made up of one or more variables\
    \ and operators. Finally, programming logic is made up of one or more logical\
    \ expressions. We can easily learn this art of making logical expressions through\
    \ appropriate practice mentioned in this section. Our approach will be to **extract\
    \ logical expression(s) by observing the output of the program**. This thought\
    \ process is captured in the following approach: nothing but logic-building exercises\
    \ of one of its kind to develop interest and build confidence in programming.\
    \ The main steps of the approach are depicted in the following picture. The programmer\
    \ should be able to visualize the logic clearly even before writing the program.\
    \ This quality is possible only when the programmer is known to be able to visualize\
    \ clearly how any repeating control structure works or looping in general. Simple\
    \ picture-based exercises help greatly in that regard which is basically based\
    \ on a nested loop. Given is the complete framework to be followed for improving\
    \ logic-building skills. The steps need to follow are in a specific order which\
    \ is given as follows\n\n| Step | Activity |\n| --- | --- |\n| 1. | Select the\
    \ **pattern** picture. |\n| 2. | Create the **Logic Trace Table** by seeing the\
    \ pattern picture. |\n| 3. | Extract the **logical expression(s)** from Logic\
    \ Trace Table. |\n| 4. | Implementing the **program** using logical expression(s).\
    \ |\n| 5. | Execute the program and check the **program's output to match the\
    \ selected pattern picture**. |\n\n![](img/19247dc2edd12faecc2f050f298887d0_91_0.png)\n\
    \n**Note:** If step 5 goes wrong, need to repeat from step 2 to step 5.\n\n*If\
    \ a person has one quality that is patience to stick to work ethics, then no one\
    \ can stop that person from becoming talented in that field.*"
  mdcn: "## 通过实验和猜测来学习\n\n学习编程通常且普遍的方式是随意地进行实验。这种方式学习编程需要花费更多时间，因为它需要大量的练习。毫无疑问，它有其优势，特别是当我们想要探索API/内置库或探索编程语言的特性时。对于初学者来说，这种特定的猜测式学习风格可能会扼杀对编程学科本身的兴趣。因此，它需要更多时间来学习编程，而且，对某些人来说，这确实是一种有趣的方式。**然而，并非每个人都能猜对每个领域，也没有一个适用于所有人的、可靠的猜测公式。**\
    \ 对于一个不擅长猜测甚至猜测得很笨拙的人来说，进行编程实验是很困难的。许多人的编程想象力无法流畅发挥，他们的大脑会一片空白。因此，如果一个人在其他许多活动中表现出色，却在学习编程时缺乏耐心，这并不奇怪。这并非特指学习编程这一学科；它也可能发生在学习任何其他学科时。\n\
    \n现实情况是，如果一个人在尝试学习某样东西时，想象力和思维过程无法流畅进行，那么知识就无法进入他的脑海。通过猜测来学习编程对许多人来说是一种阻碍。它不代表任何标准的学习方式。相反，一种基于简单数学和常识的系统性编程学习方法，能使学习者成为更好的思考者。这种方法在不同难度层次上深入探讨，以正确学习编程逻辑，将在下一节**编程模式**中介绍。\n\
    \n为了进行模式化编程，一个人必须很好地了解for循环和应用逻辑条件。循环是最难的部分。嵌套循环挑战我们同时从两个不同的方向进行逻辑思考以输出一个模式，而任何模式都是一个二维的简单图形。这类活动能刺激逻辑思维。在学习过程中，产生多种不同的想法是很常见的。让我们尝试从不同的角度思考困惑或疑问。它会制造一种悬念，使学习变得令人兴奋。困惑和疑问对学习编程是有益的，它表明学习者的思维过程和想象力变得活跃起来。很多时候，澄清一个疑问会打开探索其他领域知识的大门。因此，疑问基本上就像一个惊喜的知识胶囊。学习者需要持续努力，以尝试解决那个特定的疑问或困惑。所以，每当我们有任何疑问时，可以假设我们又获得了一次提升智力的机会。\n\
    \n显然，如果没有系统性方法的支持，学习将无法持久。一个擅长培养编程逻辑的人，在需要处理更难的编程主题时，遇到的障碍会更少。因此，良好的编程逻辑是关键，而本书正是关于培养编程逻辑技能的，无论某人最初在这方面是否一窍不通。本书的内容无疑能帮助一个人对编程产生兴趣。练习的设计方式自然地以递增的难度顺序适合任何新学习者。有些练习特别加入只是为了制造惊喜，迫使学习者跳出框框思考。\n\
    \n## 编程模式\n\n任何模式都只是一个二维图形。我们大多数时候处理的是二维类型的输出，无论是在桌面/网页/移动应用程序上。这就是选择基于简单图形的问题来解决常见编程逻辑问题的原因。使用编程语言，如果一个人擅长输出二维结果，我们可以期望他能处理三维编程方面，例如游戏编程。\n\
    \n选择基于图形模式的练习背后的主要思想是，它能清晰地验证程序员的逻辑。不匹配的输出迫使学习者思考合适的原因。这种反复进行编程逻辑工作以获得匹配输出的方式，极大地有助于完善编程逻辑的可视化。这是一种逆向工程，我们将看到它如何提升编程技能。这些练习使学习者保持警觉、投入、自我激励，并且确实能轻松地教会大量的耐心。这套练习确实能极大地激发好奇心。程序员的想象力应该朝着捕捉编程逻辑的方向运作。如果这发生了，那么编程将是一项有趣的工作。在软件开发工作场所，一个程序员必须理解其他程序员的程序。这也是事实；一个程序员可以从其他程序员那里学习好的编程。在所有情况下，对编程逻辑可视化的一些掌握，肯定有助于理解其他程序员的程序。因此，练习编程逻辑的可视化应该是任何初级程序员的首要关注点。循环是程序中唯一最难的东西。掌握嵌套循环中的控制流足以提升初级程序员的信心。\n\
    \n简而言之，一个初学者对编程能力的信心与编程逻辑可视化水平的低/中/高有直接关系。\n\n![](img/19247dc2edd12faecc2f050f298887d0_90_0.png)\n\
    \n我们将要学习的是一种基于简单数学的方法，以找到实际的程序逻辑。这种技术需要一定程度的练习，我们练习得越多，就越能完善我们的想象力以捕捉编程逻辑。\n\n\
    > > 如果你能想象，你就能做到。\n> \n> - 恩佐·法拉利\n\n**练习嵌套循环以及正确应用逻辑条件的感觉，能极大地帮助建立新手程序员的信心。**\n\
    \n通常，程序员总是被期望擅长编程逻辑。如果程序员有这种信心，进一步的高级技术学习将会更有信心地进行。每个程序员可能都希望拥有那种想象力水平，以便编程逻辑能够自然地契合，匹配待解决问题的需求。期望在没有适当练习的情况下就对编程逻辑的可视化有清晰的认识，这将只是一厢情愿的想法。扎实的基础工作需要对编程逻辑的可视化有相当程度的清晰认识，并获得编程才能。\n\
    \n使编程逻辑可视化正确工作的最重要原则是理解数据流中涉及的智能。获得这种智能的诀窍是使用我们称为逻辑追踪表的观察表版本，用一个或多个逻辑表达式来表达数据流。逻辑表达式由一个或多个变量和运算符组成。最终，编程逻辑由一个或多个逻辑表达式组成。我们可以通过本节中提到的适当练习，轻松学会制作逻辑表达式这门艺术。我们的方法将是**通过观察程序的输出来提取逻辑表达式**。这种思维过程体现在以下方法中：这是一种独特的逻辑构建练习，旨在培养兴趣并建立编程信心。该方法的主要步骤如下图所示。程序员应该能够在编写程序之前就清晰地可视化逻辑。只有当程序员能够清晰地可视化任何重复控制结构或一般循环如何工作时，这种品质才有可能实现。基于简单图形的练习在这方面大有帮助，它基本上基于嵌套循环。以下是为提高逻辑构建技能而要遵循的完整框架。需要遵循的步骤按特定顺序给出如下\n\
    \n| 步骤 | 活动 |\n| --- | --- |\n| 1. | 选择**模式**图形。 |\n| 2. | 通过观察模式图形创建**逻辑追踪表**。\
    \ |\n| 3. | 从逻辑追踪表中提取**逻辑表达式**。 |\n| 4. | 使用逻辑表达式实现**程序**。 |\n| 5. | 执行程序并检查**程序的输出是否与所选模式图形匹配**。\
    \ |\n\n![](img/19247dc2edd12faecc2f050f298887d0_91_0.png)\n\n**注意：** 如果第5步出错，需要从第2步重复到第5步。\n\
    \n*如果一个人拥有一种品质，那就是坚持职业道德的耐心，那么没有人能阻止那个人在该领域变得有才华。*"
