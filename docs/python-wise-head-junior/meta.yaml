  md: "# For-loop with break and continue keywords\n\n+   - Any logical condition\
    \ that executes the keyword **break** within the for-loop stops further repetition\
    \ of the loop. It’s similar to a **moving car that stops** exactly whenever the\
    \ driver applies the break.\n- Any logical condition that executes the keyword\
    \ **continues** within the for-loop; it continues with the next iteration without\
    \ executing programming statement(s) that come after it within the for-loop's\
    \ code block.\n\n```\nForLoopContinueNext.py\n\nfor cnt in range(1,10 + 1):\n\
    \    if cnt <= 3:\n        print(\"Keyword continue is throwing \",end=\"\")\n\
    \        print(\"control of program back.\\n\")\n        continue\n\n    print(\"\
    Please Join Us...!!!\\n\")\n    if cnt == 5:\n        print(\"keyword break at\
    \ cnt =\",cnt, \"\\n\")\n        break\n    print(\"Please look back...\\n\")\n\
    ```\n\n# Output\n\nKeyword continue is throwing back.\nKeyword continue is throwing\
    \ back.\nKeyword continue is throwing back.\nPlease Join Us...!!!\nPlease look\
    \ back...\nPlease Join Us...!!!\nkeyword break at cnt = 5"
