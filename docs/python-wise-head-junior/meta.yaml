  md: "# Decrementing For-Loop:\n\nLet’s express `range(start_value, end_value -1,\
    \ common_difference)` where `start_value > end_value` with `common_difference`\
    \ as negative value. In general, we can give decrementing for-loop as;\n\n```\n\
    # 2nd input -> end of for-loop. To include boundary value -1 is subtracted.\n\
    for variable_name in range(start_value, end_value - 1, common_difference):\n \
    \   statement-1\n    statement-2\n    ............\n    ............\n    statement-N\n\
    Next Statement # statement after for-loop code block.\n```\n\nLet’s try to reverse\
    \ the previous sequence as;\n\n20, 18, 16, 14, 12, 10, 8, 6, 4, 2\n\nThe start\
    \ value or maximum value is 20. The end value or minimum value is 2. We also knew\
    \ that the common difference value is -2. Hence, the `range()` function with three\
    \ inputs can be given as `range(20, 2 -1, -2)`.\n\n```\nForLoopDecrement.py\n\
    # counter : An integer variable\n# range function :-\n# 1st input -> start of\
    \ for-loop.\n# 2nd input -> end of for-loop. To include boundary value -1 is subtracted.\n\
    # 3rd input -> common difference as negative value\nfor counter in range(20, 2\
    \ -1, -2):\n    print(counter)\n```\n\n```\nOutput\n20\n18\n16\n14\n12\n10\n8\n\
    6\n4\n2\n```\n\nProblem: Write for-loop for the given sequence.\n\n-10\n-9\n-8\n\
    -7\n-6\n-5\n-4\n-3\n-2"
