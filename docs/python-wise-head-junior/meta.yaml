    \ | | 1 → * | 2 → * | 3 → * | 2 个空格 | 写入 * 3 次 |\n| | 移动到行 = 4 | | 1 → * | 2 →\
    \ * | 3 → * | 4 → * | 1 个空格 | 写入 * 4 次 |\n| | 移动到行 = 5 | 1 → * | 2 → * | 3 → *\
    \ | 4 → * | 5 → * | 0 个空格 | 写入 * 5 次 |\n\n空格也是像任何其他键盘字符一样的字符。如果一个单词或单个非空格字符在间隔后显示在屏幕上，这意味着在打印任何其他非空格字符之前必须打印一个或多个空格字符。\n\
