- md: '## Logic trace table: Brain behind programming logic


    > Do not deny the classical approach, simply as a reaction, or you will have created
    another pattern and trapped yourself there.

    > — Bruce Lee


    Conceptually logic trace table is just one type of observation table. All major
    observations are put into this table so that we should be able to relate the different
    pieces of information. You can create your own one, or it may depend upon your
    needs. In our case, the rows and columns of the logic trace table selected with
    the motive to trace programming logic. We can use an observation table-based approach
    to solving other types of problems, not just related to patterns.


    The main concern is getting involved in perfecting novice programmer’s visualization
    of logic through the usage of logic trace tables and ultimately installing confidence
    in programming. Furthermore, clarity and work ethics helps to achieve our small
    goals. Small achievements raise our confidence level to achieve the next level
    of difficult challenges. So, clarity and work ethics are the foundation for every
    event of achievement to happen.


    What purpose does the logic trace table solve?


    > Simplicity is the key to brilliance.

    > — Bruce Lee


    It’s a simple trick to train novice programmer’s minds on logical thinking. Its
    main purpose is to apply thinking in a more structured manner to get programming
    logic. It is a simple table structure meant to derive the logical expression.
    The table structure basically gives clarity about the relationship among the variable
    parameters.


    > Clarity is power.

    > — The more clear you are about EXACTLY what it is that you want, the more your
    brain knows how to get there.

    > — Unknown


    In my opinion, without taking the help of table structure, most novice programmers
    will find it difficult to think clearly in terms of building programming logic.
    Clear thinking to find logical expression is a process that can be improved with
    a little bit of practice. Unless and until a person is able to put his/her understanding
    in a simplified way, it means that person had not really understood the concept.


    What is the importance of logical expression?


    Programming logic is the brain behind a program. It is made up of logical expression(s).
    So, it is a logical expression at the very core level - when executed - helps
    in decision-making. Most of the time, it is applied in the condition of looping,
    in decision structures like if-condition, if-elif condition.


    ## PART 2


    ## PROGRAMMING IN ACTION


    ## Outputting Simple Picture on Computer Screen


    The key point is to understand that the computer screen is nothing more than a
    logical collection of small boxes where individual small boxes can output individual
    keyboard characters. These boxes are arranged in such a way to give a clear idea
    about rows and columns. Following is the conceptual diagram of a computer screen
    showing some rows and columns of a simple picture outputted into the computer
    screen. Each keyboard character is in one of the single smallest boxes.


    ![](img/19247dc2edd12faecc2f050f298887d0_94_0.png)


    Before we begin programming with simple picture-based exercises, we must first
    learn to allocate row numbers and column numbers conceptually. This will give
    justice to identify each smallest box with a singular keyboard character uniquely.
    The **(row number, column number)** numeric combination will imply a single keyboard
    character. Mentioning (row number, column number) numeric combination is simply
    a reason to locate any keyboard character on the computer screen correctly. It
    is quite analogous to locating a city on the geographical map using **(longitude,
    latitude)** combination. Hence, our version of the single smallest box maps to
    a single keyboard character on the computer screen and equivalently maps to a
    unique (row number, column number) numeric pair. In this way, the collection of
    (row number, column number) numeric pairs can be used to represent a simple picture
    completely.


    **Single Smallest Box → Single keyboard character → (row number, column number)
    numeric pair.**


    ![](img/19247dc2edd12faecc2f050f298887d0_94_1.png)


    Alternately, we can think of the computer screen as a sophisticated version of
    graph paper or grid paper. Each smallest box of the computer screen is a coordinate,
    a unique combination of two numbers, an "X (Columns)" (horizontal) and a "Y(Rows)"
    (vertical) - that determines the location of a keyboard character in computer
    screen space.


    It is our programming job; how can a simple picture-based pattern appear at these
    smallest box coordinates represented by (**row number, column number**) numeric
    pairs.


    ![](img/19247dc2edd12faecc2f050f298887d0_95_0.png)


    As discussed previously, we can represent any 2-dimensional simple picture in
    terms of rows and columns on the computer screen. So, such simple pictures made
    up of keyboard characters can be completely caged into a collection of small boxes.
    Each keyboard character of a considered simple picture can have a unique (**row
    number, column number**) numeric pair. Hence, the collection of such numeric pairs
    can totally represent a complete simple picture.


    The collection of related unique (row number, column number) numeric pairs of
    this simple picture can be given as

    (2,2), (2,3), (2,4), (2,5)

    (3,3), (3,5), (4,4), (4,5),

    (5,5)


    | | Col=1 | Col=2 | Col=3 | Col=4 | Col=5 |

    |---|---|---|---|---|---|

    | Row=1 | | | | | |

    | Row=2 | | *(2,2)* | *(2,3)* | *(2,4)* | *(2,5)* |

