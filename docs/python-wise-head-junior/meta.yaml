  md: '# Why the maximum value of the variable: col is kept as dynamic?


    We know that the printing star(“*”) character(s) will continue till the maximum
    value of the variable: col, which is (totalRows + row).


    We are not worried about the spaces when printing of all the star(“*”) character(s)
    gets completed in a row. It makes sense to restrict the column level looping where
    the maximum number of printing of star(“*”) characters reached.


    # Why the minimum value of the variable: col is kept as 1?


    It makes sense to start the col=1,2...from the value 1 since we have to Print
    space characters before the actual task of printing star(“*”) characters. It is
    required to count space characters accurately at the beginning of the column level
    looping.


    We can eliminate the logical AND(and) condition( col <= ( totalRows + row) ) in
    the if-condition to print the star(“*”) characters. It’s already planned to consider
    this logical AND(and) condition as the loop-condition already been taken into
    the column level inner for-loop. So, the if-condition will now reduce to the following:


    ```

    If ( col >= (totalRows - row ) )

    ```


