  mdcn: '## 逻辑追踪表：编程逻辑背后的大脑


    > 不要仅仅作为一种反应而否定经典方法，否则你将创造出另一种模式并被困其中。

    > —— 李小龙


    从概念上讲，逻辑追踪表只是一种观察表。所有主要的观察结果都被放入此表中，以便我们能够关联不同的信息片段。你可以创建自己的观察表，或者它可能取决于你的需求。在我们的案例中，逻辑追踪表的行和列的选择动机是为了追踪编程逻辑。我们可以使用基于观察表的方法来解决其他类型的问题，而不仅仅是与模式相关的问题。


    主要关注点是通过使用逻辑追踪表，让新手程序员的逻辑可视化能力趋于完善，并最终在编程中建立信心。此外，清晰度和职业道德有助于实现我们的小目标。小成就会提升我们的信心水平，以应对下一阶段的挑战。因此，清晰度和职业道德是每一次成就事件发生的基础。


    逻辑追踪表解决了什么目的？


    > 简单是卓越的关键。

    > —— 李小龙


    这是一个训练新手程序员逻辑思维的简单技巧。其主要目的是以更结构化的方式应用思维来获得编程逻辑。它是一个简单的表格结构，旨在推导逻辑表达式。表格结构基本上清晰地展示了变量参数之间的关系。


    > 清晰就是力量。

    > —— 你对自己想要什么越清楚，你的大脑就越知道如何达到目标。

    > —— 佚名


    在我看来，如果不借助表格结构，大多数新手程序员会发现很难清晰地思考如何构建编程逻辑。清晰思考以找到逻辑表达式是一个可以通过少量练习来改进的过程。除非一个人能够以简化的方式表达自己的理解，否则意味着这个人并没有真正理解这个概念。


    逻辑表达式的重要性是什么？


    编程逻辑是程序背后的大脑。它由逻辑表达式组成。因此，在最核心的层面，它是一个逻辑表达式——当执行时——有助于决策。大多数情况下，它应用于循环条件、决策结构（如
    if 条件、if-elif 条件）中。


    ## 第二部分


    ## 编程实践


    ## 在计算机屏幕上输出简单图形


    关键点是理解计算机屏幕不过是一个小方框的逻辑集合，每个小方框可以输出单个键盘字符。这些方框的排列方式使得行和列的概念清晰明了。以下是计算机屏幕的概念图，显示了输出到屏幕上的简单图形的若干行和列。每个键盘字符位于一个最小的方框中。


    ![](img/19247dc2edd12faecc2f050f298887d0_94_0.png)


    在我们开始基于简单图形的编程练习之前，我们必须首先学会概念上分配行号和列号。这将有助于我们唯一地识别每个最小方框中的单个键盘字符。**（行号，列号）** 数字组合将对应一个单个键盘字符。提及（行号，列号）数字组合只是为了正确定位计算机屏幕上的任何键盘字符。这与使用
    **（经度，纬度）** 组合在地理地图上定位一个城市非常类似。因此，我们版本的单个最小方框映射到计算机屏幕上的单个键盘字符，并等效地映射到一个唯一的（行号，列号）数字对。通过这种方式，（行号，列号）数字对的集合可以用来完整地表示一个简单图形。


    **单个最小方框 → 单个键盘字符 → （行号，列号）数字对。**


    ![](img/19247dc2edd12faecc2f050f298887d0_94_1.png)


    或者，我们可以将计算机屏幕视为坐标纸或方格纸的复杂版本。计算机屏幕的每个最小方框都是一个坐标，一个由两个数字组成的唯一组合，一个“X（列）”（水平）和一个“Y（行）”（垂直）——决定了键盘字符在计算机屏幕空间中的位置。


    这是我们的编程任务；如何让一个基于简单图形的模式出现在由（**行号，列号**）数字对表示的这些最小方框坐标上。


    ![](img/19247dc2edd12faecc2f050f298887d0_95_0.png)


    如前所述，我们可以在计算机屏幕上用行和列来表示任何二维简单图形。因此，由键盘字符组成的这种简单图形可以完全被“装入”一个小方框的集合中。一个被考虑的简单图形的每个键盘字符都可以有一个唯一的（**行号，列号**）数字对。因此，这样的数字对集合可以完全表示一个完整的简单图形。


    这个简单图形的相关唯一（行号，列号）数字对的集合可以表示为：

    (2,2), (2,3), (2,4), (2,5)

    (3,3), (3,5), (4,4), (4,5),

    (5,5)


    | | 列=1 | 列=2 | 列=3 | 列=4 | 列=5 |

    |---|---|---|---|---|---|

    | 行=1 | | | | | |

    | 行=2 | | *(2,2)* | *(2,3)* | *(2,4)* | *(2,5)* |

    | 行=3 | | | *(3,3)* | | *(3,5)* |

    | 行=4 | | | | *(4,4)* | *(4,5)* |

    | 行=5 | | | | | *(5,5)* |


    ## 光标移动


    一个移动的位置指示器，显示在计算机显示器上，指示下一个移动或操作将发生的位置。我们将使用这个概念来更好地解释模式中的每个字符是如何在计算机屏幕或编程IDE的控制台屏幕上生成的。在我们的案例中，键盘字符将使用内置库输出到计算机屏幕的特定位置。因此，光标移动到屏幕上的下一个位置，然后字符的打印将由内置方法处理。


    ## 模式 1A


    我们的编程任务是在计算机屏幕的一部分打印这个特定的基于逻辑的模式。**我们的方法将假设计算机屏幕是行和列的组合，虚拟地将其划分为更小的方框**——最小的方框被视为仅容纳一个字符。因此，显示屏幕上每个最小方框的地址在逻辑上将成为一个唯一的
    **（行，列）** 数字组合。基于这个假设，计算机屏幕将简单地是一个由（行，列）数字值配对的方框组成的唯一组合，这些方框均匀地分布在屏幕上。


    ![](img/19247dc2edd12faecc2f050f298887d0_97_0.png)


    ## 数据表示


    尽管在逻辑上，我们可以通过知道每个可打印字符在显示屏幕上的唯一可识别的 **（行，列）** 数字配对值来精确定位其位置。


    | 行, 列 | 列 = 1 | 列 = 2 | 列 = 3 | 列 = 4 | 列 = 5 |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | 行 = 1 | * (1, 1) | | | | |

    | 行 = 2 | * (2, 1) | * (2, 2) | | | |

    | 行 = 3 | * (3, 1) | * (3, 2) | * (3, 3) | | |

    | 行 = 4 | * (4, 1) | * (4, 2) | * (4, 3) | * (4, 4) | |

    | 行 = 5 | * (5, 1) | * (5, 2) | * (5, 3) | * (5, 4) | * (5, 5) |


    > 数对 (4, 3) 代表显示屏幕上假设的第4行第3列位置上的单个字符 *。所有值对（行 = 值，列 = 值）的集合现在代表这个特定的模式。


    ## 输出分析


    计算机主要进行非常精确的计算。练习编程的一个有趣方法是尝试将编写给定模式的手动步骤转换为编程指令。我们可以使用纸张或电子表格。我们可以标记行号和列号来识别位置指示器，以便正确地逻辑分析一个模式。


    | | | 列 = 1 | 列 = 2 | 列 = 3 | 列 = 4 | 列 = 5 | 写入动作 |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | 行 | 移动到 行 = 1 | 1 → * | | | | | 写入 * 1 次 |

    | 移动 | 移动到 行 = 2 | 1 → * | 2 → * | | | | 写入 * 2 次 |

    | 动作 | 移动到 行 = 3 | 1 → * | 2 → * | 3 → * | | | 写入 * 3 次 |

    | | 移动到 行 = 4 | 1 → * | 2 → * | 3 → * | 4 → * | | 写入 * 4 次 |

    | | 移动到 行 = 5 | 1 → * | 2 → * | 3 → * | 4 → * | 5 → * | 写入 * 5 次 |'
