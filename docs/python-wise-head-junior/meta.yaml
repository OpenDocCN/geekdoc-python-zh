    # If-else Shortcut


    Short-cut in any matter is a special case to be applied in a specific situation.
    In programming, people unknowingly confuse themselves simply because they choose
    a special case and try to apply it commonly. Even in the choice of words, two
    words may give almost similar meanings, and when we actually apply those in different
    situations, then only we will be in a position to explore its true potential meaning.


    The shortcut to the if-else option is in almost every programming language known
    as the ternary operator and given by the symbol (:).


    # When to apply if-else shortcut


    The ternary operator is a sort of syntactic sugar for if-else statements usually
    applied in a situation where both **if-block** and **else-block** assign a different
    value to the same result variable. For example, let’s suppose that the if-else
    statement is something like the following:


    | If-else statement | If-else shortcut or ternary operator (:) |

    | :--- | :--- |

    | If( condition):<br>    result = one_value<br>else:<br>    result = other_value
    | result = one_value if (condition) else other_value |

    | Simple if-else can be easily replaced by the use of if-else shortcut represented
    by the one liner ternary operator. In such situations only it makes True sense
    to use ternary operator to increase code readability. | - Two outcome result values
    are possible which are separated by a symbol colon (:).<br>- If condition is True,
    then one_value will get assigned to the variable result.<br>- If condition is
    False, then one_value will get assigned to the variable result. |


    In the program **NumberPatternFF.py**, we can use the ternary operator to improve
    the part of source code readability.


    | Separate if-else | Many If-else combined in single if-else |

