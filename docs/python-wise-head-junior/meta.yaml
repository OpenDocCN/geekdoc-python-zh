    \ | 3,3 | | |\n| **行=4** | 4,1 | 4,2 | 4,3 | 4,4 | |\n| **行=5** | 5,1 | 5,2 |\
    \ 5,3 | 5,4 | 5,5 |\n\n# 输出分析\n\n它也可以用表格形式来解释。\n\n| 行 | 1 | | | | |\n| 列 | 1 |\
    \ | | | |\n| 输出 | 1 | | | | |\n\n对于 行 =1, 1<=列<=1\n\n| 行 | 2 | | | | |\n| 列 |\
    \ 1 | 2 | | | |\n| 输出 | 2 | 2 | | | |\n\n对于 行 =2, 1<=列<=2\n\n| 行 | 3 | | | | |\n\
