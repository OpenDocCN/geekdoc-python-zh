    \n    # 打印数字前要打印的空格\n    num = 2 * row - 1  #  水平移动\n\n    # 打印数字前要打印的空格\n   \
    \ for col in range(1, totalRows + 1):\n\n        if (col <= (totalRows - row)):\n\
