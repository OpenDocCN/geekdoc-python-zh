    \ +1 - 2 | 6 | totalRows + 1 | totalRows + 2 - 1 |\n| 3 | 3 | totalRows -2 | totalRows\
    \ +1 - 3 | 7 | totalRows + 2 | totalRows + 3 - 1 |\n| 4 | 2 | totalRows -3 | totalRows\
    \ +1 - 4 | 8 | totalRows + 3 | totalRows + 4 - 1 |\n| 5 | 1 | totalRows -4 | totalRows\
    \ +1 - 5 | 9 | totalRows + 4 | totalRows + 5 - 1 |\n\n## 列级重复操作\n\n| 行 | 下限 <=\
    \ 列 <= 上限 | | | |\n| --- | --- | --- | --- | --- |\n| | **下限** | | **上限** | |\n\
    | | **默认值** | **3** | **默认值** | **3** |\n| 1 | 5 | totalRows +1 - 行 | 5 | totalRows\
    \ + 行 - 1 |\n| 2 | 4 | totalRows +1 - 行 | 6 | totalRows + 行 - 1 |\n| 3 | 3 | totalRows\
    \ +1 - 行 | 7 | totalRows + 行 - 1 |\n| 4 | 2 | totalRows +1 - 行 | 8 | totalRows\
    \ + 行 - 1 |\n| 5 | 1 | totalRows +1 - 行 | 9 | totalRows + 行 - 1 |\n\n下限和上限对于所有行是一致的。现在它对于任意行数都是通用的，给出了打印数字值的精确位置。因此我们的\
    \ if 条件变为；\n\n| if 条件 | 下限 <=列<= 上限 |\n| --- | --- |\n| **数学表达式** | (totalRows\
    \ +1 - 行) <= 列 <= (totalRows + 行 - 1) |\n| **语法** | if (col >= ((totalRows - row)\
