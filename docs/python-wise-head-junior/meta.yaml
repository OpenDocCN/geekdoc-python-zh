    We can see few different styles of alphabet L.


    ![](img/19247dc2edd12faecc2f050f298887d0_58_0.png)


    What possible thoughts shall cross our mind if we try to fit each different style
    alphabet L in 8 rows and 8 column box using * character. Different alphabet styles
    mean different pictures, and each will have different sets of (row, col) value
    pairs.


    ![](img/19247dc2edd12faecc2f050f298887d0_58_1.png)


    It’s obvious that we can’t get a pixel-perfect picture by using *character. The
    most important point we need to understand is that **different pictured outputs
    mean different logical conditions**. These pictures are somewhat advanced to start
    with it to learn to apply logical conditions.


    We can surely start with something so simple that even school-going kids can’t
    make any excuse to dislike programming. We will pick something which will be so
    easy and familiar to most of us. We will consider coding English alphabets of
    the very simplest structure, as shown in the following examples.


    | Alphabet A | Alphabet C | Alphabet D |

    | :--- | :--- | :--- |

    | * * * * * | * * * * | * * * * |

    | * * | * | * * |

    | * * | * | * * |

    | * * * * * | * | * * |

    | * * | * | * * |

    | * * | * | * * |

    | * * | * * * * | * * * * |


    Let’s recall our learning experiences with respect to the English alphabet from
    our school days. In order to learn how to write alphabets, we were taught by our
    teachers, parents, and others. They taught us in some logical way to write alphabets.
    The total logic applied to writing one alphabet differs from another. Since each
    alphabet''s entire structure is different, we have the opportunity to practice
    various kinds of logical conditions.'
