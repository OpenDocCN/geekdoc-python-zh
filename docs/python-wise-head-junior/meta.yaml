  md: '# Convert Simple Picture to Logical Conditions


    We will do some exercises by trying to get logical conditions from an English
    alphabet of very simple nature drawn using * character. We may consider 7 rows
    and 5 columns box. We have to select only those pairs of (row, col) values, which
    are helpful to make a required alphabet. We will be putting logical conditions
    only for those (row, col) value pairs matching * characters.


    **ExerciseYBA: Alphabet A needs to be fit in a 7X5 box.**


    ![](img/19247dc2edd12faecc2f050f298887d0_59_0.png)


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |

    | row=6 | 6,1 | 6,2 | 6,3 | 6,4 | 6,5 |

    | row=7 | 7,1 | 7,2 | 7,3 | 7,4 | 7,5 |


    In order to draw the alphabet A, let’s start by putting * characters in the first
    row.


    So logical condition will be **row==1** where == is equals comparator operator.


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1* | 1,2* | 1,3* | 1,4* | 1,5* |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |

    | row=6 | 6,1 | 6,2 | 6,3 | 6,4 | 6,5 |

    | row=7 | 7,1 | 7,2 | 7,3 | 7,4 | 7,5 |


    We will use a logical OR ( or ) conditional operator to add more data. In our
    case, we need to add some more * characters to complete one more part of the alphabet
    A. Now we need to put * characters in the first column and the last column. So,
    adding **(col==1)** and **(col==5)** logical conditions using OR ( or ) logical
    operator means more asterisk (*) characters are to be added in the following boxes.


    The logical conditions updates are shown in the following


    **(row==1) or (col==1)**


    **(row==1) or (col==1) or (col==5)**


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1* | 1,2* | 1,3* | 1,4* | 1,5* |

    | row=2 | 2,1* | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1* | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1* | 4,2 | 4,3 | 4,4 | 4,5 |

