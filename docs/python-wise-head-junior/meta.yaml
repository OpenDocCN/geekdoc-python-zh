  mdcn: "> “这个国家的每个人都应该学习如何编程……因为它能教你如何思考。”\n\n— 史蒂夫·乔布斯\n\n## Python 智慧少年\n\n作者\n\
    **MOHMAD | YAKUB**\n\n**技术审阅：** Sadique S. Naikwadi\n**校对：** Mrs. Shabana Mursal\n\
    \n**编辑**\nMohmad Yakub\n\n版权所有 @ **2021** Mohmad Yakub\n保留所有权利。未经作者明确书面许可，不得以任何方式复制或使用本书或其任何部分，书评中简短引用除外。\n\
    \n> 作者在编写本书时已尽一切努力确保信息的准确性。然而，本书信息按“原样”提供，不附带任何明示或暗示的保证。对于因本书直接或间接造成的任何损害，或据称造成的损害，作者概不负责。\n\
    \n**联系信息：** 如果有任何疑问或需要更正，我将不胜感激。我非常感谢诚实的反馈。本书读者可以通过以下电子邮件地址联系我。\n\n**电子邮件：** programming.pattern@gmail.com\n\
    \n## 我将本书献给那些心怀希望的人\n\n- 不知道如何构建任何编程逻辑的人？\n- 在学习编程过程中遇到困难的人？\n- 有一些编程经验但缺乏信心的人。\n\
    - 持有“编程只适合超级聪明的人”这种错误观念的人。\n- 正在寻找成为自学程序员第一步坚实基础的人。\n- 是类似以下泄气言论的受害者；\n  - 实际上，你并不感兴趣。\n\
    \  - 你缺乏耐心和决心。\n  - 你的智商远低于平均水平。\n\n## 前言\n\n> 即使是最伟大的人也曾是初学者。\n不要害怕迈出第一步。\n-\
    \ 穆罕默德·阿里\n\n编程是一种心智有氧运动，它教会我们保持专注，并培养良好的耐心、纪律和预见性。这些是成就者的一些主要品质。\n\n*编程适合每个人，而不仅仅是学术练习。*\n\
    \n当你可视化并处理信息时，学习将变得主动。当你自然地应用信息时，就无需记忆。编程不是关于记忆编程逻辑。它是关于应用技术来解决问题。为了正确应用一种方法，一个人首先应该能够正确地可视化它。编程的最佳入门是先学习编程逻辑。这是建立编程信心和兴趣的一种手段。程序员应该能够解决以下基于逻辑的问题。根据不同的输入，一个人应该能够生成自定义尺寸的手表。由于缺乏编程智慧，大多数初学者无法完成这一点。优秀的一点是，学习逻辑构建技能不需要太多技术包袱。\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_4_0.png)\n\n许多初学者认为，如果他们能学习语法或探索编程语言的一些常见内置功能，他们就能学会如何解决问题。事实并非如此。仅仅学习交通规则和标志牌并不能帮助某人熟练驾驶。你必须朝着正确的方向迈出某些步骤。面向语法的编程语言学习只是让你入门。面向语法的编程语言学习适合有经验的程序员。有经验的程序员已经具备了那种智慧，因此他们只需要发现语言的规则和功能即可使用。这不适用于初学者。\n\
    \n为可视化编程逻辑培养肥沃的土壤应该是绝对初学者的重点。不幸的是，这种方法对大多数初学者甚至教学群体来说都是陌生的。练习应该能够帮助新手学习或提高对编程逻辑的可视化能力。本书中提到的方法对新手或缺乏信心的程序员有效的两个主要原因；\n\
    \nA) 视觉学习是提高我们学习技能的好方法。我曾用这种方法在许多学生身上进行实验，发现这是一种极其有趣的快速学习编程的方式。这些教学内容在书中概述，以帮助激发对编程的兴趣。这是一种基于常识和基础数学的经过验证的实践；因此，实际上任何人都可以学习编程，而不会陷入技术细节的泥潭。\n\
    \n**没有足够的逻辑构建技能，学习高级编程主题的努力将如同与大猩猩对话；这将是徒劳的。**\n\nB) 此外，在与 **Quora.com** 上的初学者程序员互动后，内容得到了进一步的完善。我的贡献得到了认可，我相信它将帮助许多初学者。\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_5_0.png)\n\n请查看以下帖子以获取更多详情。\n\n[https://www.quora.com/How-can-I-improve-my-programming-skills-18/answers/140798300](https://www.quora.com/How-can-I-improve-my-programming-skills-18/answers/140798300)\n\
    \n当学习过程充满乐趣时，它总是更好的。学生、教师、培训师以及任何想将编程作为爱好的人，都可以将本书视为补充教材。此外，这个资源对于想教孩子编程的父母也很有用。父母们，请省下你们辛苦赚来的钱，立即开始辅导你们的孩子。送给他们这个平台，这样他们进一步的学习将变得轻而易举。\n\
    \n## 祝学习愉快！！！\n\n## 目录\n\n前言.....................................................................................................................5\n\
