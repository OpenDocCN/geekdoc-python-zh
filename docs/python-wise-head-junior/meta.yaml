  mdcn: '## 将逻辑条件转换为简单图形


    我们需要以基于简单图形的练习形式来表达逻辑条件。我们需要用 * 字符标记那些恰好符合逻辑条件的方格。每个方格由唯一的（行，列）值对表示。为了理解如何使用特定逻辑条件选择方格，以下练习将进行展示。


    **练习YB1：** 在以下5X5方格中表达逻辑条件：(row == col)。


    条件 (row == col) 要求在5X5方格中找到行值和列值相等的（行，列）值对。我们注意到，在对角线方格上，行和列的值是相等的。


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 * | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 * | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 * | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 * | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5* |


    为了清晰理解，行和列值相等的方格用粗边框标记。


    根据我们的规则，我们应该在行和列值相等的方格上放置 * 字符。


    移除行和列值不相等的其他（行，列）值对表明所考虑的逻辑条件没有选择它们。这仅仅意味着只有那些匹配给定逻辑条件的方格被选中并标记了 * 字符。通过这种方式，我们可以通过用
    * 字符填充小方格来表示特定的逻辑条件。


    因此，逻辑条件的含义现在采取了视觉形式。逻辑条件的表达被转换为使用 * 字符绘制的对角线的简单图形。这有助于我们理解在使用逻辑条件时，数据的过滤/选择是如何发生的。


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1* | | | | |

    | row=2 | | 2,2* | | | |

    | row=3 | | | 3,3* | | |

    | row=4 | | | | 4,4* | |

    | row=5 | | | | | 5,5* |


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | * | | | | |

    | row=2 | | * | | | |

    | row=3 | | | * | | |

    | row=4 | | | | * | |

    | row=5 | | | | | * |


    ![](img/19247dc2edd12faecc2f050f298887d0_56_0.png)


    我们将逻辑条件的表达式转换为使用 * 字符绘制的对角线的简单图形。这种有针对性的尝试精进了我们应用逻辑条件的技能。


    ## 练习YB2. 在以下5X5方格中表达逻辑条件：(row == 5) 或 (col==1)。


    让我们先看逻辑条件的一部分 **(row==5)**，它表示行等于5。行值为5的方格将是我们选择的方格，无论 **col** 的值如何。可以通过突出显示所选方格的边框来引起注意。


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | *5,1 | *5,2 | *5,3 | *5,4 | *5,5 |


    类似地，让我们看逻辑条件的另一部分，即 **(col ==1)**。同样，让我们选择列值为1的方格，无论行值如何，并通过突出显示所选方格的边框。


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | *5,1 | *5,2 | *5,3 | *5,4 | *5,5 |


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1* | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1* | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1* | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1* | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | *5,1 | *5,2 | *5,3 | *5,4 | *5,5 |


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1* | | | | |

    | row=2 | 2,1* | | | | |

    | row=3 | 3,1* | | | | |

    | row=4 | 4,1* | | | | |

    | row=5 | *5,1 | *5,2 | *5,3 | *5,4 | *5,5 |


    | | | | | | |

    |---|---|---|---|---|---|

    | | * | | | | |

    | | * | | | | |

    | | * | | | | |

    | | * | | | | |

    | | * | * | * | * | * |


    我们可以看到几种不同风格的字母L。


    ![](img/19247dc2edd12faecc2f050f298887d0_58_0.png)


    如果我们尝试将每种不同风格的字母L放入8行8列的方格中并使用 * 字符，我们脑海中会闪过哪些可能的想法？不同的字母风格意味着不同的图形，每个图形都会有不同的（行，列）值对集合。


    ![](img/19247dc2edd12faecc2f050f298887d0_58_1.png)


    很明显，使用 * 字符我们无法获得像素完美的图形。我们需要理解的最重要的一点是，**不同的图形输出意味着不同的逻辑条件**。这些图形对于开始学习应用逻辑条件来说有些高级。


    我们当然可以从一些非常简单的东西开始，这样即使是上学的孩子也无法找借口不喜欢编程。我们将选择一些对大多数人来说非常容易和熟悉的东西。我们将考虑编码结构非常简单的英文字母，如下例所示。


    | 字母 A | 字母 C | 字母 D |

    | :--- | :--- | :--- |

    | * * * * * | * * * * | * * * * |

    | * * | * | * * |

    | * * | * | * * |

    | * * * * * | * | * * |

    | * * | * | * * |

    | * * | * | * * |

    | * * | * * * * | * * * * |


    让我们回忆一下我们学生时代关于英文字母的学习经历。为了学习如何书写字母，我们的老师、父母和其他人教导了我们。他们以某种逻辑方式教我们书写字母。书写字母所应用的总逻辑因字母而异。由于每个字母的整体结构不同，我们有机会练习各种类型的逻辑条件。


    ## 将简单图形转换为逻辑条件


    我们将通过尝试从使用 * 字符绘制的非常简单的英文字母中获取逻辑条件来进行一些练习。我们可以考虑7行5列的方格。我们必须只选择那些有助于构成所需字母的（行，列）值对。我们将仅为那些匹配
    * 字符的（行，列）值对设置逻辑条件。


    **练习YBA：字母A需要放入一个7X5的方格中。**


    ![](img/19247dc2edd12faecc2f050f298887d0_59_0.png)


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |

    | row=6 | 6,1 | 6,2 | 6,3 | 6,4 | 6,5 |

    | row=7 | 7,1 | 7,2 | 7,3 | 7,4 | 7,5 |


    为了绘制字母A，让我们首先在第一行放置 * 字符。


    因此逻辑条件将是 **row==1**，其中 == 是等于比较运算符。


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1* | 1,2* | 1,3* | 1,4* | 1,5* |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |

    | row=6 | 6,1 | 6,2 | 6,3 | 6,4 | 6,5 |

    | row=7 | 7,1 | 7,2 | 7,3 | 7,4 | 7,5 |


    我们将使用逻辑或（ or ）条件运算符来添加更多数据。在我们的例子中，我们需要添加更多的 * 字符来完成字母A的另一部分。现在我们需要在第一列和最后一列放置
    * 字符。因此，使用或（ or ）逻辑运算符添加 **(col==1)** 和 **(col==5)** 逻辑条件意味着需要在以下方格中添加更多星号（*）字符。


    逻辑条件的更新如下所示：


    **(row==1) or (col==1)**


    **(row==1) or (col==1) or (col==5)**


