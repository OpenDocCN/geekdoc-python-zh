  md: "# Nested for-loop/Inner for-loop\n\nWe have previously seen examples of **for-loop**\
    \ that have if-statements or any other programming statements. Instead of programming\
    \ statement(s) within for-loop, if we place another **for-loop** within the **for-loop**,\
    \ then how things will be. For example;\n\n```\nfor counter in range(5,0,-1):\n\
    \    print(1*counter) # statement1\n    print(2*counter) # statement2\n    print(3*counter)\
    \ # statement3\n```\n\nWe know it will execute these considered statements in\
    \ order. Firstly, **statement1** will get executed, then **statement2** and lastly\
    \ **statement3** will get executed. These statements will repeat five times when\
    \ we execute the considered piece of the program. If we place another for-loop\
    \ instead of any simple statement, the major style of work doesn’t change. We\
    \ need to think that **the inner for-loop** itself is like some other single programming\
    \ statement. Suppose the control of a program executes programming statements\
    \ in a sequence and finds an **inner for-loop**. It will then fully execute the\
    \ **inner for-loop** and then execute the next programming statement(s) if there\
    \ are any available. For example;\n\n```\nfor counter in range(5,0,-1):\n    print(1*counter)\
    \ # statement1\n    # The for-loop is a statement2\n    for inner in range(1,5):\n\
    \        print(inner)\n    print(3*counter) # statement3\n```\n\n> Please treat\
    \ **nested for-loop** as a **single** programming statement\n\nAs usual, **statement1**\
    \ gets completed first. The inner for-loop will perform with 5 times repetitions,\
    \ and it will finally execute **statements3**. These three statements will repeat\
    \ five times, as suggested by the structure of the outer for-loop. A for-loop\
    \ placed within the code block of another for-loop is known as **inner for-loop**\
    \ or **nested for-loop**.\n\nThe inner for-loop will **restart from the beginning**\
    \ for every new value of an outer for-loop.\n\n![](img/19247dc2edd12faecc2f050f298887d0_48_0.png)\n\
    \nIt is easy to follow this concept if we try to relate it with a time piece clock\
    \ with the following assumptions\n\n+   - Inner Loop → It’s like a “seconds” hand\
    \ in a clock\n- Outer Loop → It’s like a “minute” hand in a clock\n\nIn a clock,\
    \ when the “seconds” hand completes one cycle, only then will the “minute” hand\
    \ get updated by counter value 1 and not before.\n\nThe **inner** for-loop will\
    \ execute completely before every new counter value of the **outer** for-loop\
    \ to continue repetition depends upon its loop condition."
