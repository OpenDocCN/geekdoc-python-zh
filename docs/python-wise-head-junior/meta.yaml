  md: "# Decision Making\n\nDuring the design of the program’s logic, compute the\
    \ decision-making first. There are only two perfect answers in this world, either\
    \ **YES** or **NO**. In programming, these perfect answers represent the boolean\
    \ data type. The boolean data type variable takes a single value at a time, which\
    \ can be **True** or **False**. So boolean value **True** represents **YES**,\
    \ and the boolean value **False** represents **NO**. While running the program,\
    \ the control of the program may find logical expression. It then tests this logical\
    \ expression to find the result. It expresses the result in terms of either **True**\
    \ or **False**. Based on the boolean result **True or False** of the logical expression,\
    \ the program’s control decides whether to execute or skip a bunch of programming\
    \ statements. We can compute decision-making using the following different versions\
    \ of decision-making **if-statements**.\n\n+   a) If-statement\nb) If-else: statement\n\
    c) If-elif -else:.....statement (Also known as ladder if-else statement)\n\nFlow-chart\
    \ helps to visualize the flow of control when the condition becomes either **True**\
    \ or **False**.\n\n# a) if-statement\n\n![](img/19247dc2edd12faecc2f050f298887d0_33_0.png)\n\
    \nThe general syntax for **if-statement** can be given as:\n\n```\nif (condition)\n\
    \    execute statement(s)    // If-block\n\nnext statement(s) // continue program\
    \ execution\n```\n\n+   - **condition:** It will be an expression consisting of\
    \ variables and operators in such a way whose outcome should be a boolean value,\
    \ either **True** or **False**. Since logical and comparison operators give either\
    \ **True** or **False** and are commonly used in a conditional expression.\n-\
    \ When the result of a **condition** is **True**, it will execute statement(s)\
    \ enclosed in the **If-block**"
