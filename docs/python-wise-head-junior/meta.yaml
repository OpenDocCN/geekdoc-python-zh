    \ | | | | | 0 | 0 | 0 | 0 | 0 | 0 | 0 |\n\n# NumberPattern 1A\n\nOur programming\
    \ job is to print this particular logic-based pattern on one part of the computer\
    \ screen. **Our approach will assume that the computer screen is a combination\
    \ of rows and columns, virtually dividing it into smaller boxes—the smallest box\
    \ treated as a resident of just a single character only.** The address in each\
    \ smallest box on the display screen will logically become a unique **(row, column)**\
    \ numeric combination. With this assumption, the computer screen will simply be\
    \ a unique combination of (row, column) numeric value paired boxes that are uniformly\
    \ spread all across the screen.\n\n![](img/19247dc2edd12faecc2f050f298887d0_203_0.png)\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_203_1.png)\n\n# Data Representation\n\
    \nAlthough it is logical, we can exactly locate the position of each printable\
    \ character on the display screen by knowing its uniquely identifiable **(row,\
    \ column)** numeric paired values.\n\n**For example;**\n**(4, 3)** means printing\
    \ numeric characters at the assumed screen location **4th row** and **3rd column**.\n\
    \n# (Row, Col) value pairs representation\n\n| | Col=1 | Col=2 | Col=3 | Col=4\
    \ | Col=5 |\n|---|---|---|---|---|---|\n| **Row=1** | 1,1 | | | | |\n| **Row=2**\
    \ | 2,1 | 2,2 | | | |\n| **Row=3** | 3,1 | 3,2 | 3,3 | | |\n| **Row=4** | 4,1\
    \ | 4,2 | 4,3 | 4,4 | |\n| **Row=5** | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |\n\n# Analysis\
    \ of output\n\nIt can also be interpreted in a tabular form.\n\n| row | 1 | |\
    \ | | |\n| Col | 1 | | | | |\n| Output | 1 | | | | |\n\nFor row =1, 1<=col<=1\n\
    \n| row | 2 | | | | |\n| Col | 1 | 2 | | | |\n| Output | 2 | 2 | | | |\n\nFor\
    \ row =2, 1<=col<=2\n\n| row | 3 | | | | |\n| Col | 1 | 2 | 3 | | |\n| Output\
    \ | 3 | 3 | 3 | | |\n\nFor row =3, 1<=col<=3\n\n| row | 4 | | | | |\n| Col | 1\
    \ | 2 | 3 | 4 | |\n| Output | 4 | 4 | 4 | 4 | |\n\nFor row =4, 1<=col<=4\n\n|\
    \ row | 5 | | | | |\n| Col | 1 | 2 | 3 | 4 | 5 |\n| Output | 5 | 5 | 5 | 5 | 5\
    \ |\n\nFor row =5, 1<=col<=5\n\n# COLUMN LEVEL REPETITIVE ACTION\n\n| Row level\
    \ Repetitive Action | Expected Output |\n| variable: row | Column level Repetitive\
    \ Action |\n| | lower_limit <= variable:col <= upper_limit |\n| totalRows = 5\
    \ | Range | lower_limit | upper_limit | |\n| row = 1 | 1 <=col<= 1 | 1 | 1 | 1\
    \ |\n| row = 2 | 1<=col<=2 | 1 | 2 | 2 2 |\n| row = 3 | 1<=col<=3 | 1 | 3 | 3\
    \ 3 3 |\n| row = 4 | 1<=col<=4 | 1 | 4 | 4 4 4 4 |\n| row = 5 | 1<=col<=5 | 1\
    \ | 5 | 5 5 5 5 5 |\n\nThe *upper_limit* value is based on how many times the\
    \ value is repeated in a particular row.\n\nThe **lower_limit** of col variable\
    \ has the same numeric value expression for every value of the row. It's consistent\
    \ for all the rows.\n\nLikewise, we need to develop such a consistent expression\
