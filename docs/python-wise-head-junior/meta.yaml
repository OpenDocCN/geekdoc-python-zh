  mdcn: "## 数字模式 1F\n\n我们的编程任务是在计算机屏幕的某个部分打印出这个特定的、基于逻辑的图案。**我们的方法将假设计算机屏幕是由行和列组合而成的，实际上将其划分为更小的方格——最小的方格被视为仅容纳一个字符。显示屏上每个最小方格的地址在逻辑上将成为一个唯一的（行，列）数字组合。基于这个假设，计算机屏幕将简单地成为一个由（行，列）数字值配对的方格组成的唯一组合，这些方格均匀地分布在整个屏幕上。**\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_237_0.png)\n\n![](img/19247dc2edd12faecc2f050f298887d0_237_1.png)\n\
    \n## 数据表示\n\n虽然这是合乎逻辑的，但我们可以通过知道每个可打印字符在显示屏上的唯一可识别的 **(行，列)** 数字配对值来精确定位其位置。*例如；*\
    \ **(4, 3)** 表示在假定的屏幕位置 **第4行** 和 **第3列** 打印数字字符。\n\n## (行, 列) 值对表示\n\n| | 列=1\
    \ | 列=2 | 列=3 | 列=4 | 列=5 |\n|---|---|---|---|---|---|\n| **行=1** | 1,1 | | |\
    \ | |\n| **行=2** | 2,1 | 2,2 | | | |\n| **行=3** | 3,1 | 3,2 | 3,3 | | |\n| **行=4**\
    \ | 4,1 | 4,2 | 4,3 | 4,3 | |\n| **行=5** | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |\n\n##\
    \ 输出分析\n\n它也可以用表格形式来解释。\n\n| 行 | 1 | | | | |\n| 列 | 1 | | | | |\n| 输出 | 1 | |\
    \ | | |\n\n对于行 =1，1<=列<=1\n\n| 行 | 2 | | | | |\n| 列 | 1 | 2 | | | |\n| 输出 | 0\
    \ | 0 | | | |\n\n对于行 =2，1<=列<=2\n\n| 行 | 3 | | | | |\n| 列 | 1 | 2 | 3 | | |\n\
    | 输出 | 1 | 1 | 1 | | |\n\n对于行 =3，1<=列<=3\n\n| 行 | 4 | | | | |\n| 列 | 1 | 2 | 3\
    \ | 4 | |\n| 输出 | 0 | 0 | 0 | 0 | |\n\n对于行 =4，1<=列<=4\n\n| 行 | 5 | | | | |\n|\
    \ 列 | 1 | 2 | 3 | 4 | 5 |\n| 输出 | 1 | 1 | 1 | 1 | 1 |\n\n对于行 =5，1<=列<=5\n\n##\
    \ 列级重复操作\n\n| 行级重复操作 | 预期输出 |\n| 行 | 列级重复操作 | |\n| | 重复的值 | 下限 <=列<= 上限 | |\n\
    | | | 下限 | 上限 | |\n| 1 | 1 | 1 | 1 | **1** |\n| 2 | 0 | 1 | 2 | **0 0** |\n| 3\
    \ | 1 | 1 | 3 | **1 1 1** |\n| 4 | 0 | 1 | 4 | **0 0 0 0** |\n| 5 | 1 | 1 | 5\
    \ | **1 1 1 1 1** |\n\n*上限* 值基于该值在特定行中重复的次数。\n\n列变量的 *下限* 对于每个行值具有相同的数字值表达式。它对所有行值都是一致的。同样，我们需要为上限开发一个一致的表达式，该表达式应适用于使用可用变量的任意行数。这些变量是行和总行数=5。\n\
    \n此外，列中重复的值在行中交替出现。似乎我们可以建立0或1值的出现与行值之间的关系。\n\n如果我们观察，它遵循奇偶规则。对于偶数值行，当行值是2的倍数时，我们需要打印零，否则打印一。因此，我们可以尝试根据行变量的值输出0或1。让我们尝试通过用可用变量表示来概括列的\
    \ **上限** 和 **重复的值**。\n\n| 列级重复操作 | 预期输出 |\n| :--- | :--- |\n| 行 | 重复的值 | 下限 <=列<=\
    \ 上限 | |\n| | | 下限 | 上限 | |\n| | 默认 | 1 | 默认 | 1 | |\n| 1 | 1 | 行%2==1 | 1 | 1\
    \ | 行 | 1 |\n| 2 | 0 | 行%2==0 | 1 | 2 | 行 | 0 0 |\n| 3 | 1 | 行%2==1 | 1 | 3 |\
    \ 行 | 1 1 1 |\n| 4 | 0 | 行%2==0 | 1 | 4 | 行 | 0 0 0 0 |\n| 5 | 1 | 行%2==1 | 1\
    \ | 5 | 行 | 1 1 1 1 1 |\n\n对于所有行，打印的值正好是列上限值的次数。\n\n因此，列变量的 *上限* 被概括为 **行** 变量。\n\
    \n列变量的 *下限* 和 *上限* 对于所有行都是一致的。\n\n现在它对于任意行数都是通用的。\n\n我们现在可以定义列级 **for循环**，它针对每个行值。\n\
    \n| 列级 *for循环* 的元素 | |\n| :--- | :--- |\n| 最小值 | 1 |\n| 最大值 | **行** |\n| 变量名 |\
    \ **列** |\n| 语句 | print(行, \" \", end=\" \") |\n\n此外，打印0或1可以通过检查if条件（行%2==1）或（行%2==0）来给出。\n\
    \n> **通用规则**\n\n可能会出现这样的情况，我们需要检查逻辑条件是否遵循 **(行+列)** 值、 **(行-列)** 值、 **(行*列)**\
    \ 值或 **(行%列)** 值的模式。\n\n通用规则是，如果遵循相同的数字模式/变化或由可用变量组成的简单数学公式，我们需要以某种方式用可用变量表示硬编码的值。\n\
