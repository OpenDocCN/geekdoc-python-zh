    \ # Move to the next row.\n    # Printing of characters will begin in the next\
    \ new line.\n```\n\n```\nOutput\n```\n\n```\n*       *\n* *   * *\n*   *   *\n\
    *       *\n*       *\n*       *\n*       *\n```"
