    \ 来打印每行数字的循环条件变为\n\n| 循环条件 | upper_limit >= num >= lower_limit |\n| :--- | :---\
    \ |\n| 数学表达式 | 2 * row - 1 >= num >= row |\n| 语法 | for num in range(2 * row -\
    \ 1, row - 1, -1): |\n\n因此，它有两个重复过程，一个用于打印空格，第二个用于打印数字值。这意味着它需要 2 个内部 for 循环（嵌套\
    \ for 循环）。\n\n流程图可以如下所示以捕获细节。\n\n![](img/19247dc2edd12faecc2f050f298887d0_298_0.png)\n\
    \n```python\n# NumberPatternBBB1.py\ntotalRows = 5  # 要显示的行数\n    # 行级重复操作：\n\
