    \  print(\" \", end = \" \")\n\n    for num in range(2 * row - 1, row - 1, -1):\n\
    \            # 为输出清晰添加了额外空格。\n        print(num , end = \" \")\n\n    print()\
    \  # 将控制移到下一行\n```\n\n## 输出\n\n```\n          1\n        3 2\n      5 4 3\n  \
    \  7 6 5 4\n  9 8 7 6 5\n```\n\n替代解决方案\n让我们设计一个解决方案，通过应用 if-else 条件语句将两个内部 for\
