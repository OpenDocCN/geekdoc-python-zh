    \ by reusing the same programming logic. Writing functions is a sensible idea\
    \ that suggests how we can encapsulate different programming logics under different\
    \ names. Hence, repetition of the same piece of programming logic should not happen\
    \ in other functions. It should be sliced out properly as only one type of action.\
    \ We can use them on demand, similar to how Lego toys are in use, building something\
    \ meaningful. We will learn the concept of code reuse by implementing the most\
    \ commonly used syntax to create a function. The function name should begin with\
    \ keyword def and must end with a colon (:). A function may omit or require parameters.\
    \ It all depends on whether the function requires to be input values. Basically,\
    \ function parameter works as a variable and so allow various input value. Our\
    \ functions should serve as a unique formula and optionally allow for input values\
    \ as required. We already got this idea by using different versions of in-built\
    \ methods or functions like print()–the example to create our own function with\
    \ parameters given as follows. The programming statements written in a function\
    \ should be equally indented.\n\n```\ndef functionName( parameter1, parameter2,...):\n\
    \n    # programming logic\n        statement-1\n        statement-2\n        ....................\n\
    \        statement-n\n```\n\nWhere parameter1, parameter2... are the inputs to\
    \ a function. We can store the output result of a function in a variable by means\
    \ of the function call given as follows.\n\n```\nresult = functionName( value1,\
    \ value2,...) # variable:result stores the output of this function call.\n```\n\
    \nfunctionName( value1, value2,...) is a function call, and we can call it many\
    \ times within a program to implement targeted functionality. The rules for naming\
    \ a function or a variable is the same and given as;\n\n+   1) Function name should\
    \ begin with either character: A-Z, a-z, and underscore(_).\n2) Remaining part\
    \ of the function name can contain the characters from A-Z, a-z, digits(0-9),\
    \ and underscore(_).\n3) Any reserved word which a programming language is using\
