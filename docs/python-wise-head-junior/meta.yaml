    # Strings


    It is a very common coding activity to modify or manipulate text at runtime like
    displaying text or part of the text in some way, dynamically creating web-page
    URL addresses or file paths, extracting specific information from a text like
    many develops web-scraping tools especially to extract text from web-pages. Every
    programming language provides in-built string libraries for string manipulation.
    We will experiment with some of the commonly used in-built string methods or functions.


    # String concatenation


    We can output strings by joining one another using the in-built join() method
    or using the + (plus) concatenation operator. We had already used the concatenation
    operator (+) many times in our early exercises.


    > It''s a wrong assumption that both variables **name** and **name1** will give
    the same output.


    It''s one of the most common mistake which many of beginner programmers does .


    ```

    name1 = "Steve"

    name2 = "Jobs"

    " ".join([name1, name2])

    ```


    ```

    StringConcat.py

    name1 = "Steve"

    name2 = "Jobs"


    print("X -> Common mistake while using join() and concatenation operator + ")

    # join() method is used to combine

    # the two given strings with space(" ") as a separator.

    # no assignment operator is being used to store the final result


    # common mistake

    " ".join([name1, name2])

    print(name1)

    name1 + " " + name2

    print(name1)

    print("Correct use of join() and concatenation operator +")

    # don''t forget to use assignment operator just like

    # we had used in case of numeric calculations

    name3 = " ".join([name1, name2])

    print(name3)


    name4 = name1 + " " + name2

    print(name4)

    ```


    ```

    Output

    X -> Common mistake while using join() and concatenation operator +

    Steve

    Steve

    Correct use of join() and concatenation operator +

    Steve Jobs

    Steve Jobs

    ```'
