  md: '# Acknowledgments


    I wish to personally thank everyone that helped me to make my first book possible.


    My sincere thanks to:


    My family who supported me throughout its completion.


    My youngest brother, Sadique S. Naikwadi, helped me tremendously in contributing
    technical reviews. He is a freelance developer and has always been famous for
    his programming skills since college times. He has worked on many different languages
    and never hesitates in trying programming heroics.


    He is always reached out by college mates and beginner programmers for improving
    their programming skills. His suggestions helped me easily write technical writings
    and discussed in detail the issues of a struggling programmer. There was a time
    when programming was alien to him, and the set of exercises covered in this book
    was once a test-bed for him, and he was able to pick programming very nicely.
    With all these important factors, he is the best person to give me an honest technical
    review. Moreover, he runs a test-bed based on this book’s exercises to help programmatically
    weak learners whenever he gets the chance.


    I like to thank Mrs. Shabana Mursal and her family. She is a teacher, and she
    made me understand how different teaching styles are important to teach students
    of different mindsets.


    Her inputs compelled me to put a completely new section which I would have never
    thought of including.


    Thank you all so much for taking an interest in helping me.'
