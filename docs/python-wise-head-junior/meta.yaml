  md: 'the very core level. Overall, it will help improve our logical thinking capabilities
    definitively, not in an unsure or guessing way.


    **To begin, we practice writing logical conditions manually. We try to confirm
    understanding of applying logical conditions on simple picture-based exercises
    such as alphabets of very simple structure.** Yes, of course, we can verify all
    these logical conditions by writing programs, which will be our next level of
    learning. Important, each logical condition can be verified easily by writing
    a program using **nested loops**. Working with nested loops will be our next major
    step in learning. We will try to transform our action of writing alphabets manually
    into a set of logical conditions. We will get the countable experience from such
    picture-based exercises because we can learn how to apply logical conditions.
    The considered alphabetic pictures suggest selecting only a particular set of
    (row, col) value pairs and leaving the others. It will force us to think about
    what could be the possible accurate, logical condition. Since it’s based on simple
    math and common sense, manually verifying these logical conditions won’t be difficult.
    When we do such exercises to transform from a simple picture to logical conditions
    or vice-versa, it helps us improve our visualization of programming logic.


    ![](img/19247dc2edd12faecc2f050f298887d0_55_0.png)


    Different alphabets mean different pictures. So in totality, it helps us know
    how the certain program works to give a targeted result. Additionally, we can
    verify all these logical conditions by placing them in a program and executing
    it to verify the results. The right time has not yet come for novice /absolute
    beginner programmers to verify it through writing programs.

    For those who are already experienced in any programming language to the extent
    of conditional statements and nested loops, surely they can go ahead and test
    their logical conditions. The first important lesson we should know is how to
    give proper logical conditions. We can clearly learn this important aspect of
    logic building by practicing different alphabets of simple structure into equivalent
    logical conditions.'
