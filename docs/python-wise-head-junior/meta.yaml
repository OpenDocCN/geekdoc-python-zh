  md: "| Equivalent If-else shortcut or ternary operator (:) expressions |\n| :---\
    \ |\n| `lw_lt_num = (totalRows - 1) if (row == 0) else (totalRows - row)` |\n\
    | `lw_lt_spaces = 0 if (row == 0) else (totalRows - row + 1)` |\n| `up_lt_spaces\
    \ = -1 if (row == 0) else (totalRows + row - 1)` |\n\nI am not really a great\
    \ fan of exceptions, but just to share information, even **nested ternary operator\
    \ is possible** like nested if-else. In most cases, it is not an easy read regarding\
    \ the evaluation of logical expressions. In some cases, proper formatting of nested\
    \ ternary operators may help but still implemented code will not be quick to grasp\
    \ for most junior-level programmers. As per my opinion, please avoid nested ternary\
    \ operators. The updated program is demonstrating the use of the ternary operator\
    \ (:) to gain readability regarding that coding part. Please notice code changes.\n\
    \n```\npython\nNumberPatternFF2.py\n\ntotalRows = 5  # number of rows to display\n\
    numSet2 = 0\n\n    # Row level Repetitive Action :\nfor row in range(0, totalRows):\n\
    \    # Column level Repetitive Action :\n    for col in range(1, 2 * totalRows):\n\
    \        # use of ternary operator, a simpler if-else shortcut\n        lw_lt_num\
    \ = (totalRows - 1) if (row == 0) else (totalRows - row)\n        lw_lt_spaces\
