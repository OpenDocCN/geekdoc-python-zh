    | col = 1 | col <= row | 1 | * |\n\n我们现在可以定义行级**递减 for 循环**。\n它从**变量：totalRows**的当前值开始，并重复递减直到变为\
    \ 1。\n请使用提到的更新程序验证结果。\n\n| 行级 For 循环的元素 | | | |\n| :--- | :--- | :--- | :--- |\n\
