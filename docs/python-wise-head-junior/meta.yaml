    # Pattern1D


    Our programming job is to print this particular logic-based pattern on one part
    of the computer screen. **Our approach will assume that the computer screen is
    a combination of rows and columns, virtually dividing it into smaller boxes**
    —the smallest box treated as a resident of just a single character only. Thus,
    the address in each smallest box on the display screen will logically become a
    unique **(row, column)** numeric combination. With this assumption, the computer
    screen will simply be a unique combination of (row, column) numeric value paired
    boxes that are uniformly spread all over the screen.


    ![](img/19247dc2edd12faecc2f050f298887d0_139_0.png)


    # Data Representation


    Although logically, we can exactly locate the position of each printable character
    on the display


    | Row, Col | Col = 1 | Col = 2 | Col = 3 | Col = 4 | Col = 5 |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | Row = 1 | * (1, 1) | * (1, 2) | * (1, 3) | * (1, 4) | * (1, 5) |

    | Row = 2 | | * (2, 2) | * (2, 3) | * (2, 4) | * (2, 5) |

    | Row = 3 | | | * (3, 3) | * (3, 4) | * (3, 5) |

    | Row = 4 | | | | * (4, 4) | * (4, 5) |

    | Row = 5 | | | | | * (5, 5) |


    > The pair (4, 5) represents a single character * at the assumed position of 4th
    row and 5th column on the display screen. The set of all value pairs (row = value,
    col = value) now represent this particular pattern.


