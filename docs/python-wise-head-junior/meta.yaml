    # NumberPattern GG


    Our approach will be to assume that the computer screen is a combination of rows
    and columns, virtually dividing it into smaller boxes —the smallest box treated
    as a resident of just a single character only. The address in each smallest box
    on the display screen will logically become a unique **(row, column)** numeric
    combination. With this assumption, the computer screen will simply be a unique
    combination of **(row, column)** numeric value paired boxes that are uniformly
    spread all across the screen.


    ![](img/19247dc2edd12faecc2f050f298887d0_280_0.png)


    | | Col=1 | Col=2 | Col=3 | Col=4 | Col=5 | Col=6 | Col=7 | Col=8 | Col=9 |

    |---|---|---|---|---|---|---|---|---|---|

    | Row=1 | A | B | C | D | E | D | C | B | A |

    | Row=2 | A | B | C | D | | D | C | B | A |

    | Row=3 | A | B | C | | | | C | B | A |

    | Row=4 | A | B | | | | | | B | A |

    | Row=5 | A | | | | | | | | A |


    # Data Representation


    Although it is logical, we can exactly locate the position of each printable character
    on the display screen by knowing its uniquely identifiable **(row, column)** numeric
    paired values. **For example; (4, 3)** means printing character at the assumed
    screen location **4th row and 3rd column**.


    # (Row, Col) value pairs representation


    | | Col=1 | Col=2 | Col=3 | Col=4 | Col=5 | Col=6 | Col=7 | Col=8 | Col=9 |

    |---|---|---|---|---|---|---|---|---|---|

    | Row=1 | (1,1) A | (1,2) B | (1,3) C | (1,4) D | (1,5) E | (1,6) D | (1,7) C
    | (1,8) B | (1,9) A |

    | Row=2 | (2,1) A | (2,2) B | (2,3) C | (2,4) D | 2,5 space | (2,6) D | (2,7)
    C | (2,8) B | (2,9) A |

    | Row=3 | (3,1) A | (3,2) B | (3,3) C | 3,4 space | 3,5 space | 3,6 space | (3,7)
    C | (3,8) B | (3,9) A |

    | Row=4 | (4,1) A | (4,2) B | 4,3 space | 4,4 space | 4,5 space | 4,6 space |
    4,7 space | (4,8) B | (4,9) A |

    | Row=5 | (5,1) A | 5,2 space | 5,3 space | 5,4 space | 5,5 space | 5,6 space
    | 5,7 space | 5,8 space | (5,9) A |


    This pattern is a special case of **NumberPatternFF**, which prints alphabets
    instead of numbers.'
