    \ **num**，它在每次新行开始时表示 (2*行 -1) 值。变量 num 的值然后在单行内振荡以给出输出。这可以通过下表显示。\n\n**num**\
    \ 变量从 (2*行 -1) 值开始的表格。\n\n| 行 | num | 列<totalRows | 列=totalRows | 列>totalRows\
    \ |\n| --- | --- | --- | --- | --- |\n| 1 | 1 | | 1 | |\n| 2 | 2 | 3 | 2 | **3**\
    \ |\n| 3 | 3 | 5 4 | 3 | **4 5** |\n| 4 | 4 | 7 6 5 | 4 | **5 6 7** |\n| 5 | 5\
    \ | 9 8 7 6 | 5 | **6 7 8 9** |\n\n| 列<totalRows | 列>=totalRows |\n| --- | ---\
    \ |\n| if( 列<totalRows ) | if( 列>=totalRows ) |\n| num =(2*行 -1) 值被打印。 | num 值被打印。\
