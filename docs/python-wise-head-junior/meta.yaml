- md: "## ROW LEVEL REPETITIVE ACTION\n\nThe same following statements had been repeated\
    \ 5 times (total number of rows).\n\n```\nColumn level for-loop # inner for-loop\n\
    print() # move to the next line\n```\n\nThe minimum and maximum value can be given\
    \ for the **for-loop** as\n\n*min_val* = 1 & *max_val* = 5 or totalRows\n\nLet's\
    \ consider;\n\n**row** → variable type of integer to store integer value one at\
    \ a time and represents row number between 1 and 5 (totalRows). The **totalRows**\
    \ has initially assigned the value 5.\n\nOuter **for-loop** starts at row=1 &\
    \ will repeat till row <= **totalRows**.\n\n| Elements Of Row Level *for-loop*\
    \ | |\n| :--- | :--- |\n| min_val | **1** |\n| max_val | **totalRows** |\n| variable_name\
    \ | **row** |\n| statement(s) | **Column level *for-loop***<br>print() # move\
    \ to the next line |\n\nWe got everything related to **for-loop** in order to\
