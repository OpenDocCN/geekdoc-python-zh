    \ | | | | | 0 | 0 | 0 | 0 | 0 | 0 | 0 |\n\n# 数字模式 1A\n\n我们的编程任务是在计算机屏幕的某个部分打印这个特定的基于逻辑的模式。**我们的方法将假设计算机屏幕是行和列的组合，实际上将其划分为更小的方框——最小的方框被视为仅包含一个字符。**\
