    \ 2 3 4\n1 2 3\n1 2\n1\n\n# Accessing each string’s character\n\nIn order to know\
    \ the composition of string, we can use string name followed by [index]. The “index”\
    \ means the position of a character in a given string. Let us suppose \"Program\"\
    \ is a string; then we can give it in a program as;\nstring = \"Program\"\nWhat\
    \ shall we expect from the string [index]? It can be given as follows:\n\n| string[index]\
    \ | Character at index position |\n| :--- | :--- |\n| string[0] | P |\n| string[1]\
    \ | r |\n| string[2] | o |\n| string[3] | g |\n| string[4] | r |\n| string[5]\
    \ | a |\n| string[6] | m |"
  - "[PAGE 329]\n\nLet's confirm our understanding using a given program.\n\n```\n\
    StringCharacters.py\nstring = \"Program\"\nlength = len(string)\n\nfor index in\
    \ range (0, length):\n    output = \"string[ \"+ str(index) + \"] = \" + string[index]\n\
    \    print(output)\n```\n\n```\nOutput\nstring[ 0] = P\nstring[ 1] = r\nstring[\
    \ 2] = o\nstring[ 3] = g\nstring[ 4] = r\nstring[ 5] = a\nstring[ 6] = m\n```\n\
    \nZERO is a valid index value in the **string[0]**, a character accessing method,\
    \ and it points to the first positioned character in a given string.\n\n**Exercise:**\
    \ Write a program for the following staircase look alike picture.\n\n```\nP_|_P\n\
    r__|__r\no___|___o\ng____|____g\nr_____|_____r\na______|______a\nm_______|_______m\n\
    m________|________m\ni_________|_________i\nn__________|__________n\ng___________|___________g\n\
    ```\n\n```\nStaircase.py\nstring = \"Programming\"\nstairStep = [\"\"]\n\nfor\
    \ index in range(0,len(string)):\n    stairStep.append(\"_\")   # append strings\n\
    \    ch = string[index]\n    print(ch,end=\"\")\n    for i in range(len(stairStep)):\n\
    \        print(stairStep[i],end=\"\")\n    print(\"|\",end=\"\")\n    for i in\
    \ range(len(stairStep)):\n        print(stairStep[i],end=\"\")\n    # Print last\
    \ char and then move to the next row\n    print(ch)\n```"
