- md: '## Convert Logical Conditions to Simple Picture


    We need to express logical conditions in the form of simple picture-based exercises.
    We need to mark those boxes with * character, which rightly fits a logical condition.
    A unique combination of (row, col) value pair represents each box. To understand
    how the selection of boxes is made using specific logical conditions are shown
    in the following exercises.


    **ExerciseYB1:** Express Logical condition: (row == col) in the following 5X5
    box.


    The condition (row == col) asks to find those (row, column) pairs in the 5X5 box
    where row value and column value are equal. We notice that the values of row and
    column are equal on the diagonal squares.


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5 |


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 * | 1,2 | 1,3 | 1,4 | 1,5 |

    | row=2 | 2,1 | 2,2 * | 2,3 | 2,4 | 2,5 |

    | row=3 | 3,1 | 3,2 | 3,3 * | 3,4 | 3,5 |

    | row=4 | 4,1 | 4,2 | 4,3 | 4,4 * | 4,5 |

    | row=5 | 5,1 | 5,2 | 5,3 | 5,4 | 5,5* |


    For clear understanding, boxes are marked with thick borders where the row and
    col values are equal.


    As per our rule, we should put * character on those boxes where the row and col
    values are equal.


    Removing other (row, col) value pairs where the row and col values are not equal
    indicates that the considered logical condition doesn''t select them. It simply
    means that only those boxes were chosen and marked with * character that matches
    the given logical condition. This way, we can represent particular logical conditions
    by filling small boxes with * character.


    So, the meaning of logical condition now took the visual form. The expression
    of the logical condition gets transformed into the simple picture of a line drawn
    diagonally using * characters. This helps us to understand how filtering/selection
    of data takes place when using logical conditions.


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1* | | | | |

    | row=2 | | 2,2* | | | |

