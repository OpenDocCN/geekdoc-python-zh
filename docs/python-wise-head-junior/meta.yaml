  md: "# Patterns by Single Looping\n\nWe can output some of the patterns that we\
    \ have earlier achieved using a nested loop (one for-loop within another for-loop)\
    \ by single **for-loop** using the **join()** method.\n\n![](img/19247dc2edd12faecc2f050f298887d0_324_0.png)\n\
    \n```\nStringPatternA1.py\n\ntotalRows = 5 # number of rows to display\nstrPlus\
    \ = \"\"  # initialize with blank string.\nstrJoin = \"\"  # initialize with blank\
    \ string.\n\nprint(\"Print using operator + \")\nprint()\nfor row in range(1,\
    \ totalRows + 1):\n    # Column level Repetitive Action : without for-loop\n \
    \   # append to the existing string using concatenation operator +\n    strPlus\
    \ = strPlus + \"* \"\n    # Print the updated string stored in variable:line\n\
    \    # and move to the next row\n    print(strPlus)\n\nprint()\nprint(\"Print\
    \ using in-built function join() \")\nprint()\nfor row in range(1, totalRows +\
    \ 1):\n    # Column level Repetitive Action : without for-loop\n    # append to\
    \ the existing string using single space(\" \") character\n    # as a separator.\n\
    \    strJoin = \" \".join([\"*\",strJoin])\n    # Print the updated string stored\
    \ in variable:line\n    # and move to the next row\n    print(strJoin)\n```\n\n\
    Output\n*\n* *\n* * *\n* * * *\n* * * * *"
