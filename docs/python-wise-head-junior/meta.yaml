  md: '# Logical Operators


    It also returns an ultimate value in either **True** or **False** similar to expression
    evaluation in comparison operator. It is primarily used to chain many logical
    expressions based on comparison operators. Following are types of logical operator’s
    name and their respective symbol.


    1) Logical AND ( **and** ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 2)
    Logical OR ( **or** ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 3) Logical
    NOT ( **not** )


    1) **Logical AND**: Returns **True** if and only if the result of **both logical
    expressions A and B are True** else False. The more we use this operator in a
    logical expression, the lesser the size of the data set we get out of total data.
    It is usually applied in a situation to get specific data or data of lesser range
    or size. Let’s suppose there are two integer variables, month = 10 and days =
    5. Please observe the column “**Result.**”


    | A | B | A and B | A | B | A and B = Result |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) and (True)
    = True |

    | True | False | False | month > 7 (True) | days > 7 (False) | (True) and (False)
    = False |

    | False | True | False | month < 10 (False) | days < 7 (True) | (False) and (True)
    = False |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) and
    (False) = False |


    2) **Logical OR**: Returns **False** if and only if when the result of **both
    logical expressions A and B are False** else True. The more we add OR condition
    using this operator in a logical expression, the more it increases the size of
    data as an output result. So, it is used to get a broader range of data. Let’s
    suppose there are two integer variables, month = 10 and days = 5. Please observe
    the column “**Result.**”


    | A | B | A or B | A | B | A or B = Result |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) or (True) =
    True |

    | True | False | True | month > 7 (True) | days > 7 (False) | (True) or (False)
    = True |

    | False | True | True | month < 10 (False) | days < 7 (True) | (False) or (True)
    = True |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) or (False)
    = False |


    3) **Logical NOT**: Returns just opposite, **True** when the outcome of the logical
    expression is False or returns False when the outcome of a logical expression
    is True.


    | A | not A |

    |---|---|

    | True | False |

    | False | True |


    **Please note that True/False values, also known as boolean values or truth values.**


    Usage of logical operators is quite common and plays a very important role in
    designing the logic of programs. Every programmer must and should have an obvious
    idea about the usage of these operators. It is worth the time spent if a beginner
    puts extra effort into experimenting with these operators.'
  merge: -1
