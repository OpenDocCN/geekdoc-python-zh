  md: '# Introduction


    Without a doubt, every subject has some key fundamental basis. If key concepts
    of any subject are truly internalized, then the rest of the learning will be productive.


    Many novice programmers and many frustrated programmers do ask similar kind of
    questions which are as follows


    “How to learn programming?”


    “How to develop logic-building skills?”


    “How to learn coding?”


    “How to improve programming logic?”


    Programming is an applied field. In my opinion, if a programmer who is weak in
    programming logic is not even a programmer. We know that complaining is the easiest
    job and if someone is an expert, they haven’t achieved anything big. So, whenever
    there is a problem, we need to think, “**what could be the easiest possible way
    out?**”


    In order to become confident in any programming language, the first step should
    be to gain some level of proficiency in self-hack programming logic. This technical
    manual is entirely dedicated to non-programmer/beginner or intermediate students
    who have reached a dead end while trying to become confident in programming. Additionally,
    if you are among those who have limited time to learn programming, this is the
    guide that can serve you well. **So, the rule of the thumb is that to learn programming
    language fast and properly, first learn the tactics of programming logic sufficiently.**


    ![](img/19247dc2edd12faecc2f050f298887d0_12_0.png)


    The most common mistake that many non-programmers/absolute beginners or trainers
    make is their focus on grammar/syntax and feature(s) of the programming language.
    Such a shallow outlook about programming language doesn’t help beginners much.
    Computer science is an applied field to solve practical problems. Therefore, it
    is a foremost and essential need that a beginner should be trained sufficiently
    in programming logic skills as the first priority. How appropriate physical exercises
    and healthy food tones the body muscles; similar is developing logical programming
    skills. It does need the right kind of logic-based programming exercises to groom
    visualization of programming logic.'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'It also happens that a beginner may know almost all the programming language
    concepts but still feels something is missing. That missing element is due to
    insufficient logic-building capabilities. Without a comfortable level of logic-building
    skills, the beginner becomes stagnated, and, on top of that, they face a lot of
    confusion while developing programs.


    # The Right Attitude


    > Failure taught me things about myself that I could have learned no other way.

    - J.K. Rowling


    By default, children are not afraid to be wrong, and so they are creative. It’s
    well-said that **hiding mistakes are a mistake of higher order**. So, it is always
    good to notice our mistakes as early as possible so that it shouldn’t give a hard
    blow in the future during the much-needed time. Experimenting and learning from
    mistakes work like a body detoxification program. Initially, any detoxification
    program doesn’t taste nice, but still, a person goes for it because they will
    love to see how the body will respond after 2-3 weeks. Anything new that we do
    take some practice. Everything valuable has a cost associated with it. Failures
    are one such type of cost that is to be paid to learn and to remember lessons.


    Getting accurate output after executing a program is just a by-product. So, the
    total learning will be failures plus the success part. So we need to think in
    this way; more initial failures will help us reduce the chances of failures in
    the future instead of thinking that we are not good learners. When a learner knowingly
    or unknowingly applies mismatching logical conditions, they may encounter unexpected
    output. This, in turn, creates curiosity about which specific logical condition
    is impacting the output differently. It’s easy for a brain to remember surprises.
    Moreover, a picture helps the brain remember more than the flowing texts, let
    it be any fact or concept. So, it’s much useful if a learner experiments with
    a weird or with some typical logical conditions and tries to find the reasons
    behind it. This will work like a self-motivating exercise, and it simply creates
    the urge to learn more.


    We all have hidden potential, and it is up to us to explore ourselves. You are
    the only person who can explore your hidden potential by taking challenges by
    experimenting with your capabilities. However, unless and until you take this
    journey of challenges, you will not know the **actual YOU**, or you will remain
    rather somebody else, a common class. *So you, I, and everybody* had to do this
    exercise of a treasure hunt within ourselves.


    It is all about the game of attitude and applying our actions in trying for excellence.
    We need to bounce back repetitively with another honest attempt. One of the main
    aims of this guide is to ignite the thought process and develop a natural tendency
    to solve problems by touching bare minimal technical details. We know that attitude
    measures altitude. The right intention gives a lot of power to manage even tough
    tasks with confidence. It is all about the perspective, the way we think, and
    approach the situation accordingly.'
