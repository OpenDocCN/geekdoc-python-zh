    | General data type | Value examples |

    | :--- | :--- |

    | Integer | **23, -4, 8908** |

    | Real Numbers | **23.45, 3.1456, -45.27** |

    | Truth Values | **True, False** |

    | text | **“Just do it”, “impossible”** |

    | Single Character | **A, a, @, $, %, *, 9** |


    Don’t we use a different variety of data in our daily life? We actually do, for
    example


    | Equivalent variable assignment | Filled in personal details |

    | :--- | :--- |

    | name = "Guido Van Rossum" | **Name : Guido Van Rossum** |

    | age = 63 | **Age: 63** |

    | weightInKgs = 53.6 | **Weight(In Kgs) : 53.6** |

    | personalLoan = False | **Personal loan (True/False): False** |

    | gender = ''M'' | **Gender : M** |


    We are sometimes required to fill correctly personal details in some way or another
    way. Few examples are, like school or college admission process, flight booking,
    or any online purchasing. We can easily distinguish different data types, whether
    it’s a type like numeric, textual, or any other kind. For example, the data value
    25 could be age, price, and many more possibilities. The name of the variable
    should be appropriately chosen. The variable''s chosen name helps us know the
    meaning of the stored value contained in it.


    **How to store data/value in a variable?**

    Yes, it is made possible through the facility of variable assignment using assignment
    operator (=).


    ## Variable assignment


    **The value of a variable can be over-written programmatically, which is why it’s
    called a variable.** Any real-time situation of manually filling data can be simulated
    using a programming language feature known as a variable assignment. A variable
    assignment is a simple act of storing an appropriate value in an appropriately
    chosen variable. We can assign the value to the variable using the assignment
    operator (=). **We can store or assign only one data at a time.** The contents
    of variables can be over-written programmatically during the course of running
    or executing the program. The format for variable assignment is as follows:


    ```

    variable_name = value  # assign only one data at a time

    ```


    The variable name doesn’t start with a number. Hence, a variable name like **4Age
    is invalid**

    **4Age = 20  # invalid variable name.**

    The name of a variable represents a memory location. It isn''t easy to do programming
    using the name of memory locations. Memory address location resembles not less
    than any secret key. The name of a variable that we choose should be a user-friendly
    name representing a specific memory location allocated to store data. Python provides
    the inbuilt methods -`id()` and `type()` to know the variable''s memory location
    and data type.


    ## Example4. Print basic information of a variable.


    ```

    VariableInfo.py

    # variable assignment of different data types

    # + can be used to join different texts/strings


    name = "Guido " + "Van " + "Rossum"

    age = 63

    weightInKgs = 53.6

    personalLoan = False

    gender = ''M''


    # output the content of variables

    print("Memory location = ", id(name),end=" | ")

    print("Data Type = ", type(name),end="   | ")

    print("name = ",name)


    print("Memory location = ", id(age),end=" | ")

    print("Data Type = ", type(age),end="   | ")

    print("age = ",age)


    print("Memory location = ", id(weightInKgs),end=" | ")

    print("Data Type = ", type(weightInKgs),end=" | ")

    print("weightInKgs = ",weightInKgs)


    print("Memory location = ", id(personalLoan),end=" | ")

    print("Data Type = ", type(personalLoan),end="   | ")

    print("personalLoan = ",personalLoan)


    print("Memory location = ", id(gender),end=" | ")

    print("Data Type = ", type(gender),end="   | ")

    print("gender = ",gender)

    ```


    ## Output


    ```

    Memory location =  140646950853848 | Data Type =  <class ''str''>   | name =  Guido
    Van Rossum

    Memory location =  140646971403136 | Data Type =  <class ''int''>   | age =  63

    Memory location =  140646951903496 | Data Type =  <class ''float''> | weightInKgs
    =  53.6

    Memory location =  140646971214752 | Data Type =  <class ''bool''>  | personalLoan
    =  False

    Memory location =  140646950860312 | Data Type =  <class ''str''>   | gender =  M

    ```


    Please revise these points regarding variables before you start writing programs.


    ![](img/19247dc2edd12faecc2f050f298887d0_22_0.png)


    The space in memory location can be expressed in terms of byte units. So, the
    size of primitive data types can be expressed in terms of bytes to store the value.
    (**Note: 1 byte = 8 bits.**)


    ## What is there in the variable’s name?


    We know that in geographical maps, the locations can be represented as a combination
    of longitude & latitude. Think for a moment if our city, town, street places are
    replaced by longitude and latitude values, how much it will become difficult to
    use it in our normal communication. So, the choice of a variable should be a meaningful
    name and must indicate some purpose associate with it. It is not uncommon to find
    such programmers who have this special **SLVNS** sickness.


    ## What is SLVNS sickness?


    **SLVNS** stands for **Single Letter Variable Name Syndrome**. Many programmers
    have this special habit of creating suspense through the name of a variable. They
    allocate just a single letter for a variable’s name in writing programs. When
    such a program becomes lengthy, and someone else has to fix a bug/error for that
    programming code, it will surely turn out to be an irritating experience. Even
    **SLVNS** programmers may find it difficult to get his/her own programming logic
    quickly on revisiting after a gap of time. If you find such programmers, please
    request them to change this habit; *it is an offense*. Please prevent yourself
    from this sickness and **be patient enough to write meaningful variable names**.


    ## Input From Keyboard


    In the previous example (**Example4**), the person’s information assigned to the
    respective variables is fixed. We can make it interactive so that the details
    can be supplied directly from the keyboard. To supply data directly from the keyboard,
    we need to use Python’s inbuilt function `input()`. It will be more positive if
    we input a user-friendly message while using method `input("Input message")`.

    **Example5**. Print person’s details from the keyboard.


    ```

    PersonDetails.py

    # input person details

    name = input("Enter Name:")

    age = input("Enter Age:")

    Weight = input("Enter Weight:")


    # output

    print() # Print blank line. Move to the next line

    print(" Person Details")

    print("========================")

    print("Name : " + name)

    print("Age : " + age)

    print("Weight : " + Weight)

    ```


    ## Output


    ```

    Enter Name:jacob

    Enter Age:45

    Enter Weight:93


    Person Details

    ========================

    Name: jacob

    Age: 45

    Weight: 93

    ```


    How to execute a .py file using IDLE Shell?


    1. # Invoke IDLE.


    ![](img/19247dc2edd12faecc2f050f298887d0_24_0.png)


    2. # Click the app to activate IDLE Shell.


    3. # Navigate **File→ Open** to select the python programming file **.py** which
    we like to execute.


    ![](img/19247dc2edd12faecc2f050f298887d0_24_1.png)


    In our case, we had recently created **PersonDetails.py** file. We will select
    this file. From the newly opened window, please select the menu option **Run→
    Run Module**.


    ![](img/19247dc2edd12faecc2f050f298887d0_25_0.png)


    4. # The IDLE shell will wait for keyboard input.


    ![](img/19247dc2edd12faecc2f050f298887d0_25_1.png)


    5. # After giving the input from the keyboard, please hit enter button. It will
    ask for the next input from the keyboard.


    ![](img/19247dc2edd12faecc2f050f298887d0_25_2.png)


    6. #After giving all the inputs from the keyboard, please hit the enter button
    to see the output, which was programmed in that way.


    ![](img/19247dc2edd12faecc2f050f298887d0_26_0.png)


    Execution of this program demonstrated how to take data input from the keyboard.
    It outputted the same exactly on the console. A console is a utility that interacts
    with the OS to perform certain interactive tasks. The console was waiting for
    the user’s data input from the keyboard. This exercise helps us know how to take
    dynamic input from the keyboard and passed to the program. We need to repeat this
    process for a different set of data inputs to tag another person’s details.'
  mdcn: '## 存储不同的数据类型


    软件的智能性源于编程语言。以某种形式处理不同的数据类型是几乎所有软件的核心功能。能够**正确处理不同类型的数据**是任何编程语言的必备特性——以下是常用不同数据类型的示例。


    | 通用数据类型 | 值示例 |

    | :--- | :--- |

    | 整数 | **23, -4, 8908** |

    | 实数 | **23.45, 3.1456, -45.27** |

    | 布尔值 | **True, False** |

    | 文本 | **“Just do it”, “impossible”** |

    | 单个字符 | **A, a, @, $, %, *, 9** |


    我们在日常生活中难道不使用各种不同的数据吗？我们实际上确实在使用，例如：


    | 等效的变量赋值 | 填写的个人信息 |

    | :--- | :--- |

    | name = "Guido Van Rossum" | **姓名 : Guido Van Rossum** |

    | age = 63 | **年龄: 63** |

    | weightInKgs = 53.6 | **体重(千克) : 53.6** |

    | personalLoan = False | **个人贷款 (True/False): False** |

    | gender = ''M'' | **性别 : M** |


    我们有时需要以某种方式正确填写个人信息。一些例子，比如学校或大学的入学流程、航班预订或任何在线购物。我们可以轻松区分不同的数据类型，无论是数值型、文本型还是其他任何类型。例如，数据值25可能是年龄、价格，还有更多可能性。变量的名称应该被恰当地选择。变量的命名有助于我们理解其存储值的含义。


    **如何将数据/值存储在变量中？**

    是的，这通过使用赋值运算符（=）的变量赋值功能得以实现。


    ## 变量赋值


    **变量的值可以通过编程方式被覆盖，这就是为什么它被称为变量。** 任何手动填写数据的实时场景都可以使用称为变量赋值的编程语言特性来模拟。变量赋值就是将一个合适的值存储在一个被恰当选择的变量中的简单行为。我们可以使用赋值运算符（=）将值赋给变量。**我们一次只能存储或赋值一个数据。**
    变量的内容可以在程序运行或执行过程中通过编程方式被覆盖。变量赋值的格式如下：


    ```

    variable_name = value  # assign only one data at a time

    ```


    变量名不能以数字开头。因此，像**4Age这样的变量名是无效的**

    **4Age = 20  # invalid variable name.**

    变量名代表一个内存位置。使用内存位置的名称进行编程并不容易。内存地址位置不亚于任何密钥。我们选择的变量名应该是一个用户友好的名称，代表分配用于存储数据的特定内存位置。Python提供了内置方法
    -`id()` 和 `type()` 来了解变量的内存位置和数据类型。


    ## 示例4. 打印变量的基本信息。


    ```

    VariableInfo.py

    # variable assignment of different data types

    # + can be used to join different texts/strings


    name = "Guido " + "Van " + "Rossum"

    age = 63

    weightInKgs = 53.6

    personalLoan = False

    gender = ''M''


    # output the content of variables

    print("Memory location = ", id(name),end=" | ")

    print("Data Type = ", type(name),end="   | ")

    print("name = ",name)


    print("Memory location = ", id(age),end=" | ")

    print("Data Type = ", type(age),end="   | ")

    print("age = ",age)


    print("Memory location = ", id(weightInKgs),end=" | ")

    print("Data Type = ", type(weightInKgs),end=" | ")

    print("weightInKgs = ",weightInKgs)


    print("Memory location = ", id(personalLoan),end=" | ")

    print("Data Type = ", type(personalLoan),end="   | ")

    print("personalLoan = ",personalLoan)


    print("Memory location = ", id(gender),end=" | ")

    print("Data Type = ", type(gender),end="   | ")

    print("gender = ",gender)

    ```


    ## 输出


    ```

    Memory location =  140646950853848 | Data Type =  <class ''str''>   | name =  Guido
    Van Rossum

    Memory location =  140646971403136 | Data Type =  <class ''int''>   | age =  63

    Memory location =  140646951903496 | Data Type =  <class ''float''> | weightInKgs
    =  53.6

    Memory location =  140646971214752 | Data Type =  <class ''bool''>  | personalLoan
    =  False

    Memory location =  140646950860312 | Data Type =  <class ''str''>   | gender =  M

    ```


    在开始编写程序之前，请注意关于变量的这些要点。


    ![](img/19247dc2edd12faecc2f050f298887d0_22_0.png)


    内存空间可以用字节单位来表示。因此，原始数据类型的大小可以用字节来表示以存储值。（**注意：1 字节 = 8 位。**）


    ## 变量名中有什么？


    我们知道，在地理地图上，位置可以用经度和纬度的组合来表示。试想一下，如果我们的城市、城镇、街道地点被经度和纬度值所取代，在我们的日常交流中使用它会变得多么困难。因此，变量的选择应该是一个有意义的名称，并且必须表明与之相关的某种目的。发现有这种特殊**SLVNS**疾病的程序员并不少见。


    ## 什么是 SLVNS 疾病？


    **SLVNS** 代表 **单字母变量名综合征**。许多程序员有这种通过变量名制造悬念的特殊习惯。他们在编写程序时只给变量名分配一个字母。当这样的程序变得冗长，并且其他人必须为该程序代码修复错误时，这肯定会变成一种令人恼火的经历。即使是
    **SLVNS** 程序员在间隔一段时间后重新审视时，也可能难以快速找到他/她自己的编程逻辑。如果你发现这样的程序员，请要求他们改变这种习惯；*这是一种冒犯*。请防止自己患上这种疾病，并**足够耐心地编写有意义的变量名**。


    ## 从键盘输入


    在前面的示例（**示例4**）中，分配给相应变量的个人信息是固定的。我们可以使其具有交互性，以便可以直接从键盘提供详细信息。要直接从键盘提供数据，我们需要使用
    Python 的内置函数 `input()`。在使用方法 `input("Input message")` 时输入用户友好的消息会更加积极。

    **示例5**. 从键盘打印个人信息。


    ```

    PersonDetails.py

    # input person details

    name = input("Enter Name:")

    age = input("Enter Age:")

    Weight = input("Enter Weight:")


    # output

    print() # Print blank line. Move to the next line

    print(" Person Details")

    print("========================")

    print("Name : " + name)

    print("Age : " + age)

    print("Weight : " + Weight)

    ```


    ## 输出


    ```

    Enter Name:jacob

    Enter Age:45

    Enter Weight:93


    Person Details

    ========================

    Name: jacob

    Age: 45

    Weight: 93

    ```


    如何使用 IDLE Shell 执行 .py 文件？


    1. # 调用 IDLE。


    ![](img/19247dc2edd12faecc2f050f298887d0_24_0.png)


    2. # 单击应用程序以激活 IDLE Shell。


    3. # 导航 **文件→ 打开** 以选择我们想要执行的 Python 编程文件 **.py**。


    ![](img/19247dc2edd12faecc2f050f298887d0_24_1.png)


    在我们的例子中，我们最近创建了 **PersonDetails.py** 文件。我们将选择此文件。从新打开的窗口中，请选择菜单选项 **运行→ 运行模块**。


    ![](img/19247dc2edd12faecc2f050f298887d0_25_0.png)


    4. # IDLE shell 将等待键盘输入。


    ![](img/19247dc2edd12faecc2f050f298887d0_25_1.png)


    5. # 从键盘输入后，请按回车键。它将要求从键盘进行下一次输入。


    ![](img/19247dc2edd12faecc2f050f298887d0_25_2.png)


    6. # 从键盘输入所有内容后，请按回车键查看输出，该输出是按此方式编程的。


    ![](img/19247dc2edd12faecc2f050f298887d0_26_0.png)


    执行此程序演示了如何从键盘获取数据输入。它在控制台上精确地输出了相同的内容。控制台是一个与操作系统交互以执行某些交互式任务的实用程序。控制台正在等待用户从键盘输入数据。此练习帮助我们了解如何从键盘获取动态输入并传递给程序。我们需要为不同的数据输入重复此过程，以标记另一个人的详细信息。'
