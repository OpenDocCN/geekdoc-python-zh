  md: '# How to make the best use of this book.?


    +   - Start a topic and learn till you reach a point where you are ready to analyze
    a solved example. Concentrate on that example till you get a feel that you have
    understood everything about the program.


    Then try to implement that solved example without referring to it. Make a strong
    will that once you start implementing an already studied program, you will not
    refer back to that particular solved program. You can refer to the theoretical
    explanation but not the program. There are a lot of chances that you may get many
    errors syntactically or logically as well. You can refer theoretical explanation
    about the concept in that situation but do not allow yourself to see the solution.
    Try your best to resolve issues by yourself, referring to theoretical explanation.


    - Please maintain an Excel or spreadsheet file to note down the errors you encountered
    in a program. When you can resolve the errors, please note down the reasons you
    have adopted that approach. Also note down, your initial and final observations
    when you had resolved a particular logical error. The study of such gap analysis
    helps us to know how to think in the right direction.


    - Every new day when you want to start your learning, please have a quick look
    at your error file that you were maintaining every time you encountered any error(s).
    Referring back to those errors while learning every new day will help you do better
    next time, and it will also help you quickly revise the concept. We should maintain
    this practice to avoid common logical errors, so those errors should not become
    part of our habit. So, it is good to correct those loopholes in the beginning
    since breaking a habit consumes sufficient effort. What we practice will become
    our habit, whether good or bad. Here, we are trying to **convert failures into
    lessons**. It is more rewarding when we improve from mistakes as early as possible
    to invest more time learning other important subjects in our lives.


    - If at least two times, you can solve all the solved examples from the book back
    to back without referring to the solutions, you will be in a better position to
    write the program effectively.


    - Hints are there for unsolved problems in the explanations of solved exercises.
    If you cannot solve unsolved problems, attempt 2-3 attempts and move forward to
    complete the book. Come back again and retry the remaining ones.


    - Students should be able to solve all the solved exercises without referring
    to the solutions, at least two times back-to-back. The same applies to unsolved
    problems too. It makes learners flexible in building a program''s logic, builds
    confidence, and inspires confidence in tackling more advanced programming subjects
    like data structures and design patterns.'
