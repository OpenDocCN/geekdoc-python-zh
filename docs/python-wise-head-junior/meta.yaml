  md: '# Operators


    A few special keyboard characters are used as operators in programming to denote
    frequent mathematical operations like addition, subtraction, comparing two numeric
    values, and many such operations. Calculation-based activities are very much common
    in our daily routine.


    *Arithmetic Operators*


    | Operator | Description | Purpose | Coding Expression |

    | :--- | :--- | :--- | :--- |

    | + | Addition | Addition of **intNum1** and **intNum2**. | **intNum1 + intNum2**
    |

    | - | Subtraction | Subtraction between **intNum1** and **intNum2**. | **intNum1
    - intNum2** |

    | * | Multiplication | Multiplying **intNum1** and **intNum2**. | **intNum1 *
    intNum2** |

    | ** | Exponentiation | **intNum1** raised to the power of **intNum2**. | **intNum1
    ** intNum2** |

    | / | Division | Quotient value when intNum1 is divided by intNum2. | **intNum1
    / intNum2** |

    | // | Floor Division | Quotient value **without decimal values** when **intNum1**
    is divided by **intNum2**. | **intNum1 // intNum2** |

    | % | Modulus | Remainder value when **intNum1** is divided by **intNum2**. |
    **intNum1% intNum2** |


    **Example 1.** Demonstrate given basic arithmetic operations using arithmetic
    operators.


    ```

    intNum1 = 6

    intNum2 = 4


    intNum1 + intNum2 = 10


    intNum1 - intNum2 = 2


    intNum1 * intNum2 = 24


    intNum1 ** intNum2 = 1296


    intNum1 / intNum2 = 1.5


    intNum1 // intNum2 = 1


    intNum1 % intNum2 = 2

    ```'
