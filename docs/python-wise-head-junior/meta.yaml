    \n![](img/19247dc2edd12faecc2f050f298887d0_17_1.png)\n\nAfter completing program\
    \ writing, **press 'enter'** on the keyboard to see the program's output.\n\n\
    We should save each program in its own file for later reference. Every file has\
    \ a name and extension. The extension of the program file is **“.py.”** Suppose\
    \ the name of our first program is Welcome, which will output a welcome message.\
    \ We should name the programming file with a meaningful name as per the purpose.\
    \ So, we should create a **Welcome.py** file.\n\n## First Python Program\n\nIt\
    \ is a good gesture to introduce programming to someone with a greeting message,\
    \ and it is not compulsory. Most often, first-time learners try to print “Hello\
    \ World” or their own name. The following **Welcome.py** python program outputs\
