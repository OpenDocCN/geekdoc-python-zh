    \ + 1\n\n    # Column level Repetitive Action :\n    # Print characters column-wise\
    \ or in the same row\n    for col in range(1, row - 2 * count + 1):\n        \
    \    print(\"* \", end= \"\")\n\n    # Ends inner for-loop\n\n    # move control\
    \ of a program to the next row\n    # in order to switch the printing of characters\
    \ to the next line.\n    print()\n    # Ends outer for-loop\n```\n\nVerify results\
    \ for a different number of lines. Let it be `totalRows` = 7,8 or 11.\n\n## Pattern1H\n\
    \nOur programming job is to output this pattern on one part of the computer screen,\
    \ as shown in the following. We can treat the computer screen as a combination\
