    # Logical Operators


    It also returns an ultimate value in either **True** or **False** similar to expression
    evaluation in comparison operator. It is primarily used to chain many logical
    expressions based on comparison operators. Following are types of logical operator’s
    name and their respective symbol.


    1) Logical AND ( **and** ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 2)
    Logical OR ( **or** ) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 3) Logical
    NOT ( **not** )


    1) **Logical AND**: Returns **True** if and only if the result of **both logical
    expressions A and B are True** else False. The more we use this operator in a
    logical expression, the lesser the size of the data set we get out of total data.
    It is usually applied in a situation to get specific data or data of lesser range
    or size. Let’s suppose there are two integer variables, month = 10 and days =
    5. Please observe the column “**Result.**”


    | A | B | A and B | A | B | A and B = Result |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) and (True)
    = True |

    | True | False | False | month > 7 (True) | days > 7 (False) | (True) and (False)
    = False |

    | False | True | False | month < 10 (False) | days < 7 (True) | (False) and (True)
    = False |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) and
    (False) = False |


    2) **Logical OR**: Returns **False** if and only if when the result of **both
    logical expressions A and B are False** else True. The more we add OR condition
    using this operator in a logical expression, the more it increases the size of
    data as an output result. So, it is used to get a broader range of data. Let’s
    suppose there are two integer variables, month = 10 and days = 5. Please observe
    the column “**Result.**”


    | A | B | A or B | A | B | A or B = Result |

    |---|---|---|---|---|---|

    | True | True | True | month > 7 (True) | days < 7 (True) | (True) or (True) =
    True |

    | True | False | True | month > 7 (True) | days > 7 (False) | (True) or (False)
    = True |

    | False | True | True | month < 10 (False) | days < 7 (True) | (False) or (True)
    = True |

    | False | False | False | month < 10 (False) | days > 7 (False) | (False) or (False)
    = False |


    3) **Logical NOT**: Returns just opposite, **True** when the outcome of the logical
    expression is False or returns False when the outcome of a logical expression
    is True.


    | A | not A |

    |---|---|

    | True | False |

    | False | True |


    **Please note that True/False values, also known as boolean values or truth values.**


    Usage of logical operators is quite common and plays a very important role in
    designing the logic of programs. Every programmer must and should have an obvious
    idea about the usage of these operators. It is worth the time spent if a beginner
    puts extra effort into experimenting with these operators.'
- md: "## Decision Making\n\nDuring the design of the program’s logic, compute the\
    \ decision-making first. There are only two perfect answers in this world, either\
    \ **YES** or **NO**. In programming, these perfect answers represent the boolean\
    \ data type. The boolean data type variable takes a single value at a time, which\
    \ can be **True** or **False**. So boolean value **True** represents **YES**,\
    \ and the boolean value **False** represents **NO**. While running the program,\
    \ the control of the program may find logical expression. It then tests this logical\
    \ expression to find the result. It expresses the result in terms of either **True**\
    \ or **False**. Based on the boolean result **True or False** of the logical expression,\
    \ the program’s control decides whether to execute or skip a bunch of programming\
    \ statements. We can compute decision-making using the following different versions\
    \ of decision-making **if-statements**.\n\n- a) If-statement\n- b) If-else statement\n\
    - c) If-elif-else statement (Also known as ladder if-else statement)\n\nFlow-chart\
    \ helps to visualize the flow of control when the condition becomes either **True**\
    \ or **False**.\n\n## a) if-statement\n\n![](img/19247dc2edd12faecc2f050f298887d0_33_0.png)\n\
    \nThe general syntax for **if-statement** can be given as:\n\n```\nif (condition)\n\
    \    execute statement(s)    // If-block\n\nnext statement(s) // continue program\
    \ execution\n```\n\n- **condition:** It will be an expression consisting of variables\
    \ and operators in such a way whose outcome should be a boolean value, either\
    \ **True** or **False**. Since logical and comparison operators give either **True**\
    \ or **False** and are commonly used in a conditional expression.\n- When the\
    \ result of a **condition** is **True**, it will execute statement(s) enclosed\
    \ in the **If-block**.\n\n## Case 1.\n\nageOfCitizen = 80\ncondition: ( ageOfCitizen\
    \ >= 60 ) will evaluate to True\nSo, if (80 >= 60) or if (condition) will be True,\
    \ then it executes the if-block.\n\n![](img/19247dc2edd12faecc2f050f298887d0_34_0.png)\n\
    \n```\nStatementIf.py\nageOfCitizen = 80\n\nif ageOfCitizen >= 60:\n    print(\"\
    Age group - Senior Citizens.\")\n```\n\n## Output\n\nAge group - Senior Citizens.\n\
    \n## Case 2. Change the value of ageOfCitizen in the program.\n\nageOfCitizen\
    \ = 40\ncondition: ( ageOfCitizen >= 60 )\nif(40 >= 60), will evaluate to False.\n\
    if( ageOfCitizen >= 60 ) will be False and it will not execute the if-block.\n\
    The output will be blank.\n\n![](img/19247dc2edd12faecc2f050f298887d0_34_1.png)\n\
    \n```\nStatementIf1.py\nageOfCitizen = 40\n\nif ageOfCitizen >= 60:\n    print(\"\
    Age group - Senior Citizens.\")\n```\n\n## Output\n\nIt didn't print anything\
    \ since the condition becomes failed and code block within if-statement doesn't\
    \ get executed.\n\n## b) if-else statement\n\n![](img/19247dc2edd12faecc2f050f298887d0_35_0.png)\n\
    \nThe general syntax for **if-else statement** can be given as:\n\n```\nif (condition)\n\
    \    execute statement(s)-1\nelse:\n    execute statement(s)-2\n\nnext statement(s)\
    \ // continue execution of program\n```\n\n```\nif(logical_condition)\n    statement\
    \ 1-1\n    statement 1-2\n    ...\n    statement 1-N\nelse:\n    statement 2-1\n\
    \    statement 2-2\n    ...\n    statement 2-N\n```\n\n## Case 1.\n\nnum1 = 80\n\
    num2 = 40\ncondition: ( num1 > num2)\nif(80 > 40), will evaluate to True.\nif(\
    \ num1 > num2) conditional statement will be True and executes the if-block.\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_36_0.png)\n\n```python\n# StatementIfElse.py\n\
    num1 = 80\nnum2 = 40\nif num1 > num2:\n    print(num1,\" is greater than \",num2)\n\
    else:\n    print( num1,\" is less than or equals to \", num2)\n```\n\n## Output\n\
    \n80 is greater than 40\n\n## Case 2. Change the value of num1 and num2 in the\
    \ program.\n\nnum1 = 40\nnum2 = 80\ncondition: ( num1 > num2)\nif(40 > 80) statement\
    \ will evaluate to False. Hence,\nif( num1 > num2) conditional statement will\
    \ be False. Program should execute the else code block.\n\n![](img/19247dc2edd12faecc2f050f298887d0_36_1.png)\n\
    \n```python\n# StatementIfElse.py\nnum1 = 40\nnum2 = 80\nif num1 > num2:\n   \
    \ print(num1,\" is greater than \",num2)\nelse:\n    print( num1,\" is less than\
    \ \",num2)\n```\n\n## Output\n\n40 is less than 80\n\n## c) if-elif-else statement\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_37_0.png)\n\nThe general syntax for\
    \ **if-elif-else statement** can be given as:\n\n```\nif (condition1)\n    execute\
    \ statement(s)-1\nelif(condition2)\n    execute statement(s)-2\nelse:\n    execute\
    \ statement(s)-3\n\nnext statement(s) // continue program execution\n```\n\n```\n\
    if(logical_condition1)\n    statement 1-1\n    statement 1-2\n    ....................\n\
    \    statement 1-N\nelif (logical_condition2)\n    statement 2-1\n    statement\
    \ 2-2\n    ....................\n    statement 2-N\nelse:\n    statement 3-1\n\
    \    statement 3-2\n    ....................\n    statement 3-N\n```\n\n## Case\
    \ 1.\n\nnum1 = 80\nnum2 = 40\ncondition: (num1 > num2)\nif (80 > 40), will evaluate\
    \ to **True**\nHence, if (num1 > num2) conditional statement will be **True**.\n\
    The program should execute the **if** code block.\n\n![](img/19247dc2edd12faecc2f050f298887d0_38_0.png)\n\
    \n```\nStatementIfElseIf.py\n```\n\n```\nnum1 = 80\n\nnum2 = 40\n\nif num1 > num2:\n\
    \    print(num1,\" is greater than \", num2)\n\nelif num1 < num2:\n    print(num1,\"\
    \ is less than %d\", num2)\n\nelse:\n    print(num1,\" equals to \", num2)\n```\n\
    \n```\nOutput\n```\n\n80 is greater than 40\n\n## Case 2. Change the value of\
    \ num1 and num2 in the program.\n\nnum1 = 40\nnum2 = 80\nif( num1 > num2 ) conditional\
    \ statement will evaluate to False and program’s control will check next if conditional\
    \ statement, which is else if( num1 < num2 ).\nif( num1 < num2 ) conditional statement\
    \ will be True, since (40 < 80) evaluates to True.\nThe program should execute\
    \ the else if code block.\n\n![](img/19247dc2edd12faecc2f050f298887d0_39_0.png)\n\
    \n```\nStatementIfElseIf.py\n\nnum1 = 40\n\nnum2 = 80\n\nif num1 > num2:\n   \
    \ print(num1,\" is greater than \", num2)\nelif num1 < num2:\n    print(num1,\"\
    \ is less than \",num2)\nelse:\n    print(num1,\" equals to \",num1)\n```\n\n\
    ## Output\n\n40 is less than 80\n\n## Case 3. Change the value of num2 in the\
    \ program.\n\nnum1 = 40\nnum2 = 40\n\n![](img/19247dc2edd12faecc2f050f298887d0_40_0.png)\n\
    \nThe (num1 > num2) logical expression will test to **False**, and then the program's\
    \ control will test the next logical expression (num1 < num2). The logical expression\
    \ (num1 < num2) will test as **False** because (40 < 40) will test as False. So,\
    \ else if ( num1 < num2 ) will also **not get executed** and finally execute the\
    \ last else code block. The else-block has no condition attached to it. The **last\
    \ else code block** will get executed when all the conditions will become failed.\
    \ It's a default block, and at least this block will get executed if no other\
    \ block.\n\n```python\nStatementIfElseIf.py\n\nnum1 = 40\n\nnum2 = 40\n\nif num1\
    \ > num2:\n    print(num1,\" is greater than \", num2)\nelif num1 < num2:\n  \
    \  print(num1,\" is less than \",num2)\nelse:\n    print(num1,\" equals to \"\
    ,num1)\n```\n\n## Output\n\n40 equals to 40\n\n*ProblemLadderIfElse*: A college\
    \ came up with an idea to encourage CS students by refunding some percentage of\
    \ their bi-semester CS Course fees. College management laid the following conditions\
    \ to be eligible for the same. Moreover, if a student scored in Grade-0, they\
    \ will be declared failed.\nIf a student scored in Grade-5, they would be eligible\
    \ for a 35% refund of the college fees.\nIf a student scored in Grade-4, they\
    \ would be eligible for a 25% refund of the college fees.\nIf a student scored\
    \ in Grade-3, they would be eligible for a 20% refund of the college fees.\nIf\
    \ a student scored in Grade-2, they would be eligible for a 10% refund of the\
    \ college fees.\nIf a student scored in Grade-1, they would be passed with a margin.\n\
    \n```\nLadderIfElse.py\ngrade = 6\nif grade == 1:\n    print(\"35% fee refund.\"\
    )\nelif grade == 2:\n    print(\"25% fee refund.\")\nelif grade == 3:\n    print(\"\
    20% fee refund.\")\nelif grade == 4:\n    print(\"10% fee refund.\")\nelif grade\
    \ == 5:\n    print(\"Passed with margin.\")\nelif grade == 0:\n    print(\"Failed,\
    \ please retry.\")\nelse:\n    print(\"Invalid grade ? \", grade)\n```\n\nIt’s\
    \ going to test **if-conditions** sequence-wise unless and until any one of the\
    \ **if-condition** becomes **True**. This type of many `elif` is also called a\
    \ **ladder else-if**, which is basically not a good practice. Two or three **elif\
    \ conditions** are considered okay, and furthermore, **elif conditions** are strongly\
    \ discouraged as it reduces the code readability.\n\n**Then what is the way out?**\n\
    The answer is implementing a **switch-case** construct. We use Python’s built-in\
    \ dictionary construct that performs mapping between grade value and respective\
    \ printing message. Dictionary basically is a collection of key-value pairs.\n\
    \n| Grade (key) | Printing Message (value as string) | Dictionary Example |\n\
    | :--- | :--- | :--- |\n| **Mapping 0 →** | \"Failed, please retry.\" | grade_message\
    \ = {0: \"Failed, please retry.\", |\n| **Mapping 1 →** | \"35% fee refund.\"\
    \ | 1: \"35% fee refund.\", |\n| **Mapping 2 →** | \"25% fee refund.\" | 2: \"\
    25% fee refund.\", |\n| **Mapping 3 →** | \"20% fee refund.\" | 3: \"20% fee refund.\"\
    , |\n| **Mapping 4 →** | \"10% fee refund.\" | 4: \"10% fee refund.\", |\n| **Mapping\
    \ 5 →** | \"Passed with margin.\" | 5: \"Passed with margin.\"} |\n| **Mapping\
    \ Other value →** | \"Invalid grade ?\" | |"
  mdcn: "## 决策制定\n\n在设计程序逻辑时，首先需要计算决策。在这个世界上，只有两个完美的答案，要么是**是**，要么是**否**。在编程中，这些完美的答案代表布尔数据类型。布尔数据类型变量一次只能取一个值，可以是**真**或**假**。因此，布尔值**真**代表**是**，布尔值**假**代表**否**。在运行程序时，程序的控制流可能会遇到逻辑表达式。然后它会测试这个逻辑表达式以得出结果。它用**真**或**假**来表示结果。根据逻辑表达式的布尔结果**真或假**，程序的控制流决定是执行还是跳过一组编程语句。我们可以使用以下不同版本的决策**if语句**来计算决策。\n\
    \n- a) if语句\n- b) if-else语句\n- c) if-elif-else语句（也称为阶梯式if-else语句）\n\n流程图有助于可视化当条件为**真**或**假**时控制流的走向。\n\
    \n## a) if语句\n\n![](img/19247dc2edd12faecc2f050f298887d0_33_0.png)\n\n**if语句**的一般语法可以表示为：\n\
    \n```\nif (condition)\n    execute statement(s)    // If-block\n\nnext statement(s)\
    \ // continue program execution\n```\n\n- **condition:** 它将是一个由变量和运算符组成的表达式，其结果应为布尔值，即**真**或**假**。由于逻辑和比较运算符产生**真**或**假**，并且常用于条件表达式中。\n\
    - 当**condition**的结果为**真**时，它将执行包含在**If块**中的语句。\n\n## 案例 1.\n\nageOfCitizen = 80\n\
    condition: ( ageOfCitizen >= 60 ) 的结果为真\n因此，如果 (80 >= 60) 或 if (condition) 为真，则执行if块。\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_34_0.png)\n\n```\nStatementIf.py\n\
    ageOfCitizen = 80\n\nif ageOfCitizen >= 60:\n    print(\"Age group - Senior Citizens.\"\
    )\n```\n\n## 输出\n\nAge group - Senior Citizens.\n\n## 案例 2. 更改程序中 ageOfCitizen\
    \ 的值。\n\nageOfCitizen = 40\ncondition: ( ageOfCitizen >= 60 )\nif(40 >= 60) 的结果为假。\n\
    if( ageOfCitizen >= 60 ) 将为假，因此不会执行if块。\n输出将为空。\n\n![](img/19247dc2edd12faecc2f050f298887d0_34_1.png)\n\
    \n```\nStatementIf1.py\nageOfCitizen = 40\n\nif ageOfCitizen >= 60:\n    print(\"\
    Age group - Senior Citizens.\")\n```\n\n## 输出\n\n由于条件失败，if语句内的代码块未被执行，因此没有打印任何内容。\n\
    \n## b) if-else语句\n\n![](img/19247dc2edd12faecc2f050f298887d0_35_0.png)\n\n**if-else语句**的一般语法可以表示为：\n\
    \n```\nif (condition)\n    execute statement(s)-1\nelse:\n    execute statement(s)-2\n\
    \nnext statement(s) // continue execution of program\n```\n\n```\nif(logical_condition)\n\
    \    statement 1-1\n    statement 1-2\n    ...\n    statement 1-N\nelse:\n   \
    \ statement 2-1\n    statement 2-2\n    ...\n    statement 2-N\n```\n\n## 案例 1.\n\
    \nnum1 = 80\nnum2 = 40\ncondition: ( num1 > num2)\nif(80 > 40) 的结果为真。\nif( num1\
    \ > num2) 条件语句将为真，并执行if块。\n\n![](img/19247dc2edd12faecc2f050f298887d0_36_0.png)\n\
    \n```python\n# StatementIfElse.py\nnum1 = 80\nnum2 = 40\nif num1 > num2:\n   \
    \ print(num1,\" is greater than \",num2)\nelse:\n    print( num1,\" is less than\
    \ or equals to \", num2)\n```\n\n## 输出\n\n80 is greater than 40\n\n## 案例 2. 更改程序中\
    \ num1 和 num2 的值。\n\nnum1 = 40\nnum2 = 80\ncondition: ( num1 > num2)\nif(40 >\
    \ 80) 语句的结果为假。因此，\nif( num1 > num2) 条件语句将为假。程序应执行else代码块。\n\n![](img/19247dc2edd12faecc2f050f298887d0_36_1.png)\n\
    \n```python\n# StatementIfElse.py\nnum1 = 40\nnum2 = 80\nif num1 > num2:\n   \
    \ print(num1,\" is greater than \",num2)\nelse:\n    print( num1,\" is less than\
    \ \",num2)\n```\n\n## 输出\n\n40 is less than 80\n\n## c) if-elif-else语句\n\n![](img/19247dc2edd12faecc2f050f298887d0_37_0.png)\n\
    \n**if-elif-else语句**的一般语法可以表示为：\n\n```\nif (condition1)\n    execute statement(s)-1\n\
    elif(condition2)\n    execute statement(s)-2\nelse:\n    execute statement(s)-3\n\
    \nnext statement(s) // continue program execution\n```\n\n```\nif(logical_condition1)\n\
    \    statement 1-1\n    statement 1-2\n    ....................\n    statement\
    \ 1-N\nelif (logical_condition2)\n    statement 2-1\n    statement 2-2\n    ....................\n\
    \    statement 2-N\nelse:\n    statement 3-1\n    statement 3-2\n    ....................\n\
    \    statement 3-N\n```\n\n## 案例 1.\n\nnum1 = 80\nnum2 = 40\ncondition: (num1\
    \ > num2)\nif (80 > 40) 的结果为**真**\n因此，if (num1 > num2) 条件语句将为**真**。\n程序应执行**if**代码块。\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_38_0.png)\n\n```\nStatementIfElseIf.py\n\
    ```\n\n```\nnum1 = 80\n\nnum2 = 40\n\nif num1 > num2:\n    print(num1,\" is greater\
    \ than \", num2)\n\nelif num1 < num2:\n    print(num1,\" is less than %d\", num2)\n\
    \nelse:\n    print(num1,\" equals to \", num2)\n```\n\n```\nOutput\n```\n\n80\
    \ is greater than 40\n\n## 案例 2. 更改程序中 num1 和 num2 的值。\n\nnum1 = 40\nnum2 = 80\n\
    if( num1 > num2 ) 条件语句的结果将为假，程序的控制流将检查下一个if条件语句，即else if( num1 < num2 )。\nif(\
    \ num1 < num2 ) 条件语句将为真，因为 (40 < 80) 的结果为真。\n程序应执行else if代码块。\n\n![](img/19247dc2edd12faecc2f050f298887d0_39_0.png)\n\
    \n```\nStatementIfElseIf.py\n\nnum1 = 40\n\nnum2 = 80\n\nif num1 > num2:\n   \
    \ print(num1,\" is greater than \", num2)\nelif num1 < num2:\n    print(num1,\"\
    \ is less than \",num2)\nelse:\n    print(num1,\" equals to \",num1)\n```\n\n\
    ## 输出\n\n40 is less than 80\n\n## 案例 3. 更改程序中 num2 的值。\n\nnum1 = 40\nnum2 = 40\n\
    \n![](img/19247dc2edd12faecc2f050f298887d0_40_0.png)\n\n逻辑表达式 (num1 > num2) 的测试结果为**假**，然后程序的控制流将测试下一个逻辑表达式\
    \ (num1 < num2)。逻辑表达式 (num1 < num2) 的测试结果将为**假**，因为 (40 < 40) 的测试结果为假。因此，else\
    \ if ( num1 < num2 ) 也**不会被执行**，最终执行最后一个else代码块。else块没有附加任何条件。当所有条件都失败时，**最后一个else代码块**将被执行。它是一个默认块，如果没有其他块被执行，至少这个块会被执行。\n\
    \n```python\nStatementIfElseIf.py\n\nnum1 = 40\n\nnum2 = 40\n\nif num1 > num2:\n\
    \    print(num1,\" is greater than \", num2)\nelif num1 < num2:\n    print(num1,\"\
    \ is less than \",num2)\nelse:\n    print(num1,\" equals to \",num1)\n```\n\n\
    ## 输出\n\n40 equals to 40\n\n*阶梯式if-else问题*：一所大学想出了一个主意，通过退还计算机科学学生部分双学期课程费用来鼓励他们。大学管理层制定了以下资格条件。此外，如果学生获得0级成绩，他们将被宣布不及格。\n\
    如果学生获得5级成绩，他们将有资格获得35%的学费退款。\n如果学生获得4级成绩，他们将有资格获得25%的学费退款。\n如果学生获得3级成绩，他们将有资格获得20%的学费退款。\n\
    如果学生获得2级成绩，他们将有资格获得10%的学费退款。\n如果学生获得1级成绩，他们将勉强及格。\n\n```\nLadderIfElse.py\ngrade\
    \ = 6\nif grade == 1:\n    print(\"35% fee refund.\")\nelif grade == 2:\n    print(\"\
    25% fee refund.\")\nelif grade == 3:\n    print(\"20% fee refund.\")\nelif grade\
    \ == 4:\n    print(\"10% fee refund.\")\nelif grade == 5:\n    print(\"Passed\
    \ with margin.\")\nelif grade == 0:\n    print(\"Failed, please retry.\")\nelse:\n\
    \    print(\"Invalid grade ? \", grade)\n```\n\n它将按顺序测试**if条件**，直到其中一个**if条件**变为**真**。这种包含多个`elif`的类型也称为**阶梯式else-if**，这基本上不是一个好的做法。两到三个**elif条件**被认为是可接受的，此外，**elif条件**被强烈不鼓励，因为它降低了代码的可读性。\n\
    \n**那么出路是什么？**\n答案是实现一个**switch-case**结构。我们使用Python内置的字典结构，它执行成绩值和相应打印消息之间的映射。字典基本上是键值对的集合。\n\
    \n| 成绩（键） | 打印消息（字符串值） | 字典示例 |\n| :--- | :--- | :--- |\n| **映射 0 →** | \"Failed,\
    \ please retry.\" | grade_message = {0: \"Failed, please retry.\", |\n| **映射 1\
    \ →** | \"35% fee refund.\" | 1: \"35% fee refund.\", |\n| **映射 2 →** | \"25%\
    \ fee refund.\" | 2: \"25% fee refund.\", |\n| **映射 3 →** | \"20% fee refund.\"\
    \ | 3: \"20% fee refund.\", |\n| **映射 4 →** | \"10% fee refund.\" | 4: \"10% fee\
    \ refund.\", |\n| **映射 5 →** | \"Passed with margin.\" | 5: \"Passed with margin.\"\
    } |\n| **映射 其他值 →** | \"Invalid grade ?\" | |"
