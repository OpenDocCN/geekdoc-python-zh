    \ 1) | col<( 3 * totalRows – row ) |\n\n使用变量 **colMin & colMax**，我们可以通过动态地将这些表达式赋值给这些变量来合并两个内部循环。\n\
    \n我们可以使用 **if-else** 语句来动态更新变量 **colMin & colMax**，如下所示。\n\n```\nif ( row <= totalRows\
