    | 5 | 0(无空格) | 1, 2, 3, 4, 5,6,7,8,9 | * * * * * * * * * |


    空格（“ ”）和星号（“*”）字符被重复多次。因此，我们可以为每个使用 **for循环**。我们可以如下填充表格：


    | 行级重复操作 | 预期输出 |

    | :--- | :--- |

    | 变量：row | 列级重复操作 | | | | |

    | | 变量：spaces | | 变量：col | | |

