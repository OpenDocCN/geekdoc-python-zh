    \n那么，让我们用这些更改更新我们之前的程序并执行程序。同时，通过将变量：totalRows 的值更改为7来测试不同的行数。\n\n```\nPatternH2_2.py\n\
    ```\n\n```\ntotalRows = 5  # number of rows to display\ncolMin = 0  # column position\
    \ to start printing character *\ncolMax = 0  # column position to stop printing\
