  - '[PAGE 89]


    # Learning by experiments and guesswork


    The usual and common way to learn programming is just by randomly experimenting
    with it. This takes much more time to learn programming as it required much practice.
    No doubt it has advantages, especially if we want to explore the API/in-built
    libraries or explore the features of a programming language. This particular learning
    style by guessing for beginners may act like a killer of interest in the programming
    subject itself. This way, it takes more time to learn programming, and yes, for
    some people, it is an interesting way. **However, everyone can’t guess every subject
    area, and there is no sure formula for guesswork for everyone to utilize.** It’s
    difficult for a person to experiment with programming who couldn’t make a good
    guess or even awkward guessing. The imagination regarding programming doesn’t
    flow for many of them, and the person’s mind goes blank. So it should not be a
    surprise if a person is good in many other activities and lacks patience in learning
    programming. This is not specific to learning programming as a subject; it could
    happen with learning any other subject.


    The ground reality is that if imagination and thought process doesn’t flow for
    a person trying to learn something, it just doesn’t go into the head. Learning
    programming by guessing is a switch off to many of them. It doesn’t reflect any
    standard way of learning. Instead, a systematic approach to learning programming
    based on simple math and common sense makes learners better thinkers. That approach
    dealt in depth at different levels of difficulties to properly learn programming
    logic is covered in the next section, **programming patterns**.


    In order to do programming in patterns, the person has to know for-loop and applying
    logical conditions well. Looping is the hardest. A nested loop challenges us to
    think logically in two different directions simultaneously to output a pattern,
    and any pattern is a 2-dimensional simple picture. These type of activities stimulates
    logical thinking. During learning, getting multiple and different thoughts are
    common. Let’s try to think about confusion or doubts from a different perspective.
    It creates a kind of suspense and makes learning exciting. Confusions and doubts
    are good for learning programming, and it is an indication that learner’s thought
    process and imagination becomes active. It does happen many times that clearing
    one’s doubt opens the door to explore knowledge in areas. So, doubt basically
    works like a surprise knowledge capsule. A learner needs to keep working in order
    to try to resolve that specific doubt or confusion. So, whenever we have any doubt,
    assume we have got one more chance to improve our intelligence.


    Obviously, learning will not last longer if a systematic approach does not support
    it. A person who is good at developing programming logic encounters lesser obstacles
    whenever required to deal with harder subjects of programming. So good programming
    logic is the key, and this book is all about developing programming logic skills,
    and it doesn’t matter if someone initially was a big zero in it. The content in
    this book surely helps a person to become interested in programming. The exercises
    are designed in a way to suit any new learner in increasing order of difficulty
    naturally. Some exercises are specially included only to surprise, forcing the
    learner to think out of the box.'
