    # First Python Program


    It is a good gesture to introduce programming to someone with a greeting message,
    and it is not compulsory. Most often, first-time learners try to print “Hello
    World” or their own name. The following **Welcome.py** python program outputs
    the text **Welcome to Programming**.


    ```

    Welcome.py

    # Print welcome message.


    print("Welcome To Programming")

    print(''Welcome To Programming'')

    ```


    ```

    Output

    Welcome To Programming

    Welcome To Programming

    ```


    To print textual content, we are required to put in `print()` method within double
    quotes(“running text”) or single quotes(‘running text’). Methods are ready-made
    facilities provided by a programming language. We need to learn how to apply these
    methods in what appropriate situation. It is just like how we refer dictionary
    of a particular language and use it to construct a sentence. Similarly, we need
    to use these methods in our programming statements. The step of writing effective,
    logical programming statements is one of the essentials of the writing program
    and is commonly known as logic building skills. Logic-building skills are must
    have to gain confidence and interest in programming. Comments are for our understanding/documentation
    purpose and later reference only. It is not a part of our programming statements.
    The environment which executes a program ignores it. The multi-line comments are
    given by `#` for each line. The single-line comment is given by `#` for single
    line.


    # Console Output


    We can start learning programming logic simply by repeatedly printing small text
    **horizontally in the same line** or **vertically in every line**. We can use
    method `print()` to output results in horizontal or vertical ways. Let’s try to
    learn how method `print()` behaves in different situations.


    **Exercise 1.** Printing the text "Welcome To Programming" using the multiple
    `print("text")` method.


    ```

