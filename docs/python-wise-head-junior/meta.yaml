  md: '# Pattern 1C


    Our programming job is to print this particular logic-based pattern on one part
    of the computer screen. **Our approach will assume that the computer screen is
    a combination of rows and columns, virtually dividing it into smaller boxes**—the
    smallest box treated as a resident of just a single character only. Thus, the
    address in each smallest box on the display screen will logically become a unique
    **(row, column)** numeric combination. With this assumption, the computer screen
    will simply be a unique combination of (row, column) numeric value paired boxes
    that are uniformly spread across the screen.


    ![](img/19247dc2edd12faecc2f050f298887d0_127_0.png)


    # Data Representation


    Although logically, we can exactly locate the position of each printable character
    on the display screen by knowing its uniquely identifiable **(row, column)** numeric
    paired values.


    | Row, Col | Col = 1 | Col = 2 | Col = 3 | Col = 4 | Col = 5 |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | Row = 1 | | | | | * (1, 5) |

    | Row = 2 | | | | * (2, 4) | * (2, 5) |

    | Row = 3 | | | * (3, 3) | * (3, 4) | * (3, 5) |

    | Row = 4 | | * (4, 2) | * (4, 3) | * (4, 4) | * (4, 5) |

    | Row = 5 | * (5, 1) | * (5, 2) | * (5, 3) | * (5, 4) | * (5, 5) |


    > The pair (4, 5) represents a single character * at the assumed position of 4th
    row and 5th column on the display screen. The set of all value pairs (row = value,
    col = value) now represent this particular pattern.


    # Analysis of output


    Computer dominantly works on very precise calculations. One interesting way to
    practice programming is to try converting manual steps of writing a given pattern
    into programming instructions. We can use paper or a spreadsheet. To analyze a
    pattern correctly, we can mark row numbers and column numbers to identify position-indicator
    logically.


    | | Col = 1 | Col = 2 | Col = 3 | Col = 4 | Col = 5 | WRITING ACTION |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | ROW | Move to Row = 1 | | | | | 1 → * | 4 spaces | Write * 1 time |

    | MOVEMENT | Move to Row = 2 | | | | 1 → * | 2 → * | 3 spaces | Write * 2 times
    |

    | ACTION | Move to Row = 3 | | | 1 → * | 2 → * | 3 → * | 2 spaces | Write * 3
    times |

    | | Move to Row = 4 | | 1 → * | 2 → * | 3 → * | 4 → * | 1 space | Write * 4 times
    |

    | | Move to Row = 5 | 1 → * | 2 → * | 3 → * | 4 → * | 5 → * | 0 space | Write
    * 5 times |


    Space is also a character like any other keyboard character. If a word or single
    non-spacing character is displayed on the screen after a gap, it means one or
    many space characters have to be printed before printing any other non-spacing
    character(s).'
