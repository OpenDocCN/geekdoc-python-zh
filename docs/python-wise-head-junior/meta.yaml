    \ (行 = 值, 列 = 值) 的集合现在代表这个特定的模式。\n\n## 输出分析\n\n计算机主要进行非常精确的计算。练习编程的一个有趣方法是尝试将编写给定模式的手动步骤转换为编程指令。我们可以使用纸张或电子表格。为了正确分析模式，我们可以标记行号和列号，以逻辑上识别位置指示符。\n\
    \n| | 列 = 1 | 列 = 2 | 列 = 3 | 列 = 4 | 列 = 5 | 写入操作 |\n| :--- | :--- | :--- | :---\
