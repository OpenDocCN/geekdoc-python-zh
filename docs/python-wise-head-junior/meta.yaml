    \ characters, has a unique code value, which is basically a number. So every character,\
    \ even the numbers also internally represented by a numeric value called **Unicode**.\
    \ We can use the in-built function **chr()** to get alphabets from their respective\
    \ Unicode values. It converts equivalent Unicode integer value to the character.\
    \ *For example;*\n\n```\n// converting integer data-type to char data-type\nunicode\
    \ = 65\nalphabet = chr(unicode)\n```\n\nSo in an increment value order of Unicode,\
