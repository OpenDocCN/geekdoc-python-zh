  md: '# First Python Program


    It is a good gesture to introduce programming to someone with a greeting message,
    and it is not compulsory. Most often, first-time learners try to print “Hello
    World” or their own name. The following **Welcome.py** python program outputs
    the text **Welcome to Programming**.


    ```

    Welcome.py

    # Print welcome message.


    print("Welcome To Programming")

    print(''Welcome To Programming'')

    ```


    ```

    Output

    Welcome To Programming

    Welcome To Programming

    ```


    To print textual content, we are required to put in `print()` method within double
    quotes(“running text”) or single quotes(‘running text’). Methods are ready-made
    facilities provided by a programming language. We need to learn how to apply these
    methods in what appropriate situation. It is just like how we refer dictionary
    of a particular language and use it to construct a sentence. Similarly, we need
    to use these methods in our programming statements. The step of writing effective,
    logical programming statements is one of the essentials of the writing program
    and is commonly known as logic building skills. Logic-building skills are must
    have to gain confidence and interest in programming. Comments are for our understanding/documentation
    purpose and later reference only. It is not a part of our programming statements.
    The environment which executes a program ignores it. The multi-line comments are
    given by `#` for each line. The single-line comment is given by `#` for single
    line.


    # Console Output


    We can start learning programming logic simply by repeatedly printing small text
    **horizontally in the same line** or **vertically in every line**. We can use
    method `print()` to output results in horizontal or vertical ways. Let’s try to
    learn how method `print()` behaves in different situations.


    **Exercise 1.** Printing the text "Welcome To Programming" using the multiple
    `print("text")` method.


    ```

    MultiplePrintMethod.py

    # Prwelcome message

    print("Welcome ")

    print("To ")

    print("Programming")

    ```


    ```

    Output

    Welcome

    To

    Programming

    ```


    We are not expecting a multi-line welcome message. We want a welcome message to
    be printed in a single line. It also suggests that the method `print("any text")`,
    every time chooses a new line to print "any text." We need to use attribute `end`
    of the method `print("text",end="\n")`.'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'The attribute **end** forces it to end the printing text in a specific way.
    If we don''t mention attribute **end** in a method `print("text")`, then it forces
    it to move to the new line after printing the specified "text" in the display
    screen. This is the default behavior of method `print("text")`.


    **Exercise 2.** Learning the default behavior of method `print("text")`.


    ```

    DefaultPrint.py

    # default usage of method print without using attribute ''end=''


    print("Welcome")

    print("To")

    print("Programming")


    print()

    print()

    print()


    # use of attribute ''end='' to end the text with a new line

    print("Welcome", end="\n")

    print("To", end="\n")

    print("Programming", end="\n")

    ```


    **Output**


    Line No.1  Welcome


    Line No.2  To


    Line No.3  Programming


    Line No.4


    Line No.5


    Line No.6


    Line No.7  Welcome


    Line No.8  To


    Line No.9  Programming


    Line No.4, Line No.5, and Line No.6 are blank lines due to method `print()`. This
    demonstrates the default behavior of attribute `end="\n,"` which moves the control
    to the new line. It suggests that next time the printing of text will start with
    this new line.

    To print the text in the same line using multiple `print("text")` methods, we
    are required to change this default behavior using the attribute **end**.


    **Exercise 3.** Printing the welcome message "Welcome To Programming" with an
    empty line.


    ```

    PrintInSameLine.py

    #attribute end="" to end the text with an empty line

    print("Welcome", end="")

    print("To", end="")

    print("Programming", end="")

    ```


    **Output**

    WelcomeToProgramming


    The welcome message was printed with no space between words. Let''s try to add
    space in between.'
