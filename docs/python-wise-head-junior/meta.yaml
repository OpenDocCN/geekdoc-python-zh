  md: '# Comparison Operators


    The comparison result of two values will either be **True** or **False**, and
    these values are also known as **boolean values or truth values**. This feature
    is very important since it will help make decisions as True or False. The computer
    memory is mainly based on 1(True) or 0(False) values, called **a bit value**.
    Every data in a computer is a combination of one’s and zero’s called bit pattern.


    **Unique value or data in a computer’s memory means a group of unique bit patterns.**


    | Operator | Comparison Operation Description |

    | --- | --- |

    | == | Equal |

    | != | Not Equal |

    | < | Less than |

    | <= | Less than or equal |

    | > | Greater than |

    | >= | Greater than or equal |


    Using comparison operators, we can compare two numeric values. The following example
    shows the use of comparison operators using numeric values.


    | Operator | Operand1(Operator) Operand2 | Result |

    | --- | --- | --- |

    | == | 4 == 4 | True |

    | | 4 == 10 | False |

    | != | 6 != 4 | True |

    | | 4 != 4 | False |

    | < | 6 < 10 | True |

    | | 6 < 6 | False |

    | <= | 6 <= 6 | True |

    | | 10 <= 6 | False |

    | > | 6 > 6 | False |

    | | 10 > 6 | True |

    | >= | 4 >= 6 | False |

    | | 10 >= 6 | True |


    We can also test the above results by storing the input values in variables and
    then applying comparison operators one by one. **Philosophically, True and False
    are the only two perfect answers in this world.** In a program, it requires us
    to do decision-making based on perfect answers. Developing logic based on operators
    is the need for the implementation of decision-making. It allows flexibility in
    handling different logical situations in a program. Sense and sensibility of applying
    logical conditions are one of the core aspects of any good programmer.


    **So please, invest quality time studying this topic with special attention.**


    Let’s verify the results using comparison operators on operands 4,6 and 10.


    ```

    ComparisonOperators.py

    four = 4

    ```'
