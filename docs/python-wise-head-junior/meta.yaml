    \n## Data Representation\n\nThe complete pattern can be easily expressed as a\
    \ collection of **selected** (row, column) numeric value pairs. Those selected\
    \ (row, column) numeric value pairs are shown in the given table structure. For\
    \ example, (2, 5) means character “*” at the **second row** and **fifth column**\
    \ in the table.\n\n| | Col=1 | Col=2 | Col=3 | Col=4 | Col=5 | Col=6 | Col=7 |\
    \ Col=8 | Col=9 |\n|---|---|---|---|---|---|---|---|---|---|\n| **Row=1** | |\
    \ | | | * (1,5) | | | | |\n| **Row=2** | | | | *(2,4) | * **(2,5)** | *(2,6) |\
    \ | | |\n| **Row=3** | | | *(3,3) | *(3,4) | * (3,5) | *(3,6) | *(3,7) | | |\n\
    | **Row=4** | | *(4,2) | ***(4,3)** | *(4,4) | * **(4,5)** | *(4,6) | ***(4,7)**\
    \ | *(4,8) | |\n| **Row=5** | *(5,1) | *(5,2) | *(5,3) | *(5,4) | * (5,5) | *(5,6)\
    \ | *(5,7) | *(5,8) | *(5,9) |\n| **Row=6** | | *(6,2) | ***(6,3)** | *(6,4) |\
    \ * **(6,5)** | *(6,6) | ***(6,7)** | *(6,8) | |\n| **Row=7** | | | *(7,3) | *(7,4)\
    \ | * (7,5) | *(7,6) | *(7,7) | | |\n| **Row=8** | | | | *(8,4) | * **(8,5)**\
    \ | *(8,6) | | | |\n| **Row=9** | | | | | *(9,5) | | | | |\n\nExercise. Complete\
