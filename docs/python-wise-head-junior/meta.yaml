    To

    Programming

    ```


    We are not expecting a multi-line welcome message. We want a welcome message to
    be printed in a single line. It also suggests that the method `print("any text")`,
    every time chooses a new line to print "any text." We need to use attribute `end`
    of the method `print("text",end="\n")`.'
