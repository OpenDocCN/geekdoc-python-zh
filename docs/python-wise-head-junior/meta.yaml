    | row=5 | *5,1 | *5,2 | *5,3 | *5,4 | *5,5 |


    Similarly, let’s take the other part of the logical condition, which is **(col
    ==1)**. Again, let’s select the boxes where the value of col is 1 irrespective
    of row value and by highlighting the selected boxes'' border.


    | | col=1 | col=2 | col=3 | col=4 | col=5 |

    |---|---|---|---|---|---|

    | row=1 | 1,1 | 1,2 | 1,3 | 1,4 | 1,5 |

