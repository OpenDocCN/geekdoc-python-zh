    5      # Column level Repetitive Action : without for-loop\n6      rowStr = str(row)\
    \ # updated code\n7      line = line +  rowStr\n8      print(line)\n```\n\n# Output\n\
    \n```\n1\n12\n123\n1234\n12345\n```\n\nSince strings can be given in single and\
    \ double quotes, we shall try inbuilt method `chr()` to print the given pattern.\
    \ We have to consider Unicode of integers also which points to following hint;\n\
