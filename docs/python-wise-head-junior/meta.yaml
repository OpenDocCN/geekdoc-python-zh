    \ min_val | max_val | |\n| 1 | 1 | 1 | * |\n| 2 | 1 | 2 | ** |\n| 3 | 1 | 3 |\
    \ *** |\n| 4 | 1 | 4 | **** |\n| 5 | 1 | 5 | ***** |\n| 6 | 1 | 4 | **** |\n|\
    \ 7 | 1 | 3 | *** |\n| 8 | 1 | 2 | ** |\n| 9 | 1 | 1 | * |\n\nThe remaining variables\
    \ are row & totalRows = 5. We can try to express column **max_val** of **col**\
    \ variable in terms of a numeric pattern of <u>row</u> values.\n\n| Row level\
    \ Repetitive Action | Expected Output |\n| :--- | :--- |\n| Variable: row | Column\
    \ level Repetitive Action | Variable: col | |\n| | min_val | max_val | | | | |\n\
    | 1 | 1 | 1 | row | row | row - 2*0 | * |\n| 2 | 2 | 2 | row | row | row - 2*0\
    \ | ** |\n| 3 | 3 | 3 | row | row | row - 2*0 | *** |\n| 4 | 4 | 4 | row | row\
    \ | row - 2*0 | **** |\n| 5 | 1 | 5 | 5 | row | row | row - 2*0 | ***** |\n| 6\
    \ | 4 | 6 - 2 | row - 2 | row - 2*1 | row - 2*1 | **** |\n| 7 | 3 | 7 - 4 | row\
    \ - 4 | row - 2*2 | row - 2*2 | *** |\n| 8 | 2 | 8 - 6 | row - 6 | row - 2*3 |\
    \ row - 2*3 | ** |\n| 2*5 - 1 | 1 | 9 - 8 | row - 8 | row - 2*4 | row - 2*4 |\
    \ * |\n\nWe can express column **max_val** of **col** variable in terms of <u>row</u>\
    \ variable, and part of the expression follows a multiple of 2 but for row values\
    \ greater than 5 or **totalRows**.\nIt has the condition when to increment the\
    \ multiple of 2 or not. The condition is handled by conditional statements, mostly\
    \ by **if-statement** or **if-else-statement** or **if-elif-else**. This we need\
    \ to handle using such conditional statement by declaring another integer variable,\
    \ for example;\ncount = 0 # counter to increment the multiple of 2.\nWe can give\
    \ an **if-statement** something like the following by incrementing the value of\
    \ the **variable: count**.\n\n```\n# increment count only when row value is greater\n\
    # than the total number of rows.\nif (row > totalRows):\n    # increment count\
    \ by 1.\n    count = count + 1\n```"
