    # NumberPatternEEE


    Our programming job is to print this particular logic-based pattern on one part
    of the computer screen. **Our approach will be to assume that the computer screen
    is a combination of rows and columns, virtually dividing it into smaller boxes**—the
    smallest box treated as a resident of just a single character only. The address
    in each smallest box on the display screen will logically become a unique **(row,
    column)** numeric combination. With this assumption, the computer screen will
    simply be a unique combination of **(row, column)** numeric value paired boxes
    that are uniformly spread all across the screen.


    ![](img/19247dc2edd12faecc2f050f298887d0_314_0.png)


    | | Col=1 | Col=2 | Col=3 | Col=4 | Col=5 | Col=6 | Col=7 | Col=8 | Col=9 |

    |---|---|---|---|---|---|---|---|---|---|

    | Row=1 | | | | | 1 | | | | |

    | Row=2 | | | | 3 | 2 | 3 | | | |

    | Row=3 | | | 5 | 4 | 3 | 4 | 5 | | |

    | Row=4 | | 7 | 6 | 5 | 4 | 5 | 6 | 7 | |

    | Row=5 | 9 | 8 | 7 | 6 | 5 | 6 | 7 | 8 | 9 |


    # Data Representation


    Although it is logical, we can exactly locate the position of each printable character
    on the display screen by knowing its uniquely identifiable **(row, column)** numeric
    paired values. **For example; (4, 3)** means printing numeric characters at the
    assumed screen location **4th row and 3rd column**.


    # (Row, Col) value pairs representation


    | | Col=1 | Col=2 | Col=3 | Col=4 | Col=5 | Col=6 | Col=7 | Col=8 | Col=9 |

    |---|---|---|---|---|---|---|---|---|---|

    | Row=1 | | | | | 1, 5 | | | | |

    | Row=2 | | | | 2, 4 | 2, 5 | 2, 6 | | | |

    | Row=3 | | | 3, 3 | 3, 4 | 3, 5 | 3, 6 | 3, 7 | | |

    | Row=4 | | 4, 2 | 4, 3 | 4, 4 | 4, 5 | 4, 6 | 4, 7 | 4, 8 | |

    | Row=5 | 5, 1 | 5, 2 | 5, 3 | 5, 4 | 5, 5 | 5, 6 | 5, 7 | 5, 8 | 5, 9 |'
