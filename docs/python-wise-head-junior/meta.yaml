    -   假设这个序列变得非常大，比如 2,4,6,………, 2000。我们将需要编写大约 4000 行代码，并重复相同的编程语句集大约 2000 次。\n\
    -   在处理高计算密集型数据或大型数据处理活动时，与计算机相比，人类在准确性和生产力方面并不可靠。除非有人去做，否则没有什么是自动的。我们可以使用 **for\
    \ 循环** 和 **`range()`** 函数来自动化生成所考虑的序列。\n-   **for 循环** 有助于在 **值范围** 内重复一组编程语句。当我们谈论范围时，它必须有一个起始值和一个结束值。\n\
