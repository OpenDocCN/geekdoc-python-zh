    \nprint(\"Welcome To Programming\")\nprint('Welcome To Programming')\n```\n\n\
    ```\nOutput\nWelcome To Programming\nWelcome To Programming\n```\n\nTo print textual\
    \ content, we are required to put in `print()` method within double quotes(“running\
    \ text”) or single quotes(‘running text’). Methods are ready-made facilities provided\
    \ by a programming language. We need to learn how to apply these methods in what\
