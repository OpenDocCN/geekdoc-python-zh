  md: '# ROW LEVEL REPETITIVE ACTION


    We have assigned unique values to each row starting from 1 to 9.


    We can represent value 9 as (2*5 – 1). The variable **totalRows** has initially
    assigned the <u>value 5</u>.


    So, we can generalize the maximum limit of the **row** variable using the variable.
    Let’s consider;


    **row** → variable **type of integer** to store integer value one at a time and
    represents row number between 1 and (2*totalRows - 1).


    We have logically divided <u>row level repetition</u> by **for-loop** into two
    parts due to two different versions of the <u>column level for-loop</u>.


    | Elements Of Row Level decrementing for-loop | |

    |---|---|

    | min_val | 1 |

    | totalRows | totalRows |

    | variable_name | row |

    | statement(s) | Column level for-loop_1 for printing star characters<br>print()
    # Move to the next row |


