  md: '# How to get generalized programming logic


    One suitable way to get generalized programming logic is to use our own version
    of the logic trace table. Basically, a logic trace table is a concept, and it
    can be applied in general to get the logic of a program. Obviously, its structure
    will get differ accordingly depends upon the type of problem to be solved. We
    are learning how to apply this concept of logic trace table. One of the interesting
    ways to do so is to implement console-based programs of the type pattern-recognition-based
    problems of various shapes. Getting the program''s logic is easy if we clearly
    understand how the changes in the logic trace table will impact the implementation
    of the program under consideration. Let''s try to understand the principles on
    which it works.


    # Principles of Logic trace Table/Observation Table


    It''s a set of ways for interacting with the program''s logic that hasn''t been
    actually explored yet. It helps in doing that. The final generalized programming
    logic is by nature made up of one more generalized logical expression. So, we
    need to trace out generalized logical expressions from the logic trace table.
    The way to get generalized logical expression is to follow a few of the given
    facts;


    +   ✓ The order of execution of variables in a given program. In our case, in
    general, the working program consists of outer-loop and inner-loop. Since we know
    that outer-loop executes before nested-loop, the **variable: row** will execute
    before the **variable: col**.


    ![](img/19247dc2edd12faecc2f050f298887d0_100_0.png)


    +   ✓ The logic trace table is a snapshot of how different variables store different
    values during program execution. For example, suppose two variables follow the
    same numeric pattern during the execution of the program. In that case, the variable
    which executes first will act as a replacement for the numeric pattern followed
    by the other variable. In this particular way, we need to try to replace a set
    of hard-coded numerical values with the available variable(s) of a given program.
    Hence, it is of utmost importance to check if any numeric pattern matching exists
    between the columns of the logic trace table.

    ✓ After completing numeric pattern matching and its replacement using the available
    variable(s), we need to check the consistency of an expression in a particular
    column. If it holds True, then it is a valid generalized logical expression. A
    generalized logical expression may consist of one or many variables.

    ✓ We need to check if there exists the same numeric value in a particular column
    throughout. If this holds True, then it must be a generalized numeric expression,
    a singular numerical value in the whole column.


    So, the bottom line is we need to update columns of a logic trace table till we
    get consistent numeric or logical expression(s) for all the rows. We will see
    how to apply these points practically to build the logic of a program. This is
    an attempt to design the program''s logic by applying **logic trace table principles
    on the columns of the given table to get** suitable numeric/logical expressions.
    We can start with creating our first version of the logic trace table using the
    **PatternA1If.py** program.'
