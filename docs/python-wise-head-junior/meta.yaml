    # Preface


    > EVEN THE GREATEST WAS ONCE A BEGINNER.

    DON''T BE AFRAID TO TAKE THAT FIRST STEP.

    - Muhammad Ali


    Programming is a kind of mental aerobics that teaches us to keep focus and nourishes
    good patience, discipline, and forecasting. These are some main qualities of an
    achiever.


    *Programming is for everybody and not just an academic exercise.*


    When you visualize and process the information, the learning will become active.
    When you apply the information naturally, there is no need for memorization. Programming
    is not about memorizing the programming logic. It is about applying techniques
    to solve problems. In order for one to apply an approach correctly, one should
    be able to visualize it correctly first. The best introduction to programming
    is to learn the logic of programming first. This is a means to build confidence
    and interest in programming. A programmer should be able to solve the following
    logic-based problem. Based on different inputs, a person should be able to generate
    a wristwatch of customized sizes. Because of a lack of wisdom in programming,
    most beginners cannot accomplish this. The excellent point is that learning logic-building
    skills does not require much technical baggage.


    ![](img/19247dc2edd12faecc2f050f298887d0_4_0.png)


    Many beginners judge that if they can learn syntax or explore some common built-in
    features of the programming language, they will learn how to solve problems. That
    is not the truth. Learning traffic rules and signboards by themselves won''t help
    someone become proficient in driving. You''ll have to take certain steps in the
    right direction. Syntax-oriented learning about programming language just gets
    you started. Syntax-oriented learning for a programming language is suitable for
    experienced programmers. Experienced programmers already possess that wisdom,
    so they only need to discover the language''s rules and features to use. This
    does not apply to beginners.'
  - '[PAGE 5]


    Developing the fertile ground for visualizing programming logic should be the
    focus of an absolute beginner. Unfortunately, this approach is foreign to most
    beginners and even to the teaching group as well. The exercises should be such
    that they will assist novices in learning or improving visualization of programming
    logic. Two major reasons why the approach mentioned in this book works for the
    novice or unconfident programmers;


    A) Visual learning is a great way to improve our learning skills. I had experimented
    using the mentioned approach with many students and found this to be an incredibly
    interesting way to learn to program quickly. These teachings are outlined in the
    book to help spark interest in programming. It is a proven practice built on common
    sense and basic mathematics; thus, practically anyone can learn programming without
    getting bogged down with technicalities.


    **Without sufficient logic-building skills, the efforts to learn advanced programming
    topics will be like talking to Gorilla; it will not be productive.**


    B) In addition, the content receives further refinement after interacting with
    beginner programmers on **Quora.com**. My contribution was recognized, and I believe
    that it will help a lot of beginners.


    ![](img/19247dc2edd12faecc2f050f298887d0_5_0.png)


    Please check the following post to get more details.


    [https://www.quora.com/How-can-I-improve-my-programming-skills-18/answers/140798300](https://www.quora.com/How-can-I-improve-my-programming-skills-18/answers/140798300)


    The learning process is always better when it is fun. They can treat this book
    as a supplementary text for both the students and the teachers, trainers, and
    whoever wants to pursue coding as a hobby. In addition, this resource can be useful
    to parents who want to teach their children coding. Parents, please save your
    hard-earned money and start coaching your children right away. Gift them this
    platform so that further learning for them will be a breeze.


    # Happy learning !!!'
