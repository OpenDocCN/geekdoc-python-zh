  md: '# COLUMN LEVEL REPETITIVE ACTION


    Let’s consider;


    **row** → variable type of integer to store integer value one at a time and represents
    row number between 1 and 9.


    **col** → variable type of integer to store integer value one at a time and represents
    column number between 1 and 9.


    **spaces** → variable type of integer to store integer value one at a time and
    represents space character at column number between 1 and **totalRows**.


    **totalRows** → variable type of integer to store integer value for the total
    number of rows which is 5 by default.


