    | Prints a character star when the condition is True for every value of the variable:
    col |

    |---|

    | col=1 | col=2 | col=3 | col=4 | ... | col= (totalRows + row) |

    | If ( condition = ( col >= (totalRows - row ) ) is True) |

    | Print star character |

