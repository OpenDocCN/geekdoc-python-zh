    ## 让我们使用内置方法将步骤转换为程序


    | 操作 | 代码 |

    | --- | --- |

    | 将光标移动到下一行 | `print()` |

    | 将光标移动到下一个（行，列）位置，然后在同一行打印空格“ ”字符。 | `print(" ",end="")` |

    | 将光标移动到下一个（行，列）位置，然后在同一行打印星号“*”字符。 | `print("*",end="")` |


    上述三种类型的编程语句预计会在程序中重复多次。因此，我们可以使用 **for循环** 来实现。


    ## 列级重复操作


    让我们考虑；


    **row** → 整数类型的变量，一次存储一个整数值，表示0到4之间的行号。


    **col** → 整数类型的变量，一次存储一个整数值，表示1到5之间的列号。


    **spaces** → 整数类型的变量，一次存储一个整数值，表示1到5列号之间的空格字符。


    **totalRows** → 整数类型的变量，用于存储总行数的整数值。


    (row, col) 值对描述了显示屏上“*”字符的位置


