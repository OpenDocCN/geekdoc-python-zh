    \ row | |\n\nThe numeric pattern of the column **max_val** of variable **col**\
    \ matches exactly the values(1 to 5) of the **row**. This specific part of the\
    \ numeric pattern (1 to 5) can be expressed in the `row` variable.\nThe condition\
    \ (col >=1) gives a starting point from which it will start printing star(“*”)\
    \ character(s) till the value of variable **row** reaches (**totalRows**).\nThe\
    \ variable **col** then starts decreases captured in the expression (**2*totalRows\
    \ - row**).\nSo, in this case, there is **not one but two generalized expressions**\
    \ for values of the variable **col**. This indicates that we need to use two separate\
    \ **for-loop** for the variable **col**.\n\nLet the following be the two versions\
    \ of column level for-loop for printing star (\"*\") character(s).\n\nColumn level\
    \ *for-loop_1* for printing star characters # inner for-loop\n\nColumn level *for-loop_2*\
    \ for printing star characters # inner for-loop\n\nWe can summarize it as:\n\n\
    | Print characters star(*) for every value of the variable: row |\n| :--- |\n\
    | row=1 | row=2 | row=3 | row=4 | row =totalRows | ............... | row= (2*totalRows\
    \ - 1) |\n| If ( condition=( col <=totalRows ) is True) |\n| Print star character\
    \ using Column level *for-loop_1* |\n| Else |\n| Print star character using Column\
