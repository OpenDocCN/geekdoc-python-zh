  md: '# tkinter Toplevel widget


    This widget is like Frame which is always contained in a new window, that will
    first create and then display the toplevel windows. These windows will be managed
    directly by the Windows manager. This widget may or may not have the parent window
    on top of them. This widget will be required whenever we want to see some group
    of widgets on the new window or we want to display some extra information and
    so on.


    The syntax is as follows:


    ```

    mytoplevel1= Toplevel(options...)

    ```


    Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, bd, cursor, font, class_, fg, height, relief, and width.


    We have seen most of the options but some undiscussed options are as follows:


    +   - **class_**: In this option, when we select the text within a text widget,
    and the text selected in the text manager will be exported. If set to 0, this
    option''s behavior is avoided.


    Some of the methods associated with this widget are as follows:


    +   - **deiconify()**: This method is used to display the window.

    - **iconify()**: This method will convert the top-level window into an icon without
    destroying it.

    - **frame()**: This method will show a system-dependent window identifier.

    - **group(window)**: This method will add a window to a specified window group.

    - **state()**: This method will get the current window state, which could be normal,
    iconic, zoomed, and withdrawn.

    - **protocol(name, function)**: This method will mention a function that will
    be called for the specific protocol.

    - **transient([window])**: This method will convert the window to a temporary
    window for the given master, when there is no argument.

    - **withdraw()**: This method will remove the window from the screen but it will
    not be destroyed.

    - **maxsize(width, height)**: This method will define the maximum size for the
    window.'
