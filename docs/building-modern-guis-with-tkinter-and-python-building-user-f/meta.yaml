    Python scripts to use **if \_\_name\_\_ == "\_\_main\_\_"** which is an entry
    point of any program. To show the main window itself, we are calling the mainloop
    method inside **if \_\_name\_\_ == "\_\_main\_\_"** block. So, we can make any
    large Python code by taking note of the usage of classes and objects to create
    GUI applications.


    The advantages of GUI creation using classes and objects in tkinter are as follows:


    +   - **Encapsulation:** By using classes, we may encapsulate a GUI''s functionality
    in a single class, simplifying the organization and maintenance of the code. Additionally,
    it lessens the complexity of the code and prevents naming disputes.

    - **Reusability:** We can construct reusable code that can be utilised in other
    apps or sections of an application by defining classes and objects.

    - **Modularity:** Classes and objects facilitate code modularization by making
    it simpler to divide different elements of a GUI, such as the design and the functionality.

    - **Inheritance:** Subclasses that are created through inheritance will take on
    the parent class''s attributes and functions. When building similar GUI elements
    with somewhat differing functionality, this can save time and effort.'
