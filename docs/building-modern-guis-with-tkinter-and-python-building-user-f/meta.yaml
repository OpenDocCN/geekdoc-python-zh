  - '[PAGE 195]


    # Objectives


    By the end of this chapter, the reader will learn about the creation of a simple
    GUI app using the tkinter Label widget which depicts the ways of displaying a
    text or image on a window form. We shall also view a display of prompt unedited
    text messages to the user, with the tkinter Message widget. Moreover, we will
    look into multiple message boxes such as information, warning, error, and so on,
    in a Python application by using the tkinter MessageBox widget.


    # tkinter Label Widget


    It is a standard tkinter widget where a text or an image can be displayed on the
    screen. The text can be underlined, can be displayed in a single font and the
    text may be spanned across multiple lines. It uses double buffering so that the
    contents may be updated at any time without display of any flickering. In this
    widget, one or more lines of text can be displayed which cannot be modified by
    the user.


    The syntax is as follows:


    ```

    myl1= Label(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the list of options that can be used as key-value pairs and are separated
    by commas, are anchor (space between are and anchor), bg, bitmap, bd, cursor,
    font, height, fg, justify, image, padx, pady, text, textvariable, relief, width,
    wraplength, underline.


    We have seen most of the options but some undiscussed options are as follows:


    +   - **text**: This option will display the text on the label. The ''\n'' will
    force a line break. So, one or more lines of text in the label can be displayed.
    This option is ignored when the image or bitmap options are used.

    - **textvariable**: This option will associate a tkinter variable (generally the
    StringVar) with the label. The label text is updated if the variable is changed.

    - **image**: This option will display the image in the label and the value should
    be a BitmapImage or a PhotoImage. This option takes precedence over the bitmap
    and text options.

    - **justify**: This option will define the alignment of multiple lines of text
    with respect to each other. The default is CENTER and the other is LEFT or RIGHT.'
