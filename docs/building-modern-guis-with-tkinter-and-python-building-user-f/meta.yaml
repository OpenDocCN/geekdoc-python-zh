- md: "## CHAPTER 10\nGetting Widget Information and Trace in tkinter\n\n## Introduction\n\
    \nMany a times, it is necessary to get to know the widget information and traces\
    \ in a Python application. The widget’s size, position, and condition are among\
    \ the first details about which we can know. The widget may be displayed differently\
    \ or controlled using this information. Additionally, it enables us to trace the\
    \ changes made to the widget, such as when its text or state is altered. Other\
    \ widgets or other actions may be updated using this information. Moreover, the\
    \ behavior of the widget can be customized based on its current value or state\
    \ by using trace. So, in this chapter, we shall learn about how to get widget\
    \ information and explore various trace methods using tkinter library.\n\n## Structure\n\
    \nIn this chapter, we will discuss the following topics:\n\n- Getting widget information\n\
    - Trace in tkinter\n\n## Objectives\n\nAfter going through this chapter, the reader\
    \ will learn about how to get widget information with the help of multiple examples.\
    \ We will also deal with different trace methods viz trace add, trace remove,\
    \ trace info, and so on.\n\n## Getting widget information\n\nThere are a set of\
    \ **winfo_methods** that gives access to the widget information. A few useful\
    \ methods are as follows:\n\n- **winfo_width()**: This method will return the\
    \ widget width.\n- **winfo_height()**: This method will return the widget height.\n\
    \nRefer to the following code:\n\n```\nfrom tkinter import *\n\nmyroot = Tk()\n\
    \nmycanvas = Canvas(myroot, width= 300 ,height = 350)\n\nprint(\"Before packing\
    \ width is: \" + str(mycanvas.winfo_width()))\n\nprint(\"Before packing height\
    \ is: \" + str(mycanvas.winfo_height()))\n\nmycanvas.pack()\n\nmycanvas.update()\n\
    \nprint(\"After packing and updating width is: \" + str(mycanvas.winfo_width()))\n\
    \nprint(\"After packing and updating height is: \" + str(mycanvas.winfo_height()))\n\
    ```\n\n**Output:**\n\nBefore packing width is: 1\n\nBefore packing height is:\
    \ 1\n\nAfter packing width is: 304\n\nAfter packing height is: 354\n\nNote: The\
    \ preceding code is covered in Program Name: Chap10_Example1.py\n\n- **winfo_children()**:\
    \ This method will return a child widget’s list.\n\n```\nfrom tkinter import *\n\
    \nmyroot = Tk()\nmyroot.geometry('300x160')\n\nmye1 = Entry(myroot)\nmye1.pack(pady\
    \ = 10)\n\nmybtn1 = Button(myroot, text = 'Button')\nmybtn1.pack(pady = 10)\n\n\
    myl1 = Label(myroot, text = 'Label')\nmyl1.pack(pady = 10)\n\n# we are iterating\
    \ on each child widget of the parent window and disabling them\nfor loop in myroot.winfo_children():\n\
    \    loop.config(state='disable')\n\nmyroot.mainloop()\n```\n\nOutput:\n\nThe\
    \ output can be seen in Figure 10.1:\n\n![](img/ecddba8119455057e37d50bbef734ff6_322_0.png)\n\
    \nFigure 10.1: Output\n\nNote: The preceding code is covered in Program Name:\
    \ Chap10_Example2.py\n\n- **winfo_geometry()**: This method will return widget\
    \ size and location.\n\n```\nfrom tkinter import *\n\nmyroot = Tk()\n\nmyroot.geometry('300x160+150+300')\n\
    \nmyroot.update()\n\nprint(myroot.winfo_geometry())\n\nmyroot.mainloop()\n```\n\
    \nOutput at the console:\n\n300x160+150+300\n\nOutput position of the window at\
    \ the monitor screen\n\nWhere 300 is the width, 160 is the height, and (150 shifted\
    \ on x axis, 300 shifted on y axis)\n\nRefer to Figure 10.2:\n\n![](img/ecddba8119455057e37d50bbef734ff6_323_0.png)\n\
    \nNote: The preceding code is covered in Program Name: Chap10_Example3.py\n\n\
    - **winfo_ismapped()**: This method will determine whether the widget is mapped\
    \ or not, meaning that it has been added to the layout using a **pack()** and\
    \ **grid()**.\n\n```\nfrom tkinter import *\n\nmyroot = Tk()\n\ndef myforget(widget):\n\
    \    widget.forget()\n    print(f\"Is {widget['text']} mapped after calling forget\
