    \n图 8.2：点击欢迎按钮时的输出\n\n**注意：前面的代码包含在程序名称：Chap8_Example1.py 中**\n\n在此代码中，我们创建了一个菜单栏，并创建了\
    \ Welcome! 和 Quit! 项。菜单使用 `config()` 方法附加到窗口。点击 *Welcome!* 菜单项时，将显示 *Welcome!*\
    \ 消息。点击 *Quit!* 菜单项时，GUI 应用程序将关闭。\n\n现在，我们将看一个例子，其中我们将向菜单栏添加诸如文件和编辑菜单，并为这些菜单分配一些项目：\n\
    \n```\npython\nfrom tkinter import * # 导入模块\n\nmyroot = Tk() # 创建窗口并初始化解释器\n\n\
    # 创建主菜单\nmymainmenu = Menu(myroot)\nmyroot.config(menu = mymainmenu) # 需要将上述菜单附加到根窗口\n\
    \n# 创建文件菜单 -- 对应于主菜单的子级菜单\nmyfilemenu = Menu(mymainmenu, tearoff=0) # 通过设置 tearoff\
