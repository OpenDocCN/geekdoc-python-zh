    # place()


    It simpler than the other 2 geometry managers. This geometry manager will organize
    the widgets in a specific position in the parent widget. It is placed at some
    specific position in the parent widget. It can be used with **pack()** as well
    as **grid()** method.


    The syntax is


    ```

    widget.place(options,...)

    ```


    The options are:


    +   - **anchor**: This option will indicate where the widget is anchored to and
    has compass directions as: N, S, E, W, NE, NW, SE, or SW, which are related to
    the sides and corners of the parent widget. The default compass direction is NW.

    - **bordermode**: This option will indicate whether the widget border portion
    is included in the coordinate system or not. The default is INSIDE and the other
    is OUTSIDE.'
  - '[PAGE 52]


    +   - **relheight**: This option will specify the height as a float between 0.0
    and 1.0, which is a fraction of the parent widget height, that is, the widget''s
    height relates to the parent''s widget height by ratio.

    - **relwidth**: This option will specify the width as a float between 0.0 and
    1.0, which is a fraction of the parent widget width, that is, the widget''s width
    relates to the parent''s widget width by ratio.

    - **height**: This option will specify the widget height in pixels.

    - **width**: This option will specify the widget width in pixels.

    - **relx**: This option will specify the horizontal offset as a float between
    0.0 and 1.0 which is a fraction of the parent widget width, that is, widget will
    be placed by x ratio relative to its parent.

    - **rely**: This option will specify the vertical offset as a float between 0.0
    and 1.0, which is a fraction of the parent widget height, that is, widget will
    be placed by y ratio relative to its parent.

    - **x**: This option will specify the horizontal offset in pixels.

    - **y**: This option will specify the vertical offset in pixels.


    > **Note**: In the above geometry manager, at least 2 options are required when
    invoked.


