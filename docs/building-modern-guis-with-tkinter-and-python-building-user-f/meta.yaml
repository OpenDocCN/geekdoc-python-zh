    # tkinter Entry widget


    A widget that accepts single-line text strings from the user. A single line of
    text can be entered or displayed in this widget. It generally comes with a label
    because it is unclear what the user should type if we are not mentioning labels.
    The addition of more than one input field is allowed.


    The syntax is:


    ```

    my11= Entry(myroot , options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, command, bd, cursor, exportselection, font, highlightcolor,
    justify, fg, relief, selectborderwidth, selectbackground, selectforeground, state,
    show, textvariable, xscrollcommand, and width.


    We have seen the maximum options and will discuss those options which we have
    not discussed:


    +   - **command**: Every time, the operation needs to happen when the state of
    the **Entry** widget is changed.'
