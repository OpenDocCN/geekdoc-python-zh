    # Objectives


    By the end of this chapter, the reader will learn about creating basic GUI Python
    program using the tkinter library. In addition to that, we will also explore some
    standard attributes of Python tkinter GUI such as dimensions, colors or fonts
    with various options with examples. It is important to know how to position the
    text with a list of constants, relative to the reference point using anchor attribute.
    Moreover, we shall see how with the usage of relief attribute 3-D, simulated effects
    around the outside of the widget can be provided. We will also learn about bitmap
    and cursor attribute with examples. Finally, at the end of this chapter, we will
    learn accessing tkinter widgets using inbuilt layout geometry managers viz pack,
    grid and place.


    # Introduction to tkinter


    Whenever we write any program in Python to control the hardware, Python will show
    the output with the help of operating system. However, if we desire to make an
    executable with the help of GUI, then just having the need of hardware and operating
    system is insufficient. Python requires some services which come from a number
    of resources and one such resource which is of interest to many Python programmers
    is Tcl/Tk. **Tcl** stands for **Tool Command Language** and it is a scripting
    language with its own interpreter. On the other hand, Tk is a toolkit for building
    GUIs. An important point to note is that Tcl/Tk is not Python and we cannot control
    and access the services of Tcl/Tk using Python. So, another package is introduced
    and is referred to as *tkinter*, and it is an intermediator between Python and
    Tcl/Tk. tkinter will allow us to use the services of Tcl/Tk using the syntax of
    Python. As Python code developers, we will not be directly concerned with the
    Tcl/Tk. Binding of Python to the Tk GUI toolkit will be done by tkinter. tkinter
    will make everything appear as an object. We can create GUI, knowing that we can
    regard the window as an object, a label place on window as an object and so on.
    Applications can be built from a view point of an object-oriented programming
    paradigm. All we need to make sure is that we write our code in such a way that
    it allows us access tkinter, as shown in the following *Figure 1.1*:'
- md: "## Basic Python GUI program\n\nSo, GUI applications can be easily and quickly\
    \ created when Python is combined with tkinter. Although Python offers multiple\
    \ options for developing GUI such as PyQt, Kivy, Jython, WxPython, and pyGUI;\
    \ tkinter is the most commonly used. In this book, we will focus only on the tkinter\
    \ usage of GUI creation. Just like we import any other module, tkinter can be\
    \ imported in the same way in Python code:\n\n```python\nimport tkinter\n```\n\
    \nThis will import the **tkinter** module.\n\nThe module name in Python 3.x is\
    \ **tkinter**, whereas in Python 2.x, it is Tkinter.\n\nMore often, we can use:\n\
    \n```python\nfrom tkinter import *\n```\n\nHere, the '*' symbol means everything,\
    \ as Python now can build Graphical User Interfaces by treating all of the widgets\
    \ like Buttons, Labels, Menus and so on, as if they were objects. It is like importing\
    \ **tkinter** submodule.\n\nHowever, there are some important methods which the\
    \ user needs to know while creating Python GUI application, and they are as follows:\n\
    \n-   **Tk(screenName=None, baseName=None, className='Tk', useTk=1)**\n    tkinter\
    \ offers this method in order to create a main window. For any application, a\
    \ main window code can be created by using:\n    ```python\n    import tkinter\n\
    \    myroot = tkinter.Tk()\n    ```\n    Here, **Tk** class is instantiated without\
    \ any arguments. **myroot** is the main window object name. This method will allow\
    \ blank parent window creation with close, maximize and minimize buttons on the\
    \ top.\n\n-   **mainloop()**\n    tkinter offers this method when our application\
    \ is ready to run. This method is an infinite loop used to run the application.\
    \ It will wait for an event to occur and as long as the window is not closed,\
    \ the event is processed.\n\nLet us see a basic Python program which will create\
    \ a window:\n\n```python\nfrom tkinter import *\n\nmyroot = Tk() # creating an\
    \ object of Tk class\n# we should first know how to create a window if want to\
    \ per-\n# form graphics coding.\n# but output window will not be displayed right\
    \ now\nmyroot.mainloop()\n```\n\n**Output:**\nThe output can be seen in *Figure\
    \ 1.2*:\n\n*Figure 1.2: Output of Chap1_Example1.py*\n\n> **Note: The preceding\
    \ code is covered in Program Name: Chap1_Example1.py**\n\nIn the preceding code,\
    \ we have imported tkinter submodule and created a parent widget which usually\
    \ will be the main window of an application. A blank parent window is created\
    \ with close, maximize and minimize buttons on the top. An infinite loop will\
    \ be called to run the application, as long as the window is not closed.\n\nThe\
    \ moment the window is closed, the statements after **myroot.mainloop()** will\
    \ be executed, as shown in the following *Figure 1.3*:\n\n*Figure 1.3: Output\
    \ on running the code*\n\nThe moment the window is closed by clicking on the ‘X’\
    \ mark, we will get the output as shown in *Figure 1.4*:\n\n*Figure 1.4: Execution\
    \ of print statement after clicking ‘X’ mark*\n\nIn the preceding example, we\
    \ can maximize the window in both horizontal and vertical directions by using\
    \ both height and width attributes. However, we can restrict the expansion of\
    \ window in any direction.\nSuppose we want to maximize the width only. Then,\
    \ the code is as follows:\n\n```python\nfrom tkinter import *\n\nmyroot = Tk()\n\
    myroot.resizable(width = True, height = False) # width can be maximized\nmyroot.mainloop()\n\
    ```\n\nOutput:\n\nThe output can be seen in *Figure 1.5*:\n\n*Figure 1.5: Output\
    \ of Chap1_Example2.py*\n\n> Note: The preceding code is covered in Program Name:\
    \ Chap1_Example2.py\n\nSuppose, we want to maximize the height only. Then the\
    \ code is as follows:\n\n```python\nfrom tkinter import *\n\nmyroot = Tk()\n\n\
    myroot.resizable(width = False, height = True) # height can be maximized\n\nmyroot.mainloop()\n\
    ```\n\nOutput:\n\nThe output can be seen in *Figure 1.6*:\n\n*Figure 1.6: Output\
    \ of Chap1_Example3.py*\n\nNote: The preceding code is covered in Program Name:\
    \ Chap1_Example3.py\n\nNow, there is a need to maximize neither height nor width.\
    \ Then the following code will be used:\n\n```python\nfrom tkinter import *\n\n\
    myroot = Tk()\nmyroot.resizable(width = False, height = False) # neither width\
    \ nor height can be maximized\nmyroot.mainloop()\n```\n\nOutput:\n\nThe output\
    \ can be seen in Figure 1.7:\n\n*Figure 1.7: Output of Chap1_Example4.py*\n\n\
    Note: The preceding code is covered in Program Name: Chap1_Example4.py\n\nAn important\
    \ point to observe is that when we are maximizing the window in either of the\
    \ directions, then the maximize button was enabled. Whereas in this case, the\
    \ maximize button is disabled.\n\n## Some standard attributes of Python tkinter\
    \ GUI\n\nNow, we shall see how some of the standard attributes such as sizes,\
    \ colors or fonts are specified. Just observe the standard attributes as mentioned.\
    \ We shall see their usage when we will be dealing with widgets.\n\n### Dimensions\n\
    \nWhenever we set a dimension to an integer, it is assumed to be in pixels. A\
    \ length is expressed as an integer number of pixels by tkinter. The list of common\
    \ options are discussed as follows.\n\n### borderwidth\n\nThis option will give\
    \ a 3-D look to the widget. It can also be represented as **bd**:\n\n```python\n\
    from tkinter import *\n\nmyroot = Tk()\n\nmyl1 = Label(myroot, text = 'Label1',bd\
    \ = 8,relief = 'groove')\nmyl1.pack()\nmyroot.mainloop()\n```\n\n**Output:**\n\
    The output can be seen in *Figure 1.8*:\n\n*Figure 1.8: Output of Chap1_Example5.py*\n\
    \n> Note: The preceding code is covered in Program Name: Chap1_Example5.py\n\n\
    ### highlightthickness\n\nThis option represents the width of the highlighted\
    \ rectangle when the widget has focus. Refer to the following code:\n\n```python\n\
    from tkinter import *\n\nmyroot = Tk()\n\nmyb1 = Button(myroot, text = 'Without\
    \ highlight thickness')\nmyb1.grid(row = 0, column = 1)\n\nmyb2 = Button(myroot,\
    \ text = 'With highlight thickness',\n              highlightthickness=10,\n \
    \             )\nmyb2.grid(row = 1, column = 1, padx = 10, pady = 10)\n\nmyroot.mainloop()\n\
    ```\n\n**Output:**\n\nThe output can be seen in *Figure 1.9*:\n\n*Figure 1.9:\
    \ Output of Chap1_Example6.py*\n\n> **Note:** The preceding code is covered in\
    \ Program Name: Chap1_Example6.py\n\n### padX, padY\n\nThis option will provide\
    \ extra space that the widget requests from its layout manager, beyond the minimum,\
    \ for the display of widget contents in x and y directions. We can see in the\
    \ previous example, that we have used padding in x and y direction for better\
    \ look and display.\n\n### wraplength\n\nThis option will provide maximum length\
    \ of line for widgets which will be performing word wrapping. Refer to the following\
    \ code:\n\n```python\nfrom tkinter import *\nmyroot = Tk()\nmyl1 = Label(myroot,\
    \ text = 'Python',wraplength = 2)\nmyl1.pack()\nmyl2 = Label(myroot, text = 'awesome',wraplength\
    \ = 0)\nmyl2.pack()\nmyroot.mainloop()\n```\n\nOutput:\nThe output can be seen\
    \ in *Figure 1.10*:\n\n*Figure 1.10: Output of Chap1_Example7.py*\n\n> Note: The\
    \ preceding code is covered in Program Name: Chap1_Example7.py\n\n### height\n\
    \nThis option will set the desired height of the widget as per need. It must be\
    \ greater than 1.\n\n### underline\n\nThis option represents character index to\
    \ underline in the widget's text. The 1st character will be 0, the 2nd character\
    \ will be, 1 and so on.\n\n### width\n\nThis option will set the desired width\
    \ of the widget as per need, as shown:\n\n```python\nfrom tkinter import *\n\n\
    myroot = Tk()\nmyl1 = Label(myroot, text = 'Python',width = 20, height = 2, underline\
    \ = 2, font = ('Calibri',15))\nmyl1.pack()\nmyroot.mainloop()\n```\n\n**Output:**\n\
    \nThe output can be seen in *Figure 1.11*:\n\n*Figure 1.11: Output of Chap1_Example8.py*\n\
    \n> **Note:** The preceding code is covered in Program Name: Chap1_Example8.py\n\
    \nIn the above code, we have set width as 20, height as 2 and underline the 3rd\
    \ character which is ‘t’.\n\n### Colors\n\nColors can be represented in tkinter\
    \ using hexadecimal digits or by standard name. For example, #ff0000 is for Red\
    \ color or it can be represented by using color = ‘Red’. The different options\
    \ available for color is are discussed as follows.\n\n### activebackground\n\n\
    This option will set the widget background color when it is active.\n\n### background\n\
    \nThis option will set the widget background color and can also be represented\
    \ as **bg**, as follows:"
  mdcn: "## 基础 Python GUI 程序\n\n因此，当 Python 与 tkinter 结合时，可以轻松快速地创建 GUI 应用程序。虽然 Python\
    \ 提供了多种开发 GUI 的选项，如 PyQt、Kivy、Jython、WxPython 和 pyGUI；但 tkinter 是最常用的。在本书中，我们将只专注于使用\
    \ tkinter 创建 GUI。就像导入任何其他模块一样，tkinter 可以在 Python 代码中以相同的方式导入：\n\n```python\nimport\
    \ tkinter\n```\n\n这将导入 **tkinter** 模块。\n\n在 Python 3.x 中，模块名称是 **tkinter**，而在\
    \ Python 2.x 中，它是 Tkinter。\n\n更常见的是，我们可以使用：\n\n```python\nfrom tkinter import\
    \ *\n```\n\n这里的 '*' 符号表示所有内容，因为 Python 现在可以通过将所有控件（如按钮、标签、菜单等）视为对象来构建图形用户界面。这就像导入\
    \ **tkinter** 子模块。\n\n然而，在创建 Python GUI 应用程序时，用户需要了解一些重要的方法，它们如下：\n\n-   **Tk(screenName=None,\
    \ baseName=None, className='Tk', useTk=1)**\n    tkinter 提供此方法以创建主窗口。对于任何应用程序，可以使用以下代码创建主窗口：\n\
    \    ```python\n    import tkinter\n    myroot = tkinter.Tk()\n    ```\n    这里，**Tk**\
    \ 类在没有参数的情况下被实例化。**myroot** 是主窗口对象名称。此方法将允许创建一个空白的父窗口，顶部带有关闭、最大化和最小化按钮。\n\n- \
    \  **mainloop()**\n    当我们的应用程序准备好运行时，tkinter 提供此方法。此方法是一个无限循环，用于运行应用程序。它将等待事件发生，只要窗口未关闭，事件就会被处理。\n\
    \n让我们看一个创建窗口的基础 Python 程序：\n\n```python\nfrom tkinter import *\n\nmyroot = Tk()\
    \ # 创建 Tk 类的一个对象\n# 如果想执行图形编码，我们首先应该知道如何创建一个窗口。\n# 但输出窗口现在不会显示\nmyroot.mainloop()\n\
    ```\n\n**输出：**\n输出可以在 *图 1.2* 中看到：\n\n*图 1.2：Chap1_Example1.py 的输出*\n\n> **注意：前面的代码包含在程序名称：Chap1_Example1.py\
    \ 中**\n\n在前面的代码中，我们导入了 tkinter 子模块并创建了一个父控件，它通常是应用程序的主窗口。创建了一个空白的父窗口，顶部带有关闭、最大化和最小化按钮。只要窗口未关闭，就会调用一个无限循环来运行应用程序。\n\
    \n窗口关闭的那一刻，**myroot.mainloop()** 之后的语句将被执行，如下面的 *图 1.3* 所示：\n\n*图 1.3：运行代码时的输出*\n\
    \n点击 'X' 标记关闭窗口的那一刻，我们将得到如 *图 1.4* 所示的输出：\n\n*图 1.4：点击 'X' 标记后执行 print 语句*\n\n\
    在前面的示例中，我们可以使用高度和宽度属性在水平和垂直方向上最大化窗口。但是，我们可以限制窗口在任何方向上的扩展。\n假设我们只想最大化宽度。那么，代码如下：\n\
    \n```python\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.resizable(width =\
    \ True, height = False) # 宽度可以最大化\nmyroot.mainloop()\n```\n\n输出：\n\n输出可以在 *图 1.5*\
    \ 中看到：\n\n*图 1.5：Chap1_Example2.py 的输出*\n\n> 注意：前面的代码包含在程序名称：Chap1_Example2.py\
    \ 中\n\n假设，我们只想最大化高度。那么代码如下：\n\n```python\nfrom tkinter import *\n\nmyroot = Tk()\n\
    \nmyroot.resizable(width = False, height = True) # 高度可以最大化\n\nmyroot.mainloop()\n\
    ```\n\n输出：\n\n输出可以在 *图 1.6* 中看到：\n\n*图 1.6：Chap1_Example3.py 的输出*\n\n注意：前面的代码包含在程序名称：Chap1_Example3.py\
    \ 中\n\n现在，需要既不最大化高度也不最大化宽度。那么将使用以下代码：\n\n```python\nfrom tkinter import *\n\n\
    myroot = Tk()\nmyroot.resizable(width = False, height = False) # 宽度和高度都不能最大化\n\
    myroot.mainloop()\n```\n\n输出：\n\n输出可以在图 1.7 中看到：\n\n*图 1.7：Chap1_Example4.py 的输出*\n\
    \n注意：前面的代码包含在程序名称：Chap1_Example4.py 中\n\n需要观察的一个重要点是，当我们在任一方向上最大化窗口时，最大化按钮是启用的。而在这种情况下，最大化按钮是禁用的。\n\
    \n## Python tkinter GUI 的一些标准属性\n\n现在，我们将看到如何指定一些标准属性，例如大小、颜色或字体。只需观察提到的标准属性。我们将在处理控件时看到它们的用法。\n\
    \n### 尺寸\n\n每当我们设置一个整数维度时，它被假定为以像素为单位。长度由 tkinter 表示为整数像素数。常用选项列表讨论如下。\n\n###\
    \ 边框宽度\n\n此选项将为控件提供 3D 外观。它也可以表示为 **bd**：\n\n```python\nfrom tkinter import *\n\
    \nmyroot = Tk()\n\nmyl1 = Label(myroot, text = 'Label1',bd = 8,relief = 'groove')\n\
    myl1.pack()\nmyroot.mainloop()\n```\n\n**输出：**\n输出可以在 *图 1.8* 中看到：\n\n*图 1.8：Chap1_Example5.py\
    \ 的输出*\n\n> 注意：前面的代码包含在程序名称：Chap1_Example5.py 中\n\n### 高亮厚度\n\n此选项表示控件获得焦点时高亮矩形的宽度。参考以下代码：\n\
    \n```python\nfrom tkinter import *\n\nmyroot = Tk()\n\nmyb1 = Button(myroot, text\
    \ = '没有高亮厚度')\nmyb1.grid(row = 0, column = 1)\n\nmyb2 = Button(myroot, text =\
