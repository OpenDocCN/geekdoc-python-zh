    \n第三个参数可以是 None，用于替换之前的绑定（如果存在），或者使用 '+' 来保留旧的绑定并添加新的回调。\n\n现在，如果我们想将事件绑定到控件实例，则称为*实例级绑定*。\n\
    \n有时需要将事件绑定到整个应用程序，这称为***应用程序级绑定***，其中相同的绑定在所有窗口和应用程序控件中使用，只要任何一个应用程序窗口处于焦点状态。应用程序级绑定的语法是：\n\
