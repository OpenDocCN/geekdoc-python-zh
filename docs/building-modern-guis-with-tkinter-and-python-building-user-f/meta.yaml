  md: '# CHAPTER 5

    Getting Insights of Display Widgets in tkinter


    # Introduction


    The Label, Message, and MessageBox widgets in Tkinter must be learned in order
    to create Python **Graphical User Interfaces (GUI)**, which are efficient and
    easy to use. We will be able to display text, images, and dialog boxes to the
    user, thanks to these widgets which are necessary for creating an effective and
    user-friendly GUI. We can provide data to the user in a clear and organized manner,
    using the Label and Message widgets. We could use a Label widget to show a user''s
    name or a Message widget to show a list of items, for instance. We must use the
    MessageBox widget to handle errors in our application. We are able to ask the
    user for input, such as whether to continue or cancel an operation, and display
    error warnings to them. These widgets offer a variety of customization options,
    including the ability to change the text, picture, and dialog box size, colour,
    and font. For an application''s user interface to be unique and different from
    others, customization is essential.


    # Structure


    In this chapter, we will discuss the following topics:


    +   - tkinter Label Widget

    - tkinter Message Widget

    - tkinter MessageBox Widget'
