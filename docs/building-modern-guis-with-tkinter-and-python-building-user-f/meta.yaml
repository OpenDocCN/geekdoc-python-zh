  md: '# Some standard attributes of Python tkinter GUI


    Now, we shall see how some of the standard attributes such as sizes, colors or
    fonts are specified. Just observe the standard attributes as mentioned. We shall
    see their usage when we will be dealing with widgets.


    # Dimensions


    Whenever we set a dimension to an integer, it is assumed to be in pixels. A length
    is expressed as an integer number of pixels by tkinter. The list of common options
    are discussed as follows.


    # borderwidth


    This option will give a 3-D look to the widget. It can also be represented as
    **bd**:


    ```

    from tkinter import *


    myroot = Tk()


    myl1 = Label(myroot, text = ''Label1'',bd = 8,relief = ''groove'')

    myl1.pack()

    myroot.mainloop()

    ```


    **Output:**

    The output can be seen in *Figure 1.8*:


    ![](img/ecddba8119455057e37d50bbef734ff6_27_0.png)


    > Note: The preceding code is covered in Program Name: Chap1_Example5.py


    # highlightthickness


    This option represents the width of the highlighted rectangle when the widget
    has focus. Refer to the following code:'
  merge: -1
