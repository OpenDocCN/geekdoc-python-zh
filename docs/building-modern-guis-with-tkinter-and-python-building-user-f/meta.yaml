  md: 'The syntax is


    ```

    widget.grid(options,...)

    ```


    The options are as follows:


    +   - **column**: This option will use a cell which will be identified with a
    given column, whose default value is the leftmost column with a numeric value
    of 0.

    - **columnspan**: This option will indicate the number of columns the widget occupies;
    whose default value is 1.

    - **padx**: This option will add padding to the widget horizontally outside the
    border of the widget.

    - **pady**: This option will add padding to the widget vertically outside the
    border of the widget.

    - **ipadx**: This option will add padding to the widget horizontally inside the
    border of the widget.

    - **ipady**: This option will add padding to the widget vertically inside the
    border of the widget.

    - **row**: This option will use a cell that will be identified with a given row
    whose default value is the first row with numeric value of 0.

    - **rowspan**: This option will indicate the number of rows the widget occupies
    whose default value is 1.

    - **sticky**: Whenever the cell is larger than the widget, an indication is required
    for the sides and cell corners to which the widget sticks. It may be a string
    concatenation of 0 or more of compass directions: M, E, S, W, NE, NW, SE, SW,
    and 0. The widget is centered in the cell with sticky = "" and will take up the
    full cell area when NESW.'
