    # tkinter Checkbutton widget


    This widget will allow the user to select more than one option by clicking the
    button corresponding to each option. So, multiple options can be selected by the
    user at a time. A Yes/No choice is made by checking/unchecking the menu.


    The syntax is:


    ```

    mychk1= Checkbutton(myroot , options...)

    ```


    Here,


    **myroot** is the parent window.


    Some of the lists of options that can be used as key-value pairs and are separated
    by commas are activeforeground, activebackground, background, bd, bitmap, cursor,
    command, disableforeground, fg, font, height, image, highlightcolor, justify,
    onvalue, offvalue, padx, pady, selectcolor, selectimage, text, state, underline,
    variable, width, and wraplength.


    We have seen most of the options but some undiscussed options are as follows:


    +   - **command**: This option will associate with a function whenever the **checkbutton**
    state is changed by the user.

    - **onvalue**: This option will associate checkbutton''s control variable default
    value to 1 when it is on or set. By setting onvalue to that value, an alternate
    value can be supplied for the on state.

    - **offvalue**: This option will associate checkbutton''s control variable default
    value to 0 when it is off or cleared. By setting offvalue to that value, an alternate
    value can be supplied for the off state.

    - **text**: This option will display the text next to the checkbutton. Multiple
    lines of text can be displayed using ''\n''.

    - **variable**: This option will track the checkbox current state. It is an **IntVar**
    variable where 0 means off and 1 means set and will toggle between offvalue and
    onvalue when the button widget is pressed.


    Refer to the following code:


    ```

    from tkinter import *

    from tkinter.ttk import *


    myroot = Tk()

    myroot.geometry(''300x150'')

    myroot.title(''CheckButton widget'')

    ```'
