    myc1.pack()\n\n# rectangle object creation\nmyrect = myc1.create_rectangle(100,100,350,350,\
    \ fill = 'Red', outline = 'Red')\n\n#oval object creation\nmyc1.create_oval(100,100,350,350,\
    \ fill = 'Yellow', outline = 'Yellow')\n\nmyroot.mainloop() # display window until\
    \ we press the close button\n```\n\n输出：\n\n请参考*图 8.32*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_297_0.png)\n\
    \n*图 8.32：输出*\n\n**注意：前面的代码包含在程序名称：Chap8_Example13.py 中**\n\n我们可以创建多边形，但它应该至少有\
    \ 3 个顶点，如图所示：\n\n```python\nfrom tkinter import *\n\nclass CreatePolygon(Frame):\n\
    \    def __init__(self, myroot=None):\n        # myroot object is initialised\n\
    \        super().__init__(myroot) # Calling Frame.__init__(myroot)\n        self.myroot\
    \ = myroot # Update the myroot object after Frame()\n        makes necessary changes\
    \ to it\n\n    def mycreateCanvas(self, mycanvas_width, mycanvas_height):\n  \
    \      # Creating  canvas object\n        mycanvas = Canvas(self.myroot, bg=\"\
    LightBlue\", width=mycanvas_width, height=mycanvas_height)\n\n        return mycanvas\n\
    \n    def mycreate_polygon(self, mycanvas):\n        mypoints = [100,200,200,100,250,350,100,200]\n\
    \        mycanvas.create_polygon(mypoints,fill = 'Yellow', outline = 'Red', width\
    \ = 2) # polygon creation\n        return mycanvas\n\n# Create our myroot object\
    \ to the Application\nmyroot = Tk()\nmyroot.title('polygoncreation')\n\n# Creating\
    \ create_polygon object\nmyobj = CreatePolygon(myroot=myroot)\nmycanvas = myobj.mycreateCanvas(400,\
    \ 400)\nmycanvas = myobj.mycreate_polygon(mycanvas)\n\n# The items are packed\
    \ into the canvas\nmycanvas.pack()\n# Start the mainloop\nmyobj.mainloop()\n```\n\
    \n**输出：**\n\n请参考*图 8.33*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_299_0.png)\n\
    \n*图 8.33：输出*\n\n注意：前面的代码包含在程序名称：Chap8_Example14.py 中\n\n我们也可以在 Canvas 中写入文本，如图所示：\n\
    \n```python\nfrom tkinter import * # importing module\n\nmyroot = Tk() # window\
    \ creation and initialize the interpreter\nmyroot.geometry('300x200')\nmyroot.title('Textwriting')\n\
    \n# canvas object creation\nmyc1 = Canvas(myroot, width = 300, height = 200, bg\
    \ = 'LightBlue')\n# create text\nmyc1.create_text(10, 100, anchor=W, font=\"Helvetica\"\
    ,\n                 text=\"Hey! I am writing text in Canvas\")\nmyc1.pack()\n\n\
    myroot.mainloop() # display window until we press the close button\n```\n\n输出：\n\
    \n请参考*图 8.34*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_300_0.png)\n\n*图 8.34：输出*\n\
    \n**注意：** 前面的代码包含在程序名称：Chap8_Example15.py 中\n\n## 结论\n\n在本章中，我们学习了如何借助 tkinter\
    \ Menu 小部件创建弹出式、顶层和下拉式菜单。我们还看到了向菜单添加单选按钮和复选按钮的示例。我们深入探讨了 tearoff 选项、**entryconfig()**\
    \ 方法、使用键 itemType 或位置参数添加特定类型的项目。我们还查看了一个与菜单关联并提供给用户从不同选项中选择的小部件，即 tkinter Meubutton\
    \ 小部件。我们还看到了向此 menubutton 小部件添加单选和复选按钮的示例。最后，我们借助 tkinter Canvas 小部件探索了绘制不同图形（如线条、矩形、弧线、多边形、文本）以及创建图像项1的概念。\n\
    \n## 要点回顾\n\n-   菜单可以使用 tkinter menu 小部件创建。通过菜单的嵌套创建分层菜单结构。用户可以通过菜单访问额外的命令或选项。\n\
    -   显示下拉菜单的按钮是通过使用 tkinter menubutton 小部件创建的。它与菜单关联，当用户点击时可以显示其选项。用户可以通过 menubutton\
    \ 小部件访问额外的命令或选项。"
