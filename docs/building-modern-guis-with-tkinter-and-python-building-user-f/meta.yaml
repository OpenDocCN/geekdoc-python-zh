  md: 'by moving the separator lines called **sashes** by using the mouse. Whenever
    there is a requirement to implement different layouts in the Python applications,
    we can go for this widget.


    The syntax is as follows:


    ```

    mypw1= PanedWindow(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, bd, borderwidth, cursor, handlepad, height, handlesize, relief,
    orient, sashcursor, sashrelief, width, sashwidth, and showhandle.


    We have seen most of the options but some undiscussed options are as follows:


    +   - **handlepad**: This option will represent the distance between the handle
    and sash end having the default size of 8 pixels. If the orientation is horizontal,
    it is the distance between the handle and sash top.

    - **handlesize**: This option will represent the handle size having the default
    size of 8 pixels.

    - **orient**: This option will allow placing the child Windows at different positions
    in a frame. If set to horizontal, the child windows will be placed side by side.
    If set to vertical, then child windows will be placed from top to bottom.

    - **sashpad**: This option will allow padding to be done around each sash.

    - **sashrelief**: This option will represent the border type around each sash.
    Its default value is FLAT.

    - **sashwidth**: This option will specify the sash width whose default value is
    2 pixels.

    - **showhandle**: This option will display handles when set to True. Its default
    value is False.


    Some of the commonly used methods in this widget are as follows:


    +   - **add(child, options)**: This method will add a child window to the paned
    window.

    - **get(startindex [,endindex])**: This method will get the text within the specified
    range.'
