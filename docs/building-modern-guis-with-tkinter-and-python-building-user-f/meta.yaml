    # tkinter Combobox Widget


    This widget is a combination of a drop-down menu and an **Entry** widget. Here,
    the user can view the usual text entry area with a downward pointing arrow. A
    drop-down menu appears when the user clicks on the arrow displaying all the choices
    and will replace the current entry contents if clicked on one.


    The syntax is as follows:


    ```

    python

    mycmb1= Combobox(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are cursor, exportselection, height, justify, style, postcommand, takefocus,
    validate, validatecommand, textvariable, width, values, and xscrollcommand.'
  merge: -1
  pgno: 183
- img_proc: true
  md: 'We have seen most of the options but some undiscussed options are as follows:


    +   - **exportselection**: Whenever the text is selected within an entry widget
    and if exportselection is set to 0, the automatic export to the clipboard is restricted.

    - **postcommand**: When the user clicks on the down arrow, this option can be
    set to any of the functions.

    - **values**: This option specifies the choices as a sequence of strings which
    will appear in the drop-down menu.


    Some of the methods used in the above widget are as follows:


    +   - **current([index])**: This method when passing the index of the element
    as an argument will select one of the elements of the values option. If an argument
    is not supplied, the value returned will be the index of the current Entry text
    in the values list.

    - **set(value)**: This method can set the current text in the widget to value.


    Let us see an example for better understanding:


    ```

    from tkinter import * # importing module

    from tkinter.ttk import Combobox


    myroot = Tk() # window creation and initialize the interpreter

    myroot.geometry(''300x200'')

    myroot.title(''Comboboxcreation'')


    # creating a list of values

    myl2 = list(range(1,25))


    #combobox object creation

    mycombo = Combobox(myroot, val-

    ues = myl2 , width = 15) # , height = 2 : only 2 items

    mycombo.pack(padx = 50, pady = 10)


    myroot.mainloop() # display window until we press the close button

    ```'
