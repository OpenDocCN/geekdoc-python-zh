    \ Alt 键。\n- **Lock**：当事件发生时，需要激活大写锁定键。\n- **Double**：事件将快速连续发生两次，例如双击。\n- **Triple**：事件将快速连续发生三次。\n\
    - **Quadruple**：事件将快速连续发生四次。\n\n## 事件类型\n\ntkinter 中的不同事件类型如下：\n\n- **ButtonPress\
    \ 或 Button**：当鼠标按钮被点击时，将生成或激活一个事件。事件 <Button-1> 定义鼠标左键，事件 <Button-2> 定义中键，事件 <Button-3>\
    \ 定义鼠标右键，事件 <Button-4> 定义在支持滚轮的鼠标上向上滚动，事件 <Button-5> 定义在支持滚轮的鼠标上向下滚动。\n- **ButtonRelease**：当鼠标按钮被释放时，将生成或激活一个事件。事件\
