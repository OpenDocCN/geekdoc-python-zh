    \ Tkinter 的类和对象创建 GUI，另一种不使用。最后，我们可以说，使用类和对象创建 GUI 的方法有助于提高代码的组织性、可维护性、可重用性，并有助于降低代码的复杂性。\n\
    \n## 要点回顾\n\n- 为了存储和操作字符串值，以及表示文本或小部件的值（如 Entry 和 label），我们可以使用 **StringVar()**\
