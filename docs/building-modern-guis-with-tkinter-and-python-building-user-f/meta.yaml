  md: '# CHAPTER 1

    # tkinter

    # Introduction


    # ## Introduction


    We have learned in our previous book *Python for Everyone*, about the concepts
    in Python which are procedure oriented or object oriented. However, these concepts
    will be used as indispensable salt for our next learning, which is related to
    **Graphical User Interface (GUI)**. We are surrounded by GUI apps in day-to-day
    life. Whenever we are using our mobile phone/Desktop applications and accessing
    any app or software, the first thing which we look forward to is how to access
    these apps or software. Any app on mobile phone or a computer system consists
    of hardware and is controlled by an operating system. The high-level languages
    will be sitting on top of the operating system and Python is no exception. So,
    in this chapter, we will learn about tkinter library in Python.


    # ## Structure


    In this chapter, we will discuss the following topics:


    +   - Introduction to tkinter

    - Basic Python GUI Program

    - Some standard attributes of Python tkinter GUI'
  merge: -1
  pgno: 20
- img_proc: true
  md: '+   - Colors

    - Fonts

    - Anchors

    - Relief Styles

    - Bitmaps

    - Cursors

    - Python tkinter Geometry Manager


    # Objectives


    By the end of this chapter, the reader will learn about creating basic GUI Python
    program using the tkinter library. In addition to that, we will also explore some
    standard attributes of Python tkinter GUI such as dimensions, colors or fonts
    with various options with examples. It is important to know how to position the
    text with a list of constants, relative to the reference point using anchor attribute.
    Moreover, we shall see how with the usage of relief attribute 3-D, simulated effects
    around the outside of the widget can be provided. We will also learn about bitmap
    and cursor attribute with examples. Finally, at the end of this chapter, we will
    learn accessing tkinter widgets using inbuilt layout geometry managers viz pack,
    grid and place.


    # Introduction to tkinter


    Whenever we write any program in Python to control the hardware, Python will show
    the output with the help of operating system. However, if we desire to make an
    executable with the help of GUI, then just having the need of hardware and operating
    system is insufficient. Python requires some services which come from a number
    of resources and one such resource which is of interest to many Python programmers
    is Tcl/Tk. **Tcl** stands for **Tool Command Language** and it is a scripting
    language with its own interpreter. On the other hand, Tk is a toolkit for building
    GUIs. An important point to note is that Tcl/Tk is not Python and we cannot control
    and access the services of Tcl/Tk using Python. So, another package is introduced
    and is referred to as *tkinter*, and it is an intermediator between Python and
    Tcl/Tk. tkinter will allow us to use the services of Tcl/Tk using the syntax of
    Python. As Python code developers, we will not be directly concerned with the
    Tcl/Tk. Binding of Python to the Tk GUI toolkit will be done by tkinter. tkinter
    will make everything appear as an object. We can create GUI, knowing that we can
    regard the window as an object, a label place on window as an object and so on.
    Applications can be built from a view point of an object-oriented programming
    paradigm. All we need to make sure is that we write our code in such a way that
    it allows us access tkinter, as shown in the following *Figure 1.1*:'
  merge: -1
  pgno: 21
- img_proc: true
  md: "![](img/ecddba8119455057e37d50bbef734ff6_22_0.png)\n\nFigure 1.1: tkinter access\
    \ hierarchy\n\nSo, GUI applications can be easily and quickly created when Python\
    \ is combined with tkinter. Although Python offers multiple options for developing\
    \ GUI such as PyQt, Kivy, Jython, WxPython, and pyGUI; tkinter is the most commonly\
    \ used. In this book, we will focus only on the tkinter usage of GUI creation.\
    \ Just like we import any other module, tkinter can be imported in the same way\
    \ in Python code:\n\n```\nimport tkinter\n```\n\nThis will import the **tkinter**\
    \ module.\n\nThe module name in Python 3.x is **tkinter**, whereas in Python 2.x,\
    \ it is Tkinter.\n\nMore often, we can use:\n\n```\nfrom tkinter import *\n```\n\
    \nHere, the '*' symbol means everything, as Python now can build Graphical User\
    \ Interfaces by treating all of the widgets like Buttons, Labels, Menus and so\
    \ on, as if they were objects. It is like importing **tkinter** submodule.\n\n\
    However, there are some important methods which the user needs to know while creating\
    \ Python GUI application, and they are as follows:\n\n+   - Tk(screenName=None,\
    \ baseName=None, className='Tk', useTk=1)\n  tkinter offers this method in order\
    \ to create a main window. For any application, a main window code can be created\
    \ by using:\n  python\n  import tkinter\n  myroot = tkinter.Tk()\n  \n  Here,\
    \ **Tk** class is instantiated without any arguments. **myroot** is the main window\
    \ object name. This method will allow blank parent window creation with close,\
    \ maximize and minimize buttons on the top."
  merge: -1
  pgno: 22
- img_proc: true
  md: "+   - **mainloop()**\n  tkinter offers this method when our application is\
    \ ready to run. This method is an infinite loop used to run the application. It\
    \ will wait for an event to occur and as long as the window is not closed, the\
    \ event is processed.\n\n# Basic Python GUI program\n\nLet us see a basic Python\
    \ program which will create a window:\n\n```\nfrom tkinter import *\n\nmyroot\
    \ = Tk() # creating an object of Tk class\n# we should first know how to create\
    \ a window if want to per-\n# form graphics coding.\n# but output window will\
    \ not be displayed right now\nmyroot.mainloop()\n```\n\n**Output:**\nThe output\
    \ can be seen in *Figure 1.2*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_23_0.png)\n\
    \n*Figure 1.2: Output of Chap1_Example1.py*\n\n> **Note: The preceding code is\
    \ covered in Program Name: Chap1_Example1.py**\n\nIn the preceding code, we have\
    \ imported tkinter submodule and created a parent widget which usually will be\
    \ the main window of an application. A blank parent window is created with close,\
    \ maximize and minimize buttons on the top. An infinite loop will be called to\
    \ run the application, as long as the window is not closed."
  merge: -1
  pgno: 23
- img_proc: true
  md: 'The moment the window is closed, the statements after **myroot.mainloop()**
    will be executed, as shown in the following *Figure 1.3*:


    ![](img/ecddba8119455057e37d50bbef734ff6_24_0.png)


    *Figure 1.3: Output on running the code*


    The moment the window is closed by clicking on the ‘X’ mark, we will get the output
    as shown in *Figure 1.4*:


    ![](img/ecddba8119455057e37d50bbef734ff6_24_1.png)


    *Figure 1.4: Execution of print statement after clicking ‘X’ mark*


    In the preceding example, we can maximize the window in both horizontal and vertical
    directions by using both height and width attributes. However, we can restrict
    the expansion of window in any direction.

    Suppose we want to maximize the width only. Then, the code is as follows:


    ```

    python

    from tkinter import *


    myroot = Tk()

    myroot.resizable(width = True, height = False) # width can be maximized

    myroot.mainloop()

    ```'
