    \n因此，我们可以看到所有的键方法值都将在控制台中显示。如果未提及，则将显示默认值。\n\n我们可以使用**textvariable**选项，因为它会将一个**tkinter**变量与标签小部件关联起来，也就是说，我们可以对tkinter标签小部件使用**StringVar()**和**textvariable**，如下所示：\n\
    \n```python\nfrom tkinter import *\n\nclass MyStringVartext(Tk):\n    def __init__(self):\n\
    \        super().__init__()\n        self.myval1 = StringVar()\n        self.title('StringVar()\
    \ and textvariable a tkinter label')\n        self.myl2= Label(self,font = 'Helvetica',textvariable=\
    \ self.myval1,relief = 'groove')\n        self.myl2.pack()\n        self.myval1.set('python\
