    which can be attached with clickable buttons. The importance of tkinter PanedWindow
    widget was well explored which was containing horizontal or vertical stacks of
    child widgets. Finally, we looked into tkinter Toplevel widget with crystal clear
    concepts explanation for the creation and display of top-level windows.


    # Points of remember


    +   - Use frames to assemble related widgets. The code may become better organized
    and simpler to read as a result.

    - Label frames with the help of labels. The code may become more readable and
    understandable as an outcome.

    - Create tabbed user interfaces with notebooks. This might be a great approach
    for arranging a lot of information in a constrained area.

    - Resizable panes can be created via paned windows. This can be a great approach
    for developing layouts that can be adjusted for different sizes of screens.

    - To make new windows, use tkinter Toplevel widgets. Create dialog boxes, message
    boxes, and other types of windows using this approach.


