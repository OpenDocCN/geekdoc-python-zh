    # Conclusion


    In this chapter, we learned about creation of pop-up, top-level, and pull-down
    menus with the help of the tkinter Menu widget. We also saw example of adding
    radiobutton and checkbutton to the menu. The tearoff option, **entryconfig()**
    method, adding a specific type of item using the key itemType or a positional
    argument was well explored. We also viewed a widget which was associated with
    the menu and was provided to the user to select, from different choices, viz.
    tkinter Meubutton widget. We also saw example of adding radio and checkbuttons
    to this menubutton widget. Finally, we explored the concepts of drawing different
    graphics such as lines, rectangles, arc, polygon, text and create of image item1
    with the help of the tkinter Canvas widget.


    # Points to remember


    +   - Menus can be created using tkinter menu widget. A hierarchical menu structure
    is created by nesting of menus. Users are provided with a way to access additional
    commands or options using menus.

    - Button that displays a drop-down menu is created by using tkinter menubutton
    widget. It is associated with the menu which can display its choices when clicked
    by the user. Users are provided with a way to access additional commands or options
    using menubutton widget.'
