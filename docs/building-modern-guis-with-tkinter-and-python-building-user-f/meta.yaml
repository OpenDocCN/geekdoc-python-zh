- md: "## tkinter Checkbutton widget\n\nThis widget will allow the user to select\
    \ more than one option by clicking the button corresponding to each option. So,\
    \ multiple options can be selected by the user at a time. A Yes/No choice is made\
    \ by checking/unchecking the menu.\n\nThe syntax is:\n\n```\nmychk1= Checkbutton(myroot\
    \ , options...)\n```\n\nHere,\n\n**myroot** is the parent window.\n\nSome of the\
    \ lists of options that can be used as key-value pairs and are separated by commas\
    \ are activeforeground, activebackground, background, bd, bitmap, cursor, command,\
    \ disableforeground, fg, font, height, image, highlightcolor, justify, onvalue,\
    \ offvalue, padx, pady, selectcolor, selectimage, text, state, underline, variable,\
    \ width, and wraplength.\n\nWe have seen most of the options but some undiscussed\
    \ options are as follows:\n\n- **command**: This option will associate with a\
    \ function whenever the **checkbutton** state is changed by the user.\n- **onvalue**:\
    \ This option will associate checkbutton's control variable default value to 1\
    \ when it is on or set. By setting onvalue to that value, an alternate value can\
    \ be supplied for the on state.\n- **offvalue**: This option will associate checkbutton's\
    \ control variable default value to 0 when it is off or cleared. By setting offvalue\
    \ to that value, an alternate value can be supplied for the off state.\n- **text**:\
    \ This option will display the text next to the checkbutton. Multiple lines of\
    \ text can be displayed using '\\n'.\n- **variable**: This option will track the\
    \ checkbox current state. It is an **IntVar** variable where 0 means off and 1\
    \ means set and will toggle between offvalue and onvalue when the button widget\
    \ is pressed.\n\nRefer to the following code:\n\n```\nfrom tkinter import *\n\
    from tkinter.ttk import *\n\nmyroot = Tk()\nmyroot.geometry('300x150')\nmyroot.title('CheckButton\
    \ widget')\n\ndef myget():\n    if i2.get() == 'check':\n        s1.set('Checked')\n\
    \    else:\n        s1.set('UnChecked')\n\ni2 = StringVar()\nmyc2 = Checkbutton(myroot,\
    \ text = 'Check/Uncheck', variable = i2, offvalue = 'uncheck', onvalue = 'check',\
    \ command = myget)\nmyc2.pack()\n\ns1 = StringVar()\nmye1 = Entry(myroot, font\
    \ = ('Calibri',12), textvariable= s1)\nmye1.pack(pady = 10)\n\nmyroot.mainloop()\n\
    ```\n\nOutput:\nRefer to *Figure 3.23*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_101_0.png)\n\
    \n*Figure 3.23: Output*\n\n> **Note: The preceding code is covered in Program\
    \ Name: Chap3_Example18.py**\n\nIn the next code, when the user clicks the **CheckButton**,\
    \ the text checked will be written in the Entry widget as its value for on state\
    \ is checked. When the user unchecks the **CheckButton**, the text **UnChecked**\
    \ will be written in the Entry widget as its value for the off state is unchecked.\n\
    \n**selectcolor:** This option will set the checkbutton color when the widget\
    \ is selected. The default is ‘Red’ color. If the indicator is True, the color\
    \ is applied to the indicator. In Windows irrespective of the select state, it\
    \ is used as the background for the indicator. When the indicator is set to False,\
    \ the color is used as the background color for the entire widget whenever it\
    \ is selected.\n\nRefer to the following code:\n\n```\nfrom tkinter import *\n\
    myroot = Tk()\ndef selectcolor_indicatoronTrue():\n    mychk1['selectcolor'] =\
    \ 'Green'\n\ndef selectcolor_indicatoronFalse():\n    mychk2['selectcolor'] =\
    \ 'Blue'\n\nmychk1 = Checkbutton(myroot, text = 'CheckButton', command = selectcolor_indicatoronTrue,\
    \ indicatoron = True)\nmychk1.place(x = 50, y = 50)\nmychk2 = Checkbutton(myroot,\
    \ text = 'CheckButton', command = selectcolor_indicatoronFalse, indicatoron =\
    \ False)\nmychk2.place(x = 50, y = 100)\nmyroot.mainloop()\n```\n\n**Output:**\n\
    \nRefer to *Figure 3.24*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_102_0.png)\n\
    \n*Figure 3.24: Output*\n\nHere,\n\nA) When both the Checkbuttons are clicked.\n\
    B) When both the Checkbuttons are deselected.\n\n> Note: The preceding code is\
    \ covered in Program Name: Chap3_Example19.py\n\n**image:** This option will allow\
    \ you to get the image displayed in the widget.\n**selectimage:** This option\
    \ will allow setting the image to the checkbutton.\nRefer to the following code:\n\
    \n```\nfrom tkinter import *\nmyroot = Tk()\n\nmyon_image = PhotoImage(width=50,\
    \ height=25)\nmyoff_image = PhotoImage(width=50, height=25)\nmyon_image.put((\"\
    Light-Green\",), to=(0, 0, 24,24)) # It will put row formatted colors to image\
    \ starting from position TO\nmyoff_image.put((\"Red\",), to=(25, 0, 49, 24))\n\
    \nmyval1 = IntVar(value=0)\nmyval2 = IntVar(value=1)\ncb1 = Checkbutton(myroot,\
    \ image=myoff_image, selectimage=myon_image, indicatoron=False,\n            \
