- md: "## CHAPTER 4\nGetting Insights of Input Widgets in tkinter\n\n## Introduction\n\
    \nIn tkinter, users can enter data into a programme using input widgets, which\
    \ are GUI components. There are several different types of input widgets, including\
    \ text fields, check boxes, radio buttons, and drop-down menus. Using the suitable\
    \ classes and methods offered by the library, these widgets can be added to a\
    \ GUI window in tkinter. After being introduced, input widgets can be customized\
    \ to meet the needs of the application by establishing default values, applying\
    \ validation criteria, or imposing input volume restrictions. They can also be\
    \ connected to programme logic, so that when a user interacts with them, a variable\
    \ is updated or an event is started. Overall, input widgets offer a straightforward\
    \ and understandable way to interact with software and enter data, and they are\
    \ a crucial part of the majority of GUI programmes.\n\n## Structure\n\nIn this\
    \ chapter, we will discuss the following topics:\n\n- tkinter Entry widget\n-\
    \ tkinter Scrollbar widget\n- tkinter Spinbox widget\n- tkinter Scale widget\n\
    - tkinter Text widget\n- tkinter Combobox widget\n\n## Objectives\n\nIn this chapter,\
    \ the reader will firstly learn about the creation of a simple GUI app using the\
    \ tkinter Entry widget in a very neat way with various options and explanations,\
    \ followed by different examples. Then, the validation concept in the Entry widget\
    \ is also explained. Next, we shall see about the scrollbar widget where the user\
    \ will look into the scrolling capability in the vertical or horizontal direction\
    \ with different widgets such as List Box, Entry, and Text. Another one is the\
    \ tkinter Spinbox widget where the range of input values will be fed to the user,\
    \ out of which the user can select one. Next, we will explore how to implement\
    \ a graphical slider to any Python application program by using the tkinter Scale\
    \ widget followed by the concept of the tkinter Text widget, where the user can\
    \ insert multiple text fields. Finally, we will be dealing with the tkinter Combobox\
    \ widget and its applications.\n\n## tkinter Entry widget\n\nA widget that accepts\
    \ single-line text strings from the user. A single line of text can be entered\
    \ or displayed in this widget. It generally comes with a label because it is unclear\
    \ what the user should type if we are not mentioning labels. The addition of more\
    \ than one input field is allowed.\n\nThe syntax is:\n\n```\nmy11= Entry(myroot\
    \ , options...)\n```\n\nwhere,\n\n- **myroot** is the parent window.\n- Some of\
    \ the lists of options that can be used as key-value pairs and are separated by\
    \ commas are bg, command, bd, cursor, exportselection, font, highlightcolor, justify,\
    \ fg, relief, selectborderwidth, selectbackground, selectforeground, state, show,\
    \ textvariable, xscrollcommand, and width.\n\nWe have seen the maximum options\
    \ and will discuss those options which we have not discussed:\n\n- **command**:\
    \ Every time, the operation needs to happen when the state of the **Entry** widget\
    \ is changed.\n- **exportselection**: Whenever the text is selected within an\
    \ **Entry** widget and if exportselection is set to 0, the automatic export to\
    \ the clipboard is restricted.\n- **selectborderwidth**: This option will use\
    \ border width around selected text and the default is 1 pixel.\n- **state**:\
    \ This option, when set to DISABLED, will make the **Entry** widget unresponsive\
    \ and will go out the control. The default state is NORMAL.\n- **show**: When\
    \ there is a requirement to display some sort of special character in the **Entry**\
    \ widget, this special character takes place in the actual text position. We all\
    \ know that a password always takes a special character asterisk'*', whenever\
    \ we try to log in to any account.\n- **textvariable**: This option is set to\
    \ **StringVar** class instance when there is a need to retrieve the current text\
    \ from the **Entry** widget.\n- **xscrollcommand**: This option will allow us\
    \ to link the horizontal scrollbar to an **Entry** widget when we are entering\
    \ more text than the actual widget width.\n\nThis example depicts the usage of\
    \ state and **textvariable** options in the **Entry** widget, as shown:\n\n```python\n\
    from tkinter import *\n\nclass MySTATE:\n    def __init__(self, myroot):\n   \
    \     self.myvar = StringVar()\n        self.myvar.set('python')\n\n        self.myl1\
    \ = Label(myroot, text = 'Normal state')\n        self.myl1.grid(row = 0, column\
    \ = 0)\n\n        self.myl2 = Label(myroot, text = 'Disabled state')\n       \
    \ self.myl2.grid(row = 1, column = 0, pady = 10)\n\n        self.myl3 = Label(myroot,\
    \ text = 'Readonly state')\n        self.myl3.grid(row = 2, column = 0, pady =\
    \ 10)\n\n        self.mye1 = Entry(myroot, textvariable=self.myvar, width=15,\
    \ state = 'normal')\n        self.mye1.grid(row = 0, column = 1, padx = 10)\n\n\
    \        self.mye2 = Entry(myroot, textvariable=self.myvar, width=15, state =\
    \ 'disabled')\n        self.mye2.grid(row = 1, column = 1, padx = 10)\n      \
    \  self.mye3 = Entry(myroot, textvariable=self.myvar, width=15, state = 'readonly')\n\
    \        self.mye3.grid(row = 2, column = 1, padx = 10)\n\nif __name__ == \"__main__\"\
    :\n    myroot = Tk()\n    myobj = MySTATE(myroot)\n    myroot.mainloop()\n```\n\
    \n**Output:**\nThe output can be seen in *Figure 4.1*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_127_0.png)\n\
    \n*Figure 4.1: Output*\n\n> **Note:** The preceding code is covered in Program\
    \ Name: Chap4_Example1.py\n\nIn the above code, we are creating 3 **Entry** widgets\
    \ in the parent widget having each state as normal, disabled, and read only. We\
    \ can see that when the **Entry** widget is in the normal state, it can accept\
    \ input from the user which can be changed if required. When the **Entry** widget\
    \ is in a disabled or read only state, it means that it cannot be changed by the\
    \ user.\n\nNow, we shall see the usage of the **show** and **selectborderwidth**\
    \ option using the entry widget, as shown:\n\n```python\nfrom tkinter import *\n\
    \nclass MyLogin:\n    def __init__(self, myroot):\n        self.myl1 = Label(myroot,\
    \ text = 'Username')\n        self.myl1.grid(row = 0, column = 0)\n\n        self.myl2\
    \ = Label(myroot, text = 'Password')\n        self.myl2.grid(row = 1, column =\
    \ 0, pady = 10)\n\n        self.mye1 = Entry(myroot, width=15, selectborderwidth\
    \ = 3)\n        self.mye1.grid(row = 0, column = 1, padx = 10)\n        self.mye2\
    \ = Entry(myroot, width=15,show= '*')\n        self.mye2.grid(row = 1, column\
    \ = 1, padx = 10)\n\n        def mydisplay():\n            print(\"The username\
    \ is: \" + self.mye1.get())\n            print(\"The password is: \" +self.mye2.get())\n\
    \n        self.mybtn = Button(myroot, text = 'Login', command = mydisplay, font\
    \ = ('Calibri',12))\n        self.mybtn.grid(row = 2, columnspan = 3)\n\nif __name__\
    \ == \"__main__\":\n    myroot = Tk()\n    myobj = MyLogin(myroot)\n    myroot.title('Login\
    \ Page')\n    myroot.geometry('200x120')\n    myroot.mainloop()\n```\n\n## Output:\n\
    \nThe output can be seen in *Figure 4.2*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_128_0.png)\n\
    \n*Figure 4.2: Output*\n\nNote: The preceding code is covered in Program Name:\
    \ Chap4_Example2.py\n\nOutput when the Login button is clicked:\n\nThe username\
    \ is: alliumsepa\n\nThe password is: hello123\n\nIn the above code, we have written\
    \ the password using an asterisk sign by setting it as '*'. This option is used\
    \ when we are entering very confidential data. Moreover, when the text written\
    \ inside the Entry widget is selected, the selectborderwidth is set to 3. If we\
    \ remove the selectborderwidth option, which is by default 1, then observe the\
    \ output shown in Figure 4.3:\n\n![](img/ecddba8119455057e37d50bbef734ff6_129_0.png)\n\
    \nFigure 4.3: Output when selectborderwidth option is removed\n\nNow, we shall\
    \ see the most commonly used methods with this widget, which are as follows:\n\
    \n- **delete( first, last=None )**: This method will delete the specified characters\
    \ inside the entry widget, starting with the one at the index up to, but not including,\
    \ the character at the last position.\n\n```python\nfrom tkinter import *\n\n\
    class MydeleteExample(Tk):\n    def __init__(self):\n        super().__init__()\n\
    \        self.title('MyDelete Example')\n        self.mye1= Entry(self,font =\
    \ ('Arial',12),width = 30, bd = 5)\n        self.mye1.pack(side = LEFT)\n\n  \
    \      self.button1 = Button(self, text=\"Delete the text\", command=lambda: mydelete(self,self.mye1))\n\
    \        self.button1.pack(pady = 32)\n```"
  mdcn: "## 第四章\n深入了解 tkinter 中的输入部件\n\n## 简介\n\n在 tkinter 中，用户可以使用输入部件（即 GUI 组件）向程序输入数据。输入部件有多种不同类型，包括文本框、复选框、单选按钮和下拉菜单。通过使用库提供的合适类和方法，可以将这些部件添加到\
    \ tkinter 的 GUI 窗口中。引入后，可以通过设置默认值、应用验证标准或限制输入量来定制输入部件，以满足应用程序的需求。它们还可以与程序逻辑连接，以便当用户与它们交互时，会更新变量或触发事件。总的来说，输入部件提供了一种直接且易于理解的方式来与软件交互和输入数据，它们是大多数\
    \ GUI 程序的关键组成部分。\n\n## 结构\n\n在本章中，我们将讨论以下主题：\n\n- tkinter Entry 部件\n- tkinter\
    \ Scrollbar 部件\n- tkinter Spinbox 部件\n- tkinter Scale 部件\n- tkinter Text 部件\n\
    - tkinter Combobox 部件\n\n## 目标\n\n在本章中，读者将首先学习如何以非常简洁的方式，使用 tkinter Entry 部件创建一个简单的\
    \ GUI 应用程序，其中包含各种选项和解释，随后是不同的示例。接着，也会解释 Entry 部件中的验证概念。然后，我们将了解 Scrollbar 部件，用户将研究在\
    \ List Box、Entry 和 Text 等不同部件中垂直或水平方向的滚动功能。另一个是 tkinter Spinbox 部件，它将向用户提供一个输入值范围，用户可以从中选择一个。接下来，我们将探索如何使用\
    \ tkinter Scale 部件为任何 Python 应用程序实现图形滑块，然后是 tkinter Text 部件的概念，用户可以在其中插入多个文本字段。最后，我们将讨论\
    \ tkinter Combobox 部件及其应用。\n\n## tkinter Entry 部件\n\n一个接受用户单行文本字符串的部件。可以在此部件中输入或显示单行文本。它通常带有一个标签，因为如果不提及标签，用户就不清楚应该输入什么。允许添加多个输入字段。\n\
    \n语法如下：\n\n```\nmy11= Entry(myroot , options...)\n```\n\n其中，\n\n- **myroot** 是父窗口。\n\
    - 可以用作键值对并用逗号分隔的部分选项列表包括 bg、command、bd、cursor、exportselection、font、highlightcolor、justify、fg、relief、selectborderwidth、selectbackground、selectforeground、state、show、textvariable、xscrollcommand\
    \ 和 width。\n\n我们已经看到了大部分选项，现在将讨论那些我们尚未讨论的选项：\n\n- **command**：每次 **Entry** 部件状态改变时，都需要执行的操作。\n\
    - **exportselection**：每当在 **Entry** 部件内选择文本时，如果 exportselection 设置为 0，则会限制自动导出到剪贴板。\n\
    - **selectborderwidth**：此选项将用于所选文本周围的边框宽度，默认为 1 像素。\n- **state**：当此选项设置为 DISABLED\
    \ 时，将使 **Entry** 部件无响应并失去控制。默认状态为 NORMAL。\n- **show**：当需要在 **Entry** 部件中显示某种特殊字符时，此特殊字符将替代实际文本位置。我们都知道，每当尝试登录任何账户时，密码总是使用特殊字符星号\
    \ '*'。\n- **textvariable**：当需要从 **Entry** 部件检索当前文本时，此选项设置为 **StringVar** 类实例。\n\
    - **xscrollcommand**：当我们输入的文本超过部件实际宽度时，此选项允许我们将水平滚动条链接到 **Entry** 部件。\n\n此示例展示了\
    \ **Entry** 部件中 state 和 **textvariable** 选项的用法，如下所示：\n\n```python\nfrom tkinter\
    \ import *\n\nclass MySTATE:\n    def __init__(self, myroot):\n        self.myvar\
    \ = StringVar()\n        self.myvar.set('python')\n\n        self.myl1 = Label(myroot,\
    \ text = 'Normal state')\n        self.myl1.grid(row = 0, column = 0)\n\n    \
