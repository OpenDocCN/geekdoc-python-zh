    \n## 10. Getting Widget Information and Trace in tkinter\n\n- Introduction\n-\
    \ Structure\n- Objectives\n- Getting widget information\n- Trace in tkinter\n\
    \  - trace_add()\n  - trace_remove()\n  - trace_info()\n- Conclusion\n- Points\
    \ to remember\n- Questions\n\n## 11. UserLogin Project in tkinter GUI Library\
    \ with sqlite3 Database\n\n- Introduction\n- Structure\n- Objectives\n- GUI interaction\
    \ with sqlite3 database\n- Displaying a GUI application\n- Conclusion\n- Points\
    \ to remember\n- Questions\n\n## Index\n\n# CHAPTER 1\n# tkinter\n# Introduction\n\
    \n## Introduction\n\nWe have learned in our previous book *Python for Everyone*,\
    \ about the concepts in Python which are procedure oriented or object oriented.\
    \ However, these concepts will be used as indispensable salt for our next learning,\
    \ which is related to **Graphical User Interface (GUI)**. We are surrounded by\
    \ GUI apps in day-to-day life. Whenever we are using our mobile phone/Desktop\
    \ applications and accessing any app or software, the first thing which we look\
    \ forward to is how to access these apps or software. Any app on mobile phone\
    \ or a computer system consists of hardware and is controlled by an operating\
    \ system. The high-level languages will be sitting on top of the operating system\
    \ and Python is no exception. So, in this chapter, we will learn about tkinter\
    \ library in Python.\n\n## Structure\n\nIn this chapter, we will discuss the following\
    \ topics:\n\n- Introduction to tkinter\n- Basic Python GUI Program\n- Some standard\
    \ attributes of Python tkinter GUI\n  - Colors\n  - Fonts\n  - Anchors\n  - Relief\
    \ Styles\n  - Bitmaps\n  - Cursors\n- Python tkinter Geometry Manager\n\n## Objectives\n\
    \nBy the end of this chapter, the reader will learn about creating basic GUI Python\
    \ program using the tkinter library. In addition to that, we will also explore\
    \ some standard attributes of Python tkinter GUI such as dimensions, colors or\
    \ fonts with various options with examples. It is important to know how to position\
    \ the text with a list of constants, relative to the reference point using anchor\
    \ attribute. Moreover, we shall see how with the usage of relief attribute 3-D,\
    \ simulated effects around the outside of the widget can be provided. We will\
    \ also learn about bitmap and cursor attribute with examples. Finally, at the\
    \ end of this chapter, we will learn accessing tkinter widgets using inbuilt layout\
    \ geometry managers viz pack, grid and place.\n\n## Introduction to tkinter\n\n\
    Whenever we write any program in Python to control the hardware, Python will show\
    \ the output with the help of operating system. However, if we desire to make\
    \ an executable with the help of GUI, then just having the need of hardware and\
    \ operating system is insufficient. Python requires some services which come from\
    \ a number of resources and one such resource which is of interest to many Python\
    \ programmers is Tcl/Tk. **Tcl** stands for **Tool Command Language** and it is\
    \ a scripting language with its own interpreter. On the other hand, Tk is a toolkit\
    \ for building GUIs. An important point to note is that Tcl/Tk is not Python and\
    \ we cannot control and access the services of Tcl/Tk using Python. So, another\
    \ package is introduced and is referred to as *tkinter*, and it is an intermediator\
    \ between Python and Tcl/Tk. tkinter will allow us to use the services of Tcl/Tk\
    \ using the syntax of Python. As Python code developers, we will not be directly\
    \ concerned with the Tcl/Tk. Binding of Python to the Tk GUI toolkit will be done\
    \ by tkinter. tkinter will make everything appear as an object. We can create\
    \ GUI, knowing that we can regard the window as an object, a label place on window\
    \ as an object and so on. Applications can be built from a view point of an object-oriented\
    \ programming paradigm. All we need to make sure is that we write our code in\
    \ such a way that it allows us access tkinter, as shown in the following *Figure\
    \ 1.1*:"
