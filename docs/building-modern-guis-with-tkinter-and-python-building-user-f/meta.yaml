    # Fonts


    We can access the font in tkinter by creating a font object or by using a tuple.


    # By creating a font object


    Suppose we have a text. We can underline the text, change the size, give some
    font family, overstrike it, and so on.


    To create a font object, first, we need to import a **tkinter.font** module and
    use the **Font** class constructor:


    ```

    from tkinter.font import Font

    myobj_font = Font(options,...)

    ```


    The options are:


    +   - **family**: This option represents the name of the font family as a string.

    - **size**: This option represents an integer in points for font height.

    - **weight**: This option represents ‘bold’ and ‘normal’.

    - **slant**: This option represents ‘italic’ and ‘unslanted’.

    - **underline**: This option represents whether the text is to be underlined or
    not. 1 represents for underline text and 0 for normal.

    - **overstrike**: This option represents whether the text is overstruck or not.
    1 represents overstruck text and 0 for normal.


    Refer to the following code:


    ```

    from tkinter import * # importing module

    from tkinter.font import Font

    myroot = Tk() # window creation and initialize the interpreter


    myfont1 = Font(family = ''Calibri'',size=12, weight = ''bold'', slant=''italic'',
    underline = 1, overstrike = 1) # 1 means we require underline

    myl1 = Label(myroot, text = ''Python'', font = myfont1)

    myl1.pack() # for displaying the label


    myroot.mainloop() # display window until we press the close button

    ```'
