    # tkinter Scrollbar widget


    This widget will add the scrolling capability to the various widgets such as ListBox,
    Canvas, Entry, and Text. The vertical scrollbar can be implemented in ListBox,
    Canvas, and Text widgets whereas the horizontal scrollbar can be implemented in
    the Entry widget. The content is rolled through vertically or horizontally.


    The syntax is:


    ```

    mysc1= Scrollbar(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, bd, activebackground, cursor, command, elementborderwidth, highlightcolor,
    highlightbackground, highlightthickness, orient, jump, repeatdelay, repeatinterval,
    width, takefocus, and troghcolor.


    We have seen most of the options but some undiscussed options are as follows:


    +   - **command**: This option will associate with a function whenever the scrollbar
    is moved by the user.

    - **elementborderwidth**: This option will specify the border width around the
    arrow heads/cursor points and slider. The default value of **elementborderwidth**
    is -1 and can be set as per need.

    - **orient**: This option will allow the orientation scrollbar and can be set
    to either HORIZONTAL or VERTICAL.

    - **jump**: This option will control the scroll jump behavior. The default value
    is 0 where every small slider drag will cause the command callback to be called.
    The callback is not called when set to 1, until the user releases the mouse button.

    - **repeatdelay**: This option whose default duration is 300msec will allow controlling
    the duration of the button1 to be held down in the trough before the slider will
    start moving in that direction repeatedly.

    - **repeatinterval**: This option is for repeating the slider interval whose default
    value is 100msec.

    - **takefocus**: This option will allow tabbing the focus through the scrollbar
    widget. We can set this option to 0 when not needed.'
