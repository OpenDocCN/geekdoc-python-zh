    # Objectives


    In this chapter, the reader will firstly learn about the creation of a simple
    GUI app using the tkinter Entry widget in a very neat way with various options
    and explanations, followed by different examples. Then, the validation concept
    in the Entry widget is also explained. Next, we shall see about the scrollbar
    widget where the user will look into the scrolling capability in the vertical
    or horizontal direction with different widgets such as List Box, Entry, and Text.
    Another one is the tkinter Spinbox widget where the range of input values will
    be fed to the user, out of which the user can select one. Next, we will explore
    how to implement a graphical slider to any Python application program by using
    the tkinter Scale widget followed by the concept of the tkinter Text widget, where
    the user can insert multiple text fields. Finally, we will be dealing with the
    tkinter Combobox widget and its applications.


    # tkinter Entry widget


    A widget that accepts single-line text strings from the user. A single line of
    text can be entered or displayed in this widget. It generally comes with a label
    because it is unclear what the user should type if we are not mentioning labels.
    The addition of more than one input field is allowed.


    The syntax is:


    ```

    my11= Entry(myroot , options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, command, bd, cursor, exportselection, font, highlightcolor,
    justify, fg, relief, selectborderwidth, selectbackground, selectforeground, state,
    show, textvariable, xscrollcommand, and width.


    We have seen the maximum options and will discuss those options which we have
    not discussed:


    +   - **command**: Every time, the operation needs to happen when the state of
    the **Entry** widget is changed.'
