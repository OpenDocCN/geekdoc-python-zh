    # CHAPTER 4

    Getting Insights of Input Widgets in tkinter


    # Introduction


    In tkinter, users can enter data into a programme using input widgets, which are
    GUI components. There are several different types of input widgets, including
    text fields, check boxes, radio buttons, and drop-down menus. Using the suitable
    classes and methods offered by the library, these widgets can be added to a GUI
    window in tkinter. After being introduced, input widgets can be customized to
    meet the needs of the application by establishing default values, applying validation
    criteria, or imposing input volume restrictions. They can also be connected to
    programme logic, so that when a user interacts with them, a variable is updated
    or an event is started. Overall, input widgets offer a straightforward and understandable
    way to interact with software and enter data, and they are a crucial part of the
    majority of GUI programmes.


    # Structure


    In this chapter, we will discuss the following topics:


    +   - tkinter Entry widget

    - tkinter Scrollbar widget

    - tkinter Spinbox widget'
