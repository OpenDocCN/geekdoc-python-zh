    \ Whenever we will be implementing compound widgets, then a **Frame** class can\
    \ act as a base class. We can have multiple frames per window.\n\nThe syntax is\
    \ as follows:\n\n```python\nmyfr1= Frame(myroot, options...)\n```\n\nwhere,"
