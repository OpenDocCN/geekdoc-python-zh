    # Objectives


    By the end of this chapter, the reader will learn how to store data associated
    with widgets in tkinter, by using variable classes such as **StringVar()**, **BooleanVar()**,
    **IntVar()** and **DoubleVar()** for storing string, Boolean, integer and floating
    point values respectively. Finally, we shall see the importance of Tkinter''s
    classes and objects which can be used to create GUIs, thus improving the code''s
    organization, maintainability, and reusability, which also offers flexibility
    and aids in lowering the complexity of the code.


    # Inbuilt variable classes


    A variable is needed with a wide variety of widgets. Whenever a user enters some
    text in the **Entry** widget or **Text** widget, a string variable is needed to
    track the written text. If there is a Checkbox widget, a Boolean variable is needed
    to track whether the user has checked or not. If the user requires some value
    in the **Spinbox** or **Slider** widget, then an integer variable is required
    to track the value. There is a Variable class in the tkinter which responds to
    changes in widget-specific variables. The commonly used pre-defined variables
    which are subclassed from the tkinter variable class are **StringVar**, **BooleanVar**,
    **IntVar**, and **DoubleVar**. We can associate one variable with more than one
    widget so that the same information can be displayed by more than one widget.
    Moreover, when the values are changed, the functions can be binded which are to
    be called. Methods such as **get()** and **set()** will be used to retrieve and
    set the values of these variables.


    # StringVar()


    This variable will hold a string and the default value is an empty string, as
    follows:


    ```

    from tkinter import *


    myroot = Tk() # creating an object of Tk class -- object of window

    # we should first know how to create a window if want to per-

    # form graphics coding.

    # but output window will not be displayed right now


    myroot.geometry(''200x200'') # but can be resized to any pixel un-

    # til we are using root.resizeable

    myroot.resizable(0,0) # window size is fixed. cannot be larg-

    # er or smaller.

    ```'
