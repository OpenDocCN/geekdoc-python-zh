    - **repeatdelay**: This option will control the button autorepeat and is given
    in milliseconds.

    - **repeatinterval**: This option is similar to **repeatinterval** and is given
    in milliseconds.

    - **textvariable**: This option will have no default value and is a control variable
    that will control the widget behavior text.

    - **to**: This option displays the maximum limit value of the widget.

    - **validate**: This option will represent the validation mode and its default
    value is None.

    - **validatecommand**: This option will represent the validation callback and
    there is no default value.

    - **wrap**: This option will be wrapping the up and down button of the above widget.

    - **xscrollcommand**: This option will be set to the above widget **set()** method
    for scrolling the widget horizontally.'
