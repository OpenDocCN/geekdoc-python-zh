  md: '# CHAPTER 6

    Getting Insights of Container Widgets in tkinter


    # Introduction


    The need for container widgets in Python tkinter arises from their ability to
    manage and organise the layout of other widgets in a **Graphical User Interface
    (GUI)** application. We can group relevant widgets together and arrange them in
    a way that makes sense to the user by utilising container widgets. The following
    are some advantages of using container widgets in tkinter:


    +   - We can manage the positioning and layout of child widgets using container
    widgets like tkinter Frame and tkinter PanedWindow, which makes it simpler to
    design a logical and visually appealing GUI.

    - The container widgets are used to organize your code, which will make it simpler
    to read and maintain. The code can be made simpler by grouping related widgets
    and defining them as a single entity.

    - The container widgets help us in logically grouping widgets depending on their
    intended use. For instance, we could use a tkinter LabelFrame to group a set of
    radio buttons related to one particular option.

    - The GUI can be scaled and resized with the use of container widgets. The tkinter
    **PanedWindow** widget can be used to divide the GUI into resizable panes. The
    tkinter Notebook widget is used to provide a tabbed interface.'
  merge: -1
  pgno: 222
- img_proc: true
  md: 'Let us view different container widgets in tkinter.


    # Structure


    In this chapter, we will discuss the following topics:


    +   - tkinter Frame Widget

    - tkinter LabelFrame Widget

    - tkinter Tabbed/Notebook Widget

    - tkinter PanedWindow Widget

    - tkinter Toplevel Widget


    # Objectives


    After going through this chapter, the user will learn about tkinter Frame widget
    where different widget positions can be arranged, padding can be provided, can
    be used as a geometry manager for other widgets and so on. We shall look into
    the variant of the Frame widget, which is tkinter LabelFrame and is a container
    for complex window layouts. Users will be able to see frame features along with
    label display. Moreover, we shall view creating a tabbed widget with the help
    of the Notebook widget. Here, the user can select different pages of content by
    clicking on tabs. The importance of the tkinter PanedWindow widget will be explored
    where multiple examples will be seen containing horizontal or vertical stacks
    of child widgets. Finally, we will look into the tkinter Toplevel widget where
    the concepts are being explained for the creation and display of top-level windows.


    # tkinter Frame Widget


    This widget is a container widget responsible for arranging widgets positions.
    It is used as a geometry master for other widgets, but only one per frame and
    is a rectangular region of the screen. The other widgets are grouped into complex
    layouts using the **Frame** widget. If we need to provide padding between the
    widgets, then it can be done by using this widget. Whenever we will be implementing
    compound widgets, then a **Frame** class can act as a base class. We can have
    multiple frames per window.


    The syntax is as follows:


    ```

    myfr1= Frame(myroot, options...)

    ```


    where,'
