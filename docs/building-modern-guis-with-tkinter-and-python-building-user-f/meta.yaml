    myroot = Tk()\nmyroot.geometry('300x300')\ndef myselected():\n    mychk1.config(state=NORMAL)\n\
    \ndef mydisabled():\n    mychk1.config(state=DISABLED)\n\nmybtn1 = Button(myroot,\
    \ text = 'Normal', command = myselected)\nmybtn1.place(x = 50, y = 50)\nmybtn2\
    \ = Button(myroot, text = 'Disabled', command = mydisabled)\nmybtn2.place(x =\
    \ 50, y = 100)\n\nmychk1 = Checkbutton(myroot, text = 'CheckButton')\nmychk1.place(x\
    \ = 100, y = 150)\n\nmyroot.mainloop()\n```\n\n参考 *图 3.27*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_105_0.png)\n\
    \n其中，\nA) 点击 **Disabled** 按钮时的输出\nB) 点击 **Normal** 按钮时的输出\n\n> 注意：前面的代码包含在程序名称：Chap3_Example21.py\
    \ 中\n\n在给定的代码中，我们可以看到当复选按钮的状态为 DISABLED 时，复选按钮变得无响应。当点击 Normal 按钮时，它会恢复到 state\
