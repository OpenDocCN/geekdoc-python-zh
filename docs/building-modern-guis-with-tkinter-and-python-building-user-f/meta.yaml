    # Building Modern GUIs with tkinter and Python


    Building user-friendly GUI applications with ease


    Saurabh Chandrakar

    Dr. Nilesh Bhaskarrao Bahadure


    ![](img/ecddba8119455057e37d50bbef734ff6_2_0.png)


    www.bpbonline.com


