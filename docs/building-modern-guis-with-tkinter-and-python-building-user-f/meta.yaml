    # # tkinter Scale widget


    This widget will allow you to select from a range of numbers by providing a graphical
    slider object and moving through a slider. Here, we can set the minimum and maximum
    values.


    The syntax is as follows:


    ```

    myscl1= Scale(myroot, options...)

