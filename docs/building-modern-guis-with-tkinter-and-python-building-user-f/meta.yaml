    ISBN 978-93-55518-569


    www.bpbonline.com


    # Dedicated to


    My Parents

    **Dr Surendra Kumar Chandrakar**

    and

    **Smt. Bhuneshwari Chandrakar**

    Brother **Shri Pranav Chandrakar**

    to my wife **Priyanka Chandrakar**

    and to my lovely son **Yathartha Chandrakar**

    - Saurabh Chandrakar


    My Parents

    **Smt. Kamal B. Bahadure**

    and

    **Late Bhaskarrao M. Bahadure**

    to my in-laws

    **Smt. Saroj R. Lokhande** and **Shri. Ravikant A. Lokhande**

    and to my wife **Shilpa N. Bahadure**

    and to beautiful daughters **Nishita** and **Mrunmayee**

    And to all my beloved students.

    - Dr. Nilesh Bhaskarrao Bahadure


    # About the Authors


    - **Saurabh Chandrakar** is a Research & Development Engineer (Dy. Manager) at
    Bharat Heavy Electricals Limited (BHEL) Hyderabad. He is the winner of the best
    executive award on Operations Division by BHEL Hyderabad. Recently, he has been
    awarded the prestigious BHEL Excellence Award under Anusandhan category for Redundant
    Composite Monitoring System of Power Transformers project. He has 20 copyrights
    and 1 patent granted. Additionally, he has 6 patents filed. Moreover, he has published
    3 books in reputed publications such as BPB New Delhi (Programming Techniques
    using Python), Scitech Publications Chennai (Programming Techniques using matlab)
    and IK International publishers (Microcontrollers and Embedded System Design).
    He has also launched 1 video course on BPB titled “First Time Play with Basic,
    Advanced Python concepts and complete guide for different python certification
    exams all in one umbrella.”


    - **Nilesh Bhaskarrao Bahadure** received his Bachelor of Engineering degree in
    Electronics Engineering in 2000, his Master of Engineering degree in Digital Electronics
    in 2005, and the Ph.D. degree in Electronics in 2017 from KIIT Deemed to be University,
    Bhubaneswar, India. He is currently an Associate Professor in the Department of
    Computer Science and Engineering at Symbiosis Institute of Technology (SIT), Nagpur,
    Symbiosis International (Deemed University) (SIU), Pune, Maharashtra, India. He
    has more than 20 years of experience. Dr. Bahadure is a life member of IE(I),
    IETE, ISTE, ISCA, SESI, ISRS, and IAENG professional organizations. He has published
    more than 40 articles in reputed international journals and conferences, and has
    5 books to his credit. He is the reviewer of many indexed journals such as IEEE
    Access, IET, Springer, Elsevier, Wiley and so on. His research interests are in
    the areas of Sensor Technology, the Internet of Things, and Biomedical Image Processing.


    # About the Reviewer


    **Dr. Prasenjeet Damodar Patil** received B.E in E&TC Engineering from Sant Gadgebaba
    Amravati University and M. Tech. from Walchand College of Engineering Sangli,
    India. He did his Ph.D. degree in E&TC Engineering from Sant Gadgebaba Amravati
    University. He has 14+ years of teaching experience. Currently, he is working
    as Associate Professor at School of Computing, M.I.T A.D.T University, Pune. He
    has published more than 15 papers in reputed Journals. His research interest includes
    Computational Electromagnetics applications in Integrated Optics, IoT & Digital
    Image Processing.


    # Acknowledgements


    First and foremost, I would like to thank you all for selecting this book. It
    has been written with the beginner reader in mind. First of all, I take this opportunity
    to greet and thank my mentor Prof. Nilesh Bahadure Sir for motivating me and always
    communicating his expertise fully on topics related to Python. I am very thankful
    for being his protégé. I appreciate his belief in me, for always standing behind
    me and pushing me to achieve more. The phrase "Journey of Thousand Miles Begins
    with a Single Step" is something he always reminds me of.


    Thank you to my parents, Dr. Surendra Kumar Chandrakar and Smt. Bhuneshwari Chandrakar,
    my brother, Shri Pranav Chandrakar, my beloved wife, Mrs. Priyanka Chandrakar,
    my adorable son Yathartha Chandrakar, and all of my friends have inspired me and
    given me confidence over the years. Last but not least, I would like to express
    my sincere gratitude to the staff at BPB Publications for their contributions
    and insights that made parts of this book possible.


    - Saurabh Chandrakar


    It was my privilege to thank Dr. S. B. Mujumdar, Chancellor of the Symbiosis International
    University, Pune, and Shri. Vijay Kumar Gupta, Chairman of Beekay Industries Bhilai
    and BIT Trust, for his encouragement and support. I would like to thank my mentors
    Dr. Arun Kumar Ray, Dean, School of Electronics Engineering, KIIT Deemed to be
    University, Bhubaneswar, and Dr. Anupam Shukla, Director, SVNIT Surat. I would
    like to thank Dr. Vidya Yeravdekar, Principal Director of Symbiosis Society, and
    the Pro-Chancellor of Symbiosis International University, Pune, Dr. Rajani R.
    Gupte, Vice Chancellor of the Symbiosis International University, Pune, Dr. Ketan
    Kotecha, Dean, Faculty of Engineering, Symbiosis International University, Pune,
    and Dr. Mukesh M. Raghuwanshi, Director, SIT Nagpur, for their advice, and encouragement
    throughout the preparation of the book.


    I would also like to thank Dr. Sanjeev Khandal, HOD, Department of Aeronautical
    Engineering, SGU Kolhapur, my well-wisher Dr. Prasenjeet D. Patil, Associate Professor,
    MIT ADT University, Pune, and my colleagues in Symbiosis Institute of Technology
    Nagpur for providing valuable suggestions and lots of encouragement throughout
    the project.


    I am thankful to Prof. Dr. N. Raju, Sr. Assistant Professor, SASTRA University,
    Thanjavur, Tamil Nadu, for his support, assistance during writing, and for his
    valuable suggestions.


    I would also like to thank Dr. Ravi M. Potdar, Sr. Associate Professor, BIT Durg,
    and Dr. Md. Khwaja Mohiddin, Associate Professor, BIT Raipur for providing valuable
    suggestions and lots of encouragement throughout the project. Writing a beautiful,
    well-balanced, and acquainted book is not a work of one or two days or a month;
    it takes a lot of time and patience, as well as hours of hard work. Many thanks
    to my family members, parents, wife, children, and well-wishers for their kind
    support. Without them and their faith and support, writing this classic book would
    have remained just a dream. I also like to thank my students, who have always
    been with me, for relating problems and finding solutions too. Perfection in any
    work does not come in a day. It needs a lot of effort, time and hard work, and
    sometimes, proper guidance.


    It is my privilege to thank Prof. (Dr.) Ram Dhekekar, Professor, Department of
    Electronics & Telecommunication Engineering, SSGMCE Shegaon, and Dr. C. G. Dethe,
    Director UGC Staff College Nagpur. Last, but not least, I would like to offer
    an extra special thanks to the staff at “BPB Publications” for their insight and
    contribution to polishing this book.


    Most significantly, I want to thank Lord Ganesha for all of the work I was able
    to put into the book’s preparation. I would not be as zealous as I am now if it
    weren’t for God’s amazing creation of the universe.


    > "For since the creation of the world God’s invisible qualities - his eternal
    power and divine nature - have been clearly seen, being understood from what has
    been made, so that men are without excuse."


    - Dr. Nilesh Bhaskarrao Bahadure'
