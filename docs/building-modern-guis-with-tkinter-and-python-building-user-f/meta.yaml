    # Objectives


    After going through this chapter, the user will learn about tkinter Frame widget
    where different widget positions can be arranged, padding can be provided, can
    be used as a geometry manager for other widgets and so on. We shall look into
    the variant of the Frame widget, which is tkinter LabelFrame and is a container
    for complex window layouts. Users will be able to see frame features along with
    label display. Moreover, we shall view creating a tabbed widget with the help
    of the Notebook widget. Here, the user can select different pages of content by
    clicking on tabs. The importance of the tkinter PanedWindow widget will be explored
    where multiple examples will be seen containing horizontal or vertical stacks
    of child widgets. Finally, we will look into the tkinter Toplevel widget where
    the concepts are being explained for the creation and display of top-level windows.


    # tkinter Frame Widget


    This widget is a container widget responsible for arranging widgets positions.
    It is used as a geometry master for other widgets, but only one per frame and
    is a rectangular region of the screen. The other widgets are grouped into complex
    layouts using the **Frame** widget. If we need to provide padding between the
    widgets, then it can be done by using this widget. Whenever we will be implementing
    compound widgets, then a **Frame** class can act as a base class. We can have
    multiple frames per window.


    The syntax is as follows:


    ```

    myfr1= Frame(myroot, options...)

    ```


