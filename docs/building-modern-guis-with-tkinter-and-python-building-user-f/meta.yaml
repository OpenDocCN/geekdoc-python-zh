  mdcn: "注意：前面的代码包含在程序名称：Chap3_Example3.py 中。\n\n现在，在进入下一个控件之前，我们将讨论事件和绑定。\n\n## 事件和绑定\n\
    \n在目前的所有示例中，我们已经看到，除非我们按下父控件的“X”标记，否则 tkinter 代码大部分时间都花在事件循环（mainloop 方法）内部。我们可以看到诸如鼠标点击、focusin、focusout、按键事件等事件。为了将事件与函数绑定，使用了\
