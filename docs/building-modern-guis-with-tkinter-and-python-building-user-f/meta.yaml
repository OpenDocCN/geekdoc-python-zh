    # tkinter Message Widget


    This widget will display the text messages to the user which cannot be edited.
    It contains more than one line and can only be shown in a single font.


    The syntax is as follows:


    ```

    mymsg1= Message(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas, are bg, bd, bitmap, cursor, anchor, fg, font, width, height, image,
    justify, padx, pady, relief, text, textvariable, underline, wraplength, and width.


    We have seen and learned all the options till now. Let us see the example directly:


    ```

    from tkinter import *


    myroot = Tk()

    mystr = StringVar()


    # creation of message widget object

    mymsg1 = Message( myroot, textvariable=mystr, relief=RAISED, font = (''Calibri'',12),
    fg = ''Red'', bg = ''LightGreen'' )


    mystr.set("This is a string message")

    mymsg1.pack()

    myroot.mainloop()

    ```


    Output:


    The output can be seen in *Figure 5.13*:


    ![](img/ecddba8119455057e37d50bbef734ff6_210_0.png)


    Figure 5.13: Output'
