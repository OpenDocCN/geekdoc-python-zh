    # Conclusion


    In this chapter, we learned about the four important tkinter widgets where we
    saw their most commonly used options with multiple examples. We saw multiple user
    interactive examples highlighting their applications. We saw how an event was
    binded with a function with their important arguments. The binding of events to
    these widgets with multiple examples and different methods including lambda expressions
    was explained with examples. The instance level, application level and class level
    binding were well explored. Moreover, the background color of the main window
    was changed based on mouse enter, mouse leave, function press, keypress events
    and so on. Most importantly we need to know when to use these four widgets as
    per our need.


    # Points of remember


    +   - Button widget in tkinter is the most commonly used widget for creating GUI
    applications in tkinter.

    - Checkbutton widget gives the provision to the user to select more than one option.

    - Radiobutton widget gives the provision to the user to select exactly one of
    the predefined sets of options will be chosen.

    - Option-Menu widget allows the user to display how a pop-menu and button widget
    will be created for an individual option selection from a list of options.

    - Binding an event to a widget instance is called instance binding. Binding an
    event to entire application is called application-level binding. Binding an event
    to a particular class level is called class-level binding.


