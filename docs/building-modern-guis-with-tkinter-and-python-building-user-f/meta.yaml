    # # tkinter Tabbed/Notebook Widget


    The tabbed widget is created by using the Notebook widget of the **ttk** module.
    Modern-looking **Graphical User Interfaces** (GUIs) can be made using the improved
    range of widgets and styles offered by the **ttk** module in Tkinter. The term
    "Themed Tkinter" refers to a style of tkinter widgets that is more unified and
    aesthetically pleasing than the standard Tkinter widgets. As the underlying tkinter
    framework is built on top of the **ttk** module, user can still utilize popular
    tkinter methods and properties with **ttk** widgets. By doing this, the user may
    take advantage of the extra functionality and aesthetic choices offered by **ttk**
    while still keeping the compatibility of the previous tkinter code.


    Compared to the regular tkinter widgets, the **ttk** widgets offer a variety of
    advantages, including:


    +   - Rendering of anti-aliased fonts in X11.

    - Transparency of windows (X11 only; requires composite window manager).

    - Separation between the code responsible for a widget''s look and that responsible
    for its behavior.


    This **ttk** notebook widget will manage the windows collection, and display one
    at a time. The child window will be associated with a tab. A single tab can be
    selected by the user at a time to view the window content.'
