    # Conclusion


    In this chapter, we learned how to connect any GUI program with sqlite3 database
    by creating a small GUI application using tkinter library. Different steps of
    interacting with sqlite3 database were explored from initially importing the module,
    then connecting to the database, creating a cursor object followed by execute
    queries and committing the changes and finally closing the connection. We saw
    step by step approach of interacting our GUI application with sqlite3 database
    by creating Login form, Registration form, Home Page, various tabs as per need
    and so on.


    # Points to remember


    +   - **Import the required libraries**: To connect to the SQLite3 database, we
    need to import the sqlite3 library in addition to the tkinter library.

    - **Establishing a database connection**: To connect to the sqlite3 database,
    use the `sqlite3.connect()` function. The parameter for this function is the name
    of the database file.

    - **Creating a cursor**: After establishing a connection, use the connection object''s
    `cursor()` method to generate a cursor. Executing SQL commands and obtaining data
    from the database are done using this cursor.

    - **Make GUI components**: Create a GUI that communicates with the database using
    tkinter widgets like Label, Entry, Button, and so on.'
