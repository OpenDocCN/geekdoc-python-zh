    \ 应用程序中的多种消息框，例如信息、警告、错误、问题、确定/取消、是/否等。\n\n## 要点回顾\n\n- 使用标签小部件，我们可以在窗口中显示文本或图像。Label\
    \ 小部件的文本、字体、前景色和边框是其一些关键属性。\n- 使用消息小部件在窗口中显示文本时，文本可以自动换行。Message 小部件的文本、字体、前景色、背景色和边框是其一些关键属性。\n\
    - 使用 MessageBox 小部件可以显示带有可选按钮和消息的消息框。messagebox 最常用于向用户提供警报或确认消息。消息框的 type 参数可用于指定可用的按钮。\n\
    - 其他小部件，如照片、按钮和其他标签，可以包含在 Label 小部件内。\n- MessageBox 小部件提供了多种消息框类型，每种类型都有独特的功能和返回结果，包括\
    \ showinfo、showwarning、showerror、askquestion、askokcancel 和 askyesno。\n- MessageBox\
