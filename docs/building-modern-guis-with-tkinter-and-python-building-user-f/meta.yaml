    to listen for. We will discuss each section one by one.

    - **event modifiers**: They can change the circumstances in which an event’s handler
    is activated and is an optional component for creating an event binding. We should
    note that most of the event handlers are platform specific and will not work on
    all platforms.

    - **Shift**: While the event is occurring, the shift button needs to be pressed.

    - **Control**: While the event is occurring, the Control button needs to be pressed.

    - **Alt**: While the event is occurring, the Alt button needs to be pressed.

    - **Lock**: When the event occurs, the caps lock button needs to be activated.

    - **Double**: The event will be happening twice in quick succession, say double-click.

    - **Triple**: The event will be happening thrice in quick succession.

    - **Quadruple**: The event will be happening four times in quick succession.


    # event type


    The different event types in tkinter are as follows:


    +   - **ButtonPress or Button**: An event will be generated or activated when
    a mouse button has been clicked. Event <Button-1> defines the left mouse button,
    Event <Button-2> defines the middle button, Event <Button-3> defines the'
  - '[PAGE 80]


    right mouse button, Event <Button-4> defines scroll-up on mice with wheel support,
    Event <Button-5> defines scroll-down on mice with wheel support.


    +   - **ButtonRelease:** An event will be generated or activated when a mouse
    button has been released. Events <ButtonRelease-1>, <ButtonRelease-2> and <ButtonRelease-3>
    will specify the left, middle, or right mouse button.

    - **Keypress or Key:** An event will be generated or activated when a keyboard
    button has been pressed.

    - **KeyRelease:** An event will be generated or activated when a keyboard button
    is released.

    - **Motion:** An event will be generated or activated when the mouse cursor is
    moved across the widget. Events <B1-Motion>, <B2-Motion> and <B3-Motion> will
    specify the left, middle, or right mouse button. The mouse pointer''s current
    position will be provided in the x and y members of the event object passed to
    the callback, that is, event.x, event.y.

    - **Enter:** An event will be generated or activated when the mouse cursor enters
    the widget.

    - **Leave:** An event will be generated or activated when the mouse cursor leaves
    the widget.

    - **FocusIn:** An event will be generated or activated when the widget gains the
    input focus.

    - **FocusOut:** An event will be generated or activated when the widget loses
    the input focus.

    - **Configure:** An event will be generated or activated when the widget configurations
    are changed such as width, height, or border width being adjusted by the user,
    and so on.

    - **Mousewheel:** An event will be generated or activated when the mouse wheel
    is scrolled.

    - **Event details:** It is an optional section and will serve as either a mouse
    button or a certain key on the keyboard being pressed.

    - **For keyboard events:** The keyboard event detail is captured such that each
    key pressed on the keyboard will be represented by a key symbol or key letter
    itself. The ASCII value of the specific key is given for triggering the event
    when using Key, KeyPress, or KeyRelease.

    - **For mouse events:** The mouse event detail is captured such that numeric detail
    from 1 to 5 will represent the specific mouse button we wish to have to handle
    the trigger.'
  - '[PAGE 81]


    The second argument is a handler which represents the function name to call (callback
    function) when the event occurs. It takes an event parameter.


    The attributes for the mouse events are as follows:


    +   - **x and y**: It will return the x and y coordinate mouse position in pixels
    where events such as Buttons occur.

    - **x_root and y_root**: It is similar to x and y but is relative to the upper-left
    screen corner.

    - **num**: It returns the mouse button number.


    The attributes for the keyboard events are:


    +   - **char**: It is for keyboard events only and pressed character as a string.

    - **keysym**: It is for keyboard events only and pressed key symbol.

    - **keycode**: It is for keyboard events only and pressed key code.


    As the event handler, the function included will be passed as an event object
    which will describe the events and include details about the event which was triggered.
    So, a parameter is to be included which will be assigned to this object in the
    function.


    The third parameter, which can be None, is added to replace the callback if there
    was a previous binding or ''+'' to preserve the old ones and add the callback.


    Now, if we want to bind an event to a widget instance, then it is called *instance-level
    binding*.


    There are times when it is needed to bind events to an entire application, which
    is called ***application-level binding*** where the same binding is used across
    all the windows and application widgets as long as any one application window
    is in focus. The syntax of application-level binding is:


    ```

    widget.bind_all(event, callback)

    ```


    For example:


    ```

    myroot.bind_all(''<F1>'', show_help)

    ```


    Here, if we press the *F1* key and then the **show_help** callback will always
    trigger, irrespective of any widget the focus as long as the application is under
    active focus.


    Another is *class-level binding* where the events can be bound at a particular
    class level. The syntax of class-level binding is:


    ```

    widget.bind_class(classname, event, callback)

    ```


    For example,


    ```

    mye1.bind_class(''<Entry>'', ''<Control-C>'', copy)

    ```'
