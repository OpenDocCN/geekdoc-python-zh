- md: "## tkinter Toplevel widget\n\nThis widget is like Frame which is always contained\
    \ in a new window, that will first create and then display the toplevel windows.\
    \ These windows will be managed directly by the Windows manager. This widget may\
    \ or may not have the parent window on top of them. This widget will be required\
    \ whenever we want to see some group of widgets on the new window or we want to\
    \ display some extra information and so on.\n\nThe syntax is as follows:\n\n```\n\
    mytoplevel1= Toplevel(options...)\n```\n\nSome of the lists of options that can\
    \ be used as key-value pairs and are separated by commas are bg, bd, cursor, font,\
    \ class_, fg, height, relief, and width.\n\nWe have seen most of the options but\
    \ some undiscussed options are as follows:\n\n- **class_**: In this option, when\
    \ we select the text within a text widget, and the text selected in the text manager\
    \ will be exported. If set to 0, this option's behavior is avoided.\n\nSome of\
    \ the methods associated with this widget are as follows:\n\n- **deiconify()**:\
    \ This method is used to display the window.\n- **iconify()**: This method will\
    \ convert the top-level window into an icon without destroying it.\n- **frame()**:\
    \ This method will show a system-dependent window identifier.\n- **group(window)**:\
    \ This method will add a window to a specified window group.\n- **state()**: This\
    \ method will get the current window state, which could be normal, iconic, zoomed,\
    \ and withdrawn.\n- **protocol(name, function)**: This method will mention a function\
    \ that will be called for the specific protocol.\n- **transient([window])**: This\
    \ method will convert the window to a temporary window for the given master, when\
    \ there is no argument.\n- **withdraw()**: This method will remove the window\
    \ from the screen but it will not be destroyed.\n- **maxsize(width, height)**:\
    \ This method will define the maximum size for the window.\n- **minsize(width,\
    \ height)**: This method will define the minimum size for the window.\n- **resizable(width,\
    \ height)**: This method will help to control the window resizing and check whether\
    \ it can be resizable or not.\n- **positionfrom(who)**: This method will define\
    \ the position controller.\n- **sizefrom(who)**: This method will define the size\
    \ controller.\n- **title(string)**: This method will define the window title.\n\
    \nLet us see a basic example of this widget:\n\n```\nfrom tkinter import *\n\n\
    myroot = Tk()\nmyroot.geometry(\"250x250\")\n\ndef mynavigate():\n    # top level\
    \ object for creation of a new window\n    mytopobj = Toplevel(myroot)\n    mytopobj.geometry('250x250')\n\
    \    #getting the title for the window\n    mytopobj.title('NewWindow')\n    #\
    \ infinitely running mainloop\n    mytopobj.mainloop()\n\n# button object for\
    \ opening of new window on button click\nmybtn1 = Button(myroot, text = \"Mynavigate\"\
    , command = mynavigate)\n# positioning the button\nmybtn1.place(x=100,y=100)\n\
    \n# infinitely running mainloop\nmyroot.mainloop()\n```\n\nOutput:\n\nThe output\
    \ can be seen in *Figure 6.10*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_242_0.png)\n\
    \n*Figure 6.10: Output*\n\n> Note: The preceding code is covered in Program Name:\
    \ Chap6_Example9.py\n\nIn this code, on clicking the **Mynavigate** button, a\
    \ new top-level window is opened, having all the properties that a main window\
    \ should have.\n\nAn important point to note is that when the empty window is\
    \ created, it is 200x200 pixels.\n\nWe can create multiple toplevels over one\
    \ another, as shown:\n\n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry(\"\
    250x250\")\n\ndef mynavigate():\n    # top level object for creation of a new\
    \ window\n    mytopobj1 = Toplevel(myroot)\n    mytopobj1.geometry('250x250')\n\
    \    #getting the title for the window\n    mytopobj1.title('MyToplevel1')\n\n\
    \    myl1 = Label(mytopobj1, text = 'This is a toplevel1 window')\n    myl1.pack(pady\
    \ = 10)\n\n    mybtn1 = Button(mytopobj1, text = 'MyToplevel2 window', command\
    \ = func_mytoplevel2)\n    mybtn1.pack(pady = 10)\n\n    mybtn2 = Button(mytopobj1,\
    \ text = 'Exit', command = mytopobj1.destroy)\n    mybtn2.pack(pady = 10)\n\n\
    \    # infinitely running mainloop\n    mytopobj1.mainloop()\n\ndef func_mytoplevel2():\n\
    \    # top level object for creation of a new window\n    mytopobj2 = Toplevel(myroot)\n\
    \    mytopobj2.geometry('250x250')\n    #getting the title for the window\n  \
    \  mytopobj2.title('MyToplevel2')\n\n    myl1 = Label(mytopobj2, text = 'This\
    \ is a toplevel2 window')\n    myl1.pack(pady = 10)\n\n    mybtn2 = Button(mytopobj2,\
    \ text = 'Exit2', command = mytopobj2.destroy)\n    mybtn2.pack(pady = 10)\n\n\
    \    # infinitely running mainloop\n    mytopobj2.mainloop()\n\n# button object\
    \ for opening of new window on button click\nmybtn1 = Button(myroot, text = \"\
    MyToplevel1\", command = mynavigate)\n# positioning the button\nmybtn1.place(x=100,y=100)\n\
    \n# infinitely running mainloop\nmyroot.mainloop()\n```\n\nOutput:\n\nThe output\
    \ can be seen in *Figure 6.11*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_244_0.png)\n\
    \n*Figure 6.11: Output*\n\n> **Note: The preceding code is covered in Program\
    \ Name: Chap6_Example10.py**\n\nIn this code, we are trying to create multiple\
    \ top levels over one another. When the MyToplevel1 button is clicked on the main\
    \ window (A), a new toplevel1 window titled MyToplevel1 window is created (B).\
    \ It contains a button MyToplevel2 window and an Exit button.\n\nOn clicking the\
    \ MyToplevel2 window button, the user will navigate to the next MyToplevel2 window.\
    \ However, when the **Exit** button is clicked, then the MyToplevel1 window will\
    \ be closed. Similarly, on clicking the **Exit2** button, the MyToplevel2 window\
    \ will be closed. **Please note that we have positioned the GUI forms for you\
    \ for better understanding. When you will run the program, you just need to observe\
    \ how the output will come.**\n\nWe can control how the windows are stacked on\
    \ each other by using the `lift()` method to change the order:\n\n```\nfrom tkinter\
    \ import *\n\nmyroot = Tk()\nmyroot.geometry(\"300x300\")\nmyroot.title('Main\
    \ window')\nmytopobj = Toplevel(myroot)\nmytopobj.title('New window')\n\nmytopobj.geometry(\"\
    300x300\")\nmyroot.lift(mytopobj)\n\n# infinitely running mainloop\nmyroot.mainloop()\n\
    ```\n\nOutput:\n\nThe output can be seen in *Figure 6.12*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_245_0.png)\n\
    \n*Figure 6.12: Output*\n\n> **Note: The preceding code is covered in Program\
    \ Name: Chap6_Example11.py**\n\nWe can see that the focus is on the Main window\
    \ first, which is in front of the New window, that is, the position is lifted.\
    \ **Just run the code yourself and observe the output. The GUI position shown\
    \ next is for your better understanding.**\n\nWe can control whether the window\
    \ is visible or not by changing the state using the state method. The default\
    \ state is normal. We can make the window maximized by setting its state to zoom.\n\
    \n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry(\"300x300\")\n\
    myroot.title('Main window')\nmytopobj = Toplevel(myroot)\n\nmytopobj.title('New\
    \ window')\n\nmytopobj.geometry(\"300x300\")\nmytopobj.lift(myroot)\nmytopobj.state('zoomed')\n\
    \n# infinitely running mainloop\nmyroot.mainloop()\n```\n\nOutput:\n\nThe output\
    \ can be seen in *Figure 6.13*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_246_0.png)\n\
    \n*Figure 6.13: Output*\n\n> **Note: The preceding code is covered in Program\
    \ Name: Chap6_Example12.py**\n\nThe New window is expanded with the geometry size\
    \ to fit the entire screen. The Main window screen will be hidden behind the above\
    \ form.\n\nWe can hide the window by setting its state to be withdrawn, as shown:\n\
    \n```\nmytopobj.state('withdrawn')\n```\n\nRefer to *Figure 6.14*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_247_0.png)\n\
    \n*Figure 6.14: View after hiding the window*\n\nWe can only see the Main window\
    \ as the new window is hidden from the taskbar.\nIf we want to minimize the window\
    \ so that we can access it from the taskbar, we can use the iconic state, as shown:\n\
    \n`mytopobj.state('iconic')`\n\nRefer to *Figure 6.15*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_247_1.png)\n\
    \n*Figure 6.15: View after minimizing the window*\n\nThere are some shortcut methods\
    \ that can be switched between iconic and normal states. We can get the same output\
    \ shown in the taskbar by using `iconify()` method. The code is as follows:"
  mdcn: "## tkinter Toplevel 组件\n\n此组件类似于 Frame，但总是包含在一个新窗口中，该窗口会先创建然后显示顶层窗口。这些窗口将由窗口管理器直接管理。此组件上方可能有也可能没有父窗口。当我们需要在新窗口中查看一组组件，或者需要显示一些额外信息等时，就需要使用此组件。\n\
    \n语法如下：\n\n```\nmytoplevel1= Toplevel(options...)\n```\n\n一些可以作为键值对使用并用逗号分隔的选项列表包括\
    \ bg、bd、cursor、font、class_、fg、height、relief 和 width。\n\n我们已经见过大部分选项，但一些未讨论的选项如下：\n\
    \n- **class_**：在此选项中，当我们选择文本组件内的文本时，文本管理器中选中的文本将被导出。如果设置为 0，则避免此选项的行为。\n\n与此组件相关的一些方法如下：\n\
    \n- **deiconify()**：此方法用于显示窗口。\n- **iconify()**：此方法将把顶层窗口转换为图标，但不会销毁它。\n- **frame()**：此方法将显示一个系统相关的窗口标识符。\n\
    - **group(window)**：此方法将一个窗口添加到指定的窗口组。\n- **state()**：此方法将获取当前窗口状态，可能是 normal、iconic、zoomed\
    \ 和 withdrawn。\n- **protocol(name, function)**：此方法将指定一个函数，该函数将为特定协议调用。\n- **transient([window])**：当没有参数时，此方法将窗口转换为给定主窗口的临时窗口。\n\
    - **withdraw()**：此方法将从屏幕上移除窗口，但不会销毁它。\n- **maxsize(width, height)**：此方法将定义窗口的最大尺寸。\n\
    - **minsize(width, height)**：此方法将定义窗口的最小尺寸。\n- **resizable(width, height)**：此方法将帮助控制窗口调整大小，并检查是否可以调整大小。\n\
    - **positionfrom(who)**：此方法将定义位置控制器。\n- **sizefrom(who)**：此方法将定义大小控制器。\n- **title(string)**：此方法将定义窗口标题。\n\
    \n让我们看一个此组件的基本示例：\n\n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry(\"\
    250x250\")\n\ndef mynavigate():\n    # 用于创建新窗口的顶层对象\n    mytopobj = Toplevel(myroot)\n\
    \    mytopobj.geometry('250x250')\n    # 获取窗口标题\n    mytopobj.title('NewWindow')\n\
    \    # 无限运行的主循环\n    mytopobj.mainloop()\n\n# 用于在按钮点击时打开新窗口的按钮对象\nmybtn1 = Button(myroot,\
    \ text = \"Mynavigate\", command = mynavigate)\n# 定位按钮\nmybtn1.place(x=100,y=100)\n\
    \n# 无限运行的主循环\nmyroot.mainloop()\n```\n\n输出：\n\n输出可以在 *图 6.10* 中看到：\n\n![](img/ecddba8119455057e37d50bbef734ff6_242_0.png)\n\
    \n*图 6.10：输出*\n\n> 注意：前面的代码包含在程序名称：Chap6_Example9.py 中\n\n在此代码中，点击 **Mynavigate**\
    \ 按钮后，会打开一个新的顶层窗口，该窗口具有主窗口应具备的所有属性。\n\n需要注意的一个重要点是，当创建空窗口时，其大小为 200x200 像素。\n\n\
    我们可以在一个窗口之上创建多个顶层窗口，如下所示：\n\n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry(\"\
    250x250\")\n\ndef mynavigate():\n    # 用于创建新窗口的顶层对象\n    mytopobj1 = Toplevel(myroot)\n\
    \    mytopobj1.geometry('250x250')\n    # 获取窗口标题\n    mytopobj1.title('MyToplevel1')\n\
    \n    myl1 = Label(mytopobj1, text = 'This is a toplevel1 window')\n    myl1.pack(pady\
    \ = 10)\n\n    mybtn1 = Button(mytopobj1, text = 'MyToplevel2 window', command\
    \ = func_mytoplevel2)\n    mybtn1.pack(pady = 10)\n\n    mybtn2 = Button(mytopobj1,\
    \ text = 'Exit', command = mytopobj1.destroy)\n    mybtn2.pack(pady = 10)\n\n\
    \    # 无限运行的主循环\n    mytopobj1.mainloop()\n\ndef func_mytoplevel2():\n    # 用于创建新窗口的顶层对象\n\
    \    mytopobj2 = Toplevel(myroot)\n    mytopobj2.geometry('250x250')\n    # 获取窗口标题\n\
    \    mytopobj2.title('MyToplevel2')\n\n    myl1 = Label(mytopobj2, text = 'This\
    \ is a toplevel2 window')\n    myl1.pack(pady = 10)\n\n    mybtn2 = Button(mytopobj2,\
    \ text = 'Exit2', command = mytopobj2.destroy)\n    mybtn2.pack(pady = 10)\n\n\
    \    # 无限运行的主循环\n    mytopobj2.mainloop()\n\n# 用于在按钮点击时打开新窗口的按钮对象\nmybtn1 = Button(myroot,\
    \ text = \"MyToplevel1\", command = mynavigate)\n# 定位按钮\nmybtn1.place(x=100,y=100)\n\
    \n# 无限运行的主循环\nmyroot.mainloop()\n```\n\n输出：\n\n输出可以在 *图 6.11* 中看到：\n\n![](img/ecddba8119455057e37d50bbef734ff6_244_0.png)\n\
    \n*图 6.11：输出*\n\n> **注意：前面的代码包含在程序名称：Chap6_Example10.py 中**\n\n在此代码中，我们尝试在一个窗口之上创建多个顶层窗口。当在主窗口（A）上点击\
    \ MyToplevel1 按钮时，会创建一个标题为 MyToplevel1 window 的新 toplevel1 窗口（B）。它包含一个 MyToplevel2\
    \ window 按钮和一个 Exit 按钮。\n\n点击 MyToplevel2 window 按钮后，用户将导航到下一个 MyToplevel2 窗口。但是，当点击\
    \ **Exit** 按钮时，MyToplevel1 窗口将被关闭。类似地，点击 **Exit2** 按钮时，MyToplevel2 窗口将被关闭。**请注意，我们已经为您定位了\
    \ GUI 表单以便更好地理解。当您运行程序时，您只需要观察输出将如何呈现。**\n\n我们可以使用 `lift()` 方法来改变顺序，从而控制窗口如何相互堆叠：\n\
    \n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry(\"300x300\")\n\
    myroot.title('Main window')\nmytopobj = Toplevel(myroot)\nmytopobj.title('New\
    \ window')\n\nmytopobj.geometry(\"300x300\")\nmyroot.lift(mytopobj)\n\n# 无限运行的主循环\n\
    myroot.mainloop()\n```\n\n输出：\n\n输出可以在 *图 6.12* 中看到：\n\n![](img/ecddba8119455057e37d50bbef734ff6_245_0.png)\n\
    \n*图 6.12：输出*\n\n> **注意：前面的代码包含在程序名称：Chap6_Example11.py 中**\n\n我们可以看到焦点首先在主窗口上，它位于新窗口的前面，即位置被提升了。**请自行运行代码并观察输出。接下来显示的\
    \ GUI 位置是为了您更好地理解。**\n\n我们可以通过使用 state 方法更改状态来控制窗口是否可见。默认状态是 normal。我们可以通过将其状态设置为\
