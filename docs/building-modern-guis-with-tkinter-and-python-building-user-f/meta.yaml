    We shall now see how to use Statusbar in Python tkinter GUI applications using
    label widget.


    The label widget will display a narrow bar at the GUI bottom for indicating some
    extra information like file word counts or some relevant information which will
    add some extra value when interfacing with the user. There is no dedicated status
    bar widget in tkinter but a label widget with an appropriate configuration, that
    can be worked like a status bar in the GUI applications. Refer to the following:'
