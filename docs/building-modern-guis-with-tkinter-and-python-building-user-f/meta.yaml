  md: '+   - **Flexibility**: Classes and objects give us the ability to tweak and
    update GUIs since they let us make code changes without having an impact on other
    areas of the program.

    - **Code organization**: It helps us in organizing the code more clearly and makes
    it understandable by using classes and objects. When problems develop, it could
    also make it simpler to troubleshoot the code.


    # Conclusion


    In this chapter, we learned different approaches of data storage associated with
    widgets in tkinter by using variable classes such as **StringVar()**, **BooleanVar()**,
    **IntVar()** and **DoubleVar()** for storing string, Boolean, integer and floating
    point values respectively with python code.


    We have seen two approaches of displaying an application with and without usage
    of Tkinter''s classes and objects for creating GUIs. Finally, we can say that
    the approach of using classes and objects for GUI creation helps us in improving
    the code''s organization, maintainability, reusability and aids in lowering the
    complexity of the code.


    # Points to remember


    +   - For storing and manipulating string values and for representing the text
    or widgets value like Entry and label, we may use **StringVar()** variable.

    - For storing Boolean values and for representing the state of Checkbuttons or
    radiobuttons, we may use **BooleanVar()** variable.

    - For storing integer values and for representing the widget''s value like Spinbox
    or Scale, we may use **IntVar()** variable.

    - For storing floating point values and for representing the widget''s value like
    Spinbox or Scale, we may use **DoubleVar()** variable.

    - GUI application creating in tkinter using classes and objects offers several
    advantages such as encapsulation, reusability, modularity, inheritance, flexibility
    and code organization.


