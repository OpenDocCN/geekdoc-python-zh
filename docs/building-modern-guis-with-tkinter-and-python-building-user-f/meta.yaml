    \n- tkinter Listbox 小部件\n\n## 目标\n\n通过本章的学习，读者将了解 tkinter Listbox 小部件，用户可以在其中显示不同类型的项目列表，并且可以从列表中选择多个项目。我们将查看不同的选择模式示例以及附加到此小部件的滚动条。\n\
