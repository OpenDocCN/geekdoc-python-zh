    \n# 第 7 章\n深入了解 tkinter 中的项目小部件\n\n## 简介\n\n有时，需要允许用户从列表中选择一个或多个项目。我们可能需要一个用于创建菜单的应用程序，该程序要么允许用户选择不同的选项，要么需要显示项目列表，或者根据名称、日期、爱好等过滤和排序项目列表。我们确实需要\
