    \ *Figure 1.21*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_38_0.png)\n\n*Figure\
    \ 1.21: Output of Chap1_Example16.py*\n\n> **Note:** The preceding code is covered\
    \ in Program Name: Chap1_Example16.py\n\n## Anchors\n\nIf there is a requirement\
    \ to position the text relative to the reference point, then we should go for\
    \ anchors.\n\nThe possible list of constants used for anchor attributes are:\n\
