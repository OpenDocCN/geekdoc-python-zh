- md: "## Questions\n\n1. Explain the tkinter Entry widget in detail.\n2. Which widget\
    \ accepts single-line text strings from the user? Explain in detail with a suitable\
    \ example.\n3. How is the validation on an entry widget done? Explain the process\
    \ in detail.\n4. Explain the tkinter Scrollbar widget and its syntax.\n5. Explain\
    \ tkinter Spinbox Widget and its usage in GUI designing.\n6. How does the user\
    \ choose some fixed range of values? Explain the widget used for this purpose\
    \ in detail.\n7. Which widget is alternatively used in place of the entry widget?\
    \ Explain with suitable justification.\n8. Explain tkinter Scale Widget and its\
    \ syntax.\n9. Which widget allows one to select from a range of numbers by providing\
    \ a graphical slider object and moving through a slider? Explain this widget with\
    \ suitable justification and example.\n10. Explain the tkinter Text Widget in\
    \ detail.\n11. Explain tkinter Combobox Widget in detail with a sample program.\n\
    \n## Join our book's Discord space\n\nJoin the book's Discord Workspace for Latest\
    \ updates, Offers, Tech happenings around the world, New Release and Sessions\
    \ with the Authors:\n\n**https://discord.bponline.com**\n\n![](img/ecddba8119455057e37d50bbef734ff6_193_0.png)\n\
    \n## CHAPTER 5\nGetting Insights of Display Widgets in tkinter\n\n## Introduction\n\
    \nThe Label, Message, and MessageBox widgets in Tkinter must be learned in order\
    \ to create Python **Graphical User Interfaces (GUI)**, which are efficient and\
    \ easy to use. We will be able to display text, images, and dialog boxes to the\
    \ user, thanks to these widgets which are necessary for creating an effective\
    \ and user-friendly GUI. We can provide data to the user in a clear and organized\
    \ manner, using the Label and Message widgets. We could use a Label widget to\
    \ show a user's name or a Message widget to show a list of items, for instance.\
    \ We must use the MessageBox widget to handle errors in our application. We are\
    \ able to ask the user for input, such as whether to continue or cancel an operation,\
    \ and display error warnings to them. These widgets offer a variety of customization\
    \ options, including the ability to change the text, picture, and dialog box size,\
    \ colour, and font. For an application's user interface to be unique and different\
    \ from others, customization is essential.\n\n## Structure\n\nIn this chapter,\
    \ we will discuss the following topics:\n\n- tkinter Label Widget\n- tkinter Message\
    \ Widget\n- tkinter MessageBox Widget\n\n## Objectives\n\nBy the end of this chapter,\
    \ the reader will learn about the creation of a simple GUI app using the tkinter\
    \ Label widget which depicts the ways of displaying a text or image on a window\
    \ form. We shall also view a display of prompt unedited text messages to the user,\
    \ with the tkinter Message widget. Moreover, we will look into multiple message\
    \ boxes such as information, warning, error, and so on, in a Python application\
    \ by using the tkinter MessageBox widget.\n\n## tkinter Label Widget\n\nIt is\
    \ a standard tkinter widget where a text or an image can be displayed on the screen.\
    \ The text can be underlined, can be displayed in a single font and the text may\
    \ be spanned across multiple lines. It uses double buffering so that the contents\
    \ may be updated at any time without display of any flickering. In this widget,\
    \ one or more lines of text can be displayed which cannot be modified by the user.\n\
    \nThe syntax is as follows:\n\n```\nmyl1= Label(myroot, options...)\n```\n\nwhere,\n\
    \n- **myroot** is the parent window.\n- Some of the list of options that can be\
    \ used as key-value pairs and are separated by commas, are anchor (space between\
    \ are and anchor), bg, bitmap, bd, cursor, font, height, fg, justify, image, padx,\
    \ pady, text, textvariable, relief, width, wraplength, underline.\n\nWe have seen\
    \ most of the options but some undiscussed options are as follows:\n\n- **text**:\
    \ This option will display the text on the label. The '\\n' will force a line\
    \ break. So, one or more lines of text in the label can be displayed. This option\
    \ is ignored when the image or bitmap options are used.\n- **textvariable**: This\
    \ option will associate a tkinter variable (generally the StringVar) with the\
    \ label. The label text is updated if the variable is changed.\n- **image**: This\
    \ option will display the image in the label and the value should be a BitmapImage\
    \ or a PhotoImage. This option takes precedence over the bitmap and text options.\n\
    - **justify**: This option will define the alignment of multiple lines of text\
    \ with respect to each other. The default is CENTER and the other is LEFT or RIGHT.\n\
    \nLet us make a basic label widget in the parent window:\n\n```\nfrom tkinter\
    \ import *\n\nmyroot = Tk() # creating an object of Tk class -- object of window\n\
    \nmyroot.maxsize(300,300) # maximum size of window- It can be smaller like anything\
    \ but maximum up to 300 only\nmyroot.resizable(0,0) # window size is fixed. cannot\
    \ be larger or smaller.\nmytk_label = Label(myroot,text = 'Python\\nis\\nawesome',\
    \ font = ('Calibri',15),bg = 'Yellow',fg = 'Black',\n                   width\
    \ = '15', height = '3')\nmytk_label.pack()\n\nmyroot.mainloop()\n```\n\n**Output:**\n\
    The output can be seen in *Figure 5.1*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_196_0.png)\n\
    \n*Figure 5.1: Output*\n\n> **Note:** The preceding code is covered in Program\
    \ Name: Chap5_Example1.py\n\nIn the above code, we passed the window object into\
    \ the Label constructor and set the text property, which becomes the text Label\
    \ when displayed. Other options such as font, bg, fg, width, and height for the\
    \ font color, size, desired width, and height are defined and used to pack geometry\
    \ manager for organizing the label widget in the block. Here, we have displayed\
    \ multiple lines of text in a label.\n\nWe can set the look of the border of a\
    \ label by using the *borderwidth* and *relief* options as shown:\n\n```\nfrom\
    \ tkinter import *\n\nmyroot = Tk()\n\nmyl1_label = Label(myroot,text = 'Hey!\
    \ I', bd = 2, relief = 'solid',font = ('Calibri',15))\nmyl1_label.pack()\n\nmyl2_label\
    \ = Label(myroot,text = 'love', bd = 5, relief = 'sunken',font = ('Calibri',15),\
    \ padx = 10,pady = 10)\nmyl2_label.pack(padx = 10, pady = 10)\n\nmyl3_label =\
    \ Label(myroot,text = 'python', bd = 5, relief = 'raised',font = ('Calibri',15),\
    \ padx = 10,pady = 10)\nmyl3_label.pack(padx = 10, pady = 10)\n\nmyl4_label =\
    \ Label(myroot,text = 'to', bd = 5, relief = 'groove',font = ('Calibri',15), padx\
    \ = 10,pady = 10)\nmyl4_label.pack(padx = 10, pady = 10)\n\nmyl5_label = Label(myroot,text\
    \ = 'read', bd = 5, relief = 'groove',font = ('Calibri',15), padx = 10,pady =\
    \ 10)\nmyl5_label.pack(padx = 10, pady = 10)\n\nmyroot.mainloop()\n```\n\n**Output:**\n\
    \nThe output can be seen in *Figure 5.2*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_197_0.png)\n\
    \nNote: The preceding code is covered in Program Name: Chap5_Example2.py\n\nWe\
    \ can position text within a label widget as shown:\n\n```\nfrom tkinter import\
    \ *\n\nclass MyLabelPosition(Tk):\n    def __init__(self):\n        super().__init__()\n\
    \        self.title('Position Text within a label')\n        self.myl2= Label(self,\
    \ text = 'Hello\\nThere' ,bd = 4, relief = 'groove', font = 'Times 32', width\
    \ = 10, height = 4, anchor = SW)\n        self.myl2.pack()\n\nif __name__ == \"\
    __main__\":\n    myroot = MyLabelPosition()\n    myroot.mainloop()\n```\n\n**Output:**\n\
    \nThe output can be seen in *Figure 5.3*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_198_0.png)\n\
    \n*Figure 5.3: Output*\n\nNote: The preceding code is covered in Program Name:\
    \ Chap5_Example3.py\n\nIn the above case, we are positioning the text within the\
    \ label widget in South West direction.\n\nNow, we will see how to pad space around\
    \ the text of a label:\n\n```\nfrom tkinter import *\n\nclass MyPadSpace(Tk):\n\
    \    def __init__(self):\n        super().__init__()\n        self.title('Pad\
    \ space around the text')\n        myl1 = Label(self, text = 'Python')\n     \
    \   myl1.pack()\n        myl2= Label(self, text = 'Stay\\nSafe',bd = 4, relief\
    \ = 'groove',font = ('Verdana',12))\n        myl2.pack()\n        myl3 = Label(self,\
    \ text = 'Python')\n        myl3.pack()\n        myl4= Label(self,text = 'Stay\\\
    nSafe',bd = 4, relief = 'groove',font = ('Verdana',12),padx = 20)\n        myl4.pack()\n\
    \        myl5 = Label(self, text = 'Python')\n        myl5.pack()\n        myl6=\
    \ Label(self,text = 'Stay\\nSafe',bd = 4, relief = 'groove',font = ('Verdana',12),pady\
    \ = 10)\n        myl6.pack()\n        myl7 = Label(self, text = 'Python')\n  \
    \      myl7.pack()\n        myl8= Label(self,text = 'Stay\\nSafe',bd = 4, relief\
    \ = 'groove',font = ('Verdana',12),padx = 10, pady = 10)\n        myl8.pack()\n\
    \nif __name__ == \"__main__\":\n    myroot = MyPadSpace()\n    myroot.geometry('350x300')\n\
    \    myroot.mainloop()\n```\n\n**Output:**\n\nThe output can be seen in *Figure\
