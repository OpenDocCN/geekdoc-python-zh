    \ Chap1_Example13.py\n\nFrom the preceding code, we can observe that when the\
    \ text ‘python’ is selected, it is highlighted in Green color in the background\
    \ and Red color in the foreground.\n\n## Fonts\n\nWe can access the font in tkinter\
    \ by creating a font object or by using a tuple.\n\n### By creating a font object\n\
    \nSuppose we have a text. We can underline the text, change the size, give some\
    \ font family, overstrike it, and so on.\n\nTo create a font object, first, we\
    \ need to import a **tkinter.font** module and use the **Font** class constructor:\n\
    \n```python\nfrom tkinter.font import Font\nmyobj_font = Font(options,...)\n```\n\
    \nThe options are:\n\n- **family**: This option represents the name of the font\
    \ family as a string.\n- **size**: This option represents an integer in points\
    \ for font height.\n- **weight**: This option represents ‘bold’ and ‘normal’.\n\
    - **slant**: This option represents ‘italic’ and ‘unslanted’.\n- **underline**:\
    \ This option represents whether the text is to be underlined or not. 1 represents\
    \ for underline text and 0 for normal.\n- **overstrike**: This option represents\
    \ whether the text is overstruck or not. 1 represents overstruck text and 0 for\
    \ normal.\n\nRefer to the following code:\n\n```python\nfrom tkinter import *\
    \ # importing module\nfrom tkinter.font import Font\nmyroot = Tk() # window creation\
    \ and initialize the interpreter\n\nmyfont1 = Font(family = 'Calibri',size=12,\
    \ weight = 'bold', slant='italic', underline = 1, overstrike = 1) # 1 means we\
    \ require underline\nmyl1 = Label(myroot, text = 'Python', font = myfont1)\nmyl1.pack()\
    \ # for displaying the label\n\nmyroot.mainloop() # display window until we press\
    \ the close button\n```\n\nOutput:\n\nThe output can be seen in *Figure 1.20*:\n\
