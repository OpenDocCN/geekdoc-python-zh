- md: '## Preface


    The purpose of this book is to introduce readers with little to no programming
    experience, to Python Graphical User Interface (GUI). A GUI application can be
    created in any programming language, say VB.Net, C#.Net etc. In this book, we
    shall see how to create a GUI application using Python tkinter library. We will
    provide the readers with the foundational knowledge and skills which is required
    to start writing code for creating any desktop GUI app in Python language. By
    mastering Python tkinter library, readers will be able to apply this technology
    to solve real-world problems and create various useful applications according
    to their needs.


    The first part of the book covers basic GUI tkinter concepts followed by a touch
    of inbuilt variable classes for creating different tkinter GUI widgets. Then we
    shall see some insights of different widgets viz button, input, display, container,
    item and user-interactive widgets. Finally, in the later part of the book, we
    shall explore handling file selection and getting widget along with trace information
    in tkinter.


    This book covers a wide range of topics, from basic definition of different widgets
    along with various solved examples and well explanatory code. Overall, the book
    provides a solid foundation for beginners to start their journey for getting trained
    in python GUI using tkinter library.


    This book is divided into **11 chapters**. Each chapter description is listed
    as follows.


    **Chapter 1: tkinter Introduction** – will cover the basic GUI example of creating
    a parent window along with its size maximizing by adjusting the width or height.
    It will also introduce about each standard attribute of python tkinter GUI, which
    is, dimensions, colors, fonts, cursors and so on. The concept of tkinter geometry
    manager with examples will be covered. Finally, we will learn how to access and
    set pre-defined variables sub classed from the tkinter variable class viz StringVar,
    IntVar, DoubleVar and BooleanVar.


    **Chapter 2: Inbuilt Variable Classes for Python tkinter GUI Widgets** – will
    cover the concept of creating of a simple GUI windows app using classes and objects
    concepts.


    **Chapter 3: Getting Insights of Button Widgets in tkinter** – is dedicated to
    the concept of dealing with one of the most commonly used GUI widgets viz tkinter
    Button widget. We will view the binding of events to the above widget with multiple
    examples and different methods, including lambda expressions. Next, we shall see
    the Checkbutton widget which will give the provision to the user to select more
    than one option. The user will also view different options to get the image in
    the above widget. Next, we will see how to use tkinter Radiobutton widget. The
    user will see different examples where exactly one of the predefined set of options
    will be chosen. Last but not the least, we will explore tkinter OptionMenu widget
    where the user views how a pop menu and button widget will be created for an individual
    option selection from a list of options.


    **Chapter 4: Getting Insights of Input Widgets in tkinter** – is dedicated to
    cover the concept of creating a simple GUI app using tkinter Entry widget with
    very neat way of various options explanations, followed by different solved examples.
    Moreover, the validation concept in Entry widget is very neatly explained. Next,
    we shall see about scrollbar widget where user will look into the scrolling capability
    in vertical or horizontal direction with different widgets such as List Box, Entry
    and Text. Another one is tkinter Spinbox widget, where the range of input values
    will be fed to the user, out of which, the user can select the one. Next, we will
    be looking into how to implement a graphical slider to any Python application
    program by using tkinter Scale widget. Next is the concept of tkinter Text widget
    where the user can insert multiple text fields. Finally, we will be dealing with
    tkinter Combobox widget and its applications.


    **Chapter 5: Getting Insights of Display Widgets in tkinter** – is dedicated to
    the concept of creating a simple GUI app using tkinter Label widget, which depicts
    the ways of displaying a text or image on a window form. We shall also learn about
    the display of prompt unedited text messages to the user with tkinter Message
    widget. Moreover, we will look into multiple message boxes like information, warning,
    error and so on, in a Python application by using tkinter MessageBox widget.


    **Chapter 6: Getting Insights of Container Widgets in tkinter** – is dedicated
    to the concept of tkinter Frame widget, where the user can arrange different widgets
    position, can provide padding, can be used as geometry manager for other widgets
    and so on. We shall look into the variant of Frame widget, which is tkinter LabelFrame
    and is a container for complex window layouts. The user will be able to see frame
    features along with label display. Moreover, we shall view creating tabbed widget
    with the help of using tkinter Notebook widget. Here, user can select different
    pages of contents by clicking on tabs. The importance of tkinter PanedWindow widget
    will be explored where multiple examples will be seen containing horizontal or
    vertical stack of child widgets. Finally, we will look into tkinter Toplevel widget
    where the concepts are being explained for the creation and display of top level
    windows.


    **Chapter 7: Getting Insights of Item Widgets in tkinter** – is dedicated to tkinter
    Listbox widget where user can display different types of list of items and a number
    of items can be selected from the list. Different selectmode examples will be
    seen along with scrollbar attached to the above widget.


    **Chapter 8: Getting Insights of tkinter User Interactive Widgets** – focuses
    on the user to create different menus such as pop-up, top level and pull-down
    menu with the help of tkinter Menu widget. The user can create different applications
    such as Notepad, Wordpad, any management software and so on. Moreover, we will
    explore drop-down menu widget which is associated with a Menu widget called tkinter
    Menubutton widget, which can display the choices when user clicks on the above
    Menubutton. User can add checkbutton or radiobutton with the help of above Menubutton.
    Finally, we will study the concepts of drawing different graphics like line, rectangle
    and so on, with the help of tkinter Canvas widget.


    **Chapter 9: Handling File Selection in tkinter** – will handle file selection
    with different dialogs for opening a file, saving a file and so on, with the help
    of multiple examples using various Python examples.


    **Chapter 10: Getting Widget Information and Trace in tkinter** – is dedicated
    to getting widget information and different trace methods viz trace_add, trace_remove,
    trace_info and so on, using various Python examples.


    **Chapter 11: UserLogin Project in tkinter GUI Library with sqlite3 Database**
    – will cover an application created using tkinter library along with interacting
    with sqlite3 database.


    ## Code Bundle and Coloured Images


    Please follow the link to download the *Code Bundle* and the *Coloured Images*
    of the book:


    https://rebrand.ly/dq4ctt8


    The code bundle for the book is also hosted on GitHub at https://github.com/bpbpublications/Building-Modern-GUIs-with-tkinter-and-Python.
    In case there''s an update to the code, it will be updated on the existing GitHub
    repository.


    We have code bundles from our rich catalogue of books and videos available at
    https://github.com/bpbpublications. Check them out!


    ## Errata


    We take immense pride in our work at BPB Publications and follow best practices
    to ensure the accuracy of our content to provide with an indulging reading experience
    to our subscribers. Our readers are our mirrors, and we use their inputs to reflect
    and improve upon human errors, if any, that may have occurred during the publishing
    processes involved. To let us maintain the quality and help us reach out to any
    readers who might be having difficulties due to any unforeseen errors, please
    write to us at :


    errata@bpbonline.com


    Your support, suggestions and feedbacks are highly appreciated by the BPB Publications’
    Family.


    > Did you know that BPB offers eBook versions of every book published, with PDF
    and ePub files available? You can upgrade to the eBook version at www.bpbonline.com
    and as a print book customer, you are entitled to a discount on the eBook copy.
    Get in touch with us at : **business@bpbonline.com** for more details.


    At **www.bpbonline.com**, you can also read a collection of free technical articles,
    sign up for a range of free newsletters, and receive exclusive discounts and offers
    on BPB books and eBooks.'
  mdcn: '## 前言


    本书旨在向几乎没有编程经验的读者介绍Python图形用户界面（GUI）。GUI应用程序可以使用任何编程语言创建，例如VB.Net、C#.Net等。在本书中，我们将学习如何使用Python的tkinter库创建GUI应用程序。我们将为读者提供必要的基础知识和技能，以便开始编写代码，用Python语言创建任何桌面GUI应用程序。通过掌握Python的tkinter库，读者将能够应用此技术解决现实世界的问题，并根据自身需求创建各种有用的应用程序。


    本书第一部分涵盖基本的tkinter GUI概念，接着介绍用于创建不同tkinter GUI部件的内置变量类。然后，我们将深入了解不同部件，即按钮、输入、显示、容器、项目以及用户交互部件。最后，在本书的后半部分，我们将探讨在tkinter中处理文件选择、获取部件以及跟踪信息。


    本书涵盖广泛的主题，从不同部件的基本定义到各种已解决的示例以及解释详尽的代码。总体而言，本书为初学者奠定了坚实的基础，帮助他们开启使用tkinter库进行Python
    GUI培训的旅程。


    本书分为**11章**。各章描述如下。


    **第1章：tkinter简介** – 将涵盖创建父窗口的基本GUI示例，包括通过调整宽度或高度来最大化窗口大小。还将介绍Python tkinter GUI的每个标准属性，即尺寸、颜色、字体、光标等。将通过示例介绍tkinter几何管理器的概念。最后，我们将学习如何访问和设置从tkinter变量类派生的预定义变量子类，即StringVar、IntVar、DoubleVar和BooleanVar。


    **第2章：Python tkinter GUI部件的内置变量类** – 将涵盖使用类和对象概念创建简单GUI窗口应用程序的概念。


    **第3章：深入了解tkinter中的按钮部件** – 专注于处理最常用的GUI部件之一，即tkinter按钮部件的概念。我们将通过多个示例和不同方法（包括lambda表达式）查看将事件绑定到上述部件。接下来，我们将看到复选按钮部件，它将为用户提供选择多个选项的功能。用户还将看到在上述部件中获取图像的不同选项。然后，我们将学习如何使用tkinter单选按钮部件。用户将看到不同的示例，其中将从预定义的选项集中恰好选择一个。最后但同样重要的是，我们将探讨tkinter选项菜单部件，用户将了解如何创建弹出菜单和按钮部件，以便从选项列表中选择单个选项。


    **第4章：深入了解tkinter中的输入部件** – 专注于使用tkinter输入框部件创建简单GUI应用程序的概念，以非常清晰的方式解释各种选项，并附有不同的已解决示例。此外，输入框部件中的验证概念也得到了非常清晰的解释。接下来，我们将看到滚动条部件，用户将了解在不同部件（如列表框、输入框和文本框）中垂直或水平方向的滚动功能。另一个是tkinter微调框部件，其中将向用户输入值的范围，用户可以从中选择一个。接下来，我们将研究如何通过使用tkinter滑块部件为任何Python应用程序实现图形滑块。然后是tkinter文本框部件的概念，用户可以在其中插入多个文本字段。最后，我们将处理tkinter组合框部件及其应用。


    **第5章：深入了解tkinter中的显示部件** – 专注于使用tkinter标签部件创建简单GUI应用程序的概念，该部件描述了在窗口表单上显示文本或图像的方式。我们还将学习使用tkinter消息部件向用户显示未编辑的提示文本消息。此外，我们将通过使用tkinter消息框部件，研究Python应用程序中的多个消息框，如信息、警告、错误等。


    **第6章：深入了解tkinter中的容器部件** – 专注于tkinter框架部件的概念，用户可以在其中安排不同部件的位置、提供填充、用作其他部件的几何管理器等。我们将研究框架部件的变体，即tkinter标签框架，它是复杂窗口布局的容器。用户将能够看到框架功能以及标签显示。此外，我们将通过使用tkinter笔记本部件来查看创建选项卡式部件。在这里，用户可以通过单击选项卡选择不同的内容页面。将探讨tkinter窗格窗口部件的重要性，其中将看到包含水平或垂直堆叠子部件的多个示例。最后，我们将研究tkinter顶层部件，其中解释了创建和显示顶层窗口的概念。


    **第7章：深入了解tkinter中的项目部件** – 专注于tkinter列表框部件，用户可以在其中显示不同类型的项目列表，并可以从列表中选择多个项目。将看到不同的选择模式示例以及附加到上述部件的滚动条。


    **第8章：深入了解tkinter用户交互部件** – 侧重于用户使用tkinter菜单部件创建不同的菜单，如弹出菜单、顶层菜单和下拉菜单。用户可以创建不同的应用程序，如记事本、写字板、任何管理软件等。此外，我们将探讨与菜单部件关联的下拉菜单部件，称为tkinter菜单按钮部件，当用户单击上述菜单按钮时，它可以显示选项。用户可以借助上述菜单按钮添加复选按钮或单选按钮。最后，我们将学习使用tkinter画布部件绘制不同图形（如线条、矩形等）的概念。


    **第9章：在tkinter中处理文件选择** – 将处理文件选择，包括使用多个示例通过各种Python示例打开文件、保存文件等的不同对话框。


    **第10章：在tkinter中获取部件信息和跟踪** – 专注于使用各种Python示例获取部件信息和不同的跟踪方法，即trace_add、trace_remove、trace_info等。


    **第11章：使用sqlite3数据库的tkinter GUI库中的用户登录项目** – 将涵盖使用tkinter库创建的应用程序，以及与sqlite3数据库的交互。


    ## 代码包和彩色图片


    请按照以下链接下载本书的*代码包*和*彩色图片*：


    https://rebrand.ly/dq4ctt8


    本书的代码包也托管在GitHub上，地址为 https://github.com/bpbpublications/Building-Modern-GUIs-with-tkinter-and-Python。如果代码有更新，将在现有的GitHub仓库中更新。


    我们拥有丰富的书籍和视频目录，代码包可在 https://github.com/bpbpublications 获取。请查看！


    ## 勘误


    我们在BPB Publications为自己的工作感到无比自豪，并遵循最佳实践以确保内容的准确性，为订阅者提供沉浸式的阅读体验。我们的读者是我们的镜子，我们利用他们的反馈来反思并改进出版过程中可能出现的任何人为错误。为了让我们保持质量并帮助我们联系到可能因任何不可预见的错误而遇到困难的任何读者，请写信给我们：


    errata@bpbonline.com


    BPB Publications大家庭非常感谢您的支持、建议和反馈。


    > 您知道吗？BPB提供每本出版书籍的电子书版本，提供PDF和ePub文件？您可以在www.bpbonline.com升级到电子书版本，作为印刷书客户，您有权享受电子书副本的折扣。请联系我们：**business@bpbonline.com**
    了解更多信息。


    在 **www.bpbonline.com**，您还可以阅读一系列免费技术文章，注册各种免费新闻通讯，并获得BPB书籍和电子书的独家折扣和优惠。'
