    # Conclusion


    In this chapter, we learned about creation of pop-up, top-level, and pull-down
    menus with the help of the tkinter Menu widget. We also saw example of adding
    radiobutton and checkbutton to the menu. The tearoff option, **entryconfig()**
    method, adding a specific type of item using the key itemType or a positional
    argument was well explored. We also viewed a widget which was associated with
    the menu and was provided to the user to select, from different choices, viz.
    tkinter Meubutton widget. We also saw example of adding radio and checkbuttons
    to this menubutton widget. Finally, we explored the concepts of drawing different
    graphics such as lines, rectangles, arc, polygon, text and create of image item1
    with the help of the tkinter Canvas widget.


    # Points to remember


    +   - Menus can be created using tkinter menu widget. A hierarchical menu structure
    is created by nesting of menus. Users are provided with a way to access additional
    commands or options using menus.

    - Button that displays a drop-down menu is created by using tkinter menubutton
    widget. It is associated with the menu which can display its choices when clicked
    by the user. Users are provided with a way to access additional commands or options
    using menubutton widget.'
- md: "## CHAPTER 9\nHandling File Selection in tkinter\n\n## Introduction\n\nIn GUI\
    \ applications, handling file selection in tkinter is frequently required since\
    \ we must let the user choose a file for processing or display. For instance,\
    \ we can allow the user to choose an image file to display in an image viewer\
    \ application, or choose a text file to load and edit in a text editor application.\n\
    \nTo assist with managing file selection dialogs, tkinter offers the filedialog\
    \ module. This can make it much simpler to implement this feature in our application.\
    \ The selected file or directory's path is returned by the filedialog module's\
    \ methods for selecting, saving, and selecting files and directories. We may make\
    \ sure that our application is cross-platform compatible and that the user can\
    \ select files using a typical file selection dialogue by utilizing the filedialog\
    \ module. This can improve the usability and appearance of application.\n\n##\
    \ Structure\n\nIn this chapter, we will discuss the following topics:\n\n- Handling\
    \ file selection in tkinter\n    - askdirectory\n    - askopenfile\n    - askopenfilename\n\
    \    - askopenfilenames\n    - asksaveasfile\n    - asksaveasfilename\n\n## Objectives\n\
    \nAfter reading this chapter, the reader will learn about handling file selection\
    \ with different dialogs for opening a file, saving a file, and so on, with help\
    \ of multiple examples created with various Python applications.\n\n## Handling\
    \ file selection in tkinter\n\nWe come across the requirements of opening a file,\
    \ saving a file, and opening a directory sort of operations. In such cases, the\
    \ tkinter provides a dialog containing a small file browser called a file dialog,\
    \ which is a part of the `filedialog` module. There are a different set of functions\
    \ which creates file dialogs. The common arguments taken by each function are:\n\
    \n- **title**: This parameter will specify the title of the dialog window.\n-\
    \ **parent**: This parameter will specify the optional parent widget.\n- **initialdir**:\
    \ This parameter will specify the directory in which the file browser should start.\n\
    - **filetypes**: This parameter will specify the list of tuples each with a label\
    \ and matching pattern for filtering the visible files supported by the application.\n\
    \nSome functions take additional options such as:\n\n- **initialfile**: It is\
    \ a default file path to select.\n- **defaultextension**: It is a file extension\
    \ string that is appended automatically to the filename if the user does not do\
    \ it.\n\nSome functions return a file object taking mode argument, specifying\
    \ the file open mode.\n\nNow, we shall discuss each function one by one.\n\n**askdirectory:**\
    \ This function will return the directory path as a string and it displays only\
    \ directories.\n\n```python\nfrom tkinter import *\nfrom tkinter.filedialog import\
    \ askdirectory\n\nmyroot = Tk()\nmyroot.title('Askdirectory')\nmyroot.geometry('300x100')\n\
    \ndef mydisplay():\n    myroot.directory = askdirectory()\n\nmybtn1 = Button(myroot,\
    \ text = 'MyDirectoryOpen', command = mydisplay)\nmybtn1.pack(pady = 10)\nmyroot.mainloop()\n\
    ```\n\n**Output:**\n\n*Figure 9.1* shows the default output:\n\n![](img/ecddba8119455057e37d50bbef734ff6_304_0.png)\n\
    \n*Figure 9.1: Default output*\n\nFigure 9.2 shows the output when the **MyDirectoryOpen**\
    \ button is clicked:\n\n![](img/ecddba8119455057e37d50bbef734ff6_305_0.png)\n\n\
    *Figure 9.2: Output when the MyDirectoryOpen button is clicked*\n\n**Note:** The\
    \ preceding code is covered in Program Name: Chap9_Example1.py\n\n**askopenfile:**\
    \ This function will return a file handle object and it allows only the selection\
    \ of existing files.\n\n```python\nfrom tkinter import *\nfrom tkinter.filedialog\
    \ import askopenfile\n\nmyroot = Tk()\nmyroot.title('AskOpenFile')\nmyroot.geometry('300x100')\n\
    \ndef myopen_file():\n    myfile = askopenfile(mode='r', filetypes=[('All Python\
    \ Files', '*.py')])\n    if myfile is not None:\n        content = myfile.read()\
    \ # read all the file contents\n        print(myfile.name) # display the file\
    \ name\n\nmybtn1 = Button(myroot, text = 'MyAskOpenFile', command = myopen_file)\n\
    mybtn1.pack(pady = 10)\nmyroot.mainloop()\n```\n\nOutput:\n\nFigure 9.3 shows\
    \ the default output:\n\n![](img/ecddba8119455057e37d50bbef734ff6_306_0.png)\n\
    \nFigure 9.4 shows the output when the **MyAskOpenFile** button is clicked:\n\n\
    ![](img/ecddba8119455057e37d50bbef734ff6_306_1.png)\n\n**Note:** The preceding\
    \ code is covered in Program Name: Chap9_Example2.py\n\nOutput when any .py file\
    \ is chosen and displays that file name:\n\nE:/GUI_Python/prog5_functionbindtobutton.py\n\
    \n**askopenfilename:** This function will return the file path as a string and\
    \ it allows only the selection of existing files.\n\n```python\nfrom tkinter import\
    \ *\nfrom tkinter.filedialog import askopenfilename\n\nmyroot = Tk()\nmyroot.title('AskOpenFileName')\n\
    myroot.geometry('300x100')\n\ndef myopen_file():\n    myfile = askopenfilename()\n\
    \    print(myfile) # display the file name\n\nmybtn1 = Button(myroot, text = 'MyAskOpenFileName',\
    \ command = myopen_file)\nmybtn1.pack(pady = 10)\nmyroot.mainloop()\n```\n\nOutput:\n\
    \nFigure 9.5 shows the default output:\n\n![](img/ecddba8119455057e37d50bbef734ff6_307_0.png)\n\
    \nFigure 9.5: Default output\n\nFigure 9.6 shows the output when the **MyAskOpenFileName**\
    \ button is clicked:\n\n![](img/ecddba8119455057e37d50bbef734ff6_308_0.png)\n\n\
    *Figure 9.6: Output when the MyAskOpenFileName button is clicked*\n\n**Note:**\
    \ The preceding code is covered in Program Name: Chap9_Example3.py\n\n**Output\
    \ when any .py file is chosen and displays that file name:**\n\n**E:/GUI_Python/prg3_fittingwidgets.py**\n\
    \nIn the above code, we are creating an open file dialog that asks for a filename\
    \ and returns the selected dialog name.\n\n**askopenfilenames:** This function\
    \ will return file paths as the list of strings and it allows multiple selections.\n\
    \n```python\nfrom tkinter import *\nfrom tkinter.filedialog import askopenfilenames\n\
    \nmyroot = Tk()\nmyroot.title('AskOpenFileNames')\nmyroot.geometry('300x100')\n\
    \ndef myopen_files():\n    myfile_list=[]\n    myfiles = askopenfilenames(initialdir=\"\
    E:\\GUI_Python\", title=\"Select Python files\")\n    for file in myfiles:\n \
    \       myfile_list.append(file)\n    print(myfile_list)\n\nmybtn1 = Button(myroot,\
    \ text = 'MyAskOpenFileNames', command = myopen_files)\nmybtn1.pack(pady = 10)\n\
    myroot.mainloop()\n```\n\nOutput:\n\nFigure 9.7 shows the default output:\n\n\
    ![](img/ecddba8119455057e37d50bbef734ff6_309_0.png)\n\nFigure 9.7: Default output\
    \ of Chap9_Example4.py\n\nFigure 9.8 shows the output when the **MyAskOpenFileName**\
    \ button is clicked:\n\n![](img/ecddba8119455057e37d50bbef734ff6_309_1.png)\n\n\
    Figure 9.8: Output when the MyAskOpenFileNames button is clicked"
  mdcn: "## 第9章\n在tkinter中处理文件选择\n\n## 简介\n\n在GUI应用程序中，处理文件选择是tkinter中经常需要的功能，因为我们必须让用户选择一个文件进行处理或显示。例如，我们可以允许用户选择一个图像文件在图像查看器应用程序中显示，或者选择一个文本文件在文本编辑器应用程序中加载和编辑。\n\
    \n为了协助管理文件选择对话框，tkinter提供了`filedialog`模块。这可以使我们在应用程序中实现此功能变得简单得多。`filedialog`模块中用于选择、保存文件和目录的方法会返回所选文件或目录的路径。通过使用`filedialog`模块，我们可以确保我们的应用程序是跨平台兼容的，并且用户可以使用典型的文件选择对话框来选择文件。这可以提高应用程序的可用性和外观。\n\
    \n## 结构\n\n在本章中，我们将讨论以下主题：\n\n- 在tkinter中处理文件选择\n    - askdirectory\n    - askopenfile\n\
    \    - askopenfilename\n    - askopenfilenames\n    - asksaveasfile\n    - asksaveasfilename\n\
    \n## 目标\n\n阅读本章后，读者将了解如何使用不同的对话框处理文件选择，例如打开文件、保存文件等，并借助多个使用各种Python应用程序创建的示例。\n\
