    # Validation in the Entry widget


    There will be some cases where the text written inside an **Entry** widget is
    to be checked to make sure that it is valid according to some rule. Such validation
    on an **Entry** widget can be done as follows:


    +   - A callback function is defined, which will check the text in the Entry and
    will return True if valid, and otherwise, it will return False. The text will
    be unchanged if the callback returns False.

    - Next is to register the callback function. A character string is returned which
    will be used to call the function.

    - Then, validate the input in the **Entry** widget by calling the callback function.
    The options used are described as follows.


    **validate**: This option will be used to specify when to call the callback function
    to validate the input. The values of the validate command are:


    +   - **none**: If the validation is set to None, then no validation occurs. It
    is the default mode.

    - **focus**: If the validate is set to focus, the **validatecommand** is called
    twice when the Entry widget receives focus and when the focus is lost.

    - **focusin**: The **validatecommand** is called when the widget has focus.

    - **focusout**: The **validatecommand** is called when the widget has lost focus.

    - **key**: The **validatecommand** is called whenever any input from the keyboard
    changes the widget''s contents.

    - **all**: The **validatecommand** will be called in all the above cases.


    **validatecommand**: This option is used to specify the callback function, that
    is, what arguments our callback function would like to receive. The callback function
    is needed to know what text appears in the **Entry** widget, but this callback
    function will not be called directly but rather by a variable that is passed and
    registered in the previous steps. A number of items of information are also provided
    to the callback via substitution codes which are as follows:


    +   - **%d**: This substitution code is an action type that occurred on the widget,
    0 for attempted deletion, 1 for attempted insertion, and -1 for focus, forced,
    or textvariable validation.'
  merge: -1
  pgno: 140
- img_proc: true
  md: "+   - %i: Whenever any text is inserted or deleted, this substitution code\
    \ will be an index of the beginning of deletion or insertion. If the callback\
    \ is due to focusin, focusout, or change in the textvariable, it will be -1.\n\
    - %P: This substitution code will be the value the widget will have if the change\
    \ is allowed.\n- %s: This substitution code denotes the current text in the Entry\
    \ widget prior to editing.\n- %S: This substitution code denotes the text being\
    \ inserted or deleted.\n- %v: This substitution code denotes the validation type\
    \ currently set.\n- %V: This substitution code denotes the validation type for\
    \ which the callback is triggered like focusin, focusout, key, forced, or textvariable.\n\
    - %w: This substitution code denotes the widget's name.\n\nLet us see an example.\n\
    \nIt should be kept in mind that in the above example, we are using classes. So,\
    \ we will be using methods instead of functions. The same code can be replicated\
    \ without using classes. So, we will be using the term functions. Refer to the\
    \ following code:\n\n```\nfrom tkinter import *\n\nclass MyValidate(Tk):\n   \
    \ def __init__(self):\n        super().__init__()\n        self.myl0 = Label(self,\
    \ text= 'Enter the number:', fg='Magenta', font = ('Arial',12))\n        self.myl0.place(x\
