    \ 中\n\n**image：** 此选项允许你获取在控件中显示的图像。\n**selectimage：** 此选项允许为复选按钮设置图像。\n参考以下代码：\n\
    \n```\nfrom tkinter import *\nmyroot = Tk()\n\nmyon_image = PhotoImage(width=50,\
