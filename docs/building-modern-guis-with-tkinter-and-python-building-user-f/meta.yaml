- md: "## tkinter Spinbox widget\n\nThis widget will allow the user to choose from\
    \ some fixed range of values. It is an alternative to the **Entry** widget which\
    \ provides values range to the user, from where the user can select the one. It\
    \ specifies the values to be allowed which can be either a range or a tuple.\n\
    \nThe syntax is as follows:\n\n```\nmysp1= Spinbox(myroot, options...)\n```\n\n\
    where\n\n- **myroot** is the parent window.\n- Some of the lists of options that\
    \ can be used as key-value pairs and are separated by commas are bg, bd, activebackground,\
    \ cursor, command, disabledbackground, disabledforeground, font, fg, format, from_,\
    \ relief, justify, repeatdelay, state, repeatinterval, textvariable, to, values,\
    \ validate, validatecommand, wrap, width, and xscrollcommand.\n\nWe have seen\
    \ most of the options but some undiscussed options are as follows:\n\n- **command**:\
    \ This option will call the function or method whenever there is the movement\
    \ of the scrollbar. So, by using the command option we are adding functionality\
    \ to the above widget.\n- **format**: This option will be used for formatting\
    \ the string and there is no default value.\n- **from_**: This option displays\
    \ the minimum limit value which will show the widget starting range.\n- **repeatdelay**:\
    \ This option will control the button autorepeat and is given in milliseconds.\n\
    - **repeatinterval**: This option is similar to **repeatdelay** and is given in\
    \ milliseconds.\n- **textvariable**: This option will have no default value and\
    \ is a control variable that will control the widget behavior text.\n- **to**:\
    \ This option displays the maximum limit value of the widget.\n- **validate**:\
    \ This option will represent the validation mode and its default value is None.\n\
    - **validatecommand**: This option will represent the validation callback and\
    \ there is no default value.\n- **wrap**: This option will be wrapping the up\
    \ and down button of the above widget.\n- **xscrollcommand**: This option will\
    \ be set to the above widget **set()** method for scrolling the widget horizontally.\n\
    \nSome of the commonly used methods in the above widget are as follows:\n\n- **delete(startindex\
    \ [,endindex])**: This method will delete the characters within the specified\
    \ range.\n- **get(startindex [,endindex])**: This method will get the characters\
    \ within the specified range.\n- **identify(x,y)**: This method will identify\
    \ the widget's element within the specified range.\n- **index(index)**: This method\
    \ will get the absolute value of the given index.\n- **insert(index [,string]...)**:\
    \ This method will insert the string at the specified index.\n- **selection_clear()**:\
    \ This method will clear the selection.\n- **selection_get()**: This method will\
    \ return the selected text and will raise an exception if there is no selection.\n\
    \nWe shall see some examples for better understanding.\n\nLet us create a spinbox:\n\
    \n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry('250x100')\nmyroot.title('SpinBox')\n\
    \n# creation of spinbox\nmys1 = Spinbox(font = ('Calibri',15), from_ = 10, to\
    \ = 20)\nmys1.pack()\n\nmyroot.mainloop()\n```\n\n**Output:**\n\nThe output can\
    \ be seen in the following *Figure 4.23*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_153_0.png)\n\
    \n*Figure 4.23: Output*\n\nNote: The preceding code is covered in Program Name:\
    \ Chap4_Example13.py\n\nIn the above code, we have created a spinbox with a minimum\
    \ value of 10 and a maximum value up to 20.\n\nInstead of using a range, we can\
    \ also specify a set of values, as shown:\n\n```\nfrom tkinter import *\n\nmyroot\
    \ = Tk()\nmyroot.geometry('250x100')\nmyroot.title('SpinBox')\n\n# creation of\
    \ spinbox\nmys1 = Spinbox(font = ('Calibri',15),  values = (10,35,49,40),  bd\
    \ = 10, relief = RAISED)\nmys1.pack(pady = 10)\n\nmyroot.mainloop()\n```\n\n**Output:**\n\
    \nThe output can be seen in the following Figure 4.24:\n\n![](img/ecddba8119455057e37d50bbef734ff6_154_0.png)\n\
    \nNote: The preceding code is covered in Program Name: Chap4_Example14.py\n\n\
    We can also display string values to a spinbox and perform a callback function\
    \ on the movement of the spinbox, as shown:\n\n```\nfrom tkinter import *\n\n\
    myroot = Tk()\nmyroot.geometry('300x300')\n\n# stringvar variable\na1 = StringVar()\n\
    \n# mydisplay function\ndef mydisplay():\n    myroot.configure(bg = a1.get())\n\
    \n# creation of spinbox\nmys1 = Spinbox(font = ('Calibri',15), command = mydisplay,\
    \ values = ['Red','Green','Blue','Violet','Indigo','Magenta','Yellow'], textvariable\
    \ = a1)\nmys1.pack()\n\nmyroot.mainloop()\n```\n\n**Output:**\n\nRefer to *Figure\
    \ 4.25*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_156_0.png)\n\n*Figure 4.25:\
    \ Output*\n\n> Note: The preceding code is covered in Program Name: Chap4_Example15.py\n\
    \nIn the above code, we have displayed string values to the spinbox, and on scrollbar\
    \ movement, we are changing the background color of the parent window.\n\nWe can\
    \ also disable clicking in, as shown:\n\n```\nfrom tkinter import *\n\nmyroot\
    \ = Tk()\nmyroot.geometry('250x100')\nmyroot.title('SpinBox')\n\n# creation of\
    \ spinbox\nmys1 = Spinbox(font = ('Calibri',15), values = (10,35,49,40,50,60),state\
    \ = 'readonly')\nmys1.pack(pady = 10)\n\nmyroot.mainloop()\n```\n\n**Output:**\n\
    \nRefer to *Figure 4.26*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_157_0.png)\n\
    \n*Figure 4.26: Output*\n\n> Note: The preceding code is covered in Program Name:\
    \ Chap4_Example16.py\n\n## tkinter Scale widget\n\nThis widget will allow you\
    \ to select from a range of numbers by providing a graphical slider object and\
    \ moving through a slider. Here, we can set the minimum and maximum values.\n\n\
    The syntax is as follows:\n\n```\nmyscl1= Scale(myroot, options...)\n```\n\nwhere,\n\
    \n- **myroot** is the parent window.\n- Some of the lists of options that can\
    \ be used as key-value pairs and are separated by commas are bg, bd, activebackground,\
    \ command, digits, cursor, font, fg, highlightbackground, highlightcolor, from_,\
    \ length, label, orient, repeatdelay, resolution, relief, showvalue, sliderlength,\
    \ state, tickinterval, takefocus, to, variable, troughcolor, and width.\n\nWe\
    \ have seen most of the options but some undiscussed options are as follows:\n\
    \n- **digits**: This option will read the current value via the control variable\
    \ and is used to specify the digits to be displayed on the scale range.\n- **from_**:\
    \ This option will specify the starting point of the scale range.\n- **to**: This\
    \ option will specify the ending point of the scale range.\n- **label**: This\
    \ option will display a text label of the scale which is shown on the top left\
    \ and right corners vertically and extreme left and right corners horizontally.\n\
    - **orient**: This option's default orientation is horizontal and can be set to\
    \ horizontal or vertical depending on the scale type.\n- **repeatdelay**: This\
    \ option will define the duration up to which button1 will be held in the trough\
    \ before the slider starts moving in that direction repeatedly and its default\
    \ is 300msec.\n- **resolution**: This option will allow specifying the slightest\
    \ change possibly made to the scale value. If set to resolution = 1 and from_\
    \ = -2 and to = 2 and the scale will have 5 possible values: -2, -1, 0, +1, and\
    \ +2.\n- **showvalue**: This option will show the current value as text by the\
    \ slider. It can be suppressed by setting it to 0.\n- **sliderlength**: This option\
    \ will specify the scale length and the default is 30 pixels.\n- **state**: This\
    \ option will represent the DISABLED or ACTIVE scale state.\n- **tickinterval**:\
    \ This option will display the scale values at the set intervals.\n- **takefocus**:\
    \ This option will allow a focusing cycle through scale widgets.\n- **variable**:\
    \ This option displays the control variable to monitor the scale state.\n- **troughcolor**:\
    \ This option displays the color of the trough.\n\nSome of the methods in the\
    \ above widget are as follows:\n\n- **get()**: This method will return the current\
    \ scale value."
  mdcn: "## tkinter Spinbox 控件\n\n此控件允许用户从某个固定值范围中进行选择。它是 **Entry** 控件的替代方案，为用户提供值范围，用户可从中选择。它指定允许的值，这些值可以是范围或元组。\n\
    \n语法如下：\n\n```\nmysp1= Spinbox(myroot, options...)\n```\n\n其中\n\n- **myroot**\
    \ 是父窗口。\n- 可用作键值对并以逗号分隔的部分选项列表包括：bg、bd、activebackground、cursor、command、disabledbackground、disabledforeground、font、fg、format、from_、relief、justify、repeatdelay、state、repeatinterval、textvariable、to、values、validate、validatecommand、wrap、width\
    \ 和 xscrollcommand。\n\n我们已经了解了大部分选项，但一些未讨论的选项如下：\n\n- **command**：此选项将在滚动条移动时调用函数或方法。因此，通过使用\
    \ command 选项，我们为上述控件添加了功能。\n- **format**：此选项将用于格式化字符串，没有默认值。\n- **from_**：此选项显示最小限制值，该值将显示控件的起始范围。\n\
    - **repeatdelay**：此选项将控制按钮自动重复，以毫秒为单位给出。\n- **repeatinterval**：此选项类似于 **repeatdelay**，以毫秒为单位给出。\n\
    - **textvariable**：此选项没有默认值，是一个控制变量，将控制控件行为文本。\n- **to**：此选项显示控件的最大限制值。\n- **validate**：此选项将表示验证模式，其默认值为\
    \ None。\n- **validatecommand**：此选项将表示验证回调，没有默认值。\n- **wrap**：此选项将包装上述控件的向上和向下按钮。\n\
    - **xscrollcommand**：此选项将设置为上述控件的 **set()** 方法，用于水平滚动控件。\n\n上述控件中一些常用的方法如下：\n\n\
    - **delete(startindex [,endindex])**：此方法将删除指定范围内的字符。\n- **get(startindex [,endindex])**：此方法将获取指定范围内的字符。\n\
    - **identify(x,y)**：此方法将识别指定范围内的控件元素。\n- **index(index)**：此方法将获取给定索引的绝对值。\n- **insert(index\
    \ [,string]...)**：此方法将在指定索引处插入字符串。\n- **selection_clear()**：此方法将清除选择。\n- **selection_get()**：此方法将返回选中的文本，如果没有选择则引发异常。\n\
    \n我们将通过一些示例来更好地理解。\n\n让我们创建一个 Spinbox：\n\n```\nfrom tkinter import *\n\nmyroot\
    \ = Tk()\nmyroot.geometry('250x100')\nmyroot.title('SpinBox')\n\n# creation of\
    \ spinbox\nmys1 = Spinbox(font = ('Calibri',15), from_ = 10, to = 20)\nmys1.pack()\n\
    \nmyroot.mainloop()\n```\n\n**输出：**\n\n输出可在下面的 *图 4.23* 中看到：\n\n![](img/ecddba8119455057e37d50bbef734ff6_153_0.png)\n\
    \n*图 4.23：输出*\n\n注意：前面的代码包含在程序名称：Chap4_Example13.py 中\n\n在上面的代码中，我们创建了一个最小值为 10、最大值为\
    \ 20 的 Spinbox。\n\n除了使用范围，我们还可以指定一组值，如下所示：\n\n```\nfrom tkinter import *\n\nmyroot\
    \ = Tk()\nmyroot.geometry('250x100')\nmyroot.title('SpinBox')\n\n# creation of\
    \ spinbox\nmys1 = Spinbox(font = ('Calibri',15),  values = (10,35,49,40),  bd\
    \ = 10, relief = RAISED)\nmys1.pack(pady = 10)\n\nmyroot.mainloop()\n```\n\n**输出：**\n\
    \n输出可在下面的图 4.24 中看到：\n\n![](img/ecddba8119455057e37d50bbef734ff6_154_0.png)\n\n\
    注意：前面的代码包含在程序名称：Chap4_Example14.py 中\n\n我们还可以向 Spinbox 显示字符串值，并在 Spinbox 移动时执行回调函数，如下所示：\n\
    \n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry('300x300')\n\n\
    # stringvar variable\na1 = StringVar()\n\n# mydisplay function\ndef mydisplay():\n\
    \    myroot.configure(bg = a1.get())\n\n# creation of spinbox\nmys1 = Spinbox(font\
    \ = ('Calibri',15), command = mydisplay, values = ['Red','Green','Blue','Violet','Indigo','Magenta','Yellow'],\
    \ textvariable = a1)\nmys1.pack()\n\nmyroot.mainloop()\n```\n\n**输出：**\n\n参考 *图\
    \ 4.25*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_156_0.png)\n\n*图 4.25：输出*\n\
    \n> 注意：前面的代码包含在程序名称：Chap4_Example15.py 中\n\n在上面的代码中，我们向 Spinbox 显示了字符串值，并在滚动条移动时更改父窗口的背景颜色。\n\
    \n我们还可以禁用点击输入，如下所示：\n\n```\nfrom tkinter import *\n\nmyroot = Tk()\nmyroot.geometry('250x100')\n\
    myroot.title('SpinBox')\n\n# creation of spinbox\nmys1 = Spinbox(font = ('Calibri',15),\
    \ values = (10,35,49,40,50,60),state = 'readonly')\nmys1.pack(pady = 10)\n\nmyroot.mainloop()\n\
    ```\n\n**输出：**\n\n参考 *图 4.26*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_157_0.png)\n\
    \n*图 4.26：输出*\n\n> 注意：前面的代码包含在程序名称：Chap4_Example16.py 中\n\n## tkinter Scale 控件\n\
    \n此控件允许您通过提供图形滑块对象并移动滑块来从一系列数字中进行选择。在这里，我们可以设置最小值和最大值。\n\n语法如下：\n\n```\nmyscl1=\
    \ Scale(myroot, options...)\n```\n\n其中，\n\n- **myroot** 是父窗口。\n- 可用作键值对并以逗号分隔的部分选项列表包括：bg、bd、activebackground、command、digits、cursor、font、fg、highlightbackground、highlightcolor、from_、length、label、orient、repeatdelay、resolution、relief、showvalue、sliderlength、state、tickinterval、takefocus、to、variable、troughcolor\
    \ 和 width。\n\n我们已经了解了大部分选项，但一些未讨论的选项如下：\n\n- **digits**：此选项将通过控制变量读取当前值，并用于指定要在刻度范围上显示的位数。\n\
    - **from_**：此选项将指定刻度范围的起点。\n- **to**：此选项将指定刻度范围的终点。\n- **label**：此选项将显示刻度的文本标签，该标签在左上角和右上角垂直显示，在最左侧和最右侧水平显示。\n\
    - **orient**：此选项的默认方向是水平，可以根据刻度类型设置为水平或垂直。\n- **repeatdelay**：此选项将定义在滑块开始在该方向上重复移动之前，按钮1在凹槽中保持的持续时间，默认值为\
    \ 300 毫秒。\n- **resolution**：此选项允许指定对刻度值可能进行的最小更改。如果设置为 resolution = 1 且 from_\
    \ = -2 且 to = 2，则刻度将有 5 个可能的值：-2、-1、0、+1 和 +2。\n- **showvalue**：此选项将在滑块旁以文本形式显示当前值。可以通过将其设置为\
    \ 0 来抑制显示。\n- **sliderlength**：此选项将指定刻度长度，默认值为 30 像素。\n- **state**：此选项将表示 DISABLED\
    \ 或 ACTIVE 刻度状态。\n- **tickinterval**：此选项将按设定间隔显示刻度值。\n- **takefocus**：此选项将允许通过刻度控件进行聚焦循环。\n\
    - **variable**：此选项显示用于监控刻度状态的控制变量。\n- **troughcolor**：此选项显示凹槽的颜色。\n\n上述控件中的一些方法如下：\n\
    \n- **get()**：此方法将返回当前刻度值。"
