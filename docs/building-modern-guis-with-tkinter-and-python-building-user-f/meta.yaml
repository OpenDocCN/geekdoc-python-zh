    # Introduction


    # ## Introduction


    We have learned in our previous book *Python for Everyone*, about the concepts
    in Python which are procedure oriented or object oriented. However, these concepts
    will be used as indispensable salt for our next learning, which is related to
    **Graphical User Interface (GUI)**. We are surrounded by GUI apps in day-to-day
    life. Whenever we are using our mobile phone/Desktop applications and accessing
    any app or software, the first thing which we look forward to is how to access
    these apps or software. Any app on mobile phone or a computer system consists
    of hardware and is controlled by an operating system. The high-level languages
    will be sitting on top of the operating system and Python is no exception. So,
    in this chapter, we will learn about tkinter library in Python.


    # ## Structure


    In this chapter, we will discuss the following topics:


    +   - Introduction to tkinter

    - Basic Python GUI Program

    - Some standard attributes of Python tkinter GUI'
