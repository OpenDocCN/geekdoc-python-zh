    # tkinter Combobox Widget


    This widget is a combination of a drop-down menu and an **Entry** widget. Here,
    the user can view the usual text entry area with a downward pointing arrow. A
    drop-down menu appears when the user clicks on the arrow displaying all the choices
    and will replace the current entry contents if clicked on one.


    The syntax is as follows:


    ```

    python

    mycmb1= Combobox(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are cursor, exportselection, height, justify, style, postcommand, takefocus,
    validate, validatecommand, textvariable, width, values, and xscrollcommand.'
