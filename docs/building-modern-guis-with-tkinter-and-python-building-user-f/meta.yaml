- md: '## Conclusion


    This chapter has discussed a variety of tkinter widgets, including the Entry,
    Scrollbar, Spinbox, Scale, Text, and Combobox. The chapter offers thorough explanations,
    examples, and alternatives for utilizing these widgets to build straightforward
    GUI applications. The concept of validation in the Entry widget, the ability to
    scroll in the Scrollbar widget, the ability to select values from a range in the
    Spinbox widget, the implementation of a graphical slider in the Scale widget,
    the ability to insert multiple text fields in the Text widget, and the use of
    the Combobox widget and its applications are all neatly and clearly covered.


    ## Points to remember


    - Entry widget can be used for gathering user input, can be customized using various
    controls viz width, font, and validation, and can be utilized for creating a simple
    data entry application; the **get()** method can be retrieved to get the input.

    - Scrollbar widgets are used to provide widgets that are longer than their visible
    size, a scrolling feature. It is compatible with a variety of widgets, including
    Listbox, Text, Canvas and so on. We can position the scrollbar either vertically
    or horizontally. The scrollbar should be attached to the widget that needs to
    be scrolled using the **command** option.

    - Using **Text** widget, we can display and edit the text in multiple lines. We
    can customize using various options such as color, font, wrap and so on. It can
    be used to build applications such as text editors or document viewers. The **get()**
    method can be used to get the text from the widget.

    - The **SpinBox** widget is used to select a value from a fixed range of values.
    We can customize using various options such as color, font, range and so on. It
    can be used to create a simple data selection application. The selected value
    can be retrieved using **get()** method.

    - The **Scale** widget is used to select from a range of numbers by providing
    a graphical slider object and moving through a slider. We can customize using
    various options such as color, font and so on. It can be used to create an application
    which requires value to be selected within a certain range. The selected value
    can be retrieved using **get()** method.

    - Combination of a drop-down menu and an **Entry** widget is a **Combobox** widget.
    We can customize using various options such as color, font, values and so on.
    It can be used to create an application which requires user to select one option
    from a list of options. The selected option can be retrieved using **get()** method.'
  mdcn: '## 结论


    本章讨论了多种 tkinter 控件，包括 Entry、Scrollbar、Spinbox、Scale、Text 和 Combobox。本章提供了详尽的解释、示例以及使用这些控件构建简单
    GUI 应用程序的替代方案。Entry 控件中的验证概念、Scrollbar 控件的滚动功能、Spinbox 控件从范围内选择值的能力、Scale 控件中图形滑块的实现、Text
    控件中插入多行文本字段的功能，以及 Combobox 控件的使用及其应用，都得到了清晰而全面的阐述。


    ## 要点回顾


    - Entry 控件可用于收集用户输入，可通过各种控件（如宽度、字体和验证）进行自定义，并可用于创建简单的数据输入应用程序；可以通过 **get()** 方法获取输入内容。

    - Scrollbar 控件用于为超出其可见尺寸的控件提供滚动功能。它兼容多种控件，包括 Listbox、Text、Canvas 等。我们可以将滚动条设置为垂直或水平方向。滚动条应使用
    **command** 选项附加到需要滚动的控件上。

    - 使用 **Text** 控件，我们可以显示和编辑多行文本。我们可以通过各种选项（如颜色、字体、换行等）进行自定义。它可用于构建文本编辑器或文档查看器等应用程序。可以使用
    **get()** 方法从控件中获取文本。

    - **SpinBox** 控件用于从固定值范围中选择一个值。我们可以通过各种选项（如颜色、字体、范围等）进行自定义。它可用于创建简单的数据选择应用程序。可以使用
    **get()** 方法获取所选值。

    - **Scale** 控件通过提供图形滑块对象并移动滑块，用于从数字范围中选择值。我们可以通过各种选项（如颜色、字体等）进行自定义。它可用于创建需要在特定范围内选择值的应用程序。可以使用
    **get()** 方法获取所选值。

    - 下拉菜单和 **Entry** 控件的组合就是 **Combobox** 控件。我们可以通过各种选项（如颜色、字体、值等）进行自定义。它可用于创建需要用户从选项列表中选择一个选项的应用程序。可以使用
    **get()** 方法获取所选选项。'
