    \ GUI 交互\n- 显示 GUI 应用程序\n- 结论\n- 要点回顾\n- 问题\n\n## 索引\n\n# 第 1 章\n# tkinter\n#\
    \ 引言\n\n## 引言\n\n我们在之前的《Python for Everyone》一书中，学习了 Python 中面向过程或面向对象的概念。然而，这些概念将作为我们下一阶段学习不可或缺的“调味料”，即与**图形用户界面（GUI）**相关的学习。在日常生活中，我们被\
    \ GUI 应用程序所包围。每当我们使用手机/桌面应用程序并访问任何应用或软件时，我们首先关注的是如何访问这些应用或软件。手机或计算机系统上的任何应用程序都由硬件组成，并由操作系统控制。高级语言将运行在操作系统之上，Python\
    \ 也不例外。因此，在本章中，我们将学习 Python 中的 tkinter 库。\n\n## 结构\n\n在本章中，我们将讨论以下主题：\n\n- tkinter\
    \ 简介\n- 基本的 Python GUI 程序\n- Python tkinter GUI 的一些标准属性\n  - 颜色\n  - 字体\n  - 锚点\n\
    \  - 浮雕样式\n  - 位图\n  - 光标\n- Python tkinter 几何布局管理器\n\n## 目标\n\n在本章结束时，读者将学习如何使用\
    \ tkinter 库创建基本的 Python GUI 程序。此外，我们还将通过示例探索 Python tkinter GUI 的一些标准属性，如尺寸、颜色或字体及其各种选项。了解如何使用锚点属性，通过常量列表相对于参考点定位文本非常重要。此外，我们将了解如何使用浮雕属性为控件外部提供\
    \ 3D 模拟效果。我们还将通过示例学习位图和光标属性。最后，在本章结束时，我们将学习使用内置的布局几何管理器，即 pack、grid 和 place 来访问\
    \ tkinter 控件。\n\n## tkinter 简介\n\n每当我们用 Python 编写任何程序来控制硬件时，Python 都会在操作系统的帮助下显示输出。然而，如果我们希望借助\
    \ GUI 创建可执行文件，那么仅仅拥有硬件和操作系统是不够的。Python 需要来自多个资源的服务，其中一个让许多 Python 程序员感兴趣的资源是 Tcl/Tk。**Tcl**\
