    ## Geometry method in tkinter


    Whenever there is a requirement to set tkinter window dimensions as well as set
    the main window position, then tkinter provides a geometry method, as follows:


    ```

    from tkinter import *


    # creating blank tkinter window

    myroot = Tk()


    myroot.geometry(''300x150'')


    mybtn = Button(myroot, text = ''Python'')

    mybtn.pack(side = TOP, padx = 5, pady = 5)


    myroot.mainloop()

    ```


