  mdcn: "## tkinter 复选按钮控件\n\n此控件允许用户通过点击对应每个选项的按钮来选择多个选项。因此，用户可以一次选择多个选项。通过选中/取消选中菜单来做出是/否的选择。\n\
    \n语法如下：\n\n```\nmychk1= Checkbutton(myroot , options...)\n```\n\n其中，\n\n**myroot**\
    \ 是父窗口。\n\n可以作为键值对使用并用逗号分隔的选项列表包括：activeforeground、activebackground、background、bd、bitmap、cursor、command、disableforeground、fg、font、height、image、highlightcolor、justify、onvalue、offvalue、padx、pady、selectcolor、selectimage、text、state、underline、variable、width\
    \ 和 wraplength。\n\n我们已经了解了大部分选项，但一些未讨论的选项如下：\n\n- **command**：当用户更改**复选按钮**状态时，此选项将关联一个函数。\n\
    - **onvalue**：当复选按钮处于选中或设置状态时，此选项将关联的复选按钮控制变量默认值设为 1。通过将 onvalue 设置为该值，可以为选中状态提供一个替代值。\n\
    - **offvalue**：当复选按钮处于未选中或清除状态时，此选项将关联的复选按钮控制变量默认值设为 0。通过将 offvalue 设置为该值，可以为未选中状态提供一个替代值。\n\
    - **text**：此选项将在复选按钮旁边显示文本。可以使用 '\\n' 显示多行文本。\n- **variable**：此选项将跟踪复选框的当前状态。它是一个\
    \ **IntVar** 变量，其中 0 表示关闭，1 表示设置，并且当按下按钮控件时，它将在 offvalue 和 onvalue 之间切换。\n\n参考以下代码：\n\
    \n```\nfrom tkinter import *\nfrom tkinter.ttk import *\n\nmyroot = Tk()\nmyroot.geometry('300x150')\n\
    myroot.title('CheckButton widget')\n\ndef myget():\n    if i2.get() == 'check':\n\
    \        s1.set('Checked')\n    else:\n        s1.set('UnChecked')\n\ni2 = StringVar()\n\
    myc2 = Checkbutton(myroot, text = 'Check/Uncheck', variable = i2, offvalue = 'uncheck',\
    \ onvalue = 'check', command = myget)\nmyc2.pack()\n\ns1 = StringVar()\nmye1 =\
    \ Entry(myroot, font = ('Calibri',12), textvariable= s1)\nmye1.pack(pady = 10)\n\
    \nmyroot.mainloop()\n```\n\n输出：\n参考 *图 3.23*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_101_0.png)\n\
    \n*图 3.23：输出*\n\n> **注意：前面的代码包含在程序名称：Chap3_Example18.py 中**\n\n在接下来的代码中，当用户点击**复选按钮**时，文本\
    \ \"checked\" 将被写入 Entry 控件，因为其选中状态的值是 \"checked\"。当用户取消选中**复选按钮**时，文本 **UnChecked**\
    \ 将被写入 Entry 控件，因为其未选中状态的值是 \"unchecked\"。\n\n**selectcolor：** 此选项将设置控件被选中时复选按钮的颜色。默认为\
    \ 'Red' 颜色。如果 indicator 为 True，则颜色应用于指示器。在 Windows 上，无论选择状态如何，它都用作指示器的背景。当 indicator\
    \ 设置为 False 时，无论何时被选中，颜色都用作整个控件的背景色。\n\n参考以下代码：\n\n```\nfrom tkinter import *\n\
    myroot = Tk()\ndef selectcolor_indicatoronTrue():\n    mychk1['selectcolor'] =\
    \ 'Green'\n\ndef selectcolor_indicatoronFalse():\n    mychk2['selectcolor'] =\
    \ 'Blue'\n\nmychk1 = Checkbutton(myroot, text = 'CheckButton', command = selectcolor_indicatoronTrue,\
    \ indicatoron = True)\nmychk1.place(x = 50, y = 50)\nmychk2 = Checkbutton(myroot,\
    \ text = 'CheckButton', command = selectcolor_indicatoronFalse, indicatoron =\
