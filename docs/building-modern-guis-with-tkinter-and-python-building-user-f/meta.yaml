  md: '# Objectives


    After reading this chapter, the reader will learn how to create different menus
    such as pop-up, top-level, and pull-down menus with the help of the tkinter Menu
    widget. The user can also create different applications such as Notepad, WordPad,
    any management software, and so on. Moreover, we will deal with the drop-down
    menu widget which is associated with a Menu widget called the tkinter Menubutton
    widget, which can display the choices when the user clicks on Menubutton. Finally,
    we will view the concepts of drawing different graphics like lines, rectangles,
    and so on, with the help of the tkinter Canvas widget.


    # tkinter Menu widget


    This widget is a top-level menu displayed under the parent window’s title bar.
    It provides options such as File, Edit, quit, and so on, in the application.


    The syntax is as follows:


    ```

    mymenu1= Menu(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, bd, activeborderwidth, activebackground, activeforeground, disabledforeground,
    cursor, font, fg, relief, postcommand, image, selectcolor, tearoff, and title.


    We have seen most of the options but some undiscussed options are as follows:


    +   - **activeborderwidth**: This option will specify the border width of the
    widget when it is under the mouse.

    - **disabledforeground**: This option will specify the foreground color when the
    state is disabled.

    - **postcommand**: When the mouse is over the widget, this option can be set to
    any of the function.

    - **tearoff**: This option will detach the menus from the main window creating
    floating menus and is a position from where the menu starts. When set to 1, a
    menu is created with dotted lines at the top and when clicked, the menu becomes
    floating as it will tear off the parent window. When set to 0, the menu is restricted
    in the main window.'
  merge: -1
  pgno: 267
- img_proc: true
  md: '+   - **selectcolor**: This option will show the radiobutton or checkbutton
    color when selected.

    - **title**: This option will change the window title of the GUI application if
    it is set to that string.


    Some of the methods used in this widget are:


    +   - **add_command(options)**: This method will add menu items to the main menu.

    - **add_checkbutton(options)**: This method will add a checkbutton to the menu.

    - **add_radiobutton(options)**: This method will add a radiobutton to the menu.

    - **add_separator(options)**: This method will add a separator line to the menu.

    - **add_cascade(options)**: This method will create a sub-level menu to the parent
    menu on association of a given menu to the parent menu, where the menu items will
    be aligned one under the other.

    - **add(type, options)**: This method will add a specific type (must be cascade,
    checkbutton, command, radiobutton, or separator) of the menu item to the menu.

    - **delete (startindex, endindex)**: This method will delete menu items from the
    start index to the end index.

    - **entryconfig (index, options)**: This method will modify a menu item based
    on the index and will change its options.

    - **index(item)**: This method will return the index of the specified menu item.

    - **insert_separator(index)**: This method will insert a separator at the specified
    index.

    - **invoke(index)**: This method will request the menu item which we want at a
    specified index.

    - **type(index)**: This method will return the choice type which we want at a
    specified index, which could be either radiobutton, checkbutton, tearoff, command,
    cascade, or separator.


    Now, we shall see some examples for better understanding:


    ```

    from tkinter import *


    myroot = Tk()

    ```'
