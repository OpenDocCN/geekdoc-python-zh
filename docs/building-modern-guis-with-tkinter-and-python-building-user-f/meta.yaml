    \n*图9.18：描述demo2.txt文件内容的输出*\n\n**注意：前面的代码包含在程序名称：Chap9_Example6.py中**\n\n我们还可以提供一个用于颜色选择的对话框，如下所示：\n\
    \n```\nfrom tkinter import *\nfrom tkinter.colorchooser import *\n\ndef myclickme():\n\
