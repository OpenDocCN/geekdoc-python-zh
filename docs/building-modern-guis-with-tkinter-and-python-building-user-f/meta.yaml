    \n在 tkinter 中使用类和对象创建 GUI 的优点如下：\n\n- **封装：** 通过使用类，我们可以将 GUI 的功能封装在单个类中，从而简化代码的组织和维护。此外，它还降低了代码的复杂性并防止命名冲突。\n\
