    \ Chap10_Example5.py**\n\n# # Trace in tkinter\n\nTo track variables in Python,\
    \ variable wrappers are created by tkinter by attaching an 'observer' callback\
    \ to the variable. Variable classes such as **BooleanVar**, **StringVar**, **DoubleVar**,\
    \ **IntVar** for Boolean, string, double, and integer values respectively can\
    \ be registered to an observer, which gets triggered whenever the variable value\
    \ is accessed. Until an observer is explicitly deleted, it remains active. The\
    \ callback function associated with an observer takes 3 arguments, which are as\
    \ follows:\n\n+   - Mode of access\n- The tkinter variable index in case it is\
    \ an array else an empty string.\n- The tkinter variable name.\n\nLet us now study\
    \ the various trace methods."
