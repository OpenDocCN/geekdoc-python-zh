    \ variable=myval2)\n\ncb1.pack(padx=10, pady=10)\ncb2.pack(padx=10, pady=10)\n\
    \nmyroot.mainloop()\n```\n\n**Output:**\n\nRefer to *Figure 3.25*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_104_0.png)\n\
    \n*Figure 3.25: Default output of Chap3_Example20.py*\n\nIn this code, we are\
    \ setting the image option for the unselected state and the selectimage option\
    \ for the selected state. There is another option called indicator on which we\
