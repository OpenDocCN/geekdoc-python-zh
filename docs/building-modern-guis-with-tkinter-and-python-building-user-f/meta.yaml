    # CHAPTER 7

    Getting

    Insights of Item

    Widgets in tkinter


    # Introduction


    Sometimes, there is a requirement to allow users to select one or more than one
    item from a list. We may require an application for menu creation, which either
    allows users to select different options or requirement for displaying a list
    of items, or to filter and sort a list of items based on name, date, hobby and
    so on. We do require tkinter Listbox widget as it is easy to use, is powerful
    and can be customizable as per our needs.


    # Structure


    In this chapter, we will discuss the following topic:


    +   - tkinter Listbox widget


    # Objectives


    After going through this chapter, the reader will learn about the tkinter Listbox
    widget where the user can display different types of lists of items and a number
    of items can be selected from the list. Different select mode examples will be
    viewed along with the scrollbar attached to this widget.'
  - "[PAGE 255]\n\n# tkinter Listbox widget\n\nThis widget will display the item list\
    \ to the user. Only text items can be placed in the Listbox and the same font\
    \ and color will be present in the text items. A user has the option to choose\
    \ one or more items from the list depending on the configuration.\n\nThe syntax\
    \ is as follows:\n\n```\nmylb1= Listbox(myroot, options...)\n```\n\nwhere,\n\n\
    +   - **myroot** is the parent window.\n- Some of the lists of options that can\
    \ be used as key-value pairs and are separated by commas are bd, bg, cursor, font,\
    \ height, fg, highlightcolor, highlightthickness, selectbackground, relief, selectmode,\
    \ xscrollcommand, yscrollcommand, and width.\n\nWe have seen most of the options\
    \ but some undiscussed options are as follows:\n\n+   - **highlightthickness**:\
    \ This option will represent the focus highlight thickness.\n- **selectmode**:\
    \ This option will specify the number of items that can be chosen from the list\
    \ and can be set to different modes such as:\n    - **SINGLE**: In this mode,\
    \ we can select only one line and the mouse cannot be dragged. The line is selected\
    \ whenever we click the button1.\n    - **BROWSE**: It is the default mode where\
    \ the user can select only one line out of a listbox. If an item is clicked and\
    \ the mouse is dragged to a different line, then the item selected will follow\
    \ the mouse.\n    - **EXTENDED**: In this mode, the adjacent group of lines can\
    \ be selected at once by clicking on the first line and dragging it to the last\
    \ line.\n    - **MULTIPLE**: In this mode, any number of lines can be selected\
    \ at once. If any line is clicked, it will be toggled whether or not it is selected.\n\
    - **xscrollcommand**: This option will link the listbox widget to the horizontal\
    \ scrollbar so that the user can scroll the listbox horizontally.\n- **yscrollcommand**:\
    \ This option will link the listbox widget to the vertical scrollbar so that the\
    \ user can scroll the listbox vertically.\n\nSome of the useful methods are as\
    \ follows:\n\n+   - **activate(index)**: This method will select the lines specified\
    \ by the given index."
