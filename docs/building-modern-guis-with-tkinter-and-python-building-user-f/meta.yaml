    \n# CHAPTER 8\nGetting Insights of tkinter User Interactive Widgets\n\n## Introduction\n\
    \nIn this chapter, we will give users the ability to design intuitive **Graphical\
    \ User Interfaces (GUI)** that look visually appealing. We can construct user-friendly\
    \ GUIs that give users a method to meaningfully interact with the application\
    \ by using widgets such as tkinter Menu, Menubutton and Canvas Widgets. In a GUI,\
    \ menus are made using the Menu widget. The usage of menus can give users access\
    \ to multiple commands or options. When a button with the Menubutton widget is\
    \ clicked, a menu appears. Users can frequently access additional commands or\
    \ settings by using menubuttons. Users can draw or interact with things on a canvas\
    \ created by the Canvas widget. Interactive visuals and video games are frequently\
    \ made using canvas widget.\n\n## Structure\n\nIn this chapter, we will discuss\
    \ the following topics:\n\n- tkinter Menu widget\n- tkinter Menubutton widget\n\
    - tkinter Canvas widget\n\n## Objectives\n\nAfter reading this chapter, the reader\
    \ will learn how to create different menus such as pop-up, top-level, and pull-down\
    \ menus with the help of the tkinter Menu widget. The user can also create different\
    \ applications such as Notepad, WordPad, any management software, and so on. Moreover,\
    \ we will deal with the drop-down menu widget which is associated with a Menu\
    \ widget called the tkinter Menubutton widget, which can display the choices when\
    \ the user clicks on Menubutton. Finally, we will view the concepts of drawing\
    \ different graphics like lines, rectangles, and so on, with the help of the tkinter\
    \ Canvas widget.\n\n## tkinter Menu widget\n\nThis widget is a top-level menu\
    \ displayed under the parent window’s title bar. It provides options such as File,\
    \ Edit, quit, and so on, in the application.\n\nThe syntax is as follows:\n\n\
    ```\nmymenu1= Menu(myroot, options...)\n```\n\nwhere,\n\n- **myroot** is the parent\
    \ window.\n- Some of the lists of options that can be used as key-value pairs\
    \ and are separated by commas are bg, bd, activeborderwidth, activebackground,\
    \ activeforeground, disabledforeground, cursor, font, fg, relief, postcommand,\
    \ image, selectcolor, tearoff, and title.\n\nWe have seen most of the options\
    \ but some undiscussed options are as follows:\n\n- **activeborderwidth**: This\
    \ option will specify the border width of the widget when it is under the mouse.\n\
    - **disabledforeground**: This option will specify the foreground color when the\
    \ state is disabled.\n- **postcommand**: When the mouse is over the widget, this\
    \ option can be set to any of the function.\n- **tearoff**: This option will detach\
    \ the menus from the main window creating floating menus and is a position from\
    \ where the menu starts. When set to 1, a menu is created with dotted lines at\
    \ the top and when clicked, the menu becomes floating as it will tear off the\
    \ parent window. When set to 0, the menu is restricted in the main window.\n-\
    \ **selectcolor**: This option will show the radiobutton or checkbutton color\
    \ when selected.\n- **title**: This option will change the window title of the\
    \ GUI application if it is set to that string.\n\nSome of the methods used in\
    \ this widget are:\n\n- **add_command(options)**: This method will add menu items\
    \ to the main menu.\n- **add_checkbutton(options)**: This method will add a checkbutton\
    \ to the menu.\n- **add_radiobutton(options)**: This method will add a radiobutton\
    \ to the menu.\n- **add_separator(options)**: This method will add a separator\
    \ line to the menu.\n- **add_cascade(options)**: This method will create a sub-level\
    \ menu to the parent menu on association of a given menu to the parent menu, where\
    \ the menu items will be aligned one under the other.\n- **add(type, options)**:\
    \ This method will add a specific type (must be cascade, checkbutton, command,\
    \ radiobutton, or separator) of the menu item to the menu.\n- **delete (startindex,\
    \ endindex)**: This method will delete menu items from the start index to the\
    \ end index.\n- **entryconfig (index, options)**: This method will modify a menu\
    \ item based on the index and will change its options.\n- **index(item)**: This\
    \ method will return the index of the specified menu item.\n- **insert_separator(index)**:\
    \ This method will insert a separator at the specified index.\n- **invoke(index)**:\
    \ This method will request the menu item which we want at a specified index.\n\
