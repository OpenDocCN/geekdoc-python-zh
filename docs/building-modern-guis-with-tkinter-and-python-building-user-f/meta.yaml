    We have seen most of the options but some undiscussed options are as follows:


    +   - **digits**: This option will read the current value via the control variable
    and is used to specify the digits to be displayed on the scale range.

    - **from_**: This option will specify the starting point of the scale range.

    - **to**: This option will specify the ending point of the scale range.

    - **label**: This option will display a text label of the scale which is shown
    on the top left and right corners vertically and extreme left and right corners
    horizontally.

    - **orient**: This option''s default orientation is horizontal and can be set
    to horizontal or vertical depending on the scale type.

    - **repeatdelay**: This option will define the duration up to which button1 will
    be held in the trough before the slider starts moving in that direction repeatedly
    and its default is 300msec.

    - **resolution**: This option will allow specifying the slightest change possibly
    made to the scale value. If set to resolution = 1 and from_ = -2 and to = 2 and
    the scale will have 5 possible values: -2, -1, 0, +1, and +2.

    - **showvalue**: This option will show the current value as text by the slider.
    It can be suppressed by setting it to 0.

    - **sliderlength**: This option will specify the scale length and the default
    is 30 pixels.

    - **state**: This option will represent the DISABLED or ACTIVE scale state.

    - **tickinterval**: This option will display the scale values at the set intervals.

    - **takefocus**: This option will allow a focusing cycle through scale widgets.

    - **variable**: This option displays the control variable to monitor the scale
    state.

    - **troughcolor**: This option displays the color of the trough.


    Some of the methods in the above widget are as follows:


    +   - **get()**: This method will return the current scale value.'
