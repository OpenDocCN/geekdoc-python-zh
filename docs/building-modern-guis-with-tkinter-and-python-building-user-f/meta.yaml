  md: 'Now, we shall see event handling using a lambda expression. A lambda expression
    in Python is a tool for writing anonymous functions. Without the requirement for
    a formal function definition, it enables you to build short, inline functions.
    A lambda expression can have a single expression but any number of parameters.


    The advantages of lambda expressions over conventional methods are as follows:


    +   - **Conciseness:** By allowing the user to write functions on a single line
    using lambda expressions, the code is made shorter and simpler to read.

    - **Readability:** By grouping together relevant functionality, lambda expressions
    can be utilized to build tiny, straightforward functions inline, improving the
    readability of user''s code.

    - **Avoiding function definition:** Using lambda expressions eliminates the need
    to declare a function individually, which is advantageous when user only require
    a function once and do not want to clutter the code with many definitions.

    - **Function as argument:** When working with collections, lambda expressions
    can be supplied as arguments to higher-order functions like `map()`, `filter()`,
    and `reduce()`. This enables more concise and expressive code.


    We will be viewing the output of the previous example using lambda expressions:


    ```

    from tkinter import *


    myroot = Tk() # creating an object of Tk class -- object of window


    myroot.geometry(''200x200'') # but can be resized to any pixel until we are using
    root.resizeable

    myroot.resizable(0,0) # window size is fixed. cannot be larger or smaller.


    #using lambda expression

    myshow1 = lambda e: myroot.configure(background = ''LightBlue'')

    myshow2 = lambda e: myroot.configure(background = ''LightGreen'')

    myshow3 = lambda e: myroot.configure(background = ''LightPink'')


    mytk_btn1 = Button(myroot, text = ''Background color'',font = (''Calibri'',15),fg
    = ''Blue'')

    mytk_btn1.bind(''<Button-1>'',myshow1) # Left Key of mouse

    mytk_btn1.bind(''<Button-2>'',myshow2) # Wheel Key of mouse

    ```'
