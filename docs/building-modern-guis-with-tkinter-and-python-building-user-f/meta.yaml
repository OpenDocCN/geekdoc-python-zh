    \ pack 几何管理器在块中组织标签组件。这里，我们在标签中显示了多行文本。\n\n我们可以使用 *borderwidth* 和 *relief* 选项来设置标签边框的外观，如下所示：\n\
    \n```\nfrom tkinter import *\n\nmyroot = Tk()\n\nmyl1_label = Label(myroot,text\
