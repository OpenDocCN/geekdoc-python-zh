  - "[PAGE 22]\n\n![](img/ecddba8119455057e37d50bbef734ff6_22_0.png)\n\nFigure 1.1:\
    \ tkinter access hierarchy\n\nSo, GUI applications can be easily and quickly created\
    \ when Python is combined with tkinter. Although Python offers multiple options\
    \ for developing GUI such as PyQt, Kivy, Jython, WxPython, and pyGUI; tkinter\
    \ is the most commonly used. In this book, we will focus only on the tkinter usage\
    \ of GUI creation. Just like we import any other module, tkinter can be imported\
    \ in the same way in Python code:\n\n```\nimport tkinter\n```\n\nThis will import\
    \ the **tkinter** module.\n\nThe module name in Python 3.x is **tkinter**, whereas\
    \ in Python 2.x, it is Tkinter.\n\nMore often, we can use:\n\n```\nfrom tkinter\
    \ import *\n```\n\nHere, the '*' symbol means everything, as Python now can build\
    \ Graphical User Interfaces by treating all of the widgets like Buttons, Labels,\
    \ Menus and so on, as if they were objects. It is like importing **tkinter** submodule.\n\
    \nHowever, there are some important methods which the user needs to know while\
    \ creating Python GUI application, and they are as follows:\n\n+   - Tk(screenName=None,\
    \ baseName=None, className='Tk', useTk=1)\n  tkinter offers this method in order\
    \ to create a main window. For any application, a main window code can be created\
    \ by using:\n  python\n  import tkinter\n  myroot = tkinter.Tk()\n  \n  Here,\
    \ **Tk** class is instantiated without any arguments. **myroot** is the main window\
    \ object name. This method will allow blank parent window creation with close,\
    \ maximize and minimize buttons on the top."
  - "[PAGE 23]\n\n+   - **mainloop()**\n  tkinter offers this method when our application\
    \ is ready to run. This method is an infinite loop used to run the application.\
    \ It will wait for an event to occur and as long as the window is not closed,\
    \ the event is processed.\n\n# Basic Python GUI program\n\nLet us see a basic\
    \ Python program which will create a window:\n\n```\nfrom tkinter import *\n\n\
    myroot = Tk() # creating an object of Tk class\n# we should first know how to\
    \ create a window if want to per-\n# form graphics coding.\n# but output window\
    \ will not be displayed right now\nmyroot.mainloop()\n```\n\n**Output:**\nThe\
    \ output can be seen in *Figure 1.2*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_23_0.png)\n\
    \n*Figure 1.2: Output of Chap1_Example1.py*\n\n> **Note: The preceding code is\
    \ covered in Program Name: Chap1_Example1.py**\n\nIn the preceding code, we have\
    \ imported tkinter submodule and created a parent widget which usually will be\
    \ the main window of an application. A blank parent window is created with close,\
    \ maximize and minimize buttons on the top. An infinite loop will be called to\
    \ run the application, as long as the window is not closed."
