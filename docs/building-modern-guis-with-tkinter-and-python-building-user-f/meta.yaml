  md: '# trace_add()


    This method will replace **trace_variable()** method. It will add an observer
    to a name and return the callback function name whenever the value is accessed.


    The syntax is as follows:


    ```

    trace_add(self, mode, callback_name)

    ```


    where,


    +   - The **mode** parameter can be one of ‘array’, ‘read’, ‘write’, ‘unset’,
    or a list or tuple of such strings.

    - **callback_name** parameter is a callback function name that is to be registered
    on the tkinter variable.


    # trace_remove()


    This method will replace the **trace_vdelete()** method. It will unregister an
    observer and initially while registering the observer through the **trace_add()**
    method, it will return the callback name.


    The syntax is as follows:


    ```

    trace_remove(self, mode, callback_name)

    ```


    where,


    +   - The **mode** parameter can be one of ‘array’, ‘read’, ‘write’, ‘unset’,
    or a list or tuple of such strings.

    - **callback_name** parameter is a callback function name that is to be registered
    on the tkinter variable.


    # trace_info()


    This method will replace **trace_vinfo()** and the trace method, which returns
    a callback name and is used to find the callback name which is to be deleted.
    The argument here is the tkinter variable itself.


    The syntax is as follows:


    ```

    trace_info(self)

    ```


    Refer to the following code:


    ```

    from tkinter import *

    ```'
