  md: '# CHAPTER 8

    Getting Insights of tkinter User Interactive Widgets


    # Introduction


    In this chapter, we will give users the ability to design intuitive **Graphical
    User Interfaces (GUI)** that look visually appealing. We can construct user-friendly
    GUIs that give users a method to meaningfully interact with the application by
    using widgets such as tkinter Menu, Menubutton and Canvas Widgets. In a GUI, menus
    are made using the Menu widget. The usage of menus can give users access to multiple
    commands or options. When a button with the Menubutton widget is clicked, a menu
    appears. Users can frequently access additional commands or settings by using
    menubuttons. Users can draw or interact with things on a canvas created by the
    Canvas widget. Interactive visuals and video games are frequently made using canvas
    widget.


    # Structure


    In this chapter, we will discuss the following topics:


    +   - tkinter Menu widget

    - tkinter Menubutton widget

    - tkinter Canvas widget'
