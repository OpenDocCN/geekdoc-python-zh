    # tkinter Menu widget


    This widget is a top-level menu displayed under the parent window’s title bar.
    It provides options such as File, Edit, quit, and so on, in the application.


    The syntax is as follows:


    ```

    mymenu1= Menu(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, bd, activeborderwidth, activebackground, activeforeground, disabledforeground,
    cursor, font, fg, relief, postcommand, image, selectcolor, tearoff, and title.


    We have seen most of the options but some undiscussed options are as follows:


    +   - **activeborderwidth**: This option will specify the border width of the
    widget when it is under the mouse.

    - **disabledforeground**: This option will specify the foreground color when the
    state is disabled.

    - **postcommand**: When the mouse is over the widget, this option can be set to
    any of the function.

    - **tearoff**: This option will detach the menus from the main window creating
    floating menus and is a position from where the menu starts. When set to 1, a
    menu is created with dotted lines at the top and when clicked, the menu becomes
    floating as it will tear off the parent window. When set to 0, the menu is restricted
    in the main window.'
