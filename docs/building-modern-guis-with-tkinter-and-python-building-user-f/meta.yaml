    \ Chap4_Example19.py\n\nIf we set repeatedly = 1000, then button1 will be held\
    \ down in the trough for 1 sec before the slider starts moving in that direction\
    \ repeatedly.\n\n## tkinter Text widget\n\nThis widget will allow options to use\
    \ text on multiple lines. For a single line, we will be using an **Entry** widget\
    \ and for multiple lines, we will be using Text where we can use elegant structures\
    \ like marks and tabs for locating different text areas.\n\nThe syntax is\n\n\
    ```python\nmytxt1 = Text(myroot, options...)\n```\n\nwhere,\n\n- **myroot** is\
    \ the parent window.\n- Some of the lists of options that can be used as key-value\
    \ pairs and are separated by commas are bd, bg, cursor, exportselection, fg, font,\
    \ height, highlightbackground, highlightcolor, highlightthickness, insertborderwidth,\
    \ insertbackground, insertontime, insertofftime, insertwidth, padx, pady, relief,\
    \ selectborderwidth, selectbackground, spacing1, spacing2, spacing3, tabs, state,\
    \ xscrollcommand, yscrollcommand, and wrap.\n\nWe have seen most of the options\
    \ but some undiscussed options are as follows:\n\n- **exportselection**: This\
    \ option will export the text selected within a text widget in the window manager.\
    \ If set to 0, it will be suppressed.\n- **insertborderwidth**: This option will\
    \ specify the 3-D border size around the insertion cursor. The default value is\
    \ 0.\n- **insertbackground**: This option will specify the insertion cursor color\
    \ whose default value is black.\n- **insertontime**: This option will specify\
    \ the time in which the insertion cursor is on during its blink cycle, whose default\
    \ value are 600 milliseconds.\n- **insertofftime**: This option will specify the\
    \ time in which the insertion cursor is off during its blink cycle, whose default\
    \ value is 300 milliseconds.\n- **insertwidth**: This option will specify the\
    \ insertion cursor width whose default value is 2 pixels.\n- **selectborderwidth**:\
    \ This option will set the border width which determines the border thickness\
    \ around selected Text on clicking the mouse and dragging the mouse.\n- **spacing1**:\
    \ This option will specify the amount of vertical space put above each text line.\
    \ Its default value is 0.\n- **spacing2**: This option will specify the amount\
    \ of extra vertical space added between displayed text lines when a logical line\
    \ wraps. Its default value is 0.\n- **spacing3**: This option will specify how\
    \ much extra vertical space is added between each text line.\n- **tabs**: This\
    \ option will control the usage of tab characters for positioning the text.\n\
    - **state**: This option will represent the DISABLED or NORMAL state of the widget.\n\
    - **wrap**: This option will wrap the wider lines into multiple lines. When set\
    \ to CHAR, will break the line which gets too wider for any character. When set\
    \ to WORD, will break the line after the last word will fit into the available\
    \ space.\n- **xscrollcommand**: This option when set to the **set()** method of\
    \ the horizontal scrollbar, the **Text** widget becomes horizontally scrollable.\n\
    - **yscrollcommand**: This option when set to the **set()** method of the vertical\
    \ scrollbar, the **Text** widget becomes vertically scrollable.\n\nSome of the\
    \ commonly used methods in the above widget are as follows:\n\n- **delete(startindex[,endindex])**:\
    \ This method will delete the characters within the given specified range.\n-\
    \ **get(startindex[,endindex])**: This method will fetch the characters within\
    \ the given specified range.\n- **index(index)**: This method will return the\
    \ absolute index of the given specified index.\n- **insert(index, string)**: This\
    \ method will insert a string in the given specified index.\n- **see(index)**:\
    \ This method will return True if the text specified at the given index is displayed;\
    \ else will return False.\n- **index(mark)**: This method will get the index of\
    \ the specified mark.\n- **mark_gravity(mark, gravity)**: This method will get\
    \ the gravity of the mark.\n- **mark_names()**: This method will fetch the gravity\
    \ of the given mark.\n- **mark_set(mark, index)**: This method will specify a\
    \ new position of the given mark.\n- **mark_unset(mark)**: This method will remove\
    \ the provided mark from the above widget.\n- **tag_add(tagname, startindex, endindex)**:\
    \ This method will tag the string within the specified range.\n- **tag_config()**:\
    \ This method will configure the tag properties.\n- **tag_delete(tagname)**: This\
    \ method will delete a given tag.\n- **tag_remove(tagname, startindex, endindex)**:\
    \ This method will remove the tag within the specified range.\n\nWe shall see\
    \ some examples of the **Text** widgets. Let us first create a basic example of\
    \ the **Text** widget, as shown:\n\n```python\nfrom tkinter import * # importing\
    \ module\n\nmyroot = Tk() # window creation and initialize the interpreter\nmyroot.geometry('400x250')\n\
    myroot.title('Textwidget')\n\n# creation of text widget\nmytext = Text(myroot,\
    \ width=18, height=10, font=('Calibri',12), wrap=WORD, padx=10, pady=10, bd=4,\
    \ selectbackground='Green', selectforeground='Red')\nmytext.pack()\n\nmyroot.mainloop()\
    \ # display window until we press the close button\n```"
