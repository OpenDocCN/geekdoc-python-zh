    # tkinter Menubutton widget


    This widget is a drop-down menu part that is shown to the user all the time. An
    option is provided to the user to select from different choices. It is associated
    with the menu which can display its choices when clicked by the user.


    The syntax is as follows:


    ```

    mymb1= Menubutton(myroot, options...)

    ```


    where,


    +   - **myroot** is the parent window.

    - Some of the lists of options that can be used as key-value pairs and are separated
    by commas are bg, bd, bitmap, activebackground, activeforeground, anchor, direction,
    cursor, disabledforeground, height, fg, highlightcolor, justify, image, menu,
    padx, pady, relief, text, state, textvariable, underline, wraplength, and width.'
  merge: -1
  pgno: 282
- img_proc: true
  md: 'We have seen most of the options but some undiscussed options are as follows:


    +   - **direction**: This option will specify the menu to be displayed in the
    specified direction to the button. It could be ABOVE, LEFT, or RIGHT where the
    menu will be displayed above, left, or right of the button.

    - **highlightcolor**: This option will display the color when tkinter Menubutton
    widget is clicked.

    - **image**: This option will set the image displayed on the tkinter Menubutton
    widget.

    - **menu**: This option will display the menu associated with the menubutton.

    - **text**: This option will display the text on the menubutton.

    - **textvariable**: This option will allow controlling the above widget text at
    runtime by setting the control variable of string type at runtime to the text
    variable.


    Refer to the following code:


    ```

    from tkinter import *


    myroot = Tk()


    myroot.geometry(''200x200'')


    # Create a menu button with optiones specified

