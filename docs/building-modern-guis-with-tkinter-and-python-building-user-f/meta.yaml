    \ import *\n\nclass MyScrollbarEntry(Tk):\n    def __init__(self):\n        super().__init__()\n\
    \        mysobj_scroll = Scrollbar(self,orient = 'horizontal')\n        mye1 =\
    \ Entry(self,xscrollcommand = mysobj_scroll.set, font = ('Calibri',12))\n    \
    \    mye1.focus()\n        mye1.pack(side= 'bottom', fill = X)\n        mysobj_scroll.pack(fill\
    \ = X)\n        mysobj_scroll.config(command = mye1.xview)\n\n        mye1.insert(0,\
    \ 'We should follow social distancing when we are going outside from our home.\
    \ It is mandatory to follow.')\n\nif __name__ == \"__main__\":\n    myroot = MyScrollbarEntry()\n\
    \    myroot.geometry('400x200')\n    myroot.mainloop()\n```\n\n**Output:**\n\n\
    The output can be seen in *Figure 4.17*:\n\n![](img/ecddba8119455057e37d50bbef734ff6_139_0.png)\n\
    \nNote: The preceding code is covered in Program Name: Chap4_Example7.py\n\nIn\
    \ this code, we are linking a horizontal scrollbar to an **Entry** widget. We\
    \ can see a scrollbar at the top of the **Entry** widget.\n\n## Validation in\
    \ the Entry widget\n\nThere will be some cases where the text written inside an\
    \ **Entry** widget is to be checked to make sure that it is valid according to\
    \ some rule. Such validation on an **Entry** widget can be done as follows:\n\n\
    - A callback function is defined, which will check the text in the Entry and will\
    \ return True if valid, and otherwise, it will return False. The text will be\
    \ unchanged if the callback returns False.\n- Next is to register the callback\
    \ function. A character string is returned which will be used to call the function.\n\
    - Then, validate the input in the **Entry** widget by calling the callback function.\
    \ The options used are described as follows.\n\n**validate**: This option will\
    \ be used to specify when to call the callback function to validate the input.\
    \ The values of the validate command are:\n\n- **none**: If the validation is\
    \ set to None, then no validation occurs. It is the default mode.\n- **focus**:\
    \ If the validate is set to focus, the **validatecommand** is called twice when\
    \ the Entry widget receives focus and when the focus is lost.\n- **focusin**:\
    \ The **validatecommand** is called when the widget has focus.\n- **focusout**:\
    \ The **validatecommand** is called when the widget has lost focus.\n- **key**:\
    \ The **validatecommand** is called whenever any input from the keyboard changes\
    \ the widget's contents.\n- **all**: The **validatecommand** will be called in\
