    # Conclusion


    In this chapter, we learned about the creation of a simple GUI app using the tkinter
    Label widget, which depicts the ways of displaying a text or image on a window
    form. Using tkinter Label widget, we saw how to position its text, how to pad
    space around the text, how to justify the text, how to both anchor and justify
    the text simultaneously, how to access the widget options using a key-value pair,
    how to dynamically change label options, how to display the default values, and
    how to display image in the widget using examples.


    Moreover, we explored how to use this label widget as a statusbar with code. We
    have used text option to display the message for demonstrating tkinter Message
    widget. Furthermore, we viewed a display of prompt unedited text messages to the
    user with this tkinter Message widget. Finally, we looked into multiple message
    boxes such as information, warning, error, question, okcancel, yesno and so on,
    in a Python application by using the tkinter MessageBox widget.


    # Points of remember


    +   - Using a label widget, we can show text or an image in a window. The Label
    widget''s text, font, foreground, and border are some of its crucial properties.

    - Text can be automatically wrapped when displayed in a window using a message
    widget. The Message widget''s text, font, foreground, background, and border are
    some of its crucial properties.

    - A message box with optional buttons and a message can be displayed with the
    MessageBox Widget. The messagebox is most frequently used to provide an alert
    or confirmation message to the user. The message box''s type argument can be used
    to specify the buttons that are available.'
