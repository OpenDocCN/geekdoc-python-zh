    - **value**: Each radiobutton value will be assigned to the control variable when
    it is turned on by the user. Each radiobutton in the group will give a different
    integer value option, when the control variable is an IntVar. Each radiobutton
    in the group will give a different string value option, when the control variable
    is an StringVar.

    - **image**: This option will allow getting the image displayed in the widget
    instead of the text.

    - **selectimage**: This option will display the image on the radiobutton when
    it is selected.

    - **selectcolor**: This option will set the radiobutton color when selected. The
    default color is Red.

    - **state**: This option when set to DISABLED, will make the widget unresponsive.
    The default state is NORMAL.

    - **text**: This option will display the text next to the radiobutton. Multiple
    lines of text can be displayed using ''\n''.

    - **textvariable**: This option allows us to update the message text, whenever
    we want and it is of String type.'
