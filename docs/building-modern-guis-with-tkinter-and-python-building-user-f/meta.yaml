    \ GUI 中，菜单是使用 Menu 小部件制作的。菜单的使用可以让用户访问多个命令或选项。当点击带有 Menubutton 小部件的按钮时，会显示一个菜单。用户可以经常使用\
    \ Menubutton 来访问额外的命令或设置。用户可以在由 Canvas 小部件创建的画布上绘制或与事物交互。交互式视觉效果和视频游戏经常使用 Canvas\
    \ 小部件制作。\n\n## 结构\n\n在本章中，我们将讨论以下主题：\n\n- tkinter Menu 小部件\n- tkinter Menubutton\
    \ 小部件\n- tkinter Canvas 小部件\n\n## 目标\n\n阅读本章后，读者将学习如何借助 tkinter Menu 小部件创建不同的菜单，例如弹出菜单、顶层菜单和下拉菜单。用户还可以创建不同的应用程序，例如记事本、写字板、任何管理软件等。此外，我们将处理与\
    \ Menu 小部件相关联的下拉菜单小部件，称为 tkinter Menubutton 小部件，当用户点击 Menubutton 时，它可以显示选项。最后，我们将借助\
    \ tkinter Canvas 小部件了解绘制不同图形（如线条、矩形等）的概念。\n\n## tkinter Menu 小部件\n\n此小部件是显示在父窗口标题栏下方的顶层菜单。它在应用程序中提供诸如文件、编辑、退出等选项。\n\
    \n语法如下：\n\n```\nmymenu1= Menu(myroot, options...)\n```\n\n其中，\n\n- **myroot**\
    \ 是父窗口。\n- 可以用作键值对并用逗号分隔的一些选项列表包括 bg、bd、activeborderwidth、activebackground、activeforeground、disabledforeground、cursor、font、fg、relief、postcommand、image、selectcolor、tearoff\
    \ 和 title。\n\n我们已经看到了大多数选项，但一些未讨论的选项如下：\n\n- **activeborderwidth**：此选项将指定小部件在鼠标下时的边框宽度。\n\
