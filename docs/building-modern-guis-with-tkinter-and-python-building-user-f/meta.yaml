    \ variable=myval2)\n\ncb1.pack(padx=10, pady=10)\ncb2.pack(padx=10, pady=10)\n\
    \nmyroot.mainloop()\n```\n\n**输出：**\n\n参考 *图 3.25*：\n\n![](img/ecddba8119455057e37d50bbef734ff6_104_0.png)\n\
    \n*图 3.25：Chap3_Example20.py 的默认输出*\n\n在此代码中，我们为未选中状态设置了 image 选项，为选中状态设置了 selectimage\
    \ 选项。还有一个名为 indicator 的选项，我们将其设置为 False，以不显示 tkinter 的默认指示器。\n\n我们可以更改每个复选按钮的状态，如\
    \ *图 3.26* 所示：\n\n![](img/ecddba8119455057e37d50bbef734ff6_104_1.png)\n\n*图 3.26：Chap3_Example20.py\
    \ 状态更改后的输出*\n\n> **注意：前面的代码包含在程序名称：Chap3_Example20.py 中**\n\n**state：** 当此选项设置为\
