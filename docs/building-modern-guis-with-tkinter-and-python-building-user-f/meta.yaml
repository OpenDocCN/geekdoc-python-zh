  md: '# About the Authors


    +   - **Saurabh Chandrakar** is a Research & Development Engineer (Dy. Manager)
    at Bharat Heavy Electricals Limited (BHEL) Hyderabad. He is the winner of the
    best executive award on Operations Division by BHEL Hyderabad. Recently, he has
    been awarded the prestigious BHEL Excellence Award under Anusandhan category for
    Redundant Composite Monitoring System of Power Transformers project. He has 20
    copyrights and 1 patent granted. Additionally, he has 6 patents filed. Moreover,
    he has published 3 books in reputed publications such as BPB New Delhi (Programming
    Techniques using Python), Scitech Publications Chennai (Programming Techniques
    using matlab) and IK International publishers (Microcontrollers and Embedded System
    Design). He has also launched 1 video course on BPB titled “First Time Play with
    Basic, Advanced Python concepts and complete guide for different python certification
    exams all in one umbrella.”


    +   - **Nilesh Bhaskarrao Bahadure** received his Bachelor of Engineering degree
    in Electronics Engineering in 2000, his Master of Engineering degree in Digital
    Electronics in 2005, and the Ph.D. degree in Electronics in 2017 from KIIT Deemed
    to be University, Bhubaneswar, India. He is currently an Associate Professor in
    the Department of Computer Science and Engineering at Symbiosis Institute of Technology
    (SIT), Nagpur, Symbiosis International (Deemed University) (SIU), Pune, Maharashtra,
    India. He has more than 20 years of experience. Dr. Bahadure is a life member
    of IE(I), IETE, ISTE, ISCA, SESI, ISRS, and IAENG professional organizations.
    He has published more than 40 articles in reputed international journals and conferences,
    and has 5 books to his credit. He is the reviewer of many indexed journals such
    as IEEE Access, IET, Springer, Elsevier, Wiley and so on. His research interests
    are in the areas of Sensor Technology, the Internet of Things, and Biomedical
    Image Processing.'
