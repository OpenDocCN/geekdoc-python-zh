    that this book has brought you a well understandable and practical introduction
    to the world of programming and in particular to the world of Python and that
    you are now eager to find out what you could program!


    The goal of this book was to introduce you to what the basic principles in programming
    (with Python) are. It should be a book that both creates an understanding of the
    theoretical background knowledge and trains practical application skills.


    With this basic course you should now know everything you need as a beginner for
    the first programming in Python! Of course, it makes sense not to stop at this
