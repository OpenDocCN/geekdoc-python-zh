- md: "## 5.3.7 Special operator for formatting strings\n\nThe special operator \"\
    %\" gives Python a very cool and unique feature. This special operator is used\
    \ in Python as a formatting operator for strings. The usage of the string formatting\
    \ operator is as follows:\n\nExample:\n\n```\nprint(\"My name is %s and weight\
    \ is %d kg!\" % ('mark', 50))\n```\n\nOutput:\n\n```\nMy name is mark and weight\
    \ is 50 kg!\n```\n\nAs we can see in the example, the % operator with a following\
    \ letter or character - we will see which characters there are in a moment - is\
    \ a kind of placeholder within a text or string, which also has a formatting function\
    \ (depending on which letter we write after the %). With the following expression:\
    \ % (\"mark\", 50) we then define which text or value we want.\n\nBelow is an\
    \ overview of the characters that can be used together with the formatting operator.\n\
    \n| Format icon | Conversion |\n|---|---|\n| %c | Characters |\n| %s | Converting\
    \ strings before formatting |\n| %i or %d | decimal integer with sign |\n| %u\
    \ | Unsigned decimal integer |\n| %o | octal integer |\n| %x | hexadecimal integer\
    \ |\n| %X | hexadecimal integer |\n| %e or %E | Exponential notation |\n| %f |\
    \ Floating point number |\n\n## 5.3.8 Arithmetic operators\n\nArithmetic operators\
    \ are used in almost all programming languages. By the way, this name sounds more\
    \ complicated than the thing is, because these are simply the symbols known from\
    \ simple mathematics (i.e. \"+\" for the sum of two numbers, \"*\" for the multiplication\
    \ of two numbers, etc.). In Python, there are the following arithmetic operators\
    \ that can be used to perform mathematical operations:\n\n1. For the addition\
    \ +, e.g. x+y\n2. For the subtraction -, e.g. x-y\n3. For the multiplication *,\
    \ e.g. x*y\n4. For the division /, e.g. x/y\n5. For the remainder of a division\
    \ (modulo) %, e.g. x%y\n6. For exponentiation **, e.g. x**y\n7. For the smallest\
    \ possible integer in the division (floor division) //, e.g. x//y\n8. For a negative\
    \ sign -, e.g. -y\n9. For equality ==, so e.g. x == y (x and y will have the same\
    \ values).\n\nIn this section we have learned what a string is and how we can\
    \ handle it. In addition, we have dealt with escape characters and operators.\
    \ In the next chapter we will first deal with the so-called \"tuples\" and then\
    \ we will come to the functions.\n\n## 5.4 Tuple\n\nA tuple is simply a collection\
    \ of values. The individual values are separated from each other by commas. In\
    \ contrast to a variable, which stores one content, tuples can store many contents\
    \ unchangeably. In other programming languages this would be called constants.\
    \ You can store not only one content in tuples, but even several, which are then\
    \ separated by commas. You can store unique and unchangeable values in them, such\
    \ as the name and year of birth of a person.\n\nExample a):\n\n```\ntuple1 = ('mark',\
    \ 'John', 2005, 2000);\ntuple2 = (1, 2, 3, 4, 5 );\ntuple3 = \"a\", \"b\", \"\
    c\", \"d\";\n```\n\nOutput a):\n\n```\n('mark', 'John', 2005, 2000)\n(1, 2, 3,\
    \ 4, 5)\n('a', 'b', 'c', 'd')\n```\n\nYou can also assign only one content to\
    \ a tuple, in which case you must add a comma after the scalar value, such as\
    \ in the following. If you forget the comma, Python would treat the value as a\
    \ string.\n\nExample b):\n\n```\ntuple1 = (10,);\nprint(tuple1)\n```\n\nOutput\
    \ b):\n\n```\n(10,)\n```\n\nBesides, it is also possible to create an empty tuple.\
    \ This is possible by not specifying content between the brackets.\n\nExample\
    \ c):\n\n```\n# An empty tuple\nempty_tuple = ()\nprint (empty_tuple)\n```\n\n\
    Output c):\n\n```\n()\n```\n\n### 5.4.1 Concatenation of tuples\n\nTwo tuples\
    \ can be concatenated or joined using the \"+\" operator as in the following example\
    \ (analogous to mathematical addition).\n\nExample:\n\n```\n# Code for concatenating\
    \ 2 tuples\ntuple1 = (0, 1, 2, 3)\ntuple2 = ('python', 'World')\n\n# Concatenating\
    \ above two\nprint(tuple1 + tuple2)\n```\n\nOutput:\n\n```\n(0, 1, 2, 3, 'python',\
    \ 'World')\n```\n\n### 5.4.2 Nesting of tuples\n\nTuples can also be nested in\
    \ Python as in the following example.\n\nExample:\n\n```\n# Code for creating\
    \ nested tuples\ntuple1 = (0, 1, 2, 3)\ntuple2 = ('python', 'World')\ntuple3 =\
    \ (tuple1, tuple2)\nprint(tuple3)\n```\n\nOutput:\n\n```\n((0, 1, 2, 3), ('python',\
    \ 'World'))\n```\n\n### 5.4.3 Repetitions in tuples\n\nTuples can be multiplied\
    \ or repeated for a desired number of values using the \"*\" operator, as in the\
    \ following example (analogous to mathematical multiplication).\n\nExample:\n\n\
    ```\n# Code to create a tuple with repetition\ntuple3 = ('python',)*3\nprint(tuple3)\n\
    ```\n\nOutput:\n\n```\n('python', 'python', 'python')\n```\n\n### 5.4.4 Invariability\
    \ of tuples\n\nAs defined at the beginning, tuples in Python are immutable (similar\
    \ to strings). So if you try to assign individual elements to a tuple by using\
    \ an index, the Python interpreter will give an error message.\n\nExample: Try\
    \ to update a tuple:\n\n```\n#code to test that tuples are immutable\n\ntuple1\
    \ = (0, 1, 2, 3)\ntuple1[0] = 4\nprint(tuple1)\n```\n\nOutput: Error message,\
    \ because not possible:\n\n```\nTraceback (most recent call last):\n  File \"\
    C:/Users/official/Documents/Python/11.py\", line 4, in <module>\n    tuple1[0]\
    \ = 4\nTypeError: 'tuple' object does not support item assignment\n```\n\n###\
    \ 5.4.5 Division of tuples\n\nAs with arrays, tuples can also be subjected to\
    \ a slicing operation (splitting). Slicing is done in a similar way as with arrays,\
    \ using \":\" and specifying the index or range.\n\nExample:\n\n```\n# code to\
    \ test slicing\ntuple1 = (0 ,1, 2, 3, 4, 5)\nprint(tuple1[1:])\nprint(tuple1[::-1])\n\
    print(tuple1[2:4])\n```\n\nOutput:\n\n```\n(1, 2, 3, 4, 5)\n(5, 4, 3, 2, 1, 0)\n\
    (2, 3)\n```\n\n### 5.4.6 Deleting elements in a tuple\n\nTuples, like strings,\
    \ have the property of immutability, so individual elements of a given tuple cannot\
    \ be deleted. Here, as with strings, the entire tuple must be deleted and, if\
    \ necessary, recreated with the new or correct values.\n\nA tuple can be deleted\
    \ in an analogous way again with the **del** command.\n\nExample:\n\n```\n# Code\
    \ for deleting a tuple\ntuple1 = ('Mark', 'John', 2005, 2000)\nprint (tuple1)\n\
    del tuple1\nprint(\"After deleting tuple : \")\nprint(tuple1);\n```\n\nOutput:\
    \ Error message, because tuple is no longer defined:\n\n```\n('Mark', 'John',\
    \ 2005, 2000)\nAfter deleting tuple :\nTraceback (most recent call last):\n  File\
    \ \"C:/Users/official/Documents/Python/11.py\", line 7, in <module>\n    print(tuple1);\n\
    NameError: name 'tuple1' is not defined\n```\n\n### 5.4.7 Predefined functions\
    \ for tuples\n\nIn Python, you can use the following predefined functions to work\
    \ with tuples. We'll take a closer look at what this means in a moment, using\
    \ **len(tuple)** as an example.\n\n| Function | Description |\n|---|---|\n| **cmp(tuple1,\
    \ tuple2)** | Compares the elements of two tuples |\n| **len(tuple)** | Specifies\
    \ the length of a tuple |\n| **max(tuple)** | Returns the largest element (max.\
    \ value) of the tuple |\n| **min(tuple)** | Returns the smallest element (min.\
    \ value) of the tuple |\n| **Tuple(seq)** | Converts a list into a tuple |\n\n\
    Let's take a detailed look at the procedure using the example of **len(tuple)**.\
    \ The command **len** (abbreviation for length) can be used to determine the length\
    \ of a tuple, as can be seen in the table. The result is a number that indicates\
    \ the number of values contained in a tuple, which is called length in the programming\
    \ language."
  mdcn: "## 5.3.7 用于格式化字符串的特殊运算符\n\n特殊运算符 `%` 赋予了 Python 一个非常酷且独特的特性。这个特殊运算符在 Python\
    \ 中用作字符串的格式化运算符。字符串格式化运算符的用法如下：\n\n示例：\n\n```\nprint(\"My name is %s and weight\
    \ is %d kg!\" % ('mark', 50))\n```\n\n输出：\n\n```\nMy name is mark and weight is\
    \ 50 kg!\n```\n\n正如我们在示例中看到的，`%` 运算符后跟一个字母或字符——我们稍后会看到有哪些字符——是文本或字符串中的一种占位符，它也具有格式化功能（取决于我们在\
    \ `%` 后面写的字母）。通过以下表达式：`% (\"mark\", 50)`，我们定义了想要使用的文本或值。\n\n下表概述了可以与格式化运算符一起使用的字符。\n\
    \n| 格式符号 | 转换 |\n|---|---|\n| %c | 字符 |\n| %s | 格式化前转换字符串 |\n| %i 或 %d | 有符号十进制整数\
    \ |\n| %u | 无符号十进制整数 |\n| %o | 八进制整数 |\n| %x | 十六进制整数 |\n| %X | 十六进制整数 |\n| %e\
    \ 或 %E | 指数表示法 |\n| %f | 浮点数 |\n\n## 5.3.8 算术运算符\n\n算术运算符在几乎所有编程语言中都会用到。顺便说一句，这个名字听起来比实际的东西更复杂，因为它们就是简单数学中已知的符号（即\
    \ \"+\" 表示两个数的和，\"*\" 表示两个数的乘积等）。在 Python 中，有以下算术运算符可用于执行数学运算：\n\n1.  加法 +，例如\
    \ x+y\n2.  减法 -，例如 x-y\n3.  乘法 *，例如 x*y\n4.  除法 /，例如 x/y\n5.  取余（模运算） %，例如 x%y\n\
    6.  幂运算 **，例如 x**y\n7.  整除（地板除） //，例如 x//y\n8.  负号 -，例如 -y\n9.  相等比较 ==，例如 x ==\
    \ y（x 和 y 将具有相同的值）。\n\n在本节中，我们学习了什么是字符串以及如何处理它。此外，我们还探讨了转义字符和运算符。在下一章中，我们将首先讨论所谓的“元组”，然后我们将介绍函数。\n\
    \n## 5.4 元组\n\n元组就是值的集合。各个值之间用逗号分隔。与存储一个内容的变量不同，元组可以不可变地存储多个内容。在其他编程语言中，这被称为常量。你不仅可以将一个内容存储在元组中，甚至可以存储多个内容，它们之间用逗号分隔。你可以在其中存储唯一且不可变的值，例如一个人的姓名和出生年份。\n\
    \n示例 a)：\n\n```\ntuple1 = ('mark', 'John', 2005, 2000);\ntuple2 = (1, 2, 3, 4,\
    \ 5 );\ntuple3 = \"a\", \"b\", \"c\", \"d\";\n```\n\n输出 a)：\n\n```\n('mark', 'John',\
    \ 2005, 2000)\n(1, 2, 3, 4, 5)\n('a', 'b', 'c', 'd')\n```\n\n你也可以只给元组分配一个内容，在这种情况下，你必须在标量值后添加一个逗号，如下所示。如果你忘记了逗号，Python\
    \ 会将该值视为字符串。\n\n示例 b)：\n\n```\ntuple1 = (10,);\nprint(tuple1)\n```\n\n输出 b)：\n\
    \n```\n(10,)\n```\n\n此外，也可以创建一个空元组。这可以通过在括号之间不指定内容来实现。\n\n示例 c)：\n\n```\n# An\
    \ empty tuple\nempty_tuple = ()\nprint (empty_tuple)\n```\n\n输出 c)：\n\n```\n()\n\
    ```\n\n### 5.4.1 元组的连接\n\n可以使用 \"+\" 运算符连接或连接两个元组，如下例所示（类似于数学加法）。\n\n示例：\n\n```\n\
    # Code for concatenating 2 tuples\ntuple1 = (0, 1, 2, 3)\ntuple2 = ('python',\
    \ 'World')\n\n# Concatenating above two\nprint(tuple1 + tuple2)\n```\n\n输出：\n\n\
    ```\n(0, 1, 2, 3, 'python', 'World')\n```\n\n### 5.4.2 元组的嵌套\n\n在 Python 中，元组也可以嵌套，如下例所示。\n\
    \n示例：\n\n```\n# Code for creating nested tuples\ntuple1 = (0, 1, 2, 3)\ntuple2\
    \ = ('python', 'World')\ntuple3 = (tuple1, tuple2)\nprint(tuple3)\n```\n\n输出：\n\
    \n```\n((0, 1, 2, 3), ('python', 'World'))\n```\n\n### 5.4.3 元组的重复\n\n可以使用 \"\
    *\" 运算符将元组乘以或重复所需的值数量，如下例所示（类似于数学乘法）。\n\n示例：\n\n```\n# Code to create a tuple\
    \ with repetition\ntuple3 = ('python',)*3\nprint(tuple3)\n```\n\n输出：\n\n```\n\
    ('python', 'python', 'python')\n```\n\n### 5.4.4 元组的不可变性\n\n如开头所定义，Python 中的元组是不可变的（类似于字符串）。因此，如果你尝试通过使用索引将单个元素分配给元组，Python\
    \ 解释器将给出错误消息。\n\n示例：尝试更新元组：\n\n```\n#code to test that tuples are immutable\n\n\
    tuple1 = (0, 1, 2, 3)\ntuple1[0] = 4\nprint(tuple1)\n```\n\n输出：错误消息，因为不可能：\n\n\
    ```\nTraceback (most recent call last):\n  File \"C:/Users/official/Documents/Python/11.py\"\
    , line 4, in <module>\n    tuple1[0] = 4\nTypeError: 'tuple' object does not support\
    \ item assignment\n```\n\n### 5.4.5 元组的切片\n\n与数组一样，元组也可以进行切片操作（分割）。切片的方式与数组类似，使用\
    \ \":\" 并指定索引或范围。\n\n示例：\n\n```\n# code to test slicing\ntuple1 = (0 ,1, 2, 3,\
    \ 4, 5)\nprint(tuple1[1:])\nprint(tuple1[::-1])\nprint(tuple1[2:4])\n```\n\n输出：\n\
    \n```\n(1, 2, 3, 4, 5)\n(5, 4, 3, 2, 1, 0)\n(2, 3)\n```\n\n### 5.4.6 删除元组中的元素\n\
    \n元组与字符串一样具有不可变性，因此不能删除给定元组的单个元素。在这里，与字符串一样，必须删除整个元组，并在必要时用新的或正确的值重新创建。\n\n可以使用\
    \ **del** 命令以类似的方式删除元组。\n\n示例：\n\n```\n# Code for deleting a tuple\ntuple1 = ('Mark',\
    \ 'John', 2005, 2000)\nprint (tuple1)\ndel tuple1\nprint(\"After deleting tuple\
    \ : \")\nprint(tuple1);\n```\n\n输出：错误消息，因为元组不再定义：\n\n```\n('Mark', 'John', 2005,\
    \ 2000)\nAfter deleting tuple :\nTraceback (most recent call last):\n  File \"\
    C:/Users/official/Documents/Python/11.py\", line 7, in <module>\n    print(tuple1);\n\
    NameError: name 'tuple1' is not defined\n```\n\n### 5.4.7 元组的预定义函数\n\n在 Python\
    \ 中，你可以使用以下预定义函数来处理元组。我们稍后将以 **len(tuple)** 为例，更仔细地了解这意味着什么。\n\n| 函数 | 描述 |\n\
    |---|---|\n| **cmp(tuple1, tuple2)** | 比较两个元组的元素 |\n| **len(tuple)** | 指定元组的长度\
    \ |\n| **max(tuple)** | 返回元组的最大元素（最大值） |\n| **min(tuple)** | 返回元组的最小元素（最小值） |\n\
    | **Tuple(seq)** | 将列表转换为元组 |\n\n让我们以 **len(tuple)** 为例详细查看该过程。命令 **len**（长度的缩写）可用于确定元组的长度，如表中所示。结果是一个数字，表示元组中包含的值的数量，在编程语言中称为长度。"
