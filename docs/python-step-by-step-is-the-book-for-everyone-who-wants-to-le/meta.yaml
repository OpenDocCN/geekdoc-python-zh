  md: '# Foreword


    Thank you very much for choosing this book!


    If you are looking for a practical guide for the easy to learn, yet very versatile
    programming language Python, then you are in the right place and well advised
    with this book! I am an engineer (M.Eng.) and would like to introduce you to the
    world of programming with Python simply explained. You will learn in this book
    both the theoretical basics of programming in Python, as well as the practical
    application using a lot of examples and also DIY projects. This book offers you
    an easy-to-understand, intuitively structured and practical introduction to the
    world of programming with Python! No matter whether Python 2 or Python 3!


    This fundamentals book is specifically for anyone who has no or very primitive
    prior knowledge of programming and Python, but also for anyone who wants to learn
    Python as another programming language. No matter what age you are, what profession
    you have, whether you are a pupil, student or pensioner. This book is for anyone
    who wants (or needs) to learn about the fascinating subject of programming.


    The goal of this book is to teach you step by step what the basics in Python are
    and how to successfully apply them to program your own scripts. So in this Python
    basic course you will learn everything you need to know as a beginner! The best
    thing to do is take a look inside the book and get your copy as an e-book or paperback!


    The book is structured as intuitively as possible. This means that, especially
    in the first examples, there may well be code fragments that you will not yet
    understand, as these will be explained in detail later. If this is the case, please
    do not let this irritate you, but simply continue and always focus only on the
    part of the example code that has just been explained or has already been explained.
    As the reading progresses, you will then understand more and more of the program
    code of the examples in the learning process. Be sure to stick with it, even if
    it gets a little more complicated! Python is worth it!'
