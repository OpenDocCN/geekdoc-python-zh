    \n# ### 7.1.1 While loop\n\nIn all programming languages, a while loop can be\
    \ used to execute a series of statements repeatedly, i.e. over and over again,\
    \ until a certain condition is no longer met. Once the certain condition is no\
    \ longer met (**False**), the execution of the loop is stopped and then the statements\
    \ of the next lines of code are executed. For example, we can add a \"1\" to the\
    \ variable \"i\" (initial value = 0) until the value of \"i\" would become greater\
    \ than 3. So, the loop or the addition of this loop should be stopped when \"\
    i\" reaches the value \"3\". This would then look like this:\n\nExample:\n\n```\n\
    python\ni=0\n\nwhile i<4:\n    print(\"Iteratino Number: %d\"%i)\n    i=i+1\n\n\
    print(\"\\nThe while loop ended\")\n```\n\nOutput:\n\n```\n\nIteration Number:\
    \ 0\nIteration Number: 1\nIteration Number: 2\nIteration Number: 3\n\nThe while\
    \ loop ended\n```\n\nBe sure to also note the colon and indentations!"
