  md: '# 9 Basics of object-oriented programming (OOP)


    Before we get to know the practical workings of OOP in the next chapters, we will
    first briefly familiarize ourselves with the theoretical background of object-oriented
    programming (OOP) in this section, in order to then better understand the concrete
    workings.


    The central element in object-oriented programming is the class. In addition to
    the class, there are also objects, attributes (properties) and functions (methods).
    Each class has both attributes and functions. In the following, let''s look at
    a human being or a person, for example, for better understanding. The definition
    human or person represents our class. A concrete person would then be our object
    (e.g. the person: Jim). Each person has attributes or properties, these are e.g.
    age, gender, name or other. The properties themselves (age, sex, name) are the
    attributes of a class (in our case the class: human). Every human being has these
    attributes, but the concrete expression is different for different people. Jim,
    for example, is 30 years old (attribute: age) and male (attribute: gender) and
    is called Jim (attribute: name). However, Jim does not only have attributes, but
    he can also do something. Jim can, for example, "eat", but he can also "walk"
    or, for example, something more complex like: "play tennis". These abilities would
    be called methods in OOP.


    ![](img/b2759e433f0c01f06c81587264f18acf_72_0.png)


    In object-oriented programming, such classes (e.g., our Jim) are used to develop
    larger and more complex software programs, because classes are reusable in OOP.'
  merge: -1
  pgno: 72
- img_proc: true
  md: 'Python | Step by step


    For the sake of clarity, what we discussed in the previous paragraph can be summarized
    again as follows:


    # Class


    So to speak, the generic term for our objects. For example, a car would be called
    a class. The concrete car model with its own chassis number and associated specific
    individual equipment of a brand, on the other hand, would be an object.


    # Object


    Instances of classes created with specially defined data. For example, a concrete
    car model of a brand with specific chassis number (or individual equipment).


    # Method (= function)


    Functions defined within classes (car) that describe the behavior or functionality
    of an object (specific car model). So e.g. "driving", "flashing", "honking".


    # Attribute (= property)


    Attributes reflect the state or properties of an object. The totality of attributes
    (the color of a car, or the number of doors) make an object (specific car model),
    which is subject to a common class (automobile), unique.


    In the next section we would like to look at object-oriented programming in the
    practical way of working.


    # 9.1 Classes


    As we discussed in the previous chapter, a Python class can be defined as an umbrella
    term from which objects are created. Most importantly, a class allows you to bundle
    data and functionality.


    Defining a class creates a new object of a particular class type that can be used
    to create instances that inherit the properties of the same class. A class creates
    a user-defined data structure that contains its own data elements and member functions.
    This data and functions can be accessed by creating an instance of this class.


    Important rules related to classes in Phyton are:


    +   1) Classes are created with the **class** keyword.

    2) Variables that belong to classes are called **attributes**.'
