    64-bit version of Windows installed on your PC. If you don''t know this, right-click
    in the "This PC" folder on your PC and click on "Properties". The system type
    will then be displayed. If in doubt, simply start with the 64-bit version. If
    this cannot be installed correctly because you have a 32-bit version of Windows,
    an error message will be displayed anyway.


    ![](img/b2759e433f0c01f06c81587264f18acf_8_0.png)


    ## Step 2: Launch the installation program


    Launch the Python installer once the download process is complete.


    ![](img/b2759e433f0c01f06c81587264f18acf_8_1.png)


    Then check the following options in the installation window at the bottom:'
