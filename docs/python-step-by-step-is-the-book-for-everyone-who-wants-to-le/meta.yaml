    \ write variables inside the brackets if you need them in the function. If you\
    \ have more than one variable, you should separate them with commas, e.g. **def\
    \ function_02(name):** or **def function_03(name, age):** (\"name\" and \"age\"\
    \ are already defined variables in our code).\n- 3) The first statement of a function\
    \ is called **docstring** and this describes what the function does. This is optional\
    \ and we will come back to it in a moment.\n- 4) The following actual code of\
    \ the function, starts with a colon. There must also be an indentation between\
    \ the line where the definition of the function begins (def).\n- 5) At the end\
    \ of the function the command **return** should be placed, the Python interpreter\
    \ then leaves the function. Optionally, you can also have a value returned here.\
    \ This desired value (e.g. a variable) must then be placed after **return**. But\
    \ we will come back to this in a moment.\n\nExample:\n\n```python\n# A simple\
    \ Python function\n\ndef functionName():\n    print(\"Welcome to Python\")\n```\n\
    \nExample:\n\n```python\ndef function_name(parameters):\n    \"\"\"docstring\"\
