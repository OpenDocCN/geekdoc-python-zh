    \ call the function\nprint(evenOdd.__doc__)\n```\n\nOutput:\n\n```\nFunction to\
    \ check if the number is even or odd\n>>> |\n```\n\n## 6.3 The return statement\n\
    \nThe return statement is used - as already briefly mentioned - to exit a function.\
    \ In addition, the return statement can be used to return a specific value. Such\
