  md: '# 4 Python syntax


    A program code is written in Python in such a way that each instruction is on
    a separate line. This is because, normally, Python reads the statements line by
    line and then executes them (sequential execution). However, there are cases where
    the flow may deviate from this line-by-line reading and execution. So, normally,
    Python statements are written so that there is only one statement per line.


    However, it is also possible to write several statements in a single line. Then
    one uses a semicolon for the separation between these instructions. However, for
    an orderly structure, as well as for good readability of the code, it is recommended
    to write only one statement per line, especially if it is not very simple or longer.
    By the way, the term **print(...)** in the following examples is a function that,
    as the name suggests, simply prints the content that is in the parentheses after
    it (text must be in quotes). But what functions are, how to use them, and how
