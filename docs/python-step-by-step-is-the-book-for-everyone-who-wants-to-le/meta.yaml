    \ is still true or false. Simply put, you can use a for loop to repeat a series\
    \ of statements over a range of values, so for example :\n\nExample:\n\n```\n\
    for i in range(0,5):\n    print(\"Iteration Number: %d\"%i)\n\nprint(\"\\nThe\
    \ for loop ended\")\n```\n\nOutput:\n\n```\nIteration Number: 0\nIteration Number:\
    \ 1\nIteration Number: 2\nIteration Number: 3\nIteration Number: 4\n\nThe for\
    \ loop ended\n```\n\nAs you can see in the example, the execution of the for loop\
