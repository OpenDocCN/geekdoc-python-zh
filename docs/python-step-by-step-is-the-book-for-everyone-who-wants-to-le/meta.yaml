    # 10.2.6 Label widget


    This widget renders a display field where you can insert an image or text. The
    image or text can be updated at any time. This widget allows additional operations
    for the text it contains, such as underlining, bold, etc.


    You can create such a label with the following statement and syntax:


    ```

    w = Label ( master, option, ... )

    ```


    As you can already imagine, *master* and *option* are again to be understood as
    in the previous sections. Probably the most commonly used options / properties
    of buttons in this case are:


    | Option | Description |

    | :--- | :--- |

    | anchor | To control the label position within the widget (if additional space
    is available). |

    | text | To display one or more lines of text |

    | bg | Background color |


    Example:


    ```

    from tkinter import *


    root = Tk()

    var = StringVar()

    label = Label( root, textvariable=var, relief=RAISED )


    var.set("Hey!? How are you doing?")

    label.pack()

    root.mainloop()

    ```


