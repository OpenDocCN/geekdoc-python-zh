    a GUI developed with Tkinter can run on the Windows operating system, as well
    as on macOS, Linux, etc. The Tkinter GUI applications look like they belong to
    the operating system platform itself, since they are rendered natively.


    # Creating a GUI application


    To be able to create a GUI application with Tkinter, you have to go through several
    (relatively simple) steps, which are listed below:


    +   1) Import Tkinter module (with **import ... as**).

    2) Create a main window for the GUI application.

