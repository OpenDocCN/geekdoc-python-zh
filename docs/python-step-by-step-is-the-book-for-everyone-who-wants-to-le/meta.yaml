  md: '# 10.2.5 Frame widget (Frame widget)


    The frame widget is important for grouping and organizing other widgets in a meaningful
    way. The frame widget simply acts as a kind of container that takes other widgets
    and places them all within a desired position in the main GUI window.


    You can create such a frame with the following statement and syntax:


    ```

    w = Frame ( master, option, ... )

    ```


    The parameters *master* and *option* are again to be understood as in the previous
    sections. Probably the most frequently used options / properties of buttons in
    this case are:


    | Option | Description |

    |---|---|

    | **bd** | Width of the border in pixels (2 by default) |

    | **bg** | Normal background color |


    Example:


    ```

    from tkinter import *


    root = Tk()

    frame = Frame(root)

    frame.pack()


    bottomframe = Frame(root)

    bottomframe.pack( side = BOTTOM )


    redbutton = Button(frame, text="Red", fg="red")

    redbutton.pack( side = LEFT)


    greenbutton = Button(frame, text="Brown", fg="brown")

    greenbutton.pack( side = LEFT )


    bluebutton = Button(frame, text="Blue", fg="blue")

    bluebutton.pack( side = LEFT )


    blackbutton = Button(bottomframe, text="Black", fg="black")

    blackbutton.pack( side = BOTTOM)


    root.mainloop()

    ```'
