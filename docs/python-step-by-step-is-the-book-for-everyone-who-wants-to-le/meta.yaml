    # 8.3 The try-except statement and its use


    The **try-except statement** is, in very simple terms, a built-in mechanism for
    handling errors or exceptions. The **try statement** internally checks the code
    that follows it for errors. When an error occurs, the code predefined in the **except
    statement is** executed to handle or fix the error instead of printing a nasty
    error message. The try-except statement should therefore be implemented for programs
    that need to execute continuously without interruption or error messages when
    an error occurs.


    However, let''s take a look at this as well, using an example that is perhaps
    a little easier to understand. In the following example, the exception (except)
    of the try-except statement occurred because the value of x was not assigned at
    the beginning. Normally, an error message would appear. In this case, however,
    the code defined in the exception clause (except) is executed.


    Example:


    ```

    1 try:

    2     print(x)

    3 except:

    4     print("An exception occured in printing the value of x")

    ```


    Output:


    ```

    An exception occured in printing the value of x

    ```


