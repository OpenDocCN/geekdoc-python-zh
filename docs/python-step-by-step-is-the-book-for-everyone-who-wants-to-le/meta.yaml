  mdcn: "## 6 函数\n\n在本节中，我们来讨论一下可以在 Python 中使用的函数。在编程中，函数通常可以被定义为一个脚本或一组指令，其目标是执行一个预定义的过程。作为开发者，你可以将多条指令放入一个函数中，并通过一个定义好的命令按需调用相应的函数。这意味着你不必每次都从头编写指令脚本，因为这些指令已存储在函数中，可以随时调用。\n\
    \n在 Python 中，你可以区分三种类型的函数：\n\n- 1) 预定义函数，例如 **print(...)**、**help(...)**\n- 2)\
    \ 用户自定义函数，即你自己创建的函数。\n- 3) 匿名函数（也称为 lambda 函数），即没有定义名称的函数。\n\n在接下来的章节中，我们将重点介绍**用户自定义函数**，即创建自己的函数的过程。\n\
    \n## 6.1 定义函数\n\n根据你希望用函数执行的指令或目标，你需要相应地构建该函数的内容。以下是定义函数的基本步骤和规则。当然，我们稍后会通过示例来学习如何使用函数。\n\
    \n- 1) 要创建一个函数，你需要关键字 **def**，后跟函数名、一对括号和一个冒号，例如 **def function_01():**\n- 2)\
    \ 如果函数中需要变量，你可以在括号内编写变量。如果有多个变量，应该用逗号分隔，例如 **def function_02(name):** 或 **def\
    \ function_03(name, age):**（\"name\" 和 \"age\" 是我们代码中已定义的变量）。\n- 3) 函数的第一条语句称为\
    \ **docstring**，它描述了函数的功能。这是可选的，我们稍后会再讨论。\n- 4) 函数的实际代码从冒号之后开始。在函数定义开始的行（def）和代码之间必须有缩进。\n\
    - 5) 在函数末尾应放置命令 **return**，然后 Python 解释器会退出函数。你也可以选择返回一个值。这个期望的值（例如一个变量）必须放在 **return**\
    \ 之后。我们稍后也会再讨论这一点。\n\n示例：\n\n```python\n# 一个简单的 Python 函数\n\ndef functionName():\n\
    \    print(\"Welcome to Python\")\n```\n\n示例：\n\n```python\ndef function_name(parameters):\n\
    \    \"\"\"docstring\"\"\"\n    statement(s)\n    return expression\n```\n\n##\
    \ 6.2 文档字符串\n\n如前所述，函数名之后的第一个字符串（或文本）称为 **docstring**。文档字符串可以简单地看作是给用户的一种说明，用于表示某个函数的功能。这提高了代码的可读性。\n\
    \n示例：\n\n```python\n# 一个简单的 Python 函数，用于检查 x 是偶数还是奇数\n\ndef evenOdd(x):\n    \"\
    \"\"检查数字是偶数还是奇数的函数\"\"\"\n\n    if (x % 2 == 0):\n        print(\"even\")\n  \
    \  else:\n        print(\"odd\")\n\n# 调用函数的驱动代码\nprint(evenOdd.__doc__)\n```\n\
    \n输出：\n\n```\nFunction to check if the number is even or odd\n>>> |\n```\n\n##\
    \ 6.3 return 语句\n\n如前所述，return 语句用于退出函数。此外，return 语句可用于返回一个特定的值。这些值可以是函数内语句执行产生的结果，也可以是为了确保某个函数已成功执行而返回的值。return\
    \ 语句可以是一个变量、一个表达式或一个常量。\n\n示例：\n\n```python\ndef square_value(value):\n    \"\"\
    \"此函数返回输入数字的平方值\"\"\"\n    return value**2\n\nprint(square_value(2))\nprint(square_value(-4))\n\
    ```\n\n输出：\n\n```\n4\n16\n>>> |\n```\n\n## 6.4 调用函数\n\n一旦定义了函数，就可以通过使用函数名后跟一对括号来调用它，例如\
    \ **function_01()**\n\n**示例：**\n\n```python\n# 一个简单的 Python 函数\n\ndef functionName():\n\
    \    print(\"Welcome to Python\")\n\n# 调用函数\nfunctionName()\n```\n\n**输出：**\n\n\
    ```\nWelcome to Python\n>>> |\n```\n\n## 6.5 函数的参数\n\n函数参数是在定义函数时括号中包含的“值”，例如，**def\
    \ function_03(name, age):** 中的 **\"name\"** 和 **\"age\"**。这些参数主要分为以下四类：\n\n###\
    \ 1. 必需参数\n\n如果你想调用一个先前定义的、包含参数的函数，你必须确保在调用函数时参数以正确的顺序和数量出现，即与函数定义中完全一致。\n\n以下示例展示了在调用\
    \ **printme()** 函数时未指定参数（str）会发生什么：\n\n示例 a)，调用时忘记参数：\n\n```python\n# 函数定义如下\n\
    def printme( str ):\n    \"This prints a passed string into this function\"\n\
    \    print(str)\n    return;\n\n# 现在你可以调用 printme 函数\nprintme()\n```\n\n输出 a)，因缺少参数而产生的错误消息：\n\
    \n```\nTraceback (most recent call last):\n  File \"C:/Users/official/Documents/Python/11.py\"\
    , line 8, in <module>\n    printme()\nTypeError: printme() missing 1 required\
    \ positional argument: 'str'\n>>> |\n```\n\n### 2. 关键字参数\n\n关键字参数在 Python 中用于在调用函数时以非顺序的方式放置参数。Python\
    \ 解释器可以选择使用函数调用中指定的关键字，并将相应的参数与函数定义中的参数匹配。\n\n示例 b)：\n\n```python\n# 函数定义如下\n\
    def printme( str ):\n    \"This prints a passed string into this function\"\n\
    \    print(str)\n    return;\n\n# 现在你可以调用 printme 函数\nprintme( str = \"My string\"\
    )\n```\n\n输出 b)：\n\n```\nMy string\n>>>\n```\n\n示例 c)：\n\n```python\n# 函数定义如下\n\
    def printinfo( name, age ):\n    \"This prints a passed info into this function\"\
    \n    print(\"Name: \", name)\n    print(\"Age \", age)\n    return;\n\n# 现在你可以调用\
