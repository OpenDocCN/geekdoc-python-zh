    # 4.3 Comments in Python


    In order for yourself and another programmer to better understand more complex
    code and to better follow the flow of a code, you can set comments in Python.
    These are simply hints that do not affect the code and are simply ignored by the
    Python interpreter. Thus, comments are only for human understanding. Comments
    increase the readability and comprehensibility of the script and contribute to
    debugging. To make the Python interpreter understand that a text is a comment,
    you can proceed in two ways: a) write line-by-line comments or b) write section-by-section
    comments.'
- md: "## Python | Step by step\n\n### Line-by-line comments:\n\nLine-by-line comments\
