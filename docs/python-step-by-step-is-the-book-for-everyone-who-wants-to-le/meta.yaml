    a nice GUI in this way, Tkinter offers a variety of widgets. These can be divided
    into control elements and information elements. Tkinter offers various control
    elements such as buttons, text fields, radio buttons, dropdown menus, etc. Also
    some information elements like labels, color indicators and so on. We will take
    a look at the most important widgets below.


    # 10.2.1 Button


    A button widget is used to insert a clickable button into the GUI application
    window. One can also display a text on the button so that the purpose of the button
    can be clearly conveyed. The function to be executed or called when this button
    is pressed can be assigned both when the button is declared and at a later time.


    You can create such a button using the following statement and syntax:


    ```

