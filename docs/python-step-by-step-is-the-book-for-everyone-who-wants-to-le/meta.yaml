    \   John\nAge   30\n>>> |\n```\n\n### 3. 默认参数\n\n默认参数在 Python 函数中用于为参数分配默认值。因此，你可以使用它们使参数等于一个预定义的默认值。\n\
    \n示例 d)：\n\n```python\n# 函数定义如下\n\ndef printinfo( name, age = 50 ):\n    \"This\
    \ prints a passed info into this function\"\n    print(\"Name: \", name)\n   \
    \ print(\"Age \", age)\n    return;\n\n# 现在你可以调用 printinfo 函数\nprintinfo( age=60,\
    \ name=\"mark\" )\nprintinfo( name=\"john\" )\n```\n\n输出 d)：\n\n```\nName:  mark\n\
    Age  60\nName:  john\nAge  50\n>>> |\n```\n\n### 4. 可变长度参数\n\n当需要执行的函数参数数量超过函数定义中定义的数量时，可以使用以下方法。这些额外的参数称为可变长度参数，不需要在函数定义中定义。为此，需要在包含可变长度参数值的变量名前放置一个星号\
    \ \"*\"。如果在函数调用期间没有指定额外的参数，则此可变长度参数保持为空。\n\n示例 e)：\n\n```python\n# 函数定义如下\n\n\
    def printinfo( arg1, *vartuple ):\n    \"This prints a variable passed arguments\"\
    \n    print(\"Output is: \")\n    print(arg1)\n    for var in vartuple:\n    \
    \    print(var)\n    return;\n\n# 现在你可以调用 printinfo 函数\nprintinfo( 1 )\nprintinfo(\
    \ 5, 6, 7 )\n```\n\n输出 (e)：\n\n```\nOutput is:\n1\nOutput is:\n5\n6\n7\n>>> |\n\
    ```"
