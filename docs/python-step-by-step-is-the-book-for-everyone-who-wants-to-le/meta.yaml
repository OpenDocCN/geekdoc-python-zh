  md: '# 1 Why Python?


    Before we start with the basics of programming, in this first chapter we will
    take a look at why our decision to use Python was right and whether it is worth
    learning a programming language. Python is one of the most popular programming
    languages of our time. Why ? On the one hand, because Python is very user-friendly
    and very easy to learn, and on the other hand, because the Python programming
    language has a wide range of functions that can be used not only for simple use
    cases, but also for complex ones. Let''s take a look at a few more aspects and
    advantages of Python, so that we can make sure that Python brings us the best
    start in programming.


    # Open Source


    Python is an open-source programming language that thrives and grows on community
    support and contributions. The term open source is generally characterized by
    the fact that the software is freely available, active user participation is desired,
    and there are no restrictions on use. You can download the official Python software
    IDLE ("Interactive Development Environment") for free from the Python website.
    We will look at how this works in detail in a moment.


    # Availability of Libraries


    Python has a very large number of additional libraries. What are libraries? A
    library represents an extension that allows us to quickly and easily implement
    additional functions or code. It is basically nothing more than code that has
    already been written by developers in the community. Most libraries can be found
    on platforms like GitHub (github.com) or Stackoverflow (stackoverflow.com). These
    websites are a kind of administrative platform / developer community for software
    development. If there are many libraries to choose from, this has the great advantage
    that beginners or even advanced users do not have to develop every single function
    from scratch. Since some (e.g. basic) functions are needed again and again and
    this also usually by other users, often someone already took care of the development
    of the code for a function and made this available. By already developed packages
    and modules one can use and/or implement this function then directly. Thus one
    can concentrate on the actual code and/or the actual function of a program. In
    a figurative sense, you could compare this to a car ride. You can get directly
    into a car and use components such as steering wheel, accelerator pedal, or air
    conditioning for the actual journey and do not have to construct the car for it
    or create individual functions.'
