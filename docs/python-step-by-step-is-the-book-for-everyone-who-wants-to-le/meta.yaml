    \ text, it does not become a comment.\n\nExample a):\n\n```\n#This is a single\
    \ line comment\n```\n\nExample b):\n\n```\na = 'This is # not a comment #'\nprint(a)\
    \ # Prints the string stored in variable a\n```\n\n### Section-by-Section Comments:\n\
    \nParagraph comments are annotations written across multiple lines. These are\
    \ started or ended in Python by three consecutive quotation marks \"\"\". That\
    \ is, three quotes are placed at the beginning of the section that is to be considered\
    \ a comment, then the comment follows as text, and three more quotes are placed\
