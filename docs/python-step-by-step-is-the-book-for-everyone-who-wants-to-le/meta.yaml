    \n## 11 DIY projects\n\nNow let's move on to the DIY projects to apply what we\
    \ have learned and to deepen the theory.\n\n## 11.1 Project 1: A simple calculator\
    \ with user input\n\nIn this project we will write together and step by step a\
    \ Python script for a simple calculator with basic arithmetic operations like\
    \ addition, subtraction, division and multiplication.\n\n### Step 1: Open and\
    \ save new empty Python script\n\nFirst, we need to open a new Python script file\
    \ and save it with a name. In the Python IDLE, you can click on the **File** menu\
    \ and select **New File**. Now you have a new Python script file open, you can\
    \ save it with a name of your choice by clicking on the **File** menu and then\
    \ on the **Save** option.\n\n![](img/b2759e433f0c01f06c81587264f18acf_92_0.png)\n\
    \n### Step 2: Receiving user input\n\nAs discussed in the previous chapters, the\
    \ user can be given an option to enter so that the user can enter two numbers\
    \ and the operator (i.e., + or -, for example) to calculate the result.\n\n```\n\
    python\nvalue1=int(input(\"Enter the 1st value: \"))\nvalue2=int(input(\"Enter\
    \ the 2nd value: \"))\noperator=input(\"Enter the arithmetic operator: \")\n```\n\
    \nThe two values entered by the user and the arithmetic operator are then stored\
    \ in the variables named *value1*, *value2* and *operator*. In addition, the addition\
    \ *int* converts the numbers entered into integers (this is necessary because\
    \ the input is in the form of strings via the input prompt in Python).\n\n###\
    \ Step 3: Implement conditional statements\n\nTo define the four desired arithmetic\
    \ operations, we can then use conditional statements as follows:\n\n```\npython\n\
    if operator == \"+\":\n    final_val = value1+value2\n\nelif operator == \"-\"\
    :\n    final_val = value1-value2\n\nelif operator == \"/\":\n    final_val = value1/value2\n\
    \nelif operator == \"*\":\n    final_val = value1*value2\n```\n\n### Step 4: Continuous\
    \ execution of the program\n\nA mechanism should be implemented to run the program\
    \ continuously, otherwise the program would run only once and then stop. We implement\
    \ this with a simple while statement at the end of the code so that the program\
    \ runs continuously.\n\n```\npython\nwhile(1):\n    calculator()\n```\n\nBelow\
    \ we see once again the complete Python script for the described project. In the\
    \ script, the **calculator** function has been defined and all instructions have\
    \ been placed inside the function so that the function in question can be executed\
    \ continuously by calling it inside an infinite while loop that runs continuously."
