    \ the **Edit** menu tab you will find functions such as Undo, Redo or Paste or\
    \ Cut. However, these are self-explanatory.\n\n![](img/b2759e433f0c01f06c81587264f18acf_13_1.png)\n\
    \nIf you now open a new script under **File**, you will find a slightly modified\
    \ menu bar that also contains the important **Format** and **Run** tabs. In **Format**\
    \ you can, for example, specify indentations and comments, but we will learn what\
