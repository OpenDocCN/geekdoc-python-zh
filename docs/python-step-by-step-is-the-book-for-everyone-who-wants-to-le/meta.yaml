  - "[PAGE 96]\n\n# 11.2 Project 2: Display of all prime numbers in an interval\n\n\
    In this project we want to write a script step by step that shows us all prime\
    \ numbers in a certain range. That is, we want to be able to define, for example,\
    \ the range 1 - 100 in the input and then output all prime numbers that exist\
    \ in this range.\n\nBy the way, a prime number is a number that is divisible only\
    \ by itself and 1 (without remainder), but is greater than 1.\n\n# Step 1: Definition\
    \ of the area as user input\n\nThe range of values that the program is to check\
    \ for prime numbers must be able to be specified as user input via the prompt.\
    \ To do this, we define the upper and lower end of the range using two variables\
    \ *lower* and *upper* and convert the input (strings) in turn to integers (int).\n\
    \n```\nlower=int(input(\"Enter the lower limit: \"))\nupper=int(input(\"Enter\
    \ the upper limit: \"))\n```\n\n# Step 2: Check for prime numbers\n\nIn this step,\
    \ each number within the given range is to be checked to see if it is a prime\
    \ number or not. For this purpose we use for, if and else statements.\n\n```\n\
    for value in range (lower, upper):\n    if value>1:\n        for i in range (2,\
    \ value):\n            if(value%i)==0:\n                break\n        else:\n\
    \            print(value, \"\\n\")\n```\n\nIn the instructions, *value* is the\
    \ variable that is always incremented (incremented by 1) over the defined range\
    \ between lower and upper value. At each step (iteration), the first conditional\
    \ statement *if* first checks if the numeric value selected for the variable named\
    \ *value* is greater than 1, since all prime numbers are greater than 1. The remaining\
    \ statements are executed only if the numerical value selected for the variable\
    \ named *value* is greater than 1 (nested statements). The next if statement at\
    \ the next indented level then checks whether the selected value can be divided\
    \ by any other values within the range without leaving any remainder. If there\
    \ is any value that can divide the selected numeric value for the variable named\
    \ *value* without having a remainder, the loop terminates and moves"
