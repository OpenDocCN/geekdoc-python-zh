  md: '# 12 Troubleshooting - common beginner mistakes


    In general, programming in Python is not very difficult if you follow certain
    basic rules that have been taught in this course. However, if something does not
    work, this short lesson should help. Alternatively, you can look for troubleshooting
    guides online or visit a forum and ask experienced users for advice.


    # Conflicts between Python versions


    It is important to know that sometimes there are several major versions of Python
    at the same time: currently, for example, Python 2 and Python 3. It may happen
    that the same script does not work in a different Python version - than the version
    in which it was developed - because there are small differences from version to
    version. Therefore, it is advisable to pay attention to the version of the Python
    environment in case a script that worked fine before suddenly gives error messages.


    # Syntax errors: indents, tabs and spaces


    Indentations are very important in the Python programming language because the
    language itself requires very precise indentation levels. Otherwise, errors will
    be generated. On the other hand, incorrect indentations are more serious in cases
    where no errors are generated, but the functionality of the script differs from
    the expected result. It is recommended to use four spaces as one indentation,
    but not tab characters. Also, be sure to use the correct number and correct usage
    of syntax elements such as ";" or "(" or ")".


    # Error in variable names


    As a programmer, one should be very careful when using variable names, since a
    single difference in a variable name or even a typo during the compilation or
    execution phase will result in an error or bug. More importantly, Python is a
    case-sensitive programming language, so care must be taken to use upper and lower
    case letters correctly. Also, you should use variable names sensibly. That is,
    when you yourself look at the program script at a later time, or when another
    programmer looks at it, the variable name itself, should already hint at or somewhat
    anticipate the meaning or intended use of that variable. In this way, you can
    greatly facilitate the comprehensibility of the script or even a debugging process.'
  merge: -1
