- md: "## 10 GUI Development with Python\n\nThe abbreviation **GUI** stands for \"\
    Graphical User Interface\". In Python, we have the possibility to develop a professional-looking\
    \ command prompt (GUI) for our programs. This can be, for example, a window for\
    \ selecting certain options:\n\n![](img/b2759e433f0c01f06c81587264f18acf_77_0.png)\n\
    \nor even a clickable button:\n\n![](img/b2759e433f0c01f06c81587264f18acf_77_1.png)\n\
    \nWe will look at how to create such a GUI in this chapter. There are several\
    \ options or modules / packages available in the Python environment for creating\
    \ GUIs:\n\n- 1) Tkinter\n- 2) wxPython\n- 3) JPython\n\nHowever, we will deal\
    \ exclusively with Python's Tkinter library module for GUI development in this\
    \ chapter.\n\n## 10.1 The Tkinter GUI development package/library\n\nTkinter is\
    \ the default built-in GUI library package for the Python environment. With this\
    \ module it is quite easy to create user-friendly GUIs with a great look and feel,\
    \ as the combination of Python and Tkinter makes it very easy for us, as we will\
    \ see in a moment. At the same time, it is very interesting to know that a GUI\
    \ developed with Tkinter can run on the Windows operating system, as well as on\
    \ macOS, Linux, etc. The Tkinter GUI applications look like they belong to the\
    \ operating system platform itself, since they are rendered natively.\n\n### Creating\
    \ a GUI application\n\nTo be able to create a GUI application with Tkinter, you\
    \ have to go through several (relatively simple) steps, which are listed below:\n\
    \n- 1) Import Tkinter module (with **import ... as**).\n- 2) Create a main window\
    \ for the GUI application.\n- 3) Add widgets (buttons, selection fields, ...)\
    \ to the GUI application - depending on possible user input.\n- 4) Create an event\
    \ loop to perform actions for each event triggered by the user.\n\nThe first two\
    \ steps are implemented as follows:\n\n```\nimport tkinter as tk # Importing the\
    \ Tkinter module\nwindow = tk.Tk() # Creating the main window\n```\n\nYou will\
    \ then get the following (still empty) main window as output:\n\n![](img/b2759e433f0c01f06c81587264f18acf_79_0.png)\n\
    \n## 10.2 Tkinter widgets\n\nIn order to fill the still empty main window with\
    \ meaningful elements and to create a nice GUI in this way, Tkinter offers a variety\
    \ of widgets. These can be divided into control elements and information elements.\
    \ Tkinter offers various control elements such as buttons, text fields, radio\
    \ buttons, dropdown menus, etc. Also some information elements like labels, color\
    \ indicators and so on. We will take a look at the most important widgets below.\n\
    \n### 10.2.1 Button\n\nA button widget is used to insert a clickable button into\
    \ the GUI application window. One can also display a text on the button so that\
    \ the purpose of the button can be clearly conveyed. The function to be executed\
    \ or called when this button is pressed can be assigned both when the button is\
    \ declared and at a later time.\n\nYou can create such a button using the following\
    \ statement and syntax:\n\n```\nw = Button ( master, option=value, ... )\n```\n\
    \nThe parameters are to be understood as follows:\n\n*Master* is needed for the\
    \ reference to the GUI main window (in our case the still empty GUI window). Here\
    \ the name that was used in the definition is entered (in the previous one e.g.\
    \ window was used). This way Python knows in which GUI window the button should\
    \ be placed.\n\nWith *Option* you determine the properties of the button, e.g.\
    \ the background color or the height of the buttons. If there are several properties,\
    \ each property and its desired value are separated from each other by commas\
    \ - starting from the second digit after the *master*.\n\nProbably the most commonly\
    \ used options / properties of buttons are:\n\n| Option | Description |\n| :---\
    \ | :--- |\n| **command** | Function that is called when the button is clicked\
    \ on |\n| **font** | Button font |\n| **bg** | Background color |\n| **height**\
    \ | Height of the button in text lines or pixels |\n| **bd** | Width of the button\
    \ border in pixels (2 by default). |\n| **activebackground** | Background color\
    \ when the mouse cursor is on the button |\n| **activeforeground** | Foreground\
    \ color when the mouse cursor is on the button |\n\n### Methods or functions for\
    \ Buttons:\n\nTo make sure that something happens when the user clicks on the\
    \ button, you need methods. For the button element there are two methods that\
    \ are often used:\n\n1) flash()\n\nIn this method the button flashes back and\
    \ forth between the active and normal state colors several times, so that the\
    \ button attracts the user's attention.\n\n2) invoke()\n\nThis method calls the\
    \ callback function of the button and returns what the function should perform.\
    \ If there is no callback for the button, no action is performed. But let's take\
    \ a look at this right now with an example.\n\nBefore that, we need to know what\
    \ the **pack()** method does. With this method, simply put, you can organize widgets\
    \ into blocks.\n\nExample:\n\n```\nfrom tkinter import* #Importing all packages\
    \ from Tkinter\nimport tkinter as tk\n\ndef show_text():\n    message1.config(text='Test\
    \ Data') #Changing the text label\n\nroot = tk.Tk() # Creating the main window\n\
    \n#Declaring the label\nmessage1=Label(root, text = 'Display Data')\nmessage1.pack()\n\
    \n#Declaring the button\nbutton1=Button(root, text = 'Click Me', command = show_text)\n\
    button1.pack()\n\nmainloop()\n```\n\nOutput: before clicking the button\n\n![](img/b2759e433f0c01f06c81587264f18acf_81_0.png)\n\
    \nOutput: after clicking the button\n\n![](img/b2759e433f0c01f06c81587264f18acf_81_1.png)\n\
    \n### 10.2.2 Canvas (graphic area)\n\nA canvas is simply a rectangular graphical\
    \ area that can be placed in a GUI window to display layouts, images, graphics,\
    \ text, or anything else.\n\nThe parameters are similar to the buttons as follows:\n\
    \n*Master* is again needed for the reference to the GUI main window (see Buttons).\n\
    \nWith *Option* you again determine the properties of the graphic area, e.g. the\
    \ dimensions or the background color. If there are several properties, each property\
    \ and its desired value (=value) is also inserted here, separated by commas -\
    \ starting from the second digit after the *master*.\n\nProbably the most commonly\
    \ used options / properties of buttons are:\n\n| Option | Description |\n|---|---|\n\
    | **height** | Height of the graphic area (y-direction) |\n| **width** | Width\
    \ of the graphical area (x-direction) |\n| **bd** | Width of the border in pixels\
    \ (2 by default) |\n| **bg** | Background color |\n| **cursor** | Used cursor\
    \ within the area (e.g. arrow, circle, ...) |\n| **confine** | With *true* it\
    \ is not possible to scroll outside the scrolling area |\n\nBy default, the Canvas\
    \ widget supports the following elements for graphing or drawing:\n\n**arc:**\n\
    \nCreates an arc-shaped representation.\n\n```\ncoord = 10, 50, 240, 210\narc\
    \ = canvas.create_arc(coord, start=0, extent=150, fill=\"blue\")\n```\n\n**image:**\n\
    \nCreates an image element (instance of the BitmapImage or PhotoImage classes).\n\
    \n```\nfilename = PhotoImage(file = \"test.gif\")\nimage = canvas.create_image(50,\
    \ 50, anchor=NE, image=filename)\n```\n\n**line:**\n\nCreates a line-shaped element.\n\
    \n```\nline = canvas.create_line(x0, y0, x1, y1, ..., xn, yn, options)\n```\n\n\
    **oval:**\n\nCreates a circle or an ellipse at the specified coordinates. Two\
    \ pairs of coordinates, namely the upper left and the lower right corner, are\
    \ required for the definition.\n\n```\noval = canvas.create_oval(x0, y0, x1, y1,\
    \ options)\n```\n\n**polygon:**\n\nCreates a polygon defined by three vertices.\n\
    \n```\npolygon= canvas.create_polygon(x0,y0,x1,y1,...xN, yN, options)\n```\n\n\
    Let's look at this with an example.\n\nExample:\n\n```\nimport tkinter\n\ntop\
    \ = tkinter.Tk()\n\nC = tkinter.Canvas(top, bg=\"blue\", height=300, width=250)\n\
    \ncoord = 10, 50, 240, 210\narc = C.create_arc(coord, start=0, extent=230, fill=\"\
    yellow\")\n\nC.pack()\ntop.mainloop()\n```"
  mdcn: "## 10 使用Python进行GUI开发\n\n缩写 **GUI** 代表“图形用户界面”。在Python中，我们可以为程序开发一个外观专业的命令提示符（GUI）。例如，这可以是一个用于选择特定选项的窗口：\n\
    \n![](img/b2759e433f0c01f06c81587264f18acf_77_0.png)\n\n甚至是一个可点击的按钮：\n\n![](img/b2759e433f0c01f06c81587264f18acf_77_1.png)\n\
    \n本章我们将探讨如何创建这样的GUI。Python环境中提供了多种用于创建GUI的选项或模块/包：\n\n- 1) Tkinter\n- 2) wxPython\n\
    - 3) JPython\n\n然而，本章我们将专门讨论用于GUI开发的Python Tkinter库模块。\n\n## 10.1 Tkinter GUI开发包/库\n\
    \nTkinter是Python环境默认的内置GUI库包。使用这个模块，创建具有出色外观和感觉的用户友好型GUI相当容易，因为Python和Tkinter的结合使我们能够轻松实现，我们稍后就会看到。同时，了解用Tkinter开发的GUI可以在Windows操作系统以及macOS、Linux等系统上运行，这非常有趣。Tkinter\
    \ GUI应用程序看起来就像是操作系统平台本身的一部分，因为它们是原生渲染的。\n\n### 创建GUI应用程序\n\n要能够使用Tkinter创建GUI应用程序，你需要经过几个（相对简单的）步骤，如下所列：\n\
    \n- 1) 导入Tkinter模块（使用 **import ... as**）。\n- 2) 为GUI应用程序创建一个主窗口。\n- 3) 向GUI应用程序添加控件（按钮、选择框等）——这取决于可能的用户输入。\n\
    - 4) 创建一个事件循环，以执行用户触发的每个事件对应的操作。\n\n前两个步骤的实现如下：\n\n```\nimport tkinter as tk #\
    \ 导入Tkinter模块\nwindow = tk.Tk() # 创建主窗口\n```\n\n然后你将得到以下（仍然为空的）主窗口作为输出：\n\n![](img/b2759e433f0c01f06c81587264f18acf_79_0.png)\n\
    \n## 10.2 Tkinter控件\n\n为了用有意义的元素填充仍然为空的主窗口，并以此创建一个漂亮的GUI，Tkinter提供了多种控件。这些控件可以分为控制元素和信息元素。Tkinter提供了各种控制元素，如按钮、文本框、单选按钮、下拉菜单等。还有一些信息元素，如标签、颜色指示器等。我们将在下面介绍最重要的控件。\n\
    \n### 10.2.1 按钮\n\n按钮控件用于在GUI应用程序窗口中插入一个可点击的按钮。也可以在按钮上显示文本，以便清晰地传达按钮的用途。当按下此按钮时要执行或调用的函数，既可以在声明按钮时分配，也可以在之后分配。\n\
    \n你可以使用以下语句和语法创建这样的按钮：\n\n```\nw = Button ( master, option=value, ... )\n```\n\
    \n参数的理解如下：\n\n*Master* 用于引用GUI主窗口（在我们的例子中是仍然为空的GUI窗口）。这里输入定义中使用的名称（例如前面使用了window）。这样Python就知道按钮应该放置在哪个GUI窗口中。\n\
    \n通过 *Option* 你可以确定按钮的属性，例如背景颜色或按钮的高度。如果有多个属性，每个属性及其期望值用逗号分隔——从 *master* 之后的第二个参数开始。\n\
    \n按钮最常用的选项/属性可能是：\n\n| 选项 | 描述 |\n| :--- | :--- |\n| **command** | 点击按钮时调用的函数\
    \ |\n| **font** | 按钮字体 |\n| **bg** | 背景颜色 |\n| **height** | 按钮的高度，以文本行或像素为单位 |\n\
    | **bd** | 按钮边框的宽度，以像素为单位（默认为2）。 |\n| **activebackground** | 鼠标光标在按钮上时的背景颜色 |\n\
    | **activeforeground** | 鼠标光标在按钮上时的前景颜色 |\n\n### 按钮的方法或函数：\n\n为了确保用户点击按钮时发生某些事情，你需要方法。对于按钮元素，有两个常用的方法：\n\
    \n1) flash()\n\n在此方法中，按钮在活动状态和正常状态颜色之间快速闪烁多次，以吸引用户的注意。\n\n2) invoke()\n\n此方法调用按钮的回调函数，并返回函数应执行的操作。如果按钮没有回调，则不执行任何操作。但我们现在就通过一个例子来看看这个。\n\
    \n在此之前，我们需要知道 **pack()** 方法的作用。简单来说，使用此方法可以将控件组织成块。\n\n示例：\n\n```\nfrom tkinter\
    \ import* #从Tkinter导入所有包\nimport tkinter as tk\n\ndef show_text():\n    message1.config(text='Test\
    \ Data') #更改文本标签\n\nroot = tk.Tk() # 创建主窗口\n\n#声明标签\nmessage1=Label(root, text\
    \ = 'Display Data')\nmessage1.pack()\n\n#声明按钮\nbutton1=Button(root, text = 'Click\
    \ Me', command = show_text)\nbutton1.pack()\n\nmainloop()\n```\n\n输出：点击按钮前\n\n\
    ![](img/b2759e433f0c01f06c81587264f18acf_81_0.png)\n\n输出：点击按钮后\n\n![](img/b2759e433f0c01f06c81587264f18acf_81_1.png)\n\
    \n### 10.2.2 画布（图形区域）\n\n画布就是一个矩形的图形区域，可以放置在GUI窗口中，用于显示布局、图像、图形、文本或任何其他内容。\n\n\
    参数与按钮类似，如下：\n\n*Master* 同样用于引用GUI主窗口（参见按钮）。\n\n通过 *Option* 你再次确定图形区域的属性，例如尺寸或背景颜色。如果有多个属性，每个属性及其期望值（=value）也在这里插入，用逗号分隔——从\
    \ *master* 之后的第二个参数开始。\n\n按钮最常用的选项/属性可能是：\n\n| 选项 | 描述 |\n|---|---|\n| **height**\
    \ | 图形区域的高度（y方向） |\n| **width** | 图形区域的宽度（x方向） |\n| **bd** | 边框的宽度，以像素为单位（默认为2）\
    \ |\n| **bg** | 背景颜色 |\n| **cursor** | 区域内使用的光标（例如箭头、圆形等） |\n| **confine** | 设置为\
    \ *true* 时，无法滚动到滚动区域之外 |\n\n默认情况下，Canvas控件支持以下用于绘图或绘制的元素：\n\n**arc（弧形）：**\n\n\
    创建一个弧形表示。\n\n```\ncoord = 10, 50, 240, 210\narc = canvas.create_arc(coord, start=0,\
    \ extent=150, fill=\"blue\")\n```\n\n**image（图像）：**\n\n创建一个图像元素（BitmapImage或PhotoImage类的实例）。\n\
    \n```\nfilename = PhotoImage(file = \"test.gif\")\nimage = canvas.create_image(50,\
    \ 50, anchor=NE, image=filename)\n```\n\n**line（线）：**\n\n创建一个线形元素。\n\n```\nline\
    \ = canvas.create_line(x0, y0, x1, y1, ..., xn, yn, options)\n```\n\n**oval（椭圆）：**\n\
    \n在指定坐标处创建一个圆形或椭圆形。定义需要两对坐标，即左上角和右下角。\n\n```\noval = canvas.create_oval(x0, y0,\
    \ x1, y1, options)\n```\n\n**polygon（多边形）：**\n\n创建一个由三个顶点定义的多边形。\n\n```\npolygon=\
    \ canvas.create_polygon(x0,y0,x1,y1,...xN, yN, options)\n```\n\n让我们通过一个例子来看看这个。\n\
    \n示例：\n\n```\nimport tkinter\n\ntop = tkinter.Tk()\n\nC = tkinter.Canvas(top,\
    \ bg=\"blue\", height=300, width=250)\n\ncoord = 10, 50, 240, 210\narc = C.create_arc(coord,\
    \ start=0, extent=230, fill=\"yellow\")\n\nC.pack()\ntop.mainloop()\n```"
