- md: "## 6.6 Pass by reference\n\nIt is important to emphasize that in Python almost\
    \ all variable names automatically become references (\"pass by reference\").\
    \ This means that whenever a variable is passed to a function, a new reference\
    \ to the object is created. This process is very similar to passing by reference\
    \ in Java programming.\n\nExample a):\n\n```\n# Here x is a new reference to same\
    \ list lst\ndef myFunction(x):\n    x[0] = 20\n\n# Driver Code (Note that lst\
    \ is modified after function call.\nlst = [1, 2, 3, 4, 5, 6]\nmyFunction(lst)\n\
    print(lst)\n```\n\nOutput a):\n\n```\n[20, 2, 3, 4, 5, 6]\n>>>\n```\n\nIn addition,\
    \ it is important to know that if a variable is passed to a specific function\
    \ and the entire reference is changed to another, the connection between the reference\
    \ and the passed variable is broken.\n\nExample b):\n\n```\ndef myFunction(x):\n\
    \    # After below line link of x with previous\n    # object gets broken. A new\
    \ object is assigned\n    # to x.\n    x = [20, 30, 40]\n\n# Driver Code (Note\
    \ that lst is not modified\n# after function call.\nlst = [1, 2, 3, 4, 5, 6]\n\
    myFunction(lst)\nprint(lst)\n```\n\nOutput b):\n\n```\n[1, 2, 3, 4, 5, 6]\n>>>\
    \ \n```\n\n## 7 Loops and Conditions\n\nIn the previous examples, we have already\
    \ used or accepted loops and conditions, such as the expressions **for** (loop)\
    \ or **if** (condition), several times without knowing exactly what is actually\
    \ happening here. Since loops and conditions are very basic operations of any\
    \ programming language and code, we will look at them in detail below.\n\n###\
    \ 7.1 Loops\n\n#### 7.1.1 While loop\n\nIn all programming languages, a while\
    \ loop can be used to execute a series of statements repeatedly, i.e. over and\
    \ over again, until a certain condition is no longer met. Once the certain condition\
    \ is no longer met (**False**), the execution of the loop is stopped and then\
    \ the statements of the next lines of code are executed. For example, we can add\
    \ a \"1\" to the variable \"i\" (initial value = 0) until the value of \"i\" would\
    \ become greater than 3. So, the loop or the addition of this loop should be stopped\
    \ when \"i\" reaches the value \"3\". This would then look like this:\n\nExample:\n\
    \n```\ni=0\n\nwhile i<4:\n    print(\"Iteration Number: %d\"%i)\n    i=i+1\n\n\
    print(\"\\nThe while loop ended\")\n```\n\nOutput:\n\n```\nIteration Number: 0\n\
    Iteration Number: 1\nIteration Number: 2\nIteration Number: 3\n\nThe while loop\
    \ ended\n```\n\nBe sure to also note the colon and indentations!\n\n#### 7.1.2\
    \ For loop\n\nJust like a while loop, a for loop can be used to execute statements\
    \ repeatedly. The difference to a while loop is that a for loop runs until a defined\
    \ range is over and the for loop does not check whether a condition is still true\
    \ or false. Simply put, you can use a for loop to repeat a series of statements\
    \ over a range of values, so for example:\n\nExample:\n\n```\nfor i in range(0,5):\n\
    \    print(\"Iteration Number: %d\"%i)\n\nprint(\"\\nThe for loop ended\")\n```\n\
    \nOutput:\n\n```\nIteration Number: 0\nIteration Number: 1\nIteration Number:\
    \ 2\nIteration Number: 3\nIteration Number: 4\n\nThe for loop ended\n```\n\nAs\
    \ you can see in the example, the execution of the for loop stops as soon as the\
    \ iteration would leave the specified value range (0 - 5). Then, as with the while\
    \ loop, the command of the next line of code is executed.\n\n### 7.2 Conditions\n\
    \nIn almost all programming languages - and of course in life in general - decision\
    \ making plays an important role. Decisions can be made in programming generally\
    \ by given conditions logically and automatically by the program. Conditional\
    \ statements check whether certain predefined conditions are met or not. There\
    \ are several types of conditional statements in Python:\n\n#### 7.2.1 If statement\n\
    \nThe if statement is the most basic conditional statement in Python. An if statement\
    \ simply checks whether a given condition is true or false, and executes certain\
    \ commands if the condition is **true**, depending on the condition. For example,\
    \ one could define that a ripe apple must be red. An if statement could then be\
    \ used to check whether this condition is true for a particular apple on a tree.\
    \ If the condition is true, one must then determine what should happen (e.g. include\
    \ the command that the picking process should be started).\n\nThe following example\
    \ illustrates the functionality of the if statement once again in program code.\n\
    \nExample:\n\n```\ni=2\n\nif i==2:\n    print(\"condition met\")\n```\n\nOutput:\n\
    \n```\ncondition met\n>>> |\n```\n\nAs you can see, the value of \"i\" is equal\
    \ to \"2\" and therefore the conditional statement becomes true and the script\
    \ executes the given statement corresponding to the condition.\n\n#### 7.2.2 else\
    \ statement\n\nThe **else statement** is used in all cases where both the true\
    \ and false results of checking a condition are to be taken into account. That\
    \ is, in this case it is possible to determine which statements should be executed\
    \ both in the true case (condition = **true**) and in the false case (condition\
    \ = **false**).\n\nExample:\n\n```\ni=2\n\nif i==1:\n    print(\"condition is\
    \ true\")\nelse:\n    print(\"condition is false\")\n```\n\nOutput:\n\n```\ncondition\
    \ is false\n>>>\n```\n\n#### 7.2.3 elif statement\n\nThe elif **statement** is\
    \ also known as elseif statement in other programming languages. The elif statement\
    \ follows after an if statement and before an else statement, i.e. right in between.\
    \ In this case, the normal (first) if condition is checked first to see if it\
    \ is true or false. If it is true, the statement referring to the if-condition\
    \ is executed and the check of the remaining elif- and else-conditions is not\
    \ performed anymore. However, if the first if condition is **false**, the elif\
    \ condition is checked. If this condition is also not true (**false**), the statement\
    \ for the else condition is executed, otherwise (if the condition is true) the\
    \ statement for elif is executed. So, in a way, the elif statement is a second\
    \ if check after the first if check (but is only checked if the first if check\
    \ was not true, i.e. false).\n\nExample:\n\n```\ni=2\n\nif i==1:\n    print(\"\
    condition is true\")\nelif i==2:\n    print(\"the elif condition became true\"\
    )\nelse:\n    print(\"condition is false\")\n```\n\nOutput:\n\n```\nthe elif condition\
    \ became true\n>>>\n```\n\n#### 7.2.4 Nested if statement\n\nTo make it a bit\
    \ more complex, you can now nest if statements inside each other in programming.\
    \ However, a nested if statement is simply an if statement that is inside another\
    \ if statement. Nested if statements are used in all cases where one or more additional\
    \ conditions must be tested within the main condition. That is, both conditions\
    \ (1st condition and 2nd condition) must be true for the complete condition to\
    \ be true.\n\nExample a):\n\n```\ni=2\nj=1\n\nif i==2:\n    print(\"main condition\
    \ met\")\n    if j==1:\n        print(\"nested condition met\")\n\nelse:\n   \
    \ print(\"main condition not met\")\n```\n\nOutput a):\n\n```\nmain condition\
    \ met\nnested condition met\n>>>\n```\n\nIn this example, we see that the main\
    \ condition is true. Therefore, in the second step, the nested if condition was\
    \ also checked and found to be true as well. That is, both conditions are satisfied\
    \ and the statement specified in them is therefore executed.\n\nIn contrast, in\
    \ the following example, the main condition is not met, so the second condition,\
    \ which is a nested condition and actually true, is not even checked.\n\nExample\
    \ b):\n\n```\ni=1\nj=1\n\nif i==2:\n    print(\"main condition met\")\n    if\
    \ j==1:\n        print(\"nested condition met\")\nelse:\n    print(\"main condition\
    \ not met\")\n```\n\nOutput b):\n\n```\nmain condition not met\n>>>\n```\n\n####\
    \ 7.2.5 The short-hand statements for if and else\n\nThe so-called shorthand if\
    \ statement is used as a kind of abbreviated if statement. It can be used to quickly\
    \ specify a single statement to be executed if the condition is **true**.\n\n\
    Example a):\n\n```\ni=1\n\nif i==1: print (\"condition met\")\n```\n\nOutput a):\n\
    \n```\ncondition met\n>>> |\n```\n\nAnalogously, this also works for the shorthand\
    \ else statement:\n\nExample b):\n\n```\ni=1\n\nif i==1: print (\"condition met\"\
    )\nelse: print(\"condition not met\")\n```\n\nOutput b):\n\n```\ncondition met\n\
    >>>\n```\n\n#### 7.2.6 Logical operators\n\nLogical operators are used to perform\
    \ operations between operations. In Python, logical operators are mainly used\
    \ with conditional statements that need to determine whether a particular condition\
    \ is true or false based on two or more variable values. This provides an alternative\
    \ to the nested if statements from one of the previous sections, for example.\n\
    \nThere are three logical operators in Python:\n\n| Operator | Description | Syntax\
    \ |\n| :--- | :--- | :--- |\n| **and** | True if both operands are true | x **and**\
    \ y |\n| **or** | True if one of the two operands is true | x **or** y |\n| **not**\
    \ | True if the operand is false | **not** x |"
  mdcn: "## 6.6 按引用传递\n\n需要强调的是，在 Python 中，几乎所有变量名都会自动成为引用（“按引用传递”）。这意味着每当一个变量被传递给函数时，都会创建一个指向该对象的新引用。这个过程与\
    \ Java 编程中的按引用传递非常相似。\n\n示例 a)：\n\n```\n# 这里 x 是指向同一个列表 lst 的新引用\ndef myFunction(x):\n\
    \    x[0] = 20\n\n# 驱动代码（注意 lst 在函数调用后被修改了。\nlst = [1, 2, 3, 4, 5, 6]\nmyFunction(lst)\n\
    print(lst)\n```\n\n输出 a)：\n\n```\n[20, 2, 3, 4, 5, 6]\n>>>\n```\n\n此外，重要的是要知道，如果一个变量被传递给某个特定函数，并且整个引用被更改为另一个对象，那么引用与传递的变量之间的连接就会断开。\n\
    \n示例 b)：\n\n```\ndef myFunction(x):\n    # 在下面这行代码之后，x 与之前对象的\n    # 连接就断开了。一个新的对象被赋值给\
    \ x。\n    x = [20, 30, 40]\n\n# 驱动代码（注意 lst 在函数调用后\n# 没有被修改。\nlst = [1, 2, 3,\
    \ 4, 5, 6]\nmyFunction(lst)\nprint(lst)\n```\n\n输出 b)：\n\n```\n[1, 2, 3, 4, 5,\
    \ 6]\n>>> \n```\n\n## 7 循环与条件\n\n在前面的例子中，我们已经多次使用或接受了循环和条件，例如 **for**（循环）或 **if**（条件）表达式，但并不完全清楚这里实际发生了什么。由于循环和条件是任何编程语言和代码非常基础的操作，我们将在下面详细探讨它们。\n\
    \n### 7.1 循环\n\n#### 7.1.1 While 循环\n\n在所有编程语言中，while 循环可用于重复执行一系列语句，即一遍又一遍地执行，直到某个条件不再满足。一旦特定条件不再满足（**False**），循环的执行就会停止，然后执行下一行代码的语句。例如，我们可以向变量\
    \ \"i\"（初始值 = 0）添加 \"1\"，直到 \"i\" 的值变得大于 3。因此，当 \"i\" 达到值 \"3\" 时，这个循环或这个循环的累加就应该停止。这看起来会是这样：\n\
    \n示例：\n\n```\ni=0\n\nwhile i<4:\n    print(\"Iteration Number: %d\"%i)\n    i=i+1\n\
    \nprint(\"\\nThe while loop ended\")\n```\n\n输出：\n\n```\nIteration Number: 0\n\
    Iteration Number: 1\nIteration Number: 2\nIteration Number: 3\n\nThe while loop\
    \ ended\n```\n\n务必注意冒号和缩进！\n\n#### 7.1.2 For 循环\n\n就像 while 循环一样，for 循环也可以用于重复执行语句。与\
    \ while 循环的区别在于，for 循环会运行直到定义的范围结束，并且 for 循环不会检查条件是否仍然为真或假。简单来说，你可以使用 for 循环在一系列值上重复执行一系列语句，例如：\n\
    \n示例：\n\n```\nfor i in range(0,5):\n    print(\"Iteration Number: %d\"%i)\n\n\
    print(\"\\nThe for loop ended\")\n```\n\n输出：\n\n```\nIteration Number: 0\nIteration\
    \ Number: 1\nIteration Number: 2\nIteration Number: 3\nIteration Number: 4\n\n\
    The while loop ended\n```\n\n正如你在示例中看到的，一旦迭代超出指定的值范围（0 - 5），for 循环的执行就会停止。然后，与\
    \ while 循环一样，执行下一行代码的命令。\n\n### 7.2 条件\n\n在几乎所有编程语言中——当然在日常生活中也是如此——决策制定都扮演着重要角色。在编程中，决策通常可以通过给定的条件由程序逻辑地、自动地做出。条件语句检查某些预定义的条件是否满足。Python\
    \ 中有几种类型的条件语句：\n\n#### 7.2.1 If 语句\n\nIf 语句是 Python 中最基本的条件语句。If 语句只是检查给定的条件是真还是假，如果条件为**真**，则根据条件执行某些命令。例如，可以定义一个成熟的苹果必须是红色的。然后可以使用\
    \ if 语句来检查这个条件对于树上的某个特定苹果是否成立。如果条件为真，那么必须确定应该发生什么（例如，包含启动采摘过程的命令）。\n\n以下示例再次说明了\
    \ if 语句在程序代码中的功能。\n\n示例：\n\n```\ni=2\n\nif i==2:\n    print(\"condition met\"\
    )\n```\n\n输出：\n\n```\ncondition met\n>>> |\n```\n\n如你所见，\"i\" 的值等于 \"2\"，因此条件语句变为真，脚本执行与条件对应的给定语句。\n\
    \n#### 7.2.2 else 语句\n\n**else 语句**用于需要同时考虑条件检查的真和假结果的所有情况。也就是说，在这种情况下，可以确定在真情况（条件\
    \ = **true**）和假情况（条件 = **false**）下应该执行哪些语句。\n\n示例：\n\n```\ni=2\n\nif i==1:\n \
    \   print(\"condition is true\")\nelse:\n    print(\"condition is false\")\n```\n\
    \n输出：\n\n```\ncondition is false\n>>>\n```\n\n#### 7.2.3 elif 语句\n\nelif **语句**在其他编程语言中也称为\
    \ elseif 语句。elif 语句跟在 if 语句之后，else 语句之前，即正好在它们之间。在这种情况下，首先检查正常的（第一个）if 条件，看它是真还是假。如果为真，则执行与\
    \ if 条件相关的语句，并且不再检查剩余的 elif 和 else 条件。但是，如果第一个 if 条件为**假**，则检查 elif 条件。如果这个条件也不为真（**假**），则执行\
    \ else 条件的语句，否则（如果条件为真）执行 elif 的语句。所以，在某种程度上，elif 语句是第一个 if 检查之后的第二个 if 检查（但仅在第一个\
    \ if 检查不为真，即假时才进行检查）。\n\n示例：\n\n```\ni=2\n\nif i==1:\n    print(\"condition is\
    \ true\")\nelif i==2:\n    print(\"the elif condition became true\")\nelse:\n\
    \    print(\"condition is false\")\n```\n\n输出：\n\n```\nthe elif condition became\
    \ true\n>>>\n```\n\n#### 7.2.4 嵌套 if 语句\n\n为了使其更复杂一些，现在可以在编程中将 if 语句相互嵌套。但是，嵌套\
    \ if 语句只是位于另一个 if 语句内部的 if 语句。嵌套 if 语句用于需要在主条件内测试一个或多个附加条件的所有情况。也就是说，两个条件（第一个条件和第二个条件）都必须为真，整个条件才为真。\n\
    \n示例 a)：\n\n```\ni=2\nj=1\n\nif i==2:\n    print(\"main condition met\")\n   \
    \ if j==1:\n        print(\"nested condition met\")\n\nelse:\n    print(\"main\
    \ condition not met\")\n```\n\n输出 a)：\n\n```\nmain condition met\nnested condition\
    \ met\n>>>\n```\n\n在这个例子中，我们看到主条件为真。因此，在第二步中，嵌套的 if 条件也被检查并发现也为真。也就是说，两个条件都满足，因此执行其中指定的语句。\n\
    \n相反，在下面的例子中，主条件不满足，因此第二个条件（它是嵌套条件并且实际上为真）甚至没有被检查。\n\n示例 b)：\n\n```\ni=1\nj=1\n\
    \nif i==2:\n    print(\"main condition met\")\n    if j==1:\n        print(\"\
    nested condition met\")\nelse:\n    print(\"main condition not met\")\n```\n\n\
    输出 b)：\n\n```\nmain condition not met\n>>>\n```\n\n#### 7.2.5 if 和 else 的简写语句\n\
    \n所谓的简写 if 语句用作一种缩写的 if 语句。它可以用于快速指定一个语句，如果条件为**真**则执行该语句。\n\n示例 a)：\n\n```\n\
    i=1\n\nif i==1: print (\"condition met\")\n```\n\n输出 a)：\n\n```\ncondition met\n\
    >>> |\n```\n\n类似地，这也适用于简写 else 语句：\n\n示例 b)：\n\n```\ni=1\n\nif i==1: print (\"\
    condition met\")\nelse: print(\"condition not met\")\n```\n\n输出 b)：\n\n```\ncondition\
    \ met\n>>>\n```\n\n#### 7.2.6 逻辑运算符\n\n逻辑运算符用于在操作之间执行操作。在 Python 中，逻辑运算符主要与条件语句一起使用，这些条件语句需要根据两个或多个变量值来确定特定条件是真还是假。这为前面某一节中的嵌套\
    \ if 语句提供了一种替代方案。\n\nPython 中有三个逻辑运算符：\n\n| 运算符 | 描述 | 语法 |\n| :--- | :--- | :---\
    \ |\n| **and** | 如果两个操作数都为真，则为真 | x **and** y |\n| **or** | 如果两个操作数中有一个为真，则为真\
    \ | x **or** y |\n| **not** | 如果操作数为假，则为真 | **not** x |"
