    | `not in` | Returns true or "1" if a character does not exist in the given string
    | `M not in a`, results in `1` |


    > Note: Remember that the index starts at "0" when counting. So the first character
    of a string has index "0", the second has index "1", and so on.


    # 5.3.7 Special operator for formatting strings


    The special operator "%" gives Python a very cool and unique feature. This special
    operator is used in Python as a formatting operator for strings. The usage of
    the string formatting operator is as follows:


    Example:


    ```

    print("My name is %s and weight is %d kg!" % (''mark'', 50))

    ```


    Output:


    ```

    My name is mark and weight is 50 kg!

    ```


    As we can see in the example, the % operator with a following letter or character
    - we will see which characters there are in a moment - is a kind of placeholder
    within a text or string, which also has a formatting function (depending on which
    letter we write after the %). With the following expression: % ("mark", 50) we
    then define which text or value we want.


    Below is an overview of the characters that can be used together with the formatting
    operator.'
