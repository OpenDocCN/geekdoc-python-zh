    # 6 Functions


    In this section, let''s talk about the functions that we can use in Python. A
    function can be defined in programming in general as a script or a collection
    of instructions that has the goal of executing a predefined procedure. As a developer,
    you can place a number of instructions in a function and call the respective function
    on demand by a defined command. This means that you do not always have to write
    the script of instructions from scratch, but this is stored in the function and
    can be called.


    You can distinguish between 3 types of functions in Python:


    +   1) Predefined functions, e.g. **print(...)**, **help(...)**

    2) User-defined functions, i.e. functions you have created yourself.

    3) Anonymous functions (also lambda function), i.e. function defined without a
    name.


    In the following sections we will focus on **user-defined functions**, i.e. the
    procedure for creating your own functions.


    # 6.1 Defining a Function


    Depending on which instructions or which goal you want to execute with a function,
    you have to build the content of the respective function accordingly. Below are
    the basic steps and rules for defining a function. Later, of course, we will look
    at examples and how to work with functions.


    +   1) To create a function you need the name **def** followed by the name of
    the function and two brackets followed by a colon, e.g. **def function_01 () :**

    2) You can write variables inside the brackets if you need them in the function.
    If you have more than one variable, you should separate them with commas, e.g.
    **def function_02 (name) :** or **def function_03(name, age) :** ("name" and "age"
    are already defined variables in our code).

    3) The first statement of a function is called **docstring** and this describes
    what the function does. This is optional and we will come back to it in a moment.

    4) The following actual code of the function, starts with a colon. There must
    also be an indentation between the line where the definition of the function begins
    (def).'
