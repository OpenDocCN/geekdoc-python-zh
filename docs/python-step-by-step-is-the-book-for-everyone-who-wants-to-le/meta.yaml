    \ **except 语句**中预定义的代码来处理或修复错误，而不是打印一条令人讨厌的错误信息。因此，对于需要在发生错误时持续执行而不中断或显示错误信息的程序，应该实现\
    \ try-except 语句。\n\n不过，让我们通过一个可能更容易理解的例子来看看这个。在下面的例子中，try-except 语句的异常（except）发生了，因为在开始时没有给\
    \ x 赋值。通常情况下，会出现一条错误信息。然而，在这种情况下，异常子句（except）中定义的代码被执行了。\n\n示例：\n\n```\ntry:\n\
    \    print(x)\nexcept:\n    print(\"An exception occured in printing the value\
    \ of x\")\n```\n\n输出：\n\n```\nAn exception occured in printing the value of x\n\
    ```\n\n## 9 面向对象编程（OOP）基础\n\n在接下来的章节中了解 OOP 的实际工作原理之前，我们将在本节中首先简要熟悉面向对象编程（OOP）的理论背景，以便更好地理解具体的工作原理。\n\
    \n面向对象编程的核心元素是类。除了类之外，还有对象、属性（特性）和函数（方法）。每个类都有属性和函数。接下来，为了更好地理解，让我们以一个人为例。定义“人类”或“人”代表我们的类。一个具体的人就是我们的对象（例如，这个人：吉姆）。每个人都有属性或特性，例如年龄、性别、姓名等。这些特性本身（年龄、性别、姓名）就是一个类的属性（在我们的例子中是“人类”类）。每个人都有这些属性，但不同的人的具体表现是不同的。例如，吉姆\
    \ 30 岁（属性：年龄），男性（属性：性别），名叫吉姆（属性：姓名）。然而，吉姆不仅有属性，他还能做一些事情。例如，吉姆可以“吃饭”，也可以“走路”，或者更复杂的事情，比如“打网球”。这些能力在\
    \ OOP 中被称为方法。\n\n![](img/b2759e433f0c01f06c81587264f18acf_72_0.png)\n\n在面向对象编程中，这样的类（例如，我们的吉姆）被用来开发更大、更复杂的软件程序，因为类在\
    \ OOP 中是可重用的。\n\n为了清晰起见，我们在上一段讨论的内容可以再次总结如下：\n\n### 类\n\n可以说，是我们对象的通用术语。例如，一辆汽车可以称为一个类。而具有自己底盘号和品牌特定配置的具体汽车型号，则是一个对象。\n\
    \n### 对象\n\n使用专门定义的数据创建的类的实例。例如，具有特定底盘号（或个人配置）的某个品牌的具体汽车型号。\n\n### 方法（= 函数）\n\n\
    在类（汽车）内定义的函数，描述对象（具体汽车型号）的行为或功能。例如，“驾驶”、“闪烁”、“鸣笛”。\n\n### 属性（= 特性）\n\n属性反映对象的状态或特性。属性的总和（汽车的颜色或车门数量）使得一个对象（具体汽车型号）在属于一个共同类（汽车）的前提下变得独一无二。\n\
    \n在下一节中，我们希望从实际工作方式的角度来探讨面向对象编程。\n\n### 9.1 类\n\n正如我们在上一章讨论的，Python 类可以被定义为一个总称，从中创建对象。最重要的是，类允许你将数据和功能捆绑在一起。\n\
    \n定义一个类会创建一个特定类类型的新对象，该对象可用于创建继承相同类属性的实例。一个类创建一个用户定义的数据结构，其中包含自己的数据元素和成员函数。可以通过创建该类的实例来访问这些数据和函数。\n\
    \n与 Python 中类相关的重要规则是：\n\n- 1) 类使用 **class** 关键字创建。\n- 2) 属于类的变量称为 **属性**。\n-\
    \ 3) 属性是全局的，即可以使用点运算符 \".\" 进行访问。\n\n例如，对于 *Myclass.Myattribute*，“Myclass”是类的名称，“Myattribute”是属性的名称。\n\
    \n### 9.2 类的定义\n\n类的定义非常简单，其运行方式与函数类似但又不同。这里不使用 **def**，而是使用 **class**，后跟类名和一个冒号。例如，这里定义了类对象“cars”：\n\
    \n```\n# demonstrate defining a class\n\nclass cars:\n    pass\n```\n\n### 9.3\
    \ 类的对象\n\n正如我们已经知道的，对象可以被定义为特定类的子实例。这意味着对象是一个具有该类唯一属性集（特性）的实体。\n\n对象的**状态**由其属性（对象特性：“红色”、“大型”）表示。\n\
    \n对象的**行为**由其方法（如“闪烁”、“鸣笛”等函数）表示。它也反映了对象对其他对象的反应。\n\n对象的**标识**由一个唯一的名称（例如“吉姆”）决定，并允许对象与其他对象交互。\n\
    \n### 9.4 声明/实例化对象\n\n当创建一个类（例如“人类”）的特定对象（例如“吉姆”）时，这称为实例化。某个类的所有实例都具有相同的属性（“颜色：”、“大小：”）和类的行为。然而，属性的各自独立值（“颜色：**红色**”、“大小：**大型**”）使每个对象独一无二。\n\
    \n一个单独的类可以拥有任意数量的实例（单个对象）。\n\n在 Python 中，对象可以简单地如下定义或更确切地说是实例化。\n\n示例：\n\n```\n\
    class cars:\n    print(\"An object has been created from class called 'cars'\"\
    )\n\nobject1=cars()\n```\n\n输出：\n\n```\nAn object has been created from class\
    \ called 'cars'\n>>> |\n```\n\n### 关键字 \"self\"\n\n类方法在方法定义中有一个额外的第一个参数，称为“self”。调用方法时，不需要指定参数或值。为了更好地理解这一点，让我们看以下场景：\n\
    \n假设一个类 **myclass** 有一个名为 **myobject** 的对象，以及一个名为 **mymethod** 的方法，该方法在定义时有两个参数\
    \ **arg1** 和 **arg2**。如果我们如下调用特定对象的 mymethod 方法，\n\n**myobject.mymethod (arg1,\
    \ arg2)**\n\nPython 解释器会自动将给定对象的方法调用转换为以下形式：\n\n**myclass.mymethod(myobject, arg1,\
    \ arg2)**\n\n### 9.5 \"__init__\" 方法\n\n如果你曾经使用过 C++ 或 Java，或者具备相关基础知识，你可能会认为\
    \ __init__ 方法类似于 C++ 或 Java 中的构造函数。但别担心，如果你在其他编程语言方面没有任何先前知识，我们也会通过以下解释对 __init__\
    \ 方法形成清晰的理解。\n\n这个方法或构造函数（__init__）只是用于初始化对象的状态。这意味着 __init__ 方法的主要目的是为对象创建初始状态（初始化）。与其他方法类似，构造函数由一组在创建对象时执行的语句组成。也就是说，一旦对象被类声明，__init__\
    \ 方法就会被执行。"
