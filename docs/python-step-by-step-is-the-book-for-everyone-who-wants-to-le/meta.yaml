    An index of -1 refers to the last character of the string. In the positive indexing
    method, this would be equivalent to index 10.


    ![](img/b2759e433f0c01f06c81587264f18acf_37_0.png)


    If we try to access an index that does not exist (here e.g. -12) we will get the
    error message: "Index Error". Also, the index should be an integer, otherwise
    the message: "Type error" will be displayed.


    Example:


    ```

    # Python Program to Access characters of String


    String_01 = "HelloPython"

    print("Initial String: ")

    print(String_01)


    # Printing First character

    print("\nFirst character of String is: ")

    print(String_01[0])


    # Printing Last character

    print("\nLast character of String is: ")

    print(String_01[-1])

    ```'
