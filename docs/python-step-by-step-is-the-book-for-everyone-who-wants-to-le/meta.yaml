    \ for the use of characters in a programming language and the structural design\
    \ of the code.\n\n> By the way: The last lesson contains a troubleshooting guide,\
    \ which can help you with debugging, if a script does not work. Take a look at\
    \ this lesson as soon as the first errors occur.\n\n**An overview of the Python\
    \ IDLE:**\n\nThe Python IDLE is a relatively slim program, which actually consists\
    \ only of an input window (text editor) and a menu bar, in the upper area. To\
    \ open the Python-IDLE, simply search for the term IDLE in the search function\
    \ of the taskbar. The following window should then open:\n\n![](img/b2759e433f0c01f06c81587264f18acf_12_0.png)\n\
    \nWe will briefly discuss some important functions of the menu bar below and then\
