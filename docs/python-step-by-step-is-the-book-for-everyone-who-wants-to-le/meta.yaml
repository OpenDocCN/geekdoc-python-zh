    \ because the value of x was not assigned at the beginning. Normally, an error\
    \ message would appear. In this case, however, the code defined in the exception\
    \ clause (except) is executed.\n\nExample:\n\n```\ntry:\n    print(x)\nexcept:\n\
    \    print(\"An exception occured in printing the value of x\")\n```\n\nOutput:\n\
    \n```\nAn exception occured in printing the value of x\n```\n\n## 9 Basics of\
    \ object-oriented programming (OOP)\n\nBefore we get to know the practical workings\
    \ of OOP in the next chapters, we will first briefly familiarize ourselves with\
    \ the theoretical background of object-oriented programming (OOP) in this section,\
    \ in order to then better understand the concrete workings.\n\nThe central element\
    \ in object-oriented programming is the class. In addition to the class, there\
    \ are also objects, attributes (properties) and functions (methods). Each class\
    \ has both attributes and functions. In the following, let's look at a human being\
    \ or a person, for example, for better understanding. The definition human or\
    \ person represents our class. A concrete person would then be our object (e.g.\
    \ the person: Jim). Each person has attributes or properties, these are e.g. age,\
    \ gender, name or other. The properties themselves (age, sex, name) are the attributes\
    \ of a class (in our case the class: human). Every human being has these attributes,\
    \ but the concrete expression is different for different people. Jim, for example,\
    \ is 30 years old (attribute: age) and male (attribute: gender) and is called\
    \ Jim (attribute: name). However, Jim does not only have attributes, but he can\
    \ also do something. Jim can, for example, \"eat\", but he can also \"walk\" or,\
    \ for example, something more complex like: \"play tennis\". These abilities would\
    \ be called methods in OOP.\n\n![](img/b2759e433f0c01f06c81587264f18acf_72_0.png)\n\
    \nIn object-oriented programming, such classes (e.g., our Jim) are used to develop\
    \ larger and more complex software programs, because classes are reusable in OOP.\n\
    \nFor the sake of clarity, what we discussed in the previous paragraph can be\
    \ summarized again as follows:\n\n### Class\n\nSo to speak, the generic term for\
    \ our objects. For example, a car would be called a class. The concrete car model\
    \ with its own chassis number and associated specific individual equipment of\
    \ a brand, on the other hand, would be an object.\n\n### Object\n\nInstances of\
    \ classes created with specially defined data. For example, a concrete car model\
    \ of a brand with specific chassis number (or individual equipment).\n\n### Method\
    \ (= function)\n\nFunctions defined within classes (car) that describe the behavior\
    \ or functionality of an object (specific car model). So e.g. \"driving\", \"\
    flashing\", \"honking\".\n\n### Attribute (= property)\n\nAttributes reflect the\
    \ state or properties of an object. The totality of attributes (the color of a\
    \ car, or the number of doors) make an object (specific car model), which is subject\
    \ to a common class (automobile), unique.\n\nIn the next section we would like\
    \ to look at object-oriented programming in the practical way of working.\n\n\
    ### 9.1 Classes\n\nAs we discussed in the previous chapter, a Python class can\
    \ be defined as an umbrella term from which objects are created. Most importantly,\
    \ a class allows you to bundle data and functionality.\n\nDefining a class creates\
    \ a new object of a particular class type that can be used to create instances\
    \ that inherit the properties of the same class. A class creates a user-defined\
    \ data structure that contains its own data elements and member functions. This\
    \ data and functions can be accessed by creating an instance of this class.\n\n\
    Important rules related to classes in Python are:\n\n- 1) Classes are created\
    \ with the **class** keyword.\n- 2) Variables that belong to classes are called\
    \ **attributes**.\n- 3) Attributes are global, i.e. they can be accessed with\
    \ the dot operator \".\" operator.\n\nFor example, for *Myclass.Myattribute*,\
    \ \"Myclass\" would be the name of the class and \"Myattribute\" would be the\
    \ name of the attribute.\n\n### 9.2 The definition of a class\n\nThe definition\
    \ of a class is very simple and runs in a similar - but different - way to functions.\
    \ You don't use **def** here, but **class**, followed by the class name and a\
    \ colon. Here, for example, the class object \"cars\" is defined:\n\n```\n# demonstrate\
    \ defining a class\n\nclass cars:\n    pass\n```\n\n### 9.3 Objects of a class\n\
    \nAs we already know, an object can be defined as a child instance of a particular\
    \ class. This means that an object is an entity with a unique set of attributes\
    \ (properties) of that class.\n\nThe **state** of an object is represented by\
    \ its attributes (object properties: \"red\", \"large\").\n\nThe **behavior**\
    \ of an object is represented by its methods (functions like \"blink\", \"honk\"\
    ). It also reflects the reaction of an object to other objects.\n\nThe **identity**\
    \ of an object is determined by a unique name (e.g. \"Jim\") and allows an object\
    \ to interact with other objects.\n\n### 9.4 Declaring / Instantiating objects\n\
    \nWhen a particular object (e.g. \"Jim\") of a class (e.g. \"Human\") is created,\
    \ it is called instantiation. All instances of a certain class have the same attributes\
    \ (\"color:\", \"size:\") and the behavior of the class. However, the respective\
    \ individual values of the attributes (\"Color: **red**\", \"Size: **large**\"\
    ) make each object unique.\n\nA single class can have any number of instances\
    \ (individual objects).\n\nIn Python, an object can be defined, or rather instantiated,\
    \ simply as follows.\n\nExample:\n\n```\nclass cars:\n    print(\"An object has\
    \ been created from class called 'cars'\")\n\nobject1=cars()\n```\n\nOutput:\n\
    \n```\nAn object has been created from class called 'cars'\n>>> |\n```\n\n###\
    \ The keyword \"self\"\n\nClass methods have an additional first parameter called\
    \ \"self\" in the method definition. When calling the method, it is not necessary\
    \ to specify an argument or a value. To understand this better, let's look at\
    \ the following scenario:\n\nSuppose a class **myclass** has an object called\
