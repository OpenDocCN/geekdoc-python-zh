    ## Closing words


    ## 1 Why Python?


    Before we start with the basics of programming, in this first chapter we will
    take a look at why our decision to use Python was right and whether it is worth
    learning a programming language. Python is one of the most popular programming
    languages of our time. Why? On the one hand, because Python is very user-friendly
    and very easy to learn, and on the other hand, because the Python programming
    language has a wide range of functions that can be used not only for simple use
    cases, but also for complex ones. Let''s take a look at a few more aspects and
    advantages of Python, so that we can make sure that Python brings us the best
    start in programming.


    ## Open Source


    Python is an open-source programming language that thrives and grows on community
    support and contributions. The term open source is generally characterized by
    the fact that the software is freely available, active user participation is desired,
    and there are no restrictions on use. You can download the official Python software
    IDLE ("Interactive Development Environment") for free from the Python website.
    We will look at how this works in detail in a moment.


    ## Availability of Libraries


    Python has a very large number of additional libraries. What are libraries? A
    library represents an extension that allows us to quickly and easily implement
    additional functions or code. It is basically nothing more than code that has
    already been written by developers in the community. Most libraries can be found
    on platforms like GitHub (github.com) or Stackoverflow (stackoverflow.com). These
    websites are a kind of administrative platform / developer community for software
    development. If there are many libraries to choose from, this has the great advantage
    that beginners or even advanced users do not have to develop every single function
    from scratch. Since some (e.g. basic) functions are needed again and again and
    this also usually by other users, often someone already took care of the development
    of the code for a function and made this available. By already developed packages
    and modules one can use and/or implement this function then directly. Thus one
    can concentrate on the actual code and/or the actual function of a program. In
    a figurative sense, you could compare this to a car ride. You can get directly
    into a car and use components such as steering wheel, accelerator pedal, or air
    conditioning for the actual journey and do not have to construct the car for it
    or create individual functions.


    ## Readability


    Python can be read very well - even by beginners. This programming language is
    not quite as abstract as some others, where a beginner trying to read the programming
    language does not understand anything at first. This means even a beginner can
    easily understand the functionality of the Python program to some extent. This
    is also helped by the fact that Python uses simple indentations for separation
    instead of semicolons (which is the case with other programming languages like
    C, for example), which makes the Python program code look very structured compared
    to other programming languages.


    ## Object-oriented and functional programming


    Python supports object-oriented programming. We will look at what object-oriented
    programming is in detail in a later chapter. For now, let''s just say that object-oriented
    programming reduces the complexity of larger programs and makes them much easier
    to work with.


    However, Python not only supports object-oriented programming, but functional
    programming can also be used, which is built on the use of functions. We will
    also look at functions in a later chapter.


    ## Platform-independent


    The final argument in favor of learning Python is that it is a platform-independent
    programming language, which means that the developer can write a Python program
    in any interactive development environment and run it on different operating systems
    such as Microsoft Windows, Mac, or Linux.


    In the next chapter we will first set up the Python environment and then start
    programming in the chapter after next. Let''s go!


    ## 2 Setting up the Python environment on Windows


    In Windows, the Python development environment is not included by default. Therefore
    we have to install this so-called **IDLE** first. With Mac or Linux, Python is
    already pre-installed from certain versions and can be used immediately. With
    Linux, for example, it is sufficient to enter the command Python3 in the Linux
    terminal to open it. However, setting up the Python programming environment on
    Windows is also very simple and is explained step by step below. It is recommended
    to use the official Python development environment IDLE (Interactive Development
    Environment).


    **Step 1: Download Python executable installer**


    Download the desired version, preferably the latest version, of the Python installer
    from the official Python website:


    [https://www.python.org/downloads/windows](https://www.python.org/downloads/windows)


    Select the correct "Windows Installer" file in the "Stable Releases" section.


