    # 5.3.8 Arithmetic operators


    Arithmetic operators are used in almost all programming languages. By the way,
    this name sounds more complicated than the thing is, because these are simply
    the symbols known from simple mathematics (i.e. "+" for the sum of two numbers,
    "*" for the multiplication of two numbers, etc.). In Python, there are the following
    arithmetic operators that can be used to perform mathematical operations:


    +   1) For the addition +, e.g. x+y

    2) For the subtraction -, e.g. x-y

    3) For the multiplication *, e.g. x*y

    4) For the division /, e.g. x/y

    5) For the remainder of a division (modulo) %, e.g. x%y

    6) For exponentiation **, e.g. x**y

    7) For the smallest possible integer in the division (floor division) //, e.g.
