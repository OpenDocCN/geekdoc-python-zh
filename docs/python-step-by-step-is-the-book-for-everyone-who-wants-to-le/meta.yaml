    \ 中其他重要的基础知识\n\n### 8.1 用户输入文本的可能性\n\nPython 环境也支持获取用户输入。也就是说，用户可以以字母和数字的形式进行输入。程序可以设计成根据用户输入做出决策，或根据输入以特定方式运行。你可以直接在\
