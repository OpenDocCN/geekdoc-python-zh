- md: "![](img/b2759e433f0c01f06c81587264f18acf_84_0.png)\n\n## 10.2.3 Check button\
    \ widget (selection button)\n\nWith the help of a check button widget, the user\
    \ of the program can select one or more options from given choices.\n\nYou can\
    \ create such a selection button using the following statement and syntax:\n\n\
    ```\nw = Checkbutton ( master, option, ... )\n```\n\nThe parameters *master* and\
    \ *option* are to be understood here as in the previous sections. Probably the\
    \ most commonly used options / properties of buttons in this case are:\n\n| Option\
    \ | Description |\n| :--- | :--- |\n| **command** | Function call when the user\
    \ selects or deselects a checkbutton |\n| **bd** | Width of the border in pixels\
    \ (2 by default) |\n| **bg** | Background color |\n| **activebackground** | Background\
    \ color when the mouse cursor is on the button |\n\n### Methods or functions for\
    \ selection buttons:\n\nWhen dealing with selection button elements, there are\
    \ the following commonly used methods:\n\n- 1) **select()**\nThis method can be\
    \ used to check if the button is selected or checked.\n\n- 2) **deselect()**\n\
    This method causes the button to be deselected if it was selected.\n\n- 3) **flash()**\n\
    In this method, the button flashes back and forth between the active and normal\
    \ state colors several times, so that the button attracts the user's attention.\n\
    \n- 4) **invoke()**\nThis method calls the callback function of the button and\
    \ returns what the function should perform. If there is no callback for the button,\
    \ no action is performed.\n\n- 5) **toggle()**\nThis method can be used to toggle\
    \ the status of the Select button. (e.g : Delete if selected or Select if not\
    \ selected).\n\nLet's take a look at this, too, with the help of an example:\n\
    \n### Example:\n\n```\nfrom tkinter import *\nimport tkinter.messagebox\nimport\
    \ tkinter\n\ntop = tkinter.Tk()\nCheckVar1 = IntVar()\nCheckVar2 = IntVar()\n\
