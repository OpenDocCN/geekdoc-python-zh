- md: "If you remember, your **car_A** is a 2021 Tesla Model S Sedan. You ran the\
    \ **door_change** method above, which changed it, so it was no longer a Sedan.\
    \ This is just one example of how objects can use methods. Methods give objects\
    \ functions that act as behaviors.\n\n## Q&A Review\n\n1. You can think of a class,\
    \ as a *blueprint*\n    - True\n    - False\n\n2. An object is an instance of\
    \ a class\n    - True\n    - False\n\n## Day 12 Challenges\n\n- Kilobyte Challenge:\
    \ Create a Book class and create a Book object.\n\n## Day 13: Requests Library\n\
    \n*Reading Time: 7 minutes*\n\nThe requests library allows you to send and receive\
    \ data to and from web servers. By now, you should be getting more familiar with\
    \ installing third-party libraries. You’re going to use pip to install the requests\
    \ library, as you have done with other libraries previously.\n\nThe requests library\
    \ allows you to send HyperText Transfer Protocol (HTTP) data. You probably recognize\
    \ HTTP. Where have you seen it before? When you type in a Uniform Resource Locator\
    \ (URL) in your web browser, you have seen it. For example ([https://nerdchallenges.com](https://nerdchallenges.com)),\
    \ the HTTP protocol allows web browsers and other applications to send data back\
    \ and forth over the internet. HTTP is a protocol that defines how web servers\
    \ and browsers send data back and forth.\n\nBefore you begin installing the requests\
    \ library and learn how to use it, you will first learn about HTTP Methods and\
    \ HTTP Response codes.\n\n## HTTP Methods\n\nHTTP Methods are methods that allow\
    \ you to send and receive data from a web server. There are four primary methods\
    \ that you will be using:\n\n- GET\n- POST\n- PUT\n- DELETE\n\nThe GET method\
    \ allows you to request data from a web server, so a GET request is sent whenever\
    \ you want data from a web server or website. For example, when you go to [https://nerdchallenges.com](https://nerdchallenges.com),\
    \ your web browser will send a GET request to the Nerd Challenges web server.\n\
    \nThe POST method allows you to create a new record on a server. In other words,\
    \ this is for sending data to a web server. It is a way to create data on the\
    \ webserver. For example, you are ordering a pizza from your favorite pizza restaurant,\
    \ and you go to their website, you add your pizza to the cart, and you checkout.\
    \ When you checkout, which sends a POST request to the server to create a *new*\
    \ order, the pizza restaurant’s web server will add the order to their database,\
    \ and they’ll begin making your pizza. The POST request is for adding brand-new\
    \ data to a web server.\n\nThe PUT method is similar to the POST method because\
    \ it adds data to a server; however, it is used when you are *overwriting* data\
    \ with new values but not creating a new record. For example, pretend you have\
    \ a nail salon, and in your web application, you have a list of appointments for\
    \ your customers for the day. Jane, your customer, has an appointment for Tuesday\
    \ at 4:00 PM, and Jane updates the appointment to Thursday at 5:00 PM. The previous\
    \ scenario would be a PUT request because Jane already had a record created for\
    \ an appointment and simply wanted to overwrite that data with new data.\n\nThe\
    \ DELETE method removes data from the webserver or application. Continuing with\
    \ the nail salon example, Jane now wants to remove her appointment entirely. Jane\
    \ can send a DELETE request to the webserver to remove her appointment.\n\nThere\
    \ are many more HTTP Methods, but these are the primary four used in almost every\
    \ application. To see a list of all the HTTP methods, you can visit this website:\n\
    https://developer.mozilla.org/en-US/docs/Web/HTTP/Methods\n\n## HTTP Response\
    \ Status Codes\n\nAn HTTP response status codes tell you whether or not the webserver\
    \ or application has successfully processed an HTTP request. There are many status\
    \ codes, but I want to cover three primary ones that you will likely see when\
    \ you create your applications.\n\n- 200\n- 201\n- 404\n\n200 is OK. This means\
    \ that the web server has received the data you have sent or sent data that you\
    \ asked for, depending on the type of request sent. In essence, it means that\
    \ everything worked successfully.\n\n201 is Created. This is typically sent after\
    \ you send data to a server with perhaps a POST or PUT request. It tells you that\
    \ the record or data has been created and processed.\n\n404 is Not Found. This\
    \ one you’ve likely seen already when you’re browsing a website or an application.\
    \ It means that the resource you have asked for is not located at the location\
    \ you have specified. This typically means the website owner has moved the page\
    \ to another place or taken down the page altogether.\n\n## Installing requests\n\
    \nTo install the requests, you follow the same process you have for other libraries.\n\
    \n```\npip install requests\n```\n\nCongratulations, you have now installed requests!\n\
    \n## Sending your first GET request\n\nTo send your first GET request, you will\
