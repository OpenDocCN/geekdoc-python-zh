- md: "## Q&A Review\n\n1. What type of statement in Python can be used to make a\
    \ decision?\n\n    - 1. operators\n    - 2. if-else statements\n    - 3. print\
    \ statements\n    - 4. data types\n\n2. Suppose you have the below code block\
    \ and it is executed, what will you see on the terminal?\n\n```python\nrider_age\
    \ = 13\nage_limit = 16\nif rider_age >= age_limit:\n    print(\"Congrats! You\
    \ are old enough to go on this ride!\")\n```\n\n    - 1. Congrats! You are old\
    \ enough to go on this ride!\n    - 2. Nothing will be outputted\n    - 3. Sorry!\
    \ You are not old enough to go on this ride\n    - 4. Invalid, the variables supplied\
    \ are not valid.\n\n3. In order to use an `if` statement, you must also use an\
    \ else.\n\n    - 1. True\n    - 2. False\n\n* * *\n\n## Day 5 Challenges\n\n-\
    \ Kilobyte Challenge: Ask a user if they would like to double or triple a number.\
    \ Then ask for their number. Then double or triple it based on their previous\
    \ selection.\n\n## Day 6: Try-Exceptions\n\nReading Time: 6 minutes\n\nA part\
    \ of programming is learning how to handle exceptions and errors. An error within\
    \ the code or even input received by a user can render a program useless. Useless\
    \ meaning that the entire program crashes, and you are left looking at an error\
    \ message. Not all errors should be considered critical enough to stop the entire\
    \ program from working.\n\n## Try and Except Blocks\n\n**Try, except, and finally,\
    \ blocks** can help you manage these errors. Errors usually help us as programmers\
    \ figure out where there are issues in code. Users generally do not care to see\
    \ this additional information about program errors. A simple one-line with the\
    \ error might be sufficient enough and does not distract a user from proceeding\
    \ with running the program.\n\nWithin the try block, you can test a block of code\
    \ to see if it has any errors. If it does not, the code executes as normal. However,\
    \ if there is an error, an except block handles the error. This block is sometimes\
    \ referred to as an exception. Lastly, there is a finally block that will execute\
    \ code independent of whether there is an error or not within the try-except blocks.\n\
    \nA standard calculator gives us the ability to conduct almost every type of math\
    \ operation you can think of. I say almost because if you try to divide any number\
    \ by zero on a calculator, you most definitely will receive an error such as “Cannot\
    \ divide by zero”. If you don’t believe me, go ahead and try for yourself.\n\n\
    The same goes for math operations in Python code. A Python program, too, would\
    \ not be able to execute code that tries to divide a number by zero.\n\nYou can\
    \ always just ensure the code you write doesn’t have a number that is being divided\
    \ by zero. This seems fine, but often a program is interactive and will ask for\
    \ input from a user. If a user inputs a number for division by zero, the program\
    \ will execute it and immediately stop with an error message printed out. Try\
    \ for yourself to divide a number by zero to see the results:\n\n```python\nresult\
    \ = 5/0\nprint(result)\n```\n\n*Result: Traceback (most recent call last)*\n*result\
    \ = 5/0. ZeroDivisionError: division by zero*\n\nThe number **5** clearly cannot\
    \ be divided by the number **0**. The error message below stopped the program\
    \ while trying to execute that line of code. The error message also indicates\
    \ the type of error which occurred. Trying to divide by zero yielded a *ZeroDivisionError*,\
    \ so no code after the program stopped was able to execute. You just broke the\
    \ program. Thankfully you are learning to use try-except blocks so this won't\
    \ happen again!\n\nAdding a *try-except* allows you to handle an error such as\
    \ dividing by zero. This time add a try block to try dividing 5 by zero, then\
    \ printing. For except block, you can write an exception that prints out the reason\
    \ for the error:\n\n```python\ntry:\n    result = 5/0\n    print(result)\nexcept\
    \ Exception:\n    print(\"Cannot divide by zero\")\n```\n\n*Result: Cannot divide\
    \ by zero*\n\nThe output of the program looks better than what was received before.\
    \ The program still has an error, but the program was still able to execute all\
    \ of its code without any issues. The output provided the user with the reason\
    \ why there was an error within the code. The error message printed out is very\
    \ generic. Also, important to note is that any kind of error in the code will\
    \ give us the result. What if you just tried printing out a variable that has\
    \ not yet been assigned a value in the same try-except blocks?\n\n```python\n\
    try:\n    print(unknown_variable)\nexcept Exception:\n    print(\"Cannot divide\
    \ by zero\")\n```\n\n**Result:** *Cannot divide by zero*\n\nThat output is not\
    \ even close to what you should be expecting. It has the wrong error message.\
    \ The code is not dividing any numbers by zero. It should be saying something\
    \ to the effect of a lousy variable or variable not found. I just did this to\
    \ show you that the except block will consider any errors found in the try block\
    \ as a general error if the except is an **Exception**. This is why it is necessary\
    \ to be specific with the types of error rather than using the generic Exception.\n\
    \nThere are a lot of possible types of errors. Navigate to the website: https://docs.python.org/3/library/exceptions.html\
    \ for a list of all the errors which you could encounter. *NameError* is the exception\
    \ needed for a missing or unassigned value to a variable:\n\n```python\ntry:\n\
    \    print(unknown_variable)\nexcept NameError as error:\n    print(error)\n```\n\
    \n**Result:** name ‘unknown_variable’ is not defined\n\nNow the exception is **NameError**,\
    \ and the error for that error type is being printed out. This is how you should\
    \ be writing your try-except blocks. Some scenarios could require multiple exceptions:\n\
    \n```python\ntry:\n    result = 5 / 0\n    print(result)\nexcept NameError as\
    \ error:\n    print(error)\nexcept ZeroDivisionError as error:\n    print(error)\n\
    ```\n\n*Result: division by zero*\n\nIn this case, the exception is a **ZeroDivisionError**.\
    \ The program did, however, first check if there were any **NameError** exceptions\
    \ first. If the result variable was not assigned a variable, it would have resulted\
    \ in a **NameError** exception. There is no need to print out a custom error message\
    \ when you know the error type to look for. The *as error* code helps you better\
    \ illustrate the error. The generic exception can still be used to print out error\
    \ messages even if you do not know the specific error. Back to our initial example\
    \ using the *as error* to print out a message for the first error caught by the\
    \ program:\n\n```python\ntry:\n    result = 5/0\n    print(result)\nexcept Exception\
    \ as error:\n    print(error)\n```\n\n*Result: division by zero*\n\nThe code above\
    \ was able to catch the exception and print out the standardized message associated\
    \ with the error type. Try to be specific with your exceptions. If not, there\
    \ is always the generic Exception class. You haven’t learned about classes yet,\
    \ but I will cover this topic later on in the book.\n\n## Else Clauses and Finally\n\
    \nThe **else clause** can be added to the previous code to execute more instructions\
    \ after an exception is not found. Using the ZeroDivisionError example, you should\
    \ print the result only if the exception isn’t caught. For that to happen, divide\
    \ the result by 1 instead of 0 and add an else clause to print the result:\n\n\
    ```python\ntry:\n    result = 5/1\nexcept Exception as error:\n    print(error)\n\
    else:\n    print(result)\n```\n\n*Result: 5.0*\n\nNo exception was caught, so\
    \ the program printed out the result from the else clause. If you wanted code\
    \ to execute regardless of whether or not an exception was caught, you could add\
    \ *finally* to the end of the code. *Finally*, will always execute without taking\
    \ into consideration exceptions or errors:\n\n```python\ntry:\n    result = 5/0\n\
    except Exception as error:\n    print(error)\nelse:\n    print(result)\nfinally:\n\
    \    print(\"This program runs even if exceptions occur.\")\n```\n\n*Result: division\
    \ by zero. This program runs even if exceptions occur.*\n\n## Raise\n\nExceptions\
    \ are caught when a block of code within try-except is executed. The Python interpreter\
    \ automatically catches this upon execution. There is a way for us to **raise**\
    \ an exception manually. You can include a raise exception in the try block to\
    \ manually trigger the exception. We will take our 5/1 example and manually raise\
    \ the exception. This example normally wouldn't throw one because 5 can easily\
    \ be divided by 1. I said normally, but this time, I include a raised exception:\n\
    \n```python\ntry:\n    result = 5/1\n    raise Exception\nexcept Exception:\n\
    ```"
