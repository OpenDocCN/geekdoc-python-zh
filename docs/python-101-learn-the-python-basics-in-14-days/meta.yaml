    ## 第二天：探索数据类型


    *阅读时间：15分钟*


    在本章中，你将更深入地了解数据类型和运算符。我将带你踏上在上一章所学概念基础上构建的旅程。你将接触到的数据类型包括列表、元组、集合和字典。这些在许多其他编程语言中也能找到。然后我将讨论类型转换，这将允许我们将一种数据类型的值转换为另一种。接着是学习两种称为隐式和显式类型转换的转换类型。阅读完第3章后，你将能够非常自如地使用Python编写代码。


    ## 列表


    列表是Python中最常用的数据类型之一。它们为我们提供了组织项目和跟踪不同数据类型的能力。通常，列表包含一组相关的值。列表也不限于一种数据类型。你可以有一个包含字符串、数字、另一个列表、元组、布尔值甚至二进制数据组合的列表。


    你可以使用方括号 `[ ]` 来创建一个列表。你将任何数据类型的变量或元素放在这些方括号内。你将列表保存在一个变量中，就像保存任何其他数据类型一样。让我们继续创建我们的第一个列表，我将其保存在一个名为
    **genius_name** 的变量中。我们可以赋值 **geek_names = ["Nikola", "Tesla", "Thomas", "Edison"]**。注意所有数据类型都是字符串。然而，数据类型不必如此。我可以在这个列表中包含数字。我将添加数字100来展示这一点。所以
    **geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]**。让我们像打印任何其他变量一样打印出来看看结果：


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names)

    ```


    *结果：* [''Nikola'', ''Tesla'', 100, ''Thomas'', ''Edison'']


    看，这就是你在Python中创建的第一个列表！


    ## 列表索引


    列表中的项目是索引的，这意味着每个项目都处于一个有序的位置。任何列表中的第一个项目是 *索引[0]*，而不是 *索引[1]*。理解任何列表中的第一个项目都在
    *索引[0]* 是很重要的！在我刚刚创建的列表中，**''Nikola''** 在位置0，**''Tesla''** 在位置1，依此类推。列表中的项目是有序的、可更改的，并且允许有重复项。


    在示例中，我打印了整个 **geek_names** 列表。有时打印整个项目列表是有益的。然而，你可能想从一个广泛的项目列表中选择一个项目。这就是你索引知识派上用场的地方。如果你想打印列表中的第4个项目，也就是第3个索引，你该怎么做？实际上很简单。你打印带有方括号的变量，包括你想打印的索引。让我们看看索引的实际应用：


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[3])

    ```


    *结果：Thomas*


    看到了吗？我能够从列表中选择一个项目并打印出来。继续尝试使用它们的索引打印列表中的其他项目。但如果你想打印最后一个项目或倒数第二个项目呢？使用之前的方法，你必须计算列表中的所有项目。让我们不要花所有时间来计算列表中的每一个项目。任何列表中的最后一个项目是
    *索引[-1]*。要打印 **geek_names** 列表中的最后一个项目，你可以使用另一个带有 *索引[-1]* 的 `print` 语句。


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[-1])

    ```


    结果：Edison


    如果我决定打印倒数第二个项目，我可以简单地将 *索引[-1]* 替换为 *索引[-2]*。有时也需要知道列表中的项目数量。这就是函数 *len()* 派上用场的地方。你可以使用这个函数来确定列表的长度或项目数量。要找出
    **geek_names** 的长度，我可以这样做：


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(len(geek_names))

    ```


    结果：5


    数字5是 **geek_names** 列表中的项目总数。现在你知道了长度，你可以使用变量前的 `[X:Y]` 来选择一系列项目。**X** 是第一个索引，**Y**
    是最后一个索引。当你选择一系列项目时，最后一个数字或 **Y** 不会被返回。现在让我们打印列表，除了最后一个项目 "Edison"。


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[0:4])

    ```


    结果：[''Nikola'', ''Tesla'', 100, ''Thomas'']


    如果你想一直到最后并打印出Edison，你可以简单地将 **[0:4]** 替换为 **[0:5]**。这看起来很简单，但你可能不知道长度或不想查找列表的长度。另外，想想如果列表发生变化会发生什么。例如，你总是可以向列表中添加或删除项目。硬编码一个数字来打印可能不是最好的选择。一个更合适的选择是使用
    `[X:]` 或者对于这个特定情况使用 `[0:]`。


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[0:])

    ```


    结果：[''Nikola'', ''Tesla'', 100, ''Thomas'', ''Edison'']


    好的，现在让我们快速地从 "Tesla" 打印到 "Thomas" 进行一些额外的练习。代码如下：


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[1:4])

    ```


    结果：[''Tesla'', 100, ''Thomas'']


    现在我不喜欢这个列表中有一个数字。它看起来格格不入，因为它是唯一的数值。我们如何将该数字数据类型更改为与其他项目类似的字符串呢？我可以这样做，因为我们知道数字
    **100** 的索引。


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    geek_names[2] = "Einstein"

    print(geek_names)

    ```


    *结果：* [''Nikola'', ''Tesla'', ''Einstein'', ''Thomas'', ''Edison'']


    你已经将数字 **100** 替换为 **"Einstein"**。爱因斯坦现在是 **geek_names** 列表的 *索引*[2]。你只需知道索引就可以替换列表中的任何其他项目。正如我之前所说，你可以在列表中添加任何你想要的数据类型。'
