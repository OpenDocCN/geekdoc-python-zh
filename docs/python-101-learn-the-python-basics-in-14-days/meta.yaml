    - This is a trick question! It’s whatever I like the best, for my personal reasons.


    3. What is a variable?


    - A variable is code that changes over time by itself, throughout the life of
    an application.

    - There are no variables in Python, only integers. This is a trick question.

    - A variable allows you to reference data by specifying a property, you can later
    reference that property in your application. For example my_name = “Casey” would
    be a variable.


    4. How do you print something to the terminal window in Python 3?


