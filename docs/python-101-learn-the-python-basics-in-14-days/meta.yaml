    \n第一版\n\nISBN: 978-1-7374537-1-0\n\n本书由 Reedsy 专业排版\n\n了解更多请访问 [reesy.com](https://reesy.com)\n\
    \n献给所有鼓励我们撰写本书的家人、朋友和同事，我们希望本书能成为你实现目标的垫脚石。\n\n# 目录\n\n- 前言\n- 序言\n    - 这本书适合你吗？\n\
    \    - 解决方案代码\n    - 书籍安排\n    - 阅读时间\n    - 代码片段和重要术语\n        - 代码示例\n     \
    \   - 带注释的代码示例\n        - 终端输出\n- 其他资源\n- 致谢\n- 勘误 / 联系我们\n- 反馈与评论\n- 引言\n   \
    \ - 什么是Python？\n    - 为什么选择Python？\n    - 优点\n    - 缺点\n    - 何时不使用Python\n  \
    \  - 你能用Python构建什么？\n\n# 1. 第1天：安装Python、变量和注释\n\n- Python安装\n    - 在Windows上安装Python\n\
    \    - 在macOS上安装Python\n    - 在Linux上安装Python（特别是Ubuntu 20.04）\n- PyCharm安装\n\
    \    - 在Windows上安装PyCharm\n    - 在macOS上安装PyCharm\n    - 在Linux上安装PyCharm\n- 关于IDE的说明\n\
    - Hello World!\n- Python变量简介\n    - 理解变量\n    - 变量命名\n    - 数据类型\n    - Print语句\n\
    - 注释简介\n- 问答回顾\n- 第1天挑战\n\n# 2. 第2天：探索数据类型\n\n- 列表\n- 元组\n- 集合\n- 字典\n- 类型转换\n\
    \    - 隐式类型转换\n    - 显式类型转换\n- 问答回顾\n- 第2天挑战\n\n# 3. 第3天：运算符\n\n- 算术运算符\n- 赋值运算符\n\
    - 位运算符\n- 比较运算符\n- 身份运算符\n- 逻辑运算符\n- 成员运算符\n- 问答回顾\n- 第3天挑战\n\n# 4. 第4天：用户交互\n\
    \n- 问答回顾\n- 第4天挑战\n\n# 5. 第5天：If-Else语句、While和For循环\n\n- If-Else语句\n- While循环\n\
    - For循环\n- 问答回顾\n- 第5天挑战\n\n# 6. 第6天：Try-异常处理\n\n- Try和Except块\n- Else子句和Finally\n\
    - Raise\n- 问答回顾\n- 第6天挑战\n\n# 7. 第7天：极客挑战1\n\n- 第1部分：实现总体要求\n- 第2部分：设置计算器\n- 解决方案\n\
    \n# 8. 第8天：函数\n\n- 内置函数\n- 用户自定义函数\n    - 创建函数\n    - 使用用户自定义函数\n- 问答回顾\n- 第8天挑战\n\
    \n# 9. 第9天：模块与包\n\n- 环境设置\n- 模块\n    - 导入模块\n    - 创建模块\n    - Python社区模块\n  \
    \  - Python pip（包管理器）\n    - 安装社区模块\n- 使用PySimpleGUI包\n- 问答回顾\n- 第9天挑战\n\n# 10.\
    \ 第10天：文件操作\n\n- 读取文件\n- 访问模式\n- 追加到文件\n    - 将一个文件追加到另一个文件\n- 写入\n- 创建文件\n- 删除文件\n\
    - 删除文件夹/目录\n- 问答回顾\n- 第10天挑战\n\n# 11. 第11天：调试\n\n- 断点\n- 运行调试器\n- 监视器\n    - 添加监视器\n\
    - 单步执行代码\n    - 单步跳过\n    - 单步进入\n    - 单步进入我的代码\n    - 单步跳出\n- 停止调试器\n- 问答回顾\n\
    - 极客挑战2：调试文件\n    - 有错误的文件：`day-11-nerd-challenge.py`\n    - 解决方案\n    - 解决方案文件：`day-11-nerd-challenge-solution.py`\n\
    \n# 12. 第12天：类和对象\n\n- Python类\n- 对象\n- 构造类\n- 方法\n- 问答回顾\n- 第12天挑战\n\n# 13. 第13天：Requests库\n\
    \n- HTTP方法\n- HTTP响应状态码\n- 安装requests\n- 发送你的第一个GET请求\n- 发送你的第一个POST请求\n- 再次发送你的第一个GET请求\n\
    - 这次是真正的第一个POST请求\n- 删除你的博客文章\n- 第13天回顾\n- 问答回顾\n- 第13天挑战\n\n# 14. 第14天：极客挑战3\
    \ - 高级GUI计算器\n\n- 导入模块\n- 程序问候\n- 设计布局\n- 窗口\n- 事件循环\n- 结论\n\n# 15. 第15天：奖励日 -\
    \ 使用GatsbyJS构建网站\n\n- 设置你的环境\n    - 安装VS Code\n        - Windows设置\n        -\
    \ MacOS设置\n        - Linux设置\n    - 安装Curl\n        - Windows设置\n        - MacOS设置\n\
    \        - Linux设置\n    - 安装git（如果是MacOS则包括Homebrew）\n        - Windows设置\n  \
    \      - MacOS设置\n        - Linux设置\n    - 安装Node.js\n        - Windows设置\n  \
    \      - 你应该看到类似以下的内容\n        - MacOS设置\n        - Linux设置\n    - 安装Gatsby CLI\n\
    - 使用GatsbyJS v4的Hello World\n    - 更新主页\n    - 创建新链接\n    - 问答回顾\n\n# 第15天挑战\n\
    \n玩得很开心！\n\n# 问答答案\n\n- 第1天 - 安装Python答案\n- 第2天 - 数据类型\n- 第3天 - 运算符\n- 第4天 - 用户交互\n\
    - 第5天 - If-Else语句\n- 第6天 - Try-异常处理\n- 第8天 - 函数\n- 第9天 - 模块与包\n- 第10天 - 文件操作\n\
    - 第11天 - 调试\n- 第12天 - 类和对象\n- 第13天 - Requests库\n- 第15天 - 奖励日 - 构建"
