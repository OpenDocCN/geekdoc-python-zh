- md: "using only one function in a module. To import just a function in a module,\
    \ use the syntax *from import*. Say you want to use only the add function from\
    \ the **operator** module. Instead of importing the entire **operator** module,\
    \ you would write **from operator import add** at the top of your code. Then you\
    \ can perform the same add function as before:\n\n```\nfrom operator import add\n\
    print(add(5,6))\n```\n\n*Result: 11*\n\nWith the code above, you imported the\
    \ add function. Also, note that you didn't have to specify the module when calling\
    \ the add function either. Okay, let's revert back to importing the entire module:\n\
    \n```\nimport operator\nprint(operator.add(5,6))\n```\n\nResult: 11\n\nThe reason\
    \ for reverting back is I wanted to show you how you could rename the module and\
    \ use the new name to call the function. Okay, instead of operator, let’s rename\
    \ the **operator** module to **ops**. To do that, simply write **import operator\
    \ as ops**. Now you’ll use ops to call the function:\n\n```\nimport operator as\
    \ ops\nprint(ops.add(5,6))\n```\n\nResult: 11\n\nYou receive the same result after\
    \ you rename your module. The only difference is you can use the new name to call\
    \ the operator’s functions. One last thing I forgot to mention is how to find\
    \ out what functions are defined within a module. The built-in function *dir()*\
    \ can be used to list all functions in a module:\n\n```\nimport math\nfunctions\
    \ = dir(math)\nprint(functions)\n```\n\n*Result:* [‘doc’, ‘loader’, ‘name’, ‘package’,\
    \ ‘spec’...]\n\nThe output displays the list in alphabetical order. As you can\
    \ see, the math module has a ton of functions defined. If you would like an easier\
    \ way to look at this list, consider using a for loop:\n\n```\nimport math\nfunctions\
    \ = dir(math)\nfor function in functions:\n    print(function)\n```\n\nResult:\
    \ [‘acos’, ‘asin’, ‘ceil’...]\n\n## Creating Modules\n\nI already discussed how\
    \ to import pre-existing modules. Not every module out there, however, fits the\
    \ use case for your program. If you'd like to create your own modules, that can\
    \ be done as well.\n\nRight-click your project folder on the left in the project\
    \ files pane, then click on New. Give your file the name **customModule** and\
    \ select the Python file option. This creates a file with the name **customModule.py**.\
    \ The suffix .py indicates that it is a module. Without the .py suffix, you would\
    \ not be allowed to import the module into your main program.\n\nOpen up your\
    \ new module. Type in the following code that prints thank you to a user for using\
    \ the custom module:\n\n```\ndef thanks(name):\n    print(\"Thank you \" + name\
    \ + \" for using this new module.\")\n```\n\nIf you run this module in the current\
    \ state, nothing is displayed because the function **thanks** have yet to be called.\
    \ Now navigate back over to your main.py file. Clear your screen with any leftover\
    \ code from the previous section.\n\nYour custom module can now be imported like\
    \ any other module. Import the module, then call the function with a name as a\
    \ parameter:\n\n```\nimport customModule\n\ncustomModule.thanks(\"Casey\")\n```\n\
    \nResult: Thank you Casey for using this new module.\n\nLook at that. You were\
    \ able to import and use the module you created. That was really neat.\n\n## Python\
    \ Community Modules\n\nPython is open-source with a community of developers and\
    \ supporters. This community of Python developers provides software and libraries\
    \ for everyone to use. Chances are, if you are trying to accomplish a task in\
    \ a program, someone has already done it. The community is great because you can\
    \ leverage code that has been written by another developer. There is a myriad\
    \ of non-standard modules available for use in your programs. Python Package Index\
    \ (PyPI) is the default repository where community Python packages can be found.\
    \ Try searching the [https://pypi.org/](https://pypi.org/) website to look at\
    \ some of the available packages.\n\nSo, what exactly is a package? A **package**\
    \ consists of all the necessary files required to use a module. You can install\
    \ packages from the Python package repository PyPI. In order to do this, you have\
    \ to ensure you have the package-management system known as pip installed. Pip\
    \ is the default Python package manager used to install, update, uninstall, and\
    \ manage software packages.\n\n## Python pip (Package Manager)\n\npip comes installed\
    \ on every version of Python after version 3.4. You can check to see if pip is\
    \ installed on your system. If you are running Microsoft Windows, go to the Start\
    \ Menu, type in CMD, and then hit enter on the keyboard. A command prompt should\
    \ appear. In the command prompt, type in **pip – version** and hit enter:\n\n\
    ![](img/94a1435e4acaf57ed4f2a785450910d2_296_0.png)\n\nAs you can see, I am running\
    \ version 21.1.2 of pip, and I’m also given the path where it is installed.\n\n\
    For Mac/Linux/Unix users, open up a terminal. Type in **python -m pip –version**,\
    \ then enter. This will show you the version of pip that is currently installed\
    \ on your system.\n\nIf pip is not installed on your system, navigate over to\
    \ [https://pip.pypa.io/en/stable/installing/](https://pip.pypa.io/en/stable/installing/).\
    \ There are directions on how to install pip on the appropriate operating system.\
    \ Chances are, at the time of reading this book, pip is already installed on your\
    \ system.\n\n## Installing Community Modules\n\nAfter verifying that your package\
    \ manager pip has been installed, you can now install community, 3rd party, or\
    \ external modules. There are tons of packages to choose from out there. The one\
    \ thing I haven’t talked too much about in this course is a Graphical User Interface\
    \ or GUI for short. Most applications use a GUI to allow users to interact with\
    \ the program easily. With that said, let’s install a GUI module that will allow\
    \ our programs to react like a more modern-day application.\n\nThe package you\
    \ are going to install is **PySimpleGUI**. In short, PySimpleGUI gives us the\
    \ ability to add graphics to your programs! Most people want some type of GUI\
    \ in their programs to make it more intuitive.\n\nAll right, let’s get on with\
    \ installing PySimpleGUI. I hope you are as excited as I am. Open up your command\
    \ prompt or terminal again. If you are using Windows, type in **pip install PySimpleGUI**\
    \ followed by enter. For Mac/Linux/Unix users, input the command **python3 -m\
    \ pip install PySimpleGUI** into your terminal followed by enter. After running\
    \ the command, it will start installing the PySimpleGUI package for you. The last\
    \ line should let you know that you have successfully installed the latest version\
    \ of PySimpleGUI.\n\n```\nC:\\Users\\chic0lindo>pip install PySimpleGUI\nCollecting\
    \ PySimpleGUI\n  Downloading PySimpleGUI-4.43.0-py3-none-any.whl (350 kB)\n  \
    \   |████████████████████████████| 350 kB 1.7 MB/s\nInstalling collected packages:\
    \ PySimpleGUI\nSuccessfully installed PySimpleGUI-4.43.0\n```\n\nIt’s just that\
    \ simple to download and install packages. In your command prompt, you can also\
    \ enter the command **pip freeze** to display all packages you’ve installed. Search\
    \ through [https://pypi.org/](https://pypi.org/) for any other packages you’d\
    \ like to install.\n\n## Using PySimpleGUI package\n\nCreate another python file\
    \ called **my_GUI.py**. Import the **PySimpleGUI** module. I'm going to do an\
    \ **import PySimpleGUI as sg**. So each time I call a function from PySimpleGUI,\
    \ the only thing I have to put prior to the function is **sg**. It just keeps\
    \ me from having to spell out PySimpleGUI each time I use the module. We will\
    \ be using sample code from the developer. Copy and paste the code below into\
    \ your my_GUI.py window:\n\n```\nimport PySimpleGUI as sg  # Part 1 - The import\n\
    \n# Define the window's contents\nlayout = [[sg.Text(\"What's your name?\")]],\
    \  #\nPart 2 - The Layout\n        [sg.Input()],\n        [sg.Button('Ok')]]\n\
    \n# Create the window\nwindow = sg.Window('Window Title', layout)  # Part 3 -\
    \ Window Definition\n\n# Display and interact with the Window\nevent, values =\
    \ window.read()  # Part 4 - Event loop or Window.read call\n\n# Do something with\
    \ the information gathered\nprint('Hello', values[0], '! Thanks for trying PySimpleGUI')\n\
    \n# Finish up by removing from the screen\nwindow.close()  # Part 5 - Close the\
    \ Window\n```\n\n# Result:\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_302_0.png)"
  mdcn: "仅使用模块中的一个函数。要导入模块中的某个函数，请使用 *from import* 语法。假设你想使用 **operator** 模块中的 add\
    \ 函数。你无需导入整个 **operator** 模块，只需在代码顶部写 **from operator import add**。然后你就可以像之前一样执行\
    \ add 函数：\n\n```\nfrom operator import add\nprint(add(5,6))\n```\n\n*结果：11*\n\n\
    通过上述代码，你导入了 add 函数。同时请注意，调用 add 函数时也不必指定模块名。好的，让我们恢复为导入整个模块：\n\n```\nimport operator\n\
    print(operator.add(5,6))\n```\n\n结果：11\n\n恢复的原因是我想向你展示如何重命名模块，并使用新名称调用函数。好的，我们不使用\
    \ operator，而是将 **operator** 模块重命名为 **ops**。为此，只需写 **import operator as ops**。现在你将使用\
    \ ops 来调用函数：\n\n```\nimport operator as ops\nprint(ops.add(5,6))\n```\n\n结果：11\n\
    \n重命名模块后，你会得到相同的结果。唯一的区别在于，你可以使用新名称来调用运算符的函数。最后我忘记提及的是如何查看模块中定义了哪些函数。内置函数 *dir()*\
    \ 可用于列出模块中的所有函数：\n\n```\nimport math\nfunctions = dir(math)\nprint(functions)\n\
    ```\n\n*结果：* [‘doc’, ‘loader’, ‘name’, ‘package’, ‘spec’...]\n\n输出按字母顺序显示列表。如你所见，math\
    \ 模块定义了大量函数。如果你想更方便地查看此列表，可以考虑使用 for 循环：\n\n```\nimport math\nfunctions = dir(math)\n\
    for function in functions:\n    print(function)\n```\n\n结果：[‘acos’, ‘asin’, ‘ceil’...]\n\
    \n## 创建模块\n\n我已经讨论了如何导入现有模块。然而，并非所有模块都适用于你的程序用例。如果你想创建自己的模块，这也是可以做到的。\n\n在左侧项目文件窗格中右键单击你的项目文件夹，然后点击新建。将文件命名为\
    \ **customModule** 并选择 Python 文件选项。这将创建一个名为 **customModule.py** 的文件。后缀 .py 表示它是一个模块。没有\
    \ .py 后缀，你将无法将该模块导入主程序。\n\n打开你的新模块。输入以下代码，该代码会向用户打印感谢信息，感谢其使用自定义模块：\n\n```\ndef\
    \ thanks(name):\n    print(\"Thank you \" + name + \" for using this new module.\"\
    )\n```\n\n如果你在当前状态下运行此模块，将不会显示任何内容，因为函数 **thanks** 尚未被调用。现在返回到你的 main.py 文件。清除屏幕上上一节遗留的任何代码。\n\
    \n你的自定义模块现在可以像任何其他模块一样被导入。导入该模块，然后使用一个名称作为参数调用该函数：\n\n```\nimport customModule\n\
    \ncustomModule.thanks(\"Casey\")\n```\n\n结果：Thank you Casey for using this new\
    \ module.\n\n看，你成功导入并使用了自己创建的模块。这真的很棒。\n\n## Python 社区模块\n\nPython 是开源的，拥有一个由开发者和支持者组成的社区。这个\
    \ Python 开发者社区为每个人提供软件和库。很可能，如果你想在程序中完成某项任务，已经有人做过了。这个社区很棒，因为你可以利用其他开发者编写的代码。有大量非标准模块可供你的程序使用。Python\
    \ 包索引 (PyPI) 是社区 Python 包的默认仓库。尝试在 [https://pypi.org/](https://pypi.org/) 网站上搜索，查看一些可用的包。\n\
    \n那么，到底什么是包？一个 **包** 包含了使用模块所需的所有必要文件。你可以从 Python 包仓库 PyPI 安装包。为此，你必须确保已安装名为 pip\
    \ 的包管理系统。Pip 是默认的 Python 包管理器，用于安装、更新、卸载和管理软件包。\n\n## Python pip（包管理器）\n\npip\
    \ 在 Python 3.4 之后的每个版本中都已预装。你可以检查你的系统上是否安装了 pip。如果你使用的是 Microsoft Windows，请转到开始菜单，输入\
    \ CMD，然后按键盘上的回车键。应该会出现一个命令提示符。在命令提示符中，输入 **pip – version** 并按回车：\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_296_0.png)\n\
    \n如你所见，我正在运行 pip 版本 21.1.2，并且还显示了它的安装路径。\n\n对于 Mac/Linux/Unix 用户，打开终端。输入 **python\
    \ -m pip –version**，然后按回车。这将显示你系统上当前安装的 pip 版本。\n\n如果 pip 未安装在你的系统上，请访问 [https://pip.pypa.io/en/stable/installing/](https://pip.pypa.io/en/stable/installing/)。那里有关于如何在相应操作系统上安装\
    \ pip 的说明。很可能，在阅读本书时，pip 已经安装在你的系统上了。\n\n## 安装社区模块\n\n验证你的包管理器 pip 已安装后，你现在可以安装社区、第三方或外部模块了。那里有成千上万的包可供选择。我在本课程中没有过多讨论的一点是图形用户界面，简称\
    \ GUI。大多数应用程序都使用 GUI，让用户可以轻松地与程序交互。话虽如此，让我们安装一个 GUI 模块，使我们的程序能够像更现代的应用程序一样运行。\n\
    \n你将要安装的包是 **PySimpleGUI**。简而言之，PySimpleGUI 让我们能够为你的程序添加图形界面！大多数人都希望他们的程序具有某种\
    \ GUI，使其更直观。\n\n好的，让我们开始安装 PySimpleGUI。我希望你和我一样兴奋。再次打开你的命令提示符或终端。如果你使用的是 Windows，输入\
    \ **pip install PySimpleGUI** 然后按回车。对于 Mac/Linux/Unix 用户，在终端中输入命令 **python3 -m\
    \ pip install PySimpleGUI** 然后按回车。运行命令后，它将开始为你安装 PySimpleGUI 包。最后一行应该会通知你已成功安装最新版本的\
    \ PySimpleGUI。\n\n```\nC:\\Users\\chic0lindo>pip install PySimpleGUI\nCollecting\
    \ PySimpleGUI\n  Downloading PySimpleGUI-4.43.0-py3-none-any.whl (350 kB)\n  \
    \   |████████████████████████████| 350 kB 1.7 MB/s\nInstalling collected packages:\
    \ PySimpleGUI\nSuccessfully installed PySimpleGUI-4.43.0\n```\n\n下载和安装包就是这么简单。在你的命令提示符中，你也可以输入命令\
    \ **pip freeze** 来显示你已安装的所有包。在 [https://pypi.org/](https://pypi.org/) 上搜索任何你想安装的其他包。\n\
    \n## 使用 PySimpleGUI 包\n\n创建另一个名为 **my_GUI.py** 的 Python 文件。导入 **PySimpleGUI**\
    \ 模块。我将使用 **import PySimpleGUI as sg**。这样每次我从 PySimpleGUI 调用函数时，只需在函数前加上 **sg**\
    \ 即可。这省去了我每次使用模块时都必须拼写 PySimpleGUI 的麻烦。我们将使用开发者提供的示例代码。将下面的代码复制并粘贴到你的 my_GUI.py\
    \ 窗口中：\n\n```\nimport PySimpleGUI as sg  # 第1部分 - 导入\n\n# 定义窗口内容\nlayout = [[sg.Text(\"\
    What's your name?\")]],  # 第2部分 - 布局\n        [sg.Input()],\n        [sg.Button('Ok')]]\n\
    \n# 创建窗口\nwindow = sg.Window('Window Title', layout)  # 第3部分 - 窗口定义\n\n# 显示并与窗口交互\n\
    event, values = window.read()  # 第4部分 - 事件循环或 window.read 调用\n\n# 使用收集到的信息做些事情\n\
    print('Hello', values[0], '! Thanks for trying PySimpleGUI')\n\n# 最后从屏幕上移除窗口\n\
    window.close()  # 第5部分 - 关闭窗口\n```\n\n# 结果：\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_302_0.png)"
