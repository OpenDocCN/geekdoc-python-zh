    在print函数中，你正在集合中搜索数字**3**。**TRUE**表示在集合中找到了数字**3**。如果我们寻找数字**7**，输出将是**FALSE**。**TRUE**和**FALSE**是表达式求值时返回的布尔值。在这种情况下，你评估一个数字是否是一组数字的一部分。


