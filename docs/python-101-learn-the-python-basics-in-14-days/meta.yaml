    ## Day 2: Exploring Data Types


    *Reading Time: 15 minutes*


    In this chapter, you dive more into data types and operators. I’ll take you down
    the journey of building upon many of the concepts you have learned in the last
    chapter. The data types you will be exposed to are lists, tuples, sets, and dictionaries.
    These are also found in many other programming languages as well. Then I will
    discuss typecasting, which will allow us to convert the value of one data type
    to another. Then it’s on to learning about the two types of conversions called
    implicit and explicit type conversion. After reading Chapter 3, you’ll be more
    than comfortable with writing in Python.


    ## Lists


    Lists are one of the most commonly used data types in Python. They provide us
    the ability to organize items and keep track of different data types. More than
    often, a list contains a group of related values. A list is not limited to only
    one data type either. You can have a list containing a combination of strings,
    numbers, another list, tuples, Boolean, and even binary.


    You can create a list by using an open and close square bracket [ ]. You put variables
    of any data type or element within these brackets. You save a list in a variable
    just like any other data type. Let’s go ahead and create our first list that I
    save in a variable called **genius_name**. We can assign **geek_names = ["Nikola",
    "Tesla", "Thomas", "Edison"]**. Notice that all the data types are strings. However,
    the data types do not have to be the case. I can have numbers included in this
    list. I am going to add the number 100 just to show this. So **geek_names = ["Nikola",
    "Tesla", 100, "Thomas", "Edison"]**. Let’s print this out just like we print any
    other variable to see what we get:


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names)

    ```


    *Result:* [‘Nikola’, ‘Tesla’, 100, ‘Thomas’, ‘Edison’]


    There it is, your first list created in Python!


    ## Indexing Lists


    The items in a list are indexed, which means that each item is in an ordered position.
    The first item within any list is *index[0]*, not *index[1]*. It’s important to
    understand that the first item in any list is in *index[0]*! In the list I just
    created, **‘Nikola’** is in position 0, **‘Tesla’** is in position 1, and so forth.
    Items in a list are ordered, changeable, and allowed to have duplicates.


    In the example, I printed out the entire **geek_names** list. Sometimes it is
    beneficial to print an entire list of items. You, however, may want to select
    one item within an extensive list of items. This is where your knowledge of indexing
    comes in. If you wanted to print out the 4th item in the list, which is also the
    3rd index, how do you do that? It’s actually quite simple. You print out the variable
    with brackets, including the index you would like to print. Let’s see indexing
    in action:


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[3])

    ```


    *Result: Thomas*


    See that? I was able to select one item within the list and print it out. Go ahead
    and try to print out other items in the list using their indexes. But what if
    you want to print the last item or the second to last item? Using the method earlier,
    you had to count all the items in the list. Let’s not spend all your time counting
    every single item on the list. The last item in any list is *index[-1]*. To print
    out the last item in our **geek_names** list, you can use another print statement
    with *index[-1]*.


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[-1])

    ```


    Result: Edison


    If I decided to print out the second to last item, I could simply replace the
    *index[-1]* with *index[-2]*. Sometimes there is also a need to know the number
    of items within a list. This is where the function *len()* comes in handy. You
    can determine the length or number of items in a list using this function. To
    find out the length of **geek_names**, I can do the following:


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(len(geek_names))

    ```


    Result: 5


    The number 5 is the total number of items in the **geek_names** list. Now that
    you know the length, you can select a range of items using [X:Y] before the variable.
    **X** is the first index, and **Y** is the last index. When you select a range
    of items, the last number or **Y** is not returned. Let’s now print out the list
    except for the last item, “Edison”.


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[0:4])

    ```


    Result: [‘Nikola’, ‘Tesla’, 100, ‘Thomas’]


    If you wanted to go all the way to the end and print Edison out as well, you could
    simply replace **[0:4]** with **[0:5]**. It seems easy enough, except that you
    may not know the length of care to find the length of a list. Plus, think about
    what happens if a list were to change. For instance, you could always add or remove
    items from a list. Hardcoding a number to print out is probably not the best option.
    A more suitable option is using [X:] or for this specific case [0:].


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[0:])

    ```


    Result: [‘Nikola’, ‘Tesla’, 100, ‘Thomas’, ‘Edison’]


    Okay now let’s us quickly print from “Tesla” to “Thomas” for some additional practice.
    Here’s the code:


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    print(geek_names[1:4])

    ```


    Result: [‘Tesla’, 100, ‘Thomas’]


    Now I don''t like having a number in this list. It just seems out of place since
    it''s the only numeric value. How could we change that numeric data type to a
    string similar to the other items? I can do this since we know the index of the
    number **100**.


    ```

    geek_names = ["Nikola", "Tesla", 100, "Thomas", "Edison"]

    geek_names[2] = "Einstein"

    print(geek_names)

    ```


    *Result:* [''Nikola'', ''Tesla'', ''Einstein'', ''Thomas'', ''Edison'']


    You have replaced the number **100** with **"Einstein"**. Einstein is now the
    *index*[2] of the **geek_names** list. You can replace any of the other items
    within the list by just knowing the index. As I stated earlier, you can add any
    data type you want inside a list.'
