    print(names_file.read())

    names_file.close()

    ```


    *Result: Gates*


    There goes the output only with the Gates name. Your code executes and tries to
    open the file by looking in the current working directory. Since the file cannot
    be found, it then creates a file with the corresponding name **“random.txt”**.
    There is no content in the new file that was created, so only the name **“Gates”**
    is visible, as it has been appended to a blank file. If you were to rerun this
    program, “**Gates**” would then be added again to another line, so be careful.


    ## Append One File to Another


    You can append the contents of one file to another file. Both files must be opened
    and later closed. For practice, we are going to append **nerd_names.txt** to **more_names.txt**.
    This means that the contents of **nerd_names.txt** will be copied over to the
    end of the **more_names.txt** file.


    ```python

    # Opens both files, including one to be appended

    # to and the other to read

    names_file = open("more_names.txt", "a")

    nerd_file = open("nerd_names.txt", "r")


    # Appends the nerd_names.txt content to

    # more_name.txt file

    names_file.write(nerd_file.read())


    names_file = open("more_names.txt", "r")

    print(names_file.read())


    names_file.close()

    nerd_file.close()

    ```


    Result: Newton


    - Hawkins

    - Tyson

    - Musk

    - Gates

    - Nikola

    - Tesla

    - Einstein

    - Thomas

    - Edison

    - Ricardo

    - Casey


    As you can see, you now have a list containing the original contents of **more_names.txt**
    with the **nerd_names.txt** contents added to it.


    ## Write


    Create another file called **writeFile.py**.


    Using the write mode or *w* writes to the file being opened. It will overwrite
    all the contents already in the file. So, if you just want to add to a file, ensure
