    \n你可以使用像`regex`这样的东西来解析出你正在寻找的数据，这将允许你搜索数据字符串，但这很快就会变得非常复杂。相反，有一个更简单的方法。你可以使用一种叫做JavaScript对象表示法（JSON）的东西。JSON是一种格式化数据的方式。它由键和值组织。例如，在你刚刚进行的API调用中，服务器的响应是JSON数据，其中属性是键；这些将是：name、height、mass、hair_color等。\n\
