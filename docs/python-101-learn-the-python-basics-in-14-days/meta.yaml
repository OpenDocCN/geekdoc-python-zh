    ## 元组


    **元组**在Python中与列表非常相似。它是一种数据结构类型，充当存储不同值的容器。就像列表一样，单个元组中可以存储多种数据类型。元组中的所有值都以与其顺序相同的方式执行。这本质上意味着，如果你创建一个元组，它会按照分配给变量的顺序打印出来。


    关于元组，最重要的一点是它们的内容以后不能更改或修改。元组的这个特性被称为**不可变**。一旦我们将一个元组赋值给一个变量，就无法更改该元组中的值。因此，如果你处理任何值必须更改的数据，建议你使用列表！元组中的内容是永久的。元组通常在程序中的数据预计不会更改时使用。


