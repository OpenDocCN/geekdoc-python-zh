- md: "## Updating the Home page\n\nIn the VSCode IDE, open up the src folder, next\
    \ open the pages folder, inside of there you should see two files:\n\n- 1. index.js\n\
    - 2. 404.js\n\nindex.js is your homepage, this is what will be displayed when\
    \ you navigate to http://localhost:8000 the 404.js page will be displayed when\
    \ you go to a link that doesn’t exist in your site, so in other words this is\
    \ for any 404 errors.\n\nGo ahead and open up index.js on line 136 you should\
    \ see the following HTML code\n\n```\n<span style={headingAccentStyles}>-- you\
    \ just\nmade a Gatsby site! </span>\n```\n\nUpdate this line to as follows\n\n\
    ```\n<span style={headingAccentStyles}>-- I just made my FIRST Gatsby site</span>\n\
    ```\n\nSave the file in your terminal. Notice if you keep your web browser open\
    \ when you save the file Gatsby automatically refreshes the page for you so you\
    \ can see your changes take effect immediately!\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_483_0.png)\n\
    \nAs you can see it’s pretty easy to make a change to a Gatsby site, in fact,\
    \ if you already know HTML then this was a pretty simple exercise, open up a file\
    \ and make an HTML change. Since Gatsby uses React, all of the pages will contain\
    \ some combination of Javascript, HTML, and CSS.\n\n## Creating a new link\n\n\
    Now that you’ve made a text change to the HTML, it’s time to create a new link.\
    \ To do this, you would normally go to just below where you made your initial\
    \ change right? After all, you just updated some text on line 136, since the links\
    \ on the page are displayed below that point, you should just make the change\
    \ there, correct? Below is what you will find\n\n```\n{links.map((link) => (\n\
    \    <li key={link.url} style={{\n        ...listItemStyles, color: link.color\
    \ }}>\n        <span>\n            <a\n                style={linkStyle}\n   \
    \             href={`${link.url}?utm_source=starter&utm_medium=start-page&utm_campaign=minimal-starter`}\n\
    \            >\n            {link.text}\n            </a>\n            {link.badge\
    \ && (\n              <span style={badgeStyle} aria-label=\"New Badge\">\n   \
    \             NEW!\n              </span>\n            )}\n            <p style={descriptionStyle}>\n\
    \            {link.description}</p>\n        </span>\n    </li>\n))}\n```\n\n\
    If you’ve been using Javascript for some time, you know exactly what to do next,\
    \ but if **Javascript** or **JSX** is somewhat new to you, you might be a little\
    \ confused. Where are all your http links? What do these mean {} ? What does links.map\
    \ do in that first line? You’ll be learning about all of these concepts as you\
    \ progress through the following chapters. For now, what I want you to take away\
    \ from this is that with GatsbyJS (as well as React and Javascript) you can begin\
    \ to separate your data from how a site is displayed.\n\n## Okay, I get it. I\
    \ think? So how do I make this change?\n\nScroll up to the top of the file on\
    \ line 82 you’ll see the following\n\n```\nconst links = [...]\n```\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_487_0.png)\n\
    \nAha! (Btw, you can shrink the links array by simply moving your mouse over line\
    \ 82, and clicking the down arrow. VSCode will collapse the links array, this\
    \ is handy when you’re working on code so you can shrink sections you aren’t currently\
    \ modifying)\n\nSo here you have the **links** data array which is storing all\
    \ of the information about a link, specifically it has four required properties:\
    \ text, url, description, color, and one fifth optional one, badge. So, go ahead\
    \ and create a new link by copying everything in between the {} brackets (Don’t\
    \ forget the comma!). Make the change as follows\n\n```\nconst links = [\n  {\n\
    \    text: \"Nerd Challenges\",\n    url: \"https://nerdchallenges.com\",\n  \
    \  description:\n      \"A great place to challenge yourself to learn new skills,\
    \ like GatsbyJS and Python!\",\n    color: \"#E90025\",\n  },\n  {\n    text:\
    \ \"Tutorial\",\n    url: \"https://www.gatsbyjs.com/docs/tutorial/\",\n    description:\n\
    \      \"A great place to get started if you're new to web development. Designed\
    \ to guide you through setting up your first Gatsby site.\",\n    color: \"#E95800\"\
    ,\n  },\n  // ... other links\n]\n```\n\nSave the file and voila! The page now\
    \ loads your latest link.\n\n## Congratulations — I just made my FIRST Gatsby\
    \ site \U0001F389\U0001F389\U0001F389\n\nEdit `src/pages/index.js` to see this\
    \ page update in real-time. \U0001F60E\n\n[Documentation](https://www.gatsbyjs.com/docs/)\n\
    \n- [Nerd Challenges](https://www.gatsbyjs.com/docs/nerd-challenges/)\n  A great\
    \ place to challenge yourself to learn new skills, like GatsbyJS and Python!\n\
    - [Tutorial](https://www.gatsbyjs.com/docs/tutorial/)\n  A great place to get\
    \ started if you're new to web development. Designed to guide you through setting\
    \ up your first Gatsby site.\n- [How to Guides](https://www.gatsbyjs.com/docs/how-to/)\n\
    \  Practical step-by-step guides to help you achieve a specific goal. Most useful\
    \ when you're trying to get something done.\n- [Reference Guides](https://www.gatsbyjs.com/docs/reference/)\n\
    \  Nitty-gritty technical descriptions of how Gatsby works. Most useful when you\
    \ need detailed information about Gatsby's APIs.\n- [Conceptual Guides](https://www.gatsbyjs.com/docs/conceptual/)\n\
    \  Big-picture explanations of higher-level Gatsby concepts. Most useful for building\
    \ understanding of a particular topic.\n- [Plugin Library](https://www.gatsbyjs.com/plugins/)\n\
    \  Add functionality and customize your Gatsby site or app with thousands of plugins\
    \ built by our amazing developer community.\n- [Build and Host](https://www.gatsbyjs.com/docs/how-to/previews-deploys-and-distribution/deploying-to-gatsby-cloud/)\
    \ NEW!\n  Now you're ready to show the world! Give your Gatsby site superpowers:\
    \ Build and host on Gatsby Cloud. Get started for free!\n\nBut wait, we’re missing\
    \ that shiny NEW badge?! No problem, add the following to the top entry\n\n```\n\
    {\n    text: \"Nerd Challenges\",\n    url: \"https://nerdchallenges.com\",\n\
    \    description:\n        \"A great place to challenge yourself to learn new\
    \ skills, like GatsbyJS and Python!\",\n    color: \"#E90025\",\n    badge: true,\n\
    },\n```\n\nBoom! Do you see the impact of this? Take a step back, so you were\
    \ able to modify a piece of data, specifically a Javascript array, which then\
    \ Gatsby used to render the page differently. You didn’t have to style anything\
    \ with CSS or make any HTML changes, you just simple changed a piece of data to\
    \ add a new record.\n\nWhat’s powerful about this is later you will learn how\
    \ to query data from an external data source, so for example a MySQL Database\
    \ or an external API. Say you wanted to pull a list of stock prices from a data\
    \ source (API) and display them on your website. You can query the data with Gatsby,\
    \ via GraphQL, and Gatsby will display that data for you. This means that any\
    \ time you query that data source, if any new data has been added it will display\
    \ on your site! Best of all, once you program everything correctly, it won’t require\
    \ any updates other than just re-running the query to fetch the latest data!\n\
    \n## Congratulations — I just made my FIRST Gatsby site \U0001F389\U0001F389\U0001F389\
    \n\nEdit `src/pages/index.js` to see this page update in real-time. \U0001F60E\
    \n\n[Documentation](https://www.gatsbyjs.com/docs/)\n\n- [Nerd Challenges](https://www.gatsbyjs.com/docs/tutorial/)\
    \ NEW!\n  A great place to challenge yourself to learn new skills, like GatsbyJS\
    \ and Python!\n\nIn this chapter, you’ve learned a few key things\n\n- 1. How\
    \ to set up an initial project with the Gatsby CLI, feel free to create a new\
    \ project and break stuff! \U0001F609\n- 2. How to edit text on a Gatsby page\n\
    - 3. How to edit a data array which then subsequently renders different data on\
    \ a Gatsby page\n- 4. The important distinction between updating a data object\
    \ vs updating HTML tags manually\n\nTomorrow, you’re going to take a step back\
    \ from Gatsby and we’ll focus on the project, what the goal is we are trying to\
    \ achieve, and what the requirements are from our customer.\n\n## Q&A Review\n\
    \n1. What is GatsbyJS?\n    - 1. A React based framework that allows you to build\
    \ fast, secure, and scalable websites.\n    - 2. A static site generator\n   \
    \ - 3. A way to build a website\n    - 4. It’s that Jay guy right?\n\n2. What\
    \ is the command to start the local development server with Gatsby CLI?\n    -\
    \ 1. gatsby start\n    - 2. gatsby develop\n    - 3. gatsby new\n    - 4. gatsby\
    \ stop"
  mdcn: "## 更新主页\n\n在 VSCode IDE 中，打开 `src` 文件夹，接着打开 `pages` 文件夹，你应该能在其中看到两个文件：\n\n\
    - 1. `index.js`\n- 2. `404.js`\n\n`index.js` 是你的主页，当你导航到 `http://localhost:8000`\
    \ 时会显示此页面。`404.js` 页面则会在你访问网站中不存在的链接时显示，换句话说，它用于处理任何 404 错误。\n\n请打开 `index.js`，在第\
    \ 136 行，你应该会看到以下 HTML 代码：\n\n```\n<span style={headingAccentStyles}>-- you just\n\
    made a Gatsby site! </span>\n```\n\n将此行更新为如下内容：\n\n```\n<span style={headingAccentStyles}>--\
    \ I just made my FIRST Gatsby site</span>\n```\n\n在你的终端中保存文件。注意，如果你在保存文件时保持浏览器打开，Gatsby\
    \ 会自动为你刷新页面，这样你就能立即看到更改生效！\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_483_0.png)\n\
    \n如你所见，对 Gatsby 网站进行更改相当容易。事实上，如果你已经了解 HTML，那么这只是一个非常简单的练习：打开一个文件并进行 HTML 更改。由于\
    \ Gatsby 使用 React，所有页面都将包含 JavaScript、HTML 和 CSS 的某种组合。\n\n## 创建新链接\n\n既然你已经对\
    \ HTML 进行了文本更改，现在是时候创建一个新链接了。为此，你通常会去到你最初更改位置的下方，对吧？毕竟，你刚刚在第 136 行更新了一些文本，由于页面上的链接显示在该点下方，你应该就在那里进行更改，对吗？以下是你将会看到的内容：\n\
    \n```\n{links.map((link) => (\n    <li key={link.url} style={{\n        ...listItemStyles,\
    \ color: link.color }}>\n        <span>\n            <a\n                style={linkStyle}\n\
    \                href={`${link.url}?utm_source=starter&utm_medium=start-page&utm_campaign=minimal-starter`}\n\
    \            >\n            {link.text}\n            </a>\n            {link.badge\
    \ && (\n              <span style={badgeStyle} aria-label=\"New Badge\">\n   \
    \             NEW!\n              </span>\n            )}\n            <p style={descriptionStyle}>\n\
    \            {link.description}</p>\n        </span>\n    </li>\n))}\n```\n\n\
    如果你已经使用 JavaScript 一段时间了，你完全知道接下来该做什么。但如果 **Javascript** 或 **JSX** 对你来说还比较新，你可能会有点困惑。你所有的\
    \ http 链接在哪里？这些 `{}` 是什么意思？第一行中的 `links.map` 是做什么的？在接下来的章节中，你将学习所有这些概念。目前，我希望你从这里了解到的是，通过\
    \ GatsbyJS（以及 React 和 Javascript），你可以开始将数据与网站的显示方式分离开来。\n\n## 好的，我明白了。我想？那么我该如何进行更改呢？\n\
    \n向上滚动到文件顶部，在第 82 行，你会看到以下内容：\n\n```\nconst links = [...]\n```\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_487_0.png)\n\
    \n啊哈！（顺便说一句，你可以通过将鼠标悬停在第 82 行并点击向下箭头来折叠 `links` 数组。VSCode 会折叠 `links` 数组，这在你处理代码时非常方便，这样你可以缩小当前未修改的部分）\n\
    \n所以这里你有 **links** 数据数组，它存储了关于链接的所有信息，具体来说，它有四个必需属性：`text`、`url`、`description`、`color`，以及第五个可选属性\
    \ `badge`。那么，继续，通过复制 `{}` 括号之间的所有内容来创建一个新链接（别忘了逗号！）。按如下方式进行更改：\n\n```\nconst links\
    \ = [\n  {\n    text: \"Nerd Challenges\",\n    url: \"https://nerdchallenges.com\"\
    ,\n    description:\n      \"A great place to challenge yourself to learn new\
    \ skills, like GatsbyJS and Python!\",\n    color: \"#E90025\",\n  },\n  {\n \
    \   text: \"Tutorial\",\n    url: \"https://www.gatsbyjs.com/docs/tutorial/\"\
    ,\n    description:\n      \"A great place to get started if you're new to web\
    \ development. Designed to guide you through setting up your first Gatsby site.\"\
    ,\n    color: \"#E95800\",\n  },\n  // ... other links\n]\n```\n\n保存文件，瞧！页面现在加载了你的最新链接。\n\
    \n## 恭喜——我刚刚制作了我的第一个 Gatsby 网站 \U0001F389\U0001F389\U0001F389\n\n编辑 `src/pages/index.js`\
    \ 以实时查看此页面更新。\U0001F60E\n\n[文档](https://www.gatsbyjs.com/docs/)\n\n- [Nerd Challenges](https://www.gatsbyjs.com/docs/nerd-challenges/)\n\
    \  一个挑战自我学习新技能的好地方，比如 GatsbyJS 和 Python！\n- [教程](https://www.gatsbyjs.com/docs/tutorial/)\n\
    \  如果你是 Web 开发新手，这是一个很好的起点。旨在指导你完成第一个 Gatsby 网站的设置。\n- [操作指南](https://www.gatsbyjs.com/docs/how-to/)\n\
    \  实用的分步指南，帮助你实现特定目标。当你试图完成某项任务时最有用。\n- [参考指南](https://www.gatsbyjs.com/docs/reference/)\n\
    \  关于 Gatsby 工作原理的详细技术描述。当你需要关于 Gatsby API 的详细信息时最有用。\n- [概念指南](https://www.gatsbyjs.com/docs/conceptual/)\n\
    \  对高级 Gatsby 概念的宏观解释。对于理解特定主题最有用。\n- [插件库](https://www.gatsbyjs.com/plugins/)\n\
    \  使用我们出色的开发者社区构建的数千个插件，为你的 Gatsby 网站或应用添加功能并进行自定义。\n- [构建和托管](https://www.gatsbyjs.com/docs/how-to/previews-deploys-and-distribution/deploying-to-gatsby-cloud/)\
    \ NEW!\n  现在你准备好向世界展示了！赋予你的 Gatsby 网站超能力：在 Gatsby Cloud 上构建和托管。免费开始！\n\n但是等等，我们缺少那个闪亮的\
    \ NEW 徽章？没问题，将以下内容添加到顶部条目：\n\n```\n{\n    text: \"Nerd Challenges\",\n    url:\
    \ \"https://nerdchallenges.com\",\n    description:\n        \"A great place to\
    \ challenge yourself to learn new skills, like GatsbyJS and Python!\",\n    color:\
    \ \"#E90025\",\n    badge: true,\n},\n```\n\n砰！你看到这个效果了吗？退一步讲，你能够修改一段数据，具体来说是一个\
    \ Javascript 数组，然后 Gatsby 使用它来以不同的方式渲染页面。你不需要用 CSS 设置任何样式或进行任何 HTML 更改，你只是简单地更改了一段数据来添加一条新记录。\n\
    \n这的强大之处在于，稍后你将学习如何从外部数据源查询数据，例如 MySQL 数据库或外部 API。假设你想从数据源（API）拉取股票价格列表并显示在你的网站上。你可以通过\
    \ GraphQL 使用 Gatsby 查询数据，Gatsby 会为你显示这些数据。这意味着，每次你查询该数据源时，如果有任何新数据添加，它都会显示在你的网站上！最重要的是，一旦你正确编程了所有内容，除了重新运行查询以获取最新数据外，不需要任何更新！\n\
    \n## 恭喜——我刚刚制作了我的第一个 Gatsby 网站 \U0001F389\U0001F389\U0001F389\n\n编辑 `src/pages/index.js`\
    \ 以实时查看此页面更新。\U0001F60E\n\n[文档](https://www.gatsbyjs.com/docs/)\n\n- [Nerd Challenges](https://www.gatsbyjs.com/docs/tutorial/)\
    \ NEW!\n  一个挑战自我学习新技能的好地方，比如 GatsbyJS 和 Python！\n\n在本章中，你学到了几个关键点：\n\n- 1. 如何使用\
    \ Gatsby CLI 设置初始项目，随意创建一个新项目并尝试各种操作吧！\U0001F609\n- 2. 如何编辑 Gatsby 页面上的文本\n- 3.\
    \ 如何编辑一个数据数组，该数组随后会在 Gatsby 页面上渲染不同的数据\n- 4. 更新数据对象与手动更新 HTML 标签之间的重要区别\n\n明天，你将暂时离开\
    \ Gatsby，我们将专注于项目本身，探讨我们试图实现的目标，以及客户的需求。\n\n## 问答回顾\n\n1. 什么是 GatsbyJS？\n    -\
    \ 1. 一个基于 React 的框架，允许你构建快速、安全且可扩展的网站。\n    - 2. 一个静态网站生成器\n    - 3. 一种构建网站的方式\n\
    \    - 4. 就是那个叫 Jay 的家伙对吧？\n\n2. 使用 Gatsby CLI 启动本地开发服务器的命令是什么？\n    - 1. `gatsby\
    \ start`\n    - 2. `gatsby develop`\n    - 3. `gatsby new`\n    - 4. `gatsby stop`"
