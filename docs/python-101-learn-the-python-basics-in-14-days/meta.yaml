    ```

    nerd_age = 34 + 1

    print(nerd_age)

    ```


    结果：35


    **nerd_age**变量现在被赋值为35。没错，Python将**34 + 1**视为一个数学表达式。加号是Python中可用的众多算术运算符之一。下表显示了一些可用于基本数学赋值的标准运算符。


    | 运算符 | 名称 | 示例 |

    | :--- | :--- | :--- |

    | + | 加法 | x + y |

