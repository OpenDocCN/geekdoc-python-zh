    ```


    Press RETURN and let it install everything it needs. It will probably take several
    minutes for Homebrew to download and install everything it needs, so grab some
    brew ☕


    Once Homebrew is installed you should see a section called **Next steps** that
    has two commands, copy both of those commands and run them. It should look similar
    to the below (but not exactly! So don’t copy these, copy the ones in your terminal)


    ```

    echo ''eval "$(/opt/homebrew/bin/brew shellenv)"''

    >> /Users/administrator/.zprofile

    eval "$(/opt/homebrew/bin/brew shellenv)"

    ```


