  md: '# Identity Operators


    Similar to a comparison operator. An **identity operator** examines two variables
    to see if they are the same. The easiest way to show this is with a small script
    comparing three different variables. The two identity operators are **is** and
    **is not**:


    ```

    a = 7

    b = 3

    c = 7


    print(a is b)

    print(a is c)

    print(a is not b)

    ```


