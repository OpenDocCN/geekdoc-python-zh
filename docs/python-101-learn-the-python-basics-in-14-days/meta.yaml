    # Installing Gatsby CLI


    Installing Gatsby CLI is the same process on Windows, MacOS, and Linux. The Gatsby
    CLI is going to help you quickly create a new Gatsby website, it makes getting
    started extremely simple. The tool is going to set up the entire website package
    so you can get started building.


    You’re going to install it as a global npm package, since you’ll be using it across
    multiple projects. Generally speaking you should avoid installing packages globally;
    however, for certain CLI based tools, it can make sense in certain situations.
    In this case, it does. To install it run


    ```

    npm install --global gatsby-cli

    ```'
