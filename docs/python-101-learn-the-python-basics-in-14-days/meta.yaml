  md: '# Why Python?


    Python is easy to write, and it’s straightforward to read and even easier to understand.
    Why else wouldn’t you want to learn Python? Well, what does that mean, and how
    can you use it? Yes, it’s a programming language, but used for what? Like anything,
    you have advantages and disadvantages while using this language. Let us look into
    some of these before jumping into Python.'
  merge: -1
