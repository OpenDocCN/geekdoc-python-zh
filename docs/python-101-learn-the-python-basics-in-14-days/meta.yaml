    \ Python.\n\n# 12\n\n## Day 12: Classes and Objects\n\nReading Time: 8 minutes\n\
    \n## Python Classes\n\nThink of **classes** in Python as a blueprint to create\
    \ objects that can be used throughout your program. A blueprint or schematic for\
    \ a building provides you with the necessary framework to construct a building.\
    \ The same goes for classes as it relates to objects. Classes essentially offer\
    \ you the ability to create your own data type. This is important because not\
    \ everything in the real world can be represented by the data types I discussed\
    \ on Day 3. Those data types were limited to a string, number, list, tuple, and\
    \ dictionary.\n\nThink about some of the people, places, or things you might need\
    \ to represent in a program. There probably isn’t any variable that can store\
    \ that using the basic data types you learned in earlier chapters. This could\
    \ be a problem if you didn't have classes because then you would need to generate\
