    ## String Formatting - Legacy % Operator


    The % operator was previously used earlier in the Chapter to perform arithmetic
    operations. The % operator can also be used to format a fixed set of enclosed
    variables in a list. It''s not a commonly used practice anymore, but it allows
    you to quickly identify strings using the % operator in legacy code or Python
    2.6 or earlier. The only way to quickly explain how the % operator works is to
    see it in action.


    If you wanted an output that shows "Hello Nerd Challenges LLC" we might write
    the code


    ```

    print("Hello Nerd Challenges LLC")

    ```


    To write this using the legacy % operator, you could substitute the company name
    with %s, which indicates a string variable is inserted at this location. At the
    end of the statement, you would then write % with the **company_name**. Let’s
    jump right into this.


    Clear your workspace from any previous code you have. Now write **“Hello Nerd
    Challenges LLC”** using the legacy code format below:


    ```

    company_name = "Nerd Challenges LLC."

    print("Hello %s" % company_name)

    ```


    *Result: Hello Nerd Challenges LLC.*


    The code above yields the same output as just a print statement while utilizing
    the legacy format operator. Note that you used %s because our variable **company_name**
    was a string, and you wanted to print out a string. What if you wanted to print
    out a decimal variable but output it as a whole number or integer? That is simple.
    You can show this with someone’s age. See the example below:


    ```

    nerd_age = 34.5

    print("This user is %i" % nerd_age)

    ```


    *Result: This user is 34*


    Run the code above. You’ll see that the **nerd_age** variable is a decimal value.
    Yet, when you print the decimal, it is printed as a whole number. The reason is
    that you used %i to convert the variable type. There is a long list of modifiers
    that allow us to convert to another variable type. Below is a condensed table
    of some common modifiers.


    | Modifier | Conversion |

    | :--- | :--- |

    | %d | Decimal |

    | %i | Integer Number |

    | %o | Octal Value |

    | %x | Hexadecimal |

    | %f | Floating Point |


    Ok, so now I want to print out more than just one variable. How do I accomplish
    this? Let’s use what you have already learned to make this happen. I can practice
    by outputting the statement:


    > “Hey Casey is from Nerd Challenges and currently 34 years old”.


    ```

    company_name = "Nerd Challenges"

    nerd_age = 34.5

    print("Hey Casey is from %s and currently %i years old" % (company_name, nerd_age))

    ```


    Result: Hey Casey is from Nerd Challenges and currently 34 years old


    If you got the output above in your run screen, you are now getting the hang of
    using the legacy string formatter. You can add as many variables as you like and
    format different or convert various data types. Remember that variables within
    the print statement must be in the order you specify.


    Keeping track of many variables can quickly become cumbersome. There is a much
    easier way to use the % operator. This approach uses inline variables within the
    print statement with a **key-value pair**. Building from our last example and
    morph it into this approach. See below:


    ```

    print("Hey Casey is from %(company_name)s and currently %(nerd_age)i years old"
    %

    {"company_name": "Nerd Challenges LLC",

    "nerd_age": 34.5})

    ```


    Result: Hey Casey is from Nerd Challenges LLC and currently 34 years old


    Easy enough, this approach eliminates the guessing game when there are multiple
    variables. You’ll probably never write code like this again, but at least you’ll
    be familiar with it if it pops up in older Python 2.7 code.


    ## String Formatting - f-Strings


    With Python 3.6 emerged a new method for formatting strings called **string interpolation**
    or **f-Strings**. This method compounds Python’s ability to make code even easier
    to read and write. Since we’re just learning Python, this makes our job a whole
    lot easier. The syntax is quite simple. You first assign values to your variables.
    Then you print your statement with the variables inline. The only difference is
    that you include the letter *f* right before the first quotation mark. Clear your
    workspace again. Let us revert to one of our earlier examples and morph it using
    f-Strings:


    ```

    book_chapter = 1

    python_series = 101

    print(f"We are on Day {book_chapter} of the Python {python_series} book.")

    ```


    *Result: We are on Day 1 of the Python 101 book.*


    Inside the curly brace brackets, you can evaluate any Python expression. You could
    even include mathematical operations such as increasing the book chapter by 1
    within the print statement. Try adding + 1 to your previous code:


    ```

    book_chapter = 1

    python_series = 101

    print(f"We are on Day {book_chapter + 1} of the Python {python_series} book.")

    ```


    Result: We are on Day 2 of the Python 101 book.


    Pretty neat, huh! You just incremented the Chapter by 1 within the print statement.
    This method is potent. Keep this valuable tool as part of your Python toolbox.


    * * *


    ## Introduction to Comments


    Most of the code you have written so far has been only a few lines. As you go
    into programming further, there is the potential of having hundreds of lines of
    code. In large applications, this can approach thousands of lines. In applications
    of such, there may be an entire team of programmers working on a single project
    or complicated feature. To help with continuity and understanding of the code,
    programmers use **comments**. Comments are situated throughout the program to
    give us reminders of what is going on. It adds more clarification for others who
    are reading the code as well.


    The syntax for a single-line comment is # (Officially, this is called an Octothorpe,
    also known as a hashtag). You can comment on code to explain what is going on
    by inserting a #:


    ```

    # Python does not execute a comment line

    print("However, this line prints!")

    ```


    *Result: However, this line prints!*


    The comment tells you what the lines of code below are doing. It doesn''t get
    printed out or even change the output of the code executed. It is helpful for
    other developers as they try to understand what your code does.


    There is only so much room on the first line to provide a comment. Sometimes a
    comment requires multiple lines to explain what is going on in a program. It may
    even make more sense to have sentences on subsequent lines. Unlike the single
    line comment, multi-line comments start and end with three single quotes '''''':


    ```

    '''''' This is a multi-line comment

    The only line that is output by Python is the print statement

    This line is ignored. It is just a way for developers to document code.

    The final program prints The value of x is 3

    ''''''

    x = 3

    print(f"The value of x is {x}")

    ```


    Result: The value of x is 3


    Comments can help with troubleshooting or debugging code. If you have errors in
    your code, you may consider commenting a portion of your code out. Comments allow
    you to isolate the problem to make it easier to fix it. Try running the code below:


    ```

    print("Nerd Challenges are awesome!")

    print(Nerd Challenges can be challenging)

    ```


    Result: print(Nerd Challenges can be challenging). SyntaxError: invalid syntax


    The code doesn’t appear to work because of a syntax error. That is weird because
    I added a line to the code, and now it doesn’t work. Let’s comment out the portion
    of the code I just added:


    ```

    print("Nerd Challenges are fantastic!")

    # print(Nerd Challenges can be challenging)

    ```


    Result: Nerd Challenges are fantastic!


    Since you did not get an error, there is a problem with that particular line of
    code. Do you see what the problem is?


    The issue is that I left out open and close quotation marks in the print statement
    outside of the string. You can add quotes back to the print statement and remove
    the comment.'
