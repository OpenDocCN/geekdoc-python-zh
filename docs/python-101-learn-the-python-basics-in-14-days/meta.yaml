  md: '# Understanding Variables


    One of the essential elements of a program is the use of variables. A **variable**
    is a name that holds a value in memory that can be accessed later on in a program.
    That sounds a little complicated. Let’s illustrate this with an example.


    Say I want to give a user that’s also a nerd with the name Casey. I can store
    the name **Casey** in a variable called **nerd_name** with the following code:


    ```

    nerd_name = "Casey"

    ```


    Wow, that seemed effortless. I just assigned the name Casey to the variable **nerd_name**.
    I can now use the variable **nerd_name** to'
