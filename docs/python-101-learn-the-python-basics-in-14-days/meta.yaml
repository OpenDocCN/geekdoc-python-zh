- md: "## Day 2 Challenges\n\n- Kilobyte Challenge: Create a list of fruits with `apple`\
    \ and `banana`. Once that list is created, add a new fruit to the list using the\
    \ append method.\n\n## Day 3: Operators\n\n*Reading Time: 3 minutes*\n\nThis chapter\
    \ is all about Python operators. I go into more depth and build upon some of the\
    \ basic arithmetic operators I talked about in Chapter 2 to perform math operations.\
    \ Python operators can be consolidated into the following groups: Arithmetic,\
    \ Assignment, Bitwise, Comparison, Identity, Logical, and Membership Operators.\
    \ The list below is a general description of each:\n\n- **Arithmetic** - used\
    \ to perform math operations\n- **Assignment** - used to assign values to variables\n\
    - **Bitwise** - used to compare numbers in binary\n- **Comparison** - used to\
    \ compared two variables or values\n- **Identity** - used to determine if a value\
    \ is or is not something (i.e., **True** or **False**)\n- **Logical** - used with\
    \ conditional statements\n- **Membership** - used to identify if a value is within\
    \ a set or sequence\n\n## Arithmetic Operators\n\nLet us refresh our knowledge\
    \ of what you learned in Chapter 2 by using the table below. There is one additional\
    \ operator I added to the table called floor division. Floor division takes a\
    \ quotient and rounds down to the lowest integer. For simplicity let us set the\
    \ variable x = 1 and y = 3. Check out the results in the last column of the table\
    \ to see what results you receive from using each operator.\n\n| Operator | Name\
    \ | Example | Results |\n| :--- | :--- | :--- | :--- |\n| + | Addition | x + y\
    \ | 4 |\n| - | Subtraction | x - y | -2 |\n| * | Multiplication | x * y | 3 |\n\
    | ** | Exponent | x ** y | 1 |\n| / | Division | x / y | 0.333333 |\n| % | Modulus\
    \ | x % y | 1 |\n| // | Floor Division | x//y | 0 |\n\n## Assignment Operators\n\
    \nYou have been assigning values to variables using the “= “**assignment operator**.\
    \ There are a few more assignment operators that are used throughout the rest\
    \ of the book as we continue to code. Don’t focus too heavily on these operators\
    \ now. When you learn for and while loops, you’ll be using these operators.\n\n\
    | Operator | Name | Example | Solution |\n| :--- | :--- | :--- | :--- |\n| = |\
    \ Assignment | x = 5 | x = 5 |\n| += | Add & Assignment | x += 3 | x = x + 3 |\n\
    | -= | Subtract & Assignment | x -= 2 | x = x - 2 |\n| *= | Multiply & Assignment\
    \ | x *= 4 | x = x * 4 |\n| /= | Division & Assignment | x /= 6 | x = x / 6 |\n\
    \n## Bitwise Operators\n\n**Bitwise operators** compare two binary numbers with\
    \ one another. These would only be used when using binary numbers, which include\
    \ 0’s and 1’s. There is no need to go in-depth into these now. All the numbers\
    \ in this book are whole or decimal numbers.\n\n## Comparison Operators\n\n**Comparison\
    \ operators** are used in most of the programs you create in Python, especially\
    \ if they contain if-else statements, while, and for loops. With comparison operators,\
    \ you can compare two variables, then execute a set of instructions if they meet\
    \ specific criteria or conditions. You will learn more about comparison operators\
    \ on Day 5, for now just know these are the symbols and how to use them.\n\n|\
    \ Operator | Name | Example |\n| --- | --- | --- |\n| == | Equal | x == y |\n\
    | > | Greater Than | x > y |\n| >= | Greater Than or Equal to | x >= y |\n| <\
    \ | Less Than | x < y |\n| <= | Less Than or Equal to | x <= y |\n| != | Not Equal\
    \ | x != y |\n\n## Identity Operators\n\nSimilar to a comparison operator. An\
    \ **identity operator** examines two variables to see if they are the same. The\
    \ easiest way to show this is with a small script comparing three different variables.\
    \ The two identity operators are **is** and **is not**:\n\n```\na = 7\nb = 3\n\
    c = 7\n\nprint(a is b)\nprint(a is c)\nprint(a is not b)\n```\n\n*Result: False,\
    \ True, True*\n\nThe result of the first print statement is **FALSE** because\
    \ **a = 7** is not equal to **b=3**. The second print statement is **TRUE** because\
    \ **a = 7** is equal to **c = 7**. The third print statement is **TRUE** because\
    \ **a =7** is not equal to **b =3**. The response from an identity operation is\
    \ always either **TRUE** or **FALSE**.\n\n## Logical Operators\n\n**Logical operators**\
    \ are used when dealing with more than one conditional statement. It allows us\
    \ to include or look at two conditions at one time when evaluating a statement.\
    \ The three logical operators below are used more in Chapter 6.\n\n- **and** -\
    \ returns a response if both conditions are met\n- **or** - returns a response\
    \ if one or more conditions is met\n- **not** - returns the opposite of the response\
