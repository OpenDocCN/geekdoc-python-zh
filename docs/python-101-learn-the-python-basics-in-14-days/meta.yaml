    stresses a heavy emphasis on code readability. Thus, the reason it’s such an easy
    programming language to learn. It is easy to understand and easy to read and write.
    Python is ideal for anyone learning how to code in a programming language.


    Since it is an **interpreted language**, Python code or instructions are executed
    immediately by a computer program called an interpreter. There is no need to compile
    the code into a machine language program'
