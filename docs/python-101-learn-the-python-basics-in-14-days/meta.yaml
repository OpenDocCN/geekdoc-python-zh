    generally speaking, any application that requires a Graphical User Interface (GUI).
    Python doesn’t have as many rich GUI or graphic libraries to choose from that
    are well supported. As you’ll see in one of the Nerd Challenges, you’ll build
    a Python-based GUI calculator program. It’s cool; however, it just doesn’t look
    all that appealing. So if you’re making a 3D game, Python probably isn’t the best
