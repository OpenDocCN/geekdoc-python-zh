    # Installing Node.js


    Node.js allows you to run Javascript locally on your machine, since you’re using
    Javascript to build your website, you need to be able to run and test things outside
    of your browser. React and GatsbyJS utilize Node.js to build artifacts that you
    will later deploy to a hosting provider.


    Additionally (on MacOS and Linux), you can use **Node Version Manager (NVM)**
    to switch between different versions of Node.js easily. While you may not necessarily
    use this feature, it is a handy tool in case you ever need to swap versions of
    Node.js for a different project. To learn more about NVM'
