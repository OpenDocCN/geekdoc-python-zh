    # Modules


    **Modules** consist of Python files containing definitions and statements that
    can later be used within our program. Modules provide us with the flexibility
    to organize our program into smaller chunks making it more manageable. This is
    especially true for those larger programs requiring lots of code. It is sort of
    the same concept we touched upon in the previous chapter. Think of a module as
    a library of functions you want to use throughout your program.


    The **main.py** file created with your new **pythonModules** project contains
    the main instructions to execute the program. The modules that you’ll be creating
    will feed into'
  - '[PAGE 279]


    that **main.py** program. That leaves us with the ability to easily reuse code
    from your modules or even use modules within other modules. At the end of the
    day, everything feeds into **main.py**, which I’ll also refer to as your main
    program.'
