    \n    - 1. 正确\n    - 2. 错误\n\n* * *\n\n## 第5天挑战\n\n- 千字节挑战：询问用户是否想将一个数字加倍或三倍。然后询问他们的数字。接着根据他们之前的选择将其加倍或三倍。\n\
    \n## 第6天：尝试-异常\n\n阅读时间：6分钟\n\n编程的一部分是学习如何处理异常和错误。代码中的错误，甚至用户输入的错误，都可能使程序变得无用。无用意味着整个程序崩溃，你只能看着一条错误信息。并非所有错误都应被视为严重到足以阻止整个程序运行。\n\
    \n## 尝试和异常块\n\n**try、except和finally块**可以帮助你管理这些错误。错误通常帮助我们程序员找出代码中的问题所在。用户通常不希望看到这些关于程序错误的额外信息。一个简单的单行错误提示可能就足够了，不会分散用户继续运行程序的注意力。\n\
    \n在try块内，你可以测试一段代码是否有错误。如果没有错误，代码将正常执行。但是，如果存在错误，except块会处理该错误。这个块有时被称为异常。最后，有一个finally块，无论try-except块中是否有错误，它都会执行代码。\n\
    \n标准计算器使我们能够进行几乎你能想到的每一种数学运算。我说“几乎”，是因为如果你在计算器上尝试用任何数字除以零，你肯定会收到类似“Cannot divide\
    \ by zero”的错误。如果你不相信我，可以自己试试。\n\nPython代码中的数学运算也是如此。Python程序也无法执行尝试将数字除以零的代码。\n\
    \n你总是可以确保你编写的代码中没有数字被除以零。这看起来没问题，但通常程序是交互式的，会向用户请求输入。如果用户输入一个用于除以零的数字，程序将执行它并立即停止，并打印出错误信息。自己尝试将一个数字除以零，看看结果：\n\
    \n```python\nresult = 5/0\nprint(result)\n```\n\n*结果：Traceback (most recent call\
    \ last)*\n*result = 5/0. ZeroDivisionError: division by zero*\n\n数字**5**显然不能被数字**0**除。下面的错误信息在尝试执行该行代码时停止了程序。错误信息还指出了发生的错误类型。尝试除以零导致了*ZeroDivisionError*，因此程序停止后无法执行任何代码。你刚刚破坏了程序。幸运的是，你正在学习使用try-except块，这样就不会再发生了！\n\
    \n添加*try-except*允许你处理诸如除以零之类的错误。这次添加一个try块来尝试将5除以零，然后打印。对于except块，你可以编写一个异常来打印错误原因：\n\
    \n```python\ntry:\n    result = 5/0\n    print(result)\nexcept Exception:\n  \
    \  print(\"Cannot divide by zero\")\n```\n\n*结果：Cannot divide by zero*\n\n程序的输出看起来比之前收到的要好。程序仍然有错误，但程序仍然能够毫无问题地执行其所有代码。输出向用户提供了代码中存在错误的原因。打印出的错误信息非常通用。同样重要的是要注意，代码中的任何错误都会给我们这个结果。如果你只是尝试打印一个在同一个try-except块中尚未赋值的变量呢？\n\
    \n```python\ntry:\n    print(unknown_variable)\nexcept Exception:\n    print(\"\
    Cannot divide by zero\")\n```\n\n**结果：** *Cannot divide by zero*\n\n这个输出甚至与你预期的相差甚远。它有错误的错误信息。代码并没有将任何数字除以零。它应该说一些关于糟糕的变量或未找到变量之类的话。我这样做是为了向你展示，如果except是**Exception**，except块会将try块中发现的任何错误视为一般错误。这就是为什么有必要具体说明错误类型，而不是使用通用的Exception。\n\
    \n有很多可能的错误类型。访问网站：https://docs.python.org/3/library/exceptions.html 获取你可能遇到的所有错误列表。*NameError*是变量缺失或未赋值所需的异常：\n\
    \n```python\ntry:\n    print(unknown_variable)\nexcept NameError as error:\n \
    \   print(error)\n```\n\n**结果：** name ‘unknown_variable’ is not defined\n\n现在异常是**NameError**，并且该错误类型的错误信息正在被打印出来。这就是你应该编写try-except块的方式。某些场景可能需要多个异常：\n\
    \n```python\ntry:\n    result = 5 / 0\n    print(result)\nexcept NameError as\
    \ error:\n    print(error)\nexcept ZeroDivisionError as error:\n    print(error)\n\
    ```\n\n*结果：division by zero*\n\n在这种情况下，异常是**ZeroDivisionError**。然而，程序首先检查是否有任何**NameError**异常。如果result变量未被赋值，它将导致**NameError**异常。当你知道要查找的错误类型时，没有必要打印自定义错误信息。*as\
    \ error*代码帮助你更好地说明错误。即使你不知道具体的错误，通用的Exception类仍然可以用来打印错误信息。回到我们最初的例子，使用*as error*打印程序捕获的第一个错误的消息：\n\
    \n```python\ntry:\n    result = 5/0\n    print(result)\nexcept Exception as error:\n\
    \    print(error)\n```\n\n*结果：division by zero*\n\n上面的代码能够捕获异常并打印与该错误类型相关的标准化消息。尽量具体说明你的异常。如果不是，总有通用的Exception类。你还没有学习过类，但我将在本书后面介绍这个主题。\n\
    \n## Else子句和Finally\n\n**else子句**可以添加到前面的代码中，以便在未发现异常时执行更多指令。使用ZeroDivisionError示例，你应该仅在未捕获异常时打印结果。为此，将结果除以1而不是0，并添加一个else子句来打印结果：\n\
    \n```python\ntry:\n    result = 5/1\nexcept Exception as error:\n    print(error)\n\
    else:\n    print(result)\n```\n\n*结果：5.0*\n\n没有捕获异常，因此程序打印了else子句的结果。如果你想让代码无论是否捕获异常都执行，你可以在代码末尾添加*finally*。*Finally*将始终执行，不考虑异常或错误：\n\
    \n```python\ntry:\n    result = 5/0\nexcept Exception as error:\n    print(error)\n\
    else:\n    print(result)\nfinally:\n    print(\"This program runs even if exceptions\
    \ occur.\")\n```\n\n*结果：division by zero. This program runs even if exceptions\
    \ occur.*\n\n## Raise\n\n当try-except中的代码块执行时，异常被捕获。Python解释器在执行时会自动捕获它。有一种方法可以让我们手动**引发**异常。你可以在try块中包含一个raise异常来手动触发异常。我们将使用我们的5/1示例并手动引发异常。这个例子通常不会引发异常，因为5可以很容易地被1除。我说通常，但这次，我包含了一个引发的异常：\n\
    \n```python\ntry:\n    result = 5/1\n    raise Exception\nexcept Exception:\n\
    ```"
