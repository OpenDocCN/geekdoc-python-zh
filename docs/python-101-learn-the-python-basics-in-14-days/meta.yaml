    # Day 1: Installing Python, Variables and Comments


    *Reading Time: 23 minutes*


    Enough of the small talk. In this chapter, you’re going to dive straight into
    setting up your environment to start coding in Python.


    You are installing the interpreter, which I discussed in the Introduction. You
    are also installing an Integrated Development Environment or IDE. The IDE gives
    you a friendly user interface that provides you with valuable tools to develop
    your programs. After that you’ll be learning about variables and how to place
    comments in a Python application.


    Throughout this book, you will be using Python 3. Keep in mind that Python 2 is
    considered the legacy version and is still used by some applications. The good
    thing is that if you know Python 3, you know Python 2. It won’t be difficult at
    all to understand a program written with the legacy version. At the time of this
    writing Python 3.9.5 is the latest version; however, know that all of the code
    you will be writing in this book can be used with version 3.7 or higher. In the
    sections that follow you’re going to be installing two primary things, Python
    and the IDE, PyCharm. In each section you’ll find instructions for each operating
    system, so for each tool skip to your OS and follow that portion only. One exception
    to this is for macOS you’ll be installing an additional tool called Homebrew,
    which you’ll learn about in that specific section.


