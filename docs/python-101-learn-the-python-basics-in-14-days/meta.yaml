    as the separator, it creates a new line between each string or argument! Separators
    can include any text or escape character. By default, the separator is a space.
    That means if a separator isn’t specified, space is included between each string
    argument provided.'
- md: "## User-defined Functions\n\nUser-defined functions give you the ability to\
    \ create your own functions in Python. You can tailor your code for specific use\
    \ cases. Functions can too be used to break your code into smaller pieces when\
    \ developing an application. Say you’d like to add features to your program. One\
    \ feature could be created and separated by a user-defined function. Essentially\
    \ you can make it easier to develop a program by breaking it into more manageable\
    \ pieces. This keeps your program running as expected while simultaneously integrating\
    \ new functionality.\n\n## Creating Functions\n\nTo create your own function,\
    \ start off with the word *def*. The syntax *def* is short for the definition\
    \ of the function. Following that is the function name. All function names are\
    \ unique, meaning they cannot have the same name as any other function used in\
    \ the same program. Be as descriptive as possible when considering a function\
    \ name. This is the name you will call in your program to complete a specific\
    \ task:\n\n```\ndef function_name():\n```\n\nParameters or arguments allow the\
    \ passing of values. Parameters are located between the parentheses. Right after\
    \ the parentheses is a colon “:” to indicate the start of the function code. Everything\
    \ else in the function is known as the body. Each function must include a body,\
    \ or a syntax error will occur. The code above has no body, so an error would\
    \ occur if you tried to run this code in its current state. Let’s add a print\
    \ statement, so this function actually works:\n\n```\ndef function_name():\n \
    \   print(\"My first User-defined Function!\")\n```\n\n*Result: Nothing*\n\nWell,\
    \ that isn’t quite what you expected. The program ran but did nothing but show\
    \ a black screen. That is because you just defined the function. To use a function\
    \ in a program, you now need to call that function. Calling refers to using the\
    \ function name in your program. Let’s try again with a call:\n\n```\ndef function_name():\n\
    \    print(\"My first User-defined Function!\")\nfunction_name()\n```\n\nResult:\
    \ My first User-defined Function!\n\nAfter calling the function, the program jumped\
    \ back to where the function was defined to run the block of code contained in\
    \ the body. Once this code executes, the program jumps back to proceed on with\
    \ the code after the function call. You can call this function as many times as\
    \ you like within the program. It can even be 4 times if you need to run this\
    \ task that many times:\n\n```\ndef function_name():\n    print(\"My first User-defined\
    \ Function!\")\n\nfunction_name()\nfunction_name()\nfunction_name()\nfunction_name()\n\
    ```\n\nResult: My first User-defined Function!\nMy first User-defined Function!\n\
    My first User-defined Function!\nMy first User-defined Function!\n\nOne thing\
    \ to keep in mind is that a function has to be defined before actually calling\
    \ it. You cannot call a function, then define it later on in the code. You’ll\
    \ receive an error such as this:\n\n**Result:** NameError: name ‘function_name’\
    \ is not defined\n\nOkay, so you now know how to create functions. What if you\
    \ want to add a parameter that can be used in the function? If you create a function\
    \ that prints out a welcome message, how do you include a user name each time\
    \ that function is called? All good questions and simple enough to do. Define\
    \ the function as done earlier. This function is going to be called **welcome_msg**:\n\
    \n```\ndef welcome_msg():\n    print(\"Welcome to Python 101\", name)\n\nwelcome_msg()\n\
    ```\n\n*Result:* NameError name ‘name’ is not defined\n\nThe body is defined,\
    \ but the error is the result of not having a value assigned to the name. We need\
    \ to create a parameter in our function. This is an easy fix. We just add a name\
    \ inside of the function’s parentheses and type in a name into the call function:\n\
    \n```\ndef welcome_msg(name):\n    print(\"Welcome to Python 101\", name)\nwelcome_msg(\"\
    Casey\")\n```\n\nResult: Welcome to Python 101 Casey\n\nNow each time the function\
    \ is called, it will be looking for input or argument for the parameter name.\
    \ The function will not run unless a name is supplied! Really cool how we can\
    \ tailor a function to a single person. Why not just welcome all the students\
    \ in the course by name?\n\n```\ndef welcome_msg(name):\n    print(\"Welcome to\
    \ Python 101\", name)\n\nwelcome_msg(\"Casey\")\nwelcome_msg(\"Ricardo\")\nwelcome_msg(\"\
    John\")\nwelcome_msg(\"Jacky\")\nwelcome_msg(\"Justin\")\n```\n\nResult: Welcome\
    \ to Python 101 Casey\nWelcome to Python 101 Ricardo\nWelcome to Python 101 John\n\
    Welcome to Python 101 Jacky\nWelcome to Python 101 Justin\n\nNow alter the code\
    \ so that there are now two parameters, including the book title and name:\n\n\
    ```\ndef welcome_msg(title, name):\n    print(\"Welcome to \" + title + name)\n\
    \nwelcome_msg(\"Python 101\", \" Casey\")\n```\n\nResult: Welcome to Python 101\
    \ Casey\n\n## Using User-defined Functions\n\nIn your Python Challenge, you created\
    \ a calculator. In this calculator, you were able to add, subtract, multiply,\
    \ and divide. For any of these operations in an actual program, you might be required\
    \ to quickly do these operations multiple times.\n\nThere is no need to have to\
    \ repeatedly write the same code over and over again because you can create a\
    \ function. That function can then be called to perform those operations. Try\
    \ the code below to see how you can create a multiply function that multiplies\
    \ two numbers:\n\n```\ndef multiply(num1, num2):\n    result = num1 * num2\n \
    \   print(result)\nmultiply(2, 3)\n```\n\nResult: 6\n\nWith this function, you\
    \ could quickly multiply several sets of numbers together:\n\n```\ndef multiply(num1,\
    \ num2):\n    result = num1 * num2\n    print(result)\n\nmultiply(2, 3)\nmultiply(4,\
    \ 2)\nmultiply(1, 6)\nmultiply(10, 10)\nmultiply(3, 5)\n```\n\nResult:\n6\n8\n\
    6\n100\n15\n\nUsing what you just learned, you can create a function that calculates\
    \ the area of a triangle. You might be in a math course that requires you to find\
    \ the area of various shapes. You can just create a function to do this for you.\
    \ For now, let’s build a function for the area of a triangle:\n\n```\ndef triangle_area(base,\
    \ height):\n    area = (0.5 * base * height)\n    print(\"The area of the triangle\
    \ is:\", area)\ntriangle_area(2, 5)\n```\n\n**Result:** *The area of the triangle\
    \ is: 5.0*\n\nWhat if I didn’t want to print anything out for the function? Usually,\
    \ a function just executes code and simply returns a result. That result is then\
    \ normally taken in as an input for the execution of other operations in the program.\
    \ In other words, that return result affects the output of other blocks of code\
    \ within the program.\n\nThe first triangle function worked well, but as I said\
    \ earlier, print statements within functions usually limit your ability to further\
    \ use the output in the actual program. If I made a function call three times\
    \ for three different sized triangles and wanted to find the total area, it would\
    \ be difficult using the previous code. Let’s try a new method with just returning\
    \ a result or area for the function, so the only output returned is a numerical\
    \ value.\n\n```\ndef triangle_area(base, height):\n    result = (0.5 * base *\
    \ height)\n    return result\n\ntriangle1 = triangle_area(2, 5)\nprint(triangle1)\n\
    ```\n\n**Result:** 5.0\n\nThe return function just returns the result of the function\
    \ but doesn’t actually display anything. Once the function is called in the second\
    \ to last line, the return value saves the result as a number in variable triangle1.\
    \ The result is then printed out using a print statement.\n\nWith the output being\
    \ a numeric variable, it is easier to further process the result later in the\
    \ program. For instance, you might want to convert this answer from feet to meters.\
    \ There are 3.281 feet in one meter, so you could take this result which is assumed\
    \ to be in feet, and divide by 3.281 to convert it to meters:\n\n```\ndef triangle_area(base,\
    \ height):\n    result = (0.5 * base * height)\n    return result\n\ntriangle1\
    \ = triangle_area(2, 5)\nprint(triangle1, \"feet\")\nprint(triangle1 / 3.281,\
    \ \"meters\")\n```\n\nResult: 5.0 feet\n1.5239256324291375 meters\n\nThere you\
    \ have it. The function output an area of a triangle in feet and converts that\
    \ number to meters. Now, how about trying to get the sum of three triangles with\
    \ different bases and heights in meters?\n\n```\ndef triangle_area(base, height):\n\
    \    result = (0.5 * base * height)\n    return result\n\ntriangle1 = triangle_area(2,\
    \ 5)\ntriangle2 = triangle_area(8, 3)\ntriangle3 = triangle_area(1, 9)\nsum_in_meters\
    \ = (triangle1 + triangle2 + triangle3) / 3.281\nprint(triangle1, \"feet - Triangle\
    \ 1\")\nprint(triangle2, \"feet - Triangle 2\")\nprint(triangle3, \"feet - Triangle\
    \ 3\")\n```"
  mdcn: "## 用户自定义函数\n\n用户自定义函数使你能够在 Python 中创建自己的函数。你可以为特定用例定制代码。在开发应用程序时，函数也可用于将代码分解成更小的部分。假设你想为程序添加功能。其中一个功能可以通过用户自定义函数来创建和分离。本质上，通过将程序分解成更易于管理的部分，你可以使程序开发变得更容易。这能确保你的程序按预期运行，同时集成新功能。\n\
    \n## 创建函数\n\n要创建自己的函数，首先使用 *def* 关键字。*def* 是函数定义的缩写。紧随其后的是函数名。所有函数名都是唯一的，这意味着它们不能与同一程序中使用的任何其他函数同名。在考虑函数名时，应尽可能具有描述性。这是你将在程序中调用以完成特定任务的名称：\n\
    \n```\ndef function_name():\n```\n\n参数或实参允许传递值。参数位于括号之间。括号后面是一个冒号“:”，表示函数代码的开始。函数中的其余部分称为函数体。每个函数必须包含一个函数体，否则会发生语法错误。上面的代码没有函数体，因此如果你尝试运行当前状态的代码，将会出错。让我们添加一个\
    \ print 语句，使这个函数真正起作用：\n\n```\ndef function_name():\n    print(\"My first User-defined\
    \ Function!\")\n```\n\n*结果：无*\n\n嗯，这和你预期的不太一样。程序运行了，但除了显示一个黑屏外什么也没做。那是因为你只是定义了函数。要在程序中使用函数，你现在需要调用该函数。调用指的是在程序中使用函数名。让我们再次尝试调用：\n\
    \n```\ndef function_name():\n    print(\"My first User-defined Function!\")\n\
    function_name()\n```\n\n结果：My first User-defined Function!\n\n调用函数后，程序会跳回到函数定义的位置，运行函数体中包含的代码块。一旦这段代码执行完毕，程序会跳回到函数调用之后的代码继续执行。你可以在程序中多次调用此函数。如果你需要多次运行此任务，甚至可以调用\
    \ 4 次：\n\n```\ndef function_name():\n    print(\"My first User-defined Function!\"\
    )\n\nfunction_name()\nfunction_name()\nfunction_name()\nfunction_name()\n```\n\
    \n结果：My first User-defined Function!\nMy first User-defined Function!\nMy first\
    \ User-defined Function!\nMy first User-defined Function!\n\n需要注意的一点是，函数必须在实际调用之前定义。你不能先调用函数，然后在代码后面再定义它。你会收到如下错误：\n\
    \n**结果：** NameError: name ‘function_name’ is not defined\n\n好的，你现在知道如何创建函数了。如果你想添加一个可以在函数中使用的参数怎么办？如果你创建一个打印欢迎消息的函数，如何在每次调用该函数时包含用户名？这些都是很好的问题，而且实现起来很简单。像之前一样定义函数。这个函数将被命名为\
    \ **welcome_msg**：\n\n```\ndef welcome_msg():\n    print(\"Welcome to Python 101\"\
    , name)\n\nwelcome_msg()\n```\n\n*结果：* NameError name ‘name’ is not defined\n\n\
    函数体已定义，但错误是由于没有为 name 赋值造成的。我们需要在函数中创建一个参数。这很容易修复。我们只需在函数的括号内添加一个 name，并在调用函数时输入一个名字：\n\
    \n```\ndef welcome_msg(name):\n    print(\"Welcome to Python 101\", name)\nwelcome_msg(\"\
    Casey\")\n```\n\n结果：Welcome to Python 101 Casey\n\n现在每次调用函数时，它都会寻找参数 name 的输入或实参。除非提供名字，否则函数将不会运行！我们可以为单个人定制函数，这真的很酷。为什么不按名字欢迎课程中的所有学生呢？\n\
    \n```\ndef welcome_msg(name):\n    print(\"Welcome to Python 101\", name)\n\n\
    welcome_msg(\"Casey\")\nwelcome_msg(\"Ricardo\")\nwelcome_msg(\"John\")\nwelcome_msg(\"\
    Jacky\")\nwelcome_msg(\"Justin\")\n```\n\n结果：Welcome to Python 101 Casey\nWelcome\
    \ to Python 101 Ricardo\nWelcome to Python 101 John\nWelcome to Python 101 Jacky\n\
    Welcome to Python 101 Justin\n\n现在修改代码，使其包含两个参数，包括书名和名字：\n\n```\ndef welcome_msg(title,\
    \ name):\n    print(\"Welcome to \" + title + name)\n\nwelcome_msg(\"Python 101\"\
    , \" Casey\")\n```\n\n结果：Welcome to Python 101 Casey\n\n## 使用用户自定义函数\n\n在你的 Python\
    \ 挑战中，你创建了一个计算器。在这个计算器中，你能够进行加、减、乘、除运算。在实际程序中进行这些运算时，你可能需要快速多次执行这些操作。\n\n没有必要一遍又一遍地重复编写相同的代码，因为你可以创建一个函数。然后可以调用该函数来执行这些操作。尝试下面的代码，看看如何创建一个乘法函数来乘以两个数字：\n\
    \n```\ndef multiply(num1, num2):\n    result = num1 * num2\n    print(result)\n\
    multiply(2, 3)\n```\n\n结果：6\n\n使用这个函数，你可以快速将几组数字相乘：\n\n```\ndef multiply(num1,\
    \ num2):\n    result = num1 * num2\n    print(result)\n\nmultiply(2, 3)\nmultiply(4,\
    \ 2)\nmultiply(1, 6)\nmultiply(10, 10)\nmultiply(3, 5)\n```\n\n结果：\n6\n8\n6\n\
    100\n15\n\n运用你刚刚学到的知识，你可以创建一个计算三角形面积的函数。你可能正在上一门数学课程，需要你求各种形状的面积。你可以创建一个函数来为你做这件事。现在，让我们为三角形面积构建一个函数：\n\
    \n```\ndef triangle_area(base, height):\n    area = (0.5 * base * height)\n  \
    \  print(\"The area of the triangle is:\", area)\ntriangle_area(2, 5)\n```\n\n\
    **结果：** *The area of the triangle is: 5.0*\n\n如果我不想为函数打印任何东西怎么办？通常，函数只是执行代码并简单地返回一个结果。然后，该结果通常作为输入用于程序中其他操作的执行。换句话说，返回的结果会影响程序中其他代码块的输出。\n\
    \n第一个三角形函数运行良好，但正如我之前所说，函数中的 print 语句通常会限制你在实际程序中进一步使用输出的能力。如果我为三个不同大小的三角形调用函数三次，并想求出总面积，使用之前的代码会很困难。让我们尝试一种新方法，只返回函数的结果或面积，这样返回的唯一输出就是一个数值。\n\
    \n```\ndef triangle_area(base, height):\n    result = (0.5 * base * height)\n\
    \    return result\n\ntriangle1 = triangle_area(2, 5)\nprint(triangle1)\n```\n\
    \n**结果：** 5.0\n\nreturn 函数只是返回函数的结果，但实际上并不显示任何内容。一旦在倒数第二行调用函数，返回值就会将结果作为数字保存在变量\
    \ triangle1 中。然后使用 print 语句打印出结果。\n\n由于输出是一个数字变量，在程序的后续部分更容易进一步处理结果。例如，你可能想将这个答案从英尺转换为米。一米等于\
    \ 3.281 英尺，因此你可以将这个假定为英尺的结果除以 3.281 来将其转换为米：\n\n```\ndef triangle_area(base, height):\n\
    \    result = (0.5 * base * height)\n    return result\n\ntriangle1 = triangle_area(2,\
    \ 5)\nprint(triangle1, \"feet\")\nprint(triangle1 / 3.281, \"meters\")\n```\n\n\
    结果：5.0 feet\n1.5239256324291375 meters\n\n就是这样。函数输出了以英尺为单位的三角形面积，并将该数字转换为米。现在，尝试计算三个不同底和高的三角形的面积总和（以米为单位）怎么样？\n\
    \n```\ndef triangle_area(base, height):\n    result = (0.5 * base * height)\n\
    \    return result\n\ntriangle1 = triangle_area(2, 5)\ntriangle2 = triangle_area(8,\
    \ 3)\ntriangle3 = triangle_area(1, 9)\nsum_in_meters = (triangle1 + triangle2\
    \ + triangle3) / 3.281\nprint(triangle1, \"feet - Triangle 1\")\nprint(triangle2,\
    \ \"feet - Triangle 2\")\nprint(triangle3, \"feet - Triangle 3\")\n```"
