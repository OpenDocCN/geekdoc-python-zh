- md: 'underscores to represent spaces is standard practice in Python. The Python
    files you are creating are scripts or programs. There are other Python files that
    you will learn about called modules, packages, or libraries. They all use the
    .py extension!


    When writing code, it’s always ideal to follow best practices or widely known
    standards. Fortunately, Python has something known as the [Python’s Developer’s
    Guide](https://docs.python.org/3/glossary.html#term-developer-guide). This guide
    has documentation known as Python Enhancement Proposals (PEP), proposals that
    define coding standards for Python. In this book, I will be using [PEP 8 entitled
    Style Guide for Python Code](https://peps.python.org/pep-0008/) standard.


    The guide states, “One of Guido’s key insights is that code is read much more
    often than it is written. The guidelines provided here are intended to improve
    the readability of code and make it consistent across the wide spectrum of Python
    code.” We must keep this legacy going by upholding these standards. Time to dive
    in!


    ## Understanding Variables


    One of the essential elements of a program is the use of variables. A **variable**
    is a name that holds a value in memory that can be accessed later on in a program.
    That sounds a little complicated. Let’s illustrate this with an example.


    Say I want to give a user that’s also a nerd with the name Casey. I can store
    the name **Casey** in a variable called **nerd_name** with the following code:


    ```

    nerd_name = "Casey"

    ```


    Wow, that seemed effortless. I just assigned the name Casey to the variable **nerd_name**.
    I can now use the variable **nerd_name** to represent a nerd named Casey throughout
    the program.


    Notice that there are quotations marks around “Casey.” When creating variables
    of text in Python, these are required. Text assigned to variables is known as
    **Strings**. The name Casey in our example is a string. Suppose I changed the
    name of **nerd_name** to “Kelvin”. The text Kelvin is now a string that the rest
    of the program can access by referencing the variable.


    ```

    nerd_name = "Kelvin"

    ```


    Leaving out a quotation could result in an error while running the program. It
    can also lead to the variable being inaccessible to the rest of the program. IDEs
    make it impossible to leave out one of the quotes. You’ll get a warning right
    away if you forget. IDEs are great for double-checking our work on the fly!


    Variables can store much more than just strings. They can store other data types
    such as numeric values, tables, lists, tuples, sets, and dictionaries. More to
    come on all of these data types as we proceed with the book.


    ## Naming variables


    Correctly naming our variables is essential! It is necessary to keep it simple
    and descriptive enough to indicate what that variable is storing. Say, for instance,
    you wanted to store a student name in a variable. You might name that variable
    **student_name** or **studentName**. If you wanted to reserve that student’s age,
    you might call the variable **student_age** or **studentAge**. Please note that
    all variable names must be unique. If you have more than one student, you could
    assign a number such as **student_name3** or **studentAge3** for the third student
    variable.


    You may have noticed a few things with these variable names you created. Each
    variable starts with a lowercase letter. None of our variables should begin with
    a capital letter or any special characters. You cannot use spaces for variable
    names. In this book, I use the format with underscores to name variables. So,
    each variable follows the **student_name** format. Using underscores is a preference
    of mine and the PEP 8 style guide. So, technically you can choose whatever you’d
    like. However, I would strongly encourage you to use the PEP 8 style, as it’s
    what you’ll most likely see in other Python projects.


    ## Data Types


    ### Strings


    You learned about strings already. In our example, my string was just one word.
    What if you wanted that variable to contain more words? Is that possible? Yes,
    a string variable can contain more than one word. You can have entire sentences
    assigned to a string variable. Let’s see this in action by assigning a sentence
    to the variable called **nerd_welcome**:


    ```

    nerd_welcome = "Welcome to the Nerd Challenges Python 101 Course."

    ```


    The assignment above sets the string **“Welcome to Nerd Challenges Python 101
    Course”** to the variable **nerd_welcome**.


    ### Numbers


    In addition to string datatypes, there are also number datatypes. You can save
    numbers directly into variables in the same manner. The only difference is that
    you would leave off the quotations. Let’s give our nerd the age of 34:


    ```

    nerd_age = 34

    ```


    Since I left off the quotations, Python assigned the variable as a number. The
    **nerd_age** variable would still work if quotations were left on, but we would
    save the age as a string. Storing numbers as strings is a common mistake that
    can lead to programming errors when conducting mathematical calculations. Remember,
    when you want to assign numbers to variables to leave off the quotation marks.


    Now that was reasonably simple. Let us talk more about numbers. The number 34
    is a whole number. In Python, a whole number is called an **integer**. Ok, but
    what is a decimal number called then? A decimal number is known as a **float**.
    The difference between an integer and a float variable may not seem significant
    now but will be in later chapters.


    ### Mathematical Operators


    With numbers, assignments also come the ability to assign math operations. If
    for some reason, that nerd had a birthday today, I could increment his age by
    adding the number 1, like so.


    ```

    nerd_age = 34 + 1

    print(nerd_age)

    ```


    Result: 35


    The **nerd_age** variable is now assigned a value of 35. That is right, and Python
    treats **34 + 1** as a mathematical expression. The plus sign is one of many arithmetic
    operators available for use in Python. The table below shows some of the standard
    operators you can use for primary math assignments.


    | Operator | Name | Example |

    | :--- | :--- | :--- |

    | + | Addition | x + y |

    | - | Subtraction | x - y |

    | * | Multiplication | x * y |

    | ** | Exponent | x ** y |

    | / | Division | x / y |

