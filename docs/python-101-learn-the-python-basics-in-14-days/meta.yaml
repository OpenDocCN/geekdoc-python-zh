    1. Visual Studio Code ([https://code.visualstudio.com](https://code.visualstudio.com))
    - The go to Node.js editor. As always though, you’re free to choose any IDE you’d
    like, yes even notepad and vim.

    2. Curl ([https://curl.se](https://curl.se)) - A handy command line tool that
    allows you to transfer HTTP/HTTPS data.

    3. Homebrew (**macOS only**) - A handy tool that makes installing developer tools
    super simple on mac.

    4. Git CLI (https://git-scm.com) - A free and open source distributed version
    control system that you can use to keep track of your source code. You’ll need
    this in conjunction with a GitHub account.

    5. Node.js (https://nodejs.org/en/) - A JavaScript runtime that is built on Chrome’s
    V8 JavaScript engine, it allows you to run JavaScript locally on your machine.

    6. Gatsby CLI (https://www.npmjs.com/package/gatsby-cli) - A command line interface
    that you can use to quickly start your Gatsby site.


    In this section you will also find OS-specific instructions for three different
    Operating Systems:


    - Windows 10

    - MacOS

    - Linux (Ubuntu)


    You can skip to the respective section for whichever Operating System you are
    currently using. If you are using a different operating system, the instructions
    should be somewhat similar. For example, if you’re using Linux Mint, you can probably
    follow along via the Ubuntu section. With that being said, all of these tools
    are well supported and have excellent documentation. If you get stuck on a particular
    tool go to the website for that particular tool and do some searching, odds are
    you''ll find exactly what you''re looking for to resolve the issue.


    ## Installing VS Code


    Visual Studio Code is a lightweight awesome source code editor, what I love most
    about it is it is cross platform. Which means it works on macOS, Windows and Linux,
    as a developer I work on different host OS’s depending on the work being done
    and it’s helpful to keep the IDE experience consistent across different languages.
    Also, VSCode has a rich Plugin ecosystem, which is very powerful, we’ll explore
    some of the better GatsbyJS plugins later.


    ### Windows Setup


    Head to https://code.visualstudio.com/download and click download for Windows


    ![](img/94a1435e4acaf57ed4f2a785450910d2_446_0.png)


    I’ll be using the 64 bit User Installer; if you’d like to install it for all users
    on your system, then use the System Installer. Once the file is downloaded, go
    ahead and install it. You can use all of the default options, feel free to change
    any options that meet your needs.


    ### MacOS Setup


    Head to [https://code.visualstudio.com/download](https://code.visualstudio.com/download)
    and click download for Mac, in my case this is the Apple Silicon; but if you’re
    on the Intel Chipset then choose that one.


    ![](img/94a1435e4acaf57ed4f2a785450910d2_448_0.png)


    ### Linux Setup


    To install Visual Studio Code on Ubuntu 20.04.2 LTS you can do it via the Ubuntu
    Snap Store (https://snapcraft.io/code) or via the command line. To install it
    graphically open up the Snap store and search for Visual Studio Code, or go to
    the URL provided and click Install.


    ![](img/94a1435e4acaf57ed4f2a785450910d2_449_0.png)


    As a developer though, you should be comfortable operating the terminal. To do
    this, open up the **terminal** application and enter the command.


    ```

    sudo snap install code --classic

    ```


    You should now be able to launch Visual Studio Code, by going to your applications
    and clicking on Visual Studio Code! Go ahead and do this, to make sure everything
    is setup properly. Alternatively, you can open this up through the **terminal**
    by typing this command


    ```

    code

    ```


    You should now see Visual Studio Code open! Congrats 😊!


    ## Installing Curl


    **cURL** is a command line tool that allows you to transfer HTTP and HTTPS (it
    also supports other protocols) data via the command line it is free and open source.
    To install it, run these commands in a terminal.


    ### Windows Setup


    Fortunately as of Windows 10 (and presumably Windows 11) curl is now installed
    by default. To verify this open up the Command Prompt and type the following


    ```

    curl --version

    ```


    You should see something similar to the following


    ```

    Terminal Output

    C:\Users\casey>curl --version

    curl 7.55.1 (Windows) libcurl/7.55.1 WinSSL

    Release-Date: 2017-11-14, security patched: 2019-11-05

    Protocols: dict file ftp ftps http https imap imaps pop3 pop3s smtp smtps telnet
    tftp

    Features: AsynchDNS IPv6 Largefile SSPI Kerberos SPNEGO NTLM SSL

    ```


    If for some reason, curl isn’t installed, you can download it here: [https://curl.se/windows/](https://curl.se/windows/)


    ### MacOS Setup


    Fortunately on macOS curl comes installed by default; but let’s verify open up
    a terminal window and type the following:


    ```

    curl --version

    ```


    You should see something similar to the following


    ![](img/94a1435e4acaf57ed4f2a785450910d2_454_0.png)


    ### Linux Setup


    This updates the package indexes so that you can download the latest files


    ```

    sudo apt-get update

    ```


    Next, install the curl package


    ```

    sudo apt-get install curl

    ```


    To verify that curl has been installed, run this command


    ```

    curl --version

    ```


    You should see


    ```

    Terminal Output

    curl 7.68.0 (x86_64-pc-linux-gnu)

    ```


    ## Installing git (and Homebrew if MacOS)


    You''re going to be utilizing a tool called git, which is an open source distributed
    version control system which allows you to keep track of source code changes over
    time. Huh? It is going to help track changes to your code, so if you need to go
    back in time, you can pretty easily!


    ### Windows Setup


    Go to the following URL: https://git-scm.com/downloads and click on Download for
    Windows. When installing it, you can accept all of the defaults. Once it’s installed,
    open up Command Prompt and type in the following:


    ```

    git --version

    ```


    You should see something similar to the following


    ```

    Terminal output

    git version 2.34.1.windows.1

    ```


    ### MacOS Setup


    Homebrew is a developer tool that allows you to install packages and software
    tools really easily on macOS and Linux. Installing it is pretty simple, open up
    a terminal and run the following command


    ```

    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

    ```


    Then simply follow the instructions and accept the defaults, you should see something
    similar to the following output. Note: It may prompt you for your admin password,
    this is fine.


    ```

    administrator@admins-Mac-mini ~ % /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

    ==> Checking for `sudo` access (which may request your password)...

    ==> This script will install:

    /opt/homebrew/bin/brew

    /opt/homebrew/share/doc/homebrew

    /opt/homebrew/share/man/man1/brew.1

    /opt/homebrew/share/zsh/site-functions/_brew

    /opt/homebrew/etc/bash_completion.d/brew

    /opt/homebrew

    ==> The following new directories will be created:

    /opt/homebrew/bin

    /opt/homebrew/etc

    /opt/homebrew/include

    /opt/homebrew/lib

    /opt/homebrew/sbin

    /opt/homebrew/share

    /opt/homebrew/var

    /opt/homebrew/opt

    /opt/homebrew/share/zsh

    /opt/homebrew/share/zsh/site-functions

    /opt/homebrew/var/homebrew

    /opt/homebrew/var/homebrew/linked

    /opt/homebrew/Cellar

    /opt/homebrew/Caskroom

    /opt/homebrew/Frameworks

    ==> /opt/homebrew/bin/brew command Line Tools will be installed.

    Press RETURN to continue or any other key to abort:

    ```


    Press RETURN and let it install everything it needs. It will probably take several
    minutes for Homebrew to download and install everything it needs, so grab some
    brew ☕


    Once Homebrew is installed you should see a section called **Next steps** that
    has two commands, copy both of those commands and run them. It should look similar
    to the below (but not exactly! So don’t copy these, copy the ones in your terminal)


    ```

    echo ''eval "$(/opt/homebrew/bin/brew shellenv)"'' >> /Users/administrator/.zprofile

    eval "$(/opt/homebrew/bin/brew shellenv)"

    ```'
  mdcn: '**可访问性**和**图片优化** - GatsbyJS 最酷的功能之一在于，许多最佳实践（如可访问性和图片优化）已直接内置于框架中。这并不意味着你永远无需进行图片优化，或所有内容都100%可访问；然而，它确实为你节省了大量工作，至少在初期是如此。


    以上仅是部分优势，远非完整列表。今天的内容摘自我们的《GatsbyJS 101》一书，将向你展示如何安装IDE、Node.js，并在Gatsby Cloud上使用GatsbyJS加载你的第一个网站。背景介绍到此为止，让我们开始动手吧，极客们！


    ## 设置你的环境


    与所有编程语言和框架一样，你首先必须设置所有必需的工具。为了构建一个GatsbyJS网站，我们需要安装以下工具：


    1.  Visual Studio Code ([https://code.visualstudio.com](https://code.visualstudio.com))
    - 首选的Node.js编辑器。不过，一如既往，你可以自由选择任何你喜欢的IDE，是的，甚至记事本和vim也可以。

    2.  Curl ([https://curl.se](https://curl.se)) - 一个方便的命令行工具，允许你传输HTTP/HTTPS数据。

    3.  Homebrew (**仅限macOS**) - 一个方便的工具，使在Mac上安装开发者工具变得超级简单。

    4.  Git CLI (https://git-scm.com) - 一个免费且开源的分布式版本控制系统，你可以用它来跟踪你的源代码。你需要将其与GitHub账户结合使用。

    5.  Node.js (https://nodejs.org/en/) - 一个基于Chrome V8 JavaScript引擎构建的JavaScript运行时，它允许你在本地机器上运行JavaScript。

    6.  Gatsby CLI (https://www.npmjs.com/package/gatsby-cli) - 一个命令行界面，你可以用它来快速启动你的Gatsby站点。


    在本节中，你还将找到针对三种不同操作系统的特定说明：


    -   Windows 10

    -   MacOS

    -   Linux (Ubuntu)


    你可以跳转到你当前使用的操作系统对应的章节。如果你使用的是不同的操作系统，说明应该大致相似。例如，如果你使用的是Linux Mint，你可能可以通过Ubuntu章节来操作。话虽如此，所有这些工具都得到了良好支持，并有出色的文档。如果你在某个特定工具上遇到困难，请访问该工具的网站并进行搜索，很可能你会找到解决该问题的确切方法。


    ## 安装VS Code


    Visual Studio Code是一个轻量级且出色的源代码编辑器，我最喜欢它的一点是它是跨平台的。这意味着它可以在macOS、Windows和Linux上工作，作为一名开发者，我根据工作内容在不同的主机操作系统上工作，保持IDE体验在不同语言间的一致性非常有帮助。此外，VSCode拥有丰富的插件生态系统，功能非常强大，我们稍后将探索一些更好的GatsbyJS插件。


    ### Windows设置


    前往 https://code.visualstudio.com/download 并点击Windows的下载按钮


    ![](img/94a1435e4acaf57ed4f2a785450910d2_446_0.png)


    我将使用64位用户安装程序；如果你想为系统上的所有用户安装，请使用系统安装程序。文件下载完成后，继续安装。你可以使用所有默认选项，也可以根据需要更改任何选项。


    ### MacOS设置


    前往 [https://code.visualstudio.com/download](https://code.visualstudio.com/download)
    并点击Mac的下载按钮，在我的情况下是Apple Silicon；但如果你使用的是Intel芯片组，则选择那个。


    ![](img/94a1435e4acaf57ed4f2a785450910d2_448_0.png)


    ### Linux设置


    要在Ubuntu 20.04.2 LTS上安装Visual Studio Code，你可以通过Ubuntu Snap Store (https://snapcraft.io/code)
    或通过命令行进行安装。要进行图形化安装，请打开Snap商店并搜索Visual Studio Code，或访问提供的URL并点击安装。


    ![](img/94a1435e4acaf57ed4f2a785450910d2_449_0.png)


    不过，作为一名开发者，你应该能够熟练操作终端。为此，打开**终端**应用程序并输入命令。


    ```

    sudo snap install code --classic

    ```


    现在你应该能够启动Visual Studio Code，只需前往你的应用程序并点击Visual Studio Code！请继续操作，以确保一切设置正确。或者，你可以通过**终端**输入以下命令来打开它


    ```

    code

    ```


    现在你应该看到Visual Studio Code打开了！恭喜 😊！


    ## 安装Curl


    **cURL**是一个命令行工具，允许你通过命令行传输HTTP和HTTPS（它也支持其他协议）数据，它是免费且开源的。要安装它，请在终端中运行以下命令。


    ### Windows设置


    幸运的是，从Windows 10（以及可能的Windows 11）开始，curl现在默认安装。要验证这一点，请打开命令提示符并输入以下内容


    ```

    curl --version

    ```


    你应该看到类似以下的内容


    ```

    Terminal Output

    C:\Users\casey>curl --version

    curl 7.55.1 (Windows) libcurl/7.55.1 WinSSL

    Release-Date: 2017-11-14, security patched: 2019-11-05

    Protocols: dict file ftp ftps http https imap imaps pop3 pop3s smtp smtps telnet
    tftp

    Features: AsynchDNS IPv6 Largefile SSPI Kerberos SPNEGO NTLM SSL

    ```


    如果由于某种原因curl没有安装，你可以在这里下载：[https://curl.se/windows/](https://curl.se/windows/)


    ### MacOS设置


    幸运的是，在macOS上curl默认已安装；但让我们验证一下，打开一个终端窗口并输入以下内容：


    ```

    curl --version

    ```


    你应该看到类似以下的内容


    ![](img/94a1435e4acaf57ed4f2a785450910d2_454_0.png)


    ### Linux设置


    这会更新包索引，以便你可以下载最新的文件


    ```

    sudo apt-get update

    ```


    接下来，安装curl包


    ```

    sudo apt-get install curl

    ```


    要验证curl是否已安装，请运行此命令


    ```

    curl --version

    ```


    你应该看到


    ```

    Terminal Output

    curl 7.68.0 (x86_64-pc-linux-gnu)

    ```


    ## 安装git（如果是MacOS则包括Homebrew）


    你将使用一个名为git的工具，它是一个开源的分布式版本控制系统，允许你跟踪源代码随时间的变化。嗯？它将帮助跟踪代码的更改，因此如果你需要回溯时间，你可以相当容易地做到！


    ### Windows设置


    前往以下网址：https://git-scm.com/downloads 并点击Windows的下载按钮。安装时，你可以接受所有默认设置。安装完成后，打开命令提示符并输入以下内容：


    ```

    git --version

    ```


    你应该看到类似以下的内容


    ```

    Terminal output

    git version 2.34.1.windows.1

    ```


    ### MacOS设置


    Homebrew是一个开发者工具，允许你在macOS和Linux上非常轻松地安装软件包和软件工具。安装它相当简单，打开终端并运行以下命令


    ```

    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

    ```


    然后只需按照说明操作并接受默认设置，你应该会看到类似以下的输出。注意：它可能会提示你输入管理员密码，这是正常的。


    ```

    administrator@admins-Mac-mini ~ % /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

    ==> Checking for `sudo` access (which may request your password)...

    ==> This script will install:

    /opt/homebrew/bin/brew

    /opt/homebrew/share/doc/homebrew

    /opt/homebrew/share/man/man1/brew.1

    /opt/homebrew/share/zsh/site-functions/_brew

    /opt/homebrew/etc/bash_completion.d/brew

    /opt/homebrew

    ==> The following new directories will be created:

    /opt/homebrew/bin

    /opt/homebrew/etc

    /opt/homebrew/include

    /opt/homebrew/lib

    /opt/homebrew/sbin

    /opt/homebrew/share

    /opt/homebrew/var

    /opt/homebrew/opt

    /opt/homebrew/share/zsh

    /opt/homebrew/share/zsh/site-functions

    /opt/homebrew/var/homebrew

    /opt/homebrew/var/homebrew/linked

    /opt/homebrew/Cellar

    /opt/homebrew/Caskroom

    /opt/homebrew/Frameworks

    ==> /opt/homebrew/bin/brew command Line Tools will be installed.

    Press RETURN to continue or any other key to abort:

    ```


    按回车键让它安装所有需要的东西。Homebrew下载和安装所有需要的东西可能需要几分钟时间，所以去冲杯咖啡吧 ☕


    Homebrew安装完成后，你应该会看到一个名为**Next steps**的部分，其中包含两个命令，复制这两个命令并运行它们。它应该看起来类似于以下内容（但不完全一样！所以不要复制这些，复制你终端中的那些）


    ```

    echo ''eval "$(/opt/homebrew/bin/brew shellenv)"'' >> /Users/administrator/.zprofile

    eval "$(/opt/homebrew/bin/brew shellenv)"

    ```'
