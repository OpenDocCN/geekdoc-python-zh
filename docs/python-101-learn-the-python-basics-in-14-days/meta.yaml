    \n```\nday_conversion = {\n    \"Mon\": \"Monday\",\n    \"Tues\": \"Tuesday\"\
    ,\n    \"Wed\": \"Wednesday\",\n    \"Thurs\": \"Thursday\",\n    \"Fri\": \"\
    Friday\",\n    \"Sat\": \"Saturday\",\n    \"Sun\": \"Sunday\",\n}\nprint(type(day_conversion))\n\
    ```\n\nResult: <class 'dict'>\n\nPython can also do math calculations on numbers\
    \ of two different data types. See what happens when I add **nerd_age = 34**,\
    \ which is an integer, and **pi = 3.141592653589793**, which is a float together:\n\
    \n```\nnerd_age = 34\npi = 3.1415926535897\nsum = nerd_age + pi\nprint(sum)\n\
    print(type(sum))\n```\n\n*Result: 37.1415926535897 <class 'float'>*\n\nYou'll\
    \ notice that the final value or sum is the data type **float**. Python converted\
    \ this for you automatically. It wouldn't make any sense for the sum to be an\
    \ integer. Doing this would result in cutting off the decimal portion, yielding\
    \ an incorrect value. Python helps us out, so this does not occur by implicit\
    \ type conversion.\n\n## Explicit Type Conversion\n\n**Explicit type conversion**\
    \ uses predefined functions to convert a data type from one to another. Below\
    \ is a list of the common predefined functions; however, there are many others.\n\
    \n- **str( )** - converts a value to a string\n- **int( )** - converts a value\
    \ to an integer number\n- **float( )** - converts a value to a float/decimal number\n\
    - **list( )** - converts a value to a list\n- **tuple( )** - converts a value\
