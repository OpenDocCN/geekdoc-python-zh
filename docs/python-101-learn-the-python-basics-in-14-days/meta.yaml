    ## Tuples


    A **tuple** is closely similar to a list in Python. It is a type of data structure
    in which it acts as a container to store different values. Just as a list, multiple
    data types can be stored within a single tuple. All values within the tuple are
    too executed in the same manner in which they are ordered. This essentially means
    that if you create a tuple, it prints out in the order in which it was assigned
    to the variable.


    The biggest thing to remember with tuples is that their contents cannot be later
    changed or modified. This characteristic of tuples is known as **immutable**.
    Once we assign a tuple to a variable, there is no changing values within that
    tuple. Therefore, if you are working with any data with values that must be changed,
    it’s recommended that you use a list! The contents within a tuple are permanent.
    Tuples are generally used when data in your program is not expected to change.


    A tuple is denoted by open and close parentheses ( ). You can put variables of
    any data type or element within these parentheses.


    Let’s go-ahead to create your first tuple with a collection of shapes. I assign
    the variable **my_shapes = (Circle, Rectangle, Square, Triangle)**. These shapes
    that I am working with within the program are permanent. I have no plans to add,
    remove, or modify any of them from our tuple. They are essentially fixed. Let’s
    print out your first tuple to see what we get.


    ```

    my_shapes = ("Circle", "Rectangle", "Triangle", "Square")

    print(my_shapes)

    ```


    Result: (‘Circle’, ‘Rectangle’, ‘Triangle’, ‘Square’)


    ### Data within Tuples


    Accessing data or items in tuples has the same syntax as lists. You use square
    brackets to identify the index of the data being selected. Say, for instance,
    you would like to print out the shape “Rectangle”. Your code would simply be print(my_shapes[1]),
    which is the 2nd value in the my_shapes tuple. But hey, what if you decide instead
    of a “Rectangle” we prefer a “Trapezoid”? You have easily changed values in a
    list before. Let us see what happens when you try the following:


    ```

    my_shapes = ("Circle", "Rectangle", "Triangle",

    "Square")

    my_shapes[1] = "Trapezoid"

    print(my_shapes)

    ```


    Result: SyntaxError: invalid character ‘“’ (U+201C)


    That looks a bit messy! I don’t think we have seen any error messages like this
    before. I did talk about how tuples are immutable. This means values in a tuple
    cannot be changed for anything. In our example, you tried to change a **“Rectangle”**
    to a **“Trapezoid”**. This is not allowed when working with tuples. That brings
    us to another conclusion as well. All those list functions from our table discussed
    earlier do not work with tuples because they involve changing their contents.


    One last topic to review with tuples is datatypes. There might come a time when
    you would like to store more than just a string or a number value in a tuple.
    You can even store a list inside of a tuple and vice versa. Take a look at the
    code below:


    ```

    my_shapes = ("Circle", "Rectangle", "Triangle",

    "Square", [0, 4, 4, 3])

    print(my_shapes)

    ```


    Result: (‘Circle’, ‘Rectangle’, ‘Triangle’, ‘Square’, [0, 4, 4, 3])


    I just created a tuple with a list embedded into it!


    ## Sets


    A **set** is another datatype worth discussing. It is used for storing data that
    is unordered and where duplicates are not required. Think of a single dice or
    a die. A die has six possible values. If rolled, it can only have one value once,
    so no number of dots on one die is duplicated. I can represent the die as a set.
    I can enclose the die’s values in curly braces { }:


    ```

    my_die = {1, 2, 3, 4, 5, 6, 1, 2}

    print(my_die)

    ```


    *Result:* {1, 2, 3, 4, 5, 6}


    In the output notice, our set does not contain any duplicates. The set only stores
    a value once. You can add the same 6 die values a hundred times, which won’t change
    our output. In this example, 6 values are in numerical order. This is not always
    the case in sets. You should **never** expect the values are executed or stored
    in any order. Values within a set should always be treated as arbitrary. Your
    first number could be any of the numbers within the set, and the same goes for
    every value within the set.


    There is also a way to search through the set for a specific value. If you wanted
    to know if the number 3 is in our my_die set, you could write:


    ```

    my_die = {1, 2, 3, 4, 5, 6, 1, 2}

    print(3 in my_die)

    ```


    *Result: True*


    Within the print function, you are searching for the number **3** in the set.
    **TRUE** means the number **3** was found in the set. If we looked for the number
    **7**, the output would yield **FALSE**. **TRUE** and **FALSE** are Boolean values
    returned when an expression is evaluated. In this case, you evaluate whether or
    not a number is part of a set of numbers.


    ### Set Functions


    There are other useful functions or methods that can be used when working with
    sets. Clear your code and set up your environment with the following sets:


    ```

    my_vowels = {"a", "e", "i", "o", "u"}

    my_alpha = {"a", "b", "c", "d", "e"}

    ```


    The first function to look at is called **intersection**. The intersection method
    is used to determine if there are any items in common among the two sets. You
    can use the two sets you created to illustrate this:


    ```

    print(my_vowels.intersection(my_alpha))

    ```


    Result: {‘a’, ‘e’}


    The next function to look at is called **difference**. The difference method is
    used to determine if any items are different between the two sets you created.
    This example shows how the difference method can be used among the two sets:


    ```

    print(my_vowels.difference(my_alpha))

    ```


    Result: {‘o’, ‘i’, ‘u’}


    The last function is called **union**. The union method joins two different sets
    together. You can use the two sets created earlier to show what happens when both
    are joined together:


    ```

    print(my_vowels.union(my_alpha))

    ```


    *Result:* {‘d’, ‘c’, ‘i’, ‘o’, ‘e’, ‘u’, ‘a’, ‘b’}'
