  md: '# HTTP Response Status Codes


    An HTTP response status codes tell you whether or not the webserver or application
    has successfully processed an HTTP request. There are many status codes, but I
    want to cover three primary ones that you will likely see when you create your
    applications.


    +   - 200

    - 201

    - 404


    200 is OK. This means that the web server has received the data you have sent
    or sent data that you asked for, depending on the type of request sent. In essence,
    it means that everything worked successfully.


    201 is Created. This is typically sent after you send data to a server with perhaps
    a'
  merge: -1
  pgno: 398
- img_proc: true
  md: 'POST or PUT request. It tells you that the record or data has been created
    and processed.


    404 is Not Found. This one you’ve likely seen already when you’re browsing a website
    or an application. It means that the resource you have asked for is not located
    at the location you have specified. This typically means the website owner has
    moved the page to another place or taken down the page altogether.'
