- md: '## Website with GatsbyJs


    ## About the Author


    ## Foreword


    I am pleased to see how this book turned out, including the authors’ refreshing
    approach with presenting the instructional content in an easily digestible manner,
    focused on comprehension and retention. Having spent the past 15 years in engineering
    and technology, both in the industry and academia, I cannot stress enough the
    importance of understanding technology fundamentals. Python has become a well-recognized
    programming language, with applications across varying functions and industries.
    Python has continued to grow in adoption primarily due to the relative ease of
    learning the language, making it an excellent entry point into programming for
    technical and non-technical learners.


    My focus in the industry has mainly been in professional services, crafting and
    operationalizing technology investments and transformation initiatives for countries
    around the globe. A significant portion of my role focuses on preparing strategic,
    multi-year technology roadmaps and managing large-scale, complex technology programs
    for client engagements. Our programmers, developers, architects, and engineers
    have long been the unsung heroes of our technical projects. At the time of this
    writing, there continues to be a shortage of these roles and associated skill
    sets in the workforce. Over the past decade, organizations have increased focus
    on digital transformation as a critical priority, centered on becoming more digital,
    embedding technology into everyday operations, and upskilling their workforce.
    I have been on countless planes and sat in many rooms with senior partners and
    C-suite executives across varying industries, markets, and territories, discussing
    this shortage along with their plans and roadmaps; the investment in technology
    and people will continue to grow for years to come.


    This book is structured to appeal to individuals on different learning journeys,
    both technical and non-technical in nature. Whether you are a beginner seeking
    to initiate your learning journey, an advanced learner seeking to supplement your
    learning programs, or even someone looking to assess their current knowledge level,
    following years removed from any development role, this book is well-positioned
    to aid in your goals. I recommend this book for my teams that I coach, including
    my project managers seeking to obtain a sense of familiarity in Python and manage
    their technical product teams. Given the 14-day approach, this book offers the
    ability to gain value-added insight, regardless of your end goal, in a rapid timeframe.


    An apparent characteristic I share with the authors is that we are all lifelong
    learners. In addition to my role in the industry, I am also an educator, researcher,
    and peer-reviewed research author. Both authors have held various technical positions
    in the industry and have continued to hone their craft, engage in learning courses,
    pursue technical certifications, supplement their functional roles, and keep their
    minds sharp. With that said, I am pleased with the approach the authors took with
    crafting this book; they leveraged the best practices from their professional
    and academic experiences, and it shows – this book is a lean, straight-to-the-point
    approach, providing the essentials for learning Python, with no “fluff” and only
    value-added content. An added differentiator is their unique “Nerd Challenges”
    strategically sprinkled throughout the text to provide engaging, hands-on learning.
    Any educational text that gets readers out of simply reading, and encourages fingertips
    on the keyboard for real-time practice, clearly understands how to facilitate
    (and accelerate) learning. The authors understand and employ this approach masterfully
    in this book.


    > Josh Lumseyfai, Ph.D., is a trusted, technical professional with a continuous
    improvement mindset, as well as a published, peer-reviewed research author. Dr.
    Lumseyfai is also an Adjunct Professor at an accredited private institution. His
    experience falls within the interdisciplinary fields of engineering, technology,
    consulting, program management, and strategy. Dr. Lumseyfai currently serves as
    a trusted strategic technology advisor for a global professional services network,
    crafting and operationalizing technology investments and transformation initiatives
    for over 150 countries around the globe. He is recognized for his strategic, collaborative,
    and “systems thinking” approach. Dr. Lumseyfai has excelled at leading large-scale,
    complex programs, coaching high-performing teams, and aligning business and technology
    transformation initiatives. Dr. Lumseyfai holds several professional certifications,
    including with Amazon Web Services (AWS), the American Society for Engineering
    Management (ASEM), the American Society for Quality (ASQ), Google, Human Factors
    International (HFI), IBM, Microsoft, PricewaterhouseCoopers (PwC), the Project
    Management Institute (PMI), and Salesforce.


    ## Preface


    Before you jump into reading the book, Casey and I just wanted to point out a
    couple of things that will be helpful to you as you begin your Python journey.
    Below is a list of tips, resources, where to find solution code, and the book’s
    schedule.


    ## Is this the right book for you?


    Here are some questions to ask yourself in order to determine if this book is
    right for you.


    - Are you a beginner programmer?

    - Are you interested in learning the fundamentals of Python?


    If you answered yes to both of those questions, this is the book for you. In this
    book, Casey and I solely cover the fundamentals of Python. If you are looking
    for more advanced topic matter related to Python there are better suited books
    and courses available to you. I’ve listed some in the **Other resources** section.


    ## Solution code


    You can find all of the solution code for each day’s content in our GitHub repository,
    which is located here: [https://github.com/nerdchallenges/python-101-book](https://github.com/nerdchallenges/python-101-book)


    ## Book Schedule


    It’s essential to stick to the book’s outlined schedule; the reason for this is
    simple. Casey and I have found over the years of teaching junior software engineers
    and people new to programming that it’s effortless to feel overwhelmed and get
    lost in what you don’t know. It’s also become increasingly difficult for many
    people to stay on track. Casey and I have outlined this book so that you can cover
    a few key topics each day, recap the activities from that day, all in about 20
    minutes of reading.


    In other words, you should be able to finish one day’s worth of material during
    your lunch break. We know what it’s like to pick up a 1,000-page software engineering
    book and just feel exhausted before you make it past page three. We wrote this
    book to help address that. So stick to the outline, and you’ll be fine. If you’d
    like to cover two days worth of material in one day, go for it. However, I would
    not recommend moving more than two days at a time; it’s good to give yourself
    time in between sessions, so you have time to think and process what you just
    learned about.


    ## Reading Time


    At the beginning of each day you’ll find an estimated reading time, it isn’t a
    number that is set in stone it just gives you an idea of how much time you should
    set aside to read the entire day. Some days it may take you longer, some days
    shorter, it’s just general guidance. On average each day should take roughly 20
    minutes; however, there are some exceptions, so plan accordingly!


    ## Code Snippets and Important Terms


    Unfortunately, in terms of formatting a book you are rather limited in terms of
    what can be displayed, especially if you want to support eReaders. As such, you’ll
    find that most of this book is in black and white (so no colors). It’s important
    in programming to be able to determine what is a piece of code, what is a comment
    (more on this later), and what is output from your terminal. Below are small examples
    of what each of those things should look like.'
  mdcn: '## 使用 GatsbyJs 构建网站


    ## 关于作者


    ## 前言


    我很高兴看到这本书的最终成果，包括作者们以一种易于理解的方式呈现教学内容的创新方法，专注于理解和记忆。在过去15年的工程和技术领域（包括工业界和学术界）的工作中，我无法更加强调理解技术基础知识的重要性。Python已成为一种广为人知的编程语言，应用于各种职能和行业。Python的采用率持续增长，主要是因为该语言相对容易学习，使其成为技术和非技术学习者进入编程领域的绝佳切入点。


    我在行业中的重点主要在专业服务领域，为全球各国制定和实施技术投资与转型计划。我职责的很大一部分是为客户合作制定战略性的多年技术路线图，并管理大规模、复杂的项目。我们的程序员、开发人员、架构师和工程师长期以来一直是我们技术项目中默默无闻的英雄。在撰写本文时，劳动力市场中这些角色及相关技能仍然存在短缺。在过去的十年里，组织越来越关注数字化转型这一关键优先事项，核心是变得更加数字化，将技术融入日常运营，并提升员工技能。我曾乘坐过无数次飞机，与来自不同行业、市场和地区的高级合伙人和首席高管坐在许多会议室里，讨论这种短缺以及他们的计划和路线图；未来几年，对技术和人才的投资将继续增长。


    本书的结构旨在吸引处于不同学习旅程中的个人，无论是技术性还是非技术性。无论你是寻求开始学习旅程的初学者，寻求补充学习计划的高级学习者，甚至是希望评估自己当前知识水平（在多年未从事任何开发工作之后）的人，本书都能很好地帮助你实现目标。我向我指导的团队推荐这本书，包括那些希望熟悉Python并管理其技术产品团队的项目经理。鉴于其14天的学习方法，无论你的最终目标是什么，本书都能在短时间内提供增值见解。


    我与作者们的一个明显共同点是，我们都是终身学习者。除了我在行业中的角色外，我还是一名教育工作者、研究员和同行评审研究作者。两位作者都曾在行业中担任过各种技术职位，并继续磨练他们的技能，参与学习课程，追求技术认证，补充他们的职能角色，并保持思维敏锐。话虽如此，我对作者们创作这本书的方法感到满意；他们利用了专业和学术经验中的最佳实践，这一点显而易见——本书采用了一种精炼、直截了当的方法，提供了学习Python的精髓，没有“废话”，只有增值内容。另一个区别在于他们独特的“极客挑战”，战略性地分布在文本中，提供引人入胜的实践学习。任何能让读者不仅仅是阅读，而是鼓励他们将手指放在键盘上进行实时实践的教育文本，都清楚地理解如何促进（并加速）学习。作者们在这本书中精通并运用了这种方法。


    > Josh Lumseyfai 博士是一位值得信赖的技术专业人士，具有持续改进的心态，同时也是一位发表过同行评审研究论文的作者。Lumseyfai 博士还是一所经认证的私立院校的兼职教授。他的经验涵盖工程、技术、咨询、项目管理和战略等跨学科领域。Lumseyfai
    博士目前担任全球专业服务网络的可信战略技术顾问，为全球150多个国家制定和实施技术投资与转型计划。他以战略、协作和“系统思维”方法而闻名。Lumseyfai
    博士擅长领导大规模、复杂的项目，指导高绩效团队，并使业务和技术转型计划保持一致。Lumseyfai 博士持有多个专业认证，包括亚马逊网络服务（AWS）、美国工程管理学会（ASEM）、美国质量学会（ASQ）、谷歌、人因国际（HFI）、IBM、微软、普华永道（PwC）、项目管理协会（PMI）和Salesforce。


    ## 序言


    在你开始阅读本书之前，Casey和我想指出几点，这将对你开始Python学习之旅有所帮助。以下是提示、资源、解决方案代码位置以及本书时间表的列表。


    ## 这本书适合你吗？


    以下是一些你可以问自己的问题，以确定这本书是否适合你。


    - 你是编程初学者吗？

    - 你有兴趣学习Python的基础知识吗？


    如果你对这两个问题的回答都是肯定的，那么这本书就是为你准备的。在本书中，Casey和我只涵盖Python的基础知识。如果你正在寻找更多与Python相关的高级主题，有更适合你的书籍和课程。我在**其他资源**部分列出了一些。


    ## 解决方案代码


    你可以在我们的GitHub仓库中找到每天内容的所有解决方案代码，地址如下：[https://github.com/nerdchallenges/python-101-book](https://github.com/nerdchallenges/python-101-book)


    ## 本书时间表


    坚持本书概述的时间表至关重要；原因很简单。Casey和我在多年教授初级软件工程师和编程新手的过程中发现，人们很容易感到不知所措，并在自己不懂的地方迷失方向。对许多人来说，保持正轨也变得越来越困难。Casey和我概述了本书，以便你每天可以涵盖几个关键主题，回顾当天的活动，所有这些大约需要20分钟的阅读时间。


    换句话说，你应该能够在午休时间完成一天的学习内容。我们知道拿起一本1000页的软件工程书籍，在翻过第三页之前就感到筋疲力尽是什么感觉。我们写这本书就是为了解决这个问题。所以坚持大纲，你会没事的。如果你想在一天内涵盖两天的内容，那就去做吧。然而，我不建议一次超过两天；最好在两次学习之间给自己留出时间，这样你就有时间思考和消化你刚刚学到的内容。


    ## 阅读时间


    在每天的开头，你会看到一个估计的阅读时间，这不是一个固定的数字，只是让你了解应该留出多少时间来阅读当天的全部内容。有些天可能需要更长时间，有些天可能更短，这只是大致的指导。平均而言，每天大约需要20分钟；但是，也有一些例外，所以请相应地计划！


    ## 代码片段和重要术语


    不幸的是，在书籍格式方面，你能展示的内容相当有限，特别是如果你想支持电子阅读器。因此，你会发现本书大部分是黑白的（所以没有颜色）。在编程中，能够区分什么是代码、什么是注释（稍后会详细介绍）以及什么是终端输出非常重要。以下是每种内容的示例。'
