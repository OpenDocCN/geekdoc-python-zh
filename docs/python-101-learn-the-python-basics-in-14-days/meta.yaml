    \n## 第四天：用户交互\n\n*阅读时间：3分钟*\n\n打印语句固然不错，但无法满足实际应用的所有需求。如果我不想让程序仅仅打印语句怎么办？你日常交互的许多程序都需要用户提供额外输入。本章将教你如何通过提示用户输入信息，将用户交互融入程序中。\n\
