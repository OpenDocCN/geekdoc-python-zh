  md: '# HTTP Methods


    HTTP Methods are methods that allow you to send and receive data from a web server.
    There are four primary methods that you will be using:


    +   - GET

    - POST

    - PUT

    - DELETE


    The GET method allows you to request data from a web server, so a GET request
    is sent whenever you want data from a web server or website. For example, when
    you go to [https://nerdchallenges.com](https://nerdchallenges.com), your web browser
    will send a GET request to the Nerd Challenges web server.'
  merge: -1
  pgno: 394
- img_proc: true
  md: 'The POST method allows you to create a new record on a server. In other words,
    this is for sending data to a web server. It is a way to create data on the webserver.
    For example, you are ordering a pizza from your favorite pizza restaurant, and
    you go to their website, you add your pizza to the cart, and you checkout. When
    you checkout, which sends a POST request to the server to create a *new* order,
    the pizza restaurant’s web server will add the order to their database, and they’ll
    begin making your pizza. The POST request is for adding brand-new data to a web
    server.


    The PUT method is similar to the POST method because it adds data to a server;
    however, it is used when you are *overwriting* data with new values but not creating
    a new record. For example, pretend you have a nail'
  merge: -1
  pgno: 395
- img_proc: true
  md: 'salon, and in your web application, you have a list of appointments for your
    customers for the day. Jane, your customer, has an appointment for Tuesday at
    4:00 PM, and Jane updates the appointment to Thursday at 5:00 PM. The previous
    scenario would be a PUT request because Jane already had a record created for
    an appointment and simply wanted to overwrite that data with new data.


    The DELETE method removes data from the webserver or application. Continuing with
    the nail salon example, Jane now wants to remove her appointment entirely. Jane
    can send a DELETE request to the webserver to remove her appointment.


    There are many more HTTP Methods, but these are the primary four used in almost
    every application. To see a list of all the'
  merge: -1
