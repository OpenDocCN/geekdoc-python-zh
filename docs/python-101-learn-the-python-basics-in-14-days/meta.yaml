    and descriptive enough to indicate what that variable is storing. Say, for instance,
    you wanted to store a student name in a variable. You might name that variable
    **student_name** or **studentName**. If you wanted to reserve that student’s age,
    you might call the variable **student_age** or **studentAge**. Please note that
    all variable names must be unique. If you have more than one student, you could
    assign a number such as **student_name3** or **studentAge3** for the third student
    variable.


