    \n```\n# 示例 1 - 发送你的第一个GET请求\nimport requests\n\nresponse = requests.get('https://swapi.dev/api/people/1/')\n\
    print(f\"Status Code = {response.status_code}\")\nprint(f\"Response from Website\
    \ = {response.text}\")\n```\n\n### 终端输出\n\n```\nStatus Code = 200\nResponse from\
    \ Website = {\"name\":\"Luke Skywalker\",\"height\":\"172\",\"mass\":\"77\",\"\
