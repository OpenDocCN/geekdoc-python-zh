    ## 集合


    **集合**是另一个值得讨论的数据类型。它用于存储无序且不需要重复项的数据。想象一个单骰子或一个骰子。一个骰子有六个可能的值。如果掷出，它一次只能有一个值，所以一个骰子上的点数不会重复。我可以将骰子表示为一个集合。我可以用花括号
    { } 将骰子的值括起来：


    ```

    my_die = {1, 2, 3, 4, 5, 6, 1, 2}

    print(my_die)

    ```


    *结果：* {1, 2, 3, 4, 5, 6}


    在输出中请注意，我们的集合不包含任何重复项。集合只存储一个值一次。你可以将相同的6个骰子值添加一百次，这不会改变我们的输出。在这个例子中，6个值是按数字顺序排列的。在集合中情况并非总是如此。你**永远**不应该期望值以任何顺序执行或存储。集合中的值应始终被视为任意的。你的第一个数字可以是集合中的任何数字，集合中的每个值也是如此。


    还有一种方法可以在集合中搜索特定值。如果你想知道数字3是否在我们的 my_die 集合中，你可以写：


