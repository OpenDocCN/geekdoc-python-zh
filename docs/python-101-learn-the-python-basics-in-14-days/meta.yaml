    注意“Casey”周围有引号。在Python中创建文本变量时，这些引号是必需的。赋值给变量的文本被称为**字符串**。我们例子中的名字Casey就是一个字符串。假设我把**nerd_name**的名字改为“Kelvin”。文本Kelvin现在是一个字符串，程序的其余部分可以通过引用该变量来访问它。


    ```

