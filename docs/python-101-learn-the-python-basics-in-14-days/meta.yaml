  md: 'as you have done with other libraries previously.


    The requests library allows you to send HyperText Transfer Protocol (HTTP) data.
    You probably recognize HTTP. Where have you seen it before? When you type in a
    Uniform Resource Locator (URL) in your web browser, you have seen it. For example
    ([https://nerdchallenges.com](https://nerdchallenges.com)), the HTTP protocol
    allows web browsers and other applications to send data back and forth over the
    internet. HTTP is a protocol that defines how web servers and browsers send data
    back and forth.


    Before you begin installing the requests library and learn how to use it, you
    will first learn about HTTP Methods and HTTP Response codes.'
  merge: -1
