  mdcn: "## 字典\n\n**字典**与列表类似，它们存储一个有序对象的集合。与其他数据结构不同的是，字典不是通过数字索引，而是通过键来索引。其语法与集合非常相似，使用花括号\
    \ `{ }` 来表示一个字典。与集合不同，字典中的每个值都有一个键值对。因此，每一对至少包含一个由冒号分隔的**键**和一个**值**。后续的键值对用逗号分隔。让我们创建第一个存储在变量\
    \ **day_conversion** 中的字典：\n\n```\nday_conversion = {\n    \"Mon\": \"Monday\"\
    ,\n    \"Tues\": \"Tuesday\",\n    \"Wed\": \"Wednesday\",\n    \"Thurs\": \"\
    Thursday\",\n    \"Fri\": \"Friday\",\n    \"Sat\": \"Saturday\",\n    \"Sun\"\
    : \"Sunday\",\n}\n```\n\n一个需要注意的重要点是缩进。每个键值对都在变量名下缩进。变量下方的第一列是键。Mon、Tues、Wed 等都是**键**。下一列包含每个键对应的值。本质上，我们说的是一个唯一的键代表一个值。键必须始终不同，在字典中不能重复。然而，这些键的值可以是相同的。两个不同的键可以拥有相同的值。让我们打印这个字典，同时打印键\
    \ \"Wed\" 对应的值：\n\n```\nprint(day_conversion)\nprint(day_conversion[\"Wed\"])\n\
    ```\n\n结果：{‘Mon’: ‘Monday’, ‘Tues’: ‘Tuesday’, ‘Wed’: ‘Wednesday’, ‘Thurs’: ‘Thursday’,\
    \ ‘Fri’: ‘Friday’, ‘Sat’: ‘Saturday’, ‘Sun’: ‘Sunday’}\nWednesday\n\n我刚刚打印了包含所有键值对的整个字典。然后我能够通过使用键\
    \ \"Wed\" 来打印值 \"Wednesday\"。这可以用于我们字典中的任何键。键也不限于字符串。你也可以使用数字、元组和列表。一个类似的字典可能包含一年中的月份。如果你打印一个字典中不存在的键，使用之前的方法会返回一条错误消息。*get(\
    \ )* 方法允许我们的程序在找不到键时继续运行而不会中断。让我们用 *get( )* 方法重写我们的代码，并输入一个错误的键：\n\n```\nprint(day_conversion.get(\"\
    not_in_dictionary\"))\n```\n\n*结果：None*\n\n现在，从字典中不存在的键返回的值只是 none。如果我将 \"not_in_dictionary\"\
    \ 替换为字典中的一个键，它会像以前一样返回该键的值。当打印字典或遍历一个键可能存在也可能不存在的字典列表时，使用此方法更好。\n\n字典的值不能像列表那样被更改。没有索引，因此更改其内容中值的唯一方法是使用键。让我们尝试使用其键将\
    \ **\"Sunday\"** 的值更改为 **\"Funday\"**，看看结果如何：\n\n```\nday_conversion = {\n   \
    \ \"Mon\": \"Monday\",\n    \"Tues\": \"Tuesday\",\n    \"Wed\": \"Wednesday\"\
    ,\n    \"Thurs\": \"Thursday\",\n    \"Fri\": \"Friday\",\n    \"Sat\": \"Saturday\"\
    ,\n    \"Sun\": \"Sunday\",\n}\nday_conversion[\"Sun\"] = \"Funday\"\nprint(day_conversion)\n\
    ```\n\n*结果：* ‘Fri’: ‘Friday’, ‘Sat’: ‘Saturday’, ‘Sun’: ‘Funday’\n\n看，你现在有了 Funday\
    \ 而不是 Sunday。只需记住，修改字典时，你必须针对键，而不是索引。很简单。\n\n你可以使用字典来表示对象。如果我们想存储用户 Casey 的信息。你可以将变量或对象命名为\
    \ **caseydict**，并捕获有关他姓名和工作信息的特征。该字典可能看起来像这样：\n\n```\ncaseydict = {\n    \"name\"\
    : {\n        \"prefix\": \"Mr.\",\n        \"first\": \"Casey\",\n        \"last\"\
    : \"Gerena\",\n        \"suffix\": \"Jr\"\n    },\n    \"job\": {\n        \"\
    company\": \"Nerd Challenges LLC\",\n        \"position\": \"Lead Nerd\",\n  \
    \      \"location\": {\n            \"address\": \"123 NC Blvd\",\n          \
    \  \"city\": \"Tampa\",\n            \"state\": \"Florida\",\n            \"zip\"\
    : 33601\n        }\n    }\n}\nprint(caseydict)\n```\n\n结果：{'name': {'prefix':\
    \ 'Mr.', 'first': 'Casey', 'last': 'Gerena', 'suffix': 'Jr'}, 'job': {'company':\
    \ 'Nerd Challenges LLC', 'position': 'Lead Nerd', 'location': {'address': '123\
    \ NC Blvd', 'city': 'Tampa', 'state': 'Florida', 'zip': 33601}}}\n\n尝试自己运行这段代码。你会清楚地看到，在字典中存储键值对如何应用于现实世界场景，例如构建数据库或存储重要的用户信息。这种格式与\
    \ JavaScript 对象表示法 (JSON) 完全相同。\n\n## 类型转换\n\nPython 中另一个需要学习的有用工具是**类型转换**。类型转换涉及将一种数据类型转换为另一种数据类型。我在本章和上一章中讨论了大多数标准数据类型。变量可以存储所有不同数据类型的值。某些操作可能需要变量的值处于特定的数据类型才能成功执行操作。这就是类型转换或类型转换变得必要的地方。类型转换有两种类型：\n\
    \n- 隐式类型转换\n- 显式类型转换\n\n## 隐式类型转换\n\n**隐式类型转换**自动将数据类型从一种类型转换为另一种类型。Python 执行隐式类型转换，它不需要用户进行任何交互来进行隐式类型转换。当你将值赋给变量时，隐式类型转换就会发生。当你设置变量\
    \ **nerd_name = “Casey”** 时，Python 自动将此值转换为字符串数据类型。\n\n你可以使用 *type()* 方法检查我们的变量是什么数据类型。*type()*\
    \ 方法让你了解变量是如何被隐式类型转换的。让我们使用此方法检查一些我之前讨论过的数据类型：\n\n```\nnerd_name = \"Casey\"\n\
    nerd_age = 34\npi = 3.1415926535897\n\nnerd_names = [\"CJ\", \"Albert\", \"Kelv\"\
    , \"Prodigy\", \"Rico\", \"Jamison\"]\nmy_shapes = (\"Circle\", \"Rectangle\"\
    , \"Triangle\", \"Square\")\nmy_die = {1, 2, 3, 4, 5, 6, 1, 2}\n\nprint(type(nerd_name))\n\
    print(type(nerd_age))\nprint(type(pi))\nprint(\"\\n\")\nprint(type(nerd_names))\n\
    print(type(my_shapes))\nprint(type(my_die))\n```\n\n结果：<class ‘str’>\n<class ‘int’>\n\
    <class ‘float’>\n\n<class ‘list’>\n<class 'tuple'>\n<class 'set'>\n\n我忘了包含我们刚刚讨论的字典数据类型！让我们打印分配给变量\
    \ **day_conversion** 的字典的数据类型。\n\n```\nday_conversion = {\n    \"Mon\": \"Monday\"\
    ,\n    \"Tues\": \"Tuesday\",\n    \"Wed\": \"Wednesday\",\n    \"Thurs\": \"\
    Thursday\",\n    \"Fri\": \"Friday\",\n    \"Sat\": \"Saturday\",\n    \"Sun\"\
    : \"Sunday\",\n}\nprint(type(day_conversion))\n```\n\n结果：<class 'dict'>\n\nPython\
    \ 也可以对两种不同数据类型的数字进行数学计算。看看当我将整数 **nerd_age = 34** 和浮点数 **pi = 3.141592653589793**\
    \ 相加时会发生什么：\n\n```\nnerd_age = 34\npi = 3.1415926535897\nsum = nerd_age + pi\n\
    print(sum)\nprint(type(sum))\n```\n\n*结果：37.1415926535897 <class 'float'>*\n\n\
    你会注意到最终的值或总和是数据类型 **float**。Python 为你自动转换了它。总和是整数没有任何意义。这样做会导致截断小数部分，产生不正确的值。Python\
    \ 帮助我们，因此通过隐式类型转换不会发生这种情况。\n\n## 显式类型转换\n\n**显式类型转换**使用预定义函数将数据类型从一种转换为另一种。下面是常见预定义函数的列表；然而，还有许多其他函数。\n\
    \n- **str( )** - 将值转换为字符串\n- **int( )** - 将值转换为整数\n- **float( )** - 将值转换为浮点数/小数\n\
    - **list( )** - 将值转换为列表\n- **tuple( )** - 将值转换为元组\n- **set( )** - 将值转换为集合\n\n\
    当你在第 2 章中连接字符串时，如果你尝试打印"
