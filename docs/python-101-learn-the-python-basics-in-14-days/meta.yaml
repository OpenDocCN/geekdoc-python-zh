- md: '## Code Example


    ```

    print(''Hello World!'')

    ```


    ## Code Example with Comments


    ```

    # This is a comment

    print(''This is some real code!'')

    ```


    ## Terminal Output


    Terminal output will be described as a *Result* and will appear beneath a code
    block, like this


    ```

    answer = 2 + 2

    print(answer)

    ```


    *Result: 4*


    ## Other resources


    - **Solution code:** Can be found in our github.com repo - https://github.com/nerdchallenges/python101-book

    - **Official Python site:** The official place of all things Python - https://www.python.org/

    - **Udemy course:** If you prefer to watch videos as opposed to reading or you
    want to supplement this book with lecture material, the course is offered on Udemy
    - https://udemy.com

    - **Nerd Challenges:** Our official site for other books about Technology and
    Fitness - https://nerdchallenges.com

    - **High Performance Python:** Excellent resource on optimizing Python code, for
    a more advanced engineer - [https://www.amazon.com/High-Performance-Python-Performant-Programming/dp/1492055026/](https://www.amazon.com/High-Performance-Python-Performant-Programming/dp/1492055026/)


    ## Acknowledgement


    Thanks to Ivan Lozano and Sean Soto for assisting us with technical reviews of
    the book’s content, your consistent feedback throughout the book was instrumental
    to completing it on time.


    ## Errata / Contacting Us


    We’re big believers in continuously growing and improving. If you’d like to share
    your thoughts or give us any feedback, we would love to hear from you. We write
    our books for our readers, so if something isn’t working for you or you want us
    to keep up the excellent work, please feel free to reach out to us at rico@nerdchallenges.com
    or casey@nerdchallenges.com.


    ## Feedback and Reviews


