- md: "## While Loops\n\n**While loops** check to see if a condition is met to execute\
    \ an operation, a while loop continues to execute operations as long as the required\
    \ condition is met. It is critical to understand that a while loop will not end\
    \ as long as the required condition is met. So, if you decide to create code where\
    \ the while loop condition is always valid, that while loop will continue to run,\
    \ and your program will never stop. For that to not happen, you must ensure you\
    \ insert code to end the loop eventually. Assign the variable **x = 3**. While\
    \ the variable x is less than the number **10**, print out the value of the variable\
    \ **x**. Check out the code below:\n\n```\nx = 3\nwhile (x < 10):\n    print(x)\n\
    \    x = 15\n```\n\nResult: 3\n\nSince the value **3** is less than the condition\
    \ **x<10**, the value of **x = 3** is printed out. If, however, I left the code\
    \ **x = 15** off, the program would continue to run over and over, printing out\
    \ **x = 3**. It would essentially turn into an infinite loop with no end. You\
    \ do not ever want this to happen.\n\nThe other thing you would never want to\
    \ happen is your program to assign an arbitrary value to one of the variables\
    \ in the loop. Not knowing what value is being passed into your while loop is\
    \ dangerous. It could also cause an endless loop.\n\nStart to get into a “what\
    \ if” mindset when programming. Always think about what happens if a specific\
    \ value or condition is present. Your program needs to be able to handle different\
    \ situations. As programmers, you have to think about these. While loops are the\
    \ first time you had to think “what if”. I assure you there will be more as we\
    \ continue on.\n\nLet us continue to build upon your while loop. You now know\
    \ you want to print out every x that is less than **10**. At the same time, you\
    \ decide to increment by the number 1 till you get to 10. That might be cool because\
    \ now you are printing out numbers **4** to **10** using only a few lines of code.\
    \ Try using the code below to do this:\n\n```\nx = 3\nwhile (x < 10):\n    x =\
    \ x + 1\n    print(x)\n```\n\nResult:\n\n4\n\n5\n\n6\n\n7\n\n8\n\n9\n\n10\n\n\
    In this code, you started with the number **3**, which is less than **10**, then\
    \ executed **x = x +1**. This sets **x = 3 + 1**, which returns the value **4**.\
    \ The value **4** is now saved in variable **x**. This is also the value that\
    \ is printed out of executed the next line. Wait a minute; this process starts\
    \ again because **x** is now equal to **4**, which is still less than **10**.\
    \ The code under our while loop now prints out **5**. The process continues until\
    \ you eventually get to the number **10**! So, you were able to print numbers\
    \ **4** to **10** and exit out of the loop once the value became larger than **10**.\
    \ When **x** was equal to **10**, the loop ended. Incrementing a number by one\
    \ is a great way to end a while loop.\n\nYou can clean this code up a bit by using\
    \ one of the assignment operators discussed earlier. Instead of using $x = x +\
    \ 1$ replace that with $x += 1$. From now on, you can use this notation to simplify\
    \ your code:\n\n```\nx = 3\nwhile (x < 10):\n    x += 1\n    print(x)\n```\n\n\
    *Result:*\n\n4\n5\n6\n7\n8\n9\n10\n\nYou still need to let the user know when\
    \ the loop has ended. In the if-else statement, you let the user know when no\
    \ condition was met. The same thing should go for loops. Print out a statement\
    \ outside of the while loop to indicated the loop has finished.\n\n```\nx = 3\n\
    while (x < 10):\n    x += 1\n    print(x)\nprint(\"This loop has now been terminated!\"\
    )\n```\n\nResult:\n\n4\n5\n6\n7\n8\n9\n10\n\nThis loop has now been terminated!\n\
    \n## For Loops\n\n**For loops** work similarly to while loops. In my opinion,\
    \ they can be easier to use. For loops can loop through various data types, including\
    \ strings and lists. These loops give you the flexibility to loop through all\
    \ kinds of data types.\n\nI always wanted an easy way to print individual letters\
    \ of a string in a program but never knew how. My first thought was always to\
    \ use a while loop. While this is possible, it isn't the best way. For loops are\
    \ quicker at handling tasks such as this without the need for multiple lines of\
    \ code. So how do I print out the individual letters for “**Nerd Challenges LLC**”?\
    \ Well, I just need to loop through a variable that has the string stored:\n\n\
    ```\ncompany = \"Nerd Challenges LLC\"\nfor letter in company:\n    print(letter)\n\
    ```\n\n*Result:*\n\n- N\n- e\n- r\n- d\n- C\n- h\n- a\n- l\n- l\n- e\n- n\n- g\n\
    - e\n- s\n- L\n- L\n- C\n\nThe code above prints out a letter for each of the\
    \ letters within the variable company. For every letter in the variable of a string,\
    \ a letter is printed out. This can be done with any string. Let’s try this without\
    \ using any string variables.\n\n```\nfor letter in \"Nerd Challenges LLC\":\n\
    \    print(letter)\n```\n\n*Result:*\n\nN\ne\nr\nd\nC\nh\na\nl\nl\ne\nn\ng\ne\n\
    s\nL\nL\nC\n\nI get the same output as before without having to assign a value\
    \ to a variable. How about a list of names? If I try to use a for loop for a list\
    \ of names, the loop looks at each of the items in the list:\n\n```\ngeek_names\
    \ = [\"Nikola\", \"Tesla\", \"Thomas\", \"Edison\"]\nfor name in geek_names:\n\
    \    print(name)\n```\n\nResult:\n*Nikola*\n*Tesla*\n*Thomas*\n*Edison*\n\nThat\
    \ was cool. Each name from the list of names was printed out. The same code can\
    \ be used to print out tuples or sets:\n\n```\ngeek_names_list = [\"Nikola\",\
    \ \"Tesla\", \"Thomas\", \"Edison\"]\ngeek_names_tuple = (\"Nikola\", \"Tesla\"\
    , \"Thomas\", \"Edison\")\ngeek_names_set = {\"Nikola\", \"Tesla\", \"Thomas\"\
    , \"Edison\"}\n```\n\nFor loops, work with numbers as well. Remember our while\
    \ loop where you printed out numbers **4** to **10**. That required almost 5 lines\
    \ of code. What if you could only use two lines of code to accomplish the same\
    \ thing? Well, you can, and here’s how:\n\n```\nfor number in range(4,11):\n \
    \   print(number)\n```\n\n*Result:*\n\n4\n5\n6\n7\n8\n9\n10\n\nThe **range** function\
    \ gives us the ability to select a range of numbers. The first number is included\
    \ in the range, and the last number is excluded. **11** is used because we wanted\
    \ to include all numbers from **4** to **10**. If you only specify one value in\
    \ a range such as **range(11)**, the range would be from **0** to **10**."
  mdcn: "## While 循环\n\n**While 循环**会检查是否满足某个条件以执行操作，只要满足所需条件，while 循环就会持续执行操作。关键在于要理解，只要满足所需条件，while\
    \ 循环就不会结束。因此，如果你决定创建一个 while 循环条件始终有效的代码，那么该 while 循环将持续运行，你的程序将永远不会停止。为避免这种情况，你必须确保插入最终结束循环的代码。将变量\
    \ **x = 3** 赋值。当变量 x 小于数字 **10** 时，打印出变量 **x** 的值。查看下面的代码：\n\n```\nx = 3\nwhile\
    \ (x < 10):\n    print(x)\n    x = 15\n```\n\n结果：3\n\n由于值 **3** 小于条件 **x<10**，因此打印出\
    \ **x = 3** 的值。但是，如果我省略了代码 **x = 15**，程序将一遍又一遍地运行，不断打印出 **x = 3**。这实际上会变成一个没有尽头的无限循环。你绝对不希望这种情况发生。\n\
    \n另一件你绝不希望发生的事情是，你的程序为循环中的某个变量分配了一个任意值。不知道传递到 while 循环中的值是多少是危险的。这也可能导致无限循环。\n\
    \n在编程时，开始培养一种“如果……会怎样”的思维模式。始终思考如果存在特定值或条件会发生什么。你的程序需要能够处理不同的情况。作为程序员，你必须考虑这些。While\
    \ 循环是你第一次需要思考“如果……会怎样”。我向你保证，随着我们继续学习，还会有更多这样的情况。\n\n让我们继续在你的 while 循环基础上构建。你现在知道你想打印出所有小于\
    \ **10** 的 x。同时，你决定每次递增 1，直到达到 10。这可能很酷，因为现在你只需几行代码就能打印出数字 **4** 到 **10**。尝试使用下面的代码来实现：\n\
    \n```\nx = 3\nwhile (x < 10):\n    x = x + 1\n    print(x)\n```\n\n结果：\n\n4\n\n\
    5\n\n6\n\n7\n\n8\n\n9\n\n10\n\n在这段代码中，你从数字 **3** 开始，它小于 **10**，然后执行 **x = x +1**。这将\
    \ **x = 3 + 1**，返回值 **4**。值 **4** 现在保存在变量 **x** 中。这也是执行下一行时打印出的值。等等，这个过程会重新开始，因为\
    \ **x** 现在等于 **4**，仍然小于 **10**。我们 while 循环下的代码现在打印出 **5**。这个过程持续进行，直到你最终得到数字 **10**！因此，你能够打印出数字\
    \ **4** 到 **10**，并在值大于 **10** 时退出循环。当 **x** 等于 **10** 时，循环结束。将数字递增一是结束 while 循环的好方法。\n\
    \n你可以通过使用之前讨论过的一个赋值运算符来稍微清理一下这段代码。不要使用 $x = x + 1$，而是用 $x += 1$ 替换它。从现在开始，你可以使用这种表示法来简化你的代码：\n\
    \n```\nx = 3\nwhile (x < 10):\n    x += 1\n    print(x)\n```\n\n*结果：*\n\n4\n5\n\
    6\n7\n8\n9\n10\n\n你仍然需要让用户知道循环何时结束。在 if-else 语句中，你让用户知道何时没有满足条件。对于循环也应该做同样的事情。在\
    \ while 循环外部打印一条语句，以表明循环已完成。\n\n```\nx = 3\nwhile (x < 10):\n    x += 1\n    print(x)\n\
    print(\"This loop has now been terminated!\")\n```\n\n结果：\n\n4\n5\n6\n7\n8\n9\n\
    10\n\nThis loop has now been terminated!\n\n## For 循环\n\n**For 循环**的工作方式类似于 while\
    \ 循环。在我看来，它们可能更容易使用。For 循环可以遍历各种数据类型，包括字符串和列表。这些循环为你提供了遍历各种数据类型的灵活性。\n\n我一直想在程序中找到一种简单的方法来打印字符串的各个字母，但一直不知道怎么做。我的第一反应总是使用\
    \ while 循环。虽然这是可能的，但这并不是最佳方式。For 循环在处理此类任务时更快，无需多行代码。那么，我如何打印出“**Nerd Challenges\
    \ LLC**”的各个字母呢？嗯，我只需要遍历一个存储了该字符串的变量：\n\n```\ncompany = \"Nerd Challenges LLC\"\
    \nfor letter in company:\n    print(letter)\n```\n\n*结果：*\n\n- N\n- e\n- r\n-\
    \ d\n- C\n- h\n- a\n- l\n- l\n- e\n- n\n- g\n- e\n- s\n- L\n- L\n- C\n\n上面的代码为变量\
    \ company 中的每个字母打印出一个字母。对于字符串变量中的每个字母，都会打印出一个字母。这可以用于任何字符串。让我们尝试不使用任何字符串变量来实现这一点。\n\
    \n```\nfor letter in \"Nerd Challenges LLC\":\n    print(letter)\n```\n\n*结果：*\n\
    \nN\ne\nr\nd\nC\nh\na\nl\nl\ne\nn\ng\ne\ns\nL\nL\nC\n\n我得到了与之前相同的输出，而无需为变量赋值。那么一个名字列表呢？如果我尝试对一个名字列表使用\
    \ for 循环，循环会查看列表中的每个项目：\n\n```\ngeek_names = [\"Nikola\", \"Tesla\", \"Thomas\"\
    , \"Edison\"]\nfor name in geek_names:\n    print(name)\n```\n\n结果：\n*Nikola*\n\
    *Tesla*\n*Thomas*\n*Edison*\n\n这很酷。名字列表中的每个名字都被打印出来了。相同的代码也可以用来打印元组或集合：\n\n```\n\
    geek_names_list = [\"Nikola\", \"Tesla\", \"Thomas\", \"Edison\"]\ngeek_names_tuple\
    \ = (\"Nikola\", \"Tesla\", \"Thomas\", \"Edison\")\ngeek_names_set = {\"Nikola\"\
    , \"Tesla\", \"Thomas\", \"Edison\"}\n```\n\nFor 循环也适用于数字。还记得我们打印数字 **4** 到 **10**\
    \ 的 while 循环吗？那几乎需要 5 行代码。如果你只能用两行代码来完成同样的事情呢？嗯，你可以，方法如下：\n\n```\nfor number in\
    \ range(4,11):\n    print(number)\n```\n\n*结果：*\n\n4\n5\n6\n7\n8\n9\n10\n\n**range**\
    \ 函数使我们能够选择一个数字范围。第一个数字包含在范围内，最后一个数字被排除在外。使用 **11** 是因为我们想包含从 **4** 到 **10** 的所有数字。如果你在\
    \ range 中只指定一个值，例如 **range(11)**，则范围将是从 **0** 到 **10**。"
