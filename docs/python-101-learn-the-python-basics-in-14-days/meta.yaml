    关于元组，最后一个要复习的主题是数据类型。可能有那么一刻，你想在元组中存储的不仅仅是字符串或数字值。你甚至可以在元组中存储一个列表，反之亦然。看看下面的代码：


    ```

    my_shapes = ("Circle", "Rectangle", "Triangle",

    "Square", [0, 4, 4, 3])

    print(my_shapes)

    ```


