    in the location field. All other default settings within the Create Project window
    are good to go. Click Create to continue. Your new project environment should
    take a few minutes to load.


    ![](img/94a1435e4acaf57ed4f2a785450910d2_84_0.png)


    Now that you have your project built, let’s take a look around the workspace.
    On the left-hand side of the screen, there is a list of your project files and
    folders. Below that, you’ll also notice there are folders called libs which are
