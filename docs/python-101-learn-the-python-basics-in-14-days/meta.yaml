    # Introduction to Variables in Python


    Here you are focused on some of the basics of Python. I’ll introduce you to variables,
    a few data types, and how to print statements out to view program outputs, as
    you saw in the program at the end of the last section.


    Make sure your PyCharm PythonNerd program window is open and ready for us to use—Right-click
