- md: "## Day 15 Challenges\n\nThis wouldn’t be a Nerd Challenges book without some\
    \ challenges right! So get after it!\n\n- Kilobyte Challenge: Try and update the\
    \ Site title on the website you developed to say My First Gatsby Page!.\n- Megabyte\
    \ Challenge: Try and change the font color of the **Congratulations — I just made\
    \ my FIRST Gatsby site** to #E90025\n- Gigabyte Challenge: Try and update the\
    \ **Documentation** link on the web page\n- Terabyte Challenge: Try and deploy\
    \ this site yourself to Gatsby Cloud!\n\n## It’s been fun!\n\nRicardo and I hope\
    \ you enjoyed this Python book and this little excerpt from our GatsbyJS v4 book.\
    \ We had a blast writing it and recording the videos and we hope you learn from\
    \ it. As always, feel free to reach out to us and tell us what you thought about\
    \ the book, good or bad! casey@nerdchallenges.com and rico@nerdchallenges.com\n\
    \n## Solutions to Q&A\n\n## Day 1 - Installing Python Answers\n\n1. What is an\
    \ IDE?\n**Integrated Development Environment:** Basically a text editor that gives\
    \ you a bunch of tools to help you write better software.\n\n2. What is the best\
    \ IDE software?\n**This is a trick question! It’s whatever I like the best, for\
    \ my personal reasons.**\n\n3. What is a variable?\n**A variable allows you to\
    \ reference data by specifying a property, you can later reference that property\
    \ in your application. For example my_name = “Casey” would be a variable.**\n\n\
    4. How do you print something to the terminal window in Python 3?\n\n```\nprint(\"\
    This doesn't print anything!\")\n```\n\n5. Why should you use comments?\nTo provide\
    \ meaningful context to a python program\n\n6. Can you have multi-line comments?\n\
    True\n\n## Day 2 - Data Types\n\n1. How do you convert a number to a string, explicitly?\n\
    **By using the *str()* method**\n\n2. Tuples are immutable?\n**True**\n\n## Day\
    \ 3 - Operators\n\n1. What operator is used to multiply two numbers together?\n\
    *\n\n2. There are comparison operators in Python, which allow you to compare integers.\n\
    **True**\n\n## Day 4 - User Interaction\n\n1. What Python function is used to\
    \ prompt the user for input?\n**input()**\n\n2. When a user responds to an input\
    \ function with a number, the variable is saved as a string.\n**True**\n\n## Day\
    \ 5 - If-Else Statements\n\n1. What type of statement in Python can be used to\
    \ make a decision?\n**if-else statements**\n\n2. Suppose you have the below code\
    \ block and it is executed, what will you see on the terminal?\n\n```\nrider_age\
    \ = 13\nage_limit = 16\nif rider_age >= age_limit:\n    print(\"Congrats! You\
    \ are old enough to go on this ride!\")\n```\n\n**Nothing will be outputted**\n\
    \n3. In order to use a `if` statement, you must also use an else.\n**False**\n\
    \n## Day 6 - Try-Exceptions\n\n1. How do you handle errors or exceptions within\
    \ a Python program?\n**try-except blocks**\n\n2. What is the term used to describe\
    \ the joining or combining of strings?\n**Concatenation**\n\n3. Finally blocks\
    \ always run\n**True**\n\n## Day 8 - Functions\n\n1. How do you create or define\
    \ a function in your code?\n**def**\n\n2. How many times are you allowed to use\
    \ a function in a program?\n**Unlimited**\n\n## Day 9 - Modules & Packages\n\n\
    1. What keyword do you use to use a package or module in your Python code?\n**import**\n\
    \n2. What is the package installer / manager for Python?\n**pip**\n\n## Day 10\
    \ - Working with Files\n\n1. Using the open and write function for an existing\
    \ file:\n**will overwrite all the contents already in that file**\n\n2. The following\
    \ code block will open a file called nerd_names.txt, read it, and print it to\
    \ the terminal and then subsequently close the file.\n\n```\nnerd_file = open(\"\
    nerd_names.txt\", \"r\")\nprint(nerd_file.read())\nnerd_file.close()\n```\n\n\
    True\n\n## Day 11 - Debugging\n\n1. A breakpoint allows you to\n**allows you to\
    \ stop your program at a specific line number and then step through subsequent\
    \ line codes**\n\n2. A watcher allows you to watch a variable as your program\
    \ runs.\n**True**\n\n## Day 12 - Classes and Objects\n\n1. You can think of a\
    \ class, as a *blueprint*\n**True**\n\n2. An object is an instance of a class\n\
    **True**\n\n## Day 13 - Requests Library\n\n1. The requests library is built into\
    \ Python\n**False**\n\n2. The requests library allows you to send a HTTP request\n\
    **True**\n\n## Day 15 - Bonus Day - Building a Website with GatsbyJs\n\n## About\
    \ the Author\n\n**Ricardo Reid**\n\nRicardo A. Reid is an engineer and military\
    \ officer with over 12 years of Systems Engineering experience in the aerospace\
    \ and defense industry. He has worked for Lockheed Martin and Northrop Grumman\
    \ to design, develop, and integrate weapon systems for the U.S. military. Notable\
    \ programs include the development of hypersonic missiles and dual-band sensors\
    \ for 5th generation fighter jets. As a Navy Reservist, he has honorably served\
    \ his country for 15 years and completed two tours to Afghanistan. He currently\
    \ serves as a Commanding Officer for a unit that provides depot-level maintenance\
    \ support to naval surface ships and submarines.\n\nHe is an avid learner and\
    \ always dedicated to continual education and teaching. He is a graduate of the\
    \ University of Central Florida. He received a B.S. in Electrical Engineering,\
    \ M.S. in Systems Engineering, and M.S. in Engineering Management. As of December\
    \ 2015, he is a certified Project Management Professional (PMP) with various IT\
    \ and cloud certifications. He holds 5 AWS certifications, 3 CompTIA certifications,\
    \ and previously held a CCNA certification.\n\nRicardo has a strong passion for\
    \ teaching technical skills to others, especially military veterans and spouses.\
    \ His goal is to better educate as many people as possible in engineering and\
    \ information technology. He is devoted to helping others understand various technical\
    \ topics with the least effort. He believes everyone is capable of acquiring technical\
    \ skills. All it takes is a little bit of effort and a will to learn. When it\
    \ comes to technology, the sky is the limit!\n\n## Casey Gerena\n\nCasey Gerena\
    \ started building software at the young age of eight and has worked for companies\
    \ such as Amazon, Accenture, and Lockheed Martin in various engineering-related\
    \ roles. Casey became passionate about software at the young age of seven when\
    \ he played the video game Doom on his PC. Casey is passionate about teaching\
    \ others software engineering, the cloud, and serverless technology. He believes\
    \ serverless is the future of software engineering. Casey holds a BS in Management\
    \ Information Systems from the University of Central Florida, an MS in logistics\
    \ and global supply chain management from Embry-Riddle Aeronautical University,\
    \ and a second MS in Computer Science from the Georgia Institute of Technology.\
    \ Casey holds several IT certifications, including the Certified Information Systems\
    \ Security Professional (CISSP) and nine AWS certifications. Casey loves helping\
    \ others learn about technology, especially when it comes to software engineering.\
    \ He enjoys weightlifting, playing video games, and spending time with his wife\
    \ and daughter, Marilyn and Mia.\n\n**You can connect with me on:**\n\n- \U0001F310\
    \ [https://nerdchallenges.com](https://nerdchallenges.com)\n- \U0001F426 [https://twitter.com/cjgerena](https://twitter.com/cjgerena)\n\
    - \U0001F517 [https://twitter.com/rricoreid](https://twitter.com/rricoreid)\n\n\
    **Subscribe to my newsletter:**\n\n- ✉️ [https://nerdchallenges.com](https://nerdchallenges.com)"
  mdcn: "## 第15天挑战\n\n如果这本书没有一些挑战，那就不叫《极客挑战》了！所以，开始行动吧！\n\n- 千字节挑战：尝试将你开发的网站标题更新为“My\
    \ First Gatsby Page!”。\n- 兆字节挑战：尝试将**恭喜——我刚刚制作了我的第一个Gatsby网站**的字体颜色更改为#E90025。\n\
    - 吉字节挑战：尝试更新网页上的**文档**链接。\n- 太字节挑战：尝试将此网站自行部署到Gatsby Cloud！\n\n## 这很有趣！\n\n里卡多和我希望你喜欢这本Python书以及我们《GatsbyJS\
    \ v4》书中这个小节选。我们写这本书和录制视频时非常开心，希望你能从中学习。一如既往，欢迎随时联系我们，告诉我们你对这本书的看法，无论好坏！casey@nerdchallenges.com\
    \ 和 rico@nerdchallenges.com\n\n## 问答解答\n\n## 第1天 - 安装Python 答案\n\n1. 什么是IDE？\n\
    **集成开发环境：** 基本上是一个文本编辑器，提供一系列工具帮助你编写更好的软件。\n\n2. 最好的IDE软件是什么？\n**这是个陷阱题！它取决于我个人喜好，出于个人原因。**\n\
    \n3. 什么是变量？\n**变量允许你通过指定一个属性来引用数据，之后可以在应用程序中引用该属性。例如，my_name = “Casey”就是一个变量。**\n\
    \n4. 如何在Python 3中向终端窗口打印内容？\n\n```\nprint(\"This doesn't print anything!\")\n\
    ```\n\n5. 为什么应该使用注释？\n为Python程序提供有意义的上下文。\n\n6. 可以有多行注释吗？\n是的\n\n## 第2天 - 数据类型\n\
    \n1. 如何显式地将数字转换为字符串？\n**使用 *str()* 方法**\n\n2. 元组是不可变的？\n**是的**\n\n## 第3天 - 运算符\n\
    \n1. 用于将两个数字相乘的运算符是什么？\n*\n\n2. Python中有比较运算符，允许你比较整数。\n**是的**\n\n## 第4天 - 用户交互\n\
    \n1. Python中用于提示用户输入的函数是什么？\n**input()**\n\n2. 当用户用数字响应input函数时，变量会保存为字符串。\n**是的**\n\
    \n## 第5天 - If-Else语句\n\n1. Python中可以用来做决定的语句类型是什么？\n**if-else语句**\n\n2. 假设你有以下代码块并执行它，你会在终端上看到什么？\n\
    \n```\nrider_age = 13\nage_limit = 16\nif rider_age >= age_limit:\n    print(\"\
    Congrats! You are old enough to go on this ride!\")\n```\n\n**不会有任何输出**\n\n3.\
    \ 要使用`if`语句，你也必须使用else。\n**错误**\n\n## 第6天 - Try-Exceptions\n\n1. 如何在Python程序中处理错误或异常？\n\
    **try-except块**\n\n2. 用于描述字符串连接或组合的术语是什么？\n**连接**\n\n3. Finally块总是会运行\n**是的**\n\
    \n## 第8天 - 函数\n\n1. 如何在代码中创建或定义函数？\n**def**\n\n2. 在程序中允许使用函数的次数是多少？\n**无限**\n\n\
    ## 第9天 - 模块与包\n\n1. 在Python代码中使用包或模块的关键字是什么？\n**import**\n\n2. Python的包安装器/管理器是什么？\n\
    **pip**\n\n## 第10天 - 处理文件\n\n1. 对现有文件使用open和write函数：\n**会覆盖该文件中已有的所有内容**\n\n2.\
    \ 以下代码块将打开一个名为nerd_names.txt的文件，读取它，将其打印到终端，然后关闭该文件。\n\n```\nnerd_file = open(\"\
    nerd_names.txt\", \"r\")\nprint(nerd_file.read())\nnerd_file.close()\n```\n\n\
    是的\n\n## 第11天 - 调试\n\n1. 断点允许你\n**允许你在特定行号停止程序，然后逐步执行后续代码行**\n\n2. 监视器允许你在程序运行时监视一个变量。\n\
    **是的**\n\n## 第12天 - 类与对象\n\n1. 你可以将类看作一个*蓝图*\n**是的**\n\n2. 对象是类的一个实例\n**是的**\n\
    \n## 第13天 - Requests库\n\n1. requests库是Python内置的\n**错误**\n\n2. requests库允许你发送HTTP请求\n\
    **是的**\n\n## 第15天 - 额外一天 - 使用GatsbyJs构建网站\n\n## 关于作者\n\n**里卡多·里德**\n\n里卡多·A·里德是一名工程师和军官，在航空航天和国防行业拥有超过12年的系统工程经验。他曾为洛克希德·马丁和诺斯罗普·格鲁曼公司工作，为美国军方设计、开发和集成武器系统。著名项目包括为第五代战斗机开发高超音速导弹和双波段传感器。作为海军预备役人员，他已光荣服役15年，并完成了两次阿富汗部署。他目前担任一个单位的指挥官，该单位为海军水面舰艇和潜艇提供仓库级维护支持。\n\
    \n他是一位热衷学习的人，始终致力于持续教育和教学。他是中佛罗里达大学的毕业生。他获得了电气工程学士学位、系统工程硕士学位和工程管理硕士学位。截至2015年12月，他是一名认证的项目管理专业人士（PMP），并拥有各种IT和云认证。他持有5个AWS认证、3个CompTIA认证，并且之前持有CCNA认证。\n\
    \n里卡多对向他人传授技术技能充满热情，特别是对军事退伍军人和配偶。他的目标是更好地教育尽可能多的人学习工程和信息技术。他致力于帮助他人以最少的努力理解各种技术主题。他相信每个人都有能力获得技术技能。所需要的只是一点努力和学习的意愿。说到技术，天空才是极限！\n\
    \n## 凯西·杰瑞纳\n\n凯西·杰瑞纳从八岁开始构建软件，并曾在亚马逊、埃森哲和洛克希德·马丁等公司担任各种工程相关职位。凯西在七岁时玩PC游戏《毁灭战士》时就对软件产生了热情。凯西热衷于教授他人软件工程、云计算和无服务器技术。他认为无服务器是软件工程的未来。凯西拥有中佛罗里达大学管理信息系统学士学位、安柏瑞德航空大学物流与全球供应链管理硕士学位，以及佐治亚理工学院计算机科学第二个硕士学位。凯西持有多个IT认证，包括认证信息系统安全专家（CISSP）和九个AWS认证。凯西喜欢帮助他人学习技术，尤其是在软件工程方面。他喜欢举重、玩电子游戏，并与妻子玛丽莲和女儿米娅共度时光。\n\
    \n**你可以通过以下方式联系我：**\n\n- \U0001F310 [https://nerdchallenges.com](https://nerdchallenges.com)\n\
    - \U0001F426 [https://twitter.com/cjgerena](https://twitter.com/cjgerena)\n- \U0001F517\
