    \ use it. Classes allow us to create objects, so you don't need to do that.\n\n\
    Until now, you have thought of Python just as another interpreted high-level programming\
    \ language. Another trait that I have yet to discuss is that it is also an object-oriented\
    \ programming language. Similar to Java, C++, and C#, it allows organizing a program\
    \ design around classes and objects instead of solely procedural and using functions.\n\
    \nClasses consist of data attributes and methods. The attributes describe the\
    \ characteristics of the class. It’s defining what that class is. Then there are\
    \ **methods**, which describe what a class does or how it functions. This will\
    \ become clearer as I go over a few examples.\n\n## Objects\n\n**Objects** are\
    \ instances of classes. So, what you do is create one class. Each time that class\
    \ is called, it creates an object or instance from that class. This means that\
    \ the object created holds all the same attribute types and methods as the class.\
    \ It also means you can create multiple objects of the same class with a different\
    \ attribute value.\n\n## Constructing Classes\n\nI stated that classes are composed\
    \ of data attributes and methods. Cars are a perfect example of a class. There\
    \ are Cars everywhere with different years, makes, models, colors, and doors.\
    \ All those characteristics I just listed are data attributes. The values of those\
    \ attributes may be different, but they are always on each car. They are what\
    \ makes a car a car! Each car also has a few functions that they perform, such\
    \ as accelerating, braking, and turning. In a class, this would be known as their\
    \ methods. Each different type of car you represent in your program will be a\
    \ new object.\n\nLet’s create a new Python file called **car_class.py** to show\
    \ how classes are constructed. The first line in the code will have the class\
