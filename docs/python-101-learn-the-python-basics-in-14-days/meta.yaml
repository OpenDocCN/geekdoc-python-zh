    \ 'int'\n```\n\n这是漫长但有趣且令人兴奋的一天。你学到了很多关于使用调试器的知识，在第十二天，你将学习 Python 中的类和对象。\n\n\
    # 12\n\n## 第 12 天：类和对象\n\n阅读时间：8 分钟\n\n## Python 类\n\n将 Python 中的**类**视为创建对象的蓝图，这些对象可以在你的整个程序中使用。建筑的蓝图或示意图为你提供了构建建筑的必要框架。类与对象的关系也是如此。类本质上为你提供了创建自己的数据类型的能力。这很重要，因为现实世界中的并非所有事物都能用我在第\
    \ 3 天讨论的数据类型来表示。那些数据类型仅限于字符串、数字、列表、元组和字典。\n\n想想你可能需要在程序中表示的一些人、地点或事物。可能没有任何变量可以使用你在前面章节中学到的基本数据类型来存储它。如果你没有类，这可能是一个问题，因为那样每次你想使用该数据类型时，你都需要重复生成大量代码来表示它。类允许我们创建对象，所以你不需要这样做。\n\
    \n到目前为止，你一直认为 Python 只是另一种解释型高级编程语言。我尚未讨论的另一个特点是它也是一种面向对象的编程语言。类似于 Java、C++ 和\
    \ C#，它允许围绕类和对象来组织程序设计，而不仅仅是过程式和使用函数。\n\n类由数据属性和方法组成。属性描述类的特征。它定义了该类是什么。然后是**方法**，它们描述类做什么或如何运作。当我举几个例子时，这将变得更加清晰。\n\
    \n## 对象\n\n**对象**是类的实例。所以，你所做的是创建一个类。每次调用该类时，它都会从该类创建一个对象或实例。这意味着创建的对象拥有与类相同的所有属性类型和方法。这也意味着你可以创建具有不同属性值的同一类的多个对象。\n\
    \n## 构造类\n\n我指出类由数据属性和方法组成。汽车是类的一个完美例子。到处都是汽车，有不同的年份、品牌、型号、颜色和车门。我刚才列出的所有这些特征都是数据属性。这些属性的值可能不同，但它们始终存在于每辆车上。它们是使汽车成为汽车的东西！每辆车还有一些它们执行的功能，例如加速、刹车和转弯。在类中，这被称为它们的方法。你在程序中表示的每种不同类型的汽车都将是一个新的对象。\n\
    \n让我们创建一个名为 **car_class.py** 的新 Python 文件来展示类是如何构造的。代码的第一行将包含类名，其语法为 *class :*。在这种情况下，你将编写\
    \ **class Car:** 来表示一个 Car 类。\n\n在类名下方将是你的 ***init()*** 函数。这应该包含在你创建的每个函数中。此函数在函数初始化时总是被执行。它是调用类时运行的第一部分代码。在函数的括号内，你可以为数据属性定义参数。***init()***\
    \ 函数中的第一个参数总是 *self*。Self 让我们能够访问类内的数据属性和方法。Self 之后是类的数据属性："
