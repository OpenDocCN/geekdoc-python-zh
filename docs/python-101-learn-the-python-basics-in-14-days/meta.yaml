- img_proc: true
  md: '# Advantages


    There are many advantages to using Python, but there are four main advantages:
    Free and open-source, extensive libraries, works on many platforms or Operating
    Systems, and dynamic typing. Open-source means a community filled with free libraries
    shared by other Python developers. You can use code that others have already developed
    into your projects and code.


    The bottom line is that there is no need to reinvent the wheel while programming.
    Code and libraries have already been created for you that you can use. That leads
    us to our next benefit over other languages. There is an extensive number of libraries
    available to be used. I will go over libraries, and you will see'
  merge: -1
  pgno: 51
- img_proc: true
  md: 'that they can make developing our programs easy as 1,2,3!


    You can use Python across many operating systems. The advantage of cross-platform
    development is that it gives you the ability to code an application once and run
    that same code on different operating systems such as macOS and Windows.


    When declaring variables, you have to identify a variable data type in most languages.
    This strict declaration can make programming difficult and cause errors if set
    improperly. Fortunately, Python doesn’t have this issue. Python is a **dynamically
    typed** language. When you create a variable, you don’t need to tell Python what
    type of variable it is. The dynamically typed'
  merge: -1
  pgno: 52
- img_proc: true
  md: 'characteristic is one of the many reasons it’s so easy to write in Python.


    Python can work with almost all databases that you may know. It has a software
    library called PANDAS that allows data manipulation and analysis in Machine Learning
    applications. You can import data from various file formats such as SQL, JSON,
    Microsoft Excel, and CSV files.'
  merge: -1
  pgno: 53
- img_proc: true
  md: '# Disadvantages


    Like with anything, there are disadvantages. I will show you those now to ensure
    you choose to use Python for the correct applications. This language runs at a
    slower speed than many other languages. It is a direct result of being an interpreted
    language rather than a compiled language. Essentially the code is being executed
    much slower because it’s converted to machine code at run-time.


    The interpreter, while helpful, does pose other issues of its own. It also performs
    memory management of the program. You do not control how Python allocates memory
    while the program is running. Memory management is not a showstopper in the'
  merge: -1
  pgno: 54
- img_proc: true
  md: 'smaller programs you will be dealing with in this book. However, it is good
    to keep that in mind when designing more extensive programs.


    In compiled languages, most of your errors will occur at build-time. The compiler
    must compile or build your code for the CPU to run it, and if any errors occur,
    the compiler will notify you.


    In interpreted languages, errors occur at run-time because there is no build or
    compiling step. These run-time errors arise during the program’s execution and
    can render the program entirely inoperable. You will be exposed to the common
    run-time errors so you can avoid them while creating programs.'
  merge: -1
  pgno: 55
- img_proc: true
  md: '# When not to use Python


    All in all, Python is a great language; however, it isn’t appropriate for every
    single use case. There are a few key areas where it doesn’t shine. First, if **speed**
    is a significant concern for your application, Python, or any interpreted language
    for that matter probably shouldn’t be used. Compiled languages just run fast,
    period. Second, **mobile application** development isn’t generally Python’s strong
    suit. While there are newer frameworks such as Kivy ([https://kivy.org](https://kivy.org))
    and Beeware ([https://beeware.org](https://beeware.org)), you’re limited in what
    you can build. You’re better off sticking with the native languages Swift (iOS
    - [https://developer.apple.com/swift/](https://developer.apple.com/swift/)) and'
