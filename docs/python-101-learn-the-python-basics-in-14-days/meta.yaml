    \   -   正确\n    -   错误\n\n## 第12天挑战\n\n-   千字节挑战：创建一个Book类并创建一个Book对象。\n\n## 第13天：Requests库\n\
    \n*阅读时间：7分钟*\n\nrequests库允许你向Web服务器发送数据以及从Web服务器接收数据。到现在，你应该对安装第三方库更加熟悉了。你将使用pip来安装requests库，就像你之前安装其他库一样。\n\
    \nrequests库允许你发送超文本传输协议（HTTP）数据。你可能认得HTTP。你以前在哪里见过它？当你在网页浏览器中输入统一资源定位符（URL）时，你就见过它。例如（[https://nerdchallenges.com](https://nerdchallenges.com)），HTTP协议允许网页浏览器和其他应用程序通过互联网来回发送数据。HTTP是一种定义Web服务器和浏览器如何来回发送数据的协议。\n\
    \n在你开始安装requests库并学习如何使用它之前，你将首先了解HTTP方法和HTTP响应代码。\n\n## HTTP方法\n\nHTTP方法是允许你向Web服务器发送数据以及从Web服务器接收数据的方法。你将使用四种主要方法：\n\
    \n-   GET\n-   POST\n-   PUT\n-   DELETE\n\nGET方法允许你从Web服务器请求数据，因此，每当你想从Web服务器或网站获取数据时，就会发送一个GET请求。例如，当你访问[https://nerdchallenges.com](https://nerdchallenges.com)时，你的网页浏览器会向Nerd\
    \ Challenges的Web服务器发送一个GET请求。\n\nPOST方法允许你在服务器上创建一个新记录。换句话说，这是用于向Web服务器发送数据的。它是在Web服务器上创建数据的一种方式。例如，你正在从你最喜欢的披萨店订购披萨，你访问他们的网站，将披萨添加到购物车，然后结账。当你结账时，会向服务器发送一个POST请求来创建一个*新*订单，披萨店的Web服务器会将订单添加到他们的数据库中，并开始制作你的披萨。POST请求用于向Web服务器添加全新的数据。\n\
    \nPUT方法与POST方法类似，因为它向服务器添加数据；但是，它用于当你用新值*覆盖*数据而不是创建新记录时。例如，假设你有一家美甲沙龙，在你的Web应用程序中，你有一个当天客户的预约列表。你的客户Jane有一个周二下午4:00的预约，Jane将预约更新为周四下午5:00。前面的场景将是一个PUT请求，因为Jane已经有一个预约记录，只是想用新数据覆盖该数据。\n\
    \nDELETE方法从Web服务器或应用程序中删除数据。继续美甲沙龙的例子，Jane现在想完全删除她的预约。Jane可以向Web服务器发送一个DELETE请求来删除她的预约。\n\
    \n还有更多的HTTP方法，但这些是几乎每个应用程序中使用的主要四种。要查看所有HTTP方法的列表，你可以访问这个网站：\nhttps://developer.mozilla.org/en-US/docs/Web/HTTP/Methods\n\
    \n## HTTP响应状态码\n\nHTTP响应状态码告诉你Web服务器或应用程序是否已成功处理HTTP请求。有许多状态码，但我想介绍三个主要的状态码，你在创建应用程序时很可能会看到。\n\
    \n-   200\n-   201\n-   404\n\n200是OK。这意味着Web服务器已收到你发送的数据，或者已发送你请求的数据，具体取决于发送的请求类型。本质上，它意味着一切运行成功。\n\
    \n201是Created。这通常在你向服务器发送数据（可能是POST或PUT请求）后发送。它告诉你记录或数据已被创建和处理。\n\n404是Not Found。这个你可能在浏览网站或应用程序时已经见过。它意味着你请求的资源不在你指定的位置。这通常意味着网站所有者已将页面移动到其他地方或完全删除了该页面。\n\
    \n## 安装requests\n\n要安装requests，你遵循与其他库相同的过程。\n\n```\npip install requests\n```\n\
