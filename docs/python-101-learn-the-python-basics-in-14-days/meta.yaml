- md: "## Window\n\nThe next thing we need to set up is the actual application window.\
    \ Within this window, we will have a layout. In this section, we are provided\
    \ with the ability to change the attributes of the layout. Here we designate the\
    \ width/height in characters of each of the buttons listed in the layout. In this\
    \ case, we are using size (5,2) for element size. This means five characters wide\
    \ and two characters high:\n\n```python\n# Window/From Section: Setup GUI and\
    \ size buttons\nform = FlexForm('My Calculator GUI',\n    default_button_element_size=(6,\
    \ 2),\n    auto_size_buttons=False, grab_anywhere=False)\nform.Layout(layout)\
    \ # chooses the above layout\n```\n\n## Event Loop\n\nThe event loop is where\
    \ all the operations are conducted. The while loop is what opens the GUI window\
    \ and keeps it open until the user hits the top right exit button to close the\
    \ program. The button values are being read in as each button is selected with\
    \ the following code:\n\n```python\n# Return Value\nReturn = ''\n\n# Event Loop\n\
    while True:\n    # Button Values\n    button, value = form.Read() # reads in the\
    \ values from the form when a button is clicked\n```\n\nThere are some special\
    \ things that must be with our Calculator if the Clear, < (backspace), X (exit\
