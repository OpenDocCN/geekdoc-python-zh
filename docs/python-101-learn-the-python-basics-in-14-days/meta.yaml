- md: '## Append to Files


    Create another text file in the current working directory called **more_names.txt**.
    In the text file, put the following names:


    - Newton

    - Hawking

    - Tyson

    - Musk


    This time create a python file with the name **appendFile.py**. Let’s do a quick
    check to make sure that the more_names.txt file is readable:


    ```python

    names_file = open("more_names.txt", "r")

    print(names_file.readable())

    names_file.close()

    ```


    Result: True


    As you learned earlier, **TRUE** means that the file is readable by your program;
    since it is readable, you can access the file to append more content to it. When
    you use append, you can add text and even contents from another file to the end
    of the read file. So, information from one file can be appended to another, resulting
    in that one file having the contents added from the appended file. To append a
    file, we use the *a* as the mode for the *open()* function. The syntax is *open(,
    “a”>*.


    It is essential to understand that when using this mode, you are not just opening
    and reading a file. You are also writing to it. The append function will write
    to the end of the file you are opening to add additional contents. There is no
    reverting back to the original file after the function has been executed. It is
    a good idea to back up your original file in case a mistake is made.


    All right, well, let’s give it a go. In our example, you are going to append the
    name “Gates” to **more_names.txt**. This means that the string “Gates” will be
    copied to the end of the **more_names.txt** file. Then you will print out **more_names.txt**
    to see how it looks:


    ```python

    names_file = open("more_names.txt", "a")

    names_file.write("\nGates")


    names_file = open("more_names.txt", "r")

    print(names_file.read())

    names_file.close()

    ```


    *Result: Newton*

    *Hawkins*

    *Tyson*

    *Musk*

    *Gates*


    As you can see, you were able to add “Gates” to your **more_names.txt** file.
    I added the escape character * **so that the name would be on its own line like
    all the other names already in the file. If you don’t add that escape character,
    the name would be added right after the last string in the file; in this case,
    it would be Musk. Without *, your code would output the last line as “MuskGates”.**


    Let’s take that same example. Using that same code from before, change the file
    in both open functions to **“random.txt”**. You and I know that there is no file
    in the current working directory with that name. I wonder what is going to happen.
