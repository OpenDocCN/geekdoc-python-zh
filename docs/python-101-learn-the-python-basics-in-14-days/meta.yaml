- md: "Awesome you’ll use brew to install git!\nInstall git by running this command\n\
    \n```\nbrew install git\n```\n\nAfter it’s done just type the following:\n\n```\n\
    git --version\n```\n\nIf it reported a version, then you’re good to go! All done!\
    \ Life is so easy with Homebrew!\n\n## Linux Setup\n\nInstall git by running this\
    \ command\n\n```\nsudo apt-get install git\n```\n\nTo verify that git has been\
    \ installed, run this command\n\n```\ngit --version\n```\n\nIt should print out\
    \ a version, such as git version 2.25.1\n\n## Installing Node.js\n\nNode.js allows\
    \ you to run Javascript locally on your machine, since you’re using Javascript\
    \ to build your website, you need to be able to run and test things outside of\
    \ your browser. React and GatsbyJS utilize Node.js to build artifacts that you\
    \ will later deploy to a hosting provider.\n\nAdditionally (on MacOS and Linux),\
    \ you can use **Node Version Manager (NVM)** to switch between different versions\
    \ of Node.js easily. While you may not necessarily use this feature, it is a handy\
    \ tool in case you ever need to swap versions of Node.js for a different project.\
    \ To learn more about NVM you can look at the GitHub Repo located here\nhttps://github.com/nvm-sh/nvm\n\
    \n## Windows Setup\n\nHead over to [https://nodejs.org/en/download/](https://nodejs.org/en/download/)\
    \ and download the Windows Installer (.msi) file for the LTS version. At the time\
    \ of this writing it is v16.13.1; however any version after v14 will likely suffice.\
    \ Once you download it, go ahead and install it and accept all of the default\
    \ installation options.\n\nAfter it is installed, open up your Command Prompt\
    \ and type the following\n\n```\nnode --version\n```\n\nYou should see something\
    \ similar to the following\n\n```\nTerminal output\nv16.13.1\n```\n\nSweet! It’s\
    \ installed.\n\n## MacOS Setup\n\nBecause you installed Homebrew earlier this\
    \ is a breeze, just run the following command\n\n```\nbrew install nvm\n```\n\n\
    After that you’ll see some next steps that homebrew and nvm ask you to do, which\
    \ result in creating a directory and updating your configuration files. Be sure\
    \ to follow those instructions, which should look something like this\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_466_0.png)\n\
    \nIf you don’t follow those instructions nvm may not work correctly. Your final\
    \ configuration file should look something like this:\n\n![](img/94a1435e4acaf57ed4f2a785450910d2_467_0.png)\n\
    \nNow that nvm is installed, lets verify everything is working as expected by\
    \ typing\n\n```\nnvm --version\n```\n\nnvm should report the version number and\
    \ it should look something like this\n\n```\nTerminal Output\n0.39.0\n```\n\n\
    Now that we have nvm installed, we can use it to install Node.Js, to do this type\
    \ the following command\n\n```\nnvm install --lts\n```\n\nThis should install\
    \ the **LTS** version of Node.Js, which stands for Long Term Support. The LTS\
    \ term means that Node.Js will support that primary LTS version for 3 years. As\
    \ of this writing, the current LTS version is v16.13.1. I recommend, that you\
    \ use the LTS version as it is more stable then the latest version of Node.js,\
    \ which is currently v17.2.0.\n\nHowever, if you'd like to try out the latest\
    \ version of Node you can use nvm to install it and then simply switch between\
    \ the two. To do this simply run\n\n```\nnvm install node\n```\n\nThis will install\
    \ the latest version of Node.js, you can switch to the latest version by typing\n\
    \n```\nnvm use node\n```\n\nTo switch back to the LTS version, simply type\n\n\
    ```\nnvm use --lts\n```\n\nPretty awesome right?!\n\n## Linux Setup\n\n**nvm**\
    \ is a bash script, to install it run this command\n\n```\nwget -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.38.0/install.sh\
    \ | bash\n```\n\nNext, close your terminal and re-open the terminal application\
    \ again. This will refresh your terminal so you can access **nvm**. To check that\
    \ **nvm** is installed properly type this command\n\n```\nnvm --version\n```\n\
    \nnvm should report the version number and it should look something like this\n\
    \n```\nTerminal Output\n0.39.0\n```\n\nNow that we have nvm installed, we can\
    \ use it to install Node.Js, to do this type the following command\n\n```\nnvm\
    \ install --lts\n```\n\nThis should install the **LTS** version of Node.Js, which\
    \ stands for Long Term Support. The LTS term means that Node.Js will support that\
    \ primary LTS version for 3 years. As of this writing, the current LTS version\
    \ is v16.13.1. I recommend, that you use the LTS version as it is more stable\
    \ then the latest version of Node.js, which is currently v17.2.0.\n\nHowever,\
    \ if you'd like to try out the latest version of Node you can use nvm to install\
    \ it and then simply switch between the two. To do this simply run\n\n```\nnvm\
    \ install node\n```\n\nThis will install the latest version of Node.js, you can\
    \ switch to the latest version by typing\n\n```\nnvm use node\n```\n\nTo switch\
    \ back to the LTS version, simply type\n\n```\nnvm use --lts\n```\n\nPretty awesome\
    \ right?!\n\n## Installing Gatsby CLI\n\nInstalling Gatsby CLI is the same process\
    \ on Windows, MacOS, and Linux. The Gatsby CLI is going to help you quickly create\
    \ a new Gatsby website, it makes getting started extremely simple. The tool is\
    \ going to set up the entire website package so you can get started building.\n\
    \nYou’re going to install it as a global npm package, since you’ll be using it\
    \ across multiple projects. Generally speaking you should avoid installing packages\
    \ globally; however, for certain CLI based tools, it can make sense in certain\
    \ situations. In this case, it does. To install it run\n\n```\nnpm install --global\
    \ gatsby-cli\n```\n\nViola! Gatsby CLI is installed, make sure it is working by\
    \ running\n\n```\ngatsby --version\n```\n\nYou should see it return Gatsby CLI\
    \ Version: 4.3.0 (or a newer version)\n\n## Hello World with GatsbyJS v4\n\nAlright!\
    \ All your developer tools are installed, whew that was a journey! Now it’s time\
    \ to get your first GatsbyJS v4 site up and running in your development environment.\n\
    \nYou’re going to use the Gatsby CLI to create the initial boilerplate website.\
    \ To do this, open up a terminal window and navigate to whichever folder you’d\
    \ like to create the website in. For example, I put all of my projects in a folder\
    \ called external-website-projects. So, inside VSCode open up a terminal and I\
    \ can navigate to that directory by typing\n\n```\ncd ~/Documents/external-website-projects/\n\
    ```\n\nThis is my directory, but it doesn’t have to be yours, feel free to create\
    \ whatever directory structure you like. I’m simply going to refer to this location\
    \ as the **website project folder** in the future. Once you are where you want\
    \ to be, create a new Gatsby project by typing in\n\n```\ngatsby new\n```\n\n\
    The Gatsby CLI is going to ask you several questions which it will use to determine\
    \ specific build settings. So, you are telling this command line program gatsby\
    \ to create a new site for you. Answer the questions Gatsby CLI asks as follows:\n\
    \n### What would you like to call your site?\n\n```\nMy First Gatsby Site\n```\n\
    \n### What would you like to name the folder where your site will be created?\n\
    \n```\nmy-first-gatsby-site\n```\n\n### Will you be using a CMS?\n\n```\nNo (or\
    \ I'll add it later)\n```\n\n### Would you like to install a styling system\n\n\
    ```\nNo (or I'll add it later)\n```\n\n### (Multiple choice) Use arrow keys to\
    \ move, enter to select, and choose “Done” to confirm your choices\n\n```\nDon't\
    \ select any of the choices, and select Done\n```\n\n### Shall we do this (Y/n)?\n\
    \n```\nYes\n```\n\nAwesome! Our site is now built, time to take a peek and check\
    \ it out. Navigate to the site directory.\n\n```\ncd my-first-gatsby-site\n```\n\
    \nLaunch your site by running it locally by typing\n\n```\ngatsby develop\n```\n\
    \nThis command tells Gatsby to start the local development server on port 8000\
    \ as well as the GraphiQL tool on the `___graphql` path, you will learn about\
    \ GraphiQL in a later chapter. For now, If you open up your web browser to the\
    \ following address http://localhost:8000/ you should see your first GatsbyJS\
    \ site!\n\n## Congratulations\n— you just made a Gatsby site! \U0001F389\U0001F389\
    \U0001F389\n\nEdit `src/pages/index.js` to see this page update in real-time.\
    \ \U0001F60E\n\n## Documentation\n\n- [Tutorial](https://www.gatsbyjs.com/docs/tutorial/)\n\
    \  A great place to get started if you're new to web development. Designed to\
    \ guide you through setting up your first Gatsby site.\n- [How to Guides](https://www.gatsbyjs.com/docs/how-to/)\n\
    \  Practical step-by-step guides to help you achieve a specific goal. Most useful\
    \ when you're trying to get something done.\n- [Reference Guides](https://www.gatsbyjs.com/docs/reference/)\n\
    \  Nitty-gritty technical descriptions of how Gatsby works. Most useful when you\
    \ need detailed information about Gatsby's APIs.\n- [Conceptual Guides](https://www.gatsbyjs.com/docs/conceptual/)\n\
    \  Big-picture explanations of higher-level Gatsby concepts. Most useful for building\
    \ understanding of a particular topic.\n- [Plugin Library](https://www.gatsbyjs.com/plugins/)\n\
    \  Add functionality and customize your Gatsby site or app with thousands of plugins\
    \ built by our amazing developer community.\n- [Build and Host](https://www.gatsbyjs.com/products/cloud/)\
    \ NEW!\n  Now you're ready to show the world! Give your Gatsby site superpowers:\
    \ Build and host on Gatsby Cloud. Get started for free!"
  mdcn: "太棒了，你将使用 brew 来安装 git！\n运行以下命令安装 git\n\n```\nbrew install git\n```\n\n安装完成后，只需输入以下命令：\n\
    \n```\ngit --version\n```\n\n如果它报告了一个版本，那么你就准备好了！全部搞定！有了 Homebrew，生活就是这么简单！\n\n\
    ## Linux 设置\n\n运行以下命令安装 git\n\n```\nsudo apt-get install git\n```\n\n要验证 git 是否已安装，请运行此命令\n\
    \n```\ngit --version\n```\n\n它应该会输出一个版本号，例如 git version 2.25.1\n\n## 安装 Node.js\n\
    \nNode.js 允许你在本地机器上运行 Javascript，既然你使用 Javascript 来构建网站，你就需要能够在浏览器之外运行和测试东西。React\
    \ 和 GatsbyJS 利用 Node.js 来构建你稍后将部署到托管提供商的构建产物。\n\n此外（在 MacOS 和 Linux 上），你可以使用 **Node\
    \ 版本管理器 (NVM)** 轻松地在不同版本的 Node.js 之间切换。虽然你可能不一定使用此功能，但如果你需要为不同的项目切换 Node.js 版本，它是一个方便的工具。要了解更多关于\
    \ NVM 的信息，你可以查看位于此处的 GitHub 仓库\nhttps://github.com/nvm-sh/nvm\n\n## Windows 设置\n\
    \n前往 [https://nodejs.org/en/download/](https://nodejs.org/en/download/) 并下载 LTS\
    \ 版本的 Windows 安装程序 (.msi) 文件。在撰写本文时，它是 v16.13.1；但是，v14 之后的任何版本可能都足够了。下载后，继续安装它并接受所有默认安装选项。\n\
    \n安装后，打开命令提示符并输入以下内容\n\n```\nnode --version\n```\n\n你应该会看到类似以下的内容\n\n```\nTerminal\
    \ output\nv16.13.1\n```\n\n太好了！它已安装。\n\n## MacOS 设置\n\n因为你之前安装了 Homebrew，所以这很简单，只需运行以下命令\n\
    \n```\nbrew install nvm\n```\n\n之后你会看到一些 homebrew 和 nvm 要求你执行的后续步骤，这些步骤会创建一个目录并更新你的配置文件。请务必遵循这些说明，它们应该看起来像这样\n\
    \n![](img/94a1435e4acaf57ed4f2a785450910d2_466_0.png)\n\n如果你不遵循这些说明，nvm 可能无法正常工作。你最终的配置文件应该看起来像这样：\n\
    \n![](img/94a1435e4acaf57ed4f2a785450910d2_467_0.png)\n\n现在 nvm 已安装，让我们通过输入以下命令来验证一切是否按预期工作\n\
    \n```\nnvm --version\n```\n\nnvm 应该会报告版本号，它应该看起来像这样\n\n```\nTerminal Output\n\
    0.39.0\n```\n\n现在我们已经安装了 nvm，我们可以用它来安装 Node.Js，为此输入以下命令\n\n```\nnvm install --lts\n\
    ```\n\n这应该会安装 Node.Js 的 **LTS** 版本，LTS 代表长期支持。LTS 一词意味着 Node.Js 将支持该主要 LTS 版本\
    \ 3 年。截至撰写本文时，当前的 LTS 版本是 v16.13.1。我建议你使用 LTS 版本，因为它比 Node.js 的最新版本（目前是 v17.2.0）更稳定。\n\
    \n但是，如果你想尝试最新版本的 Node，你可以使用 nvm 来安装它，然后只需在两者之间切换。为此，只需运行\n\n```\nnvm install node\n\
    ```\n\n这将安装最新版本的 Node.js，你可以通过输入以下命令切换到最新版本\n\n```\nnvm use node\n```\n\n要切换回\
    \ LTS 版本，只需输入\n\n```\nnvm use --lts\n```\n\n非常棒，对吧？！\n\n## Linux 设置\n\n**nvm**\
    \ 是一个 bash 脚本，要安装它，请运行此命令\n\n```\nwget -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.38.0/install.sh\
    \ | bash\n```\n\n接下来，关闭你的终端并重新打开终端应用程序。这将刷新你的终端，以便你可以访问 **nvm**。要检查 **nvm** 是否正确安装，请输入此命令\n\
    \n```\nnvm --version\n```\n\nnvm 应该会报告版本号，它应该看起来像这样\n\n```\nTerminal Output\n\
    0.39.0\n```\n\n现在我们已经安装了 nvm，我们可以用它来安装 Node.Js，为此输入以下命令\n\n```\nnvm install --lts\n\
    ```\n\n这应该会安装 Node.Js 的 **LTS** 版本，LTS 代表长期支持。LTS 一词意味着 Node.Js 将支持该主要 LTS 版本\
    \ 3 年。截至撰写本文时，当前的 LTS 版本是 v16.13.1。我建议你使用 LTS 版本，因为它比 Node.js 的最新版本（目前是 v17.2.0）更稳定。\n\
    \n但是，如果你想尝试最新版本的 Node，你可以使用 nvm 来安装它，然后只需在两者之间切换。为此，只需运行\n\n```\nnvm install node\n\
    ```\n\n这将安装最新版本的 Node.js，你可以通过输入以下命令切换到最新版本\n\n```\nnvm use node\n```\n\n要切换回\
    \ LTS 版本，只需输入\n\n```\nnvm use --lts\n```\n\n非常棒，对吧？！\n\n## 安装 Gatsby CLI\n\n在\
    \ Windows、MacOS 和 Linux 上安装 Gatsby CLI 的过程是相同的。Gatsby CLI 将帮助你快速创建一个新的 Gatsby\
    \ 网站，它使入门变得极其简单。该工具将设置整个网站包，以便你可以开始构建。\n\n你将把它作为全局 npm 包安装，因为你将在多个项目中使用它。一般来说，你应该避免全局安装包；但是，对于某些基于\
    \ CLI 的工具，在某些情况下可能是合理的。在这种情况下，确实如此。要安装它，请运行\n\n```\nnpm install --global gatsby-cli\n\
    ```\n\n瞧！Gatsby CLI 已安装，通过运行以下命令确保它正常工作\n\n```\ngatsby --version\n```\n\n你应该会看到它返回\
    \ Gatsby CLI Version: 4.3.0（或更新版本）\n\n## 使用 GatsbyJS v4 的 Hello World\n\n好了！你所有的开发工具都已安装，呼，这真是一段旅程！现在是时候在你的开发环境中启动并运行你的第一个\
    \ GatsbyJS v4 网站了。\n\n你将使用 Gatsby CLI 来创建初始的样板网站。为此，打开一个终端窗口并导航到你想要创建网站的任何文件夹。例如，我将所有项目放在一个名为\
    \ external-website-projects 的文件夹中。所以，在 VSCode 中打开一个终端，我可以通过输入以下命令导航到该目录\n\n```\n\
    cd ~/Documents/external-website-projects/\n```\n\n这是我的目录，但不一定是你的，请随意创建你喜欢的任何目录结构。我将来只会将此位置称为\
    \ **网站项目文件夹**。一旦你到达了想要的位置，通过输入以下命令创建一个新的 Gatsby 项目\n\n```\ngatsby new\n```\n\n\
    Gatsby CLI 将问你几个问题，它将使用这些问题来确定特定的构建设置。所以，你是在告诉这个命令行程序 gatsby 为你创建一个新站点。按照以下方式回答\
    \ Gatsby CLI 提出的问题：\n\n### 你想给你的网站起什么名字？\n\n```\nMy First Gatsby Site\n```\n\n\
    ### 你想将创建网站的文件夹命名为什么？\n\n```\nmy-first-gatsby-site\n```\n\n### 你将使用 CMS 吗？\n\n\
    ```\nNo (or I'll add it later)\n```\n\n### 你想安装一个样式系统吗\n\n```\nNo (or I'll add\
    \ it later)\n```\n\n### （多选）使用箭头键移动，按回车键选择，选择“Done”确认你的选择\n\n```\nDon't select\
    \ any of the choices, and select Done\n```\n\n### 我们这样做吗 (Y/n)？\n\n```\nYes\n\
    ```\n\n太棒了！我们的网站现在已构建完成，是时候看看并检查一下了。导航到网站目录。\n\n```\ncd my-first-gatsby-site\n\
    ```\n\n通过在本地运行以下命令来启动你的网站\n\n```\ngatsby develop\n```\n\n此命令告诉 Gatsby 在端口 8000\
    \ 上启动本地开发服务器，并在 `___graphql` 路径上启动 GraphiQL 工具，你将在后面的章节中了解 GraphiQL。现在，如果你在浏览器中打开以下地址\
    \ http://localhost:8000/，你应该会看到你的第一个 GatsbyJS 网站！\n\n## 恭喜\n— 你刚刚创建了一个 Gatsby\
    \ 网站！\U0001F389\U0001F389\U0001F389\n\n编辑 `src/pages/index.js` 以实时查看此页面更新。\U0001F60E\
    \n\n## 文档\n\n- [教程](https://www.gatsbyjs.com/docs/tutorial/)\n  如果你是 Web 开发新手，这是一个很好的起点。旨在指导你完成第一个\
    \ Gatsby 网站的设置。\n- [操作指南](https://www.gatsbyjs.com/docs/how-to/)\n  实用的分步指南，帮助你实现特定目标。当你试图完成某件事时最有用。\n\
    - [参考指南](https://www.gatsbyjs.com/docs/reference/)\n  关于 Gatsby 工作原理的详细技术描述。当你需要有关\
    \ Gatsby API 的详细信息时最有用。\n- [概念指南](https://www.gatsbyjs.com/docs/conceptual/)\n\
    \  对高级 Gatsby 概念的宏观解释。对于理解特定主题最有用。\n- [插件库](https://www.gatsbyjs.com/plugins/)\n\
