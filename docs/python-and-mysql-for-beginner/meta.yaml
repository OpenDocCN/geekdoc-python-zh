    -   `deleteData.py`

    -   `displayData.py`

    -   `insertData.py`

    -   `updateData.py`


    您的**主程序**是**main.py**。


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_28_0.png)


