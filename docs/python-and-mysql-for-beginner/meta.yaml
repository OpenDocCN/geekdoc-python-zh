    eISBN : 978-967-2904-57-1\n\nAuthors :\nFatimah Rahmat\nMohamad Iqbal Hakim Che\
    \ Omar\nNurul Shakirah Mohd Zawawi\n\n# PREFACE\n\nThe need to share knowledge\
    \ and experience on how the Python programming language could have a positive\
    \ impact on the learning process led to the creation of this book focuses on the\
    \ installation process, use of MySQL for database connections, and fundamental\
    \ Python language concepts.\n\nThis book offers helpful resources, advice, and\
    \ examples, especially for students and anybody else interested in learning the\
    \ Python programming language.\n\nThe Create, Read, Update, and Delete (CRUD)\
    \ component of an application employing Python scripts using MySQL is also demonstrated\
    \ in this book's sample examples.\n\nThis book is intended to assist readers in\
    \ achieving their goals.\n\n# TABLE OF CONTENTS\n\n## I. INTRODUCTION\n\n- What\
    \ is Python Programming? ........................................ 2\n- Basic Principles\
    \ of Python .............................................. 3\n\n## II. REQUIREMENTS\n\
    \n- What is needed? ...........................................................\
    \ 5\n- Visual Studio Code versus PyCharm versus IDLE ........ 6\n- Minimum requirements\
    \ for:\n  - Visual Studio Code (VS Code) installation ............. 8\n  - PyCharm\
    \ installation ................................................ 8\n  - IDLE installation\
    \ ...................................................... 9\n- Laragon ....................................................................\
    \ 10\n\n## III. INSTALLING\n\n- Installing Python and IDE Environment Setup ..\
    \ 12\n\n## IV. FIRST PROJECT ACTIVITY\n\n- Set up local web server Laragon ..............................\
    \ 17\n- Choose your favourite IDE either PyCharm or VSCode .. 19\n- Activity\n\
    \  - Create insertData.py .............................................. 25\n\
    \  - Create deleteData.py .............................................. 26\n\
