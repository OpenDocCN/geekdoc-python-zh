    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_17_1.png)


    Figure 4: Download Visual Studio Code - Mac, Linux, Windows


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_17_2.png)


    Figure 5: Interface VSCode


    ## 03


    IDE Installation for PyCharm. Go to Figure 6 (https://www.jetbrains.com/pycharm/download/#section=windows)
    and download the Community version. Follow the instructions on Install Python
    3.10 and PyCharm on Windows 10 by scanning the QR Code.


    Interface PyCharm Figure 7. You can start coding here. For PyCharm users, if the
    module involves different projects the module installation needs to be done each
    time.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_18_0.png)


    Source: YouTube


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_18_1.png)


    Figure 6: Download PyCharm: Python IDE for Professional Developers by JetBrains


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_18_2.png)


    Figure 7: Interface PyCharm


    ## 04


    Command prompt application needs.


    Three steps to check the Python version on your Windows operating system.


    1. Open the command prompt application: Press the Windows key to open the start
    screen. In the search box type "command". Click on the command prompt application
    as Figure 8.

    2. Execute command: type python --version and press enter.

    3. The Python version appears in the next line right below your command.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_19_0.png)


    ## 05


    Web server installation for Laragon. Go to Figure 9 (https://laragon.org/download/),
    download Laragon - Full (173 MB). Follow the instructions for complete installation.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_19_1.png)


    ## CHAPTER 4: FIRST PROJECT ACTIVITY


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_20_0.png)


    ## Set up local web server Laragon


    Right click Start All > Click MySQL > Click MySQL (Figure 10)


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_21_0.png)


    Click database as Figure 11.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_21_1.png)


    Session manager window will appear. Click New. *Please make sure the port is correct,
    user (usually root) with password (usually empty)*, then click open (Figure 12)


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_22_0.png)


    **Figure 12: Session Manager**


    The screen will appear as Figure 13. db1 (database name) and table1 (table name).
    If you want rename -> right-click the database or table name > rename. Press F5
    for refresh table or database. If user want to see the data of the table, user
    need to click selected table > Click data.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_22_1.png)


    **Figure 13: Database Interface**


    ## Choose your favourite IDE either PyCharm or VSCode.


    Those IDE use different database configuration.


    ### PyCharm User Configuration into database


    Create a new project named PythonAndMysql.


    Click Icon Setting > select Setting or used shortcut key Ctrl+ Alt + S (Figure
    14).


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_23_0.png)


    Pop window will appear.


    Expand Project: PythonAndMysql and choose Python Interpreter (Figure 15).


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_23_1.png)


    Python Interpreter interface will be shown. Here we will install a specific module
    name: mysql.connector. This action can be done by click in plus icon (+) or use
    shortcut key Alt + Insert (Figure 16)


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_24_0.png)


    Search mysql-connector-python on the search field click Install Package. Please
    be sure that you have an internet connection, since you are installing a package
    from the cloud. (Figure 17)


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_24_1.png)


    If installation is successful a green bar will appear with a message stating that
    the installation is successful. Please try again if not successful. Close the
    python interpreter pop up screen and head to the code editor interface. (Figure
    18).


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_25_0.png)


    File name main.py is the default file that will be run by the PyCharm (Figure
    19).


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_25_1.png)


    ### VSCode User Configuration into database


    1. Open the command prompt application: Press the Windows key to open the start
    screen. In the search box type "command". Click on the command prompt application.

    2. Execute command: type pip install mysql-connector-python and press enter.

    3. The advantage of using VSCode, the user only needs to install it once and the
    module can be used by any Python project.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_25_2.png)


    ## Requirement mysql.connector installation into database.


    MySQL is a Relational Database Management System (RDBMS) whereas the structured
    Query Language (SQL) is the language used for handling the RDBMS using commands
    i.e Creating, Inserting, Updating and Deleting the data from the databases. SQL
    commands are case insensitive i.e CREATE and create signify the same command.


    MySQL Connector/Python enables Python programs to access MySQL databases, using
    an API that is compliant with the Python Database API Specification v2.0 (PEP
    249). It is written in pure Python and does not have any dependencies except for
    the Python Standard Library.


    ## Basic Python keywords do you need to know.


    **connect:** to make a connection to the database, all credentials such as username,
    server name, server password and database name need to be specified.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_26_0.png)


    **error:** This is exception handling, if there are any issues, it will be included
    in this Error


    **cursor:** to help our program execute SQL command/ operation (can be renamed
    using "as" method)


    ## In this activity:


    - You will build a program with Create Read Update Delete (**CRUD**) method.

    - Your program will display **10 menu** (Figure 21).

    - Each menu has it owns specific task. User can choose any menu even there is
    no database has been created.

    - You will create your own specific module and submodule.

    - You will build your own function from scratch to fill in the selected menu.

    - Use conditional structure to display the menu.

    - Write the code and observe the output for each menu.


    ```

    ***********POLYTECHNIC MERSING DATABASE***********

    1. CREATE DATABASE

    2. DROP DATABASE

    3. CREATE TABLE

    4. DROP TABLE

    5. INSERT

    6. UPDATE

    7. DELETE

    8. DISPLAY

    9. SHOW DATABASE

    10. EXIT


    Enter your choice :

    ```


    Figure 21: Program Menu


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_27_0.png)


    ## Let''s try the activity


    **Create module**


    Create your own module, name it as **moduleDB** in your directory with **four(4)
    submodules** (Figure 22):


    - deleteData.py

    - displayData.py

    - insertData.py

    - updateData.py


    Your **main program** is **main.py**.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_28_0.png)


    Figure 22: List file in PythonAndMysql directory'
