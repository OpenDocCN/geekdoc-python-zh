    \ 30\n  - Drop table function in main.py ............................ 31\n  -\
    \ Display all databases function .............................. 31\n  - Finish\
    \ the whole program ...................................... 32\n\n- References\
    \ ................................................................ 33\n\n> \"\
    PYTHON IS AN EASY-TO-USE LANGUAGE FOR BEGINNERS, YET IT IS POWERFUL ENOUGH FOR\
    \ EXPERTS.\" - KENNETH REITZ -\n\n# CHAPTER 1: INTRODUCTION\n\n## What is Python\
    \ Programming?\n\n> Python is a **high-level programming language** that was first\
    \ released in 1991 by **Guido van Rossum**. The language was designed to be easy\
    \ to read and write, with a **focus on code readability**. Python's design philosophy\
    \ emphasizes code readability, and its syntax allows programmers to express concepts\
    \ in fewer lines of code than languages like C++ or Java.\n\n## Basic Principles\
    \ of Python\n\n### Basic Core language\n\nPython is designed so that there really\
    \ isn't that much to learn in the basic language. For example, there is only one\
    \ basic structure for conditional programming (if/else/elif), two looping commands\
    \ (while and for), and a consistent method of handling errors (try/except) which\
    \ apply to all python programs.\n\n### Modules\n\nSelf-contained programs which\
    \ define a variety of functions and data types that you can call in order to do\
    \ tasks beyond the scope of the basic core language by using the import command.\n\
    \n### Object oriented programming\n\nA basic concept of object oriented programming\
    \ is encapsulation, the ability to define an object that contains your data and\
    \ all the information a program needs to operate on that data. In this way, when\
    \ you call a function (known as a method in object-oriented lingo), you don't\
    \ need to specify a lot of details about your data, because your data object ``knows''\
    \ all about itself. In addition, objects can inherit from other objects, so if\
    \ you or someone else has designed an object that's very close to one you're interested\
    \ in, you only have to construct those methods which differ from the existing\
    \ object, allowing you to save a lot of work.\n\n### Namespace and variable scoping\n\
    \nThe same variable name can be used in different parts of a program without fear\
    \ of destroying the value of a variable you're not concerned with.\n\n### Exception\
    \ handling\n\nWhen you're performing an operation that might result in an error,\
    \ you can surround it with a try loop, and provide an exception clause to tell\
    \ python what to do when a particular error arises.\n\nSome of the most popular\
    \ Python **libraries and frameworks** include:\n\n- NumPy, a library for numerical\
    \ computing\n- pandas, a library for data manipulation and analysis\n- scikit-learn,\
    \ a machine learning library\n- TensorFlow, a library for deep learning\n- Django,\
    \ a web framework\n- Flask, a micro web framework\n\n# CHAPTER 2: REQUIREMENTS\n\
    \nIDE (Integrated Development Environment)\n\n- Visual Studio Code (VS Code)\n\
    - PyCharm\n- IDLE\n\nWeb Server\n\n- Laragon\n- XAMPP\n\n## Table 1: Visual Studio\
    \ Code versus PyCharm versus IDLE\n\n| CRITERIA | VS Code | PyCharm | IDLE |\n\
    | :--- | :--- | :--- | :--- |\n| Environment | An IDE (Integrated Development\
    \ Environment). | Code editor that provides a similar experience to an IDE through\
    \ extensions. | An IDLE Integrated Development and Learning Environment |\n| Performances\
    \ | Lightweight because it does not need much space. | Consumes a lot of resources\
    \ because it requires a lot of memory and large storage space. | Coded in 100%\
    \ pure Python, using the tkinter GUI toolkit |\n| Platform | Free and compatible\
    \ with all platforms: Windows, Linux and Mac | Cross platform IDE. More powerful\
    \ and has a commercial version. | Cross-platform: works mostly the same on Windows,\
    \ Unix, and macOS |\n| Features | Potential errors are automatically highlighted\
    \ in red, making it easy to find and fix errors. It goes a step further by adding\
    \ the Issues tab, listing all potential bugs in one place and making it easy to\
    \ review. To use Python with VS Code, you need to install the Python formatter\
    \ and linter. | Main features is the \"Search Anywhere\" that allows you to search\
    \ outside your project. Can find files, classes, symbols, and user interface elements\
    \ even if they don't exist in your current project. Code completion is better\
    \ with PyCharm. It displays function signatures as part of the autocomplete selection\
    \ list. Has some additional features such as Sort by Name, Quick Documentation\
    \ and Quick Definition. Quick documentation shows the function's signature and\
    \ return type, as well as the function's comments while quick definition shows\
    \ the feature code and is convenient. | Python shell window (interactive interpreter)\
    \ with colorizing of code input, output, and error messages. Multi-window text\
    \ editor with multiple undo, colorizing, smart indent, call tips, auto completion,\
    \ and other features. Search within any window, replace within editor windows,\
    \ and search through multiple files (grep). Debugger with persistent breakpoints,\
    \ stepping, and viewing of global and local namespaces. Configuration, browsers,\
    \ and other dialogs |"
  mdcn: "# 面向初学者的Python与MySQL\n\nFATIMAH RAHMAT\nMOHAMAD IQBAL HAKIM CHE OMAR\nNURUL\
    \ SHAKIRAH MOHD ZAWAWI\n\n第一版 2023\n\n# 版权所有 ©2023\n\n保留所有权利。未经出版商事先书面许可，不得以任何形式或任何方式（包括影印、录制或其他电子或机械方法）复制、分发或传播本出版物的任何部分，但版权法允许的简短引述用于评论和某些其他非商业用途的情况除外。如需获取许可，请写信至出版商，地址注明“收件人：许可协调员”，地址如下。\n\
    \nPoliteknik Mersing\nJalan Nitar,\n86800 Mersing\nJohor Darul Ta’zim\n电话：07-7980001\n\
    传真：07-7980002\n网站：https://pmj.mypolycc.edu.my/\n\n马来西亚印刷\n2023年第一次印刷\n电子书号：978-967-2904-57-1\n\
    \n作者：\nFatimah Rahmat\nMohamad Iqbal Hakim Che Omar\nNurul Shakirah Mohd Zawawi\n\
    \n# 前言\n\n分享关于Python编程语言如何对学习过程产生积极影响的知识和经验的需求，促成了本书的创作。本书重点介绍了安装过程、使用MySQL进行数据库连接以及Python语言的基本概念。\n\
    \n本书提供了有用的资源、建议和示例，特别适合学生和任何其他有兴趣学习Python编程语言的人。\n\n本书的示例还演示了使用Python脚本和MySQL的应用程序的创建、读取、更新和删除（CRUD）组件。\n\
    \n本书旨在帮助读者实现他们的目标。\n\n# 目录\n\n## I. 引言\n\n- 什么是Python编程？ ........................................\
    \ 2\n- Python的基本原则 .............................................. 3\n\n## II.\
    \ 要求\n\n- 需要什么？ ........................................................... 5\n\
    - Visual Studio Code 与 PyCharm 与 IDLE ........ 6\n- 最低要求：\n  - Visual Studio Code\
    \ (VS Code) 安装 ............. 8\n  - PyCharm 安装 ................................................\
    \ 8\n  - IDLE 安装 ...................................................... 9\n- Laragon\
    \ .................................................................... 10\n\n\
    ## III. 安装\n\n- 安装Python和IDE环境设置 .. 12\n\n## IV. 第一个项目活动\n\n- 设置本地Web服务器 Laragon\
    \ .............................. 17\n- 选择你喜欢的IDE，PyCharm或VSCode .. 19\n- 活动\n\
    \  - 创建 insertData.py .............................................. 25\n  - 创建\
    \ deleteData.py .............................................. 26\n  - 创建 displayData.py\
    \ ............................................ 27\n  - 创建 updateData.py ............................................\
    \ 28\n  - 在 main.py 中导入模块 ...................................... 29\n  - 在 main.py\
    \ 中创建数据库函数 .................... 29\n  - 在 main.py 中删除数据库函数 ......................\
    \ 30\n  - 在 main.py 中创建表函数 .......................... 30\n  - 在 main.py 中删除表函数\
    \ ............................ 31\n  - 显示所有数据库函数 ..............................\
    \ 31\n  - 完成整个程序 ...................................... 32\n\n- 参考文献 ................................................................\
    \ 33\n\n> “PYTHON是一种对初学者来说易于使用的语言，但对专家来说又足够强大。” - KENNETH REITZ -\n\n# 第一章：引言\n\
    \n## 什么是Python编程？\n\n> Python是一种**高级编程语言**，于1991年由**Guido van Rossum**首次发布。该语言的设计易于读写，**注重代码可读性**。Python的设计哲学强调代码可读性，其语法允许程序员用比C++或Java等语言更少的行数来表达概念。\n\
    \n## Python的基本原则\n\n### 基本核心语言\n\nPython的设计使得在基本语言中确实没有太多需要学习的内容。例如，条件编程（if/else/elif）只有一种基本结构，两种循环命令（while和for），以及一种适用于所有Python程序的一致错误处理方法（try/except）。\n\
    \n### 模块\n\n自包含的程序，定义了各种函数和数据类型，你可以通过使用`import`命令来调用它们，以执行超出基本核心语言范围的任务。\n\n###\
    \ 面向对象编程\n\n面向对象编程的一个基本概念是封装，即定义一个对象的能力，该对象包含你的数据以及程序操作该数据所需的所有信息。这样，当你调用一个函数（在面向对象术语中称为方法）时，你不需要指定关于数据的很多细节，因为你的数据对象“知道”关于它自己的一切。此外，对象可以从其他对象继承，所以如果你或其他人设计了一个与你感兴趣的对象非常接近的对象，你只需要构建那些与现有对象不同的方法，从而节省大量工作。\n\
    \n### 命名空间和变量作用域\n\n相同的变量名可以在程序的不同部分使用，而不用担心破坏你不关心的变量的值。\n\n### 异常处理\n\n当你执行一个可能导致错误的操作时，你可以用一个`try`循环将其包围，并提供一个异常子句来告诉Python当特定错误发生时该怎么做。\n\
    \n一些最受欢迎的Python**库和框架**包括：\n\n- NumPy，一个用于数值计算的库\n- pandas，一个用于数据操作和分析的库\n- scikit-learn，一个机器学习库\n\
    - TensorFlow，一个用于深度学习的库\n- Django，一个Web框架\n- Flask，一个微Web框架\n\n# 第二章：要求\n\nIDE（集成开发环境）\n\
    \n- Visual Studio Code (VS Code)\n- PyCharm\n- IDLE\n\nWeb服务器\n\n- Laragon\n-\
    \ XAMPP\n\n## 表1：Visual Studio Code 与 PyCharm 与 IDLE\n\n| 标准 | VS Code | PyCharm\
    \ | IDLE |\n| :--- | :--- | :--- | :--- |\n| 环境 | 一个IDE（集成开发环境）。 | 通过扩展提供类似IDE体验的代码编辑器。\
    \ | 一个IDLE集成开发和学习环境 |\n| 性能 | 轻量级，因为它不需要太多空间。 | 消耗大量资源，因为它需要大量内存和较大的存储空间。 | 使用100%纯Python编码，使用tkinter\
    \ GUI工具包 |\n| 平台 | 免费且兼容所有平台：Windows、Linux和Mac | 跨平台IDE。更强大，并有商业版本。 | 跨平台：在Windows、Unix和macOS上工作方式基本相同\
    \ |\n| 功能 | 潜在错误会自动以红色突出显示，便于查找和修复错误。它更进一步添加了“问题”选项卡，将所有潜在错误列在一个地方，便于审查。要在VS Code中使用Python，你需要安装Python格式化程序和代码检查工具。\
    \ | 主要功能是“随处搜索”，允许你在项目外进行搜索。即使文件、类、符号和用户界面元素不在当前项目中，也能找到它们。PyCharm的代码补全功能更好。它将函数签名作为自动完成选择列表的一部分显示。具有一些附加功能，如按名称排序、快速文档和快速定义。快速文档显示函数的签名和返回类型，以及函数的注释，而快速定义显示功能代码，非常方便。\
    \ | Python shell窗口（交互式解释器），对代码输入、输出和错误消息进行着色。多窗口文本编辑器，具有多次撤销、着色、智能缩进、调用提示、自动完成功能和其他功能。在任何窗口内搜索，在编辑器窗口内替换，以及搜索多个文件（grep）。具有持久断点、单步执行以及查看全局和本地命名空间的调试器。配置、浏览器和其他对话框\
    \ |"
