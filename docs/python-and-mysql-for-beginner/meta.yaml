  md: "Python and MySQL for Beginner\n\n# Now, move to ModuleDb directory to complete\
    \ our submodules\n\n# 1 Create insertData.py\n\n```\nimport mysql.connector\n\n\
    # insert data into table\ndef insert(host, username, password, database, table_name):\n\
    \    try:\n        db = mysql.connector.connect(\n            host=host,\n   \
    \         user=username,\n            password=password,\n            database=database\n\
    \        )\n\n        # A display to insert data\n        id = input(\"Enter Lecturer\
    \ Id : \")\n        fname = input(\"Enter Lecturer First Name : \")\n        lname\
