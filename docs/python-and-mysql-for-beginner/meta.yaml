    # CHAPTER 1: INTRODUCTION


    # What is Python Programming?


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_6_0.png)


    > Python is a **high-level programming language** that was first released in 1991
    by **Guido van Rossum**. The language was designed to be easy to read and write,
    with a **focus on code readability**. Python''s design philosophy emphasizes code
    readability, and its syntax allows programmers to express concepts in fewer lines
    of code than languages like C++ or Java.'
  - '[PAGE 7]


    # Basic Principles of Python


    # Basic Core language


    Python is designed so that there really isn''t that much to learn in the basic
    language. For example, there is only one basic structure for conditional programming
    (if/else/elif), two looping commands (while and for), and a consistent method
    of handling errors (try/except) which apply to all python programs.


    # Modules


    Self-contained programs which define a variety of functions and data types that
    you can call in order to do tasks beyond the scope of the basic core language
    by using the import command.


    # Object oriented programming


    A basic concept of object oriented programming is encapsulation, the ability to
    define an object that contains your data and all the information a program needs
    to operate on that data. In this way, when you call a function (known as a method
    in object-oriented lingo), you don''t need to specify a lot of details about your
    data, because your data object ``knows'''' all about itself. In addition, objects
    can inherit from other objects, so if you or someone else has designed an object
    that''s very close to one you''re interested in, you only have to construct those
    methods which differ from the existing object, allowing you to save a lot of work.


    # Namespace and variable scoping


    The same variable name can be used in different parts of a program without fear
    of destroying the value of a variable you''re not concerned with.


    # Exception handling


    When you''re performing an operation that might result in an error, you can surround
    it with a try loop, and provide an exception clause to tell python what to do
    when a particular error arises.


    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_7_0.png)


    Some of the most popular Python **libraries and frameworks** include:


    +   - NumPy, a library for numerical computing

    - pandas, a library for data manipulation and analysis

    - scikit-learn, a machine learning library

    - TensorFlow, a library for deep learning

    - Django, a web framework

    - Flask, a micro web framework'
