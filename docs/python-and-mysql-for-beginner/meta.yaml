    ![](img/cdf94bb54bcd7c977fd9d0dd8eb742ae_21_1.png)


    会话管理器窗口将出现。点击“新建”。*请确保端口正确，用户（通常是root）和密码（通常为空）*，然后点击“打开”（图12）。


