    At the core of contemporary financial theory lies the Black Scholes Model, a sophisticated
    framework that has revolutionized the approach to pricing options. Conceived by
    economists Fischer Black, Myron Scholes, and Robert Merton in the early 1970s,
    this model provides a theoretical estimate of the price of European-style options.
    The Black Scholes Model is based on the assumption of a liquid market where the
    option and its underlying asset can be continuously traded. It assumes that prices
    of the underlying asset follow a geometric Brownian motion, characterized by constant
    volatility and a normal distribution of returns. This stochastic process creates
    a random walk that is the foundation of the model''s probabilistic approach to
    pricing.


    ```python

    # Black-Scholes Model for Pricing European Call Options

    import numpy as np

    from scipy.stats import norm


    # S: current stock price

    # K: strike price of the option

    # T: time to expiration in years

    # r: risk-free interest rate

    # sigma: volatility of the underlying asset


    # Calculate d1 and d2 parameters

    d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))

    d2 = d1 - sigma * np.sqrt(T)


    # Calculate the price of the European call option

    call_price = (S * norm.cdf(d1)) - (K * np.exp(-r * T) * norm.cdf(d2))

    return call_price


