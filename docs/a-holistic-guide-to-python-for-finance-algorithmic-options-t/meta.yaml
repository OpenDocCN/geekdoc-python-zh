    ## Straddles and Strangles


    Delving further into the intricacies of options trading, two powerful approaches
    emerge for traders expecting significant volatility in a stock but uncertain about
    the direction of the movement. Both strategies involve options positions that
    capitalize on the potential for substantial movement in the underlying asset''s
    price. A straddle involves the purchase of a call option and a put option with
    the same strike price and expiration date.


    This strategy profits from a substantial move in the underlying asset''s price,
    regardless of the direction. It is a bet on volatility itself, rather than the
    direction of the price movement. The risk is limited to the combined premiums
    paid for the call and put options, making it a comparatively safe strategy in
    volatile markets.


    ```python

    # Long Straddle

    strike_price = 100

    premium_paid_call_option = 4

    premium_paid_put_option = 4


    # Payoffs

    payoff_long_call_option = np.maximum(stock_prices - strike_price, 0) - premium_paid_call_option

    payoff_long_put_option = np.maximum(strike_price - stock_prices, 0) - premium_paid_put_option


    # Net payoff from the long straddle

    net_payoff_straddle = payoff_long_call_option + payoff_long_put_option


    # Plot the payoff diagram

    plt.figure(figsize=(10, 5))

    plt.plot(stock_prices, net_payoff_straddle, label=''Long Straddle Payoff'')

    plt.axhline(0, color=''black'', lw=0.5)

    plt.axvline(strike_price, color=''r'', linestyle=''--'', label=''Strike Price'')

    plt.title(''Long Straddle Strategy Payoff Diagram'')

    plt.xlabel(''Stock Price at Expiration'')

    plt.ylabel(''Profit/Loss'')

    plt.legend()

    plt.grid()

    plt.show()

    ```


    This Python-generated diagram showcases the potential for unlimited profit in
    a long straddle if the stock price moves significantly away from the strike price
    in either direction. The break-even point occurs at the strike price plus or minus
    the total premiums paid. A strangle, on the other hand, is a comparable plan that
    employs out-of-the-money (OTM) call and put options. This implies that the call
    has a superior strike price and the put has an inferior strike price in comparison
    to the present stock price. The strangle necessitates a diminished upfront investment
    due to the OTM positions but necessitates a larger price movement to become lucrative.


    ```python

