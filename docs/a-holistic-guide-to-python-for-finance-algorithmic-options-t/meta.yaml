    # BLACK-SCHOLES MODEL


    The Black-Scholes formula calculates the price of a European call or put option.
    The formula for a call option is:


    ```

    \[ C = S_0 N(d_1) - X e^{-rT} N(d_2) \]

    ```


    And for a put option:


    ```

    \[ P = X e^{-rT} N(-d_2) - S_0 N(-d_1) \]

    ```


    Where:


    +   - \( C \) is the call option price

    - \( P \) is the put option price

    - \( S_0 \) is the current price of the stock

    - \( X \) is the strike price of the option

    - \( r \) is the risk-free interest rate

    - \( T \) is the time to expiration

    - \( N(\cdot) \) is the cumulative distribution function of the standard normal
    distribution

    - \( d_1 = \frac{1}{\sigma\sqrt{T}} \left( \ln \frac{S_0}{X} + (r + \frac{\sigma^2}{2})
    T \right) \)

    - \( d_2 = d_1 - \sigma\sqrt{T} \)

    - \( \sigma \) is the volatility of the stock''s returns


    To use this model, you input the current stock price, the option''s strike price,
    the time to expiration (in years), the risk-free interest rate (usually the yield
    on government'
  - '[PAGE 340]


    bonds), and the volatility of the stock. The model then outputs the theoretical
    price of the option.'
