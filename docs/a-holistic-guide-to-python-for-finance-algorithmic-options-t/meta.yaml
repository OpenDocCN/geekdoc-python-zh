    ## CHAPTER 7: STRATEGIES FOR OPTION TRADING


    Exploring the range of strategies available to options traders, the covered call
    and protective put strategies represent fundamental approaches tailored to different
    market outlooks. These strategies form the foundation for both conservative investors
    looking to increase portfolio returns and cautious traders seeking to protect
    their positions against downturns. The covered call strategy involves holding
    a long position in an underlying asset while simultaneously selling a call option
    on the same asset. The primary objective is to generate additional income from
    the option premium, which can serve as a buffer against small declines in the
    stock price or enhance profits if the stock price remains stable or moderately
    rises.


    This strategy limits the potential for high returns because if the stock price
    goes above the strike price of the sold call, the asset will likely be called
    away.


    ```python

    import numpy as np

    import matplotlib.pyplot as plt


    # Range of stock prices at the expiration

    stock_prices = np.arange(80, 120, 1)

    # Example stock price and strike price of the sold call option

    stock_price_bought = 100

    strike_price_call_sold = 105

    option_premium_received = 3


    # Profit from long stock position (unlimited potential for gains)

    profit_long_stock = stock_prices - stock_price_bought

    # Profit from short call position (limited by the strike price)

    profit_short_call = np.where(stock_prices > strike_price_call_sold, strike_price_call_sold
    - stock_price_bought, option_premium_received)


    # Net profit from the covered call strategy

    net_profit_covered_call = profit_long_stock + profit_short_call


    # Visualize the payoff diagram

    plt.figure(figsize=(10, 5))

    plt.plot(stock_prices, net_profit_covered_call, label=''Covered Call Profit'')

    plt.axhline(0, color=''black'', lw=0.5)

    plt.axvline(stock_price_bought, color=''r'', linestyle=''--'', label=''Purchase
    Price of Stock'')

    plt.axvline(strike_price_call_sold, color=''g'', linestyle=''--'', label=''Strike
    Price of Call Option'')

    plt.title(''Payoff Diagram for Covered Call Strategy'')

    plt.xlabel(''Stock Price at Expiration'')

    plt.ylabel(''Profit/Loss'')

    plt.legend()

    plt.grid()

    plt.show()

    ```


    In the given example, the code visualizes the payoff from a covered call strategy.
    The trader receives premiums from the sold call options as long as the stock price
    does not exceed the strike price of the calls. If the price surpasses this level,
    the gains from the increase in the stock price are neutralized by the losses from
    the short call position, resulting in a flat payoff beyond the strike price. On
    the other hand, the protective put strategy aims to mitigate the downside risk
    of a stock position. By purchasing a put option, the holder of the underlying
    asset is protected against a decline in the asset''s price.


    This strategy is similar to an insurance policy where the put option premium acts
    as the cost of the insurance. The protective put strategy is particularly useful
    in uncertain markets or when holding a stock with significant unrealized gains.


    ```python

    # Profit from long stock position

    profit_long_stock = stock_prices - stock_price_bought

    # Profit from long put position (protection begins below the strike price)

    strike_price_put_bought = 95

    option_premium_paid = 2

    profit_long_put = np.where(stock_prices < strike_price_put_bought, stock_price_bought
    - stock_prices - option_premium_paid, -option_premium_paid)


    # Net profit from the protective put strategy

    net_profit_protective_put = profit_long_stock + profit_long_put


    # Visualize the payoff diagram

    plt.figure(figsize=(10, 5))

    plt.plot(stock_prices, net_profit_protective_put, label=''Protective Put Profit'')

    plt.axhline(0, color=''black'', lw=0.5)

    plt.axvline(stock_price_bought, color=''r'', linestyle=''--'', label=''Purchase
    Price of Stock'')

    plt.axvline(strike_price_put_bought, color=''g'', linestyle=''--'', label=''Strike
    Price of Put Option'')

    plt.title(''Payoff Diagram for Protective Put Strategy'')

    plt.xlabel(''Stock Price at Expiration'')

    plt.ylabel(''Profit/Loss'')

    plt.legend()

    plt.grid()

    plt.show()

    ```


    This code showcases the payoff from owning a protective put. Below the strike
    price of the put option, the losses on the stock are offset by the gains from
    the put option, establishing a minimum level of losses. Traders must consider
    the cost of the options, the earnings from option premiums, and the potential
    movements in the stock price when employing these strategies. The covered call
    strategy is ideal when expecting moderate upward movement or sideways movement,
    while the protective put strategy is suitable for downside protection. Both strategies
    exemplify the delicate balance between risk and return that characterizes advanced
    options trading. By integrating these strategies with the provided Python code
    examples, readers can gain a dual perspective—understanding both the theory behind
    these options strategies and the practical tools to analyze and implement them.


    As we progress through the chapters, these foundational strategies will serve
    as the building blocks for more complex trading tactics that harness the full
    range of potential in options trading. Spread strategies play a vital role in
    an options trader''s arsenal, providing precise control over the risk and potential
    reward profile. These strategies involve simultaneous purchase and sale of options
    of the same class (calls or puts) with varying strike prices or expiration dates.
    Bullish spreads aim to profit from an upward movement in the underlying asset,
    while bearish spreads seek to capitalize on a decline. Among bullish spreads,
    the bull call spread holds a significant position. This strategy involves buying
    a call option with a lower strike price and selling another call option with a
    higher strike price. Two options are typically bought with the same expiration
    date.


    The bull call spread benefits from a moderate increase in the underlying asset''s
    price up to the higher strike price.'
