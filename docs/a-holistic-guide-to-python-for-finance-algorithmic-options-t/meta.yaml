    # STOCHASTIC CALCULUS FOR FINANCE


    Stochastic calculus is a branch of mathematics that deals with processes that
    involve randomness and is crucial for modeling in finance, particularly in the
    pricing of financial derivatives. Here''s a summary of some key concepts and formulas
    used in stochastic calculus within the context of finance:'
  - "[PAGE 344]\n\n# # BROWNIAN MOTION\n(WIENER PROCESS)\n\n- Definition: A continuous-time\
    \ stochastic process, \\(W(t)\\), with \\(W(0) = 0\\), that has independent and\
    \ normally distributed increments with mean 0 and variance \\(t\\).\n\n+   - Properties:\n\
    \  - Stationarity: The increments of the process are stationary.\n  - Martingale\
    \ Property: \\(W(t)\\) is a martingale.\n  - Quadratic Variation: The quadratic\
    \ variation of \\(W(t)\\) over an interval \\([0, t]\\) is \\(t\\).\n\n# ### Problem:\n\
    \nConsider a stock whose price \\(S(t)\\) evolves according to the dynamics of\
    \ geometric Brownian motion. The differential equation describing the stock price\
    \ is given by:\n\n```\n\\[ dS(t) = \\mu S(t)dt + \\sigma S(t)dW(t) \\]\n```\n\n\
    where:\n\n+   - \\(S(t)\\) is the stock price at time \\(t\\),\n- \\(\\mu\\) is\
    \ the drift coefficient (representing the average return of the stock),\n- \\\
    (\\sigma\\) is the volatility (standard deviation of returns) of the stock,\n\
    - \\(dW(t)\\) represents the increment of a Wiener process (or Brownian motion)\
    \ at time \\(t\\)."
  - '[PAGE 345]


    Given that the current stock price \(S(0) = \$100\), the annual drift rate \(\mu
    = 0.08\) (8%), the volatility \(\sigma = 0.2\) (20%), and using a time frame of
    one year (\(t = 1\)), calculate the expected stock price at the end of the year.


    # ### Solution:


    To solve this problem, we will use the solution to the stochastic differential
    equation (SDE) for geometric Brownian motion, which is:


    ```

    \[ S(t) = S(0) \exp{((\mu - \frac{1}{2}\sigma^2)t + \sigma W(t))} \]

    ```


    However, for the purpose of calculating the expected stock price, we''ll focus
    on the expected value, which simplifies to:


    ```

    \[ E[S(t)] = S(0) \exp{(\mu t)} \]

    ```


    because the expected value of \(W(t)\) in the Brownian motion is 0. Plugging in
    the given values:


    ```

    \[ E[S(1)] = 100 \exp{(0.08 \cdot 1)} \]

    ```


    Let''s calculate the expected stock price at the end of one year.


    The expected stock price at the end of one year, given the parameters of the problem,
    is approximately \$108.33. This calculation assumes a continuous compounding of
    returns under the geometric Brownian motion model, where the drift and volatility
    parameters represent the average return and the risk (volatility) associated with
    the stock, respectively.'
  - '[PAGE 346]


    # # ITÔ''S LEMMA


    - Key Formula: For a twice differentiable function \(f(t, X(t))\), where \(X(t)\)
    is an Itô process, Itô''s lemma gives the differential \(df\) as:


    ```

    \[df(t, X(t)) = \left(\frac{\partial f}{\partial t} + \mu \frac{\partial f}{\partial
    x} + \frac{1}{2} \sigma^2 \frac{\partial^2 f}{\partial x^2}\right)dt + \sigma
    \frac{\partial f}{\partial x} dW(t)\]

    ```


    +   - \(t\): Time

    - \(X(t)\): Stochastic process

    - \(W(t)\): Standard Brownian motion

    - \(\mu\), \(\sigma\): Drift and volatility of \(X(t)\), respectively


    Itô''s Lemma is a fundamental result in stochastic calculus that allows us to
    find the differential of a function of a stochastic process. It is particularly
    useful in finance for modeling the evolution of option prices, which are functions
    of underlying asset prices that follow stochastic processes.


    # ### Problem:


    Consider a European call option on a stock that follows the same geometric Brownian
    motion as before, with dynamics given by:


    ```

    \[ dS(t) = \mu S(t)dt + \sigma S(t)dW(t) \]

    ```


    Let''s denote the price of the call option as \(C(S(t), t)\), where \(C\) is a
    function of the stock price \(S(t)\) and time \(t\).'
  - '[PAGE 347]


    (t\). According to Itô''s Lemma, if \(C(S(t), t)\) is twice differentiable with
    respect to \(S\) and once with respect to \(t\), the change in the option price
    can be described by the following differential:


    ```

    \[ dC(S(t), t) = \left( \frac{\partial C}{\partial t} + \mu S \frac{\partial C}{\partial
    S} + \frac{1}{2} \sigma^2 S^2 \frac{\partial^2 C}{\partial S^2} \right) dt + \sigma
    S \frac{\partial C}{\partial S} dW(t) \]

    ```


    For this example, let''s assume the Black-Scholes formula for a European call
    option, which is a specific application of Itô''s Lemma:


    ```

    \[ C(S, t) = S(t)N(d_1) - K e^{-r(T-t)}N(d_2) \]

    ```


    where:


    +   - \(N(\cdot)\) is the cumulative distribution function of the standard normal
