  md: '# # FINANCIAL MATHEMATICS


    Overview


    +   1. Delta (Δ): Measures the rate of change in the option''s price for a one-point
    move in the price of the underlying asset. For example, a delta of 0.5 suggests
    the option price will move $0.50 for every $1 move in the underlying asset.

    2. Gamma (Γ): Represents the rate of change in the delta with respect to changes
    in the underlying price. This is important as it shows how stable or unstable
    the delta is; higher gamma means delta changes more rapidly.

    3. Theta (Θ): Measures the rate of time decay of an option. It indicates how much
    the price of an option will decrease as one day passes, all else being equal.

    4. Vega (ν): Indicates the sensitivity of the price of an option to changes in
    the volatility of the underlying asset. A higher vega means the option price is
    more sensitive to volatility.

    5. Rho (ρ): Measures the sensitivity of an option''s price to a change in interest
    rates. It indicates how much the price of an option should rise or fall as the
    risk-free interest rate increases or decreases.'
  merge: -1
