    \ 0.0, 1.0) / (S * sigma * np.sqrt(T))\n    theta = -((S * si.norm.pdf(d1, 0.0,\
    \ 1.0) * sigma) / (2 * np.sqrt(T))) + (r * K * np.exp(-r * T) * si.norm.cdf(-d2,\
    \ 0.0, 1.0))\n    vega = S * si.norm.pdf(d1, 0.0, 1.0) * np.sqrt(T)\nelse:\n \
    \   raise ValueError(\"Invalid option type. Use 'call' or 'put'.\")\n\nrho = K\
