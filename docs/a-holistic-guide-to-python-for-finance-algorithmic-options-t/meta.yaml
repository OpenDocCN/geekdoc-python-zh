  md: "# # BROWNIAN MOTION\n(WIENER PROCESS)\n\n- Definition: A continuous-time stochastic\
    \ process, \\(W(t)\\), with \\(W(0) = 0\\), that has independent and normally\
    \ distributed increments with mean 0 and variance \\(t\\).\n\n+   - Properties:\n\
    \  - Stationarity: The increments of the process are stationary.\n  - Martingale\
    \ Property: \\(W(t)\\) is a martingale.\n  - Quadratic Variation: The quadratic\
    \ variation of \\(W(t)\\) over an interval \\([0, t]\\) is \\(t\\).\n\n# ### Problem:\n\
    \nConsider a stock whose price \\(S(t)\\) evolves according to the dynamics of\
    \ geometric Brownian motion. The differential equation describing the stock price\
    \ is given by:\n\n```\n\\[ dS(t) = \\mu S(t)dt + \\sigma S(t)dW(t) \\]\n```\n\n\
    where:\n\n+   - \\(S(t)\\) is the stock price at time \\(t\\),\n- \\(\\mu\\) is\
    \ the drift coefficient (representing the average return of the stock),\n- \\\
    (\\sigma\\) is the volatility (standard deviation of returns) of the stock,\n\
    - \\(dW(t)\\) represents the increment of a Wiener process (or Brownian motion)\
    \ at time \\(t\\)."
  merge: -1
