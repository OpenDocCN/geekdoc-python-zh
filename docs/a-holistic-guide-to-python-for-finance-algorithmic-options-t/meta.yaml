  md: "# MARTINGALES\n\n+   - Definition: A stochastic process \\(X(t)\\) is a martingale\
    \ if its expected future value, given all past information, is equal to its current\
    \ value.\n- Mathematical Expression: \\(E[X(t+s) | \\mathcal{F}_t] = X(t)\\)\n\
    \  - \\(E[\\cdot]\\): Expected value\n  - \\(\\mathcal{F}_t\\): Filtration (history)\
    \ up to time \\(t\\)\n\n# ### Problem:\n\nConsider a fair game of tossing a coin,\
    \ where you win \\$1 for heads and lose \\$1 for tails. The game's fairness implies\
    \ that the expected gain or loss after any toss is zero, assuming an unbiased\
    \ coin. Let's denote your net winnings after \\(t\\) tosses as \\(X(t)\\), where\
    \ \\(X(t)\\) represents a stochastic process.\n\nGiven that you start with an\
    \ initial wealth of \\$0 (i.e., \\(X(0) = 0\\)), and you play this game for \\\
    (t\\) tosses, we aim to demonstrate that \\(X(t)\\) is a Martingale.\n\n# ###\
    \ Solution:\n\nTo prove that \\(X(t)\\) is a Martingale, we need to verify that\
    \ the expected future value of \\(X(t)\\), given all past information up to time\
    \ \\(t\\), equals its current value, as per the Martingale definition:\n\n```\n\
    \\[ E[X(t+s) | \\mathcal{F}_t] = X(t) \\]\n```"
  merge: -1
  pgno: 353
- img_proc: true
  md: 'Where:


    +   - \(E[\cdot]\) denotes the expected value,

    - \(X(t+s)\) represents the net winnings after \(t+s\) tosses,

    - \(\mathcal{F}_t\) is the filtration representing all information (i.e., the
    history of wins and losses) up to time \(t\),

    - \(s\) is any future time period after \(t\).


    For any given toss, the expectation is calculated as:


    ```

    \[ E[X(t+1) | \mathcal{F}_t] = \frac{1}{2}(X(t) + 1) + \frac{1}{2}(X(t) - 1) =
    X(t) \]

    ```


    This equation demonstrates that the expected value of the player''s net winnings
    after the next toss, given the history of all previous tosses, is equal to the
    current net winnings. The gain of \$1 (for heads) and the loss of \$1 (for tails)
    each have a probability of 0.5, reflecting the game''s fairness.


    Thus, by mathematical induction, if \(X(t)\) satisfies the Martingale property
    for each \(t\), it can be concluded that \(X(t)\) is a Martingale throughout the
    game. This principle underlines that in a fair game, without any edge or information
    advantage, the best prediction of future wealth, given the past, is the current
    wealth, adhering to the concept of "fair game" in the Martingale theory.


    These concepts and formulas form the foundation of mathematical finance, especially
    in the modeling and pricing of derivatives. Mastery of stochastic calculus allows
    one to understand and model the randomness inherent in financial markets.'
  merge: -1
  pgno: 354
