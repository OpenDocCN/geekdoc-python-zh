  md: '# Theta: Time Decay of Options Prices


    Theta is often referred to as the unnoticed depleter of an option''s potential,
    silently eroding its value as time progresses towards expiration. It quantifies
    the pace at which the value of an option diminishes as the expiration date approaches,
    assuming all other factors remain constant.


    In the world of options, time is like sand in an hourglass—constantly slipping
    away and taking with it a portion of the option''s premium. Theta is the metric
    that captures this relentless passage of time, presented as a negative number
    for long positions since it signifies a loss in value. For at-the-money and out-of-the-money
    options, Theta is particularly pronounced as they consist solely of time value.


    ```

    python

    from scipy.stats import norm

    import numpy as np


    # Parameters as previously described

    d1 = (np.log(S / K) + (r + 0.5 * sigma 2) * T) / (sigma * np.sqrt(T))

    d2 = d1 - sigma * np.sqrt(T)

    theta = -(S * norm.pdf(d1) * sigma / (2 * np.sqrt(T))) - r * K * np.exp(-r * T)
    * norm.cdf(d2)

    theta = -(S * norm.pdf(d1) * sigma / (2 * np.sqrt(T))) + r * K * np.exp(-r * T)
    * norm.cdf(-d2)

    return theta / 365  # Convert to daily decay


    # Example calculation for a call option

    ```'
