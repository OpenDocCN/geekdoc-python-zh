    ## 跨式组合与宽跨式组合


    进一步深入期权交易的复杂性，对于预期股票将出现显著波动但不确定其方向的交易者，出现了两种强大的方法。这两种策略都涉及利用标的资产价格潜在大幅波动的期权头寸。跨式组合涉及购买具有相同执行价格和到期日的看涨期权和看跌期权。


    该策略从标的资产价格的大幅波动中获利，无论其方向如何。这是对波动性本身的押注，而非价格变动的方向。风险仅限于为看涨和看跌期权支付的组合权利金，使其在波动市场中成为相对安全的策略。


