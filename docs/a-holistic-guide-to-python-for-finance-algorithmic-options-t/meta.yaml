- md: "## GEOMETRIC BROWNIAN MOTION (GBM)\n\n- **Definition:** Used to model stock\
    \ prices in the Black-Scholes model.\n- **SDE:** \\(dS(t) = \\mu S(t)dt + \\sigma\
    \ S(t)dW(t)\\)\n  - \\(S(t)\\): Stock price at time \\(t\\)\n  - \\(\\mu\\): Expected\
    \ return\n  - \\(\\sigma\\): Volatility\n- **Solution:** \\(S(t) = S(0)\\exp\\\
    left((\\mu - \\frac{1}{2}\\sigma^2)t + \\sigma W(t)\\right)\\)\n\n### Problem:\n\
    \nImagine you are a financial analyst tasked with forecasting the future price\
    \ of a technology company's stock, which is currently priced at \\$150. You decide\
    \ to use the GBM model due to its ability to incorporate the randomness inherent\
    \ in stock price movements.\n\nGiven the following parameters for the stock:\n\
    \n- Initial stock price \\(S(0) = \\$150\\),\n- Expected annual return \\(\\mu\
    \ = 10\\%\\) or \\(0.10\\),\n- Annual volatility \\(\\sigma = 20\\%\\) or \\(0.20\\\
    ),\n- Time horizon for the prediction \\(t = 2\\) years.\n\nUsing the GBM model,\
    \ calculate the expected stock price at the end of the 2-year period.\n\n### Solution:\n\
    \nTo forecast the stock price using the GBM model, we utilize the solution to\
    \ the GBM differential equation:\n\n\\[ S(t) = S(0) \\exp\\left((\\mu - \\frac{1}{2}\\\
    sigma^2)t + \\sigma W(t)\\right) \\]\n\nHowever, for the purpose of calculating\
    \ the expected price (\\(E[S(t)]\\)), we consider that the expected value of \\\
    (W(t)\\) over time is 0 due to the properties of the Wiener process. Thus, the\
    \ formula simplifies to:\n\n\\[ E[S(t)] = S(0) \\exp\\left((\\mu - \\frac{1}{2}\\\
    sigma^2)t\\right) \\]\n\nLet's calculate the expected price of the stock at the\
    \ end of 2 years using the given parameters.\n\nThe expected stock price at the\
    \ end of the 2-year period, using the Geometric Brownian Motion model with the\
    \ specified parameters, is approximately \\$176.03. This calculation assumes a\
    \ 10% expected annual return and a 20% annual volatility, demonstrating how GBM\
    \ models the exponential growth of stock prices while accounting for the randomness\
    \ of their movements over time.\n\n## MARTINGALES\n\n- **Definition:** A stochastic\
    \ process \\(X(t)\\) is a martingale if its expected future value, given all past\
    \ information, is equal to its current value.\n- **Mathematical Expression:**\
    \ \\(E[X(t+s) | \\mathcal{F}_t] = X(t)\\)\n  - \\(E[\\cdot]\\): Expected value\n\
    \  - \\(\\mathcal{F}_t\\): Filtration (history) up to time \\(t\\)\n\n### Problem:\n\
    \nConsider a fair game of tossing a coin, where you win \\$1 for heads and lose\
    \ \\$1 for tails. The game's fairness implies that the expected gain or loss after\
    \ any toss is zero, assuming an unbiased coin. Let's denote your net winnings\
    \ after \\(t\\) tosses as \\(X(t)\\), where \\(X(t)\\) represents a stochastic\
    \ process.\n\nGiven that you start with an initial wealth of \\$0 (i.e., \\(X(0)\
    \ = 0\\)), and you play this game for \\(t\\) tosses, we aim to demonstrate that\
    \ \\(X(t)\\) is a Martingale.\n\n### Solution:\n\nTo prove that \\(X(t)\\) is\
    \ a Martingale, we need to verify that the expected future value of \\(X(t)\\\
    ), given all past information up to time \\(t\\), equals its current value, as\
    \ per the Martingale definition:\n\n\\[ E[X(t+s) | \\mathcal{F}_t] = X(t) \\]\n\
    \nWhere:\n\n- \\(E[\\cdot]\\) denotes the expected value,\n- \\(X(t+s)\\) represents\
    \ the net winnings after \\(t+s\\) tosses,\n- \\(\\mathcal{F}_t\\) is the filtration\
    \ representing all information (i.e., the history of wins and losses) up to time\
    \ \\(t\\),\n- \\(s\\) is any future time period after \\(t\\).\n\nFor any given\
    \ toss, the expectation is calculated as:\n\n\\[ E[X(t+1) | \\mathcal{F}_t] =\
    \ \\frac{1}{2}(X(t) + 1) + \\frac{1}{2}(X(t) - 1) = X(t) \\]\n\nThis equation\
    \ demonstrates that the expected value of the player's net winnings after the\
    \ next toss, given the history of all previous tosses, is equal to the current\
    \ net winnings. The gain of \\$1 (for heads) and the loss of \\$1 (for tails)\
    \ each have a probability of 0.5, reflecting the game's fairness.\n\nThus, by\
    \ mathematical induction, if \\(X(t)\\) satisfies the Martingale property for\
    \ each \\(t\\), it can be concluded that \\(X(t)\\) is a Martingale throughout\
    \ the game. This principle underlines that in a fair game, without any edge or\
    \ information advantage, the best prediction of future wealth, given the past,\
    \ is the current wealth, adhering to the concept of \"fair game\" in the Martingale\
    \ theory.\n\nThese concepts and formulas form the foundation of mathematical finance,\
    \ especially in the modeling and pricing of derivatives. Mastery of stochastic\
    \ calculus allows one to understand and model the randomness inherent in financial\
    \ markets."
  mdcn: "## 几何布朗运动（GBM）\n\n- **定义：** 用于在布莱克-斯科尔斯模型中模拟股票价格。\n- **随机微分方程（SDE）：** \\\
    (dS(t) = \\mu S(t)dt + \\sigma S(t)dW(t)\\)\n  - \\(S(t)\\)：时间 \\(t\\) 的股票价格\n\
    \  - \\(\\mu\\)：预期收益率\n  - \\(\\sigma\\)：波动率\n- **解：** \\(S(t) = S(0)\\exp\\left((\\\
    mu - \\frac{1}{2}\\sigma^2)t + \\sigma W(t)\\right)\\)\n\n### 问题：\n\n假设你是一名金融分析师，负责预测一家科技公司股票的未来价格，该股票当前价格为150美元。你决定使用GBM模型，因为它能够纳入股票价格变动中固有的随机性。\n\
    \n给定该股票的以下参数：\n\n- 初始股票价格 \\(S(0) = \\$150\\)，\n- 预期年化收益率 \\(\\mu = 10\\%\\) 或\
    \ \\(0.10\\)，\n- 年化波动率 \\(\\sigma = 20\\%\\) 或 \\(0.20\\)，\n- 预测的时间跨度 \\(t = 2\\\
    ) 年。\n\n使用GBM模型，计算2年期结束时的预期股票价格。\n\n### 解答：\n\n要使用GBM模型预测股票价格，我们利用GBM微分方程的解：\n\
    \n\\[ S(t) = S(0) \\exp\\left((\\mu - \\frac{1}{2}\\sigma^2)t + \\sigma W(t)\\\
    right) \\]\n\n然而，为了计算预期价格（\\(E[S(t)]\\)），我们考虑到由于维纳过程的性质，\\(W(t)\\) 在时间上的期望值为0。因此，公式简化为：\n\
    \n\\[ E[S(t)] = S(0) \\exp\\left((\\mu - \\frac{1}{2}\\sigma^2)t\\right) \\]\n\
    \n让我们使用给定的参数计算2年期结束时的预期股票价格。\n\n使用指定参数的几何布朗运动模型，2年期结束时的预期股票价格约为176.03美元。此计算假设10%的预期年化收益率和20%的年化波动率，展示了GBM如何在考虑股票价格随时间变动的随机性的同时，模拟其指数增长。\n\
    \n## 马尔可夫过程（鞅）\n\n- **定义：** 一个随机过程 \\(X(t)\\) 被称为鞅，如果其在给定所有过去信息条件下的预期未来值等于其当前值。\n\
    - **数学表达式：** \\(E[X(t+s) | \\mathcal{F}_t] = X(t)\\)\n  - \\(E[\\cdot]\\)：期望值\n\
    \  - \\(\\mathcal{F}_t\\)：截至时间 \\(t\\) 的信息流（历史）\n\n### 问题：\n\n考虑一个公平的抛硬币游戏，正面赢1美元，反面输1美元。游戏的公平性意味着，在假设硬币无偏的情况下，任何一次抛掷后的预期收益或损失为零。让我们将你在\
    \ \\(t\\) 次抛掷后的净收益表示为 \\(X(t)\\)，其中 \\(X(t)\\) 代表一个随机过程。\n\n假设你从初始财富0美元开始（即 \\\
