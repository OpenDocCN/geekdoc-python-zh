  md: 'As Rayvens is based on Camel, it requires a setting of Camel to make it work.
    Ravens supports two main options of Camel usage:


    +   - Local mode: in this mode Camel source or sink run in the same execution
    context as the stream actor which is attached to using the Camel client: same
    container, same virtual or physical machine.

    - Operator mode: in this case Camel source or sink run inside a Kubernetes cluster
    relying on the Camel operator to manage dedicated Camel pods.


    # Conclusion


    In this chapter, you have learned one option to use Ray for implementing streaming.
    You first learned the basics of Kafka - the most popular streaming application
    backbone used today - and some different ways to integrate it with Ray. You then
    learned how to scale Kafka-based applications with Ray. We have also outlined
    implementation approaches for both stateless and stateful streaming applications
    with Ray that you can use as a foundation for your custom implementations.


    Finally, we briefly discussed alternatives to using Kafka as transport, including
    Rayvens - a general-purpose integration framework based on Apache Camel, that
    can be used for integration of a wide variety of streaming backbones. You can
    use this discussion to decide how to implement your specific transports.


    In the next chapter, we will introduce Ray’s microservices framework implementation
    and its usage for model serving implementation.


