  md: '# RAY SCHEDULER


    Ray uses a Bottom-Up Distributed Scheduler, which consists of a global scheduler
    and per-node local schedulers. On task creation, the task is always first submitted
    to the node’s local scheduler, which encourages task locality. If the local node
    is overloaded (its local task queue exceeds a predefined threshold) or it cannot
    satisfy the task’s requirements (for example, lacks GPU), the local scheduler
    calls the global scheduler to take over.


    The global scheduler first identifies the set of nodes that have enough resources
    to satisfy the task’s requirements and then selects the one that provides the
    lowest estimated waiting time - a sum of the estimated time the task will be queued
    at that node (task queue size times average task execution), and the estimated
    transfer time of the task’s remote inputs (total size of remote inputs divided
    by average bandwidth).


    Each worker sends a periodic heartbeat with resource availability and queue depth
    to the global scheduler. The global scheduler also has access to the location
    of the task’s inputs and their sizes from the GCS when deciding where to schedule.
    Once the global scheduler picks the node, it calls the node’s local scheduler,
    which schedules the task. Additional improvements to this basic algorithm are
    described here and include:


    +   - Parallel retrieval of task arguments

    - Pre-emptive local object handling - if the object is used locally it is available
    even before it is available in the Global Control store

    - Taking into account node resource imbalances for the global scheduler

    - Dependency aware task scheduling'
