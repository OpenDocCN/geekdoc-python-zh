    \ had to do that for each time it started another worker, this would be much slower.\
    \ You can solve this by creating conda environments in your cluster or container.\
    \ We discuss how to do this in [Link to Come].\n\n## Deploying Ray Applications\
    \ with the Ray Job API\n\nIn addition to connecting your job to an existing cluster\
    \ with `ray.init`, Ray offers a job API. The job API provides a lightweight mechanism\
    \ to submit jobs without having to worry about library mismatches and avoids the\
    \ issue of flaky networks between the remote cluster and the head node. The three\
    \ main methods of the job API you will use are:\n\n- Submit a new job to the cluster,\
    \ returning a job ID.\n- Get a job’s status based on execution ID which returns\
    \ back status of submitted job.\n- See the execution logs for a job for an execution\
    \ ID\n\n> ### WHY ANOTHER API?\n> Although you can theoretically attach your program\
    \ to the existing Ray cluster using the Ray client, it often does not always work,\
    \ especially when Ray is deployed on a Kubernetes cluster. The issue here is that\
    \ Ray node’s gRPC interface is using insecure gRPC, which is not supported by\
    \ the majority of Kubernetes Ingress implementations. To overcome this issue,\
    \ Ray has introduced a new Ray job SDK, using HTTP instead of gRPC. The job API\
    \ is on port 8625 and [Link to Come] covers how to make this available.\n\nA job\
    \ request consists of:\n\n1. a directory containing a collection of files and\
    \ configurations that defines an application,\n2. an entrypoint for the execution\n\
    3. A runtime Environments consisting of any needed files, Python libraries, and\
    \ environment variables, etc.\n\nThe code below shows you how to run your code\
    \ on a Ray cluster with the job API. Below is the example of the Ray code that\
    \ we want to submit to the cluster:\n\n```\nclass ParseKwargs(argparse.Action):\n\
    \    def __call__(self, parser, namespace, values,\n                 option_string=None):\n\
    \        setattr(namespace, self.dest, dict())\n        for value in values:\n\
    \            key, value = value.split('=')\n            getattr(namespace, self.dest)[key]\
    \ = value\n\nparser = argparse.ArgumentParser()\nparser.add_argument('-k', '--kwargs',\
    \ nargs='*',\n                    action=ParseKwargs)\nargs = parser.parse_args()\n\
