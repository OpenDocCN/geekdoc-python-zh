  md: 'With these additional methods in place, Python invocations can be significantly
    simplified (Example 7-6).


    Example 7-6. Using additional methods for handle-based invocation


    ```

    print(ray.get(handle.celcius_fahrenheit.remote(100.0)))

    print(ray.get(handle.fahrenheit_celcius.remote(100.0)))

    ```


    Note that here, unlike Example 7-4, which is using the default method `__call__`,
    invoke methods are explicitly specified (instead of putting request type in the
    request itself, request type here is implicit - it''s a method name).


    Ray offers two types of handles: synchronous and asynchronous. `Sync` flag `Deployment.get_handle(...,
    sync=True|False)` can be used to specify a handle type.


    +   - The default handle is synchronous. In this case, calling `handle.remote()`
    returns a Ray ObjectRef.

    - To create an asynchronous handle set `sync=False`. Async handle invocation is
    asynchronous and you will have to use `await` to get a Ray ObjectRef. To use `await`,
    you have to run `deployment.get_handle` and `handle.remote` in the Python `asyncio`
    event loop.


    We will demonstrate the usage of async handles later in this chapter.


    Finally, deployments can be updated by simply modifying the code or configuration
    options and calling `deploy()` again.


    In addition to HTTP and direct Python invocation, described here, you can also
    use the Python APIs for invoking deployment using Kafka (see chapter 6 for Kafka
    integration approach).


    Now that you know the basics of Deployment, let''s take a look at additional capabilities
    available for deployments.


    # Additional deployment capabilities'
