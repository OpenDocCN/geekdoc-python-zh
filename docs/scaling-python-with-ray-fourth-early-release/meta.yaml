  - '[PAGE 53]


    *max_task_retries*


    Specify how many times to retry an actor’s task if the task fails due to a system
    error. If set to -1, the system will retry the failed task until the task succeeds,
    or the actor has reached its max_restarts limit. If set to n > 0, the system will
    retry the failed task up to n times, after which the task will throw a RayActorError
    exception upon ray.get.


    As further explained in the next chapter and here when an actor is restarted,
    Ray will recreate its state by rerunning its constructor. This means that if a
    state was changed during the actor’s execution, it will be lost. In order to preserve
    such a state, an actor has to implement its custom persistence. In our example
    case, the actor’s state is lost on failure since we haven’t used actor persistence.
    This might be okay for some use cases, but not acceptable for others (see also
    this Ray pattern). In the next section, you will learn how to programmatically
    implement custom actor persistence.


    # Implementing Actor’s Persistence


    In this implementation, the state is saved as a whole, which works well enough
    if the size of the state is relatively small and the state changes are relatively
