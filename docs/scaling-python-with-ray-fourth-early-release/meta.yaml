    \ Once you’re finished with your placement group you can delete it with `remove_placement_group(pg)`.\n\
    \n### Example 5-9. Mixed CPU & GPU Placement group\n\n```\n# Create a placement\
    \ group.\ncpu_bundle = {\"CPU\": 1}\ngpu_bundle = {\"GPU\": 1}\npg = placement_group([cpu_bundle,\
    \ gpu_bundle])\nray.get(pg.ready())\nprint(placement_group_table(pg))\nprint(ray.available_resources())\n\
    ```\n\n## RAY SCHEDULER\n\nRay uses a Bottom-Up Distributed Scheduler, which consists\
    \ of a global scheduler and per-node local schedulers. On task creation, the task\
    \ is always first submitted to the node’s local scheduler, which encourages task\
    \ locality. If the local node is overloaded (its local task queue exceeds a predefined\
    \ threshold) or it cannot satisfy the task’s requirements (for example, lacks\
    \ GPU), the local scheduler calls the global scheduler to take over.\n\nThe global\
    \ scheduler first identifies the set of nodes that have enough resources to satisfy\
    \ the task’s requirements and then selects the one that provides the lowest estimated\
    \ waiting time - a sum of the estimated time the task will be queued at that node\
    \ (task queue size times average task execution), and the estimated transfer time\
    \ of the task’s remote inputs (total size of remote inputs divided by average\
    \ bandwidth).\n\nEach worker sends a periodic heartbeat with resource availability\
    \ and queue depth to the global scheduler. The global scheduler also has access\
    \ to the location of the task’s inputs and their sizes from the GCS when deciding\
    \ where to schedule. Once the global scheduler picks the node, it calls the node’s\
    \ local scheduler, which schedules the task. Additional improvements to this basic\
    \ algorithm are described here and include:\n\n- Parallel retrieval of task arguments\n\
    - Pre-emptive local object handling - if the object is used locally it is available\
    \ even before it is available in the Global Control store\n- Taking into account\
    \ node resource imbalances for the global scheduler\n- Dependency aware task scheduling\n\
    \nYou can assign placement groups names. You can achieve this by specifying a\
    \ parameter `name=\"desired_name\"` at the point of placement group creation.\
    \ This allows you to retrieve and use the placement group from any job in the\
    \ Ray cluster by name rather than passing a placement group handle.\n\n## Namespaces\n\
    \nA namespace is a logical grouping of jobs and actors that provides limited isolation.\
    \ By default, each Ray program runs in its own anonymous namespace. The anonymous\
    \ namespace can not be accessed from another Ray program. To share actors between\
    \ your Ray applications, you’ll need to put both of your programs in the same\
    \ namespace. When constructing your Ray context with `ray.init`, just add the\
    \ `namespace` named parameter, e.g. `ray.init(namespace=\"timbit\")`.\n\n> **NOTE**\n\
    Namespaces are not intended to provide security isolation.\n\nYou can get the\
    \ current namespace by calling `ray.get_runtime_context().namespace`.\n\n## Managing\
    \ Dependencies with Runtime Environments\n\nOne of the big draws of Python is\
    \ the amazing ecosystem of tools available. Ray supports managing dependencies\
    \ with both conda and virtualenv. Ray dynamically creates these virtual environments\
    \ inside of your larger container as needed and launches workers using the matching\
    \ environment.\n\nThe fastest way to add a “few” packages to your runtime context\
    \ is by specifying a list of packages from the [Python Package Index (PyPI)](https://pypi.org/)\
    \ you"
  mdcn: "## 组调度\n\n- 确保所有任务/参与者将被调度并同时启动。\n\n## 在集群内组织你的任务和参与者：\n\n- 最大化数据局部性 - 确保将所有任务和参与者放置在靠近数据的位置，以避免对象传输开销。\n\
    - 负载均衡 - 通过尽可能将参与者或任务放置到不同的物理机器上，提高应用程序的可用性。\n\n放置组由每个工作节点所需的资源以及放置策略组成。\n\n由于一个放置组可以跨越多个工作节点，你必须为每个工作节点指定所需的资源（或资源捆绑包）。每个工作节点的一组资源被称为一个资源捆绑包，并且必须能够放入单个机器中，否则自动扩缩器将无法创建节点类型，放置组将永远不会被调度。\n\
    \n放置组是资源捆绑包的集合，其中资源捆绑包是资源（CPU、GPU 等）的集合。你使用相同的参数定义资源捆绑包。每个资源捆绑包必须能放入单个机器。\n\n\
    你通过设置放置策略来控制 Ray 如何调度你的资源组。你的放置策略可以尝试减少节点数量（提高局部性），或者将工作更分散地分布（提高可靠性和负载均衡）。你有几种核心策略的变体可供选择：\n\
    \n- STRICT_PACK - 所有捆绑包必须放置在集群中的单个节点上。\n- PACK - 所有提供的捆绑包都尽最大努力打包到单个节点上。如果严格打包不可行，捆绑包可以放置到其他节点上。这是默认的放置组策略。\n\
    - STRICT_SPREAD - 每个捆绑包必须调度在单独的节点上。\n- SPREAD - 每个捆绑包将尽最大努力分散到单独的节点上。如果严格分散不可行，一些捆绑包可以共置在节点上。\n\
    \n> **提示**\n\n多个远程函数或参与者可以在同一个资源捆绑包中。任何使用相同捆绑包的函数/参与者将始终位于同一节点上。\n\n放置组的生命周期包含以下阶段：\n\
    \n- *创建：* 放置组创建请求被发送到全局控制结构（GCS），GCS 计算如何分配捆绑包并向所有节点发送资源预留请求。Ray 保证放置组是*原子性*放置的。\n\
    - *分配：* 放置组正在等待创建。如果现有的 Ray 节点可以满足给定策略的资源需求，那么放置组将被分配并返回成功。否则，结果取决于 Ray 是否能够添加节点。如果自动扩缩器不存在或达到节点限制，则放置组分配失败并返回错误，否则自动扩缩器会扩展集群以确保待处理的组可以被分配。\n\
    - *节点故障：* 当包含放置组某些捆绑包的工作节点<sup>15</sup>死亡时，所有捆绑包将由 GCS 重新调度到不同的节点上。这意味着放置组创建的*原子性*仅适用于初始放置创建。一旦放置组创建完成，它可能由于节点故障而变得不完整。\n\
    - *清理：* 当创建放置组的作业完成时，Ray 会自动移除放置组。如果你希望无论创建它的作业如何都保持放置组存活，你应该在创建放置组时指定 `lifetime=\"\
    detached\"`。你也可以随时通过调用 `remove_placement_group` 显式释放放置组。\n\n要创建一个放置组，你需要一些额外的导入，如示例\
    \ 5-7 所示。如果你在本地模式下使用 Ray，由于只有一个节点，放置组的效果不太明显。你仍然可以将仅 CPU 的捆绑包组合成一个放置组。创建放置组后，你可以使用\
    \ `options` 在特定的捆绑包中运行函数或参与者，如示例 5-8 所示。\n\n### 示例 5-7. 放置组导入\n\n```\nfrom ray.util.placement_group\
    \ import (\n    placement_group,\n    placement_group_table,\n    remove_placement_group\n\
    )\n```\n\n### 示例 5-8. 仅 CPU 放置组\n\n```\n# 创建一个放置组。\ncpu_bundle = {\"CPU\": 3}\n\
    mini_cpu_bundle = {\"CPU\": 1}\npg = placement_group([cpu_bundle, mini_cpu_bundle])\n\
    ray.get(pg.ready())\nprint(placement_group_table(pg))\nprint(ray.available_resources())\n\
    # 在 cpu_bundle 中运行 remote_fun\nhandle = remote_fun.options(placement_group=pg,\n\
    placement_group_bundle_index=0).remote(1)\n```\n\n如果你在集群上运行 Ray，你可以创建更复杂的资源组。如果你的集群中有一些\
    \ GPU 节点，你可以创建更复杂的放置组。当我们在测试集群上运行示例 5-9 时，自动扩缩器会分配一个带有 GPU 的节点。完成放置组使用后，你可以使用\
    \ `remove_placement_group(pg)` 删除它。\n\n### 示例 5-9. 混合 CPU 和 GPU 放置组\n\n```\n#\
    \ 创建一个放置组。\ncpu_bundle = {\"CPU\": 1}\ngpu_bundle = {\"GPU\": 1}\npg = placement_group([cpu_bundle,\
    \ gpu_bundle])\nray.get(pg.ready())\nprint(placement_group_table(pg))\nprint(ray.available_resources())\n\
    ```\n\n## RAY 调度器\n\nRay 使用自底向上的分布式调度器，它由一个全局调度器和每个节点的本地调度器组成。在任务创建时，任务总是首先提交到节点的本地调度器，这鼓励了任务局部性。如果本地节点过载（其本地任务队列超过预定义阈值）或无法满足任务的要求（例如，缺少\
    \ GPU），本地调度器会调用全局调度器接管。\n\n全局调度器首先识别出有足够资源满足任务要求的节点集，然后选择提供最低估计等待时间的节点 - 该时间是任务在该节点排队的估计时间（任务队列大小乘以平均任务执行时间）和任务远程输入的估计传输时间（远程输入的总大小除以平均带宽）之和。\n\
    \n每个工作节点定期向全局调度器发送包含资源可用性和队列深度的心跳。全局调度器在决定调度位置时，还可以从 GCS 获取任务输入的位置及其大小。一旦全局调度器选择了节点，它就会调用该节点的本地调度器来调度任务。此基本算法的额外改进在此描述，包括：\n\
    \n- 任务参数的并行检索\n- 抢占式本地对象处理 - 如果对象在本地使用，即使在全局控制存储中可用之前，它也是可用的\n- 在全局调度器中考虑节点资源不平衡\n\
    - 依赖感知的任务调度\n\n你可以为放置组分配名称。这可以通过在创建放置组时指定参数 `name=\"desired_name\"` 来实现。这允许你通过名称从\
    \ Ray 集群中的任何作业检索和使用放置组，而不是传递放置组句柄。\n\n## 命名空间\n\n命名空间是作业和参与者的逻辑分组，提供有限的隔离。默认情况下，每个\
    \ Ray 程序都在自己的匿名命名空间中运行。匿名命名空间无法从另一个 Ray 程序访问。要在你的 Ray 应用程序之间共享参与者，你需要将两个程序放在同一个命名空间中。在使用\
    \ `ray.init` 构造你的 Ray 上下文时，只需添加 `namespace` 命名参数，例如 `ray.init(namespace=\"timbit\"\
    )`。\n\n> **注意**\n命名空间不旨在提供安全隔离。\n\n你可以通过调用 `ray.get_runtime_context().namespace`\
    \ 获取当前命名空间。\n\n## 使用运行时环境管理依赖项\n\nPython 的一大吸引力在于其可用的惊人工具生态系统。Ray 支持使用 conda 和\
    \ virtualenv 管理依赖项。Ray 根据需要在更大的容器内动态创建这些虚拟环境，并使用匹配的环境启动工作节点。\n\n向运行时上下文添加“一些”包的最快方法是指定来自\
    \ [Python 包索引 (PyPI)](https://pypi.org/) 的包列表"
