    \n## Ray 远程最佳实践\n\n当你使用远程函数时，请记住不要让它们太小。如果任务非常小，使用 Ray 可能比不使用 Ray 的 Python 更耗时。原因是每次任务调用都有相当大的开销（例如，调度、数据传递、进程间通信、更新系统状态）。为了从并行执行中获得真正的优势，你需要确保这个开销与函数本身的执行时间相比可以忽略不计。⁸\n\
