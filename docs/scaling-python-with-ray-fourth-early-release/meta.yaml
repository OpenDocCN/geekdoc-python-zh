    , \"Failed to create topic \")\n```\n\nBecause the topics may already exist, the\
    \ code first deletes them. Once the deletion is completed, the code waits for\
    \ a short period of time to make sure that deletion took place on the cluster\
    \ and then recreates topics with the target number of partitions and replication\
    \ factor."
  mdcn: "## 提示\nKafka 消息是字节数组，因此我们需要使用例如 Apache Avro、Google Protocol Buffers、JSON\
    \ 或 Python 序列化（pickle）等方式来序列化消息（在 Kafka 中称为 marshaling）。Python Kafka 的 GitHub\
    \ 仓库提供了许多使用不同编码方式与 Kafka 交互的示例。为了使代码示例更简洁，我们将全程使用 JSON，但请确保为你的实现选择合适的 marshaling\
    \ 方式。在选择格式时，你需要考虑其性能（记住我们对每条消息都要进行序列化/反序列化）、大小（较小的消息读写更快）、消息可扩展性（当消息发生变更（如字段添加或删除）时的实现行为）以及语言互操作性。这里提供了一个关于不同\
    \ marshaling 方法的优秀概述。\n\n与其他消息系统不同，Kafka 不保证消息不重复。相反，每个 Kafka 消费者负责确保消息只被处理一次。\n\
    \n## 注意\n如果你想了解更多，Confluent Kafka Python 客户端文档提供了关于不同提交选项及其对交付保证影响的更多信息。默认情况下，Python\
    \ 客户端使用自动提交，这也是我们在示例中使用的方式。在实际实现中，请考虑你需要提供的交付保证（“恰好一次”、“至少一次”等），并使用相应的提交方法。\n\n\
    ## 将 Kafka 与 Ray 结合使用\n\n既然你已经了解了 Kafka 及其基本 API，让我们来看看将 Kafka 与 Ray 集成的选项。我们将把\
    \ Kafka 消费者和生产者都实现为 Ray Actor。⁷ 使用 Ray Actor 与 Kafka 结合有几个好处，包括：\n\n- Kafka 消费者运行在一个无限循环中，等待新记录到达，并需要跟踪已消费的消息。作为一个有状态的服务，Ray\
    \ Actor 为实现 Kafka 消费者提供了理想的范式。\n- 通过将你的 Kafka 生产者放入一个 Actor 中，你可以异步地将记录写入任何 Kafka\
    \ 主题，而无需创建单独的生产者。\n\n一个简单的 Kafka 生产者 Actor 实现如示例 6-1 所示。\n\n### 示例 6-1. Kafka\
    \ 生产者 Actor\n\n```python\n@ray.remote\nclass KafkaProducer:\n    def __init__(self,\
    \ broker: str = 'localhost:9092'):\n        from confluent_kafka import Producer\n\
    \        conf = {'bootstrap.servers': broker}\n        self.producer = Producer(**conf)\n\
    \n    def produce(self, data: dict, key: str = None, topic: str = 'test'):\n \
    \       def delivery_callback(err, msg):\n            if err:\n              \
    \  print('Message failed delivery: ', err)\n            else:\n              \
    \  print(f'Message delivered to topic {msg.topic()} partition {msg.partition()}\
    \ offset {msg.offset()}')\n\n        binary_key = None\n        if key is not\
    \ None:\n            binary_key = key.encode('UTF8')\n        self.producer.produce(topic=topic,\
    \ value=json.dumps(data).encode('UTF8'), key=binary_key, callback=delivery_callback)\n\
    \        self.producer.poll(0)\n\n    def destroy(self):\n        self.producer.flush(30)\n\
    ```\n\n此清单中的 Actor 实现包含以下方法：\n\n- 构造函数，它根据 Kafka 集群的位置初始化 Kafka 生产者。\n- 你将调用以发送数据的方法是\
    \ `produce`，它接受要写入 Kafka 的数据（作为 Python 字典）、一个可选的键（作为字符串）以及要写入的 Kafka 主题。这里我们选择使用字典作为数据格式，因为它是一种相当通用的数据表示方式，并且可以轻松地序列化/反序列化为\
    \ JSON。为了调试，我们添加了一个内部的 *delivery_callback* 方法，用于在消息写入成功或发生错误时打印信息。\n- 一个 `destroy`\
    \ 方法，Ray 在退出应用程序之前会调用它。我们的 `destroy` 方法会等待最多 30 秒，以确保所有未完成的消息被投递，并且投递报告回调被触发。\n\
    \n一个简单的 Kafka 消费者 Actor 实现如示例 6-2 所示。\n\n### 示例 6-2. Kafka 消费者 Actor\n\n```python\n\
