  md: '# Using Ray Serve for model serving


    In a nutshell, serving a model is no different than any other microservice (we
    will talk about specific model serving requirements later in this chapter). As
    long as you can get a machine-learning generated model in some shape or form (pickle
    format, straight Python code, binary format along with Python library for its
    processing, etc) compatible with Ray’s runtime, you can use this model to process
    inference requests. Let’s start with a simple example of model serving.


    # Simple model service example


    One of the popular model learning applications is red wine quality prediction,
    based on this Kaggle dataset. There are numerous publications using this dataset
    to build ML implementation of wine quality, for example here, here, and here.
    For our example we have built several classification models for the red wine quality
    dataset, following this article (the actual code is in Github). The code uses
    several different techniques for building a classification model of the red wine
    quality including:


    +   - Decision trees

    - Random forest

    - Ada boost

    - Gradient boost

    - XGBoost


    All implementations leverage the Scikit-learn Python library, which allows you
    to generate a model and export it using Pickle. When validating the models we
    saw the best results from Random forest, Gradient boost, and XGBoost, so we saved
    only these models locally (generated models are available in Github). With the
    models in place, you can use a simple deployment that allows serving red wine
    quality model using Random forest classification (Example 7-14).'
  merge: -1
  pgno: 133
- img_proc: true
  md: "# Example 7-14. Implementing model serving using Random forest classification\n\
    \n```\n@serve.deployment(route_prefix=\"/randomforest\")\nclass RandomForestModel:\n\
    \    def __init__(self, path):\n        with open(path, \"rb\") as f:\n      \
    \      self.model = pickle.load(f)\n\n    async def __call__(self, request):\n\
    \        payload = await request.json()\n        return self.serve(payload)\n\n\
    \    def serve(self, request):\n        input_vector = [\n            request[\"\
    fixed acidity\"],\n            request[\"volatile acidity\"],\n            request[\"\
    citric acid\"],\n            request[\"residual sugar\"],\n            request[\"\
    chlorides\"],\n            request[\"free sulfur dioxide\"],\n            request[\"\
    total sulfur dioxide\"],\n            request[\"density\"],\n            request[\"\
    pH\"],\n            request[\"sulphates\"],\n            request[\"alcohol\"],\n\
    \        ]\n        prediction = self.model.predict([input_vector])[0]\n     \
    \   return {\"result\": str(prediction)}\n```\n\nThis deployment has three methods:\n\
    \n+   - Constructor, which loads a model and stores it locally. Note that here\
    \ we are using model location as a parameter so that we can redeploy this deployment\
    \ when a model changes\n- __call__ method invoked by HTTP requests. This method\
    \ retrieves the features (as a dictionary) and invokes the serve method for the\
    \ actual processing. By defining it as async, it can process multiple requests\
    \ simultaneously.\n- Serve method that can be used to invoke deployment via a\
    \ handle. It converts the incoming dictionary into a vector and calls the underlying\
    \ model for inference."
  merge: -1
  pgno: 134
- img_proc: true
  md: 'Once the implementation is deployed, it can be used for model serving. If invoked
    via HTTP, it takes a JSON string as a payload, for invocation using handle request
    is submitted via dictionary. Implementations for XGBoost and Gradient boost look
    pretty much the same, with the exception that a generated model in these cases
    takes a two-dimensional array instead of a vector, so you need to do this transformation
    before invoking the model.


    Additionally, you can take a look at Ray’s documentation for serving other types
    of models - Tensorflow, PyTorch, etc.


    Now that you know how to build a simple model serving implementation, the question
    is whether Ray-based microservices are a good platform for model serving.


    # Considerations for model serving implementations


    When it comes to model serving, there are a few specific requirements that are
    important in this case. A good definition of model serving specific requirements
    can be found here. :


    +   1. The implementation has to be flexible. It should allow for your training
    to be implementation-agnostic (i.e TensorFlow versus PyTorch, vs Scikit-Learn).
    For an inference service invocation, it should not matter if the underlying model
    was trained using PyTorch, Scikit-learn, or TensorFlow - the service interface
    should be shared so that the user’s API remains consistent.

    2. It is sometimes advantageous to be able to batch requests in a variety of settings
    in order to realize better throughput. The implementation should make it simple
    to support batching of model serving requests.

    3. The implementation should provide the ability to leverage hardware optimizers
    that match the needs of the algorithm. Sometimes in the evaluation phase, you
    would benefit from hardware optimizers like GPUs to infer the models.

    4. The implementation should be able to seamlessly include additional components
    of an inference graph. An inference graph could comprise'
  merge: -1
  pgno: 135
- img_proc: true
  md: 'feature transformers, predictors, explainers, and drift detectors.


    +   5. Implementation should allow scaling of serving instances, both explicitly
    and using auto scalers, regardless of the underlying hardware.


    +   6. It should be possible to expose model serving functionality via different
    protocols including HTTP, Kafka, etc.


    +   7. ML models traditionally do not extrapolate well outside of the training
    data distribution. As a result, if data drift occurs, the model performance can
    deteriorate, and it should be retrained and redeployed. Implementation should
    support an easy redeployment of models.


    +   8. Flexible deployment strategy implementations (including Canary deployment,
    Blue-Green deployments, and A/B testing) are required, to ensure that new versions
    of models will not behave worse than the existing ones.


    Let’s see how these requirements are satisfied by Ray’s microservice framework.


    +   1. Ray’s deployment cleanly separates deployment APIs from model APIs. Thus,
    Ray “standardizes” deployment APIs and provides support for converting incoming
    data to the format required for the model. See Example 7-14 for an example.


    +   2. Ray’s deployment makes it easy to implement request batching. Refer to
    this tutorial for details on how to implement and deploy a Ray Serve deployment
    that accepts batches, configure the batch size, and query the model in Python.


    +   3. As described earlier in this chapter deployments support configurations
    that allow specifying hardware resources (CPU/GPU) required for its execution.


    +   4. Deployment composition described earlier in this chapter allows for easy
    creation of the model serving graphs, mixing and matching plain'
  merge: -1
  pgno: 136
- img_proc: true
  md: 'python code and existing deployments. We will present an additional example
    of deployment compositions later in this chapter


    +   5. As described earlier in this chapter, deployments support setting the number
    of replicas, thus easily scaling deployments. Coupled with Ray’s auto-scaling
    and the ability to define the number of HTTP servers, the microservice framework
    allows for very efficient scaling of model serving.


    +   6. As described above, deployments can be exposed via HTTP or straight Python.
    The latter option allows for integration with any required transport.


    +   7. As described earlier in this chapter, a simple redeployment of deployment
    allows you to update models without restarting the Ray cluster and interrupting
    applications that are leveraging model serving.


    +   8. As shown in the canary deployment example (Example 7-12), usage of deployment
    composition allows for easy implementation of any deployment strategy.


    As we have shown here, the Ray microservice framework is a very solid foundation
    for model serving that satisfies all of the main requirements for model serving.


    The last thing that you are going to learn in this chapter is the implementation
    of one of the advanced model serving techniques - speculative model serving -
    using the Ray microservices framework.


    # Implementing Speculative Model serving using Ray microservice framework


    Speculative model serving is an application of speculative execution - an optimization
    technique where a computer system performs some task that may not be needed. In
    a nutshell, speculative execution is about performing some task that may not be
    needed. The work is done before knowing whether it is actually required. This
    allows getting results upfront, so if they'
  merge: -1
  pgno: 137
- img_proc: true
  md: "are actually needed they will be available with no delay. Speculative execution\
    \ is important in model serving because it provides the following features for\
    \ machine-serving applications:\n\n+   - Guaranteed execution time. Assuming that\
    \ you have several models, with the fastest providing fixed execution time, it\
    \ is possible to provide a model serving implementation with a fixed upper limit\
    \ on execution time, as long as that time is larger than the execution time of\
    \ the simplest model.\n- Consensus-based model serving. Assuming that you have\
    \ several models, you can implement model serving where prediction is the one\
    \ returned by the majority of the models.\n- Quality-based model serving. Assuming\
    \ that you have a metric allowing you to evaluate the quality of model serving\
    \ results, this approach allows you to pick the result with the best quality.\n\
    \nHere you will learn how to implement a consensus-based model serving using Ray’s\
    \ microservice framework.\n\nYou have learned earlier in this chapter how to implement\
    \ red wine quality scoring using three different models: random forest, gradient\
    \ boost, and XGBoost. Now let’s try to produce an implementation that returns\
    \ the result on which at least 2 models agree. The basic implementation looks\
    \ as follows (Example 7-15).\n\n# Example 7-15. Consensus-based model serving\n\
    \n```\n@serve.deployment(route_prefix=\"/speculative\")\nclass Speculative:\n\
    \    def __init__(self):\n        self.rfhandle = RandomForestModel.get_handle(sync=False)\n\
    \        self.xgboosthandle = XGBoostModel.get_handle(sync=False)\n        self.grboosthandle\
    \ = GRBoostModel.get_handle(sync=False)\n    async def __call__(self, request):\n\
    \        payload = await request.json()\n        f1, f2, f3 = await asyncio.gather(self.rfhandle.serve.remote(payload),\n\
    \                                         self.xgboosthandle.serve.remote(payload),\n\
    \                                         self.grboosthandle.serve.remote(payload))\n\
    \        rfresurlt = ray.get(f1)['result']\n```"
  merge: -1
  pgno: 138
- img_proc: true
  md: "```\nxgresult = ray.get(f2)['result']\ngrresult = ray.get(f3)['result']\nones\
    \ = []\nzeros = []\nif rfresult == \"1\":\n    ones.append(\"Random forest\")\n\
    else:\n    zeros.append(\"Random forest\")\nif xgresult == \"1\":\n    ones.append(\"\
    XGBoost\")\nelse:\n    zeros.append(\"XGBoost\")\nif grresult == \"1\":\n    ones.append(\"\
    Gradient boost\")\nelse:\n    zeros.append(\"Gradient boost\")\nif len(ones) >=\
    \ 2:\n    return {\"result\": \"1\", \"methods\": ones}\nelse:\n    return {\"\
    result\": \"0\", \"methods\": zeros}\n```\n\nThe constructor of this deployment\
    \ is creating handles for all of your deployments implementing individual models.\
    \ Note that here we are creating async handles that allow parallel execution of\
    \ each deployment.\n\nThe `__call__` method gets the payload and starts execution\
    \ of all three models in parallel and then waits for all of them to complete (see\
    \ this great article on using `asyncio` for the execution of many coroutines and\
    \ running them concurrently). Once you have all the results, you implement the\
    \ consensus calculations and return the result (along with methods that voted\
    \ for it) back.¹\n\n# Conclusion\n\nIn this chapter, you have learned Ray’s implementation\
    \ of the microservice framework and how this framework can be used by model serving.\
    \ We started by describing a basic microservices deployment and extensions allowing\
    \ for better control, scale, and extending of the deployment’s execution. We then\
    \ showed an example of how this framework can be used to implement model serving,\
    \ analyzed typical model serving requirements,"
  merge: -1
  pgno: 139
- img_proc: true
  md: 'and showed how they can be satisfied by Ray. Finally, you have learned how
    to implement an advanced model serving example - consensus-based model serving,
    allowing to improve the quality of individual model serving methods. An interesting
    [blog post](https://example.com) shows how to bring together the basic building
    blocks described here into more complex implementations.


    In the next chapter, you will learn about workflows implementation in Ray and
    how to use them for automating your application execution.


    > 1 You can also implement different policies for waiting for the model’s execution.
    If you want, for example, use at least one model’s result you can use `asyncio.wait(tasks,
    return_when=asyncio.FIRST_COMPLETED)` or just wait for a given time interval `asyncio.wait(tasks,
    interval)`.'
  merge: -1
  pgno: 140
