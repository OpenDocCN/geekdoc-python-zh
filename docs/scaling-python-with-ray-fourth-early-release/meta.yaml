    \ of the futures have been completed. `ray.wait` returns two lists, one of the\
    \ object references for completed tasks (of the size requested, which defaults\
    \ to one) and another list of the rest of the object references.\n\n## Example\
    \ 3-3. Using ray wait\n\n```python\n# Process as results become available\ndef\
    \ as_available():\n    # Make the futures\n    futures = list(map(lambda x: remote_task.remote(x),\
    \ things))\n    # While we still have pending futures\n    while len(futures)\
    \ > 0:\n        ready_futures, rest_futures = ray.wait(futures)\n        print(f\"\
    Ready {len(ready_futures)} rest {len(rest_futures)}\")\n        for id in ready_futures:\n\
    \            print(f'completed value {id}, result {ray.get(id)}')\n          \
    \  time.sleep(1) # Business logic goes here\n        # We just need to wait on\
    \ the ones which are not yet available\n        futures = rest_futures\n```\n\n\
    Running these functions side by side with `timeit.time`, you can see the difference\
    \ in performance. It’s important to note that this performance improvement depends\
