    # Considerations for model serving implementations


    When it comes to model serving, there are a few specific requirements that are
    important in this case. A good definition of model serving specific requirements
    can be found here. :


    +   1. The implementation has to be flexible. It should allow for your training
    to be implementation-agnostic (i.e TensorFlow versus PyTorch, vs Scikit-Learn).
    For an inference service invocation, it should not matter if the underlying model
    was trained using PyTorch, Scikit-learn, or TensorFlow - the service interface
    should be shared so that the user’s API remains consistent.

    2. It is sometimes advantageous to be able to batch requests in a variety of settings
    in order to realize better throughput. The implementation should make it simple
    to support batching of model serving requests.

    3. The implementation should provide the ability to leverage hardware optimizers
    that match the needs of the algorithm. Sometimes in the evaluation phase, you
    would benefit from hardware optimizers like GPUs to infer the models.

    4. The implementation should be able to seamlessly include additional components
    of an inference graph. An inference graph could comprise'
  - '[PAGE 136]


