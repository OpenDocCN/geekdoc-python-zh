    rb\") as f:\n            self.model = pickle.load(f)\n\n    async def __call__(self,\
    \ request):\n        payload = await request.json()\n        return self.serve(payload)\n\
    \n    def serve(self, request):\n        input_vector = [\n            request[\"\
    fixed acidity\"],\n            request[\"volatile acidity\"],\n            request[\"\
    citric acid\"],\n            request[\"residual sugar\"],\n            request[\"\
    chlorides\"],\n            request[\"free sulfur dioxide\"],\n            request[\"\
    total sulfur dioxide\"],\n            request[\"density\"],\n            request[\"\
    pH\"],\n            request[\"sulphates\"],\n            request[\"alcohol\"],\n\
    \        ]\n        prediction = self.model.predict([input_vector])[0]\n     \
    \   return {\"result\": str(prediction)}\n```\n\nThis deployment has three methods:\n\
    \n+   - Constructor, which loads a model and stores it locally. Note that here\
    \ we are using model location as a parameter so that we can redeploy this deployment\
    \ when a model changes\n- __call__ method invoked by HTTP requests. This method\
    \ retrieves the features (as a dictionary) and invokes the serve method for the\
    \ actual processing. By defining it as async, it can process multiple requests\
    \ simultaneously.\n- Serve method that can be used to invoke deployment via a\
    \ handle. It converts the incoming dictionary into a vector and calls the underlying\
    \ model for inference."
