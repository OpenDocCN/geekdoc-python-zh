- md: "## TIP\nKafka messages are byte-arrays, so we need to serialize our messages\
    \ (called marshaling in Kafka) using, for example, Apache Avro, Google Protocol\
    \ buffers, JSON or Python pickling. The Python Kafka Github provides a handful\
    \ of examples of using different encoding with Kafka. To make code examples simpler\
    \ we will be using JSON throughout, but make sure that you pick up an appropriate\
    \ marshaling for your implementation. When deciding on the format you need to\
    \ consider its performance (remember we marshall/unmarshall every message), size\
    \ (smaller messages are written/read faster), message extensibility (implementation\
    \ behavior when a message is changed like field added or removed), and language\
    \ interoperability. A good overview of different marshaling methods is presented\
    \ here.\n\nUnlike other messaging systems, Kafka does not guarantee non-duplicate\
    \ messages. Instead, each Kafka consumer is responsible for ensuring messages\
    \ are only processed once.\n\n## NOTE\nIf you are interested in learning more,\
    \ the Confluent Kafka Python Client documentation has more information on different\
    \ commit options and their implications on delivery guarantees. By default, the\
    \ Python client uses automatic commit, which is what we use in our examples. For\
    \ real-life implementation, consider delivery guarantees (“exactly once”, “at\
    \ least once”, etc.) that you need to provide and use an appropriate commit approach.\n\
    \n## Using Kafka with Ray\n\nNow that you know about Kafka and its basic APIs,\
    \ let’s take a look at options for integrating Kafka with Ray. We will implement\
    \ both the Kafka consumer and producer as Ray actors.⁷ There are several reasons\
    \ you can benefit from using Ray actors with Kafka including:\n\n- Kafka consumers\
    \ run in an infinite loop waiting for new records to arrive and need to keep track\
    \ of messages consumed. Being a stateful service, Ray Actor provides an ideal\
    \ paradigm for implementing a Kafka consumer.\n- By putting your Kafka producer\
    \ in an actor, you can write records to any Kafka topic asynchronously without\
    \ having to create separate producers.\n\nA simple implementation of Kafka Producer\
    \ Actor looks like Example 6-1.\n\n### Example 6-1. Kafka producer actor\n\n```python\n\
    @ray.remote\nclass KafkaProducer:\n    def __init__(self, broker: str = 'localhost:9092'):\n\
    \        from confluent_kafka import Producer\n        conf = {'bootstrap.servers':\
    \ broker}\n        self.producer = Producer(**conf)\n\n    def produce(self, data:\
    \ dict, key: str = None, topic: str = 'test'):\n        def delivery_callback(err,\
    \ msg):\n            if err:\n                print('Message failed delivery:\
    \ ', err)\n            else:\n                print(f'Message delivered to topic\
    \ {msg.topic()} partition {msg.partition()} offset {msg.offset()}')\n\n      \
    \  binary_key = None\n        if key is not None:\n            binary_key = key.encode('UTF8')\n\
    \        self.producer.produce(topic=topic, value=json.dumps(data).encode('UTF8'),\
    \ key=binary_key, callback=delivery_callback)\n        self.producer.poll(0)\n\
    \n    def destroy(self):\n        self.producer.flush(30)\n```\n\nThe actor implementation\
    \ in this listing includes the following methods:\n\n- The constructor, which\
    \ initializes the Kafka producer based on the location of the Kafka cluster.\n\
    - The method you will call to send data is produce, which takes data to write\
    \ to Kafka (as a Python dictionary), an optional key (as a string), and the Kafka\
    \ topic to write to. Here we chose to use a dictionary for the data as it is a\
    \ fairly generic way to represent data and can be easily marshaled/unmarshaled\
    \ to JSON. For debugging, we added an internal *delivery_callback* method that\
    \ prints out when a message is written or an error has occurred.\n- A destroy\
    \ method that Ray calls before exiting the application. Our destroy method waits\
    \ for up to 30 seconds for any outstanding messages to be delivered and for delivery\
    \ report callbacks to be triggered.\n\nA simple implementation of Kafka consumer\
    \ actor looks like Example 6-2.\n\n### Example 6-2. Kafka consumer actor\n\n```python\n\
    @ray.remote\nclass KafkaConsumer:\n    def __init__(self, callback, group: str\
    \ = 'ray', broker: str = 'localhost:9092', topic: str = 'test', restart: str =\
    \ 'latest'):\n        from confluent_kafka import Consumer\n        from uuid\
    \ import uuid4\n        # Configuration\n        consumer_conf = {'bootstrap.servers':\
    \ broker,    # bootstrap server\n                         'group.id': group, \
    \            # group ID\n                         'session.timeout.ms': 6000,\
    \   # session timeout\n                         'auto.offset.reset': restart}\
    \  # restart\n\n        # Create Consumer instance\n        self.consumer = Consumer(consumer_conf)\n\
    \        self.topic = topic\n        self.id = str(uuid4())\n        self.callback\
    \ = callback\n\n    def start(self):\n        self.run = True\n        def print_assignment(consumer,\
    \ partitions):\n            print(f'Consumer {self.id}')\n            print(f'Assignment:\
    \ {partitions}')\n\n        # Subscribe to topics\n        self.consumer.subscribe([self.topic],\
    \ on_assign=print_assignment)\n        while self.run:\n            msg = self.consumer.poll(timeout=1.0)\n\
    \            if msg is None:\n                continue\n            if msg.error():\n\
    \                print(f\"Consumer error: {msg.error()}\")\n            else:\n\
    \                # Proper message\n                self.callback(self.id, msg)\n\
    \n    def stop(self):\n        self.run = False\n\n    def destroy(self):\n  \
    \      self.consumer.close()\n```\n\nThe consumer actor in this listing has the\
    \ following methods:\n\n- A constructor that initializes the Kafka consumer. Here\
    \ we have some more parameters compared to a producer. In addition to the broker\
    \ location, you need to specify:\n    - the topic name\n    - the consumer group\
    \ name (for parallel runs)\n    - restart, which configures how the client behaves\
    \ when starting with no offset or if the current offset does not exist anymore\
    \ on the server⁸\n    - callback which is a pointer to the customer’s function\
    \ that is used to process a message.\n- A start method that runs an infinite loop\
    \ polling for records. In our example, new records are just printed. For debugging,\
