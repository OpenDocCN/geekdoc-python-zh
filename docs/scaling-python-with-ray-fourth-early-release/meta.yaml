    \n基于键的方法是许多现实世界实现的一个不错的选择。这种方法的优点是所有数据处理都在本地完成——在同一个 Kafka 消费者 Actor 内部。\n\n这种实现有两个潜在的陷阱：\n\
    \n-   随着键数量的增长，有必要确保键在 Kafka 主题分区之间均匀分布。确保这种键分布有时可能需要额外的键设计过程，但默认的哈希通常就足够了。\n\
    -   当执行是 CPU 和内存密集型时，执行局部性可能成为一个问题。因为所有执行都是 Kafka 消费者 Actor 的一部分，其扩展性可能不足以跟上高流量。\n\
    \n其中一些缺点可以在与键无关的方法中得到纠正。\n\n## 与键无关的方法\n\n这种方法与前一种方法的区别在于，温度控制器（示例 6-8）和温度控制器管理器（示例\
    \ 6-9）都从 Python 对象转换为 Ray Actor。通过这样做，两者都变得可独立寻址，并且可以位于任何地方。¹⁴ 这种方法失去了执行局部性（这可能导致执行时间略有增加），但可以提高解决方案的整体可扩展性（每个\
    \ Actor 可以在单独的节点上运行）。如果需要，你可以通过利用 Actor 池（在第 4 章中描述）来进一步提高可扩展性，从而允许 Ray 将执行分配到更多节点。\n\
    \n## 超越 Kafka\n\n在本章中，你学习了如何使用 Ray 的原生功能，通过直接将 Ray 与 Kafka 集成来实现流处理。如果你需要使用不同的消息传递基础设施怎么办？如果你喜欢的通信骨干网提供\
    \ Python API，你可以将其与 Ray 集成，类似于上面描述的 Kafka 集成。\n\n另一个选择，正如本章开头提到的，是使用外部库，例如 Rayvens\
    \ 项目，它内部利用 Apache Camel（一个通用集成框架）来支持使用广泛的消息传递骨干网。你可以在此处找到支持的消息传递骨干网的描述及其使用示例。\n\
    \n与上面描述的 Kafka 集成类似，在底层，Rayvens 被实现为一组 Ray Actor。Rayvens 基类 Stream 是一个无状态、可序列化的\
    \ Stream Ray Actor 类的包装器，该类负责跟踪当前的 Rayvens 状态（有关使用 Actor 管理全局变量，请参见第 4 章），包括当前定义的源和汇及其连接性。Stream\
    \ 类隐藏了 Stream Actor 的远程性质，并实现了包装器，这些包装器在内部实现了与底层远程 Actor 的所有通信。如果你想获得更多控制权（在执行时间方面），可以直接在\
    \ Stream Actor 上调用方法。当原始 Stream 句柄超出作用域时，Stream Actor 将被回收。\n\n由于 Rayvens 基于 Camel，因此需要设置\
    \ Camel 才能使其工作。Rayvens 支持两种主要的 Camel 使用选项：\n\n-   本地模式：在此模式下，Camel 源或汇与附加到它的 Stream\
    \ Actor 在相同的执行上下文中运行：相同的容器、相同的虚拟机或物理机。\n-   操作员模式：在这种情况下，Camel 源或汇在 Kubernetes\
    \ 集群内运行，依赖 Camel 操作员来管理专用的 Camel Pod。\n\n## 结论\n\n在本章中，你学习了使用 Ray 实现流处理的一种选择。你首先学习了\
    \ Kafka 的基础知识——当今最流行的流应用程序骨干网——以及将其与 Ray 集成的一些不同方式。然后你学习了如何使用 Ray 扩展基于 Kafka 的应用程序。我们还概述了使用\
    \ Ray 实现无状态和有状态流应用程序的方法，你可以将其作为自定义实现的基础。\n\n最后，我们简要讨论了使用 Kafka 作为传输的替代方案，包括 Rayvens——一个基于\
    \ Apache Camel 的通用集成框架，可用于集成各种流骨干网。你可以使用此讨论来决定如何实现你的特定传输。\n\n在下一章中，我们将介绍 Ray 的微服务框架实现及其在模型服务实现中的使用。\n\
    \n1 我们使用过载的术语实时来表示在某个延迟约束内处理到达的数据。\n\n2 分布式日志实现的其他示例包括 Apache Bookkeeper、Apache\
    \ Pulsar 和 Pravega。\n\n3 键和值都是可选的，可以使用空值来为现有值设置墓碑。"
