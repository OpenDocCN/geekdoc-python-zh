    > # WARNING


    There are some “non-recoverable” errors that exist in Ray, which you can not (at
    present) configure away. If the head node, global control store, or the connection
    between your application and the head node fails, your application will fail and
    not be able to be recovered by Ray. If you require fault tolerance for these situations,
    you will have to roll your own high availability, likely using Zookeeper or similar
    lower-level tools.


    The system layer consists of three major components: a global control store, a
    distributed scheduler, and a distributed object-store. Except for the global control
    store, all components are horizontally scalable and fault-tolerant.


