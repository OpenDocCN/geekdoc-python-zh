    \ We cover fault tolerance more in [Link to Come].\n\n## Composition of Remote\
    \ Ray Functions\n\nYou can make your remote functions even more powerful by composing\
    \ them. The two most common methods of composition with remote functions in Ray\
    \ are pipelining and nested parallelism. You can compose your functions with nested\
    \ parallelism to express recursive functions. Ray also allows you to express sequential\
    \ dependencies without having to block/collect the result in the driver, known\
