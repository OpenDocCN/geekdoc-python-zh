    \ is written to. This means that Kafka guarantees that all of the messages with\
    \ the same key are always picked up by the same consumer. In this case, it is\
    \ possible to implement stateful stream processing locally on the Kafka consumer\
    \ that receives them. Because the consumer is implemented as a Ray Actor, Ray\
    \ keeps track of the data inside the actor.¹⁰\n\nFor this implementation, we created\
    \ a small heater simulator program that you can find in the [accompanying Github\
    \ project](https://github.com)¹¹ that publishes and gets data based on the heater\
    \ ID.¹² With this in place you can implement the temperature controller as follows\
