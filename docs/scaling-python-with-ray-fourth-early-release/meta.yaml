    \nYou often need some form of distributed or parallel computing when building\
    \ modern applications at scale. Many Python developers’ introduction to parallel\
    \ computing is through the multiprocessing module. Multiprocessing is limited\
    \ in its ability to handle the requirements of modern applications. These requirements\
    \ include the following:\n\n- Running the same code on multiple cores or machines\n\
    - Tooling to handle machine and processing failures\n- Efficiently handling large\
    \ parameters\n- Easily passing information between processes\n\nUnlike multiprocessing,\
    \ Ray’s remote functions satisfy the above requirements. It’s important to note\
    \ that “remote” doesn’t necessarily refer to a separate computer despite its name.\
    \ When you create a remote function, Ray takes over distributing calls to that\
    \ function instead of running in the same process. When calling remote functions,\
    \ you are effectively running asynchronously¹ on multiple cores or different machines,\
    \ without having to concern yourself with how or where.\n\nIn this chapter, you\
    \ will learn how to create remote functions, wait for their completion, and fetch\
    \ results. Once you’ve got the basics down, you will learn to compose remote functions\
    \ together to create more complex operations. Before you go too far, let’s start\
    \ with understanding some of what we glossed over in the previous chapter.\n\n\
    ### Understanding Essentials of Ray Remote Functions\n\nIn the previous chapter,\
    \ you learned how to create a basic Ray remote function (Example 2-7).\n\nWhen\
    \ you call a remote function, it immediately returns an ObjectRef (a future),\
    \ which is a reference to a remote object. Ray creates and executes a task itself\
    \ in the background on a separate worker process and writes the result when finished\
    \ into the original reference. You can then call `ray.get` on the ObjectRef to\
    \ obtain the value. Note that `ray.get` is a blocking method waiting for task\
    \ execution completion before returning the result.\n\n> **REMOTE OBJECTS IN RAY**\n\
    >\n> A remote object is just an object, which may be on another node. ObjectRef’s\
    \ are like pointers or IDs to objects that you can use to get the value from or\
    \ status of the remote function. In addition to being created from remote function\
    \ calls, you can also create ObjectRefs explicitly by using the `ray.put` function.\n\
    \nWe’ll further explore remote objects and their fault tolerance in “Ray Objects”.\n\
    \nSome details in Example 2-7 from the previous chapter are worth understanding.\
    \ The example converts the iterator from a `iterator` to a `list` before passing\
    \ it to `ray.get`. You need to do this when calling `ray.get` takes in a list\
    \ of futures or an individual future.² `ray.get` waits until it has all of the\
    \ objects so that it can return the list in order.\n\n> **TIP**\n>\n> As with\
    \ regular ray remote functions, it’s important to think about the amount of work\
    \ done inside each remote invocation. For example, using `ray.remote` to compute\
    \ factorials recursively will be slower than doing it locally since the work inside\
    \ each function is small even though the overall work can be large. The exact\
    \ amount depends on how busy your cluster is, but as a general rule anything that\
    \ is executed in under a few seconds without any special resources is not worth\
    \ scheduling remotely.\n\n### REMOTE FUNCTIONS LIFECYCLE\n\nThe invoking Ray process,\
    \ called the owner, of a remote function schedules the execution of a submitted\
    \ task and facilitates the resolution of the returned `ObjectRef` to its underlying\
    \ value if needed.\n\nOn task submission, the owner waits for all dependencies,\
    \ i.e., `ObjectRefs` that were passed as an argument to the task, to become available\
    \ before scheduling. The dependencies can be local or remote, and the owner considers\
    \ the dependencies to be ready as soon as they are available anywhere in the cluster.\
    \ When the dependencies are ready, the owner requests resources from the distributed\
    \ scheduler to execute the task. Once resources are available, the scheduler grants\
    \ the request and responds with the address of a worker that will execute the\
    \ function.\n\nAt this point the owner sends the task specification over gRPC\
    \ to the worker. After executing the task, the worker stores the return values.\
    \ If the return values are small,^3 the worker returns the values inline directly\
    \ to the owner, which copies them to its in-process object store. If the return\
    \ values are large, the worker stores the objects in its local shared memory store\
    \ and replies to the owner indicating that the objects are now in distributed\
    \ memory. This allows the owner to refer to the objects without having to fetch\
    \ the objects to its local node.\n\nWhen a task is submitted with an `ObjectRef`\
    \ as its argument, the worker must resolve its value before it can start executing\
    \ the task.\n\nTasks can end in an error. Ray distinguishes between two types\
    \ of task errors:\n\n*Application-level*\n\nThis is any scenario where the worker\
    \ process is alive, but the task ends in an error. For example, a task that throws\
    \ an `IndexError` in Python.\n\n*System-level*\n\nThis is any scenario where the\
    \ worker process dies unexpectedly. For example, a process that segfaults, or\
    \ if the worker’s local raylet dies.\n\nTasks that fail due to application-level\
    \ errors are never retried. The exception is caught and stored as the return value\
    \ of the task. Tasks that fail due to system-level errors may be automatically\
    \ retried up to a specified number of attempts. This is covered in more detail\
    \ in “Fault Tolerance”.\n\nIn our examples so far, using `ray.get` was fine because\
    \ the futures all had the same execution time. If the execution times are different,\
    \ such as training, a model on different-sized batches of data, and you don’t\
    \ need all of the results at the same time, this can be quite wasteful. Instead\
    \ of directly calling `ray.get`, you should use `ray.wait`, which returns the\
    \ requested number of futures that have already been completed. To see the performance\
    \ difference, you will need to modify your remote function to have a variable\
    \ sleep time, as in Example 3-1.\n\n### Example 3-1. Remote function with different\
    \ execution times\n\n```python\n@ray.remote\ndef remote_task(x):\n    time.sleep(x)\n\
    \    return x\n```\n\nAs you may recall, the example remote function sleeps based\
    \ on the input argument. Since the range is ascending in order, calling the remote\
    \ function on it will result in futures that are complete in order. To ensure\
    \ that the futures won’t complete in order you will need to modify the list, one\
    \ way you can do this is by calling `things.sort(reverse=True)` prior to mapping\
    \ your remote function over things.\n\nTo see the difference between using `ray.get`\
    \ and `ray.wait`, you can write a function that collects the values from your\
    \ futures with some time delay on each object to simulate business logic."
