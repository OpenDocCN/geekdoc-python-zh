    \ the state.\n\n> ### NOTE\n\nMuch like Ray’s “remote” functions, all Ray Actors\
    \ are “remote” actors, even when running on the same machine.\n\nIn a nutshell,\
    \ an actor is a computer process with an address (handle). This means that it\
    \ can also store things in memory - private to that process. Before delving into\
    \ the details of how to implement and scale Ray actors, let’s first take a look\
    \ at the concepts behind them. Actors come from the actor model design pattern.\
    \ Understanding the actor model is key to effectively managing the state and concurrency.\n\
    \n## Understanding the Actor model\n\nThe actor model is a conceptual model to\
    \ deal with concurrent computation and was introduced by Carl Hewitt in 1973.\
    \ The heart of this model is an actor - a universal primitive of concurrent computation\
    \ with its state.\n\nAn actor has a simple job:\n\n- Store data\n- Receive messages\
    \ from other actors\n- Pass messages to other actors\n- Create additional child\
    \ actors\n\nThe data that an actor store is hidden from outside an actor and can\
    \ be accessed/modified only by the actor itself. To change the actor’s state it\
    \ is necessary to send messages to the actor that will modify the state. (Compare\
    \ this to using method calls in object-oriented programming.) To ensure an actor’s\
    \ state consistency, actors process one request at a time. This means that all\
    \ actor method invocations are globally serialized for a given actor. To improve\
    \ the throughput, people often create a pool of actors (assuming they can shard\
    \ or replicate the actor’s state).\n\nThe actor model is a good fit for many distributed\
    \ systems scenarios. Here are some typical use cases where usage of the Actor\
    \ model can be advantageous:\n\n- You need to deal with a large distributed state\
    \ that is hard to synchronize between invocations.\n- You want to work with single-threaded\
    \ objects that do not require significant interaction from external components.\n\
    \nIn both of these situations, you would implement the standalone parts of the\
    \ work inside of an actor. You can put each piece of independent state inside\
    \ of its own actor, and then any changes to the state come in through the actor.\
    \ Most actor system implementations avoid concurrency issues by only using single-threaded\
    \ actors.\n\nNow that you know the general principles of the actor model, let’s\
    \ take a closer look at Ray’s remote actors.\n\n## Basic Ray Remote Actor\n\n\
    Ray implements remote actors as a stateful worker. When you create a new remote\
    \ actor, Ray creates a new worker and schedules the actor’s methods on that worker.\n\
    \nA common example of an actor is a bank account. Let’s take a look at how you\
    \ can implement an account using Ray remote actor. The creation of a Ray remote\
    \ actor is as simple as decorating a Python class with the `@ray.remote` decorator\
    \ (Example 4-1).\n\nExample 4-1. Implementing Ray remote actor\n\n```python\n\
    @ray.remote\nclass Account:\n    def __init__(self, balance: float, minimal_balance:\
    \ float):\n        if balance < minimal_balance:\n            raise Exception(\"\
    Starting balance is less than minimal balance\")\n        self.balance = balance\n\
    \        self.minimal = minimal_balance\n\n    def balance(self) -> float:\n \
    \       return self.balance\n\n    def deposit(self, amount: float) -> float:\n\
    \        if amount < 0:\n            raise Exception(\"Can not deposit negative\
    \ amount\")\n        self.balance = self.balance + amount\n        return self.balance\n\
    \n    def withdraw(self, amount: float) -> float:\n        if amount < 0:\n  \
    \          raise Exception(\"Can not withdraw negative amount\")\n\n        balance\
    \ = self.balance - amount\n        if balance < self.minimal:\n            raise\
    \ Exception(\"Withdraw is not supported by current balance\")\n        self.balance\
