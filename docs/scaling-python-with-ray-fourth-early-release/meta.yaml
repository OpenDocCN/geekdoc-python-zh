    (pid=29041) key 1234 value {''measurement'': 45.833333333333265}

    (pid=29041) New message: topic= sensor partition= 9 offset= 30

    (pid=29041) key 1234 value {''measurement'': 45.749999999999993}

    ```


    This listing shows the behavior of the controller when the temperature is around
    the desired value (45 degrees). As expected the temperature keeps growing until
    it gets above 46 degrees (temperature intervals where controls are ignored is
    1 degree). When the measurement is 46.16666666666661 the new message is sent to
    the heater to switch off and the temperature starts to decrease. Also looking
    at this listing we can see that the requests are always delivered to the same
    partition (they have the same key).


    A key-based approach is a good option for many real world implementations. The
    advantage of this approach is that all of the data processing is done locally
    - inside the same Kafka consumer actor.


    There are two potential pitfalls of such implementations:


    +   - As the number of keys grows it is necessary to ensure that the keys are
    evenly distributed across Kafka topic partitions. Ensuring this key distribution
    can sometimes require additional key design procedures, but the default hashing
    is often sufficient.

    - Execution locality can become a problem when executions are CPU and memory expensive.
    Because all the executions are part of the Kafka consumer actor, its scaling can
    become insufficient for keeping up with high-volume traffic


    Some of these drawbacks can be rectified in a key independent approach.


    # Key independent approach'
  - '[PAGE 120]


    The difference of this approach compared to the previous one is that both the
    temperature controller (Example 6-8) and temperature controller manager (Example
    6-9) are converted from Python objects to Ray actors. By doing this both become
    individually addressable and can be located anywhere.¹⁴ Such an approach loses
    execution locality (which can lead to a slight execution time increase), but can
    improve overall scalability of the solution (each actor can run on a separate
    node). If necessary, you can improve scalability even further by leveraging an
    actor’s pool (described in chapter 4) and thus allowing Ray to split execution
    to even more nodes.


    # Going beyond Kafka


    In this chapter you have learned how to use Ray’s native capabilities to implement
    streaming by directly integrating Ray with Kafka. What if you need to use a different
    messaging infrastructure? If your favorite communication backbone provides Python
    APIs, you can integrate it with Ray, similar to the Kafka integration described
    above.


    Another option, as mentioned in the beginning of this chapter, is to use an external
    library, for example, project Rayvens, which internally leverages Apache Camel
    (a generic integration framework) to make it possible to use a wide range of messaging
    backbones. You can find a description of the supported messaging backbones and
    an example of their usage here.


    Similar to the Kafka integration described above, under the hood, Rayvens is implemented
    as a set of Ray actors. The Rayvens base class Stream is a stateless, serializable,
    wrapper around the Stream Ray actor class which is responsible for keeping track
    of the current Rayvens state (see chapter 4 for using actors to manage global
    variables), including currently defined sources and sinks and their connectivity.
    Stream class hides the remote nature of a Stream actor and implement wrappers
    that are internally implementing all communications with the underlying remote
    actor. If you want more control (in terms of execution timing), it is possible
    to invoke methods directly on the stream actor. The stream actor will be reclaimed
    when the original stream handle goes out of scope.'
  - '[PAGE 121]


    As Rayvens is based on Camel, it requires a setting of Camel to make it work.
    Ravens supports two main options of Camel usage:


    +   - Local mode: in this mode Camel source or sink run in the same execution
    context as the stream actor which is attached to using the Camel client: same
    container, same virtual or physical machine.

    - Operator mode: in this case Camel source or sink run inside a Kubernetes cluster
    relying on the Camel operator to manage dedicated Camel pods.


    # Conclusion


    In this chapter, you have learned one option to use Ray for implementing streaming.
    You first learned the basics of Kafka - the most popular streaming application
    backbone used today - and some different ways to integrate it with Ray. You then
    learned how to scale Kafka-based applications with Ray. We have also outlined
    implementation approaches for both stateless and stateful streaming applications
    with Ray that you can use as a foundation for your custom implementations.


    Finally, we briefly discussed alternatives to using Kafka as transport, including
    Rayvens - a general-purpose integration framework based on Apache Camel, that
    can be used for integration of a wide variety of streaming backbones. You can
    use this discussion to decide how to implement your specific transports.


    In the next chapter, we will introduce Ray’s microservices framework implementation
    and its usage for model serving implementation.


    1 We use the overloaded term real-time to mean processing the data as it arrives
    within some latency constraints


    2 Other examples of distributed Log implementation are Apache Bookkeeper, Apache
    Pulsar, and Pravega.


    3 Both key and value are optional, an empty value can be used to tombstone an
    existing value.'
- md: "## Chapter 7. Implementing Microservices\n\n> **A NOTE FOR EARLY RELEASE READERS**\n\
    \nWith Early Release ebooks, you get books in their earliest form—the author’s\
    \ raw and unedited content as they write—so you can take advantage of these technologies\
    \ long before the official release of these titles.\n\nThis will be the seventh\
    \ chapter of the final book. Please note that the GitHub repo will be made active\
    \ later on.\n\nIf you have comments about how we might improve the content and/or\
    \ examples in this book, or if you notice missing material within this chapter,\
    \ please reach out to the editor at vwilson@oreilly.com.\n\nInitially, Ray was\
    \ created as a framework for implementing [Reinforcement Learning](https://www.oreilly.com/library/view/reinforcement-learning-for/9781098107611/)\
    \ but gradually morphed into a full-fledged serverless platform. Similarly, initially\
    \ introduced as a [better way to serve ML models](https://www.oreilly.com/library/view/designing-machine-learning/9781098107956/),\
    \ [Ray Serve](https://docs.ray.io/en/latest/serve/index.html) has recently evolved\
    \ into a full-fledged microservices framework. In this chapter, you will learn\
    \ how you can use Ray Serve for implementing a general-purpose microservice framework\
    \ and how to use this framework for model serving.\n\nComplete code of all examples\
    \ used in this chapter can be found on [Github](https://github.com/ray-project/ray/tree/master/python/ray/serve).\n\
    \n## Microservice architecture in Ray\n\nRay microservice architecture (Ray Serve)\
    \ is implemented on top of Ray by leveraging [Ray actors](https://docs.ray.io/en/latest/ray-core/actors.html).\
    \ There are three kinds of actors that are created to make up a Serve instance:\n\
    \n- **Controller:** A global actor unique to each Serve instance that manages\
    \ the control plane. It is responsible for creating, updating, and destroying\
    \ other actors. Serve API calls like creating or getting a deployment make remote\
    \ calls to the Controller.\n- **Router:** There is one router per node. Each router\
    \ is a Uvicorn HTTP server that accepts incoming requests, forwards them to replicas,\
    \ and responds once they are completed.\n- **Worker Replica:** Worker replicas\
    \ execute the user-defined code in response to a request. Each replica processes\
    \ individual requests from the routers.\n\nA user-defined code is implemented\
    \ using a Ray deployment - an extension of a Ray Actor with additional features.\n\
    \nWe will start by examining the deployment itself.\n\n## Deployment\n\nThe central\
    \ concept in Ray Serve is deployment, defining business logic that will handle\
    \ incoming requests and the way this logic is exposed over HTTP or in Python.\
    \ Let’s start with a very simple deployment implementing a temperature controller\
    \ (Example 7-1).\n\n*Example 7-1. Temperature controller deployment*\n\n```\n\
    @serve.deployment\nclass Converter:\n    def __call__(self, request):\n      \
    \  if request.query_params[\"type\"] == 'CF' :\n            return {\"Fahrenheit\
    \ temperature\":\n                    9.0/5.0 * float(request.query_params[\"\
    temp\"]) + 32.0}\n        elif request.query_params[\"type\"] == 'FC' :\n    \
    \        return {\"Celsius temperature\":\n                    (float(request.query_params[\"\
    temp\"]) - 32.0) * 5.0/9.0 }\n        else:\n            return {\"Unknown conversion\
    \ code\" : request.query_params[\"type\"]}\n```\n\nThe implementation is decorated\
    \ by a `@serve.deployment` annotation, which tells Ray that this is a deployment.\
    \ This deployment implements a single method: `__call__`. This method has a special\
    \ meaning in deployment - it is invoked via HTTP (see below). It is a class method\
    \ taking a Starlette Request, which provides a convenient interface for the incoming\
    \ HTTP request. In the case of temperature controller, the request contains two\
    \ parameters - temperature itself and conversion type.\n\nOnce the deployment\
    \ is defined, you need to deploy it using the following code `Converter.deploy()`,\
    \ similar to `.remote()` when deploying an actor.\n\nOnce deployed, you can immediately\
    \ access it via an HTTP interface (Example 7-2).\n\n### Example 7-2. Accessing\
    \ Converter over HTTP\n\n```\nprint(requests.get(\"http://127.0.0.1:8000/Converter?temp=100.0&type=CF\"\
    ).text)\nprint(requests.get(\"http://127.0.0.1:8000/Converter?temp=100.0&type=FC\"\
    ).text)\nprint(requests.get(\"http://127.0.0.1:8000/Converter?temp=100.0&type=CC\"\
    ).text)\n```\n\nNote here that we are using URL parameters (query strings) to\
    \ specify parameters. Also because the services are exposed externally via HTTP\
    \ the requester can run anywhere, including code that is running outside of Ray.\n\
    \nThe results of this invocation are presented below (Example 7-3).\n\n### Example\
    \ 7-3. Results of HTTP invocations of deployment\n\n```\n{\n    \"Fahrenheit temperature\"\
    : 212.0\n}\n{\n    \"Celsius temperature\": 37.77777777777778\n}\n{\n    \"Unknown\
    \ conversion code\": \"CC\"\n}\n```\n\nIn addition to being able to invoke a deployment\
    \ over HTTP, you can also invoke it directly using Python. In order to do this,\
    \ you need to get a handle to the deployment and then use it for invocation (Example\
    \ 7-4).\n\n### Example 7-4. Invoking a deployment via a handle\n\n```\nhandle\
    \ = Converter.get_handle()\nprint(ray.get(handle.remote(Request({\"type\": \"\
    http\", \"query_string\":\nb\"temp=100.0&type=CF\"}))))\nprint(ray.get(handle.remote(Request({\"\
    type\": \"http\", \"query_string\":\nb\"temp=100.0&type=FC\"}))))\nprint(ray.get(handle.remote(Request({\"\
    type\": \"http\", \"query_string\":\nb\"temp=100.0&type=CC\"}))))\n```\n\nNote\
    \ that in the code above we are manually creating starlette requests by specifying\
    \ the request type and a query string.\n\nOnce executed, this code returns the\
    \ same results as above (Example 7-3). This example is using the same method `__call__`\
    \ for both HTTP and Python requests. Although this works, the best practice is\
    \ to implement additional methods for Python invocation to avoid the usage of\
    \ Request objects in the Python invocation. In our example, we can extend our\
    \ initial deployment (Example 7-1) with additional methods for Python invocations\
    \ (Example 7-5).\n\n### Example 7-5. Implementing additional methods for Python\
    \ invocation\n\n```\n@serve.deployment\nclass Converter:\n    def __call__(self,\
    \ request):\n        if request.query_params[\"type\"] == 'CF' :\n           \
    \ return {\"Fahrenheit temperature\":\n                    9.0/5.0 * float(request.query_params[\"\
    temp\"]) + 32.0}\n        elif request.query_params[\"type\"] == 'FC' :\n    \
    \        return {\"Celsius temperature\":\n                    (float(request.query_params[\"\
    temp\"]) - 32.0) * 5.0/9.0 }\n        else:\n            return {\"Unknown conversion\
    \ code\" : request.query_params[\"type\"]}\n    def celsius_fahrenheit(self, temp):\n\
    \        return 9.0/5.0 * temp + 32.0\n\n    def fahrenheit_celsius(self, temp):\n\
    \        return (temp - 32.0) * 5.0/9.0\n```\n\n4 Although we tend to think about\
    \ infinite logs, in reality a Kafka log is limited to the amount of disk space\
    \ available to the corresponding Kafka server. As a result, Kafka introduces log\
    \ retention and cleanup policies, which prevent logs from growing indefinitely\
    \ and consequently crashing Kafka servers. As a result, when we are talking about\
    \ log replay in a production system, we are talking about replay within a retention\
    \ window.\n\n5 Refer to this nice presentation on Kafka capacity planning and\
    \ more. Kafka is also available as a serverless product from vendors such as Confluent\
    \ Cloud.\n\n6 For a simple example of using Python Kafka APIs see Github.\n\n\
    7 For another example of the same approach, see this blog post.\n\n8 Allowed values\
    \ for reset are *earliest* which automatically reset the offset to the beginning\
    \ of the log, and *latest* which automatically resets the offset to the latest\
    \ offset processed by the consumer group.\n\n9 This example is adapted from here.\n\
    \n10 As described in chapter 4, Ray’s actors are not persistent, and as a result\
    \ in the case of node failures, the actor state will be lost. We can implement\
    \ persistence here as described in Chapter 4 to overcome this.\n\n11 Note usage\
    \ of threading to ensure that Kafka consumer is running forever without interference\
    \ with measurement computations.\n\n12 Again, this is a simplification we made\
    \ for our toy example; in real implementations, every request to the temperature\
    \ controller should contain replyTo topic, thus ensuring that any replies will\
    \ get to the correct instance of the heater.\n\n13 You can find the complete code\
    \ for this implementation here.\n\n14 Complete code for this example can be found\
    \ here."
  mdcn: "## 第7章 实现微服务\n\n> **致早期读者的说明**\n\n通过早期发布电子书，您可以在书籍的最早期形式——作者撰写时的原始未编辑内容——中获取书籍，从而在这些书籍正式发布之前就能利用这些技术。\n\
    \n这将是最终书籍的第七章。请注意，GitHub仓库将在稍后激活。\n\n如果您对如何改进本书的内容和/或示例有意见，或者您在本章中发现缺失的材料，请通过\
    \ vwilson@oreilly.com 联系编辑。\n\n最初，Ray 是作为实现[强化学习](https://www.oreilly.com/library/view/reinforcement-learning-for/9781098107611/)的框架而创建的，但逐渐演变成一个成熟的无服务器平台。同样，[Ray\
    \ Serve](https://docs.ray.io/en/latest/serve/index.html) 最初是作为一种[服务机器学习模型的更好方式](https://www.oreilly.com/library/view/designing-machine-learning/9781098107956/)引入的，最近已发展成为一个成熟的微服务框架。在本章中，您将学习如何使用\
    \ Ray Serve 实现通用微服务框架，以及如何使用此框架进行模型服务。\n\n本章中使用的所有示例的完整代码可在 [Github](https://github.com/ray-project/ray/tree/master/python/ray/serve)\
    \ 上找到。\n\n## Ray 中的微服务架构\n\nRay 微服务架构（Ray Serve）是通过利用 [Ray actors](https://docs.ray.io/en/latest/ray-core/actors.html)\
    \ 在 Ray 之上实现的。有三种类型的 actor 被创建以构成一个 Serve 实例：\n\n- **控制器：** 每个 Serve 实例独有的全局 actor，管理控制平面。它负责创建、更新和销毁其他\
    \ actor。像创建或获取部署这样的 Serve API 调用会远程调用控制器。\n- **路由器：** 每个节点有一个路由器。每个路由器是一个 Uvicorn\
    \ HTTP 服务器，它接受传入的请求，将它们转发给副本，并在完成后进行响应。\n- **工作副本：** 工作副本执行用户定义的代码以响应请求。每个副本处理来自路由器的单个请求。\n\
    \n用户定义的代码使用 Ray 部署实现——这是 Ray Actor 的扩展，具有额外的功能。\n\n我们将从检查部署本身开始。\n\n## 部署\n\n\
    Ray Serve 中的核心概念是部署，它定义了处理传入请求的业务逻辑以及该逻辑通过 HTTP 或在 Python 中暴露的方式。让我们从一个非常简单的部署开始，实现一个温度控制器（示例\
    \ 7-1）。\n\n*示例 7-1. 温度控制器部署*\n\n```\n@serve.deployment\nclass Converter:\n   \
    \ def __call__(self, request):\n        if request.query_params[\"type\"] == 'CF'\
    \ :\n            return {\"Fahrenheit temperature\":\n                    9.0/5.0\
    \ * float(request.query_params[\"temp\"]) + 32.0}\n        elif request.query_params[\"\
    type\"] == 'FC' :\n            return {\"Celsius temperature\":\n            \
    \        (float(request.query_params[\"temp\"]) - 32.0) * 5.0/9.0 }\n        else:\n\
    \            return {\"Unknown conversion code\" : request.query_params[\"type\"\
    ]}\n```\n\n该实现由 `@serve.deployment` 注解装饰，它告诉 Ray 这是一个部署。此部署实现了一个方法：`__call__`。此方法在部署中具有特殊含义——它通过\
    \ HTTP 调用（见下文）。它是一个类方法，接受一个 Starlette Request，它为传入的 HTTP 请求提供了方便的接口。在温度控制器的情况下，请求包含两个参数——温度本身和转换类型。\n\
    \n一旦定义了部署，您需要使用以下代码 `Converter.deploy()` 来部署它，类似于部署 actor 时的 `.remote()`。\n\n\
    部署后，您可以立即通过 HTTP 接口访问它（示例 7-2）。\n\n### 示例 7-2. 通过 HTTP 访问 Converter\n\n```\nprint(requests.get(\"\
    http://127.0.0.1:8000/Converter?temp=100.0&type=CF\").text)\nprint(requests.get(\"\
    http://127.0.0.1:8000/Converter?temp=100.0&type=FC\").text)\nprint(requests.get(\"\
    http://127.0.0.1:8000/Converter?temp=100.0&type=CC\").text)\n```\n\n请注意，这里我们使用\
    \ URL 参数（查询字符串）来指定参数。同样，因为服务通过 HTTP 对外暴露，请求者可以在任何地方运行，包括在 Ray 之外运行的代码。\n\n此调用的结果如下所示（示例\
    \ 7-3）。\n\n### 示例 7-3. 部署的 HTTP 调用结果\n\n```\n{\n    \"Fahrenheit temperature\"\
    : 212.0\n}\n{\n    \"Celsius temperature\": 37.77777777777778\n}\n{\n    \"Unknown\
    \ conversion code\": \"CC\"\n}\n```\n\n除了可以通过 HTTP 调用部署外，您还可以直接使用 Python 调用它。为此，您需要获取部署的句柄，然后使用它进行调用（示例\
    \ 7-4）。\n\n### 示例 7-4. 通过句柄调用部署\n\n```\nhandle = Converter.get_handle()\nprint(ray.get(handle.remote(Request({\"\
    type\": \"http\", \"query_string\":\nb\"temp=100.0&type=CF\"}))))\nprint(ray.get(handle.remote(Request({\"\
    type\": \"http\", \"query_string\":\nb\"temp=100.0&type=FC\"}))))\nprint(ray.get(handle.remote(Request({\"\
    type\": \"http\", \"query_string\":\nb\"temp=100.0&type=CC\"}))))\n```\n\n请注意，在上面的代码中，我们通过指定请求类型和查询字符串手动创建\
    \ starlette 请求。\n\n执行后，此代码返回与上面相同的结果（示例 7-3）。此示例对 HTTP 和 Python 请求使用相同的方法 `__call__`。虽然这可行，但最佳实践是为\
    \ Python 调用实现额外的方法，以避免在 Python 调用中使用 Request 对象。在我们的示例中，我们可以用额外的 Python 调用方法扩展初始部署（示例\
    \ 7-1）（示例 7-5）。\n\n### 示例 7-5. 为 Python 调用实现额外的方法\n\n```\n@serve.deployment\n\
    class Converter:\n    def __call__(self, request):\n        if request.query_params[\"\
    type\"] == 'CF' :\n            return {\"Fahrenheit temperature\":\n         \
    \           9.0/5.0 * float(request.query_params[\"temp\"]) + 32.0}\n        elif\
    \ request.query_params[\"type\"] == 'FC' :\n            return {\"Celsius temperature\"\
    :\n                    (float(request.query_params[\"temp\"]) - 32.0) * 5.0/9.0\
    \ }\n        else:\n            return {\"Unknown conversion code\" : request.query_params[\"\
    type\"]}\n    def celsius_fahrenheit(self, temp):\n        return 9.0/5.0 * temp\
    \ + 32.0\n\n    def fahrenheit_celsius(self, temp):\n        return (temp - 32.0)\
    \ * 5.0/9.0\n```\n\n4 尽管我们倾向于考虑无限日志，但实际上 Kafka 日志受限于相应 Kafka 服务器可用的磁盘空间量。因此，Kafka\
    \ 引入了日志保留和清理策略，以防止日志无限增长并最终导致 Kafka 服务器崩溃。因此，当我们谈论生产系统中的日志重放时，我们指的是在保留窗口内的重放。\n\
    \n5 参考这个关于 Kafka 容量规划等方面的精彩演示。Kafka 也可以作为无服务器产品从 Confluent Cloud 等供应商处获得。\n\n\
