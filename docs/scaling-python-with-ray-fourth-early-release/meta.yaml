    \        futures = rest_futures\n```\n\n> **警告**\n>\n> 取消任务不应成为你正常程序流程的一部分。如果你发现自己经常需要终止任务，你应该调查一下发生了什么。任何后续对已取消任务的\
    \ wait 或 get 调用都是未定义的，可能会引发异常或返回错误结果。\n\n我们在上一章跳过的另一个小点是，虽然到目前为止的示例只返回单个值，但 Ray\
    \ 远程函数可以返回多个值，就像普通的 Python 函数一样。\n\n对于在分布式环境中运行的人来说，容错性是一个重要的考虑因素。如果执行任务的 worker\
    \ 意外死亡，⁶ Ray 将重新运行任务（在延迟之后），直到任务成功或超过最大重试次数。我们将在[待补充链接]中更详细地介绍容错性。\n\n## 远程 Ray\
    \ 函数的组合\n\n你可以通过组合使你的远程函数更加强大。Ray 中远程函数组合的两种最常见方法是流水线化和嵌套并行。你可以使用嵌套并行来组合函数以表达递归函数。Ray\
