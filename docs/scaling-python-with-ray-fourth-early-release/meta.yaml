    # Deploying Ray Applications with the Ray Job API


    In addition to connecting your job to an existing cluster with `ray.init`, Ray
    offers a job API. The job API provides a lightweight mechanism to submit jobs
    without having to worry about library mismatches and avoids the issue of flaky
    networks between the remote cluster and the head node. The three main methods
    of the job API you will use are:


    +   - Submit a new job to the cluster, returning a job ID.

    - Get a job’s status based on execution ID which returns back status of submitted
    job.

    - See the execution logs for a job for an execution ID


