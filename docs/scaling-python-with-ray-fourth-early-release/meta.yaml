    This listing shows the behavior of the controller when the temperature is around
    the desired value (45 degrees). As expected the temperature keeps growing until
    it gets above 46 degrees (temperature intervals where controls are ignored is
    1 degree). When the measurement is 46.16666666666661 the new message is sent to
    the heater to switch off and the temperature starts to decrease. Also looking
    at this listing we can see that the requests are always delivered to the same
    partition (they have the same key).


    A key-based approach is a good option for many real world implementations. The
    advantage of this approach is that all of the data processing is done locally
    - inside the same Kafka consumer actor.


    There are two potential pitfalls of such implementations:


    +   - As the number of keys grows it is necessary to ensure that the keys are
    evenly distributed across Kafka topic partitions. Ensuring this key distribution
    can sometimes require additional key design procedures, but the default hashing
    is often sufficient.

    - Execution locality can become a problem when executions are CPU and memory expensive.
    Because all the executions are part of the Kafka consumer actor, its scaling can
    become insufficient for keeping up with high-volume traffic


    Some of these drawbacks can be rectified in a key independent approach.


    # Key independent approach'
