    Another minor point that we skipped in the previous chapter is that while the
    examples so far return only a single value. Ray remote functions can return multiple
    values, as with regular Python functions.


    Fault tolerance is an important consideration for those running in a distributed
    environment. If the worker executing the task dies unexpectedly,⁶ Ray will rerun
    the task (after a delay) until either the task succeeds or the maximum number
    of retries is exceeded. We cover fault tolerance more in [Link to Come].


    # Composition of Remote Ray Functions


    You can make your remote functions even more powerful by composing them. The two
    most common methods of composition with remote functions in Ray are pipelining
    and nested parallelism. You can compose your functions with nested parallelism
    to express recursive functions. Ray also allows you to express sequential dependencies
    without having to block/collect the result in the driver, known as “pipelining.”


    You can build a pipelined function by using ObjectRefs from an earlier `ray.remote`
    as parameters for a new remote function call. Ray will automatically fetch the
    ObjectRefs and pass the underlying objects to your function. This approach allows
    for easy coordination between the function invocations. Additionally, such an
    approach minimizes data transfer—the result will be sent directly to the node
    where execution of the second remote function is executed. A simple example of
    such sequential calculation is presented below Example 3-5.'
