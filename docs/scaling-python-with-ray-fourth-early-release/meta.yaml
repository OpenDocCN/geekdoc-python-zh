- img_proc: true
  md: 'function, Ray takes over distributing calls to that function instead of running
    in the same process. When calling remote functions, you are effectively running
    asynchronously¹ on multiple cores or different machines, without having to concern
    yourself with how or where.


    In this chapter, you will learn how to create remote functions, wait for their
    completion, and fetch results. Once you’ve got the basics down, you will learn
    to compose remote functions together to create more complex operations. Before
    you go too far, let’s start with understanding some of what we glossed over in
    the previous chapter.


    # Understanding Essentials of Ray Remote Functions


    In the previous chapter, you learned how to create a basic Ray remote function
    (Example 2-7).


    When you call a remote function, it immediately returns an ObjectRef (a future),
    which is a reference to a remote object. Ray creates and executes a task itself
    in the background on a separate worker process and writes the result when finished
    into the original reference. You can then call `ray.get` on the ObjectRef to obtain
    the value. Note that `ray.get` is a blocking method waiting for task execution
    completion before returning the result.


    > ### REMOTE OBJECTS IN RAY


    A remote object is just an object, which may be on another node. ObjectRef’s are
    like pointers or IDs to objects that you can use to get the value from or status
    of the remote function. In addition to being created from remote function calls,
    you can also create ObjectRefs explicitly by using the `ray.put` function.


    We’ll further explore remote objects and their fault tolerance in “Ray Objects”.'
