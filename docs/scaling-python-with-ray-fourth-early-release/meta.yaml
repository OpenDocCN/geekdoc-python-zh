    \n## Chapter 5. Ray Design Details\n\n> ### A NOTE FOR EARLY RELEASE READERS\n\
    \nWith Early Release ebooks, you get books in their earliest form—the authors’\
    \ raw and unedited content as they write—so you can take advantage of these technologies\
    \ long before the official release of these titles.\n\nThis will be the fifth\
    \ chapter of the final book. Please note that the GitHub repo will be made active\
    \ later on.\n\nIf you have comments about how we might improve the content and/or\
    \ examples in this book, or if you notice missing material within this chapter,\
    \ please reach out to the editor at vwilson@oreilly.com.\n\nNow that you’ve created\
    \ and worked with remote functions and actors, it’s time to learn what’s happening\
    \ behind the scenes. In this chapter, you will learn about important distributed\
    \ system concepts, like fault tolerance, how Ray manages resources, and ways to\
    \ speed up your remote functions and actors. Many of these details are most important\
    \ when using Ray in a distributed fashion, but even local users benefit. Having\
    \ a solid grasp of how Ray is working will help you decide how and when to use\
    \ it.\n\n### Fault Tolerance\n\nFault tolerance refers to how a system will handle\
    \ failures of everything from user code to the framework itself or the machines\
    \ it runs on. Ray has a different fault tolerance mechanism tailored for each\
    \ system. Like many systems, Ray can not recover from the “head” node failing.¹\
    \ Overall, Ray’s architecture (Figure 5-1) consists of an application layer and\
    \ a system layer, both of which can handle failures.\n\n> **WARNING**\n\nThere\
    \ are some “non-recoverable” errors that exist in Ray, which you can not (at present)\
    \ configure away. If the head node, global control store, or the connection between\
    \ your application and the head node fails, your application will fail and not\
    \ be able to be recovered by Ray. If you require fault tolerance for these situations,\
    \ you will have to roll your own high availability, likely using Zookeeper or\
    \ similar lower-level tools.\n\nThe system layer consists of three major components:\
    \ a global control store, a distributed scheduler, and a distributed object-store.\
    \ Except for the global control store, all components are horizontally scalable\
    \ and fault-tolerant.\n\n![Figure 5-1. Overall Ray architecture](img/14b93f3cc9905cb480ce327eeabf6b78_68_0.png)\n\
    \nAt the heart of Ray’s architecture is a global control store (GCS) that maintains\
    \ the entire control state of the system. Internally, the GCS is a key-value store\
    \ with pubsub² functionality. At present, the GCS is a single point of failure\
    \ and runs on the head node. Usage of GCS, centrally maintaining Ray’s state significantly\
    \ simplifies overall architecture, by enabling the rest of the system layer component\
    \ to be stateless. This design is fundamental for fault tolerance (i.e., on failure,\
    \ components simply restart and read the lineage from the GCS) and makes it easy\
    \ to scale the distributed object store and scheduler independently, as all components\
    \ share the needed state via the GCS.\n\nSince remote functions do not contain\
    \ any persistent state, recovering from their failure is relatively simple. Ray\
    \ will try again until it succeeds or reaches a maximum number of retries. As\
    \ seen in the previous chapter, you can control the number of retries through\
    \ the `max_retries` parameter in the `@ray.remote` annotation. To try out and\
    \ better understand Ray’s fault tolerance, you should write a “flaky” remote function\
    \ that fails some % of the time as shown in Example 5-1.\n\n#### Example 5-1.\
    \ Auto retry remote functions\n\n```python\n@ray.remote\ndef flaky_remote_fun(x):\n\
    \    import random\n    import sys\n    if random.randint(0, 2) == 1:\n      \
    \  sys.exit(0)\n    return x\n\nr = flaky_remote_fun.remote(1)\n```\n\nIf your\
    \ flaky function fails, you will see `WARNING worker.py:1215 -- A worker died\
    \ or was killed while executing a task by an unexpected system error.` output\
    \ to stderr. You’ll still get back the correct value when you execute `ray.get`,\
    \ demonstrating Ray’s fault tolerance.\n\n> **TIP**\n\nAlternatively, to see fault\
    \ tolerance in action, if you’re running a distributed Ray cluster, you can find\
    \ the node running your remote function by returning the hostname and then shut\
    \ down the node while running a request.\n\nRemote actors are a complicated case\
    \ for fault tolerance as they contain state within them. In chapter [Link to Come],\
    \ this is why you explored the different options for persisting & recovering that\
    \ state. Actors can experience failure at any stage: setup, message processing,\
    \ or between messages.\n\nUnlike Ray Remote functions, if an actor fails while\
    \ processing a message, Ray does not automatically retry it. This is true even\
    \ if you have set `max_restarts`. Ray will restart your actor for processing the\
    \ next message. On error, you will get back a `RayActorError` exception.\n\n>\
    \ **TIP**\n\nRay actors are lazily initialized, so failure during the init stage\
    \ is the same as failing on the first message.\n\nWhen an actor fails between\
    \ messages, Ray automatically attempts to recover the actor the next time it is\
    \ called, up to `max_retries` times. If you’ve written your state recovery code\
    \ well, failures between messages are generally invisible besides slightly slower\
    \ processing times. If you don’t have state recovery, each restart will reset\
    \ the actor to the initial values.\n\nIf your application fails, nearly all of\
    \ the resources your application was using will eventually be garbage collected.\
    \ The one exception is detached resources,³ which Ray will restart as configured\
    \ beyond the life of your current program provided the cluster does not fail.⁴\n\
    \nRay does not automatically attempt to recreate lost objects after they are first\
    \ stored. You can configure Ray to try and recreate lost objects when accessed.\
    \ In the next section, you’ll learn more about the Ray objects and how to configure\
    \ that resiliency.\n\n### Ray Objects\n\nRay objects can contain anything serializable\
    \ (covered in the next section), including references to other ray Objects, called\
    \ ObjectRefs. An ObjectRef, is essentially a unique ID that refers to a remote\
    \ object and is conceptually similar to futures. Ray objects are created automatically\
    \ for task results, and large parameters of actors and remote functions. You can\
    \ manually create objects by calling `ray.put`, which will return an immediately\
    \ ready ObjectRef, e.g. `o = ray.put(1)`.\n\n> **TIP**\n\nIn general, initially,\
    \ small objects are stored in their owner’s in-process store while Ray stores\
