    > ## TIP

    Kafka messages are byte-arrays, so we need to serialize our messages (called marshaling
    in Kafka) using, for example, Apache Avro, Google Protocol buffers, JSON or Python
    pickling. The Python Kafka Github provides a handful of examples of using different
    encoding with Kafka. To make code examples simpler we will be using JSON throughout,
    but make sure that you pick up an appropriate marshaling for your implementation.
    When deciding on the format you need to consider its performance (remember we
    marshall/unmarshall every message), size (smaller messages are written/read faster),
    message extensibility (implementation behavior when a message is changed like
    field added or removed), and language interoperability. A good overview of different
    marshaling methods is presented here.


    Unlike other messaging systems, Kafka does not guarantee non-duplicate messages.
    Instead, each Kafka consumer is responsible for ensuring messages are only processed
    once.


    > ## NOTE

    If you are interested in learning more, the Confluent Kafka Python Client documentation
    has more information on different commit options and their implications on delivery
    guarantees. By default, the Python client uses automatic commit, which is what
    we use in our examples. For real-life implementation, consider delivery guarantees
    (“exactly once”, “at least once”, etc.) that you need to provide and use an appropriate
    commit approach.


    # # Using Kafka with Ray


    Now that you know about Kafka and its basic APIs, let’s take a look at options
    for integrating Kafka with Ray. We will implement both the Kafka consumer and
    producer as Ray actors.⁷ There are several reasons you can benefit from using
    Ray actors with Kafka including:


    +   - Kafka consumers run in an infinite loop waiting for new records to arrive
    and need to keep track of messages consumed. Being a stateful service, Ray Actor
    provides an ideal paradigm for implementing a Kafka consumer.'
