  md: 'In this book, we mean streaming as taking action on a series of data close
    to the time when the data is created.


    Some common streaming use cases include the following:


    +   - Log Analysis is a way of gaining insights into the state of your hardware
    and software. It is typically implemented as a distributed processing of streams
    of logs as they are being produced.

    - Fraud Detection is monitoring financial transactions and watching for anomalies
    that signal fraud in real-time and stopping fraudulent transactions.

    - Cyber Security is the monitoring of interactions with the system to detect anomalies,
    allowing the identification of security issues in real-time to isolate threats.

    - Streaming logistics monitors cars, trucks, fleets, and shipments in real-time,
    to optimize routing.

    - IoT data processing: An example of this is collecting data about an engine to
    gain insights that can detect a faulty situation before becoming to a major problem.

    - Recommendation engines are used to understand user interests based on online
    behavior for serving ads, recommending products and services, etc.


    When it comes to implementing streaming applications in Ray you currently have
    two main options:


    +   - Ray’s ecosystem provides a lot of underlying components, described in the
    previous chapters, that can be used for custom implementations of streaming applications.

    - There are some external libraries and tools that can be used with Ray to implement
    streaming.'
