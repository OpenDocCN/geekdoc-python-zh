  mdcn: "## 工作流调度\n\n工作流调度初看之下似乎非常简单。它“只是”一个需要完成的工作图。然而，所有程序都可以表示为“只是”一个需要完成的工作图。Ray\
    \ 在 2.0 版本中新增了工作流库，旨在简化表达传统业务逻辑工作流和大规模（例如机器学习训练）工作流。\n\nRay 在工作流调度方面独具特色，因为它允许任务调度其他任务，而无需回调到中央节点。这提供了更大的灵活性和吞吐量。\n\
    \n如果你觉得 Ray 的工作流引擎过于底层，可以使用 Ray 来运行 Apache Airflow。Airflow 是大数据领域中较为流行的工作流调度引擎之一。[Ray\
    \ Airflow Provider](https://docs.ray.io/en/latest/ray-airflow/index.html) 允许你将\
    \ Ray 集群用作 Airflow 的工作池。\n\n## 流处理\n\n流处理通常被认为是处理“近实时”数据，或“到达即处理”的数据。流处理增加了一层复杂性，尤其是当你试图越接近实时，因为并非所有数据总能按顺序或准时到达。Ray\
    \ 提供了一些标准的流处理原语，并可以使用 Kafka 作为流数据源和接收器。Ray 使用其 Actor 模型 API 与流数据进行交互。\n\nRay 的流处理，就像许多嫁接在批处理系统上的流系统一样，有一些有趣的特性。值得注意的是，与\
    \ Ray 的其他部分不同，Ray 流处理更多逻辑是在 Java 中实现的。这可能使得调试流处理应用程序比调试 Ray 的其他组件更具挑战性。\n\n##\
    \ 交互式\n\n并非所有“近实时”应用程序都必然是“流处理”应用程序。一个常见的例子是你在交互式地探索数据集。类似地，与用户输入交互（例如，提供模型服务）可以被认为是交互式的而非批处理的，但它与流处理库分开处理，使用的是“Ray\
    \ Serve”。\n\n## Ray 不是什么\n\n虽然 Ray 是一个通用的分布式系统，但重要的是要注意 Ray 不是什么（尽管当然，你可以让它成为，但你可能不想）：\n\
