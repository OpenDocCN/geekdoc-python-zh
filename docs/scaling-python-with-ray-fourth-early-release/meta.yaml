    out to the editor at vwilson@oreilly.com.


    So far in the book we have been using Ray for implementing serverless batch applications.
    In this case, data is collected, or provided from the user, and then used for
    calculations. Another important group of use cases are the situations requiring
    you to process data in “real-time”.¹ This type of data processing is called streaming.


    > **STREAMING APPLICATIONS**


    What we are going to describe here is a fairly simple streaming implementation.
    We will not cover windowing or streaming SQL as neither is currently implemented
    in Ray. If you need windowing or streaming SQL you can integrate Ray with an additional
    streaming engine, for example, Apache Flink using Kafka.'
