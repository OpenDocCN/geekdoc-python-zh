    \ this, we see roughly a 2x performance improvement with `ray.wait`. You can try\
    \ varying the sleep times and see how it works out.\n\nYou may wish to specify\
    \ one of the few optional parameters to `ray.wait`:\n\n- `num_returns`: The number\
    \ of ObjectRefs for Ray to wait for completion before returning. You should set\
    \ `num_returns` to less than or equal to the length of the input list of ObjectRefs;\
    \ otherwise, the function throws an exception.⁴ The default value is 1.\n- `timeout`:\
    \ The maximum amount of time in seconds to wait before returning. This defaults\
    \ to -1 (which is treated as infinite).\n- `fetch_local`: You can disable fetching\
    \ of results by setting this to `false` if you are only interested in ensuring\
