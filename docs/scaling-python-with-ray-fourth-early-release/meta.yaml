    \    # Make the futures\n    futures = list(map(lambda x: remote_task.remote(x),\
    \ things))\n    values = ray.get(futures)\n    for v in values:\n        print(f\"\
    \ Completed {v}\")\n        time.sleep(1) # Business logic goes here\n```\n\n\
    The second option is a bit more complex, as shown in Example 3-3. This works by\
