    Looking at this result you can see that every request is processed by a different
    deployment instance (different ID).


    This is manual scaling of deployment. What about autoscaling? Similar to the autoscaling
    of Kafka listeners (discussed in the previous chapter ), Ray’s approach to autoscaling
    is different from the one taken by Kubernetes natively (see, for example, Knative).
    Instead of creating a new instance, Ray’s auto-scaling approach is to create more
    nodes and redistribute deployments appropriately.


    If your deployments begin to exceed ~3k requests per second you should also scale
    the HTTP ingress to Ray. By default, the ingress HTTP server is only started on
    the head node, but you can also start an HTTP_server on every node using `serve.start(http_options={"location":
    "EveryNode"})`. If you scale the number of HTTP ingress, you will also need to
    deploy a load balancer, available from your cloud provider or installed locally.


    # Resource requirements for deployments


    You can request specific resource requirements in `@serve.deployment`. For example,
    two cpus and 1 GPU would be:


    ```

    @serve.deployment(ray_actor_options={"num_cpus": 2, "num_gpus": 1})

    ```


    Another very useful parameter of `@serve.deployment` is `route_prefix`. As you
    can see from the HTTP access example'
