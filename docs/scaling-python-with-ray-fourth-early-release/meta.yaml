    # 第 1 章。什么是 Ray？


    ### 给早期发布读者的说明


    通过早期发布电子书，您可以在书籍的最早期形式中获取内容——即作者撰写时的原始且未经编辑的内容——从而在这些书籍正式发布之前就能利用这些技术。


    这将是最终书籍的第一章。请注意，GitHub 仓库稍后将开放。


    如果您对如何改进本书内容和/或示例有意见，或者发现本章中有缺失内容，请通过 vwilson@oreilly.com 联系编辑。


    Ray 主要是一个用于“快速且简单的分布式计算”的 Python 工具¹。加州大学伯克利分校的同一个实验室²创建了最终成为 Apache Spark 的初始软件，也创建了
    Ray 的第一个版本。该实验室的研究人员已成立公司 Anyscale，以继续开发并围绕 Ray 提供产品和服务。Ray 的目标是解决比其前身更广泛的问题，支持从
    Actor 到机器学习再到数据并行的各种可扩展编程模型。其远程函数和 Actor 模型使其成为一个真正通用的开发环境，而不仅仅适用于“大数据”。


    Ray 会根据需要自动扩展计算资源，让您专注于代码而非管理服务器。Ray 可以直接自行管理并扩展云资源（使用 `ray up`），也可以使用 Kubernetes
    等集群管理器。除了传统的水平扩展（例如添加更多机器）外，Ray 还可以调度任务以利用不同的机器大小和 GPU 等加速器。


    自 AWS Lambda 推出以来，人们对无服务器计算的兴趣激增——这是一种云计算模型，云提供商按需分配机器资源，代表客户管理服务器。Ray 通过提供以下功能，为通用无服务器平台奠定了良好基础：


    - 它隐藏了服务器。Ray 自动扩展透明地根据应用程序需求管理服务器。

    - 通过提供 Actor 编程模型，Ray 不仅实现了无状态（大多数无服务器实现的典型特征），还实现了有状态编程模型。

    - Ray 允许您指定资源，包括执行无服务器函数所需的硬件加速器。

    - Ray 支持任务之间的直接通信，从而不仅支持简单函数，还支持复杂的分布式应用程序。


    Ray 提供了丰富的库，这些库利用其无服务器能力实现，从而简化了充分利用其能力的应用程序创建。通常，您需要不同的工具来处理从数据处理到工作流管理的所有事情。通过使用单一工具处理应用程序的大部分内容，您不仅简化了开发，还简化了运营管理。


    在本章中，我们将探讨 Ray 在生态系统中的定位，并帮助您判断它是否适合您的项目。


    # 为什么需要它？


    当问题变得太大，无法在单个进程中处理时——涵盖从多核到多计算机——我们经常需要像 Ray 这样的工具。如果您发现自己想知道如何处理下个月用户、数据或复杂性的增长，我们希望您能看看
    Ray。Ray 的存在是因为扩展软件很难，而且随着时间的推移，这类问题往往会变得更难而非更简单。


    Ray 不仅可以扩展到多台计算机，还可以在您无需直接管理服务器的情况下进行扩展。Leslie Lamport 曾说过：“分布式系统是指一台您甚至不知道存在的计算机发生故障，就会导致您自己的计算机无法使用的系统。”虽然这种故障仍然可能发生，但
    Ray 能够从许多类型的故障中自动恢复。


    Ray 可以在您的笔记本电脑上干净地运行，也可以使用相同的 API 进行大规模部署。这为使用 Ray 提供了一个非常简单的入门选项，无需上云即可开始尝试 Ray。一旦您熟悉了
    API 和应用程序结构，您可以简单地将代码移动到云中以获得更好的可扩展性，而无需修改代码。这填补了分布式系统和单线程应用程序之间的需求空白。Ray 能够使用与分布式计算相同的抽象来管理多个线程和
    GPU。


    # 可以在哪里运行 Ray？


    Ray 可以部署在各种环境中，从您的笔记本电脑到云，再到 Kubernetes 或 Yarn 等集群管理器，甚至到隐藏在您桌子下的六个树莓派³。在本地模式下，入门可以像
    `pip install` 和调用 `ray.init` 一样简单。⁴


    # RAY 集群


    Ray 集群由一个头节点和一组工作节点组成：


    ![img/14b93f3cc9905cb480ce327eeabf6b78_7_0.png](img/14b93f3cc9905cb480ce327eeabf6b78_7_0.png)


    如上图所示，头节点除了支持工作节点的所有功能外，还有两个额外组件：


    *全局控制存储*


    包含集群范围的信息，包括对象表、任务表、函数表、事件日志等。此存储的内容用于 Web UI、错误诊断、调试和性能分析工具。


    *自动扩展器*


    尝试启动/终止工作节点，以确保工作负载有足够的资源运行，同时最小化空闲资源。'
