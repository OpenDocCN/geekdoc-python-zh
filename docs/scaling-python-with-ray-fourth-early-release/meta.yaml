  md: '# About the Authors


    **Holden Karau** is a queer transgender Canadian, Apache Spark committer, Apache
    Software Foundation member, and an active open source contributor. As a software
    engineer, she’s worked on a variety of distributed computing, search, and classification
    problems at Apple, Google, IBM, Alpine, Databricks, Foursquare, and Amazon. She
    graduated from the University of Waterloo with a bachelor of mathematics in computer
    science. Outside of software, she enjoys playing with fire, welding, riding scooters,
    eating poutine, and dancing.


    **Boris Lublinsky** is a Chief Architect for IBM’s Discovery Accelerator Platform,
    where he specializes in Kubernetes, serverless, workflows, and complex systems
    design. Boris has over 30 years of experience in enterprise architecture and software
    development. He is the coauthor of *Applied SOA* (Wiley), *Professional Hadoop
    Solutions* (Wiley), *Serving Machine Learning Models* (O’Reilly), and *Kubeflow
    for Machine Learning* (O’Reilly). He is also a contributor to several open source
    projects. Boris is a frequent speaker at numerous industry conferences and cofounder
    of several Chicago user groups.'
  merge: -1
