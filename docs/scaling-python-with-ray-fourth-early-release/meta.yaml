  md: "handle to the deployment and then use it for invocation (Example 7-4).\n\n\
    # Example 7-4. Invoking a deployment via a handle\n\n```\nhandle = Converter.get_handle()\n\
    print(ray.get(handle.remote(Request({\"type\": \"http\", \"query_string\":\nb\"\
    temp=100.0&type=CF\"}))))\nprint(ray.get(handle.remote(Request({\"type\": \"http\"\
    , \"query_string\":\nb\"temp=100.0&type=FC\"}))))\nprint(ray.get(handle.remote(Request({\"\
    type\": \"http\", \"query_string\":\nb\"temp=100.0&type=CC\"}))))\n```\n\nNote\
    \ that in the code above we are manually creating starlette requests by specifying\
    \ the request type and a query string.\n\nOnce executed, this code returns the\
    \ same results as above (Example 7-3). This example is using the same method __call__\
    \ for both HTTP and Python requests. Although this works, the best practice is\
    \ to implement additional methods for Python invocation to avoid the usage of\
    \ Request objects in the Python invocation. In our example, we can extend our\
    \ initial deployment (Example 7-1) with additional methods for Python invocations\
    \ (Example 7-5).\n\n# Example 7-5. Implementing additional methods for Python\
    \ invocation\n\n```\n@serve.deployment\nclass Converter:\n    def __call__(self,\
    \ request):\n        if request.query_params[\"type\"] == 'CF' :\n           \
    \ return {\"Fahrenheit temperature\":\n                    9.0/5.0 * float(request.query_params[\"\
    temp\"]) + 32.0}\n        elif request.query_params[\"type\"] == 'FC' :\n    \
    \        return {\"Celsius temperature\":\n                    (float(request.query_params[\"\
    temp\"]) - 32.0) * 5.0/9.0 }\n        else:\n            return {\"Unknown conversion\
    \ code\" : request.query_params[\"type\"]}\n    def celsius_fahrenheit(self, temp):\n\
    \        return 9.0/5.0 * temp + 32.0\n\n    def fahrenheit_celsius(self, temp):\n\
    \        return (temp - 32.0) * 5.0/9.0\n```"
