  - '[PAGE 80]


    # RAY MEMORY USAGE


    Ray memory usage is split into two main groups - memory used by Ray itself (Ray
    system memory) and memory used by applications (Ray application memory). Ray’s
    system memory is currently comprised of:


    +   - Redis: memory used for storing the list of nodes and actors present in the
    cluster. The amount of memory used for these purposes is typically quite small.

    - Raylet: memory used by the C++ raylet process running on each node. This cannot
    be controlled but is typically quite small.


    Ray application memory is comprised of:


    +   - Worker heap: memory used by users’ application, best measured as the resident
    set size (RSS) of your application minus its shared memory usage (SHR) in commands
    such as top.

    - Object store memory: memory used when your application creates objects in the
    object store via ray.put and when returning values from remote functions. Objects
    are evicted when they fall out of scope. There is an object store server running
    on each node. Objects will be spilled to disk if the object store fills up.

    - Object store shared memory: memory used when your application reads objects
    via ray.get.


    To help you to debug some of the memory issues Ray provides a ray memory command
    that can be invoked from the command line from the machine where the Ray node
    is running (at the time of this writing there is no corresponding API). This command
    allows you to get a dump of all of the ObjectRef references that are currently
    held by the driver, actors, and tasks in the cluster. This allows to track down
    what ObjectRef references are in scope and may be causing an ObjectStoreFullError.'
