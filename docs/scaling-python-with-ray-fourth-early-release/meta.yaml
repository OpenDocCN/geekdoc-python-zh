    v.append(2)\nprint(v)\nprint(ray.get(remote_array))\n```\n\n运行上述代码，你可以看到，虽然你可以修改一个值，但这种更改不会传播到对象存储中。\n\
    \n如果一个参数或返回值很大且被使用多次，或者中等大小且被频繁使用，那么将其显式存储为对象可能是值得的。然后，你可以使用 `ObjectRef` 代替常规参数，它会自动为你进行转换，如示例\
    \ 5-3 所示。\n\n## 示例 5-3. 使用 Ray Put\n\n```python\nimport numpy as np\n@ray.remote\n\
    def sup(x):\n    import random\n    import sys\n    return len(x)\n\np = ray.put(np.array(range(0,\
    \ 1000)))\nray.get([sup.remote(p), sup.remote(p), sup.remote(p)])\n```\n\n当另一个节点需要一个对象时，它会向所有者询问谁拥有该对象的任何副本，然后获取并创建该对象的本地副本。这意味着同一个对象在不同节点的对象存储中可能存在多个副本。Ray\
    \ 不会主动复制对象，因此 Ray 也可能只有一个对象的副本。\n\n默认情况下，当你尝试获取一个丢失的对象时，Ray 会抛出 `ObjectLostError`。你可以通过向\
    \ `ray.init` 提供 `_enable_object_reconstruction=True` 或向 `ray start` 添加 `--enable-object-reconstruction`\
    \ 来启用重新计算。这种重新计算⁵ 只会在需要该对象时发生，例如，它是延迟解析的。\n\n丢失对象有两种可能的方式。由于所有者负责引用计数，如果所有者丢失，无论是否存在其他副本，该对象都会丢失。如果\
    \ Ray 中没有对象的副本，例如，所有存储它的节点都宕机了，Ray 也会丢失该对象。⁶\n\n> **提示**\n>\n> Ray 在重建过程中将遵循上面讨论的\
    \ `max_retries` 限制。\n\nRay 的对象存储使用引用计数垃圾回收⁷ 来清理你的程序不再需要的对象。对象存储跟踪直接引用以及引用其他 ObjectRefs\
    \ 的 ObjectRefs。⁸\n\n即使有垃圾回收，对象存储也可能被对象填满。当对象存储满时，Ray 将首先执行垃圾回收，移除没有引用的对象。如果仍然存在内存压力，对象存储将尝试溢出到磁盘。溢出到磁盘是将对象从内存复制到磁盘，由于它发生在内存使用量溢出时，因此被称为溢出。\n\
    \n> **注意**\n>\n> 早期版本的 Ray 通过设置 `object_store_memory` 限制来创建按参与者的对象驱逐。\n\n你可能希望微调对象存储设置。根据你的用例，你可能需要更多或更少的对象存储内存。你可以通过\
    \ `_system_config` 设置来配置对象存储。两个重要的配置选项包括溢出到磁盘的最小聚合大小 `min_spilling_size` 和分配给对象存储的总内存\
    \ `object_store_memory_mb`。你可以在调用 `ray.init` 时设置这些，如示例 5-4 所示。\n\n如果你有快速和慢速磁盘的混合（例如\
    \ SSD、HDD、网络），你应该考虑使用更快的存储来存放溢出的对象。与其他存储配置不同，你使用嵌套的 JSON blob 来配置溢出对象存储位置。与其他对象存储设置一样，`object_spilling_config`\
    \ 存储在 `_system_config` 下。这有点违反直觉，但如果你的机器在“/tmp/fast”有快速临时存储，你应该如[待补充链接]所示配置 Ray\
    \ 使用它。\n\n## 示例 5-4. Ray 对象存储配置\n\n```python\nray.init(num_cpus=20,\n    _system_config={\n\
    \        \"min_spilling_size\": 1024 * 1024,  # 至少溢出 1MB\n        \"object_store_memory_mb\"\
    : 500,\n        \"object_spilling_config\": json.dumps(\n            {\"type\"\
    : \"filesystem\", \"params\": {\"directory_path\": \"/tmp/fast\"}},\n        )\n\
    \    })\n```\n\n像 Ray 这样的框架使用序列化在工作者之间传递数据和函数。在 Ray 将对象传输到对象存储之前，它必须先序列化该对象。\n\
    \n## 序列化/腌制\n\nRay 及其类似系统依赖于序列化，以便能够在不同进程之间存储和移动数据（和函数）。⁹ 并非所有对象都是可序列化的，因此无法在工作者之间移动。除了对象存储和\
    \ IPC，容错也依赖于序列化，因此适用相同的限制。序列化有很多种，从多语言仅数据工具（如 JSON 和 Arrow）到 Python 内部的 pickle。使用\
    \ pickle 进行序列化称为“腌制”。腌制可以处理比 JSON 更广泛的类型，但只能在 Python 进程之间使用。腌制并非适用于所有对象——在大多数情况下，没有好的方法来序列化（比如网络连接），而在其他情况下，这是因为没有人有时间去实现一个。\n\
    \n除了在进程之间通信，Ray 还有一个共享的内存对象存储。这个对象存储允许多个进程在同一个计算机上共享对象。\n\nRay 根据用例使用几种不同的序列化技术。除了一些例外，Ray\
    \ 的 Python 库通常使用 Cloudpickle 的一个分支，这是一个改进的 pickle。对于数据集，Ray 尝试使用 Apache Arrow\
    \ (Arrow)，当 Arrow 不工作时会回退到 cloudpickle。Ray 的 Java 库使用各种序列化器，包括“快速序列化”和 msgpack。在内部，Ray\
    \ 在工作者之间使用协议缓冲区。作为 Ray Python 开发者，深入理解 Cloudpickle 和 Arrow 序列化工具将使你受益最多。\n\n##\
    \ Cloudpickle\n\nCloudpickle 序列化 Ray 中的函数、参与者和大多数数据。大多数非分布式 Python 代码不依赖于序列化函数。然而，集群计算通常确实需要序列化函数。Cloudpickle\
    \ 是一个为集群计算设计的项目，可以序列化和反序列化比 Python 内置 pickle 更多的函数。\n\n> **提示**\n>\n> 如果你不确定为什么某些数据不可序列化，你可以尝试查看堆栈跟踪或使用\
    \ Ray 的 `ray.util.inspect_serializability` 函数。\n\n腌制类时，Cloudpickle 仍然使用与腌制相同的扩展机制（`getnewargs`、`getstate`、`setstate`\
    \ 等）。如果你有一个包含不可序列化组件（如数据库连接）的类，你可以编写自定义序列化器。虽然这不允许你序列化像数据库连接这样的东西，但你可以序列化创建类似对象所需的信息。示例\
    \ 5-5 采用了这种方法，序列化了一个包含线程池的类。\n\n## 示例 5-5. 自定义序列化器\n\n```python\nimport ray.cloudpickle\
    \ as pickle\nfrom multiprocessing import Pool\n\nclass BadClass:\n    def __init__(self,\
    \ threadCount, friends):\n        self.friends = friends\n        self.p = Pool(threadCount)\
    \ # 不可序列化\n\ni = BadClass(5, [\"boo\", \"boris\"])\n# 这将失败并抛出 \"NotImplementedError:\
    \ pool objects cannot\n# be passed between processes or pickled\"\n# pickle.dumps(i)\n\
    \nclass LessBadClass:\n    def __init__(self, threadCount, friends):\n       \
    \ self.friends = friends\n        self.p = Pool(threadCount)\n    def __getstate__(self):\n\
    \        state_dict = self.__dict__.copy()\n        # 我们无法移动线程，但我们可以移动信息来\n  \
    \      # 创建一个相同大小的池\n        state_dict[\"p\"] = len(self.p._pool)\n        return\
    \ state_dict\n    def __setstate__(self, state):\n        self.__dict__.update(state)\n\
    \        self.p = Pool(self.p)\nk = LessBadClass(5, [\"boo\", \"boris\"])\npickle.loads(pickle.dumps(k))\n\
    ```\n\n或者，Ray 允许你为类注册序列化器。这种方法允许你更改不属于你自己的类的序列化，如示例 5-6 所示。\n\n## 示例 5-6. 自定义序列化器；外部类\n\
    \n```python\ndef custom_serializer(bad):\n    return {\"threads\": len(bad.p._pool),\
    \ \"friends\": bad.friends}\n\ndef custom_deserializer(params):\n    return BadClass(params[\"\
    threads\"], params[\"friends\"])\n```"
