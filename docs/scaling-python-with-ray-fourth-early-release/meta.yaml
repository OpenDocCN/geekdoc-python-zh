  md: "(Example 7-2) the default prefix is the name of the Python class used in this\
    \ deployment. Using `route_prefix`, for example:\n\n```\n@serve.deployment(route_prefix=\"\
    /converter\")\n```\n\nallows you to explicitly specify a prefix used by HTTP requests.\n\
    Additional configuration parameters are described [here](here).\n\n# Implementing\
    \ Request Routing with FastAPI HTTP\n\nAlthough the initial example of a temperature\
    \ converter deployment (Example 7-1) works fine, it is not very convenient to\
    \ use. The issue is that you need to specify the transformation type with every\
    \ request. A better approach is to have two separate endpoints (URLs) for the\
    \ API - one for Celsius to Fahrenheit transformation and one for Fahrenheit to\
    \ Celsius transformation. You can achieve this by leveraging serve [integration](integration)\
    \ with [FastAPI](FastAPI). With this, you can rewrite your temperature converter\
    \ (Example 7-1) as follows (Example 7-9).\n\n*Example 7-9. Implementing multiple\
    \ HTTP APIs in a deployment*\n\n```\n@serve.deployment(route_prefix=\"/converter\"\
    )\n@serve.ingress(app)\nclass Converter:\n    @app.get(\"/cf\")\n    def celcius_fahrenheit(self,\
    \ temp):\n        return {\"Fahrenheit temperature\": 9.0/5.0 * float(temp) +\
    \ 32.0}\n\n    @app.get(\"/fc\")\n    def fahrenheit_celcius(self, temp):\n  \
    \      return {\"Celsius temperature\": (float(temp) - 32.0) * 5.0/9.0}\n```\n\
    \nNote that here, we have introduced two different HTTP accessible APIs with two\
    \ different URLs (effectively converting the second query string parameter to\
    \ a set of URLs) - one per conversion type (we also leverage the `route_prefix`\
    \ parameter described above). This can simplify HTTP access (Example 7-10) compared\
    \ to the original one (Example 7-2).\n\n*Example 7-10. Invoking deployment with\
    \ multiple HTTP endpoints*"
