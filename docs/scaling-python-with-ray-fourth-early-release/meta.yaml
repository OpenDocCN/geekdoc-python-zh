  md: "execution and can be a little easier to reason about. Ray Actors, but not remote\
    \ functions, integrate with AsyncIO allowing you to write asynchronous actor methods.\n\
    \nYou should use threaded execution when your code spends a lot of time blocking\
    \ but not yielding control by calling `await`. Threads are managed by the operating\
    \ system deciding when to run which thread. Using threaded execution can involve\
    \ fewer code changes, as you do not need to be explicit about where your code\
    \ is yielding. This can also make threaded execution more difficult to reason\
    \ about.\n\nYou need to be careful and selectively use locks when accessing or\
    \ modifying objects with both threads and *AsyncIo*. In both approaches, your\
    \ objects share the same memory. By using locks you ensure that only one thread\
