    \ inside your cluster:\n    - Maximizing data locality - ensuring placing off\
    \ all your tasks and actors close to your data to avoid object transfer overheads.\n\
    \    - Load balancing - improving application availability by placing your actors\
    \ or tasks into different physical machines as much as possible.\n\nPlacement\
    \ groups consist of both the desired resources for each worker, as well as the\
    \ placement strategy.\n\nSince a placement group can span multiple workers, you\
