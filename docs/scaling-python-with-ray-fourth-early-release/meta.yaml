  md: '# Ray Remote Actors’ Best Practices


    Because Ray remote actors are effectively remote functions, all of the Ray remote
    best practices described in the previous chapter are applicable. In addition,
    there are some actor-specific best practices.


    As mentioned before, Ray offers support for actors’ fault tolerance. Specifically
    for actors, you can specify max_restarts to automatically enable restart for Ray
    actors. This means when your actor or the node hosting that actor crashes, the
    actor will be automatically reconstructed. However, this doesn’t provide ways
    for you to restore application-level states in your actor. Consider actor persistence
    approaches, described in this chapter to ensure restoration of execution level
    states as well. If in your applications you have global variables that you have
    to change do not change them in remote functions, rather use actors to encapsulate
    them and access them through the actor’s methods. This is because remote functions
    are running in different processes and do not share the same address space and
    as a result, these changes are not reflected across ray driver and remote functions.
    One of the common application use cases is the execution of the same remote function
    many times for different data sets. Usage of the remote functions directly can
    cause delays due to the creation of new processes for each of the functions. It
    can also overwhelm the Ray cluster with a large number of processes. A more controlled
    option for such a use case is the usage of the Actor’s pool. In this case, a pool
    provides a controlled set of workers that are readily available (no process creation
    delay) for execution. As the pool is maintaining its requests queue, the programming
    model for this option is identical to starting independent remote functions but
    provides a better-controlled execution environment.


    # Conclusion'
