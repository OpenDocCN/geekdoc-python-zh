    # Actor Hello World


    One of the unique parts of Ray is its emphasis on actors. Actors give you tools
    to manage the execution state, which is one of the more challenging parts of scaling
    systems. Actors send and receive messages, updating their state in response. These
    messages can come from other actors, programs, or your “main” execution thread
    with the Ray client. For every actor, Ray starts a dedicated process. Each actor
    has a mailbox of messages waiting to be processed, and when you call an actor
    Ray adds a message to the corresponding mailbox. which allows Ray to serialize
    message processing, thus avoiding expensive distributed locks. Actors can return
    values in response to messages, so when you send a message to an actor, Ray immediately
    returns a future so you can fetch the value when done.


    > ## ACTOR USES AND HISTORY


    Actors have a long history before Ray, and were introduced in 1973. The actor
    model is an excellent solution to concurrency with state, and can replace complicated
    locking structures. Some other notable implementations of actors are AKKA in Scala
    and Erlang.


    The actor model can be used for everything from real world systems like e-mail,
    IOT applications like tracking temperature, to flight booking. A common use case
    in Ray actors is managing state, e.g., weights, while performing distributed machine
    learning without requiring expensive locking.²


    The actor model has challenges with multiple events that need to be processed
    in order and rolled back as a group. A classic example of this is banking, where
    transactions need to touch multiple accounts and be rolled back as a group.


    Ray actors are created and called similarly to remote functions, but using Python
    classes, which gives the actor a place to store state. You can see this in action
    by modifying the classic “Hello World” example to greet you in sequence, as shown
    in Example 2-11.'
