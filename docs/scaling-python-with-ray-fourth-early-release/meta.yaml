  md: '# REMOTE FUNCTIONS LIFECYCLE


    The invoking Ray process, called the owner, of a remote function schedules the
    execution of a submitted task and facilitates the resolution of the returned `ObjectRef`
    to its underlying value if needed.


    On task submission, the owner waits for all dependencies, i.e., `ObjectRefs` that
    were passed as an argument to the task, to become available before scheduling.
    The dependencies can be local or remote, and the owner considers the dependencies
    to be ready as soon as they are available anywhere in the cluster. When the dependencies
    are ready, the owner requests resources from the distributed scheduler to execute
    the task. Once resources are available, the scheduler grants the request and responds
    with the address of a worker that will execute the function.


    At this point the owner sends the task specification over gRPC to the worker.
    After executing the task, the worker stores the return values. If the return values
    are small,^3 the worker returns the values inline directly to the owner, which
    copies them to its in-process object store. If the return values are large, the
    worker stores the objects in its local shared memory store and replies to the
    owner indicating that the objects are now in distributed memory. This allows the
    owner to refer to the objects without having to fetch the objects to its local
    node.


    When a task is submitted with an `ObjectRef` as its argument, the worker must
    resolve its value before it can start executing the task.


    Tasks can end in an error. Ray distinguishes between two types of task errors:


    *Application-level*


    This is any scenario where the worker process is alive, but the task ends in an
    error. For example, a task that throws an `IndexError` in Python.


    *System-level*'
  merge: -1
  pgno: 32
- img_proc: true
  md: "> This is any scenario where the worker process dies unexpectedly. For example,\
    \ a process that segfaults, or if the worker’s local raylet dies.\n\nTasks that\
    \ fail due to application-level errors are never retried. The exception is caught\
    \ and stored as the return value of the task. Tasks that fail due to system-level\
    \ errors may be automatically retried up to a specified number of attempts. This\
    \ is covered in more detail in “Fault Tolerance”.\n\nIn our examples so far, using\
    \ `ray.get` was fine because the futures all had the same execution time. If the\
    \ execution times are different, such as training, a model on different-sized\
    \ batches of data, and you don’t need all of the results at the same time, this\
    \ can be quite wasteful. Instead of directly calling `ray.get`, you should use\
    \ `ray.wait`, which returns the requested number of futures that have already\
    \ been completed. To see the performance difference, you will need to modify your\
    \ remote function to have a variable sleep time, as in Example 3-1.\n\n# Example\
    \ 3-1. Remote function with different execution times\n\n```\n@ray.remote\ndef\
    \ remote_task(x):\n    time.sleep(x)\n    return x\n```\n\nAs you may recall,\
    \ the example remote function sleeps based on the input argument. Since the range\
    \ is ascending in order, calling the remote function on it will result in futures\
    \ that are complete in order. To ensure that the futures won’t complete in order\
    \ you will need to modify the list, one way you can do this is by calling `things.sort(reverse=True)`\
    \ prior to mapping your remote function over things.\n\nTo see the difference\
    \ between using `ray.get` and `ray.wait`, you can write a function that collects\
    \ the values from your futures with some time delay on each object to simulate\
    \ business logic."
