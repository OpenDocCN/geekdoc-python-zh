    and using auto scalers, regardless of the underlying hardware.


    +   6. It should be possible to expose model serving functionality via different
    protocols including HTTP, Kafka, etc.


    +   7. ML models traditionally do not extrapolate well outside of the training
    data distribution. As a result, if data drift occurs, the model performance can
    deteriorate, and it should be retrained and redeployed. Implementation should
    support an easy redeployment of models.


    +   8. Flexible deployment strategy implementations (including Canary deployment,
    Blue-Green deployments, and A/B testing) are required, to ensure that new versions
    of models will not behave worse than the existing ones.


