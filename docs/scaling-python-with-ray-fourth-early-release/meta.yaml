    \ can find a description of the supported messaging backbones and an example of\
    \ their usage here.\n\nSimilar to the Kafka integration described above, under\
    \ the hood, Rayvens is implemented as a set of Ray actors. The Rayvens base class\
    \ Stream is a stateless, serializable, wrapper around the Stream Ray actor class\
    \ which is responsible for keeping track of the current Rayvens state (see chapter\
    \ 4 for using actors to manage global variables), including currently defined\
    \ sources and sinks and their connectivity. Stream class hides the remote nature\
    \ of a Stream actor and implement wrappers that are internally implementing all\
    \ communications with the underlying remote actor. If you want more control (in\
    \ terms of execution timing), it is possible to invoke methods directly on the\
    \ stream actor. The stream actor will be reclaimed when the original stream handle\
    \ goes out of scope.\n\nAs Rayvens is based on Camel, it requires a setting of\
    \ Camel to make it work. Rayvens supports two main options of Camel usage:\n\n\
    - Local mode: in this mode Camel source or sink run in the same execution context\
    \ as the stream actor which is attached to using the Camel client: same container,\
    \ same virtual or physical machine.\n- Operator mode: in this case Camel source\
    \ or sink run inside a Kubernetes cluster relying on the Camel operator to manage\
    \ dedicated Camel pods.\n\n## Conclusion\n\nIn this chapter, you have learned\
    \ one option to use Ray for implementing streaming. You first learned the basics\
    \ of Kafka - the most popular streaming application backbone used today - and\
    \ some different ways to integrate it with Ray. You then learned how to scale\
    \ Kafka-based applications with Ray. We have also outlined implementation approaches\
    \ for both stateless and stateful streaming applications with Ray that you can\
    \ use as a foundation for your custom implementations.\n\nFinally, we briefly\
    \ discussed alternatives to using Kafka as transport, including Rayvens - a general-purpose\
    \ integration framework based on Apache Camel, that can be used for integration\
    \ of a wide variety of streaming backbones. You can use this discussion to decide\
    \ how to implement your specific transports.\n\nIn the next chapter, we will introduce\
    \ Ray’s microservices framework implementation and its usage for model serving\
    \ implementation.\n\n1 We use the overloaded term real-time to mean processing\
    \ the data as it arrives within some latency constraints.\n\n2 Other examples\
    \ of distributed Log implementation are Apache Bookkeeper, Apache Pulsar, and\
    \ Pravega.\n\n3 Both key and value are optional, an empty value can be used to\
    \ tombstone an existing value."
