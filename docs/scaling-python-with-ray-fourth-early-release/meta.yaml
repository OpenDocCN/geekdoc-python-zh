  - '[PAGE 133]


    # Using Ray Serve for model serving


    In a nutshell, serving a model is no different than any other microservice (we
    will talk about specific model serving requirements later in this chapter). As
    long as you can get a machine-learning generated model in some shape or form (pickle
    format, straight Python code, binary format along with Python library for its
    processing, etc) compatible with Ray’s runtime, you can use this model to process
    inference requests. Let’s start with a simple example of model serving.


    # Simple model service example


    One of the popular model learning applications is red wine quality prediction,
    based on this Kaggle dataset. There are numerous publications using this dataset
    to build ML implementation of wine quality, for example here, here, and here.
    For our example we have built several classification models for the red wine quality
    dataset, following this article (the actual code is in Github). The code uses
    several different techniques for building a classification model of the red wine
    quality including:


    +   - Decision trees

    - Random forest

    - Ada boost

    - Gradient boost

    - XGBoost


    All implementations leverage the Scikit-learn Python library, which allows you
    to generate a model and export it using Pickle. When validating the models we
    saw the best results from Random forest, Gradient boost, and XGBoost, so we saved
    only these models locally (generated models are available in Github). With the
    models in place, you can use a simple deployment that allows serving red wine
    quality model using Random forest classification (Example 7-14).'
  - "[PAGE 134]\n\n# Example 7-14. Implementing model serving using Random forest\
    \ classification\n\n```\n@serve.deployment(route_prefix=\"/randomforest\")\nclass\
