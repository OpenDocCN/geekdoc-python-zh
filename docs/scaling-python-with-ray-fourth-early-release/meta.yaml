- md: 'The head node is effectively a master (singleton⁵) which manages a complete
    cluster (via autoscaler). Each of the Ray’s nodes contains a Raylet, that consists
    of two main components:


    *Object store*


    All of the object stores are connected together and you can think about this collection
    somewhat similar to memcached, a distributed cache.


    *Scheduler*


    Each Ray node provides a local scheduler that can communicate with each other
    thus create a unified distributed scheduler for overall Ray cluster.


    When we are talking about nodes in a Ray cluster we are not talking about physical
    machines, but rather about logical nodes based on docker images. As a result,
    when mapping to physical machines, a given physical node can run one or more logical
    nodes.


    `ray up`, which is included as part of Ray, allows you to create clusters and
    it will:


    - Provision a new instance/machine (if running on the cloud⁶ or cluster manager)
    using the provider’s SDK or accessing machines, if running directly on physical
    machines

    - Execute shell commands to set up Ray with the desired options

    - Run any custom, user defined setup commands, for example, setting environment
    variables and installing packages

    - Initialize the Ray cluster

    - Deploy an autoscaler if required


    In addition to `ray up`, if running on kubernetes you can use Ray kubernetes operator.
    Although `ray up` or kubernetes operator are preferred ways of Ray cluster creation,
    if you have a set of existing machines (either physical or VMs) you can set up
    the Ray cluster manually.

    Regardless of which deployment approach you take, the same Ray code should work
    everywhere.⁷ We’ll look more at running Ray in local mode in the next chapter,
    and if you want to scale even more we’ll cover deploying to the cloud and resource
    managers in [Link to Come].


    ## Running Your Code with Ray


    Ray is more than just a library you import; it is also a cluster management tool.
    In addition to importing the library you need to “connect” to a Ray cluster. You
    have three options for how to connect your code to a Ray cluster:


    *Calling `ray.init()` with no arguments*


    This launches an embedded, single-node Ray instance that is immediately available
    to the application.


    *Using the Ray client*

    `ray.init("ray://<head_node_host>:10001")` to connect to a Ray cluster


    By default, each Ray cluster launches with a Ray client server running on the
    head node that can receive remote client connections. Note however that when the
    client is located remotely, some operations run directly from the client may be
    slower due to WAN latencies. Ray is not resilient to network failures between
    the head node and the client.


    *Using the Ray command-line API*


    You can use the `ray submit` command to execute Python scripts on clusters. This
    will copy the designated file onto the head node cluster and execute it with the
    given arguments. Note that if you are passing the parameters, your code should
    use the Python `sys` module that provides access to any command-line arguments
    via the `sys.argv`. This removes the potential networking point of failure when
    using the ray client.


    ## Where Does It Fit in the Ecosystem?


    Ray sits at a unique intersection of problem spaces. The first problem that Ray
    solves is that of scaling your Python code by managing resources, be it servers,
    threads, or GPUs. Ray’s core building blocks are a scheduler, distributed data
    storage, and actor system. The scheduler that Ray uses is general purpose enough
    to exist in the space of workflow scheduling, not just with “traditional” problems
    of scale. Ray’s actor system gives you a simple way of handling resilient distributed
    execution state.⁸ In addition to the scalable building blocks, Ray has higher-level
    libraries such as Serve, Data, Tune, RLlib, Train and Workflows that exist in
    the machine learning problem space. Overall Ray ecosystem is presented in Figure
    1-1.


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_11_0.png)


    Figure 1-1. The Ray ecosystem


    Let’s take a look at some of the different problem spaces and see how Ray fits
    in and compares with existing tools.


    **Table 1-1** compares Ray to several related system categories.


    ### Table 1-1. Comparing Ray to related systems


    | Category | Description |

    | --- | --- |

    | Cluster orchestrators | Cluster orchestrators, like Kubernetes, SLURM, and YARN,
    schedule containers. Ray can leverage these for allocating cluster nodes. |

    | Parallelization frameworks | Compared to Python parallelization frameworks such
    as multiprocessing or Celery, Ray offers a more general, higher-performance API.
    In addition Ray’s distributed objects support data sharing across parallel executors.
    |

    | Data processing frameworks | Ray’s lower-level APIs are more flexible and better
    suited for a “distributed glue” framework than existing data processing frameworks
    such as Spark, MARS, or Dask. Although Ray has no inherent understanding of data
    schemas, relational tables, or streaming dataflow, it supports running many of
    these data processing frameworks, for example, Modin, Dask-on-Ray, MARS-on-Ray,
    and RayDP (Spark on Ray). |

    | Actor frameworks | Unlike specialized actor frameworks such as Erlang, Akka,
    and Orleans, Ray integrates Actor framework directly into programming languages.
    In addition Ray’s distributed objects support data sharing across actors. |

    | Workflows | When most people talk about workflows they talk about UI or script-driven
    low code development. While this approach might be very useful for non-technical
    users, they frequently bring more pain than value to software engineers. Ray uses
    programmatic workflow implementation (compare to Cadence). Implementation combines
    the flexibility of Ray’s dynamic task graphs with strong durability guarantees.
    It offers sub-second overheads for task launch and supports workflows with hundreds
    of thousands of steps. It also takes advantage of the Ray object store to pass
    distributed datasets between steps. |

    | HPC Systems | Unlike Ray, which exposes tasks and actors APIs, a majority of
    HPC systems expose lower-level messaging APIs, providing a greater application
    flexibility. Additionally many of the HPC implementations offer optimized collective
    communications primitives. Ray provides a Collection Communications library that
    implements many of these functionalities. |


    ## “Big” Data / Scalable Dataframes


    Ray offers a few different APIs for scalable dataframes, a cornerstone of the
    big data ecosystem. It builds on top of the Apache Arrow project to provide a
    (limited) distributed Dataframe API called `ray.data.Dataset`. Beyond that, Ray
    also provides support for a more pandas-like experience through DaskOnRay.


    > **WARNING**


    In addition to the libraries above, you may find references to Mars on Ray or
    Ray’s (deprecated) built-in pandas support. These libraries do not support distributed
    mode, so they can limit your scalability.


    ## RAY AND SPARK


    It is tempting to compare Ray with Apache Spark, and in some abstract ways, they
    are very similar. From a user’s point of view, Apache Spark is ideal for data-intensive
    tasks, and Ray is better suited to compute-intensive tasks.


    Ray has a lower task overhead and has support for distributed state, making it
    especially appealing for machine learning tasks. Ray’s lower level APIs make it
    a more appealing platform to build tools on top of.


    Spark has more data tools but depends on centralized scheduling and state management.
    This centralization makes implementing reinforcement learning and recursive algorithms
    a challenge. For analytical use cases, especially in existing big data deployments,
    Spark may be a better choice.


    Ray and Spark are complementary and can be used together. A common pattern is
    data processing with Spark and then machine learning with Ray. In fact, the `RayDP`
    library provides you a way to use Spark Dataframes inside of Ray.


    ## Machine Learning


    Ray has multiple machine learning libraries, and for the most part, they serve
    to delegate much of the fancy parts to existing tools like PyTorch, Scikit-Learn,
    and Tensorflow while using Ray’s distributed computing facilities to scale. Ray
    Tune implements hyper-parameter tuning, using Ray’s ability to train many local
    Python-based models in parallel across a distributed set of machines. Ray Train
    implements distributed training with PyTorch or Tensorflow. Ray’s RLlib interface
    offers reinforcement learning with a number of core algorithms.


    Part of what allows Ray to stand out from pure data-parallel systems for machine
    learning is its actor model, which allows easier tracking of “state”-'
  mdcn: '头节点实际上是一个主节点（单例⁵），它通过自动伸缩器管理整个集群。Ray 的每个节点都包含一个 Raylet，它由两个主要组件组成：


    *对象存储*


    所有对象存储相互连接，你可以将这个集合想象成类似 memcached 的分布式缓存。


    *调度器*


    每个 Ray 节点都提供一个本地调度器，这些调度器可以相互通信，从而为整个 Ray 集群创建一个统一的分布式调度器。


    当我们谈论 Ray 集群中的节点时，我们指的不是物理机器，而是基于 Docker 镜像的逻辑节点。因此，在映射到物理机器时，一个给定的物理节点可以运行一个或多个逻辑节点。


    `ray up` 是 Ray 的一部分，它允许你创建集群，并且它会：


    -   如果是在云⁶或集群管理器上运行，则使用提供商的 SDK 或直接访问物理机器来配置新的实例/机器

    -   执行 shell 命令以使用所需选项设置 Ray

    -   运行任何自定义的、用户定义的设置命令，例如设置环境变量和安装包

    -   初始化 Ray 集群

    -   如果需要，部署自动伸缩器


    除了 `ray up`，如果你在 Kubernetes 上运行，可以使用 Ray Kubernetes Operator。虽然 `ray up` 或 Kubernetes
    Operator 是创建 Ray 集群的首选方式，但如果你有一组现有的机器（无论是物理机还是虚拟机），你也可以手动设置 Ray 集群。

    无论你采用哪种部署方式，相同的 Ray 代码都应该在任何地方运行。⁷ 我们将在下一章更详细地介绍在本地模式下运行 Ray，如果你想进一步扩展，我们将在[待添加链接]中介绍部署到云和资源管理器。


    ## 使用 Ray 运行你的代码


    Ray 不仅仅是一个你导入的库；它也是一个集群管理工具。除了导入库，你还需要“连接”到一个 Ray 集群。你有三种方式将你的代码连接到 Ray 集群：


    *调用不带参数的 `ray.init()`*


    这会启动一个嵌入式的、单节点的 Ray 实例，该实例立即可供应用程序使用。


    *使用 Ray 客户端*

    `ray.init("ray://<head_node_host>:10001")` 连接到 Ray 集群


    默认情况下，每个 Ray 集群启动时都会在头节点上运行一个 Ray 客户端服务器，该服务器可以接收远程客户端连接。但请注意，当客户端位于远程时，由于广域网延迟，直接从客户端运行的某些操作可能会变慢。Ray
    对头节点和客户端之间的网络故障不具备弹性。


    *使用 Ray 命令行 API*


    你可以使用 `ray submit` 命令在集群上执行 Python 脚本。这会将指定的文件复制到头节点集群，并使用给定的参数执行它。请注意，如果你传递参数，你的代码应该使用
    Python 的 `sys` 模块，该模块通过 `sys.argv` 提供对任何命令行参数的访问。这消除了使用 Ray 客户端时潜在的网络故障点。


    ## 它在生态系统中的位置是什么？


    Ray 处于问题空间的独特交叉点。Ray 解决的第一个问题是通过管理资源（无论是服务器、线程还是 GPU）来扩展你的 Python 代码。Ray 的核心构建块是调度器、分布式数据存储和
    Actor 系统。Ray 使用的调度器足够通用，可以存在于工作流调度领域，而不仅仅是“传统”的扩展问题。Ray 的 Actor 系统为你提供了一种简单的方式来处理有弹性的分布式执行状态。⁸
    除了可扩展的构建块，Ray 还有更高层次的库，如 Serve、Data、Tune、RLlib、Train 和 Workflows，它们存在于机器学习问题领域。整体的
    Ray 生态系统如图 1-1 所示。


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_11_0.png)


    图 1-1. Ray 生态系统


    让我们看看一些不同的问题领域，看看 Ray 如何融入并与现有工具进行比较。


    **表 1-1** 将 Ray 与几个相关的系统类别进行了比较。


    ### 表 1-1. 将 Ray 与相关系统进行比较


    | 类别 | 描述 |

    | --- | --- |

    | 集群编排器 | 集群编排器，如 Kubernetes、SLURM 和 YARN，负责调度容器。Ray 可以利用这些来分配集群节点。 |

    | 并行化框架 | 与 Python 并行化框架（如 multiprocessing 或 Celery）相比，Ray 提供了更通用、更高性能的 API。此外，Ray
    的分布式对象支持跨并行执行器的数据共享。 |

    | 数据处理框架 | Ray 的底层 API 比现有的数据处理框架（如 Spark、MARS 或 Dask）更灵活，更适合作为“分布式粘合剂”框架。尽管 Ray
    本身不理解数据模式、关系表或流式数据流，但它支持运行许多此类数据处理框架，例如 Modin、Dask-on-Ray、MARS-on-Ray 和 RayDP（Spark
    on Ray）。 |

    | Actor 框架 | 与专门的 Actor 框架（如 Erlang、Akka 和 Orleans）不同，Ray 将 Actor 框架直接集成到编程语言中。此外，Ray
    的分布式对象支持跨 Actor 的数据共享。 |

    | 工作流 | 当大多数人谈论工作流时，他们谈论的是 UI 或脚本驱动的低代码开发。虽然这种方法对非技术用户可能非常有用，但它们经常给软件工程师带来的痛苦多于价值。Ray
    使用编程式工作流实现（与 Cadence 相比）。实现结合了 Ray 动态任务图的灵活性和强大的持久性保证。它提供亚秒级的任务启动开销，并支持具有数十万步骤的工作流。它还利用
    Ray 对象存储在步骤之间传递分布式数据集。 |

    | HPC 系统 | 与 Ray 暴露任务和 Actor API 不同，大多数 HPC 系统暴露更底层的消息 API，提供更大的应用程序灵活性。此外，许多
    HPC 实现提供优化的集体通信原语。Ray 提供了一个集体通信库，实现了其中的许多功能。 |


    ## “大数据” / 可扩展数据帧


    Ray 为可扩展数据帧提供了几种不同的 API，这是大数据生态系统的基石。它建立在 Apache Arrow 项目之上，提供了一个（有限的）分布式 Dataframe
    API，称为 `ray.data.Dataset`。除此之外，Ray 还通过 DaskOnRay 提供了更类似 pandas 的体验支持。


    > **警告**


    除了上述库，你可能会找到关于 Mars on Ray 或 Ray（已弃用）内置 pandas 支持的引用。这些库不支持分布式模式，因此它们可能会限制你的可扩展性。


    ## RAY 和 SPARK


    很容易将 Ray 与 Apache Spark 进行比较，在某些抽象层面上，它们非常相似。从用户的角度来看，Apache Spark 非常适合数据密集型任务，而
    Ray 更适合计算密集型任务。


    Ray 的任务开销更低，并且支持分布式状态，这使其对机器学习任务特别有吸引力。Ray 的底层 API 使其成为构建工具的更具吸引力的平台。


    Spark 拥有更多数据工具，但依赖于集中式调度和状态管理。这种集中化使得实现强化学习和递归算法成为一项挑战。对于分析用例，特别是在现有的大数据部署中，Spark
    可能是更好的选择。


    Ray 和 Spark 是互补的，可以一起使用。一种常见的模式是使用 Spark 进行数据处理，然后使用 Ray 进行机器学习。事实上，`RayDP` 库为你提供了一种在
    Ray 中使用 Spark Dataframe 的方式。


    ## 机器学习


    Ray 有多个机器学习库，在很大程度上，它们的作用是将大部分复杂部分委托给现有工具，如 PyTorch、Scikit-Learn 和 Tensorflow，同时使用
    Ray 的分布式计算设施进行扩展。Ray Tune 实现了超参数调优，利用 Ray 在分布式机器集上并行训练许多本地 Python 模型的能力。Ray Train
    使用 PyTorch 或 Tensorflow 实现分布式训练。Ray 的 RLlib 接口提供了具有多种核心算法的强化学习。


    Ray 能够从纯数据并行系统中脱颖而出的部分原因在于其 Actor 模型，该模型允许更容易地跟踪“状态”-'
