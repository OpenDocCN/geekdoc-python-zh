    4 Although we tend to think about infinite logs, in reality a Kafka log is limited
    to the amount of disk space available to the corresponding Kafka server. As a
    result, Kafka introduces log retention and cleanup policies, which prevent logs
    from growing indefinitely and consequently crashing Kafka servers. As a result,
    when we are talking about log replay in a production system, we are talking about
    replay within a retention window.


    5 Refer to this nice presentation on Kafka capacity planning and more. Kafka is
    also available as a serverless product from vendors such as ConfluentCloud.


    6 For a simple example of using Python Kafka APIs see Github


    7 For another example of the same approach, see this blog post,


    8 Allowed values for reset are *earliest* which automatically reset the offset
    to the beginning of the log, and *latest* which automatically resets the offset
    to the latest offset processed by the consumer group.


    9 This example is adapted from here


    10 As described in chapter 4, Ray’s actors are not persistent, and as a result
    in the case of node failures, the actor state will be lost. We can implement persistence
    here as described in Chapter 4 to overcome this.


    11 Note usage of threading to ensure that Kafka consumer is running forever without
    interference with measurement computations.


    12 Again, this is a simplification we made for our toy example; in real implementations,
    every request to the temperature controller should contain replyTo topic, thus
    ensuring that any replies will get to the correct instance of the heater.


