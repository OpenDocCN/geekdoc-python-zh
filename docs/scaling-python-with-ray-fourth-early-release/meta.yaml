    \ pool results queue to ensure that we get the right result. In addition to the\
    \ multiprocessing-based scaling provided by the actor’s pool, Ray also supports\
    \ scaling of the actor’s execution through concurrency. Ray offers two types of\
    \ concurrency within an actor - threading and async execution.\n\nWhen using concurrency\
    \ inside actors, keep in mind that the Python’s Global Interpreter Lock (GIL)\
    \ will only allow one thread of Python code running at once. This means that pure\
    \ Python will not provide true parallelism. On another hand, if you invoke Numpy,\
    \ Cython, Tensorflow, or PyTorch code, these libraries will release the GIL when\
    \ calling into C/C++ functions. By overlapping the time waiting for IO or working\
    \ in native libraries both threading and async actor execution can achieve some\
    \ parallelism.\n\nAsyncIO can be thought of as cooperative multitasking, where\
    \ your code or libraries needs to explicitly signal that it is waiting on a result,\
    \ and Python can go ahead and execute another task by explicitly switching execution\
    \ context. AsyncIO works by having a single process running through an event loop\
    \ and changing which task it is executing when a task yields/awaits. AsyncIO tends\
    \ to be lower overhead than multithreaded execution and can be a little easier\
    \ to reason about. Ray Actors, but not remote functions, integrate with AsyncIO\
    \ allowing you to write asynchronous actor methods.\n\nYou should use threaded\
    \ execution when your code spends a lot of time blocking but not yielding control\
    \ by calling `await`. Threads are managed by the operating system deciding when\
    \ to run which thread. Using threaded execution can involve fewer code changes,\
    \ as you do not need to be explicit about where your code is yielding. This can\
    \ also make threaded execution more difficult to reason about.\n\nYou need to\
    \ be careful and selectively use locks when accessing or modifying objects with\
    \ both threads and *AsyncIO*. In both approaches, your objects share the same\
    \ memory. By using locks you ensure that only one thread or task can access the\
    \ specific memory. Locks have some overhead.⁶ As a result, usage of actor’s concurrency\
    \ is mostly applicable for use cases when a state is populated in a constructor\
    \ and never changes.\n\nTo create an actor that uses AsyncIO, you need to define\
