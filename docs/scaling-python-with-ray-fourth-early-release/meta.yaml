    Now that you’ve created and worked with remote functions and actors, it’s time
    to learn what’s happening behind the scenes. In this chapter, you will learn about
    important distributed system concepts, like fault tolerance, how Ray manages resources,
    and ways to speed up your remote functions and actors. Many of these details are
    most important when using Ray in a distributed fashion, but even local users benefit.
    Having a solid grasp of how Ray is working will help you decide how and when to
    use it.


    # ## Fault Tolerance


    Fault tolerance refers to how a system will handle failures of everything from
    user code to the framework itself or the machines it runs on. Ray has a different
    fault tolerance mechanism tailored for each system. Like many systems, Ray can
    not recover from the “head” node failing.¹ Overall, Ray’s [architecture](Figure
    5-1) consists of an application layer and a system layer, both of which can handle
    failures.'
