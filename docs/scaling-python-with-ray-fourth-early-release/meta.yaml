  md: '# # Chapter 1. What Is Ray?


    > ### A NOTE FOR EARLY RELEASE READERS


    With Early Release ebooks, you get books in their earliest form—the authors’ raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the first chapter of the final book. Please note that the GitHub
    repo will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the editor at vwilson@oreilly.com.


    Ray is primarily a Python tool¹ for “Fast and Simple Distributed Computing.” The
    same lab² at University of California Berkeley that created the initial software
    that eventually became Apache Spark also created the first version of Ray. The
    researchers from that lab have started a company, Anyscale, to continue developing
    and offer products and services around Ray. The goal of Ray is to solve a wider
    variety of problems than its ancestors, supporting various scalable programing
    models that range from actors to machine learning to data parallelism. Its remote
    function and actor models make it a truly general purpose development environment
    instead of “big data” only.


    Ray automatically scales compute resources as needed, allowing you to focus on
    your code instead of managing servers. Ray can manage and scale cloud resources
    directly on its own (using `ray up`) or by using a cluster manager like Kubernetes.
    In addition to traditional horizontal scaling (e.g., adding more machines) Ray
    can schedule tasks to take advantage of different machine sizes and accelerators
    like GPUs.'
  merge: -1
  pgno: 4
- img_proc: true
  md: 'Since the introduction of AWS Lambda, interest in serverless computing—a cloud
    computing model in which the cloud provider allocates machine resources on demand,
    taking care of the servers on behalf of their customers —has exploded. Ray provides
    a great foundation for general purpose serverless platform by providing the following
    features:


    +   - It hides servers. Ray autoscaling transparently manages servers based on
    the application requirements.

    - By providing an actors programming model, Ray implements not only stateless
    (typical for the majority of serverless implementations) but also a stateful programming
    model.

    - Ray allows you to specify resources, including hardware accelerators required
    for the execution of your serverless functions.

    - Ray supports direct communications between your tasks thus providing support
    not only for simple functions but also complex distributed applications.


    Ray provides a wealth of libraries that are implemented leveraging its serverless
    capabilities, thus simplifying the creation of applications fully leveraging its
    capabilities. Normally, you would need different tools for everything from data
    processing, to workflow management. By using a single tool for a larger portion
    of your application you simplify not only development but also your operation
    management.


    In this chapter, we’ll look at where Ray fits in the ecosystem and help you decide
    if it’s a good fit for your project.


    # Why Do You Need It?


    We often need something like Ray when our problems get too big to handle in a
    single process, covering from multicore to multicomputer. If you find yourself
    wondering how you can handle the next month’s growth in users, data, or complexity,
    our hope is you will take a look at Ray. Ray exists'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'because scaling software is hard, and it tends to be the kind of problem that
    gets harder rather than simpler with time.


    Not only can Ray scale to multiple computers, it also scales without you having
    to directly manage servers. Leslie Lamport has said, “A distributed system is
    one in which the failure of a computer you didn’t even know existed can render
    your own computer unusable.” While this kind of failure is still possible, Ray
    is able to automatically recover from many types of failures.


    Ray runs cleanly on your laptop as well as at scale with the same APIs. This provides
    a very simple starting option for using Ray, that does not require you to go to
    the cloud to start experimenting with Ray. Once you feel comfortable with the
    APIs and application structure, you can simply move your code to the cloud for
    better scalability without the need to modify your code. This fills the needs
    that exist between a distributed system and a single-threaded application. Ray
    is able to manage multiple threads and GPUs with the same abstractions it uses
    for distributed computing.


    # Where Can You Run Ray?


    Ray can be deployed in a variety of environments ranging from your laptop to the
    cloud, to cluster managers like Kubernetes or Yarn, to six raspberry pis hidden
    under your desk.³ In local mode, getting started can be as simple as a `pip install`
    and a call to `ray.init`.⁴'
  merge: -1
  pgno: 6
- img_proc: true
  md: '# RAY CLUSTER


    A Ray cluster consists of a head node and a set of worker nodes:


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_7_0.png)


    As you can see from the preceding figure, a head node, in addition to supporting
    all the functionality of the worker node, has two additional components:


    *Global control store*


    Contains cluster-wide information including object table, task table, function
    table, events log, etc. The content of this store is used for web UI, error diagnostics,
    debugging, and profiling tools.


    *Autoscaler*


    Attempts to launch/terminate worker nodes to ensure that workloads have sufficient
    resources to run while minimizing the idle resources.'
  merge: -1
  pgno: 7
- img_proc: true
  md: 'The head node is effectively a master (singleton⁵) which manages a complete
    cluster (via autoscaler). Each of the Ray’s nodes contains a Raylet, that consists
    of two main components:


    *Object store*


    All of the object stores are connected together and you can think about this collection
    somewhat similar to memcached, a distributed cache.


    *Schedular*


    Each Ray node provides a local schedular that can communicate with each other
    thus create a unified distributed scheduler for overall Ray cluster.


    When we are talking about nodes in a Ray cluster we are not talking about physical
    machines, but rather about logical nodes based on docker images. As a result,
    when mapping to physical machines, a given physical node can run one or more logical
    nodes.


    `ray up`, which is included as part of Ray, allows you to create clusters and
    it will:


    +   - Provision a new instance/machine (if running on the cloud⁶ or cluster manager)
    using the provider’s SDK or accessing machines, if running directly on physical
    machines

    - Execute shell commands to set up Ray with the desired options

    - Run any custom, user defined setup commands, for example, setting environment
    variables and installing packages

    - Initialize the Ray cluster

    - Deploy an autoscaler if required'
  merge: -1
  pgno: 8
- img_proc: true
  md: 'In addition to `ray up`, if running on kubernetes you can use Ray kubernetes
    operator. Although `ray up` or kubernetes operator are preferred ways of Ray cluster
    creation, if you have a set of existing machines (either physical or VMs) you
    can set up the Ray cluster manually.

    Regardless of which deployment approach you take, the same Ray code should work
    everywhere.⁷ We’ll look more at running Ray in local mode in the next chapter,
    and if you want to scale even more we’ll cover deploying to the cloud and resource
    managers in [Link to Come].


    # Running Your Code with Ray


    Ray is more than just a library you import; it is also a cluster management tool.
    In addition to importing the library you need to “connect” to a Ray cluster. You
    have three options for how to connect your code to a Ray cluster:


    *Calling `ray.init()` with no arguments*


    This launches an embedded, single-node Ray instance that is immediately available
    to the application.


    *Using the Ray client*

    `ray.init("ray://<head_node_host>:10001")` to connect to a Ray cluster


    By default, each Ray cluster launches with a Ray client server running on the
    head node that can receive remote client connections. Note however that when the
    client is located remotely, some operations run directly from the client may be
    slower due to WAN latencies. Ray is not resilient to network failures between
    the head node and the client.


    *Using the Ray command-line API*


    You can use the `ray submit` command to execute Python scripts on clusters. This
    will copy the designated file onto the head node cluster and execute it with the
    given arguments. Note that if you are passing the'
  merge: -1
  pgno: 9
- img_proc: true
  md: 'parameters, your code should use the Python `sys` module that provides access
    to any command-line arguments via the `sys.argv`. This removes the potential networking
    point of failure when using the ray client.


    # Where Does It Fit in the Ecosystem?


    Ray sits at a unique intersection of problem spaces. The first problem that Ray
    solves is that of scaling your Python code by managing resources, be it servers,
    threads, or GPUs. Ray’s core building blocks are a scheduler, distributed data
    storage, and actor system. The scheduler that Ray uses is general purpose enough
    to exist in the space of workflow scheduling, not just with “traditional” problems
    of scale. Ray’s actor system gives you a simple way of handling resilient distributed
    execution state.⁸ In addition to the scalable building blocks, Ray has higher-level
    libraries such as Serve, Data, Tune, RLlib, Train and Workflows that exist in
    the machine learning problem space. Overall Ray ecosystem is presented in Figure
    1-1.'
  merge: -1
  pgno: 10
- img_proc: true
  md: '![](img/14b93f3cc9905cb480ce327eeabf6b78_11_0.png)


    Figure 1-1. The Ray ecosystem


    Let’s take a look at some of the different problem spaces and see how Ray fits
    in and compares with existing tools.


    **Table 1-1** compares Ray to several related system categories.'
  merge: -1
