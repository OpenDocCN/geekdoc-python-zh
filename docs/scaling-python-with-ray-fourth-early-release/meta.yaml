- md: "## Register serializer and deserializer the BadClass:\n```python\nray.util.register_serializer(\n\
    \    BadClass, serializer=custom_serializer,\n    deserializer=custom_deserializer)\n\
    ray.get(ray.put(i))\n```\n\nOtherwise you would need to subclass and extend the\
    \ classes, which can make your code difficult to read when working with external\
    \ libraries.\n\n> **NOTE**\n>\n> Cloudpickle requires that the version of Python\
    \ loading and the version of Python reading is exactly the same. This requirement\
    \ carries forward and means that all of Ray’s workers must have the same Python\
    \ version.\n\n## Apache Arrow\n\nAs mentioned before, Ray uses Apache Arrow to\
    \ serialize Datasets when possible. Ray DataFrames can have types that are not\
    \ supported by Apache Arrow. Under the hood, Ray performs schema inference or\
    \ translation when loading data into Datasets. If Arrow can not represent a type,\
    \ Ray serializes the dataset using lists via Cloudpickle.\n\nApache Arrow works\
    \ with many data processing and machine learning tools, including Pandas, PySpark,\
    \ Tensorflow, and Dask. Arrow is a columnar format with a strongly typed schema.\
    \ It is generally more space-efficient than pickling, and it can be used not only\
    \ between different versions of Python but also between programming languages\
    \ (e.g. Rust/C/Java/Python/CUDA/ etc.)\n\n> **NOTE**\n>\n> Not all tools using\
    \ Apache Arrow support all of the same data types. For example, Arrow supports\
    \ nested columns, which Pandas does not.\n\n## GRPC\n\nWhile you won’t interact\
    \ directly with gRPC (gRPC remote procedure calls) in the same way you do with\
    \ cloudpickle and arrow, it forms the foundation of communication inside of Ray.\
    \ gRPC uses protocol buffers for serialization, which is incredibly fast for small\
    \ objects. Larger objects are serialized with Arrow or cloudpickle and put in\
    \ Ray’s object store. Like Apache Arrow, gRPC & protocol buffers have native implementations\
    \ in all of the languages used in Ray.\n\n## Resources/Vertical Scaling\n\nBy\
    \ default Ray assumes that all functions and actors have the same resource requirements\
    \ (e.g. 1 CPU). For actors or functions with different resource requirements,\
    \ you can specify the resources that your function or actor needs. The scheduler\
    \ will attempt to find a node that has these resources available, and if there\
    \ are none, the autoscaler, covered next, will attempt to allocate a node that\
    \ meets those requirements.\n\nThe ray.remote decorator takes num_cpus, num_gpus,\
    \ and memory as parameters to indicate the amount of resources an actor or remote\
    \ function will consume. The defaults are one CPU and zero GPUs. You can override\
    \ this value by specifying required resources in the @ray.remote annotation, for\
    \ example, usage of annotation @ray.remote(num_cpus=4, num_gpus=2) will request\
    \ four CPUs and two GPUs for function execution.\n\n> **TIP**\n>\n> Most resource\
    \ requests in Ray are “soft”, which means that Ray does not enforce or guarantee\
    \ the limits, but does its best to try and meet them.\n\nIf you know how much\
    \ memory a task or actor requires, you can specify it in the resource requirements\
    \ of its ray.remote annotation to enable memory-aware scheduling.¹⁰ For example,\
    \ `@ray.remote(memory=500 * 1024 * 1024)` will request 500MiB of memory for this\
    \ task.¹¹\n\n## RAY MEMORY USAGE\n\nRay memory usage is split into two main groups\
    \ - memory used by Ray itself (Ray system memory) and memory used by applications\
    \ (Ray application memory). Ray’s system memory is currently comprised of:\n\n\
    - Redis: memory used for storing the list of nodes and actors present in the cluster.\
    \ The amount of memory used for these purposes is typically quite small.\n- Raylet:\
    \ memory used by the C++ raylet process running on each node. This cannot be controlled\
    \ but is typically quite small.\n\nRay application memory is comprised of:\n\n\
    - Worker heap: memory used by users’ application, best measured as the resident\
    \ set size (RSS) of your application minus its shared memory usage (SHR) in commands\
    \ such as top.\n- Object store memory: memory used when your application creates\
    \ objects in the object store via ray.put and when returning values from remote\
    \ functions. Objects are evicted when they fall out of scope. There is an object\
    \ store server running on each node. Objects will be spilled to disk if the object\
    \ store fills up.\n- Object store shared memory: memory used when your application\
    \ reads objects via ray.get.\n\nTo help you to debug some of the memory issues\
    \ Ray provides a ray memory command that can be invoked from the command line\
    \ from the machine where the Ray node is running (at the time of this writing\
    \ there is no corresponding API). This command allows you to get a dump of all\
    \ of the ObjectRef references that are currently held by the driver, actors, and\
    \ tasks in the cluster. This allows to track down what ObjectRef references are\
    \ in scope and may be causing an ObjectStoreFullError.\n\nRay can also keep track\
    \ of and assign custom resources using the same mechanism as memory and CPU resources.\
    \ When the worker process is starting, it needs to know all of the resources that\
    \ are present. For manually launched workers you specify the customs resources\
    \ with a `--resources` argument. For example, on a mixed ARCH cluster, you might\
    \ want to add `--resources={\"x86\": \"1\"}` to the x86 nodes and `--resources={\"\
    arm64\": \"1\"}` to the ARM nodes. See [Link to Come] to configure resources with\
    \ your deployment mechanism.\n\n> **TIP**\n>\n> These resources don’t need to\
    \ be limited to hardware, if you have certain libraries or datasets only available\
    \ on some nodes due to licensing, you can use the same technique.\n\nSo far we’ve\
    \ focused on horizontal scaling, but you can also use Ray to get more resources\
    \ for each process. Scaling by using machines with more resources is known as\
    \ vertical scaling. You can request different amounts of memory, CPU cores, or\
    \ even GPUs from Ray for your tasks and actors. The default Ray configuration\
    \ only supports machines of the same size, but as covered in [Link to Come], you\
    \ can create multiple node types. If you create node or container types of different\
    \ sizes this can be used for vertical scaling.\n\n## Autoscaler\n\nOne of the\
    \ important components of Ray is the autoscaler, which is responsible for managing\
    \ the workers. More specifically, autoscaler is responsible for the following\
    \ three functions:¹²\n\n- Launching of the new workers (based on demand) including:\n\
    \    - Uploading user defined files or directories\n    - Running init/setup/start\
    \ commands on the started worker\n- Termination of worker nodes if:\n    - The\
    \ node is idle\n    - The node is failing to startup/initialize\n    - The node\
    \ configuration changed\n- Restarting workers if:\n    - The Raylet running a\
    \ worker crashes\n    - Worker’s set up/startup/file mounts changes\n\nThe auto-scaler\
