    # Building stream processing applications with Ray


    There are two important classes of stream processing:


    +   - *Stateless stream processing*, where each event is handled completely independently
    from any previous events or mutable shared state. Given an event, the stream processor
    will treat it exactly the same way every time, no matter what data arrived beforehand
    or the state of the execution.

    - *Stateful stream processing*, which means that a “state” is shared between events
    and can influence the way current events are processed. The state, in this case,
    can be a result of previous events or produced by an external system, controlling
    stream processing.


    Stateless stream processing implementations are typically simple and straightforward,
    They require an extension of the *start* method of the Kafka consumer (Example
    6-2) to implement any required transformation of the incoming messages. The result
    of these transformations can be sent either to different Kafka topics or to any
    other part of the code. An example stateless a streaming application can be found
    [here](here).


    Implementing stateful stream processing is typically more involved. Let’s take
    a look at different options for implementing stateful stream processing based
    on [dynamically controlled streams](dynamically controlled streams).


    # Implementing stateful stream processing


    Our sample implementation uses the heater controller example⁹ which consists of
    the following:'
