    \ here, the Ray microservice framework is a very solid foundation for model serving\
    \ that satisfies all of the main requirements for model serving.\n\nThe last thing\
    \ that you are going to learn in this chapter is the implementation of one of\
    \ the advanced model serving techniques - speculative model serving - using the\
    \ Ray microservices framework.\n\n## Implementing Speculative Model serving using\
    \ Ray microservice framework\n\nSpeculative model serving is an application of\
    \ speculative execution - an optimization technique where a computer system performs\
    \ some task that may not be needed. In a nutshell, speculative execution is about\
    \ performing some task that may not be needed. The work is done before knowing\
    \ whether it is actually required. This allows getting results upfront, so if\
    \ they are actually needed they will be available with no delay. Speculative execution\
    \ is important in model serving because it provides the following features for\
    \ machine-serving applications:\n\n- Guaranteed execution time. Assuming that\
    \ you have several models, with the fastest providing fixed execution time, it\
    \ is possible to provide a model serving implementation with a fixed upper limit\
    \ on execution time, as long as that time is larger than the execution time of\
    \ the simplest model.\n- Consensus-based model serving. Assuming that you have\
    \ several models, you can implement model serving where prediction is the one\
    \ returned by the majority of the models.\n- Quality-based model serving. Assuming\
    \ that you have a metric allowing you to evaluate the quality of model serving\
    \ results, this approach allows you to pick the result with the best quality.\n\
    \nHere you will learn how to implement a consensus-based model serving using Ray’s\
    \ microservice framework.\n\nYou have learned earlier in this chapter how to implement\
    \ red wine quality scoring using three different models: random forest, gradient\
    \ boost, and XGBoost. Now let’s try to produce an implementation that returns\
    \ the result on which at least 2 models agree. The basic implementation looks\
    \ as follows (Example 7-15).\n\n### Example 7-15. Consensus-based model serving\n\
    \n```python\n@serve.deployment(route_prefix=\"/speculative\")\nclass Speculative:\n\
    \    def __init__(self):\n        self.rfhandle = RandomForestModel.get_handle(sync=False)\n\
    \        self.xgboosthandle = XGBoostModel.get_handle(sync=False)\n        self.grboosthandle\
    \ = GRBoostModel.get_handle(sync=False)\n    async def __call__(self, request):\n\
    \        payload = await request.json()\n        f1, f2, f3 = await asyncio.gather(self.rfhandle.serve.remote(payload),\n\
    \                                         self.xgboosthandle.serve.remote(payload),\n\
    \                                         self.grboosthandle.serve.remote(payload))\n\
    \        rfresult = ray.get(f1)['result']\n        xgresult = ray.get(f2)['result']\n\
    \        grresult = ray.get(f3)['result']\n        ones = []\n        zeros =\
    \ []\n        if rfresult == \"1\":\n            ones.append(\"Random forest\"\
    )\n        else:\n            zeros.append(\"Random forest\")\n        if xgresult\
    \ == \"1\":\n            ones.append(\"XGBoost\")\n        else:\n           \
    \ zeros.append(\"XGBoost\")\n        if grresult == \"1\":\n            ones.append(\"\
    Gradient boost\")\n        else:\n            zeros.append(\"Gradient boost\"\
    )\n        if len(ones) >= 2:\n            return {\"result\": \"1\", \"methods\"\
    : ones}\n        else:\n            return {\"result\": \"0\", \"methods\": zeros}\n\
    ```\n\nThe constructor of this deployment is creating handles for all of your\
    \ deployments implementing individual models. Note that here we are creating async\
    \ handles that allow parallel execution of each deployment.\n\nThe `__call__`\
    \ method gets the payload and starts execution of all three models in parallel\
    \ and then waits for all of them to complete (see this great article on using\
    \ `asyncio` for the execution of many coroutines and running them concurrently).\
    \ Once you have all the results, you implement the consensus calculations and\
    \ return the result (along with methods that voted for it) back.¹\n\n## Conclusion\n\
    \nIn this chapter, you have learned Ray’s implementation of the microservice framework\
    \ and how this framework can be used by model serving. We started by describing\
    \ a basic microservices deployment and extensions allowing for better control,\
    \ scale, and extending of the deployment’s execution. We then showed an example\
    \ of how this framework can be used to implement model serving, analyzed typical\
    \ model serving requirements, and showed how they can be satisfied by Ray. Finally,\
    \ you have learned how to implement an advanced model serving example - consensus-based\
    \ model serving, allowing to improve the quality of individual model serving methods.\
    \ An interesting [blog post](https://example.com) shows how to bring together\
    \ the basic building blocks described here into more complex implementations.\n\
    \nIn the next chapter, you will learn about workflows implementation in Ray and\
    \ how to use them for automating your application execution.\n\n> 1 You can also\
    \ implement different policies for waiting for the model’s execution. If you want,\
    \ for example, use at least one model’s result you can use `asyncio.wait(tasks,\
    \ return_when=asyncio.FIRST_COMPLETED)` or just wait for a given time interval\
    \ `asyncio.wait(tasks, interval)`.\n\n## About the Authors\n\n**Holden Karau**\
    \ is a queer transgender Canadian, Apache Spark committer, Apache Software Foundation\
    \ member, and an active open source contributor. As a software engineer, she’s\
