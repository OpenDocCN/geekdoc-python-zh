    \ num_gpus=2)` 将为函数执行请求四个 CPU 和两个 GPU。\n\n> **提示**\n>\n> Ray 中的大多数资源请求是“软性”的，这意味着\
    \ Ray 不会强制执行或保证限制，但会尽力尝试满足它们。\n\n如果你知道一个任务或 Actor 需要多少内存，你可以在其 `ray.remote` 注解的资源需求中指定它，以启用内存感知调度。¹⁰\
    \ 例如，`@ray.remote(memory=500 * 1024 * 1024)` 将为此任务请求 500MiB 的内存。¹¹\n\n## RAY 内存使用\n\
    \nRay 的内存使用分为两大类 - Ray 本身使用的内存（Ray 系统内存）和应用程序使用的内存（Ray 应用程序内存）。Ray 的系统内存目前包括：\n\
    \n- Redis：用于存储集群中存在的节点和 Actor 列表的内存。用于这些目的的内存量通常相当小。\n- Raylet：在每个节点上运行的 C++ raylet\
    \ 进程使用的内存。这无法控制，但通常相当小。\n\nRay 应用程序内存包括：\n\n- Worker 堆：用户应用程序使用的内存，最好通过 `top`\
    \ 等命令中应用程序的常驻集大小（RSS）减去其共享内存使用量（SHR）来衡量。\n- 对象存储内存：当你的应用程序通过 `ray.put` 在对象存储中创建对象以及从远程函数返回值时使用的内存。对象在超出作用域时会被驱逐。每个节点上都运行着一个对象存储服务器。如果对象存储已满，对象将被溢出到磁盘。\n\
    - 对象存储共享内存：当你的应用程序通过 `ray.get` 读取对象时使用的内存。\n\n为了帮助你调试一些内存问题，Ray 提供了一个 `ray memory`\
    \ 命令，可以从运行 Ray 节点的机器上的命令行调用（在撰写本文时，没有对应的 API）。此命令允许你获取集群中驱动程序、Actor 和任务当前持有的所有\
    \ ObjectRef 引用的转储。这有助于追踪哪些 ObjectRef 引用在作用域内，并可能导致 ObjectStoreFullError。\n\nRay\
    \ 还可以使用与内存和 CPU 资源相同的机制来跟踪和分配自定义资源。当工作进程启动时，它需要知道所有存在的资源。对于手动启动的工作进程，你可以使用 `--resources`\
    \ 参数指定自定义资源。例如，在混合架构集群中，你可能希望在 x86 节点上添加 `--resources={\"x86\": \"1\"}`，在 ARM\
    \ 节点上添加 `--resources={\"arm64\": \"1\"}`。请参阅 [即将发布的链接] 以使用你的部署机制配置资源。\n\n> **提示**\n\
    >\n> 这些资源不必局限于硬件，如果你由于许可原因在某些节点上才有某些库或数据集，你可以使用相同的技术。\n\n到目前为止，我们主要关注水平扩展，但你也可以使用\
    \ Ray 为每个进程获取更多资源。通过使用具有更多资源的机器进行扩展称为垂直扩展。你可以为你的任务和 Actor 从 Ray 请求不同数量的内存、CPU\
    \ 核心甚至 GPU。默认的 Ray 配置仅支持相同大小的机器，但如 [即将发布的链接] 中所述，你可以创建多种节点类型。如果你创建不同大小的节点或容器类型，这可以用于垂直扩展。\n\
    \n## 自动扩缩器\n\nRay 的重要组件之一是自动扩缩器，它负责管理工作进程。更具体地说，自动扩缩器负责以下三个功能：¹²\n\n- 启动新的工作进程（基于需求），包括：\n\
    \    - 上传用户定义的文件或目录\n    - 在启动的工作进程上运行初始化/设置/启动命令\n- 终止工作节点，如果：\n    - 节点空闲\n\
    \    - 节点启动/初始化失败\n    - 节点配置发生更改\n- 重启工作进程，如果：\n    - 运行工作进程的 Raylet 崩溃\n   \
    \ - 工作进程的设置/启动/文件挂载发生更改\n\n自动扩缩器根据以下事件创建新节点：¹³\n\n- 使用最小节点配置创建集群。在这种情况下，自动扩缩器创建所需数量的节点。\n\
    - 资源需求。对于具有资源需求的远程函数，自动扩缩器检查集群是否能满足额外的资源需求，如果不能，则创建新的工作节点。\n- 放置组。类似于资源需求，对于新的放置组，自动扩缩器检查集群是否有足够的资源，如果没有，则创建新的工作节点。\n\
    - SDK *request_resources* 函数调用类似于集群创建请求，但这些资源在集群的生命周期内永远不会被释放。\n\nRay 的自动扩缩器适用于不同的节点/计算机类型，这些类型可以映射到不同的物理实例类型（例如不同的\
    \ AWS 节点类型）或加速器（例如 GPU）。\n\n## 放置组 - 组织你的任务和 Actor\n\nRay 应用程序使用放置组来组织任务以及预分配资源。组织任务有时对于重用资源和提高数据局部性很重要。\n\
    \n> **提示**\n>\n> Ray 使用基于节点的数据存储，因此在同一节点上运行多个具有大量数据交换的函数可以实现数据局部性，从而通常可以提高整体执行性能。\n\
    \n数据局部性可以减少需要传输的数据量，其基于序列化函数通常比序列化你的数据更快的想法。¹⁴ 另一方面，它也可以通过确保工作分布在许多计算机上来最小化硬件故障的影响。预分配资源可以通过允许自动扩缩器在需要之前请求多台机器来加速你的工作。\n\
    \n当你启动一个远程函数/Actor 时，Ray 可能需要启动一个额外的节点以满足资源需求，这会延迟函数/Actor 的创建。如果你尝试连续创建几个大型函数/Actor，Ray\
    \ 会顺序创建工作进程，这会进一步减慢你的作业速度。你可以使用 Ray 的放置组强制并行分配，这通常可以减少资源等待时间。\n\n> **提示**\n>\n\
    > Ray 原子地创建放置组，因此如果你的任务在运行之前需要最少数量的资源，你也可以使用放置组来实现此效果。但请注意，放置组可能会经历部分重启。\n\n你可以将放置组用于几个不同的目的：\n\
    \n- 预分配资源"
