- md: "With these three components in place, you can now create a Ray application\
    \ to publish and read from Kafka. You can run this application either locally\
    \ or on a cluster. The Ray application itself looks like Example 6-4.\n\n## Example\
    \ 6-4. Bringing it all together\n\n```python\n# Simple callback function to print\
    \ topics\ndef print_message(consumer_id: str, msg):\n    print(f\"Consumer {consumer_id}\
    \ new message: topic={msg.topic()} partition= {msg.partition()} \"\n         \
    \ f\"offset={msg.offset()} key={msg.key().decode('UTF8')}\")\n    print(json.loads(msg.value().decode('UTF8')))\n\
    \n# Setup topics\nsetup_topics()\n\n# Setup random number generator\nseed(1)\n\
    \n# Start Ray\nray.init()\n\n# Start consumers and producers\nn_consumers = 1\
    \    # Number of consumers\nconsumers = [KafkaConsumer.remote(print_message) for\
    \ _ in range(n_consumers)]\nproducer = KafkaProducer.remote()\nrefs = [c.start.remote()\
    \ for c in consumers]\n\n# publish messages\nuser_name = 'john'\nuser_favorite_color\
    \ = 'blue'\n\n# loop forever publishing messages to Kafka\ntry:\n    while True:\n\
    \        user = {\n            'name': user_name,\n            'favorite_color':\
    \ user_favorite_color,\n            'favorite_number': randint(0, 1000)\n    \
    \    }\n        producer.produce.remote(user, str(randint(0, 100)))\n        sleep(1)\n\
    \n# end gracefully\nexcept KeyboardInterrupt:\n    for c in consumers:\n     \
    \   c.stop.remote()\nfinally:\n    for c in consumers:\n        c.destroy.remote()\n\
    \    producer.destroy.remote()\n    ray.kill(producer)\n```\n\nThe code above\
    \ does the following:\n\n1.  defines a simple callback function for the Kafka\
    \ consumer that just prints the message.\n2.  initializes Ray.\n3.  creates required\
    \ topics.\n4.  starts both producer and consumers (the code allows us to specify\
    \ the number of consumers we want to use).\n5.  calls start method on all created\
    \ consumers.\n6.  once all consumers are created, the producer starts sending\
    \ Kafka requests every second.\n\nAdditionally, the code also implements graceful\
    \ termination, ensuring that all resources are cleaned up, once the job is interrupted.\n\
    \nThe complete code for this example is [here](here).\n\nOnce the code runs it\
    \ produces the output that looks as follows (Example 6-5).\n\n## Example 6-5.\
