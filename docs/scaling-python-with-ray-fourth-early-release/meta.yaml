    \ group of resources for a worker is known as a resource bundle and must be able\
    \ to fit inside a single machine, otherwise the autoscaler will be unable to create\
    \ the node types and the placement group will never be scheduled.\n\nPlacement\
    \ groups are collections of resource bundles, where a resource bundle is a collection\
    \ of resources (CPU, GPU, etc.). You define the resource bundles with the same\
    \ arguments. Each resource bundle must fit on a single machine.\n\nYou control\
    \ how Ray schedules your resource group by setting placement strategies. Your\
    \ placement strategy can either try and reduce the number of nodes (improving\
    \ locality), or spreading the work out more (improving reliability and load balancing).\
    \ You have a few variations on these core strategies to choose from:\n\n+   -\
    \ STRICT_PACK - all bundles must be placed into a single node on the cluster.\n\
    - PACK - all provided bundles are packed onto a single node on a best-effort basis.\
    \ If strict packing is not feasible, bundles can be placed onto other nodes. This\
    \ is the default placement group strategy."
