  - '[PAGE 8]


    The head node is effectively a master (singleton⁵) which manages a complete cluster
    (via autoscaler). Each of the Ray’s nodes contains a Raylet, that consists of
    two main components:


    *Object store*


    All of the object stores are connected together and you can think about this collection
    somewhat similar to memcached, a distributed cache.


    *Schedular*


    Each Ray node provides a local schedular that can communicate with each other
    thus create a unified distributed scheduler for overall Ray cluster.


    When we are talking about nodes in a Ray cluster we are not talking about physical
    machines, but rather about logical nodes based on docker images. As a result,
    when mapping to physical machines, a given physical node can run one or more logical
    nodes.


    `ray up`, which is included as part of Ray, allows you to create clusters and
    it will:


    +   - Provision a new instance/machine (if running on the cloud⁶ or cluster manager)
    using the provider’s SDK or accessing machines, if running directly on physical
    machines

    - Execute shell commands to set up Ray with the desired options

    - Run any custom, user defined setup commands, for example, setting environment
    variables and installing packages

    - Initialize the Ray cluster

    - Deploy an autoscaler if required'
