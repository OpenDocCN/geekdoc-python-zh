- img_proc: true
  md: '# systems


    | Cluster orchestrators | Cluster orchestrators, like Kubernetes, SLURM, and YARN,
    schedule containers. Ray can leverage these for allocating cluster nodes. |

    | --- | --- |

    | Parallelization frameworks | Compared to Python parallelization frameworks such
    as multiprocessing or Celery, Ray offers a more general, higher-performance API.
    In addition Ray’s distributed objects support data sharing across parallel executors.
    |

    | Data processing frameworks | Ray’s lower-level APIs are more flexible and better
    suited for a “distributed glue” framework than existing data processing frameworks
    such as Spark, MARS, or Dask. Although Ray has no inherent understanding of data
    schemas, relational tables, or streaming dataflow, it supports running many of
    these data processing frameworks, for example, Modin, Dask-on-Ray, MARS-on-Ray,
    and RayDP (Spark on Ray). |

    | Actor frameworks | Unlike specialized actor frameworks such as Erlang, Akka,
    and Orleans, Ray integrates Actor framework directly into programming languages.
    In addition Ray’s distributed objects support data sharing across actors. |

    | Workflows | When most people talk about workflows they talk about UI or script-driven
    low code development. While this approach might be very useful for non-technical
    users, they frequently bring more pain than value to software engineers. Ray uses
    programmatic workflow implementation (compare to Cadence). Implementation combines
    the flexibility of Ray’s dynamic task graphs with strong durability guarantees.
    It offers sub-second overheads for task launch and supports workflows with hundreds
    of thousands of steps. It also takes advantage of the Ray object store to pass
    distributed datasets between steps. |

    | HPC Systems | Unlike Ray, which exposes tasks and actors APIs, a majority of
    HPC systems expose lower-level messaging APIs, providing a greater application
    flexibility. Additionally many of the HPC implementations offer optimized collective
    communications primitives. Ray provides a Collection Communications library that
    implements many of these functionalities. |'
  merge: -1
