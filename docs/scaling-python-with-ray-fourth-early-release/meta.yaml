- md: "## Gang Scheduling\n\n- ensuring that all tasks/actors will be scheduled and\
    \ start at the same time.\n\n## Organizing your tasks and actors inside your cluster:\n\
    \n- Maximizing data locality - ensuring placing off all your tasks and actors\
    \ close to your data to avoid object transfer overheads.\n- Load balancing - improving\
    \ application availability by placing your actors or tasks into different physical\
    \ machines as much as possible.\n\nPlacement groups consist of both the desired\
    \ resources for each worker, as well as the placement strategy.\n\nSince a placement\
    \ group can span multiple workers, you must specify the desired resources (or\
    \ resource bundle) for each worker. Each group of resources for a worker is known\
    \ as a resource bundle and must be able to fit inside a single machine, otherwise\
    \ the autoscaler will be unable to create the node types and the placement group\
    \ will never be scheduled.\n\nPlacement groups are collections of resource bundles,\
    \ where a resource bundle is a collection of resources (CPU, GPU, etc.). You define\
    \ the resource bundles with the same arguments. Each resource bundle must fit\
    \ on a single machine.\n\nYou control how Ray schedules your resource group by\
    \ setting placement strategies. Your placement strategy can either try and reduce\
    \ the number of nodes (improving locality), or spreading the work out more (improving\
    \ reliability and load balancing). You have a few variations on these core strategies\
    \ to choose from:\n\n- STRICT_PACK - all bundles must be placed into a single\
    \ node on the cluster.\n- PACK - all provided bundles are packed onto a single\
    \ node on a best-effort basis. If strict packing is not feasible, bundles can\
    \ be placed onto other nodes. This is the default placement group strategy.\n\
    - STRICT_SPREAD - each bundle must be scheduled in a separate node.\n- SPREAD\
    \ - Each bundle will be spread onto separate nodes on a best effort basis. If\
    \ strict spreading is not feasible, some bundles can be collocated on nodes.\n\
    \n> **TIP**\n\nMultiple remote functions or actors can be in the same resource\
    \ bundle. Any functions/actors using the same bundle will always be on the same\
    \ node.\n\nThe lifecycle of placement groups has the following stages:\n\n- *Creation:*\
    \ placement group creation request is sent to the Global Control Structure (GCS)\
    \ that calculates how to distribute the bundles and sends resource reservation\
    \ requests to all the nodes. Ray guarantees placement groups are placed *atomically*.\n\
    - *Allocation:* placement groups are pending creation. If existing Ray nodes can\
    \ satisfy resource requirements for a given strategy, then placing groups are\
    \ allocated and success is returned. Otherwise, the result depends on whether\
    \ Ray is able to add nodes. If the autoscaler is not present or the node limit\
    \ is reached, then placement group allocation fails and the error is returned,\
    \ otherwise the autoscaler scales the cluster to ensure pending groups can be\
    \ allocated.\n- *Node's failure:* when worker nodes<sup>15</sup> that contain\
    \ some bundles of a placement group die, all the bundles will be rescheduled on\
    \ different nodes by GCS. This means that the placement group creation *atomicity*\
    \ only applies to initial placement creation. Once a placement group is created,\
    \ it can become partial due to node failures.\n- *Cleanup:* Ray automatically\
    \ removes placement groups when the job that created the placement group is finished.\
    \ If you'd like to keep the placement group alive regardless of the job that created\
    \ it, you should specify lifetime=\"detached\" during placement group creation.\
    \ You can also explicitly free a placement group at any time by calling `remove_placement_group`.\n\
    \nTo make a placement group you will need a few extra imports, shown in Example\
    \ 5-7. If you are working with Ray in local mode, it’s harder to see the effect\
    \ of placement groups since there is only one node. You can still create CPU only\
    \ bundles together into a placement group. Once you’ve created the placement group\
    \ you can use `options` to run a function or actor in a specific bundle as shown\
    \ in Example 5-8.\n\n### Example 5-7. Placement group imports\n\n```\nfrom ray.util.placement_group\
    \ import (\n    placement_group,\n    placement_group_table,\n    remove_placement_group\n\
    )\n```\n\n### Example 5-8. CPU Only Placement group\n\n```\n# Create a placement\
    \ group.\ncpu_bundle = {\"CPU\": 3}\nmini_cpu_bundle = {\"CPU\": 1}\npg = placement_group([cpu_bundle,\
    \ mini_cpu_bundle])\nray.get(pg.ready())\nprint(placement_group_table(pg))\nprint(ray.available_resources())\n\
    # Run remote_fun in cpu_bundle\nhandle = remote_fun.options(placement_group=pg,\n\
    placement_group_bundle_index=0).remote(1)\n```\n\nIf you are running Ray on a\
    \ cluster you can create a more complex resource group. If you have some GPU nodes\
    \ in your cluster, you can create more complex placement groups. When we run a\
