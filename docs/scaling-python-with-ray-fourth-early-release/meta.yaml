    This will be the seventh chapter of the final book. Please note that the GitHub
    repo will be made active later on.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the editor at vwilson@oreilly.com.


    Initially, Ray was created as a framework for implementing [Reinforcement Learning](https://www.oreilly.com/library/view/reinforcement-learning-for/9781098107611/)
    but gradually morphed into a full-fledged serverless platform. Similarly, initially
    introduced as a [better way to serve ML models](https://www.oreilly.com/library/view/designing-machine-learning/9781098107956/),
    [Ray Serve](https://docs.ray.io/en/latest/serve/index.html) has recently evolved
    into a full-fledged microservices framework. In this chapter, you will learn how
    you can use Ray Serve for implementing a general-purpose microservice framework
    and how to use this framework for model serving.


    Complete code of all examples used in this chapter can be found on [Github](https://github.com/ray-project/ray/tree/master/python/ray/serve).


    # Microservice architecture in Ray


    Ray microservice architecture (Ray Serve) is implemented on top of Ray by leveraging
    [Ray actors](https://docs.ray.io/en/latest/ray-core/actors.html). There are three
    kinds of actors that are created to make up a Serve instance:'
  merge: -1
  pgno: 123
- img_proc: true
  md: "+   - **Controller:** A global actor unique to each Serve instance that manages\
    \ the control plane. It is responsible for creating, updating, and destroying\
    \ other actors. Serve API calls like creating or getting a deployment to make\
    \ remote calls to the Controller.\n- **Router:** There is one router per node.\
    \ Each router is a Uvicorn HTTP server that accepts incoming requests, forwards\
    \ them to replicas, and responds once they are completed.\n- **Worker Replica:**\
    \ Worker replicas execute the user-defined code in response to a request. Each\
    \ replica processes individual requests from the routers.\n\nA user-defined code\
    \ is implemented using a Ray deployment - an extension of a Ray Actor with additional\
    \ features.\n\nWe will start by examining the deployment itself.\n\n# Deployment\n\
    \nThe central concept in Ray Serve is deployment, defining business logic that\
    \ will handle incoming requests and the way this logic is exposed over HTTP or\
    \ in Python. Let’s start with a very simple deployment implementing a temperature\
    \ controller (Example 7-1).\n\n*Example 7-1. Temperature controller deployment*\n\
    \n```\n@serve.deployment\nclass Converter:\n    def __call__(self, request):\n\
    \        if request.query_params[\"type\"] == 'CF' :\n            return {\"Fahrenheit\
    \ temperature\":\n                    9.0/5.0 * float(request.query_params[\"\
    temp\"]) + 32.0}\n        elif request.query_params[\"type\"] == 'FC' :\n    \
    \        return {\"Celsius temperature\":\n                    (float(request.query_params[\"\
    temp\"]) - 32.0) * 5.0/9.0 }\n        else:\n            return {\"Unknown conversion\
    \ code\" : request.query_params[\"type\"]}\n```"
  merge: -1
  pgno: 124
- img_proc: true
  md: "The implementation is decorated by a `@serve.deployment` annotation, which\
    \ tells Ray that this is a deployment. This deployment implements a single method:\
    \ `__call__`. This method has a special meaning in deployment - it is invoked\
    \ via HTTP (see below). It is a class method taking a Starlette Request, which\
    \ provides a convenient interface for the incoming HTTP request. In the case of\
    \ temperature controller, the request contains two parameters - temperature itself\
    \ and conversion type.\n\nOnce the deployment is defined, you need to deploy it\
    \ using the following code `Converter.deploy()`, similar to `.remote()` when deploying\
    \ an actor.\n\nOnce deployed, you can immediately access it via an HTTP interface\
    \ (Example 7-2).\n\n# Example 7-2. Accessing Converter over HTTP\n\n```\nprint(requests.get(\"\
    http://127.0.0.1:8000/Converter?temp=100.0&type=CF\").text)\nprint(requests.get(\"\
    http://127.0.0.1:8000/Converter?temp=100.0&type=FC\").text)\nprint(requests.get(\"\
    http://127.0.0.1:8000/Converter?temp=100.0&type=CC\").text)\n```\n\nNote here\
    \ that we are using URL parameters (query strings) to specify parameters. Also\
    \ because the services are exposed externally via HTTP the requester can run anywhere,\
    \ including code that is running outside of Ray.\n\nThe results of this invocation\
    \ are presented below (Example 7-3).\n\n# Example 7-3. Results of HTTP invocations\
    \ of deployment\n\n```\n{\n    \"Fahrenheit temperature\": 212.0\n}\n{\n    \"\
    Celsius temperature\": 37.77777777777778\n}\n{\n    \"Unknown conversion code\"\
    : \"CC\"\n}\n```\n\nIn addition to being able to invoke a deployment over HTTP,\
    \ you can also invoke it directly using Python. In order to do this, you need\
    \ to get a"
  merge: -1
