    k = LessBadClass(5, [\"boo\", \"boris\"])\npickle.loads(pickle.dumps(k))\n```\n\
    \nAlternatively, Ray allows you to register serializers for classes. This approach\
    \ allows you to change the serialization of classes that are not your own, as\
    \ shown in Example 5-6.\n\n## Example 5-6. Custom serializer; external class\n\
    \n```python\ndef custom_serializer(bad):\n    return {\"threads\": len(bad.p._pool),\
    \ \"friends\": bad.friends}\n\ndef custom_deserializer(params):\n    return BadClass(params[\"\
    threads\"], params[\"friends\"])\n```"
