    \ A simple example of such sequential calculation is presented below Example 3-5.\n\
    \n## Example 3-5. Ray pipelining/sequential remote execution with tasks dependency\n\
    \n```python\n@ray.remote\ndef generate_number(s: int, limit: int, sl: float) ->\
