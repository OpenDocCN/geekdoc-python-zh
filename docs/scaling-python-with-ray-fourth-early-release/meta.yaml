  md: 'The difference of this approach compared to the previous one is that both the
    temperature controller (Example 6-8) and temperature controller manager (Example
    6-9) are converted from Python objects to Ray actors. By doing this both become
    individually addressable and can be located anywhere.¹⁴ Such an approach loses
    execution locality (which can lead to a slight execution time increase), but can
    improve overall scalability of the solution (each actor can run on a separate
    node). If necessary, you can improve scalability even further by leveraging an
    actor’s pool (described in chapter 4) and thus allowing Ray to split execution
    to even more nodes.


    # Going beyond Kafka


    In this chapter you have learned how to use Ray’s native capabilities to implement
    streaming by directly integrating Ray with Kafka. What if you need to use a different
    messaging infrastructure? If your favorite communication backbone provides Python
    APIs, you can integrate it with Ray, similar to the Kafka integration described
    above.


    Another option, as mentioned in the beginning of this chapter, is to use an external
    library, for example, project Rayvens, which internally leverages Apache Camel
    (a generic integration framework) to make it possible to use a wide range of messaging
    backbones. You can find a description of the supported messaging backbones and
    an example of their usage here.


    Similar to the Kafka integration described above, under the hood, Rayvens is implemented
    as a set of Ray actors. The Rayvens base class Stream is a stateless, serializable,
    wrapper around the Stream Ray actor class which is responsible for keeping track
    of the current Rayvens state (see chapter 4 for using actors to manage global
    variables), including currently defined sources and sinks and their connectivity.
    Stream class hides the remote nature of a Stream actor and implement wrappers
    that are internally implementing all communications with the underlying remote
    actor. If you want more control (in terms of execution timing), it is possible
    to invoke methods directly on the stream actor. The stream actor will be reclaimed
    when the original stream handle goes out of scope.'
