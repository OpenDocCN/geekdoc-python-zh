    class AsyncActor:\n    async def computation(self, num):\n        print(f'Actor\
    \ waiting for {num} sec')\n        for x in range(num):\n            await asyncio.sleep(1)\n\
    \            print(f'Actor slept for {x+1} sec')\n        return num\n```\n\n\
