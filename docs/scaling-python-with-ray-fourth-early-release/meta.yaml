    streaming engine, for example, Apache Flink using Kafka.'
- md: 'In this book, we mean streaming as taking action on a series of data close
    to the time when the data is created.


    Some common streaming use cases include the following:


    - Log Analysis is a way of gaining insights into the state of your hardware and
    software. It is typically implemented as a distributed processing of streams of
    logs as they are being produced.

    - Fraud Detection is monitoring financial transactions and watching for anomalies
    that signal fraud in real-time and stopping fraudulent transactions.

    - Cyber Security is the monitoring of interactions with the system to detect anomalies,
    allowing the identification of security issues in real-time to isolate threats.

    - Streaming logistics monitors cars, trucks, fleets, and shipments in real-time,
    to optimize routing.

    - IoT data processing: An example of this is collecting data about an engine to
    gain insights that can detect a faulty situation before becoming a major problem.

    - Recommendation engines are used to understand user interests based on online
    behavior for serving ads, recommending products and services, etc.


    When it comes to implementing streaming applications in Ray you currently have
    two main options:


    - Ray’s ecosystem provides a lot of underlying components, described in the previous
    chapters, that can be used for custom implementations of streaming applications.

    - There are some external libraries and tools that can be used with Ray to implement
    streaming.


    Ray is not built as a streaming system, rather it is an ecosystem that enables
    companies to build streaming systems on these lower-level primitives. You can
    find several stories of users from big and small companies building streaming
    applications on top of Ray.


    With that being said, building a small streaming application on Ray will give
    you a perfect example of how to think about Ray applications, how to use Ray effectively,
    and allow you to understand the basics of streaming applications and how Ray’s
    capabilities can be leveraged for its implementation. Even if you decide to use
    external libraries, this material will help you to make better decisions on whether
    and how to use these libraries.


    One of the most popular approaches for implementing streaming applications is
    the usage of [Apache Kafka](https://kafka.apache.org/) to connect data producers
    with consumers implementing data processing.


    Before delving into Ray’s streaming implementation let’s start with a quick introduction
    to Kafka.


    ## Apache Kafka


    Here we describe only features of Kafka that are relevant for our discussion,
    for in-depth information refers to [Kafka documentation](https://kafka.apache.org/documentation/).


    ### GETTING STARTED WITH KAFKA


    If you want to experiment with Kafka, you can either run it locally or on the
    cloud. For local Kafka installation, refer to these [instructions](https://kafka.apache.org/quickstart).
    Additionally, for Mac installation you can use [Homebrew](https://brew.sh/), following
    this [Github Gist](https://gist.github.com/dhoard/262045129930449e9f2a17800dfd5060).
    Alternatively, you can use Kafka on the cloud, for example, leveraging the [Confluent
    platform](https://www.confluent.io/confluent-cloud/) or any other Kafka installation
    provided by your favorite cloud provider. Finally, if you are working on Kubernetes,
    [Strimzi](https://strimzi.io/) can be a good choice for Kafka installation.


    ## Basic Kafka concepts


    Although many people consider Kafka to be a type of messaging system, similar
    to, for example, RabbitMQ, it is a very different thing. Kafka is a distributed
    log² that stores records sequentially (see Figure 6-1). Kafka records are key/value
    pairs.³ Both keys and values are represented in Kafka as byte arrays and are opaque
    to Kafka itself. Producers always write to the end of the log; while consumers
    can choose the position (offset) where they want to read from.


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_98_0.png)


    The main differences between log-oriented systems like Kafka and messaging systems,
    like RabbitMQ, are:


    - Logs orient systems persist records regardless of whether it is read. Queues
    only contain messages that are waiting for a consumer. You can replay records
    from a Log-based, which traditional messaging systems do not support.⁴

    - While traditional message brokers manage consumers and their offsets, in log
    systems consumers are responsible for managing their offsets. This allows a log-based
    system to support significantly more consumers.


    Similar to the messaging systems, Kafka organizes data into topics. Unlike messaging
    systems, topics in Kafka are purely logical constructs, composed of multiple partitions
    (Figure 6-2).


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_99_0.png)


    Figure 6-2. Anatomy of topic


    Data in a partition is sequential and can be replicated across multiple brokers
    (see below). Partitioning is a vital scalability mechanism, allowing individual
    consumers to read dedicated partitions in parallel and allowing Kafka to store
    the partitions separately.


    When writing to topics, Kafka supports two main partitioning mechanisms during
    write operation: if a key is not defined it uses round-robin partitioning, distributing
    the topic’s messages equally across partitions; if the key is defined, then the
    partition to write to is determined by the key. By default Kafka uses key hashing
    for partitioning. You can also implement custom partitioning mechanism with Kafka.
    Message ordering only happens within a partition, so any messages to be processed
    in order must be in the same partition.


    You deploy Kafka in the form of a cluster composed of multiple (1 to n) brokers
    (servers) to maintain load balancing.⁵ Depending on the configured replication
    factor, each partition can exist on one or more brokers, this can improve Kafka’s
    throughput.


    Kafka clients can connect to any broker and the broker routes the requests transparently
    to one of the correct brokers.


    To understand how applications scale with Kafka, you will need to understand how
    Kafka’s consumer groups (Figure 6-3) work.


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_100_0.png)


    You can assign consumers that read from the same set of topics to a consumer group.
    Kafka then gives each consumer in the group a subset of the partitions. For example,
    if you have a topic with 10 partitions and a single consumer in a group, this
    consumer will read all of the topic’s partitions. With the same topic, if you
    instead have 5 consumers in the group, then each consumer will read two partitions
    from the topic. If you have 11 consumers, 10 of them will each read a single partition,
    and the 11th one will not read any data.


    As you can see, the two main factors in how much you can scale your Kafka reading
    is the number of partitions and the number of consumers in your consumer group.
    It is easier to add more consumers to a consumer group than add new partitions,
    so over provisioning the number of partitions is a best practice.


    ## Kafka APIs


    As defined in the [Kafka documentation](https://kafka.apache.org/documentation/),
    Kafka has five core API groups:


    - The Producer API allows applications to send streams of data to topics in the
    Kafka cluster.

    - The Consumer API allows applications to read streams of data from topics in
    the Kafka cluster.

    - The AdminClient API allows managing and inspecting topics, brokers, and other
    Kafka objects.

    - The Streams API allows transforming streams of data from input topics to output
    topics.

    - The Connect API allows implementing connectors that continually pull from some
    source system or application into Kafka or push from Kafka into some sink system
    or application.


    These APIs are implemented in multiple [languages](https://kafka.apache.org/documentation/#development),
    including Java, C/C++, Go, .Net and Python. We will be using Kafka’s [Python APIs](https://kafka-python.readthedocs.io/)
    for integration with Ray, implementing the first three API groups, which is sufficient
    for our purposes.⁶'
  mdcn: '在本书中，我们所说的流处理，是指在数据产生后不久就对一系列数据采取行动。


    一些常见的流处理用例如下：


    -   日志分析是深入了解硬件和软件状态的一种方式。它通常通过在日志产生时进行分布式处理来实现。

    -   欺诈检测是实时监控金融交易，发现异常信号以识别欺诈行为，并阻止欺诈性交易。

    -   网络安全是监控与系统的交互以检测异常，从而实时识别安全问题并隔离威胁。

    -   流式物流实时监控汽车、卡车、车队和货物，以优化路线。

    -   IoT数据处理：例如，收集发动机数据以获取洞察，从而在故障演变成重大问题之前检测到异常情况。

    -   推荐引擎用于根据在线行为理解用户兴趣，以投放广告、推荐产品和服务等。


    在Ray中实现流处理应用，目前主要有两种选择：


    -   Ray的生态系统提供了许多底层组件（如前几章所述），可用于自定义实现流处理应用。

    -   有一些外部库和工具可以与Ray结合使用来实现流处理。


    Ray并非作为一个流处理系统而构建，而是一个生态系统，使公司能够基于这些底层原语构建流处理系统。你可以找到许多大小公司基于Ray构建流处理应用的案例。


    话虽如此，在Ray上构建一个小型流处理应用，将为你提供一个完美的范例，展示如何思考Ray应用、如何有效使用Ray，并让你理解流处理应用的基础知识以及如何利用Ray的能力来实现它。即使你决定使用外部库，这些材料也将帮助你更好地决策是否以及如何使用这些库。


    实现流处理应用最流行的方法之一是使用[Apache Kafka](https://kafka.apache.org/)来连接数据生产者和实现数据处理的消费者。


    在深入探讨Ray的流处理实现之前，让我们先快速介绍一下Kafka。


    ## Apache Kafka


    这里我们只描述与讨论相关的Kafka特性，深入信息请参考[Kafka文档](https://kafka.apache.org/documentation/)。


    ### Kafka入门


    如果你想尝试Kafka，可以在本地或云端运行。关于本地Kafka安装，请参考这些[说明](https://kafka.apache.org/quickstart)。此外，对于Mac安装，你可以使用[Homebrew](https://brew.sh/)，并参考这个[Github
    Gist](https://gist.github.com/dhoard/262045129930449e9f2a17800dfd5060)。或者，你可以在云端使用Kafka，例如，利用[Confluent平台](https://www.confluent.io/confluent-cloud/)或你喜爱的云提供商提供的任何其他Kafka安装。最后，如果你在Kubernetes上工作，[Strimzi](https://strimzi.io/)是安装Kafka的一个不错选择。


    ## Kafka基本概念


    尽管许多人认为Kafka是一种类似RabbitMQ的消息系统，但它实际上是非常不同的东西。Kafka是一个分布式日志²，按顺序存储记录（见图6-1）。Kafka记录是键/值对³。键和值在Kafka中都表示为字节数组，对Kafka本身是不透明的。生产者总是写入日志的末尾；而消费者可以选择他们想要读取的位置（偏移量）。


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_98_0.png)


    像Kafka这样的日志导向系统与像RabbitMQ这样的消息系统之间的主要区别在于：


    -   日志导向系统无论记录是否被读取都会持久化记录。队列只包含等待消费者的消息。你可以从基于日志的系统中重放记录，而传统消息系统不支持这一点。⁴

    -   虽然传统消息代理管理消费者及其偏移量，但在日志系统中，消费者负责管理自己的偏移量。这使得基于日志的系统能够支持更多的消费者。


    与消息系统类似，Kafka将数据组织成主题。与消息系统不同，Kafka中的主题是纯粹的逻辑构造，由多个分区组成（图6-2）。


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_99_0.png)


    图6-2. 主题的结构


    分区中的数据是顺序的，并且可以跨多个代理（见下文）复制。分区是一种至关重要的可扩展性机制，允许单个消费者并行读取专用分区，并允许Kafka分别存储分区。


    在写入主题时，Kafka在写入操作期间支持两种主要的分区机制：如果未定义键，则使用轮询分区，将主题的消息均匀分配到各个分区；如果定义了键，则写入哪个分区由键决定。默认情况下，Kafka使用键哈希进行分区。你也可以使用Kafka实现自定义分区机制。消息排序仅发生在分区内，因此任何需要按顺序处理的消息必须位于同一分区。


    你以集群形式部署Kafka，该集群由多个（1到n个）代理（服务器）组成，以维持负载均衡。⁵ 根据配置的副本因子，每个分区可以存在于一个或多个代理上，这可以提高Kafka的吞吐量。


    Kafka客户端可以连接到任何代理，代理会将请求透明地路由到正确的代理之一。


    要理解应用程序如何随Kafka扩展，你需要了解Kafka的消费者组（图6-3）是如何工作的。


    ![](img/14b93f3cc9905cb480ce327eeabf6b78_100_0.png)


    你可以将读取相同主题集的消费者分配给一个消费者组。然后Kafka会给组中的每个消费者分配一部分分区。例如，如果你有一个包含10个分区的主题，并且组中只有一个消费者，那么这个消费者将读取该主题的所有分区。对于同一个主题，如果你有5个消费者在组中，那么每个消费者将读取该主题的两个分区。如果你有11个消费者，其中10个将各读取一个分区，而第11个将不会读取任何数据。


    如你所见，扩展Kafka读取能力的两个主要因素是分区数量和消费者组中的消费者数量。向消费者组添加更多消费者比添加新分区更容易，因此过度配置分区数量是一种最佳实践。


    ## Kafka API


    如[Kafka文档](https://kafka.apache.org/documentation/)中所定义，Kafka有五个核心API组：


    -   Producer API允许应用程序向Kafka集群中的主题发送数据流。

    -   Consumer API允许应用程序从Kafka集群中的主题读取数据流。

    -   AdminClient API允许管理和检查主题、代理和其他Kafka对象。

    -   Streams API允许将数据流从输入主题转换到输出主题。

    -   Connect API允许实现连接器，这些连接器持续从某些源系统或应用程序拉取数据到Kafka，或者从Kafka推送到某些接收系统或应用程序。


    这些API在多种[语言](https://kafka.apache.org/documentation/#development)中实现，包括Java、C/C++、Go、.Net和Python。我们将使用Kafka的[Python
    API](https://kafka-python.readthedocs.io/)与Ray集成，实现前三个API组，这对于我们的目的来说已经足够。⁶'
