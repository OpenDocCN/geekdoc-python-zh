    allows you to explicitly specify a prefix used by HTTP requests.\nAdditional configuration\
    \ parameters are described [here](here).\n\n## Implementing Request Routing with\
    \ FastAPI HTTP\n\nAlthough the initial example of a temperature converter deployment\
    \ (Example 7-1) works fine, it is not very convenient to use. The issue is that\
    \ you need to specify the transformation type with every request. A better approach\
    \ is to have two separate endpoints (URLs) for the API - one for Celsius to Fahrenheit\
    \ transformation and one for Fahrenheit to Celsius transformation. You can achieve\
    \ this by leveraging serve [integration](integration) with [FastAPI](FastAPI).\
    \ With this, you can rewrite your temperature converter (Example 7-1) as follows\
    \ (Example 7-9).\n\nExample 7-9. Implementing multiple HTTP APIs in a deployment\n\
    \n```\n@serve.deployment(route_prefix=\"/converter\")\n@serve.ingress(app)\nclass\
    \ Converter:\n    @app.get(\"/cf\")\n    def celsius_fahrenheit(self, temp):\n\
    \        return {\"Fahrenheit temperature\": 9.0/5.0 * float(temp) + 32.0}\n\n\
    \    @app.get(\"/fc\")\n    def fahrenheit_celsius(self, temp):\n        return\
    \ {\"Celsius temperature\": (float(temp) - 32.0) * 5.0/9.0}\n```\n\nNote that\
    \ here, we have introduced two different HTTP accessible APIs with two different\
    \ URLs (effectively converting the second query string parameter to a set of URLs)\
    \ - one per conversion type (we also leverage the `route_prefix` parameter described\
    \ above). This can simplify HTTP access (Example 7-10) compared to the original\
    \ one (Example 7-2).\n\nExample 7-10. Invoking deployment with multiple HTTP endpoints\n\
    \n```\nprint(requests.get(\"http://127.0.0.1:8000/converter/cf?temp=100.0&\").text)\n\
    print(requests.get(\"http://127.0.0.1:8000/converter/fc?temp=100.0\").text)\n\
    ```\n\nAdditional features provided through FastAPI implementation include variable\
    \ routes, automatic type validation, dependency injection (e.g., for database\
    \ connections), security support, and more. Refer to FastAPI documentation on\
    \ how to use these features.\n\n## Deployment composition\n\nDeployments can be\
    \ built as a composition of other deployments. This allows for building very powerful\
    \ deployment pipelines.\n\nLet’s take a look at the specific example - canary\
    \ deployment. In this deployment strategy, you deploy a new version of your code/model\
    \ in a limited fashion to see how it behaves. You can easily build this type of\
    \ deployment using deployment composition. We will start by defining and deploying\
    \ two very simple deployments (Example 7-11).\n\nExample 7-11. Basic deployments\
    \ used for canary deployment\n\n```\n@serve.deployment\ndef version_one(data):\n\
    \    return {\"result\": \"version1\"}\nmodel_one.deploy()\n\n@serve.deployment\n\
    def version_two(data):\n    return {\"result\": \"version2\"}\nmodel_two.deploy()\n\
    ```\n\nThose deployments take any data and return a string - \"result\": \"version1\"\
    \ for deployment one and \"result\": \"version2\" for deployment two. You can\
    \ combine these two deployments by implementing a canary deployment (Example 7-12).\n\
    \nExample 7-12. Canary deployment\n\n```\n@serve.deployment(route_prefix=\"/versioned\"\
    )\nclass Canary:\n    def __init__(self, canary_percent):\n        from random\
    \ import random\n```"
