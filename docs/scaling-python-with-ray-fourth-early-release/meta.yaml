- md: "With these additional methods in place, Python invocations can be significantly\
    \ simplified (Example 7-6).\n\nExample 7-6. Using additional methods for handle-based\
    \ invocation\n\n```\nprint(ray.get(handle.celsius_fahrenheit.remote(100.0)))\n\
    print(ray.get(handle.fahrenheit_celsius.remote(100.0)))\n```\n\nNote that here,\
    \ unlike Example 7-4, which is using the default method `__call__`, invoke methods\
    \ are explicitly specified (instead of putting request type in the request itself,\
    \ request type here is implicit - it's a method name).\n\nRay offers two types\
    \ of handles: synchronous and asynchronous. `Sync` flag `Deployment.get_handle(...,\
    \ sync=True|False)` can be used to specify a handle type.\n\n- The default handle\
    \ is synchronous. In this case, calling `handle.remote()` returns a Ray ObjectRef.\n\
    - To create an asynchronous handle set `sync=False`. Async handle invocation is\
    \ asynchronous and you will have to use `await` to get a Ray ObjectRef. To use\
    \ `await`, you have to run `deployment.get_handle` and `handle.remote` in the\
    \ Python `asyncio` event loop.\n\nWe will demonstrate the usage of async handles\
    \ later in this chapter.\n\nFinally, deployments can be updated by simply modifying\
    \ the code or configuration options and calling `deploy()` again.\n\nIn addition\
    \ to HTTP and direct Python invocation, described here, you can also use the Python\
    \ APIs for invoking deployment using Kafka (see chapter 6 for Kafka integration\
    \ approach).\n\nNow that you know the basics of Deployment, let's take a look\
    \ at additional capabilities available for deployments.\n\n## Additional deployment\
    \ capabilities\n\nAdditional deployment capabilities are provided in three different\
    \ ways:\n\n- Adding parameters to annotations\n- Using FastAPI HTTP Deployments\n\
    - Via Deployment composition\n\nOf course, you can combine all three to achieve\
    \ your goals. Let’s take a close look at the options provided by each of the approaches.\n\
    \n## Adding parameters to annotations\n\nThe `@serve.deployment` annotation can\
    \ take several parameters, the most widely used being the number of replicas and\
    \ resource requirements.\n\n### Improving scalability with resource replicas\n\
    \nBy default, deployment.deploy() creates a single instance of a deployment. By\
    \ specifying the number of replicas in `@serve.deployment` you can scale out a\
    \ deployment to many processes. When the requests are sent to such a replicated\
    \ deployment, Ray uses round-robin scheduling to invoke individual replicas. You\
    \ can modify Example 7-1 to add a number of replicas and ID for individual instances\
    \ (Example 7-7).\n\nExample 7-7. Scaling deployment\n\n```\n@serve.deployment(num_replicas=3)\n\
    class Converter:\n    def __init__(self):\n        from uuid import uuid4\n  \
    \      self.id = str(uuid4())\n    def __call__(self, request):\n        if request.query_params[\"\
    type\"] == 'CF' :\n            return {\"Deployment\": self.id, \"Fahrenheit temperature\"\
    :\n                9.0/5.0 * float(request.query_params[\"temp\"]) + 32.0}\n \
    \       elif request.query_params[\"type\"] == 'FC' :\n            return {\"\
    Deployment\": self.id, \"Celsius temperature\":\n                (float(request.query_params[\"\
    temp\"]) - 32.0) * 5.0/9.0 }\n        else:\n            return {\"Deployment\"\
    : self.id, \"Unknown conversion code\":\n                request.query_params[\"\
    type\"]}\n```\n\nNow the usage of either HTTP or handle based invocation produces\
    \ the following result (Example 7-8).\n\nExample 7-8. Invoking scaled deployment\n\
    \n```\n{'Deployment': '1dcb0b5b-b4ec-49cc-9673-ffbd57362a0d', 'Fahrenheit temperature':\
    \ 212.0}\n{'Deployment': '4dc103c8-d43c-4391-92e0-4e501d01aab9', 'Celsius temperature':\
    \ 37.77777777777778}\n{'Deployment': '0022de58-4e28-41a1-8073-85cdb4193daa', 'Unknown\
    \ conversion code': 'CC'}\n```\n\nLooking at this result you can see that every\
    \ request is processed by a different deployment instance (different ID).\n\n\
    This is manual scaling of deployment. What about autoscaling? Similar to the autoscaling\
    \ of Kafka listeners (discussed in the previous chapter ), Ray’s approach to autoscaling\
    \ is different from the one taken by Kubernetes natively (see, for example, Knative).\
    \ Instead of creating a new instance, Ray’s auto-scaling approach is to create\
    \ more nodes and redistribute deployments appropriately.\n\nIf your deployments\
    \ begin to exceed ~3k requests per second you should also scale the HTTP ingress\
    \ to Ray. By default, the ingress HTTP server is only started on the head node,\
    \ but you can also start an HTTP_server on every node using `serve.start(http_options={\"\
    location\": \"EveryNode\"})`. If you scale the number of HTTP ingress, you will\
    \ also need to deploy a load balancer, available from your cloud provider or installed\
    \ locally.\n\n### Resource requirements for deployments\n\nYou can request specific\
    \ resource requirements in `@serve.deployment`. For example, two cpus and 1 GPU\
    \ would be:\n\n```\n@serve.deployment(ray_actor_options={\"num_cpus\": 2, \"num_gpus\"\
    : 1})\n```\n\nAnother very useful parameter of `@serve.deployment` is `route_prefix`.\
    \ As you can see from the HTTP access example (Example 7-2) the default prefix\
    \ is the name of the Python class used in this deployment. Using `route_prefix`,\
