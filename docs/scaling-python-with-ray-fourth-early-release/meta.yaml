    \nSo, which scaling approach should we use for our implementation? This [blog\
    \ post](https://www.google.com) provides a good summary of features for different\
    \ approaches (Table 4-1).\n\n## Table 4-1. Comparison of different actor scaling\
    \ approaches\n\n| Scaling approach | Feature | Usage criteria |\n| :--- | :---\
    \ | :--- |\n| Actor pool | Multiple processes, high CPU utilization | CPU-bound\
