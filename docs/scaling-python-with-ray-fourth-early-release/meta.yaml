  md: 'Ray applications use placement groups to organize tasks as well as pre-allocate
    resources. Organizing tasks is sometimes important for re-using resources and
    increased data locality.


    > **TIP**


    Ray is using node-based data storage, so running multiple functions with large
    data exchange on the same node leads to data locality and thus can often improve
    overall execution performance


    Data locality can reduce the amount of data to be transferred, and is based on
    the idea it’s often faster to serialize a function than your data.¹⁴ On the flip
    side it can also be used to minimize impact of hardware failure by ensuring work
    is spread out on many computers. Pre-allocating resources can speed up your work
    by allowing the auto-scaler to request multiple machines before they are needed.


    When you start a remote function/actor Ray may need to start an additional node
    to meet the resource needs, which delays the function/actor creation. If you try
    to create several large functions/actors in series, Ray creates the workers sequentially,
    which slows down your job even more. You can force parallel allocation with Ray’s
    placement groups, which often reduces resources waiting time.


    > **TIP**


    Ray creates placement groups atomically, so if you have a minimum number of resources
    required before your task can run, you can also use placement groups for this
    effect. Note though that placement groups can experience partial restarts.


    You can use placement groups for a few different purposes:


    +   - Pre-allocating resources'
