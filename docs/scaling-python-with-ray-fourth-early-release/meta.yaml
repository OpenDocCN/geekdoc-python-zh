    - The thermostat settings are defined as the desired temperature Td and Δt

    - The thermostat settings can arrive at any point.

    - When the temperature falls below Td - Δt, an implementation sends a signal to
    the heater to start.

    - When the temperature goes above Td + Δt a signal is sent to the heater to stop.

    - A very simple “heater model” is used here, where temperature increases by 1
    degree every N(configurable) minutes when the heater is on and decreases by 1
    degree every M(configurable) minutes when it is off.


    The following are simplifications that we made to the original example:


    +   - Instead of using Protobuf marshaling, we are using JSON marshaling (the
    same as in the previous examples), which allows us to marshall/unmarshall Python
    dictionary messages generically.

    - To simplify our implementation, instead of using two queues as in the original
    sample we are using a single queue containing both control and sensor messages,
    discriminating between the two as we receive them. Although it works in our toy
    example, it might not be a good solution in a real-life implementation with a
    large volume of messages, because it can slow down sensor message processing.


    With these simplifications in place, we will here demonstrate two approaches to
    implement stateful stream processing with Ray - a key-based approach and a key
    independent one.


