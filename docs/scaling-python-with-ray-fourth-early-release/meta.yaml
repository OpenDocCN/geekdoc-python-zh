    \ setup function\n\n```python\ndef setup_topics(broker: str = 'localhost:9092',\
    \ topics: [] = ['test'],\n                 partitions: int = 10, replication:\
    \ int = 1):\n    # Recreate topic\n    # Wait for operation completion method\n\
    \    def wait_for_operation_completion(futures: dict, success: str, failure: str):\n\
    \        for topic, f in futures.items():\n            try:\n                f.result()\
    \  # The result itself is None\n                print(f\"Topic {topic} {success}\"\
    )\n            except Exception as e:\n                print(f\"{failure} {topic}\
    \ error {e}\")\n\n    admin = AdminClient({'bootstrap.servers': broker})\n\n \
    \   # Delete topics\n    fs = admin.delete_topics(topics)\n\n    # Wait for each\
    \ operation to finish.\n    wait_for_operation_completion(fs, \" is deleted\"\
    , \"Failed to delete topic \")\n\n    # Wait to make sure topic is deleted\n \
    \   sleep(3)\n    # Call create_topics to asynchronously create topics.\n    new_topics\
    \ = [NewTopic(topic, num_partitions=partitions,\n                           replication_factor=replication)\
    \ for topic in topics]\n    fs = admin.create_topics(new_topics)\n\n    # Wait\
