  - '[PAGE 73]


    There are two possible ways to lose an object. Since the owner is responsible
    for reference counting, if the owner is lost, the object is lost regardless of
    whether there are other copies of the object. If there are no copies of an object
    left Ray, e.g. all the nodes having it stored die, Ray also loses the object.⁶


    > **TIP**


    Ray will follow the `max_retries` limit discussed above during reconstruction.


    Ray’s object store uses reference counting garbage collection⁷ to cleanup objects
    which your program doesn’t need anymore. The object store keeps track of both
    direct references, and ObjectRefs which refer to other ObjectRefs.⁸


    Even with garbage collection, an object store can fill up with objects. When an
    object store fills up, Ray will first execute garbage collection, removing objects
    with no references. If there is still memory pressure, the object store will attempt
    to spill to disk. Spilling to disk copies objects from memory to disk and is called
    spilling since it happens when the memory usage overflows.


    > **NOTE**


    Earlier versions of Ray had the ability to create per-actor object eviction by
    setting a `object_store_memory` limit.


    It’s possible that you may wish to fine-tune the object store settings. Depending
    on your use case, you may need more or less memory for the object store. You configure
    the object store through the `_system_config` settings. Two important configuration
    options include the minimum aggregate size to spill to disk, `min_spilling_size`,
    and total memory allocated to the object store,'
