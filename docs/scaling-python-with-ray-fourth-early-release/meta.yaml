    # Resources/Vertical Scaling


    By default Ray assumes that all functions and actors have the same resource requirements
    (e.g. 1 CPU). For actors or functions with different resource requirements, you
    can specify the resources that your function or actor needs. The scheduler will
    attempt to find a node that has these resources available, and if there are none,
    the autoscaler, covered next, will attempt to allocate a node that meets those
    requirements.


    The ray.remote decorator takes num_cpus, num_gpus, and memory as parameters to
    indicate the amount of resources an actor or remote function will consume. The
    defaults are one CPU and zero GPUs. You can override this value by specifying
    required resources in the @ray.remote annotation, for example, usage of annotation
    @ray.remote(num_cpus=4, num_gpus=2) will request four CPUs and two GPUs for function
    execution.


    > TIP

    Most resource requests in Ray are “soft”, which means that Ray does not enforce
    or guarantee the limits, but does its best to try and meet them.


    If you know how much memory a task or actor requires, you can specify it in the
    resource requirements of its ray.remote annotation to enable memory-'
