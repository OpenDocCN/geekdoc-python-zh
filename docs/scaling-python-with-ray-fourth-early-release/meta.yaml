    \ we can see that the requests are always delivered to the same partition (they\
    \ have the same key).\n\nA key-based approach is a good option for many real world\
    \ implementations. The advantage of this approach is that all of the data processing\
    \ is done locally - inside the same Kafka consumer actor.\n\nThere are two potential\
    \ pitfalls of such implementations:\n\n- As the number of keys grows it is necessary\
