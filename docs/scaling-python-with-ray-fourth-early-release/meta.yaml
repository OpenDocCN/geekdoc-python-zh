- md: "## Building stream processing applications with Ray\n\nThere are two important\
    \ classes of stream processing:\n\n- *Stateless stream processing*, where each\
    \ event is handled completely independently from any previous events or mutable\
    \ shared state. Given an event, the stream processor will treat it exactly the\
    \ same way every time, no matter what data arrived beforehand or the state of\
    \ the execution.\n- *Stateful stream processing*, which means that a “state” is\
    \ shared between events and can influence the way current events are processed.\
    \ The state, in this case, can be a result of previous events or produced by an\
    \ external system, controlling stream processing.\n\nStateless stream processing\
    \ implementations are typically simple and straightforward. They require an extension\
    \ of the *start* method of the Kafka consumer (Example 6-2) to implement any required\
    \ transformation of the incoming messages. The result of these transformations\
    \ can be sent either to different Kafka topics or to any other part of the code.\
    \ An example stateless streaming application can be found [here](here).\n\nImplementing\
    \ stateful stream processing is typically more involved. Let’s take a look at\
    \ different options for implementing stateful stream processing based on [dynamically\
    \ controlled streams](dynamically controlled streams).\n\n## Implementing stateful\
    \ stream processing\n\nOur sample implementation uses the heater controller example⁹\
    \ which consists of the following:\n\n- There is a constant stream of temperature\
    \ measurements from the sensor.\n- The thermostat settings are defined as the\
    \ desired temperature Td and Δt.\n- The thermostat settings can arrive at any\
    \ point.\n- When the temperature falls below Td - Δt, an implementation sends\
    \ a signal to the heater to start.\n- When the temperature goes above Td + Δt\
    \ a signal is sent to the heater to stop.\n- A very simple “heater model” is used\
    \ here, where temperature increases by 1 degree every N (configurable) minutes\
    \ when the heater is on and decreases by 1 degree every M (configurable) minutes\
    \ when it is off.\n\nThe following are simplifications that we made to the original\
    \ example:\n\n- Instead of using Protobuf marshaling, we are using JSON marshaling\
    \ (the same as in the previous examples), which allows us to marshall/unmarshall\
    \ Python dictionary messages generically.\n- To simplify our implementation, instead\
    \ of using two queues as in the original sample we are using a single queue containing\
    \ both control and sensor messages, discriminating between the two as we receive\
    \ them. Although it works in our toy example, it might not be a good solution\
    \ in a real-life implementation with a large volume of messages, because it can\
    \ slow down sensor message processing.\n\nWith these simplifications in place,\
    \ we will here demonstrate two approaches to implement stateful stream processing\
    \ with Ray - a key-based approach and a key independent one.\n\n## Key-based approach\n\
    \nMany stateful streaming applications rely on Kafka message keys. Remember that\
    \ Kafka partitioning uses the key hash to determine which partition a message\
    \ is written to. This means that Kafka guarantees that all of the messages with\
    \ the same key are always picked up by the same consumer. In this case, it is\
    \ possible to implement stateful stream processing locally on the Kafka consumer\
    \ that receives them. Because the consumer is implemented as a Ray Actor, Ray\
    \ keeps track of the data inside the actor.¹⁰\n\nFor this implementation, we created\
    \ a small heater simulator program that you can find in the [accompanying Github\
    \ project](https://github.com)¹¹ that publishes and gets data based on the heater\
    \ ID.¹² With this in place you can implement the temperature controller as follows\
    \ (Example 6-7).\n\n### Example 6-7. Implementation of temperature controller\n\
    \n```python\nfrom enum import Enum\nclass Action(Enum):\n    NONE = -1\n    OFF\
    \ = 0\n    ON = 1\n\nclass BaseTemperatureController:\n    def __init__(self,\
    \ id: str):\n        self.current_setting = None\n        self.previous_command\
    \ = -1\n        self.id = id\n\n    # Process new message\n    def process_new_message(self,\
    \ message: dict):\n        if 'measurement' in message:    # measurement request\n\
    \            self.process_sensor_data(message)\n        else:                \
    \           # temp set request\n            self.set_temperature(message)\n\n\
    \    # set new temperature\n    def set_temperature(self, setting: dict):\n  \
    \      desired = setting['temperature']\n        updelta = setting['up_delta']\n\
    \        downdelta = setting['down_delta']\n        print(f'Controller {self.id}\
    \ new temperature setting {desired} up delta {updelta} '\n              f'down\
    \ delta {downdelta}')\n        self.current_setting = desired\n        self.up_delta\
    \ = updelta\n        self.down_delta = downdelta\n\n    # Process new measurements\n\
    \    def process_sensor_data(self, sensor: dict) -> bool:\n        if self.current_setting\
    \ is not None:        # desired temperature is set, otherwise ignore\n       \
    \     # calculate desired action\n            measurement = sensor['measurement']\n\
    \            action = Action.NONE\n            if measurement > (self.current_setting\
    \ + self.up_delta):\n                action = Action.ON\n            if measurement\
    \ < (self.current_setting - self.down_delta):\n                action = Action.OFF\n\
    \            if action != Action.NONE and self.previous_command != action:  #\
    \ new action\n                self.previous_command = action\n               \
    \ # publish new action to kafka\n                return True\n            else:\n\
    \                return False\n        else:\n            return False\n```\n\n\
    The implementation is a Python class with the following methods:\n\n- A constructor\
    \ taking Kafka producer actor (Example 6-1), that is used by this class to write\
    \ control data to Kafka and an ID - an ID of this temperature controller (which\
    \ is the same as heater device ID).\n- The `process_new_message` method that receives\
    \ messages and depending on their contents calls either `set_temperature` or `process_sensor_data`.\n\
    - The `set_temperature` method is processing a new set temperature method from\
    \ the thermostat. This message contains the new desired temperature along with\
    \ additional heater-specific parameters - temperature intervals where controls\
    \ are ignored.\n- The `process_sensor_data` method which handles the temperature\
    \ control. If the desired temperature is set, then it compares the current temperature\
    \ with the desired one and calculates the desired control (heater on/off). To\
    \ avoid resending the same control over and over again, this method additionally\
    \ compares the calculated control value with the current (cached) and only submits\
    \ a new control value if it has changed.\n\nBecause Kafka calculates partitions\
    \ based on the key hash, the same partition can serve many keys. To manage multiple\
    \ keys per partition we introduced a *TemperatureControllerManager* class whose\
    \ purpose is to manage individual temperature controllers (Example 6-8).\n\n###\
    \ Example 6-8. Implementation of temperature controller manager\n\n```python\n\
    class TemperatureControllerManager:\n    def __init__(self, producer: KafkaProducer):\n\
    \        self.controllers = {}\n        self.producer = producer\n\n    def process_controller_message(self,\
    \ key: str, request: dict):\n        if not key in self.controllers:   # create\
    \ a new controller\n            print(f'Creating a new controller {controller_id}')\n\
    \            controller = TemperatureController(producer=self.producer, id=key)\n\
    \            self.controllers[key] = controller\n        self.controllers[key].process_new_message(request)\n\
    ```\n\nThis implementation is based on a dictionary keeping track of temperature\
    \ controllers based on their IDs. The class provides 2 methods:\n\n- The constructor\
    \ taking Kafka producer actor (Example 6-1). The constructor then creates a new\
    \ empty dictionary of the individual temperature controllers.\n- The `process_controller_message`\
    \ function that takes every new message received by the “local” Kafka consumer\
    \ and, based on a key, decides if a required temperature controller exists. If\
    \ it is not, a new temperature controller is created and stores a reference to\
    \ it. After it finds or creates the controller, it then passes the message to\
    \ it for processing."
  mdcn: "## 使用 Ray 构建流处理应用\n\n流处理有两个重要的类别：\n\n- *无状态流处理*，其中每个事件都完全独立于任何先前的事件或可变的共享状态进行处理。给定一个事件，流处理器每次都会以完全相同的方式处理它，无论之前到达了什么数据或执行状态如何。\n\
    - *有状态流处理*，这意味着事件之间共享一个“状态”，并且该状态可以影响当前事件的处理方式。在这种情况下，状态可以是先前事件的结果，也可以是由外部系统产生，用于控制流处理。\n\
    \n无状态流处理实现通常简单直接。它们需要扩展 Kafka 消费者的 *start* 方法（示例 6-2）来实现对传入消息的任何所需转换。这些转换的结果可以发送到不同的\
    \ Kafka 主题，也可以发送到代码的任何其他部分。一个无状态流处理应用的示例可以在这里找到[here](here)。\n\n实现有状态流处理通常更为复杂。让我们看看基于[动态控制流](dynamically\
    \ controlled streams)实现有状态流处理的不同选项。\n\n## 实现有状态流处理\n\n我们的示例实现使用了加热器控制器示例⁹，它包含以下内容：\n\
    \n- 传感器持续不断地发送温度测量值。\n- 恒温器设置定义为期望温度 Td 和 Δt。\n- 恒温器设置可以在任何时间点到达。\n- 当温度降至 Td\
    \ - Δt 以下时，实现会向加热器发送启动信号。\n- 当温度升至 Td + Δt 以上时，会向加热器发送停止信号。\n- 这里使用了一个非常简单的“加热器模型”，当加热器开启时，温度每\
    \ N（可配置）分钟升高 1 度；当加热器关闭时，温度每 M（可配置）分钟降低 1 度。\n\n以下是我们对原始示例所做的简化：\n\n- 我们没有使用 Protobuf\
    \ 序列化，而是使用 JSON 序列化（与前面的示例相同），这允许我们通用地序列化/反序列化 Python 字典消息。\n- 为了简化实现，我们没有像原始示例中那样使用两个队列，而是使用一个包含控制和传感器消息的单一队列，在接收时区分这两种消息。虽然这在我们的玩具示例中有效，但在处理大量消息的真实实现中可能不是一个好的解决方案，因为它可能会减慢传感器消息的处理速度。\n\
    \n在这些简化的基础上，我们将在此演示两种使用 Ray 实现有状态流处理的方法——一种基于键的方法和一种与键无关的方法。\n\n## 基于键的方法\n\n\
    许多有状态流处理应用依赖于 Kafka 消息键。请记住，Kafka 分区使用键哈希来确定消息写入哪个分区。这意味着 Kafka 保证所有具有相同键的消息总是由同一个消费者接收。在这种情况下，可以在接收它们的\
    \ Kafka 消费者上本地实现有状态流处理。因为消费者是作为 Ray Actor 实现的，Ray 会跟踪 Actor 内部的数据。¹⁰\n\n对于这个实现，我们创建了一个小型加热器模拟器程序，你可以在[配套的\
    \ Github 项目](https://github.com)¹¹中找到它，它根据加热器 ID 发布和获取数据。¹² 有了这个，你可以如下实现温度控制器（示例\
    \ 6-7）。\n\n### 示例 6-7. 温度控制器的实现\n\n```python\nfrom enum import Enum\nclass Action(Enum):\n\
    \    NONE = -1\n    OFF = 0\n    ON = 1\n\nclass BaseTemperatureController:\n\
    \    def __init__(self, id: str):\n        self.current_setting = None\n     \
    \   self.previous_command = -1\n        self.id = id\n\n    # Process new message\n\
    \    def process_new_message(self, message: dict):\n        if 'measurement' in\
    \ message:    # measurement request\n            self.process_sensor_data(message)\n\
    \        else:                           # temp set request\n            self.set_temperature(message)\n\
    \n    # set new temperature\n    def set_temperature(self, setting: dict):\n \
    \       desired = setting['temperature']\n        updelta = setting['up_delta']\n\
    \        downdelta = setting['down_delta']\n        print(f'Controller {self.id}\
    \ new temperature setting {desired} up delta {updelta} '\n              f'down\
    \ delta {downdelta}')\n        self.current_setting = desired\n        self.up_delta\
    \ = updelta\n        self.down_delta = downdelta\n\n    # Process new measurements\n\
    \    def process_sensor_data(self, sensor: dict) -> bool:\n        if self.current_setting\
    \ is not None:        # desired temperature is set, otherwise ignore\n       \
    \     # calculate desired action\n            measurement = sensor['measurement']\n\
    \            action = Action.NONE\n            if measurement > (self.current_setting\
    \ + self.up_delta):\n                action = Action.ON\n            if measurement\
    \ < (self.current_setting - self.down_delta):\n                action = Action.OFF\n\
    \            if action != Action.NONE and self.previous_command != action:  #\
    \ new action\n                self.previous_command = action\n               \
    \ # publish new action to kafka\n                return True\n            else:\n\
    \                return False\n        else:\n            return False\n```\n\n\
    该实现是一个 Python 类，包含以下方法：\n\n- 一个构造函数，接受 Kafka 生产者 Actor（示例 6-1），该类使用它将控制数据写入 Kafka，以及一个\
    \ ID——此温度控制器的 ID（与加热器设备 ID 相同）。\n- `process_new_message` 方法，接收消息并根据其内容调用 `set_temperature`\
    \ 或 `process_sensor_data`。\n- `set_temperature` 方法处理来自恒温器的新温度设置方法。此消息包含新的期望温度以及额外的加热器特定参数——控制被忽略的温度区间。\n\
    - `process_sensor_data` 方法处理温度控制。如果设置了期望温度，则将当前温度与期望温度进行比较，并计算所需的控制（加热器开/关）。为避免重复发送相同的控制，此方法还会将计算出的控制值与当前（缓存的）值进行比较，仅在值发生变化时才提交新的控制值。\n\
    \n因为 Kafka 基于键哈希计算分区，所以同一个分区可以服务多个键。为了管理每个分区的多个键，我们引入了一个 *TemperatureControllerManager*\
    \ 类，其目的是管理各个温度控制器（示例 6-8）。\n\n### 示例 6-8. 温度控制器管理器的实现\n\n```python\nclass TemperatureControllerManager:\n\
    \    def __init__(self, producer: KafkaProducer):\n        self.controllers =\
    \ {}\n        self.producer = producer\n\n    def process_controller_message(self,\
    \ key: str, request: dict):\n        if not key in self.controllers:   # create\
    \ a new controller\n            print(f'Creating a new controller {controller_id}')\n\
    \            controller = TemperatureController(producer=self.producer, id=key)\n\
    \            self.controllers[key] = controller\n        self.controllers[key].process_new_message(request)\n\
    ```\n\n此实现基于一个字典，根据 ID 跟踪温度控制器。该类提供 2 个方法：\n\n- 一个构造函数，接受 Kafka 生产者 Actor（示例 6-1）。构造函数随后创建一个新的空字典，用于存储各个温度控制器。\n\
    - `process_controller_message` 函数，接收“本地” Kafka 消费者收到的每条新消息，并根据键决定所需的温度控制器是否存在。如果不存在，则创建一个新的温度控制器并存储其引用。找到或创建控制器后，它将消息传递给控制器进行处理。"
