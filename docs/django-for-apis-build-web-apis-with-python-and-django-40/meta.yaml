    **Book API**


    And look at that! Django REST Framework provides this visualization by default.
    It displays the HTTP status code for the page, which is `200` meaning `OK`. Specifies
    `Content-Type` is JSON. And displays the information for our single book entry
    in a formatted manner.


    If you click on the "Get" button in the upper right corner and select "json" at
    the top of the dropdown list you''ll see what the raw API endpoint looks like.'
