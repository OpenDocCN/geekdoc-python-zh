  md: 'Django REST Framework has two default routers: [SimpleRouter](http://www.django-rest-framework.org/api-guide/routers/#simplerouter)
    and [DefaultRouter](http://www.django-rest-framework.org/api-guide/routers/#defaultrouter).
    We will use `SimpleRouter` but it''s also possible to create custom routers for
    more advanced functionality.


    Here is what the updated code looks like:


    # Code


    ```

    python

    # posts/urls.py

    from django.urls import path

    from rest_framework.routers import SimpleRouter


    from .views import UserViewSet, PostViewSet


    router = SimpleRouter()

    router.register("users", UserViewSet, basename="users")

    router.register("", PostViewSet, basename="posts")


    urlpatterns = router.urls

    ```


    On the top line `SimpleRouter` is imported, along with our views. The `router`
    is set to `SimpleRouter` and we "register" each viewset for `Users` and `Posts`.
    Finally, we set our URLs to use the new router. Go ahead and check out our four
    endpoints now by starting the local server with `python manage.py runserver`.
    First up is `User List` at `http://127.0.0.1:8000/api/v1/users/` which is the
    same.


    The detail view at `http://127.0.0.1:8000/api/v1/users/1/` is a little different
    though. It is now called "User Instance" instead of "User Detail" and there is
    an additional "delete" option which is built-in to [ModelViewSet](http://www.django-rest-framework.org/api-guide/viewsets/#modelviewset).'
