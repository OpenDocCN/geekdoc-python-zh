    If you recall from Chapter 2, a web API does not output a traditional webpage
    with HTML, CSS, and JavaScript. Instead, it is just pure data ( often in the JSON
    format) and accompanying HTTP verbs that specify what user actions are allowed.
    In this instance, an API user can only *read* the content, they are not able to
    update it in any way though we will learn how to do that in future chapters.


