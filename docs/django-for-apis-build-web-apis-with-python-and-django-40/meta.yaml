  md: '# # Chapter 10: Schemas and Documentation


    Now that we have our API complete we need a way to document its functionality
    quickly and accurately to others. After all, in most companies and teams, the
    developer who is using the API is not the same developer who initially built it.
    And if an API is available to the public it definitely needs a well-documented
    guide to be usable.


    A **schema** is a machine-readable document that outlines all available API endpoints,
    URLs, and the HTTP verbs (`GET`, `POST`, `PUT`, `DELETE`, etc.). This is great
    but not very readable for a human. Enter **documentation** which is something
    added to a schema that makes it easier for humans to read and consume.


    As a reminder, here is the complete list of our current API endpoints:


    **Diagram**


    | Endpoint | HTTP Verb |

    |----------|-----------|

    | / | GET |

    | /:pk/ | GET |

    | users/ | GET |

    | users/:pk/ | GET |

    | /rest-auth/registration | POST |

    | /rest-auth/login | POST |

    | /rest-auth/logout | GET |

    | /rest-auth/password/reset | POST |

    | /rest-auth/password/reset/confirm | POST |


    In this chapter we will add both machine-readable schema and human-readable documentation
    to our Blog project. Even better, we will automate the generation of each so that
    they are always up-to-date with the latest version of our API.'
  merge: -1
