  md: "# ## Views\n\nThe final step is to create our views. Django REST Framework\
    \ has several generic views that are helpful. We have already used [ListAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#listapiview)\
    \ in both the *Library* and *Todos* APIs to create a **read-only** endpoint collection,\
    \ essentially a list of all model instances. In the *Todos* API we used [RetrieveAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#retrieveapiview)\
    \ for a read-only single endpoint, which is analogous to a detail view in traditional\
    \ Django.\n\nFor our Blog API we want to list all available blog posts as a read-write\
    \ endpoint which means using [ListCreateAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#listcreateapiview),\
    \ which is similar to the `ListAPIView` we've used previously but allows for writes\
    \ and therefore `POST` requests. We also want to make the individual blog posts\
    \ available to be read, updated, or deleted. And sure enough, there is a built-in\
    \ generic Django REST Framework view just for this purpose: [RetrieveUpdateDestroyAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#retrieveupdatedestroyapiview).\
    \ That's what we'll use here.\n\nUpdate the `posts/views.py` file as follows.\n\
    \n# **Code**\n\n```\npython\n# posts/views.py\nfrom rest_framework import generics\n\
    \nfrom .models import Post\nfrom .serializers import PostSerializer\n\n\nclass\
    \ PostList(generics.ListCreateAPIView):\n    queryset = Post.objects.all()\n \
    \   serializer_class = PostSerializer\n\n\nclass PostDetail(generics.RetrieveUpdateDestroyAPIView):\n\
    \    queryset = Post.objects.all()\n    serializer_class = PostSerializer\n```"
