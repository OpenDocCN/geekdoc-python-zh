    The solution is to generate a new secret key and to store that value in an environment
    variable so it never touches source control. One way to generate a new one is
    by invoking Python''s built-in [secrets](https://docs.python.org/3/library/secrets.html)
    module by running `python -c ''import secrets; print(secrets.token_urlsafe())''`
    on the command line.


    # Shell


    ```


    (.venv) > python -c "import secrets; print(secrets.token_urlsafe())"

    KBl3sX5kLrd2zxj-pAichjT0EZJKMS0cXzhWI7Cydqc

    ```


    Copy and paste this new value into the `.env` file under the variable `SECRET_KEY`.


    # .env


    ```


    DEBUG=True

    SECRET_KEY=KBl3sX5kLrd2zxj-pAichjT0EZJKMS0cXzhWI7Cydqc

    ```


    Finally, switch over `SECRET_KEY` in the `django_project/settings.py` file to
    read from the environment variable now.


    # Code


    ```

    python

    # django_project/settings.py

    SECRET_KEY = env.str("SECRET_KEY")

    ```


    To confirm everything is working properly restart the local server with `python
    manage.py runserver` and refresh any API endpoint on our site. It should be working
    normally.


    # ALLOWED HOSTS


    Next up is the `ALLOWED_HOSTS` configuration in our `django_project/settings.py`
    file which represents the host/domain names our Django project can serve. We will
    add three hosts here: `.herokuapp.com` for the deployment on Heroku and both `localhost`
    and `127.0.0.1` for local development.'
  - "[PAGE 189]\n\n# Code\n\n```\n# django_project/settings.py\nALLOWED_HOSTS = [\"\
    .herokuapp.com\", \"localhost\", \"127.0.0.1\"]  # new\n```\n\nIf you re-run the\
    \ `python manage.py runserver` command and refresh `http://127.0.0.1:8000/1` it\
    \ should display normally after the change.\n\n# DATABASES\n\nOur current `DATABASES`\
    \ configuration is for SQLite but we want to be able to switch to PostgreSQL for\
    \ production on Heroku. When we installed `environs[django]` earlier, the Django\
    \ \"goodies\" included the elegant [dj-database-url](https://github.com/jacobian/dj-database-url)\
    \ package, which takes all the database configurations needed for our database,\
    \ SQLite or PostgreSQL, and creates a `DATABASE_URL` environment variable.\n\n\
    To implement this update the `DATABASES` configuration with `dj_db_url` from `environs[django]`\
    \ to help parse `DATABASE_URL`.\n\n# Code\n\n```\n# django_project/settings.py\n\
    DATABASES = {\n    \"default\": env.dj_db_url(\"DATABASE_URL\")  # new\n}\n```\n\
    \nThat's it! All we need to do now is specify SQL as the local `DATABASE_URL`\
    \ value in the `.env` file.\n\n# .env\n\n```\nDEBUG=True\nSECRET_KEY=KBl3sX5kLrd2zxj-pAichjT0EZJKMS0cXzhWI7Cydqc\n\
    DATABASE_URL=sqlite:///db.sqlite3\n```\n\nThis seems quite magical, no? The reason\
    \ it works is because whenever Heroku provisions a new PostgreSQL database it\
    \ automatically creates a configuration variable for it named `DATABASE_URL`.\
    \ Since the `.env` file is not committed to production, our Django project on\
    \ Heroku will instead use this PostgreSQL configuration. Pretty elegant, no?\n\
    \n> 116https://github.com/jacobian/dj-database-url"
  - "[PAGE 190]\n\n# ## Static Files\n\nAs we saw in earlier deployments static files\
    \ need to be configured for the browsable web API to work. First, create a new\
    \ project-level directory called `static`.\n\n**Shell**\n\n```\nshell\n(.venv)\
    \ > mkdir static\n```\n\nWith your text editor create an empty `.keep` file within\
    \ the `static` directory so it is picked up by Git. Then install `whitenoise`\
    \ to handle static files in production.\n\n**Shell**\n\n```\nshell\n(.venv) >\
    \ python -m pip install whitenoise==5.3.0\n```\n\nWhiteNoise must be added to\
    \ `django_project/settings.py` in the following locations:\n\n+   - `whitenoise`\
    \ above `django.contrib.staticfiles` in `INSTALLED_APPS`\n- `WhiteNoiseMiddleware`\
    \ above `CommonMiddleware`\n- `STATICFILES_STORAGE` configuration pointing to\
    \ WhiteNoise\n\n**Code**\n\n```\npython\n# django_project/settings.py\nINSTALLED_APPS\
    \ = [\n    ...\n    \"whitenoise.runserver_nostatic\",  # new\n    \"django.contrib.staticfiles\"\
    ,\n]\n\nMIDDLEWARE = [\n    \"django.middleware.security.SecurityMiddleware\"\
    ,\n    \"django.contrib.sessions.middleware.SessionMiddleware\",\n    \"whitenoise.middleware.WhiteNoiseMiddleware\"\
    ,  # new\n    \"corsheaders.middleware.CorsMiddleware\",\n    ...\n]\n\nSTATIC_URL\
    \ = \"/static/\"\n```"
