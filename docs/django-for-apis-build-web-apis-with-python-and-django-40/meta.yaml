  md: '# # Chapter 11: Production Deployment


    The final step for any web API project is deployment. Pushing it into production
    is very similar to a traditional Django deployment but with some added concerns.
    In this chapter, we will cover adding environment variables, configuring our settings
    to be more secure, switching to a PostgreSQL database in production, and running
    through Django''s own deployment checklist to make sure we are not missing anything.


    # ## Environment Variables


    Environment variables can be loaded into a codebase at runtime yet not stored
    in the source code. This makes them an ideal way to toggle between local and production
    settings. They are also a good place to store sensitive information that should
    not be present in source control. When using Git, any changes are stored in the
    Git history, so even if something is later removed from the codebase, if it was
    checked into a commit at any time it is there forever if someone knows how to
    look.


    There are multiple packages that enable working with environment variables in
    Python but for this project we''ll use [environs](https://github.com/sloria/environs)
    because it comes with an additional Django configuration that is very useful.


    Let''s begin by installing `environs[django]`. If you are using Zsh as your terminal
    shell it is necessary to add single quotes, `'' ''`, around the package name,
    so run `python -m pip install ''environs[django]==9.3.5''`.


    [^114]: https://github.com/sloria/environs'
  merge: -1
  pgno: 184
- img_proc: true
