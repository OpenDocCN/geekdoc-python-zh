  md: '# # Chapter 9: Viewsets and Routers


    [Viewsets](http://www.django-rest-framework.org/api-guide/viewsets/) and [routers](http://www.django-rest-framework.org/api-guide/routers/)
    are tools within Django REST Framework that can speed-up API development. They
    are an additional layer of abstraction on top of views and URLs. The primary benefit
    is that a single viewset can replace multiple related views. And a router can
    automatically generate URLs for the developer. In larger projects with many endpoints
    this means a developer has to write less code. It is also, arguably, easier for
    an experienced developer to understand and reason about a small number of viewset
    and router combinations than a long list of individual views and URLs.


    In this chapter we will add two new API endpoints to our existing project and
    see how switching from views and URLs to viewsets and routers can achieve the
    same functionality with far less code.


    # ## User endpoints


    Currently we have the following API endpoints in our project. They are all prefixed
    with `api/v1/` which is not shown for brevity:'
