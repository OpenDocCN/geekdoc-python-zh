    # ## Deployment Checklist


    We just went through a lot of steps. Too many to remember for most developers
    which is why deployment checklists exist. To recap, here is what we did:


    +   - add environment variables via `environs[django]`

    - set `DEBUG` to `False`

    - set `ALLOWED_HOSTS`

    - use environment variable for `SECRET_KEY`

    - update `DATABASES` to use SQLite locally and PostgreSQL in production

    - configure static files and install `whitenoise`

    - install `gunicorn` for a production web server

    - create a `requirements.txt` file

    - create a `Procfile` for Heroku

    - create a `runtime.txt` to set the Python version on Heroku


    Aside from the `Procfile` file created for Heroku these deployment steps are virtually
    the same for any hosting platform.


    Make sure to commit all these changes to Git before we actually deploy the project.


    # **Shell**


    ```


    (.venv) > git status

    (.venv) > git add -A

    (.venv) > git commit -m "deployment checklist"

    ```


    # ## Heroku Deployment


    To deploy on Heroku make sure you are logged in via the terminal shell.'
