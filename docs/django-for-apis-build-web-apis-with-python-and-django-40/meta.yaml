    \ of actual HTTP messages in this challenge/response flow. Note that the HTTP\
    \ header `WWW-Authenticate` specifies the use of a `Token` which is used in the\
    \ response `Authorization` header request.\n\n# Diagram\n\n```\nClient       \
    \                                       Server\n------                       \
    \                       ------\n\n---------------------------------------->\n\
    GET / HTTP/1.1\n\n                    <----------------------------------------\n\
    \                                          HTTP/1.1 401 Unauthorized\n       \
    \                                   WWW-Authenticate: Token\n\n---------------------------------------->\n\
    GET / HTTP/1.1\nAuthorization: Token 401f7ac837da42b97f613d789819ff93537bee6a\n\
    \n                    <----------------------------------------\n            \
    \                              HTTP/1.1 200 OK\n```\n\nThere are multiple benefits\
    \ to this approach. Since tokens are stored on the client, scaling the servers\
    \ to maintain up-to-date session objects is no longer an issue. And tokens can\
    \ be shared amongst multiple front-ends: the same token can represent a user on\
    \ the website and the same user on a mobile app. The same session ID can not be\
    \ shared amongst different front-ends, a major limitation.\n\nA potential downside\
    \ is that tokens can grow quite large. A token contains all user information,\
    \ not just an id as with a session id/session object set up. Since the token is\
    \ sent on every request, managing its size can become a performance issue.\n\n\
    Exactly how the token is implemented can also vary substantially. Django REST\
    \ Frameworks'"
