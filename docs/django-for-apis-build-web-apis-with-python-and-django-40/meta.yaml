  md: 'When the current front-end frameworks are eventually replaced by even newer
    ones in the years to come, the back-end API can remain the same. No major rewrite
    is required.


    Another major benefit is that one single API can support multiple front-ends written
    in different languages and frameworks. Consider that JavaScript is used for web
    front-ends, while Android apps require the Java programming language, and iOS
    apps need the Swift programming language. With a traditional monolithic approach,
    a Django website cannot support these various front-ends. But with an internal
    API, all three can communicate with the same underlying database back-end!


    Growing websites can also benefit from creating an external API that allows third-party
    developers to build their own iOS or Android apps. When I worked at Quizlet back
    in 2010 we did not have the resources to develop our own iOS or Android apps,
    but we *did* have an external API available that more than 30 developers used
    to create their own flashcard apps powered by the Quizlet database. Several of
    these apps were downloaded over a million times, enriching the developers and
    increasing the reach of Quizlet at the same time.


    The major downside to an API-first approach is that it requires more configuration
    than a traditional Django application. However as we will see in this book, the
    fantastic Django REST Framework library removes much of that complexity for us.


    # ## Django REST Framework


    There are thousands of third-party apps available that add further functionality
    to Django. You can see a complete, searchable list over at [Django Packages](https://djangopackages.org/)¬є,
    as well as a curated list in the [awesome-django repo](https://github.com/wsvincent/awesome-django)¬≤.
    However, amongst all third-party applications, Django REST Framework is arguably
    **the** killer app for Django. It is mature, full of features, customizable, testable,
    and extremely well-documented. It also purposefully mimics many of Django''s traditional
    conventions, which makes learning it much faster. If you already know Django,
    then learning Django REST Framework is the logical next step.


