    \n---\n\n## зЃАдїЛ\n\nеЬ®жЬђдє¶дЄ≠пЉМдљ†е∞Же≠¶дє†е¶ВдљХдљњзФ® Django еТМ Django REST Framework жЮДеїЇе§ЪдЄ™е§НжЭВеЇ¶йАТеҐЮзЪД Web\
    \ APIгАВDjango жШѓдЄАдЄ™йЭЮеЄЄжµБи°МзЪДеЯЇдЇО Python зЪД Web ж°ЖжЮґпЉМеЃГе§ДзРЖжЮДеїЇзљСзЂЩдЄ≠зЪДжМСжИШжАІйГ®еИЖпЉЪиЃ§иѓБгАБжХ∞жНЃеЇУињЮжО•гАБдЄЪеК°йАїиЊСгАБеЃЙеЕ®жАІз≠Йз≠ЙгАВињШжЬЙжХ∞еНГдЄ™зђђдЄЙжЦєеМЕдЄЇ\
    \ Django жЬђиЇЂжЈїеК†еКЯиГљпЉМеЕґдЄ≠жЬАз™БеЗЇзЪДжШѓ Django REST FrameworkпЉМеЃГеЕБиЃЄеЉАеПСиАЕе∞ЖдїїдљХзО∞жЬЙзЪД Django й°єзЫЃиљђеПШдЄЇеЉЇе§ІзЪД Web\
    \ APIгАВ\n\nDjango еТМ Django REST Framework иҐЂдЄЦзХМдЄКжЬАе§ІзЪДзІСжКАеЕђеПЄдљњзФ®пЉМеМЕжЛђ InstagramгАБMozilla еТМ\
    \ PinterestгАВдљЖеЃГдїђдєЯйЭЮеЄЄйАВеРИеИЭе≠¶иАЕжИЦеС®жЬЂеЙѓдЄЪй°єзЫЃпЉМеЫ†дЄЇ Django зЪД\"еЉАзЃ±еН≥зФ®\"жЦєж≥ХжО©зЫЦдЇЖиЃЄе§ЪеЇХе±Ве§НжЭВжАІпЉМиГље§ЯеЃЮзО∞ењЂйАЯдЄФеЃЙеЕ®зЪДеЉАеПСгАВеИ∞жЬђдє¶зїУжЭЯжЧґпЉМдљ†е∞ЖиГље§ЯзФ®е∞СйЗПдї£з†БеЬ®жЫізЯ≠зЪДжЧґйЧіеЖЕеИЫеїЇзФЯдЇІе∞±зї™зЪД\
    \ Web APIгАВ\n\n### дЄЇдїАдєИдљњзФ® API\n\nAPIпЉИ*еЇФзФ®з®ЛеЇПзЉЦз®ЛжО•еП£*пЉЙжШѓжППињ∞дЄ§еП∞иЃ°зЃЧжЬЇе¶ВдљХзЫіжО•зЫЄдЇТйАЪдњ°зЪДзЃАеЖЩжЦєеЉПгАВеѓєдЇОе≠ШеЬ®дЇОдЄЗзїізљСдЄКзЪД\
    \ Web APIпЉМдЄїеѓЉжЮґжЮДж®°еЉПиҐЂзІ∞дЄЇ RESTпЉИ*и°®ињ∞жАІзКґжАБиљђзІї*пЉЙпЉМе∞ЖеЬ®жЬђдє¶еРОйЭҐйАВељУдїЛзїНгАВ\n\nеЫЮеИ∞ 2005 еєіпЉМDjango й¶Цжђ°еПСеЄГжЧґпЉМе§Іе§ЪжХ∞зљСзЂЩзФ±дЄАдЄ™е§ІеЮЛеНХдљУдї£з†БеЇУзїДжИРгАВжХ∞жНЃеЇУж®°еЮЛгАБиІЖеЫЊеТМ\
    \ URL зЪДеРОзЂѓдЄОеЙНзЂѓж®°жЭњзЫЄзїУеРИпЉМжОІеИґжѓПдЄ™зљСй°µзЪДе±Хз§Їе±ВгАВ\n\nдљЖе¶ВдїКпЉМзљСзЂЩйЗЗзФ® API дЉШеЕИзЪДжЦєж≥ХпЉМж≠£еЉПе∞ЖеРОзЂѓдЄОеЙНзЂѓеИЖз¶їпЉМињЩеЈ≤жЫідЄЇеЄЄиІБгАВињЩдљњеЊЧзљСзЂЩеПѓдї•дљњзФ®дЄУзФ®зЪД\
