    \       response = self.client.get(reverse(\"book_list\"))\n        self.assertEqual(response.status_code,\
    \ status.HTTP_200_OK)\n        self.assertEqual(Book.objects.count(), 1)\n   \
    \     self.assertContains(response, self.book)\n```\n\nAt the top we import reverse\
    \ from Django and from Django REST Framework both status and APITestCase. We also\
    \ import our Book model though note that since we are in the api app we must specify\
    \ the app name of book to import it.\n\nWe extend APITestcase in a new class called\
    \ APITests that starts by configuring set up data. Then we run four different\
