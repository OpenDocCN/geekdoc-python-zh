  md: "# ## Views\n\nWe will use two DRF generic views here: [ListAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#listapiview)\
    \ to display all todos and [RetrieveAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#retrieveapiview)\
    \ to display a single model instance.\n\nUpdate the `todos/views.py` file to look\
    \ as follows:\n\n```\npython\n# todos/views.py\nfrom rest_framework import generics\n\
    \nfrom .models import Todo\nfrom .serializers import TodoSerializer\n\n\nclass\
    \ ListTodo(generics.ListAPIView):\n    queryset = Todo.objects.all()\n    serializer_class\
    \ = TodoSerializer\n\n\nclass DetailTodo(generics.RetrieveAPIView):\n    queryset\
    \ = Todo.objects.all()\n    serializer_class = TodoSerializer\n```\n\nAt the top\
    \ we import Django REST Framework's generics views, our `Todo` model and the `TodoSerializer`\
    \ we just created. Recall from our `todos/urls.py` file that we have two routes\
    \ and therefore two distinct views. A new view called `ListTodo` subclasses `ListAPIView`\
    \ while `DetailTodo` subclasses `RetrieveAPIView`.\n\nAstute readers will notice\
    \ that there is a bit of redundancy in the code here. We essentially repeat the\
    \ `queryset` and `serializer_class` for each view, even though the generic view\
    \ extended is different. Later on in the book we will learn about viewsets and\
    \ routers which address this issue and allow us to create the same API views and\
    \ URLs with much less code.\n\nBut for now we're done! Our API is ready to consume."
