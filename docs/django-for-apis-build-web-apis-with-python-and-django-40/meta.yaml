    We are done now with the regular Django part of our API. All we really need is
    a model and some data in our database. Now it''s time to add Django REST Framework
    to take care of transforming our model data into an API.


    # ## Django REST Framework


    As we have seen before, Django REST Framework takes care of the heavy lifting
    of transforming our database models into a RESTful API. There are three main steps
    to this process:


    +   - `urls.py` file for the URL routes

    - `serializers.py` file to transform the data into JSON

    - `views.py` file to apply logic to each API endpoint


    On the command line use `pip` to install Django REST Framework.


    ```


    Shell

    (.venv) > python -m pip install djangorestframework~=3.13.0

    ```


    Then add it to the `INSTALLED_APPS` section of our `django_project/settings.py`
    file. It''s also a good idea to explicitly set our permissions. By default Django
    REST Framework is configured to `AllowAny` to enable ease of us in local development
    however this is far from secure. We will update this permission setting in the
    next chapter.'
  - "[PAGE 111]\n\n# Code\n\n```\n# django_project/settings.py\nINSTALLED_APPS = [\n\
    \    \"django.contrib.admin\",\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\"\
    ,\n    \"django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"\
    django.contrib.staticfiles\",\n    # 3rd-party apps\n    \"rest_framework\", \
    \ # new\n    # Local\n    \"accounts.apps.AccountsConfig\",\n    \"posts.apps.PostsConfig\"\
    ,\n]\n\nREST_FRAMEWORK = {  # new\n    \"DEFAULT_PERMISSION_CLASSES\": [\n   \
    \     \"rest_framework.permissions.AllowAny\",\n    ],\n}\n```\n\nNow we need\
    \ to create our URLs, views, and serializers.\n\n# URLs\n\nLet's start with the\
    \ URL routes for the actual location of the endpoints. Update the project-level\
    \ `urls.py` file with the `include` import on the second line and a new `api/v1/`\
    \ route for our `posts` app."
  - "[PAGE 112]\n\n# Code\n\n```\n# django_project/urls.py\nfrom django.contrib import\
    \ admin\nfrom django.urls import path, include  # new\n\nurlpatterns = [\n   \
    \ path(\"admin/\", admin.site.urls),\n    path(\"api/v1/\", include(\"posts.urls\"\
    )),  # new\n]\n```\n\nIt is a good practice to always version your APIs since\
    \ when you make a large change there may be some lag time before various consumers\
    \ of the API can also update. That way you can support a v1 of an API for a period\
    \ of time while also launching a new, updated v2 and avoid breaking other apps\
    \ that rely on your API back-end.\n\nNote that since our only app at this point\
    \ is posts we can include it directly here. If we had multiple apps in a project\
    \ it might make more sense to create a dedicated api app and then include all\
    \ the other API url routes into it. But for basic projects like this one, I prefer\
    \ to avoid an api app that is just used for routing. We can always add one later,\
    \ if needed.\n\nNext create a new posts/urls.py file and add the following code:\n\
    \n# Code\n\n```\n# posts/urls.py\nfrom django.urls import path\n\nfrom .views\
    \ import PostList, PostDetail\n\nurlpatterns = [\n    path(\"<int:pk>/\", PostDetail.as_view(),\
    \ name=\"post_detail\"),\n    path(\"\", PostList.as_view(), name=\"post_list\"\
    ),\n]\n```\n\nAt the top of the file we imported two viewsвАУPostList and PostDetailвАУthat\
    \ we will write in the next section but they correspond to a list of all blog\
    \ posts at the empty string, \"\", which means at api/v1/. The individual detail\
    \ posts will be at their primary key, pk, so the first blog post will be at api/v1/1/,\
    \ the second at api/v1/2/, and so on. So far this is all standard Django stuff."
  - "[PAGE 113]\n\n# ## Serializers\n\nNow for our serializers. Create a new `posts/serializers.py`\
    \ file with your text editor. The serializer not only transforms data into JSON,\
    \ it can also specify which fields to include or exclude. In our case, we will\
    \ include the `id` field Django automatically adds to database models but we will\
    \ *exclude* the `updated_at` field by not including it in our `fields`.\n\nThe\
    \ ability to include/exclude fields in our API this easily is a remarkable feature.\
    \ More often than not, an underlying database model will have far more fields\
    \ than what needs to be exposed. Django REST Framework's powerful serializer class\
    \ makes it extremely straightforward to control this.\n\n# ### Code\n\n```\npython\n\
    # posts/serializers.py\nfrom rest_framework import serializers\n\nfrom .models\
    \ import Post\n\n\nclass PostSerializer(serializers.ModelSerializer):\n    class\
    \ Meta:\n        fields = (\n            \"id\",\n            \"author\",\n  \
    \          \"title\",\n            \"body\",\n            \"created_at\",\n  \
    \      )\n        model = Post\n```\n\nAt the top of the file we have imported\
    \ Django REST Framework's `serializers` class and our own `models`. Then we created\
    \ a `PostSerializer` and added a `Meta` class where we specified which fields\
    \ to include and explicitly set the model, `Post`, to use. There are many ways\
    \ to customize a serializer but for common use cases, such as a basic blog, this\
    \ is all we need."
  - "[PAGE 114]\n\n# ## Views\n\nThe final step is to create our views. Django REST\
    \ Framework has several generic views that are helpful. We have already used [ListAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#listapiview)\
    \ in both the *Library* and *Todos* APIs to create a **read-only** endpoint collection,\
    \ essentially a list of all model instances. In the *Todos* API we used [RetrieveAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#retrieveapiview)\
    \ for a read-only single endpoint, which is analogous to a detail view in traditional\
    \ Django.\n\nFor our Blog API we want to list all available blog posts as a read-write\
    \ endpoint which means using [ListCreateAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#listcreateapiview),\
    \ which is similar to the `ListAPIView` we've used previously but allows for writes\
    \ and therefore `POST` requests. We also want to make the individual blog posts\
    \ available to be read, updated, or deleted. And sure enough, there is a built-in\
    \ generic Django REST Framework view just for this purpose: [RetrieveUpdateDestroyAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#retrieveupdatedestroyapiview).\
    \ That's what we'll use here.\n\nUpdate the `posts/views.py` file as follows.\n\
    \n# **Code**\n\n```\npython\n# posts/views.py\nfrom rest_framework import generics\n\
    \nfrom .models import Post\nfrom .serializers import PostSerializer\n\n\nclass\
    \ PostList(generics.ListCreateAPIView):\n    queryset = Post.objects.all()\n \
    \   serializer_class = PostSerializer\n\n\nclass PostDetail(generics.RetrieveUpdateDestroyAPIView):\n\
    \    queryset = Post.objects.all()\n    serializer_class = PostSerializer\n```"
  - '[PAGE 115]


    At the top of the file we import `generics` from Django REST Framework as well
    as our models and serializers files. Then we create two views: `PostList` uses
    the generic `ListCreateAPIView` while `PostDetail` uses the `RetrieveUpdateDestroyAPIView`.


    It''s pretty amazing that all we have to do is update our generic view to radically
    change the behavior of a given API endpoint. This is the advantage of using a
    full-featured framework like Django REST Framework: all of this functionality
    is available, tested, and just works. As developers we do not have to reinvent
    the wheel here.


    Phew. Our API is now complete and we really did not have to write much code on
    our own. We will make additional improvements to our API in the coming chapters
    but it is worth appreciating that it already performs the basic list and CRUD
