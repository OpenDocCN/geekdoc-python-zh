    class. In other words, one viewset can replace multiple views. Currently we have
    four views: two for blog posts and two for users. We can instead mimic the same
    functionality with two viewsets: one for blog posts and one for users. The trade-off
    is that there is a loss in readability for fellow developers who are not intimately
    familiar with viewsets.


