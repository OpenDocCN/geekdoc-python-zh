    Previously we used SQLite in production, which is file-based, and was already
    configured locally and then pushed up to Heroku. But this PostgreSQL database
    of ours is brand new! Heroku has all our code but we haven''t configured this
    production database yet.


    The same process used locally of running `migrate`, creating a superuser account,
    and entering blog posts in the admin must be followed again. To run a command
    with Heroku, as opposed to locally, prefix it with `heroku run`.


    # Shell


    ```


    (.venv) > heroku run python manage.py migrate

    (.venv) > heroku run python manage.py createsuperuser

    ```


    You will need to log into the live admin site to add blog entries and users since
    this is a brand-new database and not related to our local SQLite one.


    Refresh your live website and it should work correctly. Note that since the production
    server will run constantly in the background, you do not need to use the `runserver`
    command on Heroku.'
  - '[PAGE 198]


    # # Conclusion


    We''re now at the end of the book but only the beginning of what can be accomplished
    with Django REST Framework. Over the course of three different projectsвАУthe *Library*
    API, Todo API, and *Blog* APIвАУwe have built, tested, and deployed progressively
    more complex web APIs from scratch. And it''s no accident that at every step along
    the way, Django REST Framework provides built-in features to make our life easier.


    If you''ve never built web APIs before with another framework be forewarned that
    you''ve been spoiled. And if you have, rest assured this book only scratches the
    surface of what Django REST Framework can do. The [official documentation](http://www.django-rest-framework.org/)
    is an excellent resource for further exploration now that you have a handle on
    the basics.


    # ## Advanced Topics


    As a web API grows there are several additional topics worth exploring that we
    did not cover in the book. [Pagination](https://www.django-rest-framework.org/api-guide/pagination/)
    is a helpful way to control how data is displayed on individual API endpoints.
    [Filtering](https://www.django-rest-framework.org/api-guide/filtering/) also becomes
    necessary in many projects especially in conjunction with the excellent [django-filter](https://github.com/carltongibson/django-filter)
    library.


    [Throttling](https://www.django-rest-framework.org/api-guide/throttling/) is often
    necessary on APIs as a more advanced form of permissions. For example, the public-facing
    side of the API might have restrictive limits for unauthenticated requests while
    authenticated requests face much more lenient throttling.


    The final additional area to explore is [caching](https://www.django-rest-framework.org/api-guide/caching/)
    of the API for performance reasons. This works in a very similar manner to how
    caching is handled on traditional Django projects.


