    # ## Prerequisites


    If you''re brand new to web development with Django, I recommend starting with
    my book [Django for Beginners](https://djangoforbeginners.com/)¬≥. The first several
    chapters are available for free online and cover proper set up, a Hello World
    app, a *Pages* app, and a *Message Board* app. The full-length version goes deeper
    and covers a *Blog* website with forms and user accounts as well as a production-ready
    *Newspaper* site that features a custom user model, complete user authentication
    flow, emails, permissions, deployment, environment variables, and more.


    This background in traditional Django is important since Django REST Framework
    deliberately mimics many Django conventions. It is also recommended that readers
    have a basic knowledge of Python itself. Truly mastering Python takes years, but
    with just a little bit of knowledge you can dive right in and start building things.


    # ## Why this book


    I wrote this book because there is a distinct lack of good resources available
    for developers new to Django REST Framework. The assumption seems to be that everyone
    already knows all about APIs, HTTP, REST, and the like. My own journey in learning
    how to build web APIs was frustrating... and I already knew Django well enough
    to write a book on it! This book is the guide I wish existed when starting out
    with Django REST Framework.


    **Chapter 1** covers the initial set up of installing Python, Django, Git, and
    working with the command line. **Chapter 2** is an introduction to web APIs and
    the HTTP protocol that underpins it all. In **Chapters 3-4** we review the differences
    between traditional Django and Django REST Framework by building out a *Library*
    book website, transforming it into an API, adding tests, and then deploying it
    live. In **Chapter 5** we build, test, and deploy a Todo API with list and detail
    API endpoints. It also includes Cross Origin Resource Sharing (CORS).


    **Chapter 6** is the start of a making a production-ready *Blog* API that uses
    a custom user model and full Create-Read-Update-Delete (CRUD) functionality. **Chapters
    7** focuses on permissions, how to limit access appropriately, and creating a
    custom permission class. In **Chapter 8** the


    > ¬≥https://djangoforbeginners.com/'
- md: 'focus turns to user authentication and the four built-in authentication methods.
    Then we add endpoints for user registration, log out, password reset, and password
    reset confirmed. **Chapter 9** turns to viewsets and routers, built-in components
    that can greatly reduce the amount of coding required for standard API endpoints.
    **Chapter 10** covers schema and documentation and **Chapter 11** goes step-by-step
    through a production deployment.


    Complete source code for all chapters can be found [online on Github](https://github.com/wsvincent/restapiswithdjango)вБі.


    ## Conclusion


    Django and Django REST Framework is a powerful and accessible way to build web
    APIs. By the end of this book you will be able to add APIs to any existing Django
    projects or build your own dedicated web API from scratch properly using modern
    best practices. Let''s begin!


    ## Chapter 1: Initial Set Up


    If you have already read *Django for Beginners*вБµ much of this will be familiar
    but there are additional steps around installing Django REST Framework.


    This chapter covers how to properly configure your Windows or macOS computer to
    work on Django projects. We will start by reviewing the *Command Line*, a powerful
    text-only interface that developers use extensively to install and configure software
    projects. Then we install the latest version of Python, learn how to create dedicated
    virtual environments, and install Django. As a final step, we will explore using
    Git for version control and working with a text editor. By the end of this chapter
    you will have created your first Django and Django REST Framework project from
    scratch. In the future, you will be able to create or modify any Django project
    in just a few keystrokes.


    ### The Command Line


    The command line is a text-only interface that harkens back to the original days
    of computing. It is an alternative to the mouse or finger-based graphical user
    interface familiar to most computer users. An everyday computer user will never
    need to use the command line but software developers do because certain tasks
    can only be done with it. These include running programs, installing software,
    using Git for version control, or connecting to servers in the cloud. With a little
    practice, most developers find that the command line is actually a faster and
    more powerful way to navigate and control a computer.


    Given its minimal user interfaceвАУjust a blank screen and a blinking cursorвАУthe
    command line is intimidating to newcomers. There is often no feedback after a
    command has run and it is possible to wipe the contents of an entire computer
    with a single command if you''re not careful: no warning will pop up! As a result,
    the command line must be used with caution. Make sure not to blindly copy and
    paste commands you find online; only rely on trusted resources for any command
    you do not fully understand.


    In practice, multiple terms are used to refer to the command line: Command Line
    Interface (CLI), console, terminal, shell, or prompt. Technically speaking, the
    *terminal* is the program that opens up a new window to access the command line,
    a *console* is a text-based application, the *shell* is the program that runs
    commands on the underlying operating system, and the *prompt* is where commands
    are typed and run. It is easy to be confused by these terms initially but they
    all essentially mean the same thing: the command line is where we run and execute
    text-only commands on our computer.


    On Windows, the built-in terminal and shell are both called *PowerShell*. To access
    it, locate the taskbar on the bottom of the screen next to the Windows button
    and type in "powershell" to launch the app. It will open a new window with a dark
    blue background and a blinking cursor after the `>` prompt. Here is how it looks
    on my computer.


    ```

    PS C:\Users\wsv>

    ```


    Before the prompt is `PS` which refers to PowerShell, the initial `C` directory
    of the Windows operating system, followed by the `Users` directory and the current
    user which, on my personal computers, is `wsv`. Your username will obviously be
    different. At this point, don''t worry about what comes to *the left* of the `>`
    prompt: it varies depending on each computer and can be customized at a later
    date. The shorter prompt of `>` will be used going forward for Windows.


    On macOS, the built-in terminal is called appropriately enough *Terminal*. It
    can be opened via Spotlight: press the `Command` and `space bar` keys at the same
    time and then type in "terminal." Alternatively, open a new Finder window, navigate
    to the *Applications* directory, scroll down to open the *Utilities* directory,
    and double-click the application called Terminal. This opens a new screen with
    a white background by default and a blinking cursor after the `%` prompt. Don''t
    worry about what comes to the left of the `%` prompt. It varies by computer and
    can be customized later on.


    ```

    Wills-Macbook-Pro:~ wsv%

    ```


    If your macOS prompt is `$` instead of `%` that means you are using `Bash` as
    the shell. Starting in 2019, macOS switched from *Bash* to *zsh* as the default
    shell. While most of the commands in this book will work interchangeably, it is
    recommended to look up online how to change to zsh via `System Preferences` if
    your computer still uses Bash.


    ### Shell Commands


    There are many available shell commands but most developers rely on the same handful
    over and over again and look up more complicated ones as needed.


    In many cases, the commands for Windows (PowerShell) and macOS are similar. For
    example, the command `whoami` returns the computer name/username on Windows and
    just the username on macOS. As with all shell commands, type the command itself
    followed by the `return` key. Note that the `#` symbol represents a comment and
    will not be executed on the command line.


    ```

    # Windows

    > whoami

    wsv2021/wsv


    # macOS

    % whoami

    wsv

    ```


    Sometimes, however, the shell commands on Windows and macOS are completely different.
    A good example is the command for outputting a basic "Hello, World!" message to
    the console. On Windows the command is `Write-Host` while on macOS the command
    is `echo`.


    ```

    # Windows

    > Write-Host "Hello, World!"

    Hello, World!


    # macOS

    % echo "Hello, World!"

    Hello, World!

    ```


    A frequent task on the command line is navigating within the computer filesystem.
    On Windows and macOS the command pwd (print working directory) shows the current
    location.


    ```

    # Windows

    > pwd


    Path

    ----

    C:\Users\wsv


    # macOS

    % pwd

    /Users/wsv

    ```


    You can save your Django code anywhere you like but for convenience we will place
    our code the desktop directory. The command cd (change directory) followed by
    the intended location works on both systems.


    ```

    # Windows

    > cd onedrive\desktop

    > pwd


    Path

    ----

    C:\Users\wsv\onedrive\desktop


    # macOS

    % cd desktop

    % pwd

    /Users/wsv/desktop

    ```


    **Tip**: The `tab` key will autocomplete a command so if you type `cd d` and then
    hit `tab` it will automatically fill in the rest of the name. If there are more
    than two directories that start with `d`, hit the `tab` key again to cycle through
    them.


    To make a new directory use the command `mkdir` followed by the name. We will
    create one called `code` on the Desktop and then within it a new directory called
    `setup`.


    ```

    # Windows

    > mkdir code

    > cd code

    > mkdir setup

    > cd setup


    # macOS

    % mkdir code

    % cd code

    % mkdir setup

    % cd setup

    ```


    You can check that it has been created by looking on your Desktop or running the
    command `ls`. The full Windows output is slightly longer but is shortened here
    for conciseness.


    ```

    # Windows

    > ls

    setup


    # macOS

    % ls

    setup

    ```


    **Tip**: The `clear` command will clear the Terminal of past commands and outputs
    so you have a clean slate. The `tab` command autocompletes the line as we''ve
    discussed. And the вЖС and вЖУ keys cycle through previous commands to save yourself
    from typing the same thing over and over again.


    To exit you could close the Terminal with your mouse but the hacker way is to
    use use the shell command `exit` instead. This works by default on Windows but
    on macOS the Terminal preferences need to be changed. At the top of the screen
    click on `Terminal`, then `Preferences` from the drop down menu. Click on `Profiles`
    in the top menu and then `Shell` from the list below. There is a radio button
    for "When the shell exits:". Select "Close the window."


    ```

    # Windows

    > exit


    # macOS

    % exit

    ```


    Kinda cool, right? With practice, the command line is a far more efficient way
    to navigate and operate your computer than using a mouse. For this book you don''t
    need to be a command line expert: I will provide the exact instructions to run
    each time. But if you are curious, a complete list of shell commands for each
    operating system can be found over at `ss64.com`.


    ### Install Python 3 on Windows


    On Windows, Microsoft hosts a community release of Python 3 in the Microsoft Store.
    In the search bar on the bottom of your screen type in "python" and click on the
    best match result.


