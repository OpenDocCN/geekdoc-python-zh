  - '[PAGE 30]


    at `https://www.python.org` and click on the link for the "About" page you''ll
    be redirected to `https://www.python.org/about/`. The `/about/` piece is the path.


    In summary, every URL like `https://python.org/about/` has three potential parts:


    +   - a scheme - `https`

    - a hostname - `www.python.org`

    - and an (optional) path - `/about/`


    # ## Internet Protocol Suite


    Once we know the actual URL of a resource, a whole collection of other technologies
    must work properly (together) to connect the client with the server and load an
    actual webpage. This is broadly referred to as the [internet protocol suite](https://en.wikipedia.org/wiki/Internet_protocol_suite)^16
    and there are entire books written on just this topic. For our purposes, however,
    we can stick to the broad basics.


    Several things happen when a user types `https://www.google.com` into their web
    browser and hits Enter. First the browser needs to find the desired server, somewhere,
    on the vast internet. It uses a *domain name service* (DNS) to translate the domain
    name "google.com" into an [IP address](https://en.wikipedia.org/wiki/IP_address)^17,
    which is a unique sequence of numbers representing every connected device on the
    internet. Domain names are used because it is easier for humans to remember a
    domain name like "google.com" than an IP address like "172.217.164.68".


    After the browser has the IP address for a given domain, it needs a way to set
    up a consistent connection with the desired server. This happens via the *Transmission
    Control Protocol* (TCP) which provides reliable, ordered, and error-checked delivery
    of bytes between two application.


    To establish a TCP connection between two computers, a three-way "handshake" occurs
    between the client and server:


    +   1. The client sends a `SYN` asking to establish a connection

    2. The server responds with a `SYN-ACK` acknowledging the request and passing
    a connection parameter'
  - '[PAGE 31]


    +   3. The client sends an ACK back to the server confirming the connection


    Once the TCP connection is established, the two computers can start communicating
    via HTTP.


    # HTTP Verbs


    Every webpage contains both an address (the URL) as well as a list of approved
    actions known as HTTP verbs. So far we''ve mainly talked about getting a web page,
    but it''s also possible to create, edit, and delete content.


    Consider the Facebook website. After logging in, you can read your timeline, create
    a new post, or edit/delete an existing one. These four actions Create-Read-Update-Delete
    are known colloquially as "CRUD" and represent the overwhelming majority of actions
    taken online.


    The HTTP protocol contains a number of *request methods* that can be used while
    requesting information from a server. The four most common map to CRUD functionality:
    `POST`, `GET`, `PUT`, and `DELETE`.


    # Diagram


    | CRUD | | HTTP Verbs |

    |------|---|------------|

    | Create | <-------------------> | POST |

    | Read | <-------------------> | GET |

    | Update | <-------------------> | PUT |

    | Delete | <-------------------> | DELETE |


    To create content you use `POST`, to read content `GET`, to update it `PUT`, and
    to delete it you use `DELETE`.


    # Endpoints


    A traditional website consists of web pages with HTML, CSS, images, JavaScript,
    and more. There is a dedicated URL, such as `example.com/1/`, for each page. A
    web API also relies on URLs and a corresponding one might be `example.com/api/1/`,
    but instead of serving up web pages'
  - '[PAGE 32]


    consumable by humans it produces API *endpoints*. An endpoints contains data,
    typically in the [JSON](https://json.org/) format, and also a list of available
    actions (HTTP verbs).


    For example, we could create the following API endpoints for a new website called
    `mysite`.


    # Diagram


    ```

    https://www.mysite.com/api/users          # GET returns all users

    https://www.mysite.com/api/users/<id>     # GET returns a single user

    ```


    In the first endpoint, `/api/users`, an available `GET` request returns a list
    of all available users. This type of endpoint which returns multiple data resources
    is known as a **collection**.


    The second endpoint, `/api/users/<id>`, represents a single user. A `GET` request
    returns information about just that one user.


    If we added a `POST` to the first endpoint we could create a new user, while adding
    `DELETE` to the second endpoint would allow us to delete a single user.


    We will become much more familiar with API endpoints over the course of this book
    but ultimately creating an API involves making a series of endpoints: URLs that
    expose JSON data and associated HTTP verbs.


    # HTTP


    We''ve already talked a lot about HTTP in this chapter, but now we will describe
    what it actually is and how it works.


    HTTP is a *request-response* protocol between two computers that have an existing
    TCP connection. The computer making the requests is known as the *client* while
    the computer responding is known as the *server*. Typically a client is a web
    browser but it could also be an iOS app or really any internet-connected device.
    A server is a fancy name for any computer optimized to work over the internet.
    All we really need to transform a basic laptop into a server is some special software
    and a persistent internet connection.'
  - '[PAGE 33]


    Every HTTP message consists of a status line, headers, and optional body data.
    For example, here is a sample HTTP message that a browser might send to request
    the Google homepage located at `https://www.google.com`.


    # Diagram'
  - '[PAGE 34]


    # Diagram


    ```

    Response/request line

    Headers...


    (optional) Body

    ```


    Most web pages contain multiple resources that require multiple HTTP request/response
    cycles. If a webpage had HTML, one CSS file, and an image, three separate trips
    back-and-forth between the client and server would be required before the complete
    web page could be rendered in the browser.


    # Status Codes


    Once your web browser has executed an HTTP Request on a URL there is no guarantee
    things will actually work! Thus there is a quite lengthy list of [HTTP Status
    Codes](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes) available to accompany
    each HTTP response.


    You can tell the general type of status code based on the following system:


    +   - 2xx Success - the action requested by the client was received, understood,
    and accepted

    - 3xx Redirection - the requested URL has moved

    - 4xx Client Error - there was an error, typically a bad URL request by the client

    - 5xx Server Error - the server failed to resolve a request


    There is no need to memorize all the available status codes. With practice you
    will become familiar with the most common ones such as 200 (OK), 201 (Created),
    301 (Moved Permanently), 404 (Not Found), and 500 (Server Error).


    The important thing to remember is that, generally speaking, there are only four
    potential outcomes to any given HTTP request: it worked (2xx), it was redirected
    somehow (3xx), the client made an error (4xx), or the server made an error (5xx).


    These status codes are automatically placed in the request/response line at the
    top of every HTTP message.


    > https://en.wikipedia.org/wiki/List_of_HTTP_status_codes'
  - '[PAGE 35]


    # ## Statelessness


    A final important point to make about HTTP is that it is a **stateless** protocol.
    This means each request/response pair is completely independent of the previous
    one. There is no stored memory of past interactions, which is known as [state](https://en.wikipedia.org/wiki/State_(computer_science))
    in computer science.


    Statelessness brings a lot of benefits to HTTP. Since all electronic communication
    systems have signal loss over time, if we *did* not have a stateless protocol,
    things would constantly break if one request/response cycle didn''t go through.
    As a result, HTTP is known as a very resilient distributed protocol.


    The downside is that managing state is really, really important in web applications.
    State is how a website remembers that you''ve logged in and how an e-commerce
    site manages your shopping cart. It''s fundamental to how we use modern websites,
    yet it''s not supported on HTTP itself.


    Historically, state was maintained on the server but it has moved more and more
    to the client, the web browser, in modern front-end frameworks like React, Angular,
    and Vue. We''ll learn more about state when we cover user authentication but remember
    that HTTP is stateless. This makes it very good for reliably sending information
    between two computers, but bad at remembering anything outside of each individual
    request/response pair.


    # ## REST


    [REpresentational State Transfer](https://en.wikipedia.org/wiki/Representational_state_transfer)
    ([REST](https://en.wikipedia.org/wiki/Representational_state_transfer)) is an
    architecture first proposed in 2000 by Roy Fielding in his dissertation thesis.
    It is an approach to building APIs on top of the web, which means on top of the
    HTTP protocol.


    Entire books have been written on what makes an API actually RESTful or not. But
    there are three main traits that we will focus on here for our purposes. Every
    RESTful API:


    +   - is stateless, like HTTP

    - supports common HTTP verbs (GET, POST, PUT, DELETE, etc.)'
