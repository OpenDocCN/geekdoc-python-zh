  md: "# ## Serializers\n\nNow for our serializers. Create a new `posts/serializers.py`\
    \ file with your text editor. The serializer not only transforms data into JSON,\
    \ it can also specify which fields to include or exclude. In our case, we will\
    \ include the `id` field Django automatically adds to database models but we will\
    \ *exclude* the `updated_at` field by not including it in our `fields`.\n\nThe\
    \ ability to include/exclude fields in our API this easily is a remarkable feature.\
    \ More often than not, an underlying database model will have far more fields\
    \ than what needs to be exposed. Django REST Framework's powerful serializer class\
    \ makes it extremely straightforward to control this.\n\n# ### Code\n\n```\npython\n\
    # posts/serializers.py\nfrom rest_framework import serializers\n\nfrom .models\
    \ import Post\n\n\nclass PostSerializer(serializers.ModelSerializer):\n    class\
    \ Meta:\n        fields = (\n            \"id\",\n            \"author\",\n  \
    \          \"title\",\n            \"body\",\n            \"created_at\",\n  \
    \      )\n        model = Post\n```\n\nAt the top of the file we have imported\
    \ Django REST Framework's `serializers` class and our own `models`. Then we created\
    \ a `PostSerializer` and added a `Meta` class where we specified which fields\
    \ to include and explicitly set the model, `Post`, to use. There are many ways\
    \ to customize a serializer but for common use cases, such as a basic blog, this\
    \ is all we need."
