  md: '# # Virtual Environments


    Installing the latest version of Python and Django is the correct approach for
    any new project. But in the real world, it is common that existing projects rely
    on older versions of each. Consider the following situation: Project A uses Django
    2.2 but Project B uses Django 4.0? By default, Python and Django are installed
    *globally* on a computer meaning it is quite a pain to install and reinstall different
    versions every time you want to switch between projects.


    Fortunately, there is a straightforward solution. *Virtual environments* allow
    you to create and manage separate environments for each Python project on the
    same computer. There are many areas of software development that are hotly debated,
    but using virtual environments for Python development is not one. **You should
    use a dedicated virtual environment for each new Python project.**


    There are several ways to implement virtual environments but the simplest is with
    the [venv](https://docs.python.org/3/library/venv.html) module already installed
    as part of the Python 3 standard library. To try it out, navigate to the existing
    setup directory on your Desktop.


    ```

    **Shell**



    # Windows

    > cd onedrive\desktop\code\setup


    # macOS

    % cd ~/desktop/code/setup

    ```


    To create a virtual environment within this new directory use the format `python
    -m venv <name_of_env>` on Windows or `python3 -m venv <name_of_env>` on macOS.
    It is up to the developer to choose a proper environment name but a common choice
    is to call it `.venv`.'
  merge: -1
