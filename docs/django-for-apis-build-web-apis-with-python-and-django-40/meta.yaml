    We cannot build a web API with only Django Rest Framework. It always must be added
    to a project *after* Django itself has been installed and configured.


    In this chapter, we will review the similarities and differences between traditional
    Django and Django REST Framework. The most important takeaway is that Django creates
    websites containing webpages, while Django REST Framework creates web APIs which
    are a collection of URL endpoints containing available HTTP verbs that return
    JSON.


    To illustrate these concepts, we will build out a basic *Library* website with
    traditional Django and then extend it into a web API with Django REST Framework.


