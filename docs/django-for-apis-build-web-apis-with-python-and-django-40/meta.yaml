    # ## Tests


    Testing in Django relies upon Python''s built-in [unittest](https://docs.python.org/3/library/unittest.html#module-unittest)¬≥вБЈ
    module and several helpful Django-specific extensions. Most notably, Django comes
    with a [test client](https://docs.djangoproject.com/en/4.0/topics/testing/tools/#the-test-client)¬≥вБЄ
    that we can use to simulate GET or POST requests, check the chain of redirects
    in a web request, and check that a given Django template is being used and has
    the proper template context data.


    Django REST Framework provides [several additional helper classes](https://www.django-rest-framework.org/api-guide/testing/)¬≥вБє
    that extend Django''s existing test framework. One of these is `APIClient`, an
    extension of Django''s default `Client`, which we will use to test retrieving
    API data from our database.


    Since we already have tests in `books/tests.py` for our Book model we can focus
    on testing the API endpoint, specifically that it uses the URL we expect, has
    the correct status code of 200, and contains the correct content.


    Open the `apis/tests.py` file with your text editor and fill in the following
    code which we will review below.'
