- md: "test to execute the tests.\n\n## Shell\n\n```\n(.venv) > python manage.py test\n\
    Creating test database for alias 'default'...\nSystem check identified no issues\
    \ (0 silenced).\n..\n----------------------------------------------------------------------\n\
    Ran 2 tests in 0.007s\n\nOK\nDestroying test database for alias 'default'...\n\
    ```\n\nThey all pass! Great, we can move on with our project.\n\n## Git\n\nWhenever\
    \ we have added new code it is a good idea to track our progress using Git. Make\
    \ sure you've stopped the local server with `Control+c`. Then run `git init` to\
    \ initialize a new repo and `git status` to check its contents.\n\n## Shell\n\n\
    ```\n(.venv) > git init\n(.venv) > git status\nOn branch main\n\nNo commits yet\n\
    \nUntracked files:\n  (use \"git add <file>...\" to include in what will be committed)\n\
    \        .venv/\n        books/\n        db.sqlite3\n        django_project/\n\
    \        manage.py\n\nnothing added to commit but untracked files present (use\
    \ \"git add\" to track)\n```\n\nAt the moment, the virtual environment `.venv`\
    \ is included which is not a best practice because it can contain secret information\
    \ such as API keys that we do not want to be tracked. To fix this create a new\
    \ file with your text editor called `.gitignore` in the project-level directory\
    \ next to `manage.py`. A `.gitignore` file tells Git what to ignore. Add a single\
    \ line for `.venv`.\n\n## .gitignore\n\n```\n.venv/\n```\n\nIf you run `git status`\
    \ again you will see that `.venv` is not longer there. It has been \"ignored\"\
    \ by Git. We do, however, want a record of all packages installed in the virtual\
    \ environment. The current best practice is to run the command `pip freeze` with\
    \ the `>` operator to output the contents to a new file called `requirements.txt`.\n\
    \n## Shell\n\n```\n(.venv) > pip freeze > requirements.txt\n```\n\nLet's add *all*\
    \ our work by using the command `add -A` and then `commit` the changes along with\
    \ a message (`-m`) describing what has changed.\n\n## Shell\n\n```\n(.venv) >\
    \ git add -A\n(.venv) > git commit -m \"initial commit\"\n```\n\n## Conclusion\n\
    \nThis chapter has been all about setting up a traditional Django project. We\
    \ went through the standard steps of creating a new project, adding a new app,\
    \ and then updating models, views, urls, and templates. The `admin.py` file has\
    \ to be updated so we can see our new content and we added tests to ensure our\
    \ code works and we can add new functionality without worrying about a mistake.\n\
    \nIn the next chapter we'll add Django REST Framework and see how quickly a traditional\
    \ Django website can be transformed into a web API.\n\n## Chapter 4: Library API\n\
    \nOur Library website currently consists of a single page that displays all books\
    \ in the database. To transform it into a web API we will install Django REST\
    \ Framework and create a new URL that acts an API endpoint outputting all available\
    \ books. If you recall from Chapter 2, a web API does not output a traditional\
    \ webpage with HTML, CSS, and JavaScript. Instead, it is just pure data (often\
    \ in the JSON format) and accompanying HTTP verbs that specify what user actions\
    \ are allowed. In this instance, an API user can only *read* the content, they\
    \ are not able to update it in any way though we will learn how to do that in\
    \ future chapters.\n\n### Django REST Framework\n\nAs we saw in Chapter 1, adding\
    \ Django REST Framework is just like installing any other third-party app. Make\
    \ sure to quit the local server with `Control+c` if it is still running. Then\
    \ on the command line type the following.\n\n**Shell**\n\n```\n(.venv) > python\
    \ -m pip install djangorestframework~=3.13.0\n```\n\nWe have to formally notify\
    \ Django of the new installation in our `django_project/settings.py` file. Scroll\
    \ down to the `INSTALLED_APPS` section and add `rest_framework`. I like to make\
    \ a distinction between third-party apps and local apps since the number of apps\
    \ grows quickly in most projects.\n\n## Code\n\n```\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    # 3rd\
    \ party\n    \"rest_framework\",  # new\n    # Local\n    \"books.apps.BooksConfig\"\
    ,\n]\n```\n\nUltimately, our web API will expose a single endpoint that lists\
    \ out all books in JSON. To do this, we will need a new URL route, a new view,\
    \ and a new serializer file (more on this shortly).\n\nThere are multiple ways\
    \ to organize these files. Many professional Django developers will just include\
    \ API logic in the related app while putting URLs under an /api/ prefix. For now\
    \ though, to keep the API logic clear from the traditional Django logic, we will\
    \ create a dedicated apis app for our project.\n\nLet's do that now by using the\
    \ startapp command. Remember that apps should always have a plural name since\
    \ Django will otherwise automatically add an s is the admin and other locations.\n\
    \n## Shell\n\n```\n(.venv) > python manage.py startapp apis\n```\n\nThen add it\
    \ to INSTALLED_APPS in our \"Local\" section.\n\n## Code\n\n```\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    # 3rd\
    \ party\n    \"rest_framework\",\n    # Local\n    \"books.apps.BooksConfig\"\
    ,\n    \"apis.apps.ApisConfig\",  # new\n]\n```\n\nThe `apis` app will not have\
    \ its own database models so there is no need to create a migration file and run\
    \ `migrate` to update the database. In fact, the database models are the one area\
    \ we don't need to touch at all since this new web API is designed to expose existing\
    \ data not create new data.\n\n## URLs\n\nLet's start with our URL configs. Adding\
    \ an API endpoint is just like configuring a traditional Django URL route. In\
    \ the project-level `django_project/urls.py` file include the `apis` app and configure\
    \ its URL route, which will be at `api/`.\n\n## Code\n\n```\n# django_project/urls.py\n\
    from django.contrib import admin\nfrom django.urls import path, include\n\nurlpatterns\
    \ = [\n    path(\"admin/\", admin.site.urls),\n    path(\"api/\", include(\"apis.urls\"\
    )),  # new\n    path(\"\", include(\"books.urls\")),\n]\n```\n\nThen create a\
    \ new file called `apis/urls.py` with your text editor. This file will import\
    \ a future view called `BookAPIView` and set it to the URL route of `\"\"` so\
    \ it will appear at `api/`. As always, we'll add a name to it as well, `book_list`,\
    \ which helps in the future when we want to refer to this specific route.\n\n\
    ## Code\n\n```\n# apis/urls.py\nfrom django.urls import path\n\nfrom .views import\
    \ BookAPIView\n\nurlpatterns = [\n    path(\"\", BookAPIView.as_view(), name=\"\
    book_list\"),\n]\n```\n\nAll set.\n\n## Views\n\nIn traditional Django views are\
    \ used to customize what data to send to the templates. Django REST Framework\
    \ views are similar except the end result is serialized data in JSON format, not\
    \ the content for a web page! Django REST Framework views rely on a model, a URL,\
    \ and a new file called a serializer that we'll see in the next section.\n\nThere\
    \ are generic Django REST Framework views for common use cases and we'll use [ListAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#listapiview)\
    \ here to display all books.\n\nTo avoid confusion, some developers will call\
    \ an API views file `apiviews.py` or `api.py`. Personally, when working within\
    \ a dedicated `apis` app I do not find it confusing to just call a Django REST\
    \ Framework views file `views.py` but opinion varies on this point.\n\nUpdate\
    \ the `apis/views.py` file so it looks like the following:\n\n```python\n# apis/views.py\n\
    from rest_framework import generics\n\nfrom books.models import Book\nfrom .serializers\
    \ import BookSerializer\n\n\nclass BookAPIView(generics.ListAPIView):\n    queryset\
    \ = Book.objects.all()\n    serializer_class = BookSerializer\n```\n\nOn the top\
    \ lines we have imported Django REST Framework's [generics](https://www.django-rest-framework.org/api-guide/generic-views/#generic-views)\
    \ class of views, the `Book` model from our books app, and `serializers` from\
    \ our api app. We will create the serializer used here, `BookSerializer`, in the\
    \ following section.\n\nThen we create a view class called `BookAPIView` that\
    \ uses `ListAPIView` to create a read-only endpoint for all book instances. There\
    \ are many generic views available and we will explore them further in later chapters.\n\
    \nThe only two steps required in our view are to specify the `queryset`, which\
    \ is all available books, and then the `serializer_class` which will be `BookSerializer`.\n\
    \n### Serializers\n\nWe're on the final step now! So far we have created a `urls.py`\
    \ file and a `views.py` file for our API. The lastвАУbut most importantвАУaction is\
    \ to create our serializer.\n\nA [serializer](https://www.django-rest-framework.org/api-guide/serializers/)\
    \ translates complex data like querysets and model instances into a format that\
    \ is easy to consume over the internet, typically JSON. It is also possible to\
    \ \"deserialize\" data, literally"
