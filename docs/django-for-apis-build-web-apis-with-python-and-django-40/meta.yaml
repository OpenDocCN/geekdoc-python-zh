    \ following code.\n\n# Code\n\n```\n# todos/serializers.py\nfrom rest_framework\
    \ import serializers\n\nfrom .models import Todo\n\n\nclass TodoSerializer(serializers.ModelSerializer):\n\
    \    class Meta:\n        model = Todo\n        fields = (\n            \"id\"\
    ,\n            \"title\",\n            \"body\",\n        )\n```\n\nAt the top\
    \ we have imported `serializers` from Django REST Framework along with our `Todo`\
    \ database model. Then we extended `ModelSerializer` into a new class called `TodoSerializer`.\
    \ The format here is very similar to how we create model classes or forms in Django\
    \ itself. We're specifying which model to use and the specific fields on it we\
    \ want to expose. Remember that `id` (similar to a `pk`) is created automatically\
    \ by Django so we didn't have to define it in our Todo model but we will display\
    \ in our individual detail view for each todo. And that's it! Django REST Framework\
    \ will magically transform our data into JSON exposing the fields for `id`, `title`,\
    \ and `body` from our `Todo` model.\n\nWhat's the difference between `id` and\
    \ `pk`? They both refer to a field automatically added to Django models by the\
    \ ORM. `id`[^55] is a built-in function from the Python standard library while\
    \ `pk`[^56] comes from Django itself. Generic class-based views like DetailView\
    \ in Django expect to be passed a parameter named `pk` while on model fields it\
    \ is often common to simply refer to `id`.\n\nThe last thing we need to do is\
    \ configure a `views.py` file to accompany our serializer and URLs.\n\n[^55]:\
