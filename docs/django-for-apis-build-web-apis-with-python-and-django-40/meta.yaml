  md: '# # Chapter 7: Permissions


    Security is an important part of any website but it is doubly important with web
    APIs. Currently our *Blog API* allows anyone full access. There are no restrictions;
    any user can do anything which is extremely dangerous. For example, an anonymous
    user can create, read, update, or delete any blog post. Even one they did not
    create! Clearly we do not want this.


    Django REST Framework ships with several out-of-the-box permissions settings that
    we can use to secure our API. These can be applied at a project-level, a view-level,
    or at any individual model level.


    In this chapter we will explore all three and end up with a custom permission
    so that only the author of a blog post has the ability to update or delete it.


    # ## Project-Level Permissions


    Django REST Framework has a [host of configurations](https://www.django-rest-framework.org/api-guide/settings/)
    that are namespaced inside a single Django setting called `REST_FRAMEWORK`. We
    already made one of those, [AllowAny](https://www.django-rest-framework.org/api-guide/permissions/#allowany),
    explicit in the `django_project/settings.py` file.'
