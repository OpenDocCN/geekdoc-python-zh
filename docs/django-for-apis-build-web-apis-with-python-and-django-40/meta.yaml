    # ## Permissions


    If we stop and consider our API at the moment there is actually a huge security
    issue. Any authenticated user can add a new user on the User List page or edit/delete/update
    an individual on the User Instance page because there are no explicit permissions
    for `UserViewSet`. This is a big problem!


    It is important to think of permissions for any API endpoint but especially when
    user information is involved. In this case, we want to restrict access to superusers
    only. If we look at the Permissions page in the official documentation there is
    an existing permissions setting called [IsAdminUser](https://www.django-rest-framework.org/api-guide/permissions/#isadminuser)^108^
    which is what we want. Adding it to the `UserViewSet` is actually pretty


