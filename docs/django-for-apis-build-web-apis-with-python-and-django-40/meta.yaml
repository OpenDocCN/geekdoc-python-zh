  md: "# ## Schema\n\nThe [OpenAPI](https://www.openapis.org/) specification is the\
    \ current default way to document an API. It describes common rules around format\
    \ for available endpoints, inputs, authentication methods, contact information,\
    \ and more. As of this writing, [drf-spectacular](https://github.com/tfranzel/drf-spectacular/)\
    \ is the recommended third-party package for generating an OpenAPI 3 schema for\
    \ Django REST Framework.\n\nTo start, install drf-spectacular with Pip in the\
    \ usual way.\n\n# ### Shell\n\n```\nshell\n(.venv) > python -m pip install drf-spectacular~=0.21.0\n\
    ```\n\nAdd it to the `INSTALLED_APPS` configuration in the `django_project/settings.py`\
    \ file.\n\n# ### Code\n\n```\npython\n# django_project/settings.py\nINSTALLED_APPS\
    \ = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\"\
    ,\n    \"django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"\
    django.contrib.staticfiles\",\n    \"django.contrib.sites\",\n\n    # 3rd-party\
    \ apps\n    \"rest_framework\",\n    \"corsheaders\",\n    \"rest_framework.authtoken\"\
    ,\n    \"allauth\",\n    \"allauth.account\",\n    \"allauth.socialaccount\",\n\
    \    \"dj_rest_auth\",\n    \"dj_rest_auth.registration\",\n    \"drf_spectacular\"\
    ,  # new\n\n    # Local\n    \"accounts.apps.AccountsConfig\",\n```"
  merge: -1
  pgno: 176
- img_proc: true
  md: "```\n\"posts.apps.PostsConfig\",\n]\n```\n\nThen register drf-spectacular within\
    \ the REST_FRAMEWORK section of the django_project/settings.py file.\n\n# Code\n\
    \n```\n# django_project/settings.py\nREST_FRAMEWORK = {\n    \"DEFAULT_PERMISSION_CLASSES\"\
    : [\n        \"rest_framework.permissions.IsAuthenticated\",\n    ],\n    \"DEFAULT_AUTHENTICATION_CLASSES\"\
    : [\n        \"rest_framework.authentication.SessionAuthentication\",\n      \
    \  \"rest_framework.authentication.TokenAuthentication\",\n    ],\n    \"DEFAULT_SCHEMA_CLASS\"\
    : \"drf_spectacular.openapi.AutoSchema\",  # new\n}\n```\n\nThe last step is adding\
