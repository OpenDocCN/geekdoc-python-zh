    # ## CORS


    [Cross-Origin Resource Sharing (CORS)](https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS)
    refers to the fact that whenever a client interacts with an API hosted on a different
    domain (`mysite.com` vs `yoursite.com`) or port (`localhost:3000` vs `localhost:8000`)
    there are potential security issues.


    Specifically, CORS requires the web server to include specific HTTP headers that
    allow for the client to determine if and when cross-domain requests should be
    allowed. Because we are using a SPA architecture the front-end will be on a different
    local port during development and a completely different domain once deployed!


    The easiest way to handle this issue--and the one [recommended by Django REST
    Framework](http://www.django-rest-framework.org/topics/ajax-csrf-cors/)--is to
    use middleware that will automatically include the appropriate HTTP headers based
    on our settings. The third-party package [django-cors-headers](https://github.com/adamchainz/django-cors-headers)
    is the default choice within the Django community and can easily added to our
    existing project.


    Make sure to stop the local server with `Control+c` and then install `django-cors-headers`
    with Pip.'
