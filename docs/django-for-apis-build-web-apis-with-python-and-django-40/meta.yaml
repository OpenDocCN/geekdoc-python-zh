    # # Introduction


    In this book you will learn how to build multiple web APIs of increasing complexity
    using Django and Django REST Framework. Django is a very popular Python-based
    web framework that handles the challenging parts of building a website: authentication,
    connecting to a database, logic, security, and so on. There are also thousands
    of third-party packages that add functionality to Django itself, the most prominent
    of which is Django REST Framework, which allows developers to transform any existing
    Django project into a powerful web API.


    Django and Django REST Framework are used by the largest tech companies in the
    world, including Instagram, Mozilla, and Pinterest. But they are also well-suited
    to beginners or weekend side projects because Django''s "batteries-included" approach
    masks much of the underlying complexity, allowing for rapid and secure development.
    By the end of this book you will be able to create production-ready web APIs with
    a small amount of code in an even smaller amount of time.


    # ## Why APIs


    An API (*Application Programming Interface*) is a shorthand way to describe how
    two computers communicate directly with one another. For web APIs, which exist
    on the world wide web, the dominant architectural pattern is know as REST (*REpresentational
    State Transfer*) and will be covered properly later on in this book.


    Back in 2005, when Django was first released, most websites consisted of one large
    monolithic codebase. The back-end of database models, views, and URLs were combined
    with front-end templates to control the presentational layer of each web page.


    But these days it is far more common for websites to adopt an API-first approach
    of formally separating the back-end from the front-end. This allows a website
    to use a dedicated JavaScript front-end framework, such as React or Vue, which
    were released in 2013 and 2014 respectively.'
  - '[PAGE 9]


    When the current front-end frameworks are eventually replaced by even newer ones
    in the years to come, the back-end API can remain the same. No major rewrite is
    required.


    Another major benefit is that one single API can support multiple front-ends written
    in different languages and frameworks. Consider that JavaScript is used for web
    front-ends, while Android apps require the Java programming language, and iOS
    apps need the Swift programming language. With a traditional monolithic approach,
    a Django website cannot support these various front-ends. But with an internal
    API, all three can communicate with the same underlying database back-end!


    Growing websites can also benefit from creating an external API that allows third-party
    developers to build their own iOS or Android apps. When I worked at Quizlet back
    in 2010 we did not have the resources to develop our own iOS or Android apps,
    but we *did* have an external API available that more than 30 developers used
    to create their own flashcard apps powered by the Quizlet database. Several of
    these apps were downloaded over a million times, enriching the developers and
    increasing the reach of Quizlet at the same time.


    The major downside to an API-first approach is that it requires more configuration
    than a traditional Django application. However as we will see in this book, the
    fantastic Django REST Framework library removes much of that complexity for us.


    # ## Django REST Framework


    There are thousands of third-party apps available that add further functionality
    to Django. You can see a complete, searchable list over at [Django Packages](https://djangopackages.org/)¬є,
    as well as a curated list in the [awesome-django repo](https://github.com/wsvincent/awesome-django)¬≤.
    However, amongst all third-party applications, Django REST Framework is arguably
    **the** killer app for Django. It is mature, full of features, customizable, testable,
    and extremely well-documented. It also purposefully mimics many of Django''s traditional
    conventions, which makes learning it much faster. If you already know Django,
    then learning Django REST Framework is the logical next step.


    +   ¬єhttps://djangopackages.org/

    ¬≤https://github.com/wsvincent/awesome-django'
