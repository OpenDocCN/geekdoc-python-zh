  - "[PAGE 59]\n\nthe same process in reverse, whereby JSON data is first validated\
    \ and then transformed into a dictionary.\n\nThe real beauty of Django REST Framework\
    \ lies in its serializers which abstracts away most of the complexity for us.\
    \ We will cover serialization and JSON in more depth in future chapters but for\
    \ now the goal is to demonstrate how easy it is to create a serializer with Django\
    \ REST Framework.\n\nIn your text editor, create a new file called `apis/serializers.py`\
    \ and update it as follows:\n\n# Code\n\n```\n# apis/serializers.py\nfrom rest_framework\
    \ import serializers\n\nfrom books.models import Book\n\n\nclass BookSerializer(serializers.ModelSerializer):\n\
    \    class Meta:\n        model = Book\n        fields = (\"title\", \"subtitle\"\
    , \"author\", \"isbn\")\n```\n\nOn the top lines we import Django REST Framework's\
    \ `serializers` class and the `Book` model from our books app. Next, we extend\
    \ Django REST Framework's [ModelSerializer](https://www.django-rest-framework.org/api-guide/serializers/#modelserializer)^34\
    \ into a `BookSerializer` class that specifies our database model, `Book`, and\
    \ the database fields we want to expose of `title`, `subtitle`, `author`, and\
    \ `isbn`.\n\nAnd that's it! We're done. By creating a new URL route, a new view,\
    \ and a serializer class we have created an API endpoint for our Library website\
    \ that will display all existing books in list format.\n\n# Browsable API\n\n\
    Raw JSON data is not particularly friendly to consume with human eyes. Fortunately,\
    \ Django REST Framework ships with a built-in browsable API that displays both\
    \ the content and HTTP verbs associated with a given endpoint. To see it in action\
    \ start up the local web server with the `runserver` command."
