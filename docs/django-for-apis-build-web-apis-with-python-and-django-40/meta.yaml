    \n# HTML\n\n```\n<!-- books/templates/books/book_list.html -->\n<h1>All books</h1>\n\
    {% for book in book_list %}\n<ul>\n  <li>Title: {{ book.title }}</li>\n  <li>Subtitle:\
    \ {{ book.subtitle }}</li>\n  <li>Author: {{ book.author }}</li>\n  <li>ISBN:\
    \ {{ book.isbn }}</li>\n</ul>\n{% endfor %}\n```\n\nDjango ships with a [template\
    \ language](https://docs.djangoproject.com/en/4.0/ref/templates/language/) that\
    \ allows for basic logic. Here we use the [for](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#std:templatetag-for)\
    \ tag to loop over all available books. Template tags must be included within\
    \ opening/closing brackets and parentheses. So the format is always `{% for ...\
    \ %}` and then we must close our loop later with `{% endfor %}`.\n\nWhat we are\
    \ looping over is the object containing all available books in our model courtesy\
    \ of `ListView`. The name of this object is `<model>_list` which, given our model\
    \ is named `book`, means it is `book_list`. Therefore to loop over each book we\
    \ write `{% for book in book_list %}`. And then display each field from our model.\n\
    \nNow we can start up the local Django server again."
