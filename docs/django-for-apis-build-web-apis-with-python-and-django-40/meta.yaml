- img_proc: true
  md: '![](img/2db12769584651a6cc5b3e87f94eed01_187_0.png)


    **404 Page**


    We want `DEBUG` to be `True` for local development yet `False` for production.
    And if there is any difficulty loading the environment variables, we want `DEBUG`
    to default to `False` so we''re extra secure. To implement this, start by adding
    `DEBUG=True` to the `.env` file.


    **.env**


    ```


    DEBUG=True

    ```


    Then in `django_project/settings.py`, change the `DEBUG` setting to read the variable
    "DEBUG" from the `.env` file but with a default value of `False`.


    **Code**


    ```

