    +   - returns data in either the JSON or XML format


    Any RESTful API must, at a minimum, have these three principles. The standard
    is important because it provides a consistent way to both design and consume web
    APIs.


    # ## Conclusion


    While there is **a lot** of technology underlying the modern world wide web, we
    as developers don''t have to implement it all from scratch. The beautiful combination
    of Django and Django REST Framework handles, properly, most of the complexity
    involved with web APIs. However, it is important to have at least a broad understanding
    of how all the pieces fit together.


    Ultimately, a web API is a collection of endpoints that expose certain parts of
    an underlying database. As developers we control the URLs for each endpoint, what
    underlying data is available, and what actions are possible via HTTP verbs. By
    using HTTP headers we can set various levels of authentication and permission
    too as we will see later in the book.'
