  md: '# # Chapter 2: Web APIs


    Before we start building our own web APIs with Django it''s important to review
    how the web really works. After all, a "web API" literally sits on top of the
    existing architecture of the world wide web and relies on a host of technologies
    including HTTP, TCP/IP, and more.


    In this chapter we will review the basic terminology of web APIs: endpoints, resources,
    HTTP verbs, HTTP status codes, and REST. Even if you already feel comfortable
    with these terms, I encourage you to read the chapter in full.


    # ## World Wide Web


    The Internet is a system of interconnected computer networks that has existed
    since [at least the 1960s](https://en.wikipedia.org/wiki/Internet)^13. However,
    the internet''s early usage was restricted to a small number of isolated networks,
    largely government, military, or scientific in nature, that exchanged information
    electronically. By the 1980s, many research institutes and universities were using
    the internet to share data. In Europe, the biggest internet node was located at
    CERN (European Organization for Nuclear Research) in Geneva, Switzerland, which
    operates the largest particle physics laboratory in the world. These experiments
    generate enormous quantities of data that need to be shared remotely with scientists
    all around the world.


    Compared with today, though, overall internet usage in the 1980s was miniscule.
    Most people did not have access to it or even understood why it mattered. A small
    number of internet nodes powered all the traffic and the computers using it were
    primarily within the same, small networks.


    This all changed in 1989 when a research scientist at CERN, Tim Berners-Lee, invented
    HTTP and ushered in the modern World Wide Web. His great insight was that the
    existing [hypertext](https://en.wikipedia.org/wiki/Hypertext)^14'
  merge: -1
  pgno: 28
- img_proc: true
  md: 'system, where text displayed on a computer screen contained links (hyperlinks)
    to other documents, could be moved onto the internet.


    His invention, [Hypertext Transfer Protocol (HTTP)](https://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol)^15,
    was the first standard, universal way to share documents over the internet. It
    ushered in the concept of web pages: discrete documents with a URL, links, and
    resources such as images, audio, or video.


    Today, when most people think of "the internet," they think of the World Wide
    Web, which is now the primary way that billions of people and computers communicate
    online.


    # ## URLs


    A URL (Uniform Resource Locator) is the address of a resource on the internet.
    For example, the Google homepage lives at `https://www.google.com`.


    When you want to go to the Google homepage, you type the full URL address into
    a web browser. Your browser then sends a request out over the internet and is
    magically connected (we''ll cover what actually happens shortly) to a server that
    responds with the data needed to render the Google homepage in your browser.


    This **request** and **response** pattern is the basis of all web communication.
    A **client** (typically a web browser but also a native app or really any internet-connected
    device) requests information and a **server** responds with a response.


    Since web communication occurs via HTTP these are known more formally as HTTP
    requests and HTTP responses.


    Within a given URL are also several discrete components. For example, consider
    the Google homepage located at `https://www.google.com`. The first part, `https`,
    refers to the **scheme** used. It tells the web browser *how* to access resources
    at the location. For a website this is typically `http` or `https`, but it could
    also be `ftp` for files, `smtp` for email, and so on. The next section, `www.google.com`,
    is the **hostname** or the actual name of the site. Every URL contains a scheme
    and a host.


    Many webpages also contain an optional **path**, too. If you go to the homepage
    for Python'
