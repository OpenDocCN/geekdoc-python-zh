  md: "```\n\n(.venv) > heroku login\n```\n\nThe command `heroku create` makes a new\
    \ container for our app to live in and by default, Heroku will assign a random\
    \ name. You can specify a custom name, as we are doing here, but it must be *unique\
    \ on Heroku*. Mine is called `dfa-blog-api` so that name is already taken; you\
    \ need another combination of letters and numbers!\n\n```\n\n(.venv) > heroku\
    \ create dfa-blog-api\nCreating вђҐ dfa-blog-api... done\nhttps://dfa-blog-api.herokuapp.com/\
    \ | https://git.heroku.com/dfa-blog-api.git\n```\n\nSo far so good. A new step\
    \ at this point is creating a PostgreSQL database on Heroku itself, which we haven't\
    \ done before. Heroku has its own hosted PostgreSQL databases we can use which\
    \ come in multiple tiers. For a learning project like this, the free `hobby-dev`\
    \ tier is more than adequate. Run the following command to create this new database.\
    \ Replace `dfa-blog-api` with your own custom name.\n\n```\n\n(.venv) > heroku\
    \ addons:create heroku-postgresql:hobby-dev -a dfa-blog-api\nCreating heroku-postgresql:hobby-dev\
    \ on вђҐ dfa-blog-api... free\nDatabase has been created and is available\n ! This\
    \ database is empty. If upgrading, you can transfer\n ! data from another database\
    \ with pg:copy\nCreated postgresql-angular-74744 as DATABASE_URL\nUse heroku addons:docs\
    \ heroku-postgresql to view documentation\n```\n\nDid you see that Heroku has\
    \ created a custom `DATABASE_URL` to access the database? For mine here, it is\
    \ `postgresql-angular-74744`. This is automatically available as a configuration\
    \ variable within Heroku once we deploy. That's why we don't need to set an environment\
    \ variable for `DATABASE_URL` in production. We also don't need to set `DEBUG`\
    \ to `False` because that is the default value in our `django_project/settings.py`\
    \ file. The only environment variable to manually add to Heroku is `SECRET_KEY`,\
    \ so copy its value from your `.env` file and run the `config:set` command, placing\
    \ the value of the `SECRET_KEY` itself within double quotes `\"\"`."
