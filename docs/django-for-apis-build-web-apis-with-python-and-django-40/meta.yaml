    # DEBUG & SECRET_KEY


    Django''s default `settings.py` file automatically defaults to local production
    settings that make it easy to start with projects, but there are several configurations
    that need to be tweaked before deploying into production. If you look at the `DEBUG`
    configuration in `django_project/settings.py` it is currently set to `True`. This
    generates a very detailed error page and stack trace. For example, start up the
    local webserver with `python manage.py runserver` and visit an API endpoint that
    doesn''t exist such as `http://127.0.0.1:8000/99`.'
