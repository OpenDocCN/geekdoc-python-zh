    # Procfile and runtime.txt


    Heroku relies on a custom file called `Procfile` that describes how to run projects
    in production. This must be created in the project root directory next to the
    `manage.py` file. Do so now in your text editor and add the following line to
    use Gunicorn as the production web server.


    **Procfile**


    ```

    web: gunicorn django_project.wsgi --log-file -

    ```


    The final step is to specify which Python version should run on Heroku with a
    `runtime.txt` file. In your text editor, create this new `runtime.txt` file at
    the project-level meaning it is in the same directory as `manage.py` and the `Procfile`.
    The Python version we want is 3.10.2.


    **runtime.txt**


    ```

    python-3.10.2

    ```'
