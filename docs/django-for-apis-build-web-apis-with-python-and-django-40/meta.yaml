    # # Chapter 8: User Authentication


    In the previous chapter we updated our APIs permissions, which is also called
    **authorization**. In this chapter we will implement **authentication** which
    is the process by which a user can register for a new account, log in with it,
    and log out.


    Within a traditional, monolithic Django website authentication is simpler and
    involves a session-based cookie pattern which we will review below. But with an
    API things are a bit trickier. Remember that HTTP is a **stateless protocol**
    so there is no built-in way to remember if a user is authenticated from one request
    to the next. Each time a user requests a restricted resource it must verify itself.


    The solution is to pass along a unique identifier with each HTTP request. Confusingly,
    there is no universally agreed-upon approach for the form of this identifier and
    it can take multiple forms. Django REST Framework ships with [four different built-in
    authentication options](https://www.django-rest-framework.org/api-guide/authentication/#api-reference)вБЄвБі:
    basic, session, token, and default. And there are many more third-party packages
    that offer additional features like JSON Web Tokens (JWTs).


    In this chapter we will thoroughly explore how API authentication works, review
    the pros and cons of each approach, and then make an informed choice for our Blog
    API. By the end, we will have created API endpoints for sign up, log in, and log
    out.


    # ## Basic Authentication


    The most common form of HTTP authentication is known as ["Basic" Authentication](https://tools.ietf.org/html/rfc7617)вБЄвБµ.
    When a client makes an HTTP request, it is forced to send an approved authentication
    credential before access is granted.


    The complete request/response flow looks like this:'
  - "[PAGE 139]\n\n+   1. Client makes an HTTP request\n2. Server responds with an\
    \ HTTP response containing a `401 (Unauthorized)` status code and `WWW-Authenticate`\
    \ HTTP header with details on how to authorize\n3. Client sends credentials back\
    \ via the [Authorization](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Authorization)\
    \ HTTP header\n4. Server checks credentials and responds with either `200 OK`\
    \ or `403 Forbidden` status code\n\nOnce approved, the client sends all future\
    \ requests with the `Authorization` HTTP header credentials. We can also visualize\
    \ this exchange as follows:\n\n# Diagram\n\n```\nClient                      \
    \                        Server\n------                                      \
    \        ------\n\n-------------------------------------->\nGET / HTTP/1.1\n\n\
    \                                     <--------------------------------------\n\
    \                                          HTTP/1.1 401 Unauthorized\n       \
    \                                   WWW-Authenticate: Basic\n\n-------------------------------------->\n\
    GET / HTTP/1.1\nAuthorization: Basic d3N2OnBhc3N3b3JkMTIz\n\n                \
    \                     <--------------------------------------\n              \
    \                            HTTP/1.1 200 OK\n```\n\nNote that the authorization\
    \ credentials sent are the unencrypted [base64 encoded](https://en.wikipedia.org/wiki/Base64)\
    \ version of `<username>:<password>`. So in my case, this is `wsv:password123`\
    \ which with base64 encoding is `d3N2OnBhc3N3b3JkMTIz`.\n\nThe primary advantage\
    \ of this approach is its simplicity. But there are several major downsides. First,\
    \ on *every single request* the server must look up and verify the username and\
    \ password, which is inefficient. It would be better to do the look up once and\
    \ then pass a token of some kind that says, this user is approved. Second, user\
    \ credentials are being passed in clear textвАФnot encrypted at allвАФover the internet.\
    \ This is incredibly insecure. Any internet traffic that is not"
  - '[PAGE 140]


    encrypted can easily be captured and reused. Thus basic authentication should
    **only** be used via [HTTPS](https://en.wikipedia.org/wiki/HTTPS)^88, the secure
    version of HTTP.


    # ## Session Authentication


    Monolithic websites, like traditional Django, have long used an alternative authentication
    scheme that is a combination of sessions and cookies. At a high level, the client
    authenticates with its credentials (username/password) and then receives a session
    ID from the server which is stored as a cookie. This session ID is then passed
    in the header of every future HTTP request.


    When the session ID is passed, the server uses it to look up a session object
    containing all available information for a given user, including credentials.


    This approach is **stateful** because a record must be kept and maintained on
    both the server (the session object) and the client (the session ID).


    Let''s review the basic flow:


    +   1. A user enters their log in credentials (typically username/password)

    2. The server verifies the credentials are correct and generates a session object
    that is then stored in the database

    3. The server sends the client a session IDвАФnot the session object itselfвАФwhich
    is stored as a cookie on the browser

    4. On all future requests the session ID is included as an HTTP header and, if
    verified by the database, the request proceeds

    5. Once a user logs out of an application, the session ID is destroyed by both
    the client and server

    6. If the user later logs in again, a new session ID is generated and stored as
    a cookie on the client


    The default setting in Django REST Framework is actually a combination of Basic
    Authentication and Session Authentication. Django''s traditional session-based
    authentication system is used and the session ID is passed in the HTTP header
    on each request via Basic Authentication.'
  - '[PAGE 141]


    The advantage of this approach is that it is more secure since user credentials
    are only sent once, not on every request/response cycle as in Basic Authentication.
    It is also more efficient since the server does not have to verify the user''s
    credentials each time, it just matches the session ID to the session object which
    is a fast look up.


    There are several downsides however. First, a session ID is only valid within
    the browser where log in was performed; it will not work across multiple domains.
    This is an obvious problem when an API needs to support multiple front-ends such
    as a website and a mobile app. Second, the session object must be kept up-to-date
    which can be challenging in large sites with multiple servers. How do you maintain
    the accuracy of a session object across each server? And third, the cookie is
    sent out for every single request, even those that don''t require authentication,
    which is inefficient.


    As a result, it is generally not advised to use a session-based authentication
    scheme for any API that will have multiple front-ends.


    # Token Authentication


    The third major approachвАУand the one we will implement in our *Blog API*вАУis to
    use token authentication. This is the most popular approach in recent years due
    to the rise of single page applications.


    Token-based authentication is **stateless**: once a client sends the initial user
    credentials to the server, a unique token is generated and then stored by the
    client as either a cookie or in [local storage](https://developer.mozilla.org/en-US/docs/Web/API/Window/localStorage).
    This token is then passed in the header of each incoming HTTP request and the
    server uses it to verify that a user is authenticated. The server itself does
    not keep a record of the user, just whether a token is valid or not.


    > > **Cookies vs localStorage**

    >

    > Cookies are used for reading **server-side** information. They are smaller (4KB)
    in size and automatically sent with each HTTP request. LocalStorage is designed
    for **client-side** information. It is much larger (5120KB) and its contents are
    not sent by default with each HTTP request.


    вБЄвБєhttps://developer.mozilla.org/en-US/docs/Web/API/Window/localStorage'
