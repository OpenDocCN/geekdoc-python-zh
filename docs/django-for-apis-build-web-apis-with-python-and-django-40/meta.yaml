    # ## CSRF


    Just as CORS is an issue when dealing with a SPA architecture, so too are forms.
    Django comes with robust [CSRF protection](https://docs.djangoproject.com/en/4.0/ref/csrf/)
    that should be added to forms in any Django template, but with a dedicated React
    front-end setup this protection isn''t inherently available. Fortunately, we can
    allow specific cross-domain requests from our frontend by setting [CSRF_TRUSTED_ORIGINS](https://docs.djangoproject.com/en/4.0/ref/settings/#csrf-trusted-origins).


    At the bottom of the `settings.py` file, next to `CORS_ORIGIN_WHITELIST`, add
    this additional line for React''s default local port of 3000:


    ```

    python

    # django_project/settings.py

    CSRF_TRUSTED_ORIGINS = ["localhost:3000"]

    ```


    And that''s it! Our back-end is now complete and capable of communicating with
    any front-end that uses port 3000. If our front-end of choice dictates a different
    port that can easily be updated in our code.


