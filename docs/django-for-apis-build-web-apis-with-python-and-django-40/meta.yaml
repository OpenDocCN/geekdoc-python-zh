    \ methods explicitly because each defaults to `True`, meaning they will allow\
    \ access implicitly unless set explicitly.\n\nIn our case, we want only the author\
    \ of a blog post to have write permissions to edit or delete it. We also want\
    \ to restrict read-only list view to authenticated users. To do this we'll create\
    \ a new file called `posts/permissions.py` and fill it with the following code:\n\
    \n# Code\n\n```\n# posts/permissions.py\nfrom rest_framework import permissions\n\
    \n\nclass IsAuthorOrReadOnly(permissions.BasePermission):\n    def has_permission(self,\
