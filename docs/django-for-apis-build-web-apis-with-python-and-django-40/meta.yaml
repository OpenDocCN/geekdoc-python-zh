    STATIC_ROOT = BASE_DIR / \"staticfiles\"  # new\nSTATICFILES_STORAGE =\n    \"\
    whitenoise.storage.CompressedManifestStaticFilesStorage\"  # new\n```\n\nThe final\
    \ step is to run the `collectstatic` command so that all static directories and\
