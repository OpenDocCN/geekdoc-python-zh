  md: "# ## Documentation\n\nA schema is well and good for consumption by a computer\
    \ but humans generally prefer documentation for using an API. There are two API\
    \ documentation tools supported by `drf-spectacular`: [Redoc](https://redoc.ly/redoc/)\
    \ and [SwaggerUI](https://swagger.io/tools/swagger-ui/). Fortunately transforming\
    \ our schema into either is a relatively painless process.\n\nLet's begin with\
    \ Redoc. To add it import `SpectacularRedocView` at the top of `django_project/urls.py`\
    \ and then add a URL path at `api/schema/redoc/`.\n\n**Code**\n\n```\npython\n\
    # django_project/urls.py\nfrom django.contrib import admin\nfrom django.urls import\
    \ path, include\nfrom drf_spectacular.views import (\n    SpectacularAPIView,\n\
    \    SpectacularRedocView,  # new\n)\n\n\nurlpatterns = [\n    path(\"admin/\"\
    , admin.site.urls),\n    path(\"api/v1/\", include(\"posts.urls\")),\n    path(\"\
    api-auth/\", include(\"rest_framework.urls\")),\n    path(\"api/v1/dj-rest-auth/\"\
    , include(\"dj_rest_auth.urls\")),\n    path(\"api/v1/dj-rest-auth/registration/\"\
    ,\n        include(\"dj_rest_auth.registration.urls\")\n    ),\n    path(\"api/schema/\"\
    , SpectacularAPIView.as_view(), name=\"schema\"),\n    path(\"api/schema/redoc/\"\
    , SpectacularRedocView.as_view(\n        url_name=\"schema\"), name=\"redoc\"\
    ,),  # new\n]\n```\n\nIf the local server is still running you can head directly\
    \ to `http://127.0.0.1:8000/api/schema/redoc/` to see our new documentation."
