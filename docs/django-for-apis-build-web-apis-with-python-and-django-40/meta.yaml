  md: '# # Introduction


    In this book you will learn how to build multiple web APIs of increasing complexity
    using Django and Django REST Framework. Django is a very popular Python-based
    web framework that handles the challenging parts of building a website: authentication,
    connecting to a database, logic, security, and so on. There are also thousands
    of third-party packages that add functionality to Django itself, the most prominent
    of which is Django REST Framework, which allows developers to transform any existing
    Django project into a powerful web API.


    Django and Django REST Framework are used by the largest tech companies in the
    world, including Instagram, Mozilla, and Pinterest. But they are also well-suited
    to beginners or weekend side projects because Django''s "batteries-included" approach
    masks much of the underlying complexity, allowing for rapid and secure development.
    By the end of this book you will be able to create production-ready web APIs with
    a small amount of code in an even smaller amount of time.


    # ## Why APIs


    An API (*Application Programming Interface*) is a shorthand way to describe how
    two computers communicate directly with one another. For web APIs, which exist
    on the world wide web, the dominant architectural pattern is know as REST (*REpresentational
    State Transfer*) and will be covered properly later on in this book.


    Back in 2005, when Django was first released, most websites consisted of one large
    monolithic codebase. The back-end of database models, views, and URLs were combined
    with front-end templates to control the presentational layer of each web page.


    But these days it is far more common for websites to adopt an API-first approach
    of formally separating the back-end from the front-end. This allows a website
    to use a dedicated JavaScript front-end framework, such as React or Vue, which
    were released in 2013 and 2014 respectively.'
