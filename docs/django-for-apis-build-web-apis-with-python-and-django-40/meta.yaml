- md: "**Library API**\n\nDeployment is a complicated topic and we've intentionally\
    \ taken a number of shortcuts here. But the goal is to walkthrough a very basic\
    \ Django website and API to show how it can be created from scratch.\n\n## Conclusion\n\
    \nWe covered a lot of material in this chapter so don't worry if things feel a\
    \ little confusing right now. We added Django REST Framework to our existing *Library*\
    \ website and created an API endpoint for our books. Then we added tests and deployed\
    \ our project to Heroku.\n\nWeb APIs can do a lot more than simply list information\
    \ from your database though. In the next chapter we will build and deploy our\
    \ own Todo API back-end that can be easily consumed by any front-end.\n\n## Chapter\
    \ 5: Todo API\n\nIn this chapter we will build and deploy *Todo API* back-end\
    \ that contains both a list API endpoint for all todos and dedicated endpoints\
    \ for each individual todo. We will also learn about *Cross-Origin Resource Sharing*\
    \ (CORS) which is a necessary security feature when a deployed back-end needs\
    \ to communicate with a front-end. We have already made our first API and reviewed\
    \ how HTTP and REST work in the abstract but it's still likely you don't \"quite\"\
    \ see how it all fits together yet. By the end of these two chapters you will.\n\
    \n### Single Page Apps (SPAs)\n\nSPAs are required for mobile apps that run on\
    \ iOS or Android and is the dominant pattern for web apps that want to take advantage\
    \ of JavaScript front-end frameworks like React, Vue, Angular, and others.\n\n\
    There are multiple advantages to adopting a SPA approach. Developers can focus\
    \ on their own area of expertise, typically either front-end or the back-end,\
    \ but rarely both. It allows for using testing and build tools suitable to the\
    \ task at hand since building, testing, and deploying a Django project is quite\
    \ different than doing the same for a JavaScript one like React. And the forced\
    \ separation removes the risk of coupling; it is not possible for front-end changes\
    \ to break the back-end.\n\nFor large teams, SPAs make a lot of sense since there\
    \ is already a built-in separation of tasks. Even in smaller teams, the adoption\
    \ cost of an SPA approach is relatively small. The main risk of separating the\
    \ back-end and the front-end is that it requires domain knowledge in both areas.\
    \ While Django is relatively mature at this point the front-end ecosystem is decidedly\
    \ not. A solo developer should think carefully about whether the added complexity\
    \ of a dedicated JavaScript front-end is worth it versus sprinkling JavaScript\
    \ into existing Django templates with modern tools like [htmx](https://htmx.org/)вБµ¬є.\n\
    \nвБµ¬єhttps://htmx.org/\n\n### Initial Set Up\n\nThe first step for any Django API\
    \ is always to install Django and then later add Django REST Framework on top\
    \ of it. From the command line, navigate to the code directory on the Desktop\
    \ and create both a todo folder.\n\n**Shell**\n\n```\n# Windows\n> cd onedrive\\\
    desktop\\code\n> mkdir todo && cd todo\n\n# macOS\n% cd desktop/code\n% mkdir\
    \ todo && cd todo\n```\n\nThen run through the standard steps of creating a new\
    \ virtual environment, activating it, and installing Django.\n\n**Shell**\n\n\
    ```\n# Windows\n> python -m venv .venv\n> .venv\\Scripts\\Activate.ps1\n(.venv)\
    \ > python -m pip install django~=4.0.0\n\n# macOS\n% python3 -m venv .venv\n\
    % source .venv/bin/activate\n(.venv) % python3 -m pip install django~=4.0.0\n\
    ```\n\nNow that Django is installed we should start by creating a traditional\
    \ Django project called django_project, adding an app called todos within it,\
    \ and then migrating the initial database.\n\n**Shell**\n\n```\n(.venv) > django-admin\
    \ startproject django_project .\n(.venv) > python manage.py startapp todos\n(.venv)\
    \ > python manage.py migrate\n```\n\nIn Django we always need to add new apps\
    \ to our `INSTALLED_APPS` setting so do that now. Open up `django_project/settings.py`\
    \ in your text editor and add `todos` to the bottom of the installed apps.\n\n\
    **Code**\n\n```python\n# django_project/settings.py\nINSTALLED_APPS = [\n    \"\
    django.contrib.admin\",\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\"\
    ,\n    \"django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"\
    django.contrib.staticfiles\",\n    # Local\n    \"todos.apps.TodosConfig\",  #\
    \ new\n]\n```\n\nIf you run `python manage.py runserver` on the command line now\
    \ and navigate in your web browser to `http://127.0.0.1:8000/` you can see our\
    \ project is successfully installed. We are ready to proceed.\n\n### .gitignore\n\
    \nSince we will be using Git for our source control it's important to create a\
    \ `.gitignore` file early to specify what should *not* be tracked. This includes\
    \ our new virtual environment `.venv`. To fix the issue, create a new file with\
    \ your text editor called `.gitignore` and add a single line for `.venv`.\n\n\
    **.gitignore**\n\n```\n.venv/\n```\n\nThen let's initialize a new Git repository\
    \ for our project and run `git status` to confirm the `.venv` file does not appear.\
    \ We can also add all our setup work via `git add -A` and write our first commit\
    \ message.\n\n**Shell**\n\n```\n(.venv) > git status\n(.venv) > git add -A\n(.venv)\
    \ > git commit -m \"initial commit\"\n```\n\n### Models\n\nNext up is defining\
    \ the `Todo` database model within the `todos` app. We will keep things basic\
    \ and have only two fields: `title` and `body`.\n\n**Code**\n\n```python\n# todos/models.py\n\
    from django.db import models\n\n\nclass Todo(models.Model):\n    title = models.CharField(max_length=200)\n\
    \    body = models.TextField()\n\n    def __str__(self):\n        return self.title\n\
    ```\n\nWe import `models` at the top and then subclass it to create our own `Todo`\
    \ model. A `__str__` method is also added to provide a human-readable name for\
    \ each future model instance.\n\nSince we have updated our model it's time for\
    \ Django's two-step dance of making a new migration file and then syncing the\
    \ database with the changes each time. On the command line type Control+c to stop\
    \ our local server. Then run the `makemigrations` command.\n\n**Shell**\n\n```\n\
    (.venv) > python manage.py makemigrations todos\nMigrations for 'todos':\n  todos/migrations/0001_initial.py\n\
    \    - Create model Todo\n```\n\nAnd then the `migrate` command.\n\n**Shell**\n\
    \n```\n(.venv) > python manage.py migrate\nOperations to perform:\n  Apply all\
    \ migrations: admin, auth, contenttypes, sessions, todos\nRunning migrations:\n\
    \  Applying todos.0001_initial... OK\n```\n\nIt is optional to add the specific\
    \ app we want to create a migration file forвАУwe could instead type just `python\
    \ manage.py makemigrations`вАУhowever it is a good best practice to adopt. Migration\
    \ files are a fantastic way to debug applications and you should strive to create\
    \ a migration file for each small change. If we had updated the models in two\
    \ different apps and then run `python manage.py makemigrations` the resulting\
    \ single migration file would contain data on both apps. That just makes debugging\
    \ harder. Try to keep your migrations as small as possible.\n\nNow we can use\
    \ the built-in Django admin app to interact with our database. If we went into\
    \ the admin straight away our `Todos` app would not appear. We need to explicitly\
    \ add it via the `todos/admin.py` file. While we're at it we can create a `TodoAdmin`\
    \ class that uses `list_display` so that both of our model fields, `title` and\
    \ `body`, will be visible.\n\n**Code**\n\n```python\n# todos/admin.py\nfrom django.contrib\
    \ import admin\n\nfrom .models import Todo\n\n\nclass TodoAdmin(admin.ModelAdmin):\n\
    \    list_display = (\n        \"title\",\n        \"body\",\n    )\n\n\nadmin.site.register(Todo,\
    \ TodoAdmin)\n```\n\nThat's it! Now we can create a superuser account to log in\
    \ to the admin.\n\n**Shell**\n\n```\n(.venv) > python manage.py createsuperuser\n\
    ```\n\nStart up the local server again with `python manage.py runserver` and navigate\
    \ to the admin section at `http://127.0.0.1:8000/admin/`. Log in and click on\
    \ \"+ Add\" next to Todos. Create 3 new todo items, making sure to add a title\
    \ and body for both. Here's what mine looks like:\n\n**Admin todos**\n\n### Tests\n\
    \nCode without tests is incomplete so we should add some now for our `Todo` model.\
    \ We will use Django's [TestCase](https://docs.djangoproject.com/en/4.0/topics/testing/tools/#testcase)\
    \ to create a test database and use `setUpTestData` to create test data for our\
    \ `TodoModelTest` class. We want to confirm that the `title` and `body` appear\
    \ as expected, as well as the `__str__` method on the model.\n\nOpen up the `todos/tests.py`\
    \ file and fill it with the following:"
  mdcn: "**еЇУ API**\n\nйГ®зљ≤жШѓдЄАдЄ™е§НжЭВзЪДиѓЭйҐШпЉМжИСдїђеЬ®ињЩйЗМжЬЙжДПйЗЗеПЦдЇЖдЄАдЇЫжНЈеЊДгАВдљЖзЫЃж†ЗжШѓжЉФзїГдЄАдЄ™йЭЮеЄЄеЯЇз°АзЪД Django зљСзЂЩеТМ APIпЉМе±Хз§Їе¶ВдљХдїОйЫґеЉАеІЛеИЫеїЇеЃГгАВ\n\
    \n## зїУиЃЇ\n\nжИСдїђеЬ®жЬђзЂ†дЄ≠жґµзЫЦдЇЖе§ІйЗПеЖЕеЃєпЉМжЙАдї•е¶ВжЮЬзО∞еЬ®жДЯиІЙжЬЙдЇЫеЫ∞жГСпЉМдЄНењЕжЛЕењГгАВжИСдїђеРСзО∞жЬЙзЪД*еЫЊдє¶й¶Ж*зљСзЂЩжЈїеК†дЇЖ Django REST FrameworkпЉМеєґдЄЇжИСдїђзЪДдє¶з±НеИЫеїЇдЇЖдЄАдЄ™\
    \ API зЂѓзВєгАВзДґеРОжИСдїђжЈїеК†дЇЖжµЛиѓХпЉМеєґе∞Жй°єзЫЃйГ®зљ≤еИ∞дЇЖ HerokuгАВ\n\nдЄНињЗпЉМWeb API иГљеБЪзЪДињЬдЄНж≠ҐзЃАеНХеЬ∞еИЧеЗЇжХ∞жНЃеЇУдЄ≠зЪДдњ°жБѓгАВеЬ®дЄЛдЄАзЂ†дЄ≠пЉМжИСдїђе∞ЖжЮДеїЇеєґйГ®зљ≤иЗ™еЈ±зЪД\
    \ Todo API еРОзЂѓпЉМдїїдљХеЙНзЂѓйГљеПѓдї•иљїжЭЊи∞ГзФ®еЃГгАВ\n\n## зђђ 5 зЂ†пЉЪTodo API\n\nеЬ®жЬђзЂ†дЄ≠пЉМжИСдїђе∞ЖжЮДеїЇеєґйГ®зљ≤дЄАдЄ™*Todo API*еРОзЂѓпЉМеЃГеМЕеРЂдЄАдЄ™зФ®дЇОжЙАжЬЙеЊЕеКЮдЇЛй°єзЪДеИЧи°®\
    \ API зЂѓзВєпЉМдї•еПКжѓПдЄ™еНХзЛђеЊЕеКЮдЇЛй°єзЪДдЄУзФ®зЂѓзВєгАВжИСдїђињШе∞Же≠¶дє†*иЈ®еЯЯиµДжЇРеЕ±дЇЂ*пЉИCORSпЉЙпЉМињЩжШѓйГ®зљ≤зЪДеРОзЂѓйЬАи¶БдЄОеЙНзЂѓйАЪдњ°жЧґзЪДдЄАй°єењЕи¶БзЪДеЃЙеЕ®еКЯиГљгАВжИСдїђеЈ≤зїПеИґдљЬдЇЖжИСдїђзЪДзђђдЄАдЄ™\
    \ APIпЉМеєґеЫЮй°ЊдЇЖ HTTP еТМ REST еЬ®жКљи±°е±ВйЭҐдЄКзЪДеЈ•дљЬеОЯзРЖпЉМдљЖдљ†еЊИеПѓиГљдїНзДґ\"дЄНе§™\"жШОзЩљињЩдЄАеИЗжШѓе¶ВдљХзїДеРИеЬ®дЄАиµЈзЪДгАВеЬ®ињЩдЄ§зЂ†зїУжЭЯжЧґпЉМдљ†е∞±дЉЪжШОзЩљдЇЖгАВ\n\
    \n### еНХй°µеЇФзФ®пЉИSPAsпЉЙ\n\nеНХй°µеЇФзФ®жШѓињРи°МеЬ® iOS жИЦ Android дЄКзЪДзІїеК®еЇФзФ®жЙАењЕйЬАзЪДпЉМдєЯжШѓеЄМжЬЫеИ©зФ® ReactгАБVueгАБAngular\
