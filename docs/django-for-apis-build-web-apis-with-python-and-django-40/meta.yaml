  md: 'Django REST Framework has a lengthy list of implicitly set default settings.
    You can see the [complete list here](http://www.django-rest-framework.org/api-guide/settings/)вБµвБі.
    `AllowAny` is one of them which means that when we set it explicitly, as we did
    above, the effect is exactly the same as if we had no `DEFAULT_PERMISSION_CLASSES`
    config set.


    Learning the default settings is something that takes time. We will become familiar
    with a number of them over the course of the book. The main takeaway to remember
    is that the implicit default settings are designed so that developers can jump
    in and start working quickly in a local development environment. Just as in traditional
    Django though, the default Django REST Framework settings are **not appropriate**
    for production. Before deployment we will typically make a number of changes to
    them over the course of a project.


    Ok, so Django REST Framework is installed. What next? Unlike the *Library* project
    in the previous chapters where we built both a webpage **and** an API, here we
    are just building an API. Therefore we do not need to create any template files
    or traditional Django views. It is also arguably unnecessary to create a separate
    `apis` app since this project is API-first by design. While Django comes with
    a lot of guardrails around project structure, it is up to the developer to decide
    how to organize their apps. This is a common point of confusion for newcomers
    but by building multiple projects with different app structures it becomes clearer
    that apps are just an organizational tool for the developer. As long as an app
    is added to `INSTALLED_APPS` and uses the correct import structure they can be
    used in almost any configuration.


    To transform our existing database model into a web API we will need to update
    the URLs, add Django Rest Framework views, and create a serializer. Let''s begin!


