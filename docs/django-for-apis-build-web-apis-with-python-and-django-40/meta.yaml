    DEBUG = env.bool("DEBUG", default=False)

    ```


    If you refresh the webpage at `http://127.0.0.1:8000/99`, you''ll see the full
    local error page is still there. Everything is working properly.


    The next setting to change is `SECRET_KEY` which is a random 50 character string
    generated each time `startproject` is run. If you look at the current value in
