    # Static Files


    [Static files](https://docs.djangoproject.com/en/4.0/howto/static-files/) are
    somewhat tricky to deploy properly on Django projects but the good news is that
    the process for Django APIs is essentially the same. Even though we do not have
    any of our own at this point, there are static files included in the Django admin
    and Django REST Framework browsable API so in order for those to deploy properly
    we must configure all static files.


    First we need to create a dedicated `static` directory.'
  - "[PAGE 66]\n\n# Shell\n\n```\n(.venv) > mkdir static\n```\n\nGit will not track\
    \ empty directories so it's important to add a `.keep` file so the `static` directory\
    \ is included in source control. Do so now with your text editor.\n\nThen we'll\
    \ install the [WhiteNoise](http://whitenoise.evans.io/en/stable/) package since\
    \ Django does not support serving static files in production itself.\n\n# Shell\n\
    \n```\n(.venv) > python -m pip install whitenoise==6.0.0\n```\n\nWhiteNoise must\
    \ be added to `django_project/settings.py` in the following locations:\n\n+  \
    \ - `whitenoise` above `django.contrib.staticfiles` in `INSTALLED_APPS`\n- `WhiteNoiseMiddleware`\
    \ above `CommonMiddleware`\n- `STATICFILES_STORAGE` configuration pointing to\
    \ WhiteNoise\n\n# Code\n\n```\n# django_project/settings.py\nINSTALLED_APPS =\
    \ [\n    ...\n    \"whitenoise.runserver_nostatic\",  # new\n    \"django.contrib.staticfiles\"\
    ,\n]\n\nMIDDLEWARE = [\n    \"django.middleware.security.SecurityMiddleware\"\
    ,\n    \"django.contrib.sessions.middleware.SessionMiddleware\",\n    \"whitenoise.middleware.WhiteNoiseMiddleware\"\
    ,  # new\n    ...\n]\n\nSTATIC_URL = \"/static/\"\nSTATICFILES_DIRS = [BASE_DIR\
    \ / \"static\"]  # new\nSTATIC_ROOT = BASE_DIR / \"staticfiles\"  # new\nSTATICFILES_STORAGE\
    \ =\n    \"whitenoise.storage.CompressedManifestStaticFilesStorage\"  # new\n\
    ```"
