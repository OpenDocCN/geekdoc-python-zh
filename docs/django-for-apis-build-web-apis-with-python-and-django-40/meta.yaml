  md: 'consumable by humans it produces API *endpoints*. An endpoints contains data,
    typically in the [JSON](https://json.org/) format, and also a list of available
    actions (HTTP verbs).


    For example, we could create the following API endpoints for a new website called
    `mysite`.


    # Diagram


    ```

    https://www.mysite.com/api/users          # GET returns all users

    https://www.mysite.com/api/users/<id>     # GET returns a single user

    ```


    In the first endpoint, `/api/users`, an available `GET` request returns a list
    of all available users. This type of endpoint which returns multiple data resources
    is known as a **collection**.


    The second endpoint, `/api/users/<id>`, represents a single user. A `GET` request
    returns information about just that one user.


    If we added a `POST` to the first endpoint we could create a new user, while adding
    `DELETE` to the second endpoint would allow us to delete a single user.


    We will become much more familiar with API endpoints over the course of this book
    but ultimately creating an API involves making a series of endpoints: URLs that
    expose JSON data and associated HTTP verbs.


    # HTTP


    We''ve already talked a lot about HTTP in this chapter, but now we will describe
    what it actually is and how it works.


    HTTP is a *request-response* protocol between two computers that have an existing
    TCP connection. The computer making the requests is known as the *client* while
    the computer responding is known as the *server*. Typically a client is a web
    browser but it could also be an iOS app or really any internet-connected device.
    A server is a fancy name for any computer optimized to work over the internet.
    All we really need to transform a basic laptop into a server is some special software
    and a persistent internet connection.'
