    | / | GET |\n| /:pk/ | GET |\n| /rest-auth/registration | POST |\n| /rest-auth/login\
    \ | POST |\n| /rest-auth/logout | GET |\n| /rest-auth/password/reset | POST |\n\
    | /rest-auth/password/reset/confirm | POST |\n\nThe first two endpoints were created\
