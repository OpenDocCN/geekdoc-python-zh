  md: 'at `https://www.python.org` and click on the link for the "About" page you''ll
    be redirected to `https://www.python.org/about/`. The `/about/` piece is the path.


    In summary, every URL like `https://python.org/about/` has three potential parts:


    +   - a scheme - `https`

    - a hostname - `www.python.org`

    - and an (optional) path - `/about/`


    # ## Internet Protocol Suite


    Once we know the actual URL of a resource, a whole collection of other technologies
    must work properly (together) to connect the client with the server and load an
    actual webpage. This is broadly referred to as the [internet protocol suite](https://en.wikipedia.org/wiki/Internet_protocol_suite)^16
    and there are entire books written on just this topic. For our purposes, however,
    we can stick to the broad basics.


    Several things happen when a user types `https://www.google.com` into their web
    browser and hits Enter. First the browser needs to find the desired server, somewhere,
    on the vast internet. It uses a *domain name service* (DNS) to translate the domain
    name "google.com" into an [IP address](https://en.wikipedia.org/wiki/IP_address)^17,
    which is a unique sequence of numbers representing every connected device on the
    internet. Domain names are used because it is easier for humans to remember a
    domain name like "google.com" than an IP address like "172.217.164.68".


    After the browser has the IP address for a given domain, it needs a way to set
    up a consistent connection with the desired server. This happens via the *Transmission
    Control Protocol* (TCP) which provides reliable, ordered, and error-checked delivery
    of bytes between two application.


    To establish a TCP connection between two computers, a three-way "handshake" occurs
    between the client and server:


    +   1. The client sends a `SYN` asking to establish a connection

    2. The server responds with a `SYN-ACK` acknowledging the request and passing
    a connection parameter'
  merge: -1
  pgno: 30
- img_proc: true
  md: '+   3. The client sends an ACK back to the server confirming the connection


    Once the TCP connection is established, the two computers can start communicating
    via HTTP.


    # HTTP Verbs


    Every webpage contains both an address (the URL) as well as a list of approved
    actions known as HTTP verbs. So far we''ve mainly talked about getting a web page,
    but it''s also possible to create, edit, and delete content.


    Consider the Facebook website. After logging in, you can read your timeline, create
    a new post, or edit/delete an existing one. These four actions Create-Read-Update-Delete
    are known colloquially as "CRUD" and represent the overwhelming majority of actions
    taken online.


    The HTTP protocol contains a number of *request methods* that can be used while
    requesting information from a server. The four most common map to CRUD functionality:
    `POST`, `GET`, `PUT`, and `DELETE`.


    # Diagram


    | CRUD | | HTTP Verbs |

    |------|---|------------|

    | Create | <-------------------> | POST |

    | Read | <-------------------> | GET |

    | Update | <-------------------> | PUT |

    | Delete | <-------------------> | DELETE |


    To create content you use `POST`, to read content `GET`, to update it `PUT`, and
    to delete it you use `DELETE`.


    # Endpoints


    A traditional website consists of web pages with HTML, CSS, images, JavaScript,
    and more. There is a dedicated URL, such as `example.com/1/`, for each page. A
    web API also relies on URLs and a corresponding one might be `example.com/api/1/`,
    but instead of serving up web pages'
