    \ жЦЗдїґеСКиѓЙ Git еЇФиѓ•ењљзХ•дїАдєИгАВжЈїеК†дЄАи°М `.venv`гАВ\n\n## .gitignore\n\n```\n.venv/\n```\n\nе¶ВжЮЬдљ†еЖНжђ°ињРи°М\
    \ `git status`пЉМдљ†дЉЪзЬЛеИ∞ `.venv` дЄНеЖНеЗЇзО∞дЇЖгАВеЃГеЈ≤иҐЂ Git\"ењљзХ•\"гАВдЄНињЗпЉМжИСдїђз°ЃеЃЮйЬАи¶БиЃ∞ељХиЩЪжЛЯзОѓеҐГдЄ≠еЃЙи£ЕзЪДжЙАжЬЙеМЕгАВељУеЙНжЬАдљ≥еЃЮиЈµжШѓињРи°М\
    \ `pip freeze` еСљдї§пЉМеєґдљњзФ® `>` жУНдљЬзђ¶е∞ЖеЖЕеЃєиЊУеЗЇеИ∞дЄАдЄ™еРНдЄЇ `requirements.txt` зЪДжЦ∞жЦЗдїґдЄ≠гАВ\n\n## Shell\n\
    \n```\n(.venv) > pip freeze > requirements.txt\n```\n\nиЃ©жИСдїђдљњзФ® `add -A` еСљдї§жЈїеК†*жЙАжЬЙ*жИСдїђзЪДеЈ•дљЬпЉМзДґеРО\
    \ `commit` жЫіжФєпЉМеєґйЩДдЄКдЄАжЭ°жґИжБѓпЉИ`-m`пЉЙжППињ∞еПСзФЯдЇЖдїАдєИеПШеМЦгАВ\n\n## Shell\n\n```\n(.venv) > git add -A\n\
    (.venv) > git commit -m \"initial commit\"\n```\n\n## зїУиЃЇ\n\nжЬђзЂ†дЄїи¶БдїЛзїНдЇЖе¶ВдљХжР≠еїЇдЄАдЄ™дЉ†зїЯзЪД Django\
    \ й°єзЫЃгАВжИСдїђеЃМжИРдЇЖеИЫеїЇжЦ∞й°єзЫЃгАБжЈїеК†жЦ∞еЇФзФ®пЉМзДґеРОжЫіжЦ∞ж®°еЮЛгАБиІЖеЫЊгАБURL еТМж®°жЭњзЪДж†ЗеЗЖж≠•й™§гАВ`admin.py` жЦЗдїґењЕй°їжЫіжЦ∞пЉМдї•дЊњжИСдїђиГље§ЯзЬЛеИ∞жЦ∞еЖЕеЃєпЉМжИСдїђињШжЈїеК†дЇЖжµЛиѓХдї•з°ЃдњЭдї£з†Бж≠£еЄЄеЈ•дљЬпЉМињЩж†ЈжИСдїђе∞±еПѓдї•жЈїеК†жЦ∞еКЯиГљиАМдЄНзФ®жЛЕењГеЗЇйФЩгАВ\n\
    \nеЬ®дЄЛдЄАзЂ†дЄ≠пЉМжИСдїђе∞ЖжЈїеК† Django REST FrameworkпЉМзЬЛзЬЛдЄАдЄ™дЉ†зїЯзЪД Django зљСзЂЩиГље§ЪењЂиҐЂжФєйА†жИР Web APIгАВ\n\n## зђђ\
    \ 4 зЂ†пЉЪеЫЊдє¶й¶Ж API\n\nжИСдїђзЪДеЫЊдє¶й¶ЖзљСзЂЩзЫЃеЙНзФ±еНХдЄ™й°µйЭҐзїДжИРпЉМжШЊз§ЇжХ∞жНЃеЇУдЄ≠зЪДжЙАжЬЙеЫЊдє¶гАВи¶Бе∞ЖеЕґиљђеПШдЄЇ Web APIпЉМжИСдїђе∞ЖеЃЙи£Е Django REST\
    \ Framework еєґеИЫеїЇдЄАдЄ™жЦ∞зЪД URLпЉМдљЬдЄЇиЊУеЗЇжЙАжЬЙеПѓзФ®еЫЊдє¶зЪД API зЂѓзВєгАВе¶ВжЮЬдљ†ињШиЃ∞еЊЧзђђ 2 зЂ†зЪДеЖЕеЃєпЉМWeb API дЄНдЉЪиЊУеЗЇеМЕеРЂ HTMLгАБCSS\
    \ еТМ JavaScript зЪДдЉ†зїЯзљСй°µгАВзЫЄеПНпЉМеЃГеП™жШѓзЇѓжХ∞жНЃпЉИйАЪеЄЄйЗЗзФ® JSON ж†ЉеЉПпЉЙдї•еПКжМЗеЃЪеЕБиЃЄзФ®жИЈжЙІи°МеУ™дЇЫжУНдљЬзЪД HTTP еК®иѓНгАВеЬ®ињЩзІНжГЕеЖµдЄЛпЉМAPI\
    \ зФ®жИЈеП™иГљ*иѓїеПЦ*еЖЕеЃєпЉМдїЦдїђжЧ†ж≥Хдї•дїїдљХжЦєеЉПжЫіжЦ∞еЖЕеЃєпЉМдЄНињЗжИСдїђе∞ЖеЬ®еРОзї≠зЂ†иКВдЄ≠е≠¶дє†е¶ВдљХеЃЮзО∞ињЩдЄАзВєгАВ\n\n### Django REST Framework\n\
    \nж≠£е¶ВжИСдїђеЬ®зђђ 1 зЂ†дЄ≠зЬЛеИ∞зЪДпЉМжЈїеК† Django REST Framework е∞±еГПеЃЙи£ЕдїїдљХеЕґдїЦзђђдЄЙжЦєеЇФзФ®дЄАж†ЈгАВе¶ВжЮЬжЬђеЬ∞жЬНеК°еЩ®дїНеЬ®ињРи°МпЉМиѓЈз°ЃдњЭдљњзФ® `Control+c`\
    \ йААеЗЇгАВзДґеРОеЬ®еСљдї§и°МдЄ≠иЊУеЕ•дї•дЄЛеЖЕеЃєгАВ\n\n**Shell**\n\n```\n(.venv) > python -m pip install djangorestframework~=3.13.0\n\
    ```\n\nжИСдїђйЬАи¶БеЬ® `django_project/settings.py` жЦЗдїґдЄ≠ж≠£еЉПйАЪзЯ• Django ињЩдЄ™жЦ∞еЃЙи£ЕгАВеРСдЄЛжїЪеК®еИ∞ `INSTALLED_APPS`\
    \ йГ®еИЖеєґжЈїеК† `rest_framework`гАВжИСеЦЬжђҐеМЇеИЖзђђдЄЙжЦєеЇФзФ®еТМжЬђеЬ∞еЇФзФ®пЉМеЫ†дЄЇеЬ®е§Іе§ЪжХ∞й°єзЫЃдЄ≠еЇФзФ®зЪДжХ∞йЗПдЉЪењЂйАЯеҐЮйХњгАВ\n\n## Code\n\n```\n\
    # django_project/settings.py\nINSTALLED_APPS = [\n    \"django.contrib.admin\"\
    ,\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\",\n    \"\
    django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"django.contrib.staticfiles\"\
    ,\n    # 3rd party\n    \"rest_framework\",  # new\n    # Local\n    \"books.apps.BooksConfig\"\
    ,\n]\n```\n\nжЬАзїИпЉМжИСдїђзЪД Web API е∞ЖжЪійЬ≤дЄАдЄ™зЂѓзВєпЉМдї• JSON ж†ЉеЉПеИЧеЗЇжЙАжЬЙеЫЊдє¶гАВдЄЇж≠§пЉМжИСдїђйЬАи¶БдЄАдЄ™жЦ∞зЪД URL иЈѓзФ±гАБдЄАдЄ™жЦ∞зЪДиІЖеЫЊеТМдЄАдЄ™жЦ∞зЪДеЇПеИЧеМЦеЩ®жЦЗдїґпЉИз®НеРОдЉЪиѓ¶зїЖдїЛзїНпЉЙгАВ\n\
    \nжЬЙе§ЪзІНжЦєеЉПжЭ•зїДзїЗињЩдЇЫжЦЗдїґгАВиЃЄе§ЪдЄУдЄЪзЪД Django еЉАеПСдЇЇеСШдЉЪе∞Ж API йАїиЊСеМЕеРЂеЬ®зЫЄеЕ≥еЇФзФ®дЄ≠пЉМеРМжЧґе∞Ж URL жФЊеЬ® /api/ еЙНзЉАдЄЛгАВдЄНињЗзЫЃеЙНпЉМдЄЇдЇЖдљњ\
    \ API йАїиЊСдЄОдЉ†зїЯ Django йАїиЊСжЄЕжЩ∞еИЖз¶їпЉМжИСдїђе∞ЖдЄЇй°єзЫЃеИЫеїЇдЄАдЄ™дЄУйЧ®зЪД apis еЇФзФ®гАВ\n\nзО∞еЬ®иЃ©жИСдїђдљњзФ® startapp еСљдї§жЭ•еИЫеїЇеЃГгАВиѓЈиЃ∞дљПпЉМеЇФзФ®еРНзІ∞еЇФеІЛзїИдљњзФ®е§НжХ∞ељҐеЉПпЉМеР¶еИЩ\
    \ Django дЉЪеЬ®зЃ°зРЖеРОеП∞еТМеЕґдїЦдљНзљЃиЗ™еК®жЈїеК† sгАВ\n\n## Shell\n\n```\n(.venv) > python manage.py startapp\
    \ apis\n```\n\nзДґеРОе∞ЖеЕґжЈїеК†еИ∞ INSTALLED_APPS зЪД\"Local\"йГ®еИЖгАВ\n\n## Code\n\n```\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    # 3rd\
    \ party\n    \"rest_framework\",\n    # Local\n    \"books.apps.BooksConfig\"\
    ,\n    \"apis.apps.ApisConfig\",  # new\n]\n```\n\n`apis` еЇФзФ®дЄНдЉЪжЬЙиЗ™еЈ±зЪДжХ∞жНЃеЇУж®°еЮЛпЉМеЫ†ж≠§жЧ†йЬАеИЫеїЇињБзІїжЦЗдїґеєґињРи°М\
    \ `migrate` жЭ•жЫіжЦ∞жХ∞жНЃеЇУгАВдЇЛеЃЮдЄКпЉМжХ∞жНЃеЇУж®°еЮЛжШѓжИСдїђеЃМеЕ®дЄНйЬАи¶БиІ¶еПКзЪДйҐЖеЯЯпЉМеЫ†дЄЇињЩдЄ™жЦ∞зЪД Web API жЧ®еЬ®жЪійЬ≤зО∞жЬЙжХ∞жНЃпЉМиАМдЄНжШѓеИЫеїЇжЦ∞жХ∞жНЃгАВ\n\n\
    ## URLs\n\nиЃ©жИСдїђдїО URL йЕНзљЃеЉАеІЛгАВжЈїеК† API зЂѓзВєе∞±еГПйЕНзљЃдЉ†зїЯзЪД Django URL иЈѓзФ±дЄАж†ЈгАВеЬ®й°єзЫЃзЇІзЪД `django_project/urls.py`\
    \ жЦЗдїґдЄ≠еМЕеРЂ `apis` еЇФзФ®еєґйЕНзљЃеЕґ URL иЈѓзФ±пЉМиѓ•иЈѓзФ±е∞ЖдљНдЇО `api/`гАВ\n\n## Code\n\n```\n# django_project/urls.py\n\
    from django.contrib import admin\nfrom django.urls import path, include\n\nurlpatterns\
    \ = [\n    path(\"admin/\", admin.site.urls),\n    path(\"api/\", include(\"apis.urls\"\
    )),  # new\n    path(\"\", include(\"books.urls\")),\n]\n```\n\nзДґеРОдљњзФ®жЦЗжЬђзЉЦиЊСеЩ®еИЫеїЇдЄАдЄ™еРНдЄЇ\
    \ `apis/urls.py` зЪДжЦ∞жЦЗдїґгАВиѓ•жЦЗдїґе∞ЖеѓЉеЕ•дЄАдЄ™жЬ™жЭ•зЪДиІЖеЫЊ `BookAPIView`пЉМеєґе∞ЖеЕґиЃЊзљЃдЄЇ `\"\"` зЪД URL иЈѓзФ±пЉМињЩж†ЈеЃГе∞ЖжШЊз§ЇеЬ®\
    \ `api/` дЄЛгАВеГПеЊАеЄЄдЄАж†ЈпЉМжИСдїђдєЯдЉЪзїЩеЃГжЈїеК†дЄАдЄ™еРНзІ∞ `book_list`пЉМињЩжЬЙеК©дЇОе∞ЖжЭ•жИСдїђжГ≥и¶БеЉХзФ®ињЩдЄ™зЙєеЃЪиЈѓзФ±жЧґгАВ\n\n## Code\n\n\
    ```\n# apis/urls.py\nfrom django.urls import path\n\nfrom .views import BookAPIView\n\
    \nurlpatterns = [\n    path(\"\", BookAPIView.as_view(), name=\"book_list\"),\n\
    ]\n```\n\nдЄАеИЗе∞±зї™гАВ\n\n## Views\n\nеЬ®дЉ†зїЯ Django дЄ≠пЉМиІЖеЫЊзФ®дЇОиЗ™еЃЪдєЙи¶БеПСйАБеИ∞ж®°жЭњзЪДжХ∞жНЃгАВDjango REST Framework\
    \ зЪДиІЖеЫЊз±їдЉЉпЉМдљЖжЬАзїИзїУжЮЬжШѓ JSON ж†ЉеЉПзЪДеЇПеИЧеМЦжХ∞жНЃпЉМиАМдЄНжШѓзљСй°µеЖЕеЃєпЉБDjango REST Framework зЪДиІЖеЫЊдЊЭиµЦдЇОж®°еЮЛгАБURL еТМдЄАдЄ™жИСдїђе∞ЖеЬ®дЄЛдЄАиКВдЄ≠зЬЛеИ∞зЪДжЦ∞жЦЗдїґвАФвАФеЇПеИЧеМЦеЩ®гАВ\n\
    \nDjango REST Framework дЄЇеЄЄиІБзФ®дЊЛжПРдЊЫдЇЖйАЪзФ®иІЖеЫЊпЉМињЩйЗМжИСдїђе∞ЖдљњзФ® [ListAPIView](http://www.django-rest-framework.org/api-guide/generic-views/#listapiview)\
    \ жЭ•жШЊз§ЇжЙАжЬЙеЫЊдє¶гАВ\n\nдЄЇдЇЖйБњеЕНжЈЈжЈЖпЉМдЄАдЇЫеЉАеПСдЇЇеСШдЉЪе∞Ж API иІЖеЫЊжЦЗдїґеСљеРНдЄЇ `apiviews.py` жИЦ `api.py`гАВе∞±дЄ™дЇЇиАМи®АпЉМеЬ®дЄУйЧ®зЪД\
    \ `apis` еЇФзФ®дЄ≠еЈ•дљЬжЧґпЉМжИСеПСзО∞зЫіжО•и∞ГзФ® Django REST Framework зЪДиІЖеЫЊжЦЗдїґдЄЇ `views.py` еєґдЄНдЉЪйА†жИРжЈЈжЈЖпЉМдљЖеѓєж≠§иІВзВєеЫ†дЇЇиАМеЉВгАВ\n\
    \nжЫіжЦ∞ `apis/views.py` жЦЗдїґпЉМдљњеЕґе¶ВдЄЛжЙАз§ЇпЉЪ\n\n```python\n# apis/views.py\nfrom rest_framework\
    \ import generics\n\nfrom books.models import Book\nfrom .serializers import BookSerializer\n\
    \n\nclass BookAPIView(generics.ListAPIView):\n    queryset = Book.objects.all()\n\
    \    serializer_class = BookSerializer\n```\n\nеЬ®жЬАдЄКйЭҐзЪДеЗ†и°МдЄ≠пЉМжИСдїђеѓЉеЕ•дЇЖ Django REST Framework\
    \ зЪД [generics](https://www.django-rest-framework.org/api-guide/generic-views/#generic-views)\
    \ иІЖеЫЊз±їгАБжЭ•иЗ™жИСдїђ books еЇФзФ®зЪД `Book` ж®°еЮЛпЉМдї•еПКжЭ•иЗ™жИСдїђ api еЇФзФ®зЪД `serializers`гАВжИСдїђе∞ЖеЬ®дЄЛдЄАиКВдЄ≠еИЫеїЇињЩйЗМдљњзФ®зЪДеЇПеИЧеМЦеЩ®\
    \ `BookSerializer`гАВ\n\nзДґеРОжИСдїђеИЫеїЇдЄАдЄ™еРНдЄЇ `BookAPIView` зЪДиІЖеЫЊз±їпЉМеЃГдљњзФ® `ListAPIView` дЄЇжЙАжЬЙеЫЊдє¶еЃЮдЊЛеИЫеїЇдЄАдЄ™еП™иѓїзЂѓзВєгАВжЬЙиЃЄе§ЪйАЪзФ®иІЖеЫЊеПѓзФ®пЉМжИСдїђе∞ЖеЬ®еРОзї≠зЂ†иКВдЄ≠ињЫдЄАж≠•жОҐзіҐеЃГдїђгАВ\n\
    \nеЬ®жИСдїђзЪДиІЖеЫЊдЄ≠еП™йЬАи¶БдЄ§дЄ™ж≠•й™§пЉЪжМЗеЃЪ `queryset`пЉМеН≥жЙАжЬЙеПѓзФ®зЪДеЫЊдє¶пЉМзДґеРОжМЗеЃЪ `serializer_class`пЉМеЃГе∞ЖжШѓ `BookSerializer`гАВ\n\
    \n### Serializers\n\nжИСдїђзО∞еЬ®еИ∞дЇЖжЬАеРОдЄАж≠•пЉБеИ∞зЫЃеЙНдЄЇж≠ҐпЉМжИСдїђеЈ≤зїПдЄЇ API еИЫеїЇдЇЖ `urls.py` жЦЗдїґеТМ `views.py` жЦЗдїґгАВжЬАеРОвАФвАФдєЯжШѓжЬАйЗНи¶БзЪДвАФвАФжУНдљЬжШѓеИЫеїЇжИСдїђзЪДеЇПеИЧеМЦеЩ®гАВ\n\
    \n[еЇПеИЧеМЦеЩ®](https://www.django-rest-framework.org/api-guide/serializers/)е∞Же§НжЭВжХ∞жНЃпЉИе¶ВжЯ•иѓҐйЫЖеТМж®°еЮЛеЃЮдЊЛпЉЙиљђжНҐдЄЇжШУдЇОйАЪињЗдЇТиБФзљСжґИиієзЪДж†ЉеЉПпЉМйАЪеЄЄжШѓ\
    \ JSONгАВдєЯеПѓдї•еѓєжХ∞жНЃињЫи°М\"еПНеЇПеИЧеМЦ\"пЉМе≠ЧйЭҐжДПжАЭжШѓ"
