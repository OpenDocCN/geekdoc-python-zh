    # # Chapter 1: Initial Set Up


    If you have already read *Django for Beginners*вБµ much of this will be familiar
    but there are additional steps around installing Django REST Framework.


    This chapter covers how to properly configure your Windows or macOS computer to
    work on Django projects. We will start by reviewing the *Command Line*, a powerful
    text-only interface that developers use extensively to install and configure software
    projects. Then we install the latest version of Python, learn how to create dedicated
    virtual environments, and install Django. As a final step, we will explore using
    Git for version control and working with a text editor. By the end of this chapter
    you will have created your first Django and Django REST Framework project from
    scratch. In the future, you will be able to create or modify any Django project
    in just a few keystrokes.


    # ## The Command Line


    The command line is a text-only interface that harkens back to the original days
    of computing. It is an alternative to the mouse or finger-based graphical user
    interface familiar to most computer users. An everyday computer user will never
    need to use the command line but software developers do because certain tasks
    can only be done with it. These include running programs, installing software,
    using Git for version control, or connecting to servers in the cloud. With a little
    practice, most developers find that the command line is actually a faster and
    more powerful way to navigate and control a computer.


    Given its minimal user interfaceвАУjust a blank screen and a blinking cursorвАУthe
    command line is intimidating to newcomers. There is often no feedback after a
    command has run and it is possible to wipe the contents of an entire computer
    with a single command if you''re not careful: no warning will pop up! As a result,
    the command line must be used with caution. Make sure


    вБµhttps://djangoforbeginners.com'
  - '[PAGE 13]


    not to blindly copy and paste commands you find online; only rely on trusted resources
    for any command you do not fully understand.


    In practice, multiple terms are used to refer to the command line: Command Line
    Interface (CLI), console, terminal, shell, or prompt. Technically speaking, the
    *terminal* is the program that opens up a new window to access the command line,
    a *console* is a text-based application, the *shell* is the program that runs
    commands on the underlying operating system, and the *prompt* is where commands
    are typed and run. It is easy to be confused by these terms initially but they
    all essentially mean the same thing: the command line is where we run and execute
    text-only commands on our computer.


    On Windows, the built-in terminal and shell are both called *PowerShell*. To access
    it, locate the taskbar on the bottom of the screen next to the Windows button
    and type in "powershell" to launch the app. It will open a new window with a dark
    blue background and a blinking cursor after the `>` prompt. Here is how it looks
    on my computer.


    # Shell


    ```

    PS C:\Users\wsv>

    ```


    Before the prompt is `PS` which refers to PowerShell, the initial `C` directory
    of the Windows operating system, followed by the `Users` directory and the current
    user which, on my personal computers, is `wsv`. Your username will obviously be
    different. At this point, don''t worry about what comes to *the left* of the `>`
    prompt: it varies depending on each computer and can be customized at a later
    date. The shorter prompt of `>` will be used going forward for Windows.


    On macOS, the built-in terminal is called appropriately enough *Terminal*. It
    can be opened via Spotlight: press the `Command` and `space bar` keys at the same
    time and then type in "terminal." Alternatively, open a new Finder window, navigate
    to the *Applications* directory, scroll down to open the *Utilities* directory,
    and double-click the application called Terminal. This opens a new screen with
    a white background by default and a blinking cursor after the `%` prompt. Don''t
    worry about what comes to the left of the `%` prompt. It varies by computer and
    can be customized later on.'
