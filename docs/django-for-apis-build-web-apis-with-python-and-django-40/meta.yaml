    # ## Django REST Framework


    As we have seen before, Django REST Framework takes care of the heavy lifting
    of transforming our database models into a RESTful API. There are three main steps
    to this process:


    +   - `urls.py` file for the URL routes

    - `serializers.py` file to transform the data into JSON

    - `views.py` file to apply logic to each API endpoint


    On the command line use `pip` to install Django REST Framework.


    ```


    Shell

    (.venv) > python -m pip install djangorestframework~=3.13.0

    ```


    Then add it to the `INSTALLED_APPS` section of our `django_project/settings.py`
    file. It''s also a good idea to explicitly set our permissions. By default Django
    REST Framework is configured to `AllowAny` to enable ease of us in local development
    however this is far from secure. We will update this permission setting in the
    next chapter.'
