    `.gitignore` in the project-level directory next to `manage.py`. A `.gitignore`
    file tells Git what to ignore. Add a single line for `.venv`.


    # .gitignore


    ```

    .venv/

    ```


    If you run `git status` again you will see that `.venv` is not longer there. It
    has been "ignored" by Git. We do, however, want a record of all packages installed
    in the virtual environment. The current best practice is to run the command `pip
    freeze` with the `>` operator to output the contents to a new file called `requirements.txt`.


    # Shell


    ```

    (.venv) > pip freeze > requirements.txt

    ```


    Let''s add *all* our work by using the command `add -A` and then `commit` the
    changes along with a message (`-m`) describing what has changed.


    # Shell


    ```

    (.venv) > git add -A

    (.venv) > git commit -m "initial commit"

    ```


    # Conclusion


    This chapter has been all about setting up a traditional Django project. We went
    through the standard steps of creating a new project, adding a new app, and then
    updating models, views, urls, and templates. The `admin.py` file has to be updated
    so we can see our new content and we added tests to ensure our code works and
    we can add new functionality without worrying about a mistake.


    In the next chapter we''ll add Django REST Framework and see how quickly a traditional
    Django website can be transformed into a web API.'
