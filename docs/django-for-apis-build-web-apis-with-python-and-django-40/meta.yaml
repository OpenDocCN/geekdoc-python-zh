- md: "the same process in reverse, whereby JSON data is first validated and then\
    \ transformed into a dictionary.\n\nThe real beauty of Django REST Framework lies\
    \ in its serializers which abstracts away most of the complexity for us. We will\
    \ cover serialization and JSON in more depth in future chapters but for now the\
    \ goal is to demonstrate how easy it is to create a serializer with Django REST\
