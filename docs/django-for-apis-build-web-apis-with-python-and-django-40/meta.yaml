  md: '![](img/2db12769584651a6cc5b3e87f94eed01_197_0.png)


    Previously we used SQLite in production, which is file-based, and was already
    configured locally and then pushed up to Heroku. But this PostgreSQL database
    of ours is brand new! Heroku has all our code but we haven''t configured this
    production database yet.


    The same process used locally of running `migrate`, creating a superuser account,
    and entering blog posts in the admin must be followed again. To run a command
    with Heroku, as opposed to locally, prefix it with `heroku run`.


    # Shell


    ```


    (.venv) > heroku run python manage.py migrate

    (.venv) > heroku run python manage.py createsuperuser

    ```


    You will need to log into the live admin site to add blog entries and users since
    this is a brand-new database and not related to our local SQLite one.


    Refresh your live website and it should work correctly. Note that since the production
    server will run constantly in the background, you do not need to use the `runserver`
    command on Heroku.'
