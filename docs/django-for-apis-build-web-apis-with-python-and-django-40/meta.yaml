    # ## Views


    The `views.py` file controls *how* the database model content is displayed. Since
    we want to list all books we can use the built-in generic class [ListView](https://docs.djangoproject.com/en/4.0/ref/class-based-views/generic-display/#django.views.generic.list.ListView)^27.
    Update the `books/views.py` file.


    ^27 https://docs.djangoproject.com/en/4.0/ref/class-based-views/generic-display/#django.views.generic.list.ListView'
  - "[PAGE 47]\n\n# Code\n\n```\n# books/views.py\nfrom django.views.generic import\
    \ ListView\n\nfrom .models import Book\n\n\nclass BookListView(ListView):\n  \
    \  model = Book\n    template_name = \"book_list.html\"\n```\n\nOn the top lines\
    \ we import `ListView` and our `Book` model. Then we create a `BookListView` class\
    \ that specifies the model to use and the not-yet-created template.\n\nTwo more\
    \ steps before we have a working web page: create our template and configure our\
    \ URLs. Let's start with the URLs.\n\n# URLs\n\nWe need to set up both the project-level\
    \ `urls.py` file and then one within the `books` app. When a user visits our site\
    \ they will initially interact with the `django_project/urls.py` file so let's\
    \ configure that one first. Add the `include` import on the second line and then\
    \ a new path for the `books` app.\n\n# Code\n\n```\n# django_project/urls.py\n\
    from django.contrib import admin\nfrom django.urls import path, include  # new\n\
    \nurlpatterns = [\n    path(\"admin/\", admin.site.urls),\n    path(\"\", include(\"\
    books.urls\")),  # new\n]\n```\n\nThe top two lines import the built-in `admin`\
    \ app, `path` for our routes, and `include` which will be used with our `books`\
    \ app. We use the empty string, `\"\"`, for the books app route which means a\
    \ user on the homepage will be redirected directly to the `books` app."
  - "[PAGE 48]\n\nNow we can configure our `books/urls.py` file. But, oops! Django\
    \ for some reason does not include a `urls.py` file by default in apps so we need\
    \ to create it ourself. In your text editor create a new file called `books/urls.py`\
    \ and update it as follows:\n\n```\n# books/urls.py\nfrom django.urls import path\n\
    \nfrom .views import BookListView\n\nurlpatterns = [\n    path(\"\", BookListView.as_view(),\
    \ name=\"home\"),\n]\n```\n\nWe import our views file, configure `BookListView`\
    \ at the empty string, `\"\"`, and add a [named URL](https://docs.djangoproject.com/en/4.0/topics/http/urls/#naming-url-patterns)^28^,\
    \ `home`, as a best practice.\n\nNow when a user goes to the homepage of our website\
    \ they will first hit the `django_project/urls.py` file, then be redirected to\
    \ `books/urls.py` which specifies using the `BookListView`. In this view file,\
    \ the `Book` model is used along with `ListView` to list out all books.\n\n# Templates\n\
    \nThe final step is to create our template file that controls the layout on the\
    \ actual web page. We have already specified its name as `book_list.html` in our\
    \ view. There are two options for its location: by default the Django template\
    \ loader will look for templates within our books app in the following location:\
    \ `books/templates/books/book_list.html`. We could also create a separate, project-level\
    \ templates directory instead and update our `django_project/settings.py` file\
    \ to point there.\n\nWhich one you ultimately use in your own projects is a personal\
    \ preference. We will use the default structure here.\n\nStart by making a new\
    \ `templates` folder within the books app and within it a `books` folder. This\
    \ can be done from the terminal shell. If it is still running the local server\
    \ use the command `Control+c` to stop it."
  - "[PAGE 49]\n\n# Shell\n\n```\n(.venv) > mkdir books/templates\n(.venv) > mkdir\
    \ books/templates/books\n```\n\nWith your text editor create a new file called\
