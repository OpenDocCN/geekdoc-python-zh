  md: 'built-in [TokenAuthentication](http://www.django-rest-framework.org/api-guide/authentication/#tokenauthentication)^90
    is deliberately quite basic. As a result, it does not support setting tokens to
    expire, which is a security improvement that can be added. It also only generates
    one token per user, so a user on a website and then later a mobile app will use
    the same token. Since information about the user is stored locally, this can cause
    problems with maintaining and updating two sets of client information.


    **JSON Web Tokens (JWTs)** are a newer form of token containing cryptographically
    signed JSON data. JWTs were originally designed for use in [OAuth](https://en.wikipedia.org/wiki/OAuth)^91,
    an open standard way for websites to share access to user information without
    actually sharing user passwords. JWTs can be generated on the server with a third-party
    package like [djangorestframework-simplejwt](https://github.com/jazzband/djangorestframework-simplejwt)^92
    or via a third-party service like `Auth0`. There is an ongoing debate, however,
    among developers on the pros and cons of using JWTs for user authentication and
    covering it properly is beyond the scope of this book. That is why we will stick
    to the built-in TokenAuthentication in this book.


