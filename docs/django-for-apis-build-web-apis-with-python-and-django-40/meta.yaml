    **404 Page**


    We want `DEBUG` to be `True` for local development yet `False` for production.
    And if there is any difficulty loading the environment variables, we want `DEBUG`
    to default to `False` so we''re extra secure. To implement this, start by adding
    `DEBUG=True` to the `.env` file.


    **.env**


    ```


    DEBUG=True

    ```


    Then in `django_project/settings.py`, change the `DEBUG` setting to read the variable
    "DEBUG" from the `.env` file but with a default value of `False`.


    **Code**


    ```

    python

    # django_project/settings.py

    DEBUG = env.bool("DEBUG", default=False)

    ```


    If you refresh the webpage at `http://127.0.0.1:8000/99`, you''ll see the full
    local error page is still there. Everything is working properly.


    The next setting to change is `SECRET_KEY` which is a random 50 character string
    generated each time `startproject` is run. If you look at the current value in
    `django_project/settings.py` it starts with `django-insecure` to indicate the
    current value is not secure. Why is it insecure? Because it is easy to commit
    the `SECRET_KEY` to source control as, in fact, we have already done. Even if
    we moved the current value into an environment variable now it will still remain
    visible in the project''s Git history.'
