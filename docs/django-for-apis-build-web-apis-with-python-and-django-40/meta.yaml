    \ and update it as follows:\n\n## Code\n\n```\n# apis/serializers.py\nfrom rest_framework\
    \ import serializers\n\nfrom books.models import Book\n\n\nclass BookSerializer(serializers.ModelSerializer):\n\
    \    class Meta:\n        model = Book\n        fields = (\"title\", \"subtitle\"\
    , \"author\", \"isbn\")\n```\n\nOn the top lines we import Django REST Framework's\
    \ `serializers` class and the `Book` model from our books app. Next, we extend\
    \ Django REST Framework's [ModelSerializer](https://www.django-rest-framework.org/api-guide/serializers/#modelserializer)^34\
    \ into a `BookSerializer` class that specifies our database model, `Book`, and\
    \ the database fields we want to expose of `title`, `subtitle`, `author`, and\
    \ `isbn`.\n\nAnd that's it! We're done. By creating a new URL route, a new view,\
    \ and a serializer class we have created an API endpoint for our Library website\
    \ that will display all existing books in list format.\n\n## Browsable API\n\n\
    Raw JSON data is not particularly friendly to consume with human eyes. Fortunately,\
    \ Django REST Framework ships with a built-in browsable API that displays both\
    \ the content and HTTP verbs associated with a given endpoint. To see it in action\
    \ start up the local web server with the `runserver` command.\n\n## Shell\n\n\
    ```\n(.venv) > python manage.py runserver\n```\n\nWe know the location of our\
    \ API endpoint is at `http://127.0.0.1:8000/api/` so navigate there in your web\
    \ browser.\n\n![](img/2db12769584651a6cc5b3e87f94eed01_60_0.png)\n\n**Book API**\n\
    \nAnd look at that! Django REST Framework provides this visualization by default.\
    \ It displays the HTTP status code for the page, which is `200` meaning `OK`.\
    \ Specifies `Content-Type` is JSON. And displays the information for our single\
    \ book entry in a formatted manner.\n\nIf you click on the \"Get\" button in the\
    \ upper right corner and select \"json\" at the top of the dropdown list you'll\
    \ see what the raw API endpoint looks like.\n\n![](img/2db12769584651a6cc5b3e87f94eed01_61_0.png)\n\
    \n**Book API JSON**\n\nNot very appealing is it? The data is not formatted at\
    \ all and we can't see any additional information about HTTP status or allowable\
    \ verbs either. I think we can agree the Django REST Framework version is more\
    \ appealing.\n\nProfessional developers typically use on a third-party tool such\
    \ as [Postman](https://www.postman.com/)¬≥вБµ or, if on a Mac, [Paw](https://paw.cloud/)¬≥вБґ,\
    \ to test and consume APIs. But for our purposes in this book the built-in browsable\
    \ API is more than enough.\n\n## Tests\n\nTesting in Django relies upon Python's\
    \ built-in [unittest](https://docs.python.org/3/library/unittest.html#module-unittest)¬≥вБЈ\
    \ module and several helpful Django-specific extensions. Most notably, Django\
    \ comes with a [test client](https://docs.djangoproject.com/en/4.0/topics/testing/tools/#the-test-client)¬≥вБЄ\
    \ that we can use to simulate GET or POST requests, check the chain of redirects\
    \ in a web request, and check that a given Django template is being used and has\
    \ the proper template context data.\n\nDjango REST Framework provides [several\
    \ additional helper classes](https://www.django-rest-framework.org/api-guide/testing/)¬≥вБє\
    \ that extend Django's existing test framework. One of these is `APIClient`, an\
    \ extension of Django's default `Client`, which we will use to test retrieving\
    \ API data from our database.\n\nSince we already have tests in `books/tests.py`\
    \ for our Book model we can focus on testing the API endpoint, specifically that\
    \ it uses the URL we expect, has the correct status code of 200, and contains\
    \ the correct content.\n\nOpen the `apis/tests.py` file with your text editor\
    \ and fill in the following code which we will review below.\n\n## Code\n\n```\n\
    # apis/tests.py\nfrom django.urls import reverse\nfrom rest_framework import status\n\
    from rest_framework.test import APITestCase\n\nfrom books.models import Book\n\
    \n\nclass APITests(APITestCase):\n    @classmethod\n    def setUpTestData(cls):\n\
    \        cls.book = Book.objects.create(\n            title=\"Django for APIs\"\
    ,\n            subtitle=\"Build web APIs with Python and Django\",\n         \
    \   author=\"William S. Vincent\",\n            isbn=\"9781735467221\",\n    \
    \    )\n\n    def test_api_listview(self):\n        response = self.client.get(reverse(\"\
    book_list\"))\n        self.assertEqual(response.status_code, status.HTTP_200_OK)\n\
    \        self.assertEqual(Book.objects.count(), 1)\n        self.assertContains(response,\
    \ self.book)\n```\n\nAt the top we import reverse from Django and from Django\
    \ REST Framework both status and APITestCase. We also import our Book model though\
    \ note that since we are in the api app we must specify the app name of book to\
    \ import it.\n\nWe extend APITestCase in a new class called APITests that starts\
    \ by configuring set up data. Then we run four different checks. First we check\
    \ that the named URL of \"book_list\" is being used. Second we confirm that HTTP\
    \ status code matches 200. Third we check that there is a single entry in the\
    \ database. And finally we confirm that the response contains all the data from\
    \ our created book object.\n\nMake sure to stop the local server and run the test\
    \ to confirm that it passes.\n\n## Shell\n\n```\n(.venv) > python manage.py test\n\
    Creating test database for alias 'default'...\nSystem check identified no issues\
    \ (0 silenced).\n...\n----------------------------------------------------------------------\n\
    Ran 3 tests in 0.009s\n\nOK\nDestroying test database for alias 'default'...\n\
    ```\n\nNote that the output describes three tests passing because we had two in\
    \ `books/tests.py` and one here. In larger websites with hundreds or even thousands\
    \ of tests, performance can become an issue and sometimes you want to check just\
    \ test within a given app before running the full website test suite. To do that,\
    \ simply add the name of the app you wish to check to the end of `python manage.py\
    \ test`.\n\n## Shell\n\n```\n(.venv) > python manage.py test apis\nCreating test\
    \ database for alias 'default'...\nSystem check identified no issues (0 silenced).\n\
    .\n----------------------------------------------------------------------\nRan\
    \ 1 test in 0.005s\n\nOK\nDestroying test database for alias 'default'...\n```\n\
    \n## Deployment\n\nDeploying a web API is almost identical to deploying a traditional\
    \ website. We will use Heroku in this book as it provides a free tier and is a\
    \ widely used Platform-As-a-Service that removes much of the complexity inherent\
    \ in deployment.\n\nIf this is your first time using Heroku, you can sign up for\
    \ a free account on [their website](https://www.heroku.com/)^40^. After completing\
    \ the registration form wait for the verification email to confirm your account.\
    \ It will take you to the password setup page and, once configured, you will be\
    \ directed to the dashboard section of Heroku's site. Heroku now also requires\
    \ enrolling in multi-factor authentication (MFA), which can be done with SalesForce\
    \ or a tool like Google Authenticator.\n\nWe will be using Heroku's *Command Line\
    \ Interface* (CLI) so we can deploy from the command line. Currently, we are operating\
    \ within a virtual environment for our *Library* project but we want Heroku available\
    \ globally, that is everywhere on our machine. An easy way to do so is open up\
    \ a new command line tabвАФ`Control+t` on Windows, `Command+t` on a MacвАФwhich is\
    \ not operating in a virtual environment. Anything installed here will be global.\n\
    \nOn Windows, see the [Heroku CLI page](https://devcenter.heroku.com/articles/heroku-cli#download-and-install)вБі¬є\
    \ to correctly install either the 32-bit or 64-bit version. On a Mac, the package\
    \ manager [Homebrew](https://brew.sh/)вБі¬≤ is used for installation. If not already\
    \ on your machine, install Homebrew by copy and pasting the long command on the\
    \ Homebrew website into your command line and hitting Return. It will look something\
    \ like this:\n\n## Shell\n\n```\n% /bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/\\\
    \n  install/HEAD/install.sh)\"\n```\n\nNext install the Heroku CLI by copy and\
    \ pasting the following into your command line and hitting Return.\n\n## Shell\n\
    \n```\n% brew tap heroku/brew && brew install heroku\n```\n\nIf you are on a new\
    \ M1 chip Apple computer you might receive an error with something like `Bad CPU\
    \ type in executable`. Installing [Rosetta 2](https://support.apple.com/en-us/HT211861)вБі¬≥\
    \ will solve the issue.\n\nOnce installation is complete you can close the new\
    \ command line tab and return to the initial tab with the pages virtual environment\
    \ active.\n\nTo verify the installation worked properly run `heroku --version`.\
    \ There should be output with the current version of the Heroku CLI installed."
