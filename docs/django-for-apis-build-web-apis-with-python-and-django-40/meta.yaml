    \ it is necessary to install PostgreSQL first via Homebrew and then `psycopg2`.\n\
    \n**Shell**\n\n```\nshell\n# Windows\n(.venv) > python -m pip install psycopg2==2.9.3\n\
    \n# macOS\n(.venv) % brew install postgresql\n(.venv) % python -m pip install\
    \ psycopg2==2.9.3\n```\n\nWe can use this approach because Django's ORM (Object\
    \ Relational Mapper) translates our `models.py` code from Python into the database\
