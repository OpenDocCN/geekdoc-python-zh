    \ extends `BasePermission`. The first method, `has_permission`, requires that\
    \ a user be logged in, or authenticated, in order to have access. The second method,\
    \ `has_object_permission`, allows read-only requests but limits write permissions\
    \ to only the author of the blog post. We access the author field via `obj.author`\
    \ and the current user with `request.user`."
