    Most web pages contain multiple resources that require multiple HTTP request/response
    cycles. If a webpage had HTML, one CSS file, and an image, three separate trips
    back-and-forth between the client and server would be required before the complete
    web page could be rendered in the browser.


    # Status Codes


    Once your web browser has executed an HTTP Request on a URL there is no guarantee
    things will actually work! Thus there is a quite lengthy list of [HTTP Status
    Codes](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes) available to accompany
    each HTTP response.


    You can tell the general type of status code based on the following system:


    +   - 2xx Success - the action requested by the client was received, understood,
    and accepted

    - 3xx Redirection - the requested URL has moved

    - 4xx Client Error - there was an error, typically a bad URL request by the client

    - 5xx Server Error - the server failed to resolve a request


    There is no need to memorize all the available status codes. With practice you
    will become familiar with the most common ones such as 200 (OK), 201 (Created),
    301 (Moved Permanently), 404 (Not Found), and 500 (Server Error).


    The important thing to remember is that, generally speaking, there are only four
    potential outcomes to any given HTTP request: it worked (2xx), it was redirected
    somehow (3xx), the client made an error (4xx), or the server made an error (5xx).


    These status codes are automatically placed in the request/response line at the
    top of every HTTP message.


    > https://en.wikipedia.org/wiki/List_of_HTTP_status_codes'
