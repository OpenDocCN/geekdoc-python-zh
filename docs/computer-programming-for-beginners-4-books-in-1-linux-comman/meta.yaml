    ## Chapter 5: What Are the Concepts of Networking?


    Networking is a series of interconnection of computers worldwide to form an overall
    structure or system. The base or core for networking includes: types of computer
    networks, types of network equipment/the hardware, Ethernet, wireless local area
    network, internet service provider, TCP/IP, and other internet protocols and Net
    routing, switching and bridging.


    There are three critical types of computer networks that are geographically based.
    These include the Local Area Network (LAN), the Wider Area Network (WAN), and
    the Metropolitan Area Network (MAN). LAN involves the interconnection of computers
    within a specific locality covering a small geographical area. It is majorly within
    buildings. There are further three types of LAN technology, which include Ethernet,
    Token Ring, and Fiber Distributed Data Interconnect (FDDI). The three categories
    of LAN are based on a specific arrangement of elements in the computer network.
    Ethernet LANs is based on a bus topology and broadcast communication. The Token
    Ring LANs are based on a ring topology. The (FDDI) uses optical fibers and an
    improved Token Ring mechanism based on two rings flowing in opposite directions.
    The WANs is an interconnection of computers covering a larger geographical area
    than the LANs, probably between cities and countries. Here, data is transmitted
    using such media as fiber optic cable and satellite in most cases. It is based
    on packet switching technology in which information is transmitted over a digital
    network is grouped into packets. Examples of WAN technology include Asynchronous
    Transfer Mode (ATM) and Integrated Services Digital Network (ISDN). Metropolitan
    Area Network is the interconnection of computers covering a much larger geographical
    area than WANs. The interconnection here is majorly between continents. The equipment
    sending data in this case to any significant distance is probably sending it to
    a minicomputer or a mainframe computer. Data is transmitted using terminal emulation
    software on the personal computer. This is because more extensive networks are
    designed to be accessed by terminals. A personal computer emulates or imitates
    a terminal.


    Without networks, we wouldn''t accomplish much. Just as human networks make us
    more efficient, so do computer networks. In business, networks are extremely important.
    All business operations depend on various forms of networking. Networking helps
    organizations to save time and money. It also helps organizations and individuals
    to create new streams of income. Some concepts shape networking. At first glance,
    these concepts may seem complex. But if you familiarize yourself with the principles
    of computer networking, it gets easier.


    The reality is that networks are everywhere, and we all work within them. You
    are used to them to such an extent that you don’t even realize it. In this article,
    we will focus on the concepts of networking. Our main objective is to help you
    have a better grasp of networking.


    A network is a group of several entities that are connected in one way or another.
    This could be objects or people. It allows the flow of information among the entities
    involved. However, this has to happen under a set of clear guidelines.


    In this piece, we’ll be focusing on computer networking. An individual computer
    can help you accomplish a particular basic task. It undoubtedly boosts your productivity.
    But when you are using numerous computers that are connected, your productivity
    becomes greater.


    Computers use data networks to process and share important information. Ten staff
    members can access important information at the same time without sharing a computer.
    Networking makes it possible for them to do so on different computers. This is
    made possible by a bunch of interconnected computers. It certainly enhances and
    promotes coordination within a team working for a common goal.


    Imagine what would happen without a network. A team would solely have to rely
    on one computer to get work done. This could greatly undermine the team''s productivity.
    The team would need a lot of time to complete simple tasks.


    Therefore, a computer network can best be described as a group of computers that
    are linked together. The linking may be done through physical lines. The ultimate
    goal is to enable efficient exchanging of information in terms of speed and convenience.


    When one computer is connected to another, the output is increased. And when several
    networks are linked together, they form one powerful network. This helps employees
    to have access to a larger pool of information. With such resources at their disposal,
    you can rest assured that they can accomplish a lot more.


    ## Components of Network


    There are four essential components of a computer network. These are networking
    devices, end devices, protocols, and the media.


    - **End Devices**


    Networking takes between devices. End devices play the role of data transmission.
    They either send or receive various types of data. These are laptops, PCs, phones,
    or tablets. A network needs at least two devices to function. There are server
    devices that are tasked with providing data and client devices that depend on
    the data provided.


    - **Media**


    Devices have to be connected through a special medium. This medium is known as
    the media. There are two forms of media. That’s the wired and wireless media.
    Wireless media uses signals while wired media uses cables.


    - **Protocols**


    Protocols are important rules in networking. They aid communication between the
    devices and also set the standards of communication. Normally, protocols can initiate
    as well as terminate any form of communication between devices. Also, they encrypt
    the data before it is sent. The data packaged in a form that can be transmitted
    within the relevant channels.


    - **Networking Devices**


    In between devices, there is a networking device. A networking device''s main
    role is to control the flow data between the end devices. It also forwards the
    data. This device is categorized into three categories. That''s the connecting
    device, securing device, and forwarding device.'
