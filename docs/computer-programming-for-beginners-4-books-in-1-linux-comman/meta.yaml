    hping是一个网络扫描工具，它是Antirez发行版中用于IP/TCP协议的免费分析器和数据包生成器。对于网络安全而言，hping3是一种测试工具，也是网络和防火墙安全测试与审计的事实标准工具之一。他们还利用它实现空闲扫描方法，该方法现已在nmap安全扫描器中实现。作为IP/TCP数据包的分析器/汇编器，hping是一个面向命令行的网络扫描工具。即使hping的功能远不止发送ICMP回显请求，其界面也受到了ping(8)
    Unix命令的启发。其功能包括通过隐蔽通道发送文件、具备路由跟踪模式，以及支持RAW-IP、ICMP、UDP和TCP协议。过去，hping仅被用作网络扫描工具。然而，现在有些人以多种方式使用它来测试主机和网络。


    ## hping网络扫描工具的部分用途


