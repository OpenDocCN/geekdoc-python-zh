- md: '## 6. The Networking Data Link Layer


    It is also referred to as the Network Interface Layer. Its main function is providing
    drivers for diverse devices found in the Operating System. The drivers communicate
    and transfer data to networks. The network interface card facilitates communication
    between devices. The transfer of data is done either through cables or wirelessly
    through routers and Wi-Fi. The significant protocols used in transferring data
    are the address resolution protocols and point to point protocols.


    ## 7. The Networking Physical Layer


    The physical networking layer is a vital layer found in the OSI computer networking
    model. It comprises of networking hardware. It is considered to be the most complex
    layer in networking due to the diversity of networking devices that are available.
    Its primary function is transferring raw bits over physical hardware through nodes
    used for the connection. It comprises of the hardware, including the wireless
    hardware consisting of Wi-Fi, connectors, cables, and network interface cards.


    ## Understanding Cyber Security


    Cybersecurity is also referred to as computer security or information technology
    security. It is the act of protecting computer systems from damage or theft to
    their software, hardware, and electronic data. It also means preventing the misdirection
    and disruption of computer systems from the services they are responsible for
    providing.


    The increase in dependence on computer systems, wireless networks, and the internet
    has led to the popularity in the field of cybersecurity. It is one of the most
    concerned matters in the contemporary world due to overgrowing cases of cyber-attacks
    and threats. Due to its complexity, cybersecurity has also become one of the challenges
    facing the technology field today.


    Cyber attackers are making use of more refined techniques to target and attack
    computer systems. Small and large organizations, as well as individuals, are being
    impacted by these cyber threats and attacks. They have considered cybersecurity
    as a priority in their everyday operations. The focus is on coming up with the
    best measures to control and eliminate cyber threats and attacks. Employees in
    organizations are being trained on the best measures to deal with cyber-attacks.
    Almost everything we do today is linked to the internet, thus increasing chances
    for vulnerabilities, flaws, and breaches.


    Cybersecurity is defined as a process and techniques that are involved in the
    protection of sensitive data, networks, computer systems, and software applications
    from potential cyber-attacks. Cyber-attack is a terminology used in covering multiple
    topics. Most of the common issues covered by cyber-attacks include exploitation
    of resources, disruption of the normal functioning of businesses and processes
    involved, tampering systems, and the data stored in them, unauthorized access
    to sensitive information and targeted systems, and use of ransomware attacks in
    encryption of data and extortion of money from victims.


    Cyber-attacks have been quite innovative, and attackers can disrupt security and
    hack computer systems. Businesses, therefore, have to come up with strategies
    through which they can effectively fight back the dangerous attacks. Understanding
    the importance of cybersecurity needs one to recognize some common forms of attacks
    and threats.


    **Ransomware** – This is a software program involved in file encryption. It uses
    exceptional algorithms in robust encryption in encrypting files within the targeted
    system. Ransomware threat authors, applies a rare key for each target, saving
    each on a remote server. Users are, therefore, unable to access these files through
    any application. The attackers take advantage of the situation by extorting money
    from the victims for decryption of data or providing the decryption code.


    **Botnets Attacks** – The main reason for designing botnets was for them to perform
    particular tasks in a group. Cyber attackers are, however, using them for all
    the wrong purposes. They use it by accessing and injecting malware or malicious
    code that disrupts the functionality of the network. Common botnets include spreading
    spam emails, stealing of personal data, and distributed denial of service. Large-scale
    organizations and businesses are primary victims of botnets attacks because of
    colossal data access.


    **Social engineering attacks** – Cybercriminals are using social engineering attacks
    strategy to gain computer user’s sensitive details. The tactic involves tricking
    users through attractive prizes, advertisements, huge offers, and requesting the
    user to feed their confidential and bank account information. The information
    that users feed is cloned and used in identity and financial fraud.


    **Cryptocurrency Hijacking** – Cryptocurrency hijacking is a new addition in the
    modern cyber world. Advancement in digital mining and currency has led to an increase
    of cyber-crimes. Cybercriminals are coming up with ways through which they can
    benefit from cryptocurrency. Traders and investors who focus on cryptocurrency
    are becoming primary soft targets for this form of attack. The hijacking process
    involves designing and injecting mining codes silently to the computer systems.
    The crypto jacker uses power resources, GPU, and CPU of the target system in mining
    for cryptocurrency. Monero coins are particularly mined utilizing this kind of
    technique. The target victim usually incurs the vast internet and electricity
    bills. The lifespan of the victim devices is also reduced.


    **Phishing** – This is a common cyber-attack whereby the attacker sends a spam
    email and attempts to imitate any legitimate source. Emails sent through phishing
    usually have strong messages and are followed by attachments such as big job offers,
    and an invoice. The aim of the attacker is to steal confidential and sensitive
    data. They are able to gather information such as credit card numbers, login credentials,
    and information on bank accounts. Email filtering techniques can help one in avoiding
    such attacks.


    Experiencing cyber-attacks has become so prevalent in most organizations and businesses
    today. It is vital to research techniques being applied and the measures to avoid
    these attacks. Educating oneself on the basics of cybersecurity and its use can
    as well reduce the risks of being attacked.


    Cybersecurity is a broad term based on three major concepts. The concepts are
    named "The CIA Triad." This means that it is comprised of confidentiality, integrity,
    and availability. The model was designed to act as a guide to businesses and organizations
    on crucial policies involved in cybersecurity in information technology.


    ## 1. Confidentiality


    These are the rules that provide some limitations to accessing information. Confidentiality
    consists in taking appropriate measures to eliminate the risks of confidential
    and sensitive information being accessed by cyber hackers and attackers. In most
    organizations and large-scale businesses, people are either denied or allowed
    access to information depending on how it is categorized. The right person in
    each department is authorized to access the information. Proper training is also
    given to these people about using strong passwords to secure their accounts and
    sharing information. Data protection is enhanced by changing how data is handled.


    ## 2. Integrity


    Integrity guarantees accuracy, trustworthiness, and consistency of data over a
    period. It ensures that the data in transit is not altered, deleted, changed,
    or illegally accessed. Appropriate measures are taken to ensure the safety of
    the data. A data breach is controlled through user access and file permission
    control measures. Change or breach in particular data can be detected by the use
    of appropriate technologies and tools. Regular backups help in coping with potential
    data loss, unintended deletion, or cyber-attacks.


    ## 3. Availability


    Availability means that all essential components, such as devices, networks, software,
    hardware, and security tools, should be adequately maintained and consistently
    upgraded. This helps in ensuring the proper functioning and data access without
    disruption. It also means providing consistent communication between multiple
    components by giving adequate bandwidth. Availability also means providing diverse
    equipment for security in case of any cyber-attacks. Disaster recovery plans,
    reasonable backup solutions, firewalls, and proxy servers are efficient utilities
    in coping with cyber-attacks.'
  mdcn: '## 6. 网络数据链路层


    它也被称为网络接口层。其主要功能是为操作系统中发现的各种设备提供驱动程序。这些驱动程序负责与网络通信并传输数据。网络接口卡促进了设备之间的通信。数据传输可以通过有线电缆，也可以通过路由器和Wi-Fi进行无线传输。在数据传输中使用的重要协议包括地址解析协议和点对点协议。


    ## 7. 网络物理层


    物理网络层是OSI计算机网络模型中的一个关键层。它由网络硬件组成。由于可用的网络设备种类繁多，它被认为是网络中最复杂的一层。其主要功能是通过用于连接的节点，在物理硬件上传输原始比特流。它包括硬件，如由Wi-Fi、连接器、电缆和网络接口卡组成的无线硬件。


    ## 理解网络安全


    网络安全也被称为计算机安全或信息技术安全。它是指保护计算机系统免受其软件、硬件和电子数据的损坏或盗窃的行为。它还意味着防止计算机系统偏离其负责提供的服务，以及防止服务中断。


    对计算机系统、无线网络和互联网的依赖日益增加，使得网络安全领域日益普及。由于网络攻击和威胁案件的不断增长，它已成为当代世界最受关注的问题之一。由于其复杂性，网络安全也已成为当今技术领域面临的挑战之一。


    网络攻击者正在使用更精细的技术来针对和攻击计算机系统。小型和大型组织以及个人都受到这些网络威胁和攻击的影响。他们已将网络安全视为日常运营中的优先事项。重点是制定最佳措施来控制和消除网络威胁和攻击。组织中的员工正在接受关于应对网络攻击最佳措施的培训。我们今天所做的几乎一切都与互联网相连，从而增加了漏洞、缺陷和违规的可能性。


    网络安全被定义为保护敏感数据、网络、计算机系统和软件应用程序免受潜在网络攻击的过程和技术。网络攻击是一个涵盖多个主题的术语。网络攻击涵盖的大多数常见问题包括：资源利用、干扰企业和相关流程的正常运作、篡改系统及其存储的数据、未经授权访问敏感信息和目标系统，以及使用勒索软件攻击加密数据并勒索受害者钱财。


    网络攻击一直相当具有创新性，攻击者可以破坏安全并入侵计算机系统。因此，企业必须制定战略，以有效反击这些危险的攻击。理解网络安全的重要性需要认识到一些常见的攻击和威胁形式。


    **勒索软件** – 这是一种涉及文件加密的软件程序。它使用特殊的算法进行强加密，对目标系统内的文件进行加密。勒索软件威胁作者为每个目标应用一个独特的密钥，并将其保存在远程服务器上。因此，用户无法通过任何应用程序访问这些文件。攻击者利用这种情况，向受害者勒索钱财以解密数据或提供解密代码。


    **僵尸网络攻击** – 设计僵尸网络的主要目的是让它们以组的形式执行特定任务。然而，网络攻击者正将其用于所有错误的目的。他们通过访问和注入恶意软件或恶意代码来破坏网络功能。常见的僵尸网络包括传播垃圾邮件、窃取个人数据和分布式拒绝服务攻击。大型组织和企业是僵尸网络攻击的主要受害者，因为其数据访问量巨大。


    **社会工程攻击** – 网络犯罪分子正在使用社会工程攻击策略来获取计算机用户的敏感信息。该策略涉及通过诱人的奖品、广告、巨额优惠来诱骗用户，并要求用户提供其机密信息和银行账户信息。用户提供的信息被克隆并用于身份和金融欺诈。


    **加密货币劫持** – 加密货币劫持是现代网络世界中的新增内容。数字挖矿和货币的进步导致了网络犯罪的增加。网络犯罪分子正在想出从加密货币中获利的方法。专注于加密货币的交易者和投资者正成为这种攻击形式的主要软目标。劫持过程包括设计和静默地向计算机系统注入挖矿代码。加密劫持者利用目标系统的电力资源、GPU和CPU来挖掘加密货币。门罗币特别使用这种技术进行挖掘。目标受害者通常会承担巨额的互联网和电费。受害设备的使用寿命也会缩短。


    **网络钓鱼** – 这是一种常见的网络攻击，攻击者发送垃圾邮件并试图模仿任何合法来源。通过网络钓鱼发送的邮件通常包含强烈的信息，并附有附件，如大型工作机会和发票。攻击者的目的是窃取机密和敏感数据。他们能够收集信用卡号码、登录凭证和银行账户信息等信息。电子邮件过滤技术可以帮助人们避免此类攻击。


    在当今大多数组织和企业中，遭受网络攻击已变得非常普遍。研究正在应用的技术以及避免这些攻击的措施至关重要。了解网络安全的基础知识及其应用也可以降低被攻击的风险。


    网络安全是一个基于三个主要概念的广义术语。这些概念被称为“CIA三元组”。这意味着它包括机密性、完整性和可用性。该模型旨在作为企业和组织在信息技术网络安全关键政策方面的指南。


    ## 1. 机密性


    这些是提供访问信息限制的规则。机密性包括采取适当措施，消除机密和敏感信息被网络黑客和攻击者访问的风险。在大多数组织和大型企业中，根据信息的分类，人们要么被拒绝访问，要么被允许访问信息。每个部门的合适人员被授权访问信息。还对这些人进行适当的培训，教导他们使用强密码来保护其账户和共享信息。通过改变数据处理方式来加强数据保护。


    ## 2. 完整性


    完整性保证数据在一段时间内的准确性、可信度和一致性。它确保传输中的数据不被更改、删除、修改或非法访问。采取适当措施确保数据安全。通过用户访问和文件权限控制措施来控制数据泄露。通过使用适当的技术和工具可以检测特定数据的更改或泄露。定期备份有助于应对潜在的数据丢失、意外删除或网络攻击。


    ## 3. 可用性


    可用性意味着所有关键组件，如设备、网络、软件、硬件和安全工具，都应得到充分维护和持续升级。这有助于确保正常运行和数据访问不受中断。它还意味着通过提供足够的带宽来提供多个组件之间的一致通信。可用性还意味着在发生任何网络攻击时提供多样化的安全设备。灾难恢复计划、合理的备份解决方案、防火墙和代理服务器是应对网络攻击的有效工具。'
