  md: '# Chapter 8: File handling


    The Python programming language allows us to work on two different levels when
    we refer to file systems and directories. One of them is through the module os,
    which facilitates us to work with the whole system of files and directories, at
    the level of the operating system itself.


    The second level is the one that allows us to work with files, this is done by
    manipulating their reading and writing at the application level, and treating
    each file as an object.


    In python as well as in any other language, the files are manipulated in three
    steps, first they are opened, then they are operated on or edited and finally
    they are closed.


    # What is a file?


    A python file is a set of bytes, which are composed of a structure, and within
    this we find in the header, where all the data of the file is handled such as,
    for example, the name, size and type of file we are working with; the data is
    part of the body of the file, where the written content is handled by the editor
    and finally the end of the file, where we notify the code through this sentence
    that we reach the end of the file. In this way, we can describe the structure
    of a file.


    The structure of the files is composed in the following way:


    +   - File header: These are the data that the file will contain (name, size,
    type)

    - File Data: This will be the body of the file and will have some content written
    by the programmer.'
  merge: -1
  pgno: 248
- img_proc: true
  md: '+   - End of file: This sentence is the one that will indicate that the file
    has reached its end.


    Our file will look like this:


    ![](img/d87a95dcfe5b52bf5303163b6c768bd5_249_0.png)


    # How can I access a file?


    There are two very basic ways to access a file, one is to use it as a text file,
    where you proceed line by line, the other is to treat it as a binary file, where
    you proceed byte by byte.


    Now, to assign a variable a file type value, we will need to use the function
    open (), which will allow us to open a file.


    # Open() function


    To open a file in Python, we have to use the open() function, since this will
    receive the name of the file and the way in which the file will be opened as parameters.
    If the file opening mode is not entered, it will open in the default way in a
    read-only file.'
