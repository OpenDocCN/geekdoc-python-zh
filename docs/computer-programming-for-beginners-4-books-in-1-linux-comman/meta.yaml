    Lite版本除了USB连接器外还有一个开关，体积相当小巧。该开关的功能允许你在编程模式和运行模式之间切换，并通过一个LED指示脚本是否运行完毕。Lite在其32KB的板载内存上存储一个脚本，空间对于大多数脚本来说绰绰有余。你可以使用文本编辑器编写脚本，然后使用脚本转换器将其转换为malduino友好的代码。接着，你也可以通过Arduino
