- md: '## Chapter 7: Kali Linux Installation and Updates


    A security-focused operating system is one of the most essential things to have
    when you are looking for a career in information security. You can efficiently
    perform tedious and time-consuming tasks with the help of a suitable operating
    system. At present, the operating systems of Linux are indeed countless. However,
    one of the best choices is Kali Linux. Cybersecurity professionals use it for
    assessing network security, ethical hacking, and penetration testing.


    Kali Linux will be one of the first names to be mentioned when it comes to offensive
    Linux distributions, hacking, and penetration testing. There are several information
    security tasks as various command-line hacking tools that Linux comes pre-packaged
    like application security, computer forensics, network security, and penetration
    testing. Fundamentally, when you attempt to engage in ethical hacking, the operating
    system of Linux is an ultimate solution.


    ### Kali Linux Installation


    The process of installing Kali Linux can be quite simple, and the options of installation
    are numerous. The techniques most people prefer are:


    - 1. Using the operating system to dual boot Kali Linux

    - 2. With virtualization software like VirtualBox or VMware

    - 3. Installation of hard disk for Kali Linux

    - 4. Making a Kali Linux bootable USB drive while installing Kali Linux


    The focus will be on using virtualization software to install Kali Linux even
    while there are several options available. For you to perform a comprehensive
    penetration test using all the tools you need, you can set up your machine by
    following these steps.


    ### Requirements for Installation


    - USB support / DVD-CD drive

    - While working with VirtualBox or VMware, the recommendation is around 4 GB

    - The recommendation for your hard drive is a minimum free space of 20 GB


    ### The Installation Process


    **Step 1: VMware installation:**

    First, a kind of virtualization software is essential to run Kali Linux. For many
    people, there is a preference for VMware even when they can use VirtualBox by
    Oracle as part of several options that they can choose from. From your applications
    folder, launch VMware when you have finished with the installation.


    **Step 2: Kali Linux download and image integrity checking:**

    You can choose the one that best suits your needs when you go to the official
    download page to download Kali Linux. Also, there are some hexadecimal numbers
    on the download page. There is nothing so important about them. Also, for the
    tasks that are related to security is the intention of Kali Linux. As such, the
    integrity checking of your downloaded image is highly required. The file’s SHA-256
    fingerprint needs to be checked and make a comparison with the one you see on
    the site you make the download.


    **Step 3: a new virtual machine launch:**

    You will hit the ‘create a new virtual machine’ button when you get to the homepage
    of the VMware Workstation Pro. Before you configure the details of virtual machine,
    you must have chosen the guest operating system after selecting the iso file of
    Kali Linux. Choose the Kali Linux VM to start the virtual machine, and you will
    click on the green button with ‘power on’ inscription. You will see the machine
    starting up!


    **The process of installation**

    In the GRUB menu, you will get the prompt to choose your preferred mode of installation
    when the machine is powered up. Before you continue, choose the graphical installation.
    You will be taken to another page where you will be prompted to choose your layout
    for the keyboard, the location of your country, and the language you prefer. Then,
    the loader will have the related settings of your network configured after installing
    extra components when you are through with the local information. Then, for this
    installation, a domain and hostname will be prompted by the installer. Before
    you continue with the installation, you will have to provide the appropriate information
    for the environment. You will press continue when you have set a password for
    the Kali Linux machine. An important note here: make sure you keep your password
    carefully! Then, set your time zone will be prompted by the installer after you
    must have set your password. At the partitioning of the disk, it will pause. From
    the disk partition, four choices will be provided to you by the installer. The
    ‘guided – use entire disk’ option is the easiest of them all. For additional granular
    configuration options, the method of ‘manual’ partitioning can only be used by
    experienced users. If you are a new user, the recommendation is to choose all
    files when you are choosing the partitioning disk and you can click on ‘continue.’
    Then, on the host machine, the entire changes you want to make can then be confirmed.
    You must be careful here since you can have the data on the disk erased if you
    continue. So, the process of file installation will be run through by the installer
    when you confirm the changes in the partition. As this process can take some minutes,
    the installation will be done automatically. If you prefer to obtain future pieces
    of updates and software, the setup for a network mirror will be inquired by the
    system when the necessary files are installed. If you want to use the repositories
    of Kali, make sure you have this functionality enabled. Then, the related files
    of the package manager will be configured. Next, the boot loader of GRUB is the
    next thing you will be asked to install. Choose ‘yes,’ and since it will be required
    to boot Kali, you will choose the device to write the important information for
    boot loader to the hard drive. To finish the installation, hit the ‘continue’
    button when the installation of GRUB to the disk has finished. Then, specific
    files for the final stage will be installed. By now, brace up yourself because
    your journey of exploring Kali Linux has just begun since you have successfully
    installed Kali.


    ### Updating Kali Linux


    The packages index list is the first step of an update for your Kali Linux system.
    You will enter the following command when you open the terminal;


    ```

    $ sudo apt update

    ```


    As an option, for all scheduled packages for update, you can display them. You
    have the opportunity of upgrading all packages at once with the use of `apt install
    PACKAGE-NAME` as well as individual package upgrade at this stage. Now, you have
    completely upgraded your Kali Linux.


    ## Chapter 8: Installing Kali Linux on Virtual Machine


    In similar hardware that you currently have, you can run different operating systems
    in a number of ways. And some of the options available for you are hard disks,
    USBs, and DVDs. In this chapter, the assumption is that for you to run your Kali
    Linux, you have no dedicated computer and as such, we are going to use a virtual
    PC or a virtualized environment to run it. You must have had virtual box installed
    on your computer for us to begin the process. And in case you don’t have it on
    your system, it is free to download when you go to the official website of VirtualBox.
    For the hardware that we will be using to install Kali Linux, this software will
    be emulating this hardware. It is widely known that unless you have access to
    software, it can be quite tricky to download such software. Thus, you will download
    Kali Linux ISO image from its official page. And in case you want to follow along
    as you mirror that, the flavor of the Kali Linux KDE 64-bit is what we will be
    using. The size of its download is around 3.2 GB, and for you to download, it
    might take a while. You will then have the .ISO image mounted into the virtual
    machine when you have dealt with that one. If you have the intention of using
    it in another machine, you can have it burned into a USB or bootable DVD. However,
    you may need to take into account certain considerations. Then, you may open VirtualBox
    when the image is downloaded. Now, you will hit on the ‘new’ button for you to
    create a new virtual machine, which is the first thing you will do. Then, in the
    natural operational system, you will have to specify the existence of this machine’s
    files of the service files. You can select Linux for type because it is on top
    Linux that Kali is built. And for version, Ubuntu 64-bit will be your choice.
    Though to get Kali up and running on VirtualBox, it is an ideal default setting
    for us. There is no guarantee it will work perfectly by specifying version and
    type. Then, the prompt for the amount of memory we want will be the next. You
    can go for 2GB as even 1GB will still work. Alternatively, you can go ahead and
    give it as much as you want if you have enough memory. The hard drive setup is
    the next step here, which the VirtualBox will ask you. You may choose to use an
    existing one or create one. So as not to go back and forth between several emulators,
    you can select VirtualBox Disk Image after selecting the hard drive file type.
    If you are using VMware, for instance,'
