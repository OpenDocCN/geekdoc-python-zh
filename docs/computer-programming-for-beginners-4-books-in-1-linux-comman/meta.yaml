    This language was created by Guido Van Rossum in the early 1990s, at the Centre
    for Mathematics and Informatics (CWI, Netherlands), specifically in 1989, as Van
    Rossum himself explained in one of his interviews:


    > "In December 1989, I was looking for a hobby programming project to keep me
    busy during the Christmas weeks. My office would be closed and I would have nothing
    but my computer at home. I decided to write an interpreter for the new scripting
    language I had been coming up with recently: an ABC descendant that Unix/c hackers
    would like. I chose Python''s name for the project, finding myself in a slightly
    irreverent state of mind (and being a big fan of Monty Python''s Flying Circus)."


    It began to be implemented in December 1989, and in February 1990 was released
    the first public version, version 0.9.0. Version 1.0 was released in January 1994,
    version 2.0 was released in October 2000 and version 3.0 was released on December
    2008.


    This programming language has as fundamental philosophy to have a syntax that
    favors a readable code, it is a high-level language that can be extended with
    C or C++, it has several programming environments that allow to edit programs,
    interact with the interpreter, develop projects, debug, among others and at the
    moment it is supported by a large community that facilitates its learning and
