  mdcn: '## 处理器使用、内存与磁盘


    htop / top


    最近运行的进程及其内存使用情况、所有者等信息可以通过 `top` 命令显示。`top` 的一个交互式增强变体是 `htop`。你需要知道，通过传递 `-u
    username` 标志，可以将显示的进程限制为仅属于该用户名的所有者。


    ncdu


    `ncdu` 提供了一种增强型的 `du`，它是一个可导航的文件空间使用概览。此外，它还能打开一个类似 `vim` 的只读窗口。要退出时，按 `q` 键。


    ## REPL（交互式解释器）


    虽然它们用于特定的编程语言，但命令行的典型代表是“读取-求值-打印”循环，即 REPL。你可以使用 `quit()` 函数退出 Python REPL，而使用
    `python` 命令可以打开它。同样，使用 `R` 命令可以打开 R REPL，并使用 `q()` 函数退出。使用 `scala` 命令可以打开 Scala
    REPL，退出时使用 `:quit` 命令。对于 Java REPL，你可以使用 `jshell` 命令打开它，并使用 `/exit` 命令退出。或者，使用
    `^d`（即 Ctrl+d）可以退出任何 REPL。因为 `^d` 在 Unix 上表示输入结束，它也是文件结束符（EOF）的标记。


    -v / --version / -version


    大多数程序和命令都通过 `--version` 或 `-version` 标志来显示软件版本。尽管对大多数人来说这不太直观，但大多数应用程序都很容易获取此信息。你需要注意，有些程序使用
    `-v` 作为版本标志，而另一些程序则用 `-v` 表示“详细模式”，这可能会在调试信息或打印多个诊断信息时运行应用程序。


    ## 环境变量


    在你的 `bash` shell 中，你可以使用和创建的持久变量就是环境变量，简称“env vars”。你可以使用美元符号（$）来引用它们，它们的定义使用等号（=）。使用
    `printenv` 可以查看所有最近定义的环境变量。使用等号（=）可以设置新的环境变量。你必须注意，等号前后不能有空格。使用 `echo` 命令并在前面加上美元符号（$），可以将特定的环境变量打印到终端。尝试用引号（“…”）将环境变量周围的其他空白或所有空格括起来。另外，要小心，因为重新赋值可能会覆盖一个环境变量，而你不会收到任何警告。除了上述方法，你还可以使用
    `export` 命令来定义环境变量。当你以这种方式定义时，它们对于从该 shell 调用的子进程（即命令）也是可用的。使用 `unset` 命令或将等号右侧留空，可以取消设置环境变量。


    # 第14章：高级 Bash Shell 命令


    Shell 不仅是连接用户与操作系统内核的适当接口，它本身也是一种相当强大的编程语言和命令解释器。通过*粘合*编译后的二进制文件、实用程序、工具和系统调用，你可以通过一个称为脚本的简单设备在
    shell 程序内构建应用程序。通过 shell 脚本，整个 Unix 工具、实用程序和命令目录确实都可以被调用。如果这还不够，通过外部 shell 命令（如循环和测试结构），还可以为脚本增加额外的灵活性和功能。Shell
    脚本特别适用于系统管理任务以及其他重复性工作，而无需使用一种功能齐全、设计紧凑的编程语言。


    ## 正则表达式简介


    一个字符序列就是一个表达式。元字符是那些具有超出其实际含义之外解释的字符。例如，某人的演讲可能用引号符号表示，后续的符号也具有类似的元含义。指定或匹配模式的元字符或字符就是正则表达式。以下是正则表达式包含的一些组件：


    - **修饰符。** 通过修改，它们可以缩小或扩展正则表达式要匹配的文本范围。反斜杠、方括号和星号是一些修饰符。

    - **锚点。** 它指定了文本行与正则表达式之间匹配的位置。例如，锚点是 `$` 和 `^`。

    - **字符集。** 这些字符保留其字面意义。没有元字符的字符集是最简单的正则表达式类型。


    正则表达式的主要应用是字符串操作和文本搜索，它匹配一个字符集或单个字符的字符串的一部分。


    - 转义的“尖括号” -- `\<...\>` -- 标记单词边界。


    因为否则它们只具有字面字符和意义，所以尖括号需要转义。

    单词“the”匹配“\<the\>”，而不匹配“others”、“there”、“them”等词。确保特定正则表达式有效的唯一方法是测试它。


    - 反斜杠 -- `\` -- 当它转义一个特殊字符时，其字符会被解释。


    “\$”恢复其字面意义“$”，而不是正则表达式中行尾的含义。同样，“\”的字面意义是“\”。


    - 方括号 – `[...]` – 为单个正则表达式匹配，括起一组字符。


    通过括号字符序列的组合，可以匹配常见的单词模式。“there”与“*yes*”、“*Yes*”、“*YES*”、“*yEs*”等匹配，即“[Yy][Ee][Ss]”。另一个匹配任何社会保障号码的是“[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]”。

    除了范围 *b* 到 *d* 之外的所有字符都匹配“[^b-d]”。取反或否定 `^` 是正则表达式含义的一个典型实例（在不同上下文中，其作用类似于 `!`）。

    任何数字或小写字母匹配“[a-z0-9]”。

    在范围 *k* 到 *y* 和 *b* 到 *P* 中，任何字符匹配“[B-Pk=y]”。

    在范围 *c* 到 *n* 中，任何字符匹配“[c-n]”。

    字符 *x*、*y* 或 *z* 匹配“[xyz]”。


    - 美元符号 -- `$` -- 匹配正则表达式的行尾。


    “^$”匹配空行。

    “XXX$”匹配行尾的 XXX。


    - 脱字符 -- `^` -- 匹配行的开头，有时根据上下文否定正则表达式中字符集的含义。

    - 点号 -- `.` -- 匹配除换行符外的任何单个字符。


    虽然不是缺少13个额外字符，但“13”匹配13加上至少一个任何字符（包括空格）：1133、11333。


    - 星号 -- `*` -- 匹配正则表达式或字符串的零次或多次重复。


    “1133*”匹配11加上一个或多个3：113、1133、1133333等。


    - 扩展正则表达式。基本集合之外的附加字符。Perl、awk 和 egrep 中使用它们。

    - 加号 -- `+` -- 匹配前一个正则表达式的一次或多次出现。虽然它不匹配零次出现，但它与 `*` 的作用相同。

    - 问号 -- `?` -- 匹配前一个正则表达式的零次或一次出现。通常用于匹配单个字符。

    - 转义的“花括号” -- `\{\}` – 表示前一个正则表达式要匹配的出现次数。


    因为否则它们只具有字面字符意义，所以转义花括号非常重要。从技术上讲，基本正则表达式结构与此用法不相关。


    “[0-9]\{5}”精确匹配0到9范围内的五个数字。


    注意：作为非 POSIX 兼容的经典 awk 版本，正则表达式中不支持花括号。但是，gawk 的选项 `--re-interval` 允许它们不被转义。有些版本不需要转义花括号。'
