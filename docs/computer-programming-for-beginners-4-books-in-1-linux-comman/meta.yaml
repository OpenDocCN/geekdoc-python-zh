    VirtualBox 可以安装在 Mac、Windows 和 Linux 上，其跨平台支持是其最显著的优势。


    ## 第五章：Linux 用户管理与系统管理


    在计算技术领域，Linux 是主要力量。Linux 驱动着众多云服务器、超级计算机、个人电脑、手机和网络服务器。除了使用命令行界面工具和 Linux 工具进行备份、创建、增强和维护用户报告或账户外，管理计算机系统的运行是
    Linux 系统管理员的工作。Linux 之所以能驱动大多数计算设备，是因为其开源环境、高安全性和高稳定性。了解并理解 Linux 系统管理员的具体素质至关重要：


    -   处理用户、目录和文件

    -   基本的 bash 命令

    -   管理超级用户或 root 用户

    -   文件系统层次结构

    -   Linux 文件系统


    ## Linux 管理员的职责


    对于需要优秀 IT 基础设施的机构或组织来说，系统管理员是一个可靠的衡量标准。因此，对高效 Linux 管理员的需求将是持续不断的。由于每个组织对该角色可能有额外的职责和责任，工作概况可能会有所不同。以下是
    Linux 管理员的一些职责：


    -   当服务器出现问题时，管理员负责进行故障排除。

    -   基本的安全工具和系统安装。管理员与数据网络工程师及其他部门或人员合作，在分析硬件需求后提出必要的建议。

    -   从登录问题到灾难恢复，Linux 管理员检测并解决服务问题。

    -   为 Linux 环境及其用户创建、维护和增强所需的工具。

    -   Linux 管理员的特质之一是始终以专业、有教养的方式与客户、供应商和员工沟通。

    -   除了为 ISP、网络托管和局域网客户提供关于解决所有增加的支持问题的出色客户支持外，Linux 管理员还修复和分析所有错误日志。

    -   职责的一部分是列出备份、创建新的存储过程以及定期备份数据。

    -   互联网请求维护，例如 PHP、MySQL、Apache、RADIUS 和 DNS。


    ## Linux 系统管理员职业发展路径


