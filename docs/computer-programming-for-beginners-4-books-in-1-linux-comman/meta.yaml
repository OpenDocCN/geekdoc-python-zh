  md: '# # Chapter 5: What Are the Concepts of Networking?


    Networking is a series of interconnection of computers worldwide to form an overall
    structure or system. The base or core for networking includes: types of computer
    networks, types of network equipment/the hardware, Ethernet, wireless local area
    network, internet service provider, TCP/IP, and other internet protocols and Net
    routing, switching and bridging.

    There are three critical types of computer networks that are geographically based.
    These include the Local Area Network (LAN), the Wider Area Network (WAN), and
    the Metropolitan Area Network (MAN). LAN involves the interconnection of computers
    within a specific locality covering a small geographical area. It is majorly within
    buildings. There are further three types of LAN technology, which include Ethernet,
    Token Ring, and Fiber Distributed Data Interconnect (FDDI). The three categories
    of LAN are based on a specific arrangement of elements in the computer network.
    Ethernet LANs is based on a bus topology and broadcast communication. The Token
    Ring LANs are based on a ring topology. The (FDDI) uses optical fibers and an
    improved Token Ring mechanism based on two rings flowing in opposite directions.
    The WANs is an interconnection of computers covering a larger geographical area
    than the LANs, probably between cities and countries. Here, data is transmitted
    using such media as fiber optic cable and satellite in most cases. It is based
    on packet switching technology in which information is transmitted over a digital
    network is grouped into packets. Examples of WAN technology include Asynchronous
    Transfer Mode (ATM) and Integrated Services Digital Network (ISDN). Metropolitan
    Area Network is the interconnection of computers covering a much larger geographical
    area than WANs. The interconnection here is majorly between continents. The equipment
    sending data in this case to any significant distance is probably sending it to
    a minicomputer or a mainframe computer. Data is transmitted using terminal emulation
    software on the personal computer. This is because more extensive networks are
    designed to be accessed by terminals. A personal computer emulates or imitates
    a terminal.

    Without networks, we wouldn''t accomplish much. Just as human networks'
  merge: -1
  pgno: 313
- img_proc: true
  md: 'make us more efficient, so do computer networks. In business, networks are
    extremely important. All business operations depend on various forms of networking.
    Networking helps organizations to save time and money. It also helps organizations
    and individuals to create new streams of income. Some concepts shape networking.
    At first glance, these concepts may seem complex. But if you familiarize yourself
    with the principles of computer networking, it gets easier.


