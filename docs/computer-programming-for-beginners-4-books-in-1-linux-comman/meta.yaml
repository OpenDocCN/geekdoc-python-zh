    or open-source approved by OSI (Open System Interconnect), so it is a program
    that can be used and distributed freely, either for personal or commercial use.
    The purpose of Python Software Foundation, "is to promote, protect and advance
    the Python programming language and to support and facilitate the growth of a
    diverse and international community of Python programmers".


    The main advantage of an open and free technology is that it can be used without
    having to cover licensing costs. Free software is one of the most popular technological
    movements in the 21st century.


    This language can be executed from any environment and distributed at the discretion
    of the user, modify if necessary, thus having a quick and easy basic tool for
    building programs.


    To understand why we must learn python, it is necessary to understand the main
    characteristics of this language, that is why we will start talking about its
