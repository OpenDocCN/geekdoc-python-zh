    pdfdoc.set_font(''Times New Roman'', ''B'', 12)

    pdfdoc.add_page()

    pdfdoc.cell(12, 10, "First PDF program", 5, 6, "C")

    pdfdoc.output("first PDF", ''F'')

    ```


