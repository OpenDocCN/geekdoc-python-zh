- md: '## Wide Area Network (WAN)


    Wide Area Network is extended computer network coverage over a large geographical
    area such as between states or countries. It is quite extensive than LAN and WAN
    and not limited to one domain but covers an entirely larger area by use of satellite
    connections or fiber optic cables. WAN is the largest of all computer networks
    in the world and used in businesses, government operations, and educational purposes.
    Some of the advantages of WAN include centralized data, fast message transfer,
    coverage of a full geographical area, higher bandwidth, and supports global businesses.
    On the other hand, WAN can become disadvantageous in the case of a security breach;
    it demands a firewall and rigid antiviruses, expensive setup costs, and difficulty
    fixing problems due to its more comprehensive coverage.


    ## Machine Learning


    As mentioned, machine learning is the method of data analysis by computers where
    algorithms and statistical models play a role for machines to learn from data
    and patterns and then make decisions without human interactions. Since its incorporation
    in the late 1950s, machine learning has gained popularity and become a vast topic
    in computing. It is a branch of artificial intelligence enabling computers to
    provide analytical information about the future with limited human interaction.
    Machine learning can, therefore, be learned in different ways depending on the
    part an individual chooses to follow. The idea of machine learning takes the form
    of the human brain, including the neurons and how they facilitate the assimilation
    of information, thinking, and making decisions. When the concept was first introduced
    to computers in 1943, it focused on neural networks where machines became capable
    of learning on their own, depending on the information fed. That is, machines
    were able to observe, learn, understand, analyze, and make decisions based on
    the event without depending on individual instructions. However, the slow development
    of computers at the time increased the challenges of machine learning when compared
    to the current days. As humans have the ability to develop and expand their knowledge
    about an event or something they first or learn, the same technique, therefore,
    facilitate machine learning. Besides, humans depend on networks of neurons in
    the brain, and computers utilize a similar pattern. As such, machine work with
    the same technique, therefore, can manage to make decisions and conclusions without
    any human interaction. However, the decisions made by computers are widely based
    on mathematical and algorithms that have expanded to make them predict the outcome
    of things that haven''t happened yet. Currently, different methods have been used,
    therefore enabling computers to learn specific information; therefore, be able
    to provide predictions, conclusions, and decisions based on specific datasets.


    ## Machine Learning Vs. Computer Programming


    Machine learning has been widely confused with computer language programming,
    which in this case, has significant dissimilarities. As defined, machine learning
    is all about the machine receiving specific data sets, selecting the most reliable
    algorithm, learn and determine the outcome without any human interaction. It,
    therefore, has limited interaction, especially when analysis the information,
    learning, and making positive outcomes. On the contrary, computer programming
    requires human interaction who first selects datasets to use and writing them
    in the machine. The codes are then executed to create a specific program, which
    is, therefore, the outcome. In programming, machines rarely learn but generated
    results based on the instructions provided by humans.


    ## General Steps in Machine Learning


    ### Collection and Preparation of Data


    Humans can never learn and have knowledge about something without having an interaction
    or understanding the basics. Similarly, machines face a similar challenge, as
    they also have to gain access to relevant information about something before learning
    in detail about it. As such, the first step in machine learning is to collect
