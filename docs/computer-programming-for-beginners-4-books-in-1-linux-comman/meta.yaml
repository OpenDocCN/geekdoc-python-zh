    mediums include optical fiber cables, twisted pair cable, and coaxial cables.
    The Unguided or Wireless transmission mediums include infrared, radio waves, and
    microwaves.


    # Protocols


    Protocols are the defined conventions and rules guiding communication between
    computer network devices. Computer network protocols consist of device mechanisms
    used in identifying and making connections between each other. Formality rules
    are used in specifying the method of packaging data in the form of received and
    sent messages. There are three types of protocols. The internet protocols, wireless
    network protocols, and network routing protocols.

    Internet protocols are the rules set to govern the format of sending data through
    the Internet or over another network. They are the standards used to address and
    route data on the Internet. The internet protocols deliver packets from the host
    to a destination host entirely depending on the addresses on the headers of the
    packages. Wireless network protocols involve a collection of wireless devices
    and laptops engaging in communication through radio waves. Computer network routing
    protocols, on the other hand, are used in specifying methods through which routers
    are communicating with each other. They do this through the distribution of information,
    enabling them to choose routes among nodes within computer networks. Routing algorithms
    are used when determining particular routes of choice. Computer network routing
    protocols are capable of adjusting dynamically to evolving conditions, including
    disabled computers, and data lines.


