    ## Chapter 10: Scanning (nmap, massscan, hping3) and Managing Networks (Wireshark)


    During the course of penetration testing, a very essential host detector and network
    scanning tool are network mapped, nmap. Mainly, they use nmap as a security scanner
    and vulnerability detector which makes it a powerful utility as well as using
    it to enumerate and gather information. Since it can run on several different
    operating systems such as Mac, BSD, Linux, and Windows, this makes nmap a multipurpose
    tool. They use nmap for several powerful purposes including:


    - Securing holes and detecting the vulnerability, such as nmap scripts

    - Operating system detection, software version, and hardware address

    - It works for service discovery, that is, detecting the version and software
    to the respective port

    - Port enumeration and discovery; detecting ports that are open on the host

    - Host discovery; detecting the live host on the network


    As a common tool, nmap is available for both the graphical user interface and
    command-line interface. And to perform scanning, nmap utilizes several methods,
    some of which are FTP bounce scanning, TCP reverse ident scanning, TCP connect()
    scanning, and many more.


    ## Effective Use of nmap


    Since we have a difference between an advance scanning and basic, simple scanning,
    the target machine has a huge dependence on the usage of nmap. For us to get the
    right outcome by bypassing the intrusion preventive/detection software and firewall,
    there is a need to make use of advanced techniques. You will see some examples
    below of a few basic commands their usage:


    On the target system, if you intend to scan a specific port, such as scanning
    only on the target computer Telnet, FTP, and HTTP, then you will need relevant
    parameter to use the nmap command. Also, you may as well call the file in the
    exclude parameter if the lists of IP addresses that you intend to exclude are
    contained in a file that you have. Another scenario is that since it tends to
    be dangerous for you, you may want to exclude specific IP addresses if you want
    to scan the entire subnet. As such, use the excluding parameter when you use the
    nmap command. You will need to add an –sL parameter to the command if you intend
    to see the entire list of the hosts that you are scanning.


    ## Enumerating a Huge Quantity of Hosts with Massscan


    For a while now, massscan has been around, and all around the world, pentesters
    are making use of it. In a second, masscan can transmit up to 10 million packets
    as a reconnaissance tool. Massscan utilizes a custom IP/TCP stack and asynchronous
    transmission with different reception and transmission of packets using different
    threads.


    You can quickly enumerate a vast amount of hosts using massscan. Essentially,
    massscan can scan the whole internet as quickly as 6 minutes, according to the
    author of the tool. And because of the high rate of its transmission, they also
    use massscan for stress testing. For anyone to accomplish those high rates, they
    will need special drivers like NICs and PF_RING. Since it interacts with the use
    of similar style of nmap, this part makes it a convenient tool.


    ## Massscan Features


    - Custom IP/TCP stack

    - Basic vulnerability scanning such as heartbleed

    - Banner grabbing

    - Nmap style target option and specification

    - Nmap style output

    - Ultrafast port scanning: up to 10M packets per second in transmission (requiring
    PF_RING drivers and capable – NIC)


    ## Uses of Masscan


    - Random scanning for knowledge or fun

    - Internet enumeration

    - Enumeration of several subnets within an organization

    - Enumeration of a large number of hosts

    - For the mapping of the network, massscan can be used as the first recon tool


    ## Hping3 as a Packet Generator and Network Scanning Tool


    As a free analyzer and packet generator for the IP/TCP protocol for the Antirez
    distribution, hping is a network scanning tool. For network security, hping3 is
    one kind of a tester, and for security testing and auditing of networks and firewalls,
    it is one of the de facto tools. They also use it for the exploitation of the
    idle scan scanning method, which now has its implementation in the nmap security
    scanner. As an analyzer/assembler for IP/TCP packet, a command-line oriented is
    the network scanning tool hping. Even when hping can do more than sending ICMP
    echo requests, the ping(8) Unix command inspired the interface. Its features include
    the ability to send files between a covered channel, possession of a traceroute
    mode, and support for RAW-IP, ICMP, UDP, and TCP protocols. In the past, they
    only used hping as a network scanning tool. However, some people use it in several
    manners to test hosts and networks.


    ## Some of the Usages of hping Network Scanning Tool


    - Network scanning tool

    - Using Tk interface, it is simple to use networking utilities

    - Prototype IDS systems

    - Security and networking research in the event of emulating complicated IP/TCP
    behaviour

    - Concept exploits proof

    - Automated firewalling tests

    - Write real applications related to IP/TCP security and testing

    - Learn IP/TCP

    - Networking research

    - Exploitation of identified vulnerabilities of IP/TCP stacks

    - Test IDSes

    - Test firewalling rules

    - Perform the idle scan (with an easy user interface for implementation in nmap)

    - Using the standard utilities network scanning tool to probe/ping/traceroute
    hosts behind a firewall that blocks attempts

    - Students learning IP/TCP can also get adequate knowledge through hping

    - Auditing IP/TCP stacks

    - Remote uptime guessing

    - Remote OS fingerprinting

    - Advanced traceroute, under all the supported protocols

    - Manual path MTU discovery

    - Using fragmentation, TOS, and different protocols for network testing

    - Advanced port scanning

    - Firewall testing


    ## Securing and Monitoring Your Network with Wireshark


    The toolkit for a network security analyst is one of the most powerful tools known
    as wireshark that people also referred to before as Ethereal. Through a variety
    of levels, from bits comprising a single packet to information on connection,
    wireshark can examine the details of traffic as it peers inside the network as
    a network packet analyzer. Wireshark can troubleshoot security issues in the network
    of a device and also analyze security events through its depth and flexibility
    inspection. Since it is free, the price of wireshark is also great!


    ## Wireshark Installation


    It is as simple as ABC to install wireshark. For Mac OS X or Windows, you can
    download the binary versions. Also, for most flavors of Unix/Linux, there’s availability
    of wireshark through the standard software distribution systems. And on other
    operating systems, the source code is available for installation. For the Windows
    version, the team that developed wireshark built it on top of the WinPcap packet
    capture library. And if you don’t have WinPcap already in your installation and
    you are using Windows, you may have to have it installed to run it. Here is a
    caveat: before you run wireshark installer, you can use the manual process to
    remove an outdated version of WinPcap through the “Add/Remove Programs” in the
    control panel. The process of installation is the same with the wizard-based sequence
    that uses two main prompts: at startup, it will ask if you intend to start the
    WinPcap Netgroup Packet Filter, NPF service and if you want to have WinPcap installed.
    For you to capture packets, you can choose the former option that will allow you
    even if you don’t have administrator privileges. It is only administrators that
    will be able to run wireshark if you have this service enabled.


    ## Chapter 11: Firewalls


    Based on a set of security rules, when you intend to block or permit data packets
    as well as monitor outgoing and incoming network traffic, a network security device
    that you can use is a firewall. For a firewall to block malicious traffic such
    as hackers and viruses, you will need to establish a barrier between your incoming
    traffic and internal network from external sources. You can improve the connection
    of computer security like the internet or LAN when you use tools like firewalls.
    An integral part of your network’s comprehensive security framework is the firewall.
    With the use of a code wall that inspects each individual data packet as it arrives,
    the firewall’s either side, both outbound and inbound from the system, to determine
    whether it can give it access to be blocked or pass, a firewall completely isolates
    your computer from the Internet. When it enables granular control over the kinds
    of system processes and functions that have access to the resources of networking,
    you can further enhance the security through the capability of firewalls. For
    it to deny or allow traffic, there are several host conditions and signatures
    that these firewalls use. You can operate, setup, and install firewalls relatively
    easily even when they sound complex. The belief of some people is that when they
    have a firewall installed, the traffic that passes through the network segment
    will be controlled. However, a firewall that is host-based can be suitable for
    you. On your computer, you can have them executed, including using it with Internet
    Connection Firewall, ICF. Fundamentally, there is a similarity to the function
    of the two firewalls; to stop intrusion and offer a strong technique of access
    control policy. To put it simply, as access control policy enforcement points,
    a firewall is a system that safeguards your computer.


    ### Functions of Firewalls


    In essence, here are some of the basic functions of firewalls:


    - Act as an intermediary

    - Report and record events

    - Control and manage network traffic

    - Validate access'
