    You provide your bank account details. All the details you provide ere will be
    cloned and used for fraudulent financial transactions, identity frauds, crimes,
    and so on.

    Since 2007, the ZEUS virus acted as a social engineering attack used for stealing
    bank account details and other banking related details from unsuspecting people
    across the world. They not only come with financial issues but can also lead to
    downloads of highly destructive threats to your system, which may affect its functioning
    and capabilities.'
