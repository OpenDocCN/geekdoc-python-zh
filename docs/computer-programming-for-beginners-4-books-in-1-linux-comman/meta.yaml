    ## Chapter 5: Linux User Management and System Administration


    In computing technology, the major strength is Linux. Linux powers several of
    the cloud-servers, supercomputers, personal computers, mobile phones, and webservers.
    In addition to using command-line interface tools and Linux tools to take backups,
    creating, enhancing, and maintaining user reports or accounts, managing the operations
    of a computer system is the job of a Linux systems administrator. Linux powers
    most of the computing devices because of its open-source environment, high security,
    and high stability. It is essential to know and understand the specific qualities
    of an administrator of a Linux system:


    - Handling users, directories, and file

    - Basic bash command

    - Managing superuser or root

    - Files system hierarchy

    - Linux file systems


    ## A Linux administrator’s duties


    For an institute or organization that needs an excellent IT foundation, a reliable
    criterion is the system administrator. Hence, all-time requirements will be the
    need for efficient Linux administrators. As there may be additional duties and
    responsibilities to the role, from each organization, the job profile might change.
    Here are a few responsibilities of a Linux administrator:


    - During an issue with the server, it is the job of the administrator to troubleshoot.

    - Essential security tools and system installation. To make necessary recommendations
    after analyzing hardware requirements, the administrator works with the data network
    engineer and other departments or personnel.

    - Ranging from login issues to disaster recovery, Linux administrator detects
    and solves the service problems.

    - For the Linux environments and its users, creating, maintaining, and enhancing
    the required tools.

    - One of the characters of a Linux administrator is to communicate at all times
    in a professional, cultivated manner with customers, vendors, and staff.

    - Apart from offering excellent customer support for ISP, web hosting, and LAN
    customers about troubleshooting all increased support troubles, Linux administrator
    also fixes and analyzes all error logs.

    - Part of the duties is listing backup, creating new stored procedures, and taking
    regular backup of data.

    - Internet request maintenance, such as PHP, MySQL, Apache, RADIUS, and DNS.


    ## Linux system admin career process


    - Learn how to install and use Linux environment

    - Have Linux administration certification

    - Become an expert in documentation

    - Look for help and support by joining community or group of a local Linux users


    Necessarily, taking backup and managing the operations, such as examining hardware
    and software systems, are a few roles of the Linux systems administrator. Also,
    the admin must be able to describe technical knowledge understanding quite profoundly.


    ## How to Manage Users and Groups as a Linux Administrator


    All at the same time, more than one user can make use of Linux since it is a multi-user
    operating system. And to manage users in a system, Linux offers a beautiful mechanism.
    Therefore, getting along with the groups and users in a system is the most significant
    function of a system administrator. And we will use the CentOS Linux distribution
    to talk about all the commands used below.


    ## Linux user


    The unique identification number, UID, is a binary number that uniquely identifies
    an account of a user of a system. Normal users and super or root user are the
    two types of users. There will be limited access to files for the regular users
    while there will be full access to all the data for super or root user. A user
    account can be modified, deleted, or added by a superuser. It is in the /etc/passwd/
    file that the full account information is stored and also on the /etc/shadow/
    file that a hash password is stored.


    ## Using a default setting to create a user


    At the command prompt, by running the *useradd* command, a user can be added.
    Use *passwd* utility to set a password after creating the user like this:


    ```

    [root@localhost handy32]# useradd enirban

    [root@localhost handy32]# passwd anirban

    Changing password for user anirban.

    New password:

    Retype new password:

    passwd: all authentication tokens updated successfully.

    ```


    There will be an automatic setting of the default shell to /bin/bash , creation
    of the home directory (/home/<username>) , and the assigning of a UID by the system.
    Anytime the system has added to it a new user and also uses the user name for
    the group, a user private group is created by the *useradd* command. When a user
    is created, specify the full name of the user. For the specification of the full
    name of the user, use *useradd* with the option -c as a system administrator:


    ```

    [root@localhost handy32]# useradd -c "Anirban Choudhury" handy32

    ```


    ## Using UID to create a user


    Using the -u option and a custom UID, a user can be created like this:


    ```

    [root@localhost handy32]# useradd -u 1036 handy32

    ```


    ## Using the home directory with a non-default to create a user


    By doing the below, you can set a home directory with a non-default:


    ```

    [root@localhost handy32]# useradd -d /home/test handy32

    ```


    ## Having user added to a supplementary group and primary group


    Through the specification of the -G and -g option, it is possible to specify a
    complementary group and the primary one as an administrator.


    ```

    [root@localhost handy32]# useradd -g "head" -G "faculty" handy32

    ```


    ## User lock and unlock


    A user account can be locked or unlocked by a superuser. Using the option -l,
    you only have to invoke *passwd* to lock an account.


    ```

    [root@localhost handy32]# passwd -l handy32

    Locking password for user handy32.

    passwd: Success

    ```


    To unlock an account, you can use *passwd* and the -u option:


    ```

    [root@localhost handy32]# passwd -u handy32

    Unlocking password for user handy32.

    passwd: Success

    ```


    ## Changing username


    For username login change, use *usermod* command with the -l option:


    ```

    [root@localhost handy32]# usermod -l "nishant" handy32

    ```'
