    \npairs=filter(pair, numbers)\n\nfor x in pairs:\n    print(\"The number \"+str(x)+\"\
    \ is pair\")\n```\n\n对于这个例子，我们首先需要的是一个条件函数，以了解我们将要过滤什么，在我们的例子中，我们将创建 pair 函数，它将有一个形参，即整数\
    \ n，然后我们进入一个条件块，在 if 部分，条件将是 n 必须大于零，因为零不是一个偶数，同时必须满足的另一个条件是，n 除以二的余数必须严格等于零，因为如你所知，这是一个偶数的定义。\n\
    \n下一步是填充我们要过滤的数字数组，为此我们创建变量 numbers，它将是一个空列表。然后进入一个 for 循环，其中变量 x 将从零变化到 24，正如你在第\
