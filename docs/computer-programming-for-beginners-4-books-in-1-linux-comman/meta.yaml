    education. This is due to the fact that they provide a great amount of benefits
    in which its security is highlighted, allowing to add access keys to control who
    can edit the document and even add a watermark to it to avoid plagiarism of information.


    Other outstanding data is that these documents can be seen from any device since
    it is not necessary to have a specific program; in addition, the weight of the
    files is much lower since these texts are compressed, unlike Word documents.


    A disadvantage of PDF files could be that they are not easy to edit once they
    have been created.


    In this chapter, we will only learn how to create PDF files.

    To create a PDF file the first thing we will have to do is to download the library
    through the command "Pip3 install fpdf", followed by this we can proceed to create
    our document:


    ```

    from fpdf import FPDF


