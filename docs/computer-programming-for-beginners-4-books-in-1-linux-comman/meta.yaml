    For cybersecurity to be thoroughly analyzed, it follows three basic concepts referred
    to as ''the CIA Triad,'' including confidentiality, integrity, and availability.
    This model was designed to offer guidance to organizations, institutions, or companies
    to form an effective security policy. They are essential as their working together
