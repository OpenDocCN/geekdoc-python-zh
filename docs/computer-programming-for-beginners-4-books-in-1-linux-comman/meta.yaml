  md: '# # Chapter 20: IP Spoofing


    The next topic that we need to spend a bit of time on here is the idea of IP spoofing.
    This is going to be a process where we are able to create packets for the Internet
    Protocol that are going to have modified source addresses in them, to either help
    us hide the identity of the person who is sending the information, to help us
    to impersonate another system of computers, and sometimes for both. This is often
    going to be the technique that a hacker is going to use when they would like to
    perform a DDoS attack against their target device or against the surrounding infrastructure.


    Sending and receiving these packets is going to be one of the main methods that
    these networked computers and devices are going to communicate, and it is going
    to be kind of the basis of how the modern internet is going to work. All of these
    IP packets are going to come with a header, which is then going to be followed
    by the body of the packet, and will contain some of the important information
    on routing like the source address. In a normal packet, one that the hacker has
    not messed around with, the source IP address is simply going to be the address
    of who sent the packet. But if the hacker has been able to spoof the packet, then
    the address is going to be forged instead.


    IP spoofing is going to be analogous to an attacker sending out a package to someone
    with the wrong address to return listed out. If the person who received the package
    wants to stop the sender from sending out this package, blocking all of the packages
    that come from that address is not going to do much good because the return address
    can be changed as well.


    Along the same idea here, if the receiver would like to be able to respond to
    the return address that they see on the packet, their response package is going
    to not head to the real sender. Instead, it is going to head to whichever IP address
    that the hacker stole to use. The ability to spoof the addresses of packets is
    going to be one of the biggest vulnerabilities that we are going to see with these
    DDoS attacks.


    For example, the DDoS attack is going to be reliant on spoofing with the goal
    of overwhelming a target with traffic while masking the identity of the source
    that comes with it. This is going to make it harder to work with any mitigating
    efforts if the IP address of the source is false, and it is randomized'
  merge: -1
