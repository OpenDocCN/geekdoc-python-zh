    working well or on another option that we would like to use, such as hacking into
    another computer. Let’s take a look at how this is going to work.


    The Media Access Control address, or the MAC address, is going to be interesting
    because it is able to uniquely identify each node that is going to show up in
    a network. It is going to take the form of six pairs of hexadecimal digits, which
    can include 0 to 9, and all of the letters A to F, that are going to be separated
    out by either dashes or colons.


    This MAC address is usually going to be associated with the network adaptor or
    a device that has some networking capabilities. Because of this reason, it is
    going to be known in many cases as the physical address. The first three pairs
    of these digits in the address are going to be called the Organizational Unique
    Identifier, and we need to take some time to look at them because they help us
    to identify the company that either sold or manufactured the device. Then the
    last three pairs of digits that are going to show up are going to be the specific
    numbers that just go to that device, and can be like the serial number of the
    whole process.


    With this in mind, we are going to spend some time going through and looking at
    some of the steps that we need to use in order to bypass the MAC address filtering
    on some of our wireless networks. The first step that we need to work with is
    considering that we are going to working with a router that has the MAC Filtering
    Configured in the first place. We can say that our MAC address is going to be
