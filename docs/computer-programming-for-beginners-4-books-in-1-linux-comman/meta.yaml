    Experiencing cyber-attacks has become so prevalent in most organizations and businesses
    today. It is vital to research techniques being applied and the measures to avoid
    these attacks. Educating oneself on the basics of cybersecurity and its use can
    as well reduce the risks of being attacked.


    Cybersecurity is a broad term based on three major concepts. The concepts are
    named "The CIA Triad." This means that it is comprised of confidentiality, integrity,
    and availability. The model was designed to act as a guide to businesses and organizations
    on crucial policies involved in cybersecurity in information technology.


    # 1. Confidentiality


    These are the rules that provide some limitations to accessing information. Confidentiality
    consists in taking appropriate measures to eliminate the risks of confidential
    and sensitive information being accessed by cyber hackers and attackers. In most
    organizations and large-scale businesses, people are either denied or allowed
    access to information depending on how it is categorized. The right person in
    each department is authorized to access the information. Proper training is also
    given to these people about using strong passwords to secure their accounts and
    sharing information. Data protection is enhanced by changing how data is handled.'
  - '[PAGE 344]


    # 2. Integrity


    Integrity guarantees accuracy, trustworthiness, and consistency of data over a
    period. It ensures that the data in transit is not altered, deleted, changed,
    or illegally accessed. Appropriate measures are taken to ensure the safety of
    the data. A data breach is controlled through user access and file permission
    control measures. Change or breach in particular data can be detected by the use
    of appropriate technologies and tools. Regular backups help in coping with potential
    data loss, unintended deletion, or cyber-attacks.


    # 3. Availability


    Availability means that all essential components, such as devices, networks, software,
    hardware, and security tools, should be adequately maintained and consistently
    upgraded. This helps in ensuring the proper functioning and data access without
    disruption. It also means providing consistent communication between multiple
    components by giving adequate bandwidth. Availability also means providing diverse
    equipment for security in case of any cyber-attacks. Disaster recovery plans,
    reasonable backup solutions, firewalls, and proxy servers are efficient utilities
    in coping with cyber-attacks.'
- md: '## Chapter 8: Types of Firewall


    A firewall is a kind of cybersecurity tool that protects a computer network from
    being tampered or compromised: preventing attacks from hackers who try breaking
    into the system from outside. Firewalls can be in various forms; it can be in
    the form of a software or hardware on a computer. For a firewall to work efficiently,
    it has to be connected to at least two network interfaces with one protected and
    the other that is exposed to attacks or threats. Therefore, you can consider a
    firewall to be a form of gateway installed between two sets of a network.


    ### How Do Firewalls Work?


    Having known what firewalls are and what they do, it is time you learned how they
    work! Firewalls work by examining all the available data packets that pass through
    them to assess whether they meet the guidelines and regulations posed by the Access
    Control List (ACL) and created by the person administrating the network. If the
    data packets meet the rules set by ACL, they will be allowed to maneuver inside
    the connection.


    Additionally, firewalls play a critical role in keeping a log of essential procedures
    and activities occurring within a network. Again, the necessary actions are only
    identified by the administrator. He then configures the related firewall to keep
    the logs basing on the level of importance.


    The process of filtering logs can be done basing on several things, including
    the packet attributes, address, state, and protocols. Firewalls, however, only
    display the packet headers on screens.


    Having known how firewalls work, we next discuss the types of firewalls. Read
    on to find out!


    ### The Types of Firewalls


    Firewalls are categorized into different types. This is done depending on the
    level of security they provide and the advancement they have. Below, we discuss
    extensively on the types of firewalls in existence today.


    #### The Packet Filtering Firewall


    This is a type of firewall that is usually installed on routers that connect or
    link the network in the inside to the internet. The packet filtering firewall
    is only implemented on the OSI model of a network layer. It works based on the
    rules defined by the Access Control Lists. Packet filtering firewalls work by
    checking the whole set of packets provided and verify them against the set of
    instructions provided by the administrator through the ACL. In situations where
    a packet doesn''t meet the set of rules defined by the administrator, that packet
    gets dropped immediately, and logs are informed and updated accordingly. When
    using packet filtering firewalls, administrators have the power to build their
    ACL basing on the protocol, address, and packet attributes.


    **Advantages of Packet Filtering Firewalls**


    - One of the significant benefits of packet filtering firewalls is that they are
    very affordable.

    - Packet filtering firewalls also need lower resource usage to make them cost-efficient.

    - Additionally, they are the best suited for those of us with smaller networks.


    **Disadvantages of Packet Filtering Firewalls**


    - As we mentioned earlier, the packet filtering firewalls only work on network
    layers, and they cannot work on complex instruction based type of models.

    - Additionally, packet filtering firewalls are also very vulnerable, especially
    to spoofing on most occasions.


    #### The Circuit Level Gateway Firewalls


    This is a type of firewall that is installed at session layers of any OSI model.
    They are used to monitor events and sessions such as the TCP multiple way handshakes
    to determine whether the connection requested is legit or not. In circuit-level
    gateway firewalls, the significant and vital screening takes place before the
    link is launched. The information channeled to a computer device on the other
    side of the network via circuit-level gateway looks to have come from a portal.
    This feature plays a vital role in establishing cover stealth for private networks
    from strangers.


    **Advantages of Circuit Level Gateway Firewalls**


    - Just like the Packet Filtering Firewalls, the circuit-level gateway firewalls
    are also very affordable and cost-friendly.

    - Circuit Level Gateway Firewalls also give the private network anonymity, making
    it very secure from threats and hackers.


    **Disadvantages of Circuit Level Gateway Firewalls**


    - One of the significant drawbacks of the circuit-level gateway firewalls is they
    are not able to filter the individual packets. This makes them very vulnerable
    because once a connection is established, hackers can take advantage of it.


    #### The Application of This Kind of Firewalls


    The gateway firewall circuit levels are applied in many dimensions of technology
    in today''s world. The application-level gateways, for instance, are used in the
    layer one in the application of an OSI tool and can give security and protecting
    the specific Application Layer of the Protocol in question. One good example of
    the level application Gateway Firewalls is the proxy server. This kind of firewall,
    however, can only work with protocols that are highlighted. A good example is,
    if you installed a web application basing on a firewall, it only will be able
    to enable the HTTP Protocols Data. The Circuit level gateway firewalls are meant
    to understand app-specific commands like the HTTP: POST and HTTP: GET as installed
    on application layers for Special Protocols.


    Additionally, the application level firewalls can also be used as the caching
    servers that play an essential role in improving network performance, making it
    easier to log the level of traffic.


    #### The Stateful Multilayer Firewall


    This firewall is made of a combination of all the firewalls we have discussed
    so far. They are very advanced firewalls and complex in equal measure. Stateful
    Multilayer Inspection Firewalls can be used to filter the packets in network layers
    through the use of ACLs. Additionally, the Stateful Multilayer Inspection firewall
    also checks for the single sessions provided on the session layers as well as
    evaluating packets on the ALG. This type of firewall is compatible with transparent
    mode enabling direct linkage and connections between the server and the client,
    something that wasn''t possible a few years ago. The Stateful multilayer inspection
    firewall implements the algorithms and critical security models that are specified
    by protocols; hence, in the long run, making data transfer and connections easier
    and secure.


    #### The Proxy Firewalls


    These kinds of firewalls operate in application layers with the primary purpose
    of filtering the incoming traffic between the current network and the source of
    traffic; this explains the name ''proxy firewall.'' Proxy firewalls are transported
    through a cloud-based tool or a different proxy element. Instead of allowing traffic
    link up and connect directly, it first identifies a relationship or connection
    to the origin of traffic and verifies the data packets that come in. This kind
    of inspection can be compared to that of a Stateful multilayer inspection firewall
    because it focuses on both the TCP multiple way handshake protocols and the data
    packets. Proxy firewalls, however, can also carry out deep-layer packet checks
    and inspections, verifying the real contents of the information-carrying package
    to ascertain it has no malware. Upon completion of the check and the data, the
    packet is given the green light to proceed to the destination; the proxy firewall
    transfers it off. This procedure builds another layer of gap or separation between
    the individual devices on operating on your network and the client. This enables
    them to make another layer of anonymity hence securing your network. The major
    advantage of Proxy Firewalls is that they are more secure thanks to the extra
    layer of anonymity created. They are also pocket-friendly and affordable. If there
    is any setback when using proxy firewalls, is that they can slow down the entire
    internet because they require more steps during the data packet transfer process.'
  mdcn: '## 第八章：防火墙类型


    防火墙是一种网络安全工具，用于保护计算机网络免受篡改或入侵：防止黑客从外部试图突破系统。防火墙可以有多种形式；它可以是计算机上的软件或硬件形式。为了使防火墙高效工作，它必须连接到至少两个网络接口，其中一个受到保护，另一个则暴露于攻击或威胁之下。因此，您可以将防火墙视为安装在两组网络之间的一种网关形式。


    ### 防火墙如何工作？


    了解了防火墙是什么以及它们的作用之后，现在是时候了解它们如何工作了！防火墙通过检查所有通过它们的数据包，评估这些数据包是否符合访问控制列表（ACL）制定的指南和规则，以及网络管理员创建的规则。如果数据包符合ACL设定的规则，它们将被允许在连接内部传输。


    此外，防火墙在记录网络内发生的关键程序和活动方面也起着至关重要的作用。同样，必要的操作仅由管理员识别。然后，他根据重要性级别配置相关防火墙以保存日志。


    日志过滤过程可以根据多种因素进行，包括数据包属性、地址、状态和协议。然而，防火墙仅在屏幕上显示数据包头。


    了解了防火墙的工作原理后，我们接下来讨论防火墙的类型。继续阅读以了解详情！


    ### 防火墙的类型


    防火墙被分为不同的类型。这是根据它们提供的安全级别和先进程度来划分的。下面，我们将详细讨论当今存在的防火墙类型。


    #### 数据包过滤防火墙


    这是一种通常安装在连接内部网络和互联网的路由器上的防火墙。数据包过滤防火墙仅在网络层的OSI模型上实现。它基于访问控制列表定义的规则工作。数据包过滤防火墙通过检查提供的整组数据包，并根据管理员通过ACL提供的指令集进行验证来工作。如果数据包不符合管理员定义的规则集，该数据包将立即被丢弃，并相应地通知和更新日志。使用数据包过滤防火墙时，管理员可以根据协议、地址和数据包属性构建自己的ACL。


    **数据包过滤防火墙的优点**


    - 数据包过滤防火墙的一个显著优点是它们非常经济实惠。

    - 数据包过滤防火墙还需要较低的资源使用量，使其具有成本效益。

    - 此外，它们最适合我们中那些拥有较小网络的人。


    **数据包过滤防火墙的缺点**


    - 正如我们之前提到的，数据包过滤防火墙仅在网络层工作，它们无法处理基于复杂指令的模型。

    - 此外，数据包过滤防火墙也非常脆弱，尤其是在大多数情况下容易受到欺骗攻击。


    #### 电路级网关防火墙


    这是一种安装在任何OSI模型会话层的防火墙。它们用于监控事件和会话，例如TCP三次握手，以确定请求的连接是否合法。在电路级网关防火墙中，重要且关键的筛选发生在连接建立之前。通过电路级网关传输到网络另一端计算机设备的信息看起来像是来自一个门户。这一功能在为私有网络建立隐蔽性以抵御陌生人方面起着至关重要的作用。


    **电路级网关防火墙的优点**


    - 与数据包过滤防火墙一样，电路级网关防火墙也非常经济实惠且成本友好。

    - 电路级网关防火墙还为私有网络提供匿名性，使其免受威胁和黑客攻击。


    **电路级网关防火墙的缺点**


    - 电路级网关防火墙的一个显著缺点是它们无法过滤单个数据包。这使得它们非常脆弱，因为一旦连接建立，黑客就可以利用它。


    #### 这类防火墙的应用


    电路级网关防火墙在当今世界的许多技术领域都有应用。例如，应用层网关用于OSI工具的应用层，并可以为特定协议的应用层提供安全和保护。应用层网关防火墙的一个很好的例子是代理服务器。然而，这种防火墙只能与突出显示的协议一起工作。一个很好的例子是，如果您基于防火墙安装了一个Web应用程序，它将只能启用HTTP协议数据。电路级网关防火墙旨在理解特定于应用程序的命令，如HTTP:
    POST和HTTP: GET，这些命令安装在特殊协议的应用层上。


    此外，应用层防火墙还可以用作缓存服务器，在提高网络性能方面发挥着重要作用，使记录流量级别变得更容易。


    #### 状态多层防火墙


    这种防火墙由我们迄今为止讨论的所有防火墙组合而成。它们是非常先进的防火墙，同样也很复杂。状态多层检测防火墙可用于通过使用ACL在网络层过滤数据包。此外，状态多层检测防火墙还会检查会话层上提供的单个会话，并评估ALG上的数据包。这种类型的防火墙兼容透明模式，能够实现服务器和客户端之间的直接链接和连接，这在几年前是不可能的。状态多层检测防火墙实现了协议指定的算法和关键安全模型；因此，从长远来看，使数据传输和连接更容易且更安全。


    #### 代理防火墙


    这类防火墙在应用层运行，主要目的是过滤当前网络和流量源之间的传入流量；这就是“代理防火墙”名称的由来。代理防火墙通过基于云的工具或不同的代理元素传输。它不允许流量直接连接，而是首先识别与流量源的关系或连接，并验证传入的数据包。这种检查可以与状态多层检测防火墙相媲美，因为它同时关注TCP三次握手协议和数据包。然而，代理防火墙还可以执行深层数据包检查和检查，验证信息承载包的真实内容，以确保其没有恶意软件。检查和数据完成后，数据包被放行前往目的地；代理防火墙将其传输出去。此过程在您网络上运行的各个设备和客户端之间建立了另一层间隔或分离。这使它们能够建立另一层匿名性，从而保护您的网络。代理防火墙的主要优点是，由于创建了额外的匿名层，它们更加安全。它们也很经济实惠。如果使用代理防火墙有任何缺点，那就是它们可能会减慢整个互联网的速度，因为它们在数据包传输过程中需要更多的步骤。'
