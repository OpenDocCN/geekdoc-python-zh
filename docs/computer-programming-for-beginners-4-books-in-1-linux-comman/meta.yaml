    \ 变量中完成的，如果你记得的话，它是一个空列表，在填充之后，它就变成了一个以整数值作为元素的列表。\n\n我们已经能够过滤列表了，我们通过创建一个名为 pairs\
    \ 的列表来实现，它将使用 filter 函数，该函数将返回数组中函数返回为 True 的值，例如 2，因为它大于零且其除以二的模等于零，因此，它满足要求。\n\
    \n最后一步是在屏幕上打印所有获得的偶数，我们在另一个 for 循环的帮助下完成，其中变量 x 将遍历整个列表，并打印出这些数字是偶数。\n\n### map()\
