    allows the HTTP traffic being transferred to pass through it, the data packets
    will, therefore, be able to reach the servers, which will initiate an instant
    reply as it is the case with every TCP communication model.

    The stateful inspection firewall will store the initiating link that exists between
    the client, and the server is what is called a state table. The table will have
    information about details such as the destination IP, the source IP, TCP flags,
    and the destination ports. This means that any reply coming in from the external
    web servers that are similar to the connection installed before will have to go
    through the firewall first then reach the designated servers without the need
    for extra configuration. The above-mentioned process makes setup easier since
    the user doesn''t have to apply any set of rules on the firewall to reply to the
    incoming data packets. The data packets mentioned above will instead be allowed
    automatically only if they are associated with the already installed network connection
    from the client to the server.

