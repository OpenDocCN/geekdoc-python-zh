    ## 使用Wireshark保护和监控你的网络


    网络安全分析师的工具包中最强大的工具之一是Wireshark，人们以前也称之为Ethereal。作为一个网络数据包分析器，Wireshark可以深入网络内部，从组成单个数据包的比特到连接信息，通过多个层次检查流量的详细信息。Wireshark可以排查设备网络中的安全问题，并通过其深入灵活的检查来分析安全事件。由于它是免费的，Wireshark的价格也非常实惠！


    ## Wireshark安装


    安装Wireshark非常简单。对于Mac OS X或Windows，你可以下载二进制版本。此外，对于大多数Unix/Linux发行版，可以通过标准软件分发系统获取Wireshark。在其他操作系统上，源代码可用于安装。对于Windows版本，Wireshark开发团队将其构建在WinPcap数据包捕获库之上。如果你的Windows系统中尚未安装WinPcap，你可能需要先安装它才能运行Wireshark。这里有一个注意事项：在运行Wireshark安装程序之前，你可以通过控制面板中的“添加/删除程序”手动移除旧版本的WinPcap。安装过程与基于向导的序列相同，使用两个主要提示：启动时，它会询问你是否打算启动WinPcap
    Netgroup Packet Filter（NPF）服务，以及是否要安装WinPcap。为了捕获数据包，你可以选择前者，即使你没有管理员权限，它也允许你这样做。只有管理员才能在启用此服务的情况下运行Wireshark。


    ## 第11章：防火墙


    基于一组安全规则，当你打算阻止或允许数据包以及监控出站和入站网络流量时，可以使用的一种网络安全设备是防火墙。为了使防火墙能够阻止恶意流量，如黑客和病毒，你需要在来自外部来源的入站流量和内部网络之间建立一道屏障。当你使用防火墙等工具时，可以改善计算机连接的安全性，例如互联网或局域网。防火墙是你网络安全框架不可或缺的一部分。通过使用一个检查每个到达数据包的代码墙，防火墙在系统的两侧，无论是出站还是入站，来决定是允许其通过还是阻止，从而将你的计算机与互联网完全隔离。当它能够对能够访问网络资源的系统进程和功能类型进行细粒度控制时，你可以通过防火墙的能力进一步增强安全性。为了拒绝或允许流量，这些防火墙使用多种主机条件和签名。即使听起来复杂，你也可以相对容易地操作、设置和安装防火墙。有些人认为，当他们安装了防火墙时，通过网络段的流量就会得到控制。然而，基于主机的防火墙可能更适合你。你可以在你的计算机上执行它们，包括与Internet
    Connection Firewall（ICF）一起使用。从根本上说，这两种防火墙的功能有相似之处：阻止入侵并提供强大的访问控制策略技术。简单来说，作为访问控制策略执行点，防火墙是一个保护你计算机的系统。


    ### 防火墙的功能


    本质上，以下是防火墙的一些基本功能：


    -   充当中介

    -   报告和记录事件

    -   控制和管理网络流量

    -   验证访问'
