- md: "## Loop \"While\"\n\nIt allows us to execute cycles or periodic sequences that\
    \ allow us to do things multiple times in a row. This cycle will allow us to execute\
    \ a block continuously, as long as the while condition is true, and by this, we\
    \ mean \"True\". This loop will be in charge of evaluating the condition and if\
    \ it is correct, the loop is executed and the condition is checked again at the\
    \ end and if it is still true \"True\", the program will be executed again, if\
    \ this condition is not correct \"False\", it will be omitted and the common execution\
    \ of the program will be carried out.\n\nThere are several types of \"while\"\
    \ loops; like the \"while\" loop controlled by counting, the infinite while and\
    \ others; all very useful in specific conditions.\n\nIts syntax is very simple,\
    \ and is as follows:\n\n```\nWhile (condition):\n    Block of instructions within\
    \ the cycle\n```\n\nNow let's make a simple example, which will consist of the\
    \ cycle printing a number, as many times as the user wants.\n\nExample:\n\n![](img/d87a95dcfe5b52bf5303163b6c768bd5_196_0.png)\n\
    \nIn this example, we can observe several things, the first is that we create\
    \ a variable cycles, which is an entry, which will allow us, as users to enter\
    \ the number of cycles we want to do in this program, of course, you must never\
    \ forget that this type of entry is a string, therefore, to do mathematical operations,\
    \ it is necessary to transform this type of input.\n\nThen another variable will\
    \ be created, called count, which has a fundamental function, and it is to be\
    \ the cycle counter of our program, with which we define that the same one will\
    \ begin in zero, for then, to start the count.\n\nThe next action is, to begin\
    \ with the while cycle, as we can see in the syntax previously explained, first\
    \ it is declared that we are going to make a while, then, between the parentheses\
    \ we have the condition.\n\n### a. Loop \"while\" controlled by counting\n\nIn\
    \ this cycle, there is a counter, and this counter will increase as the cycles\
    \ are carried out, this process will be repeated as many times as necessary until\
    \ the expected number is reached. We will understand this loop better with the\
    \ example that we will see next.\n\nAlthough we have already seen an example of\
    \ the while controlled by counting, that was the last one, it is never too much\
    \ to take another example, the same through the counting method, in this case,\
    \ we are going to make the counter go from higher to lower, as we will see below.\n\
    \n```\ncycles=input(\"Put the number of cycles here: \")\na=int(cycles)\nwhile(0<a):\n\
    \    a-=1\n    print(\"Cycles to end \"+str(a))\nprint(\"End\")\n```\n\nIn this\
    \ example, we make a turn of one hundred and eighty degrees, because the counter\
    \ does not have to reach the maximum value, but starts in it and is going to decrease.\n\
    \nThe first thing is that a variable called cycles is created, which is related\
