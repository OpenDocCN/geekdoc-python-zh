    最后，安装 `make` 工具：\n\n```\n[root]# yum –y install make\n```\n\n## Ubuntu 安装\n\n\
    首先安装 `GCC` 编译器：\n\n```\n[mickey] sudo apt-get install gcc\n```\n\n然后，安装内核开发包：\n\
    \n```\n[mickey] sudo apt-get install kernel-package\n```\n\n接着，安装 `make` 工具：\n\
    \n```\n[mickey] sudo apt-get install make\n```\n\n这样，我们就有了内核模块。\n\n现在，我们的系统已经准备就绪。接下来，我们需要编写一个初始的内核模块。使用以下内容，在你最喜欢的文本编辑器中打开并保存为\
    \ *hello.c* 文件：\n\n```c\n#include <linux/kernel.h>\n#include <linux/module.h>\n\
    \nint init_module(void)\n{\n    printk(KERN_INFO \"Hello, World !!!\\n\");\n\n\
    \    return 0;\n}\n\nvoid cleanup_module(void)\n{\n    printk(KERN_INFO \"Exiting\
    \ ...\\n\");\n}\n\nMODULE_LICENSE(\"GPL\");\nMODULE_AUTHOR(\"Narendra Kangralkar.\"\
    );\nMODULE_DESCRIPTION(\"Hello world module.\");\n```\n\n至少，任何模块都有两个函数。第一个是清理函数，第二个是初始化函数。因此，清理工具是\
    \ *cleanup_module()*，而初始化函数是 *init_module()*。一旦你加载模块，在模块被卸载之前，会先调用初始化函数，然后调用清理函数。其他宏以及\
    \ *MODULE_LICENSE* 都很容易理解。与用户空间的 *printf()* 语法相对应的是 *printk()*。然而，在常规的生产环境中，它不像\
    \ *printf()* 那样直接打印消息。相反，它将消息追加到内核的环形缓冲区中。每个 *printk()* 声明都有一个优先级。在示例中，使用了 *KERN_INFO*\
    \ 优先级。在格式字符串和 *KERN_INFO* 之间，你看不到任何逗号 (,)。如果没有指定无条件优先级，你可以使用 *DEFAULT_MESSAGE_LOGLEVEL*\
    \ 优先级。在 *init_module()* 的最后声明中，`return 0` 表示成功。\n\n*cleanup_module()* 和 *init_module()*\
    \ 是清理和初始化函数的名称。然而，对于新内核（>= 2.3.13），我们可以使用任何名称来替代清理和初始化函数。为了向后兼容，仍然支持这些旧名称。内核提供的宏\
    \ *module_exit* 和 *module_init* 用于替代清理和初始化函数的注册。现在，让我们使用我们偏好的清理和初始化函数名称来重写同一个模块：\n\
    \n```c\n#include <linux/kernel.h>\n#include <linux/module.h>\n\nstatic int __init\
    \ hello_init(void)\n{\n    printk(KERN_INFO \"Hello, World !!!\\n\");\n    return\
    \ 0;\n}\n\nstatic void __exit hello_exit(void)\n{\n    printk(KERN_INFO \"Exiting\
    \ ...\\n\");\n}\n\nmodule_init(hello_init);\nmodule_exit(hello_exit);\nMODULE_LICENSE(\"\
    GPL\");\nMODULE_AUTHOR(\"Narendra Kangralkar.\");\nMODULE_DESCRIPTION(\"Hello\
    \ world module.\");\nMODULE_VERSION(\"1.0\");\n```\n\n这里的关键点是，清理和初始化函数使用了 _exit\
    \ 和 _init 关键字。\n\n## 模块加载与编译\n\n现在，需要理解模块编译的过程。我们将使用内核的构建系统来编译内核模块。在将其保存为 Makefile\
    \ 之前，你可能想再次打开你最喜欢的文本编辑器，写下编译过程。这里需要注意，你必须将模块的 Makefile 和 hello.c 放在类似的目录中。\n\n\
    我们需要内核头文件来构建模块。上述 makefile 会调用内核的构建系统（来自内核源码），最终，内核的 makefile 可能会调用我们的 Makefile\
    \ 来完成模块的构建。由于我们现在已经拥有了构建模块的所有要求，你可以将开发的内核模块完成并命名为 hello.ko。\n\n第一个内核模块的首次编译现在成功了。现在，是时候研究如何在内核中卸载和加载这个模块了。你必须注意，要卸载或加载内核模块，我们需要获取\
    \ root 用户权限。当你切换到超级用户模式以加载模块时，你需要执行 `insmod` 命令，如下所示：\n\n```\n[root]# insmod hello.ko\n\
    ```\n\n*insmod* 已经成功完成了工作。然而，我们需要找到输出。输出被追加到内核的环形缓冲区中。我们可以通过执行 *dmesg* 命令来查看：\n\
    \n```\n[root]# dmesg\nHello, World !!!\n```\n\n此外，我们可以使用 *lsmod* 命令来验证模块是否已加载：\n\
    \n```\n[root]# lsmod | grep hello\nhello 859 0\n```\n\n当你执行 *rmmod* 命令时，你只需要检查\
    \ *dmesg* 命令的输出即可。如下所示，从内核中卸载模块。现在，通过清理函数，你将看到来自 *dmesg* 的消息。模块内的一些宏为我们提供了模块信息。命令\
    \ *modinfo* 会以如下这种美观的配置样式显示信息。\n\n## 如何识别进程的 PID\n\n为了识别一个进程 ID，即现有进程的 PID，我们可能需要再编写一个内核模块。在头文件\
    \ *<linux/sched.h>* 中定义的 *task_struct* 结构体中，内核存储了所有进程的相关信息。它提供了一个 *existing* 变量作为现有进程的指示器。你只需要打印\
    \ *current->pid* 变量的值，就可以识别当前进程的 PID。下面将给出一个完整的可工作代码 *(pid.c)*。\n\n*Makefile*\
    \ 与原始 *makefile* 类似，只是对目标文件的名称进行了轻微修改。插入模块后，使用 *dmesg* 命令查看输出，然后进行编译。\n\n## 用模块桥接多个文件\n\
    \n我们已经探讨了从单个文件编译模块。然而，在大型项目中，将模块分成多个文件可能非常方便，对于单个模块，我们可能有多个源文件。为了构建一个跨越两个文件的模块，我们必须理解这个过程。从文件\
    \ *hello.c* 中，我们可以将清理和初始化函数分成两个独立的文件，例如 *cleanup.c* 和 *startup.c*。*cleanup.c*\
    \ 的更改将如下所示。然后，我们将处理关于两个模块的有趣部分，即 *Makefile*。*Makefile* 本身是不言自明的。现在，在我们的方案中：使用\
    \ *cleanup.o* 和 *startup.o* 来构建最终的内核对象。是时候编译和测试模块了。当我们使用 *modinfo* 命令时，可以显示模块信息。通过\
    \ *modinfo* 命令，现在可以显示每个模块的作者相关信息、许可证、描述和版本。现在是时候通过卸载和加载 *final.ko* 模块来验证输出了。\n\
    \n了解更多关于模块的最佳地方是内核源代码。当你上网时，可以下载最新的源代码。现在，我们将继续详细讨论如何在虚拟机上安装 Linux。让我们开始吧！"
