    to wrap software components, expand graphic applications, among other skills,
    it has a wide range of code libraries and is more sensitive in development areas.


    ## How do I know which Python version should I use?


    In Python, there are currently two versions that are incompatible between themselves,
    which causes a lot of confusion to any user who is starting to program or even
    any user who is starting in the same language. These versions are called Python
    2.x which was released in 2000 and was updated until 2010, however, in 2008 was
    released version 3.x which is currently in full development of new versions and
    improvements in their commands.


    ## But, do these versions contain the same tools?


    Well, there is a big difference between each version of Python among which highlights
    that in Python 3.x the print sentence is taken into account as a function, so
    it is necessary to call it and enclose in parentheses what you want to print.
    Unlike in the version 2.x which does not need parentheses to print.


    When you are going to iterate a dictionary in Python version 2.x, the key-value
    elements are used through the items() and iteritems() methods. In the current
    version of Python 3.x, this operation is done only through the items(), keys()
    and values() methods and when using the iteritems() method we will obtain an exception
    of the AttributeError type.


    There is also a change in the input function, which in the Python 2.x version
    takes the data without converting the variable type. In this version, if we enter
    an integer variable, its entry will be of the "int" type and if we want it to
    be treated as a string we would have to call the function "raw_input" since this
    will be in charge of converting "int" data to string.


    In the Python 3.x version, this takes a big step forward since the "raw_input"
    function is suppressed and any conversion would be easily done through the input()
    function.


    ## Now that I know which version to use, how can I install Python according to
    my operating system?


    The Python programming language is included by default in the Mac OS and Linux
    operating systems, the only thing to do is to update according to the version
    you have, however, for Windows users, the program must be installed since it is
    not included in the system.


    ## Install Python on Windows


