    to check out before a hacker can get to them includes the browsers, SQL injection,
    flash, ActiveX, and social engineering.


    Due to the different scenarios that can cause an attack, different penetration
    testing types are going to be needed. The three types of testing that we are able
    to look through can include white box, black box, and gray box testing. When we
    start out with some of the black box testing, then none of the information about
    that system is going to be provided back to the person who is doing the testing.
    It is going to be the responsibility of our tester in order to gather up the right
    information about the system that they are supposed to attack.


    Then we are able to move on to the white box testing. This helps because it is
