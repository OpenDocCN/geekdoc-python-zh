    # The Definition of Personal Firewall


    In the world of secure computing, it’s quite essential for you to understand your
    need for a firewall. And since it aids our understanding of how a firewall may
    address those needs, we need to understand the goals of information security.


    # The Need for Personal Firewall


    Electronically, you will connect your computer to a broad network in the times
    of high-speed Internet access. You will have limited protection or control unless
    you have installed a personal firewall. There are some drawbacks to any high-speed
    connection, typical of anything else. Ironically, the same feature that makes
    a connection with a high-speed vulnerable is the same reason that makes it attractive.
    In some ways, you may be leaving your front door of your house unlocked and open
    with your connection to the high-speed internet. Some of the features of high-speed
    internet connections include:


    +   - Constant active connection – this is the fact that when your computer is
    connected to the internet every time, it is vulnerable

    - Access of high-speed – this means that it can be quite faster for intruders
    to break into your computer

    - A regular IP – it will be easier for an intruder to find your computer again
    and again after they have discovered you


    # Using a Personal Firewall for Defense


    Compared to an ordinary 56Kbps connection, now it is clear to you how, when you
    are online on a high-speed internet connection, you are vulnerable. Now, the threat
    posed by this type of connection is now known to you, and how you can defend yourself
    against it is what you need to know. Here are some of the vital reasons for a
    personal firewall:


    +   - You can easily develop policies for security to suit your'
