- md: '## Computer Networks: Home Applications


    Home users also consider using computer networks for various reasons. Some of
    these include:

    - Accessing remote information- People connect their devices for easier access
    to useful information.

    - Person-to-person communication- This communication includes sending e-mails
    or other forms of communication. Remote users are able to communicate with other
    people easily. They are able to see and hear from other people who are away from
    them without delays. Video-conferencing is one of the most popular person-to-person
    communication, is used in remote schools, or receiving medical opinions from medical
    practitioners who are distant. People also consider using computer networks to
    access information posted by worldwide newsgroups easily. Through these networks,
    people easily give their feedbacks regardless of their physical location.

    - Interactive Entertainment- Computer networks allow for easier access to videos
    on demand, multi-person simulation games, and participation of people in live
    television programs such as discussions, and quizzes. It is through these networks
    that people can feel the entertainment from the comfort of their homes. People
    also use computer networks as home applications for electronic commerce.


    ## Computer Networks: Mobile Users


    Mobile computers include personal digital assistants and notebooks. They are one
    of the segments in the computer industry growing at a very rapid rate. Owners
    of mobile computers usually possess desktop computers in their offices and prefer
    connecting them to their portable computers based at home. Computer networks allow
    for wireless connection to these devices, even when in an airplane or a car. One
    main reason why people connect to these mobile computers is to allow them to receive
    telephone calls and messages, send faxes, e-mails, access remote files, and surf
    through the web. People are able to do all this from any location away from their
    office.


    ## More Information on Types of Computer Networks


    Computer networks are basically used for numerous tasks in the world today. Some
    of the tasks include downloading attachments and printing documents. This is done
    by referring to several devices within a room and spreading them across the entire
    world. This can be defined based on their purpose or their size. Below are some
    of the common types of computer networks.


    ### Personal Area Network (PAN)


    A personal area network is the most basic and smallest type of computer network.
    It is comprised of a computer(s), phones, tablets, printers, and a wireless modem.
    PAN revolves around a single person within a building. The networks are commonly
    used in residences and small offices. Their management is controlled by one organization
    or person from one device.


    ### Local Area Network (LAN)


    Local area networks are popularly discussed by people in the world today. They
    are one of the most original, simplest, and common types of computer networks.
    They are used in connecting together several computers and devices of low voltage.
    The devices are usually within short distances, such as different rooms within
    a building or several buildings close to each other. They help in sharing resources
    and information among the connected devices. LAN computer networks are commonly
    used by enterprises. They are easily manageable and maintainable.


    ### Wireless Local Area Network (WLAN)


    WLAN networks function in a similar way as the LAN networks. The networks use
    wireless network technology. Some of them include Wi-Fi. WLAN networks do not
    require devices to have physical cables when connecting to it.


    ### Campus Area Network


    Campus area networks are quite larger than Local area networks but smaller than
    the metropolitan area networks. CANs are commonly used in small businesses, universities,
    colleges, and large school districts. Campus area networks are spread across a
    number of buildings that are closer to each other. They allow any user in the
    different buildings to connect and share resources.


    ### Metropolitan Area Networks


    Metropolitan networks are larger than the local area networks but smaller than
    the wide-area networks. They include the elements of both types of computer networks.
    MANS computer networks can spread on a whole geographical area such as a city
    or a town. The ownership and management of the computer network is usually under
    one company, such as a local council or by a single person such as the owner of
    a particular company.


    ### Wide Area Network


    Wide area network is quite complex as compared to the local area network. WANs
    computer networks easily create connections with computers in wide distant locations.
    Low voltage devices, as well as computers, create a remote connection with each
    other. They do this through a single large network allowing communication even
    longer distances. WAN computer networks have different categories, with the Internet
    being the most basic type. The Internet allows for the connection of computers
    all over the globe. Numerous public and administration entities typically own
    WAN computer networks. This is possible due to its wider reach.


    ### Storage-Area Network (SAN)


    SAN computer networks are of high-speed and significantly dedicated. They create
    connections between shared sources of storage devices and various servers. SAN
    networks do not rely on WAN and LAN. The computer networks typically removed the
    storage devices from the computer networks and put them on their high-performance
    networks. The computer networks are accessible similarly to drives attached to
    servers. Some of the types of Storage Area Networks include, unified SANs, and
    converged virtual SANs.


    ### System-Area Network


    This type of computer network is quite new and is also abbreviated as SANs. The
    computer networks are basically used in defining relative local networks. The
    networks are designed high-speed connections in applications involving servers,
    processors, as well as storage area networks. Computers are connected to this
    type of network operating as single systems and offer very rapid speeds.


    ### Passive Optical Local Area Network (POLAN)


    POLAN computer networks are used as a substitute for traditional switch-based
    Ethernet LANs. The technology used in POLAN computer networks is added to structured
    cabling. The reason behind the integration is overcoming concerns on the support
    of traditional network applications, and Ethernet protocols. Optical splitters
    are used in POLAN to enhance the splitting of optical signals from a single strand.
    Single-mode optical fibers are transformed into numerous signals that serve devices
    and users.


    ### Enterprise Private Network (EPN)


    Enterprise private Networks are owned by businesses that typically build them.
    Businesses prefer this type of computer networks as a way of securing the connection
    between various locations that share the network.


    ### Virtual Private Network (VPN)


    The extension of a private network all over the Internet is made possible by the
    use of Virtual Private Network. Sending and receiving information and data between
    connected devices is also made possible by the VPNs computer networks. The process
    is also possible when users are using devices that are not directly connected.
    Access to remote private networks is also made possible through a connection referred
    to as point-to-point.


    ## Basic Elements of Computer Networks


    Computer Networks comprise of systems through which a connection is created between
    numerous nodes. The links help them to share resources and information. Computer
    network elements are the fundamental objects used in computer networks. Basically,
    there are four significant elements of computer networking. These include computers,
    transmission medium, protocols, and network software. For a computer network to
    successfully function, all the elements have to work in coordination.


    ### Computers


    Computers are digital devices that can accept input in the form of data, process
