  md: '# The Classification of Computer Network


    Having learned about the essential details of a computer network, it is time we
    discussed the classification of computer networks. This is a very important topic
    for anyone in quest of learning computer networking. Computer networks are categorized
    based on various factors, namely: the geographical location, the relationship
    between devices, and the access types. Let us look at each criterion and find
    out the credentials in detail.


    # Basing on Geographical Location


    When using the geographical coverage criteria, the network device is subdivided
    into three different types: MAN, WAN, and LAN. The network spread in small, medium,
    and much wider geographical areas are referred to as the WAN, LAN, and MAN work
    networks in that order.


    # Based on the Access Type


    When basing on allowing different users to have access to the network resources,
    the network can be grouped into three different types: Intranet, Extranet, and
    lastly, the Internet. Intranet refers to any private network. In this kind of
    network, users from outside do not have access to provided network resources.
    An extranet is almost similar to an intranet as it is a private network. In this
    network, however, external users are allowed access to a small portion of internet
    resources after proper scrutiny and authorization. The Internet, on the other
    hand, is a public network. Any individual or user can have access to it provided
    they have devices that can access it.


    # Basing on Relationships between End Devices


    In this criteria, the Internet is broken down into two sets: the clients/server
    network and the peer to peer network. In the peer to peer network, the available
    end devices all have fair, equal rights. In the client/server network, however,
    the decision on which client will receive what rights lie in the hands of the
    server. Next, we look at the various types of computer networks. This is also
    a very important area where, as a person learning computer networking, you need
    to know.'
  merge: -1
  pgno: 300
- img_proc: true
  md: 'Computer networks are categorized by their size. There are mainly four types
    of computer networks, namely; WAN (Wide Area Network), MAN(Metropolitan Area Network),
    PAN (Personal Area Network) and LAN (Local Area Network). Let us discuss each
    of these networks extensively and find out what they entail.


    # • Local Area Network (LAN)


    LAN refers to a number of computers linked and connected to one another within
    a small space like a house or office. The Local Area Network is mainly used in
    the connection of two or more computers via a communication channel such as the
    coaxial cable and the twisted pair. LAN is cheaper because it is constructed with
    affordable hardware, including Ethernet cables, network adapters as well as hubs.
    Data is transferred quicker in LAN than any other network. The Local Area Network
    gives more secure network options.


    # • The Personal Area Network (PAN)


    This is a type of network that is arranged around an individual, to be more specific,
    within ten meters. PAN is mainly used in connecting computer devices that mainly
    for personal use. Thomas Zimmerman, a research scientist, first brought the idea
    of Personal Area Network. This kind of network can cover an area of up to 30 feet.
    You can use personal computers to develop this kind of network. Such kinds of
    computers are mobile phones, laptops, desktops, play stations, and media players.

    As of today, there exist two categories of Personal Area Network: Wired Personal
    Area Network and the Wireless Personal Area Network. The wireless one is developed
    by the use of wireless innovations like Bluetooth and Wi-Fi. This is usually a
    low range network.

    The wired network, on the other hand, is built by the use of USB cables.


    # • Examples of PAN


    **The Body Area Network:** this is a kind of network that is moved along with
    a person. For instance, mobile networks are'
  merge: -1
  pgno: 301
- img_proc: true
  md: 'moved with an individual. Now suppose that the individual in possession of
    the mobile network establishes a connection and invites other devices to share
    the information and connection.


    **Offline Networks:** This kind of network can be built when just at home. It
    is specially designed to connect and link different devices, namely computers,
    printers, and radio sets. You, however, need to note that the devices are not
    connected to the Internet.


    **The Small Home Office:** This kind of network is mainly used to link and connect
    a number of elements to the internet connection and a cooperate link through a
    VPN.


    # • **The Metropolitan Area Network (MAN)**


    MAN is a kind of network that can cover a large geographical area by joining a
    different kind of local area network to create a larger network. The metropolitan
    area network is mainly used in government organizations as well as private companies
    to connect citizens. In this kind of network, there are several local area networks
    connected via a telephone line. Some of the commonly used protocols in metropolitan
    area networks are ATM, Frame Relay ADSL, among others. MAN has a wide coverage
    and range compared to the local land network.


    # • **Uses of MAN**


    It is used in establishing communication between financial institutions like banks
    within a city.

    MAN can be applied in the reservation of airlines.

    Additionally, a metropolitan area network is used in learning institutions that
    are located within a city. It is also used in the creation of communication modules
    in the military.


    # • **The Wide Area Network (WAN)**


    WAN is a kind of network that covers very large geographical locations and'
  merge: -1
  pgno: 302
- img_proc: true
  md: 'regions like countries or States. WAN is very big compared to the local area
    network. It is not pinned down to a single location but rather can be distributed
    over large areas through fiber optic cables or satellite links. For your information,
    the Internet is one of the best forms of WAN. The Wide Area Network is largely
    used in fields of education, business, and government.


    # Examples of WAN


    **The mobile broadband:** in this kind of network, the 4G network is popularly
    used across a country.

    **Last Mile Internet:** This is the situation where a telecommunication company
    provides internet services to users in different locations by connecting their
    residences with fiber optic internet.

    **The Private Network:** Banks provide a set of private networks that can connect
    up to forty-four offices. The private network is build using telephone lines usually
    provided by telecom companies in charge.


    # Advantages of WAN


    Highlighted below are some of the advantages of WAN.

    **The geographical coverage:** WAN covers a larger geographical location than
    any other network. For instance, if a branch of a certain office is located in
    a different town or city, you can be connected to it through the Wide Area Network.
    The Internet gives a leeway through which you can be able to connect with a branch
    located in a different location.

    **It offers Centralized Data:** Data is centralized in Wide area networks. You,
    therefore, don''t require to have emails or other back up systems.

    Wide Area Network has provided an updated file. Various software organizations
    have work done on live servers. This means that programmers are able to access
    updated files within a matter of seconds.'
