  mdcn: '## Kate


    桌面环境。鉴于你可以将其用作强大的集成开发环境（IDE），同时它也是一个易于使用的轻量级文本编辑器，你还有机会同时处理多个文件。使用以下命令在 Linux
    Mint 或 Ubuntu 上安装 Kate：


    ```

    linuxtechi@linuxtechi:~$ sudo apt-get install kate

    ```


    Kate 具有一些卓越的特性，它们是：


    - 自动设置文档缩进

    - 自动检测语言

    - 支持多种语言

    - 强大的集成开发环境


    ## Gedit


    Gedit 作为 GNOME 桌面环境中的默认文本编辑器预装。Gedit 遵循类似的目标，它提供简洁干净的用户界面，并且是轻量级的，正如 GNOME 的目标始终是提供直接且简洁的功能。在
    GNOME 桌面环境中，直到 2000 年才向公众开放访问。它完全使用 C 语言开发，完全支持国际化文本。Gedit 拥有一些独特的特性，它们是：


    - 支持多种编程语言

    - 支持国际化文本

    - 语法高亮


    ## Brackets


    对于 Linux 环境，Brackets 于 2014 年由 Adobe 作为文本编辑器推出。它拥有令人兴奋的丰富功能，作为一款开源文本编辑器，使用它工作充满乐趣。它界面简洁，同时也简单易用。它被设计为代码编辑器和文本编辑器，旨在为程序员和网页设计师提供所需的帮助。它完全使用
    JavaScript、CSS 和 HTML 开发。凭借其精良的特性，即使它属于轻量级，一些优质的文本编辑器可能也不具备它所有的功能。要在 Linux Mint
    或 Ubuntu 上安装，你可以使用以下命令：


    ```

    linuxtechi@linuxtechi:~$ sudo add-apt-repository ppa:webupd8team/brackets

    linuxtechi@linuxtechi:~$ sudo apt-get update

    linuxtechi@linuxtechi:~$ sudo apt-get install brackets

    ```


    Brackets 文本编辑器具有一些独特的特性，它们是：


    - 专注的可视化工具 预处理器支持

    - 内联编辑

    - 实时预览


    ## Sublime text editor


    对于 Linux 环境，一款备受推崇的文本编辑器是 Sublime Text 编辑器。你可以将其用作开发环境以及文本编辑器；它集成了多种功能。除了各种标记语言外，它还支持大量编程语言。此外，通过大量可用的插件极大地扩展了其功能，使这款文本编辑器更加精良。你可以借助“Goto
    Anything”功能导航到系统中的任何文件或轻松导航到代码部分，这是该文本编辑器的一个显著亮点。在 Linux Mint 或 Ubuntu 上安装稳定版本的
    Sublime Text 编辑器，你只需参考一些特定的命令。Sublime Text 编辑器的一些独特元素是：


    - 项目特定的首选项

    - 代码并行编辑

    - 基于 Python 的插件 API

    - 出色的命令面板


    ## Geany


    对于 Linux 环境，一款相对知名且集成了 GTK+ 工具包的文本编辑器是 Geany。对于开发者和程序员，Geany 也可以作为一个卓越的开发环境。如果你想要一个开发环境和一个文本编辑器，Geany
    可能是你的合适选择。它支持几乎所有主要的编程语言，并且是轻量级的，无需安装其他包即可运行良好。要在 Linux Mint 或 Ubuntu 上安装 Geany，你只需参考一个特定的命令。Geany
    有一些独特的特性，它们是：


    - 易于插拔的界面

    - 用于轻松跟踪代码的行号

    - 大量自定义选项

    - 用于轻松开发的语法高亮

    - 简洁易用的界面


    ## VIM


    如果你喜欢在高级文本编辑器中拥有众多选项和强大性能来编辑文本，Vim 将是你的最佳选择，因为 Linux 中的默认“vi”编辑器可能会让你感到乏味。正如其名所示，Vim
    是“vi improved”（vi 改进版），是默认 Linux 文本编辑器的高级版本。他们在设计它时考虑到了开发者的特定需求。此外，由于其高度可配置的选项，它被称为程序员编辑器。你可以将其用作独立的
    GUI 应用程序或命令行实用程序，这与 Vi 编辑器相同。以下是 VIM 的一些独特特性：


    - 自动命令

    - 双字节输入

    - 分屏

    - 会话屏幕

    - 制表符扩展

    - 标签系统

    - 语法着色


    ## Linux Shell 简介


    如果你使用任何主要的操作系统，你都在间接地与 shell 交互。如果你运行 Linux Mint、Ubuntu 或任何其他 Linux 发行版，每次使用终端时，你都在与
    shell 交互。在我们继续之前，有一些术语相当重要，我们将在下一章深入讨论它们。


    ## 第 10 章：基本 Linux Shell 命令


    在 Linux 上，用于分析的命令是 shell。在终端仿真窗口中，用户与之交互的程序是 shell。在 Linux 上，工作站的 `mate-terminal`
    GUI 是仿真窗口。此外，它也是一个应用程序，比如 `PuTTY` 或安全 shell 客户端；`SSH` 安全地在 Windows 系统上，你可以通过网络登录到
    Linux。在一些商业或组织环境中，他们使用 Bourne Again Shell，即 `bash`。如果你愿意，你可以从一些可用的 shell 中选择，比如
    TC-Shell、C-Shell 以及 Bourne Shell。由于特定功能适用于它们中的每一个，它们都具有相同的特性。以下特性属于 bash：


    - 由于它记住最后几条命令，shell 的历史记录机制确实非常实用。除了参考编号外，要列出之前的几条命令，你可以使用 `history` 命令。为了重新运行命令，你可以从工作站终端仿真窗口的历史记录中剪切和粘贴。此外，要重新运行历史记录中的任何命令，可以使用符号“i”。


    - shell 还有“作业控制”，你可以在后台运行任何不需要终端交互的程序。shell 和程序 `sort` 在后台立即可用于其他命令。在这种情况下，shell
    会打印作业控制号“1”以及进程标识号“3470”。由于它在前台运行，你也可以使用特殊字符 Ctrl + z 来挂起程序。然后你可以使用 `fg` 在前台继续它，甚至使用
    `bg` 命令将程序置于后台。如果后台或挂起的程序有多个，你可以通过它们的作业号来引用它们。因此，使用 `jobs` 命令列出所有停止或后台作业的状态，以查看你的作业及其作业号。


    - 你可以编写 shell 命令脚本，类似于编译程序，你可以通过简单地命名它们来调用它们。例如，我们可以首先在 ~/bin 中创建一个包含特定命令的文件，以创建一个脚本，该脚本计算当前目录中
    C 程序文件的数量。在像平常一样运行它之前，我们可以使用 `chmod` 命令使文件可执行。


    - bash 是一种解释型编程语言，具有 *if-then-else* 语句、*for* 循环和 *while* 循环。当你输入以下命令时，你将获得更多关于
    Linux 在线文档的详细信息。shell 拥有数字和字符串值变量。主目录的目录是预设的 `$HOME`，要查看已分配变量的列表，请输入 `set` 命令。


    - 你可能会发现输入或频繁执行特定命令或命令组很麻烦；你可能想要分配 *别名*。例如，在当前目录中，要计算 C 程序文件的数量，我们可以为使用 `wc` 计算行数输出和使用
    `ls` 列出文件分配一个别名“countc”。


    - shell 拥有将一个程序的输出*管道*传输到另一个程序输入的功能。“|”是管道符号。例如，在 `wc` 程序中，我们可能在 `cat` 文件后将输出管道传输，以便我们计算文件
    A 中的单词数。


    - *标准输出*和*标准输入*是大多数 Linux 程序和命令遵循的概念。程序写入的大量输出是标准输出，程序读取的大量数据是标准输入。大多数时候，终端伴随着这些，因此你的屏幕可以获得此输出，而输入则来自你的键盘。你可以通过
    shell 将标准*重定向*到输出和输入。'
