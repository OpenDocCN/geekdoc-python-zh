  - 2. continue 语句：这个语句在编程中非常有用，应用它时，我们将跳过循环中该语句之后的内容。也就是说，如果我们满足了某些前置条件，例如，在多个 "if"
    或 else 或其他步骤之后，我们成功到达了一个 continue 语句，我们将跳过循环的其余指令，然后进行下一次迭代。我们可以总结为，循环内的 continue
    指令会强制解释器返回到循环的开头，忽略其中的所有指令和交互。
- - '####'
  - 3. pass 语句：它是一个空表达式，换句话说，这个语句什么都不做，但它允许我们创建一个循环而不在其主体中放置代码，以便以后添加并以这种方式用作临时填充物，我们的意思是向程序添加某种类型的延迟；或者就像在使用汇编器或处理器管理编程的情况下一样，这是一种制作
    nop 的方式。它是一个不会以任何方式影响代码行为的语句，并且应该注意，它不仅可以在循环中使用，也可以在代码中的任何地方使用而没有任何问题，我们的意思是，该语句也可以在普通函数中使用而没有任何麻烦，但这还不值得一提，因为我们还没有看到函数，但知道
    pass 可以与函数一起实现并不过分。我们可以说，建立一个区别，continue 将负责结束当前交互，但将继续该循环的下一次迭代，返回到开头，而 pass
    不会做任何事情，只是继续执行以下指令而不返回到开头。接下来，让我们看看一个例子。
