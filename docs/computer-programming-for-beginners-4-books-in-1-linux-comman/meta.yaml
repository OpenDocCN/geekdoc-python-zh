    as possible. Please enjoy!'
- md: '## Chapter 1: Introduction to Machine Learning and Computer Networking


    Machine learning and computer networking is both an essential field of study in
    computing but accompany different concepts. That is, they are topics that represent
    a similar study area on the contrary cover various sections of computer systems.
    In this case, machine learning entails computer algorithms and statistical models
    which facilitate the process of machine learning on data fed, the identity of
    suitable patterns, and the selection of the most favorable outcome. On the other
    hand, computer networking deals with the connections and interconnection of different
    computers globally, therefore, enabling data sharing, resource management, and
    user applications.


    ## Computer Networking


    Computer networking is the computing knowledge of studying and analyzing the communications
    techniques of computing devices or systems connected or interconnected together
    to exchange information or resources. A computer network is therefore defined
    as a group of computers allied together to communicate and share data and resources.
    Networking in computers solely depends on theoretical and practical applications
    of computer engineering, sciences, and telecommunication and information technologies.
    As to build computer networking between machines, an individual is required to
    have a router, network card, and specific protocols.


    ## History of Computer Networks


    Computer networking began during the rise of computers in the 1950s but utilized
    closed network systems used by the military. Unlike the modern networking systems,
    the late 1950s saw the use of military radars, which transitioned into MOS transistors
    consisting of transceivers, routers telecommunication circuits, and base station
    modules. Different developers proposed various forms of computer networking, including
    the introduction of a telephone switch in 1965 by the Western Electric. The first
    critical progress of computer networks began in the 1970s, which saw multiple
    modifications of devices used today to promote networking. One of them includes
    the Xerox PARC, which refers to the use of Ethernet, the X.25 used expanding IP
    network coverage and the creation of a host. From the supply of 50kb/s circuit
    in 1969 to the current 10mb/s to 100mb/s, the networking industry has undergone
    significant changes. However, the improvement is predicted to increase in the
    future, seeing the fastest modes of networks emerge, therefore building the computer
    networking sector. Besides, the higher speeds of the system have already been
    experienced with 2018. And this is because of the introduction of rates of up
    to 400 GB/s through the use of Ethernet fiber cables.


    ## Components of Computer Networking


    ### Routers


    A router is the most common network device which forwards data packets in computer
    networks with a primary function of directing traffic on the internet. The packets
    such as web pages are transmitted from one router to another comprising of an
    internetwork while waiting to reach a desirable node destination. Routers are
    commonly used in homes and small networks and perform using network cables rather
    than installed drivers and connected to the computers by use of USBs or specific
    wires. Routers may either be wireless or consist of cables linked by ports to
    allow for devices to connect to the internet. They usually linked to the modem,
    for instance, fiber and DSL, or WAN ports via network cables to facilitate the
    connection. Based on your desirable network link, your network speed will vary,
    with some regulating the rate you receive per individual router. Besides, routers
    may follow specific IP addresses depending on the internet connection, with the
    private addresses being the primary gateway default one for different devices
    in the network. Multiple links to one router, including both wireless and wired
    devices, enable each one to communicate freely, such as the sharing of a printer.


    ### Network Interface Card


    A network card is an electronic device that connects one computer to a network,
    usually to a Local Area Network (LAN). Most modern computers have an embedded
    network interface card in the motherboard instead of having an external chip to
    connect a network. These cards are critical when the computer exchanges data with
    the computer network using a given protocol such as CSMA/CD. Previous versions
    of network cards used included protocols such as ARCNET incorporated in 1977,
    but today most computers use Ethernet. The use of Ethernet network cards has been
    the most common with the revolution of computer networking being witnessed each
    year.


    Internet speeds often vary on network interface cards based on the protocol standards
    supported. The previous Ethernet cards supported up to 10mb/s with the current
    adapters supporting from 100mb/s up to 1000mb/s. Network cards do not necessarily
    support wireless connections, but routers also contain these cards, which determines
    the speeds for a given computer network. The same has been projected to increase
    in the near future with the use of Ethernet network cards. In this case, speeds
    are to grow in the coming years, with rates tripling the current figure. This
    is attributed to the expansion of usage of computer networking across different
    platforms, both in small enterprises to commercial use over the years.


    ### Protocols


    Computer networking also comprises connection protocols that consist of rules
    for two or more systems to exchange data. Other than regulations, protocols also
    include syntaxes, communications synchronization, and semantics, as well as error
    recovery techniques, use in both hardware and software of computer connection.
    In other words, protocols are a set of rules which connect the server to the routers
    regardless of the variations in infrastructure, designs, and standards. As to
    exchange information, both parties much adhere to accept the protocols built in
    the hardware, software, or both.


    Networking protocols usually accompany similar languages for the devices to facilitate
    the interaction between the two computers in the exchange of information. Network
    protocols typically utilize the Open Systems Interconnection (OSI) model used
    to break down the complicated process to readily defined functions and operations.
    There are multiple protocols used in computer networking, Transmission Control
    Protocol (TCP), User Datagram Protocol (UDP), Internal Protocol (IP), Hypertext
    Transfer Protocol (HTTP), and File Transfer Protocol (FTP), among others.


    ## Types of Computer Networks


    ### Local Area Network (LAN)


    Local Area Network, commonly referred by its abbreviation, LAN, is a group of
    computer systems using and sharing a particular internet connection within a given
    small area such as the office or residential building. The LAN connection is usually
    through a communication medium, for instance, coaxial cables used by two or more
    personal computers. This type of computer network is often cheaper than other
    types and accessed by those within the area and uses hardware such as adapters
    and Ethernet cables. Transfer of data is commonly extremely fast with considerably
    higher security. The connection only supports those within the area, and anyone
    outside tends to lack the transmission of information.


    ### Personal Area Network (PAN)


    This is a type of private network arranged within an area of 10 meters and often
    for personal use with devices within a given range. Personal Area Network was
    first researched and introduced by Thomas Zimmerman, who established that an individual
    could create a connection with communities with devices within 30 feet. Both wired
    and wireless PAN can be used in this type to connect to devices around the source.
    The source more so may generate from media players, laptops, and mobile phones.
    Wireless is usually connected using hotspots, Bluetooth, and Wi-Fi connected to
    devices within a given range. Wired PAN is connected by USB cables to facilitate
    the connection of a given network. Personal Area Network always moves with the
    person and can include offline systems and uses to connect devices using a VPN
    in small home networks.


    ### Metropolitan Area Network (MAN)


    Metropolitan Area Network is computer network which covers a wide range of a geographical
    area by interconnecting several LAN connections. This type of computer network
    is often used by government agencies to connect to different federal facilities
    as well as their citizens and private organizations. Some of the protocols in
    MAN include ISDN, Frame Relay, and OC-3, among others, which connect to different
    LANs through an exchange line. This form of a computer network is used in larger
    areas than that of LAN and such as airline reservations, military communication,
    colleges, and between'
  mdcn: '## 第一章：机器学习与计算机网络导论


    机器学习与计算机网络都是计算领域的重要研究方向，但它们涉及不同的概念。也就是说，它们虽然代表了相似的研究领域，却涵盖了计算机系统的不同方面。具体而言，机器学习涉及计算机算法和统计模型，这些模型有助于机器从输入数据中学习、识别合适的模式，并选择最优结果。另一方面，计算机网络则处理全球范围内不同计算机之间的连接与互联，从而实现数据共享、资源管理和用户应用。


    ## 计算机网络


    计算机网络是研究和分析相互连接或互联的计算设备或系统之间通信技术的计算学科。因此，计算机网络被定义为一组相互连接以进行通信、共享数据和资源的计算机。计算机网络完全依赖于计算机工程、科学以及电信和信息技术的理论与实践应用。要在机器之间构建计算机网络，个人需要拥有路由器、网卡和特定的协议。


    ## 计算机网络的历史


    计算机网络始于20世纪50年代计算机兴起之时，但最初使用的是军方采用的封闭网络系统。与现代网络系统不同，20世纪50年代末出现了军用雷达的使用，后来演变为包含收发器、路由器、电信电路和基站模块的MOS晶体管。不同的开发者提出了各种形式的计算机网络，包括1965年西电公司引入的电话交换机。计算机网络的第一个重大进展始于20世纪70年代，期间对当今用于促进网络化的设备进行了多次改进。其中包括施乐帕洛阿尔托研究中心（Xerox
    PARC）引入的以太网、用于扩展IP网络覆盖范围的X.25协议以及主机的创建。从1969年提供的50kb/s电路到目前的10mb/s至100mb/s，网络行业经历了显著变化。然而，预计未来改进将持续，最快网络模式将出现，从而推动计算机网络领域的发展。此外，系统更高速度的体验已在2018年实现。这是因为通过使用以太网光纤电缆引入了高达400
    GB/s的速率。


    ## 计算机网络的组成部分


    ### 路由器


    路由器是最常见的网络设备，其主要功能是在计算机网络中转发数据包并引导互联网流量。诸如网页之类的数据包从一个路由器传输到另一个路由器，构成一个互联网络，同时等待到达期望的节点目的地。路由器通常用于家庭和小型网络，使用网络电缆而非安装驱动程序，并通过USB或特定线路连接到计算机。路由器可以是无线的，也可以包含通过端口连接的电缆，以允许设备连接到互联网。它们通常连接到调制解调器（例如光纤和DSL）或通过网络电缆连接到广域网（WAN）端口以促进连接。根据您期望的网络连接，您的网络速度会有所不同，有些路由器会调节您从每个路由器接收的速率。此外，路由器可能遵循特定的IP地址，具体取决于互联网连接，而私有地址是网络中不同设备的主要默认网关。连接到一个路由器的多个链接（包括无线和有线设备）使每个设备都能自由通信，例如共享打印机。


    ### 网络接口卡


    网卡是一种将计算机连接到网络（通常是局域网（LAN））的电子设备。大多数现代计算机在主板上嵌入了网络接口卡，而不是使用外部芯片来连接网络。当计算机使用给定协议（如CSMA/CD）与计算机网络交换数据时，这些卡至关重要。以前使用的网卡版本包含诸如1977年引入的ARCNET等协议，但如今大多数计算机使用以太网。随着计算机网络的逐年革新，以太网网卡的使用最为普遍。


    互联网速度通常因网络接口卡支持的协议标准而异。以前的以太网卡支持高达10mb/s的速度，而当前的适配器支持从100mb/s到1000mb/s的速度。网卡不一定支持无线连接，但路由器也包含这些卡，这决定了给定计算机网络的速度。预计在不久的将来，随着以太网网卡的使用，速度将进一步提高。在这种情况下，未来几年速度将增长，速率将是当前数字的三倍。这归因于多年来计算机网络在不同平台上的使用扩展，从小型企业到商业应用。


    ### 协议


    计算机网络还包括连接协议，这些协议包含两个或多个系统交换数据的规则。除了规定外，协议还包括语法、通信同步和语义，以及错误恢复技术，用于计算机连接的硬件和软件中。换句话说，协议是一组规则，无论基础设施、设计和标准如何变化，都能将服务器连接到路由器。为了交换信息，双方必须接受内置于硬件、软件或两者中的协议。


    网络协议通常伴随相似的语言，以促进两台计算机在信息交换中的交互。网络协议通常使用开放系统互连（OSI）模型，该模型用于将复杂过程分解为易于定义的功能和操作。计算机网络中使用多种协议，包括传输控制协议（TCP）、用户数据报协议（UDP）、网际协议（IP）、超文本传输协议（HTTP）和文件传输协议（FTP）等。


    ## 计算机网络的类型


    ### 局域网（LAN）


    局域网，通常缩写为LAN，是一组在给定小区域（如办公室或住宅楼）内使用和共享特定互联网连接的计算机系统。LAN连接通常通过通信介质（例如，两台或多台个人计算机使用的同轴电缆）进行。这种类型的计算机网络通常比其他类型更便宜，由区域内的人访问，并使用适配器和以太网电缆等硬件。数据传输通常非常快，安全性也相当高。该连接仅支持区域内的人，外部人员往往无法传输信息。


    ### 个人区域网（PAN）


    这是一种在10米范围内布置的私人网络类型，通常用于个人使用，连接给定范围内的设备。个人区域网最初由托马斯·齐默尔曼（Thomas Zimmerman）研究并引入，他确立了个人可以使用30英尺内的设备与社区建立连接。有线和无线PAN都可以用于此类网络，以连接源周围的设备。源可能来自媒体播放器、笔记本电脑和手机。无线通常使用热点、蓝牙和Wi-Fi连接到给定范围内的设备。有线PAN通过USB电缆连接，以促进给定网络的连接。个人区域网总是随身携带，可以包括离线系统，并用于在小型家庭网络中使用VPN连接设备。


    ### 城域网（MAN）


    城域网是一种通过互联多个LAN连接来覆盖广泛地理区域的计算机网络。这种类型的计算机网络通常被政府机构用于连接不同的联邦设施以及其公民和私营组织。MAN中的一些协议包括ISDN、帧中继和OC-3等，它们通过交换线路连接到不同的LAN。这种形式的计算机网络用于比LAN更大的区域，例如航空公司预订、军事通信、大学以及'
