    **引言**


    恭喜你购买了《使用Kali Linux进行黑客攻击》，感谢你的选择。


    接下来的章节将讨论在涉及黑客攻击理念以及使用Kali Linux完成所有工作时，我们需要深入了解的所有不同部分。在黑客攻击方面，我们能够使用许多不同的工具，但能够将这一理念变为现实的最佳操作系统之一就是Kali
    Linux系统。本指南将花一些时间详细介绍所有这些内容，并深入了解如何使其运作。


    本指南的开始将探讨黑客攻击的一些基础知识，我们为何要花时间研究黑客攻击并将其用于我们自己的网络，以及深入了解道德黑客、不道德黑客以及介于两者之间的所有人的区别。


    接下来，我们将探讨一些网络安全和网络攻击的内容。在当今现代世界，如此多的人在线并不断尝试分享和查看信息，难怪黑客们试图寻找方法进入计算机和网络，随时窃取个人和财务信息。这就是为什么我们要花一些时间研究如何通过网络安全来保护我们的网络，同时了解哪些类型的网络攻击最有可能发生。


    现在是时候进一步深入，更多地了解黑客攻击将如何运作。我们将更详细地探讨黑客攻击过程，同时研究恶意软件，以及它和其他一些类型的攻击将如何发挥作用，帮助我们真正看到结果。


    然后，是时候转向我们可以使用Kali Linux系统做的一些事情了。这通常被认为是最佳的编码操作系统之一，我们将花时间了解它的特点以及如何根据我们的需求使用它。在这一部分，我们将探讨人们喜欢使用Linux的原因，如何设置Kali
    Linux，如果虚拟机是最佳选择，如何在虚拟机中使用Kali，甚至如何组织Kali Linux，使其为我们要进行的攻击做好准备。


    这只是我们能够进行的黑客攻击的开始。既然我们已经搭建了舞台，并且准备好进行一些工作，是时候更进一步，看看我们可以使用Kali Linux帮助我们完成的一些巧妙事情。我们将研究如何扫描和管理我们的网络，防火墙的重要性，如何在需要时获取用户信息，在我们想要使用的便携设备上使用Kali
    Linux，甚至如何使用MalDuino和Kismet。


    但这还不是全部。我们将探讨在入侵我们选择的网络并收集我们想要的信息时，我们能够采取的更多步骤。为了结束本指南，我们还将花一些时间研究如何绕过隐藏的SSH，如何入侵WPA和WPA2无线系统，如何使用一些不同的工具确保你保持隐藏且无人能将攻击追溯到你，以及如何使用Metasploit帮助我们完成自己的渗透测试。


    正如我们在本指南中看到的，有许多不同的部分需要发挥作用，以便我们真正完成我们想要进行的攻击。所有这些都是黑客——无论是新手还是经验丰富的老手——能够做到的不同方法。当你想要保护自己的网络或他人的网络，或者你想要入侵另一个网络时，你会很高兴拥有所有这些工具来帮助你完成这项工作。在涉及黑客攻击过程时，我们能够做很多很酷的事情，将所有这些准备就绪可以成为保护你自己网络的最佳方法之一。当你准备好了解更多关于黑客攻击以及我们能够与Kali
    Linux系统一起使用的所有工具和技术时，请务必查看本指南开始学习。


    市场上有很多关于这个主题的书籍，再次感谢你选择这一本！我们尽一切努力确保它包含尽可能多的有用信息；请尽情享受吧！'
