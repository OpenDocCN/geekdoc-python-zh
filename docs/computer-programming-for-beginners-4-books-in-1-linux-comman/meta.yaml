    # ## Introduction to Regular Expression


    A sequence of characters is an expression. Metacharacters are those characters
    that have an interpretation beyond and above the factual connotation that they
    have. For example, a speech by someone may be denoted by a quote symbol and ditto
    the subsequent symbols for a meta-meaning. Metacharacters or characters that specify
    or match patterns are regular expressions. Here are some of the components that
    a regular expression contains:


    +   - **Modifiers.** By modifying, for the range of text that the regular expression
    is to match, these narrow or expand it. The backlash, brackets, and asterisk are
    some of the modifiers.

    - **An anchor.** For the match between the text line and the regular expression,
    it is the anchor that designates this position. For example, anchors are $ and
    ^.

    - **A character set.** These characters retain their literal meaning. And with
    no metacharacters, a character set is the simplest type of regular expression.'
