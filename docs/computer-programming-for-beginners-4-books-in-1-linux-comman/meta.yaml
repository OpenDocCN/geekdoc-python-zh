    ## Chapter 7: What Are the Best Network Monitoring Tools?


    Networking is also referred to as computer networking. It is a term used to refer
    to the transportation and exchange of data between nodes through a universal medium
    in the information system. Networking involves using a network, designing construction,
    managing, maintaining, and operating the network software, infrastructure, and
    policies.

    Networking allows for the connection of devices and endpoints together on a local
    area network or a bigger network. This is one of the most effective services that
    business owners all over the world can take advantage of. Computer networking
    provides valid and reliable ways of resources and information sharing within an
    organization or a business. It helps people to benefit from their information
    technology equipment and systems.

    The significant benefits of networking include:

    - **File sharing** – Data can be easily shared among different users. Data can
    as well be accessed remotely when it is kept on other connected devices.

    - **Resource sharing** – Computer networking helps in sharing resources between
    different peripheral devices connected to the network. They include copiers, scanners,
    and printers. Resource sharing helps to save money because the software can as
    well be shared among different users.

    - **Sharing one Internet connection** – Having a single internet connection is
    cost-efficient and enhances the protection of systems when the network is adequately
    secured.

    - **Increasing the storage capacity** – Networking allows for the access of multimedia,
    and vital files when they are stored remotely in other networks-connected storage
    devices and machines.

    Computer networking also improves communication in that customers, staff, and
    suppliers easily share information and keep in touch. It allows for everyone interested
    in business access common databases, thus avoiding duplication of data, preventing
    errors, and saving time. Networking also makes it easier for organizational staff
    to work on queries, thus delivering better standards of service. The improvements
    are possible because of customer''s data sharing through the networks.


    Computer networking also has incredible benefits on costs. Information is stored
    in one standard and centralized database, thus increasing the efficiency of the
    drive and reducing costs. Staff are able to deal with many customers in little
    time because they are all accessing product and customer databases. Minimum IT
    support is also required because network administration can be efficiently centralized.
    Sharing of internet access, and peripherals sharing can also help in cutting costs.


    Improving consistency and reducing errors are other significant benefits of computer
    networking. This is because all staff in a business or organization are accessing
    similar information and from a single source. It allows for the easier making
    of standard version manuals and directories accessible to each staff. Backing
    up of data from individual points on a scheduled basis provides for consistency.


    The skills required when operating computer networking entirely depends on the
    network’s complexity. Large enterprises, for instance, may have more security
    requirements due to multiple nodes. Such companies, therefore, require experienced
    network administrators who can successfully manage and maintain the network. This
    may be different from smaller organizations whereby there are few nodes involved,
    thus requiring less security.


    ## Basic Fundamentals of Computer Networking


    Computer networking has been in existence for quite a long time, and as years
    go by, advancements continue to be made. Networking involves multiple devices
    such as routers, computers, and switches being connected to each other through
    wireless signals or cables. Building a wireless network needs one to understand
    all the basics of joining networks.


    Many people have an aim of becoming expert IT technicians, and understanding only
    the hardware may not be so helpful to them. Many people get stuck at the networking
    point due to misunderstandings. The paragraphs below will explain some of the
    basic fundamentals of networking. They will give an understanding of how computers
    communicate through networks. Understanding the interaction and communication
    between computers is essential to anyone who wants to become a networking administrator.


    Networking protocols are essential for developers dealing with applications relating
    to servers that use JAVA or programming based on Socket, such as bash or python,
    as well as System Admin. Computer networking is done through diverse sets of IP
    protocol suites. The most popularly used protocols include IP and TCP. IP is an
    abbreviation for Internet Protocols. Each of the protocols has unique architecture,
    as well as diverse functionalities.


    ## The Internet Protocol


    The internet protocol gives the definition of the networking communication protocols
    principals. It is helpful in relaying many datagrams through network boundaries.
    The internet protocol’s primary purpose is providing routing functions that help
    in the establishment of inter-networking connection, enabling the internet. The
    primary function is delivering packets from one host to the other host while depending
    on present IP addresses. The IP addresses are available on the packets’ headers.

    The internet protocols have four layers, with each layer having a set of instructions
    it carries out. The four layers include the application layer, the data link layer,
    the network layer, and the transport layer.


    ### 1. The Basic Fundamental of Networking Layer – The Application Layer


    The application layer appears at the topmost of IP and TCP protocols in networking.
    The primary purpose of the layer is transferring data through computers from a
    particular end to the other. The application layer works in conjunction with processes
    and applications using transport layer protocols. The processes and applications
    transport explicit instructions that help in the execution of tasks and enhances
    communication with the second layer. Application layer protocols have the following
    elements.

    - **Hypertext transfer** protocol that is commonly applied in modern webs. It
    provided a base for the founding of the World Wide Web. The protocol acts in the
    form of requesting and responding. It engages in multiple activities for the client.

    - **File transfer protocol** engages in the transfer of data to several networks.
    Its main tasks involve transferring and controlling data between computers using
    client and server architecture models. In many cases, the protocol can either
    use a password for authentication or can anonymously and automatically connect.

    - A **simple mail transfer** protocol is used when transmitting emails. The protocol
    is based on texts. It consists of three elements the MAIL that determines the
    returning address, RCPT allowing for connection with the recipient, and DATA acting
    as the message’s body.

    - **The simple network management** protocol is based on IP addresses. Its principal
    function is consistently collecting information on IP addresses from different
    machines. There are many devices that support the use of a simple network management
    protocol. There are also many diverse versions of the particular protocol.


    ### 2. The Basic Fundamental of Networking – The Presentation Layer


    The presentation layer works on the translation or converting data, for instance,
    encoding character, and compressing data between software applications, and networking
    devices. It is considered to be efficient when dealing with secure transactions
    such as money transfer and banking. It is useful because it allows for encryption
    and decryption of such reliable data. The presentation layer also helps in the
    conversion of formats.


    ### 3. The Networking Session Layer


    As a basic fundamental in networking, the networking session layer has the responsibility
    of opening, closing, and managing end-user application’s sessions. The sessions
    can include many requests and responses taking place inside the software. The
    layer also facilitates the combinations of packets as well as sorting them in
    an appropriate order.


    ### 4. The Transport Layer


    The task of the transport layer is communicating with the application layer about
    transferring data to the necessary hosts. In performing its role, the transport
    layer uses the transmission control protocol in most cases due to its reliability.
    The control protocol helps in the transmission of data from the application layer
    into smaller sizes of data and later transferring them one by one to the network.
    It is commonly used when people want to download and upload large files. It ensures
    there is no loss of packets that could lead to the corruption of downloaded and
    uploaded data.


    ### 5. The Networking Network Layer


    The networking network layer is also referred to as the internet layer. Its main
    purpose is to route data above networks. The Internet protocol is used when differentiating
    addresses. The internet control message protocol is commonly used in commanding
