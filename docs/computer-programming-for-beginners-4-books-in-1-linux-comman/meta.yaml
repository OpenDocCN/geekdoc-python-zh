- md: '## Chapter 9: Understanding Cybersecurity


    Cybersecurity is the protection of computers, mobile devices, servers, networks,
    data, and electronic systems from cyber-attacks and malicious viruses. Cybersecurity
    can also refer to as information technology security. Cyber securities are designed
    to protect and maintain the confidentiality of the data stored in the internet-connected
    systems. The organization should have a secure and effective response to cyber-attacks.
    The purpose of installing such security measures is to prevent data breaches and
    identity theft. Cybersecurity is classified into the following categories:


    - **Information security**


    The protection of data from unauthorized personnel. Goals of securing data protect
    the confidentiality of the data and preserve the integrity of information either
    in storage or in transit.


    - **Application security**


    The procedure of developing, adding, and testing safety features in an application
    to prevent security attacks against opportunistic malware. A conceded application
    could make available access to information designed to protect the device. Adequate
    security always begins at the designing of the app even before the application
    is installed.


    - **Network security**


    They are policies and practices implemented to break and monitor accessibility,
    modification, and misuse of computer or mobile network from unauthorized. The
    security of the network mostly involves authorizing access of information to authorized
    persons and usually controlled by the administrator. Network users are assigned
    by passwords and authority information to access data and programs that are within
    their security clearance.


    - **Operational security**


    Operational security includes the processes that recognize and identifies critical
    information, also determine whether the information, if accessed by malicious
    individuals, could be useful to them. Operational security also executes and selects
    a measure that removes any exploitation of helpful information.


    - **Disaster recovery and continuity of business**


    It is a planning strategy that is capable of restoring data and critical information
    in inventing that the system was hacked or destroyed during the disaster. When
    protecting your data, it is good to understand and plan. The plan arises when
    the application and usage of information after disaster tricks. Continuity of
    business includes a strategy and action that guarantees that the business will
    continues after the disaster.


    - **End-user education**


    The cybersecurity starts with your employees. The end-user is the specific person
    who uses the hardware device or software program after installation in the machine.
    Make sure that you educate your employees or yourself on the matter concerning
    software program or device. The end-user education plays a vital role in keeping
    the information of the organization safe. The end users are the first line of
    protection against cyber-attacks.


    ## Importance of Cybersecurity


    Cybersecurity considers as most important to an organization, government, institution,
    and individual. It is essential to protect the family and loved ones from cyber
    fraud and identity theft. Most of the cyber-attacks happen because of lack of
    awareness. Cybersecurity has always evolved since the discovery of computers.
    The modern-day the cyber attackers have improved their tactics in breaking down
    the systems also installed the internet has improved, making it easier to attack
    the businesses. The attackers have developed tools that are designed to exploit
    the weaknesses of the computer or mobile device. Most hackers do not attack the
    network, but the website or the server of the organization or individual. Hackers
    find it difficult to hack the network, as the most network of the organization
    has a firewall installed hence problematic for them to access. The following are
    the requirement for cybersecurity:


    - Firewall

    - Web filtering software

    - Endpoint protection

    - Intrusion prevention systems

    - Radius server

    - Logging software

    - Encryption


    Organizations and businesses can suffer a large amount of money when they fail
    to safeguard and handle confidential data effectively. There are numerous methods
    to use to make sure that your data is safe. An example is hardening, which means
    that confidential data stored in the corner of a structure, meaning that the information
    stored inside of a hard shell that cannot be cracked. Placing logging software,
    any hacker who attempts to access the information in the hardened network will
    be logged and traced. Installing and using VPNs and encrypted links makes it harder
    for hackers to access your data. Most hackers will not invest too much to hack
    into a new security system. It takes time to hack the system, thus increasing
    the chances of getting caught. Honeypot is another method of cybersecurity. Placing
    the right software in the system, any connection that goes in and out of the network
    can be traced fast. This area of the network is set deliberately and makes the
    network seem vulnerable. When the hacker attacks the systems, they go straight
    to the vulnerable area of the net. When they reach there, they steal files and
    later find out that the data are empty and leave a trace that they were attacking
    the system. When cyber network security is secure, the attackers will use a method
    of social engineering. Social engineering is the method of sending emails telling
    them to click here. Social engineering has evolved from being told to click here
    to taking place in internet browsing. Hackers apply the following tactics, phishing,
    vishing, smishing, and whaling. It is difficult to access the information that
    was lost since it appears that the data was gladly given. In social engineering,
    even the smallest mistake of giving out a password to a user account is enough
    to provide access to hackers to hack data and confidential information about the
    organization. Salami cyber-attack hackers steal little money from several banks
    that lead to a large amount. These attacks can go undetected since the nature
    of the type of cybercrime. An electrical protocol should be put in place to detect
    malware in real-time. The use of heuristic analysis is to observe the behavior
    of an application or a program to protect it against viruses that change their
    shape. The organization should train and educate and make them understand their
    part in keeping the data of the organization protected and report any malicious
    activity. The organization should put plans in place to deal with any attacks
    effectively and respond keenly to reduce the impact of the attack on the business.


    ## Data Security Measures and Its Importance


    We live in a world where most people use electronic devices & systems in almost
    every deal and transaction. Technology has resulted in many computer networks
    and electronic systems, and indeed, they all deal with data. What you might not
    know is that data one element considered to be very valuable, and internet users
    are very keen to find out how their information and personal data are handled.
    Data is, therefore, a precious asset and can have a massive impact on people.
    It needs severe protective measures to ensure information is secure and brings
    us to what we shall be discussing in this article: data security and its importance.


    ## What Does Data Security Mean?


    Data security refers to the technical process of safeguarding data and keeping
    it from corrupted and unauthorized access. It isn''t all types of data that are
    essential and sensitive, but others are precious and essential. Having unauthorized
    people get access to that kind of information can cause a lot of problems because
    they can use them to do things they are not allowed to do. Data security, therefore,
    is a defensive measure established to help keep data safe and out of reach for
    any unauthorized access. There exist a lot of ways you can protect data, as we
    have discussed below. The basic concepts of any data security system are confidentiality,
    integrity, and, lastly, availability. The three concepts are commonly abbreviated
    as CIA. It is the underlying security model guiding organizations and companies
    to protect their valuable data from unauthorized people and hackers. Now let''s
    break down each of the concepts and find out what they mean.


    - Confidentiality is a concept that makes sure data is available to individuals
    with authorized access and does not fall in the wrong hands.

    - Integrity makes sure that data is accurate and well reliable.

    - Availability, on the other hand, is a virtue that makes sure data is readily
    accessible to serve the needs of clients.


    So, what should you consider when setting up data security? Discussed below are
    some of the essential things you ought to consider when coming up with a security
    model. Where is the valuable data placed or located? You can''t say you are protecting
    something if you have no idea where that thing is put. The other thing you should
    consider is who can access your sensitive data? If you have no records of people
    allowed to access sensitive data, leaves you at high risk if getting accessed
    by an unauthorized individual. Know who has access to your data because it will
    give you an idea of the kind of person you are dealing with, and it makes it easier
    for you to pinpoint any unauthorized access. Have you actualized the consistent
    checking and instant alerting on the data? Activating real-time alerts and establishing
    a continuous monitoring process will ensure the security covers all high alert
    areas. The real-time alerts play a role in detecting any malicious activity, unwarranted
    access, and alerts the user before it gets too late. Below we look at the types
    of data security, let us discuss some of the technologies used in data security.


    ## Data Security Technologies'
  mdcn: '## 第九章：理解网络安全


    网络安全是指保护计算机、移动设备、服务器、网络、数据和电子系统免受网络攻击和恶意病毒侵害。网络安全也可称为信息技术安全。网络安全旨在保护和维护存储在互联网连接系统中的数据的机密性。组织应对网络攻击具备安全有效的响应能力。安装此类安全措施的目的是防止数据泄露和身份盗窃。网络安全分为以下几类：


    - **信息安全**


    保护数据免受未授权人员访问。保护数据的目标是确保数据的机密性，并维护信息在存储或传输过程中的完整性。


    - **应用安全**


    在应用程序中开发、添加和测试安全功能的过程，以防止针对机会性恶意软件的安全攻击。一个被攻破的应用程序可能会提供对旨在保护设备的信息的访问权限。充分的安全性始终始于应用程序的设计阶段，甚至在应用程序安装之前。


    - **网络安全**


    为阻止和监控计算机或移动网络免受未授权访问、修改和滥用而实施的策略和实践。网络安全主要涉及授权人员访问信息，通常由管理员控制。网络用户通过密码和权限信息被分配访问其安全许可范围内的数据和程序。


    - **运营安全**


    运营安全包括识别和确定关键信息的过程，并确定如果这些信息被恶意个人访问，是否可能对他们有用。运营安全还执行和选择措施，以消除对有用信息的任何利用。


    - **灾难恢复与业务连续性**


    这是一种规划策略，能够在系统在灾难期间被入侵或破坏时，恢复数据和关键信息。在保护数据时，了解和规划至关重要。该计划在灾难发生后的应用程序和信息使用方面发挥作用。业务连续性包括确保业务在灾难后继续运营的策略和行动。


    - **最终用户教育**


    网络安全始于您的员工。最终用户是指在硬件设备或软件程序安装到机器后使用它们的特定人员。确保您就有关软件程序或设备的问题对员工或自己进行教育。最终用户教育在保护组织信息方面起着至关重要的作用。最终用户是抵御网络攻击的第一道防线。


    ## 网络安全的重要性


    网络安全对组织、政府、机构和个人都至关重要。保护家人和所爱之人免受网络欺诈和身份盗窃至关重要。大多数网络攻击的发生是由于缺乏意识。自计算机被发现以来，网络安全一直在不断演变。现代网络攻击者改进了他们破坏系统的策略，同时安装的互联网也得到了改进，使得攻击企业变得更加容易。攻击者开发了旨在利用计算机或移动设备弱点的工具。大多数黑客不攻击网络，而是攻击组织或个人的网站或服务器。黑客发现入侵网络很困难，因为大多数组织的网络都安装了防火墙，因此他们难以访问。以下是网络安全的要求：


    - 防火墙

    - 网页过滤软件

    - 端点保护

    - 入侵防御系统

    - RADIUS 服务器

    - 日志记录软件

    - 加密


    当组织和企业未能有效保护和处理机密数据时，可能会遭受巨额损失。有多种方法可以确保您的数据安全。例如，加固，这意味着将机密数据存储在结构的角落，即存储在无法破解的坚硬外壳内的信息。放置日志记录软件，任何试图访问加固网络中信息的黑客都将被记录和追踪。安装和使用
    VPN 和加密链接使得黑客更难访问您的数据。大多数黑客不会投入太多资源来入侵新的安全系统。入侵系统需要时间，从而增加了被抓获的机会。蜜罐是另一种网络安全方法。在系统中放置合适的软件，任何进出网络的连接都可以被快速追踪。网络的这一区域是故意设置的，使网络看起来很脆弱。当黑客攻击系统时，他们会直接攻击网络的脆弱区域。当他们到达那里时，他们会窃取文件，后来发现数据是空的，并留下他们攻击系统的痕迹。当网络网络安全得到保障时，攻击者会使用社会工程学方法。社会工程学是发送电子邮件告诉他们点击这里的方法。社会工程学已经从被告知点击这里演变为在互联网浏览中发生。黑客应用以下策略：网络钓鱼、语音钓鱼、短信钓鱼和鲸钓。由于数据似乎是自愿提供的，因此很难访问丢失的信息。在社会工程学中，即使是向用户账户提供密码的最小错误，也足以让黑客入侵数据和有关组织的机密信息。萨拉米网络攻击黑客从多家银行窃取少量金钱，导致巨额损失。由于此类网络犯罪的性质，这些攻击可能未被发现。应制定电子协议以实时检测恶意软件。启发式分析的使用是观察应用程序或程序的行为，以保护其免受改变形状的病毒侵害。组织应培训和教育员工，使他们了解自己在保护组织数据方面的作用，并报告任何恶意活动。组织应制定计划以有效应对任何攻击，并敏锐地响应以减少攻击对业务的影响。


    ## 数据安全措施及其重要性


    我们生活在一个大多数人在几乎每笔交易和事务中都使用电子设备和系统的世界。技术导致了许多计算机网络和电子系统的出现，而且它们确实都在处理数据。您可能不知道的是，数据被认为是非常有价值的元素，互联网用户非常关注他们的信息和个人数据是如何被处理的。因此，数据是一项宝贵的资产，可能对人们产生巨大影响。它需要严格的保护措施来确保信息安全，这引出了我们将在本文中讨论的内容：数据安全及其重要性。


    ## 数据安全意味着什么？


    数据安全是指保护数据并防止其被损坏和未授权访问的技术过程。并非所有类型的数据都是重要和敏感的，但其他数据是宝贵和重要的。让未授权人员访问此类信息可能会导致很多问题，因为他们可以利用这些信息做他们不被允许做的事情。因此，数据安全是一种防御措施，旨在帮助保护数据安全并防止任何未授权访问。正如我们下面讨论的那样，有很多方法可以保护数据。任何数据安全系统的基本概念是机密性、完整性，最后是可用性。这三个概念通常缩写为
    CIA。这是指导组织和公司保护其宝贵数据免受未授权人员和黑客侵害的基础安全模型。现在让我们分解每个概念，了解它们的含义。


    - 机密性是一个概念，确保数据可供具有授权访问权限的个人使用，而不会落入错误的人手中。

    - 完整性确保数据准确且可靠。

    - 另一方面，可用性是一种美德，确保数据易于访问以满足客户需求。


    那么，在设置数据安全时应该考虑什么？下面讨论的是在制定安全模型时您应该考虑的一些重要事项。宝贵的数据放置或位于何处？如果您不知道某物放在哪里，就不能说您正在保护它。您应该考虑的另一件事是谁可以访问您的敏感数据？如果您没有记录允许访问敏感数据的人员，那么如果未授权个人访问，您将面临高风险。了解谁有权访问您的数据，因为这将让您了解您正在处理的人员类型，并使您更容易识别任何未授权访问。您是否实现了对数据的持续检查和即时警报？激活实时警报并建立持续监控过程将确保安全覆盖所有高警戒区域。实时警报在检测任何恶意活动、未经授权访问方面发挥作用，并在为时已晚之前提醒用户。下面我们来看看数据安全的类型，让我们讨论一些用于数据安全的技术。


    ## 数据安全技术'
