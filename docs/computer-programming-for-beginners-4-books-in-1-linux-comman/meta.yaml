    myfile = open(\"D:\\pythonfile\\mypythonfile.txt\", \"r\")\nmyfile.readlines()\n\
    ```\n\n一旦我们打开了一个文件，就有许多类型的信息（属性）我们可以用来更多地了解我们的文件。这些属性是：\n\n- File.name：这是一个属性，将返回文件的名称。\n\
