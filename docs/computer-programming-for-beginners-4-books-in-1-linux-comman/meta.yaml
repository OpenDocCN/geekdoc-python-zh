    提供的部分内容是确定事物的算法。为了最小化和加速磁盘碎片，这些算法的目的可能是目标。作为目录和文件访问权限定义的模式，现代文件系统还提供了一个安全模型。作为用户，你可以通过
    Linux 文件系统安全模型访问其他人的文件或操作系统。为了实现这些目的，所需的软件是最终的构建块。作为提高程序员效率和系统效率的技术，Linux 使用两部分软件的应用。Linux
    虚拟文件系统是这个实现的第一部分。这个虚拟文件系统为所有类型的文件系统提供访问，并为开发者和内核提供单一的命令集。虚拟文件系统软件会调用特定所需设备的驱动程序来与各种文件系统接口。执行的第二部分是文件系统特定设备的驱动程序。设备驱动程序解释文件系统命令的标准集，这些命令针对逻辑或分区卷以及特定于文件系统类型的命令。


    ### Linux 目录结构


    如果你来自 Windows，Linux 的文件系统结构可能看起来特别陌生。现在主要是三个字母的名称，那些听起来神秘的目录和 / 选项已经取代了被遗忘的驱动器字母以及
    C:\ 驱动器。定义其他一些 Unix 相关操作系统和 Linux 文件系统结构的是 FHS（文件系统层次结构标准）。然而，Linux 文件系统中还包含一些尚未被标准定义的目录。


    **/var – 可变数据文件**

    由于它在正常操作中必须是只读的，/var 目录是 /usr 目录的可写对应部分。在正常操作期间，我们可以将日志文件以及所有通常会写入 /usr 的其他内容写入
    /var 目录。例如，在 /var/log 中可以找到日志文件。


    **/usr – 只读数据和用户二进制文件**

    与系统使用的文件和应用程序相反，用户使用的文件和应用程序包含在 /usr 目录中。例如，非基本系统管理二进制文件的位置在 /sbin 目录，而非必要应用程序的位置在
    /usr/bin 目录内。/usr 目录还包含其他目录，包括架构无关的文件夹，如图形，它们共享 /usr/ 中的位置。这个过程防止它们搞乱系统的其余部分，其中本地目录
    usr/ 默认情况下安装在本地编译的应用程序中。


    ### /tmp – 临时文件


    每当你的系统重新启动时，由于应用程序存储的临时文件位于 /tmp 目录中，像 tmpwatch 这样的实用程序会随时删除这些文件。


    ### /srv – 服务数据


    /srv 目录包含“系统提供的服务的数据”。如果你使用 Apache HTTP 服务器来托管网站，你可能会将网站文件存储在 /srv 目录内的一个目录中。


    ### /selinux SELinux 虚拟文件系统


    如果出于安全目的，你的 Linux 发行版（如 Red Hat 和 Fedora）使用 SELinux，那么 /selinux 目录包含特殊文件。它与 /proc
    相同。在 Ubuntu 上，这个文件夹的存在似乎是一个错误，因为 Ubuntu 不使用 SELinux。


    ### /sbin – 系统管理二进制文件


    /bin 目录与 /sbin 目录平行。它通常包含基本二进制文件，旨在由 root 用户运行以进行系统管理。


    ### /run – 状态文件应用程序


    /run 目录为存储瞬态位置（如进程 ID 和套接字）的需求提供了一个标准位置，因为它相当新。由于 /tmp 中的文件可能会被删除，/tmp 无法存储这些文件。


    ### /root – Root 的主目录


    /root 目录是 root 操作员的主目录。作为系统根目录，其位置在 /root，而不是 /home/root。


    ### /proc – 内核和进程文件


    /proc 目录与 /dev 目录相同，因为它不包含标准文件。它只包含用于处理和表示信息的特殊文件。


