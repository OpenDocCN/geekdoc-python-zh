    顾名思义，应用防火墙是一种在操作系统模型第七层运行的防火墙。其主要功能是在每个应用层控制和检查数据包。这种防火墙了解典型应用应具备的内容以及恶意使用所包含的内容。因此，它能够很好地过滤掉任何未经授权的访问。


