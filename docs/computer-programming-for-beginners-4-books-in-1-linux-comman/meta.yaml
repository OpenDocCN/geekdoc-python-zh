    Other than focusing on online, computer programs, and application security, you
    should also put in mind the protection of the physical computer itself. Begin
    by having a lengthy and robust password of not less than eight characters with
    a mixture of lower and upper letters as well as numbers and symbols. Use identity
    card authentications where the need is to ascertain your data, especially when
    providing security to confidential information. Keep all these securities protected
    at all times without having vulnerabilities that may compromise your cyber-attack
    security measures.


    - **Ghettoize Networks**


    Another primary source of computer cyber-attack is through the network, which
    connects different devices to the server. The host typically has limited threats
    to your system, but third parties, which are hackers, in this case, may use your
    connection as an entry point to access your data. Then you have to conceal these
    loopholes as they contribute to threats of cyber-attacks. One of the practices
    to do is to prevent other people''s devices from accessing private networks by
    securing stations that facilitate file sharing. Another form is through becoming
    very cautious, especially on what you share online, as some information you share
    may be used against you. Besides, ensure that you avoid using public networks
    with devices that consist of critical and sensitive data as most hackers may take
    advantage and benefit from your mistake.


