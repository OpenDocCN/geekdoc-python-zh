  md: '# # Chapter 8: Types of Firewall


    A firewall is a kind of cybersecurity tool that protects a computer network from
    being tempered or compromised: preventing attacks from hackers who try breaking
    into the system from outside. Firewalls can be in various forms; it can be in
    the form of a software or hardware on a computer. For a firewall to work efficiently,
    it has to be connected to at least two network interfaces with one protected and
    the other that is exposed to attacks or threats. Therefore, you can consider a
    firewall to a form of gateway installed between two sets of a network.


    # ## How Do Firewalls Work?


    Having known what firewalls are and what they do, it is time you learned how they
    work! Firewalls work by examining all the available data packets that pass through
    them to assess whether they meet the guidelines and regulations posed by the Access
    Control List (ACL) and created by the person administrating the network. If the
    data packets meet the rules set by ACL, they will be allowed to maneuver inside
    the connection.

    Additionally, firewalls play a critical role in keeping a log of essential procedures
    and activities occurring within a network. Again, the necessary actions are only
    identified by the administrator. He then configures the related firewall to keep
    the logs basing on the level of importance.

    The process of filtering logs can be done basing on several things, including
    the packet attributes, address, state, and protocols. Firewalls, however, only
    display the packet headers on screens.

    Having known how firewalls work, we next discuss the types of firewalls. Read
    on to find out!


    # ## The Types of Firewalls


    Firewalls are categorized into different types. This is done depending on the
    level of security they provide and the advancement they have. Below, we discuss
    extensively on the types of firewalls in existence today.


    +   - **The Packet Filtering Firewall**'
