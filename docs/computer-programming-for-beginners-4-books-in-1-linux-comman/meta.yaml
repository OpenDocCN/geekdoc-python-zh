    # MitM, Man-in-the-Middle Attack


    In the situation where a hacker plants itself between a server and the communications,
    a MitM attack is happening. Some of the man-in-the-middle attack types include:'
  merge: -1
  pgno: 401
- img_proc: true
  md: '# Replay


    Attackers can impersonate one of the participants by intercepting and saving old
    messages and attempt to send them later; thereby, a replay attack is taking place.
    You can use a string that changes later or a random number to counter which nonce
    or session timestamps to easily counter it.


    # IP Spoofing


    IP spoofing happens when a system provides the attacker with access to it, thinking
    that it is communicating with a trusted, known entity. A target host gets a trusted,
    known host from the attacker who, instead of its own IP source address, sends
    a packet with such an IP source. It is possible for the target host to act upon
    it after accepting the packet.


    # Session Hijacking


    Between the network server and a trusted client, attackers can hijack a session
    in this type of MitM attack. While the belief of the server is that of a communication
    with the client as it continues the session, there will be a substitution of the
    IP address of the attacking computer for the trusted client. For example, the
    process of the attack can go thus:


    +   1. There is a connection by the client to a server.

    2. The client’s control is gained by the computer of the attacker.

    3. The computer of the attacker disconnects the client from the server.

    4. The attacker uses their IP address to replace that of the IP address of the
    client, thereby, spoofing the sequence numbers of the client.

    5. There is a continuous dialog by the computer of the attacker with the server,
    and the belief of the server is that the communication still continues with the
    client.


    For the prevention of all MitM attacks at present, there is no configuration or
    single technology to do the magic. Overall, effective safeguards against MitM
    attacks are digital certification and encryption, with both assuring integrity
    and confidentiality of communications. However, that encryption'
