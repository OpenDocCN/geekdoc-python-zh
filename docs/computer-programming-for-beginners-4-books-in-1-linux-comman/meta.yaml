    | sort | sort file data |

    | cut | cut out selected fields of each line of a file |

    | sed | stream text editor |

    | comm | compare sorted data |

    | paste | merge file data |

    | cmp | compare the contents of two files |

    | perl | data manipulation language |

    | awk | Pattern processing and scanning language |


    ## File editors


    You can amend and create files by using editors.


    | Command | Description |

    |---|---|

    | vi, vim | standard text editor |

    | gedit | GNOME text editor |

    | pluma | Mate GUI text editor |

    | pico | easy text editor for vdus |

    | ex, edit | line editor |

    | xemacs | emacs with mouse action |

    | emacs | GNU project Emacs |


    ## Files directory


    You can handle files and create file directory through these commands.


    | Command | Description |

    |---|---|

    | lpq | spool queue examination program |

    | touch | update modification and access times of a file |

    | just | text justification program |

    | tail | print last lines from file |

    | head | give first few lines |

    | rm, rmdir | remove (unlink) directories or files |

    | grep | search file for regular expression |

    | pwd | print working directory |

    | find | Find files |

    | mv | rename or move file type |

    | file | determine file type |

    | more, page | display file data at your terminal |

    | cp | copy file data |

    | mkdir | make a new directory |

    | chmod | change file mode |

    | ls | list and generate statistics for files |

    | chgrp | change file group |

    | lprm, cancel | Remove jobs from line printer queue |

    | cd | change current directory |

    | lpr | spool file for line printing |


    ## Logging out


    | Command | Description |

    |---|---|

    | logout | log out of a Linux terminal |


    You must take note that you must exit the Desktop Environment instead of a Linux
    workstation.


    ## Chapter 11: Shell Scripting


    For a Linux-based OS, a text file that has commands sequence is a shell script.
    The commands sequence of the shell script would have to be typed into a single
    script at a time into the keyboard. As an interpreter for commands set that you
    use to communicate with the system, the shell is the CLI, command-line interface’s
    operating system. For them to save time, a user must repeatedly use the command
    sequence of a shell script. There are subcommands, comments, and parameters that
    the shell needs to follow, just like other programs. And it is by entering the
    file name on a command-line in the shell that users can initiate the sequence
    of commands. A shell script is known as a batch file in the DOS operating system
    as it also referred to as an EXEC in the mainframe VM operating system of IBM.


    You can enter the command for the system execution since it is within the operating
    system of Linux that you will find the shell program. On a Linux computer, the
    shell program will start, providing the chance to have your commands entered through
    an interface when a terminal window is opened. The command-line interface is what
    this interface is referred to by people. On the screen, you can see the display
    of the output, and the shell executes it when a command is entered. Also, stored
    in a file, some commands can also be executed by the shell in addition to being
    able to execute and accept commands interactively. Shell scripting is recognized
    as the mode of this execution.


    ## How shell script works


    Giving the shell executive permission, making the script accessible to the shell,
    and writing the script are some of the fundamental steps involved with shell scripting.
    You can use a graphical user interface, GUI, word processor, or text editor to
    write shell script since it contains ASCII. The shell can interpret the language
    of a series of commands in the content of the script. Shortcuts, arrays, *if/then/else*
    statements, variables, and loops are some of the functions that shell scripts
    support. In a location that the shell can access, you can use the .sh or .txt
    extension to save the file once complete.


    ## Background to the shell


    In the 1970s, Ken Thomson developed V6 Shell, a shell program to start with Unix.
    Its scripting proficiency was quite lacking even as it was a shell with interactive
    features. In 1977, Bourne Shell came on board and for the root account; as the
    default shell, it remains in use today. And through the years, it has been quite
    useful through the scripting abilities. By the 80s, Korn Shell and C-Shell gave
    the public something to talk about as the highly popular shell variants. There
    was a drastic difference from the original shell as specific syntax has been brought
    by every one of these shells. As such, Bash is an extremely prominent shell today.
    As the unique Bourne Shell’s massively enhanced variant, it stands for Bourne-Again-Shell.


    ## Shell script applications examples


    By typing one line at a time, you can save quite a lot of time from doing some
    repetitive task when you use a shell script. Below are some of the examples of
    applications that you can use a shell script for:


    - Monitoring a system

    - Executing routine backups

    - Linking existing programs together

    - Manipulating files

    - Completing batch

    - Creating a program or running a programming environment

    - Automating the code compiling process


    ## Shell script execution


    As the shell’s argument, all you have to do is to pass the script path if you
    want to execute a shell script. You need to pay attention to the fact that LF
    characters, Line-Feed, are required for terminating the lines by the shell. It
    is easy to run into errors if, on a Linux system, you attempt to execute shell
    script promptly or write it on Windows. For line termination, Carriage-return-Line-Feed,
    the combination of CR-LF is what Windows uses, and you will need to have it in
    LF-only conversion. For means to go about achieving this, you can check your Windows
    editor.


    As a command, the shell script can be executed directly using another way. As
    your shell script’s first line, you can insert the *hashbang* declaration below:


    ```

    #!/bin/bash

    ```


    Then, you can do some command to make your script file executable. Right now,
    without having to reference the shell explicitly, you can have the script file
    executed directly.


    ## Benefits of shell scripts


    Things are meant to be efficient and simple when you use shell script. It removes
    any interpretation issues since it is a similar syntax that it uses on the shell
    command-line that it uses in the script. Also, more than other programming languages,
    it requires less of learning curves and also faster when it comes to writing code
    for a shell script. However, if left unnoticed, this tends to prove extremely
    costly if there is an error in a shell script. Also, there may not be compatibility
    with different platforms connected with shell scripting, and more than individual
    commands; shell scripts can also be slower to execute. All the same, here are
    more advantages of shell scripts.


    ### Portable:


    When the shell itself is present, you can transfer a shell script to another Unix
    and Unix-related OS. Also, shell scripts are much more portable than C/C++ programs
    when you are in the process of transferring a shell script from different architectures
    like Sparc, MIPS, x86, and so on. You will have to attempt to run a C/C++, build
    the program, and copy the source code for you to transfer and use a C/C++ program.
    Then, if it uses the architecture-specific code, it may not work as expected.


    ### Transparency:


    Since it is a text file, you can check out the kind of actions the shell script
    is performing by viewing it quite easily. By contrast, it is if you have access
    to the source code or the source code wants to inform you that you can know the
    type of program in a language like C/C++. For example, it is possible to find
    out if any files are getting deleted by a shell script and then have those files
    copied to another place if you need those files. Also, because you may gain access
    to view the source code, shell scripts can be quite simple to diagnose than the
    regular programs. Though to avoid such errors, creating and checking programs
    are some of the responsibilities of a compliant shell script. You can as well
    create the directory as you look in the script code.'
