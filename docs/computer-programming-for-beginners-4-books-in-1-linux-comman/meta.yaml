    macOS）可以在最新版本的 Kismet 上运行。如果你希望它在树莓派上运行，Kismet 在 Kali-Pi 安装或虚拟机上都能完美运行。


    **步骤 1：安装 Kismet：**


    在 Kali Linux 上安装 Kismet 之前，需要克隆 git 仓库。根据你使用的操作系统类型，你可能不需要担心任何依赖项。但是，为了 Kismet
    平稳运行，可能需要安装稍长的依赖项列表。因为你需要处理、登录、解码和检测大量的无线数据，所以它们相当必要。此外，你还需要安装许多库，因为你将控制无线网卡。然后，你需要通过导航到
    Kismet 目录来配置安装。对于你的特定操作系统发行版，此过程将配置安装。然后，在该过程完成后，你可以创建安装。你将使用 *suidinstall* 选项，通过运行生成的文件来完成安装。然后，你将安装
    Kismet。安装后，你需要通过将自己添加到 Kismet 组来以非 root 用户身份捕获数据包。确保在“YourUsername”处替换为你实际的用户名。


    **步骤 2：将你的无线网卡设置为监控模式：**


    通过 USB 设置，你将无线网卡连接到虚拟机或你的计算机。可以使用命令 *ifconfig* 或 *ip a* 来找到你的网卡。你可以使用“wlan0”或“wlan1”来命名你的网卡。命名后，你就可以将网卡置于监控模式。在网卡名称的末尾，你会看到一个“mon”，因为此过程会重命名它。要启动
    Kismet，你将使用这个名称。


    **步骤 3：启动 Kismet：**


    开始使用 Kismet 很简单。对于你已置于无线监控模式的网卡，确保将该术语放在 –c 之后，因为 Kismet 使用 –c 来指定其捕获的源。然后，Kismet
    启动后将开始捕获数据包。然后，你可以返回菜单进行一些自定义设置。


    当你启动 Kismet 时，你将能够检测到附近的几个 Wi-Fi 设备。根据你使用的是 5 GHz、2.4 GHz 还是两者都用，你可以检测到的设备数量会有所不同。


    ## 第16章：绕过隐藏的 SSH


