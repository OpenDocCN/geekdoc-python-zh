    ## 流程控制


    什么是流程图？


    它们是用于任何类型编程语言的工具，用于表示或创建程序或算法的结构。


    流程图或也称为流程图，是一种以图形方式表示算法（程序中执行的步骤）的方法，便于人们理解。


    算法或程序结构的创建可以被视为算法开发的第一部分，也是为最重要的步骤——编码做准备。


    在编写程序时，建议制作流程图，以便任何人都能简单地理解算法的功能。目前，有各种软件和在线工具可以方便地制作这些图表。


