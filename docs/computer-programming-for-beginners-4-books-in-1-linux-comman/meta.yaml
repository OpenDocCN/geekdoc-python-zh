    # Basic Elements of Computer Networks


    Computer Networks comprise of systems through which a connection is created between
    numerous nodes. The links help them to share resources and information. Computer
    network elements are the fundamental objects used in computer networks. Basically,
    there are four significant elements of computer networking. These include computers,
    transmission medium, protocols, and network software. For a computer network to
    successfully function, all the elements have to work in coordination.


    # • Computers


    Computers are digital devices that can accept input in the form of data, process
    it through the use of data structures, and predefined algorithms, performing tasks
    in the form of output. The process can be defined as transforming raw data into
    useful information. The output provided includes performing several physical tasks
    as well as storing data, transforming it as well as retrieving it when in need.
    The network is created by computers to allow for leveraging of distributed models
    of programming and interchanging data to allow for equivalent processing.


    # • Transmission Medium


    The transmission medium is the path through which users send data from one place
    to a new place. When representing data, computers and'
