    \nlambda 函数能够执行一个表达式并返回其结果，它可以在其结构中包含可选的参数，但是，这个函数有其自身的限制。\n\n### Lambda 函数的语法\n\
    \nPython 中 lambda 函数的语法非常简单，因为它仅基于编写保留字 lambda，后跟操作所带的参数，最后用相应的冒号 \":\" 分隔。\n\n\
