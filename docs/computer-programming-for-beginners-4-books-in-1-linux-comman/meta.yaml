  md: '# # Chapter 3: Introduction to Linux Kernel and Operating System


    By what means does a computer manage the most complex tasks with such accuracy
    and efficiency? Well, the short and simple answer is that a computer does everything
    with the help of the operating system. The operating system makes life easier
    and performs different tasks through the efficient use of hardware resources.
    At a high level, there are two parts we can divide the OS. The first part will
    be the utility programs, while the other is the kernel. The kernel services some
    of the system resources requests like network connectivity, memory, storage, CPU,
    and so on, as asked by the various user space processes. And in Linux/GNU, there
    will be an exploration of the loadable kernel modules by this column. Since the
    whole operating system solely run in supervisor mode, this makes Linux kernel
    monolithic. With each subsystem responsible for performing specific tasks, it
    consists of several subsystems, even though the kernel is a single process. Broadly,
    these following tasks are performed by any kernel.


    # ## Dynamically loadable kernel modules


    To ensure that our system is up-to-date, most times, we install security patches
    and kernel updates. A reboot is often necessary in the case of MS Windows. However,
    this is far from being suitable. For example, when it is in a production server,
    the machine cannot be rebooted. Then, without a system reboot, wouldn’t it be
    ideal for removing or adding functionality from or to the kernel on-the-fly? For
    the kernel modules, the Linux kernels work on the dynamic unloading and loading.
    And at runtime, any code piece is a kernel module that you can add to the kernel.
    Without any interruption, when the system is up and running, you can unload and
    load the modules. You can use the `insmod` command to dynamically link a kernel
    module to the running kernel and also unlink it by using the `rmmod` command,
    as an object code.


    # ## Networking


    One of the vital parts of the operating system is the networking because it works
    with data transfer between hosts and also allows communication. As routing functionality
    gets enabled by it, it is also through it that network packets get transmitted,
    identified, and collected.'
