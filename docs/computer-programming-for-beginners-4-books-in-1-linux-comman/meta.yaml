    # Birthday Attack


    The creation of the birthday attacks is developed against hash algorithms which
    people use to confirm the integrity of a digital signature, software, or a message.
    A fixed length MD, message digest, which is independent of the input message length,
    is produced by a processed hash function message. The message has the characteristics
    of this MD uniquely. The probability of finding two random messages is the reference
    for the birthday attack, which, when processed by a hash function, generates the
    same MD. The attacker can safely replace the message of the user with his if the
    attacker calculates a similar MD for the message as the user has. And even if
    they compare MDs, the receiver will not be able to detect the replacement.


    # Eavesdropping Attack


    Attackers intercept the network traffic for the eavesdropping attack to happen.
