    are linked together. The linking may be done through physical lines. The ultimate
    goal is to enable efficient exchanging of information in terms of speed and convenience.


    When one computer is connected to another, the output is increased. And when several
    networks are linked together, they form one powerful network. This helps employees
    to have access to a larger pool of information. With such resources at their disposal,
    you can rest assured that they can accomplish'
  - '[PAGE 315]


    a lot more.


    # Components of Network


    There are four essential components of a computer network. These are networking
    devices, end devices, protocols, and the media.


    +   - **End Devices**


    Networking takes between devices. End devices play the role of data transmission.
    They either send or receive various types of data. These are laptops, PCs, phones,
    or tablets. A network needs at least two devices to function. There are server
    devices that are tasked with providing data and client devices that depend on
    the data provided.


    +   - **Media**


    Devices have to be connected through a special medium. This medium is known as
    the media. There are two forms of media. That’s the wired and wireless media.

    Wireless media uses signals while wired media uses cables.


    +   - **Protocols**


    Protocols are important rules in networking. They aid communication between the
    devices and also set the standards of communication. Normally, protocols can initiate
    as well as terminate any form of communication between devices. Also, they encrypt
    the data before it is sent. The data packaged in a form that can be transmitted
    within the relevant channels.


    +   - **Networking Devices**


    In between devices, there is a networking device. A networking device''s main
    role is to control the flow data between the end devices. It also forwards the
    data. This device is categorized into three categories. That''s the connecting
    device, securing device, and forwarding device.'
- md: '## Classification Based on Access Type


    The classification based on access types includes Intranet, Extranet, and the
    Internet.


    - **Intranet**


    An intranet is a private network. External users can’t access this network whatsoever.
    Not unless they use some unscrupulous methods to do so.


    - **Extranet**


    An extranet is also a private network. The resources within this network are not
    available to the public. External users are only granted access through a strict
    authorization process. Full access is not granted to external users. Whatever
    access they may be given is partial.


    - **Internet**


    The internet is an open network that anyone with a computer can access. It has
    a vast resource that the public can utilize.


    ## Classification Based on Relationships between Relevant Devices


    This classification is based on the relationship between the end devices. The
    network is classified into two. That’s the peer to peer network and client-server
    network that will be covered in great detail later.


    ## Networking Plan


    When creating a network of computers, you ought to have a network plan. This is
    because numerous computers are used, hence the need to manage them. Also, you
    want to ensure that information is kept within particular confines.


    The connections should be planned to control the flow of information. Employees
    should have access to the information that’s relevant to their duties. A computer
    network doesn’t mean that everybody in the organization is allowed to access all
    the information available.


    The plan should give clear guidelines on where various types of information should
    be stored. A plan also defines what information will be accessed by the employees
    at a given time.


    ## Networking Types and Structures


    Networking types are structured differently. They can either be wired or wireless.
    Also, they could be a combination of both. About a decade ago, most networks were
    wired. The computer network landscape has since changed. Modern networks mix both
    wired and wireless connections. Wired networks use Ethernet technology.


    ## Advantages of Wired Networks


    - Wired networks are not only reliable but also fast and secure.

    - Ethernet ports can also be found in most computing devices, including laptops
    and desktops.


    ## Disadvantages of Wired Networks


    - Wired networks must use cables. And it is costly to run cables.

    - Using a wired network within buildings is challenging. This is due to the sophisticated
    infrastructure. Multiple cables would be required to run between the buildings.

    - A wired network doesn’t support devices such as smartphones and tablets.


    ## Wireless Networks


    Wireless networks don’t rely on cables. These networks use the Wi-Fi protocol
    to transmit data.


    ## Advantages of Wireless Networks


    - They are easy to set up. Moreover, you don’t require multiple cables running
    from one point to the other.

    - A wireless network offers great flexibility and convenience. They can be used
    in public places, offices, and homes. Mobile devices use a wireless network. Therefore,
    you can use all your internet supported devices at your convenience.


    ## Disadvantages of Wireless Networks


    - A wireless network is certainly not as secure as a wired network.

    - A wireless network is also commonly limited by range. Once you get out of the
    stipulated range, you can’t use it.

    - Wireless networks are much slower. The connectivity isn’t as fast as it is with
    a wired network.


    ## Networking Layout and Topologies


    To expand a network, the nodes have to be connected. You might not need this in
    your small office, but as you expand, you''ll certainly need it. Though there
    are many ways to connect these nodes, some of the most common methods include
    Bluetooth, Wi-Fi, and so on.


    These methods of connection are built on various topologies. The common ones are:


    - Ring

    - Bus

    - Mesh

    - Hybrid

    - Star


    Each topology has its strengths and weak points. Wi-Fi and modern Ethernet use
    a hybrid topology. The hybrid topology is a combination of bus and star. Bluetooth
    and Wi-Fi can also run on a mesh topology.


    ## Networking Topology – Logical Vs. Physical


    The physical connection of network nodes doesn’t necessarily dictate how they
    communicate. Typically, small offices and home networks use the physical bus topology.


    ### Peer to Peer Networking


    In peer to peer networking, all the involved nodes are considered to be equal.
    All nodes can communicate freely with each other. There are no superior nodes
    with special responsibilities in this kind of networking.


    ### Advantages of Peer to Peer Networking


    - The peer to peer network doesn’t depend on a single node. It is, therefore,
    unlikely that the failure of a single node will undermine the entire network.

    - Additionally, peer to peer network isn’t sophisticated. This makes it easy to
    set up.

    - A peer to peer network is quite reliable and resilient. It doesn’t breakdown
    without a good reason.

    - This network comes with an excellent distribution of data traffic. And that
    makes it tremendously effective.

    - The hardware used in peer to peer networking is inexpensive. So, the initial
    cost of running this network is affordable.

    - Most networks require a strong central administrator. However, the peer to peer
    network doesn’t rely on a central administrator.


    ### Disadvantages


    - It is challenging to secure a peer to peer network. This makes it susceptible
    to threats.

    - Every network requires a backup. Nonetheless, peer to peer the network is difficult
    to back up.

    - Locating information on a peer to peer network isn’t easy.


    ## Client-Server


    A client-server network is based on a superior server. The server is tasked with
    a special role. For example, it could be a control or a web server. The client
    has to connect to the server to use certain services. An example of this type
    of networking is the internet web.


    ### Advantages


    - The client-server network is administered with the utmost ease.

    - It has a specially dedicated node that makes locating of information extremely
    easy.

    - A client-server has exceptional safety levels.

    - This network is easy to manage.


    ### Disadvantages


    - Servers can fail. When they fail, the network is jeopardized. These are single
    points of failure that greatly undermine the entire network.

    - The client-server hardware doesn''t come cheap. It requires a significant investment,
    which can be out of reach for both homes and small office owners.

    - This network can get concentrated at some point. This may cause some downtime
    within a network.

    - The best modern examples of a client-server network include Twitter, Facebook,
    and Google Search.


    ## Classification of Computer Networks


    Computer networks are classified into various categories. The classifications
    are based on geographical locations, the relationship between the devices used,
    and access types.


    ## Classification Based on Geographical Locations


    **LAN-Local Area Network:** It links devices within one office or several offices.
    Ethernet and Token Ring fall within this category.


    **MAN-Metropolitan Area Network:** It is a slightly larger network with the capacity
    to connect devices across buildings.


    **WAN-Wide Area Network:** This is a massive network that links devices to multiple
    devices across countries. A good example of the WAN network includes the Asynchronous
    Transfer Mode and the Integrated Services Digital Network.


    **PAN-Personal Area Network:** This network is used within a personal area to
    link devices. It is the kind of network that you use to link your laptop to a
    printer.


    ## Networking Layers and Protocols


    A protocol is a predetermined set of guidelines that dictates how computers should
    communicate with each other. HTTP is one of the popular protocols, which you may
    have across in your interactions with computers. This protocol supports communication
    between a particular web browser and its server.


    Good examples of data link protocols include Wi-Fi and Ethernet. These protocols
    shape the data as it appears on the media. Both of them use a physical address
    that’s referred to as the MAC address. It has a capacity of 48 bits. Other popular
    MAC addresses include the EUI 64 that has 64 bits.


    Networking can be divided into numerous layers or levels. There is the OSI network
    that utilizes a seven-layer model. Also, there is a common TCP/IP network, which
    uses a four-layer model. Here are the four levels of the TCP/IP network, and their
    respective examples:


    - Data link-level- Ethernet or Wi-Fi.

    - Transport level- UDP or TCP.

    - Networking-IP

    - Application level-HTTP


    As the sending process is progress, these layers add a distinct header to the
    data. The headers are then systematically eliminated as the data moves towards
    its destination.


    ## Transmission Control Protocol


    TCP provides a safe mode of transmitting data. The transmission takes place through
    IP packets. The packets have accurate error detection capability. All the data
    that’s transmitted in packets reach as their destination as sent. Data can’t be
    accidentally altered in any way. You can rest assured that the data'
  mdcn: '## 基于访问类型的分类


    基于访问类型的分类包括内网、外网和互联网。


    - **内网**


    内网是一个私有网络。外部用户完全无法访问此网络，除非他们使用一些不正当手段。


    - **外网**


    外网也是一个私有网络。该网络内的资源不对公众开放。外部用户仅通过严格的授权流程获得访问权限。外部用户不会被授予完全访问权限，他们获得的任何访问权限都是部分的。


    - **互联网**


    互联网是一个开放网络，任何拥有计算机的人都可以访问。它拥有公众可以利用的庞大资源。


    ## 基于相关设备间关系的分类


    这种分类基于终端设备之间的关系。网络被分为两类，即对等网络和客户端-服务器网络，后者将在后面详细介绍。


    ## 网络规划


    在创建计算机网络时，你应该有一个网络规划。这是因为使用了大量的计算机，因此需要管理它们。同时，你也希望确保信息被限制在特定范围内。


    连接应该经过规划以控制信息流。员工应该只能访问与其职责相关的信息。计算机网络并不意味着组织中的每个人都可以访问所有可用信息。


    规划应明确指导各类信息应存储在何处。规划还应定义员工在特定时间可以访问哪些信息。


    ## 网络类型与结构


    网络类型结构各不相同。它们可以是**有线**的，也可以是**无线**的，或者是两者的组合。大约十年前，大多数网络都是有线的。计算机网络格局自此发生了变化。现代网络混合了有线和无线连接。有线网络使用以太网技术。


    ## 有线网络的优势


    - 有线网络不仅可靠，而且速度快、安全性高。

    - 大多数计算设备（包括笔记本电脑和台式机）都配有以太网端口。


    ## 有线网络的劣势


    - 有线网络必须使用电缆，而铺设电缆成本高昂。

    - 在建筑物内使用有线网络具有挑战性，这是由于其复杂的基础设施。需要在建筑物之间铺设多条电缆。

    - 有线网络不支持智能手机和平板电脑等设备。


    ## 无线网络


    无线网络不依赖电缆。这些网络使用 Wi-Fi 协议传输数据。


    ## 无线网络的优势


    - 它们易于设置，而且你不需要从一个点到另一个点铺设多条电缆。

    - 无线网络提供了极大的灵活性和便利性。它们可以在公共场所、办公室和家庭中使用。移动设备使用无线网络，因此你可以方便地使用所有支持互联网的设备。


    ## 无线网络的劣势


    - 无线网络的安全性肯定不如**有线网络**。

    - 无线网络通常还受到范围的限制。一旦超出规定范围，你就无法使用它。

    - 无线网络速度慢得多。其连接速度不如**有线网络**快。


    ## 网络布局与拓扑结构


    要扩展网络，必须连接节点。在你的小办公室里可能不需要这个，但随着扩展，你肯定需要它。虽然连接这些节点的方法有很多，但一些最常见的方法包括蓝牙、Wi-Fi 等。


    这些连接方法建立在不同的拓扑结构之上。常见的有：


    - 环形

    - 总线型

    - 网状

    - 混合型

    - 星型


    每种拓扑结构都有其优点和缺点。Wi-Fi 和现代以太网使用混合拓扑结构。混合拓扑是总线型和星型的组合。蓝牙和 Wi-Fi 也可以在网状拓扑上运行。


    ## 网络拓扑 – 逻辑与物理


    网络节点的物理连接并不一定决定它们如何通信。通常，小型办公室和家庭网络使用物理总线拓扑。


    ### 对等网络


    在对等网络中，所有涉及的节点都被视为平等的。所有节点都可以自由相互通信。在这种网络中，没有具有特殊职责的高级节点。


    ### 对等网络的优势


    - 对等网络不依赖于单个节点。因此，单个节点的故障不太可能破坏整个网络。

    - 此外，对等网络并不复杂，这使其易于设置。

    - 对等网络相当可靠且具有弹性。它不会无缘无故地崩溃。

    - 这种网络具有出色的数据流量分布，这使其非常高效。

    - 对等网络中使用的硬件价格低廉，因此运行此网络的初始成本是可负担的。

    - 大多数网络需要强大的中央管理员。然而，对等网络不依赖中央管理员。


    ### 劣势


    - 保护对等网络的安全具有挑战性，这使其容易受到威胁。

    - 每个网络都需要备份。尽管如此，对等网络很难备份。

    - 在对等网络上定位信息并不容易。


    ## 客户端-服务器


    客户端-服务器网络基于一个高级服务器。服务器承担着特殊的角色，例如，它可以是控制服务器或 Web 服务器。客户端必须连接到服务器才能使用某些服务。这种网络类型的一个例子是互联网
    Web。


    ### 优势


    - 客户端-服务器网络管理极其容易。

    - 它有一个专门的节点，使信息定位变得极其容易。

    - 客户端-服务器具有出色的安全级别。

    - 这种网络易于管理。


    ### 劣势


    - 服务器可能会发生故障。当它们发生故障时，网络就会受到威胁。这些是单点故障，会严重破坏整个网络。

    - 客户端-服务器硬件并不便宜。它需要大量的投资，这对于家庭和小型办公室所有者来说可能难以承受。

    - 这种网络在某些时候可能会变得集中，这可能导致网络内的一些停机时间。

    - 客户端-服务器网络的现代最佳示例包括 Twitter、Facebook 和 Google Search。


    ## 计算机网络的分类


    计算机网络被分为不同的类别。分类基于地理位置、所用设备之间的关系以及访问类型。


    ## 基于地理位置的分类


    **LAN-局域网：** 它连接一个办公室或多个办公室内的设备。以太网和令牌环属于此类别。


    **MAN-城域网：** 这是一个稍大的网络，能够连接跨建筑物的设备。


    **WAN-广域网：** 这是一个庞大的网络，将设备连接到多个国家的多个设备。WAN 网络的一个很好的例子包括异步传输模式和综合业务数字网。


    **PAN-个人区域网：** 这种网络用于个人区域内连接设备。它就是你用来将笔记本电脑连接到打印机的那种网络。


    ## 网络层与协议


    协议是一组预定义的准则，规定了计算机之间应如何通信。HTTP 是流行的协议之一，你可能在与计算机交互时遇到过。该协议支持特定 Web 浏览器与其服务器之间的通信。


    数据链路协议的好例子包括 Wi-Fi 和以太网。这些协议塑造了数据在介质上的呈现形式。两者都使用称为 MAC 地址的物理地址。它具有 48 位的容量。其他流行的
    MAC 地址包括具有 64 位的 EUI 64。


    网络可以分为多个层或级别。有使用七层模型的 OSI 网络。还有常见的 TCP/IP 网络，它使用四层模型。以下是 TCP/IP 网络的四个级别及其各自的示例：


    - 数据链路层-以太网或 Wi-Fi。

    - 传输层-UDP 或 TCP。

    - 网络层-IP

    - 应用层-HTTP


    随着发送过程的进行，这些层会向数据添加一个独特的头部。然后，当数据向其目的地移动时，这些头部会被系统地移除。


    ## 传输控制协议


    TCP 提供了一种安全的数据传输模式。传输通过 IP 数据包进行。这些数据包具有准确的错误检测能力。所有以数据包形式传输的数据都能按原样到达目的地。数据不会以任何方式被意外更改。你可以放心，数据'
