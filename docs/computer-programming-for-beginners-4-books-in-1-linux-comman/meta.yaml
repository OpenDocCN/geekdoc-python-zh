    ## Python''s Keywords:


    It is well known that in every programming language there is a series of words
    and commands which are found in a reserved way and can not be used for anything
    other than to fulfill its function. In Python there is also has a set of words,
    these are called: reserved words or keywords, and are nothing more than a set
    of words in which each element contains a special meaning and is an indispensable
    part of the syntax of its language for the correct development of the code.


    These words must be written exactly as shown in the following table, which will
    contain some of the reserved words of the language. If this is not done, the program
    will not be able to recognize them and can generate a type of exception called:
    NameError, this is because Python does not distinguish between upper and lower
    case or as it is formally known: case sensitive.


    If we write false, the Python interpreter will not be able to understand that
    we are referring to the False operator and will throw us an error because this
    is not defined.


    The following table will show the set of keywords for the Python 3.x version (version
    with which we are going to work in the next programs), which have defined approximately
    33 reserved words; these same ones form the nucleus of the syntax of this programming
    language.


    | "and" | "def" | "finally" | "in" | "or" | "while" |

    |---|---|---|---|---|---|

    | "as" | "del" | "for" | "is" | "pass" | "with" |

    | "assert" | "elif" | "from" | "lambda" | "raise" | "yield" |

    | "break" | "else" | "global" | "None" | "return" | |

    | "class" | "except" | "if" | "nonlocal" | "True" | |

    | "continue" | "False" | "import" | "not" | "try" | |


    Of this group, there are a certain number of words which are considered "essential",
    these could be the ones we are going to use the most and we will explain them
    in-depth in the next chapters.


    True & False: These expressions are those whose values are thrown to us by the
    program as a result of evaluating logical expressions.


    and & or: These expressions are those that we use as connectors for the logical
    expressions (True & False), in order to be able to create much more complex expressions.


    if, elif & else: These expressions are those which are used to build blocks of
    conditions, in order to make certain decisions within the same programs.


    For & while: These expressions are used to build loops or formally: repetitive
    blocks.


    Def & return: These expressions are those that represent instructions, which will
    be used to define our own functions. In other words: these expressions represent
    a series of instructions that will be in charge of carrying out a certain task
    as indicated.


    Import & from: These expressions are those used to add additional functionalities.


    If you are using a code that has been written in Python 2.x version or you simply
    want to start in this version, we can see that unlike Python 3.x version, this
    version has only 31 reserved words or keywords.


    | "and" | "def" | "finally" | "in" | "print" | "yield" |

    |---|---|---|---|---|---|

    | "as" | "del" | "for" | "is" | "raise" | |

    | "assert" | "elif" | "from" | "lambda" | "return" | |

    | "break" | "else" | "global" | "not" | "try" | |

    | "class" | "except" | "if" | "or" | "while" | |

    | "continue" | "exec" | "import" | "pass" | "with" | |


    What are the differences in keywords between Python 2.x and Python 3.x?


    Below, we will mention those important differences that cannot be noticed at first
    sight:


    - Python 3.x incorporates the words "True", "False" and "None".

    - In Python 2.x the words "exec" and "print" that were part of the keywords, become
    integrated functions in Python 3.x with the syntax exec() and print().


    ## How can I find these words?


    In Python, there is a module whose name is known as keyword module of the standard
    library, this is responsible for exporting a list called: kwlist. which contains
    all the keywords that are reserved in our programming language, Python.


    Another easier way to consult these keywords is through the help() command, this
    is just a function that comes integrated and facilitates us to consult information,
    documentation and get a clearer help on the components of our program.


    If in any given situation you need to quickly consult the operation or meaning
    of a particular keyword (only of the Python programming language), you can do
    it through the command help(), once introduced this, you must write the keyword
    to consult and immediately will show us on screen all the information of the word
    requested.


    ## Python syntax and its importance


    Now we will talk about the most important thing and it will be what will allow
    us to advance in our code and in programming in general: The syntax; we know very
    well that Python is an interpreted programming language, but what does this really
    mean?


    Our Python programming language works through tabulations, this is informally
    known as indentation or spaces. This means that, at the moment of executing a
    program, it is going to follow an order of interpretation, which works through
    the tab key on our keyboard which is just the key containing arrows located above
    Caps Lock, these tabs work in each loop or conditional sentence.


    When we have a correct indentation we can avoid the use of keys and brackets and
    we can even avoid some reserved words to start and end a program that marks a
    block of code. This allows the program to have better use and operation.


    Having a good indentation also helps us to make our code look uniform in order
    to facilitate reading and provide comfort to any third party.'
