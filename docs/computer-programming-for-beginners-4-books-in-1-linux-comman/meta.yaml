    \ switch() 条件处理多个条件非常常见。在 Python 的情况下，这被 elif() 替代，这不过是在 else 上添加一个额外的条件以获得多个情况。\n\
    \n当你有多个条件，并且有许多不同的执行方式时，这通常被使用。\n\n现在，我们将看一个例子，以便非常清楚地理解这是如何工作的，这样，我们将进入条件语句。\n\
    \n```python\noption=input(\"Please enter your option,for your message: \\n1)Español\
