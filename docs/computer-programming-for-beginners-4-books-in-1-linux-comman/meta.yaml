  mdcn: "## 条件语句\n\n借助逻辑运算符，以及广义上的逻辑，我们将以此为基础来使用指令，因为它们允许我们设定条件，从而编写更复杂的程序。比如什么呢？例如：\n\
    \n如果今天下雨，我就带上毛衣；如果不下雨，我就不带。\n\n条件语句的工作方式与此类似：当满足特定条件时，将执行某个操作；但如果预期情况未发生，则会执行其他操作。\n\
    \n在条件语句中，我们会遇到 `if`、`else` 和 `elif`；此外还有使用异常的情况，异常用于防止程序崩溃。\n\n-   **if 语句：**\
    \ 这是一个简单的条件语句。如果满足特定条件，将执行某个操作；否则，不会发生任何事情，程序将继续按照通常或预期的流程运行。这可以用于简单的程序，例如年龄限制访问。如何实现？嗯，如果客户年龄不足，程序将不允许其进入。\n\
    \n`if` 条件语句的流程图如下：\n\n![](img/d87a95dcfe5b52bf5303163b6c768bd5_170_0.png)\n\n\
    现在，Python 中 `if` 的语法如下：\n\n-   **If + 条件：** 在这个代码块内部，通过必要的缩进，将执行以下命令——当然，前提是条件得到满足。\n\
    \n在编写 `if` 代码块时，关于语法需要记住一些重要事项：\n\n-   第一行始终是 `if + 条件`，后跟一个冒号（ : ），因为这样可以明确表示一个代码块的开始。\n\
    -   后续行表示将要执行的指令，但当然，显然只有在条件为真时才会执行。\n-   最后，是指令代码块必须具有的缩进，因为如果缩进不正确，程序将无法理解你的具体意图，结果可能是它不会执行你请求的操作，或者直接关闭程序。\n\
    \n一个更清晰的语法示例如下，它将显示学生是否通过了考试：\n\n```python\nnote=input(\"Put your note here: \"\
    )\nif(int(note)<5):\n    print(\"You didn't pass, try again\")\n```\n\n正如我们在这里看到的，创建了一个\
    \ `note` 变量，它与 `input` 函数相关联，用于接收用户输入的成绩，该变量是字符串类型。\n\n随后，我们进入条件部分，具体是 `if`，要比较的条件是：如果用户输入的成绩低于五分，那么将在屏幕上打印用户未通过，需要再次尝试。如你所见，在\
    \ `if` 条件部分，使用了 `int()` 函数，这是必要的，因为 `note` 变量是字符串，而数字与字符串无法进行比较，因此需要将字符串变量的类型更改为整数，以便进行相应的比较。\n\
    \n但如果条件为假呢？可以执行另一个操作吗？嗯，可以，因为还有另一个语句，即 `else`，它用于当 `if` 的条件为假且需要执行另一个操作时，然后返回到常规流程。如果你想更好地理解这个语句，请阅读以下段落，这些段落将负责解释该语句。\n\
    \n-   **else + 条件：** `else` 条件用于当 `if` 条件为假时。这是什么意思？这无非是如果条件子句未满足，程序将自动关闭；为了防止这种情况发生，我们使用\
    \ `else` 指令，它将告诉程序执行另一个操作。\n\n`else` 条件语句的流程图如下：\n\n![](img/d87a95dcfe5b52bf5303163b6c768bd5_173_0.png)\n\
    \n我们可以观察到，`else` 条件语句的语法与 `if` 条件语句的语法非常相似，只是在这种情况下，不需要放置条件，但保持正确的缩进至关重要。\n\n\
    为了详细观察 `else` 条件语句的编程，我们将创建一个测试程序，这样我们就能清楚地看到条件语句之间的区别。\n\n这将是对之前程序的一个修改，目的是展示使用条件语句可以变得多么强大。\n\
    \n```python\nnote=input(\"Put your note here: \")\nif(int(note)<5):\n    print(\"\
    You didn't pass\")\nelse:\n    print(\"Congratulations, you pass\")\n```\n\n在这个例子中，我们可以看到创建了\
    \ `note` 变量，这是一个用户将选择的输入，嗯，在这种情况下，他将输入他的成绩，以便程序随后会说明他的成绩是否足以通过。因此，为了向用户明确他必须输入成绩，屏幕上将打印以下字符串\
    \ \"Put your note here\"，这样用户就知道他需要在程序中输入他的成绩。\n\n之后，放置了条件代码块，其中的条件意味着：如果用户输入的成绩转换为整数后小于五分，屏幕上将打印\
    \ \"You didn't pass\"，然后程序将结束，因为不会进入 `else` 代码块，因为条件为真。但如果条件不为真，则会进入 `else`，它将在屏幕上打印下一个字符串\
    \ \"Congratulations, you passed\"，以向用户展示他们的成绩是否通过了考试。\n\n正如你可能观察到的，`if` 和 `else`\
    \ 的使用非常有用，我们可以说至关重要，因为，多亏了它，你可以使程序能够产生不同的结果，而不是只有一个简单的流程，因为你可以猜到，那种没有逻辑分支的程序并不广泛使用。\n\
    \n我们可以看到的另一个例子是除法，通过它，我们可以看到条件语句的另一个非常重要的用途，因为分母不能等于零，因为除以零是未定义的，会是一个数学错误。\n\n\
    ```python\nnum=input(\"Select the number of the numerator: \")\nden=input(\"Select\
