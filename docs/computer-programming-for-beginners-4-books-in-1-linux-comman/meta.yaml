    此技术适用于Windows。GitHub上有一个小型应用程序，可以作为后台进程运行。它持续监控你按键的速率。当检测到异常的打字速度时，它将阻止所有HID（人机接口设备）。然而，攻击的前几个字符可能仍然会通过，这是它唯一的缺点。


