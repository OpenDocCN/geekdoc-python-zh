    ## 第 11 章：Shell 脚本


    对于基于 Linux 的操作系统，包含命令序列的文本文件就是 shell 脚本。shell 脚本的命令序列需要一次一个地通过键盘输入到单个脚本中。作为你用来与系统通信的命令集的解释器，shell
    是 CLI（命令行界面）的操作系统。为了节省时间，用户必须重复使用 shell 脚本的命令序列。shell 需要遵循子命令、注释和参数，就像其他程序一样。用户可以通过在
    shell 的命令行中输入文件名来启动命令序列。shell 脚本在 DOS 操作系统中被称为批处理文件，在 IBM 大型机 VM 操作系统中也被称为 EXEC。


    由于 shell 程序位于 Linux 操作系统内，你可以输入命令供系统执行。在 Linux 计算机上，当打开一个终端窗口时，shell 程序将启动，提供通过界面输入命令的机会。人们将这个界面称为命令行界面。在屏幕上，你可以看到输出的显示，当输入命令时，shell
    会执行它。此外，除了能够交互式地执行和接受命令外，shell 还可以执行存储在文件中的一些命令。这种执行方式被称为 shell 脚本。


    ## Shell 脚本的工作原理


    shell 脚本编写涉及一些基本步骤，包括赋予 shell 执行权限、使脚本可被 shell 访问以及编写脚本。由于 shell 脚本包含 ASCII，你可以使用图形用户界面（GUI）、文字处理器或文本编辑器来编写它。shell
    可以解释脚本内容中的一系列命令语言。shell 脚本支持一些功能，例如快捷方式、数组、*if/then/else* 语句、变量和循环。完成后，你可以使用 .sh
    或 .txt 扩展名将文件保存在 shell 可访问的位置。


    ## Shell 的背景


    在 1970 年代，Ken Thomson 开发了 V6 Shell，这是 Unix 的第一个 shell 程序。尽管它具有交互功能，但其脚本能力相当欠缺。1977
    年，Bourne Shell 问世，并作为 root 账户的默认 shell 至今仍在使用。多年来，它通过其脚本能力一直非常有用。到了 80 年代，Korn
    Shell 和 C-Shell 成为广受欢迎的 shell 变体，引起了公众的关注。这些 shell 中的每一个都带来了特定的语法，与原始 shell 有着显著的差异。因此，Bash
    是当今非常突出的 shell。作为独特的 Bourne Shell 的大幅增强版本，它代表 Bourne-Again-Shell。


    ## Shell 脚本应用示例


    当你使用 shell 脚本时，通过一次输入一行，你可以节省大量执行重复任务的时间。以下是一些你可以使用 shell 脚本的应用示例：


    - 监控系统

    - 执行常规备份

    - 将现有程序链接在一起

    - 操作文件

    - 完成批处理

    - 创建程序或运行编程环境

    - 自动化代码编译过程


    ## Shell 脚本执行


    如果你想执行一个 shell 脚本，你所要做的就是将脚本路径作为 shell 的参数传递。你需要注意的是，shell 要求使用 LF 字符（换行符）来终止行。如果你在
    Linux 系统上尝试立即执行 shell 脚本或在 Windows 上编写它，很容易遇到错误。Windows 使用 CR-LF（回车换行）组合作为行终止符，你需要将其转换为仅
    LF。关于如何实现这一点，你可以查看你的 Windows 编辑器。


    另一种方法是，shell 脚本可以作为命令直接执行。你可以在 shell 脚本的第一行插入以下 *hashbang* 声明：


    ```

    #!/bin/bash

    ```


    然后，你可以执行一些命令使你的脚本文件可执行。现在，无需显式引用 shell，你就可以直接执行脚本文件。


    ## Shell 脚本的优点


    使用 shell 脚本时，事情本应高效且简单。它消除了任何解释问题，因为它在脚本中使用的语法与在 shell 命令行中使用的语法相似。此外，与其他编程语言相比，它需要的学习曲线更少，并且编写
    shell 脚本代码也更快。然而，如果未被注意，shell 脚本中的错误可能会被证明极其昂贵。此外，shell 脚本可能与不同平台不兼容，并且与单个命令相比，shell
    脚本的执行速度也可能更慢。尽管如此，以下是 shell 脚本的更多优点。


    ### 可移植性：


    当 shell 本身存在时，你可以将 shell 脚本转移到另一个 Unix 和 Unix 相关的操作系统。此外，当你在不同架构（如 Sparc、MIPS、x86
    等）之间转移 shell 脚本时，shell 脚本比 C/C++ 程序更具可移植性。要转移和使用 C/C++ 程序，你必须尝试运行 C/C++、构建程序并复制源代码。然后，如果它使用特定于架构的代码，它可能无法按预期工作。


    ### 透明性：


    由于它是一个文本文件，你可以通过查看它轻松地了解 shell 脚本正在执行的操作。相比之下，对于像 C/C++ 这样的语言，只有当你有权访问源代码或源代码想要告诉你时，你才能知道程序的类型。例如，你可以找出
    shell 脚本是否正在删除任何文件，然后如果你需要这些文件，可以将它们复制到另一个地方。此外，因为你可能有权查看源代码，shell 脚本的诊断可能比常规程序简单得多。尽管如此，为了避免此类错误，创建和检查程序是合规
    shell 脚本的一些职责。你也可以在查看脚本代码时创建目录。'
