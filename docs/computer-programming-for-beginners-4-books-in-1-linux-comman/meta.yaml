    As to avoid this type of cyber-attack, ensure all the web information is first
    filtered and validated as well as preventing sending specific information to the
    resource. Besides, you can disable client-side scripting, making the user have
    control of the information shared through the web resources.


    # Password Attacks


    Passwords are the most common attacks experienced by victims as they are the sole
    mechanisms to authenticate the access of user data in specific areas. Acquiring
    someone''s password is most preferably when peeking on their devices or ATMs or
    other peeks. However, this is not cyber-attacks, as hackers usually gain access
    to the computer and collect these passwords to open private accounts through computer
    connections. Like most cyberattacks, password attacks come in different forms
    and include decryption of passwords, gaining access to the database, outright
    guessing, and through social engineering.

    One of the most common is brute-force password access, which is the guessing of
    different possible potential words or numbers used as passwords with the intention
    of one being correct. Another form is through a dictionary attack where a hacker
    tries to gain access to the connection and computer, and copy the encrypted file
    and compare it to the dictionary with a similar and possible password format.
    Some may go ahead and decrypt the password and gain access. One of the primary
    countermeasures to avoid password attacks is by introducing an account lockout
    policy that automatically locks after specific password attempts.


    # Drive-By Attack'
