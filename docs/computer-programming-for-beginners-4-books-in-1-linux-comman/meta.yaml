    # # Chapter 3: Easy Guide to Learn Basic Computer Network


    This article discusses the basic components of computer networking and the easy
    ways you can learn them. It also extensively discusses the advanced features of
    computer networking as well as how you can learn and apply them. Read on to find
    out!


    Computer Networking has been in existence for quite some time now, and with time,
    technology has become quicker and more affordable. These networks are a build-up
    of various devices and components, including computers, routers, and switches,
    which are linked together by wireless signals or cables. Learning how these networks
    and connections are assembled is very essential in creating a network that can
    be used for many purposes.


    In the quest of breaking this giant of a topic down, let us start by discussing
    the essential components of any computer network.


    # ## The Important Components of a Computer Network


    This is the first thing you need to look at when learning computer networks. Any
    computer network is made up of four very important components: Media, Networking
    Devices, Protocols, and End Devices. Let us discuss each of these essential components.


    +   - **The End Devices**


    This is a kind of device that either sends or receives a set of data or information
    within a particular network. End devices can be laptops, smartphones, PC, or any
    kind of machine with the capabilities of receiving or sending the set of data
    within the connected network. For your information, you will need a minimum of
    two devices to build a network.


    There are two types of end devices: client end devices and the server end devices.
    The server end device is responsible for providing service or data. On the other
    hand, the client end device is one which is responsible for'
  - '[PAGE 295]


    receiving the data offered from the former (the server end device).


    # • The Media


    This is a very important component of the computer network that provides connectivity
    and linkage for the end devices. End devices are not able to exchange services
    or data unless they are connected through any kind of media. As of today, there
    exist mainly two categories or types of media: the wired media and the wireless
    media.

    Radio signals are mainly applied in transferring data and information between
    the end devices when using Wireless Media. In wired media, however, cables are
    used instead.

    The above-mentioned types of media are further subdivided into various subtypes
    depending on factors like the data transfer speed, length, frequency band, among
    others. The subtypes are commonly referred to as media standards. The media standards
    that are popular and widely applied are the IEEE802.11 (also known as Wi-Fi standards)
    and the Ethernet.

    The two media standards play different essential roles. The Ethernet is responsible
    for defining standards for wired media while the IEEE802.11 plays a role in defining
    standards for wireless media.


    # • The Protocols


    Just like the previous two, this is a very important component of a computer network.
    Protocols are responsible for the communication between the involved end devices;
    they could be two or more. A protocol is defined as a group of rules that highlights
    and specifies the standards for a specific or all the stages of communication.

    Below are some known roles played by protocols.


    +   - Starting and ending the communication process.

    - Doing Encryption and compressions before transferring any data.

    - Packaging data in such a format that it is able to travel within a network.'
  - '[PAGE 296]


    +   - Establishing and providing logical addresses

    - Carrying out error correction processes

    - Performing media authentication


    Two popular models of networking describe the functionalities of most common protocols:
    TCP/IP model and the OSI reference model. These models categorize the entire process
    of communication into logical layers. They further explain how each protocol works
    in every layer, which enables the process of communication.


    # The Networking Device


    This is an essential component of computer networking that works in between the
    end devices. It is responsible for controlling the smooth flow of data. Depending
    on its functionality, networking devices are categorized into three different
    types; the forwarding device, the connecting device, and lastly, the securing
    device. Below, we discuss the functionality of each of the mentioned devices.


    +   - **Connecting Device:** It is responsible for connecting two or more types
    of protocols and media. In situations where two end devices are situated in different
    geographical networks or connected via a distinct type of media, they will require
    a connecting hatchet to carry out data exchange. This functionality can be provided
    through Multilayer and Router switch.

    - **Securing Device:** This device is responsible for securing data from any unauthorized
    access. The securing device does security checks basing on the predefined rules
    whenever it receives a data packet. It then forwards it or rejects it based on
    the decision made. Some of the commonly known devices that perform these functions
    are NAT and Firewall.

    - **Forwarding Device:** This is a device responsible for forwarding data. It
    has multiple sections and ports mainly used in connecting more two or more end
    devices in just one network. The two commonly known devices for these'
