    This model was designed to offer guidance to organizations, institutions, or companies
    to form an effective security policy. They are essential as their working together
    will ensure you get the best results in resolving your Cybersecurity issues about
    information security. These include:


    +   - **Confidentiality**


    This concept is beneficial in limiting the access o any information. It works
    ion restricting sensitive and vulnerable information from being accessed by third
    parties such as hackers and cyber attackers. In any organization, for example,
    there is a need to protect one''s information for easy access as that may cause
    problems if breached. For this reason, organizations and institutions avoid sharing
    information and educate their workers or colleagues on the effects and how well
    to protect the data they hold using secure and robust passwords.

