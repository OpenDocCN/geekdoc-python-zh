    The prevalence of cyber-attacks has become rampant in different regions globally
    with 2017, seeing the rise of up to two billion stolen data accompanied by a ransomware
    payment reaching two billion US dollars. Some cyberattacks target private devices,
    therefore, resulting in identity theft, especially for banks and credit cards.
    Others focus on user sensitive details to access central databases. On the other
    hand, the world has also experienced global cyber-attacks where viruses have been
    planted in computers. Individuals behind such attacks often highlight their demands
    and provide an antivirus after their conditions are met. As such, there have been
    multiple types of cyberattacks depending on the attacker and specific data under
    threat.


    # ## Types of Cyber Attacks'
- md: '## Denial of Service Attacks


    Denial of service attacks also includes distributed denial of service, is where
    the attacker targets the resource system of the computer and makes it unresponsive
    to service requests. However, the distributed denial of service attack originates
    from different host machines damaged by malicious software from an attacker. This
    type of cyber-attack does not necessarily provide direct benefits to the attacker.
    It only stops the whole process, which may become quite beneficial if the system
    is of a business competitor. Besides, denial of service attacks may come in handy
    when an attacker wants to launch an attack hence stops the resource system, including
    securities and firewalls, and commence an attack.


    Denial of service attacks may also come in different forms, TCP SYN flood attack,
    botnets, ping-of-death, smurf, and teardrop. The TCP SYN flood attack is where
    the attacker targets Transmission Control Protocols when the system is awaiting
    connections requests in a queue and becomes unresponsive during the initialization
    of the connection. Teardrop aims the sequential IP packets by making them overlap,
    therefore confusing the system and causing it to crash. Smurf attacks use IP spoofing
    while ping of death focuses on IP packets as well. Botnets, on the other hand,
    are quite different as they involve millions of computers affected by malware,
    and the hacker can choose which to attack as he or she has control over all the
    systems.


    ## Malware Attacks


    This is another type of cyber-attack consisting of unwanted software being installed
    into a computer system without the knowledge of the owner. In most cases, the
    software is established when an individual is online or has a connection where
    a hacker can gain access to their computers. More so, malware attacks come in
    different forms based on where it intends to damage. Most of them attach to original
    codes and propagate to simulate the application or the internet. Common types
    of malware attacks include macro viruses, file and system infectors, stealth and
    polymorphic viruses, logic bombs, Trojans, ransomware, worms, and droppers.


    Viruses are the most common malware attack depending on how they are meant to
    infect a given system. Macro viruses are specifically intended to affect computer
    applications, for example, Microsoft Word and Excel, when initialized. Polymorphic
    viruses focus on encryptions and decryption, especially when using a decryption
    program, while stealth viruses are responsible for compromising malware detection
    applications and conceal the scope of an infected file. File and system infectors
    comprise cyber-attacks that use a virus to infect specific areas within the computer,
    such as executable codes of files and records in the hard disk. Trojans are programs
    that hide within essential system applications but accompany a malicious function.
    In this case, Trojans allows a hacker to open and gain access to the necessary
    files without interacting with securities installed. Worms are also a type of
    malware attack that is commonly transferred by email attachments and activated
    once the mail is opened. Droppers are another form of malware but used to spread
    and hide viruses making scanning processes difficult to identify malware. Ransomware
    is the most dangerous type of malware as it blocks the user from accessing information;
    therefore, it may be used as a threat to specific demands to be met.


    ## Eavesdropping Attacks


    These are cyber-attacks which occur when an attacker intercepts network traffic
    and gain access to crucial data such as passwords and other confidential information
    transferred through the connection. Researchers have categorized eavesdropping
    into two, active, and passive eavesdropping. Passive eavesdropping entails an
    attacker monitoring and listening to the message being transferred and learning
    about it. Active eavesdropping involves a hacker physical disguising as a beneficial
    party to the user by requesting the message to the transmitter in a process refers
    to as probing or scanning. Passive eavesdropping is the most dangerous form as
    they often go unnoticed when compared to active eavesdropping. The best technique
    to use to avoid eavesdropping attacks is through data encryption.


    ## Cross-Site Scripting Attacks


    In some cases, an attacker may use cross-site scripting to gain access to sensitive
    data through third-party web resources. That is, the attacker first establishes
    the targeted information or system and introduces contents consisting of malicious
    JavaScript in the website database. This malicious program will remain in the
    database until when the victim opts to requests the webpage. The website will
    accompany the content with the page embedded within the HTML body to the browser
    of the victim. When the page completes loading, the malicious script will execute,
    allowing the attacker to gain access to the computer.


    In some instances, the hacker may choose to accompany other vulnerabilities that
    provide more loopholes to access different areas of your computer. The hacker
    will then be able to collect all the information needed, including controlling
    the machine. Cross-site scripting may take various forms, but JavaScript is the
    most supported and standard used on the web today. Cross-site scripting can, however,
    affected not only one victim, but also affect others who load similar websites.
    As to avoid this type of cyber-attack, ensure all the web information is first
    filtered and validated as well as preventing sending specific information to the
    resource. Besides, you can disable client-side scripting, making the user have
    control of the information shared through the web resources.


    ## Password Attacks


    Passwords are the most common attacks experienced by victims as they are the sole
    mechanisms to authenticate the access of user data in specific areas. Acquiring
    someone''s password is most preferably when peeking on their devices or ATMs or
    other peeks. However, this is not cyber-attacks, as hackers usually gain access
    to the computer and collect these passwords to open private accounts through computer
    connections. Like most cyberattacks, password attacks come in different forms
    and include decryption of passwords, gaining access to the database, outright
    guessing, and through social engineering.


    One of the most common is brute-force password access, which is the guessing of
    different possible potential words or numbers used as passwords with the intention
    of one being correct. Another form is through a dictionary attack where a hacker
    tries to gain access to the connection and computer, and copy the encrypted file
    and compare it to the dictionary with a similar and possible password format.
    Some may go ahead and decrypt the password and gain access. One of the primary
    countermeasures to avoid password attacks is by introducing an account lockout
    policy that automatically locks after specific password attempts.


    ## Drive-By Attack


    These are another common type of cyber-attack where an attacker can readily spread
    malware through insecure websites. That is, they quickly install malicious script
    in HTTP or PHP codes in one or more webpages targeting victims who visit these
    sites. Drive-by scripts may either install the malware into the victim’s computer
    directly or redirect them to the websites of the hacker. In this case, the malware
    can download immediately the web is loaded or visiting a given website or pop-up
    pages. This type of cyber-attack does not rely on the user clicking anything or
    accepting any downloads. This will then enable an attacker to infect your computer
    without your consent. When installed into your system, drive-by attacks may infect
    a program, the operating system as a whole, or browser with security issues. The
    primary solution for this type of cyber-attack is to keep your computer browser,
    operating system, and applications updated. You can as well stay away from websites
    that look suspicious or possess malicious codes essential for causing infections.
    However, understand that any website can be hacked and compromise the security
    of your computer. More so, remove any unnecessary or excess applications and programs
    as they make your device more vulnerable to threats. In other words, the more
    plugins you have, the more susceptible you are to drive-by cyber-attacks.


    ## Phishing Attacks


    Phishing and spear-phishing is the process of sending emails to victims with the
    aim of gaining access to their personal information or persuade them to do something.
    The emails are often fake but seem genuine and accompany malware, which quickly
    loads into your system when you open the attachment. Some useful links to certain
    websites that lure you into following the instructions given and ending up submitting
    private data to attackers. The trickery used generally combines social engineering
    and related techniques to ensure the victim is well influenced to accept to the
    terms highlighted. Attackers usually have a deeper understanding of their victims,
    therefore, creating content which suits their personality and relevance. Identifying
    these forms of cyberattacks is ordinarily tricky to victims, henceforth finding
    it hard to defend or resist from handing over crucial data, primarily when a hacker
    uses email spoofing. Others use website cloning, which commonly fools victims
    to believe that the emails are legitimate and from trusted sources. There are
    several ways to reduce and protect yourself from phishing attacks, and one of
    them is through the use of critical thinking.'
  mdcn: '## 拒绝服务攻击


    拒绝服务攻击也包括分布式拒绝服务攻击，是指攻击者针对计算机的资源系统，使其无法响应服务请求。然而，分布式拒绝服务攻击源自攻击者通过恶意软件破坏的不同主机。这种网络攻击不一定能给攻击者带来直接利益。它只是阻止了整个过程，如果该系统属于商业竞争对手，这可能变得相当有利。此外，当攻击者想要发起攻击时，拒绝服务攻击可能会派上用场，因此会停止资源系统，包括安全和防火墙，然后发起攻击。


    拒绝服务攻击也可能以不同形式出现，例如 TCP SYN 洪泛攻击、僵尸网络、死亡之 ping、smurf 和 teardrop。TCP SYN 洪泛攻击是指攻击者在系统等待队列中的连接请求时，针对传输控制协议进行攻击，并在连接初始化期间使其无响应。Teardrop
    通过使顺序 IP 数据包重叠来攻击它们，从而混淆系统并导致其崩溃。Smurf 攻击使用 IP 欺骗，而死亡之 ping 也专注于 IP 数据包。另一方面，僵尸网络则大不相同，它们涉及数百万台受恶意软件影响的计算机，黑客可以选择攻击哪些目标，因为他或她控制着所有系统。


    ## 恶意软件攻击


    这是另一种网络攻击类型，包括在所有者不知情的情况下将不需要的软件安装到计算机系统中。在大多数情况下，当个人在线或拥有连接时，黑客可以访问他们的计算机，从而建立该软件。此外，恶意软件攻击根据其意图造成损害的位置而以不同形式出现。大多数恶意软件附着在原始代码上并传播以模拟应用程序或互联网。常见的恶意软件攻击类型包括宏病毒、文件和系统感染器、隐形和多态病毒、逻辑炸弹、特洛伊木马、勒索软件、蠕虫和释放器。


    病毒是最常见的恶意软件攻击，具体取决于它们感染给定系统的方式。宏病毒专门用于在初始化时影响计算机应用程序，例如 Microsoft Word 和 Excel。多态病毒专注于加密和解密，尤其是在使用解密程序时，而隐形病毒则负责破坏恶意软件检测应用程序并隐藏受感染文件的范围。文件和系统感染器包括使用病毒感染计算机特定区域（如文件的可执行代码和硬盘中的记录）的网络攻击。特洛伊木马是隐藏在基本系统应用程序中但附带恶意功能的程序。在这种情况下，特洛伊木马允许黑客打开并访问必要的文件，而无需与已安装的安全系统交互。蠕虫也是一种恶意软件攻击，通常通过电子邮件附件传输，并在邮件打开时激活。释放器是另一种形式的恶意软件，但用于传播和隐藏病毒，使扫描过程难以识别恶意软件。勒索软件是最危险的恶意软件类型，因为它阻止用户访问信息；因此，它可能被用作满足特定要求的威胁。


    ## 窃听攻击


    这些是当攻击者拦截网络流量并获取关键数据（如密码和其他通过连接传输的机密信息）时发生的网络攻击。研究人员将窃听分为两类：主动窃听和被动窃听。被动窃听涉及攻击者监控和监听传输的消息并了解其内容。主动窃听涉及黑客通过向发送者请求消息来物理伪装成对用户有益的一方，该过程称为探测或扫描。被动窃听是最危险的形式，因为与主动窃听相比，它们通常不会被察觉。避免窃听攻击的最佳技术是通过数据加密。


    ## 跨站脚本攻击


    在某些情况下，攻击者可能使用跨站脚本通过第三方网络资源访问敏感数据。也就是说，攻击者首先确定目标信息或系统，并在网站数据库中引入包含恶意 JavaScript
    的内容。这个恶意程序将保留在数据库中，直到受害者选择请求网页。网站会将内容与嵌入在 HTML 正文中的页面一起发送到受害者的浏览器。当页面完成加载时，恶意脚本将执行，允许攻击者访问计算机。


    在某些情况下，黑客可能选择附带其他漏洞，这些漏洞提供了更多漏洞来访问计算机的不同区域。然后黑客将能够收集所有需要的信息，包括控制机器。跨站脚本可能采取多种形式，但
    JavaScript 是当今网络上最支持和标准使用的。然而，跨站脚本不仅会影响一个受害者，还会影响其他加载类似网站的人。为了避免这种类型的网络攻击，请确保所有网络信息首先经过过滤和验证，并防止向资源发送特定信息。此外，您可以禁用客户端脚本，使用户能够控制通过网络资源共享的信息。


    ## 密码攻击


    密码是受害者最常见的攻击，因为它们是验证用户在特定区域访问数据的唯一机制。获取某人的密码最可取的方法是窥视他们的设备或 ATM 或其他窥视点。然而，这不是网络攻击，因为黑客通常会访问计算机并收集这些密码，以通过计算机连接打开私人账户。与大多数网络攻击一样，密码攻击有多种形式，包括密码解密、访问数据库、直接猜测和社会工程学。


    其中最常见的是暴力破解密码访问，即猜测不同的可能单词或数字作为密码，意图是其中一个正确。另一种形式是通过字典攻击，黑客尝试访问连接和计算机，复制加密文件并将其与具有类似和可能密码格式的字典进行比较。有些人可能会继续解密密码并获得访问权限。避免密码攻击的主要对策之一是引入账户锁定策略，在特定密码尝试后自动锁定。


    ## 漏洞利用攻击


    这是另一种常见的网络攻击类型，攻击者可以通过不安全的网站轻松传播恶意软件。也就是说，他们快速在一个或多个网页的 HTTP 或 PHP 代码中安装恶意脚本，针对访问这些网站的受害者。漏洞利用脚本可能直接将恶意软件安装到受害者的计算机中，或者将他们重定向到黑客的网站。在这种情况下，恶意软件可以在网页加载或访问给定网站或弹出页面时立即下载。这种网络攻击不依赖于用户点击任何内容或接受任何下载。这将使攻击者能够在未经您同意的情况下感染您的计算机。当安装到您的系统中时，漏洞利用攻击可能会感染程序、整个操作系统或存在安全问题的浏览器。这种网络攻击的主要解决方案是保持您的计算机浏览器、操作系统和应用程序更新。您还可以远离看起来可疑或包含可能导致感染的必要恶意代码的网站。但是，请理解任何网站都可能被黑客入侵并损害您计算机的安全。此外，删除任何不必要的或多余的应用程序和程序，因为它们使您的设备更容易受到威胁。换句话说，您拥有的插件越多，您就越容易受到漏洞利用网络攻击的影响。


    ## 钓鱼攻击


    网络钓鱼和鱼叉式网络钓鱼是向受害者发送电子邮件以获取其个人信息或说服他们做某事的过程。这些电子邮件通常是伪造的，但看起来很真实，并附带恶意软件，当您打开附件时，恶意软件会快速加载到您的系统中。一些有用的链接指向某些网站，诱使您遵循给定的说明，最终将私人数据提交给攻击者。所使用的诡计通常结合社会工程学和相关技术，以确保受害者受到充分影响，接受所强调的条款。攻击者通常对受害者有更深入的了解，因此创建适合其个性和相关性的内容。识别这些形式的网络攻击对受害者来说通常很棘手，因此很难防御或抵制交出关键数据，尤其是当黑客使用电子邮件欺骗时。其他人使用网站克隆，这通常会欺骗受害者相信电子邮件是合法的，并且来自可信来源。有几种方法可以减少和保护自己免受网络钓鱼攻击，其中之一是通过使用批判性思维。'
