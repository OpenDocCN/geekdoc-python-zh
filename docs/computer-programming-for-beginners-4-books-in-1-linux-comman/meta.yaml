    ```


    然后，在同一目录中，通过输入下面的命令，你可以准备运行脚本。要继续，请按“回车”键：


    ```

    ./morning

    ```


    ## 操作过程


    前三行将告诉操作系统用于解释脚本的shell类型以及定位shell。由于目录`/bin`是它的位置，shell是bash，因此该行包含`/bin/bash`。为了使操作系统接收到它提供shell位置和名称以及其他脚本语言的信号，一个感叹号和一个井号总是位于此指令之前。


    第二行告诉shell执行命令`clear`。通过这个简单的命令，你可以从终端或控制台窗口中移除所有先前的输出和命令。shell从第三行获取屏幕上的短语*Good
    morning, world*。为了重复shell指令之后的任何内容，它使用`echo`命令。在更高级的脚本中，引号可能会产生很大的差异，即使它们可能不是必需的，但将其用作有用的编程练习。从稍微更技术性的角度来看，*Good
    morning, world*是命令`echo`接收的输入数据，一个*参数*。此外，人们自由使用的脚本是`echo`和`clear`，其他命令也是如此。例如，当你在屏幕上输入`clear`并按“回车”键时，你会得到提示输入下一个命令，并且你会移除所有先前的输出和命令。


