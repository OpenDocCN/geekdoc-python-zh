  md: '# # Chapter 4: Loops


    # ## What is a Loop?


    A loop (or cycle), is a control structure that is in charge of repeating a block
    of instructions, while a certain condition is fulfilled, within the loops we also
    have the so-called infinite loops in which their condition is never fulfilled.
    As in most programming languages, Python has a while and for.


    +   1. Loop For: Python''s for statement iterates on the items of any sequence
    (either a list, a string of characters or dictionary), in the order they appear
    in the sequence. Where the code is called "loop body" and its repetitions "iterations".


    Where iteration is defined by performing a number of actions repeated times. The
    for loop is in charge of going through these actions in order to look for elements
    that fulfill certain conditions and that at the same time can carry out the specified
    instructions. So all these elements must be iterable.


    The syntax of a for loop is as follows:

    for variable + an iterable element (list, string, range, etc.) :

    loop body.


    It is necessary to specify the variable in which the items of the element are
    going to be saved, then we write our sentence for with a variable that will store
    the items and finally we write in which will be our element to iterate.


    The loop is executed as long as it fulfills a condition, so once the iteration
    is finished, this will make the loop stop.


    Example:'
