    6. 输入程序的语法。

    7. 从TextEdit的文件菜单中单击"另存为"。

    8. 将文件保存为：Helloworld.py（或你偏好的名称）并选择前面提到的文件夹。

    9. 选择应用程序，然后选择实用工具和终端。

    10. 选择你保存程序的文件夹。

