  md: 'These are another common type of cyber-attack where an attacker can readily
    spread malware through insecure websites. That is, they quickly install malicious
    script in HTTP or PHP codes in one or more webpages targeting victims who visit
    these sites. Drive-by scripts may either install the malware into the victim’s
    computer directly or redirect them to the websites of the hacker. In this case,
    the malware can download immediately the web is loaded or visiting a given website
    or pop-up pages. This type of cyber-attack does not rely on the user clicking
    anything or accepting any downloads. This will then enable an attacker to infect
    your computer without your consent. When installed into your system, drive-by
    attacks may infect a program, the operating system as a whole, or browser with
    security issues. The primary solution for this type of cyber-attack is to keep
