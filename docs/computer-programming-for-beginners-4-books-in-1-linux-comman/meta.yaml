    In the following line, we declare the while loop, and as it can be observed, the\
    \ condition is that zero has to be lower strictly than a, therefore, in the moment\
    \ that a is equal to zero, the cycle will be exited and the other instruction\
    \ will be passed.\n\nThen, inside the block of instructions that are inside the\
