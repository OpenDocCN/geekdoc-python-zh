  md: '# # Chapter 11: Firewalls


    Based on a set of security rules, when you intend to block or permit data packets
    as well as monitor outgoing and incoming network traffic, a network security device
    that you can use is a firewall. For a firewall to block malicious traffic such
    as hackers and viruses, you will need to establish a barrier between your incoming
    traffic and internal network from external sources. You can improve the connection
    of computer security like the internet or LAN when you use tools like firewalls.
    An integral part of your network’s comprehensive security framework is the firewall.
    With the use of a code wall that inspects each individual data packet as it arrives,
    the firewall’s either side, both outbound and inbound from the system, to determine
    whether it can give it access to be blocked or pass, a firewall completely isolates
    your computer from the Internet. When it enables granular control over the kinds
    of system processes and functions that have access to the resources of networking,
    you can further enhance the security through the capability of firewalls. For
    it to deny or allow traffic, there are several host conditions and signatures
    that these firewalls use. You can operate, setup, and install firewalls relatively
    easily even when they sound complex. The belief of some people is that when they
    have a firewall installed, the traffic that passes through the network segment
    will be controlled. However, a firewall that is host-based can be suitable for
    you. On your computer, you can have them executed, including using it with Internet
    Connection Firewall, ICF. Fundamentally, there is a similarity to the function
    of the two firewalls; to stop intrusion and offer a strong technique of access
    control policy. To put it simply, as access control policy enforcement points,
    a firewall is a system that safeguards your computer.


    # ## Functions of Firewalls


    In essence, here are some of the basic functions of firewalls:


    +   - Act as an intermediary

    - Report and record events

    - Control and manage network traffic

    - Validate access'
