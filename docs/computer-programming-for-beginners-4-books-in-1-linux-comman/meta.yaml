    ## 如今谁在使用Python？


    目前，这门编程语言被广泛使用，此外，它的应用范围非常广泛，从数据的编译和处理到计算机学习，这就是为什么许多重要的公司目前都在使用这门通用的编程语言。我们将提到其中一些公司：


