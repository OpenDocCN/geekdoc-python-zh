  md: 'We must keep in mind that the operations to open the files are limited because
    it is not possible to read a file that was opened only for writing, you cannot
    write to a file which has been opened only for reading.


    The open () function consists of two parameters:


    +   - It is the path to the file we want to open.

    - It is the mode in which we can open it.


    Its syntax is as follows:


    ```

    1  function = open("file.txt", "w")

    2  function.write()

    3  function.close()

    ```


    Of which the parameters:


    File: This is an argument that provides the name of the file we want to access
    with the open() function, this is what will be the path of our file.


    The argument file is considered a fundamental argument, since it is the main one
    (allowing us to open the file), unlike the rest of the arguments which can be
    optional and have values that are already predetermined.


    Mode: The access modes are those that are in charge of defining the way in which
    the file is going to be opened (it could be for reading, writing, editing).


    There are a variety of access modes, these are:


    | r | This is the default open mode. Opens the file for reading only |

    | r+ | This mode opens the file for its reading and writing |'
