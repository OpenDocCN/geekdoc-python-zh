- md: '## Applications of Machine Learning


    Since the introduction of machine learning in the computing industry, different
    sectors have benefited significantly in their operations. More so, it has popularity
    between developers as well as other users, making it applicable in different areas.
    In this case, the applications of machine learning range from small scale technological
    businesses to commercial use. One of the common areas includes social media such
    as Facebook and Twitter used for sentimental analysis, spam filtering, facial
    recognition, among others. It is also applied in the e-commerce sector to display
    items that are mostly searched by specific clients. Machine learning is also used
    in areas such as transport, health, trading, visual assistance, and financial
    services.


    ## Chapter 2: Properties of a Computer Network


    A computer network is defined as a digital telecommunications network that allows
    resources to be shared between nodes. A telecommunication network is a number
    of terminal nodes having connected links that would enable telecommunication between
    some terminals. Transmission links in the network act as a connection between
    nodes. Telecommunications network allows for interactions and transfer of information
    over long distances. Computer network involves a connection between computer systems
    and computer hardware devices via communication channels. The communication channels
    enable communication and sharing of resources amongst many users. The connections
    between nodes are referred to as data links. The establishment of the data links
    is usually from cable media, including optic cables or wires, and wireless media,
    including Wi-Fi. Network nodes are the network computer devices originating, routing,
    and terminating the data. Typically, the nodes are identified through network
    addresses, and generally include elements such as phones, personal computers,
    networking hardware, and servers. The devices are easily networked together as
    long as one of the tools has the ability to exchange information with the other
    devices. The devices can either have or not have a direct connection with each
    other. A wide range of services and applications are supported by computer networks.
    Some of them include accessing the digital audio, digital video, World Wide Web,
    the common use of storage servers, and applications, fax machines, and printers.
    It may also include the use of instant messaging and e-mail applications. Computer
    networks differ from other telecommunication networks because of the transmitting
    mediums they use in carrying their signals, protocols used in organizing network
    traffic, size of the networks, the mechanism in controlling traffic, organizational
    intent, and topology. One of the most common computer networks is the Internet.
    Computer networks have been in existence since the late 1950s. During this time,
    computer networks involved the Semi-Automatic Ground Environment. The SAGE was
    a radar system used by the U.S military. A reorganization was later planned in
    1959. It was based on the network of the OGAS, which were computing center networks.
    The MOS transistor was also invented in 1959 at Bell Labs by Dawon Kahng, and
    Mohamed Atalla. The conductor was one of the significant steps towards computer
    network communication infrastructure. It included base station modules, routers,
    memory chips, telecommunication circuits, microprocessors, transceivers, and RF
    power amplifiers.


    SABRE a system in the commercial airline reservation, managed to go online with
    two mainframes that were connected together in 1960. The intergalactic computer
    network was later invented in 1963. It allowed for general communications amongst
    many computer users. In 1964, some researchers came up with an operation where
    a computer was used in routing and managing connections between telephones.


    The concept of packet switching was developed all through the 1960s. It allowed
    for information to be transferred among computers through a network. A telephone
    was also used in implementing the precise control of computers. A paper was later
    published on Wide Area Network that allowed computers to share time.


    French CYCLADES hosts were developed by 1973. The hosts had the responsibility
    to deliver data instead of centralizing services on the network reliably. A formal
    memo was written in the same year with a description of Ethernet. Ethernet is
    one of the most common networking systems used in the world today. Robert Metcalfe
    worked from 1979 in a bid to make Ethernet open standard. Ethernet continued being
    upgraded to a 10Mbit/s protocol in the 1980s.


    By 1995, Ethernet was supporting gigabit speeds. It has the capability of having
    a transmission speed of up to 400Gbit/s as recorded in 2018. The continued use
    of Ethernet results from its capacity to adapt and to scale easily.


    ### Properties of Computer Network


    Computer networking is considered a subdivision of electronics engineering, computer
    engineering, computer science, electrical engineering, information technology,
    or telecommunications. This is because the practical and theoretical computer
    networking relies on have close relations to the fields. Computer networks allow
    for efficient interpersonal communication between users. They can effectively
    communicate through video telephone calls, telephone, online chats, instant messaging,
    video conferencing, and e-mails. It also allows for network and computing resources
    sharing among users. Accessing and using resources is made easier through the
    devices on the network. Users can, for instance, share printers and storage devices
    together. Data, files, and other forms of information can also be shared effectively
    using computer networks.


    ### Uses of Computer Networks


    If it were not beneficial, people would not have considered creating a connection
    between computers through a network. There are numerous users of computer networks
    in the world today. They are used to benefit both individuals and companies in
    the long run.


    ### Use in Business Applications


    - **Resource Sharing**


    The main goal of computer networks is ensuring the anything about a business is
    available to all those who take part. Computer networks allow for this access
    by making all equipment, data, and programs available to any person using the
    network. Any user can access the use of the computer network regardless of their
    physical location.


    - **Server-Client Model**


    In such a model, the information about a business is stored on servers, which
    are powerful computers. The servers are housed centrally, and a system administrator
    is used to maintain them. The business employees usually have clients, which are
    simple machines on their office desks. The server-client model allows for easier
    access to remote data and information by these employees.


    - **Communication-Medium**


    Employees in a business setting need to communicate on various issues affecting
    business operations regularly. Computer networks, therefore, offer a powerful
    medium for communication among the employees. Almost all companies have several
    computers with logged-in e-mails. Employees use these computers when on great
    deals of communicating on a daily basis. An employer can send a message, and everyone
    engaging in the business operations can easily receive it.


    ### eCommerce


    One of the most significant targets of every business is the ability to do business
    with potential customers through the Internet. In the modern world, most customers
    prefer doing their shopping from home. Numerous ventures such as music vendors,
    books, and food stores have considered using computer networks to meet the needs
    of their customers.


    ### High Reliability because of Alternative Sources of Data


    Computer networks provide higher reliability by providing numerous sources of
    data. This means that general files can be copied on many machines. When one of
    the machines is not available, another one can be used to access the same information.
    The concept of Reliability is significant in banking, military, nuclear reactor
    safety, and military. This is because such sectors require consistent operations,
    even when there are hardware and software failures.


    ### Money-Saving


    Computer networking is a significant concept of the financial aspect for many
    companies and businesses. This is because it saves a considerable amount of money.
    Computer networks provide an option for using personal computers rather than mainframe
    computers that are quite expensive. Companies can effectively use the peer to
    peer model by networking all personal computers together. Everyone in the organization
    can access the network for many'
  mdcn: '## 机器学习的应用


    自机器学习引入计算行业以来，不同领域在其运营中已显著受益。此外，它在开发者以及其他用户中广受欢迎，使其适用于不同领域。在这种情况下，机器学习的应用范围从小型技术企业到商业用途。其中一个常见领域包括社交媒体，如Facebook和Twitter，用于情感分析、垃圾邮件过滤、面部识别等。它也应用于电子商务领域，向特定客户展示他们最常搜索的商品。机器学习还用于交通、健康、交易、视觉辅助和金融服务等领域。


    ## 第2章：计算机网络的特性


    计算机网络被定义为一种数字电信网络，允许节点之间共享资源。电信网络是由多个终端节点和连接链路组成的网络，这些链路使得某些终端之间能够进行电信通信。网络中的传输链路充当节点之间的连接。电信网络允许在长距离上进行交互和信息传输。计算机网络涉及通过通信信道连接计算机系统和计算机硬件设备。通信信道使得许多用户之间能够进行通信和资源共享。节点之间的连接被称为数据链路。数据链路的建立通常来自有线介质，包括光缆或电线，以及无线介质，包括Wi-Fi。网络节点是发起、路由和终止数据的网络计算机设备。通常，节点通过网络地址来标识，通常包括电话、个人计算机、网络硬件和服务器等元素。只要其中一个设备能够与其他设备交换信息，这些设备就可以轻松地组网。这些设备之间可以有直接连接，也可以没有直接连接。计算机网络支持广泛的服务和应用程序。其中一些包括访问数字音频、数字视频、万维网、存储服务器的通用使用、应用程序、传真机和打印机。它还可能包括即时消息和电子邮件应用程序的使用。计算机网络与其他电信网络的不同之处在于它们传输信号所使用的介质、用于组织网络流量的协议、网络的规模、控制流量的机制、组织意图和拓扑结构。最常见的计算机网络之一是互联网。计算机网络自20世纪50年代末就已存在。在此期间，计算机网络涉及半自动地面环境。SAGE是美国军方使用的雷达系统。后来在1959年计划进行了一次重组。它基于OGAS的网络，即计算中心网络。1959年，Dawon
    Kahng和Mohamed Atalla在贝尔实验室发明了MOS晶体管。这种导体是迈向计算机网络通信基础设施的重要一步之一。它包括基站模块、路由器、内存芯片、电信电路、微处理器、收发器和射频功率放大器。


    SABRE是商业航空预订系统中的一个系统，于1960年成功上线，连接了两台大型计算机。后来在1963年发明了星际计算机网络。它允许许多计算机用户之间进行通用通信。1964年，一些研究人员提出了一种操作，其中一台计算机用于路由和管理电话之间的连接。


    分组交换的概念在整个20世纪60年代得到发展。它允许信息通过网络在计算机之间传输。电话也被用于实现计算机的精确控制。后来发表了一篇关于广域网的论文，该网络允许计算机共享时间。


    到1973年，法国CYCLADES主机开发完成。这些主机负责可靠地传输数据，而不是将服务集中在网络上。同年，撰写了一份正式备忘录，描述了以太网。以太网是当今世界上最常见的网络系统之一。Robert
    Metcalfe从1979年开始致力于使以太网成为开放标准。在20世纪80年代，以太网继续升级到10Mbit/s协议。


    到1995年，以太网已支持千兆位速度。根据2018年的记录，其传输速度可达400Gbit/s。以太网的持续使用源于其适应性和易于扩展的能力。


    ### 计算机网络的特性


    计算机网络被认为是电子工程、计算机工程、计算机科学、电气工程、信息技术或电信的一个分支。这是因为计算机网络的实践和理论与这些领域密切相关。计算机网络允许用户之间进行高效的人际沟通。他们可以通过视频电话、电话、在线聊天、即时消息、视频会议和电子邮件进行有效沟通。它还允许用户之间共享网络和计算资源。通过网络上的设备，访问和使用资源变得更加容易。例如，用户可以共享打印机和存储设备。数据、文件和其他形式的信息也可以通过计算机网络有效共享。


    ### 计算机网络的用途


    如果它没有益处，人们就不会考虑通过网络在计算机之间建立连接。当今世界有许多计算机网络用户。从长远来看，它们被用于使个人和公司受益。


    ### 在商业应用中的使用


    - **资源共享**


    计算机网络的主要目标是确保业务的所有内容对所有参与者都可用。计算机网络通过使所有设备、数据和程序对使用网络的任何人都可用来实现这种访问。无论物理位置如何，任何用户都可以访问计算机网络的使用。


    - **服务器-客户端模型**


    在这种模型中，有关业务的信息存储在服务器上，服务器是功能强大的计算机。服务器集中放置，并由系统管理员进行维护。业务员工通常拥有客户端，即他们办公桌上的简单机器。服务器-客户端模型允许这些员工更轻松地访问远程数据和信息。


    - **通信媒介**


    在商业环境中，员工需要定期就影响业务运营的各种问题进行沟通。因此，计算机网络为员工之间的沟通提供了强大的媒介。几乎所有公司都有几台登录了电子邮件的计算机。员工每天使用这些计算机进行大量沟通。雇主可以发送一条消息，所有参与业务运营的人都可以轻松接收。


    ### 电子商务


    每个企业最重要的目标之一是能够通过互联网与潜在客户开展业务。在现代世界，大多数客户更喜欢在家购物。许多企业，如音乐供应商、书店和食品店，已考虑使用计算机网络来满足客户的需求。


    ### 由于数据替代来源而具有的高可靠性


    计算机网络通过提供众多数据源来提供更高的可靠性。这意味着通用文件可以复制到多台机器上。当其中一台机器不可用时，可以使用另一台机器访问相同的信息。可靠性概念在银行、军事、核反应堆安全和军事中非常重要。这是因为这些领域即使在硬件和软件故障的情况下也需要持续运行。


    ### 节省资金


    计算机网络是许多公司和企业财务方面的一个重要概念。这是因为它节省了大量资金。计算机网络提供了使用个人计算机而不是相当昂贵的大型计算机的选择。公司可以通过将所有个人计算机联网来有效地使用点对点模型。组织中的每个人都可以访问网络进行许多'
