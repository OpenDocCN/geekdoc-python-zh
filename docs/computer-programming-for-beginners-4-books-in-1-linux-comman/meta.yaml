  md: 'especially when using a decryption program, while stealth viruses are responsible
    for compromising malware detection applications and conceal the scope of an infected
    file. File and system infectors comprise cyber-attacks that use a virus to infect
    specific areas within the computer, such as executable codes of files and records
    in the hard disk. Trojans are programs that hide within essential system applications
    but accompany a malicious function. In this case, Trojans allows a hacker to open
    and gain access to the necessary files without interacting with securities installed.
    Worms are also a type of malware attack that is commonly transferred by email
