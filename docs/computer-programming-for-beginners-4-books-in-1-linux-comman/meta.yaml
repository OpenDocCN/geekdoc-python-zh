- md: '## Shodan and Censys


    It is in the Internet of Things that we are now living. Starting from the street
    security cameras and traffic light management systems to home WiFi routers, things
    that are connected to the Internet are always in our encounter. And it is both
    on the web and the real world that we can find all of them because they have a
    connection. With Google helping to discover your sought-after data on the web,
    you can also find these connected devices with some special search engines.

    Let’s welcome Shodan and Censys!

    Since it has been in existence for about 7 years now, for the Internet of Things,
    the foremost, as well as the first search engine, is Shodan. The inspiration behind
    the name came from a highly villainous artificial intelligence named Shodan, who
    was the System Shock, the computer game series’ main antagonist. Though it has
    the capability of wrecking harm, Shodan in the real-world is not as relentless.
    However, you will want to know how the search engine works before we go on to
    the bad news.

    Shodan is typically similar to someone that knocks on every door that they see
    as they wander throughout the neighborhood. However, there is the whole world
    instead of some city or knocking on every IPv4 address. This person would have
    some information and will give it to you if you ask them about a specific part
    of the neighborhood or a specific type of doors. The person would tell you the
    number of the doors, the individuals who answer these doors, and their utterances.
    And about those Internet of Things, you can get their information from Shodan,
    which includes whether there is a web interface you can use, their type, and how
    they are called. Through, relatively cheap, you will need to subscribe to you
    to use Shodan because it is not completely free.


    Except there are no locks on some doors, you may find nothing so weird about knocking
    on some doors. And for the bad guys to break in, it may not be possible for anyone.
    Some systems that use default passwords and logins, including IP cameras and unprotected
    routers, are the representations of these doors in the world of Internet of things.
    You will see yourself gaining complete access to the password and login when you
    have managed to figure out them after entering their web-interface. And because
    you can easily find these default information about passwords and logins on the
    manufacturers’ website, everything is no longer rocket science. And if it has
    the support of an IP camera, you can control and even see everything if it is
    an IP camera. Also, you may alter the settings if it is a router. You can even
    use a scary voice to talk to the poor baby if it is a baby monitor. Everything
    is up to the standards of your morals.


    ## Chapter 13: Kali Linux on Portable Devices Like Raspberry Pi


    Though, it can be fun enough to test networks, spoof accounts, or crack WiFi passwords.
    However, you may need an easily portable rig if you intend to take the show on
    the road. And so, here come the Raspberry Pi and Kali Linux. They designed Kali
    Linux for network penetration testing as an operating system. For you to test
    for Bluetooth vulnerabilities, spoof networks, WiFi passwords cracking, and plenty
    of other things, you have the chance of running it on your laptop. You need to
    know that you can be charged with a felony and get yourself arrested for violating
    the Computer Security Act if you break into protected networks using this knowledge.
    You can only use this knowledge to play with networks you control, for your learning,
    or simply use it for good. Now, since we have talked extensively about Kali Linux,
    and for the sake of not repeating all that you have read before, our focus will
    be on how we will build our Raspberry Pi and the version we will use. So, let’s
    get it done!


    For you to use Raspberry Pi, they don’t require a lot of power for you to use
    them as a credit sized, small computer. You will have a super-portable system
    testing device that you can easily take with you anywhere you go with the combination
    of Kali Linux and Raspberry Pi.


    ### The Essentials


    - For you to perform initial installation, you will need a desktop computer

    - Get a portable, small wireless keyboard with touchpad that one side of a small
    bag can contain

    - It tends to be quite useful if you are carrying the Raspberry Pi with you around.
    So, a case is fine but optional

    - New version of point-to-this-screen is essential though with Raspberry Pi 2
    or newer versions; it doesn’t fit flush

    - An 8 GB SD card

    - A Wi-Fi card

    - You will be fine with a few external 5V batteries that use a USB part built
    for smartphones. So, you need a pack of battery

    - Model 2 or B/B+ of Raspberry Pi. Though to install Raspberry Pi 2, you will
    need some additional steps; you may want to use the Model B+ if you don’t wish
    to go through those steps.


    ### Step 1: Installation of Kali on the Raspberry Pi


    For the Raspberry Pi, downloading and installing the touch screen build for Kali
    Linux will be the first thing you will need to do. The installation process is
    quite typical of installing any other operating system for Raspberry Pi. Here
    is a quick way to go about it:


    ### Installation of Kali to Windows SD Card


    1. For your hardware, you will need to download the Kali Linux Raspberry Pi. You
    can grab the Pi 2 version for Raspberry Pi 2 and the TFT version for model B/B++.
    Inside it, you will unzip the img file. You will need to take note here because,
    for Raspberry Pi, you will have to download the standard version of Kali Linux
    if you’re not using the touch screen display.

    2. You will need to have the application (.exec file) unzipped within after downloading
    Win32DiskImager.

    3. With the use of a card reader, you will then have your SD card inserted into
    the Windows computer.

    4. Then, you will double-click on the application, Win32DiskImager.exe that you
    have just downloaded.

    5. At the top right of the device, you will click on the drop-down menu to select
    from the list if the application doesn’t automatically detect your SD card.

    6. The Raspbian .img file that you have just downloaded can be found when you
    click on the folder icon of the file from the application’s image section.

    7. Win32DiskImager will work its magic as you wait for it after you have clicked
    the ‘write’ button. You can insert your card into your Raspberry Pi after you
    have safely ejected your SD card when it finishes.


    ### Kali installation in OS X SD Card


    1. For you to work with it on your hardware, you will firstly need to have Kali
    Linux Raspberry Pi image downloaded. You will take Pi 2 version for Raspberry
    Pi 2 and TFT version for model B/B++. The standard version of Kali Linux for the
    Raspberry Pi is essential to be downloaded if it is the screen display that you
    are using.

    2. For your installed version of OS X, have the appropriate version selected as
    you unzip the application after you have downloaded RPi-sd card builder.

    3. With the use of a card reader, have your SD card inserted into your Mac.

    4. Then, you can have your RPi-sd card builder opened. There will be an instant
    prompt for you to select an image of Raspbian. The file that you have had downloaded
    earlier is all you will have to select.

    5. Then, another prompt will inquire about the connection of your SD card. All
    that is required of you is to click on ‘continue’ since it is connected when you
    inserted it earlier. Then, the options for SD card will be presented to you. It
    will be checked, and you won’t see anything else on the list if you have only
    had one inserted. Click ok on the card you want to use if not.

    6. Then, you will enter the password for administration and press enter.

    7. If there is any ejection of the SD card, you will see yet another prompt. Since
    for the application to perform a direct copy, it needs to unmount; there’s nothing
    weird about it. In the Finder, for your SD card not to be available any longer,
    you will need to double-click it. A word of caution here: NEVER remove it from
    your USB port. You can click continue when you are sure.

    8. Your SD card prepping will finish by the RPi-sd card builder. Then, you can
    insert it into your Raspberry Pi unit after you.'
  mdcn: '## Shodan 与 Censys


    我们正生活在物联网时代。从街头安防摄像头和交通信号灯管理系统，到家用WiFi路由器，连接到互联网的设备无处不在。由于它们都具备网络连接，我们既能在网络上也能在现实世界中找到它们。除了谷歌能帮助你发现网络上的目标数据，你还可以借助一些特殊的搜索引擎来发现这些联网设备。

    让我们来认识一下 Shodan 和 Censys！

    作为物联网领域最早出现、也是首个专用搜索引擎，Shodan 已存在约7年。其名称灵感来源于一个名为 Shodan 的高度邪恶人工智能，它是《系统震撼》系列游戏中的主要反派。尽管现实中
    Shodan 搜索引擎不具备破坏能力，但它的功能依然强大。在讨论其潜在风险之前，我们先来了解它的工作原理。

    Shodan 就像一个在社区里挨家挨户敲门的人。不过，它敲的不是某个城市的门，而是遍历整个互联网，敲开每一个 IPv4 地址。如果你询问关于社区特定区域或特定类型门的信息，这个人会提供相关数据。他会告诉你门的数量、开门的人以及他们的回应。对于物联网设备，你可以从
    Shodan 获取它们的信息，包括是否有可用的Web界面、设备类型和名称。虽然 Shodan 相对便宜，但它并非完全免费，你需要订阅才能使用。


