  mdcn: '## 第一章：什么是 Linux 以及为何使用它？


    Linux 是一种标准的操作系统，广泛应用于手机、服务器和个人电脑等几乎所有领域。事实上，在全球范围内，无数人在你能想象到的各个领域和应用中使用着 Linux。Linux
    自上世纪 90 年代以来就已存在。从电视棒到冰箱，再到各种设备，Linux 驱动着一切。互联网的很大一部分也依赖于 Linux 的支持。由于计算机操作系统推动了许多创新，许多科学突破也离不开
    Linux。尽管几十年来，Linux 一直提供着安全、可靠的操作系统服务，但“Linux”这个词对普通大众来说却并不熟悉。


    但 Linux 操作系统无处不在，从企业服务器到家庭桌面、家用电器、超级计算机、汽车和智能手机。无论在哪里，你都能找到 Linux，它存在于你的电视、Roku
    设备、冰箱和恒温器中。作为最轻松、最安全可靠的操作系统之一，Linux 自豪地成为全球嵌入式系统、服务器和桌面平台的首选。


    ## 什么是 Linux 操作系统？


    首先，你对操作系统（OS）的理解是什么？在物理计算机中，管理硬件是被称为操作系统的计算机代码的职责。操作系统作为硬件和软件之间的一层存在。此外，用汇编语言与显卡通信或寻址
    CPU 并不是大多数人想知道的。而像 Windows 或 Linux 这样的操作系统则充当了中间人的角色。


    因此，Linux 与 Mac OS、iOS 和 Windows 一样，是一种操作系统。本质上，Linux 操作系统驱动着 Android，这是世界上最流行的平台。没有操作系统，软件很可能无法运行，因为作为操作系统，Linux
    管理着硬件和软件之间的通信。


    Linux 操作系统包含许多不同的组成部分，它们是：


    - **应用程序** – 并非桌面环境提供的所有完整应用程序。因此，你可以像在 macOS 和 Windows 上一样，通过 Linux 快速找到并安装数千种高质量软件。大多数现代
    Linux 发行版在应用程序安装方面都力求简洁和集中。例如，Ubuntu Linux 的 Ubuntu Software Center（类似于 GNOME
    Software）就提供了一个集中平台，帮助用户从数千个应用中快速发现和安装所需软件。

    - **桌面环境** – 用户可以与这一部分进行交互。你可以从多种桌面环境中选择，如 Xfce、KDE、Enlightenment、Pantheon、Mate、Cinnamon、GNOME
    等。每个桌面环境都包含内置应用程序，如游戏、网络浏览器、配置工具和文件管理器。

    - **图形服务器** – 这个子系统会在你的显示器上提供图形显示。许多人称其为 X 或 X-server。

    - **守护进程** – 这些是在登录桌面或启动过程中运行的后台服务，例如调度、声音、打印等。

    - **Init 系统** – 这个子系统引导用户空间，并负责控制守护进程。因此，systemd 作为最具争议性的一个，是目前使用最广泛的 init 系统。当引导加载程序（如统一引导加载程序或
    GRUB）处理初始启动时，init 系统则管理启动过程。

    - **操作系统内核** – 内核可以被称为一个完整的部分，即 Linux，它负责管理外围设备、内存、CPU，而系统的核心就是内核。

    - **引导加载程序** – 这个软件管理计算机的启动过程。对大多数用户来说，它就是在操作系统启动时弹出并很快消失的启动画面。

    - **操作系统 Shell** – Shell 是我们用来告诉操作系统我们想让它做什么的工具。许多人称之为命令行，你使用文本指令来操作操作系统。然而，命令行的代码并不为很多人所知。因此，这导致人们远离使用
    Linux。现代 Linux 发行版改变了这一点，因为就像 Windows 一样，Linux 也会使用桌面。


    ## 为何使用 Linux？


    大多数人几乎总是在问这个问题。当几乎所有服务器、笔记本电脑和桌面电脑都预装的操作系统运行良好时，为什么还要费心去学习一个完全不同的计算环境呢？这个问题的答案与其说是一个回答，不如说是另一个问题：你对自己当前操作系统的运行状况满意吗？或者你是否在为许可费、昂贵的维修、崩溃、变慢、恶意软件和病毒而烦恼？如果你发现自己正与上述问题作斗争，那么
    Linux 可能就是你的完美平台。目前，Linux 是地球上最可靠的计算机生态系统。对于桌面平台来说，将这种零成本与可靠性相结合，你将拥有一个完美的解决方案。由于服务器许可或软件无需支付任何费用，你可以随心所欲地在任意多台计算机上安装
    Linux。而且，你无需支付任何费用即可访问 Linux。


    除此之外，如果你不介意零成本的含义，那么拥有一个可以长期使用、轻松稳定的操作系统怎么样呢？二十多年来，无论是服务器平台还是桌面平台，许多使用 Linux 的人都没有遇到过病毒、恶意软件或勒索软件的问题。事实是，这类攻击对
    Linux 无能为力。只有在更新内核时，服务器才需要重启。Linux 服务器连续数年不重启也并非罕见。只要严格遵循推荐的更新，你一定能享受到可靠性和稳定性。


    此外，我们的计算机大多使用桌面操作系统，而更换操作系统是我们很少考虑的事情。更重要的是，学习一个新的操作系统并不是大多数人愿意做的事情。然而，以下是你需要尝试
    Linux 的一些原因：


    ## 众多不同的发行版


    Linux 的不同发行版或版本存在差异。有些用于服务器软件，而另一些则专为桌面使用而设计。有些是为初学者设计的，而另一些则专注于高级用户。大多数 Linux
    版本（也称为发行版）使用 USB 驱动器、光盘安装，或者可以免费下载。Linux 发行版数不胜数。虽然一些流行的选择是 openSUSE 和 Debian，但桌面用户的默认偏好通常是
    Linux Mint、Arch 和 Fedora。得益于 Ubuntu Unity，Ubuntu 成为最现代的 Linux 发行版之一。通过包含 openSUSE，你可以获得更传统的
    KDE 外观的 Linux。此外，如果你在寻找服务器 Linux 操作系统的列表，那也会是一个相当长的列表。CentOS、SUSE Enterprise、Ubuntu
    Server 和 Red Hat 是一些最著名的发行版。但是，使用某些 Linux 服务器发行版可能需要投入一些资金，因为使用 Red Hat 可能需要许可。然而，对于你的业务来说，通过许可费获得的支持是至关重要的。


    ## Linux 等同于自由


    需要将开源定义为与 Linux 等同。任何软件都遵循一套原则，例如：


    - 对于你修改的任何软件，其副本将不受限制。

    - 软件分发将不受限制。

    - 将允许你进行任何所需的更改、检查以及研究和反汇编软件。

    - 无论你的目标或动机如何，都拥有运行软件的完全自由。


    首先，开源软件并不等同于一个社区，你需要明白这一点。Linux 由这个社区构建，并且 Linux 从该社区获得了强大的维护。因此，如果你想知道 Linux
    是什么，那么可以说 Linux 是由人们为世界其他人创造的软件。'
