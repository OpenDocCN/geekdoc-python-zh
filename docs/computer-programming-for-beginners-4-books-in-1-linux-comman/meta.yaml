    \ 13。\n\nLambda 函数通常在你需要短时间调用一个函数时使用（此函数不需要名称），并且主要与内置函数 filter()、map() 一起使用。\n\
    \n### Filter() 函数\n\nfilter() 函数是（正如其名称所示）负责过滤的。这是什么意思？此函数接受一个序列作为实参，可以是列表或迭代器，然后它将返回一个可迭代对象，其中包含已过滤的元素（如果满足条件，这将返回\
