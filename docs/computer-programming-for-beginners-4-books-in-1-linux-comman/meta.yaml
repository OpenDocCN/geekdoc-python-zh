    ## Chapter 9: How to Organize Kali Linux


    Kali 2.0 was launched by Offensive Security after ten years of evolution. And
    of all the Kali/Backtrack releases, the easiest to use by far is Kali 2.0. There
    are some new features with the new Kali if you are used to the original Kali.
    However, there’s nothing better than this! They have streamlined and reorganized
    the menus completely with a helpful icon representing many of the tools. Here
    are some new things about Kali 2.0:


    - Built-in screencasting

    - Desktop notifications

    - For faster Metasploit loading, there is a native Ruby 2.0

    - New categories and menus

    - New user interface


    They have streamlined the Kali 2.0 quite well, and compared to earlier versions
    of Backtrack/Kali; the layout flows quite well. As it is laid out in a concise
    and clear manner, the feel is that of having everything at your fingertips. To
    organize your Kali, you can follow the following ways as we examine some of its
    components.


    ## Overview of the Desktop


    Again, everything you will need is at your fingertips on the desktop, which feels
    and looks quite good.


    ## Apache Webserver


    At present, it seems they have removed the Apache web server for restart, start,
    and stop service icons from Kali 2.0. Well, you may want to use the command below
    if you want to start them from a terminal prompt:


    - To restart – you can use “/etc/init.d/apache2 restart” or “service apache2 restart”

    - To stop – you can use “/etc/init.d/apache2 stop” or “service apache2 stop”

    - To start – you can use “/etc/init.d/apache2 start” or “service apache2 start”


    You will notice the change from Kali 1 concerning the default webpage as you can
    now surf the webserver of Kali. Now, located in a folder called HTTP, there is
    one level deeper for the root website as well. As such, instead of the old directory
    “/var/www/,” you can now drop the folders or pages of your website into the directory
    “/var/www/html/” when you use the Apache server.


    ## Screencasting


    You can now use screencasting because there is a built-in screencasting feature
    in Kali 2.0. You have the ability to record in real-time the adventures of your
    security testing.


    ## Places Menu


    Within your Kali, you have links to various locations contained in the Places
    menu.


    ## Workspaces


    There are also workspaces in the earlier versions of Backtrack/Linux. Workspace
    is the additional desktop screens that you can use in case you don’t know the
    workspace. For all the windows that you have opened, you can get an overview of
    them using the ‘super key.’ Also, you can open the workspace menu if you have
    a touch-screen monitor. Between the workspaces, you will have the ability of dragging
    and dropping specific running programs.


    ## Auto-Minimizing Windows


    At times, some windows disappear or auto-minimize, which is another thing in the
    new Kali 2.0. On the favorite bar, to the left of the associated icon, you will
    see a white circle when a window is minimized. The first terminal window will
    appear if you click on the terminal icon once, and both minimized terminal windows
    will reappear when you click it twice. Also, to see minimized windows, you can
    press “Alt-tab.” Then, to see additional windows, you can arrow around when you
    have the “alt-tab” pressed.


    ## Command-Line Tools


    It is in the directory “/usr/share” that they have the majority of tools installed.
    When you type the names of these tools in a terminal, you can run these tools
    and also other tools in the menu. For you to familiarize yourself with both the
    share directory and the menu system, you may want to take a few moments on that.


    ## Application Menu


    Under the Application menu, you will see the location of a list of common program
    favorites. And by type, there is a logical layout of the tools. For example, if
    you want to see the most common web app testing tools, all you have to do is click
    on the Web Application Analysis menu item. You will see a list of all of the tools
    for a specific category. It is due to the fact the top tools are shown by the
    menu system, and in Kali, not all of the tools are available. Essentially, available
    in the menu system of Kali are only a fraction of the installed tools and it is
    only from the command-line that most of the tools can be available.


    ## Favorites Bar


    On the desktop’s left side, you will see a customizable “Favorite bar” in the
    new Kali. With this, you can get into the action quickly since you can get the
    applications you use most time with this menu list. Through the required dependencies,
    you can start the represented tool automatically with just a click. For example,
    before you launch Metasploit, if you want to be sure you have created the default
    database, you can prestart the database software by clicking on the button for
    Metasploit. Then, you can see various applications on the bottom of the favorites
    bar by clicking on the “show applications.”'
