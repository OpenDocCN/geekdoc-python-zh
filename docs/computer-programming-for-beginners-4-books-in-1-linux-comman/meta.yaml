  md: '# Virus


    When hackers get access to a specific website, they release a virus into the files
    of the website. Their objectives are to corrupt the resources or information on
    such a website. There are a lot of different types of viruses that we are able
    to meet up with, and they can be spread through email attachments, websites that
    have been compromised, and more.

    These viruses can take over the computer, shutting down files, stealing information,
    and even spreading to some of the contacts that you have on your system to get
    the information that the hackers would like to have. This is why it is so important
    to go through and be careful about the kinds of websites that you open, and to
    make sure that you are not going to websites that could harm your computer.


    # Phishing


    They use this method to replicate the original website, and as such, the hackers
    will easily seize and misuse the unsuspecting user’s information like credit card
    details, account password, and so many more.

    Many times these are going to be sent through email. The email is going to appear
    as it comes from the legitimate source, such as your bank or another site that
    you spend some time on, asking for you to check out a message or change your username
    and password.

    Because the hacker does a great job of hiding things and making it look official,
