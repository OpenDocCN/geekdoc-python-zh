  md: '# # Chapter 1: Definition of Hacking and Types of Hackers


    The process of hacking involves getting unauthorized access into a computer system,
    or a group of computer systems. Hackers get access to systems by cracking codes
    or passwords. The technique hackers use to obtain code or password is cracking
    and a hacker is someone that undertakes the process of hacking. Hackers can hack
    an email account, a social media site, a website, an entire LAN network, or a
    group of systems. Ultimately, it is through password algorithms programs that
    the hackers obtain access to a password. For each of their daily needs, people
    and also businesses make use of laptops or computers. For a seamless flow of business
    applications and information, several organizations have WAN, wide area network,
    website or domain, or a computer network. As a result, there is a high-risk exposure
    of these networks to hackers as well as the outside world of hacking.


    # ## Purpose of Hacking


    Mostly, the objective of some hackers is to cause certain reputational or financial
    harm to an entity, group, or person through their malicious or criminal intent.
    They achieve this by spreading malicious or incorrect rumors that can cause the
    disruption of the business after they embezzle their funds or steal their confidential
    data. Companies can find themselves in some socially detrimental situations with
    this misleading information. Also, as punishable by law, hacking is a form of
    internet or cybercrime. However, government law agencies and specific accredited
    institutions engage in another side of hacking on a professional level. With this
    case, their intention is to prevent individuals from causing any harm or counter
    the wrong intentions of the hackers. Also, this type of hacking is done to protect
    and save the citizens and society at large.


    # ## Types of Hackers


    It is quite essential for us to differentiate between the objectives and roles
    of hackers by knowing their types to get the detail on the above-broached objectives.'
  merge: -1
  pgno: 385
- img_proc: true
  md: '# Hacktivist


    Leaving contentious information on a website that they hack is the focus of these
    types of hackers. They do this to spread religious, social, and political messages.
    Also, other nations can be targeted by these hackers.


    # Grey hat


    These types of hackers have no intention of fraudulent when they access a system
    without any authorization. They are between the black and white hat hackers. The
    objective of these hackers is to show the stakeholders of the system parts of
    its weaknesses and vulnerabilities.


    # Ethical Hacker


    The objective of these types of hackers is to eliminate and identify suspected
    weaknesses. They assess systems by getting access as officially and recognized
    stamped hackers and they are known also as white hat. A few things they also do
    is to retrieve critical information needed for security purposes, crack codes
    of anti-social or illegal setups, and vulnerability assessment. They are paid,
    certified, and trained experts.

    The ethical hackers are the only individuals who are allowed to do this kind of
    hacking legally. They know the same kinds of rules to follow as a black hat hacker
    and will use some of the same ideas along the way. But they have usually gained
    permission to go through and do some of these options, rather than trying to do
    it to gain their own personal advantage.

    For the ethical hacker, the goal is to keep the system as safe and secure as possible
    along the way. They want to either protect their own network, or the network of
    someone else who knows what they are here. This will make it easier for them to
    get onto the network without doing so in an illegal manner.

    These hackers are going to use a lot of the same methods for their attacks, as
    we see with some of the other types of hackers. This means that they are going
    to rely on penetration testing, mapping out attacks, and more. But they are going
    to do it as a way to help them figure out where the vulnerabilities in the system
    are rather than looking at ways that you can exploit them.


    # Cracker


    These are black hat. They secure entry into websites or computer networks'
  merge: -1
  pgno: 386
- img_proc: true
  md: 'through an unauthorized manner and also with a mala fide intention. There is
    also an attachment of personal gain in their intention through privacy rights
    violations to benefit criminal organizations, stealing of funds from online bank
    accounts, stealing confidential organizational information, and so on. These days,
    these hackers engage in their activities in a shady manner and they belong to
    this category.


    # Types of Hacking


    The threats that websites have to deal with are some of the most frequent threats
    of hacking. Hackers engage in the process of making the contents of a website
    public or changed with the use of unauthorized access. The individuals or groups
    that are opposed to social or political organizations most times target their
    websites. Also, they hack national or governmental information website, and this
    is entirely common. Here are some of common the hacking methods they use on the
    websites:


    # DNS Spoofing


    Sometimes, users might forget about the cache data of a domain or website, and
    this method of hacking uses this cache data. Then, it points the data to another
    malicious website.


    # Cookie Theft


    Cookies contain login passwords, confidential information, and so on, and with
    the use of malicious codes, hackers will have access to the website to steal cookies.
    When a legitimate company uses these, it is going to help them provide you with
    a better service overall. But it does store a lot of extra information on you
    and your system, and if the hacker is able to steal these cookies, they will be
    able to use them in any manner that they would like. This could be dangerous and
    is a big reason that it is often best to turn off and disable the use of cookies
    in the first place.


    # UI Redress


    Hackers use this method by creating a fake user interface. Thus, users will be
    directed to another website altogether when they click with the intention of going
    to a specific site.'
