  md: '# Chapter 1: What is Linux and Why Using It?


    Strengthening almost everything from mobile phones, servers, and PCs, Linux is
    a standard operating system that people commonly use. Indeed, all over the world,
    several individuals use Linux in all fields and applications you can imagine.
    Linux has been around since the 90s. From your TV stick to the fridge and everything,
    Linux runs everything. And much of the internet has support from Linux. Since
    the computer operating system has powered several innovations, many scientific
    breakthroughs have Linux to thank. Even though for decades, Linux has been supplying
    secure, reliable OS duties, the word “Linux” has no familiarity with the general
    public.


    But Linux operating system is everywhere, from enterprise servers to home desktops,
    home appliances, supercomputers, cars, and smartphones. Everywhere, you will find
    Linux, and it is on your television, Roku devices, refrigerators, and thermostats.
    For being one of the stress-free, most secure and reliable operating system available,
    Linux prides itself as a preferred platform running embedded systems, servers,
    and desktops all over the world.


    # What is Linux OS?


    In the first place, what do you understand by an OS or operating system? In a
    physical computer, the management of the hardware is the duty of the computer
    code known as the operating system. Between the hardware and software, the operating
    system exists as a layer. Also, in assembler, communicating with a graphics card
    or addressing a CPU is not what most people want to know. And what acts as a middleman
    is an operating system like Windows or Linux.


    Therefore, Linux, like Mac OS, iOs, and Windows, is an operating system. Essentially,
    Linux operating system powers Android, which is the most popular platform in the
    world. The software is likely not to function without the operating system since,
    as an operating system, Linux manages the communication between the hardware and
    software.


    There are so many different pieces that Linux operating system comprises and they
    are:'
  merge: -1
  pgno: 8
- img_proc: true
  md: '+   - **Applications** – not all the complete array of apps that the desktop
    environments provide. As such, you can quickly find and install several thousands
    of software that are high-quality through Linux, typical of macOS and Windows.
    There are simplicity and centralization in the application installation by most
    modern Linux distributions. For example, typical of GNOME Software, there is Ubuntu
    Software Center by Ubuntu Linux that, from one centralized platform, speeds up
    the discovery and installation of apps among thousands of them for users.

    - **Desktop environment** – users can interact with this piece. You can choose
    from several desktop environments like Xfce, KDE, Enlightenment, Pantheon, Mate,
    Cinnamon, GNOME, and so on. There are built-in applications for each desktop environment,
    including games, web browsers, configuration tools, and file managers.

    - **Graphical server** – on your monitor, you will get a graphic display with
    this subsystem. It is known as X or X-server by many people.

    - **Daemons** – after logging into the desktop or startup during boot, these are
    background services such as scheduling, sound, printing, and so on.

    - **Init system** – user space is bootstrapped by this subsystem, and the control
    of daemons is in its charge. As such, systemd, as the most controversial, is an
    init system most widely used. When the bootloader, like Unified Bootloader or
    GRUB, handles the initial booting, the init system manages the boot process.

    - **OS Kernel** – kernel can be referred to as a complete piece known as Linux
    for the management of the peripheral devices, memory, CPU, and the core of the
    system is the kernel.

    - **Bootloader** – this software manages the process of the computer boot. It
    is a splash screen that pops up in the operating system'
  merge: -1
  pgno: 9
- img_proc: true
  md: 'and soon goes away to boot for most users.


    +   - **OS Shell** – the shell is what we use to tell our operating system the
    things we want it to do. As the command line by many, you use text to instruct
    the OS. However, the code of command-lines is known by quite a few people. As
    such, this caused people to stay away from using Linux. The modern distribution
    of Linux changed this since, just like Windows, Linux will use a desktop.


    # Why Using Linux?


    Most people ask this question almost all the time. When the OS that ships virtually
    all servers, laptops, and desktops function correctly, why would anyone bother
    to learn a wholly different computing environment? The answer to that question
