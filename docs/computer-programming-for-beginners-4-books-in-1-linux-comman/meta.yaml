    \n现在，如果满足 if 条件，我们将执行一系列指令，相同的是，在屏幕上打印出错信息并将继续，然后，下一条指令是 pass 语句，它不会做任何事情，就像在程序中造成一个小延迟，这取决于我们机器处理器的时钟频率，但这些是我们不太关心的主题。但是，如果条件为假，那么它将进入\
