    Oracle made this one, and in some distributions, it is not entirely stable as
    Ext. However, if you have to, you may think that it is a replacement for it, and
    it has excellent performance.


    **XFS**

    Using it with small files, it works slowly being an old filesystem


    **JFS**

    IBM made this old filesystem and, whether, with big or small files, it works quite
    well. However, after a long time, as indicated by reports, it failed, and files
    get corrupted.


    **Ext4**

    With a significant speed, this gives room for large files. If you are looking
    for an option for SSD disk, you may want to go for this, and it is the suggested
    default filesystem you will see when you want to install Linux.


    **Ext3**

