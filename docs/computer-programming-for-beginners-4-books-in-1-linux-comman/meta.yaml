    ## Types of Machine Learning Algorithms


    ### Supervised Algorithms


    As mentioned, machine learning comprises of multiple types depending on how the
    data fed is to yield the outcome. One of the models is the supervised algorithm,
    where the datasets undergo a given set of parameters, which in turn determine
    the outcome. The machine initially specifies the data into labels as well as the
    training data included. In this case, the data is initially tested to ascertain
    its outcome, therefore, controlling the outcome. This type of algorithm usually
    has a manageable as a result is generally intended. Supervised algorithms are
    further subdivided into classification and regression algorithms.


    The classification algorithm uses the K-Nearest Neighbor classification algorithm,
    which is responsible for sorting data into individual labels. The data is classified
    depending on the similarities between variables or the information inputted in
    the machine. On the other hand, regression algorithms focus on mathematical relationships
    and the dependency of variables. That is, it provides an immediate analysis of
    numerical datasets with similarities essential for predicting the future. The
    regression algorithm includes two forms depending on the information fed, linear,
    and logistic regression models.


    ### Unsupervised Algorithms


    This is the opposite of supervised algorithms and consists of unlabeled datasets,
    which in most cases, the results are undetermined. The unsupervised algorithm
    is classified into K-means clustering, recurrent, and artificial neural network.
    The artificial neural networks resemble the brain neurons, which are connected
    and interconnected to enhance learning, thinking, and making decisions without
