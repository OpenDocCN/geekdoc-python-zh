  md: '# The History of Cybersecurity


    Cybersecurity is not that old in the technology sector as it dated back to 40
    years ago when words like worms, spyware, malware, or viruses meant a different
    thing. Not only in the information technology sector but for any common man in
    the business sector, organization, and so on. Since its beginning, it brought
    mixed reactions as it came as a result of a research project. It is a fantastic
    fact from the 1970s. Robert Thomas was a researcher for BBN technologies in Cambridge,
    Massachusetts, at the time he created the computer worm referred to as ''the creeper.''
    During that time, the creeper infected several computers by attacking one machine
    after the other with the message; "I''m THE CREEPER: CATCH ME IF YOU CAN." It
    was an aggressive threat. Afterward, Ray Tomlinson, the inventor, and creator
    of email created a similar program referred to as ''the Reaper.'' It was to be
    an antivirus that would delete and clear the creeper. In the late 1980s, there
    was another creation of a man called Robert Morris, whose idea was to test the
    size of the internet. He then wrote a program that would invade the networks,
    UNIX terminals, and copied itself. The plan referred to was the Morris worm. It
    was such an aggressive worm that it was disabled and slowed down the functionality
    of the computer, leaving them unusable. He was the first person to be convicted
    under the computer fraud and abuse act. Since then, there has been the creation
    of invasive, aggressive, and deadliest computer viruses that are prone to cure
    and are hard to control and detect. That is the main reason that brought about
    the idea of cybersecurity to help protect data against these deadly attacks.


