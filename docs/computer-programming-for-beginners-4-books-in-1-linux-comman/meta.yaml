    # Networking Layers and Protocols


    A protocol is a predetermined set of guidelines that dictates how computers should
    communicate with each other. HTTP is one of the popular protocols, which you may
    have across in your interactions with computers. This protocol supports communication
    between a particular web browser and its server.

    Good examples of data link protocols include are Wi-Fi and Ethernet. These protocols
    shape the data as it appears on the media. Both of them use a physical address
    that’s referred to as the MAC address. It has a capacity of 48 bits.

    Other popular MAC addresses include the EUI 64 that has 64 bits.

    Networking can be divided into numerous layers or levels.

    There is the OSI network that utilizes a seven-layer model. Also, there is a common
    TCP/IP network, which uses a four-layer model. Here are the four levels of the
    TCP/IP network, and their respective examples:


    +   - Data link-level- Ethernet or Wi-Fi.

    - Transport level- UDP or TCP.

    - Networking-IP

    - Application level-HTTP


    As the sending process is progress, these layers add a distinct header to the
    data. The headers are then systematically eliminated as the data moves towards
    its destination.


    # Transmission Control Protocol


    TCP provides a safe mode of transmitting data. The transmission takes place through
    IP packets. The packets have accurate error detection capability. All the data
    that’s transmitted in packets reach as their destination as sent. Data can’t be
    accidentally altered in any way. You can rest assured that the data'
