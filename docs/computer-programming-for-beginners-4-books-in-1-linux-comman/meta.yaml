  mdcn: '## 第四章：在虚拟机上安装Linux


    即使通过Live CD/DVD尝试安装Linux后，你可能仍对双启动方案感到不确定。使用虚拟机（VM）来安装你偏好的Linux操作系统会非常实用。这意味着硬件环境的条件被复制为软件环境。其限制仅来自虚拟机内部的组件，而物理PC的硬件构成了基础环境。例如，若处理器仅有双核，则无法虚拟出四核CPU。然而，在配备多核CPU的计算机上，虚拟化效果可能远超预期，且许多系统都支持虚拟化。由于Windows平台存在多种虚拟化工具，为便于安装Linux操作系统，VMware是其中能提供功能显著完善的虚拟机应用的代表。现在，让我们借助VMware
    Workstation Player，探索在Windows系统中安装Linux的流程。


    ## VMware Workstation Player安装


    首先，你需要访问VMware官网下载最新版本的VMware Workstation Player工具。12.5版本的64位安装包约80MB。作为评估版本，VMware
    Workstation Player可免费用于家庭、个人及非商业用途。对于非营利组织和学生而言，VMware乐于通过免费版本提供价值。在功能方面，VMware
    Workstation Player涵盖了标准虚拟机任务的所有功能。而针对各级企业用户，VMware则提供了丰富的虚拟化解决方案。


    下载完成后即可开始安装。标准安装向导将引导你完成安装过程，其中会提供“增强型键盘驱动程序”安装选项。该功能支持处理国际键盘布局，即使你可能暂时不需要，也值得安装。安装过程中若提示重启Windows，请按向导指引操作。


    ## 选择目标Linux操作系统


    你可能已确定想尝试的Linux发行版。在虚拟机中，某些Linux发行版可能不完全适配，而另一些则能良好运行。通常情况下，VMware无法运行针对ARM架构（如树莓派）设计的Linux发行版。因此，对于x64和x86架构，你可能无法虚拟化ARM系统。此时可考虑使用QEMU工具。


    ## 虚拟机配置


    下载Linux操作系统后，即可开始配置虚拟机。启动VMware Workstation Player时，系统会提示输入电子邮件地址——这是获取免费软件并加入VMware邮件列表的必要步骤。完成该步骤后，VMware
    Workstation Player主界面将加载。接下来需要创建虚拟机账户。默认选择ISO安装光盘镜像文件。请注意，也可选择“稍后安装操作系统”选项，仅创建空白磁盘来构建虚拟系统。选择目标操作系统后点击“下一步”，系统将通过VMware
    Easy Install功能自动安装所选客户操作系统。


    ## 创建账户


    在下一界面中，你需要输入密码、用户名和首选名称，为虚拟机命名后点击“下一步”。操作系统名称通常采用默认设置，你也可为虚拟机选择存储位置。再次点击“下一步”后，需选择虚拟机磁盘容量。该虚拟硬盘将以文件或文件集形式保存在物理磁盘中，两种存储方式均可选择。同时，你可以调整或接受虚拟硬盘的推荐容量——适当增大容量通常是更安全的选择。无论选择何种配置，最终都会进入“准备创建虚拟机”界面。点击“完成”按钮后，虚拟机将启动。创建完成后运行虚拟机，系统会通过提示建议安装VMware
    Tools for Linux工具包。虽然这不是Easy Installation流程的必要步骤，但接受安装也无妨。


    ## 虚拟硬件自定义


    在“准备创建...”界面中，你还可以选择“自定义硬件”选项。除了硬盘配置外，你可能需要调整虚拟机的硬件设置。可配置选项包括网络适配器、处理器和内存等。在处理器设置界面中，右侧窗格会显示“虚拟化引擎”选项。该选项默认处于自动模式，通常无需为Linux系统特别调整。但若遇到问题，可手动设置为Intel
    VT-x或其他模式。在内存设置界面中，你可以针对性能问题进行专项调整。界面会显示虚拟机内存的推荐最大值和最小值示意图，建议遵循这些推荐值。内存设置过高可能影响从虚拟机软件到系统任务的整体运行速度，而设置过低则可能导致性能不足。


    最后，显示设置需要稍作调整。你可以选择在虚拟机中配置多显示器，或直接使用主机计算机的显示器设置，同时支持3D加速功能切换。与系统内存类似，界面会显示客户操作系统的推荐显存容量，你也可以手动调整图形内存大小。


    ## 安装后在VMware Workstation Player中使用Linux


    与物理桌面机类似，虚拟机中的操作系统通常从ISO镜像启动。你可以通过Easy Install功能自动化整个安装过程，并应用Windows主机操作系统的配置来设置虚拟操作系统。若选择“稍后安装操作系统”选项，则需要手动控制整个安装流程。使用Easy
    Install完成安装后，你即可登录并开始使用客户操作系统——操作非常简单！此外，你也可以通过虚拟机菜单启动已创建的虚拟机。


    ## 虚拟机的重要性


    2005年对Linux硬件而言是个重要转折点。当时用户常遇到USB设备、显卡、蓝牙甚至无线网络的兼容性问题。每当新技术出现，用户都需费力寻找适配的包装器和驱动程序。由于虚拟机尚未普及，Linux用户必须直接与“真实”硬件交互才能解决问题。但如今情况已大为改观：目前大多数硬件都能在Linux系统上即插即用。发行版的重心已从硬件支持转向特色功能开发。如果你能轻松体验多个发行版，或是虚拟机的重度用户，完全可以在相同硬件上测试不同系统。


    现在，让我们探讨虚拟机对Linux新用户的价值——尽管虚拟机在企业领域已得到广泛应用。


    ## 谁需要使用虚拟机？


    由于某些专有服务和软件仅支持Windows系统（例如多国政府使用的税务申报软件），部分Linux用户不得不采用双启动方案。使用虚拟机可以避免双启动的复杂性，轻松运行Windows软件。但虚拟机在游戏场景中可能表现不佳，尤其是运行《孤岛危机》等资源密集型游戏时，需要直接调用物理内存、GPU和CPU才能获得理想体验。由于硬件与应用之间存在虚拟层，视频和音频编辑工作也可能受影响。但除此之外，虚拟机在其他大多数场景中都能出色运行。


    对于非Linux用户而言，虚拟机也是尝试新系统的理想工具。无论是计划转向Linux、重装原有操作系统，还是单纯体验Linux，虚拟机都能提供安全的实验环境。当用户做好准备后，他们将更有信心完成系统迁移。'
