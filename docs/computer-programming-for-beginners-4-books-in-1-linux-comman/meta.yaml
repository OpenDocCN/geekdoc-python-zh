- md: '## Chapter 7: Modules


    The modules are files with extension .py (that we have been using until now),
    additionally a module instead of having extension py, it also has the extension
    .pyc; (what would be a compiled Python file), a module can also be a file written
    totally in C for those that are using CPython.


    Modules have their own namespace, and in addition, they can contain variables,
    functions, classes and even contain other modules, a module within another or
    a submodule.


    ## How useful are the modules?


    The modules are mainly used to organize and reuse the code, this leads us to two
    terms that are fundamental in OOP as are modularization and reuse.


    When we want to make a complex application and we need a code to reuse it since
    it was previously programmed in another application, this is one of the advantages
    that modules have, they allow us to reuse our code in different applications.


    The modularization, in this case, we divide the module in codes, in small parts,
    when we realize a complex application, we can do it in a single file of thousands
    of lines of code, or we can divide it in small parts, in small files with a smaller
    number of lines of codes since it is always going to be easier for us to handle.


    ## How can we create a module in Python?


    We can easily create a module through the file extension .py, once created the
    file we can save it where we want, this is what we know as import.


    Python provides us with a large number of modules in its standard library, in
    the official Python manual we can find this library through the following link:
    http://docs.python.org/modindex.html.


    Inside a module, its name is available in the value of the global variable __name__.


    ## Import Sentence


    A module can contain executable statements and function definitions; with these
    statements, we are able to initialize the module. They are executed only the first
    time the module is in an import statement.


    Modules can import other modules. It is actually usual to place all import declarations
    at the beginning of the module (or script, for that matter). The names of the
    imported modules will be placed in the global namespace of the importing module.


    The import sentence has the following syntax. Once the interpreter finds the import
    statement, it will import the module if it is present in the search path, where
    a search path is nothing more than a list of directories that the interpreter
    searches for before importing a module.


    ## Chapter 8: File handling


    The Python programming language allows us to work on two different levels when
    we refer to file systems and directories. One of them is through the module os,
    which facilitates us to work with the whole system of files and directories, at
    the level of the operating system itself.


    The second level is the one that allows us to work with files, this is done by
    manipulating their reading and writing at the application level, and treating
    each file as an object.


    In python as well as in any other language, the files are manipulated in three
    steps, first they are opened, then they are operated on or edited and finally
    they are closed.


    ## What is a file?


    A python file is a set of bytes, which are composed of a structure, and within
    this we find in the header, where all the data of the file is handled such as,
    for example, the name, size and type of file we are working with; the data is
    part of the body of the file, where the written content is handled by the editor
    and finally the end of the file, where we notify the code through this sentence
    that we reach the end of the file. In this way, we can describe the structure
    of a file.


    The structure of the files is composed in the following way:


    - File header: These are the data that the file will contain (name, size, type)

    - File Data: This will be the body of the file and will have some content written
    by the programmer.

    - End of file: This sentence is the one that will indicate that the file has reached
    its end.


    Our file will look like this:


    ![](img/d87a95dcfe5b52bf5303163b6c768bd5_249_0.png)


    ## How can I access a file?


    There are two very basic ways to access a file, one is to use it as a text file,
    where you proceed line by line, the other is to treat it as a binary file, where
    you proceed byte by byte.


    Now, to assign a variable a file type value, we will need to use the function
    open (), which will allow us to open a file.


    ## Open() function


    To open a file in Python, we have to use the open() function, since this will
    receive the name of the file and the way in which the file will be opened as parameters.
    If the file opening mode is not entered, it will open in the default way in a
    read-only file.


    We must keep in mind that the operations to open the files are limited because
    it is not possible to read a file that was opened only for writing, you cannot
    write to a file which has been opened only for reading.


    The open () function consists of two parameters:


    - It is the path to the file we want to open.

    - It is the mode in which we can open it.


    Its syntax is as follows:


    ```

    function = open("file.txt", "w")

    function.write()

    function.close()

    ```


    Of which the parameters:


    File: This is an argument that provides the name of the file we want to access
    with the open() function, this is what will be the path of our file.


    The argument file is considered a fundamental argument, since it is the main one
    (allowing us to open the file), unlike the rest of the arguments which can be
    optional and have values that are already predetermined.


    Mode: The access modes are those that are in charge of defining the way in which
    the file is going to be opened (it could be for reading, writing, editing).


    There are a variety of access modes, these are:


    | Mode | Description |

    |---|---|

    | r | This is the default open mode. Opens the file for reading only |

    | r+ | This mode opens the file for its reading and writing |'
  mdcn: '## 第7章：模块


    模块是扩展名为.py的文件（我们至今一直在使用），此外，模块除了具有扩展名.py外，还可以具有扩展名.pyc；（这将是编译后的Python文件），对于使用CPython的用户来说，模块也可以是完全用C编写的文件。


    模块拥有自己的命名空间，此外，它们还可以包含变量、函数、类，甚至可以包含其他模块，即一个模块内嵌另一个模块或子模块。


    ## 模块有什么用？


    模块主要用于组织和重用代码，这引出了面向对象编程（OOP）中两个基本概念：模块化和重用。


    当我们想要构建一个复杂的应用程序，并且需要重用之前在另一个应用程序中编写过的代码时，这就是模块的优势之一，它们允许我们在不同的应用程序中重用我们的代码。


    模块化，在这种情况下，我们将模块划分为代码，分成小的部分，当我们实现一个复杂的应用程序时，我们可以在一个包含数千行代码的单个文件中完成，或者我们可以将其分成小的部分，分成行数较少的小文件，因为这样总是更容易处理。


    ## 我们如何在Python中创建一个模块？


    我们可以通过文件扩展名.py轻松创建一个模块，一旦创建了文件，我们可以将其保存在任何我们想要的地方，这就是我们所知的导入。


    Python在其标准库中为我们提供了大量的模块，在Python官方手册中，我们可以通过以下链接找到这个库：http://docs.python.org/modindex.html。


    在一个模块内部，其名称在全局变量`__name__`的值中可用。


    ## 导入语句


    一个模块可以包含可执行语句和函数定义；通过这些语句，我们能够初始化模块。它们仅在模块首次出现在导入语句中时执行。


    模块可以导入其他模块。实际上，通常将所有导入声明放在模块（或脚本）的开头。导入的模块的名称将被放置在导入模块的全局命名空间中。


    导入语句具有以下语法。一旦解释器找到导入语句，如果模块存在于搜索路径中，它将导入该模块，搜索路径无非是解释器在导入模块之前搜索的目录列表。


    ## 第8章：文件处理


    Python编程语言允许我们在涉及文件系统和目录时在两个不同的层次上工作。其中之一是通过`os`模块，它使我们能够在操作系统本身的层面上处理整个文件和目录系统。


    第二个层次是允许我们处理文件，这是通过在应用程序级别操作其读写，并将每个文件视为一个对象来完成的。


    在Python中，就像在任何其他语言中一样，文件分三步操作：首先打开，然后进行操作或编辑，最后关闭。


    ## 什么是文件？


    Python文件是一组字节，它们由一个结构组成，在这个结构中，我们在头部找到所有文件数据的处理，例如，我们正在处理的文件的名称、大小和类型；数据是文件主体的一部分，其中编辑器处理写入的内容，最后是文件结束，我们通过这个语句通知代码我们已到达文件末尾。这样，我们可以描述文件的结构。


    文件的结构由以下方式组成：


    - 文件头：这些是文件将包含的数据（名称、大小、类型）

    - 文件数据：这将是文件的主体，将包含程序员编写的一些内容。

    - 文件结束：这个语句将指示文件已到达其末尾。


    我们的文件将如下所示：


    ![](img/d87a95dcfe5b52bf5303163b6c768bd5_249_0.png)


    ## 我如何访问一个文件？


    有两种非常基本的方式来访问文件，一种是将其用作文本文件，逐行处理；另一种是将其视为二进制文件，逐字节处理。


    现在，要为变量分配一个文件类型的值，我们将需要使用`open()`函数，该函数将允许我们打开一个文件。


    ## open()函数


    要在Python中打开一个文件，我们必须使用`open()`函数，因为它将接收文件的名称和文件将被打开的方式作为参数。如果未输入文件打开模式，它将以默认方式打开为只读文件。


    我们必须记住，打开文件的操作是有限的，因为无法读取仅为写入而打开的文件，也无法写入仅为读取而打开的文件。


    `open()`函数由两个参数组成：


    - 它是我们想要打开的文件的路径。

    - 它是我们可以打开它的模式。


    其语法如下：


    ```

    function = open("file.txt", "w")

    function.write()

    function.close()

    ```


    其中参数：


    File：这是一个参数，提供我们想要用`open()`函数访问的文件的名称，这将是我们的文件的路径。


    参数file被认为是一个基本参数，因为它是主要的（允许我们打开文件），而其余参数可以是可选的，并且具有预定的值。


    Mode：访问模式负责定义文件将被打开的方式（可以是读取、写入、编辑）。


    有多种访问模式，如下：


    | 模式 | 描述 |

    |---|---|

    | r | 这是默认的打开模式。以只读方式打开文件 |

    | r+ | 此模式打开文件以进行读写 |'
