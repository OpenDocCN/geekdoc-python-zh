  md: '# Ping of Death Attack


    Ping of death attacks makes use of an IP size over the maximum of 65,535 bytes
    to ping a target system using IP packets. The IP packet is fragmented by the attackers
    since IP packets of this size are not allowed. Then, other crashes can ensue as
    well as buffer overflow when the target system reassembles the packet. When you
    use a firewall, you can block the attack of the ping of death as the IP packets
    that have been fragmented will be checked for maximum size.


    # Smurf Attack


    Attackers saturate a target network with traffic with the ICMP as well as using
    IP spoofing with this attack. Attackers target the broadcast IP addresses with
    the use of ICMP echo requests. As such, the origin of these ICMP requests is from
    the address of a spoofed victim. For example, for the attackers to broadcast address
    10.255.255.255, the attacker would spoof an ICMP echo request from 10.0.0.10 if
    the intended victim address is 10.0.0.10. All IPs in the range will get this request,
    and it would overwhelm the network since all the responses are going back to 10.0.0.10.
    Not only can this method generate a vast amount of network congestion, but it
    can also be automated as it can be repeatable. You may want to disable IP-directed
    broadcasts at the routers for you to protect your devices from this attack. Then,
    you will be able to protect the ICMP echo broadcast request at the network devices.
    Also, to keep them from responding to ICMP packets from broadcast addresses, another
    option is to configure the end systems.


    # Teardrop Attack


    Attackers use this method to offset fields in sequential Internet Protocol packets
    by causing the fragmentation and length to overlap one another on the attacked
    host. Though it will fail, during the process, there will be an attempt by the
    attacked system to reconstruct packets. Then, the system will crash eventually
    due to confusion. You may want to block ports 445 and 139 as you disable SMBv2
    for you to protect against this DoS attack if you don’t have patches.


    # TCP SYN Flood Attack'
  merge: -1
  pgno: 405
- img_proc: true
  md: 'It is during a TCP session initialization handshake when attackers exploit
