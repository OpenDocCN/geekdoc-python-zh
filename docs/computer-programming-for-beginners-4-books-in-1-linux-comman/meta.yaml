    # Man-In-The-Middle Attacks


    Man-in-the-middle cyber-attacks occur when an attacker gets access between the
    connection of the victim and server. This type also comes in different forms,
    which are session hijacking, IP spoofing, and replays. IP spoofing is where the
    attacker convinces your computer that it is communicating with a genuine entity,
    therefore, allowing for the access. Similarly, the attacker sends packets with
    IP source resembling the host instead of the original IP source address making
    its accept it and act on it. A replay attack is when the attacker impersonates
    the victim by saving old messages and sending them sooner after the interception.
    Replays are, however, not valid to hackers as victims can readily prevent them
    through nonce and timestamps. Session hijacking is where the attacker intervenes
    in a session of trusted clients and servers while the primary IP address is substituted,
    and the server continues with the session. The client first connects to the server,
    and when the hijacking happens, the attacker gains control by disconnecting the
    server the client. It then replaces the IP address and continues the sessions
    with the server as well as the client. With limited countermeasures to man-in-the-middles
    cyber-attacks, data encryption, and the use of digital certificates may play a
    significant role in preventing these threats. You should know it is always challenging
    to understand when an attacker is within a given service; therefore, crucial to
    forever remain protected against man-in-the-middle cyber-attacks.


    # SQL Injection Attack


    This is a driven-database website attack that occurs when an attacker runs a SQL
    query within a specific database through the data inputs of a client. The commands
    are injected in data-planes to execute predefined SQL instructions. When injected
    successfully, SQL queries access confidential and other sensitive information
    from the database enabling the attacker to perform the intended purpose. In this
    case, the data becomes open to the attacker who'
