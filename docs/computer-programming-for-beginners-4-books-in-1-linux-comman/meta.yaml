  md: '# Chapter 4: What Are the Basic Cybersecurity Fundamentals?


    Cybersecurity is a popular name in the internet and other technological advancement
    areas. It has got many concerns recently due to the increased cyber threats and
    attacks. Simply because; more systems are being targeted using more sophisticated
