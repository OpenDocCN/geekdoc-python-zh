    a brute force attack. Pick out passwords that are long, use a combination of letters,
    numbers and symbols, and ones that are not going to be related back to you or
    easy to guess at all. Many hackers are going to start by trying to attack your
    passwords because this is a weak point in your security. You can ix this with
    the help of a strong password.

    3. Do a penetration test to look for some of the vulnerabilities that are on the
    system. We will take a look at how to work with penetration testing later on,
    but this is a great way to figure out which places the hacker may try to use in
    order to get onto your network. Doing one for yourself will help to keep it protected.

    4. Change passwords on a regular basis. When you change the password on a regular
    basis, it is a lot harder for the hacker to guess what it is or use some of the
