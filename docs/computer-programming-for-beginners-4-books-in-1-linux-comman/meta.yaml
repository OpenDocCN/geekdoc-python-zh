    servers, and computers from malicious attacks is cybersecurity. Also, they refer
    to it as electronic information security or information technology security. Common
    categories can also fit into the terms as well as a variety of contexts, from
    mobile to business computing.


    +   - The most unpredictable cybersecurity factor is end-user education. When
    people fail to follow healthy security practices, they can accidentally introduce
    a virus to an otherwise secure system. Thus, it is quite vital for the security
    of any organization to educate its employees not to plug in unidentified USB drives
    and to delete suspicious email attachments.

    - For any causes of loss of data or operations, the manner with which an organization
    responds to a cybersecurity incident is the business continuity and disaster recovery.
    And for the organization to return to the same operating capacity as before the
    event, the processes that dictate how the organization restores its information
    and operation are the disaster recovery policies. While the organization is attempting
    to operate without specific resources, the organization has a plan that it falls
    back on, which is the business continuity.

    - The decisions and procedures of protecting and handling data assets are operational
    security. This process encompasses the activities that determine where and how
    data may be shared or stored and the users’ permissions while accessing a network.

    - When data is in transit or in storage, the privacy and integrity of data are
    protected by the information security.

    - For devices and software to be free of threats is the focus of the application
    security. Even though it is designed to protect data, a compromised application
    could provide access to the data. Before the deployment of a device or program,
    the design phase is the beginning of the successful security.

