  md: '# Device control


    There are several devices required for any computer system. However, for the layer
    to offer functionality, there is a need for a device driver to make the devices
    usable. Video/audio drivers, Bluetooth drivers, graphics drivers, and so on are
    some of the types of drivers present.


    # File system


    The file system heavily influences the Linux/GNU system. Nearly everything is
    a file in Linux/GNU. Also, conventional for the organization of data hierarchically,
    journaling and compression of data, deletion, and creation of files, and so on
    are the storage relation requirements controlled by this subsystem. All primary
    file systems have the support of the Linux kernel, such as MS Windows NTFS.


    # Memory management


    This subsystem handles every related request. The pages are chunks of fixed size
    as divided from available memory, and on any demand, can be de-allocated or allocated
    from or to the process. As it creates the illusions of contiguous ample address
    space to a physical address space, it also maps the process virtual address with
    the help of the memory management unit, MMU.


    # Process management


    The life-cycle gets this subsystem to handle the process. Through inter-process
    communication, it allows data sharing and connection between processes as it also
    destroys and creates processes. Also, it enables resource sharing and schedules
    processes with the help of the process scheduler.


    # Some Useful Utilities


    For the provision of useful information about the kernel modules, Linux/GNU offers
    several user-space utilities. Now, let’s dive into them.


    *dmesg*: though it is a different methodology that the kernel uses, it is on the
    standard output stream that any user-space program displays its output, i.e.,
    /dev/stdout . For us to manage the contents of the ring buffer, with the use of
    the dmesg command, the kernel appends its output to the ring buffer.


    *modinfo*: as a command-line argument, the module that passes such process displays
    the information by this command. For modules, it searches the /lib/modules/<version>
    directory if the argument is not on a filename. Also,'
