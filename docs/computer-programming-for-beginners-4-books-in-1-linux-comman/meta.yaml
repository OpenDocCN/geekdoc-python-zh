    # DoS, Denial-of Service, and DDoS Distributed Denial-of-Service Attacks


    When the resources of a system cannot respond to service requests, it means a
    denial-of-service attack has overwhelmed such a system. Though, the attacker controls
    the malicious software that they have infected in a large number of other host
    machines, the attack of a DDoS is also on the resources of a system. Attackers
    don’t gain direct benefit from denial-0f-service, unlike attacks that they developed
    to increase or gain access. DoS attacks satisfy some of the attackers. However,
    there may be real enough benefits for attackers if the attacked resources belong
    to a business competitor. Also, for attackers to launch a new type of attack,
    they tend to result in DoS attacks to take a system offline. Here are some of
