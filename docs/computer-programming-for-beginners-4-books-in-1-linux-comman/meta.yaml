    individual needs since most personal firewalls are highly configurable


    +   - When your computer’s program tries to connect to the internet, you wish
    to be kept informed

    - The home network that you run requires you to keep it isolated from the internet

    - You use a public WiFi network when you connect to the internet in an airport,
    café, or park

    - With an ‘always on’ broadband connection, you surf the internet at home


    # Firewalls Types


    Though the two are suitable, you can have firewalls as hardware or software. With
    port applications and numbers, you can regulate traffic through the installation
    of a software firewall program on your computer while you can install the hardware
    firewall type between the gateway and your network. The most common firewall type
    is the packet-filtering firewalls, and in case they don’t match an established
    security rule set, they prevent packets from passing through after they have examined
    them. The purpose of these firewall types is to analyze the destination and source
    of the packets for IP addresses. It will thus be trusted to enter the network
    if the packets match those of an ‘allowed’ rule on the firewall.


    Stateless and stateful are the two categories of the packet-filtering firewalls.
    The ones that are easy targets for hackers are the stateless firewalls since they
    lack context by examining packets independently of one another. On the other hand,
    stateful firewalls tend to be much more secure because they remember information
    about previously passed packets. Though packet-filtering firewalls ultimately
    offer quite basic protection and tend to be quite inadequate, they can be indeed
    effective. For example, for them to determine the adverse effect of the application
    that the content of the requests is reaching can be quite hard for them. Thus,
    there will be no way for the firewall to know when there could be a deletion of
    a database from a misconceived trusted source if it allows a malicious request.
    Those that are equipped to detect such threats are the proxy and next-generation
    firewalls.


    # SMLI, Stateful Multilayer Inspection Firewalls'
  - '[PAGE 437]


    While these firewalls compare them against trusted packets, they filter packets
    at the application, transport, and network layers. Also, if they pass the layer
    individually, SMLI only allows them to pass after they examined the entire packet,
    which is typical of NGFW firewalls. They ensure the potential of all initiated
    communications happening only with trusted sources as they determine the state
    of the communication and also by examining the packets.


    # NAT, Network Address Translation Firewalls


    These firewalls keep individual IP address hidden when they use a single IP address
    to connect to the internet by allowing several devices with independent network
    addresses. As such, they offer greater security against attacks because attackers
    can’t capture specific details when they are scanning a network for IP addresses.
    These firewalls are rooted between outside traffic and a group of computers with
    proxy firewalls having similarities with NAT firewalls.


    # Proxy Firewalls


    At the level of application, these firewalls have the network filtered. They are
    planted between two end systems, which are not like the basic firewalls. The firewall
    must receive a request from the client and using a set of security for the evaluation,
    and after that, keep it blocked or give permission. Essentially, layer 7 protocols
    like FTP and HTTP are monitored by proxy firewalls and for them to detect malicious
    traffic, they utilize both deep packet and stateful inspections.


    # NGFW, Next-Generation Firewalls


    These firewalls blend additional functionality with the technology of traditional
    firewall like anti-virus, intrusion prevention systems, encrypted traffic inspection,
    and many more. Essentially, it has the inclusion of DPI, deep packet inspection.
    It is within the packet itself that deep packet inspection examines the data while
    looking at packet headers is what basic firewalls only look. With this process,
    users can stop, categorize, and identify packets effectively with malicious data.'
