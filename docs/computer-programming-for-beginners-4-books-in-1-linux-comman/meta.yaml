    \n## 3. pass 语句：它是一个空表达式，换句话说，这个语句什么都不做，但它允许我们创建一个循环而不在其主体中放置代码，以便以后添加并以这种方式用作临时填充物，我们的意思是向程序添加某种类型的延迟；或者就像在使用汇编器或处理器管理编程的情况下一样，这是一种制作\
    \ nop 的方式。它是一个不会以任何方式影响代码行为的语句，并且应该注意，它不仅可以在循环中使用，也可以在代码中的任何地方使用而没有任何问题，我们的意思是，该语句也可以在普通函数中使用而没有任何麻烦，但这还不值得一提，因为我们还没有看到函数，但知道\
