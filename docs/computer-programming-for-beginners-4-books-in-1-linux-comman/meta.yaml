    连接远距离区域（如两栋建筑）的无线网络需要更集中的天线，例如碟形天线。碟形天线将细束网络信号发送到特定方向。这种远距离覆盖称为点对点连接；这意味着两个点被连接起来。该过程需要两个设备，一个配置为接入点，另一个作为客户端。


