  md: '# # Chapter 19: Secure and Anonymous Using Tor, Proxy Chains, and VPN


    There are going to be some situations where you would like to get onto a network
    and do some of the work that you want, without other people being able to track
    where you are going. Being secure and anonymous online is something that a lot
    of people aim for in their work, and it is sometimes hard to make sure that you
    can get to this point, and maintain that secrecy. That is why we are going to
    spend some time looking at the different methods that we are able to use to keep
    ourselves hidden and safe when we are online.


    # ## What is Tor


    Tor is going to be a protocol for internet networking that has been designed in
    order to anonymize the data that is relayed across it. Using this software is
    going to make it, at a minimum, hard, if not impossible, for snoops to come onto
    the network and see your social media posts search history, webmail and other
    online activity that you try to do. They will also find that it is hard to figure
    out what country you are from, just by analyzing your IP address. This can be
    useful for a lot of people who want to be online.


    When you run this service, some of the bigger data collectors, like Google Ads
    and other options will not be able to go through and perform some of the traffic
    analysis that they want, and they will not be able to go through and gather up
    some data on the habits that you are doing online. This also makes it harder for
    hackers to gather that information as well.


    The Tor network is interesting in that it is going to run through the servers
    of thousands of volunteers who are found through the world. The data that you
    use is going to be bundled up in packets that are encrypted when they enter into
    this network. Then, unlike how we see with our traditional internet connections,
    Tor is going to be able to strip away part of the header of the packet, which
    is going to be part of the addressing information that can be used to help us
    learn some things about the sender, such as the operating system where this message
    was originally sent from.


    Finally, Tor is going to be able to encrypt the rest of the information that we'
  merge: -1
  pgno: 464
- img_proc: true
  md: 'use for addressing, called the packet wrapper. This is something that the regular
    connections that we use with the internet are not going to use this. Then our
    data packets, which are encrypted and modified, will be routed through many of
    these volunteer servers, known as relays, while it makes its way to the final
    destination. The roundabout way that these packets are going to travel on this
    network is going to make it harder to track.


    Each of the relay parts is going to decrypt just enough of that wrapper to know
    which relay the data came from in the first place, and which relay it needs to
    send that packet to the net. The relay is then able to rewrap this in a new wrapper
    before sending it along again.

    While this method is not 100 percent accurate all of the time, it is going to
    be able to keep your information a lot safer than we will see with regular connections
    to the internet. The fact that we are encrypting the data that we use, and that
    we are able to work with this in a manner that relies on relays rather than sending
    it just one place at a time, can make it a lot easier and more secure to work
    with.


    # Using Proxy Chains


    Another option that we are able to work with here to ensure that our information
    is going to stay safe and secure along the way is to work with these proxy chains.
    These are going to make it a lot harder for the hacker to find us and what we
    are doing. It will utilize an intermediary machine whose IP address is going to
    be the one left on the other system, rather than our own. And the Proxy system
    is set up to make this all work.


    The proxy chain is going to be used to help us to accept our own traffic, and
    then we will forward it on to the target that should receive it. The proxy is
    going to spend time logging all of the traffic that we would like to send in either
    direction, but the good news is that if someone would like to look through this
    log, they would need to get a search warrant or a subpoena to do it, and this
    makes it harder for us to get onto the other network without anyone finding us.


    If we are able to take some of our coding skills and string more than one of these
    proxies into a chain, it is going to become even more difficult for the other
    computer to detect the original IP address that we want to work with. On the other
    hand, if one of the proxies is found to be out of the jurisdiction'
  merge: -1
  pgno: 465
- img_proc: true
  md: 'of the victim, then it is going to be really unlikely that any traffic is going
    to actually come back to our own IP address.


    The good news is that, if you would like to stay hidden with the help of proxies,
    both BackTrack and Kali with Linux are going to have some good tools that are
    going to help with doing this process, and this is going to be known as a proxy
    chain. It is up to you to determine if this is the right option to keep your network
