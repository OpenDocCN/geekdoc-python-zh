    Simplest synchronization primitive lock


    ```

    >>> from threading import Thread

    >>> from threading import Lock

    >>> lock = Lock()

    >>> def getlock(id):

    ...     lock.acquire()

    ...     print("task{0} get".format(id))

    ...     lock.release()

    ...

    >>> t1=Thread(target=getlock,args=(1,))

    >>> t2=Thread(target=getlock,args=(2,))

    >>> t1.start();t2.start()

    task1 get

    task2 get


    # using lock manager

    >>> def getlock(id):

    ...     with lock:

    ...         print("task%d get" % id)

    ...

    >>> t1=Thread(target=getlock,args=(1,))

    >>> t2=Thread(target=getlock,args=(2,))

    >>> t1.start();t2.start()

    task1 get

    task2 get

    ```


    # 3.4.8 Deadlock


    Happen when more than one mutex lock.


    ```

    >>> import threading

    >>> import time

    >>> lock1 = threading.Lock()

    >>> lock2 = threading.Lock()

    >>> def task1():

    ...     with lock1:

    ...         print("get lock1")

    ...         time.sleep(3)

    ...         with lock2:

    ...             print("No deadlock")

    ...

    >>> def task2():

    ...     with lock2:

    ...         print("get lock2")

    ...         with lock1:

    ...             print("No deadlock")

    ...

    >>> t1=threading.Thread(target=task1)

    >>> t2=threading.Thread(target=task2)

    ```'
