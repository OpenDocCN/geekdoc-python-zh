  md: '# 2.4.2 Characters


    Python 2 takes all string characters as bytes. In this case, the length of strings
    may be not equivalent to the number of characters. For example, the length of
    Café is 5, not 4 because é is encoded as a 2 bytes character.


    ```

    >>> s= ''Café''

    >>> print([_c for _c in s])

    [''C'', ''a'', ''f'', ''\xc3'', ''\xa9'']

    >>> len(s)

    5

    >>> s = u''Café''

    >>> print([_c for _c in s])

    [u''C'', u''a'', u''f'', u''\xe9'']

    >>> len(s)

    4

    ```


    Python 3 takes all string characters as Unicode code point. The lenght of a string
    is always equivalent to the number of characters.


    ```

    >>> s = ''Café''

    >>> print([_c for _c in s])

    [''C'', ''a'', ''f'', ''é'']

    >>> len(s)

    4

    >>> bs = bytes(s, encoding=''utf-8'')

    >>> print(bs)

    b''Caf\xc3\xa9''

    >>> len(bs)

    5

    ```


