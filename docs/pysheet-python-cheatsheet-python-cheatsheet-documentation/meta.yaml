    ''01''

    >>> m.group(3)

    ''01''


    # Nesting groups

    >>> m = re.search(r''(((\d{4})-\d{2})-\d{2})'', ''2016-01-01'')

    >>> m.groups()

    (''2016-01-01'', ''2016-01'', ''2016'')

    >>> m.group()

    ''2016-01-01''

    >>> m.group(1)

