    # ## 2.14.1 Read a File


    In Python 2, the content of the file which read from file system does not decode.
    That is, the content of the file is a byte string, not a Unicode string.


    ```

    >>> with open("/etc/passwd") as f:

    ...     content = f.read()

    >>> print(type(content))

    <type ''str''>

    >>> print(type(content.decode("utf-8")))

    <type ''unicode''>

    ```


    In Python 3, open provides encoding option. If files do not open in binary mode,
    the encoding will be determined by locale.getpreferredencoding(False) or user’s
    input.


    ```

    >>> with open("/etc/hosts", encoding="utf-8") as f:

    ...     content = f.read()

    ...

    >>> print(type(content))

    <class ''str''>

    ```


    Binary mode


    ```

    >>> with open("/etc/hosts", "rb") as f:

    ...     content = f.read()

    ...

    >>> print(type(content))

    <class ''bytes''>

    ```


