    # ## 2.9.7 Callable


    In some cases such as passing a callback function, we need to check whether an
    object is callable or not. The built-in function, callable, assist us to avoid
    raising a TypeError if the object is not callable.


    ```

    python

    >>> a = 10

    >>> def fun():

    ...     print(''I am callable'')

    ...

    >>> callable(a)

    False

    >>> callable(fun)

    True


    ```


    # ## 2.9.8 Get Function Name


    ```

    python

    >>> def example_function():

    ...     pass

    ...

    >>> example_function.__name__

    ''example_function''


    ```


    # ## 2.9.9 Lambda


    Sometimes, we don''t want to use the def statement to define a short callback
    function. We can use a lambda expression as a shortcut to define an anonymous
    or an inline function instead. However, only one single expression can be specified
    in lambda. That is, no other features such as multi-line statements, conditions,
    or exception handling can be contained.


    ```

    python

    >>> fn = lambda x: x**2

    >>> fn(3)

    9

    >>> (lambda x: x**2)(3)

    9

    >>> (lambda x: [x*_ for _ in range(5)])(2)

    [0, 2, 4, 6, 8]

    >>> (lambda x: x if x>3 else 3)(5)

    5


    ```'
