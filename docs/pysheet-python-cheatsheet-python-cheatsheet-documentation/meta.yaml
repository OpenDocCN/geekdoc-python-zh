    env HOME does not find!\")\n...\n>>> print(env)\n/root\n```\n\nIn PEP 572, another\
    \ benefit is to conveniently capture a “witness” for an `any()` or an `all()`\
    \ expression. Although capturing function inputs can assist an interactive debugger,\
    \ the advantage is not so obvious, and examples lack readability. Therefore, this\
    \ benefit does not discuss here. Note that other languages (e.g., C/C++ or Go)\
    \ may bind an assignment to a scope. Take Golang as an example.\n\n```\npackage\
    \ main\n\nimport (\n    \"fmt\"\n    \"os\"\n)\n\nfunc main() {\n    if env :=\
    \ os.Getenv(\"HOME\"); env == \"\" {\n        panic(fmt.Sprintf(\"Home does not\
    \ find\"))\n    }\n    fmt.Print(env) // <--- compile error: undefined: env\n\
    }\n```\n\n# 4.4.5 Pitfalls\n\nAlthough an assigning expression allows writing\
    \ compact code, there are many pitfalls when a developer uses it in a list comprehension.\
    \ A common `SyntaxError` is to rebind iteration variables.\n\n```\n>>> [i := i+1\
    \ for i in range(5)]  # invalid\n```\n\nHowever, updating an iteration variable\
    \ will reduce readability and introduce bugs. Even if Python 3.8 did not implement\
    \ the walrus operator, a programmer should avoid reusing iteration variables within\
    \ a scope.\n\nAnother pitfall is Python prohibits using assignment expressions\
    \ within a comprehension under a class scope."
