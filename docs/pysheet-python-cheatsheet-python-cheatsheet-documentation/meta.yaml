    \ I/O operation has to wait until previous operation finish. For example\n\n```c\n\
    #include <Python.h>\n\nstatic PyObject* foo(PyObject* self)\n{\n    sleep(3);\n\
    \    Py_RETURN_NONE;\n}\n\nstatic PyMethodDef methods[] = {\n    {\"foo\", (PyCFunction)foo,\
    \ METH_NOARGS, NULL},\n    {NULL, NULL, 0, NULL}\n};\n\nstatic struct PyModuleDef\
    \ module = {\n    PyModuleDef_HEAD_INIT, \"Foo\", NULL, -1, methods\n};\n\nPyMODINIT_FUNC\
    \ PyInit_foo(void)\n{\n    return PyModule_Create(&module);\n}\n```"
