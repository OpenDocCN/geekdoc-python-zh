- md: "## 2.3.3 Unicode\n\nAs **print function**, making text become Unicode is another\
    \ famous decision. Nevertheless, many modern programming languages' text is Unicode.\
    \ This change compels us to decode text early in order to prevent runtime error\
    \ after we run programs for a while. Further information can be found on PEP 3112.\n\
    \n```\n>>> type(\"Guido\") # string type is str in python2\n<type 'str'>\n>>>\
    \ from __future__ import unicode_literals\n>>> type(\"Guido\") # string type become\
    \ unicode\n<type 'unicode'>\n```\n\n## 2.3.4 Division\n\nSometimes, it is counterintuitive\
    \ when the division result is int or long. In this case, Python 3 enables the\
    \ **true division** by default. However, in Python 2, we have to backport division\
    \ to the current interpreter. Further information can be found on PEP 238.\n\n\
    ```\n>>> 1 / 2\n0\n>>> from __future__ import division\n>>> 1 / 2   # return a\
    \ float (classic division)\n0.5\n>>> 1 // 2  # return a int (floor division)\n\
    0\n```\n\n## 2.3.5 Annotations\n\nBefore Python 3.7, we cannot assign annotations\
    \ in a class or a function if it is not available in the current scope. A common\
    \ situation is the definition of a container class.\n\n```\nclass Tree(object):\n\
    \n    def insert(self, tree: Tree): ...\n```\n\nExample\n\n```\n$ python3 foo.py\n\
    Traceback (most recent call last):\n  File \"foo.py\", line 1, in <module>\n \
    \   class Tree(object):\n  File \"foo.py\", line 3, in Tree\n    def insert(self,\
    \ tree: Tree): ...\nNameError: name 'Tree' is not defined\n```\n\nIn this case,\
    \ the definition of the class is not available yet. Python interpreter cannot\
    \ parse the annotation during their definition time. To solve this issue, Python\
    \ uses string literals to replace the class.\n\n```\nclass Tree(object):\n\n \
    \   def insert(self, tree: 'Tree'): ...\n```\n\nAfter version 3.7, Python introduces\
    \ the future statement, annotations, to perform postponed evaluation. It will\
    \ become the default feature in Python 4. For further information please refer\
    \ to [PEP 563](https://peps.python.org/pep-0563/).\n\n```\nfrom __future__ import\
    \ annotations\n\nclass Tree(object):\n\n    def insert(self, tree: Tree): ...\n\
    ```\n\n## 2.3.6 BDFL Retirement\n\n**New in Python 3.1**\n\nPEP 401 is just an\
    \ Easter egg. This feature brings the current interpreter back to the past. It\
    \ enables the diamond operator <> in Python 3.\n\n```\n>>> 1 != 2\nTrue\n>>> from\
    \ __future__ import barry_as_FLUFL\n>>> 1 != 2\n  File \"<stdin>\", line 1\n \
    \   1 != 2\n       ^\nSyntaxError: with Barry as BDFL, use '<>' instead of '!='\n\
    >>> 1 <> 2\nTrue\n```\n\n## 2.3.7 Braces\n\nbraces is an Easter egg. The source\
    \ code can be found on future.c.\n\n```\n>>> from __future__ import braces\n \
    \ File \"<stdin>\", line 1\nSyntaxError: not a chance\n```\n\n## 2.4 Unicode\n\
    \nThe main goal of this cheat sheet is to collect some common snippets which are\
    \ related to Unicode. In Python 3, strings are represented by Unicode instead\
    \ of bytes. Further information can be found on [PEP 3100](https://peps.python.org/pep-3100/).\n\
    \n**ASCII** code is the most well-known standard which defines numeric codes for\
    \ characters. The numeric values only define 128 characters originally, so ASCII\
    \ only contains control codes, digits, lowercase letters, uppercase letters, etc.\
    \ However, it is not enough for us to represent characters such as accented characters,\
    \ Chinese characters, or emoji existed around the world. Therefore, **Unicode**\
    \ was developed to solve this issue. It defines the code point to represent various\
    \ characters like ASCII but the number of characters is up to 1,111,998.\n\n|\
    \ Table of Contents |\n| --- |\n| Unicode |\n\n- String\n- Characters\n- Porting\
    \ unicode(s, 'utf-8')\n- Unicode Code Point\n- Encoding\n- Decoding\n- Unicode\
    \ Normalization\n- Avoid UnicodeDecodeError\n- Long String\n\n### 2.4.1 String\n\
    \nIn Python 2, strings are represented in *bytes*, not *Unicode*. Python provides\
    \ different types of string such as Unicode string, raw string, and so on. In\
    \ this case, if we want to declare a Unicode string, we add u prefix for string\
    \ literals.\n\n```\n>>> s = 'Café'  # byte string\n>>> s\n'Caf\\xc3\\xa9'\n>>>\
    \ type(s)\n<type 'str'>\n>>> u = u'Café' # unicode string\n>>> u\nu'Caf\\xe9'\n\
    >>> type(u)\n<type 'unicode'>\n```\n\nIn Python 3, strings are represented in\
    \ *Unicode*. If we want to represent a byte string, we add the b prefix for string\
    \ literals. Note that the early Python versions (3.0-3.2) do not support the u\
    \ prefix. In order to ease the pain to migrate Unicode aware applications from\
    \ Python 2, Python 3.3 once again supports the u prefix for string literals. Further\
    \ information can be found on PEP 414.\n\n```\n>>> s = 'Café'\n>>> type(s)\n<class\
    \ 'str'>\n>>> s\n'Café'\n>>> s.encode('utf-8')\nb'Caf\\xc3\\xa9'\n>>> s.encode('utf-8').decode('utf-8')\n\
    'Café'\n```\n\n### 2.4.2 Characters\n\nPython 2 takes all string characters as\
    \ bytes. In this case, the length of strings may be not equivalent to the number\
    \ of characters. For example, the length of Café is 5, not 4 because é is encoded\
    \ as a 2 bytes character.\n\n```\n>>> s= 'Café'\n>>> print([_c for _c in s])\n\
    ['C', 'a', 'f', '\\xc3', '\\xa9']\n>>> len(s)\n5\n>>> s = u'Café'\n>>> print([_c\
    \ for _c in s])\n[u'C', u'a', u'f', u'\\xe9']\n>>> len(s)\n4\n```\n\nPython 3\
    \ takes all string characters as Unicode code point. The length of a string is\
    \ always equivalent to the number of characters.\n\n```\n>>> s = 'Café'\n>>> print([_c\
    \ for _c in s])\n['C', 'a', 'f', 'é']\n>>> len(s)\n4\n>>> bs = bytes(s, encoding='utf-8')\n\
    >>> print(bs)\nb'Caf\\xc3\\xa9'\n>>> len(bs)\n5\n```\n\n### 2.4.3 Porting unicode(s,\
    \ 'utf-8')\n\nThe unicode() built-in function was removed in Python 3 so what\
    \ is the best way to convert the expression unicode(s, 'utf-8') so it works in\
    \ both Python 2 and 3?\n\nIn Python 2:\n\n```\n>>> s = 'Café'\n>>> unicode(s,\
    \ 'utf-8')\nu'Caf\\xe9'\n>>> s.decode('utf-8')\nu'Caf\\xe9'\n>>> unicode(s, 'utf-8')\
    \ == s.decode('utf-8')\nTrue\n```\n\nIn Python 3:\n\n```\n>>> s = 'Café'\n>>>\
    \ s.decode('utf-8')\nAttributeError: 'str' object has no attribute 'decode'\n\
    ```\n\nSo, the real answer is…\n\n### 2.4.4 Unicode Code Point\n\nord is a powerful\
    \ built-in function to get a Unicode code point from a given character. Consequently,\
    \ If we want to check a Unicode code point of a character, we can use ord.\n\n\
    ```\n>>> s = u'Café'\n>>> for _c in s: print('U+%04x' % ord(_c))\n...\nU+0043\n\
    U+0061\nU+0066\nU+00e9\n>>> u = '中文'\n>>> for _c in u: print('U+%04x' % ord(_c))\n\
    ...\nU+4e2d\nU+6587\n```\n\n### 2.4.5 Encoding\n\nA Unicode code point transfers\
    \ to a byte string is called encoding.\n\n```\n>>> s = u'Café'\n>>> type(s.encode('utf-8'))\n\
    <class 'bytes'>\n```\n\n### 2.4.6 Decoding\n\nA byte string transfers to a Unicode\
    \ code point is called decoding.\n\n```\n>>> s = bytes('Café', encoding='utf-8')\n\
    >>> s.decode('utf-8')\n'Café'\n```\n\n### 2.4.7 Unicode Normalization\n\nSome\
    \ characters can be represented in two similar form. For example, the character,\
    \ é can be written as e (Canonical Decomposition) or é (Canonical Composition).\
    \ In this case, we may acquire unexpected results when we are comparing two strings\
    \ even though they look alike. Therefore, we can normalize a Unicode form to solve\
    \ the issue.\n\n```\n# python 3\n>>> u1 = 'Café'        # unicode string\n>>>\
    \ u2 = 'Cafe\\u0301'\n>>> u1, u2\n('Café', 'Café')\n>>> len(u1), len(u2)\n(4,\
    \ 5)\n>>> u1 == u2\nFalse\n>>> u1.encode('utf-8') # get u1 byte string\nb'Caf\\\
    xc3\\xa9'\n>>> u2.encode('utf-8') # get u2 byte string\nb'Cafe\\xcc\\x81'\n>>>\
    \ from unicodedata import normalize\n>>> s1 = normalize('NFC', u1)  # get u1 NFC\
    \ format\n>>> s2 = normalize('NFC', u2)  # get u2 NFC format\n>>> s1 == s2\nTrue\n\
    >>> s1.encode('utf-8'), s2.encode('utf-8')\n(b'Caf\\xc3\\xa9', b'Caf\\xc3\\xa9')\n\
    >>> s1 = normalize('NFD', u1)  # get u1 NFD format\n>>> s2 = normalize('NFD',\
    \ u2)  # get u2 NFD format\n>>> s1, s2\n('Cafe\\u0301', 'Cafe\\u0301')\n>>> s1\
    \ == s2\nTrue\n>>> s1.encode('utf-8'), s2.encode('utf-8')\n(b'Cafe\\xcc\\x81',\
    \ b'Cafe\\xcc\\x81')\n```\n\n### 2.4.8 Avoid UnicodeDecodeError\n\nPython raises\
    \ *UnicodeDecodeError* when byte strings cannot decode to Unicode code points.\
    \ If we want to avoid this exception, we can pass *replace*, *backslashreplace*,\
    \ or *ignore* to errors argument in *decode*.\n\n```\n>>> u = b\"\\xff\"\n>>>\
    \ u.decode('utf-8', 'strict')\n    Traceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nUnicodeDecodeError: 'utf-8' codec can't decode\
    \ byte 0xff in position 0: invalid start byte\n>>> # use U+FFFD, REPLACEMENT CHARACTER\n\
    >>> u.decode('utf-8', \"replace\")\n'\\ufffd'\n>>> # inserts a \\xNN escape sequence\n\
    >>> u.decode('utf-8', \"backslashreplace\")\n'\\xff'\n>>> # leave the character\
    \ out of the Unicode result\n>>> u.decode('utf-8', \"ignore\")\n''\n```\n\n###\
    \ 2.4.9 Long String\n\nThe following snippet shows common ways to declare a multi-line\
    \ string in Python.\n\n```\n# original long string\ns = 'This is a very very very\
    \ long python string'\n\n# Single quote with an escaping backslash\ns = \"This\
    \ is a very very very \" \\\n    \"long python string\"\n```"
  mdcn: "## 2.3.3 Unicode\n\n作为 **print 函数** 的一部分，使文本转变为 Unicode 是另一个著名的决定。然而，如今许多现代编程语言的文本默认就是\
    \ Unicode。这一变化迫使我们及早解码文本，以防止在程序运行一段时间后出现运行时错误。更多信息请参阅 PEP 3112。\n\n```\n>>> type(\"\
