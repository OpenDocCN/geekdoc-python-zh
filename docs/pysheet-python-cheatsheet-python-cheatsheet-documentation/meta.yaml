- md: "## 4.4.7 References\n\n- PEP 572 - Assignment Expressions\n- What's New In\
    \ Python 3.8\n- PEP 572 and decision-making in Python\n- The PEP 572 endgame\n\
    - Use assignment expression in stdlib (combined PR)\n- Improper scope in list\
    \ comprehension, when used in class declaration\n\n## 4.5 Python Interpreter in\
    \ GNU Debugger\n\n- Table of Contents\n  - Python Interpreter in GNU Debugger\n\
    \    - Abstract\n    - Introduction\n    - Define Commands\n    - Dump Memory\n\
    \    - Dump JSON\n    - Highlight Syntax\n    - Tracepoints\n    - Profiling\n\
    \    - Pretty Print\n    - Conclusion\n    - Reference\n\n### 4.5.1 Abstract\n\
    \nThe GNU Debugger (GDB) is the most powerful debugging tool for developers to\
    \ troubleshoot errors in their code. However, it is hard for beginners to learn,\
    \ and that is why many programmers prefer to insert `print` to examine runtime\
    \ status. Fortunately, `GDB Text User Interface (TUI)` provides a way for developers\
    \ to review their source code and debug simultaneously. More excitingly, in GDB\
    \ 7, **Python Interpreter** was built into GDB. This feature offers more straightforward\
    \ ways to customize GDB printers and commands through the Python library. By discussing\
    \ examples, this article tries to explore advanced debugging techniques via Python\
    \ to develop tool kits for GDB.\n\n### 4.5.2 Introduction\n\nTroubleshooting software\
    \ bugs is a big challenge for developers. While GDB provides many “debug commands”\
    \ to inspect programs’ runtime status, its non-intuitive usages impede programmers\
    \ to use it to solve problems. Indeed, mastering GDB is a long-term process. However,\
    \ a quick start is not complicated; you must unlearn what you have learned like\
    \ Yoda. To better understand how to use Python in GDB, this article will focus\
    \ on discussing Python interpreter in GDB.\n\n### 4.5.3 Define Commands\n\nGDB\
    \ supports customizing commands by using `define`. It is useful to run a batch\
    \ of commands to troubleshoot at the same time. For example, a developer can display\
    \ the current frame information by defining a `sf` command.\n\n```\n# define in\
    \ .gdbinit\ndefine sf\n    where        # find out where the program is\n    info\
    \ args    # show arguments\n    info locals  # show local variables\nend\n```\n\
    \nHowever, writing a user-defined command may be inconvenient due to limited APIs.\
    \ Fortunately, by interacting with Python interpreter in GDB, developers can utilize\
    \ Python libraries to establish their debugging tool kits readily. The following\
    \ sections show how to use Python to simplify debugging processes.\n\n### 4.5.4\
    \ Dump Memory\n\nInspecting a process’s memory information is an effective way\
    \ to troubleshoot memory issues. Developers can acquire memory contents by `info\
    \ proc mappings` and `dump memory`. To simplify these steps, defining a customized\
    \ command is useful. However, the implementation is not straightforward by using\
    \ pure GDB syntax. Even though GDB supports conditions, processing output is not\
    \ intuitive. To solve this problem, using Python API in GDB would be helpful because\
    \ Python contains many useful operations for handling strings.\n\n```\n# mem.py\n\
    import gdb\nimport time\nimport re\n\nclass DumpMemory(gdb.Command):\n    \"\"\
    \"Dump memory info into a file.\"\"\"\n\n    def __init__(self):\n        super().__init__(\"\
    dm\", gdb.COMMAND_USER)\n\n    def get_addr(self, p, tty):\n        \"\"\"Get\
    \ memory addresses.\"\"\"\n        cmd = \"info proc mappings\"\n        out =\
    \ gdb.execute(cmd, tty, True)\n        addrs = []\n        for l in out.split(\"\
    \\n\"):\n            if re.match(f\".*{p}.*\", l):\n                s, e, *_ =\
    \ l.split()\n                addrs.append((s, e))\n\n    def dump(self, addrs):\n\
    \        \"\"\"Dump memory result.\"\"\"\n        if not addrs:\n            return\n\
    \n        for s, e in addrs:\n            f = int(time.time() * 1000)\n      \
    \      gdb.execute(f\"dump memory {f}.bin {s} {e}\")\n\n    def invoke(self, args,\
    \ tty):\n        try:\n            # cat /proc/self/maps\n            addrs =\
    \ self.get_addr(args, tty)\n            # dump memory\n            self.dump(addrs)\n\
    \        except Exception as e:\n            print(\"Usage: dm [pattern]\")\n\n\
    DumpMemory()\n```\n\nRunning the `dm` command will invoke `DumpMemory.invoke`.\
    \ By sourcing or implementing Python scripts in `.gdbinit`, developers can utilize\
    \ user-defined commands to trace bugs when a program is running. For example,\
    \ the following steps show how to invoke `DumpMemory` in GDB.\n\n```\n(gdb) start\n\
    ...\n(gdb) source mem.py  # source commands\n(gdb) dm stack       # dump stack\
    \ to ${timestamp}.bin\n(gdb) shell ls       # ls current dir\n1577283091687.bin\
    \  a.cpp  a.out  mem.py\n```\n\n### 4.5.5 Dump JSON\n\nParsing JSON is helpful\
    \ when a developer is inspecting a JSON string in a running program. GDB can parse\
    \ a `std::string` via `gdb.parse_and_eval` and return it as a `gdb.Value`. By\
    \ processing `gdb.Value`, developers can pass a JSON string into Python `json`\
    \ API and print it in a pretty format.\n\n```\n# dj.py\nimport gdb\nimport re\n\
    import json\n\nclass DumpJson(gdb.Command):\n    \"\"\"Dump std::string as a styled\
    \ JSON.\"\"\"\n\n    def __init__(self):\n        super().__init__(\"dj\", gdb.COMMAND_USER)\n\
    \n    def get_json(self, args):\n        \"\"\"Parse std::string to JSON string.\"\
    \"\"\n        ret = gdb.parse_and_eval(args)\n        typ = str(ret.type)\n  \
    \      if re.match(\"^std::.*::string\", typ):\n            return json.loads(str(ret))\n\
    \        return None\n\n    def invoke(self, args, tty):\n        try:\n     \
    \       # string to json string\n            s = self.get_json(args)\n       \
    \     # json string to object\n            o = json.loads(s)\n            print(json.dumps(o,\
    \ indent=2))\n        except Exception as e:\n            print(f\"Parse json\
    \ error! {args}\")\n\nDumpJson()\n```\n\nThe command `dj` displays a more readable\
    \ JSON format in GDB. This command helps improve visual recognition when a JSON\
    \ string is large. Also, by using this command, it can detect or monitor whether\
    \ a `std::string` is JSON or not.\n\n```\n(gdb) start\n(gdb) list\n1\t#include\
    \ <string>\n2\n3\tint main(int argc, char *argv[])\n4\t{\n5\t    std::string json\
    \ = R\"({\"foo\": \"FOO\",\"bar\": \"BAR\"})\";\n6\t    return 0;\n7\t}\n...\n\
    (gdb) ptype json\ntype = std::string\n(gdb) p json\n$1 = \"{\"foo\": \"FOO\",\"\
    bar\": \"BAR\"}\"\n(gdb) source dj.py\n(gdb) dj json\n{\n  \"foo\": \"FOO\",\n\
    \  \"bar\": \"BAR\"\n}\n```\n\n### 4.5.6 Highlight Syntax\n\nSyntax highlighting\
    \ is useful for developers to trace source code or to troubleshoot issues. By\
    \ using Pygments, applying color to the source is easy without defining ANSI escape\
    \ code manually. The following example shows how to apply color to the `list`\
    \ command output.\n\n```\nimport gdb\nfrom pygments import highlight\nfrom pygments.lexers\
    \ import CLexer\nfrom pygments.formatters import TerminalFormatter\n\nclass PrettyList(gdb.Command):\n\
    \    \"\"\"Print source code with color.\"\"\"\n\n    def __init__(self):\n  \
    \      super().__init__(\"pl\", gdb.COMMAND_USER)\n        self.lex = CLexer()\n\
    \        self.fmt = TerminalFormatter()\n\n    def invoke(self, args, tty):\n\
    \        try:\n            out = gdb.execute(f\"l {args}\", tty, True)\n     \
    \       print(highlight(out, self.lex, self.fmt))\n        except Exception as\
    \ e:\n            print(e)\n\nPrettyList()\n```\n\n### 4.5.7 Tracepoints\n\nAlthough\
    \ a developer can insert `printf`, `std::cout`, or `syslog` to inspect functions,\
    \ printing messages is not an effective way to debug when a project is enormous.\
    \ Developers may waste their time in building source code and may acquire little\
    \ information. Even worse, the output may become too much to detect problems.\
    \ In fact, inspecting functions or variables does not require embedding print\
    \ functions in code. By writing a Python script with GDB API, developers can customize\
    \ watchpoints to trace issues dynamically at runtime. For example, by implementing\
    \ a `gdb.Breakpoint` and a `gdb.Command`, it is useful for developers to acquire\
    \ essential information, such as parameters, call stacks, or memory usage.\n\n\
    ```\n# tp.py\nimport gdb\n\ntp = {}\n\nclass Tracepoint(gdb.Breakpoint):\n   \
    \ def __init__(self, *args):\n        super().__init__(*args)\n        self.silent\
    \ = True\n        self.count = 0\n\n    def stop(self):\n        self.count +=\
    \ 1\n        frame = gdb.newest_frame()\n        block = frame.block()\n     \
    \   sym_and_line = frame.find_sal()\n        framename = frame.name()\n      \
    \  filename = sym_and_line.symtab.filename\n        line = sym_and_line.line\n\
    \        # show tracepoint info\n        print(f\"{framename} @ {filename}:{line}\"\
    )\n        # show args and vars\n        for s in block:\n            if not s.is_argument\
    \ and not s.is_variable:\n                continue\n            typ = s.type\n\
    \            val = s.value(frame)\n            size = typ.sizeof\n           \
    \ name = s.name\n            print(f\"\\t{name}({typ}: {val}) [{size}]\")\n  \
    \      # do not stop at tracepoint\n        return False\n\nclass SetTracepoint(gdb.Command):\n\
    \    def __init__(self):\n        super().__init__(\"tp\", gdb.COMMAND_USER)\n\
    \n    def invoke(self, args, tty):\n        try:\n            global tp\n    \
    \        tp[args] = Tracepoint(args)\n        except Exception as e:\n       \
