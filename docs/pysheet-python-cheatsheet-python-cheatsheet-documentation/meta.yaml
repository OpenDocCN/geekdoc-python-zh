    # ## 2.5.1 From Scratch


    There are so many ways that we can manipulate lists in Python. Before we start
    to learn those versatile manipulations, the following snippet shows the most common
    operations of lists.


    ```

    python

    >>> a = [1, 2, 3, 4, 5]

    >>> # contains

    >>> 2 in a

    True

    >>> # positive index

    >>> a[0]

    1

    >>> # negative index

    >>> a[-1]

    5

    >>> # slicing list[start:end:step]

    >>> a[1:]

    [2, 3, 4, 5]

    >>> a[1:-1]

    [2, 3, 4]

    >>> a[1:-1:2]

    [2, 4]

    >>> # reverse

    >>> a[::-1]

    [5, 4, 3, 2, 1]

    >>> a[:0:-1]

