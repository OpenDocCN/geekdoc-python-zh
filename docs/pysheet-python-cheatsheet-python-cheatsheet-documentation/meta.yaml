    >>> m.group(2)

    ''2016-01''

    >>> m.group(3)

    ''2016''

    ```


    # 3.1.4 Non capturing group


    ```

    # non capturing group

    >>> url = ''http://stackoverflow.com/''

    >>> m = re.search(''(?:http|ftp)://([^/\r\n]+)(/[^\r\n]*)?'', url)

    >>> m.groups()

    (''stackoverflow.com'', ''/'')


    # capturing group

    >>> m = re.search(''(http|ftp)://([^/\r\n]+)(/[^\r\n]*)?'', url)

    >>> m.groups()

    (''http'', ''stackoverflow.com'', ''/'')

    ```'
