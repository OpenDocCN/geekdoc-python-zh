- md: "## CHAPTER FOUR\n\n## APPENDIX\n\nThe appendix mainly focuses on some critical\
    \ concepts missing in cheat sheets.\n\n## 4.1 Why does Decorator Need @wraps\n\
    \n@wraps preserve attributes of the original function, otherwise attributes of\
    \ the decorated function will be replaced by **wrapper function**. For example\n\
    \nWithout @wraps\n\n```\n>>> def decorator(func):\n...     def wrapper(*args,\
    \ **kwargs):\n...         print('wrap function')\n...         return func(*args,\
    \ **kwargs)\n...     return wrapper\n...\n>>> @decorator\n... def example(*a,\
    \ **kw):\n...     pass\n...\n>>> example.__name__  # attr of function lose\n'wrapper'\n\
    ```\n\nWith @wraps\n\n```\n>>> from functools import wraps\n>>> def decorator(func):\n\
    ...     @wraps(func)\n...     def wrapper(*args, **kwargs):\n...         print('wrap\
    \ function')\n...         return func(*args, **kwargs)\n...     return wrapper\n\
    ...\n>>> @decorator\n... def example(*a, **kw):\n...     pass\n...\n>>> example.__name__\
    \  # attr of function preserve\n'example'\n```\n\n## 4.2 A Hitchhikers Guide to\
    \ Asynchronous Programming\n\n- Table of Contents\n    - A Hitchhikers Guide to\
    \ Asynchronous Programming\n        - Abstract\n        - Introduction\n     \
    \   - Callback Functions\n        - Event Loop\n        - What is a Coroutine?\n\
    \        - Conclusion\n        - Reference\n\n### 4.2.1 Abstract\n\nThe C10k problem\
    \ is still a puzzle for a programmer to find a way to solve it. Generally, developers\
    \ deal with extensive I/O operations via thread, epoll, or kqueue to avoid their\
    \ software waiting for an expensive task. However, developing a readable and bug-free\
    \ concurrent code is challenging due to data sharing and job dependency. Even\
    \ though some powerful tools, such as Valgrind, help developers to detect deadlock\
    \ or other asynchronous issues, solving these problems may be time-consuming when\
    \ the scale of software grows large. Therefore, many programming languages such\
    \ as Python, Javascript, or C++ dedicated to developing better libraries, frameworks,\
    \ or syntaxes to assist programmers in managing concurrent jobs properly. Instead\
    \ of focusing on how to use modern parallel APIs, this article mainly concentrates\
    \ on the design philosophy behind asynchronous programming patterns.\n\nUsing\
    \ threads is a more natural way for developers to dispatch tasks without blocking\
    \ the main thread. However, threads may lead to performance issues such as locking\
    \ critical sections to do some atomic operations. Although using event-loop can\
    \ enhance performance in some cases, writing readable code is challenging due\
    \ to callback problems (e.g., callback hell). Fortunately, programming languages\
    \ like Python introduced a concept, async/await, to help developers write understandable\
    \ code with high performance. The following figure shows the main goal by using\
    \ async/await to handle socket connections like utilizing threads.\n\n```\nasync\
    \ def handler(conn):\n    while True:\n        msg = await loop.sock_recv(conn,\
    \ 1024)\n        if not msg:\n            break\n        await loop.sock_sendall(conn,\
    \ msg)\n    conn.close()\n\nasync def server():\n    while True:\n        conn,\
    \ addr = await loop.sock_accept(s)\n        loop.create_task(handler(conn))\n\n\
    loop.create_task(server())\nloop.run_forever()\n```\n\n```\ndef handler(conn):\n\
    \    while True:\n        msg = conn.recv(1024)\n        if not msg:\n       \
    \     break\n        conn.send(msg)\n    conn.close()\n\ndef server():\n    while\
    \ True:\n        conn, addr = s.accept()\n        t = threading.Thread(target=handler,\
    \ args=(conn,))\n        t.start()\n\nserver()\n```\n\nEvent Loop\n\nThread\n\n\
    ### 4.2.2 Introduction\n\nHandling I/O operations such as network connections\
    \ is one of the most expensive tasks in a program. Take a simple TCP blocking\
    \ echo server as an example (The following snippet). If a client connects to the\
    \ server successfully without sending any request, it blocks others' connections.\
    \ Even though clients send data as soon as possible, the server cannot handle\
    \ other requests if there is no client trying to establish a connection. Also,\
    \ handling multiple requests is inefficient because it wastes a lot of time waiting\
    \ for I/O responses from hardware such as network interfaces. Thus, socket programming\
    \ with concurrency becomes inevitable to manage extensive requests.\n\n```\nimport\
    \ socket\n\ns = socket.socket(socket.AF_INET, socket.SOCK_STREAM, 0)\ns.setsockopt(socket.SOL_SOCKET,\
    \ socket.SO_REUSEADDR, 1)\ns.bind((\"127.0.0.1\", 5566))\ns.listen(10)\n\nwhile\
    \ True:\n    conn, addr = s.accept()\n    msg = conn.recv(1024)\n    conn.send(msg)\n\
    ```\n\nOne possible solution to prevent a server waiting for I/O operations is\
    \ to dispatch tasks to other threads. The following example shows how to create\
    \ a thread to handle connections simultaneously. However, creating numerous threads\
    \ may consume all computing power without high throughput. Even worse, an application\
    \ may waste time waiting for a lock to process tasks in critical sections. Although\
    \ using threads can solve blocking issues for a socket server, other factors,\
    \ such as CPU utilization, are essential for a programmer to overcome the C10k\
    \ problem. Therefore, without creating unlimited threads, the event loop is another\
    \ solution to manage connections.\n\n```\nimport threading\nimport socket\n\n\
    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\ns.setsockopt(socket.SOL_SOCKET,\
    \ socket.SO_REUSEADDR, 1)\ns.bind((\"127.0.0.1\", 5566))\ns.listen(10240)\n\n\
    def handler(conn):\n    while True:\n        msg = conn.recv(65535)\n        conn.send(msg)\n\
    \nwhile True:\n    conn, addr = s.accept()\n    t = threading.Thread(target=handler,\
    \ args=(conn,))\n    t.start()\n```\n\nA simple event-driven socket server includes\
    \ three main components: an I/O multiplexing module (e.g., `select`), a scheduler\
    \ (loop), and callback functions (events). For example, the following server utilizes\
    \ the high-level I/O multiplexing, `selectors`, within a loop to check whether\
    \ an I/O operation is ready or not. If data is available to read/write, the loop\
    \ acquires I/O events and execute callback functions, `accept`, `read`, or `write`,\
    \ to finish tasks.\n\n```\nimport socket\n\nfrom selectors import DefaultSelector,\
    \ EVENT_READ, EVENT_WRITE\nfrom functools import partial\n\ns = socket.socket(socket.AF_INET,\
    \ socket.SOCK_STREAM)\ns.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n\
    s.bind((\"127.0.0.1\", 5566))\ns.listen(10240)\ns.setblocking(False)\n\nsel =\
    \ DefaultSelector()\n\ndef accept(s, mask):\n    conn, addr = s.accept()\n   \
    \ conn.setblocking(False)\n    sel.register(conn, EVENT_READ, read)\n\ndef read(conn,\
    \ mask):\n    msg = conn.recv(65535)\n    if not msg:\n        sel.unregister(conn)\n\
    \        return conn.close()\n    sel.modify(conn, EVENT_WRITE, partial(write,\
    \ msg=msg))\n\ndef write(conn, mask, msg=None):\n    if msg:\n        conn.send(msg)\n\
    \    sel.modify(conn, EVENT_READ, read)\n\nsel.register(s, EVENT_READ, accept)\n\
