    \ def example():\n...     \"\"\"This is an example function.\"\"\"\n...     print(\"\
    Example function\")\n...\n>>> example.__doc__\n'This is an example function.'\n\
    >>> help(example)\n```\n\n### 2.9.2 Default Arguments\n\nDefining a function where\
    \ the arguments are optional and have a default value is quite simple in Python.\
    \ We can just assign values in the definition and make sure the default arguments\
    \ appear in the end.\n\n```python\n>>> def add(a, b=0):\n...     return a + b\n\
    ...\n>>> add(1)\n1\n>>> add(1, 2)\n3\n>>> add(1, b=2)\n3\n```\n\n### 2.9.3 Option\
    \ Arguments\n\n```python\n>>> def example(a, b=None, *args, **kwargs):\n...  \
