    \ Node(3)]\n>>> nodes.sort(key=lambda x: x.val, reverse=True)\n>>> nodes\n[Node(3),\
    \ Node(2), Node(1)]\n```\n\n上面的代码片段可以通过使用 `operator.attrgetter` 来简化。该函数返回一个基于属性名称的属性\
    \ getter。请注意，该属性必须是可比较的；否则，`sorted` 或 `list.sort` 将抛出 `TypeError`。\n\n```python\n\
    >>> from operator import attrgetter\n>>> class Node(object):\n...     def __init__(self,\
    \ val):\n...         self.val = val\n...     def __repr__(self):\n...        \
    \ return f\"Node({self.val})\"\n...\n>>> nodes = [Node(3), Node(2), Node(1)]\n\
    >>> nodes.sort(key=attrgetter('val'))\n>>> nodes\n[Node(1), Node(2), Node(3)]\n\
    ```\n\n如果一个对象有 `__lt__` 方法，这意味着该对象是可比较的，`sorted` 或 `list.sort` 不需要为其 key 参数输入键函数。一个列表或可迭代序列可以直接排序。\n\
    \n```python\n>>> class Node(object):\n...     def __init__(self, val):\n...  \
    \       self.val = val\n...     def __repr__(self):\n...         return f\"Node({self.val})\"\
    \n...     def __lt__(self, other):\n...         return self.val - other.val <\
    \ 0\n...\n>>> nodes = [Node(3), Node(2), Node(1)]\n>>> nodes.sort()\n>>> nodes\n\
    [Node(1), Node(2), Node(3)]\n```\n\n如果一个对象没有 `__lt__` 方法，很可能在对象类声明后为该对象打补丁。换句话说，打补丁之后，该对象就变得可比较了。\n\
    \n```python\n>>> class Node(object):\n...     def __init__(self, val):\n...  \
    \       self.val = val\n...     def __repr__(self):\n...         return f\"Node({self.val})\"\
    \n...\n>>> Node.__lt__ = lambda s, o: s.val < o.val\n>>> nodes = [Node(3), Node(2),\
    \ Node(1)]\n>>> nodes.sort()\n>>> nodes\n[Node(1), Node(2), Node(3)]\n```\n\n\
    请注意，Python3 中的 `sorted` 或 `list.sort` 不支持 `cmp` 参数，该参数在 Python2 中是**唯一**有效的参数。如果需要使用旧的比较函数，例如一些遗留代码，`functools.cmp_to_key`\
    \ 很有用，因为它将比较函数转换为键函数。\n\n```python\n>>> from functools import cmp_to_key\n>>>\
