    \ntypedef struct {\n    PyObject *sec;\n    PyObject *py_callback;\n} foo_args;\n\
    \nvoid *\nfoo_thread(void *args)\n{\n    long n = -1;\n    PyObject *rv = NULL,\
    \ *sec = NULL, *py_callback = NULL;\n    foo_args *a = NULL;\n\n    if (!args)\n\
    \        return NULL;\n\n    a = (foo_args *)args;\n    sec = a->sec;\n    py_callback\
    \ = a->py_callback;\n\n    n = PyLong_AsLong(sec);\n    if ((n == -1) && PyErr_Occurred())\
    \ {\n        return NULL;\n    }\n\n    sleep(n);  // slow task\n\n    // acquire\
    \ the GIL\n    PyGILState_STATE state = PyGILState_Ensure();\n    rv = PyObject_CallFunction(py_callback,\
    \ \"s\", \"Awesome Python!\");\n    // release the GIL\n    PyGILState_Release(state);\n\
    \    Py_XDECREF(rv);\n    return NULL;\n}\n\nstatic PyObject *\nfoo(PyObject *self,\
    \ PyObject *args)\n{\n    long i = 0, n = 0;\n    pthread_t *arr = NULL;\n   \
    \ PyObject *py_callback = NULL;\n    PyObject *sec = NULL, *num = NULL;\n    PyObject\
    \ *rv = NULL;\n    foo_args a = {};\n\n    if (!PyArg_ParseTuple(args, \"OOO:callback\"\
    , &num, &sec, &py_callback))\n        return NULL;\n\n    // allow releasing GIL\n\
    \    Py_BEGIN_ALLOW_THREADS\n\n    if (!PyLong_Check(sec) || !PyLong_Check(num))\
    \ {\n        PyErr_SetString(PyExc_TypeError, \"should be int\");\n        goto\
    \ error;\n    }\n\n    if (!PyCallable_Check(py_callback)) {\n        PyErr_SetString(PyExc_TypeError,\
    \ \"should be callable\");\n        goto error;\n    }\n\n    n = PyLong_AsLong(num);\n\
    \    if (n == -1 && PyErr_Occurred())\n        goto error;\n\n    arr = (pthread_t\
    \ *)PyMem_RawCalloc(n, sizeof(pthread_t));\n    if (!arr)\n        goto error;\n\
    \n    a.sec = sec;\n    a.py_callback = py_callback;\n    for (i = 0; i < n; i++)\
    \ {\n        if (pthread_create(&arr[i], NULL, foo_thread, &a)) {\n          \
    \  PyErr_SetString(PyExc_TypeError, \"create a thread failed\");\n           \
    \ goto error;\n        }\n    }\n\n    for (i = 0; i < n; i++) {\n        if (pthread_join(arr[i],\
    \ NULL)) {\n            PyErr_SetString(PyExc_TypeError, \"thread join failed\"\
    );\n            goto error;\n        }\n    }\n    Py_XINCREF(Py_None);\n    rv\
    \ = Py_None;\nerror:\n    PyMem_RawFree(arr);\n    Py_XDECREF(sec);\n    Py_XDECREF(num);\n\
    \    Py_XDECREF(py_callback);\n    // restore GIL\n    Py_END_ALLOW_THREADS\n\
    \    return rv;\n}\n\nstatic PyMethodDef methods[] = {\n    {\"foo\", (PyCFunction)foo,\
    \ METH_VARARGS, NULL},\n    {NULL, NULL, 0, NULL}\n};\n\nstatic struct PyModuleDef\
    \ module = {\n    PyModuleDef_HEAD_INIT, \"foo\", NULL, -1, methods\n};\n\nPyMODINIT_FUNC\
    \ PyInit_foo(void)\n{\n    return PyModule_Create(&module);\n}\n```\n\noutput:\n\
