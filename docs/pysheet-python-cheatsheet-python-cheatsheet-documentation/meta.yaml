    \  - Access Attributes\n    - Performance of C Extension\n    - Performance of\
    \ ctypes\n    - ctypes Error handling\n\n## 3.10.1 Simple setup.py\n\n```python\n\
    from distutils.core import setup, Extension\n\next = Extension('foo', sources=['foo.c'])\n\
    setup(name=\"Foo\", version=\"1.0\", ext_modules=[ext])\n```\n\n## 3.10.2 Customize\
    \ CFLAGS\n\n```python\nimport sysconfig\nfrom distutils.core import setup, Extension\n\
    \ncflags = sysconfig.get_config_var(\"CFLAGS\")\n\nextra_compile_args = cflags.split()\n\
    extra_compile_args += [\"-Wextra\"]\n\next = Extension(\n    \"foo\", [\"foo.c\"\
    ],\n    extra_compile_args=extra_compile_args\n)\n\nsetup(name=\"foo\", version=\"\
    1.0\", ext_modules=[ext])\n```\n\n## 3.10.3 Doc String\n\n```c\nPyDoc_STRVAR(doc_mod,\
    \ \"Module document\\n\");\nPyDoc_STRVAR(doc_foo, \"foo() -> None\\n\\nFoo doc\"\
    );\n\nstatic PyMethodDef methods[] = {\n    {\"foo\", (PyCFunction)foo, METH_NOARGS,\
    \ doc_foo},\n    {NULL, NULL, 0, NULL}\n};\n\nstatic struct PyModuleDef module\
    \ = {\n    .m_base    = PyModuleDef_HEAD_INIT,\n    .m_name    = \"Foo\",\n  \
    \  .m_doc     = doc_mod,\n    .m_size    = -1,\n    .m_methods = methods\n};\n\
    ```\n\n## 3.10.4 Simple C Extension\n\nfoo.c\n\n```c\n#include <Python.h>\n\n\
    PyDoc_STRVAR(doc_mod, \"Module document\\n\");\nPyDoc_STRVAR(doc_foo, \"foo()\
    \ -> None\\n\\nFoo doc\");\n\nstatic PyObject* foo(PyObject* self)\n{\n    PyObject*\
    \ s = PyUnicode_FromString(\"foo\");\n    PyObject_Print(s, stdout, 0);\n    Py_RETURN_NONE;\n\
    }\n\nstatic PyMethodDef methods[] = {\n    {\"foo\", (PyCFunction)foo, METH_NOARGS,\
    \ doc_foo},\n    {NULL, NULL, 0, NULL}\n};\n\nstatic struct PyModuleDef module\
    \ = {\n    PyModuleDef_HEAD_INIT, \"Foo\", doc_mod, -1, methods\n};\n\nPyMODINIT_FUNC\
    \ PyInit_foo(void)\n{\n    return PyModule_Create(&module);\n}\n```\n\noutput:\n\
    \n```\n$ python setup.py -q build\n$ python setup.py -q install\n$ python -c \"\
    import foo; foo.foo()\"\n'foo'\n```\n\n## 3.10.5 Release the GIL\n\n```c\n#include\
    \ <Python.h>\n\nstatic PyObject* foo(PyObject* self)\n{\n    Py_BEGIN_ALLOW_THREADS\n\
    \    sleep(3);\n    Py_END_ALLOW_THREADS\n    Py_RETURN_NONE;\n}\n\nstatic PyMethodDef\
    \ methods[] = {\n    {\"foo\", (PyCFunction)foo, METH_NOARGS, NULL},\n    {NULL,\
    \ NULL, 0, NULL}\n};\n\nstatic struct PyModuleDef module = {\n    PyModuleDef_HEAD_INIT,\
    \ \"Foo\", NULL, -1, methods\n};\n\nPyMODINIT_FUNC PyInit_foo(void)\n{\n    return\
    \ PyModule_Create(&module);\n}\n```\n\noutput:\n\n```\n$ python setup.py -q build\n\
    $ python setup.py -q install\n$ python -c \"\n> import threading\n> import foo\n\
    > from datetime import datetime\n> def f(n):\n>     now = datetime.now()\n>  \
