    ```

    >>> import os

    >>> dirs = os.listdir(".")

    ```


    After Python 3.6, we can use os.scandir to list a directory. It is more convenient
    because os.scandir return an iterator of os.DirEntry objects. In this case, we
    can get file information through access the attributes of os.DirEntry. Further
    information can be found on the document.


    ```

    >>> with os.scandir("foo") as it:

    ...     for entry in it:

    ...         st = entry.stat()

    ...

    ```


