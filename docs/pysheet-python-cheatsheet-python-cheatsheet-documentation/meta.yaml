    # 2.2.11 String


    Unlike other programming languages, Python does not support string’s item assignment
    directly. Therefore, if it is necessary to manipulate string’s items, e.g., swap
    items, we have to convert a string to a list and do a join operation after a series
    item assignments finish.


    ```

    >>> a = "Hello Python"

    >>> l = list(a)

    >>> l[0], l[6] = ''h'', ''p''

    >>> ''''.join(l)

    ''hello python''

    ```


    # 2.2.12 List


    Lists are versatile containers. Python provides a lot of ways such as **negative
    index**, **slicing statement**, or **list comprehension** to manipulate lists.
    The following snippet shows some common operations of lists.


    ```

    >>> a = [1, 2, 3, 4, 5]

    >>> a[-1]                    # negative index

    5

    >>> a[1:]                    # slicing

    [2, 3, 4, 5]

    >>> a[1:-1]

    [2, 3, 4]

    >>> a[1:-1:2]

    [2, 4]

    >>> a[::-1]                  # reverse

    [5, 4, 3, 2, 1]

    >>> a[0] = 0                 # set an item

    >>> a

    [0, 2, 3, 4, 5]

    >>> a.append(6)              # append an item

    >>> a

    [0, 2, 3, 4, 5, 6]

    >>> del a[-1]                # del an item

    >>> a

    [0, 2, 3, 4, 5]

    >>> b = [x for x in range(3)] # list comprehension

    >>> b

    [0, 1, 2]

    >>> a + b                    # add two lists

    [0, 2, 3, 4, 5, 0, 1, 2]

    ```'
