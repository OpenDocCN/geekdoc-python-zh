    >>> n = 0\n>>> while True:\n...     n += 1\n...     if n == 5:\n...         break\n\
    ...\n>>> n\n5\n```\n\n### 2.2.10 try ... except ... else ...\n\n大多数时候，我们在 except\
    \ 子句中处理错误，在 finally 子句中清理资源。有趣的是，try 语句也提供了一个 else 子句，以便我们避免捕获到不应由 try ... except\
