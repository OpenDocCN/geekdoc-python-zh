    \        func = frame.function().name\n        filename = sym_and_line.symtab.filename\n\
    \        line = sym_and_line.line\n        block = frame.block()\n\n        args\
    \ = []\n        for s in block:\n            if not s.is_argument:\n         \
    \       continue\n            name = s.name\n            typ = s.type\n      \
    \      val = s.value(frame)\n            args.append(f\"{name}: {val} [{typ}]\"\
    )\n\n        # format\n        out = \"\"\n        out += f\"{func} @ {filename}:{line}\\\
    n\"\n        for a in args:\n            out += f\"\\t{a}\\n\"\n\n        # append\
    \ current status to a breakpoint stack\n        self.stack.append((start, out))\n\
    \        EndPoint(self, internal=True)\n        return False\n```\n\n```\nclass\
    \ Profile(gdb.Command):\n    def __init__(self):\n        super().__init__(\"\
    prof\", gdb.COMMAND_USER)\n\n    def invoke(self, args, tty):\n        try:\n\
    \            StartPoint(args)\n        except Exception as e:\n            print(e)\n\
    ```"
