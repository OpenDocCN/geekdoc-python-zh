- md: "## 2.5.13 Delegating Iterations\n\nIf a custom container class holds a list\
    \ and we want iterations to work on the container, we can implement a `__iter__`\
    \ method to delegate iterations to the list. Note that the method, `__iter__`,\
    \ should return an *iterator object*, so we cannot return the list directly; otherwise,\
    \ Python raises a `TypeError`.\n\n```python\nclass Stack:\n\n    def __init__(self):\n\
    \        self.__list = []\n\n    def push(self, val):\n        self.__list.append(val)\n\
    \n    def pop(self):\n        return self.__list.pop()\n\n    def __iter__(self):\n\
    \        return iter(self.__list)\n\nstack = Stack()\nstack.push(1)\nstack.push(2)\n\
    for s in stack:\n    print(s)\n```\n\nExample\n\n```\n$ python stack.py\n1\n2\n\
    ```\n\n## 2.5.14 Sorting\n\nPython list provides a built-in `list.sort` method\
    \ which sorts a list *in-place* without using extra memory. Moreover, the return\
    \ value of `list.sort` is `None` in order to avoid confusion with `sorted` and\
    \ the function can only be used for list.\n\n```python\n>>> l = [5, 4, 3, 2, 1]\n\
    >>> l.sort()\n>>> l\n[1, 2, 3, 4, 5]\n>>> l.sort(reverse=True)\n>>> l\n[5, 4,\
    \ 3, 2, 1]\n```\n\nThe `sorted` function does not modify any iterable object in-place.\
    \ Instead, it returns a new sorted list. Using `sorted` is safer than `list.sort`\
    \ if some list's elements are read-only or immutable. Besides, another difference\
    \ between `list.sort` and `sorted` is that `sorted` accepts any **iterable object**.\n\
    \n```python\n>>> l = [5, 4, 3, 2, 1]\n>>> new = sorted(l)\n>>> new\n[1, 2, 3,\
    \ 4, 5]\n>>> l\n[5, 4, 3, 2, 1]\n>>> d = {3: 'andy', 2: 'david', 1: 'amy'}\n>>>\
    \ sorted(d)  # sort iterable\n[1, 2, 3]\n```\n\nTo sort a list with its elements\
    \ are tuples, using `operator.itemgetter` is helpful because it assigns a key\
    \ function to the sorted key parameter. Note that the key should be comparable;\
    \ otherwise, it will raise a `TypeError`.\n\n```python\n>>> from operator import\
    \ itemgetter\n>>> l = [('andy', 10), ('david', 8), ('amy', 3)]\n>>> l.sort(key=itemgetter(1))\n\
    >>> l\n[('amy', 3), ('david', 8), ('andy', 10)]\n```\n\n`operator.itemgetter`\
    \ is useful because the function returns a getter method which can be applied\
    \ to other objects with a method `__getitem__`. For example, sorting a list with\
    \ its elements are dictionary can be achieved by using `operator.itemgetter` due\
    \ to all elements have `__getitem__`.\n\n```python\n>>> from pprint import pprint\n\
    >>> from operator import itemgetter\n>>> l = [\n...     {'name': 'andy', 'age':\
    \ 10},\n...     {'name': 'david', 'age': 8},\n...     {'name': 'amy', 'age': 3},\n\
    ... ]\n>>> l.sort(key=itemgetter('age'))\n>>> pprint(l)\n[{'age': 3, 'name': 'amy'},\n\
    \ {'age': 8, 'name': 'david'},\n {'age': 10, 'name': 'andy'}]\n```\n\nIf it is\
    \ necessary to sort a list with its elements are neither comparable nor having\
    \ `__getitem__` method, assigning a customized key function is feasible.\n\n```python\n\
    >>> class Node(object):\n...     def __init__(self, val):\n...         self.val\
    \ = val\n...     def __repr__(self):\n...         return f\"Node({self.val})\"\
    \n...\n>>> nodes = [Node(3), Node(2), Node(1)]\n>>> nodes.sort(key=lambda x: x.val)\n\
    >>> nodes\n[Node(1), Node(2), Node(3)]\n>>> nodes.sort(key=lambda x: x.val, reverse=True)\n\
    >>> nodes\n[Node(3), Node(2), Node(1)]\n```\n\nThe above snippet can be simplified\
    \ by using `operator.attrgetter`. The function returns an attribute getter based\
    \ on the attribute's name. Note that the attribute should be comparable; otherwise,\
    \ `sorted` or `list.sort` will raise `TypeError`.\n\n```python\n>>> from operator\
    \ import attrgetter\n>>> class Node(object):\n...     def __init__(self, val):\n\
    ...         self.val = val\n...     def __repr__(self):\n...         return f\"\
    Node({self.val})\"\n...\n>>> nodes = [Node(3), Node(2), Node(1)]\n>>> nodes.sort(key=attrgetter('val'))\n\
    >>> nodes\n[Node(1), Node(2), Node(3)]\n```\n\nIf an object has `__lt__` method,\
    \ it means that the object is comparable and sorted or `list.sort` is not necessary\
    \ to input a key function to its key parameter. A list or an iterable sequence\
    \ can be sorted directly.\n\n```python\n>>> class Node(object):\n...     def __init__(self,\
    \ val):\n...         self.val = val\n...     def __repr__(self):\n...        \
    \ return f\"Node({self.val})\"\n...     def __lt__(self, other):\n...        \
    \ return self.val - other.val < 0\n...\n>>> nodes = [Node(3), Node(2), Node(1)]\n\
    >>> nodes.sort()\n>>> nodes\n[Node(1), Node(2), Node(3)]\n```\n\nIf an object\
    \ does not have `__lt__` method, it is likely to patch the method after a declaration\
    \ of the object's class. In other words, after the patching, the object becomes\
    \ comparable.\n\n```python\n>>> class Node(object):\n...     def __init__(self,\
    \ val):\n...         self.val = val\n...     def __repr__(self):\n...        \
    \ return f\"Node({self.val})\"\n...\n>>> Node.__lt__ = lambda s, o: s.val < o.val\n\
    >>> nodes = [Node(3), Node(2), Node(1)]\n>>> nodes.sort()\n>>> nodes\n[Node(1),\
    \ Node(2), Node(3)]\n```\n\nNote that sorted or `list.sort` in Python3 does not\
    \ support cmp parameter which is an **ONLY** valid argument in Python2. If it\
    \ is necessary to use an old comparison function, e.g., some legacy code, `functools.cmp_to_key`\
    \ is useful since it converts a comparison function to a key function.\n\n```python\n\
    >>> from functools import cmp_to_key\n>>> class Node(object):\n...     def __init__(self,\
    \ val):\n...         self.val = val\n...     def __repr__(self):\n...        \
    \ return f\"Node({self.val})\"\n...\n>>> nodes = [Node(3), Node(2), Node(1)]\n\
    >>> nodes.sort(key=cmp_to_key(lambda x,y: x.val - y.val))\n>>> nodes\n[Node(1),\
    \ Node(2), Node(3)]\n```\n\n## 2.5.15 Sorted List\n\n```python\nimport bisect\n\
    \nclass Foo(object):\n    def __init__(self, k):\n        self.k = k\n\n    def\
    \ __eq__(self, rhs):\n        return self.k == rhs.k\n\n    def __ne__(self, rhs):\n\
    \        return self.k != rhs.k\n\n    def __lt__(self, rhs):\n        return\
    \ self.k < rhs.k\n\n    def __gt__(self, rhs):\n        return self.k > rhs.k\n\
    \n    def __le__(self, rhs):\n        return self.k <= rhs.k\n\n    def __ge__(self,\
    \ rhs):\n        return self.k >= rhs.k\n\n    def __repr__(self):\n        return\
    \ f\"Foo({self.k})\"\n\n    def __str__(self):\n        return self.__repr__()\n\
    \nfoo = [Foo(1), Foo(3), Foo(2), Foo(0)]\nbar = []\nfor x in foo:\n    bisect.insort(bar,\
    \ x)\n\nprint(bar) # [Foo(0), Foo(1), Foo(2), Foo(3)]\n```\n\n## 2.5.16 New a\
    \ List\n\n```python\n# new a list with size = 3\n\n>>> [0] * 3\n[0, 0, 0]\n\n\
    # new a 2d list with size 3x3\n\n>>> [[0] * 3 for _ in range(3)]\n[[0, 0, 0],\
    \ [0, 0, 0], [0, 0, 0]]\n```\n\nNote that we should avoid creating a multi-dimension\
    \ list via the following snippet because all objects in the list point to the\
    \ same address.\n\n```python\n>>> a = [[0] * 3] * 3\n>>> a\n[[0, 0, 0], [0, 0,\
    \ 0], [0, 0, 0]]\n>>> a[1][1] = 2\n>>> a\n[[0, 2, 0], [0, 2, 0], [0, 2, 0]]\n\
    ```\n\n## 2.5.17 Circular Buffer\n\n```python\n>>> from collections import deque\n\
    >>> d = deque(maxlen=8)\n>>> for x in range(9):\n...     d.append(x)\n...\n>>>\
    \ d\ndeque([1, 2, 3, 4, 5, 6, 7, 8], maxlen=8)\n```\n\n```python\n>>> from collections\
    \ import deque\n>>> def tail(path, n=10):\n...     with open(path) as f:\n...\
    \         return deque(f, n)\n...\n>>> tail(\"/etc/hosts\")\n```\n\n## 2.5.18\
    \ Chunk\n\n```python\n>>> def chunk(lst, n):\n...     for i in range(0, len(lst),\
    \ n):\n...         yield lst[i:i+n]\n...\n>>> a = [1, 2, 3, 4, 5, 6, 7, 8]\n>>>\
    \ list(chunk(a, 3))\n[[1, 2, 3], [4, 5, 6], [7, 8]]\n```\n\n## 2.5.19 Groupby\n\
    \n```python\n>>> import itertools\n>>> s = \"AAABBCCCCC\"\n>>> for k, v in itertools.groupby(s):\n\
    ...     print(k, list(v))\n...\nA ['A', 'A', 'A']\nB ['B', 'B']\nC ['C', 'C',\
    \ 'C', 'C', 'C']\n\n# group by key\n\n>>> x = [('gp1', 'a'), ('gp2', 'b'), ('gp2',\
    \ 'c')]\n>>> for k, v in itertools.groupby(x, lambda x: x[0]):\n...     print(k,\
    \ list(v))\n...\ngp1 [('gp1', 'a')]\ngp2 [('gp2', 'b'), ('gp2', 'c')]\n```\n\n\
    ## 2.5.20 Binary Search\n\n```python\n>>> def binary_search(arr, x, lo=0, hi=None):\n\
    ...     if not hi: hi = len(arr)\n...     pos = bisect_left(arr, x, lo, hi)\n\
    ...     return pos if pos != hi and arr[pos] == x else -1\n...\n>>> a = [1, 1,\
    \ 1, 2, 3]\n>>> binary_search(a, 1)\n0\n>>> binary_search(a, 2)\n3\n```\n\n##\
    \ 2.5.21 Lower Bound\n\n```python\n>>> import bisect\n>>> a = [1,2,3,3,4,5]\n\
    >>> bisect.bisect_left(a, 3)\n2\n>>> bisect.bisect_left(a, 3.5)\n4\n```"
  mdcn: "## 2.5.13 委托迭代\n\n如果一个自定义容器类持有一个列表，并且我们希望迭代操作能作用于该容器，我们可以实现一个 `__iter__`\
    \ 方法，将迭代委托给该列表。请注意，`__iter__` 方法应返回一个*迭代器对象*，因此我们不能直接返回列表本身；否则，Python 会抛出一个 `TypeError`。\n\
    \n```python\nclass Stack:\n\n    def __init__(self):\n        self.__list = []\n\
    \n    def push(self, val):\n        self.__list.append(val)\n\n    def pop(self):\n\
    \        return self.__list.pop()\n\n    def __iter__(self):\n        return iter(self.__list)\n\
    \nstack = Stack()\nstack.push(1)\nstack.push(2)\nfor s in stack:\n    print(s)\n\
    ```\n\n示例\n\n```\n$ python stack.py\n1\n2\n```\n\n## 2.5.14 排序\n\nPython 列表提供了一个内置的\
    \ `list.sort` 方法，用于*原地*排序列表，无需使用额外内存。此外，`list.sort` 的返回值为 `None`，这是为了避免与 `sorted`\
    \ 混淆，并且该函数只能用于列表。\n\n```python\n>>> l = [5, 4, 3, 2, 1]\n>>> l.sort()\n>>> l\n\
    [1, 2, 3, 4, 5]\n>>> l.sort(reverse=True)\n>>> l\n[5, 4, 3, 2, 1]\n```\n\n`sorted`\
    \ 函数不会原地修改任何可迭代对象。相反，它返回一个新的排序后的列表。如果列表的某些元素是只读的或不可变的，使用 `list.sort` 更安全。此外，`list.sort`\
    \ 和 `sorted` 的另一个区别是，`sorted` 接受任何**可迭代对象**。\n\n```python\n>>> l = [5, 4, 3, 2,\
    \ 1]\n>>> new = sorted(l)\n>>> new\n[1, 2, 3, 4, 5]\n>>> l\n[5, 4, 3, 2, 1]\n\
    >>> d = {3: 'andy', 2: 'david', 1: 'amy'}\n>>> sorted(d)  # 排序可迭代对象\n[1, 2, 3]\n\
    ```\n\n要对元素为元组的列表进行排序，使用 `operator.itemgetter` 会很有帮助，因为它将一个键函数分配给排序的 key 参数。请注意，键必须是可比较的；否则会抛出\
    \ `TypeError`。\n\n```python\n>>> from operator import itemgetter\n>>> l = [('andy',\
    \ 10), ('david', 8), ('amy', 3)]\n>>> l.sort(key=itemgetter(1))\n>>> l\n[('amy',\
    \ 3), ('david', 8), ('andy', 10)]\n```\n\n`operator.itemgetter` 很有用，因为该函数返回一个\
    \ getter 方法，该方法可以应用于其他具有 `__getitem__` 方法的对象。例如，由于所有元素都有 `__getitem__`，可以使用 `operator.itemgetter`\
    \ 对元素为字典的列表进行排序。\n\n```python\n>>> from pprint import pprint\n>>> from operator\
    \ import itemgetter\n>>> l = [\n...     {'name': 'andy', 'age': 10},\n...    \
    \ {'name': 'david', 'age': 8},\n...     {'name': 'amy', 'age': 3},\n... ]\n>>>\
    \ l.sort(key=itemgetter('age'))\n>>> pprint(l)\n[{'age': 3, 'name': 'amy'},\n\
    \ {'age': 8, 'name': 'david'},\n {'age': 10, 'name': 'andy'}]\n```\n\n如果需要对一个元素既不可比较也没有\
    \ `__getitem__` 方法的列表进行排序，分配一个自定义键函数是可行的。\n\n```python\n>>> class Node(object):\n\
    ...     def __init__(self, val):\n...         self.val = val\n...     def __repr__(self):\n\
    ...         return f\"Node({self.val})\"\n...\n>>> nodes = [Node(3), Node(2),\
