    finally:\n    server.close()\n    loop.run_until_complete(server.wait_closed())\n\
    \    loop.close()\n```\n\n输出：\n```\n# 控制台1\n$ nc localhost 5566\nHello\nHello\n\
    \n# 控制台2\n$ nc localhost 5566\nasyncio\nasyncio\n```\n\n## 4.4 PEP 572 与海象运算符\n\
    \n**目录**\n\n*   *PEP 572 与海象运算符*\n*   摘要\n*   引言\n*   为什么是 `:=` ？\n*   作用域\n*\
    \   陷阱\n*   结论\n*   参考文献\n\n## 4.4.1 摘要\n\nPEP 572 是 Python3 历史上最具争议的提案之一，因为在表达式内赋值似乎没有必要。此外，开发者也难以区分\
    \ **海象运算符** (`:=`) 和等于运算符 (`=`) 的区别。即使经验丰富的开发者可以熟练使用 `:=`，他们可能也会担心代码的可读性。为了更好地理解\
    \ `:=` 的用法，本文将探讨其设计哲学以及它试图解决的问题。\n\n## 4.4.2 引言\n\n对于 C/C++ 开发者来说，将函数返回值赋给变量是常见的做法，这源于其错误代码风格的处理方式。管理函数错误包括两个步骤：一是检查返回值；二是检查\
    \ errno。例如，\n\n```c\n#include <stdio.h>\n#include <unistd.h>\n#include <string.h>\n\
    #include <errno.h>\n\nint main(int argc, char *argv[]) {\n    int rc = -1;\n\n\
    \    // assign access return to rc and check its value\n    if ((rc = access(\"\
    hello_walrus\", R_OK)) == -1) {\n        fprintf(stderr, \"%s\", strerror(errno));\n\
    \        goto end;\n    }\n    rc = 0;\n    end:\n        return rc;\n}\n```\n\
    \n在这个例子中，`access` 会先将其返回值赋给变量 `rc`。然后，程序会将 `rc` 的值与 `-1` 进行比较，以检查 `access` 的执行是否成功。然而，在\
    \ 3.8 版本之前，Python 不允许在表达式内为变量赋值。为了解决这个问题，PEP 572 引入了海象运算符供开发者使用。以下的 Python 代码片段与前面的\
    \ C 示例等效。\n\n```python\n>>> import os\n>>> from ctypes import *\n>>> libc = CDLL(\"\
    libc.dylib\", use_errno=True)\n>>> access = libc.access\n>>> path = create_string_buffer(b\"\
    hello_walrus\")\n>>> if (rc := access(path, os.R_OK)) == -1:\n...     errno =\
    \ get_errno()\n...     print(os.strerror(errno), file=sys.stderr)\n...\nNo such\
    \ file or directory\n```\n\n### 4.4.3 为什么是 `:=` ？\n\n开发者可能会混淆 `:=` 和 `=` 之间的区别。实际上，它们的目的一样，都是将值赋给变量。为什么\
    \ Python 引入 `:=` 而不是使用 `=`？使用 `:=` 有什么好处？一个原因是为了增强视觉识别性，避免 C/C++ 开发者常犯的错误。例如，\n\
    \n```c\nint rc = access(\"hello_walrus\", R_OK);\n\n// rc is unintentionally assigned\
    \ to -1\nif (rc = -1) {\n    fprintf(stderr, \"%s\", strerror(errno));\n    goto\
    \ end;\n}\n```\n\n变量 `rc` 被错误地赋值为 `-1`，而不是进行比较。为了防止这种错误，一些人提倡在表达式中使用 Yoda 条件式。\n\
    \n```c\nint rc = access(\"hello_walrus\", R_OK);\n\n// -1 = rc will raise a compile\
    \ error\nif (-1 == rc) {\n    fprintf(stderr, \"%s\", strerror(errno));\n    goto\
    \ end;\n}\n```\n\n然而，Yoda 风格的可读性不够好，就像 Yoda 说不标准英语一样。此外，与 C/C++ 可以通过编译器选项（如 -Wparentheses）在编译时检测赋值错误不同，Python\
    \ 解释器很难在运行时区分这类错误。因此，PEP 572 的最终结果是采用新语法作为实现 *赋值表达式* 的解决方案。\n\n海象运算符并非 PEP 572\
    \ 的第一个解决方案。最初的提案使用 `EXPR as NAME` 将值赋给变量。不幸的是，这个解决方案以及其他一些解决方案都被否决了。经过激烈的讨论，最终决定使用\
    \ `:=`。\n\n## 4.4.4 作用域\n\n与其他表达式不同，在其他表达式中变量会绑定到作用域，而赋值表达式属于当前作用域。这种设计的目的是允许以紧凑的方式编写代码。\n\
    \n```python\n>>> if not (env := os.environ.get(\"HOME\")):\n...     raise KeyError(\"\
    env HOME does not find!\")\n...\n>>> print(env)\n/root\n```\n\n在 PEP 572 中，另一个好处是方便地为\
    \ `any()` 或 `all()` 表达式捕获一个“见证者”。虽然捕获函数输入可以帮助交互式调试器，但其优势并不那么明显，且示例缺乏可读性。因此，此处不讨论此好处。请注意，其他语言（如\
    \ C/C++ 或 Go）可能会将赋值绑定到作用域。以 Golang 为例。\n\n```go\npackage main\n\nimport (\n  \
    \  \"fmt\"\n    \"os\"\n)\n\nfunc main() {\n    if env := os.Getenv(\"HOME\");\
    \ env == \"\" {\n        panic(fmt.Sprintf(\"Home does not find\"))\n    }\n \
    \   fmt.Print(env) // <--- compile error: undefined: env\n}\n```\n\n## 4.4.5 陷阱\n\
    \n尽管赋值表达式允许编写紧凑的代码，但当开发者在列表推导式中使用它时，会存在许多陷阱。一个常见的 `SyntaxError` 是重新绑定迭代变量。\n\n\
    ```python\n>>> [i := i+1 for i in range(5)]  # invalid\n```\n\n然而，更新迭代变量会降低可读性并引入错误。即使在\
    \ Python 3.8 未实现海象运算符的情况下，程序员也应避免在作用域内重复使用迭代变量。\n\n另一个陷阱是 Python 禁止在类作用域下的推导式中使用赋值表达式。\n\
    \n```python\n>>> class Example:\n...     [(j := i) for i in range(5)] # invalid\n\
    ...\n```\n\n这个限制源于 bpo-3692。当类声明包含列表推导式时，解释器的行为是不可预测的。为了避免这种极端情况，在类内部赋值表达式是无效的。\n\
    \n```python\n>>> class Foo:\n...     a = [1, 2, 3]\n...     b = [4, 5, 6]\n...\
    \     c = [i for i in zip(a, b)]  # b is defined\n...\n>>> class Bar:\n...   \
    \  a = [1,2,3]\n...     b = [4,5,6]\n...     c = [x * y for x in a for y in b]\
    \ # b is undefined\n...\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\n  File \"<stdin>\", line 4, in Bar\n  File \"<stdin>\"\
    , line 4, in <listcomp>\nNameError: name 'b' is not defined\n```\n\n## 4.4.6 结论\n\
    \n海象运算符 (`:=`) 如此具有争议性的原因是它可能会降低代码的可读性。事实上，在讨论邮件列表中，PEP 572 的作者 Christoph Groth\
    \ 曾考虑使用 `:=` 来实现像 C/C++ 那样的内联赋值。抛开 `:=` 是否丑陋不谈，许多开发者认为区分 `:=` 和 `=` 的功能是困难的，因为它们目的一样，但行为不一致。此外，编写紧凑的代码也不够有说服力，因为“小”并不总是“好”。然而，在某些情况下，海象运算符可以增强可读性（如果你知道如何使用\
    \ `:=`）。例如，\n\n```python\nbuf = b\"\"\nwhile True:\n    data = read(1024)\n  \
    \  if not data:\n        break\n    buf += data\n```\n\n通过使用 `:=`，前面的示例可以简化。\n\
    \n```python\nbuf = b\"\"\nwhile (data := read(1024)):\n    buf += data\n```\n\n\
    Python 文档和 GitHub issue-8122 提供了许多关于通过 `:=` 提高代码可读性的优秀示例。然而，使用海象运算符需要谨慎。有些情况，比如\
    \ `foo(x := 3, cat='vector')`，如果开发者没有意识到作用域问题，可能会引入新的错误。尽管 PEP 572 可能会让开发者更容易写出有\
    \ bug 的代码，但深入理解其设计哲学和有用的示例将有助于我们在合适的时候用它编写可读的代码。"
