    \    print(_row)\n\n# 或等价于\nselect_st = table.select().where(\n    table.c.l_name\
    \ == 'Hello')\nres = conn.execute(select_st)\nfor _row in res:\n    print(_row)\n\
    \n# 结合 \"OR\"\nselect_st = select([\n    table.c.l_name,\n    table.c.f_name]).where(or_(\n\
    \        table.c.l_name == 'Hello',\n        table.c.l_name == 'Hi'))\nres = conn.execute(select_st)\n\
    for _row in res:\n    print(_row)\n\n# 结合 \"ORDER BY\"\nselect_st = select([table]).where(or_(\n\
    \        table.c.l_name == 'Hello',\n        table.c.l_name == 'Hi')).order_by(table.c.f_name)\n\
    res = conn.execute(select_st)\nfor _row in res:\n    print(_row)\n```\n\n## 3.5.17\
