    \ 性能分析\n    - 美化打印\n    - 结论\n    - 参考资料\n\n### 4.5.1 摘要\n\nGNU 调试器（GDB）是开发者用于调试代码错误的强大工具。然而，它对于初学者来说难以掌握，这也是为什么许多程序员更倾向于插入\
    \ `print` 语句来检查运行时状态。幸运的是，`GDB 文本用户界面 (TUI)` 为开发者提供了一种同时查看源代码和进行调试的方式。更令人兴奋的是，在\
    \ GDB 7 中，**Python 解释器**被内置到了 GDB 中。这一特性通过 Python 库提供了更直接的方式来定制 GDB 的打印机和命令。本文将通过讨论示例，尝试探索通过\
    \ Python 实现的高级调试技术，以为 GDB 开发工具包。\n\n### 4.5.2 引言\n\n排查软件错误对开发者来说是一个巨大的挑战。虽然 GDB\
    \ 提供了许多“调试命令”来检查程序的运行时状态，但其非直观的用法阻碍了程序员用它来解决问题。的确，精通 GDB 是一个长期的过程。但是，快速入门并不复杂；你必须像尤达大师那样，“忘掉你已学过的东西”。为了更好地理解如何在\
    \ GDB 中使用 Python，本文将重点讨论 GDB 中的 Python 解释器。\n\n### 4.5.3 定义命令\n\nGDB 支持使用 `define`\
    \ 来自定义命令。这对于同时运行一组调试命令很有用。例如，开发者可以通过定义一个 `sf` 命令来显示当前栈帧信息。\n\n```\n# 在 .gdbinit\
    \ 中定义\ndefine sf\n    where        # 找出程序当前在哪里\n    info args    # 显示参数\n    info\
    \ locals  # 显示局部变量\nend\n```\n\n然而，由于 API 有限，编写用户自定义命令可能不太方便。幸运的是，通过与 GDB 中的 Python\
    \ 解释器交互，开发者可以轻松利用 Python 库来构建自己的调试工具包。接下来的部分将展示如何使用 Python 来简化调试过程。\n\n### 4.5.4\
    \ 内存转储\n\n检查进程的内存信息是排查内存问题的有效方法。开发者可以通过 `info proc mappings` 和 `dump memory` 获取内存内容。为了简化这些步骤，定义一个自定义命令很有帮助。然而，使用纯\
    \ GDB 语法来实现并不直接。即使 GDB 支持条件判断，处理输出也不直观。要解决这个问题，在 GDB 中使用 Python API 会很有帮助，因为 Python\
    \ 包含许多处理字符串的实用操作。\n\n```\n# mem.py\nimport gdb\nimport time\nimport re\n\nclass\
    \ DumpMemory(gdb.Command):\n    \"\"\"将内存信息转储到文件。\"\"\"\n\n    def __init__(self):\n\
    \        super().__init__(\"dm\", gdb.COMMAND_USER)\n\n    def get_addr(self,\
    \ p, tty):\n        \"\"\"获取内存地址。\"\"\"\n        cmd = \"info proc mappings\"\n\
    \        out = gdb.execute(cmd, tty, True)\n        addrs = []\n        for l\
    \ in out.split(\"\\n\"):\n            if re.match(f\".*{p}.*\", l):\n        \
    \        s, e, *_ = l.split()\n                addrs.append((s, e))\n\n    def\
    \ dump(self, addrs):\n        \"\"\"执行内存转储。\"\"\"\n        if not addrs:\n   \
    \         return\n\n        for s, e in addrs:\n            f = int(time.time()\
    \ * 1000)\n            gdb.execute(f\"dump memory {f}.bin {s} {e}\")\n\n    def\
    \ invoke(self, args, tty):\n        try:\n            # cat /proc/self/maps\n\
    \            addrs = self.get_addr(args, tty)\n            # 转储内存\n          \
    \  self.dump(addrs)\n        except Exception as e:\n            print(\"用法: dm\
    \ [模式]\")\n\nDumpMemory()\n```\n\n运行 `dm` 命令将调用 `DumpMemory.invoke`。通过在 `.gdbinit`\
    \ 中加载或实现 Python 脚本，开发者可以利用自定义命令在程序运行时跟踪错误。例如，以下步骤展示了如何在 GDB 中调用 `DumpMemory`。\n\
    \n```\n(gdb) start\n...\n(gdb) source mem.py  # 加载命令\n(gdb) dm stack       # 将栈转储到\
    \ ${timestamp}.bin\n(gdb) shell ls       # 列出当前目录\n1577283091687.bin  a.cpp  a.out\
    \  mem.py\n```\n\n### 4.5.5 JSON 转储\n\n当开发者在检查运行中的程序里的 JSON 字符串时，解析 JSON 很有帮助。GDB\
    \ 可以通过 `gdb.parse_and_eval` 解析 `std::string`，并将其作为 `gdb.Value` 返回。通过处理 `gdb.Value`，开发者可以将\
    \ JSON 字符串传递给 Python 的 `json` API，并以美化格式打印它。\n\n```\n# dj.py\nimport gdb\nimport\
    \ re\nimport json\n\nclass DumpJson(gdb.Command):\n    \"\"\"将 std::string 转储为格式化的\
    \ JSON。\"\"\"\n\n    def __init__(self):\n        super().__init__(\"dj\", gdb.COMMAND_USER)\n\
    \n    def get_json(self, args):\n        \"\"\"将 std::string 解析为 JSON 字符串。\"\"\
    \"\n        ret = gdb.parse_and_eval(args)\n        typ = str(ret.type)\n    \
    \    if re.match(\"^std::.*::string\", typ):\n            return json.loads(str(ret))\n\
    \        return None\n\n    def invoke(self, args, tty):\n        try:\n     \
    \       # 字符串转 JSON 字符串\n            s = self.get_json(args)\n            # JSON\
    \ 字符串转对象\n            o = json.loads(s)\n            print(json.dumps(o, indent=2))\n\
    \        except Exception as e:\n            print(f\"解析 JSON 错误！ {args}\")\n\n\
    DumpJson()\n```\n\n命令 `dj` 在 GDB 中以更易读的 JSON 格式显示内容。此命令有助于在 JSON 字符串较大时改善视觉识别。同时，通过使用此命令，可以检测或监控一个\
    \ `std::string` 是否为 JSON。\n\n```\n(gdb) start\n(gdb) list\n1\t#include <string>\n\
    2\n3\tint main(int argc, char *argv[])\n4\t{\n5\t    std::string json = R\"({\"\
    foo\": \"FOO\",\"bar\": \"BAR\"})\";\n6\t    return 0;\n7\t}\n...\n(gdb) ptype\
    \ json\ntype = std::string\n(gdb) p json\n$1 = \"{\"foo\": \"FOO\",\"bar\": \"\
    BAR\"}\"\n(gdb) source dj.py\n(gdb) dj json\n{\n  \"foo\": \"FOO\",\n  \"bar\"\
    : \"BAR\"\n}\n```\n\n### 4.5.6 语法高亮\n\n语法高亮对于开发者跟踪源代码或排查问题很有用。通过使用 Pygments，可以轻松地为源代码着色，而无需手动定义\
    \ ANSI 转义码。以下示例展示了如何为 `list` 命令的输出添加颜色。\n\n```\nimport gdb\nfrom pygments import\
    \ highlight\nfrom pygments.lexers import CLexer\nfrom pygments.formatters import\
    \ TerminalFormatter\n\nclass PrettyList(gdb.Command):\n    \"\"\"打印带颜色的源代码。\"\"\
    \"\n\n    def __init__(self):\n        super().__init__(\"pl\", gdb.COMMAND_USER)\n\
    \        self.lex = CLexer()\n        self.fmt = TerminalFormatter()\n\n    def\
    \ invoke(self, args, tty):\n        try:\n            out = gdb.execute(f\"l {args}\"\
    , tty, True)\n            print(highlight(out, self.lex, self.fmt))\n        except\
    \ Exception as e:\n            print(e)\n\nPrettyList()\n```\n\n### 4.5.7 跟踪点\n\
    \n虽然开发者可以插入 `printf`、`std::cout` 或 `syslog` 来检查函数，但在大型项目中，打印消息并不是一种有效的调试方式。开发者可能会浪费时间在构建源代码上，而获得的信息却很少。更糟糕的是，输出可能太多而无法检测问题。事实上，检查函数或变量并不需要在代码中嵌入打印函数。通过编写使用\
    \ GDB API 的 Python 脚本，开发者可以自定义监视点，在运行时动态跟踪问题。例如，通过实现一个 `gdb.Breakpoint` 和一个 `gdb.Command`，开发者可以获取关键信息，如参数、调用栈或内存使用情况。\n\
    \n```\n# tp.py\nimport gdb\n\ntp = {}\n\nclass Tracepoint(gdb.Breakpoint):\n \
    \   def __init__(self, *args):\n        super().__init__(*args)\n        self.silent\
    \ = True\n        self.count = 0\n\n    def stop(self):\n        self.count +=\
    \ 1\n        frame = gdb.newest_frame()\n        block = frame.block()\n     \
    \   sym_and_line = frame.find_sal()\n        framename = frame.name()\n      \
    \  filename = sym_and_line.symtab.filename\n        line = sym_and_line.line\n\
    \        # 显示跟踪点信息\n        print(f\"{framename} @ {filename}:{line}\")\n    \
    \    # 显示参数和变量\n        for s in block:\n            if not s.is_argument and\
    \ not s.is_variable:\n                continue\n            typ = s.type\n   \
    \         val = s.value(frame)\n            size = typ.sizeof\n            name\
    \ = s.name\n            print(f\"\\t{name}({typ}: {val}) [{size}]\")\n       \
    \ # 不在跟踪点处停止\n        return False\n\nclass SetTracepoint(gdb.Command):\n    def\
    \ __init__(self):\n        super().__init__(\"tp\", gdb.COMMAND_USER)\n\n    def\
    \ invoke(self, args, tty):\n        try:\n            global tp\n            tp[args]\
    \ = Tracepoint(args)\n        except Exception as e:\n            print(e)\n\n\
    def finish(event):\n    for t, p in tp.items():\n        c = p.count\n       \
    \ print(f\"跟踪点 '{t}' 命中次数: {c}\")\n\ngdb.events.exited.connect(finish)\nSetTracepoint()\n\
    ```\n\n与其在函数开头插入 `std::cout`，不如在函数入口点使用跟踪点，可以提供检查参数、变量和栈的有用信息。例如，通过在 `fib` 上设置一个跟踪点，有助于检查内存使用、栈和调用次数。\n\
    \n```c\nint fib(int n)\n{\n    if (n < 2) {\n        return 1;\n    }\n    return\
    \ fib(n-1) + fib(n-2);\n}\n```\n\n```c\nint main(int argc, char *argv[])\n```"
