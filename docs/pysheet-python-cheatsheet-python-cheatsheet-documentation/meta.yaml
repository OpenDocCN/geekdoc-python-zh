    \ -> int:\n...     a, b = 0, 1\n...     for _ in range(n):\n...         b, a =\
    \ a + b, b\n...     return a\n...\n>>> fib(10)\n55\n>>> fib.__annotations__\n\
    {'n': <class 'int'>, 'return': <class 'int'>}\n```\n\n### 2.9.7 Callable\n\nIn\
    \ some cases such as passing a callback function, we need to check whether an\
