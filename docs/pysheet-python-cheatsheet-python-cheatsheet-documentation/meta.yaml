    # ## 1.1.20 async and await syntax


    New in Python 3.5


    +   - PEP 492 - Coroutines with async and await syntax


    Before Python 3.5


    ```

    >>> import asyncio

    >>> @asyncio.coroutine

    ... def fib(n: int):

    ...     a, b = 0, 1

    ...     for _ in range(n):

    ...         b, a = a + b, b

    ...     return a

    ...

    >>> @asyncio.coroutine

    ... def coro(n: int):

    ...     for x in range(n):

    ...         yield from asyncio.sleep(1)

    ...         f = yield from fib(x)

    ...         print(f)

    ...

    >>> loop = asyncio.get_event_loop()

    >>> loop.run_until_complete(coro(3))

    0

    1

    1

    ```


    Python 3.5 or above


    ```

    >>> import asyncio

    >>> async def fib(n: int):

    ...     a, b = 0, 1

    ...     for _ in range(n):

    ...         b, a = a + b, b

    ...     return a

    ...

    >>> async def coro(n: int):

    ...     for x in range(n):

    ...         await asyncio.sleep(1)

    ...         f = await fib(x)

    ...         print(f)

    ...

    >>> loop = asyncio.get_event_loop()

    >>> loop.run_until_complete(coro(3))

    0

    1

    1

    ```'
