    Inside example function.\nAfter calling example.\n```\n\n### 2.9.12 Decorator\
    \ with Arguments\n\n```python\n>>> from functools import wraps\n>>> def decorator_with_argument(val):\n\
    ...     def decorator(func):\n...         @wraps(func)\n...         def wrapper(*args,\
