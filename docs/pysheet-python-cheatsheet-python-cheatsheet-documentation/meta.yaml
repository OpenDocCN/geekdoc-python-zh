  - "[PAGE 51]\n\n# 2.5.13 Delegating Iterations\n\nIf a custom container class holds\
    \ a list and we want iterations to work on the container, we can implement a `__iter__`\
    \ method to delegate iterations to the list. Note that the method, `__iter__`,\
    \ should return an *iterator object*, so we cannot return the list directly; otherwise,\
    \ Python raises a `TypeError`.\n\n```\nclass Stack:\n\n    def __init__(self):\n\
    \        self.__list = []\n\n    def push(self, val):\n        self.__list.append(val)\n\
    \n    def pop(self):\n        return self.__list.pop()\n\n    def __iter__(self):\n\
    \        return iter(self.__list)\n\nstack = Stack()\nstack.push(1)\nstack.push(2)\n\
    for s in stack:\n    print(s)\n```\n\nExample\n\n```\n$ python stack.py\n1\n2\n\
    ```\n\n# 2.5.14 Sorting\n\nPython list provides a built-in `list.sort` method\
    \ which sorts a list *in-place* without using extra memory. Moreover, the return\
    \ value of `list.sort` is `None` in order to avoid confusion with `sorted` and\
    \ the function can only be used for list.\n\n```\n>>> l = [5, 4, 3, 2, 1]\n>>>\
    \ l.sort()\n>>> l\n[1, 2, 3, 4, 5]\n>>> l.sort(reverse=True)\n>>> l\n[5, 4, 3,\
    \ 2, 1]\n```\n\nThe `sorted` function does not modify any iterable object in-place.\
    \ Instead, it returns a new sorted list. Using `sorted` is safer than `list.sort`\
    \ if some list's elements are read-only or immutable. Besides, another difference\
    \ between `list.sort` and `sorted` is that `sorted` accepts any **iterable object**.\n\
    \n```\n>>> l = [5, 4, 3, 2, 1]\n>>> new = sorted(l)\n>>> new\n```"
