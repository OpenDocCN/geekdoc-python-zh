- md: "## 2.12 Typing\n\nPEP 484, which provides a specification about what a type\
    \ system should look like in Python3, introduced the concept of type hints. Moreover,\
    \ to better understand the type hints design philosophy, it is crucial to read\
    \ PEP 483 that would be helpful to aid a pythoneer to understand reasons why Python\
    \ introduce a type system. The main goal of this cheat sheet is to show some common\
    \ usage about type hints in Python3.\n\n- Table of Contents\n  - Typing\n    -\
    \ Without type check\n    - With type check\n    - Basic types\n    - Functions\n\
    \    - Classes\n    - Generator\n    - Asynchronous Generator\n    - Context Manager\n\
    \    - Asynchronous Context Manager\n    - Avoid None access\n    - Positional-only\
    \ arguments\n    - Multiple return values\n    - Union[Any, None] == Optional[Any]\n\
    \    - Be careful of Optional\n    - Be careful of casting\n    - Forward references\n\
    \    - Postponed Evaluation of Annotations\n    - Type alias\n    - Define a NewType\n\
    \    - Using TypeVar as template\n    - Using TypeVar and Generic as class template\n\
    \    - Scoping rules for TypeVar\n    - Restricting to a fixed set of possible\
    \ types\n    - TypeVar with an upper bound\n    - @overload\n    - Stub Files\n\
    \n## 2.12.1 Without type check\n\n```python\ndef fib(n):\n    a, b = 0, 1\n  \
    \  for _ in range(n):\n        yield a\n        b, a = a + b, b\n\nprint([n for\
    \ n in fib(3.6)])\n```\n\noutput:\n\n```\n# errors will not be detected until\
    \ runtime\n\n$ python fib.py\nTraceback (most recent call last):\n  File \"fib.py\"\
    , line 8, in <module>\n    print([n for n in fib(3.5)])\n  File \"fib.py\", line\
    \ 8, in <listcomp>\n    print([n for n in fib(3.5)])\nFile \"fib.py\", line 3,\
    \ in fib\n    for _ in range(n):\nTypeError: 'float' object cannot be interpreted\
    \ as an integer\n```\n\n## 2.12.2 With type check\n\n```python\n# give a type\
    \ hint\nfrom typing import Generator\n\ndef fib(n: int) -> Generator:\n    a:\
    \ int = 0\n    b: int = 1\n    for _ in range(n):\n        yield a\n        b,\
    \ a = a + b, b\n\nprint([n for n in fib(3.6)])\n```\n\noutput:\n\n```\n# errors\
    \ will be detected before running\n\n$ mypy --strict fib.py\nfib.py:12: error:\
    \ Argument 1 to \"fib\" has incompatible type \"float\"; expected \"int\"\n```\n\
    \n## 2.12.3 Basic types\n\n```python\nimport io\nimport re\n\nfrom collections\
    \ import deque, namedtuple\nfrom typing import (\n    Dict,\n    List,\n    Tuple,\n\
    \    Set,\n    Deque,\n    NamedTuple,\n    IO,\n    Pattern,\n    Match,\n  \
    \  Text,\n    Optional,\n    Sequence,\n    Iterable,\n    Mapping,\n    MutableMapping,\n\
    \    Any,\n)\n\n# without initializing\nx: int\n\n# any type\ny: Any\ny = 1\n\
    y = \"1\"\n\n# built-in\nvar_int: int = 1\nvar_str: str = \"Hello Typing\"\nvar_byte:\
    \ bytes = b\"Hello Typing\"\nvar_bool: bool = True\nvar_float: float = 1.\nvar_unicode:\
    \ Text = u'\\u2713'\n\n# could be none\nvar_could_be_none: Optional[int] = None\n\
    var_could_be_none = 1\n\n# collections\nvar_set: Set[int] = {i for i in range(3)}\n\
    var_dict: Dict[str, str] = {\"foo\": \"Foo\"}\nvar_list: List[int] = [i for i\
    \ in range(3)]\nvar_static_length_Tuple: Tuple[int, int, int] = (1, 2, 3)\nvar_dynamic_length_Tuple:\
    \ Tuple[int, ...] = (i for i in range(10, 3))\nvar_deque: Deque = deque([1, 2,\
    \ 3])\nvar_nametuple: NamedTuple = namedtuple('P', ['x', 'y'])\n\n# io\nvar_io_str:\
    \ IO[str] = io.StringIO(\"Hello String\")\nvar_io_byte: IO[bytes] = io.BytesIO(b\"\
    Hello Bytes\")\nvar_io_file_str: IO[str] = open(__file__)\nvar_io_file_byte: IO[bytes]\
    \ = open(__file__, 'rb')\n\n# re\np: Pattern = re.compile(\"(https?):://([^/\\\
    r\\n]+)(/[^\\r\\n]*)?\")\nm: Optional[Match] = p.match(\"https://www.python.org/\"\
    )\n\n# duck types: list-like\nvar_seq_list: Sequence[int] = [1, 2, 3]\nvar_seq_tuple:\
    \ Sequence[int] = (1, 2, 3)\nvar_iter_list: Iterable[int] = [1, 2, 3]\nvar_iter_tuple:\
    \ Iterable[int] = (1, 2, 3)\n\n# duck types: dict-like\nvar_map_dict: Mapping[str,\
    \ str] = {\"foo\": \"Foo\"}\nvar_mutable_dict: MutableMapping[str, str] = {\"\
    bar\": \"Bar\"}\n```\n\n## 2.12.4 Functions\n\n```python\nfrom typing import Generator,\
    \ Callable\n\n# function\ndef gcd(a: int, b: int) -> int:\n    while b:\n    \
    \    a, b = b, a % b\n    return a\n\n# callback\ndef fun(cb: Callable[[int, int],\
    \ int]) -> int:\n    return cb(55, 66)\n\n# lambda\nf: Callable[[int], int] =\
    \ lambda x: x * 2\n```\n\n## 2.12.5 Classes\n\n```python\nfrom typing import ClassVar,\
    \ Dict, List\n\nclass Foo:\n\n    x: int = 1  # instance variable. default = 1\n\
    \    y: ClassVar[str] = \"class var\"  # class variable\n\n    def __init__(self)\
    \ -> None:\n        self.i: List[int] = [0]\n\n    def foo(self, a: int, b: str)\
    \ -> Dict[int, str]:\n        return {a: b}\n\nfoo = Foo()\nfoo.x = 123\n\nprint(foo.x)\n\
    print(foo.i)\nprint(Foo.y)\nprint(foo.foo(1, \"abc\"))\n```\n\n## 2.12.6 Generator\n\
    \n```python\nfrom typing import Generator\n\n# Generator[YieldType, SendType,\
    \ ReturnType]\ndef fib(n: int) -> Generator[int, None, None]:\n    a: int = 0\n\
    \    b: int = 1\n    while n > 0:\n        yield a\n        b, a = a + b, b\n\
    \        n -= 1\n\ng: Generator = fib(10)\ni: Iterator[int] = (x for x in range(3))\n\
    ```\n\n## 2.12.7 Asynchronous Generator\n\n```python\nimport asyncio\nfrom typing\
    \ import AsyncGenerator, AsyncIterator\n\nasync def fib(n: int) -> AsyncGenerator:\n\
    \    a: int = 0\n    b: int = 1\n    while n > 0:\n        await asyncio.sleep(0.1)\n\
    \        yield a\n        b, a = a + b, b\n        n -= 1\n\nasync def main()\
    \ -> None:\n    async for f in fib(10):\n        print(f)\n    ag: AsyncIterator\
    \ = (f async for f in fib(10))\n\nloop = asyncio.get_event_loop()\nloop.run_until_complete(main())\n\
    ```\n\n## 2.12.8 Context Manager\n\n```python\nfrom typing import ContextManager,\
    \ Generator, IO\nfrom contextlib import contextmanager\n\n@contextmanager\ndef\
    \ open_file(name: str) -> Generator:\n    f = open(name)\n    yield f\n    f.close()\n\
    \ncm: ContextManager[IO] = open_file(__file__)\nwith cm as f:\n    print(f.read())\n\
    ```\n\n## 2.12.9 Asynchronous Context Manager\n\n```python\nimport asyncio\n\n\
    from typing import AsyncContextManager, AsyncGenerator, IO\nfrom contextlib import\
    \ asynccontextmanager\n\n# need python 3.7 or above\n@asynccontextmanager\nasync\
    \ def open_file(name: str) -> AsyncGenerator:\n    await asyncio.sleep(0.1)\n\
    \    f = open(name)\n    yield f\n    await asyncio.sleep(0.1)\n    f.close()\n\
    \nasync def main() -> None:\n    acm: AsyncContextManager[IO] = open_file(__file__)\n\
    \    async with acm as f:\n        print(f.read())\n\nloop = asyncio.get_event_loop()\n\
    loop.run_until_complete(main())\n```\n\n## 2.12.10 Avoid None access\n\n```python\n\
    import re\n\nfrom typing import Pattern, Dict, Optional\n\n# like c++\n# std::regex\
    \ url(\"(https?)://([^\\r\\n]+)(/[^\\r\\n]*)?\"\\);\n# std::regex color(\"^#?([a-f0-9]{6}|[a-f0-9]{3})$\"\
    );\n\nurl: Pattern = re.compile(\"(https?)://([^\\r\\n]+)(/[^\\r\\n]*)?\")\ncolor:\
    \ Pattern = re.compile(\"^#?([a-f0-9]{6}|[a-f0-9]{3})$\")\n\nx: Dict[str, Pattern]\
    \ = {\"url\": url, \"color\": color}\ny: Optional[Pattern] = x.get(\"baz\", None)\n\
    \nprint(y.match(\"https://www.python.org/\"))\n```\n\noutput:\n\n```\n$ mypy --strict\
    \ foo.py\nfoo.py:15: error: Item \"None\" of \"Optional[Pattern[Any]]\" has no\
    \ attribute \"match\"\n```\n\n## 2.12.11 Positional-only arguments\n\n```python\n\
    # define arguments with names beginning with __\n\ndef fib(__n: int) -> int: \
    \ # positional only arg\n    a, b = 0, 1\n    for _ in range(__n):\n        b,\
    \ a = a + b, b\n    return a\n\ndef gcd(*, a: int, b: int) -> int:  # keyword\
    \ only arg\n    while b:\n        a, b = b, a % b\n    return a\n\nprint(fib(__n=10))\
    \  # error\nprint(gcd(10, 5))  # error\n```\n\noutput:\n\n```\nmypy --strict foo.py\n\
    foo.py:1: note: \"fib\" defined here\nfoo.py:14: error: Unexpected keyword argument\
    \ \"__n\" for \"fib\"\nfoo.py:15: error: Too many positional arguments for \"\
    gcd\"\n```\n\n## 2.12.12 Multiple return values\n\n```python\nfrom typing import\
    \ Tuple, Iterable, Union\n\ndef foo(x: int, y: int) -> Tuple[int, int]:\n    return\
    \ x, y\n\n# or\n\ndef bar(x: int, y: str) -> Iterable[Union[int, str]]:\n    #\
    \ XXX: not recommend declaring in this way\n    return x, y\n\na: int\nb: int\n\
    a, b = foo(1, 2)     # ok\nc, d = bar(3, \"bar\")  # ok\n```"
  mdcn: "## 2.12 类型提示\n\nPEP 484 提供了 Python3 中类型系统应遵循的规范，引入了类型提示的概念。此外，为了更好地理解类型提示的设计哲学，阅读\
    \ PEP 483 至关重要，它有助于 Python 开发者理解 Python 引入类型系统的原因。本速查表的主要目标是展示 Python3 中类型提示的一些常见用法。\n\
    \n- 目录\n  - 类型提示\n    - 无类型检查\n    - 有类型检查\n    - 基本类型\n    - 函数\n    - 类\n  \
    \  - 生成器\n    - 异步生成器\n    - 上下文管理器\n    - 异步上下文管理器\n    - 避免 `None` 访问\n    -\
    \ 仅位置参数\n    - 多返回值\n    - `Union[Any, None] == Optional[Any]`\n    - 注意 `Optional`\
    \ 的用法\n    - 注意 `cast` 的用法\n    - 前向引用\n    - 延迟注解求值\n    - 类型别名\n    - 定义 `NewType`\n\
    \    - 使用 `TypeVar` 作为模板\n    - 使用 `TypeVar` 和 `Generic` 作为类模板\n    - `TypeVar`\
    \ 的作用域规则\n    - 限制为固定集合的可能类型\n    - 带上界的 `TypeVar`\n    - `@overload`\n    - 存根文件\n\
    \n## 2.12.1 无类型检查\n\n```python\ndef fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n\
    \        yield a\n        b, a = a + b, b\n\nprint([n for n in fib(3.6)])\n```\n\
    \n输出：\n\n```\n# 错误直到运行时才会被检测到\n\n$ python fib.py\nTraceback (most recent call\
    \ last):\n  File \"fib.py\", line 8, in <module>\n    print([n for n in fib(3.5)])\n\
    \  File \"fib.py\", line 8, in <listcomp>\n    print([n for n in fib(3.5)])\n\
    File \"fib.py\", line 3, in fib\n    for _ in range(n):\nTypeError: 'float' object\
    \ cannot be interpreted as an integer\n```\n\n## 2.12.2 有类型检查\n\n```python\n#\
    \ 添加类型提示\nfrom typing import Generator\n\ndef fib(n: int) -> Generator:\n    a:\
    \ int = 0\n    b: int = 1\n    for _ in range(n):\n        yield a\n        b,\
    \ a = a + b, b\n\nprint([n for n in fib(3.6)])\n```\n\n输出：\n\n```\n# 错误将在运行前被检测到\n\
    \n$ mypy --strict fib.py\nfib.py:12: error: Argument 1 to \"fib\" has incompatible\
    \ type \"float\"; expected \"int\"\n```\n\n## 2.12.3 基本类型\n\n```python\nimport\
    \ io\nimport re\n\nfrom collections import deque, namedtuple\nfrom typing import\
    \ (\n    Dict,\n    List,\n    Tuple,\n    Set,\n    Deque,\n    NamedTuple,\n\
    \    IO,\n    Pattern,\n    Match,\n    Text,\n    Optional,\n    Sequence,\n\
    \    Iterable,\n    Mapping,\n    MutableMapping,\n    Any,\n)\n\n# 未初始化\nx: int\n\
    \n# 任意类型\ny: Any\ny = 1\ny = \"1\"\n\n# 内置类型\nvar_int: int = 1\nvar_str: str =\
    \ \"Hello Typing\"\nvar_byte: bytes = b\"Hello Typing\"\nvar_bool: bool = True\n\
    var_float: float = 1.\nvar_unicode: Text = u'\\u2713'\n\n# 可能为 None\nvar_could_be_none:\
    \ Optional[int] = None\nvar_could_be_none = 1\n\n# 集合\nvar_set: Set[int] = {i\
    \ for i in range(3)}\nvar_dict: Dict[str, str] = {\"foo\": \"Foo\"}\nvar_list:\
    \ List[int] = [i for i in range(3)]\nvar_static_length_Tuple: Tuple[int, int,\
    \ int] = (1, 2, 3)\nvar_dynamic_length_Tuple: Tuple[int, ...] = (i for i in range(10,\
    \ 3))\nvar_deque: Deque = deque([1, 2, 3])\nvar_nametuple: NamedTuple = namedtuple('P',\
    \ ['x', 'y'])\n\n# IO\nvar_io_str: IO[str] = io.StringIO(\"Hello String\")\nvar_io_byte:\
    \ IO[bytes] = io.BytesIO(b\"Hello Bytes\")\nvar_io_file_str: IO[str] = open(__file__)\n\
    var_io_file_byte: IO[bytes] = open(__file__, 'rb')\n\n# 正则表达式\np: Pattern = re.compile(\"\
    (https?):://([^/\\r\\n]+)(/[^\\r\\n]*)?\")\nm: Optional[Match] = p.match(\"https://www.python.org/\"\
    )\n\n# 鸭子类型：列表类\nvar_seq_list: Sequence[int] = [1, 2, 3]\nvar_seq_tuple: Sequence[int]\
    \ = (1, 2, 3)\nvar_iter_list: Iterable[int] = [1, 2, 3]\nvar_iter_tuple: Iterable[int]\
    \ = (1, 2, 3)\n\n# 鸭子类型：字典类\nvar_map_dict: Mapping[str, str] = {\"foo\": \"Foo\"\
    }\nvar_mutable_dict: MutableMapping[str, str] = {\"bar\": \"Bar\"}\n```\n\n##\
    \ 2.12.4 函数\n\n```python\nfrom typing import Generator, Callable\n\n# 函数\ndef\
    \ gcd(a: int, b: int) -> int:\n    while b:\n        a, b = b, a % b\n    return\
    \ a\n\n# 回调\ndef fun(cb: Callable[[int, int], int]) -> int:\n    return cb(55,\
    \ 66)\n\n# Lambda 表达式\nf: Callable[[int], int] = lambda x: x * 2\n```\n\n## 2.12.5\
    \ 类\n\n```python\nfrom typing import ClassVar, Dict, List\n\nclass Foo:\n\n  \
