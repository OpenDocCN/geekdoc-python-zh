    If an object has `__lt__` method, it means that the object is comparable and sorted
    or `list.sort` is not necessary to input a key function to its key parameter.
    A list or an iterable sequence can be sorted directly.


    ```

    >>> class Node(object):

    ...     def __init__(self, val):

    ...         self.val = val

    ...     def __repr__(self):

    ...         return f"Node({self.val})"

    ...     def __lt__(self, other):

    ...         return self.val - other.val < 0

    ...

    >>> nodes = [Node(3), Node(2), Node(1)]

    >>> nodes.sort()

    >>> nodes

    [Node(1), Node(2), Node(3)]

    ```


    If an object does not have `__lt__` method, it is likely to patch the method after
    a declaration of the object''s class. In other words, after the patching, the
    object becomes comparable.


    ```

    >>> class Node(object):

    ...     def __init__(self, val):

    ...         self.val = val

    ...     def __repr__(self):

    ...         return f"Node({self.val})"

    ...

    >>> Node.__lt__ = lambda s, o: s.val < o.val

    >>> nodes = [Node(3), Node(2), Node(1)]

    >>> nodes.sort()

    >>> nodes

    [Node(1), Node(2), Node(3)]

    ```


    Note that sorted or `list.sort` in Python3 does not support cmp parameter which
    is an **ONLY** valid argument in Python2. If it is necessary to use an old comparison
    function, e.g., some legacy code, `functools.cmp_to_key` is useful since it converts
    a comparison function to a key function.


    ```

    >>> from functools import cmp_to_key

    >>> class Node(object):

    ...     def __init__(self, val):

    ...         self.val = val

    ...     def __repr__(self):

    ...         return f"Node({self.val})"

