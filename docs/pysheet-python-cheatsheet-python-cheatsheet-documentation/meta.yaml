    \ By utilizing generators, handling I/O operations like the previous snippet but\
    \ a non-blocking form, which is called *inline callback*, is reachable inside\
    \ an event loop.\n\n# 4.2.4 Event Loop\n\nAn event loop is a scheduler to manage\
    \ tasks within a program instead of depending on operating systems. The following\
    \ snippet shows how a simple event loop to handle socket connections asynchronously.\
    \ The implementation concept is to append tasks into a FIFO job queue and register\
    \ a *selector* when I/O operations are not ready. Also, a *generator* preserves\
    \ the status of a task that allows it to be able to execute its remaining jobs\
    \ without callback functions when I/O results are available. By observing how\
    \ an event loop works, therefore, it would assist in understanding a Python generator\
    \ is indeed a form of *coroutine*.\n\n```\n# loop.py\n\nfrom selectors import\
    \ DefaultSelector, EVENT_READ, EVENT_WRITE\n\nclass Loop(object):\n    def __init__(self):\n\
    \        self.sel = DefaultSelector()\n        self.queue = []\n\n    def create_task(self,\
    \ task):\n        self.queue.append(task)\n\n    def polling(self):\n        for\
    \ e, m in self.sel.select(0):\n            self.queue.append((e.data, None))\n\
    \            self.sel.unregister(e.fileobj)\n\n    def is_registered(self, fileobj):\n\
