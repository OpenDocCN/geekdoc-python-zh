    \  - Class\n    - async / await\n    - Avoid exec and eval\n\n### 2.2.1 Hello\
    \ world!\n\nWhen we start to learn a new language, we usually learn from printing\
    \ **Hello world!**. In Python, we can use another way to print the message by\
    \ importing `__hello__` module. The source code can be found on `frozen.c`.\n\n\
    ```\n>>> print(\"Hello world!\")\nHello world!\n>>> import __hello__\nHello world!\n\
    >>> import __phello__\nHello world!\n>>> import __phello__.spam\nHello world!\n\
    ```\n\n### 2.2.2 Python Version\n\nIt is important for a programmer to know current\
    \ Python version because not every syntax will work in the current version. In\
    \ this case, we can get the Python version by `python -V` or using the module,\
    \ `sys`.\n\n```\n>>> import sys\n>>> print(sys.version)\n3.7.1 (default, Nov 6\
    \ 2018, 18:46:03)\n[Clang 10.0.0 (clang-1000.11.45.5)]\n```\n\nWe can also use\
    \ `platform.python_version` to get Python version.\n\n```\n>>> import platform\n\
    >>> platform.python_version()\n'3.7.1'\n```\n\nSometimes, checking the current\
    \ Python version is important because we may want to enable some features in some\
    \ specific versions. `sys.version_info` provides more detail information about\
    \ the interpreter. We can use it to compare with the version we want.\n\n```\n\
    >>> import sys\n>>> sys.version_info >= (3, 6)\nTrue\n>>> sys.version_info >=\
    \ (3, 7)\nFalse\n```\n\n### 2.2.3 Ellipsis\n\n`Ellipsis` is a built-in constant.\
    \ After Python 3.0, we can use `...` as `Ellipsis`. It may be the most enigmatic\
    \ constant in Python. Based on the official document, we can use it to extend\
    \ slicing syntax. Nevertheless, there are some other conventions in type hinting,\
    \ stub files, or function expressions.\n\n```\n>>> ...\nEllipsis\n>>> ... == Ellipsis\n\
    True\n>>> type(...)\n<class 'ellipsis'>\n```\n\nThe following snippet shows that\
    \ we can use the ellipsis to represent a function or a class which has not implemented\
    \ yet.\n\n```\n>>> class Foo: ...\n...\n>>> def foo(): ...\n...\n```\n\n### 2.2.4\
    \ if ... elif ... else\n\nThe **if statements** are used to control the code flow.\
    \ Instead of using `switch` or `case` statements control the logic of the code,\
    \ Python uses `if ... elif ... else` sequence. Although someone proposes we can\
    \ use `dict` to achieve `switch` statements, this solution may introduce unnecessary\
    \ overhead such as creating disposable dictionaries and undermine a readable code.\
    \ Thus, the solution is not recommended.\n\n```\n>>> import random\n>>> num =\
    \ random.randint(0, 10)\n>>> if num < 3:\n...     print(\"less than 3\")\n...\
    \ elif num < 5:\n...     print(\"less than 5\")\n... else:\n...     print(num)\n\
    ...\nless than 3\n```\n\n### 2.2.5 for Loop\n\nIn Python, we can access iterable\
    \ object’s items directly through the **for statement**. If we need to get indexes\
    \ and items of an iterable object such as list or tuple at the same time, using\
    \ `enumerate` is better than `range(len(iterable))`. Further information can be\
    \ found on `Looping Techniques`.\n\n```\n>>> for val in [\"foo\", \"bar\"]:\n\
    ...     print(val)\n...\nfoo\nbar\n>>> for idx, val in enumerate([\"foo\", \"\
    bar\", \"baz\"]):\n...     print(idx, val)\n...\n(0, 'foo')\n(1, 'bar')\n(2, 'baz')\n\
    ```\n\n### 2.2.6 for ... else ...\n\nIt may be a little weird when we see the\
    \ `else` belongs to a `for` loop at the first time. The `else` clause can assist\
    \ us to avoid using flag variables in loops. A loop’s `else` clause runs when\
    \ no `break` occurs.\n\n```\n>>> for _ in range(5):\n...     pass\n... else:\n\
    ...     print(\"no break\")\n...\nno break\n```\n\nThe following snippet shows\
    \ the difference between using a flag variable and the `else` clause to control\
    \ the loop. We can see that the `else` does not run when the `break` occurs in\
    \ the loop.\n\n```\n>>> is_break = False\n>>> for x in range(5):\n...     if x\
    \ % 2 == 0:\n...         is_break = True\n...         break\n...\n>>> if is_break:\n\
    ...     print(\"break\")\n...\nbreak\n\n>>> for x in range(5):\n...     if x %\
    \ 2 == 0:\n...         print(\"break\")\n...         break\n...     else:\n...\
    \         print(\"no break\")\n...\nbreak\n```\n\n### 2.2.7 Using range\n\nThe\
    \ problem of range in Python 2 is that range may take up a lot of memory if we\
    \ need to iterate a loop many times. Consequently, using xrange is recommended\
    \ in Python 2.\n\n```\n>>> import platform\n>>> import sys\n>>> platform.python_version()\n\
    '2.7.15'\n>>> sys.getsizeof(range(100000000))\n800000072\n>>> sys.getsizeof(xrange(100000000))\n\
    40\n```\n\nIn Python 3, the built-in function range returns an iterable range\
    \ object instead of a list. The behavior of range is the same as the xrange in\
    \ Python 2. Therefore, using range do not take up huge memory anymore if we want\
    \ to run a code block many times within a loop. Further information can be found\
    \ on PEP 3100.\n\n```\n>>> import platform\n>>> import sys\n>>> platform.python_version()\n\
    '3.7.1'\n>>> sys.getsizeof(range(100000000))\n48\n```\n\n### 2.2.8 while ... else\
    \ ...\n\nThe else clause belongs to a while loop serves the same purpose as the\
    \ else clause in a for loop. We can observe that the else does not run when the\
    \ break occurs in the while loop.\n\n```python\n>>> n = 0\n>>> while n < 5:\n\
    ...     if n == 3:\n...         break\n...     n += 1\n... else:\n...     print(\"\
    no break\")\n...\n```\n\n### 2.2.9 The do while Statement\n\nThere are many programming\
    \ languages such as C/C++, Ruby, or Javascript, provide the do while statement.\
    \ In Python, there is no do while statement. However, we can place the condition\
    \ and the break at the end of a while loop to achieve the same thing.\n\n```python\n\
    >>> n = 0\n>>> while True:\n...     n += 1\n...     if n == 5:\n...         break\n\
    ...\n>>> n\n5\n```\n\n### 2.2.10 try ... except ... else ...\n\nMost of the time,\
    \ we handle errors in except clause and clean up resources in finally clause.\
    \ Interestingly, the try statement also provides an else clause for us to avoid\
    \ catching an exception which was raised by the code that should not be protected\
    \ by try ... except. The else clause runs when no exception occurs between try\
    \ and except.\n\n```python\n>>> try:\n...     print(\"No exception\")\n... except:\n\
    ...     pass\n... else:\n...     print(\"Success\")\n...\nNo exception\nSuccess\n\
    ```"
