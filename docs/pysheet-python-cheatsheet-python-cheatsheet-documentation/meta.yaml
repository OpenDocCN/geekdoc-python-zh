    ## 3.5.34 join on relationship and group_by count\n\n```python\nfrom sqlalchemy\
    \ import (\n    create_engine,\n    Column,\n    String,\n    Integer,\n    ForeignKey,\n\
    \    func)\n\nfrom sqlalchemy.orm import (\n    relationship,\n    sessionmaker,\n\
    \    scoped_session)\n\nfrom sqlalchemy.ext.declarative import declarative_base\n\
    \ndb_url = 'sqlite://'\nengine = create_engine(db_url)\n\nBase = declarative_base()\n\
    \nclass Parent(Base):\n    __tablename__ = 'parent'\n    id       = Column(Integer,\
    \ primary_key=True)\n    name     = Column(String)\n    children = relationship('Child',\
    \ back_populates='parent')\n\nclass Child(Base):\n    __tablename__ = 'child'\n\
    \    id         = Column(Integer, primary_key=True)\n    name       = Column(String)\n\
    \    parent_id  = Column(Integer, ForeignKey('parent.id'))\n    parent     = relationship('Parent',\
    \ back_populates='children')\n\nBase.metadata.create_all(bind=engine)\nSession\
    \ = scoped_session(sessionmaker(bind=engine))\n\np1 = Parent(name=\"Alice\")\n\
    p2 = Parent(name=\"Bob\")\n\nc1 = Child(name=\"foo\")\nc2 = Child(name=\"bar\"\
    )\nc3 = Child(name=\"ker\")\nc4 = Child(name=\"cat\")\n\np1.children.extend([c1,\
    \ c2, c3])\np2.children.append(c4)\n\ntry:\n    Session.add(p1)\n    Session.add(p2)\n\
    \    Session.commit()\n\n    # count number of children\n    q = Session.query(Parent,\
    \ func.count(Child.id))\\\n            .join(Child)\\\n            .group_by(Parent.id)\n\
    \n    # print result\n    for _p, _c in q.all():\n        print('parent: {}, num_child:\
    \ {}'.format(_p.name, _c))\nfinally:\n    Session.remove()\n```\n\noutput:\n\n\
