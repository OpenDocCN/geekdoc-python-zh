    >>> print([_c for _c in s])

    [u''C'', u''a'', u''f'', u''\xe9'']

    >>> len(s)

    4

    ```


    Python 3 takes all string characters as Unicode code point. The lenght of a string
    is always equivalent to the number of characters.


    ```

    >>> s = ''Café''

    >>> print([_c for _c in s])

    [''C'', ''a'', ''f'', ''é'']

    >>> len(s)

    4

    >>> bs = bytes(s, encoding=''utf-8'')

    >>> print(bs)

    b''Caf\xc3\xa9''

    >>> len(bs)

    5

    ```


