    ```\n\n## 3.2.6 Simple TCP Echo Server\n\n```python\nimport socket\n\nclass Server(object):\n\
    \    def __init__(self, host, port):\n        self._host = host\n        self._port\
    \ = port\n    def __enter__(self):\n        sock = socket.socket(socket.AF_INET,\
