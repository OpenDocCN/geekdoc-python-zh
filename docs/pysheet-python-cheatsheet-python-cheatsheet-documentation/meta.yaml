    # 2.5.2 Initialize


    Generally speaking, we can create a list through * operator if the item in the
    list expression is an immutable object.


    ```

    >>> a = [None] * 3

    >>> a

    [None, None, None]

    >>> a[0] = "foo"

    >>> a

    [''foo'', None, None]

    ```


    However, if the item in the list expression is a mutable object, the * operator
    will copy the reference of the item N times. In order to avoid this pitfall, we
    should use a list comprehension to initialize a list.


    ```

    >>> a = [[]] * 3

    >>> b = [[] for _ in range(3)]

    >>> a[0].append("Hello")

    >>> a

    [[''Hello''], [''Hello''], [''Hello'']]

    >>> b[0].append("Python")

    >>> b

    [[''Python''], [], []]

    ```


    # 2.5.3 Copy


    Assigning a list to a variable is a common pitfall. This assignment does not copy
    the list to the variable. The variable only refers to the list and increase the
    reference count of the list.


    ```

    import sys

    >>> a = [1, 2, 3]

    >>> sys.getrefcount(a)

    2

    >>> b = a

    >>> sys.getrefcount(a)

    3

    >>> b[2] = 123456  # a[2] = 123456

    >>> b

    [1, 2, 123456]

    ```'
