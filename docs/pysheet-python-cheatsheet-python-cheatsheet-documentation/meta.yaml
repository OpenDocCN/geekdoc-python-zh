    \ 3)]\n>>> l.sort(key=itemgetter(1))\n>>> l\n[('amy', 3), ('david', 8), ('andy',\
    \ 10)]\n```\n\n`operator.itemgetter` is useful because the function returns a\
    \ getter method which can be applied to other objects with a method `__getitem__`.\
    \ For example, sorting a list with its elements are dictionary can be achieved\
    \ by using `operator.itemgetter` due to all elements have `__getitem__`.\n\n```\n\
    \n>>> from pprint import pprint\n>>> from operator import itemgetter\n>>> l =\
    \ [\n...     {'name': 'andy', 'age': 10},\n...     {'name': 'david', 'age': 8},\n\
    ...     {'name': 'amy', 'age': 3},\n... ]\n>>> l.sort(key=itemgetter('age'))\n\
    >>> pprint(l)\n[{'age': 3, 'name': 'amy'},\n {'age': 8, 'name': 'david'},\n {'age':\
    \ 10, 'name': 'andy'}]\n```\n\nIf it is necessary to sort a list with its elements\
    \ are neither comparable nor having `__getitem__` method, assigning a customized\
    \ key function is feasible.\n\n```\n\n>>> class Node(object):\n...     def __init__(self,\
    \ val):\n...         self.val = val\n...     def __repr__(self):\n...        \
    \ return f\"Node({self.val})\"\n...\n>>> nodes = [Node(3), Node(2), Node(1)]\n\
    >>> nodes.sort(key=lambda x: x.val)\n>>> nodes\n[Node(1), Node(2), Node(3)]\n\
    >>> nodes.sort(key=lambda x: x.val, reverse=True)\n>>> nodes\n[Node(3), Node(2),\
    \ Node(1)]\n```\n\nThe above snippet can be simplified by using `operator.attrgetter`.\
    \ The function returns an attribute getter based on the attribute's name. Note\
    \ that the attribute should be comparable; otherwise, `sorted` or `list.sort`\
    \ will raise `TypeError`."
