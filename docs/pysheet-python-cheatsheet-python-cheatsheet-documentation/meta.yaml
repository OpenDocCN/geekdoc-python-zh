    # 3.1.3 Group Comparison


    ```

    # (...) group a regular expression

    >>> m = re.search(r''(\d{4})-(\d{2})-(\d{2})'', ''2016-01-01'')

    >>> m

    <_sre.SRE_Match object; span=(0, 10), match=''2016-01-01''>

    >>> m.groups()

    (''2016'', ''01'', ''01'')

    >>> m.group()

    ''2016-01-01''

    >>> m.group(1)

    ''2016''

    >>> m.group(2)

    ''01''

    >>> m.group(3)

    ''01''


    # Nesting groups

    >>> m = re.search(r''(((\d{4})-\d{2})-\d{2})'', ''2016-01-01'')

    >>> m.groups()

    (''2016-01-01'', ''2016-01'', ''2016'')

    >>> m.group()

    ''2016-01-01''

    >>> m.group(1)

    ''2016-01-01''

    >>> m.group(2)

    ''2016-01''

    >>> m.group(3)

    ''2016''

    ```


    # 3.1.4 Non capturing group


    ```

    # non capturing group

    >>> url = ''http://stackoverflow.com/''

    >>> m = re.search(''(?:http|ftp)://([^/\r\n]+)(/[^\r\n]*)?'', url)

    >>> m.groups()

    (''stackoverflow.com'', ''/'')


    # capturing group

    >>> m = re.search(''(http|ftp)://([^/\r\n]+)(/[^\r\n]*)?'', url)

    >>> m.groups()

    (''http'', ''stackoverflow.com'', ''/'')

    ```'
