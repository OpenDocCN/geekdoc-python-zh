    # ### 3.1.8 Look around


    | notation | compare direction |

    | :--- | :--- |

    | `(?=...)` | left to right |

    | `(?!...)` | left to right |

    | `(?<=...)` | right to left |

    | `(?!<...)` | right to left |


    ```

    python

    # basic

    >>> re.sub(''(?=\d{3})'', '' '', ''12345'')

    '' 1 2 345''

    >>> re.sub(''(?!\d{3})'', '' '', ''12345'')

    ''123 4 5 ''

    >>> re.sub(''(?<=\d{3})'', '' '', ''12345'')

    ''123 4 5 ''

    >>> re.sub(''(?<!\d{3})'', '' '', ''12345'')

    '' 1 2 345''

    ```


