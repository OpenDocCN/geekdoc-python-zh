    # 2.2.1 Hello world!


    When we start to learn a new language, we usually learn from printing **Hello
    world!**. In Python, we can use another way to print the message by importing
    `__hello__` module. The source code can be found on `frozen.c`.


    ```

    >>> print("Hello world!")

    Hello world!

    >>> import __hello__

    Hello world!

    >>> import __phello__

