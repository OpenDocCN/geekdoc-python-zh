  md: '# python-cheatsheet Documentation, Release 0.1.0


    # 2.2.2 Python Version


    It is important for a programmer to know current Python version because not every
    syntax will work in the current version. In this case, we can get the Python version
    by `python -V` or using the module, `sys`.


    ```

    >>> import sys

    >>> print(sys.version)

    3.7.1 (default, Nov 6 2018, 18:46:03)

    [Clang 10.0.0 (clang-1000.11.45.5)]

    ```


    We can also use `platform.python_version` to get Python version.


    ```

    >>> import platform

    >>> platform.python_version()

    ''3.7.1''

    ```


    Sometimes, checking the current Python version is important because we may want
    to enable some features in some specific versions. `sys.version_info` provides
    more detail information about the interpreter. We can use it to compare with the
    version we want.


    ```

    >>> import sys

    >>> sys.version_info >= (3, 6)

    True

    >>> sys.version_info >= (3, 7)

    False

    ```


    # 2.2.3 Ellipsis


    `Ellipsis` is a built-in constant. After Python 3.0, we case use `...` as `Ellipsis`.
    It may be the most enigmatic constant in Python. Based on the official document,
    we can use it to extend slicing syntax. Nevertheless, there are some other conventions
    in type hinting, stub files, or function expressions.


    ```

    >>>

    Ellipsis

    >>> ... == Ellipsis

    True

    >>> type(...)

    <class ''ellipsis''>

    ```


    The following snippet shows that we can use the ellipsis to represent a function
    or a class which has not implemented yet.


    ```

    >>> class Foo: ...

    ...

    >>> def foo(): ...

    ...

    ```'
