    # 2.5.8 Zip Lists


    `zip` enables us to iterate over items contained in multiple lists at a time.
    Iteration stops whenever one of the lists is exhausted. As a result, the length
    of the iteration is the same as the shortest list. If this behavior is not desired,
    we can use `itertools.zip_longest` in **Python 3** or `itertools.izip_longest`
    in **Python 2**.


    ```

    >>> a = [1, 2, 3]

    >>> b = [4, 5, 6]

    >>> list(zip(a, b))

    [(1, 4), (2, 5), (3, 6)]

    >>> c = [1]

    >>> list(zip(a, b, c))

    [(1, 4, 1)]

    >>> from itertools import zip_longest

    >>> list(zip_longest(a, b, c))

    [(1, 4, 1), (2, 5, None), (3, 6, None)]

    ```


    # 2.5.9 Filter Items


    `filter` is a built-in function to assist us to remove unnecessary items. In **Python
    2**, `filter` returns a list. However, in **Python 3**, `filter` returns an *iterable
    object*. Note that *list comprehension* or *generator expression* provides a more
    concise way to remove items.


    ```

    >>> [x for x in range(5) if x > 1]

    [2, 3, 4]

    >>> l = [''1'', ''2'', 3, ''Hello'', 4]

    >>> f = lambda x: isinstance(x, int)

    >>> filter(f, l)

    <filter object at 0x10bee2198>

    >>> list(filter(f, l))

    [3, 4]

    >>> list((i for i in l if f(i)))

    [3, 4]

    ```'
