    \ Be careful of Optional\n\n```python\nfrom typing import cast, Optional\n\ndef\
    \ fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n        b, a = a + b, b\n\
    \    return a\n\ndef cal(n: Optional[int]) -> None:\n    print(fib(n))\n\ncal(None)\n\
    ```\n\noutput:\n\n```bash\n# mypy will not detect errors\n$ mypy foo.py\n```\n\
    \nExplicitly declare\n\n```python\nfrom typing import Optional\n\ndef fib(n: int)\
    \ -> int:  # declare n to be int\n    a, b = 0, 1\n    for _ in range(n):\n  \
    \      b, a = a + b, b\n    return a\n\ndef cal(n: Optional[int]) -> None:\n \
    \   print(fib(n))\n```\n\noutput:\n\n```\n# mypy can detect errors even we do\
    \ not check None\n$ mypy --strict foo.py\nfoo.py:11: error: Argument 1 to \"fib\"\
    \ has incompatible type \"Optional[int]\"; expected \"int\"\n```\n\n## 2.12.15\
    \ Be careful of casting\n\n```python\nfrom typing import cast, Optional\n\ndef\
    \ gcd(a: int, b: int) -> int:\n    while b:\n        a, b = b, a % b\n    return\
    \ a\n\ndef cal(a: Optional[int], b: Optional[int]) -> None:\n    # XXX: Avoid\
    \ casting\n    ca, cb = cast(int, a), cast(int, b)\n    print(gcd(ca, cb))\n\n\
    cal(None, None)\n```\n\noutput:\n\n```\n# mypy will not detect type errors\n$\
    \ mypy --strict foo.py\n```\n\n## 2.12.16 Forward references\n\nBased on PEP 484,\
    \ if we want to reference a type before it has been declared, we have to use **string\
    \ literal** to imply that there is a type of that name later on in the file.\n\
    \n```python\nfrom typing import Optional\n\n\nclass Tree:\n    def __init__(\n\
    \        self, data: int,\n        left: Optional[\"Tree\"],  # Forward references.\n\
    \        right: Optional[\"Tree\"]\n    ) -> None:\n        self.data = data\n\
    \        self.left = left\n        self.right = right\n```\n\n> **Note:** There\
    \ are some issues that mypy does not complain about Forward References. Get further\
    \ information from Issue#948.\n\n```python\nclass A:\n    def __init__(self, a:\
    \ A) -> None:  # should fail\n        self.a = a\n```\n\noutput:\n\n```\n$ mypy\
    \ --strict type.py\n$ echo $?\n0\n$ python type.py   # get runtime fail\nTraceback\
    \ (most recent call last):\n  File \"type.py\", line 1, in <module>\n    class\
    \ A:\n  File \"type.py\", line 2, in A\n    def __init__(self, a: A) -> None:\
    \  # should fail\nNameError: name 'A' is not defined\n```\n\n## 2.12.17 Postponed\
    \ Evaluation of Annotations\n\nNew in Python 3.7\n\n- PEP 563 - Postponed Evaluation\
    \ of Annotations\n\nBefore Python 3.7\n\n```\n>>> class A:\n...     def __init__(self,\
    \ a: A) -> None:\n...         self._a = a\n...\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\", line 2, in A\nNameError:\
    \ name 'A' is not defined\n```\n\nAfter Python 3.7 (include 3.7)\n\n```\n>>> from\
    \ __future__ import annotations\n>>> class A:\n...     def __init__(self, a: A)\
    \ -> None:\n...         self._a = a\n...\n```\n\n> Note: Annotation can only be\
    \ used within the scope which names have already existed. Therefore, forward reference\
    \ does not support the case which names are not available in the current scope.\
    \ Postponed evaluation of annotations will become the default behavior in Python\
    \ 4.0.\n\n## 2.12.18 Type alias\n\nLike typedef or using in c/c++\n\n```cpp\n\
    #include <iostream>\n#include <string>\n#include <regex>\n#include <vector>\n\n\
    typedef std::string Url;\ntemplate<typename T> using Vector = std::vector<T>;\n\
    \nint main(int argc, char *argv[])\n{\n    Url url = \"https://python.org\";\n\
    \    std::regex p(\"(https?)://([^/\\r\\n]+)(/[^\\r\\n]*)?\");\n    bool m = std::regex_match(url,\
    \ p);\n    Vector<int> v = {1, 2};\n\n    std::cout << m << std::endl;\n    for\
    \ (auto it : v) std::cout << it << std::endl;\n    return 0;\n}\n```\n\nType aliases\
    \ are defined by simple variable assignments\n\n```python\nimport re\n\nfrom typing\
    \ import Pattern, List\n\n# Like typedef, using in c/c++\n\n# PEP 484 recommend\
    \ capitalizing alias names\nUrl = str\n\nurl: Url = \"https://www.python.org/\"\
    \n\np: Pattern = re.compile(\"(https?)://([^/\\r\\n]+)(/[^\\r\\n]*)?\")\nm = p.match(url)\n\
    \nVector = List[int]\nv: Vector = [1., 2.]\n```\n\n## 2.12.19 Define a NewType\n\
    \nUnlike alias, NewType returns a separate type but is identical to the original\
    \ type at runtime.\n\n```python\nfrom sqlalchemy import Column, String, Integer\n\
    from sqlalchemy.ext.declarative import declarative_base\nfrom typing import NewType,\
    \ Any\n\n# check mypy #2477\nBase: Any = declarative_base()\n```\n\n```python\n\
    # create a new type\nId = NewType('Id', int) # not equal alias, it's a 'new type'\n\
    \nclass User(Base):\n    __tablename__ = 'User'\n    id = Column(Integer, primary_key=True)\n\
    \    age = Column(Integer, nullable=False)\n    name = Column(String, nullable=False)\n\
    \n    def __init__(self, id: Id, age: int, name: str) -> None:\n        self.id\
    \ = id\n        self.age = age\n        self.name = name\n\n# create users\nuser1\
    \ = User(Id(1), 62, \"Guido van Rossum\") # ok\nuser2 = User(2, 48, \"David M.\
