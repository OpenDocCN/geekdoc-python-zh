  - "[PAGE 6]\n\n# ## WHAT'S NEW IN PYTHON 3\n\nThe official document, [What's New\
    \ In Python](What's New In Python), displays all of the most important changes.\
    \ However, if you're too busy to read the whole changes, this part provides a\
    \ brief glance of new features in Python 3.\n\n# ### 1.1 New in Python3\n\n+ \
    \  Table of Contents\n* New in Python3\n    - *print* is a function\n    - String\
    \ is unicode\n    - Division Operator\n    - New dict implementation\n    - Keyword-Only\
