    ...     except Exception as e:\n...         print('test fail success')\n...\n\
    >>> test_send_req_fail()\ntest fail success\n```\n\n## 3.10 C Extensions\n\nOccasionally,\
    \ it is unavoidable for pythoneers to write a C extension. For example, porting\
