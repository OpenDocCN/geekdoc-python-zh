    \n```\nclass StartPoint(gdb.Breakpoint):\n    def __init__(self, *a, **kw):\n\
    \        super().__init__(*a, **kw)\n        self.silent = True\n        self.stack\
    \ = []\n\n    def stop(self):\n        start = time.time()\n        # start, end,\
