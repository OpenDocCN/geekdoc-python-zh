    \ to variables within an expression before 3.8. To fix this problem, therefore,\
    \ PEP 572 introduced the walrus operator for developers. The following Python\
    \ snippet is equal to the previous C example.\n\n```\npython\n>>> import os\n\
    >>> from ctypes import *\n>>> libc = CDLL(\"libc.dylib\", use_errno=True)\n>>>\
    \ access = libc.access\n>>> path = create_string_buffer(b\"hello_walrus\")\n>>>\
    \ if (rc := access(path, os.R_OK)) == -1:\n...     errno = get_errno()\n...  \
    \   print(os.strerror(errno), file=sys.stderr)\n...\nNo such file or directory\n\
    ```\n\n# ### 4.4.3 Why := ?\n\nDevelopers may confuse the difference between “:=”\
    \ and “=.” In fact, they serve the same purpose, assigning some- things to variables.\
    \ Why Python introduced “:=” instead of using “=”? What is the benefit of using\
    \ “:=”? One reason is to reinforce the visual recognition due to a common mistake\
    \ made by C/C++ developers. For instance,\n\n```\nc\nint rc = access(\"hello_walrus\"\
    , R_OK);\n\n// rc is unintentionally assigned to -1\nif (rc = -1) {\n    fprintf(stderr,\
    \ \"%s\", strerror(errno));\n    goto end;\n}\n```\n\nRather than comparison,\
    \ the variable, rc, is mistakenly assigned to -1. To prevent this error, some\
    \ people advocate using Yoda conditions within an expression.\n\n```\nc\nint rc\
    \ = access(\"hello_walrus\", R_OK);\n\n// -1 = rc will raise a compile error\n\
    if (-1 == rc) {\n    fprintf(stderr, \"%s\", strerror(errno));\n    goto end;\n\
    }\n```"
