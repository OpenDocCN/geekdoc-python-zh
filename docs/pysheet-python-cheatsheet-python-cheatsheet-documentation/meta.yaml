  md: '# 2.2.4 if ... elif ... else


    The **if statements** are used to control the code flow. Instead of using `switch`
    or `case` statements control the logic of the code, Python uses `if ... elif ...
    else` sequence. Although someone proposes we can use `dict` to achieve `switch`
    statements, this solution may introduce unnecessary overhead such as creating
    disposable dictionaries and undermine a readable code. Thus, the solution is not
    recommended.


    ```

    >>> import random

    >>> num = random.randint(0, 10)

    >>> if num < 3:

    ...     print("less than 3")

    ... elif num < 5:

    ...     print("less than 5")

    ... else:

    ...     print(num)

    ...

    less than 3

    ```


    # 2.2.5 for Loop


    In Python, we can access iterable object’s items directly through the **for statement**.
    If we need to get indexes and items of an iterable object such as list or tuple
    at the same time, using `enumerate` is better than `range(len(iterable))`. Further
    information can be found on `Looping Techniques`.


    ```

    >>> for val in ["foo", "bar"]:

    ...     print(val)

    ...

    foo

    bar

    >>> for idx, val in enumerate(["foo", "bar", "baz"]):

    ...     print(idx, val)

    ...

    (0, ''foo'')

    (1, ''bar'')

    (2, ''baz'')

    ```


    # 2.2.6 for ... else ...


    It may be a little weird when we see the `else` belongs to a `for` loop at the
    first time. The `else` clause can assist us to avoid using flag variables in loops.
    A loop’s `else` clause runs when no `break` occurs.


    ```

    >>> for _ in range(5):

    ...     pass

    ... else:

    ...     print("no break")

    ...

    no break

    ```


    The following snippet shows the difference between using a flag variable and the
    `else` clause to control the loop. We can see that the `else` does not run when
    the `break` occurs in the loop.'
