    \ socket.SOCK_STREAM)\n    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR,\
    \ 1)\n    sock.bind(host)\n    sock.listen(5)\n    while True:\n        yield\
    \ 'recv', sock\n        conn,addr = sock.accept()\n        tasks.append(client_handler(conn))\n\
    \ndef client_handler(conn):\n    while True:\n        yield 'recv', conn\n   \
    \     msg = conn.recv(1024)\n        if not msg:\n            break\n        yield\
    \ 'send', conn\n        conn.send(msg)\n    conn.close()\n\ntasks.append(server())\n\
    run()\n\n```\n\n# 2.11.23 Asynchronous Generators\n\n```\npython\n# PEP 525\n\
    #\n# Need python-3.6 or above\n\n>>> import asyncio\n>>> async def slow_gen(n,\
    \ t):\n...     for x in range(n):\n...         await asyncio.sleep(t)\n...   \
    \      yield x\n...\n>>> async def task(n):\n...     async for x in slow_gen(n,\
    \ 0.1):\n...         print(x)\n...\n\n```\n\n(continues on next page)"
