    # ### 1.1.6 New Super


    New in Python 3.0


    +   - PEP 3135 - New Super


    Python 2


    ```


    >>> class ParentCls(object):

    ...     def foo(self):

    ...         print "call parent"

    ...

    >>> class ChildCls(ParentCls):

    ...     def foo(self):

    ...         super(ChildCls, self).foo()

    ...         print "call child"

    ...

    >>> p = ParentCls()

    >>> c = ChildCls()

    >>> p.foo()

    call parent

    >>> c.foo()

    call parent

    call child


    ```


    Python 3


    ```


    >>> class ParentCls(object):

    ...     def foo(self):

    ...         print("call parent")

    ...

    >>> class ChildCls(ParentCls):

    ...     def foo(self):

    ...         super().foo()

    ...         print("call child")

    ...

    >>> p = ParentCls()

    >>> c = ChildCls()

    >>> p.foo()

    call parent

    >>> c.foo()

    call parent

    call child


    ```'
