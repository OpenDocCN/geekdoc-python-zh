    \   if isinstance(res, Future) or inspect.isgenerator(res):\n            res =\
    \ yield from res\n        return res\n    return types.coroutine(coro)\n\n@coroutine\n\
    def foo():\n    yield from asyncio.sleep(1)\n    print(\"Hello Foo\")\n\nloop\
    \ = asyncio.get_event_loop()\n\n```"
- md: "## 4.2.6 Conclusion\n\nAsynchronous programming via an event loop becomes more\
    \ straightforward and readable nowadays due to modern syntaxes and libraries'\
    \ support. Most programming languages, including Python, implement libraries to\
    \ manage task scheduling via interacting with new syntaxes. While new syntaxes\
    \ look enigmatic in the beginning, they provide a way for programmers to develop\
    \ logical structure in their code, like using threads. Also, without calling a\
    \ callback function after a task finish, programmers do not need to worry about\
    \ how to pass the current task status, such as local variables and arguments,\
    \ into other callbacks. Thus, programmers will be able to focus on developing\
    \ their programs without wasting a lot of time to troubleshoot concurrent issues.\n\
    \n## 4.2.7 Reference\n\n1. asyncio — Asynchronous I/O\n2. PEP 342 - Coroutines\
    \ via Enhanced Generators\n3. PEP 380 - Syntax for Delegating to a Subgenerator\n\
    4. PEP 492 - Coroutines with async and await syntax\n\n## 4.3 Asyncio behind the\
    \ Scenes\n\n- Asyncio behind the Scenes\n  - What is Task?\n  - How does event\
    \ loop work?\n  - How does asyncio.wait work?\n  - Simple asyncio.run\n  - How\
    \ does loop.sock_* work?\n  - How does loop.create_server work?\n\n### 4.3.1 What\
    \ is Task?\n\n```python\n# goal: supervise coroutine run state\n# ref: asyncio/tasks.py\n\
    \nimport asyncio\nFuture = asyncio.futures.Future\n\nclass Task(Future):\n   \
    \ \"\"\"Simple prototype of Task\"\"\"\n\n    def __init__(self, gen, *, loop):\n\
    \        super().__init__(loop=loop)\n        self._gen = gen\n        self._loop.call_soon(self._step)\n\
    \n    def _step(self, val=None, exc=None):\n        try:\n            if exc:\n\
    \                f = self._gen.throw(exc)\n            else:\n               \
    \ f = self._gen.send(val)\n        except StopIteration as e:\n            self.set_result(e.value)\n\
    \        except Exception as e:\n            self.set_exception(e)\n        else:\n\
    \            f.add_done_callback(\n                self._wakeup)\n\n    def _wakeup(self,\
    \ fut):\n        try:\n            res = fut.result()\n        except Exception\
    \ as e:\n            self._step(None, e)\n        else:\n            self._step(res,\
    \ None)\n\n@asyncio.coroutine\ndef foo():\n    yield from asyncio.sleep(3)\n \
    \   print(\"Hello Foo\")\n\n@asyncio.coroutine\ndef bar():\n    yield from asyncio.sleep(1)\n\
    \    print(\"Hello Bar\")\n\nloop = asyncio.get_event_loop()\ntasks = [Task(foo(),\
    \ loop=loop),\n         loop.create_task(bar())]\nloop.run_until_complete(\n \
    \   asyncio.wait(tasks))\nloop.close()\n```\n\noutput:\n\n```\n$ python test.py\n\
    Hello Bar\nHello Foo\n```\n\n### 4.3.2 How does event loop work?\n\n```python\n\
    import asyncio\nfrom collections import deque\n\ndef done_callback(fut):\n   \
    \ fut._loop.stop()\n\nclass Loop:\n    \"\"\"Simple event loop prototype\"\"\"\
    \n\n    def __init__(self):\n        self._ready = deque()\n        self._stopping\
    \ = False\n\n    def create_task(self, coro):\n        Task = asyncio.tasks.Task\n\
    \        task = Task(coro, loop=self)\n        return task\n\n    def run_until_complete(self,\
    \ fut):\n        tasks = asyncio.tasks\n        # get task\n        fut = tasks.ensure_future(\n\
    \                fut, loop=self)\n        # add task to ready queue\n        fut.add_done_callback(done_callback)\n\
    \        # run tasks\n        self.run_forever()\n        # remove task from ready\
    \ queue\n        fut.remove_done_callback(done_callback)\n\n    def run_forever(self):\n\
    \        \"\"\"Run tasks until stop\"\"\"\n        try:\n            while True:\n\
    \                self._run_once()\n                if self._stopping:\n      \
    \              break\n        finally:\n            self._stopping = False\n\n\
    \    def call_soon(self, cb, *args):\n        \"\"\"Append task to ready queue\"\
    \"\"\n        self._ready.append((cb, args))\n    def call_exception_handler(self,\
    \ c):\n        pass\n\n    def _run_once(self):\n        \"\"\"Run task at once\"\
    \"\"\n        ntodo = len(self._ready)\n        for i in range(ntodo):\n     \
    \       t, a = self._ready.popleft()\n            t(*a)\n\n    def stop(self):\n\
    \        self._stopping = True\n\n    def close(self):\n        self._ready.clear()\n\
    \n    def get_debug(self):\n        return False\n\n@asyncio.coroutine\ndef foo():\n\
    \    print(\"Foo\")\n\n@asyncio.coroutine\ndef bar():\n    print(\"Bar\")\n\n\
    loop = Loop()\ntasks = [loop.create_task(foo()),\n         loop.create_task(bar())]\n\
    loop.run_until_complete(\n    asyncio.wait(tasks))\nloop.close()\n```\n\noutput:\n\
    \n```\n$ python test.py\nFoo\nBar\n```\n\n### 4.3.3 How does asyncio.wait work?\n\
    \n```python\nimport asyncio\n\nasync def wait(fs, loop=None):\n    fs = {asyncio.ensure_future(_)\
    \ for _ in set(fs)}\n    if loop is None:\n        loop = asyncio.get_event_loop()\n\
    \n    waiter = loop.create_future()\n    counter = len(fs)\n\n    def _on_complete(f):\n\
    \        nonlocal counter\n        counter -= 1\n        if counter <= 0 and not\
    \ waiter.done():\n            waiter.set_result(None)\n\n    for f in fs:\n  \
    \      f.add_done_callback(_on_complete)\n\n    # wait all tasks done\n    await\
    \ waiter\n\n    done, pending = set(), set()\n    for f in fs:\n        f.remove_done_callback(_on_complete)\n\
    \        if f.done():\n            done.add(f)\n        else:\n            pending.add(f)\n\
    \    return done, pending\n\nasync def slow_task(n):\n    await asyncio.sleep(n)\n\
    \    print('sleep \"{}\" sec'.format(n))\n\nloop = asyncio.get_event_loop()\n\n\
    try:\n    print(\"---> wait\")\n    loop.run_until_complete(\n        wait([slow_task(_)\
    \ for _ in range(1, 3)]))\n    print(\"---> asyncio.wait\")\n    loop.run_until_complete(\n\
    \        asyncio.wait([slow_task(_) for _ in range(1, 3)]))\nfinally:\n    loop.close()\n\
    ```\n\noutput:\n\n```\n---> wait\nsleep \"1\" sec\nsleep \"2\" sec\n---> asyncio.wait\n\
    sleep \"1\" sec\nsleep \"2\" sec\n```\n\n### 4.3.4 Simple asyncio.run\n\n```python\n\
    >>> import asyncio\n>>> async def getaddrinfo(host, port):\n...     loop = asyncio.get_event_loop()\n\
    ...     return (await loop.getaddrinfo(host, port))\n...\n>>> def run(main):\n\
    ...     loop = asyncio.new_event_loop()\n...     asyncio.set_event_loop(loop)\n\
    ...     return loop.run_until_complete(main)\n...\n>>> ret = run(getaddrinfo('google.com',\
    \ 443))\n>>> ret = asyncio.run(getaddrinfo('google.com', 443))\n```\n\n### 4.3.5\
    \ How does loop.sock_* work?\n\n```python\nimport asyncio\nimport socket\n\ndef\
    \ sock_accept(self, sock, fut=None, registed=False):\n    fd = sock.fileno()\n\
    \    if fut is None:\n        fut = self.create_future()\n    if registed:\n \
    \       self.remove_reader(fd)\n    try:\n        conn, addr = sock.accept()\n\
    \        conn.setblocking(False)\n    except (BlockingIOError, InterruptedError):\n\
    \        self.add_reader(fd, self.sock_accept, sock, fut, True)\n    except Exception\
    \ as e:\n        fut.set_exception(e)\n    else:\n        fut.set_result((conn,\
    \ addr))\n    return fut\n\ndef sock_recv(self, sock, n, fut=None, registed=False):\n\
    \    fd = sock.fileno()\n    if fut is None:\n        fut = self.create_future()\n\
    \    if registed:\n        self.remove_reader(fd)\n    try:\n        data = sock.recv(n)\n\
    \    except (BlockingIOError, InterruptedError):\n        self.add_reader(fd,\
    \ self.sock_recv, sock, n, fut, True)\n    except Exception as e:\n        fut.set_exception(e)\n\
    \    else:\n        fut.set_result(data)\n    return fut\n\ndef sock_sendall(self,\
    \ sock, data, fut=None, registed=False):\n    fd = sock.fileno()\n    if fut is\
    \ None:\n        fut = self.create_future()\n    if registed:\n        self.remove_writer(fd)\n\
    \    try:\n        n = sock.send(data)\n    except (BlockingIOError, InterruptedError):\n\
    \        n = 0\n    except Exception as e:\n        fut.set_exception(e)\n   \
    \     return\n    if n == len(data):\n        fut.set_result(None)\n    else:\n\
    \        if n:\n            data = data[n:]\n        self.add_writer(fd, sock,\
    \ data, fut, True)\n    return fut\n\nasync def handler(loop, conn):\n    while\
    \ True:\n        msg = await loop.sock_recv(conn, 1024)\n        if msg: await\
    \ loop.sock_sendall(conn, msg)\n        else: break\n    conn.close()\n\nasync\
    \ def server(loop):\n    sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM,\
    \ 0)\n    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n    sock.setblocking(False)\n\
    \    sock.bind(('localhost', 9527))\n    sock.listen(10)\n\n    while True:\n\
    \        conn, addr = await loop.sock_accept(sock)\n        loop.create_task(handler(loop,\
    \ conn))\n\nEventLoop = asyncio.SelectorEventLoop\nEventLoop.sock_accept = sock_accept\n\
    EventLoop.sock_recv = sock_recv\nEventLoop.sock_sendall = sock_sendall\nloop =\
    \ EventLoop()\n\ntry:\n    loop.run_until_complete(server(loop))\nexcept KeyboardInterrupt:\n\
    \    pass\nfinally:\n    loop.close()\n```\n\noutput:\n\n```\n# console 1\n$ python3\
    \ async_sock.py &\n$ nc localhost 9527\nHello\nHello\n```"
  mdcn: "## 4.2.6 结论\n\n得益于现代语法和库的支持，通过事件循环进行异步编程如今变得更加直观和易读。大多数编程语言，包括Python，都实现了库来通过与新语法交互来管理任务调度。虽然新语法起初看起来有些神秘，但它们为程序员提供了一种在代码中构建逻辑结构的方式，就像使用线程一样。此外，由于任务完成后无需调用回调函数，程序员不必担心如何将当前任务的状态（如局部变量和参数）传递给其他回调。因此，程序员将能够专注于开发程序，而无需花费大量时间排查并发问题。\n\
    \n## 4.2.7 参考资料\n\n1. asyncio — 异步I/O\n2. PEP 342 - 通过增强生成器实现协程\n3. PEP 380 -\
    \ 委托给子生成器的语法\n4. PEP 492 - 使用async和await语法的协程\n\n## 4.3 Asyncio 背后的原理\n\n- Asyncio\
    \ 背后的原理\n  - 什么是 Task？\n  - 事件循环如何工作？\n  - asyncio.wait 如何工作？\n  - 简单的 asyncio.run\n\
    \  - loop.sock_* 如何工作？\n  - loop.create_server 如何工作？\n\n### 4.3.1 什么是 Task？\n\n\
    ```python\n# 目标：监督协程的运行状态\n# 参考：asyncio/tasks.py\n\nimport asyncio\nFuture = asyncio.futures.Future\n\
    \nclass Task(Future):\n    \"\"\"Task 的简单原型\"\"\"\n\n    def __init__(self, gen,\
    \ *, loop):\n        super().__init__(loop=loop)\n        self._gen = gen\n  \
    \      self._loop.call_soon(self._step)\n\n    def _step(self, val=None, exc=None):\n\
    \        try:\n            if exc:\n                f = self._gen.throw(exc)\n\
    \            else:\n                f = self._gen.send(val)\n        except StopIteration\
    \ as e:\n            self.set_result(e.value)\n        except Exception as e:\n\
    \            self.set_exception(e)\n        else:\n            f.add_done_callback(\n\
    \                self._wakeup)\n\n    def _wakeup(self, fut):\n        try:\n\
    \            res = fut.result()\n        except Exception as e:\n            self._step(None,\
    \ e)\n        else:\n            self._step(res, None)\n\n@asyncio.coroutine\n\
    def foo():\n    yield from asyncio.sleep(3)\n    print(\"Hello Foo\")\n\n@asyncio.coroutine\n\
    def bar():\n    yield from asyncio.sleep(1)\n    print(\"Hello Bar\")\n\nloop\
    \ = asyncio.get_event_loop()\ntasks = [Task(foo(), loop=loop),\n         loop.create_task(bar())]\n\
    loop.run_until_complete(\n    asyncio.wait(tasks))\nloop.close()\n```\n\n输出：\n\
    \n```\n$ python test.py\nHello Bar\nHello Foo\n```\n\n### 4.3.2 事件循环如何工作？\n\n\
    ```python\nimport asyncio\nfrom collections import deque\n\ndef done_callback(fut):\n\
    \    fut._loop.stop()\n\nclass Loop:\n    \"\"\"简单的事件循环原型\"\"\"\n\n    def __init__(self):\n\
    \        self._ready = deque()\n        self._stopping = False\n\n    def create_task(self,\
    \ coro):\n        Task = asyncio.tasks.Task\n        task = Task(coro, loop=self)\n\
    \        return task\n\n    def run_until_complete(self, fut):\n        tasks\
    \ = asyncio.tasks\n        # 获取任务\n        fut = tasks.ensure_future(\n      \
    \          fut, loop=self)\n        # 将任务添加到就绪队列\n        fut.add_done_callback(done_callback)\n\
    \        # 运行任务\n        self.run_forever()\n        # 从就绪队列中移除任务\n        fut.remove_done_callback(done_callback)\n\
    \n    def run_forever(self):\n        \"\"\"运行任务直到停止\"\"\"\n        try:\n   \
    \         while True:\n                self._run_once()\n                if self._stopping:\n\
    \                    break\n        finally:\n            self._stopping = False\n\
    \n    def call_soon(self, cb, *args):\n        \"\"\"将任务追加到就绪队列\"\"\"\n      \
    \  self._ready.append((cb, args))\n    def call_exception_handler(self, c):\n\
    \        pass\n\n    def _run_once(self):\n        \"\"\"立即运行任务\"\"\"\n      \
    \  ntodo = len(self._ready)\n        for i in range(ntodo):\n            t, a\
    \ = self._ready.popleft()\n            t(*a)\n\n    def stop(self):\n        self._stopping\
    \ = True\n\n    def close(self):\n        self._ready.clear()\n\n    def get_debug(self):\n\
    \        return False\n\n@asyncio.coroutine\ndef foo():\n    print(\"Foo\")\n\n\
    @asyncio.coroutine\ndef bar():\n    print(\"Bar\")\n\nloop = Loop()\ntasks = [loop.create_task(foo()),\n\
    \         loop.create_task(bar())]\nloop.run_until_complete(\n    asyncio.wait(tasks))\n\
    loop.close()\n```\n\n输出：\n\n```\n$ python test.py\nFoo\nBar\n```\n\n### 4.3.3\
    \ asyncio.wait 如何工作？\n\n```python\nimport asyncio\n\nasync def wait(fs, loop=None):\n\
    \    fs = {asyncio.ensure_future(_) for _ in set(fs)}\n    if loop is None:\n\
    \        loop = asyncio.get_event_loop()\n\n    waiter = loop.create_future()\n\
    \    counter = len(fs)\n\n    def _on_complete(f):\n        nonlocal counter\n\
    \        counter -= 1\n        if counter <= 0 and not waiter.done():\n      \
    \      waiter.set_result(None)\n\n    for f in fs:\n        f.add_done_callback(_on_complete)\n\
    \n    # 等待所有任务完成\n    await waiter\n\n    done, pending = set(), set()\n    for\
    \ f in fs:\n        f.remove_done_callback(_on_complete)\n        if f.done():\n\
    \            done.add(f)\n        else:\n            pending.add(f)\n    return\
    \ done, pending\n\nasync def slow_task(n):\n    await asyncio.sleep(n)\n    print('sleep\
    \ \"{}\" sec'.format(n))\n\nloop = asyncio.get_event_loop()\n\ntry:\n    print(\"\
    ---> wait\")\n    loop.run_until_complete(\n        wait([slow_task(_) for _ in\
    \ range(1, 3)]))\n    print(\"---> asyncio.wait\")\n    loop.run_until_complete(\n\
    \        asyncio.wait([slow_task(_) for _ in range(1, 3)]))\nfinally:\n    loop.close()\n\
    ```\n\n输出：\n\n```\n---> wait\nsleep \"1\" sec\nsleep \"2\" sec\n---> asyncio.wait\n\
    sleep \"1\" sec\nsleep \"2\" sec\n```\n\n### 4.3.4 简单的 asyncio.run\n\n```python\n\
    >>> import asyncio\n>>> async def getaddrinfo(host, port):\n...     loop = asyncio.get_event_loop()\n\
    ...     return (await loop.getaddrinfo(host, port))\n...\n>>> def run(main):\n\
    ...     loop = asyncio.new_event_loop()\n...     asyncio.set_event_loop(loop)\n\
    ...     return loop.run_until_complete(main)\n...\n>>> ret = run(getaddrinfo('google.com',\
    \ 443))\n>>> ret = asyncio.run(getaddrinfo('google.com', 443))\n```\n\n### 4.3.5\
    \ loop.sock_* 如何工作？\n\n```python\nimport asyncio\nimport socket\n\ndef sock_accept(self,\
    \ sock, fut=None, registed=False):\n    fd = sock.fileno()\n    if fut is None:\n\
    \        fut = self.create_future()\n    if registed:\n        self.remove_reader(fd)\n\
    \    try:\n        conn, addr = sock.accept()\n        conn.setblocking(False)\n\
    \    except (BlockingIOError, InterruptedError):\n        self.add_reader(fd,\
    \ self.sock_accept, sock, fut, True)\n    except Exception as e:\n        fut.set_exception(e)\n\
    \    else:\n        fut.set_result((conn, addr))\n    return fut\n\ndef sock_recv(self,\
    \ sock, n, fut=None, registed=False):\n    fd = sock.fileno()\n    if fut is None:\n\
    \        fut = self.create_future()\n    if registed:\n        self.remove_reader(fd)\n\
    \    try:\n        data = sock.recv(n)\n    except (BlockingIOError, InterruptedError):\n\
    \        self.add_reader(fd, self.sock_recv, sock, n, fut, True)\n    except Exception\
    \ as e:\n        fut.set_exception(e)\n    else:\n        fut.set_result(data)\n\
    \    return fut\n\ndef sock_sendall(self, sock, data, fut=None, registed=False):\n\
    \    fd = sock.fileno()\n    if fut is None:\n        fut = self.create_future()\n\
    \    if registed:\n        self.remove_writer(fd)\n    try:\n        n = sock.send(data)\n\
    \    except (BlockingIOError, InterruptedError):\n        n = 0\n    except Exception\
    \ as e:\n        fut.set_exception(e)\n        return\n    if n == len(data):\n\
    \        fut.set_result(None)\n    else:\n        if n:\n            data = data[n:]\n\
    \        self.add_writer(fd, sock, data, fut, True)\n    return fut\n\nasync def\
    \ handler(loop, conn):\n    while True:\n        msg = await loop.sock_recv(conn,\
    \ 1024)\n        if msg: await loop.sock_sendall(conn, msg)\n        else: break\n\
    \    conn.close()\n\nasync def server(loop):\n    sock = socket.socket(socket.AF_INET,\
    \ socket.SOCK_STREAM, 0)\n    sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR,\
    \ 1)\n    sock.setblocking(False)\n    sock.bind(('localhost', 9527))\n    sock.listen(10)\n\
    \n    while True:\n        conn, addr = await loop.sock_accept(sock)\n       \
    \ loop.create_task(handler(loop, conn))\n\nEventLoop = asyncio.SelectorEventLoop\n\
    EventLoop.sock_accept = sock_accept\nEventLoop.sock_recv = sock_recv\nEventLoop.sock_sendall\
    \ = sock_sendall\nloop = EventLoop()\n\ntry:\n    loop.run_until_complete(server(loop))\n\
    except KeyboardInterrupt:\n    pass\nfinally:\n    loop.close()\n```\n\n输出：\n\n\
    ```\n# 控制台 1\n$ python3 async_sock.py &\n$ nc localhost 9527\nHello\nHello\n```"
