    \    n(int: 1) [4]\nfib @ a.cpp:3\n    n(int: 0) [4]\nfib @ a.cpp:3\n    n(int:\
    \ 1) [4]\n[Inferior 1 (process 5409) exited normally]\nTracepoint 'main' Count:\
    \ 1\nTracepoint 'fib' Count: 5\n\n```\n\n# ## 4.5.8 Profiling\n\nWithout inserting\
    \ timestamps, profiling is still feasible through tracepoints. By using a gdb.FinishBreakpoint\
    \ after a gdb.Breakpoint, GDB sets a temporary breakpoint at the return address\
    \ of a frame for developers to get the current timestamp and to calculate the\
    \ time difference. Note that profiling via GDB is not precise. Other tools, such\
    \ as Linux perf or Valgrind, provide more useful and accurate information to trace\
    \ performance issues.\n\n```\n\nimport gdb\nimport time\n\nclass EndPoint(gdb.FinishBreakpoint):\n\
    \    def __init__(self, breakpoint, *a, **kw):\n        super().__init__(*a, **kw)\n\
    \        self.silent = True\n        self.breakpoint = breakpoint\n\n    def stop(self):\n\
    \        # normal finish\n\n```"
