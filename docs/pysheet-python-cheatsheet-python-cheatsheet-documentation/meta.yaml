    \n## 2.1 Style\n\n- Table of Contents\n  - Style\n    - Naming\n      - Class\n\
    \      - Function\n      - Variable\n\n### 2.1.1 Naming\n\n#### Class\n\nBad\n\
    \n```python\nclass fooClass: ...\nclass foo_class: ...\n```\n\nGood\n\n```python\n\
    class FooClass: ...\n```\n\n#### Function\n\nBad\n\n```python\ndef CapCamelCase(*a):\
    \ ...\ndef mixCamelCase(*a): ...\n```\n\nGood\n\n```python\ndef func_separated_by_underscores(*a):\
    \ ...\n```\n\n#### Variable\n\nBad\n\n```python\nFooVar = \"CapWords\"\nfooVar\
    \ = \"mixedCase\"\nFoo_Var = \"CapWords_With_Underscore\"\n```\n\nGood\n\n```python\n\
    # local variable\nvar = \"lowercase\"\n\n# internal use\n_var = \"_single_leading_underscore\"\
    \n\n# avoid conflicts with Python keyword\nvar_ = \"single_trailing_underscore_\"\
    \n\n# a class attribute (private use in class)\n__var = \" __double_leading_underscore\"\
    \n\n# \"magic\" objects or attributes, ex: __init__\n__name__\n\n# throwaway variable,\
    \ ex: _, v = (1, 2)\n_ = \"throwaway\"\n```\n\n## 2.2 From Scratch\n\nThe main\
    \ goal of this cheat sheet is to collect some common and basic semantics or snippets.\
    \ The cheat sheet includes some syntax, which we have already known but still\
