    \ unicode_literals\n>>> type(\"Guido\") # string type become unicode\n<type 'unicode'>\n\
    ```\n\n## 2.3.4 除法\n\n有时，当除法结果是整数或长整数时，这可能违反直觉。在这种情况下，Python 3 默认启用了**真除**。然而，在\
    \ Python 2 中，我们必须将除法行为移植到当前的解释器中。更多信息请参阅 PEP 238。\n\n```\n>>> 1 / 2\n0\n>>> from\
    \ __future__ import division\n>>> 1 / 2   # return a float (classic division)\n\
    0.5\n>>> 1 // 2  # return a int (floor division)\n0\n```\n\n## 2.3.5 类型注解\n\n\
    在 Python 3.7 之前，如果当前作用域中尚不可用，我们不能在类或函数中为类自身添加类型注解。一种常见的情况是定义容器类。\n\n```\nclass\
    \ Tree(object):\n\n    def insert(self, tree: Tree): ...\n```\n\n示例\n\n```\n$\
    \ python3 foo.py\nTraceback (most recent call last):\n  File \"foo.py\", line\
    \ 1, in <module>\n    class Tree(object):\n  File \"foo.py\", line 3, in Tree\n\
    \    def insert(self, tree: Tree): ...\nNameError: name 'Tree' is not defined\n\
    ```\n\n在这种情况下，类的定义尚不可用。Python 解析器在定义时无法解析该注解。为了解决此问题，Python 使用字符串字面量来替代该类。\n\n\
    ```\nclass Tree(object):\n\n    def insert(self, tree: 'Tree'): ...\n```\n\n在\
    \ 3.7 版本之后，Python 引入了 future 语句 `annotations`，以执行延迟求值。这将在 Python 4 中成为默认功能。更多信息请参考\
    \ [PEP 563](https://peps.python.org/pep-0563/)。\n\n```\nfrom __future__ import\
    \ annotations\n\nclass Tree(object):\n\n    def insert(self, tree: Tree): ...\n\
    ```\n\n## 2.3.6 BDFL 退休\n\n**Python 3.1 新增功能**\n\nPEP 401 只是一个彩蛋。此功能将当前解释器带回过去。它在\
    \ Python 3 中启用了钻石运算符 `<>`。\n\n```\n>>> 1 != 2\nTrue\n>>> from __future__ import\
    \ barry_as_FLUFL\n>>> 1 != 2\n  File \"<stdin>\", line 1\n    1 != 2\n       ^\n\
    SyntaxError: with Barry as BDFL, use '<>' instead of '!='\n>>> 1 <> 2\nTrue\n\
    ```\n\n## 2.3.7 大括号\n\n`braces` 是一个彩蛋。其源代码可在 `future.c` 中找到。\n\n```\n>>> from\
    \ __future__ import braces\n  File \"<stdin>\", line 1\nSyntaxError: not a chance\n\
    ```\n\n## 2.4 Unicode\n\n本备忘录的主要目标是收集一些与 Unicode 相关的常用代码片段。在 Python 3 中，字符串使用\
    \ Unicode 而非字节表示。更多信息请参阅 [PEP 3100](https://peps.python.org/pep-3100/)。\n\n**ASCII**\
    \ 码是最著名的字符编码标准，它为字符定义了数字编码。最初的数值仅定义了 128 个字符，因此 ASCII 仅包含控制代码、数字、小写字母、大写字母等。然而，这不足以表示世界各地存在的带重音字符、汉字或表情符号等。因此，**Unicode**\
    \ 被开发出来以解决此问题。它定义了代码点来表示各种字符，就像 ASCII 一样，但其字符数量最多可达 1,111,998 个。\n\n| 目录 |\n|\
    \ --- |\n| Unicode |\n\n- 字符串\n- 字符\n- 移植 unicode(s, 'utf-8')\n- Unicode 代码点\n\
    - 编码\n- 解码\n- Unicode 标准化\n- 避免 UnicodeDecodeError\n- 长字符串\n\n### 2.4.1 字符串\n\n\
    在 Python 2 中，字符串以*字节*表示，而不是 *Unicode*。Python 提供了不同类型的字符串，例如 Unicode 字符串、原始字符串等。在这种情况下，如果要声明一个\
    \ Unicode 字符串，我们在字符串字面量前添加 `u` 前缀。\n\n```\n>>> s = 'Café'  # byte string\n>>>\
    \ s\n'Caf\\xc3\\xa9'\n>>> type(s)\n<type 'str'>\n>>> u = u'Café' # unicode string\n\
    >>> u\nu'Caf\\xe9'\n>>> type(u)\n<type 'unicode'>\n```\n\n在 Python 3 中，字符串以 *Unicode*\
    \ 表示。如果要表示一个字节字符串，我们在字符串字面量前添加 `b` 前缀。请注意，早期的 Python 版本（3.0-3.2）不支持 `u` 前缀。为了简化将支持\
    \ Unicode 的应用程序从 Python 2 迁移的过程，Python 3.3 再次支持字符串字面量的 `u` 前缀。更多信息请参阅 PEP 414。\n\
    \n```\n>>> s = 'Café'\n>>> type(s)\n<class 'str'>\n>>> s\n'Café'\n>>> s.encode('utf-8')\n\
    b'Caf\\xc3\\xa9'\n>>> s.encode('utf-8').decode('utf-8')\n'Café'\n```\n\n### 2.4.2\
    \ 字符\n\nPython 2 将所有字符串字符视为字节。在这种情况下，字符串的长度可能不等于字符的数量。例如，`Café` 的长度是 5，而不是 4，因为\
    \ `é` 被编码为 2 个字节的字符。\n\n```\n>>> s= 'Café'\n>>> print([_c for _c in s])\n['C',\
    \ 'a', 'f', '\\xc3', '\\xa9']\n>>> len(s)\n5\n>>> s = u'Café'\n>>> print([_c for\
    \ _c in s])\n[u'C', u'a', u'f', u'\\xe9']\n>>> len(s)\n4\n```\n\nPython 3 将所有字符串字符视为\
    \ Unicode 代码点。字符串的长度始终等于字符的数量。\n\n```\n>>> s = 'Café'\n>>> print([_c for _c in\
    \ s])\n['C', 'a', 'f', 'é']\n>>> len(s)\n4\n>>> bs = bytes(s, encoding='utf-8')\n\
    >>> print(bs)\nb'Caf\\xc3\\xa9'\n>>> len(bs)\n5\n```\n\n### 2.4.3 移植 unicode(s,\
    \ 'utf-8')\n\n`unicode()` 内置函数在 Python 3 中已被移除，那么转换表达式 `unicode(s, 'utf-8')` 的最佳方式是什么，使其在\
    \ Python 2 和 3 中都能工作？\n\n在 Python 2 中：\n\n```\n>>> s = 'Café'\n>>> unicode(s,\
    \ 'utf-8')\nu'Caf\\xe9'\n>>> s.decode('utf-8')\nu'Caf\\xe9'\n>>> unicode(s, 'utf-8')\
    \ == s.decode('utf-8')\nTrue\n```\n\n在 Python 3 中：\n\n```\n>>> s = 'Café'\n>>>\
    \ s.decode('utf-8')\nAttributeError: 'str' object has no attribute 'decode'\n\
    ```\n\n所以，真正的答案是……\n\n### 2.4.4 Unicode 代码点\n\n`ord` 是一个强大的内置函数，用于从给定字符获取 Unicode\
    \ 代码点。因此，如果要检查字符的 Unicode 代码点，可以使用 `ord`。\n\n```\n>>> s = u'Café'\n>>> for _c\
    \ in s: print('U+%04x' % ord(_c))\n...\nU+0043\nU+0061\nU+0066\nU+00e9\n>>> u\
    \ = '中文'\n>>> for _c in u: print('U+%04x' % ord(_c))\n...\nU+4e2d\nU+6587\n```\n\
    \n### 2.4.5 编码\n\n将 Unicode 代码点转换为字节字符串的过程称为编码。\n\n```\n>>> s = u'Café'\n>>> type(s.encode('utf-8'))\n\
    <class 'bytes'>\n```\n\n### 2.4.6 解码\n\n将字节字符串转换为 Unicode 代码点的过程称为解码。\n\n```\n\
    >>> s = bytes('Café', encoding='utf-8')\n>>> s.decode('utf-8')\n'Café'\n```\n\n\
    ### 2.4.7 Unicode 标准化\n\n某些字符可以用两种相似的形式表示。例如，字符 `é` 可以写作 `e` (规范分解) 或 `é` (规范组合)。在这种情况下，即使两个字符串看起来相似，我们进行比较时也可能得到意想不到的结果。因此，我们可以通过标准化\
    \ Unicode 形式来解决这个问题。\n\n```\n# python 3\n>>> u1 = 'Café'        # unicode string\n\
    >>> u2 = 'Cafe\\u0301'\n>>> u1, u2\n('Café', 'Café')\n>>> len(u1), len(u2)\n(4,\
    \ 5)\n>>> u1 == u2\nFalse\n>>> u1.encode('utf-8') # get u1 byte string\nb'Caf\\\
    xc3\\xa9'\n>>> u2.encode('utf-8') # get u2 byte string\nb'Cafe\\xcc\\x81'\n>>>\
    \ from unicodedata import normalize\n>>> s1 = normalize('NFC', u1)  # get u1 NFC\
    \ format\n>>> s2 = normalize('NFC', u2)  # get u2 NFC format\n>>> s1 == s2\nTrue\n\
    >>> s1.encode('utf-8'), s2.encode('utf-8')\n(b'Caf\\xc3\\xa9', b'Caf\\xc3\\xa9')\n\
    >>> s1 = normalize('NFD', u1)  # get u1 NFD format\n>>> s2 = normalize('NFD',\
    \ u2)  # get u2 NFD format\n>>> s1, s2\n('Cafe\\u0301', 'Cafe\\u0301')\n>>> s1\
    \ == s2\nTrue\n>>> s1.encode('utf-8'), s2.encode('utf-8')\n(b'Cafe\\xcc\\x81',\
    \ b'Cafe\\xcc\\x81')\n```\n\n### 2.4.8 避免 UnicodeDecodeError\n\n当字节字符串无法解码为 Unicode\
    \ 代码点时，Python 会引发 *UnicodeDecodeError*。如果我们想避免这个异常，可以在 `decode` 的 `errors` 参数中传递\
    \ *replace*、*backslashreplace* 或 *ignore*。\n\n```\n>>> u = b\"\\xff\"\n>>> u.decode('utf-8',\
    \ 'strict')\n    Traceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nUnicodeDecodeError: 'utf-8' codec can't decode byte 0xff in\
    \ position 0: invalid start byte\n>>> # use U+FFFD, REPLACEMENT CHARACTER\n>>>\
    \ u.decode('utf-8', \"replace\")\n'\\ufffd'\n>>> # inserts a \\xNN escape sequence\n\
    >>> u.decode('utf-8', \"backslashreplace\")\n'\\xff'\n>>> # leave the character\
    \ out of the Unicode result\n>>> u.decode('utf-8', \"ignore\")\n''\n```\n\n###\
    \ 2.4.9 长字符串\n\n以下代码片段展示了在 Python 中声明多行字符串的常见方式。\n\n```\n# original long string\n\
    s = 'This is a very very very long python string'\n\n# Single quote with an escaping\
    \ backslash\ns = \"This is a very very very \" \\\n    \"long python string\"\n\
    ```"
