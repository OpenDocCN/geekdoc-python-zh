    # 2.4.4 Unicode Code Point


    ord is a powerful built-in function to get a Unicode code point from a given character.
    Consequently, If we want to check a Unicode code point of a character, we can
    use ord.


    ```

    >>> s = u''Café''

    >>> for _c in s: print(''U+%04x'' % ord(_c))

    ...

    U+0043

    U+0061

    U+0066

    U+00e9

    >>> u = ''''

    >>> for _c in u: print(''U+%04x'' % ord(_c))

    ...

    U+4e2d

    U+6587

    ```


    # 2.4.5 Encoding


    A Unicode code point transfers to a byte string is called encoding.


    ```

    >>> s = u''Café''

    >>> type(s.encode(''utf-8''))

    <class ''bytes''>

    ```


    # 2.4.6 Decoding


    A byte string transfers to a Unicode code point is called decoding.


    ```

    >>> s = bytes(''Café'', encoding=''utf-8'')

    >>> s.decode(''utf-8'')

    ''Café''

    ```


    # 2.4.7 Unicode Normalization


    Some characters can be represented in two similar form. For example, the character,
    é can be written as e (Canonical Decomposition) or é (Canonical Composition).
    In this case, we may acquire unexpected results when we are comparing two strings
    even though they look alike. Therefore, we can normalize a Unicode form to solve
    the issue.


    ```

    # python 3

    >>> u1 = ''Café''        # unicode string

    >>> u2 = ''Cafe\u0301''

    >>> u1, u2

    (''Café'', ''Cafe'')

    >>> len(u1), len(u2)

    (4, 5)

    >>> u1 == u2

    False

    >>> u1.encode(''utf-8'') # get u1 byte string

    ```'
