- md: "# 3.8 Boto3\n\n# 3.9 Test\n\n- *Test*\n- A simple Python unittest\n- Python\
    \ unittest setup & teardown hierarchy\n- Different module of setUp & tearDown\
    \ hierarchy\n- Run tests via unittest.TextTestRunner\n- Test raise exception\n\
    - Pass arguments into a TestCase\n- Group multiple testcases into a suite\n- Group\
    \ multiple tests from different TestCase\n- Skip some tests in the TestCase\n\
    - Monolithic Test\n- Cross-module variables to Test files\n- Skip setup & teardown\
    \ when the test is skipped\n- Re-using old test code\n- Testing your document\
    \ is right\n- Re-using doctest to unittest\n- Customize test report\n- Mock -\
    \ using @patch substitute original method\n- What with unittest.mock.patch do?\n\
    - Mock - substitute open\n\n## 3.9.1 A simple Python unittest\n\n```\n# python\
    \ unittests only run the function with prefix \"test\"\n>>> from __future__ import\
    \ print_function\n>>> import unittest\n>>> class TestFoo(unittest.TestCase):\n\
    ...     def test_foo(self):\n...         self.assertTrue(True)\n...     def fun_not_run(self):\n\
    ...         print(\"no run\")\n```\n\n```\n>>> unittest.main()\n.\n----------------------------------------------------------------------\n\
    Ran 1 test in 0.000s\n\nOK\n>>> import unittest\n>>> class TestFail(unittest.TestCase):\n\
    ...     def test_false(self):\n...             self.assertTrue(False)\n...\n>>>\
    \ unittest.main()\nF\n======================================================================\n\
    FAIL: test_false (__main__.TestFail)\n----------------------------------------------------------------------\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 3, in test_false\n\
    AssertionError: False is not true\n\n----------------------------------------------------------------------\n\
    Ran 1 test in 0.000s\n\nFAILED (failures=1)\n```\n\n## 3.9.2 Python unittest setup\
    \ & teardown hierarchy\n\n```\nfrom __future__ import print_function\n\nimport\
    \ unittest\n\ndef fib(n):\n    return 1 if n<=2 else fib(n-1)+fib(n-2)\n\ndef\
    \ setUpModule():\n    print(\"setup module\")\ndef tearDownModule():\n    print(\"\
    teardown module\")\n\nclass TestFib(unittest.TestCase):\n\n    def setUp(self):\n\
    \        print(\"setUp\")\n        self.n = 10\n    def tearDown(self):\n    \
    \    print(\"tearDown\")\n        del self.n\n    @classmethod\n    def setUpClass(cls):\n\
    \        print(\"setUpClass\")\n```\n\n```\npython\n@classmethod\ndef tearDownClass(cls):\n\
    \    print(\"tearDownClass\")\ndef test_fib_assert_equal(self):\n    self.assertEqual(fib(self.n),\
    \ 55)\ndef test_fib_assert_true(self):\n    self.assertTrue(fib(self.n) == 55)\n\
    \nif __name__ == \"__main__\":\n    unittest.main()\n\n```\n\noutput:\n\n```\n\
    \n$ python test.py\nsetup module\nsetUpClass\nsetUp\ntearDown\n.setUp\ntearDown\n\
    .tearDownClass\nteardown module\n---------------------------------------------------------------------\n\
    Ran 2 tests in 0.000s\nOK\n\n```\n\n## 3.9.3 Different module of setUp & tearDown\
    \ hierarchy\n\n```\npython\n# test_module.py\nfrom __future__ import print_function\n\
    \nimport unittest\n\nclass TestFoo(unittest.TestCase):\n    @classmethod\n   \
    \ def setUpClass(self):\n        print(\"foo setUpClass\")\n    @classmethod\n\
    \    def tearDownClass(self):\n        print(\"foo tearDownClass\")\n    def setUp(self):\n\
    \        print(\"foo setUp\")\n    def tearDown(self):\n        print(\"foo tearDown\"\
    )\n    def test_foo(self):\n        self.assertTrue(True)\n\nclass TestBar(unittest.TestCase):\n\
    ```\n\n```\npython\ndef setUp(self):\n    print(\"bar setUp\")\ndef tearDown(self):\n\
    \    print(\"bar tearDown\")\ndef test_bar(self):\n    self.assertTrue(True)\n\
    \n# test.py\nfrom __future__ import print_function\n\nfrom test_module import\
    \ TestFoo\nfrom test_module import TestBar\nimport test_module\nimport unittest\n\
    \ndef setUpModule():\n    print(\"setUpModule\")\n\ndef tearDownModule():\n  \
    \  print(\"tearDownModule\")\n\nif __name__ == \"__main__\":\n    test_module.setUpModule\
    \ = setUpModule\n    test_module.tearDownModule = tearDownModule\n    suite1 =\
    \ unittest.TestLoader().loadTestsFromTestCase(TestFoo)\n    suite2 = unittest.TestLoader().loadTestsFromTestCase(TestBar)\n\
    \    suite = unittest.TestSuite([suite1, suite2])\n    unittest.TextTestRunner().run(suite)\n\
    \n```\n\noutput:\n\n```\nbash\n$ python test.py\nsetUpModule\nfoo setUpClass\n\
    foo setUp\nfoo tearDown\n.foo tearDownClass\nbar setUp\nbar tearDown\n.tearDownModule\n\
    ----------------------------------------------------------------------\nRan 2\
    \ tests in 0.000s\n\nOK\n\n```\n\n## 3.9.4 Run tests via unittest.TextTestRunner\n\
    \n```\npython\n>>> import unittest\n>>> class TestFoo(unittest.TestCase):\n...\
    \     def test_foo(self):\n...         self.assertTrue(True)\n...     def test_bar(self):\n\
    ...         self.assertFalse(False)\n...\n>>> suite = unittest.TestLoader().loadTestsFromTestCase(TestFoo)\n\
    >>> unittest.TextTestRunner(verbosity=2).run(suite)\ntest_bar (__main__.TestFoo)\
    \ ... ok\ntest_foo (__main__.TestFoo) ... ok\n\n-----------------------------------------------------------\n\
    Ran 2 tests in 0.000s\n\nOK\n```\n\n## 3.9.5 Test raise exception\n\n```\npython\n\
    >>> import unittest\n\n>>> class TestRaiseException(unittest.TestCase):\n... \
    \    def test_raise_except(self):\n...         with self.assertRaises(SystemError):\n\
    ...             raise SystemError\n>>> suite_loader = unittest.TestLoader()\n\
    >>> suite = suite_loader.loadTestsFromTestCase(TestRaiseException)\n>>> unittest.TextTestRunner().run(suite)\n\
    .\n-----------------------------------------------------------\nRan 1 test in\
    \ 0.000s\n\nOK\n\n>>> class TestRaiseFail(unittest.TestCase):\n...     def test_raise_fail(self):\n\
    ...         with self.assertRaises(SystemError):\n...             pass\n>>> suite\
    \ = unittest.TestLoader().loadTestsFromTestCase(TestRaiseFail)\n>>> unittest.TextTestRunner(verbosity=2).run(suite)\n\
    test_raise_fail (__main__.TestRaiseFail) ... FAIL\n\n======================================================================\n\
    FAIL: test_raise_fail (__main__.TestRaiseFail)\n----------------------------------------------------------------------\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 4, in test_raise_fail\n\
    AssertionError: SystemError not raised\n\n----------------------------------------------------------------------\n\
    ```\n\n(continued from previous page)\nRan 1 test in 0.000s\n\nFAILED (failures=1)\n\
    \n## 3.9.6 Pass arguments into a TestCase\n\n```\npython\n>>> from __future__\
    \ import print_function\n>>> import unittest\n>>> class TestArg(unittest.TestCase):\n\
    ...     def __init__(self, testname, arg):\n...         super(TestArg, self).__init__(testname)\n\
    ...         self._arg = arg\n...     def setUp(self):\n...         print(\"setUp:\"\
    , self._arg)\n...     def test_arg(self):\n...         print(\"test_arg:\", self._arg)\n\
    ...         self.assertTrue(True)\n...\n>>> suite = unittest.TestSuite()\n>>>\
    \ suite.addTest(TestArg('test_arg', 'foo'))\n>>> unittest.TextTestRunner(verbosity=2).run(suite)\n\
    test_arg (__main__.TestArg) ... setUp: foo\ntest_arg: foo\nok\n\n----------------------------------------------------------------------\n\
    Ran 1 test in 0.000s\n\nOK\n\n```\n\n## 3.9.7 Group multiple testcases into a\
    \ suite\n\n```\npython\n>>> import unittest\n>>> class TestFooBar(unittest.TestCase):\n\
    ...     def test_foo(self):\n...         self.assertTrue(True)\n...     def test_bar(self):\n\
    ...         self.assertTrue(True)\n...\n>>> class TestHelloWorld(unittest.TestCase):\n\
    ...     def test_hello(self):\n...         self.assertEqual(\"Hello\", \"Hello\"\
    )\n...     def test_world(self):\n...         self.assertEqual(\"World\", \"World\"\
    )\n...\n>>> suite_loader = unittest.TestLoader()\n>>> suite1 = suite_loader.loadTestsFromTestCase(TestFooBar)\n\
    >>> suite2 = suite_loader.loadTestsFromTestCase(TestHelloWorld)\n>>> suite = unittest.TestSuite([suite1,\
    \ suite2])\n```\n\n```\n>>> unittest.TextTestRunner(verbosity=2).run(suite)\n\
    test_bar (__main__.TestFooBar) ... ok\ntest_foo (__main__.TestFooBar) ... ok\n\
    test_hello (__main__.TestHelloWorld) ... ok\ntest_world (__main__.TestHelloWorld)\
    \ ... ok\n-------------------------------------------------------------------------------\n\
    Ran 4 tests in 0.000s\n\nOK\n```\n\n## 3.9.8 Group multiple tests from different\
    \ TestCase\n\n```\n>>> import unittest\n>>> class TestFoo(unittest.TestCase):\n\
    ...     def test_foo(self):\n...         assert \"foo\" == \"foo\"\n...\n>>> class\
    \ TestBar(unittest.TestCase):\n...     def test_bar(self):\n...         assert\
    \ \"bar\" == \"bar\"\n...\n>>> suite = unittest.TestSuite()\n>>> suite.addTest(TestFoo('test_foo'))\n\
    >>> suite.addTest(TestBar('test_bar'))\n>>> unittest.TextTestRunner(verbosity=2).run(suite)\n\
    test_foo (__main__.TestFoo) ... ok\ntest_bar (__main__.TestBar) ... ok\n-------------------------------------------------------------------------------\n\
    Ran 2 tests in 0.001s\n\nOK\n```\n\n## 3.9.9 Skip some tests in the TestCase\n\
    \n```\n>>> import unittest\n>>> RUN_FOO = False\n>>> DONT_RUN_BAR = False\n>>>\
    \ class TestSkip(unittest.TestCase):\n...     def test_always_run(self):\n...\
    \         self.assertTrue(True)\n...     @unittest.skip(\"always skip this test\"\
    )\n...     def test_always_skip(self):\n...         raise RuntimeError\n...  \
    \   @unittest.skipIf(RUN_FOO == False, \"demo skipIf\")\n...     def test_skipif(self):\n\
    ...         raise RuntimeError\n...     @unittest.skipUnless(DONT_RUN_BAR == True,\
    \ \"demo skipUnless\")\n```"
  mdcn: "# 3.8 Boto3\n\n# 3.9 测试\n\n- *测试*\n- 一个简单的 Python 单元测试\n- Python 单元测试的 setUp\
