  md: '# # 1.1.10 Add nonlocal keyword


    New in Python 3.0


    PEP 3104 - Access to Names in Outer Scopes


    > > Note: nonlocal allow assigning directly to a variable in an outer (but non-global)
    scope


    ```

    python

    >>> def outf():

    ...     o = "out"

    ...     def inf():

    ...         nonlocal o

    ...         o = "change out"

    ...     inf()

    ...     print(o)

    ...

    >>> outf()

    change out

    ```


    # # 1.1.11 Extended iterable unpacking


    New in Python 3.0


    +   - PEP 3132 - Extended Iterable Unpacking


    ```

    python

    >>> a, *b, c = range(5)

    >>> a, b, c

    (0, [1, 2, 3], 4)

    >>> for a, *b in [(1, 2, 3), (4, 5, 6, 7)]:

    ...     print(a, b)

    ...

    1 [2, 3]

    4 [5, 6, 7]

    ```


