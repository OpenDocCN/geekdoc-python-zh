    # 3.1.3 Group Comparison


    ```

    # (...) group a regular expression

    >>> m = re.search(r''(\d{4})-(\d{2})-(\d{2})'', ''2016-01-01'')

    >>> m

    <_sre.SRE_Match object; span=(0, 10), match=''2016-01-01''>

