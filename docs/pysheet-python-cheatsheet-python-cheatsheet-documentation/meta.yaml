- md: "## 3.4 Concurrency\n\n## Table of Contents\n\n- Concurrency\n- Execute a shell\
    \ command\n- Create a thread via \"threading\"\n- Performance Problem - GIL\n\
    - Consumer and Producer\n- Thread Pool Template\n- Using multiprocessing ThreadPool\n\
    - Mutex lock\n- Deadlock\n- Implement \"Monitor\"\n- Control primitive resources\n\
    - Ensure tasks has done\n- Thread-safe priority queue\n- Multiprocessing\n- Custom\
    \ multiprocessing map\n- Graceful way to kill all child processes\n- Simple round-robin\
    \ scheduler\n- Scheduler with blocking function\n- PoolExecutor\n- How to use\
    \ ThreadPoolExecutor?\n- What does “with ThreadPoolExecutor” work?\n- Future Object\n\
    - Future error handling\n\n### 3.4.1 Execute a shell command\n\n```python\n# get\
    \ stdout, stderr, returncode\n>>> from subprocess import Popen, PIPE\n>>> args\
    \ = ['time', 'echo', 'hello python']\n>>> ret = Popen(args, stdout=PIPE, stderr=PIPE)\n\
    >>> out, err = ret.communicate()\n>>> out\nb'hello python\\n'\n>>> err\nb'   \
    \     0.00 real         0.00 user         0.00 sys\\n'\n>>> ret.returncode\n0\n\
    ```\n\n### 3.4.2 Create a thread via “threading”\n\n```python\n>>> from threading\
    \ import Thread\n>>> class Worker(Thread):\n...     def __init__(self, id):\n\
    ...         super(Worker, self).__init__()\n...         self._id = id\n...   \
    \  def run(self):\n...         print(\"I am worker %d\" % self._id)\n...\n>>>\
    \ t1 = Worker(1)\n>>> t2 = Worker(2)\n>>> t1.start(); t2.start()\nI am worker\
    \ 1\nI am worker 2\n\n# using function could be more flexible\n>>> def Worker(worker_id):\n\
    ...     print(\"I am worker %d\" % worker_id)\n...\n>>> from threading import\
    \ Thread\n>>> t1 = Thread(target=Worker, args=(1,))\n>>> t2 = Thread(target=Worker,\
    \ args=(2,))\n>>> t1.start()\nI am worker 1\nI am worker 2\n```\n\n### 3.4.3 Performance\
    \ Problem - GIL\n\n```python\n# GIL - Global Interpreter Lock\n# see: Understanding\
    \ the Python GIL\n>>> from threading import Thread\n>>> def profile(func):\n...\
    \     def wrapper(*args, **kwargs):\n...         import time\n...         start\
    \ = time.time()\n...         func(*args, **kwargs)\n...         end = time.time()\n\
    ...         print(end - start)\n...     return wrapper\n...\n>>> @profile\n...\
    \ def nothread():\n...     fib(35)\n...     fib(35)\n...\n>>> @profile\n... def\
    \ hastypead():\n...     t1=Thread(target=fib, args=(35,))\n...     t2=Thread(target=fib,\
    \ args=(35,))\n...     t1.start(); t2.start()\n...     t1.join(); t2.join()\n\
    ...\n>>> nothread()\n9.51164007187\n>>> hastypead()\n11.3131771088\n# !Thread\
    \ get bad Performance\n# since cost on context switch\n```\n\n### 3.4.4 Consumer\
    \ and Producer\n\n```python\n# This architecture make concurrency easy\n>>> from\
    \ threading import Thread\n>>> from Queue import Queue\n>>> from random import\
    \ random\n>>> import time\n>>> q = Queue()\n>>> def fib(n):\n...     if n<=2:\n\
    ...         return 1\n...     return fib(n-1)+fib(n-2)\n...\n>>> def producer():\n\
    ...     while True:\n...         wt = random()*5\n...         time.sleep(wt)\n\
    ...         q.put((fib,35))\n...\n>>> def consumer():\n...     while True:\n...\
    \         task,arg = q.get()\n...         print(task(arg))\n...         q.task_done()\n\
    ...\n>>> t1 = Thread(target=producer)\n>>> t2 = Thread(target=consumer)\n>>> t1.start();t2.start()\n\
    ```\n\n### 3.4.5 Thread Pool Template\n\n```python\n# producer and consumer architecture\n\
    from Queue import Queue\nfrom threading import Thread\n\nclass Worker(Thread):\n\
    \    def __init__(self,queue):\n        super(Worker, self).__init__()\n     \
    \   self._q = queue\n        self.daemon = True\n        self.start()\n    def\
    \ run(self):\n        while True:\n            f,args,kwargs = self._q.get()\n\
    \            try:\n                print(f(*args, **kwargs))\n            except\
    \ Exception as e:\n                print(e)\n            self._q.task_done()\n\
    \nclass ThreadPool(object):\n    def __init__(self, num_t=5):\n        self._q\
    \ = Queue(num_t)\n        # Create Worker Thread\n        for _ in range(num_t):\n\
    \            Worker(self._q)\n    def add_task(self,f,*args,**kwargs):\n     \
    \   self._q.put((f, args, kwargs))\n    def wait_complete(self):\n        self._q.join()\n\
    \ndef fib(n):\n    if n <= 2:\n        return 1\n    return fib(n-1)+fib(n-2)\n\
    \nif __name__ == '__main__':\n    pool = ThreadPool()\n    for _ in range(3):\n\
    \        pool.add_task(fib, 35)\n    pool.wait_complete()\n```\n\n### 3.4.6 Using\
    \ multiprocessing ThreadPool\n\n```python\n# ThreadPool is not in python doc\n\
    >>> from multiprocessing.pool import ThreadPool\n>>> pool = ThreadPool(5)\n>>>\
    \ pool.map(lambda x: x**2, range(5))\n[0, 1, 4, 9, 16]\n```\n\nCompare with “map”\
    \ performance\n\n```python\n# pool will get bad result since GIL\nimport time\n\
    from multiprocessing.pool import ThreadPool\n\npool = ThreadPool(10)\ndef profile(func):\n\
    \    def wrapper(*args, **kwargs):\n        print(func.__name__)\n        s =\
    \ time.time()\n        func(*args, **kwargs)\n        e = time.time()\n      \
    \  print(\"cost: {0}\".format(e-s))\n    return wrapper\n\n@profile\ndef pool_map():\n\
    \    res = pool.map(lambda x:x**2,\n                   range(999999))\n\n@profile\n\
    def ordinary_map():\n    res = map(lambda x:x**2,\n              range(999999))\n\
    \npool_map()\nordinary_map()\n```\n\noutput:\n\n```\n$ python test_threadpool.py\n\
    pool_map\ncost: 0.562669038773\nordinary_map\ncost: 0.38525390625\n```\n\n###\
    \ 3.4.7 Mutex lock\n\nSimplest synchronization primitive lock\n\n```python\n>>>\
    \ from threading import Thread\n>>> from threading import Lock\n>>> lock = Lock()\n\
    >>> def getlock(id):\n...     lock.acquire()\n...     print(\"task{0} get\".format(id))\n\
    ...     lock.release()\n...\n>>> t1=Thread(target=getlock,args=(1,))\n>>> t2=Thread(target=getlock,args=(2,))\n\
    >>> t1.start();t2.start()\ntask1 get\ntask2 get\n\n# using lock manager\n>>> def\
    \ getlock(id):\n...     with lock:\n...         print(\"task%d get\" % id)\n...\n\
    >>> t1=Thread(target=getlock,args=(1,))\n>>> t2=Thread(target=getlock,args=(2,))\n\
    >>> t1.start();t2.start()\ntask1 get\ntask2 get\n```\n\n### 3.4.8 Deadlock\n\n\
    Happen when more than one mutex lock.\n\n```python\n>>> import threading\n>>>\
    \ import time\n>>> lock1 = threading.Lock()\n>>> lock2 = threading.Lock()\n>>>\
    \ def task1():\n...     with lock1:\n...         print(\"get lock1\")\n...   \
    \      time.sleep(3)\n...         with lock2:\n...             print(\"No deadlock\"\
    )\n...\n>>> def task2():\n...     with lock2:\n...         print(\"get lock2\"\
    )\n...         with lock1:\n...             print(\"No deadlock\")\n...\n>>> t1=threading.Thread(target=task1)\n\
    >>> t2=threading.Thread(target=task2)\n```"
