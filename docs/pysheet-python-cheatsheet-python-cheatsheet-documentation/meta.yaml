    # 2.9.1 Document Functions


    Documentation provides programmers hints about how a function is supposed to be
    used. A docstring gives an expedient way to write a readable document of functions.
    PEP 257 defines some conventions of docstrings. In order to avoid violating conventions,
    there are several tools such as doctest, or pydocstyle can help us check the format
    of docstrings.


    ```

    >>> def example():

    ...     """This is an example function."""

    ...     print("Example function")

    ...

    >>> example.__doc__

    ''This is an example function.''

    >>> help(example)

    ```


