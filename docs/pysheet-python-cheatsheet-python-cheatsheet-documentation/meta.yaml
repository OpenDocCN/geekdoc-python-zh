    \    loop.close()\n```\n\nOutput:\n```\n# console1\n$ nc localhost 5566\nHello\n\
    Hello\n\n# console2\n$ nc localhost 5566\nasyncio\nasyncio\n```\n\n## 4.4 PEP\
    \ 572 and The Walrus Operator\n\n**Table of Contents**\n\n*   *PEP 572 and The\
    \ Walrus Operator*\n*   Abstract\n*   Introduction\n*   Why := ?\n*   Scopes\n\
    *   Pitfalls\n*   Conclusion\n*   References\n\n## 4.4.1 Abstract\n\nPEP 572 is\
    \ one of the most contentious proposals in Python3 history because assigning a\
    \ value within an expression seems unnecessary. Also, it is ambiguous for developers\
    \ to distinguish the difference between **the walrus operator** (:=) and the equal\
    \ operator (=). Even though sophisticated developers can use `:=` smoothly, they\
    \ may concern the readability of their code. To better understand the usage of\
    \ `:=`, this article discusses its design philosophy and what kind of problems\
    \ it tries to solve.\n\n## 4.4.2 Introduction\n\nFor C/C++ developer, assigning\
    \ a function return to a variable is common due to error code style handling.\
    \ Managing function errors includes two steps; one is to check the return value;\
    \ another is to check errno. For example,\n\n```c\n#include <stdio.h>\n#include\
    \ <unistd.h>\n#include <string.h>\n#include <errno.h>\n\nint main(int argc, char\
    \ *argv[]) {\n    int rc = -1;\n\n    // assign access return to rc and check\
    \ its value\n    if ((rc = access(\"hello_walrus\", R_OK)) == -1) {\n        fprintf(stderr,\
    \ \"%s\", strerror(errno));\n        goto end;\n    }\n    rc = 0;\n    end:\n\
    \        return rc;\n}\n```\n\nIn this case, `access` will assign its return value\
    \ to the variable `rc` first. Then, the program will compare the `rc` value with\
    \ `-1` to check whether the execution of `access` is successful or not. However,\
    \ Python did not allow assigning values to variables within an expression before\
    \ 3.8. To fix this problem, therefore, PEP 572 introduced the walrus operator\
    \ for developers. The following Python snippet is equal to the previous C example.\n\
    \n```python\n>>> import os\n>>> from ctypes import *\n>>> libc = CDLL(\"libc.dylib\"\
    , use_errno=True)\n>>> access = libc.access\n>>> path = create_string_buffer(b\"\
    hello_walrus\")\n>>> if (rc := access(path, os.R_OK)) == -1:\n...     errno =\
    \ get_errno()\n...     print(os.strerror(errno), file=sys.stderr)\n...\nNo such\
    \ file or directory\n```\n\n### 4.4.3 Why := ?\n\nDevelopers may confuse the difference\
    \ between “:=” and “=.” In fact, they serve the same purpose, assigning something\
    \ to variables. Why Python introduced “:=” instead of using “=”? What is the benefit\
    \ of using “:=”? One reason is to reinforce the visual recognition due to a common\
    \ mistake made by C/C++ developers. For instance,\n\n```c\nint rc = access(\"\
    hello_walrus\", R_OK);\n\n// rc is unintentionally assigned to -1\nif (rc = -1)\
    \ {\n    fprintf(stderr, \"%s\", strerror(errno));\n    goto end;\n}\n```\n\n\
    Rather than comparison, the variable, `rc`, is mistakenly assigned to `-1`. To\
    \ prevent this error, some people advocate using Yoda conditions within an expression.\n\
    \n```c\nint rc = access(\"hello_walrus\", R_OK);\n\n// -1 = rc will raise a compile\
    \ error\nif (-1 == rc) {\n    fprintf(stderr, \"%s\", strerror(errno));\n    goto\
    \ end;\n}\n```\n\nHowever, Yoda style is not readable enough like Yoda speaks\
    \ non-standardized English. Also, unlike C/C++ can detect assigning error during\
    \ the compile-time via compiler options (e.g., -Wparentheses), it is difficult\
    \ for Python interpreter to distinguish such mistakes throughout the runtime.\
    \ Thus, the final result of PEP 572 was to use a new syntax as a solution to implement\
    \ *assignment expressions*.\n\nThe walrus operator was not the first solution\
    \ for PEP 572. The original proposal used `EXPR as NAME` to assign values to variables.\
    \ Unfortunately, there are some rejected reasons in this solution and other solutions\
    \ as well. After intense debates, the final decision was `:=`.\n\n## 4.4.4 Scopes\n\
    \nUnlike other expressions, where a variable is bound to a scope, an assignment\
    \ expression belongs to the current scope. The purpose of this design is to allow\
    \ a compact way to write code.\n\n```python\n>>> if not (env := os.environ.get(\"\
    HOME\")):\n...     raise KeyError(\"env HOME does not find!\")\n...\n>>> print(env)\n\
    /root\n```\n\nIn PEP 572, another benefit is to conveniently capture a “witness”\
    \ for an `any()` or an `all()` expression. Although capturing function inputs\
    \ can assist an interactive debugger, the advantage is not so obvious, and examples\
    \ lack readability. Therefore, this benefit does not discuss here. Note that other\
    \ languages (e.g., C/C++ or Go) may bind an assignment to a scope. Take Golang\
    \ as an example.\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"os\"\n\
    )\n\nfunc main() {\n    if env := os.Getenv(\"HOME\"); env == \"\" {\n       \
    \ panic(fmt.Sprintf(\"Home does not find\"))\n    }\n    fmt.Print(env) // <---\
    \ compile error: undefined: env\n}\n```\n\n## 4.4.5 Pitfalls\n\nAlthough an assigning\
    \ expression allows writing compact code, there are many pitfalls when a developer\
    \ uses it in a list comprehension. A common `SyntaxError` is to rebind iteration\
    \ variables.\n\n```python\n>>> [i := i+1 for i in range(5)]  # invalid\n```\n\n\
    However, updating an iteration variable will reduce readability and introduce\
    \ bugs. Even if Python 3.8 did not implement the walrus operator, a programmer\
    \ should avoid reusing iteration variables within a scope.\n\nAnother pitfall\
    \ is Python prohibits using assignment expressions within a comprehension under\
    \ a class scope.\n\n```python\n>>> class Example:\n...     [(j := i) for i in\
    \ range(5)] # invalid\n...\n```\n\nThis limitation was from bpo-3692. The interpreter's\
    \ behavior is unpredictable when a class declaration contains a list comprehension.\
    \ To avoid this corner case, assigning expression is invalid under a class.\n\n\
    ```python\n>>> class Foo:\n...     a = [1, 2, 3]\n...     b = [4, 5, 6]\n... \
    \    c = [i for i in zip(a, b)]  # b is defined\n...\n>>> class Bar:\n...    \
    \ a = [1,2,3]\n...     b = [4,5,6]\n...     c = [x * y for x in a for y in b]\
    \ # b is undefined\n...\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\n  File \"<stdin>\", line 4, in Bar\n  File \"<stdin>\"\
    , line 4, in <listcomp>\nNameError: name 'b' is not defined\n```\n\n## 4.4.6 Conclusion\n\
    \nThe reason why the walrus operator (:=) is so controversial is that code readability\
    \ may decrease. In fact, in the discussion mail thread, the author of PEP 572,\
    \ Christoph Groth, had considered using \":=\" to implement inline assignment\
    \ like C/C++. Without judging \":=\" is ugly, many developers argue that distinguishing\
    \ the functionality between \":=\" and \"=\" is difficult because they serve the\
    \ same purpose, but behaviors are not consistent. Also, writing compact code is\
    \ not persuasive enough because smaller is not always better. However, in some\
    \ cases, the walrus operator can enhance readability (if you understand how to\
    \ use :=). For example,\n\n```python\nbuf = b\"\"\nwhile True:\n    data = read(1024)\n\
    \    if not data:\n        break\n    buf += data\n```\n\nBy using :=, the previous\
    \ example can be simplified.\n\n```python\nbuf = b\"\"\nwhile (data := read(1024)):\n\
    \    buf += data\n```\n\nPython document and GitHub issue-8122 provides many great\
    \ examples about improving code readability by \":=\". However, using the walrus\
    \ operator should be careful. Some cases, such as `foo(x := 3, cat='vector')`,\
    \ may introduce new bugs if developers are not aware of scopes. Although PEP 572\
    \ may be risky for developers to write buggy code, an in-depth understanding of\
    \ design philosophy and useful examples will help us use it to write readable\
    \ code at the right time."
