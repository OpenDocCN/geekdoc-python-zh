    # ## 2.2.8 while … else …


    The else clause belongs to a while loop serves the same purpose as the else clause
    in a for loop. We can observe that the else does not run when the break occurs
    in the while loop.


    ```

    python

    >>> n = 0

    >>> while n < 5:

    ...     if n == 3:

    ...         break

    ...     n += 1

    ... else:

    ...     print("no break")

    ...

    ```


    # ## 2.2.9 The do while Statement


    There are many programming languages such as C/C++, Ruby, or Javascript, provide
    the do while statement. In Python, there is no do while statement. However, we
    can place the condition and the break at the end of a while loop to achieve the
    same thing.


    ```

    python

    >>> n = 0

    >>> while True:

    ...     n += 1

    ...     if n == 5:

    ...         break

    ...

    >>> n

    5

    ```


    # ## 2.2.10 try … except … else …


    Most of the time, we handle errors in except clause and clean up resources in
    finally clause. Interestingly, the try statement also provides an else clause
    for us to avoid catching an exception which was raised by the code that should
    not be protected by try ... except. The else clause runs when no exception occurs
    between try and except.


    ```

    python

    >>> try:

    ...     print("No exception")

    ... except:

    ...     pass

    ... else:

    ...     print("Success")

    ...

    No exception

    Success

    ```'
- md: "## 2.2.11 String\n\nUnlike other programming languages, Python does not support\
    \ string’s item assignment directly. Therefore, if it is necessary to manipulate\
    \ string’s items, e.g., swap items, we have to convert a string to a list and\
    \ do a join operation after a series item assignments finish.\n\n```\n>>> a =\
    \ \"Hello Python\"\n>>> l = list(a)\n>>> l[0], l[6] = 'h', 'p'\n>>> ''.join(l)\n\
    'hello python'\n```\n\n## 2.2.12 List\n\nLists are versatile containers. Python\
    \ provides a lot of ways such as **negative index**, **slicing statement**, or\
    \ **list comprehension** to manipulate lists. The following snippet shows some\
    \ common operations of lists.\n\n```\n>>> a = [1, 2, 3, 4, 5]\n>>> a[-1]     \
    \               # negative index\n5\n>>> a[1:]                    # slicing\n\
    [2, 3, 4, 5]\n>>> a[1:-1]\n[2, 3, 4]\n>>> a[1:-1:2]\n[2, 4]\n>>> a[::-1]     \
    \             # reverse\n[5, 4, 3, 2, 1]\n>>> a[0] = 0                 # set an\
    \ item\n>>> a\n[0, 2, 3, 4, 5]\n>>> a.append(6)              # append an item\n\
    >>> a\n[0, 2, 3, 4, 5, 6]\n>>> del a[-1]                # del an item\n>>> a\n\
    [0, 2, 3, 4, 5]\n>>> b = [x for x in range(3)] # list comprehension\n>>> b\n[0,\
    \ 1, 2]\n>>> a + b                    # add two lists\n[0, 2, 3, 4, 5, 0, 1, 2]\n\
    ```\n\n## 2.2.13 Dict\n\nDictionaries are key-value pairs containers. Like lists,\
    \ Python supports many ways such as **dict comprehensions** to manipulate dictionaries.\
    \ After Python 3.6, dictionaries preserve the insertion order of keys. The following\
    \ snippet shows some common operations of dictionaries.\n\n```\n>>> d = {'timmy':\
    \ 'red', 'barry': 'green', 'guido': 'blue'}\n>>> d\n{'timmy': 'red', 'barry':\
    \ 'green', 'guido': 'blue'}\n>>> d['timmy'] = \"yellow\"          # set data\n\
    >>> d\n{'timmy': 'yellow', 'barry': 'green', 'guido': 'blue'}\n>>> del d['guido']\
    \                  # del data\n>>> d\n{'timmy': 'yellow', 'barry': 'green'}\n\
    >>> 'guido' in d                    # contain data\nFalse\n{'timmy': 'yellow',\
    \ 'barry': 'green'}\n>>> {k: v for k, v in d.items()} # dict comprehension\n{'timmy':\
    \ 'yellow', 'barry': 'green'}\n>>> d.keys()                        # list all\
    \ keys\ndict_keys(['timmy', 'barry'])\n>>> d.values()                      # list\
    \ all values\ndict_values(['yellow', 'green'])\n```\n\n## 2.2.14 Function\n\n\
    Defining a function in Python is flexible. We can define a function with **function\
    \ documents**, **default values**, **arbitrary arguments**, **keyword arguments**,\
    \ **keyword-only arguments**, and so on. The following snippet shows some common\
    \ expressions to define functions.\n\n```\ndef foo_with_doc():\n    \"\"\"Documentation\
    \ String.\"\"\"\n\ndef foo_with_arg(arg): ...\ndef foo_with_args(*arg): ...\n\
    def foo_with_kwarg(a, b=\"foo\"): ...\ndef foo_with_args_kwargs(*args, **kwargs):\
    \ ...\ndef foo_with_kwonly(a, b, *, k): ...           # python3\ndef foo_with_annotations(a:\
    \ int) -> int: ... # python3\n```\n\n## 2.2.15 Function Annotations\n\nInstead\
    \ of writing string documents in functions to hint the type of parameters and\
    \ return values, we can denote types by **function annotations**. Function annotations\
    \ which the details can be found on PEP 3017 and PEP 484 were introduced in Python\
    \ 3.0. They are an **optional** feature in **Python 3**. Using function annotations\
    \ will lose compatibility in **Python 2**. We can solve this issue by stub files.\
    \ In addition, we can do static type checking through `mypy`.\n\n```\n>>> def\
    \ fib(n: int) -> int:\n...     a, b = 0, 1\n...     for _ in range(n):\n...  \
    \       b, a = a + b, b\n...\n    return a\n...\n>>> fib(10)\n55\n```\n\n## 2.2.16\
    \ Generators\n\nPython uses the yield statement to define a **generator function**.\
    \ In other words, when we call a generator function, the generator function will\
    \ return a **generator** instead of return values for creating an **iterator**.\n\
    \n```\n>>> def fib(n):\n...     a, b = 0, 1\n...     for _ in range(n):\n... \
    \        yield a\n...         b, a = a + b, b\n...\n>>> g = fib(10)\n>>> g\n<generator\
    \ object fib at 0x10b240c78>\n>>> for f in fib(5):\n...     print(f)\n...\n0\n\
    1\n1\n2\n3\n```\n\n## 2.2.17 Generator Delegation\n\nPython 3.3 introduced yield\
    \ from expression. It allows a generator to delegate parts of operations to another\
    \ generator. In other words, we can **yield** a sequence **from** other **generators**\
    \ in the current **generator function**. Further information can be found on PEP\
    \ 380.\n\n```\n>>> def fib(n):\n...     a, b = 0, 1\n...     for _ in range(n):\n\
    ...         yield a\n...         b, a = a + b, b\n...\n>>> def fibonacci(n):\n\
    ...     yield from fib(n)\n...\n>>> [f for f in fibonacci(5)]\n[0, 1, 1, 2, 3]\n\
    ```\n\n## 2.2.18 Class\n\nPython supports many common features such as **class\
    \ documents, multiple inheritance, class variables, instance variables, static\
    \ method, class method,** and so on. Furthermore, Python provides some special\
    \ methods for programmers to implement **iterators, context manager,** etc. The\
    \ following snippet displays common definition of a class.\n\n```\nclass A: ...\n\
    class B: ...\nclass Foo(A, B):\n    \"\"\"A class document.\"\"\"\n\n    foo =\
    \ \"class variable\"\n\n    def __init__(self, v):\n        self.attr = v\n  \
    \      self.__private = \"private var\"\n\n    @staticmethod\n    def bar_static_method():\
    \ ...\n\n    @classmethod\n    def bar_class_method(cls): ...\n\n    def bar(self):\n\
    \        \"\"\"A method document.\"\"\"\n\n    def bar_with_arg(self, arg): ...\n\
    \    def bar_with_args(self, *args): ...\n    def bar_with_kwarg(self, kwarg=\"\
    bar\"): ...\n    def bar_with_args_kwargs(self, *args, **kwargs): ...\n    def\
    \ bar_with_kwonly(self, *, k): ...\n    def bar_with_annotations(self, a: int):\
    \ ...\n```\n\n## 2.2.19 async / await\n\nasync and await syntax was introduced\
    \ from Python 3.5. They were designed to be used with an event loop. Some other\
    \ features such as the **asynchronous generator** were implemented in later versions.\n\
    \nA **coroutine function** (`async def`) are used to create a **coroutine** for\
    \ an event loop. Python provides a built-in module, **asyncio**, to write a concurrent\
    \ code through async/await syntax. The following snippet shows a simple example\
    \ of using **asyncio**. The code must be run on Python 3.7 or above.\n\n```\n\
    import asyncio\n\nasync def http_ok(r, w):\n    head = b\"HTTP/1.1 200 OK\\r\\\
    n\"\n    head += b\"Content-Type: text/html\\r\\n\"\n    head += b\"\\r\\n\"\n\
    \n    body = b\"<html>\"\n    body += b\"<body><h1>Hello world!</h1></body>\"\n\
    \    body += b\"</html>\"\n\n    _ = await r.read(1024)\n    w.write(head + body)\n\
    \    await w.drain()\n    w.close()\n\nasync def main():\n    server = await asyncio.start_server(\n\
    \        http_ok, \"127.0.0.1\", 8888\n    )\n\n    async with server:\n     \
    \   await server.serve_forever()\n\nasyncio.run(main())\n```\n\n## 2.2.20 Avoid\
    \ exec and eval\n\nThe following snippet shows how to use the built-in function\
    \ exec. Yet, using exec and eval are not recommended because of some security\
    \ issues and unreadable code for a human. Further reading can be found on Be careful\
    \ with exec and eval in Python and Eval really is dangerous\n\n```\n>>> py = '''\n\
    ... def fib(n):\n...     a, b = 0, 1\n...     for _ in range(n):\n...        \
    \ b, a = b + a, b\n...     return a\n... print(fib(10))\n... '''\n>>> exec(py,\
    \ globals(), locals())\n55\n```\n\n## 2.3 Future\n\nFuture statements tell the\
    \ interpreter to compile some semantics as the semantics which will be available\
    \ in the future Python version. In other words, Python uses from __future__ import\
    \ feature to backport features from other higher Python versions to the current\
    \ interpreter. In Python 3, many features such as print_function are already enabled,\
    \ but we still leave these future statements for backward compatibility.\n\nFuture\
    \ statements are NOT import statements. Future statements change how Python interprets\
    \ the code. They MUST be at the top of the file. Otherwise, Python interpreter\
    \ will raise SyntaxError.\n\nIf you're interested in future statements and want\
    \ to acquire more explanation, further information can be found on PEP 236 - Back\
    \ to the __future__\n\n# Table of Contents\n\n- Future\n- List All New Features\n\
    - Print Function\n- Unicode\n- Division\n- Annotations\n- BDFL Retirement\n- Braces\n\
    \n## 2.3.1 List All New Features\n\n__future__ is a Python module. We can use\
    \ it to check what kind of future features can import to current Python interpreter.\
    \ The fun is import __future__ is **NOT** a future statement, it is a import statement.\n\
    \n```\n>>> from pprint import pprint\n>>> import __future__\n>>> pprint(__future__.all_feature_names)\n\
    ['nested_scopes',\n 'generators',\n 'division',\n 'absolute_import',\n 'with_statement',\n\
    \ 'print_function',\n 'unicode_literals',\n 'barry_as_FLUFL',\n 'generator_stop',\n\
    \ 'annotations']\n```\n\nFuture statements not only change the behavior of the\
    \ Python interpreter but also import __future__. _Feature into the current program.\n\
    \n```\n>>> from __future__ import print_function\n>>> print_function\n_Feature((2,\
    \ 6, 0, 'alpha', 2), (3, 0, 0, 'alpha', 0), 65536)\n```\n\n## 2.3.2 Print Function\n\
    \nReplacing **print statement** to **print function** is one of the most notorious\
    \ decision in Python history. However, this change brings some flexibilities to\
    \ extend the ability of print. Further information can be found on PEP 3105.\n\
    \n```\n>>> print \"Hello World\"  # print is a statement\nHello World\n>>> from\
    \ __future__ import print_function\n>>> print \"Hello World\"\n  File \"<stdin>\"\
    , line 1\n    print \"Hello World\"\n            ^\nSyntaxError: invalid syntax\n\
    >>> print(\"Hello World\") # print become a function\nHello World\n```"
  mdcn: "## 2.2.11 字符串\n\n与其他编程语言不同，Python 不直接支持字符串的项赋值。因此，如果需要操作字符串的元素，例如交换元素，我们必须先将字符串转换为列表，完成一系列项赋值操作后再进行连接操作。\n\
    \n```\n>>> a = \"Hello Python\"\n>>> l = list(a)\n>>> l[0], l[6] = 'h', 'p'\n\
    >>> ''.join(l)\n'hello python'\n```\n\n## 2.2.12 列表\n\n列表是功能多样的容器。Python 提供了多种操作列表的方式，例如\
    \ **负数索引**、**切片语句** 或 **列表推导式**。以下代码片段展示了一些常见的列表操作。\n\n```\n>>> a = [1, 2, 3,\
    \ 4, 5]\n>>> a[-1]                    # 负数索引\n5\n>>> a[1:]                   \
    \ # 切片\n[2, 3, 4, 5]\n>>> a[1:-1]\n[2, 3, 4]\n>>> a[1:-1:2]\n[2, 4]\n>>> a[::-1]\
    \                  # 反转\n[5, 4, 3, 2, 1]\n>>> a[0] = 0                 # 设置项\n\
    >>> a\n[0, 2, 3, 4, 5]\n>>> a.append(6)              # 追加一项\n>>> a\n[0, 2, 3,\
    \ 4, 5, 6]\n>>> del a[-1]                # 删除一项\n>>> a\n[0, 2, 3, 4, 5]\n>>> b\
    \ = [x for x in range(3)] # 列表推导式\n>>> b\n[0, 1, 2]\n>>> a + b               \
    \     # 两个列表相加\n[0, 2, 3, 4, 5, 0, 1, 2]\n```\n\n## 2.2.13 字典\n\n字典是键值对容器。与列表类似，Python\
    \ 支持多种操作字典的方式，例如 **字典推导式**。在 Python 3.6 之后，字典会保持键的插入顺序。以下代码片段展示了一些常见的字典操作。\n\n\
    ```\n>>> d = {'timmy': 'red', 'barry': 'green', 'guido': 'blue'}\n>>> d\n{'timmy':\
    \ 'red', 'barry': 'green', 'guido': 'blue'}\n>>> d['timmy'] = \"yellow\"     \
    \     # 设置数据\n>>> d\n{'timmy': 'yellow', 'barry': 'green', 'guido': 'blue'}\n\
    >>> del d['guido']                  # 删除数据\n>>> d\n{'timmy': 'yellow', 'barry':\
    \ 'green'}\n>>> 'guido' in d                    # 是否包含数据\nFalse\n{'timmy': 'yellow',\
    \ 'barry': 'green'}\n>>> {k: v for k, v in d.items()} # 字典推导式\n{'timmy': 'yellow',\
    \ 'barry': 'green'}\n>>> d.keys()                        # 列出所有键\ndict_keys(['timmy',\
    \ 'barry'])\n>>> d.values()                      # 列出所有值\ndict_values(['yellow',\
    \ 'green'])\n```\n\n## 2.2.14 函数\n\n在 Python 中定义函数非常灵活。我们可以使用 **函数文档字符串**、**默认值**、**任意参数**、**关键字参数**、**仅限关键字参数**\
    \ 等来定义函数。以下代码片段展示了一些定义函数的常见形式。\n\n```\ndef foo_with_doc():\n    \"\"\"Documentation\
    \ String.\"\"\"\n\ndef foo_with_arg(arg): ...\ndef foo_with_args(*arg): ...\n\
    def foo_with_kwarg(a, b=\"foo\"): ...\ndef foo_with_args_kwargs(*args, **kwargs):\
    \ ...\ndef foo_with_kwonly(a, b, *, k): ...           # python3\ndef foo_with_annotations(a:\
    \ int) -> int: ... # python3\n```\n\n## 2.2.15 函数注解\n\n除了在函数中编写字符串文档来提示参数和返回值的类型外，我们还可以使用\
    \ **函数注解** 来标注类型。函数注解在 Python 3.0 中引入，其详细信息可参见 PEP 3017 和 PEP 484。它们是 **Python\
    \ 3** 中的一个 **可选** 特性。使用函数注解会失去对 **Python 2** 的兼容性。我们可以通过存根文件来解决这个问题。此外，可以通过 `mypy`\
    \ 进行静态类型检查。\n\n```\n>>> def fib(n: int) -> int:\n...     a, b = 0, 1\n...    \
    \ for _ in range(n):\n...         b, a = a + b, b\n...\n    return a\n...\n>>>\
    \ fib(10)\n55\n```\n\n## 2.2.16 生成器\n\nPython 使用 `yield` 语句定义 **生成器函数**。换句话说，当我们调用一个生成器函数时，生成器函数会返回一个\
    \ **生成器** 而不是返回值，用于创建一个 **迭代器**。\n\n```\n>>> def fib(n):\n...     a, b = 0, 1\n\
    ...     for _ in range(n):\n...         yield a\n...         b, a = a + b, b\n\
    ...\n>>> g = fib(10)\n>>> g\n<generator object fib at 0x10b240c78>\n>>> for f\
    \ in fib(5):\n...     print(f)\n...\n0\n1\n1\n2\n3\n```\n\n## 2.2.17 生成器委托\n\n\
    Python 3.3 引入了 `yield from` 表达式。它允许一个生成器将部分操作委托给另一个生成器。换句话说，我们可以在当前的 **生成器函数**\
    \ 中从其他 **生成器** 中 **yield** 一个序列。更多信息可参见 PEP 380。\n\n```\n>>> def fib(n):\n...\
    \     a, b = 0, 1\n...     for _ in range(n):\n...         yield a\n...      \
    \   b, a = a + b, b\n...\n>>> def fibonacci(n):\n...     yield from fib(n)\n...\n\
    >>> [f for f in fibonacci(5)]\n[0, 1, 1, 2, 3]\n```\n\n## 2.2.18 类\n\nPython 支持许多常见特性，例如\
    \ **类文档字符串、多重继承、类变量、实例变量、静态方法、类方法** 等。此外，Python 还提供了一些特殊方法供程序员实现 **迭代器、上下文管理器**\
    \ 等。以下代码片段展示了类的常见定义方式。\n\n```\nclass A: ...\nclass B: ...\nclass Foo(A, B):\n\
    \    \"\"\"A class document.\"\"\"\n\n    foo = \"class variable\"\n\n    def\
    \ __init__(self, v):\n        self.attr = v\n        self.__private = \"private\
    \ var\"\n\n    @staticmethod\n    def bar_static_method(): ...\n\n    @classmethod\n\
    \    def bar_class_method(cls): ...\n\n    def bar(self):\n        \"\"\"A method\
    \ document.\"\"\"\n\n    def bar_with_arg(self, arg): ...\n    def bar_with_args(self,\
    \ *args): ...\n    def bar_with_kwarg(self, kwarg=\"bar\"): ...\n    def bar_with_args_kwargs(self,\
    \ *args, **kwargs): ...\n    def bar_with_kwonly(self, *, k): ...\n    def bar_with_annotations(self,\
    \ a: int): ...\n```\n\n## 2.2.19 async / await\n\n`async` 和 `await` 语法从 Python\
    \ 3.5 开始引入。它们被设计用于与事件循环一起使用。一些其他特性，如 **异步生成器**，在后续版本中实现。\n\n**协程函数** (`async def`)\
    \ 用于为事件循环创建一个 **协程**。Python 提供了一个内置模块 **asyncio**，通过 async/await 语法来编写并发代码。以下代码片段展示了使用\
    \ **asyncio** 的一个简单示例。该代码必须在 Python 3.7 或更高版本上运行。\n\n```\nimport asyncio\n\nasync\
    \ def http_ok(r, w):\n    head = b\"HTTP/1.1 200 OK\\r\\n\"\n    head += b\"Content-Type:\
    \ text/html\\r\\n\"\n    head += b\"\\r\\n\"\n\n    body = b\"<html>\"\n    body\
    \ += b\"<body><h1>Hello world!</h1></body>\"\n    body += b\"</html>\"\n\n   \
    \ _ = await r.read(1024)\n    w.write(head + body)\n    await w.drain()\n    w.close()\n\
    \nasync def main():\n    server = await asyncio.start_server(\n        http_ok,\
    \ \"127.0.0.1\", 8888\n    )\n\n    async with server:\n        await server.serve_forever()\n\
    \nasyncio.run(main())\n```\n\n## 2.2.20 避免使用 exec 和 eval\n\n以下代码片段展示了如何使用内置函数\
    \ `exec`。然而，出于安全问题以及生成的代码对人类难以阅读等原因，不推荐使用 `exec` 和 `eval`。更多信息可参见《小心 Python 中的\
    \ exec 和 eval》以及《Eval 确实很危险》。\n\n```\n>>> py = '''\n... def fib(n):\n...     a,\
    \ b = 0, 1\n...     for _ in range(n):\n...         b, a = b + a, b\n...     return\
    \ a\n... print(fib(10))\n... '''\n>>> exec(py, globals(), locals())\n55\n```\n\
    \n## 2.3 未来语句\n\n未来语句告知解释器将某些语义编译为将在未来 Python 版本中可用的语义。换句话说，Python 使用 `from __future__\
    \ import feature` 将其他更高版本 Python 的特性向后移植到当前解释器。在 Python 3 中，许多特性（如 `print_function`）已经默认启用，但我们仍然保留这些未来语句以保持向后兼容性。\n\
    \n未来语句**不是**导入语句。未来语句改变了 Python 解释代码的方式。它们**必须**位于文件顶部。否则，Python 解释器将引发 `SyntaxError`。\n\
    \n如果你对 future 语句感兴趣并想了解更多解释，更多信息可参见 PEP 236 - 回到 `__future__`。\n\n# 目录\n\n- 未来语句\n\
    - 列出所有新特性\n- 打印函数\n- Unicode\n- 除法\n- 注解\n- BDFL 退休\n- 花括号\n\n## 2.3.1 列出所有新特性\n\
    \n`__future__` 是一个 Python 模块。我们可以用它来检查哪些 future 特性可以导入到当前 Python 解释器。有趣的是，`import\
