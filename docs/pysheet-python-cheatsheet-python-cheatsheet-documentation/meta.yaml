    , R_OK);\n\n// rc is unintentionally assigned to -1\nif (rc = -1) {\n    fprintf(stderr,\
    \ \"%s\", strerror(errno));\n    goto end;\n}\n```\n\nRather than comparison,\
    \ the variable, rc, is mistakenly assigned to -1. To prevent this error, some\
    \ people advocate using Yoda conditions within an expression.\n\n```\nc\nint rc\
    \ = access(\"hello_walrus\", R_OK);\n\n// -1 = rc will raise a compile error\n\
    if (-1 == rc) {\n    fprintf(stderr, \"%s\", strerror(errno));\n    goto end;\n\
    }\n```"
