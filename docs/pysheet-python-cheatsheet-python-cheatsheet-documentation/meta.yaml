  md: "# 4.5.2 Introduction\n\nTroubleshooting software bugs is a big challenge for\
    \ developers. While GDB provides many “debug commands” to inspect programs’ runtime\
    \ status, its non-intuitive usages impede programmers to use it to solve problems.\
    \ Indeed, mastering GDB is a long-term process. However, a quick start is not\
    \ complicated; you must unlearn what you have learned like Yoda. To better understand\
    \ how to use Python in GDB, this article will focus on discussing Python interpreter\
    \ in GDB.\n\n# 4.5.3 Define Commands\n\nGDB supports customizing commands by using\
    \ `define`. It is useful to run a batch of commands to troubleshoot at the same\
    \ time. For example, a developer can display the current frame information by\
    \ defining a `sf` command.\n\n```\n# define in .gdbinit\ndefine sf\n    where\
    \        # find out where the program is\n    info args    # show arguments\n\
    \    info locals  # show local variables\nend\n```\n\nHowever, writing a user-defined\
    \ command may be inconvenient due to limited APIs. Fortunately, by interacting\
    \ with Python interpreter in GDB, developers can utilize Python libraries to establish\
    \ their debugging tool kits readily. The following sections show how to use Python\
    \ to simplify debugging processes.\n\n# 4.5.4 Dump Memory\n\nInspecting a process’s\
    \ memory information is an effective way to troubleshoot memory issues. Developers\
    \ can acquire memory contents by `info proc mappings` and `dump memory`. To simplify\
    \ these steps, defining a customized command is useful. However, the implementation\
    \ is not straightforward by using pure GDB syntax. Even though GDB supports conditions,\
    \ processing output is not intuitive. To solve this problem, using Python API\
    \ in GDB would be helpful because Python contains many useful operations for handling\
    \ strings.\n\n```\n# mem.py\nimport gdb\nimport time\nimport re\n\nclass DumpMemory(gdb.Command):\n\
    \    \"\"\"Dump memory info into a file.\"\"\"\n\n    def __init__(self):\n  \
    \      super().__init__(\"dm\", gdb.COMMAND_USER)\n\n    def get_addr(self, p,\
    \ tty):\n        \"\"\"Get memory addresses.\"\"\"\n        cmd = \"info proc\
    \ mappings\"\n        out = gdb.execute(cmd, tty, True)\n        addrs = []\n\
    \        for l in out.split(\"\\n\"):\n            if re.match(f\".*{p}.*\", l):\n\
    \                s, e, *_ = l.split()\n                addrs.append((s, e))\n\
    ```"
