    \    return func(*args, **kwargs)\n...         return wrapper\n...     return\
    \ decorator\n...\n>>> @decorator_with_argument(10)\n... def example():\n...  \
    \   print(\"This is example function.\")\n...\n>>> example()\nVal is 10\nThis\
    \ is example function.\n```\n\nEquals to\n\n```python\n>>> def example():\n...\
    \     print(\"This is example function.\")\n...\n>>> example = decorator_with_argument(10)(example)\n\
    >>> example()\nVal is 10\nThis is example function.\n```\n\n### 2.9.13 Cache\n\
    \nNew in Python 3.2\n\nWithout Cache\n\n```python\n>>> import time\n>>> def fib(n):\n\
