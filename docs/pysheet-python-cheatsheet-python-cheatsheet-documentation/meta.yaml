  md: "# 3.10 C Extensions\n\nOccasionally, it is unavoidable for pythoneers to write\
    \ a C extension. For example, porting C libraries or new system calls to Python\
    \ requires to implement new object types through C extension. In order to provide\
    \ a brief glance on how C extension works. This cheat sheet mainly focuses on\
    \ writing a Python C extension.\n\nNote that the C extension interface is specific\
    \ to official CPython. It is likely that extension modules do not work on other\
    \ Python implementations such as PyPy. Even if official CPython, the Python C\
    \ API may be not compatible with different versions, e.g., Python2 and Python3.\
    \ Therefore, if extension modules are considered to be run on other Python interpreters,\
    \ it would be better to use ctypes module or cffi.\n\n+   ## Table of Contents\n\
    \n* C Extensions\n    - Simple setup.py\n    - Customize CFLAGS\n    - Doc String\n\
