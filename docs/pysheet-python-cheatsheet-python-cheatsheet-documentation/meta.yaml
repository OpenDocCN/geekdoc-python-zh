  md: '# 3.1.1 Compare HTML tags


    | tag type | format | example |

    |----------|--------|--------|

    | all tag | <[^>]+> | <br />, <a> |

    | open tag | <[^/>][^>]*> | <a>, <table> |

    | close tag | </[^>]+> | </p>, </a> |

    | self close | <[^/>]+/> | <br /> |


    ```

    # open tag

    >>> re.search(''<[^/>][^>]*>'', ''<table>'') != None

    True

    >>> re.search(''<[^/>][^>]*>'', ''<a href="#label">'') != None

    True

    >>> re.search(''<[^/>][^>]*>'', ''<img src="/img">'') != None

    True

    >>> re.search(''<[^/>][^>]*>'', ''</table>'') != None

    False


    # close tag

    >>> re.search(''</[^>]+>'', ''</table>'') != None

    True


    # self close

    >>> re.search(''<[^/>]+/>'', ''<br />'') != None

    True

    ```


