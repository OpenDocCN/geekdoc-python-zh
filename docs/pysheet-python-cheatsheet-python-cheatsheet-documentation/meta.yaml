  md: "# 4.5.6 Highlight Syntax\n\nSyntax highlighting is useful for developers to\
    \ trace source code or to troubleshoot issues. By using Pygments, applying color\
    \ to the source is easy without defining ANSI escape code manually. The following\
    \ example shows how to apply color to the list command output.\n\n```\nimport\
    \ gdb\n\nfrom pygments import highlight\nfrom pygments.lexers import CLexer\n\
    from pygments.formatters import TerminalFormatter\n\nclass PrettyList(gdb.Command):\n\
    \    \"\"\"Print source code with color.\"\"\"\n\n    def __init__(self):\n  \
    \      super().__init__(\"pl\", gdb.COMMAND_USER)\n        self.lex = CLexer()\n\
    \        self.fmt = TerminalFormatter()\n\n    def invoke(self, args, tty):\n\
    \        try:\n            out = gdb.execute(f\"l {args}\", tty, True)\n     \
    \       print(highlight(out, self.lex, self.fmt))\n        except Exception as\
    \ e:\n            print(e)\n\nPrettyList()\n```\n\n# 4.5.7 Tracepoints\n\nAlthough\
    \ a developer can insert printf, std::cout, or syslog to inspect functions, printing\
    \ messages is not an effective way to debug when a project is enormous. Developers\
    \ may waste their time in building source code and may acquire little information.\
    \ Even worse, the output may become too much to detect problems. In fact, inspecting\
    \ functions or variables do not require to embed print functions in code. By writing\
    \ a Python script with GDB API, developers can customize watchpoints to trace\
    \ issues dynamically at runtime. For example, by implementing a gdb.Breakpoint\
    \ and a gdb.Command, it is useful for developers to acquire essential information,\
    \ such as parameters, call stacks, or memory usage.\n\n```\n# tp.py\nimport gdb\n\
    \ntp = {}\n\nclass Tracepoint(gdb.Breakpoint):\n    def __init__(self, *args):\n\
    \        super().__init__(*args)\n        self.silent = True\n        self.count\
    \ = 0\n\n    def stop(self):\n        self.count += 1\n```"
  merge: -1
  pgno: 367
- img_proc: true
  md: "```\nframe = gdb.newest_frame()\nblock = frame.block()\nsym_and_line = frame.find_sal()\n\
    framename = frame.name()\nfilename = sym_and_line.symtab.filename\nline = sym_and_line.line\n\
    # show tracepoint info\nprint(f\"{framename} @ {filename}:{line}\")\n# show args\
    \ and vars\nfor s in block:\n    if not s.is_argument and not s.is_variable:\n\
    \        continue\n    typ = s.type\n    val = s.value(frame)\n    size = typ.sizeof\n\
    \    name = s.name\n    print(f\"\\t{name}({typ}: {val}) [{size}]\")\n# do not\
    \ stop at tracepoint\nreturn False\n```\n\n```\nclass SetTracepoint(gdb.Command):\n\
    \    def __init__(self):\n        super().__init__(\"tp\", gdb.COMMAND_USER)\n\
    \n    def invoke(self, args, tty):\n        try:\n            global tp\n    \
    \        tp[args] = Tracepoint(args)\n        except Exception as e:\n       \
    \     print(e)\n```\n\n```\ndef finish(event):\n    for t, p in tp.items():\n\
    \        c = p.count\n        print(f\"Tracepoint '{t}' Count: {c}\")\n```\n\n\
    ```\ngdb.events.exited.connect(finish)\nSetTracepoint()\n```\n\nInstead of inserting\
    \ std::cout at the beginning of functions, using a tracepoint at a function's\
    \ entry point provides useful information to inspect arguments, variables, and\
    \ stacks. For instance, by setting a tracepoint at fib, it is helpful to examine\
    \ memory usage, stack, and the number of calls.\n\n```\nint fib(int n)\n{\n  \
    \  if (n < 2) {\n        return 1;\n    }\n    return fib(n-1) + fib(n-2);\n}\n\
    ```\n\n```\nint main(int argc, char *argv[])\n```"
