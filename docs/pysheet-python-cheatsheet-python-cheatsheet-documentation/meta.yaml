- md: "```python\n# 4.5.8 Profiling\n\nWithout inserting timestamps, profiling is\
    \ still feasible through tracepoints. By using a `gdb.FinishBreakpoint` after\
    \ a `gdb.Breakpoint`, GDB sets a temporary breakpoint at the return address of\
    \ a frame for developers to get the current timestamp and to calculate the time\
    \ difference. Note that profiling via GDB is not precise. Other tools, such as\
    \ Linux perf or Valgrind, provide more useful and accurate information to trace\
    \ performance issues.\n\n```python\nimport gdb\nimport time\n\nclass EndPoint(gdb.FinishBreakpoint):\n\
    \    def __init__(self, breakpoint, *a, **kw):\n        super().__init__(*a, **kw)\n\
    \        self.silent = True\n        self.breakpoint = breakpoint\n\n    def stop(self):\n\
    \        # normal finish\n        end = time.time()\n        start, out = self.breakpoint.stack.pop()\n\
    \        diff = end - start\n        print(out.strip())\n        print(f\"\\tCost:\
    \ {diff}\")\n        return False\n\nclass StartPoint(gdb.Breakpoint):\n    def\
    \ __init__(self, *a, **kw):\n        super().__init__(*a, **kw)\n        self.silent\
    \ = True\n        self.stack = []\n\n    def stop(self):\n        start = time.time()\n\
    \        # start, end, diff\n        frame = gdb.newest_frame()\n        sym_and_line\
    \ = frame.find_sal()\n        func = frame.function().name\n        filename =\
    \ sym_and_line.symtab.filename\n        line = sym_and_line.line\n        block\
    \ = frame.block()\n\n        args = []\n        for s in block:\n            if\
    \ not s.is_argument:\n                continue\n            name = s.name\n  \
    \          typ = s.type\n            val = s.value(frame)\n            args.append(f\"\
    {name}: {val} [{typ}]\")\n\n        # format\n        out = \"\"\n        out\
    \ += f\"{func} @ {filename}:{line}\\n\"\n        for a in args:\n            out\
    \ += f\"\\t{a}\\n\"\n\n        # append current status to a breakpoint stack\n\
    \        self.stack.append((start, out))\n        EndPoint(self, internal=True)\n\
    \        return False\n\nclass Profile(gdb.Command):\n    def __init__(self):\n\
    \        super().__init__(\"prof\", gdb.COMMAND_USER)\n\n    def invoke(self,\
    \ args, tty):\n        try:\n            StartPoint(args)\n        except Exception\
    \ as e:\n            print(e)\n\nProfile()\n```\n\nThe following output shows\
    \ the profiling result by setting a tracepoint at the function `fib`. It is convenient\
    \ to inspect the function's performance and stack at the same time.\n\n```\n(gdb)\
    \ source prof.py\n(gdb) prof fib\nBreakpoint 1 at 0x606: file a.cpp, line 3.\n\
    (gdb) r\nStarting program: /root/a.out\nfib(int) @ a.cpp:3\n    n: 1 [int]\n \
    \   Cost: 0.0007786750793457031\nfib(int) @ a.cpp:3\n    n: 0 [int]\n    Cost:\
    \ 0.002572298049926758\nfib(int) @ a.cpp:3\n    n: 2 [int]\n    Cost: 0.008517265319824219\n\
    fib(int) @ a.cpp:3\n    n: 1 [int]\n    Cost: 0.0014069080352783203\nfib(int)\
    \ @ a.cpp:3\n    n: 3 [int]\n    Cost: 0.01870584487915039\n```\n\n# 4.5.9 Pretty\
    \ Print\n\nAlthough `set print pretty` on in GDB offers a better format to inspect\
    \ variables, developers may require to parse variables' value for readability.\
    \ Take the system call `stat` as an example. While it provides useful information\
    \ to examine file attributes, the output values, such as the permission, may not\
    \ be readable for debugging. By implementing a user-defined pretty print, developers\
    \ can parse `struct stat` and output information in a readable format.\n\n```python\n\
    import gdb\nimport pwd\nimport grp\nimport stat\nimport time\n\nfrom datetime\
    \ import datetime\n\n\nclass StatPrint:\n    def __init__(self, val):\n      \
    \  self.val = val\n\n    def get_filetype(self, st_mode):\n        if stat.S_ISDIR(st_mode):\n\
    \            return \"directory\"\n        if stat.S_ISCHR(st_mode):\n       \
    \     return \"character device\"\n        if stat.S_ISBLK(st_mode):\n       \
    \     return \"block device\"\n        if stat.S_ISREG:\n            return \"\
    regular file\"\n        if stat.S_ISFIFO(st_mode):\n            return \"FIFO\"\
    \n        if stat.S_ISLNK(st_mode):\n            return \"symbolic link\"\n  \
    \      if stat.S_ISSOCK(st_mode):\n            return \"socket\"\n        return\
    \ \"unknown\"\n\n    def get_access(self, st_mode):\n        out = \"-\"\n   \
    \     info = (\"r\", \"w\", \"x\")\n        perm = [\n            (stat.S_IRUSR,\
    \ stat.S_IWUSR, stat.S_IXUSR),\n            (stat.S_IRGRP, stat.S_IRWXG, stat.S_IXGRP),\n\
    \            (stat.S_IROTH, stat.S_IWOTH, stat.S_IXOTH),\n        ]\n        for\
    \ pm in perm:\n            for c, p in zip(pm, info):\n                out +=\
    \ p if st_mode & c else \"-\"\n        return out\n\n    def get_time(self, st_time):\n\
    \        tv_sec = int(st_time[\"tv_sec\"])\n        return datetime.fromtimestamp(tv_sec).isoformat()\n\
    \n    def to_string(self):\n        st = self.val\n        st_ino = int(st[\"\
    st_ino\"])\n        st_mode = int(st[\"st_mode\"])\n        st_uid = int(st[\"\
    st_uid\"])\n        st_gid = int(st[\"st_gid\"])\n        st_size = int(st[\"\
    st_size\"])\n        st_blksize = int(st[\"st_blksize\"])\n        st_blocks =\
    \ int(st[\"st_blocks\"])\n        st_atim = st[\"st_atim\"]\n        st_mtim =\
    \ st[\"st_mtim\"]\n        st_ctim = st[\"st_ctim\"]\n\n        out = \"{\\n\"\
    \n        out += f\"Size: {st_size}\\n\"\n        out += f\"Blocks: {st_blocks}\\\
    n\"\n        out += f\"IO Block: {st_blksize}\\n\"\n        out += f\"Inode: {st_ino}\\\
    n\"\n        out += f\"Access: {self.get_access(st_mode)}\\n\"\n        out +=\
    \ f\"File Type: {self.get_filetype(st_mode)}\\n\"\n        out += f\"Uid: ({st_uid}/{pwd.getpwuid(st_uid).pw_name})\\\
    n\"\n        out += f\"Gid: ({st_gid}/{grp.getgrgid(st_gid).gr_name})\\n\"\n \
    \       out += f\"Access: {self.get_time(st_atim)}\\n\"\n        out += f\"Modify:\
    \ {self.get_time(st_mtim)}\\n\"\n        out += f\"Change: {self.get_time(st_ctim)}\\\
    n\"\n        out += \"}\"\n        return out\n\np = gdb.printing.RegexpCollectionPrettyPrinter(\"\
    sp\")\np.add_printer(\"stat\", \"^stat$\", StatPrint)\no = gdb.current_objfile()\n\
    gdb.printing.register_pretty_printer(o, p)\n```\n\nBy sourcing the previous Python\
    \ script, the PrettyPrinter can recognize `struct stat` and output a readable\
    \ format for developers to inspect file attributes. Without inserting functions\
    \ to parse and print `struct stat`, it is a more convenient way to acquire a better\
    \ output from Python API.\n\n```\n(gdb) list 15\n10          struct stat st;\n\
    11          \n12          if ((rc = stat(\"./a.cpp\", &st)) < 0) {\n13       \
    \       perror(\"stat failed.\");\n14              goto end;\n15          }\n\
    16          \n17          rc = 0;\n18      end:\n19          return rc;\n(gdb)\
    \ source st.py\n(gdb) b 17\nBreakpoint 1 at 0x762: file a.cpp, line 17.\n(gdb)\
    \ r\nStarting program: /root/a.out\n\nBreakpoint 1, main (argc=1, argv=0x7fffffffe788)\
    \ at a.cpp:17\n17          rc = 0;\n(gdb) p st\n$1 = {\nSize: 298\nBlocks: 8\n\
    IO Block: 4096\nInode: 1322071\nAccess: -rw-rw-r--\nFile Type: regular file\n\
    Uid: (0/root)\nGid: (0/root)\nAccess: 2019-12-28T15:53:17\nModify: 2019-12-28T15:53:01\n\
    Change: 2019-12-28T15:53:01\n}\n```\n\nNote that developers can disable a user-defined\
    \ pretty-print via the command `disable`. For example, the previous Python script\
    \ registers a pretty printer under the global pretty-printers. By calling `disable\
    \ pretty-print`, the printer `sp` will be disabled.\n\n```\n(gdb) disable pretty-print\
    \ global sp\n1 printer disabled\n1 of 2 printers enabled\n(gdb) i pretty-print\n\
    global pretty-printers:\n  builtin\n    mpx_bound128\n  sp [disabled]\n    stat\n\
    ```\n\nAdditionally, developers can exclude a printer in the current GDB debugging\
    \ session if it is no longer required. The following snippet shows how to delete\
    \ the sp printer through `gdb.pretty_printers.remove`.\n\n```\n(gdb) python\n\
    >import gdb\n>for p in gdb.pretty_printers:\n>    if p.name == \"sp\":\n>    \
    \    gdb.pretty_printers.remove(p)\n>end\n(gdb) i pretty-print\nglobal pretty-printers:\n\
    \  builtin\n    mpx_bound128\n```\n\n# 4.5.10 Conclusion\n\nIntegrating Python\
    \ interpreter into GDB offers many flexible ways to troubleshoot issues. While\
    \ many integrated development environments (IDEs) may embed GDB to debug visually,\
    \ GDB allows developers to implement their commands and parse variables' output\
    \ at runtime. By using debugging scripts, developers can monitor and record necessary\
    \ information without modifying their code. Honestly, inserting or enabling debugging\
    \ code blocks may change a program's behaviors, and developers should get rid\
    \ of this bad habit. Also, when a problem is reproduced, GDB can attach that process\
    \ and examine its status without stopping it. Obviously, debugging via GDB is\
    \ inevitable if a challenging issue emerges. Thanks to integrating Python into\
    \ GDB, developing a script to troubleshoot becomes more accessible that leads\
    \ to developers establishing their debugging methods diversely.\n\n# 4.5.11 Reference\n\
    \n1. Extending GDB using Python\n2. gcc/gcc/gdbhooks.py\n3. gdbinit/Gdbinit\n\
    4. cyrus-and/gdb-dashboard\n5. hugsy/gef\n6. sharkdp/stack-inspector\n7. gdb Debugging\
    \ Full Example (Tutorial)"
