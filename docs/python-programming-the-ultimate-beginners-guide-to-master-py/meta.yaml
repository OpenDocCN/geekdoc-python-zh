    We have now retrieved every exception class hierarchy. You can find them all in
    the Python document library to learn more about them. In reality, you won''t work
    with a list of exceptions next to you. You will focus on specific ones and handle
    them rather than try to catch every exception. While each class in Python can
    be found in the hierarchy, this will also include custom exceptions. You can create
    exceptions that can also inherit from the parent classes. We won''t talk about
    this more as it is an advanced topic.


    # Assertion Error


    The purpose of this error is to tell the programmer there is an error the program
    can''t recover. They don''t show typical reports, which allows you to act in some
    way. Assertions are like a self-check in the code. They check if the code contains
    impossible conditions. If they are found, the program crashes, and you will receive
    an assertion error. It will tell you which impossible condition caused it.


    Assertion errors can warn you of bugs that need fixing. To add an assertion, you
    need to use the "assert" keyword. Developers place the assert statement at the
    beginning of the function to check input and end to check the output. When Python
    detects an assert statement, it analyzes the expression. If the expression returns
    true, the function can be performed; if false, you get the assertion error.


    Here''s an example of the syntax:


    ```

    assert Expression [Arguments]

    ```


    Assertion errors can be handled exactly like exceptions errors with "try / except"
    statements. Ensure you catch them, or the program will just crash.'
