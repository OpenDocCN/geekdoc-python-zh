  md: '# INTRODUCTION


    Python is a powerful language. It is also the easiest language to learn. Python
    has found preference in a variety of technology fields like Machine Learning,
    Deep Learning, and Data Science. With the rate at which Python is finding preference
    among many technological fields, it’s the best time to learn the language.


    We want to make it easy to start that journey, no matter what your skills and
    knowledge are. It does not matter if you know nothing about programming as a whole.


    Each chapter of this book builds on the previous chapters in an easy to understand
    step-by-step process. You will learn theory and also practice what you learn.
    Programming practice is perhaps the most important step, even when the concepts
    themselves haven’t quite made sense. It is in the act of doing that we test our
    concepts and refine them. Practice is also the only way you become a programmer.
    Take breaks when you need to and don’t be afraid to experiment.'
