    We want to make it easy to start that journey, no matter what your skills and
    knowledge are. It does not matter if you know nothing about programming as a whole.


    Each chapter of this book builds on the previous chapters in an easy to understand
    step-by-step process. You will learn theory and also practice what you learn.
    Programming practice is perhaps the most important step, even when the concepts
