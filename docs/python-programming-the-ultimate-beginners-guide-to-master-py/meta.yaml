    \ TypeError 被称为回溯。它告诉你需要回去修复程序逻辑中的某些东西。这是 Python 会警告你的许多其他 TypeErrors 的一个例子。你需要确保你想要执行的操作不违反现实世界中关于它们应如何工作的规则。\n\
    \n在前面的例子中，我们有两种类型的变量：一个整数（int）和一个字符串（str）。字符串是文本或单词，整数是整数。这些是 Python 的一些数据类型。Python\
    \ 提供了组合变量类型以形成更复杂数据类型的方法；我们将在后面探讨这一点。现在，让我们通过实践来构建我们的编程基础。\n\n## 基本文本操作\n\n字符串是任何编程语言中流行的数据类型。我们在制作\
