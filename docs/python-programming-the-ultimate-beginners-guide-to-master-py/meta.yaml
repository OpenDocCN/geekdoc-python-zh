    \n我们还通过编程使重复任务自动化，从而提高效率。实现这一点的一种方法是通过循环。Python允许我们通过两种方式创建循环：使用\"while\"语句或\"\
    for\"语句。\n\n## “While”循环\n\n\"while\"循环首先检查一个条件是否为真。只要条件为真，就会执行一条语句。因此，它检查条件是否为真并执行，然后再次检查并执行，如此循环。以下是一个示例：\n\
    \n```\nx = 1\nwhile x < 10:\n    print(x)\n    x += 1\n```\n\n这个循环检查x是否小于十，然后执行代码。它检查x是否仍然小于十，并继续执行，直到x不再小于十。在执行过程中，x的值每次增加一。循环中代码的每次执行都称为一次迭代，因为它被重复多次。\n\
    \n在创建\"while\"循环时，你需要注意两件事。循环检查的变量需要在循环运行前初始化，并且该变量需要在每次迭代中更新/更改，否则你将得到一个无限循环。无限循环可能是危险的，Python不会告诉你何时创建了一个无限循环。如果你发现程序陷入无限循环，你需要终止它，但这在某些情况下可能不起作用。无限循环不会损坏你的计算机，但它们会占用并耗尽系统资源，导致系统变慢或重启。在某些罕见的情况下，无限循环是有帮助或需要的。但作为初学者，最好避免它们。\n\
    \n条件语句允许你使用任何类型的变量。让我们考虑一个程序，它计算用户输入的多个值的平均值。这个应用程序应该关注什么问题？程序需要考虑用户的输入，因为它不知道用户会输入多少个值，以及程序是否对这些值有支持。这就是为什么你应该进行严格测试以暴露重大的设计缺陷。\n\
    \n在我们的窗帘应用程序中，关键值是布料宽度，设置为150厘米。预留20厘米用于折边意味着单个窗帘可以使用的最大宽度是130厘米。对于更大的尺寸，我们需要将宽度缝合在一起，以此类推。我们推测窗帘需要覆盖窗户宽度的四分之三。这意味着一个宽度的布料最多可以覆盖170厘米。因此，对于更大的窗户，我们需要计算几个宽度。我们还需要问自己其他问题，比如窗户是否比深度更宽。这意味着需要旋转布料，提供15厘米的折边。但这样窗户的高度必须小于125厘米。\n\
    \n注意我们必须考虑很多条件。验证它们最简单的方法是设置多个可能的窗户尺寸供我们检查：100 x 100，100 x 200，等等。你还需要自己计算结果，以确保程序给你正确的结果。让我们这样做：\n\
    \n1.  让我们从100 x 100的尺寸开始。在这种情况下，由于显而易见的原因，我们不必考虑宽度。考虑到折边，我们需要115 x 95厘米的布料。请记住，这里有两种可能性。你可以按宽度或长度测量。两者都会产生不同的值。如果你按长度测量，你将需要大约230厘米的布料，如果你按宽度测量，你将需要190厘米的布料。\n\
    2.  在第二种情况下，窗户是100 x 200厘米。窗帘需要150厘米的宽度。因为这是布料的宽度，我们应该加上20厘米的折边和另外20厘米的接缝材料。这使我们的总数达到190，意味着我们窗帘的尺寸是115\
    \ x 190厘米。如果我们沿长度测量，我们将需要比沿宽度测量更多的布料。\n\n继续计算其他情况。我们所做的是揭示了我们设计中的缺陷。当你继续深入时，你会意识到翻转窗户的尺寸会导致布料问题。这意味着如果我们沿宽度测量，只有当宽度大于深度时才值得这样做。另一个条件是深度小于125厘米。现在由程序员做出关键的设计决策。你是应该提供一个选项来考虑沿宽度的布料测量，还是保持沿长度测量？我们还需要考虑精度。最好将结果四舍五入到最近的半米；这是关于最终结果，而不是计算过程。\n\
    \n有了这些信息，让我们创建一个跟踪表并比较数据。使用打印函数，它看起来像这样：\n\n```\n# 为跟踪表添加标题\nprint()\nprint('\\\
    twidth\\theight\\twidths\\ttotal\\tprice')\n# 考虑折边\n# 在此之前，你需要将字符串转换为数字变量\n# 如果不这样做，由于在文本上使用数学运算符，你会得到错误\n\
    curtain_width = (float(window_width) * 0.75) + 20\nprint('\\t', curtain_width)\n\
    curtain_length = float(window_height) + 15\nprint('\\t\\t', curtain_length)\n\
