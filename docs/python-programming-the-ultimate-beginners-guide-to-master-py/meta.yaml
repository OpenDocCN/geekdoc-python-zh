    | 1 | | | | | | |\n| 2 | | | | | | |\n| 3 | | | | | | |\n\n为了看看它们的实际应用，让我们回到我们的窗帘应用程序，看看我们哪里出错了。我们将从头到尾跟踪变量的值和语句。我们将用变量名和程序条件替换跟踪表标题。理想情况下，你应该使用不同的数据集执行多次测试，以发现许多其他可能性。这是因为最关键的应用程序错误是由异常值引起的，也称为临界值。这些是应用程序不期望的值，因此它"
