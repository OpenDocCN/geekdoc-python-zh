    \n接下来是物品购买部分，它可以附加到角色生成器上。这简化了代码并使设计更紧凑。我们还可以使用“for”循环来遍历可购买的物品。我们将访问元组中物品的价格。玩家将能够确认购买。当他们确认时，该物品将被添加到他们的库存中。金币将相应扣除。玩家将被要求从他们的库存中选择一件武器。如果他们没有武器，默认将是他们的拳头。在后台，玩家从`trader`字典中访问元组并将其转换为武器值。护甲值的处理方式相同。所有这些数据使我们能够构建一个档案。\n\
    \n战斗在一个`while`循环中进行，当其中一个角色的生命值耗尽时结束。循环内部是另一个循环，用于在战斗者之间切换回合，因为这是一个基于回合的战斗机制。该循环访问玩家的索引并将其转换为布尔值。一个回合结束后，“not”运算符会反转该值，这意味着攻击者/目标索引在角色之间切换。\n\
    \n另一个方面是攻击速度的计算。玩家必须掷出一个正数才能命中目标；负数表示未命中。我们将范围设定在零到七之间。这一点很重要。该值将在未命中和命中的元组中确认。根据攻击是否命中，将打印相应的结果。然后我们使用该值进行伤害计算。请记住，这些值是在一个略微随机的范围内设定的，在限制之内，以使游戏更有趣和不可预测。\n\
    \n最后一部分将描述攻击造成的伤害量。然后更新他们的生命值以反映这种损失。如果生命值不是负数或零，游戏将继续。当生命值达到零或负数时，循环中断。然后我们有了获胜者，程序停止。\n\
    \n## 编码练习\n\n你已经掌握了足够的知识来尝试编写这个程序。你有详细的伪代码和所有部分的完整解释，所以试一试吧。你不需要再学习其他任何东西就能完成这个。是的，认真的。只需回顾本章所学的内容，应该就足够简单了。\n\
    \n当然，这看起来令人生畏，但你需要时不时地在没有辅助的情况下练习。不要只是复制和测试。自己编写代码，看看会发生什么。这就是你学习的方式。即使失败了，你也会学到很多。如果你遇到困难，可以上网寻求其他开发人员的帮助。很可能有人遇到过你的问题并解决了它，而且人们很乐意提供帮助。\n\
    \n## 总结\n\n在本章中，我们学习了如何使用Python数据结构，如字典、元组和列表。我们看到了如何将它们应用于实际场景。有些部分可能让人不知所措，但我们抬起头来，艰难地穿越了这片沼泽。\n\
    \n我们知道可变序列和不可变序列之间的区别。我们可以使用索引和切片访问元素，编辑列表，并使用循环遍历序列。它们起初看起来很奇怪，但现在我们理解了它们对于构建更强大、更逻辑化的程序是多么重要。\n\
    \n但最重要的是，我们构建了一个非常令人印象深刻的程序。而且我们是独立完成的。嗯，几乎是。我们已经开始培养我们的研究技能，这对于这样的职业来说是不可或缺的。这是我们第一次体验在现实世界中工作的感觉，充满了起伏。\n\
    \n# 第6章：函数\n\n我们已经使用过变量，做过算术运算，也处理过比较和决策。我们可以编写基本的脚本。但你有没有注意到我们一直在做的所有代码的一个缺点？如果我们更改代码的一部分，我们就必须更改所有代码。一切都必须精确。这是因为我们的代码行就像一个大的代码块，或者一个需要逐行执行的指令列表。如果程序需要执行一个任务，它必须从头开始。这是一个糟糕的设计。如果你只想更新代码的一部分会怎样？你需要检查所有代码。你可以看出现代应用程序不可能这样工作。它效率很低。这就是函数的用武之地。本质上，函数将你的代码划分为执行特定任务的块。在本章中，我们将学习它们的工作原理，以便改进我们的程序。\n\
    \n## 创建函数\n\n我们已经使用过Python的内置函数或方法。但它们还不够。所以，我们必须构建自己的函数。别担心；所有函数的构建方式都相同，即使是内置函数也是如此。\n\
    \n函数有很多优点：\n\n- 1. 正如我们所说，你可以划分你的代码，这样从长远来看，更新和维护你的代码会变得更容易。你不必在每次更改时都检查项目的其余部分。\n\
    - 2. 函数消除了代码冗余。你不必多次编写或使用相同的代码。规则是，如果你必须编写一段代码超过两次，就将其转换为函数。这将使你的工作更简单，你的代码也将更具可读性。你需要做的只是在需要相同代码或执行任务时调用该函数。\n\
    - 3. 在团队中，它们允许你将程序划分为可管理的部分，这些部分可以独立开发。这意味着工作将更快完成。最终，所有代码都会连接在一起。\n\n让我们看一个用函数编写的项目。正如我们所说，项目是学习的最佳方式。我们将构建一个井字棋游戏，用户将与计算机对战。我们将从游戏说明开始。这些将作为单独的程序编写。让我们看看下面的代码：\n\
    \n```\n# 游戏指南\n# 演示用户自定义函数\ndef gameGuide():\n    \"\"\"显示说明。\"\"\"\n    print(\n\
    \    \"\"\"欢迎来到你将玩过的最史诗级的游戏！\n    这将是你，这个血肉之躯，与我，全知全能的计算机之间的智慧较量！\n    你将首先输入一个从0到8的数字，\n\
    \    它将对应游戏棋盘上的以下位置：\n    0 | 1 | 2\n    3 | 4 | 5\n    6 | 7 | 8\n    准备战斗！ \\\
    n\"\"\")\n\n# 主程序\nprint(\"这是井字棋的游戏指南：\")\ngameGuide()\nprint(\"再复习一遍：\")\ngameGuide()\n\
    print(\"你肯定明白它是如何工作的了。\")\ninput(\"\\n\\n 按回车键退出。\")\n```\n\n现在让我们在下一节中分析代码。\n\
    \n## 函数定义\n\n函数在使用前应该被定义。它们使用“def”关键字定义。在我们上一个例子中，它看起来像这样：\n\n```\ndef gameGuide():\n\
    ```\n\n那么，我们所说的“定义”是什么意思？这是一种告诉计算机，接下来的代码块属于我们已命名的函数的方式。我们将能够通过调用该函数来访问代码。函数内部的信息告诉它应该做什么。Python会知道程序中的所有函数，因此你可以在需要时随时调用它。只需记住，除非被调用，否则函数不会起作用。\n\
    \n函数通过其名称和括号调用，如下所示：\n\n```\ngameGuide()\n```"
