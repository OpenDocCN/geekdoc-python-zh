  mdcn: "## 第三章：变量与数据类型\n\n变量就像用来存储数据值的容器，这样计算机才能处理它们。没有变量，处理过程就无法进行，因为没有东西可供处理。数据值有不同的类型：列表、整数、字符串、浮点数、字典等等。在编程中，许多函数的功能都依赖于变量的使用。变量使我们能够编写操作，而无需知道函数将处理的具体数据。事实上，计算机会将大多数类型的数据转换为变量。\n\
