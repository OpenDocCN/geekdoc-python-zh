    you can, the point is about asking yourself if something can be improved. It also
    makes things easy for you because you don''t have to build anything from scratch.
    You can find the code that is written and shared and then optimize it. You might
    think this is cheating, but it isn''t. Most of the tools we use today are built
    this way. People built on top of each other''s technology to produce something
    more beautiful.


    # Problem Identification


    Before coding, you need an idea. To find one quickly, think of something you do
    often. Choose something repetitive that you think can be automated by code. Programming
    is always perfect for mundane tasks. This is your first problem. The next step
    is finding a way you can tell the computer to do this task for you. What instructions
    - in Python - can the computer follow to fix this problem? You will also need
    to get results that show that the computer is doing what you want it to do. Now
    let''s go through the basic development cycle. The important thing to remember
    is that you don''t have to be strict about this. You can adapt methods to situations.
    The principles are not necessarily a blueprint, so you can be creative with it.


    Without thinking about the structure, starting can be difficult, and adding solutions
    and building just as you go can lead to an unpleasant experience. Here are the
    steps you should take:


    +   1. **The software’s purpose:** Write down the problem and what your program
    should do to fix the problem. Because you are new to programming, start with something
    simple. A program that prints messages to a user is sufficient. Once you know
    what you want to do, you have to think clearly about how you can solve that problem.
    It''s the brainstorming session. All your ideas don''t have to be perfect, but
    you just need to think they can work so you''ll have an idea of what to do if
    they don''t.

    2. **The type of user:** Next, you have to ask yourself who your target users
    are. Even If you are doing a personal project, you should get into the habit of
    doing so. Ask yourself who is going to find his program useful. Are they your
    friends or family? The general public? How do you anticipate they will interact
    with the program? Do they have technical knowledge? What are they going to expect?
    Once you ask yourself questions along these lines, you will begin to see a clearer
    picture of your program. You will not only know what it should do, but you will
    also know how it should do it and how it should look while doing it.

    3. **The computer system:** Then, you need to anticipate the operating system
    of'
  - '[PAGE 14]


    your audience. Are they going to be on a Windows, Apple, or Linux computer? Sometimes
    you will need to think about the device they are more likely to use. Is it an
    Apple tablet or an Android phone? You don''t have to be too specific. You need
    to have an idea so you can make some provisions for it while you code.


    All of these questions will guide the design of your applications. When you answer
    them at the beginning of a project, you make the road ahead a lot simpler. If
    you don''t have answers to all these questions for some reason, it is fine. Some
    of the answers will come to you as you develop.


    # Finding the Solution


    You now have a basic idea of what you want to build, where it works, who it is
    for, and how it must work. It might look like you don''t need to carry on any
    longer thinking about it, but there is still work to do. Many developers spend
    a lot of time designing their programs instead of actually coding. Now you need
    to ask yourself what your intended target''s requirements are. Then understand
    their needs. It might involve an agreement between you and the client if you are
    building this for someone specific. Once you understand what they want, you need
    to think about a solution. The solution might not be obvious, it might be tenuous,
    and it might get complicated. Still, if you have written down your process, you
    will have an easier time adjusting your strategy and avoiding other issues. You
    also save yourself a lot of time. There is no point building it only to discover
    you have to start over and change it because no one wants it. Here are some things
    to think about at this point:


    +   1. Functional requirements: These are the things that your program has to
    do. Your program''s functional request is what the system has to do to give you
    the result you want. For instance, it might need to calculate and print a message
    or the answer. You cross these steps off as you code.

    2. Results: When the time comes, you will need to test your program to see if
    it behaves as it should. When you start, it will be fine running the application
    to see if it does what you want it to. As you mature and your applications become
    more complex, you will need to find better testing methods. Testing skills help
    reduce bugs and ensure good performance. In some cases, you might write some tests
    that have predetermined answers and see if the program delivers the answers you
    expect. You will do this during the development stage, not after you have finished.
    It''s daunting having to go back over the rest of your application to figure out
    why it does not work. It is time-consuming and will be testing. As a beginner,
    it will be enough to just run your program and see that it works.'
