    ## Python 标识符\n\n在编码时，你需要能够通过标签来识别数据类型。标识符是未被注释掉或未放在引号内的标签/单词。标识符为事物贴上标签，使代码更具可读性，前提是这些名称与你的项目相关。不要对多个变量或函数使用相同的标识符；否则会发生冲突。因此，你的标识符必须对每个变量都是唯一的。\n\
    \n标识符允许你使用任何你想要的单词，除了 Python 保留的那些。Python 使用的那些是语言不可分割的一部分，被称为关键字。其中一些关键字是：False、lambda、class、import、global、while、yield、continue。随着学习的深入，你会逐渐理解这些。因为你不会总是记住这些关键字，所以当你使用其中一个时，Python\
    \ 会警告你。\n\n现在，让我们学习如何命名变量。变量应始终以下划线或字母开头。这不是一条规则；你可以打破它，你的程序仍然会运行。这是其他程序员出于良好原因建立的一种约定。只要你的标识符不是以数字开头，你可以在变量中使用数字。此外，Python\
