    - 3. 多级继承：当一个子类下面有另一个类继承其类功能时，就是多级继承。它也被称为孙类，因为子类成为第二个类的父类，而父类成为第二个子类的祖父类。\n-\
    \ 4. 层次继承：当一个父类创建多个子类时，我们就有层次继承。\n- 5. 混合继承：当继承类型组合时，我们说我们有混合继承。\n\n## 多态\n\n\
    多态意味着具有多种形式。在编程中，它指的是语言根据类或数据类型处理对象的能力。对象可以重新定义继承的方法，并为它将处理的数据类型调整代码。\n多态是一个有些高级的主题。所以如果你还不太明白，没关系，但让我们通过一个类比来解释。想象你给朋友现金让他为你买午餐。如果你告诉一个\
    \ 11 岁的孩子为你做同样的事，他会骑自行车给你买汉堡和薯条。但你的朋友可能会开车给你买素食三明治和葡萄。这就是多态：你有一个目标，不同的对象可以用不同的方式完成。当我们谈论同样的事情但用编程术语时，请记住这一点。\n\
    \n多态之所以重要有两个原因。它允许对象根据其参数执行方法的不同实现。其次，为一种数据类型编写的代码可以用于另一种相关数据类型。理解这一点对于掌握 Python\
    \ 很重要。\n\n多态的另一个类似于现实世界的特征是，它赋予语言穿越类层次结构的能力。这意味着它的性能是它习惯的，因为它过去学过。\n\n这里有一个类比给你：就像读这本书。你知道如何读它，因为你在年轻时学会了如何读书。用面向对象编程的术语来说，你是一个可以与书交互、翻页并将字母转换成有意义的单词的对象。但如果你能读这本书，这意味着你也能读其他东西，比如网页。它们都包含单词，但没有翻页。但你也可以用它做其他事情，比如阅读路标和短信。所有这些之所以可能，是因为你学会了读书。读书是基础对象。\n\
    \n在编程中，这就是多态的含义。为特定类型编写的代码可以对相关数据类型执行操作。\n\n## 创建模块\n\n现在，你已经有一些使用 Python 模块和导入的经验。在\
    \ Python 中，你可以编写自己的模块。\n\n编写模块是重用和重新利用代码的另一个例子。假设你正在开发一个纸牌游戏，在此期间，你创建了像 cards\
    \ 和 deck 这样的类。在创建另一个纸牌游戏时，你可能需要这些类，即使游戏不同——像 cards 和 decks 这样的类。\n\n模块还提供程序管理。当程序增长时，很难跟踪所有部分。模块允许你将它们分解成易于管理的小块。假设你正在处理一个商业项目，这意味着你有数千行代码。你可以使用模块将它们分成可管理的包。这意味着某些程序可以在某些部分上工作，而其他程序在其他部分上工作。它们不会因为谁在做什么而感到困惑，因为程序被很好地划分了。\n\
    \n你还可以与朋友和其他程序员共享模块。你可以上传它们。"
