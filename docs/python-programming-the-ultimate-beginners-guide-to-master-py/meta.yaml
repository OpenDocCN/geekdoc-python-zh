    # Changing Global Variables


    You can use the global "global" keyword to access global keywords. In our example,
    we used it to change the value to -10. When executing a value, the new value will
    be printed.


    So when should we use global variables? The truth is that you can use them whenever
    you want. But is it wise? Just because you can do something doesn''t mean you
    should. You need to weigh the pros and cons and ask yourself if it is appropriate
    for your project. Global variables are often problematic because they can be confusing.
    Use them when you absolutely have to, when you can''t find a better alternative
    to what you are trying to achieve.


    Alternatively, you can turn global variables into constants, which aren''t difficult
    to track. Say in a tax calculator you''ll have a number of functions, but all
    of them will use .45 as a value. You should place the value inside a global constant
    instead, meaning we no longer need to call the value inside every function. It
    might not seem like much, but it makes a big difference when working on a complex
    project. Having clear variables instead of numbers, that might as well be arbitrary,
    is much more meaningful and easier to work with.


