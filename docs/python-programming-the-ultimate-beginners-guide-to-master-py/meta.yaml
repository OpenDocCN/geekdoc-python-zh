    # Reading Global Variables


    We’ve looked at local and global variables and talked about scope. It’s time to
    confuse you, but only a little. You can read global variables no matter what scope
    you are in. You can read a variable inside a function while you are in the global
    scope, and vice versa. It’s just like we said about tinted car windows. When you
    are inside a car you can see everything inside, but you can also see what is out
    there. So a function can read global variables.


    The program we wrote earlier illustrates readability. We have defined a function
    called "read_global," which prints values of the global variables. It works without
    any errors, but there''s a catch. You can read these variables, but you cannot
    make any changes to them directly. So if you were to try, like we see below, you
    would get an error:


    ```

    value += 1

    ```


    # Shadowing Global Variables


    Looking at the example above, you might have wondered what the "shadow" stood
    for. Shadowing is giving a local variable a similar name to a global variable.
    But you cannot edit the global variable still. Any change you make happens to
    the local variable. The local variable is the shadow of the global variable, thus
    "shadowing." Here''s how we assigned a value to the shadow_global function:


    ```

    value = -10

    ```


    The global value hasn''t changed. But an identical local version was created inside
    the functions, and now that version has the value of -10. You can see this in
    action because we have told the program to print the global version.'
