  md: '# CHAPTER 3:

    VARIABLES AND DATA TYPES


    Variables are like containers used to store data values so the computer can process
    them. Without variables, the processes would not occur because there would be
    nothing to process. Data values come in different types: lists, integers, strings,
    floats, dictionaries, and more. In programming, many functions rely on the use
    of variables for their functionality. Variables allow us to write operations without
    knowing the exact data the function will manipulate. In fact, computers convert
    most kinds of data into variables.


    In this chapter, we learn about variables and data types. We will see the fundamental
    role played by variables in the development of any program. We will learn with
    real examples where we will manipulate strings and perform mathematical operations.


    # Python Identifiers


    When coding, you need to be able to identify a data type by its label. Identifiers
    are labels/words that are not commented out or placed within quotation marks.
    Identifiers label things so the code is more readable, provided that the names
    relate to your project. Don''t use the same identifiers for multiple variables
    or functions; conflicts will occur. So, your identifiers have to be unique to
    each variable.


    Identifiers allow you to use any word you want except those reserved by Python.
    Those used by Python are an integral part of the language, and they are known
    as keywords. Some of those keywords are: False, lambda, class, import, global,
    while, yield, continue. You will come to understand these later as you learn.
    Because you won''t always remember these keywords, Python warns you when you use
    one.


    Now, let''s learn how to name variables. Variables should always start with an
    underscore or a letter. This is not a rule; you can break it, and your programs
    will run. It is a convention established by other programmers for a good reason.
    You can use numbers in your variables as long as your identifier does not start
    with one. Also, Python is case sensitive, meaning the following name variable
    would not count as the same variable: "newVariable," "NewVariable," "NEWVARIABLE,"
    and "_newVariable." Python will see each one as a unique variable, although semantically,
    they are the same. It means you should watch your capitalization. Experienced
    developers advise you to stick to one style throughout your project. So, if you
    start your variables with an uppercase letter, you should follow the same rule
    in your entire project. It prevents'
