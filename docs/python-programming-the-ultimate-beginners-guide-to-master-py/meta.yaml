    \ \"if\" 语句，用于验证程序是否直接执行。如果检查为真，则应用程序直接运行；如果为假，则它将是一个被导入的模块。\n\n## 总结\n\n在本章中，我们学习了\
    \ Python 的面向对象编程。我们的目标是向你介绍 OOP。OOP 是一个学术性话题，所以如果你不太理解，不要感到沮丧。\n\n我们学习了类、多态性和继承。我们还学习了模块以及如何创建自己的模块。使代码可重用是程序员应该做的最重要的事情之一。所以，如果你编写了一个好的函数模块，请保存它以便以后使用。\n\
    \n## 第 8 章：异常\n\n无论我们多么熟练或准备多么充分，项目永远不会像我们希望的那样顺利进行。作为一名程序员，你需要为此做好心理准备。\n\n异常是当你的代码出现问题时出现的错误。你将经常需要修复这些错误。一些开发者的全部工作就是修复这些错误。这就是为什么我们将在本章中重点介绍如何修复错误。\n\
    \n## 当事情出错时\n\n较小的简单程序永远不会显示奇怪的行为，因为代码很简单。以我们开始时的 \"Hello World\" 应用程序为例。它非常简单，你知道如果你运行一次，它将始终运行。但是，你编写的代码行数越多，技术越先进，遇到异常和错误的机会就越多。查看你的代码可能具有欺骗性。它可能并不总是按预期工作。\n\
    \n这里有一个例子。如果你的应用程序配置文件设置错误怎么办？或者如果它丢失了怎么办？拥有数千行代码的大型程序在某个时候会包含或更新不再有用的数据。但在某些情况下，代码和数据都很好，但你的应用程序依赖于与\
    \ Web 服务器的连接来收集信息，而该连接已断开。在某些情况下，错误是设计的产物，可以忽略，因为它不影响你的程序需要做的事情。\n\nPython 只有在无法执行正常指令流时才会通知你。因此，你会得到一个异常。现在，你可能想进入你的代码并添加额外的行来处理异常。但这是一个糟糕的策略。Python\
    \ 有一个易于遵循的异常处理方法，其异常处理工具是最有用的。\n\n## 基本异常\n\n为了演示，我们将从基本错误开始，例如除以零。这是你不会犯的错误类型，但它会触发异常，我们有兴趣学习如何处理这些异常。输入以下代码：\n\
    \n```python\n1 / 0\n```\n\n```\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nZeroDivisionError: int division or modulo by zero\n\
    ```\n\n在前面的章节中，我们遇到了一个错误，它给了我们一个类似的报告。让我们看看这个操作。除法总是需要被除数和除数。Python 会进行多次验证以确保满足这些标准。它检查两个参数是否都是数字，以及除数是否不为零。只有在执行这些检查后，才能执行操作。如果操作不符合这些标准，则会生成一个描述错误的异常。在编程中，我们说该操作引发了一个异常。\n\
    \n“引发”这个词是描述性的，因为它指的是层次结构。所以第一个函数调用第二个包含除以零的函数。第二个函数处理异常，因此它向第一个函数引发异常。最终，它无法被完全处理，因此它向你引发异常。异常很容易理解。它产生的报告称为回溯。\n\
    \n在某些编程语言中，异常不是引发的；它们是抛出或捕获的。因此，它被抛给第二个函数，该函数未能捕获它并将其带给第一个函数。但它仍然指的是同一件事。\n\n\
    处理异常的最简单方法之一是在脚本中使用 \"try\" 语句。\"Try\" 查找错误，而 except 块处理它们。以下是此示例：\n\n```python\n\
    print(x)\n```\n\n\"X\" 未定义，这意味着它将导致错误。没有 try 语句，程序将崩溃。现在让我们处理异常：\n\n```python\n\
    try:\n    print(x)\nexcept:\n    print(\"An exception occurred\")\n```\n\n也可以定义多个异常语句来捕获你想要的尽可能多的错误。这是一个例子：\n\
    \n```python\ntry:\n    print(x)\nexcept NameError:\n    print(\"There is no definition\
    \ for variable x\")\nexcept:\n    print(\"Something else went wrong\")\n```\n\n\
    如果你得到一个 NameError 异常，程序将打印第一条消息，其他错误将打印第二条消息。\n\n你还可以使用 \"else\" 关键字来指定如果没有错误时要执行的代码。这是一个例子：\n\
    \n```python\ntry:\n    print(\"Hello World\")\nexcept:\n    print(\"An error occurred\"\
    )\nelse:\n    print(\"Everything is fine\")\n```\n\n## 异常类\n\nPython 有几个异常类，用于告诉程序员代码出了什么问题。它们是主要异常类\
    \ \"BaseException\" 的子类，这意味着每个异常都源自此类。\n\n我们将引发几个异常以了解它们继承了哪些特性。我们将通过使用数组处理异常来做到这一点，这样我们就可以存储它们并检查它们。以下是代码：\n\
    \n```python\nstore = []\n# Create a number of different exceptions and handle\
    \ them\ntry: {}[\"foo\"]\nexcept KeyError as e: store.append(e)\ntry: 1 / 0\n\
    except ZeroDivisionError as e: store.append(e)\ntry: \"\".bar()\nexcept AttributeError\
    \ as e: store.append(e)\n# Loop through the errors and print the class ladder\n\
    for exception_object in store:\n    ec = exception_object.__class__\n    print(ec.__name__)\n\
    \    indent = \" +-\"\n    while ec.__bases__:\n        # Assign ec's superclass\
    \ to itself and increase\n        ec = ec.__bases__[0]\n        print(indent +\
    \ ec.__name__)\n        indent = \" \" + indent\n```\n\n结果应该如下所示：\n\n```\nKeyError\n\
    \ +-LookupError\n  +-Exception\n   +-BaseException\n    +-object\nZeroDivisionError\n\
    \ +-ArithmeticError\n  +-Exception\n   +-BaseException\n    +-object\nAttributeError\n\
    \ +-Exception\n  +-BaseException\n   +-object\n```\n\n我们现在已经检索了每个异常类层次结构。你可以在\
    \ Python 文档库中找到所有这些类以了解更多信息。实际上，你不会在旁边放一个异常列表。你将专注于特定的异常并处理它们，而不是试图捕获每个异常。虽然 Python\
    \ 中的每个类都可以在层次结构中找到，但这也将包括自定义异常。你可以创建也可以从父类继承的异常。我们不会更多地讨论这个，因为它是一个高级主题。\n\n##\
    \ 断言错误\n\n此错误的目的是告诉程序员存在程序无法恢复的错误。它们不显示典型的报告，这允许你以某种方式采取行动。断言就像代码中的自检。它们检查代码是否包含不可能的条件。如果发现它们，程序将崩溃，你将收到一个断言错误。它会告诉你哪个不可能的条件导致了它。\n\
    \n断言错误可以警告你需要修复的错误。要添加断言，你需要使用 \"assert\" 关键字。开发人员将 assert 语句放在函数的开头以检查输入，并在结尾检查输出。当\
    \ Python 检测到 assert 语句时，它会分析表达式。如果表达式返回 true，则可以执行函数；如果返回 false，则你会得到断言错误。\n\n\
    以下是语法示例：\n\n```\nassert Expression [Arguments]\n```\n\n断言错误可以像异常错误一样使用 \"try /\
    \ except\" 语句处理。确保你捕获它们，否则程序将崩溃。"
