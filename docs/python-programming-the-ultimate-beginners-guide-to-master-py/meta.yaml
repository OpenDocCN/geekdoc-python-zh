    \ Solution)\n    - [开始设计](Start Designing)\n    - [改进你的伪代码](Improving Your Pseudo\
    \ Code)\n  - [小结](Summary)\n- **第 3 章：变量与数据类型**\n  - [Python 标识符](Python Identifiers)\n\
    \  - [变量简介](Introduction to Variables)\n  - [Python 与动态类型](Python and Dynamic\
    \ Typing)\n  - [基本文本操作](Basic Text Operations)\n    - [引号](Quotes)\n    - [开发一个文本应用](Developing\
    \ a Text Application)\n  - [数字](Numbers)\n    - [基本操作](Basic Operations)\n   \
    \ - [开发一个数字应用](Developing a Number Application)\n  - [小结](Summary)\n- **第 4 章：Python\
    \ 中的决策制定**\n  - [条件语句](Conditional Statements)\n  - [控制流](Control Flow)\n  - [处理错误](Handling\
    \ Errors)\n  - [添加条件](Adding the Conditionals)\n  - [“While”循环](“While” Loops)\n\
    \  - [“For”循环](“For” Loops)\n  - [小结](Summary)\n- **第 5 章：Python 数据结构**\n  - [序列](Sequences)\n\
    \  - [序列检查](Sequence Check)\n  - [元组](Tuples)\n  - [列表](Lists)\n  - [矩阵](Matrix)\n\
    \  - [字典](Dictionaries)\n  - [创建一个基础游戏](Creating a Basic Game)\n  - [编码练习](Coding\
    \ Exercise)\n  - [小结](Summary)\n- **第 6 章：函数**\n  - [创建函数](Creating Functions)\n\
    \  - [函数定义](Function Definition)\n  - [函数文档](Function Documentation)\n  - [使用参数](Using\
    \ Parameters)\n  - [重用函数](Reusing Functions)\n  - [全局变量](Global Variables)\n \
    \ - [作用域](Scopes)\n  - [处理全局变量](Handling Global Variables)\n  - [读取全局变量](Reading\
    \ Global Variables)\n  - [遮蔽全局变量](Shadowing Global Variables)\n  - [修改全局变量](Changing\
    \ Global Variables)\n  - [编写井字棋游戏](Writing Tic Tac Toe)\n  - [添加函数](Adding Functions)\n\
    \  - [设置与练习](Setup and Exercise)\n  - [小结](Summary)\n- **第 7 章：面向对象编程简介**\n  -\
    \ [类](Classes)\n  - [Python 命名空间](Python Namespaces)\n  - [定义一个类](Defining a Class)\n\
    \  - [定义一个方法](Defining a Method)\n  - [Python 继承](Python Inheritance)\n  - [多态](Polymorphism)\n\
    \  - [创建模块](Creating Modules)\n  - [编写一个模块](Writing a Module)\n  - [小结](Summary)\n\
    - **第 8 章：异常**\n  - [当事情出错时](When Things Go Haywire)\n  - [基本异常](Basic Exceptions)\n\
    \  - [异常类](Exceptions Classes)\n  - [断言错误](Assertion Error)\n  - [小结](Summary)\n\
    - [参考文献](References)\n\n## 引言\n\nPython 是一门强大的语言。它也是最容易学习的语言。Python 在机器学习、深度学习和数据科学等多种技术领域都备受青睐。鉴于\
    \ Python 在众多技术领域中日益普及，现在正是学习这门语言的最佳时机。\n\n我们希望让开始这段旅程变得简单，无论你的技能和知识水平如何。即使你对编程一无所知，也无关紧要。\n\
    \n本书的每一章都建立在前几章的基础上，以易于理解的循序渐进的方式展开。你将学习理论知识，并实践所学内容。编程实践或许是最重要的一步，即使概念本身尚未完全理解。正是在实践的过程中，我们检验并完善我们的理解。实践也是你成为程序员的唯一途径。需要休息时就休息，不要害怕尝试。\n\
    \n## 第 1 章：入门\n\n编程技能需求旺盛，且短期内没有放缓的迹象。无论是网络开发、机器学习还是物联网，编程无处不在。过去，人们在大学学习编程。现在，编程已经在学校里教给孩子们。很快，大多数领域都会期望具备一定的编程知识。与这些变化相伴的是，学习编程正变得免费、易得且简单。整个生态系统都在推动这些变化。\n\
    \n首先，我们将探讨为什么学习 Python 是你能做出的最佳决定之一。然后，我们将探索入门所需的工具并设置你的环境。如果你来自 C、C++ 或 Java\
    \ 等其他编程语言背景，最好跳过本章或快速浏览一下。\n\n### 为什么选择 Python？\n\nPython 由 Guido van Rossum 于\
    \ 1991 年开发，他以自己最喜欢的英国喜剧《蒙提·派森》为该项目命名。时至今日，官方文档中仍有许多蒙提·派森的“彩蛋”。\n\n自那时起，Python\
    \ 因其直观的语法以及创建复杂程序和处理大量数据的能力，一直被用于向人们介绍编程。作为初学者，你将学习如何快速编写一个基础程序，以及如何轻松地将你的项目扩展为更具商业性的应用。\n\
    \nPython 易于阅读。它具有类似人类的英语结构，使其易于理解和记忆。你可以添加到代码中的库和预制函数的数量也在增加，从而节省你的时间。如果你认真学习并付诸实践，你将能够编写出十年后依然易于阅读的程序。作为一名程序员，你将了解程序维护的重要性，以及与其他语言相比，Python\
    \ 在管理上的便捷性。让我们通过一个列表简要探讨学习 Python 的原因。列表易于理解和记忆。\n\n- 1. 用户友好：编程语言允许人与机器之间进行交流。Python\
    \ 是一种高级编程语言，这意味着它比机器语言更接近人类语言。机器本身并不理解 Python。有一个解释器将 Python 代码翻译成机器语言。\n- 2.\
    \ 功能强大：尽管易于学习，Python 的功能却极其强大。它与 C++ 等低级编程语言一样有用。谷歌、微软、IBM、施乐和 NASA 等公司都在使用 Python。你甚至可以使用\
    \ Python 来开发游戏。\n- 3. 面向对象编程：面向对象编程是最有效的编程范式之一。它允许程序员将问题、动作和数据视为代码中表示的真实世界对象。然而，它并不总是最佳选择，这使得\
    \ Python 很有趣，因为它是一种多范式语言。这意味着你可以将其用于面向对象编程、函数式编程等。它很灵活。你可以在使用其他范式技术的同时受益于面向对象编程。\n\
    - 4. 计算机友好：Python 运行不需要大量的处理能力或内存。例如，开发者使用 Python 创建由 5 美元计算机操作的小型机器人。它也可以在任何操作系统上运行。这意味着你可以同时在不同的操作系统上开发你的应用程序，并且它仍然能正常工作。这也意味着你的程序将能够在多个平台上运行。\n\
    - 5. 语言适应性：你可以将 Python 与其他语言结合使用，以利用不同的特性和优势。例如，你可以将其与 C++ 结合，以利用其在后端提供的系统优化和速度。\n\
    - 6. 免费：Python 是免费且开源的。其许可证允许你以适合你目的的方式修改源代码。目前，这对你来说可能不重要，但以后可能会。\n- 7. 社区：网上有一个庞大的\
    \ Python 社区。这是因为 Python 是开源的，应用广泛，且易于学习。所以，你会发现许多致力于学习或教授这门语言的人。如果你遇到困难，你会很容易找到帮助。你还会发现许多与志同道合者合作的机会。\n\
    \n### 安装 Python\n\n在我们开始之前，你需要在你的系统上下载并安装 Python。安装过程非常简单。就像安装系统上的任何其他程序一样。\n\n\
    为此，请访问 [www.python.org](http://www.python.org) 并转到“下载”部分。到达那里后，选择适合你系统的正确安装程序。确保你下载的是最新版本"
