- img_proc: true
  md: "# ZeroDivisionError: int division or modulo by zero\n\nIn an earlier chapter,\
    \ we encountered an error that gave us a report like this one. Let's look at the\
    \ operation. Division always requires a dividend and a divisor. Python goes through\
    \ several verifications to make sure that those standards are met. It checks whether\
    \ both arguments are numbers and whether the divisor is not zero. Only when these\
    \ checks are performed can the operation be performed. If the operation does not\
    \ meet those standards, an exception describing the error is generated. In programming,\
    \ we say the operation raised an exception.\n\nThe word \"raised\" is descriptive\
    \ because it refers to the hierarchical order. So the first function calls the\
    \ second function containing division by zero. The second function deals with\
    \ the exception, so it raised it with the first function. In the end, it can't\
    \ be handled altogether, so it is raised with you. The exception is easy to understand.\
    \ The report it produces is called a traceback.\n\nIn some programming languages,\
    \ exceptions are not raised; they are thrown or caught. So it is thrown to the\
    \ second function, which fails to catch it and brings it to the first function.\
    \ But it still refers to the same thing.\n\nOne of the easiest ways to deal with\
    \ the exception is by using the \"try\" statement in your script. \"Try\" looks\
    \ for errors, and an except block handles them. Below is an example of this:\n\
    \n```\nprint(x)\n```\n\n\"X\" is undefined, meaning it will cause an error. Without\
    \ a try statement, the program will crash. Now let's handle the exception:\n\n\
    ```\ntry:\n    print (x)\nexcept:\n    print (\"An exception occurred\")\n```\n\
    \nIt is also possible to define multiple exception statements to catch as many\
    \ errors as you want. Here's an example:\n\n```\ntry:\n    print (x)\nexcept NameError:\n\
    \    print (\"There is no definition for variable x\")\nexcept:\n    print (\"\
    Something else went wrong\")\n```"
  merge: -1
