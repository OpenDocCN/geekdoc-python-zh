  md: '# Basic Operations


    You have seen how we assign values to variables. We will now perform some basic
    operations like add (+), subtract (-), multiply (*), and divide (/). When you
    perform operations like these, you create an expression. Expressions are code
    that the computer has to work through to get a result. Expressions can be assigned
    to variables. Below is an example:


    ```

    strength = 10 + 2

    dexterity = 10 - 4

    endurance = 6 * 2

    awesomeness = strength + dexterity * endurance

    awesomeness

    84

    ```


    You are probably surprised to find the result isn''t 216. It isn''t, because Python
    understands math, so it knows which calculations have precedence over which. The
    calculation is like this: (10 + 2) + ((10 - 4) * (6 * 2)).


    This example shows how Python evaluates expressions and decides which sections
    go with which. There are many more operations in Python. To fully understand the
    kind of process that occurs when these decisions are made, you need to know Python
    has operator precedence. This tells Python which operator to pay attention to
    first. If you don''t want Python to use its default, you can guide it, like below:


    ```

    awesomeness = (strength + dexterity) * endurance

    ```


    Now the result is 216 because it has to start with the expression in parentheses.


    We have only worked with integers, but the same rules would still apply even if
    we used floats.


    Python also lets you convert numeral types to other numeral types. Here are the
    most common ones:


    +   1. Converting any number to an integer: int (x)

    2. Converting any number to any float: float (x)

    3. Converting any value to a string: str (object)


    Note how our focus is now functions instead of operators. The syntax change makes
    this obvious. We are manipulating values contained in parentheses. Parentheses
    are part of the function. Here are some examples below:'
