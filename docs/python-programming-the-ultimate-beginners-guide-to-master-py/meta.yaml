  mdcn: "可能性在于，无论你有什么想法，很可能已经有人构建过它了。关键不在于想出全新的东西。虽然你可以这样做，但关键在于问自己是否有什么可以改进的地方。这也让你的事情变得简单，因为你不必从头开始构建任何东西。你可以找到已经编写并共享的代码，然后对其进行优化。你可能认为这是作弊，但事实并非如此。我们今天使用的大多数工具都是这样构建的。人们在彼此的技术基础上进行构建，以创造出更美好的东西。\n\
    \n## 问题识别\n\n在编码之前，你需要一个想法。为了快速找到一个想法，想想你经常做的事情。选择一些重复性的、你认为可以通过代码自动化的任务。编程总是非常适合处理平凡的任务。这就是你的第一个问题。下一步是找到一种方法，告诉计算机为你执行这个任务。计算机需要遵循什么指令——用Python编写——来解决这个问题？你还需要获得结果，以表明计算机正在做你希望它做的事情。现在让我们来了解一下基本的开发周期。需要记住的重要一点是，你不必对此过于严格。你可以根据情况调整方法。这些原则不一定是蓝图，所以你可以创造性地运用它们。\n\
    \n如果不考虑结构，开始可能会很困难，边做边添加解决方案和构建可能会导致不愉快的体验。以下是你应该采取的步骤：\n\n1.  **软件的目的：** 写下问题以及你的程序应该做什么来解决这个问题。由于你是编程新手，从简单的东西开始。一个向用户打印消息的程序就足够了。一旦你知道你想做什么，你就必须清楚地思考如何解决这个问题。这是头脑风暴环节。你所有的想法不必完美，但你只需要认为它们可行，这样如果它们不行，你就会知道该做什么。\n\
    2.  **用户类型：** 接下来，你必须问自己你的目标用户是谁。即使你是在做个人项目，你也应该养成这样做的习惯。问问自己谁会觉得这个程序有用。是你的朋友还是家人？普通大众？你预期他们将如何与程序互动？他们有技术知识吗？他们会期待什么？一旦你问自己这些问题，你就会开始对你的程序有一个更清晰的图景。你不仅会知道它应该做什么，还会知道它应该如何做，以及在做的过程中它应该是什么样子。\n\
    3.  **计算机系统：** 然后，你需要预判你的受众的操作系统。他们使用的是Windows、Apple还是Linux电脑？有时你需要考虑他们更可能使用的设备。是Apple平板电脑还是Android手机？你不必太具体。你需要有一个想法，以便在编码时为其做一些准备。\n\
    \n所有这些问题都将指导你的应用程序设计。当你在项目开始时回答它们时，你会让前方的道路变得简单得多。如果由于某些原因你没有所有这些问题的答案，也没关系。其中一些答案会在你开发过程中出现。\n\
    \n## 寻找解决方案\n\n你现在对你想要构建什么、它在哪里工作、它是为谁服务的以及它必须如何工作有了一个基本的概念。看起来你可能不需要再继续思考了，但仍然有工作要做。许多开发者花大量时间设计他们的程序，而不是实际编码。现在你需要问自己，你预期的目标用户的需求是什么。然后理解他们的需求。如果你是为特定的人构建的，这可能涉及你和客户之间的协议。一旦你理解了他们想要什么，你就需要思考一个解决方案。解决方案可能并不明显，它可能是脆弱的，也可能会变得复杂。尽管如此，如果你写下了你的过程，你将更容易调整你的策略并避免其他问题。你也会为自己节省大量时间。构建它只是为了发现你必须重新开始并改变它，因为没有人想要它，这是没有意义的。以下是一些此时需要考虑的事情：\n\
    \n1.  **功能需求：** 这些是你的程序必须做的事情。你的程序的功能需求是系统必须做什么才能给你想要的结果。例如，它可能需要计算并打印一条消息或答案。你在编码时会划掉这些步骤。\n\
    2.  **结果：** 到时候，你需要测试你的程序，看看它是否按预期运行。当你开始时，运行应用程序看看它是否做你想让它做的事情是可以的。随着你的成熟和应用程序变得更加复杂，你需要找到更好的测试方法。测试技能有助于减少错误并确保良好的性能。在某些情况下，你可能会编写一些具有预定答案的测试，看看程序是否提供了你期望的答案。你会在开发阶段这样做，而不是在你完成之后。不得不回头检查你的应用程序的其余部分以找出它为什么不能工作，这是令人生畏的。这很耗时，而且会很考验人。作为初学者，只需运行你的程序并看到它能工作就足够了。\n\
    3.  **维护：** 当你设计一个程序时，你需要考虑它将如何被使用。经常使用的软件需要维护和支持。这意味着你需要为更改、更新和扩展制定计划。但如果你的程序是基于网络的，你需要找到在不关闭它的情况下更新它的方法。为了使维护变得容易，你需要一个易于阅读的程序。你会发现大多数开发者在他们的软件的整个生命周期中都会这样做。软件需要适应变化并改进以保持相关性。\n\
    \n所有这些都要求你的代码清晰且可重用。正是这些简单的事情将使升级和维护变得容易。\n\n以下是我们构建的“Hello World”程序的软件设计文档示例：\n\
    \n| 项目 | 描述 |\n| :--- | :--- |\n| 问题 | 系统需要向用户显示一条消息。 |\n| 用户 | 我 |\n| 操作系统 |\
    \ Windows / Linux |\n| 界面 | 命令行终端 |\n| 功能需求 | 打印一行文本 |\n| 测试 | 执行应用程序运行测试，确保文本显示。\
    \ |\n\n## 开始设计\n\n现在你准备好开始设计应用程序了。你可以通过用伪代码编写程序来做到这一点，之后你可以将其翻译成代码。伪代码使用英语描述程序在每个阶段应该做什么，以提供我们想要的结果。伪代码解释了我们应该编写的每一行代码或代码块，它应该接收的输入，它如何行动，以及它应该输出什么。此外，伪代码允许你进行头脑风暴。例如，你开始设想使应用程序工作所需的数据类型、变量和函数。\n\
    \n伪代码没有特定的规则。你可以用任何你想要的方式编写。只有当你与其他程序员一起工作时，这才会改变，因为你必须使用他们选择的标准。在大多数情况下，伪代码遵循其他语言的语法和规则，但函数和命令是用单词而不是代码编写的。但现在，没有必要谈论这个，因为你还不了解这门语言。你现在需要理解的是结构背后的思想。以下是编写伪代码的方法：\n\
    \n```\n# 开始程序\n# 输入两个值，X 和 Y\n# 将值相加\n# 打印总和\n# 结束程序\n```\n\n所有伪代码都被注释掉，这样当你运行它时，Python会忽略它。如果你不注释掉它，你会得到错误。上面的例子向我们展示了程序的主要设计。它是对程序实现其目标所需的所有代码的描述。当你完成其中的每一项时，程序就会执行。\n\
    \n## 改进你的伪代码\n\n可读性在编写伪代码时仍然是一个重要的因素。Python将空格和制表符解释为分隔符，并且它们的解释方式不同，这会影响应用程序的行为。在你的伪代码中，你可以使用缩进来指示哪些逻辑语句和操作应该组合在一起，但由于你注释掉了伪代码，你的缩进不会影响代码。这意味着你可以使用任何你觉得舒服的类型。我们将在接下来的章节中更详细地讨论这一点。\n\
    \n代码块的第一行总是不带缩进编写。属于它的所有代码都缩进到子部分中。如果你以类似于Python代码的方式编写伪代码，编写所需的代码会更容易。这就是为什么开发者建议以这种方式编写伪代码。目前，以对你有意义的方式编写伪代码。随着你学习语法，你将使用Python代码结构。以下是遵循相同原则的伪代码：\n\
    \n```\n# 执行第一个任务\n    # 输入第一个值\n    # 验证该值是否为文本\n    # 打印该值\n```\n\n这使事情变得清晰，开发者知道将代码放在哪里。为了在代码块和另一个代码块之间创建分隔，你只需要在它们之间放一个空行，并在不缩进的情况下开始下一个块。现在，你可以按照这些原则写出你的设计。\n\
    \n## 总结\n\n在本章中，我们探讨了软件设计周期。我们看到了创建Python程序的过程是如何开始的。我们学习了如何将问题分解为目标和任务。我们还了解了伪代码在开发中的作用以及Python的伪代码原则。本章强调了规划和概述你的应用程序以避免后续问题的重要性。既然你知道了所有这些，你就准备好学习这门语言本身了。"
