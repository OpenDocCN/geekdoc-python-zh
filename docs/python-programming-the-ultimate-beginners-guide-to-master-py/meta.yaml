    \n```\nvariable = value\n```\n\n你通过等号执行初始化和定义赋值。\n一段执行某些操作的代码块称为语句。赋值就是语句。表达式是计算以获取值/结果的代码。下面是一组赋值，最后我们有一个获取总价的表达式。\n\
    \n```\nnumber = 0\nproduct_weight = 2.1\nprice_per_kilogram = 10\nfilename = 'file.txt'\n\
    trace = False\nsentence = \"this is an example\"\ntotal_price = product_weight\
    \ * price_per_kilogram\n```\n\n在编程中，你需要有条理。你应该将每条语句写在一行中。在上面的例子中，我们有一组类似于购物清单的赋值。在编写这样的程序时，你需要可以用来执行各种任务的变量。目前，理解变量有不同的类型，这些类型构成了一个程序。它们就像食谱中的配料。在我们开始探索类型之前，让我们讨论一下\
    \ Python 中的动态类型。\n\n## Python 与动态类型\n\n在 Python 中，变量的数据类型是自动推断的，这意味着你在编写代码时不必指定它。这被称为动态类型。大多数编程语言要求你指定你的变量是数字、列表还是字典。动态类型使我们不必那么冗长。它让我们能更专注于功能。\n\
