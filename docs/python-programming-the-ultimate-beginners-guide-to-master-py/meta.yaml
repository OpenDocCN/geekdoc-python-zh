- md: '## Reading Global Variables


    We’ve looked at local and global variables and talked about scope. It’s time to
    confuse you, but only a little. You can read global variables no matter what scope
    you are in. You can read a variable inside a function while you are in the global
    scope, and vice versa. It’s just like we said about tinted car windows. When you
    are inside a car you can see everything inside, but you can also see what is out
    there. So a function can read global variables.


    The program we wrote earlier illustrates readability. We have defined a function
    called "read_global," which prints values of the global variables. It works without
    any errors, but there''s a catch. You can read these variables, but you cannot
    make any changes to them directly. So if you were to try, like we see below, you
    would get an error:


    ```

    value += 1

    ```


    ## Shadowing Global Variables


    Looking at the example above, you might have wondered what the "shadow" stood
    for. Shadowing is giving a local variable a similar name to a global variable.
    But you cannot edit the global variable still. Any change you make happens to
    the local variable. The local variable is the shadow of the global variable, thus
    "shadowing." Here''s how we assigned a value to the shadow_global function:


    ```

    value = -10

    ```


    The global value hasn''t changed. But an identical local version was created inside
    the functions, and now that version has the value of -10. You can see this in
    action because we have told the program to print the global version.


    But remember, shadowing like this is not always a good idea. Why? They are confusing.
    You probably experienced this as you were trying to figure out which is which
    when you look at the program.


    ## Changing Global Variables


    You can use the global "global" keyword to access global keywords. In our example,
    we used it to change the value to -10. When executing a value, the new value will
    be printed.


    So when should we use global variables? The truth is that you can use them whenever
    you want. But is it wise? Just because you can do something doesn''t mean you
    should. You need to weigh the pros and cons and ask yourself if it is appropriate
    for your project. Global variables are often problematic because they can be confusing.
    Use them when you absolutely have to, when you can''t find a better alternative
    to what you are trying to achieve.


    Alternatively, you can turn global variables into constants, which aren''t difficult
    to track. Say in a tax calculator you''ll have a number of functions, but all
    of them will use .45 as a value. You should place the value inside a global constant
    instead, meaning we no longer need to call the value inside every function. It
    might not seem like much, but it makes a big difference when working on a complex
    project. Having clear variables instead of numbers, that might as well be arbitrary,
    is much more meaningful and easier to work with.


    ## Writing Tic Tac Toe


    Earlier, we said we were going to build a Tic Tac Toe game. We will do that now
    that you know what functions are. Before we start coding, let''s work on a thorough
    plan for our game. Yes, maybe it''s boring, but we have to do it.


    We will use functions in this game, and we will combine them with the skills we''ve
    already learned. The pseudocode won''t be as detailed because we have functions
    that have a way of making things simpler. Here''s the pseudocode below:


    ```

    # Print the game guide

    # Determine who starts

    # Build the game board and display it

    # While there''s no winner or tie

    # If it''s the player''s turn,

    # get his move

    # Update the board and display it

    # Otherwise

    # Get the AI''s move

    # Update the board and display it

    # Swap turns

    # Declare the winner

    ```


    We know what the game is about, and we know we have to think of concrete definitions.
    How will the game board be presented, and how will pieces move? The first thing
    we need is the board. Pieces can be displayed by characters, named x and o. The
    board can be a list since lists are mutable. So we''ll need a list that has 9
    elements because a Tic Tac Toe board has nine spaces. Each element will be a representation
    of the board. Like this:


    ```

    0 | 1 | 2

    3 | 4 | 5

    6 | 7 | 8

    ```


    Remember that indexes start from zero. This is why our elements do, too. So each
    square has a number assigned to it. Moves players make are represented by a number.
    When it comes to Players, humans will use "X," and the computer will use "O."
    Then we need a variable that will tell us whose turn it is.


    ## Adding Functions


    So we got the basics of the design down. We now need to create a plan for the
    list of functions we will need before coding. This will allow us to brainstorm
    and think of the parameters they will need. Here''s that list:


    - 1. game_guide (): Display the rules of the game and the instructions.

    - 2. ask_yes_or_no (question): Ask the player a question that can be answered
    with a yes or a no.

    - 3. ask_number (question, low, high): Ask the player for a number within a range.
    As you can see, we have a question parameter which the user receives, and a number
    will be returned. This number will be within a range from low to high.

    - 4. game_piece (): This function will represent the two pieces on the board.
    One belongs to the human player and the other to the AI.

    - 5. empty_board(): Create a new board.

    - 6. display_board (board): Display the board on the screen.

    - 7. allowed_moves (board): This will return a list of moves that are allowed
    once the board is returned.

    - 8. winner (board): Declaring the winner.

    - 9. player_move (board, player): Retrieves the move from the human player. The
    board and the player''s piece are received, and the move is returned.

    - 10. computer_move (board, computer, player): Calculates the AI''s move, the
    board, and the two pieces. Returns the AI''s move.

    - 11. next_turn (turn): Swap turns.

    - 12. announce_winner (winner, computer, player): Declares the winner, as well
    as a tie.


    ## Setup and Exercise


    We''ll need to first define the global constants. Because their values don''t
    change, you can declare them right at the beginning. This will make it easy for
    you when you write your functions because they are all in one place. Here''s some
    code to get you started:


    ```

    # global constants

    X = "X"

    O = "O"

    EMPTY = " "

    TIE = "TIE"

    NUM_POSITIONS = 9

    ```


    X and O represent pieces that the player and the computer will use. The "EMPTY"
    constant points to empty spaces on the board. Its value is an empty space, because
    they need to look empty when the game starts. The "TIE" constant represents a
    situation where a win for either human or computer is impossible. The "NUM_POSITIONS"
    represent squares on the board.


    This is all you need to build a tic tac toe game. Using everything you learned,
    you will be able to tackle this project. You have a detailed plan to carry through
    it, you know what functions are needed and how they should work, and we have set
    up global constants for you. Good luck!


    ## Summary


    In this chapter, we''ve learned about functions and how to write them. We also
    learned about scopes and the differences between global variables and local variables.
    We saw the importance of documenting functions and using as few global constants
    as possible. We topped it off by building a game of tic tac toe, showcasing a
    component development approach.


    # CHAPTER 7: INTRODUCTION TO OBJECT-ORIENTED PROGRAMMING


    Python is considered an object-oriented programming language. What does that mean?
    OOP, for short, is a new programming paradigm that has become the standard in
    software and game development. Most of the programs we use today use OOP. OOP
    is defined as the object. In this chapter, we will learn about the concepts that
    make up OOP. We''ll explore:


    - 1. Defining objects and creating classes.

    - 2. Writing methods and declaring an object’s attributes.

    - 3. Polymorphism.

    - 4. Creating modules.


    ## Classes


    Classes are the foundation of OOP. Essentially, a class is a template for building
    your own data type. To have a simpler time digesting this, don''t think of data
    types like numbers or text. Think of something like a car, which can be a data
    type with attributes like brand model, color, and so on.


    Classes allow you to make objects that you can use in projects. They are one of
    the most fundamental concepts in programming. It is often the last step in most
    programming courses. The content in the data represent attributes, and statements/commands
    are methods.


    It might be overwhelming to wrap your head around. But OOP makes long, difficult
    programs easier because it decreases the work you have to do. It allows you to
    reuse almost all of your code. Objects can inherit attributes and methods from
    other classes, making it easier to modify and create new objects. So we can have
    a generic object and build an entire family emanating from it. In the end, we
    would have something like a family tree.


    Say you have Flora, Fauna, and Minerals as foundational classes. They will have
    attributes that will be passed to any object belonging to them. Classes allow
    you to create a subclass. For instance, the Fauna parent class has Bird and Fish
    as subclasses. Bird and Fish will inherit some attributes from the Fauna class,
    which makes it distinct from other classes.'
