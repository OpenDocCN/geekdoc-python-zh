    # Introduction to Variables


    Defining, declaring, or introducing a variable is done in two stages. You will
    find this is true in most programming languages. The first stage is an initialization,
    where a container is created with the appropriate identifier. The second stage
    is an assignment where a value is placed in the container. Both are performed
    in one operation. Here''s an example of it below.


    ```

    variable = value

    ```


    You perform the initialization and define assignment through the equals sign.

    A block of code that does something is called a statement. The assignment is the
    statement. Expressions are code that evaluates to obtain a value/result. Below
    is a list of assignments, and at the end, we have an expression that gets the
    total price.


    ```

    number = 0

    product_weight = 2.1

    price_per_kilogram = 10

    filename = ''file.txt''

    trace = False

    sentence = "this is an example"

    total_price = product_weight * price_per_kilogram

    ```


    In programming, you need to be orderly. You should write every statement in a
    line. In the example above, we have a list of assignments similar to a grocery
    list. When writing a program like this, you need variables that you can use to
    perform various tasks. For now, understand that variables come in different types,
    and these types make up a program. They serve as ingredients to a recipe. Before
    we start exploring the types, let''s discuss dynamic typing in Python.


    # Python and Dynamic Typing


    In Python, the data type of a variable is automatically inferred, which means
    you don''t have to specify it when you write code. This is called dynamic typing.
    Most programming languages want you to specify whether your variable is a number,
    list, or dictionary. Dynamic typing allows us to be less verbose. It allows us
    to focus more on functionality.

    The disadvantage of this is that Python will not warn you when you make certain'
