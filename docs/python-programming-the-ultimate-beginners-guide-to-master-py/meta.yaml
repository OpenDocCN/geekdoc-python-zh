    \ but not limited to, errors, omissions, or inaccuracies.\n\n## TABLE OF CONTENTS\n\
    \n- [Introduction](Introduction)\n- **Chapter 1: Getting Started**\n  - [Why Python?](Why\
    \ Python?)\n  - [Installing Python](Installing Python)\n    - [Using a Text Editor](Using\
    \ a Text Editor)\n    - [Using an IDE](Using an IDE)\n    - [Your First Program](Your\
    \ First Program)\n    - [Code Comments and Your Program](Code Comments and Your\
    \ Program)\n  - [Summary](Summary)\n- **Chapter 2: Software Design Cycle**\n \
    \ - [Solving Problems](Solving Problems)\n    - [Problem Identification](Problem\
    \ Identification)\n    - [Finding the Solution](Finding the Solution)\n    - [Start\
    \ Designing](Start Designing)\n    - [Improving Your Pseudo Code](Improving Your\
    \ Pseudo Code)\n  - [Summary](Summary)\n- **Chapter 3: Variables and Data Types**\n\
    \  - [Python Identifiers](Python Identifiers)\n  - [Introduction to Variables](Introduction\
    \ to Variables)\n  - [Python and Dynamic Typing](Python and Dynamic Typing)\n\
    \  - [Basic Text Operations](Basic Text Operations)\n    - [Quotes](Quotes)\n\
    \    - [Developing a Text Application](Developing a Text Application)\n  - [Numbers](Numbers)\n\
    \    - [Basic Operations](Basic Operations)\n    - [Developing a Number Application](Developing\
    \ a Number Application)\n  - [Summary](Summary)\n- **Chapter 4: Decision Making\
    \ in Python**\n  - [Conditional Statements](Conditional Statements)\n  - [Control\
    \ Flow](Control Flow)\n  - [Handling Errors](Handling Errors)\n  - [Adding the\
    \ Conditionals](Adding the Conditionals)\n  - [“While” Loops](“While” Loops)\n\
    \  - [“For” Loops](“For” Loops)\n  - [Summary](Summary)\n- **Chapter 5: Python\
    \ Data Structures**\n  - [Sequences](Sequences)\n  - [Sequence Check](Sequence\
    \ Check)\n  - [Tuples](Tuples)\n  - [Lists](Lists)\n  - [Matrix](Matrix)\n  -\
    \ [Dictionaries](Dictionaries)\n  - [Creating a Basic Game](Creating a Basic Game)\n\
    \  - [Coding Exercise](Coding Exercise)\n  - [Summary](Summary)\n- **Chapter 6:\
    \ Functions**\n  - [Creating Functions](Creating Functions)\n  - [Function Definition](Function\
    \ Definition)\n  - [Function Documentation](Function Documentation)\n  - [Using\
    \ Parameters](Using Parameters)\n  - [Reusing Functions](Reusing Functions)\n\
    \  - [Global Variables](Global Variables)\n  - [Scopes](Scopes)\n  - [Handling\
    \ Global Variables](Handling Global Variables)\n  - [Reading Global Variables](Reading\
    \ Global Variables)\n  - [Shadowing Global Variables](Shadowing Global Variables)\n\
    \  - [Changing Global Variables](Changing Global Variables)\n  - [Writing Tic\
    \ Tac Toe](Writing Tic Tac Toe)\n  - [Adding Functions](Adding Functions)\n  -\
    \ [Setup and Exercise](Setup and Exercise)\n  - [Summary](Summary)\n- **Chapter\
    \ 7: Introduction to Object-Oriented Programming**\n  - [Classes](Classes)\n \
    \ - [Python Namespaces](Python Namespaces)\n  - [Defining a Class](Defining a\
    \ Class)\n  - [Defining a Method](Defining a Method)\n  - [Python Inheritance](Python\
    \ Inheritance)\n  - [Polymorphism](Polymorphism)\n  - [Creating Modules](Creating\
    \ Modules)\n  - [Writing a Module](Writing a Module)\n  - [Summary](Summary)\n\
    - **Chapter 8: Exceptions**\n  - [When Things Go Haywire](When Things Go Haywire)\n\
    \  - [Basic Exceptions](Basic Exceptions)\n  - [Exceptions Classes](Exceptions\
    \ Classes)\n  - [Assertion Error](Assertion Error)\n  - [Summary](Summary)\n-\
    \ [References](References)\n\n## INTRODUCTION\n\nPython is a powerful language.\
    \ It is also the easiest language to learn. Python has found preference in a variety\
    \ of technology fields like Machine Learning, Deep Learning, and Data Science.\
    \ With the rate at which Python is finding preference among many technological\
    \ fields, it’s the best time to learn the language.\n\nWe want to make it easy\
    \ to start that journey, no matter what your skills and knowledge are. It does\
    \ not matter if you know nothing about programming as a whole.\n\nEach chapter\
    \ of this book builds on the previous chapters in an easy to understand step-by-step\
    \ process. You will learn theory and also practice what you learn. Programming\
    \ practice is perhaps the most important step, even when the concepts themselves\
    \ haven’t quite made sense. It is in the act of doing that we test our concepts\
    \ and refine them. Practice is also the only way you become a programmer. Take\
    \ breaks when you need to and don’t be afraid to experiment.\n\n## CHAPTER 1:\
    \ GETTING STARTED\n\nProgramming skills are in demand, and there are no signs\
    \ of this slowing down any time soon. Whether it is web development, Machine Learning,\
    \ or the Internet of Things, programming is everywhere. It used to be that people\
    \ learned to program in college. Now, programming is taught to children in school.\
    \ Soon, most fields will expect some programming knowledge. Coupled with these\
    \ changes is the fact that learning programming is becoming freely available,\
    \ accessible, and easy. There are entire ecosystems that are driving these changes.\n\
    \nFirst, we will explore why learning Python is one of the best decisions you\
    \ could make. We will then explore the tools you need to get started and set up\
    \ your environment. If you come from another programming language like C, C++,\
    \ or Java, it might be best to skip this chapter or skim through it.\n\n### Why\
    \ Python?\n\nPython was developed in 1991 by Guido van Rossum, who named the project\
    \ after his favorite British comedy Monty Python. To this day, there are several\
    \ Monty Python \"Easter Eggs\" within the official documentation.\n\nSince then,\
    \ Python has been used to introduce people to programming because of its intuitive\
    \ syntax and its ability to create complex programs and process large amounts\
    \ of data. As a beginner, you will learn how quickly you can write a basic program\
    \ and how easily you can scale your project into something more commercial.\n\n\
    Python is easy to read. It has a human-like English structure that makes it easy\
    \ to understand and recall. The number of libraries and premade functions that\
    \ you can add to your code, saving you time, has also increased. If you study\
    \ and do your work, you will be equipped to write a program that will be easy\
    \ to read ten years from now. As a programmer, you will know how important program\
    \ maintenance is and how easy Python is to administrate compared to other languages.\
    \ Let's briefly explore reasons to learn Python with a list. Lists are easy to\
    \ digest and remember.\n\n- 1. User-friendly: Programming languages allow communication\
    \ between humans and machines. Python is a high-level programming language, which\
    \ means it is closer to human language than machine language. Machines do not\
    \ understand Python on their own. There is an interpreter that translates Python\
    \ code into machine language.\n- 2. Powerful: Despite how easy it is to learn,\
    \ Python is immensely powerful. It is just as useful as languages like C++, which\
    \ are low-level programming languages. Places like Google, Microsoft, IBM, Xerox,\
    \ and NASA use Python. You can even use Python to develop games.\n- 3. OOP: Object\
    \ orientated programming is one the most effective programming paradigms. It allows\
    \ programmers to treat problems, actions, and data like real-world objects represented\
    \ in code. It is not always best to use it, though, which makes Python interesting\
    \ because it is a multi-paradigm language. This means you can use it for object-orientated\
    \ programming, functional programming, and others. It's flexible. You can benefit\
    \ from OOP while using techniques belonging to other paradigms.\n- 4. Computer-friendly:\
    \ Python doesn't require a lot of processing power or RAM to run. For instance,\
    \ developers use Python to create little robots that are operated by $5 computers.\
    \ It can also run on any operating system. It means you can develop your application\
    \ on different operating systems simultaneously, and it will still work the same.\
    \ It also means your programs will be able to run on multiple platforms.\n- 5.\
    \ Language adaptability: You can combine Python with other languages to take advantage\
    \ of the different features and advantages. For instance, you can combine it with\
    \ C++ to take advantage of the system optimizations and speed it offers in the\
    \ backend.\n- 6. It's free: Python is free and open-source. The license allows\
    \ you to make changes to the source code in a way that fits your purposes. At\
    \ this point, this might not be important to you, but it might be later on.\n\
    - 7. Community: There is a huge Python community online. This is because Python\
    \ is open source, has broad applicability, and is easy to learn. So, you will\
    \ find many people dedicated to learning or teaching the language. And if you\
    \ get stuck, you will find help easily. You will find plenty of collaboration\
    \ opportunities with other people on the same path as you as well.\n\n### Installing\
    \ Python\n\nBefore we get started, you will need to download and install Python\
    \ on your system. The installation procedure is very easy. It is just like the\
    \ installation of any other program on your system.\n\nTo do so, go to [www.python.org](http://www.python.org)\
    \ and go to the \"Downloads\" section. Once you get there, pick the right installer\
    \ for your system. Make sure you are downloading the latest"
