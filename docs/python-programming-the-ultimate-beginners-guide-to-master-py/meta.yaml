  - '[PAGE 65]


    and get you a vegan sandwich and grapes. That is polymorphic: you have one goal
    that different objects can accomplish in different ways. Keep this in mind when
    we talk about the same thing but in programming speak.


    Polymorphism is important for two reasons. It allows an object, depending on its
    parameters, to perform diverse implementations of a method. Secondly, code for
    one data type can be used for another related data type. Understanding this is
    important for mastering Python.


    Another feature of polymorphism that is similar to the real world is that it gives
    a language the ability to pass through the class hierarchy. This means its performance
    is something it''s used to because it learned it in the past.


    Here''s an analogy for you: it''s like reading this book. You know how to read
    it because you learned how to read books when you were young. In object-oriented
    programming terms, you are an object that can interact with a book, turn the page,
    and transform letters into words with meaning. But if you can read this book,
    it means you can read other things as well, like a web page. They both contain
    words but no flipping of pages. But you can also use this to do other things,
    like read street signs and text messages. All of these things are possible because
    you learned to read books. Reading books is the base object.


    In programming, this is what polymorphism means. Code written for a specific type
    can perform actions on a related data type.


    # Creating Modules


    Now, you have some experience using Python modules and importing. In Python, you
    can write your own modules.


    Writing modules is another case of reusing and repurposing code. Say you worked
    on a card game, and during that time, you made classes like cards and deck. When
    creating another card game, you may need those classes even when the game is different
    - classes like cards and decks.


    Modules also provide program management. When programs grow, it can be hard to
    keep track of all parts. Modules allow you to break them up into small pieces
    you can easily manage. Say you''re working on a commercial project, meaning you
    have thousands of lines of code. You can use modules to separate them into manageable
    packages. This means certain programs can work on certain parts while others are
    working on others. They wouldn''t get confused about who is working on what because
    the program is nicely divided.


    You can also share modules with friends and other programmers. You can upload
    them'
- md: "## Writing a Module\n\nWe will make a module to use in a simple game. Writing\
    \ modules is done the same way as writing any other program, but you plan it.\
    \ You need to consider the functions and classes you will need. Then you place\
    \ them in a file that can be imported to other projects.\n\nLet's make a module\
    \ called \"game.\" We will create a class and two functions that perform common\
    \ tasks in games. Below is the code.\n\n```python\n# game\n# Example of writing\
    \ a custom module\nclass Player(object):\n    \"\"\" A basic player. \"\"\"\n\
    \    def __init__(self, name, score = 0):\n        self.name = name\n        self.score\
    \ = score\n    def __str__(self):\n        rep = self.name + \":\\t\" + str(self.score)\n\
    \        return rep\ndef ask_yes_or_no(question):\n    \"\"\"Ask a yes or no question.\"\
    \"\"\n    response = None\n    while response not in (\"y\", \"n\"):\n       \
    \ response = input(question).lower()\n    return response\ndef ask_number(question,\
    \ low, high):\n    \"\"\"Ask for a number within a range.\"\"\"\n    response\
    \ = None\n    while response not in range(low, high):\n        response = int(input(question))\n\
    \    return response\nif __name__ == \"__main__\":\n    print(\"This module was\
    \ executed directly without importing.\")\n    input(\"\\n\\nPress the enter key\
    \ to quit.\")\n```\n\nThe module will be called \"games\" because modules take\
    \ the name of their file. The code is easy to read since we have already used\
    \ some of the functions in our examples. There is the \"player\" class that defines\
    \ an object. The object has two attributes set in a constructor. We also have\
    \ an \"if\" statement that verifies if the program is executed directly. If the\
    \ check is true, the application runs directly, and if it is false, it will be\
    \ an imported module.\n\n## Summary\n\nIn this chapter, we have learned about\
    \ Python's object-oriented programming. We aimed to introduce you to OOP. OOP\
    \ is an academic topic, so if you don't quite get it, don't be frustrated.\n\n\
    We have learned about classes, polymorphism, and inheritance. We also learned\
    \ about modules and making your own. Making your code reusable is one of the most\
    \ important things a programmer should do. So if you wrote a good function module,\
    \ save it so you can use it later.\n\n## CHAPTER 8: EXCEPTIONS\n\nNo matter how\
    \ skilled we are or how much we prepare, projects never go as smoothly as we would\
    \ want. As a programmer, you need to mentally prepare for this.\n\nExceptions\
    \ are errors that show up when there is a problem with your code. You will often\
    \ have to fix these errors. Some developers' entire job is fixing these errors.\
    \ That is why we will focus on how to fix errors in this chapter.\n\n## When Things\
    \ Go Haywire\n\nSmaller, simple programs never display strange behavior because\
    \ the code is simple. Take the \"Hello World\" application we started with. It's\
    \ so easy that you know if you run it once, it will always run. But the more lines\
    \ of code you write and more advanced your techniques, the more your chances of\
    \ encountering exceptions and errors increase. Looking at your code can be deceiving.\
    \ It might not always work as intended.\n\nHere's an example. What if your application's\
    \ configuration file has the wrong settings? Or what happens if it is missing?\
    \ Big programs with thousands of lines will at some point contain or update data\
    \ that is no longer useful. But in some instances, the code and the data are fine,\
    \ but your application depends on connections to the web server to collect information,\
    \ but that connection is dead. In some cases, the error is an artifact of the\
    \ design, and can be ignored because it doesn't affect what your program needs\
    \ to do.\n\nPython only notifies you when it is prevented from performing the\
    \ normal flow of instructions. So, you get an exception. Now, you might want to\
    \ go into your code and add additional lines to handle the exception. But this\
    \ is a bad strategy. Python has an exception handling methodology that is easy\
    \ to follow, and its exception handling tools are the most useful.\n\n## Basic\
    \ Exceptions\n\nTo demonstrate, we will start with basic errors, like dividing\
    \ by zero. It's the type of error you wouldn't make, but it will trigger an exception,\
    \ and we are interested in learning how to handle those. Type the following code:\n\
    \n```python\n1 / 0\n```\n\n```\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nZeroDivisionError: int division or modulo by zero\n\
    ```\n\nIn an earlier chapter, we encountered an error that gave us a report like\
    \ this one. Let's look at the operation. Division always requires a dividend and\
    \ a divisor. Python goes through several verifications to make sure that those\
    \ standards are met. It checks whether both arguments are numbers and whether\
    \ the divisor is not zero. Only when these checks are performed can the operation\
    \ be performed. If the operation does not meet those standards, an exception describing\
    \ the error is generated. In programming, we say the operation raised an exception.\n\
    \nThe word \"raised\" is descriptive because it refers to the hierarchical order.\
    \ So the first function calls the second function containing division by zero.\
    \ The second function deals with the exception, so it raised it with the first\
    \ function. In the end, it can't be handled altogether, so it is raised with you.\
    \ The exception is easy to understand. The report it produces is called a traceback.\n\
    \nIn some programming languages, exceptions are not raised; they are thrown or\
    \ caught. So it is thrown to the second function, which fails to catch it and\
    \ brings it to the first function. But it still refers to the same thing.\n\n\
    One of the easiest ways to deal with the exception is by using the \"try\" statement\
    \ in your script. \"Try\" looks for errors, and an except block handles them.\
    \ Below is an example of this:\n\n```python\nprint(x)\n```\n\n\"X\" is undefined,\
    \ meaning it will cause an error. Without a try statement, the program will crash.\
    \ Now let's handle the exception:\n\n```python\ntry:\n    print(x)\nexcept:\n\
    \    print(\"An exception occurred\")\n```\n\nIt is also possible to define multiple\
    \ exception statements to catch as many errors as you want. Here's an example:\n\
    \n```python\ntry:\n    print(x)\nexcept NameError:\n    print(\"There is no definition\
    \ for variable x\")\nexcept:\n    print(\"Something else went wrong\")\n```\n\n\
    If you get a NameError exception, the program prints the first message, and other\
    \ errors will print the second message.\n\nYou can also use the \"else\" keyword\
    \ to specify the code you want executed if there aren't errors. Here is an example:\n\
    \n```python\ntry:\n    print(\"Hello World\")\nexcept:\n    print(\"An error occurred\"\
    )\nelse:\n    print(\"Everything is fine\")\n```\n\n## Exceptions Classes\n\n\
    Python has several exception classes that tell programmers what went wrong with\
    \ the code. They are subclasses of the main exception class \"BaseException,\"\
    \ meaning every exception emanates from this class.\n\nWe are going to raise several\
    \ exceptions to find out what features they inherit. We will do this by handling\
    \ exceptions with an array, so we can store them and inspect them. Here's the\
    \ code below:\n\n```python\nstore = []\n# Create a number of different exceptions\
    \ and handle them\ntry: {}[\"foo\"]\nexcept KeyError as e: store.append(e)\ntry:\
    \ 1 / 0\nexcept ZeroDivisionError as e: store.append(e)\ntry: \"\".bar()\nexcept\
    \ AttributeError as e: store.append(e)\n# Loop through the errors and print the\
    \ class ladder\nfor exception_object in store:\n    ec = exception_object.__class__\n\
    \    print(ec.__name__)\n    indent = \" +-\"\n    while ec.__bases__:\n     \
    \   # Assign ec's superclass to itself and increase\n        ec = ec.__bases__[0]\n\
    \        print(indent + ec.__name__)\n        indent = \" \" + indent\n```\n\n\
    The result should look something like this:\n\n```\nKeyError\n +-LookupError\n\
    \  +-Exception\n   +-BaseException\n    +-object\nZeroDivisionError\n +-ArithmeticError\n\
    \  +-Exception\n   +-BaseException\n    +-object\nAttributeError\n +-Exception\n\
    \  +-BaseException\n   +-object\n```\n\nWe have now retrieved every exception\
    \ class hierarchy. You can find them all in the Python document library to learn\
    \ more about them. In reality, you won't work with a list of exceptions next to\
    \ you. You will focus on specific ones and handle them rather than try to catch\
    \ every exception. While each class in Python can be found in the hierarchy, this\
    \ will also include custom exceptions. You can create exceptions that can also\
    \ inherit from the parent classes. We won't talk about this more as it is an advanced\
    \ topic.\n\n## Assertion Error\n\nThe purpose of this error is to tell the programmer\
    \ there is an error the program can't recover. They don't show typical reports,\
    \ which allows you to act in some way. Assertions are like a self-check in the\
    \ code. They check if the code contains impossible conditions. If they are found,\
    \ the program crashes, and you will receive an assertion error. It will tell you\
    \ which impossible condition caused it.\n\nAssertion errors can warn you of bugs\
    \ that need fixing. To add an assertion, you need to use the \"assert\" keyword.\
    \ Developers place the assert statement at the beginning of the function to check\
    \ input and end to check the output. When Python detects an assert statement,\
    \ it analyzes the expression. If the expression returns true, the function can\
    \ be performed; if false, you get the assertion error.\n\nHere's an example of\
    \ the syntax:\n\n```\nassert Expression [Arguments]\n```\n\nAssertion errors can\
    \ be handled exactly like exceptions errors with \"try / except\" statements.\
    \ Ensure you catch them, or the program will just crash."
