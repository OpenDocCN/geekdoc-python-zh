- img_proc: true
  md: "On top of that, Bird and Fish will also have their own attributes, which make\
    \ them different. You can create another subclass, say a Chicken or Raven subclass,\
    \ that inherits attributes from the Bird Class. Suppose we have to create an instance\
    \ of the Raven class that we give the name Charlie. Charlie will inherit all the\
    \ attributes that Raven has, like the \"caw()\" method. So when we write \"charlie.caw(),\"\
    \ we would get the string \"Caw! Caw!\" as the output.\n\nObjects, classes, and\
    \ methods resemble the ways we think about the world. That is why developers favor\
    \ object orientated programming. It allows them to think straightforwardly.\n\n\
    # Python Namespaces\n\nWe need to learn how to define classes before we take a\
    \ closer look at them. This is why we have to look at namespaces first, so we\
    \ understand object-oriented programming a little deeper.\n\nNamespaces map names\
    \ to an object. By default, namespaces are Python dictionaries. An example of\
    \ a namespace is a collection of default names containing functions like \"abs.\"\
    \ The namespace contains module names or local function calls. A class's attributes\
    \ form its own namespace. Identical names belonging to several namespaces will\
    \ not affect each other in any way. Let's look at modules to better appreciate\
    \ this. Two modules that define the same function with the same name can exist,\
    \ but they won't confuse Python. Python sees them as unique and independent.\n\
    \nAs soon as you run the interpreter, Python creates namespaces, but some are\
    \ active at different times, including the last moments. For example, Python's\
    \ built-in namespaces won't ever be deleted. An interpreter reads a module, a\
    \ global namespace is attached to it, but when the interpreter closes, it disappears.\n\
    \nWhile specific namespaces are pre-defined, we can't access them from anywhere.\
    \ This is because of scope. In this instance, scope refers to the section of the\
    \ application we can't access directly. The last time we talked about scope, we\
    \ had two scopes: globals and local. In this instance, we have three of them.\
    \ The first scope is of the function that has a local namespace. The second is\
    \ the module creating a global namespace. The third is the general scope that\
    \ contains all pre-built namespaces.\n\n# Defining a Class\n\nLet’s look at class\
    \ syntax. Below is an example:\n\n```\nclass Raven:\n    <myStatement1>\n    <myStatement2>\n\
    ```"
