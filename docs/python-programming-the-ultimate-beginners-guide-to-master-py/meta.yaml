  md: "important operations during object creation.\n\n# Python Inheritance\n\nInheritance\
    \ is an important programming concept. It happens when classes inherit the functionality\
    \ of the parent class. The subclass is called the child class, and the parent\
    \ class is called the main class. Let's look at the syntax:\n\n```\nclass MainClass:\n\
    \    #add functions and statements\nclass ChildClass (MainClass):\n    #add functions\
    \ and statements\n```\n\nInheritance allows you to add or modify features in the\
    \ subclass.\nThere are several kinds of inheritance in Python:\n\n+   1. Single\
    \ inheritance: This is what we have done so far. It happens when there is one\
    \ child class inheriting from a parent class.\n2. Multiple inheritance: Multiple\
    \ inheritance is when you create a child class that can inherit features from\
    \ more than one parent class. The syntax does not change that much; parents are\
    \ separated with commas.\n3. Multilevel inheritance: It's when a child class has\
    \ another class under it that inherits its class features. It is also referred\
    \ to as the grandchild class because the child class becomes the parent of the\
    \ second class and parent class because of the grandparent of the second child\
    \ class.\n4. Hierarchical inheritance: When a parent class creates multiple subclasses,\
    \ we have hierarchical inheritance.\n5. Hybrid inheritance: When types of inheritance\
    \ are combined, we say we have hybrid inheritance.\n\n# Polymorphism\n\nPolymorphism\
    \ means having many forms. In programming, it refers to a language's ability to\
    \ process objects by their class or data type. An object can redefine the method\
    \ that is inherited and adapt code for the data type it will process.\nPolymorphism\
    \ is a somewhat advanced topic. So if you don't quite get it yet, it's okay, but\
    \ let's go through an analogy to explain. Imagine you gave cash to a friend to\
    \ buy you something for lunch. If you told an 11-year-old kid to do the same thing\
    \ for you, they'd get on a bike and get you hamburgers and fries. But your friend\
    \ might get into their car"
