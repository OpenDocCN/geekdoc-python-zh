    You have the knowledge you need to do all of this. Before you follow the example
    below, try developing your own program. Here’s our example:


    ```

    """

    myFile.py

    Problem: Generate information on roleplaying characters

    Target audience: Personal / Friends and family

    System: Windows / Linux

