  md: 'and get you a vegan sandwich and grapes. That is polymorphic: you have one
    goal that different objects can accomplish in different ways. Keep this in mind
    when we talk about the same thing but in programming speak.


    Polymorphism is important for two reasons. It allows an object, depending on its
    parameters, to perform diverse implementations of a method. Secondly, code for
    one data type can be used for another related data type. Understanding this is
    important for mastering Python.


    Another feature of polymorphism that is similar to the real world is that it gives
    a language the ability to pass through the class hierarchy. This means its performance
    is something it''s used to because it learned it in the past.


    Here''s an analogy for you: it''s like reading this book. You know how to read
    it because you learned how to read books when you were young. In object-oriented
    programming terms, you are an object that can interact with a book, turn the page,
    and transform letters into words with meaning. But if you can read this book,
    it means you can read other things as well, like a web page. They both contain
    words but no flipping of pages. But you can also use this to do other things,
    like read street signs and text messages. All of these things are possible because
    you learned to read books. Reading books is the base object.


    In programming, this is what polymorphism means. Code written for a specific type
    can perform actions on a related data type.


    # Creating Modules


    Now, you have some experience using Python modules and importing. In Python, you
    can write your own modules.


    Writing modules is another case of reusing and repurposing code. Say you worked
    on a card game, and during that time, you made classes like cards and deck. When
    creating another card game, you may need those classes even when the game is different
    - classes like cards and decks.


    Modules also provide program management. When programs grow, it can be hard to
    keep track of all parts. Modules allow you to break them up into small pieces
    you can easily manage. Say you''re working on a commercial project, meaning you
    have thousands of lines of code. You can use modules to separate them into manageable
    packages. This means certain programs can work on certain parts while others are
    working on others. They wouldn''t get confused about who is working on what because
    the program is nicely divided.


    You can also share modules with friends and other programmers. You can upload
    them'
