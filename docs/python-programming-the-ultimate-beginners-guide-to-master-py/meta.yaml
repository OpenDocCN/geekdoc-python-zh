    \ and reusable. It is the simple things which will make upgrades and maintenance\
    \ easy to do.\n\nBelow is an example of a software design document of the “Hello\
    \ World” program we built:\n\n| Item | Description |\n| :--- | :--- |\n| Problem\
    \ | The system needs to display a message to the user. |\n| User | Me |\n| Operating\
    \ System | Windows / Linux |\n| Interface | Command line terminal |\n| Functional\
    \ requirements | Print a line of text |\n| Testing | Perform application run test,\
    \ making sure text is displayed. |\n\n## Start Designing\n\nNow you are ready\
    \ to start designing the application. You do so by writing the program in pseudocode,\
    \ which you can later translate into code. Pseudocode uses English to describe\
    \ what a program should do at each stage to deliver the results we want. Pseudocode\
    \ explains every line of code or block of code that we should write, the inputs\
    \ it should receive, how it acts, and what it should output. Also, pseudocode\
    \ allows you to brainstorm. For instance, you start envisioning the data types,\
    \ variables, and functions you will need to make the applications work.\n\nThere\
    \ are no specific rules to pseudocode. You can write it any way you want. This\
    \ only changes when you work with other programmers because you will have to use\
