    # Creating Functions


    We''ve already worked with in-built Python functions or methods. But they aren''t
    enough. So, we have to build our own functions. Don''t worry; all functions are
    built the same way, even the in-built ones.


    Functions come with a lot of advantages:


    +   1. Like we have said, you can divide your code, so updating and maintaining
    your code becomes easier in the long run. You won''t have to go through the rest
    of your project whenever you make a change.

    2. Functions eliminate code redundancy. You won''t have to write or use the same
    code a lot of times. The rule is if you have to write a piece of code more than
    twice, turn it into a function. This will make your job simpler, and your code
    will be a lot more readable. All you will need to do, whenever you need the same
    code or task performed, is to call the function.

    3. In a team, they allow you to split a program into manageable sections that
    can be developed independently. This means the work will be done much faster.
    In the end, all the code is connected.


