  md: "# CHAPTER 8:\nEXCEPTIONS\n\nNo matter how skilled we are or how much we prepare,\
    \ projects never go as smoothly as we would want. As a programmer, you need to\
    \ mentally prepare for this.\nExceptions are errors that show up when there is\
    \ a problem with your code. You will often have to fix these errors. Some developers'\
    \ entire job is fixing these errors. That is why we will focus on how to fix errors\
    \ in this chapter.\n\n# When Things Go Haywire\n\nSmaller, simple programs never\
    \ display strange behavior because the code is simple. Take the \"Hello World\"\
    \ application we started with. It's so easy that you know if you run it once,\
    \ it will always run. But the more lines of code you write and more advanced your\
    \ techniques, the more your chances of encountering exceptions and errors increase.\
    \ Looking at your code can be deceiving. It might not always work as intended.\n\
    Here's an example. What if your application's configuration file has the wrong\
    \ settings? Or what happens if it is missing? Big programs with thousands of lines\
    \ will at some point contain or update data that is no longer useful. But in some\
    \ instances, the code and the data are fine, but your application depends on connections\
    \ to the web server to collect information, but that connection is dead. In some\
    \ cases, the error is an artifact of the design, and can be ignored because it\
    \ doesn't affect what your program needs to do.\nPython only notifies you when\
    \ it is prevented from performing the normal flow of instructions. So, you get\
    \ an exception. Now, you might want to go into your code and add additional lines\
    \ to handle the exception. But this is a bad strategy. Python has an exception\
    \ handling methodology that is easy to follow, and its exception handling tools\
    \ are the most useful.\n\n# Basic Exceptions\n\nTo demonstrate, we will start\
    \ with basic errors, like dividing by zero. It's the type of error you wouldn't\
    \ make, but it will trigger an exception, and we are interested in learning how\
    \ to handle those. Type the following code:\n\n```\n1 / 0\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\n```"
  merge: -1
