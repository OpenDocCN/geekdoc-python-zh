  md: '3. Maintenance: When you design a program, you need to think about how it will
    be used. Software meant to be used often needs maintenance and support. This means
    you need to have plans for changes, updates, and extensions. But if your program
    is web-based you need to find ways to update it without taking it down. To make
    maintenance easy, you need a program that is easy to read. You’ll find that most
    developers do this the entire lifetime of their software. Software needs to adapt
    with changes and improve to stay relevant.


    All this requires your code to be clear and reusable. It is the simple things
    which will make upgrades and maintenance easy to do.


    Below is an example of a software design document of the “Hello World” program
    we built:


    Problem: The system needs to display a message to the user.

    User: Me

    Operating System: Windows / Linux

    Interface: Command line terminal

    Functional requirements: Print a line of text

    Testing: Perform application run test, making sure text is displayed.


    # Start Designing


    Now you are ready to start designing the application. You do so by writing the
    program in pseudocode, which you can later translate into code. Pseudocode uses
    English to describe what a program should do at each stage to deliver the results
    we want. Pseudocode explains every line of code or block of code that we should
    write, the inputs it should receive, how it acts, and what it should output. Also,
    pseudocode allows you to brainstorm. For instance, you start envisioning the data
    types, variables, and functions you will need to make the applications work.


    There are no specific rules to pseudocode. You can write it any way you want.
    This only changes when you work with other programmers because you will have to
    use the standard chosen by them. In most contexts, pseudocode follows the syntax
    and rules of other languages, but the functions and commands are written in words,
    not in code. But right now, there is no need to talk about this as you don''t
    know the language. What you need to understand now is the idea behind the structure.
    Here''s how you write pseudocode:


    ```

    # Start program

    # Enter two values, X and Y

    # Add the values together

    # Print sum

    ```'
