  md: '# CHAPTER 2:

    SOFTWARE DESIGN CYCLE


    Before we begin, it''s worth taking a step and learning about the software design
    cycle. Most programming books don''t discuss this, but it is very important to
    understand how programs are designed and made. It is a skill that will become
    indispensable as you become a programmer. You should also know that a lot of what
    we are going to talk about comes up a lot in interviews.


    We are going to learn how to identify a problem and fix it using programming.
    The first stage of this process has to do with designing the application. You
    will see how you can break up a solution into small, actionable steps that solve
    a problem. You must do so to see the underlying logic of the steps we take for
    granted when we fix problems. All the questions we are going to go through will
    help you learn the process. It is also mnemonic. In the second part of the chapter,
    we will use what we have learned and write code. After that stage, you can test
    and refine the program in your capacity.


    We will also learn pseudo code, which is also known as a design language. Pseudocode
    does not give instructions to the machine and functions as a guide. It''s one
    of those rarely discussed important programming skills that make you more organized
    as a developer.


    # Solving Problems


    Programming uses logic to solve problems. You will see this as you learn throughout
    this book and other resources. There will be plenty of practice and exercises.
    Programming is about solving problems, whether or not you are building an application
    for work. It''s still true when you create a clone of another program so that
    you can improve it. Right now, as you read this, there are likely some problems
    you have on your mind. Maybe that is why you took this book. Maybe you have an
    idea for a game or an app that you would like to share with the world. To reach
    those goals, you have to start by asking some questions. Why? Because applications
    can get pretty complicated quickly, and you need to know what you are doing, so
    you don''t get lost. Writing an application without going through this process
    is as impractical as J.R.R Tolkien writing *The Lord of The Rings* without asking
    himself questions about the culture, history, the people, and features of the
    world he is writing about. If you sit down to devise a plan, you will develop
    your application much faster because you face fewer problems.'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'The possibility is, whatever idea you have in mind, there is probably already
    someone who has built it. The point is not coming up with something new. Although
    you can, the point is about asking yourself if something can be improved. It also
    makes things easy for you because you don''t have to build anything from scratch.
    You can find the code that is written and shared and then optimize it. You might
    think this is cheating, but it isn''t. Most of the tools we use today are built
    this way. People built on top of each other''s technology to produce something
    more beautiful.


    # Problem Identification


    Before coding, you need an idea. To find one quickly, think of something you do
    often. Choose something repetitive that you think can be automated by code. Programming
    is always perfect for mundane tasks. This is your first problem. The next step
    is finding a way you can tell the computer to do this task for you. What instructions
    - in Python - can the computer follow to fix this problem? You will also need
    to get results that show that the computer is doing what you want it to do. Now
    let''s go through the basic development cycle. The important thing to remember
    is that you don''t have to be strict about this. You can adapt methods to situations.
    The principles are not necessarily a blueprint, so you can be creative with it.


    Without thinking about the structure, starting can be difficult, and adding solutions
    and building just as you go can lead to an unpleasant experience. Here are the
    steps you should take:


    +   1. **The software’s purpose:** Write down the problem and what your program
    should do to fix the problem. Because you are new to programming, start with something
    simple. A program that prints messages to a user is sufficient. Once you know
    what you want to do, you have to think clearly about how you can solve that problem.
    It''s the brainstorming session. All your ideas don''t have to be perfect, but
    you just need to think they can work so you''ll have an idea of what to do if
    they don''t.

    2. **The type of user:** Next, you have to ask yourself who your target users
    are. Even If you are doing a personal project, you should get into the habit of
    doing so. Ask yourself who is going to find his program useful. Are they your
    friends or family? The general public? How do you anticipate they will interact
    with the program? Do they have technical knowledge? What are they going to expect?
    Once you ask yourself questions along these lines, you will begin to see a clearer
    picture of your program. You will not only know what it should do, but you will
    also know how it should do it and how it should look while doing it.

    3. **The computer system:** Then, you need to anticipate the operating system
    of'
  merge: -1
