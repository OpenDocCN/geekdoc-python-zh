    # Numbers


    Numbers are assigned to variables the same way you would assign strings or any
    data type. Here’s an example:


    ```

    x = 5

    y = 2

    ```


    Python will be able to discern whether it is dealing with a number because of
    the absence of quotations or letters. In this instance, an integer. Before we
    go any further, you need a basic understanding of how computers work.


    Computers store data in binary, a sequence of ones and zeroes. Information is
    processed by triggering a vast amount of switches that can either be on or off
    (1 or 0). There is much more to learn about this topic, but this is enough information
    for our purposes.


    Let’s look at some numeral types:


    +   1. Integers: In programming and mathematics, whole numbers are called integers.
    Integers don''t have decimal points, but they can be negative or positive. Integers
    are frequently used in operations.

    2. Floats: Floats have decimal points. If 2 is an integer, 2.5 is a float. Floats
    can also either be negative or positive, and they are assigned to variables the
    same way integers are. Python can differentiate between floats and integers automatically.

    3. Booleans: They are the most basic type there is, and they represent how computers
    work. A Boolean can either be True(1) or False(0). They are often used with logical
    operators like "and", "or" and "not." We''ll explore this in detail later. Variables
    are assigned Boolean values using True and False keywords. They are always capitalized;
    otherwise, it will not work.'
