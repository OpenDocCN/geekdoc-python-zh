    \n在本章中，我们将学习几种方法，这些方法将允许我们比较值并根据这些比较做出决策。这使我们能够创建更具适应性的程序，在行动之前评估条件。根据某些标准从多个选项中选择的能力创造了复杂性。这意味着你的代码管理技能需要随着你的技能一起增长，因为你很快就能编写更大的脚本。此外，你将学习如何使用循环。\n\
    \n## 条件语句\n\n该应用程序不准确，并且缺少一些功能。此外，代码中存在逻辑问题，我们需要修复它们。我们可以通过值比较来提高准确性，因为如果我们能够比较值，我们就可以指示应用程序根据这些比较采取不同的行动。这就是条件语句的用途。\n\
    \n条件语句增加了一层额外的复杂性。在我们所有的示例中，我们都使用了一系列命令来达到我们的目的。这将随着条件语句而改变。应用程序将能够根据我们指定的最合适行动，在多个选项之间做出决定。如果满足某个条件，程序将以某种方式行动；如果不满足，则以另一种方式行动。以下是条件语句的伪代码：\n\
    \n```\n如果条件为真：\n    执行这些操作；\n\n如果此条件为真：\n    执行另一组操作；\n\n如果此条件为假：\n    什么都不做；\n\
    ```\n\n看看这多么合乎逻辑。这是一个例子，说明将我们的想法用伪代码表达可以使事情变得非常清晰。所以，养成这个习惯。看看上面的伪代码多么轻松地演示了条件语句。条件语句遵循一个简单的结构：如果x，那么y。\n\
    \n有几种检查条件的方法，即使用下面列出的比较运算符：\n\n1. 小于：<\n2. 小于或等于：<=\n3. 大于：>\n4. 大于或等于：>=\n5.\
    \ 等于：==\n6. 不等于：!=\n\n运算符以多种方式使用。例如，你可以通过调整条件语句的逻辑，使用不同的运算符编写相同的条件语句。条件语句在检查时返回真或假的答案。如下所示：\n\
    \n```\n5 < 9\nTrue\n-10 >= 10\nFalse\n5.5 != 5.5\nFalse\n23.56 > 78.2\nFalse\n\
    ```\n\n现在，让我们通过首先为变量赋值来评估一个条件表达式：\n\n```\nmyVariable = 10\nmyVariable == 10\n\
    True\n```\n\n如你所见，首先，我们使用单个等号赋值。然后我们使用两个等号来检查存储在myVariable中的数字是否等于十。换句话说，两个等号用于比较值是否相等，而一个等号用于赋值。此表达式将返回一个布尔值：True或False。如果你在条件语句中使用了错误的运算符，Python将抛出错误。在某些情况下，如果执行的赋值不妨碍特定函数的作用，使用赋值运算符而不是比较运算符可能不会导致任何错误。这就是你可能认为程序产生奇怪或错误结果的地方。\n\
    \n## 控制流\n\n大多数应用程序需要能够在发生某事时选择执行哪部分代码。为此，你需要一个控制流语句。控制流语句评估语句和指令，以决定它们应如何执行。到目前为止，你已经学习了如何比较值。但这在你可以使用返回的答案来指导程序时非常有用。换句话说，控制流语句就是条件语句，因为它们检查某些条件并根据结果执行代码。\n\
    \n条件语句是通过使用以下关键字创建的：if、elif、else。如果你来自其他语言，请注意我们不使用“then”关键字。现在，让我们看看语法：\n\n```\n\
    if condition:\n    #执行这个\n    print(\"此条件为真\")\nelif condition != True:\n    #改为执行这个\n\
    \    print(\"此条件不为真\")\nelse:\n    #如果没有任何条件满足，则执行默认操作\n    print(\"条件既不为真也不为假\"\
    )\n```\n\n上面的语法很容易理解，因为我们在日常生活中已经这样思考了。让我们检查一下代码。\n\n我们有一个“if”条件，后面跟着要检查的表达式。下一个语句elif，意思是“否则如果”。当第一个条件返回false时，它将被检查。当所有其他条件都返回false时，执行else语句。换句话说，它是默认的；它也可以用于捕获不符合正在评估内容的数据。如果你不设置“else”来捕获意外情况，程序无论如何都会运行。话虽如此，你并不总是必须使用“elif”或“else”语句。在某些情况下，你希望程序在条件不满足时继续执行或什么都不做。在这种情况下，你将使用“if”语句。\n\
    \n注意代码是如何缩进的。Python要求你这样做，否则你会得到错误。其他编程语言依赖于清晰的分隔符，如花括号。Python不这样做。看看不这样做会发生什么：\n\
    \n```\nif x:\n    print (x)\n    x + 1\nindent = \"terrible\"\n```\n\n```\nFile\
    \ \"<stdin>\", line 4\n    indent = \"terrible\"\n    ^\nIndentationError: unindent\
    \ does not match any outer indentation level\n```\n\n条件语句非常重要。你将在你的职业生涯中经常使用它们。例如，程序可以使用它们来验证数据。这称为验证。你可以编写一个程序来检查一个项目。想象一下，程序会有一个项目需要满足的功能清单，并为每个存在的功能打勾。你可以使用它们来检查数据集是否在特定范围内。如果没有条件语句，程序所做的许多事情几乎是不可能的。\n\
    \n## 处理错误\n\n我们编写的许多脚本都很简单，因此除了测试运行之外不需要更多。但随着你构建更复杂的程序，你需要以更复杂的方式测试你的程序，否则你会错过有害的错误。测试还可以帮助你确定你的应用程序是否具有竞争力或是否真的做了它似乎要做的事情。测试你的应用程序的一种方法是通过跟踪表。跟踪表用于测试算法或逻辑错误。它们通过模拟应用程序执行的每一步来做到这一点，并评估每条语句。它们看起来像这样：\n\
