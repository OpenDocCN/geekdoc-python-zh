  md: '# CHAPTER 7:

    INTRODUCTION TO OBJECT-ORIENTED PROGRAMMING


    Python is considered an object-oriented programming language. What does that mean?
    OOP, for short, is a new programming paradigm that has become the standard in
    software and game development. Most of the programs we use today use OOP. OOP
    is defined as the object. In this chapter, we will learn about the concepts that
    make up OOP. We''ll explore:


    +   1. Defining objects and creating classes.

    2. Writing methods and declaring an object’s attributes.

    3. Polymorphism.

    4. Creating modules.


    # Classes


    Classes are the foundation of OOP. Essentially, a class is a template for building
    your own data type. To have a simpler time digesting this, don''t think of data
    types like numbers or text. Think of something like a car, which can be a data
    type with attributes like brand model, color, and so on.


    Classes allow you to make objects that you can use in projects. They are one of
    the most fundamental concepts in programming. It is often the last step in most
    programming courses. The content in the data represent attributes, and statements/commands
    are methods.


    It might be overwhelming to wrap your head around. But OOP makes long, difficult
    programs easier because it decreases the work you have to do. It allows you to
    reuse almost all of your code. Objects can inherit attributes and methods from
    other classes, making it easier to modify and create new objects. So we can have
    a generic object and build an entire family emanating from it. In the end, we
    would have something like a family tree.


    Say you have Flora, Fauna, and Minerals as foundational classes. They will have
    attributes that will be passed to any object belonging to them. Classes allow
    you to create a subclass. For instance, the Fauna parent class has Bird and Fish
    as subclasses. Bird and Fish will inherit some attributes from the Fauna class,
    which makes it distinct from other classes.'
  merge: -1
