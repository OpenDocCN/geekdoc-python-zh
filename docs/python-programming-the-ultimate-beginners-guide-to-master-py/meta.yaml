    # CHAPTER 1:

    GETTING STARTED


    Programming skills are in demand, and there are no signs of this slowing down
    any time soon. Whether it is web development, Machine Learning, or the Internet
    of Things, programming is everywhere. It used to be that people learned to program
    in college. Now, programming is taught to children in school. Soon, most fields
    will expect some programming knowledge. Coupled with these changes is the fact
    that learning programming is becoming freely available, accessible, and easy.
    There are entire ecosystems that are driving these changes.


    First, we will explore why learning Python is one of the best decisions you could
    make. We will then explore the tools you need to get started and set up your environment.
    If you come from another programming language like C, C++, or Java, it might be
    best to skip this chapter or skim through it.


    # Why Python?


    Python was developed in 1991 by Guido van Rossum, who named the project after
    his favorite British comedy Monty Python. To this day, there are several Monty
    Python "Easter Eggs" within the official documentation.


    Since then, Python has been used to introduce people to programming because of
    its intuitive syntax and its ability to create complex programs and process large
    amounts of data. As a beginner, you will learn how quickly you can write a basic
    program and how easily you can scale your project into something more commercial.


    Python is easy to read. It has a human-like English structure that makes it easy
    to understand and recall. The number of libraries and premade functions that you
    can add to your code, saving you time, has also increased. If you study and do
    your work, you will be equipped to write a program that will be easy to read ten
    years from now. As a programmer, you will know how important program maintenance
    is and how easy Python is to administrate compared to other languages. Let''s
    briefly explore reasons to learn Python with a list. Lists are easy to digest
    and remember.


    +   1. User-friendly: Programming languages allow communication between humans
    and machines. Python is a high-level programming language, which means it is closer
    to human language than machine language. Machines do not understand Python on
    their own. There is an interpreter that translates Python code into'
  - '[PAGE 8]


    machine language.


    +   2. Powerful: Despite how easy it is to learn, Python is immensely powerful.
    It is just as useful as languages like C++, which are low-level programming languages.
    Places like Google, Microsoft, IBM, Xerox, and NASA use Python. You can even use
    Python to develop games.


    +   3. OOP: Object orientated programming is one the most effective programming
    paradigms. It allows programmers to treat problems, actions, and data like real-world
    objects represented in code. It is not always best to use it, though, which makes
    Python interesting because it is a multi-paradigm language. This means you can
    use it for object-orientated programming, functional programming, and others.
    It''s flexible. You can benefit from OOP while using techniques belonging to other
    paradigms.


    +   4. Computer-friendly: Python doesn''t require a lot of processing power or
    RAM to run. For instance, developers use Python to create little robots that are
    operated by $5 computers. It can also run on any operating system. It means you
    can develop your application on different operating systems simultaneously, and
    it will still work the same. It also means your programs will be able to run on
    multiple platforms.


    +   5. Language adaptability: You can combine Python with other languages to take
    advantage of the different features and advantages. For instance, you can combine
    it with C++ to take advantage of the system optimizations and speed it offers
    in the backend.


    +   6. It''s free: Python is free and open-source. The license allows you to make
    changes to the source code in a way that fits your purposes. At this point, this
    might not be important to you, but it might be later on.


    +   7. Community: There is a huge Python community online. This is because Python
    is open source, has broad applicability, and is easy to learn. So, you will find
    many people dedicated to learning or teaching the language. And if you get stuck,
    you will find help easily. You will find plenty of collaboration opportunities
    with other people on the same path as you as well.


    # Installing Python


    Before we get started, you will need to download and install Python on your system.
    The installation procedure is very easy. It is just like the installation of any
    other program on your system.


    To do so, go to [www.python.org](http://www.python.org) and go to the "Downloads"
    section. Once you get there, pick the right installer for your system. Make sure
    you are downloading the latest'
- md: 'version as well.


    When the installer has downloaded, run it and follow the steps. Do not change
    anything.


    We advise that you install Python and get used to working on it on your system.
    Online platforms are good for practice, but not for building things. So, working
    on your system will help prepare you better. We also advise that you write the
    code yourself. If you copy and paste, experiment with the code. Doing this will
    help drill the lessons in you.


    ## Using a Text Editor


    You can write Python in almost any text editor. There are many to choose from.
    There are programs like Notepad, Notepad++, gedit, and others. Some text editors
    will be better than others as they provide features that are useful to programmers.
    For instance, Notepad++ has syntax highlighting, meaning you will be able to see
    when you make errors in your code and fix them. Other editors like Notepad are
    plain, meaning you will not be able to tell you are making a mistake until you
    try running the code. Try picking a text editor that feels natural to you.


    Avoid using word processors.


    ## Using an IDE


    An IDE, Integrated Development Environment, is a program for writing code that
    comes with multiple important features for programming. Many come with graphical
    interfaces, have autocomplete, history functions, and are integrated with other
    debugging tools, can run commands, deploy, and more. The advantage of using an
    IDE is convenience. IDE''s have many support features, shortcuts, reminders, and
    suggestions on how to fix errors.


    One of the most popular IDE''s is IDLE. IDLE comes with Python. IDLE can run in
    two modes: interactive and script. Interactive is best when you want Python to
    respond immediately to your code.


    There are many IDE''s out there. Do a little research and pick the one you like
    best.


    ## Your First Program


    Now that you are set up, it''s time to write your first program. We will be using
    IDLE for this example, but you can use a text editor or an online Python console
    if you like. We recommend you use IDLE so you familiarize yourself with IDEs.


    Run IDLE in interactive mode. It is easy to find. Just search for it on your system
    and click on it. The window you will see is called a Python shell. There will
    be a blinking cursor, indicating you can type. Type the following:


    ```

    print ("Hello World!")

    ```


    The following should display on the next line: Hello World!


    That''s it! You have written your first Python program that displays the message
    "Hello World!" As you can see, the code is self-explanatory. It reads like an
    English command. This is what we mean by Python is easy to read and understand.


    We use the "print()" function to display text written in parentheses with quotation
    marks. If you don''t have quotation marks, you will get an error. The code will
    not run. Python is also case sensitive, so if you were to capitalize the function,
    it would not work.


    In IDLE''s interactive mode, you get the output of your program immediately, but
    the downside is that you cannot save your project and continue working on it later.
    To do that, you will need to use script mode. To do this, click "File" and select
    "New File." It''ll take you to a new window. Write the code again: print ("Hello
    World!").


    You will notice that when you press Enter, nothing happens. The blinking cursor
    jumps to the next line. It''s an important feature because it means you can write
    more instructions. To run the code, you will have to click "File," then "Save
    As." Give the file the name you want. You will see it has the default ".py" extension.
    The extension is important. If the ".py" is missing, the interpreter will not
    read/run the code. Click on "Run" to run the script. You will see that IDLE will
    display the results in the interactive window.


    In the end, you want to be able to run your program the way you run others. To
    do this, you will need an executable file, which you double click, and it runs
    the code. If you did that now, a window would open and close. It would look like
    nothing happened, but that would be inaccurate. The program has run and terminated
    itself too fast for you to notice. You will need to give it instructions that
    enable it to be open long enough for you to see. Before we get into that, let''s
    discuss code comments.


    ## Code Comments and Your Program


    Open the script we just started and type:


    ```

    # Hello World!

    # This is a demonstration of the "print" function.

    ```


    When you run the program, you will see that it still displays the same message.
    The lines you wrote don''t appear. Python ignored them. These lines are called
    comments; they are always preceded by #, and they''re there to make the code more
    readable by explaining it. It might look unnecessary now because you understand
    the code you are writing. This ceases to be true when you work with others, or
    your applications become complex, featuring plenty of variables and functions.
    Your code needs to make sense to those who collaborate with you and to yourself
    months in the future. Your collaborators can investigate what your code does,
    but it won''t be a pleasant experience. It is simply inefficient to do things
    that way.


    If you are worried that having more comments will affect your application''s performance,
    don''t worry about it. It won''t. Python always ignores comments.


    You can make your comments more readable by leaving empty lines. This will not
    do anything to your code. Leaving empty lines of space between code blocks and
    sections is fine; they are ignored. Go back to your script and add the following
    line:


    ```

    input ("\n\n Hit the Enter key to exit!")

    ```


    Run it, and it will show a console with the message "Hello World!" and then display
    "Hit the Enter Key to exit!" The program will wait for you to press the enter
    key. It is one way to keep the program open.


    ## Summary


    In this chapter, we have had a brief overview of Python: why it is a good choice,
    its uses, and its nature. We then installed Python and wrote some code, explored
    IDLE, and saw how we could write programs and run them. We also saw how we could
    take input and talked about the importance of comments. Now you are ready to learn!


    # CHAPTER 2: SOFTWARE DESIGN CYCLE


    Before we begin, it''s worth taking a step and learning about the software design
    cycle. Most programming books don''t discuss this, but it is very important to
    understand how programs are designed and made. It is a skill that will become
    indispensable as you become a programmer. You should also know that a lot of what
    we are going to talk about comes up a lot in interviews.


    We are going to learn how to identify a problem and fix it using programming.
    The first stage of this process has to do with designing the application. You
    will see how you can break up a solution into small, actionable steps that solve
    a problem. You must do so to see the underlying logic of the steps we take for
    granted when we fix problems. All the questions we are going to go through will
    help you learn the process. It is also mnemonic. In the second part of the chapter,
    we will use what we have learned and write code. After that stage, you can test
    and refine the program in your capacity.


    We will also learn pseudo code, which is also known as a design language. Pseudocode
    does not give instructions to the machine and functions as a guide. It''s one
    of those rarely discussed important programming skills that make you more organized
    as a developer.


    ## Solving Problems


    Programming uses logic to solve problems. You will see this as you learn throughout
    this book and other resources. There will be plenty of practice and exercises.
    Programming is about solving problems, whether or not you are building an application
    for work. It''s still true when you create a clone of another program so that
    you can improve it. Right now, as you read this, there are likely some problems
    you have on your mind. Maybe that is why you took this book. Maybe you have an
    idea for a game or an app that you would like to share with the world. To reach
    those goals, you have to start by asking some questions. Why? Because applications
    can get pretty complicated quickly, and you need to know what you are doing, so
    you don''t get lost. Writing an application without going through this process
    is as impractical as J.R.R Tolkien writing *The Lord of The Rings* without asking
    himself questions about the culture, history, the people, and features of the
    world he is writing about. If you sit down to devise a plan, you will develop
    your application much faster because you face fewer problems.'
