    - **HTTP/HTTPS：** 客户端和服务器之间通信的协议。\n- **前端：** HTML、CSS、JavaScript – 网站的可视化和交互部分。\n\
    - **后端：** 服务器端脚本语言（例如Python、Node.js）、数据库和服务器配置。\n\n### 9.2 设置Flask\n\n#### 9.2.1\
