  md: 'Web development involves building and maintaining websites or web applications.
    It encompasses both the frontend (client-side) and backend (server-side) development,
    along with databases and other technologies.


    # 9.1.2 Key Concepts in Web Development


    **Client-side:** The user interacts with elements displayed in a web browser.

    **Server-side:** The server processes requests, executes logic, and sends responses
    back to the client.

    **HTTP/HTTPS:** Protocols for communication between clients and servers.

    **Frontend:** HTML, CSS, JavaScript – the visual and interactive part of a website.

    **Backend:** Server-side scripting languages (e.g., Python, Node.js), databases,
    and server configurations.


