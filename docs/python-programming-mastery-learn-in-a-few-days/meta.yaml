    \n# 写入文件\nwith open(\"output.txt\", \"w\") as file:\n    file.write(\"Hello, File!\"\
    )\n```\n\n### 7.1.2 文件操作中的模式\n\n- \"r\"：读取（默认模式）。\n- \"w\"：写入（创建新文件或覆盖现有内容）。\n\
    - \"a\"：追加（在文件末尾添加新内容）。\n- \"x\"：独占创建（创建新文件，如果文件已存在则失败）。\n\n## 7.2 处理不同的文件格式\n\
    \n### 7.2.1 读取和写入文本文件\n\n文本文件是最常见的。使用 read() 和 write() 方法读取和写入文本文件：\n\n```\n#\
