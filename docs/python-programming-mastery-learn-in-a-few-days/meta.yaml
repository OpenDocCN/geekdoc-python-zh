    \  def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n\n    def bark(self):\n        print(\"Woof!\")\n```\n\n### 8.1.2 创建对象\n\
    \n从类实例化对象：\n\n```\ndog1 = Dog(\"Buddy\", 3)\ndog2 = Dog(\"Max\", 5)\n```\n\n##\
    \ 8.2 继承、封装和多态\n\n### 8.2.1 继承\n\n创建一个新类，该类继承现有类的属性和方法：\n\n```\nclass GoldenRetriever(Dog):\n\
    \    def fetch(self):\n        print(\"Fetching the ball!\")\n```"
