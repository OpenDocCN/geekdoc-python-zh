    \ i - 1, -1):\n        print(\" \", end=\"\")\n    for k in range(1, i + 1):\n\
    \        print(\"*\", end=\"\")\n    print()\n```\n\n# 模式 5\n\n```\n*****\n ****\n\
    \  ***\n   **\n    *\n```\n\n```python\nn = 5\nfor i in range(n, 0, -1):\n   \
    \ for j in range(n - 1, i - 1, -1):\n        print(\" \", end=\"\")\n    for k\
    \ in range(1, i + 1):\n        print(\"*\", end=\"\")\n    print()\n```\n\n# 模式\
    \ 6\n\n```\n    *\n   **\n  ***\n ****\n```\n\n```python\np_height = 5\nfor i\
    \ in range(1, p_height):\n    for k in range(p_height - 1, i - 1, -1):\n     \
