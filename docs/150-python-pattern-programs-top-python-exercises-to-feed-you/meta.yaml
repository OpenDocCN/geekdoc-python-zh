    \ 165](Pattern 165)\n\n# INTRODUCTION\n\nDevelop your creativity by creating beautiful\
    \ asterisk patterns with if statements and loops using the Python language. This\
    \ awesome language will allow you to feel more comfortable writing code because\
    \ you will master the more essential topics of programming by practicing these\
    \ techniques.\n\nIf you are studying computer science at university, this book\
    \ is perfect for you. They will require you to create these types of patterns\
    \ that will be very useful to learn all types of advanced techniques and quickly\
    \ master this wonderful language.\n\n# PATTERN 1\n\n```\n*****\n*****\n*****\n\
    *****\n*****\n```\n\n```python\nfor i in range(1, 6):\n    for j in range(1, 6):\n\
    \        print(\"*\", end=\"\") # put any character\n    print()\n```\n\n# PATTERN\
    \ 2\n\n```\n*\n**\n***\n****\n*****\n```\n\n```python\nfor i in range(1, 6):\n\
    \    for j in range(1, i + 1):\n        print(\"*\", end=\"\")\n    print()\n\
    ```\n\n# PATTERN 3\n\n```\n*****\n****\n***\n**\n*\n```\n\n```python\nfor i in\
    \ range(1, 6):\n    for j in range(5, i - 1, -1):\n        print(\"*\", end=\"\
    \")\n    print()\n```\n\n# PATTERN 4\n\n```\n    *\n   **\n  ***\n ****\n*****\n\
    ```\n\n```python\nn = 5\nfor i in range(1, n + 1):\n    for j in range(n - 1,\
    \ i - 1, -1):\n        print(\" \", end=\"\")\n    for k in range(1, i + 1):\n\
    \        print(\"*\", end=\"\")\n    print()\n```\n\n# PATTERN 5\n\n```\n*****\n\
    \ ****\n  ***\n   **\n    *\n```\n\n```python\nn = 5\nfor i in range(n, 0, -1):\n\
    \    for j in range(n - 1, i - 1, -1):\n        print(\" \", end=\"\")\n    for\
    \ k in range(1, i + 1):\n        print(\"*\", end=\"\")\n    print()\n```\n\n\
    # PATTERN 6\n\n```\n    *\n   **\n  ***\n ****\n```\n\n```python\np_height = 5\n\
    for i in range(1, p_height):\n    for k in range(p_height - 1, i - 1, -1):\n \
    \       print(\" \", end=\"\")\n    for j in range(1, i + 1):\n        print(\"\
    * \", end=\"\")\n    print()\n```\n\n# PATTERN 7\n\n```\n*****\n ****\n  ***\n\
    \   **\n    *\n```\n\n```python\np_height = 5\nfor i in range(p_height, 0, -1):\n\
    \    for k in range(p_height - 1, i - 1, -1):\n        print(\" \", end=\"\")\n\
    \    for j in range(i, 0, -1):\n        print(\"* \", end=\"\")\n    print()\n\
    ```\n\n# PATTERN 8\n\n```\n    *\n   ***\n  *****\n *******\n*********\n```\n\n\
    ```python\np_height = 5\nmin_stars = 1\nfor i in range(p_height):\n    for j in\
    \ range(p_height - 1, i, -1):\n        print(\" \", end=\"\")\n    for k in range(min_stars):\n\
    \        print(\"*\", end=\"\")\n    min_stars += 2\n    print()\n```\n\n# PATTERN\
    \ 9\n\n```\n*********\n *******\n  *****\n   ***\n    *\n```\n\n```python\np_height\
    \ = 5\nmax_stars = p_height * 2 - 1\np_space = p_height - 1\nfor i in range(p_height,\
    \ 0, -1):\n    for j in range(p_space, i - 1, -1):\n        print(\" \", end=\"\
    \")\n    for k in range(max_stars):\n        print(\"*\", end=\"\")\n    max_stars\
    \ -= 2\n    print()\n```\n\n# PATTERN 10\n\n```\n  *\n **\n***\n **\n  *\n```\n\
    \n```python\nsize = 3\nfor i in range(size, -size-1, -1):\n    for j in range(size,\
    \ abs(i)-1, -1):\n        print(\"*\", end=\"\")\n    print()\n```\n\n# PATTERN\
    \ 11\n\n```\n  *\n **\n***\n **\n  *\n```\n\n```python\nsize = 3\nfor i in range(size,\
    \ -size-1, -1):\n    for j in range(1, abs(i)+1):\n        print(\" \", end=\"\
    \")\n    for k in range(size, abs(i)-1, -1):\n        print(\"*\", end=\"\")\n\
    \    print()\n```\n\n# PATTERN 12\n\n```\n1****\n22***\n333**\n4444*\n55555\n\
    ```\n\n```python\nn = 5\nfor i in range(1, n + 1):\n    for j in range(1, n +\
    \ 1):\n        if j > i:\n            print(\"*\", end=\"\")\n        else:\n\
    \            print(i, end=\"\")\n    print()\n```"
