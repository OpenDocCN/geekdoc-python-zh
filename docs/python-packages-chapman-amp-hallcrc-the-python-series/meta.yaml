    # 3.7.3 Code coverage


    A good test suite will contain tests that check as much of your package’s code
    as possible. How much of your code your tests actually use is called “code coverage”.
    The simplest and most intuitive measure of code coverage is line coverage. It
    is the proportion of lines of your package’s code that are executed by your tests:


    $$coverage = \frac{lines\ executed}{total\ lines} * 100\%$$


