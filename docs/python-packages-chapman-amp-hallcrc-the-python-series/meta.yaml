    \n## 7.4 Automating releases\n\nAs you've seen in this chapter, there are quite\
    \ a few steps to go through in order to make a new release of a package. In **Chapter\
    \ 8: Continuous integration and deployment** we'll see how we can automate the\
    \ entire release process, including running tests, building documentation, and\
    \ publishing to TestPyPI and PyPI.\n\n## 7.5 Breaking changes and deprecating\
    \ package functionality\n\nAs discussed earlier in the chapter, major version\
    \ releases may come with backward incompatible changes, which we call \"breaking\
    \ changes\". Breaking changes affect your package's user base. The impact and\
    \ importance of breaking changes is directly proportional to the number of people\
    \ using your package. That's not to say that you should avoid breaking changes\
    \ — there are good reasons for making them, such as improving software design\
    \ mistakes, improving functionality, or making code simpler and easier to use.\n\
    \nIf you do need to make a breaking change, it is best to implement that change\
    \ gradually, by providing adequate warning and advice to your package's user base\
    \ through \"deprecation warnings\".\n\nWe can add a deprecation warning to our\
    \ code by using the `warnings` module<sup>7</sup> from the Python standard library.\
    \ For example, imagine that we want to remove the `get_flatland()` function from\
    \ the `datasets` module of our `pycounts` package in the upcoming major v1.0.0\
    \ release. We can do this by adding a `FutureWarning` to our code, as shown in\
    \ the `datasets.py` module below (we created this module back in **Section 4.2.6**).\n\
    \n> If you've used any larger Python libraries before (such as NumPy, Pandas or\
    \ scikit-learn) you probably have seen deprecation warnings before! On that note,\
    \ these large, established Python libraries offer great resources for learning\
    \ how to properly manage your own package — don't be afraid to check out their\
    \ source code and history on GitHub.\n\n<sup>7</sup> https://docs.python.org/3/library/warnings.html"
