    \ Actions essentially provides you with a blank operating system of your choice\
    \ (a “runner”), which we need to set up based on what steps we are going to want\
    \ it to execute. In our case, we need to install Python and install poetry on\
    \ the runner, so that we can then install our packages and run its tests and build\
    \ its documentation. Thus, our setup will involve the steps below, for which we’ve\
    \ indicated whether step will use an action or command(s) (**Section 8.3.3**):\n\
    \n+   1. Specify an operating system. We’ll be using Ubuntu with the syntax `runs-on:\
    \ ubuntu-latest`. MacOS and Windows are also available if you wish to test your\
    \ package on those systems, but Ubuntu is a good default to use — see the GitHub\
    \ Actions documentation<sup>8</sup>.\n2. Install Python (action: `actions/setup-python@v2`<sup>9</sup>).\n\
    \n<sup>8</sup>https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources\n\
