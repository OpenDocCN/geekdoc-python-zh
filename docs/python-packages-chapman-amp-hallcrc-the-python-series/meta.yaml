    # 6 Documentation


    Writing documentation for your package is arguably one of the most important,
    but perhaps least exciting, parts of the packaging process. The purpose of documentation
    is to help users understand how they can use and interact with your package, without
    having to read the source code. For the users of your code (including your future
    self), having readable and accessible documentation is invaluable. The reality
    is, if no one knows how to use your package, it will probably not get used!


    In **Section 3.8**, we walked through the steps required to create documentation,
    compile it into a user-friendly and shareable HTML format, and then host it online.
    We’ll revise those steps here and will provide more detail about the documentation
    workflow and the individual elements of package documentation.


    # 6.1 Documentation content and workflow


    To give you an idea of what we mean when we say “documentation”, **Table 6.1**
    shows the documentation included with a typical Python package and where it is
    usually located in the package’s directory structure.


    TABLE 6.1: Typical Python package documentation.


    | Documentation | Typical location | Description |

    | :--- | :--- | :--- |

    | README | Root | Provides high-level information about the package, e.g., what
    it does, how to install it, and how to use it. |

    | License | Root | Explains who owns the copyright to your package source and
    how it can be used and shared. |'
