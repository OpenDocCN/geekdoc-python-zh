    # 6.3 Building documentation


    At the moment, the documentation we’ve written is spread throughout our package’s
    directory structure in the form of plain-text Markdown files, Jupyter Notebooks,
    and docstrings in our Python modules. Rather than requiring users to search through
    this directory structure to find documentation, it’s common to use a documentation
    generator like sphinx to compile and render all of this plain-text documentation
    into a user-friendly output format, such as HTML or PDF, that is easy to view,
    navigate, and share with others. We showed an example of sphinx-generated documentation
    in Fig. 6.1. As we’ll see in this section, sphinx also has a rich ecosystem of
