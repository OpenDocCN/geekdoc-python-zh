    # 3.7 Testing your package


    # 3.7.1 Writing tests


    At this point we have developed a package that can count words in a text file
    and plot the results. But how can we be certain that our package works correctly
    and produces reliable results?


    One thing we can do is write tests for our package that check the package is working
    as expected. This is particularly important if you intend to share your package
    with others (you don''t want to share code that doesn''t work!). But even if you
    don''t intend to share your package, writing tests can still be helpful to catch
    errors in your code and to write new code without breaking any tried-and-tested
    existing functionality. If you don''t want to write to tests for your package
    feel free to skip to [Section 3.8](#section-3.8).


    Many of us already conduct informal tests of our code by running it a few times
    in a Python session to see if it''s working as we expect, and if not, changing
    the code and repeating the process. This is called "manual testing" or "exploratory
    testing". However, when writing software, it''s preferable to define your tests
    in a more formal and reproducible way.


    Tests in Python are often written with the `assert` statement. `assert` checks
    the truth of an expression; if the expression is true, Python does nothing and
    continues running, but if it''s false, the code terminates and shows a user-defined
    error message. For example, consider running the follow code in a Python interpreter:'
