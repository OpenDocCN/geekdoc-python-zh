  md: "package if it isn't passing CI. We can specify this constraint using the needs\
    \ keyword in GitHub Actions (documentation<sup>17</sup>).\n\n+   2. Code is pushed\
    \ to the main branch — we don't want to deploy a new version of our package when\
    \ a pull request is opened, we only want to deploy a new version when a pull request\
    \ is merged into the main branch or changes are pushed to the main branch directly.\
    \ We can specify this constraint using the if syntax in GitHub Actions (documentation<sup>18</sup>).\n\
    \nWe can set up a new job and add the two constraints above with the following\
    \ syntax:\n\n```\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n  ci:\n  \
    \  # ...\n    # CI steps hidden\n    # ...\n\n  cd:\n    # Only run this job if\
    \ the \"ci\" job passes\n    needs: ci\n\n    # Only run this job if new work\
    \ is pushed to the \"main\" branch\n    if: github.event_name == 'push' && github.ref\
    \ == 'refs/heads/main'\n```\n\nNow we can set up our CD workflow. In GitHub Actions,\
    \ each job runs on a fresh runner, which we need to set up from scratch. Once\
