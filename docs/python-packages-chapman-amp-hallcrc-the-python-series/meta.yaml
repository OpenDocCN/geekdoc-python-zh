  md: '# 7

    Releasing and versioning


    Previous chapters have focused on how to develop a Python package from scratch
    by creating the Python source code, developing a testing framework, writing documentation,
    and then releasing it online via PyPI (if desired). This chapter now describes
    the next step in the packaging workflow — updating your package!


    At any given time, your package''s users (including you) will install a particular
    version of your package in a project. If you change the package''s source code,
    their code could potentially break (imagine you change a module name, or remove
    a function argument a user was using). To solve this problem, developers assign
    a unique version number to each unique state of their package and release each
    new version independently. Most of the time, users will want to use the most up-to-date
    version of your package, but sometimes, they''ll need to use an older version
    that is compatible with their project. Releasing versions is also an important
    way of communicating to your users that your package has changed (e.g., bugs have
    been fixed, new features have been added, etc.).


    In this chapter, we''ll walk through the process of creating and releasing new
    versions of your Python package.


    # 7.1 Version numbering


    Versioning is the process of adding unique identifiers to different versions of
    your package. The unique identifier you use may be name-based or number-based,
    but most Python packages use semantic versioning¹. In semantic versioning, a version
    number consists of three integers A.B.C, where A is the “major” version, B is
    the “minor” version, and C is the “patch” version. The first version of a software
    usually starts at 0.1.0 and increments from there. We call an increment a “bump”,
    and it consists of adding 1 to either the major, minor, or patch identifier as
    follows:


    +   - **Patch** release (0.1.0 -> 0.1.1): patch releases are typically used for
    bug fixes, which are backward compatible. Backward compatibility refers to the


    ¹https://semver.org'
  merge: -1
