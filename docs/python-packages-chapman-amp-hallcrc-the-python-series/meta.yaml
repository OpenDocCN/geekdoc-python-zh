  - "[PAGE 227]\n\n```\nGH_TOKEN: ${{ secrets.GITHUB_TOKEN }}\nrun: |\n    git config\
    \ user.name github-actions\n    git config user.email github-actions@github.com\n\
    \    poetry run semantic-release publish\n```\n\nWe'll see PSR in action shortly,\
    \ but let's first configure the rest of our CD workflow file.\n\n# 8.5.3 Uploading\
    \ to TestPyPI and PyPI\n\nThe PSR step will create an sdist and wheel for our\
    \ new package version. What we need to do next in our CD workflow is try uploading\
    \ those distributions to TestPyPI. This step is not strictly necessary, but it's\
    \ a good idea because it can help catch any unexpected errors before we upload\
    \ our package to PyPI.\n\nRather than write the code needed to do all this from\
    \ scratch, we'll use the pypa/gh-action-pypi-publish@release/v1 action. This action\
    \ relies on token authentication with TestPyPI (rather than the classic username\
    \ and password authentication). To use the action, you'll need to log-in to TestPyPI,\
    \ create an API token, and add the token as a secret called TEST_PYPI_API_TOKEN\
    \ to your GitHub repository, as shown in Fig. 8.7.\n\nTo use the pypa/gh-action-pypi-publish@release/v1\
    \ action, we can add the following step to our CD workflow. Note how we configure\
    \ the action to use the token user method, specifying password as the TEST_PYPI_API_TOKEN\
    \ we just added to our repository, and we point the action to the TestPyPI repository\
    \ (repository_url: https://test.pypi.org/legacy/).\n\n```\n- name: Publish to\
    \ TestPyPI\n  uses: pypa/gh-action-pypi-publish@release/v1\n  with:\n    user:\
    \ __token__\n    password: ${{ secrets.TEST_PYPI_API_TOKEN }}\n    repository_url:\
    \ https://test.pypi.org/legacy/\n```\n\nThe above action will publish the new\
    \ version of your package to TestPyPI. We now want to test that we can install\
    \ the package correctly from TestPyPI using the following command:\n\n32 https://github.com/pypa/gh-action-pypi-publish\n\
    33 https://test.pypi.org\n34 https://pypi.org/help/#apitoken\n35 https://docs.github.com/en/actions/reference/encrypted-secrets\n\
    36 https://github.com/pypa/gh-action-pypi-publish"
