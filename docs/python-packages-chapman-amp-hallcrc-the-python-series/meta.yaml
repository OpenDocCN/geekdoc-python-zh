- img_proc: true
  md: 'compatibility of your package with previous versions of itself. For example,
    if a user was using v0.1.0 of your package, they should be able to upgrade to
    v0.1.1 and have any code they previously wrote still work. It’s fine to have so
    many patch releases that you need to use two digits (e.g., 0.1.27).


    +   - **Minor** release (0.1.0 -> 0.2.0): a minor release typically includes larger
    bug fixes or new features that are backward compatible, for example, the addition
    of a new function. It’s fine to have so many minor releases that you need to use
    two digits (e.g., 0.13.0).

    - **Major** release (0.1.0 -> 1.0.0): release 1.0.0 is typically used for the
    first stable release of your package. After that, major releases are made for
    changes that are not backward compatible and may affect many users. Changes that
    are not backward compatible are called “breaking changes”. For example, changing
    the name of one of the modules in your package would be a breaking change; if
    users upgraded to your new package, any code they’d written using the old module
    name would no longer work, and they would have to change it.


    Most of the time, you’ll be making patch and minor releases. We’ll discuss major
    releases, breaking changes, and how to deprecate package functionality (i.e.,
    remove it) more in **Section 7.5**.


    Even with the guidelines above, versioning a package can be a little subjective
    and requires you to use your best judgment. For example, small packages might
    make a patch release for each individual bug fixed or a minor release for each
    new feature added. In contrast, larger packages will often group multiple bug
    fixes into a single patch release or multiple features into a single minor release,
    because making a release for every individual change would result in an overwhelming
    and confusing amount of releases! **Table 7.1** shows some practical examples
    of major, minor, and patch releases made for the Python software itself. To formalize
    the circumstances under which different kinds of releases should be made, some
    developers create a “version policy” document for their package; the pandas version
    policy² is a good example of this.'
