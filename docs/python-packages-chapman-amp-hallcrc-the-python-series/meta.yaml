    # 3.8 Package documentation


    For the users of our package it would be helpful to compile all of our functions
    and docstrings into a easy-to-navigate document, so they can access this documentation
    without having to import them and run help(), or search through our source code.
    Such a document is referred to as an application programming interface (API) reference.
    We could create one by manually copying and pasting all of our function names
    and docstrings into a plain-text file, but that would be inefficient. Instead,
    we’ll show how to use sphinx in **Section 3.8.4** to automatically parse our source
    code, extract our functions and docstrings, and create an API reference for us.


    # 3.8.3 Creating usage examples


    Creating examples of how to use your package can be invaluable to new and existing
    users alike. Unlike the brief and basic “Usage” heading we wrote in our README
    in **Section 3.8.1**, these examples are more like tutorials, including a mix
    of text and code that demonstrates the functionality and common workflows of your
    package step-by-step.


    You could write examples from scratch using a plain-text format like Markdown,
    but this can be inefficient and prone to errors. If you change the way a function
    works, or what it outputs, you would have to re-write your example. Instead, in
    this section we’ll show how to use Jupyter Notebooks (Kluyver et al., 2016) as
    a more efficient, interactive, and reproducible way to create usage examples for
    your users. If you don’t want to create usage examples for your package, or aren’t
    interested in learning how to use Jupyter Notebooks to do so, you can skip to
    **Section 3.8.4**.


    Jupyter Notebooks are interactive documents with an .ipynb extension that can
    contain code, equations, text, and visualizations. They are effective for demonstrating
    examples because they directly import and use code from your package; this ensures
    you don’t make mistakes when writing out your examples, and it allows users to
    download, execute, and interact with the notebooks themselves (as opposed to just
    reading text). To create a usage example for our pycounts package using a Jupyter
    Notebook, we first need to add jupyter as a development dependency:


    > If using a conda virtual environment, make sure that environment is active by
    running `conda activate pycounts`, before using or working on your package.'
