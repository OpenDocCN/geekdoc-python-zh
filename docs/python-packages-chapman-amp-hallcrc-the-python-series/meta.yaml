    \n### 6.2.2 许可证\n\n许可证告诉其他人他们可以和不可以对你的代码做什么。开源倡议组织（OSI）⁸是了解不同许可证的好地方，GitHub也有一个有用的工具<sup>9</sup>可以帮助为你的包选择最合适的许可证。Python包常用的一些许可证包括：\n\
