    # 6.2.8 Application programming interface (API) reference


    An application programming interface (API) reference sheet is an organized index
    of your package''s user-facing functionality and associated docstrings. It helps
    users efficiently understand and search through your package''s functionality
    without having to dig in to the source code or run the Python help() command on
    every object they need to know about.


    As a concrete example of what we''re talking about, Fig. 6.4 shows an API reference
    for our pycounts package, and Fig. 6.5 shows the detail we get when we click on
    the pycounts.plotting module.


    You could create an API reference by manually copying and pasting the names of
    all of your package''s Python objects (functions, modules, classes, etc.) and
    their docstrings into a plain-text file, but that would be incredibly tedious
    and not reproducible. Instead, API references are usually generated automatically
    using sphinx, which can parse your source code to extract Python objects and their
    docstrings and render them into an API reference. We''ll demonstrate how to do
    this in [Section 3.8.4](#section-3.8.4).


