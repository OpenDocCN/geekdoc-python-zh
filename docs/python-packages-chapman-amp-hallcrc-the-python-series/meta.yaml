    # 4.3 Package distribution and installation


    In this section, we won’t be writing any code, but rather we will discuss theory
    related to package distribution and installation for those interested. If that’s
    not you, feel free to skip to **Section 4.4**.


    As we saw in **Chapter 3: How to package a Python**, the typical workflow for
    developing and distributing a Python packages is as follows:


    +   1. A *developer* creates a Python package on their machine.

    2. The *developer* uses a tool like `poetry` to build a distribution from that
    package.

    3. The *developer* shares the distribution, usually by uploading to an online
    repository like PyPI<sup>24</sup>.


