- md: "## 6.3 Building documentation\n\nThe final document in the ToC, “autoapi/index”\
    \ is an API reference sheet that will be generated automatically for us, from\
    \ our package structure and docstrings, when we build our documentation with sphinx.\n\
    \nBefore we can go ahead and build our documentation with sphinx, it relies on\
    \ a few sphinx extensions that need to be installed and configured:\n\n- myst-nb:\
    \ extension that enables sphinx to parse Markdown, MyST, and notebook files (sphinx\
    \ only supports reStructuredTex, .rst files, by default).\n- sphinx-rtd-theme:\
    \ a custom theme for styling the way our documentation will look. It looks much\
    \ better than the sphinx default.\n- sphinx-autoapi: extension that will parse\
    \ our source code and docstrings to create an API reference sheet.\n- sphinx.ext.napoleon:\
    \ enables sphinx to parse numpydoc style docstrings.\n- sphinx.ext.viewcode: adds\
    \ a helpful link to the source code of each object in the API reference sheet.\n\
    \nThese extensions are not necessary to create documentation with sphinx, but\
    \ they are all commonly used in Python packaging documentation and significantly\
    \ improve the look and user-experience of the generated documentation. Extensions\
    \ without the sphinx.ext prefix need to be installed. We can install them as development\
    \ dependencies in a poetry-managed project with the following command:\n\n```\n\
    $ poetry add --dev myst-nb --python \"^3.9\"\n$ poetry add --dev sphinx-autoapi\
    \ sphinx-rtd-theme\n```\n\n> Adding myst-nb is a great example of why upper caps\
    \ on dependency versions can be a pain, as we discussed in Section 3.6.1. At the\
    \ time of writing, one of the dependencies of myst-nb, mdit-py-plugins, has an\
    \ upper cap of <4.0 on the Python version it requires, so it’s not compatible\
    \ with our package which supports Python >=3.9. Thus, unless mdit-py-plugins removes\
    \ this upper cap, the easiest way for us to add myst-nb is to tell poetry to only\
    \ install it for Python versions ^3.9 (i.e., >=3.9 and <4.0), by using the argument\
    \ --python \"^3.9\".\n\n24 https://myst-nb.readthedocs.io/en/latest/\n25 https://sphinx-rtd-theme.readthedocs.io/en/stable/\n\
    26 https://sphinx-autoapi.readthedocs.io/en/latest/\n27 https://sphinxcontrib-napoleon.readthedocs.io/en/latest/\n\
    28 https://www.sphinx-doc.org/en/master/usage/extensions/viewcode.html\n\nOnce\
    \ installed, any extensions you want to use need to be added to a list called\
    \ `extensions` in the `conf.py` configuration file and configured. Configuration\
    \ options for each extension (if they exist) can be viewed in their respective\
    \ documentation, but the `py-pkgs-cookiecutter` has already taken care of everything\
    \ for us, by defining the following variables within `conf.py`:\n\n```\nextensions\
    \ = [\n    \"myst_nb\",\n    \"autoapi.extension\",\n    \"sphinx.ext.napoleon\"\
    ,\n    \"sphinx.ext.viewcode\",\n]\nautoapi_dirs = [\"../src\"]  # location to\
    \ parse for API reference\nhtml_theme = \"sphinx_rtd_theme\"\n```\n\nWith our\
    \ documentation structure set up, and our extensions configured, we can now navigate\
    \ to the `docs/` directory and build our documentation with sphinx using the following\
    \ commands:\n\n```\n$ cd docs\n$ make html\n```\n\n```\nRunning Sphinx\n...\n\
    build succeeded.\nThe HTML pages are in _build/html.\n```\n\nIf we now look inside\
    \ our `docs/` directory we see a new directory `_build/html`, which contains our\
    \ built documentation as HTML files. If you open `_build/html/index.html` you\
    \ should see the landing page in Fig. 6.6.\n\n> If you make significant changes\
    \ to your documentation, it can be a good idea to delete the `_build/` folder\
    \ before building it again. You can do this easily by adding the `clean` option\
    \ into the `make html` command: `make clean html`.\n\nThe `sphinx-autoapi` and\
    \ `sphinx.ext.napoleon` extensions extracted the docstrings within each module\
    \ and rendered them into our documentation. If you click “API Reference”, you\
    \ should now be able to view pages like those shown in Fig. 6.4 and Fig. 6.5.\n\
    \nIf you navigate to the “Example usage” page, you should see a rendered version\
    \ of our Jupyter Notebook example, as shown in Fig. 6.7. This was made possible\
    \ using the myst-nb extension.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_181_0.png)\n\
    \n**FIGURE 6.7:** Jupyter Notebook example rendered into pycounts’s documentation.\n\
    \nUltimately, you can efficiently make beautiful and many-featured documentation\
    \ with sphinx and its ecosystem of extensions. You can now use this documentation\
    \ yourself or potentially share it with others, but it really shines when you\
    \ host it on the web using a free service like Read the Docs<sup>29</sup>, as\
    \ we’ll do in the next section.\n\n<sup>29</sup>https://readthedocs.org/\n\n##\
    \ 6.4 Hosting documentation online\n\nIf you intend to share your package with\
    \ others, it will be useful to make your documentation accessible online. It’s\
    \ common to host Python package documentation on the free online hosting service\
    \ Read the Docs<sup>30</sup>, which can automate the building, deployment, and\
    \ hosting of your documentation. Read the Docs works by connecting to an online\
    \ repository hosting your package documentation, such as a GitHub repository.\
    \ When you push changes to your repository, Read the Docs automatically builds\
    \ a fresh copy of your documentation (i.e., runs `make html`) and hosts it at\
    \ the URL https://pkgname.readthedocs.io/ (you can also configure Read the Docs\
    \ to use a custom domain name). This means that any changes you make to your documentation\
    \ source files are immediately deployed to your users. If you need your documentation\
    \ to be private (i.e., only available to employees of a company), Read the Docs\
    \ offers a paid “Business plan” with this functionality.\n\nGitHub Pages<sup>31</sup>\
    \ is another popular service used for hosting documentation from a repository.\
    \ However, it doesn’t natively support automatic building of your documentation\
    \ when you push changes to the source files, which is why we prefer to use Read\
    \ the Docs here. If you did want to host your docs on GitHub Pages, we recommend\
    \ using the ghp-import<sup>32</sup> package, or setting up an automated GitHub\
    \ Actions workflow using the peaceiris/actions-gh-pages<sup>33</sup> action (we’ll\
    \ learn more about GitHub Actions in **Chapter 8: Continuous integration and deployment**).\n\
    \nThe Read the Docs<sup>34</sup> documentation will provide the most up-to-date\
    \ steps required to host your documentation online. For our `pycounts` package,\
    \ this involved the following steps:\n\n1. Visit https://readthedocs.org/ and\
    \ click on “Sign up”.\n2. Select “Sign up with GitHub”.\n3. Click “Import a Project”.\n\
    4. Click “Import Manually”.\n5. Fill in the project details by:\n    * Providing\
    \ your package name (e.g., pycounts).\n    * The GitHub repository URL (e.g.,\
    \ https://github.com/TomasBeuzen/pycounts).\n    * Specifying the default branch\
    \ as main.\n6. Click “Next” and then “Build version”.\n\nAfter following the steps\
    \ above, your documentation should be successfully built by Read the Docs<sup>35</sup>,\
    \ and you should be able to access it via the “View Docs” button on the build\
    \ page. For example, the documentation for pycounts is now available at https://pycounts.readthedocs.io/en/latest/.\
    \ This documentation will be automatically re-built by Read the Docs each time\
    \ you push changes to the specified default branch of your GitHub repository.\n\
    \n> The .readthedocs.yml file that py-pkgs-cookiecutter created for us in the\
    \ root directory of our Python package contains the configuration settings necessary\
    \ for Read the Docs to properly build our documentation. It specifies what version\
    \ of Python to use and tells Read the Docs that our documentation requires the\
    \ extra packages specified in pycounts/docs/requirements.txt to be generated correctly.\n\
    \n![](img/d3840bdab18c2309faf9de63e70c539d_184_0.png)\n\n# Taylor & Francis\n\n\
    Taylor & Francis Group\n\nhttp://taylorandfrancis.com"
  mdcn: "## 6.3 构建文档\n\n目录中的最后一个文档“autoapi/index”是一个API参考手册，当我们使用sphinx构建文档时，它会根据我们的包结构和文档字符串自动生成。\n\
    \n在我们使用sphinx构建文档之前，它依赖于一些需要安装和配置的sphinx扩展：\n\n- myst-nb：使sphinx能够解析Markdown、MyST和notebook文件的扩展（sphinx默认只支持reStructuredTex，即.rst文件）。\n\
    - sphinx-rtd-theme：一个用于设置文档外观样式的自定义主题。它比sphinx的默认主题好看得多。\n- sphinx-autoapi：解析我们的源代码和文档字符串以创建API参考手册的扩展。\n\
    - sphinx.ext.napoleon：使sphinx能够解析numpydoc风格的文档字符串。\n- sphinx.ext.viewcode：在API参考手册中为每个对象的源代码添加一个有用的链接。\n\
    \n这些扩展对于使用sphinx创建文档并非必需，但它们在Python包文档中都很常用，并且能显著改善生成文档的外观和用户体验。没有sphinx.ext前缀的扩展需要安装。我们可以在poetry管理的项目中将它们作为开发依赖项安装，使用以下命令：\n\
    \n```\n$ poetry add --dev myst-nb --python \"^3.9\"\n$ poetry add --dev sphinx-autoapi\
    \ sphinx-rtd-theme\n```\n\n> 添加myst-nb是一个很好的例子，说明了为什么依赖版本的上限可能会带来麻烦，正如我们在3.6.1节中讨论的那样。在撰写本文时，myst-nb的一个依赖项mdit-py-plugins对其所需的Python版本有<4.0的上限，因此它与我们支持Python\
    \ >=3.9的包不兼容。因此，除非mdit-py-plugins移除这个上限，否则我们添加myst-nb最简单的方法是告诉poetry只为Python版本^3.9（即>=3.9且<4.0）安装它，使用参数--python\
    \ \"^3.9\"。\n\n24 https://myst-nb.readthedocs.io/en/latest/\n25 https://sphinx-rtd-theme.readthedocs.io/en/stable/\n\
    26 https://sphinx-autoapi.readthedocs.io/en/latest/\n27 https://sphinxcontrib-napoleon.readthedocs.io/en/latest/\n\
    28 https://www.sphinx-doc.org/en/master/usage/extensions/viewcode.html\n\n安装后，任何你想要使用的扩展都需要添加到`conf.py`配置文件中一个名为`extensions`的列表中，并进行配置。每个扩展的配置选项（如果存在）可以在其各自的文档中查看，但`py-pkgs-cookiecutter`已经通过在`conf.py`中定义以下变量为我们处理好了一切：\n\
    \n```\nextensions = [\n    \"myst_nb\",\n    \"autoapi.extension\",\n    \"sphinx.ext.napoleon\"\
    ,\n    \"sphinx.ext.viewcode\",\n]\nautoapi_dirs = [\"../src\"]  # 要解析以生成API参考的位置\n\
    html_theme = \"sphinx_rtd_theme\"\n```\n\n文档结构设置好并配置好扩展后，我们现在可以导航到`docs/`目录，并使用以下命令使用sphinx构建文档：\n\
    \n```\n$ cd docs\n$ make html\n```\n\n```\nRunning Sphinx\n...\nbuild succeeded.\n\
    The HTML pages are in _build/html.\n```\n\n如果我们现在查看`docs/`目录内部，会看到一个新的目录`_build/html`，其中包含我们构建好的文档，格式为HTML文件。如果你打开`_build/html/index.html`，应该会看到图6.6所示的着陆页。\n\
    \n> 如果你对文档进行了重大更改，在重新构建之前删除`_build/`文件夹可能是个好主意。你可以通过将`clean`选项添加到`make html`命令中轻松完成此操作：`make\
    \ clean html`。\n\n`sphinx-autoapi`和`sphinx.ext.napoleon`扩展提取了每个模块中的文档字符串，并将其渲染到我们的文档中。如果你点击“API\
    \ Reference”，现在应该能够查看如图6.4和图6.5所示的页面。\n\n如果你导航到“Example usage”页面，应该会看到我们Jupyter\
    \ Notebook示例的渲染版本，如图6.7所示。这得益于myst-nb扩展得以实现。\n\n![](img/d3840bdab18c2309faf9de63e70c539d_181_0.png)\n\
    \n**图6.7：** 渲染到pycounts文档中的Jupyter Notebook示例。\n\n最终，你可以使用sphinx及其扩展生态系统高效地创建美观且功能丰富的文档。你现在可以自己使用此文档，或者可能与他人分享，但当它通过像Read\
    \ the Docs<sup>29</sup>这样的免费服务托管在网络上时，它才真正大放异彩，我们将在下一节中进行介绍。\n\n<sup>29</sup>https://readthedocs.org/\n\
    \n## 6.4 在线托管文档\n\n如果你打算与他人分享你的包，将你的文档在线访问会很有用。通常将Python包文档托管在免费的在线托管服务Read the\
    \ Docs<sup>30</sup>上，它可以自动化构建、部署和托管你的文档。Read the Docs通过连接到托管你的包文档的在线仓库（如GitHub仓库）来工作。当你将更改推送到你的仓库时，Read\
    \ the Docs会自动构建一份新的文档副本（即运行`make html`），并将其托管在URL https://pkgname.readthedocs.io/（你也可以配置Read\
    \ the Docs使用自定义域名）。这意味着你对文档源文件所做的任何更改都会立即部署给你的用户。如果你需要文档是私有的（即仅对公司员工可用），Read the\
    \ Docs提供付费的“Business plan”来实现此功能。\n\nGitHub Pages<sup>31</sup>是另一个用于从仓库托管文档的流行服务。然而，它不原生支持在你将更改推送到源文件时自动构建文档，这就是为什么我们在这里更喜欢使用Read\
    \ the Docs。如果你确实想在GitHub Pages上托管文档，我们建议使用ghp-import<sup>32</sup>包，或者设置一个使用peaceiris/actions-gh-pages<sup>33</sup>操作的自动化GitHub\
    \ Actions工作流（我们将在**第8章：持续集成和部署**中了解更多关于GitHub Actions的内容）。\n\nRead the Docs<sup>34</sup>文档将提供在线托管文档所需的最新步骤。对于我们的`pycounts`包，这涉及以下步骤：\n\
    \n1. 访问 https://readthedocs.org/ 并点击“Sign up”。\n2. 选择“Sign up with GitHub”。\n\
    3. 点击“Import a Project”。\n4. 点击“Import Manually”。\n5. 填写项目详细信息：\n    * 提供你的包名（例如，pycounts）。\n\
    \    * GitHub仓库URL（例如，https://github.com/TomasBeuzen/pycounts）。\n    * 将默认分支指定为main。\n\
    6. 点击“Next”，然后点击“Build version”。\n\n按照上述步骤操作后，你的文档应该会被Read the Docs<sup>35</sup>成功构建，你应该能够通过构建页面上的“View\
    \ Docs”按钮访问它。例如，pycounts的文档现在可以在https://pycounts.readthedocs.io/en/latest/访问。每次你将更改推送到GitHub仓库的指定默认分支时，Read\
    \ the Docs都会自动重新构建此文档。\n\n> py-pkgs-cookiecutter在我们的Python包根目录中为我们创建的.readthedocs.yml文件包含了Read\
    \ the Docs正确构建我们文档所需的配置设置。它指定了要使用的Python版本，并告诉Read the Docs我们的文档需要pycounts/docs/requirements.txt中指定的额外包才能正确生成。\n\
    \n![](img/d3840bdab18c2309faf9de63e70c539d_184_0.png)\n\n# Taylor & Francis\n\n\
    Taylor & Francis Group\n\nhttp://taylorandfrancis.com"
