    # 7.3 Checklist for releasing a new package version


    ```

    $ git commit -m "feat: add example data and datasets module"

    $ git commit -m "test: add additional tests for all modules"

    $ git commit -m "fix: check input type to plot_words function"

    ```


    As we discussed in **Section 7.2.2**, PSR can automatically parse these commit
    messages to increment our package version for us. If you haven''t already, install
    PSR as a development dependency using poetry:


    > If you''re following on from **Chapter 3: How to package a Python** and created
    a virtual environment for your pycounts package using conda, as we did in **Section
    3.5.1**, be sure to activate that environment before continuing by running conda
    activate pycounts at the command line.


    ```

    $ poetry add --dev python-semantic-release

    ```


    This command updated our recorded package dependencies in pyproject.toml and poetry.lock,
    so we should commit those changes to version control before we update our package
    version:


    ```

    $ git add pyproject.toml poetry.lock

    $ git commit -m "build: add PSR as dev dependency"

    $ git push

    ```


    Now we can use PSR to automatically bump our package version with the semantic-release
    version command. If you want to see exactly what PSR found in your commit messages
    and why it decided to make a patch, minor, or major release, you can add the argument
    -v DEBUG.


    > Recall from **Section 7.2.2** that to use PSR, you need to tell it where your
    package''s version number is stored by defining version_variable = "pyproject.toml:version"
    under the [tool.semantic_release] table in pyproject.toml.'
