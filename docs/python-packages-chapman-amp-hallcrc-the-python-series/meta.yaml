    # 3.2.2 Creating a package structure


    Most developers use a pre-made template to set up the directory structure of a
    Python package. We will use the cookiecutter tool (which we installed in **Section
    2.2.2**) to create our package structure for us.


    cookiecutter is a tool for populating a directory structure from a pre-made template.
    People have developed and open-sourced many cookiecutter templates for different
    projects, such as for creating Python packages, R packages, websites, and more.
    You can find these templates by, for example, searching an online hosting service
    like GitHub². We have developed our own py-pkgs-cookiecutter Python package template
    to support this book; it is hosted on GitHub³.


    To use this template to create a package directory structure, you can navigate
    to the directory where you want to create your package from the command line,
    and then run the command below. Upon executing this command you will be prompted
    to provide information that will be used to create your package file and directory
    structure. We provide an example of how to respond to these prompts below and
    an explanation of what they mean in **Table 3.1**.


    ```

    $ cookiecutter https://github.com/py-pkgs/py-pkgs-cookiecutter.git

    ```


    ```

    author_name [Monty Python]: Tomas Beuzen

    package_name [mypkg]: pycounts

    package_short_description []: Calculate word counts in a text file!

    package_version [0.1.0]:

    python_version [3.9]:

    Select open_source_license:

    1 - MIT

    2 - Apache License 2.0

    ```'
