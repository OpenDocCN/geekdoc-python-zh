    \ with our package and its other dependencies which all support Python >=3.9.\
    \ Thus, unless mdit-py-plugins removes this upper cap, the easiest way for us\
    \ to add myst-nb is to tell poetry to only install it for Python versions ~3.9\
    \ (i.e., >=3.9 and <4.0), by using the argument --python \"^3.9\".\n\nOnce installed,\
    \ any extensions you want to use need to be added to a list called extensions\
    \ in the conf.py configuration file and configured. Configuration options for\
    \ each extension (if they exist) can be viewed in their respective documentation,\
