- md: '## 4 Package structure and distribution


    So the question is, how do we provide the `{package}` and `{package}-{version}.dist-info`
    directories necessary to install our package? There are two options:


    1.  Create a single archive of all our package source code, metadata, and instructions
    on how to create the `{package}` and `{package}-{version}.dist-info` directories,
    and then share that archive with users. This is called a source distribution or
    sdist. To install your package from an sdist, a user needs to download the archive,
    unpack it, and use the included build instructions to build it into the `{package}`
    and `{package}-{version}.dist-info` directories on their own computer (we''ll
    talk about how these directories are “built” in Section 4.3.2). Finally, the package
    is installed by copying these directories to the `site-packages/` directory.

    2.  Build the `{package}` and `{package}-{version}.dist-info` directories on our
    own machine, compress them into a single file, and share them with users. This
    single file is called a wheel. A user just needs to download the wheel and extract
    the contents to the `site-packages/` folder; no build step is necessary.


    `pip install` can handle installation from an sdist or a wheel, but distributing
    your package to users as a wheel (option 2) certainly seems preferable; everything
    has already been done on the developer''s side and installation just involves
    downloading the distribution and copying it to the appropriate location on a user''s
    computer. This is why wheels are the preferred distribution format for Python
    packages. In fact, when you run `pip install <some-package>`, it will always prioritize
    installing the specified package from a wheel (if it exists).


    At this point you might be wondering why we bother with sdists at all. The reason
    is that wheels aren''t always available to users. Some Python packages contain
    “extensions” written in other languages, such as C/C++, because they offer functionality
    and performance enhancements. While Python is typically referred to as an interpreted
    language (i.e., your Python code is translated to machine code as it is executed),
    languages such as C/C++ require compilation by a compiler program before they
    can be used (i.e., your code must be translated into “machine code” before it
    can be executed). Compilation is platform-specific. Thus, if a developer wanted
    to provide wheels of a package that included extensions in another language, they
    would have to generate one wheel for each platform they wanted to support (e.g.,
    MacOS-arm64, MacOS-x86, Win-32, Win-amd64, etc.). For this reason, sdists are
    usually provided with wheels; if a wheel isn''t available for a user''s particular
    platform, they will still be able to build the package from the sdist (which would
    require that they have the appropriate compiling program(s)).


    ## 4.3 Package distribution and installation


    As an example, the popular numpy package contains extensions written in C, so
    its wheels are platform-specific. Wheels have a specific naming convention (described
    in PEP 427<sup>27</sup>), which includes the name of the platform they support;
    if you look at numpy''s distributions on PyPI<sup>28</sup>, you''ll see wheels
    for common platforms, as well as an sdist at the bottom of the list.


    Wheels specific to a platform are known as “platform wheels”. However, the vast
    majority of Python packages use pure Python code (i.e., they don''t include extensions
    written in other languages), and so don''t need to worry about generating platform
    wheels. Most developers and readers of this book will only ever generate one wheel
    for their package: a “universal wheel” (compatible with Python 2 and 3) or a “pure
    Python wheel” (compatible with either Python 2 or 3). The build tool you use to
    make your distributions will handle wheel creation for you (as we''ll talk about
    in the next section), so it''s not something you need to worry about, but it''s
    interesting to know these things!


    ### 4.3.2 Building sdists and wheels


    In the previous section we talked about how packages need to generate {package}
    and {package}-{version}.dist-info folders to be installed, and how a wheel is
    a single archive containing these files. So how exactly do we build a wheel?


    In a nutshell the build process involves: 1. Developer builds the package source
    into an sdist{distribution!sdists}; 2. Developer or user builds a wheel from the
    sdist; 3. Users installs the wheel{distribution!wheel}.


    The build steps here are where packaging tools like poetry, flit, or setuptools
    come in. These tools provide the code required to build sdists and wheels. Recall
    the pyproject.toml file poetry uses to manage package development. One table in
    that file we did not talk about when we introduced the file in Section 3.5.2 is
    [build-system]:


    ```

    ...other file content hidden...


    [build-system]

    requires = ["poetry-core>=1.0.0"]

    build-backend = "poetry.core.masonry.api"

    ```


    This table specifies the tools required to build the sdist and wheel for a package
    (requires) and where the functions that actually do the build are located in a
    build-tool''s library (build-backend). For example, the table above shows that
    the poetry-core library is required to build our package, and that the building
    functions are located in poetry.core.masonry.api. If you take a look at the source
    code of poetry-core''s poetry.core.masonry.api module<sup>29</sup>, you''ll see
    functions like build_wheel() and build_sdist(). The exact building mechanics are
    beyond the scope of this book, so we wont go into detail about how they work.
    However, as a packaging book, it would be remiss not to mention that the ability
    to specify the build tools required to make sdists and wheels of a package is
    a relatively new development in the packaging ecosystem. This functionality was
    introduced in PEP 517<sup>30</sup> and PEP 518<sup>31</sup>, to remove the dependency
    of the packaging system on legacy tools. These PEPs are an interesting read for
    those keen on digging into more of the low-level details of building and installing
    package distributions.


    ### 4.3.3 Packaging tools


    The focus of this book is on workflows and tools that make packaging accessible
    and efficient. poetry is one of those tools; it abstracts the lower-level details
    of package development away from the developer so they can focus on writing code.
    poetry is completely configured by a single pyproject.toml file and has intuitive
    commands to install a package (poetry install), manage dependencies (poetry add),
    build distributions (poetry build), and publish those distributions to a repository
    like PyPI (poetry publish).


    An alternative modern packaging tool is flit. flit is essentially a stripped-down
    version of poetry. It is also managed by a pyproject.toml file and provides commands
    similar to poetry to help install a package (flit install), build distributions
    (flit build), and publish those distributions to a repository like PyPI (flit
    publish). The main difference between flit and poetry is that flit doesn''t automatically
    manage the dependencies of your project like poetry does; you have to manually
    add dependencies and their version specifications to pyproject.toml. As a result,
    we prefer poetry because it means there''s one less thing to worry about!


    The downside of poetry and flit is that, at the time of writing, they only support
    pure Python packages and not packages that contain extensions written in other
    languages, which we discussed in Section 4.3.1. This is completely fine for the
    vast majority of developers. However, for those looking to build more advanced
    packages that include non-Python code, setuptools is the preferred option. For
    a long time, setuptools was the default build tool for Python packages so it is
    still used by many projects that have been around for a while. setuptools require
    a little more expertise to configure than poetry or


    <sup>27</sup>https://www.python.org/dev/peps/pep-0427/

    <sup>28</sup>https://pypi.org/project/numpy/#files

    <sup>29</sup>https://github.com/python-poetry/poetry-core/blob/master/src/poetry/core/masonry/api.py

    <sup>30</sup>https://www.python.org/dev/peps/pep-0517/

    <sup>31</sup>https://www.python.org/dev/peps/pep-0518/'
  mdcn: '## 4 包结构与分发


    那么问题来了，我们如何提供安装包所需的 `{package}` 和 `{package}-{version}.dist-info` 目录呢？有两种选择：


    1.  创建一个包含所有包源代码、元数据以及如何创建 `{package}` 和 `{package}-{version}.dist-info` 目录说明的单一归档文件，然后将该归档文件分享给用户。这被称为源码分发或
    sdist。要从 sdist 安装你的包，用户需要下载归档文件，解压它，并使用其中包含的构建说明，在自己的计算机上将其构建为 `{package}` 和 `{package}-{version}.dist-info`
    目录（我们将在第 4.3.2 节讨论这些目录是如何“构建”的）。最后，通过将这些目录复制到 `site-packages/` 目录来完成安装。

    2.  在我们自己的机器上构建 `{package}` 和 `{package}-{version}.dist-info` 目录，将它们压缩成一个文件，并分享给用户。这个单一文件被称为
    wheel。用户只需下载 wheel 并将内容解压到 `site-packages/` 文件夹；无需构建步骤。


    `pip install` 可以处理从 sdist 或 wheel 安装，但将你的包作为 wheel（选项 2）分发给用户显然更可取；所有工作都已在开发者端完成，安装只涉及下载分发包并将其复制到用户计算机上的相应位置。这就是为什么
    wheel 是 Python 包的首选分发格式。事实上，当你运行 `pip install <some-package>` 时，它总是会优先从 wheel（如果存在）安装指定的包。


    此时你可能会想，为什么我们还要费心使用 sdist。原因是 wheel 并不总是对用户可用。一些 Python 包包含用其他语言（如 C/C++）编写的“扩展”，因为它们提供了功能和性能增强。虽然
    Python 通常被称为解释型语言（即你的 Python 代码在执行时被翻译成机器码），但像 C/C++ 这样的语言需要在使用前由编译器程序进行编译（即你的代码必须在执行前被翻译成“机器码”）。编译是特定于平台的。因此，如果开发者想提供包含其他语言扩展的包的
    wheel，他们必须为想要支持的每个平台（例如 MacOS-arm64、MacOS-x86、Win-32、Win-amd64 等）生成一个 wheel。因此，sdist
    通常与 wheel 一起提供；如果用户的特定平台没有可用的 wheel，他们仍然可以从 sdist 构建包（这需要他们拥有相应的编译程序）。


    ## 4.3 包分发与安装


    例如，流行的 numpy 包包含用 C 编写的扩展，因此其 wheel 是特定于平台的。Wheel 有特定的命名约定（在 PEP 427<sup>27</sup>
    中描述），其中包括它们支持的平台名称；如果你查看 PyPI<sup>28</sup> 上的 numpy 分发包，你会看到适用于常见平台的 wheel，以及列表底部的
    sdist。


    特定于平台的 wheel 被称为“平台 wheel”。然而，绝大多数 Python 包使用纯 Python 代码（即它们不包含用其他语言编写的扩展），因此不需要担心生成平台
    wheel。大多数开发者和本书的读者只会为他们的包生成一个 wheel：“通用 wheel”（兼容 Python 2 和 3）或“纯 Python wheel”（兼容
    Python 2 或 3）。你用来制作分发包的构建工具会为你处理 wheel 的创建（我们将在下一节讨论），所以这不是你需要担心的事情，但了解这些事情很有趣！


    ### 4.3.2 构建 sdist 和 wheel


    在上一节中，我们讨论了包需要生成 {package} 和 {package}-{version}.dist-info 文件夹才能安装，以及 wheel 是一个包含这些文件的单一归档文件。那么我们到底如何构建
    wheel 呢？


    简而言之，构建过程包括：1. 开发者将包源代码构建为 sdist{分发!sdist}；2. 开发者或用户从 sdist 构建 wheel；3. 用户安装 wheel{分发!wheel}。


    这里的构建步骤就是像 poetry、flit 或 setuptools 这样的打包工具发挥作用的地方。这些工具提供了构建 sdist 和 wheel 所需的代码。回想一下
    poetry 用来管理包开发的 pyproject.toml 文件。在第 3.5.2 节介绍该文件时，我们没有讨论该文件中的一个表格 [build-system]：


    ```

    ...other file content hidden...


    [build-system]

    requires = ["poetry-core>=1.0.0"]

    build-backend = "poetry.core.masonry.api"

    ```


    此表指定了构建包的 sdist 和 wheel 所需的工具（requires）以及实际执行构建的函数在构建工具库中的位置（build-backend）。例如，上面的表格显示构建我们的包需要
    poetry-core 库，并且构建函数位于 poetry.core.masonry.api 中。如果你查看 poetry-core 的 poetry.core.masonry.api
    模块<sup>29</sup> 的源代码，你会看到像 build_wheel() 和 build_sdist() 这样的函数。具体的构建机制超出了本书的范围，因此我们不会详细讨论它们的工作原理。然而，作为一本打包书籍，不提及能够指定构建包
    sdist 和 wheel 所需工具的能力是打包生态系统中相对较新的发展，这是不妥的。此功能在 PEP 517<sup>30</sup> 和 PEP 518<sup>31</sup>
    中引入，以消除打包系统对遗留工具的依赖。对于那些热衷于深入了解构建和安装包分发包更多底层细节的人来说，这些 PEP 是有趣的读物。


    ### 4.3.3 打包工具


    本书的重点是使打包变得易于访问和高效的工作流程和工具。poetry 就是这些工具之一；它将包开发的底层细节抽象出来，让开发者可以专注于编写代码。poetry
    完全通过单个 pyproject.toml 文件配置，并具有直观的命令来安装包（poetry install）、管理依赖项（poetry add）、构建分发包（poetry
    build）以及将这些分发包发布到像 PyPI 这样的仓库（poetry publish）。


    另一种现代打包工具是 flit。flit 本质上是 poetry 的精简版。它也由 pyproject.toml 文件管理，并提供类似于 poetry 的命令来帮助安装包（flit
    install）、构建分发包（flit build）以及将这些分发包发布到像 PyPI 这样的仓库（flit publish）。flit 和 poetry
