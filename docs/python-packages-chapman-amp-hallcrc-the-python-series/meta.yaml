    \ it's first helpful to understand the big-picture documentation workflow and\
    \ what we're aiming to build.\n\nThe typical workflow for documenting a Python\
    \ package consists of three steps:\n\n1.  **Write documentation**: manually write\
    \ the documentation source files that will support your package, such as those\
    \ listed in Table 6.1. These are usually written in a plain-text format like Markdown<sup>1</sup>\
