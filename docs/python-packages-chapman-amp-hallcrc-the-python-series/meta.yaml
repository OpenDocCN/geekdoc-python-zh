    \n使用 sphinx 构建此类文档的源文件和配置文件通常位于包根目录的 `docs/` 目录中。py-pkgs-cookiecutter 自动为我们创建了此目录和必要的文件。我们将在下面讨论这些文件各自的用途。\n\
