    \ Build documentation\n  run: poetry run make html --directory docs/\n```\n\n\
    ## 8.4.5 测试持续集成\n\n我们现在已设置好 CI 流水线！我们最终的 `.github/workflows/ci-cd.yml` 文件如下所示：\n\
    \n```yaml\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n  ci:\n    # Set\
    \ up operating system\n    runs-on: ubuntu-latest\n\n    # Define job steps\n\
    \    steps:\n    - name: Set up Python 3.9\n      uses: actions/setup-python@v2\n\
    \      with:\n        python-version: 3.9\n\n    - name: Check-out repository\n\
    \      uses: actions/checkout@v2\n\n    - name: Install poetry\n      uses: snok/install-poetry@v1\n\
    \n    - name: Install package\n      run: poetry install\n\n    - name: Test with\
    \ pytest\n      run: poetry run pytest tests/ --cov=pycounts --cov-report=xml\n\
    \n    - name: Use Codecov to track coverage\n      uses: codecov/codecov-action@v2\n\
    \      with:\n        files: ./coverage.xml   # coverage report\n\n    - name:\
    \ Build documentation\n      run: poetry run make html --directory docs/\n```\n\
    \n我们现在准备好测试我们的工作流了！让我们继续将工作流文件提交到版本控制并推送到 GitHub。这将触发我们的工作流，因为我们配置它在有人将新工作推送到仓库的任何分支时运行。\n\
    \n```bash\n$ git add .github/workflows/ci-cd.yml\n$ git commit -m \"build: add\
