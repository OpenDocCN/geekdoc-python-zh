    \ 会自动与你有权访问的所有仓库同步。现在，要使用 Codecov 在我们的 CI 工作流中自动跟踪代码覆盖率，我们可以使用他们创建的名为 codecov/codecov-action@v2<sup>15</sup>\
    \ 的操作，如下所示：\n\n> 如果你的 GitHub 仓库是私有的，你需要提供一个“上传令牌”以允许 Codecov 访问它，如 Codecov 文档<sup>16</sup>中所述。\n\
