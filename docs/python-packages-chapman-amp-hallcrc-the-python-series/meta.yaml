    \ CI 工作流中跟踪代码覆盖率。\n\n<sup>12</sup> https://codecov.io/\n\n为此，我们可以将覆盖率打印到运行器的构建日志中，但将覆盖率埋没在那些日志中并没有太大帮助。相反，通常使用像\
    \ Codecov<sup>13</sup> 这样的服务来为我们跟踪代码覆盖率。要设置 Codecov，首先通过将其与你的 GitHub 帐户关联来创建一个\
