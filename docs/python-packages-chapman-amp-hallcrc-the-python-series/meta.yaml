    \ but this is how Python packages are typically set up. We'll explore this structure\
    \ more in the rest of this chapter and discuss it in detail in **Chapter 4: Package\
    \ structure and distribution**.\n\n### 3.2.2 Creating a package structure\n\n\
    Most developers use a pre-made template to set up the directory structure of a\
    \ Python package. We will use the `cookiecutter` tool (which we installed in **Section\
    \ 2.2.2**) to create our package structure for us.\n\n`cookiecutter` is a tool\
    \ for populating a directory structure from a pre-made template. People have developed\
    \ and open-sourced many `cookiecutter` templates for different projects, such\
    \ as for creating Python packages, R packages, websites, and more. You can find\
    \ these templates by, for example, searching an online hosting service like GitHub².\
    \ We have developed our own `py-pkgs-cookiecutter` Python package template to\
    \ support this book; it is hosted on GitHub³.\n\nTo use this template to create\
    \ a package directory structure, you can navigate to the directory where you want\
    \ to create your package from the command line, and then run the command below.\
    \ Upon executing this command you will be prompted to provide information that\
    \ will be used to create your package file and directory structure. We provide\
