  md: '# 2.5.3 RStudio


    Users with an R background may prefer to stay in the RStudio IDE. We recommend
    installing the most recent version of the IDE from the RStudio website<sup>27</sup>
    (we recommend installing at least version ^1.4) and then installing the most recent
    version of R from CRAN<sup>28</sup>. To use Python in RStudio, you will need to
    install the reticulate<sup>29</sup> R package by typing the following in the R
    console inside RStudio:


    ```

    install.packages("reticulate")

    ```


    When installing reticulate, you may be prompted to install the Anaconda distribution.
    We already installed the Miniconda distribution of Python in **Section 2.2.1**,
    so answer “no” to this prompt. Before being able to use Python in RStudio, you
    will need to configure reticulate. We will briefly describe how to do this for
    different operating systems below, but we encourage you to look at the reticulate
    documentation<sup>30</sup> for more help.


    # Mac and Linux


    +   1. Find the path to the Python interpreter installed with Miniconda by typing
    `which python` at the command line.

    2. Open (or create) an `.Rprofile` file in your HOME directory and add the line
    `Sys.setenv(RETICULATE_PYTHON = "path_to_python")`, where `"path_to_python"` is
    the path identified in step 1.

    3. Open (or create) a `.bash_profile` file in your HOME directory and add the
    line `export PATH="/opt/miniconda3/bin:$PATH"`, replacing `/opt/miniconda3/bin`
    with the path you identified in step 1 but without the `python` at the end.

    4. Restart R.

    5. Try using Python in RStudio by running the following in the R console:


    ```

    library(reticulate)

    repl_python()

    ```


    # Windows


    +   1. Find the path to the Python interpreter installed with Miniconda by opening
    an Anaconda Prompt from the Start Menu and typing `where python` in a terminal.'
