    Now we should be able to visit our package on TestPyPI. The URL for our pycounts
    package is: [https://test.pypi.org/project/pycounts/](https://test.pypi.org/project/pycounts/).
    We can try installing our package using pip from the command line with the following
    command:


    ```

    $ pip install --index-url https://test.pypi.org/simple/ \n    --extra-index-url
    https://pypi.org/simple \n    pycounts

    ```


    By default `pip install` will search PyPI for the named package. However, we want
    to search TestPyPI because that is where we uploaded our package. The argument
    `--index-url` points pip to the TestPyPI index. However, it''s important to note
    that not all developers upload their packages to TestPyPI; some only upload them
    directly to PyPI. If your package depends on packages that are not on TestPyPI
    you can tell pip to try and look for them on PyPI instead. To do that, you can
    use the argument `--extra-index-url` as we do in the command above.


    # 3.10.3 Publishing to PyPI


    If you were able to upload your package to TestPyPI and install it without error,
    you''re ready to publish your package to PyPI. You can publish to PyPI using the
    `poetry publish` command without any arguments:


    ```

    $ poetry publish

    ```


    Your package will then be available on PyPI (e.g., [https://pypi.org/project/pycounts/](https://pypi.org/project/pycounts/))
    and can be installed by anyone using pip:


    ```

    $ pip install pycounts

    ```


