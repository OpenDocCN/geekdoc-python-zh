    >>> words = ["a", "happy", "hello", "a", "world", "happy"]

    >>> word_counts = Counter(words)

    >>> word_counts

    ```


    ```

    Counter({''a'': 2, ''happy'': 2, ''hello'': 1, ''world'': 1})

    ```


    Note how the Counter object automatically calculated the count of each unique
    word in our input list and returned the result as a dictionary of ''word'': count
    pairs! Given this functionality, how can we use Counter to count the words in
    a text file? Well, we would need to load the file with Python, split it up into
    a list of words, and then create a Counter object from that list of words.


    We first need a text file to help us build this workflow. “The Zen of Python<sup>1</sup>”
    is a list of nineteen aphorisms about the Python programming language, which can
    be viewed by running import this in a Python interpreter:


    ```

    >>> import this

    ```


    ```

    The Zen of Python, by Tim Peters


    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    ...

    ```


    Let’s make a text file called zen.txt containing the “The Zen of Python” text
    above. Do this by manually copying the above output into a file in your current
    directory called zen.txt using an editor of your choice, or by running the following
    command at the command line:


    ```

    $ python -c "import this" > zen.txt

    ```


    > In the command above, the -c option allows you to pass a string for Python to
    execute, and the > directs the output of the command to a file (which in our case
    is called “zen.txt” and is located in the current directory).'
