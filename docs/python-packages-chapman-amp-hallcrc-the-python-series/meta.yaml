    # 6.4 Hosting documentation online


    If you intend to share your package with others, it will be useful to make your
    documentation accessible online. It’s common to host Python package documentation
    on the free online hosting service Read the Docs<sup>30</sup>, which can automate
    the building, deployment, and hosting of your documentation. Read the Docs works
    by connecting to an online repository hosting your package documentation, such
    as a GitHub repository. When you push changes to your repository, Read the Docs
    automatically builds a fresh copy of your documentation (i.e., runs `make html`)
    and hosts it at the URL https://pkgname.readthedocs.io/ (you can also configure
    Read the Docs to use a custom domain name). This means that any changes you make
    to your documentation source files are immediately deployed to your users. If
    you need your documentation to be private (i.e., only available to employees of
    a company), Read the Docs offers a paid “Business plan” with this functionality.


    GitHub Pages<sup>31</sup> is another popular service used for hosting documentation
    from a repository. However, it doesn’t natively support automatic building of
    your documentation when you push changes to the source files, which is why we
    prefer to use Read the Docs here. If you did want to host your docs on GitHub
    Pages, we recommend using the ghp-import<sup>32</sup> package, or setting up an
    automated GitHub Actions workflow using the peaceiris/actions-gh-pages<sup>33</sup>
    action (we’ll learn more about GitHub Actions in **Chapter 8: Continuous integration
