    # 4.2.2 Package and module names


    When building a package, it''s important to select appropriate names for your
    package and its modules. Python package naming guidelines and conventions are
    described in Python Enhancement Proposal (PEP) 8⁷ and PEP 423⁸. The fundamental
    guidelines are:


    +   - Packages and modules should have a single, short, all-lowercase name.

    - Underscores can be used to separate words in a name if it improves readability,
    but their use is typically discouraged.


    In terms of the actual name chosen for a module or package, it may be helpful
    to consider the following “three M''s”:


    +   1. **Meaningful**: the name should reflect the functionality of the package.

    2. **Memorable**: the name should be easy for users to find, remember, and relate
    to other relevant packages.

    3. **Manageable**: remember that users of your package will access its contents/namespace
    via dot notation. Make it as quick and easy as possible for them to do this by
    keeping your names short and sweet. For example, imagine if we called our pycounts
    package something like wordcountingpackage. Every time a user wanted to access
    the `plot_words()` function from the `plotting` module, they''d have to write
    this: `from wordcountingpackage.plotting import plot_words()` — yikes!


