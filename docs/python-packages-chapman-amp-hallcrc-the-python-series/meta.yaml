  md: '```

    [tool.semantic_release]

    version_variable = "pyproject.toml:version" # version location

    branch = "main" # branch to make releases of

    changelog_file = "CHANGELOG.md" # changelog file

    build_command = "poetry build" # build dists

    dist_path = "dist/" # where to put dists

    upload_to_release = true # auto-create GitHub release

    upload_to_pypi = false # don''t auto-upload to PyPI

    remove_dist = false # don''t remove dists

    patch_without_tag = true # patch release by default

    ```


    We''ve added comments above to clarify what each key is doing in the table, and
    we describe them in Table 8.2. You can also read more about these configuration
    options in the PSR documentation<sup>27</sup>.


    # TABLE 8.2: Description of Python Semantic Release configuration options.


    | Key | Description |

    | :--- | :--- |

    | version_variable | Location of version number for PSR to bump. |

    | branch | Branch where releases should be made from. |

    | changelog_file | Location of changelog file for PSR to update using commit messages.
    |

    | build_command | How to build new distributions for the release. |

    | dist_path | Location of distributions after running build_command. |

    | upload_to_release | Whether to automatically create a release of the new package
    version on GitHub. |

    | upload_to_pypi | Whether to upload to PyPI. Default is true, but we want to
    upload to TestPyPI first to test things out, so we''ve turned this off. |

    | remove_dist | Whether to remove distributions at dist_path after upload. We
    turned this off because we want to upload these distributions to TestPyPI and
    PyPI ourselves. |


