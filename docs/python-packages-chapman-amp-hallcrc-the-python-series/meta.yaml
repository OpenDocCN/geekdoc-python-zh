    \ see your changes and put your package back in editable mode (which is the mode\
    \ you want for development)."
- md: "## 4.2 Package structure\n\nA user can directly use this path in the pycounts\
    \ function `count_words()` as follows:\n\n```python\n>>> from pycounts.pycounts\
    \ import count_words\n>>> from pycounts.datasets import get_flatland\n>>> flatland_path\
    \ = get_flatland()\n>>> count_words(flatland_path)\n```\n\n```\nCounter({'the':\
    \ 2244, 'of': 1597, 'to': 1078, 'and': 1074,\n'a': 902, 'i': 706, 'in': 698, 'that':\
    \ 486, ... })\n```\n\nThis is just one example of how we can include data as part\
    \ of our package and expose it to a user. The `importlib.resources` module can\
    \ be used to load any kind of data in different ways (as a path, as a string,\
    \ as a binary file, etc.). If you're developing a package that includes user-facing\
    \ data, we recommend taking a look at the `importlib.resources` documentation<sup>17</sup>,\
    \ as well as the “datasets” modules included in larger Python libraries such as\
    \ scikit-learn<sup>18</sup>, torchvision<sup>19</sup>, or statsmodels<sup>20</sup>\
    \ to learn more.\n\n## 4.2.7 The source layout\n\nWhen describing and defining\
    \ package structure throughout this book, we have been nesting our package's Python\
    \ code inside a `src/` directory, as in the example structure below. This layout\
    \ is called the “src”/“source” layout for obvious reasons.\n\n```\npkg\n├── ...\n\
    ├── src\n│   └── pkg\n│       ├── __init__.py\n│       ├── module1.py\n│     \
    \  └── subpkg\n│           ├── __init__.py\n│           └── module2.py\n└── ...\n\
    ```\n\nHowever, nesting a package's code in a `src/` directory is not required\
    \ to build a package, and it's also common to see packages without it. We'll call\
    \ this the “non-src” layout and show an example below.\n\n```\npkg\n├── ...\n\
    ├── pkg\n│   ├── __init__.py\n│   ├── module1.py\n│   └── subpkg\n│       ├──\
    \ __init__.py\n│       └── module2.py\n└── ...\n```\n\nIn general, we recommend\
    \ using the “src” layout over the “non-src” layout (and so does the Python Packaging\
    \ Authority<sup>21</sup>) because it has several advantages when it comes to developing\
    \ and distributing installable Python packages. We list a few of these below:\n\
    \n1.  For developers using a testing framework like `pytest`, a “src” layout forces\
    \ you to install your package before it can be tested. Most developers would agree\
    \ that you would want to test your package as it will be installed by users, rather\
    \ than as it currently exists on your own machine. The problem with a “non-src”\
    \ layout is that Python can `import` your package even if it is not installed.\
    \ This is because in most cases the first place Python searches when running `import`\
    \ is the current directory (check this by importing `sys` and running `sys.path[0]`).\
    \ Without a “src” folder, Python will find your package as it exists in the current\
    \ directory and import it, rather than using it as it would be installed on a\
    \ user's machine. There are plenty of horror stories of developers uploading broken\
    \ distributions to PyPI because they were testing their code as it existed on\
    \ their machine rather than as it would be installed by users. This issue is described\
    \ in detail in Ionel Cristian Mărieș' Packaging a Python Library<sup>22</sup>\
    \ and Hynek Schlawack's Testing and Packaging<sup>23</sup> excellent blog posts\
    \ for those interested.\n2.  A “src” layout leads to cleaner editable installs\
    \ of your package. Recall from **Section 3.5.2** that when developing a package,\
    \ it's common to install it in editable mode (the default when running `poetry\
    \ install`). This adds the path to your project's Python code to the `sys.path`\
    \ list so that changes to your source code are immediately available when you\
    \ `import` it, without needing to reinstall. With a “src” layout that path looks\
    \ something like this:\n\n```\n'/Users/tomasbeuzen/pycounts/src'\n```\n\nIn contrast,\
    \ a “non-src” layout will add your project’s root to `sys.path` (there is no “src”\
    \ directory to provide a layer of separation):\n\n```\n'/Users/tomasbeuzen/pycounts/'\n\
    ```\n\nThere’s usually a lot more than just Python code at that path. There could\
    \ be test modules, scratch code, data files, documentation, example scripts, etc.,\
    \ all of which are now potentially importable in your development workflow!\n\n\
    3.  Finally, “src” is generally a universally recognized location for source code,\
    \ making it easier for others to quickly navigate the contents of your package.\n\
    \nUltimately, while you can certainly use a “non-src layout” to develop a package,\
    \ using a “src” layout will typically reduce the chance of things breaking during\
    \ development and distribution.\n\n## 4.3 Package distribution and installation\n\
    \nIn this section, we won’t be writing any code, but rather we will discuss theory\
    \ related to package distribution and installation for those interested. If that’s\
    \ not you, feel free to skip to **Section 4.4**.\n\nAs we saw in **Chapter 3:\
    \ How to package a Python**, the typical workflow for developing and distributing\
    \ a Python packages is as follows:\n\n1.  A *developer* creates a Python package\
    \ on their machine.\n2.  The *developer* uses a tool like `poetry` to build a\
    \ distribution from that package.\n3.  The *developer* shares the distribution,\
    \ usually by uploading to an online repository like PyPI<sup>24</sup>.\n4.  A\
    \ *user* uses an installation tool like `pip` to download the distribution and\
    \ install it on their machine.\n5.  (Optional) *Users* provide feedback to the\
    \ developer about the package (identify bugs, request features, etc.) and the\
    \ cycle repeats.\n\nThis workflow is illustrated in Fig. 4.2.\n\n![The Python\
    \ package cycle.](img/d3840bdab18c2309faf9de63e70c539d_124_0.png)\n\n**FIGURE\
    \ 4.2:** The Python package cycle.\n\nTo build up an intuition of the steps in\
    \ this process, we'll begin at the user-end, and discuss how packages are installed.\
    \ We'll then work our way backwards to better understand what distributions are\
    \ and how they're made.\n\n### 4.3.1 Package installation\n\nTo be installed,\
    \ a package needs to generate two directories:\n\n1.  `{package}`: a directory\
    \ of the package's source files (i.e., modules and subpackages).\n2.  `{package}-{version}.dist-info`:\
    \ a directory of files containing information about the package, such as a metadata\
    \ file with information such as the package's author and what versions of Python\
    \ it supports (METADATA), a license file (LICENSE), a file specifying what tool\
    \ was used to install the package (INSTALLER), and more. These files are described\
    \ in detail in PEP 427<sup>25</sup>.\n\nWe'll talk about how these directories\
    \ are actually built shortly, but for now, we'll talk about installation. When\
    \ you install a package with an installer like pip the above directories are copied\
    \ into the *site-packages/* directory of your Python installation, which is one\
    \ of the default places Python looks when importing a package. The exact path\
    \ to the *site-packages/* directory varies depending on your operating system,\
    \ how you installed Python, and whether you're using a virtual environment. You\
    \ can check the path using the `sys.path` variable. The below paths are for a\
    \ MacOS, with Python installed via Miniconda<sup>26</sup>, and with a virtual\
    \ environments called pycounts activated:\n\n```python\n>>> import sys\n>>> sys.path\n\
    ```\n\n```\n[\n    '',\n    '/opt/miniconda/base/envs/pycounts/lib/python39.zip',\n\
    \    '/opt/miniconda/base/envs/pycounts/lib/python3.9',\n    '/opt/miniconda/base/envs/pycounts/lib/python3.9/lib-dynload',\n\
    \    '/opt/miniconda/base/envs/pycounts/lib/python3.9/site-packages'\n]\n```\n\
    \nIf you navigate to the *site-packages/* directory you will see examples of the\
    \ *{package}* and *{package}-{version}.dist-info* directories for each package\
    \ you have installed. For example, if we were to pip install the pycounts package\
    \ we uploaded to PyPI in **Section 3.10**, we would see the following in our *site-packages*\
    \ folder:\n\n```\n/opt/miniconda/base/lib/python3.9/site-packages/pycounts\n├──\
    \ __init__.py\n├── __pycache__\n├── plotting.py\n└── pycounts.py\n```\n\n```\n\
    /opt/miniconda/base/lib/python3.9/site-packages/pycounts-0.1.0.dist-info\n├──\
    \ INSTALLER\n├── LICENSE\n├── METADATA\n└── RECORD\n```\n\n<sup>17</sup> https://docs.python.org/3/library/importlib.html#module-importlib.resources\n\
    <sup>18</sup> https://github.com/scikit-learn/scikit-learn/tree/main/sklearn/datasets\n\
    <sup>19</sup> https://github.com/pytorch/vision/tree/main/torchvision/datasets\n\
    <sup>20</sup> https://github.com/statsmodels/statsmodels/tree/main/statsmodels/datasets\n\
    <sup>21</sup> https://packaging.python.org/tutorials/packaging-projects/\n<sup>22</sup>\
    \ https://blog.ionelmc.ro/2014/05/25/python-packaging/\n<sup>23</sup> https://hynek.me/articles/testing-packaging/\n\
    <sup>24</sup> https://pypi.org\n<sup>25</sup> https://www.python.org/dev/peps/pep-0427/\n\
    <sup>26</sup> https://docs.conda.io/en/latest/miniconda.html"
  mdcn: "## 4.2 包结构\n\n用户可以在 `pycounts` 函数 `count_words()` 中直接使用此路径，如下所示：\n\n```python\n\
    >>> from pycounts.pycounts import count_words\n>>> from pycounts.datasets import\
    \ get_flatland\n>>> flatland_path = get_flatland()\n>>> count_words(flatland_path)\n\
    ```\n\n```\nCounter({'the': 2244, 'of': 1597, 'to': 1078, 'and': 1074,\n'a': 902,\
    \ 'i': 706, 'in': 698, 'that': 486, ... })\n```\n\n这只是我们如何将数据作为包的一部分并将其暴露给用户的一个例子。`importlib.resources`\
    \ 模块可用于以不同方式加载任何类型的数据（作为路径、字符串、二进制文件等）。如果您正在开发包含面向用户数据的包，我们建议您查看 `importlib.resources`\
    \ 文档<sup>17</sup>，以及 scikit-learn<sup>18</sup>、torchvision<sup>19</sup> 或 statsmodels<sup>20</sup>\
    \ 等大型 Python 库中包含的“datasets”模块，以了解更多。\n\n## 4.2.7 源代码布局\n\n在本书中描述和定义包结构时，我们一直将包的\
    \ Python 代码嵌套在 `src/` 目录中，如下例结构所示。这种布局被称为“src”/“源代码”布局，原因显而易见。\n\n```\npkg\n├──\
    \ ...\n├── src\n│   └── pkg\n│       ├── __init__.py\n│       ├── module1.py\n\
    │       └── subpkg\n│           ├── __init__.py\n│           └── module2.py\n\
    └── ...\n```\n\n然而，将包的代码嵌套在 `src/` 目录中并不是构建包所必需的，也很常见看到没有它的包。我们将此称为“非 src”布局，并在下面展示一个示例。\n\
    \n```\npkg\n├── ...\n├── pkg\n│   ├── __init__.py\n│   ├── module1.py\n│   └──\
    \ subpkg\n│       ├── __init__.py\n│       └── module2.py\n└── ...\n```\n\n总的来说，我们推荐使用“src”布局而不是“非\
    \ src”布局（Python 打包权威机构<sup>21</sup>也是如此），因为在开发和分发可安装的 Python 包时，它具有几个优势。我们在下面列出其中一些：\n\
    \n1.  对于使用 `pytest` 等测试框架的开发者，“src”布局强制您在测试之前安装您的包。大多数开发者会同意，您希望测试您的包，就像用户将安装它一样，而不是像它当前存在于您自己的机器上那样。“非\
    \ src”布局的问题在于，即使包未安装，Python 也可以 `import` 它。这是因为在大多数情况下，运行 `import` 时 Python 搜索的第一个位置是当前目录（通过导入\
    \ `sys` 并运行 `sys.path[0]` 来检查）。没有“src”文件夹，Python 将找到您当前目录中存在的包并导入它，而不是像它将安装在用户机器上那样使用它。有很多恐怖故事，开发者将损坏的分发上传到\
    \ PyPI，因为他们测试的是他们机器上存在的代码，而不是用户将安装的代码。这个问题在 Ionel Cristian Mărieș 的《打包 Python\
    \ 库》<sup>22</sup> 和 Hynek Schlawack 的《测试与打包》<sup>23</sup> 这两篇优秀的博客文章中有详细描述，供感兴趣的人参考。\n\
    2.  “src”布局导致更干净的包可编辑安装。回顾**第 3.5.2 节**，在开发包时，通常以可编辑模式安装它（运行 `poetry install`\
    \ 时的默认设置）。这会将项目 Python 代码的路径添加到 `sys.path` 列表中，以便对源代码的更改在 `import` 时立即可用，无需重新安装。使用“src”布局时，该路径如下所示：\n\
    \n```\n'/Users/tomasbeuzen/pycounts/src'\n```\n\n相比之下，“非 src”布局会将项目的根目录添加到 `sys.path`（没有“src”目录提供分隔层）：\n\
    \n```\n'/Users/tomasbeuzen/pycounts/'\n```\n\n该路径通常不仅仅包含 Python 代码。可能有测试模块、临时代码、数据文件、文档、示例脚本等，所有这些现在都可能在您的开发工作流中被导入！\n\
    \n3.  最后，“src”通常是源代码的通用识别位置，使其他人更容易快速浏览包的内容。\n\n最终，虽然您当然可以使用“非 src 布局”来开发包，但使用“src”布局通常会减少开发和分发过程中出现问题的机会。\n\
    \n## 4.3 包分发与安装\n\n在本节中，我们不会编写任何代码，而是讨论与包分发和安装相关的理论，供感兴趣的人参考。如果您不感兴趣，请随时跳转到**第\
    \ 4.4 节**。\n\n正如我们在**第 3 章：如何打包 Python** 中看到的，开发和分发 Python 包的典型工作流程如下：\n\n1. \
    \ *开发者*在他们的机器上创建一个 Python 包。\n2.  *开发者*使用像 `poetry` 这样的工具从该包构建一个分发。\n3.  *开发者*共享该分发，通常是通过上传到像\
    \ PyPI<sup>24</sup> 这样的在线仓库。\n4.  *用户*使用像 `pip` 这样的安装工具下载分发并将其安装在他们的机器上。\n5. \
    \ （可选）*用户*向开发者提供关于包的反馈（识别错误、请求功能等），然后循环重复。\n\n此工作流程如图 4.2 所示。\n\n![Python 包循环。](img/d3840bdab18c2309faf9de63e70c539d_124_0.png)\n\
    \n**图 4.2：** Python 包循环。\n\n为了建立对这个过程步骤的直觉，我们将从用户端开始，讨论包是如何安装的。然后我们将反向工作，以更好地理解分发是什么以及它们是如何制作的。\n\
    \n### 4.3.1 包安装\n\n要被安装，一个包需要生成两个目录：\n\n1.  `{package}`：包含包源文件（即模块和子包）的目录。\n2.\
    \  `{package}-{version}.dist-info`：包含有关包信息的文件目录，例如包含包作者和支持的 Python 版本等信息的元数据文件（METADATA）、许可证文件（LICENSE）、指定用于安装包的工具的文件（INSTALLER）等。这些文件在\
    \ PEP 427<sup>25</sup> 中有详细描述。\n\n我们稍后将讨论这些目录实际上是如何构建的，但现在，我们将讨论安装。当您使用像 pip 这样的安装程序安装包时，上述目录会被复制到\
    \ Python 安装的 *site-packages/* 目录中，这是 Python 导入包时查找的默认位置之一。*site-packages/* 目录的确切路径因您的操作系统、安装\
    \ Python 的方式以及是否使用虚拟环境而异。您可以使用 `sys.path` 变量检查路径。以下路径适用于 MacOS，Python 通过 Miniconda<sup>26</sup>\
    \ 安装，并激活了名为 pycounts 的虚拟环境：\n\n```python\n>>> import sys\n>>> sys.path\n```\n\n\
    ```\n[\n    '',\n    '/opt/miniconda/base/envs/pycounts/lib/python39.zip',\n \
    \   '/opt/miniconda/base/envs/pycounts/lib/python3.9',\n    '/opt/miniconda/base/envs/pycounts/lib/python3.9/lib-dynload',\n\
    \    '/opt/miniconda/base/envs/pycounts/lib/python3.9/site-packages'\n]\n```\n\
    \n如果您导航到 *site-packages/* 目录，您将看到每个已安装包的 *{package}* 和 *{package}-{version}.dist-info*\
    \ 目录的示例。例如，如果我们 pip 安装我们在**第 3.10 节**上传到 PyPI 的 pycounts 包，我们将在 *site-packages*\
    \ 文件夹中看到以下内容：\n\n```\n/opt/miniconda/base/lib/python3.9/site-packages/pycounts\n\
    ├── __init__.py\n├── __pycache__\n├── plotting.py\n└── pycounts.py\n```\n\n```\n\
    /opt/miniconda/base/lib/python3.9/site-packages/pycounts-0.1.0.dist-info\n├──\
    \ INSTALLER\n├── LICENSE\n├── METADATA\n└── RECORD\n```\n\n<sup>17</sup> https://docs.python.org/3/library/importlib.html#module-importlib.resources\n\
    <sup>18</sup> https://github.com/scikit-learn/scikit-learn/tree/main/sklearn/datasets\n\
    <sup>19</sup> https://github.com/pytorch/vision/tree/main/torchvision/datasets\n\
    <sup>20</sup> https://github.com/statsmodels/statsmodels/tree/main/statsmodels/datasets\n\
    <sup>21</sup> https://packaging.python.org/tutorials/packaging-projects/\n<sup>22</sup>\
    \ https://blog.ionelmc.ro/2014/05/25/python-packaging/\n<sup>23</sup> https://hynek.me/articles/testing-packaging/\n\
