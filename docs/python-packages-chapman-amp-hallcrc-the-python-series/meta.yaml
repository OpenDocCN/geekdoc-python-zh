    \n³ https://readthedocs.org\n⁴ https://pages.github.com\n\n## 6.2 编写文档\n\n表6.1展示了包中通常包含的文档类型及其在包目录结构中的常见位置。这里有很多内容需要考虑，但现实情况是，大多数开发者使用模板来创建Python包，这些模板会自动生成大部分此类文档。例如，考虑我们在**第3.2.2节**使用py-pkgs-cookiecutter模板创建的pycounts包：\n\
