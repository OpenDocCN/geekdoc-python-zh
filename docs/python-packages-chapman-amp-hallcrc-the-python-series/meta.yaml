    4. A *user* uses an installation tool like `pip` to download the distribution
    and install it on their machine.

    5. (Optional) *Users* provide feedback to the developer about the package (identify
    bugs, request features, etc.) and the cycle repeats.


    This workflow is illustrated in Fig. 4.2.


    ![](img/d3840bdab18c2309faf9de63e70c539d_124_0.png)


    **FIGURE 4.2:** The Python package cycle.


    To build up an intuition of the steps in this process, we''ll begin at the user-end,
    and discuss how packages are installed. We''ll then work our way backwards to
    better understand what distributions are and how they''re made.


