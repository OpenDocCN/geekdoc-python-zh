    \n**图 8.5：** 在 GitHub 上成功运行的持续集成工作流。\n\n## 8.5 设置持续部署\n\n在上一步中，我们为包设置了 CI，以便在每次向仓库主分支推送或拉取新更改时，检查测试是否运行、代码覆盖率是否稳定以及文档是否仍然可以构建。\n\
    \n在本节中，我们将设置持续部署（CD）。如果我们推送到仓库的更改通过了 CI，那么我们希望有一个 CD 工作流能够自动：\n\n- 1. 创建 pycounts\
