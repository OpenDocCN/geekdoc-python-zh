    Writing your tests before your code is known as “test-driven development”, and
    advocates of this approach suggest that it helps you better understand the code
    you need to write, prevent bugs, and ultimately save you time. However in practice,
    writing your tests first or last doesn’t seem to have a significant impact on
    overall development time (Fucci et al., 2016). Regardless of when you choose to
    formally write your tests, all developers should at least think about the specifications
    of their code before they write it. What might the inputs look like? What will
    the output look like? Are there any edge cases¹ to consider? Taking a moment to
    consider and write down these specifications will help you write code effectively
    and efficiently.


    Ultimately, the testing workflow is all about working incrementally and iteratively.
    The idea is to make small changes to your code as you add features or identify
    bugs, test it, write more tests, repeat. Managing and executing such a workflow
    manually like we did above would clearly be inefficient. Instead, a test framework
    is typically used to help manage the testing workflow in an efficient, automated,
    and reproducible way. pytest is one of the most common test frameworks for Python
    packages. We used it to help test our pycounts package in Section 3.7.2. In the
    rest of this chapter, we’ll continue to explore


