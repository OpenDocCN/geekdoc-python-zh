    \ 8<sup>10</sup>建议使用绝对导入，因为它们是显式的。\n\n## 4.2.4 init文件\n\n前面我们讨论了`__init__.py`文件如何用于告诉Python包含`__init__.py`文件的目录是一个包。`__init__.py`文件可以（并且经常）留空，仅用于将目录标识为包。然而，它也可以用于向包的命名空间添加对象、提供文档和/或运行其他初始化代码。\n\
