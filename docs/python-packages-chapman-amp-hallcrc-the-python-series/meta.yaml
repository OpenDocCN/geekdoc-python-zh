    testing". However, when writing software, it''s preferable to define your tests
    in a more formal and reproducible way.


    Tests in Python are often written with the `assert` statement. `assert` checks
    the truth of an expression; if the expression is true, Python does nothing and
    continues running, but if it''s false, the code terminates and shows a user-defined
    error message. For example, consider running the follow code in a Python interpreter:'
