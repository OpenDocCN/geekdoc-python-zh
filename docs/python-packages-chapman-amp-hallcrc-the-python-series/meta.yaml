    ### 3.6.1 依赖版本约束


    版本控制是为包的唯一发布版本分配唯一标识符的做法。例如，语义化版本控制[^12]是一个常见的版本控制系统，由三个整数 A.B.C 组成。A 是“主”版本号，B
    是“次”版本号，C 是“补丁”版本标识符。包版本通常从 0.1.0 开始，并根据随时间对包所做的更改类型，从那里开始正向递增主版本号、次版本号和补丁版本号。


    [^12]: https://semver.org


    我们将在**第 7 章：发布与版本控制**中更详细地讨论版本控制，但现在需要了解的是，我们通常会约束包依赖项所需的版本号，以确保我们使用的是包含所需功能的最新版本。你可能已经注意到，poetry
    在我们的 *pyproject.toml* 文件的 [tool.poetry.dependencies] 部分中的依赖版本前添加了一个脱字符（^）运算符：


    ```

    [tool.poetry.dependencies]

    python = "^3.9"

    matplotlib = "^3.4.3"

    ```


    脱字符运算符是“需要此版本或任何不修改最左侧非零版本数字的更高版本”的简写。例如，我们的包依赖于任何 >=3.9.0 且 <4.0.0 的 Python 版本。因此，有效的版本示例包括
    3.9.1 和 3.12.0，但 4.0.1 将是无效的。还有许多其他语法可用于以不同方式指定版本约束，你可以在 *poetry 文档*<sup>13</sup>
    中阅读更多相关信息。那么，我们为什么关心这个呢？脱字符运算符对我们的包所需的依赖版本施加了上限。这种方法的一个问题是，它迫使任何依赖你的包的人指定相同的约束，因此可能使添加和解析依赖变得困难。


    这个问题最好通过示例来说明。流行的 numpy (Harris et al., 2020) 包的 1.21.5 版本对 Python 有绑定的版本约束，要求版本
    >=3.7 且 <3.11（参见源代码<sup>14</sup>）。看看如果我们尝试将此版本的 numpy 添加到我们的 pycounts 包中会发生什么（我们使用
    `--dry-run` 参数来显示会发生什么，而不实际执行任何操作）：


    ```

    $ poetry add numpy=1.21.5 --dry-run

    ```


    ```

    Updating dependencies

    Resolving dependencies... (0.1s)


    SolverProblemError


    The current project''s Python requirement (>=3.9,<4.0) is not compatible

    with some of the required packages Python requirement:

    ```


    <sup>13</sup> https://python-poetry.org/docs/dependency-specification

    <sup>14</sup> https://github.com/numpy/numpy/blob/c3d0a09342c08c466984654bc4738af595fba896/setup.py#L409


    - numpy 需要 Python >=3.7,<3.11，因此对于 Python >=3.11,<4.0 将无法满足


    这里的问题是，我们的包目前支持 Python 版本 ^3.9（即 >=3.9.0 且 <4.0.0），因此如果我们发布它，使用 Python 3.12.0
    的用户在技术上将能够安装它。然而，numpy 1.21.5 仅支持 >=3.7 且 <3.11，这与 Python 3.12.0（或任何 >=3.11 的版本）不兼容。由于这种不一致性，poetry
    拒绝将 numpy 1.21.5 添加为我们的包的依赖项。要添加它，我们有三个主要选择：


