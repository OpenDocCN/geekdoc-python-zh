  md: '# 8.4 Setting up continuous integration


    Now that we have a basic familiarity with GitHub Actions, in this section we''ll
    build up a continuous integration workflow for a Python package. We''ll create
    this workflow for the pycounts package we''ve been developing throughout this
    book. However, it will be applicable to any Python package, and it should be straightforward
    to see how you can modify it to your needs.


    Our goal here is to create a CI workflow that will install our package with poetry,
    run our package''s tests with pytest, and build its documentation with sphinx,
    every time someone makes a push or pull request of changes to the main branch
    of the pycounts GitHub repository. These are steps we, or a collaborator, would
    usually perform locally every time our package is changed, so it makes sense to
    automate them.


    # 8.4.1 Setup


    To set up a workflow with GitHub Actions, we need to create a workflow file. Workflow
    files are .yml files located in a .github/workflows/ directory in the root package
    directory. We''ll call our file ci-cd.yml. You can create that file in an editor
    of your choice, or by running the following commands at the command line, from
    your root package directory:


    ```

    $ mkdir -p .github/workflows

    $ touch .github/workflows/ci-cd.yml

    ```


    Your package directory structure should now look something like the following:


    ```

    pycounts

    ├── .github          <----------

    │   └── workflows    <----------

    │       └── ci-cd.yml <----------

    ├── .readthedocs.yml

    ├── CHANGELOG.md

    ├── CONDUCT.md

    ├── CONTRIBUTING.md

    ├── docs

    │   └── ...

    ├── LICENSE

    ├── README.md

    ├── poetry.lock

    └── pyproject.toml

    ```'
