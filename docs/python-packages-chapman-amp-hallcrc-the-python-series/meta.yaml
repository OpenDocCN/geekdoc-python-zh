    \ would expect our function to calculate five letters in the string \"Hello\"\
    \ and ten letters in the string \"Hello world\":\n\n```\n>>> assert count_letters(\"\
    Hello\") == 5, \"'Hello' should have 5 letters\"\n>>> assert count_letters(\"\
    Hello world\") == 10, \"'Hello world' should \\n    have 10 letters\"\n```\n\n\
    If we ran the above assert statements, the first would pass without error, but\
    \ the second would raise an error:\n\n```\nAssertionError: 'Hello world' should\
    \ have 10 letters\n```\n\nWhat went wrong? When we call len() on a string, it\
