  md: "# 8.3 Introduction to GitHub Actions\n\nin **Section 8.3.1** exists in this\
    \ workflow file, and each line is commented to describe exactly what it does.\
    \ For example, we can see that:\n\n+   - This workflow is triggered on any push\
    \ or pull request made to the main branch.\n- It consists of one job called build.\n\
    - The job will run on ubuntu-latest (the latest version of the Ubuntu runner GitHub\
    \ Actions provides).\n- It contains three steps. The first step “checks out” the\
    \ repository — this is necessary for the runner to access your repository. The\
    \ second step will print “Hello, world!” to the runner’s terminal. The final step\
    \ will print two lines. We’ll discuss steps and how to write them in **Section\
    \ 8.3.3**.\n\n```\n# This is a basic workflow to help you get started with Actions\n\
    \n# Name of the workflow\nname: CI\n\n# Controls when the workflow will run\n\
    on:\n  # Triggers the workflow on push or pull request events but only for\n \
    \ # the main branch\n  push:\n    branches: [ main ]\n  pull_request:\n    branches:\
    \ [ main ]\n\n  # Allows you to run this workflow manually from the Actions tab\n\
    \  workflow_dispatch:\n\n# A workflow run is made up of one or more jobs that\
