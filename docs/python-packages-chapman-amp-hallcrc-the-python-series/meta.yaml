    # 8.3 Introduction to GitHub Actions


    # 8.3.1 Key concepts


    GitHub Actions is a service for executing CI/CD workflows. The general idea is
    to create a set of commands that GitHub Actions will run on our behalf. We call
    this set of commands a “workflow”. A GitHub Actions workflow is defined in a .yml
    file and contains the set of “actions” we want GitHub Actions to run for us (such
    as running our tests with pytest or building our documentation with sphinx). Actions
    are organized as “steps” in a workflow (e.g., step 1: run tests, step 2: build
    documentation), which in turn are organized into “jobs” (e.g., job 1: continuous
    integration). A workflow is executed on a machine provided by GitHub Actions called
    a “runner”, when triggered by a particular “event” (like merging code into the
    main branch of a repository).


    That’s a lot to take in, but don’t worry! All this terminology is summarized in
    Table 8.1, and we’ll walk through an example of using GitHub Actions, which refers
    to this terminology in the next section.


    **TABLE 8.1:** Terminology used in GitHub Actions.


    | Keyword | Description |

    | :--- | :--- |

    | Actions | Individual tasks you want to perform. |

    | Workflow | A collection of actions (specified together in one file). |

    | Event | Something that triggers the running of a workflow. |

    | Runner | A machine that can run the Github Action(s). |

    | Job | A set of steps executed on the same runner. |

    | Step | A set of commands or actions which a job executes. |


    <sup>6</sup>https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions'
- md: "## 8.3.2 A toy example\n\nIn this section, we'll walk through a simple example\
    \ of running a workflow with GitHub Actions. The workflow will contain actions\
    \ that simply print some things to the GitHub Actions runner's terminal using\
    \ the echo command, when a change is made to a repository's content.\n\n- Step\
    \ 1\n\nCreate a new repository on GitHub named anything you like (we called our\
    \ repository “actions-example”). Click on the “Actions” tab, and then click the\
    \ “Set up this workflow” button as shown in Fig. 8.1.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_208_0.png)\n\
    \nFIGURE 8.1: Setting up our first GitHub Actions workflow.\n\n- Step 2\n\nCommit\
    \ the .yml file that has been created for you to your repository by clicking “Start\
    \ commit” and then “Commit new file”. Then, open the file on GitHub. You should\
    \ see the contents below. All the terminology we defined in **Section 8.3.1**\
    \ exists in this workflow file, and each line is commented to describe exactly\
    \ what it does. For example, we can see that:\n\n- This workflow is triggered\
    \ on any push or pull request made to the main branch.\n- It consists of one job\
    \ called build.\n- The job will run on ubuntu-latest (the latest version of the\
    \ Ubuntu runner GitHub Actions provides).\n- It contains three steps. The first\
    \ step “checks out” the repository — this is necessary for the runner to access\
    \ your repository. The second step will print “Hello, world!” to the runner’s\
    \ terminal. The final step will print two lines. We’ll discuss steps and how to\
    \ write them in **Section 8.3.3**.\n\n```yaml\n# This is a basic workflow to help\
    \ you get started with Actions\n\n# Name of the workflow\nname: CI\n\n# Controls\
    \ when the workflow will run\non:\n  # Triggers the workflow on push or pull request\
    \ events but only for\n  # the main branch\n  push:\n    branches: [ main ]\n\
    \  pull_request:\n    branches: [ main ]\n\n  # Allows you to run this workflow\
    \ manually from the Actions tab\n  workflow_dispatch:\n\n# A workflow run is made\
    \ up of one or more jobs that can run\n# sequentially or in parallel\njobs:\n\
    \  # This workflow contains a single job called \"build\"\n  build:\n    # The\
    \ type of runner that the job will run on\n    runs-on: ubuntu-latest\n\n    #\
    \ Steps represent a sequence of tasks that will be executed as\n    # part of\
    \ the job\n    steps:\n      # Checks-out your repository so your job can access\
    \ it\n      - name: Check-out repository\n        uses: actions/checkout@v2\n\n\
    \      # Runs a single command using the runners shell\n      - name: Run a one-line\
    \ script\n        run: echo Hello, world!\n\n      # Runs a set of commands using\
    \ the runners shell\n      - name: Run a multi-line script\n        run: |\n \
    \         echo Add other actions to build,\n          echo test, and deploy your\
    \ project.\n```\n\n- Step 3\n\nNow, go to the “Actions” tab of your repository.\
    \ You should see one workflow run, as in Fig. 8.2. This workflow ran because in\
    \ Step 2 we committed our workflow .yml file to the main branch of our repository,\
    \ and the workflow is triggered to execute on any push or pull request with the\
    \ main branch.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_210_0.png)\n\nFIGURE\
    \ 8.2: Our first GitHub Actions workflow.\n\n- Step 4\n\nLook at the logs of the\
    \ executed workflow by clicking on the “Create blank.yml” workflow, then clicking\
    \ the “build” job in the left-hand panel. Click on arrows inside the build logs\
    \ to examine their output. You should be able to see output printed to the screen\
    \ for the “Run a one-line script” and “Run a multi-line script” steps in our workflow,\
    \ as shown in Fig. 8.3.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_211_0.png)\n\
    \n**FIGURE 8.3:** The logs of our first GitHub Actions workflow.\n\nWe’ll practice\
    \ writing workflows for implementing CI and CD for a Python package in the following\
    \ sections of this chapter, but at this point, the high-level concepts to be aware\
    \ of are:\n\n- A workflow is a set of commands that are triggered to execute by\
    \ certain events (like a push to the main branch of a repository).\n- A workflow\
    \ is run on a machine called a runner, which uses a particular operating system\
    \ and is hosted by the CI/CD service.\n- A workflow contains one or more jobs.\n\
    - Each job contains one or more steps to execute. In GitHub Actions, steps comprise\
    \ either “actions” or “commands” as we’ll discuss in the next section.\n\n## 8.3.3\
    \ Actions and commands\n\nAs we saw in the workflow file in Section 8.3.2, a step\
    \ in a GitHub Actions can be an “action” (specified with the keyword uses) or\
    \ a “command” (specified with keyword run). We’ll briefly explain the difference\
    \ between these two concepts here.\n\nSteps that use command line commands consist\
    \ of a name and a run key, as shown in the example below:\n\n```yaml\n# Runs a\
    \ single command using the runners shell\n- name: Run a one-line script\n  run:\
    \ echo Hello, world!\n```\n\nAnything after the run key will be executed at the\
    \ runner’s command line. You can run multiple commands in a single step using\
    \ the | character:\n\n```yaml\n# Runs a set of commands using the runners shell\n\
    - name: Run a multi-line script\n  run: |\n    echo Add other actions to build,\n\
    \    echo test, and deploy your project.\n```\n\nIn contrast to commands, actions\
    \ are reusable units of code that perform a particular task without having to\
    \ write out any commands. You’ll typically use actions that have been created\
    \ by others and shared on the GitHub Marketplace⁷. Actions are specified with\
    \ the uses keyword, followed by the name of the action you want to use. The @\
    \ symbol is used to specify which version of the action you want to use, like\
    \ in the example below:\n\n```yaml\n# Checks-out your repository so your job can\
    \ access it\n- name: Check-out repository\n  uses: actions/checkout@v2\n```\n\n\
    Some actions can also be configured with inputs using the with key, as in the\
    \ example below:\n\n```yaml\n# Set up a Python environment for use in actions\n\
    - name: Set up Python\n  uses: actions/setup-python@v2\n  with:\n    python-version:\
    \ 3.9\n```\n\n⁷https://github.com/marketplace?type=\n\n## 8.4 Setting up continuous\
    \ integration\n\nNow that we have a basic familiarity with GitHub Actions, in\
    \ this section we'll build up a continuous integration workflow for a Python package.\
    \ We'll create this workflow for the pycounts package we've been developing throughout\
    \ this book. However, it will be applicable to any Python package, and it should\
    \ be straightforward to see how you can modify it to your needs.\n\nOur goal here\
    \ is to create a CI workflow that will install our package with poetry, run our\
    \ package's tests with pytest, and build its documentation with sphinx, every\
    \ time someone makes a push or pull request of changes to the main branch of the\
    \ pycounts GitHub repository. These are steps we, or a collaborator, would usually\
    \ perform locally every time our package is changed, so it makes sense to automate\
    \ them.\n\n### 8.4.1 Setup\n\nTo set up a workflow with GitHub Actions, we need\
    \ to create a workflow file. Workflow files are .yml files located in a .github/workflows/\
    \ directory in the root package directory. We'll call our file ci-cd.yml. You\
    \ can create that file in an editor of your choice, or by running the following\
    \ commands at the command line, from your root package directory:\n\n```bash\n\
    $ mkdir -p .github/workflows\n$ touch .github/workflows/ci-cd.yml\n```\n\nYour\
    \ package directory structure should now look something like the following:\n\n\
    ```\npycounts\n├── .github          <----------\n│   └── workflows    <----------\n\
    │       └── ci-cd.yml <----------\n├── .readthedocs.yml\n├── CHANGELOG.md\n├──\
    \ CONDUCT.md\n├── CONTRIBUTING.md\n├── docs\n│   └── ...\n├── LICENSE\n├── README.md\n\
    ├── poetry.lock\n├── pyproject.toml\n├── src\n│   └── ...\n└── tests\n    └──\
    \ ...\n```\n\nOpen this new `ci-cd.yml` file in an editor. We are going to set\
    \ up a CI workflow that triggers when someone pushes new content or makes a pull-request\
    \ to any branch of our repository (note that this differs slightly to **Section\
    \ 8.3.2**, where our workflow ran on push or pull request to the “main” branch\
    \ only). To set this up, copy and paste the following text into `ci-cd.yml`:\n\
    \n> When building our CI workflow, we’ll be using the same syntax and terminology\
    \ we described previously in **Section 8.3**. Don’t be afraid to revise that section\
    \ as needed.\n\n```yaml\nname: ci-cd\n\non: [push, pull_request]\n```\n\nNow we\
    \ need to set up the steps that will be executed if one of the above trigger events\
    \ occurs. GitHub Actions essentially provides you with a blank operating system\
    \ of your choice (a “runner”), which we need to set up based on what steps we\
    \ are going to want it to execute. In our case, we need to install Python and\
    \ install poetry on the runner, so that we can then install our packages and run\
    \ its tests and build its documentation. Thus, our setup will involve the steps\
    \ below, for which we’ve indicated whether step will use an action or command(s)\
    \ (**Section 8.3.3**):\n\n1. Specify an operating system. We’ll be using Ubuntu\
    \ with the syntax `runs-on: ubuntu-latest`. MacOS and Windows are also available\
    \ if you wish to test your package on those systems, but Ubuntu is a good default\
    \ to use — see the GitHub Actions documentation<sup>8</sup>.\n2. Install Python\
    \ (action: `actions/setup-python@v2`<sup>9</sup>).\n\n<sup>8</sup>https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources\n\
    <sup>9</sup>https://github.com/actions/setup-python"
  mdcn: "## 8.3.2 一个简单示例\n\n在本节中，我们将通过一个简单的示例来演示如何使用 GitHub Actions 运行工作流。该工作流将包含一些操作，当仓库内容发生更改时，这些操作会使用\
    \ `echo` 命令在 GitHub Actions 运行器的终端上打印一些信息。\n\n- 步骤 1\n\n在 GitHub 上创建一个新仓库，名称随意（我们将我们的仓库命名为“actions-example”）。点击“Actions”选项卡，然后点击“Set\
    \ up this workflow”按钮，如图 8.1 所示。\n\n![](img/d3840bdab18c2309faf9de63e70c539d_208_0.png)\n\
    \n图 8.1：设置我们的第一个 GitHub Actions 工作流。\n\n- 步骤 2\n\n通过点击“Start commit”然后点击“Commit\
    \ new file”，将为你创建的 `.yml` 文件提交到你的仓库。然后，在 GitHub 上打开该文件。你应该会看到以下内容。我们在**第 8.3.1\
    \ 节**中定义的所有术语都存在于这个工作流文件中，并且每一行都有注释来准确描述其作用。例如，我们可以看到：\n\n- 此工作流在向主分支进行任何推送或拉取请求时触发。\n\
    - 它包含一个名为 `build` 的作业。\n- 该作业将在 `ubuntu-latest`（GitHub Actions 提供的最新版本 Ubuntu\
    \ 运行器）上运行。\n- 它包含三个步骤。第一个步骤“检出”仓库——这是运行器访问你的仓库所必需的。第二个步骤将在运行器的终端上打印“Hello, world!”。最后一个步骤将打印两行。我们将在**第\
    \ 8.3.3 节**讨论步骤以及如何编写它们。\n\n```yaml\n# This is a basic workflow to help you get\
    \ started with Actions\n\n# Name of the workflow\nname: CI\n\n# Controls when\
    \ the workflow will run\non:\n  # Triggers the workflow on push or pull request\
    \ events but only for\n  # the main branch\n  push:\n    branches: [ main ]\n\
    \  pull_request:\n    branches: [ main ]\n\n  # Allows you to run this workflow\
    \ manually from the Actions tab\n  workflow_dispatch:\n\n# A workflow run is made\
    \ up of one or more jobs that can run\n# sequentially or in parallel\njobs:\n\
    \  # This workflow contains a single job called \"build\"\n  build:\n    # The\
    \ type of runner that the job will run on\n    runs-on: ubuntu-latest\n\n    #\
    \ Steps represent a sequence of tasks that will be executed as\n    # part of\
    \ the job\n    steps:\n      # Checks-out your repository so your job can access\
    \ it\n      - name: Check-out repository\n        uses: actions/checkout@v2\n\n\
    \      # Runs a single command using the runners shell\n      - name: Run a one-line\
    \ script\n        run: echo Hello, world!\n\n      # Runs a set of commands using\
    \ the runners shell\n      - name: Run a multi-line script\n        run: |\n \
    \         echo Add other actions to build,\n          echo test, and deploy your\
    \ project.\n```\n\n- 步骤 3\n\n现在，转到你的仓库的“Actions”选项卡。你应该会看到一个工作流运行，如图 8.2 所示。此工作流之所以运行，是因为在步骤\
    \ 2 中，我们将工作流 `.yml` 文件提交到了仓库的主分支，并且工作流被设置为在向主分支进行任何推送或拉取请求时触发执行。\n\n![](img/d3840bdab18c2309faf9de63e70c539d_210_0.png)\n\
    \n图 8.2：我们的第一个 GitHub Actions 工作流。\n\n- 步骤 4\n\n通过点击“Create blank.yml”工作流，然后点击左侧面板中的“build”作业，查看已执行工作流的日志。点击构建日志中的箭头以检查其输出。你应该能够看到我们工作流中“Run\
    \ a one-line script”和“Run a multi-line script”步骤打印到屏幕上的输出，如图 8.3 所示。\n\n![](img/d3840bdab18c2309faf9de63e70c539d_211_0.png)\n\
    \n**图 8.3：** 我们的第一个 GitHub Actions 工作流的日志。\n\n我们将在本章的后续部分练习编写用于为 Python 包实现 CI\
    \ 和 CD 的工作流，但此时需要了解的高层概念是：\n\n- 工作流是一组命令，由某些事件（如推送到仓库的主分支）触发执行。\n- 工作流在称为运行器的机器上运行，该机器使用特定的操作系统，并由\
    \ CI/CD 服务托管。\n- 工作流包含一个或多个作业。\n- 每个作业包含一个或多个要执行的步骤。在 GitHub Actions 中，步骤由“操作”或“命令”组成，我们将在下一节讨论。\n\
    \n## 8.3.3 操作与命令\n\n正如我们在第 8.3.2 节的工作流文件中看到的，GitHub Actions 中的步骤可以是“操作”（使用关键字\
    \ `uses` 指定）或“命令”（使用关键字 `run` 指定）。我们将在此简要解释这两个概念之间的区别。\n\n使用命令行命令的步骤由一个名称和一个 `run`\
    \ 键组成，如下例所示：\n\n```yaml\n# Runs a single command using the runners shell\n- name:\
    \ Run a one-line script\n  run: echo Hello, world!\n```\n\n`run` 键之后的任何内容都将在运行器的命令行上执行。你可以使用\
    \ `|` 字符在单个步骤中运行多个命令：\n\n```yaml\n# Runs a set of commands using the runners shell\n\
    - name: Run a multi-line script\n  run: |\n    echo Add other actions to build,\n\
    \    echo test, and deploy your project.\n```\n\n与命令相反，操作是可重用的代码单元，无需编写任何命令即可执行特定任务。你通常会使用由他人创建并在\
    \ GitHub Marketplace⁷ 上共享的操作。操作使用 `uses` 关键字指定，后跟你要使用的操作名称。`@` 符号用于指定你要使用的操作版本，如下例所示：\n\
    \n```yaml\n# Checks-out your repository so your job can access it\n- name: Check-out\
    \ repository\n  uses: actions/checkout@v2\n```\n\n一些操作也可以使用 `with` 键配置输入，如下例所示：\n\
    \n```yaml\n# Set up a Python environment for use in actions\n- name: Set up Python\n\
    \  uses: actions/setup-python@v2\n  with:\n    python-version: 3.9\n```\n\n⁷https://github.com/marketplace?type=\n\
    \n## 8.4 设置持续集成\n\n既然我们已经对 GitHub Actions 有了基本的了解，在本节中，我们将为一个 Python 包构建一个持续集成工作流。我们将为本书中一直在开发的\
    \ `pycounts` 包创建此工作流。然而，它将适用于任何 Python 包，并且应该很容易看出如何根据你的需求进行修改。\n\n我们的目标是创建一个\
    \ CI 工作流，每当有人向 `pycounts` GitHub 仓库的主分支推送更改或发起拉取请求时，该工作流将使用 `poetry` 安装我们的包，使用\
    \ `pytest` 运行包的测试，并使用 `sphinx` 构建其文档。这些是我们或协作者通常在每次更改包时在本地执行的步骤，因此将它们自动化是合理的。\n\
    \n### 8.4.1 设置\n\n要使用 GitHub Actions 设置工作流，我们需要创建一个工作流文件。工作流文件是位于根包目录中 `.github/workflows/`\
    \ 目录下的 `.yml` 文件。我们将我们的文件命名为 `ci-cd.yml`。你可以在你选择的编辑器中创建该文件，或者从根包目录在命令行运行以下命令：\n\
    \n```bash\n$ mkdir -p .github/workflows\n$ touch .github/workflows/ci-cd.yml\n\
    ```\n\n你的包目录结构现在应该如下所示：\n\n```\npycounts\n├── .github          <----------\n│\
    \   └── workflows    <----------\n│       └── ci-cd.yml <----------\n├── .readthedocs.yml\n\
    ├── CHANGELOG.md\n├── CONDUCT.md\n├── CONTRIBUTING.md\n├── docs\n│   └── ...\n\
    ├── LICENSE\n├── README.md\n├── poetry.lock\n├── pyproject.toml\n├── src\n│  \
    \ └── ...\n└── tests\n    └── ...\n```\n\n在编辑器中打开这个新的 `ci-cd.yml` 文件。我们将设置一个 CI\
    \ 工作流，当有人向我们仓库的任何分支推送新内容或发起拉取请求时触发（请注意，这与**第 8.3.2 节**略有不同，那里我们的工作流仅在向“main”分支推送或拉取请求时运行）。要设置此工作流，请将以下文本复制并粘贴到\
    \ `ci-cd.yml` 中：\n\n> 在构建我们的 CI 工作流时，我们将使用之前在**第 8.3 节**中描述的相同语法和术语。不要害怕根据需要复习该部分。\n\
    \n```yaml\nname: ci-cd\n\non: [push, pull_request]\n```\n\n现在我们需要设置在发生上述触发事件之一时将执行的步骤。GitHub\
    \ Actions 本质上为你提供了一个你选择的空白操作系统（一个“运行器”），我们需要根据我们希望它执行的步骤来设置它。在我们的例子中，我们需要在运行器上安装\
    \ Python 并安装 `poetry`，以便我们可以安装我们的包、运行其测试并构建其文档。因此，我们的设置将涉及以下步骤，我们已指明该步骤将使用操作还是命令（**第\
    \ 8.3.3 节**）：\n\n1. 指定一个操作系统。我们将使用 Ubuntu，语法为 `runs-on: ubuntu-latest`。如果你希望在\
    \ MacOS 和 Windows 系统上测试你的包，也可以使用它们，但 Ubuntu 是一个很好的默认选择——参见 GitHub Actions 文档<sup>8</sup>。\n\
    2. 安装 Python（操作：`actions/setup-python@v2`<sup>9</sup>）。\n\n<sup>8</sup>https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#supported-runners-and-hardware-resources\n\
    <sup>9</sup>https://github.com/actions/setup-python"
