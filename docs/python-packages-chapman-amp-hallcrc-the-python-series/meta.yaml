    \   1. Write a test.\n2. Write the code to be tested.\n3. Test the code.\n4. Refactor\
    \ code (make small changes).\n5. Repeat.\n\nThis workflow is illustrated in Fig.\
    \ 5.1.\n\nIn our earlier demonstration with the count_letters() function, we swapped\
    \ steps 1 and 2; we wrote the first version of our function's code before we wrote\
    \ our tests, and this is a common workflow too. However, you can see how it might\
    \ have been beneficial to write the tests (or at least think about them)"
