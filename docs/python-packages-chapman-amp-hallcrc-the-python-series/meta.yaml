    # 3.5.2 Installing your package


    We have our package structure set up and we''ve populated it with our Python code.
    How do we install and use our package? There are several tools available to develop
    installable Python packages. The most common are poetry, flit, and setuptools,
    which we compare in Section 4.3.3. In this book, we will be using poetry (which
    we installed in Section 2.2.2); it is a modern packaging tool that provides simple
    and efficient commands to develop, install, and distribute Python packages.


    In a poetry-managed package, the pyproject.toml file stores all the metadata and
    install instructions for the package. The pyproject.toml that the py-pkgs-cookiecutter
    created for our pycounts package looks like this:


    ```

    [tool.poetry]

    name = "pycounts"

    version = "0.1.0"

    description = "Calculate word counts in a text file."

    authors = ["Tomas Beuzen"]

    license = "MIT"

    readme = "README.md"

    ```'
