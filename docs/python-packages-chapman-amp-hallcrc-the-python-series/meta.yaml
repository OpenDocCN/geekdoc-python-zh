- md: "## List of Tables\n\n- 0.1 Concepts this book assumes readers have basic familiarity\
    \ with. xvi\n- 3.1 A description of the py-pkgs-cookiecutter template prompts.\
    \ 24\n- 3.2 A description of the tables in the pyproject.toml. 34\n- 3.3 Typical\
    \ Python package documentation. 50\n- 4.1 Demonstration of absolute and relative\
    \ intra-package imports. 94\n- 6.1 Typical Python package documentation. 139\n\
    - 7.1 Examples of major, minor, and patch releases of Python. 167\n- 8.1 Terminology\
    \ used in GitHub Actions. 187\n- 8.2 Description of Python Semantic Release configuration\
    \ options. 205\n\n## Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
    \n## Preface\n\nPython packages are the fundamental units of shareable code in\
    \ Python. Packages make it easy to organize, reuse, and maintain your code, as\
    \ well as share it between projects, with your colleagues, and with the wider\
    \ Python community. *Python Packages* is an open-source book that describes modern\
    \ and efficient workflows for creating Python packages. The focus of this book\
    \ is overwhelmingly practical; we will demonstrate methods and tools you can use\
    \ to develop and maintain packages quickly, reproducibly, and with as much automation\
    \ as possible — so you can focus on writing and sharing code!\n\n## Why read this\
    \ book?\n\nDespite their importance, packages can be difficult to understand and\
    \ cumbersome to create for beginners and seasoned developers alike. This book\
    \ aims to describe the packaging process at an accessible and practical level\
    \ for data scientists, developers, and programmers. Along the way, we'll develop\
    \ a real Python package and will explore all the key elements of Python packaging,\
    \ including: creating a package file and directory structure, when and why to\
    \ write tests and documentation, and how to maintain and update your package with\
    \ the help of automated continuous integration and continuous deployment (CI/CD)\
    \ pipelines.\n\nBy reading this book, you will:\n\n- Understand what Python packages\
    \ are, and when and why you should use them.\n- Be able to build your own Python\
    \ package from scratch.\n- Learn how to document your Python code and packages.\n\
    - Write software tests for your code and automate them.\n- Learn how to release\
    \ your package on the Python Package Index (PyPI) and discover best practices\
    \ for updating and versioning your code.\n- Implement CI/CD workflows to build,\
    \ test, and deploy your package automatically.\n- Get tips on Python coding style,\
    \ best-practice packaging workflows, and other useful development tools.\n\n##\
    \ Structure of the book\n\n**Chapter 1: Introduction** first gives a brief introduction\
    \ to packages in Python and why you should know how to make them.\n\n**Chapter\
    \ 2: System setup** describes how to set up your development environment to develop\
    \ packages and follow the examples in this book.\n\nIn **Chapter 3: How to package\
    \ a Python**, we develop an example package from beginning-to-end as a practical\
    \ demonstration of the key steps involved in the packaging process. This chapter\
    \ forms the foundation of the book and will act as a reference sheet for readers\
    \ creating packages in the future.\n\nThe remaining chapters then go into more\
    \ detail about each step in this process, organized roughly in their order in\
    \ the workflow:\n\n- **Chapter 4: Package structure and distribution**\n- **Chapter\
    \ 5: Testing**\n- **Chapter 6: Documentation**\n- **Chapter 7: Releasing and versioning**\n\
    - **Chapter 8: Continuous integration and deployment**\n\n## Assumptions\n\nWhile\
    \ this book aims to introduce Python packaging at a beginner level, we assume\
    \ readers have basic familiarity with the concepts listed in Table 0.1:\n\n**TABLE\
    \ 0.1:** Concepts this book assumes readers have basic familiarity with.\n\n|\
    \ Item | Learning resources |\n| :--- | :--- |\n| How to import Python packages\
    \ with the `import` statement | Python documentation |\n| How to write conditionals\
    \ (if/elif/else) and loops (for) | Python documentation |\n| How to use and write\
    \ Python functions | *Plotting and Programming in Python: Writing Functions* (The\
    \ Carpentries, 2021) |\n| (Optional) Basic familiarity with version control and\
    \ Git and GitHub (or similar tools) | *Happy Git and GitHub for the useR* (Bryan\
    \ et al., 2021) or *Research Software Engineering with Python* (Irving et al.,\
    \ 2021) |\n\n## Conventions\n\nThroughout this book we use `foo()` to refer to\
    \ functions, `bar` for inline commands/variables/function parameters/package names,\
    \ and `__init__.py` and `src/` to refer to files and directories respectively.\n\
    \nCommands entered at the command line appear as below, with `$` indicating the\
    \ command prompt:\n\n```\n$ mkdir my-first-package\n$ cd my-first-package\n$ python\n\
    ```\n\nCode entered in a Python interpreter looks like this:\n\n```\n>>> import\
    \ math\n>>> round(math.pi, 3)\n```\n\n```\n3.142\n```\n\nCode blocks appear as\
    \ below:\n\n```\ndef is_even(n):\n    \"\"\"Check if n is even.\"\"\"\n    if\
    \ n % 2 == 0:\n        return True\n    else:\n        return False\n```\n\nIf\
    \ you are reading an electronic version of the book, e.g., [https://py-pkgs.org](https://py-pkgs.org),\
    \ all code is rendered so that you can easily copy and paste directly from your\
    \ browser to your Python interpreter or editor.\n\n## Persistence\n\nThe Python\
    \ software ecosystem is constantly evolving. While we aim to make the packaging\
    \ workflows and concepts discussed in this book tool-agnostic, the tools we do\
    \ use in the book may have been updated by the time you read it. If the maintainers\
    \ of these tools are doing the right thing by documenting, versioning, and properly\
    \ deprecating their code (we'll explore these concepts ourselves in **Chapter\
    \ 7: Releasing and versioning**), then it should be straightforward to adapt any\
    \ outdated code in the book.\n\n## Colophon\n\nThis book was written in JupyterLab¹\
    \ and compiled using Jupyter Book². The source is hosted on GitHub³ and is deployed\
    \ online at https://py-pkgs.org with Netlify⁴.\n\n## Acknowledgments\n\nWe'd like\
    \ to thank everyone that has contributed to the development of *Python Packages*.\
    \ This is an open source book that began as supplementary material for the University\
    \ of British Columbia's Master of Data Science program and was subsequently developed\
    \ openly on GitHub where it has been read, revised, and supported by many students,\
    \ educators, practitioners and hobbyists. Without you all, this book wouldn't\
    \ be nearly as good as it is, and we are deeply grateful. A special thanks to\
    \ those who have contributed to or provided feedback on the text via GitHub (in\
    \ alphabetical order of GitHub username): benjy765, Carreau, chendaniely, dcslagel,\
    \ eliasdabbas, fegue, firasm, Midnighter, mtkerbeR, NickleDave, SamEdwardes, tarensanders.\n\
    \nThe scope and intent of this book was inspired by the fantastic *R Packages*⁵\
    \ (Wickham and Bryan, 2015) book written by Hadley Wickham and Jenny Bryan, a\
    \ book that has been a significant resource for the R community over the years.\
    \ We hope that *Python Packages* will eventually play a similar role in the Python\
    \ community.\n\n¹ https://jupyterlab.readthedocs.io/en/stable/index.html\n² https://jupyterbook.org/intro.html\n\
    ³ https://github.com/UBC-MDS/py-pkgs\n⁴ https://www.netlify.com/\n⁵ https://r-pkgs.org\n\
    \n## About the authors\n\nTomas Beuzen is a data scientist and educator based\
    \ in Sydney, Australia. He has a background in coastal engineering and climate\
    \ science and was a teaching fellow in the Master of Data Science program (Vancouver\
    \ Option) at the University of British Columbia. Tomas currently works as a data\
    \ scientist in the renewable energy sector and enjoys spending his free time developing\
    \ open-source, educational data science material, and using data science to solve\
    \ problems in the natural and engineered world.\n\nTiffany Timbers is an Assistant\
    \ Professor of Teaching in the Department of Statistics and a Co-Director for\
    \ the Master of Data Science program (Vancouver Option) at the University of British\
    \ Columbia. In these roles she teaches and develops curriculum around the responsible\
    \ application of data science to solve real-world problems. One of her favorite\
    \ courses she teaches is a graduate course on collaborative software development,\
    \ which focuses on teaching how to create R and Python packages using modern tools\
    \ and workflows."
  mdcn: "## 表格列表\n\n- 0.1 本书假设读者已基本熟悉的概念。xvi\n- 3.1 py-pkgs-cookiecutter 模板提示的描述。24\n\
    - 3.2 pyproject.toml 中表格的描述。34\n- 3.3 典型的 Python 包文档。50\n- 4.1 绝对和相对包内导入的演示。94\n\
    - 6.1 典型的 Python 包文档。139\n- 7.1 Python 主版本、次版本和补丁版本的示例。167\n- 8.1 GitHub Actions\
    \ 中使用的术语。187\n- 8.2 Python Semantic Release 配置选项的描述。205\n\n## Taylor & Francis\n\
    \nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\n## 前言\n\nPython 包是\
    \ Python 中可共享代码的基本单元。包使得组织、重用和维护代码变得容易，也便于在项目之间、与同事以及更广泛的 Python 社区共享代码。*Python\
    \ Packages* 是一本开源书籍，描述了创建 Python 包的现代高效工作流程。本书的重点极其注重实践；我们将演示你可以用来快速、可重复且尽可能自动化地开发和维护包的方法和工具——这样你就可以专注于编写和分享代码！\n\
    \n## 为什么阅读本书？\n\n尽管包很重要，但对于初学者和经验丰富的开发者来说，它们可能难以理解且创建过程繁琐。本书旨在以易于理解和实用的水平，为数据科学家、开发者和程序员描述打包过程。在此过程中，我们将开发一个真实的\
    \ Python 包，并探索 Python 打包的所有关键要素，包括：创建包文件和目录结构、何时以及为何编写测试和文档，以及如何借助自动化持续集成和持续部署（CI/CD）流水线来维护和更新你的包。\n\
    \n通过阅读本书，你将：\n\n- 理解什么是 Python 包，以及何时以及为何应该使用它们。\n- 能够从零开始构建自己的 Python 包。\n- 学习如何为你的\
    \ Python 代码和包编写文档。\n- 为你的代码编写软件测试并实现自动化。\n- 学习如何在 Python 包索引（PyPI）上发布你的包，并发现更新和版本控制代码的最佳实践。\n\
    - 实现 CI/CD 工作流，以自动构建、测试和部署你的包。\n- 获取关于 Python 编码风格、最佳实践打包工作流以及其他有用开发工具的提示。\n\n\
    ## 本书结构\n\n**第 1 章：引言** 首先简要介绍了 Python 中的包以及为什么你应该了解如何创建它们。\n\n**第 2 章：系统设置**\
    \ 描述了如何设置你的开发环境以开发包并遵循本书中的示例。\n\n在 **第 3 章：如何打包 Python 包** 中，我们从头到尾开发了一个示例包，作为打包过程关键步骤的实践演示。本章构成了本书的基础，并将作为读者未来创建包的参考手册。\n\
    \n其余章节则更详细地介绍了此过程中的每个步骤，大致按工作流中的顺序组织：\n\n- **第 4 章：包结构和分发**\n- **第 5 章：测试**\n\
    - **第 6 章：文档**\n- **第 7 章：发布和版本控制**\n- **第 8 章：持续集成和部署**\n\n## 假设\n\n虽然本书旨在以初学者水平介绍\
    \ Python 打包，但我们假设读者已基本熟悉表 0.1 中列出的概念：\n\n**表 0.1：** 本书假设读者已基本熟悉的概念。\n\n| 项目 |\
    \ 学习资源 |\n| :--- | :--- |\n| 如何使用 `import` 语句导入 Python 包 | Python 文档 |\n| 如何编写条件语句（if/elif/else）和循环（for）\
    \ | Python 文档 |\n| 如何使用和编写 Python 函数 | *Plotting and Programming in Python: Writing\
    \ Functions* (The Carpentries, 2021) |\n| （可选）基本熟悉版本控制以及 Git 和 GitHub（或类似工具） |\
    \ *Happy Git and GitHub for the useR* (Bryan et al., 2021) 或 *Research Software\
    \ Engineering with Python* (Irving et al., 2021) |\n\n## 约定\n\n在本书中，我们使用 `foo()`\
    \ 指代函数，`bar` 指代内联命令/变量/函数参数/包名，`__init__.py` 和 `src/` 分别指代文件和目录。\n\n在命令行输入的命令如下所示，其中\
    \ `$` 表示命令提示符：\n\n```\n$ mkdir my-first-package\n$ cd my-first-package\n$ python\n\
    ```\n\n在 Python 解释器中输入的代码如下所示：\n\n```\n>>> import math\n>>> round(math.pi, 3)\n\
    ```\n\n```\n3.142\n```\n\n代码块如下所示：\n\n```\ndef is_even(n):\n    \"\"\"Check if\
    \ n is even.\"\"\"\n    if n % 2 == 0:\n        return True\n    else:\n     \
    \   return False\n```\n\n如果你正在阅读本书的电子版本，例如 [https://py-pkgs.org](https://py-pkgs.org)，所有代码都已渲染，因此你可以轻松地从浏览器直接复制粘贴到\
    \ Python 解释器或编辑器中。\n\n## 持续性\n\nPython 软件生态系统在不断发展。虽然我们旨在使本书中讨论的打包工作流和概念与工具无关，但我们在书中使用的工具在你阅读时可能已经更新。如果这些工具的维护者通过记录、版本控制和正确弃用其代码（我们将在\
    \ **第 7 章：发布和版本控制** 中探讨这些概念）来正确行事，那么应该可以轻松地调整书中任何过时的代码。\n\n## 版权页\n\n本书使用 JupyterLab¹\
    \ 编写，并使用 Jupyter Book² 编译。源代码托管在 GitHub³ 上，并通过 Netlify⁴ 在线部署于 https://py-pkgs.org。\n\
    \n## 致谢\n\n我们要感谢所有为 *Python Packages* 开发做出贡献的人。这是一本开源书籍，最初是不列颠哥伦比亚大学数据科学硕士项目的补充材料，随后在\
    \ GitHub 上公开开发，得到了许多学生、教育工作者、从业者和爱好者的阅读、修订和支持。没有你们所有人，这本书不会像现在这样好，我们深表感谢。特别感谢那些通过\
    \ GitHub 对文本做出贡献或提供反馈的人（按 GitHub 用户名字母顺序排列）：benjy765、Carreau、chendaniely、dcslagel、eliasdabbas、fegue、firasm、Midnighter、mtkerbeR、NickleDave、SamEdwardes、tarensanders。\n\
    \n本书的范围和意图受到了 Hadley Wickham 和 Jenny Bryan 所著的精彩 *R Packages*⁵ 一书的启发，该书多年来一直是\
    \ R 社区的重要资源。我们希望 *Python Packages* 最终能在 Python 社区中发挥类似的作用。\n\n¹ https://jupyterlab.readthedocs.io/en/stable/index.html\n\
    ² https://jupyterbook.org/intro.html\n³ https://github.com/UBC-MDS/py-pkgs\n⁴\
    \ https://www.netlify.com/\n⁵ https://r-pkgs.org\n\n## 关于作者\n\nTomas Beuzen 是一位居住在澳大利亚悉尼的数据科学家和教育工作者。他拥有海岸工程和气候科学背景，曾任不列颠哥伦比亚大学数据科学硕士项目（温哥华选项）的教学研究员。Tomas\
    \ 目前在可再生能源领域担任数据科学家，喜欢在业余时间开发开源的、教育性的数据科学材料，并利用数据科学解决自然和工程世界中的问题。\n\nTiffany Timbers\
    \ 是不列颠哥伦比亚大学统计系的教学助理教授，也是数据科学硕士项目（温哥华选项）的联合主任。在这些职位上，她教授并开发围绕负责任地应用数据科学解决现实世界问题的课程。她最喜欢教授的课程之一是一门关于协作软件开发的研究生课程，重点是教授如何使用现代工具和工作流创建\
    \ R 和 Python 包。"
