    # 3.6.1 Dependency version constraints


    Versioning is the practice of assigning a unique identifier to unique releases
    of a package. For example, semantic versioning[^12] is a common versioning system
    that consists of three integers A.B.C. A is the "major" version, B is the "minor"
    version, and C is the "patch" version identifier. Package versions usually starts


    [^12]: https://semver.org'
  - '[PAGE 61]


    # 3.6 Adding dependencies to your package


    at 0.1.0 and positively increment the major, minor, and patch numbers from there,
    depending on the kind of changes made to the package over time.


    We''ll talk more about versioning in **Chapter 7: Releasing and versioning**,
    but what''s important to know now is that we typically constrain the required
    version number(s) of our package''s dependencies, to ensure we''re using versions
    that are up-to-date and contain the functionality we need. You may have noticed
    poetry prepended a caret (^) operator to the dependency versions in our *pyproject.toml*
    file, under the [tool.poetry.dependencies] section:


    ```

    [tool.poetry.dependencies]

    python = "^3.9"

    matplotlib = "^3.4.3"

    ```


    The caret operator is short-hand for "requires this or any higher version that
    does not modify the left-most non-zero version digit". For example, our package
    depends on any Python version >=3.9.0 and <4.0.0. Thus, examples of valid versions
    include 3.9.1 and 3.12.0, but 4.0.1 would be invalid. There are many other syntaxes
    that can be used to specify version constraints in different ways, as you can
    read more about in the *poetry documentation*<sup>13</sup>. So why do we care
    about this? The caret operator enforces an upper cap on the dependency versions
    our package requires. A problem with this approach is that it forces anyone depending
    on your package to specify the same constraints and can thus make it difficult
    to add and resolve dependencies.


    This problem is best shown by example. Version 1.21.5 of the popular numpy (Harris
    et al., 2020) package had bound version constraints on Python, requiring version
    >=3.7 and <3.11 (see the source code<sup>14</sup>). Watch what happens if we try
    to add this version of numpy to our pycounts package (we use the argument --dry-run
    to show what would happen here without actually executing anything):


    ```

    $ poetry add numpy=1.21.5 --dry-run

    ```


    ```

    Updating dependencies

    Resolving dependencies... (0.1s)


    SolverProblemError


    The current project''s Python requirement (>=3.9,<4.0) is not compatible

    with some of the required packages Python requirement:

    ```


    <sup>13</sup>https://python-poetry.org/docs/dependency-specification

    <sup>14</sup>https://github.com/numpy/numpy/blob/c3d0a09342c08c466984654bc4738af595fba896/setup.py#L409'
  - '[PAGE 62]


    - numpy requires Python >=3.7,<3.11, so it will not be satisfied for Python >=3.11,<4.0


    The problem here is that our package currently supports Python versions ^3.9 (i.e.,
    >=3.9.0 and <4.0.0), so if we released it, a user with Python 3.12.0 would technically
    be able to install it. However, numpy 1.21.5 only supports >=3.7 and <3.11 which
    would not be compatible with Python 3.12.0 (or any version >=3.11). As a result
    of this inconsistency, poetry refuses to add numpy 1.21.5 as a dependency of our
    package. To add it, we have three main choices:


    +   1. Change the Python version constraints of our package to >=3.7 and <3.11.

    2. Wait for a version of numpy that is compatible with our package''s Python constraints.

    3. Manually specify the versions of Python for which the dependency can be installed,
    e.g.: poetry add numpy=1.21.5 --python ">=3.7, <3.11".


    None of these options is really ideal, especially if your package has a large
    number of dependencies with different bound version constraints. However, a simple
    way this issue could be resolved is if numpy 1.21.5 did not having an upper cap
    on the Python version required. In fact, in the subsequent minor version release
    of numpy, 1.22.0, the upper version cap on Python was removed, requiring only
    version >=3.8 (see the source code<sup>15</sup>), which we would be able to successfully
    add to our package:


    ```

    $ poetry add numpy=1.22.0 --dry-run

    ```


    Ultimately, version constraints are an important issue that can affect the usability
    of your package. If you intend to share your package, having an upper cap on dependency
    versions can make it very difficult for other developers to use your package as
    a dependency in their own projects. At the time of writing, much of the packaging
    community, including the Python Packaging Authority<sup>16</sup>, generally recommend
    not using an upper cap on version constraints unless absolutely necessary. As
    a result, we recommend specifying version constraints without an upper cap by
    manually changing poetry''s default caret operator (^) to a greater-than-or-equal-to
    sign (>=). For example, we will change the [tool.poetry.dependencies] section
    of our pyproject.toml file as follows:


    <sup>15</sup>https://github.com/numpy/numpy/blob/4adc87dff15a247e417d50f10cc4def8e1c17a03/setup.py#L410

    <sup>16</sup>https://github.com/pypa/packaging.python.org/pull/850'
- md: "## 3.7 Testing your package\n\n### 3.7.1 Writing tests\n\nAt this point we\
    \ have developed a package that can count words in a text file and plot the results.\
    \ But how can we be certain that our package works correctly and produces reliable\
    \ results?\n\nOne thing we can do is write tests for our package that check the\
    \ package is working as expected. This is particularly important if you intend\
    \ to share your package with others (you don't want to share code that doesn't\
    \ work!). But even if you don't intend to share your package, writing tests can\
    \ still be helpful to catch errors in your code and to write new code without\
    \ breaking any tried-and-tested existing functionality. If you don't want to write\
    \ to tests for your package feel free to skip to [Section 3.8](#section-3.8).\n\
    \nMany of us already conduct informal tests of our code by running it a few times\
    \ in a Python session to see if it's working as we expect, and if not, changing\
    \ the code and repeating the process. This is called \"manual testing\" or \"\
    exploratory testing\". However, when writing software, it's preferable to define\
    \ your tests in a more formal and reproducible way.\n\nTests in Python are often\
    \ written with the `assert` statement. `assert` checks the truth of an expression;\
    \ if the expression is true, Python does nothing and continues running, but if\
    \ it's false, the code terminates and shows a user-defined error message. For\
    \ example, consider running the follow code in a Python interpreter:\n\n```python\n\
    >>> ages = [32, 19, 9, 75]\n>>> for age in ages:\n...     assert age >= 18, \"\
    Person is younger than 18!\"\n...     print(\"Age verified!\")\n```\n\n```\nAge\
    \ verified!\nAge verified!\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 2, in <module>\nAssertionError: Person is younger than 18!\n```\n\nNote\
    \ how the first two “ages” (32 and 19) are verified, with an “Age verified!” message\
    \ printed to screen. But the third age of 9 fails the assert, so an error message\
    \ is raised and the program terminates before checking the last age of 75.\n\n\
    Using the assert statement, let’s write a test for the count_words() function\
    \ of our pycounts package. There are different kinds of tests used to test software\
    \ (unit tests, integration tests, regression tests, etc.); we discuss these in\
    \ Chapter 5: Testing. For now, we’ll write a unit test. Unit tests evaluate a\
    \ single “unit” of software, such as a Python function, to check that it produces\
    \ an expected result. A unit test consists of:\n\n1. Some data to test the code\
    \ with (called a “fixture”). The fixture is typically a small or simple version\
    \ of the data the function will typically process.\n2. The actual result that\
    \ the code produces given the fixture.\n3. The expected result of the test, which\
    \ is compared to the actual result using an assert statement.\n\nThe unit test\
    \ we are going to write will assert that the count_words() function produces an\
    \ expected result given a certain fixture. We’ll use the following quote from\
    \ Albert Einstein as our fixture:\n\n> “Insanity is doing the same thing over\
    \ and over and expecting different results.”\n\nThe actual result is the result\
    \ count_words() outputs when we input this fixture. We can get the *expected*\
    \ result by manually counting the words in the quote (ignoring capitalization\
    \ and punctuation):\n\n```python\neinstein_counts = {'insanity': 1, 'is': 1, 'doing':\
    \ 1,\n                  'the': 1, 'same': 1, 'thing': 1,\n                  'over':\
    \ 2, 'and': 2, 'expecting': 1,\n                  'different': 1, 'results': 1}\n\
    ```\n\nTo write our unit test in Python code, let's first create a text file containing\
    \ the Einstein quote to use as our fixture. We'll add it to the `tests/` directory\
    \ of our package as a file called `einstein.txt` — you can make the file manually,\
    \ or you can create it from a Python session started in the root package directory\
    \ using the following code:\n\n```python\n>>> quote = \"Insanity is doing the\
    \ same thing over and over and \\n...         expecting different results.\"\n\
    >>> with open(\"tests/einstein.txt\", \"w\") as file:\n...     file.write(quote)\n\
    ```\n\nNow, a unit test for our `count_words()` function would look as below:\n\
    \n```python\n>>> from pycounts.pycounts import count_words\n>>> from collections\
    \ import Counter\n>>> expected = Counter({'insanity': 1, 'is': 1, 'doing': 1,\n\
    ...                     'the': 1, 'same': 1, 'thing': 1,\n...                \
    \     'over': 2, 'and': 2, 'expecting': 1,\n...                     'different':\
    \ 1, 'results': 1})\n>>> actual = count_words(\"tests/einstein.txt\")\n>>> assert\
    \ actual == expected, \"Einstein quote counted incorrectly!\"\n```\n\nIf the above\
    \ code runs without error, our `count_words()` function is working, at least to\
    \ our test specifications. In the next section, we'll discuss how we can make\
    \ this testing process more efficient.\n\n### 3.7.2 Running tests\n\nIt would\
    \ be tedious and inefficient to manually write and execute unit tests for your\
    \ package's code like we did above. Instead, it's common to use a \"testing framework\"\
    \ to automatically run our tests for us. `pytest` is the most common test framework\
    \ used for Python packages. To use `pytest`:\n\n1. Tests are defined as functions\
    \ prefixed with `test_` and contain one or more statements that assert code produces\
    \ an expected result.\n2. Tests are put in files of the form `test_*.py` or `*_test.py`,\
    \ and are usually placed in a directory called `tests/` in a package's root.\n\
    3. Tests can be executed using the command `pytest` at the command line and pointing\
    \ it to the directory your tests live in (i.e., `pytest tests/`). `pytest` will\
    \ find all files of the form `test_*.py` or `*_test.py` in that directory and\
    \ its sub-directories, and execute any functions with names prefixed with `test_`.\n\
    \nThe `py-pkgs-cookiecutter` created a `tests/` directory and a module called\
    \ `test_pycounts.py` for us to put our tests in:\n\n```\npycounts\n├── CHANGELOG.md\n\
    ├── CONDUCT.md\n├── CONTRIBUTING.md\n├── docs\n│   └── ...\n├── LICENSE\n├── poetry.lock\n\
    ├── pyproject.toml\n├── README.md\n├── src\n│   └── ...\n└── tests          <--------\n\
    \    ├── einstein.txt <--------\n    └── test_pycounts.py <--------\n```\n\n>\
    \ We created the file `tests/einstein.txt` ourselves in **Section 3.7.1**, it\
    \ was not created by the `py-pkgs-cookiecutter`.\n\nAs mentioned above, `pytest`\
    \ tests are written as functions prefixed with `test_` and which contain one or\
    \ more `assert` statements that check some code functionality. Based on this format,\
    \ let's add the unit test we created in **Section 3.7.1** as a test function to\
    \ `tests/test_pycounts.py` using the below Python code:\n\n```python\nfrom pycounts.pycounts\
    \ import count_words\nfrom collections import Counter\n\ndef test_count_words():\n\
    \    \"\"\"Test word counting from a file.\"\"\"\n    expected = Counter({'insanity':\
    \ 1, 'is': 1, 'doing': 1,\n                       'the': 1, 'same': 1, 'thing':\
    \ 1,\n                       'over': 2, 'and': 2, 'expecting': 1,\n          \
    \             'different': 1, 'results': 1})\n    actual = count_words(\"tests/einstein.txt\"\
    )\n    assert actual == expected, \"Einstein quote counted incorrectly!\"\n```\n\
    \nBefore we can use pytest to run our test for us we need to add it as a development\
    \ dependency of our package using the command poetry add --dev. A development\
    \ dependency is a package that is not required by a user to use your package but\
    \ is required for development purposes (like testing):\n\n> If using a conda virtual\
    \ environment, make sure that environment is active by running conda activate\
    \ pycounts, before using or working on your package.\n\n```bash\n$ poetry add\
    \ --dev pytest\n```\n\nIf you look in the pyproject.toml file you will see that\
    \ pytest gets added under the [tool.poetry.dev-dependencies] section (which was\
    \ previously empty, as we saw in Section 3.5.2):\n\n```toml\n[tool.poetry.dev-dependencies]\n\
    pytest = \"^6.2.5\"\n```\n\nTo use pytest to run our test we can use the following\
    \ command from our root package directory:\n\n```bash\n$ pytest tests/\n```\n\n\
    ```\n============================= test session starts =============================\n\
    ...\ncollected 1 item\n```"
  mdcn: "## 3.7 测试你的包\n\n### 3.7.1 编写测试\n\n至此，我们已经开发了一个可以统计文本文件中单词数量并绘制结果的包。但我们如何确定我们的包能正常工作并产生可靠的结果呢？\n\
    \n我们可以做的一件事是为我们的包编写测试，以检查包是否按预期工作。如果你打算与他人共享你的包，这一点尤为重要（你肯定不想共享无法工作的代码！）。但即使你不打算共享你的包，编写测试仍然有助于捕获代码中的错误，并在编写新代码时不会破坏任何经过验证的现有功能。如果你不想为你的包编写测试，请随时跳转到[第\
    \ 3.8 节](#section-3.8)。\n\n我们许多人已经通过在 Python 会话中多次运行代码来进行非正式测试，以查看它是否按预期工作，如果不是，则更改代码并重复此过程。这被称为“手动测试”或“探索性测试”。然而，在编写软件时，最好以更正式和可重现的方式定义你的测试。\n\
    \nPython 中的测试通常使用 `assert` 语句编写。`assert` 检查表达式的真假；如果表达式为真，Python 不做任何事情并继续运行，但如果为假，代码将终止并显示用户定义的错误消息。例如，考虑在\
    \ Python 解释器中运行以下代码：\n\n```python\n>>> ages = [32, 19, 9, 75]\n>>> for age in\
    \ ages:\n...     assert age >= 18, \"Person is younger than 18!\"\n...     print(\"\
    Age verified!\")\n```\n\n```\nAge verified!\nAge verified!\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 2, in <module>\nAssertionError: Person\
    \ is younger than 18!\n```\n\n请注意前两个“年龄”（32 和 19）是如何被验证的，并在屏幕上打印了“Age verified!”消息。但第三个年龄\
    \ 9 未能通过断言，因此引发了一条错误消息，并且程序在检查最后一个年龄 75 之前就终止了。\n\n使用 assert 语句，让我们为 pycounts\
    \ 包的 count_words() 函数编写一个测试。有不同类型的测试用于测试软件（单元测试、集成测试、回归测试等）；我们将在第 5 章：测试中讨论这些。现在，我们将编写一个单元测试。单元测试评估软件的单个“单元”，例如一个\
    \ Python 函数，以检查它是否产生预期的结果。单元测试包括：\n\n1. 一些用于测试代码的数据（称为“测试夹具”）。测试夹具通常是函数通常处理的数据的小型或简单版本。\n\
    2. 代码在给定测试夹具时产生的实际结果。\n3. 测试的预期结果，使用 assert 语句与实际结果进行比较。\n\n我们将编写的单元测试将断言 count_words()\
    \ 函数在给定某个测试夹具时产生预期的结果。我们将使用阿尔伯特·爱因斯坦的以下名言作为我们的测试夹具：\n\n> “Insanity is doing the\
    \ same thing over and over and expecting different results.”\n\n实际结果是当我们输入此测试夹具时\
    \ count_words() 输出的结果。我们可以通过手动计算名言中的单词（忽略大小写和标点符号）来获得*预期*结果：\n\n```python\neinstein_counts\
    \ = {'insanity': 1, 'is': 1, 'doing': 1,\n                  'the': 1, 'same':\
    \ 1, 'thing': 1,\n                  'over': 2, 'and': 2, 'expecting': 1,\n   \
    \               'different': 1, 'results': 1}\n```\n\n要在 Python 代码中编写我们的单元测试，让我们首先创建一个包含爱因斯坦名言的文本文件作为我们的测试夹具。我们将把它添加到我们包的\
    \ `tests/` 目录中，文件名为 `einstein.txt`——你可以手动创建该文件，也可以在包根目录启动的 Python 会话中使用以下代码创建它：\n\
    \n```python\n>>> quote = \"Insanity is doing the same thing over and over and\
    \ \\n...         expecting different results.\"\n>>> with open(\"tests/einstein.txt\"\
    , \"w\") as file:\n...     file.write(quote)\n```\n\n现在，我们的 `count_words()` 函数的单元测试将如下所示：\n\
    \n```python\n>>> from pycounts.pycounts import count_words\n>>> from collections\
    \ import Counter\n>>> expected = Counter({'insanity': 1, 'is': 1, 'doing': 1,\n\
    ...                     'the': 1, 'same': 1, 'thing': 1,\n...                \
    \     'over': 2, 'and': 2, 'expecting': 1,\n...                     'different':\
    \ 1, 'results': 1})\n>>> actual = count_words(\"tests/einstein.txt\")\n>>> assert\
    \ actual == expected, \"Einstein quote counted incorrectly!\"\n```\n\n如果上述代码运行没有错误，我们的\
    \ `count_words()` 函数就能正常工作，至少符合我们的测试规范。在下一节中，我们将讨论如何使此测试过程更高效。\n\n### 3.7.2 运行测试\n\
    \n像我们上面那样手动编写和执行包代码的单元测试将是繁琐且低效的。相反，通常使用“测试框架”来自动为我们运行测试。`pytest` 是用于 Python 包的最常见的测试框架。要使用\
    \ `pytest`：\n\n1. 测试被定义为以 `test_` 为前缀的函数，并包含一个或多个断言代码产生预期结果的语句。\n2. 测试放在形式为 `test_*.py`\
    \ 或 `*_test.py` 的文件中，通常放在包根目录中名为 `tests/` 的目录中。\n3. 测试可以在命令行使用 `pytest` 命令执行，并指向测试所在的目录（即\
    \ `pytest tests/`）。`pytest` 将在该目录及其子目录中查找所有形式为 `test_*.py` 或 `*_test.py` 的文件，并执行任何名称以\
    \ `test_` 为前缀的函数。\n\n`py-pkgs-cookiecutter` 为我们创建了一个 `tests/` 目录和一个名为 `test_pycounts.py`\
    \ 的模块来存放我们的测试：\n\n```\npycounts\n├── CHANGELOG.md\n├── CONDUCT.md\n├── CONTRIBUTING.md\n\
    ├── docs\n│   └── ...\n├── LICENSE\n├── poetry.lock\n├── pyproject.toml\n├── README.md\n\
    ├── src\n│   └── ...\n└── tests          <--------\n    ├── einstein.txt <--------\n\
    \    └── test_pycounts.py <--------\n```\n\n> 我们在**第 3.7.1 节**中自己创建了文件 `tests/einstein.txt`，它不是由\
    \ `py-pkgs-cookiecutter` 创建的。\n\n如上所述，`pytest` 测试被编写为以 `test_` 为前缀的函数，并包含一个或多个检查某些代码功能的\
    \ `assert` 语句。基于此格式，让我们使用以下 Python 代码将我们在**第 3.7.1 节**中创建的单元测试作为测试函数添加到 `tests/test_pycounts.py`\
