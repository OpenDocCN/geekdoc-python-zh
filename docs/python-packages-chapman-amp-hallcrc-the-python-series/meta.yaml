    \n图 2.4：在 RStudio 中执行 Python 代码。\n\n如果你在特定操作系统上安装或使用本书中的任何软件时遇到问题，或者更倾向于使用 Docker\
    \ 来帮助开发你的 Python 包，我们提供了一个使用 Docker 的替代软件设置，其中包含了你入门所需的一切。Docker$^{31}$ 是一个平台，允许你在称为\
    \ *容器* 的隔离环境中运行和开发软件。*镜像* 包含创建容器所需的指令。\n\n我们已经开发了 Docker 镜像，以支持在 Visual Studio\
    \ Code 或 JupyterLab 中进行 Python 包开发，并在以下章节中描述了使用这些镜像跟随本书学习的最小工作流程。请随意自定义这些镜像和/或工作流程，以适应你的特定用例。我们将通过其\
    \ GitHub 仓库（py-pkgs/docker-vscode$^{32}$ 和 py-pkgs/docker-jupyter$^{33}$）继续维护这些\
    \ Docker 镜像，以在未来支持本书的读者。\n\n### 2.6.1 Docker 与 Visual Studio Code\n\n要在 Visual\
    \ Studio Code 中使用 Docker 进行开发，你可以查阅 Visual Studio Code 官方容器教程$^{34}$，或者尝试按照以下步骤操作：\n\
    \n1.  从官方网站$^{35}$安装 Visual Studio Code。\n2.  按照官方网站$^{36}$上的说明，为你的操作系统安装和配置 Docker\
    \ Desktop。\n3.  安装 docker 后，打开命令行界面，并通过运行以下命令拉取 pypkgs/vscode docker 镜像：\n\n```\n\
    $ docker pull pypkgs/vscode\n```\n\n4.  从 Visual Studio Code 中，打开/创建你想要在其中开发的工作目录（这个目录可以是任何名称，并且可以位于文件系统上的任何位置）。\n\
