    9.  （可选）使用 Git 和 GitHub 或等效的版本控制工具为你的包打上发布标签（第3.9节）。\n10. 为你的包构建 sdist 和 wheel\
    \ 发行版（第3.10.1节）。\n\n```\n$ poetry build\n```\n\n11. （可选）将你的发行版发布到 TestPyPI<sup>51</sup>\
    \ 并尝试安装你的包（第3.10.2节）。\n\n```\n$ poetry config repositories.test-pypi https://test.pypi.org/legacy/\n\
    $ poetry publish -r test-pypi\n$ pip install --index-url https://test.pypi.org/simple/\
    \ --extra-index-url https://pypi.org/simple pycounts\n```\n\n12. （可选）将你的发行版发布到\
    \ PyPI<sup>52</sup>。现在任何人都可以使用 pip 安装你的包（**第3.10.3节**）。\n\n```\n$ poetry publish\n\
    $ pip install <pkg-name>\n```\n\n上述工作流程使用了一套特定的工具（例如 conda、poetry、sphinx 等）来开发\
    \ Python 包。虽然还有其他工具可用于帮助构建 Python 包，但本书的目标是使用现代工具，提供一个高层次、实用且高效的 Python 打包入门介绍，这影响了我们在本章和本书中对工具的选择。然而，无论你使用何种具体工具来开发\
    \ Python 包，此处讨论的概念和工作流程对于 Python 打包生态系统仍然适用。\n\n## 4 包结构与分发\n\n**第3章：如何打包 Python**\
    \ 提供了如何创建、安装和分发 Python 包的实践概述。本章现在将更详细地介绍 Python 包究竟是什么，深入探讨包的结构、安装和分发方式。\n\n\
    我们首先讨论模块和包在 Python 中的表示方式及其使用原因。然后，我们讨论一些更高级的包结构主题，例如控制包的导入行为以及包含非代码文件（如数据）。本章最后讨论什么是包分发、如何构建它们以及如何安装它们。在此过程中，我们将通过继续开发上一章的\
