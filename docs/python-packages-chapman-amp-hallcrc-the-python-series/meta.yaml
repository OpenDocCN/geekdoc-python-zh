    -----------------------------------------------------------------------------

    TOTAL                            35      0      4      0   100%

    ============================== 5 passed in 0.46s ===============================

    ```


    In this output Branch is the number of branches in the module, and BrPart is the
    number of branches executed by tests. “Branch coverage” in pytest-cov is actually
    calculated using a mix of branch and line coverage, which can be useful to get
    the best of both metrics:


    $$coverage = \frac{\text{lines executed} + \text{branches executed}}{\text{total
    lines} + \text{total branches}} * 100\%$$


