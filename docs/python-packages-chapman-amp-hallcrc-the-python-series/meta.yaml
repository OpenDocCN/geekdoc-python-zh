    their docstrings into a plain-text file, but that would be incredibly tedious
    and not reproducible. Instead, API references are usually generated automatically
    using sphinx, which can parse your source code to extract Python objects and their
    docstrings and render them into an API reference. We''ll demonstrate how to do
    this in [Section 3.8.4](#section-3.8.4).


