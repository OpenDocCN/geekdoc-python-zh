    \ We went through quite a lot to get here: we learned about package structure,\
    \ developed source code, created tests, wrote documentation, and learned how to\
    \ release new versions of a package.\n\nAs you continue to develop your package\
    \ into the future it would be helpful to automate many of these workflows so you\
    \ and your collaborators can focus more on writing code and less on the nuances\
    \ of packaging and testing. This is where continuous integration (CI) and continuous\
    \ deployment (CD) come in! CI/CD generally refers to the automated testing, building,\
    \ and deployment of software. In this chapter, we'll first introduce CI/CD and\
    \ walk through how to set it up with the GitHub Actions service. After that, we'll\
    \ show how to set up CI/CD for a Python package, demonstrating concepts using\
    \ the pycounts package we've been developing throughout this book.\n\n> This chapter\
    \ requires basic familiarity with Git and GitHub or similar version control tools.\
    \ To learn more about Git and GitHub, we recommend the following resources: *Happy\
    \ Git and GitHub for the useR* (Bryan et al., 2021) and *Research Software Engineering\
    \ with Python* (Irving et al., 2021).\n\n### 8.1 An introduction to CI/CD\n\n\
    Continuous integration (CI) refers to the process of automatically evaluating\
    \ your code as it is updated by yourself and contributors, to try and catch any\
    \ potential issues your updates have caused. A CI workflow typically includes\
    \ automatic execution of many of the steps we've seen throughout this book, such\
    \ as running tests, calculating code coverage, and building documentation, among\
    \ others.\n\nContinuous deployment (CD) is the process of automating the deployment\
    \ of new versions of your software to e.g., PyPI, from changes that have made\
    \ it through CI.\n\nCI/CD can automate the packaging workflows that we've done\
    \ manually throughout this book and can ultimately save you time and help you\
    \ release new versions of your package quickly. CI/CD also helps others contribute\
    \ to your package, because the process of updating your package is automated and\
    \ doesn't depend on one person's expert knowledge (i.e., yours) of how to make\
    \ releases manually. Even if your package won't be updated very often, setting\
    \ up CI/CD is still beneficial because it means you don't have to remember all\
    \ the manual steps required to make a release of your package (which can be daunting\
    \ and deter you from wanting to update and maintain your package).\n\n### 8.2\
    \ CI/CD tools\n\nYou could manually write and execute a CI/CD workflow by, for\
    \ example, writing scripts that execute all of the steps we've walked through\
    \ in previous chapters (i.e., running tests, building documented, build and release\
    \ distributions, etc.). However, this process is not efficient or scalable, and\
    \ it does not work well if more than one person (i.e., you) is contributing to\
    \ your code.\n\nIt is therefore more common to use a CI/CD service to implement\
    \ CI/CD. These services essentially do what we described above but in an automated\
    \ manner; we define a workflow, which these services will automatically run at\
    \ certain “trigger events”, which we can also define (for example, merging new\
    \ code into the “main” branch of a GitHub repository might trigger the automatic\
    \ deployment of a new version of the software).\n\nThere are many CI/CD services\
    \ out there — such as GitHub Actions³, Travis CI⁴, and CircleCi⁵. We'll be using\
    \ GitHub Actions in this chapter, which is a service for executing CI/CD workflows\
    \ for software stored in a GitHub repository. We'll introduce how to use GitHub\
    \ Actions in the next section.\n\n³https://docs.github.com/en/actions\n⁴https://www.travis-ci.com\n\
    ⁵https://circleci.com\n\nGitHub Actions is free for public repositories and includes\
    \ a generous amount of free minutes for private repositories. Read more in the\
    \ GitHub Actions documentation<sup>6</sup>.\n\n### 8.3 Introduction to GitHub\
    \ Actions\n\n#### 8.3.1 Key concepts\n\nGitHub Actions is a service for executing\
    \ CI/CD workflows. The general idea is to create a set of commands that GitHub\
    \ Actions will run on our behalf. We call this set of commands a “workflow”. A\
    \ GitHub Actions workflow is defined in a .yml file and contains the set of “actions”\
    \ we want GitHub Actions to run for us (such as running our tests with pytest\
    \ or building our documentation with sphinx). Actions are organized as “steps”\
    \ in a workflow (e.g., step 1: run tests, step 2: build documentation), which\
    \ in turn are organized into “jobs” (e.g., job 1: continuous integration). A workflow\
    \ is executed on a machine provided by GitHub Actions called a “runner”, when\
    \ triggered by a particular “event” (like merging code into the main branch of\
    \ a repository).\n\nThat’s a lot to take in, but don’t worry! All this terminology\
    \ is summarized in Table 8.1, and we’ll walk through an example of using GitHub\
    \ Actions, which refers to this terminology in the next section.\n\n**TABLE 8.1:**\
    \ Terminology used in GitHub Actions.\n\n| Keyword | Description |\n| :--- | :---\
    \ |\n| Actions | Individual tasks you want to perform. |\n| Workflow | A collection\
    \ of actions (specified together in one file). |\n| Event | Something that triggers\
    \ the running of a workflow. |\n| Runner | A machine that can run the Github Action(s).\
    \ |\n| Job | A set of steps executed on the same runner. |\n| Step | A set of\
    \ commands or actions which a job executes. |\n\n<sup>6</sup>https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions"
