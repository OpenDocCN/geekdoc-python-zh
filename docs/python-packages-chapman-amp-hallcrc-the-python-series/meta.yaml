    ^1.4 版本），然后从 CRAN<sup>28</sup> 安装最新版本的 R。要在 RStudio 中使用 Python，你需要通过在 RStudio
    内的 R 控制台中输入以下命令来安装 reticulate<sup>29</sup> R 包：


    ```

    install.packages("reticulate")

    ```


    安装 reticulate 时，你可能会被提示安装 Anaconda 发行版。我们已经在 **第 2.2.1 节** 安装了 Miniconda Python
    发行版，因此请对此提示回答 “no”。在能够在 RStudio 中使用 Python 之前，你需要配置 reticulate。我们将在下面简要描述如何针对不同操作系统进行此操作，但我们鼓励你查看
    reticulate 文档<sup>30</sup> 以获取更多帮助。


    #### Mac 和 Linux


    1.  在命令行输入 `which python` 以找到使用 Miniconda 安装的 Python 解释器的路径。

    2.  在你的 HOME 目录中打开（或创建）一个 `.Rprofile` 文件，并添加行 `Sys.setenv(RETICULATE_PYTHON =
    "path_to_python")`，其中 `"path_to_python"` 是在步骤 1 中确定的路径。

    3.  在你的 HOME 目录中打开（或创建）一个 `.bash_profile` 文件，并添加行 `export PATH="/opt/miniconda3/bin:$PATH"`，将
    `/opt/miniconda3/bin` 替换为你在步骤 1 中确定的路径，但不要包含末尾的 `python`。

    4.  重启 R。

    5.  尝试在 RStudio 中使用 Python，通过在 R 控制台中运行以下命令：


    ```

    library(reticulate)

    repl_python()

    ```


    #### Windows


    1.  通过从开始菜单打开 Anaconda Prompt 并在终端中输入 `where python`，找到使用 Miniconda 安装的 Python
    解释器的路径。


