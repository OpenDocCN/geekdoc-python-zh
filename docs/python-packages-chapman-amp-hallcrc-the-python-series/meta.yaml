    The output of pytest provides some basic system information, along with how many
    tests were run and what percentage passed. If a test fails, it will output the
    traceback of the error, so you can see exactly which test failed and why. In the
    next section, we''ll go into more detail about how to write different kinds of
    tests in pytest.


    # 5.3 Writing tests


    There are several kinds of tests commonly used to test Python packages: unit tests,
    integration tests, and regression tests. In this section, we''ll explore and demonstrate
    what these tests are and how to write them in pytest.


    # 5.3.1 Unit tests


    Unit tests are the most common type of test you will write. A unit test verifies
    that an independent unit of code (e.g., a Python function) is working as expected
    in a particular situation. It will typically comprise:


    +   1. Some data to test the code with (called a “fixture”). The fixture is typically
    a small or simple version of the type of data the function will typically process.

    2. The *actual* result that the code produces given the fixture.

    3. The *expected* result of the test, which is compared to the *actual* result,
    typically using an assert statement.


    The `test_count_words()` function of our `pycounts` package is an example of a
    unit test. Recall that our `count_words()` function can be used to calculate words
    counts in a text file. To test it, we created a small, sample text file called
    `einstein.txt` (our fixture), which contains the following quote:'
  - "[PAGE 137]\n\n> \"Insanity is doing the same thing over and over and expecting\
    \ different results.\"\n\nThe result of our `count_words()` function using this\
    \ fixture is the *actual* result. The fixture is small enough that we can count\
    \ the words by hand, and that forms our *expected* result. Thus the unit test\
    \ currently in our `test_pycounts.py` looks as follows:\n\n```\nfrom pycounts.pycounts\
    \ import count_words\nfrom collections import Counter\n\ndef test_count_words():\n\
    \    \"\"\"Test word counting from a file.\"\"\"\n    expected = Counter({'insanity':\
    \ 1, 'is': 1, 'doing': 1,\n                        'the': 1, 'same': 1, 'thing':\
    \ 1,\n                        'over': 2, 'and': 2, 'expecting': 1,\n         \
    \               'different': 1, 'results': 1})\n    actual = count_words(\"tests/einstein.txt\"\
    )\n    assert actual == expected, \"Einstein quote counted incorrectly!\"\n```\n\
    \nA pytest test function can actually include multiple assert statements and if\
    \ any of the included assert functions fail, the whole test will fail. As an example\
    \ of a unit test with multiple assert statements, we'll write a new test in our\
    \ `test_pycounts.py` file for the `plot_words()` function of our `pycounts.plotting`\
    \ module. We developed the `plot_words()` function in [Section 3.6](#section-3-6)\
    \ and show it below:\n\n```\nimport matplotlib.pyplot as plt\n\ndef plot_words(word_counts,\
    \ n=10):\n    \"\"\"Plot a bar chart of word counts.\n\n    Parameters\n    ----------\n\
    \    word_counts : collections.Counter\n        Counter object of word counts.\n\
    \    n : int, optional\n        Plot the top n words. By default, 10.\n    \"\"\
    \"\n```"
  - "[PAGE 138]\n\n```\n...rest of docstring hidden...\n\"\"\"\ntop_n_words = word_counts.most_common(n)\n\
    word, count = zip(*top_n_words)\nfig = plt.bar(range(n), count)\nplt.xticks(range(n),\
    \ labels=word, rotation=45)\nplt.xlabel(\"Word\")\nplt.ylabel(\"Count\")\nreturn\
    \ fig\n```\n\nOur function takes in a Counter object of word counts and outputs\
    \ a matplotlib bar chart. To test that it's working as expected with a unit test,\
    \ we'll:\n\n+   - Use the manually counted words from the Einstein quote as a\
    \ fixture.\n- Use that fixture as an input to the `plot_words()` function to create\
    \ a bar plot (the actual result).\n- assert that the plot is a matplotlib bar\
    \ chart (matplotlib.container.BarContainer) and assert that there are ten bars\
    \ in the bar chart (n=10 is the default number of bars to plot in the `plot_words()`\
    \ function, as you can see above).\n\nBelow we show this unit test in Python code,\
    \ and we'll add it to our `test_pycounts.py` file:\n\n```\nfrom pycounts.pycounts\
    \ import count_words\nfrom pycounts.plotting import plot_words <---------\nimport\
    \ matplotlib                       <---------\nfrom collections import Counter\n\
    \ndef test_count_words():\n    # ... same as before ...\n\ndef test_plot_words():\
    \  <---------\n    \"\"\"Test plotting of word counts.\"\"\"\n    counts = Counter({'insanity':\
    \ 1, 'is': 1, 'doing': 1,\n                      'the': 1, 'same': 1, 'thing':\
    \ 1,\n                      'over': 2, 'and': 2, 'expecting': 1,\n           \
    \           'different': 1, 'results': 1})\n    fig = plot_words(counts)\n   \
    \ assert isinstance(fig, matplotlib.container.BarContainer), \\n        \"Wrong\
    \ plot type\"\n    assert len(fig.datavalues) == 10, \\n        \"Incorrect number\
    \ of bars plotted\"\n```"
- md: "## 5.3 Writing tests\n\nNow that we've written a new test, we need to check\
    \ that it is working. Running pytest at the command line should now show two tests\
    \ were run:\n\n```\n$ pytest tests/\n```\n\n```\n=============================\
    \ test session starts =============================\n...\ncollected 2 item\n\n\
    tests/test_pycounts.py .                                               [100%]\n\
    \n============================== 2 passed in 0.01s ===============================\n\
    ```\n\nLooks like things are working as expected!\nBefore we move on, there's\
    \ one more important thing to mention. We know that the assert statement can be\
    \ used with any expression that evaluates to a boolean (True/False). However,\
    \ if your package uses floating-point numbers, and you're wanting to assert the\
    \ equality of floating-point numbers in your tests, there's one thing to watch\
    \ out for. Due to the limitations of floating-point arithmetic in computers, numbers\
    \ that we would expect to be equal are sometimes not. Consider the following infamous\
    \ example:\n\n```\n>>> assert 0.1 + 0.2 == 0.3, \"Numbers are not equal!\"\n```\n\
    \n```\nAssertionError: Numbers are not equal!\n```\n\nYou can read more about\
    \ the nuances of floating-point arithmetic in the Python documentation², but the\
    \ important point here is that, when working with floating-point numbers, we usually\
    \ assert that numbers are *approximately* equal, rather than *exactly* equal.\
    \ To do this we can use the pytest.approx() function:\n\n```\n>>> import pytest\n\
    >>> assert 0.1 + 0.2 == pytest.approx(0.3), \"Numbers are not equal!\"\n```\n\n\
    You can control how approximate you want the equality to be by using the abs and\
    \ rel arguments of pytest.approx() to specify how much absolute or relative error\
    \ you want to allow, respectively.\n\n²https://docs.python.org/3/tutorial/floatingpoint.html\n\
    \n### 5.3.2 Test that a specific error is raised\n\nRather than assert that your\
    \ code produces a particular output given a particular input, sometimes you want\
    \ to check that your code raises a particular error when used in the wrong way\
    \ by a user. Consider again the `plot_words()` function of our `pycounts.plotting`\
    \ module. From the docstring, we see that the function expects users to pass a\
    \ Counter object to the function:\n\n```\nimport matplotlib.pyplot as plt\n\n\
    def plot_words(word_counts, n=10):\n    \"\"\"Plot a bar chart of word counts.\n\
    \n    Parameters\n    ----------\n    word_counts : collections.Counter <----------\n\
    \        Counter object of word counts.\n    n : int, optional\n        Plot the\
    \ top n words. By default, 10.\n\n    ...rest of docstring hidden...\n    \"\"\
    \"\n    top_n_words = word_counts.most_common(n)\n    word, count = zip(*top_n_words)\n\
    \    fig = plt.bar(range(n), count)\n    plt.xticks(range(n), labels=word, rotation=45)\n\
    \    plt.xlabel(\"Word\")\n    plt.ylabel(\"Count\")\n    return fig\n```\n\n\
    What happens if a user inputs a different object? For the sake of argument, let's\
    \ consider what happens if they pass a list of words to our function:\n\n```\n\
    >>> from pycounts.plotting import plot_words\n>>> word_list = [\"Pythons\", \"\
    are\", \"non\", \"venomous\"]\n>>> plot_words(word_list)\n```\n\n```\nAttributeError:\
    \ 'list' object has no attribute 'most_common'\n```\n\nThis `AttributeError` message\
    \ is not overly useful to our users. The problem is that our code uses the method\
    \ `.most_common()`, which is specific to the Counter object and retrieves the\
    \ top n counts from that object. To improve the user-experience, we might want\
    \ to raise a more helpful error message to a user to tell them if they pass the\
    \ wrong object type.\n\n## 5.3 Writing tests\n\nLet's modify our `plot_words()`\
    \ function to check that the `word_counts` argument is a `Counter` object using\
    \ the `isinstance()` function and, if it's not, raise a `TypeError` with a useful\
    \ message. The `raise` statement terminates a program and allows you to notify\
    \ users of an error. There are many error types to choose from and you can even\
    \ create your own, as discussed in the Python documentation³. We'll use the `TypeError`\
    \ here because it is used to indicate that an object is of the wrong type. Our\
    \ function, with this new checking code in it, now looks like this:\n\n```\nimport\
    \ matplotlib.pyplot as plt\nfrom collections import Counter  <----------\n\ndef\
    \ plot_words(word_counts, n=10):\n    \"\"\"Plot a bar chart of word counts.\n\
    \n    ...rest of docstring hidden...\n    \"\"\"\n    if not isinstance(word_counts,\
    \ Counter):  <----------\n        raise TypeError(\"'word_counts' should be of\
    \ type 'Counter'.\")\n    top_n_words = word_counts.most_common(n)\n    word,\
    \ count = zip(*top_n_words)\n    fig = plt.bar(range(n), count)\n    plt.xticks(range(n),\
    \ labels=word, rotation=45)\n    plt.xlabel(\"Word\")\n    plt.ylabel(\"Count\"\
    )\n    return fig\n```\n\nOther common exceptions used in tests include:\n\n-\
    \ AttributeError: for when an object does not support a referenced attribute (i.e.,\
    \ of the form object.attribute).\n- ValueError: for when an argument has the right\
    \ type but an inappropriate value.\n- FileNotFoundError: for when a specified\
    \ file or directory doesn't exist.\n- ImportError: for when the import statement\
    \ can't find a module.\n\nWe can check that our new error-handling code is working\
    \ by starting a new\n\n³https://docs.python.org/3/library/exceptions.html\n\n\
    Python session and retrying our code from before, which passed a list to our function:\n\
    \n```\n>>> from pycounts.plotting import plot_words\n>>> word_list = [\"Pythons\"\
    , \"are\", \"non\", \"venomous\"]\n>>> plot_words(word_list)\n```\n\n```\nTypeError:\
    \ 'word_counts' should be of type 'Counter'.\n```\n\nGreat, our `plot_words()`\
    \ function now raises a helpful `TypeError` when a user inputs the wrong type\
    \ of object. But how can we test this functionality with pytest? We can use `pytest.raises()`.\
    \ `pytest.raises()` is used as part of a with statement, which contains the code\
    \ you expect to throw an error. Let's add the new unit test shown below, called\
    \ `test_plot_words_error()`, to our test file `test_pycounts.py` to demonstrate\
    \ this functionality.\n\n> We've written a new test called `test_plot_words_error()`,\
    \ rather than adding to our existing `test_plot_words()` test, because unit tests\
    \ should be written to check one unit of code (i.e., a function) in one particular\
    \ situation.\n\n```\nfrom pycounts.pycounts import count_words\nfrom pycounts.plotting\
    \ import plot_words\nimport matplotlib\nfrom collections import Counter\nimport\
    \ pytest  <--------\n\ndef test_count_words():\n    # ... same as before ...\n\
    \ndef test_plot_words():\n    # ... same as before ...\n\ndef test_plot_words_error():\
    \  <--------\n    \"\"\"Check TypeError raised when Counter not used.\"\"\"\n\
    \    with pytest.raises(TypeError):\n        list_object = [\"Pythons\", \"are\"\
    , \"non\", \"venomous\"]\n        plot_words(list_object)\n```\n\n## 5.3 Writing\
    \ tests\n\nIn the new test above, we purposefully pass the wrong object type (a\
    \ list) to plot_words() and expect it to raise a TypeError. Let’s check that this\
    \ new test, and our existing tests, all pass by running pytest at the terminal.\
    \ pytest should now find and execute three tests:\n\n```\n$ pytest tests/\n```\n\
    \n```\n============================= test session starts =============================\n\
    ...\ncollected 3 items\n\ntests/test_pycounts.py .                           \
    \                    [100%]\n\n============================== 3 passed in 0.39s\
    \ ===============================\n```\n\n### 5.3.3 Integration tests\n\nThe unit\
    \ tests we’ve written above verify that the individual functions of our package\
    \ work in isolation. But we should also test that they work correctly together.\
    \ Such a test is called an “integration test” (because individual units of code\
    \ are integrated into a single test).\n\nIntegration tests are structured the\
    \ same way as unit tests. We use a fixture to produce an actual result with our\
    \ code, which is then compared to an expected result. As an example of an integration\
    \ test we’ll:\n\n- Use the “Einstein quote” text file, einstein.txt, as a fixture.\n\
    - Count the words in the quote using the count_words() function.\n- Plot the word\
    \ counts using the plot_words() function.\n- assert that a matplotlib bar chart\
    \ was created, that the chart has 10 bars, and that the maximum word count in\
    \ the chart is 2 (no word appears more than twice in the quote in the einstein.txt\
    \ file).\n\nThe overall aim of this test is to check that the two core functions\
    \ of our package count_words() and plot_words() work together (at least to our\
    \ test specifications). It can be written and added to our test_pycounts.py file\
    \ as follows:\n\n```\nfrom pycounts.pycounts import count_words\nfrom pycounts.plotting\
    \ import plot_words\nimport matplotlib\nfrom collections import Counter\nimport\
    \ pytest\n```"
