    \ the structure of our package:\n\n```\npycounts\n├── .readthedocs.yml\n├── CHANGELOG.md\n\
    ├── CONDUCT.md\n├── CONTRIBUTING.md\n├── docs\n│   └── ...\n├── LICENSE\n├── pyproject.toml\n\
    ├── README.md\n├── src\n│   └── pycounts\n│       ├── __init__.py\n│       └──\
    \ pycounts.py\n└── tests\n    └── ...\n```\n\nThe Python code for our package\
    \ should live in modules in the *src/pycounts/* directory. The py-pkgs-cookiecutter\
    \ template already created a Python module for us to put our code in called *src/pycounts/pycounts.py*\
    \ (note that this module can be named anything, but it is common for a module\
    \ to share the name of the package). We'll copy the functions we created in **Section\
    \ 3.1.2** to the module *src/pycounts/pycounts.py* now. Our functions depends\
    \ on collections.Counter and string.punctuation, so we also need to import those\
    \ at the top of the file. Here's what *src/pycounts/pycounts.py* should now look\
    \ like:\n\n```\nfrom collections import Counter\nfrom string import punctuation\n\
    \ndef load_text(input_file):\n    \"\"\"Load text from a text file and return\
    \ as a string.\"\"\"\n    with open(input_file, \"r\") as file:\n        text\
    \ = file.read()\n    return text\n\ndef clean_text(text):\n    \"\"\"Lowercase\
    \ and remove punctuation from a string.\"\"\"\n    text = text.lower()\n    for\
    \ p in punctuation:\n        text = text.replace(p, \"\")\n```"
- md: "## 3.5 Test drive your package code\n\n### 3.5.1 Create a virtual environment\n\
    \nBefore we install and test our package, it is highly recommended to set up a\
    \ virtual environment. As discussed previously in [Section 2.2.1](#section-2.2.1),\
    \ a virtual environment provides a safe and isolated space to develop and install\
    \ packages. If you don't want to use a virtual environment, feel free to skip\
    \ to [Section 3.5.2](#section-3.5.2).\n\nThere are several options available when\
    \ it comes to creating and managing virtual environments (e.g., conda or venv).\
    \ We will use conda (which we installed in [Section 2.2.1](#section-2.2.1)) because\
    \ it is a simple, commonly used, and effective tool for managing virtual environments.\n\
    \nTo use conda to create a new virtual environment called pycounts that contains\
    \ Python, run the following in your terminal:\n\n```\n$ conda create --name pycounts\
    \ python=3.9 -y\n```\n\n> We are specifying python=3.9 because that is the minimum\
    \ version of Python we specified that our package will support in [Section 3.2.2](#section-3.2.2).\n\
    \nTo use this new environment for developing and installing software we need to\
    \ “activate” it:\n\n```\n$ conda activate pycounts\n```\n\nIn most command lines,\
    \ conda will add a prefix like (pycounts) to your command-line prompt to indicate\
    \ which environment you are working in. Anytime you wish to work on your package,\
    \ you should activate its virtual environment. You can view the packages currently\
    \ installed in a conda environment using the command conda list, and you can exit\
    \ a conda virtual environment using conda deactivate.\n\n> poetry, the packaging\
    \ tool we'll use to develop our package later in this chapter, also supports virtual\
    \ environment management without the need for conda. However, we find conda to\
    \ be a more intuitive and explicit environment manager, which is why we advocate\
    \ for it in this book.\n\n### 3.5.2 Installing your package\n\nWe have our package\
    \ structure set up and we've populated it with our Python code. How do we install\
    \ and use our package? There are several tools available to develop installable\
    \ Python packages. The most common are poetry, flit, and setuptools, which we\
    \ compare in Section 4.3.3. In this book, we will be using poetry (which we installed\
    \ in Section 2.2.2); it is a modern packaging tool that provides simple and efficient\
    \ commands to develop, install, and distribute Python packages.\n\nIn a poetry-managed\
    \ package, the pyproject.toml file stores all the metadata and install instructions\
    \ for the package. The pyproject.toml that the py-pkgs-cookiecutter created for\
    \ our pycounts package looks like this:\n\n```\n[tool.poetry]\nname = \"pycounts\"\
    \nversion = \"0.1.0\"\ndescription = \"Calculate word counts in a text file.\"\
    \nauthors = [\"Tomas Beuzen\"]\nlicense = \"MIT\"\nreadme = \"README.md\"\n\n\
    [tool.poetry.dependencies]\npython = \"^3.9\"\n\n[tool.poetry.dev-dependencies]\n\
    \n[build-system]\nrequires = [\"poetry-core>=1.0.0\"]\nbuild-backend = \"poetry.core.masonry.api\"\
    \n```\n\nTable 3.2 provides a brief description of each of the headings in that\
    \ file (called “tables” in TOML file jargon).\n\n**TABLE 3.2:** A description\
    \ of the tables in the pyproject.toml.\n\n| TOML table | Description |\n|---|---|\n\
    | [tool.poetry] | Defines package metadata. The name, version, description, and\
    \ authors of the package are required. |\n| [tool.poetry.dependencies] | Identifies\
    \ dependencies of a package — that is, software that the package depends on. Our\
    \ pycounts package only depends on Python 3.9 or higher, but we’ll add other dependencies\
    \ to our package later in this chapter. |\n| [tool.poetry.dev-dependencies] |\
    \ Identifies development dependencies of a package — dependencies required for\
    \ development purposes, such as running tests or building documentation. We’ll\
    \ add development dependencies to our pycounts package later in this chapter.\
    \ |\n| [build-system] | Identifies the build tools required to build your package.\
    \ We’ll talk more about this in Section 3.10. |\n\nWith our *pyproject.toml* file\
    \ already set up for us by the py-pkgs-cookiecutter template, we can use poetry\
    \ to install our package using the command `poetry install` at the command line\
    \ from the root package directory:\n\n```\n$ poetry install\n```\n\n```\nUpdating\
    \ dependencies\nResolving dependencies... (0.1s)\n\nWriting lock file\n\nInstalling\
    \ the current project: pycounts (0.1.0)\n```\n\n> When you run `poetry install`,\
    \ poetry creates a `poetry.lock` file, which contains a record of all the dependencies\
    \ you’ve installed while developing your package. For anyone else working on your\
    \ project (including you in the future), running `poetry install` installs dependencies\
    \ from `poetry.lock` to ensure that they have the same versions of dependencies\
    \ that you did when developing the package. We won’t be focusing on `poetry.lock`\
    \ in this book, but it can be a helpful development tool, which you can read more\
    \ about in the poetry documentation[^10].\n\nWith our package installed, we can\
    \ now `import` and use it in a Python session. Before we do that, we need a text\
    \ file to test our package on. Feel free to use any text file, but we’ll create\
    \ the same “Zen of Python” text file we used earlier in the chapter by running\
    \ the following at the command line:\n\n```\n$ python -c \"import this\" > zen.txt\n\
    ```\n\nNow we can open a Python interpreter and `import` and use the `count_words()`\
    \ function from our `pycounts` module with the following code:\n\n```\n>>> from\
    \ pycounts.pycounts import count_words\n>>> count_words(\"zen.txt\")\n```\n\n\
    ```\nCounter({'is': 10, 'better': 8, 'than': 8, 'the': 6,\n'to': 5, 'of': 3, 'although':\
    \ 3, 'never': 3, ... })\n```\n\n[^10]: https://python-poetry.org/docs/basic-usage/#installing-dependencies\n\
    \nLooks like everything is working! We have now created and installed a simple\
    \ Python package! You can now use this Python package in any project you wish\
    \ (if using virtual environments, you'll need to `poetry install` the package\
    \ in them before it can be used).\n\n`poetry install` actually installs packages\
    \ in “editable mode”, which means that it installs a link to your package’s code\
    \ on your computer (rather than installing it as an independent piece of software).\
    \ Editable installs are commonly used by developers because it means that any\
    \ edits made to the package’s source code are immediately available the next time\
    \ it is imported, without having to `poetry install` again. We’ll talk more about\
    \ installing packages in **Section 3.10**.\n\nIn the next section, we’ll show\
    \ how to add code to our package that depends on another package. But for those\
    \ using version control, it’s a good idea to commit the changes we’ve made to\
    \ `src/pycounts/pycounts.py` to local and remote version control:\n\n```\n$ git\
    \ add src/pycounts/pycounts.py\n$ git commit -m \"feat: add word counting functions\"\
    \n$ git push\n```\n\nIn this book, we use the Angular style<sup>11</sup> for Git\
    \ commit messages. We’ll talk about this style more in **Section 7.2.2**, but\
    \ our commit messages have the form “type: subject”, where “type” indicates the\
    \ kind of change being made and “subject” contains a description of the change.\
    \ We’ll be using the following “types” for our commits:\n\n- “build”: indicates\
    \ a change to the build system or external dependencies.\n- “docs”: indicates\
    \ a change to documentation.\n- “feat”: indicates a new feature being added to\
    \ the code base.\n- “fix”: indicates a bug fix.\n- “test”: indicates changes to\
    \ testing framework.\n\n<sup>11</sup> https://github.com/angular/angular.js/blob/master/DEVELOPERS.md#-git-commit-guidelines\n\
    \n## 3.6 Adding dependencies to your package\n\nLet's now add a new function to\
    \ our package that can plot a bar chart of the top n words in a Counter object\
    \ of word counts. Imagine we've come up with the following `plot_words()` function\
    \ that does this. The function uses the convenient `.most_common()` method of\
    \ the Counter object to return a list of tuples of the top n words counts in the\
    \ format `(word, count)`. It then uses the Python function `zip(*...)` to unpack\
    \ that list of tuples into two individual lists, `word` and `count`. Finally,\
    \ the `matplotlib` (Hunter, 2007) package is used to plot the result (`plt.bar(...)`),\
    \ which looks like Fig. 3.4.\n\n> If this code is not familiar to you, don't worry!\
    \ The code itself is not overly important to our discussion of packaging. You\
    \ just need to know that we are adding some new code to our package that depends\
    \ on the `matplotlib` package.\n\n```\nimport matplotlib.pyplot as plt\n\ndef\
    \ plot_words(word_counts, n=10):\n    \"\"\"Plot a bar chart of word counts.\"\
    \"\"\n    top_n_words = word_counts.most_common(n)\n    word, count = zip(*top_n_words)\n\
    \    fig = plt.bar(range(n), count)\n    plt.xticks(range(n), labels=word, rotation=45)\n\
    \    plt.xlabel(\"Word\")\n    plt.ylabel(\"Count\")\n    return fig\n```\n\n\
    Where should we put this function in our package? You could certainly add all\
    \ your package code into a single module (e.g., `src/pycounts/pycounts.py`), but\
    \ as you add functionality to your package that module will quickly become overcrowded\
    \ and hard to manage. Instead, as you write more code, it's a good idea to organize\
    \ it into multiple, logical modules. With that in mind, we'll create a new module\
    \ called `src/pycounts/plotting.py` to house our plotting function `plot_words()`.\
    \ Create that new module now in an editor of your choice."
  mdcn: "## 3.5 试运行你的包代码\n\n### 3.5.1 创建虚拟环境\n\n在安装和测试我们的包之前，强烈建议设置一个虚拟环境。正如之前在[第2.2.1节](#section-2.2.1)中讨论的，虚拟环境提供了一个安全且隔离的空间来开发和安装包。如果你不想使用虚拟环境，可以随时跳转到[第3.5.2节](#section-3.5.2)。\n\
    \n在创建和管理虚拟环境方面，有多种选择（例如，conda 或 venv）。我们将使用 conda（我们在[第2.2.1节](#section-2.2.1)中安装的），因为它是一个简单、常用且有效的虚拟环境管理工具。\n\
    \n要使用 conda 创建一个名为 `pycounts` 的新虚拟环境（其中包含 Python），请在终端中运行以下命令：\n\n```\n$ conda\
    \ create --name pycounts python=3.9 -y\n```\n\n> 我们指定 `python=3.9` 是因为这是我们在[第3.2.2节](#section-3.2.2)中指定的包将支持的最低\
    \ Python 版本。\n\n要使用这个新环境来开发和安装软件，我们需要“激活”它：\n\n```\n$ conda activate pycounts\n\
    ```\n\n在大多数命令行中，conda 会在你的命令行提示符前添加一个类似 `(pycounts)` 的前缀，以指示你当前正在哪个环境中工作。任何时候你希望处理你的包，都应该激活其虚拟环境。你可以使用\
    \ `conda list` 命令查看 conda 环境中当前安装的包，并使用 `conda deactivate` 退出 conda 虚拟环境。\n\n\
    > poetry，我们将在本章后面用于开发包的打包工具，也支持虚拟环境管理，无需 conda。然而，我们发现 conda 是一个更直观和明确的环境管理器，这就是为什么我们在本书中提倡使用它。\n\
    \n### 3.5.2 安装你的包\n\n我们已经设置好了包结构，并用 Python 代码填充了它。我们如何安装和使用我们的包呢？有多种工具可用于开发可安装的\
    \ Python 包。最常见的是 poetry、flit 和 setuptools，我们将在第4.3.3节中进行比较。在本书中，我们将使用 poetry（我们在第2.2.2节中安装的）；它是一个现代的打包工具，提供简单高效的命令来开发、安装和分发\
    \ Python 包。\n\n在一个由 poetry 管理的包中，`pyproject.toml` 文件存储了包的所有元数据和安装说明。py-pkgs-cookiecutter\
    \ 为我们的 `pycounts` 包创建的 `pyproject.toml` 如下所示：\n\n```\n[tool.poetry]\nname = \"\
    pycounts\"\nversion = \"0.1.0\"\ndescription = \"Calculate word counts in a text\
    \ file.\"\nauthors = [\"Tomas Beuzen\"]\nlicense = \"MIT\"\nreadme = \"README.md\"\
    \n\n[tool.poetry.dependencies]\npython = \"^3.9\"\n\n[tool.poetry.dev-dependencies]\n\
    \n[build-system]\nrequires = [\"poetry-core>=1.0.0\"]\nbuild-backend = \"poetry.core.masonry.api\"\
    \n```\n\n表3.2简要描述了该文件中的每个标题（在TOML文件术语中称为“表”）。\n\n**表3.2：** pyproject.toml 中表的描述。\n\
    \n| TOML 表 | 描述 |\n|---|---|\n| [tool.poetry] | 定义包元数据。包的名称、版本、描述和作者是必需的。 |\n\
    | [tool.poetry.dependencies] | 标识包的依赖项——即包所依赖的软件。我们的 `pycounts` 包仅依赖于 Python 3.9\
    \ 或更高版本，但我们将在本章后面为包添加其他依赖项。 |\n| [tool.poetry.dev-dependencies] | 标识包的开发依赖项——开发所需的依赖项，例如运行测试或构建文档。我们将在本章后面为\
    \ `pycounts` 包添加开发依赖项。 |\n| [build-system] | 标识构建包所需的构建工具。我们将在第3.10节中进一步讨论这一点。\
    \ |\n\n由于我们的 *pyproject.toml* 文件已由 py-pkgs-cookiecutter 模板设置好，我们可以使用 poetry 在命令行中从包根目录运行\
    \ `poetry install` 命令来安装我们的包：\n\n```\n$ poetry install\n```\n\n```\nUpdating dependencies\n\
    Resolving dependencies... (0.1s)\n\nWriting lock file\n\nInstalling the current\
    \ project: pycounts (0.1.0)\n```\n\n> 当你运行 `poetry install` 时，poetry 会创建一个 `poetry.lock`\
    \ 文件，其中记录了你在开发包过程中安装的所有依赖项。对于任何其他参与你项目的人（包括未来的你），运行 `poetry install` 会从 `poetry.lock`\
    \ 安装依赖项，以确保他们拥有与你开发包时相同版本的依赖项。我们不会在本书中重点讨论 `poetry.lock`，但它可能是一个有用的开发工具，你可以在 poetry\
    \ 文档[^10]中阅读更多相关信息。\n\n包安装好后，我们现在可以在 Python 会话中 `import` 并使用它。在此之前，我们需要一个文本来测试我们的包。你可以使用任何文本文件，但我们将通过在命令行中运行以下命令来创建本章前面使用过的同一个“Python\
    \ 之禅”文本文件：\n\n```\n$ python -c \"import this\" > zen.txt\n```\n\n现在我们可以打开一个 Python\
    \ 解释器，并使用以下代码 `import` 并使用 `pycounts` 模块中的 `count_words()` 函数：\n\n```\n>>> from\
    \ pycounts.pycounts import count_words\n>>> count_words(\"zen.txt\")\n```\n\n\
    ```\nCounter({'is': 10, 'better': 8, 'than': 8, 'the': 6,\n'to': 5, 'of': 3, 'although':\
    \ 3, 'never': 3, ... })\n```\n\n[^10]: https://python-poetry.org/docs/basic-usage/#installing-dependencies\n\
    \n看起来一切正常！我们现在创建并安装了一个简单的 Python 包！你现在可以在任何你希望的项目中使用这个 Python 包（如果使用虚拟环境，你需要在其中\
    \ `poetry install` 这个包才能使用）。\n\n`poetry install` 实际上是以“可编辑模式”安装包，这意味着它安装的是指向你计算机上包代码的链接（而不是将其作为独立的软件安装）。可编辑安装是开发者常用的，因为它意味着对包源代码所做的任何编辑在下次导入时立即可用，无需再次运行\
    \ `poetry install`。我们将在**第3.10节**中进一步讨论安装包。\n\n在下一节中，我们将展示如何向我们的包中添加依赖于另一个包的代码。但对于使用版本控制的人来说，最好将我们对\
    \ `src/pycounts/pycounts.py` 所做的更改提交到本地和远程版本控制：\n\n```\n$ git add src/pycounts/pycounts.py\n\
    $ git commit -m \"feat: add word counting functions\"\n$ git push\n```\n\n在本书中，我们使用\
    \ Angular 风格<sup>11</sup>的 Git 提交消息。我们将在**第7.2.2节**中进一步讨论这种风格，但我们的提交消息格式为“类型：主题”，其中“类型”表示所做的更改类型，“主题”包含更改的描述。我们将为我们的提交使用以下“类型”：\n\
    \n- “build”：表示对构建系统或外部依赖项的更改。\n- “docs”：表示对文档的更改。\n- “feat”：表示向代码库添加新功能。\n- “fix”：表示错误修复。\n\
    - “test”：表示对测试框架的更改。\n\n<sup>11</sup> https://github.com/angular/angular.js/blob/master/DEVELOPERS.md#-git-commit-guidelines\n\
    \n## 3.6 为你的包添加依赖项\n\n现在让我们向包中添加一个新函数，该函数可以绘制一个柱状图，显示词频计数 `Counter` 对象中前 n 个单词。假设我们想出了以下\
    \ `plot_words()` 函数来实现此功能。该函数使用 `Counter` 对象方便的 `.most_common()` 方法，以 `(word,\
    \ count)` 的格式返回前 n 个单词计数的元组列表。然后，它使用 Python 函数 `zip(*...)` 将该元组列表解包为两个单独的列表 `word`\
    \ 和 `count`。最后，使用 `matplotlib` (Hunter, 2007) 包绘制结果（`plt.bar(...)`），如图3.4所示。\n\
    \n> 如果你对这段代码不熟悉，不用担心！代码本身对于我们的打包讨论来说并不是特别重要。你只需要知道我们正在向包中添加一些依赖于 `matplotlib`\
    \ 包的新代码。\n\n```\nimport matplotlib.pyplot as plt\n\ndef plot_words(word_counts,\
    \ n=10):\n    \"\"\"Plot a bar chart of word counts.\"\"\"\n    top_n_words =\
    \ word_counts.most_common(n)\n    word, count = zip(*top_n_words)\n    fig = plt.bar(range(n),\
    \ count)\n    plt.xticks(range(n), labels=word, rotation=45)\n    plt.xlabel(\"\
    Word\")\n    plt.ylabel(\"Count\")\n    return fig\n```\n\n我们应该把这个函数放在包的哪个位置？你当然可以把所有的包代码都放在一个模块中（例如\
    \ `src/pycounts/pycounts.py`），但随着你向包中添加功能，该模块很快就会变得拥挤且难以管理。相反，随着你编写更多的代码，将其组织成多个逻辑模块是一个好主意。考虑到这一点，我们将创建一个名为\
    \ `src/pycounts/plotting.py` 的新模块来存放我们的绘图函数 `plot_words()`。现在就在你选择的编辑器中创建这个新模块。"
