    | 文档字符串 | .py文件 | 出现在Python函数、方法、类或模块中第一条语句的文本，描述代码的功能和使用方法。用户可通过help()命令访问。 |\n\
    | 示例 | docs/ | 逐步的、教程式的示例，更详细地展示包的工作方式。 |\n| API参考 | docs/ | 你的包面向用户的功能（即函数、类等）的有组织列表，以及它们的功能和使用方法的简要描述。通常使用sphinx工具从包的文档字符串自动生成，我们将在第3.8.4节讨论。\
    \ |"
