- md: "## 4.2 Package structure\n\nthis, such as detailed documentation, tests, and\
    \ more, as we saw in **Chapter 3: How to package a Python**. The pycounts package\
    \ we created in that chapter is a more typical example of a Python package structure:\n\
    \n```\npycounts\n├── .readthedocs.yml\n├── CHANGELOG.md\n├── CONDUCT.md\n├── CONTRIBUTING.md\n\
    ├── docs\n│   └── ...\n├── LICENSE\n├── README.md\n├── pyproject.toml\n├── src\n\
    │   └── pycounts\n│       ├── __init__.py\n│       ├── plotting.py\n│       └──\
    \ pycounts.py\n└── tests\n    └── ...\n```\n\nNot all of this content will be\
    \ included in the version of your package that you install or distribute to others.\
    \ Typically, it's just the Python code (in the *src/* directory) that forms the\
    \ installable version of your package (but we'll show how you can specify additional\
    \ content to include in **Section 4.2.5**). The rest of the content, like documentation\
    \ and tests, exists to support development, and this content is not needed by\
    \ the users of your package, so it's usually shared (if desired) via a collaborative\
    \ medium like GitHub, where other developers can access and contribute to it.\n\
    \nThe package structure described in this section is technically called a “regular\
    \ package” in Python, and it is what the vast majority of Python packages and\
    \ developers use. However, Python also supports a second type of package known\
    \ as a “namespace package”. Namespace packages are a way of splitting a single\
    \ Python package across multiple directories. Unlike regular packages, where all\
    \ contents live in the same directory hierarchy, namespace packages can be formed\
    \ from directories in different locations on a file system and do not contain\
    \ an `__init__.py` file.\n\nThe main reason a developer might want to use a namespace\
    \ package is if they wish to develop, install, and distribute portions of a package\
    \ separately, or if they want to combine packages that reside on different locations\
    \ on their file system. However, namespace packages can be a confusing topic for\
    \ beginners and the majority of developers will never create a namespace package\
    \ so we won't discuss them further in this book. Instead we refer readers interested\
    \ in learning more about them to PEP 420⁵ and the Python documentation⁶. As a\
    \ result, when we use the term “package” in this book, we specifically mean “regular\
    \ package”.\n\n## 4.2.2 Package and module names\n\nWhen building a package, it's\
    \ important to select appropriate names for your package and its modules. Python\
    \ package naming guidelines and conventions are described in Python Enhancement\
    \ Proposal (PEP) 8⁷ and PEP 423⁸. The fundamental guidelines are:\n\n- Packages\
    \ and modules should have a single, short, all-lowercase name.\n- Underscores\
    \ can be used to separate words in a name if it improves readability, but their\
    \ use is typically discouraged.\n\nIn terms of the actual name chosen for a module\
    \ or package, it may be helpful to consider the following “three M's”:\n\n1. **Meaningful**:\
    \ the name should reflect the functionality of the package.\n2. **Memorable**:\
    \ the name should be easy for users to find, remember, and relate to other relevant\
    \ packages.\n3. **Manageable**: remember that users of your package will access\
    \ its contents/namespace via dot notation. Make it as quick and easy as possible\
    \ for them to do this by keeping your names short and sweet. For example, imagine\
    \ if we called our pycounts package something like wordcountingpackage. Every\
    \ time a user wanted to access the `plot_words()` function from the `plotting`\
    \ module, they'd have to write this: `from wordcountingpackage.plotting import\
    \ plot_words()` — yikes!\n\nFinally, you should always check PyPI⁹ and other popular\
    \ hosting sites like GitHub, GitLab, BitBucket, etc., to make sure that your chosen\
    \ package name is not already in use.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_113_0.png)\n\
    \n**FIGURE 4.1:** Keep package names meaningful, memorable, and manageable.\n\n\
    ## 4.2.3 Intra-package references\n\nWhen building packages of multiple modules,\
    \ it is common to want to use code from one module in another. For example, consider\
    \ the following package structure:\n\n```\nsrc\n└── package\n    ├── __init__.py\n\
    \    ├── moduleA.py\n    ├── moduleB.py\n    └── subpackage\n        ├── __init__.py\n\
    \        └── moduleC.py\n```\n\nA developer may want to import code from `moduleA`\
    \ in `moduleB`. This is an “intra-package reference” and can be accomplished via\
    \ an “absolute” or “relative” import.\n\nAbsolute imports use the package name\
    \ in an absolute context. Relative imports use dots to indicate from where the\
    \ relative import should begin. A single dot indicates an import relative to the\
    \ current package (or subpackage), additional dots can be used to move further\
    \ up the packaging hierarchy, one level per dot after the first dot.\n\nTable\
    \ 4.1 shows some practical examples of absolute and relative imports, based on\
    \ the package structure shown previously.\n\n### TABLE 4.1: Demonstration of absolute\
    \ and relative intra-package imports.\n\n| | Absolute | Relative |\n|---|---|---|\n\
    | Import from moduleA in moduleB | from package.moduleA import XXX | from .moduleA\
    \ import XXX |\n| Import from moduleA in moduleC | from package.moduleA import\
    \ XXX | from ..moduleA import XXX |\n| Import from moduleC in moduleA | from package.subpackage.moduleC\
    \ import XXX | from .subpackage.moduleC import XXX |\n\nWhile the choice here\
    \ mostly comes down to personal preference, PEP 8<sup>10</sup> recommends using\
    \ absolute imports because they are explicit.\n\n## 4.2.4 The init file\n\nEarlier\
    \ we discussed how an `__init__.py` file is used to tell Python that the directory\
    \ containing the `__init__.py` file is a package. The `__init__.py` file can be,\
    \ and often is, left empty and only used for the purpose of identifying a directory\
    \ as a package. However, it can also be used to add objects to the package's namespace,\
    \ provide documentation, and/or run other initialization code.\n\nWe'll demonstrate\
    \ this functionality using the pycounts packages we developed in **Chapter 3:\
    \ How to package a Python**. Consider the `__init__.py` of our package:\n\n```\n\
    pycounts\n├── .readthedocs.yml\n├── CHANGELOG.md\n├── CONDUCT.md\n├── CONTRIBUTING.md\n\
    ├── docs\n│   └── ...\n├── LICENSE\n├── pyproject.toml\n├── README.md\n└── src\n\
    \    └── pycounts\n        ├── __init__.py  <--------\n        ├── plotting.py\n\
    \        └── pycounts.py\n```\n\nWhen a package is imported, the `__init__.py`\
    \ file is executed, and any objects it defines are bound to the package's namespace.\
