  md: "# 8.4.2 Running tests\n\nRemember all the hard work we put into writing tests\
    \ for our package back in the **Chapter 5: Testing**? Well, we likely want to\
    \ make sure that these tests (and any others that we add) continue to pass for\
    \ any new changes proposed to our package.\n\nRecall that we used `pytest` as\
    \ the testing framework for our `pycounts` package. This is listed as a development\
    \ dependency of our package, so it will already be installed on our runner from\
    \ “Step 5” when we execute `poetry install`. Therefore, we just need to add a\
    \ new step to our workflow with a command to run `pytest`. Because our runner\
    \ is not using a conda virtual environment, poetry sets one up automatically when\
    \ `poetry install` is executed. We need to explicitly tell poetry to use this\
    \ virtual environment it set up for us by prefixing commands with `poetry run`,\
    \ as we do below:\n\n```\n- name: Test with pytest\n  run: poetry run pytest tests/\
    \ --cov=pycounts --cov-report=xml\n```\n\n> We could install conda on our runner\
    \ and set up a virtual environment if we wanted to. But this is a lot of overhead\
    \ for a workflow that is just going to run tests and build documentation, so we’ve\
    \ decided not to do that here.\n\nNote that in the command above we are also obtaining\
    \ our test coverage through the `--cov` argument and outputting a report to `.xml`\
    \ format with the `--cov-report` argument (these require the `pytest-cov` package\
    \ which we used and added as a dependency of our package in **Section 5.5.3**).\
    \ In the next section, we will integrate another service called Codecov<sup>12</sup>\
    \ into our workflow that will automatically record test coverage for us using\
    \ the `.xml` report.\n\n# 8.4.3 Recording code coverage\n\nIn the previous step,\
    \ we ran the tests for our `pycounts` package. However, if someone adds new code\
    \ to your package but forgets to write tests for that new code, your existing\
    \ tests will still pass, but the coverage will be reduced. So, we probably want\
    \ to track code coverage in our CI workflow.\n\n<sup>12</sup>https://codecov.io/"
  merge: -1
