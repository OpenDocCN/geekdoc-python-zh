    +   - `conf.py` is a configuration file controlling how sphinx builds your documentation.
    You can read more about `conf.py` in the sphinx documentation<sup>21</sup>, and
    we''ll touch on it again shortly, but for now, it has been pre-populated by the
    py-pkgs-cookiecutter template and does not need to be modified.

    - The remaining files in the `docs/` directory form the content of our generated
    documentation, as we''ll discuss in the remainder of this section.


    The `index.md` file will form the landing page of our documentation. Think of
    it as the homepage of a website. For your landing page, you''d typically want
    some high-level information about your package, and then links to the rest of
    the documentation you want to expose to a user. For example, the landing page
    we are going to build will look like Fig. 6.6.


    ![](img/d3840bdab18c2309faf9de63e70c539d_177_0.png)


    FIGURE 6.6: The documentation homepage generated by sphinx.


