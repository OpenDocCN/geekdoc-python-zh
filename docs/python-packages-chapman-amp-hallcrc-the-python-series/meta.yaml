    ]\n>>> plot_words(word_list)\n```\n\n```\nTypeError: 'word_counts' should be of\
    \ type 'Counter'.\n```\n\n很好，我们的 `plot_words()` 函数现在在用户输入错误类型的对象时会引发一个有用的 `TypeError`。但是我们如何用\
    \ pytest 测试这个功能呢？我们可以使用 `pytest.raises()`。`pytest.raises()` 用作 `with` 语句的一部分，该语句包含你期望抛出错误的代码。让我们将下面显示的新单元测试\
    \ `test_plot_words_error()` 添加到我们的测试文件 `test_pycounts.py` 中，以演示此功能。\n\n> 我们编写了一个名为\
    \ `test_plot_words_error()` 的新测试，而不是添加到我们现有的 `test_plot_words()` 测试中，因为单元测试应该编写为检查一个特定情况下的一个代码单元（即一个函数）。\n\
    \n```\nfrom pycounts.pycounts import count_words\nfrom pycounts.plotting import\
    \ plot_words\nimport matplotlib\nfrom collections import Counter\nimport pytest\
    \  <--------\n\ndef test_count_words():\n    # ... same as before ...\n\ndef test_plot_words():\n\
    \    # ... same as before ...\n\ndef test_plot_words_error():  <--------\n   \
    \ \"\"\"Check TypeError raised when Counter not used.\"\"\"\n    with pytest.raises(TypeError):\n\
    \        list_object = [\"Pythons\", \"are\", \"non\", \"venomous\"]\n       \
    \ plot_words(list_object)\n```\n\n## 5.3 编写测试\n\n在上面的新测试中，我们故意向 `plot_words()`\
    \ 传递了错误的对象类型（一个列表），并期望它引发一个 `TypeError`。让我们通过在终端运行 `pytest` 来检查这个新测试以及我们现有的测试是否都通过。`pytest`\
    \ 现在应该会找到并执行三个测试：\n\n```\n$ pytest tests/\n```\n\n```\n=============================\
    \ test session starts =============================\n...\ncollected 3 items\n\n\
    tests/test_pycounts.py .                                               [100%]\n\
