    \ 应用程序！\n\n### 3.8.4 构建文档\n\n我们现在已经编写了支持我们的 pycounts 包所需的所有单独文档部分。但所有这些文档都分散在我们包的目录结构中，使得共享和搜索变得困难。\n\
    \n这就是文档生成器 sphinx 的用武之地。sphinx 是一个用于将纯文本源文件集合编译和渲染成用户友好的输出格式（如 HTML 或 PDF）的工具。sphinx\
