  - "[PAGE 224]\n\n```\n# Set up operating system\nruns-on: ubuntu-latest\n\n# Define\
    \ job steps\nsteps:\n  - name: Set up Python 3.9\n    uses: actions/setup-python@v2\n\
    \    with:\n      python-version: 3.9\n\n  - name: Check-out repository\n    uses:\
    \ actions/checkout@v2\n    with:\n      fetch-depth: 0\n\n  - name: Install poetry\n\
    \    uses: snok/install-poetry@v1\n\n  - name: Install package\n    run: poetry\
    \ install\n```\n\nWe'll discuss steps 6 to 9 in the sections below.\n\n# 8.5.2\
    \ Automatically creating a new package version\n\nAs we saw in **Chapter 7: Releasing\
    \ and versioning**, there are a few key steps to go through when creating a new\
    \ version of your package:\n\n+   1. Document what's changed in the *CHANGELOG.md*.\n\
    2. Bump the package version number.\n3. Tag a new release on GitHub.\n4. Build\
    \ a new sdist and wheel.\n\nIn **Section 7.2.2**, we introduced the Python Semantic\
    \ Release (PSR)<sup>26</sup> tool, which can automatically bump your package's\
    \ version number based on keywords it finds in commit messages.\n\nHowever, PSR\
    \ can do more than this! In fact, it can do all the steps we list above. In **Section\
    \ 7.2.2**, we saw how PSR is configured using a table called [tool.semantic_release]\
    \ in the *pyproject.toml*. To configure it to perform all the steps above, we\
    \ need to add a few keys to that table as follows:\n\n> <sup>26</sup>https://python-semantic-release.readthedocs.io/en/latest/"
  - '[PAGE 225]


    ```

    [tool.semantic_release]

    version_variable = "pyproject.toml:version" # version location

    branch = "main" # branch to make releases of

    changelog_file = "CHANGELOG.md" # changelog file

    build_command = "poetry build" # build dists

    dist_path = "dist/" # where to put dists

    upload_to_release = true # auto-create GitHub release

    upload_to_pypi = false # don''t auto-upload to PyPI

    remove_dist = false # don''t remove dists

    patch_without_tag = true # patch release by default

    ```


    We''ve added comments above to clarify what each key is doing in the table, and
    we describe them in Table 8.2. You can also read more about these configuration
    options in the PSR documentation<sup>27</sup>.


    # TABLE 8.2: Description of Python Semantic Release configuration options.


    | Key | Description |

    | :--- | :--- |

    | version_variable | Location of version number for PSR to bump. |

    | branch | Branch where releases should be made from. |

    | changelog_file | Location of changelog file for PSR to update using commit messages.
    |

    | build_command | How to build new distributions for the release. |

    | dist_path | Location of distributions after running build_command. |

    | upload_to_release | Whether to automatically create a release of the new package
    version on GitHub. |

    | upload_to_pypi | Whether to upload to PyPI. Default is true, but we want to
    upload to TestPyPI first to test things out, so we''ve turned this off. |

    | remove_dist | Whether to remove distributions at dist_path after upload. We
    turned this off because we want to upload these distributions to TestPyPI and
    PyPI ourselves. |


    <sup>27</sup>https://python-semantic-release.readthedocs.io/en/latest/configuration.html'
  - "[PAGE 226]\n\n| Key | Description |\n| :--- | :--- |\n| patch_without_tag | Always\
    \ create a new patch release even if there is no trigger tag, such as “fix” or\
    \ “feat”, in any commits since the last release. |\n\nWith PSR configured in our\
    \ *pyproject.toml*, we can now add it as a step to our CD workflow.\n\nIn **Section\
    \ 7.2.2**, we used the command `semantic-release version` to get PSR to automatically\
    \ update our version based on keywords it finds in all the commit messages that\
    \ have been made since the last tag of your package. In our CD workflow, we’ll\
    \ be using the slightly different command `semantic-release publish`, which will\
    \ bump our version, update our changelog, tag a new release on GitHub, and build\
    \ a new sdist and wheel.\n\nPSR will need to interact with our GitHub repository\
    \ to modify our *CHANGELOG.md* file and tag a new release of our package. To give\
    \ PSR permission to do this there’s a few things we need to do:\n\n+   1. Provide\
    \ PSR with a GitHub access token<sup>28</sup> called `GH_TOKEN` to allow it to\
    \ read/write files in our repository. At the start of each workflow run, GitHub\
    \ automatically creates<sup>29</sup> such a token for us, called `GITHUB_TOKEN`.\
    \ We can pass this token to PSR using the `env` key and the syntax `${{ secrets.GITHUB_TOKEN\
    \ }}`. You can read more about this syntax in the GitHub documentation<sup>30</sup>,\
    \ but we’ve done it for you in the code shown below.\n2. Configure the Git credentials\
    \ of the runner machine by setting the username as `github-actions` and email\
    \ address as `github-actions@github.com`. If you don’t configure these credentials,\
    \ the workflow won’t be able to make changes to our repository, as you can read\
    \ more about in the GitHub documentation<sup>31</sup>. We’ve also done this for\
    \ you in the code shown below, so all you need to do is add this code as the next\
    \ step in your CD workflow file.\n\n```\nyaml\n- name: Use Python Semantic Release\
    \ to prepare release\n  env:\n```\n\n<sup>28</sup> https://python-semantic-release.readthedocs.io/en/latest/envvars.html#env-gh-token\n\
    <sup>29</sup> https://docs.github.com/en/actions/security-guides/automatic-token-authentication\n\
    <sup>30</sup> https://docs.github.com/en/actions/security-guides/encrypted-secrets#using-encrypted-secrets-in-a-workflow\n\
    <sup>31</sup> https://docs.github.com/en/get-started/getting-started-with-git/setting-your-username-in-git"
- md: "## 8.5.3 Uploading to TestPyPI and PyPI\n\nThe PSR step will create an sdist\
    \ and wheel for our new package version. What we need to do next in our CD workflow\
    \ is try uploading those distributions to TestPyPI. This step is not strictly\
    \ necessary, but it's a good idea because it can help catch any unexpected errors\
    \ before we upload our package to PyPI.\n\nRather than write the code needed to\
    \ do all this from scratch, we'll use the `pypa/gh-action-pypi-publish@release/v1`\
    \ action. This action relies on token authentication with TestPyPI (rather than\
    \ the classic username and password authentication). To use the action, you'll\
    \ need to log-in to TestPyPI, create an API token, and add the token as a secret\
    \ called `TEST_PYPI_API_TOKEN` to your GitHub repository, as shown in Fig. 8.7.\n\
    \nTo use the `pypa/gh-action-pypi-publish@release/v1` action, we can add the following\
    \ step to our CD workflow. Note how we configure the action to use the token user\
    \ method, specifying `password` as the `TEST_PYPI_API_TOKEN` we just added to\
    \ our repository, and we point the action to the TestPyPI repository (`repository_url:\
    \ https://test.pypi.org/legacy/`).\n\n```yaml\n- name: Publish to TestPyPI\n \
    \ uses: pypa/gh-action-pypi-publish@release/v1\n  with:\n    user: __token__\n\
    \    password: ${{ secrets.TEST_PYPI_API_TOKEN }}\n    repository_url: https://test.pypi.org/legacy/\n\
    ```\n\nThe above action will publish the new version of your package to TestPyPI.\
    \ We now want to test that we can install the package correctly from TestPyPI\
    \ using the following command:\n\n```yaml\n- name: Test install from TestPyPI\n\
    \  run: |\n    pip install \\\n    --index-url https://test.pypi.org/simple/ \\\
    \n    --extra-index-url https://pypi.org/simple \\\n    pycounts\n```\n\nFinally,\
    \ the last step in our CD workflow will be publishing our package to PyPI. This\
    \ uses the same `pypa/gh-action-pypi-publish@release/v1` action as earlier and\
    \ will require you to obtain a token from PyPI and add the token as `PYPI_API_TOKEN`\
    \ to your GitHub repository, as shown in Fig. 8.8.\n\n```yaml\n- name: Publish\
    \ to PyPI\n  uses: pypa/gh-action-pypi-publish@release/v1\n  with:\n    user:\
    \ __token__\n    password: ${{ secrets.PYPI_API_TOKEN }}\n```\n\n## 8.5.4 Testing\
    \ continuous deployment\n\nWe've now set up our CD workflow! Our final `.github/workflows/ci-cd.yml`\
    \ file looks like this:\n\n```yaml\nname: ci-cd\n\non: [push, pull_request]\n\n\
    jobs:\n  ci:\n    # ...\n    # CI steps same as before\n    # ...\n\n  cd:\n \
    \   # Only run this job if the \"ci\" job passes\n    needs: ci\n\n    # Only\
    \ run this job if new work is pushed to \"main\"\n    if: github.event_name ==\
    \ 'push' && github.ref == 'refs/heads/main'\n\n    # Set up operating system\n\
    \    runs-on: ubuntu-latest\n\n    # Define job steps\n    steps:\n      - name:\
    \ Set up Python 3.9\n        uses: actions/setup-python@v2\n        with:\n  \
    \        python-version: 3.9\n\n      - name: Check-out repository\n        uses:\
    \ actions/checkout@v2\n        with:\n          fetch-depth: 0\n\n      - name:\
    \ Install poetry\n        uses: snok/install-poetry@v1\n\n      - name: Install\
    \ package\n        run: poetry install\n\n      - name: Use Python Semantic Release\
    \ to prepare release\n        env:\n          GH_TOKEN: ${{ secrets.GITHUB_TOKEN\
    \ }}\n        run: |\n            git config user.name github-actions\n      \
    \      git config user.email github-actions@github.com\n            poetry run\
    \ semantic-release publish\n\n      - name: Publish to TestPyPI\n        uses:\
    \ pypa/gh-action-pypi-publish@release/v1\n        with:\n          user: __token__\n\
    \          password: ${{ secrets.TEST_PYPI_API_TOKEN }}\n          repository_url:\
    \ https://test.pypi.org/legacy/\n\n      - name: Test install from TestPyPI\n\
    \        run: |\n            pip install \\\n            --index-url https://test.pypi.org/simple/\
    \ \\\n            --extra-index-url https://pypi.org/simple \\\n            pycounts\n\
    \n      - name: Publish to PyPI\n        uses: pypa/gh-action-pypi-publish@release/v1\n\
    \        with:\n          user: __token__\n          password: ${{ secrets.PYPI_API_TOKEN\
    \ }}\n```\n\nWe're now ready to test out our full CI/CD workflow! Let's go ahead\
    \ and commit our new workflow file and our *pyproject.toml* file (which we changed\
    \ when we added the configuration options for PSR) to version control and push\
    \ it to GitHub. This will trigger our CI/CD workflow because we configured it\
    \ to run when someone pushes to the \"main\" branch of our repository. For the\
    \ sake of example, we'll include the \"feat\" keyword in our commit message to\
    \ trigger PSR to make a minor release of our package from these changes.\n\n>\
    \ We described what keywords trigger particular version bumps in **Section 7.2.2**,\
    \ but note that even if no keywords were present in any commits, we configured\
    \ PSR in **Section 8.5.2** to make a patch release by default.\n\n```bash\n$ git\
    \ add .github/workflows/ci-cd.yml pyproject.toml\n$ git commit -m \"feat: add\
    \ CI/CD workflow\"\n$ git push\n```\n\nNow if we go to our pycounts GitHub repository\
    \ and click on the “Actions” tab, we should see a new run of our workflow as shown\
    \ in Fig. 8.9.\n\nIf we click on the workflow we will see it was composed of two\
    \ jobs, “ci” and “cd”, each of which ran successfully, as shown in Fig. 8.10.\n\
    \nIf we click on the “cd” job to view the build log, we can see that PSR parsed\
    \ our commit message — “feat: add CI/CD workflow” — to determine that our package\
    \ should be bumped with a minor release from 0.2.0 to 0.3.0 as shown in Fig. 8.11.\n\
    \nPSR also automatically updated our changelog and tagged a new release of our\
    \ package, as shown in Fig. 8.12 and Fig. 8.13, respectively.\n\nFinally, we can\
    \ see from the build logs that the new version of our package was released to\
    \ TestPyPI and PyPI, as shown in Fig. 8.14.\n\nIt didn't take too long for us\
    \ to implement a CD workflow that completely automates all the steps we would\
    \ usually have to perform manually when publishing a new release of our package.\
    \ You may choose, or need, to use different tools and commands to what we've used\
    \ here to implement CD for your packages in the future. But hopefully you can\
    \ see the kinds of things that are possible with CD and how it can be useful to\
    \ quickly deploy new releases of your package, how it saves you from having to\
    \ remember all the commands you'd need to run to do this yourself, and how it\
    \ lowers the barrier for potential collaborators to contribute to your package.\n\
    \n## 8.6 Summary\n\nIn this chapter, we created CI/CD workflows for our pycounts\
    \ package. What we've shown here is just one example and one set of tools for\
    \ implementing CI/CD — but after reading this chapter, the hope is that you can\
    \ appreciate the utility of CI/CD and the kinds of workflows that you can set\
    \ up for your packages in the future.\n\nIt's important to note that when using\
    \ version control in this book, we've been directly modifying the main branch\
    \ of our repository. However, changes to your package are more typically made\
    \ on branches. Branches isolate your changes so you can develop your package without\
    \ affecting the existing, stable version. Only when you're happy with your changes\
    \ and they've passed CI, do you merge them into the existing source and trigger\
    \ a CD workflow (if it exists). In collaborative environments, this is typically\
    \ done via a “pull request”, which you can read more about in the GitHub documentation.\
    \ Open-source projects are built off pull requests; go visit your favorite Python"
  mdcn: "## 8.5.3 上传到 TestPyPI 和 PyPI\n\nPSR 步骤将为我们的新包版本创建一个 sdist 和 wheel。接下来在我们的\
    \ CD 工作流中需要做的是尝试将这些分发包上传到 TestPyPI。这一步并非严格必要，但这是一个好主意，因为它可以帮助我们在将包上传到 PyPI 之前捕获任何意外错误。\n\
    \n与其从头开始编写完成所有这些工作所需的代码，我们将使用 `pypa/gh-action-pypi-publish@release/v1` action。此\
    \ action 依赖于与 TestPyPI 的令牌认证（而非经典的用户名和密码认证）。要使用此 action，你需要登录到 TestPyPI，创建一个 API\
    \ 令牌，并将该令牌作为名为 `TEST_PYPI_API_TOKEN` 的 secret 添加到你的 GitHub 仓库中，如图 8.7 所示。\n\n\
    要使用 `pypa/gh-action-pypi-publish@release/v1` action，我们可以在 CD 工作流中添加以下步骤。注意我们如何配置该\
    \ action 以使用令牌用户方法，指定 `password` 为我们刚刚添加到仓库的 `TEST_PYPI_API_TOKEN`，并将 action 指向\
    \ TestPyPI 仓库（`repository_url: https://test.pypi.org/legacy/`）。\n\n```yaml\n-\
    \ name: Publish to TestPyPI\n  uses: pypa/gh-action-pypi-publish@release/v1\n\
    \  with:\n    user: __token__\n    password: ${{ secrets.TEST_PYPI_API_TOKEN }}\n\
    \    repository_url: https://test.pypi.org/legacy/\n```\n\n上述 action 将把你的包的新版本发布到\
    \ TestPyPI。我们现在想要测试是否可以使用以下命令从 TestPyPI 正确安装该包：\n\n```yaml\n- name: Test install\
    \ from TestPyPI\n  run: |\n    pip install \\\n    --index-url https://test.pypi.org/simple/\
    \ \\\n    --extra-index-url https://pypi.org/simple \\\n    pycounts\n```\n\n\
    最后，我们 CD 工作流的最后一步将是将我们的包发布到 PyPI。这使用与之前相同的 `pypa/gh-action-pypi-publish@release/v1`\
    \ action，并且需要你从 PyPI 获取一个令牌，并将该令牌作为 `PYPI_API_TOKEN` 添加到你的 GitHub 仓库中，如图 8.8 所示。\n\
    \n```yaml\n- name: Publish to PyPI\n  uses: pypa/gh-action-pypi-publish@release/v1\n\
    \  with:\n    user: __token__\n    password: ${{ secrets.PYPI_API_TOKEN }}\n```\n\
    \n## 8.5.4 测试持续部署\n\n我们现在已设置好 CD 工作流！我们最终的 `.github/workflows/ci-cd.yml` 文件如下所示：\n\
    \n```yaml\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n  ci:\n    # ...\n\
    \    # CI 步骤与之前相同\n    # ...\n\n  cd:\n    # 仅当 \"ci\" 作业通过时才运行此作业\n    needs:\
    \ ci\n\n    # 仅当有新工作推送到 \"main\" 时才运行此作业\n    if: github.event_name == 'push'\
    \ && github.ref == 'refs/heads/main'\n\n    # 设置操作系统\n    runs-on: ubuntu-latest\n\
    \n    # 定义作业步骤\n    steps:\n      - name: Set up Python 3.9\n        uses: actions/setup-python@v2\n\
    \        with:\n          python-version: 3.9\n\n      - name: Check-out repository\n\
    \        uses: actions/checkout@v2\n        with:\n          fetch-depth: 0\n\n\
    \      - name: Install poetry\n        uses: snok/install-poetry@v1\n\n      -\
    \ name: Install package\n        run: poetry install\n\n      - name: Use Python\
    \ Semantic Release to prepare release\n        env:\n          GH_TOKEN: ${{ secrets.GITHUB_TOKEN\
    \ }}\n        run: |\n            git config user.name github-actions\n      \
    \      git config user.email github-actions@github.com\n            poetry run\
    \ semantic-release publish\n\n      - name: Publish to TestPyPI\n        uses:\
    \ pypa/gh-action-pypi-publish@release/v1\n        with:\n          user: __token__\n\
    \          password: ${{ secrets.TEST_PYPI_API_TOKEN }}\n          repository_url:\
    \ https://test.pypi.org/legacy/\n\n      - name: Test install from TestPyPI\n\
    \        run: |\n            pip install \\\n            --index-url https://test.pypi.org/simple/\
    \ \\\n            --extra-index-url https://pypi.org/simple \\\n            pycounts\n\
    \n      - name: Publish to PyPI\n        uses: pypa/gh-action-pypi-publish@release/v1\n\
    \        with:\n          user: __token__\n          password: ${{ secrets.PYPI_API_TOKEN\
    \ }}\n```\n\n我们现在准备好测试完整的 CI/CD 工作流了！让我们继续将新的工作流文件和 *pyproject.toml* 文件（我们在添加\
    \ PSR 配置选项时修改了它）提交到版本控制并推送到 GitHub。这将触发我们的 CI/CD 工作流，因为我们配置了它在有人推送到我们仓库的 \"main\"\
    \ 分支时运行。为了示例，我们将在提交消息中包含 \"feat\" 关键字，以触发 PSR 从这些更改中对我们包进行次版本发布。\n\n> 我们在 **第\
    \ 7.2.2 节** 描述了哪些关键字触发特定的版本升级，但请注意，即使任何提交中都没有关键字，我们在 **第 8.5.2 节** 配置了 PSR 默认进行补丁版本发布。\n\
    \n```bash\n$ git add .github/workflows/ci-cd.yml pyproject.toml\n$ git commit\
    \ -m \"feat: add CI/CD workflow\"\n$ git push\n```\n\n现在，如果我们转到 pycounts GitHub\
    \ 仓库并单击 “Actions” 选项卡，我们应该会看到工作流的新运行，如图 8.9 所示。\n\n如果我们单击该工作流，我们将看到它由两个作业组成，“ci”\
    \ 和 “cd”，每个作业都成功运行，如图 8.10 所示。\n\n如果我们单击 “cd” 作业以查看构建日志，我们可以看到 PSR 解析了我们的提交消息\
    \ —— “feat: add CI/CD workflow” —— 以确定我们的包应从 0.2.0 次版本升级到 0.3.0，如图 8.11 所示。\n\n\
    PSR 还自动更新了我们的变更日志并标记了包的新版本，分别如图 8.12 和图 8.13 所示。\n\n最后，我们可以从构建日志中看到，我们包的新版本已发布到\
    \ TestPyPI 和 PyPI，如图 8.14 所示。\n\n我们并没有花太长时间就实现了一个 CD 工作流，该工作流完全自动化了我们在发布包新版本时通常需要手动执行的所有步骤。将来，你可能选择或需要使用与我们在此处用于为包实现\
    \ CD 的不同工具和命令。但希望你能看到 CD 可能实现的各类事情，以及它如何有助于快速部署包的新版本，它如何让你免于记住自己执行此操作所需的所有命令，以及它如何降低潜在协作者为你的包做出贡献的门槛。\n\
    \n## 8.6 总结\n\n在本章中，我们为 pycounts 包创建了 CI/CD 工作流。我们在此展示的只是一个示例和一组用于实现 CI/CD 的工具——但在阅读本章后，希望你能理解\
    \ CI/CD 的实用性以及将来可以为包设置的工作流类型。\n\n需要注意的是，在本书中使用版本控制时，我们一直在直接修改仓库的主分支。然而，对包的更改通常是在分支上进行的。分支隔离了你的更改，这样你就可以在不影响现有稳定版本的情况下开发你的包。只有当你对更改感到满意并且它们通过了\
    \ CI，你才会将它们合并到现有源代码中并触发 CD 工作流（如果存在）。在协作环境中，这通常通过 “pull request” 完成，你可以在 GitHub\
    \ 文档中阅读更多相关信息。开源项目是基于 pull request 构建的；去访问你最喜欢的 Python"
