    Finally, we can see from the build logs that the new version of our package was
    released to TestPyPI and PyPI, as shown in [Fig. 8.14](#fig-8-14):


    It didn''t take too long for us to implement a CD workflow that completely automates
    all the steps we would usually have to perform manually when publishing a new
    release of our package. You may choose, or need, to use different tools and commands
    to what we''ve used here to implement CD for your packages in the future. But
    hopefully you can see the kinds of things that are possible with CD and how it
    can be useful to quickly deploy new releases of your package, how it saves you
    from having to remember all the commands you''d need to run to do this yourself,
    and how it lowers the barrier for potential collaborators to contribute to your
    package.'
