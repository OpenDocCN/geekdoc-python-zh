  md: "```\ndef count_letters(text):\n    \"\"\"Count letters in a string.\"\"\"\n\
    \    return len(text)\n```\n\nWe can write some tests for that function using\
    \ the assert statement to check it's working as we expect it to. For example we\
    \ would expect our function to calculate five letters in the string \"Hello\"\
    \ and ten letters in the string \"Hello world\":\n\n```\n>>> assert count_letters(\"\
    Hello\") == 5, \"'Hello' should have 5 letters\"\n>>> assert count_letters(\"\
    Hello world\") == 10, \"'Hello world' should \\n    have 10 letters\"\n```\n\n\
    If we ran the above assert statements, the first would pass without error, but\
    \ the second would raise an error:\n\n```\nAssertionError: 'Hello world' should\
    \ have 10 letters\n```\n\nWhat went wrong? When we call len() on a string, it\
    \ counts all the characters in the string, including the spaces. So, we need to\
    \ go back to our count_letters() function and remove spaces before counting letters.\
    \ One way we can do this is by using the .replace() method to replace spaces with\
    \ an empty string \"\" (i.e., nothing):\n\n```\ndef count_letters(text):\n   \
    \ \"\"\"Count letters in a string.\"\"\"\n    return len(text.replace(\" \", \"\
    \"))\n```\n\nNow our previous assert statements should both pass. This process\
    \ we just went through roughly followed the typical testing workflow of:\n\n+\
    \   1. Write a test.\n2. Write the code to be tested.\n3. Test the code.\n4. Refactor\
    \ code (make small changes).\n5. Repeat.\n\nThis workflow is illustrated in Fig.\
    \ 5.1.\n\nIn our earlier demonstration with the count_letters() function, we swapped\
    \ steps 1 and 2; we wrote the first version of our function's code before we wrote\
    \ our tests, and this is a common workflow too. However, you can see how it might\
    \ have been beneficial to write the tests (or at least think about them)"
