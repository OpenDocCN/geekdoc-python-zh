    # 3.3 Put your package under version control


    Before continuing to develop our package it is good practice to put it under local
    and remote version control. This is not necessary for developing a package, but
    it is highly recommended so that you can better manage and track changes to your
    package over time. Version control is particularly useful if you plan on collaborating
    on your package with others. If you don''t want to use version control, feel free
    to skip to Section 3.4. The tools we will be using for version control in this
    book are Git and GitHub (which we set up in Section 2.4).


    > For this book, we assume readers have basic familiarity with Git and GitHub
    (or similar). To learn more about Git and GitHub, we recommend the following resources:
    *Happy Git and GitHub for the useR* (Bryan et al., 2021) and *Research Software
    Engineering with Python* (Irving et al., 2021).


    # 3.3.1 Set up local version control


    To set up local version control, navigate to the root *pycounts/* directory and
    initialize a Git repository:


    ```

    $ cd pycounts

    $ git init

    ```'
