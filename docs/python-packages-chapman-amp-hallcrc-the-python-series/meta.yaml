  md: "```\ndef test_myfunc_2():\n    assert myfunc(x=-5) == 5\n```\n\nThis test only\
    \ covers line 1, 2 and lines 7-9 of the function, for a total of 5 lines and 56%\
    \ coverage. Because line coverage can be skewed (or artificially inflated) by\
    \ how many lines are in the branches of your code, some developers prefer to calculate\
    \ branch coverage, which we'll talk about in the next section.\n\n# 5.5.2 Branch\
    \ coverage\n\nIn contrast to line coverage, branch coverage evaluates how many\
    \ branches in your code are executed by tests, where a branch is a possible execution\
    \ path the code can take, usually in the form of an `if` statement.\n\n```\ndef\
    \ myfunc(x):\n    # Branch 1\n    if x > 0:\n        print(\"x above threshold!\"\
    )\n        print(\"Running analysis.\")\n        y = round(x)\n        z = y **\
    \ 2\n    # Branch 2\n    elif x < 0:\n        z = abs(x)\n    return z\n```\n\n\
    $$coverage = \\frac{\\text{branches executed}}{\\text{total branches}} * 100\\\
    %$$\n\nWhen using branch coverage, we would get 50% coverage regardless of whether\
    \ we ran the `test_myfunc_1()` or `test_myfunc_2()` test functions we defined\
    \ in [Section 5.5.1](#section-5.5.1) because each test covers one branch. While\
    \ line coverage is perhaps more intuitive and easier to understand than branch\
    \ coverage, many developers feel that branch coverage provides a more useful,\
    \ less-biased, measure of coverage. In the next section, we'll show how to calculate\
    \ coverage as a mix of line and branch coverage, to get the best of both metrics.\n\
    \n# 5.5.3 Calculating coverage\n\nWe can calculate code coverage with pytest using\
    \ the extension `pytest-cov`. For a poetry-managed package, `pytest-cov` can be\
    \ installed as a development dependency with the following command:"
