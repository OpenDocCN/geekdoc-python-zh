  md: "# 5.5 Code coverage\n\ncoverage\", and there are different ways to calculate\
    \ it, as we'll learn about in this section.\n\n# 5.5.1 Line coverage\n\nThe simplest\
    \ and most intuitive measure of code coverage is line coverage. It is the proportion\
    \ of lines of your package's code that are executed by your tests:\n\n$$coverage\
    \ = \\frac{\\text{lines executed}}{\\text{total lines}} * 100\\%$$\n\nConsider\
    \ the following hypothetical code, consisting of 9 lines:\n\n```\ndef myfunc(x):\
    \                    # Line 1\n    if x > 0:                      # Line 2\n \
    \       print(\"x above threshold!\") # Line 3\n        print(\"Running analysis.\"\
    )  # Line 4\n        y = round(x)               # Line 5\n        z = y ** 2 \
    \                # Line 6\n    elif x < 0:                    # Line 7\n     \
    \   z = abs(x)                 # Line 8\n    return z                       #\
    \ Line 9\n```\n\nImagine we write the following unit test for that code. This\
    \ unit test uses x=10.25 as a test fixture (if you follow the code above, you'll\
    \ see that the expected result for that fixture is 100):\n\n```\ndef test_myfunc_1():\n\
    \    assert myfunc(x=10.25) == 100\n```\n\nThis test only covers the condition\
    \ x > 0 of our myfunc() function and hence will only execute lines 1 — 6 and line\
    \ 9; a total of 7, of 9, possible lines. The coverage would therefore be:\n\n\
    $$coverage = \\frac{7}{9} * 100\\% = 78\\%$$\n\nLine coverage is simple and intuitive\
    \ to understand, and many developers use it as a measure of how much of their\
    \ package's code is covered by their tests. But you can see how line coverage\
    \ can potentially be misleading. Our myfunc() function has two possible outputs,\
    \ depending on which condition of the if statement is satisfied. These two possible\
    \ code paths are called “branches”, and they might be equally important to our\
    \ package, but our line coverage metric is heavily dependent on which branches\
    \ we actually test. Imagine if we used the test below for our myfunc() function,\
    \ which passes a value x <= 0:"
