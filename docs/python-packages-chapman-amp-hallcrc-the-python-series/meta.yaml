    \ in Section 8.3.2, a step in a GitHub Actions can be an “action” (specified with\
    \ the keyword uses) or a “command” (specified with keyword run). We’ll briefly\
    \ explain the difference between these two concepts here.\n\nSteps that use command\
    \ line commands consist of a name and a run key, as shown in the example below:\n\
    \n```\n# Runs a single command using the runners shell\n- name: Run a one-line\
    \ script\n  run: echo Hello, world!\n```\n\nAnything after the run key will be\
    \ executed at the runner’s command line. You can run multiple commands in a single\
    \ step using the | character:\n\n```\n# Runs a set of commands using the runners\
    \ shell\n- name: Run a multi-line script\n  run: |\n    echo Add other actions\
    \ to build,\n    echo test, and deploy your project.\n```\n\nIn contrast to commands,\
    \ actions are reusable units of code that perform a particular task without having\
    \ to write out any commands. You’ll typically use actions that have been created\
    \ by others and shared on the GitHub Marketplace⁷. Actions are specified with\
    \ the uses keyword, followed by the name of the action you want to use. The @\
    \ symbol is used to specify which version of the action you want to use, like\
    \ in the example below:\n\n```\n# Checks-out your repository so your job can access\
    \ it\n- name: Check-out repository\n  uses: actions/checkout@v2\n```\n\nSome actions\
    \ can also be configured with inputs using the with key, as in the example below:\n\
    \n```\n# Set up a Python environment for use in actions\n- name: Set up Python\n\
    \  uses: actions/setup-python@v2\n  with:\n    python-version: 3.9\n```\n\n⁷https://github.com/marketplace?type="
