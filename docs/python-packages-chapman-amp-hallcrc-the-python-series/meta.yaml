    fig = plot_words(counts, n=10)\nplt.show()\n```\n\n## Contributing\n\nInterested\
    \ in contributing? Check out the contributing guidelines. Please note that this\
    \ project is released with a Code of Conduct. By contributing to this project,\
    \ you agree to abide by its terms.\n\n## License\n\n`pycounts` was created by\
    \ Tomas Beuzen. It is licensed under the terms of the MIT license.\n\n## Credits\n\
    \n`pycounts` was created with [`cookiecutter`](https://cookiecutter.readthedocs.io/en/latest/)\
