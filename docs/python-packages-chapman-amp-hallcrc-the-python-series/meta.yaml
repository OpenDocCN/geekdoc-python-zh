    # 5.3.5 How many tests should you write


    Now that you know how to write tests, how many should you actually write? There’s
    no single answer to this question. In general, you want your tests to evaluate
    the core functionality of your program. Code coverage, which we’ll discuss in
    Section 3.7.3, is a metric that can help you understand how much of your code
    your tests actually evaluate. But even 100% coverage doesn’t guarantee your code
    is perfect, only that it passes the specific tests you wrote!


    It might be near impossible to write tests for every single use-case of your package
    (you’d be amazed at the weird and wonderful ways users can find to unwittingly
    break your code!). That’s why testing is an iterative procedure, as we discussed
    in Section 5.1: as you refactor and add to your code, as users find ways to use
    your function that you didn’t expect, or it produces results you didn’t account
    for, write new tests, write new code, run your tests, and repeat.


    # 5.4 Advanced testing methods


    As the complexity and number of tests you write increases, it can be helpful to
    streamline and organize your tests in a more efficient and accessible manner.
    pytest fixtures and parameterizations are two useful concepts that can help here.
    As we’ll next discuss, pytest fixtures can be used to more efficiently define
    the context for your tests (e.g., the data or directory structure they run in),
    and parameterizations allow you to run the same test multiple times but with different
    input and output values.'
