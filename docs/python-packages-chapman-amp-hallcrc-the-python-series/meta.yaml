- md: '## 1 Introduction


    Python packages are a core element of the Python programming language and are
    how you write reusable and shareable code in Python. This book assumes that readers
    are familiar with how to install a package using a package installer like pip
    or conda, and how to import and use it with the help of the import statement in
    Python.


    For example, the command below uses pip to install numpy (Harris et al., 2020),
    the core scientific computing package for Python:


    ```

    $ pip install numpy

    ```


    Once the package is installed, it can be used in a Python interpreter. For example,
    to round pi to three decimal places:


    ```

    $ python

    ```


    ```

    >>> import numpy as np

    >>> np.round(np.pi, decimals=3)

    ```


    ```

    3.142

    ```


    At a minimum, a package bundles together code (such as functions, classes, variables,
    or scripts) so that it can be easily reused across different projects. However,
    packages are typically also supported by extra content such as documentation and
    tests, which become exponentially more important if you wish to share your package
    with others.


    As of January 2022, there are over 350,000 packages available on the Python Package
    Index (PyPI)¹, the official online software repository for Python. Packages are
    a key reason why Python is such a powerful and widely used programming language.
    The chances are that someone has already solved a problem that you''re working
    on, and you can benefit from their work by downloading and installing their package.
    Put simply, packages are how you make it as easy as possible to use, maintain,
    share, and collaborate on Python code with others, whether they be your friends,
    work colleagues, the world, or your future self!


    Even if you never intend to share your code with others, making packages will
    ultimately save you time. Packages make it significantly easier for you to reuse
    and maintain your code within a project and across different projects. After programming
    for some time, most people will eventually reach a point where they want to reuse
    code from one project in another. For beginners, in particular, this is something
    often accomplished by copying-and-pasting existing code into the new project.
    Despite being inefficient, this practice also makes it difficult to improve and
    maintain your code across projects. Creating a simple Python package will solve
    these problems.


    Regardless of your motivation, the goal of this book is to show you how to easily
    develop Python packages. The focus is overwhelmingly practical — we will leverage
    modern methods and tools to develop and maintain packages efficiently, reproducibly,
    and with as much automation as possible, so you can focus on writing and sharing
    code. Along the way, we''ll also enlighten some interesting and relevant lower-level
    details of Python packaging and the Python programming language.


    ### 1.1 Why you should create packages


    There are many reasons why you should develop Python packages!


    - To effectively share your code with others.

    - They save you time. Even if you don''t intend to share your package with others,
    they help you easily reuse and maintain your code across multiple projects.

    - They force you to organize and document your code, such that it can be easily
    understood and used at a later time.

    - They isolate dependencies for your code and improve its reproducibility.

    - They are a good way to practice writing good code.

    - Packages can be used to effectively bundle up reproducible data analysis and
    programming projects.

    - Finally, developing and distributing packages supports the Python ecosystem
    and other Python users who can benefit from your work.


    ## 2 System setup


    If you intend to follow along with the code presented in this book, we recommend
    you follow these setup instructions so that you will run into fewer technical
    issues.


    ### 2.1 The command-line interface


    A command-line interface (CLI) is a text-based interface used to interact with
    your computer. We''ll be using a CLI for various tasks throughout this book. We''ll
    assume Mac and Linux users are using the "Terminal" and Windows users are using
    the "Anaconda Prompt" (which we''ll install in the next section) as a CLI.


    ### 2.2 Installing software


    Section 2.2.1 and Section 2.2.2 describe how to install the software you''ll need
    to develop a Python package and follow along with the text and examples in this
    book. However, we also support an alternative setup with Docker that has everything
    you need already installed to get started. The Docker approach is recommended
    for anyone that runs into issues installing or using any of the software below
    on their specific operating system, or anyone who would simply prefer to use Docker
    — if that''s you, skip to Section 2.3 for now, and we''ll describe the Docker
    setup later in Section 2.6.


    #### 2.2.1 Installing Python


    We recommend installing the latest version of Python via the Miniconda distribution
    by following the instructions in the Miniconda documentation¹. Miniconda is a
    lightweight version of the popular Anaconda distribution. If you have previously
    installed the Anaconda or Miniconda distribution feel free to skip to **Section
    2.2.2**.


    If you are unfamiliar with Miniconda and Anaconda, they are distributions of Python
    that also include the conda package and environment manager, and a number of other
    useful packages. The difference between Anaconda and Miniconda is that Anaconda
    installs over 250 additional packages (many of which you might never use), while
    Miniconda is a much smaller distribution that comes bundled with just a few key
    packages; you can then install additional packages as you need them using the
    command `conda install`.


    conda is a piece of software that supports the process of installing and updating
    software (like Python packages). It is also an environment manager, which is the
    key function we''ll be using it for in this book. An environment manager helps
    you create "virtual environments" on your machine, where you can safely install
    different packages and their dependencies in an isolated location. Installing
    all the packages you need in the same place (i.e., the system default location)
    can be problematic because different packages often depend on different versions
    of the same dependencies; as you install more packages, you''ll inevitably get
    conflicts between dependencies, and your code will start to break. Virtual environments
    help you compartmentalize and isolate the packages you are using for different
    projects to avoid this issue. You can read more about virtual environments in
    the conda documentation². While alternative package and environment managers exist,
    we choose to use conda in this book because of its popularity, ease-of-use, and
    ability to handle any software stack (not just Python).


    #### 2.2.2 Install packaging software


    Once you''ve installed the Miniconda distribution, ensure that Python and conda
    are up to date by running the following command at the command line:


    ```

    $ conda update --all

    ```


    Now we''ll install the two main pieces of software we''ll be using to help us
    create Python packages in this book:


    1. poetry³: software that will help us build our own Python packages. poetry is
    under active development, thus we recommend referring to the official poetry documentation⁴
    for detailed installation instructions and support.

    2. cookiecutter⁵: software that will help us create packages from pre-made templates.
    It can be installed with conda as follows:


    ```

    $ conda install -c conda-forge cookiecutter

    ```


    ### 2.3 Register for a PyPI account


    The Python Package Index (PyPI) is the official online software repository for
    Python. A software repository is a storage location for downloadable software,
    like Python packages. In this book we''ll be publishing a package to PyPI. Before
    publishing packages to PyPI, it is typical to "test drive" their publication on
    TestPyPI, which is a test version of PyPI. To follow along with this book, you
    should register for a TestPyPI account on the TestPyPI website⁶ and a PyPI account
    on the PyPI website⁷.


    ### 2.4 Set up Git and GitHub


    If you''re not using a version control system, we highly recommend you get into
    the habit! A version control system tracks changes to the file(s) of your project
    in a clear and organized way (no more "document_1.doc", "document_1_new.doc",
    "document_final.doc", etc.). As a result, a version control system contains a
    full history of all the revisions made to your project, which you can view and
    retrieve at any time. You don''t *need* to use or be familiar with version control
    to read this book, but if you''re serious about creating Python packages, version
    control will become an invaluable part of your workflow, so now is a good time
    to learn!


    There are many version control systems available, but the most common is Git and
    we''ll be using it throughout this book. You can download Git by following the
    instructions in the Git documentation⁸. Git helps track changes to a project on
    a local computer, but what if we want to collaborate with others? Or, what happens
    if your computer crashes and you lose all your work? That''s where GitHub comes
    in. GitHub is one of many online services for hosting Git-managed projects. GitHub
    helps you create an online copy of your project, which can serve as a backup and
    a central point for collaboration.


    ¹ https://pypi.org

    ² https://conda.io/projects/conda/en/latest/user-guide/concepts/environments.html

    ³ https://python-poetry.org/

    ⁴ https://python-poetry.org/docs/

    ⁵ https://github.com/cookiecutter/cookiecutter

    ⁶ https://test.pypi.org/account/register/

    ⁷ https://pypi.org/account/register/

    ⁸ https://git-scm.com/book/en/v2/Getting-Started-Installing-Git'
  mdcn: '## 1 引言


    Python 包是 Python 编程语言的核心要素，也是你在 Python 中编写可复用和可共享代码的方式。本书假设读者熟悉如何使用 pip 或 conda
    等包安装器安装包，以及如何使用 Python 中的 `import` 语句导入和使用包。


    例如，下面的命令使用 pip 安装 numpy（Harris 等人，2020），这是 Python 的核心科学计算包：


    ```

    $ pip install numpy

    ```


    安装包后，就可以在 Python 解释器中使用它了。例如，将圆周率四舍五入到三位小数：


    ```

    $ python

    ```


    ```

    >>> import numpy as np

    >>> np.round(np.pi, decimals=3)

    ```


    ```

    3.142

    ```


    一个包至少将代码（如函数、类、变量或脚本）打包在一起，以便在不同项目中轻松复用。然而，包通常还辅以额外内容，如文档和测试，如果你希望与他人共享你的包，这些内容的重要性会呈指数级增长。


    截至 2022 年 1 月，Python 官方在线软件仓库 Python Package Index (PyPI)¹ 上已有超过 350,000 个包。包是
    Python 成为如此强大且广泛使用的编程语言的关键原因之一。很可能已经有人解决了你正在处理的问题，你可以通过下载和安装他们的包来受益于他们的工作。简而言之，包是你让
    Python 代码尽可能易于使用、维护、共享和与他人协作的方式，无论他们是你的朋友、同事、全世界，还是未来的你自己！


    即使你从未打算与他人共享代码，制作包最终也会为你节省时间。包使你能够更轻松地在项目内部和跨项目复用和维护代码。编程一段时间后，大多数人最终都会达到一个阶段，希望在一个项目中复用另一个项目的代码。对于初学者来说，这通常通过将现有代码复制粘贴到新项目中来实现。尽管效率低下，这种做法也使得跨项目改进和维护代码变得困难。创建一个简单的
    Python 包将解决这些问题。


    无论你的动机是什么，本书的目标都是向你展示如何轻松地开发 Python 包。重点完全在于实践——我们将利用现代方法和工具高效、可复现且尽可能自动化地开发和维护包，以便你可以专注于编写和共享代码。在此过程中，我们还将阐明
    Python 打包和 Python 编程语言中一些有趣且相关的底层细节。


    ### 1.1 为什么你应该创建包


    开发 Python 包有很多理由！


    -   有效地与他人共享你的代码。

    -   它们为你节省时间。即使你不打算与他人共享你的包，它们也能帮助你轻松地在多个项目中复用和维护代码。

    -   它们迫使你组织和记录你的代码，以便日后易于理解和使用。

    -   它们隔离了代码的依赖项，并提高了其可复现性。

    -   它们是练习编写良好代码的好方法。

    -   包可用于有效地打包可复现的数据分析和编程项目。

    -   最后，开发和分发包支持了 Python 生态系统和其他可以从你的工作中受益的 Python 用户。


    ## 2 系统设置


    如果你打算跟随本书中的代码实践，我们建议你遵循以下设置说明，以减少遇到的技术问题。


    ### 2.1 命令行界面


    命令行界面（CLI）是一种基于文本的界面，用于与你的计算机交互。我们将在本书中使用 CLI 执行各种任务。我们将假设 Mac 和 Linux 用户使用“终端”，Windows
    用户使用“Anaconda Prompt”（我们将在下一节安装）作为 CLI。


    ### 2.2 安装软件


    第 2.2.1 节和第 2.2.2 节描述了如何安装开发 Python 包以及跟随本书文本和示例所需的软件。但是，我们也支持使用 Docker 的替代设置，其中已包含入门所需的一切。对于在特定操作系统上安装或使用以下任何软件时遇到问题的人，或者只是更喜欢使用
    Docker 的人，推荐使用 Docker 方法——如果是你，请先跳到第 2.3 节，我们将在后面的第 2.6 节描述 Docker 设置。


    #### 2.2.1 安装 Python


    我们建议通过 Miniconda 发行版安装最新版本的 Python，具体说明请参阅 Miniconda 文档¹。Miniconda 是流行的 Anaconda
    发行版的轻量级版本。如果你之前安装过 Anaconda 或 Miniconda 发行版，请随意跳到 **第 2.2.2 节**。


    如果你不熟悉 Miniconda 和 Anaconda，它们是 Python 的发行版，同时也包含 conda 包和环境管理器，以及许多其他有用的包。Anaconda
    和 Miniconda 的区别在于，Anaconda 安装了超过 250 个额外的包（其中许多你可能永远不会使用），而 Miniconda 是一个小得多的发行版，只捆绑了几个关键包；然后你可以使用命令
    `conda install` 根据需要安装额外的包。


    conda 是一款支持安装和更新软件（如 Python 包）过程的软件。它也是一个环境管理器，这将是我们在本书中使用它的关键功能。环境管理器帮助你在机器上创建“虚拟环境”，你可以在隔离的位置安全地安装不同的包及其依赖项。将所有需要的包安装在同一位置（即系统默认位置）可能会有问题，因为不同的包通常依赖于同一依赖项的不同版本；随着你安装更多的包，你不可避免地会遇到依赖项冲突，你的代码将开始出错。虚拟环境帮助你将用于不同项目的包进行分区和隔离，以避免此问题。你可以在
    conda 文档²中阅读更多关于虚拟环境的信息。虽然存在替代的包和环境管理器，但我们选择在本书中使用 conda，因为它流行、易于使用，并且能够处理任何软件栈（不仅仅是
    Python）。


    #### 2.2.2 安装打包软件


    安装 Miniconda 发行版后，请在命令行运行以下命令以确保 Python 和 conda 是最新的：


    ```

    $ conda update --all

    ```


    现在我们将安装本书中用于帮助我们创建 Python 包的两个主要软件：


    1.  poetry³：将帮助我们构建自己的 Python 包的软件。poetry 正在积极开发中，因此我们建议参考官方 poetry 文档⁴获取详细的安装说明和支持。

    2.  cookiecutter⁵：将帮助我们从预制模板创建包的软件。可以使用 conda 安装如下：


    ```

    $ conda install -c conda-forge cookiecutter

    ```


    ### 2.3 注册 PyPI 账户


    Python Package Index (PyPI) 是 Python 的官方在线软件仓库。软件仓库是可下载软件（如 Python 包）的存储位置。在本书中，我们将向
    PyPI 发布一个包。在向 PyPI 发布包之前，通常会在 TestPyPI（PyPI 的测试版本）上“试运行”发布。要跟随本书，你应该在 TestPyPI
    网站⁶上注册一个 TestPyPI 账户，并在 PyPI 网站⁷上注册一个 PyPI 账户。


    ### 2.4 设置 Git 和 GitHub


    如果你没有使用版本控制系统，我们强烈建议你养成使用习惯！版本控制系统以清晰、有组织的方式跟踪项目文件的更改（不再有“document_1.doc”、“document_1_new.doc”、“document_final.doc”等）。因此，版本控制系统包含项目所有修订的完整历史记录，你可以随时查看和检索。阅读本书你*不需要*使用或熟悉版本控制，但如果你认真对待创建
