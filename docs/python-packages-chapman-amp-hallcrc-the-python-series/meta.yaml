  md: '![](img/d3840bdab18c2309faf9de63e70c539d_95_0.png)


    **FIGURE 3.14:** Release of v0.1.0 of pycounts on GitHub.


    the files and information necessary to install a package using a tool like pip.
    Distribution packages are often called “distributions” for short and they are
    how packages are shared in Python and installed by users, typically with the command
    pip install <some-package>.


    The main types of distributions in Python are source distributions (known as “sdists”)
    and wheels. sdists are a compressed archive of all the source files, metadata,
    and instructions needed to construct an installable version of your package. To
    install from an sdist, a user needs to download the sdist, extract its contents,
    and then use the build instructions to build and finally install the package on
    their computer.


    In contrast, wheels are pre-built versions of a package. They are built on the
    developer’s machine before sharing with users. They are the preferred distribution
    format because a user only needs to download the wheel and move it to the location
    on their computer where Python searches for packages; no build step is required.'
