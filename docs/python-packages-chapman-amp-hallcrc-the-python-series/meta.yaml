  md: "# 8.4 Setting up continuous integration\n\n+   3. Checkout our repository so\
    \ we can access its contents (action: actions/checkout@v2<sup>10</sup>).\n4. Install\
    \ poetry (action: snok/install-poetry@v1<sup>11</sup>).\n5. Use poetry to install\
    \ pycounts (command: poetry install).\n\nWe'll add all these steps to our workflow\
    \ in a job called “ci”:\n\n```\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n\
    \  ci:\n    # Set up operating system\n    runs-on: ubuntu-latest\n\n    # Define\
