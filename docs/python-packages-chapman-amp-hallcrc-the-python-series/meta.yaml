    # 4.3.4 Package repositories


    In **Chapter 3: How to package a Python**, we released our pycounts package to
    the Python Package Index (PyPI<sup>33</sup>) and discussed how PyPI is the main
    repository for Python packages. Even if you’ve never heard of PyPI, if you’ve
    ever run `pip install <some-package>` you’ve installed packages from there. If
    you’re interested in sharing your work publicly, PyPI is probably where you’ll
    release your package, however, it is not the only option.


    The Anaconda<sup>34</sup> and conda-forge<sup>35</sup> repositories are the next
    most popular software repositories for Python packages. Packages on these repositories
    can be installed from the command line using `conda install` (we installed the
    conda tool in **Section 2.2.1**). The main differences between PyPI and these
    repositories is that they can host non-Python software (as opposed to PyPI which
    only hosts Python software), and conda packages are binaries (there is never a
    need to have to build a package or its dependencies from an sdist). As a result,
    packages that depend on non-Python code are usually released to Anaconda or conda-forge.
    Even for packages that are pure Python, developers sometimes still also create
    a conda package and upload to Anaconda or conda-forge to cater to users who are
    using conda as a package manager rather than pip. For those interested, Anaconda
    provides a helpful tutorial<sup>36</sup> to help convert packages on PyPI to conda
    packages, but for most readers of this book, building sdist and wheel distributions
    and sharing them on PyPI will be enough.


    In some cases, you may want to release your package to a private repository (for
    example, for internal use by your company only). There are many private repository
    options for Python packages. Companies like Anaconda<sup>37</sup>, PyDist<sup>38</sup>,
    and GemFury<sup>39</sup> are all examples that offer (typically paid) private
    Python package repository hosting. You can also set up your own server on a dedicated
    machine or cloud service — as discussed in this article<sup>40</sup>. You can
    also choose to host your package on GitHub (or equivalent), and forego releasing
    to a dedicated software repository. `pip install` supports installing a package
    directly from a GitHub repository you have access to, as discussed


