    We assume that those who choose to follow the optional version control sections
    of this book have basic familiarity with Git and GitHub (or equivalent). Two excellent
    learning resources are *Happy Git and GitHub for the useR*¹¹ (Bryan et al., 2021)
    and *Research Software Engineering with Python*¹² (Irving et al., 2021).


    # 2.5 Python integrated development environments


    A Python integrated development environment (IDE) will make the process of creating
    Python packages significantly easier. An IDE is a piece of software that provides
    advanced functionality for code development, such as directory and file creation
    and navigation, autocomplete, debugging, and syntax highlighting, to name a few.
    An IDE will save you time and help you write better code. Commonly used free Python
    IDEs include Visual Studio Code¹³, Atom¹⁴, Sublime Text¹⁵, Spyder¹⁶, and PyCharm
    Community Edition¹⁷. For those more familiar with the Jupyter ecosystem, JupyterLab¹⁸
    is a suitable browser-based IDE. Finally, for the R community, the RStudio IDE¹⁹
    also supports Python.


    You''ll be able to follow along with the examples presented in this book regardless
    of what IDE you choose to develop your Python code in. If you don''t know which
    IDE to use, we recommend starting with Visual Studio Code. Below we briefly describe
    how to set up Visual Studio Code, JupyterLab, and RStudio as Python IDEs (these
    are the IDEs we personally use in our day-to-day work). If you''d like to use
    Docker to help develop Python packages and follow along with this book, we''ll
    describe how to do so with Visual Studio Code or JupyterLab in **Section 2.6**.


