- md: "## 4.3.4 Package repositories\n\nIn **Chapter 3: How to package a Python**,\
    \ we released our pycounts package to the Python Package Index (PyPI<sup>33</sup>)\
    \ and discussed how PyPI is the main repository for Python packages. Even if you’ve\
    \ never heard of PyPI, if you’ve ever run `pip install <some-package>` you’ve\
    \ installed packages from there. If you’re interested in sharing your work publicly,\
    \ PyPI is probably where you’ll release your package, however, it is not the only\
    \ option.\n\nThe Anaconda<sup>34</sup> and conda-forge<sup>35</sup> repositories\
    \ are the next most popular software repositories for Python packages. Packages\
    \ on these repositories can be installed from the command line using `conda install`\
    \ (we installed the conda tool in **Section 2.2.1**). The main differences between\
    \ PyPI and these repositories is that they can host non-Python software (as opposed\
    \ to PyPI which only hosts Python software), and conda packages are binaries (there\
    \ is never a need to have to build a package or its dependencies from an sdist).\
    \ As a result, packages that depend on non-Python code are usually released to\
    \ Anaconda or conda-forge. Even for packages that are pure Python, developers\
    \ sometimes still also create a conda package and upload to Anaconda or conda-forge\
    \ to cater to users who are using conda as a package manager rather than pip.\
    \ For those interested, Anaconda provides a helpful tutorial<sup>36</sup> to help\
    \ convert packages on PyPI to conda packages, but for most readers of this book,\
    \ building sdist and wheel distributions and sharing them on PyPI will be enough.\n\
    \nIn some cases, you may want to release your package to a private repository\
    \ (for example, for internal use by your company only). There are many private\
    \ repository options for Python packages. Companies like Anaconda<sup>37</sup>,\
    \ PyDist<sup>38</sup>, and GemFury<sup>39</sup> are all examples that offer (typically\
    \ paid) private Python package repository hosting. You can also set up your own\
    \ server on a dedicated machine or cloud service — as discussed in this article<sup>40</sup>.\
    \ You can also choose to host your package on GitHub (or equivalent), and forego\
    \ releasing to a dedicated software repository. `pip install` supports installing\
    \ a package directly from a GitHub repository you have access to, as discussed\
    \ in the documentation<sup>41</sup>. You can `pip install` from a repository branch,\
    \ a specific commit, or a tag. For example, we tagged a release of v0.1.0 of our\
    \ pycounts package on GitHub in **Section 3.9**. Others could now install our\
    \ package directly from GitHub using the following command:\n\n```\n$ pip install\
    \ git+https://github.com/TomasBeuzen/pycounts.git@v0.1.0\n```\n\nInstalling from\
    \ GitHub can be useful for users wanting a version of your package not yet available\
    \ on PyPI (for example, a development version), or if you want to host your package\
    \ in a private repository and only share it with a select few collaborators. In\
    \ general though, we don't recommend GitHub for sharing Python packages to a wide\
    \ audience as the vast majority of Python users do not install packages from GitHub,\
    \ and dedicated software repositories like PyPI provide better discoverability,\
    \ ease of installation, and a stamp of authenticity.\n\n## 4.4 Version control\n\
    \nIn **Section 4.2.6** we made an important change to our pycounts package by\
    \ adding a new datasets module and some example data. We will make a new release\
    \ of our package in **Chapter 7: Releasing and versioning** that incorporates\
    \ this change. So, if you're following along building the pycounts package yourself\
    \ and using version control, commit these changes to your local and remote repositories\
    \ using the commands below. If you're not building the pycounts package or not\
    \ using version control, you can skip to the next chapter.\n\n```\n$ git add src/pycounts/datasets.py\
    \ src/pycounts/data\n$ git commit -m \"feat: add example data and datasets module\"\
    \n$ git push\n```\n\n# 5\n## Testing\n\nTesting is an important part of Python\
    \ package development but one that is often neglected due to the perceived additional\
    \ workload. However, the reality is quite the opposite! Introducing formal, automated\
    \ testing into your workflow can have several benefits:\n\n- 1. **Fewer bugs:**\
    \ you're explicitly constructing and testing your code from the viewpoint of a\
    \ developer and a user.\n- 2. **Better code structure:** writing tests forces\
    \ you to structure and organize your code so that it's easier to test and understand.\n\
    - 3. **Easier development:** formal tests will help you and others add features\
    \ to your code without breaking tried-and-tested existing functionality.\n\n**Section\
    \ 3.7** briefly introduced testing in Python package development. This chapter\
    \ now goes into more detail about how to write tests, different types of tests\
    \ (unit tests, regression tests, integration tests), and code coverage.\n\n###\
    \ 5.1 Testing workflow\n\nIn general, the goal of testing is to check that your\
    \ code produces the results you expect it to. You probably already conduct informal\
    \ tests of your code in your current workflow. In a typical workflow, we write\
    \ code, run it in a Python session to see if it's working as we expect, make changes,\
    \ repeat. This is sometimes called “manual testing” or “exploratory testing” and\
    \ is common in the early stages of development of your code. But when developing\
    \ code you intend to package up, reuse, and potentially share with others, you'll\
    \ need to test it in a more formal and reproducible way.\n\nIn Python, tests are\
    \ usually written using an `assert` statement, which checks the truth of a given\
    \ expression, and returns a user-defined error message if the expression is false.\
    \ To demonstrate this process, imagine we want to create a function called `count_letters()`\
    \ that counts the number of letters in a string. We come up with the following\
    \ code as a first version of that function:\n\n```\ndef count_letters(text):\n\
    \    \"\"\"Count letters in a string.\"\"\"\n    return len(text)\n```\n\nWe can\
    \ write some tests for that function using the assert statement to check it's\
    \ working as we expect it to. For example we would expect our function to calculate\
    \ five letters in the string \"Hello\" and ten letters in the string \"Hello world\"\
    :\n\n```\n>>> assert count_letters(\"Hello\") == 5, \"'Hello' should have 5 letters\"\
    \n>>> assert count_letters(\"Hello world\") == 10, \"'Hello world' should \\n\
    \    have 10 letters\"\n```\n\nIf we ran the above assert statements, the first\
    \ would pass without error, but the second would raise an error:\n\n```\nAssertionError:\
    \ 'Hello world' should have 10 letters\n```\n\nWhat went wrong? When we call len()\
    \ on a string, it counts all the characters in the string, including the spaces.\
    \ So, we need to go back to our count_letters() function and remove spaces before\
    \ counting letters. One way we can do this is by using the .replace() method to\
    \ replace spaces with an empty string \"\" (i.e., nothing):\n\n```\ndef count_letters(text):\n\
    \    \"\"\"Count letters in a string.\"\"\"\n    return len(text.replace(\" \"\
    , \"\"))\n```\n\nNow our previous assert statements should both pass. This process\
    \ we just went through roughly followed the typical testing workflow of:\n\n-\
    \ 1. Write a test.\n- 2. Write the code to be tested.\n- 3. Test the code.\n-\
    \ 4. Refactor code (make small changes).\n- 5. Repeat.\n\nThis workflow is illustrated\
    \ in Fig. 5.1.\n\nIn our earlier demonstration with the count_letters() function,\
    \ we swapped steps 1 and 2; we wrote the first version of our function's code\
    \ before we wrote our tests, and this is a common workflow too. However, you can\
    \ see how it might have been beneficial to write the tests (or at least think\
    \ about them)\n\n---\n**脚注：**\n<sup>32</sup> https://setuptools.readthedocs.io/en/latest/userguide/index.html\n\
    <sup>33</sup> https://pypi.org/\n<sup>34</sup> https://anaconda.org/anaconda/repo\n\
    <sup>35</sup> https://conda-forge.org\n<sup>36</sup> https://docs.conda.io/projects/conda-build/en/latest/user-guide/tutorials/build-pkgs-skeleton.html\n\
    <sup>37</sup> https://docs.anaconda.com/\n<sup>38</sup> https://pydist.com/\n\
    <sup>39</sup> https://gemfury.com/\n<sup>40</sup> https://medium.com/swlh/how-to-install-a-private-pypi-server-on-aws-76993e45c610\n\
    <sup>41</sup> https://pip.pypa.io/en/stable/topics/vcs-support/"
  mdcn: "## 4.3.4 包仓库\n\n在**第3章：如何打包一个Python包**中，我们将pycounts包发布到了Python包索引（PyPI<sup>33</sup>），并讨论了PyPI是Python包的主要仓库。即使你从未听说过PyPI，但如果你运行过`pip\
    \ install <some-package>`，那么你就是从那里安装的包。如果你有兴趣公开分享你的作品，PyPI可能是你发布包的地方，然而，它并非唯一的选择。\n\
    \nAnaconda<sup>34</sup>和conda-forge<sup>35</sup>仓库是Python包第二受欢迎的软件仓库。这些仓库上的包可以使用`conda\
    \ install`从命令行安装（我们在**第2.2.1节**中安装了conda工具）。PyPI与这些仓库的主要区别在于，它们可以托管非Python软件（而PyPI只托管Python软件），并且conda包是二进制文件（永远不需要从sdist构建包或其依赖项）。因此，依赖非Python代码的包通常会发布到Anaconda或conda-forge。即使是纯Python包，开发者有时也会创建conda包并上传到Anaconda或conda-forge，以迎合那些使用conda而非pip作为包管理器的用户。对于感兴趣的读者，Anaconda提供了一个有用的教程<sup>36</sup>，帮助将PyPI上的包转换为conda包，但对于本书的大多数读者来说，构建sdist和wheel分发包并在PyPI上分享就足够了。\n\
    \n在某些情况下，你可能希望将包发布到私有仓库（例如，仅供公司内部使用）。Python包有许多私有仓库选项。像Anaconda<sup>37</sup>、PyDist<sup>38</sup>和GemFury<sup>39</sup>这样的公司都是提供（通常是付费的）私有Python包仓库托管服务的例子。你也可以在专用机器或云服务上设置自己的服务器——如本文<sup>40</sup>所述。你也可以选择将包托管在GitHub（或类似平台）上，而放弃发布到专门的软件仓库。`pip\
    \ install`支持直接从你有权访问的GitHub仓库安装包，如文档<sup>41</sup>所述。你可以从仓库分支、特定提交或标签进行`pip install`。例如，我们在**第3.9节**中在GitHub上为我们的pycounts包的v0.1.0版本打上了标签。其他人现在可以使用以下命令直接从GitHub安装我们的包：\n\
    \n```\n$ pip install git+https://github.com/TomasBeuzen/pycounts.git@v0.1.0\n\
    ```\n\n从GitHub安装对于想要使用尚未在PyPI上提供的包版本（例如，开发版本）的用户很有用，或者如果你想将包托管在私有仓库中，只与少数选定的协作者分享。但总的来说，我们不建议使用GitHub向广大受众分享Python包，因为绝大多数Python用户不会从GitHub安装包，而像PyPI这样的专门软件仓库提供了更好的可发现性、易安装性和真实性认证。\n\
    \n## 4.4 版本控制\n\n在**第4.2.6节**中，我们对pycounts包进行了重要更改，添加了一个新的datasets模块和一些示例数据。我们将在**第7章：发布和版本控制**中发布包含此更改的新版本包。因此，如果你正在自己构建pycounts包并使用版本控制，请使用以下命令将这些更改提交到你的本地和远程仓库。如果你没有构建pycounts包或不使用版本控制，可以跳到下一章。\n\
    \n```\n$ git add src/pycounts/datasets.py src/pycounts/data\n$ git commit -m \"\
    feat: add example data and datasets module\"\n$ git push\n```\n\n# 5\n## 测试\n\n\
    测试是Python包开发的重要组成部分，但由于感知到的额外工作量，它经常被忽视。然而，现实恰恰相反！在你的工作流程中引入正式的、自动化的测试有几个好处：\n\
    \n- 1. **更少的bug：** 你从开发者和用户的角度明确地构建和测试你的代码。\n- 2. **更好的代码结构：** 编写测试迫使你构建和组织代码，使其更易于测试和理解。\n\
    - 3. **更轻松的开发：** 正式测试将帮助你和其他人向代码添加功能，而不会破坏经过验证的现有功能。\n\n**第3.7节**简要介绍了Python包开发中的测试。本章现在将更详细地介绍如何编写测试、不同类型的测试（单元测试、回归测试、集成测试）以及代码覆盖率。\n\
    \n### 5.1 测试工作流程\n\n一般来说，测试的目标是检查你的代码是否产生了你期望的结果。你可能已经在当前工作流程中对代码进行了非正式测试。在典型的工作流程中，我们编写代码，在Python会话中运行它以查看是否按预期工作，进行更改，然后重复。这有时被称为“手动测试”或“探索性测试”，在代码开发的早期阶段很常见。但是，当你开发打算打包、重用并可能与他人分享的代码时，你需要以更正式和可重现的方式进行测试。\n\
    \n在Python中，测试通常使用`assert`语句编写，该语句检查给定表达式的真假，如果表达式为假，则返回用户定义的错误消息。为了演示这个过程，假设我们想创建一个名为`count_letters()`的函数来计算字符串中的字母数量。我们提出了以下代码作为该函数的第一个版本：\n\
    \n```\ndef count_letters(text):\n    \"\"\"Count letters in a string.\"\"\"\n\
    \    return len(text)\n```\n\n我们可以使用assert语句为该函数编写一些测试，以检查它是否按预期工作。例如，我们期望函数计算字符串\"\
    Hello\"中的五个字母和字符串\"Hello world\"中的十个字母：\n\n```\n>>> assert count_letters(\"Hello\"\
    ) == 5, \"'Hello' should have 5 letters\"\n>>> assert count_letters(\"Hello world\"\
    ) == 10, \"'Hello world' should \\n    have 10 letters\"\n```\n\n如果我们运行上面的assert语句，第一个会通过而没有错误，但第二个会引发错误：\n\
    \n```\nAssertionError: 'Hello world' should have 10 letters\n```\n\n哪里出了问题？当我们对字符串调用len()时，它计算字符串中的所有字符，包括空格。因此，我们需要回到count_letters()函数，在计数字母之前移除空格。我们可以通过使用.replace()方法将空格替换为空字符串\"\
    \"（即，什么都没有）来实现：\n\n```\ndef count_letters(text):\n    \"\"\"Count letters in a\
    \ string.\"\"\"\n    return len(text.replace(\" \", \"\"))\n```\n\n现在我们之前的assert语句应该都能通过了。我们刚刚经历的这个过程大致遵循了典型的测试工作流程：\n\
    \n- 1. 编写测试。\n- 2. 编写要测试的代码。\n- 3. 测试代码。\n- 4. 重构代码（进行小的更改）。\n- 5. 重复。\n\n这个工作流程如图5.1所示。\n\
    \n在我们之前使用count_letters()函数的演示中，我们交换了步骤1和2；我们在编写测试之前编写了函数的第一个版本的代码，这也是一个常见的工作流程。然而，你可以看到编写测试（或至少思考测试）可能带来的好处\n\
    \n---\n**脚注：**\n<sup>32</sup> https://setuptools.readthedocs.io/en/latest/userguide/index.html\n\
    <sup>33</sup> https://pypi.org/\n<sup>34</sup> https://anaconda.org/anaconda/repo\n\
    <sup>35</sup> https://conda-forge.org\n<sup>36</sup> https://docs.conda.io/projects/conda-build/en/latest/user-guide/tutorials/build-pkgs-skeleton.html\n\
    <sup>37</sup> https://docs.anaconda.com/\n<sup>38</sup> https://pydist.com/\n\
    <sup>39</sup> https://gemfury.com/\n<sup>40</sup> https://medium.com/swlh/how-to-install-a-private-pypi-server-on-aws-76993e45c610\n\
    <sup>41</sup> https://pip.pypa.io/en/stable/topics/vcs-support/"
