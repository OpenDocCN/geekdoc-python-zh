- md: '## 7 Releasing and versioning


    Previous chapters have focused on how to develop a Python package from scratch
    by creating the Python source code, developing a testing framework, writing documentation,
    and then releasing it online via PyPI (if desired). This chapter now describes
    the next step in the packaging workflow — updating your package!


    At any given time, your package''s users (including you) will install a particular
    version of your package in a project. If you change the package''s source code,
    their code could potentially break (imagine you change a module name, or remove
    a function argument a user was using). To solve this problem, developers assign
    a unique version number to each unique state of their package and release each
    new version independently. Most of the time, users will want to use the most up-to-date
    version of your package, but sometimes, they''ll need to use an older version
    that is compatible with their project. Releasing versions is also an important
    way of communicating to your users that your package has changed (e.g., bugs have
    been fixed, new features have been added, etc.).


    In this chapter, we''ll walk through the process of creating and releasing new
    versions of your Python package.


    ## 7.1 Version numbering


    Versioning is the process of adding unique identifiers to different versions of
    your package. The unique identifier you use may be name-based or number-based,
    but most Python packages use semantic versioning¹. In semantic versioning, a version
    number consists of three integers A.B.C, where A is the “major” version, B is
    the “minor” version, and C is the “patch” version. The first version of a software
    usually starts at 0.1.0 and increments from there. We call an increment a “bump”,
    and it consists of adding 1 to either the major, minor, or patch identifier as
    follows:


    - **Patch** release (0.1.0 -> 0.1.1): patch releases are typically used for bug
    fixes, which are backward compatible. Backward compatibility refers to the compatibility
    of your package with previous versions of itself. For example, if a user was using
    v0.1.0 of your package, they should be able to upgrade to v0.1.1 and have any
    code they previously wrote still work. It’s fine to have so many patch releases
    that you need to use two digits (e.g., 0.1.27).


    - **Minor** release (0.1.0 -> 0.2.0): a minor release typically includes larger
    bug fixes or new features that are backward compatible, for example, the addition
    of a new function. It’s fine to have so many minor releases that you need to use
    two digits (e.g., 0.13.0).


    - **Major** release (0.1.0 -> 1.0.0): release 1.0.0 is typically used for the
    first stable release of your package. After that, major releases are made for
    changes that are not backward compatible and may affect many users. Changes that
    are not backward compatible are called “breaking changes”. For example, changing
    the name of one of the modules in your package would be a breaking change; if
    users upgraded to your new package, any code they’d written using the old module
    name would no longer work, and they would have to change it.


    Most of the time, you’ll be making patch and minor releases. We’ll discuss major
    releases, breaking changes, and how to deprecate package functionality (i.e.,
    remove it) more in **Section 7.5**.


    Even with the guidelines above, versioning a package can be a little subjective
    and requires you to use your best judgment. For example, small packages might
    make a patch release for each individual bug fixed or a minor release for each
    new feature added. In contrast, larger packages will often group multiple bug
    fixes into a single patch release or multiple features into a single minor release,
    because making a release for every individual change would result in an overwhelming
    and confusing amount of releases! **Table 7.1** shows some practical examples
    of major, minor, and patch releases made for the Python software itself. To formalize
    the circumstances under which different kinds of releases should be made, some
    developers create a “version policy” document for their package; the pandas version
    policy² is a good example of this.


    ### TABLE 7.1: Examples of major, minor, and patch releases of Python.


    | Release Type | Version Bump | Description |

    |---|---|---|

    | Major | 2.X.X -> 3.0.0 (December, 2008) | This release included breaking changes,
    e.g., print() became a function, integer division resulted a float rather than
    an integer, built-in objects like dictionaries and strings changed considerably,
    and many old features were removed. |

    | Minor | 3.8.X -> 3.9.0 (October, 2020) | New features and optimizations were
    added in this release, e.g., string methods to remove prefixes and suffixes (.removeprefix()/.removesuffix())
    were added, and a new parser was implemented for CPython (the engine that compiles
    and executes your Python code). |

    | Patch | 3.9.5 -> 3.9.6 (June, 2021) | This release contained bug and maintenance
    fixes, e.g., a confusing error message was updated in the str.format() method,
    and the version of pip bundled with Python downloads was updated from 21.1.2 ->
    21.1.3, and parts of the documentation were updated. |


    ## 7.2 Version bumping


    While we''ll discuss the full workflow for releasing a new version of your package
    in Section 7.3, we first want to discuss version bumping. That is, how to increment
    the version of your package when you''re preparing a new release. This can be
    done manually or automatically as we''ll show below.


    ### 7.2.1 Manual version bumping


    Once you''ve decided what the new version of your package will be (i.e., are you
    making a patch, minor, or major release) you need to update the package''s version
    number in your source code. For a poetry-managed project, that information is
    in the `pyproject.toml` file. Consider the `pyproject.toml` file of the pycounts
    package we developed in Chapter 3: How to package a Python, the top of which looks
    like this:


    ```

    [tool.poetry]

    name = "pycounts"

    version = "0.1.0"

    description = "Calculate word counts in a text file!"

    authors = ["Tomas Beuzen"]

    license = "MIT"

    readme = "README.md"


    ...rest of file hidden...

    ```


    Imagine we wanted to make a patch release of our package. We could simply change
    the version number manually in this file to "0.1.1", and many developers do take
    this manual approach. An alternative method is to use the `poetry version` command.
    The `poetry version` command can be used with the arguments `patch`, `minor`,
    or `major` depending on how you want to update the version of your package. For
    example, to make a patch release, we could run the following at the command line:


    > If you''re building the pycounts package with us in this book, you don''t have
    to run the below command, it is just for demonstration purposes. We''ll make a
    new version of pycounts later in this chapter.


    ```

    $ poetry version patch

    ```


    ```

    Bumping version from 0.1.0 to 0.1.1

    ```


    This command changes the version variable in the pyproject.toml file:


    ```

    [tool.poetry]

    name = "pycounts"

    version = "0.1.1"

    description = "Calculate word counts in a text file!"

    authors = ["Tomas Beuzen"]

    license = "MIT"

    readme = "README.md"


    ...rest of file hidden...

    ```


    ### 7.2.2 Automatic version bumping


    In this book, we''re interested in automating as much as possible of the packaging
    workflow. While the manual versioning approach described above in Section 7.2.1
    is certainly used by many developers, we can do things more efficiently! To automate
    version bumping, you''ll need to be using a version control system like Git. If
    you are not using version control for your package, you can skip to Section 7.3.


    Python Semantic Release (PSR)³ is a tool that can automatically bump version numbers
    based on keywords it finds in commit messages. The idea is to use a standardized
    commit message format and syntax, which PSR can parse to determine how to increment
    the version number. The default commit message format used by PSR is the Angular
    commit style⁴, which looks like this:


    ```

    <type>(optional scope): short summary in present tense


    (optional body: explains motivation for the change)


    (optional footer: note BREAKING CHANGES here, and issues to be closed)

    ```


    ¹ https://semver.org

    ² https://python-semantic-release.readthedocs.io/en/latest/

    ³ https://github.com/angular/angular.js/blob/master/DEVELOPERS.md#commit-message-format'
  mdcn: '## 7 发布与版本管理


    前面的章节重点介绍了如何从零开始开发一个Python包：创建Python源代码、开发测试框架、编写文档，然后通过PyPI（如果需要）在线发布。本章将介绍打包工作流程的下一步——更新你的包！


    在任何时间点，你的包的用户（包括你自己）都会在项目中安装一个特定版本的包。如果你更改了包的源代码，他们的代码可能会出错（想象一下，你更改了模块名称，或者移除了用户正在使用的函数参数）。为了解决这个问题，开发者为包的每个唯一状态分配一个唯一的版本号，并独立发布每个新版本。大多数时候，用户会希望使用你包的最新版本，但有时，他们需要使用与他们的项目兼容的旧版本。发布版本也是向用户传达你的包已发生变化（例如，修复了错误、添加了新功能等）的重要方式。


    在本章中，我们将逐步介绍创建和发布Python包新版本的过程。


    ## 7.1 版本编号


    版本管理是为你的包的不同版本添加唯一标识符的过程。你使用的唯一标识符可以是基于名称的，也可以是基于数字的，但大多数Python包使用语义化版本控制¹。在语义化版本控制中，版本号由三个整数A.B.C组成，其中A是“主”版本号，B是“次”版本号，C是“修订”版本号。软件的第一个版本通常从0.1.0开始，然后依次递增。我们称递增为“版本升级”，它包括将主版本号、次版本号或修订版本号加1，如下所示：


    - **修订**版本发布（0.1.0 -> 0.1.1）：修订版本发布通常用于错误修复，这些修复是向后兼容的。向后兼容性指的是你的包与其自身先前版本的兼容性。例如，如果一个用户正在使用你的包的v0.1.0版本，他们应该能够升级到v0.1.1，并且他们之前编写的任何代码仍然可以正常工作。即使修订版本发布很多，需要使用两位数（例如0.1.27）也是可以的。


    - **次**版本发布（0.1.0 -> 0.2.0）：次版本发布通常包含较大的错误修复或向后兼容的新功能，例如添加一个新函数。即使次版本发布很多，需要使用两位数（例如0.13.0）也是可以的。


    - **主**版本发布（0.1.0 -> 1.0.0）：1.0.0版本通常用于你的包的第一个稳定版本发布。此后，主版本发布用于不向后兼容且可能影响许多用户的更改。不向后兼容的更改称为“破坏性更改”。例如，更改你的包中某个模块的名称将是一个破坏性更改；如果用户升级到你的新包，他们使用旧模块名称编写的任何代码将不再有效，他们必须进行更改。


    大多数时候，你将进行修订版本和次版本发布。我们将在**第7.5节**中更详细地讨论主版本发布、破坏性更改以及如何弃用包功能（即移除它）。


    即使有上述指南，包的版本管理也可能有点主观，需要你运用最佳判断。例如，小包可能为每个修复的错误进行一次修订版本发布，或为每个添加的新功能进行一次次版本发布。相比之下，较大的包通常会将多个错误修复合并到一个修订版本发布中，或将多个功能合并到一个次版本发布中，因为为每个单独的更改都进行发布会导致发布数量过多且令人困惑！**表7.1**展示了Python软件本身进行的一些主版本、次版本和修订版本发布的实际示例。为了规范在何种情况下应进行不同类型的发布，一些开发者会为其包创建“版本策略”文档；pandas的版本策略²就是一个很好的例子。


    ### 表7.1：Python主版本、次版本和修订版本发布的示例。


    | 发布类型 | 版本升级 | 描述 |

    |---|---|---|

    | 主版本 | 2.X.X -> 3.0.0（2008年12月） | 此版本包含破坏性更改，例如，`print()`变成了一个函数，整数除法结果为浮点数而非整数，内置对象（如字典和字符串）发生了重大变化，并且移除了许多旧功能。
    |

    | 次版本 | 3.8.X -> 3.9.0（2020年10月） | 此版本添加了新功能和优化，例如，添加了用于移除前缀和后缀的字符串方法（`.removeprefix()`/`.removesuffix()`），并为CPython（编译和执行你的Python代码的引擎）实现了一个新的解析器。
    |

    | 修订版本 | 3.9.5 -> 3.9.6（2021年6月） | 此版本包含错误和维护修复，例如，更新了`str.format()`方法中一个令人困惑的错误消息，将Python下载中捆绑的pip版本从21.1.2更新到了21.1.3，并更新了部分文档。
    |


    ## 7.2 版本升级


    虽然我们将在第7.3节讨论发布包新版本的完整工作流程，但我们首先想讨论版本升级。也就是说，在准备新版本发布时，如何递增你的包的版本号。这可以手动完成，也可以自动完成，如下所示。


    ### 7.2.1 手动版本升级


    一旦你决定了包的新版本是什么（即，你是进行修订版本、次版本还是主版本发布），你就需要在源代码中更新包的版本号。对于使用poetry管理的项目，该信息位于`pyproject.toml`文件中。考虑我们在第3章：如何打包Python中开发的pycounts包的`pyproject.toml`文件，其顶部如下所示：


    ```

    [tool.poetry]

    name = "pycounts"

    version = "0.1.0"

    description = "Calculate word counts in a text file!"

    authors = ["Tomas Beuzen"]

    license = "MIT"

    readme = "README.md"


    ...rest of file hidden...

    ```


    假设我们想为我们的包进行一次修订版本发布。我们可以简单地在此文件中手动将版本号更改为"0.1.1"，许多开发者确实采用这种手动方法。另一种方法是使用`poetry
    version`命令。`poetry version`命令可以与参数`patch`、`minor`或`major`一起使用，具体取决于你希望如何更新包的版本。例如，要进行修订版本发布，我们可以在命令行运行以下命令：


    > 如果你正在和我们一起构建pycounts包，你不必运行下面的命令，它只是为了演示目的。我们将在本章后面为pycounts创建一个新版本。


    ```

    $ poetry version patch

    ```


    ```

    Bumping version from 0.1.0 to 0.1.1

    ```


    此命令更改了pyproject.toml文件中的version变量：


    ```

    [tool.poetry]

    name = "pycounts"

    version = "0.1.1"

    description = "Calculate word counts in a text file!"

    authors = ["Tomas Beuzen"]

    license = "MIT"

    readme = "README.md"


    ...rest of file hidden...

    ```


    ### 7.2.2 自动版本升级


    在本书中，我们希望尽可能地自动化打包工作流程。虽然第7.2.1节中描述的手动版本管理方法确实被许多开发者使用，但我们可以更高效地完成工作！要自动进行版本升级，你需要使用像Git这样的版本控制系统。如果你没有为你的包使用版本控制，可以跳到第7.3节。


    Python Semantic Release (PSR)³ 是一个工具，可以根据它在提交消息中找到的关键词自动升级版本号。其思想是使用标准化的提交消息格式和语法，PSR可以解析这些格式来确定如何递增版本号。PSR使用的默认提交消息格式是Angular提交风格⁴，如下所示：


    ```

    <type>(optional scope): short summary in present tense


    (optional body: explains motivation for the change)


    (optional footer: note BREAKING CHANGES here, and issues to be closed)

    ```


    ¹ https://semver.org

    ² https://python-semantic-release.readthedocs.io/en/latest/

    ³ https://github.com/angular/angular.js/blob/master/DEVELOPERS.md#commit-message-format'
