- md: "## 3.11 Summary and next steps\n\neach of these steps in more detail and continue\
    \ to add features to our pycounts package. Two key workflows we have yet to discuss\
    \ are:\n\n1. Releasing new versions of your package as you update it. We’ll discuss\
    \ this in **Chapter 7: Releasing and versioning**.\n2. Setting up continuous integration\
    \ and continuous deployment (CI/CD) — that is, automated pipelines for running\
