    \ normal at the top of the script like this:\n\n```\nfrom pycounts.pycounts import\
    \ count_words\nfrom pycounts.plotting import plot_words\nfrom pycounts.datasets\
    \ import get_flatland\nimport matplotlib\nfrom collections import Counter\nimport\
    \ pytest\n\neinstein_counts = Counter({'insanity': 1, 'is': 1, 'doing': 1,\n \
    \                          'the': 1, 'same': 1, 'thing': 1,\n                \
    \           'over': 2, 'and': 2, 'expecting': 1,\n                           'different':\
    \ 1, 'results': 1})\n\ndef test_count_words():\n    \"\"\"Test word counting from\
    \ a file.\"\"\"\n    expected = einstein_counts\n\n# ... rest of file hidden ...\n\
    ```\n\nThe short answer is that fixtures provide far more functionality and reliability\
    \ than manually defined variables. For example, each time you use a pytest fixture,\
    \ it triggers the fixture function, meaning that each test gets a fresh copy of\
    \ the data; you don't have to worry about accidentally mutating or deleting your\
    \ fixture during a test session. You can also control this behavior; should the\
    \ fixture be executed once per use, once per test module, or once per test session?\
    \ This can be helpful if the fixture is large or time-consuming to create. Finally,\
    \ we've only explored the use of fixtures as data for a test, but fixtures can\
    \ also be used to set up the environment for a test. For example, the directory\
    \ structure a test should run in, or the environment variables it should have\
    \ access to. pytest fixtures can help you easily set up these kinds of contexts,\
    \ as you can read more about in the pytest documentation⁶.\n\n# 5.4.2 Parameterizations\n\
    \nParameterizations can be useful for running a test multiple times using different\
    \ arguments. For example, recall in Section 5.3.2 that we added some code to pycounts's\
    \ plot_words() function that raises a TypeError if a user inputs an object other\
    \ than a Counter object to the function. We wrote a test to check that in our\
    \ test_pycounts.py file as follows:"
