    \ repository so we can access its contents (action: actions/checkout@v2<sup>20</sup>).\n\
    4. Install poetry (action: snok/install-poetry@v1<sup>21</sup>).\n5. Use poetry\
    \ to install pycounts (command: poetry install).\n6. Make a new release of pycounts\
    \ (command: semantic-release publish, this uses the Python Semantic Release (PSR)<sup>22</sup>\
    \ tool which we described in Section 7.2.2 and will describe again below).\n7.\
    \ Upload new release to TestPyPI (action: pypa/gh-action-pypi-publish@release/v1<sup>23</sup>).\n\
    8. Test that the new package version installs successfully from TestPyPI (command:\
    \ pip install).\n9. Upload new release to PyPI (action: pypa/gh-action-pypi-publish@release/v1<sup>24</sup>).\n\
    \nSteps 1 to 5 are the same as we set up previously for our CI workflow, so we\
    \ can just copy and paste them into our “cd” job as below. The only new code here\
    \ is that we specify the input parameter fetch-depth: 0 for the actions/checkout@v2<sup>25</sup>\
    \ action. This input parameter will allow the PSR tool to access the full history\
    \ of commits in our repository, so that it can determine how to bump the package’s\
    \ version. Without this parameter, PSR can only access the single most recent\
    \ commit message.\n\n```\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n \
    \ ci:\n    # ...\n    # CI steps hidden\n    # ...\n\n  cd:\n    # Only run this\
    \ job if the \"ci\" job passes\n    needs: ci\n\n    # Only run this job if new\
    \ work is pushed to \"main\"\n    if: github.event_name == 'push' && github.ref\
    \ == 'refs/heads/main'\n```\n\n<sup>20</sup> https://github.com/actions/checkout\n\
    <sup>21</sup> https://github.com/snok/install-poetry\n<sup>22</sup> https://python-semantic-release.readthedocs.io/en/latest/\n\
    <sup>23</sup> https://github.com/pypa/gh-action-pypi-publish\n<sup>24</sup> https://github.com/pypa/gh-action-pypi-publish\n\
