    \n2.  **Build documentation**: compile and render the manually written documentation\
    \ into an organized, coherent, and shareable format, such as HTML or PDF, using\
    \ the documentation generator tool sphinx. To help you understand what this means,\
    \ Fig. 6.1 shows an example of what the README document above looks like when\
    \ it’s “built”.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_162_0.png)\n\nFIGURE\
    \ 6.1: Example of HTML documentation generated by sphinx.\n\n3.  **Host documentation\
    \ online**: share documentation online so it can be easily accessed by anyone\
    \ with an internet connection, using a free service like Read the Docs³ or GitHub\
    \ Pages⁴. For example, the documentation we built for pycounts in **Section 3.8**\
