    \ subdirectory; and,\n- Tests in a `tests/` subdirectory.\n\nAn example structure\
    \ for a package called \"pycounts\" with two modules (\"moduleA\" and \"moduleB\"\
    ) is shown below. There's a lot of files here, but don't worry; packages are usually\
    \ created from pre-made templates, as we'll show in the next section. At this\
    \ point, we're just getting a bird's-eye view of package structure. We'll create\
    \ and explore each element in this structure as we make our way through this chapter.\n\
