    \ in **Chapter 8: Continuous integration and deployment**.\n\nBefore moving onto\
    \ the next chapter, let’s summarize a reference list of all the steps we took\
    \ to develop a Python package in this chapter:\n\n1. Create package structure\
    \ using cookiecutter (**Section 3.2.2**).\n\n```\n$ cookiecutter https://github.com/py-pkgs/py-pkgs-cookiecutter.git\n\
    ```\n\n2. (Optional) Put your package under version control (**Section 3.3**).\n\
    3. (Optional) Create and activate a virtual environment using conda (**Section\
    \ 3.5.1**).\n\n```\n$ conda create --name <your-env-name> python=3.9 -y\n$ conda\
    \ activate <your-env-name>\n```\n\n4. Add Python code to module(s) in the *src/*\
    \ directory (**Section 3.4**), adding dependencies as needed (**Section 3.6**).\n\
    \n```\n$ poetry add <dependency>\n```\n\n5. Install and try out your package in\
    \ a Python interpreter (**Section 3.5.2**).\n\n```\n$ poetry install\n```\n\n\
    6. (Optional) Write tests for your package in module(s) prefixed with *test_*\
    \ in the *tests/* directory. Add pytest as a development dependency to run your\
    \ tests (**Section 3.7.2**). Add pytest-cov as a development dependency to calculate\
    \ the coverage of your tests (Section 3.7.3).\n\n```\n$ poetry add --dev pytest\
    \ pytest-cov\n$ pytest tests/ --cov=<pkg-name>\n```\n\n7. (Optional) Create documentation\
    \ source files for your package (Section 3.8). Use sphinx to compile and generate\
    \ an HTML render of your documentation, adding the required development dependencies\
    \ (Section 3.8.4).\n\n```\n$ poetry add --dev myst-nb sphinx-autoapi sphinx-rtd-theme\n\
    $ cd docs\n$ make html\n$ cd ..\n```\n\n8. (Optional) Host documentation online\
    \ with Read the Docs<sup>50</sup> (Section 3.8.5).\n9. (Optional) Tag a release\
    \ of your package using Git and GitHub, or equivalent version control tools (Section\
    \ 3.9).\n10. Build sdist and wheel distributions for your package (Section 3.10.1).\n\
    \n```\n$ poetry build\n```\n\n11. (Optional) Publish your distributions to TestPyPI<sup>51</sup>\
    \ and try installing your package (Section 3.10.2).\n\n```\n$ poetry config repositories.test-pypi\
    \ https://test.pypi.org/legacy/\n$ poetry publish -r test-pypi\n$ pip install\
    \ --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple\
    \ pycounts\n```\n\n12. (Optional) Publish your distributions to PyPI<sup>52</sup>.\
    \ Your package can now be installed by anyone using pip (**Section 3.10.3**).\n\
    \n```\n$ poetry publish\n$ pip install <pkg-name>\n```\n\nThe above workflow uses\
    \ a particular suite of tools (e.g., conda, poetry, sphinx, etc.) to develop a\
    \ Python package. While there are other tools that can be used to help build Python\
    \ packages, the aim of this book is to give a high-level, practical, and efficient\
    \ introduction to Python packaging using modern tools, and this has influenced\
    \ our selection of tools in this chapter and book. However, the concepts and workflow\
    \ discussed here remain relevant to the Python packaging ecosystem, regardless\
    \ of the exact tools you use to develop your Python packages.\n\n## 4 Package\
    \ structure and distribution\n\n**Chapter 3: How to package a Python** provided\
    \ a practical overview of how to create, install, and distribute a Python package.\
    \ This chapter now goes into more detail about what a Python package actually\
    \ is, digging deeper into how packages are structured, installed, and distributed.\n\
    \nWe begin with a discussion of how modules and packages are represented in Python\
    \ and why they are used. We then discuss some more advanced package structure\
    \ topics, such as controlling the import behavior of a package and including non-code\
    \ files, like data. The chapter finishes with a discussion of what package distributions\
    \ are, how to build them, and how they are installed. Along the way, we'll demonstrate\
    \ key concepts by continuing to develop our pycounts package from the previous\
    \ chapter.\n\n### 4.1 Packaging fundamentals\n\nWe'll begin this chapter by exploring\
    \ some of the lower-level implementation details related to what packages are,\
    \ how they're structured, and how they're used in Python.\n\nAll data in a Python\
    \ program are represented by objects or by relations between objects. For example,\
    \ integers and functions are kinds of Python objects. We can find the type of\
    \ a Python object using the `type()` function. For example, the code below, run\
    \ in a Python interpreter, creates an integer object and a function object mapped\
    \ to the names `a` and `hello_world`, respectively:\n\n```\n>>> a = 1\n>>> type(a)\n\
    \nint\n```\n\n```\n>>> def hello_world(name):\n        print(f\"Hello world! My\
    \ name is {name}.\")\n>>> type(hello_world)\n```\n\nfunction\n\nThe Python object\
    \ important to our discussion of packages is the “module” object. A module is\
    \ an object that serves as an organizational unit of Python code. Typically, Python\
    \ code you want to reuse is stored in a file with a .py suffix and is imported\
    \ using the import statement. This process creates a module object with the same\
    \ name as the imported file (excluding the .py suffix), and from this object,\
    \ we can access the contents of the file.\n\nFor example, imagine we have a module\
    \ greetings.py in our current directory containing functions to print “Hello World!”\
    \ in English and Squamish (the Squamish people¹ are an indigenous people of modern-day\
    \ British Columbia, Canada):\n\n```\ndef hello_world():\n    print(\"Hello World!\"\
    )\n\ndef hello_world_squamish():\n    print(\"I chen tl'ik!\")\n```\n\nWe can\
    \ import that module using the import statement and can use the type() function\
    \ to verify that we created a module object, which has been mapped to the name\
    \ “greetings” (the name of the file):\n\n```\n>>> import greetings\n>>> type(greetings)\n\
    ```\n\nmodule\n\nWe call the module object an “organizational unit of code” because\
    \ the content of the module (in this case, the two “hello world” functions) can\
    \ be accessed via the module name and “dot notation”. For example:\n\n¹https://en.wikipedia.org/wiki/Squamish_people\n\
    \n```\n>>> greetings.hello_world()\n```\n\n```\n\"Hello World!\"\n```\n\n```\n\
    >>> greetings.hello_world_squamish()\n```\n\n```\n\"I chen tl'ik!\"\n```\n\nAt\
    \ this point in our discussion, it's useful to mention Python's namespaces. A\
    \ \"namespace\" in Python is a mapping from names to objects. From the code examples\
    \ above, we've added the names a (an integer), hello_world (a function), and greetings\
    \ (a module) to the current namespace and can use those names to refer to the\
    \ objects we created. The dir() function can be used to inspect a namespace. When\
    \ called with no arguments, dir() returns a list of names defined in the current\
    \ namespace:\n\n```\n>>> dir()\n```\n\n```\n['__annotations__', '__builtins__',\
    \ '__doc__', '__loader__',\n '__name__', '__package__', '__spec__', 'a', 'hello_world',\n\
    \ 'greetings']\n```\n\nIn the output above, we can see the names of the three\
    \ objects we have defined in this section: a, hello_world, and greetings. The\
    \ other names bounded by double underscores are objects that were initialized\
    \ automatically when we started the Python interpreter and are implementation\
    \ details that aren't important to our discussion here but can be read about in\
    \ the Python documentation².\n\nNamespaces are created at different moments, have\
    \ different lifetimes, and can be accessed from different parts of a Python program\
    \ — but these details digress from our discussion, and we point interested readers\
    \ to the Python documentation³ to learn more. The important point to make here\
    \ is that when a module is imported using the import statement, a module object\
    \ is created and it has its own namespace containing the names of the Python objects\
    \ defined in the modules. For example, when we imported the greetings.py file\
    \ earlier, we created a greetings module object and namespace containing the names\n\
    \n²https://docs.python.org/3/reference/executionmodel.html?highlight=__builtins__#execution-model\n\
    ³https://docs.python.org/3/tutorial/classes.html#python-scopes-and-namespaces"
  mdcn: "## 3.11 总结与后续步骤\n\n我们将更详细地探讨上述每个步骤，并继续为我们的 pycounts 包添加功能。我们尚未讨论的两个关键工作流程是：\n\
    \n1.  随着包的更新发布新版本。我们将在**第7章：发布与版本控制**中讨论此内容。\n2.  设置持续集成和持续部署（CI/CD）——即用于运行测试、构建文档和部署包的自动化流水线。我们将在**第8章：持续集成与部署**中讨论\
    \ CI/CD。\n\n在进入下一章之前，让我们总结一下本章中开发 Python 包所采取的所有步骤的参考清单：\n\n1.  使用 cookiecutter\
