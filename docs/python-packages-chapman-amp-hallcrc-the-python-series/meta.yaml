    \n### 6.2.1 README\n\nREADME文件是你的包的“地图”。它通常是用户与你的包交互时首先看到和阅读的内容，应提供高层级信息，例如：你的包是做什么的、如何安装、使用简要演示、谁创建了该包、其许可证是什么以及如何为其做贡献。README是你的包的“入口”。没有它，用户将不知从何开始。\n\
