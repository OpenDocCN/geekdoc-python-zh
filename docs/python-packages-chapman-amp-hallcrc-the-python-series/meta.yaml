    Sphinx natively supports reStructuredText<sup>22</sup>, but many developers prefer
    to work in Markdown (as we do in this book). The syntax shown above in *index.md*
    is a flavor of Markdown known as Markedly Structured Text (MyST)<sup>23</sup>.
    MyST is based on Markdown but with additional syntax options inspired by reStructuredText
    and compatible for use with sphinx. For example, the {include} syntax specifies
    that we want the *index.md* landing page to include the content of the *README.md*
    in our package''s root directory (think of it as a copy-paste operation).


    The {toctree} syntax defines what documents will be listed in the table of contents
    (ToC) on the left-hand side of **Fig. 6.6**. The argument :maxdepth: 1 indicates
    how many heading levels the ToC should include, and :hidden: specifies that the
    ToC should only appear in the side bar and not in the index page itself. The ToC
    then lists the documents we want to include and link to in our documentation.
    "example.ipynb" is the Jupyter Notebook we showed in section **Section 6.2.6**.
    sphinx doesn''t support relative links in a ToC, so to include the documents *CHANGELOG.md*,
