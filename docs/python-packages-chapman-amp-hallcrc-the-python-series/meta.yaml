  md: 'have previously installed the Anaconda or Miniconda distribution feel free
    to skip to **Section 2.2.2**.


    If you are unfamiliar with Miniconda and Anaconda, they are distributions of Python
    that also include the conda package and environment manager, and a number of other
    useful packages. The difference between Anaconda and Miniconda is that Anaconda
    installs over 250 additional packages (many of which you might never use), while
    Miniconda is a much smaller distribution that comes bundled with just a few key
    packages; you can then install additional packages as you need them using the
    command conda install.


    conda is a piece of software that supports the process of installing and updating
    software (like Python packages). It is also an environment manager, which is the
    key function we''ll be using it for in this book. An environment manager helps
    you create "virtual environments" on your machine, where you can safely install
    different packages and their dependencies in an isolated location. Installing
    all the packages you need in the same place (i.e., the system default location)
    can be problematic because different packages often depend on different versions
    of the same dependencies; as you install more packages, you''ll inevitably get
    conflicts between dependencies, and your code will start to break. Virtual environments
    help you compartmentalize and isolate the packages you are using for different
    projects to avoid this issue. You can read more about virtual environments in
    the conda documentation². While alternative package and environment managers exist,
    we choose to use conda in this book because of its popularity, ease-of-use, and
    ability to handle any software stack (not just Python).


    # 2.2.2 Install packaging software


    Once you''ve installed the Miniconda distribution, ensure that Python and conda
    are up to date by running the following command at the command line:


    ```

    $ conda update --all

    ```


    Now we''ll install the two main pieces of software we''ll be using to help us
    create Python packages in this book:


    +   1. poetry³: software that will help us build our own Python packages. poetry
    is under active development, thus we recommend referring to the official poetry
    documentation⁴ for detailed installation instructions and support.


    ²https://conda.io/projects/conda/en/latest/user-guide/concepts/environments.html

    ³https://python-poetry.org/

    ⁴https://python-poetry.org/docs/'
