  - "[PAGE 230]\n\n# 8.5.4 Testing continuous deployment\n\nWe've now set up our CD\
    \ workflow! Our final `.github/workflows/ci-cd.yml` file looks like this:\n\n\
    ```\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n  ci:\n    # ...\n    #\
    \ CI steps same as before\n    # ...\n\n  cd:\n    # Only run this job if the\
    \ \"ci\" job passes\n    needs: ci\n\n    # Only run this job if new work is pushed\
    \ to \"main\"\n    if: github.event_name == 'push' && github.ref == 'refs/heads/main'\n\
    \n    # Set up operating system\n    runs-on: ubuntu-latest\n\n    # Define job\
    \ steps\n    steps:\n      - name: Set up Python 3.9\n        uses: actions/setup-python@v2\n\
    \        with:\n          python-version: 3.9\n\n      - name: Check-out repository\n\
    \        uses: actions/checkout@v2\n        with:\n          fetch-depth: 0\n\n\
    \      - name: Install poetry\n        uses: snok/install-poetry@v1\n\n      -\
    \ name: Install package\n        run: poetry install\n\n      - name: Use Python\
    \ Semantic Release to prepare release\n        env:\n```"
