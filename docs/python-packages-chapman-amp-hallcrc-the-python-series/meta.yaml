    a version control system, you''ll need to do this step manually. The changes we
    made to pycounts, described in the section above, constitute a minor release (we
    added a new feature to load example data and made some significant changes to
    our package''s test framework). When we committed these changes in Section 4.4
    and Section 4.4, we did so with the following collection of commit messages:'
