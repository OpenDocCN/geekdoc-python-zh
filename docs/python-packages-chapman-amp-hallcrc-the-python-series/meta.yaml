    # 3.9 Tagging a package release with version control


    We have now created all the source files that make up version 0.1.0 of our `pycounts`
    package, including Python code, documentation, and tests — well done! In the next
    section, we’ll turn all these source files into a distribution package that can
    be easily shared and installed by others. But for those using version control,
    it’s helpful at this point to tag a release of your package’s repository. If you’re
    not using version control, you can skip to **Section 3.10**.


    Tagging a release means that we permanently “tag” a specific point in our repository’s
    history, and then create a downloadable “release” of all the files in our repository
    in the state they were in when the tag was made. It’s common to tag a release
    for each new version of your package, as we’ll discuss more in **Chapter 7: Releasing
    and versioning**.


    Tagging a release is a two-step process involving both Git and GitHub:


    +   1. Create a tag marking a specific point in a repository’s history using the
    command `git tag`.

    2. On GitHub, create a release of all the files in your repository (usually in
    the form of a zipped archive like `.zip` or `.tar.gz`) based on your tag. Others
    can then download this release if they wish to view or use your package’s source
    files as they existed at the time the tag was created.


    We’ll demonstrate this process by tagging a release of v0.1.0 of our `pycounts`
    package (it’s common to prefix a tag with “v” for “version”). First, we need to
    create a tag identifying the state of our repository at v0.1.0 and then push the
    tag to GitHub using the following `git` commands at the command line:'
