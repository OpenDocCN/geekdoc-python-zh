  md: '# 8 Continuous integration and deployment


    If you''ve gotten this far, you now have a working knowledge of how to create
    a fully-featured Python package! We went through quite a lot to get here: we learned
    about package structure, developed source code, created tests, wrote documentation,
    and learned how to release new versions of a package.


    As you continue to develop your package into the future it would be helpful to
    automate many of these workflows so you and your collaborators can focus more
    on writing code and less on the nuances of packaging and testing. This is where
    continuous integration (CI) and continuous deployment (CD) come in! CI/CD generally
    refers to the automated testing, building, and deployment of software. In this
    chapter, we''ll first introduce CI/CD and walk through how to set it up with the
    GitHub Actions service. After that, we''ll show how to set up CI/CD for a Python
    package, demonstrating concepts using the pycounts package we''ve been developing
    throughout this book.


    > This chapter requires basic familiarity with Git and GitHub or similar version
    control tools. To learn more about Git and GitHub, we recommend the following
    resources: *Happy Git and GitHub for the useR* (Bryan et al., 2021) and *Research
    Software Engineering with Python* (Irving et al., 2021).


    # 8.1 An introduction to CI/CD


    Continuous integration (CI) refers to the process of automatically evaluating
    your code as it is updated by yourself and contributors, to try and catch any
    potential issues your updates have caused. A CI workflow typically includes


    1 https://happygitwithr.com

    2 https://merely-useful.tech/py-rse/git-cmdline.html'
  merge: -1
  pgno: 205
- img_proc: true
  md: 'automatic execution of many of the steps we''ve seen throughout this book,
    such as running tests, calculating code coverage, and building documentation,
    among others.


    Continuous deployment (CD) is the process of automating the deployment of new
    versions of your software to e.g., PyPI, from changes that have made it through
    CI.


    CI/CD can automate the packaging workflows that we''ve done manually throughout
    this book and can ultimately save you time and help you release new versions of
    your package quickly. CI/CD also helps others contribute to your package, because
    the process of updating your package is automated and doesn''t depend on one person''s
    expert knowledge (i.e., yours) of how to make releases manually. Even if your
    package won''t be updated very often, setting up CI/CD is still beneficial because
    it means you don''t have to remember all the manual steps required to make a release
    of your package (which can be daunting and deter you from wanting to update and
    maintain your package).


    # 8.2 CI/CD tools


    You could manually write and execute a CI/CD workflow by, for example, writing
    scripts that execute all of the steps we''ve walked through in previous chapters
    (i.e., running tests, building documented, build and release distributions, etc.).
    However, this process is not efficient or scalable, and it does not work well
    if more than one person (i.e., you) is contributing to your code.


    It is therefore more common to use a CI/CD service to implement CI/CD. These services
    essentially do what we described above but in an automated manner; we define a
    workflow, which these services will automatically run at certain “trigger events”,
    which we can also define (for example, merging new code into the “main” branch
    of a GitHub repository might trigger the automatic deployment of a new version
    of the software).


    There are many CI/CD services out there — such as GitHub Actions³, Travis CI⁴,
    and CircleCi⁵. We''ll be using GitHub Actions in this chapter, which is a service
    for executing CI/CD workflows for software stored in a GitHub repository. We''ll
    introduce how to use GitHub Actions in the next section.


    ³https://docs.github.com/en/actions

    ⁴https://www.travis-ci.com

    ⁵https://circleci.com'
