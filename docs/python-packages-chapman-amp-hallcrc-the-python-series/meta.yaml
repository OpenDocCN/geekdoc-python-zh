    \ version of the type of data the function will typically process.\n2. The *actual*\
    \ result that the code produces given the fixture.\n3. The *expected* result of\
    \ the test, which is compared to the *actual* result, typically using an assert\
    \ statement.\n\nThe `test_count_words()` function of our `pycounts` package is\
    \ an example of a unit test. Recall that our `count_words()` function can be used\
    \ to calculate words counts in a text file. To test it, we created a small, sample\
