  md: "# 8.5 Setting up continuous deployment\n\n```\nGH_TOKEN: ${{ secrets.GITHUB_TOKEN\
    \ }}\nrun: |\n    git config user.name github-actions\n    git config user.email\
    \ github-actions@github.com\n    poetry run semantic-release publish\n\n- name:\
    \ Publish to TestPyPI\n  uses: pypa/gh-action-pypi-publish@release/v1\n  with:\n\
    \    user: __token__\n    password: ${{ secrets.TEST_PYPI_API_TOKEN }}\n    repository_url:\
    \ https://test.pypi.org/legacy/\n\n- name: Test install from TestPyPI\n  run:\
    \ |\n    pip install \\n    --index-url https://test.pypi.org/simple/ \\n    --extra-index-url\
    \ https://pypi.org/simple \\n    pycounts\n\n- name: Publish to PyPI\n  uses:\
    \ pypa/gh-action-pypi-publish@release/v1\n  with:\n    user: __token__\n    password:\
    \ ${{ secrets.PYPI_API_TOKEN }}\n```\n\nWe're now ready to test out our full CI/CD\
    \ workflow! Let's go ahead and commit our new workflow file and our *pyproject.toml*\
    \ file (which we changed when we added the configuration options for PSR) to version\
    \ control and push it to GitHub. This will trigger our CI/CD workflow because\
    \ we configured it to run when someone pushes to the \"main\" branch of our repository.\
    \ For the sake of example, we'll include the \"feat\" keyword in our commit message\
    \ to trigger PSR to make a minor release of our package from these changes.\n\n\
    > We described what keywords trigger particular version bumps in **Section 7.2.2**,\
    \ but note that even if no keywords were present in any commits, we configured\
    \ PSR in **Section 8.5.2** to make a patch release by default."
