  md: "# 8.4 Setting up continuous integration\n\nTo do this, we could print the coverage\
    \ to our runner’s build log, but having the coverage buried in those logs is not\
    \ overly helpful. Instead, it’s common to use a service like Codecov<sup>13</sup>\
    \ to track our code coverage for us. To set up Codecov, first create a Codecov\
    \ account by linking it with your GitHub account, as described in the Codecov\
    \ documentation<sup>14</sup> (Codecov also supports GitLab and Bitbucket). Once\
    \ you’ve done this, Codecov automatically syncs with all the repositories that\
    \ you have access to. Now, to use Codecov to automatically track code coverage\
    \ as part of our CI workflow we can use the action they’ve created called codecov/codecov-action@v2<sup>15</sup>,\
    \ as below:\n\n> If your GitHub repository is private, you’ll need to provide\
    \ an “upload token” to allow Codecov to access it as described in the Codecov\
    \ documentation<sup>16</sup>.\n\n```\n- name: Use Codecov to track coverage\n\
    \  uses: codecov/codecov-action@v2\n  with:\n    files: ./coverage.xml  # coverage\
    \ report\n```\n\nWith this step in our workflow, coverage will automatically be\
    \ recorded for each new proposed change to our code. Codecov can show you whether\
    \ coverage has increased or decreased, by how much, and will link to relevant\
    \ areas of your package’s source code. This information will automatically appear\
    \ on any pull request someone makes to the main branch on GitHub, or it can be\
    \ viewed anytime on the Codecov website; for example, Fig. 8.4 shows the coverage\
    \ dashboard for a package called pypkgs, where coverage decreased significantly\
    \ after the most recent commit.\n\n# 8.4.4 Build documentation\n\nThe final step\
    \ we’ll add to our CI workflow will be to check that our documentation builds\
    \ without issue. We’ll use the same make html command we’ve used throughout this\
    \ book to build documentation with sphinx to do this:\n\n<sup>13</sup> https://codecov.io/\n\
    <sup>14</sup> https://docs.codecov.com/docs\n<sup>15</sup> https://github.com/marketplace/actions/codecov\n\
    <sup>16</sup> https://github.com/marketplace/actions/codecov"
