    \ few key steps to go through when creating a new version of your package:\n\n\
    +   1. Document what's changed in the *CHANGELOG.md*.\n2. Bump the package version\
    \ number.\n3. Tag a new release on GitHub.\n4. Build a new sdist and wheel.\n\n\
    In **Section 7.2.2**, we introduced the Python Semantic Release (PSR)<sup>26</sup>\
    \ tool, which can automatically bump your package's version number based on keywords\
    \ it finds in commit messages.\n\nHowever, PSR can do more than this! In fact,\
    \ it can do all the steps we list above. In **Section 7.2.2**, we saw how PSR\
    \ is configured using a table called [tool.semantic_release] in the *pyproject.toml*.\
    \ To configure it to perform all the steps above, we need to add a few keys to\
