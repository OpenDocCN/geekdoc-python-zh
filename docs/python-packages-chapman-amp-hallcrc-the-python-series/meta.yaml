    Now that we have a text file to work with, we can go back to developing our word-counting
    workflow. To open `zen.txt` in Python, we can use the `open()` function to open
    the file and then the `.read()` method to read its contents as a Python string.
    The code below, run in a Python interpreter, saves the contents of `zen.txt` as
    a string in the variable `text`:


    ```

    >>> with open("zen.txt") as file:

    ...     text = file.read()

