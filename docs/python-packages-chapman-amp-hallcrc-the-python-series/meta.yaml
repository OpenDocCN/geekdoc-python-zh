    the viewpoint of a developer and a user.

    2. **Better code structure:** writing tests forces you to structure and organize
    your code so that it''s easier to test and understand.

    3. **Easier development:** formal tests will help you and others add features
    to your code without breaking tried-and-tested existing functionality.


    **Section 3.7** briefly introduced testing in Python package development. This
    chapter now goes into more detail about how to write tests, different types of
    tests (unit tests, regression tests, integration tests), and code coverage.


    # ### 5.1 Testing workflow


    In general, the goal of testing is to check that your code produces the results
    you expect it to. You probably already conduct informal tests of your code in
    your current workflow. In a typical workflow, we write code, run it in a Python
    session to see if it''s working as we expect, make changes, repeat. This is sometimes
    called “manual testing” or “exploratory testing” and is common in the early stages
    of development of your code. But when developing code you intend to package up,
    reuse, and potentially share with others, you''ll need to test it in a more formal
    and reproducible way.


    In Python, tests are usually written using an `assert` statement, which checks
    the truth of a given expression, and returns a user-defined error message if the
    expression is false. To demonstrate this process, imagine we want to create a
    function called `count_letters()` that counts the number of letters in a string.
    We come up with the following code as a first version of that function:'
  - "[PAGE 132]\n\n```\ndef count_letters(text):\n    \"\"\"Count letters in a string.\"\
    \"\"\n    return len(text)\n```\n\nWe can write some tests for that function using\
