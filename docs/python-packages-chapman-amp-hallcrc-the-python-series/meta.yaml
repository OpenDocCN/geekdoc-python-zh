    them in **Section 3.8.1**. But it''s first helpful to understand the big-picture
    documentation workflow and what we''re aiming to build.


    The typical workflow for documenting a Python package consists of three steps:


    +   1. **Write documentation**: manually write the documentation source files
    that will support your package, such as those listed in Table 6.1. These are usually
    written in a plain-text format like Markdown<sup>1</sup> (.md), reStructuredText<sup>2</sup>
    (.rst), which we explain in **Section 3.8.1**. Below we show an example of the
    *README.md* file we wrote for the pycounts package we developed in **Chapter 3:
    How to package a Python**.


