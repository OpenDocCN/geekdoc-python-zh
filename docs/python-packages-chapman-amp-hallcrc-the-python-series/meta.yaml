    # Preface


    Python packages are the fundamental units of shareable code in Python. Packages
    make it easy to organize, reuse, and maintain your code, as well as share it between
    projects, with your colleagues, and with the wider Python community. *Python Packages*
    is an open-source book that describes modern and efficient workflows for creating
    Python packages. The focus of this book is overwhelmingly practical; we will demonstrate
    methods and tools you can use to develop and maintain packages quickly, reproducibly,
    and with as much automation as possible — so you can focus on writing and sharing
    code!


    # Why read this book?


    Despite their importance, packages can be difficult to understand and cumbersome
    to create for beginners and seasoned developers alike. This book aims to describe
    the packaging process at an accessible and practical level for data scientists,
    developers, and programmers. Along the way, we''ll develop a real Python package
    and will explore all the key elements of Python packaging, including: creating
    a package file and directory structure, when and why to write tests and documentation,
    and how to maintain and update your package with the help of automated continuous
    integration and continuous deployment (CI/CD) pipelines.


    By reading this book, you will:


    +   - Understand what Python packages are, and when and why you should use them.

    - Be able to build your own Python package from scratch.

    - Learn how to document your Python code and packages.

    - Write software tests for your code and automate them.

    - Learn how to release your package on the Python Package Index (PyPI) and discover
    best practices for updating and versioning your code.

    - Implement CI/CD workflows to build, test, and deploy your package automatically.

    - Get tips on Python coding style, best-practice packaging workflows, and other
    useful development tools.'
  - '[PAGE 16]


    # Structure of the book


    **Chapter 1: Introduction** first gives a brief introduction to packages in Python
    and why you should know how to make them.


    **Chapter 2: System setup** describes how to set up your development environment
    to develop packages and follow the examples in this book.


    In **Chapter 3: How to package a Python**, we develop an example package from
    beginning-to-end as a practical demonstration of the key steps involved in the
    packaging process. This chapter forms the foundation of the book and will act
    as a reference sheet for readers creating packages in the future.


    The remaining chapters then go into more detail about each step in this process,
    organized roughly in their order in the workflow:


    +   - **Chapter 4: Package structure and distribution**

    - **Chapter 5: Testing**

    - **Chapter 6: Documentation**

    - **Chapter 7: Releasing and versioning**

    - **Chapter 8: Continuous integration and deployment**


    # Assumptions


    While this book aims to introduce Python packaging at a beginner level, we assume
    readers have basic familiarity with the concepts listed in Table 0.1:


    **TABLE 0.1:** Concepts this book assumes readers have basic familiarity with.


