    # 3.7.3 Code coverage


    A good test suite will contain tests that check as much of your package’s code
    as possible. How much of your code your tests actually use is called “code coverage”.
    The simplest and most intuitive measure of code coverage is line coverage. It
    is the proportion of lines of your package’s code that are executed by your tests:


    $$coverage = \frac{lines\ executed}{total\ lines} * 100\%$$


    There is a useful extension to pytest called pytest-cov, which we can use to calculate
    coverage. First, we’ll use poetry to add pytest-cov as a development dependency
    of our pycounts package:


    ```

    $ poetry add --dev pytest-cov

    ```


    We can calculate the line coverage of our tests by running the following command,
    which tells pytest-cov to calculate the coverage our tests have of our pycounts
    package:


