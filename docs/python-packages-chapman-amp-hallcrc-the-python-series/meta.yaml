    \ 8.5 所示：\n\n我们可以通过单击“ci”作业来查看构建日志，如图 8.6 所示：\n\n每当有人向主分支进行推送或拉取请求时，此工作流都会触发。现在，你或你的协作者不必担心记住所有这些步骤或手动运行它们！在下一节中，我们将把这种自动化提升到一个新的水平，并设置一个工作流，以便在提出的更改通过\
