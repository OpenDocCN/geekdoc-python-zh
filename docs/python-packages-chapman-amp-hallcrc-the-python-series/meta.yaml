    \ docstring hidden...\n    \"\"\"\n    warnings.warn(\"This function will be deprecated\
    \ in v1.0.0.\",\n                  FutureWarning)\n\n    with resources.path(\"\
    pycounts.data\", \"flatland.txt\") as f:\n        data_file_path = f\n    return\
    \ data_file_path\n```\n\nIf we were to try and use this function now, we would\
    \ see the FutureWarning printed to our output:\n\n```\n>>> from pycounts.datasets\
    \ import get_flatland\n>>> flatland_path = get_flatland()\n```\n\n> FutureWarning:\
    \ This function will be deprecated in v1.0.0.\n\nA few other things to think about\
    \ when making breaking changes:\n\n+   - If you're changing a function significantly,\
    \ consider keeping both the legacy version (with a deprecation warning) and new\
    \ version of the function for a few releases to help users make a smoother transition\
    \ to using the new function.\n- If you're deprecating a lot of code, consider\
    \ doing it in small increments over multiple releases.\n- If your breaking change\
    \ is a result of one of your package's dependencies changing, it is often better\
    \ to warn your users that they require a newer version of a dependency rather\
    \ than immediately making it a required dependency of your package.\n- Documentation\
    \ is key! Don't be afraid to be verbose about documenting breaking changes in\
    \ your package's documentation and changelog."
