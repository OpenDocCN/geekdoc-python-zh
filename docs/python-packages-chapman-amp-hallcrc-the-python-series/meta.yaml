    \n回想一下，我们使用 `pytest` 作为 `pycounts` 包的测试框架。它被列为包的开发依赖项，因此在执行 `poetry install` 时，它已经安装在我们的运行器上（来自“步骤5”）。因此，我们只需要向工作流添加一个新步骤，其中包含运行\
