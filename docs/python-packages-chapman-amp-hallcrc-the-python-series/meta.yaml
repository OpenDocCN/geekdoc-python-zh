    # 8.6 Summary


    In this chapter, we created CI/CD workflows for our pycounts package. What we''ve
    shown here is just one example and one set of tools for implementing CI/CD — but
    after reading this chapter, the hope is that you can appreciate the utility of
    CI/CD and the kinds of workflows that you can set up for your packages in the
    future.


    It''s important to note that when using version control in this book, we''ve been
    directly modifying the main branch of our repository. However, changes to your
    package are more typically made on branches. Branches isolate your changes so
    you can develop your package without affecting the existing, stable version. Only
    when you''re happy with your changes and they''ve passed CI, do you merge them
    into the existing source and trigger a CD workflow (if it exists). In collaborative
    environments, this is typically done via a “pull request”, which you can read
    more about in the GitHub documentation[^39]. Open-source projects are built off
    pull requests; go visit your favorite Python


    [^39]: https://docs.github.com/en/github/collaborating-with-pull-requests/proposing-changes-to-your-work-with-pull-requests/about-pull-requests'
