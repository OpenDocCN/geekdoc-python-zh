    The `.readthedocs.yml` file that `py-pkgs-cookiecutter` created for us in the
    root directory of our Python package contains the configuration settings necessary
    for Read the Docs to properly build our documentation. It specifies what version
    of Python to use and tells Read the Docs that our documentation requires the extra
    packages specified in `pycounts/docs/requirements.txt` to be generated correctly.


    # 3.9 Tagging a package release with version control


    We have now created all the source files that make up version 0.1.0 of our `pycounts`
    package, including Python code, documentation, and tests — well done! In the next
    section, we’ll turn all these source files into a distribution package that can
    be easily shared and installed by others. But for those using version control,
    it’s helpful at this point to tag a release of your package’s repository. If you’re
    not using version control, you can skip to **Section 3.10**.


    Tagging a release means that we permanently “tag” a specific point in our repository’s
    history, and then create a downloadable “release” of all the files in our repository
    in the state they were in when the tag was made. It’s common to tag a release
    for each new version of your package, as we’ll discuss more in **Chapter 7: Releasing
    and versioning**.


    Tagging a release is a two-step process involving both Git and GitHub:


    +   1. Create a tag marking a specific point in a repository’s history using the
    command `git tag`.

    2. On GitHub, create a release of all the files in your repository (usually in
    the form of a zipped archive like `.zip` or `.tar.gz`) based on your tag. Others
    can then download this release if they wish to view or use your package’s source
    files as they existed at the time the tag was created.


    We’ll demonstrate this process by tagging a release of v0.1.0 of our `pycounts`
    package (it’s common to prefix a tag with “v” for “version”). First, we need to
    create a tag identifying the state of our repository at v0.1.0 and then push the
    tag to GitHub using the following `git` commands at the command line:'
- md: "## 3.9 Tagging a package release with version control\n\n```\n$ git tag v0.1.0\n\
    $ git push --tags\n```\n\nNow if you go to the `pycounts` repository on GitHub\
    \ and navigate to the “Releases” tab, you should see a tag like that shown in\
    \ [Fig. 3.12](#fig-3-12).\n\n![](img/d3840bdab18c2309faf9de63e70c539d_93_0.png)\n\
    \n**FIGURE 3.12:** Tag of v0.1.0 of pycounts on GitHub.\n\nTo create a release\
    \ from this tag, click “Draft a new release”. You can then identify the tag from\
    \ which to create the release and optionally add some additional details about\
    \ the release as shown in [Fig. 3.13](#fig-3-13).\n\nAfter clicking “Publish release”,\
    \ GitHub will automatically create a release from your tag, including compressed\
    \ archives of your code in `.zip` and `.tar.gz` format, as shown in [Fig. 3.14](#fig-3-14).\n\
    \nWe’ll talk more about making new versions and releases of your package as you\
    \ update it (e.g., modify code, add features, fix bugs, etc.) in **Chapter 7:\
    \ Releasing and versioning**.\n\n> People with access to your GitHub repository\
    \ can actually `pip install` your package directly from the repository using your\
    \ tags. We talk more about that in **Section 4.3.4**.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_94_0.png)\n\
    \n**FIGURE 3.13:** Making a release of v0.1.0 of pycounts on GitHub.\n\n## 3.10\
    \ Building and distributing your package\n\n### 3.10.1 Building your package\n\
    \nRight now, our package is a collection of files and folders that is difficult\
    \ to share with others. The solution to this problem is to create a “distribution\
    \ package”. A distribution package is a single archive file containing all the\
    \ files and information necessary to install a package using a tool like pip.\
    \ Distribution packages are often called “distributions” for short and they are\
    \ how packages are shared in Python and installed by users, typically with the\
    \ command `pip install <some-package>`.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_95_0.png)\n\
    \n**FIGURE 3.14:** Release of v0.1.0 of pycounts on GitHub.\n\nThe main types\
    \ of distributions in Python are source distributions (known as “sdists”) and\
    \ wheels. sdists are a compressed archive of all the source files, metadata, and\
    \ instructions needed to construct an installable version of your package. To\
    \ install from an sdist, a user needs to download the sdist, extract its contents,\
    \ and then use the build instructions to build and finally install the package\
    \ on their computer.\n\nIn contrast, wheels are pre-built versions of a package.\
    \ They are built on the developer’s machine before sharing with users. They are\
    \ the preferred distribution format because a user only needs to download the\
    \ wheel and move it to the location on their computer where Python searches for\
    \ packages; no build step is required.\n\n`pip install` can handle installation\
    \ from either an sdist or a wheel, and we'll discuss these topics in much more\
    \ detail in Section 4.3. What you need to know now is that when distributing a\
    \ package it's common to create both sdist and wheel distributions. We can easily\
    \ create an sdist and wheel of a package with poetry using the command `poetry\
    \ build`. Let's do that now for our pycounts package by running the following\
    \ command from our root package directory:\n\n```\n$ poetry build\n```\n\n```\n\
    Building pycounts (0.1.0)\n - Building sdist\n - Built pycounts-0.1.0.tar.gz\n\
    \ - Building wheel\n - Built pycounts-0.1.0-py3-none-any.whl\n```\n\nAfter running\
    \ this command, you'll notice a new directory in your package called `dist/`:\n\
    \n```\npycounts\n├── .readthedocs.yml\n├── CHANGELOG.md\n├── CONDUCT.md\n├── CONTRIBUTING.md\n\
    ├── dist\n│   ├── pycounts-0.1.0-py3-none-any.whl  <- wheel\n│   └── pycounts-0.1.0.tar.gz\
    \            <- sdist\n├── docs\n│   └── ...\n├── LICENSE\n├── poetry.lock\n├──\
    \ pyproject.toml\n├── README.md\n├── src\n│   └── ...\n└── tests\n    └── ...\n\
    ```\n\nThose two new files are the sdist and wheel for our pycounts package. A\
    \ user could now easily install our package if they had one of these distributions\
    \ by using `pip install`. For example, to install the wheel (the preferred distribution\
    \ type), you could enter the following in a terminal:\n\n```\n$ cd dist/\n$ pip\
    \ install pycounts-0.1.0-py3-none-any.whl\n```\n\n```\nProcessing ./pycounts-0.1.0-py3-none-any.whl\n\
    ...\nSuccessfully installed pycounts-0.1.0\n```\n\nTo install using the sdist,\
    \ you would have to unpack the sdist archive before running `pip install`. The\
    \ procedure for this varies depending on your specific operating system. For example,\
    \ on Mac OS, the command line tool `tar` with argument `x` (extract the input\
    \ file), `z` (gunzip the input file), `f` (apply operations to the provided input\
    \ file) can be used to unpack the sdist:\n\n```\n$ tar xzf pycounts-0.1.0.tar.gz\n\
    $ pip install pycounts-0.1.0/\n```\n\n```\nProcessing ./pycounts-0.1.0-py3-none-any.whl\n\
    \  Installing build dependencies ... done\n  Getting requirements to build wheel\
    \ ... done\n  Preparing wheel metadata ... done\n...\nSuccessfully built pycounts\n\
    Successfully installed pycounts-0.1.0\n```\n\nNote in the output above how installing\
    \ from an sdist requires a build step prior to installation. The sdist is first\
    \ built into a wheel, which is then installed. For those interested, we discuss\
    \ the nuances of building and installing packages from sdists and wheels in [Section\
    \ 4.3](#section-4.3).\n\nCreating a distribution for our package is most useful\
    \ if we make it available on an online repository like the Python Package Index\
    \ (PyPI), the official online software repository for Python. This would allow\
    \ users to simply run `pip install pycounts` to install our package, without needing\
    \ the sdist or wheel files locally, and we'll do this in the next section. But\
    \ even if you don't intend to share your package, it can still be useful to build\
    \ and install distributions for two reasons:\n\n1.  A distribution is a self-contained\
    \ copy of your package's source files that's easy to move around and store on\
    \ your computer. It makes it easy to retain distributions for different versions\
    \ of your package, so that you can re-use or share them if you ever need to.\n\
    2.  Recall that poetry installs package in \"editable mode\", such that a link\
    \ to the package's location is installed, rather than an independent distribution\
    \ of the package itself. This is useful for *development purposes*, because it\
    \ means that any changes to the source code will be immediately reflected when\
    \ you next import the package, without the need to `poetry install` again. However,\
    \ for *users* of your package (including yourself using your package in other\
    \ projects), it is often better to install a “non-editable” version of the package\
    \ (the default behavior when you `pip install` an sdist or wheel) because a non-editable\
    \ installation will remain stable and immune to any changes made to the source\
    \ files on your computer.\n\n### 3.10.2 Publishing to TestPyPI\n\nAt this point,\
    \ we have distributions of `pycounts` that we want to share with the world by\
    \ publishing to PyPI<sup>47</sup>. However, it is good practice to do a “dry run”\
    \ and check that everything works as expected by submitting to TestPyPI<sup>48</sup>\
    \ first. `poetry` has a `publish` command, which we can use to do this, however\
    \ the default behavior is to publish to PyPI. So we need to add TestPyPI to the\
    \ list of repositories `poetry` knows about using the following command:\n\n```\n\
    $ poetry config repositories.test-pypi https://test.pypi.org/legacy/\n```\n\n\
    To publish to TestPyPI we can use `poetry publish` (you will be prompted for your\
    \ username and password for TestPyPI — which we signed up for in **Section 2.3**):\n\
    \n```\n$ poetry publish -r test-pypi\n```\n\n```\nUsername: TomasBeuzen\nPassword:\n\
    Publishing pycounts (0.1.0) to test-pypi\n - Uploading pycounts-0.1.0-py3-none-any.whl\
    \ 100%\n - Uploading pycounts-0.1.0.tar.gz 100%\n```\n\nRather than entering your\
    \ username and password every time you want to publish a distribution to TestPyPI\
    \ or PyPI, you can configure an API token as described in the PyPI documentation<sup>49</sup>.\n\
    \nNow we should be able to visit our package on TestPyPI. The URL for our pycounts\
    \ package is: [https://test.pypi.org/project/pycounts/](https://test.pypi.org/project/pycounts/).\
    \ We can try installing our package using pip from the command line with the following\
    \ command:\n\n```\n$ pip install --index-url https://test.pypi.org/simple/ \\\n\
    \    --extra-index-url https://pypi.org/simple \\\n    pycounts\n```\n\nBy default\
    \ `pip install` will search PyPI for the named package. However, we want to search\
    \ TestPyPI because that is where we uploaded our package. The argument `--index-url`\
    \ points pip to the TestPyPI index. However, it's important to note that not all\
    \ developers upload their packages to TestPyPI; some only upload them directly\
    \ to PyPI. If your package depends on packages that are not on TestPyPI you can\
    \ tell pip to try and look for them on PyPI instead. To do that, you can use the\
    \ argument `--extra-index-url` as we do in the command above.\n\n### 3.10.3 Publishing\
    \ to PyPI\n\nIf you were able to upload your package to TestPyPI and install it\
    \ without error, you're ready to publish your package to PyPI. You can publish\
    \ to PyPI using the `poetry publish` command without any arguments:\n\n```\n$\
    \ poetry publish\n```\n\nYour package will then be available on PyPI (e.g., [https://pypi.org/project/pycounts/](https://pypi.org/project/pycounts/))\
    \ and can be installed by anyone using pip:\n\n```\n$ pip install pycounts\n```\n\
    \n## 3.11 Summary and next steps\n\nThis chapter provided a practical overview\
    \ of the key steps required to generate a fully-featured Python package. In the\
    \ following chapters, we'll explore\n\n<sup>49</sup> [https://pypi.org/help/#apitoken](https://pypi.org/help/#apitoken)"
  mdcn: "## 3.9 使用版本控制为软件包发布打标签\n\n```\n$ git tag v0.1.0\n$ git push --tags\n```\n\
    \n现在，如果你前往 GitHub 上的 `pycounts` 仓库并导航到“Releases”标签页，你应该能看到一个类似 [图 3.12](#fig-3-12)\
    \ 所示的标签。\n\n![](img/d3840bdab18c2309faf9de63e70c539d_93_0.png)\n\n**图 3.12：**\
    \ GitHub 上 pycounts 的 v0.1.0 标签。\n\n要从此标签创建一个发布，请点击“Draft a new release”。然后，你可以选择用于创建发布的标签，并可选择添加一些关于发布的额外详情，如\
    \ [图 3.13](#fig-3-13) 所示。\n\n点击“Publish release”后，GitHub 将自动从你的标签创建一个发布，其中包含 `.zip`\
    \ 和 `.tar.gz` 格式的代码压缩包，如 [图 3.14](#fig-3-14) 所示。\n\n我们将在**第 7 章：发布与版本控制**中更详细地讨论如何在更新软件包（例如，修改代码、添加功能、修复错误等）时创建新版本和发布。\n\
    \n> 实际上，拥有你 GitHub 仓库访问权限的人可以直接使用你的标签通过 `pip install` 安装你的软件包。我们将在**第 4.3.4 节**中更详细地讨论这一点。\n\
    \n![](img/d3840bdab18c2309faf9de63e70c539d_94_0.png)\n\n**图 3.13：** 在 GitHub 上为\
    \ pycounts 的 v0.1.0 创建发布。\n\n## 3.10 构建和分发你的软件包\n\n### 3.10.1 构建你的软件包\n\n目前，我们的软件包是一堆难以与他人共享的文件和文件夹。解决这个问题的方法是创建一个“分发包”。分发包是一个单一的归档文件，包含使用\
    \ pip 等工具安装软件包所需的所有文件和信息。分发包通常简称为“分发包”，它们是 Python 中共享软件包以及用户安装软件包的方式，通常使用命令 `pip\
    \ install <some-package>`。\n\n![](img/d3840bdab18c2309faf9de63e70c539d_95_0.png)\n\
    \n**图 3.14：** GitHub 上 pycounts 的 v0.1.0 发布。\n\nPython 中主要的分发类型是源码分发包（称为“sdists”）和轮子包（wheels）。sdists\
    \ 是所有源文件、元数据和构建可安装版本软件包所需指令的压缩归档文件。要从 sdist 安装，用户需要下载 sdist，解压其内容，然后使用构建指令在计算机上构建并最终安装软件包。\n\
    \n相比之下，轮子包是软件包的预构建版本。它们在开发者的机器上构建好后再与用户共享。它们是首选的分发格式，因为用户只需下载轮子包并将其移动到计算机上 Python\
    \ 搜索软件包的位置；无需构建步骤。\n\n`pip install` 可以处理从 sdist 或轮子包安装，我们将在第 4.3 节中更详细地讨论这些主题。你现在需要知道的是，在分发软件包时，通常会同时创建\
    \ sdist 和轮子包分发包。我们可以使用 `poetry build` 命令轻松地为软件包创建 sdist 和轮子包。现在，让我们通过在根软件包目录中运行以下命令来为我们的\
    \ pycounts 软件包执行此操作：\n\n```\n$ poetry build\n```\n\n```\nBuilding pycounts (0.1.0)\n\
    \ - Building sdist\n - Built pycounts-0.1.0.tar.gz\n - Building wheel\n - Built\
    \ pycounts-0.1.0-py3-none-any.whl\n```\n\n运行此命令后，你会注意到软件包中有一个名为 `dist/` 的新目录：\n\
    \n```\npycounts\n├── .readthedocs.yml\n├── CHANGELOG.md\n├── CONDUCT.md\n├── CONTRIBUTING.md\n\
    ├── dist\n│   ├── pycounts-0.1.0-py3-none-any.whl  <- 轮子包\n│   └── pycounts-0.1.0.tar.gz\
    \            <- sdist\n├── docs\n│   └── ...\n├── LICENSE\n├── poetry.lock\n├──\
    \ pyproject.toml\n├── README.md\n├── src\n│   └── ...\n└── tests\n    └── ...\n\
    ```\n\n这两个新文件就是我们 pycounts 软件包的 sdist 和轮子包。现在，如果用户拥有其中一个分发包，他们就可以轻松地使用 `pip install`\
    \ 安装我们的软件包。例如，要安装轮子包（首选的分发类型），你可以在终端中输入以下内容：\n\n```\n$ cd dist/\n$ pip install\
    \ pycounts-0.1.0-py3-none-any.whl\n```\n\n```\nProcessing ./pycounts-0.1.0-py3-none-any.whl\n\
    ...\nSuccessfully installed pycounts-0.1.0\n```\n\n要使用 sdist 安装，你必须在运行 `pip install`\
    \ 之前解压 sdist 归档文件。此过程因你的特定操作系统而异。例如，在 Mac OS 上，可以使用命令行工具 `tar`，参数 `x`（解压输入文件）、`z`（解压输入文件）、`f`（对提供的输入文件应用操作）来解压\
    \ sdist：\n\n```\n$ tar xzf pycounts-0.1.0.tar.gz\n$ pip install pycounts-0.1.0/\n\
    ```\n\n```\nProcessing ./pycounts-0.1.0-py3-none-any.whl\n  Installing build dependencies\
    \ ... done\n  Getting requirements to build wheel ... done\n  Preparing wheel\
    \ metadata ... done\n...\nSuccessfully built pycounts\nSuccessfully installed\
    \ pycounts-0.1.0\n```\n\n请注意上面的输出，从 sdist 安装需要在安装之前有一个构建步骤。sdist 首先被构建为轮子包，然后进行安装。对于感兴趣的人，我们将在\
    \ [第 4.3 节](#section-4.3) 中讨论从 sdist 和轮子包构建和安装软件包的细微差别。\n\n为我们的软件包创建分发包，如果将其发布到像\
    \ Python 包索引（PyPI）这样的在线仓库（Python 的官方在线软件仓库）上，将最为有用。这将允许用户只需运行 `pip install pycounts`\
    \ 即可安装我们的软件包，而无需在本地拥有 sdist 或轮子包文件，我们将在下一节中进行此操作。但即使你不打算共享你的软件包，构建和安装分发包仍然很有用，原因有二：\n\
    \n1.  分发包是你的软件包源文件的独立副本，易于移动和存储在计算机上。它使得保留软件包不同版本的分发包变得容易，以便在需要时可以重复使用或共享它们。\n\
    2.  回想一下，poetry 以“可编辑模式”安装软件包，即安装的是指向软件包位置的链接，而不是软件包本身的独立分发包。这对于*开发目的*很有用，因为这意味着对源代码的任何更改在下次导入软件包时都会立即反映出来，而无需再次运行\
    \ `poetry install`。然而，对于你的软件包的*用户*（包括你自己在其他项目中使用你的软件包），通常最好安装软件包的“非可编辑”版本（当你 `pip\
    \ install` sdist 或轮子包时的默认行为），因为非可编辑安装将保持稳定，并且不受计算机上对源文件所做的任何更改的影响。\n\n### 3.10.2\
    \ 发布到 TestPyPI\n\n此时，我们有了 `pycounts` 的分发包，我们希望通过发布到 PyPI<sup>47</sup> 来与世界分享。然而，良好的做法是先进行一次“演练”，通过先提交到\
    \ TestPyPI<sup>48</sup> 来检查一切是否按预期工作。`poetry` 有一个 `publish` 命令，我们可以用它来完成此操作，但默认行为是发布到\
    \ PyPI。因此，我们需要使用以下命令将 TestPyPI 添加到 `poetry` 知道的仓库列表中：\n\n```\n$ poetry config\
    \ repositories.test-pypi https://test.pypi.org/legacy/\n```\n\n要发布到 TestPyPI，我们可以使用\
    \ `poetry publish`（系统会提示你输入 TestPyPI 的用户名和密码——我们在**第 2.3 节**中已经注册过）：\n\n```\n\
    $ poetry publish -r test-pypi\n```\n\n```\nUsername: TomasBeuzen\nPassword:\n\
    Publishing pycounts (0.1.0) to test-pypi\n - Uploading pycounts-0.1.0-py3-none-any.whl\
    \ 100%\n - Uploading pycounts-0.1.0.tar.gz 100%\n```\n\n你不必每次想将分发包发布到 TestPyPI\
    \ 或 PyPI 时都输入用户名和密码，你可以按照 PyPI 文档<sup>49</sup> 中的描述配置一个 API 令牌。\n\n现在我们应该能够在 TestPyPI\
    \ 上访问我们的软件包了。我们的 pycounts 软件包的 URL 是：[https://test.pypi.org/project/pycounts/](https://test.pypi.org/project/pycounts/)。我们可以尝试使用\
    \ pip 从命令行安装我们的软件包，使用以下命令：\n\n```\n$ pip install --index-url https://test.pypi.org/simple/\
    \ \\\n    --extra-index-url https://pypi.org/simple \\\n    pycounts\n```\n\n\
    默认情况下，`pip install` 会在 PyPI 中搜索指定的软件包。但是，我们希望搜索 TestPyPI，因为那是我们上传软件包的地方。参数 `--index-url`\
    \ 将 pip 指向 TestPyPI 索引。然而，重要的是要注意，并非所有开发者都将他们的软件包上传到 TestPyPI；有些人只直接上传到 PyPI。如果你的软件包依赖于不在\
    \ TestPyPI 上的软件包，你可以告诉 pip 尝试在 PyPI 上查找它们。为此，你可以使用参数 `--extra-index-url`，就像我们在上面的命令中所做的那样。\n\
    \n### 3.10.3 发布到 PyPI\n\n如果你能够将你的软件包上传到 TestPyPI 并且没有错误地安装它，那么你就准备好将你的软件包发布到 PyPI\
    \ 了。你可以使用不带任何参数的 `poetry publish` 命令发布到 PyPI：\n\n```\n$ poetry publish\n```\n\n\
    然后你的软件包将在 PyPI 上可用（例如，[https://pypi.org/project/pycounts/](https://pypi.org/project/pycounts/)），任何人都可以使用\
    \ pip 安装它：\n\n```\n$ pip install pycounts\n```\n\n## 3.11 总结与后续步骤\n\n本章提供了生成一个功能齐全的\
