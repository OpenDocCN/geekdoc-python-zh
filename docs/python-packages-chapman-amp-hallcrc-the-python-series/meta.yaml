    # 7.6 Updating dependency versions


    If your package depends on other packages, like our `pycounts` package does, you''ll
    need to think about updating your dependency version constraints as new versions
    of dependencies are released over time. This is true even for the version(s) of
    Python that your package supports.


    Luckily, `poetry` makes this a relatively simple process. The command `poetry
    update` can be used to update the version of installed dependencies in your virtual
    environment, within the constraints of the `pyproject.toml` file. This is useful
    for testing that your package works as expected with newer versions of its dependencies.
    For example, if we wanted to install the latest version of `matplotlib` compatible
    with our `pycounts` package, we could use the following code:


    ```

    $ poetry update matplotlib

    ```


    However, `poetry update` won''t update the constraints specified in your `pyproject.toml`
    file, or the metadata built into your package releases. To update that you have
    two options:


    +   1. Manually modify version constraints in `pyproject.toml`.

    2. Use `poetry add` to update a dependency to a specific version(s).


    For example, our current version constraint for `matplotlib` is shown in `pyproject.toml`:


    ```

    [tool.poetry.dependencies]

    python = ">=3.9"

    matplotlib = ">=3.4.3"

    ```


    If we wanted the minimum version of `matplotlib` to now be 3.5.0, we could manually
    adjust our `pyproject.toml` file as shown below:


    ```

    [tool.poetry.dependencies]

    python = ">=3.9"

    matplotlib = ">=3.5.0"

    ```


    Or we could run the following code:


    ```

    $ poetry add "matplotlib>=3.5.0"

    ```'
