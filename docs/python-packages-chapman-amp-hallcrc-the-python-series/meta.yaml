    \ But note that 100 percent coverage doesn't guarantee our code is perfect, only\
    \ that it passes the specific tests we wrote!\n\n<sup>8</sup>https://coverage.readthedocs.io/en/latest/\n\
    \nIf we want to calculate branch coverage with pytest, we can specify the argument\
