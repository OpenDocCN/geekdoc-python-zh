- md: "## 8.4 Setting up continuous integration\n\n- 3. Checkout our repository so\
    \ we can access its contents (action: actions/checkout@v2<sup>10</sup>).\n- 4.\
    \ Install poetry (action: snok/install-poetry@v1<sup>11</sup>).\n- 5. Use poetry\
    \ to install pycounts (command: poetry install).\n\nWe'll add all these steps\
    \ to our workflow in a job called “ci”:\n\n```yaml\nname: ci-cd\n\non: [push,\
    \ pull_request]\n\njobs:\n  ci:\n    # Set up operating system\n    runs-on: ubuntu-latest\n\
    \n    # Define job steps\n    steps:\n    - name: Set up Python 3.9\n      uses:\
    \ actions/setup-python@v2\n      with:\n        python-version: 3.9\n\n    - name:\
    \ Check-out repository\n      uses: actions/checkout@v2\n\n    - name: Install\
    \ poetry\n      uses: snok/install-poetry@v1\n\n    - name: Install package\n\
    \      run: poetry install\n```\n\nThe above steps will set up our system in preparation\
    \ for:\n\n- 1. Running pycounts's unit tests with pytest.\n- 2. Checking the code\
    \ coverage of our tests.\n- 3. Checking that pycounts's documentation builds correctly.\n\
    \nWe'll create each of these steps in the following sections.\n\n<sup>10</sup>\
    \ https://github.com/actions/checkout\n<sup>11</sup> https://github.com/snok/install-poetry\n\
    \n## 8.4.2 Running tests\n\nRemember all the hard work we put into writing tests\
    \ for our package back in the **Chapter 5: Testing**? Well, we likely want to\
    \ make sure that these tests (and any others that we add) continue to pass for\
    \ any new changes proposed to our package.\n\nRecall that we used `pytest` as\
    \ the testing framework for our `pycounts` package. This is listed as a development\
    \ dependency of our package, so it will already be installed on our runner from\
    \ “Step 5” when we execute `poetry install`. Therefore, we just need to add a\
    \ new step to our workflow with a command to run `pytest`. Because our runner\
    \ is not using a conda virtual environment, poetry sets one up automatically when\
    \ `poetry install` is executed. We need to explicitly tell poetry to use this\
    \ virtual environment it set up for us by prefixing commands with `poetry run`,\
    \ as we do below:\n\n```yaml\n- name: Test with pytest\n  run: poetry run pytest\
    \ tests/ --cov=pycounts --cov-report=xml\n```\n\n> We could install conda on our\
    \ runner and set up a virtual environment if we wanted to. But this is a lot of\
    \ overhead for a workflow that is just going to run tests and build documentation,\
    \ so we’ve decided not to do that here.\n\nNote that in the command above we are\
    \ also obtaining our test coverage through the `--cov` argument and outputting\
    \ a report to `.xml` format with the `--cov-report` argument (these require the\
    \ `pytest-cov` package which we used and added as a dependency of our package\
    \ in **Section 5.5.3**). In the next section, we will integrate another service\
    \ called Codecov<sup>12</sup> into our workflow that will automatically record\
    \ test coverage for us using the `.xml` report.\n\n## 8.4.3 Recording code coverage\n\
    \nIn the previous step, we ran the tests for our `pycounts` package. However,\
    \ if someone adds new code to your package but forgets to write tests for that\
    \ new code, your existing tests will still pass, but the coverage will be reduced.\
    \ So, we probably want to track code coverage in our CI workflow.\n\n<sup>12</sup>\
    \ https://codecov.io/\n\nTo do this, we could print the coverage to our runner’s\
    \ build log, but having the coverage buried in those logs is not overly helpful.\
    \ Instead, it’s common to use a service like Codecov<sup>13</sup> to track our\
    \ code coverage for us. To set up Codecov, first create a Codecov account by linking\
    \ it with your GitHub account, as described in the Codecov documentation<sup>14</sup>\
    \ (Codecov also supports GitLab and Bitbucket). Once you’ve done this, Codecov\
    \ automatically syncs with all the repositories that you have access to. Now,\
    \ to use Codecov to automatically track code coverage as part of our CI workflow\
    \ we can use the action they’ve created called codecov/codecov-action@v2<sup>15</sup>,\
    \ as below:\n\n> If your GitHub repository is private, you’ll need to provide\
    \ an “upload token” to allow Codecov to access it as described in the Codecov\
    \ documentation<sup>16</sup>.\n\n```yaml\n- name: Use Codecov to track coverage\n\
    \  uses: codecov/codecov-action@v2\n  with:\n    files: ./coverage.xml  # coverage\
    \ report\n```\n\nWith this step in our workflow, coverage will automatically be\
    \ recorded for each new proposed change to our code. Codecov can show you whether\
    \ coverage has increased or decreased, by how much, and will link to relevant\
    \ areas of your package’s source code. This information will automatically appear\
    \ on any pull request someone makes to the main branch on GitHub, or it can be\
    \ viewed anytime on the Codecov website; for example, Fig. 8.4 shows the coverage\
    \ dashboard for a package called pypkgs, where coverage decreased significantly\
    \ after the most recent commit.\n\n## 8.4.4 Build documentation\n\nThe final step\
    \ we’ll add to our CI workflow will be to check that our documentation builds\
    \ without issue. We’ll use the same make html command we’ve used throughout this\
    \ book to build documentation with sphinx to do this:\n\n<sup>13</sup> https://codecov.io/\n\
    <sup>14</sup> https://docs.codecov.com/docs\n<sup>15</sup> https://github.com/marketplace/actions/codecov\n\
    <sup>16</sup> https://github.com/marketplace/actions/codecov\n\n![img/d3840bdab18c2309faf9de63e70c539d_218_0.png](img/d3840bdab18c2309faf9de63e70c539d_218_0.png)\n\
    \n**FIGURE 8.4:** Example of the Codecov dashboard linked to a repository called\
    \ pypkgs. Coverage decreased significantly after the most recent commit.\n\n```yaml\n\
    - name: Build documentation\n  run: poetry run make html --directory docs/\n```\n\
    \n## 8.4.5 Testing continuous integration\n\nWe've now set up our CI pipeline!\
    \ Our final `.github/workflows/ci-cd.yml` file looks like this:\n\n```yaml\nname:\
    \ ci-cd\n\non: [push, pull_request]\n\njobs:\n  ci:\n    # Set up operating system\n\
    \    runs-on: ubuntu-latest\n\n    # Define job steps\n    steps:\n    - name:\
    \ Set up Python 3.9\n      uses: actions/setup-python@v2\n      with:\n      \
    \  python-version: 3.9\n\n    - name: Check-out repository\n      uses: actions/checkout@v2\n\
    \n    - name: Install poetry\n      uses: snok/install-poetry@v1\n\n    - name:\
    \ Install package\n      run: poetry install\n\n    - name: Test with pytest\n\
    \      run: poetry run pytest tests/ --cov=pycounts --cov-report=xml\n\n    -\
    \ name: Use Codecov to track coverage\n      uses: codecov/codecov-action@v2\n\
    \      with:\n        files: ./coverage.xml   # coverage report\n\n    - name:\
    \ Build documentation\n      run: poetry run make html --directory docs/\n```\n\
    \nWe're now ready to test out our workflow! Let's go ahead and commit our workflow\
    \ file to version control and push it to GitHub. This will trigger our workflow\
    \ because we configured it to run when someone pushes new work to any branch of\
    \ our repository.\n\n```bash\n$ git add .github/workflows/ci-cd.yml\n$ git commit\
    \ -m \"build: add CI workflow\"\n$ git push\n```\n\nNow if we go to our pycounts\
    \ GitHub repository and click on the “Actions” tab, we should see our workflow,\
    \ as shown in Fig. 8.5:\n\nWe can investigate the build logs by clicking the “ci”\
    \ job as in Fig. 8.6:\n\nThis workflow will trigger anytime someone makes a push\
    \ or pull request with the main branch. Now you, or your collaborators, don't\
    \ have to worry about remembering all these steps or running them manually! In\
    \ the next section, we’ll take this automation to the next level, and set up a\
    \ workflow to automatically deploy a new version of our package if proposed changes\
    \ pass the CI workflow.\n\n![img/d3840bdab18c2309faf9de63e70c539d_220_0.png](img/d3840bdab18c2309faf9de63e70c539d_220_0.png)\n\
    \n**FIGURE 8.5:** Successfully run continuous integration workflow on GitHub.\n\
    \n## 8.5 Setting up continuous deployment\n\nIn the previous step, we set up CI\
    \ for our package to check that tests run, code coverage is stable, and documentation\
    \ still builds, whenever we make a push or pull request with new changes to the\
    \ main branch of our repository.\n\nIn this section, we’ll set up continuous deployment\
    \ (CD). If the changes we push to our repository pass our CI, then we want a CD\
    \ workflow that will automatically:\n\n- 1. Create a new version of our pycounts\
    \ package.\n- 2. Build new distributions (i.e., sdist and wheel).\n- 3. Upload\
    \ the distributions to TestPyPI and test that the package can be installed successfully."
