- md: "## 5.4 Advanced testing methods\n\nat all, why not just define a variable as\
    \ normal at the top of the script like this:\n\n```python\nfrom pycounts.pycounts\
    \ import count_words\nfrom pycounts.plotting import plot_words\nfrom pycounts.datasets\
    \ import get_flatland\nimport matplotlib\nfrom collections import Counter\nimport\
    \ pytest\n\neinstein_counts = Counter({'insanity': 1, 'is': 1, 'doing': 1,\n \
    \                          'the': 1, 'same': 1, 'thing': 1,\n                \
    \           'over': 2, 'and': 2, 'expecting': 1,\n                           'different':\
    \ 1, 'results': 1})\n\ndef test_count_words():\n    \"\"\"Test word counting from\
    \ a file.\"\"\"\n    expected = einstein_counts\n\n# ... rest of file hidden ...\n\
    ```\n\nThe short answer is that fixtures provide far more functionality and reliability\
    \ than manually defined variables. For example, each time you use a pytest fixture,\
    \ it triggers the fixture function, meaning that each test gets a fresh copy of\
    \ the data; you don't have to worry about accidentally mutating or deleting your\
    \ fixture during a test session. You can also control this behavior; should the\
    \ fixture be executed once per use, once per test module, or once per test session?\
    \ This can be helpful if the fixture is large or time-consuming to create. Finally,\
    \ we've only explored the use of fixtures as data for a test, but fixtures can\
    \ also be used to set up the environment for a test. For example, the directory\
    \ structure a test should run in, or the environment variables it should have\
    \ access to. pytest fixtures can help you easily set up these kinds of contexts,\
    \ as you can read more about in the pytest documentation⁶.\n\n### 5.4.2 Parameterizations\n\
    \nParameterizations can be useful for running a test multiple times using different\
    \ arguments. For example, recall in Section 5.3.2 that we added some code to pycounts's\
    \ plot_words() function that raises a TypeError if a user inputs an object other\
    \ than a Counter object to the function. We wrote a test to check that in our\
    \ test_pycounts.py file as follows:\n\n```python\n# ... rest of file hidden ...\n\
    \ndef test_plot_words_error():\n    \"\"\"Check TypeError raised when Counter\
    \ not used.\"\"\"\n    with pytest.raises(TypeError):\n        list_object = [\"\
    Pythons\", \"are\", \"non\", \"venomous\"]\n        plot_words(list_object)\n\n\
    # ... rest of file hidden ...\n```\n\nOur test only tests the TypeError is raised\
    \ if a list object is passed as an input, but we should also test what happens\
    \ if other objects are passed too, such as numbers or strings. Rather than writing\
    \ new tests for each object we want to try, we can parameterize this test with\
    \ all the different data we want to try, and pytest will run the test for each\
    \ piece of data.\n\nParameterizations can be created in pytest using the @pytest.mark.parametrize(argnames,\
    \ argvalues) decorator. argnames represent the names of test variable(s) you want\
    \ to use in your test function (you can use any name you want), and argvalues\
    \ is a list of the values those test variable(s) will take.\n\nIn the code example\
    \ below, that we've added to the test_pycounts.py file, we create a test variable\
    \ named obj, which can take three values; a float (3.141), a string (\"test.txt\"\
    ), or a list of strings ([\"list\", \"of\", \"words\"]). With this parameterization,\
    \ pytest will run our test three times, once for each value that we specified\
    \ we want obj to take.\n\n```python\n# ... rest of file hidden ...\n\n@pytest.mark.parametrize(\n\
    \    \"obj\",\n    [\n        3.141,\n        \"test.txt\",\n        [\"list\"\
    , \"of\", \"words\"]\n    ]\n)\ndef test_plot_words_error(obj):\n    \"\"\"Check\
    \ TypeError raised when Counter not used.\"\"\"\n    with pytest.raises(TypeError):\n\
    \        plot_words(obj)\n\n# ... rest of file hidden ...\n```\n\nWe can explicitly\
    \ show that pytest will run our test three times (once for each value we specified)\
    \ by adding the --verbose flag to our pytest command:\n\n```bash\n$ pytest tests/\
    \ --verbose\n```\n\n```\n============================= test session starts =============================\n\
    ...\ncollected 7 items\n\ntests/test_pycounts.py::test_count_words PASSED    \
    \                      [ 14%]\ntests/test_pycounts.py::test_plot_words PASSED\
    \                           [ 28%]\ntests/test_pycounts.py::test_plot_words_error[3.141]\
    \ PASSED              [ 42%]\ntests/test_pycounts.py::test_plot_words_error[test.txt]\
    \ PASSED           [ 57%]\ntests/test_pycounts.py::test_plot_words_error[obj2]\
    \ PASSED               [ 71%]\ntests/test_pycounts.py::test_integration PASSED\
    \                          [ 85%]\ntests/test_pycounts.py::test_regression PASSED\
    \                           [100%]\n\n============================== 7 passed\
    \ in 0.52s ===============================\n```\n\nSometimes you'll want to run\
    \ a test on a function, where the output depends on the input. As an example,\
    \ consider the function is_even() below:\n\n```python\ndef is_even(n):\n    \"\
    \"\"Check if n is even.\"\"\"\n    if n % 2 == 0:\n        return True\n    else:\n\
    \        return False\n```\n\nTo parameterize this test with different input/output\
    \ pairs, we use the same syntax as before with @pytest.mark.parametrize() except\
    \ we comma-separate the test arguments in a string (\"n, result\") and group the\
    \ pairs of values we want those arguments to take in a tuple (e.g., (2, True),\
    \ (3, False), etc.). In the example test that follows, we'll purposefully add\
    \ a wrong input/output pair ((4, False)) to show what the output of pytest looks\
    \ like in the case of a failed parameterization:\n\n```python\n@pytest.mark.parametrize(\n\
    \    \"n, result\",\n    [\n        (2, True),\n        (3, False),\n        (4,\
    \ False)  # this last pair is purposefully wrong so we can\n        # show an\
    \ example of the pytest error message\n    ]\n)\ndef test_is_even(n, result):\n\
    \    assert is_even(n) == result\n```\n\nThe above test would run successfully\
    \ for the first two parameterized input/output pairs but would fail for the last\
    \ one with the following helpful error message that points out exactly which parameterization\
    \ failed:\n\n```\n---\nemphasize-lines: 4, 19\n---\n=============================\
    \ FAILURES =============================\n_______________________ testis_even[4-False]\
    \ ________________________\n\nn = 4, result = False\n\n    @pytest.mark.parametrize(\n\
    \        \"n, result\",\n        [\n            (2, True),\n            (3, False),\n\
    \            (4, False)\n        ]\n    )\n    def testis_even(n, result):\n>\
    \       assert is_even(n) == result\n\ntests/test_example.py:13: AssertionError\n\
    ========================= short test summary info ======================\nFAILED\
    \ tests/test_example.py:testis_even[4-False]: assert True == False\n```\n\nYou\
    \ can read more about parameterizations in the pytest documentation<sup>7</sup>.\n\
    \n## 5.5 Code coverage\n\nA good test suite will contain tests that check as much\
    \ of your package's code as possible. How much of your code your tests actually\
    \ use is called “code coverage\", and there are different ways to calculate it,\
    \ as we'll learn about in this section.\n\n### 5.5.1 Line coverage\n\nThe simplest\
    \ and most intuitive measure of code coverage is line coverage. It is the proportion\
    \ of lines of your package's code that are executed by your tests:\n\n$$coverage\
    \ = \\frac{\\text{lines executed}}{\\text{total lines}} * 100\\%$$\n\nConsider\
    \ the following hypothetical code, consisting of 9 lines:\n\n```python\ndef myfunc(x):\
    \                    # Line 1\n    if x > 0:                      # Line 2\n \
    \       print(\"x above threshold!\") # Line 3\n        print(\"Running analysis.\"\
    )  # Line 4\n        y = round(x)               # Line 5\n        z = y ** 2 \
    \                # Line 6\n    elif x < 0:                    # Line 7\n     \
    \   z = abs(x)                 # Line 8\n    return z                       #\
    \ Line 9\n```\n\nImagine we write the following unit test for that code. This\
    \ unit test uses x=10.25 as a test fixture (if you follow the code above, you'll\
    \ see that the expected result for that fixture is 100):\n\n```python\ndef test_myfunc_1():\n\
    \    assert myfunc(x=10.25) == 100\n```\n\nThis test only covers the condition\
    \ x > 0 of our myfunc() function and hence will only execute lines 1 — 6 and line\
    \ 9; a total of 7, of 9, possible lines. The coverage would therefore be:\n\n\
    $$coverage = \\frac{7}{9} * 100\\% = 78\\%$$\n\nLine coverage is simple and intuitive\
    \ to understand, and many developers use it as a measure of how much of their\
    \ package's code is covered by their tests. But you can see how line coverage\
    \ can potentially be misleading. Our myfunc() function has two possible outputs,\
    \ depending on which condition of the if statement is satisfied. These two possible\
    \ code paths are called “branches\", and they might be equally important to our\
    \ package, but our line coverage metric is heavily dependent on which branches\
