    We’ll practice writing workflows for implementing CI and CD for a Python package
    in the following sections of this chapter, but at this point, the high-level concepts
    to be aware of are:


    +   - A workflow is a set of commands that are triggered to execute by certain
    events (like a push to the main branch of a repository).

    - A workflow is run on a machine called a runner, which uses a particular operating
    system and is hosted by the CI/CD service.

    - A workflow contains one or more jobs.

    - Each job contains one or more steps to execute. In GitHub Actions, steps comprise
    either “actions” or “commands” as we’ll discuss in the next section.'
