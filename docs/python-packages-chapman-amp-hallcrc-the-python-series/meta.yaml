    Looks like things are working as expected!

    Before we move on, there''s one more important thing to mention. We know that
    the assert statement can be used with any expression that evaluates to a boolean
    (True/False). However, if your package uses floating-point numbers, and you''re
    wanting to assert the equality of floating-point numbers in your tests, there''s
    one thing to watch out for. Due to the limitations of floating-point arithmetic
    in computers, numbers that we would expect to be equal are sometimes not. Consider
    the following infamous example:


    ```

    >>> assert 0.1 + 0.2 == 0.3, "Numbers are not equal!"

    ```


    ```

    AssertionError: Numbers are not equal!

    ```


    You can read more about the nuances of floating-point arithmetic in the Python
    documentation², but the important point here is that, when working with floating-point
    numbers, we usually assert that numbers are *approximately* equal, rather than
    *exactly* equal. To do this we can use the pytest.approx() function:


    ```

    >>> import pytest

    >>> assert 0.1 + 0.2 == pytest.approx(0.3), "Numbers are not equal!"

    ```


    You can control how approximate you want the equality to be by using the abs and
    rel arguments of pytest.approx() to specify how much absolute or relative error
    you want to allow, respectively.


    ²https://docs.python.org/3/tutorial/floatingpoint.html'
