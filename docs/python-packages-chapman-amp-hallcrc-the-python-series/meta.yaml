    \n## 8 持续集成与部署\n\n如果你已经读到这里，你现在对如何创建一个功能齐全的 Python 包有了基本的了解！我们经历了很多才走到这里：我们学习了包结构、开发了源代码、创建了测试、编写了文档，并学习了如何发布包的新版本。\n\
    \n随着你继续开发你的包，自动化许多这些工作流将非常有帮助，这样你和你的协作者就可以更专注于编写代码，而减少对打包和测试细节的关注。这就是持续集成（CI）和持续部署（CD）的用武之地！CI/CD\
    \ 通常指软件的自动化测试、构建和部署。在本章中，我们将首先介绍 CI/CD，并介绍如何使用 GitHub Actions 服务进行设置。之后，我们将展示如何为\
    \ Python 包设置 CI/CD，使用我们在本书中一直在开发的 pycounts 包来演示概念。\n\n> 本章需要基本熟悉 Git 和 GitHub\
    \ 或类似的版本控制工具。要了解更多关于 Git 和 GitHub 的信息，我们推荐以下资源：*Happy Git and GitHub for the useR*\
    \ (Bryan et al., 2021) 和 *Research Software Engineering with Python* (Irving et\
    \ al., 2021)。\n\n### 8.1 CI/CD 简介\n\n持续集成（CI）是指在你和贡献者更新代码时自动评估代码的过程，以尝试捕获你的更新可能引起的任何潜在问题。CI\
    \ 工作流通常包括自动执行我们在本书中见过的许多步骤，例如运行测试、计算代码覆盖率和构建文档等。\n\n持续部署（CD）是将软件的新版本自动部署到例如 PyPI\
    \ 的过程，这些版本是通过 CI 的变更。\n\nCI/CD 可以自动化我们在本书中手动完成的打包工作流，最终可以为你节省时间，并帮助你快速发布包的新版本。CI/CD\
    \ 还有助于其他人贡献到你的包，因为更新包的过程是自动化的，不依赖于某个人（即你）手动发布包的专业知识。即使你的包不会经常更新，设置 CI/CD 仍然是有益的，因为这意味着你不必记住发布包所需的所有手动步骤（这可能令人生畏，并阻止你想要更新和维护你的包）。\n\
    \n### 8.2 CI/CD 工具\n\n你可以手动编写和执行 CI/CD 工作流，例如，编写脚本来执行我们在前面章节中介绍的所有步骤（即运行测试、构建文档、构建和发布分发包等）。然而，这个过程效率不高且不可扩展，如果有多个人（即不止你）为你的代码做贡献，它效果不佳。\n\
    \n因此，更常见的做法是使用 CI/CD 服务来实现 CI/CD。这些服务本质上以自动化的方式执行我们上面描述的操作；我们定义一个工作流，这些服务将在特定的“触发事件”（我们也可以定义）时自动运行该工作流（例如，将新代码合并到\
    \ GitHub 仓库的“main”分支可能会触发软件新版本的自动部署）。\n\n市面上有许多 CI/CD 服务——例如 GitHub Actions³、Travis\
    \ CI⁴ 和 CircleCi⁵。我们将在本章中使用 GitHub Actions，这是一个为存储在 GitHub 仓库中的软件执行 CI/CD 工作流的服务。我们将在下一节介绍如何使用\
    \ GitHub Actions。\n\n³https://docs.github.com/en/actions\n⁴https://www.travis-ci.com\n\
    ⁵https://circleci.com\n\nGitHub Actions 对公共仓库免费，并为私有仓库提供慷慨的免费分钟数。在 GitHub Actions\
    \ 文档<sup>6</sup>中阅读更多。\n\n### 8.3 GitHub Actions 简介\n\n#### 8.3.1 关键概念\n\nGitHub\
    \ Actions 是一个执行 CI/CD 工作流的服务。其基本思想是创建一组命令，GitHub Actions 将代表我们运行。我们称这组命令为“工作流”。GitHub\
    \ Actions 工作流在 .yml 文件中定义，包含我们希望 GitHub Actions 为我们运行的“操作”集（例如，使用 pytest 运行我们的测试或使用\
    \ sphinx 构建我们的文档）。操作在工作流中组织为“步骤”（例如，步骤 1：运行测试，步骤 2：构建文档），这些步骤又组织成“作业”（例如，作业 1：持续集成）。工作流在由特定“事件”（如将代码合并到仓库的\
    \ main 分支）触发时，在 GitHub Actions 提供的称为“运行器”的机器上执行。\n\n这需要消化很多内容，但别担心！所有这些术语都在表 8.1\
    \ 中进行了总结，我们将在下一节通过一个使用 GitHub Actions 的示例来介绍这些术语。\n\n**表 8.1：** GitHub Actions\
    \ 中使用的术语。\n\n| 关键词 | 描述 |\n| :--- | :--- |\n| 操作 | 你想要执行的单个任务。 |\n| 工作流 | 操作的集合（在一个文件中一起指定）。\
    \ |\n| 事件 | 触发工作流运行的事件。 |\n| 运行器 | 可以运行 GitHub 操作的机器。 |\n| 作业 | 在同一运行器上执行的一组步骤。\
    \ |\n| 步骤 | 作业执行的一组命令或操作。 |\n\n<sup>6</sup>https://docs.github.com/en/billing/managing-billing-for-github-actions/about-billing-for-github-actions"
