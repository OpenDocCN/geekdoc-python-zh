    \ to a user. If you open *index.md* in an editor of your choice, that's exactly\
    \ the content we are including, with a particular kind of syntax, which we explain\
    \ below.\n\n```\n{include} ../README.md\n\n```{toctree}\n:maxdepth: 1\n:hidden:\n\
    \nexample.ipynb\nchangelog.md\ncontributing.md\nconduct.md\nautoapi/index\n```\n\
    \nThe syntax we're using in this file is known as Markedly Structured Text (MyST)<sup>34</sup>.\
    \ MyST is based on Markdown but with additional syntax options compatible for\
    \ use with sphinx. The `{include}` syntax specifies that when this page is rendered\
    \ with sphinx, we want it to include the content of the *README.md* from our package's\
    \ root directory (think of it as a copy-paste operation).\n\nThe `{toctree}` syntax\
    \ defines what documents will be listed in the table of contents (ToC) on the\
    \ left-hand side of our rendered documentation, as shown in Fig. 3.9. The argument\
    \ `:maxdepth: 1` indicates how many heading levels the ToC should include, and\
