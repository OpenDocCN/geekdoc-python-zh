    # 7.2.2 Automatic version bumping


    In this book, we''re interested in automating as much as possible of the packaging
    workflow. While the manual versioning approach described above in Section 7.2.1
    is certainly used by many developers, we can do things more efficiently! To automate
    version bumping, you''ll need to be using a version control system like Git. If
    you are not using version control for your package, you can skip to Section 7.3.


    Python Semantic Release (PSR)³ is a tool that can automatically bump version numbers
    based on keywords it finds in commit messages. The idea is to use a standardized
    commit message format and syntax, which PSR can parse to determine how to increment
    the version number. The default commit message format used by PSR is the Angular
    commit style⁴, which looks like this:


    ```

    <type>(optional scope): short summary in present tense


    (optional body: explains motivation for the change)


    (optional footer: note BREAKING CHANGES here, and issues to be closed)

    ```


    ³ https://python-semantic-release.readthedocs.io/en/latest/

    ⁴ https://github.com/angular/angular.js/blob/master/DEVELOPERS.md#commit-message-format'
- md: '## 7.2 Version bumping


    `<type>` refers to the kind of change made and is usually one of:


    - feat: A new feature.

    - fix: A bug fix.

    - docs: Documentation changes.

    - style: Changes that do not affect the meaning of the code (white-space, formatting,
    missing semi-colons, etc).

    - refactor: A code change that neither fixes a bug nor adds a feature.

    - perf: A code change that improves performance.

    - test: Changes to the test framework.

    - build: Changes to the build process or tools.


    `scope` is an optional keyword that provides context for where the change was
    made. It can be anything relevant to your package or development workflow (e.g.,
    it could be the module or function name affected by the change).


    Different text in the commit message will trigger PSR to make different kinds
    of releases:


    - A `<type>` of `fix` triggers a patch version bump, e.g.:


    ```

    $ git commit -m "fix(mod_plotting): fix confusing error message in \n    plot_words"

    ```


    - A `<type>` of `feat` triggers a minor version bump, e.g.:


    ```

    $ git commit -m "feat(package): add example data and new module to \n    package"

    ```


    - The text `BREAKING CHANGE:` in the footer will trigger a major release, e.g.:


    ```

    $ git commit -m "feat(mod_plotting): move code from plotting module \n    to pycounts
    module

    $

    $ BREAKING CHANGE: plotting module wont exist after this release."

    ```


    To use PSR we need to install and configure it. To install PSR as a development
    dependency of a poetry-managed project, you can use the following command:


    ```

    $ poetry add --dev python-semantic-release

    ```


    To configure PSR, we need to tell it where the version number of our package is
    stored. The package version is stored in the `pyproject.toml` file for a poetry-managed
    project. It exists as the variable `version` under the table `[tool.poetry]`.
    To tell PSR this, we need to add a new table to the `pyproject.toml` file called
    `[tool.semantic_release]` within which we specify that our `version_variable`
    is stored at `pyproject.toml:version`:


    ```

    ...rest of file hidden...


    [tool.semantic_release]

    version_variable = "pyproject.toml:version"

    ```


    Finally, you can use the command `semantic-release version` at the command line
    to get PSR to automatically bump your package''s version number. PSR will parse
    all the commit messages since the last tag of your package to determine what kind
    of version bump to make. For example, imagine the following three commit messages
    have been made since tag `v0.1.0`:


    1. "fix(mod_plotting): raise TypeError in plot_words"

    2. "fix(mod_plotting): fix confusing error message in plot_words"

    3. "feat(package): add example data and new module to package"


    PSR will note that there are two "fix" and one "feat" keywords. "fix" triggers
    a patch release, but "feat" triggers a minor release, which trumps a patch release,
    so PSR would make a minor version bump from `v0.1.0` to `v0.2.0`.


    As a more practical demonstration of how PSR works, imagine we have a package
    at version `0.1.0`, make a bug fix and commit our changes with the following message:


    > If you''re building the pycounts package with us in this book, you don''t have
    to run the below commands, they are just for demonstration purposes. We''ll make
    a new version of pycounts later in this chapter.


    ```

    $ git add src/pycounts/plotting.py

    $ git commit -m "fix(code): change confusing error message in \n    plotting.plot_words"

    ```


    We then run `semantic-release version` to update our version number. In the command
    below, we''ll specify the argument `-v DEBUG` to ask PSR to print extra information
    to the screen so we can get an inside look at how PSR works:


    ```

    $ semantic-release version -v DEBUG

    ```


    ```

    Creating new version

    debug: get_current_version_by_config_file()

    debug: Parsing current version: path=PosixPath(''pyproject.toml'')

    debug: Regex matched version: 0.1.0

    debug: get_current_version_by_config_file -> 0.1.0

    Current version: 0.1.0

    debug: evaluate_version_bump(''0.1.0'', None)

    debug: parse_commit_message(''fix(code): change confusing error... )

    debug: parse_commit_message -> ParsedCommit(bump=1, type=''fix'')

    debug: Commits found since last release: 1

    debug: evaluate_version_bump -> patch

    debug: get_new_version(''0.1.0'', ''patch'')

    debug: get_new_version -> 0.1.1

    debug: set_new_version(''0.1.1'')

    debug: Writing new version number: path=PosixPath(''pyproject.toml'')

    debug: set_new_version -> True

    debug: commit_new_version(''0.1.1'')

    debug: commit_new_version -> [main d82fa3f] 0.1.1

    debug:  Author: semantic-release <semantic-release>

    debug:  1 file changed, 5 insertions(+), 1 deletion(-)

    debug: tag_new_version(''0.1.1'')

    debug: tag_new_version ->

    Bumping with a patch version to 0.1.1

    ```


    We can see that PSR found our commit messages, and decided that a patch release
    was necessary based on the text in the message. We can also see that command automatically
    updated the version number in the `pyproject.toml` file and created a new version
    control tag for our package''s source (we talked about tags in [Section 3.9](#section-3-9)).
    In the next section, we''ll go through a real example of using PSR with our pycounts
    package.


    ## 7.3 Checklist for releasing a new package version


    Now that we know about versioning and how to increment the version of our package,
    we''re ready to run through a release checklist. We''ll make a new minor release
    of the pycounts package we''ve been developing throughout this book, from `v0.1.0`
    to `v0.2.0`, to demonstrate each step in the release checklist.


    ### 7.3.1 Step 1: make changes to package source files


    This is an obvious one, but before you can make a new release, you need to make
    the changes to your package''s source that will comprise your new release!


    Consider our pycounts package. We published the first release, `v0.1.0`, of our
    package in **Chapter 3: How to package a Python**. Since then, we''ve made a few
    changes. Specifically:


    - In **Chapter 4: Package structure and distribution**, we added a new “datasets”
    module to our package along with some example data, a text file of the novel *Flatland*
    by Edwin Abbott (Abbott, 1884), that users could load to try out the functionality
    of our package.

    - In **Chapter 5: Testing**, we significantly upgraded our testing suite by adding
    several new unit, integration, and regression tests to the `tests/test_pycounts.py`
    file.


    > In practice, if you''re using version control, changes are usually made to a
    package''s source using branches. Branches isolate your changes so you can develop
    your package without affecting the existing, stable version. Only when you''re
    happy with your changes do you merge them into the existing source.


    ### 7.3.2 Step 2: document your changes


    Before we make our new release, we should document everything we''ve changed in
    our changelog. For example, here''s pycounts''s updated `CHANGELOG.md` file:


    > We talked about changelog file format and content in **Section 6.2.5**.


    ```

    # Changelog


    <!--next-version-placeholder-->


    ## v0.2.0 (10/09/2021)


    ### Feature


    - Added new datasets modules to load example data


    ### Fix


    - Check type of argument passed to `plotting.plot_words()`


    ### Tests


    - Added new tests to all package modules in test_pycounts.py


    ## v0.1.0 (24/08/2021)


    - First release of `pycounts`

    ```


    If using version control, you should commit this change to make sure it becomes
    part of your release:


    ```

    $ git add CHANGELOG.md

    $ git commit -m "build: preparing for release v0.2.0"

    $ git push

    ```


    ### 7.3.3 Step 3: bump version number


