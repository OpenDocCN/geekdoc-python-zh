    ### 3.6.1 Dependency version constraints


    Versioning is the practice of assigning a unique identifier to unique releases
    of a package. For example, semantic versioning[^12] is a common versioning system
    that consists of three integers A.B.C. A is the "major" version, B is the "minor"
    version, and C is the "patch" version identifier. Package versions usually starts
    at 0.1.0 and positively increment the major, minor, and patch numbers from there,
    depending on the kind of changes made to the package over time.


    [^12]: https://semver.org


    We''ll talk more about versioning in **Chapter 7: Releasing and versioning**,
    but what''s important to know now is that we typically constrain the required
    version number(s) of our package''s dependencies, to ensure we''re using versions
    that are up-to-date and contain the functionality we need. You may have noticed
    poetry prepended a caret (^) operator to the dependency versions in our *pyproject.toml*
    file, under the [tool.poetry.dependencies] section:


    ```

    [tool.poetry.dependencies]

    python = "^3.9"

    matplotlib = "^3.4.3"

    ```


    The caret operator is short-hand for "requires this or any higher version that
    does not modify the left-most non-zero version digit". For example, our package
    depends on any Python version >=3.9.0 and <4.0.0. Thus, examples of valid versions
    include 3.9.1 and 3.12.0, but 4.0.1 would be invalid. There are many other syntaxes
    that can be used to specify version constraints in different ways, as you can
    read more about in the *poetry documentation*<sup>13</sup>. So why do we care
    about this? The caret operator enforces an upper cap on the dependency versions
    our package requires. A problem with this approach is that it forces anyone depending
    on your package to specify the same constraints and can thus make it difficult
    to add and resolve dependencies.


    This problem is best shown by example. Version 1.21.5 of the popular numpy (Harris
    et al., 2020) package had bound version constraints on Python, requiring version
    >=3.7 and <3.11 (see the source code<sup>14</sup>). Watch what happens if we try
    to add this version of numpy to our pycounts package (we use the argument --dry-run
    to show what would happen here without actually executing anything):


    ```

    $ poetry add numpy=1.21.5 --dry-run

    ```


    ```

    Updating dependencies

    Resolving dependencies... (0.1s)


    SolverProblemError


    The current project''s Python requirement (>=3.9,<4.0) is not compatible

    with some of the required packages Python requirement:

    ```


    <sup>13</sup> https://python-poetry.org/docs/dependency-specification

    <sup>14</sup> https://github.com/numpy/numpy/blob/c3d0a09342c08c466984654bc4738af595fba896/setup.py#L409


    - numpy requires Python >=3.7,<3.11, so it will not be satisfied for Python >=3.11,<4.0


    The problem here is that our package currently supports Python versions ^3.9 (i.e.,
    >=3.9.0 and <4.0.0), so if we released it, a user with Python 3.12.0 would technically
    be able to install it. However, numpy 1.21.5 only supports >=3.7 and <3.11 which
    would not be compatible with Python 3.12.0 (or any version >=3.11). As a result
    of this inconsistency, poetry refuses to add numpy 1.21.5 as a dependency of our
    package. To add it, we have three main choices:


    1. Change the Python version constraints of our package to >=3.7 and <3.11.

    2. Wait for a version of numpy that is compatible with our package''s Python constraints.

    3. Manually specify the versions of Python for which the dependency can be installed,
    e.g.: poetry add numpy=1.21.5 --python ">=3.7, <3.11".


    None of these options is really ideal, especially if your package has a large
    number of dependencies with different bound version constraints. However, a simple
    way this issue could be resolved is if numpy 1.21.5 did not having an upper cap
    on the Python version required. In fact, in the subsequent minor version release
    of numpy, 1.22.0, the upper version cap on Python was removed, requiring only
    version >=3.8 (see the source code<sup>15</sup>), which we would be able to successfully
    add to our package:


    ```

    $ poetry add numpy=1.22.0 --dry-run

    ```


    Ultimately, version constraints are an important issue that can affect the usability
    of your package. If you intend to share your package, having an upper cap on dependency
    versions can make it very difficult for other developers to use your package as
    a dependency in their own projects. At the time of writing, much of the packaging
    community, including the Python Packaging Authority<sup>16</sup>, generally recommend
    not using an upper cap on version constraints unless absolutely necessary. As
    a result, we recommend specifying version constraints without an upper cap by
    manually changing poetry''s default caret operator (^) to a greater-than-or-equal-to
    sign (>=). For example, we will change the [tool.poetry.dependencies] section
    of our pyproject.toml file as follows:


    <sup>15</sup> https://github.com/numpy/numpy/blob/4adc87dff15a247e417d50f10cc4def8e1c17a03/setup.py#L410

    <sup>16</sup> https://github.com/pypa/packaging.python.org/pull/850'
