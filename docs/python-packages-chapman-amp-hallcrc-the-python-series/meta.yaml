    \n```\n$ conda create --name <your-env-name> python=3.9 -y\n$ conda activate <your-env-name>\n\
    ```\n\n4.  在 *src/* 目录的模块中添加 Python 代码（**第3.4节**），并根据需要添加依赖项（**第3.6节**）。\n\n```\n\
