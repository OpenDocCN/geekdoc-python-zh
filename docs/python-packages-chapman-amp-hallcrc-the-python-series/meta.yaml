  md: "# 3.1 Counting words in a text file\n\n```\n>>> def load_text(input_file):\n\
    \    \"\"\"Load text from a text file and return as a string.\"\"\"\n    with\
    \ open(input_file, \"r\") as file:\n        text = file.read()\n    return text\n\
    ```\n\n```\n>>> def clean_text(text):\n    \"\"\"Lowercase and remove punctuation\
    \ from a string.\"\"\"\n    text = text.lower()\n    for p in punctuation:\n \
    \       text = text.replace(p, \"\")\n    return text\n```\n\n```\n>>> def count_words(input_file):\n\
    \    \"\"\"Count unique words in a string.\"\"\"\n    text = load_text(input_file)\n\
    \    text = clean_text(text)\n    words = text.split()\n    return Counter(words)\n\
    ```\n\nWe can now use our word-counting functionality as follows:\n\n```\n>>>\
    \ count_words(\"zen.txt\")\n```\n\n```\nCounter({'is': 10, 'better': 8, 'than':\
    \ 8, 'the': 6,\n'to': 5, 'of': 3, 'although': 3, 'never': 3, ... })\n```\n\nUnfortunately,\
    \ if you quit from the Python interpreter, the functions we just defined will\
    \ be lost and you will have to define them again in new sessions.\n\nThe whole\
