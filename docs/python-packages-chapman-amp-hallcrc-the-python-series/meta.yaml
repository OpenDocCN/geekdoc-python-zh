    ```\n{\n    \"name\": \"poetry\",\n    \"image\": \"pypkgs/vscode\",\n    \"extensions\"\
    : [\"ms-python.python\"],\n}\n```\n\n7.  现在，打开 Visual Studio Code 命令面板$^{38}$，搜索并选择命令\
