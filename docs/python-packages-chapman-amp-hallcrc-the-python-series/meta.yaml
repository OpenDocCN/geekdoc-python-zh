    We''ll talk more about package installation in **Section 4.3**.


    What this all means is that when you type `import pycounts.plotting`, Python first
    searches for a module or package called `pycounts` in the list of search paths
    defined by `sys.path`. If `pycounts` is a package, it then searches for a plotting
    module or subpackage using `pycounts.__path__` as the search path (rather than
    `sys.path`). At this point, we''re straying into the nuances of Python''s import
    system and digressing from the scope of this book, but interested readers can
    read more about Python''s import system in the Python documentation[^4].


    Ultimately, the important takeaway message from this section is that packages
    are a collection of Python modules. They help us better organize and access our
    code, as well as distribute it to others, as we''ll discuss in **Section 4.3**.


    # 4.2 Package structure


    With the theory out of the way, we''ll now get back to more practical topics in
    this section; we''ll discuss how packages are structured, how we can control their
    `import` behavior, and how we can include non-code files, like data, into our
    packages.


    # 4.2.1 Package contents


    As we discussed in **Section 4.1**, packages are a way of organizing and accessing
    a collection of modules. Fundamentally, a package is identified as a directory
    containing an `__init__.py` file, and a module is a file with a `.py` extension.


