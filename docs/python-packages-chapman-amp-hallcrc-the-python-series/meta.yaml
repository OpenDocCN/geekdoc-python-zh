    # 5.3.3 Integration tests


    The unit tests we’ve written above verify that the individual functions of our
    package work in isolation. But we should also test that they work correctly together.
    Such a test is called an “integration test” (because individual units of code
    are integrated into a single test).


    Integration tests are structured the same way as unit tests. We use a fixture
    to produce an actual result with our code, which is then compared to an expected
    result. As an example of an integration test we’ll:


    +   - Use the “Einstein quote” text file, einstein.txt, as a fixture.

    - Count the words in the quote using the count_words() function.

    - Plot the word counts using the plot_words() function.

    - assert that a matplotlib bar chart was created, that the chart has 10 bars,
    and that the maximum word count in the chart is 2 (no word appears more than twice
    in the quote in the einstein.txt file).


    The overall aim of this test is to check that the two core functions of our package
    count_words() and plot_words() work together (at least to our test specifications).
    It can be written and added to our test_pycounts.py file as follows:


    ```

    from pycounts.pycounts import count_words

    from pycounts.plotting import plot_words

    import matplotlib

    from collections import Counter

    import pytest

    ```'
