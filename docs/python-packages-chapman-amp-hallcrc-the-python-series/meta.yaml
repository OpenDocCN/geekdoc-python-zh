    \ 3.8.4 Building documentation\n\nWe've now written all the individual pieces\
    \ of documentation needed to support our pycounts package. But all this documentation\
    \ is spread over the directory structure of our package making it difficult to\
    \ share and search through.\n\nThis is where the documentation generator sphinx\
    \ comes in. sphinx is a tool used to compile and render collections of plain-text\
    \ source files into user-friendly output formats, such as HTML or PDF. sphinx\
    \ also has a rich ecosystem of extensions that can be used to help automatically\
    \ generate content — we'll be using some of these extensions in this section to\
    \ automatically create an API reference sheet from our docstrings, and to execute\
    \ and render our Jupyter Notebook example into our documentation.\n\nTo first\
    \ give you an idea of what we're going to build, Fig. 3.9 shows the homepage of\
    \ our package's documentation compiled by sphinx into HTML.\n\nThe source and\
    \ configuration files to build documentation like this using sphinx typically\
    \ live in the `docs/` directory in a package's root. The py-pkgs-cookiecutter\
    \ automatically created this directory and the necessary files for us. We'll discuss\
    \ what each of these files are used for below.\n\n```\npycounts\n├── .readthedocs.yml\n\
    ├── CHANGELOG.md\n├── CONDUCT.md\n├── CONTRIBUTING.md\n├── docs\n│   ├── changelog.md\n\
    │   ├── conduct.md\n│   ├── conf.py\n│   ├── contributing.md\n│   ├── example.ipynb\n\
    │   ├── index.md\n│   ├── make.bat\n│   ├── Makefile\n│   └── requirements.txt\n\
    ├── LICENSE\n├── poetry.lock\n├── pyproject.toml\n├── README.md\n├── src\n│  \
    \ └── ...\n└── tests\n    └── ...\n```\n\nThe *docs/* directory includes:\n\n\
    - *Makefile/make.bat*: files that contain commands needed to build our documentation\
    \ with sphinx and do not need to be modified. Make<sup>30</sup> is a tool used\
    \ to run commands to efficiently read, process, and write files. A Makefile defines\
    \ the tasks for Make to execute. If you're interested in learning more about Make,\
    \ we recommend the Learn Makefiles<sup>31</sup> tutorial. But for building documentation\
    \ with sphinx, all you need to know is that having these Makefiles allows us to\
    \ build documentation with the simple command `make html`, which we'll do later\
    \ in this section.\n- *requirements.txt*: contains a list of documentation-specific\
    \ dependencies required to host our documentation online on Read the Docs<sup>32</sup>,\
    \ which we'll discuss in **Section 3.8.5**.\n- *conf.py* is a configuration file\
    \ controlling how sphinx builds your documentation. You can read more about *conf.py*\
    \ in the sphinx documentation<sup>33</sup> and we'll touch on it again shortly,\
    \ but, for now, it has been pre-populated by the py-pkgs-cookiecutter template\
    \ and does not need to be modified.\n- The remaining files in the *docs/* directory\
    \ form the content of our generated documentation, as we'll discuss in the remainder\
    \ of this section.\n\nThe *index.md* file will form the landing page of our documentation\
    \ (the one we saw earlier in Fig. 3.9). Think of it as the homepage of a website.\
