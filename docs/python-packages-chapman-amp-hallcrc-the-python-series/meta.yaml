    \ Package structure\n\n### 3.2.1 A brief introduction\n\nTo develop our `pycounts`\
    \ package we first need to create an appropriate directory structure. Python packages\
    \ consist of a specific directory structure typically including the following:\n\
    \n- A root directory with the name of the package, e.g., `pycounts/`;\n- One or\
