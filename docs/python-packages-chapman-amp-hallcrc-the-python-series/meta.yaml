    # # 3

    ## How to package a Python


    In this chapter we will develop an entire example Python package from beginning-to-end
    to demonstrate the key steps involved in developing a package. This chapter forms
    the foundation of this book. It contains everything you need to know to create
    a Python package and can be used as a reference sheet when creating packages in
    the future. Later chapters explore each of the individual steps in the packaging
    process in further detail.


    The example package we are going to create in this chapter will help us calculate
    word counts from a text file. We''ll be calling it `pycounts`, and it will be
    useful for calculating word usage in texts such as novels, research papers, news
    articles, log files, and more.


    # ### 3.1 Counting words in a text file

    #### 3.1.1 Developing our code


    Before even thinking about making a package, we''ll first develop the code we
    want to package up. The `pycounts` package we are going to create will help us
    calculate word counts from a text file. Python has a useful `Counter` object that
    can be used to calculate counts of a collection of elements (like a list of words)
    and store them in a dictionary.


    We can demonstrate the functionality of `Counter` by first opening up a Python
    interpreter by typing `python` at the command line:


    ```

    $ python

    ```


    We can then import the `Counter` class from the `collections` module:


    ```

    >>> from collections import Counter

    ```


    Now we will define and use a sample list of words to create a `Counter` object:'
