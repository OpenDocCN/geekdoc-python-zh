    # 8.5 Setting up continuous deployment


    In the previous step, we set up CI for our package to check that tests run, code
    coverage is stable, and documentation still builds, whenever we make a push or
    pull request with new changes to the main branch of our repository.


    In this section, we’ll set up continuous deployment (CD). If the changes we push
    to our repository pass our CI, then we want a CD workflow that will automatically:


    +   1. Create a new version of our pycounts package.

    2. Build new distributions (i.e., sdist and wheel).

