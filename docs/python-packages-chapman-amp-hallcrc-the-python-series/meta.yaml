    - MIT license: allows users to do whatever they want with your software, as long
    as they include the original copyright and license notice in any copy or substantial
    modification of it.

    - GNU General Public License v3 (GPL-3): less permissive than the above licenses.
    Any changes made to your software must be recorded, and the complete source code
    of the original software and modifications of it must be made available under
    the same GPL-3 license.


    If you don’t include a license, then default copyright laws apply, which typically
    means that you retain all rights to your source code, and no one may download,
    reproduce, distribute, or create derivative works from your package. This might
    be fine if you want to keep your work private or proprietary, but if you open-source
    your work without a license, others will be unable to use or contribute to it.


    # 6.2.3 Contributing guidelines


    A contributing guidelines file (often named “CONTRIBUTING”) outlines procedures
    for how users can contribute to your project. These guidelines will vary depending
    on how you’re sharing your package’s source with others, but they typically include
    information on what kinds of contributions you’re accepting, and how to make those
    contributions (usually via the use of a version control system). GitHub provides
    a good guide<sup>10</sup> for adding a contributing file to your project.


    Having clear contributing guidelines streamlines the incorporation of contributions
    into your package. Without contributing guidelines, it’s not clear how others
    should effectively contribute, or if you would like contributions at all. As a
    result, you may receive contributions you don’t want, or in a way you don’t want,
    which could waste your and other people’s time.


