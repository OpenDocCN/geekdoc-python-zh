    # 2.5.3 RStudio


    Users with an R background may prefer to stay in the RStudio IDE. We recommend
    installing the most recent version of the IDE from the RStudio website<sup>27</sup>
    (we recommend installing at least version ^1.4) and then installing the most recent
    version of R from CRAN<sup>28</sup>. To use Python in RStudio, you will need to
    install the reticulate<sup>29</sup> R package by typing the following in the R
    console inside RStudio:


    ```

    install.packages("reticulate")

    ```


    When installing reticulate, you may be prompted to install the Anaconda distribution.
    We already installed the Miniconda distribution of Python in **Section 2.2.1**,
    so answer “no” to this prompt. Before being able to use Python in RStudio, you
    will need to configure reticulate. We will briefly describe how to do this for
    different operating systems below, but we encourage you to look at the reticulate
    documentation<sup>30</sup> for more help.


    # Mac and Linux


    +   1. Find the path to the Python interpreter installed with Miniconda by typing
    `which python` at the command line.

    2. Open (or create) an `.Rprofile` file in your HOME directory and add the line
    `Sys.setenv(RETICULATE_PYTHON = "path_to_python")`, where `"path_to_python"` is
    the path identified in step 1.

    3. Open (or create) a `.bash_profile` file in your HOME directory and add the
    line `export PATH="/opt/miniconda3/bin:$PATH"`, replacing `/opt/miniconda3/bin`
    with the path you identified in step 1 but without the `python` at the end.

    4. Restart R.

    5. Try using Python in RStudio by running the following in the R console:


    ```

    library(reticulate)

    repl_python()

    ```


    # Windows


    +   1. Find the path to the Python interpreter installed with Miniconda by opening
    an Anaconda Prompt from the Start Menu and typing `where python` in a terminal.'
- md: "## 2.6 Developing with Docker\n\n1.  Open (or create) an .Rprofile file in\
    \ your HOME directory and add the line `Sys.setenv(RETICULATE_PYTHON = \"path_to_python\"\
    )`, where \"path_to_python\" is the path identified in step 1. Note that in Windows,\
    \ you need `\\` instead of `/` to separate the directories; for example your path\
    \ might look like: `C:\\Users\\miniconda3\\python.exe`.\n2.  Open (or create)\
    \ a .bash_profile file in your HOME directory and add the line `export PATH=\"\
    /opt/miniconda3/bin:$PATH\"`, replacing `/opt/miniconda3/bin` with the path you\
    \ identified in step 1 but without the python at the end.\n3.  Restart R.\n4.\
    \  Try using Python in RStudio by running the following in the R console:\n\n\
    ```\nlibrary(reticulate)\nrepl_python()\n```\n\nFig. 2.4 shows an example of executing\
    \ Python code interactively within the RStudio console.\n\n![](img/d3840bdab18c2309faf9de63e70c539d_31_0.png)\n\
    \nFIGURE 2.4: Executing Python code in the RStudio.\n\nIf you have issues installing\
    \ or using any of the software in this book on your specific operating system,\
    \ or would prefer to use Docker to help develop your Python packages, we have\
    \ provided an alternative software setup with Docker that has everything you need\
    \ already installed to get started. Docker$^{31}$ is a platform that allows you\
    \ to run and develop software in an isolated environment called a *container*.\
    \ *Images* contain the instructions required to create a container.\n\nWe have\
    \ developed Docker images to support Python package development in Visual Studio\
    \ Code or JupyterLab, and we describe minimal workflows for using these images\
    \ to follow along with this book in the sections below. Feel free to customize\
    \ these images and/or workflows to suit your specific use cases. We will continue\
    \ to maintain the Docker images via their GitHub repositories (py-pkgs/docker-vscode$^{32}$\
    \ and py-pkgs/docker-jupyter$^{33}$) to support readers of this book into the\
    \ future.\n\n### 2.6.1 Docker with Visual Studio Code\n\nTo develop with Docker\
    \ inside Visual Studio Code, you can consult the Visual Studio Code official container\
    \ tutorial$^{34}$, or try following the steps below:\n\n1.  Install Visual Studio\
    \ Code from the official website$^{35}$.\n2.  Install and configure Docker Desktop\
    \ for your operating system following the instructions on the official website$^{36}$.\n\
    3.  Once docker is installed, open a command-line interface and pull the pypkgs/vscode\
    \ docker image by running the following command:\n\n```\n$ docker pull pypkgs/vscode\n\
    ```\n\n4.  From Visual Studio Code, open/create the working directory you want\
    \ to develop in (this can be called anything and located wherever you like on\
    \ your file system).\n5.  In Visual Studio Code, open the *Extensions* tab on\
    \ the Visual Studio Code activity bar and search for the \"Remote - Containers\"\
    \ extension in the search bar. Install this extension if it is not already installed.\n\
    6.  Create a file called *.devcontainer.json* in your current working directory\
    \ (be sure to include the period at the beginning of the file name). This file\
    \ will tell Visual Studio Code how to run in a Docker container. You can read\
    \ more about this configuration in the official documentation$^{37}$, but for\
    \ now, a minimal set up requires adding the following content to that file:\n\n\
    ```\n{\n    \"name\": \"poetry\",\n    \"image\": \"pypkgs/vscode\",\n    \"extensions\"\
    : [\"ms-python.python\"],\n}\n```\n\n7.  Now, open the Visual Studio Code Command\
    \ Palette$^{38}$ and search for and select the command “Remote-Containers: Reopen\
    \ in Container”. This command will open Visual Studio Code inside a container\
    \ made using the pypkgs/vscode Docker image. After Visual Studio Code finishes\
    \ opening in the container, test that you have access to the three pre-installed\
    \ pieces of packaging software we need by opening the integrated terminal$^{39}$\
    \ and trying the following commands:\n\n```\n$ poetry --version\n$ conda --version\n\
    $ cookiecutter --version\n```\n\n8.  Your development environment is now set up,\
    \ and you can work with Visual Studio Code as if everything were running locally\
    \ on your machine (except now your development environment exists inside a container).\
    \ If you exit Visual Studio Code, your container will stop but will persist on\
    \ your machine. It can be re-opened at a later time using the “Remote-Containers:\
    \ Reopen in Container” command we used in step 7.\n9.  If you want to completely\
    \ remove your development container to free up memory on your machine, first find\
    \ the container’s ID:\n\n```\n$ docker ps -a\n```\n\n| CONTAINER ID | IMAGE |\n\
    |---|---|\n| 762bca6eb51e | pypkgs/vscode |\n\n10. Then use the docker rm command\
    \ combined with the container's ID. This will remove the container, including\
    \ any packages or virtual environments installed in it. However, any files and\
    \ directories you created will persist on your machine.\n\n```\n$ docker rm 762bca6eb51e\n\
    ```\n\n### 2.6.2 Docker with JupyterLab\n\nTo develop with Docker in JupyterLab\
    \ follow the instructions below. Helpful information and tutorials can also be\
    \ found in the Jupyter Docker Stacks documentation<sup>40</sup>.\n\n1.  Install\
    \ and configure Docker Desktop for your operating system following the instructions\
    \ on the official website<sup>41</sup>.\n2.  Once Docker has been installed, open\
    \ a command-line interface and pull the pypkgs/jupyter Docker image by running\
    \ the docker pull command as follows:\n\n```\n$ docker pull pypkgs/jupyter\n```\n\
    \n3.  From the command line, navigate to the directory you want to develop in\
    \ (this can be called anything and located wherever you like on your file system).\n\
    4.  Start a new container from that directory by running the following command\
    \ from the command line:\n\n```\n$ docker run -p 8888:8888 \\\n    -v \"${PWD}\"\
    :/home/jovyan/work \\\n    pypkgs/jupyter\n```\n\nIn the command above, `-p` binds\
    \ port 8888 in the container to port 8888 on the host machine and `-v` mounts\
    \ the current directory into the container at the location `/home/jovyan/work`.\
    \ Windows users that run into issues with the command above may need to try double-slashes\
    \ in the volume mount path, for example: `-v /$(pwd) ://home//jovyan//work`. You\
    \ can read more about the docker run command and its arguments in the Docker command-line\
    \ interface documentation<sup>42</sup>.\n\n5.  Copy the unique URL printed to\
    \ screen (that looks something like this: `http://127.0.0.1:8888/lab?token=45d53a348580b3acfafa`)\
    \ to your browser. This will open an instance of JupyterLab running inside a Docker\
    \ container.\n6.  Navigate to the work directory in JupyterLab. This is where\
    \ you can develop and create new files and directories that will persist in the\
    \ directory from where you launched your container.\n7.  Test that you have access\
    \ to the three pre-installed pieces of packaging software we need by opening a\
    \ terminal in JupyterLab and trying the following commands:\n\n```\n$ poetry --version\n\
    $ conda --version\n$ cookiecutter --version\n```\n\n8.  When you've finished a\
    \ working session, you can exit JupyterLab, and kill your terminal, and your container\
    \ will persist. You can restart the container and launch JupyterLab again by first\
    \ finding its ID:\n\n```\n$ docker ps -a\n```\n\n| CONTAINER ID | IMAGE |\n|---|---|\n\
    | 653daa2cd48e | pypkgs/jupyter |\n\n9.  Then, to restart the container and launch\
    \ JupyterLab, use the docker start -a command combined with the container's ID:\n\
    \n```\n$ docker start -a 653daa2cd48e\n```\n\n10. If you want to completely remove\
    \ the container you can use the docker rm command. This will remove the container,\
    \ including any packages or virtual environments installed in it. However, all\
    \ files and directories added to the work directory will persist on your machine.\n\
    \n```\n$ docker rm 653daa2cd48e\n```\n\n# 3 How to package a Python\n\nIn this\
    \ chapter we will develop an entire example Python package from beginning-to-end\
    \ to demonstrate the key steps involved in developing a package. This chapter\
    \ forms the foundation of this book. It contains everything you need to know to\
    \ create a Python package and can be used as a reference sheet when creating packages\
    \ in the future. Later chapters explore each of the individual steps in the packaging\
    \ process in further detail.\n\nThe example package we are going to create in\
    \ this chapter will help us calculate word counts from a text file. We'll be calling\
    \ it `pycounts`, and it will be useful for calculating word usage in texts such\
    \ as novels, research papers, news articles, log files, and more.\n\n### 3.1 Counting\
    \ words in a text file\n\n#### 3.1.1 Developing our code\n\nBefore even thinking\
    \ about making a package, we'll first develop the code we want to package up.\
    \ The `pycounts` package we are going to create will help us calculate word counts\
    \ from a text file. Python has a useful `Counter` object that can be used to calculate\
    \ counts of a collection of elements (like a list of words) and store them in\
    \ a dictionary.\n\nWe can demonstrate the functionality of `Counter` by first\
    \ opening up a Python interpreter by typing `python` at the command line:\n\n\
    ```\n$ python\n```\n\nWe can then import the `Counter` class from the `collections`\
    \ module:\n\n```\n>>> from collections import Counter\n```\n\nNow we will define\
    \ and use a sample list of words to create a `Counter` object:"
  mdcn: "## 2.6 使用 Docker 进行开发\n\n1.  在你的 HOME 目录中打开（或创建）一个 .Rprofile 文件，并添加一行 `Sys.setenv(RETICULATE_PYTHON\
