    # 3.1 Counting words in a text file


    Now that we have a text file to work with, we can go back to developing our word-counting
    workflow. To open `zen.txt` in Python, we can use the `open()` function to open
    the file and then the `.read()` method to read its contents as a Python string.
    The code below, run in a Python interpreter, saves the contents of `zen.txt` as
    a string in the variable `text`:


    ```

    >>> with open("zen.txt") as file:

    ...     text = file.read()

    ```


    Let''s see what `text` looks like:


    ```

    >>> text

    ```


    ```

    "The Zen of Python, by Tim Peters\n\nBeautiful is better\nthan ugly.\nExplicit
    is better than implicit.\nSimple is\nbetter than complex.\nComplex is better than
    complicated\n..."

    ```


    We can see that the `text` variable is a single string, with the `\n` symbols
    indicating a new line in the string.


    Before we split the above text into individual words for counting with `Counter`,
    we should lowercase all the letters and remove punctuation so that if the same
    word occurs multiple times with different capitalization or punctuation, it isn''t
    treated as different words by `Counter`. For example we want "Better", "better",
    and "better!" to result in three counts of the word "better".


    To lowercase all letters in a Python string, we can use the `.lower()` method:


    ```

    >>> text = text.lower()

    ```


    To remove punctuation, we can find them in our string and replace them with nothing
    using the `.replace()` method. Python provides a collection of common punctuation
    marks in the `string` module:


    ```

    >>> from string import punctuation

    >>> punctuation

    ```


    ```

    ''!"#$%&\''()*+,-./:;<=>?@[\]^_`{|}~''

    ```


    We can use a `for` loop to remove each of the above punctuation marks from our
    `text` variable by replacing it with nothing, i.e., an empty string (""):'
