    - sphinx-autoapi: extension that will parse our source code and docstrings to
    create an API reference sheet.

    - sphinx.ext.napoleon: extension that enables sphinx to parse numpydoc style docstrings.

    - sphinx.ext.viewcode: extension that adds a helpful link to the source code of
    each object in the API reference sheet.


    These extensions are not necessary to create documentation with sphinx, but they
    are all commonly used in Python packaging documentation and significantly improve
    the look and user-experience of the generated documentation. Extensions without
    the sphinx.ext prefix need to be installed. We can install them as development
