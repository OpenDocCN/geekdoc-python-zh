    \      with:\n        python-version: 3.9\n\n    - name: Check-out repository\n\
    \      uses: actions/checkout@v2\n\n    - name: Install poetry\n      uses: snok/install-poetry@v1\n\
    \n    - name: Install package\n      run: poetry install\n```\n\nThe above steps\
    \ will set up our system in preparation for:\n\n+   1. Running pycounts's unit\
    \ tests with pytest.\n2. Checking the code coverage of our tests.\n3. Checking\
    \ that pycounts's documentation builds correctly.\n\nWe'll create each of these\
    \ steps in the following sections.\n\n<sup>10</sup>https://github.com/actions/checkout\n\
    <sup>11</sup>https://github.com/snok/install-poetry"
