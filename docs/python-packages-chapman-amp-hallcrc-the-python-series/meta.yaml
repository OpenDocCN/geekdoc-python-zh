    ```

    [tool.poetry.dependencies]

    python = "^3.9"


    [tool.poetry.dev-dependencies]


    [build-system]

    requires = ["poetry-core>=1.0.0"]

    build-backend = "poetry.core.masonry.api"

    ```


    Table 3.2 provides a brief description of each of the headings in that file (called
    “tables” in TOML file jargon).


    **TABLE 3.2:** A description of the tables in the pyproject.toml.


    | TOML table | Description |

    |---|---|

    | [tool.poetry] | Defines package metadata. The name, version, description, and
    authors of the package are required. |

    | [tool.poetry.dependencies] | Identifies dependencies of a package — that is,
    software that the package depends on. Our pycounts package only depends on Python
    3.9 or higher, but we’ll add other dependencies to our package later in this chapter.
    |

    | [tool.poetry.dev-dependencies] | Identifies development dependencies of a package
    — dependencies required for development purposes, such as running tests or building
    documentation. We’ll add development dependencies to our pycounts package later
    in this chapter. |

    | [build-system] | Identifies the build tools required to build your package.
    We’ll talk more about this in Section 3.10. |


    With our *pyproject.toml* file already set up for us by the py-pkgs-cookiecutter
    template, we can use poetry to install our package using the command `poetry install`
    at the command line from the root package directory:'
