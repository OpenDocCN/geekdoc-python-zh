    pull request with new changes to the main branch of our repository.


    In this section, we’ll set up continuous deployment (CD). If the changes we push
    to our repository pass our CI, then we want a CD workflow that will automatically:


    +   1. Create a new version of our pycounts package.

    2. Build new distributions (i.e., sdist and wheel).

    3. Upload the distributions to TestPyPI and test that the package can be installed
    successfully.'
- md: "## 8.5 Setting up continuous deployment\n\n![](img/d3840bdab18c2309faf9de63e70c539d_221_0.png)\n\
    \nFIGURE 8.6: Continuous integration workflow logs.\n\n- 4. Upload the distributions\
    \ to PyPI.\n\nWe'll build up that CD workflow in this section.\n\n### 8.5.1 Setup\n\
    \nTo set up CD, we'll add to the `.github/workflows/ci-cd.yml` workflow file we\
    \ created in [Section 8.4](#section-8-4). Our aim here is to add a new job called\
    \ “cd” to this workflow that will trigger a deployment of our package each time\
    \ updated code is pushed to the main branch of our repository. We only want this\
    \ job to execute if:\n\n- 1. The “ci” job passes — we don't want to deploy a new\
    \ version of our package if it isn't passing CI. We can specify this constraint\
    \ using the needs keyword in GitHub Actions (documentation<sup>17</sup>).\n- 2.\
    \ Code is pushed to the main branch — we don't want to deploy a new version of\
    \ our package when a pull request is opened, we only want to deploy a new version\
    \ when a pull request is merged into the main branch or changes are pushed to\
    \ the main branch directly. We can specify this constraint using the if syntax\
    \ in GitHub Actions (documentation<sup>18</sup>).\n\nWe can set up a new job and\
    \ add the two constraints above with the following syntax:\n\n```yaml\nname: ci-cd\n\
    \non: [push, pull_request]\n\njobs:\n  ci:\n    # ...\n    # CI steps hidden\n\
    \    # ...\n\n  cd:\n    # Only run this job if the \"ci\" job passes\n    needs:\
    \ ci\n\n    # Only run this job if new work is pushed to the \"main\" branch\n\
    \    if: github.event_name == 'push' && github.ref == 'refs/heads/main'\n```\n\
    \nNow we can set up our CD workflow. In GitHub Actions, each job runs on a fresh\
    \ runner, which we need to set up from scratch. Once we've done that, our CD workflow\
    \ will effectively comprise all the steps we walked through manually in **Chapter\
    \ 7: Releasing and versioning**. Below we list all the steps required to set up\
    \ the CD workflow:\n\n- 1. Specify an operating system. We'll be using Ubuntu\
    \ again with the syntax runs-on: ubuntu-latest.\n- 2. Install Python (action:\
    \ actions/setup-python@v2<sup>19</sup>).\n- 3. Check out our repository so we\
    \ can access its contents (action: actions/checkout@v2<sup>20</sup>).\n- 4. Install\
    \ poetry (action: snok/install-poetry@v1<sup>21</sup>).\n- 5. Use poetry to install\
    \ pycounts (command: poetry install).\n- 6. Make a new release of pycounts (command:\
    \ semantic-release publish, this uses the Python Semantic Release (PSR)<sup>22</sup>\
    \ tool which we described in Section 7.2.2 and will describe again below).\n-\
    \ 7. Upload new release to TestPyPI (action: pypa/gh-action-pypi-publish@release/v1<sup>23</sup>).\n\
    - 8. Test that the new package version installs successfully from TestPyPI (command:\
    \ pip install).\n- 9. Upload new release to PyPI (action: pypa/gh-action-pypi-publish@release/v1<sup>24</sup>).\n\
    \nSteps 1 to 5 are the same as we set up previously for our CI workflow, so we\
    \ can just copy and paste them into our “cd” job as below. The only new code here\
    \ is that we specify the input parameter fetch-depth: 0 for the actions/checkout@v2<sup>25</sup>\
    \ action. This input parameter will allow the PSR tool to access the full history\
    \ of commits in our repository, so that it can determine how to bump the package’s\
    \ version. Without this parameter, PSR can only access the single most recent\
    \ commit message.\n\n```yaml\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n\
    \  ci:\n    # ...\n    # CI steps hidden\n    # ...\n\n  cd:\n    # Only run this\
    \ job if the \"ci\" job passes\n    needs: ci\n\n    # Only run this job if new\
    \ work is pushed to \"main\"\n    if: github.event_name == 'push' && github.ref\
    \ == 'refs/heads/main'\n\n    # Set up operating system\n    runs-on: ubuntu-latest\n\
    \n    # Define job steps\n    steps:\n      - name: Set up Python 3.9\n      \
    \  uses: actions/setup-python@v2\n        with:\n          python-version: 3.9\n\
    \n      - name: Check-out repository\n        uses: actions/checkout@v2\n    \
    \    with:\n          fetch-depth: 0\n\n      - name: Install poetry\n       \
    \ uses: snok/install-poetry@v1\n\n      - name: Install package\n        run:\
    \ poetry install\n```\n\nWe'll discuss steps 6 to 9 in the sections below.\n\n\
    ### 8.5.2 Automatically creating a new package version\n\nAs we saw in **Chapter\
    \ 7: Releasing and versioning**, there are a few key steps to go through when\
    \ creating a new version of your package:\n\n- 1. Document what's changed in the\
    \ *CHANGELOG.md*.\n- 2. Bump the package version number.\n- 3. Tag a new release\
    \ on GitHub.\n- 4. Build a new sdist and wheel.\n\nIn **Section 7.2.2**, we introduced\
    \ the Python Semantic Release (PSR)<sup>26</sup> tool, which can automatically\
    \ bump your package's version number based on keywords it finds in commit messages.\n\
    \nHowever, PSR can do more than this! In fact, it can do all the steps we list\
    \ above. In **Section 7.2.2**, we saw how PSR is configured using a table called\
    \ [tool.semantic_release] in the *pyproject.toml*. To configure it to perform\
    \ all the steps above, we need to add a few keys to that table as follows:\n\n\
    <sup>26</sup> https://python-semantic-release.readthedocs.io/en/latest/\n\n```toml\n\
    [tool.semantic_release]\nversion_variable = \"pyproject.toml:version\" # version\
    \ location\nbranch = \"main\" # branch to make releases of\nchangelog_file = \"\
    CHANGELOG.md\" # changelog file\nbuild_command = \"poetry build\" # build dists\n\
    dist_path = \"dist/\" # where to put dists\nupload_to_release = true # auto-create\
    \ GitHub release\nupload_to_pypi = false # don't auto-upload to PyPI\nremove_dist\
    \ = false # don't remove dists\npatch_without_tag = true # patch release by default\n\
    ```\n\nWe've added comments above to clarify what each key is doing in the table,\
    \ and we describe them in Table 8.2. You can also read more about these configuration\
    \ options in the PSR documentation<sup>27</sup>.\n\n**TABLE 8.2: Description of\
    \ Python Semantic Release configuration options.**\n\n| Key | Description |\n\
    | :--- | :--- |\n| version_variable | Location of version number for PSR to bump.\
    \ |\n| branch | Branch where releases should be made from. |\n| changelog_file\
    \ | Location of changelog file for PSR to update using commit messages. |\n| build_command\
    \ | How to build new distributions for the release. |\n| dist_path | Location\
    \ of distributions after running build_command. |\n| upload_to_release | Whether\
    \ to automatically create a release of the new package version on GitHub. |\n\
    | upload_to_pypi | Whether to upload to PyPI. Default is true, but we want to\
    \ upload to TestPyPI first to test things out, so we've turned this off. |\n|\
    \ remove_dist | Whether to remove distributions at dist_path after upload. We\
    \ turned this off because we want to upload these distributions to TestPyPI and\
    \ PyPI ourselves. |\n| patch_without_tag | Always create a new patch release even\
    \ if there is no trigger tag, such as “fix” or “feat”, in any commits since the\
    \ last release. |\n\n<sup>27</sup> https://python-semantic-release.readthedocs.io/en/latest/configuration.html\n\
    \nWith PSR configured in our *pyproject.toml*, we can now add it as a step to\
    \ our CD workflow.\n\nIn **Section 7.2.2**, we used the command `semantic-release\
    \ version` to get PSR to automatically update our version based on keywords it\
    \ finds in all the commit messages that have been made since the last tag of your\
    \ package. In our CD workflow, we’ll be using the slightly different command `semantic-release\
    \ publish`, which will bump our version, update our changelog, tag a new release\
    \ on GitHub, and build a new sdist and wheel.\n\nPSR will need to interact with\
    \ our GitHub repository to modify our *CHANGELOG.md* file and tag a new release\
    \ of our package. To give PSR permission to do this there’s a few things we need\
    \ to do:\n\n- 1. Provide PSR with a GitHub access token<sup>28</sup> called `GH_TOKEN`\
    \ to allow it to read/write files in our repository. At the start of each workflow\
    \ run, GitHub automatically creates<sup>29</sup> such a token for us, called `GITHUB_TOKEN`.\
    \ We can pass this token to PSR using the `env` key and the syntax `${{ secrets.GITHUB_TOKEN\
    \ }}`. You can read more about this syntax in the GitHub documentation<sup>30</sup>,\
    \ but we’ve done it for you in the code shown below.\n- 2. Configure the Git credentials\
    \ of the runner machine by setting the username as `github-actions` and email\
    \ address as `github-actions@github.com`. If you don’t configure these credentials,\
    \ the workflow won’t be able to make changes to our repository, as you can read\
    \ more about in the GitHub documentation<sup>31</sup>. We’ve also done this for\
    \ you in the code shown below, so all you need to do is add this code as the next\
    \ step in your CD workflow file.\n\n```yaml\n- name: Use Python Semantic Release\
    \ to prepare release\n  env:\n```\n\n<sup>28</sup> https://python-semantic-release.readthedocs.io/en/latest/envvars.html#env-gh-token\n\
    <sup>29</sup> https://docs.github.com/en/actions/security-guides/automatic-token-authentication\n\
    <sup>30</sup> https://docs.github.com/en/actions/security-guides/encrypted-secrets#using-encrypted-secrets-in-a-workflow\n\
    <sup>31</sup> https://docs.github.com/en/get-started/getting-started-with-git/setting-your-username-in-git"
  mdcn: "## 8.5 设置持续部署\n\n![](img/d3840bdab18c2309faf9de63e70c539d_221_0.png)\n\n\
    图 8.6：持续集成工作流日志。\n\n- 4. 将分发包上传到 PyPI。\n\n我们将在本节中逐步构建该 CD 工作流。\n\n### 8.5.1 设置\n\
    \n要设置 CD，我们将在 [8.4 节](#section-8-4) 创建的 `.github/workflows/ci-cd.yml` 工作流文件中进行添加。我们的目标是向此工作流添加一个名为\
    \ \"cd\" 的新作业，该作业将在每次更新的代码推送到我们仓库的主分支时触发我们包的部署。我们只希望此作业在以下情况下执行：\n\n- 1. \"ci\"\
    \ 作业通过——我们不希望在包未通过 CI 时部署新版本。我们可以使用 GitHub Actions 中的 `needs` 关键字指定此约束（文档<sup>17</sup>）。\n\
    - 2. 代码被推送到主分支——我们不希望在打开拉取请求时部署包的新版本，我们只希望在拉取请求合并到主分支或更改直接推送到主分支时部署新版本。我们可以使用\
    \ GitHub Actions 中的 `if` 语法指定此约束（文档<sup>18</sup>）。\n\n我们可以使用以下语法设置一个新作业并添加上述两个约束：\n\
    \n```yaml\nname: ci-cd\n\non: [push, pull_request]\n\njobs:\n  ci:\n    # ...\n\
    \    # CI 步骤已隐藏\n    # ...\n\n  cd:\n    # 仅当 \"ci\" 作业通过时才运行此作业\n    needs: ci\n\
    \n    # 仅当新工作被推送到 \"main\" 分支时才运行此作业\n    if: github.event_name == 'push' && github.ref\
    \ == 'refs/heads/main'\n```\n\n现在我们可以设置我们的 CD 工作流。在 GitHub Actions 中，每个作业都在一个全新的运行器上运行，我们需要从头开始设置它。一旦完成，我们的\
    \ CD 工作流将有效地包含我们在 **第 7 章：发布和版本控制** 中手动执行的所有步骤。下面我们列出了设置 CD 工作流所需的所有步骤：\n\n- 1.\
    \ 指定操作系统。我们将再次使用 Ubuntu，语法为 `runs-on: ubuntu-latest`。\n- 2. 安装 Python（action:\
    \ `actions/setup-python@v2`<sup>19</sup>）。\n- 3. 检出我们的仓库以便访问其内容（action: `actions/checkout@v2`<sup>20</sup>）。\n\
    - 4. 安装 poetry（action: `snok/install-poetry@v1`<sup>21</sup>）。\n- 5. 使用 poetry\
    \ 安装 pycounts（命令：`poetry install`）。\n- 6. 发布 pycounts 的新版本（命令：`semantic-release\
    \ publish`，这使用了我们在 7.2.2 节中描述并将在下文再次描述的 Python Semantic Release (PSR)<sup>22</sup>\
    \ 工具）。\n- 7. 将新版本上传到 TestPyPI（action: `pypa/gh-action-pypi-publish@release/v1`<sup>23</sup>）。\n\
    - 8. 测试新包版本是否能从 TestPyPI 成功安装（命令：`pip install`）。\n- 9. 将新版本上传到 PyPI（action: `pypa/gh-action-pypi-publish@release/v1`<sup>24</sup>）。\n\
    \n步骤 1 到 5 与我们之前为 CI 工作流设置的相同，因此我们可以直接将它们复制并粘贴到我们的 \"cd\" 作业中，如下所示。这里唯一的新代码是我们为\
    \ `actions/checkout@v2`<sup>25</sup> action 指定了输入参数 `fetch-depth: 0`。此输入参数将允许\
    \ PSR 工具访问我们仓库的完整提交历史，以便它可以确定如何增加包的版本号。没有此参数，PSR 只能访问最近的单个提交消息。\n\n```yaml\nname:\
    \ ci-cd\n\non: [push, pull_request]\n\njobs:\n  ci:\n    # ...\n    # CI 步骤已隐藏\n\
    \    # ...\n\n  cd:\n    # 仅当 \"ci\" 作业通过时才运行此作业\n    needs: ci\n\n    # 仅当新工作被推送到\
    \ \"main\" 时才运行此作业\n    if: github.event_name == 'push' && github.ref == 'refs/heads/main'\n\
    \n    # 设置操作系统\n    runs-on: ubuntu-latest\n\n    # 定义作业步骤\n    steps:\n     \
    \ - name: Set up Python 3.9\n        uses: actions/setup-python@v2\n        with:\n\
    \          python-version: 3.9\n\n      - name: Check-out repository\n       \
    \ uses: actions/checkout@v2\n        with:\n          fetch-depth: 0\n\n     \
    \ - name: Install poetry\n        uses: snok/install-poetry@v1\n\n      - name:\
    \ Install package\n        run: poetry install\n```\n\n我们将在下面的章节中讨论步骤 6 到 9。\n\
    \n### 8.5.2 自动创建新的包版本\n\n正如我们在 **第 7 章：发布和版本控制** 中所看到的，在创建包的新版本时需要经过几个关键步骤：\n\n\
    - 1. 在 *CHANGELOG.md* 中记录更改内容。\n- 2. 增加包版本号。\n- 3. 在 GitHub 上标记新版本。\n- 4. 构建新的\
    \ sdist 和 wheel。\n\n在 **7.2.2 节** 中，我们介绍了 Python Semantic Release (PSR)<sup>26</sup>\
    \ 工具，它可以根据在提交消息中找到的关键字自动增加包的版本号。\n\n然而，PSR 能做的不止这些！事实上，它可以完成我们上面列出的所有步骤。在 **7.2.2\
    \ 节** 中，我们看到了如何使用 *pyproject.toml* 中名为 `[tool.semantic_release]` 的表来配置 PSR。要配置它执行上述所有步骤，我们需要在该表中添加几个键，如下所示：\n\
    \n<sup>26</sup> https://python-semantic-release.readthedocs.io/en/latest/\n\n\
    ```toml\n[tool.semantic_release]\nversion_variable = \"pyproject.toml:version\"\
    \ # 版本位置\nbranch = \"main\" # 进行发布的分支\nchangelog_file = \"CHANGELOG.md\" # 变更日志文件\n\
    build_command = \"poetry build\" # 构建分发包\ndist_path = \"dist/\" # 分发包存放位置\nupload_to_release\
    \ = true # 自动创建 GitHub 发布\nupload_to_pypi = false # 不自动上传到 PyPI\nremove_dist =\
    \ false # 不删除分发包\npatch_without_tag = true # 默认创建补丁版本\n```\n\n我们在上面添加了注释以阐明表中每个键的作用，并在表\
    \ 8.2 中进行了描述。您也可以在 PSR 文档<sup>27</sup>中阅读更多关于这些配置选项的信息。\n\n**表 8.2：Python Semantic\
    \ Release 配置选项说明。**\n\n| 键 | 描述 |\n| :--- | :--- |\n| version_variable | PSR 用于增加版本号的位置。\
    \ |\n| branch | 进行发布的分支。 |\n| changelog_file | PSR 使用提交消息更新的变更日志文件位置。 |\n| build_command\
    \ | 如何为发布构建新的分发包。 |\n| dist_path | 运行 `build_command` 后分发包的位置。 |\n| upload_to_release\
    \ | 是否在 GitHub 上自动创建新包版本的发布。 |\n| upload_to_pypi | 是否上传到 PyPI。默认为 true，但我们想先上传到\
    \ TestPyPI 进行测试，因此我们关闭了此选项。 |\n| remove_dist | 上传后是否删除 `dist_path` 处的分发包。我们关闭了此选项，因为我们想自己将这些分发包上传到\
    \ TestPyPI 和 PyPI。 |\n| patch_without_tag | 即使自上次发布以来的任何提交中没有触发标签（如 \"fix\" 或\
    \ \"feat\"），也始终创建新的补丁版本。 |\n\n<sup>27</sup> https://python-semantic-release.readthedocs.io/en/latest/configuration.html\n\
    \n在 *pyproject.toml* 中配置好 PSR 后，我们现在可以将其作为步骤添加到我们的 CD 工作流中。\n\n在 **7.2.2 节** 中，我们使用了命令\
    \ `semantic-release version` 来让 PSR 根据在自上次标签以来的所有提交消息中找到的关键字自动更新我们的版本。在我们的 CD\
    \ 工作流中，我们将使用略有不同的命令 `semantic-release publish`，它将增加我们的版本、更新我们的变更日志、在 GitHub 上标记新版本，并构建新的\
    \ sdist 和 wheel。\n\nPSR 需要与我们的 GitHub 仓库交互以修改我们的 *CHANGELOG.md* 文件并标记我们包的新版本。为了授予\
    \ PSR 执行此操作的权限，我们需要做几件事：\n\n- 1. 向 PSR 提供一个名为 `GH_TOKEN` 的 GitHub 访问令牌<sup>28</sup>，以允许它读取/写入我们仓库中的文件。在每次工作流运行开始时，GitHub\
    \ 会自动为我们创建<sup>29</sup>这样一个令牌，名为 `GITHUB_TOKEN`。我们可以使用 `env` 键和语法 `${{ secrets.GITHUB_TOKEN\
    \ }}` 将此令牌传递给 PSR。您可以在 GitHub 文档<sup>30</sup>中阅读更多关于此语法的信息，但我们在下面显示的代码中已经为您完成了此操作。\n\
    - 2. 通过将用户名设置为 `github-actions`，电子邮件地址设置为 `github-actions@github.com` 来配置运行器机器的\
    \ Git 凭据。如果您不配置这些凭据，工作流将无法对我们的仓库进行更改，您可以在 GitHub 文档<sup>31</sup>中阅读更多相关信息。我们也在下面显示的代码中为您完成了此操作，因此您只需将此代码作为下一步添加到您的\
    \ CD 工作流文件中即可。\n\n```yaml\n- name: Use Python Semantic Release to prepare release\n\
    \  env:\n```\n\n<sup>28</sup> https://python-semantic-release.readthedocs.io/en/latest/envvars.html#env-gh-token\n\
    <sup>29</sup> https://docs.github.com/en/actions/security-guides/automatic-token-authentication\n\
    <sup>30</sup> https://docs.github.com/en/actions/security-guides/encrypted-secrets#using-encrypted-secrets-in-a-workflow\n\
    <sup>31</sup> https://docs.github.com/en/get-started/getting-started-with-git/setting-your-username-in-git"
