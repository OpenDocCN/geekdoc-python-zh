    ⁴ https://pages.github.com\n\n## 6.2 Writing documentation\n\nTable 6.1 shows\
    \ the typical documentation included in a package and where it is usually located\
    \ in the package's directory structure. There's a lot of content to think about\
    \ here, but the reality is that most developers make Python packages from templates\
    \ that create most of this documentation automatically. For example, consider\
