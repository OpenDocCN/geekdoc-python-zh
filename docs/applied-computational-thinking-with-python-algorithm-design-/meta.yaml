    # 总结


    ## 2 计算思维的要素


    - 技术要求

    - 理解计算思维

    - 问题1 – 条件

    - 分解问题

    - 识别模式

    - 问题2 – 数学算法和泛化

    - 泛化模式

    - 设计算法

    - 附加问题

    - 问题3 – 儿童足球派对

    - 问题4 – 储蓄和利息

    - 总结


    ## 3 理解算法和算法思维


    - 技术要求

    - 深入定义算法

    - 算法应清晰且无歧义

    - 算法应有明确定义的输入和输出

    - 算法应具有有限性

    - 算法应具有可行性

    - 算法应与语言无关

    - 设计算法'
