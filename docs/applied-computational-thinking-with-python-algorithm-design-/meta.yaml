    # Debugging algorithms


    There is a debugger we can run in Python using the `breakpoint()` function (which
    is built-in). We can introduce this code into our program and insert it where
    we are unsure of our code. Adding `breakpoint()` will then check for bugs and
    errors. When we run a `breakpoint()` function, we’ll get a pdb output, which stands
    for **Python Debugger**. As a note, this built-in function appears in **Python
    3.7** and newer versions. The previous debugger for **Python 3.6** and older was
    `pdb.set_trace()`.


    When we run the debugger, we can use four commands:


