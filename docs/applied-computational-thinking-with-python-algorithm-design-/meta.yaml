    # Summary


    In this chapter, we have gone through the computational thinking process. We learned
    about the four major elements of computational thinking: decomposition, pattern
    recognition, pattern generalization, and algorithm design. We also learned that
    problems in computational thinking are not always clearly defined. It is up to
    us to interpret and decompose the information so we can find the patterns. Once
    we find the patterns and define what we’d like to generalize, we can then design
    algorithms in order to solve our problems.


    We also learned that algorithms and solutions are not unique. There are multiple
    ways to write an algorithm for each problem we encounter. The computational thinking
    process allows us to explore problems in multiple ways and create solutions that
    align with our own interpretations and needs.


    In the next chapter, we will be learning about algorithms and algorithmic thinking
    in more depth, as they are the product of all computational thinking problems.
