    \ and its definition, which, in turn, is used to provide a result or output.\n\
    \n**Input** is what is put into a system or machine. In computers, we have input\
    \ devices that the computer then interprets to provide a result or **output**.\
    \ As we look at the types of inputs and how we use input in algorithms, you’ll\
    \ see the output we get from those algorithms. Let’s take a look at some examples\
    \ of input devices:\n\n- **Keyboard**: When we use a keyboard, the computer interprets\
    \ the keys and uses them in various programs, such as document writing and search\
    \ bars\n- **Mouse**: The mouse is used to navigate our physical screens, helping\
    \ us click through content and scroll through pages\n- **Joystick**: A joystick\
    \ can be used to play computer games\n- **Microphone**: In more modern machines,\
    \ microphones are not only used to communicate through phone and video apps but\
    \ also to take verbal commands for **artificial intelligence (AI)** assistants\
    \ such as **Cortana** and **Siri**, as well as voice-to-text commands\n\nAll these\
    \ inputs are programmed into our computers so that they can be used. In Python,\
    \ we write algorithms that use inputs such as these. **User** input is when a\
    \ program asks the user for information that will then be used to produce the\
    \ output. Keep in mind that input and output can happen at any time within the\
    \ algorithm. We can also provide output feedback that requires additional input\
    \ from the user, and so on. Let’s take a look at how we can get user input from\
    \ Python.\n\nPython has one main prompt for users: the `input()` function. This\
    \ function is used to take user input, after which it automatically converts the\
    \ input into the user’s expected output.\n\nWe have used these main prompts before\
    \ in multiple programs, such as the store example in *Chapter 6, Exploring Problem\
    \ Analysis*. Let’s take a look at what some input commands look like in algorithms.\
    \ Take a look at the following code snippet:\n\n```\nch10_input1.py\n\nname =\
    \ input(\"What is your name? \")\nprint(\"Nice to meet you \" + name + \".\")\n\
    ```\n\nThis snippet asks the user for their name and then prints a statement using\
    \ the information from the input. The result of this code is as follows:\n\n```\n\
    What is your name? Mikayla\nNice to meet you Mikayla.\n```\n\nNow, we can just\
    \ ask for input without using any prompting questions, but the user will not know\
    \ what is being asked or how the information they provide will be used. Take a\
    \ look at the snippet without the prompts:\n\n```\nch10_input2.py\n\nname = input()\n\
    print(\"Nice to meet you \" + name + \".\")\n```\n\nWhen we run the preceding\
    \ program, nothing prints out in our shell. However, I knew there was something\
    \ I needed to type, so take a look at what happened when I just typed a letter:\n\
    \n```\nd\nNice to meet you d.\n```\n\nAs you can see, the user wouldn’t have known\
    \ what to do because the window doesn’t ask anything; it just gives a blank space\
    \ and the user has to assume that’s where you type the input. But this can cause\
    \ a lot of confusion since nothing tells the user whether it needs input or what\
    \ kind of thing they have to enter.\n\nWe can alleviate some of that confusion\
    \ by using `print` statements – for example, we can provide the user with information\
    \ about what input we’ll be asking for. We can also include a statement as part\
    \ of the `input()` function. For example, we could use a line of code such as\
    \ `name = input('What is your name? ')`, which would show the statement in quotations\
    \ first so that the user knows what we are asking. Either way, providing a statement\
    \ so that the user knows what is needed is important when we design our algorithms.\n\
    \nAs you saw in the preceding example, the `input()` function took a string and\
    \ then used that string in a `print()` statement. Let’s look at what a list would\
    \ look like using the `input` command:\n\n```\nch10_input3.py\n\n#Create the list\n\
    names = []\n#Ask user how many names will be added\nname = int(input(\"How many\
    \ names will be in the list? \"))\n#Iterate to add each name to the list\nfor\
    \ i in range(0, name):\n    people = str(input())\n    names.append(people)\n\
    print(names)\n```\n\nIn the preceding snippet, we create the list, which is not\
    \ shown to the user. The user is then asked how many names will be added to the\
    \ list. After that, we iterate through the list so that the user can input each\
    \ name separately. Finally, the names are appended and the list is printed. Take\
    \ a look at the output for this algorithm:\n\n```\nHow many names will be in the\
    \ list? 4\nManny\nLisa\nJohn\nKatya\n['Manny', 'Lisa', 'John', 'Katya']\n```\n\
    \nNote that the names don’t have a prompt, so the algorithm assumes the user will\
    \ know what to do after inputting a value of 4. This can be alleviated by adding\
    \ a prompt within the iteration in the algorithm. Take a look at the following\
    \ code snippet:\n\n```\nch10_input4.py\n\n#Create the list\nnames = []\n#Ask user\
    \ how many names will be added\nname = int(input(\"How many names will be in the\
    \ list? \"))\n#Iterate to add each name to the list\nfor i in range(0, name):\n\
    \    people = input(\"Type the next name on the list. \")\n    names.append(people)\n\
    print(names)\n```\n\nAs you can see, each name will now have a prompt that asks\
    \ the user to type the next name. This looks as follows when the algorithm is\
    \ run:\n\n```\nHow many names will be in the list? 4\nType the next name on the\
    \ list. Milo\nType the next name on the list. Sonya\nType the next name on the\
    \ list. Gabriel\nType the next name on the list. Maxine\n['Milo', 'Sonya', 'Gabriel',\
    \ 'Maxine']\n```\n\nThe preceding output shows the completed list and the prompts\
    \ for each of the names that were added to that list. Simple additions for those\
    \ prompts within the algorithm can alleviate confusion on the part of users when\
    \ they’re entering the inputs.\n\nAs you have seen, the inputs were read as integers,\
    \ strings, and lists. Python automatically converted the information so it could\
