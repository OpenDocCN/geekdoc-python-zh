    \ at your thermostat, you’re working with an automata. You set the temperature\
    \ you want and the thermostat reacts to an outside source to gather information\
    \ and adjust the temperatures accordingly. Another example of automata is surgical\
    \ robots. These robots can improve the outcomes of surgeries for patients and\
    \ are being improved upon constantly. Since the goal of automata theory is to\
