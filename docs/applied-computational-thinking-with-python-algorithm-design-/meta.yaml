    import pandas as pd

    import matplotlib.pyplot as plt

    from sklearn.model_selection import train_test_split

    from sklearn.pipeline import Pipeline

    from sklearn.naive_bayes import MultinomialNB

    from sklearn.feature_extraction.text import CountVectorizer

    from sklearn.metrics import confusion_matrix, classification_report

    ```


    2. Then, we''ll set up our *X* and *Y* axes by defining some variables:


    ```

    # Load your dataset

    dataset_path = r''C:\ ..\ dataset.csv''

    df = pd.read_csv(dataset_path)

    x = df[''Text'']

    y = df[''language'']

    ```


    Here, the dataset is loaded into a DataFrame, **df**. The dataset presumably contains
    text samples (**Text**) and their corresponding languages (**language**). **x**
    and **y** store the features and labels, respectively:'
