    \ m)\n```\n\n查看前面的代码，你可以看到分箱的数量被定义为5，因此数据将被分箱到五个列表中。分箱实际上是一种分组信息的方式。我们告诉算法我们想要这样做以及我们想要多少个分箱，它就会提供这些分箱或组中的数据。在这种情况下，我们得到了那五个列表。看看输出：\n\
    \n```\nEqual Frequency Binning:\n[3, 6, 7]\n[9, 11, 14]\n[10, 15, 19]\n[35, 38,\
