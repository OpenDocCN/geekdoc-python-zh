    \ or extensions of the Python programming language. More on that will be provided\
    \ in *Part 2, Applying Python and Computational Thinking*, of this book, where\
    \ we will explore the Python programming language in greater detail.\n\n## Computational\
    \ geometry\n\nLike symbolic computation, **computational geometry** lives in the\
    \ branch of computer science that deals with computational mathematics. The algorithms\
    \ we study in computational geometry are those that can be expressed with geometry.\
    \ The data is analyzed via geometric figures, geometric analysis, data structures\
    \ that follow geometric patterns, and more. The input and output of problems that\
    \ require computational geometry are geometric.\n\nWhen thinking of geometry,\
    \ we often revert to the figures we mostly associate with that branch of mathematics,\
    \ such as polygons, triangles, and circles. That said, when we look at computational\
    \ geometry, some of the algorithms are those that can be expressed by points,\
    \ lines, other geometric figures, or those that follow a geometric pattern. **Triangulation**\
    \ falls under this branch of computer science.\n\nData triangulation is important\
    \ for applications such as optical 3D measuring systems. We triangulate GPS signals\
    \ to locate a phone, for example, which is used in law enforcement.\n\nThere are\
    \ many uses of triangulation in modern times, some of which we’ll explore through\
    \ real and relevant problems throughout this book.\n\n## Computational number\
    \ theory\n\nNumber theory is a branch of mathematics that studies integers and\
    \ their properties. So, computational number theory involves studying algorithms\
    \ that are used to solve problems in number theory. Part of the study of number\
    \ theory is **primality testing**.\n\nAlgorithms that are created to determine\
    \ whether input or output is prime are used for many purposes. One of the most\
    \ critically important uses and applications of primality testing and number theory\
    \ is for encryption purposes. As our lives have moved to saving everything electronically,\
    \ our most personal information, such as banking information, family information,\
    \ and even social security numbers, lives in some code or algorithm. It is important\
    \ to encrypt such information so that others cannot use or access it. Computational\
    \ number theory and cryptography are intrinsically tied, as you will explore later.\n\
    \nSome of the theories presented are meant to help you understand how intertwined\
    \ computer science theories and their applications are, as well as their relevance\
    \ to what we do each day.\n\nIn this section, we learned about theoretical computer\
    \ science. We also learned about its various theories. Throughout this book, we\
    \ will be using computational thinking (discussed further in *Chapter 2, Elements\
    \ of Computational Thinking*) to help us tackle problems, from the most basic\
    \ applications to some complex analyses, by defining and designing adequate algorithms\
    \ that use these theories. Theoretical computer science is used to study a system’s\
    \ software, which we will explore next.\n\n## Learning about a system’s software\n\
    \n**System’s software** is used to perform multiple functions and communicate\
    \ between the OS of a computer, peripherals such as a keyboard and mouse, and\
    \ firmware, which is permanently saved to a device and is needed for its operation,\
    \ among other functions. These are part of the two main types of software: **system\
    \ software** and **application software**.\n\nSystem software allows a computer\
    \ to communicate between hardware and applications. Think of a smartphone. In\
    \ its most basic form, a phone is composed of hardware, which includes a battery,\
    \ cameras, memory, screen, and all the physical components and peripherals. The\
    \ OS allows those components to be used by applications.\n\nTake the camera application\
    \ of a phone. The system software lets the application communicate with the phone\
    \ to use the camera to take a picture, edit it, save it, and share it. A computer’s\
    \ OS also allows the hardware to communicate with programs. A design program will\
    \ use the mouse or other peripherals that can be used to draw, create, use a touch\
    \ screen if available, and more.\n\nIf we do not know our system’s software, we\
    \ cannot create applications that can communicate effectively with our hardware,\
    \ creating errors that can range from critical, or rendering a peripheral useless,\
    \ to minor, where some components may work, say taking a picture, but others may\
    \ not, such as saving or sharing the picture. The system software is created in\
    \ such a way that it provides us with the easiest, most efficient way to communicate\
    \ between the hardware and applications. To do this, systems use an OS. Let’s\
    \ take a look at what those systems are and what they do.\n\n## Operating systems\n\
    \nThe OS performs multiple tasks. As you may recall, error handling is part of\
    \ an OS that checks for the most common possible errors to fix them without creating\
    \ a larger problem or rendering an application worthless. Error handling is one\
    \ of the OS’s most important tasks. In addition, the OS is responsible for the\
    \ security of your computer or device. If you have a smartphone, you know that\
    \ many updates to the OS are done to fix a security problem or prevent a security\
    \ breach. The OS is responsible for only allowing an authorized user to interact\
    \ with the content that is stored in the device.\n\nIn addition to security and\
    \ error handling, an OS is responsible for allocating memory for files and organizing\
    \ them. When we save and delete a file or program, the memory that had been used\
    \ is freed."
  mdcn: "在信息论中，计算机科学家研究信息的量化、数据存储和信息通信。在信息论中，信息可以是模拟的，也可以是数字的。\n\n**模拟数据**是指由模拟信号表示的信息。反过来，模拟信号是在给定时间内变化的连续波。**数字信号**以二进制形式显示数据——即离散波。我们将模拟波表示为**正弦波**，将数字波表示为**方波**。下图显示了作为随时间变化的值的函数的正弦曲线：\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_41_0.png)\n\n图 1.5 – 模拟信号\n\n模拟信号由正弦波的关键要素描述：振幅、周期、频率和相位偏移：\n\
    \n- **振幅**是曲线从其中心的高度。正弦曲线无限重复。\n- **周期**是指正弦曲线一个周期的长度——即曲线开始重复之前的长度。\n- **频率**和正弦曲线的周期具有反比关系：\n\
    \n    频率 = 1 / 周期\n\n关于反比关系，我们还可以这样说：\n\n周期 = 1 / 频率\n\n- 正弦曲线的**相位偏移**是曲线从0开始的偏移量。这在下图中显示：\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_42_0.png)\n\n图 1.6 – 相位偏移示例\n\n相比之下，数字信号图看起来像条形图或直方图。它们只有两个数据点，0或1，所以它们看起来像方方正正的山丘和山谷：\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_42_1.png)\n\n图 1.7 – 数字信号\n\n**数字信号**具有有限的离散数据集。数据集是离散的，因为它包含单独且不同的数据点。对于模拟信号，数据是连续且无限的。在计算机科学中，这两种类型的信号都很重要且有用。我们将在本书的一些问题中探讨数字信号，特别是在*第17章，应用计算思维问题*中提出的问题。\n\
    \n## 自动机理论\n\n自动机理论是理论计算机科学中最引人入胜的主题之一。它涉及对机器的研究，以及如何可靠高效地完成计算。自动机理论涉及简单机器的物理方面，以及逻辑处理。那么，*自动机到底是用来做什么的，它是如何工作的呢？*\n\
    \n自动机是使用预定条件来响应外部输入的设备。当你查看恒温器时，你就是在使用自动机。你设定你想要的温度，恒温器会对外部源做出反应以收集信息并相应地调整温度。自动机的另一个例子是手术机器人。这些机器人可以改善患者的手术结果，并且正在不断改进。由于自动机理论的目标是制造可靠且高效的机器，因此它是开发人工智能和智能机器人机器（如手术机器人）的关键部分。\n\
    \n## 形式语言理论\n\n**形式语言理论**在计算机科学中通常与自动机理论相关联。形式语言理论涉及研究形式语言的语法、语法、词汇以及所有其他相关内容。在计算机科学中，形式语言是指计算机编程语言的逻辑处理和语法。关于自动机，机器处理形式语言以执行为其提供的任务或代码。\n\
    \n## 符号计算\n\n**符号计算**是计算数学的一个分支，涉及计算机代数。术语*符号计算*和*计算机代数*有时可以互换使用。一些编程软件和语言侧重于数学公式的符号计算。使用符号计算的程序执行诸如多项式因式分解、简化代数函数或表达式、寻找多项式的最大公约数等操作。\n\
    \n在本书中，我们将在解决一些现实世界问题时使用计算机代数和符号计算。Python不仅允许我们执行问题可能需要的数学计算，还允许我们探索这些计算产生的图形表示或模型。在探索现实世界问题的解决方案时，我们将需要使用Python编程语言的各种库或扩展。本书的*第2部分，应用Python和计算思维*将提供更多相关信息，我们将在其中更详细地探讨Python编程语言。\n\
    \n## 计算几何\n\n与符号计算一样，**计算几何**也属于计算机科学中处理计算数学的分支。我们在计算几何中研究的算法是那些可以用几何表达的算法。数据通过几何图形、几何分析、遵循几何模式的数据结构等进行分析。需要计算几何的问题的输入和输出都是几何的。\n\
    \n当想到几何时，我们通常会想到与该数学分支最相关的图形，如多边形、三角形和圆。也就是说，当我们观察计算几何时，其中一些算法是可以通过点、线、其他几何图形表达的，或者是遵循几何模式的。**三角剖分**属于计算机科学的这一分支。\n\
    \n数据三角剖分对于诸如光学3D测量系统等应用非常重要。例如，我们通过三角剖分GPS信号来定位手机，这在执法中被使用。\n\n在现代，三角剖分有许多用途，其中一些我们将在本书中通过真实且相关的问题进行探讨。\n\
    \n## 计算数论\n\n数论是研究整数及其性质的数学分支。因此，计算数论涉及研究用于解决数论问题的算法。数论研究的一部分是**素性测试**。\n\n为确定输入或输出是否为素数而创建的算法用于许多目的。素性测试和数论最关键的应用和用途之一是用于加密目的。随着我们的生活转向将所有内容电子化保存，我们最私人的信息，如银行信息、家庭信息，甚至社会安全号码，都存在于某种代码或算法中。加密此类信息非常重要，这样其他人就无法使用或访问它。计算数论和密码学是内在联系的，正如你稍后将探索的那样。\n\
    \n提出的一些理论旨在帮助你理解计算机科学理论及其应用是如何交织在一起的，以及它们与我们每天所做事情的相关性。\n\n在本节中，我们了解了理论计算机科学。我们还了解了它的各种理论。在本书中，我们将使用计算思维（在*第2章，计算思维要素*中进一步讨论）来帮助我们解决问题，从最基本的应用到一些复杂的分析，通过定义和设计使用这些理论的适当算法。理论计算机科学用于研究系统的软件，我们接下来将探讨这一点。\n\
    \n## 了解系统的软件\n\n**系统软件**用于执行多种功能，并在计算机的操作系统、键盘和鼠标等外围设备以及固件（永久保存在设备上并需要其操作）之间进行通信，以及其他功能。这些是两种主要软件类型的一部分：**系统软件**和**应用软件**。\n\
    \n系统软件允许计算机在硬件和应用程序之间进行通信。想想智能手机。在其最基本的形式中，手机由硬件组成，包括电池、摄像头、内存、屏幕以及所有物理组件和外围设备。操作系统允许这些组件被应用程序使用。\n\
    \n以手机的相机应用程序为例。系统软件让应用程序与手机通信，以使用相机拍照、编辑、保存和分享。计算机的操作系统也允许硬件与程序通信。设计程序将使用鼠标或其他可用于绘图、创建、使用触摸屏（如果可用）等的外围设备。\n\
    \n如果我们不了解系统的软件，我们就无法创建能够与硬件有效通信的应用程序，从而产生从严重（使外围设备无用）到轻微（某些组件可能工作，例如拍照，但其他组件可能无法工作，例如保存或分享照片）的错误。系统软件的创建方式为我们提供了在硬件和应用程序之间进行通信的最简单、最有效的方式。为此，系统使用操作系统。让我们看看这些系统是什么以及它们做什么。\n\
    \n## 操作系统\n\n操作系统执行多项任务。正如你可能记得的，错误处理是操作系统的一部分，它检查最常见的可能错误以修复它们，而不会产生更大的问题或使应用程序变得毫无价值。错误处理是操作系统最重要的任务之一。此外，操作系统负责计算机或设备的安全。如果你有智能手机，你会知道操作系统的许多更新都是为了修复安全问题或防止安全漏洞。操作系统负责只允许授权用户与存储在设备中的内容进行交互。\n\
    \n除了安全性和错误处理，操作系统还负责为文件分配内存并组织它们。当我们保存和删除文件或程序时，之前使用的内存会被释放。"
