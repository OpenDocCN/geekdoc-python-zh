    \n**输入**是用户可以输入的内容。所以，当我们定义变量时，我们将要求输入。在Python和任何其他语言中，一个好的做法是不要在没有指导的情况下要求输入。也就是说，我们想告诉用户他们正在回答的问题。例如，我可以编写以下代码来询问用户的身高输入：\n\
    \n```\nh = input(\"Enter your height in inches: \")\n```\n\n前面的代码将要求用户输入一些输入。它还要求用户以英寸为单位输入信息。如果你使用公制单位，你会相应地说明。\n\
    \n我们还将信息保存为变量`h`。但我们还没有对那个变量做任何事情。\n\n我们可以直接进行基本数学运算，并根据身高打印出我们得到的值：\n\n```\n\
