    \ the hypothesis is *it rains* and the conclusion is *use an umbrella*. We do\
    \ not include *if* or *then* in the hypotheses and conclusions.\n\nIn Python,\
    \ as you saw in the example in the *Applying inductive reasoning* section, we\
