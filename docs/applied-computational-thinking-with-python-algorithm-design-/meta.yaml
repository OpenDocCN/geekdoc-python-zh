  md: 'Remember, in computational thinking, we decompose the problem first, then we
    identify the pattern, then we generalize that pattern, and then we create the
    algorithm. So, let’s recognize that pattern.


    Let’s look at what we know so far and name some variables:


    +   - The total budget is $150

    - The cost of art pencils is $1.75 each

    - The cost of erasers is $1.50 each

    - Let’s use the variable $p$ for the number of pencils

    - Let’s use the variable $n$ for the number of erasers


    Remember that when we get to that algorithm, we may want to rename those variables.
    But for now, since we’re going to look at mathematical algorithms first, we’ll
    keep the simple variables.


    We can do this in one inequality. Why an inequality and not an equation? Because
    our total may not be exactly $150, but it can’t be *more* than $150 because that’s
    all the money we have.


    Because this is a simple problem, we’re identifying and generalizing that pattern
    in one move.


    So, the number of pencils times the cost plus the number of erasers times the
    cost is less than or equal to $150:


    $$1.75p + 1.50n \leq 150$$


    Now let’s talk about the algorithm design. Maybe this is something I buy regularly
    because I run art classes. I’m going to use that scenario. Maybe my employer gives
    me at most $150, but depending on what I used before, I may need more pencils
    than erasers and vice versa. So, I need a program that I can use and reuse at
    the beginning of every term. Was this part of my problem? No, this was an ill-defined
    problem. So, I’m adapting the problem based on a set of particular needs. In short,
    I’m defining the problem I want to solve.


    # IMPORTANT NOTE


    > As a side note for an inductive and deductive reasoning dilemma, it is important
    to understand that conditional statements, such as the *if/then* statements we
    use often in programming, are usually associated with deductive reasoning. We
    can go into a debate about whether or not they can be inductive, but the truth
    is, inductive reasoning problems will use deductive reasoning. We will look in
    depth at deductive reasoning statements in the next section of this chapter.


    So, I want the program to ask me how many pencils I want or I want it to ask me
    how many erasers I want. It all depends! Let’s look at what the program should
    do for us. The following steps show us this:


    +   1. Ask whether your input will be pencils or erasers.

    2. Choose an inequality to use based on the input provided.

    3. Identify how many of the pencils or erasers are possible (given the input).'
