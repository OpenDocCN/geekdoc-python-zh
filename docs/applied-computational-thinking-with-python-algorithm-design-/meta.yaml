    \nNow let’s take a look at some buggy code.\n\n```\nch5_buggyCode1.py\n\nimport\
    \ random\nfor i in range(0, 10):\n    n = random.randint(0, 5)\n    print(in)\n\
    ```\n\nLet’s try to execute this program. I’m getting a SyntaxError! It only highlights\
    \ my i. Why is that invalid syntax? I just want to get the product of i and n.\
    \ But here’s the problem, in Python programming, putting letters together does\
    \ not imply multiplication. That’s something some mathematicians do. And since\
    \ I was a mathematics teacher for more than 10 years before shifting focus, I\
    \ make that mistake OFTEN. The error is shown in Figure 5.3.\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_105_0.png)\n\
    \nIn order to fix this code, we’ll need Python to know we want to multiply those\
    \ values, so we use the symbol * between the i and the n. Let’s look at the fixed\
