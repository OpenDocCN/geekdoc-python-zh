  md: 'But things aren’t as simple as just the numbers. Let’s say that you need $100,000
    in pledges, as mentioned earlier in this chapter. Then, you’d need to figure out
    how much you’d charge for the tiers and put a price point on them. You’d need
    to make enough pledges available to at least reach that goal of $100,000.


    You have identified the retail price of your item as $800. Here are the costs
    for each of the items:


    +   - $640 for the item itself (given a 20% discount, and only applicable to tiers
    1, 2, and 3)

    - $100 in accessories (Tier 1 only)

    - $40 carrying case (applicable to tiers 1, 2, and 3)

    - Membership costs will be passed at $10 a month (let’s say the original cost
    is $35 a month)


    For Tier 1, the pledge would need to be a minimum of $1,540:


    +   - $640 \times 2 = 1280$

    - $12 \times 10 = 120$

    - $1280 + 120 + 100 + 40 = 1540$


    For Tier 2, the pledge would need to be a minimum of $740:


    +   - $640 + 40 = 680$

    - $6 \times 10 = 60$

    - $680 + 60 = 740$


    For Tier 3, the pledge would need to be a minimum of $680; that is, $640 + 40
    = 680$.


    Now, we have to figure out how many of each tier would be available for purchase.
    But first, let’s round out some of these numbers: Tier 1 will be $1,600, Tier
    2 will be $800, and Tier 3 will be $700.


    We can write an algorithm to let us know how many pledges we need for each tier.
    But before we do, let’s talk about Python and the functionalities that we could
    use. We can create a Tier-3 pledge first, making it a parent group. Then, we can
    create two child classes, tiers 1 and 2, that have slightly different characteristics
    and costs. The question we ask ourselves is whether we need to be that detailed
    on the algorithm or if we can just add each tier’s cost/value.


    That’s a good question. And the answer is that it depends on what you need this
    algorithm for. If you’re looking to do the early yet simple calculations and need
    an algorithm you can run every so often based on current sales/pledges, then you
    can create something simple with a dictionary or a function. But if you want to
    use the algorithm for multiple purposes or need to be able to adjust some costs
    later on, then you may want to code that into the algorithm with all the details.


    *Why would you need that?* Take some of the successful campaigns available. Oftentimes,
    the original pledges sell out for those campaigns. New pledge tiers then become
    available, and you may want to'
