  mdcn: '这里，我们创建了一个包含两个步骤的流水线：`CountVectorizer` 和 `MultinomialNB`。前者将文本数据转换为词频计数矩阵，有效地实现了特征提取（词频统计）。`MultinomialNB`
    是多项式朴素贝叶斯分类器。


    5. 既然我们已经创建了流水线，现在来看看如何训练模型：


    ```

    # 训练模型

    pipeline.fit(X_train, y_train)

    ```


    `pipeline.fit(X_train, y_train)` 在训练数据上训练模型。名为 `pipeline` 的 `Pipeline` 对象包含两个步骤：文本向量化（`CountVectorizer`）和多项式朴素贝叶斯分类器（`MultinomialNB`）。


    `fit` 方法调整分类器的参数，使其能够建模文本数据（`X_train`）与其对应标签（`y_train`，即语言）之间的关系。向量化器将文本数据转换为适合分类器的格式（词袋模型），分类器则从这些数据中学习。


    6. 现在来看看预测部分：


    ```

    # 预测

    y_pred = pipeline.predict(X_test)

    ```


    训练完成后，使用 `pipeline.predict(X_test)` 来预测 `X_test` 中新的、未见过的文本数据的语言。


    预测结果存储在 `y_pred` 中。流水线会自动对 `X_test` 应用与 `X_train` 相同的向量化处理，然后使用训练好的分类器来预测语言。


    7. 现在，我们来评估模型：


    ```

    # 评估模型

    print(classification_report(y_test, y_pred))

    conf_mat = confusion_matrix(y_test, y_pred)

    ```


    8. `classification_report(y_test, y_pred)` 生成一份报告，显示主要的分类指标，例如每种语言的精确率、召回率和 F1
    分数。这些指标提供了模型在每个类别（语言）上的性能洞察。提醒一下，精确率衡量的是正向预测的准确性。召回率衡量的是识别所有实际正例的能力，而 F1 分数则平衡了精确率和召回率，用于整体模型评估。


    混淆矩阵（`confusion_matrix(y_test, y_pred)`）是一个用于描述分类模型性能的表格。它显示了真实标签与预测标签的对比，让你能够看到模型在哪些地方出错了。


    训练阶段是模型从数据中学习的过程，预测阶段是将这种学习应用于新数据的过程，而评估阶段则评估模型的表现如何。这个循环是监督机器学习任务的基础。


    9. 这是混淆矩阵的分类报告：


    ```

    # 绘制混淆矩阵

    plt.figure(figsize=(10,10))

    plt.imshow(conf_mat, interpolation=''nearest'', cmap=plt.cm.Blues)

    plt.title(''混淆矩阵'')

    plt.colorbar()

    tick_marks = np.arange(len(y.unique()))

    plt.xticks(tick_marks, y.unique(), rotation=45)

    plt.yticks(tick_marks, y.unique())

    plt.tight_layout()

    plt.ylabel(''真实标签'')

    plt.xlabel(''预测标签'')

    plt.show()

    ```


    以下结果来自一个语言检测模型的分类报告：


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_362_0.png)


    在*图 18.14*中，每一行代表模型经过训练能够识别的一种不同语言。该表格提供了每种语言的精确率、召回率、F1 分数和支持数，以及整个模型的汇总分数。让我们来分解一下。


    阿拉伯语、中文、法语和土耳其语等语言的精确率和召回率均为 1.00，这意味着模型在测试集中完美地识别了所有这些语言的实例。它们的 F1 分数也是 1.00，反映了精确率和召回率之间的平衡。


    日语和泰米尔语的 F1 分数明显较低——分别为 0.77 和 0.75。对于日语，精确率特别低（0.62），表明模型经常错误地将其他语言预测为日语。对于泰米尔语，虽然精确率是完美的，但召回率较低（0.60），表明模型遗漏了相当数量的泰米尔语实例。


    **支持数**列显示了测试数据集中每种语言的实际出现次数。荷兰语、英语和韩语等语言的实例较多（分别为 230、204 和 190），而泰米尔语和瑞典语等其他语言的实例较少（分别为
    179 和 178）。这可能表明数据集有些不平衡。


    总而言之，该模型在大多数语言上表现优异，但在某些方面仍有改进空间，特别是日语和泰米尔语，它们的精确率或召回率较低。整体的高准确率和 F1 分数表明这是一个用于语言检测的稳健模型：


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_363_0.png)


    图 18.15：混淆矩阵


    *图 18.15* 可视化了混淆矩阵，这是一个有用的工具，可以查看模型在预测每种语言方面的表现。在整个过程中，多项式朴素贝叶斯分类器扮演了关键角色。一旦文本数据被
    `CountVectorizer` 转换为数值格式（词频计数），`MultinomialNB` 算法就会使用这些计数来计算每个语言类别的概率。它非常适合这类问题，因为它在处理表示频率的特征方面表现出色，而文本数据被分词为词频计数正是这种情况。


    矩阵中的每个单元格代表来自真实类别（在 *Y* 轴上）并被预测为预测类别（在 *X* 轴上）的样本数量。较深的颜色通常代表较高的数字。对角线上的单元格代表正确的预测，而非对角线上的单元格则表示分类错误。


    在提供的代码中，多项式朴素贝叶斯分类器是语言检测的理想选择，因为它对文本数据具有高效性和有效性。它擅长处理文本典型的高维稀疏数据，使其非常适合涉及词频分析的任务。此外，其概率性质提供了对预测确定性的洞察，这是语言检测的一个重要方面。该分类器与
    `scikit-learn` 等库的简单实现增强了其可访问性和易用性。此外，其可扩展性和对无关特征的鲁棒性使其成为处理大型数据集或作为更复杂文本分类任务中基线模型的实用选择。


