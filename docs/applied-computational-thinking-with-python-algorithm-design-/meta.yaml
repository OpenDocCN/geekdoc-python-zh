    \n```python\nch11_functions1.py\n\nminNum = int(input('What\\'s your minimum number?\
    \ '))\nmaxNum = int(input('What\\'s your maximum number? '))\ndef myNumbers(minNum,\
    \ maxNum):\n    myList = []\n    for num in range(minNum, maxNum + 1):\n     \
    \   myList.append(num)\n    print(myList)\nmyNumbers(minNum, maxNum)\n```\n\n\
    请注意，我们是根据用户输入来调用函数的。当这个程序运行时，它会根据该输入调用函数。我们稍后会重新审视这一点，并通过在算法中调用多个范围来运行程序，但先看看前面的代码片段输出了什么：\n\
    \n```\nWhat's your minimum number? 3\nWhat's your maximum number? 9\n[3, 4, 5,\
    \ 6, 7, 8, 9]\n```\n\n请注意，我们如何在`for`循环中调整了范围的最大值，使其包含提供的最大数字。这样我们才能得到完整的数字列表。\n\
