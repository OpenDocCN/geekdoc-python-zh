    # Control Flow


    In this chapter, we will take a deeper look at problems and identify the input
    and output necessary to design an algorithm for our problems. Throughout this
    chapter, you will learn how algorithms are read and the order in which instructions
    are carried out. You will also learn how to use functions and loops to manipulate
    the control flow in your algorithms.


    We will cover the following topics in this chapter:


    +   - Defining control flow and its tools

    - Using `if`, `for`, and `range()` and other control flow tools

    - Using loops and conditionals

    - Revisiting functions


    By the end of this chapter, we will know how control flow is defined, how to use
    the `if`, `for`, and `range()` functionalities when designing algorithms in computational
    thinking, and how to incorporate these functionalities into function definitions
    in our algorithms. First, let’s take a look at control flow.


    # Technical requirements


