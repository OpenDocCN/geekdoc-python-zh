    # Problem 6A – building an online store


    Let’s take a look at the following problem. You are starting an online store.
    It’s in its infancy, but you’ll have three different types of items available.
    They are keychains, water bottles, and T-shirts. For this particular problem,
    we will go through a three-step process:


    +   1. **Making assumption.**

    2. **Things to conside.**

    3. **Building a dictionary**


    We will look at the preceding steps in the upcoming sections.


    # Making assumptions


    Let me state some assumptions about this store that we are going to use:


    +   - This is a company that provides items for clients to share with their customers.

    - Each item can have a logo and/or personalized information, such as a name, email,
    and phone number.


    We will now move on to the next section, which is about things to consider.


    # Things to consider


    Now, let’s take a look at some of the things that you’ll need to think about before
    we even start working on an algorithm:


    +   - *Are the items personalized?*

    - *Will personalization be charged by character, line, or item?*

    - *Will the price be fixed or will it change when customers make bulk purchases?*

    - *Will there be discounts if a client orders more than one type of item?*

    - *How much is the base price point for each item?*


    The preceding points are not the only questions that we could go over, but they’re
    the questions that we’ll start taking a look at when we decompose the problem.


    Before we do that, let’s talk about how we can include the information in a program
    for each of the items. As you may recall from [Chapter 3](https://example.com),
    *Understanding Algorithms and Algorithmic Thinking*, we can use a dictionary in
    **Python** to save our menu of items. In this case, we have keychains, water bottles,
    and T-shirts.'
