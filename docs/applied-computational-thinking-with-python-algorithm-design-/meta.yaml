    What is the minimum of your range? \"))\nb = int(input(\"What is the maximum of\
    \ your range? \"))\nNumbers = []\nb = b + 1\nfor i in range(a, b):\n    j = i**2\n\
    \    Numbers.append(j)\nprint(Numbers)\n```\n\n注意，我们在算法中添加了一个 `j` 变量。我们没有使用 `i\
    \ = i**2`，因为那会改变 `i` 的值，从而影响算法中的迭代。通过使用 `j`，我们可以继续使用 `i` 来遍历给定的范围。让我们看看我们的输出：\n\
    \n```\nThis program will print the squares of the numbers in a given range of\
    \ numbers.\nWhat is the minimum of your range? 4\nWhat is the maximum of your\
    \ range? 14\n[16, 25, 36, 49, 64, 81, 100, 121, 144, 169, 196]\n```\n\n这个算法打印出所提供范围的平方数列表。它还有一个初始打印语句，解释代码将要做什么。\n\
    \n既然我们已经看了一些例子，让我们来看看父类和子类以及继承是如何工作的。\n\n## 使用继承\n\n在 Python 中，我们可以使用继承将方法和属性从一个类传递到另一个类。父类拥有将被继承的方法和属性。子类从父类继承。父类是一个对象，子类也是一个对象，所以我们是在定义类的属性。\n\
    \n让我们用一个科学的例子来看看这是如何工作的。我们将创建一个名为哺乳动物的类。并非所有哺乳动物都是胎生的。当哺乳动物产下活的幼崽时，它就是胎生的。非胎生的哺乳动物是鸭嘴兽。鸭嘴兽产卵而不是产下活的幼崽。如果我们为此编写算法，我们希望动物继承父类——在这种情况下是哺乳动物——的特征。让我们看看以下代码片段：\n\
    \nch9_mammals.py\n\n```python\nclass mammals:\n    def description(self):\n  \
    \      print(\"Mammals are vertebrate animals.\")\n    def viviparous(self):\n\
    \        print(\"Mammals are viviparous, but some are not.\")\nclass monkey(mammals):\n\
    \    def viviparous(self):\n        print(\"Monkeys are viviparous.\")\nclass\
    \ platypus(mammals):\n    def viviparous(self):\n        print(\"The platypus\
    \ is not viviparous. It's an egg-laying mammal.\")\nobj_mammals = mammals()\n\
    obj_monkey = monkey()\nobj_platypus = platypus()\nobj_mammals.description()\n\
    obj_mammals.viviparous()\nobj_monkey.description()\nobj_monkey.viviparous()\n\
    obj_platypus.description()\nobj_platypus.viviparous()\n```\n\n从前面的代码中，注意 `mammals()`\
    \ 类使用了一个描述，然后是关于哺乳动物和胎生的信息。`monkey` 使用与 `mammals` 类相同的描述进行定义，但随后包含了关于胎生的不同语句。`platypus`\
    \ 也是如此。`monkey` 和 `platypus` 类是 `mammals` 类的子类。\n\n然后，这三个类——父类和两个子类——被简化为一个变量，以便可以通过调用该变量来使用它们。最后，算法打印父类和两个子类的描述和胎生语句。让我们看看输出：\n\
    \n```\nMammals are vertebrate animals.\nMammals are viviparous, but some are not.\n\
    Mammals are vertebrate animals.\nMonkeys are viviparous.\nMammals are vertebrate\
    \ animals.\nThe platypus is not viviparous. It's an egg-laying mammal.\n```\n\n\
    如你所见，所有三个类都使用了相同的描述。这是因为我们没有对子类的描述进行任何更改。当我们定义类时，我们只更改了我们希望与父类不同的部分。其他一切都从父类继承。\n\
    \n父类和子类在 Python 中被广泛用于多种目的。例如，在游戏中，你可能有一些敌人，它们都有一些相同的特征。我们不必单独定义每个敌人及其所有特征，而是可以创建一个包含所有共同特征的父类，然后将所有敌人的个别特征作为子类进行更改。这只是继承可以被使用的一种方式。还有许多其他用途，它通过仅使用父类定义它们来帮助我们节省时间并避免错误。\n\
    \n既然我们已经有了一些使用类的经验并了解了面向对象编程，让我们来总结一下本章内容。\n\n## 总结\n\n在本章中，我们讨论了 Python 编程的基础知识。我们研究了一些内置函数，使用了字典和列表，使用了变量和函数，了解了文件、数据和迭代，并学习了类和面向对象编程。\n\
    \n正如我们在本章和解决前面的问题时所提到的，Python 为我们提供了多种解决相同问题的方法。本章 *问题 2 – 组织信息* 部分提供了一个例子，我们在两个不同的算法中使用了\
    \ `eval()` 和 `sum()` 函数来产生相同的结果。随着我们继续学习 Python 以及如何编写算法，选择使用哪些函数、变量、参数等将开始"
