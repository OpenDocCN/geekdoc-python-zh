  md: '# 6


    # Exploring Problem Analysis


    In this chapter, we will explore problem analysis in depth while using some of
    what we have been learning, such as logical reasoning, Boolean logic, and algorithmic
    design. We will work through problem definition, decomposition, and analysis in
    this chapter.


    In this chapter, we will cover the following topics:


    +   - Understanding the problem definitions

    - Learning how to decompose problems

    - Analyzing problems


    To further understand problems, we’ll need to look at a more complex problem and
    define it so that we can begin the algorithmic design process. In this chapter,
    you will learn how to define problems and decompose them to design algorithms.
    In doing so, you’ll also learn about dictionaries in Python. After reading this
    chapter, you’ll be able to use the computational thinking process to design and
    create an algorithm that addresses complex problems.


    # Technical requirements


    Here is the full source code that will be used throughout this chapter:

    https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter06.


    # Understanding the problem definitions


    As we discussed in Chapter 2, Elements of Computational Thinking, computational
    thinking uses four elements to solve problems:


    +   - **Problem decomposition**: This is the process of breaking down data

    - **Pattern recognition**: This is the process of finding similarities or patterns

    - **Abstraction**: This element deals with generalizing the pattern

    - **Algorithm design**: This is where we define the set of instructions for the
    solution to the problem


    In this section, to learn more about how to analyze problems, we’re going to analyze
    a larger problem and work through the steps needed to create the algorithm. To
    be able to create algorithms, we must analyze the problems and identify what we
    are trying to solve – that is, *what is our algorithm for?*'
