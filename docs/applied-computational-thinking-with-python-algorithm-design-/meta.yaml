    4.  接着，我们检查他们是否还有更多要添加。\n5.  我们检查有多少项被添加到了列表中。\n6.  我们打印出列表。\n\n请注意，我们不得不使用`while`循环和`if`语句。这是因为我们希望持续询问玩家是否要添加动物，直到他们完成或想不出更多为止。因此，只要玩家还能添加项目，我们就希望程序继续提问。但如果玩家完成了，他们就可以对添加另一个动物说“不”，从而结束程序。\n\
    \n现在，我想明确一点：这个程序可以做得更好。我们可以添加一个计时器，看看在30秒内能输入多少个项目。我们还可以添加一个条件，当玩家试图在说“是”之前输入动物时，中断程序并解释原因。我们还可以添加一个条件，处理玩家试图输入列表中已有的动物的情况。*对你来说，一个挑战就是尝试将这些组件添加到现有程序中！*\n\
