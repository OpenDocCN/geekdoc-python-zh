  - '[PAGE 174]


    In this section, we''re going to take a look at how to handle files, data, and
    iteration with Python. This will give us information on how to use an algorithm
    to open, edit, and run already existing Python files or new files. With iteration,
    we''ll learn how to repeat lines of code based on some conditions, limiting how
    many times or under what conditions a section of the algorithm will run. We''ll
    start with files first.


    # Handling files in Python


    In Python, the main function associated with files is the `open()` function. If
    you are opening a file in the same directory, you can use the following command
    line:


    ```

    fOpen = open(''filename.txt'')

    ```


    If the file is in another location, you need to find the path for the file and
    include that in the command, as follows:


    ```

    fOpen = open(''C:\Documents\filename.txt'')

    ```


    There are a few more things we can tell the program to do in addition to opening
    the file. They are listed as follows:


    +   - **r**: Used to open the file for reading (this is the default, so it does
    not need to be included); creates a new file if the file does not exist.

    - **w**: Used to open the file for writing; creates a new file if the file does
    not exist.

    - **a**: Used to open a file to append; creates a new file if the file does not
    exist.

    - **x**: Used to create a specified file; if the file exists, returns an error.


    There are two more things that can be used in addition to the methods listed.
    When used, they identify how a file needs to be handled—that is, as binary or
    text:


    +   - **t**: Text (this is the default, so if not specified, it defaults to text)

    - **b**: Binary (used for binary mode—for example, images)


    Take a look at the following code. Since this code is a single line and specific
    to each path, it is not included in the repository:


    ```

    fOpen = open(''filename.txt'', ''rt'')

    ```


    The preceding code is the same as the previous code, `fOpen = open(''filename.txt'')`.
    Since `r` and `t` are the defaults, not including them results in the same execution
    of the algorithm.


    If we wanted to open a file for writing, we could use the `fOpen = open(''filename.txt'',
    ''w'')` code. To close files in Python, we use the `close()` code.'
