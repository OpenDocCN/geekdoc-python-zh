    \ that grabs information to determine distances\n- Using an automated process\
    \ to create the distance matrix\n\n*Now, you’ve seen the TSP in action!* We will\
    \ look at a new problem in the next section.\n\n## Problem 5 – using Python for\
    \ cryptography\n\n**Cryptography** is what we use to code and decode messages.\
    \ We used a simple **Caesar Cipher** in [Chapter 10, Understanding Input and Output\
    \ to Design a Solution Algorithm](Chapter 10, Understanding Input and Output to\
    \ Design a Solution Algorithm). For this problem, we’re going to use some of the\
    \ packages available in Python to encrypt and decode information. Note that for\
    \ this particular scenario, we’ll employ a straightforward analysis, using the\
    \ four elements of the computational thinking process. While we don’t always follow\
    \ them exactly, this particular problem lends itself to a fairly straightforward\
    \ use.\n\n### Defining the problem (cryptography)\n\nYou are working on a classified\
    \ project and need to encrypt your information to maintain its safety.\n\n###\
    \ Recognizing the pattern (cryptography)\n\nPython has a cryptography package\
    \ that can be installed, much like those that we installed from other libraries,\
    \ such as Pandas and NumPy. In our problem, one of the main things we need to\
    \ know is what we may need to continue to encrypt messages. We may also want to\
    \ decode messages that we receive, but we are going to focus on the encryption\
    \ side of things first.\n\n### Generalizing (cryptography)\n\nWhen we design our\
    \ algorithm, we’ll want something we can continue to use throughout the life of\
    \ our project with little effort – that is, any time we want to encrypt a new\
    \ message, we can run the algorithm and input the message, rather than add the\
    \ message itself to the algorithm body every time. This is the generalized pattern\
    \ for our particular problem. *Now, we’re ready to design.*\n\n### Designing the\
    \ algorithm (cryptography)\n\nTo write our algorithm, let’s first take a look\
    \ at what we’ll need to do:\n\n1. Define the letters.\n2. Change all the letters\
    \ to lowercase to run our algorithm.\n3. Define the required functions – **encryption**,\
    \ **decoding**, and **main**.\n4. Call the cryptography **main** function.\n\n\
    **TIP**\n\n*The full algorithm for this problem can be found in the **ch17_cryptographyA.py**\
    \ file.*\n\nWe will start designing our algorithm by following these steps:\n\n\
    1. Let’s begin by defining our letters. The following code snippet defines our\
    \ letters and then renders each letter in lowercase:\n\n```\nLETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZABCDEFGHIJKLMNOPQRSTUVWXYZ'\n\
    LETTERS = LETTERS.lower()\n```\n\n2. Next, we define our encryption function.\
    \ This function will take two arguments – **message** and **key**. The **message**\
    \ function will be user-defined, which will be done in the **main** function.\
    \ For now, we’ll use an empty message by adding empty quotes ('') as the definition\
    \ of the **encryptedM** variable, as shown in the following code snippet:\n\n\
    ```\ndef encrypt(message, key):\n    encryptedM = ''\n    for letts in message:\n\
    \        if letts in LETTERS:\n            num = LETTERS.find(letts)\n       \
    \     num += key\n            encryptedM += LETTERS[num]\n    return encryptedM\n\
    ```\n\nNote that we iterate over the letters in the message we want to encrypt,\
    \ and then we use the key that the user defines in the **main** function and encrypt\
    \ the message. This function then returns the encrypted message.\n\n> *But why\
    \ haven’t we defined the **main** function yet if that’s where we are getting\
    \ the inputs?*\nBecause the **main** function will require the other two functions\
    \ to either encrypt or decode the message. So bear with us – we’ll get to the\
    \ **main** function soon.\n\n3. Now, let’s take a look at the decoding function.\
    \ This is what we’ll use when we have an encrypted message and want to know what\
    \ the original message was:\n\n```\ndef decode(message, key):\n    decodedM =\
    \ ''\n    for chars in message:\n        if chars in LETTERS:\n            num\
    \ = LETTERS.find(chars)\n            num -= key\n            decodedM += LETTERS[num]\n\
    \    return decodedM\n```\n\nThe preceding code shows the function that we’ll\
    \ use to decode our messages. It uses the characters in the message and then the\
    \ encryption key to decode the message. Note that you cannot decode a message\
    \ if you don’t have the original key – unless you have the time to sit and try\
    \ each one of the keys, that is.\n\n4. Finally, we’ll need that **main** function\
    \ we keep referring to. This is the function that takes all the inputs needed\
    \ for this algorithm to run. Here are the three things necessary for it to run\
    \ correctly – the message to be encrypted or decoded, the key, which can be any\
    \ number in the range 1 to 26, and whether we are encrypting or decoding.\n\n\
    Here is the **main** function:\n\n```\ndef main():\n    message = input('What\
    \ message do you need to encrypt or decrypt? ')\n    key = int(input('Enter the\
    \ key, numbered 1-26: '))\n    choice = input('Do you want to encrypt or decode?\
    \ Type E for encrypt or D for decode: ')\n    if choice.lower().startswith('e'):\n\
    \        print(encrypt(message, key))\n    else:\n        print(decode(message,\
