  md: "```\nelse:\n    print(i * 100)\n```\n\nIf you look at the preceding code, the\
    \ `elif` statement and the code inside the `elif` statement are indented incorrectly.\
    \ Because there is no `if` statement at the same level as the `elif` statement,\
    \ Python will give us an invalid syntax error. So, let’s take a look at what happens\
    \ if we change that statement to an `if` statement:\n\n```\nfor i in range(5):\n\
    \    if i < 3:\n        print(i + 2)\n        if i < 4:\n            print(i *\
    \ 2)\n    else:\n        print(i * 100)\n```\n\nThis code is “correct” – that\
    \ is, it will run! But is it what we intended? Well, that depends. If we expected\
    \ the output to be 2, 3, 4, 6, 400, then we made a mistake. When `i` has values\
    \ of 0, 1, and 2, we’d add 2, getting the values 2, 3, and 4. When `i` has a value\
    \ of 3, then we’d multiply by 2, getting the value 6. And when `i` has a value\
    \ of 4, we’d multiply by 100, getting 400. However, the output we got from the\
    \ preceding code is as follows.\n\n```\n2\n0\n3\n2\n4\n4\n300\n400\n```\n\nSo,\
    \ what happened? The issue is that our indentation for the second condition is\
    \ part of the first `if` statement. So, it first checks whether the value is under\
    \ 3, so `i` will take on the values of 0, 1, and 2. But then, it checks whether\
    \ those values are less than 4. So when `i` = 0, it will be 0 + 2 = 2, which is\
    \ printed, and then it will also check whether it’s less than 4, which is true,\
    \ so it will also multiply 0 * 2, which is 0. When `i` = 1, then the result of\
    \ 1 + 2 is printed, the result of 1 * 2 is printed as well, and so on.\n\nHowever,\
    \ let’s see what happens if we change the indentation of the code to the following:\n\
    \n```\nfor i in range(5):\n    if i < 3:\n        print(i + 2)\n    if i < 4:\n\
    \        print(i * 2)\n    else:\n        print(i * 100)\n```\n\nWe get a slightly\
