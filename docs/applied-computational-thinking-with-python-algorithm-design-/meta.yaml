  mdcn: "- 我们可以利用所有元素，例如数组、求和、比较以及可视化图形显示，来更好地理解和追踪结果。\n\n正如你可能知道的，**数组**是一种排列方式。在编程中，我们使用数组来存储相似的元素，例如数字和数据项。\n\
    \n我们创建的算法将取决于我们具体想追踪或回答这个问题的什么内容。我们的算法可以是一个简单的“是”或“否”类型的问题，我们只需检查哪个选项最佳；或者它可以是一个更强大的算法，包含数据和数据追踪的可视化表示。现在，让我们看看如何着手在问题中寻找规律。\n\
    \n## 识别规律\n\n**规律识别**是指在分解问题后，寻找相似性或规律的过程。在*问题1*中，我们看到一个参赛者可以选择赢得250美元，或者选择以25美分为单位计算其身高。这对每个参赛者都是一样的。唯一的区别是，总价值会根据个人的身高而变化。\n\
    \n在本节中，让我们看一个不同的问题，以便更好地理解规律识别。\n\n## 问题2 – 数学算法与泛化\n\n想象你正在为一个足球队准备派对。这是一个社区球队，所以总是有12到15个孩子会来。你想为所需的食物下订单。你知道，你将使用的餐饮公司每个孩子的费用是12美元。现在，让我们分解这个问题：\n\
    \n- **分解**：我知道我们有12到15个孩子。我们也知道每个孩子的费用是12美元。我们的问题可以看作是一个问题：*我们如何估算成本？*\n- **规律识别**：你知道孩子的数量，*k*，在12到15之间。你知道每个孩子将花费12美元。例如，如果我有5个孩子，成本将是12美元\
    \ × 5 = 60美元。\n- **规律泛化**：孩子的数量是未知的，所以我们将使用变量*k*来表示这个未知值。这样，无论我们有多少孩子，我们都可以找出总成本。我们正在从一个案例（五个孩子）泛化到所有案例（*k*个孩子）。\n\
    - **算法设计**：我们现在将编写数学算法。我们将在*第3章，理解算法与算法思维*中更多地处理可编程算法。我们也将在那里重新审视这些数学算法。总成本将由方程$12k\
    \ = T$给出，其中*T*是总成本，*k*是孩子的数量。\n\n从前面的问题可以看出，规律识别对于找到泛化模式并编写我们的算法非常重要。现在，让我们更仔细地看看规律泛化。\n\
    \n## 泛化规律\n\n一旦我们识别出规律，我们就需要进行**规律泛化**和**抽象**。也就是说，我们希望确保我们得出的解决方案可以用于我们已识别问题的多个实例。规律泛化可以像编写基本的线性数学算法一样简单，就像我们为派对成本所做的那样，每个孩子的成本是12美元。所以，任何数量$k$个孩子的成本将由$12k$给出。但规律泛化远不止于此。\n\
    \n如果我们回到*问题1*，在那里你可以选择250美元，或者选择以25美分为单位计算你的身高，我们的规律**泛化**将允许我们将任何人的身高与250美元进行比较，以确定选择现金选项还是选择25美分选项能让你得到更多的钱。\n\
    \n**抽象**让我们专注于我们需要的东西，并丢弃我们不需要的东西，以便为我们的问题创建最佳算法。现在，根据我们决定需要什么，我们可以添加或删除一些条件。\n\
