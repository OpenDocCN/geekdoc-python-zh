    \n## 13 调试\n\n现在是时候让我们花更多时间来调试算法了。在*第5章，错误*中，我们了解了编写代码时可能遇到的一些错误。在*第8章，识别挑战与解决方案*中，我们也看到了Python内置的一些调试工具，用于查找代码中的错误。现在，我们将深入探讨算法调试，研究一些问题场景和提出的算法，确定导致控制台中提示的错误的原因，以及那些我们已知存在但Python未给出错误消息的错误（因为结果不符合预期）。其中一些错误可能不会被Python以任何方式标记出来，这就是为什么我们现在将专注于一些特定的错误以及如何避免它们。调试是编程中的一项关键技能，不可能涵盖所有场景，但我们将展示在编写解决方案时可以关注的一些方面。\n\
    \n在本章中，我们将涵盖以下主题：\n\n- 错误消息与识别错误\n- 不产生错误消息的错误\n\n### 技术要求\n\n以下是本书中使用的完整源代码：[https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter13](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter13)。\n\
    \n### 错误消息与识别错误\n\n当我们谈论调试时，我们指的是在代码中查找错误或缺陷。请记住，在编写代码时，你几乎总会遇到错误。我从未在第一次尝试时就写出没有错误的复杂代码。这只是过程的一部分，所以不要感到沮丧。\n\
    \n### 标点符号错误\n\n现在，错误可能非常简单，比如缺少一个标点符号。例如，让我们看看这里的代码：\n\n```python\nabs(3.5\n\
    ```\n\n如果运行这段代码，我们会得到一条错误消息，如下所示：\n\n```\n'(' was never closed\n```\n\n很容易修复，对吧？让我们看看：\n\
    \n```python\nabs(3.5)\n```\n\n但现在当我运行代码时，什么也没有。没有答案，没有错误消息，什么都没有。这意味着如果我想看到那个值，我需要将其打印到控制台。或者如果我需要使用那个值，我需要将其保存为一个变量。如果我使用`print`语句，它看起来会是这样：\n\
    \n```python\nprint(abs(3.5))\n```\n\n当我运行该算法时，输出如下：\n\n```\n= RESTART: C:/Users/.../chapter\
    \ 13/ch13_absError1.py\n3.5\n```\n\n然而，我应该指出，这仅在我从文件运行代码时才必要。如果我在Python IDLE shell中，那么我可以简单地使用`abs(3.5)`，它会返回值而无需`print`语句，如*图13.1*所示。\n\
    \n![图13.1 – IDLE shell中的结果](img/b193dd901f0befc8cf3c9fa5265db3da_228_0.png)\n\n\
    如你所见，我们总是在思考我们需要什么、如何在算法中使用值、下一步是什么等等。调试的一个极其重要的方面是经常运行我们的代码。每一段代码都应该运行，以便我们能尽早识别可能的错误。请记住，调试10行代码比调试100行或1000行代码要容易得多。\n\
    \n另一个我们经常遇到的错误是冒号。在下面的代码中，我们忘记了一个冒号。你能告诉我它在哪里吗？\n\n```python\nfor i in range(50):\n\
    \    if i < 30:\n        print(i + 2)\n    elif i < 40:\n        print(i * 2)\n\
    \    else\n        print(i * 100)\n```\n\n如果你仔细看，`else`后面的冒号缺失了。幸运的是，当我们尝试运行此代码时，Python会提醒我们。你可以在*图13.2*中看到错误。\n\
    \n![图13.2 – 缺少冒号的错误消息](img/b193dd901f0befc8cf3c9fa5265db3da_229_0.png)\n\n此外，Python非常有用，它会高亮显示此错误所指的代码行，如*图13.3*所示。\n\
    \n```python\nfor i in range(50):\n    if i < 30:\n        print(i + 2)\n    elif\
    \ i < 40:\n        print(i * 2)\n    else:\n        print(i * 100)\n```\n\nPython中的错误消息已经得到了显著改进。在以前的版本中，我们有时不得不识别语法错误是什么，查找高亮行上方的行，等等。现在Python中的错误处理提供了更有针对性的消息，使我们能够更轻松地调试代码。\n\
    \n现在让我们看看Python编码中另一个非常常见的问题——缩进。\n\n### 缩进错误\n\nPython是一种相当简单的编写语言，特别是因为它使用缩进来标识代码级别，而不是使用大量符号（如方括号和圆括号）来确定代码顺序。这带来了一点陷阱。如果我们有缩进错误，那么代码将无法按我们希望的方式处理。让我们看一个简单的例子：\n\
