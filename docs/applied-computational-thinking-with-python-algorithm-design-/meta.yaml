  md: 'Algorithms for computers are similar in that we need to reprogram the set of
    instructions if a set of conditions has changed. The programs can only go as far
    as we have stated parameters for them. Most programs cannot adjust or adapt to
    any new information that is not previously coded into it. That said, **machine
    learning** and **artificial intelligence** are evolving. While we’re not talking
    about those kinds of programs here, even in those instances we’d still need to
    adjust the programs to do what we need them to.


    To design algorithms, we need to make sure that they meet some specific characteristics.
    Algorithms should do the following:


    +   - Be clear and unambiguous

    - Have inputs that are well defined

    - Have outputs that are well defined

    - Have finiteness

    - Be feasible

