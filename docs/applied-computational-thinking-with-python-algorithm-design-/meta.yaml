    The algorithm we create will depend on what exactly we want to track or answer
    for this problem. Our algorithm could be a simple yes or no type of problem, where
    we’d just check which option is best, or it can be a much more robust algorithm,
    with data and visual representations for the data tracked. Now let’s take a look
    at how we work to find patterns in our problems.


    # Recognizing patterns


    **Pattern recognition** is the process of finding similarities, or patterns, once
    we go through the decomposition of problems. In *Problem 1*, we were shown a problem
    where a contestant could win $250 or choose to take their height in quarters.
    This will be the same for every contestant. The only difference is that the total
    value changes depending on the height of the person.


    In this section, let’s take a look at a different problem in order to better understand
    pattern recognition.


    # Problem 2 – mathematical algorithms and generalization


    Imagine you are preparing a party for a soccer team. This is a community team,
    so there are always between 12 and 15 children that stop by. You want to place
    an order for the food you will need. You know it will cost you $12 per child from
    the catering company you will be using. Now, let’s break down the problem:


    +   - **Decomposition**: I know we have between 12 and 15 children. We also know
    there is a cost of $12 per child. Our problem can be thought of as a question:
    *How can we estimate the cost?*

    - **Pattern recognition**: You know the number of children, *k*, is between 12
    and 15. You know it is going to cost $12 for each child. If I had 5 children,
    for example, the cost would be $12 × 5 = $60.$12 × 5 = $60.

    - **Pattern generalization**: The number of children is not known, so we will
    use the *k* variable for that unknown value. That way, we can find out the total
    cost no matter how many children we have. We are generalizing from one case (five
    children) to all cases (*k* children).

    - **Algorithm design**: We will write the mathematical algorithm for now. We will
    be working more with programmable algorithms coming up in *Chapter 3, Understanding
    Algorithms and Algorithmic Thinking*. We will be revisiting these mathematical
    algorithms there as well. The total cost will be given by the equation $12k =
    T$12k = T, where *T* is the total cost and *k* is the number of children.'
