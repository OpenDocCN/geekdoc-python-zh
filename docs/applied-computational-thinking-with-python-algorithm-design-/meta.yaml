  md: "expected to be slightly above 30% between 2018 and 2028. So, learning a bit\
    \ about cybersecurity and cryptography won’t hurt.\n\nFor this particular problem,\
    \ we are going to explore a few things. First, let’s talk about **hashing**. In\
    \ cybersecurity, hashing means those long strings of numbers and letters that\
    \ replace things such as passwords. For example, if you entered a password of\
    \ `password1` (please don’t do that; never use `password` as the basis of a password),\
    \ the hashing process would replace it with something that looks more like this:\n\
    \n```\n27438d623d9e09d7b0f8083b9178b5bb8ff8bc321fee518af4466f6aadb68a8f:100133bfdbff492cbc8f5d17af46adab\n\
    ```\n\nWhen we create cryptography algorithms, we have to add random data, which\
    \ we call **salts**. Salts just provide additional input and help us make passwords\
    \ more secure when storing them.\n\nWhen we use hashing in Python, we can use\
    \ the `uuid` library. **UUID** stands for **Universal Unique Identifier**. The\
    \ `uuid` library is used when we want to generate random 128-bit objects as IDs.\
    \ *But what are we talking about?* Let’s take a look at the algorithm found in\
    \ the `ch17_hashing.py` file:\n\n+   1. We will import libraries first:\n\n```\n\
    import uuid\nimport hashlib\n```\n\nWe will import two libraries that will allow\
    \ us to save our passwords using salting and hashing.\n\n+   2. In the next code\
    \ snippet from the file, we defined the function to hash our password:\n\n```\n\
    def hash_pwd(password):\n    salt = uuid.uuid4().hex\n    return hashlib.sha1(salt.encode()\
    \ + password.encode()).hexdigest() + ':' + salt\n```\n\nWe salted the password\
    \ using our `uuid` package, and then returned the hash using the secure hash algorithm\
    \ 1, `sha1`. This is only one of the algorithms we can use. We could have used\
    \ others, such as `sha256` and `sha384`. The `sha1` hash has an output size of\
    \ 160, while `sha256` has an output size of 256. Both `sha1` and `sha256` have\
    \ block sizes of 512 bits, while `sha384` has a block size of 1,024 bits.\n\n\
    All of this becomes relevant when choosing the hash we’ll use, how secure they\
    \ are, and so on. We used `sha1` here more for *nostalgia*, but it is not as secure\
    \ as `sha256` and `sha384`. When attacked, `sha1` will fail against prolonged\
    \ attack. The other two will hold out for longer but are still not the best options.\
    \ Hashes such as `shake128` and `shake256` have more success against such attacks.\n\
    \n+   3. Let’s now look at the `check` function. We always want to confirm a password\
