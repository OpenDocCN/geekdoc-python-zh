  md: '# 8


    # Identifying Challenges within Solutions


    In this chapter, we will be evaluating algorithms and diagrams as we learn how
    to navigate some common errors and determine whether possible adjustments can
    be made to an existing algorithm to simplify it. We will evaluate the solutions
    based on the problem description to verify whether the solution aligns with the
    problem. We will be learning about identifying pitfalls in the solution design
    process. As a note, we will expand on the content of this chapter in *Part 2,
    Applying Python and Computational Thinking*, and *Part 3, Data Processing, Analysis,
    and Applications Using Computational Thinking and Python*, of this book as we
    dive deeper into the **Python** programming language.


    To learn about debugging, let’s remind ourselves that the computational thinking
    process is not linear. Even when we are working from the original problem, we
    will sometimes redefine the problem or need to adjust the generalization due to
    a change in the population our algorithm is for or if we want to tweak our design
    of the algorithm. But sometimes, we come across problems after an algorithm has
    been designed and used. Depending on our roles, we’ll be evaluating algorithms
    for errors, changes needed, and so on. Understanding how to find and analyze errors
    can help us, regardless of whether we are absolute Python beginners or deep in
    our careers.


    Throughout this chapter, you will learn how to identify and fix bugs in your program
    and how to avoid pitfalls in algorithm design.


    In this chapter, we will cover the following topics:


    +   - Identifying errors in algorithm design

    - Debugging algorithms

    - Comparing solutions

    - Refining and redefining solutions


