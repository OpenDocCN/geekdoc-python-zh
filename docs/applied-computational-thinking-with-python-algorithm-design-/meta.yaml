    \n用我的身高（70英寸）运行前面的代码，得到以下结果：\n\n```\n253.62318840579707\n```\n\n如果我们四舍五入那个答案，看起来会好得多，Python有一种简单的方法可以做到这一点。如果我们调整如下所示的打印代码，我们的答案将是253.62：\n\
