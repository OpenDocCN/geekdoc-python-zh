  - "[PAGE 106]\n\n12\n8\n0\n24\n28\n16\n27\n\nAs you can see, using a random number\
    \ means the results are always random too.\n\nNow let’s take a look at a logical\
    \ error example.\n\n# ch5_buggyCode2.py\n\n```\nfirstNumber = int(input('Enter\
    \ a number between 1 and 3: '))\nsecondNumber = int(input('Enter a number between\
    \ 8 and 15: '))\nsum1 = firstNumber + secondNumber\nprint(\"I predict your number\
    \ is less than 19, in this case\", sum1)\n```\n\nThis is a particularly sneaky\
    \ buggy code. The logic is having trouble. Yes, the sum should absolutely be under\
    \ 19. But the thing is, we made no provisions for what happens if the user inputs\
    \ a number NOT between the ones provided. We also made no comments about whether\
    \ the endpoints were included, but we said between. That said, if the highest\
    \ numbers entered were 3 and 15, we should always get a number less than 19. However,\
    \ because we made no stipulations for input not within that range, then we can\
    \ end up with a result such as the following.\n\n```\nEnter a number between 1\
    \ and 3: 5\nEnter a number between 8 and 15: 19\nI predict your number is less\
    \ than 19, in this case 24\n```\n\nNo, this is not what I predicted. The program\
    \ is not cooperating. So, let’s look at how I could fix that issue.\n\nFirst,\
    \ we need to check if the inputs received were in the range provided.\n\nWe have\
    \ the variable `firstNumber`, which SHOULD be between 1 and 3. And we’ll just\
    \ assume it is inclusive of endpoints, so the number should be 1, 2, or 3.\n\n\
    In that case, we can use conditionals to allow us to get the right numbers, or\
