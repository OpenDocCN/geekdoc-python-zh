  mdcn: '随着我们完成本书的*第一部分：计算思维导论*，我们已经学习了计算思维过程，始终审视可能的情景以帮助我们理解该过程的实用性，如何进行头脑风暴并为决策创建流程图，以及如何设计我们的算法。在*第二部分：应用Python与计算思维*中，我们将开始更深入地研究Python语言，以便我们能够处理更复杂的问题，例如涉及数据和函数的问题。我们还将更深入地探讨Python编程语言，并将这些知识应用于后续章节中的多种类型问题。


    ## 第二部分：应用Python与计算思维


    在编程语言方面有多种选择。Python编程语言是一种强大的、开源的、面向对象的编程语言。它是一种高级语言，拥有不断增长的库和包，持续扩展其功能。我们可以使用Python编程从简单的数学算法到复杂的数据科学算法，甚至机器学习。理解Python也意味着理解计算思维的多个领域。


    在本部分中，你将学习如何在解决问题时使用计算思维过程，并使用Python编程语言。


    本部分包含以下章节：


