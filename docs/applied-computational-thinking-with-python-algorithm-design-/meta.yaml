    \n逻辑是通过证明以及归纳和演绎推理来教授的。真值表帮助我们分析条件。在真值表中，有些东西是假设的。例如，一个陈述要么为真，要么为假。另一个陈述为真或为假。这些陈述的组合取决于这些陈述是真还是假。\n\
    \n好吧，这有点复杂。在我继续解释演绎推理之前，让我们看一个快速的真值表及其包含的逻辑过程。\n\n当我刚开始编码时，真值表至关重要。它们帮助我理解编码过程以及如何处理条件。并非每个程序员或编码员都使用这些表格，但我觉得它们很有帮助，即使没有在决策过程中明确使用。让我们现在看一个。\n\
    \n假设我们有一个陈述或条件 p，并且该条件为真。假设我们有另一个陈述或条件 q，并且它也为真。在真值表中，我们使用符号 ¬ 表示 NOT。所以，¬ p 为假，¬\
