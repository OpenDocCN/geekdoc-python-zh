    time\",\n)\nplt.show()\n```\n\n从前面的代码中，我们可以看到我们为绘图设置了样式。我们在导入库之后为绘图添加了 'darkgrid'\
    \ 样式。Seaborn 有一些内置样式：white、whitegrid、dark、darkgrid 和 ticks。下图显示了 Seaborn 生成的绘图：\n\
