  md: "# Using iteration in algorithms\n\nBefore we go into iteration, let’s define\
    \ the term. **Iteration** means repetition. When we use iteration in algorithms,\
    \ we are repeating steps. Think of a `for` loop.\n\nLet’s take a look at another\
    \ example (we’ve previously used it in this chapter for the `evenNumbers` program):\n\
    \n```\nch9_colorLoop.py\n\ncolors = ['blue', 'green', 'red']\nfor color in colors:\n\
    \    print(color)\n```\n\nThe iteration in this algorithm is that it will repeat\
    \ the `print` process for each of the colors in the original `colors` list.\n\n\
    This is the output:\n\n```\nblue\ngreen\nred\n```\n\nAs you can see, each of the\
    \ colors was printed.\n\nWe can also get input from a user, then iterate to perform\
    \ some operation. For example, take a look at the following algorithm:\n\n```\n\
    ch9_whileAlgorithm.py\n\nask = int(input(\"Please type a number less than 20.\
    \ \"))\nwhile ask > 0:\n    print(ask * 2)\n    ask = ask - 1\n```\n\nAs you can\
    \ see, we defined `ask` as the input variable. Then, we printed double the number\
    \ and reduced the number by 1 as long as `ask` was greater than 0.\n\nThe output\
    \ looks like this:\n\n```\nPlease type a number less than 20. 8\n16\n14\n12\n\
    10\n8\n6\n4\n2\n```\n\nThe output shows the list created by doubling the initial\
    \ number, which is 8 x 2 = 16, then continues until the `ask` variable is no longer\
    \ greater than 0."
