    Let’s take a look at a simple computational thinking problem.


    # Problem 1 – conditions


    Let’s imagine that a raffle at a radio station has contestants select 1 of 2 possible
    winning structures: either $250 in cash or the height of the contestant in quarters.


    A computational thinking problem can be as vague as *Problem 1*, where no question
    is even being asked. You are given a set of conditions and it is your job to determine
    what the problem is and find solutions for that problem that you have defined.
    If you think about it, there is no perfect answer for this problem, but there
    are ways for you to create conditions that work to determine which option is indeed
    best, depending on the height of the contestant.


    To **decompose** this problem, we need to look at what is stated and take into
    consideration what is not stated. We need rules.


    Simply stated, a winner will choose a monetary payout: either $250 in cash or
    the equivalent of their height in quarters. Those things are stated. But what
    isn’t stated is also important:


    +   - *What is the timeline for the raffle? How many winners are there?*

    - *Do we want to track how much we have spent after each contestant has made their
    choice?*

    - *Do we want to use a baseline for comparison purposes?*


    There are other things that may come to mind, but for now, let’s stick to these
    questions. We are going to assume that the raffle doesn’t have a set start or
    end date and that the radio station may choose multiple winners on a given day
    – or none at all. These are some of the considerations we will look at when figuring
    out patterns, generalizing them, and designing the algorithms.


    Given all the information about payouts, we still do not have a way to figure
    out when the payout is greater. *Is it best to choose the $250? Or is it best
    to choose the height in quarters? Can we create an algorithm that tells us which
    option is best somehow?* Yes, we can create an algorithm that addresses the entire
    problem.


    The **pattern** for this problem will always be the same: the amount is set for
    the cash value and the thickness of a quarter is set, so we can always use math
    to figure out what the height in quarters converts to money-wise based on someone’s
    height.


    We can clearly state the winnings based on each choice if we know a few things.
    This includes *the choice of cash or choice of height in quarters*. If height
    is chosen, we need the following:'
