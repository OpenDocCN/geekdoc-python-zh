- md: "## Using the BIRCH algorithm\n\n**Balanced Iterative Reducing and Clustering\
    \ using Hierarchies (BIRCH)** is a clustering algorithm that uses cluster centroids,\
    \ so long as enough memory and time are available. For the BIRCH and K-means clustering\
    \ algorithms, we will share an algorithm and the corresponding plot to better\
    \ understand them.\n\nThe following snippet shows us the BIRCH algorithm:\n\n\
    ch15_BIRCH.py\n\n```python\nfrom numpy import unique\nfrom numpy import where\n\
    from sklearn.datasets import make_classification\nfrom sklearn.cluster import\
    \ Birch\nfrom matplotlib import pyplot\n#Synthetic dataset definition\nX, _ =\
    \ make_classification(n_samples = 1800,\n    n_features = 2, n_informative = 2,\
    \ n_redundant = 0,\n    n_clusters_per_class = 1, random_state = 4)\n#Define the\
    \ BIRCH model\nmodel = Birch(threshold = 0.01, n_clusters = 2)\nmodel.fit(X)\n\
    yhat = model.predict(X)\n#Clusters\nclusters = unique(yhat)\n#Display\nfor cluster\
    \ in clusters:\n    row_ix = where(yhat == cluster)\n    pyplot.scatter(X[row_ix,\
    \ 0], X[row_ix, 1])\npyplot.show()\n```\n\nNote that we arbitrarily chose two\
    \ clusters in this sample, as shown in `model = Birch(threshold = 0.01, n_clusters\
    \ = 2)`. We are sticking with our sample of 1800 so that we can compare our output\
    \ figures. The following screenshot shows two sample BIRCH models. The first (*on\
    \ the left*) shows the algorithm run as provided in the preceding snippet. The\
    \ second (*on the right*) shows the same algorithm run but for three clusters.\n\
    \nTo run the second graph, we changed the model line code to `model = Birch(threshold\
    \ = 0.01, n_clusters = 3)`. Take a look at the following figure, which shows both\
    \ plots – `n_clusters = 2` and `n_clusters = 3`:\n\nNotice that on the *left*\
    \ of the preceding figure, two clusters are clearly shown. Compared to *Figure\
    \ 15.14*, you can see that some data points have been converted to fit each of\
    \ the clusters identified. The scatterplot on the *right* of the preceding screenshot\
    \ divides the data into three distinct clusters. To get more familiar with the\
    \ clustering algorithms, change the parameters to see what happens when you change\
    \ the number of clusters, the sample size, and other parameters.\n\nNow, let’s\
    \ take a look at the K-means clustering algorithm.\n\n## Using the K-means clustering\
    \ algorithm\n\nThe K-means clustering algorithm is one of the most widely used\
    \ clustering algorithms. The algorithm assigns examples so that the variance is\
    \ minimized in each of the identified clusters. Much like with the BIRCH algorithm,\
    \ we set the number of clusters within the algorithm. Let’s take a look at the\
    \ K-means code snippet:\n\nch15_KMeans.py\n\n```python\nfrom numpy import unique\n\
    from numpy import where\nfrom sklearn.datasets import make_classification\nfrom\
    \ sklearn.cluster import KMeans\nfrom matplotlib import pyplot\n#Dataset definition\n\
    X, _ = make_classification(n_samples = 1800,\n    n_features = 2, n_informative\
    \ = 2, n_redundant = 0,\n    n_clusters_per_class = 1, random_state = 4)\n#Model\
    \ identification and fit\nmodel = KMeans(n_clusters = 2)\nmodel.fit(X)\n#Clusters\n\
    yhat = model.predict(X)\nclusters = unique(yhat)\n#Display\nfor cluster in clusters:\n\
    \    row_ix = where(yhat == cluster)\n    pyplot.scatter(X[row_ix, 0], X[row_ix,\
    \ 1])\npyplot.show()\n```\n\nAgain, notice that we’re using the same number of\
    \ clusters (2) and the number of samples (1800) so that we can compare our displays.\
    \ The following screenshot shows the K-means scatterplot’s output:\n\nNotice that\
    \ the data is still the same. However, when we compare the displays we got from\
    \ the BIRCH algorithm and the K-means algorithm, we can see that our algorithms\
    \ produced very different results for our clusters.\n\nThere are many other clustering\
    \ algorithms we can use and test. Learning about them and comparing the results\
    \ is imperative in determining which ones to use based on real datasets. The results\
    \ from the K-means algorithm, in this case, do not fit the model well. The BIRCH\
    \ model seems more suited when using two clusters because the variance in the\
    \ K-means algorithm is unequal.\n\nAs we move on from the clustering examples,\
    \ please note that, as for much of data science and ML, the more we use the models\
    \ and algorithms, the more we understand their uses and when the models are appropriate,\
    \ and we can learn to visually identify whether an algorithm fits our data or\
    \ not.\n\n## Summary\n\nThis chapter provided a thorough introduction to ML with\
    \ Python, covering the basics and progressing to practical applications. The key\
    \ topics included defining ML, exploring its life cycle, and discussing different\
    \ algorithms, including DL. Practical skills were emphasized, such as using Python\
    \ packages such as Keras for data modeling, neural network definition, model training\
    \ and evaluation, and making predictions. This chapter also touched on data classification\
    \ and clustering. We will continue to explore some of the topics that were discussed\
    \ here in the next chapter. We will also see some of these applications in the\
    \ examples provided in [Chapter 18](Chapter 18), *Advanced Applied Computational\
    \ Thinking Problems*.\n\n# 16\n\n# Using Computational Thinking and Python in\
    \ Statistical Analysis\n\nIn this chapter, we will use Python and elements of\
    \ computational thinking to solve problems that require statistical analysis algorithms.\
    \ We will use **pandas DataFrames** to create statistical analysis algorithms\
    \ within the Python environment. Additional packages in Python will be needed\
    \ to create statistical analyses, such as `numpy`, `pytz`, and more. We will use\
    \ those packages when they are needed for the code we will work with and when\
    \ learning what the libraries help us do, such as organizing data with **pandas**,\
    \ for example.\n\nIn this chapter, we will cover the following topics:\n\n- Defining\
    \ the problem and Python data selection\n- Preprocessing data\n- Processing, analyzing,\
    \ and summarizing data using visualizations\n\nBy the end of this chapter, you\
    \ will be able to design algorithms that best fit the scenarios you are presented\
    \ with. You will also be able to identify Python functions that best align with\
    \ the problems presented and generalize your solutions.\n\n## Technical requirements\n\
    \nYou will need the latest version of Python for running the code in this chapter.\n\
    \nYou will need to have the `pandas`, `numpy`, and `scipy` packages installed\
    \ for the problems in this chapter.\n\nYou can find the full source code used\
    \ in this chapter here:\nhttps://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter16.\n\
    \n## Defining the problem and Python data selection\n\nBefore we look at the **pandas**\
    \ library, let's define what data analysis is. When we talk about data analysis,\
    \ we are talking about the process of inspecting, cleansing, transforming, and\
    \ modeling data with the intent of discovering useful data, notifying conclusions,\
    \ and supporting decision-making.\n\nDecision-making is critical. We don’t just\
    \ want to see what the data says has happened in the past. We want to use data\
    \ in order to make informed decisions for the future.\n\nTake a look at some of\
    \ the uses of data analysis:\n\n- **Business**: It helps when making decisions\
    \ based on customer trends and behavior prediction, increasing business productivity,\
    \ and driving effective decision-making\n- **Weather forecasting**: Data about\
    \ the atmosphere (temperature, humidity, wind, and more) is collected and analyzed\
    \ to understand atmospheric processes (meteorology) to determine how the atmosphere\
    \ will evolve in the future\n- **Transportation**: Data can be used to determine\
    \ trends, including traffic, accidents, and more, helping us make decisions about\
    \ traffic patterns, traffic light durations, and much more\n\nThe aforementioned\
    \ uses are only some of the possible applications, of course. Data analytics is\
    \ used for a very wide range of things, and by businesses and educational organizations\
    \ to make critical decisions, provide resources to the community, fund our schools\
    \ and colleges, and so much more.\n\nSo, let’s take a look at which tools we have\
    \ available to analyze that data. One of the main libraries used in data analysis\
    \ in Python is the `pandas` package. The greatness of `pandas` lies in its ease\
    \ of use, easy data structure, and high performance. Using `pandas` simplifies\
    \ our work in data analysis.\n\n## Defining pandas\n\nOne thing that’s important\
    \ to note is that `pandas` is built on top of `numpy`. `numpy` is a package that\
    \ helps us work with arrays. Python doesn’t have arrays per se, so the packages\
    \ allow us to create them, use them, and then build upon that capability.\n\n\
    `pandas` provides a flexible and easy data structure to simplify your work in\
    \ data analysis. It is a great tool for **big data**. When we talk about big data,\
    \ we’re talking about structured and unstructured datasets that are analyzed so\
    \ that we can get better insights and aid in decision-making or strategies for\
    \ businesses and organizations. `pandas` can handle importing different formats,\
    \ such as `.csv` files, **SQL**, and **JSON**, as well as all sorts of manipulation,\
    \ such as selecting data, merging, reshaping, and cleaning the data.\n\nThere\
    \ are two different ways to store data in `pandas`—series and DataFrames:\n\n\
    - **Series** are one-dimensional arrays that hold any data type (integer, string,\
    \ or float); series represent one column of data.\n- **DataFrames** are two-dimensional\
    \ objects that can have multiple columns and data types. They take inputs such\
    \ as dictionaries, series, lists, and other DataFrames.\n\nLet’s now learn when\
    \ to use `pandas`.\n\n## Determining when to use pandas"
