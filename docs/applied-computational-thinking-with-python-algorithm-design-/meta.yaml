    ## 3 Understanding Algorithms and Algorithmic Thinking


    In this chapter, we will focus more closely on understanding algorithms and algorithmic
    thinking. While this is the last step in the computational thought process, it
    is critical that we understand how algorithmic thinking helps us plan and understand
    our problems better. That is, the more we practice algorithmic design and algorithmic
    thinking, the easier it is to understand, decompose, and recognize patterns when
    problems are presented to us.


    In this chapter, we will cover the following topics:


    - Defining algorithms in depth

    - Designing algorithms

    - Analyzing algorithms


    After reading this chapter, you’ll understand algorithms better. So, we’ll begin
    by analyzing the definition of algorithms again, which we covered previously in
    *Chapter 2, Elements of Computational Thinking*, as well as how to design mathematical
    and computational algorithms.


    ## Technical requirements


    The full source code used in this chapter can be downloaded from [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter03](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter03).


    ## Defining algorithms in depth


    As we mentioned in *Chapter 2, Elements of Computational Thinking*, an **algorithm**
    is simply a set of instructions. We use instructions in everyday life, sometimes
    consciously, sometimes unconsciously. Think about the routines you follow in the
    morning, for example. The alarm clock sounds. *What do you do next? Do you go
    prepare coffee? Shower? Brush your teeth first?*


    Most of us follow the same steps every single morning. You could say we’ve *programmed*
    ourselves to follow those steps. Now think of a time your schedule changed and
    your routine was different. I know I’ve had to stop and regroup many times because
    my *program* no longer works. I can’t wake up at 6 a.m. for a 5 a.m. flight, for
    example. But by changing my wake-up time, I may do things out of order and maybe
    even forget something because my program just didn’t work the same.


    Algorithms for computers are similar in that we need to reprogram the set of instructions
    if a set of conditions has changed. The programs can only go as far as we have
    stated parameters for them. Most programs cannot adjust or adapt to any new information
    that is not previously coded into it. That said, **machine learning** and **artificial
    intelligence** are evolving. While we’re not talking about those kinds of programs
    here, even in those instances we’d still need to adjust the programs to do what
    we need them to.


    To design algorithms, we need to make sure that they meet some specific characteristics.
    Algorithms should do the following:


    - Be clear and unambiguous

    - Have inputs that are well defined

    - Have outputs that are well defined

    - Have finiteness

    - Be feasible

    - Be language-independent


    Let’s look at each of the characteristics in the preceding list and define them.


    ### Algorithms should be clear and unambiguous


    An algorithm is clear and unambiguous when each of the steps can easily be understood,
    is easily defined, and has inputs and outputs that are also clear and well defined.
    There should also only be one meaning for each component of the algorithm. Keep
    in mind that, although not required, to keep our algorithms clear, easy to read,
    and unambiguous, we can add comments to make them easily readable by the humans
    working with them. Recall that the comments will be ignored by the programming
    language itself.


    ### Algorithms should have inputs and outputs that are well defined


    The **inputs** into an algorithm can be user-provided, meaning that the user of
    the program enters the data. Input can also mean something that is defined within
    the program. This means that I may include a variable with a set value already
    provided.


    For example, if I need a user to tell me the number of tickets they are purchasing,
    I can write the algorithm to ask for that input. I can also give that input as
    a defined variable with a given value already. An algorithm does not always require
    an input – zero-input algorithms do exist – but when the algorithm requires input,
    defining that input is important. An example of an input is asking for a user’s
    name in a program. Think about modern video games. Many of them will prompt the
    user for a name with phrases such as, “Hello traveler. What is your name?”


    As a user, I’d enter **sofia** when given that prompt, which gives me the following:


    ```

    "Hello Sofia. Welcome to the adventure!"

    ```


    As you can see, the game will then produce an output that uses my name.


    This final line is the **output** of the program. I can write a simple program
    to ask that question in Python as well:


    ```

    name = input("Hello traveler. What is your name? ")

    print(f"Hello, {name}. Welcome to the adventure!")

    ```


    Notice that we defined the variable for the name, then used it inside brackets
    in the `print` call. The `f` before the string tells the program that we want
    to use some values in that call and the value in the brackets tells it to find
    that variable’s value. The syntax here is what we call an f-string.


    When run, the program looks like this:


    ```

    Hello traveler. What is your name? Sofia

    Hello Sofia. Welcome to the adventure!

    ```


    This simple algorithm allowed us to save the name as a variable. That variable
    was used only once in the output of this simple code. However, in a game, that
    name variable may be used in multiple instances, such as during conversations
    with characters within the game, and so on.


    The **output** of a program is the information that leaves a system, that is,
    the product of your program. Given some information or code, the output is what
    is produced from the instructions in the program. But note that not all output
    is printed. That is, the program output can be something that runs in the background.
    Think of all the programs running in the background on your computer and game
    systems. Algorithms can have hundreds of outputs, some visible, some invisible.
    An example of an invisible output is when we use a line of code such as `return
    True`. This saves that output as `True`, but does not print anything out to the
    user. Visible outputs can be images, music, other media, and much more. We can
    make programs do pretty much anything we want them to. That’s why programming
    is so much fun!


