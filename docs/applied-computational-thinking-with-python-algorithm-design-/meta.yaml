    \ how they apply to our algorithm further is recommended.\n\n## The binary cross-entropy\
    \ model\n\nIn binary classification, we use cross-entropy as the default **loss\
    \ function**. The loss function is a method that helps us evaluate how our algorithm\
    \ models the data. With the loss function, we can use optimization to produce\
