    \ science, formal language refers to the logical processing and syntax of computer\
    \ programming languages. Concerning automata, the machines process the formal\
    \ language to perform the tasks or code provided for them.\n\n## Symbolic computation\n\
    \n**Symbolic computation** is a branch of computational mathematics that deals\
    \ with computer algebra. The terms *symbolic computation* and *computer algebra*\
    \ are sometimes used interchangeably. Some programming software and languages\
    \ focus on the symbolic computations of mathematics formulas. Programs that use\
    \ symbolic computation perform operations such as polynomial factorization, simplifying\
    \ algebraic functions or expressions, finding the greatest common divisor of polynomials,\
    \ and more.\n\nIn this book, we will use computer algebra and symbolic computation\
    \ when solving some real-world problems. Python allows us to not only perform\
    \ the mathematical computations that may be required for problems but also explore\
    \ graphical representations or models that result from those computations. As\
