- md: '## Summary


    In this chapter, we discussed problem definition, decomposition, and analysis.
    We used problems to help us go through the process of identifying problems, decomposing
    them into the relevant parts and identifying constraints, and analyzing our algorithms.
    We used flowcharts to help us learn about decision-making when designing algorithms
    and how to organize ideas.


    We also learned to test our algorithms often. This provided us with the skills
    and understanding to identify errors early rather than wait until we have too
    many lines of code, which makes it hard to identify those errors. We used an online
    store and a guessing game to help us understand some of the functionalities available
    in Python. Throughout the process, we used Boolean code to verify inputs, we used
    nested if statements, and we learned about how to use dictionaries to solve the
    problems presented.


    In addition, we got a chance to use a dictionary for an algorithm that used user
    input and variables. Using this algorithm gave us flexibility for defining some
    variables and editing the variables once we ran the algorithm or within the algorithm.


    In the next chapter, we will cover the solution process and design, delving deeper
    into more complex problems and the Python language.


    ## 7 Designing Solutions and Solution Processes


    In this chapter, we will design **solutions** to multiple problems, using previously
    learned content such as **analysis** of the problem and the **computational thinking
    process**. We will incorporate **logical processing** to create visual representations
    of the decision process that will guide our algorithm design. Visual representations
    discussed include **diagrams**, **flowcharts**, and other helpful processes. In
    this chapter, we will learn about the key elements of solution design and how
    to create, use, and apply diagrams in our solution processing and design, and
    we will look at applying the solution design process to various problems.


    In this chapter, we will cover the following topics:


    - Designing solutions

    - Diagramming solutions

    - Creating solutions


    To further our knowledge of algorithms and solution design, we need to look more
    closely at the front end of problems. We will begin by discussing the process
    of designing solutions in depth.


    ### Designing solutions


    When we are designing solutions, we often use a **design thinking model**, even
    if we don’t always realize it. Design thinking is described by different models,
    but we’ll be looking at the five-step model that is most commonly seen when using
    design thinking.


    ### Technical requirements


    Here is the full source code that will be used throughout this chapter:

    https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter07.


    In conjunction with computational thinking, the design thinking process can help
    us evolve our ideas before we start diagramming solutions. It should be noted
    that we don’t go through the design thinking process linearly, much as in computational
    thinking. Think about the steps in computational thinking, as set out here:


    - Problem decomposition

    - Pattern recognition

    - Abstraction

    - Algorithm design


    We have defined all these steps in previous chapters, most recently in the introduction
    to *Chapter 6, Exploring Problem Analysis*. Looking at them again, we know that
    we can go back to the decomposition as we’re writing and designing the algorithm.
    That’s what we mean by non-linear processes.


    The design thinking model works the same way. It was designed by the Hasso Plattner
    Institute of Design at Stanford University. The main steps of the model include
    the following:


    - **Empathize**: Understand the problem from the audience or stakeholder perspective

    - **Define**: Identify the objectives, the decisions that need to be made, any
    biases introduced, and any details about the problem

    - **Ideate**: Brainstorm ideas, which go with the diagramming we’ll be doing in
    the next section of this chapter

    - **Prototype**: Design the algorithm solution and check it often

    - **Test**: Check your algorithm often throughout the process and go back to previous
    steps as needed


    As you can see, I’ve adapted the design thinking model to align more with a computational
    thinking process. The main goal when we’re using these models and combining them
    is to break down the harder problems into simpler chunks so that we can solve
    and design the best algorithms. This does not take the place of computational
    thinking. It simply provides a better idea of how we can address the process.
    The following diagram helps demonstrate how the process may work:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_126_0.png)


    As you can see, rather than using the linear model most frequently shown, the
    preceding model shows the process as *cyclical*. That said, going back to *empathize*
    can happen from any point, so going back and forth between these steps is the
    best way to use the design thinking model. It is important to note that I can
    be in the **Prototype** stage and realize that I need to go back to another step.
    So, don’t think of the steps as ordered. We can go back to any point, as needed,
    while we work on our algorithm solutions.


    Let’s take a look at a scenario where we use design thinking in conjunction with
    computational thinking.


    ### Problem 1 – a marketing survey


    Let’s say you’re working with a marketing firm and they ask you to put together
    a survey to gather feedback about a website. Here are some of the steps you may
    go through:


    1. **Identifying stakeholders**: This includes the people you’ll survey as well
    as the people who will use the information after the survey, for example.

    2. **Identifying questions**: This is where you define what information you hope
    to find out from the survey.

    3. **Designing the survey**: This includes not only the questions you identified
    but also the aesthetics of what the survey will look like.

    4. **Information gathering**: This is where you decide how you will communicate
    with the people who will fill out the survey, such as email, a link on a website,
    or similar.

    5. **Data analysis**: You can write a Python algorithm to help you with data analysis,
    including creating tables and graphs based on the data collected.

    6. **Data sharing**: This is where you will plan the visuals, reports, and data
    presentation to the original stakeholders.


    Let’s be clear: this is an oversimplification of the process. But let’s say you
    realize you need to include another group for the survey. Say you were only initially
    getting feedback from students at a school but realized you wanted to add teachers
    and parents. Well, then you would go back to *step 1* and identify in which ways
    the rest of your information would be affected. You may want to change the look
    of the survey or add a different one for adults versus children. You may need
    to add questions that are for only one group, which will affect your decision-making
    in the algorithm for the survey.


    Now, let’s take a look at these steps within the *design thinking* process.


    For our problem, identifying stakeholders and questions are part of *steps 1,
    2, and 3* of the design thinking model: *empathize, define, and ideate*. Building
    the algorithm is both part of the **prototype** and **test**, which are *steps
    4 and 5*. Adding people to the survey takes us back to *steps 1-3*, and the cycle
    repeats until we have a working algorithm for our scenarios. Throughout the computational
    thinking model and using its elements, you’ll use the design thinking process
    embedded within. It’s a natural part of the decision-making process.


    Now that we’ve looked at the design thinking model, let’s take a look at how to
    visually represent decision-making using diagramming solutions.


    ### Diagramming solutions


    When we are designing algorithms, we often use diagrams and flowcharts to help
    us analyze the process and visually see where our decisions are made. These diagrams
    allow us to create better algorithms. You’ll remember that we created a flowchart
    in [Chapter 6](Chapter 6), *Exploring Problem Analysis*, when we were building
