  md: '# 4


    # Understanding Logical Reasoning


    In this chapter, we will explore logical reasoning processes, such as conditional
    statements, algorithmic reasoning, and Boolean logic. We will explore inductive
    and deductive reasoning before delving deeper into some logic operators.


    In addition, we will be looking at writing algorithms using logic to solve computational
    thinking problems.


    In this chapter, we will cover the following topics:


    +   - Understanding the importance of logical reasoning

    - Using Boolean logic and operators


    When solving computational thinking problems, logical reasoning is necessary.
    We all know that programming code has steps that are followed linearly. Imagine
    we have 10 lines of code. If we do not apply logical reasoning, the code reads
    one line at a time—it reads the first line, then the second line, and so on until
    the last one. Using logical reasoning allows us to compare things before moving
    on, return to a previous line of code, and much more. Throughout this chapter,
    we will learn about logical reasoning to create algorithms that address problems
    in efficient ways using logic operators.


    To understand logical reasoning, we will begin by defining logic in general and
    then discuss how to use logic when designing and writing algorithms.


    # Technical requirements


    You can find the code files for this book at [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter04](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter04).


    # Understanding the importance of logical reasoning


    As we worked through *Chapter 3, Algorithms and Algorithmic Thinking*, we learned
    how to design some basic algorithms while solving computational thinking problems.


    In this section, we will understand how important logical reasoning is and how
    to apply the types of logical reasoning with the help of examples.


    As we write algorithms, we’ll need to use logical reasoning to create these algorithms.'
