    frequently, otherwise, you may end up with a finiteness error, and hunting them
    down can sometimes prove difficult. Frequently checking your code will make your
    debugging process much easier, especially when it comes to finiteness.


    # Algorithms should be feasible


    An algorithm also has to be **feasible** in terms of its goal and the content
    and resources available. When writing algorithms, we have constraints or conditions
    we may write into the steps. If there is no way to meet all the constraints, then
    the algorithm isn’t feasible. Think of the two following conditions:


    +   - It is 3:00 p.m.'
  - '[PAGE 72]


    +   - It is 5:00 p.m.


    If we set both of these constraints on a variable, for example, it would not be
    possible. It cannot be both 3:00 p.m. and 5:00 p.m. at the same time. This is
    what we call **infeasible**. While the algorithm can continue, we’re still creating
    a problem by making these two things true at the same time. Some constraints will
    never be met, so the algorithm is considered infeasible. There has to be a way
    for the algorithm to meet all constraints to be feasible. In addition, if an algorithm
    is written to depend on future technology, for example, it is also considered
    infeasible.


    # Algorithms should be language independent


    Finally, an algorithm must be **language independent**. The set of instructions
    in an algorithm should be written as simply as possible. A good algorithm will
    be such that it can be written in any language easily and produce the same output.


    For example, let’s take the time. I can say “It is 5:00 p.m.” in English. If I
    write that in Spanish, it would be “Son las 5:00 pm.” The way we write time can
    be easily translated because there are global norms we follow. And don’t worry,
    I’m not ignoring that many countries would use 17:00 instead of 5:00 p.m. Using
    either convention allows us all to know what time it is. And that’s how algorithms
    should be written: they should be able to be read by anyone.


    In this section, we learned about algorithms and the characteristics needed to
    design them. Keeping in mind the characteristics of a good algorithm will allow
    us to avoid errors and create working algorithms for whatever problems we are
    presented with. Let’s now take a look at how to design some algorithms.


    # Designing algorithms


    When designing algorithms, order matters. There are hierarchies that we have to
    take into account when working with programming languages and that includes Python.
    Think about this as the order of operations in mathematics. If you recall, we
    use the mnemonic **PEMDAS** to remember the order of operations in mathematics.
    **PEMDAS** stands for **Parentheses**, **Exponents**, **Multiplication/Division**,
    and **Addition/Subtraction**.


    I write **Multiplication/Division** together like this because multiplication
    and division hold the same weight. That is, multiplication does not necessarily
    need to happen before division. If I have a division first and then a multiplication
    from left to right, the division happens first. The same is true for addition
    and subtraction. Neither has more weight than the other, so we perform them in
    order of appearance from left to right.'
