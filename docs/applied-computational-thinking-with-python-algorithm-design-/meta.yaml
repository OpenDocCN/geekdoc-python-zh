    \n我们还可以使用配对图来显示变量之间是否存在相关性。让我们使用另一个内置数据集 flights，看看配对图的作用：\n\nch14_pairplotSNS.py\n\
    \n```\n# Import seaborn\nimport seaborn as sns\n# Import matplotlib.pyplot\nimport\
    \ matplotlib.pyplot as plt\nsns.set_style('darkgrid')\n# Load an example dataset\n\
    flights = sns.load_dataset(\"flights\")\n#Create the plot\nsns.pairplot(\n   \
    \ data=flights,\n)\nplt.show()\n```\n\n前面的代码片段与之前用于 exercise 数据的代码非常相似。不同之处在于我们在这里调用了\
