    ## Defining ML


    ML is a subfield of **artificial intelligence (AI)** that focuses on building
    systems that can learn from data. Rather than being explicitly programmed to perform
    a task, an ML model uses data to learn patterns and make decisions. At its core,
    ML is about creating algorithms that improve their performance at a task by being
    exposed to more data over time.


    DL is a subset of ML that uses neural networks with multiple layers to model complex
    patterns and representations in large datasets. In this section, we’re going to
    explore the ML life cycle, elaborating on it and the process of crafting ML models:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_257_0.png)


    Figure 15.1 – ML umbrella


    ## ML umbrella


