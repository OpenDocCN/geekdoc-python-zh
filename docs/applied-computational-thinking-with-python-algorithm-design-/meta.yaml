    ## Using the SciPy library


    The SciPy library is mostly used to solve scientific and mathematical problems.
    Some of the helpful sub-packages and their uses are as follows:


    - **cluster** is used for clustering algorithms

    - **constants** contains physical and mathematical constants and units, such as
    **golden** (the golden ratio) and **mu_0** (the magnetic constant)

    - **fftpack** utilizes fast Fourier transform routines

    - **integrate** is used for differential equation solvers

    - **interpolate** contains interpolation and smoothing splines

    - **io** relates to input and output

    - **linalg** is associated with linear algebra

    - **ndimage** is used for processing *N*-dimensional images

    - **odr** is used for orthogonal distance regression

    - **optimize** is used for optimization and root-finding routines

    - **signal** is used for signal processing

    - **sparse** is used for sparse matrices and associated routines

    - **spatial** is used for spatial data structures and algorithms

    - **special** is used for special functions (such as elliptic functions and integrals)

    - **stats** is used for statistical distributions and functions


    Within each of these sub-packages, SciPy provides many functions to aid with visualizing
    and optimizing scientific data. Because it was created specifically for that purpose,
    it is a common tool that’s used in the scientific area. That said, the statistical
    packages are also robust, so the library is helpful to use even in non-scientific
    statistical analyses.


    Now, let’s look at the Scikit-Learn library, which we’ll use in the following
    chapters of this book.


    ## Using the Scikit-Learn library


    Scikit-Learn is probably the most important library for machine learning available
    in Python. We will explore this library in samples in the following chapters as
    we explore some of the problems that would be suitable for machine learning, so
    we won’t dive too deep into the functionalities here. That said, here are some
    of the functionalities that Scikit-Learn gives us:


    - **Clustering** helps with grouping data that is unlabeled.

    - **Regression** measures the relationship between the variable (the mean of the
    variable) and the values of the other variables.

    - **Classification** has multiple classifiers within Scikit-Learn, similar to
    regression. Some of these classifiers are **linear discrimination analysis**,
    **bagging classifier**, and **K-nearest neighbors classifiers**.

    - **Model selection** has tools for creating training and testing models in machine
    learning.

    - **Preprocessing** contains tools to standardize the dataset (more details on
    data preprocessing can be found in *Chapter 16, Using Computational Thinking and
    Python in Statistical Analysis*).


    The Scikit-Learn library is something we will become fairly familiar with in the
