    print(state_capitals[\"Ohio\"])\n```\n\nNotice that we can now access the information\
    \ for the state capital by simply giving the state name. The output for this code\
    \ is simply **Columbus**. *But what if you just want to run the program and ask\
    \ for the user to input a state of their choosing?* We can also write that in\
    \ a line of code with the existing dictionary. Take a look at the following code:\n\
    \n```\nstate_capitals = {\n    \"Ohio\" : \"Columbus\",\n    \"Alabama\" : \"\
    Montgomery\",\n    \"Arkansas\" : \"Little Rock\"\n    }\nstate = input(\"What\
    \ state's capital are you looking for today? \")\ncapital = state_capitals[state]\n\
    print(\"The capital of \" + state + \" is \" + capital + \".\")\n```\n\nIn this\
    \ code, the user enters the state for which they want to find the capital. This\
    \ is helpful, as you can just run the code each time without having to go into\
    \ it to change the line of code to be printed, as shown in *State Capitals algorithm\
    \ 2*. The code, when run, looks like this:\n\n```\nWhat state's capital are you\
    \ looking for today? Alabama\nThe capital of Alabama is Montgomery.\n```\n\nNow\
    \ let’s look at the need for the algorithm in the first place. The student wants\
    \ to continue to add states to the program. With this program, since it is dictionary-based,\
    \ she can simply add a line of code when she needs to add another state. For example,\
    \ if she wanted to add the state of **Iowa**, whose capital is Des Moines, she’d\
    \ need to use the following code:\n\n```\nstate_capitals[\"Iowa\"] = \"Des Moines\"\
    \n```\n\nTake a look at the following code block. Note the placement of the code\
    \ within the program. It is important that we place that new code before the new\
    \ variables, otherwise, if you try to run the program and input **Iowa**, the\
    \ code will return an error rather than provide the capital of Iowa."
- md: "In algorithms, logic is extremely important. We cannot use a value we have\
    \ not defined in variables that have already been used. That is, if the `state`\
    \ and `capital` variables are used before identifying the new value for Iowa,\
    \ then the code ends with an error when the input is Iowa. However, if we add\
    \ the key pair values before we run those two variables, the code runs as expected:\n\
    \n```\nstate_capitals = {\n    \"Ohio\" : \"Columbus\",\n    \"Alabama\" : \"\
    Montgomery\",\n    \"Arkansas\" : \"Little Rock\"\n}\nstate_capitals[\"Iowa\"\
    ] = \"Des Moines\"\nstate = input(\"What state's capital are you looking for today?\
    \ \")\ncapital = state_capitals[state]\nprint(\"The capital of \" + state + \"\
    \ is \" + capital + \".\")\n```\n\nAs you can see, we can adapt and adjust the\
    \ code to better suit our needs. Now let’s take a look at a few algorithms to\
    \ determine whether they would work; that is, whether they would produce an error\
    \ or run appropriately.\n\n## Algorithm analysis 2 – terminating or not terminating?\n\
    \nAs we discussed earlier in this chapter, algorithms should be terminating. That\
    \ is, they must have a way to end, or they can cause many errors. Let’s look at\
    \ an algorithm and analyze it to determine whether it will terminate or not:\n\
    \n```\nx = 0\nwhile x >= 3:\n    x += 1\nprint(x)\n```\n\nFirst, let’s take a\
    \ look at the value of `x` variable. The `x` variable starts the program with\
    \ a value of 0. The `while` loop (which states the conditions under which the\
    \ value of `x` will change) states that when the `x` value is greater than 3,\
    \ it is incremented by a value of 1.\n\nThis algorithm terminates because it will\
    \ print the original value for the variable, 0. However, this algorithm doesn’t\
    \ perform any actions, as the condition will never be met. Also, notice that the\
    \ `print` command is not indented. If it were indented, no output would be given\
    \ for this algorithm, as the `print` command would never be called since the variable\
    \ will never meet the conditions of the `while` loop.\n\nNow let’s take a look\
    \ at the following algorithm:\n\n```\nj = 0\nwhile j >= 0:\n    j -= 1\n    print(j)\n\
    ```\n\nIn this case, the variable condition is met because j has to be greater\
    \ than or equal to 0 for the program to run. Once the condition is met, the value\
    \ of the variable is decremented by 1, so the `print` command will produce an\
    \ output of -1. The code will not run a second time because the value of the variable\
    \ is no longer greater than or equal to 0. This algorithm is terminating, produces\
    \ an output, and is feasible.\n\nFinally, let’s take a look at the following algorithm\
    \ with a changed condition:\n\n```\nj = 0\nwhile j <= 0:\n    j -= 1\n    print(j)\n\
    ```\n\nIn this case, the algorithm isn’t terminating. Because we changed the `while`\
    \ loop to be less than or equal to 0, this algorithm will now continue to run\
    \ forever.\n\nAnalyzing algorithms can be very complex. We have only started to\
    \ touch on some of the components of algorithms. As we delve deeper into other\
    \ computational thinking problems throughout this book, we need to keep in mind\
    \ the characteristics of a good algorithm to analyze our code effectively. It\
    \ is also important that we continue to take into consideration the elements of\
    \ the computational thinking process: **decomposition**, **pattern recognition**,\
    \ **pattern generalization**, and **algorithm design**.\n\nWhen we are designing\
    \ the algorithm and testing it, using the characteristics of good algorithms will\
    \ allow us to observe errors, adjust our algorithm for ease of use, provide better\
    \ inputs and outputs, and ensure that we are not creating infeasible and non-terminating\
    \ algorithms.\n\n## Summary\n\nIn this chapter, we discussed the definition of\
    \ an algorithm, which is a set of steps that allows a computer to complete a process\
    \ and provide some output. We went through the characteristics of algorithms.\n\
    \nWe designed algorithms based on problem scenarios and then analyzed algorithms\
    \ to determine whether they met the characteristics needed to run properly. Understanding\
    \ the characteristics of algorithms and how algorithms work allows us to create\
    \ algorithms with far fewer errors than if we were unaware of these characteristics.\
    \ Notice that I said *fewer* errors.\n\nWhen working with code, errors are a fact\
    \ of life. We will inevitably make mistakes and accidentally introduce bugs or\
    \ make some code loop infinitely. Understanding the characteristics of a good\
    \ algorithm allows us to reduce those errors, even if we can’t fully eliminate\
    \ them from our day-to-day work.\n\nIn the next chapter, we will learn more about\
    \ logical reasoning. Throughout the chapter, we will discuss the definition of\
    \ logic, learn about inductive and deductive reasoning, add to our knowledge of\
    \ operators and Boolean logic, and learn more about logic errors. We will be using\
    \ elements of computational thinking and the characteristics of algorithms to\
    \ further our knowledge of logical reasoning.\n\n# 4 Understanding Logical Reasoning\n\
    \nIn this chapter, we will explore logical reasoning processes, such as conditional\
    \ statements, algorithmic reasoning, and Boolean logic. We will explore inductive\
    \ and deductive reasoning before delving deeper into some logic operators.\n\n\
    In addition, we will be looking at writing algorithms using logic to solve computational\
    \ thinking problems.\n\nIn this chapter, we will cover the following topics:\n\
    \n- Understanding the importance of logical reasoning\n- Using Boolean logic and\
    \ operators\n\nWhen solving computational thinking problems, logical reasoning\
    \ is necessary. We all know that programming code has steps that are followed\
    \ linearly. Imagine we have 10 lines of code. If we do not apply logical reasoning,\
    \ the code reads one line at a time—it reads the first line, then the second line,\
    \ and so on until the last one. Using logical reasoning allows us to compare things\
    \ before moving on, return to a previous line of code, and much more. Throughout\
    \ this chapter, we will learn about logical reasoning to create algorithms that\
    \ address problems in efficient ways using logic operators.\n\nTo understand logical\
    \ reasoning, we will begin by defining logic in general and then discuss how to\
    \ use logic when designing and writing algorithms.\n\n## Technical requirements\n\
    \nYou can find the code files for this book at [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter04](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter04).\n\
    \n## Understanding the importance of logical reasoning\n\nAs we worked through\
    \ *Chapter 3, Algorithms and Algorithmic Thinking*, we learned how to design some\
    \ basic algorithms while solving computational thinking problems.\n\nIn this section,\
    \ we will understand how important logical reasoning is and how to apply the types\
    \ of logical reasoning with the help of examples.\n\nAs we write algorithms, we’ll\
    \ need to use logical reasoning to create these algorithms.\n\nIn simple terms,\
    \ **logical reasoning** is the set of steps followed to conclude. In computational\
    \ thinking, when we design algorithms, the systematic set of steps we follow is\
    \ part of the algorithm. The way a computer reads those algorithms depends on\
    \ how we write that algorithm. There are two types of logical reasoning arguments,\
    \ which are as follows:\n\n- Inductive reasoning\n- Deductive reasoning\n\nBefore\
    \ we define those in more depth, let’s look at why logical reasoning is so important\
    \ and why order matters when we create algorithms.\n\nIn order to analyze a problem\
    \ and provide an algorithm that helps us tackle the problem, we need to understand\
    \ what logical reasoning is first. Logic can be daunting for some, but we use\
    \ it every day subconsciously.\n\nLet’s look at a simple example. Say you take\
    \ a shower every morning and go to work. Well, would you get dressed for work\
    \ before the shower? No, because that would make absolutely no sense. Logically,\
    \ you’d have to shower first before you put on your clothes for work. Now, I’ve\
    \ skipped a ton of steps here, but those steps are logical. Other examples of\
    \ logic include following recipes and using an umbrella if it’s raining (or not).\n\
    \nThroughout this chapter, we’ll weave in and out of logical reasoning and designing\
    \ algorithms using **logical operators**. A logical operator allows a program\
    \ to make decisions. We use those too in everyday life without realizing it. For\
    \ example, if it’s sunny and warm, we may want to go biking, but not if it’s sunny\
    \ and cold. The “and” here is a logical operator.\n\nWe take a lot of things into\
    \ consideration when we’re making decisions. In computational thinking, especially\
    \ in algorithm design, we need to consider those things and provide a way for\
    \ the program to test conditions. We will delve deeper into logical operators\
    \ later in this chapter. For now, let’s look more closely at the types of logical\
    \ reasoning and how to apply them.\n\n## Applying inductive reasoning\n\nWhen\
    \ we talk about inductive reasoning, we’re really working backward. Inductive\
    \ reasoning starts from a conclusion, which may be true or not, and works backward\
    \ to create the code using the existing data. Let’s look at a simple problem first.\n\
    \n### Solving an inductive reasoning sample problem\n\nWe have a budget of $150\
    \ for buying supplies: art pencils and erasers. The art pencils are $1.75 each\
    \ and the erasers are $1.50 each."
  mdcn: "在算法中，逻辑至关重要。我们不能使用尚未定义的值，也不能使用已经用过的变量。也就是说，如果在确定爱荷华州的新值之前就使用了`state`和`capital`变量，那么当输入是爱荷华州时，代码会以错误结束。但是，如果我们在这两个变量运行之前添加键值对，代码就能按预期运行：\n\
    \n```\nstate_capitals = {\n    \"Ohio\" : \"Columbus\",\n    \"Alabama\" : \"\
    Montgomery\",\n    \"Arkansas\" : \"Little Rock\"\n}\nstate_capitals[\"Iowa\"\
    ] = \"Des Moines\"\nstate = input(\"What state's capital are you looking for today?\
    \ \")\ncapital = state_capitals[state]\nprint(\"The capital of \" + state + \"\
    \ is \" + capital + \".\")\n```\n\n如你所见，我们可以调整和修改代码以更好地满足我们的需求。现在让我们看几个算法，来判断它们是否有效；也就是说，它们是会产生错误还是能正常运行。\n\
    \n## 算法分析 2 – 终止还是不终止？\n\n正如我们在本章前面讨论的，算法应该是可终止的。也就是说，它们必须有一种结束的方式，否则可能会导致许多错误。让我们看一个算法并分析它是否会终止：\n\
    \n```\nx = 0\nwhile x >= 3:\n    x += 1\nprint(x)\n```\n\n首先，让我们看看`x`变量的值。`x`变量以值0开始程序。`while`循环（它规定了`x`值变化的条件）表明，当`x`值大于3时，它会增加1。\n\
    \n这个算法会终止，因为它会打印变量的原始值，0。然而，这个算法没有执行任何操作，因为条件永远不会满足。另外，请注意`print`命令没有缩进。如果它被缩进，这个算法将不会产生任何输出，因为`print`命令永远不会被调用，因为变量永远不会满足`while`循环的条件。\n\
    \n现在让我们看看下面的算法：\n\n```\nj = 0\nwhile j >= 0:\n    j -= 1\n    print(j)\n```\n\n\
    在这种情况下，变量条件被满足，因为j必须大于或等于0程序才能运行。一旦条件满足，变量的值就会减少1，所以`print`命令将输出-1。代码不会运行第二次，因为变量的值不再大于或等于0。这个算法是可终止的，产生输出，并且是可行的。\n\
    \n最后，让我们看看下面这个改变了条件的算法：\n\n```\nj = 0\nwhile j <= 0:\n    j -= 1\n    print(j)\n\
    ```\n\n在这种情况下，算法不是可终止的。因为我们把`while`循环改成了小于或等于0，这个算法现在将永远运行下去。\n\n分析算法可能非常复杂。我们才刚刚开始触及算法的一些组成部分。随着我们在本书中深入探讨其他计算思维问题，我们需要牢记优秀算法的特征，以便有效地分析我们的代码。同样重要的是，我们要继续考虑计算思维过程的要素：**分解**、**模式识别**、**模式概括**和**算法设计**。\n\
    \n当我们设计和测试算法时，利用优秀算法的特征将使我们能够观察错误、调整算法以方便使用、提供更好的输入和输出，并确保我们不会创建不可行且不终止的算法。\n\n\
    ## 总结\n\n在本章中，我们讨论了算法的定义，它是一组允许计算机完成某个过程并提供一些输出的步骤。我们介绍了算法的特征。\n\n我们根据问题场景设计了算法，然后分析算法以确定它们是否满足正常运行所需的特征。理解算法的特征以及算法的工作原理，可以使我们创建的算法比不了解这些特征时产生的错误少得多。注意我说的是*更少*的错误。\n\
    \n在处理代码时，错误是不可避免的。我们难免会犯错，意外地引入错误或使某些代码无限循环。理解优秀算法的特征可以让我们减少这些错误，即使我们无法在日常工作中完全消除它们。\n\
    \n在下一章中，我们将学习更多关于逻辑推理的知识。在本章中，我们将讨论逻辑的定义，学习归纳推理和演绎推理，增加我们对运算符和布尔逻辑的了解，并了解更多关于逻辑错误的知识。我们将运用计算思维的要素和算法的特征来加深我们对逻辑推理的理解。\n\
    \n# 4 理解逻辑推理\n\n在本章中，我们将探索逻辑推理过程，例如条件语句、算法推理和布尔逻辑。在深入探讨一些逻辑运算符之前，我们将先探索归纳推理和演绎推理。\n\
    \n此外，我们将研究如何使用逻辑来编写算法，以解决计算思维问题。\n\n在本章中，我们将涵盖以下主题：\n\n- 理解逻辑推理的重要性\n- 使用布尔逻辑和运算符\n\
    \n在解决计算思维问题时，逻辑推理是必要的。我们都知道编程代码是按线性顺序执行的。想象一下我们有10行代码。如果我们不应用逻辑推理，代码会一行一行地读取——它读取第一行，然后是第二行，依此类推直到最后一行。使用逻辑推理允许我们在继续之前进行比较，返回到之前的代码行，等等。在本章中，我们将学习逻辑推理，以创建使用逻辑运算符高效解决问题的算法。\n\
    \n为了理解逻辑推理，我们将首先定义一般的逻辑，然后讨论在设计和编写算法时如何使用逻辑。\n\n## 技术要求\n\n你可以在 [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter04](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter04)\
    \ 找到本书的代码文件。\n\n## 理解逻辑推理的重要性\n\n在我们学习*第3章，算法和算法思维*的过程中，我们学习了如何在解决计算思维问题时设计一些基本算法。\n\
    \n在本节中，我们将理解逻辑推理的重要性，以及如何借助例子应用不同类型的逻辑推理。\n\n在编写算法时，我们需要使用逻辑推理来创建这些算法。\n\n简单来说，**逻辑推理**是为得出结论而遵循的一系列步骤。在计算思维中，当我们设计算法时，我们遵循的系统性步骤是算法的一部分。计算机读取这些算法的方式取决于我们如何编写该算法。有两种类型的逻辑推理论证，如下所示：\n\
    \n- 归纳推理\n- 演绎推理\n\n在我们更深入地定义这些之前，让我们看看为什么逻辑推理如此重要，以及为什么在创建算法时顺序很重要。\n\n为了分析问题并提供帮助我们解决问题的算法，我们首先需要理解什么是逻辑推理。逻辑对一些人来说可能令人生畏，但我们每天都在潜意识地使用它。\n\
    \n让我们看一个简单的例子。假设你每天早上洗澡然后去上班。那么，你会在洗澡前穿好上班的衣服吗？不会，因为那完全说不通。从逻辑上讲，你必须在穿上上班的衣服之前先洗澡。现在，我在这里跳过了很多步骤，但这些步骤是合乎逻辑的。逻辑的其他例子包括遵循食谱和在下雨时（或不下雨时）使用雨伞。\n\
    \n在本章中，我们将围绕逻辑推理和使用**逻辑运算符**设计算法展开讨论。逻辑运算符允许程序做出决策。我们在日常生活中也在使用它们，只是没有意识到。例如，如果天气晴朗温暖，我们可能想去骑自行车，但如果天气晴朗寒冷就不想去了。这里的“和”就是一个逻辑运算符。\n\
    \n在做决定时，我们会考虑很多事情。在计算思维中，特别是在算法设计中，我们需要考虑这些事情，并为程序提供一种测试条件的方法。我们将在本章后面更深入地探讨逻辑运算符。现在，让我们更仔细地看看逻辑推理的类型以及如何应用它们。\n\
    \n## 应用归纳推理\n\n当我们谈论归纳推理时，我们实际上是在逆向工作。归纳推理从一个可能为真也可能不为真的结论开始，然后逆向工作，使用现有数据创建代码。让我们先看一个简单的问题。\n\
    \n### 解决一个归纳推理的示例问题\n\n我们有150美元的预算用于购买用品：艺术铅笔和橡皮。艺术铅笔每支1.75美元，橡皮每个1.50美元。"
