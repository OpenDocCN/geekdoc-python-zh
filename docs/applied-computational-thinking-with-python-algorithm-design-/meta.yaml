    Part of the reason is that there may be questions that depend on each other. For
    example, let’s say you ask the user to state whether they approve of the color
    choices or not. If they do, you can move on. But if they don’t, you may want to
    provide other color schemes for review. That question would only appear for those
    who choose the **No** option. Our flowchart could become rather complicated if
    we were to tackle all the information for our brainstorm, so we’ll focus on a
    few questions within the **Look** category of the brainstorm. Take a look at the
    following flowchart:'
