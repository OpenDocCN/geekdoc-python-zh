    \ This is what we’ll use when we have an encrypted message and want to know what\
    \ the original message was:\n\n```\ndef decode(message, key):\n    decodedM =\
    \ ''\n    for chars in message:\n        if chars in LETTERS:\n            num\
    \ = LETTERS.find(chars)\n            num -= key\n            decodedM += LETTERS[num]\n\
    \    return decodedM\n```"
