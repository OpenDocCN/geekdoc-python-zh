    \ $P(A|B)$ is the probability of the hypothesis, $A$, given the data, $B$.\n-\
    \ **Likelihood:** $P(B|A)$ is the probability of observing the data, $B$ (specific\
    \ words in the document), given that the hypothesis, $A$ (the document is in a\
    \ certain language), is true. This is calculated based on the frequency of words\
    \ in the training documents of each language.\n- **Prior:** $P(A)$ is the probability\
    \ of the hypothesis, $A$, being true irrespective of the data, $B$. In language\
    \ detection, it’s the probability of any document being in a certain language,\
    \ estimated from the training data.\n- **Marginal:** $P(B)$ is the probability\
    \ of observing the data, $B$, across all classes. This acts as a normalizing factor\
    \ and is often omitted in the actual implementation since it remains constant\
    \ for all classes.\n\n## The fundamentals of the Multinomial Event Model\n\nBefore\
