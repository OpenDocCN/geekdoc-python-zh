    \n## 定义优化模型\n\n让我们看看一些不同的模型。请注意，我们没有深入探讨这些模型的使用，但建议进一步探索它们如何应用于我们的算法。\n\n## 二元交叉熵模型\n\
    \n在二元分类中，我们使用交叉熵作为默认的**损失函数**。损失函数是一种帮助我们评估算法如何对数据建模的方法。通过损失函数，我们可以使用优化来产生更准确的结果——也就是说，它有助于减少**预测误差**。当目标值在二元集合中时，我们使用损失函数。\n\
    \n交叉熵是一种损失函数，它计算两个概率分布之间的差异。当使用**逻辑回归**和**人工神经网络**优化分类模型时，我们可以使用交叉熵。\n\n## Adam优化算法\n\
    \nAdam优化算法是一种**随机优化**方法。随机优化用于函数中存在随机性时，以最大化或最小化函数的值。Adam优化算法适用于一些*非凸*的简单优化问题。它效率高且内存占用少，但可以应用于大型数据集。\n\
    \n## 梯度下降模型\n\n梯度下降算法是一种一阶优化算法。一阶指的是线性局部误差。我们对可微分的函数使用梯度下降来寻找局部最小值。\n\n## 混淆矩阵模型\n\
    \n混淆矩阵也称为**误差矩阵**。混淆矩阵在视觉上很有帮助，因为它以表格形式呈现算法的性能，从而可以更好地可视化该性能。它通常用于监督学习。\n\n如前所述，这只是你开始优化算法时的一些基础信息。关于机器学习的更多信息可以在其他Packt书籍中找到，例如*《Python机器学习》*和*《Python探索性数据分析》*。\n\
    \n在我们介绍聚类之前，让我们快速回顾一下本节中关于使用Keras包和模型的内容：\n\n- 加载数据\n- 在Keras中定义神经网络\n- 使用高效的数值后端编译Keras模型\n\
    - 在数据上训练模型\n- 在数据上评估模型\n- 使用模型进行预测\n\n现在，让我们继续讨论数据聚类。\n\n## 实现数据聚类\n\n在本节中，我们将探讨如何处理数据聚类。首先，让我们定义一下**数据聚类**的含义。数据聚类指的是我们如何将数据划分为组或簇。如果簇能提供对领域知识的扩展理解，那么它们就是有意义的。我们使用聚类进行许多应用，例如医学，聚类可以帮助识别一组患者对治疗的反应方式；或者市场研究，聚类用于根据特定群体的特征将消费者分组以吸引该群体。\n\
    \n在本次讨论中，我们将研究合成聚类，而不是应用聚类。在*第18章，高级应用计算思维问题*中，你将看到一些上下文中的聚类示例。**合成聚类**是由合成数据集生成的——也就是说，我们使用算法生成数据集。让我们看一下以下代码片段：\n\
    \nch15_syntheticDataset.py\n\n```python\nfrom numpy import where\nfrom sklearn.datasets\
    \ import make_classification\nfrom matplotlib import pyplot\n# create a synthetic\
    \ dataset\nX, y = make_classification(n_samples = 1800,\n    n_features = 2, n_informative\
