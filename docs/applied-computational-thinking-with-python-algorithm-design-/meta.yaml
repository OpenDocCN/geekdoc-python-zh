  md: 'In simple terms, **logical reasoning** is the set of steps followed to conclude.
    In computational thinking, when we design algorithms, the systematic set of steps
    we follow is part of the algorithm. The way a computer reads those algorithms
    depends on how we write that algorithm. There are two types of logical reasoning
    arguments, which are as follows:


    +   - Inductive reasoning

    - Deductive reasoning


    Before we define those in more depth, let’s look at why logical reasoning is so
    important and why order matters when we create algorithms.


    In order to analyze a problem and provide an algorithm that helps us tackle the
    problem, we need to understand what logical reasoning is first. Logic can be daunting
    for some, but we use it every day subconsciously.


    Let’s look at a simple example. Say you take a shower every morning and go to
    work. Well, would you get dressed for work before the shower? No, because that
    would make absolutely no sense. Logically, you’d have to shower first before you
    put on your clothes for work. Now, I’ve skipped a ton of steps here, but those
    steps are logical. Other examples of logic include following recipes and using
    an umbrella if it’s raining (or not).


    Throughout this chapter, we’ll weave in and out of logical reasoning and designing
    algorithms using **logical operators**. A logical operator allows a program to
    make decisions. We use those too in everyday life without realizing it. For example,
    if it’s sunny and warm, we may want to go biking, but not if it’s sunny and cold.
    The “and” here is a logical operator.


    We take a lot of things into consideration when we’re making decisions. In computational
    thinking, especially in algorithm design, we need to consider those things and
    provide a way for the program to test conditions. We will delve deeper into logical
    operators later in this chapter. For now, let’s look more closely at the types
    of logical reasoning and how to apply them.


    # Applying inductive reasoning


    When we talk about inductive reasoning, we’re really working backward. Inductive
    reasoning starts from a conclusion, which may be true or not, and works backward
    to create the code using the existing data. Let’s look at a simple problem first.


    # Solving an inductive reasoning sample problem


    We have a budget of $150 for buying supplies: art pencils and erasers. The art
    pencils are $1.75 each and the erasers are $1.50 each.'
