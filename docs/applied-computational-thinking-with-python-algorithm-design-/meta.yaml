    ## 问题 3 – 循环与数学\n\n对于这个问题，我们需要创建一个算法，该算法打印给定两个数字范围内所有数字的平方。记住——我们可以逐个打印，但如果范围很大，最好使用一个列表。我们还需要在范围内迭代，并且如果我们想包含端点，必须将最大值加\
