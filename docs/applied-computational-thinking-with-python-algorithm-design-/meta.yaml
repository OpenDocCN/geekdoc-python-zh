    The following algorithm contains everything we need to analyze Abraham Lincoln’s
    second inaugural speech:


    ch17_historicalTextAnalysis.py


    ```

    import nltk

    from nltk.tokenize import sent_tokenize, word_tokenize

    ```


    The entire text of the speech is contained in the GitHub repository file. For
    length purposes, we’ve only included half of that text here. Note that the output
    we’ll share after the algorithm and explanations will correspond to the truncated
    speech, but the visual plot will include the data from the entire speech. [...],
    seen in the following code at the end of the text definition, is simply used to
    show that there is additional text that goes there:


    ```

    text = ''Fellow-Countrymen: At this second appearing to take the oath of the Presidential
    office there is less occasion for an extended address than there was at the first.
    Then a statement somewhat in detail of a course to be pursued seemed fitting and
    proper. Now, at the expiration of four years, during which public declarations
    have been constantly called forth on every point and phase of the great contest
    which still absorbs the attention and engrosses the energies of the nation, little
    that is new could be presented. The progress of our arms, upon which all else
    chiefly depends, is as well known to the public as to myself, and it is, I trust,
    reasonably satisfactory and encouraging to all. With high hope for the future,
    no prediction in regard to it is ventured. On the occasion corresponding to this
    four years ago all thoughts were anxiously directed to an impending civil war.
    All dreaded it, all sought to avert it. While the inaugural address was being
    delivered from this place, devoted altogether to saving the Union without war,
    urgent agents were in the city seeking to destroy it without war—seeking to dissolve
    the Union and divide effects by negotiation. Both parties deprecated war, but
    one of them would make war rather than let the nation survive, and the other would
    accept war rather than let it perish, and the war came. One-eighth of the whole
    population were colored slaves, not distributed generally over the Union, but
    localized in the southern part of it. These slaves constituted a peculiar and
    powerful interest. All knew that this interest was somehow the cause of the war.
    To strengthen, perpetuate, and extend this interest was the object for which the
    insurgents would rend the Union even by war, while the Government claimed no right
    to do more than to restrict the territorial enlargement of it. Neither party expected
    for the war the magnitude or the duration which it has already attained. [...]''

    ```


    2. Now that we’ve defined the text that we want to be analyzed, as shown in the
    preceding code snippet, we can tell the algorithm that we want to tokenize the
    text – that is, we want it divided into words. The algorithm will print out the
    list that contains each individual word or punctuation symbol separated by a comma,
    as shown in the following code:


    ```

    tokenized_word = word_tokenize(text)

    print(tokenized_word)

    ```


    3. After we have our list of words, we want to get the frequency distribution
    of the words. To do so, we’ll import the package from nltk.probability, as shown
    in the following code snippet:


    ```

    from nltk.probability import FreqDist

    fdist = FreqDist(tokenized_word)

    print(fdist)

    fdist.most_common(2)

    ```'
