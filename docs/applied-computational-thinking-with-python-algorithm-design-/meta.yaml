    # The binary cross-entropy model


    In binary classification, we use cross-entropy as the default **loss function**.
    The loss function is a method that helps us evaluate how our algorithm models
    the data. With the loss function, we can use optimization to produce more accurate
    results – that is, it helps reduce the **prediction error**. We use the loss function
    when target values are in the binary set.


    Cross-entropy is a loss function that calculates the difference between two probability
    distributions. We can use cross-entropy when optimizing classification models
    using **logistic regression** and **artificial neural networks**.


    # The Adam optimization algorithm


    The Adam optimization algorithm is a method for **stochastic optimization**. Stochastic
    optimization is used when there is randomness in a function, to maximize or minimize
    the value of the function. The Adam optimization algorithm is appropriate for
    some simple optimization problems that are *non-convex*. It is efficient and uses
    little memory but can be applied to large datasets.


    # The gradient descent model


    The gradient descent algorithm is a first-order optimization algorithm. First-order
    refers to linear local errors. We use gradient descent on functions that can be
    differentiated to find a local minimum.


    # The confusion matrix model


    The confusion matrix is also known as the **error matrix**. The confusion matrix
    is visually helpful as it presents the performance of the algorithm in a table
    format, which allows for better visualization of that performance. It is typically
    used in supervised learning.


    As stated previously, this is just some base information as you start working
    on the optimization of your algorithms. Additional information on ML can be found
    in other Packt books, such as *Python Machine Learning* and *Exploratory Data
    Analysis with Python*.


