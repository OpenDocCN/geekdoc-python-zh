    \nSeaborn 最棒的一点是它也能与 `pandas` 配合得很好。当 Seaborn 与 `pandas` DataFrame 结合使用时，创建数据的统计表示和可视化变得很容易。\n\
    \nSeaborn 有一些可以访问的示例数据集——也就是说，如果我们知道数据集的名称，它们是内置的。我们可以用一行简单的代码调用内置数据集。让我们看看以下代码片段和生成的图形：\n\
    \nch14_seabornSample.py\n\n```\n# Import seaborn\nimport seaborn as sns\n# Import\
    \ matplotlib.pyplot\nimport matplotlib.pyplot as plt\nsns.set_style('darkgrid')\n\
