    \ large, odd number.\")\nelif number < 100 and number % 2 == 0:\n    print(\"\
    That's a small, even number.\")\nelse:\n    print(\"That's a small, odd number.\"\
    )\n```\n\nUsing 99 as the input, we get the following output:\n\n```\nGive a number\
    \ between 1 and 200. 99\nThat's a small, odd number.\n```\n\nRunning the program\
    \ with 98 as the input, we get the following:"
  - "[PAGE 104]\n\n```\nGive a number between 1 and 200. 98\nThat's a small, even\
    \ number.\n```\n\nAs you can see, unless we’re paying attention, we can miss errors\
    \ in our conditions and logical operators. Because the program is able to run\
    \ with these errors in our algorithm, catching where exactly we made the mistake\
    \ is harder to do than when we incorporate errors that stop the program from running.\n\
    \nFinally, let’s take a look at an indentation error using the same code for the\
    \ condition testing. This time, with an indentation error added, we have the following:\n\
    \n```\nnumber = int(input(\"Give a number between 1 and 200. \"))\nif number >\
    \ 99 and number % 2 == 0:\n    print(\"That's a large, even number.\")\nelif number\
    \ > 99 and number % 2 != 0:\n    print(\"That's a large, odd number.\")\n    elif\
    \ number < 100 and number % 2 == 0:\n        print(\"That's a small, even number.\"\
    )\nelse:\n    print(\"That's a small, odd number.\")\n```\n\nIn this case, we\
    \ can’t run the program. The second `elif` statement is indented incorrectly.\
    \ When we try to run the program, we get an `Invalid Syntax` error message. Clicking\
    \ **OK** on the message will take us to the code and the indentation error is\
    \ highlighted, as shown in the following screenshot:\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_104_0.png)\n\
    \nNotice that the `print()` code below the `elif` statement is also indented incorrectly.\
    \ Once we fix those two errors, we can run the code, as we did previously in this\
    \ chapter.\n\nIncorporating errors into our algorithms is a common mistake. As\
    \ you can see from the previous examples, identifying some of the errors can be\
    \ hard to do, since the program may be running as if there is no problem, that’s\
    \ because those are logical errors, and they can be difficult to track down. Now\
    \ we’ll look at a few more examples of different errors and how to debug them.\n\
    \n# Errors and debugging\n\nI’ll start this section by giving you some advice:\
    \ Sometimes the best solution to a bug is hard to find. Take a break if you can’t\
    \ find it. All it takes sometimes is some space away from your code. You can"
