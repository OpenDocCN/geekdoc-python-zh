    # 19


    # Integrating Python with Amazon Web Services (AWS)


    As we progress, we’ll stick with Python and computational thinking to solve problems.
    Excitingly, we’ll also explore AWS to enhance our problem-solving capabilities.
    Think of it as combining Python’s reliability with AWS’s endless possibilities.
    This will expand our toolkit, making it more creative and efficient for tackling
    various challenges. Rest assured, we’ll continue using the skills we’ve learned
    so far while harnessing AWS’s vast potential. Get ready for an exciting journey
    of discovery and innovation!


    In this chapter, we will provide an overview of AWS, guide you through setting
    up an AWS account, explore core AWS services for Python integration, investigate
    the **Extract, Transform, Load (ETL)** process, and discuss security and best
    practices.


    In this chapter, we’ll cover the following topics:


    +   - Overview of AWS

    - Setting up for AWS

    - AWS services

    - Python examples and AWS


    # Technical requirements


    You will need the latest version of Python to run the code in this chapter.


    You will need to have `pip` (Python package manager) and AWS account credentials.


    You can find the source code that will be used in this chapter here:

    https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter19.


    # AWS and Python in cloud computing – a brief overview


    AWS is the world’s leading cloud computing platform. It offers a vast array of
    cloud services, including computing power, storage, databases, machine learning,
    analytics, and more. AWS is known for its scalability, reliability, and cost-effectiveness,
    making it the preferred choice for businesses, startups, and individuals looking
    to leverage the cloud for various purposes.


    # Python’s applicability in AWS'
  - '[PAGE 380]


    Python, with its simplicity and versatility, stands as a popular choice for cloud-based
    applications. In AWS, Python is used extensively for scripting, automation, and
    building cloud-native applications. We’ll explore how Python’s features make it
    an ideal language for interacting with AWS services, from automating repetitive
    tasks to processing vast amounts of data.


    # ETL processes – their significance in data handling


    ETL processes are crucial in data management, especially in the context of cloud
    computing and big data analytics. ETL involves extracting data from various sources,
    transforming it into a format suitable for analysis, and loading it into a data
    store for further use. In this section, we’ll introduce the concept of ETL processes,
    their importance in handling and analyzing data in cloud environments, and how
    Python facilitates these processes in AWS:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_380_0.png)


    > **NOTE**

    More information about the ETL process in AWS can be found at [https://aws.amazon.com/what-is/etl/](https://aws.amazon.com/what-is/etl/).


    # Setting up for AWS


    Preparing your environment for AWS and Python integration is the essential first
    step. In this chapter, we’ll guide you through creating an AWS account, setting
    up security, and configuring your Python development environment. Whether you’re
    new to cloud computing or an experienced developer, we’ll provide clear instructions
    to ensure you’re ready for the exciting journey ahead. By the end of this chapter,
    you’ll be set to leverage AWS and Python effectively for your projects. Let’s
    dive in and get started!


    First, we’ll learn how to set up a Free Tier account.'
- md: "## Creating a new AWS account\n\nTo create a new AWS account, follow these\
    \ steps:\n\n1.  Navigate to the AWS home page at [https://aws.amazon.com](https://aws.amazon.com).\n\
    2.  Click on the **Create an AWS Account** link on the home page.\n3.  Select\
    \ **Business** or **Personal** as the account type (it's important to note that\
    \ regardless of your choice, the functionality and tools provided remain identical\
    \ in both options).\n\n## Free Tier offers\n\nAll AWS accounts can explore 3 different\
    \ types of free offers, depending on the product used.\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_382_0.png)\n\
    \n**Always free**\nNever expires\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_382_1.png)\n\
    \n**12 months free**\nStart from initial sign-up date\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_382_2.png)\n\
    \n**Trials**\nStart from service activation date\n\n## Sign up for AWS\n\n###\
    \ Contact Information\n\nHow do you plan to use AWS?\n\n-   Business - for your\
    \ work, school, or organization\n-   Personal - for your own projects\n\nWho should\
    \ we contact about this account?\n\nFull Name\n\nPhone Number\n\nCountry or Region\n\
    \nAddress\n\nCity\n\nState, Province, or Region\n\nPostal Code\n\nI have read\
    \ and agree to the terms of the AWS Customer Agreement.\n\nContinue (step 2 of\
    \ 5)\n\nFigure 19.2 – Contact information for AWS account sign-up\n\n4.  Provide\
    \ the requested contact information for the AWS account sign-up process. You will\
    \ need to include the following:\n    -   An email (that has not been used before\
    \ to register an AWS account)\n    -   A phone number (important for verification\
    \ purposes)\n5.  After reviewing the **AWS Customer Agreement** terms, tick the\
    \ checkbox and click **Create Account**, then **Continue**.\n6.  Provide a credit\
    \ card or debit card as payment information and select **Verify and Add**. This\
    \ step is needed for validation.\n7.  Provide a phone number or email for verification,\
    \ enter the characters shown for the security check, and complete the verification.\n\
    8.  Select a support plan.\n9.  You will receive a notification that your account\
    \ has been activated.\n\nCreating a new AWS account is a straightforward process\
    \ that involves a few essential steps. By following these steps, you can quickly\
    \ set up your AWS account and gain access to the powerful cloud computing resources\
    \ and services offered by AWS. Once your account is activated, you’ll be ready\
    \ to embark on your cloud computing journey and explore the vast possibilities\
    \ that AWS has to offer. Now, let’s explore AWS **Identity and Access Management\
    \ (IAM)**.\n\n## Understanding IAM in AWS\n\nIAM is a critical feature within\
    \ AWS that provides comprehensive tools to manage users, groups, and permissions\
    \ within the AWS ecosystem. It plays a vital role in ensuring secure access control\
    \ to AWS services and resources, enabling organizations to effectively manage\
    \ identities, assign roles, and control how users interact with the AWS environment.\
    \ IAM is fundamental in maintaining the security and integrity of cloud infrastructure,\
    \ especially in complex and multi-user environments.\n\n## Why IAM is important\n\
    \nAWS IAM plays a crucial role in ensuring the security, flexibility, and compliance\
    \ of your AWS environment. Here are some key reasons why IAM is essential:\n\n\
    -   **Security**: IAM provides a secure way to control access to AWS services\
    \ and resources, preventing unauthorized access\n-   **Flexibility and control**:\
    \ It offers the flexibility to assign customized permissions and roles to different\
    \ users and groups, ensuring that they have only the access they need\n-   **Audit\
    \ and compliance**: IAM helps in tracking user activity and changes in AWS, which\
    \ is crucial for audit trails and compliance with various regulations\n-   **Cost\
    \ management**: By controlling who can access what resources, IAM can also help\
    \ manage costs by preventing unauthorized or accidental usage of AWS services\n\
    -   **Centralized management**: IAM allows for centralized management of users,\
    \ groups, and permissions, simplifying administrative tasks and policy management\n\
    \n## When to use IAM\n\nAWS IAM is a valuable tool to consider in various scenarios\
    \ to enhance control and security over your AWS environment. Here are some key\
    \ situations where IAM is particularly useful:\n\n-   **User management**: When\
    \ you need to securely control individual and group access to AWS services and\
    \ resources\n-   **Role-based access control (RBAC)**: To assign different levels\
    \ of permissions based on roles within your organization\n-   **Compliance requirements**:\
    \ If your organization needs to comply with regulatory standards that require\
    \ specific access controls and auditing capabilities\n-   **Multi-user environments**:\
    \ For organizations with multiple users needing different access levels to AWS\
    \ services and resources\n-   **Security enhancement**: When you want to enhance\
    \ the security of your AWS environment, especially when using public cloud infrastructure\n\
    \nIn summary, IAM is an essential component of AWS that ensures secure and efficient\
    \ management of access to services and resources, facilitating compliance, security,\
    \ and operational efficiency.\n\n> NOTE\n\nFor detailed guidance on setting up\
    \ IAM in AWS, please refer to the AWS IAM User Guide at https://docs.aws.amazon.com/IAM/latest/UserGuide/introduction.html#intro-accessing\
    \ and click on the PDF link. This comprehensive resource provides step-by-step\
    \ instructions, best practices, and additional insights into effectively managing\
    \ IAM in your AWS environment.\n\n## Obtaining your AWS access key ID and secret\
    \ access key\n\nTo obtain your AWS access key ID and secret access key, follow\
    \ these steps. Remember, these keys are like a password; you should keep them\
    \ secure and never share them publicly:\n\n1.  **Sign into the AWS Management\
    \ Console**: Go to the AWS Management Console and log in with your account credentials.\n\
    2.  **Access IAM**: In the console, navigate to the IAM service. You can find\
    \ IAM in the **Services** menu, or you can use the search bar.\n3.  **Create a\
    \ new IAM user (optional)**: If you don't already have an IAM user for this purpose,\
    \ create one:\n    I.  In the IAM dashboard, go to **Users** and then choose **Add\
    \ user**.\n    II. Enter a username.\n    III. Select **Programmatic access**\
    \ as the access type. This enables an access key ID and secret access key for\
    \ the AWS API, CLI, SDK, and other development tools.\n    IV. Click **Next: Permissions**.\n\
    4.  **Set permissions for the IAM user**: Assign the necessary permissions to\
    \ the user. This can be done by adding the user to a group with the desired permissions,\
    \ attaching existing policies directly, or creating a custom policy. After setting\
    \ the permissions, click **Next: Tags** (optional), then **Next: Review**.\n5.\
    \  **Create the user**: Review the details and click **Create user**.\n6.  **Obtain\
    \ the access key ID and secret access key**:\n    I.  Once the user has been created,\
    \ you will be directed to a page showing the access key ID and an option to show\
    \ the secret access key.\n    II. Click **Show** next to the secret access key\
    \ and record both the access key ID and the secret access key. It's crucial to\
    \ copy the secret access key now as it won't be shown again after this step.\n\
    \    III. If you don't want to download the key file, ensure you securely store\
    \ these credentials.\n7.  **Secure your keys**: Store your access key ID and secret\
    \ access key in a secure location. It's recommended to use a secure password manager.\
    \ These keys provide access to your AWS account and should be protected like a\
    \ password.\n\nBy following these steps and adhering to security best practices,\
    \ you can help safeguard your AWS resources and maintain control over your cloud\
    \ environment.\n\n## Understanding AWS pricing and the Free Tier\n\nIn the world\
    \ of cloud computing, understanding the pricing structure of the services you\
    \ use is crucial. AWS offers a diverse range of services to meet various computing,\
    \ storage, and networking needs. While the flexibility and scalability of AWS\
    \ are undeniable advantages, it’s equally important to grasp how AWS charges for\
    \ these services to avoid unexpected costs. Additionally, AWS provides a valuable\
    \ resource for those looking to experiment and learn without incurring charges\
    \ – the AWS Free Tier. Let’s take a closer look at these concepts:\n\n-   **AWS\
    \ pricing overview:**\n    -   AWS offers a pay-as-you-go pricing model. You’re\
    \ billed for the resources you use, such as compute time or data storage.\n  \
    \  -   Resource-based pricing means charges are based on the number or capacity\
    \ of resources used. For example, Amazon EC2 charges per hour or second, and Amazon\
    \ S3 by data stored.\n    -   Data transfer costs are essential to consider, especially\
    \ for data moving out of AWS data centers.\n    -   Reserved instances provide\
    \ cost savings for a fixed instance type and duration.\n    -   Spot instances\
    \ offer the chance to use unused EC2 capacity at lower costs but may be terminated\
    \ if they’re needed elsewhere.\n    -   Larger organizations can benefit from\
    \ Enterprise Agreements with customized pricing.\n-   **Utilizing the AWS Free\
    \ Tier:**\n    -   This is available to new AWS customers for the first 12 months,\
    \ offering a limited amount of AWS services for free\n    -   It includes specific\
    \ usage or resource capacity, such as a certain number of EC2 hours or S3 storage\
    \ space each month\n    -   It’s vital to monitor usage to stay within Free Tier\
    \ limits and avoid charges\n    -   AWS provides detailed billing and usage reports\
    \ for monitoring\n    -   It’s ideal for learning and experimentation, allowing\
    \ hands-on experience with AWS services without incurring costs\n\nIn summary,\
    \ understanding AWS’s flexible pricing and how to leverage the Free Tier is key\
    \ to managing costs and exploring AWS services efficiently.\n\n> NOTE\n\nTo learn\
    \ more about the Free Tier, please go to [https://aws.amazon.com/free/?all-free-tier.sort-by=item.additionalFields.SortRank&all-free-tier.sort-order=asc&awsf.Free%20Tier%20Types=*all&awsf.Free%20Tier%20Categories=*all](https://aws.amazon.com/free/?all-free-tier.sort-by=item.additionalFields.SortRank&all-free-tier.sort-order=asc&awsf.Free%20Tier%20Types=*all&awsf.Free%20Tier%20Categories=*all)."
  mdcn: "## 创建新的 AWS 账户\n\n要创建新的 AWS 账户，请按照以下步骤操作：\n\n1.  访问 AWS 主页 [https://aws.amazon.com](https://aws.amazon.com)。\n\
    2.  在主页上点击 **创建 AWS 账户** 链接。\n3.  选择 **商业** 或 **个人** 作为账户类型（需要注意的是，无论您选择哪种类型，所提供的功能和工具都是完全相同的）。\n\
    \n## 免费套餐优惠\n\n所有 AWS 账户都可以根据所使用的产品，探索 3 种不同类型的免费优惠。\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_382_0.png)\n\
    \n**永久免费**\n永不过期\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_382_1.png)\n\n**12\
    \ 个月免费**\n从首次注册日期开始计算\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_382_2.png)\n\
    \n**试用**\n从服务激活日期开始计算\n\n## 注册 AWS\n\n### 联系信息\n\n您计划如何使用 AWS？\n\n-   商业 - 用于您的工作、学校或组织\n\
    -   个人 - 用于您自己的项目\n\n我们应该就哪个账户与您联系？\n\n全名\n\n电话号码\n\n国家或地区\n\n地址\n\n城市\n\n州、省或地区\n\
    \n邮政编码\n\n我已阅读并同意 AWS 客户协议的条款。\n\n继续（第 2 步，共 5 步）\n\n图 19.2 – AWS 账户注册的联系信息\n\n\
    4.  提供 AWS 账户注册流程所需的联系信息。您需要包含以下内容：\n    -   一个电子邮件（之前未用于注册过 AWS 账户）\n    -  \
    \ 一个电话号码（用于验证目的，非常重要）\n5.  查阅 **AWS 客户协议** 条款后，勾选复选框并点击 **创建账户**，然后点击 **继续**。\n\
    6.  提供信用卡或借记卡作为支付信息，并选择 **验证并添加**。此步骤用于验证。\n7.  提供用于验证的电话号码或电子邮件，输入安全检查中显示的字符，并完成验证。\n\
    8.  选择支持计划。\n9.  您将收到通知，表明您的账户已激活。\n\n创建新的 AWS 账户是一个简单直接的过程，涉及几个基本步骤。按照这些步骤操作，您可以快速设置\
    \ AWS 账户，并获得 AWS 提供的强大云计算资源和服务的访问权限。一旦您的账户激活，您就可以开始您的云计算之旅，探索 AWS 提供的广阔可能性。现在，让我们来探索\
    \ AWS **身份和访问管理 (IAM)**。\n\n## 理解 AWS 中的 IAM\n\nIAM 是 AWS 中的一个关键功能，它提供了全面的工具来管理\
    \ AWS 生态系统中的用户、组和权限。它在确保对 AWS 服务和资源的安全访问控制方面发挥着至关重要的作用，使组织能够有效地管理身份、分配角色并控制用户与\
    \ AWS 环境的交互方式。IAM 对于维护云基础设施的安全性和完整性至关重要，尤其是在复杂和多用户环境中。\n\n## 为什么 IAM 很重要\n\nAWS\
    \ IAM 在确保您的 AWS 环境的安全性、灵活性和合规性方面起着至关重要的作用。以下是 IAM 至关重要的一些关键原因：\n\n-   **安全性**：IAM\
    \ 提供了一种安全的方式来控制对 AWS 服务和资源的访问，防止未经授权的访问。\n-   **灵活性和控制**：它提供了灵活性，可以为不同的用户和组分配自定义的权限和角色，确保他们只拥有所需的访问权限。\n\
    -   **审计和合规性**：IAM 有助于跟踪 AWS 中的用户活动和更改，这对于审计跟踪和遵守各种法规至关重要。\n-   **成本管理**：通过控制谁可以访问什么资源，IAM\
    \ 还可以通过防止未经授权或意外使用 AWS 服务来帮助管理成本。\n-   **集中管理**：IAM 允许对用户、组和权限进行集中管理，简化管理任务和策略管理。\n\
    \n## 何时使用 IAM\n\nAWS IAM 是一个有价值的工具，在各种场景下都值得考虑，以增强对 AWS 环境的控制和安全性。以下是 IAM 特别有用的一些关键情况：\n\
    \n-   **用户管理**：当您需要安全地控制个人和组对 AWS 服务和资源的访问时。\n-   **基于角色的访问控制 (RBAC)**：根据组织内的角色分配不同级别的权限。\n\
    -   **合规性要求**：如果您的组织需要遵守要求特定访问控制和审计能力的监管标准。\n-   **多用户环境**：适用于需要不同级别访问权限来访问 AWS\
    \ 服务和资源的多用户组织。\n-   **安全增强**：当您想要增强 AWS 环境的安全性时，尤其是在使用公共云基础设施时。\n\n总之，IAM 是 AWS\
    \ 的一个基本组成部分，它确保对服务和资源的访问进行安全高效的管理，促进合规性、安全性和运营效率。\n\n> 注意\n\n有关在 AWS 中设置 IAM 的详细指南，请参阅\
    \ AWS IAM 用户指南：https://docs.aws.amazon.com/IAM/latest/UserGuide/introduction.html#intro-accessing\
    \ 并点击 PDF 链接。这份全面的资源提供了分步说明、最佳实践以及有关在 AWS 环境中有效管理 IAM 的额外见解。\n\n## 获取您的 AWS 访问密钥\
    \ ID 和私有访问密钥\n\n要获取您的 AWS 访问密钥 ID 和私有访问密钥，请按照以下步骤操作。请记住，这些密钥就像密码一样；您应该妥善保管，切勿公开分享：\n\
    \n1.  **登录 AWS 管理控制台**：访问 AWS 管理控制台，并使用您的账户凭据登录。\n2.  **访问 IAM**：在控制台中，导航到 IAM\
    \ 服务。您可以在 **服务** 菜单中找到 IAM，或者可以使用搜索栏。\n3.  **创建新的 IAM 用户（可选）**：如果您还没有用于此目的的 IAM\
    \ 用户，请创建一个：\n    I.  在 IAM 仪表板中，转到 **用户**，然后选择 **添加用户**。\n    II. 输入用户名。\n   \
    \ III. 选择 **编程访问** 作为访问类型。这将为 AWS API、CLI、SDK 和其他开发工具启用访问密钥 ID 和私有访问密钥。\n    IV.\
    \ 点击 **下一步：权限**。\n4.  **为 IAM 用户设置权限**：为用户分配必要的权限。这可以通过将用户添加到具有所需权限的组、直接附加现有策略或创建自定义策略来完成。设置权限后，点击\
    \ **下一步：标签**（可选），然后点击 **下一步：审核**。\n5.  **创建用户**：审核详细信息并点击 **创建用户**。\n6.  **获取访问密钥\
    \ ID 和私有访问密钥**：\n    I.  用户创建后，您将被定向到一个页面，显示访问密钥 ID 和一个显示私有访问密钥的选项。\n    II. 点击私有访问密钥旁边的\
    \ **显示**，并记录访问密钥 ID 和私有访问密钥。务必在此步骤后立即复制私有访问密钥，因为它将不再显示。\n    III. 如果您不想下载密钥文件，请确保安全存储这些凭据。\n\
    7.  **保护您的密钥**：将您的访问密钥 ID 和私有访问密钥存储在安全的位置。建议使用安全的密码管理器。这些密钥提供对您 AWS 账户的访问权限，应像密码一样受到保护。\n\
    \n遵循这些步骤并遵守安全最佳实践，可以帮助您保护 AWS 资源并保持对云环境的控制。\n\n## 理解 AWS 定价和免费套餐\n\n在云计算世界中，了解您所使用服务的定价结构至关重要。AWS\
    \ 提供了多种服务来满足各种计算、存储和网络需求。虽然 AWS 的灵活性和可扩展性是不可否认的优势，但同样重要的是要了解 AWS 如何为这些服务收费，以避免意外成本。此外，AWS\
    \ 为那些希望在不产生费用的情况下进行实验和学习的人提供了一个宝贵的资源——AWS 免费套餐。让我们更深入地了解这些概念：\n\n-   **AWS 定价概览：**\n\
    \    -   AWS 提供按需付费的定价模式。您只需为使用的资源付费，例如计算时间或数据存储。\n    -   基于资源的定价意味着费用基于使用的资源数量或容量。例如，Amazon\
    \ EC2 按小时或秒收费，Amazon S3 按存储的数据量收费。\n    -   数据传输成本是需要考虑的重要因素，尤其是对于从 AWS 数据中心传出的数据。\n\
    \    -   预留实例为固定实例类型和持续时间提供成本节约。\n    -   竞价实例提供了以较低成本使用未使用的 EC2 容量的机会，但如果其他地方需要这些容量，可能会被终止。\n\
    \    -   较大的组织可以从具有定制价格的企业协议中受益。\n-   **利用 AWS 免费套餐：**\n    -   这适用于新 AWS 客户在前\
    \ 12 个月内，提供有限数量的免费 AWS 服务。\n    -   它包括特定的使用量或资源容量，例如每月一定数量的 EC2 小时或 S3 存储空间。\n\
    \    -   监控使用情况以保持在免费套餐限制内并避免产生费用至关重要。\n    -   AWS 提供详细的计费和使用报告以供监控。\n    - \
    \  它非常适合学习和实验，允许在不产生费用的情况下获得 AWS 服务的实践经验。\n\n总之，了解 AWS 灵活的定价以及如何利用免费套餐是有效管理成本和探索\
    \ AWS 服务的关键。\n\n> 注意\n\n要了解更多关于免费套餐的信息，请访问 [https://aws.amazon.com/free/?all-free-tier.sort-by=item.additionalFields.SortRank&all-free-tier.sort-order=asc&awsf.Free%20Tier%20Types=*all&awsf.Free%20Tier%20Categories=*all](https://aws.amazon.com/free/?all-free-tier.sort-by=item.additionalFields.SortRank&all-free-tier.sort-order=asc&awsf.Free%20Tier%20Types=*all&awsf.Free%20Tier%20Categories=*all)。"
