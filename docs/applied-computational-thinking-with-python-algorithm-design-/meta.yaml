- md: '## Data types


    A **data type** is a basic classification. Some data types include integers, floats,
    and strings.

    **Data structures** use multiple types of data types. They can organize the information
    in memory and determine how we access the information.


    We’ll look at these in more detail in the following sections.


    As mentioned previously, data types are basic classifications. They are variables
    that are used throughout a program and can only exist with one classification.
    There are different classes of data types. We will focus on **primitive** and
    **abstract** data types for now, but we will revisit this topic as we consider
    problems and design solutions.


    Primitive data types include **byte**, **short**, **int**, **long**, **float**,
    **double**, **Boolean**, and **char**:


    - A **byte** can store numbers from -128 to 127. While these numbers can be stored
    as integers or **ints**, a byte uses less storage, so if we know the number is
    between those values, we can use a byte data type instead.

    - A **short** is a number between -32,768 and 32,767.

    - An integer, **int**, is used to store numbers between -2,147,483,648 and 2,147,483,647.

    - **Long** is used to store numbers from -9,223,372,036,854,775,808 and 9,223,372,036,854,775,807.

    - A **float** allows us to save a decimal number.

    - Decimal numbers can also be saved as **double**, which has more precision than
    a float.

    - **Boolean** values are data types that are either **True** or **False**. So,
    a variable can be saved so that when its value is printed, the result will be
    saved as true or false.

    - **Char** is used to save a variable as a single character.


    ## Data structures


    As mentioned in the *Coding theory* section earlier, data structures are used
    to collect and organize data efficiently and effectively. Data structures can
    be primitive, such as the built-in data structures in software, or abstract. Primitive
    data structures can also be defined using programming languages, but they are
    predefined. Some primitive data structures include the data types listed in the
    previous section, such as **chars** and **Boolean** structures.


    **Abstract data types (ADTs)** include information that can help structure and
    design data types. Abstract data structures include arrays and two-dimensional
    arrays, stacks, trees and binary trees, linked lists, queues, and more, as mentioned
    in the *Coding theory* section earlier in this chapter. Lists can contain multiple
    instances of the same data values. These lists are countable, so we can find how
    many elements are in the list, reorder them, remove items, add items, and so on.
    Lists are widely used as linked lists, arrays, or dynamic arrays:


    - A **linked list** means that each data element in the list is connected, or
    points, to the next one, regardless of where they are stored within the memory.

    - An **array** is ordered. The elements are read so that they make sense. Think
    of an array as reading this sentence. You don''t read the sentence as *array and
    think reading as this of sentence*. We read the sentence in order, from left to
    right, not in a jumbled order.

    - **Dynamic arrays** can be resized, which is important when choosing a data type.


    A **stack** ADT is a collection of elements and has two operations – push and
    pop. A **push** is used to add an element to the collection, while a **pop** removes
    the most recent element.


    A **queue** ADT is a linear data structure. As with a stack, we can add or remove
    elements. However, in a queue ADT, the point of deletion and the point of insertion
    are done at two different ends.


    As mentioned previously, data structures are concrete implementations of data
    types. How we add or remove elements from a collection, for example, is the data
    structure.


    This can all be slightly confusing, but we will learn more about them throughout
    this book. For now, understanding the definitions and simple examples is enough.


    ## Summary


    In this chapter, we learned about some of the fundamentals of computer science.
    We looked at how to convert from binary into base-10 and vice versa. We also explored
    topics and theories in theoretical computer science. We learned about computing
    and data types and structures. These sections allowed us to understand the computational
    thinking process and how to tackle the different types of problems that will be
    presented in this book, starting in [Chapter 2, Elements of Computational Thinking](Chapter
    2, Elements of Computational Thinking).


    As we delve deeper into the computational thinking world and process, we will
    need to revisit some of the content of this chapter as we look at problems, search
    for the best way to solve them, and make decisions about how to write the algorithms.


    Problems may have an infinite number of ways to be solved using algorithms. Understanding
    how processes work and which data structures are most suitable for our problems
    is imperative in creating the best solutions. Identifying the data types that
    are needed for these algorithms and how computers read data will only help us
    with writing the most effective and efficient algorithms.


    In the next chapter, we will learn about the computational thinking process and
    how to break down problems to design our algorithmic solutions.


    # 2 Elements of Computational Thinking


    The previous chapter provided some general information about the fundamentals
    of computer science. In this chapter, we will focus more closely on understanding
    computational thinking and the elements that make up computational thinking: decomposition,
    pattern recognition, pattern generalization or abstraction, and algorithm design.


    The importance of the computational thinking process cannot be understated. Through
    this process, we analyze problems to design the best possible solutions based
    on a set of conditions. Although many algorithms can be written to answer the
    same questions, using the computational thinking process helps us to determine
    the optimal path to take to design a clear algorithm that can be generalized.
    We don’t always use all the steps of the computational thinking process, and sometimes
    we use them multiple times as we iterate on the problems and algorithms, but having
    that framework allows us to formulate better solutions and guides us in our processes.


    In this chapter, we will cover the following topics:


    - Understanding computational thinking

    - Decomposing problems

    - Recognizing patterns

    - Generalizing patterns

    - Designing algorithms

    - Additional problems


    In order to learn more about computational thinking, we will be looking at the
    elements through the lens of a presented problem. Keep in mind that we will be
    doing a deeper dive into the Python programming language in *Chapter 9, Introduction
    to Python*, but you can go back and forth to that chapter as needed while you
    dive into this and all the other chapters of the book.


    ## Technical requirements


    Here is the full source code used throughout this book: [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter02](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter02).


    ## Understanding computational thinking


    In its most basic definition, computational thinking is a problem-solving process.
    Much like design thinking, the scientific method, and other similar methods, there
    are a number of steps we go through to find solutions. For example, the scientific
    method has seven steps. Please keep in mind that there are multiple interpretations
    of the scientific method out there and some differ in terms of the number of steps.
    For the purposes of this discussion, we will use these seven steps:


    1. Question

    2. Hypothesis

    3. Materials

    4. Experiment

    5. Results

    6. Conclusion

    7. Communication of findings


    The establishment of the scientific method is a highly debated topic, but most
    researchers agree that it dates back to the 10th century.


    The scientific method made it possible to observe the natural world, create hypotheses
    to test observations, and develop tests and results through an established process.
    The method itself has some basis in philosophers such as Plato and Aristotle,
    who promoted empirical research. However, their methodology was not as developed
    as what we call the scientific method today.


    When a scientist has a question or problem they would like to study, they create
    a hypothesis to test. For example, if we want to see if a certain fertilizer increases
    the growth of a bean plant, then we could use the scientific method to find the
    answer.


    Let’s look at the scientific method to study this problem:


    1. The **question** is whether or not the fertilizer has an effect on the bean
    plant’s growth.

    2. The **hypothesis** is that the fertilizer will increase the growth rate of
    the plants.

    3. The **materials** needed are pots, soil, bean seeds, water, and fertilizer.

    4. The **experiment** would require that we have one pot in which we plant seeds
    in the soil and water them at the same rate as the seeds in the second pot. However,
    the second pot will also have fertilizer. The experiment design would also include
    the time for which the experiment will run, the amount of water to be added to
    both pots, and any other necessary details.

    5. The **results** and **conclusion** would depend on the experiment. We would
    collect data by measuring the growth at certain times of the day during a fixed
    time frame. Then, that data would get analyzed so that the results and conclusions
    can be documented.

    6. Once the results and conclusions are ready, they need to be **communicated**
    to the scientific community.


    The importance of the scientific method is that it provides a framework so that
    scientists can design their studies and communicate their findings in ways that
    the community can understand, interpret,'
  mdcn: '## 数据类型


    **数据类型**是一种基本分类。一些数据类型包括整数、浮点数和字符串。

    **数据结构**使用多种数据类型。它们可以在内存中组织信息，并决定我们如何访问这些信息。


    我们将在后续章节中更详细地探讨这些内容。


    如前所述，数据类型是基本分类。它们是在整个程序中使用的变量，并且只能以一种分类存在。数据类型有不同的类别。目前我们将重点关注**原始**和**抽象**数据类型，但随着我们考虑问题和设计解决方案，我们将重新审视这个主题。


    原始数据类型包括**byte**、**short**、**int**、**long**、**float**、**double**、**Boolean**和**char**：


    -   一个**byte**可以存储从-128到127的数字。虽然这些数字可以存储为整数或**int**，但byte使用更少的存储空间，所以如果我们知道数字在这些值之间，我们可以使用byte数据类型来代替。

    -   一个**short**是介于-32,768和32,767之间的数字。

    -   一个整数，**int**，用于存储介于-2,147,483,648和2,147,483,647之间的数字。

    -   **Long**用于存储从-9,223,372,036,854,775,808到9,223,372,036,854,775,807的数字。

    -   一个**float**允许我们保存一个十进制数。

    -   十进制数也可以保存为**double**，它比float具有更高的精度。

    -   **Boolean**值是数据类型，其值为**True**或**False**。因此，一个变量可以被保存，以便当其值被打印时，结果将被保存为true或false。

    -   **Char**用于将变量保存为单个字符。


    ## 数据结构


    正如前面*编码理论*部分所提到的，数据结构用于高效且有效地收集和组织数据。数据结构可以是原始的，例如软件中的内置数据结构，也可以是抽象的。原始数据结构也可以使用编程语言定义，但它们是预定义的。一些原始数据结构包括上一节列出的数据类型，例如**chars**和**Boolean**结构。


    **抽象数据类型（ADTs）**包括可以帮助构建和设计数据类型的信息。抽象数据结构包括数组和二维数组、栈、树和二叉树、链表、队列等，正如本章前面*编码理论*部分所提到的。列表可以包含相同数据值的多个实例。这些列表是可计数的，所以我们可以找出列表中有多少个元素，重新排序它们，删除项目，添加项目等等。列表被广泛用作链表、数组或动态数组：


    -   一个**链表**意味着列表中的每个数据元素都连接或指向下一个元素，无论它们在内存中的存储位置如何。

    -   一个**数组**是有序的。元素被读取时是有意义的。把数组想象成阅读这个句子。你不会把句子读成*array and think reading as
    this of sentence*。我们按顺序从左到右阅读句子，而不是以混乱的顺序。

    -   **动态数组**可以调整大小，这在选择数据类型时很重要。


    一个**栈**ADT是一个元素的集合，有两个操作——push和pop。**push**用于向集合添加一个元素，而**pop**移除最近添加的元素。


    一个**队列**ADT是一个线性数据结构。与栈一样，我们可以添加或删除元素。然而，在队列ADT中，删除点和插入点是在两个不同的端点完成的。


    如前所述，数据结构是数据类型的具体实现。例如，我们如何从集合中添加或删除元素，就是数据结构。


    这一切可能有点令人困惑，但我们将在这本书中了解更多关于它们的内容。目前，理解定义和简单的例子就足够了。


    ## 总结


