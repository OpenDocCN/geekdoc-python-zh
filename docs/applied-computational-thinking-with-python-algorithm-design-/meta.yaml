    \ given as follows:\n\nx_scaled = (x – min(x)) / (max(x) – min(x))\n\n- **Attribute\
    \ selection** is the process of transforming data by replacing an attribute with\
    \ a different attribute or attributes.\n\n- **Concept hierarchy** is actually\
    \ a transformation done by reducing data. It is done by replacing concepts such\
    \ as numbers (10, 15, 40) with higher-level concepts, such as qualifiers (short,\
    \ lengthy, extremely lengthy).\n\nIn the next section, we will glance through\
    \ the reduction of data.\n\n## Reducing data\n\n**Data reduction** refers to a\
    \ process that allows us to get similar or even the same results from a dataset\
    \ but only after having reduced the representation of the data in volume.\n\n\
    We won't go into too much depth with all the concepts here because they are much\
    \ easier to look at in examples, but here are some ways that data reduction is\
    \ done:\n\n- Removing invalid data from the dataset\n- Creating summaries for\
    \ the data at different levels\n\nThink of removing invalid data as taking care\
    \ of any outliers. The data may have been entered incorrectly, conditions may\
    \ have not been optimal, or similar. When we have a data point that doesn't fit\
    \ the entirety of the dataset, especially where we have a large number of data\
    \ points to compare it to, we can remove that data point as invalid or as an outlier.\n\
    \nWhen creating summaries at different levels, we are aggregating the dataset\
    \ and testing and producing summaries at each of those levels. Say you had 100\
    \ data points (datasets will often be in the thousands, but it's easier to explain\
    \ with smaller numbers). We could create a summary for the first 20 data points.\
