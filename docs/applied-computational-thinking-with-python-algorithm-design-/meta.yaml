    # Defining control flow and its tools


    Simply defined, **control flow** is the order in which an algorithm reads and
    executes instructions, functions, and statements. Control flow means the computer
    will make a decision. Think about it this way: when I go outside my building,
    I’ll either use an umbrella or I won’t. This depends on whether or not it is raining
    (and whether or not I remembered my umbrella, I guess). Depending on that condition,
    I will make a decision. This process is the control flow process in algorithm
    design.


    Let’s look at some of the control flow statements that are available in the Python
    programming language:


    +   - `while`

    - `if`'
  - '[PAGE 199]


    +   - for

    - range()

    - break

    - continue

    - list comprehensions

    - The pass statement

    - The try statement


    These tools allow the algorithm to do things, such as run so long as a certain
    condition or set of conditions is met, stop or break when a condition occurs,
    continue for a range of values only, and so on. Let’s take a closer look at some
    of these tools.


    # Using if, for, and range() and other control flow statements


    Let’s start with if statements, which we first discussed in Chapter 4, Understanding
    Logical Reasoning. These are probably the most commonly used and known statements
    in algorithm design. You may recall learning about conditional statements in geometry
    as you studied reasoning and proofs. In those classes, you would write statements
    in if-then format. For example, let’s look at the following statement:


    *When it rains, I wear a raincoat.*


    This is not a conditional statement, at least not yet. If we were going to write
    it as a conditional sentence, then we’d have to use the if-then format, much like
    this sentence. Take a look at the converted statement that follows:


    *If it rains, then I wear a raincoat.*


    As you can see, we use conditions as part of our everyday lives. We just don’t
    point them out.


    When writing algorithms, we have to explicitly state what we need the algorithm
    to do, so we have to explicitly state these statements. In programming, we have
    to state each condition. Additionally, if we have a series of conditions that
    need to be met, we sometimes need to nest the statements. This is best explained
    with some examples. Let’s start with how we use nested statements.


    # Using nested if statements'
  - '[PAGE 200]


    Even in our everyday lives, some conditions depend on others. For example, if
    it’s Monday, we have to go to work. If we have to go to work and it’s raining,
    we may need an umbrella. But if we’re not going to work (and assuming we’re staying
    home), we won’t need to check whether we need an umbrella. That’s the same with
    nested statements. We use them to check one condition, then another, which is
    nested.


    Let’s say we are playing a dice game. You roll a die and get points as follows:


    +   - 2, 4, or 6 = 10 points

    - 1 or 3 = 5 points

    - 5 = 0 points and removes all previous points


