  mdcn: "最后，我们打印数据集以展示清洗后且数据类型一致的数据。\n\n执行此代码后，'Height'列将具有一致的数据类型，所有值均以厘米为单位。任何不明确或缺失的值将被平均身高替换，确保数据集干净并准备好进行进一步分析。现在，让我们来看看如何处理噪声数据。\n\
    \n## 处理噪声数据\n\n首先，让我们定义一下**噪声数据**的含义。当我们拥有大量数据，且其中部分数据对我们的分析没有用处时，我们称其为噪声数据。噪声数据也用于指代数据损坏。*实际上，它就是无用的数据。*\n\
    \n我们处理噪声数据有三种方法：分箱、回归和聚类：\n\n- **分箱**使用相邻数据来平滑排序后的数据值。排序后的值被放入分箱中，这些分箱是在算法内创建的组。\n\
    - **聚类**方法识别并移除数据集中的异常值。\n- **回归**方法通过将数据拟合到回归函数中来平滑数据。\n\n分箱的目的是减少一些误差。在分箱中，数据被分成小的桶或箱。然后，数据被计算出的箱值替换。当我们进行分箱过程时，我们就是在平滑数据。\n\
    \n这里有一个使用算法中简单数值数据集的示例。以下代码片段将创建具有相等频率的分箱：\n\nch16_binning1.py\n\n```\n#Binning\
