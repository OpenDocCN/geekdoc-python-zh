    These functions will be key to your algorithms as you design solutions for computational
    thinking problems. We will also use some of these functions as we look at other
    Python functionalities, such as dictionaries and arrays.


    ### Working with dictionaries and lists


    Before we get too deep into dictionaries and lists, it’s important to note that
    Python does not contain arrays in the built-in functions. We can use lists and
    perform a lot of the traditional functions on lists that we’d use for arrays.
    However, for more robust functionalities with arrays, a library is needed, such
