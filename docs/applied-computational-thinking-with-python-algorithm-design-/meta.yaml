    # # 1


    # # Fundamentals of Computer Science


    The world of computer science is a broad and complex one. Not only is it constantly
    changing and evolving, but the components we consider part of computer science
    are also adapting and adjusting. The computational thinking process allows us
    to tackle any problem presented with purpose and focus. No matter what the problem
    is, we can break it down, find patterns that will help us find solutions, generalize
    our solutions, and design algorithms that can help us provide solutions to that
    problem.


    Throughout this book, we will be looking at the computational thinking process
    carefully, tackling problems in multiple areas and using the Python programming
    language and its associated libraries and packages to create algorithms that help
    us solve these problems. Before we look at various problems, however, we will
    explore some of the important computer science concepts that will help us navigate
    the rest of this book.


    In this chapter, we will explore the following topics:


    +   - Introduction to computer science

    - Theoretical computer science

    - System software

    - Computing

    - Data types and structures


    # # Technical requirements


    Here is the source code that will be used in this chapter: [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter01](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter01).


    # # Introduction to computer science


    When looking for a definition of computer science, you will encounter multiple
    variations, but they all state that computer science encompasses all aspects of
    computers and computing concepts, including hardware and software. In computer
    science, hardware design is learned in courses offered in engineering or computer
    engineering, for the most part. The software side of computer science'
  - '[PAGE 31]


    includes **operating systems (OSs)** and applications, among other programming
    areas. For this book, we will be concentrating on the software side of computer
    science.


    In this chapter, we’ll look at some of the basic definitions, theories, and systems
    that are important as we delve deeper into the computational thinking world. Once
    we have identified key areas and defined the necessary concepts, we will be ready
    to move on to the applications and real-world challenges we face in an ever-changing
    tech world while also exploring the elements of computational thinking and the
    Python programming capabilities that can help us tackle these challenges.


    The wide range of topics available in computer science can be both daunting and
    exciting and it is ever-evolving. Some of these topics include game design, OSs,
    applications for mobile or desktop devices, programming robots, and much more.
    Constant and consistent breakthroughs in computers and computing provide new and
    exciting opportunities, much of which is unknown to us. Having a basic understanding
    of the systems behind computer science can help us interact with technology and
    tackle problems more efficiently. Let’s start by learning about how computers
    store information using the binary system.


    # Learning about computers and the binary system


    All computers store information as **binary** data. The binary system reads all
    information as a switch, which can be on or off – that is, 1 or 0. The binary
    system is a base-2 system. You’ll need a basic understanding of binary numbers
    and binary systems to progress in computer science.


    The binary system translates all data so that it can be stored as strings using
    only two numbers: 0 and 1. Data is stored in computers using bits. A **bit** (which
    stands for **binary digit**) is the smallest unit of data you can find in a computer
    – that is, either a 0 or a 1.


    When counting in the binary system, the first two numbers are 0 (or 00) and 1
    (or 01), much like in the base-10 number system we use in everyday life. If we
    were to continue counting in binary, our next number would be 10. Let’s compare
    the first three numbers in the base-10 system and the binary system before we
    learn how to convert from one into the other:


    | Base-10 | Binary |

    | :---: | :---: |

    | 0 | 0 |

    | 1 | 1 |

    | 2 | 10 |'
- md: '## Figure 1.1 – Base-10 and binary comparison


    The next number in the base-10 system would be 3. In the binary system, the next
    number would be 11, which is read as *one one*. The first 10 numbers in the base-10
    and binary systems are as follows:


    | Base-10 | Binary |

    | :--- | :--- |

    | 0 | 00 |

    | 1 | 01 |

    | 2 | 10 |

    | 3 | 11 |

    | 4 | 100 |

    | 5 | 101 |

    | 6 | 110 |

    | 7 | 111 |

    | 8 | 1000 |

    | 9 | 1001 |

    | 10 | 1010 |


    ## Figure 1.2 – Base-10 and binary comparison (continued)


    As mentioned previously, the binary system is a base-2 system. This means that
    each digit of the base-10 system is paired with a power of 2, so we use those
    powers to convert between numbers. Understanding how to convert from base-2 into
    base-10 and vice versa can help us have a better understanding of the relationship
    between numbers in the different systems.


    ## Converting from binary into base-10


    We will start with an example of converting from a binary number into a base-10
    number. Take the number 101101. To convert the number, each digit must be multiplied
    by the corresponding base-2 power. The binary number consists of 6 digits, so
    the powers of 2 we will use will be 5, 4, 3, 2, 1, and 0. This means the number
    is converted as follows:


    $1 \times 2^5 + 0 \times 2^4 + 1 \times 2^3 + 1 \times 2^2 + 0 \times 2^1 + 1
    \times 2^0$

    $= 32 + 0 + 8 + 4 + 0 + 1 = 45$


    The binary number 101101 is equivalent to 45 in the base-10 system. In everyday
    life, we write the numbers in base-10, so we understand the number 45 as it’s
    written. However, our computers convert this information into binary to be able
    to process it, so the number becomes the binary number 101101 so that it can easily
    be read by the computer.


    ## Converting from base-10 into binary


    Again, let’s start with an example to demonstrate the process of converting from
    a base-10 number into a binary number. Take the number 591. To convert the base-10
    number into binary, we have to divide the number by 2 iteratively. If the result
    has no remainder, we insert a 0 (if it is the first number) or insert a 0 to the
    left of the existing numbers.


    If the result has a remainder of 1, we insert a 1 (if it is the first number)
    or insert a 1 to the left of the existing numbers.


    When we divide 591 by 2, the result is 295 with a remainder of 1. That means our
    right-most number, which is our first number, is 1.


    Now, divide 295 by 2. The result is 147 with a remainder of 1. So, we insert a
    1 to the left of the 1. Our number is now 11.


    Now, divide 147 by 2. The result is 73 with a remainder of 1. Our result is now
    111. Now, we’ll carry out further divisions:


    - $73 \div 2 = 36$ with a remainder of 1. Our number is now 1111.

    - $36 \div 2 = 18$ with no remainder. Our number is now 01111.

    - $18 \div 2 = 9$ with no remainder. Our number is now 001111.

    - $9 \div 2 = 4$ with a remainder of 1. Our number is now 1001111.

    - $4 \div 2 = 2$ with no remainder. Our number is now 01001111.

    - $2 \div 2 = 1$ with no remainder. Our number is now 001001111.

    - $1 \div 2 = 0$ with a remainder of 1. Our number is now 1001001111.


    The number 591 in base-10 is equivalent to the number 1001001111 in the binary
    system.


    Another way to convert this number is to use a table for the divisions:


    | Starting Base-10 | Divided by 2 | Remainder |

    | :--- | :--- | :--- |

    | 591 | 295 | 1 |

    | 295 | 147 | 1 |

    | 147 | 73 | 1 |

    | 73 | 36 | 1 |

    | 36 | 18 | 0 |

    | 18 | 9 | 0 |

    | 9 | 4 | 1 |

    | 4 | 2 | 0 |

    | 2 | 1 | 0 |

    | 1 | 0 | 1 |


    Table 1.1 – Converting base-10 number 591 into binary


    Using this table, take the numbers from the right-most column and write them starting
    with the last row from bottom to top. The result is 1001001111.


    Learning how to convert numbers is only a small part of converting data into binary,
    but it is an important one. All information, including letters and symbols, must
    be converted into binary to be read by a computer. **American Standard Code for
    Information Exchange (ASCII)** is a protocol that has been adopted universally
    to convert information. That said, some of the protocol is obsolete, so other
    protocols use ASCII as a base to expand their capabilities. UTF-16 is a widely
    used 16-bit character set that is based on Unicode, an extension of ASCII.


    As discussed, in this section, we learned that information must be encoded or
    converted for a computer to read it. Multiple systems and protocols exist, but
    for now, we will move on to computer science theory. However, revisiting binary,
    ASCII, and Unicode as you work through problems can be helpful.


    ## Understanding theoretical computer science


    While you don’t need to be a master mathematician to love computer science, these
    two subjects are intrinsically tied. Computer science, particularly programming,
    uses algebraic algorithms. We will explore algorithms in depth later on, but again,
    the important point here is that they are mathematical. The logical processes
    stem from the philosophical nature and history of mathematics. Now, if mathematical
    topics are not to your liking, don’t despair. The logical processes needed to
    become a programmer and developer can be used without you having to learn higher
    mathematics. Knowing higher mathematics just simplifies some concepts for those
    who have that background.


    **Theoretical computer science** includes multiple theories and topics. Some of
    these topics and theories are listed as follows, but keep in mind that other topics
    are also included in theoretical computer science that may not be discussed in
    this book. A short description and explanation of each of the theories or terms
    listed here have been included for you to review:


    - Algorithms

    - Coding theory

    - Computational biology

    - Data structures

    - Cryptography

    - Information theory

    - Machine learning

    - Automata theory

    - Formal language theory

    - Symbolic computation

    - Computational geometry

    - Computational number theory


    We will look at the aforementioned theories in the following sections.


    ## Algorithms


    An algorithm is a set of instructions that a computer can read. Algorithms provide
    rules or instructions in a way in which a computer can logically process the information
    provided as input and create an output. In most books, you are introduced to the
    algorithm and programming by creating a *Hello World!* program. I won’t make this
    book the exception.


    In Python, the code would require that we print the message to the screen. Because
    the Python language is easy to learn and read, many, if not most, of the code
    strives to be logical. So, to print a message to the screen, we can use the `print()`
    command. Here is the code we''d use:


    ```

    print("Hello world!")

    ```


    Similarly, we could use the following code:


    ```

    print(''Hello world!'')

    ```


    Python reads both " and '' as the same thing when it comes to strings.


    The result of the preceding code looks like this when we run the algorithm:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_36_0.png)


    Figure 1.3 – The Hello World! Python program


    ### NOTE


    Don''t worry – we''ll discuss the Python programming language later in [Chapter
    2](https://example.com), Elements of Computational Thinking, and in more depth
    in Part 2, Applying Python and Computational Thinking, starting with [Chapter
    9](https://example.com), Introduction to Python, as well.


    While lengthy, discussing algorithms is critically important to this book and
    your progression with Python. Consequently, we will be covering this in-depth
    exploration of algorithms in [Chapter 2](https://example.com), Elements of Computational
    Thinking, and [Chapter 3](https://example.com), Understanding Algorithms and Algorithmic
    Thinking, since algorithms are a key element of the computational thinking process.


    ### IMPORTANT NOTE


    [Chapter 2](https://example.com), Elements of Computational Thinking, will focus
    on the computational thinking process itself, which has four elements: **decomposition**,
    **pattern recognition**, **pattern generalization and abstraction**, and **algorithm
    design**. As you can see, the last element is algorithm design, so we will need
    to get more acquainted with what an algorithm is and how we can create one so
    that you can then implement and design algorithms when solving problems with Python.
    [Chapter 3](https://example.com), Understanding Algorithms and Algorithmic Thinking,
    will focus on a deeper understanding of algorithms and introduce you to the design
    process.


    We''ll look at coding theory next.


    ## Coding theory


    Coding theory is also sometimes known as **algebraic coding theory**. When working
    with code and coding theory, three major areas are studied: **data compression**,
    **error correction**, and **cryptography**. We will cover these in more detail
    in the following sections.'
  mdcn: '## 图 1.1 – 十进制与二进制对比


    十进制系统中的下一个数字是 3。在二进制系统中，下一个数字是 11，读作 *一一*。十进制和二进制系统的前 10 个数字如下：


    | 十进制 | 二进制 |

    | :--- | :--- |

    | 0 | 00 |

    | 1 | 01 |

    | 2 | 10 |

    | 3 | 11 |

    | 4 | 100 |

    | 5 | 101 |

    | 6 | 110 |

    | 7 | 111 |

    | 8 | 1000 |

    | 9 | 1001 |

    | 10 | 1010 |


    ## 图 1.2 – 十进制与二进制对比（续）


    如前所述，二进制系统是一个以 2 为基数的系统。这意味着十进制系统的每一位数字都与 2 的一个幂次相对应，因此我们使用这些幂次在数字之间进行转换。理解如何从二进制转换为十进制，反之亦然，可以帮助我们更好地理解不同系统中数字之间的关系。


    ## 从二进制转换为十进制


    我们将从一个将二进制数转换为十进制数的例子开始。以数字 101101 为例。要转换这个数字，每一位数字必须乘以相应的 2 的幂次。这个二进制数由 6 位数字组成，因此我们将使用的
    2 的幂次是 5、4、3、2、1 和 0。这意味着该数字的转换过程如下：


    $1 \times 2^5 + 0 \times 2^4 + 1 \times 2^3 + 1 \times 2^2 + 0 \times 2^1 + 1
    \times 2^0$

    $= 32 + 0 + 8 + 4 + 0 + 1 = 45$


    二进制数 101101 等同于十进制系统中的 45。在日常生活中，我们使用十进制书写数字，因此我们理解数字 45 的书写形式。然而，我们的计算机将这些信息转换为二进制以便处理，因此数字变成了二进制数
    101101，以便计算机能够轻松读取。


    ## 从十进制转换为二进制


    同样，让我们从一个例子开始，演示将十进制数转换为二进制数的过程。以数字 591 为例。要将十进制数转换为二进制，我们必须反复将该数字除以 2。如果结果没有余数，我们插入一个
    0（如果是第一个数字）或在现有数字的左边插入一个 0。


    如果结果有余数 1，我们插入一个 1（如果是第一个数字）或在现有数字的左边插入一个 1。


    当我们用 591 除以 2 时，结果是 295，余数为 1。这意味着我们最右边的数字，也就是我们的第一个数字，是 1。


    现在，将 295 除以 2。结果是 147，余数为 1。因此，我们在 1 的左边插入一个 1。我们的数字现在是 11。


    现在，将 147 除以 2。结果是 73，余数为 1。我们的结果现在是 111。现在，我们将进行进一步的除法：


    - $73 \div 2 = 36$，余数为 1。我们的数字现在是 1111。

    - $36 \div 2 = 18$，没有余数。我们的数字现在是 01111。

    - $18 \div 2 = 9$，没有余数。我们的数字现在是 001111。

    - $9 \div 2 = 4$，余数为 1。我们的数字现在是 1001111。

    - $4 \div 2 = 2$，没有余数。我们的数字现在是 01001111。

    - $2 \div 2 = 1$，没有余数。我们的数字现在是 001001111。

    - $1 \div 2 = 0$，余数为 1。我们的数字现在是 1001001111。


    十进制数 591 等同于二进制系统中的数字 1001001111。


    另一种转换这个数字的方法是使用除法表格：


    | 起始十进制数 | 除以 2 | 余数 |

    | :--- | :--- | :--- |

    | 591 | 295 | 1 |

    | 295 | 147 | 1 |

    | 147 | 73 | 1 |

    | 73 | 36 | 1 |

    | 36 | 18 | 0 |

    | 18 | 9 | 0 |

    | 9 | 4 | 1 |

    | 4 | 2 | 0 |

    | 2 | 1 | 0 |

    | 1 | 0 | 1 |


    表 1.1 – 将十进制数 591 转换为二进制


    使用此表格，从最右边的一列取出数字，并从最后一行开始从下往上书写。结果是 1001001111。


    学习如何转换数字只是将数据转换为二进制的一小部分，但它是重要的一部分。所有信息，包括字母和符号，都必须转换为二进制才能被计算机读取。**美国信息交换标准代码
    (ASCII)** 是一个被普遍采用的用于转换信息的协议。也就是说，该协议的某些部分已经过时，因此其他协议以 ASCII 为基础来扩展其功能。UTF-16
    是一种广泛使用的 16 位字符集，它基于 Unicode，是 ASCII 的扩展。


    正如本节所讨论的，我们了解到信息必须被编码或转换，计算机才能读取它。存在多种系统和协议，但目前，我们将继续讨论计算机科学理论。然而，在解决问题时回顾二进制、ASCII
    和 Unicode 可能会有所帮助。


    ## 理解理论计算机科学


    虽然你不需要成为数学大师才能热爱计算机科学，但这两个学科本质上是紧密相连的。计算机科学，特别是编程，使用代数算法。我们将在后面深入探讨算法，但同样，这里的重要一点是它们是数学的。逻辑过程源于数学的哲学本质和历史。现在，如果数学话题不合你意，不要绝望。成为程序员和开发者所需的逻辑过程可以在不学习高等数学的情况下使用。了解高等数学只是为那些有此背景的人简化了一些概念。


    **理论计算机科学**包括多个理论和主题。其中一些主题和理论列举如下，但请记住，理论计算机科学还包括其他可能未在本书中讨论的主题。此处列出的每个理论或术语都附有简要描述和解释，供您复习：


    - 算法

    - 编码理论

    - 计算生物学

    - 数据结构

    - 密码学

    - 信息论

    - 机器学习

    - 自动机理论

    - 形式语言理论

    - 符号计算

    - 计算几何

    - 计算数论


    我们将在以下部分中探讨上述理论。


    ## 算法


    算法是一组计算机可以读取的指令。算法以计算机可以逻辑处理输入信息并产生输出的方式提供规则或指令。在大多数书籍中，你通过创建一个 *Hello World!*
    程序来接触算法和编程。我不会让这本书例外。


    在 Python 中，代码需要我们将消息打印到屏幕上。因为 Python 语言易于学习和阅读，许多（如果不是大多数）代码都力求逻辑清晰。因此，要将消息打印到屏幕上，我们可以使用
    `print()` 命令。以下是我们将使用的代码：


    ```

    print("Hello world!")

    ```


    类似地，我们可以使用以下代码：


    ```

    print(''Hello world!'')

    ```


    Python 在处理字符串时，将 " 和 '' 视为相同。


    当我们运行算法时，上述代码的结果如下所示：


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_36_0.png)


    图 1.3 – Hello World! Python 程序


    ### 注意


    别担心——我们将在 [第 2 章](https://example.com) 计算思维要素中讨论 Python 编程语言，并在第 2 部分 应用 Python
    和计算思维中更深入地讨论，从 [第 9 章](https://example.com) Python 入门开始。


    虽然篇幅较长，但讨论算法对于本书以及你学习 Python 的进程至关重要。因此，我们将在 [第 2 章](https://example.com) 计算思维要素
    和 [第 3 章](https://example.com) 理解算法与算法思维 中深入探讨算法，因为算法是计算思维过程的关键要素。


    ### 重要提示


    [第 2 章](https://example.com) 计算思维要素 将重点讨论计算思维过程本身，它包含四个要素：**分解**、**模式识别**、**模式概括与抽象**以及**算法设计**。如你所见，最后一个要素是算法设计，因此我们需要更熟悉什么是算法以及如何创建算法，以便你随后在使用
    Python 解决问题时能够实现和设计算法。[第 3 章](https://example.com) 理解算法与算法思维 将重点深入理解算法，并向你介绍设计过程。


    接下来，我们将探讨编码理论。


    ## 编码理论


    编码理论有时也被称为**代数编码理论**。在处理代码和编码理论时，主要研究三个领域：**数据压缩**、**纠错**和**密码学**。我们将在以下部分更详细地介绍这些内容。'
