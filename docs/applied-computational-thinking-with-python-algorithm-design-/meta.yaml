    \n### 设计算法（密码学）\n\n要编写我们的算法，让我们首先看看需要做什么：\n\n1. 定义字母。\n2. 将所有字母转换为小写以运行我们的算法。\n\
    3. 定义所需的函数——**加密**、**解码**和**主函数**。\n4. 调用密码学**主函数**。\n\n**提示**\n\n*此问题的完整算法可在**ch17_cryptographyA.py**文件中找到。*\n\
    \n我们将按照以下步骤开始设计算法：\n\n1. 首先定义我们的字母。以下代码片段定义了我们的字母，然后将每个字母渲染为小写：\n\n```\nLETTERS\
    \ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZABCDEFGHIJKLMNOPQRSTUVWXYZ'\nLETTERS = LETTERS.lower()\n\
    ```\n\n2. 接下来，我们定义加密函数。此函数将接受两个参数——**message**和**key**。**message**函数将由用户定义，这将在**main**函数中完成。目前，我们将使用空消息，通过添加空引号（''）作为**encryptedM**变量的定义，如以下代码片段所示：\n\
    \n```\ndef encrypt(message, key):\n    encryptedM = ''\n    for letts in message:\n\
