  md: "A **global variable** is a variable that we declare outside of functions. Seems\
    \ simple enough, right? It is. However, beware of overusing global variables,\
    \ as they can cause a lot of problems with your code and make debugging a pretty\
    \ hard problem to solve.\n\nLet’s take a look at a global variable and its use\
    \ inside a function:\n\nch13_global.py\n\n```\ncounter = 1\ndef counterF():\n\
    \    print(f'Counter value is {counter}.')\ncounterF()\n```\n\nAs you can see,\
    \ we created a variable called `counter` and then used the variable in a function\
    \ called `counterF()`. Note that the variable is outside the function. That means\
    \ `counter` is a global variable.\n\nNow, let’s look at an example of a local\
    \ variable.\n\n# Local variables\n\nA **local variable** is declared inside a\
    \ function, and its value cannot be used outside of a declaration of that function.\
    \ Let’s look at the previous example, with the variable now declared inside the\
    \ function:\n\nch13_local.py\n\n```\ndef counterF():\n    counter = 1\n    print(f'Counter\
    \ value is {counter}.')\ncounterF()\n```\n\nAs you can see, the code should, and\
    \ does, perform the same way the global variable code did. Both will give us the\
    \ following output:\n\n`Counter value is 1.`\n\nSo, what is the difference, and\
    \ why does it matter? For that, we’ll need to think about this using a real scenario.\n\
    \n# Errors when using global and local variables\n\nLet’s think about global variables\
    \ and what happens when we use them. To do that, let’s think about a restaurant.\
    \ In 2023, restaurants can have the same menu for dine-in options and delivery\
    \ applications, but they can have different prices for each of the menus. Let’s\
    \ say a restaurant sells a menu item called “pasta alfredo.” If the variable gets\
    \ defined globally and is then used in multiple functions,"
