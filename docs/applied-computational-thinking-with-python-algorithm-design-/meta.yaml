    \n## 算法应该是可行的\n\n算法在其目标以及可用的内容和资源方面也必须是**可行的**。编写算法时，我们可能会在步骤中写入约束或条件。如果无法满足所有约束，那么该算法就不可行。考虑以下两个条件：\n\
