    Now, let’s talk about transforming data.


    # Transforming data


    **pandas** allows us to transform data. Here are some ways we can transform it:


    +   - **Normalization** transforms values into a new range; the most popular is
    **min-max normalization**, given as follows:


    x scaled = x – min(x) _______________ max(x) – min(x)


    - **Attribute selection** is the process of transforming data by replacing an
    attribute with a different attribute or attributes.


    - **Concept hierarchy** is actually a transformation done by reducing data. It
    is done by replacing concepts such as numbers (10, 15, 40) with higher-level concepts,
    such as qualifiers (short, lengthy, extremely lengthy).


    In the next section, we will glance through the reduction of data.


    # Reducing data


    **Data reduction** refers to a process that allows us to get similar or even the
    same results from a dataset but only after having reduced the representation of
    the data in volume.


    We won’t go into too much depth with all the concepts here because they are much
    easier to look at in examples, but here are some ways that data reduction is done:


    +   - Removing invalid data from the dataset


    - Creating summaries for the data at different levels


    Think of removing invalid data as taking care of any outliers. The data may have
    been entered incorrectly, conditions may have not been optimal, or similar. When
    we have a data point that doesn’t fit the entirety of the dataset, especially
    where we have a large number of data points to compare it to, we can remove that
    data point as invalid or as an outlier.


    When creating summaries at different levels, we are aggregating the dataset and
    testing and producing summaries at each of those levels. Say you had 100 data
    points (datasets will often be in the thousands, but it’s easier to explain with
    smaller numbers). We could create a summary for the first 20 data points. Then,
    we could do the same for the first 40, then the first 60, and so on. When compared,
    we could see the trends and use those smaller sub-sections of our dataset to make
    our predictions if the trends hold true. That’s what data reduction helps with—simplifying
    our dataset while still getting accurate results.


    In this section, we learned how to work with data that needs cleaning. We explored
    various methods to clean data, including handling missing data by eliminating
    or replacing missing points.'
