    3. Once we have performed one-hot encoding, we can create our model:


    ```

    #Creating the model

    from keras.models import Sequential

    from keras.layers import Dense, Conv2D, Flatten

    model = Sequential()

    model.add(Conv2D(64, kernel_size=3, activation=''relu'', input_shape=(28,28,1)))

    model.add(Conv2D(32, kernel_size=3, activation=''relu''))

    model.add(Flatten())

    model.add(Dense(10, activation=''softmax''))

    #Compile the model

    model.compile(optimizer=''adam'', loss=''categorical_crossentropy'', metrics=[''accuracy''])

    ```


    In the preceding code snippet, we used a `softmax` function. The `softmax` function
    is sometimes referred to as a normalized exponential function. We use it to normalize
    the output.


