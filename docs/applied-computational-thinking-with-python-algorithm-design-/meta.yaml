    \ 5\nEnter a number between 8 and 15: 19\nI predict your number is less than 19,\
    \ in this case 24\n```\n\nNo, this is not what I predicted. The program is not\
    \ cooperating. So, let’s look at how I could fix that issue.\n\nFirst, we need\
    \ to check if the inputs received were in the range provided.\n\nWe have the variable\
    \ `firstNumber`, which SHOULD be between 1 and 3. And we’ll just assume it is\
    \ inclusive of endpoints, so the number should be 1, 2, or 3.\n\nIn that case,\
    \ we can use conditionals to allow us to get the right numbers, or at least let\
    \ the user know they need to start over!\n\nLet’s look at a possible solution.\n\
    \n# ch5_buggyCode2_solution.py\n\n```\nfirstNumber = int(input('Enter a number\
    \ between 0 and 3: '))\nif(firstNumber < 4):\n    secondNumber = int(input('Enter\
    \ a number between 8 and 15: '))\n    if(secondNumber > 7 and secondNumber < 16):\n\
    \        sum1 = firstNumber + secondNumber\n        print(\"I predict your number\
    \ is less than 19, in this case\", sum1)\n    else:\n        print(\"Run this\
    \ again and pay attention to the numbers!\")\n```"
