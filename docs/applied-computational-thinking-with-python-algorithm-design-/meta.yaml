    # Architecture


    Computer architecture refers to the set of instructions that interact with computer
    systems. In more basic terms, the architecture includes the instructions that
    allow software and hardware to interact. Computer architecture has three main
    subcategories:


    +   - Instruction Set Architecture (ISA)

    - Microarchitecture

    - System Design


    # Instruction Set Architecture (ISA)


    The ISA is the boundary that exists between hardware and software. It is classified
    in multiple ways, but two common ones are **complex instruction set computer (CISC)**
    and **reduced instruction set computer (RISC)**:


    +   - **CISC** is a computer that has explicit instructions for many tasks, such
    as simple mathematical operations and loading something from memory. CISC includes
    everything that is not included in RISC.

    - **RISC** is a computer with an architecture that has reduced **cycles per instruction
    (CIP)**.


    CISC tries to do more things with a fewer number of instructions, while RISC only
    uses simple instructions. CISC is multi-step, while RISC is single-step, performing
    one task at a time. The CISC process includes instructions, microcode conversion,
    microinstructions, and execution. In contrast, RISC includes instructions and
    execution.'
