    ## Problem 8 – using Python to create a CNN\n\nIn this section, we will explore\
    \ a problem that involves **artificial intelligence (AI)**. To be more specific,\
    \ we will focus on building a **CNN**. *But what exactly is a CNN?* Well, a CNN\
    \ is a **deep learning algorithm** that operates on images as its input. It processes\
    \ and assigns importance to various aspects of the image based on predetermined\
    \ features.\n\nThe following diagram illustrates the process involved in a CNN:\n\
    \nA CNN is created to simplify how we categorize the images without sacrificing\
    \ accuracy in terms of the predictions we want to be able to get from our image\
    \ analyses. It’s like if we were applying a filter. Once we apply the filter,\
    \ we can see the characteristics. The preceding diagram shows a simplified schematic\
    \ for this process.\n\nThe problem we’re going to be diving into is handwriting\
    \ training and analysis. Thinking about the computational thinking process, what\
    \ we’re trying to do is analyze handwriting as accurately as possible. To do so,\
    \ we must analyze hundreds or thousands of images to create and train our model.\
    \ The more images we use, the more accurate our model will be.\n\nFor our model,\
    \ we’re going to use the MNIST dataset, which contains 70,000 images.\n\n**MNIST**\
    \ stands for the **Modified National Institute of Standards and Technology**.\
    \ It is a widely used dataset in the field of machine learning and computer vision.\
    \ The first 60,000 images are used for training, and the other 10,000 are used\
    \ for testing. The full code can be found in the `ch18_CNN_mnist.py` file. We’ll\
    \ take a look at some of the snippets from that code and also make some adjustments\
    \ to show additional components. You can run the file in this book’s GitHub repository\
    \ without making changes, so long as you have all the necessary libraries and\
    \ packages installed. Let’s start designing the model:\n\n1. First, let’s look\
    \ at a snippet of code that will upload the dataset, and then show the first item\
    \ in the dataset:\n\n```python\nfrom keras.datasets import mnist\n#Grab the testing\
    \ and training data from existing dataset\n(X_train, y_train), (X_test, y_test)\
    \ = mnist.load_data()\nimport matplotlib.pyplot as plt\n#Take a look at the first\
    \ item in the dataset\nplt.imshow(X_train[0], cmap='Greys')\n```\n\nHere, we used\
    \ 0 as the index in the training set to see that first image. The `cmap` property\
    \ will make the colormap gray. You can adapt that and adjust it as needed. As\
    \ a side note, for those who have trouble seeing color or have particular color\
    \ needs, changing the colormap can make a significant difference to how the images\
    \ are perceived. Let’s take a look at that first image:\n\nAs you can see, this\
    \ is a handwriting sample, most likely of the number **5**. We can run the program\
    \ a few more times with different indexes to see some other samples in our dataset.\
    \ The following screenshot shows some of those samples and their corresponding\
    \ indexes:\n\n## 18.27 Sample images in the dataset by index\n\nThe data we are\
    \ using is not quantitative, it is qualitative. We are looking at images, so we\
    \ require a process that can analyze those images. To do so, we’ll use **one-hot\
    \ encoding**, which replaces integer encoded variables with new binary variables.\n\
    \n2. Now that we’ve looked at what we’re working with, let’s reshape and encode\
    \ our model using the following code snippet. As a reminder, the full code can\
    \ be found in this book’s GitHub repository, but some of the components will be\
    \ slightly different (for example, our file will not be testing the images in\
    \ the dataset):\n\n```python\n#Reshape the model\nX_train = X_train.reshape(60000,28,28,1)\n\
    X_test = X_test.reshape(10000,28,28,1)\nfrom keras.utils import to_categorical\n\
    #Use One-Hot encoding\ny_train = to_categorical(y_train)\ny_test = to_categorical(y_test)\n\
    y_train[0]\n```\n\nAs you can see, we divided the images into training and test\
    \ sets. Then, we encoded them.\n\n3. Once we have performed one-hot encoding,\
    \ we can create our model:\n\n```python\n#Creating the model\nfrom keras.models\
    \ import Sequential\nfrom keras.layers import Dense, Conv2D, Flatten\nmodel =\
    \ Sequential()\nmodel.add(Conv2D(64, kernel_size=3, activation='relu', input_shape=(28,28,1)))\n\
    model.add(Conv2D(32, kernel_size=3, activation='relu'))\nmodel.add(Flatten())\n\
    model.add(Dense(10, activation='softmax'))\n#Compile the model\nmodel.compile(optimizer='adam',\
    \ loss='categorical_crossentropy', metrics=['accuracy'])\n```\n\nIn the preceding\
    \ code snippet, we used a `softmax` function. The `softmax` function is sometimes\
    \ referred to as a normalized exponential function. We use it to normalize the\
    \ output.\n\n4. Now, let’s train the model. We’re going to fit the model and then\
    \ validate the data. Take a look at this code snippet:\n\n```python\n#train the\
    \ model\nmodel.fit(X_train, y_train, validation_data=(X_test, y_test), epochs=3)\n\
    ```\n\nThis is one of the great things about training and testing – that is, when\
    \ we understand and practice them, we realize it takes just a few lines of code\
    \ to do some pretty amazing things."
