  md: "# Identifying errors in algorithm design\n\nErrors in algorithms are just a\
    \ fact of life for any coder. It’s important to get comfortable with making mistakes.\
    \ As mentioned in *Chapter 6, Exploring Problem Analysis*, and *Chapter 7, Designing\
    \ Solutions and Solution Processes*, it’s good practice to test your algorithm\
    \ and test it often. Waiting until you have finished hundreds or thousands of\
    \ lines of code to test something is a recipe for disaster. And yes, I was once\
    \ working on copying a game and did not test at all. Not until I had all 4,585\
    \ lines copied. I was young. Truth be told, I never found the error I made. I\
    \ started over and started testing at every corner. The second time was successful,\
    \ but I’d wasted weeks copying everything (it was from a book – GitHub wasn’t\
    \ a thing yet) and then trying to figure out the errors. So, please don’t be me.\
    \ Please test your algorithms.\n\nNow, before moving on to debugging and working\
    \ with code, let’s take a look at the errors we can encounter when solving problems.\n\
    \nIn this section, we’ll focus on two broad categories of errors: syntax errors\
    \ and logic errors.\n\n# Syntax errors\n\nSyntax errors are sometimes called parsing\
    \ errors. They’re errors we create when we forget to indent, add a colon, add\
    \ quotation marks for strings, and so on. We’ll have a look at the different types\
    \ of syntax errors in the following sections.\n\n# Using colons\n\nColons are\
    \ used in Python to separate conditions, create loops, and more. The colon is\
    \ a way to tell the algorithm that the next thing is part of this particular block\
    \ of code. When we introduce colons in Python, they automatically indent the next\
    \ line in our code. But if we forget to include a colon where it is needed, the\
    \ program will not run successfully. Let’s take a look at a syntax error:\n\n\
    ```\nfor i in range(1, 10)\n    print(i)\n```\n\nIf we run this code, we will\
    \ get an error message that says *invalid syntax*. The following screenshot shows\
    \ the pop-up window that appears when we try to run this program:"
