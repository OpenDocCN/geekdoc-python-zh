    ### Mathematical built-in functions


    In Python, some of the mathematical functions are already built in, such as the
    `abs()`, `eval()`, `max()`, `min()`, and `sum()` functions. These are not the
    only mathematical functions built in, but we’ll take a closer look at these particular
    ones in order to understand how Python deals with them.


    The `abs()` function will help us find the absolute value of a number, either
    an integer or a float. Take a look at the following code snippet:


    ch9_absFunction.py


    ```

    x = abs(-3.89)

    print(x)

    ```


    When we run this program, we’ll get an absolute value of -3.89. Remember that
    the absolute value of a number is its distance from 0. Take a look at the output
    when we run this program:


    ```

    3.89

    ```


    Since the absolute value is always positive, when we run `abs(-3.89)`, we get
    3.89.


    Another helpful function is the `eval()` function. We can define a variable in
    this function and then call for Python to evaluate an algebraic expression using
    that value. In the Python shell, we can first define the variable as follows:


    ```

    >>> p = 2

    ```


    Now that the variable is defined, we can call the `eval()` function with any expression.
    Note that the use of `eval()` requires that we input the expression as a string.
    For example, take a look at the following input and output:


    ```

    >>> eval(''2 * p - 1'')

    ```


    As you can see, Python used the previously defined **p** value of 2, substituted
    it into the expression, then evaluated it to produce this output:


    ```

    3

    ```


    It should be noted, however, that you can also simply input the expression in
    Python without having to use the `eval()` function.


    For example, `>>> p*2` will result in the same answer as `eval(''p * 2'')`, which,
    given the value of **p** = 2, would be 4.


    The Python program also works as a calculator, so you can perform mathematical
    operations as you normally would. Here are a few examples:


    ```

    >>> 10-8

    2

    ```


    As you can see, Python knows to read the dash as a subtraction and produces the
    result of the mathematical expression:


    ```

    2

    ```


    In the next case, Python interpreted + as a mathematical symbol and provided the
    result of the **sum** expression:


    ```

    >>> 4+5

    ```


    The output is shown here:


    ```

    9

    ```


    Notice the last expression, `10**5`. In Python, we can use two stars (**) to denote
    exponents, like so:


    ```

    >>> 10**5

    ```


    The output is given here:


    ```

    100000

    ```


    Now, let’s take a look at the `max()` function. This function can be used on an
    iterable list, but we can test it with just two numbers, as follows:


    ```

    >>> max(12, 30)

    ```


    You can clearly see what the output is:


    ```

    30

    ```


    Let’s take another example:


    ```

    >>> max(100, 10)

    ```


    This is the output:


    ```

    100

    ```


    As you can see from the output, the function always chooses the largest item.
    You can add a third item and the function will still choose the maximum value.
    These built-in functions are smart in a way that they are coded to work with what
    is provided—two or three items, for example—without having to tell Python explicitly
    how many items we’ll be introducing:


    ```

    >>> max(230, 812, 109)

    ```


    The output obtained is:


    ```

    812

    ```


    As you can see, we did not have to add anything to the built-in function to find
    the maximum of three values.


    The `min()` function is the opposite; it chooses the minimum value. Take a look
    at the following minimum function:


    ```

    >>> min(230, 812, 109)

    ```


    This is the output:


    ```

    109

    ```


    As you can see, the function used the same list we used for the maximum function,
    but this time the output is 109, which is the minimum value of that group of numbers.


    There are other mathematical functions, such as `sum()`. If you’re a Python beginner,
