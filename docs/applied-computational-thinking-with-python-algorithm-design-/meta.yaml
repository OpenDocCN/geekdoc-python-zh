    # 15


    # Introduction to Machine Learning


    In this chapter, we will be introducing **machine learning (ML)** models using
    the Python programming language. We will utilize computational thinking elements
    to define the necessary components for problem-solving when working with popular
    ML algorithms.


    In this chapter, we will cover the following topics:


    +   - Defining ML

    - The ML life cycle

    - Types of ML algorithms

    - Introduction to **deep learning (DL)**


    By the end of this chapter, you will be able to design algorithms that best fit
    the presented scenarios. Additionally, you will learn how to identify Python functions
    that align most effectively with the given problems and generalize your solutions.


    # Technical requirements


    We will need the latest versions of Python and **scikit-learn** to execute the
    code in this chapter.


    You can find the code for this chapter here: [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter15](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter15).


    You can find the **Pima Indians Diabetes Database** from **Kaggle** here: [https://www.kaggle.com/uciml/pima-indians-diabetes-database](https://www.kaggle.com/uciml/pima-indians-diabetes-database).


    # Defining ML


    ML is a subfield of **artificial intelligence (AI)** that focuses on building
    systems that can learn from data. Rather than being explicitly programmed to perform
    a task, an ML model uses data to learn patterns and make decisions. At its core,
    ML is about creating algorithms that improve their performance at a task by being
    exposed to more data over time.


    DL is a subset of ML that uses neural networks with multiple layers to model complex
    patterns and representations in large datasets. In this section, we’re going to
    explore the ML life cycle, elaborating on it and the process of crafting ML models:'
  - '[PAGE 257]


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_257_0.png)


    Figure 15.1 – ML umbrella


    # ML umbrella


    Python, with its simplicity and versatility, stands out as a popular choice for
    cloud-based applications. In AWS, Python is used extensively for scripting, automation,
    and building cloud-native applications. We’ll explore how Python’s features make
    it an ideal language for interacting with AWS services, from automating repetitive
    tasks to processing vast amounts of data.


    Based on the ML umbrella diagram, here is a detailed recap of what AI, ML, and
    DL represent:


    +   - **AI**: This is the broadest concept and encompasses the idea of machines
    being able to carry out tasks in a way that we would consider “smart.” It’s about
    creating systems that can perform tasks that would typically require human intelligence.
    These tasks include planning, understanding language, recognizing objects and
    sounds, learning, and problem-solving.

    - **ML**: ML is a subset of AI. It’s the study of computer algorithms that improve
    automatically through experience and the use of data. It focuses on the development
    of programs that can access data and use it to learn for themselves. The process
    of learning begins with observations or data, such as examples, direct experience,
    or instruction, to look for patterns in data and make better decisions in the
    future.

    - **DL**: DL is a subset of machine learning that’s concerned with algorithms
    inspired by the structure and function of the brain called **artificial neural
    networks (ANNs)**. It’s a specific method that’s used to implement ML that involves
    the use of complex, multi-layered neural networks. DL drives many AI applications
    that improve automation, performing analytical and physical tasks without human
    intervention.


    Now that we have established a fundamental understanding of the ML umbrella, let’s
    look into the ML life cycle, which involves a series of critical steps that are
    essential for building an ML model. This process not only shapes the development
    of a model but also ensures its effectiveness and'
- md: "## Navigating the ML life cycle – a practical approach\n\nThe ML life cycle,\
    \ also known as the ML workflow or process, outlines the sequence of steps involved\
    \ in developing and deploying an ML model. These steps provide a structured approach\
    \ to solving problems using ML techniques. The exact details and terminology might\
    \ vary slightly depending on the source, but here’s a general overview of the\
    \ typical ML life cycle:\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_258_0.png)\n\
    \n- Problem Definition\n- Data Collection\n- Data Preprocessing\n- Exploratory\
    \ Data Analysis (EDA)\n- Feature Engineering\n- Train and Test Model\n- Optimization\n\
    - Model Deployment\n\nFigure 15.2 – ML life cycle\n\nIn *Figure 15.2*, the machine\
    \ learning process is depicted in three main phases, each consisting of specific\
    \ sub-steps:\n\n- Phase 1. Preparation and problem definition:\n    - A. Defining\
    \ the problem\n    - B. Collecting data\n- Phase 2. Data processing and model\
    \ development:\n    - C. Exploratory data analysis (EDA)\n    - D. Feature engineering\n\
    \    - E. Model training and testing\n- Phase 3. Optimization and deployment:\n\
    \    - F. Model optimization\n    - G. Deploying the model\n\nEach step is critical\
    \ to ensure that the model is accurate, efficient, reliable, and robust for real-world\
    \ applications. Overlooking or skipping any step may result in inadequate performance,\
    \ biased results, or failure in practical scenarios. In the next section, we will\
    \ thoroughly examine the steps of the ML life cycle.\n\n## Phase 1 – preparation\
    \ and problem definition\n\nProblem definition in the ML life cycle means clearly\
    \ outlining the specific task the model must address, specifying its type and\
    \ objective. Following this, data collection involves gathering relevant and sufficient\
    \ data to train and test the model; this will be discussed later in this chapter.\
    \ Both sub-stages are foundational for guiding subsequent steps in the life cycle.\n\
    \n### Problem definition\n\nClearly define the objective. Begin by precisely formulating\
    \ the problem you intend to solve. Grasp the challenge you’re tackling. Define\
    \ the prediction or decision your program needs to make.\n\n### Data collection\n\
    \nThere are many forms of data collection. Collect relevant data that serves as\
    \ the foundation for training and testing your model. Data is the key factor to\
    \ any machine learning model. Data can come in many multiple sources. Here are\
    \ a few ways you can gather data:\n\n- **CSV**: A CSV file is a comma-separated\
    \ values file that allows data to be saved in a tabular format.\n- **Web page\
    \ data extraction (web scraping)**: This technique is used to extract information\
    \ from websites and web pages. It involves programmatically retrieving data from\
    \ websites. In Python, you can use the Beautiful Soup library for web scraping.\n\
    - **Application programming interface (API)**: An API is a set of rules and protocols\
    \ that allows different software applications to communicate with each other.\
    \ In the context of data collection for ML modeling, an API provides a structured\
    \ and controlled way to access and retrieve data from a remote server or service.\
    \ APIs are a more reliable and efficient method of data collection compared to\
    \ web scraping, especially when the data is provided by the service owner in a\
    \ structured format.\n- **Database**: A database is a structured collection of\
    \ data that is organized in a way that allows for efficient storage, retrieval,\
    \ and manipulation of information. Databases are commonly used for data collection\
    \ in ML modeling because they provide a reliable and organized method of storing\
    \ data.\n\n## Phase 2 – data preprocessing and model development\n\nOnce we’ve\
    \ defined an objective and gathered our data, we can start the data preprocessing\
    \ phase. This is the stage where raw data is cleaned and transformed to be fit\
    \ for modeling. It encompasses EDA to understand data patterns and feature engineering\
    \ to enhance or create informative input variables. Model development involves\
    \ using this prepared data to train and test machine learning algorithms, ensuring\
    \ their performance aligns with desired outcomes. These stages ensure that the\
    \ model is both robust and reliable in its predictions.\n\n### Data preprocessing\n\
    \nClean, format, and transform the data to make it suitable for analysis. Addressing\
    \ missing values, outliers, and inconsistencies is crucial to preparing the data\
    \ for model training. This step is vital for an ML model as failing to identify\
    \ and mitigate these issues can negatively affect the quality of the outcome.\n\
    \n### EDA\n\nEDA is a crucial step in the data analysis and model development\
    \ process for ML. It involves systematically examining and summarizing the main\
    \ characteristics, patterns, and relationships within a dataset to gain insights\
    \ and inform subsequent modeling decisions. EDA helps you understand your data,\
    \ identify potential issues, and make informed choices about feature engineering,\
    \ data preprocessing, and model selection. In the next chapter, we will look at\
    \ this step in more detail.\n\n### Feature engineering\n\nFeature engineering\
    \ refers to the process of selecting and transforming variables/features in a\
    \ dataset when building a predictive model using ML. Therefore, before training\
    \ the data with ML algorithms, it is necessary to extract features from the collected\
    \ raw dataset. Otherwise, it will be difficult to get the right insights from\
    \ the data.\n\nFeature engineering has two goals:\n\n- Preparing the proper input\
    \ dataset so that it’s compatible with the ML algorithm’s requirements\n- Improving\
    \ the performance of ML models\n\n### Train and test the model\n\nIn ML, the terms\
    \ “train” and “test” refer to two distinct phases of working with a dataset to\
    \ build and evaluate a predictive model. These phases are crucial for assessing\
    \ how well a model generalizes to new, unseen data. The dataset is usually split\
    \ into subsets: one for training the model and another for testing its performance.\
    \ This division allows you to measure the model’s ability to make accurate predictions\
    \ on data it has never encountered before. Let’s take a closer look:\n\n- **Train:**\
    \ The model learns patterns using a “training dataset,” adjusting its parameters\
    \ to make accurate predictions.\n- **Test:** The model’s performance is evaluated\
    \ on a “testing dataset” to measure how well it generalizes to unseen data, ensuring\
    \ it doesn’t just memorize the training data (overfitting).\n- **Validation (optional):**\
    \ An intermediate step involving a “validation dataset” helps tune model parameters\
    \ and select the best model variant.\n\nTypical dataset splits are 80-10-10, 70-15-15,\
    \ or 60-20-20 for training, validation, and testing, respectively. They can be\
    \ adjusted based on data availability and problem complexity:\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_261_0.png)\n\
    \nFigure 15.3 – Dataset splits for training and testing a model\n\nIt’s important\
    \ to note that the testing dataset should not be used during model development,\
    \ including hyperparameter tuning. Its purpose is to assess the model’s generalization\
    \ ability after the model has been trained and finalized.\n\n## Phase 3 – optimization\
    \ and deployment\n\nOptimization involves refining ML models using libraries such\
    \ as scikit-learn, while deployment entails integrating these optimized models\
    \ into real-world applications with frameworks such as Flask or Django. These\
    \ stages ensure models are practical and deliver real value.\n\n### Optimization\n\
    \nFine-tune the model’s hyperparameters and configurations to achieve optimal\
    \ performance. Experiment with different settings to improve accuracy and generalization.\n\
    \n### Model deployment\n\nIntegrate the well-trained model into real-world applications.\
    \ Develop APIs or interfaces to make predictions based on new data. Ensure that\
    \ the deployment environment is ready to handle the model’s usage.\n\nThroughout\
    \ these phases, data is transformed into actionable insights through careful problem\
    \ definition, data gathering, thorough preprocessing, exploratory analysis, feature\
    \ crafting, and rigorous"
  mdcn: "## 导航机器学习生命周期——一种实用方法\n\n机器学习生命周期，也称为机器学习工作流或流程，概述了开发和部署机器学习模型所涉及的步骤序列。这些步骤提供了一种使用机器学习技术解决问题的结构化方法。具体的细节和术语可能因来源而略有不同，但以下是典型机器学习生命周期的概述：\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_258_0.png)\n\n- 问题定义\n- 数据收集\n- 数据预处理\n\
    - 探索性数据分析（EDA）\n- 特征工程\n- 训练和测试模型\n- 优化\n- 模型部署\n\n图 15.2 – 机器学习生命周期\n\n在*图 15.2*中，机器学习过程被描绘为三个主要阶段，每个阶段包含特定的子步骤：\n\
    \n- 阶段 1. 准备和问题定义：\n    - A. 定义问题\n    - B. 收集数据\n- 阶段 2. 数据处理和模型开发：\n    - C.\
    \ 探索性数据分析（EDA）\n    - D. 特征工程\n    - E. 模型训练和测试\n- 阶段 3. 优化和部署：\n    - F. 模型优化\n\
    \    - G. 部署模型\n\n每个步骤对于确保模型在实际应用中准确、高效、可靠和稳健都至关重要。忽略或跳过任何步骤都可能导致性能不足、结果有偏差或在实际场景中失败。在下一节中，我们将详细探讨机器学习生命周期的各个步骤。\n\
    \n## 阶段 1 – 准备和问题定义\n\n机器学习生命周期中的问题定义意味着清晰地勾勒出模型必须解决的具体任务，明确其类型和目标。随后，数据收集涉及收集相关且足够的数据来训练和测试模型；这将在本章后面讨论。这两个子阶段是指导生命周期后续步骤的基础。\n\
    \n### 问题定义\n\n清晰地定义目标。首先精确地阐述你打算解决的问题。把握你正在应对的挑战。定义你的程序需要做出的预测或决策。\n\n### 数据收集\n\
    \n数据收集有多种形式。收集作为训练和测试模型基础的相关数据。数据是任何机器学习模型的关键因素。数据可以来自多种来源。以下是一些收集数据的方法：\n\n-\
    \ **CSV**：CSV 文件是一种逗号分隔值文件，允许以表格格式保存数据。\n- **网页数据提取（网络爬虫）**：此技术用于从网站和网页中提取信息。它涉及以编程方式从网站检索数据。在\
    \ Python 中，你可以使用 Beautiful Soup 库进行网络爬虫。\n- **应用程序编程接口（API）**：API 是一组规则和协议，允许不同的软件应用程序相互通信。在机器学习建模的数据收集背景下，API\
    \ 提供了一种结构化且受控的方式来从远程服务器或服务访问和检索数据。与网络爬虫相比，API 是一种更可靠、更高效的数据收集方法，特别是当数据由服务提供者以结构化格式提供时。\n\
    - **数据库**：数据库是数据的结构化集合，其组织方式允许高效地存储、检索和操作信息。数据库通常用于机器学习建模中的数据收集，因为它们提供了一种可靠且有组织的数据存储方法。\n\
    \n## 阶段 2 – 数据预处理和模型开发\n\n一旦我们定义了目标并收集了数据，我们就可以开始数据预处理阶段。这是清理和转换原始数据以使其适合建模的阶段。它包括探索性数据分析以理解数据模式，以及特征工程以增强或创建信息丰富的输入变量。模型开发涉及使用这些准备好的数据来训练和测试机器学习算法，确保其性能符合预期结果。这些阶段确保模型在其预测中既稳健又可靠。\n\
    \n### 数据预处理\n\n清理、格式化和转换数据，使其适合分析。处理缺失值、异常值和不一致性对于为模型训练准备数据至关重要。这一步对于机器学习模型至关重要，因为未能识别和缓解这些问题可能会对结果质量产生负面影响。\n\
    \n### EDA\n\n探索性数据分析是机器学习数据分析和模型开发过程中的关键一步。它涉及系统地检查和总结数据集中的主要特征、模式和关系，以获取见解并为后续建模决策提供信息。探索性数据分析帮助你理解数据、识别潜在问题，并就特征工程、数据预处理和模型选择做出明智的选择。在下一章中，我们将更详细地探讨这一步骤。\n\
    \n### 特征工程\n\n特征工程是指在使用机器学习构建预测模型时，选择和转换数据集中的变量/特征的过程。因此，在使用机器学习算法训练数据之前，有必要从收集的原始数据集中提取特征。否则，将很难从数据中获得正确的见解。\n\
    \n特征工程有两个目标：\n\n- 准备合适的输入数据集，使其符合机器学习算法的要求\n- 提高机器学习模型的性能\n\n### 训练和测试模型\n\n在机器学习中，“训练”和“测试”这两个术语指的是使用数据集构建和评估预测模型的两个不同阶段。这些阶段对于评估模型对新的、未见过的数据的泛化能力至关重要。数据集通常被划分为子集：一个用于训练模型，另一个用于测试其性能。这种划分允许你衡量模型在从未遇到过的数据上做出准确预测的能力。让我们仔细看看：\n\
    \n- **训练：** 模型使用“训练数据集”学习模式，调整其参数以做出准确预测。\n- **测试：** 在“测试数据集”上评估模型的性能，以衡量其对未见数据的泛化能力，确保它不仅仅是记住了训练数据（过拟合）。\n\
    - **验证（可选）：** 一个涉及“验证数据集”的中间步骤，有助于调整模型参数并选择最佳模型变体。\n\n典型的训练、验证和测试数据集划分比例为 80-10-10、70-15-15\
    \ 或 60-20-20。可以根据数据可用性和问题复杂性进行调整：\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_261_0.png)\n\
    \n图 15.3 – 用于训练和测试模型的数据集划分\n\n需要注意的是，测试数据集不应在模型开发过程中使用，包括超参数调整。其目的是在模型训练和最终确定后评估其泛化能力。\n\
    \n## 阶段 3 – 优化和部署\n\n优化涉及使用 scikit-learn 等库来优化机器学习模型，而部署则涉及使用 Flask 或 Django 等框架将这些优化后的模型集成到实际应用中。这些阶段确保模型实用并能提供真正的价值。\n\
