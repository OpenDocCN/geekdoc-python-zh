- md: "## Problem 1 – using Python to create tessellations\n\nIn this section, we\
    \ are going to provide an example of using the `pycairo` library for Python. We\
    \ are going to create a tessellation – more specifically, a sample of Penrose\
    \ tiling. Because this is a straightforward problem, we are going to define our\
    \ parameters using the computational thinking process, but not adhere to it precisely.\n\
    \nFirst, let’s talk about using `pycairo pip install` to add the necessary components.\
    \ The `pycairo` package is a graphics library that works with Python. For more\
    \ information, you can visit their web page: [https://cairographics.org/pycairo.](https://cairographics.org/pycairo.)\n\
    \nNow, let’s define some things. A **tessellation** is a tiling that uses shapes\
    \ that do not overlap to create patterns. Tessellations are often explored in\
    \ geometry courses. For our example, we will create a **Penrose tiling** pattern\
    \ using two triangles. We will also define our space and the number of sub-divisions\
    \ we want the shapes to undergo. The more sub-divisions, the smaller the pattern\
    \ in the space defined. Let’s take a look at the algorithm. The `ch18_tessellation.py`\
    \ file contains the full algorithm discussed here:\n\n1.  The first thing we’ll\
    \ do is import the necessary packages and libraries:\n\n```python\nimport math\n\
    import cmath\nimport cairo\n```\n\n2.  Next, we want to define our canvas and\
    \ the number of sub-divisions. Note that we chose `number_subdivisions = 4` for\
    \ our example. We’ve chosen 4 to strike a balance between complexity and simplicity\
    \ in the tessellation. *Figure 18.1* shows the example from this code, as well\
    \ as two additional examples of changing the sub-divisions:\n\n```python\n# Define\
    \ the configuration of the image.\ncanvas_size = (500, 500)\nnumber_subdivisions\
    \ = 4\n```\n\n3.  For the tessellation, we need to define the **golden ratio**.\n\
    \nThe golden ratio is also known as the golden mean or divine proportion (among\
    \ other things). The ratio is approximately 1.618. As an example, if we were talking\
    \ about a line segment divided into two parts, then the length of the larger segment\
    \ divided by the length of the smaller segment would be equal to the sum of the\
    \ segments divided by the larger segment: A / B = (A + B) / A. For the tessellation,\
    \ we’ll need to define that golden ratio.\n\nTake a look at the following code\
    \ snippet:\n\n```python\ngr = (1 + math.sqrt(5)) / 2  # Golden Ratio\n```\n\n\
    4.  Now, we can use functions to define what happens when our triangles sub-divide:\n\
    \n```python\ndef subdivide(triangles):\n    result = []\n    for color, A, B,\
    \ C in triangles:\n        if color == 0:\n            P = A + (B - A) / gr\n\
    \            result.extend([(0, C, P, B), (1, P, C, A)])\n        else:\n    \
    \        Q = B + (A - B) / gr\n            R = B + (C - B) / gr\n            result\
    \ += [(1, R, C, A), (1, Q, R, B), (0, R, Q, A)]\n    return result\n```\n\n5.\
    \  In the preceding code, we defined the function to expand the initial set of\
    \ triangles. The **subdivide** function is used in graphics and design to make\
    \ patterns look more detailed and attractive. It does this by breaking larger\
    \ triangles into smaller ones, increasing both the number of triangles and the\
    \ complexity of the design.\n\nThe function performs distinct calculations based\
    \ on the triangle's color attribute, creating new points (**P**, **Q**, **R**)\
    \ using the golden ratio (**gr**) and the vertices of the existing triangles (**A**,\
    \ **B**, **C**). Then, it constructs new triangles by combining these points in\
    \ various arrangements and adds them to the **result** list. This method effectively\
    \ divides each original triangle into smaller ones, enhancing the complexity and\
    \ detail of the overall triangular pattern.\n\n6.  Now, let's investigate initializing\
    \ a centered and scaled drawing canvas with Cairo graphics. The **setup_canvas**\
    \ function initializes a drawing canvas using Cairo graphics. It creates an image\
    \ surface as a drawing area and a context for drawing operations. The function\
    \ then shifts the coordinate system's origin to the canvas's center and scales\
    \ the drawing context based on a calculated **wheel_radius**. This setup allows\
    \ drawing operations to be centered and proportionally scaled on the canvas. Finally,\
    \ it returns the surface and context for further drawing:\n\n```python\ndef setup_canvas(size):\n\
    \    surface = cairo.ImageSurface(cairo.FORMAT_ARGB32, size[0], size[1])\n   \
    \ cr = cairo.Context(surface)\n    cr.translate(size[0] / 2.0, size[1] / 2.0)\n\
    \    wheel_radius = 1.2 * math.sqrt((size[0] / 2.0) ** 2 + (size[1] / 2.0) **\
    \ 2)\n    cr.scale(wheel_radius, wheel_radius)\n    return surface, cr\n```\n\n\
    7.  Now, let's explore the details of generating and visualizing geometric patterns\
    \ in Python. Let's dig into the functionality of two key functions, **create_initial_triangles**\
    \ and **draw_triangles**, which are instrumental in creating vibrant, circular\
    \ tessellations using complex numbers and the Cairo graphics library. Here is\
    \ a snippet of the code:\n\n```python\ndef create_initial_triangles():\n    triangles\
    \ = []\n    for i in range(10):\n        B = cmath.rect(1, (2 * i - 1) * math.pi\
    \ / 10)\n        C = cmath.rect(1, (2 * i + 1) * math.pi / 10)\n        if i %\
    \ 2 == 0:\n            B, C = C, B\n        triangles.append((0, 0j, B, C))\n\
    \    return triangles\n\ndef draw_triangles(cr, triangles, color_code, r, g, b):\n\
    \    for color, A, B, C in triangles:\n        if color == color_code:\n     \
    \       cr.move_to(A.real, A.imag)\n            cr.line_to(B.real, B.imag)\n \
    \           cr.line_to(C.real, C.imag)\n            cr.close_path()\n        \
    \    cr.set_source_rgb(r, g, b)\n            cr.fill()\n```\n\nThe `create_initial_triangles`\
    \ function forms a list of triangles in a circular pattern using complex numbers,\
    \ iterating ten times to calculate vertices and employing `cmath.rect` for polar-to-complex\
    \ conversion. It alternates the triangle orientation for symmetry and stores them\
    \ as tuples. On the contrary, `draw_triangles` uses a Cairo context to render\
    \ these triangles, selectively drawing and filling those matching a specific color\
    \ code with designated RGB colors, thus creating a colorful pattern.\n\n8.  In\
    \ the following code snippet, we'll explore how to elegantly draw and style borders\
    \ around geometric shapes using Cairo graphics in Python. The `draw_borders` function\
    \ demonstrates a meticulous approach to adding refined, rounded borders to a series\
    \ of triangles, enhancing their visual appeal on the canvas:\n\n```python\ndef\
    \ draw_borders(cr, triangles):\n    color, A, B, C = triangles[0]\n    cr.set_line_width(abs(B\
    \ - A) / 10.0)\n    cr.set_line_join(cairo.LINE_JOIN_ROUND)\n    for color, A,\
    \ B, C in triangles:\n        cr.move_to(C.real, C.imag)\n        cr.line_to(A.real,\
    \ A.imag)\n        cr.line_to(B.real, B.imag)\n    cr.set_source_rgb(0.3, 0.5,\
    \ 0.3)\n    cr.stroke()\n```\n\nAs the function concludes, it applies a carefully\
    \ chosen shade of green for the borders, enhancing the visual distinction of each\
    \ triangle. By executing the `stroke` method, these meticulously drawn borders\
    \ are rendered onto the canvas, culminating in a striking and polished geometric\
    \ artwork that showcases the power of precise graphical programming in Python.\n\
    \n9.  This code snippet showcases the creation of a dynamic geometric pattern\
    \ in Python, leveraging the power of graphical rendering. It combines the generation,\
    \ sub-division, and coloring of triangles, followed by adding distinct borders,\
    \ to compose a visually compelling image using Cairo graphics:\n\n```python\n\
    def save_image(surface, file_path):\n    surface.write_to_png(file_path)\n\n#\
    \ Main Execution\ntriangles = create_initial_triangles()\nfor _ in range(number_subdivisions):\n\
    \    triangles = subdivide(triangles)\nsurface, cr = setup_canvas(canvas_size)\n\
    draw_triangles(cr, triangles, 0, .2, .8, .8)  # teal triangles\ndraw_triangles(cr,\
    \ triangles, 1, 0.7, 0, 0.7)  # purple triangles\ndraw_borders(cr, triangles)\
    \  # The Triangle borders\n```\n\nThe final steps of this code bring the entire\
    \ geometric design together. Upon calling `draw_triangles` for different color\
    \ codes, it meticulously fills in the triangles with vibrant colors. After this,\
    \ `draw_borders` adds sleek, defined edges to each shape. The result is a harmoniously"
  mdcn: "## 问题 1 – 使用 Python 创建镶嵌图案\n\n在本节中，我们将提供一个使用 Python 的 `pycairo` 库的示例。我们将创建一个镶嵌图案——更具体地说，是一个彭罗斯镶嵌的样本。由于这是一个直接的问题，我们将使用计算思维过程来定义参数，但不会严格遵循它。\n\
    \n首先，让我们谈谈使用 `pycairo pip install` 来添加必要的组件。`pycairo` 包是一个与 Python 配合使用的图形库。更多信息，您可以访问他们的网页：[https://cairographics.org/pycairo.](https://cairographics.org/pycairo.)\n\
    \n现在，让我们定义一些概念。**镶嵌**是一种使用不重叠的形状来创建图案的铺砌。镶嵌图案在几何课程中经常被探讨。在我们的示例中，我们将使用两个三角形创建一个**彭罗斯镶嵌**图案。我们还将定义我们的空间以及我们希望形状经历的细分次数。细分次数越多，定义空间中的图案就越小。让我们看一下算法。`ch18_tessellation.py`\
    \ 文件包含了这里讨论的完整算法：\n\n1.  我们要做的第一件事是导入必要的包和库：\n\n```python\nimport math\nimport\
    \ cmath\nimport cairo\n```\n\n2.  接下来，我们想定义我们的画布和细分次数。请注意，我们在示例中选择了 `number_subdivisions\
    \ = 4`。我们选择 4 是为了在镶嵌图案的复杂性和简单性之间取得平衡。*图 18.1* 展示了此代码的示例，以及两个改变细分次数的额外示例：\n\n```python\n\
    # Define the configuration of the image.\ncanvas_size = (500, 500)\nnumber_subdivisions\
    \ = 4\n```\n\n3.  对于镶嵌图案，我们需要定义**黄金比例**。\n\n黄金比例也被称为黄金均值或神圣比例（以及其他名称）。该比例约为 1.618。例如，如果我们谈论一条被分成两部分的线段，那么较长部分的长度除以较短部分的长度，将等于线段总和除以较长部分的长度：A\
    \ / B = (A + B) / A。对于镶嵌图案，我们需要定义这个黄金比例。\n\n看一下以下代码片段：\n\n```python\ngr = (1 +\
    \ math.sqrt(5)) / 2  # Golden Ratio\n```\n\n4.  现在，我们可以使用函数来定义当我们的三角形细分时会发生什么：\n\
    \n```python\ndef subdivide(triangles):\n    result = []\n    for color, A, B,\
    \ C in triangles:\n        if color == 0:\n            P = A + (B - A) / gr\n\
    \            result.extend([(0, C, P, B), (1, P, C, A)])\n        else:\n    \
    \        Q = B + (A - B) / gr\n            R = B + (C - B) / gr\n            result\
    \ += [(1, R, C, A), (1, Q, R, B), (0, R, Q, A)]\n    return result\n```\n\n5.\
    \  在前面的代码中，我们定义了扩展初始三角形集合的函数。**细分**函数在图形和设计中用于使图案看起来更详细和更具吸引力。它通过将较大的三角形分解成较小的三角形来实现这一点，从而增加了三角形的数量和设计的复杂性。\n\
    \n该函数根据三角形的颜色属性执行不同的计算，使用黄金比例（**gr**）和现有三角形的顶点（**A**, **B**, **C**）创建新的点（**P**,\
