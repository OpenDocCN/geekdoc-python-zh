    你可以在此处找到 **Kaggle** 上的 **Pima Indians Diabetes Database**：[https://www.kaggle.com/uciml/pima-indians-diabetes-database](https://www.kaggle.com/uciml/pima-indians-diabetes-database)。


    ## 定义ML


    ML是 **人工智能（AI）** 的一个子领域，专注于构建可以从数据中学习的系统。ML模型不是被显式编程来执行任务，而是使用数据来学习模式并做出决策。其核心在于创建算法，这些算法通过随着时间的推移接触更多数据来提高其在任务上的性能。


    DL是ML的一个子集，它使用具有多层的神经网络来建模大型数据集中的复杂模式和表示。在本节中，我们将探讨ML生命周期，详细阐述它以及构建ML模型的过程：


