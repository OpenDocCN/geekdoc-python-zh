    - $18 \div 2 = 9$ with no remainder. Our number is now 001111.

    - $9 \div 2 = 4$ with a remainder of 1. Our number is now 1001111.

    - $4 \div 2 = 2$ with no remainder. Our number is now 01001111.

    - $2 \div 2 = 1$ with no remainder. Our number is now 001001111.

    - $1 \div 2 = 0$ with a remainder of 1. Our number is now 1001001111.


    The number 591 in base-10 is equivalent to the number 1001001111 in the binary
    system.


    Another way to convert this number is to use a table for the divisions:'
  - '[PAGE 34]


    | Starting Base-10 | Divided by 2 | Remainder |

    | :--- | :--- | :--- |

    | 591 | 295 | 1 |

    | 295 | 147 | 1 |

    | 147 | 73 | 1 |

    | 73 | 36 | 1 |

    | 36 | 18 | 0 |

    | 18 | 9 | 0 |

    | 9 | 4 | 1 |

    | 4 | 2 | 0 |

    | 2 | 1 | 0 |

    | 1 | 0 | 1 |


    Table 1.1 – Converting base-10 number 591 into binary


    Using this table, take the numbers from the right-most column and write them starting
    with the last row from bottom to top. The result is 1001001111.


    Learning how to convert numbers is only a small part of converting data into binary,
    but it is an important one. All information, including letters and symbols, must
    be converted into binary to be read by a computer. **American Standard Code for
    Information Exchange (ASCII)** is a protocol that has been adopted universally
    to convert information. That said, some of the protocol is obsolete, so other
    protocols use ASCII as a base to expand their capabilities. UTF-16 is a widely
    used 16-bit character set that is based on Unicode, an extension of ASCII.


    As discussed, in this section, we learned that information must be encoded or
    converted for a computer to read it. Multiple systems and protocols exist, but
    for now, we will move on to computer science theory. However, revisiting binary,
    ASCII, and Unicode as you work through problems can be helpful.'
  - '[PAGE 35]


    # Understanding theoretical computer science


    While you don’t need to be a master mathematician to love computer science, these
    two subjects are intrinsically tied. Computer science, particularly programming,
    uses algebraic algorithms. We will explore algorithms in depth later on, but again,
    the important point here is that they are mathematical. The logical processes
    stem from the philosophical nature and history of mathematics. Now, if mathematical
    topics are not to your liking, don’t despair. The logical processes needed to
    become a programmer and developer can be used without you having to learn higher
    mathematics. Knowing higher mathematics just simplifies some concepts for those
    who have that background.


    **Theoretical computer science** includes multiple theories and topics. Some of
    these topics and theories are listed as follows, but keep in mind that other topics
    are also included in theoretical computer science that may not be discussed in
    this book. A short description and explanation of each of the theories or terms
    listed here have been included for you to review:


    +   - Algorithms

    - Coding theory

    - Computational biology

    - Data structures

    - Cryptography

    - Information theory

    - Machine learning

    - Automata theory

    - Formal language theory

    - Symbolic computation

    - Computational geometry

    - Computational number theory


    We will look at the aforementioned theories in the following sections.


    # Algorithms


    An algorithm is a set of instructions that a computer can read. Algorithms provide
    rules or instructions in a way in which a computer can logically process the information
    provided as input and create an output. In most books, you are introduced to the
    algorithm and programming by creating a *Hello World!* program. I won’t make this
    book the exception.'
  - '[PAGE 36]


    In Python, the code would require that we print the message to the screen. Because
    the Python language is easy to learn and read, many, if not most, of the code
    strives to be logical. So, to print a message to the screen, we can use the `print()`
    command. Here is the code we''d use:


    ```

    print("Hello world!")

    ```


    Similarly, we could use the following code:


    ```

    print(''Hello world!'')

    ```


    Python reads both " and '' as the same thing when it comes to strings.


    The result of the preceding code looks like this when we run the algorithm:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_36_0.png)


    Figure 1.3 – The Hello World! Python program


    # NOTE


    Don''t worry – we''ll discuss the Python programming language later in [Chapter
    2](https://example.com), Elements of Computational Thinking, and in more depth
    in Part 2, Applying Python and Computational Thinking, starting with [Chapter
    9](https://example.com), Introduction to Python, as well.


    While lengthy, discussing algorithms is critically important to this book and
    your progression with Python. Consequently, we will be covering this in-depth
    exploration of algorithms in [Chapter 2](https://example.com), Elements of Computational
    Thinking, and [Chapter 3](https://example.com), Understanding Algorithms and Algorithmic
    Thinking, since algorithms are a key element of the computational thinking process.


    # IMPORTANT NOTE


    [Chapter 2](https://example.com), Elements of Computational Thinking, will focus
    on the computational thinking process itself, which has four elements: **decomposition**,
    **pattern recognition**, **pattern generalization and abstraction**, and **algorithm
    design**. As you can see, the last element is algorithm design, so we will need
    to get more acquainted with what an algorithm is and how we can create one so
    that you can then implement and design algorithms when solving problems with Python.
    [Chapter 3](https://example.com), Understanding Algorithms and Algorithmic Thinking,
    will focus on a deeper understanding of algorithms and introduce you to the design
    process.


    We''ll look at coding theory next.


    # Coding theory


    Coding theory is also sometimes known as **algebraic coding theory**. When working
    with code and coding theory, three major areas are studied: **data compression**,
    **error correction**, and **cryptography**. We will cover these in more detail
    in the following sections.'
- md: '## Data compression


    The importance of data compression cannot be understated. Data compression allows
    us to store the maximum amount of information possible while taking up the least
    amount of space. In other words, data compression is the process of using the
    fewest number of bits to store the data.


    **IMPORTANT NOTE**


    Remember that a **bit** is the smallest unit of data you can find in a computer
    – that is, a 0 or a 1. A group of 8 bits is called a **byte**. We use bytes as
    a unit of measurement for the size of the memory of a computer or storage device,
    such as a memory card or external drive, and more.


    As our technology and storage capacities have grown and improved, our ability
    to store additional data has as well. Historically, computers had **kilobytes**
    or **megabytes** of storage when they were first introduced into households, but
    at the time of writing, they now have **gigabytes** and **terabytes** worth of
    storage. The conversions for each of these storage units are shown here:


    8 bits = 1 byte


    1024 bytes = 1 kilobyte


    1000 kilobytes = 1 megabyte


    1000 megabytes = 1 gigabyte


    1000 gigabytes = 1 terabyte


    Figure 1.4 – Byte conversions


    If you look for information online, you may find that some sources state that
    there are 1,024 gigabytes in a terabyte. That is a binary conversion. In the decimal
    system or base-10 system, there are 1,000 gigabytes per terabyte. To understand
    conversion better, it is important to understand the prefixes that apply to the
    base-10 system and the prefixes that apply to the binary system:


    | Base-10 Prefixes | Value | Binary Prefixes | Value |

    | :--- | :--- | :--- | :--- |

    | kilo | 1,000 | kibi | 1,024 |

    | mega | 1,000² | mebi | 1,024² |

    | giga | 1,000³ | gibi | 1,024³ |

    | tera | 1,000⁴ | tebi | 1,024⁴ |

    | peta | 1,000⁵ | pebi | 1,024⁵ |

    | exa | 1,000⁶ | exbi | 1,024⁶ |

    | zetta | 1,000⁷ | zebi | 1,024⁷ |

    | yotta | 1,000⁸ | yobi | 1,024⁸ |


    Table 1.2 – Base-10 and binary prefixes with values


    As mentioned, the goal is always to use the least amount of bits for the largest
    amount of data possible. Therefore, we compress, or reduce, the size of data to
    use less storage.


    So, *why is data compression so important?* Let’s go back in time to 2000. Here,
    a laptop computer on sale for about $1,000 had about 64 MB of **Random Access
    Memory (RAM)** and 6 GB of hard drive memory. A photograph on our digital phones
    takes anywhere from 2 to 5 megabytes of memory when we use its actual size. That
    means our computers couldn’t store many (and in some cases, any) of the modern
    pictures we take now. Data compression advances allow us to store more memory,
    create better games and applications, and much more as we can have better graphics
    and additional information or code without having to worry as much about the amount
    of memory they use.


    ## Error correction


    In computer science, errors are a fact of life. We make mistakes in our processes,
    our algorithms, our designs, and everything in between. Error correction, also
    known as **error handling**, is the process a computer goes through to automatically
    correct an error or multiple errors, which happens when digital data is transmitted
    incorrectly.


    An **Error Correction Code (ECC)** can help us analyze data transmissions. ECC
    locates and corrects transmission errors. In computers, ECC is built into a storage
    space that can identify common internal data corruption problems. For example,
    ECC can help read broken codes, such as a missing piece of a **Quick Response
    (QR)** code. An example of ECC is **hamming codes**. A hamming code is a binary
    linear code that can detect up to two-bit errors. This means that up to two bits
    of data can be lost or corrupted during transmission, and the receiver will know
    that an error occurred, or be able to reconstruct the original data with no errors.


    **IMPORTANT NOTE**


    Hamming codes are named after Richard Wesley Hamming, who discovered them in 1950.
    Hamming was a mathematician who worked with coding related to telecommunications
    and computer engineering.


    Another type of ECC is a **parity bit**. A parity bit checks the status of data
    and determines whether any data has been lost or overwritten. Error correction
    is important for all software that’s developed because any updates, changes, or
    upgrades can lead to the entire program or parts of the program or software being
    corrupted.


    ## Cryptography


    Cryptography is used in computer science to hide code. In cryptography, information
    or data is written so that it can’t be read by anyone other than the intended
    recipient of the message. In simple terms, cryptography takes readable text or
    information and converts it into unreadable text or information.


    When we think about cryptography now, we tend to think of **encryption** of data.
    Coders encrypt data by converting it into code that cannot be seen by unauthorized
    users. However, cryptography has been around for centuries – that is, it pre-dates
    computers. Historically, the first uses of cryptography were found around 1900
    BC in a tomb in Egypt. Atypical or unusual hieroglyphs were mixed with common
    hieroglyphs at various parts of the tomb.


    The reason for these unusual hieroglyphs is unknown, but the messages were hidden
    from others with their use. Later on, cryptography would be used to communicate
    in secret by governments and spies, in times of war and peace. Nowadays, cryptography
    is used to encrypt data since our information exists in digital format, so protecting
    sensitive information, such as banking, demographic, or personal data, is important.


    We will be exploring the various topics surrounding coding theory through some
    of the problems presented throughout this book.


    ## Computational biology


    Computational biology is the area of theoretical computer science that focuses
    on the study of biological data and **bioinformatics**. Bioinformatics is a science
    that allows us to collect biological data and analyze it. An example of bioinformatics
    is collecting and analyzing genetic codes. In the study of biology, large quantities
    of data is explored and recorded.


    Studies can be wide-ranging in topics and interdisciplinary. For example, a genetic
    study may include data from an entire state, an entire race, or an entire country.
    Some areas within computational biology include molecules, cells, tissues, and
    organisms. Computational biology allows us to study the composition of these things,
    from the most basic level to the larger organism. Bioinformatics and computational
    biology provide a structure for experimental studies in these areas, create predictions
    and comparisons, and provide us with a way to develop and test theories.


    Computational thinking and coding allow us to process that data and analyze it.
    In this book, the problems presented will allow us to explore ways in which we
    can use Python in conjunction with computational thinking to find solutions to
    complex problems, including those in computational biology.


    ## Data structures


    In coding theory, we use data structures to collect and organize data. The goal
    is to prepare the data so that we can perform operations efficiently and effectively.
    Data structures can be primitive or abstract. Software has built-in data structures,
    which are primitive, or we can define them using our programming language. A primitive
    data structure is predefined. Some primitive data structures include integers,
    characters (**chars**), and Boolean structures. Examples of abstract or user-defined
    data structures include arrays and two-dimensional arrays, stacks, trees and binary
    trees, linked lists, queues, and more.


    User-defined data structures have different characteristics. For example, they
    can be linear or non-linear, homogeneous or non-homogeneous, and static or dynamic.
    If we need to arrange data in a linear sequence, we can use an **array**, which
    is a linear data structure. If our data is not linear, we can use non-linear data
    structures, such as **graphs**. When we have data that is of a similar type, we
    use homogeneous data structures.


    Keep in mind that an array, for example, is both a linear and homogeneous data
    structure. Non-homogeneous or heterogeneous data structures have dissimilar data.
    An example of a non-homogeneous data structure a user can create is a class. The
    difference between a static and a dynamic data structure is that the size of a
    static structure is fixed, while a dynamic structure is flexible in size. To build
    a better understanding of data structures, we will explore them through problem-solving
    by using various computational thinking elements. We will revisit data structures
    very briefly at the end of this chapter since they relate to data types, which
    we will discuss shortly.


    ## Information theory


    Information theory is defined as a mathematical study that allows us to code information
    so that it can be transmitted through computer circuits or telecommunications
    channels. The information is transmitted through sequences that may contain symbols,
    impulses, and even radio signals.'
  mdcn: '## 数据压缩


    数据压缩的重要性不容小觑。数据压缩使我们能够在占用最少空间的同时，存储尽可能多的信息。换句话说，数据压缩是使用最少比特数来存储数据的过程。


    **重要提示**


    请记住，**比特**是计算机中能找到的最小数据单位——即一个0或一个1。8个比特组成一个**字节**。我们使用字节作为计算机或存储设备（如内存卡或外置硬盘等）内存大小的计量单位。


    随着技术和存储容量的增长与提升，我们存储额外数据的能力也随之增强。历史上，计算机刚进入家庭时只有**千字节**或**兆字节**的存储空间，但在撰写本文时，它们现在拥有**吉字节**和**太字节**的存储容量。这些存储单位的换算如下所示：


    8 bits = 1 byte


    1024 bytes = 1 kilobyte


    1000 kilobytes = 1 megabyte


    1000 megabytes = 1 gigabyte


    1000 gigabytes = 1 terabyte


    图 1.4 – 字节换算


    如果你在网上查找信息，可能会发现有些资料称1太字节等于1,024吉字节。那是二进制换算。在十进制系统或基数为10的系统中，1太字节等于1,000吉字节。为了更好地理解换算，理解适用于十进制系统的前缀和适用于二进制系统的前缀非常重要：


    | 十进制前缀 | 值 | 二进制前缀 | 值 |

    | :--- | :--- | :--- | :--- |

    | kilo | 1,000 | kibi | 1,024 |

    | mega | 1,000² | mebi | 1,024² |

    | giga | 1,000³ | gibi | 1,024³ |

    | tera | 1,000⁴ | tebi | 1,024⁴ |

    | peta | 1,000⁵ | pebi | 1,024⁵ |

    | exa | 1,000⁶ | exbi | 1,024⁶ |

    | zetta | 1,000⁷ | zebi | 1,024⁷ |

    | yotta | 1,000⁸ | yobi | 1,024⁸ |


    表 1.2 – 十进制和二进制前缀及其值


    如前所述，目标始终是使用尽可能少的比特来存储尽可能多的数据。因此，我们压缩或减小数据大小以使用更少的存储空间。


    那么，*为什么数据压缩如此重要？* 让我们回到2000年。当时，一台售价约1,000美元的笔记本电脑大约有64 MB的**随机存取存储器（RAM）**和6
    GB的硬盘内存。我们手机上的一张照片，使用其实际尺寸时，会占用2到5兆字节的内存。这意味着我们的计算机无法存储很多（在某些情况下，甚至无法存储任何）我们现在拍摄的现代照片。数据压缩的进步使我们能够存储更多内存，创建更好的游戏和应用程序等等，因为我们可以拥有更好的图形和额外的信息或代码，而无需过多担心它们占用的内存量。


    ## 纠错


    在计算机科学中，错误是不可避免的。我们在流程、算法、设计以及所有环节中都可能犯错。纠错，也称为**错误处理**，是计算机在数字数据传输不正确时，自动纠正一个或多个错误的过程。


    **纠错码（ECC）**可以帮助我们分析数据传输。ECC可以定位并纠正传输错误。在计算机中，ECC内置于存储空间中，可以识别常见的内部数据损坏问题。例如，ECC可以帮助读取损坏的代码，例如缺失一部分的**快速响应（QR）**码。ECC的一个例子是**汉明码**。汉明码是一种二进制线性码，可以检测多达两位的错误。这意味着在传输过程中最多可能丢失或损坏两位数据，接收方会知道发生了错误，或者能够重构出无错误的原始数据。


    **重要提示**


    汉明码以理查德·韦斯利·汉明的名字命名，他在1950年发现了它。汉明是一位数学家，从事与电信和计算机工程相关的编码工作。


    另一种ECC是**奇偶校验位**。奇偶校验位检查数据状态，并确定是否有任何数据丢失或被覆盖。纠错对于所有开发的软件都很重要，因为任何更新、更改或升级都可能导致整个程序或程序/软件的部分内容损坏。


    ## 密码学


    密码学在计算机科学中用于隐藏代码。在密码学中，信息或数据被编写成只有消息的预期接收者才能阅读的形式。简单来说，密码学将可读的文本或信息转换为不可读的文本或信息。


    当我们现在想到密码学时，我们往往会想到数据的**加密**。编码者通过将数据转换为未授权用户无法看到的代码来加密数据。然而，密码学已经存在了几个世纪——也就是说，它早于计算机。历史上，密码学的首次使用可追溯到公元前1900年左右埃及的一座坟墓。在坟墓的不同部分，不典型或不寻常的象形文字与常见的象形文字混合在一起。


    这些不寻常的象形文字的原因尚不清楚，但它们的使用将信息隐藏了起来，不为他人所知。后来，密码学被政府和间谍用于在战争与和平时期进行秘密通信。如今，密码学被用于加密数据，因为我们的信息以数字格式存在，因此保护敏感信息（如银行、人口统计或个人数据）非常重要。


    我们将在本书中通过一些问题来探索围绕编码理论的各种主题。


    ## 计算生物学


    计算生物学是理论计算机科学的一个领域，专注于研究生物数据和**生物信息学**。生物信息学是一门允许我们收集和分析生物数据的科学。生物信息学的一个例子是收集和分析遗传密码。在生物学研究中，会探索和记录大量数据。


    研究的主题可以非常广泛且跨学科。例如，一项遗传研究可能包括来自整个州、整个种族或整个国家的数据。计算生物学内的一些领域包括分子、细胞、组织和生物体。计算生物学使我们能够研究这些事物的组成，从最基本的层面到更大的生物体。生物信息学和计算生物学为这些领域的实验研究提供了框架，创建预测和比较，并为我们提供开发和测试理论的方法。


    计算思维和编码使我们能够处理和分析这些数据。在本书中，提出的问题将使我们探索如何将Python与计算思维结合使用，以找到复杂问题的解决方案，包括计算生物学中的问题。


    ## 数据结构


    在编码理论中，我们使用数据结构来收集和组织数据。目标是准备好数据，以便我们能够高效有效地执行操作。数据结构可以是原始的或抽象的。软件有内置的数据结构，这些是原始的，或者我们可以使用编程语言来定义它们。原始数据结构是预定义的。一些原始数据结构包括整数、字符（**字符**）和布尔结构。抽象或用户定义的数据结构的例子包括数组和二维数组、栈、树和二叉树、链表、队列等。


    用户定义的数据结构具有不同的特性。例如，它们可以是线性的或非线性的，同质的或非同质的，静态的或动态的。如果我们需要将数据排列成线性序列，我们可以使用**数组**，它是一种线性数据结构。如果我们的数据不是线性的，我们可以使用非线性数据结构，例如**图**。当我们拥有相似类型的数据时，我们使用同质数据结构。


    请记住，例如，数组既是线性的也是同质的数据结构。非同质或异构数据结构具有不相似的数据。用户可以创建的非同质数据结构的一个例子是类。静态和动态数据结构之间的区别在于，静态结构的大小是固定的，而动态结构的大小是灵活的。为了更好地理解数据结构，我们将通过使用各种计算思维元素解决问题来探索它们。我们将在本章末尾非常简要地重新讨论数据结构，因为它们与数据类型有关，我们稍后将讨论数据类型。


    ## 信息理论


    信息理论被定义为一种数学研究，它允许我们对信息进行编码，以便通过计算机电路或电信信道进行传输。信息通过可能包含符号、脉冲甚至无线电信号的序列进行传输。'
