    first roll shown:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_200_0.png)


    As you can see, the score depends on the number rolled. Now, let’s say you had
    rolled a **1**. Let’s take a look at what your second roll could look like:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_200_1.png)'
