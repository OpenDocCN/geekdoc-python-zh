- md: "## Comparing solutions\n\nWhen it comes to problems, I’ve mentioned that we\
    \ have multiple ways of doing the same things in Python. Depending on what we\
    \ are trying to accomplish, some commands may be better than others in our algorithms.\
    \ Let’s start by taking a look at a couple of solutions for one problem.\n\n##\
    \ Problem 1 – printing even numbers\n\nYou’ve been asked to write an algorithm\
    \ that prints even numbers based on a range that the user provides. That is, if\
    \ the user enters the range 2 through 20, then the program would print 2, 4, 6,\
    \ 8, 10, 12, 14, 16, 18, and 20. Let’s assume we want to include the endpoints\
    \ if they are even.\n\nLet’s take a look at the first of two possible solutions.\
    \ Remember, one solution may not be better than the other. A lot will depend on\
    \ what the goal for your full algorithm is. *Is a list more appropriate? A dictionary?\
    \ A function?* Those questions are important when we design solutions.\n\n###\
    \ Algorithm solution 1 – printing even numbers\n\nRecall that we will be taking\
    \ user input to create a list of even numbers given a range. Take a look at the\
    \ following code, which asks the user for the input and then prints out the numbers:\n\
    \n```\nch8_evenalgorithm1.py\n\nprint(\"This program will print the even numbers\
    \ for any range of numbers provided.\")\nendpoint1 = int(input(\"What is the lower\
    \ endpoint of your range? \"))\nendpoint2 = int(input(\"What is the upper endpoint\
    \ of your range? \"))\nendpoint2 = endpoint2 + 1\nfor i in range(endpoint1, endpoint2):\n\
    \    if i % 2 == 0:\n        print(i)\n```\n\nNotice that `endpoint2` was converted\
    \ into `endpoint2 + 1`. This is because if we do not add 1, then the upper endpoint\
    \ will not be included. The program also begins with a printed message for the\
    \ user that states what the program does.\n\nWhen I run this program with endpoints\
    \ 2 and 6, I get the following output:\n\n```\nThis program will print the even\
    \ numbers for any range of numbers provided.\nWhat is the lower endpoint of your\
    \ range? 2\nWhat is the upper endpoint of your range? 6\n2\n4\n6\n```\n\nAs you\
    \ can see, both endpoints are even and included. If we run the program with endpoints\
    \ 3 and 9, we’ll get the following output:\n\n```\nThis program will print the\
    \ even numbers for any range of numbers provided.\nWhat is the lower endpoint\
    \ of your range? 3\nWhat is the upper endpoint of your range? 9\n4\n6\n8\n```\n\
    \nEven though the endpoint is technically 10 now, the upper limit of the range\
    \ is not included, so the largest even number below 10 is 8. Now, I can run this\
    \ program for a much larger range, but the larger the range, the harder it is\
    \ to scroll to get all the numbers. So, let’s take a look at a different way we\
    \ can get our even numbers.\n\n### Algorithm solution 2 – printing even numbers\n\
    \nAs we saw from the previous example, each even number is being printed to a\
    \ different line. Let’s see whether we can change that and instead create a list.\
    \ Lists in Python can be empty. We use any name for them, then equal them to items\
    \ inside braces or just the empty braces. For example, I can create an empty list\
    \ called `evenNumbers = []`. Let’s see what that looks like in the following algorithm:\n\
    \n```\nch8_evenalgorithm2.py\n\nprint(\"This program will print the even numbers\
    \ for any range of numbers provided.\")\nendpoint1 = int(input(\"What is the lower\
    \ endpoint of your range? \"))\nendpoint2 = int(input(\"What is the upper endpoint\
    \ of your range? \"))\nendpoint2 = endpoint2 + 1\nevenNumbers = []\nfor i in range(endpoint1,\
    \ endpoint2):\n    if i % 2 == 0:\n        evenNumbers.append(i)\nprint(evenNumbers)\n\
    ```\n\nAs you can see, the first few lines of code are the same. The only difference\
    \ in this particular code is how the numbers are printed. The list is created\
    \ before the `for` loop. Then, each of the numbers is appended to the list using\
    \ `evenNumbers.append(i)`. Finally, we print our list to get the following output:\n\
    \n```\nThis program will print the even numbers for any range of numbers provided.\n\
    What is the lower endpoint of your range? 2\nWhat is the upper endpoint of your\
    \ range? 10\n[2, 4, 6, 8, 10]\n```\n\nAs you can see, the even numbers are all\
    \ included in one list, which is easier to read than if they were printed one\
    \ at a time, one line at a time. *Imagine if you had to print even numbers in\
    \ the range 300 to*\n\n---\n\n- n: Steps to the next line within the function\n\
    - s: Steps to the next line in this function or a called **function**\n\nLet's\
    \ take a look at some code and run each of the commands outlined here:\n\n```\n\
    ch8_debugger.py\n\nnumber = 5\nnumber2 = 'five'\nprint(number)\nbreakpoint()\n\
    print(number2)\n```\n\nLooking at this code, you can see the `breakpoint()` command\
    \ after `print(number)`. The code will run normally until it reaches the `breakpoint()`\
    \ command. At this stage, the execution stops. If we hit the `c` key, then it\
    \ will just continue to run the program. Take a look at what that output looks\
    \ like. Notice that there are three dots between two slashes, `/.../`. This is\
    \ done because the paths may differ from your computer to mine. Yours will include\
    \ the full path where the program is located:\n\n```\n5\n> /Users/.../Python/ch8_debugger.py(8)<module>()\n\
    -> print(number2)\n(Pdb) c\nfive\n```\n\nAs you can see, it went on to print the\
    \ string, `five`, as it just continues the program. Now, let's look at the output\
    \ when we run the `q` command, which quits the program:\n\n```\n5\n> /Users/smargarita99/Documents/Python/ch8_debugger.py(8)<module>()\n\
    -> print(number2)\n(Pdb) q\nTraceback (most recent call last):\n  File \"/Users/.../Python/ch8_debugger.py\"\
    , line 8, in <module>\n    print(number2)\n  File \"/Users/.../Python/ch8_debugger.py\"\
    , line 8, in <module>\n    print(number2)\nbdb.BdbQuit\n```\n\nAs you can see,\
    \ once we use the `q` command, we get a **traceback error** because the program\
    \ quits. It printed the line above the `breakpoint()` code, but not the second\
    \ `print(number2)` command. Now, let's see what happens when we type `n`, which\
    \ should take us to the next line:\n\n```\n5\n> /Users/.../Python/ch8_debugger.py(8)<module>()\n\
    -> print(number2)\n(Pdb) n\nfive\n--Return--\n> /Users/.../Python/ch8_debugger.py(8)<module>()->None\n\
    -> print(number2)\n(Pdb)\n```\n\nAs you can see, when we typed n, the program\
    \ continued to run and printed the second command line. When it does so, you will\
    \ see the -> None output and the code that ran: `print(number2)`. Finally, let’s\
    \ look at slightly altered code to see what happens when we use s while running\
    \ the debugger:\n\n```\nch8_debugger2.py\n\nnumber = 5\nnumber2 = 'five'\nprint(number)\n\
    breakpoint()\nprint(str(number) + number2)\n```\n\nWhen we run this program and\
    \ the debugger, we get the following output if we use s:\n\n```\n5\n> /Users/.../Python/ch8_debugger2.py(8)<module>()\n\
    -> print(number + \" \" + number2)\n(Pdb) s\n--Call--\n> c:\\users\\...\\python\\\
    python311\\lib\\idlelib\\run.py(462)write()\n-> def write(self, s): (Pdb)\n```\n\
    \nIn previous versions of Python, the program would have encountered a `TypeError`\
    \ error. This has been “fixed” in a way, providing us with a way to move forward\
    \ using the s command. Let’s look at what happens when I try to continue the code\
    \ with c:\n\n```\n5\n> /Users/.../Python/ch8_debugger2.py(8)<module>()\n-> print(number\
    \ + \" \" + number2)\n(Pdb) c\nTraceback (most recent call last):\n  File \"C:/Users/.../Python/Python311/ch8_debugger2.py\"\
    , line 8, in <module>\n    print(number + \" \" + number2)\nTypeError: unsupported\
    \ operand type(s) for +: 'int' and 'str'\n```\n\nAs you can see, the program provided\
    \ an error message because one was an `int` type and the other a `str` type.\n\
    \nI am going to try something else – I am going to use a `print` statement to\
    \ get the output I wanted:\n\n```\nch8_debugger3.py\n\nnumber = 5\nnumber2 = 'five'\n\
    print(number)\nbreakpoint()\nprint(str(number) + \" \" + number2)\n```\n\nNow\
    \ that I’ve fixed the code so that the items in the print line are all strings,\
    \ the output looks as follows when I use c to continue:\n\n```\n5\n> /Users/.../Python/ch8_debugger3.py(8)<module>()\n\
    -> print(str(number) + \" \" + number2)\n(Pdb) c\n5 five\n```\n\nAs you can see,\
    \ the program has printed the correct information, combining the number as a string,\
    \ with the **five** string. The double quotes add a space between them, which\
    \ we have seen before, but will discuss this again when we look at Python basics\
    \ in [Chapter 9, Introduction to Python](Chapter 9, Introduction to Python).\n\
    \nNow, let’s take a look at some solutions to the same problem so that we can\
    \ analyze them."
  mdcn: "## 比较解决方案\n\n当遇到问题时，我曾提到在Python中，我们有多种方法来完成相同的事情。根据我们想要实现的目标，某些命令在我们的算法中可能比其他命令更有效。让我们首先来看一个针对同一问题的几种解决方案。\n\
    \n## 问题 1 – 打印偶数\n\n你被要求编写一个算法，根据用户提供的范围打印偶数。也就是说，如果用户输入范围 2 到 20，那么程序将打印 2, 4,\
