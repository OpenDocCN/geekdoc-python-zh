- md: 'Here, a pipeline is created with two steps: `CountVectorizer` and `MultinomialNB`.
    The former converts text data into a matrix of token counts, effectively implementing
    the feature extraction (word frequency counts). `MultinomialNB` is the Multinomial
    Naive Bayes classifier.


    5. Now that we''ve created the pipeline, let''s look at training the model:


    ```

    # Train the model

    pipeline.fit(X_train, y_train)

    ```


    `pipeline.fit(X_train, y_train)` trains the model on the training data. The `Pipeline`
    object, named `pipeline`, includes two steps: text vectorization (`CountVectorizer`)
    and the Multinomial Naive Bayes classifier (`MultinomialNB`).


    The `fit` method adjusts the parameters of the classifier so that it can model
    the relationship between the text data (`X_train`) and their corresponding labels
    (`y_train`, which are the languages). The vectorizer converts the text data into
    a format suitable for the classifier (a bag-of-words model), and the classifier
    learns from this data.


    6. Let''s look at the predictions:


    ```

    # Predictions

    y_pred = pipeline.predict(X_test)

    ```


    After training, `pipeline.predict(X_test)` is used to predict the languages of
    the new, unseen text data in `X_test`.


    The predictions are stored in `y_pred`. The pipeline automatically applies the
    same vectorization to `X_test` as it did to `X_train` and then uses the trained
    classifier to predict the languages.


    7. Now, let''s evaluate the model:


    ```

    # Evaluate the model

    print(classification_report(y_test, y_pred))

    conf_mat = confusion_matrix(y_test, y_pred)

    ```


    8. `classification_report(y_test, y_pred)` generates a report showing the main
    classification metrics, such as precision, recall, and F1 score for each language.
    These metrics provide insights into the performance of the model for each class
    (language). As a reminder, precision measures how accurate positive predictions
    are. Recall measures the ability to identify all actual positives and the F1 score
    balances precision and recall for overall model evaluation.


    The confusion matrix (`confusion_matrix(y_test, y_pred)`) is a table that is used
    to describe the performance of the classification model. It shows the true labels
    versus the predicted labels, allowing you to see where the model is making errors.


    The training phase is where the model learns from the data, the prediction phase
    is where it applies this learning to new data, and the evaluation phase assesses
    how well the model performed. This cycle is fundamental to supervised machine
    learning tasks.


    9. Here''s the classification report of the confusion matrix:


    ```

    # Plot confusion matrix

    plt.figure(figsize=(10,10))

    plt.imshow(conf_mat, interpolation=''nearest'', cmap=plt.cm.Blues)

    plt.title(''Confusion Matrix'')

    plt.colorbar()

    tick_marks = np.arange(len(y.unique()))

    plt.xticks(tick_marks, y.unique(), rotation=45)

    plt.yticks(tick_marks, y.unique())

    plt.tight_layout()

    plt.ylabel(''True label'')

    plt.xlabel(''Predicted label'')

    plt.show()

    ```


