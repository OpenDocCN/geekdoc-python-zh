    \ str(choicetshirt) + \" t-shirts, and \" + str(choicebottle) + \" water bottles.\"\
    )\n```\n\n从前面的代码片段中，请注意我们将变量添加在字典下方。这将在后面派上用场。这些变量被命名为**choicekey**、**choicetshirt**和**choicebottle**。命名变量使我们能够随时返回并根据需要更改代码。在这种情况下，每个变量都请求运行程序的人员输入，以获取他们订购的钥匙链、T恤和瓶子的数量。同样，有多种方法可以解决这个问题，但我们使用目前所学的知识来创建一个算法解决方案。\n\
