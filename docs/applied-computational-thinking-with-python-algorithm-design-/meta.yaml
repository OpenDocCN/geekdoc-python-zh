    \n在这个问题的最简单形式中，如果你是一个参赛者，你想知道你获胜的最佳可能情况是什么。如果你选择了250美元，但你的身高使得以25美分为单位计算的身高超过250美元，你会想知道。如果你在广播电台工作，你可能想追踪的不仅仅是每个单独的获胜。抽象使你能够适应所有情况，从解决一个数学问题到创建一个可以追踪所有参赛者所有选择的算法。现在让我们看看如何创建这些算法。\n\
    \n## 设计算法\n\n正如本章前面提到的，*算法*是一组指令。当我们编写计算机程序时，算法是提供给计算机的一组指令，以便它能为提出的问题提供解决方案。到目前为止，我们一直坚持使用数学算法，只是因为我们还没有深入研究Python。然而，我们现在将把一些算法翻译成Python编程。\n\
    \n首先，让我们看看*问题1*。在这里，我们遇到一种情况，你可以赢得250美元或者你的身高以25美分为单位计算。假设是你在比赛，你会想知道哪个选项能给你最多的奖金。\n\
