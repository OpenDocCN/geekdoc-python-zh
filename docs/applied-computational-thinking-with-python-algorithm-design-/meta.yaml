  mdcn: "在程序中为用户提供反馈，然后再次运行。使用布尔运算符可以提供清晰的逻辑过程，并允许更好、更清晰的算法。\n\n既然我们已经了解了基本运算符，那么同样重要的是我们也要了解错误，这将是第5章“错误”第一节的重点。在创建算法时，我们会犯错，尤其是逻辑错误，因为我们可能忘记考虑所有可能的情况。因此，重要的是要关注如何在算法设计中识别和解决它们，以及将其作为审查算法的一个步骤。\n\
    \n## 总结\n\n在本章中，我们讨论了归纳推理和演绎推理、逻辑推理、逻辑运算符和布尔逻辑。正如我们所讨论的，大多数算法设计都属于演绎推理。我们学习了如何使用语句，如\
    \ `if`、`if-else` 和 `if-elif-else`，以及嵌套语句来编写测试条件的程序。\n\n通过本章的学习，你现在能够更好地使用逻辑推理编写算法。你也具备了在设计和规划算法时应用归纳和演绎推理的理解，并在算法中使用布尔逻辑和运算符。\n\
    \n在下一章中，我们将深入探讨在编写算法时可能遇到的逻辑错误和其他类型的错误。你将学习如何通过识别可能的错误（如缩进错误、条件错误和公式错误）来测试算法中的错误。你还将了解不同类型的错误、用于调试的控制台消息等。\n\
    \n# 5 错误\n\n我们现在将更全面地了解错误，它们是什么，我们可能遇到的错误类型，在解决问题时可能收到的错误消息，以及如何调试我们的问题。错误分析是编程中持续进行的一部分，我们有时花在查找和修复错误上的时间比创建初始代码的时间还要多。熟悉错误和调试极其重要，因为完美的代码，尤其是第一次尝试时，是不存在的。\n\
    \n在本章中，我们将涵盖以下主题：\n\n- 理解错误\n- 学习识别逻辑错误\n- 错误和调试\n\n## 技术要求\n\n以下是本书中使用的完整源代码：[https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter05](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter05)。\n\
    \n## 理解错误\n\n我们之前已经一般性地讨论过错误；在这里，随着本书中额外内容的推进，我们也将包含一些额外的讨论。但此时，回顾一些更多的错误示例将很有帮助，特别是与以下内容相关的错误：\n\
    \n- **语法错误**：这些错误是由拼写错误、缺少标点符号等造成的。\n- **逻辑错误**：这些错误发生在代码“正确”运行但结果与我们的预期不符时。\n\
    - **类型错误**：这些错误发生在我们尝试使用一种类型的值（如字符串）时，但期望的值是整数或浮点数，反之亦然。\n\n让我们先看看语法错误，但随后我们将用更大的篇幅来讨论逻辑错误。最后，我们将以调试的讨论作为结束。\n\
    \n## 语法错误\n\n这些错误可能相当容易识别，Python 为我们提供了一些控制台消息来帮助我们。让我们看一个简单的数学程序：\n\n```\nimport\
    \ random\nrandomNumber = randomrandint(0, 10)\nprint(randomNumber)\n```\n\n在这种情况下，我想要打印一个\
    \ `randomNumber`。但当我尝试执行代码时，我收到以下消息：\n\n```\nNameError: name 'randomrandint' is\
    \ not defined\n```\n\n这很不幸，因为我知道我正在寻找的是一个随机整数。但如果我仔细看，我在 `random` 和 `randint`\
    \ 之间漏掉了一个句点。进一步剖析这段代码，让我们谈谈为什么我们一开始要导入 random。Python 本身非常基础。为了从中获得更多功能，我们使用库。在这种情况下，我想使用\
    \ random 库，以便我可以使用 `randint`，从而获得一个介于 0 和 10 之间的随机数。当我们导入一个库时，我们获得了更多选项的访问权限。我们将在本书中使用更多的库，但这个库允许我获得一个随机整数。\n\
    \n另一件我们应该注意的事情，即使你可能已经熟悉，那就是当我们导入一个库时，我们需要告诉 Python 我们何时使用它，添加一个句点，然后告诉 Python\
    \ 我们想使用库中的什么。因此，要获得一个随机数，我们需要使用库 random，添加一个句点，然后告诉它获取一个随机整数。因此，代码 `random.randint(0,\
    \ 10)` 需要在 random 之后有一个句点。“从库 `random` 中，使用 `randint` 获取一个介于 0 和 10 之间的随机数。”\n\
    \n修复那个错误后，我们得到以下代码：\n\n```\nimport random\nrandomNumber = random.randint(0, 10)\n\
    print(randomNumber)\n```\n\n现在我们的输出应该是一个随机生成的数字。在我的例子中，我得到了数字 3。\n\n现在，你可能注意到我为这么简单的事情写了很多代码。是的，我创建了一个变量。那是因为我可能稍后会在一个函数中使用这个数字。但假设我只需要一个随机数一次，那么我可以简化代码如下：\n\
    \n```\nimport random\nprint(randomrandint(0, 10))\n```\n\n这段代码将与上面那段代码做完全相同的事情。唯一的区别是我不能稍后将其用作另一个函数或表达式中的值，因为我没有将值保存为变量。\n\
    \n现在这是我们的原始代码，但这次我们将在另一个表达式中使用这个变量。\n\n```\nimport random\nrandomNumber = random.randint(0,\
    \ 10)\nnewNumber = randomNumber * 3\nprint(newNumber)\n```\n\n我尝试运行这段代码，得到了另一个错误。这是我收到的信息：\n\
    \n```\nNameError: name 'randomnumber' is not defined. Did you mean: 'randomNumber'?\n\
    ```\n\n现在，这非常有帮助。它甚至给了我一个关于我应该使用什么的建议。Python 在提供这些细节方面已经变得好多了！在以前的版本中，我们会收到一个模糊的错误消息，我们必须解读可能出了什么问题。但现在我可以看到我在第3行的\
    \ randomNumber 中忘记了将 Number 大写。修复这个问题将使代码能够运行。\n\n在*第4章，理解逻辑推理*中，我们也讨论了演绎推理和归纳推理。那些我们在编程中经常使用的\
    \ if-else 语句。有时，正是在那里，我们可能会因为忘记括号、冒号、句点和逗号而制造很多问题。\n\n让我们看一个例子，再次基于前面的程序。\n\n\
    ```\nimport random\nrandomNumber = random.randint(0, 10)\nnewNumber = randomNumber\
    \ * 3\nif newNumber > 10:\n    print(\"Excellent, you're in the double digits.\"\
    )\nelse\n    print(\"You've fallen short of double digits.\")\n```\n\n在这种情况下，我得到了另一个错误。Python\
    \ 说：\n\n```\nexpected ':'\n```\n\n有帮助，特别是如果你在 IDLE 环境中工作，Python 会高亮显示你期望有冒号的那一行，如*图\
    \ 5.1*所示。\n\n```\nimport random\nrandomNumber = random.randint(0, 10)\nnewNumber\
    \ = randomNumber * 3\nif newNumber > 10:\n    print(\"Excellent , you're in the\
    \ double digits.\")\nelse:\n    print(\"You've fallen short of double digits.\"\
    )\n```\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_101_0.png)\n\n图 5.1 – 语法错误\n\
    \n但一旦我们修复了那个错误，我们的代码就会运行，显示的消息将取决于 **newNumber** 的值。由于我们生成一个随机数来执行该计算，我们无法知道最终结果是两位数还是个位数。\n\
    \n现在让我们看看**类型错误**。当程序期望一种类型但得到另一种类型时，就会发生这些错误，例如，你需要一个 `int` 但你有一个 `str`。让我们看一个包含错误的代码片段。\n\
    \nch5_typeError\n\n```\nnumber = input(\"Write a number between 1 and 10. \")\n\
    print(10 / number)\n```\n\n在这种情况下，我们收到一个 TypeError，如下所示。\n\n```\nTraceback (most\
    \ recent call last):\n  File \"C:/Users/.../Chapter 5/ch5_typeError.py\", line\
    \ 3, in <module>\n    print(10 / number)\nTypeError: unsupported operand type(s)\
    \ for /: 'int' and 'str'\n```\n\n发生这种情况的原因是输入被假定为字符串。所以我试图用一个字符串去除一个数字。Python\
    \ 不将该字符串识别为整数，因此我们必须在代码本身中进行更改，程序才能运行。\n\nch5_typeError2\n\n```\nnumber = input(\"\
    Write a number between 1 and 10. \")\nprint(10 / int(number))\n```\n\n现在我们应该能够得到一个数字响应，因为类型匹配了。所以我们的程序可以无问题地运行。"
