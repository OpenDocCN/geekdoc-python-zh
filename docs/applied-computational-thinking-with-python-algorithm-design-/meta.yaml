    \ = 0.01, n_clusters = 2)`所示。我们坚持使用1800个样本，以便可以比较输出图形。以下截图展示了两个BIRCH模型示例。第一个（*左侧*）展示了按前述代码片段运行的算法。第二个（*右侧*）展示了相同的算法运行，但针对三个聚类。\n\
    \n要运行第二个图表，我们将模型行代码更改为`model = Birch(threshold = 0.01, n_clusters = 3)`。请查看下图，其中展示了两个图表——`n_clusters\
    \ = 2`和`n_clusters = 3`：\n\n请注意，在前面图表的*左侧*，清晰地显示了两个聚类。与*图15.14*相比，您可以看到一些数据点已被转换以适应每个已识别的聚类。前面截图*右侧*的散点图将数据分为三个不同的聚类。为了更熟悉聚类算法，可以更改参数，看看当您更改聚类数量、样本大小和其他参数时会发生什么。\n\
    \n现在，让我们看看K-means聚类算法。\n\n## 使用K-means聚类算法\n\nK-means聚类算法是使用最广泛的聚类算法之一。该算法分配样本，以使每个已识别聚类中的方差最小化。与BIRCH算法非常相似，我们在算法内设置聚类数量。让我们看看K-means代码片段：\n\
    \nch15_KMeans.py\n\n```python\nfrom numpy import unique\nfrom numpy import where\n\
    from sklearn.datasets import make_classification\nfrom sklearn.cluster import\
    \ KMeans\nfrom matplotlib import pyplot\n#Dataset definition\nX, _ = make_classification(n_samples\
    \ = 1800,\n    n_features = 2, n_informative = 2, n_redundant = 0,\n    n_clusters_per_class\
    \ = 1, random_state = 4)\n#Model identification and fit\nmodel = KMeans(n_clusters\
    \ = 2)\nmodel.fit(X)\n#Clusters\nyhat = model.predict(X)\nclusters = unique(yhat)\n\
    #Display\nfor cluster in clusters:\n    row_ix = where(yhat == cluster)\n    pyplot.scatter(X[row_ix,\
    \ 0], X[row_ix, 1])\npyplot.show()\n```\n\n同样，请注意我们使用了相同的聚类数量（2）和样本数量（1800），以便可以比较我们的显示结果。以下截图展示了K-means散点图的输出：\n\
