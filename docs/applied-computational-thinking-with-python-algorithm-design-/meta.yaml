    \    main()\n```\n\n前面的代码展示了我们如何定义**main()**函数。请注意，**main()**函数可以命名为我们想要的任何名称。当使用多个函数时，我们有时使用**main()**来标识将输出我们最初想要从算法中得到的内容的函数。对于这个问题，我们正在创建一个**main()**函数，它将确定我们旅行的最佳路线。\n\
    \n4.  现在，让我们看看运行此代码时得到的输出。代码为我们提供了**目标**总英里数和我们应该为这次旅行采取的路线。以下是输出：\n\n```\nObjective:\
