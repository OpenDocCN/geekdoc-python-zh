    \ 这些问题在我们设计解决方案时很重要。\n\n### 算法解决方案 1 – 打印偶数\n\n回想一下，我们将获取用户输入，以在给定范围内创建一个偶数列表。看看下面的代码，它向用户请求输入，然后打印出数字：\n\
    \n```\nch8_evenalgorithm1.py\n\nprint(\"This program will print the even numbers\
    \ for any range of numbers provided.\")\nendpoint1 = int(input(\"What is the lower\
    \ endpoint of your range? \"))\nendpoint2 = int(input(\"What is the upper endpoint\
    \ of your range? \"))\nendpoint2 = endpoint2 + 1\nfor i in range(endpoint1, endpoint2):\n\
    \    if i % 2 == 0:\n        print(i)\n```\n\n注意 `endpoint2` 被转换成了 `endpoint2\
    \ + 1`。这是因为如果我们不加 1，那么上端点将不会被包含。程序还以一条打印给用户的消息开始，说明程序的功能。\n\n当我使用端点 2 和 6 运行此程序时，得到以下输出：\n\
    \n```\nThis program will print the even numbers for any range of numbers provided.\n\
    What is the lower endpoint of your range? 2\nWhat is the upper endpoint of your\
