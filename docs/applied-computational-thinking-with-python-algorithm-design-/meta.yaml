    \ variables with separate inputs from one line of code. Take a look at the following\
    \ code snippet:\n\n```\nch10_input5.py\n\nname1, name2 = input(\"Enter First Name:\
    \ \"), input(\"Enter Last Name: \")\nprint(name1 + \" \" + name2)\n```\n\nAs you\
    \ can see, the quotations (\" \") in the middle of the `print()` command are used\
    \ to separate the inputs. Take a look at the output for this algorithm:\n\n```\n\
    Enter First Name: John\nEnter Last Name: Doe\nJohn Doe\n```\n\nHere, the program\
    \ asks for the first and last names, which were called in the first line of the\
    \ algorithm. This is by no means the only way that we can use inputs from users,\
    \ nor the only input we’ll use.\n\nIn this section, we looked at how we can define\
    \ input within an algorithm. We also learned how we can get input from a user\
    \ so that we can use it later in the algorithm. Now, let’s move to the next section,\
    \ where we’ll look at input and output within some computational thinking problems.\n\
    \n### Understanding input and output in computational thinking\n\nIn this section,\
    \ we will take a look at computational thinking problems to better understand\
    \ input and output. As we go through the design process of the algorithms, we\
    \ will focus on identifying the inputs"
  mdcn: "成为第二天性。本章中一些更具挑战性的概念和内容与数据分析有关，例如我们在本章*Python中的数据*部分介绍Python数据时使用的调查，以及类。在这些领域进行一些实践非常重要，这样你才能更好地理解这些主题。\n\
    \n学完本章后，你现在可以使用内置函数，区分列表、字典和类，并解决结合多个不同概念的问题，例如变量、迭代和列表。在下一章中，我们将更深入地研究输入和输出，以帮助我们设计算法。\n\
    \n## 10 理解输入和输出以设计解决方案算法\n\n在本章中，我们将更深入地研究问题，以便我们能够识别设计解决方案算法所需的输入和输出。我们将使用在*第9章，Python简介*中学到的概念，其中我们讨论了面向对象编程、字典、列表等。当你练习获取输入并在算法中使用它时，你将能够看到算法的输出取决于输入信息。\n\
    \n在本章中，我们将涵盖以下主题：\n\n- 定义输入和输出\n- 理解计算思维中的输入和输出\n\n在本章中，我们将重点理解不同类型的输入以及如何在使用**Python**编程语言的编程中使用输出。为了更好地理解这些主题，我们必须查看它们的定义。\n\
    \n### 技术要求\n\n对于本章，你需要安装最新版本的Python。\n\n你可以在此处找到本章的源代码：[https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter10](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter10)。\n\
    \n### 定义输入和输出\n\n我们将从研究输入及其定义开始本节，这反过来用于提供结果或输出。\n\n**输入**是放入系统或机器中的东西。在计算机中，我们有输入设备，计算机随后解释这些设备以提供结果或**输出**。当我们查看输入的类型以及我们如何在算法中使用输入时，你将看到我们从这些算法中获得的输出。让我们看一些输入设备的例子：\n\
    \n- **键盘**：当我们使用键盘时，计算机解释按键并在各种程序中使用它们，例如文档编写和搜索栏\n- **鼠标**：鼠标用于导航我们的物理屏幕，帮助我们点击内容和滚动页面\n\
    - **操纵杆**：操纵杆可用于玩电脑游戏\n- **麦克风**：在更现代的机器中，麦克风不仅用于通过电话和视频应用进行通信，还用于接收**人工智能（AI）**助手（如**Cortana**和**Siri**）的语音命令，以及语音转文本命令\n\
    \n所有这些输入都被编程到我们的计算机中，以便它们可以被使用。在Python中，我们编写使用此类输入的算法。**用户**输入是当程序向用户询问信息，然后将这些信息用于产生输出时。请记住，输入和输出可以在算法中的任何时候发生。我们还可以提供需要用户额外输入的输出反馈，依此类推。让我们看看如何从Python获取用户输入。\n\
    \nPython有一个主要的用户提示：`input()`函数。此函数用于获取用户输入，之后它会自动将输入转换为用户期望的输出。\n\n我们之前在多个程序中使用过这些主要提示，例如*第6章，探索问题分析*中的商店示例。让我们看看算法中的一些输入命令是什么样子的。看看以下代码片段：\n\
    \n```\nch10_input1.py\n\nname = input(\"What is your name? \")\nprint(\"Nice to\
    \ meet you \" + name + \".\")\n```\n\n此片段询问用户的姓名，然后使用输入中的信息打印一条语句。此代码的结果如下：\n\n\
    ```\nWhat is your name? Mikayla\nNice to meet you Mikayla.\n```\n\n现在，我们可以只请求输入而不使用任何提示问题，但用户将不知道被问的是什么，或者他们提供的信息将如何被使用。看看没有提示的片段：\n\
    \n```\nch10_input2.py\n\nname = input()\nprint(\"Nice to meet you \" + name +\
    \ \".\")\n```\n\n当我们运行前面的程序时，shell中没有打印任何内容。然而，我知道我需要输入一些东西，所以看看当我只输入一个字母时发生了什么：\n\
    \n```\nd\nNice to meet you d.\n```\n\n如你所见，用户不会知道该做什么，因为窗口没有询问任何问题；它只给出一个空白区域，用户必须假设那是输入的地方。但这可能会引起很多混淆，因为没有任何东西告诉用户是否需要输入或他们必须输入什么类型的东西。\n\
    \n我们可以通过使用`print`语句来减轻一些混淆——例如，我们可以向用户提供关于我们即将询问的输入的信息。我们也可以将语句作为`input()`函数的一部分。例如，我们可以使用一行代码，如`name\
    \ = input('What is your name? ')`，这将首先显示引号中的语句，以便用户知道我们在问什么。无论哪种方式，在设计算法时，提供语句让用户知道需要什么都很重要。\n\
    \n正如你在前面的示例中看到的，`input()`函数接受一个字符串，然后在`print()`语句中使用该字符串。让我们看看使用`input`命令的列表是什么样子的：\n\
    \n```\nch10_input3.py\n\n#Create the list\nnames = []\n#Ask user how many names\
    \ will be added\nname = int(input(\"How many names will be in the list? \"))\n\
    #Iterate to add each name to the list\nfor i in range(0, name):\n    people =\
    \ str(input())\n    names.append(people)\nprint(names)\n```\n\n在前面的片段中，我们创建了列表，但不会向用户显示。然后询问用户将向列表中添加多少个名称。之后，我们遍历列表，以便用户可以分别输入每个名称。最后，名称被追加，列表被打印。看看此算法的输出：\n\
    \n```\nHow many names will be in the list? 4\nManny\nLisa\nJohn\nKatya\n['Manny',\
    \ 'Lisa', 'John', 'Katya']\n```\n\n请注意，名称没有提示，因此算法假设用户在输入值4后知道该做什么。这可以通过在算法中的迭代中添加提示来减轻。看看以下代码片段：\n\
    \n```\nch10_input4.py\n\n#Create the list\nnames = []\n#Ask user how many names\
    \ will be added\nname = int(input(\"How many names will be in the list? \"))\n\
    #Iterate to add each name to the list\nfor i in range(0, name):\n    people =\
    \ input(\"Type the next name on the list. \")\n    names.append(people)\nprint(names)\n\
    ```\n\n如你所见，现在每个名称都会有一个提示，要求用户输入下一个名称。当算法运行时，这看起来如下：\n\n```\nHow many names will\
    \ be in the list? 4\nType the next name on the list. Milo\nType the next name\
    \ on the list. Sonya\nType the next name on the list. Gabriel\nType the next name\
    \ on the list. Maxine\n['Milo', 'Sonya', 'Gabriel', 'Maxine']\n```\n\n前面的输出显示了完成的列表以及添加到该列表中的每个名称的提示。在算法中为这些提示进行简单的添加可以减轻用户在输入时的混淆。\n\
    \n正如你所看到的，输入被读取为整数、字符串和列表。Python自动转换了信息，以便算法可以使用它。\n\n在Python中，还有一种方法可以从一行代码中定义多个变量并分别输入。看看以下代码片段：\n\
    \n```\nch10_input5.py\n\nname1, name2 = input(\"Enter First Name: \"), input(\"\
    Enter Last Name: \")\nprint(name1 + \" \" + name2)\n```\n\n如你所见，`print()`命令中间的引号（\"\
    \ \"）用于分隔输入。看看此算法的输出：\n\n```\nEnter First Name: John\nEnter Last Name: Doe\nJohn\
    \ Doe\n```\n\n在这里，程序要求输入名字和姓氏，这在算法的第一行中被调用。这绝不是我们可以使用用户输入的唯一方式，也不是我们将使用的唯一输入。\n\
    \n在本节中，我们研究了如何在算法中定义输入。我们还学习了如何从用户那里获取输入，以便我们可以在算法中稍后使用它。现在，让我们转到下一节，在那里我们将研究一些计算思维问题中的输入和输出。\n\
    \n### 理解计算思维中的输入和输出\n\n在本节中，我们将研究计算思维问题，以更好地理解输入和输出。在我们进行算法设计过程时，我们将专注于识别输入"
