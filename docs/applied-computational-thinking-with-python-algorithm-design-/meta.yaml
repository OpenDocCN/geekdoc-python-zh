    \n- **Seaborn** 是一个用于数据可视化的库，构建在 Matplotlib 之上。\n- **SciPy** 是一个用于线性代数、优化、统计等的库。它构建在\
    \ NumPy 之上。\n- **Scikit-Learn** 是一个用于机器学习的库。它是 SciPy 堆栈的一部分。\n\n在接下来的章节中，我们将更深入地探讨其中一些库的使用，同时解决一些需要使用它们的应用问题。现在，让我们快速了解一下这些库在查看数据集时能帮助我们做什么。\n\
    \n## 使用 Seaborn 库\n\nSeaborn 库在 Matplotlib 库的可视化功能之上为我们提供了更多特性。我们可以用 Seaborn 库做很多事情，我们通常将其导入为\
