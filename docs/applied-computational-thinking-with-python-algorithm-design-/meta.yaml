    \ the better our algorithms will be.\n\n## Summary\n\nIn this chapter, we discussed\
    \ how to design, diagram, and create solutions to problems. We went over the non-linear\
    \ process of design thinking to understand how to best design solutions. The design\
    \ thinking model is a five-step process: **Empathize**, **Define**, **Ideate**,\
    \ **Prototype**, and **Test**. Using this five-step process within the computational\
    \ thinking process can help us to avoid many problems and pitfalls.\n\nWe also\
    \ created brainstorms and flowcharts to establish the decision-making process\
    \ of our algorithms to solve problems.\n\nIn the next chapter, we will use our\
    \ knowledge of algorithm design and designing solutions to identify challenges\
    \ within solutions and debugging programs.\n\n# 8\n\n## Identifying Challenges\
    \ within Solutions\n\nIn this chapter, we will be evaluating algorithms and diagrams\
    \ as we learn how to navigate some common errors and determine whether possible\
    \ adjustments can be made to an existing algorithm to simplify it. We will evaluate\
    \ the solutions based on the problem description to verify whether the solution\
    \ aligns with the problem. We will be learning about identifying pitfalls in the\
    \ solution design process. As a note, we will expand on the content of this chapter\
    \ in *Part 2, Applying Python and Computational Thinking*, and *Part 3, Data Processing,\
    \ Analysis, and Applications Using Computational Thinking and Python*, of this\
    \ book as we dive deeper into the **Python** programming language.\n\nTo learn\
    \ about debugging, let’s remind ourselves that the computational thinking process\
