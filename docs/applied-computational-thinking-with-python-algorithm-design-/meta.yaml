    \ 让我们看看`ch17_hashing.py`文件中的算法：\n\n1. 我们将首先导入库：\n\n```\nimport uuid\nimport hashlib\n\
    ```\n\n我们将导入两个库，它们允许我们使用加盐和哈希来保存密码。\n\n2. 在文件中的下一个代码片段中，我们定义了哈希密码的函数：\n\n```\n\
    def hash_pwd(password):\n    salt = uuid.uuid4().hex\n    return hashlib.sha1(salt.encode()\
    \ + password.encode()).hexdigest() + ':' + salt\n```\n\n我们使用`uuid`包对密码加盐，然后使用安全哈希算法1（`sha1`）返回哈希值。这只是我们可以使用的算法之一。我们本可以使用其他算法，如`sha256`和`sha384`。`sha1`哈希的输出大小为160，而`sha256`的输出大小为256。`sha1`和`sha256`的块大小均为512位，而`sha384`的块大小为1,024位。\n\
