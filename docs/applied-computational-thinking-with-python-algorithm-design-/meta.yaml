    we can add capabilities and functionalities to it.


    While not all functionalities are inherently built in, we can use libraries to
    add what we need. Those libraries are available to download and use. For example,
    if we wanted to work with data and data science, there are a few libraries we
    can download, such as **Pandas**, **NumPy**, **Matplotlib**, **SciPy**, **Scikit
    Learn**, and more. But before we get into those libraries, let''s look at how
    the Python language works and learn its basics.


