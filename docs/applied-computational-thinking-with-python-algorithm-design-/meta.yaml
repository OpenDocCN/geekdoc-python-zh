- md: '## Summary


    In this chapter, we discussed control flow and order by looking at **for** loops,
    **range()**, **while** loops, and functions. **Control flow** refers to the order
    in which a program reads an algorithm. Typically, in Python, one line is read
    right after the other. In this chapter, we learned how you can control that order.
    Specifically, we learned that we could do so by iterating through data. Here are
    some important points to remember: **while** loops run so long as a condition
    is met, **for** loops iterate over a sequence (string, numerical, list, dictionary,
    set, or tuple), and **range()** is used to create a sequence of numbers.


    We also learned that we can combine these things when creating conditions, defining
    functions, and designing our algorithms. The most important thing to keep in mind
    is that order matters, so we need to be careful about when we define necessary
    variables and how to write the algorithms so that they don’t run infinitely or
    break before they should. Control flow is important so that our algorithms work
    without errors.


    In the next chapter, we will use the knowledge we’ve gained so far to complete
    the computational thinking process when solving challenges in multiple disciplines.


    # 12


    ## Using Computational Thinking and Python in Simple Challenges


    In this chapter, we will again take a look at the computational thinking process
    and apply it to design algorithms that help us solve various scenarios and problems.
    As we wrap up *Part 2, Applying Python and Computational Thinking*, of this book,
    we will combine some of the knowledge about Python capabilities with the computational
    thinking process to solve these problems.


    In this chapter, we will cover the following topics:


    - Problem definition and Python

    - Generalizing the problem and planning Python algorithms

    - Designing and testing the algorithm


    By the end of this chapter, you will be able to design algorithms that best fit
    the scenarios presented. You will also be able to identify Python functions that
    best align with the problems presented and generalize your solutions.


    ## Technical requirements


    You will need to install the latest version of Python to run the code in this
    chapter.


    The source code used in this chapter can be found in the GitHub repository here:

    https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter12.


    ## Problem definition and Python


    We are going to dive into our first scenario. You are launching a campaign for
    a product you’ve designed. You’re looking for investments that add up to $100,000
    in pledges. You want to create an algorithm that saves information. The algorithm
    will need to save the pledges made and any products associated as part of the
    benefits of making that pledge. There are some things you need to identify before
    you write an algorithm:


    - *How many types of pledges will you run in your campaign?*

    - *Will there be a donation-only pledge? Do donations get anything at all, such
    as a sticker, electronic certificate, or other product swag?*'
  mdcn: '## 总结


    本章中，我们通过探讨 **for** 循环、**range()**、**while** 循环和函数，讨论了控制流与顺序。**控制流**指的是程序读取算法的顺序。通常在
    Python 中，程序会逐行执行。本章我们学习了如何控制这种顺序。具体来说，我们了解到可以通过遍历数据来实现这一点。以下是一些需要记住的要点：**while**
    循环在满足条件时持续运行，**for** 循环遍历序列（字符串、数值、列表、字典、集合或元组），而 **range()** 用于创建数字序列。


    我们还学习了在创建条件、定义函数和设计算法时，可以将这些元素组合使用。最重要的是要记住顺序很重要，因此我们需要谨慎处理必要变量的定义时机以及算法的编写方式，以确保算法不会无限运行或在预期之前中断。控制流至关重要，它能确保我们的算法无误运行。


    在下一章中，我们将运用目前所学的知识，在解决多学科挑战时完成计算思维过程。


    # 12


    ## 在简单挑战中运用计算思维与 Python


    本章我们将再次审视计算思维过程，并将其应用于设计算法，以帮助我们解决各种场景和问题。随着本书 *第二部分：应用 Python 与计算思维* 的收尾，我们将结合关于
    Python 功能的一些知识与计算思维过程来解决这些问题。


