    NameError: name ''randomrandint'' is not defined

    ```


    That’s unfortunate, because I know it is a random integer that I’m looking for.
    But if I look closely, I’m missing a period between `random` and `randint`. Dissecting
    this code further, let’s talk about why we imported random to begin with. Python
    itself is very bare bones. In order to get more functionality out of it, we use
    libraries. In this case, I want to use the random library so that I can use `randint`,
    in order to get a random number given a range between 0 and 10. When we import
    a library, we gain access to even more options. We’ll work with a lot more libraries
    throughout this book, but this one allows me to get a random integer.


    The other thing we should note, even though you may already be familiar with,
    is that when we import a library, we need to tell Python when we are using it,
    add a period, and then tell Python what within the library we want to use. So,
    to get a random number, we need to use the library random, add a period, and then
    tell it to get a random integer. Hence, the code `random.randint(0, 10)` needs
    to have the period after random. “From the library `random`, use `randint` to
    get a random number between 0 and 10.”


    Fixing that error, we have the following code:


    ```

    import random

    randomNumber = random.randint(0, 10)

    print(randomNumber)

    ```


    And our output now should be a number, randomly generated. In my case, I got the
