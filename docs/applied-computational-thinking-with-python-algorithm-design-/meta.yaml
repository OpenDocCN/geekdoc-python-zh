- md: '## Dimensionality reduction


    Dimensionality reduction techniques reduce the number of random variables to consider
    and can be divided into feature selection and feature extraction methods. Techniques
    such as Principal Component Analysis (PCA), t-Distributed Stochastic Neighbor
    Embedding (t-SNE), and Autoencoders are used for this purpose. These methods help
    visualize high-dimensional data, reduce noise reduction, and improve the efficiency
    of other learning tasks.


    ## Anomaly detection


    In anomaly detection, the task is to identify rare items, events, or observations
    that raise suspicions by differing significantly from the majority of the data.
    This is commonly used in fraud detection, network security, fault detection, and
    system health monitoring.


    ## Association rule learning


    This task aims to discover interesting relationships between variables in large
    databases. A common example is market basket analysis, where the goal is to find
    relationships between the purchasing behavior of customers.


    # Introduction to DL


    DL is a subset of ML, a field of AI that focuses on teaching machines to learn
    from data and make decisions. DL particularly excels at learning from large volumes
    of data and has been the driving force behind many recent advancements in AI.
    Here are the key aspects of DL:


    - **Inspired by the human brain**: DL models, particularly neural networks, are
    inspired by the structure and function of the human brain. They mimic the way
    biological neurons process information, although in a much-simplified form.

    - **Neural networks**: The fundamental building blocks of DL are ANNs. These networks
    consist of layers of interconnected nodes or “neurons,” each of which performs
    simple computations. The complexity of DL comes from the depth of these layers,
    hence the term “deep” in DL.

    - **Learning from data**: In DL, models learn directly from raw data. This ability
    is a significant departure from traditional ML algorithms, which often require
    manual feature extraction. DL algorithms automatically extract and learn features
    from raw data, making them particularly suited for tasks such as image and speech
    recognition.

    - **Handling complex patterns**: DL is especially powerful in identifying and
    handling complex, high-level patterns in data. This capability has led to breakthroughs
    in fields such as computer vision, natural language processing, and audio recognition.

    - **Large datasets and computational power**: DL typically requires large amounts
    of data and significant computational power. The advent of big data and advances
    in computing hardware, particularly **graphics processing units (GPUs)**, has
    been crucial in the advancement of DL.

    - **Applications**: DL is used in various applications, including self-driving
    cars, virtual assistants (such as Siri and Alexa), facial recognition systems,
    language translation services, and medical diagnosis.

    - **Frameworks and libraries**: There are several frameworks and libraries available
    for DL, such as TensorFlow, Keras, PyTorch, and others, which facilitate the development
    of DL models.


    DL has transformed the landscape of AI, making it possible to solve complex problems
    that were once considered beyond the reach of machines. Now, let’s dive into the
    architecture of the neural network model, which forms the next exciting topic
    in our exploration.


    # The architecture of an ANN


    An ANN mimics the decision-making process of the human brain using **layers**
    of interconnected nodes, each resembling a neuron. The network begins with an
    **input layer**, (represented by x1, x2, … , xn) where the data is received. This
    data is then processed through one or more **hidden layers**, where each connection
    carries a weight (represented by w1, w2, … , wn). These weights amplify or attenuate
    the input signals, reflecting the importance of each input in the network’s decision-making
    process. Additionally, each neuron in the hidden layers has a bias term, often
    denoted as *b*. This bias allows the neuron to adjust its output independently
    of its input, providing an additional degree of freedom and enabling the network
    to better fit the data. Consequently, the combination of weights and biases is
    crucial in shaping the network’s predictions and behavior, as depicted in the
    following diagram:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_267_0.png)


    Figure 15.5 – ANN model


    The summation operator (Σ) in this diagram represents the process of summing these
    weighted inputs and the bias for each neuron in the hidden layer. This sum is
    then fed into an activation function within the neuron, which decides how much
    signal to pass forward. The activation function’s output can be thought of as
    the neuron’s response to the received stimuli.


    In the output layer, the final activation function is applied to the outputs from
    the last hidden layer to produce the network’s final output (ŷ). This output is
    a function of the combined activated signals from the hidden layer and is often
    used for tasks such as classification, regression, or other predictions. The type
    of activation function that’s used in the output layer depends on the specific
    task – for instance, a softmax function for multi-class classification or a sigmoid
    function for binary classification.


    ANNs can be trained using both supervised and unsupervised learning approaches.
    The training process involves comparing the network’s output – often a form of
    prediction – with the expected target output to identify errors. The network then
    fine-tunes its weights through a learning rule that uses the magnitude of this
    error. This iterative adjustment enables the network to improve its output accuracy.


    Neural networks are structured into layers comprising numerous interconnected
    nodes, each featuring an activation function that introduces non-linearity, which
    is crucial for complex decision-making. Here are some of the most prevalent activation
    functions:


    - **Sigmoid**: Expressed as $1 / (1 + e^{-x})$, it takes a real-number input,
    $x$, and outputs a value between 0 and 1. It’s often used for probabilities in
    binary classifications.

    - **Hyperbolic Tangent (tanh)**: Defined by $tanh(x)$, this function accepts a
    real-number input, $x$, and outputs a value between -1 and 1, effectively scaling
    the input data.

    - **Rectified Linear Unit (ReLU)**: Represented by $max(0, x)$, this is a piecewise
    function that outputs either the input value itself if positive, or zero.


    The following diagram shows the graphs associated with each of the aforementioned
    activation functions:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_268_0.png)


    Through the use of these activation functions, neural networks can discern complex
    patterns in data, leading to the construction of more intricate and advanced models.


    Next, we’ll present Python examples that demonstrate the implementation of a sequential
    neural network for classification in supervised learning. We’ll also examine unsupervised
    learning techniques, specifically clustering with algorithms such as BIRCH and
    K-means, to discover patterns in data. These examples will effectively showcase
    the use of ML models for prediction and data exploration while employing computational
    thinking in Python.


    # Classifying data


    Let’s take a look at an example where we are classifying data. The following figure
    shows an example of using supervised learning. To produce the output that can
    be seen here, we used an existing dataset from [www.kaggle.com](http://www.kaggle.com).
    The dataset is called **Pima Indians Diabetes Database**. It describes whether
    or not a Pima Indian patient was diagnosed with diabetes:


    | Number of times pregnant | Plasma glucose | Diastolic blood pressure | Triceps
    skinfold thickness | Serum insulin | Body mass index | Diabetes pedigree function
    | Age | Class variable |

    |---|---|---|---|---|---|---|---|---|

    | 6 | 148 | 72 | 35 | 0 | 33.6 | 0.627 | 50 | 1 |

    | 1 | 85 | 66 | 29 | 0 | 26.6 | 0.351 | 31 | 0 |

    | 8 | 183 | 64 | 0 | 0 | 23.3 | 0.672 | 32 | 1 |

    | 1 | 89 | 66 | 23 | 94 | 28.1 | 0.167 | 21 | 0 |

    | 0 | 137 | 40 | 35 | 168 | 43.1 | 2.288 | 33 | 1 |

    | 5 | 116 | 74 | 0 | 0 | 25.6 | 0.201 | 30 | 0 |

    | 3 | 78 | 50 | 32 | 88 | 31 | 0.248 | 266 | 1 |


    Figure 15.7 – Sample of unsupervised learning


    As you can see, the attributes from the table, also known as the input variables
    (x), are as follows:


    - Number of times pregnant

    - Plasma glucose concentration for 2 hours in an oral glucose tolerance test

    - Diastolic blood pressure (mm Hg)

    - Triceps skinfold thickness (mm)

    - 2-hour serum insulin (mu U/ml)

    - Body mass index (weight in kg / height in m²)

    - Diabetes pedigree function

    - Age (years)'
  mdcn: '## 降维


    降维技术减少了需要考虑的随机变量数量，可分为特征选择和特征提取方法。主成分分析（PCA）、t-分布随机邻域嵌入（t-SNE）和自编码器等技术常用于此目的。这些方法有助于可视化高维数据、降低噪声，并提高其他学习任务的效率。


    ## 异常检测


    在异常检测中，任务是识别那些因与大多数数据显著不同而引起怀疑的罕见项目、事件或观测值。这常用于欺诈检测、网络安全、故障检测和系统健康监控。


    ## 关联规则学习


    此任务旨在发现大型数据库中变量之间有趣的关系。一个常见的例子是购物篮分析，其目标是发现顾客购买行为之间的关系。


    # 深度学习简介


    深度学习是机器学习的一个子集，机器学习是人工智能的一个领域，专注于教机器从数据中学习并做出决策。深度学习尤其擅长从大量数据中学习，并且是近年来许多人工智能进步的驱动力。以下是深度学习的关键方面：


    - **受人脑启发**：深度学习模型，特别是神经网络，其灵感来源于人脑的结构和功能。它们模拟了生物神经元处理信息的方式，尽管形式上要简化得多。

    - **神经网络**：深度学习的基本构建块是人工神经网络。这些网络由相互连接的节点或“神经元”层组成，每个节点执行简单的计算。深度学习的复杂性来自于这些层的深度，因此得名“深度”学习。

    - **从数据中学习**：在深度学习中，模型直接从原始数据中学习。这种能力与传统机器学习算法有显著不同，后者通常需要手动特征提取。深度学习算法能够自动从原始数据中提取和学习特征，使其特别适合图像和语音识别等任务。

    - **处理复杂模式**：深度学习在识别和处理数据中复杂的高级模式方面尤为强大。这一能力已在计算机视觉、自然语言处理和音频识别等领域取得了突破。

    - **大数据集和计算能力**：深度学习通常需要大量的数据和强大的计算能力。大数据的出现和计算硬件的进步，特别是**图形处理单元（GPU）**，对深度学习的发展至关重要。

    - **应用**：深度学习应用于各种场景，包括自动驾驶汽车、虚拟助手（如Siri和Alexa）、人脸识别系统、语言翻译服务和医疗诊断。

    - **框架和库**：有多种深度学习框架和库可用，例如TensorFlow、Keras、PyTorch等，它们促进了深度学习模型的开发。


    深度学习已经改变了人工智能的格局，使得解决那些曾被认为超出机器能力范围的复杂问题成为可能。现在，让我们深入探讨神经网络模型的架构，这是我们探索之旅中下一个激动人心的主题。


    # 人工神经网络的架构


    人工神经网络通过**层**相互连接的节点（每个节点类似于一个神经元）来模拟人脑的决策过程。网络从一个**输入层**（由x1, x2, … , xn表示）开始，数据在此被接收。然后，这些数据通过一个或多个**隐藏层**进行处理，其中每个连接都带有一个权重（由w1,
    w2, … , wn表示）。这些权重放大或衰减输入信号，反映了每个输入在网络决策过程中的重要性。此外，隐藏层中的每个神经元都有一个偏置项，通常表示为*b*。这个偏置允许神经元独立于其输入来调整其输出，提供了额外的自由度，使网络能够更好地拟合数据。因此，权重和偏置的组合对于塑造网络的预测和行为至关重要，如下图所示：


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_267_0.png)


    图15.5 – 人工神经网络模型


    此图中的求和运算符（Σ）表示将隐藏层中每个神经元的这些加权输入和偏置求和的过程。然后，这个和被送入神经元内的一个激活函数，该函数决定向前传递多少信号。激活函数的输出可以看作是神经元对接收到的刺激的响应。


    在输出层，最终的激活函数应用于最后一个隐藏层的输出，以产生网络的最终输出（ŷ）。这个输出是隐藏层组合激活信号的函数，通常用于分类、回归或其他预测等任务。输出层中使用的激活函数类型取决于具体任务——例如，用于多分类的softmax函数或用于二分类的sigmoid函数。


    人工神经网络可以使用监督学习和无监督学习方法进行训练。训练过程包括将网络的输出（通常是某种形式的预测）与期望的目标输出进行比较以识别误差。然后，网络通过一个使用该误差大小的学习规则来微调其权重。这种迭代调整使网络能够提高其输出准确性。


    神经网络被组织成包含大量相互连接节点的层，每个节点都有一个激活函数，该函数引入了非线性，这对于复杂决策至关重要。以下是一些最常见的激活函数：


    - **Sigmoid**：表示为 $1 / (1 + e^{-x})$，它接受一个实数输入 $x$，并输出一个介于0和1之间的值。它常用于二分类中的概率输出。

    - **双曲正切（tanh）**：定义为 $tanh(x)$，此函数接受一个实数输入 $x$，并输出一个介于-1和1之间的值，有效地缩放输入数据。

    - **修正线性单元（ReLU）**：表示为 $max(0, x)$，这是一个分段函数，如果输入为正则输出输入值本身，否则输出零。


    下图显示了与上述每个激活函数相关的图形：


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_268_0.png)


    通过使用这些激活函数，神经网络能够识别数据中的复杂模式，从而构建更复杂和先进的模型。


