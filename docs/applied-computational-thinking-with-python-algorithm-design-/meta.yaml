    ## 问题 3 – 使用 Python 计算文本可读性


    在本节中，我们将研究一个与语言学相关的应用程序，特别是任何文本的可读性水平。我们将在接下来的代码片段中使用马丁·路德·金的 **我有一个梦想** 演讲。你可以将其替换为任何文本文件，只要你在代码中准确更改文件的位置和文件名即可。完整代码可以在
    `ch17_readability.py` 文件中找到。


    在深入代码之前，让我们先谈谈我们在寻找什么以及为什么它很重要。了解文本的可读性可以帮助我们决定是否将其包含在演示文稿、学校年级课程等中。**Flesch-Kincaid
    分数** 用于确定可读性，开发于 1940 年代。


    Rudolf Flesch 在担任美联社顾问以提高报纸可读性时创建了它。最初称为 **Flesch Reading Ease**，后来被美国海军现代化为当前使用的版本。Flesch-Kincaid
    分数现在提供年级水平分数，而不是获得一个然后必须转换为年级水平的分数。


    虽然我们不会使用该公式，但了解我们所使用内容的背景很重要。Flesch Reading Ease 公式如下所示：


    206.835 – 1.015( total words / total sentences ) – 84.6( total syllables / total
    words )


    Flesch-Kincaid 年级水平公式如下所示：


    0.39( total words / total sentences ) + 11.8( total syllables / total words )
    – 15.59


    前面公式的问题在于它们存在于 Python 的 readability 包中。如果我们导入该包，我们可以用相当简单的代码执行可读性分析。


    让我们看看我们需要对马丁·路德·金演讲执行可读性分析的代码：


    1. 首先，记得在代码中更改文件的路径，然后导入代码所需的包：


    `ch17_readability.py`


    ```

    from readability import Readability

    text = open(''C:\...\ch17_MLK-IHaveADream.txt'')

    text_up = text.read()

    r = Readability(text_up)

    flesch_kincaidR = r.flesch_kincaid()

    ```


    从前面的代码中，你会看到我们将 `readability` 包导入了我们的程序。如果你需要安装库/包，你可以使用 `pip install readability`
    来完成。


    一旦我们有了必要的库，我们就可以打开我们要分析的文件。我们还想告诉算法读取文本，我在这里将其称为 `text_up`，表示文本上传，这样我就不会忘记我正在读取一个打开的文件。这是我们在前面的代码中从文件位置打开的文本。最后，我们要求程序使用
    `Readability` 函数分析文本。请注意，我们将其保存到了 `r`。


    2. 完成所有这些操作后，我们可以使用以下代码片段打印我们的年级水平：


    ```

    print(''The text has a grade '' + flesch_kincaidR.grade_level + '' readability
    level.'')

    ```


    当我们运行算法时，我们的输出也相当简单。看看以下输出：


    **The text has a grade 9 readability level.**


    现在你知道如何验证任何文本的可读性了，尝试对其他类型的文本进行分析，包括诗歌、故事、演讲和歌曲。


