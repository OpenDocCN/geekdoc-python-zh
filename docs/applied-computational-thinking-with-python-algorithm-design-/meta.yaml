    \ again, but now combining some of our loops and adding some capabilities.\n\n\
    ## Revisiting functions\n\nAs you may recall from [Chapter 9](https://example.com),\
    \ *Introduction to Python*, we looked at built-in functions, but we also looked\
    \ at how we can define our functions. We are now going to talk about arguments\
    \ in *functions* and *loops* as we delve deeper into how *control flow* works\
    \ in Python.\n\nLet's think about problems that involve range. The range takes\
    \ two arguments: a minimum and a maximum. However, in Python, note that you can\
    \ just give one argument, which then assumes your minimum is 0. For example, if\
    \ I write `range(8)`, that's the same as `range(0, 8)`. Take a look at what happens\
    \ if you type `range(2)` in the Python shell:\n\n```\n>>> range(2)\nrange(0, 2)\n\
    ```\n\nFigure 11.3 – Python range interpretation with one argument\n\nIn *Figure\
    \ 11.3*, you can see that the program interpreted the code as `range(0, 2)`. But\
    \ let's say you are always changing your range. Think of the range algorithm we\
    \ wrote earlier. We are now going to rewrite it using a function. This function\
    \ now has a `for` loop inside it as well:\n\n```python\nch11_functions1.py\n\n\
    minNum = int(input('What\\'s your minimum number? '))\nmaxNum = int(input('What\\\
    's your maximum number? '))\ndef myNumbers(minNum, maxNum):\n    myList = []\n\
    \    for num in range(minNum, maxNum + 1):\n        myList.append(num)\n    print(myList)\n\
    myNumbers(minNum, maxNum)\n```\n\nNote that we are calling the function based\
    \ on user input. When this program runs, it calls the function based on that input.\
    \ We will revisit that and run the program by calling multiple ranges within the\
    \ algorithm in a second, but take a look at what the preceding snippet gives as\
    \ the output:\n\n```\nWhat's your minimum number? 3\nWhat's your maximum number?\
    \ 9\n[3, 4, 5, 6, 7, 8, 9]\n```\n\nNote how we also adjusted the maximum number\
    \ in the range in the `for` loop so that it includes the top number provided.\
    \ That's so that we get the full list of numbers.\n\nNow, let's take out the input\
    \ completely. We are going to call the function multiple times using different\
    \ ranges within the algorithm. Take a look at the updated snippet:\n\n```python\n\
    ch11_functions2.py\n\ndef myNumbers(minNum, maxNum):\n    myList = []\n    for\
    \ num in range(minNum, maxNum + 1):\n        myList.append(num)\n    print(myList)\n\
    myNumbers(4, 9)\nmyNumbers(1, 3)\nmyNumbers(9, 17)\n```\n\nThe final three statements\
    \ specify where we call the function. Since we defined the function to take two\
    \ arguments, it uses both arguments to run the function. Because we called the\
    \ function three times, we should see three lists as output. Let's take a look:"
  mdcn: "如你所见，程序接收了提供的输入（最小值为3，最大值为6），并创建了该范围内数字的立方列表。\n\n## 重要提示\n\n请记住，在Python中，我们使用`**`符号来获取指数。因此，`2**2`等于4，`3**4`等于81，以此类推。\n\
    \n请记住，控制流是指事情执行的顺序。通过`for`循环和`range()`，我们让程序重复执行操作，而无需逐行输入，从而有效地操控控制流，使其以循环方式而非逐行顺序执行。\n\
    \n既然我们已经了解了`for`循环和`range()`，接下来让我们看看Python中其他迭代方式。\n\n## 使用其他循环和条件语句\n\n除了`for`循环，Python还提供了多种遍历信息的方式。最常用的循环之一是`while`循环。使用`while`循环时，我们会持续检查一个条件。同样，通过一个例子来理解会更容易。\n\
    \n假设我们正在玩一个游戏，要求用户尽可能多地提供动物名称。我们希望能够完成以下几件事：\n\n1.  检查玩家是否有动物可以添加。\n2.  如果有，将每个动物添加到列表中。\n\
    3.  如果没有，结束程序并提供最终列表。\n4.  提供最终列表以及玩家能够输入的动物数量。\n\n让我们来看一个实现此游戏基本功能的算法：\n\n```python\n\
    ch11_whileLoop1.py\n\nmyAnimals = []\nprint('Let\\'s see how many animals you\
