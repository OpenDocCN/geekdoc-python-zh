  md: '# # 1


    # # Fundamentals of Computer Science


    The world of computer science is a broad and complex one. Not only is it constantly
    changing and evolving, but the components we consider part of computer science
    are also adapting and adjusting. The computational thinking process allows us
    to tackle any problem presented with purpose and focus. No matter what the problem
    is, we can break it down, find patterns that will help us find solutions, generalize
    our solutions, and design algorithms that can help us provide solutions to that
    problem.


    Throughout this book, we will be looking at the computational thinking process
    carefully, tackling problems in multiple areas and using the Python programming
    language and its associated libraries and packages to create algorithms that help
    us solve these problems. Before we look at various problems, however, we will
    explore some of the important computer science concepts that will help us navigate
    the rest of this book.


    In this chapter, we will explore the following topics:


    +   - Introduction to computer science

    - Theoretical computer science

    - System software

    - Computing

    - Data types and structures


    # # Technical requirements


    Here is the source code that will be used in this chapter: [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter01](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter01).


    # # Introduction to computer science


    When looking for a definition of computer science, you will encounter multiple
    variations, but they all state that computer science encompasses all aspects of
    computers and computing concepts, including hardware and software. In computer
    science, hardware design is learned in courses offered in engineering or computer
    engineering, for the most part. The software side of computer science'
  merge: -1
  pgno: 30
- img_proc: true
  md: 'includes **operating systems (OSs)** and applications, among other programming
    areas. For this book, we will be concentrating on the software side of computer
    science.


    In this chapter, we’ll look at some of the basic definitions, theories, and systems
    that are important as we delve deeper into the computational thinking world. Once
    we have identified key areas and defined the necessary concepts, we will be ready
    to move on to the applications and real-world challenges we face in an ever-changing
    tech world while also exploring the elements of computational thinking and the
    Python programming capabilities that can help us tackle these challenges.


    The wide range of topics available in computer science can be both daunting and
    exciting and it is ever-evolving. Some of these topics include game design, OSs,
    applications for mobile or desktop devices, programming robots, and much more.
    Constant and consistent breakthroughs in computers and computing provide new and
    exciting opportunities, much of which is unknown to us. Having a basic understanding
    of the systems behind computer science can help us interact with technology and
    tackle problems more efficiently. Let’s start by learning about how computers
    store information using the binary system.


    # Learning about computers and the binary system


    All computers store information as **binary** data. The binary system reads all
    information as a switch, which can be on or off – that is, 1 or 0. The binary
    system is a base-2 system. You’ll need a basic understanding of binary numbers
    and binary systems to progress in computer science.


    The binary system translates all data so that it can be stored as strings using
    only two numbers: 0 and 1. Data is stored in computers using bits. A **bit** (which
    stands for **binary digit**) is the smallest unit of data you can find in a computer
    – that is, either a 0 or a 1.


    When counting in the binary system, the first two numbers are 0 (or 00) and 1
    (or 01), much like in the base-10 number system we use in everyday life. If we
    were to continue counting in binary, our next number would be 10. Let’s compare
    the first three numbers in the base-10 system and the binary system before we
    learn how to convert from one into the other:


    | Base-10 | Binary |

    | :---: | :---: |

    | 0 | 0 |

    | 1 | 1 |

    | 2 | 10 |'
  merge: -1
  pgno: 31
- img_proc: true
  md: 'Figure 1.1 – Base-10 and binary comparison


    The next number in the base-10 system would be 3. In the binary system, the next
    number would be 11, which is read as *one one*. The first 10 numbers in the base-10
    and binary systems are as follows:


    | Base-10 | Binary |

    | :--- | :--- |

    | 0 | 00 |

    | 1 | 01 |

    | 2 | 10 |

    | 3 | 11 |

    | 4 | 100 |

    | 5 | 101 |

    | 6 | 110 |

    | 7 | 111 |

    | 8 | 1000 |

    | 9 | 1001 |

    | 10 | 1010 |


    Figure 1.2 – Base-10 and binary comparison (continued)


    As mentioned previously, the binary system is a base-2 system. This means that
    each digit of the base-10 system is paired with a power of 2, so we use those
    powers to convert between numbers. Understanding how to convert from base-2 into
    base-10 and vice versa can help us have a better understanding of the relationship
    between numbers in the different systems.


    # Converting from binary into base-10


    We will start with an example of converting from a binary number into a base-10
    number. Take the number 101101. To convert the number, each digit must be multiplied
    by the corresponding base-2'
  merge: -1
  pgno: 32
- img_proc: true
  md: 'power. The binary number consists of 6 digits, so the powers of 2 we will use
    will be 5, 4, 3, 2, 1, and 0. This means the number is converted as follows:


    $1 \times 2^5 + 0 \times 2^4 + 1 \times 2^3 + 1 \times 2^2 + 0 \times 2^1 + 1
    \times 2^0$

    $= 32 + 0 + 8 + 4 + 0 + 1 = 45$


    The binary number 101101 is equivalent to 45 in the base-10 system. In everyday
    life, we write the numbers in base-10, so we understand the number 45 as it’s
    written. However, our computers convert this information into binary to be able
    to process it, so the number becomes the binary number 101101 so that it can easily
    be read by the computer.


    # Converting from base-10 into binary


    Again, let’s start with an example to demonstrate the process of converting from
    a base-10 number into a binary number. Take the number 591. To convert the base-10
    number into binary, we have to divide the number by 2 iteratively. If the result
    has no remainder, we insert a 0 (if it is the first number) or insert a 0 to the
    left of the existing numbers.


    If the result has a remainder of 1, we insert a 1 (if it is the first number)
    or insert a 1 to the left of the existing numbers.


    When we divide 591 by 2, the result is 295 with a remainder of 1. That means our
    right-most number, which is our first number, is 1.


    Now, divide 295 by 2. The result is 147 with a remainder of 1. So, we insert a
    1 to the left of the 1. Our number is now 11.


    Now, divide 147 by 2. The result is 73 with a remainder of 1. Our result is now
    111. Now, we’ll carry out further divisions:


    +   - $73 \div 2 = 36$ with a remainder of 1. Our number is now 1111.

    - $36 \div 2 = 18$ with no remainder. Our number is now 01111.

    - $18 \div 2 = 9$ with no remainder. Our number is now 001111.

    - $9 \div 2 = 4$ with a remainder of 1. Our number is now 1001111.

    - $4 \div 2 = 2$ with no remainder. Our number is now 01001111.

    - $2 \div 2 = 1$ with no remainder. Our number is now 001001111.

    - $1 \div 2 = 0$ with a remainder of 1. Our number is now 1001001111.


    The number 591 in base-10 is equivalent to the number 1001001111 in the binary
    system.


    Another way to convert this number is to use a table for the divisions:'
