- md: "## 6\n\n## Exploring Problem Analysis\n\nIn this chapter, we will explore problem\
    \ analysis in depth while using some of what we have been learning, such as logical\
    \ reasoning, Boolean logic, and algorithmic design. We will work through problem\
    \ definition, decomposition, and analysis in this chapter.\n\nIn this chapter,\
    \ we will cover the following topics:\n\n- Understanding the problem definitions\n\
    - Learning how to decompose problems\n- Analyzing problems\n\nTo further understand\
    \ problems, we’ll need to look at a more complex problem and define it so that\
    \ we can begin the algorithmic design process. In this chapter, you will learn\
    \ how to define problems and decompose them to design algorithms. In doing so,\
    \ you’ll also learn about dictionaries in Python. After reading this chapter,\
    \ you’ll be able to use the computational thinking process to design and create\
    \ an algorithm that addresses complex problems.\n\n## Technical requirements\n\
    \nHere is the full source code that will be used throughout this chapter:\nhttps://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter06.\n\
    \n## Understanding the problem definitions\n\nAs we discussed in Chapter 2, Elements\
    \ of Computational Thinking, computational thinking uses four elements to solve\
    \ problems:\n\n- **Problem decomposition**: This is the process of breaking down\
    \ data\n- **Pattern recognition**: This is the process of finding similarities\
    \ or patterns\n- **Abstraction**: This element deals with generalizing the pattern\n\
    - **Algorithm design**: This is where we define the set of instructions for the\
    \ solution to the problem\n\nIn this section, to learn more about how to analyze\
    \ problems, we’re going to analyze a larger problem and work through the steps\
    \ needed to create the algorithm. To be able to create algorithms, we must analyze\
    \ the problems and identify what we are trying to solve – that is, *what is our\
    \ algorithm for?* *Why do we need to build it?* Looking at the decomposition of\
    \ problems and then defining what we need will provide us with a better algorithm\
    \ in the end.\n\nWe will work through a problem in the next section.\n\n## Problem\
    \ 6A – building an online store\n\nLet’s take a look at the following problem.\
    \ You are starting an online store. It’s in its infancy, but you’ll have three\
    \ different types of items available. They are keychains, water bottles, and T-shirts.\
    \ For this particular problem, we will go through a three-step process:\n\n1.\
    \ **Making assumption.**\n2. **Things to consider.**\n3. **Building a dictionary**\n\
    \nWe will look at the preceding steps in the upcoming sections.\n\n## Making assumptions\n\
    \nLet me state some assumptions about this store that we are going to use:\n\n\
    - This is a company that provides items for clients to share with their customers.\n\
    - Each item can have a logo and/or personalized information, such as a name, email,\
    \ and phone number.\n\nWe will now move on to the next section, which is about\
    \ things to consider.\n\n## Things to consider\n\nNow, let’s take a look at some\
    \ of the things that you’ll need to think about before we even start working on\
    \ an algorithm:\n\n- *Are the items personalized?*\n- *Will personalization be\
    \ charged by character, line, or item?*\n- *Will the price be fixed or will it\
    \ change when customers make bulk purchases?*\n- *Will there be discounts if a\
    \ client orders more than one type of item?*\n- *How much is the base price point\
    \ for each item?*\n\nThe preceding points are not the only questions that we could\
    \ go over, but they’re the questions that we’ll start taking a look at when we\
    \ decompose the problem.\n\nBefore we do that, let’s talk about how we can include\
    \ the information in a program for each of the items. As you may recall from Chapter\
    \ 3, *Understanding Algorithms and Algorithmic Thinking*, we can use a dictionary\
    \ in **Python** to save our menu of items. In this case, we have keychains, water\
    \ bottles, and T-shirts.\n\n## Building a dictionary\n\nBefore we take a look\
    \ at the complexities presented by this problem and decompose that information,\
    \ we can build a dictionary. We can make it so that the price for each item in\
    \ the dictionary is the base price (the price that does not contain any customizations\
    \ or discounts), as follows:\n\n- Cost per keychain: $0.75\n- Cost per T-shirt:\
    \ $8.50\n- Cost per water bottle: $10.00\n\nNow, let’s build the dictionary. Remember\
    \ that you can do this without the dictionary, but creating a dictionary allows\
    \ you to update the pricing, if necessary, at a later date. You can also create\
    \ functions to solve this problem. We are using logic and the dictionary for this\
    \ problem. The following code shows you how to build a dictionary:\n\nch6_storeDictionary.py\n\
    \n```\nonline_store = {\n    \"keychain\": 0.75,\n    \"tshirt\": 8.50,\n    \"\
    bottle\": 10.00\n}\nprint(online_store)\n```\n\nFrom the preceding code snippet,\
    \ keep in mind that the `print()` function is not needed here, but I use it often\
    \ to ensure that the code is working properly while I continue to build the algorithms.\
    \ Also, notice that the names of the variables – `keychain`, `tshirt`, and `bottle`\
    \ – have been simplified.\n\nHere’s what that output will look like:\n\n```\n\
    {'keychain': 0.75, 'tshirt': 8.5, 'bottle': 10.0}\n```\n\nWhat the output shows\
    \ me is that the prices are saved correctly for each of the variables. I’m using\
    \ that `print` function to test my dictionary and ensure that it runs correctly\
    \ before I start working on what I need from that dictionary.\n\nThis helps us\
    \ when we are writing the code and reusing the variables in multiple areas of\
    \ that code. Having these simple and easy-to-identify variables will allow us\
    \ to change and add to the algorithm without adding errors.\n\nIn this section,\
    \ we learned that problem analysis and definitions help us identify how best to\
    \ design our solution. Remember, when we are looking at problems, the definitions\
    \ we use, both before we write the algorithm and within the algorithm, are critical\
    \ for our design and final product. Now, let’s look at the decomposition of the\
    \ problem.\n\nelse:\n    print(\"Run this again and pay attention to the numbers!\"\
    )\n```\n\nTake a look at the first conditional. We verify that the number will\
    \ be under 4. (I’m not touching negative numbers, but we should definitely keep\
    \ those in mind if we were to need this code in the real world.) Now, if the number\
    \ provided is under 4 and ONLY if the number is under 4, will the program ask\
    \ the input for the next number. If either one of the numbers fail, the program\
    \ tells the user to pay attention and ends. But now, if the user follows the prompts,\
    \ we can get a better “prediction.”\n\n```\nEnter a number between 0 and 3: 2\n\
    Enter a number between 8 and 15: 9\nI predict your number is less than 19, in\
    \ this case 11\n```\n\nGreat! I’m pretty good at predicting the results in this\
    \ program!\n\nBut the user doesn’t follow the instructions, then the program tells\
    \ them to run it again!\n\n```\nEnter a number between 0 and 3: 1\nEnter a number\
    \ between 8 and 15: 5\nRun this again and pay attention to the numbers!\n```\n\
    \nYikes, guess they have to go back and start over.\n\n## IMPORTANT NOTE\n\nThis\
    \ code solution does not allow for re-entering information. That’s because we\
    \ are just starting to learn some of this content at the moment. You’ll later\
    \ see examples that similarly ask for input but if the input isn’t within parameters,\
    \ it displays a message to the user so they can reenter a new number. Programs\
    \ can be simple or complex and there are different ways to do almost everything.\
    \ This is just to show how a logical error can provide us with results that were\
    \ unexpected.\n\nAs you can see, we looked at two more examples, a syntax error\
    \ and a logic error. Sometimes these errors are easy to find, but sometimes they\
    \ aren’t. And the fix can be a simple line of code, or quite a few lines of code\
    \ that use conditionals, loops, or a combination of conditionals and loops to\
    \ fix the errors.\n\nYou’ll have an opportunity to observe more errors, but always\
    \ keep in mind that even code that runs can have errors. Sometimes they are easy\
    \ to find, and other times, the logic bug is hard to not just find, but to identify,\
    \ find, and fix.\n\n## Summary\n\nIn this chapter, we learned about logic errors\
    \ and how to identify them. We worked on debugging errors and how to read the\
    \ console messages. We also learned that some errors will not be noticed by Python,\
    \ that console messages vary in how helpful they are, and that errors and debugging\
    \ are simply a necessary part of the programming and computational thinking process.\
    \ We learned how very important it is to verify our programs and test them often.\n\
    \nAfter going through this chapter, you are now better equipped to write algorithms\
    \ using logical reasoning. You are now also able to test your algorithms for errors\
    \ by identifying possible mistakes such as indentation errors, conditional errors,\
    \ and formula errors.\n\nIn the next chapter, we will be taking a deeper dive\
    \ deeper into problem analysis, using the computational thinking elements to break\
    \ down problems so that we can create meaningful and useful algorithms."
  mdcn: "## 6\n\n## 探索问题分析\n\n在本章中，我们将深入探讨问题分析，同时运用我们之前学到的一些知识，例如逻辑推理、布尔逻辑和算法设计。本章我们将逐步讲解问题的定义、分解和分析。\n\
    \n本章将涵盖以下主题：\n\n- 理解问题定义\n- 学习如何分解问题\n- 分析问题\n\n为了更深入地理解问题，我们需要审视一个更复杂的问题并对其进行定义，以便开始算法设计过程。在本章中，你将学习如何定义问题并将其分解以设计算法。在此过程中，你还将了解\
    \ Python 中的字典。阅读本章后，你将能够运用计算思维过程来设计和创建解决复杂问题的算法。\n\n## 技术要求\n\n以下是本章将使用的完整源代码：\n\
    https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter06。\n\
    \n## 理解问题定义\n\n正如我们在第 2 章《计算思维的要素》中所讨论的，计算思维使用四个要素来解决问题：\n\n- **问题分解**：这是分解数据的过程\n\
    - **模式识别**：这是寻找相似性或模式的过程\n- **抽象**：这个要素涉及对模式进行概括\n- **算法设计**：这是我们定义解决问题指令集的地方\n\
    \n在本节中，为了更深入地了解如何分析问题，我们将分析一个更大的问题，并逐步讲解创建算法所需的步骤。要能够创建算法，我们必须分析问题并确定我们试图解决的是什么——也就是说，*我们的算法是为了解决什么？*\
    \ *为什么我们需要构建它？* 审视问题的分解，然后定义我们需要什么，最终将为我们提供一个更好的算法。\n\n我们将在下一节中逐步解决一个问题。\n\n##\
    \ 问题 6A – 构建一个在线商店\n\n让我们来看以下问题。你正在开设一家在线商店。它处于起步阶段，但你将提供三种不同类型的物品。它们是钥匙链、水瓶和\
    \ T 恤。对于这个特定问题，我们将经历一个三步流程：\n\n1.  **做出假设。**\n2.  **需要考虑的事项。**\n3.  **构建字典**\n\
    \n我们将在接下来的章节中探讨上述步骤。\n\n## 做出假设\n\n让我陈述一些关于这家商店的假设，我们将使用这些假设：\n\n- 这是一家为客户提供物品以分享给其客户的公司。\n\
    - 每件物品都可以有标志和/或个性化信息，例如姓名、电子邮件和电话号码。\n\n现在，我们将进入下一节，即关于需要考虑的事项。\n\n## 需要考虑的事项\n\
    \n现在，让我们来看一些在开始处理算法之前你需要考虑的事项：\n\n- *这些物品是个性化的吗？*\n- *个性化是按字符、行还是按物品收费？*\n- *价格是固定的，还是当客户批量购买时会变化？*\n\
    - *如果客户订购多种类型的物品，会有折扣吗？*\n- *每件物品的基础价格是多少？*\n\n前面的要点并不是我们可以讨论的唯一问题，但它们是我们在分解问题时将开始审视的问题。\n\
    \n在我们这样做之前，让我们谈谈如何将每件物品的信息包含在程序中。你可能还记得第 3 章《理解算法和算法思维》，我们可以使用 **Python** 中的字典来保存我们的物品菜单。在这种情况下，我们有钥匙链、水瓶和\
    \ T 恤。\n\n## 构建字典\n\n在我们审视这个问题带来的复杂性并分解这些信息之前，我们可以构建一个字典。我们可以让字典中每件物品的价格是基础价格（不包含任何定制或折扣的价格），如下所示：\n\
    \n- 每个钥匙链的成本：$0.75\n- 每件 T 恤的成本：$8.50\n- 每个水瓶的成本：$10.00\n\n现在，让我们构建字典。请记住，你可以不用字典来完成此操作，但创建字典允许你在以后需要时更新定价。你也可以创建函数来解决这个问题。我们在这个问题中使用逻辑和字典。以下代码向你展示如何构建字典：\n\
    \nch6_storeDictionary.py\n\n```\nonline_store = {\n    \"keychain\": 0.75,\n \
    \   \"tshirt\": 8.50,\n    \"bottle\": 10.00\n}\nprint(online_store)\n```\n\n\
    从前面的代码片段中，请记住 `print()` 函数在这里不是必需的，但我经常使用它来确保在继续构建算法时代码正常工作。另外，请注意变量名——`keychain`、`tshirt`\
    \ 和 `bottle`——已被简化。\n\n输出将如下所示：\n\n```\n{'keychain': 0.75, 'tshirt': 8.5, 'bottle':\
    \ 10.0}\n```\n\n输出向我显示每个变量的价格都已正确保存。我使用那个 `print` 函数来测试我的字典，并确保在我开始处理从该字典中获取所需内容之前它能正确运行。\n\
    \n这在我们编写代码并在代码的多个区域重用变量时对我们有所帮助。拥有这些简单且易于识别的变量将使我们能够在不引入错误的情况下更改和添加算法。\n\n在本节中，我们了解到问题分析和定义有助于我们确定如何最好地设计解决方案。请记住，当我们审视问题时，我们在编写算法之前和算法内部使用的定义对于我们的设计和最终产品至关重要。现在，让我们看看问题的分解。\n\
    \nelse:\n    print(\"Run this again and pay attention to the numbers!\")\n```\n\
    \n看看第一个条件语句。我们验证数字是否小于 4。（我不处理负数，但如果我们在现实世界中需要这段代码，我们绝对应该记住它们。）现在，如果提供的数字小于 4，并且仅当数字小于\
    \ 4 时，程序才会询问下一个数字的输入。如果任何一个数字不符合要求，程序会告诉用户注意并结束。但现在，如果用户遵循提示，我们可以得到一个更好的“预测”。\n\
    \n```\nEnter a number between 0 and 3: 2\nEnter a number between 8 and 15: 9\n\
    I predict your number is less than 19, in this case 11\n```\n\n太棒了！我在这个程序中预测结果相当准确！\n\
    \n但如果用户不遵循指示，程序会告诉他们重新运行！\n\n```\nEnter a number between 0 and 3: 1\nEnter a number\
    \ between 8 and 15: 5\nRun this again and pay attention to the numbers!\n```\n\
    \n哎呀，猜他们得回去重新开始了。\n\n## 重要提示\n\n此代码解决方案不允许重新输入信息。这是因为我们目前刚开始学习其中的一些内容。你稍后会看到类似的例子，它们也要求输入，但如果输入不在参数范围内，它会向用户显示一条消息，以便他们可以重新输入新的数字。程序可以是简单的或复杂的，几乎每件事都有不同的方法。这只是为了展示逻辑错误如何给我们带来意想不到的结果。\n\
