    # Errors


    We will now learn more about errors in general, what they are, the types of errors
    we can encounter, the error messages we can get while solving problems, and how
    to debug our problems. Error analysis is an ongoing part of programming, and we
    sometimes spend more time finding and fixing errors than creating our initial
    code. It is extremely important to get comfortable with errors and debugging,
    because the perfect code, especially on a first try, doesn’t exist.


    In this chapter, we will cover the following topics:


    +   - Understanding errors

    - Learning to identify logical errors

    - Errors and debugging


    # Technical requirements


    Here is the full source code used throughout the book: [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter05](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter05).


