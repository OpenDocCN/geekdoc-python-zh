- md: "## Using credentials in Boto3\n\nOnce the credentials file has been set up,\
    \ Boto3 can automatically use these credentials for your AWS operations in Python.\n\
    \nWhen you instantiate a Boto3 client or resource in your Python script, it will\
    \ look for the credentials in the `.aws/credentials` file by default.\n\n## Using\
    \ Boto3 in Python\n\nImport Boto3 into your Python script and use it to interact\
    \ with AWS services:\n\n```python\nimport boto3\n# Example: Creating an S3 client\n\
    s3 = boto3.client('s3')\n```\n\nIn the preceding code, we are creating an S3 bucket\
    \ using Python.\n\nNow, we need to test our setup. Here, we are writing a Python\
    \ script to test if Boto3 can access and interact with an AWS service, such as\
    \ listing buckets in S3:\n\n```python\nfor bucket in s3.list_buckets()['Buckets']:\n\
    \    print(f'Bucket Name: {bucket[\"Name\"]}')\n```\n\nLet's take a closer look\
    \ at this code:\n\n- **s3.list_buckets()**: This method call requests a list of\
    \ all S3 buckets in the AWS account. The **list_buckets** method is a part of\
    \ the S3 client in Boto3 and returns a response object.\n- **['Buckets']**: This\
    \ part of the code accesses the **'Buckets'** key in the response dictionary.\
    \ The value associated with this key is a list, where each item represents a bucket.\n\
    - **Looping through buckets**: The **for bucket in** loop iterates over each item\
    \ (bucket) in the list.\n- **Printing bucket names**: Inside the loop, **print(f'Bucket\
    \ Name: {bucket[\"Name\"]}')** prints the name of each bucket. **bucket[\"Name\"\
    ]** extracts the name of the bucket from the bucket information.\n\nThe output\
    \ of this script will be a list of bucket names, each preceded by the text **Bucket\
    \ Name:**.\n\nEach line of the output will correspond to one bucket. Here's an\
    \ example:\n\n```\nBucket Name: my-first-bucket\nBucket Name: my-second-bucket\n\
    Bucket Name: another-bucket\n```\n\nFigure 19.3 – Output of buckets\n\nThe exact\
    \ output depends on the names and number of S3 buckets present in the associated\
    \ AWS account. If there are no buckets in the AWS account, or if the credentials\
    \ are not set up correctly, you might not see any output or may receive an error\
    \ message.\n\n## Basic Python examples using Boto3\n\nWelcome to the world of\
    \ basic Python examples using Boto3. In this section, we’ll explore two fundamental\
    \ examples: uploading a CSV file to AWS using Boto3 in Python, and using Python\
    \ code for the ETL process. Let’s get started!\n\n## Uploading a CSV file to AWS\
    \ using Boto3 in Python\n\nFor this Python example, we are going to learn how\
    \ to upload a CSV file to an AWS S3 bucket using Python. Utilizing `boto3`, the\
    \ AWS SDK for Python, we’ll set up AWS credentials, initialize a Boto3 session,\
    \ and create an S3 client. Let’s import the following libraries in Python:\n\n\
    ```python\n# ch19_UploadingCSV_Demo.py\nimport boto3\nfrom botocore.exceptions\
    \ import NoCredentialsError\n```\n\n`boto3` is the AWS SDK for Python and it provides\
    \ an easy-to-use interface for interacting with AWS services. `NoCredentialsError`\
    \ is imported from `botocore.exceptions` to handle cases where the AWS credentials\
    \ are not found or incorrect.\n\n## Set AWS credentials\n\n```python\naws_access_key_id\
    \ = 'YOUR_ACCESS_KEY'\naws_secret_access_key = 'YOUR_SECRET_KEY'\n```\n\nThese\
    \ are your AWS credentials. The Python script uses these to authenticate with\
    \ AWS services. It’s important to note that hardcoding credentials in your script\
    \ are not recommended due to security risks. Instead, use environment variables\
    \ or an AWS configuration file.\n\nNow, initialize a session using Boto3:\n\n\
    ```python\nsession = boto3.Session(\n    aws_access_key_id=aws_access_key_id,\n\
    \    aws_secret_access_key=aws_secret_access_key\n)\n```\n\nThis creates a session\
    \ with AWS using the provided credentials.\n\n## Create an S3 client\n\n```python\n\
    s3 = session.client('s3')\n```\n\nThis line creates an S3 client using the session\
    \ information. The S3 client is what you’ll use to interact with the S3 service.\n\
    \nDefine the file upload function and upload the file:\n\n```python\ndef upload_to_aws(local_file,\
    \ bucket, s3_file):\n    try:\n        s3.upload_file(local_file, bucket, s3_file)\n\
    \        print(\"Upload Successful\")\n        return True\n    except FileNotFoundError:\n\
    \        print(\"The file was not found\")\n        return False\n    except NoCredentialsError:\n\
    \        print(\"Credentials not available\")\n        return False\n\nuploaded\
    \ = upload_to_aws('dataset.csv', 'your-bucket-name', 'dataset.csv')\n```\n\nThis\
    \ upload_to_aws function takes three parameters: the local file path (local_file),\
    \ the S3 bucket name (bucket), and the desired filename in the S3 bucket (s3_file).\n\
    \nInside the function, the upload_file method of the S3 client is used to upload\
    \ the file. If the upload is successful, it prints a success message and returns\
    \ True.\n\nIf the local file is not found, the script catches FileNotFoundError\
    \ and prints an appropriate message.\n\nIf the AWS credentials are missing or\
    \ incorrect, NoCredentialsError is caught, and a message is printed.\n\nFinally,\
    \ the upload_to_aws function is called with the path to the local file (dataset.csv),\
    \ the name of the bucket where you want to upload the file, and the name you want\
    \ the file to have in the bucket (this is also dataset.csv in this case).\n\n\
    ## Python code for the ETL process\n\nCreating an ETL process using Python and\
    \ AWS services involves several steps. Here’s a basic outline of what the code\
    \ and process might look like while using AWS services such as S3 for storage\
    \ and AWS Lambda for running the Python code. For this example, use any of the\
    \ CSV files we used in the previous Python coding examples:\n\n1. Before you start,\
    \ ensure you have an AWS account and have set up the necessary resources, such\
    \ as an S3 bucket for storing data.\n2. Use the following Python code to outline\
    \ the ETL process:\n\n```python\nimport boto3\nimport pandas as pd\n\ndef lambda_handler(event,\
    \ context):\n    # Initialize boto3 client\n    s3_client = boto3.client('s3')\n\
    \    # Extract: Download the file from S3\n    s3_client.download_file('your-bucket-name',\
    \ 'your-source-file.csv', '/tmp/source-file.csv')\n    # Load the data into Pandas\
    \ DataFrame\n    data = pd.read_csv('/tmp/source-file.csv')\n    # Transform:\
    \ Perform your data transformations here\n    # For example, you might clean the\
    \ data, aggregate it, etc.\n    transformed_data = data  # Replace this with your\
    \ actual transformation logic\n    # Save the transformed data to a new CSV file\n\
    \    transformed_data.to_csv('/tmp/transformed-data.csv', index=False)\n    #\
    \ Load: Upload the transformed file back to S3\n    s3_client.upload_file('/tmp/transformed-data.csv',\
    \ 'your-bucket-name', 'your-destination-file.csv')\n    return {\n        'statusCode':\
    \ 200,\n        'body': 'ETL process completed successfully!'\n    }\n```\n\n\
    3. This script is designed to be deployed as an AWS Lambda function. Make sure\
    \ you include the required permissions for the Lambda function to access S3. You\
    \ may also need to adjust the memory and timeout settings of your Lambda function\
    \ based on your data size and processing needs. You can do this by logging in\
    \ to the AWS Management Console, going to the Lambda service, choosing the Lambda\
    \ function you want to modify, and clicking on the **Configuration** tab below\
    \ the function's name.\n\n4. To run this ETL process regularly, you can use AWS\
    \ CloudWatch Events to trigger the Lambda function based on a schedule (for example,\
    \ daily, hourly, and so on). To use CloudWatch, do the following:\n\n    A. Go\
    \ to the AWS Management Console and navigate to the CloudWatch service.\n    B.\
    \ In CloudWatch, go to the **Rules** section under **Events**.\n    C. Click on\
    \ **Create rule** to set up a new rule.\n    D. Choose **Schedule** to trigger\
    \ the event at regular intervals.\n    E. For **Rate expression**, you can specify\
    \ a simple interval (for example, every 1 hour, every day, and so on). An example\
    \ of this is **rate(1 hour)** or **rate(1 day)**.\n    F. In the **Targets** section,\
    \ choose **Lambda function** as the target.\n    G. Select the Lambda function\
    \ that you have created for your ETL process.\n\n5. Monitor the Lambda function\
    \ logs in CloudWatch for any errors or issues. Consider setting up alarms for\
    \ any critical failures. To set up alarms for critical failures in your AWS Lambda\
    \ function using AWS CloudWatch, log into the AWS Management Console and navigate\
    \ to CloudWatch. Create a new alarm, select the relevant Lambda metric, such as\
    \ **Errors** or **Throttles**, and configure the alarm conditions, such as triggering\
    \ when errors exceed a certain threshold. Set up notifications through SNS for\
    \ email or SMS alerts. Remember to name the alarm meaningfully and test it to\
    \ ensure proper functionality. This setup helps you stay informed about critical\
    \ issues in your ETL process, enhancing response time and maintaining data integrity.\n\
    \n## Summary\n\nIn this chapter, we learned about content that will serve as a\
    \ foundational guide for integrating Python with AWS, marking the beginning of\
    \ an exciting journey into the field of cloud computing and"
