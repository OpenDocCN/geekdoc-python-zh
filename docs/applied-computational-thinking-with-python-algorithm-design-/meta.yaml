  md: "Some additional methods for text files are included in the following list.\
    \ This is not an exhaustive list but contains some of the most commonly used methods.\
    \ You will see some of them in use in examples throughout the book:\n\n+   - **read()**:\
    \ Can be used to read lines of a file; using **read(3)** reads the first three\
    \ lines of data.\n- **tell()**: Used to find the current position as a number\
