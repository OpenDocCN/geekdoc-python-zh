- md: '## Using Matplotlib


    Some libraries do not provide visual representations or visual models for our
    data. To create graphs from our data, we can use the Matplotlib library in Python.
    Much like we imported the `pandas` and NumPy libraries as `pd` and `np`, respectively,
    we can also shorten Matplotlib. The full library contains multiple modules. We’ll
    use the `pyplot` module a lot. The most commonly used abbreviation for `Matplotlib.pyplot`
    is `plt`. If we’re calling Matplotlib, we usually abbreviate that as `mlt`. Let’s
    take a look at a quick example:


    ch14_matplotlib.py


    ```

    import matplotlib.pyplot as plt

    plt.plot([0, 3, 6], [4, 5, 6])

    plt.show()

    ```


    Note that this particular library has an even longer name than `matplotlib`. To
    import the library, we have to import it using `matplotlib.pyplot`. Imagine having
    to write all that every time we need it in an algorithm. *No thanks!* Instead,
    we import it as `plt`.


    Now, let’s take a look at the second line in the code snippet. We’re creating
    a plot that matches each of the numbers in the first list to the numbers in the
    second list. So, we have three coordinate pairs: (0, 4), (3, 5), and (6, 6). The
    output we receive when using this code isn’t just a line of output – it’s a plot.
    Now, the algorithm creates that plot in the second line of the preceding code
    snippet.


    But it won’t show it to you unless you tell it that’s what you want. Think of
    the `show()` function as our `print()` function in Python. Unless we tell the
    algorithm that we want to see something, the algorithm will perform the task in
    the background but won’t show it to us. The following graph shows the output of
    this algorithm:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_244_0.png)


    Figure 14.3 – Matplotlib sample graph


    As you can see, the graph itself is already helpful. We can see that this is a
    linear relationship defined by those points. But note that the bottom of the screen
    gives you some options. The home icon at the bottom left will reset your graph
    at any time to its original window. The **Zoom** function, shown in the following
    screenshot, allows us to select a piece of the graph that we want to look at more
    closely:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_245_0.png)


    **Selection of the graph area (before zooming)** &nbsp;&nbsp;&nbsp;&nbsp; **Selection
    of the graph area (after zooming)**


    Figure 14.4 – The Zoom feature of Matplotlib


    Note that the left graph shows our selection for the piece of the graph we wanted
    to take a closer look at. The graph on the right is only showing us the values
    we selected. Matplotlib also allows us to configure subplots and navigate back
    and forth between multiple representations. For example, if I were to click on
    the left arrow on the graph after zooming, it would take me back to the previous
    representation. Clicking the **Home** button takes me back to the original graph.


    Of course, this is not the only type of graph or representation Matplotlib allows.
    This is just a tiny glimpse into visual representations.


    *TIP*


    An additional resource for the types of plots available can be found at [https://matplotlib.org/stable/tutorials/index](https://matplotlib.org/stable/tutorials/index).


    In this section, we learned about the Matplotlib library. We learned how to create
    a simple plot and how we can zoom into sections of our graphs from the outputs
    when we create our graphics.


    Now that we know how to access our libraries and what each can do for us, let’s
    take a look at how we can use them to analyze data.


    ## Understanding data analysis with Python


    In the previous section, we introduced some of the libraries that we can use to
    analyze data in Python. In this section, we will look at one example and multiple
    code snippets to build a bar graph using real data and Matplotlib. However, before
    we do so, let’s review why Python is so important concerning data analysis.


    As Python is object-oriented, it allows us to streamline complex and/or large
    datasets. This allows for great readability of the data and using the libraries
    can produce data representations such as tables and visual models that allow us
    to predict where our data is going, create regression analyses, and much more.
    As mentioned in this chapter’s introduction, data analysis is also critical for
    decision-making. A well-designed experiment produces data that we can rely on
    and that is generalizable. Data analysis can be a tool for gaining more equality
    and equity in our society.


    All that being said, we are going to look at the mechanical aspects of what we
    can do with Python rather than how we interpret it so that we can understand how
    Python does data analysis and presents results using our libraries. We’ll cover
    more examples in *Chapter 17, Applied Computational Thinking Problems*, and *Chapter
    18, Advanced Applied Computational Thinking Problems*, in various areas that will
    not only use some of these tools but will also provide us with the opportunity
    to explore what data analysis means in the context of those samples.


    It’s time to take a look at an example that can help us further understand the
    capabilities of these tools and how we can write algorithms that solve some of
    the presented problems.


    Before we begin, we’ll be using a data file, `ch14ch14_data.csv`, which can be
    found in this book’s GitHub repository. This file contains graduation rates for
    degree-seeking students from 1996 through 2012 by race/ethnicity, time to completion,
    sex, control of institution, and the percentage of applications accepted. The
    data was downloaded from the **National Center for Education Statistics** here:
    [https://nces.ed.gov/programs/digest/d19/tables/dt19_326.10.asp](https://nces.ed.gov/programs/digest/d19/tables/dt19_326.10.asp).


    The data file in our repository only contains the data for all 4-year institutions
    rather than the entire file. Some of the headings have also been simplified.


    When we want to work with a data file, we must tell Python where it can locate
    it so that it knows what to use when running the algorithm. To do so, we can use
    the `os` module, which allows our algorithm to interact with our **operating system
    (OS)**. Note that our snippet already includes the other libraries as well (we’ll
    use them later):


    ch14_csvAnalysis.py


    ```

    import pandas as pd

    import matplotlib as mlp

    import matplotlib.pyplot as plt

    import os

    #Let Python know correct directory for file.

    os.chdir(''C:\Users\...\Program Files\Chapter 12'')

    print(''Current directory'', os.getcwd())

    ```


    As we’ve done previously, make sure you replace the ellipses in the user information
    with your location. In the algorithm provided in this book’s repository, you’ll
    also need to adjust that location to run this algorithm since the location for
    that algorithm will be for my path.


    Now that we’ve told Python where to find the file, we can use it in the algorithm.
    If we run this algorithm, we’ll see that the output should match the path we noted
    in the line that starts with **os.chdir:**


    ```

    Current directory C:\Users\...\Program Files\Chapter 12

    ```


    Again, note that our paths will not match. This will all depend on where you have
    saved your files.


    The following figure shows the same data and file as our .csv file in the .xls
    format as it is easier to point out what we need from it. A .csv file is unformatted,
    so the data is harder to read than it is from a formatted table. Note that we
    will use the .csv file for the analysis:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_247_0.png)


    If we only want to pull the rows shown, we can use the following code snippet
    to get that information from our .csv file:


    **ch14_csvAnalysis_2.py**


    ```

    import pandas as pd

    graduates = pd.read_csv(''ch14ch14_data.csv'', index_col = 0)

    print(graduates[0: 16])

    ```


    Note that our algorithm imported the **pandas** library. The **read_csv()** function
    tells Python that we’ll be using the filename and the index of the column we want
    to start working with. This index gives us the values we’ll use as row headers.
    If the index isn’t in the first column, we can change that to a different value.
    Then, we can print the rows we want to see. Because our data is wide, our output
    will look as follows:'
