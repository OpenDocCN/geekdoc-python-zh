    When we use `dropna()`, the algorithm will drop rows with missing values. When
    we set `axis = 0`, it means that we want to remove rows that contain missing values.
    When we set `how =''any''` is used along rows (`axis=0`), it means that a row
    will be removed if it contains at least one missing value (`NaN`). In other words,
    if there''s any `NaN` value in a row, that entire row will be dropped from the
    DataFrame. In another scenario, if we want to drop any columns, we will set `axis
    = 1`. When `how=''any''` is used with `axis=1` (columns), it means that any column
    with at least one missing value (`NaN`) will be removed from the DataFrame. The
