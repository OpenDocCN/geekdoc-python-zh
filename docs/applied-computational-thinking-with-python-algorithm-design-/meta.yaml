    \n例如，数字3,344和3,434是两个不同的排列。然而，它们只被计为一个组合，因为数字的顺序无关紧要。\n\n回到我们的问题。我们只需要知道，我们想要创建一个算法，以最高效的方式带我们到达目的地。我们必须确定要访问的城市以及我们将如何旅行，如下所示：\n\
    \n- 总共有五个城市，分别是纽约市（NYC）、费城、巴尔的摩、芝加哥和克利夫兰。\n- 我们将使用一辆车，因为我们使用的是TSP（旅行商问题）而不是车辆路径问题（VRP）。\n\
    - 第一个城市是0，即纽约市。纽约市到其自身的距离为0。\n\n现在，让我们看看其中的规律。\n\n## 识别规律（TSP）\n\n对于每个城市，总共有五个距离，其中到其自身的距离为0。我们需要一个数组或列表来存储每个城市的所有距离。我们需要创建一个模型来在我们的算法中访问这些数据。我们将在设计算法时研究这一点。首先，让我们谈谈如何稍微概括一下这个规律。\n\
    \n## 概括（TSP）\n\n对于这个特定问题，我们将手动将城市输入到算法本身中。你可能需要考虑的一件事是如何从用户那里获取输入，以创建包含距离的必要数组。\n\
    \n你也可以创建一个主要城市之间距离的数据库，从.csv文件中访问它，这样用户输入的城市数据就可以在那里找到，然后可以将其添加到我们的模型中。这个特定算法有许多可能的扩展，而且这不是一个只能用一种方式解决的问题。目前，我们将坚持使用一组定义好的城市，以便我们可以创建我们的算法。\n\
    \n请注意，对于这个问题，我们参考了[https://developers.google.com/optimization/routing/tsp](https://developers.google.com/optimization/routing/tsp)的源代码。\n\
    \n## 设计算法（TSP）\n\n是时候看看我们一直在讨论的内容了。让我们从纽约市开始，首先构建那个数组。其他数组以相同的方式创建。所有距离均以英里为单位，并基于**谷歌地图**数据进行了近似和四舍五入，如下所示：\n\
    \n- 纽约市到纽约市的距离是0\n- 纽约市到费城的距离是95\n- 纽约市到巴尔的摩的距离是192\n- 纽约市到芝加哥的距离是789\n- 纽约市到克利夫兰的距离是462\n\
    \n下表显示了每个城市到另一个城市及其自身的距离：\n\n| | 纽约市 | 费城 | 巴尔的摩 | 芝加哥 | 克利夫兰 |\n|---|---|---|---|---|---|\n\
