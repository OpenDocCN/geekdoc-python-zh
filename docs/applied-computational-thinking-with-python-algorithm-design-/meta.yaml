  mdcn: "## 学习如何分解问题\n\n当我们分解问题时，我们是在确定算法需要为我们提供什么。最终用户需要看到无缝的体验。请看*图6.1*中的流程图；这是一个基本的决策流程图，帮助我们设计算法。\n\
