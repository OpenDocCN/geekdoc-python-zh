    \ range? 9\n4\n6\n8\n```\n\n尽管技术上端点现在是 10，但范围的上限不被包含，因此小于 10 的最大偶数是 8。现在，我可以为更大的范围运行此程序，但范围越大，滚动查看所有数字就越困难。所以，让我们看看另一种获取偶数的方法。\n\
    \n### 算法解决方案 2 – 打印偶数\n\n从前面的例子中我们看到，每个偶数都被打印到不同的行上。让我们看看是否可以改变这一点，转而创建一个列表。Python\
    \ 中的列表可以是空的。我们为它们使用任何名称，然后将其赋值为花括号内的项目或仅空花括号。例如，我可以创建一个名为 `evenNumbers = []` 的空列表。让我们看看它在以下算法中的样子：\n\
    \n```\nch8_evenalgorithm2.py\n\nprint(\"This program will print the even numbers\
    \ for any range of numbers provided.\")\nendpoint1 = int(input(\"What is the lower\
    \ endpoint of your range? \"))\nendpoint2 = int(input(\"What is the upper endpoint\
