    want to remove `bird` and substitute it with `butterfly`.


    First, we have to identify the index for `bird`. That index is 2, as it is the
    third item on the list:


    ```

    >>> animals[2] = ''butterfly''

    >>> print(animals)

    ```


    Here is the output, with `bird` replaced:


    ```

    [''dog'', ''cat'', ''butterfly'', ''lion'', ''tiger'', ''elephant'', ''duck'']

    ```


    The list now contains `butterfly`.


    Removing an item is fairly straightforward, as we just use the `remove()` method
    and the item we want to remove:


    ```

    >>> animals.remove(''lion'')

    >>> print(animals)

    ```


    As you can see, `lion` has been removed from the list:


    ```

    [''dog'', ''cat'', ''butterfly'', ''tiger'', ''elephant'', ''duck'']

    ```'
- md: "We can also remove an item by index using the `pop()` method. Using index 1\
    \ removes the second item on the list. Refer to the following code:\n\n```\n>>>\
    \ animals.pop(1)\n'cat'\n```\n\nThen, we can try the following:\n\n```\n>>> print(animals)\n\
    ['dog', 'butterfly', 'tiger', 'elephant', 'duck']\n```\n\nNotice that Python identifies\
    \ the item at index 1 that was *popped* out of the list. When we print the list\
    \ again, the item is no longer there. If we want to remove the last item, we do\
    \ not have to specify an index. Refer to the following code:\n\n```\n>>> animals.pop()\n\
    'duck'\n```\n\nThen, we can try the following:\n\n```\n>>> print(animals)\n['dog',\
    \ 'butterfly', 'tiger', 'elephant']\n```\n\nAs mentioned, when no index is specified,\
    \ the last item on the list is *popped* and removed from the list.\n\nThere is\
    \ yet another way to remove an item from the list—by using the `del` keyword:\n\
    \n```\n>>> del animals[1]\n>>> print(animals)\n```\n\nThis is the output:\n\n\
    ```\n['dog', 'tiger', 'elephant']\n```\n\nOur list lost the second item on the\
    \ list. We can also use the `del` keyword to delete the list entirely, like so:\n\
    \n```\n>>> del animals\n>>> print(animals)\n```\n\nThis outputs an error, as follows:\n\
    \n```\nTraceback (most recent call last):\n  File \"<pyshell#49>\", line 1, in\
    \ <module>\n    print(animals)\nNameError: name 'animals' is not defined\n```\n\
    \nAs you can see, I can no longer print the list because it is not defined. Notice\
    \ we received a `NameError` description of `name 'animals' is not defined`. This\
    \ is one of the other errors mentioned in [Chapter 8, Identifying Challenges within\
    \ Solutions](Chapter 8, Identifying Challenges within Solutions).\n\n## IMPORTANT\
    \ NOTE\n\nFor the next few code examples, I ran my original code from the `ch9_list2.py`\
    \ file again to get my original list.\n\nWe can clear an entire list without eliminating\
    \ the actual list by using the `clear()` method, as follows:\n\n```\n>>> animals.clear()\n\
    >>> print(animals)\n```\n\nThis is the output we get:\n\n```\n[]\n```\n\nIn this\
    \ case, the list now prints as an empty list without giving an error message.\
    \ That’s because the list is still there and defined; it’s just empty.\n\nThis\
    \ can sometimes create problems if we’ve used a list somewhere and we did not\
    \ intend to clear it every previous instance; we can use the following instead:\n\
    \n```\nanimals = []\n```\n\nSo, if we had a dictionary that used the list, defining\
    \ animals as an empty list later on would not affect the dictionary that had previously\
    \ called the list. Using `clear()` should only be done if you intend to clear\
    \ the information from everywhere in your code.\n\nNow, let’s say I wanted the\
    \ length of my list. We can find the length of the list by using `len()`. Again,\
    \ I went back to the original list to run the following code:\n\n```\n>>> print(len(animals))\n\
    ```\n\nWe get the following output:\n\n```\n6\n```\n\nOur original list contained\
    \ six elements—that is, six animals.\n\nNow, let’s define another list that contains\
    \ colors:\n\nch9_list3.py\n\n```\nanimals = ['dog', 'cat', 'bird', 'lion', 'tiger',\n\
    \          'elephant']\ncolors = ['blue', 'red', 'yellow']\nprint(animals)\nprint(colors)\n\
    ```\n\nThe output for this algorithm is two lists. Now, if we wanted to combine\
    \ the two lists, we could do so using the `extend()` method.\n\nLet’s take a look\
    \ at how we can append `colors` to the `animals` list:\n\n```\n>>> animals.extend(colors)\n\
    ```\n\n```\n>>> print(animals)\n```\n\nThis is the appended list:\n\n```\n['dog',\
    \ 'cat', 'bird', 'lion', 'tiger', 'elephant', 'blue', 'red', 'yellow']\n```\n\n\
    Our list now includes all our animals and all our colors. We could have also used\
    \ this method to extend `colors` with `animals`. The difference is that the colors\
    \ would appear first on our list:\n\n```\n>>> colors.extend(animals)\n>>> print(colors)\n\
    ```\n\nThis is how the list now appears:\n\n```\n['blue', 'red', 'yellow', 'dog',\
    \ 'cat', 'bird', 'lion', 'tiger', 'elephant']\n```\n\nWe can also sort lists,\
    \ which is helpful when we want to have an alphabetical list or if we want to\
    \ sort a list of numbers. Take a look at the two lists in the following algorithm:\n\
    \nch9_list4.py\n\n```\nanimals = ['dog', 'cat', 'bird', 'lion', 'tiger',\n   \
    \       'elephant']\nnumbers = [4, 1, 5, 8, 2, 4]\nprint(animals)\nprint(numbers)\n\
    ```\n\nThis is how they appear unsorted:\n\n```\n['dog', 'cat', 'bird', 'lion',\
    \ 'tiger', 'elephant']\n[4, 1, 5, 8, 2, 4]\n```\n\nLet’s sort both lists and see\
    \ what happens:\n\n```\n>>> numbers.sort()\n>>> print(numbers)\n```\n\nWe will\
    \ get this output:\n\n```\n[1, 2, 4, 4, 5, 8]\n```\n\nThen, we can try the following:\n\
    \n```\n>>> animals.sort()\n>>> print(animals)\n```\n\nWe get this as the output:\n\
    \n```\n['bird', 'cat', 'dog', 'elephant', 'lion', 'tiger']\n```\n\nAs you can\
    \ see, the numbers were sorted from smallest to largest, while the animals were\
    \ sorted in alphabetical order.\n\nLet’s talk for a second about why this is so\
    \ helpful. Imagine that you have a list of items displayed on your website that\
    \ come from a Python list. They are all sorted and perfectly displayed, but let’s\
    \ now say you want to add more items. It’s easier to add them in any order to\
    \ your list using the methods we have discussed, then we can sort them so that\
    \ they continue to be in alphabetical order.\n\nOf course, these are not the only\
    \ things we can do with lists. Python allows us to work with lists in many ways\
    \ that are user-friendly and function similarly to what arrays do in other programming\
    \ languages. When we need to use them in other ways, we can search for libraries\
    \ that contain those functionalities.\n\nBoth lists and dictionaries are important\
    \ in the Python programming language. In this section, you saw that dictionaries\
    \ use key-value pairs, while lists include values. Both can be edited using methods\
    \ and functions built into the Python programming language. You’ll see them again\
    \ when we apply Python to more complex computational thinking problems in *Part\
    \ 3 of this book, Data Processing, Analysis, and Applications Using Computational\
    \ Thinking and Python*.\n\nNow, we’ll take a look at how we use variables and\
    \ functions in Python.\n\n## Using variables and functions\n\nIn Python, we use\
    \ variables to store a value. We can then use the value to perform operations,\
    \ evaluate expressions, or use them in functions. Functions give sets of instructions\
    \ for the algorithm to follow when they are called in an algorithm. Many functions\
    \ include variables within them. So, let’s first look at how we define and use\
    \ variables, then take a look at Python functions.\n\n## Variables in Python\n\
    \nPython does not have a command for declaring variables. We can create variables\
    \ by naming them and setting them equal to whatever value we’d like. Keep in mind\
    \ that there are some rules for naming variables:\n\n- The name must begin with\
    \ a letter or underscore. (Some examples of valid names are **animal** and **_animal**.)\n\
    - The name cannot begin with a number. (The **1animal** variable is invalid, but\
    \ **animal1** is valid.)\n- The name cannot contain any symbols other than an\
    \ underscore—so, only alphanumeric characters A through Z, the numbers 0 to 9\
    \ (but remember, not as a first character in the variable name), and _.\n- The\
    \ name is case-sensitive. (So, **Animal** is not the same as **animal**.)\n\n\
    Let’s take a look at an algorithm that contains multiple variables:\n\n```\nch9_variables.py\n\
    ```\n\n```\nname = 'Marcus'\nb = 10\ncountry_1 = 'Greece'\nprint(name)\nprint(b)\n\
    print(country_1)\n```\n\nAs you can see, we can use a letter, a longer name, and\
    \ even include underscores in naming our variables. We cannot, however, start\
    \ a variable name with a number. When we run this program, we get the following\
    \ output:\n\n```\nMarcus\n10\nGreece\n```\n\nEach variable was printed without\
    \ any problems. If we had used a number to begin any variable name, we would have\
    \ gotten an error. Here’s what would happen if I tried to use a number to begin\
    \ a variable name:\n\n```\n>>> 1country = 1\n\nSyntaxError: invalid syntax\n```\n\
    \nAs you can see, a `SyntaxError` error message was printed in the console.\n\n\
    That said, if I had named the `country_1` variable as `_country`, that would be\
    \ an acceptable variable name in Python.\n\nNow, let’s take a look at what we\
    \ can do with variables.\n\n## Combining variables\n\nOne thing variables allow\
    \ us to do is combine them in a `print` statement. For example, I can create a\
    \ `print` statement that prints `Marcus Greece`. To do so, I can use the `+` character,\
    \ as follows:\n\n```\n>>> print(name + ' ' + country_1)\n```\n\nNotice that between\
    \ the two `+` characters, there’s `' '`. This is done to add a space so that our\
    \ `print` statement wouldn’t look like `MarcusGreece`. Now, let’s combine `b`\
    \ and `name` in a `print` statement:\n\n```\n>>> print(b + name)\n```\n\nThis\
    \ will give us an error message, as shown here:\n\n```\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#70>\", line 1, in <module>\n    print(b + name)\n\
    TypeError: unsupported operand type(s) for +: 'int' and 'str'\n```\n\nNotice that\
    \ the error states `TypeError: unsupported operand type for +`. It also states\
    \ that we have `'int'` and `'str'`, which means we are combining two different\
    \ data types."
  mdcn: "我们也可以使用 `pop()` 方法通过索引来移除列表项。使用索引 1 会移除列表中的第二项。请参考以下代码：\n\n```\n>>> animals.pop(1)\n\
    'cat'\n```\n\n然后，我们可以尝试以下操作：\n\n```\n>>> print(animals)\n['dog', 'butterfly',\
    \ 'tiger', 'elephant', 'duck']\n```\n\n请注意，Python 识别出了索引 1 处被*弹出*的项。当我们再次打印列表时，该项已不在其中。如果我们想移除最后一项，则无需指定索引。请参考以下代码：\n\
    \n```\n>>> animals.pop()\n'duck'\n```\n\n然后，我们可以尝试以下操作：\n\n```\n>>> print(animals)\n\
    ['dog', 'butterfly', 'tiger', 'elephant']\n```\n\n如前所述，当未指定索引时，列表的最后一项会被*弹出*并从列表中移除。\n\
    \n还有另一种从列表中移除项的方法——使用 `del` 关键字：\n\n```\n>>> del animals[1]\n>>> print(animals)\n\
    ```\n\n输出如下：\n\n```\n['dog', 'tiger', 'elephant']\n```\n\n我们的列表丢失了第二项。我们也可以使用\
    \ `del` 关键字完全删除列表，如下所示：\n\n```\n>>> del animals\n>>> print(animals)\n```\n\n这会输出一个错误，如下所示：\n\
    \n```\nTraceback (most recent call last):\n  File \"<pyshell#49>\", line 1, in\
    \ <module>\n    print(animals)\nNameError: name 'animals' is not defined\n```\n\
    \n如你所见，我无法再打印该列表，因为它未被定义。请注意，我们收到了一个 `NameError` 错误描述：`name 'animals' is not defined`。这是[第\
    \ 8 章，识别解决方案中的挑战]中提到的其他错误之一。\n\n## 重要提示\n\n对于接下来的几个代码示例，我重新运行了 `ch9_list2.py`\
    \ 文件中的原始代码，以获取原始列表。\n\n我们可以使用 `clear()` 方法清空整个列表，而无需消除列表本身，如下所示：\n\n```\n>>> animals.clear()\n\
    >>> print(animals)\n```\n\n我们得到的输出是：\n\n```\n[]\n```\n\n在这种情况下，列表现在打印为空列表，而没有给出错误消息。这是因为列表仍然存在并已定义；它只是空的。\n\
    \n如果我们之前在某处使用了列表，并且不打算在每个先前的实例中都清空它，这有时会造成问题；我们可以改用以下方法：\n\n```\nanimals = []\n\
    ```\n\n因此，如果我们有一个使用了该列表的字典，稍后将 `animals` 定义为空列表不会影响之前调用该列表的字典。只有当你打算从代码中的所有地方清除信息时，才应使用\
    \ `clear()`。\n\n现在，假设我想要获取列表的长度。我们可以使用 `len()` 来查找列表的长度。同样，我回到原始列表来运行以下代码：\n\n\
    ```\n>>> print(len(animals))\n```\n\n我们得到以下输出：\n\n```\n6\n```\n\n我们的原始列表包含六个元素——即六种动物。\n\
    \n现在，让我们定义另一个包含颜色的列表：\n\nch9_list3.py\n\n```\nanimals = ['dog', 'cat', 'bird',\
    \ 'lion', 'tiger',\n          'elephant']\ncolors = ['blue', 'red', 'yellow']\n\
    print(animals)\nprint(colors)\n```\n\n此算法的输出是两个列表。现在，如果我们想合并这两个列表，可以使用 `extend()`\
    \ 方法。\n\n让我们看看如何将 `colors` 追加到 `animals` 列表：\n\n```\n>>> animals.extend(colors)\n\
    ```\n\n```\n>>> print(animals)\n```\n\n这是追加后的列表：\n\n```\n['dog', 'cat', 'bird',\
    \ 'lion', 'tiger', 'elephant', 'blue', 'red', 'yellow']\n```\n\n我们的列表现在包含了所有的动物和所有的颜色。我们也可以使用此方法将\
    \ `animals` 扩展到 `colors`。区别在于颜色会出现在列表的前面：\n\n```\n>>> colors.extend(animals)\n\
    >>> print(colors)\n```\n\n列表现在看起来是这样的：\n\n```\n['blue', 'red', 'yellow', 'dog',\
    \ 'cat', 'bird', 'lion', 'tiger', 'elephant']\n```\n\n我们还可以对列表进行排序，这在我们想要按字母顺序排列列表或对数字列表进行排序时非常有用。看看以下算法中的两个列表：\n\
    \nch9_list4.py\n\n```\nanimals = ['dog', 'cat', 'bird', 'lion', 'tiger',\n   \
    \       'elephant']\nnumbers = [4, 1, 5, 8, 2, 4]\nprint(animals)\nprint(numbers)\n\
    ```\n\n它们未排序时的样子是：\n\n```\n['dog', 'cat', 'bird', 'lion', 'tiger', 'elephant']\n\
    [4, 1, 5, 8, 2, 4]\n```\n\n让我们对两个列表进行排序，看看会发生什么：\n\n```\n>>> numbers.sort()\n\
    >>> print(numbers)\n```\n\n我们将得到这个输出：\n\n```\n[1, 2, 4, 4, 5, 8]\n```\n\n然后，我们可以尝试以下操作：\n\
    \n```\n>>> animals.sort()\n>>> print(animals)\n```\n\n我们得到的输出是：\n\n```\n['bird',\
    \ 'cat', 'dog', 'elephant', 'lion', 'tiger']\n```\n\n如你所见，数字按从小到大的顺序排序，而动物则按字母顺序排序。\n\
    \n让我们花点时间谈谈为什么这如此有用。想象一下，你的网站上显示了一个来自 Python 列表的项目列表。它们都已排序并完美显示，但假设你现在想添加更多项目。使用我们讨论过的方法，可以更容易地以任何顺序将它们添加到列表中，然后我们可以对它们进行排序，使它们继续保持字母顺序。\n\
    \n当然，这些并不是我们能对列表做的所有事情。Python 允许我们以多种用户友好的方式处理列表，其功能类似于其他编程语言中的数组。当我们需要以其他方式使用它们时，可以搜索包含这些功能的库。\n\
    \n列表和字典在 Python 编程语言中都很重要。在本节中，你看到了字典使用键值对，而列表包含值。两者都可以使用 Python 编程语言内置的方法和函数进行编辑。当你在*本书第\
    \ 3 部分，使用计算思维和 Python 进行数据处理、分析和应用*中将 Python 应用于更复杂的计算思维问题时，你会再次看到它们。\n\n现在，我们将看看如何在\
    \ Python 中使用变量和函数。\n\n## 使用变量和函数\n\n在 Python 中，我们使用变量来存储一个值。然后我们可以使用该值来执行操作、计算表达式或在函数中使用它们。函数为算法在调用时提供了一组指令。许多函数内部包含变量。因此，让我们首先看看如何定义和使用变量，然后看看\
    \ Python 函数。\n\n## Python 中的变量\n\nPython 没有用于声明变量的命令。我们可以通过命名变量并将其设置为任何我们想要的值来创建变量。请记住，命名变量有一些规则：\n\
    \n- 名称必须以字母或下划线开头。（有效名称的一些示例是 **animal** 和 **_animal**。）\n- 名称不能以数字开头。（**1animal**\
    \ 变量无效，但 **animal1** 有效。）\n- 名称不能包含除下划线以外的任何符号——因此，只能包含字母数字字符 A 到 Z、数字 0 到 9（但请记住，不能作为变量名的第一个字符）和\
    \ _。\n- 名称区分大小写。（因此，**Animal** 与 **animal** 不同。）\n\n让我们看看一个包含多个变量的算法：\n\n```\n\
    ch9_variables.py\n```\n\n```\nname = 'Marcus'\nb = 10\ncountry_1 = 'Greece'\n\
    print(name)\nprint(b)\nprint(country_1)\n```\n\n如你所见，我们可以使用单个字母、更长的名称，甚至在变量名中包含下划线。但是，我们不能以数字开头命名变量。当我们运行此程序时，会得到以下输出：\n\
    \n```\nMarcus\n10\nGreece\n```\n\n每个变量都毫无问题地打印出来。如果我们使用数字作为任何变量名的开头，就会得到错误。如果我尝试使用数字作为变量名的开头，会发生以下情况：\n\
    \n```\n>>> 1country = 1\n\nSyntaxError: invalid syntax\n```\n\n如你所见，控制台中打印了一条\
    \ `SyntaxError` 错误消息。\n\n也就是说，如果我将 `country_1` 变量命名为 `_country`，那在 Python 中将是一个可接受的变量名。\n\
    \n现在，让我们看看我们可以用变量做什么。\n\n## 组合变量\n\n变量允许我们做的一件事是在 `print` 语句中组合它们。例如，我可以创建一个 `print`\
    \ 语句来打印 `Marcus Greece`。为此，我可以使用 `+` 字符，如下所示：\n\n```\n>>> print(name + ' ' + country_1)\n\
    ```\n\n请注意，在两个 `+` 字符之间有一个 `' '`。这样做是为了添加一个空格，这样我们的 `print` 语句就不会看起来像 `MarcusGreece`。现在，让我们在\
    \ `print` 语句中组合 `b` 和 `name`：\n\n```\n>>> print(b + name)\n```\n\n这将给我们一个错误消息，如下所示：\n\
    \n```\nTraceback (most recent call last):\n  File \"<pyshell#70>\", line 1, in\
    \ <module>\n    print(b + name)\nTypeError: unsupported operand type(s) for +:\
    \ 'int' and 'str'\n```\n\n请注意，错误指出 `TypeError: unsupported operand type for +`。它还指出我们有\
    \ `'int'` 和 `'str'`，这意味着我们正在组合两种不同的数据类型。"
