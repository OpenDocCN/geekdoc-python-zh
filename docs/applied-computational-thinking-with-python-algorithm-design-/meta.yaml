    - **个性化成本**：这是在基础成本上额外添加的。\n\n现在，让我们详细看看前面的要点。\n\n## 构建字典并提供输入\n\n在添加任何复杂性之前，让我们看看如何获取每件商品的价格并将其用作基础价格。我们需要统计每种商品的数量。以下代码展示了如何实现：\n\
