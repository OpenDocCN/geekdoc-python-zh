  - '[PAGE 266]


    +   - **Dimensionality reduction**: Dimensionality reduction techniques reduce
    the number of random variables to consider and can be divided into feature selection
    and feature extraction methods. Techniques such as Principal Component Analysis
    (PCA), t-Distributed Stochastic Neighbor Embedding (t-SNE), and Autoencoders are
    used for this purpose. These methods help visualize high-dimensional data, reduce
    noise reduction, and improve the efficiency of other learning tasks.

    - **Anomaly detection**: In anomaly detection, the task is to identify rare items,
    events, or observations that raise suspicions by differing significantly from
    the majority of the data. This is commonly used in fraud detection, network security,
    fault detection, and system health monitoring.

    - **Association rule learning**: This task aims to discover interesting relationships
    between variables in large databases. A common example is market basket analysis,
    where the goal is to find relationships between the purchasing behavior of customers.


    # Introduction to DL


    DL is a subset of ML, a field of AI that focuses on teaching machines to learn
    from data and make decisions. DL particularly excels at learning from large volumes
    of data and has been the driving force behind many recent advancements in AI.
    Here are the key aspects of DL:


    +   - **Inspired by the human brain**: DL models, particularly neural networks,
    are inspired by the structure and function of the human brain. They mimic the
    way biological neurons process information, although in a much-simplified form.

    - **Neural networks**: The fundamental building blocks of DL are ANNs. These networks
    consist of layers of interconnected nodes or “neurons,” each of which performs
    simple computations. The complexity of DL comes from the depth of these layers,
    hence the term “deep” in DL.

    - **Learning from data**: In DL, models learn directly from raw data. This ability
    is a significant departure from traditional ML algorithms, which often require
    manual feature extraction. DL algorithms automatically extract and learn features
    from raw data, making them particularly suited for tasks such as image and speech
    recognition.

    - **Handling complex patterns**: DL is especially powerful in identifying and
    handling complex, high-level patterns in data. This capability has led to breakthroughs
    in fields such as computer vision, natural language processing, and audio recognition.

    - **Large datasets and computational power**: DL typically requires large amounts
    of data and significant computational power. The advent of big data and advances
    in computing hardware, particularly **graphics processing units (GPUs)**, has
    been crucial in the advancement of DL.

    - **Applications**: DL is used in various applications, including self-driving
    cars, virtual assistants (such as Siri and Alexa), facial recognition systems,
    language translation services, and medical diagnosis.

    - **Frameworks and libraries**: There are several frameworks and libraries available
    for DL, such as TensorFlow, Keras, PyTorch, and others, which facilitate the development
    of DL models.


    DL has transformed the landscape of AI, making it possible to solve complex problems
    that were once considered beyond the reach of machines. Now, let’s dive into the
    architecture of the neural network model, which forms the next exciting topic
    in our exploration.


    # The architecture of an ANN'
  - '[PAGE 267]


    An ANN mimics the decision-making process of the human brain using **layers**
    of interconnected nodes, each resembling a neuron. The network begins with an
    **input layer**, (represented by x 1, x 2, … , x n) where the data is received.
    This data is then processed through one or more **hidden layers**, where each
    connection carries a weight (represented by w 1, w 2, … , w n). These weights
    amplify or attenuate the input signals, reflecting the importance of each input
    in the network’s decision-making process. Additionally, each neuron in the hidden
    layers has a bias term, often denoted as *b*. This bias allows the neuron to adjust
    its output independently of its input, providing an additional degree of freedom
    and enabling the network to better fit the data. Consequently, the combination
    of weights and biases is crucial in shaping the network’s predictions and behavior,
    as depicted in the following diagram:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_267_0.png)


    Figure 15.5 – ANN model


    The summation operator (Σ) in this diagram represents the process of summing these
    weighted inputs and the bias for each neuron in the hidden layer. This sum is
    then fed into an activation function within the neuron, which decides how much
    signal to pass forward. The activation function’s output can be thought of as
    the neuron’s response to the received stimuli.


    In the output layer, the final activation function is applied to the outputs from
    the last hidden layer to produce the network’s final output (ŷ). This output is
    a function of the combined activated signals from the hidden layer and is often
    used for tasks such as classification, regression, or other predictions. The type
    of activation function that’s used in the output layer depends on the specific'
  - '[PAGE 268]


    task – for instance, a softmax function for multi-class classification or a sigmoid
    function for binary classification.


    ANNs can be trained using both supervised and unsupervised learning approaches.
    The training process involves comparing the network’s output – often a form of
    prediction – with the expected target output to identify errors. The network then
    fine-tunes its weights through a learning rule that uses the magnitude of this
    error. This iterative adjustment enables the network to improve its output accuracy.


    Neural networks are structured into layers comprising numerous interconnected
    nodes, each featuring an activation function that introduces non-linearity, which
    is crucial for complex decision-making. Here are some of the most prevalent activation
    functions:


    +   - **Sigmoid**: Expressed as $1 / (1 + e^{-x})$, it takes a real-number input,
    $x$, and outputs a value between 0 and 1. It’s often used for probabilities in
    binary classifications.

    - **Hyperbolic Tangent (tanh)**: Defined by $tanh(x)$, this function accepts a
    real-number input, $x$, and outputs a value between -1 and 1, effectively scaling
    the input data.

    - **Rectified Linear Unit (ReLU)**: Represented by $max(0, x)$, this is a piecewise
    function that outputs either the input value itself if positive, or zero.


    The following diagram shows the graphs associated with each of the aforementioned
    activation functions:


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_268_0.png)'
