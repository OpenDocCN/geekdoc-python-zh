- md: "## Bugs that don't generate error messages\n\nAs we saw from the previous section,\
    \ there are some errors, such as those caused by indentation errors, that may\
    \ not always be caught by the debugger or throw the usual error messages. In this\
    \ section, I want to concentrate on one of the most common errors, which can wreak\
    \ havoc in our algorithms – errors caused by the incorrect use of local and global\
    \ variables.\n\n## Global variables\n\nA **global variable** is a variable that\
    \ we declare outside of functions. Seems simple enough, right? It is. However,\
    \ beware of overusing global variables, as they can cause a lot of problems with\
    \ your code and make debugging a pretty hard problem to solve.\n\nLet’s take a\
    \ look at a global variable and its use inside a function:\n\nch13_global.py\n\
    \n```\ncounter = 1\ndef counterF():\n    print(f'Counter value is {counter}.')\n\
    counterF()\n```\n\nAs you can see, we created a variable called `counter` and\
    \ then used the variable in a function called `counterF()`. Note that the variable\
    \ is outside the function. That means `counter` is a global variable.\n\nNow,\
    \ let’s look at an example of a local variable.\n\n## Local variables\n\nA **local\
    \ variable** is declared inside a function, and its value cannot be used outside\
    \ of a declaration of that function. Let’s look at the previous example, with\
    \ the variable now declared inside the function:\n\nch13_local.py\n\n```\ndef\
    \ counterF():\n    counter = 1\n    print(f'Counter value is {counter}.')\ncounterF()\n\
    ```\n\nAs you can see, the code should, and does, perform the same way the global\
    \ variable code did. Both will give us the following output:\n\n`Counter value\
    \ is 1.`\n\nSo, what is the difference, and why does it matter? For that, we’ll\
    \ need to think about this using a real scenario.\n\n## Errors when using global\
    \ and local variables\n\nLet’s think about global variables and what happens when\
    \ we use them. To do that, let’s think about a restaurant. In 2023, restaurants\
    \ can have the same menu for dine-in options and delivery applications, but they\
    \ can have different prices for each of the menus. Let’s say a restaurant sells\
    \ a menu item called “pasta alfredo.” If the variable gets defined globally and\
    \ is then used in multiple functions, each time a function is called that uses\
    \ that variable, subsequent uses of the variable will not be affected:\n\nch13_sample1.py\n\
    \n```\npastaAlfredo = 15.75\nmenu = {\n    pastaAlfredo\n    }\ndef priceIncrease(percentage):\n\
    \    for item in menu:\n        item = item + item * (percentage/100)\n      \
    \  print(round(item,2))\npriceIncrease(30)\n```\n\nNote that we’ve kept this extremely\
    \ simple and looked at only one menu item. Now, let’s point out a few important\
    \ notes:\n\n- The **pastaAlfredo** variable is a global variable\n- The **menu**\
    \ list is also a global variable\n- Both **pastaAlfredo** and **menu** are used\
    \ in the **priceIncrease** function\n\nOne more thing – we used `round()` to make\
    \ sure the resulting price was also rounded down to two decimal places.\n\nNow,\
    \ it seems to work fine, but let’s look at what happens if we have multiple functions\
    \ that use the same global variables:\n\nch13_sample2.py\n\n```\npastaAlfredo\
    \ = 15.75\nmenu = {\n    pastaAlfredo\n    }\ndef priceIncrease(percentage):\n\
    \    for item in menu:\n        item = item + item * (percentage/100)\n      \
    \  print(round(item,2))\ndef deliveryPrice():\n    for item in menu:\n       \
    \ print(f'Menu item price is {item}.')\npriceIncrease(30)\ndeliveryPrice()\n```\n\
    \nYou may have expected that the two printed values would be the same. However,\
    \ let’s look at the output:\n\n```\n20.48\nMenu item price is $15.75.\n```\n\n\
    Here’s what’s happening – we are using the global variable inside two functions,\
    \ but the value of the variable isn’t being updated. So, when we use it again,\
    \ it has the original value.\n\nIf we wanted to make sure that the price works\
    \ for both of the functions, we’d need to define it inside each of the functions.\
    \ It sounds like having a global variable would save us some trouble, but in reality,\
    \ using a global variable can simply break our code or provide us with outputs\
    \ that we were not expecting. Also, if we are not careful, our code may be posted\
    \ to applications with errors and show prices we didn’t intend to have.\n\nHaving\
    \ global variables makes our code harder to debug. Functions can change the values\
    \ of the variables and affect other functions. Because we can return values inside\
    \ functions, the values can then change globally as well. There are just too many\
    \ pitfalls in using a global variable rather than defining and using variables\
    \ inside their functions. However, this is not to say that you should never use\
    \ a global variable, but you should consider the implications of doing so and\
    \ determine whether your code should have a variable defined globally or locally\
    \ inside a function.\n\nAre these the only errors we’ll encounter? No. However,\
    \ we’ve now covered a few different types of errors and debugging in Chapter 5,\
    \ Errors, Chapter 8, Identifying Challenges within Solutions, and this chapter.\
    \ We will continue to explore errors in our algorithms as we learn more about\
    \ computational thinking and designing algorithms in multiple applications, but\
    \ for now, let’s move on to the next chapter, *Using Python in Experimental and\
    \ Data Analysis Problems*.\n\n## Summary\n\nIn this chapter, we learned about\
    \ some of the challenges in debugging code, including syntax errors that may not\
    \ be identified by Python and other errors associated with global and local variables.\n\
    \nWhen working with syntax, punctuation, and indentation, some errors will be\
    \ flagged by Python, while other errors may be harder to find. Always run your\
    \ code often, identify possible issues, make sure you check the mathematical aspects\
    \ of the code, and verify that the output values match your expected values. We’ll\
    \ make mistakes in our algorithms, so we need to ensure we are not unintentionally\
    \ creating larger issues by not debugging as frequently as we should.\n\nIn the\
    \ next part of this book, we’ll look at data. Python is an incredibly powerful\
    \ programming language, allowing us to create algorithms with the use of some\
    \ libraries that show us visual representations of data, analyze it, and even\
    \ help us create machine learning models for artificial intelligence. We’ll explore\
    \ many of these topics in the upcoming chapters."
  mdcn: "## 不产生错误信息的 Bug\n\n正如我们在上一节所看到的，有些错误（例如由缩进错误引起的）可能不会总是被调试器捕获，也不会抛出通常的错误信息。在本节中，我想集中讨论一种最常见的错误，它可能对我们的算法造成严重破坏——即由错误使用局部变量和全局变量引起的错误。\n\
    \n## 全局变量\n\n**全局变量**是在函数外部声明的变量。看起来很简单，对吧？确实如此。然而，请注意不要过度使用全局变量，因为它们可能会给你的代码带来很多问题，并使调试变得相当困难。\n\
    \n让我们来看一个全局变量及其在函数中的使用：\n\nch13_global.py\n\n```\ncounter = 1\ndef counterF():\n\
    \    print(f'Counter value is {counter}.')\ncounterF()\n```\n\n如你所见，我们创建了一个名为\
    \ `counter` 的变量，然后在一个名为 `counterF()` 的函数中使用了该变量。请注意，该变量在函数外部。这意味着 `counter` 是一个全局变量。\n\
    \n现在，让我们来看一个局部变量的例子。\n\n## 局部变量\n\n**局部变量**在函数内部声明，其值不能在该函数声明之外使用。让我们看看前面的例子，这次变量在函数内部声明：\n\
    \nch13_local.py\n\n```\ndef counterF():\n    counter = 1\n    print(f'Counter\
    \ value is {counter}.')\ncounterF()\n```\n\n如你所见，这段代码应该并且确实与全局变量代码的执行方式相同。两者都会给我们以下输出：\n\
    \n`Counter value is 1.`\n\n那么，区别是什么，为什么这很重要？为此，我们需要用一个实际场景来思考这个问题。\n\n## 使用全局变量和局部变量时的错误\n\
    \n让我们思考一下全局变量以及当我们使用它们时会发生什么。为此，让我们想想一家餐厅。在 2023 年，餐厅可以为堂食选项和外卖应用程序提供相同的菜单，但每个菜单的价格可能不同。假设一家餐厅出售一种名为“阿尔弗雷多意面”的菜单项。如果该变量被全局定义，然后在多个函数中使用，那么每次调用使用该变量的函数时，后续对该变量的使用将不会受到影响：\n\
    \nch13_sample1.py\n\n```\npastaAlfredo = 15.75\nmenu = {\n    pastaAlfredo\n \
    \   }\ndef priceIncrease(percentage):\n    for item in menu:\n        item = item\
    \ + item * (percentage/100)\n        print(round(item,2))\npriceIncrease(30)\n\
    ```\n\n请注意，我们保持了极其简单，只查看了一个菜单项。现在，让我们指出几个重要的注意事项：\n\n- **pastaAlfredo** 变量是一个全局变量\n\
    - **menu** 列表也是一个全局变量\n- **pastaAlfredo** 和 **menu** 都在 **priceIncrease** 函数中使用\n\
    \n还有一点——我们使用了 `round()` 来确保结果价格也四舍五入到两位小数。\n\n现在，它似乎工作正常，但让我们看看如果我们有多个函数使用相同的全局变量会发生什么：\n\
    \nch13_sample2.py\n\n```\npastaAlfredo = 15.75\nmenu = {\n    pastaAlfredo\n \
    \   }\ndef priceIncrease(percentage):\n    for item in menu:\n        item = item\
    \ + item * (percentage/100)\n        print(round(item,2))\ndef deliveryPrice():\n\
    \    for item in menu:\n        print(f'Menu item price is {item}.')\npriceIncrease(30)\n\
    deliveryPrice()\n```\n\n你可能预期这两个打印的值会是相同的。然而，让我们看看输出：\n\n```\n20.48\nMenu item\
    \ price is $15.75.\n```\n\n这里发生的情况是——我们在两个函数中使用了全局变量，但变量的值没有被更新。所以，当我们再次使用它时，它仍然是原始值。\n\
    \n如果我们想确保价格对两个函数都有效，我们需要在每个函数内部定义它。听起来使用全局变量可以省去一些麻烦，但实际上，使用全局变量可能只是破坏我们的代码或提供我们未预期的输出。此外，如果我们不小心，我们的代码可能会被发布到有错误的应用程序中，并显示我们不打算有的价格。\n\
    \n拥有全局变量使我们的代码更难调试。函数可以改变变量的值并影响其他函数。因为我们可以在函数内部返回值，所以这些值也可以全局改变。使用全局变量而不是在函数内部定义和使用变量，存在太多陷阱。然而，这并不是说你永远不应该使用全局变量，但你应该考虑这样做的影响，并确定你的代码应该有一个全局定义的变量还是在函数内部局部定义的变量。\n\
    \n这些是我们将遇到的唯一错误吗？不是。然而，我们已经在第 5 章《错误》、第 8 章《识别解决方案中的挑战》以及本章中涵盖了几种不同类型的错误和调试。随着我们学习更多关于计算思维和在多个应用程序中设计算法的知识，我们将继续探索算法中的错误，但现在，让我们继续下一章，*在实验和数据分析问题中使用\
    \ Python*。\n\n## 总结\n\n在本章中，我们学习了调试代码的一些挑战，包括 Python 可能无法识别的语法错误，以及与全局变量和局部变量相关的其他错误。\n\
    \n在处理语法、标点和缩进时，有些错误会被 Python 标记出来，而其他错误可能更难发现。请经常运行你的代码，识别可能的问题，确保你检查代码的数学方面，并验证输出值是否与你的预期值匹配。我们会在算法中犯错，因此我们需要确保我们不会因为调试不够频繁而无意中造成更大的问题。\n\
    \n在本书的下一部分，我们将研究数据。Python 是一种极其强大的编程语言，允许我们使用一些库来创建算法，这些库可以向我们展示数据的可视化表示、分析数据，甚至帮助我们为人工智能创建机器学习模型。我们将在接下来的章节中探讨许多这些主题。"
