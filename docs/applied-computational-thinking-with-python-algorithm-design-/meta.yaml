    In this section, we learned how to use a flowchart to create an algorithm. We
    also learned about building a dictionary for our algorithm.


    Before we move on, let’s look at the process of analyzing problems. We did this
    while we were creating this algorithm – that is, when we decomposed the problem.
    However, there are some key components of problem analysis that we should consider
    before our next chapter.


    # Analyzing problems


    When analyzing problems, there are some steps that we can keep in mind to help
    us ensure that we are creating the best possible algorithm:


    +   1. Clearly read and understand the problem.

    2. Identify the main purpose of the solution.

    3. Identify the constraints of the problem.

    4. Identify the decision-making flow.

    5. Establish the possible algorithms that could solve the problem.

    6. Identify the best possible algorithm tools for the problem.

    7. Test the algorithm pieces frequently.

    8. Verify that the algorithm provides the solution for the identified problem.


    If we go back to our problem, we went through this process throughout this chapter:


    +   - We had an online store with three items

    - Item cost was dependent on the quantity purchased

    - Item price was also dependent on personalization customizations

    - We created flowcharts to help us identify the decision process and how to code
    it

    - We verified our code through code lines that allowed us to check whether the
    algorithm was producing the correct response multiple times

    - We revisited and reordered pieces of code, as needed

    - We verified that the algorithm’s output was in line with the problem we had
    identified


    The preceding process bears repeating – that is, this is not a linear process.
    Sometimes, we’ll write an algorithm and then revisit the decision flowchart, make
    adjustments, and then tackle the algorithm again.


    The need for analyzing our problems at multiple *stopping points* becomes even
    clearer when we are looking at larger problems. *Should we write hundreds of lines
    of code before testing?* No! Imagine having 300 lines of code, only to find an
    error on *line 20* that is carried forward throughout the rest of the algorithm.'
