- md: "As you can see, the program took the input provided, a minimum of 3 and a maximum\
    \ of 6, and created a list of the cubes of the numbers in that range.\n\n## IMPORTANT\
    \ NOTE\n\nRemember that to get the exponents, we use the `**` symbol in Python.\
    \ So, `2**2` is 4, `3**4` is 81, and so on.\n\nRemember, control flow is the order\
    \ in which things are done. With `for` loops and `range()`, we are asking the\
    \ program to repeat things without having to enter each line separately, effectively\
    \ manipulating control flow to do things in loops rather than one line, one after\
    \ another after another.\n\nNow that we've looked at `for` loops and `range()`,\
    \ let's take a look at other ways we can iterate in Python.\n\n## Using other\
    \ loops and conditionals\n\nPython offers a variety of ways to iterate through\
    \ information in addition to the `for` loop. One of the most commonly used loops\
    \ is a `while` loop. When using a `while` loop, we're checking for a condition\
    \ constantly. Again, it's easier to understand this by looking at an example.\n\
    \nLet's say we are playing a game and ask the user to provide as many animals\
    \ as they can. We want to be able to do a few things:\n\n1. Check whether the\
    \ player has animals to add.\n2. If yes, append each animal to a list.\n3. If\
    \ no, end the program and provide the final list.\n4. Provide the final list and\
    \ a count of how many animals the player was able to enter.\n\nLet's take a look\
    \ at an algorithm that does the basics for this game:\n\n```python\nch11_whileLoop1.py\n\
    \nmyAnimals = []\nprint('Let\\'s see how many animals you can name. Get ready!')\n\
    readyPlayer = input('When you are ready to begin, type y. ')\nwhile readyPlayer\
    \ == 'y':\n    animalAdd = input('Name an animal. ')\n    myAnimals.append(animalAdd)\n\
    \    readyPlayer = input('Ready for the next one? Type y for yes or n for no.\
    \ ')\nhowMany = len(myAnimals)\nprint(f'You were able to name {howMany} animals.\
    \ Here\\'s your list: ')\nprint(myAnimals)\n```\n\nLet's break this code down\
    \ a bit:\n\n1. We created an empty list, `myAnimals`.\n2. Then, we asked the player\
    \ whether they were ready.\n3. If the answer was yes, we asked for an animal.\n\
    4. Then, we checked whether they had more to add.\n5. We checked how many items\
    \ were added to the list.\n6. We printed the list.\n\nNote that we had to use\
    \ a `while` loop and `if` statements. That's because we want to continue asking\
    \ the player to add animals until they are done or can't think of any more to\
    \ add. So, while the player can still add items, we want the program to keep asking\
    \ the question. But if the player is done, then they can say no to adding another\
    \ animal, therefore ending the program.\n\nNow, I want to be clear: this program\
    \ can be made a lot better. We could add a timer to see how many items can be\
    \ entered in 30 seconds. We could also add a condition that breaks the program\
    \ and explains why it does so when the player tries to enter an animal instead\
    \ of saying yes first. We could add a condition for when the player tries to enter\
    \ an animal that's already on the list. *A challenge for you would be to try to\
    \ add those components to the existing program!*\n\nBut let's take a look at what\
    \ this program looks like when we run it:\n\n```\nLet's see how many animals you\
    \ can name. Get ready!\nWhen you are ready to begin, type y. y\nName an animal.\
    \ bird\nReady for the next one? Type y for yes or n for no. y\nName an animal.\
    \ dog\nReady for the next one? Type y for yes or n for no. y\nName an animal.\
    \ cat\nReady for the next one? Type y for yes or n for no. y\nName an animal.\
    \ mouse\nReady for the next one? Type y for yes or n for no. y\nName an animal.\
    \ elephant\nReady for the next one? Type y for yes or n for no. n\nYou were able\
    \ to name 5 animals. Here's your list:\n['bird', 'dog', 'cat', 'mouse', 'elephant']\n\
    ```\n\nNote that the way this program is written requires us to answer whether\
    \ we want to add an animal each time. This is because the conditions will run\
    \ if we answer `yes` for as long as we answer `yes`. But once we answer `no`,\
    \ the program ends, giving us the list of animals and how many we were able to\
    \ name.\n\nNow, let's take a look at another `while` loop. This time, we'll check\
    \ whether or not the condition is `true`. Take a look at the following snippet:\n\
    \n```python\nch11_whileLoop2.py\n\nwhile True:\n    num = int(input('Please enter\
    \ an integer 0 through 9. '))\n    if num in range(0, 10):\n        print(num)\n\
    \    else:\n        print('That\\'s not in range. ')\n        break\n```\n\nIn\
    \ the preceding algorithm, the control flow dictates that we get asked for a number\
    \ between 0 and 9 repeatedly. The program will continue to ask until we make a\
    \ mistake. This is because it will continue to be true if we give it a number\
    \ between 0 and 9. Let's look at a sample output for this:\n\n```\nPlease enter\
    \ an integer 0 through 9. 0\n0\nPlease enter an integer 0 through 9. 1\n1\nPlease\
    \ enter an integer 0 through 9. 2\n2\nPlease enter an integer 0 through 9. 3\n\
    3\nPlease enter an integer 0 through 9. 4\n4\nPlease enter an integer 0 through\
    \ 9. 39\nThat's not in range.\n```\n\nNote that the program kept asking the same\
    \ question over and over again. This is not helpful sometimes if the user doesn't\
    \ know how to break the cycle. We could potentially add a line to our statement\
    \ so that it asks the question but provides a hint. Take a look at the edited\
    \ code:\n\n```python\nch11_whileLoop3.py\n\nwhile True:\n    num = int(input('Please\
    \ enter an integer 0 through 9. Tired? Type a number out of range. '))\n    if\
    \ num in range(0, 10):\n        print(num)\n    else:\n        print('That\\'s\
    \ not in range. ')\n        break\n```\n\nAs you can see, we are now telling the\
    \ user that if they get tired of providing ranges, then they can opt out by providing\
    \ an input outside of the range. While this example doesn't seem very useful,\
    \ think of all the applications you could have. This type of algorithm can be\
    \ used for card games, for example. You could also use something like this to\
