    # Automata theory


    Automata theory is one of the most fascinating topics in theoretical computer
    science. It refers to the study of machines and how calculations can be completed
    reliably and efficiently. Automata theory involves the physical aspects of simple
    machines, as well as logical processing. So, *what exactly are automata used for
    and how does it work?*'
  merge: -1
  pgno: 42
- img_proc: true
  md: 'Automata are devices that use predetermined conditions to respond to outside
    input. When you look at your thermostat, you’re working with an automata. You
    set the temperature you want and the thermostat reacts to an outside source to
    gather information and adjust the temperatures accordingly. Another example of
    automata is surgical robots. These robots can improve the outcomes of surgeries
    for patients and are being improved upon constantly. Since the goal of automata
    theory is to make machines that are reliable and efficient, it is a critical piece
    in developing artificial intelligence and smart robotic machines such as surgical
    robots.


    # Formal language theory


    **Formal language theory** is often tied to automata theory in computer science.
    Formal language theory involves studying the syntax, grammar, vocabulary, and
    everything else involving a formal language. In computer science, formal language
    refers to the logical processing and syntax of computer programming languages.
    Concerning automata, the machines process the formal language to perform the tasks
    or code provided for them.


    # Symbolic computation


    **Symbolic computation** is a branch of computational mathematics that deals with
    computer algebra. The terms *symbolic computation* and *computer algebra* are
    sometimes used interchangeably. Some programming software and languages focus
    on the symbolic computations of mathematics formulas. Programs that use symbolic
    computation perform operations such as polynomial factorization, simplifying algebraic
    functions or expressions, finding the greatest common divisor of polynomials,
    and more.


    In this book, we will use computer algebra and symbolic computation when solving
    some real-world problems. Python allows us to not only perform the mathematical
    computations that may be required for problems but also explore graphical representations
    or models that result from those computations. As we explore solutions to real-world
    problems, we will need to use various libraries or extensions of the Python programming
    language. More on that will be provided in *Part 2, Applying Python and Computational
    Thinking*, of this book, where we will explore the Python programming language
    in greater detail.


    # Computational geometry'
  merge: -1
  pgno: 43
- img_proc: true
  md: 'Like symbolic computation, **computational geometry** lives in the branch of
    computer science that deals with computational mathematics. The algorithms we
    study in computational geometry are those that can be expressed with geometry.
    The data is analyzed via geometric figures, geometric analysis, data structures
    that follow geometric patterns, and more. The input and output of problems that
