    As you can see from the preceding problem, pattern recognition is important in
    order to find a generalized pattern and write our algorithm. Now, let’s look more
    closely at pattern generalization.


    # Generalizing patterns


    Once we have recognized our pattern, we need to go through **pattern generalization**
    and **abstraction**. That is, we want to make sure that the solution we come up
    with can be used for multiple instances of the problem we have identified. Pattern
    generalization can be something as simple as writing a basic linear mathematical
    algorithm, as we did for the cost of a party, where the cost per child was $12.
    So, the cost for any number $k$ of children would be given by $12k$. But pattern
    generalization can be much more than that.


    If we go back to *Problem 1*, where you could choose $250 or you could choose
    your height in quarters, our pattern **generalization** would allow us to check
    for anyone’s height against the $250 in order to determine whether you would get
    more money by choosing the cash option or by choosing the quarters.


    **Abstraction** lets us focus on the things we need and discard things we do not
    need in order to create the best algorithm for our problem. Now, depending on
    what we decide we need, we can add or remove some conditions.


    For example, if I am a contestant, I only really want to know what option gives
    me more money. I do not care about total wins, who’s choosing $250, who’s choosing
    height in quarters, and so on. But if I’m the radio station, I may want to know
    the sum, the comparison to the baseline, and much more. I would have to choose
    that baseline and maybe even graphically show what has happened over time. That
    is all part of the abstraction process. When you are solving a computational thinking
    problem, you are also determining what matters and what does not matter to your
    solution and algorithm.


    In the simplest form of this problem, if you are a contestant, you want to know
    what your best possible case for winning is. If you choose $250 but your height
    makes it so that your height in quarters is more than $250, you would want to
    know. If you are working at the radio station, you may want to track more than
