  md: '# Problem 4 – savings and interest


    Now we have a new problem. A bank pays compound interest at a rate of x% per month.
    *What will be the payout after a number of years if you deposit any given amount?*


    Let’s **decompose** this problem. First of all, we know interest is compounded
    monthly. First, let’s talk about compound interest. The interest on an investment
    is the percentage that is paid out in a time period. Compound interest means that
    the interest pays out on the initial amount plus interest each time. Compound
    interest is a **pattern**. In fact, a formula exists for it.


    The things I do not know are what percentage the bank is paying out, the amount
    deposited, or the number of years it’ll be deposited for. So, we will need to
    write a program that addresses all of the possibilities. This is **pattern generalization**.
    What we do know is that the interest is compounded monthly. There is actually
    a mathematical formula for this:


    A = P (1 + r / n) nt


    Let’s talk about the terms from the preceding equation:


    +   - *A* is the total amount

    - *P* is the principal amount – that is, the initial deposit

    - *r* is the interest rate (keep in mind that for 3%, the interest is written
    as 0.03, for example)

    - *n* is the number of times interest is compounded per year

    - *t* is the number of years the deposit goes untouched


    Because there is a mathematical algorithm, we can now create a program for this
    using the formula. However, we will need to make sure whoever runs the program
    knows what it is we are asking for with regard to all the inputs. We are asking
    for a few things:


    +   - *What amount is being deposited?*

    - *At what rate is the bank paying?*

    - *For how many years will the money be deposited?*


    We do know the *n* in the formula. That *n* is 12 because this is a monthly compound
    interest. That means it will compound 12 times each year. So, *n* = 12.


    Now it is time to write the program for this:'
