    \n在继续之前，让我们再看一个问题，以再次梳理设计过程。\n\n## 问题3 – 延迟与Python\n\n我最初遇到的一个Python问题是创建一个算法，该算法会根据所选颜色做出不同反应。这类似于创建交通信号灯时的情况。每个灯都有不同的延迟。因此，让我们创建一个解决此问题的算法。为了保持交通信号灯的主题，我们将让用户在绿色、黄色和红色之间选择颜色。所以，让我们将一些假设整合如下：\n\
    \n- 绿色将意味着5秒的延迟\n- 黄色将意味着2秒的延迟\n- 红色将意味着4秒的延迟\n\n这些特定的延迟没有特别的理由；我只是想让它们都保持在5秒以下。现在，假设我们正在玩一个游戏，用户必须选择一种颜色。如果他们选择黄色或红色，他们将获得一个延迟，然后会被再次询问。目标是获得程序的*你赢了！你现在可以走了*消息。因此，让我们为此创建一个流程图，如下所示：\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_138_0.png)\n\n图7.7 – 交通信号灯游戏流程图\n\n\
    从流程图中可以看出，如果你选择黄色或红色，游戏将重新开始。现在我们已经了解了游戏的基本框架，我们必须对其进行编码。\n\n## 重要提示\n\n为了能够使用延迟，我们需要导入`time`库。使用`import\
    \ time`命令来完成此操作。要包含延迟，我们使用`time.sleep()`。\n\n让我们看一段代码片段：\n\nch7_sleep.py\n\n```\n\
    import time\nprint(\"Let's play a game. Choose a color to learn your destiny.\
    \ Choose wisely or you'll have to start over. \")\nwhile True:\n    color = input(\"\
    Choose a color: red, green, or yellow. \")\n    if color == \"green\":\n     \
    \   print(\"You must wait 5 seconds to learn your fate.\")\n        time.sleep(5)\n\
    \        print(\"You win! Excellent choice!\")\n        break\n    elif color\
    \ == \"yellow\":\n        print(\"You must wait 2 seconds to learn your fate.\"\
    )\n        time.sleep(2)\n        print(\"You lose! You must start over.\")\n\
    \    else:\n        print(\"You must wait 4 seconds to learn your fate.\")\n \
    \       time.sleep(4)\n        print(\"You lose! You must start over.\")\n```\n\
    \n如你所见，该算法包含我们在前面章节中讨论循环、布尔语句等内容时看过的部分代码。这段特定的代码在用户未赢得游戏的情况下会返回开头进行三轮。我们使用了`if-elif-else`语句来处理颜色场景。游戏进行三轮的输出如下所示：\n\
    \n```\nLet's play a game. Choose a color to learn your destiny. Choose wisely\
    \ or you'll have to start over.\nChoose a color: red, green, or yellow. yellow\n\
    You must wait 2 seconds to learn your fate.\nYou lose! You must start over.\n\
    Choose a color: red, green, or yellow. red\nYou must wait 4 seconds to learn your\
    \ fate.\nYou lose! You must start over.\nChoose a color: red, green, or yellow.\
    \ green\nYou must wait 5 seconds to learn your fate.\nYou win! Excellent choice!\n\
    ```\n\n从游戏输出中可以看出，三轮都进行了。每次延迟都根据语句发生，你必须自己测试，因为我无法用文本显示时间延迟。\n\n有了流程图，创建这个算法比我在阅读问题后立即开始编码要简单得多。习惯在编写算法之前详细阐述所需的过程非常重要。设计解决方案可能是一个漫长而乏味的过程，但我们开始时越有条理，我们的算法就越好。\n\
    \n## 总结\n\n在本章中，我们讨论了如何设计、绘制图表并创建问题的解决方案。我们探讨了设计思维的非线性过程，以了解如何最好地设计解决方案。设计思维模型是一个五步流程：**共情**、**定义**、**构思**、**原型**和**测试**。在计算思维过程中使用这五步流程可以帮助我们避免许多问题和陷阱。\n\
    \n我们还进行了头脑风暴并创建了流程图，以建立我们算法的决策过程来解决问题。\n\n在下一章中，我们将运用我们的算法设计和解决方案设计知识，来识别解决方案中的挑战和调试程序。\n\
    \n# 8\n\n## 识别解决方案中的挑战\n\n在本章中，我们将评估算法和图表，学习如何处理一些常见错误，并确定是否可以对现有算法进行可能的调整以简化它。我们将根据问题描述评估解决方案，以验证解决方案是否与问题一致。我们将学习识别解决方案设计过程中的陷阱。请注意，随着我们更深入地探讨**Python**编程语言，我们将在本书的*第二部分，应用Python和计算思维*和*第三部分，使用计算思维和Python进行数据处理、分析和应用*中扩展本章的内容。\n\
    \n为了学习调试，让我们提醒自己，计算思维过程不是线性的。即使我们从原始问题出发，我们有时也会重新定义问题，或者由于算法适用的群体发生变化，或者我们想调整算法设计，而需要调整概括性。但有时，我们在算法设计和使用后才会遇到问题。根据我们的角色，我们将评估算法的错误、所需的更改等。了解如何查找和分析错误可以帮助我们，无论我们是Python绝对初学者还是职业生涯深入者。\n\
    \n在本章中，你将学习如何识别和修复程序中的错误，以及如何避免算法设计中的陷阱。\n\n在本章中，我们将涵盖以下主题：\n\n- 识别算法设计中的错误\n\
    - 调试算法\n- 比较解决方案\n- 完善和重新定义解决方案\n\n## 技术要求\n\n以下是本章将使用的完整源代码：\n[https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter08](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter08)。"
