    \n## 数据转换\n\n**pandas** 允许我们转换数据。以下是我们可以转换数据的一些方式：\n\n- **归一化**将值转换到一个新的范围；最流行的是**最小-最大归一化**，如下所示：\n\
    \nx_scaled = (x – min(x)) / (max(x) – min(x))\n\n- **属性选择**是通过用不同的属性或属性替换一个属性来转换数据的过程。\n\
    \n- **概念层次结构**实际上是通过减少数据来完成的转换。它是通过用更高层次的概念（如限定词：短、长、极长）替换数字（10、15、40）等概念来完成的。\n\
    \n在下一节中，我们将简要了解数据缩减。\n\n## 数据缩减\n\n**数据缩减**指的是一个过程，它允许我们从数据集中获得相似甚至相同的结果，但前提是减少了数据的表示量。\n\
    \n我们不会在这里深入探讨所有概念，因为通过示例来看会容易得多，但以下是进行数据缩减的一些方式：\n\n- 从数据集中移除无效数据\n- 为不同级别的数据创建摘要\n\
    \n将移除无效数据视为处理任何异常值。数据可能输入错误，条件可能不是最优的，或者类似情况。当我们有一个数据点不适合整个数据集，特别是当我们有大量数据点可以与之比较时，我们可以将该数据点作为无效或异常值移除。\n\
    \n在创建不同级别的摘要时，我们正在聚合数据集，并在每个级别进行测试和生成摘要。假设你有100个数据点（数据集通常有数千个，但用较小的数字更容易解释）。我们可以为前20个数据点创建一个摘要。然后，我们可以对前40个、前60个等等做同样的事情。通过比较，我们可以看到趋势，并使用数据集的这些较小子部分来进行预测，前提是趋势成立。这就是数据缩减的作用——简化我们的数据集，同时仍然获得准确的结果。\n\
    \n在本节中，我们学习了如何处理需要清洗的数据。我们探索了各种清洗数据的方法，包括通过消除或替换缺失点来处理缺失数据。此外，我们探讨了噪声数据的概念，并发现了处理数据集中数据噪声相关问题的策略。最后，我们探讨了数据缩减技术，了解我们如何通过移除无效数据和生成聚合数据摘要来提高结果准确性。\n\
    \n这作为处理数据时所涉及任务的入门概述。我们没有探讨其他转换，但这里有一些你可以研究的：映射、重命名、切割和创建虚拟数据。这些额外的转换可以成为你数据分析工具包中的强大工具，使你能够进一步操作和准备数据，以获得有意义的见解和分析。这只是我们在处理数据时所做事情的类型介绍。因此，让我们看一个例子，以便我们将其中一些内容放入上下文中。\n\
    \n## 使用可视化处理、分析和总结数据\n\n我们现在从事房地产行业，既然我们想做得好，我们真的想构建一个算法来帮助我们分析数据和预测房价。但让我们思考一下。我们可以非常广泛或狭窄地定义这个问题。我们可以对一个州的所有房屋或一个社区中三间卧室以上的房屋进行定价分析。*执行分析重要吗？也许。但这不正是我们想研究这个问题的原因吗？*\n\
