    # Using data libraries in Python


    In this section, we’re going to look at some libraries and packages that we can
    use with the Python programming language. We will refer to *packages* and *libraries*,
    using both terms interchangeably sometimes, but for clarity, a package contains
    modules, while a library is a collection of packages.


    We use Python libraries much like we use built-in modules, such as the `math`
    module we used in *Chapter 4, Understanding Logical Reasoning*. In our source
    code, we imported the `math` module by using `import math` before creating the
    algorithm. In the example in the *Applying inductive reasoning* section of *Chapter
    4, Understanding Logical Reasoning*, we used the `math.floor()` function of the
    module, which allowed us to round a number down, regardless of what the decimal
    value was. When we import modules or libraries in Python, we are tapping into
    additional functions and capabilities that allow us to take the programming language
    much further.


    *So, what is a library?* In Python, a **library** refers to chunks of code that
    can be reused. Libraries contain a collection of modules. There are many libraries
    available for Python, and like Python itself, a large number of these libraries
    are **open source**, which means they can be downloaded and used by anyone. Because
    we’re going to be working with data in this chapter, we’re going to stick with
    **pandas**, NumPy, and Matplotlib for now. However, there are many other libraries
    and many types of libraries. For example, there are **graphical user interface
    (GUI)** frameworks, such as **Kivy**, **tkinter**, **PyQt**, **PySimpleGUI**,
    and others. For gaming, there are other libraries, such as **Pygame** and **Pyglet**.
    In machine learning, the **TensorFlow** library is a popular tool developed by
    **Google** in collaboration with the **Brain** team. Another library that’s used
    for deep learning, or end-to-end machine learning, is **PyTorch**. But these are
    only some examples of the libraries that are available and the areas that use
    them.


    # Installing libraries


    Although the `math` module is built into the Python language, libraries need to
    be installed. The program we use to install libraries is the **pip installer**.
    This is a command that’s built into Python and runs from the **Command Prompt**
    window. One caveat I will mention here is that permissions and where we install
    Python matter, so if your computer belongs to your employer, make sure that the
    Python program paths have been adapted as needed so that you can access all the
    modules and install libraries. The permissions may vary.'
