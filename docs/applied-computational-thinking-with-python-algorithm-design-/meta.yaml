    \n- **t**：文本（这是默认值，因此如果未指定，则默认为文本）\n- **b**：二进制（用于二进制模式——例如，图像）\n\n看看以下代码。由于此代码是单行且特定于每个路径，因此未包含在代码库中：\n\
