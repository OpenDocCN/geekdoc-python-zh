    \n## Using additional libraries for plotting and analysis\n\nBefore we end this\
    \ chapter on experimental data, the use of libraries, and plotting and analyzing\
    \ data, let’s look at three more libraries that are helpful in data analysis and\
    \ plotting. These are not the only libraries for analysis and plotting, nor will\
    \ they be the only ones we’ll explore throughout the rest of this book:\n\n- **Seaborn**\
    \ is a library that’s used for data visualization and is built on top of Matplotlib.\n\
    - **SciPy** is a library that’s used for linear algebra, optimization, statistics,\
    \ and more. It’s built on top of NumPy.\n- **Scikit-Learn** is a library that’s\
    \ used in machine learning. It’s part of the SciPy stack.\n\nIn the following\
    \ chapters, we’ll dive deeper into the use of some of these libraries as we tackle\
    \ some of the application problems that require their use. For now, let’s take\
    \ a quick look at what each of these libraries can help us with when looking at\
    \ datasets.\n\n## Using the Seaborn library\n\nThe Seaborn library provides us\
    \ with more features on top of the Matplotlib library’s visualization features.\
    \ There are many things we can do with the Seaborn library, which we usually import\
    \ as `sns` to simplify the code. Here are some of the common uses of the library:\n\
    \n- Correlations\n- Aggregate statistics (observing categorical values)\n- Linear\
    \ regression plots for dependent variables\n- Creating abstractions and grids\
    \ with multiple plots\n\nOne of the greatest things about Seaborn is that it also\
    \ works well with `pandas`. Creating statistical representations of data and visualizations\
    \ is easy when Seaborn is combined with `pandas` DataFrames.\n\nSeaborn has some\
    \ sample datasets that can be accessed – that is, they are built in – if we know\
    \ the name of the dataset. We can call the built-in dataset with a simple line\
    \ of code. Let’s take a look at the following snippet of code and resulting graphics:\n\
    \nch14_seabornSample.py\n\n```\n# Import seaborn\nimport seaborn as sns\n# Import\
    \ matplotlib.pyplot\nimport matplotlib.pyplot as plt\nsns.set_style('darkgrid')\n\
    # Load an example dataset\nexercise = sns.load_dataset(\"exercise\")\n#Create\
    \ the plot\nsns.relplot(\n    data=exercise,\n    x='id', y=\"pulse\", col=\"\
    time\",\n)\nplt.show()\n```\n\nFrom the preceding code, we can see that we've\
    \ set a style for our plots. We added a 'darkgrid' style to our plots and called\
    \ it after importing the library. Seaborn has a few built-in styles: white, whitegrid,\
    \ dark, darkgrid, and ticks. The following figure shows the resulting plots from\
    \ Seaborn:\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_252_0.png)\n\nAs you can\
    \ see, we would be able to analyze whether or not there are correlations between\
    \ pulse and time or any other variables.\n\nWe can also use pair plotting to show\
    \ whether there are correlations between the variables. Let's use another built-in\
    \ dataset, flights, to see what the pair plotting does:\n\nch14_pairplotSNS.py\n\
    \n```\n# Import seaborn\nimport seaborn as sns\n# Import matplotlib.pyplot\nimport\
    \ matplotlib.pyplot as plt\nsns.set_style('darkgrid')\n# Load an example dataset\n\
    flights = sns.load_dataset(\"flights\")\n#Create the plot\nsns.pairplot(\n   \
    \ data=flights,\n)\nplt.show()\n```\n\nThe preceding snippet of code is very similar\
    \ to the previous one for the exercise data. The difference is that we call the\
    \ pairplot() function in this case. The following figure shows our resulting grid\
    \ of plots:\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_253_0.png)\n\nFigure 14.9\
    \ – Pair plotting using Seaborn\n\nNote that the number of passengers and the\
    \ years seem to be positively correlated – that is, there are more passengers\
    \ in later years than in the early years of flights. When analyzing this dataset,\
    \ we would probably want to make a prediction, such as stating that more passengers\
    \ would be flying in modern times.\n\nWe could use these graphs to help us make\
    \ predictions. That said, this data is fairly old, so we’d need more updated data\
    \ to make accurate predictions. The more data we have, the better. For massively\
    \ large amounts of data, we can also use machine learning, which we will briefly\
    \ explore in *Chapter 15, Introduction to Machine Learning*, and *Chapter 16,\
    \ Using Computational Thinking and Python in Statistical Analysis*, so that we\
    \ can learn how to manipulate and learn from the data.\n\nBefore we move on to\
    \ another library, there’s one more thing you should know about the pair plots\
    \ – if there are 10 columns of data, the pair plot will compare each column with\
    \ itself, then every other column available, creating a pretty large display with\
    \ all the compared variables. We will look at pair plotting in more detail in\
    \ *Chapter 16, Using Computational Thinking and Python in Statistical Analysis*."
