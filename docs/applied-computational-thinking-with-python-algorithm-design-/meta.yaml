    and then information about mammals and viviparity. `monkey` is defined using the
    same description as the `mammals` class, but then includes a different statement
    for viviparity. The same thing happens with `platypus`. The `monkey` and `platypus`
    classes are child classes of the `mammals` class.


    The three classes, the parent and the two children, are then simplified into a
    variable so that they can be used by calling that variable. Finally, the algorithm
    prints description and viviparity statements for the parent and the two children.
    Let’s take a look at that output:


    ```

    Mammals are vertebrate animals.

    Mammals are viviparous, but some are not.

    Mammals are vertebrate animals.

    Monkeys are viviparous.

    Mammals are vertebrate animals.

    The platypus is not viviparous. It''s an egg-laying mammal.

    ```


    As you can see, all three classes used the same description. That’s because we
    didn’t make any changes to the description for the children. When we defined the
    classes, we only changed the parts we wanted to be different from the parent class.
    Everything else is inherited from the parent class.


    Parent classes and children are widely used in Python for multiple purposes. For
    example, in gaming, you may have enemies that all have some of the same characteristics.
    Rather than defining each enemy with all the characteristics separately, we can
    create a parent class that includes all common characteristics, then change the
    individual characteristics of all the enemies as child classes. This is just one
    of the ways in which inheritance can be used. There are many other uses, and it
    helps us save time and avoid errors by only defining them with the parent classes.


    Now that we’ve had some experience with classes and learned about OOP, let’s wrap
    up the chapter.


