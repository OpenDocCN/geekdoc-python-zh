  - '[PAGE 134]


    When we are presented with problems, we want to create solutions that address
    the information we have been provided, with an algorithm that provides everything
    needed and that is easily understood by the user. In this section, we’ll take
    the content we’ve been learning in this chapter to design solutions to problems.


    As we create these solutions using our brainstorms and flowcharts, we should be
    considering the following:


    +   - Does the solution we have planned address the problem?

    - Does the solution design show a clear path for the algorithm to be successful?


    And if the answers to those questions are yes, then we can start coding the solution.
    Remember—we need to test the algorithm as often as we can. Here are some things
    to keep in mind when writing the algorithm:


    +   - Add comments to identify sections you may need to go back to and that help
    to identify and define your variables, dictionaries, functions, and any key components

    - Check that you don’t have any errors, such as those discussed in Chapter 6,
