- md: "## Summary\n\nIn this chapter, we went over the computational thinking process\
    \ one more time by working through a more complex scenario and interpretations\
    \ of that scenario. We learned how to decompose the problem provided, then identify\
    \ patterns, generalize them, and design algorithms. We used some of what we've\
    \ learned throughout the book to write an algorithm that provided the information\
    \ we needed.\n\nThe computational thinking process helps us develop skills that\
    \ make our algorithm planning much easier. By walking through that process, we\
    \ learn more about how Python's capabilities and functions may help us in particular\
    \ scenarios. We also learned how to generalize patterns, sometimes in simple equations\
    \ for a problem, but other times in creating algorithms that can help us in multiple\
    \ scenarios without having to recreate them each time. As we got to learn more\
    \ about Python, we got more comfortable with the computational thinking process\
    \ in this last chapter of *Part 2, Applying Python and Computational Thinking*.\n\
    \nIn *Part 3, Data Processing, Analysis, and Applications Using Computational\
    \ Thinking and Python*, we will move on to other capabilities of Python to deal\
    \ with data processing, analysis, and applications using computational thinking\
    \ elements. In the next chapter, we’ll start to look at data and how we use Python\
    \ to analyze data, create visual representations, and write algorithms that work\
    \ with experimental data.\n\n## 13 Debugging\n\nIt is time for us to dedicate\
    \ a little more time to debugging our algorithms. In *Chapter 5, Errors*, we looked\
    \ at some of the errors we can get when writing code. In *Chapter 8, Identifying\
    \ Challenges with Solutions*, we also saw some of the debugging tools that are\
    \ built into Python to find errors in our code. Now, we are going to go deeper\
    \ into algorithm debugging, looking at some problem situations and proposed algorithms,\
    \ determining what causes the errors we are alerted to in the console, as well\
    \ as those errors that we know exist because the outcome is not what is expected\
    \ but we do not get an error message from Python. Some of these bugs may not be\
    \ flagged by Python in any way, which is why we will now focus on some specific\
    \ errors and how to avoid them. Debugging is a critical skill in programming,\
    \ and it is impossible to cover all scenarios, but we will show some of the things\
    \ you can look for when writing your solutions.\n\nIn this chapter, we will cover\
    \ the following topics:\n\n- Error messages and identifying bugs\n- Bugs that\
    \ don't generate error messages\n\n### Technical requirements\n\nHere is the full\
    \ source code used throughout the book: [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter13](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter13).\n\
    \n### Error messages and identifying bugs\n\nWhen we talk about debugging, we\
    \ are talking about finding errors, or bugs, in our code. Remember that you will\
    \ almost always encounter bugs in your code as you write it. I've never written\
    \ complex code without errors on the first try. It's just part of the process,\
    \ so do not get frustrated.\n\n### Errors in punctuation\n\nNow, bugs can be pretty\
    \ simple, such as having a missing punctuation symbol. For example, let's take\
    \ a look at the code here:\n\n```python\nabs(3.5\n```\n\nIf run that code, we’ll\
    \ get an error message, as follows:\n\n```\n'(' was never closed\n```\n\nEasy\
    \ fix, right? Let’s take a look:\n\n```python\nabs(3.5)\n```\n\nBut now when I\
    \ run the code, I get nothing. There’s no answer, no error message, nothing. That\
    \ means that if I want to see that value, I need to print it to the console. Or\
    \ if I need to use that value, I’ll need to save that value as a variable. Here’s\
    \ what it would look like if I used a `print` statement:\n\n```python\nprint(abs(3.5))\n\
    ```\n\nAnd here is what I would get as the output when I run that algorithm:\n\
    \n```\n= RESTART: C:/Users/.../chapter 13/ch13_absError1.py\n3.5\n```\n\nI should\
    \ note, however, that this is only necessary if I’m running code from a file.\
    \ If I’m inside a Python IDLE shell, then I can simply use `abs(3.5)`, and it\
    \ will return the value without the need for a `print` statement, as seen in *Figure\
    \ 13.1*.\n\n![Figure 13.1 – The result from the IDLE shell](img/b193dd901f0befc8cf3c9fa5265db3da_228_0.png)\n\
    \nAs you can see, we are always thinking about what we need, how we need to use\
    \ values in an algorithm, what our next steps are, and so on. An incredibly important\
    \ aspect of debugging is to run our code often. Every piece of code should be\
    \ run so that we can identify possible bugs as early as possible. Remember, it\
    \ is easier to debug 10 lines of code than it is to debug 100 or 1,000 lines of\
    \ code.\n\nAnother error we can often come across is with colons. In the following\
    \ code, we forgot a colon. Can you tell me where it is?\n\n```python\nfor i in\
    \ range(50):\n    if i < 30:\n        print(i + 2)\n    elif i < 40:\n       \
    \ print(i * 2)\n    else\n        print(i * 100)\n```\n\nIf you look closely,\
    \ the colon after `else` is missing. Thankfully, Python will alert us to this\
    \ when we try to run this code. You can see the error in *Figure 13.2*.\n\n![Figure\
    \ 13.2 – An error message for the missing colon](img/b193dd901f0befc8cf3c9fa5265db3da_229_0.png)\n\
    \nAlso, Python is very helpful in highlighting the line of code this error refers\
    \ to, as seen in *Figure 13.3*.\n\n```python\nfor i in range(50):\n    if i <\
    \ 30:\n        print(i + 2)\n    elif i < 40:\n        print(i * 2)\n    else:\n\
    \        print(i * 100)\n```\n\nThe error messages in Python have increasingly\
    \ improved. In previous versions, we sometimes had to identify what the syntax\
    \ error was, look for lines above the one highlighted, and so on. The error processing\
    \ in Python now provides more directed messages so that we can debug our code\
    \ with more ease.\n\nLet’s now take a look at another very common issue with Python\
    \ coding – indentation.\n\n### Errors with indentation\n\nPython is a fairly simple\
    \ language to write with, particularly because it uses indentation to identify\
    \ the levels of code rather than a lot of symbols, such as brackets and parentheses,\
    \ to determine code order. This comes with a bit of a pitfall. If we have an indentation\
    \ error, then our code won’t process the way we would like it to. Let’s take a\
    \ look at a simple example:\n\n```python\nfor i in range(50):\n    if i < 30:\n\
    \        print(i + 2)\n    elif i < 40:\n        print(i * 2)\n```"
