    \ the programming language and how we use computational thinking to solve problems.\n\
    \n## Supervised learning\n\nSupervised learning is a type of ML where the algorithm\
    \ is trained on a labeled dataset. In this context, “labeled” means that each\
    \ example in the training set is paired with the correct output. The supervised\
    \ learning algorithm analyzes the training data and produces an inferred function,\
    \ which can be used for mapping new examples.\n\nHere are the key aspects of supervised\
    \ learning:\n\n- **Learning from labeled data**: It involves using a set of known,\
    \ labeled examples to train the model. For instance, in a dataset of email messages,\
    \ each email will be labeled as “spam” or “not spam,” and the model learns to\
    \ classify emails into these categories.\n- **Predictive modeling**: After training,\
    \ the model aims to predict the correct labels for new, unseen data. For example,\
    \ it could predict whether new emails are spam.\n- **Types of tasks**: There are\
    \ two main types of tasks in supervised learning:\n    - **Regression**: The left\
    \ plot shown in *Figure 15.4*, which is a scatter plot with a line, indicates\
    \ the trend or relationship between variables. It’s used when the output variable\
    \ is a real or continuous value, such as house prices or temperatures, aiming\
    \ to predict a quantity.\n    - **Classification**: The right plot shown in *Figure\
    \ 15.4*, which shows two distinct groups of data points separated by a dashed\
    \ line, represents the decision boundary for categorization. It applies when the\
    \ output variable is a category, such as “pass” or “fail” or “spam” or “not spam,”\
    \ and the goal is to predict a category.\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_265_0.png)\n\
    \nFigure 15.4 – Plots of regression and classification\n\n- **Feedback system**:\
    \ The learning process is “supervised” because the algorithm gets feedback on\
    \ its predictions. In the training phase, the model makes predictions on the training\
    \ data and is corrected by the teacher (the known labels) when its predictions\
    \ are wrong.\n- **Use cases**: It is used in numerous real-world applications,\
    \ including image and speech recognition, medical diagnosis, spam filtering, and\
    \ market prediction.\n\nIn supervised learning, the performance of the model is\
    \ evaluated based on its ability to accurately predict the labels of new, unseen\
    \ data that was not part of the training set. The better it can generalize from\
    \ the training data to new data, the better the supervised learning model is considered\
    \ to be. Now, let’s move on to unsupervised learning.\n\n## Unsupervised learning\n\
    \nUnsupervised learning is a type of ML that deals with unlabeled data. The goal\
    \ is to discover hidden patterns and relationships within the dataset without\
    \ any pre-existing labels or supervision. The algorithms must make sense of the\
    \ data by identifying its structure and extracting features without any explicit\
    \ instruction on what to look for.\n\nHere are some key points about unsupervised\
    \ learning:\n\n- **Handling unlabeled data**: Unsupervised learning algorithms\
    \ are designed to work with datasets that do not have labeled outcomes or responses.\
    \ The primary goal is to explore the structure of the data to extract meaningful\
    \ information without the guidance of a specific target variable.\n- **Pattern\
    \ discovery and feature extraction**: These algorithms focus on identifying patterns,\
    \ correlations, and features within the data. This can include uncovering natural\
    \ groupings (clustering), finding lower-dimensional representations (dimensionality\
    \ reduction), or identifying associations and relationships among variables.\n\
    - **Types of tasks in unsupervised learning**:\n    - **Clustering**: This is\
    \ one of the most common unsupervised learning tasks. Clustering involves grouping\
    \ a set of objects in such a way that objects in the same group (a cluster) are\
    \ more similar to each other than to those in other groups. Examples of clustering\
    \ algorithms include K-means, hierarchical clustering, and DBSCAN."
  mdcn: "模型训练与测试。优化阶段提升模型的准确性，部署阶段则确保模型的价值在实际场景中得以实现。\n\n现在，让我们进入下一节，我们将用巧克力蛋糕的类比来分解机器学习生命周期。\n\
    \n## 机器学习生命周期的巧克力蛋糕类比\n\n由于涉及的技术术语和详细步骤，理解机器学习生命周期的各个阶段可能看起来有些挑战性。从数据收集和预处理到模型训练、测试和部署，每个阶段都需要仔细关注和理解。但别担心！我们精心设计了一个美味的类比，将这个过程比作烘焙巧克力蛋糕，旨在让这些复杂的概念更易消化和理解。\n\
    \n想象一下，你正在努力烘焙最美味的巧克力蛋糕。从挑选最优质的原料到品尝最后一口，每一步都对应着机器学习生命周期中的一个阶段。让我们来探索这个令人垂涎的类比！\n\
    \n| 机器学习步骤 | 烘焙巧克力蛋糕类比 | 解释 |\n| :--- | :--- | :--- |\n| 问题定义 | 选择蛋糕类型 | 在开始烘焙之前，你需要决定制作哪种类型的蛋糕。在机器学习中，这一步涉及定义问题、决定任务类型（分类、回归等）并设定明确的目标。\
    \ |\n| 准备工作 | 收集原料 | 就像烘焙师收集蛋糕所需的所有原料一样，在机器学习中，数据科学家收集项目所需的所有数据和工具，确保为后续步骤做好一切准备。\
    \ |\n| 数据预处理 | 准备原料 | 在烘焙中，原料需要清洗和分类。同样，在机器学习中，数据需要被清洗，过滤掉不必要的噪声或无关信息，以确保高质量的数据准备好进行分析。\
    \ |\n| 探索性数据分析 | 品尝和闻原料 | 烘焙师通过品尝和闻原料来确保其质量。在探索性数据分析中，数据科学家通过可视化和分析数据来理解其结构、趋势、模式，并获取初步见解。\
    \ |\n| 特征工程 | 混合原料 | 烘焙师混合原料以获得蛋糕所需的质地和风味。在机器学习中，特征被选择和转换，以创建用于有效训练模型的最终数据集。 |\n\
    | 训练和测试模型 | 烘焙和检查蛋糕 | 面糊被倒入两个独立的烤盘；一个用于即时品尝测试（验证），另一个用于最终产品（测试）。在机器学习中，数据集被分为训练集和测试集。模型在训练数据上进行训练，并在单独的未见数据集上进行验证，以评估和优化其性能。\
    \ |\n| 优化 | 调整配方 | 如果品尝测试显示蛋糕需要更多风味，就需要调整配方。同样，机器学习模型可能通过调整超参数来优化性能，确保有效的学习和预测。\
    \ |\n| 模型部署 | 上菜 | 一旦蛋糕完美无瑕，就会上菜给客人。同样，一个性能良好的优化机器学习模型会被部署到真实环境中，基于新的未见数据进行实际预测或决策。\
    \ |\n\n表 15.1 – 巧克力蛋糕类比步骤\n\n在我们总结时，巧克力蛋糕的类比优雅地阐释了机器学习生命周期。从最初的数据选择到模型的部署，每个阶段都与制作美味蛋糕的步骤相对应。构建机器学习模型的精心优化，就像调整蛋糕配方至完美一样具体而贴切。\n\
    \n模型训练和测试中的每一个过程都可以比作混合、烘焙和品尝测试，使得复杂的机器学习世界变得易于理解和引人入胜。最终，揭晓一个训练有素的模型，就像呈现一个烘焙精美的巧克力蛋糕一样令人满足和愉悦。在这个丰富的学习旅程中，每一步都承诺带来清晰的理解，或许还有一点甜蜜和喜悦。在下一节中，我们将探讨机器学习的类别。\n\
    \n## 机器学习算法的类型\n\n根据学习风格，机器学习可以分为四种类型：\n\n- 监督学习\n- 无监督学习\n- 半监督学习\n- 强化学习\n\n\
    机器学习使计算机能够从数据中学习，从经验中改进，并以越来越高的准确性预测结果。这是机器学习的四个主要且不同的类别，每个类别都有其独特的特点和应用。这些类别是基于算法如何被训练以进行预测或决策来划分的。\n\
    \n> **重要说明**\n>\n> 机器学习算法有四个类别，但在本书中，我们只介绍监督学习和无监督学习。虽然这不是一本机器学习书籍，但 Python 在机器学习领域的应用持续增长，因此它与我们理解该编程语言的应用以及我们如何使用计算思维来解决问题的目标相关。\n\
    \n## 监督学习\n\n监督学习是机器学习的一种类型，其中算法在标记的数据集上进行训练。在此上下文中，“标记”意味着训练集中的每个示例都与正确的输出配对。监督学习算法分析训练数据并产生一个推断函数，该函数可用于映射新的示例。\n\
    \n以下是监督学习的关键方面：\n\n- **从标记数据中学习**：它涉及使用一组已知的、标记的示例来训练模型。例如，在一个电子邮件数据集中，每封电子邮件将被标记为“垃圾邮件”或“非垃圾邮件”，模型学习将电子邮件分类到这些类别中。\n\
    - **预测建模**：训练后，模型旨在预测新的、未见数据的正确标签。例如，它可以预测新电子邮件是否为垃圾邮件。\n- **任务类型**：监督学习中有两种主要任务类型：\n\
    \    - **回归**：*图 15.4* 中显示的左图，是一个带有线条的散点图，表示变量之间的趋势或关系。当输出变量是实数或连续值（如房屋价格或温度）时使用，旨在预测一个数量。\n\
    \    - **分类**：*图 15.4* 中显示的右图，显示了由虚线分隔的两个不同数据点组，代表分类的决策边界。当输出变量是类别（如“通过”或“失败”或“垃圾邮件”或“非垃圾邮件”）时适用，目标是预测一个类别。\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_265_0.png)\n\n图 15.4 – 回归和分类图\n\n-\
    \ **反馈系统**：学习过程是“受监督的”，因为算法会得到关于其预测的反馈。在训练阶段，模型在训练数据上进行预测，当其预测错误时，会由老师（已知标签）进行纠正。\n\
    - **用例**：它被用于众多现实世界的应用中，包括图像和语音识别、医学诊断、垃圾邮件过滤和市场预测。\n\n在监督学习中，模型的性能是基于其准确预测新的、未见数据（不属于训练集）标签的能力来评估的。它从训练数据到新数据的泛化能力越强，监督学习模型就被认为越好。现在，让我们继续讨论无监督学习。\n\
    \n## 无监督学习\n\n无监督学习是机器学习的一种类型，处理未标记的数据。其目标是在没有任何预先存在的标签或监督的情况下，发现数据集中隐藏的模式和关系。算法必须通过识别数据的结构和提取特征来理解数据，而无需任何关于寻找什么的明确指示。\n\
    \n以下是关于无监督学习的一些要点：\n\n- **处理未标记数据**：无监督学习算法旨在处理没有标记结果或响应的数据集。主要目标是在没有特定目标变量指导的情况下，探索数据结构以提取有意义的信息。\n\
    - **模式发现和特征提取**：这些算法专注于识别数据中的模式、相关性和特征。这可以包括揭示自然分组（聚类）、找到低维表示（降维）或识别变量之间的关联和关系。\n\
    - **无监督学习中的任务类型**：\n    - **聚类**：这是最常见的无监督学习任务之一。聚类涉及将一组对象分组，使得同一组（一个簇）中的对象彼此之间比与其他组中的对象更相似。聚类算法的例子包括\
    \ K-means、层次聚类和 DBSCAN。"
