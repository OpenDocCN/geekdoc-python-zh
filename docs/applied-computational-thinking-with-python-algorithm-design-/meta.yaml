    \ 374, 344, 0]\n```\n\n请注意，我们将为每个城市分配索引以标识它们。纽约市是0，费城是1，巴尔的摩是2，芝加哥是3，克利夫兰是4。让我们看看这个问题的算法是什么样子的（请注意，**OR-Tools库**用于优化车辆路径、线性规划、约束规划等）：\n\
    \n1.  首先，让我们从导入我们需要的包和库开始。这个算法的完整文件是**ch17_travel.py**，可在GitHub上找到：\n\n```\nfrom\
