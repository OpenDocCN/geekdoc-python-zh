    Alright, that’s a bit complicated. Before I move on to explain deductive reasoning,
    let’s look at a quick truth table and the logic process it contains.


    Truth tables were critical when I first started coding. They helped me understand
    the coding processes and how to work with conditions. Not every programmer or
    coder uses these tables, but I find them helpful, even if not used explicitly
    in the decision-making process. Let’s look at one now.


    Let’s say we have a statement or condition p and that condition is True. Let’s
    say that we have another statement or condition q and that it is also True. In
    truth tables, we use the symbol ← to denote NOT. So, ← p is False and ← q is also
    False. That’s because if p is True, then NOT p is NOT True or, in other words,
    is False. The symbol '' is used for AND, so p AND q is written as p '' q. The
    symbol ( is used for OR, so p OR q is written as p ( q. In table format, our truth
    table looks as follows:


    | p | q | ¬p | ¬q | p ∧ q | p ∨ q | ¬p ∧ q |

    |---|---|---|---|---|---|---|

    | True | True | False | False | True | True | False |

    | True | False | False | True | False | True | False |

    | False | True | True | False | False | True | True |

    | False | False | True | True | False | False | True |


    Figure 4.1 – Truth table


    Analyzing a truth table and understanding all the possible conditions can take
    time, but the process is similar to what we go through in logical reasoning when
    writing algorithms for problems. Now, let’s take a closer look at deductive reasoning.


    Let’s first define what deductive reasoning is. **Deductive reasoning** is the
    process of going from a statement or hypothesis to a conclusion. Because deductive
    reasoning is what we use in algorithmic design, for the most part, we will need
    to define some terms associated with it.


    Let’s start with conditional statements.


