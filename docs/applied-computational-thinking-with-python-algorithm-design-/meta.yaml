    \n## 总结\n\n本章全面介绍了使用Python进行机器学习，涵盖了基础知识并逐步深入到实际应用。关键主题包括定义机器学习、探索其生命周期以及讨论不同的算法，包括深度学习。强调了实际技能，例如使用Keras等Python包进行数据建模、神经网络定义、模型训练和评估以及进行预测。本章还涉及了数据分类和聚类。我们将在下一章继续探讨这里讨论的一些主题。我们还将在[第18章](Chapter\
    \ 18) *高级应用计算思维问题*中提供的示例中看到其中一些应用。\n\n# 16\n\n# 在统计分析中使用计算思维和Python\n\n在本章中，我们将使用Python和计算思维的元素来解决需要统计分析算法的问题。我们将在Python环境中使用**pandas\
    \ DataFrame**来创建统计分析算法。创建统计分析将需要Python中的其他包，例如`numpy`、`pytz`等。我们将在需要这些包来处理我们将要编写的代码时使用它们，并在学习这些库帮助我们做什么时使用它们，例如使用**pandas**组织数据。\n\
    \n在本章中，我们将涵盖以下主题：\n\n- 定义问题和Python数据选择\n- 数据预处理\n- 使用可视化处理、分析和总结数据\n\n在本章结束时，您将能够设计最适合您所面临场景的算法。您还将能够识别与所呈现问题最匹配的Python函数，并概括您的解决方案。\n\
    \n## 技术要求\n\n您将需要最新版本的Python来运行本章中的代码。\n\n您需要安装`pandas`、`numpy`和`scipy`包来解决本章中的问题。\n\
    \n您可以在以下位置找到本章中使用的完整源代码：\nhttps://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter16。\n\
    \n## 定义问题和Python数据选择\n\n在我们查看**pandas**库之前，让我们先定义什么是数据分析。当我们谈论数据分析时，我们指的是检查、清洗、转换和建模数据的过程，目的是发现有用的数据、通知结论并支持决策。\n\
    \n决策至关重要。我们不仅想看看数据说过去发生了什么。我们想利用数据来为未来做出明智的决策。\n\n看看数据分析的一些用途：\n\n- **商业**：它有助于根据客户趋势和行为预测做出决策，提高业务生产力，并推动有效决策\n\
    - **天气预报**：收集和分析有关大气的数据（温度、湿度、风等），以了解大气过程（气象学），从而确定大气在未来将如何演变\n- **交通**：数据可用于确定趋势，包括交通、事故等，帮助我们做出关于交通模式、交通信号灯时长等方面的决策\n\
    \n当然，上述用途只是可能应用的一部分。数据分析被用于非常广泛的领域，企业和教育组织利用它来做出关键决策、为社区提供资源、资助我们的学校和大学等等。\n\n\
    那么，让我们看看我们有哪些可用的工具来分析这些数据。Python中用于数据分析的主要库之一是`pandas`包。`pandas`的伟大之处在于其易用性、简单的数据结构和高性能。使用`pandas`简化了我们在数据分析中的工作。\n\
    \n## 定义pandas\n\n需要注意的一点是，`pandas`是建立在`numpy`之上的。`numpy`是一个帮助我们处理数组的包。Python本身没有数组，因此这些包允许我们创建数组、使用它们，然后在此基础上进行构建。\n\
    \n`pandas`提供了一个灵活且简单的数据结构，以简化您在数据分析中的工作。它是**大数据**的一个很好的工具。当我们谈论大数据时，我们指的是结构化和非结构化数据集，这些数据集经过分析，以便我们可以获得更好的洞察力，并帮助企业或组织的决策或策略。`pandas`可以处理导入不同格式，例如`.csv`文件、**SQL**和**JSON**，以及各种操作，例如选择数据、合并、重塑和清理数据。\n\
    \n在`pandas`中有两种不同的数据存储方式——Series和DataFrame：\n\n- **Series**是一维数组，可以保存任何数据类型（整数、字符串或浮点数）；Series代表一列数据。\n\
    - **DataFrame**是二维对象，可以有多个列和数据类型。它们接受字典、Series、列表和其他DataFrame作为输入。\n\n现在让我们学习何时使用`pandas`。\n\
    \n## 确定何时使用pandas"
