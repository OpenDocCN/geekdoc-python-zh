  md: '# 12


    # Using Computational Thinking and Python in Simple Challenges


    In this chapter, we will again take a look at the computational thinking process
    and apply it to design algorithms that help us solve various scenarios and problems.
    As we wrap up *Part 2, Applying Python and Computational Thinking*, of this book,
    we will combine some of the knowledge about Python capabilities with the computational
    thinking process to solve these problems.


    In this chapter, we will cover the following topics:


    +   - Problem definition and Python

    - Generalizing the problem and planning Python algorithms

    - Designing and testing the algorithm


    By the end of this chapter, you will be able to design algorithms that best fit
    the scenarios presented. You will also be able to identify Python functions that
    best align with the problems presented and generalize your solutions.


    # Technical requirements


    You will need to install the latest version of Python to run the code in this
    chapter.


    The source code used in this chapter can be found in the GitHub repository here:

    https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter12.


    # Problem definition and Python


    We are going to dive into our first scenario. You are launching a campaign for
    a product you’ve designed. You’re looking for investments that add up to $100,000
    in pledges. You want to create an algorithm that saves information. The algorithm
    will need to save the pledges made and any products associated as part of the
    benefits of making that pledge. There are some things you need to identify before
    you write an algorithm:


    +   - *How many types of pledges will you run in your campaign?*

    - *Will there be a donation-only pledge? Do donations get anything at all, such
    as a sticker, electronic certificate, or other product swag?*'
  merge: -1
  pgno: 213
- img_proc: true
  md: '+   - *What will each of the pledges give the person pledging?*


    All of these questions will help us plan. But we also have to take into account
    other things, such as what we need from the algorithm. Is it simply to list the
    number of pledges or will it also be used to check against an inventory or to
    create that inventory? *Will it count down from a set number of pledges available
    for each level? Will it automatically update every time someone makes a pledge?*


    As you know, when we are presented with a problem, it is critical that we identify
    what the problem really is. We need to set our parameters for the problem to provide
    a solution. In this section, we’re going to want to answer a lot of these questions
    first. To do that, we need to decompose the problem and identify which functionalities
    in Python would help us solve this problem.


    # Decomposing the problem and using Python functionalities


    We can create an algorithm that is used to design those pledges. We’ll be designing
    an algorithm that tells us how many items we need of each type based on a set
    number of pledges.


    For example, say we have three tiers of pledges and a donation-only pledge. For
    the highest tier (let’s call that **Tier 1**), you get the following:


    +   - Double the item you are selling at a 20% discount

    - An accessories bundle for the item, which includes four items

    - A carrying case for the item and accessories

    - Access to a 1-year membership for the site


    The middle tier, or **Tier 2**, gets you the following items:


    +   - The item you are selling at a 20% discount

    - A carrying case for the item

    - Access to a 6-month membership for the site


    The lowest tier, or **Tier 3**, gets you the following:


    +   - The item you are selling at a 20% discount

    - A carrying case for the item


    Let’s say we want an algorithm that will give us the number of items we’d need
    depending on how many pledges we allow for each tier. The **fourth tier**, which
    is donation only, would not affect our algorithm, since this algorithm would be
    used simply to determine how many of each item we’d need depending on the number
    of pledges.'
