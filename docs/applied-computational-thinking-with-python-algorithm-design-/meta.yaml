- md: "## Problem 8 – web scraping in Python\n\nWhen you’re faced with a scenario\
    \ where you need to collect data – be it for a machine learning model, in-depth\
    \ analysis, or any other data-driven task – a common challenge is sourcing this\
    \ data. Often, the data you need is spread across the web, hidden within the structure\
    \ of websites. In this section, we’ll dive deep into the world of web scraping\
    \ using Python, exploring the best practices, tools, and techniques that cater\
    \ to both beginners and experienced developers. One of the processes by which\
    \ we obtain this data is called **web scraping**.\n\nLet’s create a simple web\
    \ scraping example using Python, where we’ll scrape quotes from the website at\
    \ [http://quotes.toscrape.com](http://quotes.toscrape.com). This example uses\
    \ the `requests` library to make HTTP requests and the Beautiful Soup library\
    \ to parse HTML.\n\nHere’s a basic example that scrapes quotes and authors from\
    \ the first page:\n\n### Step 1 – import the required libraries\n\nFirst, the\
    \ necessary libraries are imported. The requests library allows us to make `HTTP\
    \ requests` to fetch web pages. The `BeautifulSoup` class from the `bs4` library\
    \ parses HTML content. The logging library helps us keep a log of what happens\
    \ while the script is running, and the `time` library allows us to add delays\
    \ between HTTP requests:\n\n```python\nimport requests\nimport time\nfrom bs4\
    \ import BeautifulSoup\nimport logging\n```\n\n### Step 2 – define the URL to\
    \ scrape\n\n```python\nurl = 'http://quotes.toscrape.com'\n```\n\nWe define the\
    \ URL that we are going to scrape.\n\n### Step 3 – make an HTTP request\n\n```python\n\
    response = requests.get(url)\n```\n\n- Using the **requests.get()** method, an\
    \ HTTP **GET** request is sent to the URL.\n- The server’s response, which contains\
    \ the web page’s HTML content, is stored in the response object.\n\n### Step 4\
    \ – parse the HTML content\n\n```python\nsoup = BeautifulSoup(response.content,\
    \ 'html.parser')\n```\n\n- We create an instance of the **BeautifulSoup** class\
    \ and pass in the HTML content (**response.content**) we received.\n- The '**html.parser**'\
    \ argument specifies the parser to be used to break down the HTML.\n\n### Step\
    \ 5 – locate the quote containers\n\n```python\nquote_containers = soup.find_all('div',\
    \ class_='quote')\n```\n\n- We use the **find_all** method to find all **div**\
    \ tags where the class is '**quote**'.\n- Each such **div** contains a quote and\
    \ its author.\n- These are stored in a list called **quote_containers**.\n\n###\
    \ Step 6 – loop through containers and extract data\n\n```python\n#lemmatization\n\
    words = [lemmatizer.lemmatize(w.lower()) for w in words if w not in ignore_words]\n\
    words = sorted(list(set(words)))\nclasses = sorted(list(set(classes)))\npickle.dump(words,open('words.pkl','wb'))\n\
    pickle.dump(classes,open('classes.pkl','wb'))\n```\n\nNote in the preceding code\
    \ that we used `pickle()`. This is a method in Python that we can use to serialize\
    \ data (or deserialize it). The method is used to replace current file data so\
    \ that it can be used as converted.\n\n6. Now that we have done all of that, we\
    \ need to create our training model. We won't go through all the sections of that\
    \ process here, but the entire code can be found in the GitHub repository file.\
    \ Remember that you first train, create, and then compile the model.\n\nOnce we\
    \ have run through that process, we save the model so that we can use it. For\
    \ now, let's look at the chatbot functions:\n\n```python\n#Define chatbot functions\n\
    def clean_up_sentence(sentence):\n    sentence_words = nltk.word_tokenize(sentence)\n\
    \    sentence_words = [lemmatizer.lemmatize(word.lower()) for word in sentence_words]\n\
    \    return sentence_words\ndef bow(sentence, words, show_details=True):\n   \
    \ sentence_words = clean_up_sentence(sentence)\n    bag = [0]*len(words)\n   \
    \ for s in sentence_words:\n        for i,w in enumerate(words):\n           \
    \ if w == s:\n                bag[i] = 1\n    return(np.array(bag))\ndef predict_class(sentence,\
    \ model):\n    p = bow(sentence, words,show_details=False)\n    res = model.predict(np.array([p]))[0]\n\
    \    ERROR_THRESHOLD = 0.25\n    results = [[i,r] for i,r in enumerate(res) if\
    \ r>ERROR_THRESHOLD]\n    results.sort(key=lambda x: x[1], reverse=True)\n   \
    \ return_list = []\n    for r in results:\n        return_list.append({\"intent\"\
    : classes[r[0]], \"probability\": str(r[1])})\n    return return_list\n```\n\n\
    The first three functions work to create responses for the chatbot and also make\
    \ predictions. Those classes will matter for how we get those responses from our\
    \ bot. Let's think about it this way – if I say hello, I wouldn't want the chatbot\
    \ to say goodbye. That would be rude. However, remember that our bot is only as\
    \ good as our training is. So, if we don't have enough in the `.json` file and\
    \ do not train the model correctly, the bot will be fairly useless.\n\n7. Now,\
    \ let's define how we get the responses:\n\n```python\ndef getResponse(ints, intents_json):\n\
    \    tag = ints[0]['intent']\n    list_of_intents = intents_json['intents']\n\
    \    for i in list_of_intents:\n        if(i['tag']== tag):\n            result\
    \ = random.choice(i['responses'])\n            break\n    return result\ndef chatbot_response(msg):\n\
    \    ints = predict_class(msg, model)\n    res = getResponse(ints, intents)\n\
    \    return res\n```\n\nAs you can see from the preceding code snippet, the bot\
    \ will craft a response and return it. We'll be calling those things in the next\
    \ few pieces of code in our file.\n\n8. However, we'll skip that here and move\
    \ on to the look of our chatbot:\n\n```python\nbase = Tk()\nbase.title(\"Chat\
    \ with Customer Service\")\nbase.geometry(\"400x500\")\nbase.resizable(width=FALSE,\
    \ height=FALSE)\n```\n\nNote that we established some critical information in\
    \ the preceding snippet. We established the size of the window and blocked it\
    \ from being resized.\n\n9. In the next code snippet, we'll establish the background,\
    \ add **scrollbar**, and establish the look of the **Send** button:\n\n```python\n\
    #Create chatbot window\nChatLog = Text(base, bd=6, bg=\"white\", height=\"8\"\
    , width=\"70\", font=\"Calibri\")\nChatLog.config(state=DISABLED)\n#Scrollbar\n\
    scrollbar = Scrollbar(base, command=ChatLog.yview, cursor=\"arrow\")\n#Create\
    \ Send button\nSendButton = Button(base, font=(\"Calibri\",12,'bold'), text=\"\
    Send\", width=\"15\",\nheight=5,\nbd=0, bg=\"pink\", activebackground=\"light\
    \ green\",fg='black',\ncommand= send )\nEntryBox = Text(base, bd=0, bg=\"white\"\
    ,width=\"29\", height=\"5\", font=\"Arial\")\nscrollbar.place(x=376,y=6, height=386)\n\
    ChatLog.place(x=6,y=6, height=386, width=370)\nEntryBox.place(x=128, y=401, height=90,\
    \ width=265)\nSendButton.place(x=6, y=401, height=90)\nbase.mainloop()\n```\n\n\
    So, this is it, in a nutshell. *We created a chatbot! But what does it look like\
    \ when it runs?* Take a look at the output:\n\n![Figure 17.7 – The chatbot window](img/b193dd901f0befc8cf3c9fa5265db3da_333_0.png)\n\
    \nNote our components – the scrollbar on the right, the pink **Send** button,\
    \ and the title of our chatbot. Note also that the maximize button is grayed out.\
    \ That’s because we said we don’t want the window resized.\n\n10. In addition,\
    \ when we click the **Send** button, we want the user to know whether it was clicked.\
    \ Otherwise, you could click it multiple times if you are unsure. That’s why the\
    \ active background color is changed in the code. The following screenshot shows\
    \ what the button looks like when active:\n\n![Figure 17.8 – The active Send button](img/b193dd901f0befc8cf3c9fa5265db3da_333_1.png)\n\
    \nMany chatbots have features like this one so that we avoid errors with the code.\n\
    \nOnce we’ve said hello, the bot will respond. Before we move away from this problem,\
    \ let’s take a look at a quick conversation with the chatbot in the following\
    \ screenshot:\n\n![Figure 17.9 – The chatbot window with responses](img/b193dd901f0befc8cf3c9fa5265db3da_334_0.png)\n\
    \nAs you can see, a few lines of code and a file can be used to create an interactive\
    \ experience with a chatbot.\n\nFeel free to play around with the code to add\
    \ some flair, create a different `intents.json` file, and make it more relevant\
    \ to what you need. Now, let’s look at some additional things we can do with Python,\
    \ such as web scraping."
  mdcn: "## 问题 8 – Python 中的网络爬虫\n\n当你面临需要收集数据的场景时——无论是用于机器学习模型、深入分析，还是任何其他数据驱动的任务——一个常见的挑战就是获取这些数据。通常，你需要的数据分散在网络上，隐藏在网站的结构中。在本节中，我们将深入探讨使用\
    \ Python 进行网络爬虫的世界，探索适合初学者和经验开发者的最佳实践、工具和技术。我们获取这些数据的过程之一被称为**网络爬虫**。\n\n让我们使用\
    \ Python 创建一个简单的网络爬虫示例，我们将从网站 [http://quotes.toscrape.com](http://quotes.toscrape.com)\
    \ 抓取名言。此示例使用 `requests` 库发出 HTTP 请求，并使用 Beautiful Soup 库解析 HTML。\n\n以下是一个从第一页抓取名言和作者的基本示例：\n\
    \n### 步骤 1 – 导入所需的库\n\n首先，导入必要的库。requests 库允许我们发出 `HTTP 请求` 来获取网页。`bs4` 库中的 `BeautifulSoup`\
    \ 类用于解析 HTML 内容。logging 库帮助我们记录脚本运行时发生的情况，而 `time` 库允许我们在 HTTP 请求之间添加延迟：\n\n```python\n\
    import requests\nimport time\nfrom bs4 import BeautifulSoup\nimport logging\n\
    ```\n\n### 步骤 2 – 定义要爬取的 URL\n\n```python\nurl = 'http://quotes.toscrape.com'\n\
    ```\n\n我们定义要爬取的 URL。\n\n### 步骤 3 – 发出 HTTP 请求\n\n```python\nresponse = requests.get(url)\n\
    ```\n\n- 使用 **requests.get()** 方法，向该 URL 发送一个 HTTP **GET** 请求。\n- 服务器的响应（包含网页的\
    \ HTML 内容）存储在 response 对象中。\n\n### 步骤 4 – 解析 HTML 内容\n\n```python\nsoup = BeautifulSoup(response.content,\
    \ 'html.parser')\n```\n\n- 我们创建一个 **BeautifulSoup** 类的实例，并传入接收到的 HTML 内容（**response.content**）。\n\
    - '**html.parser**' 参数指定了用于解析 HTML 的解析器。\n\n### 步骤 5 – 定位名言容器\n\n```python\nquote_containers\
    \ = soup.find_all('div', class_='quote')\n```\n\n- 我们使用 **find_all** 方法查找所有 class\
    \ 为 '**quote**' 的 **div** 标签。\n- 每个这样的 **div** 包含一条名言及其作者。\n- 这些被存储在一个名为 **quote_containers**\
    \ 的列表中。\n\n### 步骤 6 – 遍历容器并提取数据\n\n```python\n#lemmatization\nwords = [lemmatizer.lemmatize(w.lower())\
    \ for w in words if w not in ignore_words]\nwords = sorted(list(set(words)))\n\
    classes = sorted(list(set(classes)))\npickle.dump(words,open('words.pkl','wb'))\n\
    pickle.dump(classes,open('classes.pkl','wb'))\n```\n\n注意前面的代码中我们使用了 `pickle()`。这是\
    \ Python 中的一个方法，我们可以用它来序列化数据（或反序列化）。该方法用于替换当前文件数据，以便可以将其用作转换后的数据。\n\n6. 既然我们已经完成了所有这些，我们需要创建我们的训练模型。我们不会在这里详细介绍该过程的所有部分，但完整的代码可以在\
    \ GitHub 仓库文件中找到。记住，你首先需要训练、创建，然后编译模型。\n\n一旦我们完成了这个过程，我们就保存模型以便使用。现在，让我们看看聊天机器人的功能：\n\
    \n```python\n#Define chatbot functions\ndef clean_up_sentence(sentence):\n   \
    \ sentence_words = nltk.word_tokenize(sentence)\n    sentence_words = [lemmatizer.lemmatize(word.lower())\
    \ for word in sentence_words]\n    return sentence_words\ndef bow(sentence, words,\
    \ show_details=True):\n    sentence_words = clean_up_sentence(sentence)\n    bag\
    \ = [0]*len(words)\n    for s in sentence_words:\n        for i,w in enumerate(words):\n\
    \            if w == s:\n                bag[i] = 1\n    return(np.array(bag))\n\
    def predict_class(sentence, model):\n    p = bow(sentence, words,show_details=False)\n\
    \    res = model.predict(np.array([p]))[0]\n    ERROR_THRESHOLD = 0.25\n    results\
    \ = [[i,r] for i,r in enumerate(res) if r>ERROR_THRESHOLD]\n    results.sort(key=lambda\
    \ x: x[1], reverse=True)\n    return_list = []\n    for r in results:\n      \
    \  return_list.append({\"intent\": classes[r[0]], \"probability\": str(r[1])})\n\
    \    return return_list\n```\n\n前三个函数用于为聊天机器人创建响应并进行预测。这些类别对于我们如何从机器人获取响应很重要。让我们这样想——如果我说“你好”，我不希望聊天机器人说“再见”。那会很粗鲁。然而，请记住，我们的机器人的好坏取决于我们的训练。因此，如果我们在\
    \ `.json` 文件中没有足够的数据，并且没有正确训练模型，机器人将相当无用。\n\n7. 现在，让我们定义如何获取响应：\n\n```python\n\
    def getResponse(ints, intents_json):\n    tag = ints[0]['intent']\n    list_of_intents\
    \ = intents_json['intents']\n    for i in list_of_intents:\n        if(i['tag']==\
    \ tag):\n            result = random.choice(i['responses'])\n            break\n\
    \    return result\ndef chatbot_response(msg):\n    ints = predict_class(msg,\
    \ model)\n    res = getResponse(ints, intents)\n    return res\n```\n\n从前面的代码片段可以看出，机器人将生成一个响应并返回它。我们将在文件中的接下来的几段代码中调用这些函数。\n\
    \n8. 然而，我们将在这里跳过这部分，继续介绍聊天机器人的外观：\n\n```python\nbase = Tk()\nbase.title(\"Chat\
    \ with Customer Service\")\nbase.geometry(\"400x500\")\nbase.resizable(width=FALSE,\
    \ height=FALSE)\n```\n\n注意我们在前面的片段中建立了一些关键信息。我们确定了窗口的大小并阻止了其调整大小。\n\n9. 在下一个代码片段中，我们将设置背景，添加**滚动条**，并设置**发送**按钮的外观：\n\
    \n```python\n#Create chatbot window\nChatLog = Text(base, bd=6, bg=\"white\",\
    \ height=\"8\", width=\"70\", font=\"Calibri\")\nChatLog.config(state=DISABLED)\n\
    #Scrollbar\nscrollbar = Scrollbar(base, command=ChatLog.yview, cursor=\"arrow\"\
    )\n#Create Send button\nSendButton = Button(base, font=(\"Calibri\",12,'bold'),\
    \ text=\"Send\", width=\"15\",\nheight=5,\nbd=0, bg=\"pink\", activebackground=\"\
    light green\",fg='black',\ncommand= send )\nEntryBox = Text(base, bd=0, bg=\"\
    white\",width=\"29\", height=\"5\", font=\"Arial\")\nscrollbar.place(x=376,y=6,\
    \ height=386)\nChatLog.place(x=6,y=6, height=386, width=370)\nEntryBox.place(x=128,\
    \ y=401, height=90, width=265)\nSendButton.place(x=6, y=401, height=90)\nbase.mainloop()\n\
