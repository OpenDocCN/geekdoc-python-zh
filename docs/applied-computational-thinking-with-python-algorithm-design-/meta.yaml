- md: "## Problem 1 – creating a book library\n\nLet’s say you have a lot of books\
    \ and want to create an algorithm that stores information about the books. You\
    \ want to record each book’s title, author, publication date, and number of pages.\
    \ Create an algorithm for this scenario.\n\nFirst, let’s think about the problem:\n\
    \n- The number of books I own changes constantly, so I want to create something\
    \ that I can add information to, as needed.\n- I also want to be able to remove\
    \ books that I no longer own.\n\nWhile we could use a library, the best solution\
    \ for this particular problem would be a class. Let’s start by creating a class\
    \ called `Books`:\n\nch9_BookLibrary.py\n\n```python\nclass Books:\n    def __init__(self,\
    \ title, author, pubDate, pages):\n        self.title = title\n        self.author\
    \ = author\n        self.pubDate = pubDate\n        self.pages = pages\n\nbook1\
    \ = Books('The Fundamentals of Fashion Design', 'Sorger & Udale', '2006', '176')\n\
    book2 = Books('Projekt 1065: A Novel of World War II', 'Gratz', '2016', '309')\n\
    ```\n\nAs you can see, we have our class defined. The class has four arguments:\
    \ `title`, `author`, `pubDate`, and `pages`. After the definition, two books have\
    \ been added. When we run this program, nothing happens, really, but we can then\
    \ call for information on either book, like so:\n\n```python\n>>> book1.title\n\
    ```\n\nWe will get this output:\n\n'The Fundamentals of Fashion Design'\n\nWe\
    \ will call the publishing date of `book2`:\n\n```python\n>>> book2.pubDate\n\
    ```\n\nWe obtain this output:\n\n'2016'\n\nYou can see that I can now call any\
    \ of the elements saved for each of the books after I’ve run the algorithm.\n\n\
    Now, take a look at how a third book can be added within the Python shell, as\
    \ follows:\n\n```python\n>>> book3 = Books('peanut butter dogs', 'Murray', '2017',\
    \ '160')\n```\n\nSince the book has been added, we can call for information about\
    \ this book as well, as follows:\n\n```python\n>>> book3.title\n```\n\nWe get\
    \ this output:\n\n```\n'peanut butter dogs'\n```\n\nWe can call to get the total\
    \ pages of book3, like so:\n\n```python\n>>> book3.pages\n```\n\nWe will get the\
    \ following output:\n\n```\n'160'\n```\n\nAs you can see, we can add books to\
    \ our class from within the algorithm or after running the algorithm in the Python\
    \ shell. Now, let’s take a look at another problem.\n\n## Problem 2 – organizing\
    \ information\n\nWe’ve been asked to create an algorithm that takes three numbers\
    \ as input and provides the sum of the numbers. There are multiple ways we can\
    \ do this, but let’s look at using the `eval()` function:\n\nch9_Sums.py\n\n```python\n\
    a = int(input(\"Provide the first number to be added. \"))\nb = int(input(\"Please\
    \ provide the second number to be added. \"))\nc = int(input(\"Provide the last\
    \ number to be added. \"))\nprint(eval('a + b + c'))\n```\n\nNotice that we defined\
    \ each of the input variables as an `int` type. This is defined so that the evaluation\
    \ is done correctly.\n\nHere is the output for our algorithm:\n\n```\nProvide\
    \ the first number to be added. 1\nPlease provide the second number to be added.\
    \ 2\nProvide the last number to be added. 3\n6\n```\n\nNote that you could have\
    \ also printed with this line:\n\n```python\nprint(a + b + c)\n```\n\nMany prefer\
    \ the simplicity of the print statement without the `eval()` function and having\
    \ to put the expression in quotations, but they both result in the same output\
    \ in our example.\n\nNow, if we had forgotten to add the type for each of the\
    \ numbers, the function would have evaluated that as 123 instead because it just\
    \ adds each string to the next one. So, if our input had been John, Mary, and\
    \ Jack, our output would have been JohnMaryJack.\n\nWe previously didn't go into\
    \ the `sum()` function. Let's take a look at using that function instead:\n\n\
    ch9_Sums2.py\n\n```python\na = int(input(\"Provide the first number to be added.\
    \ \"))\nb = int(input(\"Please provide the second number to be added. \"))\nc\
    \ = int(input(\"Provide the last number to be added. \"))\nnumbers = []\nnumbers.append(a)\n\
    numbers.append(b)\nnumbers.append(c)\nprint(sum(numbers))\n```\n\nUsing `sum`\
    \ in this case requires that we add our inputs to a list, as `sum()` works with\
    \ iterables, such as lists. Although this solution has more code, the output is\
    \ exactly the same as our `eval()` function, as you can see here:\n\n```\nProvide\
    \ the first number to be added. 1\nPlease provide the second number to be added.\
    \ 2\nProvide the last number to be added. 3\n6\n```\n\nAs you can see, we get\
    \ the same answer as before using a different Python function. Let's look at one\
    \ more problem before we move on to the next chapter.\n\n## Problem 3 – loops\
    \ and math\n\nFor this problem, we have to create an algorithm that prints out\
    \ the squares of all the numbers given a range of two numbers. Remember—we can\
    \ print each individually, but if the range is large, it's best we have a list\
    \ instead. We'll also need to iterate in the range, and we have to add 1 to the\
    \ maximum if we want to include the endpoints.\n\nTake a look at the following\
    \ algorithm:\n\nch9_SquareLoops.py\n\n```python\nprint(\"This program will print\
    \ the squares of the numbers in a given range of numbers.\")\na = int(input(\"\
    What is the minimum of your range? \"))\nb = int(input(\"What is the maximum of\
    \ your range? \"))\nNumbers = []\nb = b + 1\nfor i in range(a, b):\n    j = i**2\n\
    \    Numbers.append(j)\nprint(Numbers)\n```\n\nNotice that we added a `j` variable\
    \ to our algorithm. We didn’t use `i = i**2` because that would change the value\
    \ of `i`, which would affect our iteration in the algorithm. By using `j`, we\
    \ can then use `i` to iterate through the range given. Let’s look at our output:\n\
    \n```\nThis program will print the squares of the numbers in a given range of\
    \ numbers.\nWhat is the minimum of your range? 4\nWhat is the maximum of your\
    \ range? 14\n[16, 25, 36, 49, 64, 81, 100, 121, 144, 169, 196]\n```\n\nThis algorithm\
    \ prints out our list of squares for the range provided. It also has an initial\
    \ print statement that explains what the code will do.\n\nNow that we’ve looked\
    \ at a few examples, let’s look at parent classes and child classes and how inheritance\
    \ works.\n\n## Using inheritance\n\nIn Python, we can pass methods and properties\
    \ from one class to another using inheritance. The parent class has the methods\
    \ and properties that will be inherited. The child class inherits from the parent\
    \ class. The parent class is an object and the child class is an object, so we\
    \ are defining the properties of classes.\n\nLet’s see how that works using a\
    \ science example. We’re going to create a class called mammals. Not all mammals\
    \ are viviparous. A mammal is viviparous when it gives birth to a live young.\
    \ A mammal that is not viviparous is the platypus. The platypus lays an egg instead\
    \ of giving birth to a live young. If we were writing an algorithm for this, we\
    \ would want the animals to inherit the characteristics of the parent—in this\
    \ case, mammals. Let’s take a look at the following snippet of code:\n\nch9_mammals.py\n\
    \n```python\nclass mammals:\n    def description(self):\n        print(\"Mammals\
    \ are vertebrate animals.\")\n    def viviparous(self):\n        print(\"Mammals\
    \ are viviparous, but some are not.\")\nclass monkey(mammals):\n    def viviparous(self):\n\
    \        print(\"Monkeys are viviparous.\")\nclass platypus(mammals):\n    def\
    \ viviparous(self):\n        print(\"The platypus is not viviparous. It's an egg-laying\
    \ mammal.\")\nobj_mammals = mammals()\nobj_monkey = monkey()\nobj_platypus = platypus()\n\
    obj_mammals.description()\nobj_mammals.viviparous()\nobj_monkey.description()\n\
    obj_monkey.viviparous()\nobj_platypus.description()\nobj_platypus.viviparous()\n\
    ```\n\nFrom the preceding code, notice that the `mammals()` class uses a description\
    \ and then information about mammals and viviparity. `monkey` is defined using\
    \ the same description as the `mammals` class, but then includes a different statement\
    \ for viviparity. The same thing happens with `platypus`. The `monkey` and `platypus`\
    \ classes are child classes of the `mammals` class.\n\nThe three classes, the\
    \ parent and the two children, are then simplified into a variable so that they\
    \ can be used by calling that variable. Finally, the algorithm prints description\
    \ and viviparity statements for the parent and the two children. Let’s take a\
    \ look at that output:\n\n```\nMammals are vertebrate animals.\nMammals are viviparous,\
    \ but some are not.\nMammals are vertebrate animals.\nMonkeys are viviparous.\n\
    Mammals are vertebrate animals.\nThe platypus is not viviparous. It's an egg-laying\
    \ mammal.\n```\n\nAs you can see, all three classes used the same description.\
    \ That’s because we didn’t make any changes to the description for the children.\
    \ When we defined the classes, we only changed the parts we wanted to be different\
    \ from the parent class. Everything else is inherited from the parent class.\n\
    \nParent classes and children are widely used in Python for multiple purposes.\
    \ For example, in gaming, you may have enemies that all have some of the same\
    \ characteristics. Rather than defining each enemy with all the characteristics\
    \ separately, we can create a parent class that includes all common characteristics,\
    \ then change the individual characteristics of all the enemies as child classes.\
    \ This is just one of the ways in which inheritance can be used. There are many\
    \ other uses, and it helps us save time and avoid errors by only defining them\
    \ with the parent classes.\n\nNow that we’ve had some experience with classes\
    \ and learned about OOP, let’s wrap up the chapter.\n\n## Summary\n\nIn this chapter,\
    \ we discussed the basics of Python programming. We looked at some of the built-in\
    \ functions, worked with dictionaries and lists, used variables and functions,\
    \ learned about files, data, and iteration, and learned about classes and OOP.\n\
    \nAs we mentioned in this chapter and when solving previous problems, Python provides\
