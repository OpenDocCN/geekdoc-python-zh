    \n现在，让我们再次看看函数，但这次是结合我们的一些循环并添加一些功能。\n\n## 重新审视函数\n\n你可能还记得[第9章](https://example.com)《Python简介》中，我们介绍了内置函数，但也介绍了如何定义自己的函数。现在，随着我们深入探讨Python中*控制流*的工作原理，我们将讨论*函数*和*循环*中的参数。\n\
    \n让我们思考涉及范围的问题。范围接受两个参数：一个最小值和一个最大值。然而，在Python中，请注意你可以只给出一个参数，此时最小值默认为0。例如，如果我写`range(8)`，这等同于`range(0,\
