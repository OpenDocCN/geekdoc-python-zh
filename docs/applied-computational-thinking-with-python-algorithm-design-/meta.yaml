    how we measure data, the design of the experiments we are conducting, and how
    we present the data we gather and analyze from those designs. For this chapter,
    we won''t be designing the experiments. Instead, we''re going to be focusing on
    how we can use Python to analyze existing data. But it is important to note that,
    if we have a say in the experiment, we need to make sure we are designing it fairly.


    If the experimental design and the data collection methods are sound, then the
    data we use and analyze will be much more helpful than if we begin with a biased
    experiment. While we can never eliminate bias completely, as researchers and developers,
    it is our responsibility to present data with the least amount of bias possible.
    *Why is this important?* Think of all the policy changes that happen based on
    data, graphs, and information presented from experiments. If the experiments are
    biased, the results will lead to policies that may not adequately encompass the
    needs of a community, for example.


    As a few examples you may have seen in ads while watching TV, you may recall how
    toothpastes are “*recommended by 4 out of 5 dentists*” or heard lines such as
    “*improvements after using this medication were observed in 50% of study participants.*”
    Those claims seem impressive or at least “good,” right? But what if *only* 5 dentists
    were asked? Is that representative of the population of dentists? And what if
    the “study participants” was a group of two individuals? The data we collect would
    not be very valid (and let''s not get into the amount of bias and even outright
    lies that are told through TV ads sometimes, but this is a chapter on data, so
    I digress). The point I am trying to make is that if you have a say in the design
    of the experiment, design it as well as you can so that it''s as fair as possible
    for the sake of your experiment, the results, and the possible consequences to
    society. But now, let''s get back to data.'
  - '[PAGE 238]


    When working with data, we are always using computational thinking elements. As
    we tackle problems, we have to define what the problems are, what we want to study,
    how we want to measure them, how we’ll be able to create and generalize the patterns,
    and what algorithm we’ll need to use to produce the best representations of our
    data. Everything we do in data analysis benefits from us using computational thinking
    elements.


    Data science is a growing field in **STEM**. In 2017, it was named the fastest-growing
    field in the US. The US Bureau of Labor Statistics stated that an estimated 11.5
    million new jobs are expected in data science and statistics by 2026. Currently,
    there are more jobs available than qualified candidates.


    Now, let’s look at how Python lets us tackle data.


    In experimental data, we want to gather information using independent, dependent,
    and control variables:


    +   - **Independent variables** are variables that are changed or controlled by
    the researcher

    - **Dependent variables** are variables that are measured or tested by the researcher;
    dependent variables *depend* on independent variables

    - **Control variables** are variables or factors in the experiment that must remain
    the same


    Let’s look at a simple example of these variables in an experiment. A common example
    involves the study of plant growth. The independent variables can be one or multiple
    variables. For our example, our independent variable will be the amount of fertilizer
    we add to the plants. The plant growth will be a dependent variable. The **control**
    will not get any fertilizer, just water. So, in our experiment, let’s say we have
    five plants that we will be measuring. One plant will only get water. That’s our
    **control**. The other four will have varying levels of fertilizer added to them.
    Those are our **experimental** plants. The growth is **dependent** on the amount
    of fertilizer.


    When we design experiments, there are three things we want to be true: that they
    are reliable, valid, and can be generalized. Here’s what each of these things
    means:


    +   - **Reliable** relates to the consistency of the measurements. This means
    that if we mimic the conditions, our results should be reliably similar.

    - **Valid** relates to whether or not the experiment measured what it intended
    to measure.

    - **Generalizable** relates to the results being something that can be generalized
    and applied to other settings.


    There is a lot more detail and depth we could go into about experiments, but we
    are only looking at what happens once we have the data for this chapter. It is
    important to understand these basic terms for when we design the experiments.
    As developers, depending on our roles, that may be the case. For example, in a
    start-up, everyone may be involved in all aspects of product development. So,
    in those instances, we could be working on the experiment and also the subsequent
    analysis algorithms.'
