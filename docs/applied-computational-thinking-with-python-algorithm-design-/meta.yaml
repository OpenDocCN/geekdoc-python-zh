- md: "Python has four collection data types or arrays. The four collection data types\
    \ in Python are listed as follows:\n\n- **Lists**: Ordered and changeable; can\
    \ have duplicates\n- **Tuples**: Ordered and unchangeable; can have duplicates\n\
    - **Sets**: Unordered and unindexed; cannot have duplicates\n- **Dictionaries**:\
    \ Unordered, changeable, and indexed; cannot have duplicates\n\nAs noted, we won’t\
    \ be going into NumPy libraries or other data libraries just yet. For now, we’re\
    \ going to focus on dictionaries and lists.\n\n## Defining and using dictionaries\n\
    \nYou may recall that we used dictionaries in *Chapter 3, Understanding Algorithms\
    \ and Algorithmic Thinking*, when we created a menu of items. Dictionaries in\
    \ Python are collections that have the following three characteristics:\n\n- They\
    \ are unordered\n- They are changeable\n- They are indexed by keys\n\nDictionaries\
    \ are organized as value pairs. For example, we can have a dictionary with value\
    \ pairs of states and their capitals. Take a look at the following dictionary:\n\
    \nch9_dictionary1.py\n\n```\nstates = {\n    'Ohio':'Columbus',\n    'Delaware':'Dover',\n\
    \    'Pennsylvania':'Harrisburg',\n    'Vermont':'Montpelier'\n    }\nprint(states)\n\
    ```\n\nIf we were to print this dictionary without any conditions to the `print`\
    \ statement, we would get the following output:\n\n```\n{'Ohio': 'Columbus', 'Delaware':\
    \ 'Dover', 'Pennsylvania': 'Harrisburg', 'Vermont': 'Montpelier'}\n```\n\nAs you\
    \ can see, each value pair is printed at once. Just as we built the dictionary\
    \ in this way, Python also has a built-in `dict()` function. The same dictionary\
    \ can be built using that function, as follows:\n\nch9_dictionary2.py\n\n```\n\
    states = dict([\n    ('Ohio','Columbus'),\n    ('Delaware','Dover'),\n    ('Pennsylvania','Harrisburg'),\n\
    \    ('Vermont','Montpelier')\n])\nprint(states)\n```\n\nYou can see that the\
    \ dictionary is constructed very similarly in both examples, with some changes\
    \ in syntax, such as the use of colons in the first instance versus parentheses\
    \ and commas in the second one. However, the `print` statement produces the same\
    \ result.\n\nDictionaries are said to be key-value pairs because the first item\
    \ is the key and the second, paired item is the value. So, for `Ohio` and `Columbus`,\
    \ `Ohio` is the *key* while `Columbus` is the *value*. We can use the key to call\
    \ any value. For example, I can call `states['Ohio']` and it should return 'Columbus'.\
    \ Take a look at the code:\n\n```\n>>> states['Ohio']\n```\n\nThis is the output:\n\
    \n```\n'Columbus'\n```\n\nWe can do that for any key-value pair in the dictionary.\
    \ But if we try to call a key that's not in the dictionary, such as `Alabama`,\
    \ then we get the following error:\n\n```\n>>> states['Alabama']\n```\n\nThis\
    \ leads to the following error being displayed:\n\n```\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#23>\", line 1, in <module>\n    states['Alabama']\n\
    KeyError: 'Alabama'\n```\n\nNotice that this gives `KeyError`, mentioned in the\
    \ list of errors in *Chapter 8, Identifying Challenges within Solutions*, in the\
    \ *Errors in logic* section. But let's say we do want to add `Alabama` and the\
    \ capital, which is `Montgomery`. We can use the following code to do so:\n\n\
    ```\n>>> states['Alabama'] = 'Montgomery'\n```\n\nWe call the dictionary again\
    \ after entering the following code:\n\n```\n>>> print(states)\n```\n\nThis gives\
    \ us the following output:\n\n```\n{'Ohio': 'Columbus', 'Delaware': 'Dover', 'Pennsylvania':\
    \ 'Harrisburg', 'Vermont': 'Montpelier', 'Alabama': 'Montgomery'}\n```\n\nNotice\
    \ that the dictionary added the 'Alabama': 'Montgomery' key-value pair at the\
    \ end of the dictionary.\n\nWe can also delete key-value pairs using the `del`\
    \ code, as shown:\n\n```\n>>> del states['Delaware']\n```\n\nNow, if we go ahead\
    \ and print the `states` dictionary, `Delaware` is no longer on the list:\n\n\
    ```\n>>> print(states)\n```\n\nThis is the output after deleting the state:\n\n\
    ```\n{'Ohio': 'Columbus', 'Pennsylvania': 'Harrisburg', 'Vermont': 'Montpelier',\
    \ 'Alabama': 'Montgomery'}\n```\n\nNow, you can continue to add items or delete\
    \ them without having to go into the main algorithm.\n\nWith dictionaries, you\
    \ can also add multiple values to one key. Let’s say I play three sports (I don’t).\
    \ I could list those in a dictionary and match them to one key value. Take a look\
    \ at the following algorithm:\n\nch9_dictionary3.py\n\n```\nmiscellaneous = {\n\
    \    'sports' : ['tennis', 'bowling', 'golf'],\n    'age' : '40',\n    'home'\
    \ : 'lake'\n}\n```\n\nWe can print the full dictionary using `print(miscellaneous)`,\
    \ as follows:\n\n```\n>>> print(miscellaneous)\n```\n\nThis is how we get the\
    \ output:\n\n```\n{'sports': ['tennis', 'bowling', 'golf'], 'age': '40', 'home':\
    \ 'lake'}\n```\n\nAs you can see, the printed dictionary includes all the values.\
    \ If I want to print only the sports, then I can use the `miscellaneous['sports']`\
    \ code:\n\n```\n>>> miscellaneous['sports']\n```\n\nThis is the output:\n\n```\n\
    ['tennis', 'bowling', 'golf']\n```\n\nNotice that we did not use the `print()`\
    \ function at all. We used the dictionary, which we called `miscellaneous`, and\
    \ called the 'sports' key. Note that we were able to get this result because we\
    \ called the dictionary in the `IDLE` command window in Python. If you want to\
    \ include this in your algorithm, you’ll still need to use the `print()` function.\n\
    \nWhile we won’t go into all the functionalities of dictionaries here, you can\
    \ see how they can be helpful in creating algorithms that contain key-value pairs.\
    \ Python allows us to add and alter the dictionary, call values, and more with\
    \ the use of simple code without having to access the entire dictionary to do\
    \ so.\n\nNext, we’ll take a look at lists.\n\n## Defining and using lists\n\n\
    Lists in Python are ordered and changeable. We can create lists for anything,\
    \ such as types of animals, colors, fruit, numbers, or really whatever we want.\
    \ Since we can have duplicate values, we could have a list of three apples that\
    \ just says `apple`, `apple`, `apple`. For example, take a look at the list shown\
    \ here:\n\nch9_list1.py\n\n```\nfruits = ['apple','apple','apple']\nprint(fruits)\n\
    ```\n\nWhen we print this list, all the items are included. The output is as follows:\n\
    \n```\n['apple', 'apple', 'apple']\n```\n\nAs you can see, we have the same value\
    \ three times. We would not be able to do that with a dictionary, which does not\
    \ allow duplicate members.\n\nNow, let’s take a look at what we can do with lists.\
    \ Let’s start with the following list of animals:\n\nch9_list2.py\n\n```\nanimals\
    \ = ['dog', 'cat', 'bird', 'lion', 'tiger',\n           'elephant']\n```\n\nThe\
    \ first item on the list is `dog`. Lists have indexes, starting at 0. So, if we\
    \ printed `animals[0]`, we’d get `dog`. We can check it here:\n\n```\n>>> print(animals[0])\n\
    ```\n\nThis is the output with index 0:\n\n```\ndog\n```\n\nThere are six items\
    \ on the list, but the last index is [5]. So, to print `elephant`, we’d need to\
    \ print using that index, like so:\n\n```\n>>> print(animals[5])\nelephant\n```\n\
    \nYou can also use negative numbers for indexes in lists. The [-1] index refers\
    \ to the last index, so it represents `elephant`, the same as index [5]:\n\n```\n\
    >>> print(animals[-1])\nelephant\n```\n\nThe [-2] index refers to the second-to-last\
    \ index—so, `tiger`, and so on.\n\nWe can also print multiple items from a list\
    \ by specifying a range of indexes. Take a look at the following code:\n\n```\n\
    >>> print(animals[1:4])\n```\n\nThis is the output:\n\n```\n['cat', 'bird', 'lion']\n\
    ```\n\nAs you can see, we printed the second item on the list, which corresponds\
    \ to index [1], and the next two items.\n\nWith lists, we can also add items,\
    \ replace items, delete items, check for the length, and more. To add an item,\
    \ we need to use the `append()` method. Let's add the `duck` item to our list:\n\
    \n```\n>>> animals.append('duck')\n>>> print(animals)\n```\n\nHere is the added\
    \ item:\n\n```\n['dog', 'cat', 'bird', 'lion', 'tiger', 'elephant', 'duck']\n\
    ```\n\nNotice that our list now has `duck` at the end of the list. But let's say\
    \ we want to remove `bird` and substitute it with `butterfly`.\n\nFirst, we have\
    \ to identify the index for `bird`. That index is 2, as it is the third item on\
    \ the list:\n\n```\n>>> animals[2] = 'butterfly'\n>>> print(animals)\n```\n\n\
    Here is the output, with `bird` replaced:\n\n```\n['dog', 'cat', 'butterfly',\
    \ 'lion', 'tiger', 'elephant', 'duck']\n```\n\nThe list now contains `butterfly`.\n\
    \nRemoving an item is fairly straightforward, as we just use the `remove()` method\
    \ and the item we want to remove:\n\n```\n>>> animals.remove('lion')\n>>> print(animals)\n\
    ```\n\nAs you can see, `lion` has been removed from the list:\n\n```\n['dog',\
    \ 'cat', 'butterfly', 'tiger', 'elephant', 'duck']\n```"
  mdcn: "Python 有四种集合数据类型或数组。Python 中的四种集合数据类型如下：\n\n- **列表**：有序且可变；可以有重复项\n- **元组**：有序且不可变；可以有重复项\n\
    - **集合**：无序且无索引；不能有重复项\n- **字典**：无序、可变且有索引；不能有重复项\n\n如前所述，我们暂时不会深入探讨 NumPy 库或其他数据处理库。目前，我们将专注于字典和列表。\n\
    \n## 定义和使用字典\n\n你可能还记得，我们在*第 3 章，理解算法和算法思维*中创建菜单项时使用过字典。Python 中的字典是具有以下三个特征的集合：\n\
    \n- 它们是无序的\n- 它们是可变的\n- 它们通过键进行索引\n\n字典以键值对的形式组织。例如，我们可以创建一个包含州及其首府键值对的字典。看看下面的字典：\n\
    \nch9_dictionary1.py\n\n```\nstates = {\n    'Ohio':'Columbus',\n    'Delaware':'Dover',\n\
    \    'Pennsylvania':'Harrisburg',\n    'Vermont':'Montpelier'\n    }\nprint(states)\n\
    ```\n\n如果我们不给 `print` 语句添加任何条件就打印这个字典，我们将得到以下输出：\n\n```\n{'Ohio': 'Columbus',\
    \ 'Delaware': 'Dover', 'Pennsylvania': 'Harrisburg', 'Vermont': 'Montpelier'}\n\
    ```\n\n如你所见，每个键值对都被一次性打印出来。正如我们以这种方式构建字典一样，Python 也有一个内置的 `dict()` 函数。可以使用该函数构建相同的字典，如下所示：\n\
    \nch9_dictionary2.py\n\n```\nstates = dict([\n    ('Ohio','Columbus'),\n    ('Delaware','Dover'),\n\
    \    ('Pennsylvania','Harrisburg'),\n    ('Vermont','Montpelier')\n])\nprint(states)\n\
    ```\n\n你可以看到，在两个示例中，字典的构建方式非常相似，只是语法上有一些变化，例如第一个示例中使用冒号，而第二个示例中使用括号和逗号。然而，`print`\
    \ 语句产生相同的结果。\n\n字典之所以被称为键值对，是因为第一个项目是键，第二个配对的项目是值。因此，对于 `Ohio` 和 `Columbus`，`Ohio`\
    \ 是*键*，而 `Columbus` 是*值*。我们可以使用键来调用任何值。例如，我可以调用 `states['Ohio']`，它应该返回 'Columbus'。看看代码：\n\
    \n```\n>>> states['Ohio']\n```\n\n这是输出：\n\n```\n'Columbus'\n```\n\n我们可以对字典中的任何键值对执行此操作。但如果我们尝试调用一个不在字典中的键，例如\
    \ `Alabama`，那么我们会得到以下错误：\n\n```\n>>> states['Alabama']\n```\n\n这将导致显示以下错误：\n\n\
    ```\nTraceback (most recent call last):\n  File \"<pyshell#23>\", line 1, in <module>\n\
    \    states['Alabama']\nKeyError: 'Alabama'\n```\n\n请注意，这给出了 `KeyError`，在*第 8\
    \ 章，识别解决方案中的挑战*的*逻辑错误*部分的错误列表中提到过。但假设我们确实想添加 `Alabama` 及其首府 `Montgomery`。我们可以使用以下代码来实现：\n\
    \n```\n>>> states['Alabama'] = 'Montgomery'\n```\n\n输入以下代码后，我们再次调用字典：\n\n```\n\
    >>> print(states)\n```\n\n这将给我们以下输出：\n\n```\n{'Ohio': 'Columbus', 'Delaware':\
    \ 'Dover', 'Pennsylvania': 'Harrisburg', 'Vermont': 'Montpelier', 'Alabama': 'Montgomery'}\n\
    ```\n\n请注意，字典在末尾添加了 'Alabama': 'Montgomery' 键值对。\n\n我们也可以使用 `del` 代码删除键值对，如下所示：\n\
    \n```\n>>> del states['Delaware']\n```\n\n现在，如果我们继续打印 `states` 字典，`Delaware` 就不在列表中了：\n\
    \n```\n>>> print(states)\n```\n\n这是删除该州后的输出：\n\n```\n{'Ohio': 'Columbus', 'Pennsylvania':\
    \ 'Harrisburg', 'Vermont': 'Montpelier', 'Alabama': 'Montgomery'}\n```\n\n现在，你可以继续添加或删除项目，而无需进入主算法。\n\
    \n使用字典，你还可以为一个键添加多个值。假设我从事三项运动（实际上我没有）。我可以在字典中列出这些运动，并将它们与一个键值匹配。看看下面的算法：\n\n\
    ch9_dictionary3.py\n\n```\nmiscellaneous = {\n    'sports' : ['tennis', 'bowling',\
    \ 'golf'],\n    'age' : '40',\n    'home' : 'lake'\n}\n```\n\n我们可以使用 `print(miscellaneous)`\
    \ 打印完整的字典，如下所示：\n\n```\n>>> print(miscellaneous)\n```\n\n这是我们得到输出的方式：\n\n```\n\
    {'sports': ['tennis', 'bowling', 'golf'], 'age': '40', 'home': 'lake'}\n```\n\n\
    如你所见，打印的字典包含了所有值。如果我只想打印运动项目，那么我可以使用 `miscellaneous['sports']` 代码：\n\n```\n>>>\
    \ miscellaneous['sports']\n```\n\n这是输出：\n\n```\n['tennis', 'bowling', 'golf']\n\
    ```\n\n请注意，我们根本没有使用 `print()` 函数。我们使用了名为 `miscellaneous` 的字典，并调用了 'sports' 键。请注意，我们之所以能得到这个结果，是因为我们在\
    \ Python 的 `IDLE` 命令窗口中调用了字典。如果你想将其包含在你的算法中，你仍然需要使用 `print()` 函数。\n\n虽然我们不会在这里深入探讨字典的所有功能，但你可以看到它们在创建包含键值对的算法时如何提供帮助。Python\
    \ 允许我们使用简单的代码添加和修改字典、调用值等，而无需访问整个字典来执行这些操作。\n\n接下来，我们将看看列表。\n\n## 定义和使用列表\n\n\
    Python 中的列表是有序且可变的。我们可以为任何东西创建列表，例如动物类型、颜色、水果、数字，或者任何我们想要的东西。由于我们可以有重复的值，我们可以有一个包含三个苹果的列表，只是简单地写着\
    \ `apple`、`apple`、`apple`。例如，看看这里显示的列表：\n\nch9_list1.py\n\n```\nfruits = ['apple','apple','apple']\n\
    print(fruits)\n```\n\n当我们打印这个列表时，所有项目都被包含在内。输出如下：\n\n```\n['apple', 'apple', 'apple']\n\
    ```\n\n如你所见，我们有三个相同的值。我们无法在字典中做到这一点，因为字典不允许重复的成员。\n\n现在，让我们看看我们可以用列表做什么。让我们从以下动物列表开始：\n\
    \nch9_list2.py\n\n```\nanimals = ['dog', 'cat', 'bird', 'lion', 'tiger',\n   \
    \        'elephant']\n```\n\n列表中的第一个项目是 `dog`。列表有索引，从 0 开始。因此，如果我们打印 `animals[0]`，我们将得到\
    \ `dog`。我们可以在这里检查：\n\n```\n>>> print(animals[0])\n```\n\n这是索引 0 的输出：\n\n```\n\
    dog\n```\n\n列表中有六个项目，但最后一个索引是 [5]。因此，要打印 `elephant`，我们需要使用该索引进行打印，如下所示：\n\n```\n\
    >>> print(animals[5])\nelephant\n```\n\n你也可以在列表中使用负数作为索引。[-1] 索引指的是最后一个索引，因此它代表\
    \ `elephant`，与索引 [5] 相同：\n\n```\n>>> print(animals[-1])\nelephant\n```\n\n[-2]\
    \ 索引指的是倒数第二个索引——即 `tiger`，依此类推。\n\n我们还可以通过指定索引范围来打印列表中的多个项目。看看下面的代码：\n\n```\n\
    >>> print(animals[1:4])\n```\n\n这是输出：\n\n```\n['cat', 'bird', 'lion']\n```\n\n\
    如你所见，我们打印了列表中的第二个项目，对应于索引 [1]，以及接下来的两个项目。\n\n使用列表，我们还可以添加项目、替换项目、删除项目、检查长度等等。要添加一个项目，我们需要使用\
    \ `append()` 方法。让我们将 `duck` 项目添加到我们的列表中：\n\n```\n>>> animals.append('duck')\n\
    >>> print(animals)\n```\n\n这是添加的项目：\n\n```\n['dog', 'cat', 'bird', 'lion', 'tiger',\
    \ 'elephant', 'duck']\n```\n\n请注意，我们的列表现在在末尾有了 `duck`。但假设我们想删除 `bird` 并用 `butterfly`\
    \ 替换它。\n\n首先，我们必须确定 `bird` 的索引。该索引是 2，因为它是列表中的第三个项目：\n\n```\n>>> animals[2] =\
    \ 'butterfly'\n>>> print(animals)\n```\n\n这是输出，其中 `bird` 已被替换：\n\n```\n['dog',\
    \ 'cat', 'butterfly', 'lion', 'tiger', 'elephant', 'duck']\n```\n\n列表现在包含 `butterfly`。\n\
    \n删除项目相当简单，我们只需使用 `remove()` 方法和要删除的项目：\n\n```\n>>> animals.remove('lion')\n>>>\
    \ print(animals)\n```\n\n如你所见，`lion` 已从列表中删除：\n\n```\n['dog', 'cat', 'butterfly',\
    \ 'tiger', 'elephant', 'duck']\n```"
