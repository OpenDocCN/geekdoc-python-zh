  md: '# 14


    # Using Python in Experimental and Data Analysis Problems


    In this chapter, we will look at how Python can help us understand and analyze
    data using algorithms and libraries created specifically for data analysis and
    data science. First, we will go through experimental data and then move on to
    algorithms that use two main libraries: **NumPy** and **pandas**.


    In this chapter, we will cover the following topics:


    +   - Defining experimental data

    - Using data libraries in Python

    - Understanding data analysis with Python

    - Using additional libraries for plotting and analysis


    By the end of this chapter, you will be able to define types of experiments, data
    gathering, and how computational thinking helps when designing models and solutions.
    You will also learn how to use data libraries, particularly, **NumPy**, **pandas**,
    and **Matplotlib**, to help in analyzing and displaying data. Finally, you’ll
    be able to design algorithms that help with data analysis so that you can learn
    from existing data.


    # Technical requirements


    You will need to install the latest version of Python to run the code in this
    chapter.


    You will also need to have a few libraries installed – that is, **NumPy**, **pandas**,
    **Matplotlib**, and **Seaborn**.


    You may choose to use an integrated environment to run Python, such as **Anaconda**,
    which can simplify the library dependencies and help organize your algorithm into
    notebooks.


    The source code for this chapter can be found in this book’s GitHub repository:
    [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter14](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter14).


