    is even being asked. You are given a set of conditions and it is your job to determine
    what the problem is and find solutions for that problem that you have defined.
    If you think about it, there is no perfect answer for this problem, but there
    are ways for you to create conditions that work to determine which option is indeed
    best, depending on the height of the contestant.


    To **decompose** this problem, we need to look at what is stated and take into
    consideration what is not stated. We need rules.


    Simply stated, a winner will choose a monetary payout: either $250 in cash or
    the equivalent of their height in quarters. Those things are stated. But what
    isn’t stated is also important:


    +   - *What is the timeline for the raffle? How many winners are there?*

    - *Do we want to track how much we have spent after each contestant has made their
    choice?*

    - *Do we want to use a baseline for comparison purposes?*


    There are other things that may come to mind, but for now, let’s stick to these
    questions. We are going to assume that the raffle doesn’t have a set start or
    end date and that the radio station may choose multiple winners on a given day
