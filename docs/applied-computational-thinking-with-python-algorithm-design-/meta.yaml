    To my parents, Elia and Miguel, and to my siblings, Rebeca, Graciela, and Miguelito,
    without whom I wouldn’t be who I am or have been able to have the experiences
    that got me here. I love you all. To Kristen, Tere, and Joel, who always see me
    and lift me up. And to my nieces, Ana Cecilia, Mariana, Isabel, Daniela, and Malena,
    who brighten up my world in the most amazing ways. I would also like to thank
    Mark Stehlik, David Kosbie, Erin Bozzo, Evan Mallory, Austin Schick, and Tim Barnes
    – there are no words to express how thankful I am to work with such a supportive
    team. – Sofia De Jesús


    > To my sisters, Noemi Reyes and Julie Reyes – your guidance and support has been
    invaluable. Thank you for being inspiring figures in my life and always pushing
    me towards greatness. I also want to extend my gratitude to Elizabeth Leon Gonzalez,
    Samantha Tolentino Benitez, Iris Beatriz Canela, Deborah Mirabal Polite, Rosemary
    Vergara, and Suajiry Cabassa. Your encouragement and belief in me have led me
    to finish this book. To all those who have stood by me, cheered me on, and lent
    a helping hand – each of you has played a crucial role in this journey. This book
    is not just my achievement but a testament to your unwavering faith in me. From
    the bottom of my heart, thank you. – Dayrene Martinez


    # Contributors


    # About the authors


    **Sofía De Jesús** is a computer science education curriculum designer and developer
    with experience as a computational thinking teacher. She has a degree from the
    University of Puerto Rico with a focus on mathematics. She has a master’s degree
    from the University of Dayton. She also completed all doctoral credits (64) toward
    an EdD (ABD). Her experience in education and development spans two decades. As
    a teacher, Sofía helps students incorporate the philosophy of computational thinking
    in courses such as game design, circuits, Python, web design, and robotics. She
    likes to play video games and create materials, small furniture, and jewelry using
    CNC machines and laser cutters. She enjoys spending as much time in Puerto Rico
    as work and life permits.


    > This book would not be possible without my co-author, Dayrene Martinez – thank
    you. I would also like to thank my CSTA Equity Fellowship cohort for their unwavering
    support and for tackling the issues that affect our most vulnerable students.
    And to all those who fight for equity and representation in CS and tech fields,
    those I’ve met along the way, and those I’ve yet to meet – thank you.


    **Dayrene Martinez** is a data engineer specializing in AI at one of the Big Four
    consulting firms. She holds a bachelor’s degree in electrical engineering. Her
    expertise includes optimizing neural network models, ETL and AWS cloud computing.
    Previously, she was a systems engineer in the defense industry, developing neural
    networks for aerospace vehicle decision-making. Dayrene is a dedicated and passionate
    engineer who serves as a keynote speaker and mentor inspiring high school students,
    college students, and career changers in engineering and tech by sharing her experiences
    and insights, making a positive impact on the next generation of talent in the
    field.


    I would like to thank my co-author, Sofia, for helping me accomplish one of my
    lifetime goals – publishing a book. I would also like to thank Josh Friedman and
    Brooke Desch for their persistent encouragement and for always inspiring me to
    be the best version of myself, reinforcing the importance of consistency and dedication.
    To Christine and Elbert Brown Clayton, for being the muse behind my first chapter:
    I will also forever extend my gratitude to those who introduced me to Web3 – Elizabeth
    Leon Gonzalez, Jeffery Garcia, and Squeeze.


    # About the reviewers


    **Dr. Gowrishankar S.** is currently working as a Professor in the Department
    of Computer Science and Engineering at Dr. Ambedkar Institute of Technology, Bharat.
    He earned his M.B.A. in Marketing Management from Indira Gandhi National Open
    University (IGNOU), Ph.D. in Engineering from the Faculty of Engineering and Technology,
    Jadavpur University, M.Tech. in Software Engineering from Visvesvaraya Technological
    University (VTU), and B.E. in Computer Science and Engineering from Visvesvaraya
    Technological University (VTU). His current research efforts are mainly focused
    on the applications and implications of Machine Learning, Deep Learning and Data
    Analytics for the upliftment of society.


    **Tushar Sadhwani**, long term developer, author and speaker, has worked with
    Python for about 10 years, and contributes to various open-source Python projects.
    He has experience building developer tooling, linters, code formatters and other
    similar software in Python.


