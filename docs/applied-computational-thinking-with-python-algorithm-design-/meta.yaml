  - '[PAGE 319]


    A salesman needs to travel to a set number of cities or locations. Let’s say the
    salesman has 10 locations to go to. They could go to those 10 locations in a lot
    of different orders. Our goal with this algorithm is to create the best possible
    and most efficient route to hit those locations.

    Note that for this particular scenario, as we will do in the next problem, we’ll
    employ straightforward analysis by using the four elements of the computational
    thinking process.


    # Defining the problem (TSP)


    This problem is a little more complex than it appears initially. Think of it this
    way – if we have 10 destinations and we calculate round-trip permutations to check
    the fastest routes, we’re left with more than 300,000 possible permutations and
    combinations. As a reminder, a permutation considers order, while a combination
    does not.

    For example, the numbers 3,344 and 3,434 are two different permutations. However,
    they are only counted as one combination because the order of the numbers does
    not matter.

    Back to our problem. All we need to know is that we want to create an algorithm
    that will take us to our destinations in the most efficient way. We have to identify
    the cities to be visited and identify the way we’ll travel, as follows:


    +   - There are five cities in total, namely, New York City (NYC), Philadelphia,
    Baltimore, Chicago, and Cleveland.

    - We will use one vehicle because we’re using TSP instead of the vehicle routing
    problem (VRP).

    - The first city is 0, which is NYC. The distance between NYC and itself is 0.


    Now, let’s look at the pattern.


    # Recognizing the pattern (TSP)


    For each city, there will be a total of five distances, with the distance to itself
    equal to 0. We are going to need an array, or lists, for all the distances for
    each city. We will need to create a model to access the data in our algorithm.
    We’ll look at that while designing the algorithm. First, let’s talk about generalizing
    the pattern a bit.


    # Generalizing (TSP)


    For this particular problem, we’ll enter the cities manually into the algorithm
    itself. One thing you may want to consider is how to get input from a user to
    create the arrays necessary with the distances.'
