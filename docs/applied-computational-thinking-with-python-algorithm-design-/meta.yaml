    # Learning to identify logical errors


    Before we talk too much about logic errors, let’s talk about why it’s important
    to keep them in mind. In Python, not all errors lead to a failed or crashed program.
    Some logic errors will allow a program to run entirely without crashing at all
    or alerting the user of an error. Those errors are hard to identify.


    Here are some logic errors that can get us in trouble, but keep in mind that there
    are many ways to incorporate logic errors into our programs accidentally:


    +   - Using the wrong variable in an equation or statement

    - Using the wrong operator to test conditions

    - Using the wrong indentation when checking for conditions


    The one I am the guiltiest of is switching my variables, but I do also make mistakes
    in indentation often. Usually, those get identified more often when I try to run
    the program, because the program may fail to run in some instances.


    Let’s take a look at a simple algorithm that contains an error in a formula. In
    this first algorithm, the goal is to get the total cost after buying a number
    of orders of fries from a restaurant at a cost of $1.50 each:


    ```

    number = int(input("Type the number of fries you are ordering: "))

    cost = 1.50

    total = number * number

    print("Your total cost is $" + str(total) + ".")

    ```


    If we run the preceding program, the program will run without problem/error and
    show the following output for 12 orders of fries:


    ```

    Type the number of fries you are ordering: 12

    Your total cost is $144.

    ```


    Now, if we’re paying attention, we’ll realize that the cost for 12 orders of fries
    is too high at $144. That’s because there is an error in our algorithm. The algorithm
    should contain the `total = cost * number` formula, as follows:


    ```

    number = int(input("Type the number of fries you are ordering: "))

    cost = 1.50

    total = cost * number

    print("Your total cost is $" + str(total) + ".")

    ```


    Now that we’ve fixed that formula, the output is correct:


    ```

    Type the number of fries you are ordering: 12

    Your total cost is $18.0.

    ```'
