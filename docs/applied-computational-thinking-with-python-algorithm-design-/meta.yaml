  - '[PAGE 129]


    ![](img/b193dd901f0befc8cf3c9fa5265db3da_129_0.png)


    Figure 7.2 – Brainstorm diagram


    As you can see from the diagram, there are many considerations to be made. The
    actual survey design may be provided to us as programmers or we may be part of
    designing the survey. If we have the survey, our brainstorm may look different,
    as we navigate through the questions and decide how to best place them within
    the algorithm. This is part of the empathizing process. We are looking at our
    information from multiple angles, from multiple stakeholders’ perspectives, and
    deciding how we’ll write an algorithm to help us get to where we need. The purpose
    of an informal diagram such as a brainstorm is that it allows us to begin organizing
    ideas before trying to create a more detailed and organized flowchart. When we
    work on the diagram, we are defining and ideating our algorithm. That’s why it’s
    important to sketch out our plans before beginning to code directly.


    About flowcharts, we saw a few in the last chapter when discussing the creation
    of a store in Python. Now, let’s take a look at a flowchart for decision-making
    based on some decisions.'
  - '[PAGE 130]


