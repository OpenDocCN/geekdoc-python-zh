    - [第10章](https://example.com)，理解输入与输出以设计解决方案算法

    - [第11章](https://example.com)，控制流

    - [第12章](https://example.com)，在简单挑战中使用计算思维与Python

    - [第13章](https://example.com)，调试


    ## 9 Python简介


    在本章中，我们将学习Python命令和功能，同时将它们应用于问题。随着我们深入*第二部分：应用Python与计算思维*的第一章，我们将使用更复杂的Python编程。在本章中，我们将更侧重于语言本身，而其余章节将侧重于应用。


    在本章中，我们将涵盖以下主题：


    - Python简介

    - 使用字典和列表

    - 使用变量和函数

    - 了解文件、数据和迭代

    - 使用**面向对象编程（OOP）**

    - 问题1——创建图书库

    - 问题2——组织信息

    - 问题3——循环与数学


    随着我们更深入地研究Python编程语言，请记住，其中一些内容在之前的章节中已经涉及，例如在之前章节中探讨计算思维过程时使用了字典。本章将使你在寻找满足计算思维问题需求的Python命令时，能够更轻松地找到关键信息。


    ### 技术要求


    以下是本书中使用的完整源代码：[https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter09](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter09)。


    ### Python简介


    Python是增长最快的编程语言之一，这得益于其易用性。Python的吸引力之一在于，我们可以用它编写与C、C++和Java等语言相同的程序，但代码行数更少，语言和语法更简单。Python的另一个巨大吸引力在于它是**可扩展的**，这意味着我们可以为其添加功能和特性。


    虽然并非所有功能都是内置的，但我们可以使用库来添加我们需要的功能。这些库可供下载和使用。例如，如果我们想处理数据和数据科学，有几个库可以下载，例如**Pandas**、**NumPy**、**Matplotlib**、**SciPy**、**Scikit
    Learn**等。但在我们深入这些库之前，让我们先看看Python语言是如何工作的，并学习其基础知识。


    Python有一些内置的参考函数。下表按字母顺序列出了这些函数：


    | abs() | all() | any() | ascii() |

    |---|---|---|---|

    | bin() | bool() | breakpoint() | bytearray() |

    | bytes() | callable() | chr() | classmethod() |

    | compile() | complex() | delattr() | dict() |

    | dir() | divmod() | enumerate() | eval() |

    | exec() | filter() | float() | format() |

    | frozenset() | getattr() | globals() | hasattr() |

    | hash() | help() | hex() | id() |

    | input() | int() | isinstance() | issubclass() |

    | iter() | len() | list() | locals() |

    | map() | max() | memoryview() | min() |

    | next() | object() | oct() | open() |

    | ord() | pow() | print() | property() |

    | range() | repr() | reversed() | round() |

    | set() | setattr() | slice() | sorted() |

    | staticmethod() | str() | sum() | super() |

    | tuple() | type() | vars() | zip() |

    | __import__() | | | |


    表9.1 – Python内置函数


    虽然我们不会在本书中介绍所有函数，但当我们研究Python及其算法时，我们将使用其中一些。让我们从这里列出的一些数学函数开始。


    ### 数学内置函数


    在Python中，一些数学函数是内置的，例如`abs()`、`eval()`、`max()`、`min()`和`sum()`函数。这些并非唯一的内置数学函数，但我们将更仔细地研究这些特定函数，以了解Python如何处理它们。


    `abs()`函数将帮助我们找到一个数字（整数或浮点数）的绝对值。请看以下代码片段：


    ch9_absFunction.py


    ```

    x = abs(-3.89)

    print(x)

    ```


    当我们运行这个程序时，我们将得到-3.89的绝对值。请记住，一个数字的绝对值是它到0的距离。请看我们运行此程序时的输出：


    ```

    3.89

    ```


    由于绝对值总是正数，当我们运行`abs(-3.89)`时，我们得到3.89。


    另一个有用的函数是`eval()`函数。我们可以在这个函数中定义一个变量，然后调用Python使用该值计算代数表达式。在Python shell中，我们可以首先定义变量如下：


    ```

    >>> p = 2

    ```


    现在变量已定义，我们可以使用任何表达式调用`eval()`函数。请注意，使用`eval()`要求我们将表达式作为字符串输入。例如，请看以下输入和输出：


    ```

    >>> eval(''2 * p - 1'')

    ```


    如你所见，Python使用了先前定义的**p**值2，将其代入表达式，然后计算出此输出：


    ```

    3

    ```


    但需要注意的是，你也可以直接在Python中输入表达式，而不必使用`eval()`函数。


    例如，`>>> p*2`将得到与`eval(''p * 2'')`相同的答案，给定**p** = 2的值，结果将是4。


    Python程序也可以作为计算器使用，因此你可以像往常一样执行数学运算。这里有几个例子：


    ```

    >>> 10-8

    2

    ```


    如你所见，Python知道将短横线读作减法，并产生数学表达式的结果：


    ```

    2

    ```


    在下一个例子中，Python将+解释为数学符号，并提供了**求和**表达式的结果：


    ```

    >>> 4+5

    ```


    输出如下所示：


    ```

    9

    ```


    注意最后一个表达式`10**5`。在Python中，我们可以使用两个星号（**）表示指数，如下所示：


    ```

    >>> 10**5

    ```


    给出的输出是：


    ```

    100000

    ```


    现在，让我们看看`max()`函数。此函数可用于可迭代列表，但我们可以仅用两个数字进行测试，如下所示：


    ```

    >>> max(12, 30)

    ```


    你可以清楚地看到输出是什么：


    ```

    30

    ```


    让我们再举一个例子：


    ```

    >>> max(100, 10)

    ```


    这是输出：


    ```

    100

    ```


    从输出中可以看出，该函数总是选择最大的项。你可以添加第三项，该函数仍然会选择最大值。这些内置函数在某种程度上是智能的，它们被编码为处理提供的内容——例如两个或三个项目——而无需明确告诉Python我们将引入多少个项目：


    ```

    >>> max(230, 812, 109)

    ```


    获得的输出是：


    ```

    812

    ```


    如你所见，我们无需向内置函数添加任何内容即可找到三个值中的最大值。


    `min()`函数则相反；它选择最小值。请看以下最小函数：


    ```

    >>> min(230, 812, 109)

    ```


    这是输出：


    ```

    109

    ```


    如你所见，该函数使用了与最大函数相同的列表，但这次输出是109，这是该组数字中的最小值。


    还有其他数学函数，例如`sum()`。如果你是Python初学者，建议你尝试这些函数以了解它们的工作原理。这些函数在你为计算思维问题设计解决方案时，将是算法的关键。当我们研究其他Python功能（如字典和数组）时，我们也将使用其中一些函数。


    ### 使用字典和列表


    在我们深入研究字典和列表之前，重要的是要注意Python在内置函数中不包含数组。我们可以使用列表，并对列表执行许多我们通常用于数组的传统函数。然而，为了获得更强大的数组功能，需要使用库，例如NumPy。'
