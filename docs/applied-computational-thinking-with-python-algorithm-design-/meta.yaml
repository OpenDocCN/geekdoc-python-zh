    我们还可以使用和测试许多其他聚类算法。了解它们并比较结果，对于根据真实数据集确定使用哪些算法至关重要。在这种情况下，K-means算法的结果与模型拟合得不好。当使用两个聚类时，BIRCH模型似乎更合适，因为K-means算法中的方差不相等。\n\
