    , line 8, in <module>\n    print(number2)\n  File \"/Users/.../Python/ch8_debugger.py\"\
    , line 8, in <module>\n    print(number2)\nbdb.BdbQuit\n```\n\n如你所见，一旦我们使用 `q`\
    \ 命令，就会得到一个**回溯错误**，因为程序退出了。它打印了 `breakpoint()` 代码之前的行，但没有打印第二个 `print(number2)`\
    \ 命令。现在，让我们看看当我们输入 `n`（应该带我们到下一行）时会发生什么：\n\n```\n5\n> /Users/.../Python/ch8_debugger.py(8)<module>()\n\
