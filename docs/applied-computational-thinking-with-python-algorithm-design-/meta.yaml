    \ statement, Python will give us an invalid syntax error. So, let’s take a look\
    \ at what happens if we change that statement to an `if` statement:\n\n```\nfor\
    \ i in range(5):\n    if i < 3:\n        print(i + 2)\n        if i < 4:\n   \
    \         print(i * 2)\n    else:\n        print(i * 100)\n```\n\nThis code is\
    \ “correct” – that is, it will run! But is it what we intended? Well, that depends.\
    \ If we expected the output to be 2, 3, 4, 6, 400, then we made a mistake. When\
    \ `i` has values of 0, 1, and 2, we’d add 2, getting the values 2, 3, and 4. When\
    \ `i` has a value of 3, then we’d multiply by 2, getting the value 6. And when\
    \ `i` has a value of 4, we’d multiply by 100, getting 400. However, the output\
    \ we got from the preceding code is as follows.\n\n```\n2\n0\n3\n2\n4\n4\n300\n\
    400\n```\n\nSo, what happened? The issue is that our indentation for the second\
    \ condition is part of the first `if` statement. So, it first checks whether the\
    \ value is under 3, so `i` will take on the values of 0, 1, and 2. But then, it\
