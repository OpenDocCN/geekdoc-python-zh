  - '[PAGE 234]


    If we wanted to make sure that the price works for both of the functions, we’d
    need to define it inside each of the functions. It sounds like having a global
    variable would save us some trouble, but in reality, using a global variable can
    simply break our code or provide us with outputs that we were not expecting. Also,
    if we are not careful, our code may be posted to applications with errors and
    show prices we didn’t intend to have.


    Having global variables makes our code harder to debug. Functions can change the
    values of the variables and affect other functions. Because we can return values
    inside functions, the values can then change globally as well. There are just
    too many pitfalls in using a global variable rather than defining and using variables
    inside their functions. However, this is not to say that you should never use
    a global variable, but you should consider the implications of doing so and determine
    whether your code should have a variable defined globally or locally inside a
    function.


    Are these the only errors we’ll encounter? No. However, we’ve now covered a few
    different types of errors and debugging in [Chapter 5, Errors](Chapter 5, Errors),
    [Chapter 8, Identifying Challenges within Solutions](Chapter 8, Identifying Challenges
    within Solutions), and this chapter. We will continue to explore errors in our
    algorithms as we learn more about computational thinking and designing algorithms
    in multiple applications, but for now, let’s move on to the next chapter, *Using
    Python in Experimental and Data Analysis Problems*.


    # Summary


    In this chapter, we learned about some of the challenges in debugging code, including
    syntax errors that may not be identified by Python and other errors associated
    with global and local variables.


    When working with syntax, punctuation, and indentation, some errors will be flagged
    by Python, while other errors may be harder to find. Always run your code often,
    identify possible issues, make sure you check the mathematical aspects of the
    code, and verify that the output values match your expected values. We’ll make
    mistakes in our algorithms, so we need to ensure we are not unintentionally creating
    larger issues by not debugging as frequently as we should.


    In the next part of this book, we’ll look at data. Python is an incredibly powerful
    programming language, allowing us to create algorithms with the use of some libraries
    that show us visual representations of data, analyze it, and even help us create
    machine learning models for artificial intelligence. We’ll explore many of these
    topics in the upcoming chapters.'
- md: '## Part 3: Data Processing, Analysis, and Applications Using Computational
    Thinking and Python


    Data is all around us. We use data to inform decisions about policies, such as
    how many resources are provided for a school district, how large the budget for
    a county or state’s Medicare program will be, how much we pay for housing in an
    area, and the trends of the real estate market. Data is embedded in the way that
    we interact with advertisements too. Simply put, understanding more about data
    and how to use Python to analyze it is a really important skill set.


    In this part, you will be introduced to advanced functionalities of the Python
    programming language associated with data analysis and other applications, such
    as cryptography, experimental data, data mining, and machine learning. With the
    advent of Artificial Intelligence (AI) and Generative AI (GenAI), it is imperative
    that you have a basic knowledge of concepts in data, machine learning, and AI,
    not only as a programmer but also to understand how AI tools are incorporated
    into the technology that surrounds us. We will use computational thinking to design
    solutions and algorithms for many real-world, applied problems, from those in
    language and historical analysis to those in some machine learning applications.


    This part comprises the following chapters:


    - [Chapter 14](https://example.com), Using Python in Experimental and Data Analysis
    Problems

    - [Chapter 15](https://example.com), Introduction to Machine Learning

    - [Chapter 16](https://example.com), Using Computational Thinking and Python in
    Statistical Analysis

    - [Chapter 17](https://example.com), Applied Computational Thinking Problems

    - [Chapter 18](https://example.com), Advanced Applied Computational Thinking Problems

    - [Chapter 19](https://example.com), Integrating Python with Amazon Web Services
    (AWS)


    ## 14


    ## Using Python in Experimental and Data Analysis Problems


    In this chapter, we will look at how Python can help us understand and analyze
    data using algorithms and libraries created specifically for data analysis and
    data science. First, we will go through experimental data and then move on to
    algorithms that use two main libraries: **NumPy** and **pandas**.


    In this chapter, we will cover the following topics:


    - Defining experimental data

    - Using data libraries in Python

    - Understanding data analysis with Python

    - Using additional libraries for plotting and analysis


    By the end of this chapter, you will be able to define types of experiments, data
    gathering, and how computational thinking helps when designing models and solutions.
    You will also learn how to use data libraries, particularly, **NumPy**, **pandas**,
    and **Matplotlib**, to help in analyzing and displaying data. Finally, you’ll
    be able to design algorithms that help with data analysis so that you can learn
    from existing data.


    ### Technical requirements


    You will need to install the latest version of Python to run the code in this
    chapter.


    You will also need to have a few libraries installed – that is, **NumPy**, **pandas**,
    **Matplotlib**, and **Seaborn**.


    You may choose to use an integrated environment to run Python, such as **Anaconda**,
    which can simplify the library dependencies and help organize your algorithm into
    notebooks.


    The source code for this chapter can be found in this book’s GitHub repository:
    [https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter14](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter14).


    ### Defining experimental data


    *We''re finally at the data chapter of this book. We all have our biases and areas
    where we just love to live. This is one of mine.* There are many reasons why data
    is so important, but let''s start with the fact that data – how we collect it,
    how we analyze it, and how we present it – has a massive impact on our daily lives.


    When writing algorithms to display information, we have a responsibility to share
    that data in the least biased way possible, making sure that our data is inclusive
    and representative of our communities and our people. I wanted to make sure I
    said that before we talk about the topic in as much depth as a chapter will allow
    me to. For me, this is how I fell in love with code and Python.


    In this section, we''re going to go over experimental data, defining what it is
    as well as key terms that are used when working with experimental data.


    Now, let''s get started. **Experimental data** is a term that gets its use from
    science and engineering. However, we also use experimental data in other areas,
    such as education, civics, and much more. Experimental data includes the methodology,
    how we measure data, the design of the experiments we are conducting, and how
    we present the data we gather and analyze from those designs. For this chapter,
    we won''t be designing the experiments. Instead, we''re going to be focusing on
    how we can use Python to analyze existing data. But it is important to note that,
    if we have a say in the experiment, we need to make sure we are designing it fairly.


    If the experimental design and the data collection methods are sound, then the
    data we use and analyze will be much more helpful than if we begin with a biased
    experiment. While we can never eliminate bias completely, as researchers and developers,
    it is our responsibility to present data with the least amount of bias possible.
    *Why is this important?* Think of all the policy changes that happen based on
    data, graphs, and information presented from experiments. If the experiments are
    biased, the results will lead to policies that may not adequately encompass the
    needs of a community, for example.


    As a few examples you may have seen in ads while watching TV, you may recall how
    toothpastes are “*recommended by 4 out of 5 dentists*” or heard lines such as
    “*improvements after using this medication were observed in 50% of study participants.*”
    Those claims seem impressive or at least “good,” right? But what if *only* 5 dentists
    were asked? Is that representative of the population of dentists? And what if
    the “study participants” was a group of two individuals? The data we collect would
    not be very valid (and let''s not get into the amount of bias and even outright
    lies that are told through TV ads sometimes, but this is a chapter on data, so
    I digress). The point I am trying to make is that if you have a say in the design
    of the experiment, design it as well as you can so that it''s as fair as possible
    for the sake of your experiment, the results, and the possible consequences to
    society. But now, let''s get back to data.


    When working with data, we are always using computational thinking elements. As
    we tackle problems, we have to define what the problems are, what we want to study,
    how we want to measure them, how we’ll be able to create and generalize the patterns,
    and what algorithm we’ll need to use to produce the best representations of our
    data. Everything we do in data analysis benefits from us using computational thinking
    elements.


    Data science is a growing field in **STEM**. In 2017, it was named the fastest-growing
    field in the US. The US Bureau of Labor Statistics stated that an estimated 11.5
    million new jobs are expected in data science and statistics by 2026. Currently,
    there are more jobs available than qualified candidates.


    Now, let’s look at how Python lets us tackle data.


    In experimental data, we want to gather information using independent, dependent,
    and control variables:


    - **Independent variables** are variables that are changed or controlled by the
    researcher

    - **Dependent variables** are variables that are measured or tested by the researcher;
    dependent variables *depend* on independent variables

    - **Control variables** are variables or factors in the experiment that must remain
    the same


    Let’s look at a simple example of these variables in an experiment. A common example
    involves the study of plant growth. The independent variables can be one or multiple
    variables. For our example, our independent variable will be the amount of fertilizer
    we add to the plants. The plant growth will be a dependent variable. The **control**
    will not get any fertilizer, just water. So, in our experiment, let’s say we have
    five plants that we will be measuring. One plant will only get water. That’s our
    **control**. The other four will have varying levels of fertilizer added to them.
    Those are our **experimental** plants. The growth is **dependent** on the amount
    of fertilizer.


    When we design experiments, there are three things we want to be true: that they
    are reliable, valid, and can be generalized. Here’s what each of these things
    means:


    - **Reliable** relates to the consistency of the measurements. This means that
    if we mimic the conditions, our results should be reliably similar.

    - **Valid** relates to whether or not the experiment measured what it intended
    to measure.

    - **Generalizable** relates to the results being something that can be generalized
    and applied to other settings.


    There is a lot more detail and depth we could go into about experiments, but we
    are only looking at what happens once we have the data for this chapter. It is
    important to understand these basic terms for when we design the experiments.
    As developers, depending on our roles, that may be the case. For example, in a
    start-up, everyone may be involved in all aspects of product development. So,
    in those instances, we could be working on the experiment and also the subsequent
    analysis algorithms.'
  mdcn: '## 第三部分：运用计算思维与Python进行数据分析、处理及应用


    数据无处不在。我们利用数据为决策提供依据，例如为学区分配多少资源、县或州的医疗保险计划预算规模、特定地区的住房支出水平，以及房地产市场的趋势。数据也渗透在我们与广告互动的方式中。简而言之，深入了解数据并掌握如何使用Python进行分析，是一项至关重要的技能。


    在本部分中，你将接触到Python编程语言在数据分析及其他应用（如密码学、实验数据、数据挖掘和机器学习）方面的高级功能。随着人工智能（AI）和生成式人工智能（GenAI）的兴起，无论你是作为程序员，还是为了理解AI工具如何融入我们周围的技术，掌握数据、机器学习和AI的基本概念都至关重要。我们将运用计算思维，为从语言和历史分析到某些机器学习应用等众多现实世界的应用问题设计解决方案和算法。


    本部分包含以下章节：


    - [第14章](https://example.com)，在实验与数据分析问题中使用Python

    - [第15章](https://example.com)，机器学习导论

    - [第16章](https://example.com)，在统计分析中运用计算思维与Python

    - [第17章](https://example.com)，应用计算思维问题

    - [第18章](https://example.com)，高级应用计算思维问题

    - [第19章](https://example.com)，将Python与亚马逊云服务（AWS）集成


    ## 14


    ## 在实验与数据分析问题中使用Python


    在本章中，我们将探讨Python如何借助专为数据分析和数据科学创建的算法和库，帮助我们理解和分析数据。首先，我们将介绍实验数据，然后深入探讨使用两个主要库的算法：**NumPy**
    和 **pandas**。


    在本章中，我们将涵盖以下主题：


    - 定义实验数据

    - 在Python中使用数据库

    - 理解使用Python进行数据分析

    - 使用额外的库进行绘图和分析


    学完本章后，你将能够定义实验类型、数据收集方法，以及计算思维在设计模型和解决方案时如何发挥作用。你还将学习如何使用数据库，特别是 **NumPy**、**pandas**
    和 **Matplotlib**，来帮助分析和展示数据。最后，你将能够设计有助于数据分析的算法，从而从现有数据中学习。


    ### 技术要求


    你需要安装最新版本的Python才能运行本章中的代码。


    你还需要安装一些库，即 **NumPy**、**pandas**、**Matplotlib** 和 **Seaborn**。


    你可以选择使用集成环境来运行Python，例如 **Anaconda**，它可以简化库依赖关系，并帮助你将算法组织到笔记本中。


    本章的源代码可以在本书的GitHub仓库中找到：[https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter14](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition/tree/main/Chapter14)。


    ### 定义实验数据


    *我们终于来到了本书的数据章节。我们都有自己的偏见和钟爱的领域。这就是我的其中之一。* 数据之所以如此重要有很多原因，但让我们从数据本身开始——我们如何收集它、如何分析它以及如何呈现它——对我们的日常生活有着巨大的影响。


    在编写算法来展示信息时，我们有责任以尽可能无偏见的方式分享数据，确保我们的数据具有包容性，并能代表我们的社区和人民。在深入探讨本章允许的深度之前，我想确保先说明这一点。对我来说，这就是我爱上代码和Python的原因。


    在本节中，我们将介绍实验数据，定义它是什么，以及处理实验数据时使用的关键术语。


    现在，让我们开始吧。**实验数据**这个术语源于科学和工程领域。然而，我们也在其他领域使用实验数据，例如教育、公民事务等等。实验数据包括方法论、我们如何测量数据、我们正在进行的实验设计，以及我们如何呈现从这些设计中收集和分析的数据。在本章中，我们不会设计实验。相反，我们将专注于如何使用Python来分析现有数据。但需要注意的是，如果我们对实验有发言权，我们需要确保设计是公平的。


    如果实验设计和数据收集方法是可靠的，那么我们使用和分析的数据将比从一个有偏见的实验开始要有用得多。虽然我们永远无法完全消除偏见，但作为研究人员和开发者，我们有责任以尽可能少的偏见来呈现数据。*为什么这很重要？*
    想想所有基于数据、图表和实验呈现的信息而发生的政策变化。如果实验存在偏见，其结果可能导致无法充分涵盖社区需求的政策。


    举几个你可能在看电视广告时见过的例子，你可能记得牙膏“*受到五分之四牙医的推荐*”，或者听过诸如“*使用此药物后，50%的研究参与者观察到改善*”之类的说法。这些说法看起来令人印象深刻，或者至少“不错”，对吧？但如果*只*询问了5位牙医呢？这能代表牙医群体吗？如果“研究参与者”只有两个人呢？我们收集的数据将不是非常有效（我们暂且不谈电视广告中有时存在的偏见甚至彻头彻尾的谎言，但本章是关于数据的，所以我离题了）。我想表达的观点是，如果你对实验设计有发言权，请尽可能设计好，以便为你的实验、结果以及可能对社会产生的后果做到尽可能公平。但现在，让我们回到数据上来。


    在处理数据时，我们始终在使用计算思维的要素。在解决问题时，我们必须定义问题是什么、我们想研究什么、如何衡量它们、如何创建和概括模式，以及需要使用什么算法来产生数据的最佳表示。我们在数据分析中所做的一切都受益于使用计算思维的要素。


    数据科学是**STEM**领域中一个不断发展的领域。2017年，它被命名为美国增长最快的领域。美国劳工统计局表示，预计到2026年，数据科学和统计领域将新增约1150万个就业岗位。目前，可用的岗位多于合格的候选人。


    现在，让我们看看Python如何让我们处理数据。


    在实验数据中，我们希望使用自变量、因变量和控制变量来收集信息：


    - **自变量**是由研究者改变或控制的变量

    - **因变量**是由研究者测量或测试的变量；因变量*依赖于*自变量

    - **控制变量**是实验中必须保持不变的变量或因素


    让我们看一个实验中这些变量的简单例子。一个常见的例子涉及植物生长的研究。自变量可以是一个或多个变量。在我们的例子中，自变量将是我们添加给植物的肥料量。植物生长将是一个因变量。**对照组**将不获得任何肥料，只浇水。因此，在我们的实验中，假设我们有五株植物需要测量。一株植物只浇水。那是我们的**对照组**。另外四株将添加不同水平的肥料。这些是我们的**实验组**植物。生长**依赖于**肥料的量。


    在设计实验时，我们希望满足三个条件：它们是可靠的、有效的，并且可以推广。以下是每个条件的含义：


    - **可靠**与测量的一致性有关。这意味着如果我们模拟相同的条件，我们的结果应该可靠地相似。

    - **有效**与实验是否测量了其打算测量的内容有关。

    - **可推广**与结果是否可以推广并应用于其他环境有关。


    关于实验，我们可以深入探讨更多细节和深度，但在本章中，我们只关注一旦拥有数据后会发生什么。理解这些基本术语对于设计实验很重要。作为开发者，根据我们的角色，情况可能确实如此。例如，在初创公司中，每个人都可能参与产品开发的各个方面。因此，在这些情况下，我们可能既参与实验，也参与后续的分析算法。'
