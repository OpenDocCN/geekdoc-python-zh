  mdcn: "## 创建解决方案\n\n当我们面对问题时，我们希望创建能够解决已知信息的解决方案，该方案需提供所需的一切，并且易于用户理解。在本节中，我们将运用本章所学内容来设计问题的解决方案。\n\
    \n在利用头脑风暴和流程图创建这些解决方案时，我们应考虑以下几点：\n\n- 我们规划的解决方案是否解决了问题？\n- 解决方案设计是否为算法的成功执行展示了清晰的路径？\n\
    \n如果这些问题的答案都是肯定的，那么我们就可以开始编写解决方案的代码了。记住——我们需要尽可能频繁地测试算法。编写算法时，请记住以下几点：\n\n- 添加注释，标识可能需要回顾的部分，并帮助识别和定义你的变量、字典、函数以及任何关键组件\n\
    - 检查是否存在任何错误，例如第6章“探索问题分析”中讨论的那些错误\n- 尽可能频繁地运行程序以测试错误\n\n对于解决方案过程，我们将使用一个与本章前面讨论的调查问题略有不同的问题。在本书后续内容中，我们将逐步介绍可用于该问题的各种组件，例如添加图像、显示图形等。但现在，让我们先使用一些更基础的Python知识来练习创建解决方案的过程。\n\
    \n## 问题2 – 披萨订单\n\n我知道——又是食物。但这是演示逻辑和算法创建的最佳方式之一，所以请耐心听我说。假设我们有一家披萨店。我们只卖一种饼底，因为我们是一家特色店。我们出售两种不同尺寸的披萨：个人装和家庭装。有两种酱料选择：番茄酱和蒜香奶油酱。有三种奶酪选择：不加奶酪、普通奶酪和额外奶酪。\n\
    \n有五种配料可供选择（我限制了数量，因为我们只是在学习这个过程）：蘑菇、意大利辣香肠、意大利香肠、洋葱和甜椒。而且不行——我们不会在披萨上放任何橄榄。\n\
    \n让我们分解这个问题。我们希望有一个算法来捕获用户选择的披萨订单选项。目前我们暂不考虑成本以及订单中的额外项目，例如额外的披萨、饮料、甜点等。\n\n以下是我们已知的信息：\n\
    \n- **尺寸**：个人装或家庭装\n- **酱料**：番茄酱或蒜香奶油酱\n- **奶酪**：不加奶酪、普通奶酪或额外奶酪\n- **配料**：蘑菇、意大利辣香肠、意大利香肠、洋葱和甜椒\n\
    \n现在我们有了这些信息，让我们来看一个包含这些信息的流程图：\n\n如你所见，流程图展示了针对这个特定问题的相当*线性的决策过程*。我们尚未考虑的一点是询问用户是否希望进行任何更改。这可能需要在每个步骤都进行。假设你在选择奶酪时改变了主意，想要番茄酱而不是蒜香奶油酱。你需要有一种方法可以返回，因此在创建算法时我们需要记住这一点。\n\
    \n请记住，我们目前仅使用文本代码，因此暂时将使用数字和字母作为用户输入。然而，有方法可以将Python整合到更强大的算法中，这些算法可以包含图像、按钮等更多元素。\n\
    \n请看以下算法代码片段：\n\n```python\n#首先获取尺寸和酱料变量的输入。\nsize_choice = input(\"这是个人装还是家庭装披萨？输入1表示个人装，2表示家庭装。\
    \ \")\nif size_choice == \"1\":\n    size_choice = \"个人装\"\nelse:\n    size_choice\
    \ = \"家庭装\"\nsauce_choice = input(\"您想要哪种酱料？番茄酱还是蒜香奶油酱？输入m表示番茄酱，g表示蒜香奶油酱。 \")\n\
    if sauce_choice == \"g\":\n    sauce = \"蒜香奶油酱\"\nelse:\n    sauce = \"番茄酱\"\n\
    #奶酪选择将决定更多选项。首先定义变量。\ncheese_choice = input(\"您的披萨要加奶酪吗？输入y表示要，n表示不要。 \")\n```\n\
    \n请注意，在代码片段中，我们首先定义了尺寸和酱料。我在此重申，处理这个特定逻辑过程还有其他方法。例如，我们可以将部分变量保存到字典中，并使用数组进行操作。目前，我们使用迄今为止所学的知识来创建算法，但在本书后续内容中，我们将有机会了解其他方法。\n\
    \n前面的代码片段以奶酪的最终选择结束。无论此处选择如何，我们都需要对配料做出决定。这将需要进行两次，因为我们需要为“要”和“不要”两种情况都做处理。请看以下包含这些选项的代码片段，这是前面代码的延续：\n\
    \n```python\n#无论是否要奶酪，都需要选择配料。\nif cheese_choice == \"y\":\n    cheese2_choice\
    \ = input(\"您想要普通奶酪还是额外奶酪？输入r表示普通，e表示额外奶酪。 \")\n    if cheese2_choice == \"r\"\
    :\n        cheese = \"普通奶酪\"\n    else:\n        cheese = \"额外奶酪\"\n    toppings1_input\
    \ = input(\"您的披萨要加蘑菇吗？输入y表示要，n表示不要。 \")\n    if toppings1_input == \"y\":\n  \
    \      toppings1 = \"蘑菇\"\n    else:\n        toppings1 = \"不加蘑菇\"\nelse:\n  \
    \  cheese = \"不加奶酪\"\nif cheese_choice == \"n\":\n    toppings1_input = input(\"\
    您的披萨要加蘑菇吗？输入y表示要，n表示不要。 \")\n    if toppings1_input == \"y\":\n        toppings1\
    \ = \"蘑菇\"\n    else:\n        toppings1 = \"不加蘑菇\"\nprint(f\"您想要一个{size_choice}披萨，配{sauce}酱，{cheese}和{toppings1}\"\
    )\n```\n\n从代码片段可以看出，我们只处理了蘑菇。在选择了家庭装、蒜香奶油酱、普通奶酪和蘑菇后，此特定代码的输出如下：\n\n```\n这是个人装还是家庭装披萨？输入1表示个人装，2表示家庭装。\
    \ 家庭装\n您想要哪种酱料？番茄酱还是蒜香奶油酱？输入m表示番茄酱，g表示蒜香奶油酱。 g\n您的披萨要加奶酪吗？输入y表示要，n表示不要。 y\n您想要普通奶酪还是额外奶酪？输入r表示普通，e表示额外奶酪。\
    \ r\n您的披萨要加蘑菇吗？输入y表示要，n表示不要。 y\n您想要一个家庭装披萨，配蒜香奶油酱，普通奶酪和蘑菇。\n```\n\n使用提供的代码并查看输出，尝试为剩余的四种配料编写其余代码。我想如果你在制作自己的披萨，欢迎更改这里提供的选项。只是请把橄榄留给你自己。"
