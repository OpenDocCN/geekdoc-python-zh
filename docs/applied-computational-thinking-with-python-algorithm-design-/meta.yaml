    \ 2\nWhat is the upper endpoint of your range? 10\n[2, 4, 6, 8, 10]\n```\n\n如你所见，所有偶数都包含在一个列表中，这比它们逐个打印、一行一行地打印更容易阅读。*想象一下，如果你必须打印\
    \ 300 到*\n\n---\n\n- n: 在函数内移动到下一行\n- s: 在此函数或被调用的**函数**中移动到下一行\n\n让我们看一些代码并运行这里概述的每个命令：\n\
