    The process of creating these diagrams varies by developer or coder. For example,
    I usually create a brainstorm diagram for the problem and then a flowchart from
    that information. To look at that process, let’s go back to our survey problem
    from earlier in this chapter. Look at the brainstorm in *Figure 7.2*. It is not
