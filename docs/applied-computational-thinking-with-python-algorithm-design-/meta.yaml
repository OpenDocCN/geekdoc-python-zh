  md: "# Designing the algorithm (cryptography)\n\nTo write our algorithm, let’s first\
    \ take a look at what we’ll need to do:\n\n+   1. Define the letters.\n2. Change\
    \ all the letters to lowercase to run our algorithm.\n3. Define the required functions\
    \ – **encryption**, **decoding**, and **main**.\n4. Call the cryptography **main**\
    \ function.\n\n**TIP**\n\n*The full algorithm for this problem can be found in\
    \ the **ch17_cryptographyA.py** file.*\n\nWe will start designing our algorithm\
    \ by following these steps:\n\n1. Let’s begin by defining our letters. The following\
    \ code snippet defines our letters and then renders each letter in lowercase:\n\
    \n```\nLETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZABCDEFGHIJKLMNOPQRSTUVWXYZ'\nLETTERS\
    \ = LETTERS.lower()\n```\n\n2. Next, we define our encryption function. This function\
    \ will take two arguments – **message** and **key**. The **message** function\
    \ will be user-defined, which will be done in the **main** function. For now,\
    \ we’ll use an empty message by adding empty quotes ('') as the definition of\
    \ the **encryptedM** variable, as shown in the following code snippet:\n\n```\n\
    def encrypt(message, key):\n    encryptedM = ''\n    for letts in message:\n \
    \       if letts in LETTERS:\n            num = LETTERS.find(letts)\n        \
    \    num += key\n            encryptedM += LETTERS[num]\n    return encryptedM\n\
    ```\n\nNote that we iterate over the letters in the message we want to encrypt,\
    \ and then we use the key that the user defines in the **main** function and encrypt\
    \ the message. This function then returns the encrypted message.\n\n> *But why\
