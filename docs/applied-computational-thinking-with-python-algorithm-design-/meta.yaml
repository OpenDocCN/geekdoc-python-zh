- md: "## Using iteration in algorithms\n\nBefore we go into iteration, let’s define\
    \ the term. **Iteration** means repetition. When we use iteration in algorithms,\
    \ we are repeating steps. Think of a `for` loop.\n\nLet’s take a look at another\
    \ example (we’ve previously used it in this chapter for the `evenNumbers` program):\n\
    \n```\nch9_colorLoop.py\n\ncolors = ['blue', 'green', 'red']\nfor color in colors:\n\
    \    print(color)\n```\n\nThe iteration in this algorithm is that it will repeat\
    \ the `print` process for each of the colors in the original `colors` list.\n\n\
    This is the output:\n\n```\nblue\ngreen\nred\n```\n\nAs you can see, each of the\
    \ colors was printed.\n\nWe can also get input from a user, then iterate to perform\
    \ some operation. For example, take a look at the following algorithm:\n\n```\n\
    ch9_whileAlgorithm.py\n\nask = int(input(\"Please type a number less than 20.\
    \ \"))\nwhile ask > 0:\n    print(ask * 2)\n    ask = ask - 1\n```\n\nAs you can\
    \ see, we defined `ask` as the input variable. Then, we printed double the number\
    \ and reduced the number by 1 as long as `ask` was greater than 0.\n\nThe output\
    \ looks like this:\n\n```\nPlease type a number less than 20. 8\n16\n14\n12\n\
    10\n8\n6\n4\n2\n```\n\nThe output shows the list created by doubling the initial\
    \ number, which is 8 x 2 = 16, then continues until the `ask` variable is no longer\
    \ greater than 0.\n\nNext, let’s take a look at how we can iterate through multiple\
    \ lists. The algorithm uses two lists and then prints a single statement using\
    \ information from both:\n\n```\nch9_Iterations.py\n\njewelry = ['ring', 'watch',\
    \ 'necklace', 'earrings',\n           'bracelets']\ncolors = ['gold', 'silver',\
    \ 'blue', 'red', 'black']\nfor j, c in zip(jewelry, colors):\n    print(\"Type\
    \ of jewelry: %s in %s color. \" %(j, c))\n```\n\nWhen we run the algorithm, we\
    \ get the following output:\n\n```\nType of jewelry: ring in gold color.\nType\
    \ of jewelry: watch in silver color.\nType of jewelry: necklace in blue color.\n\
    Type of jewelry: earrings in red color.\nType of jewelry: bracelets in black color.\n\
    ```\n\nTake a look at the `print` statement: `print(\"Type of jewelry: %s in %s\
    \ color.\" %(j, c))`. The `%s` symbols will be replaced by the `(j, c)` values,\
    \ respectively. So, the first `%s` symbol gets the items from `j` and the second\
    \ `%s` symbol gets the items from `c`, where `j` is the item from the `jewelry`\
    \ list and `c` is the color from the `colors` list.\n\nAs you can see, we can\
    \ iterate through lists in multiple ways. These are only a few examples to get\
    \ comfortable with loops and how to use information in our algorithms. As we dive\
    \ deeper into more complex problems, the algorithms will get more sophisticated,\
    \ so we’ll revisit many of the topics from this chapter and earlier chapters.\n\
    \nBefore moving on to the next chapter, we need to look at OOP.\n\n## Using OOP\n\
    \nOOP is a way to structure data into objects. The Python program is an object-oriented\
    \ program in that it structures algorithms as objects in order to bundle them\
    \ based on properties and behaviors. To learn about OOP, we will need to know\
    \ how to do the following:\n\n- Create classes\n- Use classes to create objects\n\
    - Use class inheritance to model systems\n\nIn Python, we use classes to bundle\
    \ data. To understand classes, let’s create one:\n\n```\nclass Books:pass\n```\n\
    \nBefore we begin, let’s address `pass` and why we use it. If we had a Python\
    \ file with this code and no `pass` statement, we would receive the following\
    \ error:\n\n```\nunexpected EOF while parsing\n```\n\nThat’s because we created\
    \ a class with no content inside of it. Sometimes, we want to create our class\
    \ and add the content later, but we want to be able to run our code. Adding `pass`\
    \ allows us to do that without causing an error and breaking our program. In essence,\
    \ it tells the program that it should ignore that there is no code for the class\
    \ yet (and we can do this with functions too) so that it continues with the next\
    \ line of code without causing an error.\n\nNow, we can call the `Books()` class\
    \ and get the location where the class is saved on our computer. Notice that my\
    \ output will not match yours, as the class will be saved in different locations:\n\
    \n```\n>>> Books()\n```\n\nThis is my output:\n\n```\n<__main__.Books object at\
    \ 0x000001DD27E09DD8>\n```\n\nNow that we’ve created the class, we can add book\
    \ objects to the class, like so:\n\n```\n>>> a = Books()\n>>> b = Books()\n```\n\
    \nEach of these instances is a distinct object in `Books()`. If we were to compare\
    \ them, since they are distinct, `a == b` would return `False`.\n\nNow, let’s\
    \ take a look at a class that creates an address book. By creating the class,\
    \ we can add entries as needed:\n\n```\nch9_addressBook.py\n\nclass Entry:\n \
    \   def __init__(self, firstName, lastName, phone):\n        self.firstName =\
    \ firstName\n        self.lastName = lastName\n        self.phone = phone\n```\n\
    \nIn this algorithm, we’ve created an `Entry` class that stands for items in an\
    \ address book. Once we run the algorithm, we can add entries to the address book\
    \ and call information on them. For example, take a look at the following code:\n\
    \n```\n>>> Johnny = Entry('John', 'Smith', '201-444-5555')\n```\n\nThis code enters\
    \ `Johnny` into the address book. Now, we can call Johnny’s first name, last name,\
    \ and phone number separately, as follows:\n\n```\n>>> Johnny.firstName\n```\n\
    \nThis is my output:\n\n'John'\n\nWe can call the last name, like so:\n\n```\n\
    >>> Johnny.lastName\n```\n\nThis is the obtained output:\n\n'Smith'\n\nWe can\
    \ also call for a phone number, as follows:\n\n```\n>>> Johnny.phone\n```\n\n\
    We can see the output for this:\n\n'201-444-5555'\n\nWe can add as many entries\
    \ as we'd like, then call them as needed:\n\n```\n>>> max = Entry('Max', 'Minnow',\
    \ '555-555-5555')\n>>> emma = Entry('Emma', 'Dixon', '211-999-9999')\n>>> emma.phone\n\
    ```\n\nThis is our output:\n\n'211-999-9999'\n\nAfter adding the entries, we call\
    \ our last name:\n\n```\n>>> max.lastName\n```\n\nWe get this output:\n\n'Minnow'\n\
    \nAs you can see, we added two new entries, then called Emma's phone number and\
    \ Max's last name.\n\nOnce we have classes, we can have one class that inherits\
    \ methods and attributes for other classes. Because the classes are inheriting\
    \ the attributes and methods, the original class is called the **parent class**,\
    \ while the new class is called a **child class**.\n\nGoing back to our address\
    \ book, we can create a child class by passing the class to the new one. I know\
    \ it sounds confusing, but take a look at the algorithm:\n\n```\n>>> class Job(Entry):\n\
    \    pass\n```\n\nWe can now add more items using that child class as well. See\
    \ the following example:\n\n```\n>>> engineer = Job('Justin', 'Jackson', '444-444-4444')\n\
    ```"
  mdcn: "## 在算法中使用迭代\n\n在深入探讨迭代之前，我们先来定义这个术语。**迭代**意味着重复。当我们在算法中使用迭代时，我们就是在重复执行步骤。可以想象一个`for`循环。\n\
    \n让我们来看另一个例子（本章之前在`evenNumbers`程序中已经使用过）：\n\n```\nch9_colorLoop.py\n\ncolors =\
    \ ['blue', 'green', 'red']\nfor color in colors:\n    print(color)\n```\n\n这个算法中的迭代在于，它将对原始`colors`列表中的每种颜色重复执行`print`过程。\n\
    \n输出如下：\n\n```\nblue\ngreen\nred\n```\n\n如你所见，每种颜色都被打印出来了。\n\n我们也可以从用户那里获取输入，然后通过迭代来执行某些操作。例如，看看下面的算法：\n\
    \n```\nch9_whileAlgorithm.py\n\nask = int(input(\"Please type a number less than\
    \ 20. \"))\nwhile ask > 0:\n    print(ask * 2)\n    ask = ask - 1\n```\n\n如你所见，我们将`ask`定义为输入变量。然后，只要`ask`大于0，我们就打印该数字的两倍，并将该数字减1。\n\
    \n输出如下所示：\n\n```\nPlease type a number less than 20. 8\n16\n14\n12\n10\n8\n6\n\
    4\n2\n```\n\n输出显示了通过将初始数字（即8 x 2 = 16）加倍而创建的列表，然后持续进行直到`ask`变量不再大于0。\n\n接下来，让我们看看如何遍历多个列表。该算法使用两个列表，然后使用来自两个列表的信息打印一条语句：\n\
    \n```\nch9_Iterations.py\n\njewelry = ['ring', 'watch', 'necklace', 'earrings',\n\
    \           'bracelets']\ncolors = ['gold', 'silver', 'blue', 'red', 'black']\n\
    for j, c in zip(jewelry, colors):\n    print(\"Type of jewelry: %s in %s color.\
    \ \" %(j, c))\n```\n\n运行该算法时，我们得到以下输出：\n\n```\nType of jewelry: ring in gold color.\n\
    Type of jewelry: watch in silver color.\nType of jewelry: necklace in blue color.\n\
    Type of jewelry: earrings in red color.\nType of jewelry: bracelets in black color.\n\
    ```\n\n看一下`print`语句：`print(\"Type of jewelry: %s in %s color.\" %(j, c))`。`%s`符号将分别被`(j,\
    \ c)`的值替换。因此，第一个`%s`符号获取来自`j`的项目，第二个`%s`符号获取来自`c`的项目，其中`j`是来自`jewelry`列表的项目，`c`是来自`colors`列表的颜色。\n\
    \n如你所见，我们可以通过多种方式遍历列表。这些只是几个例子，旨在让你熟悉循环以及如何在算法中使用信息。随着我们深入探讨更复杂的问题，算法将变得更加复杂，因此我们将重新审视本章和前面章节的许多主题。\n\
    \n在进入下一章之前，我们需要了解面向对象编程。\n\n## 使用面向对象编程\n\n面向对象编程是一种将数据组织成对象的方式。Python程序是一个面向对象的程序，因为它将算法构建为对象，以便根据属性和行为将它们捆绑在一起。要学习面向对象编程，我们需要了解如何执行以下操作：\n\
    \n- 创建类\n- 使用类创建对象\n- 使用类继承来建模系统\n\n在Python中，我们使用类来捆绑数据。为了理解类，让我们创建一个：\n\n```\n\
    class Books:pass\n```\n\n在开始之前，我们先来讨论`pass`以及为什么使用它。如果我们有一个包含此代码但没有`pass`语句的Python文件，我们将收到以下错误：\n\
    \n```\nunexpected EOF while parsing\n```\n\n这是因为我们创建了一个内部没有内容的类。有时，我们想先创建类，稍后再添加内容，但我们希望能够运行代码。添加`pass`允许我们在不导致错误和破坏程序的情况下做到这一点。本质上，它告诉程序应该忽略该类尚无代码的事实（我们也可以对函数这样做），以便它继续执行下一行代码而不会导致错误。\n\
    \n现在，我们可以调用`Books()`类并获取该类在我们计算机上保存的位置。请注意，我的输出将与你的不同，因为该类将保存在不同的位置：\n\n```\n\
    >>> Books()\n```\n\n这是我的输出：\n\n```\n<__main__.Books object at 0x000001DD27E09DD8>\n\
    ```\n\n既然我们已经创建了该类，我们就可以向该类添加书籍对象，如下所示：\n\n```\n>>> a = Books()\n>>> b = Books()\n\
    ```\n\n这些实例中的每一个都是`Books()`中一个不同的对象。如果我们比较它们，由于它们是不同的，`a == b`将返回`False`。\n\n\
    现在，让我们来看一个创建通讯录的类。通过创建该类，我们可以根据需要添加条目：\n\n```\nch9_addressBook.py\n\nclass Entry:\n\
    \    def __init__(self, firstName, lastName, phone):\n        self.firstName =\
    \ firstName\n        self.lastName = lastName\n        self.phone = phone\n```\n\
    \n在这个算法中，我们创建了一个`Entry`类，代表通讯录中的条目。一旦我们运行该算法，我们就可以向通讯录添加条目并调用它们的信息。例如，看看以下代码：\n\
    \n```\n>>> Johnny = Entry('John', 'Smith', '201-444-5555')\n```\n\n此代码将`Johnny`输入通讯录。现在，我们可以分别调用Johnny的名字、姓氏和电话号码，如下所示：\n\
    \n```\n>>> Johnny.firstName\n```\n\n这是我的输出：\n\n'John'\n\n我们可以调用姓氏，如下所示：\n\n```\n\
    >>> Johnny.lastName\n```\n\n这是获得的输出：\n\n'Smith'\n\n我们也可以调用电话号码，如下所示：\n\n```\n\
    >>> Johnny.phone\n```\n\n我们可以看到此输出：\n\n'201-444-5555'\n\n我们可以根据需要添加任意数量的条目，然后根据需要调用它们：\n\
    \n```\n>>> max = Entry('Max', 'Minnow', '555-555-5555')\n>>> emma = Entry('Emma',\
    \ 'Dixon', '211-999-9999')\n>>> emma.phone\n```\n\n这是我们的输出：\n\n'211-999-9999'\n\
    \n添加条目后，我们调用我们的姓氏：\n\n```\n>>> max.lastName\n```\n\n我们得到此输出：\n\n'Minnow'\n\n如你所见，我们添加了两个新条目，然后调用了Emma的电话号码和Max的姓氏。\n\
    \n一旦我们有了类，我们就可以让一个类继承其他类的方法和属性。因为这些类继承了属性和方法，所以原始类被称为**父类**，而新类被称为**子类**。\n\n\
    回到我们的通讯录，我们可以通过将类传递给新类来创建一个子类。我知道这听起来很困惑，但看看这个算法：\n\n```\n>>> class Job(Entry):\n\
    \    pass\n```\n\n我们现在也可以使用该子类添加更多项目。参见以下示例：\n\n```\n>>> engineer = Job('Justin',\
    \ 'Jackson', '444-444-4444')\n```"
