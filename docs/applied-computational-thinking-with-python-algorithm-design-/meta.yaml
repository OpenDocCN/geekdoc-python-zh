  mdcn: "元素，通过实际示例，并学习如何识别最适合您问题的算法解决方案。\n\n最后，您将了解如何识别解决方案设计过程中的陷阱，以及如何选择正确的功能来创建最佳的算法解决方案。\n\
    \n读完这本算法书，您将获得将计算思维技术应用于软件开发的信心。\n\n## 本书适合谁\n\n本书适合希望培养问题解决能力、计算思维能力以及编写或调试软件程序和应用所需策略的学生、开发人员和专业人士。需要熟悉Python编程。\n\
    \n## 本书涵盖内容\n\n*第1章，计算机科学基础*，帮助您了解计算机科学的基本元素，包括理论、设计、计算过程和系统以及计算机。本章的重点将是计算机科学的软件元素。\n\
    \n*第2章，计算思维要素*，解释计算思维的每个要素——分解、模式识别、模式概括与抽象以及算法设计——以及计算思维过程并非线性的。相反，开发人员可以在算法设计过程的所有阶段回顾其中一些要素，直到找到特定问题的解决方案。本章将包含一些简短的相关问题，以演示如何使用计算思维要素来得出算法。\n\
    \n*第3章，理解算法与算法思维*，向您介绍算法及其定义。您还将回顾一些算法，以帮助您培养评估算法时所需的分析技能。\n\n*第4章，理解逻辑推理*，探讨逻辑推理过程，如条件语句、算法推理和布尔逻辑。在本章中，您将通过真实相关的问题分析，学习基础和中级逻辑处理技能。\n\
    \n*第5章，错误*，概述如何查找逻辑错误。本章使用各种示例来确定如何查找逻辑错误、如何查找处理错误以及如何调试它们。\n\n*第6章，探索问题分析*，探讨问题分析的主题，重点关注问题定义、分解和分析。为了实践并进一步理解计算思维的第一个要素——分解，您将接触到真实相关的问题。然后，您将能够定义和分解问题，例如识别输入、输出以及开始规划所呈现问题解决方案所需的其他相关信息。\n\
    \n*第7章，设计解决方案与解决方案流程*，为您提供机会，使用计算思维过程中先前学到的内容，为多个问题设计解决方案，并开始结合逻辑处理，为解决方案的决策过程创建可视化表示。可视化表示包括图表、流程图和其他有用的流程。\n\
    \n*第8章，识别解决方案中的挑战*，提供机会练习识别现有问题的一些常见错误和/或更好的可能解决方案。虽然大多数问题都可以通过多种满足问题需求的算法来解决，但有些解决方案最适合特定问题。本章的目标是向您介绍解决方案设计过程中的一些陷阱。\n\
    \n*第9章，Python简介*，向您介绍基本的Python命令和功能，同时将其应用于问题。使用计算思维要素，您将能够通过结合先前学到的概念来设计解决方案。\n\
    \n*第10章，理解输入与输出以设计解决方案算法*，帮助您评估问题以识别所需的输入和输出，从而为问题设计和实现解决方案算法。\n\n*第11章，控制流*，帮助您进一步了解条件语句，以及在使用计算思维和Python编程语言解决问题时如何使用`for`和`while`循环。您将应用先前学到的逻辑处理，在解决问题时创建Python算法。\n\
    \n*第12章，在简单挑战中使用计算思维和Python*，帮助您应用先前获得的知识，在解决多个学科的挑战时完成计算思维过程，使用真实相关的示例为每个场景设计最佳算法。\n\
    \n*第13章，调试*，解释如何利用Python功能解决涉及实验数据和数据处理的问题。将使用计算思维要素来解决真实相关的问题，使用高级功能。\n\n*第14章，在实验和数据分析问题中使用Python*，解释如何使用全局变量和局部变量以避免错误，以及如何调试使用局部变量和全局变量的错误。本章还包含其他示例，以帮助识别错误和调试代码。\n\
    \n*第15章，机器学习简介*，使用Python编程语言介绍机器学习模型。本章涵盖机器学习定义、机器学习生命周期和机器学习算法类型等主题。\n\n*第16章，在统计分析中使用计算思维和Python*，深入探讨与统计分析相关的更多主题，如导入数据、索引和预处理数据。然后，您将使用数据可视化来决定探索哪些变量以进行进一步分析。\n\
    \n*第17章，应用计算思维问题*，帮助您处理多个问题，结合前面各章的主题，以解决问题并在Python中设计算法。您将使用计算思维要素来确定设计模型和创建语言学、密码学等问题解决方案所需的功能。\n\
    \n*第18章，高级应用计算思维问题*，探讨多个领域的额外应用问题，包括几何镶嵌、创建住房数据模型、创建电场、分析遗传数据、分析股票、创建**卷积神经网络（CNN）**等。您将使用计算思维要素来解决问题，并为您的问题和数据集创建不同的图形和可视化表示。\n\
    \n*第19章，将Python与Amazon Web Services (AWS)集成*，概述AWS并指导您完成设置账户的过程。它包含有关可用服务的信息以及使用AWS与Python编程语言的示例。\n\
    \n## 充分利用本书\n\n*您需要在计算机上安装**Python 3.12**才能运行代码。所有代码示例均已在使用Python 3.X的Windows操作系统上测试，并应在后续版本中运行。所有代码也已使用Anaconda虚拟环境进行了测试。*\n\
    \n| 本书涵盖的软件/硬件 | 操作系统要求 |\n| :--- | :--- |\n| Python 3.X | Windows、macOS X或Linux\
    \ |\n\n*本书中使用的其他库和包包括以下：*\n\n- NumPy\n- scikit-learn\n- TensorFlow/Keras\n- Matplotlib\n\
    - Seaborn\n- Cairo\n- NLTK\n- pandas\n- readability\n- Requests\n- Image\n- qrcode\n\
    - from opencv – CV2\n- routing_enums_pb2\n- from ortools.constraint_solver – routing_enums_pb2,\
    \ pywrapcp\n- Scrapy\n- Quandl\n- Boto3\n\n如果您想使用Spyder环境或Jupyter notebook运行代码，可以安装Anaconda，这是一个用于Python和R编程语言的环境管理器。\n\
    \n**如果您使用的是本书的数字版本，我们建议您自己输入代码或通过GitHub仓库访问代码（链接在下一节中提供）。这样做将帮助您避免与复制和粘贴代码相关的任何潜在错误。**\n\
    \n## 下载示例代码文件\n\n您可以从GitHub下载本书的示例代码文件，地址为 https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-Edition。如果代码有更新，它将在现有的GitHub仓库中更新。\n\
    \n我们还有其他来自我们丰富的书籍和视频目录的代码包，可在 https://github.com/PacktPublishing/ 获取。请查看它们！\n\n\
    ## 下载彩色图像\n\n我们还提供了一个PDF文件，其中包含本书中使用的屏幕截图/图表的彩色图像。您可以在此处下载：https://static.packt-cdn.com/downloads/9781839219436_ColorImages.pdf。\n\
