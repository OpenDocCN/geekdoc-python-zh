    # Data cleaning


    **Data cleaning** refers to the process of making our dataset more efficient.
    If we go through data cleaning in really large datasets, we can expedite the algorithm,
    avoid errors, and get better results. There are a few things we deal with when
    data cleaning:


    +   - **Missing data**: Address this by removing, imputing, or using domain-specific
    methods to handle missing values

    - **Duplicate data**: Detect and remove duplicates to ensure each observation
    is unique

    - **Data types**: Use appropriate functions to convert data types as needed

    - **Noisy data**: This can be fixed/improved by using binning, regression, or
    clustering, among other processes


    We''re going to look at each of these things in more detail.


