    # Data preprocessing


    Clean, format, and transform the data to make it suitable for analysis. Addressing
    missing values, outliers, and inconsistencies is crucial to preparing the data
    for model training. This step is vital for an ML model as failing to identify
    and mitigate these issues can negatively affect the quality of the outcome.


    # EDA


    +   - EDA is a crucial step in the data analysis and model development process
    for ML. It involves systematically examining and summarizing the main characteristics,
    patterns, and relationships within a dataset to gain insights and inform subsequent
    modeling decisions. EDA helps you understand your data, identify potential issues,
    and make informed choices about feature engineering, data preprocessing, and model
    selection. In the next chapter, we will look at this step in more detail.


    # Feature engineering


    +   - Feature engineering refers to the process of selecting and transforming
    variables/features in a dataset when building a predictive model using ML. Therefore,
    before training the data with ML algorithms, it is necessary to extract features
    from the collected raw dataset. Otherwise, it will be difficult to get the right
    insights from the data.


    Feature engineering has two goals:


    +   - Preparing the proper input dataset so that it’s compatible with the ML algorithm’s
    requirements

    - Improving the performance of ML models


    # Train and test the model


    In ML, the terms “train” and “test” refer to two distinct phases of working with
    a dataset to build and evaluate a predictive model. These phases are crucial for
    assessing how well a model generalizes to new, unseen data. The dataset is usually
    split into subsets: one for training the model and another for testing its performance.
    This division allows you to measure the model’s ability to make accurate predictions
    on data it has never encountered before. Let’s take a closer look:


    +   - **Train:** The model learns patterns using a “training dataset,” adjusting
    its parameters to make accurate predictions

    - **Test:** The model’s performance is evaluated on a “testing dataset” to measure
    how well it generalizes to unseen data, ensuring it doesn’t just memorize the
    training data (overfitting)

    - **Validation (optional):** An intermediate step involving a “validation dataset”
    helps tune model parameters and select the best model variant'
