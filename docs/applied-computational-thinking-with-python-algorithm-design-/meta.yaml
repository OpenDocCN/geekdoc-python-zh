- md: '## Problem 2 – using Python to write stories


    Let''s look at a fairly simple problem. In this section, we want to create an
    algorithm that produces a story based on input from a user. We can make this as
    simple as we want, or add some options. Let''s dig into what this is.


    ### Defining, decomposing, and planning a story


    First of all, *what is it we''re trying to create?* Well, a story. Because of
    the nature of this problem, we''re going to start in reverse, with a sample of
    the output we want to achieve – that is, a sample story. Let''s take a look at
    a quick story generated by our algorithm before we get into the algorithm:


    ```

    There once was a citizen in the town of Narnia, whose name was Noemi. Noemi loved
    to hang with their trusty dog, King Kong.

    You could always see them strolling through the market in the morning, wearing
    their favorite purple attire.

    ```


    The preceding output was created by an algorithm that substituted names, locations,
    time of day, pet, and pet name. It’s a short story, but this is something that
    can be used in much wider applications, such as using input to write social media
    posts and filling in information for things such as invitations and forms.


    So, let’s work backward a bit to write our algorithm. *And why did I start at
    the end this time?* Well, in this case, we know what we want from the result.
    You could write your story. You could have an example of that wedding invitation
    template you need to fill in, or the form. Now, we have to figure out how to get
    the input and then output what we want.


    From the story shown, here are the things we can get original input for:


    - The character’s name

    - The town name

    - The type of pet

    - The name of the pet

    - The part of town visited

    - The time of day

    - The favorite color


    When we write our algorithm, we’ll need to get all the aforementioned inputs.
    Let’s take a look at the algorithm found in the **ch17_storyTime.py** file:


    1. We will need inputs from the user, so we want to use a **print** statement
    and input requests that include instructions for what is needed:


    ```

    print(''Help me write a story by answering some questions. '')

    name = input(''What name would you like to be known by? '')

    location = input(''What is your favorite city, real or imaginary? '')

    time = input(''Is this happening in the morning or afternoon? '')

    color = input(''What is your favorite color? '')

    town_spot = input(''Are you going to the market, the library, or the park? '')

    pet = input(''What kind of pet would you like as your companion? '')

    pet_name = input(''What is your pet\''s name? '')

    ```


    The preceding code snippet grabs all the inputs from the user so that we can write
    our story.


    2. Once we have those, we have to print our story. Note that we wrote it in simple
    terms, using **%s**, so that we could replace it with the corresponding inputs.
    We also used backslashes so that we could see our code in multiple lines, rather
    than have it in one long line:


    ```

    print(''There once was a citizen in the town of %s, whose name was %s. %s loved
    to hang \nwith their trusty %s, %s.'' % (location, name, name, pet, pet_name))

    print(''You could always see them strolling through the %s \nin the %s, wearing
    their favorite %s attire.'' % (town_spot, time, color))

    ```


    Let’s run that code one more time and see what our story says now:


    ```

    Help me write a story by answering some questions.

    What name would you like to be known by? Azabache

    What is your favorite city, real or imaginary? Rincon

    Is this happening in the morning or afternoon? afternoon

    What is your favorite color? blue

    Are you going to the market, the library, or the park? park

    What kind of pet would you like as your companion? dog

    What is your pet’s name? Sunny

    There once was a citizen in the town of Rincon, whose name was Azabache. Azabache
    loved to hang with their trusty dog, Sunny.

    You could always see them strolling through the library in the afternoon, wearing
    their favorite blue attire.

    ```


    Note that details such as the characters and settings have changed. We can use
    simple algorithms like this one in educational settings to show students how to
    interact with stories and identify key information in them.


    While this is a three-sentence story, these algorithms can be much more complex,
    providing an opportunity to write fantastic original stories with user input.
    If you wanted to try some of this out, you could even add conditions for which
    phrases you would use, based on some of the input, such as changing the sentences
    used based on the length of the name entered, for example. *Have some fun with
    the code and writing some stories!*


    ## Problem 3 – using Python to calculate text readability


    In this section, we’ll look at an application relating to linguistics, specifically
    the readability level of any text. We will use Martin Luther King’s **I Have a
    Dream** speech in the code snippets that follow. You can substitute this for any
    text file, so long as you change the location of the file and filename to be accurately
    reflected in the code. The full code can be found in the `ch17_readability.py`
    file.


    Before we get into the code, let’s talk first about what we’re looking for and
    why it’s important. Learning about the readability of texts can help us make decisions
    about whether or not to include them in a presentation, a school grade-level curriculum,
    and much more. The **Flesch-Kincaid score** is used to determine readability and
    was developed in the 1940s.


    Rudolf Flesch created it when working as a consultant with the Associated Press
    to improve the readability of newspapers. Originally called the **Flesch Reading
    Ease**, it was modernized into what is currently used by the US Navy. Rather than
    getting a score that then had to be converted into a grade level, the Flesch-Kincaid
    score now provides a grade-level score.


    While we won’t be using the formula, it is important to know the background of
    what we’re using. The Flesch Reading Ease formula is shown as follows:


    206.835 – 1.015( total words / total sentences ) – 84.6( total syllables / total
    words )


    The Flesch-Kincaid grade-level formula is shown as follows:


    0.39( total words / total sentences ) + 11.8( total syllables / total words )
    – 15.59


    The thing about the preceding formulas is that they exist in the readability package
    available for Python. If we import the package, we can perform a readability analysis
    with a fairly simple bit of code.


    Let’s take a look at the code we’ll need to perform a readability analysis for
    the Martin Luther King speech:


    1. First, remember to change the path for your file in the code, and then import
    the necessary packages for the code:


    `ch17_readability.py`


    ```

    from readability import Readability

    text = open(''C:\...\ch17_MLK-IHaveADream.txt'')

    text_up = text.read()

    r = Readability(text_up)

    flesch_kincaidR = r.flesch_kincaid()

    ```


    From the preceding code, you’ll see that we imported the `readability` package
    into our program. If you need to install the library/package, you can use `pip
    install readability` to do so.


    Once we have the requisite libraries, we can open the file we want to analyze.
    We also want to tell the algorithm to read the text, which I’ve called `text_up`
    here for the text upload so that I don’t forget I am reading an open file. This
    is the text we opened from the file location in the preceding code. Finally, we
    ask the program to analyze the text using the `Readability` function. Note that
    we saved that to `r`.


    2. After we’ve done all of that, we can print our grade level with the following
    code snippet:


    ```

    print(''The text has a grade '' + flesch_kincaidR.grade_level + '' readability
    level.'')

    ```


    When we run our algorithm, our output is fairly simple as well. Take a look at
    the following output:


    **The text has a grade 9 readability level.**


    Now that you know how to verify the readability of any text, try to perform the
    analysis on other types of texts, including poems, stories, speeches, and songs.


    ## Problem 4 – using Python to find the most efficient route


    For this problem, when learning about algorithms, we will use a common algorithm
    – the **traveling salesman problem (TSP)**. Let’s set up the problem itself.'
  mdcn: '## 问题 2 – 使用 Python 编写故事


    让我们来看一个相当简单的问题。在本节中，我们希望创建一个算法，根据用户的输入生成一个故事。我们可以让它尽可能简单，也可以添加一些选项。让我们深入探讨一下这是什么。


    ### 定义、分解和规划故事


    首先，*我们试图创建的是什么？* 嗯，一个故事。由于这个问题的性质，我们将从反向开始，从我们想要实现的输出样本开始——也就是一个示例故事。在深入算法之前，让我们先看看我们的算法生成的一个简短故事：


    ```

    There once was a citizen in the town of Narnia, whose name was Noemi. Noemi loved
    to hang with their trusty dog, King Kong.

    You could always see them strolling through the market in the morning, wearing
    their favorite purple attire.

    ```


    前面的输出是由一个算法创建的，该算法替换了姓名、地点、时间、宠物和宠物名字。这是一个短篇故事，但这种技术可以应用于更广泛的领域，例如使用输入来撰写社交媒体帖子，以及为邀请函和表格等事物填写信息。


    所以，让我们稍微逆向思考一下来编写我们的算法。*为什么我这次从结尾开始呢？* 嗯，在这种情况下，我们知道我们想要从结果中得到什么。你可以编写你的故事。你可能有一个需要填写的婚礼邀请函模板或表格的例子。现在，我们必须弄清楚如何获取输入，然后输出我们想要的内容。


    从所示的故事中，以下是我们可以获取原始输入的内容：


    - 角色的名字

    - 城镇的名字

    - 宠物的类型

    - 宠物的名字

    - 访问的城镇区域

    - 时间段

    - 最喜欢的颜色


    当我们编写算法时，我们需要获取所有上述输入。让我们看看 **ch17_storyTime.py** 文件中的算法：


    1. 我们需要从用户那里获取输入，因此我们希望使用 **print** 语句和包含所需说明的输入请求：


    ```

    print(''Help me write a story by answering some questions. '')

