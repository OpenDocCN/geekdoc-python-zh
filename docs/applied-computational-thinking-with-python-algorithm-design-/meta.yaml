    \n计算思维过程帮助我们培养技能，使算法规划变得更加容易。通过实践这一过程，我们进一步了解了Python的功能和函数如何在特定场景中帮助我们。我们还学习了如何概括模式，有时是针对问题的简单方程式，有时则是创建能在多种场景中帮助我们、无需每次都重新创建的算法。随着我们对Python的深入了解，在*第二部分，应用Python与计算思维*的最后一章中，我们对计算思维过程也变得更加得心应手。\n\
