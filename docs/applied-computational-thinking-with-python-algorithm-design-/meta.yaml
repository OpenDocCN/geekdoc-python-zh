    \n在结束这个例子之前，请注意我们这里并没有涵盖整个代码文件。代码的某些部分已在本书的其他地方讨论过，因此我们专注于算法中那些新的、对算法解决方案至关重要的部分，因为该算法比较复杂。该代码文件的最后一部分使用了一个**长短期记忆（LSTM）**模型。LSTM模型是一种人工循环神经网络。我们在机器学习中使用这种模型来创建深度学习模型。\n\
    \n*我们的模型能预测股票价格吗？* 不能。否则，我们所有人应对市场都会更容易些。但模型可以擅长预测价格，以及价格是上涨还是下跌。\n\n## 问题8 –\
    \ 使用Python创建CNN\n\n在本节中，我们将探讨一个涉及**人工智能（AI）**的问题。更具体地说，我们将专注于构建一个**CNN**。*但CNN到底是什么？*\
    \ 嗯，CNN是一种**深度学习算法**，它以图像作为输入。它根据预定的特征来处理图像并分配重要性。\n\n下图说明了CNN所涉及的过程：\n\n创建CNN是为了简化我们对图像进行分类的方式，同时不牺牲我们希望从图像分析中获得的预测准确性。这就像我们应用一个滤镜。一旦应用了滤镜，我们就能看到特征。前面的图表展示了这个过程的简化示意图。\n\
    \n我们将深入探讨的问题是手写训练和分析。从计算思维过程来思考，我们试图做的是尽可能准确地分析手写体。为此，我们必须分析数百或数千张图像来创建和训练我们的模型。我们使用的图像越多，我们的模型就越准确。\n\
    \n对于我们的模型，我们将使用MNIST数据集，其中包含70,000张图像。\n\n**MNIST**代表**修改后的国家标准与技术研究院**。它是机器学习和计算机视觉领域广泛使用的数据集。前60,000张图像用于训练，另外10,000张用于测试。完整代码可以在`ch18_CNN_mnist.py`文件中找到。我们将查看该代码中的一些片段，并进行一些调整以展示额外的组件。只要安装了所有必要的库和包，你就可以在本书的GitHub仓库中运行该文件而无需更改。让我们开始设计模型：\n\
    \n1. 首先，让我们看一段代码片段，它将上传数据集，然后显示数据集中的第一项：\n\n```python\nfrom keras.datasets import\
    \ mnist\n#Grab the testing and training data from existing dataset\n(X_train,\
    \ y_train), (X_test, y_test) = mnist.load_data()\nimport matplotlib.pyplot as\
    \ plt\n#Take a look at the first item in the dataset\nplt.imshow(X_train[0], cmap='Greys')\n\
    ```\n\n这里，我们使用0作为训练集中的索引来查看第一张图像。`cmap`属性将使颜色映射为灰色。你可以根据需要进行调整。顺便提一下，对于那些有颜色辨别困难或有特定颜色需求的人来说，更改颜色映射可以显著改变图像的感知效果。让我们看看第一张图像：\n\
    \n如你所见，这是一个手写样本，很可能是数字**5**。我们可以用不同的索引再运行几次程序，看看数据集中的其他样本。下面的截图显示了其中一些样本及其对应的索引：\n\
    \n## 18.27 数据集中按索引显示的样本图像\n\n我们使用的数据不是定量的，而是定性的。我们观察的是图像，因此需要一个能够分析这些图像的过程。为此，我们将使用**独热编码**，它用新的二进制变量替换整数编码的变量。\n\
    \n2. 现在我们已经了解了我们要处理的内容，让我们使用以下代码片段来重塑和编码我们的模型。提醒一下，完整代码可以在本书的GitHub仓库中找到，但某些组件会略有不同（例如，我们的文件不会测试数据集中的图像）：\n\
    \n```python\n#Reshape the model\nX_train = X_train.reshape(60000,28,28,1)\nX_test\
    \ = X_test.reshape(10000,28,28,1)\nfrom keras.utils import to_categorical\n#Use\
    \ One-Hot encoding\ny_train = to_categorical(y_train)\ny_test = to_categorical(y_test)\n\
    y_train[0]\n```\n\n如你所见，我们将图像分成了训练集和测试集。然后，我们对它们进行了编码。\n\n3. 一旦我们执行了独热编码，我们就可以创建我们的模型了：\n\
    \n```python\n#Creating the model\nfrom keras.models import Sequential\nfrom keras.layers\
    \ import Dense, Conv2D, Flatten\nmodel = Sequential()\nmodel.add(Conv2D(64, kernel_size=3,\
    \ activation='relu', input_shape=(28,28,1)))\nmodel.add(Conv2D(32, kernel_size=3,\
    \ activation='relu'))\nmodel.add(Flatten())\nmodel.add(Dense(10, activation='softmax'))\n\
    #Compile the model\nmodel.compile(optimizer='adam', loss='categorical_crossentropy',\
    \ metrics=['accuracy'])\n```\n\n在前面的代码片段中，我们使用了`softmax`函数。`softmax`函数有时被称为归一化指数函数。我们用它来归一化输出。\n\
    \n4. 现在，让我们训练模型。我们将拟合模型，然后验证数据。看看这段代码片段：\n\n```python\n#train the model\nmodel.fit(X_train,\
    \ y_train, validation_data=(X_test, y_test), epochs=3)\n```\n\n这是训练和测试的一大优点——也就是说，当我们理解并实践它们时，我们意识到只需几行代码就能完成一些相当了不起的事情。"
