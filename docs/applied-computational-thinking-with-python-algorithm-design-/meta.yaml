- md: "## Identifying errors in algorithm design\n\nErrors in algorithms are just\
    \ a fact of life for any coder. It’s important to get comfortable with making\
    \ mistakes. As mentioned in *Chapter 6, Exploring Problem Analysis*, and *Chapter\
    \ 7, Designing Solutions and Solution Processes*, it’s good practice to test your\
    \ algorithm and test it often. Waiting until you have finished hundreds or thousands\
    \ of lines of code to test something is a recipe for disaster. And yes, I was\
    \ once working on copying a game and did not test at all. Not until I had all\
    \ 4,585 lines copied. I was young. Truth be told, I never found the error I made.\
    \ I started over and started testing at every corner. The second time was successful,\
    \ but I’d wasted weeks copying everything (it was from a book – GitHub wasn’t\
    \ a thing yet) and then trying to figure out the errors. So, please don’t be me.\
    \ Please test your algorithms.\n\nNow, before moving on to debugging and working\
    \ with code, let’s take a look at the errors we can encounter when solving problems.\n\
    \nIn this section, we’ll focus on two broad categories of errors: syntax errors\
    \ and logic errors.\n\n## Syntax errors\n\nSyntax errors are sometimes called\
    \ parsing errors. They’re errors we create when we forget to indent, add a colon,\
    \ add quotation marks for strings, and so on. We’ll have a look at the different\
    \ types of syntax errors in the following sections.\n\n### Using colons\n\nColons\
    \ are used in Python to separate conditions, create loops, and more. The colon\
    \ is a way to tell the algorithm that the next thing is part of this particular\
    \ block of code. When we introduce colons in Python, they automatically indent\
    \ the next line in our code. But if we forget to include a colon where it is needed,\
    \ the program will not run successfully. Let’s take a look at a syntax error:\n\
    \n```\nfor i in range(1, 10)\n    print(i)\n```\n\nIf we run this code, we will\
    \ get an error message that says *invalid syntax*. The following screenshot shows\
    \ the pop-up window that appears when we try to run this program:\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_143_0.png)\n\
    \nFigure 8.1 – Error pop-up window\n\nIf we run this from the Python shell instead,\
    \ here’s how that error appears:\n\n```\nSyntaxError: expected ':'\n```\n\nAs\
    \ you can see, the Python program alerts us when we have code that contains errors.\n\
    \nNotice that there is a colon missing after the range in the code. Now, take\
    \ a look at the fixed syntax in the following code:\n\n```\nch8_syntaxerror1.py\n\
    ```\n\n```\nfor i in range(1, 10):\n    print(i)\n```\n\nWhen we run the fixed\
    \ code, the program runs and prints the numbers 1 through 9, as follows:\n\n```\n\
    1\n2\n3\n4\n5\n6\n7\n8\n9\n```\n\nYou may recall that the range function does\
    \ not include the upper endpoint. If we wanted to print the number 10, our range\
    \ would have needed to be `range(1, 11)`.\n\nNow, let’s take a look at other punctuation\
    \ used in Python that can lead to some errors, namely, parentheses, nested parentheses,\
    \ and brackets.\n\n### Using nested parentheses and brackets\n\nIn addition to\
    \ errors in syntax that involve colons, which are my most common errors, there\
    \ are also errors when we have nested parentheses. We must always check that every\
    \ open parenthesis has a closing parenthesis. The same is true for brackets. Let’s\
    \ look at the following code, which contains an error alongside the parentheses:\n\
    \n```\nname = input('What is your name? '\n```\n\n```\nprint(name)\n```\n\nAs\
    \ you can see, there are two open parentheses in the name definition, but only\
    \ one closing parenthesis. When we run that program, we get an invalid syntax\
    \ error from Python. Here’s what happens when we run that program in the Python\
    \ shell or interpreter:\n\n```\nSyntaxError: '(' was never closed\n```\n\nYou\
    \ may have noticed that error messages are much more helpful in version 3.11 than\
    \ they were in versions 3.8 and 3.9. The newer versions provide more detail as\
    \ to what the error may be, so instead of getting a generic **SyntaxError** message,\
    \ we get some information stating that the closing parenthesis was missing. Now,\
    \ here’s the same code without the error:\n\n### ch8_syntaxerror2.py\n\n```\n\
    name = input('What is your name? ')\nprint(name)\n```\n\nNow, when we run the\
    \ code, the program asks for the name and then prints it. The output looks as\
    \ follows:\n\n```\nWhat is your name? Monique\nMonique\n```\n\nAs you can see,\
    \ the program now runs without problems.\n\nIn *Chapter 3, Understanding Algorithms\
    \ and Algorithmic Thinking*, we used a dictionary to create a menu with pricing\
    \ for each menu item. Dictionaries contain parentheses to denote when the dictionary\
    \ begins and when it ends. Let’s look at a few lines of code:\n\n```\ncars = {\n\
    \    \"Hyundai\": \"Kona\",\n    \"Honda\": \"CR-V\",\n    \"Toyota\": \"Camry\"\
    \nprint(cars)\n```\n\nIf we look at the program, the dictionary is missing the\
    \ closing bracket, `}`, so we get a syntax error. In this case, Python tells us\
    \ that multiple statements were found while compiling a single statement. This\
    \ one is a bit harder to decipher if we don’t know what we are looking for, but\
    \ it is still more helpful than a plain **SyntaxError** message. The following\
    \ snippet shows the corrected program:\n\n### ch8_syntaxerror3.py\n\n```\ncars\
    \ = {\n    \"Hyundai\": \"Kona\",\n    \"Honda\": \"CR-V\",\n    \"Toyota\": \"\
    Camry\"\n    }\nprint(cars)\n```\n\nAs you can see, once the bracket has been\
    \ added, the program will run and print the following output:\n\n```\n{'Hyundai':\
    \ 'Kona', 'Honda': 'CR-V', 'Toyota': 'Camry'}\n```\n\nEach entry from the dictionary\
    \ is printed in one line, divided by a comma. It is helpful to add `print` statements\
    \ as we are writing algorithms to ensure we do not have any errors. I typically\
    \ remove unnecessary print functions once I’ve tested them, but they do come in\
    \ handy when we’re writing long algorithms and need to test them to avoid issues.\n\
    \nThere are many other errors we can incorporate while writing algorithms in Python.\
    \ Let’s take a look at a few more syntax errors.\n\n### Other syntax errors\n\n\
    Many other errors in syntax can be introduced, especially in longer programs.\
    \ If you look at the dictionary we just used, forgetting a comma will also create\
    \ a syntax error, for example. Generally, these syntax errors are quickly identified\
    \ when we try to run a program. Python will highlight where an indentation is\
    \ expected or when a bracket is missing. Syntax errors are typically easy to identify,\
    \ but there are many other types of errors.\n\n## Errors in logic\n\nIn *Chapter\
    \ 4, Understanding Logical Reasoning*, we discussed logic errors that we can encounter:\n\
    \n- Using the wrong variable in an equation or statement\n- Using the wrong operator\
    \ to test conditions\n- Using the wrong indentation when checking for conditions\n\
    \nNow, we’ll look at other errors in logic that have a specific callout from Python\
    \ and what each error represents.\n\nErrors in logic are also called **runtime\
    \ errors**. Many runtime errors allow us to identify what is happening with our\
    \ code. Each has a specific use and provides us with hints as to how to fix our\
    \ errors. You can find a comprehensive list of runtime errors at [https://www.tutorialsteacher.com/python/error-types-in-python](https://www.tutorialsteacher.com/python/error-types-in-python).\n\
    \nThere are many different types of errors that are flagged as exceptions in Python.\
    \ You can get the list of Python exceptions by running the following code:\n\n\
    ### ch8_errors.py\n\n```\nprint(dir(locals()['__builtins__']))\n```\n\nWhen we\
    \ run this code, the output provides the following error values:\n\n```\n['ArithmeticError',\
    \ 'AssertionError', 'AttributeError', 'BaseException',\n'BlockingIOError', 'BrokenPipeError',\
    \ 'BufferError', 'BytesWarning', 'ChildProcessError',\n'ConnectionAbortedError',\
    \ 'ConnectionError', 'ConnectionRefusedError',\n'ConnectionResetError', 'DeprecationWarning',\
    \ 'EOFError', 'Ellipsis', 'EnvironmentError',\n'Exception', 'False', 'FileExistsError',\
    \ 'FileNotFoundError', 'FloatingPointError',\n'FutureWarning', 'GeneratorExit',\
    \ 'IOError', 'ImportError', 'ImportWarning',\n'IndentationError', 'IndexError',\
    \ 'InterruptedError', 'IsADirectoryError', 'KeyError',\n'KeyboardInterrupt', 'LookupError',\
    \ 'MemoryError', 'ModuleNotFoundError', 'NameError',\n'None', 'NotADirectoryError',\
    \ 'NotImplemented', 'NotImplementedError', 'OSError',\n'OverflowError', 'PendingDeprecationWarning',\
    \ 'PermissionError', 'ProcessLookupError',\n'RecursionError', 'ReferenceError',\
    \ 'ResourceWarning', 'RuntimeError', 'RuntimeWarning',\n'StopAsyncIteration',\
    \ 'StopIteration', 'SyntaxError', 'SyntaxWarning', 'SystemError',\n'SystemExit',\
    \ 'TabError', 'TimeoutError', 'True', 'TypeError', 'UnboundLocalError',\n'UnicodeDecodeError',\
    \ 'UnicodeEncodeError', 'UnicodeError', 'UnicodeTranslateError',\n'UnicodeWarning',\
    \ 'UserWarning', 'ValueError', 'Warning', 'ZeroDivisionError',\n'__build_class__',\
    \ '__debug__', '__doc__', '__import__', '__loader__', '__name__',\n'__package__',\
    \ '__spec__', 'abs', 'all', 'any', 'ascii', 'bin', 'bool', 'breakpoint',\n'bytearray',\
    \ 'bytes', 'callable', 'chr', 'classmethod', 'compile', 'complex',\n'copyright',\
    \ 'credits', 'delattr', 'dict', 'dir', 'divmod', 'enumerate', 'eval', 'exec',\n\
    'exit', 'filter', 'float', 'format', 'frozenset', 'getattr', 'globals', 'hasattr',\n\
    'hash', 'help', 'hex', 'id', 'input', 'int', 'isinstance', 'issubclass', 'iter',\
    \ 'len',\n'license', 'list', 'locals', 'map', 'max', 'memoryview', 'min', 'next',\
    \ 'object', 'oct',\n'open', 'ord', 'pow', 'print', 'property', 'quit', 'range',\
    \ 'repr', 'reversed', 'round',\n'set', 'setattr', 'slice', 'sorted', 'staticmethod',\
    \ 'str', 'sum', 'super', 'tuple',\n'type', 'vars', 'zip']\n```\n\nAs mentioned,\
    \ these are built-in exceptions in Python. There is a way to define our exceptions,\
    \ but we will not be going into them in this particular book.\n\nPlease note that\
    \ these are not the only errors we will encounter when we are programming. We\
    \ can have errors due to our own mistakes in calculations, as we discussed in\
    \ *Chapter 4, Understanding Logical Reasoning*. We can introduce errors in our\
    \ *Boolean* logic. The goal is to avoid as many as we can so that our program\
    \ runs without problems. And remember, test your algorithms and test them often.\n\
    \nNow, let’s look at a few algorithms with errors and try to identify the errors\
    \ so that we can correct them.\n\n## Debugging algorithms\n\nThere is a debugger\
    \ we can run in Python using the `breakpoint()` function (which is built-in).\
    \ We can introduce this code into our program and insert it where we are unsure\
    \ of our code. Adding `breakpoint()` will then check for bugs and errors. When\
    \ we run a `breakpoint()` function, we’ll get a pdb output, which stands for **Python\
    \ Debugger**. As a note, this built-in function appears in **Python 3.7** and\
    \ newer versions. The previous debugger for **Python 3.6** and older was `pdb.set_trace()`.\n\
    \nWhen we run the debugger, we can use four commands:\n\n- c: Continues the execution\n\
    - q: Quits the debugger/execution"
  mdcn: "## 识别算法设计中的错误\n\n对于任何程序员来说，算法中的错误都是生活中不可避免的一部分。重要的是要习惯于犯错。正如*第6章，探索问题分析*和*第7章，设计解决方案和解决方案流程*中所提到的，测试你的算法并经常进行测试是一个良好的实践。等到你写完数百或数千行代码后再去测试，无异于自找麻烦。是的，我曾经在复制一个游戏时完全没有测试，直到复制完全部4,585行代码才开始。那时我还年轻。说实话，我从未找到我犯的错误。我重新开始，并在每个角落都进行测试。第二次成功了，但我浪费了几周时间复制所有内容（那是从一本书上抄的——当时还没有GitHub），然后试图找出错误。所以，请不要像我一样。请测试你的算法。\n\
    \n现在，在继续调试和处理代码之前，让我们看看在解决问题时可能遇到的错误。\n\n在本节中，我们将重点关注两大类错误：语法错误和逻辑错误。\n\n## 语法错误\n\
    \n语法错误有时也被称为解析错误。它们是我们在忘记缩进、添加冒号、为字符串添加引号等时产生的错误。我们将在接下来的章节中看看不同类型的语法错误。\n\n###\
    \ 使用冒号\n\n冒号在Python中用于分隔条件、创建循环等。冒号是一种告诉算法接下来的内容是这个特定代码块的一部分的方式。当我们在Python中引入冒号时，它们会自动缩进代码的下一行。但如果我们忘记在需要的地方包含冒号，程序将无法成功运行。让我们看一个语法错误：\n\
    \n```\nfor i in range(1, 10)\n    print(i)\n```\n\n如果我们运行这段代码，我们将得到一条错误消息，显示*无效语法*。下面的截图显示了我们尝试运行此程序时出现的弹出窗口：\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_143_0.png)\n\n图8.1 – 错误弹出窗口\n\n如果我们从Python\
    \ shell运行它，错误会这样显示：\n\n```\nSyntaxError: expected ':'\n```\n\n如你所见，当我们的代码包含错误时，Python程序会提醒我们。\n\
    \n注意代码中`range`后面缺少一个冒号。现在，看看以下代码中修正后的语法：\n\n```\nch8_syntaxerror1.py\n```\n\n\
    ```\nfor i in range(1, 10):\n    print(i)\n```\n\n当我们运行修正后的代码时，程序会运行并打印数字1到9，如下所示：\n\
    \n```\n1\n2\n3\n4\n5\n6\n7\n8\n9\n```\n\n你可能还记得`range`函数不包括上限。如果我们想打印数字10，我们的范围需要是`range(1,\
    \ 11)`。\n\n现在，让我们看看Python中使用的其他可能导致一些错误的标点符号，即括号、嵌套括号和方括号。\n\n### 使用嵌套括号和方括号\n\
    \n除了涉及冒号的语法错误（这是我最常见的错误）之外，当我们有嵌套括号时也会出现错误。我们必须始终检查每个开括号是否都有一个闭括号。方括号也是如此。让我们看看以下代码，其中包含一个与括号相关的错误：\n\
    \n```\nname = input('What is your name? '\n```\n\n```\nprint(name)\n```\n\n如你所见，在`name`定义中有两个开括号，但只有一个闭括号。当我们运行该程序时，我们会从Python得到一个无效语法错误。当我们在Python\
    \ shell或解释器中运行该程序时，会发生以下情况：\n\n```\nSyntaxError: '(' was never closed\n```\n\n\
    你可能已经注意到，错误消息在3.11版本中比在3.8和3.9版本中更有帮助。新版本提供了更多关于错误可能是什么的细节，因此我们得到的不是通用的**SyntaxError**消息，而是得到一些信息，说明缺少闭括号。现在，这是没有错误的相同代码：\n\
    \n### ch8_syntaxerror2.py\n\n```\nname = input('What is your name? ')\nprint(name)\n\
    ```\n\n现在，当我们运行代码时，程序会询问姓名，然后打印出来。输出如下所示：\n\n```\nWhat is your name? Monique\n\
    Monique\n```\n\n如你所见，程序现在可以无问题地运行。\n\n在*第3章，理解算法和算法思维*中，我们使用字典为每个菜单项创建了一个带价格的菜单。字典包含括号来表示字典的开始和结束。让我们看几行代码：\n\
    \n```\ncars = {\n    \"Hyundai\": \"Kona\",\n    \"Honda\": \"CR-V\",\n    \"\
    Toyota\": \"Camry\"\nprint(cars)\n```\n\n如果我们看这个程序，字典缺少闭括号`}`，所以我们得到一个语法错误。在这种情况下，Python告诉我们，在编译单个语句时发现了多个语句。如果我们不知道要找什么，这个错误有点难理解，但它仍然比普通的**SyntaxError**消息更有帮助。以下代码片段显示了修正后的程序：\n\
    \n### ch8_syntaxerror3.py\n\n```\ncars = {\n    \"Hyundai\": \"Kona\",\n    \"\
    Honda\": \"CR-V\",\n    \"Toyota\": \"Camry\"\n    }\nprint(cars)\n```\n\n如你所见，一旦添加了括号，程序将运行并打印以下输出：\n\
    \n```\n{'Hyundai': 'Kona', 'Honda': 'CR-V', 'Toyota': 'Camry'}\n```\n\n字典中的每个条目都打印在一行中，用逗号分隔。在编写算法时添加`print`语句以确保我们没有任何错误是有帮助的。我通常在测试后删除不必要的打印函数，但当我们在编写长算法并需要测试它们以避免问题时，它们确实很方便。\n\
    \n在Python中编写算法时，我们可能会遇到许多其他错误。让我们再看几个语法错误。\n\n### 其他语法错误\n\n可能会引入许多其他语法错误，尤其是在较长的程序中。如果你看看我们刚刚使用的字典，忘记逗号也会导致语法错误。通常，当我们尝试运行程序时，这些语法错误会很快被识别出来。Python会突出显示期望缩进的位置或缺少括号的位置。语法错误通常很容易识别，但还有许多其他类型的错误。\n\
    \n## 逻辑错误\n\n在*第4章，理解逻辑推理*中，我们讨论了可能遇到的逻辑错误：\n\n- 在方程或语句中使用错误的变量\n- 使用错误的运算符来测试条件\n\
    - 在检查条件时使用错误的缩进\n\n现在，我们将看看Python特别指出的其他逻辑错误以及每个错误代表什么。\n\n逻辑错误也称为**运行时错误**。许多运行时错误允许我们识别代码中发生了什么。每个错误都有特定的用途，并为我们提供如何修复错误的提示。你可以在[https://www.tutorialsteacher.com/python/error-types-in-python](https://www.tutorialsteacher.com/python/error-types-in-python)找到运行时错误的综合列表。\n\
    \nPython中有很多不同类型的错误被标记为异常。你可以通过运行以下代码来获取Python异常列表：\n\n### ch8_errors.py\n\n```\n\
    print(dir(locals()['__builtins__']))\n```\n\n当我们运行这段代码时，输出提供以下错误值：\n\n```\n['ArithmeticError',\
    \ 'AssertionError', 'AttributeError', 'BaseException',\n'BlockingIOError', 'BrokenPipeError',\
    \ 'BufferError', 'BytesWarning', 'ChildProcessError',\n'ConnectionAbortedError',\
    \ 'ConnectionError', 'ConnectionRefusedError',\n'ConnectionResetError', 'DeprecationWarning',\
