- md: "## Problem 9 – using Python to create a QR code\n\nA **Quick Response (QR)**\
    \ code, is a two-dimensional barcode engineered to encapsulate information that\
    \ can be rapidly read by a smartphone or a specialized QR scanner. Imagine encountering\
    \ a poster of the trending digital collectible *Pudgy Penguins*.\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_338_0.png)\n\
    \nFigure 17.12 – A JPEG image of a Pudgy Penguin digital collectible\n\n**Example\
    \ web address of QR code:** `https://pudgypenguins.com/`\n\nInstead of jotting\
    \ down or tediously typing out a long web address, you’d have the option to simply\
    \ scan a QR code present on the poster. In an instant, this action would transport\
    \ you to the primary web page of Pudgy Penguins, bridging the gap between the\
    \ tangible advertisement and the digital realm of collectibles. Now, let’s explore\
    \ how Python can assist us in crafting a QR code that integrates a Pudgy Penguin\
    \ logo:\n\nFirst, you’ll need to install the necessary packages for this task.\
    \ You can open your terminal and run the `pip install qrcode[pil]` command to\
    \ generate QR codes and `pip install opencv-python` to read them.\n\nAfter installing\
    \ the packages, you start the Python script by importing the required libraries.\
    \ You use `import qrcode` to import the QR code library, `from PIL import Image`\
    \ for image manipulation capabilities, and `import cv2` for computer vision functionalities,\
    \ mainly to read the QR code later on:\n\n```\nimport qrcode\nfrom PIL import\
    \ Image\nimport cv2\n```\n\nNext, you define a function called `generate_qr_code`.\
    \ This function takes two arguments – `data`, which is the information you want\
    \ to encode into the QR code, and `file_name`, which is the name of the file where\
    \ you want to save the generated QR code. Inside this function, you specify the\
    \ QR code’s properties, such as the version, error correction level, box size,\
    \ and border size. You then add the data to the QR code, fit it, create an image\
    \ from it, and save that image:\n\n```\ndef generate_qr_code(data, file_name):\n\
    \    qr = qrcode.QRCode(\n        version=1,\n        error_correction=qrcode.constants.ERROR_CORRECT_H,\n\
    \        box_size=15,\n        border=4,\n    )\n    qr.add_data(data)\n    qr.make(fit=True)\n\
    \    img = qr.make_image(fill_color=\"black\", back_color=\"white\")\n    img.save(file_name)\n\
    ```\n\nAfter generating a basic QR code, you might want to embed a logo in it.\
    \ For this, you define another function named `embed_logo`. This function takes\
    \ the paths of the QR code image and the logo image, combining them to generate\
    \ a new QR code image with the logo embedded in it:\n\n```\ndef embed_logo(qr_path,\
    \ logo_path, output_path):\n    base = Image.open(qr_path)\n    logo = Image.open(logo_path)\n\
    \    base_width, base_height = base.size\n    logo_width, logo_height = logo.size\n\
    \    new_width = int(base_width / 4)\n    new_height = int((new_width / logo_width)\
    \ * logo_height)\n    logo = logo.resize((new_width, new_height))\n    x_offset\
    \ = int((base_width - new_width) / 2)\n    y_offset = int((base_height - new_height)\
    \ / 2)\n    base.paste(logo, (x_offset, y_offset), mask=logo)\n    base.save(output_path)\n\
    ```\n\nNow, to read a QR code from an image file, you define a third function\
    \ called `read_qr_code`. Inside this function, you use OpenCV to read the QR code\
    \ image and decode it, extracting and displaying its content:\n\n```\ndef read_qr_code(file_path):\n\
    \    image = cv2.imread(file_path)\n    qr_code_detector = cv2.QRCodeDetector()\n\
    \    value, points, qr_code = qr_code_detector.detectAndDecode(image)\n    if\
    \ value:\n        print(f\"Decoded text: {value}\")\n    else:\n        print(\"\
    QR code not found\")\n```\n\nFinally, you apply all these functions to generate\
    \ a QR code, embed a logo, and read the QR code. You call `generate_qr_code` with\
    \ the data you want to encode and a filename to save the QR code. Then, you call\
    \ `embed_logo` to embed a logo onto the generated QR code, and finally, you use\
    \ `read_qr_code` to read and display the content of the QR code:\n\n```\n# Generate\
    \ QR code\ndata = \"https://pudgypenguins.com/\"\ngenerate_qr_code(data, \"advanced_qr.png\"\
    )\n# Embed logo\nembed_logo(\"advanced_qr.png\", \"pudgy.PNG\", \"advanced_qr_with_logo.png\"\
    )\n# Read QR code\nread_qr_code(\"advanced_qr_with_logo.png\")\n```\n\nAnd that’s\
    \ it! By following these steps, you can generate a QR code, personalize it by\
    \ embedding a logo, and then read it to retrieve its encoded data.\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_340_0.png)\n\
    \nFigure 17.13 – QR code without and with a Pudgy Penguin logo\n\nIn this example,\
    \ we’ve touched on the fundamentals of generating QR codes in Python, showcasing\
    \ how you can effectively create them for various purposes, such as sharing URLs,\
    \ text information, or Wi-Fi passwords. Through a practical example, we’ve demonstrated\
    \ how to use key libraries such as `qrcode`.\n\n# Summary\n\nIn this chapter,\
    \ we’ve had a chance to explore Python in a few very different applications while\
    \ looking at actual problems.\n\nIn previous chapters, we learned about the computational\
    \ thinking process, along with the elements of decomposition, pattern recognition,\
    \ pattern generalization, and algorithm design, which make algorithms make sense.\
    \ When we tackle problems from clients or just while creating a script as a hobby,\
    \ we have to go through the process necessary to define what we’re creating with\
    \ our algorithm. This critical process will ensure that we are designing the best\
    \ possible algorithms we can.\n\nWe learned how to read from files, upload files,\
    \ create ciphers and decoders, use algorithms to write stories with user input,\
    \ and develop the most effective travel plan when given a series of cities to\
    \ visit. In addition, we also created a basic chatbot that can interact and adapt\
    \ based on user input, explored web scraping, and created a QR code.\n\nIn the\
    \ next chapter, we will continue our exploration of Python and computational thinking\
    \ with additional application problems in data analysis, focusing on scientific\
    \ applications, housing, stock market analyses, and so on.\n\n# 18\n\n# Advanced\
    \ Applied Computational Thinking Problems\n\nIn this chapter, we will continue\
    \ providing examples in multiple areas for applications of the Python programming\
    \ language and computational thinking. We will be exploring multiple areas, such\
    \ as geometric tessellations, creating models of housing data, creating language\
    \ detection, analyzing genetic data, analyzing stocks, creating a **convolutional\
    \ neural network** (CNN), and more. We will use what we’ve learned so far concerning\
    \ **computational thinking** and the **Python** programming language to do the\
    \ following:\n\n- Create tessellations\n- Analyze biological data\n- Analyze data\
    \ for specific populations\n- Create models of housing data\n- Perform language\
    \ detection\n- Analyze generic data\n- Analyze stocks\n- Create a CNN model\n\n\
    After reading this chapter, you’ll have learned how to perform different analyses\
    \ in working with data, create tables and graphs that help analyze existing data,\
    \ as well as create training and testing models to help predict outcomes based\
    \ on existing large datasets.\n\n# Technical requirements\n\nYou will need the\
    \ latest version of Python installed to run the code in this chapter.\n\nYou will\
    \ need the following libraries and packages to be installed for Python:\n\n- **NLTK**\n\
    - **PyCairo**\n- **Pandas**\n- **Matplotlib**\n- **Seaborn**\n\nYou can find the\
    \ full source code used in this chapter here:\n[https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-](https://github.com/PacktPublishing/Applied-Computational-Thinking-with-Python-Second-)"
  mdcn: "## 问题 9 – 使用 Python 创建二维码\n\n**快速响应（QR）**码是一种二维条形码，旨在封装可被智能手机或专用二维码扫描器快速读取的信息。想象一下，你遇到一张关于热门数字收藏品\
    \ *Pudgy Penguins* 的海报。\n\n![](img/b193dd901f0befc8cf3c9fa5265db3da_338_0.png)\n\
    \n图 17.12 – Pudgy Penguin 数字收藏品的 JPEG 图像\n\n**二维码的示例网址：** `https://pudgypenguins.com/`\n\
    \n与其记下或费力地输入一个长长的网址，你只需扫描海报上的二维码即可。这一操作会瞬间将你带到 Pudgy Penguins 的主页，架起了实体广告与数字收藏品世界之间的桥梁。现在，让我们探索如何使用\
    \ Python 来制作一个嵌入了 Pudgy Penguin 标志的二维码：\n\n首先，你需要为此任务安装必要的包。你可以打开终端并运行 `pip install\
    \ qrcode[pil]` 命令来生成二维码，以及 `pip install opencv-python` 来读取它们。\n\n安装好包后，你通过导入所需的库来启动\
    \ Python 脚本。你使用 `import qrcode` 导入二维码库，`from PIL import Image` 用于图像处理功能，以及 `import\
    \ cv2` 用于计算机视觉功能，主要是为了稍后读取二维码：\n\n```\nimport qrcode\nfrom PIL import Image\n\
    import cv2\n```\n\n接下来，你定义一个名为 `generate_qr_code` 的函数。该函数接受两个参数 – `data`，即你想要编码到二维码中的信息，以及\
    \ `file_name`，即你想要保存生成的二维码的文件名。在此函数内部，你指定二维码的属性，例如版本、纠错级别、方块大小和边框大小。然后，你将数据添加到二维码中，使其适配，从中创建图像，并保存该图像：\n\
    \n```\ndef generate_qr_code(data, file_name):\n    qr = qrcode.QRCode(\n     \
    \   version=1,\n        error_correction=qrcode.constants.ERROR_CORRECT_H,\n \
    \       box_size=15,\n        border=4,\n    )\n    qr.add_data(data)\n    qr.make(fit=True)\n\
    \    img = qr.make_image(fill_color=\"black\", back_color=\"white\")\n    img.save(file_name)\n\
    ```\n\n生成基本二维码后，你可能想在其中嵌入一个标志。为此，你定义另一个名为 `embed_logo` 的函数。该函数接受二维码图像和标志图像的路径，将它们组合起来生成一个新的二维码图像，其中嵌入了标志：\n\
    \n```\ndef embed_logo(qr_path, logo_path, output_path):\n    base = Image.open(qr_path)\n\
    \    logo = Image.open(logo_path)\n    base_width, base_height = base.size\n \
    \   logo_width, logo_height = logo.size\n    new_width = int(base_width / 4)\n\
    \    new_height = int((new_width / logo_width) * logo_height)\n    logo = logo.resize((new_width,\
    \ new_height))\n    x_offset = int((base_width - new_width) / 2)\n    y_offset\
    \ = int((base_height - new_height) / 2)\n    base.paste(logo, (x_offset, y_offset),\
    \ mask=logo)\n    base.save(output_path)\n```\n\n现在，要从图像文件中读取二维码，你定义了第三个函数 `read_qr_code`。在此函数内部，你使用\
    \ OpenCV 读取二维码图像并解码，提取并显示其内容：\n\n```\ndef read_qr_code(file_path):\n    image\
    \ = cv2.imread(file_path)\n    qr_code_detector = cv2.QRCodeDetector()\n    value,\
    \ points, qr_code = qr_code_detector.detectAndDecode(image)\n    if value:\n \
    \       print(f\"Decoded text: {value}\")\n    else:\n        print(\"QR code\
    \ not found\")\n```\n\n最后，你应用所有这些函数来生成二维码、嵌入标志并读取二维码。你使用要编码的数据和保存二维码的文件名调用 `generate_qr_code`。然后，你调用\
    \ `embed_logo` 将标志嵌入到生成的二维码中，最后，你使用 `read_qr_code` 读取并显示二维码的内容：\n\n```\n# Generate\
    \ QR code\ndata = \"https://pudgypenguins.com/\"\ngenerate_qr_code(data, \"advanced_qr.png\"\
    )\n# Embed logo\nembed_logo(\"advanced_qr.png\", \"pudgy.PNG\", \"advanced_qr_with_logo.png\"\
    )\n# Read QR code\nread_qr_code(\"advanced_qr_with_logo.png\")\n```\n\n就是这样！通过遵循这些步骤，你可以生成一个二维码，通过嵌入标志对其进行个性化设置，然后读取它以检索其编码的数据。\n\
    \n![](img/b193dd901f0befc8cf3c9fa5265db3da_340_0.png)\n\n图 17.13 – 没有和带有 Pudgy\
