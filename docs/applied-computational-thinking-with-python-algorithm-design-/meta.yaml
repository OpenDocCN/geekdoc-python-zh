    the inputs.


    As you have seen, the inputs were read as integers, strings, and lists. Python
    automatically converted the information so it could be used by the algorithm.


    In Python, there’s also a way to define multiple variables with separate inputs
    from one line of code. Take a look at the following code snippet:


    ```

    ch10_input5.py


    name1, name2 = input("Enter First Name: "), input("Enter Last Name: ")

    print(name1 + " " + name2)

    ```


    As you can see, the quotations (" ") in the middle of the `print()` command are
    used to separate the inputs. Take a look at the output for this algorithm:


    ```

    Enter First Name: John

    Enter Last Name: Doe

    John Doe

    ```


    Here, the program asks for the first and last names, which were called in the
    first line of the algorithm. This is by no means the only way that we can use
    inputs from users, nor the only input we’ll use.


    In this section, we looked at how we can define input within an algorithm. We
    also learned how we can get input from a user so that we can use it later in the
    algorithm. Now, let’s move to the next section, where we’ll look at input and
    output within some computational thinking problems.


    # Understanding input and output in computational thinking


    In this section, we will take a look at computational thinking problems to better
    understand input and output. As we go through the design process of the algorithms,
    we will focus on identifying the inputs'
- md: "## Problem 1 – building a Caesar cipher\n\nA **Caesar cipher** is a system\
    \ of cryptography that’s used to code messages. This type of cipher is one of\
    \ the oldest known and it was developed around 100 BC. The cipher was used by\
    \ soldiers to send secret messages. The goal was to keep the information secret,\
    \ even if the message was intercepted. It is one of the earliest forms of cryptography.\n\
    \nEven in modern times, we use cryptography to secure information so that only\
    \ the intended users can read the messages. The Caesar cipher uses a shift in\
    \ the letters to encode the messages. For example, the letter *a* shifted three\
    \ places would be *d*. To build an algorithm that does this for us, we’ll need\
    \ a few things:\n\n- A message that will be coded\n- An indicator of how much\
    \ we’ll shift each letter\n- A printed coded message\n\nLet’s think about what\
    \ this means. The message will need to be an input from the user. The shift will\
    \ also be an input as we don’t want the program to always use the same code. Otherwise,\
    \ it will be easy to figure out the original message once you know the shift.\
    \ The printed coded message is our output. Here are some of the steps to help\
    \ create the algorithm:\n\n1. First, we need to input the message.\n2. Then, we\
    \ need to define the input shift.\n3. After that, we need to iterate through each\
    \ letter.\n4. After the iteration, we must adjust each letter with the shift we\
    \ defined.\n5. Finally, we must print out the new, coded message.\n\nWe can exemplify\
    \ the preceding steps with the help of the following cipher algorithm snippet:\n\
    \nch10_problem1.py\n\n```\n#Print initial message for the user\nprint(\"This program\
    \ will take your message and encode it.\")\n#Ask for the message\nmsg = input(\"\
    What message would you like to code? \")\n#Ask for shift\nshift = int(input(\"\
    How many places will you shift your message? \"))\nmsgCipher = \"\"\n#Iterate\
    \ through the letters, adjusting for shift\nfor letter in msg:\n    k = ord(letter)\n\
    \    if 48 <= k <= 57:\n        newk = (k - 48 + shift)%10 + 48\n    elif 65 <=\
    \ k <= 90:\n        newk = (k - 65 + shift)%26 + 65\n    elif 97 <= k <=122:\n\
    \        newk = (k - 97 + shift)%26 + 97\n    else:\n        newk = k\n    msgCipher\
    \ += chr(newk)\nprint(\"Your coded message is below.\")\nprint(msgCipher)\n```\n\
    \nNote that in the iteration, we’re doing some math to figure out the value for\
    \ each letter in the alphabet. We use some conditional statements to define what\
    \ each letter’s value is after using the user-defined shift value.\n\nTake a look\
    \ at the output that results when we run this algorithm:\n\n```\nThis program\
    \ will take your message and encode it.\nWhat message would you like to code?\
    \ Code this message\nHow many places will you shift your message? 2\nYour coded\
    \ message is below.\nEqfg vjku oguucig\n```\n\nNote the first word in the *message*\
    \ and the *coded message* – Code:\n\n- The letter C, which moved two letters,\
    \ is now E\n- The letter o is now q, and so on\n\nFor each letter in the message,\
    \ the letters have shifted by two places. The output is our `print()` statement\
    \ plus the coded message, which is given by `print(msgCipher)`. Our output includes\
    \ both statements for clarity. *Is the first message necessary?* No. However,\
    \ in some algorithms, it’s best to have some lines that let the user know what\
    \ is happening with the algorithm.\n\nLet’s take a look at another problem.\n\n\
    ## Problem 2 – finding maximums\n\nYou have been asked to create a program that\
    \ finds the maximum value from a list of numbers. The list of numbers is provided\
    \ by the user. You need to create an algorithm for this problem.\n\nFirst, we\
    \ need to identify the inputs and outputs for this particular problem. They are\
    \ as follows:\n\n- Number of items in the list (input)\n- Numbers in the list\
    \ (input)\n- Maximum value in the list (output)\n\nRecall from earlier in this\
    \ chapter, in the *Defining input and output* section, that we can define an empty\
    \ list, and then ask the user to let the program know how many items will be entered\
    \ into the list. The following program exemplifies the same:\n\nch10_problem2.py\n\
    \n```\n#Define the list name\nmaxList = []\n#Ask user how many numbers will be\
    \ entered\nquant = int(input(\"How many data points are you entering? \"))\n#Iterate,\
    \ append points, and find maximum\nfor i in range(0, quant):\n    dataPoint =\
    \ int(input(\"Enter number: \"))\n    maxList.append(dataPoint)\n#Print maximum\
    \ value\nprint(\"The maximum value is \" + str(max(maxList)) + \".\")\n```\n\n\
    Note that we used the `max()` function to find the maximum value within the list.\
    \ In addition, we had to add `int()` types to have the algorithm correctly identify\
    \ the values as numbers. The code goes through each number from 0 to the number\
    \ of data points we received from the user input, which we defined as the `quant`\
    \ variable. As the algorithm iterates through the numbers, it compares them and\
    \ finds the maximum value.\n\nLet’s see what the output looks like:\n\n```\nHow\
    \ many data points are you entering? 6\nEnter number: 1\nEnter number: 2\nEnter\
    \ number: 8\nEnter number: 4\nEnter number: 5\nEnter number: 7\nThe maximum value\
    \ is 8.\n```\n\nAs you can see, the user stated that 6 numbers would be entered.\
    \ The algorithm then prompted the user for each of the values. Finally, the maximum\
    \ value was identified.\n\nNow, let’s look at how we can build a guessing game.\n\
    \n## Problem 3 – building a guessing game\n\nYou’ve been asked to build a game\
    \ where a user gets as many chances as needed to identify the digits of a four-digit\
    \ number in the correct order. When a user inputs a guess, the algorithm will\
    \ state whether any numbers are correct.\n\nThe algorithm will identify whether\
    \ the numbers are in the correct location, but it will not identify which of the\
    \ numbers are correct or which are in the correct location. If the player guesses\
    \ the correct number, the game ends. You may find this game similar to a popular\
    \ game called *Mastermind*. Mastermind was created in the 1970s and is based on\
    \ a computer adaptation from MIT that was created on the computer as a version\
    \ of the game *Bulls and Cows*. In Mastermind, a player sets four color pins in\
    \ the game and a second player has a set number of chances to guess the correct\
    \ order and color of the pins.\n\nIn this case, we’re using numbers rather than\
    \ colors, and the computer program will help us identify whether we have gotten\
    \ any numbers correct and whether they are in the correct location.\n\nTo build\
    \ this game, let’s look at the inputs and outputs that we’ll need:\n\n- A randomly\
    \ generated four-digit number (input)\n- The user’s guesses (input)\n- Feedback\
    \ about numbers and locations from the algorithm (output)\n- A message finalizing\
    \ the game after the number has been guessed (output)\n\nOnce we’ve generated\
    \ the number, we’ll need to find a way to compare the digits of that number to\
    \ the digits that the user inputs. Note that we need to import the random library\
    \ for this particular algorithm so that we can generate the random four-digit\
    \ number. Let’s take a look at the code:\n\nch10_problem3.py\n\n```\nimport random\
    \ as rand\nnumber = rand.randint(1000,10000)\nguess = int(input(\"What's your\
    \ first guess? \"))\n#Algorithm checks if number is correct.\nif (guess == number):\n\
    \    print(\"That's right! You win!\")\nelse:\n    i = 0\n```\n\nAs you can see,\
    \ this is one instance where we’ll need input from the user. However, this is\
    \ only the first guess, so we’ll need to get more input from the user and provide\
    \ some output that provides feedback. Take a look at the following code snippet\
    \ from the same algorithm:\n\n```\n#Condition so that user keeps guessing until\
    \ they win.\nwhile (guess != number):\n    i = i + 1\n    #Remember you can also\
    \ write as i += 1\n    j = 0\n    guess = str(guess)\n    number = str(number)\n\
    \    #Check which numbers are correct and mark incorrect with 'N'\n    guessY\
    \ = ['N']*4\n    #Make sure you check each digit, so run loop 4 times\n    for\
    \ q in range(0, 4):\n        if (guess[q] == number[q]):\n            j += 1\n\
    \            guessY[q] = guess[q]\n        else:\n            continue\n    #If\
    \ only some digits are correct, run next condition\n    if (j < 4) and (j != 0):\n\
    \        print(\"You have \" + str(j) + \" digit(s) right.\")\n        print(\"\
    These numbers were correct.\")\n        for m in guessY:\n```"
  mdcn: "## 问题 1 – 构建凯撒密码\n\n**凯撒密码**是一种用于加密信息的密码系统。这种密码是已知最古老的密码之一，大约在公元前100年发展起来。士兵们曾使用这种密码发送秘密信息。其目标是即使信息被截获，也能保持信息的机密性。它是最早的密码形式之一。\n\
    \n即使在现代，我们也使用密码学来保护信息，以便只有预期的用户才能读取消息。凯撒密码通过字母的移位来编码信息。例如，字母 *a* 向后移动三位会变成 *d*。要构建一个能为我们执行此操作的算法，我们需要几样东西：\n\
    \n- 一条将被编码的消息\n- 一个指示每个字母将移位多少的指标\n- 一条打印出的编码消息\n\n让我们思考一下这意味着什么。消息将需要是用户的输入。移位也将是一个输入，因为我们不希望程序总是使用相同的代码。否则，一旦你知道了移位量，就很容易推断出原始消息。打印出的编码消息是我们的输出。以下是一些帮助创建算法的步骤：\n\
    \n1. 首先，我们需要输入消息。\n2. 然后，我们需要定义输入的移位量。\n3. 之后，我们需要遍历每个字母。\n4. 遍历之后，我们必须根据定义的移位量调整每个字母。\n\
    5. 最后，我们必须打印出新的、编码后的消息。\n\n我们可以借助以下密码算法片段来举例说明上述步骤：\n\nch10_problem1.py\n\n```\n\
    #Print initial message for the user\nprint(\"This program will take your message\
    \ and encode it.\")\n#Ask for the message\nmsg = input(\"What message would you\
    \ like to code? \")\n#Ask for shift\nshift = int(input(\"How many places will\
    \ you shift your message? \"))\nmsgCipher = \"\"\n#Iterate through the letters,\
    \ adjusting for shift\nfor letter in msg:\n    k = ord(letter)\n    if 48 <= k\
    \ <= 57:\n        newk = (k - 48 + shift)%10 + 48\n    elif 65 <= k <= 90:\n \
    \       newk = (k - 65 + shift)%26 + 65\n    elif 97 <= k <=122:\n        newk\
    \ = (k - 97 + shift)%26 + 97\n    else:\n        newk = k\n    msgCipher += chr(newk)\n\
    print(\"Your coded message is below.\")\nprint(msgCipher)\n```\n\n请注意，在遍历过程中，我们进行了一些数学运算来计算字母表中每个字母的值。我们使用一些条件语句来定义使用用户定义的移位值后每个字母的值。\n\
    \n看看运行此算法时产生的输出：\n\n```\nThis program will take your message and encode it.\n\
    What message would you like to code? Code this message\nHow many places will you\
    \ shift your message? 2\nYour coded message is below.\nEqfg vjku oguucig\n```\n\
    \n注意 *消息* 和 *编码消息* 中的第一个单词 – Code：\n\n- 字母 C 移动了两个字母，现在变成了 E\n- 字母 o 现在变成了 q，依此类推\n\
    \n对于消息中的每个字母，字母都向后移动了两个位置。输出是我们的 `print()` 语句加上编码后的消息，后者由 `print(msgCipher)` 给出。为了清晰起见，我们的输出包含了这两个语句。*第一条消息是必要的吗？*\
    \ 不是。然而，在某些算法中，最好有一些行来让用户知道算法正在做什么。\n\n让我们看看另一个问题。\n\n## 问题 2 – 查找最大值\n\n你被要求创建一个程序，从数字列表中找出最大值。数字列表由用户提供。你需要为此问题创建一个算法。\n\
    \n首先，我们需要确定这个特定问题的输入和输出。它们如下：\n\n- 列表中的项目数量（输入）\n- 列表中的数字（输入）\n- 列表中的最大值（输出）\n\
    \n回顾本章前面的 *定义输入和输出* 部分，我们可以定义一个空列表，然后要求用户告知程序将有多少项目输入到列表中。以下程序举例说明了相同的内容：\n\n\
    ch10_problem2.py\n\n```\n#Define the list name\nmaxList = []\n#Ask user how many\
    \ numbers will be entered\nquant = int(input(\"How many data points are you entering?\
    \ \"))\n#Iterate, append points, and find maximum\nfor i in range(0, quant):\n\
    \    dataPoint = int(input(\"Enter number: \"))\n    maxList.append(dataPoint)\n\
    #Print maximum value\nprint(\"The maximum value is \" + str(max(maxList)) + \"\
    .\")\n```\n\n请注意，我们使用了 `max()` 函数来查找列表中的最大值。此外，我们必须添加 `int()` 类型，以便算法能正确地将值识别为数字。代码遍历从\
    \ 0 到我们从用户输入获得的数据点数量（我们将其定义为 `quant` 变量）的每个数字。当算法遍历这些数字时，它会进行比较并找出最大值。\n\n让我们看看输出是什么样子：\n\
    \n```\nHow many data points are you entering? 6\nEnter number: 1\nEnter number:\
    \ 2\nEnter number: 8\nEnter number: 4\nEnter number: 5\nEnter number: 7\nThe maximum\
    \ value is 8.\n```\n\n如你所见，用户说明将输入 6 个数字。然后算法提示用户输入每个值。最后，确定了最大值。\n\n现在，让我们看看如何构建一个猜数字游戏。\n\
    \n## 问题 3 – 构建猜数字游戏\n\n你被要求构建一个游戏，用户可以有尽可能多的机会来按正确顺序识别一个四位数的数字。当用户输入一个猜测时，算法会说明是否有任何数字是正确的。\n\
    \n算法会识别数字是否在正确的位置，但不会识别哪些数字是正确的或哪些在正确的位置。如果玩家猜对了数字，游戏结束。你可能会发现这个游戏类似于一个名为 *Mastermind*\
    \ 的流行游戏。Mastermind 创建于 1970 年代，基于麻省理工学院的一个计算机改编版本，该版本是作为 *Bulls and Cows* 游戏的计算机版本创建的。在\
    \ Mastermind 中，一名玩家在游戏板上设置四个彩色销钉，第二名玩家有固定次数的机会来猜测销钉的正确顺序和颜色。\n\n在这种情况下，我们使用数字而不是颜色，计算机程序将帮助我们识别是否猜对了任何数字以及它们是否在正确的位置。\n\
    \n要构建这个游戏，让我们看看我们需要的输入和输出：\n\n- 一个随机生成的四位数（输入）\n- 用户的猜测（输入）\n- 算法提供的关于数字和位置的反馈（输出）\n\
    - 在数字被猜出后结束游戏的消息（输出）\n\n一旦我们生成了数字，我们就需要找到一种方法将该数字的位数与用户输入的位数进行比较。请注意，对于这个特定的算法，我们需要导入\
    \ random 库，以便我们可以生成随机的四位数。让我们看看代码：\n\nch10_problem3.py\n\n```\nimport random as\
    \ rand\nnumber = rand.randint(1000,10000)\nguess = int(input(\"What's your first\
    \ guess? \"))\n#Algorithm checks if number is correct.\nif (guess == number):\n\
    \    print(\"That's right! You win!\")\nelse:\n    i = 0\n```\n\n如你所见，这是我们其中一个需要用户输入的情况。然而，这只是第一次猜测，所以我们需要从用户那里获取更多输入，并提供一些反馈输出。看看同一算法中的以下代码片段：\n\
    \n```\n#Condition so that user keeps guessing until they win.\nwhile (guess !=\
    \ number):\n    i = i + 1\n    #Remember you can also write as i += 1\n    j =\
    \ 0\n    guess = str(guess)\n    number = str(number)\n    #Check which numbers\
    \ are correct and mark incorrect with 'N'\n    guessY = ['N']*4\n    #Make sure\
    \ you check each digit, so run loop 4 times\n    for q in range(0, 4):\n     \
    \   if (guess[q] == number[q]):\n            j += 1\n            guessY[q] = guess[q]\n\
    \        else:\n            continue\n    #If only some digits are correct, run\
    \ next condition\n    if (j < 4) and (j != 0):\n        print(\"You have \" +\
    \ str(j) + \" digit(s) right.\")\n        print(\"These numbers were correct.\"\
    )\n        for m in guessY:\n```"
