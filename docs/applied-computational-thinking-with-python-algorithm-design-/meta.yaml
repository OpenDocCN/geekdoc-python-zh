    In the next section, we will thoroughly examine the steps of the ML life cycle.


    # Phase 1 – preparation and problem definition


    Problem definition in the ML life cycle means clearly outlining the specific task
    the model must address, specifying its type and objective. Following this, data
    collection involves gathering relevant and sufficient data to train and test the
    model; this will be discussed later in this chapter. Both sub-stages are foundational
    for guiding subsequent steps in the life cycle.


    # Problem definition


    Clearly define the objective. Begin by precisely formulating the problem you intend
    to solve. Grasp the challenge you’re tackling. Define the prediction or decision
    your program needs to make.


    # Data collection


    There are many forms of data collection. Collect relevant data that serves as
    the foundation for training and testing your model. Data is the key factor to
    any machine learning model. Data can come in many multiple sources. Here are a
    few ways you can gather data:


    +   - **CSV**: A CSV file is a comma-separated values file that allows data to
    be saved in a tabular format.

    - **Web page data extraction (web scraping)**: This technique is used to extract
    information from websites and web pages. It involves programmatically retrieving
    data from websites. In Python, you can use the Beautiful Soup library for web
    scraping .

    - **Application programming interface (API)**: An API is a set of rules and protocols
    that allows different software applications to communicate with each other. In
    the context of data collection for ML modeling, an API provides a structured and
    controlled way to access and retrieve data from a remote server or service. APIs
    are a more reliable and efficient method of data collection compared to web scraping,
    especially when the data is provided by the service owner in a structured format.

    - **Database**: A database is a structured collection of data that is organized
    in a way that allows for efficient storage, retrieval, and manipulation of information.
    Databases are commonly used for data collection in ML modeling because they provide
    a reliable and organized method of storing data.


    # Phase 2 – data preprocessing and model development


    Once we’ve defined an objective and gathered our data, we can start the data preprocessing
    phase. This is the stage where raw data is cleaned and transformed to be fit for
    modeling. It encompasses EDA to understand data patterns and feature engineering
    to enhance or create informative input'
