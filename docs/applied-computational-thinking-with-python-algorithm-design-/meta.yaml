  md: "# Types of ML algorithms\n\nML can be categorized into four types based on\
    \ the learning stylethe:\n\n+   - Supervised learning\n- Unsupervised learning\n\
    - Semi-supervised learning\n- Reinforcement learning\n\nML empowers computers\
    \ to learn from data, improve from experience, and predict outcomes with increasing\
    \ accuracy. These are the four primary and distinct categories of ML, each with\
    \ its unique characteristics and applications. These categories are based on how\
    \ algorithms are trained to make predictions or decisions.\n\nIMPORTANT NOTE\n\
    \n> There are four categories of ML algorithms, but in this book, we are only\
    \ going to introduce supervised and unsupervised learning. While this is not an\
    \ ML book, Python's applications in the ML arena continue to grow, so it is relevant\
    \ to our goal of understanding the applications of the programming language and\
    \ how we use computational thinking to solve problems.\n\n# Supervised learning\n\
    \nSupervised learning is a type of ML where the algorithm is trained on a labeled\
    \ dataset. In this context, “labeled” means that each example in the training\
    \ set is paired with the correct output. The supervised learning algorithm analyzes\
    \ the training data and produces an inferred function, which can be used for mapping\
    \ new examples.\n\nHere are the key aspects of supervised learning:\n\n+   - **Learning\
    \ from labeled data**: It involves using a set of known, labeled examples to train\
    \ the model. For instance, in a dataset of email messages, each email will be\
    \ labeled as “spam” or “not spam,” and the model learns to classify emails into\
    \ these categories.\n- **Predictive modeling**: After training, the model aims\
    \ to predict the correct labels for new, unseen data. For example, it could predict\
    \ whether new emails are spam.\n- **Types of tasks**: There are two main types\
    \ of tasks in supervised learning:\n    - **Regression**: The left plot shown\
    \ in *Figure 15.4*, which is a scatter plot with a line, indicates the trend or\
    \ relationship between variables. It’s used when the output variable is a real\
    \ or continuous value, such as house prices or temperatures, aiming to predict\
    \ a quantity.\n    - **Classification**: The right plot shown in *Figure 15.4*,\
    \ which shows two distinct groups of data points separated by a dashed line, represents\
    \ the decision boundary for categorization. It applies when the output variable\
    \ is a category, such as “pass” or “fail” or “spam” or “not spam,” and the goal\
    \ is to predict a category:"
  merge: -1
  pgno: 264
- img_proc: true
  md: "![](img/b193dd901f0befc8cf3c9fa5265db3da_265_0.png)\n\nFigure 15.4 – Plots\
    \ of regression and classification\n\n+   - **Feedback system**: The learning\
    \ process is “supervised” because the algorithm gets feedback on its predictions.\
    \ In the training phase, the model makes predictions on the training data and\
    \ is corrected by the teacher (the known labels) when its predictions are wrong.\n\
    - **Use cases**: It is used in numerous real-world applications, including image\
    \ and speech recognition, medical diagnosis, spam filtering, and market prediction.\n\
    \nIn supervised learning, the performance of the model is evaluated based on its\
    \ ability to accurately predict the labels of new, unseen data that was not part\
    \ of the training set. The better it can generalize from the training data to\
    \ new data, the better the supervised learning model is considered to be. Now,\
    \ let’s move on to unsupervised learning.\n\n# Unsupervised learning\n\nUnsupervised\
    \ learning is a type of ML that deals with unlabeled data. The goal is to discover\
    \ hidden patterns and relationships within the dataset without any pre-existing\
    \ labels or supervision. The algorithms must make sense of the data by identifying\
    \ its structure and extracting features without any explicit instruction on what\
    \ to look for.\n\nHere are some key points about unsupervised learning:\n\n+ \
    \  - **Handling unlabeled data**: Unsupervised learning algorithms are designed\
    \ to work with datasets that do not have labeled outcomes or responses. The primary\
    \ goal is to explore the structure of the data to extract meaningful information\
    \ without the guidance of a specific target variable.\n- **Pattern discovery and\
    \ feature extraction**: These algorithms focus on identifying patterns, correlations,\
    \ and features within the data. This can include uncovering natural groupings\
    \ (clustering), finding lower-dimensional representations (dimensionality reduction),\
    \ or identifying associations and relationships among variables.\n- **Types of\
    \ tasks in unsupervised learning**:\n    - **Clustering**: This is one of the\
    \ most common unsupervised learning tasks. Clustering involves grouping a set\
    \ of objects in such a way that objects in the same group (a cluster) are more\
    \ similar to each other than to those in other groups. Examples of clustering\
    \ algorithms include K-means, hierarchical clustering, and DBSCAN."
  merge: -1
  pgno: 265
- img_proc: true
  md: '+   - **Dimensionality reduction**: Dimensionality reduction techniques reduce
    the number of random variables to consider and can be divided into feature selection
    and feature extraction methods. Techniques such as Principal Component Analysis
    (PCA), t-Distributed Stochastic Neighbor Embedding (t-SNE), and Autoencoders are
    used for this purpose. These methods help visualize high-dimensional data, reduce
    noise reduction, and improve the efficiency of other learning tasks.

    - **Anomaly detection**: In anomaly detection, the task is to identify rare items,
    events, or observations that raise suspicions by differing significantly from
    the majority of the data. This is commonly used in fraud detection, network security,
    fault detection, and system health monitoring.

    - **Association rule learning**: This task aims to discover interesting relationships
    between variables in large databases. A common example is market basket analysis,
    where the goal is to find relationships between the purchasing behavior of customers.


    # Introduction to DL


    DL is a subset of ML, a field of AI that focuses on teaching machines to learn
    from data and make decisions. DL particularly excels at learning from large volumes
    of data and has been the driving force behind many recent advancements in AI.
    Here are the key aspects of DL:


    +   - **Inspired by the human brain**: DL models, particularly neural networks,
    are inspired by the structure and function of the human brain. They mimic the
    way biological neurons process information, although in a much-simplified form.

    - **Neural networks**: The fundamental building blocks of DL are ANNs. These networks
    consist of layers of interconnected nodes or “neurons,” each of which performs
    simple computations. The complexity of DL comes from the depth of these layers,
    hence the term “deep” in DL.

    - **Learning from data**: In DL, models learn directly from raw data. This ability
    is a significant departure from traditional ML algorithms, which often require
    manual feature extraction. DL algorithms automatically extract and learn features
    from raw data, making them particularly suited for tasks such as image and speech
    recognition.

    - **Handling complex patterns**: DL is especially powerful in identifying and
    handling complex, high-level patterns in data. This capability has led to breakthroughs
    in fields such as computer vision, natural language processing, and audio recognition.

    - **Large datasets and computational power**: DL typically requires large amounts
    of data and significant computational power. The advent of big data and advances
    in computing hardware, particularly **graphics processing units (GPUs)**, has
    been crucial in the advancement of DL.

    - **Applications**: DL is used in various applications, including self-driving
    cars, virtual assistants (such as Siri and Alexa), facial recognition systems,
    language translation services, and medical diagnosis.

    - **Frameworks and libraries**: There are several frameworks and libraries available
    for DL, such as TensorFlow, Keras, PyTorch, and others, which facilitate the development
    of DL models.


    DL has transformed the landscape of AI, making it possible to solve complex problems
    that were once considered beyond the reach of machines. Now, let’s dive into the
    architecture of the neural network model, which forms the next exciting topic
    in our exploration.


    # The architecture of an ANN'
