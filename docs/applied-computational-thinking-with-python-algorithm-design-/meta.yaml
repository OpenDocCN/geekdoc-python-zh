  - '[PAGE 255]


    # Using the Scikit-Learn library


    Scikit-Learn is probably the most important library for machine learning available
    in Python. We will explore this library in samples in the following chapters as
    we explore some of the problems that would be suitable for machine learning, so
    we won’t dive too deep into the functionalities here. That said, here are some
    of the functionalities that Scikit-Learn gives us:


    +   - **Clustering** helps with grouping data that is unlabeled.

    - **Regression** measures the relationship between the variable (the mean of the
    variable) and the values of the other variables.

    - **Classification** has multiple classifiers within Scikit-Learn, similar to
    regression. Some of these classifiers are **linear discrimination analysis**,
    **bagging classifier**, and **K-nearest neighbors classifiers**.

    - **Model selection** has tools for creating training and testing models in machine
    learning.

    - **Preprocessing** contains tools to standardize the dataset (more details on
    data preprocessing can be found in *Chapter 16, Using Computational Thinking and
    Python in Statistical Analysis*.


    The Scikit-Learn library is something we will become fairly familiar with in the
    upcoming examples in *Chapter 16, Using Computational Thinking and Python in Statistical
    Analysis*, *Chapter 17, Applied Computational Thinking Problems*, and *Chapter
    18, Advanced Applied Computational Thinking Problems*, so we’ll leave some of
    that discussion for those chapters.


    The libraries and packages that we have available in Python allow us to perform
    detailed analysis for our dataset and create a wide array of useful plots that
    aid in data analysis.


    # Summary


    In this chapter, we covered the definitions of experimental data and validity,
    reliability, and generalizability in the context of experiments. We also discussed
    how to install and use the `pandas`, `numpy`, and `matplotlib` libraries so that
    we could use them to organize and display data. Some of the skills you learned
    included defining an experiment, data gathering, and how computational thinking
    helps us define the problems and design what we’d use to display our results.


    In addition, we learned about data analysis and data science and its growth and
    importance in our current world. We were able to use the libraries to produce
    a plot that represented a subset of a data file using a Matplotlib bar chart.


    In the next chapter, we’ll learn more about data and other applications of data
    science and data analysis.'
