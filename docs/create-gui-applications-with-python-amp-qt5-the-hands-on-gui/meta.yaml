- md: "| Property | Type (Default) | Description |\n| :--- | :--- | :--- |\n| `min-width`\
    \ | Length | The widget's or a subcontrol's minimum width. |\n\nIf you provide\
    \ a `min-height` property larger than the widget *usually* is, then the widget\
    \ will be enlarged.\n\n```\nQLineEdit {\n    min-height: 50;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_242_0.png)\n\
    \nFigure 117. Setting a min-height on a QLineEdit, to enlarge it.\n\nHowever,\
    \ when setting `min-height` the widget can of course be larger than this. To specify\
    \ an exact size for a widget, you can specify both a `min-` and `max-` value for\
    \ the dimension.\n\n```\nQLineEdit {\n    min-height: 50;\n    max-height: 50;\n\
    }\n```\n\nThis will lock the widget to this height, preventing it from resizing\
    \ in response to changes in content.\n\n> Be careful about using this, as you\
    \ can render widgets unreadable!\n\n## Widget specific styles\n\nThe styles we've\
    \ looked at so far are generic and can be used with most widgets. However, there\
    \ are also a number of widget-specific properties which can be set.\n\n| Property\
    \ | Type (Default) | Description |\n| :--- | :--- | :--- |\n| `alternate-background-color`\
    \ | Brush (`QPalette::AlternateBase`) | The alternate background color used in\
    \ `QAbstractItemView` subclasses. |\n| `background-attachment` | Attachment (`scroll`)\
    \ | Determines whether the background-image in a `QAbstractScrollArea` is scrolled\
    \ or fixed with respect to the viewport. |\n| `button-layout` | Number (`SH_DialogButtonLayout`)\
    \ | The layout of buttons in a `QDialogButtonBox` or a `QMessageBox`. The possible\
    \ values are 0 (Win), 1 (Mac), 2 (KDE), 3 (Gnome) and 5 (Android). |\n| `dialogbuttonbox-buttons-have-icons`\
    \ | Boolean | Whether the buttons in a `QDialogButtonBox` show icons. If this\
    \ property is set to 1, the buttons of a `QDialogButtonBox` show icons; if it\
    \ is set to 0, the icons are not shown. |\n| `gridline-color` | Color (`SH_Table_GridLineColor`)\
    \ | The color of the grid line in a `QTableView`. |\n| `icon` | Url+ | The widget\
    \ icon. The only widget currently supporting this property is QPushButton. |\n\
    | `icon-size` | Length | The width and height of the icon in a widget. |\n| `lineedit-password-character`\
    \ | Number (SH_LineEdit_PasswordCharacter) | The QLineEdit password character\
    \ as a Unicode number. |\n| `lineedit-password-mask-delay` | Number (SH_LineEdit_PasswordMaskDelay)\
    \ | The QLineEdit password mask delay in milliseconds before lineedit-password-character\
    \ is applied. |\n| `messagebox-text-interaction-flags` | Number (SH_MessageBox_TextInteractionFlags)\
    \ | The interaction behavior for text in a message box (from Qt.TextInteractionFlags).\
    \ |\n| `opacity` | Number (SH_ToolTipLabel_Opacity) | The opacity for a widget\
    \ (tooltips only) 0-255. |\n| `paint-alternating-row-colors-for-empty-area` |\
    \ bool | Whether a QTreeView paints alternating rows past the end of the data.\
    \ |\n| `show-decoration-selected` | Boolean (SH_ItemView_ShowDecorationSelected)\
    \ | Controls whether selections in a QListView cover the entire row or just the\
    \ extent of the text. |\n| `titlebar-show-tooltips-on-buttons` | bool | Whether\
    \ tool tips are shown on window title bar buttons. |\n| `widget-animation-duration`\
    \ | Number | How long an animation should last (milliseconds). |\n\nThese only\
    \ apply to the widgets specified in the description (or their subclasses).\n\n\
    ## Targeting\n\nWe've seen a range of different QSS properties and applied them\
    \ to widgets based on their type. But how can you target individual widgets and\
    \ how does Qt decide which rules to apply to which widgets and when? Next, we'll\
    \ look at other options for targeting QSS rules and the effect of inheritance.\n\
    \n| Type | Example | Description |\n| :--- | :--- | :--- |\n| Universal | `*`\
    \ | Matches all widgets. |\n| Type | `QPushButton` | Instances of QPushButton\
    \ or its subclasses. |\n| Property | `QPushButton[flat=\"false\"]` | Instances\
    \ of QPushButton that are not flat. Can compare with *any* property that supports\
    \ `.toString()`. Can also use `class=\"classname\"` |\n| Property contains | `QPushButton[property~=\"\
    something\"]` | Instances of QPushButton where property (a list of QString) does\
    \ not contain the given value. |\n| Class | `.QPushButton` | Instances of QPushButton\
    \ but not subclasses. |\n| ID | `QPushButton#okButton` | A QPushButton instance\
    \ whose object name is okButton. |\n| Descendant | `QDialog QPushButton` | Instances\
    \ of QPushButton that are descendants (children, grandchildren, etc.) of a QDialog.\
    \ |\n| Child | `QDialog > QPushButton` | Instances of QPushButton that are *immediate*\
    \ children of a QDialog. |\n\nWe'll look at each of these targeting rules in turn\
    \ now, trying them out with our QSS tester.\n\n### Type\n\nWe've already seen\
    \ *type targeting* in action in our QSS tester. Here we targeted rules against\
    \ the type name of the individual widgets, for example `QComboBox` or `QLineEdit`.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_247_0.png)\n\n*Figure 118. Targeting\
    \ a QComboBox does not affect other unrelated types.*\n\nHowever, targeting types\
    \ in this way *also* targets any subclasses of that type. So for example, we can\
    \ target `QAbstractButton` to target any types that derive from it.\n\n```\nQAbstractButton\
    \ {\n    background: orange;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_248_0.png)\n\
    \nFigure 119. Targeting a QAbstractButton affects all child classes\n\nThis behavior\
    \ means that *all* widgets can be targeted using `QWidget`. For example, the following\
    \ will set the background of all widgets to *red*.\n\n```\nQWidget {\n    background:\
    \ red;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_249_0.png)\n\nFigure\
    \ 120. QSS selection via parent classes.\n\n### Class .\n\nSometimes however you\
    \ *want* to only target a specific class of widget, and not any subclasses. To\
    \ do this you can use *class targeting*—by prepending a . to the name of the type.\n\
    \nThe following targets instances of `QWidget` but *not* any classes derived from\
    \ `QWidget`. In our QSS tester the only `QWidget` we have is the central widget\
    \ used for holding the layout. So the following will change the background of\
    \ *that* container widget orange.\n\n```\ncss\n.QWidget {\n    background: orange;\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_250_0.png)\n\nFigure 121. Targeting\
    \ a class specifically will not target subclasses\n\n### ID targeting #\n\nAll\
    \ Qt widgets have an *object name* which uniquely identifies them. When creating\
    \ widgets in Qt Designer you use the object name to specify the name that the\
    \ object is available under on the parent window. However, this relationship is\
    \ just for convenience— you can set any *object name* you want for a widget in\
    \ your own code. These names can then be used to target QSS rules directly to\
    \ specific widgets.\n\nIn our QSS tester app we've set IDs on our `QComboBox`\
    \ and `QLineEdit` for testing.\n\n```\npython\ncombo.setObjectName('thecombo')\n\
    le.setObjectName('mylineedit')\n```\n\n### Property [property=\"<value>\"]\n\n\
    You can target widgets by any widget property which is available as a string (or\
    \ who's value has a `.toString()` method). This can be used to define some quite\
    \ complex states on widgets.\n\nThe following is a simple example targeting a\
    \ `QPushButton` by the text label.\n\n```\nQPushButton[text=\"Push me!\"] {\n\
    \    background: red;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_251_0.png)\n\
    \nFigure 122. Targeting a QPushButton by the label text\n\n> Targeting widgets\
    \ by their visible text is a *very bad idea* in general as it will introduce bugs\
    \ as you try and translate your application or change labels.\n\nRules are applied\
    \ to widgets when the stylesheet is first set and will not respond to changes\
    \ in properties. If a property targeted by a QSS rule is modified, you must trigger\
