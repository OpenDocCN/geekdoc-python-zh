    \ the *column* to pull data from.\n\nFor our test database *tracks* table, the\
    \ following will pull data from the related tables for album ID, media_type ID\
    \ and genre ID (columns 3, 4, 5 respectively).\n\nListing 105. databases/tableview_relationalmodel.py\n\
    \n```\nself.model.setTable(\"Track\")\nself.model.setRelation(2, QSqlRelation(\"\
    Album\", \"AlbumId\",\n    \"Title\"))\nself.model.setRelation(3, QSqlRelation(\"\
    MediaType\",\n    \"MediaTypeId\", \"Name\"))\nself.model.setRelation(4, QSqlRelation(\"\
    Genre\", \"GenreId\",\n    \"Name\"))\nself.model.select()\n```\n\nWhen run you\
    \ will see the three _id columns have been replaced by the data pulled through\
    \ from the related tables. The columns take the names of the related fields, if\
    \ they don't clash, or have a name constructed for them."
