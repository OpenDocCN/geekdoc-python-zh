    \nThis is the approach used in our custom widgets library, where we support for\
    \ PyQt5 and PySide2 with a single library import. The only caveat is that you\
    \ must ensure PyQt5 is imported before (as in on the line above or earlier) when\
    \ importing this library, to ensure it is in `sys.modules`.\n\n> \U0001F4A1 An\
    \ alternative would be to use an environment variable to switch between them —\
    \ see QtPy later.\n\nIf you're doing this in multiple files it can get a bit cumbersome.\
    \ A nice solution to this is to move the import logic to its own file, e.g. named\
    \ `qt.py` in your project root. This module imports the Qt modules (`QtCore`,\
    \ `QtGui`, `QtWidgets`, etc.) from one of the two libraries, and then you import\
    \ into your application from there.\n\nThe contents of the `qt.py` are the same\
    \ as we used earlier —"
  merge: -1
  pgno: 720
- img_proc: true
  md: "```\npython\nimport sys\n\nif 'PyQt5' in sys.modules:\n    # PyQt5\n    from\
    \ PyQt5 import QtGui, QtWidgets, QtCore\n    from PyQt5.QtCore import pyqtSignal\
    \ as Signal, pyqtSlot as Slot\n\nelse:\n    # PySide2\n    from PySide2 import\
    \ QtGui, QtWidgets, QtCore\n    from PySide2.QtCore import Signal, Slot\n```\n\
    \nYou must remember to add any other PyQt5 modules you use (browser, multimedia,\
    \ etc.) in both branches of the if block. You can then import **Qt5** into your\
    \ own application as follows —\n\n```\npython\nfrom .qt import QtGui, QtWidgets,\
    \ QtCore\n```\n\n...and it will work seamlessly across either library.\n\n# #\
    \ QtPy\n\nIf you need to target more than just Qt5 support (e.g. including PyQt4\
    \ and PySide v1) take a look at [QtPy](https://github.com/spyder-ide/qtpy). This\
    \ provides a standardized PySide2-like API for PyQt4, PySide, PyQt5 and PySide2.\
    \ Using QtPy you can control which API to load from your application using the\
    \ `QT_API` environment variable e.g.\n\n```\npython\nimport os\nos.environ['QT_API']\
    \ = 'pyside2'\nfrom qtpy import QtGui, QtWidgets, QtCore  # imports PySide2.\n\
    ```\n\n# # That's really it\n\nThere's not much more to say — the two libraries\
    \ really are that similar. However, if you do stumble across any other PyQt5/PySide2\
    \ examples or features"
  merge: -1
