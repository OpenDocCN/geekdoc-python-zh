- md: "## Tabbed Browsing\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_668_0.png)\n\
    \nFigure 266. Mozzarella Ashbadger (Tabbed).\n\n## Source code\n\nThe full source\
    \ for the tabbed browser is included in the downloads for this book. The browser\
    \ code has the name `browser_tabs.py`.\n\n> \U0001F680 **Run it!** Explore the\
    \ Mozzarella Ashbadger *Tabbed Edition* before moving onto the code.\n\n## Creating\
    \ a QTabWidget\n\nAdding a tabbed interface to our browser is simple using a `QTabWidget`.\
    \ This provides a simple container for multiple widgets (in our case `QWebEngineView`\
    \ widgets) with a built-in tabbed interface for switching between them.\n\nTwo\
    \ customizations we use here are `.setDocumentMode(True)` which provides a Safari-like\
    \ interface on macOS, and `.setTabsClosable(True)` which allows the user to close\
    \ the tabs in the application.\n\nWe also connect `QTabWidget` signals `tabBarDoubleClicked`,\
    \ `currentChanged` and `tabCloseRequested` to custom slot methods to handle these\
    \ behaviors.\n\nListing 229. app/browser_tabs.py\n\n```\nself.tabs = QTabWidget()\n\
    self.tabs.setDocumentMode(True)\nself.tabs.tabBarDoubleClicked.connect(self\n\
    .tab_open_doubleclick)\nself.tabs.currentChanged.connect(self.current_tab_changed)\n\
    self.tabs.setTabsClosable(True)\nself.tabs.tabCloseRequested.connect(self.close_current_tab)\n\
    \nself.setCentralWidget(self.tabs)\n```\n\nThe three slot methods accept an i\
    \ (index) parameter which indicates which tab the signal resulted from (in order).\n\
    \nWe use a double-click on an empty space in the tab bar (represented by an index\
    \ of -1 to trigger creation of a new tab. For removing a tab, we use the index\
    \ directly to remove the widget (and so the tab), with a simple check to ensure\
    \ there are at least 2 tabs — closing the last tab would leave you unable to open\
    \ a new one.\n\nThe current_tab_changed handler uses a self.tabs.currentWidget()\
    \ construct to access the widget (QWebEngineView browser) of the currently active\
    \ tab, and then uses this to get the URL of the current page. This same construct\
    \ is used throughout the source for the tabbed browser, as a simple way to interact\
    \ with the current browser view.\n\nListing 230. app/browser_tabs.py\n\n```\n\
    def tab_open_doubleclick(self, i):\n    if i == -1:  # No tab under the click\n\
    \        self.add_new_tab()\n\ndef current_tab_changed(self, i):\n    qurl = self.tabs.currentWidget().url()\n\
    \    self.update_urlbar(qurl, self.tabs.currentWidget())\n    self.update_title(self.tabs.currentWidget())\n\
    \ndef close_current_tab(self, i):\n    if self.tabs.count() < 2:\n        return\n\
    \n    self.tabs.removeTab(i)\n```\n\nListing 231. app/browser_tabs.py\n\n```\n\
    def add_new_tab(self, qurl=None, label=\"Blank\"):\n\n    if qurl is None:\n \
    \       qurl = QUrl(\"\")\n\n    browser = QWebEngineView()\n    browser.setUrl(qurl)\n\
    \    i = self.tabs.addTab(browser, label)\n\n    self.tabs.setCurrentIndex(i)\n\
    ```\n\n## Signal & Slot changes\n\nWhile the setup of the QTabWidget and associated\
    \ signals is simple, things get a little trickier in the browser slot methods.\n\
    \nWhereas before we had a single QWebEngineView now there are multiple views,\
    \ all with their own signals. If signals for hidden tabs are handled things will\
    \ get all mixed up. For example, the slot handling a loadCompleted signal must\
    \ check that the source view is in a visible tab.\n\nWe can do this using our\
    \ trick for sending additional data with signals. In the tabbed browser we're\
    \ using the `lambda` style syntax to do this.\n\nBelow is an example of doing\
    \ this when creating a new `QWebEngineView` in the `add_new_tab` function.\n\n\
    Listing 232. app/browser_tabs.py\n\n```\n# More difficult! We only want to update\
    \ the url when it's from the\n# correct tab\nbrowser.urlChanged.connect(\n   \
    \ lambda qurl, browser=browser: self.update_urlbar(qurl, browser)\n)\n\nbrowser.loadFinished.connect(\n\
    \    lambda _, i=i, browser=browser: self.tabs.setTabText(\n        i, browser.page().title()\n\
    \    )\n)\n```\n\nAs you can see, we set a `lambda` as the slot for the `urlChanged`\
    \ signal, accepting the `qurl` parameter that is sent by this signal. We add the\
    \ recently created `browser` object to pass into the `update_urlbar` function.\n\
    \nThe result is, whenever this `urlChanged` signal fires `update_urlbar` will\
    \ receive both the new URL and the browser it came from. In the slot method we\
    \ can then check to ensure that the source of the signal matches the currently\
    \ visible browser—if not, we simply discard the signal.\n\nListing 233. app/browser_tabs.py\n\
    \n```\ndef update_urlbar(self, q, browser=None):\n\n    if browser != self.tabs.currentWidget():\n\
    \        # If this signal is not from the current tab, ignore\n        return\n\
    \n    if q.scheme() == \"https\":\n        # Secure padlock icon\n        self.httpsicon.setPixmap(QPixmap(os.path.join(\"\
    icons\",\n\"lock-ssl.png\")))\n\n    else:\n        # Insecure padlock icon\n\
    \        self.httpsicon.setPixmap(QPixmap(os.path.join(\"icons\",\n\"lock-nossl.png\"\
    )))\n\n    self.urlbar.setText(q.toString())\n    self.urlbar.setCursorPosition(0)\n\
    ```\n\n## Going further\n\nExplore the rest of the source code for the tabbed\
    \ version of the browser paying particular attention to the user of `self.tabs.currentWidget()`\
    \ and passing additional data with signals. This a good practical use case for\
    \ what you've learnt, so experiment and see if you can break/improve it in interesting\
    \ ways.\n\n## Challenges\n\nYou might like to try adding some additional features\
    \ —\n\n- Bookmarks (or Favorites) — you could store these in a simple text file,\
    \ and show them in a menu.\n- Favicons -- those little website icons, would look\
    \ great on the tabs.\n- View source code -- add a menu option to see the source\
    \ code for the page.\n- Open in New Tab — add a right-click context menu, or keyboard\
    \ shortcut, to open a link in a new tab.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_673_0.png)\n\
    \n## 39. Moonsweeper\n\nExplore the mysterious moon of Q’tee without getting too\
    \ close to the alien natives!\n\nMoonsweeper is a single-player puzzle video game.\
    \ The objective of the game is to explore the area around your landed space rocket,\
    \ without coming too close to the deadly B’ug aliens. Your trusty tricounter will\
    \ tell you the number of B’ugs in the vicinity.\n\n> **Suggested reading**\n\n\
    This application makes use of features covered in [Signals & Slots](Signals &\
    \ Slots), and [Events](Events).\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_674_0.png)\n\
    \n*Figure 267. Moonsweeper.*\n\nThis a simple single-player exploration game modelled\
    \ on *Minesweeper* where you must reveal all the tiles without hitting hidden\
    \ mines. This implementation uses custom `QWidget` objects for the tiles, which\
    \ individually hold their state as mines, status and the adjacent count of mines.\
    \ In this version, the mines are replaced with alien bugs (B’ug) but they could\
    \ just as easily be anything else.\n\nIn many **Minesweeper** variants the initial\
    \ turn is considered a free go – if you hit a mine on the first click, it is moved\
    \ somewhere else. Here we cheat a little bit by taking the first go for the player,\
    \ ensuring that it is on a non-mine spot. This allows us not to worry about the\
    \ bad first move which would require us to recalculate the adjacencies. We can\
    \ explain this away as the \"initial exploration around the rocket\" and make\
    \ it sound completely sensible.\n\n> *Challenge!*\n\nIf you want to implement\
    \ this, you can catch the first click on a position and at that point generate\
    \ mines/adjacencies, excluding your location, before handling the click. You will\
    \ need to give your custom widgets access to the parent window object.\n\n## Source\
    \ code\n\nThe full source for the *Moonsweeper* game is included in the downloads\
    \ for this book. The game file is saved with the name `minesweeper.py`.\n\n```\n\
    python3 minesweeper.py\n```\n\n## Playing Field\n\nThe playing area for Moonsweeper\
    \ is a NxN grid, containing a set number of mines. The dimensions and mine counts\
    \ we'll used are taken from the default values for the Windows version of Minesweeper.\
    \ The values used are shown in the table below:\n\n*Table 14. Table Dimensions\
    \ and mine counts*\n\n| Level | Dimensions | Number of Mines |\n| :--- | :---\
    \ | :--- |\n| Easy | 8 x 8 | 10 |\n| Medium | 16 x 16 | 40 |"
  mdcn: "## 标签页浏览\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_668_0.png)\n\n图 266.\
    \ Mozzarella Ashbadger（标签页版）。\n\n## 源代码\n\n标签页浏览器的完整源代码包含在本书的下载文件中。浏览器代码的文件名为\
    \ `browser_tabs.py`。\n\n> \U0001F680 **运行它！** 在查看代码之前，先探索一下 Mozzarella Ashbadger\
    \ *标签页版*。\n\n## 创建 QTabWidget\n\n使用 `QTabWidget` 为我们的浏览器添加标签页界面非常简单。它提供了一个简单的容器来容纳多个小部件（在我们的例子中是\
    \ `QWebEngineView` 小部件），并内置了用于在它们之间切换的标签页界面。\n\n我们在这里使用了两个自定义设置：`.setDocumentMode(True)`\
    \ 提供了类似 macOS 上 Safari 的界面，以及 `.setTabsClosable(True)` 允许用户关闭应用程序中的标签页。\n\n我们还将\
    \ `QTabWidget` 的信号 `tabBarDoubleClicked`、`currentChanged` 和 `tabCloseRequested`\
    \ 连接到自定义的槽方法来处理这些行为。\n\n代码清单 229. app/browser_tabs.py\n\n```\nself.tabs = QTabWidget()\n\
    self.tabs.setDocumentMode(True)\nself.tabs.tabBarDoubleClicked.connect(self\n\
    .tab_open_doubleclick)\nself.tabs.currentChanged.connect(self.current_tab_changed)\n\
    self.tabs.setTabsClosable(True)\nself.tabs.tabCloseRequested.connect(self.close_current_tab)\n\
    \nself.setCentralWidget(self.tabs)\n```\n\n这三个槽方法都接受一个 `i`（索引）参数，该参数指示信号源自哪个标签页（按顺序）。\n\
    \n我们使用双击标签栏中的空白区域（由索引 -1 表示）来触发创建新标签页。对于移除标签页，我们直接使用索引来移除小部件（从而移除标签页），并进行一个简单的检查以确保至少有\
    \ 2 个标签页——关闭最后一个标签页将导致你无法打开新的标签页。\n\n`current_tab_changed` 处理程序使用 `self.tabs.currentWidget()`\
    \ 构造来访问当前活动标签页的小部件（`QWebEngineView` 浏览器），然后使用它来获取当前页面的 URL。这个相同的构造在整个标签页浏览器源代码中都被使用，作为与当前浏览器视图交互的一种简单方式。\n\
    \n代码清单 230. app/browser_tabs.py\n\n```\ndef tab_open_doubleclick(self, i):\n \
    \   if i == -1:  # 点击位置下方没有标签页\n        self.add_new_tab()\n\ndef current_tab_changed(self,\
    \ i):\n    qurl = self.tabs.currentWidget().url()\n    self.update_urlbar(qurl,\
    \ self.tabs.currentWidget())\n    self.update_title(self.tabs.currentWidget())\n\
    \ndef close_current_tab(self, i):\n    if self.tabs.count() < 2:\n        return\n\
    \n    self.tabs.removeTab(i)\n```\n\n代码清单 231. app/browser_tabs.py\n\n```\ndef\
    \ add_new_tab(self, qurl=None, label=\"Blank\"):\n\n    if qurl is None:\n   \
    \     qurl = QUrl(\"\")\n\n    browser = QWebEngineView()\n    browser.setUrl(qurl)\n\
    \    i = self.tabs.addTab(browser, label)\n\n    self.tabs.setCurrentIndex(i)\n\
    ```\n\n## 信号与槽的变化\n\n虽然 `QTabWidget` 及其相关信号的设置很简单，但在浏览器槽方法中，情况变得有些棘手。\n\n之前我们只有一个\
    \ `QWebEngineView`，现在有多个视图，每个视图都有自己的信号。如果处理隐藏标签页的信号，事情就会变得混乱。例如，处理 `loadCompleted`\
    \ 信号的槽必须检查源视图是否在可见的标签页中。\n\n我们可以使用我们之前介绍的技巧，通过信号发送额外数据来实现这一点。在标签页浏览器中，我们使用 `lambda`\
    \ 风格语法来实现这一点。\n\n下面是在 `add_new_tab` 函数中创建新的 `QWebEngineView` 时执行此操作的示例。\n\n代码清单\
    \ 232. app/browser_tabs.py\n\n```\n# 更困难！我们只想在来自正确标签页时更新 URL\nbrowser.urlChanged.connect(\n\
    \    lambda qurl, browser=browser: self.update_urlbar(qurl, browser)\n)\n\nbrowser.loadFinished.connect(\n\
    \    lambda _, i=i, browser=browser: self.tabs.setTabText(\n        i, browser.page().title()\n\
    \    )\n)\n```\n\n如你所见，我们将一个 `lambda` 设置为 `urlChanged` 信号的槽，接受该信号发送的 `qurl` 参数。我们添加了最近创建的\
    \ `browser` 对象以传递给 `update_urlbar` 函数。\n\n结果是，每当这个 `urlChanged` 信号触发时，`update_urlbar`\
    \ 都会接收到新的 URL 和它来自的浏览器。在槽方法中，我们可以检查以确保信号的来源与当前可见的浏览器匹配——如果不匹配，我们只需丢弃该信号。\n\n代码清单\
    \ 233. app/browser_tabs.py\n\n```\ndef update_urlbar(self, q, browser=None):\n\
    \n    if browser != self.tabs.currentWidget():\n        # 如果此信号不是来自当前标签页，则忽略\n\
    \        return\n\n    if q.scheme() == \"https\":\n        # 安全挂锁图标\n       \
    \ self.httpsicon.setPixmap(QPixmap(os.path.join(\"icons\",\n\"lock-ssl.png\")))\n\
    \n    else:\n        # 不安全挂锁图标\n        self.httpsicon.setPixmap(QPixmap(os.path.join(\"\
    icons\",\n\"lock-nossl.png\")))\n\n    self.urlbar.setText(q.toString())\n   \
    \ self.urlbar.setCursorPosition(0)\n```\n\n## 进一步探索\n\n探索标签页版浏览器的其余源代码，特别注意 `self.tabs.currentWidget()`\
    \ 的使用以及通过信号传递额外数据。这是你所学知识的一个很好的实际用例，所以可以尝试实验，看看是否能以有趣的方式破坏/改进它。\n\n## 挑战\n\n你可能想尝试添加一些额外功能\
    \ —\n\n- 书签（或收藏夹）——你可以将它们存储在一个简单的文本文件中，并在菜单中显示它们。\n- 网站图标（Favicons）——那些小网站图标，在标签页上会很好看。\n\
    - 查看源代码 —— 添加一个菜单选项来查看页面的源代码。\n- 在新标签页中打开 —— 添加一个右键上下文菜单或键盘快捷键，以便在新标签页中打开链接。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_673_0.png)\n\n## 39. 月球扫雷\n\n探索 Q'tee\
    \ 神秘的卫星，但不要离外星居民太近！\n\n月球扫雷是一款单人益智视频游戏。游戏的目标是探索你着陆的太空火箭周围的区域，同时不要离致命的 B'ug 外星人太近。你可靠的三重计数器会告诉你附近\
    \ B'ug 的数量。\n\n> **推荐阅读**\n\n本应用程序使用了 [信号与槽](Signals & Slots) 和 [事件](Events) 中介绍的功能。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_674_0.png)\n\n*图 267. 月球扫雷。*\n\n这是一个简单的单人探索游戏，以\
    \ *扫雷* 为模型，你必须在不碰到隐藏地雷的情况下揭开所有方块。此实现使用自定义的 `QWidget` 对象作为方块，每个方块单独保存其作为地雷、状态和相邻地雷数量的状态。在这个版本中，地雷被外星虫子（B'ug）取代，但它们同样可以是任何其他东西。\n\
    \n在许多 **扫雷** 变体中，第一回合被认为是免费的——如果你在第一次点击时碰到地雷，它会被移到其他地方。在这里，我们通过为玩家执行第一步来稍微作弊一下，确保它落在一个非地雷的位置。这让我们不必担心糟糕的第一步，否则需要我们重新计算相邻关系。我们可以将其解释为“火箭周围的初步探索”，并使其听起来完全合理。\n\
    \n> *挑战！*\n\n如果你想实现这一点，你可以在处理点击之前捕获对某个位置的第一次点击，并在那时生成地雷/相邻关系，排除你的位置。你需要让你的自定义小部件能够访问父窗口对象。\n\
    \n## 源代码\n\n*月球扫雷* 游戏的完整源代码包含在本书的下载文件中。游戏文件保存为 `minesweeper.py`。\n\n```\npython3\
    \ minesweeper.py\n```\n\n## 游戏区域\n\n月球扫雷的游戏区域是一个 NxN 的网格，包含固定数量的地雷。我们将使用的尺寸和地雷数量取自\
    \ Windows 版扫雷的默认值。使用的值如下表所示：\n\n*表 14. 表格尺寸和地雷数量*\n\n| 级别 | 尺寸 | 地雷数量 |\n| :---\
    \ | :--- | :--- |\n| 简单 | 8 x 8 | 10 |\n| 中等 | 16 x 16 | 40 |"
