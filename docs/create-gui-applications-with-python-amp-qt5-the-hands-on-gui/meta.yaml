    the resource file, so you will need to follow this when compiling resources yourself.
    You can check your compiled UI file (e.g. MainWindow.py) to double check the name
    of the import if you have problems.


    # When to use QResource?


    You may be wondering when (or even *whether*) you should use the QResource system.


    The main advantage of this method is that your data files are guaranteed to work
    cross-platform when distributed. The downside of course is you need to re-compile
    your resources any time you add/remove new resources. Whether this trade-off is
    worth it for your project is up to you, but if you plan to distribute your application
    to other people it almost always is.'
