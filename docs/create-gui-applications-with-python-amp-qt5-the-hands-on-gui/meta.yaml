    \ 的 Qt5 版本（PyQt5）自 2016 年中期就已可用，而 PySide2 的第一个稳定版本是在 2 年后发布的。\n\n考虑到这一点，许多 Qt5\
    \ 的 Python 示例使用 PyQt5 就不足为奇了——仅仅因为它*可用*。然而，Qt 项目最近已将 PySide 作为官方的 [Qt for Python\
    \ 发布版](https://www.qt.io/qt-for-python)，这应该能确保其未来的可行性。\n\n| | PyQt5 | PySide2\
