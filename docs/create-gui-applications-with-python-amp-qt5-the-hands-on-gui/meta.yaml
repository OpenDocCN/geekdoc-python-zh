    +   1. Use a unique UUID4 identifier for this runner.

    2. Progress 0-100% as an integer.

    3. When the job finishes, we need to cleanup (delete) the workers progress.

    4. Delete the progress for the finished worker.


    If you run this, you''ll see the global progress bar along with an indicator to
    show how many active workers there are running.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_496_0.png)


    Figure 212. The window showing the global progress state, together with the number
    of active workers.


    Checking the console output for the script you can see the actual status for each
    of the individual workers.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_496_1.png)


    Figure 213. Check the shell output to see the individual worker progress.


    Removing the worker immediately means that the progress will jump *backwards*
    when a job finishes — removing 100 from the average calculation will cause the
    average to fall. You can postpone the cleanup if you like, for example the following
    will only remove the entries when *all* progress bars reach 100.


