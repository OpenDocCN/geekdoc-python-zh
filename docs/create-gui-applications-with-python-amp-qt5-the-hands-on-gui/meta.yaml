  md: '# Tabbed Browsing


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_668_0.png)


    Figure 266. Mozzarella Ashbadger (Tabbed).


    # Source code


    The full source for the tabbed browser is included in the downloads for this book.
    The browser code has the name `browser_tabs.py`.


    > 🚀 **Run it!** Explore the Mozzarella Ashbadger *Tabbed Edition* before moving
    onto the code.


    # Creating a QTabWidget


    Adding a tabbed interface to our browser is simple using a `QTabWidget`. This
    provides a simple container for multiple widgets (in our case `QWebEngineView`
    widgets) with a built-in tabbed interface for switching between them.


    Two customizations we use here are `.setDocumentMode(True)` which provides a Safari-like
    interface on macOS, and `.setTabsClosable(True)` which allows the user to close
    the tabs in the application.


    We also connect `QTabWidget` signals `tabBarDoubleClicked`, `currentChanged` and
    `tabCloseRequested` to custom slot methods to handle these behaviors.'
  merge: -1
