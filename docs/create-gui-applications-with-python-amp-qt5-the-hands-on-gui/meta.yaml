    \n## Context menus\n\nContext menus are small context-sensitive menus which typically\
    \ appear when right clicking on a window. Qt has support for generating these\
    \ menus, and widgets have a specific event used to trigger them. In the following\
    \ example we're going to intercept the `.contextMenuEvent` a `QMainWindow`. This\
    \ event is fired whenever a context menu is *about to be* shown, and is passed\
    \ a single value `event` of type `QContextMenuEvent`.\n\nTo intercept the event,\
    \ we simply override the object method with our new method of the same name. So\
    \ in this case we can create a method on our `MainWindow` subclass with the name\
    \ `contextMenuEvent` and it will receive all events of this type.\n\nListing 66.\
    \ basic/events_3.py\n\n```\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom\
    \ PySide2.QtWidgets import QAction, QApplication, QLabel,\n    QMainWindow, QMenu\n\
    \nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n    def contextMenuEvent(self, e):\n        context = QMenu(self)\n        context.addAction(QAction(\"\
    test 1\", self))\n        context.addAction(QAction(\"test 2\", self))\n     \
    \   context.addAction(QAction(\"test 3\", self))\n        context.exec_(e.globalPos())\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\nIf you run the above code and right-click within the window, you'll see\
    \ a context menu appear. You can set up `.triggered` slots on your menu actions\
    \ as normal (and re-use actions defined for menus and toolbars).\n\n> When passing\
    \ the initial position to the `exec_` method, this must be relative to the parent\
    \ passed in while defining. In this case we pass `self` as the parent, so we can\
    \ use the global position.\n\nFor completeness, there is also a signal-based approach\
    \ to creating context menus.\n\nListing 67. basic/events_4.py\n\n```\nclass MainWindow(QMainWindow):\n\
