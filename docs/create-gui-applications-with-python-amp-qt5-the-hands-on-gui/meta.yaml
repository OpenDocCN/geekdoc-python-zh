- md: "## Position Tiles\n\nAs previously described, we've structured the game so\
    \ that individual tile positions hold their own state information. This means\
    \ that `Pos` objects are ideally positioned to handle game logic which reacts\
    \ to interactions that relate to their own state — in other words, this is where\
    \ the magic is.\n\nSince the `Pos` class is relatively complex, it is broken down\
    \ here into main themes, which are discussed in turn. The initial setup `__init__`\
    \ block is simple, accepting an `x` and `y` position and storing it on the object.\
    \ `Pos` positions never change once created.\n\nTo complete setup the `.reset()`\
    \ function is called which resets all object attributes back to default, zero\
    \ values. This flags the mine as *not the start position, not a mine, not revealed*\
    \ and *not flagged*. We also reset the adjacent count.\n\nListing 244. app/minesweeper.py\n\
    \n```python\nclass Pos(QWidget):\n\n    expandable = Signal(int, int)\n    revealed\
    \ = Signal(object)\n    clicked = Signal()\n\n    def __init__(self, x, y):\n\
    \        super().__init__()\n\n        self.setFixedSize(QSize(20, 20))\n    \
    \    self.x = x\n        self.y = y\n        self.reset()\n\n    def reset(self):\n\
    \        self.is_start = False\n        self.is_mine = False\n        self.adjacent_n\
    \ = 0\n        self.is_revealed = False\n        self.is_flagged = False\n\n \
    \       self.update()\n```\n\nGameplay is centered around mouse interactions with\
    \ the tiles in the playfield, so detecting and reacting to mouse clicks is central.\
    \ In Qt we catch mouse clicks by detecting the `mouseReleaseEvent`. To do this\
    \ for our custom `Pos` widget we define a handler on the class. This receives\
    \ `QMouseEvent` with the information containing what happened. In this case we\
    \ are only interested in whether the mouse release occurred from the left or the\
    \ right mouse button.\n\nFor a left mouse click we check whether the tile is flagged\
    \ or already revealed. If it is either, we ignore the click — making flagged tiles\
    \ 'safe', unable to be clicked by accident. If the tile is not flagged we simply\
    \ initiate the `.click()` method (see later).\n\nFor a right mouse click, on tiles\
    \ which are *not* revealed, we call our `.toggle_flag()` method to toggle a flag\
    \ on and off.\n\nListing 245. app/minesweeper.py\n\n```python\ndef mouseReleaseEvent(self,\
    \ e):\n\n    if e.button() == Qt.RightButton and not self.is_revealed:\n     \
    \   self.toggle_flag()\n\n    elif e.button() == Qt.LeftButton:\n        # Block\
    \ clicking on flagged mines.\n        if not self.is_flagged and not self.is_revealed:\n\
    \            self.click()\n```\n\nThe methods called by the mouseReleaseEvent\
    \ handler are defined below.\n\nThe `.toggle_flag` handler simply sets `.is_flagged`\
    \ to the inverse of itself (True becomes False, False becomes True) having the\
    \ effect of toggling it on and off. Note that we have to call `.update()` to force\
    \ a redraw having changed the state. We also emit our custom `.clicked` signal,\
    \ which is used to start the timer — because placing a flag should also count\
    \ as starting, not just revealing a square.\n\nThe `.click()` method handles a\
    \ left mouse click, and in turn triggers the reveal of the square. If the number\
    \ of adjacent mines to this Pos is zero, we trigger the `.expandable` signal to\
    \ begin the process of auto-expanding the region explored (see later). Finally,\
    \ we again emit `.clicked` to signal the start of the game.\n\nFinally, the `.reveal()`\
    \ method checks whether the tile is already revealed, and if not sets `.is_revealed`\
    \ to True. Again we call `.update()` to trigger a repaint of the widget.\n\nThe\
    \ optional emit of the `.revealed` signal is used only for the endgame full-map\
    \ reveal. Because each reveal triggers a further lookup to find what tiles are\
    \ also revealable, revealing the entire map would create a large number of redundant\
    \ callbacks. By suppressing the signal here we avoid that.\n\nListing 246. app/minesweeper.py\n\
    \n```python\ndef toggle_flag(self):\n    self.is_flagged = not self.is_flagged\n\
    \    self.update()\n\n    self.clicked.emit()\n\ndef click(self):\n    self.reveal()\n\
    \    if self.adjacent_n == 0:\n        self.expandable.emit(self.x, self.y)\n\n\
    \    self.clicked.emit()\n\ndef reveal(self, emit=True):\n    if not self.is_revealed:\n\
    \        self.is_revealed = True\n        self.update()\n\n        if emit:\n\
    \            self.revealed.emit(self)\n```\n\nFinally, we define a custom `paintEvent`\
    \ method for our `Pos` widget to handle the display of the current position state.\
    \ As described in [chapter] to perform custom paint over a widget canvas we take\
    \ a `QPainter` and the `event.rect()` which provides the boundaries in which we\
    \ are to draw — in this case the outer border of the `Pos` widget.\n\nRevealed\
    \ tiles are drawn differently depending on whether the tile is a *start position*,\
    \ *bomb* or *empty space*. The first two are represented by icons of a rocket\
    \ and bomb respectively. These are drawn into the tile `QRect` using `.drawPixmap`.\
    \ Note we need to convert the `QImage` constants to pixmaps, by passing through\
    \ `QPixmap`.\n\n> QPixmap vs. QImages\n\nYou might think \"why not just store\
    \ these as QPixmap objects since that's what we're using? We can't do this and\
    \ store them in constants because you can't create QPixmap objects before your\
    \ QApplication is up and running.\n\nFor empty positions (not rockets, not bombs)\
    \ we optionally show the adjacency number if it is larger than zero. To draw text\
    \ onto our QPainter we use `.drawText()` passing in the QRect, alignment flags\
    \ and the number to draw as a string. We've defined a standard color for each\
    \ number (stored in NUM_COLORS) for usability.\n\nFor tiles that are *not* revealed\
    \ we draw a tile, by filling a rectangle with light gray and draw a 1 pixel border\
    \ of darker grey. If `.is_flagged` is set, we also draw a flag icon over the top\
    \ of the tile using drawPixmap and the tile QRect.\n\nListing 247. app/minesweeper.py\n\
    \n```python\ndef paintEvent(self, event):\n    p = QPainter(self)\n    p.setRenderHint(QPainter.Antialiasing)\n\
    \n    r = event.rect()\n\n    if self.is_revealed:\n        if self.is_start:\n\
    \            p.drawPixmap(r, QPixmap(IMG_START))\n\n        elif self.is_mine:\n\
    \            p.drawPixmap(r, QPixmap(IMG_BOMB))\n\n        elif self.adjacent_n\
    \ > 0:\n            pen = QPen(NUM_COLORS[self.adjacent_n])\n            p.setPen(pen)\n\
    \            f = p.font()\n            f.setBold(True)\n            p.setFont(f)\n\
    \            p.drawText(r, Qt.AlignHCenter | Qt.AlignVCenter, str(self.adjacent_n))\n\
    \n    else:\n        p.fillRect(r, QBrush(Qt.lightGray))\n        pen = QPen(Qt.gray)\n\
    \        pen.setWidth(1)\n        p.setPen(pen)\n        p.drawRect(r)\n\n   \
    \     if self.is_flagged:\n            p.drawPixmap(r, QPixmap(IMG_FLAG))\n```\n\
    \n## Mechanics\n\nWe commonly need to get all tiles surrounding a given point,\
    \ so we have a custom function for that purpose. It simply iterates across a 3x3\
    \ grid around the point, with a check to ensure we do not go out of bounds on\
    \ the grid edges (0 ≥ x ≤ self.b_size). The returned list contains a Pos widget\
    \ from each surrounding location.\n\nListing 248. app/minesweeper.py\n\n```python\n\
    def get_surrounding(self, x, y):\n    positions = []\n\n    for xi in range(max(0,\
    \ x - 1), min(x + 2, self.b_size)):\n        for yi in range(max(0, y - 1), min(y\
    \ + 2, self.b_size)):\n            if not (xi == x and yi == y):\n           \
    \     positions.append(self.grid.itemAtPosition(yi, xi).widget())\n\n    return\
    \ positions\n```\n\nThe `expand_reveal` method is triggered in response to a click\
    \ on a tile with zero adjacent mines. In this case we want to expand the area\
    \ around the click to any spaces which also have zero adjacent mines, and also\
    \ reveal any squares around the border of that expanded area (which aren't mines).\n\
    \nThis *can* be achieved by looking at all squares around the clicked square,\
    \ and triggering a `.click()` on any that do not have `.n_adjacent == 0`. The\
    \ normal game logic takes over and expands the area automatically. However, this\
    \ is a bit inefficient, resulting in a large number of redundant signals (each\
    \ square triggers up to 9 signals for each surrounding square).\n\nInstead we\
    \ use a self-contained method to determine the area to be revealed, and then trigger\
    \ the reveal (using `.reveal()` to avoid the `.clicked` signals).\n\nWe start\
    \ with a list `to_expand` containing the positions to check on the next iteration,\
    \ a list `to_reveal` containing the tile widgets to reveal, and a flag `any_added`\
    \ to determine when to exit the loop. The loop stops the first time no new widgets\
    \ are added to `to_reveal`.\n\nInside the loop we reset `any_added` to `False`,\
    \ and empty the `to_expand` list, keeping a temporary store in `l` for iterating\
    \ over."
  mdcn: "## 位置方块\n\n如前所述，我们将游戏结构化为每个方块位置都持有自己的状态信息。这意味着 `Pos` 对象非常适合处理与其自身状态相关的交互逻辑——换句话说，这就是魔法发生的地方。\n\
    \n由于 `Pos` 类相对复杂，这里将其分解为主要主题，并依次讨论。初始设置 `__init__` 块很简单，接受一个 `x` 和 `y` 位置并将其存储在对象上。`Pos`\
    \ 位置一旦创建就永远不会改变。\n\n为了完成设置，调用 `.reset()` 函数，将所有对象属性重置回默认的零值。这将地雷标记为*不是起始位置、不是地雷、未揭示*且*未标记*。我们还重置相邻计数。\n\
    \n清单 244. app/minesweeper.py\n\n```python\nclass Pos(QWidget):\n\n    expandable\
    \ = Signal(int, int)\n    revealed = Signal(object)\n    clicked = Signal()\n\n\
    \    def __init__(self, x, y):\n        super().__init__()\n\n        self.setFixedSize(QSize(20,\
    \ 20))\n        self.x = x\n        self.y = y\n        self.reset()\n\n    def\
    \ reset(self):\n        self.is_start = False\n        self.is_mine = False\n\
    \        self.adjacent_n = 0\n        self.is_revealed = False\n        self.is_flagged\
    \ = False\n\n        self.update()\n```\n\n游戏玩法围绕着与游戏区域中方块的鼠标交互展开，因此检测和响应鼠标点击至关重要。在\
    \ Qt 中，我们通过检测 `mouseReleaseEvent` 来捕获鼠标点击。为了在我们的自定义 `Pos` 小部件上实现这一点，我们在类上定义了一个处理程序。它接收包含发生了什么信息的\
    \ `QMouseEvent`。在这种情况下，我们只关心鼠标释放是来自左键还是右键。\n\n对于左键单击，我们检查方块是否被标记或已经揭示。如果是其中任何一种，我们就忽略点击——使标记的方块“安全”，无法被意外点击。如果方块未被标记，我们只需启动\
    \ `.click()` 方法（见后文）。\n\n对于右键单击，在*未*揭示的方块上，我们调用 `.toggle_flag()` 方法来切换标记的开关。\n\
    \n清单 245. app/minesweeper.py\n\n```python\ndef mouseReleaseEvent(self, e):\n\n\
    \    if e.button() == Qt.RightButton and not self.is_revealed:\n        self.toggle_flag()\n\
