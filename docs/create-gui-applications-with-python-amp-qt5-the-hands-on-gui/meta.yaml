  - '[PAGE 360]


    # Modifying Signal Data


    *Signals* are connected to *slots* which are functions (or methods) which will
    be run every time the signal fires. Many signals also transmit data, providing
    information about the state change or widget that fired them. The receiving slot
    can use this data to perform different actions in response to the same signal.


    However, there is a limitation — the signal can only emit the data it was designed
    to. Take for example, the `QPushButton.clicked` signal which fires when the button
    is clicked. The *clicked+ signal emits a single piece of data — the _checked*
    state of the button after being clicked.


    > 💡 For non-checkable buttons, this will always be `False`.


    The slot receives this data, but nothing more. It does not know *which* widget
    triggered it, or anything about it. This is usually fine. You can tie a particular
    widget to a unique function which does precisely what that widget requires. Sometimes
    however you want to add additional data so your slot methods can be a little smarter.
    There''s a neat trick to do just that.


    The additional data you send could be the triggered widget itself, or some associated
    metadata which your slot needs to perform the intended result of the signal.


    # Intercepting the signal


    Instead of connecting the signal directly to the target slot function, you use
    an intermediate function to intercept the signal, modify the signal data and forward
    that on to your target slot. If you define the intermediate function in a context
    that has access to the widget that emitted the signal, you can pass that with
    the signal too.


    This slot function must accept the value sent by the signal (here the `checked`
    state) and then call the *real* slot, passing any additional data with the arguments.'
