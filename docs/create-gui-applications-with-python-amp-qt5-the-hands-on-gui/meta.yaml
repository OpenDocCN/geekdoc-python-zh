  md: '# QStackedLayout multiple widgets in the same space


    The final layout we''ll cover is the `QStackedLayout`. As described, this layout
    allows you to position elements directly in front of one another. You can then
    select which widget you want to show. You could use this for drawing layers in
    a graphics application, or for imitating a tabbed interface. Note there is also
    `QStackedWidget` which is a container widget that works in exactly the same way.
    This is useful if you want to add a stack directly to a `QMainWindow` with `.setCentralWidget`.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_88_0.png)


    Figure 30. QStackedLayout — in use only the uppermost widget is visible, which
    is by default the first widget added to the layout.'
