    \n        button.pressed.connect(lineEdit.clear)\n\n        self.setLayout(layout)\n\
    \        self.setWindowTitle(\"Why?\")\n        self.show()\n\napp = QApplication(sys.argv)\n\
    window = MyWindow()\napp.exec_()\n```\n\n## Applying the process to your own code\n\
    \nThis is a very simple example, however if you follow the same process you can\
    \ reliably convert any C++ Qt code over to it's Python equivalent. When converting\
    \ your own sample of code try and stick to this stepwise approach to minimize\
    \ the risk of missing something or inadvertently breaking it. If you end up with\
    \ Python code that runs but is subtly different it can be hard to debug.\n\n>\
    \ If you have a code example you would like help with translating, you can always\
    \ get in touch and I'll try and help you out.\n\n## Appendix C: PyQt5 and PySide2\
    \ — What’s the difference?\n\nIf you start building Python application with Qt5\
    \ you’ll soon discover that there are in fact two packages which you can use to\
    \ do this — PyQt5 and PySide2.\n\nIn this short chapter I’ll run through why exactly\
    \ this is, whether you need to care (spoiler: you really don’t), what the (few)\
    \ differences are and how to work around them. By the end you should be comfortable\
    \ re-using code examples from both PyQt5 and PySide2 tutorials to build your apps,\
    \ regardless of which package you’re using yourself.\n\n> If you bought a copy\
    \ of this ebook you can have access to both PyQt5 and PySide2 versions of this\
    \ book. Just let me know and I’ll add them onto your account on www.pythonguis.com.\n\
    \n### Background\n\nWhy are there two libraries?\n\nPyQt is developed by Phil\
    \ Thompson of Riverbank Computing Ltd. and has existed for a very long time —\
    \ supporting versions of Qt going back to 2.x. In 2009 Nokia, who owned Qt toolkit\
    \ at the time, wanted to make the Python bindings for Qt available in a more permissive\
    \ LGPL license. Unable to come to agreement with Riverbank (who would lose money\
    \ from this, so fair enough) they then released their own bindings as _PySide.\n\
    \n> It’s called PySide because \"side\" is Finnish for \"binder\".\n\nThe two\
    \ interfaces were basically equivalent, but over time development of PySide lagged\
    \ behind PyQt. This was particularly noticeable following the release of Qt 5\
    \ — the Qt5 version of PyQt (PyQt5) has been available since mid-2016, while the\
    \ first stable release of PySide2 was 2 years later.\n\nWith that in mind, it\
    \ is unsurprising that many Qt5 on Python examples use PyQt5 — if only because\
    \ it was *available*. However, the Qt project has recently adopted PySide as the\
    \ official [Qt for Python release](https://www.qt.io/qt-for-python) which should\
    \ ensure its viability going forward.\n\n| | PyQt5 | PySide2 |\n|---|---|---|\n\
    | First stable release | Apr 2016 | Jul 2018 |\n| Developed by | Riverbank Computing\
    \ Ltd. | Qt |\n| License | GPL or commercial | LGPL |\n| Platforms | Python 3\
    \ | Python 3 and Python 2.7 (Linux and macOS only) |\n\nWhich should you use?\
    \ Well, honestly, it doesn't really matter.\n\nBoth packages are wrapping the\
    \ same library — Qt5 — and so have 99.9% identical APIs (see below for the few\
    \ differences). Code that is written for one can often be used as-is with other,\
    \ simply changing the imports from `PyQt5` to `PySide2`. Anything you learn for\
    \ one library will be easily applied to a project using the other.\n\nAlso, no\
    \ matter with one you choose to use, it's worth familiarizing yourself with the\
    \ other so you can make the best use of all available online resources — using\
    \ PyQt5 tutorials to build your PySide2 applications for example, and *vice versa*.\n\
    \nIn this short chapter I'll run through the few notable differences between the\
    \ two packages and explain how to write code which works seamlessly with both.\
    \ After reading this you should be able to take any PyQt5 example online and convert\
    \ it to work with PySide2.\n\n### Licensing\n\nThe main notable difference between\
    \ the two versions is licensing — with PyQt5 being available under a GPL or commercial\
    \ license, and PySide2 under a LGPL license.\n\nIf you are planning to release\
    \ your software itself under the GPL, or you are developing software which will\
    \ not be *distributed*, the GPL requirement of PyQt5 is unlikely to be an issue.\
    \ However, if you want to distribute your software but not share your source code\
    \ you will need to purchase a commercial license from Riverbank for PyQt5 or use\
    \ PySide2.\n\n> Qt itself is available under a *Qt Commercial License*, GPL 2.0,\
    \ GPL 3.0 and LGPL 3.0 licenses.\n\n### UI files\n\nThe only major difference\
    \ between the two libraries is in their handling of loading `.ui` files exported\
    \ from Qt Creator/Designer. PyQt5 provides the `uic` submodule which can be used\
    \ to load UI files directly, to produce an object. This feels pretty Pythonic\
    \ (if you ignore the camelCase).\n\n```\nimport sys\nfrom PyQt5 import QtWidgets,\
    \ uic\n\napp = QtWidgets.QApplication(sys.argv)\n\nwindow = uic.loadUi(\"mainwindow.ui\"\
    )\nwindow.show()\napp.exec()\n```\n\nThe equivalent with PySide2 is one line longer,\
    \ since you need to create a `QUILoader` object first. Unfortunately the API of\
    \ these two interfaces is different too (`.load` vs `.loadUI`)."
