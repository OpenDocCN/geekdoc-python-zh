    If you run this example you''ll see a progress bar moving from left to right.
    If you click **[ Pause ]** the worker will pause. If you then click **[ Resume
    ]** the worker will continue from where it started. If you click **[ Stop ]**
    the worker will stop, permanently, as before.


    Rather than throw an exception when receiving the `is_paused` signal, we enter
    a pause loop. This stops execution of the worker, but does not exit the `run`
    method or terminate the worker.


    By using `while self.is_paused:` for this loop, we will exit the loop as soon
    as the worker is unpaused, and resume what we were doing before.


    > You *must* include the `time.sleep()` call. This zero-second pause allows for
    Python to release the GIL, so this loop will not block other execution. Without
    that sleep you have a *busy loop* which will waste resources while doing nothing.
    Increase the sleep value if you want to check less often.'
