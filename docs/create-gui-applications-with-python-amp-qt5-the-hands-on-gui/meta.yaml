    # Free Desktop Specification Icons (Linux)


    On Linux desktops there is a thing called the *Free Desktop Specification* which
    defines standard names for icons for specific actions.


    If your application uses these specific icon names (and loads the icon from a
    "theme") then on Linux your application will use the current icon set which is
    enabled on the desktop. The goal here is to ensure that all applications have
    the same look & feel while remaining configurable.


    To use these within Qt Designer you would select the drop-down and choose "Set
    Icon From Theme..."


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_217_0.png)


    You then enter the **name** of the icon you want to use, e.g. `document-new` (see
