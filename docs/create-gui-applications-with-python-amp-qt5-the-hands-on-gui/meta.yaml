    # # 9. Actions, Toolbars & Menus


    Next we''ll look at some of the common user interface elements, that you''ve probably
    seen in many other applications — toolbars and menus. We''ll also explore the
    neat system Qt provides for minimising the duplication between different UI areas
    — `QAction`.


    # ## Toolbars


    One of the most commonly seen user interface elements is the toolbar. Toolbars
    are bars of icons and/or text used to perform common tasks within an application,
    for which accessing via a menu would be cumbersome. They are one of the most common
    UI features seen in many applications. While some complex applications, particularly
    in the Microsoft Office suite, have migrated to contextual ''ribbon'' interfaces,
    the standard toolbar is sufficient for the majority of applications you will create.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_97_0.png)


    Qt toolbars support display of icons, text, and can also contain any standard
    Qt widget. However, for buttons the best approach is to make use of the `QAction`
    system to place buttons on the toolbar.


    Let''s start by adding a toolbar to our application.


    > > 💡 Load up a fresh copy of `myapp.py` and save it under a new name for this
    section.


    In Qt toolbars are created from the QToolBar class. To start you create an instance
    of the class and then call `.addToolbar` on the QMainWindow. Passing a string
    in as the first parameter to `QToolBar` sets the toolbar''s name, which will be
    used to identify the toolbar in the UI.'
  - "[PAGE 98]\n\nListing 35. basic/toolbars_and_menus_1.py\n\n```\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        label = QLabel(\"Hello!\")\n        label.setAlignment(Qt.AlignCenter)\n\
    \n        self.setCentralWidget(label)\n\n        toolbar = QToolBar(\"My main\
    \ toolbar\")\n        self.addToolBar(toolbar)\n\n    def onMyToolBarButtonClick(self,\
    \ s):\n        print(\"click\", s)\n```\n\n\U0001F680 Run it! You'll see a thin\
    \ grey bar at the top of the window. This is your toolbar. Right click and click\
    \ the name to toggle it off.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_98_0.png)\n\
    \nFigure 37. A window with a toolbar.\n\n> > I can't get my toolbar back!?\n>\n\
    > Unfortunately once you remove a toolbar there is now no place to right click\
    \ to re-add it. So as a general rule you want to either keep one toolbar un-removeable,\
    \ or provide an alternative interface to turn toolbars on and off."
  - '[PAGE 99]


    Let’s make the toolbar a bit more interesting. We could just add a `QButton` widget,
    but there is a better approach in Qt that gets you some cool features — and that
    is via `QAction`. `QAction` is a class that provides a way to describe abstract
    user interfaces. What this means in English, is that you can define multiple interface
    elements within a single object, unified by the effect that interacting with that
    element has. For example, it is common to have functions that are represented
    in the toolbar but also the menu — think of something like Edit→Cut which is present
    both in the Edit menu but also on the toolbar as a pair of scissors, and also
    through the keyboard shortcut `Ctrl-X` (`Cmd-X` on macOS).


    Without `QAction` you would have to define this in multiple places. But with `QAction`
    you can define a single `QAction`, defining the triggered action, and then add
    this action to both the menu and the toolbar. Each `QAction` has names, status
    messages, icons and signals that you can connect to (and much more).


    See the code below for how to add your first `QAction`.'
