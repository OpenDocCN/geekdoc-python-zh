    \ Our action button with an icon.*\n\nNote that Qt uses your operating system\
    \ default settings to determine whether to show an icon, text or an icon and text\
    \ in the toolbar. But you can override this by using `.setToolButtonStyle`. This\
    \ slot accepts any of the following flags from the `Qt.` namespace:\n\n| Flag\
    \ | Behavior |\n| :--- | :--- |\n| `Qt.ToolButtonIconOnly` | Icon only, no text\
    \ |\n| `Qt.ToolButtonTextOnly` | Text only, no icon |\n| `Qt.ToolButtonTextBesideIcon`\
    \ | Icon and text, with text beside the icon |\n| `Qt.ToolButtonTextUnderIcon`\
    \ | Icon and text, with text under the icon |\n| `Qt.ToolButtonFollowStyle` |\
    \ Follow the host desktop style |\n\n> **Which style should I use?**\n>\n> The\
