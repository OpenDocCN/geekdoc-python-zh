    \n## 使用DecorationRole\n\n如果你运行应用程序，现在应该会发现添加和删除都有效，但完成项目虽然有效，视图中却没有显示任何指示。我们需要更新模型，为视图提供一个在项目完成时显示的指示器。更新后的模型如下所示。\n\
