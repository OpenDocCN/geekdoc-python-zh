    ```python

    from PySide2.QtWidgets import QApplication, QLabel

    from PySide2.QtGui import QPalette, QColor

    from PySide2.QtCore import Qt


    import sys


    app = QApplication(sys.argv)

    palette = QPalette()

    palette.setColor(QPalette.Window, QColor(0, 128, 255))

    palette.setColor(QPalette.WindowText, Qt.white)

    app.setPalette(palette)


    w = QLabel("Palette Test")

    w.show()


    app.exec_()

    ```


    When run, this gives the following output. The background of the window is changed
    to a light blue, and the window text is white.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_205_0.png)


    Figure 96. Changing the Window and WindowText colors.


    To show palette use in practice and see some limitations of it, we''ll now create
    an application using a custom dark palette.


    > Using this palette all widgets will be drawn with a dark background, regardless
    of the dark mode state of your app. See later for using system dark modes.


    While you should avoid overriding user settings in general, it can make sense
    in certain classes of applications such as photo viewers or video editors, where
    a bright UI will interfere with the users ability to judge color. The following
    app skeleton uses a custom palette by Jürgen Skrotzky to give the application
    a global dark theme.


    ```python

    from PySide2.QtWidgets import QApplication, QMainWindow

    from PySide2.QtGui import QPalette, QColor

    from PySide2.QtCore import Qt


    import sys


    darkPalette = QPalette()

    darkPalette.setColor(QPalette.Window, QColor(53, 53, 53))

    darkPalette.setColor(QPalette.WindowText, Qt.white)

    darkPalette.setColor(QPalette.Disabled, QPalette.WindowText, QColor(127, 127,
    127))

    darkPalette.setColor(QPalette.Base, QColor(42, 42, 42))

    darkPalette.setColor(QPalette.AlternateBase, QColor(66, 66, 66))

    darkPalette.setColor(QPalette.ToolTipBase, Qt.white)

    darkPalette.setColor(QPalette.ToolTipText, Qt.white)

    darkPalette.setColor(QPalette.Text, Qt.white)

    darkPalette.setColor(QPalette.Disabled, QPalette.Text, QColor(127, 127, 127))

    darkPalette.setColor(QPalette.Dark, QColor(35, 35, 35))

    darkPalette.setColor(QPalette.Shadow, QColor(20, 20, 20))

    darkPalette.setColor(QPalette.Button, QColor(53, 53, 53))

    darkPalette.setColor(QPalette.ButtonText, Qt.white)

    darkPalette.setColor(QPalette.Disabled, QPalette.ButtonText, QColor(127, 127,
    127))

    darkPalette.setColor(QPalette.BrightText, Qt.red)

    darkPalette.setColor(QPalette.Link, QColor(42, 130, 218))

    darkPalette.setColor(QPalette.Highlight, QColor(42, 130, 218))

    darkPalette.setColor(QPalette.Disabled, QPalette.Highlight, QColor(80, 80, 80))

    darkPalette.setColor(QPalette.HighlightedText, Qt.white)

    darkPalette.setColor(QPalette.Disabled, QPalette.HighlightedText, QColor(127,
    127, 127))


    app = QApplication(sys.argv)

    app.setPalette(darkPalette)


    w = QMainWindow()  # Replace with your QMainWindow instance.

    w.show()


    app.exec_()

    ```


    As before, once the palette is constructed it must be applied to take effect.
    Here we apply it to the application as a whole by calling `app.setPalette()`.
    All widgets will adopt the theme once applied. You can use this skeleton to construct
    your own applications using this theme.


    In the code examples with this book you can also find `themes/palette_dark_widgets.py`
    which reproduces the widgets demo, using this palette. The result on each platform
    is shown below.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_208_0.png)


    Figure 97. Custom dark palette on different platforms and themes


    You''ll notice that when using the default Windows and macOS themes some widgets
    do not have their colors applied correctly. This is because these themes make
    use of platform-native controls to give a true native feel. If you want to use
    a dark or heavily customized theme on Windows 10, it is recommended to use the
    *Fusion* style on these platforms.


    ## Dark Mode


    Dark mode is becoming popular as people spend more and more time on screens. Darker
    themed OS and applications help to minimize eye strain and reduce sleep disturbance
    if working in the evening.


    Windows, macOS and Linux all provide support for dark mode themes, and the good
    news is that if you build your application with PySide2 you get dark mode support
    for free. However, the support is incomplete in earlier versions of PySide2. Remember
    to test your application with dark mode enabled and disabled on all your target
    platforms.


    > When building macOS packages for distribution you will need to set `NSRequiresAquaSystemAppearance`
    to `False` in your app for dark mode to be respected by the bundled `.app` — this
    is covered in the packaging chapter.


    ## Color


    Your operating system has a standard theme which is respected by most software.
    Qt picks up this color scheme automatically and will apply it to your PySide2
    applications to help them fit in. Using these colors has some advantages —


    1. Your app will look at home on your user''s desktop

    2. Your users are familiar with the meaning of contextual colors

    3. Somebody else has spent time designing colors that work


    If you want to replace the color scheme, make sure that the benefits outweigh
    the costs.


    Sometimes your applications may require additional contextual colors or tweaks
    to highlights. For data visualization a good resource is [Color Brewer](https://colorbrewer2.org/)
    from *Cynthia Brewer* which has both qualitative and quantitative schemes. If
    you only need a few colors [coolors.co](https://coolors.co/) lets you generate
    custom well-matched 4-color themes.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_210_0.png)


    *Figure 98. Example color scheme from coolors.co*


    Use colors simply and effectively, restricting your palette as far as possible.
    If particular colors have meaning somewhere use the same meaning *everywhere*.
    Avoid using multiple shades unless those shades have meaning.


    ### ✔ DO


    - Consider using GUI-standard colors in your app first.

    - When using custom colors define a color scheme and stick to it.

    - Keep color-blind users in mind when choosing colors and contrasts.

    - Where possible, don''t use only color to show something. Consider using borders,
    fill patterns, etc., as well as colors.


    ### ✖ DON''T


    - Use standard colors for non-standard purposes, e.g. Red = OK.


    ## 18. Icons


    Icons are small pictures which are used to aid navigation or understanding within
    a user interface. They are commonly found on buttons, either alongside or in place
    of text, or alongside actions in menus. By using easily recognizable indicators
    you can make your interface easier to use.


    In PySide2 you have a number of different options for how to source and integrate
    icons into your application. In this section we''ll look at those options and
    the pros and cons of each.


    ## Qt Standard Icons


    The easiest way to add simple icons to your application is to use the built-in
    icons which ship with Qt itself. This small set of icons covers a number of standard
    use cases, from file operations, forward & backward arrows and message box indicators.


    The full list of built-in icons is shown below.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_213_0.png)


    Figure 99. Qt Builtin icons


    You''ll notice that this set of icons is a bit *restrictive*. If that''s not a
    problem for the app you''re building, or if you only need a few icons for your
    app it might still be a viable option for you.


    The icons are accessible through the current application style using `QStyle.standardIcon(name)`
    or `QStyle.<constant>`. The full table of built-in icon names is shown below.


    | SP_ArrowBack | SP_DirIcon | SP_MediaSkipBackward |

    | SP_ArrowDown | SP_DirLinkIcon | SP_MediaSkipForward |

    | SP_ArrowForward | SP_DirOpenIcon | SP_MediaStop |

    | SP_ArrowLeft | SP_DockWidgetCloseButton | SP_MediaVolume |

    | SP_ArrowRight | SP_DriveCDIcon | SP_MediaVolumeMuted |

    | SP_ArrowUp | SP_DriveDVDIcon | SP_MessageBoxCritical |

    | SP_BrowserReload | SP_DriveFDIcon | SP_MessageBoxInformation |

    | SP_BrowserStop | SP_DriveHDIcon | SP_MessageBoxQuestion |

    | SP_CommandLink | SP_DriveNetIcon | SP_MessageBoxWarning |

    | SP_ComputerIcon | SP_FileDialogBack | SP_TitleBarCloseButton |

    | SP_CustomBase | SP_FileDialogContentsView | SP_TitleBarContextHelpButton |

    | SP_DesktopIcon | SP_FileDialogDetailedView | SP_TitleBarMaxButton |

    | SP_DialogApplyButton | SP_FileDialogEnd | SP_TitleBarMenuButton |

    | SP_DialogCancelButton | SP_FileDialogInfoView | SP_TitleBarMinButton |

    | SP_DialogCloseButton | SP_FileDialogListView | SP_TitleBarNormalButton |

    | SP_DialogDiscardButton | SP_FileDialogNewFolder | SP_TitleBarShadeButton |

    | SP_DialogHelpButton | SP_FileDialogStart | SP_TitleBarUnshadeButton |

    | SP_DialogNoButton | SP_FileDialogToParent | SP_ToolBarHorizontalExtensionButton
    |

    | SP_DialogOkButton | SP_FileIcon | SP_ToolBarVerticalExtensionButton |

    | SP_DialogResetButton | SP_FileLinkIcon | SP_TrashIcon |

    | SP_DialogSaveButton | SP_MediaPause | SP_VistaShield |

    | SP_DialogYesButton | SP_MediaPlay | SP_DirClosedIcon |

    | SP_MediaSeekBackward | SP_DirHomeIcon | SP_MediaSeekForward |


    You can access these icons directly via the QStyle namespace, as follows.


    ```python

    icon = QStyle.standardIcon(QStyle.SP_MessageBoxCritical)

    button.setIcon(icon)

    ```


    You can also use the style object from a specific widget. It doesn''t matter which
    you use, since we''re only accessing the built-ins anyway.'
