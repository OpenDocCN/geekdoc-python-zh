    what exactly has occurred. We''ll look at the mouse event objects next.


    # Mouse events


    All mouse events in Qt are tracked with the `QMouseEvent` object, with information
    about the event being readable from the following event methods.


    | Method | Returns |

    | :--- | :--- |

    | `.button()` | Specific button that triggered this event |

    | `.buttons()` | State of all mouse buttons (OR''ed flags) |

    | `.globalPos()` | Application-global position as a `QPoint` |

    | `.globalX()` | Application-global *horizontal* X position |

    | `.globalY()` | Application-global *vertical* Y position |

    | `.pos()` | Widget-relative position as a `QPoint` *integer* |

    | `.posF()` | Widget-relative position as a `QPointF` *float* |


    You can use these methods within an event handler to respond to different events
    differently, or ignore them completely. The positional methods provide both *global*
    and *local* (widget-relative) position information as `QPoint` objects, while
    buttons are reported using the mouse button types from the `Qt` namespace.


