  md: 'Another alternative is to use [Homebrew](https://brew.sh/). Homebrew is a package
    manager for command-line software on macOS. Homebrew has both Python 3 and PySide2
    available in their repositories.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_698_0.png)


    *Figure 270. Homebrew — the missing package manager for macOS*


    To install homebrew run the following from the command line —


    ```

    ruby -e "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)"

    ```


    > 💡 This is also available to copy and paste from the Homebrew homepage.


    Once Homebrew is installed you can then install Python with —


    ```

    brew install python3

    ```


    With Python installed, you can then install PySide2 as normal, using `pip3 install
    pyside2`, or alternatively choose to install it using Homebrew with —


    ```

    brew install pyside2

    ```'
