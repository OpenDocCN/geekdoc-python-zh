  md: '# 26. Working with command-line arguments


    If you have created an application which works with specific file types — for
    example a video editor that opens videos, a document editor that opens document
    files — it can be useful to have your application open these files automatically.
    On all platforms, when you tell the OS to open a file with a specific application,
    the *filename* to open is passed to that application as a command-line *argument*.


    When your application is run, the arguments passed to the application are always
    available in `sys.argv`. To open files automatically, you can check the value
    of `sys.argv` at startup and, if you find a filename in there, open it.


    The following app when run will open a window with all the command line arguments
    received displayed.'
