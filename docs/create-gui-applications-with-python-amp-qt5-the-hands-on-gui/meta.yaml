  md: '# QGridLayout widgets arranged in a grid


    As useful as they are, if you try and use `QVBoxLayout` and `QHBoxLayout` for
    laying out multiple elements, e.g. for a form, you''ll find it very difficult
    to ensure differently sized widgets line up. The solution to this is `QGridLayout`.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_85_0.png)


    Figure 27. A QGridLayout showing the grid positions for each location.


    `QGridLayout` allows you to position items specifically in a grid. You specify
    row and column positions for each widget. You can skip elements, and they will
    be left empty.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_85_1.png)


    Figure 28. A QGridLayout with unfilled slots.'
