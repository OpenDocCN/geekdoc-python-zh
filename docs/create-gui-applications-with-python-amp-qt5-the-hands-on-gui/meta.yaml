    from PySide2.QtUiTools import QUiLoader\n\nloader = QUiLoader()\n\napp = QtWidgets.QApplication(sys.argv)\n\
    window = loader.load(\"mainwindow.ui\", None)\nwindow.show()\napp.exec_()\n```\n\
    \nTo load a UI onto an existing object in PyQt5, for example in your `QMainWindow.init`\
    \ you can call `uic.loadUI` passing in `self`(the existing widget) as the second\
    \ parameter.\n\n```\npython\nimport sys\nfrom PyQt5 import QtCore, QtGui, QtWidgets\n\
    from PyQt5 import uic\n\nclass MainWindow(QtWidgets.QMainWindow):\n    def __init__(self,\
    \ *args, **kwargs):\n        super().__init__(*args, **kwargs)\n        uic.loadUi(\"\
    mainwindow.ui\", self)\n\napp = QtWidgets.QApplication(sys.argv)\nwindow = MainWindow()\n\
    window.show()\napp.exec_()\n```\n\nThe PySide2 loader does not support this —\
    \ the second parameter to `.load` is the *parent* widget of the widget you're\
    \ creating. This prevents you adding custom code to the `__init__` block of the\
    \ widget, but you can work around this with a separate function."
