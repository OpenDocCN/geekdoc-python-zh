  md: '# 👋 Familiarity & Skeuomorphism


    One of the most powerful tools you can exploit when building user interfaces is
    *familiarity*. That is, giving your users the sense that your interface is something
    they have used before.


    Good interfaces are often described as being *intuitive*. There is nothing naturally
    intuitive about moving a mouse pointer around a screen and clicking on square-ish
    bumps. But, after spending years of our lives doing exactly that, there is something
    very familiar about it. There is nothing more guaranteed to make an application
    incredibly user unfriendly than to ignore the value of this experience.


    The search for *familiarity* in user interfaces led to the use of *skeuomorphism*
    in GUI design. Skeuomorphism is the application of non-functional design cues
    from other objects, where those design elements are functional. That can mean
    using common interface elements, or replicating some aspects of the manual process
    you''re replacing. In the context of GUIs this often means user interfaces that
    look like real objects.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_468_0.png)


    *Figure 206. RealPhone — One of IBM''s RealThings™*


    Apple was a big proponent of skeuomorphism during the Steve Jobs era. In recent
    years GUIs have, inspired by the web, moved increasingly to "flat" designs. Yet,
    modern user-interfaces all still have elements of'
  merge: -1
  pgno: 468
- img_proc: true
  md: 'skeuomorphism in them. Even though floppy disks are now defunct technology,
    they are still used to represent the **File > Save** and **File > Save As..**
    actions, and we put deleted documents in a trash can.


    But there are more subtle ways to exploit *familiarity* in your interfaces. You
    can adapt the structure and layout of a manual process into your UI. The modern
    desktop calculator is a good example of this kind of abstract skeuomorphism.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_469_0.png)


    *Figure 207. Calculator & Upside down calculator — Windows 10*


    When we perform calculations we typically put the result at the *bottom*. So why
    is the screen at the top on a calculator? Because otherwise it would be obscured
    by your hand. The position of the screen is *functional*.


    This position persists in calculators on computers, even though the screen position
    is no longer required—the mouse pointer will not obscure the screen and manual
    input is via the keyboard. But if you opened up a calculator and it had the screen
    at the bottom you would be confused. It looks *upside down*. It''s *weird* or
    *unintuitive* despite being perfectly functional. That is the essence of skeuomorphism
    in GUI design—making user interfaces feel more intuitive by exploiting the familiarity
    of users'
  merge: -1
