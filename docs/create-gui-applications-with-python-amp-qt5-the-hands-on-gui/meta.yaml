  md: '![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_474_0.png)


    Figure 209. Push the button.


    You''ll notice that each time you push the button the counter stops ticking and
    your application freezes entirely. On Windows you may see the window turn pale,
    indicating it is not responding, while on macOS you may see the spinning wheel
    of death.


    What appears as a *frozen interface* is in fact caused by the Qt event loop being
    blocked from processing (and responding to) window events. Your clicks on the
    window as still registered by the host OS and sent to your application, but because
    it''s sat in your big ol'' lump of code (`time.sleep`), it can''t accept or react
    to them. Your app does not respond and the OS and it interprets this as a freeze
    or hang.


    # The wrong approach


    The simplest way get around this is to accept events from within your code. This
    allows Qt to continue to respond to the host OS and your application will stay
    responsive. You can do this easily by using the static `.processEvents()` function
    on the `QApplication` class. Simply add a line like the following, somewhere in
    your long-running code block:


    ```

    python

    QApplication.processEvents()

    ```'
