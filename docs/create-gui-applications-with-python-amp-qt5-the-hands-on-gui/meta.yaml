    \  Task/worker complete. Remove it from the active workers\n        dictionary.\
    \ We leave it in worker_state, as this is used to\n        to display past/complete\
    \ workers too.\n        \"\"\"\n        del self._jobs[job_id]\n        self.layoutChanged.emit()\n\
    \n    def cleanup(self):\n        \"\"\"\n        Remove any complete/failed workers\
    \ from worker_state.\n        \"\"\"\n        for job_id, s in list(self._state.items()):\n\
    \            if s[\"status\"] == QProcess.NotRunning:\n                del self._state[job_id]\n\
    \        self.layoutChanged.emit()\n\n    # Model interface\n    def data(self,\
    \ index, role):\n        if role == Qt.DisplayRole:\n            # See below for\
    \ the data structure.\n            job_ids = list(self._state.keys())\n      \
    \      job_id = job_ids[index.row()]\n            return job_id, self._state[job_id]\n\
