    \ COMPLETE!\nRESULT {'n': 22, 'value': 0.2777777777777778}\nERROR: division by\
    \ zero\n```\n\nIn the next section we'll look at a number of different variations\
    \ on this approach which allow you to do some interesting things using `QThreadPool`\
    \ in your own applications.\n\n## 33. Threading examples\n\n`QThreadPool` and\
    \ `QRunnable` are an incredibly flexible way to run things in other threads. By\
    \ tweaking the signals and parameters you can perform any tasks you can imagine.\
    \ In this chapter we'll look some examples for how to construct runners for particular\
    \ scenarios.\n\nAll the examples follow the same general pattern — a custom `QRunnable`\
    \ class with custom `WorkerSignals`. The difference is in what we pass to the\
    \ runner, what it does with those parameters, and how we hook up the signals.\n\
    \n*Listing 173. concurrent/qrunner_base.py*\n\n```python\nimport sys\nimport time\n\
    import traceback\n\nfrom PySide2.QtCore import QObject, QRunnable, QThreadPool,\
    \ Signal, Slot\nfrom PySide2.QtWidgets import QApplication, QMainWindow\n\nclass\
    \ WorkerSignals(QObject):\n    pass\n\nclass Worker(QRunnable):\n    def __init__(self,\
    \ *args, **kwargs):\n        super().__init__()\n        # Store constructor arguments\
    \ (re-used for processing)\n        self.args = args\n        self.kwargs = kwargs\n\
    \        self.signals = WorkerSignals()\n\n    @Slot()\n    def run(self):\n \
    \       pass\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n    \
    \    super().__init__()\n        self.show()\n\napp = QApplication(sys.argv)\n\
    window = MainWindow()\napp.exec_()\n```\n\n## The progress watcher\n\nIf you’re\
    \ using threads to perform long-running actions you should keep your users informed\
    \ about how the task is progressing. A common way to do this is by showing the\
    \ user a *progress bar* which indicates, with a bar filling left to right, how\
    \ much of the task is complete. In order to show a progress bar for your tasks,\
    \ you need to emit the current progress state from your worker.\n\nTo do this\
    \ we can define another signal called `progress` on the `WorkerSignals` object.\
    \ This signal emits on each loop a number from 0..100 as the \"task\" progresses.\
    \ The output of this progress signal is connected to a standard `QProgressBar`\
    \ shown on the statusbar of our main window.\n\n*Listing 174. concurrent/qrunner_progress.py*\n\
    \n```python\nimport sys\nimport time\n\nfrom PySide2.QtCore import QObject, QRunnable,\
    \ QThreadPool, QTimer,\n    Signal, Slot\nfrom PySide2.QtWidgets import (\n  \
    \  QApplication,\n    QLabel,\n    QMainWindow,\n    QProgressBar,\n    QPushButton,\n\
    \    QVBoxLayout,\n    QWidget,\n)\n\n\nclass WorkerSignals(QObject):\n    \"\"\
    \"\n    Defines the signals available from a running worker thread.\n\n    progress\n\
    \        int progress complete,from 0-100\n    \"\"\"\n\n    progress = Signal(int)\n\
    \n\nclass Worker(QRunnable):\n```"
