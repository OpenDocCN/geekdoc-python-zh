    The advantage of this method is that your data files are guaranteed to be bundled
    as they are treated as code — **PyInstaller** finds them through the imports in
    your source. You also don''t need to worry about platform-specific locations for
    data files. You only need to take care to rebuild the `resources.py` file any
    time you add or remove data files from your project.


    Of course, this approach isn''t appropriate for any files you want to be readable
    or editable by end-users. However, there is nothing stopping you from combining
    this approach with the previous one as needed.


    # Build #2, bundling Qt Designer UIs and Icons


    We''ve now managed to build a simple app with a single external icon file as a
    dependency. Now for something a bit more realistic!


    In complex Qt applications it''s common to use Qt Designer to define the the UI,
    including icons on buttons and menus. How can we distribute UI files with our
    applications and ensure the linked icons continue to work as expected?


    Below is the UI for a demo application we''ll use to demonstrate this. The app
    is a simple counter, which allows you to increase, decrease or reset the counter
    by clicking the respective buttons. You can also [download the source code and
    associated files](http://download.mfitzp.com/counter-pyinstaller-windows.zip).'
