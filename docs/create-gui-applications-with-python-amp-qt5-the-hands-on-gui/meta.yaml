    \ block hidden\n    # hidden for clarity.\n```\n\nIf you add this to your model's\
    \ data handler, all negative numbers will now appear red.\n\n![Figure 148. QTableView\
    \ text formatting, with red negative numbers](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_310_0.png)"
  mdcn: "`data` 方法在调用时会传入两个值：`index` 和 `role`。`index` 参数提供了当前请求信息的表格位置，并有两个方法 `.row()`\
    \ 和 `.column()`，分别给出*视图中*的行号和列号。在我们的示例中，数据以嵌套列表的形式存储，行和列索引按如下方式用于索引：`data[row][column]`。\n\
    \n视图并不了解源数据的结构，模型负责在视图的*行*和*列*与你自身数据存储中的相关位置之间进行转换。\n\n`role` 参数描述了该方法在此次调用中应返回何种*类型*的信息。为了获取要显示的数据，视图会以\
    \ `Qt.DisplayRole` 作为 `role` 调用此模型方法。然而，`role` 可以有许多其他值，包括 `Qt.BackgroundRole`、`Qt.CheckStateRole`、`Qt.DecorationRole`、`Qt.FontRole`、`Qt.TextAlignmentRole`\
    \ 和 `Qt.ForegroundRole`，每个值都期望特定的响应值（稍后介绍）。\n\n> \U0001F4A1 `Qt.DisplayRole` 实际上期望返回一个字符串，尽管其他基本\
    \ Python 类型（包括 `float`、`int` 和 `bool`）也会使用其默认字符串表示进行显示。但是，通常更倾向于将这些类型格式化为你的字符串。\n\
    \n我们将在后面介绍如何使用这些其他角色类型，目前只需知道在返回数据进行显示之前，你**必须**检查角色类型是否为 `Qt.DisplayRole`。\n\n\
    两个自定义方法 `columnCount` 和 `rowCount` 返回我们数据结构中的列数和行数。对于我们这里使用的嵌套列表结构，行数就是外部列表中的元素数量，列数是**其中一个**内部列表中的元素数量——假设它们都相等。\n\
    \n> 如果这些方法返回的值过高，你会看到越界错误；如果返回的值过低，你会看到表格被截断。\n\n## 格式化数字和日期\n\n模型返回用于显示的数据预期是字符串。虽然\
    \ `int` 和 `float` 值也会使用其默认字符串表示进行显示，但复杂的 Python 类型则不会。要显示这些类型，或者要覆盖 `float`、`int`\
    \ 或 `bool` 值的默认格式，你必须自己将这些类型格式化为字符串。\n\n你可能会想通过预先将数据转换为字符串表格来实现这一点。然而，这样做会使你在表格中继续处理数据变得非常困难，无论是进行计算还是更新。\n\
    \n相反，你应该使用模型的 `data` 方法按需执行字符串转换。通过这样做，你可以继续处理原始数据，同时完全控制其呈现给用户的方式——包括通过配置动态更改。\n\
    \n下面是一个简单的自定义格式化程序，它查找我们数据表中的值，并根据数据的 Python `type` 以多种不同方式显示它们。\n\n清单 87. tableview_format_1.py\n\
    \n```python\nimport sys\nfrom datetime import datetime ①\n\nfrom PySide2 import\
    \ QtCore, QtGui, QtWidgets\nfrom PySide2.QtCore import Qt\n\n\nclass TableModel(QtCore.QAbstractTableModel):\n\
    \    def __init__(self, data):\n        super().__init__()\n        self._data\
    \ = data\n\n    def data(self, index, role):\n        if role == Qt.DisplayRole:\n\
    \            # Get the raw value\n            value = self._data[index.row()][index.column()]\n\
    \n            # Perform per-type checks and render accordingly.\n            if\
    \ isinstance(value, datetime):\n                # Render time to YYYY-MM-DD.\n\
    \                return value.strftime(\"%Y-%m-%d\")\n\n            if isinstance(value,\
    \ float):\n                # Render float to 2 dp\n                return \"%.2f\"\
    \ % value\n\n            if isinstance(value, str):\n                # Render\
    \ strings with quotes\n                return '\"%s\"' % value\n\n           \
    \ # Default (anything not captured above: e.g. int)\n            return value\n\
    \n    def rowCount(self, index):\n        return len(self._data)\n\n    def columnCount(self,\
    \ index):\n        return len(self._data[0])\n```\n\n① 注意文件顶部的额外导入 `from datetime\
    \ import datetime`。\n\n将此与下面修改后的示例数据一起使用以查看其实际效果。\n\n```python\ndata = [\n   \
    \ [4, 9, 2],\n    [1, -1, 'hello'],\n    [3.023, 5, -5],\n    [3, 3, datetime(2017,10,1)],\n\
    \    [7.555, 8, 9],\n]\n```\n\n![图 146. 自定义数据格式](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_307_0.png)\n\
    \n到目前为止，我们只研究了如何自定义数据本身的格式。然而，模型接口让你对表格单元格的显示有更多控制，包括颜色和图标。在下一部分，我们将研究如何使用模型来自定义\
    \ `QTableView` 的外观。\n\n## 使用角色设置样式和颜色\n\n使用颜色和图标来突出显示数据表中的单元格，可以帮助数据更易于查找和理解，或帮助用户选择或标记感兴趣的数据。Qt\
    \ 允许通过响应 `data` 方法上的相关 `role`，从模型完全控制所有这些。\n\n响应各种 `role` 类型所期望返回的类型如下所示。\n\n\
    | 角色 | 类型 |\n|---|---|\n| Qt.BackgroundRole | QBrush (也可是 QColor) |\n| Qt.CheckStateRole\
    \ | Qt.CheckState |\n| Qt.DecorationRole | QIcon, QPixmap, QColor |\n| Qt.DisplayRole\
    \ | QString (也可是 int, float, bool) |\n| Qt.FontRole | QFont |\n| Qt.SizeHintRole\
    \ | QSize |\n| Qt.TextAlignmentRole | Qt.Alignment |\n| Qt.ForegroundRole | QBrush\
    \ (也可是 QColor) |\n\n通过响应特定的 `role` 和 `index` 组合，我们可以修改表格中特定单元格、列或行的外观——例如，为第 3\
    \ 列的所有单元格设置蓝色背景。\n\n清单 88. tableview_format_2.py\n\n```python\ndef data(self,\
    \ index, role):\n    if role == Qt.BackgroundRole and index.column() == 2:\n \
    \       # See below for the data structure.\n        return QtGui.QColor(Qt.blue)\n\
    \n    # existing `if role == Qt.DisplayRole:` block hidden\n    # hidden for clarity.\n\
    ```\n\n通过使用 `index` 从我们自己的数据中查找值，我们还可以根据数据中的值自定义外观。我们将在下面介绍一些更常见的用例。\n\n## 文本对齐\n\
    \n在我们之前的格式化示例中，我们使用了文本格式来显示保留 2 位小数的 `float`。然而，在显示数字时，通常也会将它们右对齐，以便更容易比较数字列表。这可以通过在响应\
    \ `Qt.TextAlignmentRole` 时为任何数值返回 `Qt.AlignRight` 来实现。\n\n修改后的 `data` 方法如下所示。我们检查\
    \ `role == Qt.TextAlignmentRole`，并像以前一样通过索引查找值，然后确定该值是否为数值。如果是，我们可以返回 `Qt.AlignVCenter\
    \ + Qt.AlignRight` 以垂直居中、水平右对齐。\n\n清单 89. tableview_format_3.py\n\n```python\n\
    def data(self, index, role):\n    if role == Qt.TextAlignmentRole:\n        value\
    \ = self._data[index.row()][index.column()]\n\n        if isinstance(value, int)\
    \ or isinstance(value, float):\n            # Align right, vertical middle.\n\
    \            return Qt.AlignVCenter | Qt.AlignRight\n\n    # existing `if role\
    \ == Qt.DisplayRole:` block hidden\n    # hidden for clarity.\n```\n\n> 其他对齐方式也是可能的，包括\
    \ `Qt.AlignHCenter` 用于水平居中对齐。你可以通过 OR 运算将它们组合在一起，例如 `Qt.AlignBottom | Qt.AlignRight`。\n\
    \n![图 147. QTableView 单元格对齐](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_309_0.png)\n\
    \n## 文本颜色\n\n如果你使用过像 Excel 这样的电子表格，你可能熟悉*条件格式*的概念。这些是你可以应用于单元格（或行、或列）的规则，它们会根据单元格的值更改文本和背景颜色。\n\
    \n这对于可视化数据很有用，例如，对负数使用红色，或用蓝色到红色的渐变色突出显示数字范围（例如，低 ... 高）。\n\n首先，下面的示例实现了一个处理程序，它检查索引单元格中的值是否为数值且小于零。如果是，则处理程序返回文本（前景）颜色为红色。\n\
    \n*清单 90. tableview_format_4.py*\n\n```python\ndef data(self, index, role):\n\
    \    if role == Qt.ForegroundRole:\n        value = self._data[index.row()][index.column()]\n\
    \n        if (isinstance(value, int) or isinstance(value, float)) and value <\
    \ 0:\n            return QtGui.QColor(\"red\")\n\n    # existing `if role == Qt.DisplayRole:`\
    \ block hidden\n    # hidden for clarity.\n```\n\n如果你将此添加到模型的数据处理程序中，所有负数现在都将显示为红色。\n\
    \n![图 148. QTableView 文本格式，负数为红色](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_310_0.png)"
