  md: 'Computers store data in binary, a series of on and off states represented in
    written form as 1s and 0s. Binary is a base-2 number system. It has 2 digits,
    from 0-1 and each digit in a binary number is worth 2x that which preceded it.
    In the following example, our number 5 is made up of 1x4 and 1x1.


    | 8 | 4 | 2 | 1 | Decimal |

    |---|---|---|---|---|

    | 0 | 1 | 0 | 1 | 5 |


    Writing binary numbers gets cumbersome quickly—5893 in binary is 1011100000101—but
    converting back and forward to decimal is not much better. To make it easier to
    work with binary numbers *hexadecimal* is frequently used in computing. This is
    a numeric system with 16 digits (0-9A-F). Each hexadecimal digit has a value between
    0-15 (0-A) equivalent to 4 binary digits. This makes it straightforward to convert
    between the two.


    The table below shows the numbers 0-15, together with the same value in binary
    and hexadecimal. The value of a given binary number can be calculated by adding
    up the numbers at the top of each column with a 1 in them.


