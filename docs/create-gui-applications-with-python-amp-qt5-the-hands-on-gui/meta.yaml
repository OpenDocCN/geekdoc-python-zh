    \ ③\n\napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\n\
    app.exec_()\n```\n\n① Common Qt widgets are always imported from the `QtWidgets`\
    \ namespace.\n\n② We must always call the `__init__` method of the `super()` class.\n\
    \n③ Use `.setCentralWidget` to place a widget in the `QMainWindow`.\n\n> When\
    \ you subclass a Qt class you must **always** call the super `__init__` function\
    \ to allow Qt to set up the object.\n\nIn our `__init__` block we first use `.setWindowTitle()`\
    \ to change the title of our main window. Then we add our first widget — a `QPushButton`\
    \ — to the middle of the window. This is one of the basic widgets available in\
    \ Qt. When creating the"
  merge: -1
  pgno: 20
- img_proc: true
  md: 'button you can pass in the text that you want the button to display.


    Finally, we call `.setCentralWidget()` on the window. This is a `QMainWindow`
    specific function that allows you to set the widget that goes in the middle of
    the window.


    > **🚀 Run it!** You will now see your window again, but this time with the `QPushButton`
    widget in the middle. Pressing the button will do nothing, we''ll sort that next.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_21_0.png)


    *Figure 5. Our `QMainWindow` with a single `QPushButton` on Windows, macOS and
    Linux.*


    > **Hungry for widgets?**


    We''ll cover more widgets in detail shortly but if you''re impatient and would
    like to jump ahead you can take a look at the [QWidget documentation](https://doc.qt.io/qt-5/qwidget.html).
    Try adding the different widgets to your window!


    # ## Sizing windows and widgets


    The window is currently freely resizable—if you grab any corner with your mouse
    you can drag and resize it to any size you want. While it''s good to let your
    users resize your applications, sometimes you may want to place restrictions on
    minimum or maximum sizes, or lock a window to a fixed size.


    In Qt sizes are defined using a `QSize` object. This accepts *width* and *height*'
  merge: -1
  pgno: 21
- img_proc: true
  md: "parameters in that order. For example, the following will create a *fixed size*\
    \ window of 400x300 pixels.\n\n*Listing 5. basic/creating_a_window_end.py*\n\n\
