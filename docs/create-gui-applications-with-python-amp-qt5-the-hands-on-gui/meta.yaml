    | `bottom` | Length | If position is relative (the default), moves a subcontrol
    by a certain offset up; specifying bottom: y is then equivalent to specifying
    top: -y. If position is absolute, the bottom property specifies the subcontrol''s
    bottom edge in relation to the parent''s bottom edge (see also subcontrol-origin).
    |

    | `left` | Length | If position=relative move a subcontrol right by the given
    offset (i.e. specifies additional space on the left). If position is absolute,
    specifies the distance from the left edge of the parent. |

    | `right` | Length | If position=relative move a subcontrol left by the given
