- img_proc: true
  md: "```\n<!DOCTYPE RCC>\n<RCC version=\"1.0\">\n    <qresource prefix=\"icons\"\
    >\n        <file alias=\"animal-penguin.png\">animal-penguin.png</file>\n    </qresource>\n\
    </RCC>\n```\n\nThe name between the `<file>` `</file>` tags is the path to the\
    \ file, relative to the resource file. The `alias` is the name which this resource\
    \ will be known by from within your application. You can use this *rename* icons\
    \ to something more logical or simpler in your app, while keeping the original\
    \ name externally.\n\nFor example, if we wanted to use the name `penguin.png`\
    \ internally, we could change this line to.\n\n```\n<file alias=\"penguin.png\"\
    >animal-penguin.png</file>\n```\n\n> This only changes the name used *inside*\
    \ your application, the filename remains unchanged.\n\nOutside this tag is the\
    \ `qresource` tag which specifies a `prefix`. This is a *namespace* which can\
    \ be used to group resources together. This is effectively a virtual folder, under\
    \ which nested resources can all be found.\n\n# Using a QRC file\n\nTo use a `.qrc`\
    \ file in your application you first need to compile it to Python. PySide2 comes\
    \ with a command line tool to do this, which takes a `.qrc` file as input and\
    \ outputs a Python file containing the compiled data. This can then be imported\
    \ into your app as for any other Python file or module.\n\nTo compile our `resources.qrc`\
    \ file to a Python file named `resources.py` we can use —"
