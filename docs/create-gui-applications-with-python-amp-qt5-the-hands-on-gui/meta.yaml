  md: 'Listing 124. further/systray.py


    ```

    from PySide2.QtWidgets import QApplication, QSystemTrayIcon,

    QColorDialog, QMenu, QAction

    from PySide2.QtGui import QIcon


    import sys


    app = QApplication(sys.argv)

    app.setQuitOnLastWindowClosed(False)


    # Create the icon

    icon = QIcon("icon.png")


    # Create the tray

    tray = QSystemTrayIcon()

    tray.setIcon(icon)

    tray.setVisible(True)


    # Create the menu

    menu = QMenu()

    action = QAction("A menu item")

    menu.addAction(action)


    # Add a Quit option to the menu.

    quit = QAction("Quit")

    quit.triggered.connect(app.quit)

    menu.addAction(quit)


    # Add the menu to the tray

    tray.setContextMenu(menu)


    app.exec_()

    ```


    You''ll notice that there isn''t a QMainWindow, simply because we don''t have
    any window to show. You can create a window as normal without affecting the behavior
    of the system tray icon.'
