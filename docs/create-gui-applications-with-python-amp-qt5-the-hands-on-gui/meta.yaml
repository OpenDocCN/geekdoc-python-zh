  md: '> self.todos = todos or [] will set self.todos to the provided todos value
    if it is truthy (i.e. anything other than an empty list, the bool `False` or None
    the default value), otherwise it will be set to the empty list [].


    To create an instance of this model we can simply do —


    ```

    model = TodoModel()  # create an empty todo list

    ```


    Or to pass in an existing list —


    ```

    todos = [(False, ''an item''), (False, ''another item'')]

    model = TodoModel(todos)

    ```


    # .rowcount()


    The .rowcount() method is called by the view to get the number of rows in the
    current data. This is required for the view to know the maximum index it can request
    from the data store (rowcount - 1). Since we''re using a Python list as our data
    store, the return value for this is simply the len() of the list.


    # .data()


    This is the core of your model, which handles requests for data from the view
    and returns the appropriate result. It receives two parameters index and role.


    index is the position/coordinates of the data which the view is requesting, accessible
    by two methods .row() and .column() which give the position in each dimension.
    For a list view, column can be ignored.


    > For our QListView, the column is always 0 and can be ignored. But you would
    need to use this for 2D data, for example in a spreadsheet view.'
