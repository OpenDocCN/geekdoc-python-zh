    \ plotting/matplotlib_1.py\n\n```\nimport sys\n\nfrom PySide2 import QtWidgets\
    \  # 在matplotlib之前导入PySide2\n\nimport matplotlib\nfrom matplotlib.backends.backend_qt5agg\
    \ import FigureCanvasQTAgg\nfrom matplotlib.figure import Figure\n\nmatplotlib.use(\"\
    Qt5Agg\")\n\n\nclass MplCanvas(FigureCanvasQTAgg):\n    def __init__(self, parent=None,\
    \ width=5, height=4, dpi=100):\n        fig = Figure(figsize=(width, height),\
    \ dpi=dpi)\n        self.axes = fig.add_subplot(111)\n        super().__init__(fig)\n\
    \n\nclass MainWindow(QtWidgets.QMainWindow):\n    def __init__(self):\n      \
    \  super().__init__()\n\n        # 创建matplotlib的FigureCanvasQTAgg对象，\n       \
    \ # 它定义了一组坐标轴作为self.axes。\n        sc = MplCanvas(self, width=5, height=4, dpi=100)\n\
    \        sc.axes.plot([0, 1, 2, 3, 4], [10, 1, 20, 3, 40])\n        self.setCentralWidget(sc)\n\
    \n        self.show()\n\n\napp = QtWidgets.QApplication(sys.argv)\nw = MainWindow()\n\
    app.exec_()\n```\n\n在这种情况下，我们使用 `.setCentralWidget()` 将我们的MplCanvas小部件作为窗口的中心部件添加。这意味着它将占据整个窗口，并随窗口一起调整大小。绘制的数据\
    \ `[0,1,2,3,4]`、`[10,1,20,3,40]` 作为两个数字列表（分别是x和y）提供，这是 `.plot` 方法所要求的。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_588_0.png)\n\
    \n*图234. 一个简单的图表。*\n\n### 图表控件\n\n在PySide2中显示的Matplotlib图表实际上是由 *Agg* 后端渲染为简单的（位图）图像。`FigureCanvasQTAgg`\
    \ 类封装了这个后端，并将生成的图像显示在Qt小部件上。这种架构的效果是，Qt不知道线条和其他图表元素的位置——只知道小部件上任何点击和鼠标移动的x、y坐标。\n\
    \n然而，Matplotlib内置了处理Qt鼠标事件并将其转换为图表交互的功能。这可以通过一个自定义工具栏来控制，该工具栏可以与图表一起添加到你的应用程序中。在本节中，我们将介绍如何添加这些控件，以便我们可以缩放、平移和从嵌入的Matplotlib图表中获取数据。\n\
