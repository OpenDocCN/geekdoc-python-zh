    # Setting Axis Limits


    Sometimes it can be useful to restrict the range of data which is visible on the
    plot, or to lock the axis to a consistent range regardless of the data input (e.g.
    a known min-max range). In PyQtGraph this can be done using the `.setXRange()`
    and `.setYRange()` methods. These force the plot to only show data within the
    specified ranges on each axis.


    Below we set two ranges, one on each axis. The 1st argument is the minimum value
    and the 2nd is the maximum.


    ```

    self.graphWidget.setXRange(5, 20, padding=0)

    self.graphWidget.setYRange(30, 40, padding=0)

    ```


    A optional padding argument causes the range to be set larger than specified by
    the specified fraction (this between 0.02 and 0.1 by default, depending on the
    size of the ViewBox). If you want to remove this padding entirely, pass 0.


    ```

    self.graphWidget.setXRange(5, 20, padding=0)

    self.graphWidget.setYRange(30, 40, padding=0)

    ```


