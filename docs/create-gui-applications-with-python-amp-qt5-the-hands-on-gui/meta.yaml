    \ icon is a free icon from [Freepik](https://www.flaticon.com/authors/freepik).\n\
    \n> \U0001F4A1 The UI was created in Qt Designer as described in this [tutorial](https://www.pythonguis.com/tutorials/first-steps-qt-creator/).\n\
    \n## Resources\n\nThe icons in this project were added to the buttons from within\
    \ Qt Designer.\n\nWhen doing this you have two options —\n\n- 1. add the icons\
    \ as files, and ensure that the relative path locations of icons are maintained\
    \ after installation (not always possible, or fun)\n- 2. add the icons using the\
    \ Qt Resource system\n\nHere we’re using approach (2) because it’s less prone\
    \ to errors.\n\nThe method for Qt Resources in your UI differs depending on whether\
    \ you’re using Qt Creator or Qt Designer standalone. The steps are described below.\n\
    \n## Adding Resources in Qt Designer (Preferred)\n\nIf you’re using the standalone\
    \ Qt Designer, the resource browser is available as a dockable widget, visible\
    \ in the bottom right by default. If the Resource Browser is hidden you can show\
    \ it through the \"View\" menu on the toolbar.\n\nTo add, edit and remove resource\
    \ files click on the pencil icon in the Resource browser panel. This will open\
