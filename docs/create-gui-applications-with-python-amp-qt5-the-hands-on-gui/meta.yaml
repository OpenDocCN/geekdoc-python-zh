    \ s):\n        print(\"click\", s)\n```\n\n## 组织菜单和工具栏\n\n如果你的用户找不到应用程序的操作，他们就无法充分发挥应用的潜力。让操作易于发现是创建用户友好型应用程序的关键。一个常见的错误是试图通过在*所有地方*添加操作来解决这个问题，结果反而让用户感到不知所措和困惑。\n\
    \n将常用和必要的操作放在前面，确保它们易于找到和回忆。想想大多数编辑应用程序中的 **文件** › **保存**。它位于文件菜单的顶部，易于快速访问，并绑定了简单的键盘快捷键\
