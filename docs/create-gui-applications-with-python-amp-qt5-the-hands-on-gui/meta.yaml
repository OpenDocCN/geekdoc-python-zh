  md: '# Authenticating with QSqlDatabase


    In the examples so far we''ve used SQLite database files. But often you''ll want
    to connect to a remote SQL server instead. That requires a few additional parameters,
    including the hostname (where the database is located) and a username and password
    if appropriate.


    ```

    # Create database connection.

    db = QSqlDatabase(''<driver>'')

    db.setHostName(''<localhost>'')

    db.setDatabaseName(''<databasename>'')

    db.setUserName(''<username>'')

    db.setPassword(''<password>'')

    db.open()

    ```


    NOTE: The value of <driver> can be any one of the following [''QSQLITE'', ''QMYSQL'',
    ''QMYSQL3'', ''QODBC'', ''QODBC3'', ''QPSQL'', ''QPSQL7'']. To get this list on
    your system run QSqlDatabase::drivers().


    That''s it! Once the connection is established, the models will behave exactly
    as before.'
