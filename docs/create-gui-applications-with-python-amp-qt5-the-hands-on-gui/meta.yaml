- md: "## QDataWidgetMapper\n\nIn all the examples so far we've displayed the output\
    \ data from the database in a table, using `QTableView`. While this often makes\
    \ sense for *viewing* data, for data input or editing it is usually preferable\
    \ to display the inputs as a form which can be typed into and tabbed between.\n\
    \n> These are called create, read, update and delete (CRUD) operations and interfaces.\n\
    \nThe full working example is shown below.\n\nListing 110. databases/widget_mapper.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtSql\
    \ import QSqlDatabase, QSqlTableModel\nfrom PySide2.QtWidgets import (\n    QApplication,\n\
    \    QComboBox,\n    QDataWidgetMapper,\n    QDoubleSpinBox,\n    QFormLayout,\n\
    \    QLabel,\n    QLineEdit,\n    QMainWindow,\n    QSpinBox,\n    QTableView,\n\
    \    QWidget,\n)\n\ndb = QSqlDatabase(\"QSQLITE\")\ndb.setDatabaseName(\"chinook.sqlite\"\
    )\ndb.open()\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n    \
    \    super().__init__()\n\n        form = QFormLayout()\n\n        self.track_id\
    \ = QSpinBox()\n        self.track_id.setRange(0, 2147483647)\n        self.track_id.setDisabled(True)\n\
    \        self.name = QLineEdit()\n        self.album = QComboBox()\n        self.media_type\
    \ = QComboBox()\n        self.genre = QComboBox()\n        self.composer = QLineEdit()\n\
    \n        self.milliseconds = QSpinBox()\n        self.milliseconds.setRange(0,\
    \ 2147483647) ①\n        self.milliseconds.setSingleStep(1)\n\n        self.bytes\
    \ = QSpinBox()\n        self.bytes.setRange(0, 2147483647)\n        self.bytes.setSingleStep(1)\n\
    \n        self.unit_price = QDoubleSpinBox()\n        self.unit_price.setRange(0,\
    \ 999)\n        self.unit_price.setSingleStep(0.01)\n        self.unit_price.setPrefix(\"\
    $\")\n\n        form.addRow(QLabel(\"Track ID\"), self.track_id)\n        form.addRow(QLabel(\"\
    Track name\"), self.name)\n        form.addRow(QLabel(\"Composer\"), self.composer)\n\
    \        form.addRow(QLabel(\"Milliseconds\"), self.milliseconds)\n        form.addRow(QLabel(\"\
    Bytes\"), self.bytes)\n        form.addRow(QLabel(\"Unit Price\"), self.unit_price)\n\
    \n        self.model = QSqlTableModel(db=db)\n\n        self.mapper = QDataWidgetMapper()\
    \ ②\n        self.mapper.setModel(self.model)\n\n        self.mapper.addMapping(self.track_id,\
    \ 0) ③\n        self.mapper.addMapping(self.name, 1)\n        self.mapper.addMapping(self.composer,\
    \ 5)\n        self.mapper.addMapping(self.milliseconds, 6)\n        self.mapper.addMapping(self.bytes,\
    \ 7)\n        self.mapper.addMapping(self.unit_price, 8)\n\n        self.model.setTable(\"\
    Track\")\n        self.model.select() ④\n\n        self.mapper.toFirst() ⑤\n\n\
    \        self.setMinimumSize(QSize(400, 400))\n\n        widget = QWidget()\n\
    \        widget.setLayout(form)\n        self.setCentralWidget(widget)\n\napp\
    \ = QApplication(sys.argv)\nwindow = MainWindow()\nwindow.show()\napp.exec_()\n\
    ```\n\n① Widgets must be configured to accept all valid values from the table.\n\
    \n② One QDataWidgetMapper for all widgets.\n\n③ We map each widget to a column\
    \ in the model by index.\n\n④ We load the data from the table into the model.\n\
    \n⑤ We move to the first record in the model, which populates the widgets.\n\n\
    If you run this you can search the database using each of the fields independently,\
    \ with the results updating automatically each time the search query changes.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_348_0.png)\n\nFigure 164. The result\
    \ of the multi-parameter search query.\n\nIn this last example we add three search\
    \ fields — one for the track title, one for the artist and one for the album title.\
    \ We connect the `.textChanged` signals from each of these to a custom method\
    \ that updates the parameters for the query.\n\nListing 109. databases/tableview_querymodel_search.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtSql\
    \ import QSqlDatabase, QSqlQuery, QSqlQueryModel\nfrom PySide2.QtWidgets import\
    \ (\n    QApplication,\n    QHBoxLayout,\n    QLineEdit,\n    QMainWindow,\n \
    \   QTableView,\n    QVBoxLayout,\n    QWidget,\n)\n\ndb = QSqlDatabase(\"QSQLITE\"\
    )\ndb.setDatabaseName(\"chinook.sqlite\")\ndb.open()\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        container = QWidget()\n\
    \        layout_search = QHBoxLayout()\n\n        self.track = QLineEdit()\n \
    \       self.track.setPlaceholderText(\"Track name...\")\n        self.track.textChanged.connect(self.update_query)\n\
    \n        self.composer = QLineEdit()\n        self.composer.setPlaceholderText(\"\
    Artist name...\")\n        self.composer.textChanged.connect(self.update_query)\n\
    \n        self.album = QLineEdit()\n        self.album.setPlaceholderText(\"Album\
    \ name...\")\n        self.album.textChanged.connect(self.update_query)\n\n  \
    \      layout_search.addWidget(self.track)\n        layout_search.addWidget(self.composer)\n\
    \        layout_search.addWidget(self.album)\n\n        layout_view = QVBoxLayout()\n\
    \        layout_view.addLayout(layout_search)\n\n        self.table = QTableView()\n\
    \        layout_view.addWidget(self.table)\n\n        container.setLayout(layout_view)\n\
    \n        self.model = QSqlQueryModel()\n        self.table.setModel(self.model)\n\
    \n        self.query = QSqlQuery(db=db)\n\n        self.query.prepare(\n     \
    \       \"SELECT Name, Composer, Album.Title FROM Track \"\n            \"INNER\
    \ JOIN Album ON Track.AlbumId=Album.AlbumId WHERE \"\n            \"Track.Name\
    \ LIKE '%' || :track_name || '%' AND \"\n            \"Track.Composer LIKE '%'\
    \ || :track_composer || '%' AND \"\n            \"Album.Title LIKE '%' || :album_title\
    \ || '%'\"\n        )\n\n        self.update_query()\n\n        self.setMinimumSize(QSize(1024,\
    \ 600))\n        self.setCentralWidget(container)\n\n    def update_query(self,\
    \ s=None):\n\n        # Get the text values from the widgets.\n        track_name\
    \ = self.track.text()\n        track_composer = self.composer.text()\n       \
    \ album_title = self.album.text()\n\n        self.query.bindValue(\":track_name\"\
    , track_name)\n        self.query.bindValue(\":track_composer\", track_composer)\n\
    \        self.query.bindValue(\":album_title\", album_title)\n\n        self.query.exec_()\n\
    \        self.model.setQuery(self.query)\n\napp = QApplication(sys.argv)\nwindow\
    \ = MainWindow()\nwindow.show()\napp.exec_()\n```\n\nThis parameterized query\
    \ is the equivalent of the following SQL —\n\n```sql\nSELECT Name, Composer, Album.Title\
    \ FROM Track\nINNER JOIN Album ON Track.AlbumId = Album.AlbumId\nWHERE Album.Title\
    \ LIKE '%Sinatra%'\n```\n\nThis gives the following result —\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_345_0.png)\n\
    \nNow that we want to add parameters to the query, we cannot pass it to `QSqlQuery`\
    \ as it is created. Doing this would execute it immediately, without the parameter-replacement.\
    \ Instead we now need to pass the query into `.prepare()`, telling the driver\
    \ to identify parameters in the query and wait for the values.\n\nNext, we bind\
    \ each of our parameters using `.bindValue()` and finally call `query.exec_()`\
    \ to actually perform the query on the database.\n\nListing 108. databases/tableview_querymodel_parameter.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtSql\
    \ import QSqlDatabase, QSqlQuery, QSqlQueryModel\nfrom PySide2.QtWidgets import\
    \ QApplication, QMainWindow, QTableView\n\ndb = QSqlDatabase(\"QSQLITE\")\ndb.setDatabaseName(\"\
    chinook.sqlite\")\ndb.open()\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n\n        self.table = QTableView()\n\n        self.model\
    \ = QSqlQueryModel()\n        self.table.setModel(self.model)\n\n        query\
    \ = QSqlQuery(db=db)\n        query.prepare(\n            \"SELECT Name, Composer,\
    \ Album.Title FROM Track \"\n            \"INNER JOIN Album ON Track.AlbumId =\
    \ Album.AlbumId \"\n            \"WHERE Album.Title LIKE '%' || :album_title ||\
    \ '%' \"\n        )\n        query.bindValue(\":album_title\", \"Sinatra\")\n\
    \        query.exec_()\n\n        self.model.setQuery(query)\n        self.setMinimumSize(QSize(1024,\
    \ 600))\n        self.setCentralWidget(self.table)\n\napp = QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec_()\n```\n\nIn the following example\
    \ we extend the simple query to add a related look up on the *album* table. In\
    \ addition we bind a `album_title` parameter which is used for a *contains* search\
    \ against the album table.\n\n> Parameterized queries protect your app from SQL\
    \ injection attacks.\n\nIn this first example we've performed a very simple query\
    \ against our *track* table, only returning two fields from that table. However,\
    \ the `QSqlQuery` object can be used for more complex queries, including cross-table\
    \ joins and parameterized queries — where we can pass values in to modify the\
    \ query.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_343_0.png)\n\nFigure 162.\
    \ Performing a simple query."
  mdcn: "## QDataWidgetMapper\n\n到目前为止的所有示例中，我们都使用 `QTableView` 在表格中显示数据库的输出数据。虽然这对于*查看*数据通常很有意义，但对于数据输入或编辑，通常更倾向于将输入显示为可以键入和切换的表单。\n\
