    \n**动手实践**指南：用 Python 制作应用程序\n\n**PySide2** 版\n\nMartin Fitzpatrick\n\n# 使用 Python\
    \ 和 Qt5 创建 GUI 应用程序\n\n用 Python 制作应用程序的实践指南\n\nMartin Fitzpatrick\n\n版本 4.0，2021-10-25\n\
    \n# 目录\n\n- 引言\n    1. GUI 的*简短*历史\n    2. 关于 Qt 的一些介绍\n    3. 致谢\n    4. 版权声明\n\
    - PySide2 基础功能\n    5. 我的第一个应用程序\n    6. 信号与槽\n    7. 控件\n    8. 布局\n    9. 动作、工具栏与菜单\n\
    \    10. 对话框\n    11. 窗口\n    12. 事件\n- Qt Designer\n    13. 安装 Qt Designer\n\
    \    14. Qt Designer 入门\n    15. Qt 资源系统\n- 主题\n    16. 样式\n    17. 调色板\n    18.\
    \ 图标\n    19. Qt 样式表 (QSS)\n- 模型/视图架构\n    20. 模型/视图架构 — 模型/视图/控制器\n    21. 一个简单的模型/视图\
    \ — 待办事项列表\n    22. 在模型/视图中使用 numpy 和 pandas 处理表格数据\n    23. 使用 Qt 模型查询 SQL 数据库\n\
    - PySide2 进阶功能\n    24. 扩展信号\n    25. 路由\n    26. 处理命令行参数\n    27. 系统托盘与 macOS\
    \ 菜单\n    28. 枚举与 Qt 命名空间\n- 自定义控件\n    29. Qt 中的位图图形\n    30. 创建自定义控件\n- 并发执行\n\
    \    31. 线程与进程简介\n    32. 使用线程池\n    33. 线程示例\n    34. 运行外部命令与进程\n- 绘图\n    35.\
    \ 使用 PyQtGraph 绘图\n    36. 使用 Matplotlib 绘图\n- 打包与分发\n    37. 使用 PyInstaller 打包\n\
    - 示例应用程序\n    38. Mozzarella Ashbadger\n    39. Moonsweeper\n- 附录 A：安装 PySide2\n\
    - 附录 B：将 C++ 示例翻译为 Python\n- 附录 C：PyQt5 与 PySide2 — 有何区别？\n- 附录 D：接下来做什么？\n- 索引\n\
    \n# 引言\n\n如果你想用 Python 创建 GUI 应用程序，可能会觉得不知从何下手。要让*任何东西*运行起来，你需要理解许多新概念。但是，就像任何编码问题一样，第一步是学会以正确的方式处理问题。在本书中，我将带你从\
    \ GUI 开发的基本原理出发，使用 PySide2 创建你自己的、功能齐全的桌面应用程序。\n\n本书第一版于 2016 年发布。此后，根据读者的反馈，它已经更新了\
    \ 4 次，增加和扩展了章节。现在可用的 PySide 资源比我刚开始时更多，但仍然缺乏深入、实用的构建完整应用程序的指南。本书填补了这一空白！\n\n本书以一系列章节的形式编排，依次探讨\
    \ PySide2 的不同方面。章节安排上将较简单的章节放在前面，但如果你的项目有特定需求，不要害怕跳着看！每一章都会引导你学习基本概念，然后通过一系列编码示例，逐步探索并学习如何自己应用这些想法。\n\
    \n你可以从 http://www.pythonguis.com/d/pyside2-source.zip 下载本书所有示例的源代码和资源。\n\n在一本这个篇幅的书中，不可能给你一个关于\
    \ Qt 系统的*完整*概述，因此书中提供了指向外部资源的链接——包括 pythonguis.com 网站和其他地方。如果你发现自己在想“我想知道我能不能做*那个*？”，你能做的最好的事情就是放下这本书，然后*去弄清楚！*\
    \ 只需在此过程中定期备份你的代码，这样即使你搞砸了，也总有东西可以回退。"
