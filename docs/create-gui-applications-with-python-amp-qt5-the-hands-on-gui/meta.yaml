  md: ".toggle_flag() method to toggle a flag on and off.\n\nListing 245. app/minesweeper.py\n\
    \n```\ndef mouseReleaseEvent(self, e):\n\n    if e.button() == Qt.RightButton\
    \ and not self.is_revealed:\n        self.toggle_flag()\n\n    elif e.button()\
    \ == Qt.LeftButton:\n        # Block clicking on flagged mines.\n        if not\
    \ self.is_flagged and not self.is_revealed:\n            self.click()\n```\n\n\
    The methods called by the mouseReleaseEvent handler are defined below.\n\nThe\
    \ .toggle_flag handler simply sets .is_flagged to the inverse of itself (True\
    \ becomes False, False becomes True) having the effect of toggling it on and off.\
    \ Note that we have to call .update() to force a redraw having changed the state.\
    \ We also emit our custom .clicked signal, which is used to start the timer --\
    \ because placing a flag should also count as starting, not just revealing a square.\n\
    \nThe .click() method handles a left mouse click, and in turn triggers the reveal\
    \ of the square. If the number of adjacent mines to this Pos is zero, we trigger\
    \ the .expandable signal to begin the process of auto-expanding the region explored\
    \ (see later). Finally, we again emit .clicked to signal the start of the game.\n\
    \nFinally, the .reveal() method checks whether the tile is already revealed, and\
    \ if not sets .is_revealed to True. Again we call .update() to trigger a repaint\
    \ of the widget.\n\nThe optional emit of the .revealed signal is used only for\
    \ the endgame full-map reveal. Because each reveal triggers a further lookup to\
    \ find what tiles are also revealable, revealing the entire map would create a\
