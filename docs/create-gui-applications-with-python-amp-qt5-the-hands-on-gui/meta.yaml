  md: '# # 9. Actions, Toolbars & Menus


    Next we''ll look at some of the common user interface elements, that you''ve probably
    seen in many other applications — toolbars and menus. We''ll also explore the
    neat system Qt provides for minimising the duplication between different UI areas
    — `QAction`.


    # ## Toolbars


    One of the most commonly seen user interface elements is the toolbar. Toolbars
    are bars of icons and/or text used to perform common tasks within an application,
    for which accessing via a menu would be cumbersome. They are one of the most common
    UI features seen in many applications. While some complex applications, particularly
    in the Microsoft Office suite, have migrated to contextual ''ribbon'' interfaces,
    the standard toolbar is sufficient for the majority of applications you will create.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_97_0.png)


    Qt toolbars support display of icons, text, and can also contain any standard
    Qt widget. However, for buttons the best approach is to make use of the `QAction`
    system to place buttons on the toolbar.


    Let''s start by adding a toolbar to our application.


    > > 💡 Load up a fresh copy of `myapp.py` and save it under a new name for this
    section.


    In Qt toolbars are created from the QToolBar class. To start you create an instance
    of the class and then call `.addToolbar` on the QMainWindow. Passing a string
    in as the first parameter to `QToolBar` sets the toolbar''s name, which will be
    used to identify the toolbar in the UI.'
  merge: -1
  pgno: 97
- img_proc: true
  md: "Listing 35. basic/toolbars_and_menus_1.py\n\n```\nclass MainWindow(QMainWindow):\n\
