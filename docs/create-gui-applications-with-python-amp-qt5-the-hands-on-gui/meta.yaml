    # 👋 A sense of progress


    When a user does something in your application, the consequences of that action
    should be immediately apparent — either through the result of the action itself,
    or through an indication that *something* is being done that will provide the
    result. This is particularly important for long-running tasks, such as calculations
    or network requests, where a lack of feedback could prompt the user to repeatedly
    mash buttons and seeing nothing in return.


    One simple approach is to disable buttons once an operation has been triggered.
    But with no other indicator this looks a lot like "broken". A better alternative
    is to update the button with a "Working" message and an active progress indicator
    nearby. Progress bars are a common way to address this by informing the user of
    what is going on. But don''t fall into the trap of thinking progress bars are
    always useful. They should always present a linear progress towards a task, if
    they don''t they can be worse than no information ---


    Progress bars are not helpful if -


    +   - they go backwards and forward

    - they don''t increase linearly with the task progress

    - they complete too quickly


    Any of these behaviors can give users the sense that *something isn''t right*
    whether "it''s getting worse" to "what was that dialog I missed?" Your users must
    always *feel* in control.'
  - '[PAGE 553]


    # ✓ DO


    +   - Provide progress bars for long-running tasks.

    - Provide granular detail of sub-tasks where appropriate.

    - Estimate how long something will take, when you can.


    # ✗ DON''T


    +   - Assume your users know what tasks are long- and short-running.

    - Use progress bars when you have no idea of progress.

    - Use progress bars that go up and down.'
