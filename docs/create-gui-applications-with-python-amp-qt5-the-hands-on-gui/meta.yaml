    accurately. So far we''ve using the `mouseMoveEvent` on the `QMainWindow` . When
    we only have a single widget in the window this is fine — as long as you don''t
    resize the window, the coordinates of the container and the single nested widget
    line up. However, if we add other widgets to the layout this won''t hold — the
    coordinates of the `QLabel` will be offset from the window, and we''ll be drawing
    in the wrong location.


    This is easily fixed by moving the mouse handling onto the `QLabel` itself— it''s
    event coordinates are always relative to itself. This we wrap up as an individual
    `Canvas` object, which handles the creation of the pixmap surface, sets up the
    x & y locations and the holds the current pen color (set to black by default).


    > 💡 This self-contained `Canvas` is a drop-in drawable surface you could use in
    your own apps.'
