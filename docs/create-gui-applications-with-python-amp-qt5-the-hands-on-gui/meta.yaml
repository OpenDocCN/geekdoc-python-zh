    Figure 42. Our action button with an icon.


    Note that Qt uses your operating system default settings to determine whether
    to show an icon, text or an icon and text in the toolbar. But you can override
    this by using `.setToolButtonStyle`. This slot accepts any of the following flags
    from the `Qt.` namespace:


    | Flag | Behavior |

    | :--- | :--- |

    | `Qt.ToolButtonIconOnly` | Icon only, no text |

    | `Qt.ToolButtonTextOnly` | Text only, no icon |

    | `Qt.ToolButtonTextBesideIcon` | Icon and text, with text beside the icon |

    | `Qt.ToolButtonTextUnderIcon` | Icon and text, with text under the icon |

    | `Qt.ToolButtonFollowStyle` | Follow the host desktop style |


    > **Which style should I use?**


    The default value is `Qt.ToolButtonFollowStyle`, meaning that your application
    will default to following the standard/global setting for the desktop on which
    the application runs. This is generally recommended to make your application feel
    as **native** as possible.


