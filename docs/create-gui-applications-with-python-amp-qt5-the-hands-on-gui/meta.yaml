    \ cost and will block your GUI momentarily. This is usually not perceptible but\
    \ it can add up depending on your use case and may have performance impacts. You\
    \ can get around this by starting your processes in another thread.\n\nIf you\
    \ want to communicate with the process in real-time you will need a separate thread\
    \ to avoid blocking the GUI. `QProcess` handles this separate thread for you internally,\
    \ but with Python `subprocess` you will need to do this yourself.\n\nIn this `QRunner`\
    \ example we use instances of workers to handle starting external processes through\
    \ Python `subprocess`. This keeps the startup cost of the process out of the GUI\
    \ thread and also allows us to interact with the processes directly through Python.\n\
    \nListing 186. concurrent/qrunner_process.py\n\n```python\nimport subprocess\n\
    import sys\nimport time\nimport traceback\nimport uuid\nfrom collections import\
    \ namedtuple\nfrom PySide2.QtCore import (\n    QObject,\n    QRunnable,\n   \
