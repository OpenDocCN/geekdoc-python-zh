    # What’s the event loop?


    Before getting the window on the screen, there are a few key concepts to introduce
    about how applications are organised in the Qt world. If you’re already familiar
    with event loops you can safely skip to the next section.


    The core of every Qt Applications is the `QApplication` class. Every application
    needs one — and only one — `QApplication` object to function. This object holds
    the **event loop** of your application — the core loop which governs all user
    interaction with the GUI.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_17_0.png)


    Each interaction with your application — whether a press of a key, click of a
    mouse, or mouse movement — generates an *event* which is placed on the *event
    queue*. In the event loop, the queue is checked on each iteration and if a waiting
    event is found, the event and control is passed to the specific *event handler*
    for the event. The event handler deals with the event, then passes control back
    to the event loop to wait for more events. There is only **one** running event
    loop per application.'
