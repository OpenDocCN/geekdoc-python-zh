  md: '+   1. Signal emitting a string.

    2. Signal emitting 3 different types.

    3. Signal emitting a list.

    4. Signal emitting a dictionary.

    5. Signal emitting *anything*.


    As you can see the signals can be connected and emitted as normal. You can send
    any Python type, including multiple types, and compound types (e.g. dictionaries,
    lists).


    If you define your signal as `Signal(object)` it will be able to transmit absolutely
    any Python type at all. But this isn''t *usually* a good idea as receiving slots
    will then need to deal with all types.


    > You can create signals on any class that is a subclass of `QObject`. That includes
    all widgets, including the main window and dialog boxes.


    # Forwarding Signals


    Each signal object has an `.emit` method which triggers the sending of data. Like
    any other method this can be used as a *slot* target for a signal. This allows
    you to *chain* signals, so one being triggered can trigger another. Unless you
    modify the data (see the next section) the chained signal must carry the same
    data as the original signal.'
