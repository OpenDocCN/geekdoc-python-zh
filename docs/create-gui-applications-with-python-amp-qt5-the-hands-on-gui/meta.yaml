  - '[PAGE 390]


    values. In PySide2 they are presented as a set of pre-defined class types.


    Each of these values is *actually* a wrapper around a simple integer number. The
    value of `Qt.DisplayRole` is 0, while `Qt.EditRole` has a value of 2. The integer
    values themselves are *meaningless* but have a meaning in the particular context
    in which they are used.


    ```

    >>> int(Qt.DecorationRole)

    1

    ```


    For example, would you expect the following to evaluate to `True`?


    ```

    >>> Qt.DecorationRole == Qt.AlignLeft

    True

    ```


    Probably not. But both `Qt.DecorationRole` and `Qt.AlignLeft` have an integer
    value of 1 and so are numerically equal. These numeric values can usually be ignored.
    As long as you use the constants in their appropriate context they will always
    work as expected.


    *Table 7. Values given in the documentation can be in decimal or binary.*


    | Identifier | Value (hex) | Value (decimal) | Description |

    | :--- | :--- | :--- | :--- |

    | `Qt.AlignLeft` | `0x0001` | 1 | Aligns with the left edge. |

    | `Qt.AlignRight` | `0x0002` | 2 | Aligns with the right edge. |

    | `Qt.AlignHCenter` | `0x0004` | 4 | Centers horizontally in the available space.
    |'
