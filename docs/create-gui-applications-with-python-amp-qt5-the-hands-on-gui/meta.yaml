    Also `border-top-style`, `border-right-style`, `border-bottom-style` and `border-left-style`
    for specific edges. |

    | `border-width` | Box Lengths | The width of the border. Also `border-top-width`,
    `border-right-width`, `border-bottom-width` and `border-left-width`. |'
