  - "[PAGE 260]\n\n| Pseudo-State | Description |\n| :--- | :--- |\n| :window | Widget\
    \ is a window (i.e a top level widget). |\n\nWe can use the QSS tester to see\
    \ pseudo-selectors in action. For example, the following will change the background\
    \ of the QPushButton red when the mouse hovers over the widget.\n\n```\nQPushButton:hover\
    \ {\n    background: red;\n}\n```\n\nThe following will change the background\
    \ of all widgets when they are hovered.\n\n```\n*:hover {\n    background: red;\n\
    }\n```\n\nHovering a widget means all it's parents are also hovered (the mouse\
    \ is within their bounding box) as the image below shows."
  - "[PAGE 261]\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_261_0.png)\n\nFigure 128.\
    \ Left, QPushButton highlighted when hovered. Right, when a widget is hovered\
    \ all parent widgets are also hovered.\n\nYou can also *negate* pseudo-selectors\
    \ using `!`. This means that the rule will become active when that selector is\
    \ inactive. For example the following...\n\n```\nQPushButton:!hover {\n    background:\
    \ yellow;\n}\n```\n\n...will make the QPushButton yellow when it is *not hovered*.\n\
    \nYou can also chain multiple pseudo-selectors together. For example, the following\
    \ will set the background of a `QCheckBox` green when it is *checked* and *not\
    \ hovered*, and yellow when it is *checked* and *hovered*.\n\n```\nQCheckBox:checked:!hover\
    \ {\n    background: green;\n}\n\nQCheckBox:checked:hover {\n    background: yellow;\n\
    }\n```"
  - "[PAGE 262]\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_262_0.png)\n\nFigure 129.\
    \ Chained pseudo selectors for hover state.\n\nAs for all other rules, you can\
    \ also chain them using “,” separators to make the defined rule apply to both\
    \ (or many) cases. For example, the following will set a checkbox background green\
    \ when it is *checked* OR *hovered*.\n\n```\ncss\nQCheckBox:checked, QCheckBox:hover\
    \ {\n    background: yellow;\n}\n```\n\n# Styling Widget Sub controls\n\nMany\
    \ widgets are constructed from a combination of other sub-widgets or *controls*.\
    \ QSS provides syntax for addressing these sub-controls directly, so you can make\
    \ style changes to sub-controls individually. These sub-controls can be addressed\
    \ by using the :: (double-colon) selector, followed by an identifier for the given\
    \ sub control.\n\nA good example of such a widget is the `QComboBox`. The following\
    \ style snip applies a custom style directly to the down-arrow on the right hand\
    \ of the combo box."
  - "[PAGE 263]\n\n```\nQComboBox::drop-down {\n    background: yellow;\n    image:\
