  md: "# 32. Using the thread pool\n\nQt provides a very simple interface for running\
    \ jobs in other threads, which is exposed nicely in PySide2. This is built around\
    \ two classes—`QRunnable` and `QThreadPool`. The former is the container for the\
    \ work you want to perform, while the latter is the manager for your working threads.\n\
    \nThe neat thing about using `QThreadPool` is that it handles queuing and execution\
    \ of workers for you. Other than queuing up jobs and retrieving the results there\
    \ is not very much to do at all.\n\nTo define a custom `QRunnable` you can subclass\
    \ the base `QRunnable` class, then place the code you wish you execute within\
    \ the `run()` method. The following is an implementation of our long running `time.sleep`\
    \ job as a `QRunnable`. Add the following code to `multithread.py`, above the\
    \ `MainWindow` class definition.\n\nListing 167. concurrent/qrunner_1.py\n\n```\n\
    class Worker(QRunnable):\n    \"\"\"\n    Worker thread\n    \"\"\"\n\n    @Slot()\n\
    \    def run(self):\n        \"\"\"\n        Your code goes in this function\n\
    \        \"\"\"\n        print(\"Thread start\")\n        time.sleep(5)\n    \
    \    print(\"Thread complete\")\n```\n\nExecuting our function in another thread\
    \ is simply a matter of creating an instance of the `Worker` and then pass it\
    \ to our `QThreadPool` instance and it will be executed automatically.\n\nNext\
    \ add the following within the `__init__` block, to set up our thread pool."
  merge: -1
  pgno: 479
- img_proc: true
  md: "Listing 168. concurrent/qrunner_1.py\n\n```\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.threadpool\
    \ = QThreadPool()\n        print(\n            \"Multithreading with maximum %d\
    \ threads\" % self.\n            threadpool.maxThreadCount()\n        )\n```\n\
    \nFinally, replace the `oh_no` method with the following.\n\nListing 169. concurrent/qrunner_1.py\n\
    \n```\ndef oh_no(self):\n    worker = Worker()\n    self.threadpool.start(worker)\n\
    ```\n\nNow, clicking on the button will create a worker to handle the (long-running)\
    \ process and spin that off into another thread via the `QThreadPool` pool. If\
    \ there are not enough threads available to process incoming workers, they'll\
    \ be queued and executed in order at a later time.\n\n> \U0001F680 **Run it!**\
    \ You'll see that your application now handles you frantically bashing the button\
    \ with no problems.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_480_0.png)\n\n\
    Figure 210. The simple QRunner example app. The counter will increase by one every\
    \ second — as long as the GUI thread is running."
