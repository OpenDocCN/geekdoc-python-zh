  md: "# Updating from the Meter display\n\nCurrently you can update the current value\
    \ of the PowerBar meter by twiddling with the dial. But it would be nice if you\
    \ could also update the value by clicking a position on the power bar, or by dragging\
    \ you mouse up and down. To do this we can update our `_Bar` widget to handle\
    \ mouse events.\n\nListing 162. custom-widgets/powerbar_9.py\n\n```\nclass _Bar(QtWidgets.QWidget):\n\
    \n    clickedValue = QtCore.Signal(int)\n    def _calculate_clicked_value(self,\
    \ e):\n        parent = self.parent()\n        vmin, vmax = parent.minimum(),\
    \ parent.maximum()\n        d_height = self.size().height() + (self._padding *\
    \ 2)\n        step_size = d_height / self.n_steps\n        click_y = e.y() - self._padding\
    \ - step_size / 2\n\n        pc = (d_height - click_y) / d_height\n        value\
    \ = int(vmin + pc * (vmax - vmin))\n        self.clickedValue.emit(value)\n\n\
    \    def mouseMoveEvent(self, e):\n        self._calculate_clicked_value(e)\n\n\
    \    def mousePressEvent(self, e):\n        self._calculate_clicked_value(e)\n\
    ```\n\nIn the `__init__` block for the `PowerBar` widget we can connect to the\
    \ `_Bar.clickedValue` signal and send the values to `self._dial.setValue` to set\
    \ the current value on the dial.\n\n```\n# Take feedback from click events on\
    \ the meter.\nself._bar.clickedValue.connect(self._dial.setValue)\n```\n\nIf you\
    \ run the widget now, you'll be able to click around in the bar area and the value\
    \ will update, and the dial rotate in sync."
