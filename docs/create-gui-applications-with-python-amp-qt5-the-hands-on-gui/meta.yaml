  md: '# # 35. Plotting with PyQtGraph


    While it is possible to embed `matplotlib` plots in PySide2 the experience does
    not feel entirely *native*. For simple and highly interactive plots you may want
    to consider using PyQtGraph instead. PyQtGraph is built on top of PySide2 native
    `QGraphicsScene` giving better drawing performance, particularly for live data,
    as well as providing interactivity and the ability to easily customize plots with
    Qt graphics widgets.


    In this chapter we''ll walk through the first steps of creating a plot widget
    with PyQtGraph and then demonstrate plot customization using line colors, line
    type, axis labels, background color and plotting multiple lines.


    # ## Getting started


    To be able to use PyQtGraph with PySide2 you first need to install the package
    to your Python environment. You can do this using `pip`.


    ```

    bash

    pip install pyqtgraph

    ```


    Once the installation is complete you should be able to import the module as normal.


    # ## Creating a PyQtGraph widget


    In PyQtGraph all plots are created using the `PlotWidget` widget. This widget
    provides a contained *canvas* on which plots of any type can be added and configured.
    Under the hood, this plot widget uses Qt native `QGraphicsScene` meaning it fast
    and efficient yet simple to integrate with the rest of your app. You can create
    a `PlotWidget` as for any other widget.


    The basic template app, with a single `PlotWidget` in a `QMainWindow` is shown
    below.'
