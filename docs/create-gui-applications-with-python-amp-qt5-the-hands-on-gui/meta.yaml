    ```


    Check what happens if you hit the button multiple times. You should see your threads
    executed immediately *up to* the number reported by `.maxThreadCount`. If you
    hit the button again after there are already this number of active workers, the
    subsequent workers will be queued until a thread becomes available.


    In this example we''ve let `QThreadPool` decide the *ideal* number of active threads
    to use. This number differs on different computers and is designed to get the
    optimum performance. However, sometimes you have a need for a *specific* number
    of threads — in that case, you can use `.setMaxThreadCount` to set this value
    explicitly. This value is *per thread pool*.


    # Extended Runners


    If you want to pass custom data into the execution function you can set up your
    runner to take *arguments* or *keywords* and then store that data on the `QRunner
    self` object. The data will then be accessible from within the `run` method.'
