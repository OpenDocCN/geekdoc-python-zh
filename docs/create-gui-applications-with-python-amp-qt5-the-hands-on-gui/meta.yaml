- md: "## Thread IO\n\nSometimes it’s helpful to be able to pass back *state* and\
    \ *data* from running workers. This could include the outcome of calculations,\
    \ raised exceptions or ongoing progress (think progress bars). Qt provides the\
    \ *signals and slots* framework which allows you to do just that and is thread-safe,\
    \ allowing safe communication directly from running threads to your GUI frontend.\
    \ *Signals* allow you to `.emit` values, which are then picked up elsewhere in\
    \ your code by *slot* functions which have been linked with `.connect`.\n\nBelow\
    \ is a simple `WorkerSignals` class defined to contain a number of example signals.\n\
    \n> Custom signals can only be defined on objects derived from `QObject`. Since\
    \ `QRunnable` is not derived from `QObject` we can't define the signals there\
    \ directly. A custom `QObject` to hold the signals is the simplest solution.\n\
    \n*Listing 171. concurrent/qrunner_3.py*\n\n```python\nclass WorkerSignals(QObject):\n\
    \    \"\"\"\n    Defines the signals available from a running worker thread.\n\
    \n    Supported signals are:\n\n    finished\n        No data\n\n    error\n \
    \       `str` Exception string\n\n    result\n        `dict` data returned from\
    \ processing\n\n    \"\"\"\n\n    finished = Signal()\n    error = Signal(str)\n\
    \    result = Signal(dict)\n```\n\nIn this example we've defined 3 custom signals:\n\
    \n1.  *finished* signal, with no data to indicate when the task is complete.\n\
    2.  *error* signal which receives a `tuple` of `Exception` type, `Exception` value\
    \ and formatted traceback.\n3.  *result* signal receiving any `object` type from\
    \ the executed function.\n\nYou may not find a need for all of these signals,\
    \ but they are included to give an indication of what is possible. In the following\
    \ code we use these signals to notify about completion and errors in a simple\
    \ calculation worker.\n\n*Listing 172. concurrent/qrunner_3.py*\n\n```python\n\
    import random\nimport sys\nimport time\n\nfrom PySide2.QtCore import QObject,\
    \ QRunnable, QThreadPool, QTimer,\n    Signal, Slot\nfrom PySide2.QtWidgets import\
    \ (\n    QApplication,\n    QLabel,\n    QMainWindow,\n    QPushButton,\n    QVBoxLayout,\n\
    \    QWidget,\n)\n\nclass WorkerSignals(QObject):\n    \"\"\"\n    Defines the\
    \ signals available from a running worker thread.\n\n    Supported signals are:\n\
    \n    finished\n        No data\n\n    error\n        `str` Exception string\n\
    \n    result\n        `dict` data returned from processing\n    \"\"\"\n\n   \
    \ finished = Signal()\n    error = Signal(str)\n    result = Signal(dict)\n\n\
    class Worker(QRunnable):\n    \"\"\"\n    Worker thread\n\n    :param args: Arguments\
    \ to make available to the run code\n    :param kwargs: Keywords arguments to\
    \ make available to the run\n    :code\n    :\n    \"\"\"\n\n    def __init__(self,\
    \ iterations=5):\n        super().__init__()\n        self.signals = WorkerSignals()\
    \  # Create an instance of our signals class.\n        self.iterations = iterations\n\
    \n    @Slot()\n    def run(self):\n        \"\"\"\n        Initialize the runner\
    \ function with passed self.args,\n        self.kwargs.\n        \"\"\"\n    \
    \    try:\n            for n in range(self.iterations):\n                time.sleep(0.01)\n\
    \                v = 5 / (40 - n)\n\n        except Exception as e:\n        \
    \    self.signals.error.emit(str(e))\n\n        else:\n            self.signals.finished.emit()\n\
    \            self.signals.result.emit({\"n\": n, \"value\": v})\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.threadpool\
    \ = QThreadPool()\n        print(\n            \"Multithreading with maximum %d\
    \ threads\" % self.threadpool.maxThreadCount()\n        )\n\n        self.counter\
    \ = 0\n\n        layout = QVBoxLayout()\n\n        self.l = QLabel(\"Start\")\n\
    \        b = QPushButton(\"DANGER!\")\n        b.pressed.connect(self.oh_no)\n\
    \n        layout.addWidget(self.l)\n        layout.addWidget(b)\n\n        w =\
    \ QWidget()\n        w.setLayout(layout)\n\n        self.setCentralWidget(w)\n\
    \n        self.show()\n\n        self.timer = QTimer()\n        self.timer.setInterval(1000)\n\
    \        self.timer.timeout.connect(self.recurring_timer)\n        self.timer.start()\n\
    \n    def oh_no(self):\n        worker = Worker(iterations=random.randint(10,\
    \ 50))\n        worker.signals.result.connect(self.worker_output)\n        worker.signals.finished.connect(self.worker_complete)\n\
    \        worker.signals.error.connect(self.worker_error)\n        self.threadpool.start(worker)\n\
    \n    def worker_output(self, s):\n        print(\"RESULT\", s)\n\n    def worker_complete(self):\n\
    \        print(\"THREAD COMPLETE!\")\n\n    def worker_error(self, t):\n     \
    \   print(\"ERROR: %s\" % t)\n\n    def recurring_timer(self):\n        self.counter\
    \ += 1\n        self.l.setText(\"Counter: %d\" % self.counter)\n\napp = QApplication(sys.argv)\n\
    window = MainWindow()\napp.exec_()\n```\n\nYou can connect your own handler functions\
    \ to these signals to receive notification of completion (or the result) of threads.\
    \ The example is designed to occasionally throw a *division by zero* exception,\
