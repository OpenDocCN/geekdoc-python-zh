    \ app/browser.py\n\n```python\ndef navigate_home(self):\n    self.browser.setUrl(QUrl(\"\
    http://www.google.com\"))\n```\n\n> 挑战\n尝试使主页导航位置可配置。您可以创建一个带有输入字段的首选项 QDialog。\n\
    \n任何像样的网络浏览器还需要一个 URL 栏，以及某种方式来停止导航——无论是误操作还是页面加载时间过长。\n\n清单 216. app/browser.py\n\
    \n```python\nself.httpsicon = QLabel()  # Yes, really!\nself.httpsicon.setPixmap(QPixmap(os.path.join(\"\
    icons\", \"lock-nossl.png\")))\nnavtb.addWidget(self.httpsicon)\n\nself.urlbar\
    \ = QLineEdit()\nself.urlbar.returnPressed.connect(self.navigate_to_url)\nnavtb.addWidget(self.urlbar)\n\
    \nstop_btn = QAction(\n    QIcon(os.path.join(\"icons\", \"cross-circle.png\"\
    )), \"Stop\",\n    self\n)\nstop_btn.setStatusTip(\"Stop loading current page\"\
    )\nstop_btn.triggered.connect(self.browser.stop)\nnavtb.addAction(stop_btn)\n\
    ```\n\n与之前一样，'停止' 功能在 `QWebEngineView` 上可用，我们可以简单地将停止按钮的 `.triggered` 信号连接到现有的槽。然而，URL\
    \ 栏的其他功能我们必须独立处理。\n\n首先，我们添加一个 `QLabel` 来容纳我们的 SSL 或非 SSL 图标，以指示页面是否安全。接下来，我们添加\
    \ URL 栏，它只是一个 `QLineEdit`。为了在输入（按下回车键）时触发加载栏中的 URL，我们将部件的 `.returnPressed` 信号连接到一个自定义槽函数，以触发导航到指定的\
    \ URL。"
