  md: '# Basic PySide2 Features


    It’s time to take your first steps in creating GUI applications with PySide2!


    In this chapter you will be introduced to the basics of PySide2 that are the foundations
    of any application you create. We will develop a simple windowed application on
    your desktop. We’ll add widgets, arrange them using layouts and connect these
    widgets to functions, allowing you to trigger application behavior from your GUI.


    Use the provided code as your guide, but always feel free to experiment. That’s
    the best way to learn how things work.


    > Before you get started, you need a working installation of PySide2. If you don’t
    have one yet, check out [Installing PySide2](http://www.pythonguis.com/d/pyside2-source.zip).


    > Don’t forget to download the source code that accompanies this book from [http://www.pythonguis.com/d/pyside2-source.zip](http://www.pythonguis.com/d/pyside2-source.zip)'
  merge: -1
  pgno: 12
- img_proc: true
  md: '# 5. My first Application


    Let’s create our first application! To start create a new Python file — you can
    call it whatever you like (e.g. `myapp.py`) and save it somewhere accessible.
    We’ll write our simple app in this file.


    > We’ll be editing within this file as we go along, and you may want to come back
    to earlier versions of your code, so remember to keep regular backups.


    # Creating your App


    The source code for your very first application is shown below. Type it in verbatim,
    and be careful not to make mistakes. If you do mess up, Python will let you know
    what’s wrong. If you don’t feel like typing it all in, the file is included in
    the source code with this book.'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'Listing 1. basic/creating_a_window_1.py


    ```

    from PySide2.QtWidgets import QApplication, QWidget


    # Only needed for access to command line arguments

    import sys


    # You need one (and only one) QApplication instance per application.

    # Pass in sys.argv to allow command line arguments for your app.

    # If you know you won''t use command line arguments QApplication([])

    works too.

    app = QApplication(sys.argv)


    # Create a Qt widget, which will be our window.

    window = QWidget()

    window.show()  # IMPORTANT!!!!! Windows are hidden by default.


    # Start the event loop.

    app.exec_()


    # Your application won''t reach here until you exit and the event

    # loop has stopped.

    ```


    First, launch your application. You can run it from the command line like any
    other Python script, for example —


    ```

    python MyApp.py

    ```


    Or, for Python 3 —


    ```

    python3 MyApp.py

    ```


    From now on, you''ll see the following box as a hint to run your application and
    test it out, along with an indication of what you''ll see.'
  merge: -1
  pgno: 14
- img_proc: true
  md: '> 🚀 **Run it!** You will now see your window. Qt automatically creates a window
    with the normal window decorations and you can drag it around and resize it like
    any window.


    What you''ll see will depend on what platform you''re running this example on.
    The image below shows the window as displayed on Windows, macOS and Linux (Ubuntu).


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_15_0.png)


    *Figure 3. Our window, as seen on Windows, macOS and Linux.*


    # ## Stepping through the code


    Let''s step through the code line by line, so we understand exactly what is happening.


    First, we import the PySide2 classes that we need for the application. Here we''re
    importing `QApplication`, the application handler and `QWidget`, a basic *empty*
    GUI widget, both from the `QtWidgets` module.


    ```

    python

    from PySide2.QtWidgets import QApplication, QWidget

    ```


    The main modules for Qt are `QtWidgets`, `QtGui` and `QtCore`.


    > 💡 You could do `from <module> import *` but this kind of global import is generally
    frowned upon in Python, so we''ll avoid it here.'
  merge: -1
  pgno: 15
- img_proc: true
  md: 'Next we create an instance of `QApplication`, passing in `sys.arg`, which is
    Python `list` containing the command line arguments passed to the application.


    ```

    app = QApplication(sys.argv)

    ```


    If you know you won''t be using command line arguments to control Qt you can pass
    in an empty list instead, e.g.


    ```

    app = QApplication([])

    ```


    Next we create an instance of a `QWidget` using the variable name `window`.


    ```

    window = QWidget()

    window.show()

    ```


    In Qt *all* top level widgets are windows — that is, they don''t have a *parent*
    and are not nested within another widget or layout. This means you can technically
    create a window using any widget you like.


    > I can''t see my window!


    Widgets *without a parent* are invisible by default. So, after creating the `window`
    object, we must **always** call `.show()` to make it visible. You can remove the
    `.show()` and run the app, but you''ll have no way to quit it!


    > What is a window?


    - Holds the user-interface of your application

    - Every application needs at least one (...but can have more)

    - Application will (by default) exit when last window is closed


    Finally, we call `app.exec_()` to start up the event loop.'
  merge: -1
  pgno: 16
- img_proc: true
  md: '# What’s the event loop?


    Before getting the window on the screen, there are a few key concepts to introduce
    about how applications are organised in the Qt world. If you’re already familiar
    with event loops you can safely skip to the next section.


    The core of every Qt Applications is the `QApplication` class. Every application
    needs one — and only one — `QApplication` object to function. This object holds
    the **event loop** of your application — the core loop which governs all user
    interaction with the GUI.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_17_0.png)


    Each interaction with your application — whether a press of a key, click of a
    mouse, or mouse movement — generates an *event* which is placed on the *event
    queue*. In the event loop, the queue is checked on each iteration and if a waiting
    event is found, the event and control is passed to the specific *event handler*
    for the event. The event handler deals with the event, then passes control back
    to the event loop to wait for more events. There is only **one** running event
    loop per application.'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'The QApplication class


    +   - QApplication holds the Qt event loop

    - One QApplication instance required

    - You application sits waiting in the event loop until an action is taken

    - There is only **one** event loop at any time


    The underscore is there because `exec` was a reserved word in Python 2.7. PySide2
    handles this by appending an underscore to the name used in the C++ library. You''ll
    also see `.print_()` methods on widgets for example.


    # QMainWindow


    As we discovered in the last part, in Qt *any* widgets can be windows. For example,
    if you replace `QtWidget` with `QPushButton`. In the example below, you would
    get a window with a single push-able button in it.


    Listing 2. basic/creating_a_window_2.py


    ```

    include::{codedir}/creating_a_window_2.py

    ```


    This is neat, but not really very *useful* — it''s rare that you need a UI that
    consists of only a single control! But, as we''ll discover later, the ability
    to nest widgets within other widgets using *layouts* means you can construct complex
    UIs inside an empty `QWidget`.


    But, Qt already has a solution for you — the `QMainWindow`. This is a pre-made
    widget which provides a lot of standard window features you''ll make use of in
    your apps, including toolbars, menus, a statusbar, dockable widgets and more.
    We''ll look at these advanced features later, but for now, we''ll add a simple
    empty `QMainWindow` to our application.'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'Listing 3. basic/creating_a_window_3.py


    ```

    from PySide2.QtWidgets import QApplication, QMainWindow


    import sys


    app = QApplication(sys.argv)


    window = QMainWindow()

    window.show()  # IMPORTANT!!!!! Windows are hidden by default.


    # Start the event loop.

    app.exec_()

    ```


    > 🚀 Run it! You will now see your main window. It looks exactly the same as before!


    So our `QMainWindow` isn''t very interesting at the moment. We can fix that by
    adding some content. If you want to create a custom window, the best approach
    is to subclass `QMainWindow` and then include the setup for the window in the
    `__init__` block. This allows the window behavior to be self contained. We can
    add our own subclass of `QMainWindow` — call it `MainWindow` to keep things simple.'
  merge: -1
  pgno: 19
- img_proc: true
  md: "Listing 4. basic/creating_a_window_4.py\n\n```\nimport sys\n\nfrom PySide2.QtCore\
    \ import QSize, Qt\nfrom PySide2.QtWidgets import QApplication, QMainWindow, QPushButton\n\
