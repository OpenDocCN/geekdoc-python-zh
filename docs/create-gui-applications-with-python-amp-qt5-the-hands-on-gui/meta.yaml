    # Editing the data


    Database data displayed in a QTableView is editable by default — just double-click
    on any cell and you will be able to modify the contents. The changes are persisted
    back to the database immediately after you finish editing.


    Qt provides some control over this editing behavior, which you may want to change
    depending on the type of app you are building. Qt terms these behaviors *editing
    strategy* and they can be one of the following -


    | Strategy | Description |

    | :--- | :--- |

    | QSqlTableModel.OnFieldChange | Changes are applied automatically, when the user
    deselects the edited cell. |

    | QSqlTableModel.OnRowChange | Changes are applied automatically, when the user
    selects a different row. |'
  merge: -1
  pgno: 327
- img_proc: true
  md: '| Strategy | Description |

    | --- | --- |

    | `QSqlTableModel.OnManualSubmit` | Changes are cached in the model, and written
    to the database only when `.submitAll()` is called, or discarded when `revertAll()`
    is called. |


    You can set the current edit strategy for the model by calling `.setEditStrategy`
    on it. For example —


    ```

    self.model.setEditStrategy(QSqlTableModel.OnRowChange)

    ```


