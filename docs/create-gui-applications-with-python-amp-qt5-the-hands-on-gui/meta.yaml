  md: "# # The Manager\n\nIn the previous examples we've created a number of different\
    \ `QRunner` implementations that can be used for different purposes in your application.\
    \ In all cases you can run as many of these runners as you like, on the same or\
    \ multiple `QThreadPool` pools. However, sometimes you will want to keep track\
    \ of the runners which you have running in order to do something with their output,\
    \ or provide users with control over the runners directly.\n\n`QThreadPool` itself\
    \ does not give you access to the currently running runners, so we need to create\
    \ our own *manager* ourselves, through which we start and control our workers.\n\
    \nThe example below brings together some of the other worker features already\
    \ introduced—progress, pause and stop control—together with the model views to\
    \ present individual progress bars. This manager will likely work as a drop-in\
    \ for most use-cases you have for running threads.\n\n> This is quite a complex\
    \ example, the full source code is available in the resources for the book. Here\
    \ we'll go through the key parts of the `QRunner` manager in turn.\n\n# ## The\
    \ worker manager\n\nThe worker manager class holds the threadpool, our workers\
    \ and their progress and state information. It is derived from `QAbstractListModel`\
    \ meaning it also provides a Qt model-like interface, allowing for it to be used\
    \ as the model for a `QListView`—providing a per-worker progress bar and status\
    \ indicator. The status tracking is handled through a number of internal signals,\
    \ which attach automatically to every added worker.\n\nListing 191. concurrent/qrunner_manager.py\n\
    \n```\npython\nclass WorkerManager(QAbstractListModel):\n    \"\"\"\n```"
