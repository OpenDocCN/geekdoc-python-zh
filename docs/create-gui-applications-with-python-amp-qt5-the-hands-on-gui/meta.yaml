    \n## 停止正在运行的QRunner\n\n一旦你启动了一个QRunner，默认情况下，没有办法停止它。从可用性的角度来看，这不太好——如果用户错误地启动了任务，他们必须坐着等待它完成。不幸的是，没有办法*杀死*一个运行器，但我们可以礼貌地请求它停止。在这个例子中，我们将看看如何使用*标志*来指示运行器需要停止。\n\
