    # Bitwise AND (&) checks


    In Python, *bitwise AND* operations are performed using the `&` operator.


    In the previous step we combined together `Qt.AlignLeft` (1) and `Qt.AlignTop`
    (32) to produce "Top Left" (33). Now we want to check if the resulting combined
    flag has the align left flag set. To test we need to use *bitwise AND* which checks
    bit by bit to see if both input values are 1, returning a 1 in that place if it
    is true.


    Table 12. Bitwise AND


    | 00100001 | 33 | Qt.AlignLeft | Qt.AlignTop |

    | 00000001 | AND 1 | & Qt.AlignLeft |

    | 00000001 | = 1 | = Qt.AlignLeft |


    This has the effect of *filtering* the bits in our input variable to only those
    that are set in our target flag `Qt.AlignLeft`. If this one bit is set, the result
    is non-zero, if it is unset the result is 0.


    ```

    >>> int(alignment & Qt.AlignLeft)

    1 # result is the numerical value of the flag, here 1.

    ```


