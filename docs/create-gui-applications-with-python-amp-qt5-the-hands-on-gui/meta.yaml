    \n        self.browser = QWebEngineView()\n        self.browser.setUrl(QUrl(\"\
    https://www.google.com\"))\n\n        self.setCentralWidget(self.browser)\n\n\
    \        self.show()\n\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\n\
    \napp.exec_()\n```\n\n如果您点击几下，会发现浏览器的行为符合预期——链接正常工作，并且您可以与页面交互。然而，您也会注意到一些您习以为常的东西缺失了——比如\
    \ URL 栏、控件或任何类型的界面。这使得它有点难以使用。\n\n## 导航\n\n为了将这个基础浏览器转换成可用的东西，我们添加了一些控件，作为 QToolbar\
    \ 上的一系列 QAction。我们将这些定义添加到 QMainWindow 的 `__init__` 块中。\n\n清单 213. app/browser.py\n\
    \n```python\nnavtb = QToolBar(\"Navigation\")\nnavtb.setIconSize(QSize(16, 16))\n\
    self.addToolBar(navtb)\n\nback_btn = QAction(QIcon(os.path.join(\"icons\", \"\
    arrow-180.png\")), \"Back\", self)\nback_btn.setStatusTip(\"Back to previous page\"\
    )\nback_btn.triggered.connect(self.browser.back)\nnavtb.addAction(back_btn)\n\
    ```\n\nQWebEngineView 包含用于前进、后退和重新加载导航的槽，我们可以直接将它们连接到我们操作的 `.triggered` 信号。\n\n\
    我们对剩余的控件使用相同的 QAction 结构。\n\n清单 214. app/browser.py\n\n```python\nnext_btn = QAction(\n\
    \    QIcon(os.path.join(\"icons\", \"arrow-000.png\")), \"Forward\",\n    self\n\
    )\nnext_btn.setStatusTip(\"Forward to next page\")\nnext_btn.triggered.connect(self.browser.forward)\n\
    navtb.addAction(next_btn)\n\nreload_btn = QAction(\n    QIcon(os.path.join(\"\
    icons\", \"arrow-circle-315.png\")),\n    \"Reload\", self\n)\nreload_btn.setStatusTip(\"\
    Reload page\")\nreload_btn.triggered.connect(self.browser.reload)\nnavtb.addAction(reload_btn)\n\
    \nhome_btn = QAction(QIcon(os.path.join(\"icons\", \"home.png\")),\n    \"Home\"\
    , self)\nhome_btn.setStatusTip(\"Go home\")\nhome_btn.triggered.connect(self.navigate_home)\n\
    navtb.addAction(home_btn)\n```\n\n请注意，虽然前进、后退和重新加载可以使用内置槽，但主页导航按钮需要一个自定义槽函数。槽函数定义在我们的\
