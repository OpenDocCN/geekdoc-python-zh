  md: '# 17. Palettes


    The selection of colors used to draw the user interface in Qt are termed *palettes*.
    Both application level and widget-specific palettes are managed through `QPalette`
    objects. Palettes can be set at both the application and widget level, allowing
    you to set a global standard palette and override this on a per-widget basis.
    The global palette is normally defined by the Qt theme (itself normally dependent
    on the OS) but you can override this to change the look of your entire app.


    The active global palette can be accessed from `QApplication.palette()` or by
    creating a new *empty* `QPalette` instance. For example —


    ```

    from PySide2.QtGui import QPalette

    palette = QPalette()

    ```


    You can modify the palette by calling `palette.setColor(role, color)` where *role*
    determines what the color is used for, `QColor` the color to use. The color used
    can either be a custom `QColor` object, or one of the built-in basic colors from
    the Qt namespace.


    ```

    palette.setColor(QPalette.Window, QColor(53,53,53))

    palette.setColor(QPalette.WindowText, Qt.white)

    ```


    > There are some limitations when using palettes on Windows 10 and macOS platform-specific
    themes.


    There are rather a lot of different *roles*. The main roles are shown in the table
    below —


    *Table 4. Main roles*


    | Constant | Value | Description |

    | :--- | :--- | :--- |

    | `QPalette.Window` | 10 | Background color for windows. |'
  merge: -1
