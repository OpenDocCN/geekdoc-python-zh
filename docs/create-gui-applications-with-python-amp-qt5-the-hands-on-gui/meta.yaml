- md: "## Pseudo-State\n\n| Pseudo-State | Description |\n| :--- | :--- |\n| :window\
    \ | Widget is a window (i.e a top level widget). |\n\nWe can use the QSS tester\
    \ to see pseudo-selectors in action. For example, the following will change the\
    \ background of the QPushButton red when the mouse hovers over the widget.\n\n\
    ```\nQPushButton:hover {\n    background: red;\n}\n```\n\nThe following will change\
    \ the background of all widgets when they are hovered.\n\n```\n*:hover {\n   \
    \ background: red;\n}\n```\n\nHovering a widget means all its parents are also\
    \ hovered (the mouse is within their bounding box) as the image below shows.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_261_0.png)\n\nFigure 128. Left, QPushButton\
    \ highlighted when hovered. Right, when a widget is hovered all parent widgets\
    \ are also hovered.\n\nYou can also *negate* pseudo-selectors using `!`. This\
    \ means that the rule will become active when that selector is inactive. For example\
    \ the following...\n\n```\nQPushButton:!hover {\n    background: yellow;\n}\n\
    ```\n\n...will make the QPushButton yellow when it is *not hovered*.\n\nYou can\
    \ also chain multiple pseudo-selectors together. For example, the following will\
    \ set the background of a `QCheckBox` green when it is *checked* and *not hovered*,\
    \ and yellow when it is *checked* and *hovered*.\n\n```\nQCheckBox:checked:!hover\
    \ {\n    background: green;\n}\n\nQCheckBox:checked:hover {\n    background: yellow;\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_262_0.png)\n\nFigure 129. Chained\
    \ pseudo selectors for hover state.\n\nAs for all other rules, you can also chain\
    \ them using \",\" separators to make the defined rule apply to both (or many)\
    \ cases. For example, the following will set a checkbox background green when\
    \ it is *checked* OR *hovered*.\n\n```\nQCheckBox:checked, QCheckBox:hover {\n\
    \    background: yellow;\n}\n```\n\n## Styling Widget Sub controls\n\nMany widgets\
    \ are constructed from a combination of other sub-widgets or *controls*. QSS provides\
    \ syntax for addressing these sub-controls directly, so you can make style changes\
    \ to sub-controls individually. These sub-controls can be addressed by using the\
    \ :: (double-colon) selector, followed by an identifier for the given sub control.\n\
    \nA good example of such a widget is the `QComboBox`. The following style snip\
    \ applies a custom style directly to the down-arrow on the right hand of the combo\
    \ box.\n\n```\nQComboBox::drop-down {\n    background: yellow;\n    image: url('puzzle.png')\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_263_0.png)\n\nFigure 130. Setting\
    \ background and icon for a QComboBox dropdown with QSS.\n\nThere are quite a\
    \ few sub-control selectors available in QSS, which are listed below. You'll notice\
    \ that many of them apply only to specific widgets (or types of widgets).\n\n\
    | Sub-Control | Description |\n| :--- | :--- |\n| ::add-line | Button to move\
    \ to next line on a QScrollBar. |\n| ::add-page | Space between the handle and\
    \ the add-line of a QScrollBar. |\n| ::branch | Branch indicator of a QTreeView.\
    \ |\n| ::chunk | Progress chunk of a QProgressBar. |\n| ::close-button | Close\
    \ button of a QDockWidget or tabs of QTabBar. |\n| ::corner | Corner between two\
    \ scrollbars in a QAbstractScrollArea. |\n| ::down-arrow | Down arrow of a QComboBox,\
    \ QHeaderView, QScrollBar or QSpinBox. |\n| ::down-button | Down button of a QScrollBar\
    \ or a QSpinBox. |\n| ::drop-down | Drop-down button of a QComboBox. |\n| ::float-button\
    \ | Float button of a QDockWidget. |\n| ::groove | Groove of a QSlider. |\n| ::indicator\
    \ | Indicator of a QAbstractItemView, a QCheckBox, a QRadioButton, a checkable\
    \ QMenu item or a checkable QGroupBox. |\n| ::handle | Handle of a QScrollBar,\
    \ a QSplitter, or a QSlider. |\n| ::icon | Icon of a QAbstractItemView or a QMenu.\
    \ |\n| ::item | Item of a QAbstractItemView, a QMenuBar, a QMenu, or a QStatusBar.\
    \ |\n| ::left-arrow | Left arrow of a QScrollBar. |\n| ::left-corner | Left corner\
    \ of a QTabWidget, e.g. control the left corner widget in a QTabWidget. |\n| ::menu-arrow\
    \ | Arrow of a QToolButton with a menu. |\n| ::menu-button | Menu button of a\
    \ QToolButton. |\n| ::menu-indicator | Menu indicator of a QPushButton. |\n| ::right-arrow\
    \ | Right arrow of a QMenu or a QScrollBar. |\n| ::pane | The pane (frame) of\
    \ a QTabWidget. |\n| ::right-corner | The right corner of a QTabWidget. For example,\
    \ this control can be used to control the position the right corner widget in\
    \ a QTabWidget. |\n| ::scroller | The scroller of a QMenu or QTabBar. |\n| ::section\
    \ | The section of a QHeaderView. |\n| ::separator | The separator of a QMenu\
    \ or in a QMainWindow. |\n| ::sub-line | The button to subtract a line of a QScrollBar.\
    \ |\n| ::sub-page | The region between the handle (slider) and the sub-line of\
    \ a QScrollBar. |\n| ::tab | The tab of a QTabBar or QToolBox. |\n| ::tab-bar\
    \ | The tab bar of a QTabWidget. This subcontrol exists only to control the position\
    \ of the QTabBar inside the QTabWidget. To style the tabs use the ::tab subcontrol.\
    \ |\n| ::tear | The tear indicator of a QTabBar. |\n| ::tearoff | The tear-off\
    \ indicator of a QMenu. |\n| ::text | The text of a QAbstractItemView. |\n| ::title\
    \ | The title of a QGroupBox or a QDockWidget. |\n| ::up-arrow | The up arrow\
    \ of a QHeaderView (sort indicator), QScrollBar or a QSpinBox. |\n| ::up-button\
    \ | The up button of a QSpinBox. |\n\nThe following targets the up and down buttons\
    \ of a QSpinBox turning the background red and green respectively.\n\n```\nQSpinBox::up-button\
    \ {\n    background: green;\n}\n\nQSpinBox::down-button {\n    background: red;\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_266_0.png)\n\nFigure 131. Setting\
    \ background to the QSpinBox up and down buttons.\n\nThe arrows *inside* the up\
    \ or down buttons are also separately targetable. Below we're setting them with\
    \ custom plus and minus icons — note we also need to resize the buttons to fit.\n\
    \n```\nQSpinBox {\n    min-height: 50;\n}\n\nQSpinBox::up-button {\n    width:\
    \ 50;\n}\n\nQSpinBox::up-arrow {\n    image: url('plus.png');\n}\n\nQSpinBox::down-button\
    \ {\n    width: 50;\n}\n\nQSpinBox::down-arrow {\n    image: url('minus.png')\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_267_0.png)\n\nFigure 132. Setting\
    \ background to the QSpinBox up and down buttons.\n\n## Subcontrol pseudostates\n\
    \nYou can use pseudostates to target subcontrols, just as for other widgets. To\
    \ do this, simply chain the pseudostate after the control. For example —\n\n```\n\
    QSpinBox::up-button:hover {\n    background: green;\n}\n\nQSpinBox::down-button:hover\
    \ {\n    background: red;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_268_0.png)\n\
    \nFigure 133. Combining subcontrol selectors with pseudo-selectors.\n\n## Positioning\
    \ Sub-controls\n\nUsing QSS you also get precise control over the position of\
    \ subcontrols inside widgets. These allow adjustment in position either *relative*\
    \ to their normal position, or in *absolute* reference to their parent widget.\
    \ We'll look at these positioning methods below.\n\n| Property | Type (Default)\
    \ | Description |\n| :--- | :--- | :--- |\n| `position` | relative \\| absolute\
    \ (relative) | Whether offsets specified using left, right, top, and bottom are\
    \ relative or absolute coordinates. |\n| `bottom` | Length | If position is relative\
    \ (the default), moves a subcontrol by a certain offset up; specifying bottom:\
    \ y is then equivalent to specifying top: -y. If position is absolute, the bottom\
    \ property specifies the subcontrol's bottom edge in relation to the parent's\
    \ bottom edge (see also subcontrol-origin). |\n| `left` | Length | If position=relative\
    \ move a subcontrol right by the given offset (i.e. specifies additional space\
    \ on the left). If position is absolute, specifies the distance from the left\
    \ edge of the parent. |\n| `right` | Length | If position=relative move a subcontrol\
    \ left by the given offset (i.e. specifies additional space on the right). If\
    \ position is absolute, specifies the distance from the right edge of the parent.\
    \ |"
  mdcn: "## 伪状态\n\n| 伪状态 | 描述 |\n| :--- | :--- |\n| :window | 控件是一个窗口（即顶层控件）。 |\n\n\
    我们可以使用 QSS 测试器来查看伪选择器的实际效果。例如，以下代码会在鼠标悬停在控件上时，将 QPushButton 的背景变为红色。\n\n```\n\
    QPushButton:hover {\n    background: red;\n}\n```\n\n以下代码会在所有控件被悬停时改变其背景。\n\n\
    ```\n*:hover {\n    background: red;\n}\n```\n\n悬停一个控件意味着其所有父控件也处于悬停状态（鼠标在其边界框内），如下图所示。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_261_0.png)\n\n图 128. 左图，QPushButton\
    \ 悬停时高亮显示。右图，当一个控件被悬停时，所有父控件也处于悬停状态。\n\n你也可以使用 `!` 来*否定*伪选择器。这意味着当该选择器不活跃时，规则将生效。例如以下代码...\n\
    \n```\nQPushButton:!hover {\n    background: yellow;\n}\n```\n\n...会使 QPushButton\
    \ 在*未被悬停*时变为黄色。\n\n你还可以将多个伪选择器链接在一起。例如，以下代码将在 `QCheckBox` *被选中*且*未被悬停*时将其背景设为绿色，在*被选中*且*被悬停*时设为黄色。\n\
    \n```\nQCheckBox:checked:!hover {\n    background: green;\n}\n\nQCheckBox:checked:hover\
    \ {\n    background: yellow;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_262_0.png)\n\
    \n图 129. 用于悬停状态的链接伪选择器。\n\n与所有其他规则一样，你也可以使用 \",\" 分隔符将它们链接起来，使定义的规则适用于两种（或多种）情况。例如，以下代码将在复选框*被选中*或*被悬停*时将其背景设为绿色。\n\
    \n```\nQCheckBox:checked, QCheckBox:hover {\n    background: yellow;\n}\n```\n\
    \n## 设置控件子控件的样式\n\n许多控件是由其他子控件或*控件*组合构建的。QSS 提供了直接寻址这些子控件的语法，因此你可以单独对子控件进行样式更改。这些子控件可以通过使用\
    \ ::（双冒号）选择器后跟给定子控件的标识符来寻址。\n\n一个很好的例子是 `QComboBox`。以下样式片段直接应用于组合框右侧的下拉箭头。\n\n\
    ```\nQComboBox::drop-down {\n    background: yellow;\n    image: url('puzzle.png')\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_263_0.png)\n\n图 130. 使用 QSS\
    \ 设置 QComboBox 下拉框的背景和图标。\n\nQSS 中有相当多的子控件选择器可用，下面列出了它们。你会注意到其中许多仅适用于特定控件（或控件类型）。\n\
    \n| 子控件 | 描述 |\n| :--- | :--- |\n| ::add-line | QScrollBar 上移动到下一行的按钮。 |\n| ::add-page\
    \ | QScrollBar 上滑块和 add-line 之间的空间。 |\n| ::branch | QTreeView 的分支指示器。 |\n| ::chunk\
    \ | QProgressBar 的进度块。 |\n| ::close-button | QDockWidget 的关闭按钮或 QTabBar 的标签页。\
    \ |\n| ::corner | QAbstractScrollArea 中两个滚动条之间的角落。 |\n| ::down-arrow | QComboBox、QHeaderView、QScrollBar\
    \ 或 QSpinBox 的下箭头。 |\n| ::down-button | QScrollBar 或 QSpinBox 的下按钮。 |\n| ::drop-down\
    \ | QComboBox 的下拉按钮。 |\n| ::float-button | QDockWidget 的浮动按钮。 |\n| ::groove |\
    \ QSlider 的凹槽。 |\n| ::indicator | QAbstractItemView、QCheckBox、QRadioButton、可选中的\
    \ QMenu 项或可选中的 QGroupBox 的指示器。 |\n| ::handle | QScrollBar、QSplitter 或 QSlider\
    \ 的滑块。 |\n| ::icon | QAbstractItemView 或 QMenu 的图标。 |\n| ::item | QAbstractItemView、QMenuBar、QMenu\
    \ 或 QStatusBar 的项目。 |\n| ::left-arrow | QScrollBar 的左箭头。 |\n| ::left-corner |\
    \ QTabWidget 的左角，例如控制 QTabWidget 中的左角控件。 |\n| ::menu-arrow | 带有菜单的 QToolButton\
    \ 的箭头。 |\n| ::menu-button | QToolButton 的菜单按钮。 |\n| ::menu-indicator | QPushButton\
    \ 的菜单指示器。 |\n| ::right-arrow | QMenu 或 QScrollBar 的右箭头。 |\n| ::pane | QTabWidget\
    \ 的窗格（框架）。 |\n| ::right-corner | QTabWidget 的右角。例如，此控件可用于控制 QTabWidget 中右角控件的位置。\
    \ |\n| ::scroller | QMenu 或 QTabBar 的滚动条。 |\n| ::section | QHeaderView 的部分。 |\n\
    | ::separator | QMenu 或 QMainWindow 中的分隔符。 |\n| ::sub-line | QScrollBar 上减去一行的按钮。\
    \ |\n| ::sub-page | QScrollBar 上滑块（滑块）和 sub-line 之间的区域。 |\n| ::tab | QTabBar 或\
    \ QToolBox 的标签页。 |\n| ::tab-bar | QTabWidget 的标签栏。此子控件仅用于控制 QTabBar 在 QTabWidget\
    \ 内的位置。要设置标签页的样式，请使用 ::tab 子控件。 |\n| ::tear | QTabBar 的撕裂指示器。 |\n| ::tearoff |\
    \ QMenu 的撕裂指示器。 |\n| ::text | QAbstractItemView 的文本。 |\n| ::title | QGroupBox\
    \ 或 QDockWidget 的标题。 |\n| ::up-arrow | QHeaderView（排序指示器）、QScrollBar 或 QSpinBox\
    \ 的上箭头。 |\n| ::up-button | QSpinBox 的上按钮。 |\n\n以下代码分别将 QSpinBox 的上、下按钮的背景设置为绿色和红色。\n\
    \n```\nQSpinBox::up-button {\n    background: green;\n}\n\nQSpinBox::down-button\
    \ {\n    background: red;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_266_0.png)\n\
    \n图 131. 设置 QSpinBox 上、下按钮的背景。\n\n上或下按钮*内部*的箭头也可以单独设置。下面我们使用自定义的加号和减号图标来设置它们——注意我们还需要调整按钮大小以适应。\n\
    \n```\nQSpinBox {\n    min-height: 50;\n}\n\nQSpinBox::up-button {\n    width:\
    \ 50;\n}\n\nQSpinBox::up-arrow {\n    image: url('plus.png');\n}\n\nQSpinBox::down-button\
    \ {\n    width: 50;\n}\n\nQSpinBox::down-arrow {\n    image: url('minus.png')\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_267_0.png)\n\n图 132. 设置 QSpinBox\
    \ 上、下按钮的背景。\n\n## 子控件伪状态\n\n你可以使用伪状态来定位子控件，就像对其他控件一样。为此，只需将伪状态链接在控件之后。例如 —\n\n\
    ```\nQSpinBox::up-button:hover {\n    background: green;\n}\n\nQSpinBox::down-button:hover\
    \ {\n    background: red;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_268_0.png)\n\
    \n图 133. 将子控件选择器与伪选择器结合使用。\n\n## 定位子控件\n\n使用 QSS，你还可以精确控制子控件在控件内的位置。这允许相对于其正常位置进行*相对*调整，或相对于其父控件进行*绝对*参考调整。我们将在下面介绍这些定位方法。\n\
    \n| 属性 | 类型（默认值） | 描述 |\n| :--- | :--- | :--- |\n| `position` | relative \\| absolute\
    \ (relative) | 使用 left、right、top 和 bottom 指定的偏移量是相对坐标还是绝对坐标。 |\n| `bottom` | 长度\
    \ | 如果 position 是 relative（默认值），则将子控件向上移动一定的偏移量；指定 bottom: y 等同于指定 top: -y。如果\
    \ position 是 absolute，则 bottom 属性指定子控件底边相对于父控件底边的位置（另请参见 subcontrol-origin）。 |\n\
    | `left` | 长度 | 如果 position=relative，则将子控件向右移动给定的偏移量（即指定左侧的额外空间）。如果 position 是\
    \ absolute，则指定距离父控件左边缘的距离。 |\n| `right` | 长度 | 如果 position=relative，则将子控件向左移动给定的偏移量（即指定右侧的额外空间）。如果\
    \ position 是 absolute，则指定距离父控件右边缘的距离。 |"
