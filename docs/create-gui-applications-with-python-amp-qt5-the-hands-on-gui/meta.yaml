    # # paintEvent


    The `paintEvent` handler is the core of all widget drawing in PySide2. Every complete
    and partial re-draw of a widget is triggered through a `paintEvent` which the
    widget handles to draw itself. A `paintEvent` can be triggered by —


    +   - `repaint()` or `update()` was called

    - the widget was obscured and has now been uncovered

    - the widget has been resized


    — but it can also occur for many other reasons. What is important is that when
    a `paintEvent` is triggered your widget is able to redraw it.


    If a widget is simple enough (like ours is) you can often get away with simply
    redrawing the entire thing any time *anything* happens. But for more complicated'
  - "[PAGE 437]\n\nwidgets this can get very inefficient. For these cases the `paintEvent`\
    \ includes the specific region that needs to be updated. We'll make use of this\
    \ in later, more complicated examples.\n\nFor now we'll do something very simple,\
    \ and just fill the entire widget with a single color. This will allow us to see\
    \ the area we're working with to start drawing the bar. Add the following code\
    \ to the `_Bar` class.\n\n*Listing 146. custom-widgets/powerbar_1.py*\n\n```\n\
    python\ndef paintEvent(self, e):\n    painter = QtGui.QPainter(self)\n    brush\
    \ = QtGui.QBrush()\n    brush.setColor(QtGui.QColor(\"black\"))\n    brush.setStyle(Qt.SolidPattern)\n\
    \    rect = QtCore.QRect(0, 0, painter.device().width(), painter.device().height())\n\
    \    painter.fillRect(rect, brush)\n```\n\n# Positioning\n\nNow we can see the\
    \ `_Bar` widget we can tweak its positioning and size. If you drag around the\
    \ shape of the window you'll see the two widgets changing shape to fit the space\
    \ available. This is what we want, but the `QDial` is also expanding vertically\
    \ more than it should, and leaving empty space we could use for the bar."
