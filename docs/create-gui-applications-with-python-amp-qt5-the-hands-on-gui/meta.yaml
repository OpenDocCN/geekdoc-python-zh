- md: "## Routing dictionaries\n\nSome languages have *case* statements which allow\
    \ you to branch off and handle different values of a variable. There is no direct\
    \ equivalent in Python, but we can use dictionaries for the same result.\n\nThis\
    \ makes use of the fact that in Python functions (and methods) are objects and\
    \ can be stored as dictionary values. Using the input to our *routing* function\
    \ we can look up which specific method to call, and pass through the data.\n\n\
    The following code shows how to do this for our example above.\n\nListing 120.\
    \ further/routing_2.py\n\n```python\ndef mousePressEvent(self, e):\n    route\
    \ = { ①\n        Qt.LeftButton: self.left_mousePressEvent,\n        Qt.MiddleButton:\
    \ self.middle_mousePressEvent,\n        Qt.RightButton: self.right_mousePressEvent,\n\
    \    }\n    button = e.button()\n    fn = route[button] ②\n    return fn(e) ③\n\
    \ndef left_mousePressEvent(self, e):\n    self.label.setText(\"mousePressEvent\
    \ LEFT\")\n    if e.x() < 100:\n        self.status.showMessage(\"Left click on\
    \ left\")\n        self.move(self.x() - 10, self.y())\n    else:\n        self.status.showMessage(\"\
    Left click on right\")\n        self.move(self.x() + 10, self.y())\n\ndef middle_mousePressEvent(self,\
    \ e):\n    self.label.setText(\"mousePressEvent MIDDLE\")\n\ndef right_mousePressEvent(self,\
    \ e):\n    if e.x() < 100:\n        self.status.showMessage(\"Right click on left\"\
    )\n        print(\"Something else here.\")\n        self.move(10, 10)\n    else:\n\
    \        self.status.showMessage(\"Right click on right\")\n        self.move(400,\
    \ 400)\n```\n\n① Define the routing dictionary, keyed by the event type and with\
    \ handler methods as the values.\n\n② Get the route method from the dictionary.\n\
    \n③ Call the method, passing the event argument.\n\nThe value of `e.button()`\
    \ is used to perform a lookup in our routing dictionary. This returns a single\
    \ method, which we can call to handle that particular button state. We pass the\
    \ `e` object as an argument, and return the return value (if any).\n\nThis will\
    \ only work if the states handled are all in our routing dictionary—if there is\
    \ a state which we haven't prepared for, the lookup will throw a `KeyError` and\
    \ crash the application. To avoid needing to define routes for *all* states all\
    \ the time, we need to handle this.\n\n*Listing 121. further/routing_3.py*\n\n\
    ```python\ndef mousePressEvent(self, e):\n    route = { ①\n        Qt.LeftButton:\
    \ self.left_mousePressEvent,\n        Qt.MiddleButton: self.middle_mousePressEvent,\n\
    \        # Qt.RightButton missing!\n    }\n    button = e.button()\n    fn = route.get(button)\
    \ ②\n    if fn: ③\n        return fn(e)\n```\n\n① Define the routing dictionary,\
    \ we dropped the right-click state here.\n\n② Using `.get()` will return `None`\
    \ if there is no match.\n\n③ Any method is *truthy*, `None` is *falsey*.\n\nIf\
    \ you run this and right click, your app will handle it fine (and do nothing).\n\
    \n> \U0001F4A1 An alternative is to define an empty function and set that as the\
    \ default return value for the lookup. This will be returned and called for any\
    \ states not in the routing dictionary.\n\nNow we have a single routing method\
    \ which calls a series of specific, well-defined methods, with descriptive names\
    \ that say what they do. This is one of the most powerful methods for improving\
    \ the *maintainability* of your event and model view code. You can use this same\
    \ approach in model view `.data` handlers, and anywhere else that Qt passes state\
    \ information into a method.\n\n## 26. Working with command-line arguments\n\n\
    If you have created an application which works with specific file types — for\
    \ example a video editor that opens videos, a document editor that opens document\
    \ files — it can be useful to have your application open these files automatically.\
    \ On all platforms, when you tell the OS to open a file with a specific application,\
    \ the *filename* to open is passed to that application as a command-line *argument*.\n\
    \nWhen your application is run, the arguments passed to the application are always\
    \ available in `sys.argv`. To open files automatically, you can check the value\
    \ of `sys.argv` at startup and, if you find a filename in there, open it.\n\n\
    The following app when run will open a window with all the command line arguments\
    \ received displayed.\n\nListing 122. further/arguments.py\n\n```python\nfrom\
    \ PySide2.QtWidgets import QApplication, QWidget, QLabel, QVBoxLayout\n\nimport\
    \ sys\n\nclass Window(QWidget):\n    def __init__(self):\n        super().__init__()\n\
    \n        layout = QVBoxLayout()\n\n        for arg in sys.argv: ①\n         \
    \   l = QLabel(arg)\n            layout.addWidget(l)\n\n        self.setLayout(layout)\n\
    \        self.setWindowTitle(\"Arguments\")\n\napp = QApplication(sys.argv)\n\
    w = Window()\nw.show()\n\napp.exec_()\n```\n\n① `sys.argv` is a list of strings.\
    \ *All* arguments are strings.\n\nRun this app from the command line, passing\
    \ in a filename (you can make anything up, we don't load it). You can pass as\
    \ many, or as few, arguments as you like.\n\nArguments are passed to your application\
    \ as a `list` of `str`. *All* arguments are strings, even numeric ones. You can\
    \ access any argument you like using normal list indexing — for example `sys.argv[1]`\
    \ would return the 2nd argument.\n\nTry running the script above with the following\
    \ —\n\n```\npython arguments.py filename.mp4\n```\n\nThis will produce the window\
    \ below. Notice that when run with `python` the first argument is *actually* the\
    \ Python file which is being executed.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_375_0.png)\n\
    \nFigure 169. The window open showing the command line arguments.\n\nIf you package\
    \ your application for distribution, this may no longer be the case—the first\
    \ argument may now be the file you are opening, as there is no Python file passed\
    \ as an argument. This can cause problems, but a simple way around this is to\
    \ use the *last* argument passed to your application as the filename, e.g.\n\n\
    ```python\nif len(sys.argv) > 0:\n    filename_to_open = sys.argv[-1]\n```\n\n\
    Alternatively, you can remove the currently executing script name if it is in\
    \ the list. The currently executing Python script name is always available in\
    \ `__file__`.\n\n```python\nif __file__ in sys.argv:\n    sys.argv.remove(__file__)\n\
    ```\n\n> It will *always* be in the list, unless you have packaged your app.\n\
    \nBelow is a further example, where we accept a filename on the command line,\
    \ and then open that text file for display in a `QTextEdit`.\n\nListing 123. further/arguments_open.py\n\
    \n```python\nfrom PySide2.QtWidgets import QApplication, QMainWindow, QTextEdit\n\
    \nimport sys\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n    \
    \    super().__init__()\n\n        self.editor = QTextEdit()\n\n        if __file__\
    \ in sys.argv: ①\n            sys.argv.remove(__file__)\n\n        if sys.argv:\
    \ ②\n            filename = sys.argv[0] ③\n            self.open_file(filename)\n\
    \n        self.setCentralWidget(self.editor)\n        self.setWindowTitle(\"Text\
    \ viewer\")\n\n    def open_file(self, fn):\n\n        with open(fn, \"r\") as\
    \ f:\n            text = f.read()\n\n        self.editor.setPlainText(text)\n\n\
    app = QApplication(sys.argv)\nw = MainWindow()\nw.show()\n\napp.exec_()\n```\n\
    \n① If the script name is in sys.argv remove it.\n\n② If there is still something\
    \ in sys.argv (not empty).\n\n③ Take the first argument as the filename to open."
  mdcn: "## 路由字典\n\n某些语言有 *case* 语句，允许你根据变量的不同值进行分支处理。Python 中没有直接的等价物，但我们可以使用字典来达到相同的效果。\n\
    \n这利用了 Python 中函数（和方法）是对象，并且可以作为字典值存储这一特性。通过使用我们 *路由* 函数的输入，我们可以查找要调用的具体方法，并传递数据。\n\
    \n以下代码展示了如何为上面的示例实现这一点。\n\n清单 120. further/routing_2.py\n\n```python\ndef mousePressEvent(self,\
    \ e):\n    route = { ①\n        Qt.LeftButton: self.left_mousePressEvent,\n  \
    \      Qt.MiddleButton: self.middle_mousePressEvent,\n        Qt.RightButton:\
    \ self.right_mousePressEvent,\n    }\n    button = e.button()\n    fn = route[button]\
    \ ②\n    return fn(e) ③\n\ndef left_mousePressEvent(self, e):\n    self.label.setText(\"\
    mousePressEvent LEFT\")\n    if e.x() < 100:\n        self.status.showMessage(\"\
    Left click on left\")\n        self.move(self.x() - 10, self.y())\n    else:\n\
    \        self.status.showMessage(\"Left click on right\")\n        self.move(self.x()\
    \ + 10, self.y())\n\ndef middle_mousePressEvent(self, e):\n    self.label.setText(\"\
    mousePressEvent MIDDLE\")\n\ndef right_mousePressEvent(self, e):\n    if e.x()\
    \ < 100:\n        self.status.showMessage(\"Right click on left\")\n        print(\"\
    Something else here.\")\n        self.move(10, 10)\n    else:\n        self.status.showMessage(\"\
    Right click on right\")\n        self.move(400, 400)\n```\n\n① 定义路由字典，以事件类型为键，处理方法为值。\n\
    \n② 从字典中获取路由方法。\n\n③ 调用该方法，传递事件参数。\n\n`e.button()` 的值用于在我们的路由字典中执行查找。这会返回一个单独的方法，我们可以调用它来处理特定的按钮状态。我们将\
    \ `e` 对象作为参数传递，并返回返回值（如果有的话）。\n\n这只有在处理的状态都在我们的路由字典中时才有效——如果存在我们未准备好的状态，查找将抛出\
    \ `KeyError` 并导致应用程序崩溃。为了避免需要为 *所有* 状态定义路由，我们需要处理这种情况。\n\n*清单 121. further/routing_3.py*\n\
    \n```python\ndef mousePressEvent(self, e):\n    route = { ①\n        Qt.LeftButton:\
