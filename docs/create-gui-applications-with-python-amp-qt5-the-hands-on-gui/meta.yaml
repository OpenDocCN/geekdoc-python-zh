  - '[PAGE 118]


    # Organising menus & toolbars


    If your users can''t find your application''s actions, they can''t use your app
    to it''s full potential. Making actions discoverable is key to creating a user-friendly
    application. It is a common mistake to try and address this by adding actions
    *everywhere* and end up overwhelming and confusing your users.


    Put common and necessary actions first, making sure they are easy to find and
    recall. Think of the **File** › **Save** in most editing applications. Quickly
    accessible at the top of the File menu and bound with a simple keyboard shortcut
    `Ctrl` + `S`. If **Save file...** was accessible through **File** › **Common operations**
    › **File operations** › **Active document** › **Save** or the shortcut `Ctrl`
    + `Alt` + `J` users would have a harder time finding it, a harder time using it,
    and be less **likely** to save their documents.


    Arrange actions into logical groups. It is easier to find something among a small
    number of alternatives, than in a long list. It''s even easier to find if it is
    among similar things.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_118_0.png)


    *Figure 48. Grouped toolbars in Qt Designer.*


    Avoid replicating actions in multiple menus, as this introduces an ambiguity of
    "do these do the same thing?" even if they have an identical label. Lastly, don''t
    be tempted to simplify menus by hiding/removing entries dynamically. This leads
    to confusion as users hunt for something that doesn''t exist "...it was here a
    minute ago". Different states should be indicated by disabling menu items or separate
    windows and dialogs.'
- md: "## ✔ DO\n\n- Organize your menus into a logical hierarchy.\n- Replicate the\
    \ *most common* functions onto your toolbars.\n- Group toolbar actions logically.\n\
    - Disable items in menus when they can’t be used.\n\n## ✖ DON’T\n\n- Add the same\
    \ action to multiple menus.\n- Add all your menu actions onto the toolbar.\n-\
    \ Use different names or icons for the same action in different places.\n- Remove\
    \ items from your menus — disable them instead.\n\n## 10. Dialogs\n\nDialogs are\
    \ useful GUI components that allow you to *communicate* with the user (hence the\
    \ name dialog). They are commonly used for file Open/Save, settings, preferences,\
    \ or for functions that do not fit into the main UI of the application. They are\
    \ small modal (or *blocking*) windows that sit in front of the main application\
    \ until they are dismissed. Qt actually provides a number of 'special' dialogs\
    \ for the most common use-cases, allowing you to provide a platform-native experience\
    \ for a better user experience.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_120_0.png)\n\
    \n*Figure 49. Standard GUI features — A search dialog*\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_120_1.png)\n\
    \n*Figure 50. Standard GUI features — A file Open dialog*\n\nIn Qt dialog boxes\
    \ are handled by the `QDialog` class. To create a new dialog box simply create\
    \ a new object of `QDialog` type passing in a parent widget, e.g. `QMainWindow`,\
    \ as its parent.\n\nLet's create our own `QDialog`. We'll start with a simple\
