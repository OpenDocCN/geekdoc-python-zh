    draw the blocks.


    > Remember that y coordinates in QPainter start at the top and increase down the
    canvas. This means that plotting at d_height will be plotting at the very bottom
    of the canvas.


    > To draw a block at the very bottom we must start drawing at d_height-step_size
    i.e. one block up to leave space to draw downwards.


    In our bar meter we''re drawing blocks, in turn, starting at the bottom and working
    upwards. So our very first block must be placed at d_height-step_size and the
    second at d_height-(step_size*2). Our loop iterates from 0 upwards, so we can
    achieve this with the following formula —


    ```

    ypos = (1 + n) * step_size

    y = d_height - ypos

    ```


    This produces the following layout.


