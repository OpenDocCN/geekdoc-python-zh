    \ |\n| `width` | Length | The width of a subcontrol. If you want a widget with\
    \ a fixed width, set the min-width and max-width to the same value. |\n\n## Editing\
    \ Stylesheets in Qt Designer\n\nSo far the examples we've seen have applied QSS\
