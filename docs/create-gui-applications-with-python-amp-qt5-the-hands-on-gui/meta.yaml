    is a left-to-right language, so if your app is in English align the left.


    **Groups** of related widgets gain context making them easier to *understand*.
    Structure your interface so related things are found together.


    **Space** is key to creating visually distinct regions in your interface — without
    space between groups, there are no groups! Keep spacing consistent and meaningful.'
- md: "## 15. The Qt Resource system\n\nBuilding applications takes more than just\
    \ code. Usually your interface will need icons for actions, you may want to add\
    \ illustrations or branding logos, or perhaps your application will need to load\
    \ data files to pre-populate widgets. These *data files* are separate from the\
    \ source code of your application but will ultimately need to be packaged and\
    \ distributed with it in order for it to work.\n\nDistributing data files with\
    \ applications is a common cause of problems. If you reference data files with\
    \ paths, your application won't work properly unless the exact same paths are\
    \ available on the target computer. This can get even trickier when packaging\
    \ applications for cross-platform (Windows, macOS and Linux) use. Thankfully,\
    \ Qt comes to the rescue with its *resource system*.\n\nSince we're using Qt for\
    \ our GUI we can make use of Qt Resource system to bundle, identify and load resources\
    \ in our application. Resources are *bundled* into Python files which can be distributed\
    \ along with your source code, guaranteeing they will continue to work on other\
    \ platforms. You can manage Qt resources through Qt Designer (or Qt Creator) and\
    \ use resource library to add icons (and other graphics) to your apps.\n\n###\
    \ The QRC file\n\nThe core of the Qt Resources system is the *resource file* or\
    \ QRC. The `.qrc` file is a simple XML file, which can be opened in any text editor.\n\
    \n> You can also create QRC files and add and remove resources using Qt Designer,\
    \ which we'll cover later.\n\n### Simple QRC example\n\nA very simple resource\
    \ file is shown below, containing a single resource (a single icon `animal-penguin.png`\
    \ we might add to a button).\n\n```xml\n<!DOCTYPE RCC>\n<RCC version=\"1.0\">\n\
    \    <qresource prefix=\"icons\">\n        <file alias=\"animal-penguin.png\"\
    >animal-penguin.png</file>\n    </qresource>\n</RCC>\n```\n\nThe name between\
    \ the `<file>` `</file>` tags is the path to the file, relative to the resource\
    \ file. The `alias` is the name which this resource will be known by from within\
    \ your application. You can use this to *rename* icons to something more logical\
    \ or simpler in your app, while keeping the original name externally.\n\nFor example,\
    \ if we wanted to use the name `penguin.png` internally, we could change this\
    \ line to:\n\n```xml\n<file alias=\"penguin.png\">animal-penguin.png</file>\n\
    ```\n\n> This only changes the name used *inside* your application, the filename\
    \ remains unchanged.\n\nOutside this tag is the `qresource` tag which specifies\
    \ a `prefix`. This is a *namespace* which can be used to group resources together.\
    \ This is effectively a virtual folder, under which nested resources can all be\
    \ found.\n\n### Using a QRC file\n\nTo use a `.qrc` file in your application you\
    \ first need to compile it to Python. PySide2 comes with a command line tool to\
    \ do this, which takes a `.qrc` file as input and outputs a Python file containing\
    \ the compiled data. This can then be imported into your app as for any other\
    \ Python file or module.\n\nTo compile our `resources.qrc` file to a Python file\
    \ named `resources.py` we can use —\n\n```bash\npyside2-rcc resources.qrc -o resources.py\n\
    ```\n\nTo use the resource file in our application we need to make a few small\
    \ changes. Firstly, we need to `import resources` at the top of our app, to load\
    \ the resources into the Qt resource system, and then secondly we need to update\
    \ the path to the icon file to use the resource path format as follows:\n\n```\n\
    :/icons/penguin.png\n```\n\nThe prefix `:/` indicates that this is a *resource\
    \ path*. The first name \"icons\" is the *prefix* namespace and the filename is\
    \ taken from the file *alias*, both as defined in our `resources.qrc` file.\n\n\
    The updated application is shown below.\n\nListing 72. /designer/qresource.py\n\
    \n```python\nimport sys\n\nfrom PySide2 import QtGui, QtWidgets\n\nimport resources\
    \  # Import the compiled resource file.\n\nclass MainWindow(QtWidgets.QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    Hello World\")\n        b = QtWidgets.QPushButton(\"My button\")\n\n        icon\
    \ = QtGui.QIcon(\":/icons/penguin.png\")\n        b.setIcon(icon)\n        self.setCentralWidget(b)\n\
    \n        self.show()\n\napp = QtWidgets.QApplication(sys.argv)\nw = MainWindow()\n\
    app.exec_()\n```\n\n### Resources in Qt Designer and Qt Creator\n\nWhile it's\
    \ fairly straightforward to manage your resources by editing the QRC file directly,\
    \ **Qt Designer** can also be used to edit the resource library. This allows you\
    \ to see all the icons (and other data) visually, rearrange them and edit them\
    \ by drag-and-drop. If you are building your application UI in **Qt Designer**\
    \ you can also select icons from the resource file directly, by browsing and selecting\
    \ them. The UI file will keep a reference to the resource file and resources will\
    \ be loaded automatically.\n\n### Adding Resources in Qt Designer\n\nIf you're\
    \ using the standalone Qt Designer, the resource browser is available as a dockable\
    \ widget, visible in the bottom right by default. If the Resource Browser is hidden\
    \ you can show it through the \"View\" menu on the toolbar.\n\nTo add, edit and\
    \ remove resource files click on the pencil icon in the Resource browser panel.\
    \ This will open the resource editor.\n\nIn the resource editor view you can open\
    \ an existing resource file by clicking on the document folder icon (middle icon)\
    \ on the bottom left.\n\nFigure 89. Edit Resources in Qt Designer\n\nOn the left\
    \ hand panel you can also create and delete resource files from your UI. While\
    \ on the right you can create new prefixes, add files to the prefix and delete\
    \ items. Changes to the resource file are saved automatically.\n\n### Adding Resources\
    \ in Qt Creator\n\nIn order to be able to add icons using the Qt Resource system\
    \ from within Qt Creator you need to have an active Qt Project, and add both your\
    \ UI and resource files to it.\n\n> If you don't have a Qt Creator project set\
    \ up you can create one in your existing source folder. Qt Creator will prompt\
    \ before overwriting any of your files. Click on \"+ New\", choose \"Qt for Python\
    \ - Empty\" for project type. Select the folder **above** your source folder for\
    \ \"Create in\", and provide the name of your source folder as the project name.\
    \ You can delete any files created, except the `.pyproject` which holds the project\
    \ settings.\n\nFigure 90. Select the location\n\nTo add resources to your existing\
    \ project, select the \"Edit\" view on the left hand panel. You will see a file\
    \ tree browser in the left hand panel. Right-click on the folder and choose \"\
    Add existing files...\" and add your existing `.qrc` file to the project.\n\n\
    Figure 91. The Edit view, showing the added files\n\n> The UI doesn't update when\
    \ you add/remove things here, this seems to be a bug in Qt Creator. If you close\
    \ and re-open Qt Creator the files will be there.\n\nOnce you have added the QRC\
    \ file to the file listing you should be able to expand the file as if it were\
    \ a folder, and browse the resources within. You can also add and remove resources\
    \ using this interface.\n\n### Using resources in Qt Creator and Qt Designer\n\
    \nOnce the Resource file is loaded you will be able to access it from the designer\
    \ properties. The screenshot below shows the Designer with our counter app open,\
    \ and the *increment* button selected. The icon for the button can be chosen by\
    \ clicking the small black down arrow and selecting \"Choose Resource...\"\n\n\
    Figure 92. Select the location\n\nThe Resource chooser window that appears allows\
    \ you to pick icons from the resource file(s) in the project to use in your UI.\n\
    \nFigure 93. Select the location\n\nSelecting the icons from the resource file\
    \ in this way ensures that they will always work, as long as you compile and bundle\
    \ the compiled resource file with your app.\n\n### Using a QRC file with compiled\
    \ UI files\n\nIf you’re designing your UIs in Qt Designer and compiling the resulting\
    \ UI file to Python, then UI compiler automatically adds imports to a *compiled*\
    \ version of your Qt Resource file for you. For example, if you run the following\
    \ —\n\n```bash\npyside2-uic mainwindow.ui -o MainWindow.py\n```\n\nThis build\
    \ process also adds imports to `MainWindow.py` for the compiled version of the\
    \ resources used in the UI, in our case `resources.qrc`. This means you do not\
    \ need to import the resources separately into your app. However, we still need\
    \ to build them, and use the specific name that is used for the import in `MainWindow.py`,\
    \ here `resources_rc`."
  mdcn: "## 15. Qt 资源系统\n\n构建应用程序不仅仅是编写代码。通常，你的界面需要为操作添加图标，可能还需要添加插图或品牌标志，或者你的应用程序可能需要加载数据文件来预填充控件。这些*数据文件*与应用程序的源代码是分开的，但最终需要与源代码一起打包和分发，应用程序才能正常工作。\n\
    \n将数据文件与应用程序一起分发是导致问题的常见原因。如果你通过路径引用数据文件，除非目标计算机上存在完全相同的路径，否则你的应用程序将无法正常工作。在为跨平台（Windows、macOS\
    \ 和 Linux）打包应用程序时，这可能会变得更加棘手。幸运的是，Qt 的*资源系统*可以解决这个问题。\n\n由于我们使用 Qt 构建 GUI，我们可以利用\
    \ Qt 资源系统来打包、识别和加载应用程序中的资源。资源被*打包*到 Python 文件中，这些文件可以与你的源代码一起分发，从而保证它们在其他平台上也能继续工作。你可以通过\
    \ Qt Designer（或 Qt Creator）管理 Qt 资源，并使用资源库为你的应用程序添加图标（和其他图形）。\n\n### QRC 文件\n\n\
    Qt 资源系统的核心是*资源文件*或 QRC。`.qrc` 文件是一个简单的 XML 文件，可以在任何文本编辑器中打开。\n\n> 你也可以使用 Qt Designer\
    \ 创建 QRC 文件并添加和删除资源，我们将在后面介绍。\n\n### 简单的 QRC 示例\n\n下面显示了一个非常简单的资源文件，其中包含一个资源（一个我们可能添加到按钮上的单个图标\
    \ `animal-penguin.png`）。\n\n```xml\n<!DOCTYPE RCC>\n<RCC version=\"1.0\">\n  \
    \  <qresource prefix=\"icons\">\n        <file alias=\"animal-penguin.png\">animal-penguin.png</file>\n\
    \    </qresource>\n</RCC>\n```\n\n`<file>` `</file>` 标签之间的名称是相对于资源文件的文件路径。`alias`\
    \ 是此资源在应用程序内部被识别的名称。你可以使用它来*重命名*图标，使其在应用程序中更合乎逻辑或更简单，同时在外部保持原始名称。\n\n例如，如果我们想在内部使用名称\
    \ `penguin.png`，我们可以将这一行更改为：\n\n```xml\n<file alias=\"penguin.png\">animal-penguin.png</file>\n\
    ```\n\n> 这只会更改*应用程序内部*使用的名称，文件名保持不变。\n\n在此标签之外是 `qresource` 标签，它指定了一个 `prefix`。这是一个*命名空间*，可用于将资源分组在一起。这实际上是一个虚拟文件夹，所有嵌套的资源都可以在其中找到。\n\
    \n### 使用 QRC 文件\n\n要在应用程序中使用 `.qrc` 文件，你首先需要将其编译为 Python。PySide2 附带了一个命令行工具来完成此操作，该工具以\
    \ `.qrc` 文件作为输入，并输出一个包含编译数据的 Python 文件。然后，可以像导入任何其他 Python 文件或模块一样将其导入到你的应用程序中。\n\
    \n要将我们的 `resources.qrc` 文件编译为名为 `resources.py` 的 Python 文件，我们可以使用 —\n\n```bash\n\
    pyside2-rcc resources.qrc -o resources.py\n```\n\n要在我们的应用程序中使用资源文件，我们需要进行一些小的更改。首先，我们需要在应用程序顶部\
    \ `import resources`，以将资源加载到 Qt 资源系统中；其次，我们需要将图标文件的路径更新为使用资源路径格式，如下所示：\n\n```\n\
    :/icons/penguin.png\n```\n\n前缀 `:/` 表示这是一个*资源路径*。第一个名称 \"icons\" 是*前缀*命名空间，文件名取自文件*别名*，两者都在我们的\
    \ `resources.qrc` 文件中定义。\n\n更新后的应用程序如下所示。\n\n清单 72. /designer/qresource.py\n\n\
    ```python\nimport sys\n\nfrom PySide2 import QtGui, QtWidgets\n\nimport resources\
    \  # Import the compiled resource file.\n\nclass MainWindow(QtWidgets.QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    Hello World\")\n        b = QtWidgets.QPushButton(\"My button\")\n\n        icon\
    \ = QtGui.QIcon(\":/icons/penguin.png\")\n        b.setIcon(icon)\n        self.setCentralWidget(b)\n\
    \n        self.show()\n\napp = QtWidgets.QApplication(sys.argv)\nw = MainWindow()\n\
    app.exec_()\n```\n\n### 在 Qt Designer 和 Qt Creator 中使用资源\n\n虽然直接编辑 QRC 文件来管理资源相当简单，但也可以使用\
    \ **Qt Designer** 来编辑资源库。这允许你直观地查看所有图标（和其他数据），重新排列它们，并通过拖放进行编辑。如果你在 **Qt Designer**\
    \ 中构建应用程序 UI，你也可以直接从资源文件中选择图标，通过浏览和选择它们。UI 文件将保留对资源文件的引用，资源将自动加载。\n\n### 在 Qt\
    \ Designer 中添加资源\n\n如果你使用的是独立的 Qt Designer，资源浏览器作为一个可停用的控件可用，默认情况下在右下角可见。如果资源浏览器被隐藏，你可以通过工具栏上的“视图”菜单显示它。\n\
    \n要添加、编辑和删除资源文件，请单击资源浏览器面板中的铅笔图标。这将打开资源编辑器。\n\n在资源编辑器视图中，你可以通过单击左下角的文档文件夹图标（中间图标）来打开现有的资源文件。\n\
    \n图 89. 在 Qt Designer 中编辑资源\n\n在左侧面板中，你还可以从 UI 中创建和删除资源文件。而在右侧，你可以创建新的前缀、将文件添加到前缀以及删除项目。对资源文件的更改会自动保存。\n\
    \n### 在 Qt Creator 中添加资源\n\n为了能够使用 Qt 资源系统从 Qt Creator 中添加图标，你需要有一个活动的 Qt 项目，并将你的\
    \ UI 和资源文件都添加到其中。\n\n> 如果你没有设置 Qt Creator 项目，你可以在现有的源文件夹中创建一个。Qt Creator 会在覆盖任何文件之前提示你。单击“+\
    \ 新建”，选择“Qt for Python - 空”作为项目类型。选择你的源文件夹**上方**的文件夹作为“创建位置”，并提供你的源文件夹名称作为项目名称。你可以删除创建的任何文件，但\
    \ `.pyproject` 除外，它保存项目设置。\n\n图 90. 选择位置\n\n要将资源添加到现有项目，请在左侧面板上选择“编辑”视图。你将在左侧面板中看到一个文件树浏览器。右键单击文件夹并选择“添加现有文件...”，然后将现有的\
    \ `.qrc` 文件添加到项目中。\n\n图 91. 编辑视图，显示已添加的文件\n\n> 当你在这里添加/删除内容时，UI 不会更新，这似乎是 Qt Creator\
    \ 中的一个错误。如果你关闭并重新打开 Qt Creator，文件将会在那里。\n\n将 QRC 文件添加到文件列表后，你应该能够像展开文件夹一样展开该文件，并浏览其中的资源。你也可以使用此界面添加和删除资源。\n\
    \n### 在 Qt Creator 和 Qt Designer 中使用资源\n\n加载资源文件后，你将能够从设计器属性中访问它。下面的截图显示了设计器打开了我们的计数器应用程序，并选择了\
    \ *increment* 按钮。可以通过单击小的黑色向下箭头并选择“选择资源...”来选择按钮的图标。\n\n图 92. 选择位置\n\n出现的资源选择器窗口允许你从项目中的资源文件中选择图标，以在\
    \ UI 中使用。\n\n图 93. 选择位置\n\n以这种方式从资源文件中选择图标可确保它们始终有效，只要你编译资源文件并将其与应用程序一起打包。\n\n\
    ### 在编译的 UI 文件中使用 QRC 文件\n\n如果你在 Qt Designer 中设计 UI 并将生成的 UI 文件编译为 Python，那么 UI\
    \ 编译器会自动为你添加对*编译后*版本的 Qt 资源文件的导入。例如，如果你运行以下命令 —\n\n```bash\npyside2-uic mainwindow.ui\
    \ -o MainWindow.py\n```\n\n此构建过程还会在 `MainWindow.py` 中添加对 UI 中使用的资源的编译版本的导入，在我们的例子中是\
    \ `resources.qrc`。这意味着你不需要单独将资源导入到应用程序中。但是，我们仍然需要构建它们，并使用 `MainWindow.py` 中用于导入的特定名称，这里是\
    \ `resources_rc`。"
