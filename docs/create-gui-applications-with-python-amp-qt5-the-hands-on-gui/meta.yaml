    widgets. These allow adjustment in position either *relative* to their normal
    position, or in *absolute* reference to their parent widget. We''ll look at these
    positioning methods below.


    | Property | Type (Default) | Description |

    | :--- | :--- | :--- |

    | `position` | relative \| absolute (relative) | Whether offsets specified using
    left, right, top, and bottom are relative or absolute coordinates. |'
