    \ from within your code. This allows Qt to continue to respond to the host OS\
    \ and your application will stay responsive. You can do this easily by using the\
    \ static `.processEvents()` function on the `QApplication` class. Simply add a\
    \ line like the following, somewhere in your long-running code block:\n\n```python\n\
    QApplication.processEvents()\n```\n\nIf we take our long-running `time.sleep`\
    \ code and break it down into multiple steps, we can insert `.processEvents` in\
    \ between. The code for this would be:\n\n```python\ndef oh_no(self):\n    for\
    \ n in range(5):\n        QApplication.processEvents()\n        time.sleep(1)\n\
    ```\n\nNow when you push the button your code is entered as before. However, now\
    \ `QApplication.processEvents()` intermittently passes control back to Qt, and\
    \ allows it to respond to OS events as normal. Qt will now accept events *and\
    \ handle them* before returning to run the remainder of your code.\n\nThis works,\
    \ but it's horrible for a couple of reasons.\n\nFirstly, when you pass control\
    \ back to Qt, your code is no longer running. This means that whatever long-running\
    \ thing you're trying to do will take *longer*. That is probably not what you\
    \ want.\n\nSecondly, processing events outside the main event loop causes your\
    \ application to branch off into handling code (e.g. for triggered slots, or events)\
    \ while in your loop. If your code depends on/responds to external state this\
    \ can cause undefined behavior. The code below demonstrates this in action:\n\n\
    *Listing 166. bad_example_2.py*\n\n```python\nimport sys\nimport time\n\nfrom\
    \ PySide2.QtCore import QTimer\nfrom PySide2.QtWidgets import (\n    QApplication,\n\
    \    QLabel,\n    QMainWindow,\n    QPushButton,\n    QVBoxLayout,\n    QWidget,\n\
    )\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.counter = 0\n\n        layout = QVBoxLayout()\n\n        self.l\
    \ = QLabel(\"Start\")\n        b = QPushButton(\"DANGER!\")\n        b.pressed.connect(self.oh_no)\n\
    \n        c = QPushButton(\"?\")\n        c.pressed.connect(self.change_message)\n\
    \n        layout.addWidget(self.l)\n        layout.addWidget(b)\n\n        layout.addWidget(c)\n\
    \n        w = QWidget()\n        w.setLayout(layout)\n\n        self.setCentralWidget(w)\n\
    \n        self.show()\n\n    def change_message(self):\n        self.message =\
    \ \"OH NO\"\n\n    def oh_no(self):\n        self.message = \"Pressed\"\n\n  \
    \      for _ in range(100):\n            time.sleep(0.1)\n            self.l.setText(self.message)\n\
    \            QApplication.processEvents()\n\napp = QApplication(sys.argv)\nwindow\
    \ = MainWindow()\napp.exec_()\n```\n\nIf you run this code you'll see the counter\
    \ as before. Pressing \"DANGER!\" will change the displayed text to \"Pressed\"\
    , as defined at the entry point to the `oh_no` function. However, if you press\
    \ the \"?\" button while `oh_no` is still running you'll see that the message\
    \ changes. State is being changed from outside your loop.\n\nThis is a toy example.\
    \ However, if you have multiple long-running processes within your application,\
    \ with each calling `QApplication.processEvents()` to keep things ticking, your\
    \ application behavior can quickly become unpredictable.\n\n## Threads and Processes\n\
    \nIf you take a step back and think about what you want to happen in your application,\
    \ it can probably be summed up with \"stuff to happen at the same time as other\
    \ stuff happens\". There are two main approaches to running independent tasks\
    \ on a computer: *threads* and *processes*.\n\n*Threads* share the same memory\
    \ space, so are quick to start up and consume minimal resources. The shared memory\
    \ makes it trivial to pass data between threads, however reading/writing memory\
    \ from different threads can lead to race conditions or segfaults. In Python there\
    \ is the added issue that multiple threads are bound by the same Global Interpreter\
    \ Lock (GIL) — meaning non-GIL-releasing Python code can only execute in one thread\
    \ at a time. However, this is not a major issue with PySide2 where most of the\
    \ time is spent outside of Python.\n\n*Processes* use separate memory space (and\
    \ an entirely separate Python interpreter). This side-steps any potential problems\
    \ with the GIL, but at the cost of slower start-up times, larger memory overhead\
    \ and complexity in sending/receiving data.\n\nFor simplicity's sake it usually\
    \ makes sense to use threads. Processes in Qt are better suited to running and\
    \ communicating with external programs. In this chapter we'll look at the options\
    \ available to you from within Qt to move work onto separate threads and processes.\n\
    \n## 32. Using the thread pool\n\nQt provides a very simple interface for running\
    \ jobs in other threads, which is exposed nicely in PySide2. This is built around\
    \ two classes—`QRunnable` and `QThreadPool`. The former is the container for the\
    \ work you want to perform, while the latter is the manager for your working threads.\n\
    \nThe neat thing about using `QThreadPool` is that it handles queuing and execution\
    \ of workers for you. Other than queuing up jobs and retrieving the results there\
    \ is not very much to do at all.\n\nTo define a custom `QRunnable` you can subclass\
    \ the base `QRunnable` class, then place the code you wish to execute within the\
    \ `run()` method. The following is an implementation of our long running `time.sleep`\
    \ job as a `QRunnable`. Add the following code to `multithread.py`, above the\
    \ `MainWindow` class definition.\n\n*Listing 167. concurrent/qrunner_1.py*\n\n\
    ```python\nclass Worker(QRunnable):\n    \"\"\"\n    Worker thread\n    \"\"\"\
    \n\n    @Slot()\n    def run(self):\n        \"\"\"\n        Your code goes in\
    \ this function\n        \"\"\"\n        print(\"Thread start\")\n        time.sleep(5)\n\
    \        print(\"Thread complete\")\n```\n\nExecuting our function in another\
    \ thread is simply a matter of creating an instance of the `Worker` and then pass\
    \ it to our `QThreadPool` instance and it will be executed automatically.\n\n\
    Next add the following within the `__init__` block, to set up our thread pool.\n\
    \n*Listing 168. concurrent/qrunner_1.py*\n\n```python\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.threadpool\
    \ = QThreadPool()\n        print(\n            \"Multithreading with maximum %d\
    \ threads\" % self.\n            threadpool.maxThreadCount()\n        )\n```\n\
    \nFinally, replace the `oh_no` method with the following.\n\n*Listing 169. concurrent/qrunner_1.py*\n\
    \n```python\ndef oh_no(self):\n    worker = Worker()\n    self.threadpool.start(worker)\n\
    ```\n\nNow, clicking on the button will create a worker to handle the (long-running)\
    \ process and spin that off into another thread via the `QThreadPool` pool. If\
    \ there are not enough threads available to process incoming workers, they'll\
    \ be queued and executed in order at a later time.\n\n> \U0001F680 **Run it!**\
    \ You'll see that your application now handles you frantically bashing the button\
    \ with no problems.\n\nLook at the output in the console to see workers starting\
    \ and finishing.\n\n```\nMultithreading with maximum 12 threads\nThread start\n\
    Thread start\nThread start\nThread complete\nThread complete\nThread complete\n\
    ```\n\nCheck what happens if you hit the button multiple times. You should see\
    \ your threads executed immediately *up to* the number reported by `.maxThreadCount`.\
    \ If you hit the button again after there are already this number of active workers,\
    \ the subsequent workers will be queued until a thread becomes available.\n\n\
    In this example we've let `QThreadPool` decide the *ideal* number of active threads\
    \ to use. This number differs on different computers and is designed to get the\
    \ optimum performance. However, sometimes you have a need for a *specific* number\
    \ of threads — in that case, you can use `.setMaxThreadCount` to set this value\
    \ explicitly. This value is *per thread pool*.\n\n## Extended Runners\n\nIf you\
    \ want to pass custom data into the execution function you can set up your runner\
    \ to take *arguments* or *keywords* and then store that data on the `QRunner self`\
    \ object. The data will then be accessible from within the `run` method."
  mdcn: "## 错误的方法\n\n最简单的解决方法是在代码内部处理事件。这允许 Qt 继续响应宿主操作系统，从而保持应用程序的响应性。你可以通过使用 `QApplication`\
    \ 类的静态 `.processEvents()` 函数轻松实现这一点。只需在你的长时间运行代码块中的某处添加如下一行代码：\n\n```python\n\
    QApplication.processEvents()\n```\n\n如果我们把长时间运行的 `time.sleep` 代码分解成多个步骤，就可以在步骤之间插入\
    \ `.processEvents`。相应的代码如下：\n\n```python\ndef oh_no(self):\n    for n in range(5):\n\
    \        QApplication.processEvents()\n        time.sleep(1)\n```\n\n现在，当你按下按钮时，代码会像之前一样执行。然而，现在\
    \ `QApplication.processEvents()` 会间歇性地将控制权交还给 Qt，使其能够像往常一样响应操作系统事件。Qt 现在会接受事件*并处理它们*，然后才返回运行你代码的剩余部分。\n\
    \n这种方法虽然可行，但非常糟糕，原因有二。\n\n首先，当你将控制权交还给 Qt 时，你的代码就不再运行了。这意味着你试图执行的任何长时间运行的操作将花费*更长*的时间。这可能不是你想要的结果。\n\
    \n其次，在主事件循环之外处理事件会导致你的应用程序在循环中分支到处理代码（例如，用于触发的槽或事件）。如果你的代码依赖于或响应外部状态，这可能导致未定义的行为。下面的代码演示了这种情况：\n\
    \n*清单 166. bad_example_2.py*\n\n```python\nimport sys\nimport time\n\nfrom PySide2.QtCore\
    \ import QTimer\nfrom PySide2.QtWidgets import (\n    QApplication,\n    QLabel,\n\
    \    QMainWindow,\n    QPushButton,\n    QVBoxLayout,\n    QWidget,\n)\n\nclass\
    \ MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.counter = 0\n\n        layout = QVBoxLayout()\n\n        self.l\
    \ = QLabel(\"Start\")\n        b = QPushButton(\"DANGER!\")\n        b.pressed.connect(self.oh_no)\n\
    \n        c = QPushButton(\"?\")\n        c.pressed.connect(self.change_message)\n\
    \n        layout.addWidget(self.l)\n        layout.addWidget(b)\n\n        layout.addWidget(c)\n\
    \n        w = QWidget()\n        w.setLayout(layout)\n\n        self.setCentralWidget(w)\n\
    \n        self.show()\n\n    def change_message(self):\n        self.message =\
    \ \"OH NO\"\n\n    def oh_no(self):\n        self.message = \"Pressed\"\n\n  \
    \      for _ in range(100):\n            time.sleep(0.1)\n            self.l.setText(self.message)\n\
    \            QApplication.processEvents()\n\napp = QApplication(sys.argv)\nwindow\
    \ = MainWindow()\napp.exec_()\n```\n\n如果你运行这段代码，你会看到计数器像之前一样工作。按下“DANGER!”按钮会将显示的文本更改为“Pressed”，正如在\
    \ `oh_no` 函数入口点所定义的那样。然而，如果在 `oh_no` 仍在运行时按下“?”按钮，你会看到消息发生了变化。状态正在从你的循环外部被更改。\n\
    \n这是一个简单的例子。但是，如果你的应用程序中有多个长时间运行的进程，每个都调用 `QApplication.processEvents()` 来保持运行，那么你的应用程序行为很快就会变得不可预测。\n\
    \n## 线程和进程\n\n如果你退一步思考你希望在应用程序中发生什么，可以总结为“某些事情在其他事情发生的同时发生”。在计算机上运行独立任务有两种主要方法：*线程*和*进程*。\n\
    \n*线程*共享相同的内存空间，因此启动速度快且消耗最少的资源。共享内存使得在线程之间传递数据变得微不足道，但是从不同线程读写内存可能导致竞态条件或段错误。在\
    \ Python 中，还有一个额外的问题，即多个线程受同一个全局解释器锁（GIL）的约束——这意味着不释放 GIL 的 Python 代码一次只能在一个线程中执行。然而，对于\
    \ PySide2 来说，这并不是一个主要问题，因为大部分时间都花在 Python 之外。\n\n*进程*使用独立的内存空间（以及完全独立的 Python\
    \ 解释器）。这绕过了 GIL 的任何潜在问题，但代价是启动时间更慢、内存开销更大以及发送/接收数据的复杂性。\n\n为了简单起见，通常使用线程是合理的。Qt\
    \ 中的进程更适合运行和与外部程序通信。在本章中，我们将探讨 Qt 中可用的选项，以便将工作转移到单独的线程和进程中。\n\n## 32. 使用线程池\n\n\
    Qt 提供了一个非常简单的接口，用于在其他线程中运行作业，这在 PySide2 中得到了很好的体现。它围绕两个类构建——`QRunnable` 和 `QThreadPool`。前者是你想要执行的工作的容器，而后者是你的工作线程的管理器。\n\
    \n使用 `QThreadPool` 的妙处在于它为你处理了工作线程的排队和执行。除了排队作业和检索结果之外，几乎不需要做任何其他事情。\n\n要定义一个自定义的\
    \ `QRunnable`，你可以继承基类 `QRunnable`，然后将你希望执行的代码放在 `run()` 方法中。以下是我们长时间运行的 `time.sleep`\
    \ 作业作为 `QRunnable` 的实现。将以下代码添加到 `multithread.py` 中，位于 `MainWindow` 类定义之上。\n\n\
    *清单 167. concurrent/qrunner_1.py*\n\n```python\nclass Worker(QRunnable):\n   \
    \ \"\"\"\n    Worker thread\n    \"\"\"\n\n    @Slot()\n    def run(self):\n \
    \       \"\"\"\n        Your code goes in this function\n        \"\"\"\n    \
    \    print(\"Thread start\")\n        time.sleep(5)\n        print(\"Thread complete\"\
    )\n```\n\n在另一个线程中执行我们的函数，只需创建一个 `Worker` 实例，然后将其传递给我们的 `QThreadPool` 实例，它就会自动执行。\n\
    \n接下来，在 `__init__` 块中添加以下内容，以设置我们的线程池。\n\n*清单 168. concurrent/qrunner_1.py*\n\n\
    ```python\nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.threadpool = QThreadPool()\n        print(\n            \"Multithreading\
    \ with maximum %d threads\" % self.\n            threadpool.maxThreadCount()\n\
    \        )\n```\n\n最后，用以下内容替换 `oh_no` 方法。\n\n*清单 169. concurrent/qrunner_1.py*\n\
    \n```python\ndef oh_no(self):\n    worker = Worker()\n    self.threadpool.start(worker)\n\
    ```\n\n现在，点击按钮将创建一个工作线程来处理（长时间运行的）进程，并通过 `QThreadPool` 池将其转移到另一个线程。如果没有足够的线程可用于处理传入的工作线程，它们将被排队并在稍后按顺序执行。\n\
    \n> \U0001F680 **运行它！** 你会看到你的应用程序现在可以毫无问题地处理你疯狂点击按钮的情况。\n\n查看控制台输出，可以看到工作线程的启动和完成。\n\
    \n```\nMultithreading with maximum 12 threads\nThread start\nThread start\nThread\
    \ start\nThread complete\nThread complete\nThread complete\n```\n\n检查多次点击按钮会发生什么。你应该会看到你的线程立即执行，*直到*达到\
    \ `.maxThreadCount` 报告的数量。如果在已经有这么多活动工作线程的情况下再次点击按钮，后续的工作线程将被排队，直到有线程可用。\n\n在这个例子中，我们让\
    \ `QThreadPool` 决定要使用的活动线程的*理想*数量。这个数量在不同的计算机上有所不同，旨在获得最佳性能。但是，有时你需要*特定*数量的线程——在这种情况下，你可以使用\
    \ `.setMaxThreadCount` 来显式设置此值。此值是*每个线程池*的。\n\n## 扩展运行器\n\n如果你想将自定义数据传递给执行函数，可以设置你的运行器以接受*参数*或*关键字*，然后将该数据存储在\
    \ `QRunner self` 对象上。然后，该数据将可以从 `run` 方法内部访问。"
