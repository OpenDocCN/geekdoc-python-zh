    \ it will get much clearer.\n\n```\nconnect(button, QPushButton.pressed, lineEdit,\
    \ QLineEdit.clear)\n// or...\nconnect(<from object>, <from signal>, <to object>,\
    \ <to slot>)\n```\n\nWorking from left to right we have, the *object* we're connecting\
    \ from, the *signal* we're connecting from on that object, then the *object* we're\
    \ connecting to, then finally the *slot* (or function) we're connecting to on\
    \ that object. This is the equivalent of writing the following in PySide2 —\n\n\
    ```\nbutton.pressed.connect(lineedit.clear)\n```\n\nMaking that change gives us\
