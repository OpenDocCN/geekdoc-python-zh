    \ changes the name used *inside* your application, the filename remains unchanged.\n\
    \nOutside this tag is the `qresource` tag which specifies a `prefix`. This is\
    \ a **namespace** which can be used to group resources together. This is effectively\
    \ a virtual folder, under which nested resources can all be found.\n\n## Using\
    \ a QRC file\n\nTo use a `.qrc` file in your application you first need to compile\
