  md: '# Install in virtual environment (optional)


    You can also opt to install PyQt5 and **PyInstaller** in a virtual environment
    (or your applications virtual environment) to keep your environment clean.


    ```

    python3 -m venv packenv

    ```


    Once created, activate the virtual environment by running from the command line
    —


    ```

    call packenv\scripts\activate.bat

    ```


    Finally, install the required libraries. For PyQt5 you would use —


    ```

    pip3 install PyQt5 PyInstaller

    ```


    Or for Qt for Python (PySide2) —


    ```

    pip3 install PySide2 PyInstaller

    ```


    # Getting Started


    It''s a good idea to start packaging your application *from the very beginning*
    so you can confirm that packaging is still working as you develop it. This is
    particularly important if you add additional dependencies. If you only think about
    packaging at the end, it can be difficult to debug exactly *where* the problem
    was introduced.


    For this example we''re going to start with a simple skeleton app, which doesn''t
    do anything except show a window on the desktop. Once we''ve got the basic packaging
    process working, we''ll extend the application to include icons and data files.
    We''ll confirm the build as we go along.


    To start with, create a new folder for your application and then add the following'
