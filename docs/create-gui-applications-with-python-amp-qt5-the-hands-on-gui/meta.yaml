  md: '# Color


    Your operating system has a standard theme which is respected by most software.
    Qt picks up this color scheme automatically and will apply it to your PySide2
    applications to help them fit in. Using these colors has some advantages —


    +   1. Your app will look at home on your user''s desktop

    2. Your users are familiar with the meaning of contextual colors

    3. Somebody else has spent time designing colors that work


    If you want to replace the color scheme, make sure that the benefits outweigh
    the costs.


    Sometimes your applications may require additional contextual colors or tweaks
    to highlights. For data visualization a good resource is [Color Brewer](https://colorbrewer2.org/)
    from *Cynthia Brewer* which has both qualitative and quantitative schemes. If
    you only need a few colors [coolors.co](https://coolors.co/) lets you generate
    custom well-matched 4-color themes.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_210_0.png)


    *Figure 98. Example color scheme from coolors.co*


    Use colors simply and effectively, restricting your palette as far as possible.
    If particular colors have meaning somewhere use the same meaning *everywhere*.
    Avoid using multiple shades unless those shades have meaning.


    # ✔ DO


    +   - Consider using GUI-standard colors in your app first.'
  merge: -1
  pgno: 210
- img_proc: true
  md: '+   - When using custom colors define a color scheme and stick to it.

    - Keep color-blind users in mind when choosing colors and contrasts.

    - Where possible, don''t use only color to show something. Consider using borders,
    fill patterns, etc., as well as colors.


    **✖ DON''T**


    +   - Use standard colors for non-standard purposes, e.g. Red = OK.'
  merge: -1
