    \        super().__init__()\n\n        self.message.connect(self.my_custom_fn)\n\
    \n        le = QLineEdit(\"Enter some text\")\n        le.textChanged.connect(self.message.emit)\
    \ ①\n\n        self.setCentralWidget(le)\n\n    def my_custom_fn(self, s):\n \
    \       print(s)\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\nwindow.show()\n\
    app.exec_()\n```\n\n① By connecting the signal to the `.emit` of another, we can\
    \ forward the signal to the receiving signals listeners.\n\nIf it's not immediately\
    \ obvious why this would be useful, don't worry — it usually isn't! But it can\
    \ help to maintain isolation between components, particularly where the receiving\
    \ slot you are targeting is a private method. By hooking into the public signals\
    \ you can have the intended effect while keeping your components properly decoupled."
