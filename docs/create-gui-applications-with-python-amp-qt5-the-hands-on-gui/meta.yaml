  md: '# # Appendix A: Installing PySide2


    Before you start coding you will first need to have a working installation of
    PySide2 and Qt on your system. If you don''t have PySide2 set up yet, the following
    sections will guide you through how to do this on Windows, macOS and Linux.


    # ## Installation Windows


    PySide2 for Windows can be installed in Python as for any other application or
    library. As of Qt 5.6 installers are available to install via PyPi, the Python
    Package archive.


    To install PySide2 from Python3 simply run —


    ```

    bash

    pip3 install pyside2

    ```


    After install is finished, you should be able to run `python` and `import PySide2`.


    Note that if you want access to Qt Creator you will need to download this from
    [the Qt downloads site](https://www.qt.io/download).


    # ## Installation macOS


    If you already have a working installation of Python 3 on macOS, you can go ahead
    and install PySide2 as for any other Python package, using the following —


    ```

    bash

    pip3 install pyside2

    ```


    If you *don''t* have an installation of Python 3, you will need to install one
    first. You can download macOS installers for Python 3 from the [Python homepage](https://www.python.org/).
    Once installed, you should be able to use the `pip3 install` command above to
    install PySide2.'
  merge: -1
  pgno: 697
