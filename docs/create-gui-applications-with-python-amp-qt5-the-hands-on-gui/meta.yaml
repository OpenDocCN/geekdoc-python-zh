    \ we find a position which is not a mine. Since we don't know how many attempts\
    \ this will take, we need to wrap it in an continuous loop.\n\nOnce that location\
    \ is found, we mark it as the start location and then trigger the exploration\
    \ of all surrounding positions. We break out of the loop, and reset the ready\
    \ status."
