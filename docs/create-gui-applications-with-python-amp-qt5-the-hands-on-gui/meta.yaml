    \n*Figure 43. Toolbar with an action and two widgets.*\n\n## Menus\n\nMenus are\
    \ another standard component of UIs. Typically they are on the top of the window,\
    \ or the top of a screen on macOS. They allow access to all standard application\
    \ functions. A few standard menus exist — for example File, Edit, Help. Menus\
    \ can be nested to create hierarchical trees of functions and they often support\
    \ and display keyboard shortcuts for fast access to their functions.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_109_1.png)\n\
    \n*Figure 44. Standard GUI elements - Menus*\n\nTo create a menu, we create a\
