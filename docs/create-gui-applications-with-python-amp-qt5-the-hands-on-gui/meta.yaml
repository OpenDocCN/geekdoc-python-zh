- md: "Widgets by default only receive mouse move events when a mouse button is pressed,\
    \ unless *mouse tracking* is enabled. This can be configured using the `.setMouseTracking`\
    \ method — setting this to `True` (it is `False` by default) will track the mouse\
    \ continuously.\n\nIf you save this and run it you should be able to move your\
    \ mouse over the screen and click to draw individual points. It should look something\
    \ like this —\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_423_0.png)\n\n*Figure\
    \ 191. Drawing individual mouseMoveEvent points.*\n\nThe issue here is that when\
    \ you move the mouse around quickly it actually jumps between locations on the\
    \ screen, rather than moving smoothly from one place to the next. The `mouseMoveEvent`\
    \ is fired for each location the mouse is in, but that's not enough to draw a\
    \ continuous line, unless you move *very slowly*.\n\nThe solution to this is to\
    \ draw *lines* instead of *points*. On each event we simply draw a line from where\
    \ we were (previous `e.x()` and `e.y()`) to where we are now (current `e.x()`\
    \ and `e.y()`). We can do this by tracking `last_x` and `last_y` ourselves.\n\n\
    We also need to *forget* the last position when releasing the mouse, or we'll\
    \ start drawing from that location again after moving the mouse across the page\
    \ — i.e. we won't be able to break the line.\n\nListing 140. bitmap/paint_line.py\n\
    \n```python\nimport sys\n\nfrom PySide2 import QtCore, QtGui, QtWidgets\nfrom\
    \ PySide2.QtCore import Qt\n\nclass MainWindow(QtWidgets.QMainWindow):\n\n   \
    \ def __init__(self):\n        super().__init__()\n\n        self.label = QtWidgets.QLabel()\n\
    \        canvas = QtGui.QPixmap(400, 300)\n        self.label.setPixmap(canvas)\n\
    \        self.setCentralWidget(self.label)\n\n        self.last_x, self.last_y\
    \ = None, None\n\n    def mouseMoveEvent(self, e):\n        if self.last_x is\
    \ None: # First event.\n            self.last_x = e.x()\n            self.last_y\
    \ = e.y()\n            return # Ignore the first time.\n\n        painter = QtGui.QPainter(self.label.pixmap())\n\
    \        painter.drawLine(self.last_x, self.last_y, e.x(), e.y())\n        painter.end()\n\
    \        self.update()\n\n        # Update the origin for next time.\n       \
    \ self.last_x = e.x()\n        self.last_y = e.y()\n\n    def mouseReleaseEvent(self,\
    \ e):\n        self.last_x = None\n        self.last_y = None\n\napp = QtWidgets.QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec_()\n```\n\nIf you run this you\
    \ should be able to scribble on the screen as you would expect.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_425_0.png)\n\
    \n*Figure 192. Drawing with the mouse, using a continuous line.*\n\nIt’s still\
    \ a bit dull, so let’s add a simple palette to allow us to change the pen color.\n\
    \nThis requires a bit of re-architecting to ensure the mouse position is detected\
    \ accurately. So far we've using the `mouseMoveEvent` on the `QMainWindow`. When\
    \ we only have a single widget in the window this is fine — as long as you don't\
    \ resize the window, the coordinates of the container and the single nested widget\
    \ line up. However, if we add other widgets to the layout this won't hold — the\
    \ coordinates of the `QLabel` will be offset from the window, and we'll be drawing\
    \ in the wrong location.\n\nThis is easily fixed by moving the mouse handling\
    \ onto the `QLabel` itself— it's event coordinates are always relative to itself.\
    \ This we wrap up as an individual `Canvas` object, which handles the creation\
    \ of the pixmap surface, sets up the x & y locations and the holds the current\
    \ pen color (set to black by default).\n\n> \U0001F4A1 This self-contained `Canvas`\
    \ is a drop-in drawable surface you could use in your own apps.\n\nListing 141.\
    \ bitmap/paint.py\n\n```python\nimport sys\n\nfrom PySide2 import QtCore, QtGui,\
    \ QtWidgets\nfrom PySide2.QtCore import Qt\n\nclass Canvas(QtWidgets.QLabel):\n\
    \    def __init__(self):\n        super().__init__()\n        pixmap = QtGui.QPixmap(600,\
    \ 300)\n        pixmap.fill(Qt.white)\n        self.setPixmap(pixmap)\n\n    \
