    # The widget Box Model


    The term *box model* describes the relationships between the *boxes* (rectangles)
    which surround each widget and the effect these boxes have on the size or layout
    of widgets in relationship to one another. Each Qt widget is surrounded by four
    concentric boxes—from inside out, these are content, padding, border and margin.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_237_0.png)


    Figure 113. The box model.


    Increasing the size of the inner boxes, increases the size of the outer boxes.
    This arrangement means, for example, that increasing the *padding* of a widget
    will add space between the content the border, while increasing the dimensions
    of the border itself.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_237_1.png)


    Figure 114. The effect on other boxes of adding padding to the right.'
