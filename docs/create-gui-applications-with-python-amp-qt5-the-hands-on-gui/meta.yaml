    \ are cached in the model, and written to the database only when `.submitAll()`\
    \ is called, or discarded when `revertAll()` is called. |\n\nYou can set the current\
    \ edit strategy for the model by calling `.setEditStrategy` on it. For example\
    \ —\n\n```python\nself.model.setEditStrategy(QSqlTableModel.OnRowChange)\n```\n\
