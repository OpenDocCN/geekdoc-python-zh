    \ in the root folder of the project as `mainwindow.ui` and then compiled using\
    \ the UI compiler to produce an importable `.py` file, as follows.\n\n```bash\n\
    pyuic5 mainwindow.ui -o MainWindow.py\n```\n\n> For more on building UIs with\
    \ Qt Designer see the [introductory tutorial](https://www.pythonguis.com/tutorials/first-steps-qt-creator/).\n\
    \nThis build process also adds imports to `MainWindow.py` for the compiled version\
    \ of the resources using in the UI, in our case `resources.qrc`. This means we\
    \ do not need to import the resources separately into our app. However, we still\
    \ need to build them, and use the specific name that is used for the import in\
    \ `MainWindow.py`, here `resources_rc`.\n\n```bash\npyrcc5 resources.qrc -o resources_rc.py\n\
    ```\n\n> \U0001F4A1 `pyuic5` follows the pattern `<resource name>_rc.py` when\
    \ adding imports for the resource file, so you will need to follow this when compiling\
    \ resources yourself. You can check your compiled UI file (e.g. `MainWindow.py`)\
    \ to double check the name of the import if you have problems.\n\n## Building\
    \ the app\n\nWith all the above setup, we can build **Piecasso** as follows from\
    \ the source folder.\n\n```bash\npyinstaller --windowed --icon=icons/piecasso.ico\
    \ --name Piecasso paint.py\n```\n\nIf you download the source code, you will also\
    \ be able to run the same build using the provided `.spec` file.\n\n```bash\n\
    pyinstaller Piecasso.spec\n```\n\nThis packages everything up ready to distribute\
    \ in the `dist/Piecasso` folder. We can run the executable to ensure everything\
    \ is bundled correctly, and see the following window, minus the terrible drawing.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_652_0.png)\n\nFigure 264. Piecasso\
    \ Screenshot, with a poorly drawn cat\n\n## Example applications\n\nBy now you\
    \ should have a firm grasp of how to go about building simple applications with\
    \ PySide2. To show how you can put what you've learnt into practice, I've included\
    \ a couple of example applications in this chapter. These applications are functional,\
    \ simple and in some ways *incomplete*. Use them for inspiration, to pull apart\
    \ and as an opportunity to improve. Read on for a walkthrough of each app's most\
    \ interesting parts.\n\nThe full source for both applications is available for\
    \ download, along with 13 other applications in my [15 Minute Apps](https://github.com/realpython/python-gui-tkinter)\
    \ repository on Github. Have fun!\n\nThere are also other examples of miniature\
    \ apps throughout this book—for example the *Paint* and *Todo* apps—I encourage\
    \ you to extend these too, it's the best way to learn.\n\n# 38. Mozzarella Ashbadger\n\
    \nMozzarella Ashbadger is the latest revolution in web browsing! Go back and forward!\
    \ Print! Save files! Get help! (you'll need it). Any similarity to other browsers\
    \ is entirely coincidental.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_654_0.png)\n\
    \n*Figure 265. Mozzarella Ashbadger.*\n\n> \U0001F4A1 This application makes use\
    \ of features covered in [Signals & Slots](Signals & Slots), [Extending Signals](Extending\
    \ Signals) and [Widgets](Widgets).\n\nThe source code for Mozzarella Ashbadger\
    \ is provided in two forms, one with tabbed browsing and one without. Adding tabs\
    \ complicates the signal handling a little bit, so the tab-less version is covered\
    \ first.\n\n## Source code\n\nThe full source for the tab-less browser is included\
    \ in the downloads for this book. The browser code has the name `browser.py`.\n\
    \n```bash\npython3 browser.py\n```\n\n> \U0001F680 **Run it!** Explore the *Mozzarella\
    \ Ashbadger* interface and features before moving onto the code.\n\n# The browser\
    \ widget\n\nThe core of our browser is the `QWebEngineView` which we import from\
    \ `QtWebEngineWidgets`. This provides a complete browser window, which handles\
    \ the rendering of the downloaded pages.\n\nBelow is the bare-minimum of code\
    \ required to use web browser widget in PySide2.\n\nListing 212. app/browser_skeleton.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import QUrl\nfrom PySide2.QtWebEngineWidgets\
    \ import QWebEngineView\nfrom PySide2.QtWidgets import QApplication, QMainWindow\n\
    \n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.browser = QWebEngineView()\n        self.browser.setUrl(QUrl(\"\
    https://www.google.com\"))\n\n        self.setCentralWidget(self.browser)\n\n\
    \        self.show()\n\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\n\
    \napp.exec_()\n```\n\nIf you click around a bit you'll discover that the browser\
    \ behaves as expected—links work correctly, and you can interact with the pages.\
    \ However, you'll also notice things you take for granted are missing—like an\
    \ URL bar, controls or any sort of interface whatsoever. This makes it a little\
    \ tricky to use.\n\n## Navigation\n\nTo convert this bare-bones browser into something\
    \ usable we add some controls, as a series of QActions on a QToolbar. We add these\
    \ definitions to the __init__ block of the QMainWindow.\n\nListing 213. app/browser.py\n\
    \n```python\nnavtb = QToolBar(\"Navigation\")\nnavtb.setIconSize(QSize(16, 16))\n\
    self.addToolBar(navtb)\n\nback_btn = QAction(QIcon(os.path.join(\"icons\", \"\
    arrow-180.png\")), \"Back\", self)\nback_btn.setStatusTip(\"Back to previous page\"\
    )\nback_btn.triggered.connect(self.browser.back)\nnavtb.addAction(back_btn)\n\
    ```\n\nThe QWebEngineView includes slots for forward, back and reload navigation,\
    \ which we can connect to directly to our action’s .triggered signals.\n\nWe use\
    \ the same QAction structure for the remaining controls.\n\nListing 214. app/browser.py\n\
    \n```python\nnext_btn = QAction(\n    QIcon(os.path.join(\"icons\", \"arrow-000.png\"\
    )), \"Forward\",\n    self\n)\nnext_btn.setStatusTip(\"Forward to next page\"\
    )\nnext_btn.triggered.connect(self.browser.forward)\nnavtb.addAction(next_btn)\n\
    \nreload_btn = QAction(\n    QIcon(os.path.join(\"icons\", \"arrow-circle-315.png\"\
    )),\n    \"Reload\", self\n)\nreload_btn.setStatusTip(\"Reload page\")\nreload_btn.triggered.connect(self.browser.reload)\n\
    navtb.addAction(reload_btn)\n\nhome_btn = QAction(QIcon(os.path.join(\"icons\"\
    , \"home.png\")),\n    \"Home\", self)\nhome_btn.setStatusTip(\"Go home\")\nhome_btn.triggered.connect(self.navigate_home)\n\
    navtb.addAction(home_btn)\n```\n\nNotice that while forward, back and reload can\
    \ use built-in slots, the navigate home button requires a custom slot function.\
    \ The slot function is defined on our QMainWindow class, and simply sets the URL\
    \ of the browser to the Google homepage. Note that the URL must be passed as a\
    \ QUrl object.\n\nListing 215. app/browser.py\n\n```python\ndef navigate_home(self):\n\
    \    self.browser.setUrl(QUrl(\"http://www.google.com\"))\n```\n\n> Challenge\n\
    Try making the home navigation location configurable. You could create a Preferences\
    \ QDialog with an input field.\n\nAny decent web browser also needs an URL bar,\
    \ and some way to stop the navigation — either when it's by mistake, or the page\
    \ is taking too long.\n\nListing 216. app/browser.py\n\n```python\nself.httpsicon\
    \ = QLabel()  # Yes, really!\nself.httpsicon.setPixmap(QPixmap(os.path.join(\"\
    icons\", \"lock-nossl.png\")))\nnavtb.addWidget(self.httpsicon)\n\nself.urlbar\
    \ = QLineEdit()\nself.urlbar.returnPressed.connect(self.navigate_to_url)\nnavtb.addWidget(self.urlbar)\n\
    \nstop_btn = QAction(\n    QIcon(os.path.join(\"icons\", \"cross-circle.png\"\
    )), \"Stop\",\n    self\n)\nstop_btn.setStatusTip(\"Stop loading current page\"\
    )\nstop_btn.triggered.connect(self.browser.stop)\nnavtb.addAction(stop_btn)\n\
    ```\n\nAs before the 'stop' functionality is available on the `QWebEngineView`,\
    \ and we can simply connect the `.triggered` signal from the stop button to the\
    \ existing slot. However, other features of the URL bar we must handle independently.\n\
    \nFirst we add a `QLabel` to hold our SSL or non-SSL icon to indicate whether\
    \ the page is secure. Next, we add the URL bar which is simply a `QLineEdit`.\
    \ To trigger the loading of the URL in the bar when entered (return key pressed)\
    \ we connect to the `.returnPressed` signal on the widget to drive a custom slot\
    \ function to trigger navigation to the specified URL."
