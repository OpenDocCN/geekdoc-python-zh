  md: '# 1. A very brief history of the GUI


    The **Graphical User Interface** has a long and venerable history dating back
    as far as the 1960s. Stanford’s NLS (oN-Line System) introduced the mouse and
    windows concepts, first demonstrated publicly in 1968. This was followed by the
    Xerox PARC Smalltalk system GUI 1973, which is the foundation of most modern general
    purpose GUIs.


    These early systems already had many of the features we take for granted in modern
    desktop GUIs, including windows, menus, radio buttons, check boxes and later icons.
    This combination of features — gave us the early acronym used for these types
    of interfaces: WIMP (windows, icons, menus, pointing device — a mouse).


    In 1979 the first commercial system featuring a GUI was released — the PERQ workstation.
    This spurred a number of other GUI efforts including notably the Apple Lisa (1983),
    which added the concept of the menu bar and window controls. As well as many other
    systems from the Atari ST (GEM), Amiga. On UNIX (and later Linux) the X Window
    System emerged in 1984. The first version of Windows for PC was released in 1985.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_6_0.png)


    Early GUIs were not the instant hit we might assume, due to the lack of compatible
    software at launch and expensive hardware'
  merge: -1
  pgno: 6
- img_proc: true
  md: 'requirements—particularly for home users. Slowly, but steadily, the GUI interface
    become the preferred way to interact with computers and the WIMP metaphor became
    firmly established as the standard. That''s not to say there haven''t been *attempts*
    to replace the WIMP metaphor on the desktop. Microsoft Bob (1995), for example,
    was Microsoft''s much maligned attempt to replace the desktop with a house.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_7_0.png)


    *Figure 2. Microsoft Bob — Discarding the desktop metaphor for a cartoon house.*


    There have been no shortage of other GUIs hailed as *revolutionary* in their time,
    from the launch of Windows 95 (1995) through to Mac OS X (2001), GNOME Shell (2011)
    and Windows 10 (2015). Each of these overhauled the UIs of their respective desktop
    systems, often with much fanfare. But fundamentally nothing really changed. These
    new UIs are still very much WIMP systems and function in exactly the same way
    as GUIs have since the 1980s.


    When the revolution came, it was mobile—the mouse has been replaced by touch,
    and windows by full-screen apps. But even in a world where we all walk around
    with smartphones in our pocket, a huge amount of daily work is still done on desktop
    computers. WIMP has survived 40 years of innovation and looks to survive many
    more.'
  merge: -1
  pgno: 7
- img_proc: true
  md: '# 2. A bit about Qt


    Qt is a free and open-source *widget toolkit* for creating cross-platform GUI
    applications, allowing applications to target multiple platforms from Windows,
    macOS, Linux and Android with a single codebase. But Qt is *much more* than a
    widget toolkit and features built in support for multimedia, databases, vector
    graphics and MVC interfaces, it is more accurate to think of it as an application
    development *framework*.


    Qt was started by Eirik Chambe-Eng and Haavard Nord in 1991, founding the first
    Qt company *Trolltech* in 1994. Qt is currently developed by *The Qt Company*
    and continues to be regularly updated, adding features and extending mobile and
    cross-platform support.


    # Qt and PySide2


    PySide2, also known as *Qt for Python* is a Python *binding* of the Qt toolkit,
    currently developed by *The Qt Company*. When you write applications using PySide2
    what you area *really* doing is writing applications in Qt. The PySide2 library
    is simply.[1] a wrapper around the C++ Qt library, to allow it to be used in Python.


    Because this is a Python interface to a C++ library the naming conventions used
    within PySide2 do not adhere to PEP8 standards. Most notably functions and variables
    are named using `mixedCase` rather than `snake_case`. Whether you adhere to this
    standard in your own applications is entirely up to you, however I found it helped
    to follow Python standards for my own code, to help clarify where the PySide2
    code ends and your own begins.


    Lastly, while there is PySide2 specific documentation available, you will often
    find yourself reading the Qt documentation itself as it is more complete. If you
    need advice on converting Qt C++ code to Python, take a look at [Translating C++
    Examples to Python](https://doc.qt.io/qtforpython/tutorials/portingguide.html).'
  merge: -1
  pgno: 8
