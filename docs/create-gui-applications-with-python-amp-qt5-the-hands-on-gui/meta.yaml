    The standard Qt line styles can all be used, including Qt.SolidLine, Qt.DashLine,
    Qt.DotLine, Qt.DashDotLine and Qt.DashDotDotLine. Examples of each of these lines
    are shown in the image below, and you can read more in the Qt Documentation.


    # Line Markers


    For many plots it can be helpful to place markers in addition or instead of lines
    on the plot. To draw a marker on the plot, pass the symbol to use as a marker
    when calling .plot as shown below.


    ```

    self.graphWidget.plot(hour, temperature, symbol=''+'')

    ```


    In addition to symbol you can also pass in symbolSize, symbolBrush and symbolPen'
  - "[PAGE 573]\n\nparameters. The value passed as `symbolBrush` can be any color,\
    \ or `QBrush` type, while `symbolPen` can be passed any color or a `QPen` instance.\
    \ The *pen* is used to draw the outline of the shape, while **brush** is used\
    \ for the fill.\n\nFor example the below code will give a blue cross marker of\
    \ size 30, on a thick red line.\n\n```\npen = pg.mkPen(color=(255, 0, 0), width=15,\
    \ style=QtCore.Qt.DashLine)\nself.graphWidget.plot(hour, temperature, pen=pen,\
    \ symbol='+',\n    symbolSize=30, symbolBrush=('b'))\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_573_0.png)\n\
    \nFigure 226. Symbols are shown at each data point on the line.\n\nIn addition\
    \ to the `+` plot marker, PyQtGraph supports the following standard markers shown\
    \ in the table below. These can all be used in the same way.\n\n| Variable | Marker\
    \ Type |\n| :--- | :--- |\n| o | Circular |\n| s | Square |\n| t | Triangular\
    \ |\n| d | Diamond |\n| + | Cross |"
