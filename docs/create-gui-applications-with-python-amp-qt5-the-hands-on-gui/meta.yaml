    # Qt Resources


    Bundling data files with **PyInstaller** usually works quite well. However, there
    can be issues with using relative paths, particularly when bundling cross-platform
    applications, as different systems have different standards for dealing with data
    files. If you hit these problems they can unfortunately be quite difficult to
    debug.


    Thankfully, Qt comes to the rescue with it''s **resource system**. Since we''re
    using Qt for our GUI we can make use of Qt Resources to bundle, identify and load
    resources in our application. The resulting bundled data is included in your application
    as Python code, so **PyInstaller** will automatically pick it up and we can be
    sure it will end up in the right place.


    In this section we''ll look at how to bundle files with our application using
    the Qt Resources system.


    # The QRC file


    The core of the Qt Resources system is the **resource file** or QRC. The `.qrc`
    file is a simple XML file, which can be opened and edited with any text editor.


    > You can also create QRC files and add and remove resources using Qt Designer,
    which we''ll cover later.


    # Simple QRC example


    A very simple resource file is shown below, containing a single resource (our'
