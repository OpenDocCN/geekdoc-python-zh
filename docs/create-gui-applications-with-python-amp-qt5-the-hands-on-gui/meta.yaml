  md: '# Appendix D: What next?


    This book covers the key things you need to know to start creating GUI applications
    with Python. If you''ve made it here you should be well on your way to create
    your own apps!


    But there is still a lot to discover while you build your applications. To help
    with this I post regular tips, tutorials and code snippets [on the accompanying
    website](https://www.example.com). Like this book all samples are MIT licensed
    and free to mix into your own apps. You may also be interested in my [related
    video courses](https://www.example.com) where you can join me as I work through
    the exercises in this book.


    Thanks for reading, and if you have any feedback or suggestions please [let me
    know](https://www.example.com)!


