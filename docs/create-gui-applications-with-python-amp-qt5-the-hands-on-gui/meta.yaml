    This is a toy example. However, if you have multiple long-running processes within
    your application, with each calling `QApplication.processEvents()` to keep things
    ticking, your application behavior can quickly become unpredictable.


    # Threads and Processes


    If you take a step back and think about what you want to happen in your application,
    it can probably be summed up with "stuff to happen at the same time as other stuff
    happens". There are two main approaches to running independent tasks on a computer:
    *threads* and *processes*.


    *Threads* share the same memory space, so are quick to start up and consume minimal
    resources. The shared memory makes it trivial to pass data between threads, however
    reading/writing memory from different threads can lead to race conditions or segfaults.
    In Python there is the added issue that multiple threads are bound by the same
    Global Interpreter Lock GIL — meaning non-GIL-releasing Python code can only execute
    in one thread at a time. However, this is not a major issue with PySide2 where
    most of the time is spent outside of Python.


    *Processes* use separate memory space (and an entirely separate Python interpreter).
    This side-steps any potential problems with the GIL, but at the cost of slower
    start-up times, larger memory overhead and complexity in sending/receiving data.


    For simplicity''s sake it usually makes sense to use threads. Processes in Qt
    are better suited to running and communicating with external programs. In this'
  merge: -1
