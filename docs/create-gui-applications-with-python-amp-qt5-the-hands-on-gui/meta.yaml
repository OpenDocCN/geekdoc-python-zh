    > ⚠️ This is prone to SQL injection attacks.


    While this works, this is *really* bad way to enable searching on a table, since
    the user can construct invalid or malicious SQL statements. For example, try entering
    the single character " in the search box—the filtering will stop working, and
    won''t work again until you restart the app.


    This is because you''ve created an invalid SQL statement e.g.


    ```

    sql

    ''name LIKE "%"%"''

    ```


    The ideal way to work around this problem is to use parameterized queries—leaving
    escaping of the input to the database, to ensure that nothing dangerous or malformed
    is passed. However, this isn''t possible with the Qt filter interface, we can
    only pass a string.


    For simple plain-text searching we can instead simply strip out any non-alphanumeric
    or space characters from the string. It will depend on your use case whether this
    is appropriate.'
