    # Clearing the plot


    Finally, sometimes you might want to clear and refresh the plot periodically.
    You can easily do that by calling `.clear()`.


    ```

    self.graphWidget.clear()

    ```


    This will remove the lines from the plot but keep all other attributes the same.


    # Updating the plot


    While you *can* simply clear the plot and redraw all your elements again, this
    means Qt has to destroy and recreate all your `QGraphicsScene` objects. For small
    or simple plots this is probably not noticeable, but if you want to create high-performance
    streaming plots it is much better to update the data in place. PyQtGraph takes
    the new data and updates the plotted line to match without affecting any other
    elements in the plot.


    To update a line we need a reference to the line object. This reference is returned
    when first creating the line using `.plot` and we can simply store this in a variable.
    Note that this is a reference to the *line* not to the plot.


    ```

    my_line_ref = graphWidget.plot(x, y)

    ```


    Once we have the reference, updating the plot is simply a case of calling `.setData`
    on the reference to apply the new data.


