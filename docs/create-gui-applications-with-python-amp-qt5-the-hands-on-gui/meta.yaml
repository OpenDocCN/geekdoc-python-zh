- md: "While simple Python types such as `int` and `float` are displayed without converting\
    \ to strings, *numpy* uses its own types (e.g. `numpy.int32`) for array values.\
    \ In order for these to be displayed we **must** first convert them to strings.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_318_0.png)\n\nFigure 153. *QTableView*\
    \ with *numpy* array\n\nWith `QTableView` only 2D arrays can be displayed, however\
    \ if you have a higher dimensional data structure you can combine the `QTableView`\
    \ with a tabbed or scrollbar UI, to allow access to and display of these higher\
    \ dimensions.\n\n## Pandas\n\n*Pandas* is a Python library commonly used for data\
    \ manipulation and analysis. It provides a nice API for loading 2D tabular data\
    \ from various data sources and performing data analysis on it. By using the *numpy*\
    \ `DataTable` as your `QTableView` model you can use these APIs to load and analyse\
    \ your data from right within your application.\n\n## Using Pandas as a data source\n\
    \nThe modifications of the model to work with *numpy* are fairly minor, requiring\
    \ changes to the indexing in the `data` method and modifications to `rowCount`\
    \ and `columnCount`. The changes for `rowCount` and `columnCount` are identical\
