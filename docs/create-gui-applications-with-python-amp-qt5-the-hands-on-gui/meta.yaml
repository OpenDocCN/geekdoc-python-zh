  md: '# # 11. Windows


    In the previous chapter we looked at how to open *dialog* windows. These are special
    windows which (by default) grab the focus of the user, and run their own event
    loop, effectively blocking the execution of the rest of your app.


    However, quite often you will want to open a second window in an application,
    without blocking the main window – for example, to show the output of some long-running
    process, or to display graphs or other visualizations. Alternatively, you may
    want to create an application that allows you to work on multiple documents at
    once, all in their own windows.


    It’s relatively straightforward to open new windows in PySide2, but there are
    a few things to keep in mind to make sure they work well. In this tutorial we’ll
    step through how to create a new window and how to show and hide external windows
    on demand.


    # ## Creating a new window


    To create a new window in PySide2 you just need to create a new instance of a
    widget object without a parent. This can be any widget (technically any subclass
    of `QWidget`) including another `QMainWindow` if you prefer.


    > > There is no restriction on the number of `QMainWindow` instances you can have,
    and if you need toolbars or menus on your second window you will need to use `QMainWindow`
    for that too.


    As with your main window, *creating* a window is not sufficient, you must also
    show it.'
