    | magenta (bright pink) | m |

    | yellow | y |

    | black | k |

    | white | w |


    In addition to these single letter codes, you can also set colors using hex notation
    eg. #672922 as a string.


    ```

    self.graphWidget.setBackground(''#bbccaa'')  # hex

