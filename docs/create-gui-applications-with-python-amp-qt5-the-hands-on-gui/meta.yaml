  md: '# 27. System tray & macOS menus


    System tray applications (or menu bar applications) can be useful for making common
    functions available in a small number of clicks. For full desktop applications
    they''re a useful shortcut to control apps without opening up the whole window.


    Qt provides a simple interface for building cross-platform system tray (Windows)
    or menu bar (macOS) apps. Below is a minimal working example for showing an icon
    in the toolbar/system tray with a menu. The action in the menu isn''t connected
    and so doesn''t do anything yet.'
