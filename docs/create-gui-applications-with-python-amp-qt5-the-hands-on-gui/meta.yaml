    Submenu\")\n\n        file_submenu.addAction(button_action2)\n\n    def onMyToolBarButtonClick(self,\
    \ s):\n        print(\"click\", s)\n```\n\n## Organising menus & toolbars\n\n\
    If your users can't find your application's actions, they can't use your app to\
    \ it's full potential. Making actions discoverable is key to creating a user-friendly\
    \ application. It is a common mistake to try and address this by adding actions\
    \ *everywhere* and end up overwhelming and confusing your users.\n\nPut common\
    \ and necessary actions first, making sure they are easy to find and recall. Think\
    \ of the **File** › **Save** in most editing applications. Quickly accessible\
    \ at the top of the File menu and bound with a simple keyboard shortcut `Ctrl`\
    \ + `S`. If **Save file...** was accessible through **File** › **Common operations**\
    \ › **File operations** › **Active document** › **Save** or the shortcut `Ctrl`\
    \ + `Alt` + `J` users would have a harder time finding it, a harder time using\
    \ it, and be less **likely** to save their documents.\n\nArrange actions into\
    \ logical groups. It is easier to find something among a small number of alternatives,\
    \ than in a long list. It's even easier to find if it is among similar things.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_118_0.png)\n\n*Figure 48. Grouped toolbars\
    \ in Qt Designer.*\n\nAvoid replicating actions in multiple menus, as this introduces\
    \ an ambiguity of \"do these do the same thing?\" even if they have an identical\
    \ label. Lastly, don't be tempted to simplify menus by hiding/removing entries\
    \ dynamically. This leads to confusion as users hunt for something that doesn't\
    \ exist \"...it was here a minute ago\". Different states should be indicated\
    \ by disabling menu items or separate windows and dialogs."
