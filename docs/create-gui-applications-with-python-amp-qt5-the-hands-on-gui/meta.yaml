    🚀 **Run it!** You''ll see a checkbox with label text.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_48_0.png)


    *Figure 12. QCheckBox on Windows, macOS and Ubuntu*


    You can set a checkbox state programmatically using `.setChecked` or `.setCheckState`.
    The former accepts either `True` or `False` representing checked or unchecked
    respectively. However, with `.setCheckState` you also specify a *partially* checked
    state using a `Qt`. namespace flag—


    | Flag | Behavior |

    | :--- | :--- |

    | `Qt.Checked` | Item is checked |

    | `Qt.Unchecked` | Item is unchecked |

    | `Qt.PartiallyChecked` | Item is partially checked |


    A checkbox that supports a partially-checked (`Qt.PartiallyChecked`) state is
    commonly referred to as ''tri-state'', that is being neither on nor off. A checkbox
    in this state is commonly shown as a greyed out checkbox, and is commonly used
    in hierarchical checkbox arrangements where sub-items are linked to parent checkboxes.


    If you set the value to `Qt.PartiallyChecked` the checkbox will become tri-state—that
    is have *three* possible states. You can also set a checkbox to be tri-state without
    setting the current state to partially checked by using `.setTristate(True)`'
