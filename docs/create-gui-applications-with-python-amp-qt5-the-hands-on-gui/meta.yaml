    ```\n\nThe legend appears in the top left by default. If you would like to move\
    \ it, you can easily drag and drop the legend elsewhere. You can also specify\
    \ a default offset by passing a 2-tuple to the *offset* parameter when creating\
    \ the legend.\n\n## Background Grid\n\nAdding a background grid can make your\
    \ plots easier to read, particularly when trying to compare relative x & y values\
    \ against each other. You can turn on a background grid for your plot by calling\
    \ `.showGrid` on your `PlotWidget`. You can toggle x and y grids independently.\n\
    \nThe following will create the grid for both the X and Y axis.\n\n```python\n\
    self.graphWidget.showGrid(x=True, y=True)\n```\n\n## Setting Axis Limits\n\nSometimes\
    \ it can be useful to restrict the range of data which is visible on the plot,\
    \ or to lock the axis to a consistent range regardless of the data input (e.g.\
    \ a known min-max range). In PyQtGraph this can be done using the `.setXRange()`\
    \ and `.setYRange()` methods. These force the plot to only show data within the\
    \ specified ranges on each axis.\n\nBelow we set two ranges, one on each axis.\
    \ The 1st argument is the minimum value and the 2nd is the maximum.\n\n```python\n\
    self.graphWidget.setXRange(5, 20, padding=0)\nself.graphWidget.setYRange(30, 40,\
    \ padding=0)\n```\n\nAn optional padding argument causes the range to be set larger\
    \ than specified by the specified fraction (this between 0.02 and 0.1 by default,\
    \ depending on the size of the ViewBox). If you want to remove this padding entirely,\
    \ pass 0.\n\n```python\nself.graphWidget.setXRange(5, 20, padding=0)\nself.graphWidget.setYRange(30,\
    \ 40, padding=0)\n```\n\nThe complete code so far is shown below:\n\nListing 203.\
