    # Styling properties


    Next we''ll go through the properties available to style widgets with QSS. These
    have been broken down into logical sections, containing properties that are related
    to one another to make it easier to digest. You can use the QSS rule tester app
    we just created to test these styles out on the various widgets.


    The types used in the following tables are listed below. Some of these are compound
    types, made up of other entries.


    > You can skip over this table for now, but will need it as a reference for interpreting
    the valid values for each property.


    | Property | Type | Description |

    | :--- | :--- | :--- |

    | Alignment | top | bottom | left | right | center | Horizontal and/or vertical
    alignment. |

    | Attachment | scroll | fixed | Scroll or fixed attachment. |

    | Background | Brush | Url | Repeat | Alignment | Compound type of Brush, Url,
    Repeat, and Alignment. |

    | Boolean | 0 | 1 | True (1) or False (0). |

    | Border | Border Style | Length | Brush | Shorthand border property. |

    | Border Image | none | Url Number (stretch | repeat) | An image composed of nine
    parts (top left, top center, top right, center left, center, center right, bottom
    left, bottom center, and bottom right). |'
