    # # Generic queries with QSqlQueryModel


    So far we''ve been displaying an entire database table on our `QTableView` with
    some optional column filtering and sorting. However, Qt also allows for displaying
    more complex queries using `QSqlQueryModel`. In this part we''ll look at how we
    can use `QSqlQueryModel` to display an SQL query, starting first with a simple
    single-table query and then relational and parameterized queries.


    The process for querying with this model is slightly different. Rather than passing
    the database to the model constructor, here we instead create a `QSqlQuery` object
    which takes the database connection, and then pass *that* to the model.


    ```

    python

    query = QSqlQuery("SELECT name, composer FROM track ", db=db)

    ```


    This means that you can use a single `QSqlQueryModel` and perform queries on different
    databases if you like. The complete working example of this query is shown below.'
