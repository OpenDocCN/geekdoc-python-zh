    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_585_0.png)\n\nFigure 233. Example plots\
    \ taken from the PyQtGraph documentation.\n\n## 36. Plotting with Matplotlib\n\
    \nIn the previous part we covered plotting in PySide2 using PyQtGraph. That library\
    \ uses the Qt vector-based QGraphicsScene to draw plots and provides a great interface\
    \ for interactive and high performance plotting.\n\nHowever, there is another\
    \ plotting library for Python which is used far more widely, and which offers\
    \ a richer assortment of plots — [Matplotlib](https://matplotlib.org/). If you're\
    \ migrating an existing data analysis tool to a PySide2 GUI, or if you simply\
    \ want to have access to the array of plot abilities that Matplotlib offers, then\
    \ you'll want to know how to include Matplotlib plots within your application.\n\
    \nIn this chapter we'll cover how to embed Matplotlib plots in your PySide2 applications.\n\
    \n> Many other Python libraries — such as [seaborn](https://seaborn.pydata.org/)\
    \ and [pandas](https://pandas.pydata.org/) — make use of Matplotlib for plotting.\
    \ These plots can be embedded in PySide2 in the same way shown here, and the reference\
    \ to the axes passed when plotting. There is a pandas example at the end of this\
    \ chapter.\n\n### Installing Matplotlib\n\nThe following examples assume you have\
    \ Matplotlib installed. If not you can install it using `pip`.\n\n```\npip install\
    \ matplotlib\n```\n\n### A simple example\n\nThe following minimal example sets\
    \ up a Matplotlib canvas `FigureCanvasQTAgg` which creates the `Figure` and adds\
    \ a single set of axes to it. This canvas object is also a `QWidget` and so can\
    \ be embedded straight into an application as any other Qt widget.\n\nListing\
    \ 206. plotting/matplotlib_1.py\n\n```\nimport sys\n\nfrom PySide2 import QtWidgets\
    \  # import PySide2 before matplotlib\n\nimport matplotlib\nfrom matplotlib.backends.backend_qt5agg\
    \ import FigureCanvasQTAgg\nfrom matplotlib.figure import Figure\n\nmatplotlib.use(\"\
    Qt5Agg\")\n\n\nclass MplCanvas(FigureCanvasQTAgg):\n    def __init__(self, parent=None,\
    \ width=5, height=4, dpi=100):\n        fig = Figure(figsize=(width, height),\
    \ dpi=dpi)\n        self.axes = fig.add_subplot(111)\n        super().__init__(fig)\n\
    \n\nclass MainWindow(QtWidgets.QMainWindow):\n    def __init__(self):\n      \
    \  super().__init__()\n\n        # Create the maplotlib FigureCanvasQTAgg object,\n\
    \        # which defines a single set of axes as self.axes.\n        sc = MplCanvas(self,\
    \ width=5, height=4, dpi=100)\n        sc.axes.plot([0, 1, 2, 3, 4], [10, 1, 20,\
    \ 3, 40])\n        self.setCentralWidget(sc)\n\n        self.show()\n\n\napp =\
    \ QtWidgets.QApplication(sys.argv)\nw = MainWindow()\napp.exec_()\n```\n\nIn this\
    \ case we're adding our MplCanvas widget as the central widget on the window with\
    \ .setCentralWidget(). This means it will take up the entirety of the window and\
    \ resize together with it. The plotted data `[0,1,2,3,4]`, `[10,1,20,3,40]` is\
    \ provided as two lists of numbers (x and y respectively) as required by the `.plot`\
    \ method.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_588_0.png)\n\n*Figure 234.\
    \ A simple plot.*\n\n### Plot controls\n\nPlots from Matplotlib displayed in PySide2\
    \ are actually rendered as simple (bitmap) images by the *Agg* backend. The `FigureCanvasQTAgg`\
    \ class wraps this backend and displays the resulting image on a Qt widget. The\
    \ effect of this architecture is that Qt is unaware of the positions of lines\
    \ and other plot elements — only the x, y coordinates of any clicks and mouse\
    \ movements over the widget.\n\nHowever, support for handling Qt mouse events\
    \ and transforming them into interactions on the plot is built into Matplotlib.\
    \ This can be controlled through a custom toolbar which can be added to your applications\
    \ alongside the plot. In this section we'll look at adding these controls so we\
    \ can zoom, pan and get data from embedded Matplotlib plots.\n\nThe complete code,\
    \ importing the toolbar widget `NavigationToolbar2QT` and adding it to the interface\
    \ within a `QVBoxLayout`, is shown below —\n\n*Listing 207. plotting/matplotlib_2.py*\n\
    \n```\nimport sys\n\nfrom PySide2 import QtWidgets  # import PySide2 before matplotlib\n\
    \nimport matplotlib\nfrom matplotlib.backends.backend_qt5agg import FigureCanvasQTAgg\n\
    from matplotlib.backends.backend_qt5agg import NavigationToolbar2QT as NavigationToolbar\n\
    from matplotlib.figure import Figure\n\nmatplotlib.use(\"Qt5Agg\")\n\nclass MplCanvas(FigureCanvasQTAgg):\n\
    \    def __init__(self, parent=None, width=5, height=4, dpi=100):\n        fig\
    \ = Figure(figsize=(width, height), dpi=dpi)\n        self.axes = fig.add_subplot(111)\n\
    \        super().__init__(fig)\n\nclass MainWindow(QtWidgets.QMainWindow):\n \
    \   def __init__(self):\n        super().__init__()\n\n        sc = MplCanvas(self,\
    \ width=5, height=4, dpi=100)\n        sc.axes.plot([0, 1, 2, 3, 4], [10, 1, 20,\
    \ 3, 40])\n\n        # Create toolbar, passing canvas as first parameter, parent\n\
    \        # (self, the MainWindow) as second.\n        toolbar = NavigationToolbar(sc,\
    \ self)\n\n        layout = QtWidgets.QVBoxLayout()\n        layout.addWidget(toolbar)\n\
    \        layout.addWidget(sc)\n\n        # Create a placeholder widget to hold\
    \ our toolbar and canvas.\n        widget = QtWidgets.QWidget()\n        widget.setLayout(layout)\n\
    \        self.setCentralWidget(widget)\n\n        self.show()\n\napp = QtWidgets.QApplication(sys.argv)\n\
    w = MainWindow()\napp.exec_()\n```\n\nWe'll step through the changes.\n\nFirst\
    \ we import the toolbar widget from `matplotlib.backends.backend_qt5agg.NavigationToolbar2QT`\
    \ renaming it with the simpler name `NavigationToolbar`. We create an instance\
    \ of the toolbar by calling `NavigationToolbar` with two parameters, first the\
    \ canvas object `sc` and then the parent for the toolbar, in this case our `MainWindow`\
    \ object `self`. Passing in the canvas links the created toolbar to it, allowing\
    \ it to be controlled. The resulting toolbar object is stored in the variable\
    \ `toolbar`.\n\nWe need to add two widgets to the window, one above the other,\
    \ so we use a `QVBoxLayout`. First we add our toolbar widget `toolbar` and then\
    \ the canvas widget `sc` to this layout. Finally, we set this layout onto our\
    \ simple `widget` layout container which is set as the central widget for the\
    \ window.\n\nRunning the above code will produce the following window layout,\
    \ showing the plot at the bottom and the controls on top as a toolbar.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_590_0.png)\n\
    \nFigure 235. Matplotlib canvas with toolbar."
