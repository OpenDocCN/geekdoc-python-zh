    \ 0, 0, 0)\n        layout1.setSpacing(20)\n\n        layout2.addWidget(Color(\"\
    red\"))\n        layout2.addWidget(Color(\"yellow\"))\n        layout2.addWidget(Color(\"\
    purple\"))\n\n        layout1.addLayout(layout2)\n\n        layout1.addWidget(Color(\"\
    green\"))\n\n        layout3.addWidget(Color(\"red\"))\n        layout3.addWidget(Color(\"\
    purple\"))\n\n        layout1.addLayout(layout3)\n\n        widget = QWidget()\n\
    \        widget.setLayout(layout1)\n        self.setCentralWidget(widget)\n\n\
    app = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n\U0001F680 **运行它！** 你应该能看到间距和边距的效果。尝试调整这些数字，直到你对它们有感觉。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_84_0.png)\n\
    \n图 26. 带有部件周围间距和边距的嵌套 QHBoxLayout 和 QVBoxLayout 布局。\n\n## QGridLayout 网格排列的部件\n\
    \n尽管它们很有用，但如果你尝试使用 `QVBoxLayout` 和 `QHBoxLayout` 来布局多个元素，例如用于表单，你会发现很难确保不同大小的部件对齐。解决方案是\
    \ `QGridLayout`。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_85_0.png)\n\n图 27.\
    \ 一个 QGridLayout，显示了每个位置的网格位置。\n\n`QGridLayout` 允许你将项目专门定位在网格中。你为每个部件指定行和列位置。你可以跳过元素，它们将被留空。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_85_1.png)\n\n图 28. 一个带有未填充槽位的 QGridLayout。\n\
