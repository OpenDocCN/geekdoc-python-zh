    \ the item that will be supplied to views. QSize |\n\nFor a full list of available\
    \ *roles* that you can receive see the Qt ItemDataRole documentation. Our todo\
    \ list will only be using Qt.DisplayRole and Qt.DecorationRole.\n\n## Basic implementation\n\
    \nThe code below shows the basic model we've created in the application skeleton,\
    \ which has the code necessary to take the model and display it — although it\
    \ is empty! We'll add our model code and application logic to this base.\n\nListing\
    \ 79. model-views/todo_1.py\n\n```\nimport sys\n\nfrom PySide2 import QtCore,\
    \ QtGui, QtWidgets\nfrom PySide2.QtCore import Qt\n\nfrom MainWindow import Ui_MainWindow\n\
    \n# tag::model[]\nclass TodoModel(QtCore.QAbstractListModel):\n    def __init__(self,\
    \ todos=None):\n        super().__init__()\n        self.todos = todos or []\n\
    \n    def data(self, index, role):\n        if role == Qt.DisplayRole:\n     \
    \       status, text = self.todos[index.row()]\n            return text\n\n  \
    \  def rowCount(self, index):\n        return len(self.todos)\n# end::model[]\n\
    \nclass MainWindow(QtWidgets.QMainWindow, Ui_MainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n        self.setupUi(self)\n        self.model =\
    \ TodoModel()\n        self.todoView.setModel(self.model)\n\napp = QtWidgets.QApplication(sys.argv)\n\
