    \ 的免费图标。\n\n> \U0001F4A1 该 UI 是在 Qt Designer 中创建的，如本[教程](https://www.pythonguis.com/tutorials/first-steps-qt-creator/)所述。\n\
    \n## 资源\n\n此项目中的图标是通过 Qt Designer 添加到按钮上的。\n\n执行此操作时，你有两个选择——\n\n- 1. 将图标作为文件添加，并确保安装后图标的相对路径位置保持不变（并非总是可行，或令人愉快）\n\
    - 2. 使用 Qt 资源系统添加图标\n\n这里我们使用方法 (2)，因为它更不容易出错。\n\n在 UI 中使用 Qt 资源的方法因你是使用 Qt Creator\
    \ 还是独立的 Qt Designer 而异。步骤如下所述。\n\n## 在 Qt Designer 中添加资源（首选）\n\n如果你使用的是独立的 Qt\
    \ Designer，资源浏览器作为一个可停用的小部件可用，默认情况下在右下角可见。如果资源浏览器被隐藏，你可以通过工具栏上的“视图”菜单将其显示出来。\n\
    \n要添加、编辑和删除资源文件，请单击资源浏览器面板中的铅笔图标。这将打开资源编辑器。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_636_0.png)\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_637_0.png)\n\n图 255. Qt Designer 资源浏览器\n\
    \n在资源编辑器视图中，你可以通过单击左下角的文档文件夹图标（中间图标）来打开现有的资源文件。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_638_0.png)\n\
    \n图 256. Qt Designer 资源编辑器\n\n在左侧面板中，你还可以从 UI 中创建和删除资源文件。而在右侧，你可以创建新的前缀、将文件添加到前缀以及删除项目。对资源文件的更改会自动保存。\n\
    \n## 在 Qt Creator 中添加资源\n\n为了能够从 Qt Creator 内部使用 Qt 资源系统添加图标，你需要有一个活动的 Qt 项目，并将你的\
    \ UI 和资源文件都添加到其中。\n\n> 如果你没有设置 Qt Creator 项目，可以在现有的源文件夹中创建一个。Qt Creator 会在覆盖任何文件之前提示你。单击“+\
    \ 新建”，选择“Qt for Python - 空”作为项目类型。选择源文件夹*上方*的文件夹作为“创建位置”，并提供源文件夹的名称作为项目名称。你可以删除创建的任何文件，但保存项目设置的\
    \ `.pyproject` 文件除外。"
