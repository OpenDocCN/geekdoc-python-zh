- md: "## 22. Tabular data in ModelViews, with numpy & pandas\n\nIn the previous section\
    \ we covered an introduction to the Model View architecture. However, we only\
    \ touched on one of the model views — `QListView`. There are two other Model Views\
    \ available in PySide2 — `QTableView` and `QTreeView` which provide tabular (Excel-like)\
    \ and tree (file directory browser-like) views using the same `QStandardItemModel`.\n\
    \nIn this part we'll look at how to use `QTableView` from PySide2, including how\
    \ to model your data, format values for display and add conditional formatting.\n\
    \nYou can use model views with *any* data source, as long as your model returns\
    \ that data in a format that Qt can understand. Working with tabular data in Python\
    \ opens up a number of possibilities for how we load and work with that data.\
    \ Here we'll start with a simple nested list of lists and then move onto integrating\
    \ your Qt application with the popular *numpy* and *pandas* libraries. This will\
    \ provide you with a great foundation for building data-focused applications.\n\
    \n## Introduction to QTableView\n\n`QTableView` is a Qt view widget which presents\
    \ data in a spreadsheet-like table view. Like all widgets in the *Model View Architecture*\
    \ this uses a separate *model* to provide data and presentation information to\
    \ the view. Data in the model can be updated as required, and the view notified\
    \ of these changes to redraw/display the changes. By customizing the model it\
    \ is possible to have a huge amount of control over how the data is presented.\n\
    \nTo use the model we'll need a basic application structure and some dummy data.\
    \ A simple working example is shown below, which defines a custom model with a\
    \ simple nested-list as a data store.\n\nListing 86. tableview_demo.py\n\n```python\n\
    import sys\nfrom PySide2 import QtCore, QtGui, QtWidgets\nfrom PySide2.QtCore\
    \ import Qt\n\n\nclass TableModel(QtCore.QAbstractTableModel):\n    def __init__(self,\
    \ data):\n        super().__init__()\n        self._data = data\n\n    def data(self,\
    \ index, role):\n        if role == Qt.DisplayRole:\n            # See below for\
    \ the nested-list data structure.\n            # .row() indexes into the outer\
    \ list,\n            # .column() indexes into the sub-list\n            return\
    \ self._data[index.row()][index.column()]\n\n    def rowCount(self, index):\n\
    \        # The length of the outer list.\n        return len(self._data)\n\n \
    \   def columnCount(self, index):\n        # The following takes the first sub-list,\
    \ and returns\n        # the length (only works if all rows are an equal length)\n\
    \        return len(self._data[0])\n\n\nclass MainWindow(QtWidgets.QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.table = QtWidgets.QTableView()\n\
    \n        data = [\n            [4, 9, 2],\n            [1, -1, -1],\n       \
    \     [3, 5, -5],\n            [3, 3, 2],\n            [7, 8, 9],\n        ]\n\
    \n        self.model = TableModel(data)\n        self.table.setModel(self.model)\n\
    \n        self.setCentralWidget(self.table)\n\n\napp = QtWidgets.QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec_()\n```\n\nAs in our earlier model\
    \ view examples, we create the `QTableView` widget, then create an instance of\
    \ our custom model (which we've written to accept the data source as a parameter)\
    \ and then we set the model on the view. That's all we need to do — the view widget\
    \ now uses the model to get the data, and determine how to draw it.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_300_0.png)\n\
    \nFigure 145. Basic table example\n\n## Nested list as a 2-dimensional data store\n\
    \nFor a table you need a 2D data structure, with columns and rows. As shown in\
    \ the example above you can model a simple 2D data structure using a nested Python\
    \ `list`. We'll take a minute to look at this data structure, and it's limitations,\
    \ below —\n\n```python\ntable = [\n    [4, 1, 3, 3, 7],\n    [9, 1, 5, 3, 8],\n\
    \    [2, 1, 5, 3, 9],\n]\n```\n\nThe nested list is a \"list of lists of values\"\
    \ — an outer list containing a number of sub-lists which themselves contain the\
    \ values. With this structure, to index into individual values (or \"cells\")\
    \ you must index twice, first to return one of the inner list objects and then\
    \ again to index into that list.\n\nThe typical arrangement is for the outer list\
    \ to hold the *rows* and each nested list to contain the values for the *columns*.\
    \ With this arrangement when you index, you index first by *row*, then by *column*\
    \ — making our example `table` a 3 row, 5 column table. Helpfully, this matches\
    \ the visual layout in the source code.\n\nThe first index into the table will\
    \ return a nested sub-list —\n\n```python\nrow = 2\ncol = 4\n\n>>> table[row]\n\
    [2, 1, 5, 3, 9]\n```\n\nWhich you then index again to return the value —\n\n```python\n\
    >>> table[row][col]\n9\n```\n\nNote that using this type of structure you can't\
    \ easily return an entire *column*, you would instead need to iterate all the\
    \ rows. However, you are of course free to flip things on their head and use the\
    \ first index as *column* depending on whether accessing by column or row is more\
    \ useful to you.\n\n```python\ntable = [\n    [4, 9, 2],\n    [1, 1, 1],\n   \
    \ [3, 5, 5],\n    [3, 3, 2],\n    [7, 8, 9],\n]\n\nrow = 4  # reversed\ncol =\
    \ 2  # reversed\n\n>>> table[col]\n[3, 5, 5]\n\n>>> table[col][row]\n9\n```\n\n\
    > Nothing about this data structure enforces equal row or column lengths — one\
    \ row can be 5 elements long, another 200. Inconsistencies can lead to unexpected\
    \ errors on the table view. See the alternative data stores later if you're working\
    \ with large or complex data tables.\n\nNext we'll look in a bit more detail at\
    \ our custom `TableModel` and see how it works with this simple data structure\
    \ to display the values.\n\n## Writing a custom QAbstractTableModel\n\nIn the\
    \ *Model View Architecture* the model is responsible for providing both the data\
    \ and presentation metadata for display by the view. In order to interface between\
    \ our data object and the view we need to write our own custom model, which understands\
    \ the structure of our data.\n\nTo write our custom model we can create a subclass\
    \ of `QAbstractTableModel`. The only *required* methods for a custom table model\
    \ are `data`, `rowCount` and `columnCount`. The first returns data (or presentation\
    \ information) for given locations in the table, while the latter two must return\
    \ a single integer value for the dimensions of the data source.\n\n```python\n\
    class TableModel(QtCore.QAbstractTableModel):\n\n    def __init__(self, data):\n\
    \        super(TableModel, self).__init__()\n        self._data = data\n\n   \
    \ def data(self, index, role):\n        if role == Qt.DisplayRole:\n         \
    \   # See below for the nested-list data structure.\n            # .row() indexes\
    \ into the outer list,\n            # .column() indexes into the sub-list\n  \
    \          return self._data[index.row()][index.column()]\n\n    def rowCount(self,\
    \ index):\n        # The length of the outer list.\n        return len(self._data)\n\
    \n    def columnCount(self, index):\n        # The following takes the first sub-list,\
    \ and returns\n        # the length (only works if all rows are an equal length)\n\
    \        return len(self._data[0])\n```\n\n> `QtCore.QAbstractTableModel` is an\
    \ *abstract base class* meaning it does not have implementations for the methods.\
    \ If you try and use it directly, it will not work. You must sub-class it.\n\n\
    In the `__init__` constructor we accept a single parameter `data` which we store\
    \ as the instance attribute `self._data` so we can access it from our methods.\
    \ The passed in data structure is stored by reference, so any external changes\
    \ will be reflected here.\n\n> To notify the model of changes you need to trigger\
    \ the model's `layoutChanged` signal, using `self.model.layoutChanged.emit()`."
  mdcn: "## 22. 在 ModelView 中使用表格数据，结合 numpy 与 pandas\n\n在上一节中，我们介绍了 Model View 架构。然而，我们只涉及了其中一种模型视图——`QListView`。PySide2\
    \ 中还有另外两种模型视图——`QTableView` 和 `QTreeView`，它们使用相同的 `QStandardItemModel`，分别提供类似\
    \ Excel 的表格视图和类似文件目录浏览器的树形视图。\n\n在本部分，我们将探讨如何使用 PySide2 中的 `QTableView`，包括如何建模数据、格式化显示值以及添加条件格式化。\n\
    \n你可以将模型视图与*任何*数据源一起使用，只要你的模型能以 Qt 可以理解的格式返回数据。在 Python 中处理表格数据，为我们加载和操作数据提供了多种可能性。这里我们将从一个简单的嵌套列表开始，然后逐步介绍如何将你的\
    \ Qt 应用程序与流行的 *numpy* 和 *pandas* 库集成。这将为你构建以数据为中心的应用程序打下坚实的基础。\n\n## QTableView\
    \ 简介\n\n`QTableView` 是一个 Qt 视图部件，它以类似电子表格的表格视图呈现数据。与*模型视图架构*中的所有部件一样，它使用一个独立的*模型*向视图提供数据和展示信息。模型中的数据可以根据需要更新，并通知视图进行重绘/显示这些更改。通过自定义模型，可以对数据的呈现方式有极大的控制权。\n\
    \n要使用模型，我们需要一个基本的应用程序结构和一些示例数据。下面展示了一个简单的工作示例，它定义了一个自定义模型，使用一个简单的嵌套列表作为数据存储。\n\
    \n清单 86. tableview_demo.py\n\n```python\nimport sys\nfrom PySide2 import QtCore,\
    \ QtGui, QtWidgets\nfrom PySide2.QtCore import Qt\n\n\nclass TableModel(QtCore.QAbstractTableModel):\n\
    \    def __init__(self, data):\n        super().__init__()\n        self._data\
    \ = data\n\n    def data(self, index, role):\n        if role == Qt.DisplayRole:\n\
    \            # 参见下面的嵌套列表数据结构。\n            # .row() 索引到外层列表，\n            # .column()\
    \ 索引到子列表\n            return self._data[index.row()][index.column()]\n\n    def\
    \ rowCount(self, index):\n        # 外层列表的长度。\n        return len(self._data)\n\
    \n    def columnCount(self, index):\n        # 以下代码获取第一个子列表，并返回其长度\n        #\
    \ （仅在所有行长度相同时有效）\n        return len(self._data[0])\n\n\nclass MainWindow(QtWidgets.QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.table = QtWidgets.QTableView()\n\
    \n        data = [\n            [4, 9, 2],\n            [1, -1, -1],\n       \
    \     [3, 5, -5],\n            [3, 3, 2],\n            [7, 8, 9],\n        ]\n\
