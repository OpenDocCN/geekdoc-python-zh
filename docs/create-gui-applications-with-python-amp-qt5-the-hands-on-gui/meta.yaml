    # 33. Threading examples


    `QThreadPool` and `QRunnable` are an incredibly flexible way to run things in
    other threads. By tweaking the signals and parameters you can perform any tasks
    you can imagine. In this chapter we''ll look some examples for how to construct
    runners for particular scenarios.


    All the examples follow the same general pattern — a custom `QRunnable` class
    with custom `WorkerSignals`. The difference is in what we pass to the runner,
    what it does with those parameters, and how we hook up the signals.'
