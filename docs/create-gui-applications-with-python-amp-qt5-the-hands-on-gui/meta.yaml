    # Routing dictionaries


    Some languages have *case* statements which allow you to branch off and handle
    different values of a variable. There is no direct equivalent in Python, but we
    can use dictionaries for the same result.


    This makes use of the fact that in Python functions (and methods) are objects
    and can be stored as dictionary values. Using the input to our *routing* function
    we can look up which specific method to call, and pass through the data.


    The following code shows how to do this for our example above.'
