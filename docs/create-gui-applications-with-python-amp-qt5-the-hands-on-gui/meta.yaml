    ## Qt Designer


    So far we have been creating apps using Python code. This works great in many
    cases, but as your applications get larger or interfaces more complicated, it
    can get a bit cumbersome to define all widgets programmatically. The good news
    is that Qt comes with a graphical editor — *Qt Designer* — which contains a drag-and-drop
    UI editor. Using *Qt Designer* you can define your UIs visually and then simply
    hook up the application logic later.


    In this chapter we’ll cover the basics of creating UIs with *Qt Designer*. The
    principles, layouts and widgets are identical, so you can apply everything you’ve
    already learnt. You’ll also need your knowledge of the Python API to hook up your
    application logic later.


    ### 13. Installing Qt Designer


    Qt Designer is available in the installation packages for Qt available from [the
    Qt downloads page](https://www.qt.io/download). Download and run the appropriate
    installer for your system, the following the platform-specific instructions below.
    Installing Qt Designer will not affect your PySide2 installation.


    > ### Qt Creator vs. Qt Designer


    You may also see mentions of Qt Creator. Qt Creator a fully-fledged IDE for Qt
    projects, while Qt Designer is the UI design component. Qt Designer is available
    within Qt Creator so you can install that instead if you wish, although it doesn''t
    provide any added value for Python projects.


    ## Windows


    Qt Designer is not mentioned in the Windows Qt installer, but is automatically
    installed when you install any version of the Qt core libraries. For example,
    in the following screenshot we''ve opted to install the MSVC 2017 64-bit version
    of Qt — what you choose will have no effect on your Designer install.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_163_0.png)


    Figure 65. Installing Qt, will also install Qt Designer.


    If you want to install *Qt Creator* it is listed under "Developer and Designer
    Tools". Rather confusingly, *Qt Designer* isn''t in here.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_164_0.png)


    *Figure 66. Installing the Qt Creator component.*


    ## macOS


    *Qt Designer* is not mentioned in the macOS Qt installer, but is automatically
    installed when you install any version of the Qt core libraries. Download the
    installer from the Qt website — you can opt for the open source version.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_164_1.png)


    *Figure 67. Inside the downloaded .dmg file you''ll find the installer.*


    Open the installer to start the installation. Go through to where it asks you
    to choose which components to install. Select the *macOS* package under the latest
    version of Qt.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_165_0.png)


    *Figure 68. You only need the macOS package under the latest version.*


    Once the installation is complete, open the folder where you installed Qt. The
    launcher for *Designer* is under `<version>/clang_64/bin`. You''ll notice that
    *Qt Creator* is also installed in the root of the Qt installation folder.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_165_1.png)


    *Figure 69. You can find the Designer launcher under the `<version>/clang_64/bin`
    folder.*


    You can run *Designer* from where it is located, or move it into your Applications
    folder so it is available to launch from the macOS Launchpad.


    ## Linux (Ubuntu & Debian)


    You can install *Qt Designer* from the command line with the following. *Qt Designer*
    is in the `qttools5-dev-tools` package.


    ```bash

    sudo apt-get install qttools5-dev-tools

    ```


    Once installed, *Qt Designer* will be available in the launcher.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_166_0.png)


    *Figure 70. Qt Designer in Ubuntu launcher.*


    ### 14. Getting started with Qt Designer


    In this chapter we’ll take a quick tour through using *Qt Designer* to design
    a UI and exporting that UI for use in your PySide2 application. We’ll only scratch
    the surface of what you can do with *Qt Designer* here, but once you’ve got the
    basics down, feel free to experiment in more detail.


    Open up *Qt Designer* and you will be presented with the main window. The designer
    is available via the tab on the left hand side. However, to activate this you
    first need to start creating a `.ui` file.


    ## Qt Designer


    *Qt Designer* starts up with the *New Form* dialog. Here you can choose the type
    of interface you’re building—this decides the base widget you will build your
    interface on. If you are starting an application then *Main Window* is usually
    the right choice. However, you can also create `.ui` files for dialog boxes and
    custom compound widgets.


    > Form is the technical name given to a UI layout, since many UIs resemble a paper
    form with various input boxes.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_168_0.png)


    Figure 71. The Qt Designer interface


    If you click *Create* then a new UI will be created, with a single empty widget
    in it. You''re now ready to start designing your app.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_168_1.png)


    Figure 72. The Qt Designer editor interface, with an empty `QMainWindow` widget.


    ## Qt Creator


    If you''ve installed *Qt Creator* the interface and process is slightly different.
    The left-hand side has a tab-like interface where you can select from the various
    components of the application. One of these is *Design* which shows *Qt Designer*
    in the main panel.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_169_0.png)


    Figure 73. The Qt Creator interface, with the Design section selected on the left.
    The Qt Designer interface is identical to the nested Designer.


    > All the features of Qt Designer are available in Qt Creator but some aspects
    of the user interface are different.


    To create a .ui file go to File → New File or Project... In the window that appears
    select Qt under Files and Classes on the left, then select Qt Designer Form on
    the right. You''ll notice the icon has "ui" on it, showing the type of file you''re
    creating.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_170_0.png)


    Figure 74. Create a new Qt .ui file.


    In the next step you''ll be asked what type of UI you want to create. For most
    applications *Main Window* is the right choice. However, you can also create `.ui`
    files for other dialog boxes or build custom widgets using `QWidget` (listed as
    "Widget").


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_171_0.png)


    Figure 75. Select the type of widget to create, for most applications this will
    be Main Window.


    Next choose a filename and save folder for your file. Save your `.ui` file with
    the same name as the class you''ll be creating, just to make subsequent commands
    simpler.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_172_0.png)


    Figure 76. Choose save name and folder for your file.


    Finally, you can choose to add the file to your version control system if you''re
    using one. Feel free to skip this step — it doesn''t affect your UI.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_173_0.png)


    Figure 77. Optionally add the file to your version control, e.g. Git.


    ## Laying out your Main Window


    You''ll be presented with your newly created main window in the UI designer. There
    isn''t much to see to begin with, just a grey working area representing the window,
    together with the beginnings of a window menu bar.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_174_0.png)


    Figure 78. The initial view of the created main window.


    You can resize the window by clicking the window and dragging the blue handles
    on each corner.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_174_1.png)


    Figure 79. The main window resized to 300 x 300 pixels.


    The first step in building an application is to add some widgets to your window.
    In our first applications we learnt that to set the central widget for a QMainWindow
    we need to use `.setCentralWidget()`. We also saw that to add multiple widgets
    with a layout, we need an intermediary `QWidget` to apply the layout to, rather
    than adding the layout to the window directly.


    *Qt Designer* takes care of this for you automatically, although it''s not particularly
    obvious about it.


    To add multiple widgets to the main window with a layout, first drag your widgets
    onto the `QMainWindow`. Here we''ve dragged a `QLabel` and a `QPushButton`, it
    doesn''t matter where you drop them.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_175_0.png)


    *Figure 80. Main window with 1 label and 1 button added.*


    We''ve created 2 widgets by dragging them onto the window, which made them children
    of that window. We can now apply a layout.


    Find the `QMainWindow` in the right hand panel (it should be right at the top).
    Underneath you see *centralwidget* representing the window''s central widget.
    The icon for the central widget shows the current layout applied. Initially it
    has a red circle-cross through it, showing that there is no layout active. Right
    click on the `QMainWindow` object, and find ''Layout'' in the resulting dropdown.'
  mdcn: '你实际上以某种方式响应过的事件。同样，你可以选择接受你未响应的事件，以使其静默。


    ## Qt Designer


    到目前为止，我们一直使用 Python 代码来创建应用程序。这在许多情况下效果很好，但随着你的应用程序变大或界面变得更复杂，以编程方式定义所有小部件可能会变得有点繁琐。好消息是
    Qt 附带了一个图形编辑器——*Qt Designer*——它包含一个拖放式 UI 编辑器。使用 *Qt Designer*，你可以直观地定义你的 UI，然后只需稍后连接应用程序逻辑即可。


    在本章中，我们将介绍使用 *Qt Designer* 创建 UI 的基础知识。原理、布局和小部件是相同的，因此你可以应用你已经学到的所有知识。你还需要你的
    Python API 知识，以便稍后连接你的应用程序逻辑。


    ### 13. 安装 Qt Designer


    Qt Designer 在 [Qt 下载页面](https://www.qt.io/download) 提供的 Qt 安装包中可用。下载并运行适合你系统的安装程序，并遵循下面特定于平台的说明。安装
    Qt Designer 不会影响你的 PySide2 安装。


    > ### Qt Creator 与 Qt Designer


    你可能还会看到对 Qt Creator 的提及。Qt Creator 是一个功能齐全的 Qt 项目 IDE，而 Qt Designer 是 UI 设计组件。Qt
    Designer 包含在 Qt Creator 中，因此如果你愿意，可以安装它，尽管它对 Python 项目没有提供任何额外价值。


    ## Windows


    Windows Qt 安装程序中没有提到 Qt Designer，但当你安装任何版本的 Qt 核心库时，它会自动安装。例如，在下面的截图中，我们选择安装 MSVC
    2017 64 位版本的 Qt——你选择什么不会影响你的 Designer 安装。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_163_0.png)


    图 65. 安装 Qt，也会安装 Qt Designer。


    如果你想安装 *Qt Creator*，它在“Developer and Designer Tools”下。相当令人困惑的是，*Qt Designer* 不在这里。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_164_0.png)


    *图 66. 安装 Qt Creator 组件。*


    ## macOS


    macOS Qt 安装程序中没有提到 *Qt Designer*，但当你安装任何版本的 Qt 核心库时，它会自动安装。从 Qt 网站下载安装程序——你可以选择开源版本。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_164_1.png)


    *图 67. 在下载的 .dmg 文件中，你会找到安装程序。*


    打开安装程序开始安装。继续到它要求你选择要安装的组件的地方。在最新版本的 Qt 下选择 *macOS* 包。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_165_0.png)


    *图 68. 你只需要最新版本下的 macOS 包。*


    安装完成后，打开你安装 Qt 的文件夹。*Designer* 的启动器位于 `<version>/clang_64/bin` 下。你会注意到 *Qt Creator*
    也安装在 Qt 安装文件夹的根目录中。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_165_1.png)


    *图 69. 你可以在 `<version>/clang_64/bin` 文件夹下找到 Designer 启动器。*


    你可以从 *Designer* 所在的位置运行它，或者将其移动到你的 Applications 文件夹中，以便可以从 macOS Launchpad 启动。


    ## Linux (Ubuntu & Debian)


    你可以使用以下命令从命令行安装 *Qt Designer*。*Qt Designer* 在 `qttools5-dev-tools` 包中。


    ```bash

    sudo apt-get install qttools5-dev-tools

    ```


    安装后，*Qt Designer* 将在启动器中可用。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_166_0.png)


    *图 70. Ubuntu 启动器中的 Qt Designer。*


    ### 14. Qt Designer 入门


    在本章中，我们将快速浏览使用 *Qt Designer* 设计 UI 并将该 UI 导出以在你的 PySide2 应用程序中使用。我们在这里只涉及 *Qt
    Designer* 功能的皮毛，但一旦你掌握了基础知识，就可以随意进行更详细的实验。


    打开 *Qt Designer*，你将看到主窗口。设计器通过左侧的选项卡提供。但是，要激活它，你首先需要开始创建一个 `.ui` 文件。


    ## Qt Designer


    *Qt Designer* 启动时会显示 *New Form* 对话框。在这里，你可以选择你正在构建的界面类型——这决定了你将构建界面的基础小部件。如果你正在启动一个应用程序，那么
    *Main Window* 通常是正确的选择。但是，你也可以为对话框和自定义复合小部件创建 `.ui` 文件。


    > Form 是赋予 UI 布局的技术名称，因为许多 UI 类似于带有各种输入框的纸质表格。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_168_0.png)


    图 71. Qt Designer 界面


    如果你点击 *Create*，那么将创建一个新的 UI，其中包含一个空的小部件。你现在可以开始设计你的应用程序了。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_168_1.png)


    图 72. Qt Designer 编辑器界面，带有一个空的 `QMainWindow` 小部件。


    ## Qt Creator


    如果你安装了 *Qt Creator*，界面和过程会略有不同。左侧有一个类似选项卡的界面，你可以从应用程序的各种组件中进行选择。其中之一是 *Design*，它在主面板中显示
    *Qt Designer*。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_169_0.png)


    图 73. Qt Creator 界面，左侧选中了 Design 部分。Qt Designer 界面与嵌套的 Designer 相同。


    > Qt Designer 的所有功能在 Qt Creator 中都可用，但用户界面的某些方面有所不同。


    要创建 .ui 文件，请转到 File → New File or Project... 在出现的窗口中，在左侧的 Files and Classes 下选择
    Qt，然后在右侧选择 Qt Designer Form。你会注意到图标上有“ui”，显示你正在创建的文件类型。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_170_0.png)


    图 74. 创建新的 Qt .ui 文件。


    在下一步中，你将被要求选择要创建的 UI 类型。对于大多数应用程序，*Main Window* 是正确的选择。但是，你也可以为其他对话框创建 `.ui` 文件，或使用
    `QWidget`（列为“Widget”）构建自定义小部件。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_171_0.png)


    图 75. 选择要创建的小部件类型，对于大多数应用程序，这将是 Main Window。


    接下来，为你的文件选择一个文件名和保存文件夹。将你的 `.ui` 文件保存为与你将要创建的类相同的名称，只是为了使后续命令更简单。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_172_0.png)


    图 76. 为你的文件选择保存名称和文件夹。


    最后，如果你使用版本控制系统，你可以选择将文件添加到其中。随意跳过此步骤——它不会影响你的 UI。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_173_0.png)


    图 77. 可选地将文件添加到你的版本控制中，例如 Git。


    ## 布局你的主窗口


    你将在 UI 设计器中看到你新创建的主窗口。一开始没有太多可看的，只是一个代表窗口的灰色工作区，以及窗口菜单栏的开头。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_174_0.png)


    图 78. 创建的主窗口的初始视图。


    你可以通过点击窗口并拖动每个角上的蓝色手柄来调整窗口大小。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_174_1.png)


    图 79. 主窗口调整为 300 x 300 像素。


    构建应用程序的第一步是向窗口添加一些小部件。在我们的第一个应用程序中，我们了解到要为 QMainWindow 设置中心小部件，我们需要使用 `.setCentralWidget()`。我们还看到，要使用布局添加多个小部件，我们需要一个中间
    `QWidget` 来应用布局，而不是直接将布局添加到窗口。


    *Qt Designer* 会自动为你处理这一点，尽管它对此并不是特别明显。


    要使用布局向主窗口添加多个小部件，首先将你的小部件拖到 `QMainWindow` 上。在这里，我们拖动了一个 `QLabel` 和一个 `QPushButton`，你将它们放在哪里并不重要。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_175_0.png)


    *图 80. 添加了 1 个标签和 1 个按钮的主窗口。*


    我们通过将它们拖到窗口上创建了 2 个小部件，这使它们成为该窗口的子部件。我们现在可以应用布局了。


    在右侧面板中找到 `QMainWindow`（它应该在最顶部）。在它下面，你会看到 *centralwidget*，代表窗口的中心小部件。中心小部件的图标显示了当前应用的布局。最初，它有一个红色的圆圈叉号，表示没有活动的布局。右键单击
    `QMainWindow` 对象，并在出现的下拉菜单中找到“Layout”。'
