  md: '# # 39. Moonsweeper


    Explore the mysterious moon of Q’tee without getting too close to the alien natives!


    Moonsweeper is a single-player puzzle video game. The objective of the game is
    to explore the area around your landed space rocket, without coming too close
    to the deadly B’ug aliens. Your trusty tricounter will tell you the number of
    B’ugs in the vicinity.


    > **Suggested reading**


    This application makes use of features covered in [Signals & Slots](Signals &
    Slots), and [Events](Events).


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_674_0.png)


    *Figure 267. Moonsweeper.*


    This a simple single-player exploration game modelled on *Minesweeper* where you
    must reveal all the tiles without hitting hidden mines. This implementation uses
    custom `QWidget` objects for the tiles, which individually hold their state as
    mines, status and the adjacent count of mines. In this version, the mines are
    replaced with alien bugs (B’ug) but they could just as easily be anything else.'
  merge: -1
  pgno: 674
- img_proc: true
  md: 'In many **Minesweeper** variants the initial turn is considered a free go –
    if you hit a mine on the first click, it is moved somewhere else. Here we cheat
    a little bit by taking the first go for the player, ensuring that it is on a non-mine
    spot. This allows us not to worry about the bad first move which would require
    us to recalculate the adjacencies. We can explain this away as the "initial exploration
    around the rocket" and make it sound completely sensible.


    > *Challenge!*


    If you want to implement this, you can catch the first click on a position and
    at that point generate mines/adjacencies, excluding your location, before handling
    the click. You will need to give your custom widgets access to the parent window
    object.


    # Source code


    The full source for the *Moonsweeper* game is included in the downloads for this
    book. The game file is saved with the name `minesweeper.py`.


    ```

    python3 minesweeper.py

    ```


    # Playing Field


    The playing area for Moonsweeper is a NxN grid, containing a set number of mines.
    The dimensions and mine counts we''ll used are taken from the default values for
    the Windows version of Minesweeper. The values used are shown in the table below:


    *Table 14. Table Dimensions and mine counts*


    | Level | Dimensions | Number of Mines |

    | :--- | :--- | :--- |

    | Easy | 8 x 8 | 10 |

    | Medium | 16 x 16 | 40 |'
  merge: -1
  pgno: 675
- img_proc: true
  md: '| Hard | 24 x 24 | 99 |


    We store these values as a constant LEVELS defined at the top of the file. Since
    all the playing fields are square we only need to store the value once (8, 16
    or 24).


    Listing 234. app/minesweeper.py


    ```

    LEVELS = [("Easy", 8, 10), ("Medium", 16, 40), ("Hard", 24, 99)]

    ```


    The playing grid could be represented in a number of ways, including for example
    a 2D ''list of lists'' representing the different states of the playing positions
    (mine, revealed, flagged).


    However, in our implementation we''ll be using an object-orientated approach,
    where individual positions on the map hold all relevant data about themselves.
    Taking this a step further, we can make these objects individually responsible
    for drawing themselves. In Qt we can do this simply by subclassing from QWidget
    and then implementing a custom paint function.


    We''ll cover the construction and behavior of these custom widgets before moving
    onto it''s appearance. Since our tile objects are subclassing from QWidget we
    can lay them out like any other widget. We do this, by setting up a QGridLayout.


    Listing 235. app/minesweeper.py


    ```

    self.grid = QGridLayout()

    self.grid.setSpacing(5)

    self.grid.setSizeConstraint(QLayout.SetFixedSize)

    ```


    Next we need to set up the playing field, creating our position tile widgets and
    adding them our grid. The initial setup for the level is defined in custom method,
    which reads from LEVELS and assigns a number of variables to the window. The window
    title and mine counter are updated, and then the setup of the grid is begun.'
