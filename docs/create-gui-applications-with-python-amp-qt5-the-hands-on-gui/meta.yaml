- md: "## Backgrounds\n\nIn addition to styling text you can also style the widget\
    \ background, with both solid colors and images. For images there are a number\
    \ of additional properties which define how the image is repeated and positioned\
    \ within the widget area.\n\n| Property | Type (Default) | Description |\n| :---\
    \ | :--- | :--- |\n| `background` | Background | Shorthand notation for setting\
    \ the background. Equivalent to specifying background-color, background-image,\
    \ background-repeat, and/or background-position. See also background-origin, selection-background-color,\
    \ background-clip, background-attachment and alternate-background-color. |\n|\
    \ `background-color` | Brush | The background color used for the widget. |\n|\
    \ `background-image` | Url | The background image used for the widget. Semi-transparent\
    \ parts of the image let the background-color shine through. |\n| `background-repeat`\
    \ | Repeat (both) | Whether and how the background image is repeated to fill the\
    \ background-origin rectangle. |\n| `background-position` | Alignment (top-left)\
    \ | The alignment of the background image within the background-origin rectangle.\
    \ |\n| `background-clip` | Origin (border) | The widget's rectangle, in which\
    \ the background is drawn. |\n| `background-origin` | Origin (padding) | The widget's\
    \ background rectangle, to use in conjunction with background-position and background-image.\
    \ |\n\nThe following example will apply the specified image over the background\
    \ of our `QPlainTextEdit` which we are using to enter the rules.\n\n```\nQPlainTextEdit\
    \ {\n    color: white;\n    background-image: url(../otje.jpg);\n}\n```\n\nImages\
    \ are referenced using the `url()` syntax, passing in the path to the file. Here\
    \ we're using `../otje.jpg` to point to a file in the parent directory. You can\
    \ also use resource path syntax, e.g. `url(:/images/<imagename>.png)` to select\
    \ images from the currently loaded resources.\n\n> While this syntax is identical\
    \ to that used in CSS, remote files cannot be loaded with URLs.\n\nTo position\
    \ the background in the widget you can use the `background-position` property.\
    \ This defines the point of the image which will be aligned with the *same* point\
    \ on the widget's *origin rectangle*. By default the *origin rectangle* is the\
    \ padded area of the widget.\n\nA position of `center`, `center` therefore means\
    \ the center of the image will be aligned with the center of the widget, along\
    \ both axes.\n\n```\nQPlainTextEdit {\n    color: white;\n    background-image:\
    \ url(../otje.jpg);\n    background-position: center center;\n}\n```\n\nTo align\
    \ the bottom-right of the image to the bottom-right of the *origin rectangle*\
    \ of the widget, you would use.\n\n```\nQPlainTextEdit {\n    color: white;\n\
    \    background-image: url(../otje.jpg);\n    background-position: bottom right;\n\
    }\n```\n\nThe *origin rectangle* can be modified using the `background-origin`\
    \ property. This accepts one of the values `margin`, `border`, `padding` or `content`\
    \ which defines that specific box as the reference of background position alignment.\n\
    \nTo understand what this means we'll need to take a look at the widget box model.\n\
    \n## The widget Box Model\n\nThe term *box model* describes the relationships\
    \ between the *boxes* (rectangles) which surround each widget and the effect these\
    \ boxes have on the size or layout of widgets in relationship to one another.\
    \ Each Qt widget is surrounded by four concentric boxes—from inside out, these\
    \ are content, padding, border and margin.\n\nIncreasing the size of the inner\
    \ boxes, increases the size of the outer boxes. This arrangement means, for example,\
    \ that increasing the *padding* of a widget will add space between the content\
    \ the border, while increasing the dimensions of the border itself.\n\nThe properties\
    \ available to modify the various boxes are given below.\n\n| Property | Type\
    \ (Default) | Description |\n| :--- | :--- | :--- |\n| `border` | Border | Shorthand\
    \ notation for setting the widget's border. Equivalent to specifying border-color,\
    \ border-style, and/or border-width. Also `border-top`, `border-right`, `border-bottom`\
    \ and `border-left`. |\n| `border-color` | Box Colors (QPalette Foreground) |\
    \ The color of all the border's edges. Also `border-top-color`, `border-right-color`,\
    \ `border-bottom-color`, `border-left-color` for specific edges. |\n| `border-image`\
    \ | Border Image | The image used to fill the border. The image is cut into nine\
    \ parts and stretched appropriately if necessary. |\n| `border-radius` | Radius\
    \ | The radius (curve) of the border's corners. Also `border-top-left-radius`,\
    \ `border-top-right-radius`, `border-bottom-right-radius` and `border-bottom-left-radius`\
    \ for specific corners. |\n| `border-style` | Border Style (none) | The style\
    \ of all the border's edges. Also `border-top-style`, `border-right-style`, `border-bottom-style`\
    \ and `border-left-style` for specific edges. |\n| `border-width` | Box Lengths\
    \ | The width of the border. Also `border-top-width`, `border-right-width`, `border-bottom-width`\
    \ and `border-left-width`. |\n| `margin` | Box Lengths | The widget's margins.\
    \ Also `margin-top`, `margin-right`, `margin-bottom` and `margin-left`. |\n| `outline`\
    \ | | The outline drawn around the object's border. |\n| `outline-color` | Color\
    \ | The color of the outline. See also `border-color`. |\n| `outline-offset` |\
    \ Length | The outline's offset from the border of the widget. |\n| `outline-style`\
    \ | | Specifies the pattern used to draw the outline. See also `border-style`.\
    \ |\n| `outline-radius` | | Adds rounded corners to the outline. Also `outline-bottom-left-radius`,\
    \ `outline-bottom-right-radius`, `outline-top-left-radius` and `outline-top-right-radius`.\
    \ |\n| `padding` | Box Lengths | The widget's padding. Also `padding-top`, `padding-right`,\
    \ `padding-bottom` and `padding-left`. |\n\nThe following example modifies the\
    \ margin, border and padding of the QPlainTextEdit widget.\n\n```\nQPlainTextEdit\
    \ {\n    margin: 10;\n    padding: 10px;\n    border: 5px solid red;\n}\n```\n\
    \n## A note on units\n\nIn this example we’re using `px` or *pixel* units for\
    \ the *padding* and *border* The value for *margin* is also in pixels, as this\
    \ is the default unit when none is specified. You can also use one of the following\
    \ units —\n\n- `px` pixels\n- `pt` the size of one point (i.e. 1/72 of an inch)\n\
    - `em` the *em* width of the font (i.e. the width of 'M')\n- `ex` the *ex* width\
    \ of the font (i.e. the height of 'x')\n\nLooking at the result in the QSS tester,\
    \ you can see the padding *inside* the red border and the margin *outside* the\
    \ red border.\n\nYou can also add a *radius* to the outline to add curved edges.\n\
    \n```\nQPlainTextEdit {\n    margin: 10;\n    padding: 10px;\n    border: 5px\
    \ solid red;\n    border-radius: 15px;\n}\n```\n\n## Sizing widgets\n\nIt is possible\
    \ to control the size of widgets with QSS. However, while there are specific `width`\
    \ and `height` properties (see later) these are only used to specify the sizes\
    \ of sub-controls. To control widgets you must instead use the `max-` and `min-`\
    \ properties.\n\n| Property | Type (Default) | Description |\n| :--- | :--- |\
    \ :--- |\n| `max-height` | Length | The widget's or a subcontrol's maximum height.\
    \ |\n| `max-width` | Length | The widget's or a subcontrol's maximum width. |\n\
    | `min-height` | Length | The widget's or a subcontrol's minimum height. |"
  mdcn: "## 背景\n\n除了设置文本样式，您还可以设置控件的背景，包括纯色和图片。对于图片，有多个额外属性用于定义图片在控件区域内的重复和定位方式。\n\
    \n| 属性 | 类型（默认值） | 描述 |\n| :--- | :--- | :--- |\n| `background` | Background |\
    \ 设置背景的简写表示法。等同于指定 background-color、background-image、background-repeat 和/或 background-position。另请参阅\
    \ background-origin、selection-background-color、background-clip、background-attachment\
    \ 和 alternate-background-color。 |\n| `background-color` | Brush | 控件使用的背景颜色。 |\n\
    | `background-image` | Url | 控件使用的背景图片。图片的半透明部分会让背景颜色透出来。 |\n| `background-repeat`\
    \ | Repeat (both) | 背景图片是否以及如何重复以填充 background-origin 矩形。 |\n| `background-position`\
    \ | Alignment (top-left) | 背景图片在 background-origin 矩形内的对齐方式。 |\n| `background-clip`\
    \ | Origin (border) | 绘制背景的控件矩形区域。 |\n| `background-origin` | Origin (padding)\
    \ | 控件的背景矩形区域，与 background-position 和 background-image 配合使用。 |\n\n以下示例将在我们用于输入规则的\
    \ `QPlainTextEdit` 的背景上应用指定的图片。\n\n```\nQPlainTextEdit {\n    color: white;\n\
    \    background-image: url(../otje.jpg);\n}\n```\n\n图片使用 `url()` 语法引用，传入文件路径。这里我们使用\
    \ `../otje.jpg` 指向父目录中的文件。您也可以使用资源路径语法，例如 `url(:/images/<imagename>.png)` 来从当前加载的资源中选择图片。\n\
    \n> 虽然此语法与 CSS 中使用的语法相同，但无法通过 URL 加载远程文件。\n\n要定位背景在控件中的位置，可以使用 `background-position`\
    \ 属性。这定义了图片的哪个点将与控件*原始矩形*的*同一点*对齐。默认情况下，*原始矩形*是控件的内边距区域。\n\n因此，`center`、`center`\
    \ 的位置意味着图片的中心将与控件的中心沿两个轴对齐。\n\n```\nQPlainTextEdit {\n    color: white;\n    background-image:\
    \ url(../otje.jpg);\n    background-position: center center;\n}\n```\n\n要将图片的右下角与控件*原始矩形*的右下角对齐，您应该使用：\n\
    \n```\nQPlainTextEdit {\n    color: white;\n    background-image: url(../otje.jpg);\n\
    \    background-position: bottom right;\n}\n```\n\n*原始矩形*可以使用 `background-origin`\
    \ 属性进行修改。它接受 `margin`、`border`、`padding` 或 `content` 之一的值，这些值定义了特定的框作为背景位置对齐的参考。\n\
    \n要理解这意味着什么，我们需要看一下控件的盒模型。\n\n## 控件盒模型\n\n术语*盒模型*描述了围绕每个控件的*框*（矩形）之间的关系，以及这些框对控件之间大小或布局的影响。每个\
    \ Qt 控件都被四个同心框包围——从内到外，它们是内容、内边距、边框和外边距。\n\n增加内部框的大小会增加外部框的大小。这种安排意味着，例如，增加控件的*内边距*会在内容和边框之间增加空间，同时增加边框本身的尺寸。\n\
    \n可用于修改各种框的属性如下。\n\n| 属性 | 类型（默认值） | 描述 |\n| :--- | :--- | :--- |\n| `border`\
    \ | Border | 设置控件边框的简写表示法。等同于指定 border-color、border-style 和/或 border-width。还有\
    \ `border-top`、`border-right`、`border-bottom` 和 `border-left`。 |\n| `border-color`\
    \ | Box Colors (QPalette Foreground) | 所有边框边缘的颜色。还有 `border-top-color`、`border-right-color`、`border-bottom-color`、`border-left-color`\
    \ 用于特定边缘。 |\n| `border-image` | Border Image | 用于填充边框的图片。图片被切成九部分，并在必要时适当拉伸。 |\n\
    | `border-radius` | Radius | 边框角的半径（曲线）。还有 `border-top-left-radius`、`border-top-right-radius`、`border-bottom-right-radius`\
    \ 和 `border-bottom-left-radius` 用于特定角。 |\n| `border-style` | Border Style (none)\
    \ | 所有边框边缘的样式。还有 `border-top-style`、`border-right-style`、`border-bottom-style`\
    \ 和 `border-left-style` 用于特定边缘。 |\n| `border-width` | Box Lengths | 边框的宽度。还有 `border-top-width`、`border-right-width`、`border-bottom-width`\
    \ 和 `border-left-width`。 |\n| `margin` | Box Lengths | 控件的外边距。还有 `margin-top`、`margin-right`、`margin-bottom`\
    \ 和 `margin-left`。 |\n| `outline` | | 围绕对象边框绘制的轮廓。 |\n| `outline-color` | Color\
    \ | 轮廓的颜色。另请参阅 `border-color`。 |\n| `outline-offset` | Length | 轮廓相对于控件边框的偏移量。\
    \ |\n| `outline-style` | | 指定用于绘制轮廓的图案。另请参阅 `border-style`。 |\n| `outline-radius`\
    \ | | 为轮廓添加圆角。还有 `outline-bottom-left-radius`、`outline-bottom-right-radius`、`outline-top-left-radius`\
    \ 和 `outline-top-right-radius`。 |\n| `padding` | Box Lengths | 控件的内边距。还有 `padding-top`、`padding-right`、`padding-bottom`\
    \ 和 `padding-left`。 |\n\n以下示例修改了 QPlainTextEdit 控件的外边距、边框和内边距。\n\n```\nQPlainTextEdit\
    \ {\n    margin: 10;\n    padding: 10px;\n    border: 5px solid red;\n}\n```\n\
    \n## 关于单位的说明\n\n在此示例中，我们对*内边距*和*边框*使用 `px` 或*像素*单位。*外边距*的值也以像素为单位，因为这是未指定时的默认单位。您也可以使用以下单位之一\
    \ —\n\n- `px` 像素\n- `pt` 一点的大小（即 1/72 英寸）\n- `em` 字体的 *em* 宽度（即 'M' 的宽度）\n- `ex`\
    \ 字体的 *ex* 宽度（即 'x' 的高度）\n\n在 QSS 测试器中查看结果，您可以看到红色边框*内部*的内边距和红色边框*外部*的外边距。\n\n\
    您还可以为轮廓添加*半径*以添加弯曲边缘。\n\n```\nQPlainTextEdit {\n    margin: 10;\n    padding:\
    \ 10px;\n    border: 5px solid red;\n    border-radius: 15px;\n}\n```\n\n## 调整控件大小\n\
    \n可以使用 QSS 控制控件的大小。但是，虽然有特定的 `width` 和 `height` 属性（见后文），但它们仅用于指定子控件的大小。要控制控件，您必须改用\
    \ `max-` 和 `min-` 属性。\n\n| 属性 | 类型（默认值） | 描述 |\n| :--- | :--- | :--- |\n| `max-height`\
    \ | Length | 控件或子控件的最大高度。 |\n| `max-width` | Length | 控件或子控件的最大宽度。 |\n| `min-height`\
    \ | Length | 控件或子控件的最小高度。 |"
