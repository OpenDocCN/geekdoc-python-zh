- md: "## Child >\n\nYou can also target a widget which is a *direct* child of another\
    \ widget using the `>` selector. This will only match where that exact hierarchy\
    \ is in place.\n\nFor example, the following will *only* target the `QWidget`\
    \ container which is a direct child of the `QMainWindow`.\n\n```css\nQMainWindow\
    \ > QWidget {\n    background: green;\n}\n```\n\nBut the following will not match\
    \ anything, since in our QSS app the `QComboBox` widget is *not* a direct child\
    \ of the `QMainWindow`.\n\n```css\nQMainWindow > QComboBox { /* matches nothing\
    \ */\n    background: yellow;\n}\n```\n\n## Inheritance\n\nStyle sheets can be\
    \ applied to `QApplication` and widgets and will apply to the styled widget and\
    \ all of its children. A widget's effective style sheet is determined by combining\
    \ the style sheets of all its ancestors (parent, grandparent, ...all the way up\
    \ to the window) plus style sheets on `QApplication` itself.\n\nRules are applied\
    \ in order of *specificity*. That means, a rule which targets a specific widget\
    \ by ID, will override a rule which targets *all* widgets of that type. For example,\
    \ the following will set the background of the `QLineEdit` in our QSS tester app\
    \ to blue — the specific ID overrides the generic widget rule.\n\n```css\nQLineEdit#mylineedit\
    \ {\n    background: blue;\n}\n\nQLineEdit {\n    background: red;\n}\n```\n\n\
    In cases where there are two conflicting rules the widgets' own style sheet will\
    \ be preferred over inherited styles, and nearer ancestors will be preferred over\
    \ more distant — parents will be preferred to grandparents for example.\n\n##\
    \ No inherited properties\n\nWidgets are only affected by rules which target them\
    \ specifically. While rules can be *set* on a parent, they must still reference\
    \ the target widget to affect it. Take the following rule —\n\n```css\nQLineEdit\
    \ {\n    background: red;\n}\n```\n\nIf set on a `QMainWindow` all `QLineEdit`\
    \ objects in that window will have a red background (assuming no other rules).\
    \ However, if the following is set...\n\n```css\nQMainWindow {\n    background:\
    \ red;\n}\n```\n\n...only the `QMainWindow` itself will be set with a red background.\
    \ The background color *itself* does not propagate to child widgets.\n\n> If the\
    \ child widgets have transparent backgrounds, the red *will* show through however.\n\
    \nUnless targeted by a matching rule, a widget will use its default system style\
    \ values for each property. Widgets do not inherit style properties from parent\
    \ widgets, even inside compound widgets, and widgets must be targeted by rules\
    \ directly to be affected by them.\n\n> This is in contrast with CSS, where elements\
    \ can inherit values from their parents.\n\n## Pseudo-selectors\n\nSo far we've\
    \ looked at static styling, using properties to change the default appearance\
    \ of a widget. However, QSS also allows you to style in response to dynamic widget\
    \ states. An example of this is the highlight you see when buttons are hovered\
    \ with the mouse — the highlight helps to indicate that the widget has focus and\
    \ will respond if you click it.\n\nThere are many other uses for active styling,\
    \ from usability (highlighting lines of data, or specific tabs) to visualizing\
    \ data hierarchies. These can all be achieved using *pseudo-selectors* in QSS.\
    \ Pseudo-selectors make QSS rules apply only in particular circumstances.\n\n\
    There are a lot of different pseudo selectors which you can apply to widgets.\
    \ Some such as `:hover` are generic and can be used with all widgets, others are\
    \ widget-specific. The full list is given below —\n\n| Pseudo-State | Description\
    \ |\n| :--- | :--- |\n| `:active` | Widget is part of an active window. |\n| `:adjoins-item`\
    \ | The `::branch` of a `QTreeView` is adjacent to an item. |\n| `:alternate`\
    \ | Set for every alternate row when painting the row of a `QAbstractItemView`\
    \ (`QAbstractItemView.alternatingRowColors()` is `True`) |\n| `:bottom` | Positioned\
    \ at the bottom, e.g. a `QTabBar` that has its tabs at the bottom. |\n| `:checked`\
    \ | Item is checked, e.g. the checked state of `QAbstractButton`. |\n| `:closable`\
    \ | Items can be closed, e.g. a `QDockWidget` has `QDockWidget.DockWidgetClosable`\
    \ enabled. |\n| `:closed` | Item is in the closed state, e.g. a non-expanded item\
    \ in a `QTreeView`. |\n| `:default` | Item is the default action, e.g. a default\
    \ `QPushButton` or a default action in a `QMenu`. |\n| `:disabled` | Item is disabled.\
    \ |\n| `:editable` | `QComboBox` is editable. |\n| `:enabled` | Item is enabled.\
    \ |\n| `:exclusive` | Item is part of an exclusive item group, e.g. a menu item\
    \ in an exclusive `QActionGroup`. |\n| `:first` | Item is the first in a list,\
    \ e.g. the first tab in a `QTabBar`. |\n| `:flat` | Item is flat, e.g. a flat\
    \ `QPushButton`. |\n| `:floatable` | Items can be floated, e.g. the `QDockWidget`\
    \ has `QDockWidget.DockWidgetFloatable` enabled. |\n| `:focus` | Item has input\
    \ focus. |\n| `:has-children` | Item has children, e.g. an item in a `QTreeView`\
    \ with child items. |\n| `:has-siblings` | Item has siblings, e.g. an item in\
    \ a `QTreeView` with siblings. |\n| `:horizontal` | Item has horizontal orientation.\
    \ |\n| `:hover` | Mouse is hovering over the item. |\n| `:indeterminate` | Item\
    \ has indeterminate state, e.g. a `QCheckBox` or `QRadioButton` is partially checked.\
    \ |\n| `:last` | Item is the last (in a list), e.g. the last tab in a `QTabBar`.\
    \ |\n| `:left` | Item is positioned at the left, e.g. a `QTabBar` that has its\
    \ tabs positioned at the left. |\n| `:maximized` | Item is maximized, e.g. a maximized\
    \ `QMdiSubWindow`. |\n| `:middle` | Item is in the middle (in a list), e.g. a\
    \ tab that is not in the beginning or the end in a `QTabBar`. |\n| `:minimized`\
    \ | Item is minimized, e.g. a minimized `QMdiSubWindow`. |\n| `:movable` | Item\
    \ can be moved around, e.g. the `QDockWidget` has `QDockWidget.DockWidgetMovable`\
    \ enabled. |\n| `:no-frame` | Item has no frame, e.g. a frameless `QSpinBox` or\
    \ `QLineEdit`. |\n| `:non-exclusive` | Item is part of a non-exclusive item group,\
    \ e.g. a menu item in a non-exclusive `QActionGroup`. |\n| `:off` | Items that\
    \ can be toggled, this applies to items in the \"off\" state. |\n| `:on` | Items\
    \ that can be toggled, this applies to widgets in the \"on\" state. |\n| `:only-one`\
    \ | Item is the only one (in a list), e.g. a lone tab in a `QTabBar`. |\n| `:open`\
    \ | Item is in the open state, e.g. an expanded item in a `QTreeView`, or a `QComboBox`\
    \ or `QPushButton` with an open menu. |\n| `:next-selected` | Next item is selected,\
    \ e.g. the selected tab of a `QTabBar` is next to this item. |\n| `:pressed` |\
    \ Item is being pressed using the mouse. |\n| `:previous-selected` | Previous\
    \ item is selected, e.g. a tab in a `QTabBar` that is next to the selected tab.\
    \ |\n| `:read-only` | Item is marked read only or non-editable, e.g. a read only\
    \ `QLineEdit` or a non-editable `QComboBox`. |\n| `:right` | Item is positioned\
    \ at the right, e.g. a `QTabBar` that has its tabs positioned at the right. |\n\
    | `:selected` | Item is selected, e.g. the selected tab in a `QTabBar` or the\
    \ selected item in a `QMenu`. |\n| `:top` | Item is positioned at the top, e.g.\
    \ a `QTabBar` that has its tabs positioned at the top. |\n| `:unchecked` | Item\
    \ is unchecked. |\n| `:vertical` | Item has vertical orientation. |"
  mdcn: "## 子元素选择器\n\n你还可以使用 `>` 选择器来定位作为另一个控件*直接*子元素的控件。这只会匹配确切存在该层级关系的情况。\n\n例如，以下代码将*仅*定位作为\
    \ `QMainWindow` 直接子元素的 `QWidget` 容器。\n\n```css\nQMainWindow > QWidget {\n    background:\
    \ green;\n}\n```\n\n但以下代码将不会匹配任何内容，因为在我们的 QSS 应用程序中，`QComboBox` 控件*不是* `QMainWindow`\
    \ 的直接子元素。\n\n```css\nQMainWindow > QComboBox { /* 匹配不到任何内容 */\n    background:\
    \ yellow;\n}\n```\n\n## 继承\n\n样式表可以应用于 `QApplication` 和控件，并将应用于该样式化的控件及其所有子控件。控件的有效样式表由其所有祖先（父级、祖父级……一直到窗口）的样式表以及\
    \ `QApplication` 本身的样式表组合而成。\n\n规则按*特异性*顺序应用。这意味着，通过 ID 定位特定控件的规则，将覆盖定位*所有*该类型控件的规则。例如，以下代码将把我们的\
    \ QSS 测试器应用程序中的 `QLineEdit` 背景设置为蓝色——特定的 ID 覆盖了通用的控件规则。\n\n```css\nQLineEdit#mylineedit\
    \ {\n    background: blue;\n}\n\nQLineEdit {\n    background: red;\n}\n```\n\n\
    在存在两条冲突规则的情况下，控件自身的样式表将优先于继承的样式，而较近的祖先将优先于较远的祖先——例如，父级将优先于祖父级。\n\n## 不继承的属性\n\n\
    控件仅受专门针对它们的规则影响。虽然规则可以*设置*在父控件上，但它们仍然必须引用目标控件才能影响它。考虑以下规则——\n\n```css\nQLineEdit\
    \ {\n    background: red;\n}\n```\n\n如果设置在 `QMainWindow` 上，该窗口中的所有 `QLineEdit`\
    \ 对象都将具有红色背景（假设没有其他规则）。但是，如果设置了以下内容...\n\n```css\nQMainWindow {\n    background:\
    \ red;\n}\n```\n\n...则只有 `QMainWindow` 本身会被设置为红色背景。背景颜色*本身*不会传播到子控件。\n\n> 然而，如果子控件具有透明背景，红色*会*显示出来。\n\
    \n除非被匹配的规则专门定位，否则控件将对每个属性使用其默认的系统样式值。控件不会从父控件继承样式属性，即使在复合控件内部也是如此，并且控件必须被规则直接定位才能受到它们的影响。\n\
    \n> 这与 CSS 不同，在 CSS 中，元素可以从其父元素继承值。\n\n## 伪选择器\n\n到目前为止，我们已经了解了静态样式，使用属性来改变控件的默认外观。然而，QSS\
    \ 还允许你根据控件的动态状态进行样式设置。一个例子是当鼠标悬停在按钮上时看到的高亮显示——高亮有助于指示控件已获得焦点，如果你点击它，它将会响应。\n\n\
    活动样式有许多其他用途，从可用性（高亮数据行或特定选项卡）到可视化数据层次结构。这些都可以通过 QSS 中的*伪选择器*来实现。伪选择器使 QSS 规则仅在特定情况下应用。\n\
    \n有许多不同的伪选择器可以应用于控件。有些如 `:hover` 是通用的，可以与所有控件一起使用，而另一些则是特定于控件的。完整列表如下——\n\n| 伪状态\
    \ | 描述 |\n| :--- | :--- |\n| `:active` | 控件是活动窗口的一部分。 |\n| `:adjoins-item` | `QTreeView`\
    \ 的 `::branch` 与一个项目相邻。 |\n| `:alternate` | 在绘制 `QAbstractItemView` 的行时，为每个交替行设置（`QAbstractItemView.alternatingRowColors()`\
    \ 为 `True`） |\n| `:bottom` | 位于底部，例如选项卡位于底部的 `QTabBar`。 |\n| `:checked` | 项目被选中，例如\
    \ `QAbstractButton` 的选中状态。 |\n| `:closable` | 项目可以关闭，例如启用了 `QDockWidget.DockWidgetClosable`\
    \ 的 `QDockWidget`。 |\n| `:closed` | 项目处于关闭状态，例如 `QTreeView` 中未展开的项目。 |\n| `:default`\
    \ | 项目是默认操作，例如默认的 `QPushButton` 或 `QMenu` 中的默认操作。 |\n| `:disabled` | 项目被禁用。 |\n\
    | `:editable` | `QComboBox` 是可编辑的。 |\n| `:enabled` | 项目被启用。 |\n| `:exclusive`\
    \ | 项目是排他性项目组的一部分，例如排他性 `QActionGroup` 中的菜单项。 |\n| `:first` | 项目是列表中的第一个，例如 `QTabBar`\
    \ 中的第一个选项卡。 |\n| `:flat` | 项目是扁平的，例如扁平的 `QPushButton`。 |\n| `:floatable` | 项目可以浮动，例如启用了\
    \ `QDockWidget.DockWidgetFloatable` 的 `QDockWidget`。 |\n| `:focus` | 项目具有输入焦点。\
    \ |\n| `:has-children` | 项目有子项，例如 `QTreeView` 中具有子项的项目。 |\n| `:has-siblings` |\
    \ 项目有同级项，例如 `QTreeView` 中具有同级项的项目。 |\n| `:horizontal` | 项目具有水平方向。 |\n| `:hover`\
    \ | 鼠标悬停在项目上。 |\n| `:indeterminate` | 项目处于不确定状态，例如部分选中的 `QCheckBox` 或 `QRadioButton`。\
    \ |\n| `:last` | 项目是最后一个（在列表中），例如 `QTabBar` 中的最后一个选项卡。 |\n| `:left` | 项目位于左侧，例如选项卡位于左侧的\
    \ `QTabBar`。 |\n| `:maximized` | 项目被最大化，例如最大化的 `QMdiSubWindow`。 |\n| `:middle`\
    \ | 项目位于中间（在列表中），例如 `QTabBar` 中既不在开头也不在结尾的选项卡。 |\n| `:minimized` | 项目被最小化，例如最小化的\
    \ `QMdiSubWindow`。 |\n| `:movable` | 项目可以移动，例如启用了 `QDockWidget.DockWidgetMovable`\
    \ 的 `QDockWidget`。 |\n| `:no-frame` | 项目没有边框，例如无边框的 `QSpinBox` 或 `QLineEdit`。\
    \ |\n| `:non-exclusive` | 项目是非排他性项目组的一部分，例如非排他性 `QActionGroup` 中的菜单项。 |\n| `:off`\
    \ | 可切换的项目，这适用于处于“关闭”状态的项目。 |\n| `:on` | 可切换的项目，这适用于处于“开启”状态的控件。 |\n| `:only-one`\
    \ | 项目是唯一的（在列表中），例如 `QTabBar` 中单独的选项卡。 |\n| `:open` | 项目处于打开状态，例如 `QTreeView`\
    \ 中展开的项目，或具有打开菜单的 `QComboBox` 或 `QPushButton`。 |\n| `:next-selected` | 下一个项目被选中，例如\
    \ `QTabBar` 中选中的选项卡紧邻此项目。 |\n| `:pressed` | 项目正被鼠标按下。 |\n| `:previous-selected`\
    \ | 上一个项目被选中，例如 `QTabBar` 中紧邻选中选项卡的选项卡。 |\n| `:read-only` | 项目被标记为只读或不可编辑，例如只读的\
    \ `QLineEdit` 或不可编辑的 `QComboBox`。 |\n| `:right` | 项目位于右侧，例如选项卡位于右侧的 `QTabBar`。\
    \ |\n| `:selected` | 项目被选中，例如 `QTabBar` 中选中的选项卡或 `QMenu` 中选中的项目。 |\n| `:top` |\
    \ 项目位于顶部，例如选项卡位于顶部的 `QTabBar`。 |\n| `:unchecked` | 项目未被选中。 |\n| `:vertical` |\
    \ 项目具有垂直方向。 |"
