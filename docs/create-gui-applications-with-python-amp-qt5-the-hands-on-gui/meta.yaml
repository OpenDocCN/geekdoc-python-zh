- md: "complex builds, for example when you are targeting different platforms and\
    \ want to conditionally define additional libraries or dependencies to bundle.\n\
    \nOnce a `.spec` file has been generated, you can pass this to `pyinstaller` instead\
    \ of your script to repeat the previous build process. Run this now to rebuild\
    \ your executable.\n\n```\npyinstaller app.spec\n```\n\nThe resulting build will\
    \ be identical to the build used to generate the `.spec` file (assuming you have\
    \ made no changes). For many **PyInstaller** configuration changes you have the\
    \ option of passing command-line arguments, or modifying your existing `.spec`\
    \ file. Which you choose is up to you.\n\n## Tweaking the build\n\nSo far we've\
    \ created a simple first build of a very basic application. Now we'll look at\
    \ a few of the most useful options that **PyInstaller** provides to tweak our\
    \ build. Then we'll go on to look at building more complex applications.\n\n##\
    \ Naming your app\n\nOne of the simplest changes you can make is to provide a\
    \ proper \"name\" for your application. By default the app takes the name of your\
    \ source file (minus the extension), for example `main` or `app`. This isn't usually\
    \ what you want.\n\nYou can provide a nicer name for **PyInstaller** to use for\
    \ the executable (and `dist` folder) either by editing the `.spec` file to add\
    \ a `name=` under the app block.\n\n```\nexe = EXE(pyz,\n          a.scripts,\n\
    \          [],\n          exclude_binaries=True,\n          name='Hello World',\n\
    \          debug=False,\n          bootloader_ignore_signals=False,\n        \
    \  strip=False,\n          upx=True,\n          console=False  # False = do not\
    \ show console.\n          )\n```\n\nAlternatively, you can re-run the `pyinstaller`\
    \ command and pass the `-n` or `--name` configuration flag along with your `app.py`\
    \ script.\n\n```\npyinstaller -n \"Hello World\" app.py\n# or\npyinstaller --name\
    \ \"Hello World\" app.py\n```\n\nThe resulting EXE file will be given the name\
    \ `Hello World.exe` and placed in the folder `dist\\Hello World\\`.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_615_0.png)\n\
    \nThe name of the `.spec` file is taken from the name passed in on the command\
    \ line, so this will **also** create a new spec file for you, called `Hello World.spec`\
    \ in your root folder.\n\n## Hiding the console window\n\nWhen you run your packaged\
    \ application you will notice that a console window runs in the background. If\
    \ you try and close this console window your application will also close. You\
    \ almost never want this window in a GUI application and **PyInstaller** provides\
    \ a simple way to turn this off.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_616_0.png)\n\
    \n*Figure 244. Application running with terminal in background*\n\nYou can fix\
    \ this in one of two ways. Firstly, you can edit the previously created `.spec`\
    \ file setting `console=False` under the EXE block as shown below.\n\n```\nexe\
    \ = EXE(pyz,\n          a.scripts,\n          [],\n          exclude_binaries=True,\n\
    \          name='app',\n          debug=False,\n          bootloader_ignore_signals=False,\n\
    \          strip=False,\n          upx=True,\n          console=False  # False\
    \ = do not show console.\n          )\n```\n\nAlternatively, you can re-run the\
    \ `pyinstaller` command and pass the `-w`, `--noconsole` or `--windowed` configuration\
    \ flag along with your `app.py` script.\n\n```\npyinstaller -w app.py\n# or\n\
    pyinstaller --windowed app.py\n# or\npyinstaller --noconsole app.py\n```\n\n>\
    \ \U0001F4A1 There is no difference between any of the options.\n\nINFO: Re-running\
    \ `pyinstaller` will re-generate the `.spec` file. If you've made any other changes\
    \ to this file these will be lost.\n\n## One File Build\n\nOn Windows **PyInstaller**\
    \ has the ability to create a one-file build, that is, a single EXE file which\
    \ contains all your code, libraries and data files in one. This can be a convenient\
    \ way to share simple applications, as you don't need to provide an installer\
    \ or zip up a folder of files.\n\nTo specify a one-file build provide the `--onefile`\
    \ flag at the command line.\n\n```\npyinstaller --onefile app.py\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_618_0.png)\n\
    \nFigure 245. Result of a one-file build\n\nNote that while the one-file build\
    \ is easier to distribute, it is slower to execute than a normally built application.\
    \ This is because every time the application is run it must create a temporary\
    \ folder to unpack the contents of the executable. Whether this trade-off is worth\
    \ the convenience for your app is up to you!\n\n> Using the `--onefile` option\
    \ makes quite a few changes to the `.spec` file. You *can* make these changes\
    \ manually, but it's much simpler to use the command line switch when first creating\
    \ your `.spec`\n\n> Since debugging a one file app is much harder, you should\
    \ make sure everything is working with a normal build before you create a one-file\
    \ package.\n\n## Setting an application Icon\n\nBy default **PyInstaller** EXE\
    \ files come with the following icon in place.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_618_1.png)\n\
    \nFigure 246. Default PyInstaller application icon, on app.exe\n\nYou will probably\
    \ want to customize this to make your application more recognisable. This can\
    \ be done easily using the `--icon=<filename>` command-line switch to **PyInstaller**.\
    \ On Windows the icon should be provided as an `.ico` file.\n\n```\npyinstaller\
    \ --windowed --icon=hand_icon.ico app.py\n```\n\n> The [portable version of IcoFx](https://portableapps.com/apps/graphics_pictures/icofx_portable)\
    \ is a good free tool to create icons on Windows.\n\nOr, by adding the `icon=`\
    \ parameter to your `.spec` file.\n\n```\nexe = EXE(pyz,\n          a.scripts,\n\
    \          [],\n          exclude_binaries=True,\n          name='blarh',\n  \
    \        debug=False,\n          bootloader_ignore_signals=False,\n          strip=False,\n\
    \          upx=True,\n          console=False,\n          icon='hand_icon.ico')\n\
    ```\n\nIf you now re-run the build (by using the command line arguments, or running\
    \ with your modified `.spec` file) you'll see the specified icon file is now set\
    \ on your application's EXE file.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_620_0.png)\n\
    \nFigure 247. Custom application icon (a hand) on app.exe\n\nHowever, if you run\
    \ your application, you're going to be disappointed.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_620_1.png)\n\
    \nFigure 248. The custom EXE icon is not applied to the window\n\nThe specified\
    \ icon is not showing up on the window, and it will also not appear on your taskbar.\n\
    \nWhy not? Because the icon used for the window isn't determined by the icons\
    \ in the executable file, but by the application itself. To show an icon on our\
    \ window we need to modify our simple application a little bit, to add a call\
    \ to `.setWindowIcon()`.\n\n```\nfrom PyQt5 import QtWidgets, QtGui\nimport sys\n\
    \nclass MainWindow(QtWidgets.QMainWindow):\n\n    def __init__(self, *args, **kwargs):\n\
    \        super().__init__(*args, **kwargs)\n\n        self.setWindowTitle(\"Hello\
    \ World\")\n        l = QtWidgets.QLabel(\"My simple app.\")\n        l.setMargin(10)\n\
    \        self.setCentralWidget(l)\n\n        self.show()\n\nif __name__ == '__main__':\n\
    \    app = QtWidgets.QApplication(sys.argv)\n    app.setWindowIcon(QtGui.QIcon('hand_icon.ico'))\n\
    \    w = MainWindow()\n    app.exec()\n```\n\n```\nfrom PySide2 import QtWidgets,\
    \ QtGui\nimport sys\n\nclass MainWindow(QtWidgets.QMainWindow):\n\n    def __init__(self,\
    \ *args, **kwargs):\n        super().__init__(*args, **kwargs)\n\n        self.setWindowTitle(\"\
    Hello World\")\n        l = QtWidgets.QLabel(\"My simple app.\")\n        l.setMargin(10)\n\
    \        self.setCentralWidget(l)\n\n        self.show()\n\nif __name__ == '__main__':\n\
    \    app = QtWidgets.QApplication(sys.argv)\n    app.setWindowIcon(QtGui.QIcon('hand_icon.ico'))\n\
    \    w = MainWindow()\n    app.exec_()\n```\n\nHere we’ve added the `.setWindowIcon`\
    \ call to the `app` instance. This defines a **default** icon to be used for all\
    \ windows of our application. You **can** override this on a per-window basis\
    \ if you like, by calling `.setWindowIcon` on the window itself.\n\nIf you run\
    \ the above application you should now see the icon appears on the window.\n\n\
    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_622_0.png)\n\n*Figure 249. Window showing\
    \ the custom hand icon*\n\nBut, unfortunately, it may still not show on the taskbar."
  mdcn: "复杂的构建场景，例如当您需要针对不同平台，并希望有条件地定义要打包的额外库或依赖项时。\n\n一旦生成了`.spec`文件，您可以将其传递给`pyinstaller`，而不是您的脚本，以重复之前的构建过程。现在运行此命令来重新构建您的可执行文件。\n\
    \n```\npyinstaller app.spec\n```\n\n生成的构建将与用于生成`.spec`文件的构建完全相同（假设您没有进行任何更改）。对于许多**PyInstaller**配置更改，您可以选择传递命令行参数，或者修改您现有的`.spec`文件。选择哪种方式取决于您。\n\
    \n## 调整构建\n\n到目前为止，我们已经为一个非常基础的应用程序创建了简单的首次构建。现在我们将看看**PyInstaller**提供的一些最有用的选项，用于调整我们的构建。然后我们将继续研究构建更复杂的应用程序。\n\
    \n## 为您的应用命名\n\n您可以进行的最简单的更改之一是为您的应用程序提供一个合适的“名称”。默认情况下，应用程序采用源文件的名称（减去扩展名），例如`main`或`app`。这通常不是您想要的。\n\
    \n您可以通过编辑`.spec`文件，在app块下添加`name=`，为**PyInstaller**提供一个更好的名称，用于可执行文件（和`dist`文件夹）。\n\
    \n```\nexe = EXE(pyz,\n          a.scripts,\n          [],\n          exclude_binaries=True,\n\
    \          name='Hello World',\n          debug=False,\n          bootloader_ignore_signals=False,\n\
    \          strip=False,\n          upx=True,\n          console=False  # False\
    \ = do not show console.\n          )\n```\n\n或者，您可以重新运行`pyinstaller`命令，并传递`-n`或`--name`配置标志以及您的`app.py`脚本。\n\
    \n```\npyinstaller -n \"Hello World\" app.py\n# or\npyinstaller --name \"Hello\
    \ World\" app.py\n```\n\n生成的EXE文件将被命名为`Hello World.exe`，并放置在`dist\\Hello World\\\
    `文件夹中。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_615_0.png)\n\n`.spec`文件的名称取自命令行传递的名称，因此这**也**会为您创建一个新的spec文件，名为`Hello\
    \ World.spec`，位于您的根文件夹中。\n\n## 隐藏控制台窗口\n\n当您运行打包后的应用程序时，您会注意到后台运行着一个控制台窗口。如果您尝试关闭此控制台窗口，您的应用程序也会关闭。在GUI应用程序中，您几乎永远不希望出现此窗口，**PyInstaller**提供了一种简单的方法来关闭它。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_616_0.png)\n\n*图244. 应用程序在后台运行终端*\n\
    \n您可以通过以下两种方式之一来解决此问题。首先，您可以编辑之前创建的`.spec`文件，在EXE块下设置`console=False`，如下所示。\n\n\
    ```\nexe = EXE(pyz,\n          a.scripts,\n          [],\n          exclude_binaries=True,\n\
    \          name='app',\n          debug=False,\n          bootloader_ignore_signals=False,\n\
    \          strip=False,\n          upx=True,\n          console=False  # False\
    \ = do not show console.\n          )\n```\n\n或者，您可以重新运行`pyinstaller`命令，并传递`-w`、`--noconsole`或`--windowed`配置标志以及您的`app.py`脚本。\n\
    \n```\npyinstaller -w app.py\n# or\npyinstaller --windowed app.py\n# or\npyinstaller\
    \ --noconsole app.py\n```\n\n> \U0001F4A1 这些选项之间没有任何区别。\n\nINFO：重新运行`pyinstaller`将重新生成`.spec`文件。如果您对此文件进行了任何其他更改，这些更改将会丢失。\n\
    \n## 单文件构建\n\n在Windows上，**PyInstaller**能够创建单文件构建，即一个包含所有代码、库和数据文件的单一EXE文件。这可以是共享简单应用程序的便捷方式，因为您无需提供安装程序或压缩文件夹。\n\
    \n要指定单文件构建，请在命令行提供`--onefile`标志。\n\n```\npyinstaller --onefile app.py\n```\n\n\
    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_618_0.png)\n\n图245. 单文件构建的结果\n\n请注意，虽然单文件构建更易于分发，但其执行速度比正常构建的应用程序慢。这是因为每次运行应用程序时，它都必须创建一个临时文件夹来解压可执行文件的内容。这种权衡是否值得，取决于您的应用程序！\n\
    \n> 使用`--onefile`选项会对`.spec`文件进行相当多的更改。您*可以*手动进行这些更改，但在首次创建`.spec`时使用命令行开关要简单得多。\n\
    \n> 由于调试单文件应用程序要困难得多，您应该在创建单文件包之前确保一切都能正常构建。\n\n## 设置应用程序图标\n\n默认情况下，**PyInstaller**\
    \ EXE文件带有以下图标。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_618_1.png)\n\n图246.\
    \ 默认的PyInstaller应用程序图标，位于app.exe上\n\n您可能希望自定义此图标，使您的应用程序更具辨识度。这可以使用`--icon=<filename>`命令行开关轻松完成。在Windows上，图标应以`.ico`文件提供。\n\
    \n```\npyinstaller --windowed --icon=hand_icon.ico app.py\n```\n\n> [IcoFx的便携版](https://portableapps.com/apps/graphics_pictures/icofx_portable)是在Windows上创建图标的一个很好的免费工具。\n\
    \n或者，通过在您的`.spec`文件中添加`icon=`参数。\n\n```\nexe = EXE(pyz,\n          a.scripts,\n\
    \          [],\n          exclude_binaries=True,\n          name='blarh',\n  \
    \        debug=False,\n          bootloader_ignore_signals=False,\n          strip=False,\n\
    \          upx=True,\n          console=False,\n          icon='hand_icon.ico')\n\
    ```\n\n如果您现在重新运行构建（通过使用命令行参数，或使用修改后的`.spec`文件运行），您将看到指定的图标文件现在已设置在应用程序的EXE文件上。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_620_0.png)\n\n图247. 自定义应用程序图标（一只手）在app.exe上\n\
    \n但是，如果您运行您的应用程序，您将会感到失望。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_20_1.png)\n\
    \n图248. 自定义的EXE图标未应用于窗口\n\n指定的图标没有显示在窗口上，也不会出现在您的任务栏上。\n\n为什么不会？因为用于窗口的图标不是由可执行文件中的图标决定的，而是由应用程序本身决定的。要在我们的窗口上显示图标，我们需要稍微修改一下我们的简单应用程序，添加一个对`.setWindowIcon()`的调用。\n\
    \n```\nfrom PyQt5 import QtWidgets, QtGui\nimport sys\n\nclass MainWindow(QtWidgets.QMainWindow):\n\
    \n    def __init__(self, *args, **kwargs):\n        super().__init__(*args, **kwargs)\n\
    \n        self.setWindowTitle(\"Hello World\")\n        l = QtWidgets.QLabel(\"\
    My simple app.\")\n        l.setMargin(10)\n        self.setCentralWidget(l)\n\
    \n        self.show()\n\nif __name__ == '__main__':\n    app = QtWidgets.QApplication(sys.argv)\n\
    \    app.setWindowIcon(QtGui.QIcon('hand_icon.ico'))\n    w = MainWindow()\n \
    \   app.exec()\n```\n\n```\nfrom PySide2 import QtWidgets, QtGui\nimport sys\n\
    \nclass MainWindow(QtWidgets.QMainWindow):\n\n    def __init__(self, *args, **kwargs):\n\
    \        super().__init__(*args, **kwargs)\n\n        self.setWindowTitle(\"Hello\
    \ World\")\n        l = QtWidgets.QLabel(\"My simple app.\")\n        l.setMargin(10)\n\
    \        self.setCentralWidget(l)\n\n        self.show()\n\nif __name__ == '__main__':\n\
    \    app = QtWidgets.QApplication(sys.argv)\n    app.setWindowIcon(QtGui.QIcon('hand_icon.ico'))\n\
    \    w = MainWindow()\n    app.exec_()\n```\n\n这里我们向`app`实例添加了`.setWindowIcon`调用。这定义了用于我们应用程序所有窗口的**默认**图标。如果您愿意，您**可以**通过在窗口本身上调用`.setWindowIcon`来按窗口覆盖此设置。\n\
    \n如果您运行上述应用程序，您现在应该会看到图标出现在窗口上。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_622_0.png)\n\
