  md: '# # 6. Signals & Slots


    So far we''ve created a window and added a simple *push button* widget to it,
    but the button doesn''t do anything. That''s not very useful at all — when you
    create GUI applications you typically want them to do something! What we need
    is a way to connect the action of *pressing the button* to making something happen.
    In Qt, this is provided by *signals* and *slots*.


    *Signals* are notifications emitted by widgets when *something* happens. That
    something can be any number of things, from pressing a button, to the text of
    an input box changing, to the text of the window changing. Many signals are initiated
    by user action, but this is not a rule.


    In addition to notifying about something happening, signals can also send data
    to provide additional context about what happened.


    > 💡 You can also create your own custom signals, which we''ll explore later in
    [Extending Signals](Extending Signals).


    *Slots* is the name Qt uses for the receivers of signals. In Python any function
    (or method) in your application can be used as a slot — simply by connecting the
    signal to it. If the signal sends data, then the receiving function will receive
    that data too. Many Qt widgets also have their own built-in slots, meaning you
    can hook Qt widgets together directly.


    Let''s take a look at the basics of Qt signals and how you can use them to hook
    widgets up to make things happen in your apps.


    > 💡 Load up a fresh copy of `myapp.py` and save it under a new name for this section.


    # ## QPushButton Signals


    Our simple application currently has a `QMainWindow` with a `QPushButton` set
    as the'
