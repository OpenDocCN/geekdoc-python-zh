    utf8\")\n        stdout = bytes(p.readAllStandardOutput()).decode(\"utf8\")\n\
    \        output = stderr + stdout\n\n        parser = self._parsers.get(job_id)\n\
    \n        if parser.progress:\n            progress = parser.progress(output)\n\
