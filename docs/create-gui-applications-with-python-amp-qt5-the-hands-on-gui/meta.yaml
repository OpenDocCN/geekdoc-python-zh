  md: '# # 30. Creating Custom Widgets


    In the previous chapter we introduced `QPainter` and looked at some basic bitmap
    drawing operations which you can used to draw dots, lines, rectangles and circles
    on a `QPainter` *surface* such as a `QPixmap`. This process of *drawing on a surface*
    with `QPainter` is in fact the basis by which all widgets in Qt are drawn. Now
    you know how to use `QPainter` you know how to draw your own custom widgets! In
    this chapter we''ll take what we''ve learnt so far and use it to construct a completely
    new *custom* widget. For a working example we''ll be building the following widget
    -- a customizable PowerBar meter with a dial control.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_433_0.png)


