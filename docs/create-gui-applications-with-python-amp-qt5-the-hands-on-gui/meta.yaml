- md: "from PySide2.QtWidgets import (\n    QApplication, QWidget, QLineEdit, QPushButton,\
    \ QHBoxLayout\n)\n\nimport sys\n\napp = QApplication(argc, argv);\nwindow = QWidget()\n\
    lineEdit = QLineEdit();\nbutton = QPushButton(\"Clear\");\nlayout = QHBoxLayout();\n\
    layout->addWidget(lineEdit);\nlayout->addWidget(button);\n\nQObject::connect(&button,\
    \   &QPushButton::pressed,\n                  &lineEdit, &QLineEdit::clear);\n\
    \nwindow.setLayout(layout);\nwindow.setWindowTitle(\"Why?\");\nwindow.show();\n\
    app.exec();\n\n## Signals\n\nSignals are key to making the example work, and unfortunately\
    \ the C++ syntax for Qt signals is a little tricky. The example signal we're working\
    \ with is shown below.\n\n```\nQObject::connect(&button,   &QPushButton::pressed,\n\
    \                  &lineEdit, &QLineEdit::clear);\n```\n\nIf you're not familiar\
