    # # Plot controls


    Plots from Matplotlib displayed in PySide2 are actually rendered as simple (bitmap)
    images by the *Agg* backend. The `FigureCanvasQTAgg` class wraps this backend
    and displays the resulting image on a Qt widget. The effect of this architecture
    is that Qt is unaware of the positions of lines and other plot elements — only
    the x, y coordinates of any clicks and mouse movements over the widget.


    However, support for handling Qt mouse events and transforming them into interactions
    on the plot is built into Matplotlib. This can be controlled through a custom
    toolbar which can be added to your applications alongside the plot. In this section
    we''ll look at adding these controls so we can zoom, pan and get data from embedded
    Matplotlib plots.


    The complete code, importing the toolbar widget `NavigationToolbar2QT` and adding
    it to the interface within a `QVBoxLayout`, is shown below —


