  - "[PAGE 658]\n\nAny decent web browser also needs an URL bar, and some way to stop\
    \ the navigation — either when it's by mistake, or the page is taking too long.\n\
    \nListing 216. app/browser.py\n\n```\nself.httpsicon = QLabel()  # Yes, really!\n\
    self.httpsicon.setPixmap(QPixmap(os.path.join(\"icons\", \"lock-nossl.png\")))\n\
    navtb.addWidget(self.httpsicon)\n\nself.urlbar = QLineEdit()\nself.urlbar.returnPressed.connect(self.navigate_to_url)\n\
    navtb.addWidget(self.urlbar)\n\nstop_btn = QAction(\n    QIcon(os.path.join(\"\
    icons\", \"cross-circle.png\")), \"Stop\",\n    self\n)\nstop_btn.setStatusTip(\"\
    Stop loading current page\")\nstop_btn.triggered.connect(self.browser.stop)\n\
    navtb.addAction(stop_btn)\n```\n\nAs before the 'stop' functionality is available\
    \ on the `QWebEngineView`, and we can simply connect the `.triggered` signal from\
    \ the stop button to the existing slot. However, other features of the URL bar\
    \ we must handle independently.\n\nFirst we add a `QLabel` to hold our SSL or\
    \ non-SSL icon to indicate whether the page is secure. Next, we add the URL bar\
    \ which is simply a `QLineEdit`. To trigger the loading of the URL in the bar\
    \ when entered (return key pressed) we connect to the `.returnPressed` signal\
    \ on the widget to drive a custom slot function to trigger navigation to the specified\
    \ URL."
- md: "## File operations\n\nA standard File menu with `self.menuBar().addMenu(\"\
    &File\")` is created assigning the F key as a Alt-shortcut (as normal). Once we\
    \ have the menu object, we can assign `QAction` objects to create the entries.\
    \ We create two basic entries here, for opening and saving HTML files (from a\
    \ local disk). These both require custom slot functions.\n\nListing 221. app/browser.py\n\
    \n```\nfile_menu = self.menuBar().addMenu(\"&File\")\n\nopen_file_action = QAction(\n\
    \    QIcon(os.path.join(\"icons\", \"disk--arrow.png\")), \"Open file...\", self\n\
    )\nopen_file_action.setStatusTip(\"Open from file\")\nopen_file_action.triggered.connect(self.open_file)\n\
    file_menu.addAction(open_file_action)\n\nsave_file_action = QAction(\n    QIcon(os.path.join(\"\
    icons\", \"disk--pencil.png\")), \"Save Page As...\", self\n)\nsave_file_action.setStatusTip(\"\
    Save current page to file\")\nsave_file_action.triggered.connect(self.save_file)\n\
    file_menu.addAction(save_file_action)\n```\n\nThe slot function for opening a\
    \ file uses the built-in `QFileDialog.getOpenFileName()` function to create a\
    \ file-open dialog and get a name. We restrict the names by default to files matching\
    \ `*.htm` or `*.html`.\n\nWe read the file into a variable `html` using standard\
    \ Python functions, then use `.setHtml()` to load the HTML into the browser.\n\
    \nListing 222. app/browser.py\n\n```\ndef open_file(self):\n    filename, _ =\
    \ QFileDialog.getOpenFileName(\n        self,\n        \"Open file\",\n      \
    \  \"\",\n        \"Hypertext Markup Language (*.htm *.html);; \" \"All files\
    \ (*.*)\",\n    )\n\n    if filename:\n        with open(filename, \"r\") as f:\n\
    \            html = f.read()\n\n        self.browser.setHtml(html)\n        self.urlbar.setText(filename)\n\
    ```\n\nSimilarly to save the HTML from the current page, we use the built-in `QFileDialog.getSaveFileName()`\
    \ to get a filename. However, this time we get the HTML using `self.browser.page().toHtml()`.\n\
    \nThis is an *asynchronous* method, meaning that we do not receive the HTML immediately.\
    \ Instead we must pass in a *callback* method which will receive the HTML once\
    \ it is prepared. Here we create a simple `writer` function that handles it for\
    \ us, using the filename from the local scope.\n\nListing 223. app/browser.py\n\
    \n```\ndef save_file(self):\n    filename, _ = QFileDialog.getSaveFileName(\n\
    \        self,\n        \"Save Page As\",\n        \"\",\n        \"Hypertext\
    \ Markup Language (*.htm *.html);;\" \"All files (*.*)\"\n    )\n\n    if filename:\n\
    \        # Define callback method to handle the write.\n        def writer(html):\n\
    \            with open(filename, \"w\") as f:\n                f.write(html)\n\
    \n        self.browser.page().toHtml(writer)\n```\n\n## Printing\n\nWe can add\
    \ a print option to the File menu using the same approach we used earlier. Again\
    \ this needs a custom slot function to perform the print action.\n\nListing 224.\
    \ app/browser.py\n\n```\nprint_action = QAction(\n    QIcon(os.path.join(\"icons\"\
    , \"printer.png\")), \"Print...\",\n    self\n)\nprint_action.setStatusTip(\"\
    Print current page\")\nprint_action.triggered.connect(self.print_page)\nfile_menu.addAction(print_action)\n\
    \n# Create our system printer instance.\nself.printer = QPrinter()\n```\n\nQt\
    \ provides a complete print framework which is based around QPrinter objects,\
    \ on which you *paint* the pages to be printed. To start the process we open a\
    \ QPrintDialog for the user. This allows them to choose the target printer and\
    \ configure the print.\n\nWe created the QPrinter object in our `__init__` and\
    \ stored it as `self.printer`. In our print handler method we pass this printer\
    \ to the `QPrintDialog` so it can be configured. If the dialog is accepted we\
    \ pass the (now configured) printer object to `self.browser.page().print` to trigger\
    \ the print.\n\nListing 225. app/browser.py\n\n```\ndef print_page(self):\n  \
    \  page = self.browser.page()\n\n    def callback(*args):\n        pass\n\n  \
    \  dlg = QPrintDialog(self.printer)\n    dlg.accepted.connect(callback)\n    if\
    \ dlg.exec_() == QDialog.Accepted:\n        page.print(self.printer, callback)\n\
    ```\n\nNotice that `.print` also accepts a second parameter — a callback function\
    \ which receives the result of the print. This allows you to show a notification\
    \ that the print has completed, but here we're just swallowing the callback silently.\n\
    \n## Help\n\nFinally, to complete the standard interface we can add a Help menu.\
    \ This is defined as before, with two custom slot functions to handle the display\
    \ of an About dialog, and to load the 'browser page' with more information.\n\n\
    Listing 226. app/browser.py\n\n```\nhelp_menu = self.menuBar().addMenu(\"&Help\"\
    )\n\nabout_action = QAction(\n    QIcon(os.path.join(\"icons\", \"question.png\"\
    )),\n    \"About Mozzarella Ashbadger\",\n    self,\n)\nabout_action.setStatusTip(\"\
    Find out more about Mozzarella Ashbadger\")  # Hungry!\nabout_action.triggered.connect(self.about)\n\
    help_menu.addAction(about_action)\n\nnavigate_mozzarella_action = QAction(\n \
    \   QIcon(os.path.join(\"icons\", \"lifebuoy.png\")),\n    \"Mozzarella Ashbadger\
    \ Homepage\",\n    self,\n)\nnavigate_mozzarella_action.setStatusTip(\"Go to Mozzarella\
    \ Ashbadger Homepage\")\nnavigate_mozzarella_action.triggered.connect(self.navigate_mozzarella)\n\
    help_menu.addAction(navigate_mozzarella_action)\n```\n\nWe define two methods\
    \ to be used as slots for the Help menu signals. The first `navigate_mozzarella`\
    \ opens up a page with more information on the browser (or in this case, this\
    \ book). The second creates and executes a custom `QDialog` class `AboutDialog`\
    \ which we will define next.\n\nListing 227. app/browser.py\n\n```\ndef navigate_mozzarella(self):\n\
    \    self.browser.setUrl(QUrl(\"https://www.pythonguis.com/\"))\n\ndef about(self):\n\
    \    dlg = AboutDialog()\n    dlg.exec_()\n```\n\nThe definition for the about\
    \ dialog is given below. The structure follows that seen earlier in the book,\
    \ with a `QDialogButtonBox` and associated signals to handle user input, and a\
    \ series of `QLabel`s to display the application information and a logo.\n\nThe\
    \ only trick here is adding all the elements to the layout, then iterate over\
    \ them to set the alignment to the center in a single loop. This saves duplication\
    \ for the individual sections."
  mdcn: "## 文件操作\n\n使用 `self.menuBar().addMenu(\"&File\")` 创建一个标准的“文件”菜单，并将 F 键设为\
    \ Alt 快捷键（这是常规做法）。获得菜单对象后，我们就可以分配 `QAction` 对象来创建菜单项。这里我们创建了两个基本菜单项，用于打开和保存 HTML\
    \ 文件（来自本地磁盘）。这两个操作都需要自定义的槽函数。\n\n清单 221. app/browser.py\n\n```\nfile_menu = self.menuBar().addMenu(\"\
    &File\")\n\nopen_file_action = QAction(\n    QIcon(os.path.join(\"icons\", \"\
    disk--arrow.png\")), \"Open file...\", self\n)\nopen_file_action.setStatusTip(\"\
    Open from file\")\nopen_file_action.triggered.connect(self.open_file)\nfile_menu.addAction(open_file_action)\n\
    \nsave_file_action = QAction(\n    QIcon(os.path.join(\"icons\", \"disk--pencil.png\"\
    )), \"Save Page As...\", self\n)\nsave_file_action.setStatusTip(\"Save current\
    \ page to file\")\nsave_file_action.triggered.connect(self.save_file)\nfile_menu.addAction(save_file_action)\n\
    ```\n\n打开文件的槽函数使用内置的 `QFileDialog.getOpenFileName()` 函数来创建文件打开对话框并获取文件名。我们默认将文件名限制为匹配\
    \ `*.htm` 或 `*.html` 的文件。\n\n我们使用标准的 Python 函数将文件读入变量 `html`，然后使用 `.setHtml()`\
    \ 将 HTML 加载到浏览器中。\n\n清单 222. app/browser.py\n\n```\ndef open_file(self):\n   \
    \ filename, _ = QFileDialog.getOpenFileName(\n        self,\n        \"Open file\"\
    ,\n        \"\",\n        \"Hypertext Markup Language (*.htm *.html);; \" \"All\
    \ files (*.*)\",\n    )\n\n    if filename:\n        with open(filename, \"r\"\
    ) as f:\n            html = f.read()\n\n        self.browser.setHtml(html)\n \
    \       self.urlbar.setText(filename)\n```\n\n类似地，要保存当前页面的 HTML，我们使用内置的 `QFileDialog.getSaveFileName()`\
    \ 来获取文件名。不过，这次我们使用 `self.browser.page().toHtml()` 来获取 HTML。\n\n这是一个*异步*方法，意味着我们不会立即收到\
    \ HTML。相反，我们必须传入一个*回调*方法，该方法将在 HTML 准备好后接收它。这里我们创建了一个简单的 `writer` 函数来处理它，使用了本地作用域中的文件名。\n\
    \n清单 223. app/browser.py\n\n```\ndef save_file(self):\n    filename, _ = QFileDialog.getSaveFileName(\n\
    \        self,\n        \"Save Page As\",\n        \"\",\n        \"Hypertext\
    \ Markup Language (*.htm *.html);;\" \"All files (*.*)\"\n    )\n\n    if filename:\n\
    \        # Define callback method to handle the write.\n        def writer(html):\n\
    \            with open(filename, \"w\") as f:\n                f.write(html)\n\
    \n        self.browser.page().toHtml(writer)\n```\n\n## 打印\n\n我们可以使用与之前相同的方法在“文件”菜单中添加打印选项。同样，这需要一个自定义的槽函数来执行打印操作。\n\
    \n清单 224. app/browser.py\n\n```\nprint_action = QAction(\n    QIcon(os.path.join(\"\
    icons\", \"printer.png\")), \"Print...\",\n    self\n)\nprint_action.setStatusTip(\"\
    Print current page\")\nprint_action.triggered.connect(self.print_page)\nfile_menu.addAction(print_action)\n\
    \n# Create our system printer instance.\nself.printer = QPrinter()\n```\n\nQt\
    \ 提供了一个完整的打印框架，该框架围绕 QPrinter 对象构建，你可以在其上*绘制*要打印的页面。要启动该过程，我们为用户打开一个 QPrintDialog。这允许他们选择目标打印机并配置打印设置。\n\
    \n我们在 `__init__` 中创建了 QPrinter 对象，并将其存储为 `self.printer`。在我们的打印处理方法中，我们将此打印机传递给\
    \ `QPrintDialog` 以便进行配置。如果对话框被接受，我们将（已配置的）打印机对象传递给 `self.browser.page().print`\
    \ 以触发打印。\n\n清单 225. app/browser.py\n\n```\ndef print_page(self):\n    page = self.browser.page()\n\
    \n    def callback(*args):\n        pass\n\n    dlg = QPrintDialog(self.printer)\n\
    \    dlg.accepted.connect(callback)\n    if dlg.exec_() == QDialog.Accepted:\n\
    \        page.print(self.printer, callback)\n```\n\n请注意，`.print` 还接受第二个参数——一个接收打印结果的回调函数。这允许你显示打印已完成的通知，但这里我们只是静默地忽略了回调。\n\
    \n## 帮助\n\n最后，为了完成标准界面，我们可以添加一个“帮助”菜单。它的定义方式与之前相同，包含两个自定义槽函数，用于处理“关于”对话框的显示，以及加载包含更多信息的“浏览器页面”。\n\
    \n清单 226. app/browser.py\n\n```\nhelp_menu = self.menuBar().addMenu(\"&Help\"\
    )\n\nabout_action = QAction(\n    QIcon(os.path.join(\"icons\", \"question.png\"\
    )),\n    \"About Mozzarella Ashbadger\",\n    self,\n)\nabout_action.setStatusTip(\"\
    Find out more about Mozzarella Ashbadger\")  # Hungry!\nabout_action.triggered.connect(self.about)\n\
    help_menu.addAction(about_action)\n\nnavigate_mozzarella_action = QAction(\n \
    \   QIcon(os.path.join(\"icons\", \"lifebuoy.png\")),\n    \"Mozzarella Ashbadger\
    \ Homepage\",\n    self,\n)\nnavigate_mozzarella_action.setStatusTip(\"Go to Mozzarella\
    \ Ashbadger Homepage\")\nnavigate_mozzarella_action.triggered.connect(self.navigate_mozzarella)\n\
    help_menu.addAction(navigate_mozzarella_action)\n```\n\n我们定义了两个方法，用作“帮助”菜单信号的槽。第一个\
    \ `navigate_mozzarella` 打开一个包含更多关于浏览器信息的页面（或者在本例中，是关于本书的信息）。第二个创建并执行一个自定义的 `QDialog`\
    \ 类 `AboutDialog`，我们将在接下来定义它。\n\n清单 227. app/browser.py\n\n```\ndef navigate_mozzarella(self):\n\
    \    self.browser.setUrl(QUrl(\"https://www.pythonguis.com/\"))\n\ndef about(self):\n\
    \    dlg = AboutDialog()\n    dlg.exec_()\n```\n\n“关于”对话框的定义如下。其结构遵循本书前面所见的模式，包含一个\
    \ `QDialogButtonBox` 及其关联信号来处理用户输入，以及一系列 `QLabel` 来显示应用程序信息和一个标志。\n\n这里唯一的技巧是将所有元素添加到布局中，然后在一个循环中遍历它们以将对齐方式设置为居中。这节省了为各个部分单独设置的重复工作。"
