    # # paintEvent


    The `paintEvent` handler is the core of all widget drawing in PySide2. Every complete
    and partial re-draw of a widget is triggered through a `paintEvent` which the
    widget handles to draw itself. A `paintEvent` can be triggered by —


    +   - `repaint()` or `update()` was called

    - the widget was obscured and has now been uncovered

    - the widget has been resized


    — but it can also occur for many other reasons. What is important is that when
    a `paintEvent` is triggered your widget is able to redraw it.


    If a widget is simple enough (like ours is) you can often get away with simply
    redrawing the entire thing any time *anything* happens. But for more complicated'
