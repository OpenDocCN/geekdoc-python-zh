    If you can''t find an icon you need in this standard set, you will need to use
    one of the other approaches outlined below.


    > While you *can* mix and match icons from different icon sets together, it''s
    better to use a single style throughout to keep your app feeling coherent.


    # Icon files


    If the standard icons aren''t what you are looking for, or you need icons not
    available, you can use any custom icons you like. Icons can be any of the Qt supported
    image types on your platform, although for most use cases PNG or SVG images are
    preferable.


    > To get list of supported image formats on your own platform you can call `QtGui.QImageReader.supportedImageFormats()`.


    # Icon sets


    If you''re not a graphic designer you will save yourself a lot of time (and trouble)
    by using one of the many available icon sets. There are thousands of these available
    online, with varying licenses depending on their use in open source or commercial
    software.


    In this book and example apps I''ve used the [Fugue](https://p.yusukekamiyamane.com/)
    icon set, which is also free to use in your software with acknowledgement of the
    author. The Tango icon set is a large icon set developed for use on Linux, however
    there are no licensing requirements and it can be used on any platform.'
