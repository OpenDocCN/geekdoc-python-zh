    # Loading UIs from the Resource file (PyQt5 only)


    The last change required is in the loading of the UI file. In PyQt5 the `.loadUi`
    handler does not understand resource paths, and so we cannot load our `mainwindow.ui`
    file directly with it. Instead we need to load the file manually, and pass the
    result into `.loadUi` ourselves. The code to do that is shown below.


    ```

    # Load the UI

    fileh = QtCore.QFile('':/ui/mainwindow.ui'')

    fileh.open(QtCore.QFile.ReadOnly)

    uic.loadUi(fileh, self)

    fileh.close()

    ```


    You may want to wrap this in a function if you''re using it a lot. The PySide2
    handler understands resource paths natively, so we don''t need this workaround.'
