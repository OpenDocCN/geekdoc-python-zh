  md: '# Introduction


    If you want to create GUI applications with Python it can be tricky to know where
    to start. There are a lot of new concepts you need to understand to get *anything*
    to work. But, like any coding problem, the first step is learning to approach
    the problem in the right way. In this book I take you right from the basic principles
    of GUI development to creating your own, fully functional, desktop apps with PySide2.


    The first edition of this book was released in 2016. Since then it has been updated
    4 times, adding and expanding chapters in response to reader feedback. There are
    more PySide resources available now than when I started, but there is still a
    shortage of in-depth, practical guides to building complete apps. This book fills
    that gap!


    The book is formatted as a series of chapters exploring different aspects of PySide2
    in turn. They are arranged to put the simpler chapters toward the beginning, but
    if you have specific requirements for your project, don''t be afraid to jump around!
    Each chapter will guide you through learning the fundamental concepts before taking
    you through a series of coding examples to gradually explore and learn how to
    apply the ideas yourself.


    You can download source code and resources for all examples in this book from
    http://www.pythonguis.com/d/pyside2-source.zip


    It is not possible to give you a *complete* overview of the Qt system in a book
    of this size, so there are links to external resources—both on the pythonguis.com
    website and elsewhere. If you find yourself thinking "I wonder if I can do *that*?"
    the best thing you can do is put this book down, then *go and find out!* Just
    keep regular backups of your code along the way so you always have something to
    come back to if you royally mess it up.'
  merge: -1
  pgno: 4
- img_proc: true
  md: '> Throughout this book there are boxes like this, giving info, tips and warnings.
    All of them can be safely skipped over if you are in a hurry, but reading them
    will give you a deeper and more rounded knowledge of the Qt framework.


    Finally, this book is written to be compatible with Python 3.4+. Python 3 is the
    future of the language and if you’re starting out now is where you should be focusing
    your efforts. However, many of the examples can be changed with minimal effort
    to work with Python 2.7.


    This book is written to be compatible with Python 3.6+.'
  merge: -1
