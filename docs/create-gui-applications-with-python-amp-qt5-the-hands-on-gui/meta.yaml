    > If you have more complex requirements you can also pass in any QPainterPath
    object, allowing you to draw completely custom marker shapes.


    # Plot Titles


    Chart titles are important to provide context to what is shown on a given chart.
    In PyQtGraph you can add a main plot title using the `setTitle()` method on the
    `PlotWidget`, passing in your title string.


    ```

    self.graphWidget.setTitle("Your Title Here")

    ```


    You can apply text styles, including colors, font sizes and weights to your titles
    (and any other labels in PyQtGraph) by passing additional arguments. The available
    syle arguments are shown below.


    | Style | Type |

    |---|---|

    | color | (str) e.g. ''CCFF00'' |

    | size | (str) e.g. ''8pt'' |

    | bold | (bool) True or False |

    | italic | (bool) True or False |


    The code below sets the color to blue with a font size of 30pt.


    ```

    self.graphWidget.setTitle("Your Title Here", color="b", size="30pt")

    ```


    You can also style your headers with HTML tag syntax if you prefer, although it''s
    less readable.


    ```

    self.graphWidget.setTitle("<span style="color:blue;font-size:30pt">Your Title
    Here</span>")

    ```'
