    Where your own software sits on this scale is of course up to you. The important
    thing is to be aware of existing interfaces and to exploit them where you can
    to improve usability of your own apps. Your users will thank you for it!


    # ✔ DO


    +   - Take inspiration from existing interfaces when designing your own.

    - Include skeuomorphic elements where they *help* your users.'
