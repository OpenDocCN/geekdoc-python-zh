    \ user-interface of your application\n- Every application needs at least one (...but\
    \ can have more)\n- Application will (by default) exit when last window is closed\n\
    \nFinally, we call `app.exec_()` to start up the event loop.\n\n## What’s the\
    \ event loop?\n\nBefore getting the window on the screen, there are a few key\
    \ concepts to introduce about how applications are organised in the Qt world.\
    \ If you’re already familiar with event loops you can safely skip to the next\
    \ section.\n\nThe core of every Qt Applications is the `QApplication` class. Every\
    \ application needs one — and only one — `QApplication` object to function. This\
    \ object holds the **event loop** of your application — the core loop which governs\
    \ all user interaction with the GUI.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_17_0.png)\n\
    \nEach interaction with your application — whether a press of a key, click of\
    \ a mouse, or mouse movement — generates an *event* which is placed on the *event\
    \ queue*. In the event loop, the queue is checked on each iteration and if a waiting\
    \ event is found, the event and control is passed to the specific *event handler*\
    \ for the event. The event handler deals with the event, then passes control back\
    \ to the event loop to wait for more events. There is only **one** running event\
    \ loop per application.\n\nThe QApplication class\n\n- QApplication holds the\
    \ Qt event loop\n- One QApplication instance required\n- Your application sits\
    \ waiting in the event loop until an action is taken\n- There is only **one**\
    \ event loop at any time\n\nThe underscore is there because `exec` was a reserved\
    \ word in Python 2.7. PySide2 handles this by appending an underscore to the name\
    \ used in the C++ library. You'll also see `.print_()` methods on widgets for\
    \ example.\n\n## QMainWindow\n\nAs we discovered in the last part, in Qt *any*\
    \ widgets can be windows. For example, if you replace `QWidget` with `QPushButton`.\
    \ In the example below, you would get a window with a single push-able button\
    \ in it.\n\nListing 2. basic/creating_a_window_2.py\n\n```python\ninclude::{codedir}/creating_a_window_2.py\n\
    ```\n\nThis is neat, but not really very *useful* — it's rare that you need a\
    \ UI that consists of only a single control! But, as we'll discover later, the\
    \ ability to nest widgets within other widgets using *layouts* means you can construct\
    \ complex UIs inside an empty `QWidget`.\n\nBut, Qt already has a solution for\
    \ you — the `QMainWindow`. This is a pre-made widget which provides a lot of standard\
    \ window features you'll make use of in your apps, including toolbars, menus,\
    \ a statusbar, dockable widgets and more. We'll look at these advanced features\
    \ later, but for now, we'll add a simple empty `QMainWindow` to our application.\n\
    \nListing 3. basic/creating_a_window_3.py\n\n```python\nfrom PySide2.QtWidgets\
    \ import QApplication, QMainWindow\n\nimport sys\n\napp = QApplication(sys.argv)\n\
    \nwindow = QMainWindow()\nwindow.show()  # IMPORTANT!!!!! Windows are hidden by\
    \ default.\n\n# Start the event loop.\napp.exec_()\n```\n\n> \U0001F680 Run it!\
    \ You will now see your main window. It looks exactly the same as before!\n\n\
    So our `QMainWindow` isn't very interesting at the moment. We can fix that by\
    \ adding some content. If you want to create a custom window, the best approach\
    \ is to subclass `QMainWindow` and then include the setup for the window in the\
    \ `__init__` block. This allows the window behavior to be self contained. We can\
    \ add our own subclass of `QMainWindow` — call it `MainWindow` to keep things\
    \ simple.\n\nListing 4. basic/creating_a_window_4.py\n\n```python\nimport sys\n\
    \nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtWidgets import QApplication,\
    \ QMainWindow, QPushButton\n\n# Subclass QMainWindow to customize your application's\
    \ main window\nclass MainWindow(QMainWindow):\n    def __init__(self):\n     \
