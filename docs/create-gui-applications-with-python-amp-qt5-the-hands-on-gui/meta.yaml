    # Position Tiles


    As previously described, we''ve structured the game so that individual tile positions
    hold their own state information. This means that `Pos` objects are ideally positioned
    to handle game logic which reacts to to interactions that relate to their own
    state —in other words, this is where the magic is.


    Since the `Pos` class is relatively complex, it is broken down here in to main
    themes, which are discussed in turn. The initial setup `__init__` block is simple,
    accepting an `x` and `y` position and storing it on the object. `Pos` positions
    never change once created.


    To complete setup the `.reset()` function is called which resets all object attributes
    back to default, zero values. This flags the mine as *not the start position,
    not a mine, not revealed* and *not flagged*. We also reset the adjacent count.'
