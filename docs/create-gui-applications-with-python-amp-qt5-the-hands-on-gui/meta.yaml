    \ function, customizing your markers, line widths, colors and other parameters.\n\
    \n## Clearing the plot\n\nFinally, sometimes you might want to clear and refresh\
    \ the plot periodically. You can easily do that by calling `.clear()`.\n\n```python\n\
    self.graphWidget.clear()\n```\n\nThis will remove the lines from the plot but\
    \ keep all other attributes the same.\n\n## Updating the plot\n\nWhile you *can*\
    \ simply clear the plot and redraw all your elements again, this means Qt has\
