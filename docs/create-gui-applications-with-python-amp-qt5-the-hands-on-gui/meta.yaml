- md: "## 24. Extending Signals\n\nWe've seen a basic introduction to signals already,\
    \ but that only scratches the surface of what you can do with them. In this chapter\
    \ we'll look at how you can create your own signals and customize the data sent\
    \ with them.\n\n### Custom Signals\n\nSo far we've only looked at signals that\
    \ Qt itself provides on the built-in widgets. However, you can also make use of\
    \ signals in your own code. This is a great way to *decouple* modular parts of\
    \ your application — parts of your app can respond to things happening elsewhere,\
    \ without needing to know anything about the structure of your app.\n\n> A good\
    \ indication that you need to *decouple* is use of `.parent()` to access data\
    \ on other unrelated widgets.\n\nBy putting these updates in the event queue you\
    \ also help to keep your app responsive — rather than having one big *update*\
    \ method, you can split the work up into multiple slots and trigger them with\
    \ a single signal.\n\nYou can define your own signals using the `Signal` method\
    \ provided by PySide2. Signals are defined as *class attributes* passing in the\
    \ Python type (or types) that will be emitted with the signal. You can choose\
    \ any valid Python variable name for the name of the signal, and any Python type\
    \ for the signal type.\n\nListing 113. further/signals_custom.py\n\n```python\n\
    import sys\n\nfrom PySide2.QtCore import Signal\nfrom PySide2.QtWidgets import\
    \ QApplication, QMainWindow\n\nclass MainWindow(QMainWindow):\n\n    message =\
    \ Signal(str) ①\n    value = Signal(int, str, int) ②\n    another = Signal(list)\
    \ ③\n    onemore = Signal(dict) ④\n    anything = Signal(object) ⑤\n\n    def\
    \ __init__(self):\n        super().__init__()\n\n        self.message.connect(self.custom_slot)\n\
    \        self.value.connect(self.custom_slot)\n        self.another.connect(self.custom_slot)\n\
    \        self.onemore.connect(self.custom_slot)\n        self.anything.connect(self.custom_slot)\n\
    \n        self.message.emit(\"my message\")\n        self.value.emit(23, \"abc\"\
    , 1)\n        self.another.emit([1, 2, 3, 4, 5])\n        self.onemore.emit({\"\
    a\": 2, \"b\": 7})\n        self.anything.emit(1223)\n\n    def custom_slot(self,\
    \ *args):\n        print(args)\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\n\
    window.show()\n\napp.exec_()\n```\n\n- ① Signal emitting a string.\n- ② Signal\
    \ emitting 3 different types.\n- ③ Signal emitting a list.\n- ④ Signal emitting\
    \ a dictionary.\n- ⑤ Signal emitting *anything*.\n\nAs you can see the signals\
    \ can be connected and emitted as normal. You can send any Python type, including\
    \ multiple types, and compound types (e.g. dictionaries, lists).\n\nIf you define\
    \ your signal as `Signal(object)` it will be able to transmit absolutely any Python\
    \ type at all. But this isn't *usually* a good idea as receiving slots will then\
    \ need to deal with all types.\n\n> You can create signals on any class that is\
    \ a subclass of `QObject`. That includes all widgets, including the main window\
    \ and dialog boxes.\n\n### Forwarding Signals\n\nEach signal object has an `.emit`\
    \ method which triggers the sending of data. Like any other method this can be\
    \ used as a *slot* target for a signal. This allows you to *chain* signals, so\
    \ one being triggered can trigger another. Unless you modify the data (see the\
    \ next section) the chained signal must carry the same data as the original signal.\n\
    \nListing 114. further/signals_forward.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore\
    \ import Signal\nfrom PySide2.QtWidgets import QApplication, QLineEdit, QMainWindow\n\
    \nclass MainWindow(QMainWindow):\n    message = Signal(str)\n\n    def __init__(self):\n\
    \        super().__init__()\n\n        self.message.connect(self.my_custom_fn)\n\
    \n        le = QLineEdit(\"Enter some text\")\n        le.textChanged.connect(self.message.emit)\
    \ ①\n\n        self.setCentralWidget(le)\n\n    def my_custom_fn(self, s):\n \
    \       print(s)\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\nwindow.show()\n\
    app.exec_()\n```\n\n① By connecting the signal to the `.emit` of another, we can\
    \ forward the signal to the receiving signals listeners.\n\nIf it's not immediately\
    \ obvious why this would be useful, don't worry — it usually isn't! But it can\
    \ help to maintain isolation between components, particularly where the receiving\
    \ slot you are targeting is a private method. By hooking into the public signals\
    \ you can have the intended effect while keeping your components properly decoupled.\n\
    \n### Modifying Signal Data\n\n*Signals* are connected to *slots* which are functions\
    \ (or methods) which will be run every time the signal fires. Many signals also\
    \ transmit data, providing information about the state change or widget that fired\
    \ them. The receiving slot can use this data to perform different actions in response\
    \ to the same signal.\n\nHowever, there is a limitation — the signal can only\
    \ emit the data it was designed to. Take for example, the `QPushButton.clicked`\
    \ signal which fires when the button is clicked. The *clicked* signal emits a\
    \ single piece of data — the *checked* state of the button after being clicked.\n\
    \n> \U0001F4A1 For non-checkable buttons, this will always be `False`.\n\nThe\
    \ slot receives this data, but nothing more. It does not know *which* widget triggered\
    \ it, or anything about it. This is usually fine. You can tie a particular widget\
    \ to a unique function which does precisely what that widget requires. Sometimes\
    \ however you want to add additional data so your slot methods can be a little\
    \ smarter. There's a neat trick to do just that.\n\nThe additional data you send\
    \ could be the triggered widget itself, or some associated metadata which your\
    \ slot needs to perform the intended result of the signal.\n\n### Intercepting\
    \ the signal\n\nInstead of connecting the signal directly to the target slot function,\
    \ you use an intermediate function to intercept the signal, modify the signal\
    \ data and forward that on to your target slot. If you define the intermediate\
    \ function in a context that has access to the widget that emitted the signal,\
    \ you can pass that with the signal too.\n\nThis slot function must accept the\
    \ value sent by the signal (here the `checked` state) and then call the *real*\
    \ slot, passing any additional data with the arguments.\n\nWidgets are mapped\
    \ to columns.\nPerform the select to populate the model.\nStep the mapper forward\
    \ to the first record.\n\nIf you run this example, you'll see the following window.\
    \ The `self.mapper.toFirst()` call selects the first record in the table and this\
    \ is then displayed in the mapped widgets.\n\n![Figure 165. Viewing a record via\
    \ mapped widgets.](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_351_0.png)\n\nWe currently\
    \ can't change which record we are viewing or save any changes we make to records.\
    \ To make this possible we can add 3 buttons—one each for browse *previous* and\
    \ *next* through the records, and *save* to commit changes to the database. To\
    \ do this we can hook up some `QPushButton` widgets to the *mapper* slots `.toPrevious`,\
    \ `.toNext` and `.submit`.\n\nUpdate the end of the `__init__` method to add the\
    \ following, adding the widgets into the existing layout.\n\nListing 111. databases/widget_mapper_controls.py\n\
    \n```python\nself.setMinimumSize(QSize(400, 400))\n\ncontrols = QHBoxLayout()\n\
    \nprev_rec = QPushButton(\"Previous\")\nprev_rec.clicked.connect(self.mapper.toPrevious)\n\
    \nnext_rec = QPushButton(\"Next\")\nnext_rec.clicked.connect(self.mapper.toNext)\n\
    \nsave_rec = QPushButton(\"Save Changes\")\nsave_rec.clicked.connect(self.mapper.submit)\n\
    \ncontrols.addWidget(prev_rec)\ncontrols.addWidget(next_rec)\ncontrols.addWidget(save_rec)\n\
    \nlayout.addLayout(form)\nlayout.addLayout(controls)\n\nwidget = QWidget()\nwidget.setLayout(layout)\n\
    self.setCentralWidget(widget)\n```\n\nYou will also need to update the imports\
    \ at the top of the file to import QPushButton and QHBoxLayout.\n\nListing 112.\
    \ databases/widget_mapper_controls.py\n\n```python\nfrom PySide2.QtWidgets import\
    \ (\n    QApplication,\n    QComboBox,\n    QDataWidgetMapper,\n    QDoubleSpinBox,\n\
    \    QFormLayout,\n    QHBoxLayout,\n    QLabel,\n    QLineEdit,\n    QMainWindow,\n\
    \    QPushButton,\n    QSpinBox,\n    QTableView,\n    QVBoxLayout,\n    QWidget,\n\
    )\n```\n\nNow you can browse between records in the *Tracks* table, make changes\
    \ to the track data and submit these changes to the database. The full source\
    \ code for this example is available at [databases/widget_mapper_controls.py](databases/widget_mapper_controls.py)\
    \ in the book source code.\n\n![Figure 166. Viewing records, with previous/next\
    \ controls and save to submit.](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_353_0.png)\n\
    \n## Authenticating with QSqlDatabase\n\nIn the examples so far we've used SQLite\
    \ database files. But often you'll want to connect to a remote SQL server instead.\
    \ That requires a few additional parameters, including the hostname (where the\
    \ database is located) and a username and password if appropriate.\n\n```python\n\
    # Create database connection.\ndb = QSqlDatabase('<driver>')\ndb.setHostName('<localhost>')\n\
    db.setDatabaseName('<databasename>')\ndb.setUserName('<username>')\ndb.setPassword('<password>')\n\
    db.open()\n```\n\nNOTE: The value of `<driver>` can be any one of the following\
    \ ['QSQLITE', 'QMYSQL', 'QMYSQL3', 'QODBC', 'QODBC3', 'QPSQL', 'QPSQL7']. To get\
    \ this list on your system run `QSqlDatabase::drivers()`.\n\nThat's it! Once the\
    \ connection is established, the models will behave exactly as before.\n\n## Further\
    \ PySide2 Features\n\nThe topics we've covered so far are enough to build perfectly\
    \ functional desktop applications with PySide2. In this chapter we'll take a look\
    \ at some more technical and lesser-known aspects of the Qt framework to gain\
    \ a deeper understanding of how things work.\n\nFor many applications the topics\
    \ covered here are unnecessary, but they are good to have in your toolbox for\
    \ when you need them!"
  mdcn: "## 24. 扩展信号\n\n我们已经对信号有了基本的介绍，但这只是信号功能的冰山一角。本章我们将探讨如何创建自定义信号以及如何定制随信号发送的数据。\n\
    \n### 自定义信号\n\n到目前为止，我们只研究了 Qt 在内置控件上提供的信号。然而，你也可以在自己的代码中使用信号。这是*解耦*应用程序模块化部分的好方法——你的应用程序的某些部分可以响应其他地方发生的事情，而无需了解应用程序的任何结构信息。\n\
    \n> 一个需要*解耦*的明显迹象是使用 `.parent()` 来访问其他不相关控件上的数据。\n\n通过将这些更新放入事件队列，你也有助于保持应用程序的响应性——与其拥有一个庞大的*更新*方法，不如将工作拆分到多个槽中，并用单个信号触发它们。\n\
    \n你可以使用 PySide2 提供的 `Signal` 方法定义自己的信号。信号被定义为*类属性*，传入将随信号一起发出的 Python 类型（或类型）。你可以为信号名称选择任何有效的\
    \ Python 变量名，并为信号类型选择任何 Python 类型。\n\n清单 113. further/signals_custom.py\n\n```python\n\
    import sys\n\nfrom PySide2.QtCore import Signal\nfrom PySide2.QtWidgets import\
    \ QApplication, QMainWindow\n\nclass MainWindow(QMainWindow):\n\n    message =\
    \ Signal(str) ①\n    value = Signal(int, str, int) ②\n    another = Signal(list)\
    \ ③\n    onemore = Signal(dict) ④\n    anything = Signal(object) ⑤\n\n    def\
    \ __init__(self):\n        super().__init__()\n\n        self.message.connect(self.custom_slot)\n\
    \        self.value.connect(self.custom_slot)\n        self.another.connect(self.custom_slot)\n\
    \        self.onemore.connect(self.custom_slot)\n        self.anything.connect(self.custom_slot)\n\
    \n        self.message.emit(\"my message\")\n        self.value.emit(23, \"abc\"\
    , 1)\n        self.another.emit([1, 2, 3, 4, 5])\n        self.onemore.emit({\"\
    a\": 2, \"b\": 7})\n        self.anything.emit(1223)\n\n    def custom_slot(self,\
    \ *args):\n        print(args)\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\n\
    window.show()\n\napp.exec_()\n```\n\n- ① 发出字符串的信号。\n- ② 发出 3 种不同类型的信号。\n- ③ 发出列表的信号。\n\
    - ④ 发出字典的信号。\n- ⑤ 发出*任何东西*的信号。\n\n如你所见，信号可以像往常一样连接和发出。你可以发送任何 Python 类型，包括多种类型和复合类型（例如字典、列表）。\n\
    \n如果你将信号定义为 `Signal(object)`，它将能够传输任何 Python 类型。但这*通常*不是一个好主意，因为接收槽将需要处理所有类型。\n\
    \n> 你可以在任何继承自 `QObject` 的类上创建信号。这包括所有控件，包括主窗口和对话框。\n\n### 转发信号\n\n每个信号对象都有一个 `.emit`\
    \ 方法，用于触发数据的发送。像任何其他方法一样，这可以用作信号的*槽*目标。这允许你*链接*信号，这样一个信号被触发可以触发另一个信号。除非你修改数据（见下一节），否则链接的信号必须携带与原始信号相同的数据。\n\
    \n清单 114. further/signals_forward.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore\
