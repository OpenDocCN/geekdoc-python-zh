    # Introduction


    If you want to create GUI applications with Python it can be tricky to know where
    to start. There are a lot of new concepts you need to understand to get *anything*
    to work. But, like any coding problem, the first step is learning to approach
    the problem in the right way. In this book I take you right from the basic principles
    of GUI development to creating your own, fully functional, desktop apps with PySide2.


    The first edition of this book was released in 2016. Since then it has been updated
    4 times, adding and expanding chapters in response to reader feedback. There are
    more PySide resources available now than when I started, but there is still a
    shortage of in-depth, practical guides to building complete apps. This book fills
    that gap!


    The book is formatted as a series of chapters exploring different aspects of PySide2
    in turn. They are arranged to put the simpler chapters toward the beginning, but
    if you have specific requirements for your project, don''t be afraid to jump around!
    Each chapter will guide you through learning the fundamental concepts before taking
    you through a series of coding examples to gradually explore and learn how to
    apply the ideas yourself.


    You can download source code and resources for all examples in this book from
    http://www.pythonguis.com/d/pyside2-source.zip


    It is not possible to give you a *complete* overview of the Qt system in a book
    of this size, so there are links to external resources—both on the pythonguis.com
    website and elsewhere. If you find yourself thinking "I wonder if I can do *that*?"
    the best thing you can do is put this book down, then *go and find out!* Just
    keep regular backups of your code along the way so you always have something to
    come back to if you royally mess it up.'
- md: 'Throughout this book there are boxes like this, giving info, tips and warnings.
    All of them can be safely skipped over if you are in a hurry, but reading them
    will give you a deeper and more rounded knowledge of the Qt framework.


    Finally, this book is written to be compatible with Python 3.4+. Python 3 is the
    future of the language and if you’re starting out now is where you should be focusing
    your efforts. However, many of the examples can be changed with minimal effort
    to work with Python 2.7.


    This book is written to be compatible with Python 3.6+.


    ## 1. A very brief history of the GUI


    The **Graphical User Interface** has a long and venerable history dating back
    as far as the 1960s. Stanford’s NLS (oN-Line System) introduced the mouse and
    windows concepts, first demonstrated publicly in 1968. This was followed by the
    Xerox PARC Smalltalk system GUI 1973, which is the foundation of most modern general
    purpose GUIs.


    These early systems already had many of the features we take for granted in modern
    desktop GUIs, including windows, menus, radio buttons, check boxes and later icons.
    This combination of features — gave us the early acronym used for these types
    of interfaces: WIMP (windows, icons, menus, pointing device — a mouse).


    In 1979 the first commercial system featuring a GUI was released — the PERQ workstation.
    This spurred a number of other GUI efforts including notably the Apple Lisa (1983),
    which added the concept of the menu bar and window controls. As well as many other
    systems from the Atari ST (GEM), Amiga. On UNIX (and later Linux) the X Window
    System emerged in 1984. The first version of Windows for PC was released in 1985.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_6_0.png)


    Early GUIs were not the instant hit we might assume, due to the lack of compatible
    software at launch and expensive hardware requirements—particularly for home users.
    Slowly, but steadily, the GUI interface become the preferred way to interact with
    computers and the WIMP metaphor became firmly established as the standard. That''s
    not to say there haven''t been *attempts* to replace the WIMP metaphor on the
    desktop. Microsoft Bob (1995), for example, was Microsoft''s much maligned attempt
    to replace the desktop with a house.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_7_0.png)


    *Figure 2. Microsoft Bob — Discarding the desktop metaphor for a cartoon house.*


    There have been no shortage of other GUIs hailed as *revolutionary* in their time,
    from the launch of Windows 95 (1995) through to Mac OS X (2001), GNOME Shell (2011)
    and Windows 10 (2015). Each of these overhauled the UIs of their respective desktop
    systems, often with much fanfare. But fundamentally nothing really changed. These
    new UIs are still very much WIMP systems and function in exactly the same way
    as GUIs have since the 1980s.


    When the revolution came, it was mobile—the mouse has been replaced by touch,
    and windows by full-screen apps. But even in a world where we all walk around
    with smartphones in our pocket, a huge amount of daily work is still done on desktop
    computers. WIMP has survived 40 years of innovation and looks to survive many
    more.


    ## 2. A bit about Qt


    Qt is a free and open-source *widget toolkit* for creating cross-platform GUI
    applications, allowing applications to target multiple platforms from Windows,
    macOS, Linux and Android with a single codebase. But Qt is *much more* than a
    widget toolkit and features built in support for multimedia, databases, vector
    graphics and MVC interfaces, it is more accurate to think of it as an application
    development *framework*.


    Qt was started by Eirik Chambe-Eng and Haavard Nord in 1991, founding the first
    Qt company *Trolltech* in 1994. Qt is currently developed by *The Qt Company*
    and continues to be regularly updated, adding features and extending mobile and
    cross-platform support.


    ### Qt and PySide2


    PySide2, also known as *Qt for Python* is a Python *binding* of the Qt toolkit,
    currently developed by *The Qt Company*. When you write applications using PySide2
    what you are *really* doing is writing applications in Qt. The PySide2 library
    is simply.[1] a wrapper around the C++ Qt library, to allow it to be used in Python.


    Because this is a Python interface to a C++ library the naming conventions used
    within PySide2 do not adhere to PEP8 standards. Most notably functions and variables
    are named using `mixedCase` rather than `snake_case`. Whether you adhere to this
    standard in your own applications is entirely up to you, however I found it helped
    to follow Python standards for my own code, to help clarify where the PySide2
    code ends and your own begins.


    Lastly, while there is PySide2 specific documentation available, you will often
    find yourself reading the Qt documentation itself as it is more complete. If you
    need advice on converting Qt C++ code to Python, take a look at [Translating C++
    Examples to Python](https://doc.qt.io/qtforpython/tutorials/portingguide.html).


    This book is written to work with the latest version of Qt 5. As of writing this
    is Qt 5.15. However, many of the examples will work fine with earlier and later
    versions of Qt.


    [1] Not really *that* simple.


    ## 3. Thank you


    This book continues to be expanded and updated in response to reader feedback.
    Thank you to the following readers for their contributions, which helped make
    this edition what it is!


    - James Battat

    - Alex Bender

    - Andries Broekema

    - Juan Cabanela

    - Max Fritzler

    - Olivier Girard

    - Richard Hohlfield

    - Cody Jackson

    - John E Kadwell

    - Jeffrey R Kennedy

    - Gajendra Khanna

    - Bing Xiao Liu

    - Alex Lombardi

    - Juan Pablo Donayre Quintana

    - Guido Tognan


    If you have feedback or suggestions for future editions, please [get in touch](https://example.com).


    ## 4. Copyright


    This book is licensed under the Creative Commons Attribution Share-alike Non-commercial
    license (CC BY-NC-SA) ©2020 Martin Fitzpatrick.


    - You are free to share unaltered copies of this book with anyone you choose.

    - If you modify this book and distribute your altered version it must be distributed
    under the same license.

    - You are not permitted to sell this book or derivatives in any format.

    - If you would like to support the author you can *legally* purchase a copy direct
    from the author(s).


    Contributions and corrections from readers (CC BY-NC-SA) are most welcome.


    ## Basic PySide2 Features


    It’s time to take your first steps in creating GUI applications with PySide2!


    In this chapter you will be introduced to the basics of PySide2 that are the foundations
    of any application you create. We will develop a simple windowed application on
    your desktop. We’ll add widgets, arrange them using layouts and connect these
    widgets to functions, allowing you to trigger application behavior from your GUI.


    Use the provided code as your guide, but always feel free to experiment. That’s
    the best way to learn how things work.


    > Before you get started, you need a working installation of PySide2. If you don’t
    have one yet, check out [Installing PySide2](http://www.pythonguis.com/d/pyside2-source.zip).


    > Don’t forget to download the source code that accompanies this book from [http://www.pythonguis.com/d/pyside2-source.zip](http://www.pythonguis.com/d/pyside2-source.zip)


    ## 5. My first Application


    Let’s create our first application! To start create a new Python file — you can
    call it whatever you like (e.g. `myapp.py`) and save it somewhere accessible.
    We’ll write our simple app in this file.


    > We’ll be editing within this file as we go along, and you may want to come back
    to earlier versions of your code, so remember to keep regular backups.


    ### Creating your App


    The source code for your very first application is shown below. Type it in verbatim,
    and be careful not to make mistakes. If you do mess up, Python will let you know
    what’s wrong. If you don’t feel like typing it all in, the file is included in
    the source code with this book.'
  mdcn: '本书中会穿插许多这样的信息框，提供信息、提示和警告。如果你时间紧迫，完全可以跳过它们，但阅读这些内容会让你对Qt框架有更深入、更全面的理解。


    最后，本书的编写兼容Python 3.4+。Python 3是这门语言的未来，如果你现在开始学习，这正是你应该投入精力的方向。不过，许多示例只需稍作修改即可在Python
    2.7上运行。


    本书的编写兼容Python 3.6+。


    ## 1. 图形用户界面简史


    **图形用户界面**有着悠久而辉煌的历史，最早可追溯到20世纪60年代。斯坦福大学的NLS（在线系统）引入了鼠标和窗口的概念，并于1968年首次公开演示。随后是施乐帕洛阿尔托研究中心的Smalltalk系统GUI（1973年），它奠定了大多数现代通用图形用户界面的基础。


    这些早期系统已经具备了许多我们在现代桌面图形用户界面中习以为常的功能，包括窗口、菜单、单选按钮、复选框以及后来的图标。这些功能的组合——为我们提供了早期用于描述这类界面的缩写词：WIMP（窗口、图标、菜单、指点设备——即鼠标）。


    1979年，第一个采用图形用户界面的商业系统发布——PERQ工作站。这推动了许多其他图形用户界面的开发，其中著名的包括Apple Lisa（1983年），它引入了菜单栏和窗口控制的概念。此外还有许多其他系统，如Atari
    ST（GEM）、Amiga。在UNIX（以及后来的Linux）上，X窗口系统于1984年出现。Windows for PC的第一个版本于1985年发布。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_6_0.png)


    早期的图形用户界面并非像我们想象的那样一炮而红，这是由于发布时缺乏兼容软件以及昂贵的硬件要求——尤其是对家庭用户而言。图形用户界面缓慢但稳步地成为与计算机交互的首选方式，WIMP隐喻也牢固地确立为标准。这并不是说没有*尝试*在桌面上取代WIMP隐喻。例如，Microsoft
    Bob（1995年）就是微软一次备受诟病的尝试，试图用一个卡通房子取代桌面。


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_7_0.png)


    *图2. Microsoft Bob —— 抛弃桌面隐喻，代之以卡通房子。*


    历史上不乏其他被誉为*革命性*的图形用户界面，从Windows 95（1995年）的发布，到Mac OS X（2001年）、GNOME Shell（2011年）和Windows
    10（2015年）。每一个都彻底革新了各自桌面系统的用户界面，往往伴随着巨大的宣传。但从根本上说，什么都没有真正改变。这些新的用户界面仍然是非常典型的WIMP系统，其运行方式与自20世纪80年代以来的图形用户界面完全相同。


    当革命真正到来时，它发生在移动端——鼠标被触摸取代，窗口被全屏应用取代。但即使在我们人人都随身携带智能手机的世界里，大量的日常工作仍然在桌面计算机上完成。WIMP已经经受住了40年的创新考验，并且看起来还将继续存在下去。


    ## 2. 关于Qt


    Qt是一个免费且开源的*小部件工具包*，用于创建跨平台的图形用户界面应用程序，允许应用程序使用单一代码库针对Windows、macOS、Linux和Android等多个平台。但Qt*远不止*是一个小部件工具包，它内置了对多媒体、数据库、矢量图形和MVC接口的支持，更准确地说，它是一个应用程序开发*框架*。


    Qt由Eirik Chambe-Eng和Haavard Nord于1991年创立，并于1994年成立了第一家Qt公司*Trolltech*。Qt目前由*The
    Qt Company*开发，并持续定期更新，增加功能并扩展移动和跨平台支持。


    ### Qt与PySide2


    PySide2，也称为*Qt for Python*，是Qt工具包的Python*绑定*，目前由*The Qt Company*开发。当你使用PySide2编写应用程序时，你*实际上*是在用Qt编写应用程序。PySide2库简单来说[1]就是C++
    Qt库的一个包装器，使其可以在Python中使用。


    由于这是C++库的Python接口，PySide2中使用的命名约定并不遵循PEP8标准。最显著的是，函数和变量使用`mixedCase`而不是`snake_case`命名。你是否在自己的应用程序中遵循此标准完全取决于你自己，不过我发现遵循Python标准编写自己的代码有助于区分PySide2代码和你自己的代码。


    最后，虽然有专门的PySide2文档，但你经常会发现自己阅读Qt文档本身，因为它更完整。如果你需要关于将Qt C++代码转换为Python的建议，请查看[将C++示例移植到Python](https://doc.qt.io/qtforpython/tutorials/portingguide.html)。


    本书的编写适用于最新版本的Qt 5。截至撰写时，这是Qt 5.15。然而，许多示例在Qt的早期和后期版本中也能正常工作。


    [1] 实际上没*那么*简单。


