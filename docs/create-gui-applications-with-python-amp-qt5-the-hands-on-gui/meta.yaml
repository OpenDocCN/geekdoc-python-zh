  md: '# Aesthetics


    If you''re not a designer, it can be hard to create *beautiful* interfaces, or
    even know what they are. Thankfully there are simple rules you can follow to create
    interfaces that, if not *beautiful* at least won''t be *ugly*. The key concepts
    are — alignment, groups and space.


    **Alignment** is about reducing visual noise. Think of the corners of widgets
    as *alignment points* and aim to minimize the number of *unique* alignment points
    in the UI. In practice, this means making sure the edges of elements in the interface
    *line up* with one another.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_184_0.png)


    *Figure 86. The effect of alignment of interface clarity.*


    > If you have differently sized inputs, align the edge you read *from*. English
    is a left-to-right language, so if your app is in English align the left.


    **Groups** of related widgets gain context making them easier to *understand*.
    Structure your interface so related things are found together.


    **Space** is key to creating visually distinct regions in your interface — without
    space between groups, there are no groups! Keep spacing consistent and meaningful.'
  merge: -1
  pgno: 184
