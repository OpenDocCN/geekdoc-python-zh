    \ import Color\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n  \
    \      super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n     \
    \   layout1 = QHBoxLayout()\n        layout2 = QVBoxLayout()\n        layout3\
    \ = QVBoxLayout()\n\n        layout2.addWidget(Color(\"red\"))\n        layout2.addWidget(Color(\"\
    yellow\"))\n        layout2.addWidget(Color(\"purple\"))\n\n        layout1.addLayout(layout2)\n\
    \n        layout1.addWidget(Color(\"green\"))\n\n        layout3.addWidget(Color(\"\
    red\"))\n        layout3.addWidget(Color(\"purple\"))\n\n        layout1.addLayout(layout3)\n\
    \n        widget = QWidget()\n        widget.setLayout(layout1)\n        self.setCentralWidget(widget)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n> **运行它！** 部件应该会排列成 3 列水平布局，其中第一列还包含 3 个垂直堆叠的部件。试试看！\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_82_0.png)\n\
    \n图 25. 嵌套的 QHBoxLayout 和 QVBoxLayout 布局。\n\n你可以使用 `.setContentMargins` 设置布局周围的间距，或使用\
    \ `.setSpacing` 设置元素之间的间距。\n\n```python\nlayout1.setContentsMargins(0,0,0,0)\n\
    layout1.setSpacing(20)\n```\n\n以下代码展示了嵌套部件与布局边距和间距的结合。\n\n清单 29. basic/layout_5.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QHBoxLayout,\n    QLabel,\n    QMainWindow,\n\
