  md: '# Calculating what to draw


    The number of boxes to draw is determined by the current value — and how far along
    it is between the minimum and maximum value configured for the `QDial`. We already
    have that information in the example above.


    ```

    dial = self.parent()._dial

    vmin, vmax = dial.minimum(), dial.maximum()

    value = dial.value()

    ```


    If `value` is half way between `vmin` and `vmax` then we want to draw half of
    the boxes (if we have 4 boxes total, draw 2). If `value` is at `vmax` we want
    to draw them all.


    To do this we first convert our `value` into a number between 0 and 1, where `0
    = vmin` and `1 = vmax`. We first subtract `vmin` from `value` to adjust the range
    of possible values to start from zero—i.e. from `vmin…vmax` to `0…(vmax-vmin)`.
    Dividing this value by `vmax-vmin` (the new maximum) then gives us a number between
    0 and 1.


    The trick then is to multiply this value (called `pc` below) by the number of
    steps and that gives us a number between 0 and 5 —the number of boxes to draw.


    ```

    pc = (value - vmin) / (vmax - vmin)

    n_steps_to_draw = int(pc * 5)

    ```


    We''re wrapping the result in `int` to convert it to a whole number (rounding
    down) to remove any partial boxes.


    Update the `drawText` method in your paint event to write out this number instead.'
