  - '[PAGE 356]


    # 24. Extending Signals


    We''ve seen a basic introduction to signals already, but that only scratches the
    surface of what you can do with them. In this chapter we''ll look at how you can
    create your own signals and customize the data sent with them.


    # Custom Signals


    So far we''ve only looked at signals that Qt itself provides on the built-in widgets.
    However, you can also make use of signals in your own code. This is a great way
    to *decouple* modular parts of your application — parts of your app can respond
    to things happening elsewhere, without needing to know anything about the structure
    of your app.


    > A good indication that you need to *decouple* is use of `.parent()` to access
    data on other unrelated widgets.


    By putting these updates in the event queue you also help to keep your app responsive
    — rather than having one big *update* method, you can split the work up into multiple
    slots and trigger them with a single signal.


    You can define your own signals using the `Signal` method provided by PySide2.
    Signals are defined as *class attributes* passing in the Python type (or types)
    that will be emitted with the signal. You can choose any valid Python variable
    name for the name of the signal, and any Python type for the signal type.'
