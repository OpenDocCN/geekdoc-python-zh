    \ `.qrc` 文件作为输入，并输出一个包含编译数据的 Python 文件。然后，可以像导入任何其他 Python 文件或模块一样将其导入到你的应用程序中。\n\
    \n要将我们的 `resources.qrc` 文件编译为名为 `resources.py` 的 Python 文件，我们可以使用：\n\n```\npyrcc5\
    \ resources.qrc -o resources.py\n```\n\n```\npyside2-rcc resources.qrc -o resources.py\n\
    ```\n\n要在我们的应用程序中使用资源文件，我们需要进行一些小的更改。首先，我们需要在应用程序顶部 `import resources`，以将资源加载到\
    \ Qt 资源系统中；其次，我们需要将图标文件的路径更新为使用资源路径格式，如下所示：\n\n```\napp.setWindowIcon(QtGui.QIcon(':/icons/hand_icon.ico'))\n\
    ```\n\n前缀 `:/` 表示这是一个**资源路径**。第一个名称 \"icons\" 是**前缀**命名空间，文件名取自文件**别名**，两者均在我们的\
    \ `resources.qrc` 文件中定义。\n\n更新后的应用程序如下所示。\n\n```\nfrom PyQt5 import QtWidgets,\
    \ QtGui\n\ntry:\n    # 如果你同时针对 Mac/Linux，请将其包含在 try/except 块中\n    from PyQt5.QtWinExtras\
    \ import QtWin\n    myappid = 'com.learnpyqt.examples.helloworld'\n    QtWin.setCurrentProcessExplicitAppUserModelID(myappid)\n\
    except ImportError:\n    pass\n\n\nimport sys\nimport resources  # 导入编译后的资源文件。\n\
    \nclass MainWindow(QtWidgets.QMainWindow):\n\n    def __init__(self, *args, **kwargs):\n\
    \        super().__init__(*args, **kwargs)\n\n        self.setWindowTitle(\"Hello\
    \ World\")\n        l = QtWidgets.QLabel(\"My simple app.\")\n        l.setMargin(10)\n\
    \        self.setCentralWidget(l)\n\n        self.show()\n\nif __name__ == '__main__':\n\
    \    app = QtWidgets.QApplication(sys.argv)\n    app.setWindowIcon(QtGui.QIcon(':/icons/hand_icon.ico'))\n\
    \    w = MainWindow()\n    app.exec()\n```\n\n```\nfrom PySide2 import QtWidgets,\
    \ QtGui\n\ntry:\n    # 如果你同时针对 Mac/Linux，请将其包含在 try/except 块中\n    from PySide2.QtWinExtras\
    \ import QtWin\n    myappid = 'com.learnpyqt.examples.helloworld'\n    QtWin.setCurrentProcessExplicitAppUserModelID(myappid)\n\
    except ImportError:\n    pass\n\n\nimport sys\nimport resources  # 导入编译后的资源文件。\n\
    \nclass MainWindow(QtWidgets.QMainWindow):\n\n    def __init__(self, *args, **kwargs):\n\
    \        super().__init__(*args, **kwargs)\n\n        self.setWindowTitle(\"Hello\
    \ World\")\n        l = QtWidgets.QLabel(\"My simple app.\")\n        l.setMargin(10)\n\
    \        self.setCentralWidget(l)\n\n        self.show()\n\nif __name__ == '__main__':\n\
    \    app = QtWidgets.QApplication(sys.argv)\n    app.setWindowIcon(QtGui.QIcon(':/icons/hand_icon.ico'))\n\
    \    w = MainWindow()\n    app.exec_()\n```\n\n你可以按如下方式运行构建：\n\n```\npyinstaller\
    \ --windowed --icon=hand_icon.ico app.py\n```\n\n或者使用你现有的 .spec 文件重新运行。\n\n```\n\
    pyinstaller app.spec\n```\n\n如果你在 `dist` 中运行生成的应用程序，你应该会看到图标按预期工作。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_634_0.png)\n\
    \n*图 253. 工具栏上显示的手形图标*\n\n这种方法的优点是你的数据文件保证会被捆绑，因为它们被视为代码——**PyInstaller** 通过源代码中的导入来找到它们。你也不必担心数据文件的平台特定位置。你只需要注意，每当向项目添加或删除数据文件时，都要重新构建\
    \ `resources.py` 文件。\n\n当然，这种方法不适用于任何你希望最终用户可读或可编辑的文件。但是，这并不妨碍你根据需要将此方法与前一种方法结合使用。\n\
    \n## 构建 #2，捆绑 Qt Designer UI 和图标\n\n我们现在已经成功构建了一个简单的应用程序，它只有一个外部图标文件作为依赖项。现在来处理一些更实际的情况！\n\
    \n在复杂的 Qt 应用程序中，通常使用 Qt Designer 来定义 UI，包括按钮和菜单上的图标。我们如何将 UI 文件与应用程序一起分发，并确保链接的图标继续按预期工作？\n\
    \n下面是我们将用于演示此功能的演示应用程序的 UI。该应用程序是一个简单的计数器，允许你通过单击相应的按钮来增加、减少或重置计数器。你也可以[下载源代码和相关文件](http://download.mfitzp.com/counter-pyinstaller-windows.zip)。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_635_0.png)\n\n图 254. 在 Qt Designer\
    \ 中创建的计数器 UI\n\n该 UI 由一个 `QMainWindow` 组成，其中包含一个垂直布局，布局中有一个 `QLabel` 和 3 个 `QPushButton`\
    \ 小部件。按钮分别标有 Increment、Decrement 和 Reset 标签，并带有来自 [p.yusukekamiyamane 的 Fugue\
