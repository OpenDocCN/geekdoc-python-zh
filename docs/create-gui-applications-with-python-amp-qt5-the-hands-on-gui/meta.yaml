- md: "## Parsing data\n\nOften you are not interested in the raw data from the thread\
    \ (whether from a server or other external device) and instead want to process\
    \ the data in some way first. In this example we create custom parsers, which\
    \ can extract *specific* data from pages requested. We can create multiple workers,\
    \ each receiving a different list of sites and parsers.\n\nListing 181. concurrent/qrunner_io_parser.py\n\
    \n```python\nself.parsers = { ①\n    # Regular expression parsers, to extract\
    \ data from the HTML.\n    \"title\": re.compile(r\"<title.*?>(.*?)<\\/title>\"\
    , re.M | re.S),\n    \"h1\": re.compile(r\"<h1.*?>(.*?)<\\/h1>\", re.M | re.S),\n\
    \    \"h2\": re.compile(r\"<h2.*?>(.*?)<\\/h2>\", re.M | re.S),\n}\n```\n\n① The\
    \ parsers are defined as a series of compiled regular expressions. But you can\
    \ define parsers however you like.\n\nListing 182. concurrent/qrunner_io_parser.py\n\
    \n```python\ndef execute(self):\n    for n, url in enumerate(self.urls):\n   \
    \     worker = Worker(n, url, self.parsers) ①\n        worker.signals.data.connect(self.display_output)\n\
    \n        # Execute\n        self.threadpool.start(worker)\n```\n\n① Pass the\
    \ list of parsers to each worker.\n\nListing 183. concurrent/qrunner_io_parser.py\n\
    \n```python\nclass Worker(QRunnable):\n    \"\"\"\n    Worker thread\n\n    Inherits\
    \ from QRunnable to handle worker thread setup, signals\n    and wrap-up.\n\n\
    \    :param id: The id for this worker\n    :param url: The url to retrieve\n\
    \    \"\"\"\n\n    def __init__(self, id, url, parsers):\n        super().__init__()\n\
    \        self.id = id\n        self.url = url\n        self.parsers = parsers\n\
    \n        self.signals = WorkerSignals()\n\n    @Slot()\n    def run(self):\n\
    \        r = requests.get(self.url)\n\n        data = {}\n        for name, parser\
    \ in self.parsers.items(): ①\n            m = parser.search(r.text)\n        \
    \    if m: ②\n                data[name] = m.group(1).strip()\n\n        self.signals.data.emit((self.id,\
    \ data))\n```\n\n① Iterate the parser list we passed to the worker. Run each parser\
    \ on the data for this page.\n\n② If the regular expression matched, add the data\
    \ to our `data` dictionary.\n\nRunning this, you'll see the output from each worker,\
    \ with the H1, H2 and TITLE tags extracted.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_519_0.png)\n\
    \nFigure 218. Displaying parsed output from multiple workers.\n\n> If you are\
    \ building tools to extract data from websites, take a look at [BeautifulSoup\
    \ 4](https://www.crummy.com/software/BeautifulSoup/) which is far more robust\
    \ than using regular expressions.\n\n## The Generic\n\nYou won’t always know ahead\
    \ of time what you want to use workers for. Or you may have a number of similar\
    \ functions to perform and want a regular API for running them. In that case you\
    \ can take advantage of the fact that in Python functions are objects to build\
    \ a *generic* runner which accepts not just arguments, but also the function to\
    \ run.\n\nIn the following example we create a single `Worker` class and then\
    \ use it to run a number of different functions. With this setup you can pass\
    \ in any Python function and have it executed in a separate thread.\n\nThe complete\
    \ working example is given below, showcasing the custom `QRunnable` worker together\
    \ with the worker & progress signals. You should be able to adapt this code to\
    \ any application you develop.\n\n*Listing 184. concurrent/qrunner_generic.py*\n\
    \n```python\nimport sys\nimport time\nimport traceback\n\nfrom PySide2.QtCore\
    \ import QObject, QRunnable, QThreadPool, QTimer,\n    Signal, Slot\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QLabel,\n    QMainWindow,\n    QPushButton,\n\
    \    QVBoxLayout,\n    QWidget,\n)\n\ndef execute_this_fn():\n    for _ in range(0,\
    \ 5):\n        time.sleep(1)\n\n    return \"Done.\"\n\nclass WorkerSignals(QObject):\n\
    \    \"\"\"\n    Defines the signals available from a running worker thread.\n\
    \n    Supported signals are:\n\n    finished\n        No data\n\n    error\n \
    \       `tuple` (exctype, value, traceback.format_exc() )\n\n    result\n    \
    \    `object` data returned from processing, anything\n    \"\"\"\n\n    finished\
    \ = Signal()\n    error = Signal(tuple)\n    result = Signal(object)\n\nclass\
    \ Worker(QRunnable):\n    \"\"\"\n    Worker thread\n\n    Inherits from QRunnable\
    \ to handle worker thread setup, signals and\n    wrap-up.\n\n    :param callback:\
    \ The function callback to run on this worker\n    :thread. Supplied args and\n\
    \                     kwargs will be passed through to the runner.\n    :type\
    \ callback: function\n    :param args: Arguments to pass to the callback function\n\
    \    :param kwargs: Keywords to pass to the callback function\n    :\n    \"\"\
    \"\n\n    def __init__(self, fn, *args, **kwargs):\n        super().__init__()\n\
    \        # Store constructor arguments (re-used for processing)\n        self.fn\
    \ = fn\n        self.args = args\n        self.kwargs = kwargs\n        self.signals\
    \ = WorkerSignals()\n\n    @Slot()\n    def run(self):\n        \"\"\"\n     \
    \   Initialize the runner function with passed args, kwargs.\n        \"\"\"\n\
    \n        # Retrieve args/kwargs here; and fire processing using them\n      \
    \  try:\n            result = self.fn(*self.args, **self.kwargs)\n        except:\n\
    \            traceback.print_exc()\n            exctype, value = sys.exc_info()[:2]\n\
    \            self.signals.error.emit((exctype, value, traceback.format_exc()))\n\
    \        else:\n            self.signals.result.emit(result)  # Return the result\
    \ of the processing\n        finally:\n            self.signals.finished.emit()\
    \  # Done\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n       \
    \ super().__init__()\n\n        self.counter = 0\n\n        layout = QVBoxLayout()\n\
    \n        self.l = QLabel(\"Start\")\n        b = QPushButton(\"DANGER!\")\n \
    \       b.pressed.connect(self.oh_no)\n\n        layout.addWidget(self.l)\n  \
    \      layout.addWidget(b)\n\n        w = QWidget()\n        w.setLayout(layout)\n\
    \        self.setCentralWidget(w)\n\n        self.show()\n\n        self.threadpool\
    \ = QThreadPool()\n        print(\n            \"Multithreading with maximum %d\
    \ threads\" % self.threadpool.maxThreadCount()\n        )\n\n        self.timer\
    \ = QTimer()\n        self.timer.setInterval(1000)\n        self.timer.timeout.connect(self.recurring_timer)\n\
    \        self.timer.start()\n\n    def print_output(self, s):\n        print(s)\n\
    \n    def thread_complete(self):\n        print(\"THREAD COMPLETE!\")\n\n    def\
    \ oh_no(self):\n        # Pass the function to execute\n        worker = Worker(\n\
    \            execute_this_fn\n        )  # Any other args, kwargs are passed to\
    \ the run function\n        worker.signals.result.connect(self.print_output)\n\
    \        worker.signals.finished.connect(self.thread_complete)\n\n        # Execute\n\
    \        self.threadpool.start(worker)\n\n    def recurring_timer(self):\n   \
    \     self.counter += 1\n        self.l.setText(\"Counter: %d\" % self.counter)\n\
    \napp = QApplication(sys.argv)\nwindow = MainWindow()\napp.exec_()\n```\n\nThe\
    \ generic function approach adds a limitation that may not be immediately obvious—the\
    \ run function does not have access to the `self` object of your runner, and therefore\
    \ cannot access the signals to emit the data itself. We can only emit the return\
    \ value of the function, once it has ended. While you can return a compound type,\
    \ such as a `tuple`, to return multiple values, you can't get progress signals\
    \ or in-progress data.\n\nHowever, there is a way around this. Since you can pass\
    \ anything you want **into** the custom function, you can also pass `self` or\
    \ the `self.signals` object to make them available to you.\n\nListing 185. concurrent/qrunner_generic_callback.py\n\
    \n```python\nimport sys\nimport time\nimport traceback\n\nfrom PySide2.QtCore\
    \ import QObject, QRunnable, QThreadPool, QTimer,\n    Signal, Slot\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QLabel,\n    QMainWindow,\n    QPushButton,\n\
