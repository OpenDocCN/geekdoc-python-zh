    My App\")\n\n        label = QLabel(\"Hello!\")\n        label.setAlignment(Qt.AlignCenter)\n\
    \n        self.setCentralWidget(label)\n\n        toolbar = QToolBar(\"My main\
    \ toolbar\")\n        self.addToolBar(toolbar)\n\n    def onMyToolBarButtonClick(self,\
    \ s):\n        print(\"click\", s)\n```\n\n\U0001F680 Run it! You'll see a thin\
    \ grey bar at the top of the window. This is your toolbar. Right click and click\
    \ the name to toggle it off.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_98_0.png)\n\
    \nFigure 37. A window with a toolbar.\n\n> > I can't get my toolbar back!?\n>\n\
    > Unfortunately once you remove a toolbar there is now no place to right click\
    \ to re-add it. So as a general rule you want to either keep one toolbar un-removeable,\
    \ or provide an alternative interface to turn toolbars on and off."
