    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_271_0.png)\n\n图 134. 使用 left 调整子控件的位置。\n\
    \n当 position 设置为 *absolute* 时，*left*、*right*、*top* 和 *bottom* 属性定义了控件与其父元素相同边缘之间的间距。因此，例如，`top:\
    \ 5`、`left: 5` 将使控件的顶部和左边缘距离其父元素的顶部和左边缘 5 像素。\n\n```\ncss\nQSpinBox {\n    min-height:\
