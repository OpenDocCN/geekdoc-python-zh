- md: "If you can't find an icon you need in this standard set, you will need to use\
    \ one of the other approaches outlined below.\n\n> While you *can* mix and match\
    \ icons from different icon sets together, it's better to use a single style throughout\
    \ to keep your app feeling coherent.\n\n## Icon files\n\nIf the standard icons\
    \ aren't what you are looking for, or you need icons not available, you can use\
    \ any custom icons you like. Icons can be any of the Qt supported image types\
    \ on your platform, although for most use cases PNG or SVG images are preferable.\n\
    \n> To get list of supported image formats on your own platform you can call `QtGui.QImageReader.supportedImageFormats()`.\n\
    \n## Icon sets\n\nIf you're not a graphic designer you will save yourself a lot\
    \ of time (and trouble) by using one of the many available icon sets. There are\
    \ thousands of these available online, with varying licenses depending on their\
    \ use in open source or commercial software.\n\nIn this book and example apps\
    \ I've used the [Fugue](https://p.yusukekamiyamane.com/) icon set, which is also\
    \ free to use in your software with acknowledgement of the author. The Tango icon\
    \ set is a large icon set developed for use on Linux, however there are no licensing\
    \ requirements and it can be used on any platform.\n\n| Resource | Description\
    \ | License |\n| :--- | :--- | :--- |\n| [Fugue by p.yusukekamiyamane](http://p.yusukekamiyamane.com/)\
    \ | 3,570 16x16 icons in PNG format | CC BY 3.0 |\n| [Diagona by p.yusukekamiyamane](http://p.yusukekamiyamane.com/)\
    \ | 400 16x16 and 10x10 icons in PNG format | CC BY 3.0 |\n| [Tango Icons by The\
    \ Tango Desktop Project](http://tango.freedesktop.org/) | Icons using the Tango\
    \ project color theme. | Public domain |\n\nWhile you do have control over the\
    \ size of icons using in menus and toolbars, in most cases you should leave these\
    \ as-is. A good standard icon size for menus is 20x20 pixels.\n\nSizes smaller\
    \ than this are fine too, the icon will be centered rather than scaled up.\n\n\
    ## Create your own\n\nIf you don't like any of the available icon sets, or want\
    \ a unique look to your application, you can of course design your own icons.\
    \ Icons can be created using any standard graphics software and saved as PNG images\
    \ with transparent background. The icons should be square and of a resolution\
    \ that they do not need to be scaled up or down when used in your application.\n\
    \n## Using icon files\n\nOnce you have your icon files — whether from icon sets\
    \ or self-drawn — they can be used in your Qt applications by creating instances\
    \ of `QtGui.QIcon`, passing in the filename of the icon directly.\n\n```\nQtGui.QIcon(\"\
    <filename>\")\n```\n\nWhile you can use both absolute (complete) and relative\
    \ (partial) to point to your file, absolute paths are prone to break when distributing\
    \ your applications. Relative paths will work as long as the icon files are stored\
    \ in the same location relative to your script, although even this can be difficult\
    \ to manage when packaging. If you are using many icons in your application, or\
    \ will be distributing your application, you may want to use the [The Qt Resource\
    \ system](https://doc.qt.io/qt-5/resources.html).\n\n> In order to create icon\
    \ instances you must have already created a `QApplication` instance. To ensure\
    \ this is the case, you can create your app instance at the top of your source\
    \ file, or create your `QIcon` instances in the `__init__` for the widget or window\
    \ that uses them.\n\n## Free Desktop Specification Icons (Linux)\n\nOn Linux desktops\
    \ there is a thing called the *Free Desktop Specification* which defines standard\
    \ names for icons for specific actions.\n\nIf your application uses these specific\
    \ icon names (and loads the icon from a \"theme\") then on Linux your application\
    \ will use the current icon set which is enabled on the desktop. The goal here\
    \ is to ensure that all applications have the same look & feel while remaining\
    \ configurable.\n\nTo use these within Qt Designer you would select the drop-down\
    \ and choose \"Set Icon From Theme...\"\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_217_0.png)\n\
    \nYou then enter the **name** of the icon you want to use, e.g. `document-new`\
    \ (see the [full list of valid names](https://specifications.freedesktop.org/icon-naming-spec/latest/)).\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_218_0.png)\n\nFigure 101. Selecting\
    \ an icon theme\n\nIn code, you can get icons from the active Linux desktop theme\
    \ using `icon = QtGui.QIcon.fromTheme(\"document-new\")`. The following snippet\
    \ produces a small window (button) with the \"new document\" icon showing, from\
    \ the active theme.\n\nListing 74. icons/linux.py\n\n```\nfrom PySide2.QtWidgets\
    \ import QApplication, QPushButton\nfrom PySide2.QtGui import QIcon\n\nimport\
    \ sys\n\napp = QApplication(sys.argv)\nbutton = QPushButton(\"Hello\")\nicon =\
    \ QIcon.fromTheme(\"document-new\")\nbutton.setIcon(icon)\nbutton.show()\n\napp.exec_()\n\
    ```\n\nThe resulting window will look like the following on Ubuntu, with the default\
    \ icon theme.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_219_0.png)\n\nFigure\
    \ 102. Linux Free Desktop Specification \"document-new\" icon\n\nIf you're developing\
    \ a cross-platform application you can still make use of these standard icons\
    \ on Linux. To do this, use your own icons for Windows and macOS and create a\
    \ custom theme in Qt Designer, using the Free Desktop Specification names for\
    \ the icons.\n\n# 19. Qt Style Sheets (QSS)\n\nSo far we've looked at how you\
    \ can apply custom colors to your PySide2 apps using `QPalette`. However, there\
    \ are many other customizations you can make to the appearance of widgets in Qt5.\
    \ The system provided to allow this customization is called Qt Style Sheets (QSS).\n\
    \nQSS is conceptually very similar to Cascading Style Sheets (CSS) used to style\
    \ the web, sharing a similar syntax and approach. In this section we'll look at\
    \ some examples of QSS and how you can use it to modify widget appearance.\n\n\
    > Using QSS on widgets has a small performance impact, due to the need to look\
    \ up the appropriate rules when redrawing widgets. However, unless you are doing\
    \ very widget-heavy work this is unlikely to be of consequence.\n\n## Style editor\n\
    \nTo make experimenting with QSS rules a little bit easier, we can create a simple\
    \ demo app which allows rules to be input and applied to some example widgets.\
    \ We'll use this to test out the various style properties and rules.\n\n> The\
    \ source code for the style viewer is shown below, but it's also available in\
    \ the source code with this book.\n\nListing 75. themes/qss_tester.py\n\n```\n\
    import sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtGui import QColor,\
    \ QPalette\nfrom PySide2.QtWidgets import (\n    QApplication,\n    QCheckBox,\n\
    \    QComboBox,\n    QLabel,\n    QLineEdit,\n    QMainWindow,\n    QPlainTextEdit,\n\
    \    QPushButton,\n    QSpinBox,\n    QVBoxLayout,\n    QWidget,\n)\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    QSS Tester\")\n\n        self.editor = QPlainTextEdit()\n        self.editor.textChanged.connect(self.update_styles)\n\
    \n        layout = QVBoxLayout()\n        layout.addWidget(self.editor)\n\n  \
    \      # Define a set of simple widgets.\n        cb = QCheckBox(\"Checkbox\"\
    )\n        layout.addWidget(cb)\n\n        combo = QComboBox()\n        combo.setObjectName(\"\
    thecombo\")\n        combo.addItems([\"First\", \"Second\", \"Third\", \"Fourth\"\
    ])\n        layout.addWidget(combo)\n\n        sb = QSpinBox()\n        sb.setRange(0,\
    \ 99999)\n        layout.addWidget(sb)\n\n        l = QLabel(\"This is a label\"\
    )\n        layout.addWidget(l)\n\n        le = QLineEdit()\n        le.setObjectName(\"\
    mylineedit\")\n        layout.addWidget(le)\n\n        pb = QPushButton(\"Push\
    \ me!\")\n        layout.addWidget(pb)\n\n        self.container = QWidget()\n\
    \        self.container.setLayout(layout)\n\n        self.setCentralWidget(self.container)\n\
    \n    def update_styles(self):\n        qss = self.editor.toPlainText()\n    \
    \    self.setStyleSheet(qss)\n\napp = QApplication(sys.argv)\napp.setStyle(\"\
    Fusion\")\n\nw = MainWindow()\nw.show()\n\napp.exec_()\n```\n\nRunning this app\
    \ you'll see the following window, with a text editor at the top (where you can\
    \ enter QSS rules) and a set of widgets to which these rules will be applied —\
    \ we'll look at how applying rules and inheritance works in a bit.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_222_0.png)\n\
    \n*Figure 103. QSS tester application, no rules applied.*\n\nTry entering the\
    \ following style rules in the box at the top, and comparing the result with the\
    \ screenshots to make sure it's working."
  mdcn: "如果你在标准图标集中找不到需要的图标，就需要使用下面概述的其他方法之一。\n\n> 虽然你*可以*混合使用来自不同图标集的图标，但最好在整个应用中使用单一风格，以保持应用的连贯性。\n\
    \n## 图标文件\n\n如果标准图标不符合你的需求，或者你需要的图标不可用，你可以使用任何自定义图标。图标可以是你的平台上Qt支持的任何图像类型，尽管对于大多数用例，PNG或SVG图像是更优的选择。\n\
    \n> 要获取你所在平台支持的图像格式列表，可以调用 `QtGui.QImageReader.supportedImageFormats()`。\n\n##\
    \ 图标集\n\n如果你不是平面设计师，使用众多可用的图标集之一将为你节省大量时间（和麻烦）。网上有成千上万的图标集，根据其在开源或商业软件中的使用情况，许可协议各不相同。\n\
    \n在本书和示例应用中，我使用了 [Fugue](https://p.yusukekamiyamane.com/) 图标集，它也可以在你的软件中免费使用，只需注明作者。Tango图标集是一个为Linux开发的大型图标集，没有许可要求，可以在任何平台上使用。\n\
    \n| 资源 | 描述 | 许可 |\n| :--- | :--- | :--- |\n| [Fugue by p.yusukekamiyamane](http://p.yusukekamiyamane.com/)\
    \ | 3,570 个 16x16 PNG 格式图标 | CC BY 3.0 |\n| [Diagona by p.yusukekamiyamane](http://p.yusukekamiyamane.com/)\
    \ | 400 个 16x16 和 10x10 PNG 格式图标 | CC BY 3.0 |\n| [Tango Icons by The Tango Desktop\
    \ Project](http://tango.freedesktop.org/) | 使用 Tango 项目色彩主题的图标。 | 公共领域 |\n\n虽然你可以控制菜单和工具栏中使用的图标大小，但在大多数情况下，你应该保持其原样。菜单的标准图标大小为20x20像素。\n\
    \n比这更小的尺寸也可以，图标会居中显示而不是被放大。\n\n## 创建你自己的图标\n\n如果你不喜欢任何可用的图标集，或者希望你的应用程序具有独特的外观，你当然可以设计自己的图标。图标可以使用任何标准图形软件创建，并保存为具有透明背景的PNG图像。图标应该是正方形的，并且分辨率足够高，以便在你的应用程序中使用时无需放大或缩小。\n\
    \n## 使用图标文件\n\n一旦你有了图标文件——无论是来自图标集还是自己绘制的——都可以通过创建 `QtGui.QIcon` 实例并在其中直接传入图标文件名，来在你的Qt应用程序中使用它们。\n\
    \n```\nQtGui.QIcon(\"<filename>\")\n```\n\n虽然你可以使用绝对路径（完整路径）和相对路径（部分路径）来指向你的文件，但在分发应用程序时，绝对路径容易出错。只要图标文件相对于你的脚本存储在相同的位置，相对路径就可以工作，尽管在打包时这可能也难以管理。如果你在应用程序中使用许多图标，或者将要分发你的应用程序，你可能需要使用\
    \ [Qt资源系统](https://doc.qt.io/qt-5/resources.html)。\n\n> 为了创建图标实例，你必须已经创建了一个 `QApplication`\
    \ 实例。为确保这一点，你可以在源文件的顶部创建你的应用实例，或者在使用它们的控件或窗口的 `__init__` 方法中创建你的 `QIcon` 实例。\n\
    \n## Free Desktop 规范图标（Linux）\n\n在Linux桌面上，有一个叫做 *Free Desktop 规范* 的东西，它为特定操作的图标定义了标准名称。\n\
    \n如果你的应用程序使用这些特定的图标名称（并从“主题”加载图标），那么在Linux上，你的应用程序将使用桌面上当前启用的图标集。这里的目标是确保所有应用程序具有相同的外观和感觉，同时保持可配置性。\n\
    \n要在Qt Designer中使用这些图标，你需要选择下拉菜单并选择“从主题设置图标...”\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_217_0.png)\n\
    \n然后输入你想要使用的图标的**名称**，例如 `document-new`（参见[有效名称的完整列表](https://specifications.freedesktop.org/icon-naming-spec/latest/)）。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_218_0.png)\n\n图 101. 选择图标主题\n\n在代码中，你可以使用\
    \ `icon = QtGui.QIcon.fromTheme(\"document-new\")` 从活动的Linux桌面主题获取图标。以下代码片段生成一个带有“新建文档”图标的小窗口（按钮），该图标来自活动主题。\n\
    \n清单 74. icons/linux.py\n\n```\nfrom PySide2.QtWidgets import QApplication, QPushButton\n\
    from PySide2.QtGui import QIcon\n\nimport sys\n\napp = QApplication(sys.argv)\n\
    button = QPushButton(\"Hello\")\nicon = QIcon.fromTheme(\"document-new\")\nbutton.setIcon(icon)\n\
    button.show()\n\napp.exec_()\n```\n\n生成的窗口在Ubuntu上使用默认图标主题时将如下所示。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_219_0.png)\n\
    \n图 102. Linux Free Desktop 规范 \"document-new\" 图标\n\n如果你正在开发跨平台应用程序，你仍然可以在Linux上使用这些标准图标。为此，请为Windows和macOS使用你自己的图标，并在Qt\
    \ Designer中创建一个自定义主题，使用Free Desktop规范名称作为图标。\n\n# 19. Qt 样式表 (QSS)\n\n到目前为止，我们已经了解了如何使用\
    \ `QPalette` 为你的PySide2应用应用自定义颜色。然而，在Qt5中，你还可以对控件的外观进行许多其他自定义。提供此自定义功能的系统称为Qt样式表（QSS）。\n\
    \nQSS在概念上与用于设置网页样式的层叠样式表（CSS）非常相似，共享类似的语法和方法。在本节中，我们将看一些QSS示例以及如何使用它来修改控件外观。\n\
    \n> 在控件上使用QSS会对性能产生轻微影响，因为在重绘控件时需要查找相应的规则。然而，除非你进行非常繁重的控件工作，否则这不太可能产生影响。\n\n##\
    \ 样式编辑器\n\n为了使尝试QSS规则更容易一些，我们可以创建一个简单的演示应用，允许输入规则并将其应用于一些示例控件。我们将用它来测试各种样式属性和规则。\n\
    \n> 样式查看器的源代码如下所示，但它也包含在本书的源代码中。\n\n清单 75. themes/qss_tester.py\n\n```\nimport\
    \ sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtGui import QColor, QPalette\n\
    from PySide2.QtWidgets import (\n    QApplication,\n    QCheckBox,\n    QComboBox,\n\
    \    QLabel,\n    QLineEdit,\n    QMainWindow,\n    QPlainTextEdit,\n    QPushButton,\n\
    \    QSpinBox,\n    QVBoxLayout,\n    QWidget,\n)\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    QSS Tester\")\n\n        self.editor = QPlainTextEdit()\n        self.editor.textChanged.connect(self.update_styles)\n\
    \n        layout = QVBoxLayout()\n        layout.addWidget(self.editor)\n\n  \
    \      # Define a set of simple widgets.\n        cb = QCheckBox(\"Checkbox\"\
    )\n        layout.addWidget(cb)\n\n        combo = QComboBox()\n        combo.setObjectName(\"\
    thecombo\")\n        combo.addItems([\"First\", \"Second\", \"Third\", \"Fourth\"\
    ])\n        layout.addWidget(combo)\n\n        sb = QSpinBox()\n        sb.setRange(0,\
    \ 99999)\n        layout.addWidget(sb)\n\n        l = QLabel(\"This is a label\"\
    )\n        layout.addWidget(l)\n\n        le = QLineEdit()\n        le.setObjectName(\"\
    mylineedit\")\n        layout.addWidget(le)\n\n        pb = QPushButton(\"Push\
    \ me!\")\n        layout.addWidget(pb)\n\n        self.container = QWidget()\n\
    \        self.container.setLayout(layout)\n\n        self.setCentralWidget(self.container)\n\
    \n    def update_styles(self):\n        qss = self.editor.toPlainText()\n    \
    \    self.setStyleSheet(qss)\n\napp = QApplication(sys.argv)\napp.setStyle(\"\
    Fusion\")\n\nw = MainWindow()\nw.show()\n\napp.exec_()\n```\n\n运行此应用，你将看到以下窗口，顶部有一个文本编辑器（你可以在其中输入QSS规则），以及一组将应用这些规则的控件——我们稍后将了解应用规则和继承的工作原理。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_222_0.png)\n\n*图 103. QSS测试器应用，未应用规则。*\n\
    \n尝试在顶部的框中输入以下样式规则，并将结果与屏幕截图进行比较以确保其正常工作。"
