  - "[PAGE 252]\n\n```\nQMainWindow QComboBox {\n    background: yellow;\n}\n```\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_252_0.png)\n\nFigure 123. Targeting\
    \ a QComboBox which is a child of a QMainWindow\n\nTo target *all* descendants\
    \ you can use the global selector as the final element in the targeting. You can\
    \ also chain many types together to target only those places in your app where\
    \ that hierarchy exists.\n\n```\nQMainWindow QWidget * {\n    background: yellow;\n\
    }\n```\n\nIn our QSS tester application we have an outer QMainWindow, with a QWidget\
    \ central widget holding the layout, and then our widgets in that layout. The\
    \ rule above therefore matches only the individual widgets (which all have QMainWindow\
    \ QWidget as parents, in that order).)"
  - "[PAGE 253]\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_253_0.png)\n\nFigure 124.\
    \ Targeting a QComboBox which is a child of a QMainWindow\n\n# Child >\n\nYou\
    \ can also target a widget which is a *direct* child of another widget using the\
    \ `>` selector. This will only match where that exact hierarchy is in place.\n\
    \nFor example, the following will *only* target the `QWidget` container which\
    \ is a direct child of the `QMainWindow`.\n\n```\ncss\nQMainWindow > QWidget {\n\
    \    background: green;\n}\n```\n\nBut the following will not match anything,\
    \ since in our QSS app the `QComboBox` widget is *not* a direct child of the `QMainWindow`.\n\
    \n```\ncss\nQMainWindow > QComboBox { /* matches nothing */\n    background: yellow;\n\
    }\n```"
  - "[PAGE 254]\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_254_0.png)\n\nFigure 125.\
    \ Targeting a QComboBox which is a direct child of a QWidget\n\n# Inheritance\n\
    \nStyle sheets can be applied to `QApplication` and widgets and will apply to\
    \ the styled widget and all of its children. A widget's effective style sheet\
    \ is determined by combining the style sheets of all it's ancestors (parent, grandparent,\
    \ ...all the way up to the window) plus style sheets on `QApplication` itself.\n\
    \nRules are applied in order of *specificity*. That means, a rule which targets\
    \ a specific widget by ID, will override a rule which targets *all* widgets of\
    \ that type. For example, the following will set the background of the `QLineEdit`\
    \ in our QSS tester app to blue — the specific ID overrides the generic widget\
    \ rule.\n\n```\ncss\nQLineEdit#mylineedit {\n    background: blue;\n}\n\nQLineEdit\
    \ {\n    background: red;\n}\n```"
  - "[PAGE 255]\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_255_0.png)\n\nFigure 126.\
    \ Specific ID targeting overrules generic widget targeting.\n\nIn cases where\
    \ there are two conflicting rules the widgets' own style sheet will be preferred\
    \ over inherited styles, and nearer ancestors will be preferred over more distance\
    \ — parents will be preferred to grandparents for example.\n\n# No inherited properties\n\
    \nWidgets are only affected by rules which target them specifically. While rules\
    \ can be *set* on a parent, they must still reference the target widget to affect\
    \ it. Take the following rule —\n\n```\nQLineEdit {\n    background: red;\n}\n\
    ```\n\nIf set on a `QMainWindow` all `QLineEdit` objects in that window will have\
    \ a red background (assuming no other rules). However, if the following is set...\n\
    \n```\nQMainWindow {\n    background: red;\n}\n```\n\n...only the `QMainWindow`\
    \ itself will be set with a red background. The background"
  - '[PAGE 256]


    color *itself* does not propagate to child widgets.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_256_0.png)


    Figure 127. QSS properties do not propagate to children.


    > > If the child widgets have transparent backgrounds, the red *will* show through
    however.


    Unless targeted by a matching rule, a widget will use its default system style
    values for each property. Widgets do not inherit style properties from parent
    widgets, even inside compound widgets, and widgets must be targeted by rules directly
    to be affected by them.


    > > This is in contrast with CSS, where elements can inherit values from their
    parents.


    # # Pseudo-selectors


    So far we''ve looked at static styling, using properties to change the default
    appearance of a widget. However, QSS also allows you to style in response to dynamic
    widget states. An example of this is the highlight you see when buttons are hovered
    with the mouse — the highlight helps to indicate that the widget has focus and
    will respond if you click it.


    There are many other uses for active styling, from usability (highlighting lines
    of'
  - '[PAGE 257]


    data, or specific tabs) to visualizing data hierarchies. These can all be achieved
    using *pseudo-selectors* in QSS. Pseudo-selectors make QSS rules apply only in
    particular circumstances.


    There are a lot of different pseudo selectors which you can apply to widgets.
    Some such as `:hover` are generic and can be used with all widgets, others are
    widget-specific. The full list is given below —


    | Pseudo-State | Description |

    | :--- | :--- |

    | `:active` | Widget is part of an active window. |

    | `:adjoins-item` | The `::branch` of a `QTreeView` is adjacent to an item. |

    | `:alternate` | Set for every alternate row when painting the row of a `QabstractItemView`
    (`QabstractItemView.alternatingRowColors()` is `True`) |

    | `:bottom` | Positioned at the bottom, e.g. a `QTabBar` that has its tabs at
    the bottom. |

    | `:checked` | Item is checked, e.g. the checked state of `QAbstractButton`. |

    | `:closable` | Items can be closed, e.g. a `QDockWidget` has `QDockWidget.DockWidgetClosable`
    enabled. |

    | `:closed` | Item is in the closed state, e.g. an non-expanded item in a `QtreeView`.
    |

    | `:default` | Item is the default action, e.g. a default `QPushButton` or a default
    action in a `QMenu`. |

    | `:disabled` | Item is disabled. |

    | `:editable` | `QcomboBox` is editable. |

    | `:enabled` | Item is enabled. |

    | `:exclusive` | Item is part of an exclusive item group, e.g. a menu item in
    a exclusive `QActionGroup`. |'
