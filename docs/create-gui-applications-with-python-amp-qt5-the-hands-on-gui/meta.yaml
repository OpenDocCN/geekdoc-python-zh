    \n```\ndef oh_no(self):\n    for n in range(5):\n        QApplication.processEvents()\n\
    \        time.sleep(1)\n```\n\nNow when you push the button your code is entered\
    \ as before. However, now `QApplication.processEvents()` intermittently passes\
    \ control back to Qt, and allows it to respond to OS events as normal. Qt will\
    \ now accept events *and handle them* before returning to run the remainder of\
    \ your code.\n\nThis works, but it's horrible for a couple of reasons.\n\nFirstly,\
    \ when you pass control back to Qt, your code is no longer running. This means\
    \ that whatever long-running thing you're trying to do will take *longer*. That\
    \ is probably not what you want.\n\nSecondly, processing events outside the main\
    \ event loop causes your application to branch off into handling code (e.g. for\
