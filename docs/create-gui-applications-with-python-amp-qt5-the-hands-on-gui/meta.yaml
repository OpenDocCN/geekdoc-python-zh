    we are using the built-in Qt `QDial` component for the dial, while drawing the
    power bar ourselves. We then assemble these two parts together into a parent widget
    which can be dropped into place seamlessly in any application, without needing
    to know how it''s put together. The resulting widget provides the common `QAbstractSlider`
    interface with some additions for configuring the bar display.


    After following this example you will be able to build your very own custom widgets
    — whether they are compounds of built-ins or completely novel self-'
