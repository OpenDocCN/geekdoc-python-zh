    The icon for the central widget shows the current layout applied. Initially it
    has a red circle-cross through it, showing that there is no layout active. Right
    click on the `QMainWindow` object, and find ''Layout'' in the resulting dropdown.'
- md: "## Loading your .ui file in Python\n\nTo load a UI file you can use the `QUiLoader`\
    \ available with PySide2.\n\nListing 68. designer/example_1.py\n\n```python\n\
    import sys\n\nfrom PySide2 import QtWidgets\nfrom PySide2.QtUiTools import QUiLoader\n\
    \nloader = QUiLoader()\n\napp = QtWidgets.QApplication(sys.argv)\nwindow = loader.load(\"\
    mainwindow.ui\", None)\nwindow.show()\napp.exec_()\n```\n\nAs the `loader.load()`\
    \ method turns an instance object you cannot attach custom `__init__()` code.\
    \ You can however handle this through a custom setup function as shown below.\n\
    \nListing 69. designer/example_2.py\n\n```python\nimport sys\n\nfrom PySide2 import\
    \ QtWidgets\nfrom PySide2.QtUiTools import QUiLoader\n\nloader = QUiLoader()\n\
    \ndef mainwindow_setup(w):\n    w.setWindowTitle(\"MainWindow Title\")\n\napp\
    \ = QtWidgets.QApplication(sys.argv)\nwindow = loader.load(\"mainwindow.ui\",\
    \ None)\nmainwindow_setup(window)\nwindow.show()\napp.exec_()\n```\n\nAnother\
    \ alternative is to create a wrapper class and load the UI inside that. The main\
    \ window itself is stored as `self.ui` — you can safely hook signals from this\
    \ to methods on your wrapper class.\n\nListing 70. designer/example_3.py\n\n```python\n\
    import sys\n\nfrom PySide2 import QtCore, QtWidgets\nfrom PySide2.QtUiTools import\
    \ QUiLoader\n\nloader = QUiLoader()\n\nclass MainUI(QtCore.QObject):  # Not a\
    \ widget.\n    def __init__(self):\n        super().__init__()\n        self.ui\
    \ = loader.load(\"mainwindow.ui\", None)\n        self.ui.setWindowTitle(\"MainWindow\
    \ Title\")\n        self.ui.show()\n\napp = QtWidgets.QApplication(sys.argv)\n\
    ui = MainUI()\napp.exec_()\n```\n\n## Converting your .ui file to Python\n\nTo\
    \ generate a Python output file we can use the PySide2 command line utility `pyside2-uic`.\
    \ We run this, passing in the filename of the `.ui` file and the target file for\
    \ output, with a `-o` parameter. The following will generate a Python file named\
    \ `MainWindow.py` which contains our created UI. I use CamelCase on the filename\
    \ to remind myself that it is a PySide2 class file.\n\n```\npyside2-uic mainwindow.ui\
    \ -o MainWindow.py\n```\n\nYou can open the resulting `MainWindow.py` file in\
    \ an editor to take a look, although you should *not* edit this file — if you\
    \ do, any changes will be lost if you regenerate the UI from *Qt Designer*. The\
    \ power of using *Qt Designer* is being able to edit and update your application\
    \ as you go.\n\n## Building your application\n\nImporting the resulting Python\
    \ file works as for any other. You can import your class as follows. The `pyside2-uic`\
    \ tool appends `Ui_` to the name of the object defined in *Qt Designer*, and it\
    \ is this object you want to import.\n\n```\nfrom MainWindow import Ui_MainWindow\n\
    ```\n\nTo create the main window in your application, create a class as normal\
    \ but subclassing from both `QMainWindow` and your imported `Ui_MainWindow` class.\
    \ Finally, call `self.setupUi(self)` from within the `__init__` to trigger the\
    \ setup of the interface.\n\n```python\nclass MainWindow(QMainWindow, Ui_MainWindow):\n\
    \    def __init__(self, *args, obj=None, **kwargs):\n        super(MainWindow,\
    \ self).__init__(*args, **kwargs)\n        self.setupUi(self)\n```\n\nThat's it.\
    \ Your window is now fully set up.\n\n## Adding application logic\n\nYou can interact\
    \ with widgets created through *Qt Designer* just as you would those created with\
    \ code. To make things simpler, `pyside2-uic` adds all widgets to the window object.\n\
    \n> The name used for objects can be found through *Qt Designer*. Simply click\
    \ on it in the editor window, and then look for objectName in the properties panel.\n\
    \nIn the following example we use the generated main window class to build a working\
    \ application.\n\nListing 71. designer/compiled_example.py\n\n```python\nimport\
    \ random\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import QApplication, QMainWindow\n\nfrom MainWindow import Ui_MainWindow\n\n\
    class MainWindow(QMainWindow, Ui_MainWindow):\n    def __init__(self):\n     \
    \   super().__init__()\n        self.setupUi(self)\n        self.show()\n\n  \
    \      # You can still override values from your UI file within your code,\n \
    \       # but if possible, set them in Qt Creator. See the properties panel.\n\
    \        f = self.label.font()\n        f.setPointSize(25)\n        self.label.setAlignment(Qt.AlignHCenter\
    \ | Qt.AlignVCenter)\n        self.label.setFont(f)\n\n        # Signals from\
    \ UI widgets can be connected as normal.\n        self.pushButton.pressed.connect(self.update_label)\n\
    \n    def update_label(self):\n        n = random.randint(1, 6)\n        self.label.setText(\"\
    %d\" % n)\n\napp = QApplication(sys.argv)\nw = MainWindow()\napp.exec_()\n```\n\
    \nNotice that because we haven't set font size and alignment in the Qt Designer\
    \ .ui definition, we must do so manually with code. You can change any widget\
    \ parameters in this way, just as before. However, it is usually better to configure\
    \ these things within *Qt Designer* itself.\n\nYou can set any widget properties\
    \ through the properties panel on the bottom right of the window. Most widget\
    \ properties are exposed here, for example, below we are updating the font size\
    \ on the `QLabel` widget —\n\n*Figure 84. Setting the font size for the QLabel.*\n\
    \nYou can also configure alignment. For compound properties (where you can set\
    \ multiple values, such as left + middle) they are nested.\n\n*Figure 85. Detailed\
    \ font properties.*\n\nAll object properties are able to be edited from both places—it’s\
    \ up to you whether you make a particular modification in code or in *Qt Designer*.\
    \ As a general rule, it makes sense to keep *dynamic* changes in your code and\
    \ the base or default state in your designed UI.\n\nThis introduction has only\
    \ scratched the surface of what *Qt Designer* is capable of. I highly recommend\
    \ you dig a little deeper and experiment — remember you can still add or adjust\
    \ widgets from code afterwards.\n\n## Aesthetics\n\nIf you're not a designer,\
    \ it can be hard to create *beautiful* interfaces, or even know what they are.\
    \ Thankfully there are simple rules you can follow to create interfaces that,\
    \ if not *beautiful* at least won't be *ugly*. The key concepts are — alignment,\
    \ groups and space.\n\n**Alignment** is about reducing visual noise. Think of\
    \ the corners of widgets as *alignment points* and aim to minimize the number\
    \ of *unique* alignment points in the UI. In practice, this means making sure\
    \ the edges of elements in the interface *line up* with one another.\n\n*Figure\
    \ 86. The effect of alignment of interface clarity.*\n\n> If you have differently\
    \ sized inputs, align the edge you read *from*. English is a left-to-right language,\
    \ so if your app is in English align the left.\n\n**Groups** of related widgets\
    \ gain context making them easier to *understand*. Structure your interface so\
    \ related things are found together.\n\n**Space** is key to creating visually\
    \ distinct regions in your interface — without space between groups, there are\
    \ no groups! Keep spacing consistent and meaningful."
