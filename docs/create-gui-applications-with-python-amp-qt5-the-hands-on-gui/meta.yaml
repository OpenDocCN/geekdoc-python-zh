  md: "# 25. Routing\n\nIn building maintainable software a good rule of thumb is\
    \ that a function should do *one thing* and *only* one thing. This makes more\
    \ readable and more maintainable code — it becomes easier to reason about what\
    \ a function should be doing and spot bugs.\n\nIt can at times feel like Qt is\
    \ actively working against you achieving this — there are many methods that receive\
    \ multiple types of events, or states, and must handle them all. There is a good\
    \ chance your PySide2 application uses code like the following, with nested ifs\
    \ and long function bodies.\n\nListing 119. further/routing_1.py\n\n```\nimport\
    \ sys\n\nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtWidgets import QApplication,\
    \ QLabel, QMainWindow\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n        self.label = QLabel(\"Click in this window\"\
    )\n        self.status = self.statusBar()\n        self.setFixedSize(QSize(200,\
    \ 100))\n        self.setCentralWidget(self.label)\n\n    def mouseMoveEvent(self,\
    \ e):\n        self.label.setText(\"mouseMoveEvent\")\n\n    def mousePressEvent(self,\
    \ e):\n        button = e.button()\n        if button == Qt.LeftButton:\n    \
    \        self.label.setText(\"mousePressEvent LEFT\")\n            if e.x() <\
    \ 100:\n                self.status.showMessage(\"Left click on left\")\n    \
    \            self.move(self.x() - 10, self.y())\n            else:\n         \
    \       self.status.showMessage(\"Left click on right\")\n```"
