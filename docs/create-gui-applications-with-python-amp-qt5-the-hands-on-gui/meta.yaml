    However, there is another plotting library for Python which is used far more widely,
    and which offers a richer assortment of plots — [Matplotlib](https://matplotlib.org/).
    If you''re migrating an existing data analysis tool to a PySide2 GUI, or if you
    simply want to have access to the array of plot abilities that Matplotlib offers,
    then you''ll want to know how to include Matplotlib plots within your application.


    In this chapter we''ll cover how to embed Matplotlib plots in your PySide2 applications


    > Many other Python libraries — such as [seaborn](https://seaborn.pydata.org/)
    and [pandas](https://pandas.pydata.org/) — make use of Matplotlib for plotting.
    These plots can be embedded in PySide2 in the same way shown here, and the reference
    to the axes passed when plotting. There is a pandas example at the end of this
    chapter.


