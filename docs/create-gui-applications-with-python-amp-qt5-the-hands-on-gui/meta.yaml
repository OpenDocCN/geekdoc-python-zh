    \n### 安装Matplotlib\n\n以下示例假设你已经安装了Matplotlib。如果没有，你可以使用 `pip` 安装它。\n\n```\npip\
    \ install matplotlib\n```\n\n### 一个简单的例子\n\n以下最小示例设置了一个Matplotlib画布 `FigureCanvasQTAgg`，它创建了\
