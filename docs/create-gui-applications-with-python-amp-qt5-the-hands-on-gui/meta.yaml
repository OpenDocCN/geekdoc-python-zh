  md: '# # 29. Bitmap Graphics in Qt


    The first step towards creating custom widgets in PySide2 is understanding bitmap
    (pixel-based) graphic operations. All standard widgets draw themselves as bitmaps
    on a rectangular "canvas" that forms the shape of the widget. Once you understand
    how this works you can draw any custom widget you like!


    INFO: Bitmaps are rectangular grids of *pixels*, where each pixel (and its color)
    is represented by a number of "bits". They are distinct from vector graphics,
    where the image is stored as a series of line (or *vector*) drawing shapes which
    are used to form the image. If you''re viewing vector graphics on your screen
    they are being *rasterised* — converted into a bitmap image — to be displayed
    as pixels on the screen.


    In this tutorial we''ll take a look at `QPainter`, Qt''s API for performing bitmap
    graphic operations and the basis for drawing your own widgets. We''ll go through
    some basic drawing operations and finally put it all together to create our own
    little Paint app.


    # ## QPainter


    Bitmap drawing operations in Qt are handled through the `QPainter` class. This
    is a generic interface which can be used to draw on various *surfaces* including,
    for example, `QPixmap`. In this chapter we''ll look at the `QPainter` drawing
    methods, first using primitive operations on a `QPixmap` surface, and then building
    a simple Paint application using what we''ve learnt.


    To make this easy to demonstrate we''ll be using the following stub application
    which handles creating our container (a `QLabel`) creating a pixmap canvas, setting
    that into the container and adding the container to the main window.'
