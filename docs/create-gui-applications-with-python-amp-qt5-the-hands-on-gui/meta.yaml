  - "[PAGE 276]\n\n# # Model View Architecture\n\n> > ...with proper design, the features\
    \ come cheaply.\n> \n> — Dennis Ritchie\n\nAs you start to build more complex\
    \ applications with PySide2 you'll likely come across issues keeping widgets in\
    \ sync with your data.\n\nData stored in widgets (e.g. a simple `QListWidget`)\
    \ is not easy to manipulate from Python — changes require you to get an item,\
    \ get the data, and then set it back. The default solution to this is to keep\
    \ an external data representation in Python, and then either duplicate updates\
    \ to the both the data and the widget, or simply rewrite the whole widget from\
    \ the data. As you start to work with larger data this approach can start to have\
    \ performance impacts on your application.\n\nThankfully Qt has a solution for\
    \ this — ModelViews. ModelViews are a powerful alternative to the standard display\
    \ widgets, which use a standardized model interface to interact with data sources\
    \ — from simple data structures to external databases. This isolates your data,\
    \ meaning you can keep it in any structure you like, while the view takes care\
    \ of presentation and updates.\n\nThis chapter introduces the key aspects of Qt's\
    \ ModelView architecture and uses it to build a simple desktop Todo application\
    \ in PySide2."
  - '[PAGE 277]


    # 20. The Model View Architecture — Model View Controller


    *Model–View–Controller* (MVC) is an architectural pattern used for developing
    user interfaces. It divides an application into three interconnected parts, separating
    the internal representation of data from how it is presented to and accepted from
    the user.


    The MVC pattern splits the interface into the following components —


    +   - **Model** holds the data structure which the app is working with.

    - **View** is any representation of information as shown to the user, whether
    graphical or tables. Multiple views of the same data are allowed.

    - **Controller** accepts input from the user, transforms it into commands and
    applies these to the model or view.


    In Qt land the distinction between the View & Controller gets a little murky.
    Qt accepts input events from the user via the OS and delegates these to the widgets
    (Controller) to handle. However, widgets also handle presentation of their own
    state to the user, putting them squarely in the View. Rather than agonize over
    where to draw the line, in Qt-speak the View and Controller are instead merged
    together creating a Model/ViewController architecture — called "Model View" for
    simplicity.'
  - '[PAGE 278]


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_278_0.png)


    Model View Controller architecture


    Qt''s Model/Views architecture


    Figure 140. Comparing the MVC model and the Qt Model/View architecture.


    Importantly, the distinction between the *data* and *how it is presented* is preserved.


    # The Model View


    The Model acts as the interface between the data store and the ViewController.
    The Model holds the data (or a reference to it) and presents this data through
    a standardized API which Views then consume and present to the user. Multiple
    Views can share the same data, presenting it in completely different ways.


    You can use any "data store" for your model, including for example a standard
    Python list or dictionary, or a database (via Qt itself, or SQLAlchemy) — it''s
    entirely up to you.


    The two parts are essentially responsible for —


    +   1. The **model** stores the data, or a reference to it and returns individual
    or ranges of records, and associated metadata or *display* instructions.

    2. The **view** requests data from the model and displays what is returned on
    the widget.'
