  - '[PAGE 718]


    > For more information in using Qt Designer with either PyQt5 or PySide2 see the
    Qt Creator chapter.


    # exec() or exec_()


    The `.exec()` method is used in Qt to start the event loop of your `QApplication`
    or dialog boxes. In Python 2.7 `exec` was a keyword, meaning it could not be used
    for variable, function or method names. The solution used in both PyQt4 and PySide
    was to rename uses of `.exec` to `.exec_()` to avoid this conflict.


    Python 3 removed the `exec` keyword, freeing the name up to be used. As PyQt5
    targets only Python 3 it could remove the workaround, and `.exec()` calls are
    named just as in Qt itself. However, the `.exec_()` names are maintained for backwards
    compatibility.


    PySide2 is available on both Python 3 and Python 2.7 and so still uses `.exec_()`.
    It is however only available for 64bit Linux and macOS.


    If you''re targeting both PySide2 and PyQt5 use `.exec_()`


    # Slots and Signals


    Defining custom slots and signals uses slightly different syntax between the two
    libraries. PySide2 provides this interface under the names `Signal` and `Slot`
    while PyQt5 provides these as `pyqtSignal` and `pyqtSlot` respectively. The behavior
    of them both is identical for defining and slots and signals.


    The following PyQt5 and PySide2 examples are identical —


    ```

    my_custom_signal = pyqtSignal()  # PyQt5

    my_custom_signal = Signal()  # PySide2


    my_other_signal = pyqtSignal(int)  # PyQt5

    my_other_signal = Signal(int)  # PySide2

    ```'
  - "[PAGE 719]\n\nOr for a slot —\n\n```\n@pyqtslot\ndef my_custom_slot():\n    pass\n\
    \n@Slot\ndef my_custom_slot():\n    pass\n```\n\nIf you want to ensure consistency\
    \ across PyQt5 and PySide2 you can use the following import pattern for PyQt5\
    \ to use the `Signal` and `@Slot` style there too.\n\n```\nfrom PyQt5.QtCore import\
    \ pyqtSignal as Signal, pyqtSlot as Slot\n```\n\n> You could of course do the\
    \ reverse `from PySide2.QtCore import Signal as pyqtSignal, Slot as pyqtSlot`\
    \ although that’s a bit confusing.\n\n# Supporting both in libraries\n\n> You\
    \ don’t need to worry about this if you’re writing a standalone app, just use\
    \ whichever API you prefer.\n\nIf you’re writing a library, widget or other tool\
    \ you want to be compatible with both PyQt5 and PySide2 you can do so easily by\
    \ adding both sets of imports."
  - "[PAGE 720]\n\n```\npython\nimport sys\n\nif 'PyQt5' in sys.modules:\n    # PyQt5\n\
    \    from PyQt5 import QtGui, QtWidgets, QtCore\n    from PyQt5.QtCore import\
    \ pyqtSignal as Signal, pyqtSlot as Slot\n\nelse:\n    # PySide2\n    from PySide2\
    \ import QtGui, QtWidgets, QtCore\n    from PySide2.QtCore import Signal, Slot\n\
    ```\n\nThis is the approach used in our custom widgets library, where we support\
    \ for PyQt5 and PySide2 with a single library import. The only caveat is that\
    \ you must ensure PyQt5 is imported before (as in on the line above or earlier)\
    \ when importing this library, to ensure it is in `sys.modules`.\n\n> \U0001F4A1\
    \ An alternative would be to use an environment variable to switch between them\
    \ — see QtPy later.\n\nIf you're doing this in multiple files it can get a bit\
    \ cumbersome. A nice solution to this is to move the import logic to its own file,\
    \ e.g. named `qt.py` in your project root. This module imports the Qt modules\
    \ (`QtCore`, `QtGui`, `QtWidgets`, etc.) from one of the two libraries, and then\
    \ you import into your application from there.\n\nThe contents of the `qt.py`\
    \ are the same as we used earlier —"
  - "[PAGE 721]\n\n```\npython\nimport sys\n\nif 'PyQt5' in sys.modules:\n    # PyQt5\n\
    \    from PyQt5 import QtGui, QtWidgets, QtCore\n    from PyQt5.QtCore import\
    \ pyqtSignal as Signal, pyqtSlot as Slot\n\nelse:\n    # PySide2\n    from PySide2\
    \ import QtGui, QtWidgets, QtCore\n    from PySide2.QtCore import Signal, Slot\n\
    ```\n\nYou must remember to add any other PyQt5 modules you use (browser, multimedia,\
    \ etc.) in both branches of the if block. You can then import **Qt5** into your\
    \ own application as follows —\n\n```\npython\nfrom .qt import QtGui, QtWidgets,\
    \ QtCore\n```\n\n...and it will work seamlessly across either library.\n\n# #\
    \ QtPy\n\nIf you need to target more than just Qt5 support (e.g. including PyQt4\
    \ and PySide v1) take a look at [QtPy](https://github.com/spyder-ide/qtpy). This\
    \ provides a standardized PySide2-like API for PyQt4, PySide, PyQt5 and PySide2.\
    \ Using QtPy you can control which API to load from your application using the\
    \ `QT_API` environment variable e.g.\n\n```\npython\nimport os\nos.environ['QT_API']\
    \ = 'pyside2'\nfrom qtpy import QtGui, QtWidgets, QtCore  # imports PySide2.\n\
    ```\n\n# # That's really it\n\nThere's not much more to say — the two libraries\
    \ really are that similar. However, if you do stumble across any other PyQt5/PySide2\
    \ examples or features"
