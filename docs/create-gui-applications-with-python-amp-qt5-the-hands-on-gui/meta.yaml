  md: '# 23. Querying SQL databases with Qt models


    So far we''ve used table models to access data loaded or stored in the application
    itself—from simple lists of lists to *numpy* and *pandas* tables. However, all
    of these approaches have in common that the data that you are viewing must be
    loaded entirely into memory.


    To simplify interaction with SQL databases Qt provides a number of SQL models
    which can be connected to views to display the output of SQL queries, or database
    tables. In this chapter we''ll look at two alternatives—displaying database data
    in a `QTableView` and with `QDataWidgetMapper` which allows you to map database
    fields to Qt widgets.


    Which model you use depends on whether you want read-only access to a database,
    read-write access or read-only access with relationships (querying more than one
    table). In the next sections we''ll look at each of those options in turn.


