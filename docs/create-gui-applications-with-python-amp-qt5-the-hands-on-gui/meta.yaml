    We''ll step through the changes.


    First we import the toolbar widget from `matplotlib.backends.backend_qt5agg.NavigationToolbar2QT`
    renaming it with the simpler name `NavigationToolbar`. We create an instance of
    the toolbar by calling `NavigationToolbar` with two parameters, first the canvas
