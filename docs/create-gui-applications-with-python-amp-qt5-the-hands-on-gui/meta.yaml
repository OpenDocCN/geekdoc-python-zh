- md: "## Styling properties\n\nNext we'll go through the properties available to\
    \ style widgets with QSS. These have been broken down into logical sections, containing\
    \ properties that are related to one another to make it easier to digest. You\
    \ can use the QSS rule tester app we just created to test these styles out on\
    \ the various widgets.\n\nThe types used in the following tables are listed below.\
    \ Some of these are compound types, made up of other entries.\n\n> You can skip\
    \ over this table for now, but will need it as a reference for interpreting the\
    \ valid values for each property.\n\n| Property | Type | Description |\n| :---\
    \ | :--- | :--- |\n| Alignment | top \\| bottom \\| left \\| right \\| center\
    \ | Horizontal and/or vertical alignment. |\n| Attachment | scroll \\| fixed |\
    \ Scroll or fixed attachment. |\n| Background | Brush \\| Url \\| Repeat \\| Alignment\
    \ | Compound type of Brush, Url, Repeat, and Alignment. |\n| Boolean | 0 \\| 1\
    \ | True (1) or False (0). |\n| Border | Border Style \\| Length \\| Brush | Shorthand\
    \ border property. |\n| Border Image | none \\| Url Number (stretch \\| repeat)\
    \ | An image composed of nine parts (top left, top center, top right, center left,\
    \ center, center right, bottom left, bottom center, and bottom right). |\n| Border\
    \ Style | dashed \\| dot-dash \\| dot-dot-dash \\| dotted \\| double \\| groove\
    \ \\| inset \\| outset \\| ridge \\| solid \\| none | The pattern used to draw\
    \ a border. |\n| Box Colors | Brush | Up to four values of Brush, specifying the\
    \ top, right, bottom, and left edges of a box, respectively. If the left color\
    \ is omitted will use right, if bottom is omitted will use top. |\n| Box Lengths\
    \ | Length | Up to four values of Length, specifying the top, right, bottom, and\
    \ left edges of a box, respectively. If the left color is omitted will use right,\
    \ if bottom is omitted will use top. |\n| Brush | Color \\| Gradient \\| PaletteRole\
    \ | A Color, Gradient or an entry in the Palette. |\n| Color | rgb(r,g,b) \\|\
    \ rgba(r,g,b,a) \\| hsv(h,s,v) \\| hsva(h,s,v,a) \\| hsl(h,s,l) \\| hsla(h,s,l,a)\
    \ \\| #rrggbb \\| Color Name | Specifies a color as RGB (red, green, blue), RGBA\
    \ (red, green, blue, alpha), HSV (hue, saturation, value), HSVA (hue, saturation,\
    \ value, alpha), HSL (hue, saturation, lightness), HSLA (hue, saturation, lightness,\
    \ alpha) or a named color. The rgb() or rgba() syntax can be used with integer\
    \ values between 0 and 255, or with percentages. |\n| Font | (Font Style \\| Font\
    \ Weight) Font Size | Shorthand font property. |\n| Font Size | Length | The size\
    \ of a font. |\n| Font Style | normal \\| italic \\| oblique | The style of a\
    \ font. |\n| Font Weight | normal \\| bold \\| 100 \\| 200... \\| 900 | The weight\
    \ of a font. |\n| Gradient | qlineargradient \\| qradialgradient \\| qconicalgradient\
    \ | Lineargradients between start and end points. Radialgradients between a focal\
    \ point and end points on a circle surrounding it. Conical gradients around a\
    \ center point. See the [QLinearGradient documentation](https://doc.qt.io/qt-6/qlineargradient.html)\
    \ for syntax. |\n| Icon | Url(disabled \\| active \\| normal \\| selected) (on\
    \ \\| off) | A list of url, QIcon.Mode and QIcon.State. e.g. `file-icon: url(file.png),\
    \ url(file_selected.png) selected;` |\n| Length | Number(px \\| pt \\| em \\|\
    \ ex) | A number followed by a measurement unit. If no unit is given, uses pixels\
    \ in most contexts. One of px: pixels, pt: the size of one point (i.e., 1/72 of\
    \ an inch), em: the em width of the font (i.e., the width of 'M'), ex: the ex\
    \ width of the font (i.e., the height of 'x') |\n| Number | A decimal integer\
    \ or a real number | e.g. 123, or 12.2312 |\n| Origin | margin \\| border \\|\
    \ padding \\| content | See box model for more details. |\n| PaletteRole | alternate-base\
    \ \\| base \\| bright-text \\| button \\| button-text \\| dark \\| highlight \\\
    | highlighted-text \\| light \\| link \\| link-visited \\| mid \\| midlight \\\
    | shadow \\| text \\| window \\| window-text | These values correspond the Color\
    \ roles in the widget's QPalette, e.g. `color: palette(dark);` |\n| Radius | Length\
    \ | One or two occurrences of Length. |\n| Repeat | repeat-x \\| repeat-y \\|\
    \ repeat \\| no-repeat | repeat-x: Repeat horizontally. repeat-y: Repeat vertically.\
    \ repeat: Repeat horizontally and vertically. no-repeat: Don't repeat. |\n| Url\
    \ | url(filename) | filename is the name of a file on disk or stored using the\
    \ Qt Resource System. |\n\nThe full details of these properties and types are\
    \ also [available in the QSS reference documentation](https://doc.qt.io/qt-5/stylesheet-reference.html).\n\
    \n## Text styles\n\nWe'll start with text properties which can be used to modify\
    \ fonts, colors and styles (bold, italic, underline) of text. These can be applied\
    \ to any widget or control.\n\n| Property | Type (Default) | Description |\n|\
    \ :--- | :--- | :--- |\n| color | Brush (QPalette Foreground) | The color used\
    \ to render text. |\n| `font` | Font | Shorthand notation for setting the text's\
    \ font. Equivalent to specifying font-family, font-size, font-style, and/or font-weight\
    \ |\n| `font-family` | String | The font family. |\n| `font-size` | Font Size\
    \ | The font size. In this version of Qt, only pt and px metrics are supported.\
    \ |\n| `font-style` | normal \\| italic \\| oblique | The font style. |\n| `font-weight`\
    \ | Font Weight | The weight of the font. |\n| `selection-background-color` |\
    \ Brush (`QPalette::Highlight`) | The background of selected text or items. |\n\
    | `selection-color` | Brush (`Palette::HighlightedText`) | The foreground of selected\
    \ text or items. |\n| `text-align` | Alignment | The alignment of text and icon\
    \ within the contents of the widget. |\n| `text-decoration` | none \\| underline\
    \ \\| overline \\| line-through | Additional text effects |\n\nThe example snippet\
    \ below, sets the color on the `QLineEdit` to *red*, the background color for\
    \ selected text to *yellow* and the color of selected text to *blue*.\n\n```\n\
    QLineEdit {\n    color: red;\n    selection-color: blue;\n    selection-background-color:\
    \ yellow;\n}\n```\n\nTry this in the QSS tester to see the effect on the QLineEdit\
    \ and it will give the following result. Notice that only the targeted widget\
    \ (QLineEdit) is affected by the styles.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_230_0.png)\n\
    \nFigure 107. Applying text styles to a QLineEdit\n\nWe can apply this rule to\
    \ two distinct types of widgets by giving them both as the target, separated by\
    \ a comma.\n\n```\nQSpinBox, QLineEdit {\n    color: red;\n    selection-color:\
    \ blue;\n    selection-background-color: yellow;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_231_0.png)\n\
    \nFigure 108. Applying text styles to a QLineEdit & QSpinBox\n\nIn this final\
    \ example, we apply the styles to the `QSpinBox`, `QLineEdit` and `QPushButton`,\
    \ setting the font bold & italic and the text-align to **right**.\n\n```\nQSpinBox,\
    \ QLineEdit, QPushButton {\n    color: red;\n    selection-color: blue;\n    selection-background-color:\
    \ yellow;\n    font-style: italic;\n    font-weight: bold;\n    text-align: right;\n\
    }\n```\n\nThis produces the result shown below. Notice that the `text-align` property\
    \ has not affected the alignment of the `QSpinBox` or `QLineEdit`. For both these\
    \ widgets alignment must be set using the `.setAlignment()` method, rather than\
    \ styles."
  mdcn: "## 样式属性\n\n接下来，我们将介绍可用于通过 QSS 为控件设置样式的属性。这些属性已按逻辑部分划分，将相互关联的属性归为一类，以便于理解。你可以使用我们刚刚创建的\
    \ QSS 规则测试器应用，在各种控件上测试这些样式。\n\n下表中使用的类型如下所列。其中一些是复合类型，由其他条目组成。\n\n> 你现在可以跳过此表，但需要将其作为参考，以解释每个属性的有效值。\n\
    \n| 属性 | 类型 | 描述 |\n| :--- | :--- | :--- |\n| Alignment | top \\| bottom \\| left\
    \ \\| right \\| center | 水平和/或垂直对齐方式。 |\n| Attachment | scroll \\| fixed | 滚动或固定附着方式。\
    \ |\n| Background | Brush \\| Url \\| Repeat \\| Alignment | Brush、Url、Repeat\
    \ 和 Alignment 的复合类型。 |\n| Boolean | 0 \\| 1 | 真 (1) 或假 (0)。 |\n| Border | Border\
    \ Style \\| Length \\| Brush | 简写的边框属性。 |\n| Border Image | none \\| Url Number\
    \ (stretch \\| repeat) | 由九部分组成的图像（左上、上中、右上、左中、中心、右中、左下、下中、右下）。 |\n| Border Style\
    \ | dashed \\| dot-dash \\| dot-dot-dash \\| dotted \\| double \\| groove \\|\
    \ inset \\| outset \\| ridge \\| solid \\| none | 用于绘制边框的图案。 |\n| Box Colors |\
    \ Brush | 最多四个 Brush 值，分别指定盒子的上、右、下、左边缘。如果省略左侧颜色，则使用右侧颜色；如果省略底部颜色，则使用顶部颜色。 |\n\
    | Box Lengths | Length | 最多四个 Length 值，分别指定盒子的上、右、下、左边缘。如果省略左侧长度，则使用右侧长度；如果省略底部长度，则使用顶部长度。\
    \ |\n| Brush | Color \\| Gradient \\| PaletteRole | 一个 Color、Gradient 或 Palette\
    \ 中的条目。 |\n| Color | rgb(r,g,b) \\| rgba(r,g,b,a) \\| hsv(h,s,v) \\| hsva(h,s,v,a)\
    \ \\| hsl(h,s,l) \\| hsla(h,s,l,a) \\| #rrggbb \\| Color Name | 指定颜色为 RGB（红、绿、蓝）、RGBA（红、绿、蓝、透明度）、HSV（色调、饱和度、明度）、HSVA（色调、饱和度、明度、透明度）、HSL（色调、饱和度、亮度）、HSLA（色调、饱和度、亮度、透明度）或命名颜色。rgb()\
    \ 或 rgba() 语法可以使用 0 到 255 之间的整数值，或使用百分比。 |\n| Font | (Font Style \\| Font Weight)\
    \ Font Size | 简写的字体属性。 |\n| Font Size | Length | 字体的大小。 |\n| Font Style | normal\
    \ \\| italic \\| oblique | 字体的样式。 |\n| Font Weight | normal \\| bold \\| 100 \\\
    | 200... \\| 900 | 字体的粗细。 |\n| Gradient | qlineargradient \\| qradialgradient\
    \ \\| qconicalgradient | 起点和终点之间的线性渐变。焦点和围绕它的圆上的终点之间的径向渐变。围绕中心点的锥形渐变。语法请参阅 [QLinearGradient\
    \ 文档](https://doc.qt.io/qt-6/qlineargradient.html)。 |\n| Icon | Url(disabled \\\
    | active \\| normal \\| selected) (on \\| off) | 一个 url、QIcon.Mode 和 QIcon.State\
    \ 的列表。例如 `file-icon: url(file.png), url(file_selected.png) selected;` |\n| Length\
    \ | Number(px \\| pt \\| em \\| ex) | 一个数字后跟一个度量单位。如果未指定单位，在大多数上下文中使用像素。px：像素，pt：磅的大小（即\
    \ 1/72 英寸），em：字体的 em 宽度（即 'M' 的宽度），ex：字体的 ex 宽度（即 'x' 的高度） |\n| Number | 十进制整数或实数\
    \ | 例如 123 或 12.2312 |\n| Origin | margin \\| border \\| padding \\| content |\
    \ 更多详情请参阅盒模型。 |\n| PaletteRole | alternate-base \\| base \\| bright-text \\| button\
    \ \\| button-text \\| dark \\| highlight \\| highlighted-text \\| light \\| link\
    \ \\| link-visited \\| mid \\| midlight \\| shadow \\| text \\| window \\| window-text\
    \ | 这些值对应于控件 QPalette 中的颜色角色，例如 `color: palette(dark);` |\n| Radius | Length |\
    \ 一个或两个 Length 值。 |\n| Repeat | repeat-x \\| repeat-y \\| repeat \\| no-repeat\
    \ | repeat-x：水平重复。repeat-y：垂直重复。repeat：水平和垂直重复。no-repeat：不重复。 |\n| Url | url(filename)\
    \ | filename 是磁盘上的文件名或使用 Qt 资源系统存储的文件名。 |\n\n这些属性和类型的完整详细信息也可在 [QSS 参考文档](https://doc.qt.io/qt-5/stylesheet-reference.html)中找到。\n\
    \n## 文本样式\n\n我们将从文本属性开始，这些属性可用于修改文本的字体、颜色和样式（粗体、斜体、下划线）。它们可以应用于任何控件或部件。\n\n| 属性\
    \ | 类型（默认值） | 描述 |\n| :--- | :--- | :--- |\n| color | Brush (QPalette Foreground)\
    \ | 用于渲染文本的颜色。 |\n| `font` | Font | 设置文本字体的简写表示法。等同于指定 font-family、font-size、font-style\
    \ 和/或 font-weight |\n| `font-family` | String | 字体族。 |\n| `font-size` | Font Size\
    \ | 字体大小。在此版本的 Qt 中，仅支持 pt 和 px 度量。 |\n| `font-style` | normal \\| italic \\|\
    \ oblique | 字体样式。 |\n| `font-weight` | Font Weight | 字体的粗细。 |\n| `selection-background-color`\
    \ | Brush (`QPalette::Highlight`) | 选中文本或项目的背景色。 |\n| `selection-color` | Brush\
    \ (`Palette::HighlightedText`) | 选中文本或项目的前景色。 |\n| `text-align` | Alignment |\
    \ 控件内容中文本和图标的对齐方式。 |\n| `text-decoration` | none \\| underline \\| overline \\\
    | line-through | 附加的文本效果 |\n\n下面的示例代码片段，将 `QLineEdit` 的颜色设置为*红色*，选中文本的背景色设置为*黄色*，选中文本的颜色设置为*蓝色*。\n\
    \n```\nQLineEdit {\n    color: red;\n    selection-color: blue;\n    selection-background-color:\
    \ yellow;\n}\n```\n\n在 QSS 测试器中尝试此操作，以查看对 QLineEdit 的影响，它将产生以下结果。请注意，只有目标控件（QLineEdit）受到样式的影响。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_230_0.png)\n\n图 107. 将文本样式应用于 QLineEdit\n\
    \n我们可以通过将两种不同类型的控件都作为目标（用逗号分隔）来将此规则应用于它们。\n\n```\nQSpinBox, QLineEdit {\n    color:\
    \ red;\n    selection-color: blue;\n    selection-background-color: yellow;\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_231_0.png)\n\n图 108. 将文本样式应用于\
    \ QLineEdit 和 QSpinBox\n\n在最后一个示例中，我们将样式应用于 `QSpinBox`、`QLineEdit` 和 `QPushButton`，将字体设置为粗体和斜体，并将\
    \ text-align 设置为**右对齐**。\n\n```\nQSpinBox, QLineEdit, QPushButton {\n    color:\
    \ red;\n    selection-color: blue;\n    selection-background-color: yellow;\n\
    \    font-style: italic;\n    font-weight: bold;\n    text-align: right;\n}\n\
    ```\n\n这会产生如下所示的结果。请注意，`text-align` 属性并未影响 `QSpinBox` 或 `QLineEdit` 的对齐方式。对于这两个控件，必须使用\
    \ `.setAlignment()` 方法而不是样式来设置对齐方式。"
