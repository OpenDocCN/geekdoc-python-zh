  - '[PAGE 38]


    # 7. Widgets


    In Qt *widget* is the name given to a component of the UI that the user can interact
    with. User interfaces are made up of multiple widgets, arranged within the window.
    Qt comes with a large selection of widgets available, and even allows you to create
    your own custom widgets.


    In the code examples for the book there is a file `basic/widgets_list.py` which
    you can run to display a collection of widgets in a window. It uses a few complex
    tricks which we''ll cover later, so don''t worry about the code just now.


    > 🚀 **Run it!** You will see a window with multiple, interactive, widgets.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_38_0.png)


    *Figure 8. The example widgets app shown on Windows, macOS and Linux (Ubuntu).*'
  - '[PAGE 39]


    The widgets shown in the example are given below, from top to bottom.


    | Widget | What it does |

    | :--- | :--- |

    | `QCheckBox` | A checkbox |

    | `QComboBox` | A dropdown list box |

    | `QDateEdit` | For editing dates |

    | `QDateTimeEdit` | For editing dates and datetimes |

    | `QDial` | Rotatable dial |

    | `QDoubleSpinbox` | A number spinner for floats |

    | `QFontComboBox` | A list of fonts |

    | `QLCDNumber` | A quite ugly LCD display |

    | `QLabel` | Just a label, not interactive |

    | `QLineEdit` | Enter a line of text |

    | `QProgressBar` | A progress bar |

    | `QPushButton` | A button |

    | `QRadioButton` | A group with only one active choice |

    | `QSlider` | A slider |

    | `QSpinBox` | An integer spinner |

    | `QTimeEdit` | For editing times |


    There are far more widgets than this, but they don’t fit so well! For a full list
    see the [Qt documentation](https://doc.qt.io/qt-5/qtwidgets-index.html). Here
    we’re going to take a closer look at some of the most useful.


    > 💡 Load up a fresh copy of `myapp.py` and save it under a new name for this section.'
- md: "## QLabel\n\nWe'll start the tour with QLabel, arguably one of the simplest\
    \ widgets available in the Qt toolbox. This is a simple one-line piece of text\
    \ that you can position in your application. You can set the text by passing in\
    \ a string as you create it —\n\n```python\nwidget = QLabel(\"Hello\")\n```\n\n\
    Or, by using the `.setText()` method —\n\n```python\nwidget = QLabel(\"1\") #\
    \ The label is created with the text 1\nwidget.setText(\"2\") # The label now\
    \ shows 2\n```\n\nYou can also adjust font parameters, such as the size or alignment\
    \ of text in the widget.\n\nListing 13. basic/widgets_1.py\n\n```python\nimport\
    \ sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets import QApplication,\
    \ QLabel, QMainWindow\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n   \
    \     widget = QLabel(\"Hello\")\n        font = widget.font() ①\n        font.setPointSize(30)\n\
    \        widget.setFont(font)\n        widget.setAlignment(Qt.AlignHCenter | Qt.AlignVCenter)\
    \ ②\n\n        self.setCentralWidget(widget)\n\napp = QApplication(sys.argv)\n\
    \nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n① We get the *current*\
    \ font, using `<widget>.font()`, modify it and then apply it back. This ensures\
    \ the font face remains in keeping with the desktop conventions.\n\n② The alignment\
    \ is specified by using a flag from the `Qt.` namespace.\n\n> \U0001F680 **Run\
    \ it!** Adjust the font parameters and see the effect.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_42_0.png)\n\
    \nFigure 9. A QLabel on Windows, macOS and Ubuntu\n\n> The Qt namespace (Qt.)\
    \ is full of all sorts of attributes that you can use to customize and control\
    \ Qt widgets. We'll cover that in detail later in Enums & the Qt Namespace.\n\n\
    The flags available for horizontal alignment are —\n\n| Flag | Behavior |\n| :---\
    \ | :--- |\n| `Qt.AlignLeft` | Aligns with the left edge. |\n| `Qt.AlignRight`\
    \ | Aligns with the right edge. |\n| `Qt.AlignHCenter` | Centers horizontally\
    \ in the available space. |\n| `Qt.AlignJustify` | Justifies the text in the available\
    \ space. |\n\nThe flags available for vertical alignment are —\n\n| Flag | Behavior\
    \ |\n| :--- | :--- |\n| `Qt.AlignTop` | Aligns with the top. |\n| `Qt.AlignBottom`\
    \ | Aligns with the bottom. |\n| `Qt.AlignVCenter` | Centers vertically in the\
    \ available space. |\n\nYou can combine flags together using pipes (|), however\
    \ note that you can only use one vertical or horizontal alignment flag at a time.\n\
    \n```python\nalign_top_left = Qt.AlignLeft | Qt.AlignTop\n```\n\n> \U0001F680\
    \ **Run it!** Try combining the different alignment flags and seeing the effect\
    \ on text position.\n\n## Qt Flags\n\nNote that you use an **OR** pipe (`|`) to\
    \ combine the two flags by convention. The flags are non-overlapping *bitmasks*.\
    \ e.g. `Qt.AlignLeft` has the binary value `0b0001`, while `Qt.AlignBottom` is\
    \ `0b0100`. By ORing together we get the value `0b0101` representing 'bottom left'.\n\
    \nWe'll take a more detailed look at the Qt namespace and Qt flags later in [Enums\
    \ & the Qt Namespace](Enums & the Qt Namespace).\n\nFinally, there is also a shorthand\
    \ flag that centers in both directions simultaneously —\n\n| Flag | Behavior |\n\
    | :--- | :--- |\n| `Qt.AlignCenter` | Centers horizontally **and** vertically\
    \ |\n\nWeirdly, you can also use `QLabel` to display an image using the `.setPixmap()`\
    \ method. This accepts a *pixmap* (a pixel array), which you can create by passing\
    \ an image filename to `QPixmap`. In the example files provided with this book\
    \ you can find a file `otje.jpg` which you can display in your window as follows:\n\
    \nListing 14. basic/widgets_2a.py\n\n```python\nimport sys\n\nfrom PySide2.QtGui\
    \ import QPixmap\nfrom PySide2.QtWidgets import QApplication, QLabel, QMainWindow\n\
    \nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        widget = QLabel(\"Hello\"\
    )\n        widget.setPixmap(QPixmap(\"otje.jpg\"))\n\n        self.setCentralWidget(widget)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_45_0.png)\n\nFigure 10. Otje.\
    \ What a lovely face.\n\n> \U0001F680 **Run it!** Resize the window, and the image\
    \ will be surrounded by empty space.\n\nBy default the image scales while maintaining\
    \ its aspect ratio. If you want it to stretch and scale to fit the window completely\
    \ you can set `.setScaledContents(True)` on the `QLabel`.\n\nModify the code to\
    \ add `.setScaledContents(True)` to the label —\n\n*Listing 15. basic/widgets_2b.py*\n\
    \n```python\nwidget.setPixmap(QPixmap(\"otje.jpg\"))\nwidget.setScaledContents(True)\n\
    ```\n\n> \U0001F680 **Run it!** Resize the window and the picture will deform\
    \ to fit.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_46_0.png)\n\n*Figure 11.\
    \ Showing a pixmap with `QLabel` on Windows, macOS and Ubuntu*\n\n## QCheckBox\n\
    \nThe next widget to look at is QCheckBox which, as the name suggests, presents\
    \ a checkable box to the user. However, as with all Qt widgets there are a number\
    \ of configurable options to change the widget behaviors.\n\nListing 16. basic/widgets_3.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import QApplication, QCheckBox, QMainWindow\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        widget = QCheckBox(\"This is a checkbox\")\n        widget.setCheckState(Qt.Checked)\n\
    \n        # For tristate: widget.setCheckState(Qt.PartiallyChecked)\n        #\
    \ Or: widget.setTristate(True)\n        widget.stateChanged.connect(self.show_state)\n\
    \n        self.setCentralWidget(widget)\n\n    def show_state(self, s):\n    \
    \    print(s == Qt.Checked)\n        print(s)\n\napp = QApplication(sys.argv)\n\
    \nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n\U0001F680 **Run\
    \ it!** You'll see a checkbox with label text.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_48_0.png)\n\
    \n*Figure 12. QCheckBox on Windows, macOS and Ubuntu*\n\nYou can set a checkbox\
    \ state programmatically using `.setChecked` or `.setCheckState`. The former accepts\
    \ either `True` or `False` representing checked or unchecked respectively. However,\
    \ with `.setCheckState` you also specify a *partially* checked state using a `Qt`.\
    \ namespace flag—\n\n| Flag | Behavior |\n| :--- | :--- |\n| `Qt.Checked` | Item\
    \ is checked |\n| `Qt.Unchecked` | Item is unchecked |\n| `Qt.PartiallyChecked`\
    \ | Item is partially checked |\n\nA checkbox that supports a partially-checked\
    \ (`Qt.PartiallyChecked`) state is commonly referred to as 'tri-state', that is\
    \ being neither on nor off. A checkbox in this state is commonly shown as a greyed\
    \ out checkbox, and is commonly used in hierarchical checkbox arrangements where\
    \ sub-items are linked to parent checkboxes.\n\nIf you set the value to `Qt.PartiallyChecked`\
    \ the checkbox will become tri-state—that is have *three* possible states. You\
    \ can also set a checkbox to be tri-state without setting the current state to\
    \ partially checked by using `.setTristate(True)`\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_49_0.png)\n\
    \nYou may notice that when the script is running the current state number is displayed\
    \ as an `int` with `checked = 2`, `unchecked = 0`, and `partially checked = 1`.\
    \ You don't need to remember these values — they are just the internal value of\
    \ these respective flags. You can test state using `state == Qt.Checked`.\n\n\
    ## QComboBox\n\nThe QComboBox is a drop down list, closed by default with an arrow\
    \ to open it. You can select a single item from the list, with the currently selected\
    \ item being shown as a label on the widget. The combo box is suited to selection\
    \ of a choice from a long list of options.\n\n> You have probably seen the combo\
    \ box used for selection of font faces, or size, in word processing applications.\
    \ Although Qt actually provides a specific font-selection combo box as QFontComboBox.\n\
    \nYou can add items to a QComboBox by passing a list of strings to `.addItems()`.\
    \ Items will be added in the order they are provided.\n\nListing 17. basic/widgets_4.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import QApplication, QComboBox, QMainWindow\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        widget = QComboBox()\n        widget.addItems([\"One\", \"\
    Two\", \"Three\"])\n\n        widget.currentIndexChanged.connect(self.index_changed)\n\
    \        widget.currentTextChanged.connect(self.text_changed)\n\n        self.setCentralWidget(widget)\n\
    \n    def index_changed(self, i):  # i is an int\n        print(i)\n\n    def\
    \ text_changed(self, s):  # s is a str\n        print(s)\n\napp = QApplication(sys.argv)\n\
    \nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n\U0001F680 Run it!\
    \ You'll see a combo box with 3 entries. Select one and it will be shown in the\
    \ box."
  mdcn: "## QLabel\n\n我们将从QLabel开始介绍，它可以说是Qt工具箱中最简单的控件之一。这是一个简单的单行文本，你可以将其定位在应用程序中。你可以在创建控件时通过传入字符串来设置文本——\n\
    \n```python\nwidget = QLabel(\"Hello\")\n```\n\n或者，使用`.setText()`方法——\n\n```python\n\
    widget = QLabel(\"1\") # 标签创建时文本为1\nwidget.setText(\"2\") # 标签现在显示2\n```\n\n你还可以调整字体参数，例如控件中文本的大小或对齐方式。\n\
    \n清单13. basic/widgets_1.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore import\
    \ Qt\nfrom PySide2.QtWidgets import QApplication, QLabel, QMainWindow\n\nclass\
    \ MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        widget = QLabel(\"Hello\"\
    )\n        font = widget.font() ①\n        font.setPointSize(30)\n        widget.setFont(font)\n\
    \        widget.setAlignment(Qt.AlignHCenter | Qt.AlignVCenter) ②\n\n        self.setCentralWidget(widget)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n① 我们使用`<widget>.font()`获取*当前*字体，修改它，然后重新应用。这确保了字体样式与桌面环境保持一致。\n\n② 对齐方式通过使用`Qt.`命名空间中的标志来指定。\n\
    \n> \U0001F680 **运行它！** 调整字体参数并查看效果。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_42_0.png)\n\
    \n图9. QLabel在Windows、macOS和Ubuntu上的显示\n\n> Qt命名空间（Qt.）包含了各种各样的属性，你可以用它们来自定义和控制Qt控件。我们将在后面的“枚举与Qt命名空间”部分详细讨论。\n\
    \n可用于水平对齐的标志有——\n\n| 标志 | 行为 |\n| :--- | :--- |\n| `Qt.AlignLeft` | 与左边缘对齐。 |\n\
    | `Qt.AlignRight` | 与右边缘对齐。 |\n| `Qt.AlignHCenter` | 在可用空间内水平居中。 |\n| `Qt.AlignJustify`\
    \ | 在可用空间内两端对齐文本。 |\n\n可用于垂直对齐的标志有——\n\n| 标志 | 行为 |\n| :--- | :--- |\n| `Qt.AlignTop`\
    \ | 与顶部对齐。 |\n| `Qt.AlignBottom` | 与底部对齐。 |\n| `Qt.AlignVCenter` | 在可用空间内垂直居中。\
    \ |\n\n你可以使用管道符（|）组合标志，但请注意一次只能使用一个垂直或水平对齐标志。\n\n```python\nalign_top_left = Qt.AlignLeft\
    \ | Qt.AlignTop\n```\n\n> \U0001F680 **运行它！** 尝试组合不同的对齐标志，看看对文本位置的影响。\n\n## Qt标志\n\
    \n请注意，按照惯例，你使用**或**管道符（`|`）来组合两个标志。这些标志是不重叠的*位掩码*。例如，`Qt.AlignLeft`的二进制值是`0b0001`，而`Qt.AlignBottom`是`0b0100`。通过或运算，我们得到值`0b0101`，表示“左下角”。\n\
    \n我们将在后面的[枚举与Qt命名空间](Enums & the Qt Namespace)部分更详细地了解Qt命名空间和Qt标志。\n\n最后，还有一个简写标志可以同时在两个方向居中——\n\
    \n| 标志 | 行为 |\n| :--- | :--- |\n| `Qt.AlignCenter` | 水平**和**垂直居中 |\n\n奇怪的是，你也可以使用`QLabel`通过`.setPixmap()`方法来显示图像。它接受一个*pixmap*（像素数组），你可以通过向`QPixmap`传递图像文件名来创建它。在本书提供的示例文件中，你可以找到一个名为`otje.jpg`的文件，你可以按如下方式将其显示在窗口中：\n\
    \n清单14. basic/widgets_2a.py\n\n```python\nimport sys\n\nfrom PySide2.QtGui import\
    \ QPixmap\nfrom PySide2.QtWidgets import QApplication, QLabel, QMainWindow\n\n\
    class MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        widget = QLabel(\"Hello\"\
    )\n        widget.setPixmap(QPixmap(\"otje.jpg\"))\n\n        self.setCentralWidget(widget)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_45_0.png)\n\n图10. Otje。多么可爱的脸。\n\
    \n> \U0001F680 **运行它！** 调整窗口大小，图像周围将出现空白区域。\n\n默认情况下，图像在缩放时会保持其纵横比。如果你想让它拉伸并缩放以完全适应窗口，可以在`QLabel`上设置`.setScaledContents(True)`。\n\
    \n修改代码，为标签添加`.setScaledContents(True)`——\n\n*清单15. basic/widgets_2b.py*\n\n```python\n\
    widget.setPixmap(QPixmap(\"otje.jpg\"))\nwidget.setScaledContents(True)\n```\n\
    \n> \U0001F680 **运行它！** 调整窗口大小，图片将变形以适应。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_46_0.png)\n\
    \n*图11. 在Windows、macOS和Ubuntu上使用`QLabel`显示像素图*\n\n## QCheckBox\n\n下一个要介绍的控件是QCheckBox，顾名思义，它向用户提供一个可勾选的方框。然而，与所有Qt控件一样，有许多可配置的选项可以改变控件的行为。\n\
    \n清单16. basic/widgets_3.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore import\
    \ Qt\nfrom PySide2.QtWidgets import QApplication, QCheckBox, QMainWindow\n\nclass\
    \ MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        widget = QCheckBox(\"This\
    \ is a checkbox\")\n        widget.setCheckState(Qt.Checked)\n\n        # 对于三态：widget.setCheckState(Qt.PartiallyChecked)\n\
    \        # 或者：widget.setTristate(True)\n        widget.stateChanged.connect(self.show_state)\n\
    \n        self.setCentralWidget(widget)\n\n    def show_state(self, s):\n    \
    \    print(s == Qt.Checked)\n        print(s)\n\napp = QApplication(sys.argv)\n\
    \nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n\U0001F680 **运行它！**\
    \ 你将看到一个带有标签文本的复选框。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_48_0.png)\n\n\
    *图12. QCheckBox在Windows、macOS和Ubuntu上的显示*\n\n你可以使用`.setChecked`或`.setCheckState`以编程方式设置复选框状态。前者接受`True`或`False`，分别表示选中或未选中。然而，使用`.setCheckState`时，你还可以使用`Qt`命名空间标志指定*部分*选中状态——\n\
    \n| 标志 | 行为 |\n| :--- | :--- |\n| `Qt.Checked` | 项目被选中 |\n| `Qt.Unchecked` | 项目未被选中\
    \ |\n| `Qt.PartiallyChecked` | 项目部分选中 |\n\n支持部分选中（`Qt.PartiallyChecked`）状态的复选框通常被称为“三态”，即既不是开也不是关。处于此状态的复选框通常显示为灰色，并且通常用于分层复选框安排中，其中子项与父复选框相关联。\n\
    \n如果你将值设置为`Qt.PartiallyChecked`，复选框将变为三态——即具有*三种*可能的状态。你也可以使用`.setTristate(True)`将复选框设置为三态，而不必将当前状态设置为部分选中。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_49_0.png)\n\n你可能会注意到，当脚本运行时，当前状态数字以`int`形式显示，其中`checked\
    \ = 2`，`unchecked = 0`，`partially checked = 1`。你不需要记住这些值——它们只是这些标志的内部值。你可以使用`state\
    \ == Qt.Checked`来测试状态。\n\n## QComboBox\n\nQComboBox是一个下拉列表，默认关闭，有一个箭头可以打开它。你可以从列表中选择一个项目，当前选中的项目作为标签显示在控件上。组合框适用于从长选项列表中进行选择。\n\
    \n> 你可能在文字处理应用程序中见过组合框用于选择字体或大小。尽管Qt实际上提供了一个特定的字体选择组合框QFontComboBox。\n\n你可以通过向`.addItems()`传递字符串列表来向QComboBox添加项目。项目将按提供的顺序添加。\n\
    \n清单17. basic/widgets_4.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore import\
    \ Qt\nfrom PySide2.QtWidgets import QApplication, QComboBox, QMainWindow\n\nclass\
    \ MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        widget = QComboBox()\n  \
    \      widget.addItems([\"One\", \"Two\", \"Three\"])\n\n        widget.currentIndexChanged.connect(self.index_changed)\n\
    \        widget.currentTextChanged.connect(self.text_changed)\n\n        self.setCentralWidget(widget)\n\
    \n    def index_changed(self, i):  # i 是一个整数\n        print(i)\n\n    def text_changed(self,\
    \ s):  # s 是一个字符串\n        print(s)\n\napp = QApplication(sys.argv)\n\nwindow\
