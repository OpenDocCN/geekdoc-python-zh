    \ to customize `QTableView` appearance.\n\n## Styles & Colors with Roles\n\nUsing\
    \ colors and icons to highlight cells in data tables can help make data easier\
    \ to find and understand, or help users to select or mark data of interest. Qt\
    \ allows for complete control of all of these from the model, by responding to\
