    \n## Simple message dialogs with QMessageBox\n\nThere are many dialogs which follow\
    \ the simple pattern we just saw — a message with buttons with which you can accept\
    \ or cancel the dialog. While you can construct these dialogs yourself, Qt also\
    \ provides a built-in message dialog class called QMessageBox. This can be used\
    \ to create information, warning, about or question dialogs.\n\nThe example below\
    \ creates a simple QMessageBox and shows it.\n\nListing 51. basic/dialogs_3.py\n\
    \n```python\ndef button_clicked(self, s):\n    dlg = QMessageBox(self)\n    dlg.setWindowTitle(\"\
    I have a question!\")\n    dlg.setText(\"This is a simple dialog\")\n    button\
    \ = dlg.exec_()\n\n    if button == QMessageBox.Ok:\n        print(\"OK!\")\n\
    ```\n\n\U0001F680 **Run it!** You'll see a simple dialog with an *OK* button.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_131_0.png)\n\n*Figure 54. A QMessageBox\
    \ dialog.*\n\nAs with the dialog button box we looked at already, the buttons\
    \ shown on a QMessageBox are also configured with a set of constants which can\
    \ be combined with | to show multiple buttons. The full list of available button\
    \ types is shown below.\n\n*Table 2. QMessageBox available button types.*\n\n\
    | Button types |\n| --- |\n| QMessageBox.Ok |\n| QMessageBox.Open |\n| QMessageBox.Save\
    \ |\n| QMessageBox.Cancel |\n| QMessageBox.Close |\n| QMessageBox.Discard |\n\
    | QMessageBox.Apply |\n| QMessageBox.Reset |\n| QMessageBox.RestoreDefaults |\n\
    | QMessageBox.Help |\n| QMessageBox.SaveAll |\n| QMessageBox.Yes |\n| QMessageBox.YesToAll\
    \ |\n| QMessageBox.No |\n| QMessageBox.NoToAll |\n| QMessageBox.Abort |\n| QMessageBox.Retry\
    \ |\n| QMessageBox.Ignore |\n| QMessageBox.NoButton |\n\nYou can also tweak the\
    \ icon shown on the dialog by setting the icon with one of the following.\n\n\
    Table 3. QMessageBox icon constants.\n\n| Icon state | Description |\n| --- |\
    \ --- |\n| QMessageBox.NoIcon | The message box does not have an icon. |\n| QMessageBox.Question\
    \ | The message is asking a question. |\n| QMessageBox.Information | The message\
    \ is informational only. |\n| QMessageBox.Warning | The message is warning. |\n\
    | QMessageBox.Critical | The message indicates a critical problem. |\n\nFor example,\
    \ the following creates a question dialog with Yes and No buttons.\n\nListing\
    \ 52. basic/dialogs_4.py\n\n```python\nfrom PySide2.QtWidgets import QApplication,\
    \ QDialog, QMainWindow,\nQMessageBox, QPushButton\n\nclass MainWindow(QMainWindow):\n\
    \n    # __init__ skipped for clarity\n    def button_clicked(self, s):\n     \
    \   dlg = QMessageBox(self)\n        dlg.setWindowTitle(\"I have a question!\"\
    )\n        dlg.setText(\"This is a question dialog\")\n        dlg.setStandardButtons(QMessageBox.Yes\
    \ | QMessageBox.No)\n        dlg.setIcon(QMessageBox.Question)\n        button\
    \ = dlg.exec_()\n\n        if button == QMessageBox.Yes:\n            print(\"\
    Yes!\")\n        else:\n            print(\"No!\")\n```\n\n\U0001F680 **Run it!**\
    \ You'll see a question dialog with *Yes* and *No* buttons.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_133_0.png)\n\
    \nFigure 55. Question dialog created using QMessageBox.\n\n## Built in QMessageBox\
    \ dialogs\n\nTo make things even simpler the QMessageBox has a number of methods\
    \ which can be used to construct these types of message dialog. These methods\
    \ are shown below —\n\n```python\nQMessageBox.about(parent, title, message)\n\
    QMessageBox.critical(parent, title, message)\nQMessageBox.information(parent,\
    \ title, message)\nQMessageBox.question(parent, title, message)\nQMessageBox.warning(parent,\
    \ title, message)\n```\n\nThe parent parameter is the window which the dialog\
    \ will be a child of. If you're launching your dialog from your main window, you\
    \ can just pass in self. The following example creates a question dialog, as before,\
    \ with Yes and No buttons.\n\nListing 53. basic/dialogs_5.py\n\n```python\ndef\
    \ button_clicked(self, s):\n    button = QMessageBox.question(self, \"Question\
    \ dialog\", \"The longer message\")\n    if button == QMessageBox.Yes:\n     \
    \   print(\"Yes!\")\n    else:\n        print(\"No!\")\n```\n\n> \U0001F680 Run\
    \ it! You'll see the same result, this time using the built in .question() method.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_134_0.png)\n\nFigure 56. The built-in\
    \ question dialog.\n\nNotice that rather than call exec() we now simply call the\
    \ dialog method and the dialog is created. The return value of each of the methods\
    \ is the button which was pressed. We can detect what has been pressed by comparing\
    \ the return value to the button constants.\n\nThe four `information`, `question`,\
    \ `warning` and `critical` methods also accept optional `buttons` and `defaultButton`\
    \ arguments which can be used to tweak the buttons shown on the dialog and select\
    \ one by default. Generally though you don't want to change this from the default.\n\
    \nListing 54. basic/dialogs_6.py\n\n```python\ndef button_clicked(self, s):\n\n\
    \    button = QMessageBox.critical(\n        self,\n        \"Oh dear!\",\n  \
    \      \"Something went very wrong.\",\n        buttons=QMessageBox.Discard |\
    \ QMessageBox.NoToAll | QMessageBox.Ignore,\n        defaultButton=QMessageBox.Discard,\n\
    \    )\n\n    if button == QMessageBox.Discard:\n        print(\"Discard!\")\n\
    \    elif button == QMessageBox.NoToAll:\n        print(\"No to all!\")\n    else:\n\
    \        print(\"Ignore!\")\n```\n\n\U0001F680 **Run it!** You'll see a critical\
    \ dialog with customized buttons.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_136_0.png)\n\
    \nFigure 57. Critical error! This is a terrible dialog.\n\nFor most situations\
    \ these simple dialogs are all you need.\n\n## Dialogs\n\nIt's particularly easy\
    \ to create bad dialogs. From dialogs that trap users with confusing options to\
    \ nested never-ending popups. There are plenty of ways to hurt your users.\n\n\
    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_137_0.png)\n\n**Dialog buttons** are\
    \ defined by system standards. You may never have noticed that the OK & Cancel\
    \ buttons are in different locations on macOS & Linux vs. Windows, but your brain\
    \ did. If you do not follow system standards, you'll confuse your users, and make\
    \ them make mistakes.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_137_1.png)\n\
    \nWith Qt you get this consistency for *free* when using the built-in `QDialogButtonBox`\
    \ controls. But you *must use them*!\n\n**Error dialogs** annoy users. When you\
    \ show an error dialog you're giving your users *bad news*. When you give someone\
    \ bad news, you need to consider the impact it will have on them.\n\nTake for\
    \ example this (thankfully imaginary) dialog produced when we encounter an error\
    \ in a document. The dialog tells you there is an error, but neither what the\
    \ consequences are or what to do about it. Reading this your users will ask (possibly\
    \ scream) \"...and now what?\"\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_138_0.png)\n\
    \n*Figure 60. An example of a bad error dialog.*\n\nThis real dialog from Acrobat\
    \ Reader DC is better. This explains that there is an error, what the consequences\
    \ may be, and potentially how to resolve it.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_138_1.png)\n\
    \n*Figure 61. Adobe Acrobat Reader DC dialog*\n\nBut this still isn't *perfect*.\
    \ The error is shown as an *information* dialog, which doesn't suggest anything\
    \ is wrong. The error is fired on every page, and can appear multiple times in\
    \ a document — a warning dialog should be fired only *once*. The error could also\
    \ be improved by making it clear that the error is permanent.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_138_2.png)\n\
    \n*Figure 62. An improved version of the Adobe Acrobat Reader DC dialog*"
