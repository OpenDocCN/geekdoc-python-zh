    # # 39. Moonsweeper


    Explore the mysterious moon of Q’tee without getting too close to the alien natives!


    Moonsweeper is a single-player puzzle video game. The objective of the game is
    to explore the area around your landed space rocket, without coming too close
    to the deadly B’ug aliens. Your trusty tricounter will tell you the number of
    B’ugs in the vicinity.


    > **Suggested reading**


    This application makes use of features covered in [Signals & Slots](Signals &
    Slots), and [Events](Events).


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_674_0.png)


    *Figure 267. Moonsweeper.*


    This a simple single-player exploration game modelled on *Minesweeper* where you
    must reveal all the tiles without hitting hidden mines. This implementation uses
    custom `QWidget` objects for the tiles, which individually hold their state as
    mines, status and the adjacent count of mines. In this version, the mines are
    replaced with alien bugs (B’ug) but they could just as easily be anything else.'
  - '[PAGE 675]


    In many **Minesweeper** variants the initial turn is considered a free go – if
    you hit a mine on the first click, it is moved somewhere else. Here we cheat a
    little bit by taking the first go for the player, ensuring that it is on a non-mine
    spot. This allows us not to worry about the bad first move which would require
    us to recalculate the adjacencies. We can explain this away as the "initial exploration
    around the rocket" and make it sound completely sensible.


    > *Challenge!*


    If you want to implement this, you can catch the first click on a position and
    at that point generate mines/adjacencies, excluding your location, before handling
    the click. You will need to give your custom widgets access to the parent window
    object.


    # Source code


    The full source for the *Moonsweeper* game is included in the downloads for this
    book. The game file is saved with the name `minesweeper.py`.


    ```

    python3 minesweeper.py

    ```


    # Playing Field


    The playing area for Moonsweeper is a NxN grid, containing a set number of mines.
    The dimensions and mine counts we''ll used are taken from the default values for
    the Windows version of Minesweeper. The values used are shown in the table below:


    *Table 14. Table Dimensions and mine counts*


    | Level | Dimensions | Number of Mines |

    | :--- | :--- | :--- |

    | Easy | 8 x 8 | 10 |

    | Medium | 16 x 16 | 40 |'
- md: "## Listing 234. app/minesweeper.py\n\n```\nLEVELS = [(\"Easy\", 8, 10), (\"\
    Medium\", 16, 40), (\"Hard\", 24, 99)]\n```\n\nWe store these values as a constant\
    \ LEVELS defined at the top of the file. Since all the playing fields are square\
    \ we only need to store the value once (8, 16 or 24).\n\nThe playing grid could\
    \ be represented in a number of ways, including for example a 2D 'list of lists'\
    \ representing the different states of the playing positions (mine, revealed,\
    \ flagged).\n\nHowever, in our implementation we'll be using an object-orientated\
    \ approach, where individual positions on the map hold all relevant data about\
    \ themselves. Taking this a step further, we can make these objects individually\
    \ responsible for drawing themselves. In Qt we can do this simply by subclassing\
    \ from QWidget and then implementing a custom paint function.\n\nWe'll cover the\
    \ construction and behavior of these custom widgets before moving onto its appearance.\
    \ Since our tile objects are subclassing from QWidget we can lay them out like\
    \ any other widget. We do this, by setting up a QGridLayout.\n\n## Listing 235.\
    \ app/minesweeper.py\n\n```\nself.grid = QGridLayout()\nself.grid.setSpacing(5)\n\
    self.grid.setSizeConstraint(QLayout.SetFixedSize)\n```\n\nNext we need to set\
    \ up the playing field, creating our position tile widgets and adding them our\
    \ grid. The initial setup for the level is defined in custom method, which reads\
    \ from LEVELS and assigns a number of variables to the window. The window title\
    \ and mine counter are updated, and then the setup of the grid is begun.\n\n##\
    \ Listing 236. app/minesweeper.py\n\n```\ndef set_level(self, level):\n    self.level_name,\
    \ self.b_size, self.n_mines = LEVELS[level]\n\n    self.setWindowTitle(\"Moonsweeper\
    \ - %s\" % (self.level_name))\n    self.mines.setText(\"%03d\" % self.n_mines)\n\
    \n    self.clear_map()\n    self.init_map()\n    self.reset_map()\n```\n\nThe\
    \ setup functions will be covered next.\n\nWe're using a custom Pos class here,\
    \ which we'll look at in detail later. For now you just need to know that this\
    \ holds all the relevant information for the relevant position in the map—including,\
    \ for example, whether it's a mine, revealed, flagged and the number of mines\
    \ in the immediate vicinity.\n\nEach Pos object also has 3 custom signals clicked,\
    \ revealed and expandable which we connect to custom slot methods. Finally, we\
    \ call resize to adjust the size of the window to the new contents. Note that\
    \ this is actually only necessary when the window shrinks—it will grow automatically.\n\
    \n## Listing 237. app/minesweeper.py\n\n```\ndef init_map(self):\n    # Add positions\
    \ to the map\n    for x in range(0, self.b_size):\n        for y in range(0, self.b_size):\n\
    \            w = Pos(x, y)\n            self.grid.addWidget(w, y, x)\n       \
    \     # Connect signal to handle expansion.\n            w.clicked.connect(self.trigger_start)\n\
    \            w.revealed.connect(self.on_reveal)\n            w.expandable.connect(self.expand_reveal)\n\
    \n    # Place resize on the event queue, giving control back to Qt before.\n \
    \   QTimer.singleShot(0, lambda: self.resize(1, 1)) ①\n```\n\n① The singleShot\
    \ timer is required to ensure the resize runs after Qt is aware of the new contents.\
    \ By using a timer we guarantee control will return to Qt before the resize occurs.\n\
    \nWe also need to implement the inverse of the init_map function to remove tile\
    \ objects from the map. Removing tiles will be necessary when moving from a higher\
    \ to a lower level. It would be possible to be a little smarter here and adding/removing\
    \ only those tiles that are necessary to get to the correct size. But, since we\
    \ already have the function to add all up to the right size, we can cheat a bit.\n\
    \n> Challenge\nUpdate this code to add/remove the necessary tiles to size the\
    \ new level dimensions.\n\nNotice that we both remove the item from the grid with\
    \ self.grid.removeItem(c) and clear the parent c.widget().setParent(None). This\
    \ second step is necessary, since adding the items assigning them the parent window\
    \ as a parent. Just removing them leaves them floating in the window outside the\
    \ layout.\n\n## Listing 238. app/minesweeper.py\n\n```\ndef clear_map(self):\n\
    \    # Remove all positions from the map, up to maximum size.\n    for x in range(0,\
    \ LEVELS[-1][1]): ①\n        for y in range(0, LEVELS[-1][1]):\n            c\
    \ = self.grid.itemAtPosition(y, x)\n            if c: ②\n                c.widget().close()\n\
    \                self.grid.removeItem(c)\n```\n\n① To ensure we clear all sizes\
    \ of maps we take the dimension of the highest level.\n\n② If there isn't anything\
    \ in the grid at this location, we can skip it.\n\nNow we have our grid of positional\
    \ tile objects in place, we can begin creating the initial conditions of the playing\
    \ board. This process is rather complex, so it's broken down into a number of\
    \ functions. We name them `_reset` (the leading underscore is a convention to\
    \ indicate a private function, not intended for external use). The main function\
    \ `reset_map` calls these functions in turn to set it up.\n\nThe process is as\
    \ follows —\n\n1. Remove all mines (and reset data) from the field.\n2. Add new\
    \ mines to the field.\n3. Calculate the number of mines adjacent to each position.\n\
    4. Add a starting marker (the rocket) and trigger initial exploration.\n5. Reset\
    \ the timer.\n\n## Listing 239. app/minesweeper.py\n\n```\ndef reset_map(self):\n\
    \    self._reset_position_data()\n    self._reset_add_mines()\n    self._reset_calculate_adjacency()\n\
    \    self._reset_add_starting_marker()\n    self.update_timer()\n```\n\nThe separate\
    \ steps from 1-5 are described in detail in turn below, with the code for each\
    \ step.\n\nThe first step is to reset the data for each position on the map. We\
    \ iterate through every position on the board, calling `.reset()` on the widget\
    \ at each point. The code for the `.reset()` function is defined on our custom\
    \ `Pos` class, we'll explore in detail later. For now it's enough to know it clears\
    \ mines, flags and sets the position back to being unrevealed.\n\n## Listing 240.\
    \ app/minesweeper.py\n\n```\ndef _reset_position_data(self):\n    # Clear all\
    \ mine positions\n    for x in range(0, self.b_size):\n        for y in range(0,\
    \ self.b_size):\n            w = self.grid.itemAtPosition(y, x).widget()\n   \
    \         w.reset()\n```\n\nNow all the positions are blank, we can begin the\
    \ process of adding mines to the map. The maximum number of mines `n_mines` is\
    \ defined by the level settings, described earlier.\n\n## Listing 241. app/minesweeper.py\n\
    \n```\ndef _reset_add_mines(self):\n    # Add mine positions\n    positions =\
    \ []\n    while len(positions) < self.n_mines:\n        x, y = (\n           \
    \ random.randint(0, self.b_size - 1),\n            random.randint(0, self.b_size\
    \ - 1),\n        )\n        if (x, y) not in positions:\n            w = self.grid.itemAtPosition(y,\
    \ x).widget()\n            w.is_mine = True\n            positions.append((x,\
    \ y))\n\n    # Calculate end-game condition\n    self.end_game_n = (self.b_size\
    \ * self.b_size) - (self.n_mines + 1)\n    return positions\n```\n\nWith mines\
    \ in position, we can now calculate the 'adjacency' number for each position --\
    \ simply the number of mines in the immediate vicinity, using a 3x3 grid around\
    \ the given point. The custom function `get_surrounding` simply returns those\
    \ positions around a given `x` and `y` location. We count the number of these\
    \ that is a mine `is_mine == True` and store.\n\n> **Pre-calculation**\nPre-calculating\
    \ the adjacent counts in this way helps simplify the reveal logic later.\n\n##\
    \ Listing 242. app/minesweeper.py\n\n```\ndef _reset_calculate_adjacency(self):\n\
    \    def get_adjacency_n(x, y):\n        positions = self.get_surrounding(x, y)\n\
    \        return sum(1 for w in positions if w.is_mine)\n\n    # Add adjacencies\
    \ to the positions\n    for x in range(0, self.b_size):\n        for y in range(0,\
    \ self.b_size):\n            w = self.grid.itemAtPosition(y, x).widget()\n   \
    \         w.adjacent_n = get_adjacency_n(x, y)\n```\n\nA starting marker is used\
