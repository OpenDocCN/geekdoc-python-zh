  md: '# Appendix B: Translating C++ Examples to Python


    When writing applications with PySide2 we are really writing applications with
    Qt.


    PySide2 acts as a wrapper around the Qt libraries, translating Python method calls
    to C++, handling type conversions and transparently creating Python objects to
    represent Qt objects in your applications. The result of all this cleverness is
    that you can use Qt from Python while writing *mostly* Pythonic code—if we ignore
    the *camelCase*.


    While there is a lot of PySide2 example code out there, there are far more Qt
    C++ examples. The core documentation is written for C++. The library is written
    in C++. This means that sometimes, when you’re looking how to do something, the
    only resource you’ll find is a C++ tutorial or some C++ code.


    Can you use it? Yes! If you have no experience with C++ (or C-like languages)
    then the code can look like gibberish. But before you were familiar with Python,
    Python probably looked a bit like gibberish too. You don’t need to be able to
    *write* C++ to be able to *read* it. Understanding and decoding is easier than
    writing.


    With a little bit of effort you’ll be able to take any C++ example code and translate
    it into fully-functional Python & PySide2. In this chapter we’ll take a snippet
    of Qt5 code and step-by-step convert it into fully-working Python code.


    # The example code


    We’ll start with the following example block of code creating a simple window
    with a QPushButton and a QLineEdit. Pressing on the button will clear the line
    edit. Pretty exciting stuff, but this includes a few key parts of translating
    Qt examples to PySide2 — namely, widgets, layouts and signals.'
