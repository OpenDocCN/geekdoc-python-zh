    # Using a QRC file with compiled UI files


    If you’re designing your UIs in Qt Designer and compiling the resulting UI file
    to Python, then UI compiler automatically adds imports to a *compiled* version
    of your Qt Resource file for you. For example, if you run the following —


    ```

    pyside2-uic mainwindow.ui -o MainWindow.py

    ```


    This build process also adds imports to `MainWindow.py` for the compiled version
    of the resources used in the UI, in our case `resources.qrc`. This means you do
    not need to import the resources separately into your app. However, we still need
