    \n## Build #2, bundling Qt Designer UIs and Icons\n\nWe've now managed to build\
    \ a simple app with a single external icon file as a dependency. Now for something\
    \ a bit more realistic!\n\nIn complex Qt applications it's common to use Qt Designer\
    \ to define the UI, including icons on buttons and menus. How can we distribute\
    \ UI files with our applications and ensure the linked icons continue to work\
    \ as expected?\n\nBelow is the UI for a demo application we'll use to demonstrate\
    \ this. The app is a simple counter, which allows you to increase, decrease or\
    \ reset the counter by clicking the respective buttons. You can also [download\
    \ the source code and associated files](http://download.mfitzp.com/counter-pyinstaller-windows.zip).\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_635_0.png)\n\nFigure 254. The counter\
    \ UI created in Qt Designer\n\nThe UI consists of a `QMainWindow` with a vertical\
