  md: '# # 10. Dialogs


    Dialogs are useful GUI components that allow you to *communicate* with the user
    (hence the name dialog). They are commonly used for file Open/Save, settings,
    preferences, or for functions that do not fit into the main UI of the application.
    They are small modal (or *blocking*) windows that sit in front of the main application
    until they are dismissed. Qt actually provides a number of ''special'' dialogs
    for the most common use-cases, allowing you to provide a platform-native experience
    for a better user experience.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_120_0.png)


    *Figure 49. Standard GUI features — A search dialog*


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_120_1.png)


    *Figure 50. Standard GUI features — A file Open dialog*


    In Qt dialog boxes are handled by the `QDialog` class. To create a new dialog
    box simply create a new object of `QDialog` type passing in a parent widget, e.g.
    `QMainWindow`, as its parent.


    Let''s create our own `QDialog`. We''ll start with a simple skeleton app with
    a button to press hooked up to a slot method.'
