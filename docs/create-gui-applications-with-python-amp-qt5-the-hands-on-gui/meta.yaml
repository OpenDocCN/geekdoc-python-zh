  md: "The event will continue to behave as normal, yet you've added some non-interfering\
    \ behavior.\n\n# Layout forwarding\n\nWhen you add a widget to your application,\
    \ it also gets another *parent* from the layout. The parent of a widget can be\
    \ found by calling `.parent()`. Sometimes you specify these parents manually,\
    \ such as for `QMenu` or `QDialog`, often it is automatic. When you add a widget\
    \ to your main window for example, the main window will become the widget's parent.\n\
    \nWhen events are created for user interaction with the UI, these events are passed\
    \ to the *uppermost* widget in the UI. So, if you have a button on a window, and\
    \ click the button, the button will receive the event first.\n\nIf the first widget\
    \ cannot handle the event, or chooses not to, the event will *bubble up* to the\
    \ parent widget, which will be given a turn. This *bubbling* continues all the\
    \ way up nested widgets, until the event is handled or it reaches the main window.\n\
    \nIn your own event handlers you can choose to mark an event as *handled* by calling\
    \ `.accept()` —\n\n```\nclass CustomButton(Qbutton)\n    def mousePressEvent(self,\
    \ e):\n        e.accept()\n```\n\nAlternatively, you can mark it as *unhandled*\
    \ by calling `.ignore()` on the event object. In this case the event will continue\
    \ to bubble up the hierarchy.\n\n```\nclass CustomButton(Qbutton)\n    def event(self,\
    \ e):\n        e.ignore()\n```\n\nIf you want your widget to appear transparent\
    \ to events, you can safely ignore"
