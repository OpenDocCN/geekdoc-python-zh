- md: "## 9. Actions, Toolbars & Menus\n\nNext we'll look at some of the common user\
    \ interface elements, that you've probably seen in many other applications — toolbars\
    \ and menus. We'll also explore the neat system Qt provides for minimising the\
    \ duplication between different UI areas — `QAction`.\n\n### Toolbars\n\nOne of\
    \ the most commonly seen user interface elements is the toolbar. Toolbars are\
    \ bars of icons and/or text used to perform common tasks within an application,\
    \ for which accessing via a menu would be cumbersome. They are one of the most\
    \ common UI features seen in many applications. While some complex applications,\
    \ particularly in the Microsoft Office suite, have migrated to contextual 'ribbon'\
    \ interfaces, the standard toolbar is sufficient for the majority of applications\
    \ you will create.\n\nQt toolbars support display of icons, text, and can also\
    \ contain any standard Qt widget. However, for buttons the best approach is to\
    \ make use of the `QAction` system to place buttons on the toolbar.\n\nLet's start\
    \ by adding a toolbar to our application.\n\n> \U0001F4A1 Load up a fresh copy\
    \ of `myapp.py` and save it under a new name for this section.\n\nIn Qt toolbars\
    \ are created from the QToolBar class. To start you create an instance of the\
    \ class and then call `.addToolbar` on the QMainWindow. Passing a string in as\
    \ the first parameter to `QToolBar` sets the toolbar's name, which will be used\
    \ to identify the toolbar in the UI.\n\nListing 35. basic/toolbars_and_menus_1.py\n\
    \n```python\nclass MainWindow(QMainWindow):\n    def __init__(self):\n       \
    \ super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n        label\
    \ = QLabel(\"Hello!\")\n        label.setAlignment(Qt.AlignCenter)\n\n       \
    \ self.setCentralWidget(label)\n\n        toolbar = QToolBar(\"My main toolbar\"\
    )\n        self.addToolBar(toolbar)\n\n    def onMyToolBarButtonClick(self, s):\n\
    \        print(\"click\", s)\n```\n\n\U0001F680 Run it! You'll see a thin grey\
    \ bar at the top of the window. This is your toolbar. Right click and click the\
    \ name to toggle it off.\n\n> I can't get my toolbar back!?\n>\n> Unfortunately\
    \ once you remove a toolbar there is now no place to right click to re-add it.\
    \ So as a general rule you want to either keep one toolbar un-removeable, or provide\
    \ an alternative interface to turn toolbars on and off.\n\nLet’s make the toolbar\
    \ a bit more interesting. We could just add a `QButton` widget, but there is a\
    \ better approach in Qt that gets you some cool features — and that is via `QAction`.\
    \ `QAction` is a class that provides a way to describe abstract user interfaces.\
    \ What this means in English, is that you can define multiple interface elements\
    \ within a single object, unified by the effect that interacting with that element\
    \ has. For example, it is common to have functions that are represented in the\
    \ toolbar but also the menu — think of something like Edit→Cut which is present\
    \ both in the Edit menu but also on the toolbar as a pair of scissors, and also\
    \ through the keyboard shortcut `Ctrl-X` (`Cmd-X` on macOS).\n\nWithout `QAction`\
    \ you would have to define this in multiple places. But with `QAction` you can\
    \ define a single `QAction`, defining the triggered action, and then add this\
    \ action to both the menu and the toolbar. Each `QAction` has names, status messages,\
    \ icons and signals that you can connect to (and much more).\n\nSee the code below\
    \ for how to add your first `QAction`.\n\nListing 36. basic/toolbars_and_menus_2.py\n\
    \n```python\nclass MainWindow(QMainWindow):\n    def __init__(self):\n       \
    \ super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n        label\
    \ = QLabel(\"Hello!\")\n        label.setAlignment(Qt.AlignCenter)\n\n       \
    \ self.setCentralWidget(label)\n\n        toolbar = QToolBar(\"My main toolbar\"\
    )\n        self.addToolBar(toolbar)\n\n        button_action = QAction(\"Your\
    \ button\", self)\n        button_action.setStatusTip(\"This is your button\"\
    )\n        button_action.triggered.connect(self.onMyToolBarButtonClick)\n    \
    \    toolbar.addAction(button_action)\n\n    def onMyToolBarButtonClick(self,\
    \ s):\n        print(\"click\", s)\n```\n\nTo start with we create the function\
    \ that will accept the signal from the QAction so we can see if it is working.\
    \ Next we define the QAction itself. When creating the instance we can pass a\
    \ label for the action and/or an icon. You must also pass in any QObject to act\
    \ as the parent for the action — here we're passing self as a reference to our\
    \ main window. Strangely for QAction the parent element is passed in as the final\
    \ parameter.\n\nNext, we can opt to set a status tip — this text will be displayed\
    \ on the status bar once we have one. Finally we connect the .triggered signal\
    \ to the custom function. This signal will fire whenever the QAction is 'triggered'\
    \ (or activated).\n\nFigure 32. A stack widget, showing one widget only (the last-added\
    \ widget).\n\nQStackedWidget is how tabbed views in applications work. Only one\
    \ view ('tab') is visible at any one time. You can control which widget to show\
    \ at any time by using .setCurrentIndex() or .setCurrentWidget() to set the item\
    \ by either the index (in order the widgets were added) or by the widget itself.\n\
    \nBelow is a short demo using QStackedLayout in combination with QButton to provide\
    \ a tab-like interface to an application —\n\nListing 32. basic/layout_8.py\n\n\
    ```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QHBoxLayout,\n    QLabel,\n    QMainWindow,\n\
    \    QPushButton,\n    QStackedLayout,\n    QVBoxLayout,\n    QWidget,\n)\n\n\
    from layout_colorwidget import Color\n\nclass MainWindow(QMainWindow):\n    def\
    \ __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        pagelayout = QVBoxLayout()\n        button_layout = QHBoxLayout()\n\
    \        self.stacklayout = QStackedLayout()\n\n        pagelayout.addLayout(button_layout)\n\
    \        pagelayout.addLayout(self.stacklayout)\n\n        btn = QPushButton(\"\
    red\")\n        btn.pressed.connect(self.activate_tab_1)\n        button_layout.addWidget(btn)\n\
    \        self.stacklayout.addWidget(Color(\"red\"))\n\n        btn = QPushButton(\"\
    green\")\n        btn.pressed.connect(self.activate_tab_2)\n        button_layout.addWidget(btn)\n\
    \        self.stacklayout.addWidget(Color(\"green\"))\n\n        btn = QPushButton(\"\
    yellow\")\n        btn.pressed.connect(self.activate_tab_3)\n        button_layout.addWidget(btn)\n\
    \        self.stacklayout.addWidget(Color(\"yellow\"))\n\n        widget = QWidget()\n\
    \        widget.setLayout(pagelayout)\n        self.setCentralWidget(widget)\n\
    \n    def activate_tab_1(self):\n        self.stacklayout.setCurrentIndex(0)\n\
    \n    def activate_tab_2(self):\n        self.stacklayout.setCurrentIndex(1)\n\
    \n    def activate_tab_3(self):\n        self.stacklayout.setCurrentIndex(2)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n\U0001F680 Run it! You'll can now change the visible widget with the button.\n\
    \n*Figure 33. A stack widget, with buttons to control the active widget.*\n\n\
    Helpfully, Qt provides a built-in tab widget that provides this kind of layout\
    \ out of the box - although it's actually a widget, not a layout. Below the tab\
    \ demo is recreated using `QTabWidget` —\n\nListing 33. basic/layout_9.py\n\n\
    ```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QLabel,\n    QMainWindow,\n    QPushButton,\n\
    \    QTabWidget,\n    QWidget,\n)\n\nfrom layout_colorwidget import Color\n\n\
    class MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        tabs = QTabWidget()\n   \
    \     tabs.setTabPosition(QTabWidget.West)\n        tabs.setMovable(True)\n\n\
    \        for n, color in enumerate([\"red\", \"green\", \"blue\", \"yellow\"]):\n\
    \            tabs.addTab(Color(color), color)\n\n        self.setCentralWidget(tabs)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\nAs you can see, it's a little more straightforward — and a bit more attractive!\
    \ You can set the position of the tabs using the cardinal directions and toggle\
    \ whether tabs are moveable with `.setMoveable`.\n\nYou’ll notice that the macOS\
    \ tab bar looks quite different from the others — by default on macOS tabs take\
    \ on a *pill* or *bubble* style. On macOS this is typically used for tabbed configuration\
    \ panels. For documents, you can turn on *document mode* to give slimline tabs\
    \ similar to what you see on other platforms. This option has no effect on other\
    \ platforms.\n\nListing 34. basic/layout_9b.py\n\n```python\ntabs = QTabWidget()\n\
    tabs.setDocumentMode(True)\n```\n\nFigure 35. QTabWidget with document mode set\
    \ to True on macOS."
  mdcn: "## 9. 动作、工具栏与菜单\n\n接下来，我们将探讨一些常见的用户界面元素，这些元素你可能在许多其他应用程序中都见过——工具栏和菜单。我们还将探索\
    \ Qt 提供的一个巧妙系统，用于最小化不同 UI 区域之间的重复——`QAction`。\n\n### 工具栏\n\n最常见的用户界面元素之一就是工具栏。工具栏是图标和/或文本的条带，用于在应用程序中执行常见任务，通过菜单访问这些任务会显得繁琐。它们是许多应用程序中最常见的\
    \ UI 特性之一。虽然一些复杂的应用程序，特别是 Microsoft Office 套件，已经迁移到了上下文相关的“功能区”界面，但标准工具栏对于你将创建的大多数应用程序来说已经足够了。\n\
    \nQt 工具栏支持显示图标、文本，并且也可以包含任何标准的 Qt 小部件。然而，对于按钮，最佳做法是利用 `QAction` 系统将按钮放置在工具栏上。\n\
    \n让我们从向应用程序添加一个工具栏开始。\n\n> \U0001F4A1 加载一份全新的 `myapp.py` 副本，并为本节保存一个新名称。\n\n在\
    \ Qt 中，工具栏是从 `QToolBar` 类创建的。首先，你创建该类的一个实例，然后在 `QMainWindow` 上调用 `.addToolBar`。将字符串作为第一个参数传递给\
    \ `QToolBar` 可以设置工具栏的名称，该名称将用于在 UI 中标识该工具栏。\n\n清单 35. basic/toolbars_and_menus_1.py\n\
    \n```python\nclass MainWindow(QMainWindow):\n    def __init__(self):\n       \
    \ super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n        label\
    \ = QLabel(\"Hello!\")\n        label.setAlignment(Qt.AlignCenter)\n\n       \
    \ self.setCentralWidget(label)\n\n        toolbar = QToolBar(\"My main toolbar\"\
    )\n        self.addToolBar(toolbar)\n\n    def onMyToolBarButtonClick(self, s):\n\
    \        print(\"click\", s)\n```\n\n\U0001F680 运行它！你会在窗口顶部看到一个细长的灰色条。这就是你的工具栏。右键单击并点击名称可以将其关闭。\n\
    \n> 我无法找回我的工具栏了！？\n>\n> 不幸的是，一旦你移除了一个工具栏，就没有地方可以右键单击来重新添加它了。因此，通常的做法是保留一个不可移除的工具栏，或者提供一个替代界面来开启和关闭工具栏。\n\
    \n让我们让工具栏变得更有趣一些。我们可以直接添加一个 `QButton` 小部件，但在 Qt 中有一个更好的方法，可以让你获得一些很酷的功能——那就是通过\
    \ `QAction`。`QAction` 是一个类，提供了一种描述抽象用户界面的方式。用通俗的话说，这意味着你可以在单个对象中定义多个界面元素，这些元素通过与该元素交互所产生的效果统一起来。例如，通常有些功能既在工具栏中表示，也在菜单中表示——想想类似“编辑→剪切”这样的功能，它既出现在“编辑”菜单中，也作为工具栏上的一把剪刀图标出现，同时还通过键盘快捷键\
    \ `Ctrl-X`（在 macOS 上是 `Cmd-X`）触发。\n\n如果没有 `QAction`，你就必须在多个地方定义这个功能。但有了 `QAction`，你可以定义一个单一的\
    \ `QAction`，定义触发的动作，然后将这个动作同时添加到菜单和工具栏中。每个 `QAction` 都有名称、状态消息、图标和你可以连接的信号（以及更多）。\n\
    \n请参阅下面的代码，了解如何添加你的第一个 `QAction`。\n\n清单 36. basic/toolbars_and_menus_2.py\n\n\
    ```python\nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        label = QLabel(\"Hello!\"\
    )\n        label.setAlignment(Qt.AlignCenter)\n\n        self.setCentralWidget(label)\n\
    \n        toolbar = QToolBar(\"My main toolbar\")\n        self.addToolBar(toolbar)\n\
    \n        button_action = QAction(\"Your button\", self)\n        button_action.setStatusTip(\"\
    This is your button\")\n        button_action.triggered.connect(self.onMyToolBarButtonClick)\n\
    \        toolbar.addAction(button_action)\n\n    def onMyToolBarButtonClick(self,\
    \ s):\n        print(\"click\", s)\n```\n\n首先，我们创建一个函数来接收来自 `QAction` 的信号，以便我们可以看到它是否工作。接下来，我们定义\
    \ `QAction` 本身。在创建实例时，我们可以传递一个动作的标签和/或一个图标。你还必须传递任何 `QObject` 作为该动作的父对象——这里我们传递\
    \ `self` 作为对主窗口的引用。奇怪的是，对于 `QAction`，父元素是作为最后一个参数传递的。\n\n接下来，我们可以选择设置一个状态提示——一旦我们有了状态栏，这个文本将显示在状态栏上。最后，我们将\
    \ `.triggered` 信号连接到自定义函数。每当 `QAction` 被“触发”（或激活）时，这个信号就会触发。\n\n图 32. 一个堆叠小部件，仅显示一个小部件（最后添加的小部件）。\n\
    \n`QStackedWidget` 是应用程序中选项卡式视图的工作方式。一次只有一个视图（“选项卡”）可见。你可以随时通过使用 `.setCurrentIndex()`\
    \ 或 `.setCurrentWidget()` 来控制显示哪个小部件，可以通过索引（按小部件添加的顺序）或通过小部件本身来设置项目。\n\n下面是一个使用\
    \ `QStackedLayout` 结合 `QButton` 为应用程序提供类似选项卡界面的简短演示——\n\n清单 32. basic/layout_8.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QHBoxLayout,\n    QLabel,\n    QMainWindow,\n\
    \    QPushButton,\n    QStackedLayout,\n    QVBoxLayout,\n    QWidget,\n)\n\n\
    from layout_colorwidget import Color\n\nclass MainWindow(QMainWindow):\n    def\
    \ __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        pagelayout = QVBoxLayout()\n        button_layout = QHBoxLayout()\n\
    \        self.stacklayout = QStackedLayout()\n\n        pagelayout.addLayout(button_layout)\n\
    \        pagelayout.addLayout(self.stacklayout)\n\n        btn = QPushButton(\"\
    red\")\n        btn.pressed.connect(self.activate_tab_1)\n        button_layout.addWidget(btn)\n\
    \        self.stacklayout.addWidget(Color(\"red\"))\n\n        btn = QPushButton(\"\
    green\")\n        btn.pressed.connect(self.activate_tab_2)\n        button_layout.addWidget(btn)\n\
    \        self.stacklayout.addWidget(Color(\"green\"))\n\n        btn = QPushButton(\"\
    yellow\")\n        btn.pressed.connect(self.activate_tab_3)\n        button_layout.addWidget(btn)\n\
    \        self.stacklayout.addWidget(Color(\"yellow\"))\n\n        widget = QWidget()\n\
    \        widget.setLayout(pagelayout)\n        self.setCentralWidget(widget)\n\
    \n    def activate_tab_1(self):\n        self.stacklayout.setCurrentIndex(0)\n\
    \n    def activate_tab_2(self):\n        self.stacklayout.setCurrentIndex(1)\n\
    \n    def activate_tab_3(self):\n        self.stacklayout.setCurrentIndex(2)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n\U0001F680 运行它！你现在可以通过按钮更改可见的小部件。\n\n*图 33. 一个堆叠小部件，带有控制活动小部件的按钮。*\n\n\
    Qt 提供了一个内置的选项卡小部件，可以开箱即用地提供这种布局——尽管它实际上是一个小部件，而不是一个布局。下面使用 `QTabWidget` 重新创建了选项卡演示——\n\
    \n清单 33. basic/layout_9.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore import\
    \ Qt\nfrom PySide2.QtWidgets import (\n    QApplication,\n    QLabel,\n    QMainWindow,\n\
    \    QPushButton,\n    QTabWidget,\n    QWidget,\n)\n\nfrom layout_colorwidget\
    \ import Color\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n  \
    \      super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n     \
    \   tabs = QTabWidget()\n        tabs.setTabPosition(QTabWidget.West)\n      \
    \  tabs.setMovable(True)\n\n        for n, color in enumerate([\"red\", \"green\"\
    , \"blue\", \"yellow\"]):\n            tabs.addTab(Color(color), color)\n\n  \
    \      self.setCentralWidget(tabs)\n\napp = QApplication(sys.argv)\n\nwindow =\
    \ MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n如你所见，它更直接一些——也更吸引人！你可以使用基本方向设置选项卡的位置，并使用\
    \ `.setMoveable` 切换选项卡是否可移动。\n\n你会注意到 macOS 上的选项卡栏看起来与其他平台非常不同——默认情况下，macOS 上的选项卡采用\
    \ *药丸* 或 *气泡* 样式。在 macOS 上，这通常用于选项卡式配置面板。对于文档，你可以开启 *文档模式* 以获得与其他平台类似的细长选项卡。此选项对其他平台没有影响。\n\
    \n清单 34. basic/layout_9b.py\n\n```python\ntabs = QTabWidget()\ntabs.setDocumentMode(True)\n\
    ```\n\n图 35. 在 macOS 上将文档模式设置为 True 的 QTabWidget。"
