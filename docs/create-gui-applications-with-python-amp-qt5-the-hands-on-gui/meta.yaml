  md: 'Let’s make the toolbar a bit more interesting. We could just add a `QButton`
    widget, but there is a better approach in Qt that gets you some cool features
    — and that is via `QAction`. `QAction` is a class that provides a way to describe
    abstract user interfaces. What this means in English, is that you can define multiple
    interface elements within a single object, unified by the effect that interacting
    with that element has. For example, it is common to have functions that are represented
    in the toolbar but also the menu — think of something like Edit→Cut which is present
    both in the Edit menu but also on the toolbar as a pair of scissors, and also
    through the keyboard shortcut `Ctrl-X` (`Cmd-X` on macOS).


    Without `QAction` you would have to define this in multiple places. But with `QAction`
    you can define a single `QAction`, defining the triggered action, and then add
    this action to both the menu and the toolbar. Each `QAction` has names, status
    messages, icons and signals that you can connect to (and much more).


    See the code below for how to add your first `QAction`.'
  merge: -1
  pgno: 99
- img_proc: true
  md: "Listing 36. basic/toolbars_and_menus_2.py\n\n```\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        label = QLabel(\"Hello!\")\n        label.setAlignment(Qt.AlignCenter)\n\
    \n        self.setCentralWidget(label)\n\n        toolbar = QToolBar(\"My main\
    \ toolbar\")\n        self.addToolBar(toolbar)\n\n        button_action = QAction(\"\
    Your button\", self)\n        button_action.setStatusTip(\"This is your button\"\
    )\n        button_action.triggered.connect(self.onMyToolBarButtonClick)\n    \
    \    toolbar.addAction(button_action)\n\n    def onMyToolBarButtonClick(self,\
    \ s):\n        print(\"click\", s)\n```\n\nTo start with we create the function\
    \ that will accept the signal from the QAction so we can see if it is working.\
    \ Next we define the QAction itself. When creating the instance we can pass a\
    \ label for the action and/or an icon. You must also pass in any QObject to act\
    \ as the parent for the action — here we're passing self as a reference to our\
    \ main window. Strangely for QAction the parent element is passed in as the final\
    \ parameter.\n\nNext, we can opt to set a status tip — this text will be displayed\
    \ on the status bar once we have one. Finally we connect the .triggered signal\
    \ to the custom function. This signal will fire whenever the QAction is 'triggered'\
    \ (or activated)."
