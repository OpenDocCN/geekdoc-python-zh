    \ = QPushButton(\"Press Me!\")\n\n        # Set the central widget of the Window.\n\
    \        self.setCentralWidget(button)\n\napp = QApplication(sys.argv)\n\nwindow\
    \ = MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n① Common Qt widgets are\
    \ always imported from the `QtWidgets` namespace.\n\n② We must always call the\
    \ `__init__` method of the `super()` class.\n\n③ Use `.setCentralWidget` to place\
    \ a widget in the `QMainWindow`.\n\n> When you subclass a Qt class you must **always**\
    \ call the super `__init__` function to allow Qt to set up the object.\n\nIn our\
    \ `__init__` block we first use `.setWindowTitle()` to change the title of our\
    \ main window. Then we add our first widget — a `QPushButton` — to the middle\
    \ of the window. This is one of the basic widgets available in Qt. When creating\
    \ the button you can pass in the text that you want the button to display.\n\n\
    Finally, we call `.setCentralWidget()` on the window. This is a `QMainWindow`\
    \ specific function that allows you to set the widget that goes in the middle\
    \ of the window.\n\n> **\U0001F680 Run it!** You will now see your window again,\
    \ but this time with the `QPushButton` widget in the middle. Pressing the button\
