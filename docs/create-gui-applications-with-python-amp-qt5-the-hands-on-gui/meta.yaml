    # Targeting


    We''ve seen a range of different QSS properties and applied them to widgets based
    on their type. But how can you target individual widgets and how does Qt decide
    which rules to apply to which widgets and when? Next, we''ll look at other options
    for targeting QSS rules and the effect of inheritance.


    | Type | Example | Description |

    | :--- | :--- | :--- |

    | Universal | `*` | Matches all widgets. |

    | Type | `QPushButton` | Instances of QPushButton or its subclasses. |

    | Property | `QPushButton[flat="false"]` | Instances of QPushButton that are not
    flat. Can compare with *any* property that supports `.toString()`. Can also use
    `class="classname"` |

    | Property contains | `QPushButton[property~="something"]` | Instances of QPushButton
    where property (a list of QString) does not contain the given value. |

    | Class | `.QPushButton` | Instances of QPushButton but not subclasses. |'
