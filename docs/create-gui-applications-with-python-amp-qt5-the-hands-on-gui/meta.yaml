- img_proc: true
  md: 'Listing 229. app/browser_tabs.py


    ```

    self.tabs = QTabWidget()

    self.tabs.setDocumentMode(True)

    self.tabs.tabBarDoubleClicked.connect(self

    .tab_open_doubleclick)

    self.tabs.currentChanged.connect(self.current_tab_changed)

    self.tabs.setTabsClosable(True)

    self.tabs.tabCloseRequested.connect(self.close_current_tab)


    self.setCentralWidget(self.tabs)

    ```


    The three slot methods accept an i (index) parameter which indicates which tab
    the signal resulted from (in order).


    We use a double-click on an empty space in the tab bar (represented by an index
    of -1 to trigger creation of a new tab. For removing a tab, we use the index directly
    to remove the widget (and so the tab), with a simple check to ensure there are
    at least 2 tabs — closing the last tab would leave you unable to open a new one.


    The current_tab_changed handler uses a self.tabs.currentWidget() construct to
    access the widget (QWebEngineView browser) of the currently active tab, and then
    uses this to get the URL of the current page. This same construct is used throughout
    the source for the tabbed browser, as a simple way to interact with the current
    browser view.'
