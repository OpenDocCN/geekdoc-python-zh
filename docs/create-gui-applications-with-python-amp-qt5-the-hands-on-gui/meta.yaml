  md: 'additional benefits. In the next parts we''ll look at two Python data table
    libraries — *numpy* and *pandas* — and how to integrate these with Qt.


    # Numpy


    *Numpy* is a library which provides support for large multi-dimensional arrays
    or matrix data structures in Python. The efficient and high-performance handling
    of large arrays makes *numpy* ideal for scientific and mathematical applications.
    This also makes *numpy* arrays an good data store for large, single-typed, data
    tables in PySide2.


    # Using numpy as a data source


    To support *numpy* arrays we need to make a number of changes to the model, first
    modifying the indexing in the `data` method, and then changing the row and column
    count calculations for `rowCount` and `columnCount`.


    The standard *numpy* API provides element-level access to 2D arrays, by passing
    the row and column in the same slicing operation, e.g. `_data[index.row(), index.column()]`.
    This is more efficient than indexing in two steps, as for the `list` of `list`
    examples.


    In *numpy* the dimensions of an array are available through `.shape` which returns
    a tuple of dimensions along each axis in turn. We get the length of each axis
    by selecting the correct item from this tuple, e.g. `_data.shape[0]` gets the
    size of the first axis.


