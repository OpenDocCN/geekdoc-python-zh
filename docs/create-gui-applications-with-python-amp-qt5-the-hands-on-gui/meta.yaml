    \n### 一个事件循环统治一切\n\n记得我说过任何时候只能有一个Qt事件循环在运行吗？我是认真的！`QDialog`完全阻止了你的应用程序执行。不要启动一个对话框并期望应用程序中的其他任何地方发生任何事情。\n\
