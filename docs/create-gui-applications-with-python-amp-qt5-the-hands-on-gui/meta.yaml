    # ID targeting #


    All Qt widgets have an *object name* which uniquely identifies them. When creating
    widgets in Qt Designer you use the object name to specify the name that the object
    is available under on the parent window. However, this relationship is just for
    convenience— you can set any *object name* you want for a widget in your own code.
    These names can then be used to target QSS rules directly to specific widgets.


    In our QSS tester app we''ve set IDs on our `QComboBox` and `QLineEdit` for testing.


    ```

    python

    combo.setObjectName(''thecombo'')

    le.setObjectName(''mylineedit'')

    ```


    # Property [property="<value>"]


    You can target widgets by any widget property which is available as a string (or
    who''s value has a `.toString()` method). This can be used to define some quite
    complex states on widgets.


    The following is a simple example targeting a `QPushButton` by the text label.'
  merge: -1
  pgno: 250
- img_proc: true
  md: "```\nQPushButton[text=\"Push me!\"] {\n    background: red;\n}\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_251_0.png)\n\
    \nFigure 122. Targeting a QPushButton by the label text\n\n> Targeting widgets\
    \ by their visible text is a *very bad idea* in general as it will introduce bugs\
    \ as you try and translate your application or change labels.\n\nRules are applied\
    \ to widgets when the stylesheet is first set and will not respond to changes\
