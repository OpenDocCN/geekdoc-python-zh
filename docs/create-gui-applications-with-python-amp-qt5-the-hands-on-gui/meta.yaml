  md: '# # Theming


    Out of the box Qt applications look *platform native*. That is, they take on the
    *look and feel* of the operating system they are running on. This means they look
    at home on any system and feel natural to users. But it can also mean they look
    a bit *boring*. Helpfully, Qt gives you complete control over the appearance of
    widgets in your application.


    Whether you want your application to stand out, or you are designing custom widgets
    and want them to fit in, this chapter will explain how to do that in PySide2.'
