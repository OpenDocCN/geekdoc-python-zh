    # Requirements


    **PyInstaller** works out of the box with PySide2 and, as of writing, **PyInstaller**
    is compatible up to Python 3.10. Whatever project you''re working on, you should
    be able to package your apps.


    You can install **PyInstaller** using `pip`.


    ```

    bash

    pip3 install PyInstaller

    ```'
