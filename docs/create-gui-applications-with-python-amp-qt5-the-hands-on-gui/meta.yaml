    \n## 通用方法\n\n你并不总是能提前知道要用工作线程做什么。或者你可能有许多类似的功能需要执行，并且希望有一个常规的API来运行它们。在这种情况下，你可以利用Python中函数是对象这一事实，构建一个*通用*运行器，它不仅接受参数，还接受要运行的函数。\n\
