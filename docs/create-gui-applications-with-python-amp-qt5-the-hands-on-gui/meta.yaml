    \ can receive for styling requests or requesting data in \"edit-ready\" format.\n\
    \n| Role | Value | Description |\n| :--- | :--- | :--- |\n| Qt.DisplayRole | 0\
    \ | The key data to be rendered in the form of text. QString |\n| Qt.DecorationRole\
