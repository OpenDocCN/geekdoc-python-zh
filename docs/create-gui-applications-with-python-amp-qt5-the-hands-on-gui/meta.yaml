    icons in PNG format | CC BY 3.0 |

    | [Diagona by p.yusukekamiyamane](http://p.yusukekamiyamane.com/) | 400 16x16
    and 10x10 icons in PNG format | CC BY 3.0 |

    | [Tango Icons by The Tango Desktop Project](http://tango.freedesktop.org/) |
    Icons using the Tango project color theme. | Public domain |


    While you do have control over the size of icons using in menus and toolbars,
    in most cases you should leave these as-is. A good standard icon size for menus
    is 20x20 pixels.


    Sizes smaller than this are fine too, the icon will be centered rather than scaled
    up.


    # Create your own


    If you don''t like any of the available icon sets, or want a unique look to your
    application, you can of course design your own icons. Icons can be created using
    any standard graphics software and saved as PNG images with transparent background.
    The icons should be square and of a resolution that they do not need to be scaled
    up or down when used in your application.


    # Using icon files


    Once you have your icon files — whether from icon sets or self-drawn — they can
    be used in your Qt applications by creating instances of `QtGui.QIcon`, passing
    in the filename of the icon directly.


    ```

    QtGui.QIcon("<filename>")

    ```


    While you can use both absolute (complete) and relative (partial) to point to
    your'
  - '[PAGE 217]


    file, absolute paths are prone to break when distributing your applications. Relative
    paths will work as long as the icon files are stored in the same location relative
    to your script, although even this can be difficult to manage when packaging.
    If you are using many icons in your application, or will be distributing your
    application, you may want to use the [The Qt Resource system](https://doc.qt.io/qt-5/resources.html).


    > In order to create icon instances you must have already created a `QApplication`
    instance. To ensure this is the case, you can create your app instance at the
    top of your source file, or create your `QIcon` instances in the `__init__` for
    the widget or window that uses them.


    # Free Desktop Specification Icons (Linux)


    On Linux desktops there is a thing called the *Free Desktop Specification* which
    defines standard names for icons for specific actions.


    If your application uses these specific icon names (and loads the icon from a
    "theme") then on Linux your application will use the current icon set which is
    enabled on the desktop. The goal here is to ensure that all applications have
    the same look & feel while remaining configurable.


    To use these within Qt Designer you would select the drop-down and choose "Set
    Icon From Theme..."


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_217_0.png)


    You then enter the **name** of the icon you want to use, e.g. `document-new` (see
    the [full list of valid names](https://specifications.freedesktop.org/icon-naming-spec/latest/)).'
