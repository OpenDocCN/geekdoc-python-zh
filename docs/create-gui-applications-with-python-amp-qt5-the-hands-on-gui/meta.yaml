- md: "## The calculator\n\nThreading is a good option when you need to perform complex\
    \ calculations. If you're using the Python *numpy*, *scipy* or *pandas* libraries\
    \ then these calculations may also release the Python Global Interpreter Lock\
    \ (GIL) meaning both your GUI and calculation thread can run at full speed.\n\n\
    In this example we'll create a number of workers which are all performing some\
    \ simple calculations. The results of these calculations will be returned to the\
    \ GUI thread and displayed in a plot.\n\n> We cover PyQtGraph in detail in [Plotting\
    \ with PyQtGraph](Plotting with PyQtGraph), for now just focus on the `QRunner`.\n\
    \nListing 177. concurrent/qrunner_calculator.py\n\n```python\nimport random\n\
    import sys\nimport time\nimport uuid\n\nfrom PySide2.QtCore import QObject, QRunnable,\
    \ QThreadPool, QTimer, Signal, Slot\nfrom PySide2.QtWidgets import QApplication,\
    \ QMainWindow, QPushButton, QVBoxLayout, QWidget\nimport pyqtgraph as pg\n\nclass\
    \ WorkerSignals(QObject):\n    \"\"\"\n    Defines the signals available from\
    \ a running worker thread.\n\n    data\n        tuple data point (worker_id, x,\
    \ y)\n    \"\"\"\n\n    data = Signal(tuple) ①\n\nclass Worker(QRunnable):\n \
    \   \"\"\"\n    Worker thread\n\n    Inherits from QRunnable to handle worker\
    \ thread setup, signals\n    and wrap-up.\n    \"\"\"\n\n    def __init__(self):\n\
    \        super().__init__()\n        self.worker_id = uuid.uuid4().hex  # Unique\
    \ ID for this worker.\n        self.signals = WorkerSignals()\n\n    @Slot()\n\
    \    def run(self):\n\n        total_n = 1000\n        y2 = random.randint(0,\
    \ 10)\n        delay = random.random() / 100  # Random delay value.\n        value\
    \ = 0\n\n        for n in range(total_n):\n            # Dummy calculation, each\
    \ worker will produce different values,\n            # because of the random y\
    \ & y2 values.\n            y = random.randint(0, 10)\n            value += n\
    \ * y2 - n * y\n\n            self.signals.data.emit((self.worker_id, n, value))\
    \ ②\n            time.sleep(delay)\n\nclass MainWindow(QMainWindow):\n    def\
    \ __init__(self):\n        super().__init__()\n\n        self.threadpool = QThreadPool()\n\
    \n        self.x = {}  # Keep timepoints.\n        self.y = {}  # Keep data.\n\
    \        self.lines = {}  # Keep references to plotted lines, to update.\n\n \
    \       layout = QVBoxLayout()\n        self.graphWidget = pg.PlotWidget()\n \
    \       self.graphWidget.setBackground(\"w\")\n        layout.addWidget(self.graphWidget)\n\
    \n        button = QPushButton(\"Create New Worker\")\n        button.pressed.connect(self.execute)\n\
    \n        # layout.addWidget(self.progress)\n        layout.addWidget(button)\n\
    \n        w = QWidget()\n        w.setLayout(layout)\n\n        self.setCentralWidget(w)\n\
    \n        self.show()\n\n    def execute(self):\n        worker = Worker()\n \
    \       worker.signals.data.connect(self.receive_data)\n\n        # Execute\n\
    \        self.threadpool.start(worker)\n\n    def receive_data(self, data):\n\
    \        worker_id, x, y = data ③\n\n        if worker_id not in self.lines:\n\
    \            self.x[worker_id] = [x]\n            self.y[worker_id] = [y]\n\n\
    \            # Generate a random color.\n            pen = pg.mkPen(\n       \
    \         width=2,\n                color=(\n                    random.randint(100,\
    \ 255),\n                    random.randint(100, 255),\n                    random.randint(100,\
    \ 255),\n                ),\n            )\n            self.lines[worker_id]\
    \ = self.graphWidget.plot(\n                self.x[worker_id], self.y[worker_id],\
    \ pen=pen\n            )\n            return\n\n        # Update existing plot/data\n\
    \        self.x[worker_id].append(x)\n        self.y[worker_id].append(y)\n\n\
    \        self.lines[worker_id].setData(self.x[worker_id], self.y[worker_id])\n\
    \napp = QApplication(sys.argv)\nwindow = MainWindow()\napp.exec_()\n```\n\n① Setup\
    \ a custom signal to pass out the data. Using `tuple` allows you to send out any\
    \ number of values wrapped in a `tuple`.\n\n② Here we're emitting a `worker_id`,\
    \ `x` and `y` value.\n\n③ Receiver slot unpacks the data.\n\nOnce you've received\
    \ the data from a worker, you can do what you like with it—perhaps add it to a\
    \ table or model view. Here we're storing the `x` and `y` values in `dict` objects\
    \ keyed by the `worker_id`. That keeps the data for each worker separate and allows\
    \ us to plot them individually.\n\nIf you run this example press the button you'll\
    \ see a line appear on the plot and gradually extend. If you press the button\
    \ again, another worker will start, returning more data and adding another line\
    \ to the plot. Each worker generates data at a different rate, each generating\
    \ 100 values.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_505_0.png)\n\nFigure\
    \ 214. Plot output from a single runner after a few iterations.\n\nYou can start\
    \ new workers up to the *max threads* available on your machine. After generating\
    \ 100 values workers will shut-down and the next queued worker will start up —\
    \ adding its values as a new line.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_505_1.png)\n\
    \nFigure 215. Plot from multiple runners.\n\nThe `tuple` is of course optional,\
    \ you could send back bare strings if you have only one runner, or don’t need\
    \ to associated outputs with a source. It is also possible to send a `bytestring`,\
    \ or any other type of data, by setting up the signals appropriately.\n\n## Stopping\
    \ a running QRunner\n\nOnce you've started a QRunner there is, by default, no\
    \ way to stop it. This isn't very nice from a usability point of view—if a user\
    \ starts task by mistake, they then have to sit and wait for it to finish. Unfortunately,\
    \ there is no way to *kill* a runner, however we can ask it nicely to stop. In\
    \ this example we'll look at how we can use *flags* to indicate to the runner\
    \ that it needs to stop.\n\n> In computing *flags* are variables that are used\
    \ to signal a current or change in state. Think of how ships use flags to communicate\
    \ with one another.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_506_0.png)\n\n\
    Figure 216. Lima, \"You should stop your vessel instantly.\"\n\nThe code below\
    \ implements a simple runner with a progress bar which increases every 0.01 seconds\
    \ from left to right, and a **[ Stop ]** button. If you click **[ Stop ]** the\
    \ worker will exit, stopping the progress bar permanently.\n\nListing 178. concurrent/qrunner_stop.py\n\
    \n```python\nimport sys\nimport time\n\nfrom PySide2.QtCore import QObject, QRunnable,\
    \ Qt, QThreadPool, Signal, Slot\nfrom PySide2.QtWidgets import (\n    QApplication,\n\
    \    QHBoxLayout,\n    QMainWindow,\n    QProgressBar,\n    QPushButton,\n   \
    \ QWidget,\n)\n\nclass WorkerKilledException(Exception):\n    pass\n\nclass WorkerSignals(QObject):\n\
    \    progress = Signal(int)\n\nclass JobRunner(QRunnable):\n    signals = WorkerSignals()\n\
    \n    def __init__(self):\n        super().__init__()\n\n        self.is_killed\
    \ = False ①\n\n    @Slot()\n    def run(self):\n        try:\n            for\
    \ n in range(100):\n                self.signals.progress.emit(n + 1)\n      \
    \          time.sleep(0.1)\n\n                if self.is_killed: ②\n         \
    \           raise WorkerKilledException\n\n        except WorkerKilledException:\n\
    \            pass ③\n\n    def kill(self): ④\n        self.is_killed = True\n\n\
    class MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        # Some buttons\n        w = QWidget()\n        l = QHBoxLayout()\n \
    \       w.setLayout(l)\n\n        btn_stop = QPushButton(\"Stop\")\n```"
