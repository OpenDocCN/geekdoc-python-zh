  md: '# One event loop to rule them all


    Remember I said there can only be one Qt event loop running at any time? I meant
    it! The `QDialog` completely blocks your application execution. Don''t start a
    dialog and expect anything else to happen anywhere else in your app.


    We''ll see later how you can use multithreading to get you out of this pickle.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_123_0.png)


    Figure 51. Our empty dialog overlaying the window.


    Like our very first window, this isn''t very interesting. Let''s fix that by adding
    a dialog title and a set of OK and Cancel buttons to allow the user to *accept*
    or *reject* the modal.


    To customize the `QDialog` we can subclass it.'
