  md: '# # 15. The Qt Resource system


    Building applications takes more than just code. Usually your interface will need
    icons for actions, you may want to add illustrations or branding logos, or perhaps
    your application will need to load data files to pre-populate widgets. These *data
    files* are separate from the source code of your application but will ultimately
    need to be packaged and distributed with it in order for it to work.


    Distributing data files with applications is a common cause of problems. If you
    reference data files with paths, your application won''t work properly unless
    the exact same paths are available on the target computer. This can get even trickier
    when packaging applications for cross-platform (Windows, macOS and Linux) use.
    Thankfully, Qt comes to the rescue with its *resource system*.


    Since we''re using Qt for our GUI we can make use of Qt Resource system to bundle,
    identify and load resources in our application. Resources are *bundled* into Python
    files which can be distributed along with your source code, guaranteeing they
    will continue to work on other platforms. You can manage Qt resources through
    Qt Designer (or Qt Creator) and use resource library to add icons (and other graphics)
    to your apps.


    # ## The QRC file


    The core of the Qt Resources system is the *resource file* or QRC. The `.qrc`
    file is a simple XML file, which can be opened in any text editor.


    > > You can also create QRC files and add and remove resources using Qt Designer,
    which we''ll cover later.


    # ### Simple QRC example


    A very simple resource file is shown below, containing a single resource (a single
    icon `animal-penguin.png` we might add to a button).'
  merge: -1
