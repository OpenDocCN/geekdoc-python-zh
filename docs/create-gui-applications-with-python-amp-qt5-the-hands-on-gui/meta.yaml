    object `self`. Passing in the canvas links the created toolbar to it, allowing
    it to be controlled. The resulting toolbar object is stored in the variable `toolbar`.


    We need to add two widgets to the window, one above the other, so we use a `QVBoxLayout`.
    First we add our toolbar widget `toolbar` and then the canvas widget `sc` to this
    layout. Finally, we set this layout onto our simple `widget` layout container
    which is set as the central widget for the window.


