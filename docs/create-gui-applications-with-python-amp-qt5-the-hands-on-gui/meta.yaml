  - '[PAGE 614]


    complex builds, for example when you are targeting different platforms and want
    to conditionally define additional libraries or dependencies to bundle.


    Once a `.spec` file has been generated, you can pass this to `pyinstaller` instead
    of your script to repeat the previous build process. Run this now to rebuild your
    executable.


    ```

    pyinstaller app.spec

    ```


    The resulting build will be identical to the build used to generate the `.spec`
    file (assuming you have made no changes). For many **PyInstaller** configuration
    changes you have the option of passing command-line arguments, or modifying your
    existing `.spec` file. Which you choose is up to you.


    # Tweaking the build


    So far we''ve created a simple first build of a very basic application. Now we''ll
    look at a few of the most useful options that **PyInstaller** provides to tweak
    our build. Then we''ll go on to look at building more complex applications.


    # Naming your app


    One of the simplest changes you can make is to provide a proper "name" for your
    application. By default the app takes the name of your source file (minus the
    extension), for example `main` or `app`. This isn''t usually what you want.


    You can provide a nicer name for **PyInstaller** to use for the executable (and
    `dist` folder) either by editing the `.spec` file to add a `name=` under the app
    block.'
  - "[PAGE 615]\n\n```\nexe = EXE(pyz,\n          a.scripts,\n          [],\n    \
    \      exclude_binaries=True,\n          name='app',\n          name='Hello World',\n\
    \          debug=False,\n          bootloader_ignore_signals=False,\n        \
    \  strip=False,\n          upx=True,\n          console=False  # False = do not\
    \ show console.\n          )\n```\n\nAlternatively, you can re-run the `pyinstaller`\
    \ command and pass the `-n` or `--name` configuration flag along with your `app.py`\
    \ script.\n\n```\npyinstaller -n \"Hello World\" app.py\n# or\npyinstaller --name\
    \ \"Hello World\" app.py\n```\n\nThe resulting EXE file will is given the name\
    \ `Hello World.exe` and placed in the folder `dist\\Hello World\\`.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_615_0.png)\n\
    \nThe name of the `.spec` file is taken from the name passed in on the command\
    \ line, so this will **also** create a new spec file for you, called `Hello World.spec`\
    \ in"
  - '[PAGE 616]


    your root folder.


    # Hiding the console window


    When you run your packaged application you will notice that a console window runs
    in the background. If you try and close this console window your application will
    also close. You almost never want this window in a GUI application and **PyInstaller**
    provides a simple way to turn this off.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_616_0.png)


    *Figure 244. Application running with terminal in background*


    You can fix this in one of two ways. Firstly, you can edit the previously created
    `.spec` file setting `console=False` under the EXE block as shown below.'
  - "[PAGE 617]\n\n```\nexe = EXE(pyz,\n          a.scripts,\n          [],\n    \
    \      exclude_binaries=True,\n          name='app',\n          debug=False,\n\
    \          bootloader_ignore_signals=False,\n          strip=False,\n        \
    \  upx=True,\n          console=False  # False = do not show console.\n      \
    \    )\n```\n\nAlternatively, you can re-run the `pyinstaller` command and pass\
    \ the `-w`, `--noconsole` or `--windowed` configuration flag along with your `app.py`\
    \ script.\n\n```\npyinstaller -w app.py\n# or\npyinstaller --windowed app.py\n\
    # or\npyinstaller --noconsole app.py\n```\n\n> \U0001F4A1 There is no difference\
    \ between any of the options.\n\nINFO: Re-running `pyinstaller` will re-generate\
    \ the `.spec` file. If you've made any other changes to this file these will be\
    \ lost.\n\n# One File Build\n\nOn Windows **PyInstaller** has the ability to create\
    \ a one-file build, that is, a single EXE file which contains all your code, libraries\
    \ and data files in one. This can be a convenient way to share simple applications,\
    \ as you don't need to provide an installer or zip up a folder of files.\n\nTo\
    \ specify a one-file build provide the `--onefile` flag at the command line."
  - '[PAGE 618]


    ```

    pyinstaller --onefile app.py

    ```


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_618_0.png)


    Figure 245. Result of a one-file build


    Note that while the one-file build is easier to distribute, it is slower to execute
    than a normally built application. This is because every time the application
    is run it must create a temporary folder to unpack the contents of the executable.
    Whether this trade-off is worth the convenience for your app is up to you!


    > Using the `--onefile` option makes quite a few changes to the `.spec` file.
    You *can* make these changes manually, but it''s much simpler to use the command
    line switch when first creating your `.spec`


    > Since debugging a one file app is much harder, you should make sure everything
    is working with a normal build before you create a one-file package.


