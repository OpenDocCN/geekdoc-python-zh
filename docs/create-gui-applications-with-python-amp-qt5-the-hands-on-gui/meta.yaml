  md: 'That already does the job, but we can go further to provide more customization,
    add some UX improvements and improve the API for working with our widget.


    # Customizing the Bar


    We now have a working power bar, controllable with a dial. But it’s nice when
    creating widgets to provide options to configure the behavior of your widget to
    make it more flexible. In this part we’ll add methods to set customizable numbers
    of segments, colors, padding and spacing.


    The elements we’re going to provide customization for are —


    | Option | Description |

    |---|---|

    | number of bars | How many bars are displayed on the widget |

    | colors | Individual colors for each of the bars |

    | background color | The color of the draw canvas (default black) |

    | padding | Space around the widget edge, between bars and edge of canvas |

    | bar height / bar percent | Proportion (0...1) of the bar which is solid (the
    rest will be spacing between adjacent bars) |


    We can store each of these as attributes on the `_bar` object, and use them from
    the `paintEvent` method to change its behavior.


    The `_Bar.__init__` is updated to accept an initial argument for either the number
    of bars (as an integer) or the colors of the bars (as a list of `QColor`, hex
    values or names). If a number is provided, all bars will be colored red. If the
    a list of colors is provided the number of bars will be determined from the length
    of the color list. Default values for `self._bar_solid_percent`, `self._background_color`,'
