    # Drawing the bar


    Now we have the display updating and displaying the current value of the dial,
    we can move onto drawing the actual bar display. This is a little complicated,
    with a bit of maths to calculate bar positions, but we''ll step through it to
    make it clear what''s going on.


    The sketch below shows what we are aiming for — a series of **N** boxes, inset
    from the edges of the widget, with spaces between them.


