    There are a few things to notice in this example.


    Firstly, the `windowTitleChanged` signal is not *always* emitted when setting
    the window title. The signal only fires if the new title is *changed* from the
    previous one. If you set the same title multiple times, the signal will only be
    fired the first time. It is important to double-check the conditions under which
    signals fire, to avoid being surprised when using them in your app.


    Secondly, notice how we are able to *chain* things together using signals. One
    thing happening—a button press—can trigger multiple other things to happen in
    turn. These subsequent effects do not need to know *what* caused them, but simply
    follow as a consequence of simple rules. This *decoupling* of effects from their
    triggers is one of the key concepts to understand when building GUI applications.
    We''ll keep coming back to this throughout the book!


