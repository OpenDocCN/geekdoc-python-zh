  md: '# 37. Packaging with PyInstaller


    *PyInstaller* is a cross-platform PySide2 packaging system which supports building
    desktop applications for Windows, macOS and Linux. It automatically handles packaging
    of your Python applications, along with any associated libraries and data files,
    either into a standalone one-file executable or a distributable folder you can
    then use to create an installer.


    In this chapter we''ll walk through the process using *PyInstaller* to package
    a PySide2 application. Starting with a simple skeleton app, we''ll add features
    and extend the example to demonstrate how the process changes. This is designed
    to reflect the natural process of building your own apps and adding features and
    dependencies—you should be able to follow this process with your own apps to produce
    a working packaged application.


    We''ll finish off building a complete application **Piecasso**—a completely functional
    Paint clone made with Python 3 & Qt. The packaged application will be bundled
    into a working installer for Windows, macOS and Linux.


    > *PyInstaller* is cross platform but you must always compile your app on your
    target system. So, if you want to create a Mac .app you need to do this on a Mac,
    for an EXE you need to use Windows. However, you can use the same *PyInstaller*
    configuration across all platforms.'
