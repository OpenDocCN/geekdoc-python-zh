  - "[PAGE 333]\n\n# Selecting columns\n\nOften you will not want to display all the\
    \ columns from a table. You can select which columns to display by removing columns\
    \ from the model. To do this call `.removeColumns()` passing in the index of the\
    \ first column to remove and the number of subsequent columns.\n\n```\nself.model.removeColumns(2,\
    \ 5)\n```\n\nOnce removed the columns will no longer be shown on the table. You\
    \ can use the same name-lookup approach used for column labelling to remove columns\
    \ by name.\n\n```\ncolumns_to_remove = ['name', 'something']\n\nfor cn in columns_to_remove:\n\
    \    idx = self.model.fieldIndex(cn)\n    self.model.removeColumns(idx, 1)\n```\n\
    \n> Removing columns in this way just removes them from the view. If you want\
    \ to filter the columns out with SQL see the query models below.\n\n# Filtering\
    \ a table\n\nWe can filter the table by calling `.setFilter()` on the model, passing\
    \ in a parameter which describes the filter. The filter parameter can be any valid\
    \ SQL `WHERE` clause without the `WHERE` prepended. For example `name=\"Martin\"\
    ` to match exactly, or `name LIKE \"Ma%\"` to match fields beginning with \"Ma\"\
    .\n\nIn case you're not familiar with SQL, below are a few example search patterns\
    \ you can use to perform different types of searches."
  - "[PAGE 334]\n\n| Pattern | Description |\n| :--- | :--- |\n| `field=\"{}\"` |\
    \ Field matches the string exactly. |\n| `field LIKE \"{}%\"` | Field begins with\
    \ the given string. |\n| `field LIKE \"%{}\"` | Field ends with the given string.\
    \ |\n| `field LIKE \"%{}%\"` | Field contains the given string. |\n\nIn each example\
    \ `{}` is the search string, which you must interpolate using python `\"{}\".format(search_str)`.\
    \ Unlike the sort, the filter will be applied automatically to the data, without\
    \ the need to call `.select()` again.\n\n> If `.select()` hasn't been called yet,\
    \ the filter will be applied the first time it is.\n\nIn the following example\
    \ we add a `QLineEdit` field and hook this up to search the table on the track\
    \ `name` field. We connect the line edit changed signal to construct and apply\
    \ the filter to the model.\n\nListing 103. databases/tableview_tablemodel_filter.py\n\
    \n```\nimport sys\n\nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtSql\
    \ import QSqlDatabase, QSqlTableModel\nfrom PySide2.QtWidgets import (\n    QApplication,\n\
    \    QLineEdit,\n    QMainWindow,\n    QTableView,\n    QVBoxLayout,\n    QWidget,\n\
    )\n\ndb = QSqlDatabase(\"QSQLITE\")\ndb.setDatabaseName(\"chinook.sqlite\")\n\
    db.open()\n```"
- md: "## Displaying related data with QSqlRelationalTableModel\n\nIn the previous\
    \ examples we've used QSqlTableModel to display data from a single table. However,\
    \ in relational databases tables can have relationships with other tables and\
    \ it is often useful to be able to view that related data inline.\n\nRelationships\
    \ in relational databases are handled through foreign keys. These are a (usually)\
    \ numeric value, stored in a column of one table, which references the primary\
    \ key for a row in another table.\n\nAn example of a foreign key in our example\
    \ tracks table would be album_id or genre_id. Both are numeric values which point\
    \ to records in the album and genre table respectively. Displaying these values\
    \ to the user (1, 2, 3.. etc.) is not helpful because they have no meaning themselves.\n\
    \nWhat would be nicer, would be to pull through the name of the album, or the\
    \ genre and display it in our table view. For that, we can use QSqlRelationalTableModel.\n\
    \nThe setup for this model is identical for the previous. To define the relationships\
    \ we call `.setRelation()` passing the column index, and a `QSqlRelation` object.\n\
    \n```python\nfrom PySide2.QtSql import QSqlRelation, QSqlRelationalTableModel\n\
    \nself.model = QSqlRelationalTableModel(db=db)\n\nrelation = QSqlRelation('<related_table>',\n\
    \    '<related_table_foreign_key_column', '<column_to_display>')\nself.model.setRelation(<column>,\
    \ relation)\n```\n\nThe `QSqlRelation` object accepts three arguments, first the\
    \ related *table* we will be pulling data from, the *foreign key column* on that\
    \ table, and finally the *column* to pull data from.\n\nFor our test database\
    \ *tracks* table, the following will pull data from the related tables for album\
    \ ID, media_type ID and genre ID (columns 3, 4, 5 respectively).\n\nListing 105.\
    \ databases/tableview_relationalmodel.py\n\n```python\nself.model.setTable(\"\
    Track\")\nself.model.setRelation(2, QSqlRelation(\"Album\", \"AlbumId\",\n   \
    \ \"Title\"))\nself.model.setRelation(3, QSqlRelation(\"MediaType\",\n    \"MediaTypeId\"\
    , \"Name\"))\nself.model.setRelation(4, QSqlRelation(\"Genre\", \"GenreId\",\n\
    \    \"Name\"))\nself.model.select()\n```\n\nWhen run you will see the three _id\
    \ columns have been replaced by the data pulled through from the related tables.\
    \ The columns take the names of the related fields, if they don't clash, or have\
    \ a name constructed for them.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_339_0.png)\n\
    \nFigure 160. Displaying data from related fields.\n\n## Using QSqlRelationalDelegate\
    \ to edit related fields.\n\nIf you try and edit fields in a `QSqlRelationalTableModel`\
    \ you'll notice a problem — while you can edit the fields on the base table (here\
    \ *Tracks*) any edits you make to the related fields (e.g. *Album Title*) are\
    \ not saved. These fields are currently only views to the data.\n\nValid values\
    \ for related fields are limited by the values in the related table — to have\
    \ more choices, we need to add another row to the related table. Since the options\
    \ are restricted, it often makes sense to display the choices in a `QComboBox`.\
    \ Qt comes with a model item delegate which can do this lookup and display for\
    \ us — `QSqlRelationalDelegate`.\n\nListing 106. databases/tableview_relationalmodel_delegate.py\n\
    \n```python\nself.model.setTable(\"Track\")\nself.model.setRelation(2, QSqlRelation(\"\
    Album\", \"AlbumId\", \"Title\"))\nself.model.setRelation(3, QSqlRelation(\"MediaType\"\
    , \"MediaTypeId\", \"Name\"))\nself.model.setRelation(4, QSqlRelation(\"Genre\"\
    , \"GenreId\", \"Name\"))\n\ndelegate = QSqlRelationalDelegate(self.table)\nself.table.setItemDelegate(delegate)\n\
    \nself.model.select()\n```\n\nThis delegate automatically handles the mapping\
    \ for *any* relational fields. We simply create the delegate passing in the `QTableView`\
    \ instance, and then set the resulting delegate on the model, everything is taken\
    \ care of automatically.\n\nRunning this you will see drop-downs when you edit\
    \ the related fields.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_340_0.png)\n\
    \nFigure 161. Making relatable fields editable through a drop-down with QSqlRelationalDelegate\n\
    \n## Generic queries with QSqlQueryModel\n\nSo far we've been displaying an entire\
    \ database table on our `QTableView` with some optional column filtering and sorting.\
    \ However, Qt also allows for displaying more complex queries using `QSqlQueryModel`.\
    \ In this part we'll look at how we can use `QSqlQueryModel` to display an SQL\
    \ query, starting first with a simple single-table query and then relational and\
    \ parameterized queries.\n\nThe process for querying with this model is slightly\
    \ different. Rather than passing the database to the model constructor, here we\
    \ instead create a `QSqlQuery` object which takes the database connection, and\
    \ then pass *that* to the model.\n\n```python\nquery = QSqlQuery(\"SELECT name,\
    \ composer FROM track \", db=db)\n```\n\nThis means that you can use a single\
    \ `QSqlQueryModel` and perform queries on different databases if you like. The\
    \ complete working example of this query is shown below.\n\nListing 107. databases/tableview_querymodel.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtSql\
    \ import QSqlDatabase, QSqlQuery, QSqlQueryModel\nfrom PySide2.QtWidgets import\
    \ QApplication, QMainWindow, QTableView\n\ndb = QSqlDatabase(\"QSQLITE\")\ndb.setDatabaseName(\"\
    chinook.sqlite\")\ndb.open()\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n\n        self.table = QTableView()\n\n        self.model\
    \ = QSqlQueryModel()\n        self.table.setModel(self.model)\n\n        query\
    \ = QSqlQuery(\"SELECT Name, Composer FROM track \", db=db)\n\n        self.model.setQuery(query)\n\
    \n        self.setMinimumSize(QSize(1024, 600))\n        self.setCentralWidget(self.table)\n\
    \napp = QApplication(sys.argv)\nwindow = MainWindow()\nwindow.show()\napp.exec_()\n\
    ```"
  mdcn: "## 使用 QSqlRelationalTableModel 显示关联数据\n\n在前面的示例中，我们使用了 QSqlTableModel 来显示单个表的数据。然而，在关系型数据库中，表之间可能存在关联关系，能够内联查看这些关联数据通常非常有用。\n\
    \n关系型数据库中的关联关系通过外键来处理。外键是一个（通常是）数值，存储在某个表的列中，用于引用另一个表中某行的主键。\n\n在我们的示例 tracks\
    \ 表中，外键的一个例子是 album_id 或 genre_id。两者都是数值，分别指向 album 和 genre 表中的记录。向用户显示这些值（1、2、3\
    \ 等）没有意义，因为它们本身没有含义。\n\n更好的做法是提取专辑名称或流派名称，并将其显示在我们的表格视图中。为此，我们可以使用 QSqlRelationalTableModel。\n\
    \n该模型的设置与之前相同。要定义关联关系，我们调用 `.setRelation()`，传入列索引和一个 `QSqlRelation` 对象。\n\n```python\n\
    from PySide2.QtSql import QSqlRelation, QSqlRelationalTableModel\n\nself.model\
    \ = QSqlRelationalTableModel(db=db)\n\nrelation = QSqlRelation('<related_table>',\n\
    \    '<related_table_foreign_key_column', '<column_to_display>')\nself.model.setRelation(<column>,\
    \ relation)\n```\n\n`QSqlRelation` 对象接受三个参数：第一个是我们要从中提取数据的关联*表*，第二个是该表上的*外键列*，最后是要从中提取数据的*列*。\n\
    \n对于我们的测试数据库 *tracks* 表，以下代码将从关联表中提取专辑 ID、媒体类型 ID 和流派 ID（分别是第 3、4、5 列）的数据。\n\n\
    清单 105. databases/tableview_relationalmodel.py\n\n```python\nself.model.setTable(\"\
    Track\")\nself.model.setRelation(2, QSqlRelation(\"Album\", \"AlbumId\",\n   \
    \ \"Title\"))\nself.model.setRelation(3, QSqlRelation(\"MediaType\",\n    \"MediaTypeId\"\
    , \"Name\"))\nself.model.setRelation(4, QSqlRelation(\"Genre\", \"GenreId\",\n\
    \    \"Name\"))\nself.model.select()\n```\n\n运行后，你会看到三个 _id 列已被从关联表中提取的数据替换。这些列会采用关联字段的名称（如果名称不冲突），或者系统会为其构造一个名称。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_339_0.png)\n\n图 160. 显示来自关联字段的数据。\n\
    \n## 使用 QSqlRelationalDelegate 编辑关联字段\n\n如果你尝试编辑 `QSqlRelationalTableModel` 中的字段，你会注意到一个问题——虽然你可以编辑基础表（这里是\
    \ *Tracks*）上的字段，但你对关联字段（例如 *Album Title*）所做的任何编辑都不会被保存。这些字段目前只是数据的视图。\n\n关联字段的有效值受限于关联表中的值——为了有更多选择，我们需要向关联表中添加另一行。由于选项是受限的，通常将选择显示在\
    \ `QComboBox` 中是合理的。Qt 自带一个模型项委托，可以为我们执行此查找和显示——`QSqlRelationalDelegate`。\n\n\
    清单 106. databases/tableview_relationalmodel_delegate.py\n\n```python\nself.model.setTable(\"\
    Track\")\nself.model.setRelation(2, QSqlRelation(\"Album\", \"AlbumId\", \"Title\"\
    ))\nself.model.setRelation(3, QSqlRelation(\"MediaType\", \"MediaTypeId\", \"\
    Name\"))\nself.model.setRelation(4, QSqlRelation(\"Genre\", \"GenreId\", \"Name\"\
    ))\n\ndelegate = QSqlRelationalDelegate(self.table)\nself.table.setItemDelegate(delegate)\n\
    \nself.model.select()\n```\n\n此委托会自动处理*任何*关联字段的映射。我们只需创建委托并传入 `QTableView` 实例，然后将生成的委托设置到模型上，一切都会自动处理。\n\
    \n运行此代码，当你编辑关联字段时，会看到下拉菜单。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_340_0.png)\n\
    \n图 161. 通过 QSqlRelationalDelegate 的下拉菜单使关联字段可编辑\n\n## 使用 QSqlQueryModel 进行通用查询\n\
    \n到目前为止，我们一直在 `QTableView` 上显示整个数据库表，并进行一些可选的列过滤和排序。然而，Qt 也允许使用 `QSqlQueryModel`\
    \ 显示更复杂的查询。在本节中，我们将探讨如何使用 `QSqlQueryModel` 来显示 SQL 查询，首先从简单的单表查询开始，然后是关联查询和参数化查询。\n\
    \n使用此模型进行查询的过程略有不同。我们不是将数据库传递给模型构造函数，而是创建一个 `QSqlQuery` 对象，该对象接受数据库连接，然后将*该对象*传递给模型。\n\
    \n```python\nquery = QSqlQuery(\"SELECT name, composer FROM track \", db=db)\n\
    ```\n\n这意味着你可以使用单个 `QSqlQueryModel`，并在需要时对不同的数据库执行查询。此查询的完整工作示例如下所示。\n\n清单 107.\
    \ databases/tableview_querymodel.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore\
    \ import QSize, Qt\nfrom PySide2.QtSql import QSqlDatabase, QSqlQuery, QSqlQueryModel\n\
    from PySide2.QtWidgets import QApplication, QMainWindow, QTableView\n\ndb = QSqlDatabase(\"\
    QSQLITE\")\ndb.setDatabaseName(\"chinook.sqlite\")\ndb.open()\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.table = QTableView()\n\
    \n        self.model = QSqlQueryModel()\n        self.table.setModel(self.model)\n\
    \n        query = QSqlQuery(\"SELECT Name, Composer FROM track \", db=db)\n\n\
    \        self.model.setQuery(query)\n\n        self.setMinimumSize(QSize(1024,\
    \ 600))\n        self.setCentralWidget(self.table)\n\napp = QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec_()\n```"
