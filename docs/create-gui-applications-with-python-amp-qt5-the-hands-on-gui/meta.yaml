    # # Axis Labels


    Similar to titles, we can use the `setLabel()` method to create our axis titles.
    This requires two parameters, *position* and *text*. The *position* can be any
    one of ''left'',''right'',''top'',''bottom'' which describe the position of the
    axis on which the text is placed. The 2nd parameter *text* is the text you want
    to use for the label.


    You can pass additional style parameters into the method. These differ slightly
    than for the title, in that they need to be valid CSS name-value pairs. For example,
    the size is now `font-size`. Because the name `font-size` has a hyphen in it,
    you cannot pass it directly as a parameter, but must use the `**dictionary` method.


    ```

    python

    styles = {''color'':''r'', ''font-size'':''30pt''}

    self.graphWidget.setLabel(''left'', ''Temperature (°C)'', **styles)

    self.graphWidget.setLabel(''bottom'', ''Hour (H)'', **styles)

    ```


    These also support HTML syntax if you prefer.


    ```

    python

    self.graphWidget.setLabel(''left'', "<span style="color:red;font-size:30px">Temperature
    (°C)</span>")

    self.graphWidget.setLabel(''bottom'', "<span style="color:red;font-size:30px">Hour
    (H)</span>")

    ```'
