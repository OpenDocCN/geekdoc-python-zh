    \ example.\n\n# Pausing a runner\n\nPausing a runner is a rarer requirement —\
    \ normally you want things to go *as fast as possible*. But sometimes you may\
    \ want to put a worker to \"sleep\" so it temporarily stops reading from a data\
    \ source. You can do this with a small modification to the approach used to stop\
