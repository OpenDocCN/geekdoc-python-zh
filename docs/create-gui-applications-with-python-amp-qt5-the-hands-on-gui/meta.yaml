    ```\n\n## .rowcount()\n\nThe .rowcount() method is called by the view to get the\
    \ number of rows in the current data. This is required for the view to know the\
    \ maximum index it can request from the data store (rowcount - 1). Since we're\
    \ using a Python list as our data store, the return value for this is simply the\
    \ len() of the list.\n\n## .data()\n\nThis is the core of your model, which handles\
    \ requests for data from the view and returns the appropriate result. It receives\
    \ two parameters index and role.\n\nindex is the position/coordinates of the data\
    \ which the view is requesting, accessible by two methods .row() and .column()\
    \ which give the position in each dimension. For a list view, column can be ignored.\n\
    \n> For our QListView, the column is always 0 and can be ignored. But you would\
    \ need to use this for 2D data, for example in a spreadsheet view.\n\nrole is\
