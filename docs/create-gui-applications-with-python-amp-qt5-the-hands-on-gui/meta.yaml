  md: '# 22. Tabular data in ModelViews, with numpy & pandas


    In the previous section we covered an introduction to the Model View architecture.
    However, we only touched on one of the model views — `QListView`. There are two
    other Model Views available in PySide2 — `QTableView` and `QTreeView` which provide
    tabular (Excel-like) and tree (file directory browser-like) views using the same
    `QStandardItemModel`.


    In this part we''ll look at how to use `QTableView` from PySide2, including how
    to model your data, format values for display and add conditional formatting.


