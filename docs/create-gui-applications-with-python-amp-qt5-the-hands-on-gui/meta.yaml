  md: '# Running External processes


    So far we''ve looked how we can run Python code in another *thread*. Sometimes
    however you need to run external programs—such as command line programs—in another
    *process*.


    You actually have two options when starting external processes with PySide2. You
    can either use Python''s built-in `subprocess` module to start the processes,
    or you can use Qt''s `QProcess`.


    > For more information on running external processes using `QProcess` take a look
    at the [Running external commands & processes](Running external commands & processes)
    chapter.


    Starting a new process always comes with a small execution cost and will block
    your GUI momentarily. This is usually not perceptible but it can add up depending
    on your use case and may have performance impacts. You can get around this by
    starting your processes in another thread.


    If you want to communicate with the process in real-time you will need a separate
    thread to avoid blocking the GUI. `QProcess` handles this separate thread for
    you internally, but with Python `subprocess` you will need to do this yourself.


    In this `QRunner` example we use instances of workers to handle starting external
    processes through Python `subprocess`. This keeps the startup cost of the process
    out of the GUI thread and also allows us to interact with the processes directly
    through Python.


    Listing 186. concurrent/qrunner_process.py


    ```

    import subprocess

    import sys

    import time

    import traceback

    import uuid

    from collections import namedtuple

    ```'
