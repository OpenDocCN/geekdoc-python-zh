    # Appendix C: PyQt5 and PySide2 — What’s the difference?


    If you start building Python application with Qt5 you’ll soon discover that there
    are in fact two packages which you can use to do this — PyQt5 and PySide2.


    In this short chapter I’ll run through why exactly this is, whether you need to
    care (spoiler: you really don’t), what the (few) differences are and how to work
    around them. By the end you should be comfortable re-using code examples from
    both PyQt5 and PySide2 tutorials to build your apps, regardless of which package
    you’re using yourself.


    > If you bought a copy of this ebook you can have access to both PyQt5 and PySide2
    versions of this book. Just let me know and I’ll add them onto your account on
    www.pythonguis.com.


    # Background


    Why are there two libraries?


    PyQt is developed by Phil Thompson of Riverbank Computing Ltd. and has existed
    for a very long time — supporting versions of Qt going back to 2.x. In 2009 Nokia,
    who owned Qt toolkit at the time, wanted to make the Python bindings for Qt available
    in a more permissive LGPL license. Unable to come to agreement with Riverbank
    (who would lose money from this, so fair enough) they then released their own
    bindings as _PySide.


    > It’s called PySide because "side" is Finnish for "binder".


    The two interfaces were basically equivalent, but over time development of PySide
    lagged behind PyQt. This was particularly noticeable following the release of
    Qt 5 — the Qt5 version of PyQt (PyQt5) has been available since mid-2016, while
    the first stable release of PySide2 was 2 years later.'
  - '[PAGE 713]


    With that in mind, it is unsurprising that many Qt5 on Python examples use PyQt5
    — if only because it was *available*. However, the Qt project has recently adopted
    PySide as the official [Qt for Python release](https://www.qt.io/qt-for-python)
    which should ensure its viability going forward.


    | | PyQt5 | PySide2 |

    |---|---|---|

    | First stable release | Apr 2016 | Jul 2018 |

    | Developed by | Riverbank Computing Ltd. | Qt |

    | License | GPL or commercial | LGPL |

    | Platforms | Python 3 | Python 3 and Python 2.7 (Linux and macOS only) |


    Which should you use? Well, honestly, it doesn''t really matter.


    Both packages are wrapping the same library — Qt5 — and so have 99.9% identical
    APIs (see below for the few differences). Code that is written for one can often
    be used as-is with other, simply changing the imports from `PyQt5` to `PySide2`.
    Anything you learn for one library will be easily applied to a project using the
    other.


    Also, no matter with one you choose to use, it''s worth familiarizing yourself
    with the other so you can make the best use of all available online resources
    — using PyQt5 tutorials to build your PySide2 applications for example, and *vice
    versa*.


    In this short chapter I''ll run through the few notable differences between the
    two packages and explain how to write code which works seamlessly with both. After
    reading this you should be able to take any PyQt5 example online and convert it
    to work with PySide2.


    # Licensing


    The main notable difference between the two versions is licensing — with PyQt5'
  - '[PAGE 714]


    being available under a GPL or commercial license, and PySide2 under a LGPL license.


    If you are planning to release your software itself under the GPL, or you are
    developing software which will not be *distributed*, the GPL requirement of PyQt5
    is unlikely to be an issue. However, if you want to distribute your software but
    not share your source code you will need to purchase a commercial license from
    Riverbank for PyQt5 or use PySide2.


    > Qt itself is available under a *Qt Commercial License*, GPL 2.0, GPL 3.0 and
    LGPL 3.0 licenses.


    # UI files


    The only major difference between the two libraries is in their handling of loading
    `.ui` files exported from Qt Creator/Designer. PyQt5 provides the `uic` submodule
    which can be used to load UI files directly, to produce an object. This feels
    pretty Pythonic (if you ignore the camelCase).


    ```

    import sys

    from PyQt5 import QtWidgets, uic


    app = QtWidgets.QApplication(sys.argv)


    window = uic.loadUi("mainwindow.ui")

    window.show()

    app.exec()

    ```


    The equivalent with PySide2 is one line longer, since you need to create a `QUILoader`
    object first. Unfortunately the API of these two interfaces is different too (`.load`
    vs `.loadUI`).'
- md: "## Converting UI files to Python\n\nBoth libraries provide identical scripts\
    \ to generate Python importable modules from Qt Designer `.ui` files. For PyQt5\
    \ the script is named `pyuic5` —\n\n```\npyuic5 mainwindow.ui -o MainWindow.py\n\
    ```\n\nYou can then import the `UI_MainWindow` object, subclass using multiple\
    \ inheritance from the base class you're using (e.g. `QMainWindow`) and then call\
    \ `self.setupUI(self)` to set the UI up.\n\n```python\nimport sys\nfrom PyQt5\
    \ import QtWidgets\nfrom MainWindow import Ui_MainWindow\n\nclass MainWindow(QtWidgets.QMainWindow,\
    \ Ui_MainWindow):\n\n    def __init__(self, *args, **kwargs):\n        super().__init__(*args,\
    \ **kwargs)\n        self.setupUi(self)\n\napp = QtWidgets.QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec()\n```\n\nFor PySide2 it is named\
    \ `pyside2-uic` —\n\n```\npyside2-uic mainwindow.ui -o MainWindow.py\n```\n\n\
    The subsequent setup is identical.\n\n```python\nimport sys\nfrom PySide2 import\
    \ QtWidgets\nfrom MainWindow import Ui_MainWindow\n\nclass MainWindow(QtWidgets.QMainWindow,\
    \ Ui_MainWindow):\n\n    def __init__(self, *args, **kwargs):\n        super().__init__(*args,\
    \ **kwargs)\n        self.setupUi(self)\n\napp = QtWidgets.QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec_()\n```\n\n> For more information\
    \ in using Qt Designer with either PyQt5 or PySide2 see the Qt Creator chapter.\n\
    \n## exec() or exec_()\n\nThe `.exec()` method is used in Qt to start the event\
    \ loop of your `QApplication` or dialog boxes. In Python 2.7 `exec` was a keyword,\
    \ meaning it could not be used for variable, function or method names. The solution\
    \ used in both PyQt4 and PySide was to rename uses of `.exec` to `.exec_()` to\
    \ avoid this conflict.\n\nPython 3 removed the `exec` keyword, freeing the name\
    \ up to be used. As PyQt5 targets only Python 3 it could remove the workaround,\
    \ and `.exec()` calls are named just as in Qt itself. However, the `.exec_()`\
    \ names are maintained for backwards compatibility.\n\nPySide2 is available on\
    \ both Python 3 and Python 2.7 and so still uses `.exec_()`. It is however only\
    \ available for 64bit Linux and macOS.\n\nIf you're targeting both PySide2 and\
    \ PyQt5 use `.exec_()`\n\n## Slots and Signals\n\nDefining custom slots and signals\
    \ uses slightly different syntax between the two libraries. PySide2 provides this\
    \ interface under the names `Signal` and `Slot` while PyQt5 provides these as\
    \ `pyqtSignal` and `pyqtSlot` respectively. The behavior of them both is identical\
    \ for defining and slots and signals.\n\nThe following PyQt5 and PySide2 examples\
    \ are identical —\n\n```python\nmy_custom_signal = pyqtSignal()  # PyQt5\nmy_custom_signal\
    \ = Signal()  # PySide2\n\nmy_other_signal = pyqtSignal(int)  # PyQt5\nmy_other_signal\
    \ = Signal(int)  # PySide2\n```\n\nOr for a slot —\n\n```python\n@pyqtslot\ndef\
    \ my_custom_slot():\n    pass\n\n@Slot\ndef my_custom_slot():\n    pass\n```\n\
    \nIf you want to ensure consistency across PyQt5 and PySide2 you can use the following\
    \ import pattern for PyQt5 to use the `Signal` and `@Slot` style there too.\n\n\
    ```python\nfrom PyQt5.QtCore import pyqtSignal as Signal, pyqtSlot as Slot\n```\n\
    \n> You could of course do the reverse `from PySide2.QtCore import Signal as pyqtSignal,\
    \ Slot as pyqtSlot` although that’s a bit confusing.\n\n## Supporting both in\
    \ libraries\n\n> You don’t need to worry about this if you’re writing a standalone\
    \ app, just use whichever API you prefer.\n\nIf you’re writing a library, widget\
    \ or other tool you want to be compatible with both PyQt5 and PySide2 you can\
    \ do so easily by adding both sets of imports.\n\n```python\nimport sys\n\nif\
    \ 'PyQt5' in sys.modules:\n    # PyQt5\n    from PyQt5 import QtGui, QtWidgets,\
    \ QtCore\n    from PyQt5.QtCore import pyqtSignal as Signal, pyqtSlot as Slot\n\
    \nelse:\n    # PySide2\n    from PySide2 import QtGui, QtWidgets, QtCore\n   \
    \ from PySide2.QtCore import Signal, Slot\n```\n\nThis is the approach used in\
    \ our custom widgets library, where we support for PyQt5 and PySide2 with a single\
    \ library import. The only caveat is that you must ensure PyQt5 is imported before\
    \ (as in on the line above or earlier) when importing this library, to ensure\
    \ it is in `sys.modules`.\n\n> \U0001F4A1 An alternative would be to use an environment\
    \ variable to switch between them — see QtPy later.\n\nIf you're doing this in\
    \ multiple files it can get a bit cumbersome. A nice solution to this is to move\
    \ the import logic to its own file, e.g. named `qt.py` in your project root. This\
    \ module imports the Qt modules (`QtCore`, `QtGui`, `QtWidgets`, etc.) from one\
    \ of the two libraries, and then you import into your application from there.\n\
    \nThe contents of the `qt.py` are the same as we used earlier —\n\n```python\n\
    import sys\n\nif 'PyQt5' in sys.modules:\n    # PyQt5\n    from PyQt5 import QtGui,\
    \ QtWidgets, QtCore\n    from PyQt5.QtCore import pyqtSignal as Signal, pyqtSlot\
    \ as Slot\n\nelse:\n    # PySide2\n    from PySide2 import QtGui, QtWidgets, QtCore\n\
    \    from PySide2.QtCore import Signal, Slot\n```\n\nYou must remember to add\
    \ any other PyQt5 modules you use (browser, multimedia, etc.) in both branches\
    \ of the if block. You can then import **Qt5** into your own application as follows\
    \ —\n\n```python\nfrom .qt import QtGui, QtWidgets, QtCore\n```\n\n...and it will\
    \ work seamlessly across either library.\n\n## QtPy\n\nIf you need to target more\
    \ than just Qt5 support (e.g. including PyQt4 and PySide v1) take a look at [QtPy](https://github.com/spyder-ide/qtpy).\
    \ This provides a standardized PySide2-like API for PyQt4, PySide, PyQt5 and PySide2.\
    \ Using QtPy you can control which API to load from your application using the\
    \ `QT_API` environment variable e.g.\n\n```python\nimport os\nos.environ['QT_API']\
    \ = 'pyside2'\nfrom qtpy import QtGui, QtWidgets, QtCore  # imports PySide2.\n\
    ```\n\n## That's really it\n\nThere's not much more to say — the two libraries\
    \ really are that similar. However, if you do stumble across any other PyQt5/PySide2\
    \ examples or features which you can’t easily convert, drop me a note.\n\n## Appendix\
    \ D: What next?\n\nThis book covers the key things you need to know to start creating\
    \ GUI applications with Python. If you've made it here you should be well on your\
    \ way to create your own apps!\n\nBut there is still a lot to discover while you\
    \ build your applications. To help with this I post regular tips, tutorials and\
    \ code snippets [on the accompanying website](https://www.example.com). Like this\
    \ book all samples are MIT licensed and free to mix into your own apps. You may\
    \ also be interested in my [related video courses](https://www.example.com) where\
    \ you can join me as I work through the exercises in this book.\n\nThanks for\
    \ reading, and if you have any feedback or suggestions please [let me know](https://www.example.com)!\n\
    \n## Get access to updates\n\nIf you bought this book direct from me, you will\
    \ receive automatic updates to this book. If you bought this book elsewhere, you\
    \ can [email your receipt to me](mailto:email@example.com) to get the digital\
    \ copies and access to future updates.\n\n## Documentation\n\n| Resource |\n|\
    \ --- |\n| [Qt5.10 Documentation](https://doc.qt.io/qt-5/) |\n| [PyQt5 Library\
    \ documentation](https://www.riverbankcomputing.com/static/Docs/PyQt5/) |\n| [PySide\
    \ \"Qt for Python\" Library documentation](https://wiki.qt.io/Qt_for_Python) |"
  mdcn: "## 将 UI 文件转换为 Python\n\n两个库都提供了相同的脚本，用于从 Qt Designer 的 `.ui` 文件生成可导入的 Python\
    \ 模块。对于 PyQt5，该脚本名为 `pyuic5` —\n\n```\npyuic5 mainwindow.ui -o MainWindow.py\n\
    ```\n\n然后你可以导入 `UI_MainWindow` 对象，使用多重继承从你正在使用的基类（例如 `QMainWindow`）派生子类，然后调用 `self.setupUI(self)`\
    \ 来设置 UI。\n\n```python\nimport sys\nfrom PyQt5 import QtWidgets\nfrom MainWindow\
    \ import Ui_MainWindow\n\nclass MainWindow(QtWidgets.QMainWindow, Ui_MainWindow):\n\
    \n    def __init__(self, *args, **kwargs):\n        super().__init__(*args, **kwargs)\n\
    \        self.setupUi(self)\n\napp = QtWidgets.QApplication(sys.argv)\nwindow\
    \ = MainWindow()\nwindow.show()\napp.exec()\n```\n\n对于 PySide2，该脚本名为 `pyside2-uic`\
    \ —\n\n```\npyside2-uic mainwindow.ui -o MainWindow.py\n```\n\n后续的设置步骤是相同的。\n\n\
    ```python\nimport sys\nfrom PySide2 import QtWidgets\nfrom MainWindow import Ui_MainWindow\n\
    \nclass MainWindow(QtWidgets.QMainWindow, Ui_MainWindow):\n\n    def __init__(self,\
    \ *args, **kwargs):\n        super().__init__(*args, **kwargs)\n        self.setupUi(self)\n\
    \napp = QtWidgets.QApplication(sys.argv)\nwindow = MainWindow()\nwindow.show()\n\
    app.exec_()\n```\n\n> 关于在 PyQt5 或 PySide2 中使用 Qt Designer 的更多信息，请参阅 Qt Creator\
    \ 章节。\n\n## exec() 或 exec_()\n\n`.exec()` 方法在 Qt 中用于启动 `QApplication` 或对话框的事件循环。在\
    \ Python 2.7 中，`exec` 是一个关键字，这意味着它不能用作变量、函数或方法名。PyQt4 和 PySide 中使用的解决方案是将 `.exec`\
    \ 的用法重命名为 `.exec_()` 以避免此冲突。\n\nPython 3 移除了 `exec` 关键字，释放了这个名称以供使用。由于 PyQt5 仅针对\
    \ Python 3，因此它可以移除这个变通方法，`.exec()` 的调用方式与 Qt 本身相同。但是，为了向后兼容，仍然保留了 `.exec_()` 名称。\n\
    \nPySide2 可用于 Python 3 和 Python 2.7，因此仍然使用 `.exec_()`。不过，它仅适用于 64 位 Linux 和 macOS。\n\
    \n如果你的目标是同时支持 PySide2 和 PyQt5，请使用 `.exec_()`\n\n## 槽和信号\n\n定义自定义槽和信号在两个库之间使用略有不同的语法。PySide2\
    \ 在 `Signal` 和 `Slot` 名称下提供此接口，而 PyQt5 分别将其提供为 `pyqtSignal` 和 `pyqtSlot`。它们在定义槽和信号时的行为是相同的。\n\
    \n以下 PyQt5 和 PySide2 示例是相同的 —\n\n```python\nmy_custom_signal = pyqtSignal()  #\
    \ PyQt5\nmy_custom_signal = Signal()  # PySide2\n\nmy_other_signal = pyqtSignal(int)\
    \  # PyQt5\nmy_other_signal = Signal(int)  # PySide2\n```\n\n或者对于槽 —\n\n```python\n\
    @pyqtslot\ndef my_custom_slot():\n    pass\n\n@Slot\ndef my_custom_slot():\n \
    \   pass\n```\n\n如果你想确保在 PyQt5 和 PySide2 之间保持一致性，可以对 PyQt5 使用以下导入模式，以便在那里也使用 `Signal`\
    \ 和 `@Slot` 风格。\n\n```python\nfrom PyQt5.QtCore import pyqtSignal as Signal, pyqtSlot\
    \ as Slot\n```\n\n> 你当然也可以反向操作 `from PySide2.QtCore import Signal as pyqtSignal,\
    \ Slot as pyqtSlot`，尽管这有点令人困惑。\n\n## 在库中同时支持两者\n\n> 如果你正在编写独立应用程序，则无需担心此问题，只需使用你偏好的任何\
    \ API 即可。\n\n如果你正在编写一个库、控件或其他工具，并且希望它与 PyQt5 和 PySide2 都兼容，你可以通过添加两组导入来轻松实现。\n\
    \n```python\nimport sys\n\nif 'PyQt5' in sys.modules:\n    # PyQt5\n    from PyQt5\
    \ import QtGui, QtWidgets, QtCore\n    from PyQt5.QtCore import pyqtSignal as\
    \ Signal, pyqtSlot as Slot\n\nelse:\n    # PySide2\n    from PySide2 import QtGui,\
    \ QtWidgets, QtCore\n    from PySide2.QtCore import Signal, Slot\n```\n\n这是我们在自定义控件库中使用的方法，我们通过单个库导入同时支持\
    \ PyQt5 和 PySide2。唯一的注意事项是，你必须确保在导入此库之前（如在上面的行或更早的行）导入了 PyQt5，以确保它在 `sys.modules`\
    \ 中。\n\n> \U0001F4A1 一个替代方案是使用环境变量在它们之间切换 — 请参阅后面的 QtPy 部分。\n\n如果你在多个文件中执行此操作，可能会变得有点繁琐。一个很好的解决方案是将导入逻辑移动到它自己的文件中，例如在项目根目录中命名为\
    \ `qt.py`。此模块从两个库之一导入 Qt 模块（`QtCore`、`QtGui`、`QtWidgets` 等），然后你从那里导入到你的应用程序中。\n\
    \n`qt.py` 的内容与我们之前使用的内容相同 —\n\n```python\nimport sys\n\nif 'PyQt5' in sys.modules:\n\
    \    # PyQt5\n    from PyQt5 import QtGui, QtWidgets, QtCore\n    from PyQt5.QtCore\
    \ import pyqtSignal as Signal, pyqtSlot as Slot\n\nelse:\n    # PySide2\n    from\
    \ PySide2 import QtGui, QtWidgets, QtCore\n    from PySide2.QtCore import Signal,\
    \ Slot\n```\n\n你必须记住在 if 块的两个分支中添加你使用的任何其他 PyQt5 模块（浏览器、多媒体等）。然后你可以如下所示将 **Qt5**\
    \ 导入到你自己的应用程序中 —\n\n```python\nfrom .qt import QtGui, QtWidgets, QtCore\n```\n\
    \n...它将无缝地跨任一库工作。\n\n## QtPy\n\n如果你需要支持的不仅仅是 Qt5（例如包括 PyQt4 和 PySide v1），请查看 [QtPy](https://github.com/spyder-ide/qtpy)。它为\
    \ PyQt4、PySide、PyQt5 和 PySide2 提供了一个标准化的、类似 PySide2 的 API。使用 QtPy，你可以使用 `QT_API`\
    \ 环境变量控制从你的应用程序加载哪个 API，例如\n\n```python\nimport os\nos.environ['QT_API'] = 'pyside2'\n\
    from qtpy import QtGui, QtWidgets, QtCore  # 导入 PySide2。\n```\n\n## 就是这样\n\n没有太多其他可说的了\
