    The `dist` (for "distribution") folder contains the files to be distributed. This
    includes your application, bundled as an executable file, together with any associated
    libraries (for example PyQt5) and binary `.dll` files.


    Everything necessary to run your application will be in this folder, meaning you
    can take this folder and "distribute" it to someone else to run your app.


    You can try running your app yourself now, by running the executable file, named
    `app.exe` from the `dist` folder. After a short delay you''ll see the familiar
    window of your application pop up as shown below.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_611_0.png)


    Figure 242. Simple app, running after being packaged


    INFO: You may also notice a console/terminal window pop up as your application
    runs. We''ll cover how to stop that happening shortly.


