    \ brush)\n\n    painter.end()\n```\n\n## Updating from the Meter display\n\nCurrently\
    \ you can update the current value of the PowerBar meter by twiddling with the\
    \ dial. But it would be nice if you could also update the value by clicking a\
    \ position on the power bar, or by dragging you mouse up and down. To do this\
    \ we can update our `_Bar` widget to handle mouse events.\n\nListing 162. custom-widgets/powerbar_9.py\n\
    \n```python\nclass _Bar(QtWidgets.QWidget):\n\n    clickedValue = QtCore.Signal(int)\n\
    \    def _calculate_clicked_value(self, e):\n        parent = self.parent()\n\
