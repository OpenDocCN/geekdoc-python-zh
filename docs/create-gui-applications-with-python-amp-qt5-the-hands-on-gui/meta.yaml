    \ at startup and write back any changes.\n\nTo do this we define two new methods\
    \ on our `MainWindow` class — `load` and `save`. These load data from a JSON file\
    \ name `data.json` (if it exists, ignoring the error if it doesn't) to `self.model.todos`\
    \ and write the current `self.model.todos` out to the same file, respectively.\n\
    \nListing 84. model-views/todo_6.py\n\n```python\ndef load(self):\n    try:\n\
    \        with open('data.json', 'r') as f:\n            self.model.todos = json.load(f)\n\
    \    except Exception:\n        pass\n\ndef save(self):\n    with open('data.json',\
    \ 'w') as f:\n        data = json.dump(self.model.todos, f)\n```\n\nTo persist\
    \ the changes to the data we need to add the `.save()` handler to the end of any\
    \ method that modifies the data, and the `.load()` handler to the `__init__` block\
