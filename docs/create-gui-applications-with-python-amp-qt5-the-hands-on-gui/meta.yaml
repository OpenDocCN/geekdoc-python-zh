    \ The widgets should arrange themselves horizontally.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_80_0.png)\n\
    \nFigure 24. Three Color widgets arranged horizontally in a QHBoxLayout.\n\n##\
    \ Nesting layouts\n\nFor more complex layouts you can nest layouts inside one\
    \ another using `.addLayout` on a layout. Below we add a `QVBoxLayout` into the\
    \ main `QHBoxLayout`. If we add some widgets to the `QVBoxLayout`, they'll be\
    \ arranged vertically in the first slot of the parent layout.\n\nListing 28. basic/layout_4.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QHBoxLayout,\n    QLabel,\n    QMainWindow,\n\
    \    QVBoxLayout,\n    QWidget,\n)\n\nfrom layout_colorwidget import Color\n\n\
    class MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        layout1 = QHBoxLayout()\n\
    \        layout2 = QVBoxLayout()\n        layout3 = QVBoxLayout()\n\n        layout2.addWidget(Color(\"\
    red\"))\n        layout2.addWidget(Color(\"yellow\"))\n        layout2.addWidget(Color(\"\
    purple\"))\n\n        layout1.addLayout(layout2)\n\n        layout1.addWidget(Color(\"\
    green\"))\n\n        layout3.addWidget(Color(\"red\"))\n        layout3.addWidget(Color(\"\
    purple\"))\n\n        layout1.addLayout(layout3)\n\n        widget = QWidget()\n\
    \        widget.setLayout(layout1)\n        self.setCentralWidget(widget)\n\n\
    app = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n> **Run it!** The widgets should arrange themselves in 3 columns horizontally,\
    \ with the first column also containing 3 widgets stacked vertically. Experiment!\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_82_0.png)\n\nFigure 25. Nested QHBoxLayout\
    \ and QVBoxLayout layouts.\n\nYou can set the spacing around the layout using\
    \ `.setContentMargins` or set the spacing between elements using `.setSpacing`.\n\
    \n```python\nlayout1.setContentsMargins(0,0,0,0)\nlayout1.setSpacing(20)\n```\n\
    \nThe following code shows the combination of nested widgets and layout margins\
    \ and spacing.\n\nListing 29. basic/layout_5.py\n\n```python\nimport sys\n\nfrom\
    \ PySide2.QtCore import Qt\nfrom PySide2.QtWidgets import (\n    QApplication,\n\
    \    QHBoxLayout,\n    QLabel,\n    QMainWindow,\n    QVBoxLayout,\n    QWidget,\n\
    )\n\nfrom layout_colorwidget import Color\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        layout1 = QHBoxLayout()\n        layout2 = QVBoxLayout()\n\
    \        layout3 = QVBoxLayout()\n\n        layout1.setContentsMargins(0, 0, 0,\
    \ 0)\n        layout1.setSpacing(20)\n\n        layout2.addWidget(Color(\"red\"\
    ))\n        layout2.addWidget(Color(\"yellow\"))\n        layout2.addWidget(Color(\"\
    purple\"))\n\n        layout1.addLayout(layout2)\n\n        layout1.addWidget(Color(\"\
    green\"))\n\n        layout3.addWidget(Color(\"red\"))\n        layout3.addWidget(Color(\"\
    purple\"))\n\n        layout1.addLayout(layout3)\n\n        widget = QWidget()\n\
    \        widget.setLayout(layout1)\n        self.setCentralWidget(widget)\n\n\
    app = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n\U0001F680 **Run it!** You should see the effects of spacing and margins.\
    \ Experiment with the numbers until you get a feel for them.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_84_0.png)\n\
    \nFigure 26. Nested QHBoxLayout and QVBoxLayout layouts with spacing and margins\
    \ around the widgets.\n\n## QGridLayout widgets arranged in a grid\n\nAs useful\
    \ as they are, if you try and use `QVBoxLayout` and `QHBoxLayout` for laying out\
    \ multiple elements, e.g. for a form, you'll find it very difficult to ensure\
    \ differently sized widgets line up. The solution to this is `QGridLayout`.\n\n\
    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_85_0.png)\n\nFigure 27. A QGridLayout\
    \ showing the grid positions for each location.\n\n`QGridLayout` allows you to\
    \ position items specifically in a grid. You specify row and column positions\
    \ for each widget. You can skip elements, and they will be left empty.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_85_1.png)\n\
    \nFigure 28. A QGridLayout with unfilled slots.\n\nListing 30. basic/layout_6.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import QApplication, QGridLayout, QLabel,\n    QMainWindow, QWidget\n\nfrom\
    \ layout_colorwidget import Color\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n   \
    \     layout = QGridLayout()\n\n        layout.addWidget(Color(\"red\"), 0, 0)\n\
    \        layout.addWidget(Color(\"green\"), 1, 0)\n        layout.addWidget(Color(\"\
    blue\"), 1, 1)\n        layout.addWidget(Color(\"purple\"), 2, 1)\n\n        widget\
    \ = QWidget()\n        widget.setLayout(layout)\n        self.setCentralWidget(widget)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n\U0001F680 Run it! You should see the widgets arranged in a grid, aligned\
    \ despite missing entries.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_87_0.png)\n\
    \nFigure 29. Four Color widgets in a QGridLayout.\n\n## QStackedLayout multiple\
    \ widgets in the same space\n\nThe final layout we'll cover is the `QStackedLayout`.\
    \ As described, this layout allows you to position elements directly in front\
    \ of one another. You can then select which widget you want to show. You could\
    \ use this for drawing layers in a graphics application, or for imitating a tabbed\
    \ interface. Note there is also `QStackedWidget` which is a container widget that\
    \ works in exactly the same way. This is useful if you want to add a stack directly\
    \ to a `QMainWindow` with `.setCentralWidget`.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_88_0.png)\n\
    \nFigure 30. QStackedLayout — in use only the uppermost widget is visible, which\
    \ is by default the first widget added to the layout.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_89_0.png)\n\
    \nFigure 31. QStackedLayout, with the 2nd (1) widget selected and brought to the\
    \ front\n\nListing 31. basic/layout_7.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore\
    \ import Qt\nfrom PySide2.QtWidgets import QApplication, QLabel, QMainWindow,\n\
    \    QStackedLayout, QWidget\n\nfrom layout_colorwidget import Color\n\nclass\
    \ MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        layout = QStackedLayout()\n\
    \n        layout.addWidget(Color(\"red\"))\n        layout.addWidget(Color(\"\
    green\"))\n        layout.addWidget(Color(\"blue\"))\n        layout.addWidget(Color(\"\
    yellow\"))\n\n        layout.setCurrentIndex(3)\n\n        widget = QWidget()\n\
    \        widget.setLayout(layout)\n        self.setCentralWidget(widget)\n\napp\
    \ = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n\U0001F680 Run it! You will see only the last widget you added."
  mdcn: "## QHBoxLayout 水平排列的部件\n\nQHBoxLayout 与 QVBoxLayout 相同，只是方向是水平的。添加一个部件会将其添加到右侧。\n\
