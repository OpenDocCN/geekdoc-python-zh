  md: "# # Packaging & Distribution\n\n> > Design isn’t finished until somebody is\
    \ using it.\n> \n> — Brenda Laurel, PhD\n\nThere is not much fun in creating your\
    \ own application if you can’t share it with other people — whether that means\
    \ publishing it commercially, sharing it online or just giving it to someone you\
    \ know. Sharing your apps allows other people to benefit from your hard work!\n\
    \nPackaging Python applications for distribution has typically been a little tricky,\
    \ particularly when targeting multiple platforms (Windows, macOS and Linux). This\
    \ is because of the need to bundle the source, data files, the Python runtime\
    \ and all associated libraries in a way that will work reliably on the target\
    \ system.\n\nThankfully there are a Python packages available to take care of\
    \ this for you. In this chapter we’ll look at the *de facto* standard option for\
    \ packaging PySide2 packages for distribution in Python — *PyInstaller*."
