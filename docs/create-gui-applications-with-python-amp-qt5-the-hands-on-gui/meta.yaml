- img_proc: true
  md: "Listing 160. custom-widgets/powerbar_8.py\n\n```\ndef __getattr__(self, name):\n\
    \    if name in self.__dict__:\n        return self[name]\n\n    try:\n      \
    \  return getattr(self._dial, name)\n    except AttributeError:\n        raise\
    \ AttributeError(\n            \"'{}' object has no attribute '{}'\".format(\n\
    \                self.__class__.__name__, name\n            )\n        )\n```\n\
    \nWhen accessing a property (or method) -- e.g. when we call `PowerBar.setNotchesVisible(true)`\
    \ Python internally uses `__getattr__` to get the property from the current object.\
    \ This handler does this through the object dictionary `self.__dict__`. We've\
    \ overridden this method to provide our custom handling logic.\n\nNow, when we\
    \ call `PowerBar.setNotchesVisible(true)`, this handler first looks on our current\
    \ object (a `PowerBar` instance) to see if `.setNotchesVisible` exists and if\
    \ it does uses it. If **not** it then calls `getattr()` on `self._dial` instead\
    \ returning what it finds there. This gives us access to all the methods of `QDial`\
    \ from our custom `PowerBar` widget.\n\nIf `QDial` doesn't have the attribute\
    \ either, and raises an `AttributeError` we catch it and raise it again from our\
    \ custom widget, where it belongs.\n\n> This works for any properties or methods,\
    \ including signals. So the standard `QDial` signals such as `.valueChanged` are\
    \ available too.\n\nThanks to these changes we can also simplify the code in our\
    \ `paintEvent` to get the current state from `.parent()` directly, rather than\
    \ `.parent()._dial`. This doesn't"
