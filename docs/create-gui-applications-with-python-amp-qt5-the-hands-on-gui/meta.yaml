- md: "## Number range gradients\n\nThe same principle can be used to apply gradients\
    \ to numeric values in a table to, for example, highlight low and high values.\
    \ First we define our color scale, which is taken from [colorbrewer2.org](http://colorbrewer2.org).\n\
    \n```\nCOLORS = ['#053061', '#2166ac', '#4393c3', '#92c5de', '#d1e5f0',\n    \
    \      '#f7f7f7', '#fddbc7', '#f4a582', '#d6604d', '#b2182b', '#67001f']\n```\n\
    \nNext we define our custom handler, this time for `Qt.BackgroundRole`. This takes\
    \ the value at the given index, checks that this is numeric then performs a series\
    \ of operations to constrain it to the range 0...10 required to index into our\
    \ list.\n\nListing 91. tableview_format_5.py\n\n```\ndef data(self, index, role):\n\
    \    if role == Qt.BackgroundRole:\n        value = self._data[index.row()][index.column()]\n\
    \        if isinstance(value, int) or isinstance(value, float):\n            value\
    \ = int(value)  # Convert to integer for indexing.\n\n            # Limit to range\
    \ -5 ... +5, then convert to 0..10\n            value = max(-5, value)  # values\
    \ < -5 become -5\n            value = min(5, value)   # values > +5 become +5\n\
    \            value = value + 5      # -5 becomes 0, +5 becomes + 10\n\n      \
    \      return QtGui.QColor(COLORS[value])\n\n    # existing `if role == Qt.DisplayRole:`\
    \ block hidden\n    # hidden for clarity.\n```\n\nThe logic used here for converting\
    \ the value to the gradient is very basic, cutting off high/low values, and not\
    \ adjusting to the range of the data. However, you can adapt this as needed, as\
    \ long as the end result of your handler is to return a `QColor` or `QBrush`.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_312_0.png)\n\nFigure 149. QTableView\
    \ with number-range color gradients\n\n## Icon & Image decoration\n\nEach table\
    \ cell contains a small *decoration* area which can be used to display icons,\
    \ images or a solid block of color, on the left hand side next to the data. This\
    \ can be used to indicate data type, e.g. calendars for dates, ticks and crosses\
    \ for `bool` values, or for a more subtle conditional-formatting for number ranges.\n\
    \nBelow are some simple implementations of these ideas.\n\n## Indicating bool/date\
    \ data types with icons\n\nFor dates we'll use Python's built-in `datetime` type.\
    \ First, add the following import to the top of your file to import this type.\n\
    \n```\nfrom datetime import datetime\n```\n\nThen, update the data (set in the\
    \ `MainWindow.__init__`) to add `datetime` and `bool` (True or False values),\
    \ for example.\n\n```\ndata = [\n    [True, 9, 2],\n    [1, 0, -1],\n    [3, 5,\
    \ False],\n    [3, 3, 2],\n    [datetime(2019, 5, 4), 8, 9],\n]\n```\n\nWith these\
    \ in place, you can update your model `data` method to show icons and formatted\
    \ dates for date types, with the following.\n\nListing 92. tableview_format_6.py\n\
    \n```\ndef data(self, index, role):\n    if role == Qt.DisplayRole:\n        value\
    \ = self._data[index.row()][index.column()]\n        if isinstance(value, datetime):\n\
    \            return value.strftime(\"%Y-%m-%d\")\n\n        return value\n\n \
    \   if role == Qt.DecorationRole:\n        value = self._data[index.row()][index.column()]\n\
    \        if isinstance(value, datetime):\n            return QtGui.QIcon(\"calendar.png\"\
    )\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_313_0.png)\n\nFigure 150. QTableView\
    \ formatted dates with indicator icon\n\nThe following shows how to use ticks\
    \ and cross for boolean `True` and `False` values respectively.\n\nListing 93.\
    \ tableview_format_7.py\n\n```\ndef data(self, index, role):\n    if role == Qt.DecorationRole:\n\
    \        value = self._data[index.row()][index.column()]\n        if isinstance(value,\
    \ bool):\n            if value:\n                return QtGui.QIcon(\"tick.png\"\
    )\n\n        return QtGui.QIcon(\"cross.png\")\n```\n\nYou can of course combine\
    \ the above together, or any other mix of `Qt.DecorationRole` and `Qt.DisplayRole`\
    \ handlers. It's usually simpler to keep each type grouped under the same *if*\
    \ branch, or as your model becomes more complex, to create sub-methods to handle\
    \ each role.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_314_0.png)\n\nFigure\
    \ 151. QTableView boolean indicators\n\n## Color blocks\n\nIf you return a `QColor`\
    \ for `Qt.DecorationRole` a small square of color will be displayed on the left\
    \ hand side of the cell, in the icon location. This is identical to the earlier\
    \ `Qt.BackgroundRole` conditional formatting example, except now handling and\
    \ responding to `Qt.DecorationRole`.\n\nListing 94. tableview_format_8.py\n\n\
    ```\ndef data(self, index, role):\n    if role == Qt.DecorationRole:\n       \
    \ value = self._data[index.row()][index.column()]\n\n        if isinstance(value,\
    \ datetime):\n            return QtGui.QIcon(\"calendar.png\")\n\n        if isinstance(value,\
    \ bool):\n            if value:\n                return QtGui.QIcon(\"tick.png\"\
    )\n\n            return QtGui.QIcon(\"cross.png\")\n\n        if isinstance(value,\
    \ int) or isinstance(value, float):\n            value = int(value)\n\n      \
    \      # Limit to range -5 ... +5, then convert to 0..10\n            value =\
    \ max(-5, value)  # values < -5 become -5\n            value = min(5, value) \
    \ # values > +5 become +5\n            value = value + 5  # -5 becomes 0, +5 becomes\
    \ + 10\n\n            return QtGui.QColor(COLORS[value])\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_315_0.png)\n\
    \nFigure 152. QTableView color block decorations\n\n## Alternative Python data\
    \ structures\n\nSo far in our examples we've used simple nested Python lists to\
    \ hold our data for display. This is fine for simple tables of data, however if\
    \ you're working with large data tables there are some other better options in\
    \ Python, which come with additional benefits. In the next parts we'll look at\
    \ two Python data table libraries — *numpy* and *pandas* — and how to integrate\
    \ these with Qt.\n\n## Numpy\n\n*Numpy* is a library which provides support for\
    \ large multi-dimensional arrays or matrix data structures in Python. The efficient\
    \ and high-performance handling of large arrays makes *numpy* ideal for scientific\
    \ and mathematical applications. This also makes *numpy* arrays a good data store\
    \ for large, single-typed, data tables in PySide2.\n\n## Using numpy as a data\
    \ source\n\nTo support *numpy* arrays we need to make a number of changes to the\
    \ model, first modifying the indexing in the `data` method, and then changing\
    \ the row and column count calculations for `rowCount` and `columnCount`.\n\n\
    The standard *numpy* API provides element-level access to 2D arrays, by passing\
    \ the row and column in the same slicing operation, e.g. `_data[index.row(), index.column()]`.\
    \ This is more efficient than indexing in two steps, as for the `list` of `list`\
    \ examples.\n\nIn *numpy* the dimensions of an array are available through `.shape`\
    \ which returns a tuple of dimensions along each axis in turn. We get the length\
    \ of each axis by selecting the correct item from this tuple, e.g. `_data.shape[0]`\
    \ gets the size of the first axis.\n\nThe following complete example shows how\
    \ to display a *numpy* array using Qt's `QTableView` via a custom model.\n\nListing\
    \ 95. model-views/tableview_numpy.py\n\n```\nimport sys\n\nimport numpy as np\n\
    from PySide2 import QtCore, QtGui, QtWidgets\nfrom PySide2.QtCore import Qt\n\n\
    \nclass TableModel(QtCore.QAbstractTableModel):\n    def __init__(self, data):\n\
    \        super().__init__()\n        self._data = data\n\n    def data(self, index,\
    \ role):\n        if role == Qt.DisplayRole:\n            # Note: self._data[index.row()][index.column()]\
    \ will also work\n            value = self._data[index.row(), index.column()]\n\
    \            return str(value)\n\n    def rowCount(self, index):\n        return\
    \ self._data.shape[0]\n\n    def columnCount(self, index):\n        return self._data.shape[1]\n\
    \nclass MainWindow(QtWidgets.QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.table = QtWidgets.QTableView()\n\n        data = np.array([[1,\
    \ 9, 2], [1, 0, -1], [3, 5, 2], [3, 3, 2], [5, 8, 9],])\n\n        self.model\
    \ = TableModel(data)\n        self.table.setModel(self.model)\n\n        self.setCentralWidget(self.table)\n\
    \        self.setGeometry(600, 100, 400, 200)\n\napp = QtWidgets.QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec_()\n```"
