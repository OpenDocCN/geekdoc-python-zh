    \ reset(self):\n        self.is_start = False\n        self.is_mine = False\n\
    \        self.adjacent_n = 0\n        self.is_revealed = False\n        self.is_flagged\
    \ = False\n\n        self.update()\n```\n\nGameplay is centered around mouse interactions\
    \ with the tiles in the playfield, so detecting and reacting to mouse clicks is\
    \ central. In Qt we catch mouse clicks by detecting the `mouseReleaseEvent`. To\
    \ do this for our custom `Pos` widget we define a handler on the class. This receives\
