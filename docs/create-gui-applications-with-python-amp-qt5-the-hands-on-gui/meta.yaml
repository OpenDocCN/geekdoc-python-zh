- md: "## Installation Linux (Ubuntu & Debian)\n\nInstallation on Linux is very straightforward\
    \ as packages for PySide2 are available in the repositories of most distributions.\
    \ In Ubuntu you can install either from the command line or via \"Software Center\"\
    \ — the package you are looking for is named `python3-pyside2`. You can also install\
    \ these from the command line as follows —\n\n```\napt-get install python3-pyside2\n\
    ```\n\nOnce the installation is finished, you should be able to run `python3`\
    \ or `python` and `import PySide2`.\n\n## Appendix B: Translating C++ Examples\
    \ to Python\n\nWhen writing applications with PySide2 we are really writing applications\
    \ with Qt.\n\nPySide2 acts as a wrapper around the Qt libraries, translating Python\
    \ method calls to C++, handling type conversions and transparently creating Python\
    \ objects to represent Qt objects in your applications. The result of all this\
    \ cleverness is that you can use Qt from Python while writing *mostly* Pythonic\
    \ code—if we ignore the *camelCase*.\n\nWhile there is a lot of PySide2 example\
    \ code out there, there are far more Qt C++ examples. The core documentation is\
    \ written for C++. The library is written in C++. This means that sometimes, when\
    \ you’re looking how to do something, the only resource you’ll find is a C++ tutorial\
    \ or some C++ code.\n\nCan you use it? Yes! If you have no experience with C++\
    \ (or C-like languages) then the code can look like gibberish. But before you\
    \ were familiar with Python, Python probably looked a bit like gibberish too.\
    \ You don’t need to be able to *write* C++ to be able to *read* it. Understanding\
    \ and decoding is easier than writing.\n\nWith a little bit of effort you’ll be\
    \ able to take any C++ example code and translate it into fully-functional Python\
    \ & PySide2. In this chapter we’ll take a snippet of Qt5 code and step-by-step\
    \ convert it into fully-working Python code.\n\n### The example code\n\nWe’ll\
    \ start with the following example block of code creating a simple window with\
    \ a QPushButton and a QLineEdit. Pressing on the button will clear the line edit.\
    \ Pretty exciting stuff, but this includes a few key parts of translating Qt examples\
    \ to PySide2 — namely, widgets, layouts and signals.\n\n```\n#include <QtWidgets>\n\
    \nint main(int argc, char *argv[])\n{\n    QApplication app(argc, argv);\n   \
    \ QWidget window;\n    QLineEdit *lineEdit = new QLineEdit();\n    QPushButton\
    \ *button = new QPushButton(\"Clear\");\n    QHBoxLayout *layout = new QHBoxLayout();\n\
    \    layout->addWidget(lineEdit);\n    layout->addWidget(button);\n\n    QObject::connect(&button,\
    \ &QPushButton::pressed,\n                     &lineEdit, &QLineEdit::clear);\n\
    \n    window.setLayout(layout);\n    window.setWindowTitle(\"Why?\");\n    window.show();\n\
    \    return app.exec();\n}\n```\n\n> Remember that a Qt widget without a parent\
    \ is always a separate window. Here we have a single window created as a QWidget.\n\
    \nBelow we'll step through the process of converting this code to Python.\n\n\
    ### Imports\n\nIn C++ *imports* are called *includes*. They're found at the top\
    \ of the file, just as in Python (though only by convention) and look like this\
    \ —\n\n```\n#include <QtWidgets>\n```\n\nIn C-like languages the # indicates that\
    \ `include` is a *pre-processor directive* not a comment. The value between <>\
    \ is the name of the module to import. Note that unlike Python, importing a module\
    \ makes all contents of that module available in the global namespace. This is\
    \ the equivalent of doing the following in Python —\n\n```\nfrom PySide2.QtWidgets\
    \ import *\n```\n\nGlobal imports like this are generally frowned upon in Python,\
    \ and you should instead either —\n\n1. only import the objects you need, or\n\
    2. import the module itself and use it to reference its children\n\n```\nfrom\
    \ PySide2.QtWidgets import QApplication, QWidget, QLineEdit,\nQPushButton, QHBoxLayout\n\
    ```\n\nOr, alternatively...\n\n```\nfrom PySide2 import QtWidgets\n```\n\n...and\
    \ then reference as `QtWidgets.QApplication()`. Which you choose for your own\
    \ code is entirely up to you, however in this example we're going to follow the\
    \ first style. Applying that to the code gives us the following result so far.\n\
    \n```\nfrom PySide2.QtWidgets import (\n    QApplication, QWidget, QLineEdit,\
    \ QPushButton, QHBoxLayout\n)\n\nint main(int argc, char *argv[])\n{\n    QApplication\
    \ app(argc, argv);\n    QWidget window;\n    QLineEdit *lineEdit = new QLineEdit();\n\
    \    QPushButton *button = new QPushButton(\"Clear\");\n    QHBoxLayout *layout\
    \ = new QHBoxLayout();\n    layout->addWidget(lineEdit);\n    layout->addWidget(button);\n\
    \n    QObject::connect(&button, &QPushButton::pressed,\n                     &lineEdit,\
    \ &QLineEdit::clear);\n\n    window.setLayout(layout);\n    window.setWindowTitle(\"\
    Why?\");\n    window.show();\n    return app.exec();\n}\n```\n\n> Since we're\
    \ making changes iteratively, the code won't work until the very end.\n\n### int\
    \ main(int argc, char *argv[])\n\nEvery C++ program needs a `main(){}` block which\
    \ contains the first code to be run when the application is executed. In Python\
    \ *any* code at the top-level of the module (i.e. not indented inside a function,\
    \ class or methods) will be run when the script is executed.\n\n```\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication, QWidget, QLineEdit, QPushButton, QHBoxLayout\n)\n\
    \nQApplication app(argc, argv);\nQWidget window;\nQLineEdit *lineEdit = new QLineEdit();\n\
    QPushButton *button = new QPushButton(\"Clear\");\nQHBoxLayout *layout = new QHBoxLayout();\n\
    layout->addWidget(lineEdit);\nlayout->addWidget(button);\n\nQObject::connect(&button,\
    \ &QPushButton::pressed,\n                 &lineEdit, &QLineEdit::clear);\n\n\
    window.setLayout(layout);\nwindow.setWindowTitle(\"Why?\");\nwindow.show();\n\
    app.exec();\n```\n\nYou may have seen the following code block in Python application\
    \ code, which is also often referred to as the `__main__` block.\n\n```\nif __name__\
    \ == '__main__':\n    ...your code here...\n```\n\nHowever, this works in a subtly\
    \ different way. While this block *will* be run when a script is executed, so\
    \ would any code that is not indented. The purpose of this block is actually to\
    \ *prevent* this code executing when the module is imported, rather than executed\
    \ as a script.\n\nYou can nest your code inside this block if you wish, although\
    \ unless your file is going to be imported as a module it isn't strictly necessary.\n\
    \n### C++ types\n\nPython is a *dynamically typed* language, meaning you can change\
    \ the type of a variable after it has been defined. For example, the following\
    \ is perfectly valid Python.\n\n```\na = 1\na = 'my string'\na = [1,2,3]\n```\n\
    \nMany other languages, C++ included, are *statically typed*, meaning that once\
    \ you define the type of a variable it cannot be changed. For example, the following\
    \ is very definitely *not* valid C++.\n\n```\nint a = 1;\na = 'my string';\n```\n\
    \nThe above highlights an immediate consequence of static typing in languages:\
    \ you define the type of a variable *when you create it*.\n\nIn C++ this is done\
    \ explicitly by providing a type decorator on the line when the variable is defined,\
    \ above `int`.\n\nIn lines like the following the first name is the name of type\
    \ (class) that is being created by the remainder of the line.\n\n```\nQApplication\
    \ app(argc, argv);\nQWidget window;\n\nQLineEdit *lineEdit = new QLineEdit();\n\
    QPushButton *button = new QPushButton(\"Clear\");\nQHBoxLayout *layout = new QHBoxLayout();\n\
    ```\n\nIn Python we do not need these type definitions, so we can just delete\
    \ them.\n\n```\nlineEdit = new QLineEdit();\nbutton = new QPushButton(\"Clear\"\
    );\nlayout = new QHBoxLayout();\n```\n\nFor application and window it's exactly\
    \ the same principle. However, if you're not familiar with C++ it might not be\
    \ obvious those lines are creating a variable at all.\n\nThere are differences\
    \ between creating objects with new and without in C++ but you don't need to concern\
    \ yourself with that in Python and can consider them both equivalent.\n\n```\n\
    QWidget *window = new QWidget();\nQWidget window;\n\nQApplication *app = new QApplication(argc,\
    \ argv);\nQApplication app;\n```\n\nTo convert to Python, take the class name\
    \ (e.g. QApplication) from the left, and place it in front of open and closing\
    \ brackets (), adding them if they aren't already there. Then move the name of\
    \ the variable to the left, with an =. For window that gives us—\n\n```\nwindow\
    \ = QWidget()\n```\n\nIn Python QApplication only accepts a single parameter,\
    \ a list of arguments from sys.argv (equivalent to argv). This gives us the code\
    \ —\n\n```\nimport sys\n\napp = QApplication(sys.argv);\n```\n\nSo far our complete\
    \ code block is looking like the following."
  mdcn: "## Linux 安装（Ubuntu 与 Debian）\n\n在 Linux 上安装非常简单，因为大多数发行版的软件仓库中都提供了 PySide2\
    \ 的软件包。在 Ubuntu 中，你可以通过命令行或“软件中心”进行安装——你需要查找的软件包名为 `python3-pyside2`。你也可以通过命令行按如下方式安装\
    \ —\n\n```\napt-get install python3-pyside2\n```\n\n安装完成后，你应该能够运行 `python3` 或\
    \ `python` 并成功 `import PySide2`。\n\n## 附录 B：将 C++ 示例转换为 Python\n\n使用 PySide2 编写应用程序时，我们实际上是在用\
    \ Qt 编写应用程序。\n\nPySide2 充当 Qt 库的包装器，将 Python 方法调用转换为 C++，处理类型转换，并透明地创建 Python\
    \ 对象以表示应用程序中的 Qt 对象。所有这些巧妙设计的结果是，你可以从 Python 中使用 Qt，同时编写*大部分*符合 Python 风格的代码——如果我们忽略*驼峰命名法*的话。\n\
    \n虽然网上有很多 PySide2 示例代码，但 Qt C++ 示例要多得多。核心文档是为 C++ 编写的。库本身也是用 C++ 编写的。这意味着有时，当你查找如何做某事时，唯一能找到的资源可能是一个\
    \ C++ 教程或一些 C++ 代码。\n\n你能用它吗？当然可以！如果你没有 C++（或类 C 语言）经验，这些代码可能看起来像天书。但在你熟悉 Python\
    \ 之前，Python 可能看起来也有点像天书。你不需要能够*编写* C++ 才能*阅读*它。理解和解码比编写要容易。\n\n只需稍加努力，你就能将任何 C++\
    \ 示例代码转换成完全可用的 Python & PySide2 代码。在本章中，我们将选取一段 Qt5 代码片段，并逐步将其转换为完全可运行的 Python\
    \ 代码。\n\n### 示例代码\n\n我们将从以下示例代码块开始，它创建一个包含 `QPushButton` 和 `QLineEdit` 的简单窗口。按下按钮将清除行编辑器的内容。虽然不算特别激动人心，但这包含了将\
    \ Qt 示例转换为 PySide2 的几个关键部分——即控件、布局和信号。\n\n```\n#include <QtWidgets>\n\nint main(int\
    \ argc, char *argv[])\n{\n    QApplication app(argc, argv);\n    QWidget window;\n\
    \    QLineEdit *lineEdit = new QLineEdit();\n    QPushButton *button = new QPushButton(\"\
    Clear\");\n    QHBoxLayout *layout = new QHBoxLayout();\n    layout->addWidget(lineEdit);\n\
    \    layout->addWidget(button);\n\n    QObject::connect(&button, &QPushButton::pressed,\n\
    \                     &lineEdit, &QLineEdit::clear);\n\n    window.setLayout(layout);\n\
    \    window.setWindowTitle(\"Why?\");\n    window.show();\n    return app.exec();\n\
    }\n```\n\n> 请记住，没有父控件的 Qt 控件总是一个独立的窗口。这里我们创建了一个单独的 QWidget 窗口。\n\n下面我们将逐步介绍将此代码转换为\
    \ Python 的过程。\n\n### 导入\n\n在 C++ 中，*导入*被称为*包含*。它们位于文件顶部，就像在 Python 中一样（尽管这只是约定俗成），看起来像这样\
    \ —\n\n```\n#include <QtWidgets>\n```\n\n在类 C 语言中，`#` 表示 `include` 是一个*预处理指令*，而不是注释。`<>`\
    \ 之间的值是要导入的模块名称。请注意，与 Python 不同，导入一个模块会使其所有内容在全局命名空间中可用。这等同于在 Python 中执行以下操作 —\n\
    \n```\nfrom PySide2.QtWidgets import *\n```\n\n在 Python 中，像这样的全局导入通常是不推荐的，你应该改为\
    \ —\n\n1. 只导入你需要的对象，或者\n2. 导入模块本身，并使用它来引用其子项\n\n```\nfrom PySide2.QtWidgets import\
    \ QApplication, QWidget, QLineEdit,\nQPushButton, QHBoxLayout\n```\n\n或者，也可以...\n\
    \n```\nfrom PySide2 import QtWidgets\n```\n\n...然后通过 `QtWidgets.QApplication()`\
    \ 来引用。在你自己的代码中选择哪种方式完全取决于你，然而在本例中，我们将遵循第一种风格。将其应用到代码中，我们目前得到以下结果。\n\n```\nfrom\
    \ PySide2.QtWidgets import (\n    QApplication, QWidget, QLineEdit, QPushButton,\
    \ QHBoxLayout\n)\n\nint main(int argc, char *argv[])\n{\n    QApplication app(argc,\
    \ argv);\n    QWidget window;\n    QLineEdit *lineEdit = new QLineEdit();\n  \
    \  QPushButton *button = new QPushButton(\"Clear\");\n    QHBoxLayout *layout\
    \ = new QHBoxLayout();\n    layout->addWidget(lineEdit);\n    layout->addWidget(button);\n\
    \n    QObject::connect(&button, &QPushButton::pressed,\n                     &lineEdit,\
    \ &QLineEdit::clear);\n\n    window.setLayout(layout);\n    window.setWindowTitle(\"\
    Why?\");\n    window.show();\n    return app.exec();\n}\n```\n\n> 由于我们是逐步进行修改，代码在最终完成前将无法运行。\n\
    \n### int main(int argc, char *argv[])\n\n每个 C++ 程序都需要一个 `main(){}` 块，其中包含应用程序执行时要运行的第一段代码。在\
    \ Python 中，模块顶层（即不在函数、类或方法内部缩进）的*任何*代码都将在脚本执行时运行。\n\n```\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication, QWidget, QLineEdit, QPushButton, QHBoxLayout\n)\n\
    \nQApplication app(argc, argv);\nQWidget window;\nQLineEdit *lineEdit = new QLineEdit();\n\
    QPushButton *button = new QPushButton(\"Clear\");\nQHBoxLayout *layout = new QHBoxLayout();\n\
    layout->addWidget(lineEdit);\nlayout->addWidget(button);\n\nQObject::connect(&button,\
    \ &QPushButton::pressed,\n                 &lineEdit, &QLineEdit::clear);\n\n\
    window.setLayout(layout);\nwindow.setWindowTitle(\"Why?\");\nwindow.show();\n\
    app.exec();\n```\n\n你可能在 Python 应用程序代码中见过以下代码块，它通常也被称为 `__main__` 块。\n\n```\n\
    if __name__ == '__main__':\n    ...your code here...\n```\n\n然而，它的工作方式略有不同。虽然这个块*确实*会在脚本执行时运行，但任何未缩进的代码也会运行。这个块的目的实际上是*防止*在模块被导入（而非作为脚本执行）时执行此代码。\n\
    \n如果你愿意，可以将代码嵌套在这个块内，但除非你的文件将被作为模块导入，否则这并非严格必需。\n\n### C++ 类型\n\nPython 是一种*动态类型*语言，这意味着你可以在变量定义后更改其类型。例如，以下代码在\
    \ Python 中是完全有效的。\n\n```\na = 1\na = 'my string'\na = [1,2,3]\n```\n\n许多其他语言，包括\
    \ C++，是*静态类型*的，这意味着一旦你定义了变量的类型，就不能更改它。例如，以下代码在 C++ 中绝对是*无效*的。\n\n```\nint a =\
    \ 1;\na = 'my string';\n```\n\n上述内容突显了静态类型语言的一个直接后果：你在*创建变量时*定义其类型。\n\n在 C++ 中，这是通过在定义变量的行上提供类型装饰器（如上面的\
    \ `int`）来显式完成的。\n\n在像下面这样的行中，第一个名称是该行其余部分所创建的类型（类）的名称。\n\n```\nQApplication app(argc,\
    \ argv);\nQWidget window;\n\nQLineEdit *lineEdit = new QLineEdit();\nQPushButton\
    \ *button = new QPushButton(\"Clear\");\nQHBoxLayout *layout = new QHBoxLayout();\n\
    ```\n\n在 Python 中，我们不需要这些类型定义，所以可以直接删除它们。\n\n```\nlineEdit = new QLineEdit();\n\
    button = new QPushButton(\"Clear\");\nlayout = new QHBoxLayout();\n```\n\n对于 `application`\
    \ 和 `window`，原理完全相同。然而，如果你不熟悉 C++，可能不会明显看出这些行是在创建变量。\n\n在 C++ 中，使用 `new` 创建对象和不使用\
    \ `new` 创建对象是有区别的，但在 Python 中你不需要关心这个，可以认为它们是等价的。\n\n```\nQWidget *window = new\
    \ QWidget();\nQWidget window;\n\nQApplication *app = new QApplication(argc, argv);\n\
    QApplication app;\n```\n\n要转换为 Python，从左侧取出类名（例如 `QApplication`），将其放在开括号和闭括号 `()`\
    \ 之前（如果还没有括号则添加它们）。然后将变量名移到左侧，并加上 `=`。对于 `window`，我们得到 —\n\n```\nwindow = QWidget()\n\
    ```\n\n在 Python 中，`QApplication` 只接受一个参数，即来自 `sys.argv`（等同于 `argv`）的参数列表。这给出了我们的代码\
    \ —\n\n```\nimport sys\n\napp = QApplication(sys.argv);\n```\n\n到目前为止，我们完整的代码块如下所示。"
