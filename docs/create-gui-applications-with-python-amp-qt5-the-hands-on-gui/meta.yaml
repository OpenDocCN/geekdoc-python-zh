    # Using QSqlRelationalDelegate to edit related fields.


    If you try and edit fields in a `QSqlRelationalTableModel` you''ll notice a problem
    — while you can edit the fields on the base table (here *Tracks*) any edits you
    make to the related fields (e.g. *Album Title*) are not saved. These fields are
    currently only views to the data.


    Valid values for related fields are limited by the values in the related table
    — to have more choices, we need to add another row to the related table. Since
    the options are restricted, it often makes sense to display the choices in a `QComboBox`.
    Qt comes with a model item delegate which can do this lookup and display for us
    — `QSqlRelationalDelegate`.'
  - '[PAGE 340]


    Listing 106. databases/tableview_relationalmodel_delegate.py


    ```

    self.model.setTable("Track")

    self.model.setRelation(2, QSqlRelation("Album", "AlbumId", "Title"))

    self.model.setRelation(3, QSqlRelation("MediaType", "MediaTypeId", "Name"))

    self.model.setRelation(4, QSqlRelation("Genre", "GenreId", "Name"))


    delegate = QSqlRelationalDelegate(self.table)

    self.table.setItemDelegate(delegate)


    self.model.select()

    ```


    This delegate automatically handles the mapping for *any* relational fields. We
    simply create the delegate passing in the `QTableView` instance, and then set
    the resulting delegate on the model, everything is taken care of automatically.


    Running this you will see drop-downs when you edit the related fields.


