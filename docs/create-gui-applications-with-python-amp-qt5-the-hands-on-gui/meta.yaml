    \ PyQt5 and PySide2 you can use the following import pattern for PyQt5 to use\
    \ the `Signal` and `@Slot` style there too.\n\n```\nfrom PyQt5.QtCore import pyqtSignal\
    \ as Signal, pyqtSlot as Slot\n```\n\n> You could of course do the reverse `from\
    \ PySide2.QtCore import Signal as pyqtSignal, Slot as pyqtSlot` although that’s\
    \ a bit confusing.\n\n# Supporting both in libraries\n\n> You don’t need to worry\
    \ about this if you’re writing a standalone app, just use whichever API you prefer.\n\
    \nIf you’re writing a library, widget or other tool you want to be compatible\
    \ with both PyQt5 and PySide2 you can do so easily by adding both sets of imports."
