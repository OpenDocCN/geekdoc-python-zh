    ## When to use QResource?


    You may be wondering when (or even *whether*) you should use the QResource system.


    The main advantage of this method is that your data files are guaranteed to work
    cross-platform when distributed. The downside of course is you need to re-compile
    your resources any time you add/remove new resources. Whether this trade-off is
    worth it for your project is up to you, but if you plan to distribute your application
    to other people it almost always is.


    ## Theming


    Out of the box Qt applications look *platform native*. That is, they take on the
    *look and feel* of the operating system they are running on. This means they look
    at home on any system and feel natural to users. But it can also mean they look
    a bit *boring*. Helpfully, Qt gives you complete control over the appearance of
    widgets in your application.


    Whether you want your application to stand out, or you are designing custom widgets
    and want them to fit in, this chapter will explain how to do that in PySide2.


    ## 16. Styles


    Styles are Qt''s way of making broad look and feel changes to applications, modifying
    how widgets are displayed and behave. Qt automatically applies platform-specific
    styles when running your application on a given platform—this is why your application
    looks like an macOS application when run on macOS and a Windows application on
    Windows. These platform-specific styles make use of native widgets on the host
    platform, meaning they are not available to use on other platforms.


    However, the platform styles are not the only options you have for styling your
    applications. Qt also ships with a cross-platform style called *Fusion*, which
    provides a consistent cross-platform, modern, style for your applications.


    ### Fusion


    Qt''s Fusion style gives you the benefit of UI consistency across all systems,
    at the expense of some consistency with the operating system standards. Which
    is more important will depend on how much control you need over the UI you are
    creating, how much you are customizing it and which widgets you are using.


    > The Fusion style is a platform-agnostic style that offers a desktop-oriented
    look''n''feel. It implements the same design language as the Fusion style for
    Qt Widgets.

    >

    > — Qt Documentation


    To enable the style, call `.setStyle()` on the `QApplication` instance, passing
    in the name of the style (in this case *Fusion*) as a string.


    ```python

    app = QApplication(sys.argv)

    app.setStyle(''Fusion'')

    #...

    app.exec_()

    ```


    The widgets list example from earlier, but with the Fusion style applied, is shown
    below.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_199_0.png)


    > There are more examples of widgets with Fusion style applied in the [Qt documentation](https://doc.qt.io/qt-5/qapplication.html#setStyle).


    ### 3rd Party Styles


    In addition to the Fusion style provided with Qt there are 3rd party styles available
    too. These are all based on modifications to the base Fusion style. For example
    —


    - [Qt Modern](https://github.com/nicedoc/qtmodern) provides a *frameless* window
    style, together with a dark mode palette and custom window decorations to give
    a modern macOS-like look.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_200_0.png)


    Figure 95. "Qt Modern" styles: Palette & window decorations.


    ## 17. Palettes


    The selection of colors used to draw the user interface in Qt are termed *palettes*.
    Both application level and widget-specific palettes are managed through `QPalette`
    objects. Palettes can be set at both the application and widget level, allowing
    you to set a global standard palette and override this on a per-widget basis.
    The global palette is normally defined by the Qt theme (itself normally dependent
    on the OS) but you can override this to change the look of your entire app.


    The active global palette can be accessed from `QApplication.palette()` or by
    creating a new *empty* `QPalette` instance. For example —


    ```python

    from PySide2.QtGui import QPalette

    palette = QPalette()

    ```


    You can modify the palette by calling `palette.setColor(role, color)` where *role*
    determines what the color is used for, `QColor` the color to use. The color used
    can either be a custom `QColor` object, or one of the built-in basic colors from
    the Qt namespace.


    ```python

    palette.setColor(QPalette.Window, QColor(53,53,53))

    palette.setColor(QPalette.WindowText, Qt.white)

    ```


    > There are some limitations when using palettes on Windows 10 and macOS platform-specific
    themes.


    There are rather a lot of different *roles*. The main roles are shown in the table
    below —


    *Table 4. Main roles*


    | Constant | Value | Description |

    | :--- | :--- | :--- |

    | `QPalette.Window` | 10 | Background color for windows. |

    | `QPalette.WindowText` | 0 | Default text color for windows. |

    | `QPalette.Base` | 9 | Background of text entry widgets, combobox drop down lists
    and toolbar handles. *Usually white or light* |

    | `QPalette.AlternateBase` | 16 | Second `Base` color used in striped (alternating)
    rows — e.g. `QAbstractItemView.setAlternatingRowColors()` |

    | `QPalette.ToolTipBase` | 18 | Background color for `QToolTip` and `QWhatsThis`
    hover indicators. Both tips use the `Inactive` group (see later) because they
    are not active windows. |

    | `QPalette.ToolTipText` | 19 | Foreground color for `QToolTip` and `QWhatsThis`.
    Both tips use the `Inactive` group (see later) because they are not active windows.
    |

    | `QPalette.PlaceholderText` | 20 | Color for placeholder text in widgets. |

    | `QPalette.Text` | 6 | Text color for widgets colored with `Base` background.
    Must provide a good contrast with both Window and Base. |

    | `QPalette.Button` | 1 | Default button background color. This can differ from
    `Window` but must provide good contrast with `ButtonText`. |

    | `QPalette.ButtonText` | 8 | Text color used on buttons, must contrast with `Button`
    color. |

    | `QPalette.BrightText` | 7 | Text color which is very different from `WindowText`,
    contrasts well with black. Used were other `Text` and `WindowText` colors would
    give poor contrast. Note: Not just used for text. |


    > You don’t necessarily have to modify or set all of these in your custom palette,
    depending on widgets used in your application some can be omitted.


    There are also smaller sets of roles used for 3D beveling on widgets and highlighting
    selected entries or links.


    *Table 5. 3D bevel roles*


    | Constant | Value | Description |

    | :--- | :--- | :--- |

    | `QPalette.Light` | 2 | Lighter than `Button` color. |

    | `QPalette.Midlight` | 3 | Between `Button` and `Light`. |

    | `QPalette.Dark` | 4 | Darker than `Button`. |

    | `QPalette.Mid` | 5 | Between `Button` and `Dark`. |

    | `QPalette.Shadow` | 11 | A very dark color. By default, the shadow color is
    `Qt.black`. |


    *Table 6. Highlighting & links*


    | Constant | Value | Description |

    | :--- | :--- | :--- |

    | `QPalette.Highlight` | 12 | A color to indicate a selected item or the current
    item. By default, the highlight color is `Qt.darkBlue`. |

    | `QPalette.HighlightedText` | 13 | A text color that contrasts with Highlight.
    By default, the highlighted text `Qt.white`. |

    | `QPalette.Link` | 14 | A text color used for unvisited hyperlinks. By default,
    the link color is `Qt.blue`. |

    | `QPalette.LinkVisited` | 15 | A text color used for already visited hyperlinks.
    By default, the link-visited color is `Qt.magenta`. |


    > There is also technically a `QPalette.NoRole` value for widget drawing states
    where no role is assigned, this can be ignored when creating palettes.


    For parts of the UI which change when a widget is active, inactive or disabled
    you must set a color for each of these states. To do this, you can call `palette.setColor(group,
    role, color)` passing additional *group* parameter. The available groups are shown
    below —


    | Constant | Value |

    | :--- | :--- |

    | `QPalette.Disabled` | 1 |

    | `QPalette.Active` | 0 |

    | `QPalette.Inactive` | 2 |

    | `QPalette.Normal` *synonym for Active* | 0 |


    For example, the following will set the `WindowText` color for a disabled window
    to *white* in the palette.


    ```python

    palette.setColor(QPalette.Disabled, QPalette.WindowText, Qt.white)

    ```


    Once the palette is defined, you can use `.setPalette()` to set it onto the `QApplication`
    object to apply it to your application, or to a single widget. For example, the
    following example will change the color of the window text and background (here
    text is added using a `QLabel`).'
