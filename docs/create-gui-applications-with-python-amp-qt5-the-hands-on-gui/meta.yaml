    \n清单70. designer/example_3.py\n\n```python\nimport sys\n\nfrom PySide2 import\
    \ QtCore, QtWidgets\nfrom PySide2.QtUiTools import QUiLoader\n\nloader = QUiLoader()\n\
    \nclass MainUI(QtCore.QObject):  # Not a widget.\n    def __init__(self):\n  \
