    \ prefix=\"icons\">\n        <file alias=\"hand_icon.ico\">hand_icon.ico</file>\n\
    \    </qresource>\n</RCC>\n```\n\nThe name between the `<file> </file>` tags is\
    \ the path to the file, relative to the resource file. The `alias` is the name\
