    \ * 2)\n\n    # Draw the bars.\n    step_size = d_height / self.n_steps\n    bar_height\
    \ = step_size * self._bar_solid_percent\n\n    # Calculate the y-stop position,\
    \ from the value in range.\n    pc = (value - vmin) / (vmax - vmin)\n    n_steps_to_draw\
    \ = int(pc * self.n_steps)\n\n    for n in range(n_steps_to_draw):\n        brush.setColor(QtGui.QColor(self.steps[n]))\n\
    \        ypos = (1 + n) * step_size\n        rect = QtCore.QRect(\n          \
