    # # Menus


    Menus are another standard component of UIs. Typically they are on the top of
    the window, or the top of a screen on macOS. They allow access to all standard
    application functions. A few standard menus exist — for example File, Edit, Help.
    Menus can be nested to create hierarchical trees of functions and they often support
    and display keyboard shortcuts for fast access to their functions.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_109_1.png)


    *Figure 44. Standard GUI elements - Menus*


    To create a menu, we create a menubar we call `.menuBar()` on the `QMainWindow`.
    We add a menu on our menu bar by calling `.addMenu()`, passing in the name of
    the menu. I''ve called it `''&File''`. The ampersand defines a quick key to jump
    to'
