- img_proc: true
  md: 'role is a flag indicating the *type* of data the view is requesting. This is
    because the .data() method actually has more responsibility than just the core
    data. It also handles requests for style information, tooltips, status bars, etc.
    — basically anything that could be informed by the data itself.


    The naming of Qt.DisplayRole is a bit weird, but this indicates that the *view*
    is asking us "please give me data for display". There are other *roles* which
    the data can receive for styling requests or requesting data in "edit-ready" format.


    | Role | Value | Description |

    | :--- | :--- | :--- |

    | Qt.DisplayRole | 0 | The key data to be rendered in the form of text. QString
    |

    | Qt.DecorationRole | 1 | The data to be rendered as a decoration in the form
    of an icon. QColor, QIcon or QPixmap |

    | Qt.EditRole | 2 | The data in a form suitable for editing in an editor. QString
    |

    | Qt.ToolTipRole | 3 | The data displayed in the item''s tooltip. QString |

    | Qt.StatusTipRole | 4 | The data displayed in the status bar. QString |

    | Qt.WhatsThisRole | 5 | The data displayed for the item in "What''s This?" mode.
    QString |

    | Qt.SizeHintRole | 13 | The size hint for the item that will be supplied to views.
    QSize |


    For a full list of available *roles* that you can receive see the Qt ItemDataRole
    documentation. Our todo list will only be using Qt.DisplayRole and Qt.DecorationRole.'
