- md: "## Drawing the bar\n\nNow we have the display updating and displaying the current\
    \ value of the dial, we can move onto drawing the actual bar display. This is\
    \ a little complicated, with a bit of maths to calculate bar positions, but we'll\
    \ step through it to make it clear what's going on.\n\nThe sketch below shows\
    \ what we are aiming for — a series of **N** boxes, inset from the edges of the\
    \ widget, with spaces between them.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_443_1.png)\n\
    \nFigure 200. The bar segments and layout we're aiming for.\n\n## Calculating\
    \ what to draw\n\nThe number of boxes to draw is determined by the current value\
    \ — and how far along it is between the minimum and maximum value configured for\
    \ the `QDial`. We already have that information in the example above.\n\n```\n\
    dial = self.parent()._dial\nvmin, vmax = dial.minimum(), dial.maximum()\nvalue\
    \ = dial.value()\n```\n\nIf `value` is half way between `vmin` and `vmax` then\
    \ we want to draw half of the boxes (if we have 4 boxes total, draw 2). If `value`\
    \ is at `vmax` we want to draw them all.\n\nTo do this we first convert our `value`\
    \ into a number between 0 and 1, where `0 = vmin` and `1 = vmax`. We first subtract\
    \ `vmin` from `value` to adjust the range of possible values to start from zero—i.e.\
    \ from `vmin…vmax` to `0…(vmax-vmin)`. Dividing this value by `vmax-vmin` (the\
    \ new maximum) then gives us a number between 0 and 1.\n\nThe trick then is to\
    \ multiply this value (called `pc` below) by the number of steps and that gives\
    \ us a number between 0 and 5 —the number of boxes to draw.\n\n```\npc = (value\
    \ - vmin) / (vmax - vmin)\nn_steps_to_draw = int(pc * 5)\n```\n\nWe're wrapping\
    \ the result in `int` to convert it to a whole number (rounding down) to remove\
    \ any partial boxes.\n\nUpdate the `drawText` method in your paint event to write\
    \ out this number instead.\n\nListing 151. custom-widgets/powerbar_5.py\n\n```\n\
    def paintEvent(self, e):\n    painter = QtGui.QPainter(self)\n\n    brush = QtGui.QBrush()\n\
    \    brush.setColor(QtGui.QColor(\"black\"))\n    brush.setStyle(Qt.SolidPattern)\n\
    \    rect = QtCore.QRect(0, 0, painter.device().width(), painter.device().height())\n\
    \    painter.fillRect(rect, brush)\n\n    # Get current state.\n    dial = self.parent()._dial\n\
    \    vmin, vmax = dial.minimum(), dial.maximum()\n    value = dial.value()\n\n\
    \    pen = painter.pen()\n    pen.setColor(QtGui.QColor(\"red\"))\n    painter.setPen(pen)\n\
    \n    font = painter.font()\n    font.setFamily(\"Times\")\n    font.setPointSize(18)\n\
    \    painter.setFont(font)\n\n    pc = (value - vmin) / (vmax - vmin)\n    n_steps_to_draw\
    \ = int(pc * 5)\n    painter.drawText(25, 25, \"{}\".format(n_steps_to_draw))\n\
    \    painter.end()\n```\n\nAs you turn the dial you will now see a number between\
    \ 0 and 5.\n\n## Drawing boxes\n\nNext we want to convert this number 0...5 to\
    \ a number of bars drawn on the canvas. Start by removing the `drawText` and font\
    \ and pen settings, as we no longer need those.\n\nTo draw accurately we need\
    \ to know the size of our canvas — i.e the size of the widget. We will also add\
    \ a bit of padding around the edges to give space around the edges of the blocks\
    \ against the black background.\n\n> All measurements in the QPainter are in pixels.\n\
    \nListing 152. custom-widgets/powerbar_6.py\n\n```\npadding = 5\n\n# Define our\
    \ canvas.\nd_height = painter.device().height() - (padding * 2)\nd_width = painter.device().width()\
    \ - (padding * 2)\n```\n\nWe take the height and width and subtract 2 * padding\
    \ from each -- it's 2x because we're padding both the left and right (and top\
    \ and bottom) edges. This gives us our resulting active canvas area in d_height\
    \ and d_width.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_446_0.png)\n\nFigure\
    \ 201. The padding on the outside of the layout.\n\nWe need to break up our d_height\
    \ into 5 equal parts, one for each block -- we can calculate that height simply\
    \ by d_height / 5. Additionally, since we want spaces between the blocks we need\
    \ to calculate how much of this step size is taken up by space (top and bottom,\
    \ so halved) and how much is actual block.\n\nListing 153. custom-widgets/powerbar_6.py\n\
    \n```\nstep_size = d_height / 5\nbar_height = step_size * 0.6\n```\n\nThese values\
    \ are all we need to draw our blocks on our canvas. To do this we count up to\
    \ the number of steps-1 starting from 0 using `range` and then draw a `fillRect`\
    \ over a region for each block.\n\nListing 154. custom-widgets/powerbar_6.py\n\
    \n```\nbrush.setColor(QtGui.QColor(\"red\"))\n\nfor n in range(n_steps_to_draw):\n\
    \    ypos = (1 + n) * step_size\n    rect = QtCore.QRect(\n        padding,\n\
    \        padding + d_height - int(ypos),\n        d_width,\n        int(bar_height),\n\
    \    )\n    painter.fillRect(rect, brush)\n```\n\nThere is a lot going on in the\
    \ placement calculations for the blocks, so let's step through those first.\n\n\
    The box to draw with `fillRect` is defined as a `QRect` object to which we pass,\
    \ in turn, the left x, top y, width and height.\n\nThe `width` is the full canvas\
    \ width minus the padding, which we previously calculated and stored in `d_width`.\
    \ The `left x` is similarly just the `padding` value (5px) from the left hand\
    \ side of the widget.\n\nThe `height` of the bar `bar_height` we calculated as\
    \ 0.6 times the `step_size`.\n\nThis leaves parameter 2 `d_height - ((1 + n) *\
    \ step_size)` which gives the `top y` position of the rectangle to draw. This\
    \ is the only calculation that changes as we draw the blocks.\n\n> Remember that\
    \ y coordinates in QPainter start at the top and increase down the canvas. This\
    \ means that plotting at d_height will be plotting at the very bottom of the canvas.\n\
    \n> To draw a block at the very bottom we must start drawing at d_height-step_size\
    \ i.e. one block up to leave space to draw downwards.\n\nIn our bar meter we're\
    \ drawing blocks, in turn, starting at the bottom and working upwards. So our\
    \ very first block must be placed at d_height-step_size and the second at d_height-(step_size*2).\
    \ Our loop iterates from 0 upwards, so we can achieve this with the following\
    \ formula —\n\n```\nypos = (1 + n) * step_size\ny = d_height - ypos\n```\n\nThis\
    \ produces the following layout.\n\n> In the picture below the current value of\
    \ n has been printed over the box, and a blue box has been drawn around the complete\
    \ step_size so you can see the padding and spacers in effect.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_449_0.png)\n\
    \nFigure 202. Showing the whole area (in blue) taken up by each segment.\n\nPutting\
    \ this all together gives the following code, which when run will produce a working\
    \ power-bar widget with blocks in red. You can drag the wheel back and forth and\
    \ the bars will move up and down in response.\n\nListing 155. custom-widgets/powerbar_6.py\n\
    \n```\npython\nimport sys\n\nfrom PySide2 import QtCore, QtGui, QtWidgets\nfrom\
    \ PySide2.QtCore import Qt\n\n\nclass _Bar(QtWidgets.QWidget):\n    def __init__(self):\n\
    \        super().__init__()\n\n        self.setSizePolicy(\n            QtWidgets.QSizePolicy.MinimumExpanding,\n\
    \            QtWidgets.QSizePolicy.MinimumExpanding,\n        )\n\n    def sizeHint(self):\n\
    \        return QtCore.QSize(40, 120)\n\n    def paintEvent(self, e):\n      \
    \  painter = QtGui.QPainter(self)\n\n        brush = QtGui.QBrush()\n```"
  mdcn: "## 绘制条形图\n\n现在我们已经实现了显示更新并显示了旋钮的当前值，接下来可以开始绘制实际的条形图显示了。这有点复杂，需要一些数学计算来确定条形的位置，但我们会逐步讲解，让你清楚了解整个过程。\n\
    \n下面的草图展示了我们的目标——一系列**N**个方块，从控件边缘内缩排列，方块之间留有空隙。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_443_1.png)\n\
    \n图200. 我们要实现的条形段和布局。\n\n## 计算绘制内容\n\n要绘制的方块数量由当前值决定——即该值在`QDial`配置的最小值和最大值之间的位置。我们在上面的示例中已经获取了这些信息。\n\
    \n```\ndial = self.parent()._dial\nvmin, vmax = dial.minimum(), dial.maximum()\n\
    value = dial.value()\n```\n\n如果`value`位于`vmin`和`vmax`的中间，那么我们希望绘制一半的方块（如果总共有4个方块，就绘制2个）。如果`value`等于`vmax`，我们希望绘制全部方块。\n\
    \n为此，我们首先将`value`转换为0到1之间的数字，其中`0 = vmin`，`1 = vmax`。我们先从`value`中减去`vmin`，将可能的值范围调整为从零开始——即从`vmin…vmax`变为`0…(vmax-vmin)`。然后将这个值除以`vmax-vmin`（新的最大值），就得到了一个0到1之间的数字。\n\
    \n接下来的技巧是将这个值（下面称为`pc`）乘以步数，这样就得到了一个0到5之间的数字——即要绘制的方块数量。\n\n```\npc = (value -\
    \ vmin) / (vmax - vmin)\nn_steps_to_draw = int(pc * 5)\n```\n\n我们用`int`包装结果，将其转换为整数（向下取整），以去除任何不完整的方块。\n\
    \n在你的绘制事件中更新`drawText`方法，改为输出这个数字。\n\n清单151. custom-widgets/powerbar_5.py\n\n\
    ```\ndef paintEvent(self, e):\n    painter = QtGui.QPainter(self)\n\n    brush\
    \ = QtGui.QBrush()\n    brush.setColor(QtGui.QColor(\"black\"))\n    brush.setStyle(Qt.SolidPattern)\n\
    \    rect = QtCore.QRect(0, 0, painter.device().width(), painter.device().height())\n\
    \    painter.fillRect(rect, brush)\n\n    # Get current state.\n    dial = self.parent()._dial\n\
    \    vmin, vmax = dial.minimum(), dial.maximum()\n    value = dial.value()\n\n\
    \    pen = painter.pen()\n    pen.setColor(QtGui.QColor(\"red\"))\n    painter.setPen(pen)\n\
    \n    font = painter.font()\n    font.setFamily(\"Times\")\n    font.setPointSize(18)\n\
    \    painter.setFont(font)\n\n    pc = (value - vmin) / (vmax - vmin)\n    n_steps_to_draw\
    \ = int(pc * 5)\n    painter.drawText(25, 25, \"{}\".format(n_steps_to_draw))\n\
    \    painter.end()\n```\n\n现在当你转动旋钮时，你会看到一个0到5之间的数字。\n\n## 绘制方块\n\n接下来，我们要将这个0...5的数字转换为在画布上绘制的条形数量。首先移除`drawText`以及字体和画笔设置，因为我们不再需要它们。\n\
    \n为了精确绘制，我们需要知道画布的大小——即控件的大小。我们还会在边缘添加一些内边距，以便在黑色背景上为方块边缘留出空间。\n\n> QPainter中的所有测量单位都是像素。\n\
    \n清单152. custom-widgets/powerbar_6.py\n\n```\npadding = 5\n\n# Define our canvas.\n\
    d_height = painter.device().height() - (padding * 2)\nd_width = painter.device().width()\
    \ - (padding * 2)\n```\n\n我们获取高度和宽度，并从中减去2 * padding——之所以是2倍，是因为我们在左右（以及上下）边缘都添加了内边距。这样就得到了我们最终的有效画布区域，存储在`d_height`和`d_width`中。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_446_0.png)\n\n图201. 布局外部的内边距。\n\n我们需要将`d_height`分成5等份，每份对应一个方块——我们可以通过`d_height\
    \ / 5`简单计算出这个高度。此外，由于我们希望在方块之间留有空隙，我们需要计算这个步长中有多少被空隙占据（上下各一半，所以除以2），有多少是实际的方块。\n\
    \n清单153. custom-widgets/powerbar_6.py\n\n```\nstep_size = d_height / 5\nbar_height\
    \ = step_size * 0.6\n```\n\n这些值就是我们在画布上绘制方块所需的全部信息。为此，我们使用`range`从0开始计数到步数-1，然后为每个方块在相应区域绘制一个`fillRect`。\n\
    \n清单154. custom-widgets/powerbar_6.py\n\n```\nbrush.setColor(QtGui.QColor(\"red\"\
    ))\n\nfor n in range(n_steps_to_draw):\n    ypos = (1 + n) * step_size\n    rect\
    \ = QtCore.QRect(\n        padding,\n        padding + d_height - int(ypos),\n\
    \        d_width,\n        int(bar_height),\n    )\n    painter.fillRect(rect,\
    \ brush)\n```\n\n方块的放置计算涉及很多内容，让我们先逐步分析。\n\n用`fillRect`绘制的方块被定义为一个`QRect`对象，我们依次向其传递左x坐标、上y坐标、宽度和高度。\n\
    \n`宽度`是完整的画布宽度减去内边距，我们之前已经计算并存储在`d_width`中。`左x坐标`同样只是控件左侧的`padding`值（5像素）。\n\n\
    方块的`高度``bar_height`我们计算为`step_size`的0.6倍。\n\n剩下的参数2 `d_height - ((1 + n) * step_size)`给出了要绘制的矩形的`上y`位置。这是在绘制方块时唯一变化的计算。\n\
    \n> 请记住，QPainter中的y坐标从顶部开始，向下增加。这意味着在`d_height`处绘制就是在画布的最底部绘制。\n\n> 要在最底部绘制一个方块，我们必须从`d_height-step_size`开始绘制，即向上移动一个方块的位置，以便留出向下绘制的空间。\n\
    \n在我们的条形图中，我们依次从底部向上绘制方块。因此，我们的第一个方块必须放置在`d_height-step_size`处，第二个方块放置在`d_height-(step_size*2)`处。我们的循环从0开始向上迭代，因此我们可以用以下公式实现这一点——\n\
    \n```\nypos = (1 + n) * step_size\ny = d_height - ypos\n```\n\n这会产生以下布局。\n\n>\
    \ 在下图中，当前n值已打印在方块上，并且围绕整个`step_size`绘制了一个蓝色方框，以便你可以看到内边距和间隔的效果。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_449_0.png)\n\
    \n图202. 显示每个段占用的整个区域（蓝色）。\n\n将所有这些组合起来，得到以下代码，运行后将产生一个带有红色方块的可工作的功率条控件。你可以来回拖动滚轮，条形会相应地上下移动。\n\
    \n清单155. custom-widgets/powerbar_6.py\n\n```\npython\nimport sys\n\nfrom PySide2\
    \ import QtCore, QtGui, QtWidgets\nfrom PySide2.QtCore import Qt\n\n\nclass _Bar(QtWidgets.QWidget):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setSizePolicy(\n\
    \            QtWidgets.QSizePolicy.MinimumExpanding,\n            QtWidgets.QSizePolicy.MinimumExpanding,\n\
