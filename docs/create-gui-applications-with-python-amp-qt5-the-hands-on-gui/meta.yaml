- md: "# Create GUI Applications with Python & Qt5\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_0_0.png)\n\
    \nThe **hands-on** guide to making apps with Python\n\n**PySide2** Edition\n\n\
    Martin Fitzpatrick\n\n# Create GUI Applications with Python & Qt5\n\nThe hands-on\
    \ guide to making apps with Python\n\nMartin Fitzpatrick\n\nVersion 4.0, 2021-10-25\n\
    \n# Table of Contents\n\n- Introduction\n    1. A *very* brief history of the\
    \ GUI\n    2. A bit about Qt\n    3. Thank you\n    4. Copyright\n- Basic PySide2\
    \ Features\n    5. My first Application\n    6. Signals & Slots\n    7. Widgets\n\
    \    8. Layouts\n    9. Actions, Toolbars & Menus\n    10. Dialogs\n    11. Windows\n\
    \    12. Events\n- Qt Designer\n    13. Installing Qt Designer\n    14. Getting\
    \ started with Qt Designer\n    15. The Qt Resource system\n- Theming\n    16.\
    \ Styles\n    17. Palettes\n    18. Icons\n    19. Qt Style Sheets (QSS)\n- Model\
    \ View Architecture\n    20. The Model View Architecture — Model View Controller\n\
    \    21. A simple Model View — a Todo List\n    22. Tabular data in ModelViews,\
    \ with numpy & pandas\n    23. Querying SQL databases with Qt models\n- Further\
    \ PySide2 Features\n    24. Extending Signals\n    25. Routing\n    26. Working\
    \ with command-line arguments\n    27. System tray & macOS menus\n    28. Enums\
    \ & the Qt Namespace\n- Custom Widgets\n    29. Bitmap Graphics in Qt\n    30.\
    \ Creating Custom Widgets\n- Concurrent Execution\n    31. Introduction to Threads\
    \ & Processes\n    32. Using the thread pool\n    33. Threading examples\n   \
    \ 34. Running external commands & processes\n- Plotting\n    35. Plotting with\
    \ PyQtGraph\n    36. Plotting with Matplotlib\n- Packaging & Distribution\n  \
    \  37. Packaging with PyInstaller\n- Example applications\n    38. Mozzarella\
    \ Ashbadger\n    39. Moonsweeper\n- Appendix A: Installing PySide2\n- Appendix\
    \ B: Translating C++ Examples to Python\n- Appendix C: PyQt5 and PySide2 — What’s\
    \ the difference?\n- Appendix D: What next?\n- Index\n\n# Introduction\n\nIf you\
    \ want to create GUI applications with Python it can be tricky to know where to\
    \ start. There are a lot of new concepts you need to understand to get *anything*\
    \ to work. But, like any coding problem, the first step is learning to approach\
    \ the problem in the right way. In this book I take you right from the basic principles\
    \ of GUI development to creating your own, fully functional, desktop apps with\
    \ PySide2.\n\nThe first edition of this book was released in 2016. Since then\
    \ it has been updated 4 times, adding and expanding chapters in response to reader\
    \ feedback. There are more PySide resources available now than when I started,\
    \ but there is still a shortage of in-depth, practical guides to building complete\
    \ apps. This book fills that gap!\n\nThe book is formatted as a series of chapters\
    \ exploring different aspects of PySide2 in turn. They are arranged to put the\
    \ simpler chapters toward the beginning, but if you have specific requirements\
    \ for your project, don't be afraid to jump around! Each chapter will guide you\
    \ through learning the fundamental concepts before taking you through a series\
    \ of coding examples to gradually explore and learn how to apply the ideas yourself.\n\
    \nYou can download source code and resources for all examples in this book from\
    \ http://www.pythonguis.com/d/pyside2-source.zip\n\nIt is not possible to give\
    \ you a *complete* overview of the Qt system in a book of this size, so there\
    \ are links to external resources—both on the pythonguis.com website and elsewhere.\
    \ If you find yourself thinking \"I wonder if I can do *that*?\" the best thing\
    \ you can do is put this book down, then *go and find out!* Just keep regular\
    \ backups of your code along the way so you always have something to come back\
    \ to if you royally mess it up."
