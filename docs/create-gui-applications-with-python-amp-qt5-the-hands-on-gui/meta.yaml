- md: "## Stopping jobs\n\nWe can start jobs, and some of them die due to errors.\
    \ But what if we want to stop jobs that are taking too long? The `QListView` allows\
    \ us to select rows and through the selected row we can kill a specific worker.\
    \ The method below is linked to a button, and looks up the worker from the current\
    \ selected item in the list.\n\nListing 196. concurrent/qrunner_manager_stop.py\n\
    \n```python\ndef stop_worker(self):\n    selected = self.progress.selectedIndexes()\n\
    \    for idx in selected:\n        job_id, _ = self.workers.data(idx, Qt.DisplayRole)\n\
    \        self.workers.kill(job_id)\n```\n\nIn addition to this we need to modify\
    \ the delegate to draw the currently selected item and update the worker and manager\
    \ to pass through the *kill* signal. Take a look at the full source for this example\
    \ to see how it all fits together.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_551_0.png)\n\
    \nFigure 220. The manager, selecting a job allows you to stop it.\n\n## A sense\
    \ of progress\n\nWhen a user does something in your application, the consequences\
    \ of that action should be immediately apparent — either through the result of\
    \ the action itself, or through an indication that *something* is being done that\
    \ will provide the result. This is particularly important for long-running tasks,\
    \ such as calculations or network requests, where a lack of feedback could prompt\
    \ the user to repeatedly mash buttons and seeing nothing in return.\n\nOne simple\
    \ approach is to disable buttons once an operation has been triggered. But with\
    \ no other indicator this looks a lot like \"broken\". A better alternative is\
    \ to update the button with a \"Working\" message and an active progress indicator\
    \ nearby. Progress bars are a common way to address this by informing the user\
    \ of what is going on. But don't fall into the trap of thinking progress bars\
    \ are always useful. They should always present a linear progress towards a task,\
    \ if they don't they can be worse than no information.\n\nProgress bars are not\
    \ helpful if:\n\n- they go backwards and forward\n- they don't increase linearly\
    \ with the task progress\n- they complete too quickly\n\nAny of these behaviors\
    \ can give users the sense that *something isn't right* whether \"it's getting\
    \ worse\" to \"what was that dialog I missed?\" Your users must always *feel*\
    \ in control.\n\n## DO\n\n- Provide progress bars for long-running tasks.\n- Provide\
    \ granular detail of sub-tasks where appropriate.\n- Estimate how long something\
    \ will take, when you can.\n\n## DON'T\n\n- Assume your users know what tasks\
    \ are long- and short-running.\n- Use progress bars when you have no idea of progress.\n\
    - Use progress bars that go up and down.\n\n## 34. Running external commands &\
    \ processes\n\nSo far we've looked at how to run things in separate threads, including\
    \ external programs using Python `subprocess`. But in PySide2 we can also make\
    \ use of a Qt-based system for running external programs, `QProcess`. Creating\
    \ and executing a job with `QProcess` is relatively straightforward.\n\nThe simplest\
    \ possible example is shown below — we create a `QProcess` object and then call\
    \ `.start` passing in the command to execute and a `list` of string arguments.\
    \ In this case we're running our custom demo script, with Python `python dummy_script.py`.\n\
    \n```python\np = QProcess()\np.start(\"python\", [\"dummy_script.py\"])\n```\n\
    \n> Depending on your environment, you may need to specify `python3` instead of\
    \ `python`.\n\n> You need to keep a reference to the created `QProcess` instance,\
    \ either on `self` or elsewhere, while it is running.\n\nThe simple example is\
    \ enough if you just want to *run* a program and don't care what happens to it.\
    \ However, if you want to know more about what a program is doing, `QProcess`\
    \ provides a number of signals which can be used to track the progress and state\
    \ of processes.\n\nThe most useful are the `.readyReadStandardOutput` and `.readyReadStandardError`\
    \ which fire whenever there is *standard output* and *standard error* ready to\
    \ be read from the process. All running processes have two streams of output—*standard\
    \ out* and *standard error*. The standard output returns the actual result of\
    \ the execution (if any) while standard error returns any error *or* logging information.\n\
    \n```python\np = QProcess()\np.readyReadStandardOutput.connect(self.handle_stdout)\n\
    p.readyReadStandardError.connect(self.handle_stderr)\np.stateChanged.connect(self.handle_state)\n\
    p.finished.connect(self.cleanup)\np.start(\"python\", [\"dummy_script.py\"])\n\
    ```\n\nAdditionally, there is a `.finished` signal which is fired when the process\
    \ completes, and a `.stateChanged` signal which fires when the process status\
    \ changes. Valid values — defined in the `QProcess.ProcessState` enum — are shown\
    \ below.\n\n| Constant | Value | Description |\n| :--- | :--- | :--- |\n| QProcess.NotRunning\
    \ | 0 | The process is not running. |\n| QProcess.Starting | 1 | The process is\
    \ starting, but the program has not yet been invoked. |\n| QProcess.Running |\
    \ 2 | The process is running and is ready for reading and writing. |\n\nIn the\
    \ following example we extend this basic `QProcess` setup to add handlers for\
    \ the *standard out* and *standard err*. The signals notifying of available data\
    \ connect to these handlers and trigger a request of the data from the process,\
    \ using `.readAllStandardError()` and `.readAllStandardOutput()`.\n\n> The methods\
    \ output raw `bytes`, so you need to decode it first.\n\nIn this example, our\
    \ demo script `dummy_script.py` return a series of strings, which are parsed to\
    \ provide progress information and structured data. The state of the process is\
    \ also displayed on the statusbar.\n\nThe full code is shown below —\n\nListing\
    \ 197. concurrent/qprocess.py\n\n```python\nimport re\nimport sys\n\nfrom PySide2.QtCore\
    \ import (\n    QObject,\n    QProcess,\n    QRunnable,\n    Qt,\n    QThreadPool,\n\
    \    QTimer,\n    Signal,\n    Slot,\n)\nfrom PySide2.QtWidgets import (\n   \
    \ QApplication,\n    QMainWindow,\n    QPlainTextEdit,\n    QProgressBar,\n  \
    \  QPushButton,\n    QVBoxLayout,\n    QWidget,\n)\n\nSTATES = {\n    QProcess.NotRunning:\
    \ \"Not running\",\n    QProcess.Starting: \"Starting...\",\n    QProcess.Running:\
    \ \"Running...\",\n}\n\nprogress_re = re.compile(\"Total complete: (\\d+)%\")\n\
    \ndef simple_percent_parser(output):\n    \"\"\"\n    Matches lines using the\
    \ progress_re regex,\n    returning a single integer for the % progress.\n   \
    \ \"\"\"\n    m = progress_re.search(output)\n    if m:\n        pc_complete =\
    \ m.group(1)\n        return int(pc_complete)\n\ndef extract_vars(l):\n    \"\"\
    \"\n    Extracts variables from lines, looking for lines\n    containing an equals,\
    \ and splitting into key=value.\n    \"\"\"\n    data = {}\n    for s in l.splitlines():\n\
    \        if \"=\" in s:\n            name, value = s.split(\"=\")\n          \
    \  data[name] = value\n    return data\n\nclass MainWindow(QMainWindow):\n   \
    \ def __init__(self):\n        super().__init__()\n\n        # Hold process reference.\n\
    \        self.p = None\n\n        layout = QVBoxLayout()\n\n        self.text\
    \ = QPlainTextEdit()\n        layout.addWidget(self.text)\n\n        self.progress\
    \ = QProgressBar()\n        layout.addWidget(self.progress)\n\n        btn_run\
    \ = QPushButton(\"Execute\")\n        btn_run.clicked.connect(self.start)\n\n\
    \        layout.addWidget(btn_run)\n\n        w = QWidget()\n        w.setLayout(layout)\n\
    \        self.setCentralWidget(w)\n\n        self.show()\n\n    def start(self):\n\
    \        if self.p is not None:\n            return\n\n        self.p = QProcess()\n\
    \        self.p.readyReadStandardOutput.connect(self.handle_stdout)\n        self.p.readyReadStandardError.connect(self.handle_stderr)\n\
    \        self.p.stateChanged.connect(self.handle_state)\n        self.p.finished.connect(self.cleanup)\n\
    \        self.p.start(\"python\", [\"dummy_script.py\"])\n\n    def handle_stderr(self):\n\
    \        result = bytes(self.p.readAllStandardError()).decode(\"utf8\")\n    \
    \    progress = simple_percent_parser(result)\n\n        self.progress.setValue(progress)\n\
    \n    def handle_stdout(self):\n        result = bytes(self.p.readAllStandardOutput()).decode(\"\
    utf8\")\n        data = extract_vars(result)\n\n        self.text.appendPlainText(str(data))\n\
    \n    def handle_state(self, state):\n        self.statusBar().showMessage(STATES[state])\n\
    \n    def cleanup(self):\n        self.p = None\n\napp = QApplication(sys.argv)\n\
    w = MainWindow()\napp.exec_()\n```\n\nIn this example we store a reference to\
    \ the process in `self.p`, meaning we can only run a single process at once. But\
    \ you are free to run as many processes as you like alongside your application.\
    \ If you don't need to track information from them, you can simply store references\
    \ to the processes in a `list`.\n\nHowever, if you want to track progress and\
    \ parse output from workers individually, you may want to consider creating a\
    \ manager class to handle and track all your processes. There is an example of\
    \ this in the source files with the book."
  mdcn: "## 停止任务\n\n我们可以启动任务，其中一些会因错误而终止。但如果我们想停止那些耗时过长的任务呢？`QListView`允许我们选择行，并通过所选行来终止特定的工作进程。下面的方法与一个按钮关联，它从列表中当前选中的项查找工作进程。\n\
    \n清单 196. concurrent/qrunner_manager_stop.py\n\n```python\ndef stop_worker(self):\n\
    \    selected = self.progress.selectedIndexes()\n    for idx in selected:\n  \
    \      job_id, _ = self.workers.data(idx, Qt.DisplayRole)\n        self.workers.kill(job_id)\n\
    ```\n\n除此之外，我们还需要修改委托以绘制当前选中的项，并更新工作进程和管理器以传递*终止*信号。请查看此示例的完整源代码，了解所有部分如何协同工作。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_551_0.png)\n\n图 220. 管理器，选择一个任务允许你停止它。\n\
    \n## 进度感\n\n当用户在你的应用程序中执行某项操作时，该操作的结果应该立即显现——要么通过操作本身的结果，要么通过表明*某事*正在进行并最终会提供结果的指示。这对于长时间运行的任务（如计算或网络请求）尤为重要，因为缺乏反馈可能会促使用户反复点击按钮却看不到任何回报。\n\
    \n一种简单的方法是在操作触发后禁用按钮。但如果没有其他指示，这看起来很像“已损坏”。一个更好的替代方案是将按钮更新为“处理中”消息，并在附近显示一个活动的进度指示器。进度条是解决此问题的常用方法，它告知用户正在发生什么。但不要陷入认为进度条总是有用的陷阱。它们应该始终呈现任务的线性进度，如果不能，它们可能比没有信息更糟。\n\
    \n进度条在以下情况下没有帮助：\n\n-   它们来回波动\n-   它们不随任务进度线性增加\n-   它们完成得太快\n\n任何这些行为都会给用户一种*有些不对劲*的感觉，从“情况在变糟”到“我错过了什么对话框？”。你的用户必须始终*感觉*在掌控之中。\n\
    \n## 应该做\n\n-   为长时间运行的任务提供进度条。\n-   在适当的情况下提供子任务的详细信息。\n-   在可能的情况下，估算某事需要多长时间。\n\
    \n## 不应该做\n\n-   假设你的用户知道哪些任务是长时间运行的，哪些是短时间运行的。\n-   在你对进度一无所知时使用进度条。\n-   使用上下波动的进度条。\n\
    \n## 34. 运行外部命令和进程\n\n到目前为止，我们已经研究了如何在单独的线程中运行任务，包括使用Python `subprocess`运行外部程序。但在PySide2中，我们也可以利用基于Qt的系统来运行外部程序，即`QProcess`。使用`QProcess`创建和执行任务相对简单。\n\
    \n下面展示了最简单的示例——我们创建一个`QProcess`对象，然后调用`.start`，传入要执行的命令和一个字符串参数`list`。在这个例子中，我们使用Python运行我们的自定义演示脚本：`python\
    \ dummy_script.py`。\n\n```python\np = QProcess()\np.start(\"python\", [\"dummy_script.py\"\
    ])\n```\n\n> 根据你的环境，你可能需要指定`python3`而不是`python`。\n\n> 在`QProcess`实例运行期间，你需要保持对它的引用，可以放在`self`上或其他地方。\n\
    \n如果你只想*运行*一个程序而不关心它发生了什么，这个简单的例子就足够了。然而，如果你想了解更多关于程序正在做什么的信息，`QProcess`提供了许多信号，可用于跟踪进程的进度和状态。\n\
    \n最有用的是`.readyReadStandardOutput`和`.readyReadStandardError`，每当进程有*标准输出*和*标准错误*准备好被读取时，它们就会触发。所有运行的进程都有两个输出流——*标准输出*和*标准错误*。标准输出返回执行的实际结果（如果有），而标准错误返回任何错误*或*日志信息。\n\
    \n```python\np = QProcess()\np.readyReadStandardOutput.connect(self.handle_stdout)\n\
    p.readyReadStandardError.connect(self.handle_stderr)\np.stateChanged.connect(self.handle_state)\n\
    p.finished.connect(self.cleanup)\np.start(\"python\", [\"dummy_script.py\"])\n\
    ```\n\n此外，还有一个`.finished`信号在进程完成时触发，以及一个`.stateChanged`信号在进程状态改变时触发。有效值——在`QProcess.ProcessState`枚举中定义——如下所示。\n\
    \n| 常量 | 值 | 描述 |\n| :--- | :--- | :--- |\n| QProcess.NotRunning | 0 | 进程未运行。\
    \ |\n| QProcess.Starting | 1 | 进程正在启动，但程序尚未被调用。 |\n| QProcess.Running | 2 | 进程正在运行，并准备好进行读写。\
    \ |\n\n在下面的示例中，我们扩展了这个基本的`QProcess`设置，为*标准输出*和*标准错误*添加了处理程序。通知有可用数据的信号连接到这些处理程序，并触发从进程请求数据，使用`.readAllStandardError()`和`.readAllStandardOutput()`。\n\
    \n> 这些方法输出原始`bytes`，因此你需要先对其进行解码。\n\n在这个例子中，我们的演示脚本`dummy_script.py`返回一系列字符串，这些字符串被解析以提供进度信息和结构化数据。进程的状态也显示在状态栏上。\n\
    \n完整代码如下——\n\n清单 197. concurrent/qprocess.py\n\n```python\nimport re\nimport sys\n\
    \nfrom PySide2.QtCore import (\n    QObject,\n    QProcess,\n    QRunnable,\n\
    \    Qt,\n    QThreadPool,\n    QTimer,\n    Signal,\n    Slot,\n)\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QMainWindow,\n    QPlainTextEdit,\n    QProgressBar,\n\
    \    QPushButton,\n    QVBoxLayout,\n    QWidget,\n)\n\nSTATES = {\n    QProcess.NotRunning:\
    \ \"Not running\",\n    QProcess.Starting: \"Starting...\",\n    QProcess.Running:\
    \ \"Running...\",\n}\n\nprogress_re = re.compile(\"Total complete: (\\d+)%\")\n\
    \ndef simple_percent_parser(output):\n    \"\"\"\n    Matches lines using the\
    \ progress_re regex,\n    returning a single integer for the % progress.\n   \
    \ \"\"\"\n    m = progress_re.search(output)\n    if m:\n        pc_complete =\
    \ m.group(1)\n        return int(pc_complete)\n\ndef extract_vars(l):\n    \"\"\
    \"\n    Extracts variables from lines, looking for lines\n    containing an equals,\
    \ and splitting into key=value.\n    \"\"\"\n    data = {}\n    for s in l.splitlines():\n\
    \        if \"=\" in s:\n            name, value = s.split(\"=\")\n          \
    \  data[name] = value\n    return data\n\nclass MainWindow(QMainWindow):\n   \
    \ def __init__(self):\n        super().__init__()\n\n        # Hold process reference.\n\
    \        self.p = None\n\n        layout = QVBoxLayout()\n\n        self.text\
    \ = QPlainTextEdit()\n        layout.addWidget(self.text)\n\n        self.progress\
    \ = QProgressBar()\n        layout.addWidget(self.progress)\n\n        btn_run\
    \ = QPushButton(\"Execute\")\n        btn_run.clicked.connect(self.start)\n\n\
    \        layout.addWidget(btn_run)\n\n        w = QWidget()\n        w.setLayout(layout)\n\
    \        self.setCentralWidget(w)\n\n        self.show()\n\n    def start(self):\n\
    \        if self.p is not None:\n            return\n\n        self.p = QProcess()\n\
    \        self.p.readyReadStandardOutput.connect(self.handle_stdout)\n        self.p.readyReadStandardError.connect(self.handle_stderr)\n\
    \        self.p.stateChanged.connect(self.handle_state)\n        self.p.finished.connect(self.cleanup)\n\
    \        self.p.start(\"python\", [\"dummy_script.py\"])\n\n    def handle_stderr(self):\n\
    \        result = bytes(self.p.readAllStandardError()).decode(\"utf8\")\n    \
    \    progress = simple_percent_parser(result)\n\n        self.progress.setValue(progress)\n\
    \n    def handle_stdout(self):\n        result = bytes(self.p.readAllStandardOutput()).decode(\"\
    utf8\")\n        data = extract_vars(result)\n\n        self.text.appendPlainText(str(data))\n\
    \n    def handle_state(self, state):\n        self.statusBar().showMessage(STATES[state])\n\
    \n    def cleanup(self):\n        self.p = None\n\napp = QApplication(sys.argv)\n\
    w = MainWindow()\napp.exec_()\n```\n\n在这个例子中，我们将进程的引用存储在`self.p`中，这意味着我们一次只能运行一个进程。但你可以自由地在应用程序旁边运行任意数量的进程。如果你不需要跟踪它们的信息，你可以简单地将进程的引用存储在一个`list`中。\n\
    \n然而，如果你想单独跟踪进度和解析工作进程的输出，你可能需要考虑创建一个管理器类来处理和跟踪你所有的进程。本书的源文件中有一个这样的示例。"
