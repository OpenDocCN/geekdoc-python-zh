  - '[PAGE 69]


    # 8. Layouts


    So far we''ve successfully created a window and we''ve added a widget to it. However,
    you will usually want to add more than one widget to a window, and have some control
    over where the widgets you add end up. To arrange widgets together in Qt we use
    *layouts*. There are 4 basic layouts available in Qt, which are listed in the
    following table.


    | Layout | Behavior |

    | :--- | :--- |

    | `QHBoxLayout` | Linear horizontal layout |

    | `QVBoxLayout` | Linear vertical layout |

    | `QGridLayout` | In indexable grid XxY |

    | `QStackedLayout` | Stacked (z) in front of one another |


    There are three 2-dimensional layouts available in Qt. The `QVBoxLayout`, `QHBoxLayout`
    and `QGridLayout`. In addition there is also `QStackedLayout` which allows you
    to place widgets one on top of the other within the same space, yet showing only
    one widget at a time.


    In this chapter we''ll go through each of these layouts in turn, showing how we
    can use them to position widgets in our applications.


    > **Qt Designer**


    You can actually design and lay out your interface graphically using the Qt Designer,
    which we will cover later. Here we''re using code, as it''s simpler to understand
    and experiment with the underlying system.'
