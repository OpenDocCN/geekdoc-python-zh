  md: "# The calculator\n\nThreading is a good option when you need to perform complex\
    \ calculations. If you're using the Python *numpy*, *scipy* or *pandas* libraries\
    \ then these calculations may also release the Python Global Interpreter Lock\
    \ (GIL) meaning both your GUI and calculation thread can run at full speed.\n\n\
    In this example we'll create a number of workers which are all performing some\
    \ simple calculations. The results of these calculations will be returned to the\
    \ GUI thread and displayed in a plot.\n\n> We cover PyQtGraph in detail in [Plotting\
