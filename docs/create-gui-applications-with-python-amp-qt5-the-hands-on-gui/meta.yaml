    # 22. Tabular data in ModelViews, with numpy & pandas


    In the previous section we covered an introduction to the Model View architecture.
    However, we only touched on one of the model views — `QListView`. There are two
    other Model Views available in PySide2 — `QTableView` and `QTreeView` which provide
    tabular (Excel-like) and tree (file directory browser-like) views using the same
    `QStandardItemModel`.


    In this part we''ll look at how to use `QTableView` from PySide2, including how
    to model your data, format values for display and add conditional formatting.


    You can use model views with *any* data source, as long as your model returns
    that data in a format that Qt can understand. Working with tabular data in Python
    opens up a number of possibilities for how we load and work with that data. Here
    we''ll start with a simple nested list of lists and then move onto integrating
    your Qt application with the popular *numpy* and *pandas* libraries. This will
    provide you with a great foundation for building data-focused applications.


    # Introduction to QTableView


    `QTableView` is a Qt view widget which presents data in a spreadsheet-like table
    view. Like all widgets in the *Model View Architecture* this uses a separate *model*
    to provide data and presentation information to the view. Data in the model can
    be updated as required, and the view notified of these changes to redraw/display
    the changes. By customizing the model it is possible to have a huge amount of
    control over how the data is presented.


    To use the model we''ll need a basic application structure and some dummy data.
    A simple working example is shown below, which defines a custom model with a simple
    nested-list as a data store.'
