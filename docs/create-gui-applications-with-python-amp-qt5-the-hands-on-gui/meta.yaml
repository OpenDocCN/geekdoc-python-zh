    Figure 178. Black line annotated with the coordinates.


    # Drawing primitives


    QPainter provides a huge number of methods for drawing shapes and lines on a bitmap
    surface (in 5.12 there are 192 QPainter specific non-event methods). The good
    news is that most of these are overloaded methods which are simply different ways
    of calling the same base methods.


    For example, there are 5 different drawLine methods, all of which draw the same
    line, but differ in how the coordinates of what to draw are defined.


    | Method | Description |

    | :--- | :--- |

    | `drawLine(line)` | Draw a QLine instance |

    | `drawLine(line)` | Draw a QLineF instance |

    | `drawLine(x1, y1, x2, y2)` | Draw a line between x1, y2 and x2, y2 (both int).
    |'
  merge: -1
  pgno: 405
- img_proc: true
  md: '| Method | Description |

    | :--- | :--- |

    | `drawLine(p1, p2)` | Draw a line between point p1 and p2 (both `QPoint`) |

    | `drawLine(p1, p2)` | Draw a line between point p1 and p2 (both `QPointF`) |


    If you’re wondering what the difference is between a `QLine` and a `QLineF` ,
    the latter has its coordinates specified as `float`. This is convenient if you
    have float positions as the result of other calculations, but otherwise not so
    much.


    Ignoring the F-variants, we have 3 unique ways to draw a line — with a line object,
    with two sets of coordinates `(x1, y1)`, `(x2, y2)` or with two `QPoint` objects.
    When you discover that a `QLine` itself is defined as `QLine(const QPoint & p1,
    const QPoint & p2)` or `QLine(int x1, int y1, int x2, int y2)` you see that they
    are all in fact, exactly the same thing. The different call signatures are simply
    there for convenience.


    > Given the x1, y1, x2, y2 coordinates, the two `QPoint` objects would be defined
    as `QPoint(x1, y1)` and `QPoint(x2, y2)`.


    So, leaving out the duplicates we have the following draw operations —`drawArc`
    , `drawChord`, `drawConvexPolygon`, `drawEllipse`,`drawLine`, `drawPath`, `drawPie`,
    `drawPoint`, `drawPolygon`, `drawPolyline`, `drawRect`, `drawRects` and `drawRoundedRect`.
    To avoid get overwhelmed we’ll focus first on the primitive shapes and lines first
    and return to the more complicated operations once we have the basics down.


    > For each example, replace the `draw_something` method in your stub application
    and re-run it to see the output.


    # drawPoint


    This draws a point, or `pixel` at a given point on the canvas. Each call to `drawPoint`
    draws one pixel. Replace your `draw_something` code with the following.'
