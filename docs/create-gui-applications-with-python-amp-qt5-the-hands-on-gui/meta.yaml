    # Showing & hiding windows


    Once you have created a persistent window you can show and hide it without recreating
    it. Once hidden the window still exists, but will not be visible and accept mouse
    or other input. However you can continue to call methods on the window and update
    it''s state – including changing it''s appearance. Once re-shown any changes will
    be visible.


    Below we update our main window to create a `toggle_window` method which checks,
    using `.isVisible()` to see if the window is currently visible. If it is not,
    it is shown using `.show()` , if it is already visible we hide it with `.hide()`.'
