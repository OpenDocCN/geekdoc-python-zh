    # 34. Running external commands & processes


    So far we''ve looked at how to run things in separate threads, including external
    programs using Python `subprocess`. But in PySide2 we can also make use of a Qt-based
    system for running external programs, `QProcess`. Creating and executing a job
    with `QProcess` is relatively straightforward.


    The simplest possible example is shown below — we create a `QProcess` object and
    then call `.start` passing in the command to execute and a `list` of string arguments.
    In this case we''re running our custom demo script, with Python `python dummy_script.py`.


    ```

    p = QProcess()

    p.start("python", ["dummy_script.py"])

    ```


    > Depending on your environment, you may need to specify `python3` instead of
    `python`.


    > You need to keep a reference to the created `QProcess` instance, either on `self`
    or elsewhere, while it is running.


    The simple example is enough if you just want to *run* a program and don''t care
    what happens to it. However, if you want to know more about what a program is
    doing, `QProcess` provides a number of signals which can be used to track the
    progress and state of processes.


    The most useful are the `.readyReadStandardOutput` and `.readyReadStandardError`
    which fire whenever there is *standard output* and *standard error* ready to be
    read from the process. All running processes have two streams of output—*standard
    out* and *standard error*. The standard output returns the actual result of the
    execution (if any) while standard error returns any error *or*'
