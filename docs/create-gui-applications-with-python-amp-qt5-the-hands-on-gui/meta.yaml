    logging information.


    ```

    p = QProcess()

    p.readyReadStandardOutput.connect(self.handle_stdout)

    p.readyReadStandardError.connect(self.handle_stderr)

    p.stateChanged.connect(self.handle_state)

    p.finished.connect(self.cleanup)

    p.start("python", ["dummy_script.py"])

    ```


    Additionally, there is a `.finished` signal which is fired when the process completes,
    and a `.stateChanged` signal which fires when the process status changes. Valid
    values — defined in the `QProcess.ProcessState` enum — are shown below.


    | Constant | Value | Description |

    | :--- | :--- | :--- |

    | QProcess.NotRunning | 0 | The process is not running. |

    | QProcess.Starting | 1 | The process is starting, but the program has not yet
    been invoked. |

    | QProcess.Running | 2 | The process is running and is ready for reading and writing.
    |


    In the following example we extend this basic `QProcess` setup to add handlers
    for the *standard out* and *standard err*. The signals notifying of available
    data connect to these handlers and trigger a request of the data from the process,
    using `.readAllStandardError()` and `.readAllStandardOutput()`.


    > The methods output raw `bytes`, so you need to decode it first.


    In this example, our demo script `dummy_script.py` return a series of strings,
    which are parsed to provide progress information and structured data. The state
    of the process is also displayed on the statusbar.


    The full code is shown below —'
