  md: "# Endgames\n\nEndgame states are detected during the reveal process following\
    \ a click on a title. There are two possible outcomes --\n\n+   1. Tile is a mine,\
    \ game over.\n2. Tile is not a mine, decrement the `self.end_game_n`.\n\nThis\
    \ continues until `self.end_game_n` reaches zero, which triggers the win game\
    \ process by calling either `game_over` or `game_won`. Success/failure is triggered\
    \ by revealing the map and setting the relevant status, in both cases.\n\nListing\
    \ 250. app/minesweeper.py\n\n```\ndef on_reveal(self, w):\n    if w.is_mine:\n\
    \        self.game_over()\n    else:\n        self.end_game_n -= 1  # decrement\
    \ remaining empty spaces\n        if self.end_game_n == 0:\n            self.game_won()\n\
    \ndef game_over(self):\n    self.reveal_map()\n    self.update_status(STATUS_FAILED)\n\
    \ndef game_won(self):\n    self.reveal_map()\n    self.update_status(STATUS_SUCCESS)\n\
    ```"
