  md: "For each x and y location we get the 8 surrounding widgets. If any of these\
    \ widgets is not a mine, and is not already in the `to_reveal` list we add it.\
    \ This ensures that the edges of the expanded area are all revealed. If the position\
    \ has no adjacent mines, we append the coordinates onto `to_expand` to be checked\
    \ on the next iteration.\n\nBy adding any non-mine tiles to `to_reveal`, and only\
    \ expanding tiles that are not already in `to_reveal`, we ensure that we won't\
    \ visit a tile more than once.\n\nListing 249. app/minesweeper.py\n\n```\ndef\
    \ expand_reveal(self, x, y):\n    \"\"\"\n    Iterate outwards from the initial\
    \ point, adding new locations to the\n    queue. This allows us to expand all\
