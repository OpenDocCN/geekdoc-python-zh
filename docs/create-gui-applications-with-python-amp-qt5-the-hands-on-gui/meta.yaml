    \n*Figure 205. Configuring the PowerBar.*\n\n## Adding the QAbstractSlider Interface\n\
    \nWe've added methods to configure the behavior of the power bar. But we currently\
    \ provide no way to configure the standard `QDial` methods -- for example, setting\
    \ the min, max or step size -- from our widget. We could work through and add\
    \ wrapper methods for all of these, but it would get very tedious very quickly.\n\
    \n```python\n# Example of a single wrapper, we'd need 30+ of these.\ndef setNotchesVisible(self,\
    \ b):\n    return self._dial.setNotchesVisible(b)\n```\n\nInstead we can add a\
    \ little handler onto our outer widget to automatically look for methods (or attributes)\
    \ on the `QDial` instance, if they don't exist on our class directly. This way\
    \ we can implement our own methods, yet still get all the `QAbstractSlider` goodness\
    \ for free.\n\nThe wrapper is shown below, implemented as a custom `__getattr__`\
    \ method.\n\nListing 160. custom-widgets/powerbar_8.py\n\n```python\ndef __getattr__(self,\
    \ name):\n    if name in self.__dict__:\n        return self[name]\n\n    try:\n\
    \        return getattr(self._dial, name)\n    except AttributeError:\n      \
    \  raise AttributeError(\n            \"'{}' object has no attribute '{}'\".format(\n\
    \                self.__class__.__name__, name\n            )\n        )\n```\n\
    \nWhen accessing a property (or method) -- e.g. when we call `PowerBar.setNotchesVisible(true)`\
    \ Python internally uses `__getattr__` to get the property from the current object.\
    \ This handler does this through the object dictionary `self.__dict__`. We've\
    \ overridden this method to provide our custom handling logic.\n\nNow, when we\
    \ call `PowerBar.setNotchesVisible(true)`, this handler first looks on our current\
    \ object (a `PowerBar` instance) to see if `.setNotchesVisible` exists and if\
    \ it does uses it. If **not** it then calls `getattr()` on `self._dial` instead\
    \ returning what it finds there. This gives us access to all the methods of `QDial`\
    \ from our custom `PowerBar` widget.\n\nIf `QDial` doesn't have the attribute\
    \ either, and raises an `AttributeError` we catch it and raise it again from our\
    \ custom widget, where it belongs.\n\n> This works for any properties or methods,\
    \ including signals. So the standard `QDial` signals such as `.valueChanged` are\
    \ available too.\n\nThanks to these changes we can also simplify the code in our\
    \ `paintEvent` to get the current state from `.parent()` directly, rather than\
    \ `.parent()._dial`. This doesn't alter behavior at all, but makes things more\
    \ readable.\n\nListing 161. custom-widgets/powerbar_8.py\n\n```python\ndef paintEvent(self,\
    \ e):\n    painter = QtGui.QPainter(self)\n\n    brush = QtGui.QBrush()\n    brush.setColor(self._background_color)\n\
