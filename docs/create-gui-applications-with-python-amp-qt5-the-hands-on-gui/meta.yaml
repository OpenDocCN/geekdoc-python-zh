    The QApplication class


    +   - QApplication holds the Qt event loop

    - One QApplication instance required

    - You application sits waiting in the event loop until an action is taken

    - There is only **one** event loop at any time


    The underscore is there because `exec` was a reserved word in Python 2.7. PySide2
    handles this by appending an underscore to the name used in the C++ library. You''ll
    also see `.print_()` methods on widgets for example.


