    First, we need a variable to hold a reference to the plotted line we want to update,
    which here we’re calling `_plot_ref`. We initialize `self._plot_ref` with `None`
    so we can check its value later to determine if the line has already been drawn
    — if the value is still `None` we have not yet drawn the line.


    > If you were drawing multiple lines you would probably want to use a `list` or
    `dict` data structure to store the multiple references and keep track of which
    is which.


    Finally, we update the `ydata` data as we did before, rotating it to the left
    and appending a new random value. Then we either —


    +   1. if `self._plot_ref` is `None` (i.e. we have not yet drawn the line) draw
    the line and store the reference in `self._plot_ref`, or

    2. update the line in place by calling `self._plot_ref.set_ydata(self.ydata)`


    We obtain a reference to the plotted line when calling `.plot`. However `.plot`
    returns a list (to support cases where a single `.plot` call can draw more than
    one line). In our case we’re only plotting a single line, so we simply want the
    first element in that list – a single `Line2D` object. To get this single value
    into our variable we can assign to a temporary variable `plot_refs` and then assign
    the first element to our `self._plot_ref` variable.


    ```

    plot_refs = self.canvas.axes.plot(self.xdata, self.ydata, ''r'')

    self._plot_ref = plot_refs[0]

    ```


    You could also use tuple-unpacking, picking off the first (and only) element in
    the list with —


    ```

    self._plot_ref, = self.canvas.axes.plot(self.xdata, self.ydata, ''r'')

    ```


    If you run the resulting code, there will be no noticeable difference in performance
    between this and the previous method at this speed. However if you'
