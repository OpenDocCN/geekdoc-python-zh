    \ 255, 255, 255), stop:0.662469 rgba(0, 0, 255, 255), stop:1 rgba(0, 0, 255, 255))\n\
    }\n```\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_275_1.png)\n\nFigure 139. The\
    \ \"Dutch flag\" QSS gradient applied to a QWidget in Qt Designer\n\n## Model\
    \ View Architecture\n\n> > ...with proper design, the features come cheaply.\n\
    > \n> — Dennis Ritchie\n\nAs you start to build more complex applications with\
    \ PySide2 you'll likely come across issues keeping widgets in sync with your data.\n\
    \nData stored in widgets (e.g. a simple `QListWidget`) is not easy to manipulate\
    \ from Python — changes require you to get an item, get the data, and then set\
    \ it back. The default solution to this is to keep an external data representation\
    \ in Python, and then either duplicate updates to the both the data and the widget,\
    \ or simply rewrite the whole widget from the data. As you start to work with\
    \ larger data this approach can start to have performance impacts on your application.\n\
    \nThankfully Qt has a solution for this — ModelViews. ModelViews are a powerful\
    \ alternative to the standard display widgets, which use a standardized model\
    \ interface to interact with data sources — from simple data structures to external\
    \ databases. This isolates your data, meaning you can keep it in any structure\
    \ you like, while the view takes care of presentation and updates.\n\nThis chapter\
    \ introduces the key aspects of Qt's ModelView architecture and uses it to build\
    \ a simple desktop Todo application in PySide2.\n\n## 20. The Model View Architecture\
    \ — Model View Controller\n\n*Model–View–Controller* (MVC) is an architectural\
    \ pattern used for developing user interfaces. It divides an application into\
    \ three interconnected parts, separating the internal representation of data from\
    \ how it is presented to and accepted from the user.\n\nThe MVC pattern splits\
    \ the interface into the following components —\n\n- **Model** holds the data\
    \ structure which the app is working with.\n- **View** is any representation of\
    \ information as shown to the user, whether graphical or tables. Multiple views\
    \ of the same data are allowed.\n- **Controller** accepts input from the user,\
    \ transforms it into commands and applies these to the model or view.\n\nIn Qt\
    \ land the distinction between the View & Controller gets a little murky. Qt accepts\
    \ input events from the user via the OS and delegates these to the widgets (Controller)\
    \ to handle. However, widgets also handle presentation of their own state to the\
    \ user, putting them squarely in the View. Rather than agonize over where to draw\
    \ the line, in Qt-speak the View and Controller are instead merged together creating\
    \ a Model/ViewController architecture — called \"Model View\" for simplicity.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_278_0.png)\n\nModel View Controller\
    \ architecture\n\nQt's Model/Views architecture\n\nFigure 140. Comparing the MVC\
    \ model and the Qt Model/View architecture.\n\nImportantly, the distinction between\
    \ the *data* and *how it is presented* is preserved.\n\n### The Model View\n\n\
    The Model acts as the interface between the data store and the ViewController.\
    \ The Model holds the data (or a reference to it) and presents this data through\
    \ a standardized API which Views then consume and present to the user. Multiple\
    \ Views can share the same data, presenting it in completely different ways.\n\
    \nYou can use any \"data store\" for your model, including for example a standard\
    \ Python list or dictionary, or a database (via Qt itself, or SQLAlchemy) — it's\
    \ entirely up to you.\n\nThe two parts are essentially responsible for —\n\n1.\
    \ The **model** stores the data, or a reference to it and returns individual or\
    \ ranges of records, and associated metadata or *display* instructions.\n2. The\
    \ **view** requests data from the model and displays what is returned on the widget."
