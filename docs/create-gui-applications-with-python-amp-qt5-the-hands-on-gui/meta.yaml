    \        # Qt.RightButton missing!\n    }\n    button = e.button()\n    fn = route.get(button)\
    \ ②\n    if fn: ③\n        return fn(e)\n```\n\n① 定义路由字典，这里我们省略了右键单击状态。\n\n② 使用\
    \ `.get()` 在没有匹配时会返回 `None`。\n\n③ 任何方法都是 *真值*，`None` 是 *假值*。\n\n如果你运行这个程序并右键单击，你的应用程序会正常处理（并且什么都不做）。\n\
    \n> \U0001F4A1 一个替代方案是定义一个空函数，并将其设置为查找的默认返回值。对于路由字典中不存在的任何状态，都会返回并调用这个函数。\n\n\
    现在我们有了一个单一的路由方法，它调用一系列特定的、定义良好的方法，这些方法具有描述性的名称，说明了它们的功能。这是提高事件和模型视图代码 *可维护性* 的最强大方法之一。你可以在模型视图\
    \ `.data` 处理程序以及 Qt 将状态信息传递给方法的任何其他地方使用相同的方法。\n\n## 26. 处理命令行参数\n\n如果你创建了一个处理特定文件类型的应用程序——例如打开视频的视频编辑器，打开文档文件的文档编辑器——让你的应用程序自动打开这些文件会很有用。在所有平台上，当你告诉操作系统使用特定应用程序打开文件时，要打开的\
