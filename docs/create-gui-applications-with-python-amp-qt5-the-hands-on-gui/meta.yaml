    While you do have control over the size of icons using in menus and toolbars,
    in most cases you should leave these as-is. A good standard icon size for menus
    is 20x20 pixels.


    Sizes smaller than this are fine too, the icon will be centered rather than scaled
    up.


    # Create your own


    If you don''t like any of the available icon sets, or want a unique look to your
    application, you can of course design your own icons. Icons can be created using
    any standard graphics software and saved as PNG images with transparent background.
    The icons should be square and of a resolution that they do not need to be scaled
    up or down when used in your application.


    # Using icon files


    Once you have your icon files — whether from icon sets or self-drawn — they can
    be used in your Qt applications by creating instances of `QtGui.QIcon`, passing
    in the filename of the icon directly.


    ```

    QtGui.QIcon("<filename>")

    ```


