- md: "The buttons provided by NavigationToolbar2QT allow for control of the following\
    \ actions —\n\n- Home, Back/Forward, Pan & Zoom which are used to navigate through\
    \ the plots. The Back/Forward buttons can step backwards and forwards through\
    \ navigation steps, for example zooming in and then clicking Back will return\
    \ to the previous zoom. Home returns to the initial state of the plot.\n- Plot\
    \ margin/position configuration which can adjust the plot within the window.\n\
    - Axis/curve style editor, where you can modify plot titles and axes scales, along\
    \ with setting plot line colors and line styles. The color selection uses the\
    \ platform-default color picker, allowing any available colors to be selected.\n\
    - Save, to save the resulting figure as an image (all Matplotlib supported formats).\n\
    \nA few of these configuration settings are shown below.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_591_0.png)\n\
    \nFigure 236. Matplotlib figure options.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_592_0.png)\n\
    \nFigure 237. Matplotlib curve options.\n\nFor more information on navigating\
    \ and configuring Matplotlib plots, take a look at the official [Matplotlib toolbar\
    \ documentation](https://matplotlib.org/stable/users/explain/figure/interactive.html).\n\
    \n## Updating plots\n\nQuite often in applications you'll want to update the data\
    \ shown in plots, whether in response to input from the user or updated data from\
    \ an API. There are two ways to update plots in Matplotlib, either\n\n1. clearing\
    \ and redrawing the canvas (simpler, but slower) or,\n2. by keeping a reference\
    \ to the plotted line and updating the data.\n\nIf performance is important to\
    \ your app it is recommended you do the latter, but the first is simpler. We start\
    \ with the simple clear-and-redraw method first below.\n\n### Clear and redraw\n\
    \nListing 208. plotting/matplotlib_3.py\n\n```python\nimport random\nimport sys\n\
    \nfrom PySide2 import QtCore, QtWidgets  # import PySide2 before matplotlib\n\n\
    import matplotlib\nfrom matplotlib.backends.backend_qt5agg import FigureCanvasQTAgg\n\
    from matplotlib.figure import Figure\n\nmatplotlib.use(\"Qt5Agg\")\n\nclass MplCanvas(FigureCanvasQTAgg):\n\
    \    def __init__(self, parent=None, width=5, height=4, dpi=100):\n        fig\
    \ = Figure(figsize=(width, height), dpi=dpi)\n        self.axes = fig.add_subplot(111)\n\
    \        super().__init__(fig)\n\nclass MainWindow(QtWidgets.QMainWindow):\n \
    \   def __init__(self):\n        super().__init__()\n\n        self.canvas = MplCanvas(self,\
    \ width=5, height=4, dpi=100)\n        self.setCentralWidget(self.canvas)\n\n\
    \        n_data = 50\n        self.xdata = list(range(n_data))\n        self.ydata\
    \ = [random.randint(0, 10) for i in range(n_data)]\n        self.update_plot()\n\
    \n        self.show()\n\n        # Setup a timer to trigger the redraw by calling\
    \ update_plot.\n        self.timer = QtCore.QTimer()\n        self.timer.setInterval(100)\n\
    \        self.timer.timeout.connect(self.update_plot)\n        self.timer.start()\n\
    \n    def update_plot(self):\n        # Drop off the first y element, append a\
    \ new one.\n        self.ydata = self.ydata[1:] + [random.randint(0, 10)]\n  \
    \      self.canvas.axes.cla()  # Clear the canvas.\n        self.canvas.axes.plot(self.xdata,\
    \ self.ydata, \"r\")\n        # Trigger the canvas to update and redraw.\n   \
    \     self.canvas.draw()\n\napp = QtWidgets.QApplication(sys.argv)\nw = MainWindow()\n\
    app.exec_()\n```\n\nIn this example we've moved the plotting to a `update_plot`\
    \ method to keep it self-contained. In this method we take our `ydata` array and\
    \ drop off the first value with `[1:]` then append a new random integer between\
    \ 0 and 10. This has the effect of scrolling the data to the left.\n\nTo redraw\
    \ we simply call `axes.cla()` to clear the axes (the entire canvas) and the `axes.plot(...)`\
    \ to re-plot the data, including the updated values. The resulting canvas is then\
    \ redrawn to the widget by calling `canvas.draw()`.\n\nThe `update_plot` method\
    \ is called every 100 msec using a `QTimer`. The clear-and-refresh method is fast\
    \ enough to keep a plot updated at this rate, but as we'll see shortly, falters\
    \ as the speed increases.\n\n### In-place redraw\n\nThe changes required to update\
    \ the plotted lines in-place are fairly minimal, requiring only an addition variable\
    \ to store and retrieve the reference to the plotted line. The updated `MainWindow`\
    \ code is shown below.\n\nListing 209. plotting/matplotlib_4.py\n\n```python\n\
    class MainWindow(QtWidgets.QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.canvas = MplCanvas(self, width=5, height=4, dpi=100)\n        self.setCentralWidget(self.canvas)\n\
    \n        n_data = 50\n        self.xdata = list(range(n_data))\n        self.ydata\
    \ = [random.randint(0, 10) for i in range(n_data)]\n\n        # We need to store\
    \ a reference to the plotted line\n        # somewhere, so we can apply the new\
    \ data to it.\n        self._plot_ref = None\n        self.update_plot()\n\n \
    \       self.show()\n\n        # Setup a timer to trigger the redraw by calling\
    \ update_plot.\n        self.timer = QtCore.QTimer()\n        self.timer.setInterval(100)\n\
    \        self.timer.timeout.connect(self.update_plot)\n        self.timer.start()\n\
    \n    def update_plot(self):\n        # Drop off the first y element, append a\
    \ new one.\n        self.ydata = self.ydata[1:] + [random.randint(0, 10)]\n\n\
    \        # Note: we no longer need to clear the axis.\n        if self._plot_ref\
    \ is None:\n            # First time we have no plot reference, so do a normal\n\
    \            # plot.\n            # .plot returns a list of line <reference>s,\
    \ as we're\n            # only getting one we can take the first element.\n  \
    \          plot_refs = self.canvas.axes.plot(self.xdata, self.ydata,\n       \
    \                                       \"r\")\n            self._plot_ref = plot_refs[0]\n\
    \        else:\n            # We have a reference, we can use it to update the\
    \ data\n            # for that line.\n            self._plot_ref.set_ydata(self.ydata)\n\
    \n        # Trigger the canvas to update and redraw.\n        self.canvas.draw()\n\
    ```\n\nFirst, we need a variable to hold a reference to the plotted line we want\
    \ to update, which here we’re calling `_plot_ref`. We initialize `self._plot_ref`\
    \ with `None` so we can check its value later to determine if the line has already\
    \ been drawn — if the value is still `None` we have not yet drawn the line.\n\n\
    > If you were drawing multiple lines you would probably want to use a `list` or\
    \ `dict` data structure to store the multiple references and keep track of which\
    \ is which.\n\nFinally, we update the `ydata` data as we did before, rotating\
    \ it to the left and appending a new random value. Then we either —\n\n1. if `self._plot_ref`\
    \ is `None` (i.e. we have not yet drawn the line) draw the line and store the\
    \ reference in `self._plot_ref`, or\n2. update the line in place by calling `self._plot_ref.set_ydata(self.ydata)`\n\
    \nWe obtain a reference to the plotted line when calling `.plot`. However `.plot`\
    \ returns a list (to support cases where a single `.plot` call can draw more than\
    \ one line). In our case we’re only plotting a single line, so we simply want\
    \ the first element in that list – a single `Line2D` object. To get this single\
    \ value into our variable we can assign to a temporary variable `plot_refs` and\
    \ then assign the first element to our `self._plot_ref` variable.\n\n```python\n\
    plot_refs = self.canvas.axes.plot(self.xdata, self.ydata, 'r')\nself._plot_ref\
    \ = plot_refs[0]\n```\n\nYou could also use tuple-unpacking, picking off the first\
    \ (and only) element in the list with —\n\n```python\nself._plot_ref, = self.canvas.axes.plot(self.xdata,\
    \ self.ydata, 'r')\n```\n\nIf you run the resulting code, there will be no noticeable\
    \ difference in performance between this and the previous method at this speed.\
    \ However if you attempt to update the plot faster (e.g. down to every 10 *msec*)\
    \ you'll start to notice that clearing the plot and re-drawing takes longer, and\
    \ the updates do not keep up with the timer. Whether this performance difference\
    \ is enough to matter in your application depends on what you're building, and\
    \ should be weighed against the added complication of keeping and managing the\
    \ references to plotted lines.\n\n## Embedding plots from Pandas\n\nPandas is\
    \ a Python package focused on working with table (data frames) and series data\
    \ structures, which is particularly useful for data analysis workflows. It comes\
    \ with built-in support for plotting with Matplotlib and here we'll take a quick\
    \ look at how to embed these plots into PySide2. With this you will be able to\
    \ start building PySide2 data-analysis applications built around Pandas.\n\nPandas\
    \ plotting functions are directly accessible from the `DataFrame` objects. The\
    \ function signature is quite complex, giving a lot of options to control how\
    \ the plots will be drawn.\n\n```python\nDataFrame.plot(\n    x=None, y=None,\
    \ kind='line', ax=None, subplots=False,\n    sharex=None, sharey=False, layout=None,\
    \ figsize=None,\n    use_index=True, title=None, grid=None, legend=True, style=None,\n\
    \    logx=False, logy=False, loglog=False, xticks=None, yticks=None,\n    xlim=None,\
    \ ylim=None, rot=None, fontsize=None, colormap=None,\n    table=False, yerr=None,\
    \ xerr=None, secondary_y=False,\n    sort_columns=False, **kwargs\n)\n```\n\n\
    The parameter we're most interested in is `ax` which allows us to pass in our\
    \ own `matplotlib.Axes` instance on which Pandas will plot the `DataFrame`.\n\n\
    Listing 210. plotting/matplotlib_5.py\n\n```python\nimport sys\n```"
