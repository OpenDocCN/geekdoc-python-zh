    # Checking compound flags


    We can check simple flags by comparing against the flag itself, as we''ve already
    seen —


    ```

    >>> align = Qt.AlignLeft

    >>> align == Qt.AlignLeft

    True

    ```


    For combined flags we can also check equality with the combination of flags —


    ```

    >>> align = Qt.AlignLeft | Qt.AlignTop

    >>> align == Qt.AlignLeft | Qt.AlignTop

    True

    ```


    But sometimes, you want to know if a given variable *contains* a specific flag.
    For example, perhaps we want to know if `align` has the *align left* flag set,
    regardless of any other alignment state.


    How can we check that an element has `Qt.AlignLeft` applied, once it''s been combined
    with another? In this case a `==` comparison will not work, since they are not
    numerically equal.


    ```

    >> alignment = Qt.AlignLeft | Qt.AlignTop

    >> alignment == Qt.AlignLeft  # 33 == 1

    False

    ```


    We need a way to compare the `Qt.AlignLeft` flag against the bits of our'
