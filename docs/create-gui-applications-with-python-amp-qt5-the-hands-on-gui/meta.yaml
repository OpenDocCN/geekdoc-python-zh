    \        widget.sliderMoved.connect(self.slider_position)\n        widget.sliderPressed.connect(self.slider_pressed)\n\
    \        widget.sliderReleased.connect(self.slider_released)\n\n        self.setCentralWidget(widget)\n\
    \n    def value_changed(self, i):\n        print(i)\n\n    def slider_position(self,\
    \ p):\n        print(\"position\", p)\n\n    def slider_pressed(self):\n     \
    \   print(\"Pressed!\")\n\n    def slider_released(self):\n        print(\"Released\"\
    )\n\napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\n\
    app.exec_()\n```\n\n\U0001F680 **Run it!** You'll see a dial, rotate it to select\
    \ a number from the range.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_67_0.png)\n\
    \n*Figure 18. QDial on Windows, macOS and Ubuntu*\n\nThe signals are the same\
    \ as for `QSlider` and retain the same names (e.g. `.sliderMoved`).\n\nThis concludes\
    \ our brief tour through the Qt widgets available in PySide2. To see the full\
    \ list of available widgets, including all their signals and attributes, take\
    \ a look at the [Qt documentation](https://doc.qt.io/qtforpython/).\n\n## QWidget\n\
    \nThere is a QWidget in our demo, but you can’t see it. We previously used QWidget\
    \ in our first example to create an empty window. But QWidget can also be used\
    \ as a *container* for other widgets, together with [Layouts](Layouts), to construct\
    \ windows or compound widgets. We’ll cover [Creating Custom Widgets](Creating\
    \ Custom Widgets) in more detail later.\n\nKeep QWidget in mind, as you’ll be\
    \ seeing a lot of it!\n\n## 8. Layouts\n\nSo far we've successfully created a\
    \ window and we've added a widget to it. However, you will usually want to add\
    \ more than one widget to a window, and have some control over where the widgets\
    \ you add end up. To arrange widgets together in Qt we use *layouts*. There are\
    \ 4 basic layouts available in Qt, which are listed in the following table.\n\n\
    | Layout | Behavior |\n| :--- | :--- |\n| `QHBoxLayout` | Linear horizontal layout\
    \ |\n| `QVBoxLayout` | Linear vertical layout |\n| `QGridLayout` | In indexable\
    \ grid XxY |\n| `QStackedLayout` | Stacked (z) in front of one another |\n\nThere\
    \ are three 2-dimensional layouts available in Qt. The `QVBoxLayout`, `QHBoxLayout`\
    \ and `QGridLayout`. In addition there is also `QStackedLayout` which allows you\
    \ to place widgets one on top of the other within the same space, yet showing\
    \ only one widget at a time.\n\nIn this chapter we'll go through each of these\
    \ layouts in turn, showing how we can use them to position widgets in our applications.\n\
    \n> **Qt Designer**\n\nYou can actually design and lay out your interface graphically\
    \ using the Qt Designer, which we will cover later. Here we're using code, as\
    \ it's simpler to understand and experiment with the underlying system.\n\n##\
    \ Placeholder widget\n\n> Load up a fresh copy of `myapp.py` and save it under\
    \ a new name for this section.\n\nTo make it easier to visualize the layouts,\
    \ we'll first create a simple custom widget that displays a solid color of our\
    \ choosing. This will help to distinguish widgets that we add to the layout. Add\
    \ the following code to your file as a new class at the top level—\n\nListing\
    \ 23. basic/layout_colorwidget.py\n\n```python\nfrom PySide2.QtGui import QColor,\
    \ QPalette\nfrom PySide2.QtWidgets import QWidget\n\nclass Color(QWidget):\n \
    \   def __init__(self, color):\n        super().__init__()\n        self.setAutoFillBackground(True)\n\
    \n        palette = self.palette()\n        palette.setColor(QPalette.Window,\
    \ QColor(color))\n        self.setPalette(palette)\n```\n\nIn this code we subclass\
    \ `QWidget` to create our own custom widget `Color`. We accept a single parameter\
    \ when creating the widget — `color` (a `str`). We first set `.setAutoFillBackground`\
    \ to `True` to tell the widget to automatically fill its background with the window\
    \ color. Next we change the widget's `QPalette.Window` color to a new `QColor`\
    \ described by the value `color` we passed in. Finally we apply this palette back\
    \ to the widget. The end result is a widget that is filled with a solid color,\
    \ that we specify when we create it.\n\nIf you find the above confusing, don't\
    \ worry too much! We cover [Creating Custom Widgets](https://www.pythonguis.com/tutorials/creating-custom-widgets/)\
    \ and [Palettes](https://www.pythonguis.com/tutorials/palettes/) in detail later.\
    \ For now it's sufficient that you understand that you can create a solid-filled\
    \ red widget with the following code—\n\n```python\nColor('red')\n```\n\nFirst\
    \ let's test our new `Color` widget by using it to fill the entire window in a\
    \ single color. Once it's complete we can add it to the main window using `.setCentralWidget`\
    \ and we get a solid red window.\n\nListing 24. basic/layout_1.py\n\n```python\n\
    import sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets import QApplication,\
    \ QMainWindow\n\nfrom layout_colorwidget import Color\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        widget = Color(\"red\")\n        self.setCentralWidget(widget)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n> \U0001F680 **Run it!** The window will appear, filled completely with\
    \ the color red. Notice how the widget expands to fill all the available space.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_72_0.png)\n\nFigure 19. Our `Color`\
    \ widget, filled with solid red color.\n\nNext we'll look at each of the available\
    \ Qt layouts in turn. Note that to add our layouts to the window we will need\
    \ a dummy `QWidget` to hold the layout.\n\n## QVBoxLayout vertically arranged\
    \ widgets\n\nWith `QVBoxLayout` you arrange widgets one above the other linearly.\
    \ Adding a widget adds it to the bottom of the column.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_73_0.png)\n\
    \nFigure 20. A QVBoxLayout, filled from top to bottom.\n\nLets add our widget\
    \ to a layout. Note that in order to add a layout to the `QMainWindow` we need\
    \ to apply it to a dummy `QWidget`. This allows us to then use `.setCentralWidget`\
    \ to apply the widget (and the layout) to the window. Our colored widgets will\
    \ arrange themselves in the layout, contained within the `QWidget` in the window.\
    \ First we just add the red widget as before.\n\nListing 25. basic/layout_2a.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import QApplication, QMainWindow, QVBoxLayout, QWidget\n\nfrom layout_colorwidget\
    \ import Color\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n  \
    \      super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n     \
    \   layout = QVBoxLayout()\n\n        layout.addWidget(Color(\"red\"))\n\n   \
    \     widget = QWidget()\n        widget.setLayout(layout)\n        self.setCentralWidget(widget)\n\
    \napp = QApplication(sys.argv)\n\nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n\
    ```\n\n> \U0001F680 **Run it!** Notice the border now visible around the red widget.\
