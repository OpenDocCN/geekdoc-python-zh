  - '[PAGE 304]


    The `data` method is called with two values `index` and `role`. The `index` parameter
    gives the location in the table for which information is currently being requested,
    and has two methods `.row()` and `.column()` which give the row and column number
    *in the view* respectively. In our example the data is stored as a nested list,
    and the row and column indices are used to index as follows `data[row][column]`.


    The view has no knowledge of the structure of the source data, and is the responsibility
    of the model to translate between the view''s *row* and *column* and the relevant
    positions in your own data store.


    The `role` parameter describes what *kind* of information the method should return
    on this call. To get the data to display the view calls this model method with
    the `role` of `Qt.DisplayRole`. However, `role` can have many other values including
    `Qt.BackgroundRole`, `Qt.CheckStateRole`, `Qt.DecorationRole`, `Qt.FontRole`,
    `Qt.TextAlignmentRole` and `Qt.ForegroundRole`, which each expect particular values
    in response (see later).


    > 💡 `Qt.DisplayRole` actually expects a string to be returned, although other
    basic Python types including `float`, `int` and `bool` will also be displayed
    using their default string representations. However, formatting these types to
    your strings is usually preferable.


    We''ll cover how to use these other role types later, for now it is only necessary
    to know that you **must** check that the role type is `Qt.DisplayRole` before
    returning your data for display.


    The two custom methods `columnCount` and `rowCount` return the number of columns
    and rows in our data structure. In the case of a nested list of lists in the arrangement
    we''re using here, the number of rows is simply the number of elements in the
    outer list, and the number of columns is the number of elements in **one of**
    the inner lists — assuming they are all equal.'
  - '[PAGE 305]


    > If these methods return values that are too high you will see out of bounds
    errors, if they return values that are too low, you''ll see the table cut off.


    # Formatting numbers and dates


    The data returned by the model for display is expected to be a string. While `int`
    and `float` values will also be displayed, using their default string representation,
    complex Python types will not. To display these, or to override the default formatting
    of `float`, `int` or `bool` values, you must format these to strings yourself.


    You might be tempted to do this by converting your data to a table of strings
    in advance. However, by doing this you make it very difficult to continue working
    with the data in your table, whether for calculations or for updates.


    Instead, you should use the model''s `data` method to perform the string conversion
    on demand. By doing this you can continue to work with the original data, yet
    have complete control over how it is presented to the user — including changing
    this on the fly through configuration.


    Below is a simple custom formatter which looks up the values in our data table,
    and displays them in a number of different ways depending on the Python `type`
    of the data.'
