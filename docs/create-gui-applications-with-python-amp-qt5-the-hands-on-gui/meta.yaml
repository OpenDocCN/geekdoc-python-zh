  md: "location.\n\nListing 248. app/minesweeper.py\n\n```\ndef get_surrounding(self,\
    \ x, y):\n    positions = []\n\n    for xi in range(max(0, x - 1), min(x + 2,\
    \ self.b_size)):\n        for yi in range(max(0, y - 1), min(y + 2, self.b_size)):\n\
    \            if not (xi == x and yi == y):\n                positions.append(self.grid.itemAtPosition(yi,\
    \ xi\n).widget())\n\n    return positions\n```\n\nThe `expand_reveal` method is\
    \ triggered in response to a click on a tile with zero adjacent mines. In this\
    \ case we want to expand the area around the click to any spaces which also have\
    \ zero adjacent mines, and also reveal any squares around the border of that expanded\
    \ area (which aren't mines).\n\nThis *can* be achieved by looking at all squares\
    \ around the clicked square, and triggering a `.click()` on any that do not have\
    \ `.n_adjacent == 0`. The normal game logic takes over and expands the area automatically.\
    \ However, this is a bit inefficient, resulting in a large number of redundant\
    \ signals (each square triggers up to 9 signals for each surrounding square).\n\
    \nInstead we use a self-contained method to determine the area to be revealed,\
    \ and then trigger the reveal (using `.reveal()` to avoid the `.clicked` signals.\n\
    \nWe start with a list `to_expand` containing the positions to check on the next\
    \ iteration, a list `to_reveal` containing the tile widgets to reveal, and a flag\
    \ `any_added` to determine when to exit the loop. The loop stops the first time\
    \ no new widgets are added to `to_reveal`.\n\nInside the loop we reset `any_added`\
    \ to `False`, and empty the `to_expand` list, keeping a temporary store in `l`\
    \ for iterating over."
