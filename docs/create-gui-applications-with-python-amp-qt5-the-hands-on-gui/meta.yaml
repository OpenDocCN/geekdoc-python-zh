- md: "## Pausing a runner\n\nPausing a runner is a rarer requirement — normally you\
    \ want things to go *as fast as possible*. But sometimes you may want to put a\
    \ worker to \"sleep\" so it temporarily stops reading from a data source. You\
    \ can do this with a small modification to the approach used to stop the runner.\
    \ The code to do this is shown below.\n\n*Listing 179. concurrent/qrunner_pause.py*\n\
    \n```python\nimport sys\nimport time\n\nfrom PySide2.QtCore import (QObject, QRunnable,\
    \ Qt, QThreadPool,\n                            Signal, Slot)\nfrom PySide2.QtWidgets\
    \ import (QApplication, QHBoxLayout, QMainWindow,\n    QProgressBar, QPushButton,\
    \ QWidget)\n\nclass WorkerKilledException(Exception):\n    pass\n\nclass WorkerSignals(QObject):\n\
    \    progress = Signal(int)\n\nclass JobRunner(QRunnable):\n\n    signals = WorkerSignals()\n\
    \n    def __init__(self):\n        super().__init__()\n\n        self.is_paused\
    \ = False\n        self.is_killed = False\n\n    @Slot()\n    def run(self):\n\
    \        for n in range(100):\n            self.signals.progress.emit(n + 1)\n\
    \            time.sleep(0.1)\n\n            while self.is_paused:\n          \
    \      time.sleep(0) ①\n\n            if self.is_killed:\n                raise\
    \ WorkerKilledException\n\n    def pause(self):\n        self.is_paused = True\n\
    \n    def resume(self):\n        self.is_paused = False\n\n    def kill(self):\n\
    \        self.is_killed = True\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n\n        # Some buttons\n        w = QWidget()\n\
    \        l = QHBoxLayout()\n        w.setLayout(l)\n\n        btn_stop = QPushButton(\"\
    Stop\")\n        btn_pause = QPushButton(\"Pause\")\n        btn_resume = QPushButton(\"\
    Resume\")\n\n        l.addWidget(btn_stop)\n        l.addWidget(btn_pause)\n \
    \       l.addWidget(btn_resume)\n\n        self.setCentralWidget(w)\n\n      \
    \  # Create a statusbar.\n        self.status = self.statusBar()\n        self.progress\
    \ = QProgressBar()\n        self.status.addPermanentWidget(self.progress)\n\n\
    \        # Thread runner\n        self.threadpool = QThreadPool()\n\n        #\
    \ Create a runner\n        self.runner = JobRunner()\n        self.runner.signals.progress.connect(self.update_progress)\n\
    \        self.threadpool.start(self.runner)\n\n        btn_stop.pressed.connect(self.runner.kill)\n\
    \        btn_pause.pressed.connect(self.runner.pause)\n        btn_resume.pressed.connect(self.runner.resume)\n\
    \n        self.show()\n\n    def update_progress(self, n):\n        self.progress.setValue(n)\n\
    \napp = QApplication(sys.argv)\nw = MainWindow()\napp.exec_()\n```\n\n① You can\
    \ put a higher value that 0 in the `sleep` call if you don't want to check if\
    \ it's time to wake up very often.\n\nIf you run this example you'll see a progress\
    \ bar moving from left to right. If you click **[ Pause ]** the worker will pause.\
    \ If you then click **[ Resume ]** the worker will continue from where it started.\
    \ If you click **[ Stop ]** the worker will stop, permanently, as before.\n\n\
    Rather than throw an exception when receiving the `is_paused` signal, we enter\
    \ a pause loop. This stops execution of the worker, but does not exit the `run`\
    \ method or terminate the worker.\n\nBy using `while self.is_paused:` for this\
    \ loop, we will exit the loop as soon as the worker is unpaused, and resume what\
    \ we were doing before.\n\n> You *must* include the `time.sleep()` call. This\
    \ zero-second pause allows for Python to release the GIL, so this loop will not\
    \ block other execution. Without that sleep you have a *busy loop* which will\
    \ waste resources while doing nothing. Increase the sleep value if you want to\
    \ check less often.\n\n## The Communicator\n\nWhen running a thread you frequently\
    \ want to be able get output from what is happening, while it’s happening.\n\n\
    In this example we'll create a runner which performs requests to remote servers\
    \ in a separate thread, and dumps the output to a logger. We'll also look at how\
    \ we can pass a custom *parser* into the runner to extra data we're interested\
    \ in from the requests.\n\n> If you want to log data from external processes,\
    \ rather than threads, take a look at [Running External processes](Running External\
    \ processes) and [Running external commands & processes](Running external commands\
    \ & processes).\n\n### Dumping data\n\nIn this first example we'll just dump the\
    \ raw data (HTML) from each request to the output, using a custom signal.\n\n\
    *Listing 180. concurrent/qrunner_io.py*\n\n```python\nimport sys\n\nimport requests\n\
    from PySide2.QtCore import QObject, QRunnable, QThreadPool, QTimer, Signal, Slot\n\
    from PySide2.QtWidgets import (\n    QApplication,\n    QLabel,\n    QMainWindow,\n\
    \    QPlainTextEdit,\n    QPushButton,\n    QVBoxLayout,\n    QWidget,\n)\n\n\
    class WorkerSignals(QObject):\n    \"\"\"\n    Defines the signals available from\
    \ a running worker thread.\n\n    data\n        tuple of (identifier, data)\n\
    \    \"\"\"\n\n    data = Signal(tuple)\n\nclass Worker(QRunnable):\n    \"\"\"\
    \n    Worker thread\n\n    Inherits from QRunnable to handle worker thread setup,\
    \ signals\n    and wrap-up.\n\n    :param id: The id for this worker\n    :param\
    \ url: The url to retrieve\n    \"\"\"\n\n    def __init__(self, id, url):\n \
    \       super().__init__()\n        self.id = id\n        self.url = url\n\n \
    \       self.signals = WorkerSignals()\n\n    @Slot()\n    def run(self):\n  \
    \      r = requests.get(self.url)\n\n        for line in r.text.splitlines():\n\
    \            self.signals.data.emit((self.id, line))\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.urls = [\n\
    \            \"https://www.pythonguis.com/\",\n            \"https://www.mfitzp.com/\"\
    ,\n            \"https://www.google.com\",\n            \"https://www.udemy.com/create-simple-gui-applications-with-python-and-qt/\"\
    ,\n        ]\n\n        layout = QVBoxLayout()\n\n        self.text = QPlainTextEdit()\n\
    \        self.text.setReadOnly(True)\n\n        button = QPushButton(\"GO GET\
    \ EM!\")\n        button.pressed.connect(self.execute)\n\n        layout.addWidget(self.text)\n\
    \        layout.addWidget(button)\n\n        w = QWidget()\n        w.setLayout(layout)\n\
    \n        self.setCentralWidget(w)\n\n        self.show()\n\n        self.threadpool\
    \ = QThreadPool()\n        print(\n            \"Multithreading with maximum %d\
    \ threads\" % self.threadpool.maxThreadCount()\n        )\n\n    def execute(self):\n\
    \        for n, url in enumerate(self.urls):\n            worker = Worker(n, url)\n\
    \            worker.signals.data.connect(self.display_output)\n\n            #\
    \ Execute\n            self.threadpool.start(worker)\n\n    def display_output(self,\
    \ data):\n        id, s = data\n        self.text.appendPlainText(\"WORKER %d:\
    \ %s\" % (id, s))\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\n```"
