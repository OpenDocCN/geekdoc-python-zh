    \n图 24. 三个 Color 部件在 QHBoxLayout 中水平排列。\n\n## 嵌套布局\n\n对于更复杂的布局，你可以使用布局上的 `.addLayout`\
    \ 将布局相互嵌套。下面我们向主 `QHBoxLayout` 中添加一个 `QVBoxLayout`。如果我们向 `QVBoxLayout` 添加一些部件，它们将垂直排列在父布局的第一个槽位中。\n\
    \n清单 28. basic/layout_4.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore import\
    \ Qt\nfrom PySide2.QtWidgets import (\n    QApplication,\n    QHBoxLayout,\n \
