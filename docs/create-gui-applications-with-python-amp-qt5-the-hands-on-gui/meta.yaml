- md: "Good error messages should explain.\n\n- What happened\n- What was affected\n\
    - What are the consequences of it\n- What can be done about it\n\n## 11. Windows\n\
    \nIn the previous chapter we looked at how to open *dialog* windows. These are\
    \ special windows which (by default) grab the focus of the user, and run their\
    \ own event loop, effectively blocking the execution of the rest of your app.\n\
    \nHowever, quite often you will want to open a second window in an application,\
    \ without blocking the main window – for example, to show the output of some long-running\
    \ process, or to display graphs or other visualizations. Alternatively, you may\
    \ want to create an application that allows you to work on multiple documents\
    \ at once, all in their own windows.\n\nIt’s relatively straightforward to open\
    \ new windows in PySide2, but there are a few things to keep in mind to make sure\
    \ they work well. In this tutorial we’ll step through how to create a new window\
    \ and how to show and hide external windows on demand.\n\n### Creating a new window\n\
    \nTo create a new window in PySide2 you just need to create a new instance of\
    \ a widget object without a parent. This can be any widget (technically any subclass\
    \ of `QWidget`) including another `QMainWindow` if you prefer.\n\n> There is no\
    \ restriction on the number of `QMainWindow` instances you can have, and if you\
    \ need toolbars or menus on your second window you will need to use `QMainWindow`\
    \ for that too.\n\nAs with your main window, *creating* a window is not sufficient,\
    \ you must also show it.\n\nListing 55. basic/windows_1.py\n\n```python\nimport\
    \ sys\n\nfrom PySide2.QtWidgets import (QApplication, QLabel, QMainWindow,\n \
    \   QPushButton,\n    QVBoxLayout, QWidget)\n\nclass AnotherWindow(QWidget):\n\
    \    \"\"\"\n    This \"window\" is a QWidget. If it has no parent, it\n    will\
    \ appear as a free-floating window.\n    \"\"\"\n\n    def __init__(self):\n \
    \       super().__init__()\n        layout = QVBoxLayout()\n        self.label\
    \ = QLabel(\"Another Window\")\n        layout.addWidget(self.label)\n       \
    \ self.setLayout(layout)\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n        self.button = QPushButton(\"Push for Window\"\
    )\n        self.button.clicked.connect(self.show_new_window)\n        self.setCentralWidget(self.button)\n\
    \n    def show_new_window(self, checked):\n        w = AnotherWindow()\n     \
    \   w.show()\n\napp = QApplication(sys.argv)\nw = MainWindow()\nw.show()\napp.exec_()\n\
    ```\n\nIf you run this, you'll see the main window. Clicking the button *may*\
    \ show the second window, but if you see it it will only be visible for a fraction\
    \ of a second. What's happening?\n\n```python\ndef show_new_window(self, checked):\n\
    \    w = AnotherWindow()\n    w.show()\n```\n\nWe are creating our second window\
    \ inside this method, storing it in the variable `w` and showing it. However,\
    \ once we leave this method the `w` variable will be cleaned up by Python, and\
    \ the window destroyed. To fix this we need to keep a reference to the window\
    \ *somewhere*—on the main window `self` object, for example.\n\nListing 56. basic/windows_1b.py\n\
    \n```python\ndef show_new_window(self, checked):\n    self.w = AnotherWindow()\n\
    \    self.w.show()\n```\n\nNow, when you click the button to show the new window,\
    \ it will persist.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_142_0.png)\n\n\
    Figure 63. The second window persisting.\n\nHowever, what happens if you click\
    \ the button again? The window will be re-created! This new window will replace\
    \ the old in the `self.w` variable, and the previous window will be destroyed.\
    \ You can see this more clearly if you change the `AnotherWindow` definition to\
    \ show a random number in the label each time it is created.\n\nListing 57. basic/windows_2.py\n\
    \n```python\nfrom random import randint\n\nfrom PySide2.QtWidgets import (\n \
    \   QApplication,\n    QLabel,\n    QMainWindow,\n    QPushButton,\n    QVBoxLayout,\n\
    \    QWidget,\n)\n\nclass AnotherWindow(QWidget):\n    \"\"\"\n    This \"window\"\
    \ is a QWidget. If it has no parent, it\n    will appear as a free-floating window.\n\
    \    \"\"\"\n\n    def __init__(self):\n        super().__init__()\n        layout\
    \ = QVBoxLayout()\n        self.label = QLabel(\"Another Window % d\" % randint(0,\
    \ 100))\n        layout.addWidget(self.label)\n        self.setLayout(layout)\n\
    ```\n\nThe `__init__` block is only run when *creating* the window. If you keep\
    \ clicking the button the number will change, showing that the window is being\
    \ re-created.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_143_0.png)\n\nFigure\
    \ 64. The number will change if the button is pressed again.\n\nOne solution is\
    \ to simply check whether the window has already being created before creating\
    \ it. The full example below shows this in action.\n\nListing 58. basic/windows_3.py\n\
    \n```python\nclass MainWindow(QMainWindow):\n    def __init__(self):\n       \
    \ super().__init__()\n        self.w = None  # No external window yet.\n     \
    \   self.button = QPushButton(\"Push for Window\")\n        self.button.clicked.connect(self.show_new_window)\n\
    \        self.setCentralWidget(self.button)\n\n    def show_new_window(self, checked):\n\
    \        if self.w is None:\n            self.w = AnotherWindow()\n          \
    \  self.w.show()\n```\n\nThis approach is fine for windows that you create temporarily,\
    \ or need to change dependent on the current state of the program – for example\
    \ if you want to show a particular plot, or log output. However, for many applications\
    \ you have a number of standard windows that you want to be able to show/hide\
    \ on demand.\n\nIn the next part we'll look at how to work with these types of\
    \ windows.\n\n### Closing a window\n\nAs we previously saw, if no reference to\
    \ a window is kept, it will be discarded (and closed). We can use this behavior\
    \ to close a window, replacing the show_new_window method from the previous example\
    \ with –\n\nListing 59. basic/windows_4.py\n\n```python\ndef show_new_window(self,\
    \ checked):\n    if self.w is None:\n        self.w = AnotherWindow()\n      \
    \  self.w.show()\n\n    else:\n        self.w = None  # Discard reference, close\
    \ window.\n```\n\nBy setting `self.w` to `None` (or any other value) the reference\
    \ to the window will be lost, and the window will close. However, if we set it\
    \ to any other value than `None` the first test will not pass, and we will not\
    \ be able to recreate a window.\n\nThis will only work if you have not kept a\
    \ reference to this window somewhere else. To make sure the window closes regardless,\
    \ you may want to explicitly call `.close()` on it.\n\nListing 60. basic/windows_4b.py\n\
    \n```python\ndef show_new_window(self, checked):\n    if self.w is None:\n   \
    \     self.w = AnotherWindow()\n        self.w.show()\n\n    else:\n        self.w.close()\n\
    \        self.w = None  # Discard reference, close window.\n```\n\n### Persistent\
    \ windows\n\nSo far we've looked at how to create new windows on demand. However,\
    \ sometimes you have a number of standard application windows. In this case it\
    \ can often make more sense to create the additional windows first, then use `.show()`\
    \ to display them when needed.\n\nIn the following example we create our external\
    \ window in the `__init__` block for the main window, and then our `show_new_window`\
    \ method simply calls `self.w.show()` to display it.\n\nListing 61. basic/windows_5.py\n\
    \n```python\nimport sys\nfrom random import randint\n\nfrom PySide2.QtWidgets\
    \ import (\n    QApplication,\n    QLabel,\n    QMainWindow,\n    QPushButton,\n\
    \    QVBoxLayout,\n    QWidget,\n)\n\n\nclass AnotherWindow(QWidget):\n    \"\"\
    \"\n    This \"window\" is a QWidget. If it has no parent, it\n    will appear\
    \ as a free-floating window.\n    \"\"\"\n\n    def __init__(self):\n        super().__init__()\n\
    \        layout = QVBoxLayout()\n        self.label = QLabel(\"Another Window\
    \ % d\" % randint(0, 100))\n        layout.addWidget(self.label)\n        self.setLayout(layout)\n\
    \n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \        self.w = AnotherWindow()\n        self.button = QPushButton(\"Push for\
    \ Window\")\n        self.button.clicked.connect(self.show_new_window)\n     \
    \   self.setCentralWidget(self.button)\n\n    def show_new_window(self, checked):\n\
    \        self.w.show()\n```"
  mdcn: "良好的错误信息应当解释清楚。\n\n-   发生了什么\n-   受影响的是什么\n-   会导致什么后果\n-   可以采取什么措施\n\n##\
    \ 11. 窗口\n\n在上一章中，我们探讨了如何打开*对话*窗口。这些是特殊的窗口，它们（默认情况下）会获取用户焦点，并运行自己的事件循环，从而有效阻塞应用程序其余部分的执行。\n\
    \n然而，很多时候你会希望在应用程序中打开第二个窗口，而不阻塞主窗口——例如，显示某个长时间运行过程的输出，或者展示图表或其他可视化内容。或者，你可能想创建一个允许同时处理多个文档的应用程序，每个文档都在自己的窗口中。\n\
    \n在 PySide2 中打开新窗口相对简单，但有几点需要注意以确保它们能正常工作。在本教程中，我们将逐步讲解如何创建新窗口，以及如何根据需要显示和隐藏外部窗口。\n\
    \n### 创建新窗口\n\n要在 PySide2 中创建新窗口，你只需创建一个没有父对象的控件对象实例即可。这可以是任何控件（技术上是 `QWidget`\
    \ 的任何子类），如果你愿意，也可以是另一个 `QMainWindow`。\n\n> 对 `QMainWindow` 实例的数量没有限制，如果你需要在第二个窗口上使用工具栏或菜单，你也需要使用\
    \ `QMainWindow`。\n\n与主窗口一样，仅仅*创建*窗口是不够的，你还必须显示它。\n\n清单 55. basic/windows_1.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtWidgets import (QApplication, QLabel,\
    \ QMainWindow,\n    QPushButton,\n    QVBoxLayout, QWidget)\n\nclass AnotherWindow(QWidget):\n\
    \    \"\"\"\n    This \"window\" is a QWidget. If it has no parent, it\n    will\
    \ appear as a free-floating window.\n    \"\"\"\n\n    def __init__(self):\n \
    \       super().__init__()\n        layout = QVBoxLayout()\n        self.label\
    \ = QLabel(\"Another Window\")\n        layout.addWidget(self.label)\n       \
    \ self.setLayout(layout)\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n        self.button = QPushButton(\"Push for Window\"\
    )\n        self.button.clicked.connect(self.show_new_window)\n        self.setCentralWidget(self.button)\n\
    \n    def show_new_window(self, checked):\n        w = AnotherWindow()\n     \
    \   w.show()\n\napp = QApplication(sys.argv)\nw = MainWindow()\nw.show()\napp.exec_()\n\
    ```\n\n如果你运行这个程序，你会看到主窗口。点击按钮*可能*会显示第二个窗口，但即使你看到了，它也只会显示一瞬间。发生了什么？\n\n```python\n\
    def show_new_window(self, checked):\n    w = AnotherWindow()\n    w.show()\n```\n\
    \n我们在这个方法内部创建了第二个窗口，将其存储在变量 `w` 中并显示它。然而，一旦我们离开这个方法，变量 `w` 将会被 Python 清理，窗口也会被销毁。为了解决这个问题，我们需要在*某处*保持对窗口的引用——例如，在主窗口的\
    \ `self` 对象上。\n\n清单 56. basic/windows_1b.py\n\n```python\ndef show_new_window(self,\
