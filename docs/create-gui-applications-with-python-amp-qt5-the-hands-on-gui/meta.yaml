    window = MainWindow()\nwindow.show()\napp.exec_()\n```\n\n① 创建我们将要绘制的QPixmap对象。\n\
    \n② 用白色填充整个画布（这样我们就能看到我们的线条）。\n\n> 为什么我们使用QLabel来绘图？QLabel控件也可以用来显示图像，它是显示QPixmap的最简单控件。\n\
    \n我们需要首先用白色填充画布，因为根据平台和当前的深色模式，背景可能是从浅灰色到黑色的任何颜色。我们可以从绘制一些非常简单的东西开始。"
