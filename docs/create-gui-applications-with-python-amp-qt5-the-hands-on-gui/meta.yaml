- md: "## 30. Creating Custom Widgets\n\nIn the previous chapter we introduced `QPainter`\
    \ and looked at some basic bitmap drawing operations which you can use to draw\
    \ dots, lines, rectangles and circles on a `QPainter` *surface* such as a `QPixmap`.\
    \ This process of *drawing on a surface* with `QPainter` is in fact the basis\
    \ by which all widgets in Qt are drawn. Now you know how to use `QPainter` you\
    \ know how to draw your own custom widgets! In this chapter we'll take what we've\
    \ learnt so far and use it to construct a completely new *custom* widget. For\
    \ a working example we'll be building the following widget -- a customizable PowerBar\
    \ meter with a dial control.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_433_0.png)\n\
    \n*Figure 195. PowerBar meter.*\n\nThis widget is actually a mix of a *compound\
    \ widget* and *custom widget* in that we are using the built-in Qt `QDial` component\
    \ for the dial, while drawing the power bar ourselves. We then assemble these\
    \ two parts together into a parent widget which can be dropped into place seamlessly\
    \ in any application, without needing to know how it's put together. The resulting\
    \ widget provides the common `QAbstractSlider` interface with some additions for\
    \ configuring the bar display.\n\nAfter following this example you will be able\
    \ to build your very own custom widgets — whether they are compounds of built-ins\
    \ or completely novel self-drawn wonders.\n\n### Getting started\n\nAs we've previously\
    \ seen compound widgets are simply widgets with a layout applied, which itself\
    \ contains >1 other widget. The resulting \"widget\" can then be used as any other,\
    \ with the internals hidden/exposed as you like.\n\nThe outline for our **PowerBar**\
    \ widget is given below — we'll build our custom widget up gradually from this\
    \ outline stub.\n\nListing 145. custom-widgets/stub.py\n\n```python\nimport sys\n\
    \nfrom PySide2 import QtCore, QtGui, QtWidgets\nfrom PySide2.QtCore import Qt\n\
    \n\nclass _Bar(QtWidgets.QWidget):\n    pass\n\n\nclass PowerBar(QtWidgets.QWidget):\n\
    \    \"\"\"\n    Custom Qt Widget to show a power bar and dial.\n    Demonstrating\
    \ compound and custom-drawn widget.\n    \"\"\"\n\n    def __init__(self, parent=None,\
    \ steps=5):\n        super().__init__(parent)\n\n        layout = QtWidgets.QVBoxLayout()\n\
    \        self._bar = _Bar()\n        layout.addWidget(self._bar)\n\n        self._dial\
    \ = QtWidgets.QDial()\n        layout.addWidget(self._dial)\n\n        self.setLayout(layout)\n\
    \n\napp = QtWidgets.QApplication(sys.argv)\nvolume = PowerBar()\nvolume.show()\n\
    app.exec_()\n```\n\nThis simply defines our custom power bar is defined in the\
    \ `_Bar` object—here just unaltered subclass of `QWidget`. The `PowerBar` widget\
    \ (which is the complete widget) combines this, using a `QVBoxLayout` with the\
    \ built in `QDial` to display them together.\n\n> We don't need to create a `QMainWindow`\
    \ since any widget without a parent is a window in its own right. Our custom `PowerBar`\
    \ widget will appear as any normal window.\n\nYou can run this file at any time\
    \ to see your widget in action. Run it now and you should see something like this:\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_436_0.png)\n\n*Figure 196. PowerBar\
    \ dial.*\n\nIf you stretch the window down you'll see the dial has more space\
    \ above it than below -- this is being taken up by our (currently invisible) `_Bar`\
    \ widget.\n\n### paintEvent\n\nThe `paintEvent` handler is the core of all widget\
    \ drawing in PySide2. Every complete and partial re-draw of a widget is triggered\
    \ through a `paintEvent` which the widget handles to draw itself. A `paintEvent`\
    \ can be triggered by —\n\n- `repaint()` or `update()` was called\n- the widget\
    \ was obscured and has now been uncovered\n- the widget has been resized\n\n—\
    \ but it can also occur for many other reasons. What is important is that when\
    \ a `paintEvent` is triggered your widget is able to redraw it.\n\nIf a widget\
    \ is simple enough (like ours is) you can often get away with simply redrawing\
    \ the entire thing any time *anything* happens. But for more complicated widgets\
    \ this can get very inefficient. For these cases the `paintEvent` includes the\
    \ specific region that needs to be updated. We'll make use of this in later, more\
    \ complicated examples.\n\nFor now we'll do something very simple, and just fill\
    \ the entire widget with a single color. This will allow us to see the area we're\
    \ working with to start drawing the bar. Add the following code to the `_Bar`\
    \ class.\n\n*Listing 146. custom-widgets/powerbar_1.py*\n\n```python\ndef paintEvent(self,\
    \ e):\n    painter = QtGui.QPainter(self)\n    brush = QtGui.QBrush()\n    brush.setColor(QtGui.QColor(\"\
    black\"))\n    brush.setStyle(Qt.SolidPattern)\n    rect = QtCore.QRect(0, 0,\
    \ painter.device().width(), painter.device().height())\n    painter.fillRect(rect,\
    \ brush)\n```\n\n### Positioning\n\nNow we can see the `_Bar` widget we can tweak\
    \ its positioning and size. If you drag around the shape of the window you'll\
    \ see the two widgets changing shape to fit the space available. This is what\
    \ we want, but the `QDial` is also expanding vertically more than it should, and\
    \ leaving empty space we could use for the bar.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_438_0.png)\n\
    \n*Figure 197. PowerBar stretched leaves empty space.*\n\nWe can use `setSizePolicy`\
    \ on our `_Bar` widget to make sure it expands as far as possible. By using the\
    \ `QSizePolicy.MinimumExpanding` the provided `sizeHint` will be used as a minimum,\
    \ and the widget will expand as much as possible.\n\nListing 147. custom-widgets/powerbar_2.py\n\
    \n```python\nclass _Bar(QtWidgets.QWidget):\n    def __init__(self):\n       \
    \ super().__init__()\n\n        self.setSizePolicy(\n            QtWidgets.QSizePolicy.MinimumExpanding,\n\
    \            QtWidgets.QSizePolicy.MinimumExpanding,\n        )\n\n    def sizeHint(self):\n\
    \        return QtCore.QSize(40, 120)\n\n    def paintEvent(self, e):\n      \
    \  painter = QtGui.QPainter(self)\n        brush = QtGui.QBrush()\n        brush.setColor(QtGui.QColor(\"\
    black\"))\n        brush.setStyle(Qt.SolidPattern)\n        rect = QtCore.QRect(0,\
    \ 0, painter.device().width(), painter.device().height())\n        painter.fillRect(rect,\
    \ brush)\n```\n\nIt's still not *perfect* as the `QDial` widget resizes itself\
    \ a bit awkwardly, but our bar is now expanding to fill all the available space.\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_440_0.png)\n\n*Figure 198. PowerBar\
    \ with policy set to QSizePolicy.MinimumExpanding.*\n\nWith the positioning sorted\
    \ we can now move on to define our paint methods to draw our PowerBar meter in\
    \ the top part (currently black) of the widget.\n\n### Updating the display\n\n\
    We now have our canvas completely filled in black, next we'll use QPainter draw\
    \ commands to actually draw something on the widget.\n\nBefore we start on the\
    \ bar, we've got a bit of testing to do to make sure we can update the display\
    \ with the values of our dial. Update the _Bar.paintEvent with the following code.\n\
    \nListing 148. custom-widgets/powerbar_3.py\n\n```python\ndef paintEvent(self,\
    \ e):\n    painter = QtGui.QPainter(self)\n\n    brush = QtGui.QBrush()\n    brush.setColor(QtGui.QColor(\"\
    black\"))\n    brush.setStyle(Qt.SolidPattern)\n    rect = QtCore.QRect(0, 0,\
    \ painter.device().width(), painter.device().height())\n    painter.fillRect(rect,\
    \ brush)\n\n    # Get current state.\n    dial = self.parent()._dial\n    vmin,\
    \ vmax = dial.minimum(), dial.maximum()\n    value = dial.value()\n\n    pen =\
    \ painter.pen()\n    pen.setColor(QtGui.QColor(\"red\"))\n    painter.setPen(pen)\n\
    \n    font = painter.font()\n    font.setFamily(\"Times\")\n    font.setPointSize(18)\n\
    \    painter.setFont(font)\n\n    painter.drawText(25, 25, \"{}-->{}<--{}\".format(vmin,\
    \ value, vmax))\n    painter.end()\n```\n\nThis draws the black background as\
    \ before, then uses `.parent()` to access our parent `PowerBar` widget and through\
    \ that the `QDial` via `_dial`. From there we get the current value, as well as\
    \ the allowed range minimum and maximum values. Finally we draw those using the\
    \ painter, just like we did in the previous part.\n\n> We're leaving handling\
    \ of the current value, min and max values to the `QDial` here, but we could also\
    \ store that value ourselves and use signals to/from the dial to keep things in\
    \ sync."
  mdcn: "## 30. 创建自定义控件\n\n在上一章中，我们介绍了 `QPainter`，并了解了一些基本的位图绘制操作，你可以使用这些操作在 `QPainter`\
    \ *表面*（例如 `QPixmap`）上绘制点、线、矩形和圆形。这种使用 `QPainter` *在表面上绘制*的过程，实际上是 Qt 中所有控件绘制的基础。现在你知道了如何使用\
    \ `QPainter`，也就知道了如何绘制自己的自定义控件！在本章中，我们将运用目前所学的知识，来构建一个全新的*自定义*控件。为了有一个可运行的示例，我们将构建以下控件——一个带有旋钮控制的可自定义\
    \ PowerBar 仪表。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_433_0.png)\n\n*图 195.\
    \ PowerBar 仪表。*\n\n这个控件实际上是*复合控件*和*自定义控件*的混合体，因为我们使用了内置的 Qt `QDial` 组件作为旋钮，同时自己绘制了功率条。然后我们将这两个部分组装到一个父控件中，这个父控件可以无缝地放入任何应用程序中，而无需了解其内部构造。最终的控件提供了通用的\
    \ `QAbstractSlider` 接口，并添加了一些用于配置条形显示的选项。\n\n完成本示例后，你将能够构建自己的自定义控件——无论是内置控件的组合，还是完全新颖的自绘杰作。\n\
    \n### 入门\n\n正如我们之前所见，复合控件就是应用了布局的控件，该布局本身包含 >1 个其他控件。由此产生的“控件”可以像任何其他控件一样使用，其内部细节可以根据需要隐藏或暴露。\n\
    \n下面给出了我们的 **PowerBar** 控件的概要——我们将从这个概要框架开始，逐步构建我们的自定义控件。\n\n清单 145. custom-widgets/stub.py\n\
    \n```python\nimport sys\n\nfrom PySide2 import QtCore, QtGui, QtWidgets\nfrom\
    \ PySide2.QtCore import Qt\n\n\nclass _Bar(QtWidgets.QWidget):\n    pass\n\n\n\
    class PowerBar(QtWidgets.QWidget):\n    \"\"\"\n    Custom Qt Widget to show a\
    \ power bar and dial.\n    Demonstrating compound and custom-drawn widget.\n \
    \   \"\"\"\n\n    def __init__(self, parent=None, steps=5):\n        super().__init__(parent)\n\
    \n        layout = QtWidgets.QVBoxLayout()\n        self._bar = _Bar()\n     \
    \   layout.addWidget(self._bar)\n\n        self._dial = QtWidgets.QDial()\n  \
    \      layout.addWidget(self._dial)\n\n        self.setLayout(layout)\n\n\napp\
    \ = QtWidgets.QApplication(sys.argv)\nvolume = PowerBar()\nvolume.show()\napp.exec_()\n\
    ```\n\n这仅仅定义了我们的自定义功率条，它定义在 `_Bar` 对象中——这里只是一个未修改的 `QWidget` 子类。`PowerBar` 控件（即完整的控件）将这个控件与内置的\
    \ `QDial` 结合起来，使用 `QVBoxLayout` 将它们一起显示。\n\n> 我们不需要创建 `QMainWindow`，因为任何没有父控件的控件本身就是一个窗口。我们的自定义\
    \ `PowerBar` 控件将像任何普通窗口一样显示。\n\n你可以随时运行此文件以查看你的控件运行效果。现在运行它，你应该会看到类似这样的内容：\n\n\
    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_436_0.png)\n\n*图 196. PowerBar 旋钮。*\n\
    \n如果你向下拉伸窗口，你会看到旋钮上方的空间比下方多——这部分空间被我们（目前不可见的）`_Bar` 控件占据了。\n\n### paintEvent\n\
    \n`paintEvent` 处理程序是 PySide2 中所有控件绘制的核心。控件的每一次完整或部分重绘都是通过 `paintEvent` 触发的，控件通过处理该事件来绘制自身。`paintEvent`\
    \ 可以由以下原因触发——\n\n- 调用了 `repaint()` 或 `update()`\n- 控件之前被遮挡，现在已显露出来\n- 控件被调整了大小\n\
    \n——但它也可能因许多其他原因而发生。重要的是，当 `paintEvent` 被触发时，你的控件能够重绘它。\n\n如果一个控件足够简单（比如我们的这个），通常可以简单地在*任何*事情发生时重绘整个控件。但对于更复杂的控件，这可能会变得非常低效。对于这些情况，`paintEvent`\
    \ 包含了需要更新的特定区域。我们将在后面更复杂的示例中利用这一点。\n\n现在，我们将做一些非常简单的事情，只是用单一颜色填充整个控件。这将使我们能够看到开始绘制条形图的工作区域。将以下代码添加到\
    \ `_Bar` 类中。\n\n*清单 146. custom-widgets/powerbar_1.py*\n\n```python\ndef paintEvent(self,\
    \ e):\n    painter = QtGui.QPainter(self)\n    brush = QtGui.QBrush()\n    brush.setColor(QtGui.QColor(\"\
    black\"))\n    brush.setStyle(Qt.SolidPattern)\n    rect = QtCore.QRect(0, 0,\
    \ painter.device().width(), painter.device().height())\n    painter.fillRect(rect,\
    \ brush)\n```\n\n### 定位\n\n现在我们可以看到 `_Bar` 控件了，我们可以调整它的位置和大小。如果你拖动窗口的形状，你会看到两个控件改变形状以适应可用空间。这是我们想要的，但\
    \ `QDial` 在垂直方向上也过度扩展了，留下了我们可以用于条形图的空白空间。\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_438_0.png)\n\
    \n*图 197. 拉伸的 PowerBar 留下空白空间。*\n\n我们可以对 `_Bar` 控件使用 `setSizePolicy` 来确保它尽可能扩展。通过使用\
    \ `QSizePolicy.MinimumExpanding`，提供的 `sizeHint` 将被用作最小值，控件将尽可能扩展。\n\n清单 147. custom-widgets/powerbar_2.py\n\
    \n```python\nclass _Bar(QtWidgets.QWidget):\n    def __init__(self):\n       \
    \ super().__init__()\n\n        self.setSizePolicy(\n            QtWidgets.QSizePolicy.MinimumExpanding,\n\
    \            QtWidgets.QSizePolicy.MinimumExpanding,\n        )\n\n    def sizeHint(self):\n\
    \        return QtCore.QSize(40, 120)\n\n    def paintEvent(self, e):\n      \
    \  painter = QtGui.QPainter(self)\n        brush = QtGui.QBrush()\n        brush.setColor(QtGui.QColor(\"\
    black\"))\n        brush.setStyle(Qt.SolidPattern)\n        rect = QtCore.QRect(0,\
    \ 0, painter.device().width(), painter.device().height())\n        painter.fillRect(rect,\
    \ brush)\n```\n\n这仍然不是*完美的*，因为 `QDial` 控件调整自身大小的方式有点笨拙，但我们的条形图现在正在扩展以填充所有可用空间。\n\
    \n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_440_0.png)\n\n*图 198. 策略设置为 QSizePolicy.MinimumExpanding\
    \ 的 PowerBar。*\n\n定位问题解决后，我们现在可以继续定义绘制方法，在控件的顶部（目前是黑色的）绘制我们的 PowerBar 仪表。\n\n\
    ### 更新显示\n\n现在我们的画布已完全填充为黑色，接下来我们将使用 QPainter 绘制命令在控件上实际绘制一些东西。\n\n在开始绘制条形图之前，我们需要进行一些测试，以确保我们可以用旋钮的值更新显示。使用以下代码更新\
    \ _Bar.paintEvent。\n\n清单 148. custom-widgets/powerbar_3.py\n\n```python\ndef paintEvent(self,\
    \ e):\n    painter = QtGui.QPainter(self)\n\n    brush = QtGui.QBrush()\n    brush.setColor(QtGui.QColor(\"\
    black\"))\n    brush.setStyle(Qt.SolidPattern)\n    rect = QtCore.QRect(0, 0,\
    \ painter.device().width(), painter.device().height())\n    painter.fillRect(rect,\
    \ brush)\n\n    # Get current state.\n    dial = self.parent()._dial\n    vmin,\
    \ vmax = dial.minimum(), dial.maximum()\n    value = dial.value()\n\n    pen =\
    \ painter.pen()\n    pen.setColor(QtGui.QColor(\"red\"))\n    painter.setPen(pen)\n\
    \n    font = painter.font()\n    font.setFamily(\"Times\")\n    font.setPointSize(18)\n\
    \    painter.setFont(font)\n\n    painter.drawText(25, 25, \"{}-->{}<--{}\".format(vmin,\
    \ value, vmax))\n    painter.end()\n```\n\n这会像之前一样绘制黑色背景，然后使用 `.parent()` 访问我们的父\
    \ `PowerBar` 控件，并通过它访问 `QDial`（通过 `_dial`）。从那里我们获取当前值，以及允许的范围最小值和最大值。最后，我们使用画笔绘制这些值，就像我们在前面部分所做的那样。\n\
    \n> 我们在这里将当前值、最小值和最大值的处理留给了 `QDial`，但我们也可以自己存储该值，并使用信号与旋钮进行同步。"
