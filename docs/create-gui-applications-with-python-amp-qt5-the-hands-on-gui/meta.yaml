  - "[PAGE 659]\n\nListing 217. app/browser.py\n\n```\ndef navigate_to_url(self):\
    \  # Does not receive the Url\n    q = QUrl(self.urlbar.text())\n    if q.scheme()\
    \ == \"\":\n        q.setScheme(\"http\")\n\n    self.browser.setUrl(q)\n```\n\
    \nWe also want the URL bar to update in response to page changes. To do this we\
    \ can use the `.urlChanged` and `.loadFinished` signals from the `QWebEngineView`.\
    \ We set up the connections from the signals in the `__init__` block as follows:\n\
    \nListing 218. app/browser.py\n\n```\nself.browser.urlChanged.connect(self.update_urlbar)\n\
    self.browser.loadFinished.connect(self.update_title)\n```\n\nThen we define the\
    \ target slot functions which for these signals. The first, to update the URL\
    \ bar accepts a `QUrl` object and determines whether this is a `http` or `https`\
    \ URL, using this to set the SSL icon.\n\n> This is a terrible way to test if\
    \ a connection is 'secure'. To be correct we should perform a certificate validation.\n\
    \nThe `QUrl` is converted to a string and the URL bar is updated with the value.\
    \ Note that we also set the cursor position back to the beginning of the line\
    \ to prevent the `QLineEdit` widget scrolling to the end."
