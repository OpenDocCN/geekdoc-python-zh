    \napp = QtWidgets.QApplication(sys.argv)\nwindow = MainWindow()\nwindow.show()\n\
    sys.exit(app.exec_())\n```\n\n## Plotting multiple lines\n\nIt is common for plots\
    \ to involve more than one line. In PyQtGraph this is as simple as calling `.plot()`\
    \ multiple times on the same `PlotWidget`. In the following example we're going\
