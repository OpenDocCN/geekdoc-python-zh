    The default plot style of PyQtGraph is quite bare - a black background with a
    thin (barely visible) white line. In the next section we''ll look at what options
    we have available to us in PyQtGraph to improve the appearance and usability of
    our plots.


    # Styling plots


    PyQtGraph uses Qt''s `QGraphicsScene` to render the graphs. This gives us access
    to all the standard Qt line and shape styling options for use in plots. However,
    PyQtGraph provides an API for using these to draw plots and manage the plot canvas.


    Below we''ll go through the most common styling features you''ll need to create
    and customize your own plots.


    # Background Color


    Beginning with the app skeleton above, we can change the background color by calling
    `.setBackground` on our `PlotWidget` instance (in `self.graphWidget`). The code
    below will set the background to white, by passing in the string ''w''.


    ```

    python

    self.graphWidget.setBackground(''w'')

    ```'
