- md: "## QComboBox\n\nThe `.currentIndexChanged` signal is triggered when the currently\
    \ selected item is updated, by default passing the index of the selected item\
    \ in the list. There is also a `.currentTextChanged` signal which instead provides\
    \ the label of the currently selected item, which is often more useful.\n\nQComboBox\
    \ can also be editable, allowing users to enter values not currently in the list\
    \ and either have them inserted, or simply used as a value. To make the box editable:\n\
    \n```python\nwidget.setEditable(True)\n```\n\nYou can also set a flag to determine\
    \ how the insert is handled. These flags are stored on the QComboBox class itself\
    \ and are listed below —\n\n| Flag | Behavior |\n| :--- | :--- |\n| QComboBox.NoInsert\
    \ | No insert |\n| QComboBox.InsertAtTop | Insert as first item |\n| QComboBox.InsertAtCurrent\
    \ | Replace currently selected item |\n| QComboBox.InsertAtBottom | Insert after\
    \ last item |\n| QComboBox.InsertAfterCurrent | Insert after current item |\n\
    | QComboBox.InsertBeforeCurrent | Insert before current item |\n| QComboBox.InsertAlphabetically\
    \ | Insert in alphabetical order |\n\nTo use these, apply the flag as follows:\n\
    \n```python\nwidget.setInsertPolicy(QComboBox.InsertAlphabetically)\n```\n\nYou\
    \ can also limit the number of items allowed in the box by using `.setMaxCount`,\
    \ e.g.\n\n```python\nwidget.setMaxCount(10)\n```\n\n## QListWidget\n\nNext up\
    \ is `QListWidget`. This widget is similar to `QComboBox`, except options are\
    \ presented as a scrollable list of items. It also supports selection of multiple\
    \ items at once. A `QListWidget` offers an `currentItemChanged` signal which sends\
    \ the `QListItem` (the element of the list widget), and a `currentTextChanged`\
    \ signal which sends the text of the current item.\n\nListing 18. basic/widgets_5.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtWidgets import QApplication, QListWidget,\
    \ QMainWindow\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n   \
    \     super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n      \
    \  widget = QListWidget()\n        widget.addItems([\"One\", \"Two\", \"Three\"\
    ])\n\n        widget.currentItemChanged.connect(self.index_changed)\n        widget.currentTextChanged.connect(self.text_changed)\n\
    \n        self.setCentralWidget(widget)\n\n    def index_changed(self, i):  #\
    \ Not an index, i is a QListWidgetItem\n        print(i.text())\n\n    def text_changed(self,\
    \ s):  # s is a str\n        print(s)\n\napp = QApplication(sys.argv)\n\nwindow\
    \ = MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n\U0001F680 Run it! You'll\
    \ see the same three items, now in a list. The selected item (if any) is highlighted.\n\
    \n## QLineEdit\n\nThe QLineEdit widget is a simple single-line text editing box,\
    \ into which users can type input. These are used for form fields, or settings\
    \ where there is no restricted list of valid inputs. For example, when entering\
    \ an email address, or computer name.\n\nListing 19. basic/widgets_6.py\n\n```python\n\
    import sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets import QApplication,\
    \ QLineEdit, QMainWindow\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n\
    \        super().__init__()\n\n        self.setWindowTitle(\"My App\")\n\n   \
    \     widget = QLineEdit()\n        widget.setMaxLength(10)\n        widget.setPlaceholderText(\"\
    Enter your text\")\n\n        # widget.setReadOnly(True) # uncomment this to make\
    \ readonly\n\n        widget.returnPressed.connect(self.return_pressed)\n    \
    \    widget.selectionChanged.connect(self.selection_changed)\n        widget.textChanged.connect(self.text_changed)\n\
    \        widget.textEdited.connect(self.text_edited)\n\n        self.setCentralWidget(widget)\n\
    \n    def return_pressed(self):\n        print(\"Return pressed!\")\n        self.centralWidget().setText(\"\
    BOOM!\")\n\n    def selection_changed(self):\n        print(\"Selection changed\"\
    )\n        print(self.centralWidget().selectedText())\n\n    def text_changed(self,\
    \ s):\n        print(\"Text changed...\")\n        print(s)\n\n    def text_edited(self,\
    \ s):\n        print(\"Text edited...\")\n        print(s)\n\napp = QApplication(sys.argv)\n\
    \nwindow = MainWindow()\nwindow.show()\n\napp.exec_()\n```\n\n\U0001F680 **Run\
    \ it!** You'll see a simple text entry box, with a hint.\n\nAs demonstrated in\
    \ the above code, you can set a maximum length for the text field by using `.setMaxLength`.\
    \ Placeholder text, which is text shown until something is entered by the user\
    \ can be added using `.setPlaceholderText`.\n\nThe `QLineEdit` has a number of\
    \ signals available for different editing events including when return is pressed\
    \ (by the user), when the user selection is changed. There are also two edit signals,\
    \ one for when the text in the box has been edited and one for when it has been\
    \ changed. The distinction here is between user edits and programmatic changes.\
    \ The `textEdited` signal is only sent when the user edits text.\n\nAdditionally,\
    \ it is possible to perform input validation using an *input mask* to define which\
    \ characters are supported and where. This can be applied to the field as follows:\n\
    \n```python\nwidget.setInputMask('000.000.000.000;_')\n```\n\nThe above would\
    \ allow a series of 3-digit numbers separated with periods, and could therefore\
    \ be used to validate IPv4 addresses.\n\n## QSpinBox and QDoubleSpinBox\n\nQSpinBox\
    \ provides a small numerical input box with arrows to increase and decrease the\
    \ value. QSpinBox supports integers while the related widget QDoubleSpinBox supports\
    \ floats.\n\nListing 20. basic/widgets_7.py\n\n```python\nimport sys\n\nfrom PySide2.QtCore\
    \ import Qt\nfrom PySide2.QtWidgets import QApplication, QMainWindow, QSpinBox\n\
    \nclass MainWindow(QMainWindow):\n    def __init__(self):\n        super().__init__()\n\
    \n        self.setWindowTitle(\"My App\")\n\n        widget = QSpinBox()\n   \
    \     # Or: widget = QDoubleSpinBox()\n\n        widget.setMinimum(-10)\n    \
    \    widget.setMaximum(3)\n        # Or: widget.setRange(-10,3)\n\n        widget.setPrefix(\"\
    $\")\n        widget.setSuffix(\"c\")\n        widget.setSingleStep(3)  # Or e.g.\
    \ 0.5 for QDoubleSpinBox\n        widget.valueChanged.connect(self.value_changed)\n\
    \        widget.textChanged.connect(self.value_changed_str)\n\n        self.setCentralWidget(widget)\n\
    \n    def value_changed(self, i):\n        print(i)\n\n    def value_changed_str(self,\
    \ s):\n        print(s)\n\napp = QApplication(sys.argv)\n\nwindow = MainWindow()\n\
    window.show()\n\napp.exec_()\n```\n\n\U0001F680 **Run it!** You'll see a numeric\
    \ entry box. The value shows pre and post fix units, and is limited to the range\
    \ +3 to -10.\n\nThe demonstration code above shows the various features that are\
    \ available for the widget.\n\nTo set the range of acceptable values you can use\
    \ `setMinimum` and `setMaximum`, or alternatively use `setRange` to set both simultaneously.\
    \ Annotation of value types is supported with both prefixes and suffixes that\
    \ can be added to the number, e.g. for currency markers or units using `.setPrefix`\
    \ and `.setSuffix` respectively.\n\nClicking on the up and down arrows on the\
    \ widget will increase or decrease the value in the widget by an amount, which\
    \ can be set using `.setSingleStep`. Note that this has no effect on the values\
    \ that are acceptable to the widget.\n\nBoth `QSpinBox` and `QDoubleSpinBox` have\
    \ a `.valueChanged` signal which fires whenever their value is altered. The raw\
    \ `.valueChanged` signal sends the numeric value (either an `int` or a `float`)\
    \ while `.textChanged` sends the value as a string, including both the prefix\
    \ and suffix characters.\n\n## QSlider\n\nQSlider provides a slide-bar widget,\
    \ which functions internally much like a QSpinBox. Rather than display the current\
    \ value numerically, it is represented by the position of the slider handle along\
    \ the length of the widget. This is often useful when providing adjustment between\
    \ two extremes, but where absolute accuracy is not required. The most common use\
    \ of this type of widget is for volume controls.\n\nThere is an additional .sliderMoved\
    \ signal that is triggered whenever the slider moves position and a .sliderPressed\
    \ signal that emits whenever the slider is clicked.\n\nListing 21. basic/widgets_8.py\n\
    \n```python\nimport sys\n\nfrom PySide2.QtCore import Qt\nfrom PySide2.QtWidgets\
    \ import QApplication, QMainWindow, QSlider\n\n\nclass MainWindow(QMainWindow):\n\
    \    def __init__(self):\n        super().__init__()\n\n        self.setWindowTitle(\"\
    My App\")\n\n        widget = QSlider()\n\n        widget.setMinimum(-10)\n  \
    \      widget.setMaximum(3)\n        # Or: widget.setRange(-10,3)\n\n        widget.setSingleStep(3)\n\
    \n        widget.valueChanged.connect(self.value_changed)\n        widget.sliderMoved.connect(self.slider_position)\n\
    \        widget.sliderPressed.connect(self.slider_pressed)\n        widget.sliderReleased.connect(self.slider_released)\n\
    ```"
