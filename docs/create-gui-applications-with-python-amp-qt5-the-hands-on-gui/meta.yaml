    media store, including tables for artists, albums, media tracks, invoices and
    customers.


    > A copy of the SQLite version of this database is included in the code with this
    book, named `chinook.sqlite`. You can also download the latest version [from here](https://www.sqlitetutorial.net/sqlite-sample-database/).


    ```

    from PySide2.QtSql import QSqlDatabase


    db = QSqlDatabase("QSQLITE")

    db.setDatabaseName("chinook.sqlite")

    db.open()

    ```


    > Where you place this code will depend on your application. Often you want to
    create a single database connection and use it throughout your app—in this case
    it''s best to create a separate module, e.g. db.py to hold this (and other related
    functionality).


    The process is the same for all databases—create the database object, set the
    name and then *open* the database to initialize the connection. However, if you
    want to connect to a remote database there are a few extra parameters. See [Authenticating
    with QSqlDatabase](https://doc.qt.io/qtforpython-5/PySide2/QtSql/QSqlDatabase.html#PySide2.QtSql.QSqlDatabase)
    for more information.


    # Displaying a table with `QSqlTableModel`


    The simplest thing you can do once you''ve connected your app to a database store,
    is to display a single table in your application. To do this we can use `QSqlTableModel`.
    This model displays data directly from the table, allowing editing.


    First we need to create the instance of the table model, passing in the database
    *object* we''ve created above. Then we need to set the source table to query data'
- md: "from —this is the name of the table in the database, here `<table name>`. Finally\
    \ we need to call `.select()` on the model.\n\n```python\nmodel = QSqlTableModel(db=db)\n\
    model.setTable('<table name>')\nmodel.select()\n```\n\nBy calling `.select()`\
    \ we tell the model to query the database and keep the result, ready for display.\
    \ To display this data in a `QTableView` we simply need to pass it to the views\
    \ `.setModel()` method.\n\n```python\ntable = QTableView()\ntable.setModel(self.model)\n\
    ```\n\nThe data will be displayed in the table model and can be browsed using\
    \ the scrollbar. See below for the full code, which loads the database and displays\
    \ the *track* table in the view.\n\nListing 98. tableview_tablemodel.py\n\n```python\n\
    import sys\n\nfrom PySide2.QtCore import QSize, Qt\nfrom PySide2.QtSql import\
    \ QSqlDatabase, QSqlTableModel\nfrom PySide2.QtWidgets import QApplication, QMainWindow,\
    \ QTableView\n\ndb = QSqlDatabase(\"QSQLITE\")\ndb.setDatabaseName(\"chinook.sqlite\"\
    )\ndb.open()\n\nclass MainWindow(QMainWindow):\n    def __init__(self):\n    \
    \    super().__init__()\n\n        self.table = QTableView()\n\n        self.model\
    \ = QSqlTableModel(db=db)\n\n        self.table.setModel(self.model)\n\n     \
    \   self.model.setTable(\"Track\")\n        self.model.select()\n\n        self.setMinimumSize(QSize(1024,\
    \ 600))\n        self.setCentralWidget(self.table)\n\napp = QApplication(sys.argv)\n\
    window = MainWindow()\nwindow.show()\napp.exec_()\n```\n\nThis will give you the\
    \ following window when run.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_327_0.png)\n\
    \nFigure 155. The tracks table displayed in a QTableView.\n\n> You can resize\
    \ the columns by dragging the right hand edge. Resize to fit the contents by double-clicking\
    \ on the right hand edge.\n\n## Editing the data\n\nDatabase data displayed in\
    \ a QTableView is editable by default — just double-click on any cell and you\
    \ will be able to modify the contents. The changes are persisted back to the database\
    \ immediately after you finish editing.\n\nQt provides some control over this\
    \ editing behavior, which you may want to change depending on the type of app\
    \ you are building. Qt terms these behaviors *editing strategy* and they can be\
    \ one of the following -\n\n| Strategy | Description |\n| :--- | :--- |\n| QSqlTableModel.OnFieldChange\
    \ | Changes are applied automatically, when the user deselects the edited cell.\
    \ |\n| QSqlTableModel.OnRowChange | Changes are applied automatically, when the\
