    \ __init__(self):\n        super().__init__()\n\n        self.browser = QWebEngineView()\n\
    \        self.browser.setUrl(QUrl(\"https://www.google.com\"))\n\n        self.setCentralWidget(self.browser)\n\
    \n        self.show()\n\n\napp = QApplication(sys.argv)\nwindow = MainWindow()\n\
    \napp.exec_()\n```\n\nIf you click around a bit you'll discover that the browser\
    \ behaves as expected—links work correctly, and you can interact with the pages.\
    \ However, you'll also notice things you take for granted are missing—like an\
    \ URL bar, controls or any sort of interface whatsoever. This makes it a little\
    \ tricky to use."
  - '[PAGE 656]


    # Navigation


    To convert this bare-bones browser into something usable we add some controls,
    as a series of QActions on a QToolbar. We add these definitions to the __init__
    block of the QMainWindow.


    Listing 213. app/browser.py


    ```

    navtb = QToolBar("Navigation")

    navtb.setIconSize(QSize(16, 16))

    self.addToolBar(navtb)


    back_btn = QAction(QIcon(os.path.join("icons", "arrow-180.png")), "Back", self)

    back_btn.setStatusTip("Back to previous page")

    back_btn.triggered.connect(self.browser.back)

    navtb.addAction(back_btn)

    ```


    The QWebEngineView includes slots for forward, back and reload navigation, which
    we can connect to directly to our action’s .triggered signals.


    We use the same QAction structure for the remaining controls.'
  - "[PAGE 657]\n\nListing 214. app/browser.py\n\n```\nnext_btn = QAction(\n    QIcon(os.path.join(\"\
    icons\", \"arrow-000.png\")), \"Forward\",\n    self\n)\nnext_btn.setStatusTip(\"\
    Forward to next page\")\nnext_btn.triggered.connect(self.browser.forward)\nnavtb.addAction(next_btn)\n\
    \nreload_btn = QAction(\n    QIcon(os.path.join(\"icons\", \"arrow-circle-315.png\"\
    )),\n    \"Reload\", self\n)\nreload_btn.setStatusTip(\"Reload page\")\nreload_btn.triggered.connect(self.browser.reload)\n\
    navtb.addAction(reload_btn)\n\nhome_btn = QAction(QIcon(os.path.join(\"icons\"\
    , \"home.png\")),\n    \"Home\", self)\nhome_btn.setStatusTip(\"Go home\")\nhome_btn.triggered.connect(self.navigate_home)\n\
    navtb.addAction(home_btn)\n```\n\nNotice that while forward, back and reload can\
    \ use built-in slots, the navigate home button requires a custom slot function.\
    \ The slot function is defined on our QMainWindow class, and simply sets the URL\
    \ of the browser to the Google homepage. Note that the URL must be passed as a\
    \ QUrl object.\n\nListing 215. app/browser.py\n\n```\ndef navigate_home(self):\n\
    \    self.browser.setUrl(QUrl(\"http://www.google.com\"))\n```\n\n> Challenge\n\
    Try making the home navigation location configurable. You could create a Preferences\
