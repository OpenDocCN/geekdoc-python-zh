    # Dialogs


    It''s particularly easy to create bad dialogs. From dialogs that trap users with
    confusing options to nested never-ending popups. There are plenty of ways to hurt
    your users.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_137_0.png)


    **Dialog buttons** are defined by system standards. You may never have noticed
    that the OK & Cancel buttons are in different locations on macOS & Linux vs. Windows,
    but your brain did. If you do not follow system standards, you''ll confuse your
    users, and make them make mistakes.


    ![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_137_1.png)


    With Qt you get this consistency for *free* when using the built-in `QDialogButtonBox`
    controls. But you *must use them*!


    **Error dialogs** annoy users. When you show an error dialog you''re giving your
    users *bad news*. When you give someone bad news, you need to consider the impact
    it will have on them.


    Take for example this (thankfully imaginary) dialog produced when we encounter
    an error in a document. The dialog tells you there is a error, but neither what
    the consequences are or what to do about it. Reading this'
