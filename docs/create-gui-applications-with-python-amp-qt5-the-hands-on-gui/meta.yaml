    每个活动状态都分配了颜色，这些颜色将用于在进度条上绘制。\n\n## 自定义行显示\n\n我们使用 `QListView` 来显示进度条。通常，列表视图的每一行显示一个简单的文本值。为了修改这一点，我们使用\
