    \ selection widget and a gradient designer. This tool (shown below) provides a\
    \ number of built-in gradients you can add to your rules, but you can also define\
    \ your own custom gradients if you prefer.\n\n![](img/47ba82c7dfd6e9ac5775f9bd51bcb35a_275_0.png)\n\
    \nFigure 138. The QSS gradient designer in Qt Designer.\n\nGradients are defined\
    \ using QSS rules so you can copy and paste them elsewhere (including into your\
    \ code) to re-use them if you like.\n\nListing 76. The Dutch flag using a QSS\
    \ qlineargradient rule.\n\n```\nQWidget {\n    background: qlineargradient(spread:pad,\
    \ x1:0, y1:0, x2:0, y2:1, stop:0 rgba(255, 0, 0, 255), stop:0.339795 rgba(255,\
