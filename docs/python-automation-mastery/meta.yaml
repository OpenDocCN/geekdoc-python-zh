    ]\nsorted_data = sorted(data, key=lambda x: x[1])\n```\n\n在这段代码中，**sorted()**\
    \ 函数的 **key** 参数接受一个 lambda 函数，该函数提取每个元组的第二个元素用于排序。\n\n随着你对 Python 的深入探索，你将遇到各种内置函数和库，它们提供了从数学运算到文件处理和网络交互的广泛功能。这些内置函数与你创建的函数一起，构成了\
    \ Python 编程工具包的基础。\n\n在这次关于创建和使用函数的探索中，你已经了解了函数如何简化代码、促进重用并增强程序的组织性。你还发现了诸如函数参数、返回值、作用域、递归和\
    \ lambda 函数等概念，这些概念使你能够处理各种编程任务。\n\n函数就像积木，允许你一步步构建复杂而强大的应用程序。因此，继续磨练你的函数编写技巧，尝试不同的技术，并拥抱模块化和可重用代码的世界吧！\n\
    \n欢迎来到使用 Python 模块组织代码的世界！模块是一个基本概念，可以帮助你管理程序的复杂性，并保持代码的有序和可读性。可以将模块视为 Python\
    \ 代码的容器，允许你将相关的函数、类和变量分组在一起。\n\n那么，模块到底是什么？简单来说，模块是一个包含 Python 代码的 Python 脚本或文件。这段代码可以包括函数定义、变量赋值、类定义，甚至是可执行代码。模块对于将大型程序分解成更小、更易于管理的部分至关重要。\n\
    \n要创建一个模块，你首先需要在单独的 **.py** 文件中编写你的 Python 代码。假设你有一组希望在多个项目中重用的实用函数。你可以创建一个名为\
    \ **my_utils.py** 的模块，并在其中定义这些函数。这是一个包含两个函数的基本模块示例：\n\n```python\n# my_utils.py\n\
    \ndef add(a, b):\n    return a + b\n\ndef subtract(a, b):\n    return a - b\n\
    ```\n\n在这个模块中，我们定义了执行基本算术运算的 **add()** 和 **subtract()** 函数。现在，你可以通过导入它们，在其他 Python\
    \ 脚本或模块中重用这些函数。\n\n要使用模块中的函数，你需要将模块导入到你的 Python 脚本中。你可以使用 **import** 语句，后跟模块名称（不带\
    \ **.py** 扩展名）来完成此操作。以下是如何导入和使用 **my_utils.py** 中的函数：\n\n```python\n# main.py\n\
    import my_utils\nresult1 = my_utils.add(3, 5)\nresult2 = my_utils.subtract(10,\
    \ 4)\nprint(my_utils.add(10, 4))\n```\n\n在这段代码中，我们导入了 **my_utils** 模块，然后使用模块名称作为前缀（例如\
    \ **my_utils.add()**）调用其函数。这有助于防止命名冲突，并允许你更有效地组织代码。\n\nPython 还提供了一种从模块中导入特定函数或变量的方法，而不是导入整个模块。这可以使你的代码更简洁，并避免用不必要的名称充斥你的命名空间。要导入特定的函数或变量，你可以使用\
    \ **from** 关键字，后跟模块名称和 **import** 语句。例如：\n\n```python\n# main.py\nfrom my_utils\
    \ import add\nresult = add(3, 5)\n```\n\n在这个例子中，我们只从 **my_utils** 模块导入了 **add()**\
    \ 函数。这允许我们直接使用 **add()**，而无需模块前缀。\n\n模块可以组织成包，包是包含相关模块集合的目录。包帮助你为代码创建结构化的层次结构，使其更易于管理和导航。要创建一个包，你需要创建一个包含特殊\
    \ **__init__.py** 文件（可以为空）的目录，以表明该目录应被视为一个包。这是一个简单包结构的示例：\n\n```\nmy_package/\n\
    \    __init__.py\n    module1.py\n    module2.py\n```\n\n在这个结构中，**my_package**\
    \ 是一个包含两个模块 **module1.py** 和 **module2.py** 的包。你可以使用点表示法从包中导入模块。例如，要从 **my_package**\
    \ 导入 **module1**，你可以这样写：\n\n```python\n# main.py\nfrom my_package import module1\n\
    result = module1.some_function()\n```\n\n这种方法帮助你将代码组织成逻辑单元，并避免与不同包中的其他模块发生命名冲突。\n\
    \nPython 还包含一个名为 **__init__.py** 的特殊模块，可用于指定在导入包本身时应导入哪些模块。这对于控制包的公共接口非常有用。例如，你可以创建一个像这样的\
    \ **__init__.py** 文件：\n\n```python\n# my_package/__init__.py\n```"
