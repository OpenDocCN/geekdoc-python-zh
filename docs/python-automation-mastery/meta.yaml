- md: "## if语句\n\nif语句允许你仅在指定条件为True时执行一段代码块。例如，你可以使用if语句通过评估条件来检查一个人是否有资格投票：\n\n\
    ```python\nif age >= 18:\n```\n\n你可以通过添加else子句来扩展if语句，该子句允许你在条件为False时指定要执行的替代代码块。这对于处理条件不满足的情况非常有用。例如：\n\
    \n```python\nif age >= 18:\n    vote()\nelse:\n    print(\"You are not eligible\
    \ to vote.\")\n```\n\n这提供了一个清晰的决策结构。\n\n但是，如果你需要评估多个条件怎么办？Python提供了**elif**子句，代表“else\
    \ if”。你可以使用**elif**来指定在初始**if**条件为False时要检查的附加条件。这使你能够高效地处理多种场景。例如，你可以使用以下代码来覆盖各种年龄场景：\n\
    \n```python\nif age < 18:\n    print(\"You are not eligible to vote.\")\nelif\
    \ age == 18:\n    print(\"You just turned 18! Congratulations!\")\nelse:\n   \
    \ vote()\n```\n\n嵌套的**if**语句是Python工具箱中的另一个强大工具。它们允许你将一个**if**语句放在另一个内部。当你需要以分层方式评估多个条件时，这特别有用。例如，你可以使用嵌套的**if**语句来确定一个人是否有资格投票，如果有，再检查他们是否已注册投票。\n\
    \n逻辑运算符在构建复杂条件方面起着至关重要的作用。Python提供了三个主要的逻辑运算符：**and**、**or**和**not**。\n\n你可以使用**and**来组合多个条件，确保所有条件都为True时整个条件才为True。相反，**or**允许你指定至少一个条件为True时整个条件就为True。**not**运算符对条件取反，使True条件变为False，反之亦然。\n\
    \n例如，你可以使用`if age >= 18 and is_registered:`来检查一个人是否达到投票年龄且已注册投票。或者，你可以使用`if age\
    \ < 18 or not is_registered:`来允许18岁以下或未注册的人投票。\n\n条件语句通常涉及比较值。Python提供了比较运算符，如：\n\
    - == (等于)\n- != (不等于)\n- < (小于)\n- > (大于)\n- <= (小于或等于)\n- >= (大于或等于)\n\n这些运算符允许你比较变量、数字或其他表达式。\n\
    \n例如，你可以使用`if age == 18:`来检查一个人的年龄是否正好是18岁，或者使用`if income >= 50000:`来确定某人的收入是否大于或等于50,000美元。\n\
    \n条件语句不仅限于处理单个条件。Python允许你通过组合`if`、`elif`和`else`子句来创建更复杂的决策结构。这种灵活性使你能够处理各种场景，并使你的代码更加健壮。\n\
    \n到目前为止，我们讨论的if语句都是基于单个条件进行决策。然而，在某些情况下，你需要同时评估多个条件。Python提供了if-elif-else结构来处理这种情况。\n\
    \n在这个结构中，你从一个if语句开始检查第一个条件。如果第一个条件为True，相应的代码块将执行，程序会跳过剩余的条件。如果第一个条件为False，Python会移动到**elif**（else\
    \ if）语句并评估其条件。这个过程会持续进行，直到Python找到一个True条件或到达**else**语句，该语句在没有任何条件满足时提供默认操作。\n\
    \n让我们举个例子。假设你想根据学生的分数来划分等级。你可以像这样使用if-elif-else结构：\n\n```python\nif score >= 90:\n\
