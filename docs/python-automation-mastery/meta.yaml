    \ Encapsulation\n\nEncapsulation is all about bundling data (attributes) and methods\
    \ that operate on that data within a class. In Python, you can control access\
    \ to an object's attributes by defining them as private or protected using the\
    \ underscore convention. Private attributes are indicated by a double underscore.\n\
    \nFor example, you can modify our **Car** class to have a private attribute called\
    \ **__mileage**.\n\n```python\nclass Car:\n    def __init__(self, make, model,\
    \ year):\n        self.make = make\n        self.model = model\n        self.year\
    \ = year\n        self.__mileage = 0\n\n    def start_engine(self):\n        print(f\"\
