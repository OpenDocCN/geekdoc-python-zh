    ```

    greeting = "Hello, " + name

    ```


    。这会创建一个包含问候语和名称的新字符串。


    另一个方便的操作是字符串插值，即在字符串中嵌入变量或表达式。Python 提供了两种字符串插值方法：f-字符串和 `.format()` 方法。使用 f-字符串，你可以在字符串前放置
    `f` 或 `F`，并使用花括号 `{}` 插入变量或表达式来创建动态字符串。例如，


    ```

