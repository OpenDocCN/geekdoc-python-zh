    ## Chapter 3: Understanding Variables and Data Types


    Now that you''ve embarked on your Python journey and written your first program,
    it''s time to delve deeper into a fundamental concept: variables and data types.


    In Python, variables are like containers that hold data. You can think of them
    as labels or names that you give to pieces of information. These labels make it
    easier to work with and manipulate data in your programs.


    When you create a variable in Python, you''re essentially reserving a spot in
    memory to store a value. This value can be a number, a piece of text, or even
    more complex data structures like lists or dictionaries.


    Python is a dynamically-typed language, which means you don''t need to declare
    the data type of a variable explicitly. Python determines the data type based
    on the value assigned to the variable.


    For example, you can create a variable **age** and assign the integer **25** to
    it without specifying its data type. Python knows that **25** is an integer, so
    it assigns the integer data type to the variable **age**.


    Similarly, you can create a variable **name** and assign the string **"Alice"**
    to it. Again, Python automatically recognizes that **"Alice"** is a string and
    assigns the string data type to the variable **name**.


    Let''s dive deeper into some common data types in Python:


    ### Integers (int):


    Integers are whole numbers without a decimal point. You can use them to represent
    quantities like counts or ages. For example,


    ```python

    age = 25

    ```


    assigns the integer `25` to the variable `age`.


    ### Floats (float):


    Floats are numbers that can have a decimal point. They''re used for representing
    measurements and other values with fractional parts. For example,


    ```python

    height = 1.75

    ```


    assigns the float `1.75` to the variable `height`.


    ### Strings (str):


    Strings are sequences of characters, like words or sentences. You can create strings
    by enclosing text in single or double quotation marks. For example,


    ```python

    name = "Alice"

    ```


    assigns the string `"Alice"` to the variable **name**.


    ### Booleans (bool):


    Booleans represent either true or false values. They''re often used for making
    decisions in your code. For example,


    ```python

    is_student = True

    ```


    assigns the boolean `True` to the variable **is_student**.


    ### Lists:


    Lists are ordered collections of items. They can contain elements of different
    data types, and you can modify them. For example,


    ```python

    fruits = ["apple", "banana", "cherry"]

    ```


    creates a list of strings and assigns it to the variable `fruits`.


    ### Tuples:


    Tuples are similar to lists but are immutable, which means you can''t change their
    contents once defined. They''re often used when you want to create a collection
    of items that should not be modified. For example,


    ```python

    coordinates = (3, 4)

    ```


    creates a tuple of two integers.


    ### Dictionaries:


    Dictionaries are collections of key-value pairs. They''re used for mapping one
    value (the key) to another (the value). For example,


    ```python

    person = {"name": "Alice", "age": 25}

    ```


    creates a dictionary with string keys and values of various data types.


    Now, let''s talk about variable names. When naming your variables, there are some
    rules and conventions to keep in mind:


    - Variable names must start with a letter (a-z, A-Z) or an underscore (_).

    - They can contain letters, numbers, and underscores.

    - Variable names are case-sensitive, so **age** and **Age** are considered different
    variables.


    Choose descriptive variable names that convey the purpose of the variable. For
    example, **total_cost** is more informative than **tc**.


    It''s also a good practice to follow naming conventions. For example, use lowercase
    letters and underscores for variable names (e.g., **total_cost**), and use uppercase
    letters for constants (e.g., **TAX_RATE**).


    Now that you understand variables and data types, let''s explore some basic operations
    you can perform with them. In Python, you can use operators to manipulate variables
    and data.


    ### Arithmetic Operators:


    These operators allow you to perform mathematical calculations like addition,
    subtraction, multiplication, and division. For example,


    ```python

    result = 5 + 3

    ```


    assigns the value `8` to the variable `result`.


