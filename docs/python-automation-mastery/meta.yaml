    Selenium 允许你自动化控制一个网络浏览器（如 Chrome 或 Firefox），并像人类用户一样与网页进行交互。这意味着你可以点击按钮、填写表单、滚动页面，从而获取那些可能隐藏在\
    \ JavaScript 驱动的用户界面背后的数据。\n\n要使用 Selenium，你需要安装它以及为所选浏览器准备的驱动程序：\n\n```python\n\
