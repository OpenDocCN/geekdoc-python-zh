    \        print(\"Electric cars do not have mileage.\")\n```\n\nIn this example,\
    \ **ElectricCar** is a subclass of **Car**. It inherits the attributes and methods\
    \ of **Car** while also introducing its own attributes like **__battery_capacity**\
    \ and methods like **charge_battery**. Additionally, it overrides the **update_mileage**\
    \ method to provide a specialized implementation.\n\n## Polymorphism\n\n**Polymorphism**\
    \ is a powerful concept that allows objects of different classes to be treated\
    \ as objects of a common base class. Python makes use of polymorphism through\
    \ dynamic typing and duck typing.\n\nDynamic typing means that you don't need\
    \ to declare the type of a variable; Python determines it at runtime. This flexibility\
    \ allows you to use the same function or method with different types of objects.\n\
    \nFor instance, consider a **drive** function that takes a car object and starts\
