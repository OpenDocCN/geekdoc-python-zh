    \n```python\nif age < 18:\n    print(\"You are not eligible to vote.\")\nelif\
    \ age == 18:\n    print(\"You just turned 18! Congratulations!\")\nelse:\n   \
    \ vote()\n```\n\n嵌套的**if**语句是Python工具箱中的另一个强大工具。它们允许你将一个**if**语句放在另一个内部。当你需要以分层方式评估多个条件时，这特别有用。例如，你可以使用嵌套的**if**语句来确定一个人是否有资格投票，如果有，再检查他们是否已注册投票。\n\
    \n逻辑运算符在构建复杂条件方面起着至关重要的作用。Python提供了三个主要的逻辑运算符：**and**、**or**和**not**。\n\n你可以使用**and**来组合多个条件，确保所有条件都为True时整个条件才为True。相反，**or**允许你指定至少一个条件为True时整个条件就为True。**not**运算符对条件取反，使True条件变为False，反之亦然。\n\
