    \ **my_function()** 函数内部和外部访问。然而，**y** 是在函数内部定义的局部变量，因此只能从函数内部访问。\n\n理解作用域对于避免变量冲突和确保代码按预期运行至关重要。\n\
    \n递归是编程中一种强大的技术，它涉及函数调用自身。递归函数可用于解决具有重复或自相似结构的问题。递归的一个经典例子是计算阶乘。\n\n这是一个计算数字阶乘的递归函数：\n\
    \n```python\ndef factorial(n):\n    if n == 0:\n        return 1\n    else:\n\
    \        return n * factorial(n - 1)\n```\n\n在这段代码中，**factorial()** 函数使用一个更小的参数（**n\
    \ - 1**）调用自身，直到达到基本情况，即 **n == 0**。此时，递归停止，函数开始沿调用栈返回值，最终计算出阶乘。\n\n递归函数可以是解决特定问题的优雅方案，但它们需要仔细设计以避免无限循环和过度的内存使用。\n\
    \n与函数相关的另一个概念是 lambda 函数，也称为匿名函数或 lambda 表达式。这些是无需命名的小型内联函数。当你需要一个简单的函数用于短时间任务时，例如对数据进行排序或过滤，它们非常有用。\n\
    \n这是一个将两个数字相加的 lambda 函数示例：\n\n```python\nadd = lambda x, y: x + y\nresult = add(3,\
    \ 5)\n```\n\nLambda 函数通常与 **map()**、**filter()** 和 **sorted()** 等函数结合使用。例如，你可以使用\
