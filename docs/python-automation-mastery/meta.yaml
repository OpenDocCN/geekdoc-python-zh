    \ mileage):\n        if mileage >= 0:\n            self.__mileage = mileage\n\
    \        else:\n            print(\"里程数不能为负数\")\n            print(\"Mileage cannot\
    \ be negative.\")\n\n    def get_mileage(self):\n        return self.__mileage\n\
    ```\n\nHere, **__mileage** is a private attribute that can only be accessed or\
    \ modified through methods like **update_mileage** and **get_mileage**. This encapsulation\
    \ ensures data integrity and allows you to control how the attribute is modified.\n\
    \n## Inheritance\n\nInheritance, as we discussed earlier, allows you to create\
    \ new classes based on existing ones. In Python, you can inherit from a base class\
    \ by specifying the parent class in parentheses when defining the child class.\n\
    \n```python\nclass ElectricCar(Car):\n    def __init__(self, make, model, year,\
    \ battery_capacity):\n        super().__init__(make, model, year)\n        self.__battery_capacity\
    \ = battery_capacity\n\n    def charge_battery(self):\n        print(f\"Charging\
