    `5` 或 `-42`。另一方面，浮点数包含小数点，如 `3.14` 或 `-0.5`。


    Python 提供了各种运算符来执行数字的算术运算。你可以使用 `+` 运算符进行加法，`-` 进行减法，`*` 进行乘法，`/` 进行除法。例如，


    ```

