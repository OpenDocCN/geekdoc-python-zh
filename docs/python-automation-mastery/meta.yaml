    \        print(\"Electric car motor running.\")\n```\n\nIn this example, **Vehicle**\
    \ is an abstract class with an abstract method **start_engine**. Subclasses like\
    \ **Car** and **ElectricCar** must implement this method. Abstraction allows you\
    \ to define a common interface while leaving the specifics to the implementing\
    \ classes.\n\nIn Python, you can also use **interfaces** as a form of abstraction.\
    \ An interface defines a contract that classes must adhere to, specifying a set\
    \ of methods that must be implemented. While Python doesn't have a built-in keyword\
    \ for interfaces, you can achieve this using abstract base classes or simply by\
    \ documenting the expected methods in the class docstring.\n\nNow, let's talk\
