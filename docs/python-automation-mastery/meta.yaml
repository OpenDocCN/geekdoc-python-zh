    In this phase, ethical hackers use active scanning tools and techniques to identify
    vulnerabilities and weaknesses in the target systems. They may employ network
    scanners, port scanners, and vulnerability scanners to assess the security posture
    of the target.


    # Enumeration:


    Enumeration involves extracting additional information about the target, such
    as user accounts, system resources, and network services. Ethical hackers aim
    to gain a deeper understanding of the target''s environment to identify potential
    entry points.


    # Vulnerability Analysis:'
