    # **Chapter 6: Working with Numeric Variables in Python**


    Welcome to the next chapter of our Python programming journey. In this chapter,
    we''ll dive into the exciting world of numeric variables. Numbers are fundamental
    to programming, and Python provides a rich set of tools and functions to work
    with numeric data. Whether you''re dealing with integers, floating-point numbers,
    or complex numbers, Python has you covered. Let''s explore how to perform various
    operations with numeric variables.


    # ## Numeric Data Types


    Python supports several numeric data types, each designed for specific use cases.
    The primary numeric data types in Python are:


    # ### 1. Integers (`int`)


    Integers represent whole numbers, both positive and negative, without a decimal
    point. Examples of integers are -5, 0, 42, and 1000.


    # ### 2. Floating-Point Numbers (`float`)


    Floating-point numbers represent real numbers with a decimal point. They can be
    positive or negative. Examples of floating-point numbers are -3.14, 0.0, 3.14159,
    and 2.71828.'
  - '[PAGE 60]


    # ### 3. Complex Numbers (`complex`)


    Complex numbers consist of a real part and an imaginary part, both represented
    as floating-point numbers. They are written in the form `a + bj`, where `a` is
    the real part and `b` is the imaginary part. An example of a complex number is
    `3 + 2j`.


    Python automatically determines the data type based on the value assigned to a
    variable. Let''s explore how to work with these numeric data types.


    # ## Integers (`int`)


    Integers are used to represent whole numbers, and Python provides various operations
    to work with them.


    # ### Addition


    You can add integers together using the `+` operator. The result is an integer.


    ```

    python

    # Addition of integers

    x = 5

    y = 3

    result = x + y  # result will be 8

    ```'
