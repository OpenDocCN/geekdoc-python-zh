    \ 第13章：Python 控制结构中的变量\n\n欢迎来到我们 Python 之旅的下一章。在本章中，我们将探讨控制结构中变量的基本概念。理解变量在控制结构中的使用对于编写有效的\
    \ Python 程序至关重要。我们将深入探讨变量在条件语句、循环等中的作用，并用易于理解的语言提供大量示例。\n\n## 变量的作用\n\n变量是编程的核心。它们是存储数据的容器，允许你在代码中处理和操作信息。在控制结构中，变量在决策、循环和其他程序流操作中扮演着关键角色。\n\
    \n## 条件语句中的变量\n\n在条件语句中，变量用于评估条件并控制程序的流程。让我们探讨变量在这些基本控制结构中的使用方式。\n\n### `if` 语句\n\
    \n`if` 语句是 Python 中的基本控制结构。它允许你在满足特定条件时执行一段代码。\n\n```python\n# 在 if 语句中使用变量\n\
    age = 25\n\nif age >= 18:\n    print(\"You are eligible to vote.\")\n```\n\n在这个例子中，变量\
    \ `age` 用于根据条件 `age >= 18` 来确定此人是否有资格投票。\n\n### `else` 子句\n\n`else` 子句可以与 `if`\
    \ 语句结合使用，以便在条件不满足时执行另一段代码。\n\n```python\n# 在 if-else 语句中使用变量\ntemperature = 28\n\
    \nif temperature > 30:\n    print(\"It's a hot day.\")\nelse:\n    print(\"It's\
    \ not very hot today.\")\n```\n\n这里，变量 `temperature` 被用来判断今天是否是炎热的一天。\n\n### `elif`\
    \ 子句\n\n`elif`（\"else if\" 的缩写）子句用于有多个条件需要检查的情况。它允许你逐一评估条件，直到其中一个条件被满足。\n\n```python\n\
    # 在 if-elif-else 语句中使用变量\nscore = 75\n\nif score >= 90:\n    grade = \"A\"\nelif\
    \ score >= 80:\n    grade = \"B\"\nelif score >= 70:\n    grade = \"C\"\nelse:\n\
    \    grade = \"D\"\n\nprint(f\"Your grade is {grade}.\")\n```\n\n在这个例子中，变量 `score`\
    \ 用于根据不同条件确定等级。\n\n### 条件表达式中的变量\n\n你也可以在条件表达式中使用变量，这提供了一种为简单条件编写简洁单行代码的方式。\n\n\
    ```python\n# 在条件表达式中使用变量\nage = 20\nmessage = \"You can vote\" if age >= 18 else\
    \ \"You cannot vote\"\n\nprint(message)\n```\n\n这里，变量 `age` 用于根据条件设置 `message`\
    \ 的值。\n\n## 循环中的变量\n\n变量在循环中至关重要，因为它们控制迭代并使你能够以重复的方式处理数据。\n\n### `for` 循环\n\n\
    `for` 循环用于遍历序列，如列表、字符串或范围。它通常使用一个变量来表示序列中的当前项。"
