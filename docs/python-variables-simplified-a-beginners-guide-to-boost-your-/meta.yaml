    ```python\n# Using a variable as a counter\nword = \"banana\"\nletter_to_count\
    \ = \"a\"\ncount = 0\n\nfor char in word:\n    if char == letter_to_count:\n \
    \       count += 1\n\nprint(f\"The letter '{letter_to_count}' appears {count}\
