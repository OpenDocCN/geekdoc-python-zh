    - **Integers (int):** These are whole numbers, both positive and negative. For
    example, 5, -7, and 0 are all integers. You can use them for counting and performing
    mathematical operations.

    - **Floating-Point Numbers (float):** Floats are numbers with a decimal point.
    They are used for more precise calculations and can represent fractions. For example,
    3.14, -0.5, and 2.0 are floating-point numbers.

    - **Strings (str):** Strings are sequences of characters enclosed in either single
    ('' '') or double (" ") quotes. They are used for working with text, names, and
    any kind of character data. For example, "Hello, World!" and ''Python'' are strings.

    - **Booleans (bool):** Booleans represent truth values. They can be either True
    or False. These are essential for conditional statements and logical operations.
    They help you make decisions in your code.

    - **Lists:** Lists are like containers that can hold multiple items of different
    data types. They are ordered, meaning the items have a specific position in the
    list. You can think of them as collections of data.

    - **Tuples:** Tuples are similar to lists, but with one crucial difference—they
    are immutable. Once you create a tuple, you cannot change its content. They are
    useful for situations where you need data that shouldn''t be altered.

