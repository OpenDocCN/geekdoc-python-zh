    formatted_name = f"My name is {first_name} {last_name}."

    ```


    在这段代码中，我们有两个变量“first_name”和“last_name”，每个都持有一个字符串。我们使用 `+` 运算符将它们拼接起来，创建了“full_name”变量。我们还使用字符串插值（由字符串前的
