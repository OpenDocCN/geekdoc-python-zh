    # ## What Are Sets?


    In Python, a set is an unordered collection of unique elements. This means that
    in a set, each element appears only once, and there are no duplicates. Sets are
    designed for efficient membership testing and operations like union, intersection,
    and difference.


    To create a set in Python, you use curly braces `{ }` or the `set()` constructor.


    ```

    python

    # Creating a simple set

    fruits = {"apple", "banana", "cherry", "date"}

    ```


    In this example, `fruits` is a set containing four unique elements, each representing
    a different fruit.'
