    \nprint(f\"The selected color is {selected_color}.\")\n```\n\nIn this case, the\
    \ variable `index` determines which color to select from the list.\n\n## Variable\
    \ Scope in Control Structures\n\nVariable scope refers to where a variable is\
    \ accessible within your code. Variables can have different scopes, which impact\
    \ where they can be used.\n\n### Local Variables\n\nLocal variables are declared\
    \ within a function or a specific code block and are only accessible within that\
    \ scope.\n\n```python\n# Using a local variable within a function\ndef greet():\n\
    \    message = \"Hello, World!\"\n    print(message)\n\ngreet()\n\n# This would\
    \ result in an error:\n# print(message)\n```\n\nIn this example, the variable\
    \ `message` is a local variable, and it can only be accessed within the `greet`\
    \ function.\n\n### Global Variables\n\nGlobal variables are defined at the top\
    \ level of your code and can be accessed from anywhere within your program.\n\n\
    ```python\n# Using a global variable\nname = \"Alice\"\n\ndef greet():\n    print(f\"\
    Hello, {name}!\")\n\ngreet()\n\nprint(f\"Name outside the function: {name}\")\n\
    ```\n\nThe variable `name` is a global variable, accessible both within and outside\
    \ the `greet` function.\n\n## Summary\n\nIn this chapter, we've explored the essential\
    \ role of variables in control structures in Python. Variables are central to\
    \ conditional statements, loops, and controlling the flow of your program. They\
    \ enable you to make decisions, iterate over data, and manage program flow efficiently.\n\
    \nWe've seen how variables are used in `if` statements, `for` and `while` loops,\
    \ and control flags. Variables are employed as counters, accumulators, and for\
    \ indexing elements in sequences. We've also discussed variable scope, distinguishing\
    \ between local and global variables.\n\n# Chapter 14: Variable Scope and Lifetime\
    \ in Python\n\nWelcome to the next chapter in our exploration of Python. In this\
    \ chapter, we'll delve into the intriguing world of variable scope and lifetime.\
    \ Understanding how variables are scoped and how long they live is essential to\
