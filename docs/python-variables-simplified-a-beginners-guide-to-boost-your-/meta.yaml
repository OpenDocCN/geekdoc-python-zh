    \ 3, 4, 5, 6, 7, 8, 9, 10]\n\n# 使用列表推导式获取偶数\neven_numbers = [num for num in numbers\
    \ if num % 2 == 0]\n\nprint(\"Even numbers in the list:\")\nprint(even_numbers)\n\
    ```\n\n### 练习 3：斐波那契数列\n\n**场景：** 编写一个 Python 函数，生成指定项数的斐波那契数列。\n\n**解决方案：**\n\
    \n```python\ndef generate_fibonacci(n):\n    fibonacci = [0, 1]\n    while len(fibonacci)\
    \ < n:\n        next_num = fibonacci[-1] + fibonacci[-2]\n        fibonacci.append(next_num)\n\
    \    return fibonacci\n\n# 生成包含 10 项的斐波那契数列\nn_terms = 10\nfib_sequence = generate_fibonacci(n_terms)\n\
    \nprint(\"Fibonacci sequence:\")\nprint(fib_sequence)\n```\n\n### 练习 4：温度转换器\n\
