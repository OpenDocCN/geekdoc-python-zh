    # ## Sets


    Sets are collections of unique items. They are similar to lists, but they don''t
    allow duplicate values. Sets are great for tasks like finding the intersection
    of two sets, checking for membership, and ensuring that you have a unique list
    of items.


    Here''s how you can create a set in Python:


    ```

    python

    fruits = {"apple", "banana", "cherry"}

    prime_numbers = {2, 3, 5, 7}

    ```


    In these examples, "fruits" is a set containing unique fruit names, and "prime_numbers"
    is a set of distinct prime numbers.'
