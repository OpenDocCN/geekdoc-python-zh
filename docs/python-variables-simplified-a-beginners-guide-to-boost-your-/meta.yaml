- img_proc: true
  md: "# **Chapter 14: Variable Scope and Lifetime in Python**\n\nWelcome to the next\
    \ chapter in our exploration of Python. In this chapter, we'll delve into the\
    \ intriguing world of variable scope and lifetime. Understanding how variables\
    \ are scoped and how long they live is essential to writing efficient and error-free\
    \ Python programs. We'll explore the concepts of scope, the differences between\
    \ local and global variables, and how variables' lifetimes are determined, all\
    \ explained in easy-to-understand language.\n\n# ## What Is Variable Scope?\n\n\
    Variable scope refers to the region or part of your code where a variable can\
    \ be accessed or modified. In Python, variable scope is divided into two primary\
    \ categories: local scope and global scope.\n\n# ### Local Scope\n\nA variable\
    \ in local scope is one that is declared within a specific code block, such as\
    \ a function. This variable is only accessible within that block and cannot be\
    \ used outside of it. Local scope helps ensure that variables are contained and\
    \ do not interfere with other parts of your code.\n\n```\npython\n# Example of\
    \ a local variable\ndef greet():\n    message = \"Hello, World!\"\n```"
  merge: -1
  pgno: 151
- img_proc: true
  md: "```\nprint(message)\n\ngreet()\n\n# This would result in an error:\n# print(message)\n\
    ```\n\nIn this example, the variable `message` is a local variable and can only\
    \ be accessed within the `greet` function.\n\n# ### Global Scope\n\nGlobal scope,\
    \ on the other hand, encompasses variables defined at the top level of your code.\
    \ These variables are accessible from anywhere within your program, including\
    \ functions and code blocks. Global variables can be convenient for sharing data\
    \ between different parts of your code.\n\n```\npython\n# Example of a global\
    \ variable\nname = \"Alice\"\n\ndef greet():\n    print(f\"Hello, {name}!\")\n\
    \ngreet()\n```"
  merge: -1
  pgno: 152
- img_proc: true
  md: "```\nprint(f\"Name outside the function: {name}\")\n```\n\nIn this case, the\
    \ variable `name` is a global variable, accessible both within and outside the\
    \ `greet` function.\n\n# ## Variable Lifetime\n\nVariable lifetime refers to the\
    \ duration for which a variable exists and holds a value in memory. In Python,\
    \ variable lifetime is determined by their scope and how they are created.\n\n\
    # ### Local Variable Lifetime\n\nLocal variables have a relatively short lifetime.\
    \ They are created when the block of code where they are defined is entered and\
    \ destroyed when that block is exited. This means they exist only as long as the\
    \ function or code block that contains them is running.\n\n```\npython\n# Local\
    \ variable lifetime\ndef example_function():\n    local_var = 10  # Created when\
    \ the function is called\n    print(local_var)\n    # local_var is destroyed when\
    \ the function exits\n\nexample_function()\n```"
  merge: -1
  pgno: 153
- img_proc: true
  md: "```\n# This would result in an error:\n# print(local_var)\n```\n\nIn this example,\
    \ `local_var` is created when `example_function` is called and ceases to exist\
    \ when the function exits.\n\n# ### Global Variable Lifetime\n\nGlobal variables\
    \ have a longer lifetime. They are created when your program starts running and\
    \ continue to exist until the program terminates. This means they persist throughout\
    \ the program's execution.\n\n```\npython\n# Global variable lifetime\nglobal_var\
    \ = 100  # Created when the program starts running\n\ndef example_function():\n\
    \    print(global_var)\n\nexample_function()\n\nprint(global_var)\n# global_var\
    \ continues to exist even after the function call\n```"
  merge: -1
  pgno: 154
- img_proc: true
  md: "Here, `global_var` is created when the program starts and remains in memory\
    \ throughout the program's execution.\n\n# ## Shadowing Variables\n\nSometimes,\
    \ variables in local and global scopes may have the same name. When this happens,\
    \ the local variable \"shadows\" or takes precedence over the global variable\
    \ within its scope.\n\n```\npython\n# Shadowing a global variable with a local\
    \ variable\nname = \"Alice\" # Global variable\n\ndef greet():\n    name = \"\
    Bob\" # Local variable\n    print(f\"Hello, {name}!\") # This uses the local variable\n\
    \ngreet()\n\nprint(f\"Name outside the function: {name}\") # This uses the global\
    \ variable\n```\n\nIn this example, the local variable `name` within the `greet`\
    \ function shadows the global variable `name` within its scope.\n\n# ## The `global`\
    \ Keyword"
  merge: -1
  pgno: 155
- img_proc: true
  md: "To modify a global variable from within a function, you can use the `global`\
    \ keyword to indicate that you want to work with the global variable instead of\
    \ creating a new local variable.\n\n```\npython\n# Modifying a global variable\
    \ using the global keyword\ncounter = 0\n\ndef increment_counter():\n    global\
    \ counter # Indicates we want to use the global variable\n    counter += 1\n\n\
    increment_counter()\n\nprint(f\"Counter: {counter}\")\n```\n\nHere, the `global`\
    \ keyword tells Python that we intend to modify the global variable `counter`\
    \ within the `increment_counter` function.\n\n# ## Enclosing Function Scope\n\n\
    Python supports nested functions, where one function is defined within another.\
    \ In such cases, variables defined in the enclosing function's scope are accessible\
    \ to the nested function.\n\n```\npython\n```"
  merge: -1
  pgno: 156
- img_proc: true
  md: "```\n# Enclosing function scope\ndef outer_function():\n    outer_var = \"\
    I'm from the outer function.\"\n\n    def inner_function():\n        print(outer_var)\
    \ # Accessing outer_var from the enclosing function\n\n    inner_function()\n\n\
    outer_function()\n```\n\nIn this example, `inner_function` can access the variable\
    \ `outer_var` defined in its enclosing function, `outer_function`.\n\n# ## Nonlocal\
    \ Variables\n\nWhile global variables are accessible from any part of your program,\
    \ local variables are contained within a specific block. However, in some situations,\
    \ you might want to modify a variable in an enclosing function's scope, but not\
    \ in the global scope. This is where nonlocal variables come into play.\n\n```\n\
    python\n# Modifying a nonlocal variable\ndef outer_function():\n    outer_var\
    \ = 10\n```"
  merge: -1
  pgno: 157
- img_proc: true
  md: "```\ndef inner_function():\n    nonlocal outer_var # Indicates that we're working\
    \ with the nonlocal variable\n    outer_var += 5\n\ninner_function()\nprint(f\"\
    Outer variable: {outer_var}\")\n\nouter_function()\n```\n\nIn this example, the\
    \ `nonlocal` keyword indicates that we are working with the nonlocal variable\
    \ `outer_var` defined in the enclosing function, `outer_function`.\n\n# ## Summary\n\
    \nIn this chapter, we've explored the concepts of variable scope and lifetime\
    \ in Python. We've learned about local and global variables, their respective\
    \ scopes, and how variables are created and destroyed. We've seen how local variables\
    \ exist only within the code block they are defined in and are destroyed when\
    \ that block is exited. Global variables, on the other hand, persist throughout\
    \ the program's execution.\n\nWe've discussed shadowing, where local variables\
    \ take precedence over global variables with the same name within their scope.\
    \ We've also explored the use of the `global` keyword to modify global variables\
    \ from within functions and the `nonlocal` keyword for working with variables\
    \ in enclosing function scopes."
  merge: -1
  pgno: 158
