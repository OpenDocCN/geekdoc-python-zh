    \    return (fahrenheit - 32) * 5/9\n\ndef celsius_to_fahrenheit(celsius):\n \
    \   return (celsius * 9/5) + 32\n\n# 将华氏度转换为摄氏度\nfahrenheit_temp = 77\ncelsius_temp\
    \ = fahrenheit_to_celsius(fahrenheit_temp)\n\nprint(f\"{fahrenheit_temp}°F is\
