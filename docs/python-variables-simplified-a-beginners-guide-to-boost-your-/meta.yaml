  md: '# ## The Immutability of Tuples


    The primary characteristic of tuples is their immutability. Once you define a
    tuple, you cannot change its elements, add new elements, or remove existing ones.
    This immutability ensures that the data represented by the tuple remains constant.


    ```

    python

    # Attempting to modify a tuple

    fruits = ("apple", "banana", "cherry")


    # This will raise a TypeError

    fruits[0] = "orange"

    ```


    In this example, trying to modify the first element of the `fruits` tuple results
    in a `TypeError`.


    # ## When to Use Tuples


    Tuples are particularly useful in scenarios where you need to represent data that
    should not change, such as:


    +   - **Coordinates:** Storing (x, y) coordinates of points in a 2D space.

    - **Date and Time:** Representing a specific date and time.

    - **Database Records:** Storing rows from a database query, as they should remain
    constant.'
