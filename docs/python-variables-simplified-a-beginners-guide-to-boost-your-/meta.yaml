    is_precipitating = is_raining or is_snowing # is_precipitating 为 True\n```\n\n\
    #### 逻辑非 (`not`)\n\n`not` 运算符对布尔值取反，将 `True` 变为 `False`，反之亦然。\n\n```python\n#\
    \ 逻辑非\nis_sunny = True\nis_not_sunny = not is_sunny # is_not_sunny 为 False\n```\n\
    \n逻辑运算符对于做出复杂决策和管理程序流程非常宝贵。\n\n### 真值与假值\n\n除了 `True` 和 `False`，Python还有“真值”和“假值”的概念。在布尔上下文中使用时，某些值被认为等同于\
    \ `True` 或 `False`。\n\n一般来说，以下值被认为是假值：\n\n- `False`\n- `None`\n- `0`（整数或浮点数）\n\
    - `''`（空字符串）\n- `[]`（空列表）\n- `()`（空元组）\n- `{}`（空字典）\n\n所有其他值都被认为是真值。在评估表达式时，真值的行为类似于\
