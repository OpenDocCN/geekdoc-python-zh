    You can see that Python is pretty flexible here—no need to mention what type of
    data is going into these containers. Python figures it out on its own!


    This flexibility is one of the reasons why Python is a great choice for beginners.
    You don''t have to stress about declaring variable types; Python''s got your back.


    # ## Dynamic Typing in Python


    This "figure-it-out-on-its-own" behavior is a result of Python''s dynamic typing.
    It means that you don''t need to specify the data type when declaring a variable.
    Python looks at the value you''re assigning and goes, "Ah, I see what kind of
    data this is!" That''s a big advantage because in some other programming languages,
    you need to specify the data type explicitly, which can be a real headache.


    Let''s consider an example to illustrate dynamic typing in action. In Python,
    you can declare a variable and assign a value without specifying the data type.
    For instance:


    ```

    python

    favorite_number = 42

    favorite_number = "forty-two"

    ```'
