    \ \"date\", \"fig\"}\n\n# 两个集合的并集\nall_fruits = fruits1.union(fruits2) # {\"apple\"\
    , \"banana\", \"cherry\", \"date\", \"fig\"}\n\n# 两个集合的交集\ncommon_fruits = fruits1.intersection(fruits2)\
    \ # {\"banana\"}\n\n# 两个集合的差集\nunique_to_fruits1 = fruits1.difference(fruits2)\
    \ # {\"apple\", \"cherry\"}\n\n# 测试一个集合是否是子集\nis_subset = fruits1.issubset(fruits2)\
    \ # False\n\n# 测试一个集合是否是超集\nis_superset = fruits1.issuperset(fruits2) # False\n\
    ```\n\n这些方法使你能够高效地执行各种集合操作。\n\n### 集合操作\n\n集合可用于执行并集、交集和差集等操作。让我们看一些实际例子。\n\n\
    ```python\n# 集合操作\nfruits1 = {\"apple\", \"banana\", \"cherry\"}\nfruits2 = {\"\
