    # 使用 global 关键字修改全局变量\ncounter = 0\n\ndef increment_counter():\n    global counter\
    \ # 表明我们要使用全局变量\n    counter += 1\n\nincrement_counter()\n\nprint(f\"Counter:\
    \ {counter}\")\n```\n\n这里，`global` 关键字告诉 Python，我们打算在 `increment_counter` 函数内修改全局变量\
    \ `counter`。\n\n## 外部函数作用域\n\nPython 支持嵌套函数，即在一个函数内部定义另一个函数。在这种情况下，定义在外部函数作用域中的变量可以被内部函数访问。\n\
    \n```python\n# 外部函数作用域\ndef outer_function():\n    outer_var = \"I'm from the\
    \ outer function.\"\n\n    def inner_function():\n        print(outer_var) # 从外部函数访问\
    \ outer_var\n\n    inner_function()\n\nouter_function()\n```\n\n在这个例子中，`inner_function`\
    \ 可以访问其外部函数 `outer_function` 中定义的变量 `outer_var`。\n\n## 非局部变量\n\n虽然全局变量可以从程序的任何部分访问，但局部变量仅限于特定的代码块。然而，在某些情况下，你可能想要修改外部函数作用域中的变量，而不是全局作用域中的变量。这就是非局部变量发挥作用的地方。\n\
    \n```python\n# 修改非局部变量\ndef outer_function():\n    outer_var = 10\n\n    def inner_function():\n\
    \        nonlocal outer_var # 表明我们正在操作非局部变量\n        outer_var += 5\n\n    inner_function()\n\
    \    print(f\"Outer variable: {outer_var}\")\n\nouter_function()\n```\n\n在这个例子中，`nonlocal`\
    \ 关键字表明我们正在操作定义在外部函数 `outer_function` 中的非局部变量 `outer_var`。\n\n## 总结\n\n在本章中，我们探讨了\
    \ Python 中变量作用域和生命周期的概念。我们学习了局部变量和全局变量、它们各自的作用域，以及变量是如何被创建和销毁的。我们了解到局部变量仅存在于其定义的代码块内，并在退出该代码块时被销毁。另一方面，全局变量则在整个程序执行期间持续存在。\n\
    \n我们讨论了变量遮蔽，即在其作用域内，局部变量优先于同名的全局变量。我们还探讨了使用 `global` 关键字从函数内部修改全局变量，以及使用 `nonlocal`\
    \ 关键字操作外部函数作用域中的变量。\n\n# 第 15 章：Python 实践示例与练习\n\n恭喜你学习 Python 的旅程到达了这一章！在本章中，我们将采取实践方法，提供实际示例和练习，以巩固你对\
    \ Python 概念的理解。我们将涵盖各种场景和挑战，帮助你应用所学知识，并进一步提升你的编程技能。\n\n## 实践示例\n\n### 示例 1：计算平均值\n\
    \n**场景：** 你有一个数字列表，想要计算这些数字的平均值。\n\n**解决方案：**\n\n```python\nnumbers = [12, 45,\
    \ 23, 67, 89, 34]\n\n# 计算平均值\ntotal = sum(numbers)\naverage = total / len(numbers)\n\
    \nprint(f\"The average of the numbers is {average}\")\n```\n\n### 示例 2：统计字符串中的字符\n\
    \n**场景：** 你有一个字符串，想要统计字符串中每个字符出现的次数。\n\n**解决方案：**\n\n```python\ntext = \"programming\"\
    \n\n# 统计字符\nchar_count = {}\nfor char in text:\n    if char in char_count:\n \
    \       char_count[char] += 1\n    else:\n        char_count[char] = 1\n\nprint(\"\
    Character counts:\")\nfor char, count in char_count.items():\n    print(f\"'{char}':\
    \ {count}\")\n```\n\n### 示例 3：检查质数\n\n**场景：** 你想要识别给定范围内的质数。\n\n**解决方案：**\n\n\
    ```python\ndef is_prime(num):\n    if num <= 1:\n        return False\n    for\
    \ i in range(2, int(num**0.5) + 1):\n        if num % i == 0:\n            return\
    \ False\n    return True\n\n# 查找范围内的质数\nstart = 10\nend = 50\nprime_numbers =\
    \ [num for num in range(start, end+1) if is_prime(num)]\n\nprint(\"Prime numbers\
