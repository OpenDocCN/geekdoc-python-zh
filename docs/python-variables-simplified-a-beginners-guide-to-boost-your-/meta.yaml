    # ### Subtraction


    Subtraction of integers is done with the `-` operator, resulting in an integer.


    ```

    python

    # Subtraction of integers

    x = 10

    y = 4

    result = x - y # result will be 6

    ```


    # ### Multiplication


    Multiplying integers is achieved using the `*` operator, producing an integer
    as the result.


    ```

    python

    # Multiplication of integers

    x = 6

    y = 7

    result = x * y # result will be 42

    ```


    # ### Division'
- md: 'Division of integers is performed with the `/` operator. However, this operation
    may yield a floating-point result, even if the division is exact.


    ```python

    # Division of integers

    x = 20

    y = 5

    result = x / y # result will be 4.0 (a floating-point number)

    ```


    ### Floor Division


    If you want to ensure that the result of division remains an integer (i.e., you
    want the floor value of the division), you can use the `//` operator.


    ```python

    # Floor division of integers

    x = 20

    y = 6

    result = x // y # result will be 3 (an integer)

    ```


    ### Modulus


    The modulus operation, represented by the `%` operator, calculates the remainder
    of division between two integers.


    ```python

    # Modulus operation

    x = 19

    y = 5

    result = x % y # result will be 4 (the remainder of 19 divided by 5)

    ```


    ### Exponentiation


    To raise an integer to a power, you can use the `**` operator.


    ```python

    # Exponentiation

    x = 2

    y = 3

    result = x ** y # result will be 8 (2 raised to the power of 3)

    ```


    ## Floating-Point Numbers (`float`)


    Floating-point numbers are used for more precise representations of real numbers.
    They allow for fractional values and are used extensively in scientific and engineering
    applications.


    ### Addition, Subtraction, Multiplication, and Division


    The basic arithmetic operations, such as addition, subtraction, multiplication,
    and division, work the same way for floating-point numbers as they do for integers.
    The result of these operations is a floating-point number.


    ```python

    # Basic operations with floating-point numbers

    a = 3.14

    b = 1.618


    addition_result = a + b

    subtraction_result = a - b

    multiplication_result = a * b

    division_result = a / b

    ```


    ### Exponentiation


    Exponentiation of floating-point numbers is performed similarly to integers, using
    the `**` operator.


    ```python

    # Exponentiation with floating-point numbers

    a = 2.0

    b = 0.5

    result = a ** b  # result will be the square root of 2 (approximately 1.41421)

    ```


    ### Rounding


    To round a floating-point number to a specific number of decimal places, you can
    use the `round()` function.


    ```python

    # Rounding a floating-point number

    x = 3.14159

    rounded = round(x, 2) # rounded will be 3.14 (rounded to 2 decimal places)

    ```


    ### Converting between `int` and `float`


    You can convert between integers and floating-point numbers using the `int()`
    and `float()` functions.


    ```python

    # Converting between int and float

    x = 42

    float_x = float(x) # float_x will be 42.0 (a float)

    y = 3.14

    int_y = int(y) # int_y will be 3 (an integer, truncating the decimal part)

    ```


    ## Complex Numbers (`complex`)


    Complex numbers are used when you need to work with real and imaginary parts of
    a number. Python represents complex numbers using the `j` symbol for the imaginary
    part.


    ### Creating Complex Numbers


    You can create complex numbers by using the `complex()` function.


    ```python

    # Creating complex numbers

    z1 = complex(2, 3) # 2 + 3j

    z2 = complex(0, -1) # -j

    ```


    ### Real and Imaginary Parts


    You can access the real and imaginary parts of a complex number using the `real`
    and `imag` attributes.


    ```python

    # Accessing real and imaginary parts

    z = complex(4, -2)

    real_part = z.real # real_part will be 4.0

    imaginary_part = z.imag # imaginary_part will be -2.0

    ```


    ### Basic Operations with Complex Numbers


    Complex numbers support the basic arithmetic operations, such as addition, subtraction,
    multiplication, and division.


    ```python

    # Basic operations with complex numbers

    z1 = complex(2, 3)

    z2 = complex(1, -2)


    addition_result = z1 + z2

    subtraction_result = z1 - z2

    multiplication_result = z1 * z2

    division_result = z1 / z2

    ```


    ### Conjugate


    The conjugate of a complex number is obtained by changing the sign of its imaginary
    part. You can use the `conjugate()` function to calculate it.


    ```python

    # Conjugate of a complex number

    z = complex(3, 4)

    conjugate_z = z.conjugate() # conjugate_z will be 3 - 4j

    ```


    ## Numeric Variables and Assignment


    In Python, you can assign values to numeric variables using the assignment operator
    (`=`). You can also perform operations and update the values of these variables.


    ```python

    # Assignment and operations with numeric variables

    x = 10 # x is assigned the value 10

    y = 3


    # Performing operations

    sum_result = x + y # sum_result is 13

    difference_result = x - y # difference_result is 7


    # Updating values

    x = x + 5 # x is now 15

    ```


    ## Working with Math Functions


    Python provides a rich set of mathematical functions through the `math` module.
    You need to import this module to access functions for tasks such as rounding,
    trigonometry, logarithms, and more.


    ```python

    # Importing the math module

