    \ 编写一个 Python 函数，检查给定的字符串是否是回文（正向和反向读取相同）。\n\n**解决方案：**\n\n```python\ndef is_palindrome(word):\n\
    \    word = word.lower()\n    return word == word[::-1]\n\n# 测试函数\nword = \"racecar\"\
    \nif is_palindrome(word):\n    print(f\"'{word}' is a palindrome.\")\nelse:\n\
    \    print(f\"'{word}' is not a palindrome.\")\n```\n\n### 练习 2：列表推导式\n\n**场景：**\
