- md: '# RASPBERRY PI SETUP GUIDE


    ![](img/07ce46bbd010b8e902c19471558cb9d6_0_0.png)


    HOW TO USE YOUR RASPBERRY PI AND PYTHON PROGRAMMING FROM SCRATCH


    # INTRODUCTION


    Python is a basic, simple to learn language like composed English. Raspberry pi
    is a straightforward single motherboard PC, convenient quick, and simple to utilize.
    Presently consolidate an extremely simple to get familiar with a language with
    a simple to utilize PC and what you’ll get will be outright effortlessness that
    can squeeze solidly into your back pocket. There are different options in contrast
    to the Raspberry pi and other substitute programming dialects out there you can
    utilize all things being equal. But here is the thing, none of the other options,
    for example, Arduino, gives you simplicity plus computing power and speed that
    the Raspberry pi will offer. This book will take you through the essentials, and
    you’ll do yourself a lot of good to enhance them considerably assist later you
    are finished perusing this book.


    # CHAPTER ONE What is Raspberry Pi?


    Raspberry Pi is a reasonable, pocket-sized PC that plugs advantageously into a
    screen like a screen or TV with a mouse and a standard console. It is the most
    well known single-board PC in the market.


    # MERITS OF RASPBERRY PI


    Some inquiries do spring up when an individual or an entrepreneur means to put
    a lot of cash in pretty much anything. Questions like “will the worth merit the
    cash?”, “what different choices there is?.” When questions like this ring a bell,
    the following strategy is to think about the different advantages it offers in
    the more limited and longer terms.


    There are many benefits Raspberry Pi offers, which anybody ready to purchase should
    consider prior to purchasing one.


    - 1. It is reasonable for low spending plan organizations or projects.

    - 2. It can be utilized by pretty much anybody with or without earlier coding
    or programming experience.

    - 3. The default programming language is python (with Linux OS), which is extremely
    straightforward, dissimilar to other programming languages.

    - 4. It devours way less power contrasted with what a customary PC will burn-through.
    This infers decreased spending on power bills.

    - 5. It has a low carbon footprint.

    - 6. It is excellent for testing versatile technologies.

    - 7. It upholds other programming dialects as well. This implies assuming you
    are not a major devotee of python programming language, you can in any case utilize
    it regardless utilizing your favored programming language.

    - 8. It has numerous interfaces yet can fit easily in your purse.


    # A TOUR OF RASPBERRY PI


    The Raspberry Pi comes in two variations, specifically; Model An and Model B.
    The error between the two models is the miniature USB port. Model B accompanies
    an ethernet port, which implies it devours more power than its model A.

    To completely comprehend the reason for the introduction of the Raspberry Pi,
    a decent comprehension of its different parts is quintessential.


    # The Raspberry Hardware components


    The Raspberry miniature PC board like some other PC is comprised of the RAM (Read
    Only Memory), Processor, GPU (Graphics Programming unit), CPU (Central Processing
    Unit), the Ethernet Port, GPIO pins (Graphics Programming Input/Output pins),
    XBee pin out/attachment, UART (Universal Asynchronous Transceiver), power connector,
    SD card opening, RCA connector, LED (Light-emanating Diodes), Bluetooth, WiFi,
    MIPI DSI (Display Serial Interface), MIPI CSI (Camera Display Interface), HDMI
    port and augmentation for other outer gadgets through the USB port.


    # RAM


    The board accompanies two memory variations, which are; 250MB and 512MB for early
    models. The more up to date forms presently flaunt up to 4GB RAM.


    # PROCESSOR


    This unit is liable for helping out guidelines through legitimate operations.


    # GPU


    The GPU part is answerable for all picture related operations.


    # THE GPIO PINS


    They are universally useful pins used to interface the Raspberry pi board to outer
    sheets. These pins are fit for executing I/O orders from outer electronic circuit
    boards.


    # POWER CONNECTOR


    The power connector takes into account the Raspberry Pi board to be associated
    with an outside power source.


    # XBEE PIN OUT/ SOCKET


    It is utilized for remote communication.


    # ETHERNET PORT


    The Ethernet port furnishes a method for correspondence with extra devices.


    # SD CARD


    This fills in as the capacity and can be compared to a PC hard drive of a customary
    PC. This is also where the working arrangement of the Raspberry pi boots from.


    # The Raspberry Software Components


    Though Raspbian has been the most famous Linux-based working framework for the
    Raspberry pi, there are other working frameworks that are broadly utilized. Here
    is a list of must-dos of them;


    # Raspbian


    This is one of the working frameworks of the Raspberry Pi. The OS is fabricated
    dependent on Debian. It is viable with every one of the renditions of Raspberry
    pi, in addition to it is not difficult to adjust to as a beginner.


    # Ubuntu MATE


    The Ubuntu MATE working framework is a lot easier and straight forward. Additionally,
    in view of Linux, the Ubuntu MATE OS has a cutting edge feel to it and especially
    exceptional. Notwithstanding, it isn’t accessible for every one of the forms of
    Raspberry pi. It begins from Raspberry 2 upwards.


    # RetroPie


    Based on Raspbian, it is an emulator that permits you to play old games way back
    as the ‘70s.


    # DietPi


    DietPi runs on a streamlined Debian variant. Its little size makes it the lighter
    contrasted with Raspberry light. It is accessible for all form of Raspberry Pi
    models.


    # Manjaro


    It is an extraordinary framework on Raspberry Pi dependent on curve Linux. Straightforward,
    cool, light, and very adaptable. It additionally gives you the opportunity to
    introduce just what you need to use.


    # Fyde OS: Chromium OS for Raspberry Pi


    The OS can be introduced on pretty much any gadget, including Raspberry Pi. Introducing
    the Operating framework likewise gives you admittance to Cloud-Based devices accessible
    on chrome OS.


    # OSMC


    This is probably the best medium arrangements worked for the Raspberry pi dependent
    on Debian. It can stream and play pretty much any media designs. Simple to introduce
    and use.


    # Windows 10 ARM


    With the WDOA introduce windows deployer, you can undoubtedly install Windows
    10 on your Raspberry Pi. This is accomplished by booting ARM windows 10 from Micro
    SD card.


    # Open ELEC


    This is created to utilize the framework and its assets to get to media perusing
    and playback.


    # Android


    Android is known to run on pretty much any gadget, and its uplifting news; it
    likewise runs on Raspberry Pi. This offers the client the chance to get to the
    immense assortment of android applications and games.


    # SETTING UP RASPBERRY PI FOR THE FIRST TIME


    To get Raspberry pi to work, you really want to initially introduce a working
    framework on it through a miniature SD card. NOOBS (New out of box programming)
    turns out to be the installer for the Raspberry pi OS.


    # HOW DO YOU GET NOOBS


    There are two different ways you can get your hands on NOOBS. One is by purchasing
    a SD card with NOOBS preintroduced on it. The second is to download on the Raspberry
    pi official website at [https://www.raspberrypi.org/downloads](https://www.raspberrypi.org/downloads).


    # How to introduce NOOBS on SD card


    Before you start the establishment of NOOBS from your SD card;


    - Make sure the SD card is basically 8GB. 16GB for full Raspberry pi OS installation.

    - The SD card is arranged as FAT.

    - Extract the document from the NOOBS compress file.

    - You would then be able to duplicate the record to the organized SD card for
    installation.

    - As soon as you boot, the Recovery FAT parcel will naturally be resized to a
    base. A rundown of working frameworks accessible for establishment will pop up.


    # CHAPTER TWO Taking off


    At this point, you probably got to know the essentials of Raspberry pi going from
    the equipment to the product parts of it. Presently, we should climb a smidgen
    up to the Linux structure, the work area, and the web.


    # LINUX


    The Linux working framework presumably the most popular and regularly used working
    system.

    It is a product that sits in the middle of the product and the equipment parts
    of a PC system.

    Linux is the working arrangement of the Raspberry pi by default.'
  mdcn: '# 树莓派设置指南


    ![](img/07ce46bbd010b8e902c19471558cb9d6_0_0.png)


    如何从零开始使用你的树莓派和Python编程


    # 简介


    Python是一种基础、易于学习的语言，就像组合英语一样。树莓派是一款简单直接的单板电脑，方便快捷且易于使用。现在，将一种极易上手的语言与一台易于使用的电脑结合起来，你将得到的是极致的简洁，可以轻松放入口袋。市面上有各种树莓派的替代品和其他可替代的编程语言，你也可以使用它们。但问题是，其他选项，例如Arduino，都无法提供树莓派所具备的易用性、计算能力和速度。本书将带你了解基础知识，读完本书后，你将受益匪浅，并能在此基础上进一步提升。


    # 第一章 什么是树莓派？


    树莓派是一款价格实惠、口袋大小的电脑，可以方便地插入显示器（如屏幕或电视），并连接鼠标和标准键盘。它是市场上最受欢迎的单板电脑。


    # 树莓派的优点


    当个人或企业主打算在任何东西上投入大量资金时，总会冒出一些问题。比如“这钱花得值吗？”、“还有哪些其他选择？”。当这类问题浮现在脑海中时，下一步就是考虑它在短期和长期内提供的各种优势。


    树莓派提供了许多优点，任何有意购买的人都应在购买前考虑：


    - 1. 它适合预算有限的企业或项目。

    - 2. 几乎任何有或没有编码或编程经验的人都可以使用它。

    - 3. 默认编程语言是Python（搭配Linux操作系统），它非常简单，不像其他编程语言。

    - 4. 与普通电脑相比，它的功耗要低得多。这意味着可以减少电费支出。

    - 5. 它的碳足迹很低。

    - 6. 它非常适合测试可穿戴技术。

    - 7. 它也支持其他编程语言。这意味着如果你不是Python编程语言的忠实粉丝，你仍然可以使用它，使用你偏好的编程语言。

    - 8. 它拥有众多接口，但可以轻松放入你的钱包。


    # 树莓派概览


    树莓派有两种型号，分别是：A型和B型。两种型号之间的区别在于微型USB端口。B型配备以太网端口，这意味着它比A型消耗更多电力。

    要完全理解推出树莓派的目的，对其各个部件的良好理解至关重要。


    # 树莓派硬件组件


    树莓派微型电脑板与其他电脑一样，由RAM（只读存储器）、处理器、GPU（图形处理单元）、CPU（中央处理器）、以太网端口、GPIO引脚（通用输入/输出引脚）、XBee引脚/插座、UART（通用异步收发器）、电源连接器、SD卡插槽、RCA连接器、LED（发光二极管）、蓝牙、WiFi、MIPI
    DSI（显示串行接口）、MIPI CSI（摄像头显示接口）、HDMI端口以及通过USB端口扩展连接其他外部设备的接口组成。


    # RAM


    该板提供两种内存版本，早期型号为250MB和512MB。较新的版本现在最高可达4GB RAM。


    # 处理器


    该单元负责通过适当的操作来处理指令。


    # GPU


    GPU组件负责所有与图像相关的操作。


    # GPIO引脚


    它们是通用引脚，用于将树莓派板连接到外部板。这些引脚能够执行来自外部电子电路板的I/O命令。


    # 电源连接器


    电源连接器允许树莓派板连接到外部电源。


    # XBEE引脚/插座


    它用于无线通信。


    # 以太网端口


    以太网端口提供了一种与其他设备通信的方式。


    # SD卡


    这用作存储，可以比作普通电脑的硬盘驱动器。这也是树莓派操作系统启动的地方。


    # 树莓派软件组件


    虽然Raspbian一直是树莓派最受欢迎的基于Linux的操作系统，但也有其他广泛使用的操作系统。以下是它们的简介：


    # Raspbian


    这是树莓派的操作系统之一。该操作系统基于Debian构建。它兼容所有版本的树莓派，而且作为初学者很容易适应。


    # Ubuntu MATE


    Ubuntu MATE操作系统更加简单直接。同样基于Linux，Ubuntu MATE操作系统具有现代感，非常独特。然而，它并非适用于所有版本的树莓派。它从树莓派2开始支持。


    # RetroPie


    基于Raspbian，它是一个模拟器，允许你玩70年代的旧游戏。


    # DietPi


    DietPi运行在优化的Debian版本上。其小巧的尺寸使其比Raspberry Lite更轻量。它适用于所有型号的树莓派。


    # Manjaro


    它是基于Arch Linux的树莓派上的一个出色系统。简洁、酷炫、轻量且非常灵活。它还让你可以自由地只安装你需要使用的东西。


    # Fyde OS：树莓派的Chromium OS


    该操作系统可以安装在几乎任何设备上，包括树莓派。安装该操作系统还可以让你访问Chrome OS上可用的基于云的工具。


    # OSMC


    这是基于Debian为树莓派构建的最好的媒体解决方案之一。它可以流式传输和播放几乎任何媒体格式。易于安装和使用。


    # Windows 10 ARM


    通过WDOA安装Windows部署器，你可以轻松地在树莓派上安装Windows 10。这是通过从Micro SD卡启动ARM Windows 10来实现的。


    # Open ELEC


    这是为了利用系统及其资源来访问媒体浏览和播放而开发的。


    # Android


    众所周知，Android可以在几乎任何设备上运行，好消息是；它也可以在树莓派上运行。这为用户提供了访问海量Android应用和游戏的机会。


    # 首次设置树莓派


    要让树莓派工作，你需要首先通过微型SD卡为其安装操作系统。NOOBS（开箱即用软件）是树莓派操作系统的安装程序。


    # 如何获取NOOBS


    有两种方法可以获取NOOBS。一种是购买预装了NOOBS的SD卡。第二种是在树莓派官方网站下载：[https://www.raspberrypi.org/downloads](https://www.raspberrypi.org/downloads)。


    # 如何在SD卡上安装NOOBS


    在开始从SD卡安装NOOBS之前：


    - 确保SD卡至少为8GB。完整安装树莓派操作系统需要16GB。

    - SD卡格式化为FAT。

    - 从NOOBS压缩文件中提取文件。

    - 然后你可以将文件复制到格式化后的SD卡进行安装。

    - 一旦启动，恢复FAT分区将自动调整为最小大小。将弹出一个可供安装的操作系统列表。


    # 第二章 启航


    至此，你可能已经了解了树莓派的基础知识，从硬件到软件部分。现在，让我们稍微深入一点，了解Linux架构、桌面和网络。


    # LINUX


    Linux操作系统可能是最著名和最常用的操作系统。

    它是一种位于电脑系统软件和硬件部分之间的软件。

    Linux是树莓派的默认操作系统。'
