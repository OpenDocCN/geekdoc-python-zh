    \n### 读写二进制数据\n\n在Python编程语言中，你可以使用`open()`函数和读取二进制\"rb\"或写入二进制\"wb\"模式来读取或写入二进制数据。字节、字节数组和内存视图都是二进制序列类型的一部分。\n\
