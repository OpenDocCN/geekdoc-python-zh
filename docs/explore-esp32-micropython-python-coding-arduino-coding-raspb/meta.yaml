    you need to verify is you need to make sure that you are in the CDT perspective.
    So this icon represents C/C++. Then you can go to Help and download and configure
    ESP-IDF.


    So, yeah. So, all right, so this is where you can choose whether you wanted to
    install the new ESP-IDF, or you wanted to select an existing ESP-IDF directory,
    if it is already installed. So, for example, if you want to install the new one,
    you can choose anything from this list. So just for lack of time, I already installed
    the master version of ESP-IDF. Yeah. So I''ll just go with an existing one. So
    for that, you just select this "Use an existing ESP-IDF directory from the file
    system", then going to browse your ESP-IDF directory. So here''s the one, this
