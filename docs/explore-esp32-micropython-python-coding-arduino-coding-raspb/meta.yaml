  mdcn: '## 条件语句

    （IF、ELSE、ELIF）


    我们将讨论文件中的条件语句，如 if、else 和 elif。让我们从基础开始。我们将从用户那里获取一个 1 到 5 范围内的数字，进行检查，并预测朋友的数字。因此，我设置了一个名为
    `value` 的变量。默认情况下，我给它赋值为 4。然后，我想从用户变量中获取输入，该变量名为 `value`。接着，我们知道必须获取输入，即那个数字。因此，我想将其转换为数字。然后，我们必须在
    `int` 内部使用它。我可以使用 `input` 函数。数字范围是 1 到 5。现在，我们将检查 `value` 是否等于参考值。为此，我们将使用 `if`。在括号内，我们必须给出条件
    `value ==`。`==` 表示检查值是否完全相同。一旦给出，你必须加上冒号。然后，你必须在下面给出内容。缩进非常重要。你可以看到有一个制表符，这是缩进。在其他语言中，你通常使用开闭花括号。但在
    Python 中，实际上，缩进在 Python 编程语言中非常重要。因此，你必须确保遵循缩进。其余代码都在该 `if` 条件下。现在，如果两者相同，那么我想打印一些内容。它匹配了。


    现在让我再次运行，保存到计算机并运行。哦，它在询问。然后输入 1 到 5 范围内的数字，让我输入 4，然后检查输出。现在你得到输出 "value matched"，这意味着它匹配了。现在，我再次运行。我将输入另一个值，比如
    2。现在，你没有得到任何输出。你可能期望一些输出，但你没有得到任何输出。为什么？我们还没有说明，如果不匹配，那么应该打印什么或我们想向别人展示什么。因此，在这种情况下，我们在这里放置一个叫做
    `else` 的东西。`else` 实际上是在检查 `if` 之后，跳转到 `else`。


    现在，如果不匹配，即数字不是 4，我可以运行所有剩余的条件。因此，在 `else` 下，所有剩余的条件都会出现，这就是为什么你不需要在这里放置任何特定条件。你必须在这里放置一个冒号。检查这里的缩进，它会自动出现，但你也应该始终检查缩进。然后让我打印
    "it is not matched"。现在让我们运行文件。你可以看到它在询问 "do enter a number"。输入 3。"Number is not
    matched"。再次运行，输入 4。现在值匹配了。


    通过这两种方式，我们可以理解如何使用 `if` 和 `else`。存在多种可能性，比如 1 到 5。因此，如果你输入 1，它想显示 "number 1"。如果你输入
    2，它想显示 "number 2"。如果你输入超出此范围的内容，它想显示 "no, value out of range"。在这种情况下，确保你没有输入 4.5
    或类似内容。


    为什么？因为它会在这里产生一些错误。因此，这些错误我们可以使用 `try` 和 `except`，但这次我们不讨论这个。因此，你尝试始终给出数字 1 到 5
    或更多，不应给出任何浮点数。现在让我们检查下一个，逐一检查条件。其中一个条件满足时，它将打印相应内容。我们使用 `elif`。因此，首先，我们想检查其中一个条件，因为这个条件会起作用。所以这就是为什么我不想重复
    `if value == 1` 和 `4:`。我想打印 "number is 1"。这是另一种可能性。数字可以是 2。在这种情况下，我们不使用 `else`，而是使用一个新东西叫做
    `elif`。我们想给出 `value == 2`，并且值是 2。现在，类似地，我有其他选项，比如 4 或 5。


    现在我们可以得到从 1 到 5 的所有可能性。如果我输入 1，假设是数字 10，那么它不会出现在这个 `if` 和 `elif` 中。因此，其他条件会出现。那么我能做什么呢？我可以打印
    "our number is not in the range"。好的。现在让我们尝试要求输入特定数字。让我检查这部分是否也有效。


    让我输入 2。现在它说 "number is not matched"，因为在这个区域我们取的参考数字是 4，这部分显示 "value is 2"，因为我输入了数字
    2，它匹配了。再次，我输入 4。现在 "matched"，因为值是 4，输入的值是 4，因为它出现在这里。


    现在，我再次运行，输入一个超出范围的值，比如 8。然后让我们看看。然后 "the number is not in that range"。因此，这个程序成功运行。你可以看到每个变量及其当前值。


    ## While 循环


    这是一个无限循环。它非常重要。我们使用的大多数程序都使用 `while` 循环。开始一个新文件，`while True` 和完整代码。除了 `True`，我们也可以给出其他条件。如果满足特定条件，它将运行。条件始终为
    `True`。这意味着它总是反复运行。我想打印一些内容。Hello？好的。代码完成了，但有一个问题。如果我没有在这里给出适当的时间。现在，我的界面可能会卡住，因为在极短的时间内，它正在运行。但打印
    "Hello? Hello. Hello."。因此，这就是为什么我们必须在这里给出一个小延迟。


    我们必须导入一个叫做 `sleep` 的东西。从名为 `time` 的模块中导入 `sleep` 函数。模块名是 `time`。导入 `sleep`。在打印之后，我想等待一秒。我们如何调用
    `sleep`？时间可以以秒为单位给出。时间也可以以毫秒和微秒为单位，通过在这里稍作更改，但现在我们关注秒。因此，这里我只给出 1。这意味着它是一秒。让我上传这个代码。


    你可以看到在 shell 中，它开始打印。每秒打印一次 Hello。它仍在继续打印。我中断。要停止打印，我将中断程序。


    有一个快捷键，即键盘中断。那就是 Control + C。我可以看到程序已经通过键盘中断被中断。现在你可以看到它没有打印，对吧？我将更改它。比如两秒，它可能再次渲染。现在你可以看到每两秒打印一次
    Hello。软重启。这个 ESP 32。还有另一个快捷键，即在键盘上按 Control + B。我可以看到它已经软重启了。'
