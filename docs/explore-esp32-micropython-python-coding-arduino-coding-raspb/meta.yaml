- md: "## DEVELOPING AND DEBUGGING ESP32 IOT APPLICATIONS USING ESPRESSIF ECLIPSE\
    \ PLUGIN\n\nEspressif is most well known for the ESP8266 and ESP32 Wi-Fi enabled\
    \ microcontrollers, which offer a very accessible way to start an IoT project.\
    \ These chips are used in consumer devices, such as smart home devices and appliances,\
    \ and some industrial applications, for example, in data collection gateways and\
    \ so on.\n\nEspressif itself is based in Shanghai and has offices in China, India,\
    \ and in Europe, in the Czech Republic, with employees working remotely from seven\
    \ other countries as well. If you aren't yet familiar with the specific products,\
    \ I'll briefly introduce them on the next slide. Wi-Fi and Bluetooth enabled microcontrollers\
    \ or systems on chip (SoC), as we call them, are the specific main product. I'll\
    \ show the comparison of the SoCs we have right now on the next slide. But the\
    \ ones that we need to keep in mind are the ESP8266, ESP32, and ESP32-S2 based\
    \ SoCs.\n\nEspressif also designs modules, which integrate additional components,\
    \ such as SPI flash and RAM, and some passive components. These modules go through\
    \ a certification process and do not require too much effort to be integrated\
    \ into products.\n\nNext, the development boards. These are based again on Espressif\
    \ chips and modules, and they include other components such as power supplies,\
    \ debugging interfaces, USB connectors, and so on. Shown here is the ESP32-DevKitC,\
    \ which is a very common and simple design. There are also many third-party development\
    \ boards, which are based on a single form factor. Other development boards include\
    \ displays, sensors, audio codecs, and so on.\n\nNext, on the software side, Espressif\
    \ provides free software development kits, which can be downloaded from GitHub\
    \ for all of our products. Typically these SDKs are built around a real-time operating\
    \ system and they include other application libraries, book or peripheral device\
    \ drivers, wireless and TCP/IP stacks, file systems, and some high-level protocol\
    \ libraries. I'll tell you more about one of the SDKs, the ESP-IDF, in a minute.\n\
    \nThe most recent addition to Espressif's software is the cloud solution, ESP\
    \ RainMaker. It provides end-to-end connectivity between an IoT device, the cloud,\
    \ and the smartphone app, making it really easy to prototype and deploy applications.\
    \ We're not going to go into ESP RainMaker in this talk, but if you're interested,\
    \ check out Espressif's website for details.\n\n## Overview of ESP8266, ESP32,\
    \ ESP32-S2\n\n| Specifications | ESP8266 | ESP32 | ESP32-S2 |\n| :--- | :--- |\
    \ :--- | :--- |\n| MCU | Single core Xtensa CPU up to 160MHz clock | Dual core\
    \ Xtensa CPU up to 240MHz clock | Single core Xtensa CPU up to 240MHz clock |\n\
    | Internal Memory (IRAM+DRAM) | 160kB | 520kB | 320kB |\n| Connectivity | Wi-Fi\
    \ 802.11bgn (HT20) | Wi-Fi 802.11bgn (HT40) Dual mode BT/BLE 4.2 Ethernet | Wi-Fi\
    \ 802.11bgn (HT40) |\n| External Memory | Up to 16MB SPI flash, (1MB executable\
    \ XIP) | Up to 16MB SPI flash, (4MB XIP), Up to 4MB SPI RAM | Up to 1GB SPI flash,\
    \ (7MB XIP, 4MB rodata), Up to 10MB SPI RAM |\n| Peripherals | GPIO, SPI, UART,\
    \ I2S, ADC | GPIO, SPI, UART, I2C, I2S, PWM, ADC, DAC, RMT, CAN, SD host/slave,\
    \ low-power coprocessor | GPIO, SPI, UART, I2C, I2S, PWM, ADC, DAC, RMT, USB,\
    \ low-power coprocessor |\n| Hardware Security Features | | SHA2, RSA, AES accelerators\
    \ Transparent flash decryption Secure boot 1024 bit OTP | SHA2, RSA, AES, HMAC\
    \ accelerators Transparent flash/RAM en/decryption (AES-XTS) RSA-PSS Secure boot\
    \ 4096 bit OTP |\n\nLet's have a quick look at the ESP8266, the ESP32, and how\
    \ they compare to each other. As you see, all these microcontrollers have on the\
    \ order of a few hundred kilobytes of RAM, a 160 to 240 megahertz CPU frequency,\
    \ and a variety of different peripherals. The code is typically stored in external\
    \ SPI flash memory. And also additional external SPI RAM can be connected to the\
    \ ESP32 and ESP32-S2.\n\n## ESP32-S2 is the first SoC in ESP32-S series:\n\n-\
    \ 32-bit Xtensa® CPU, up to 240 MHz frequency.\n- 320kB internal RAM, External\
    \ Flash and PSRAM support.\n- 802.11 b/g/n Wi-Fi\n- Hardware cryptography and\
    \ security features: AES, SHA, RSA, HMAC accelerators, transparent AES-XTS encryption/decryption\
    \ of PSRAM and Flash, RSA-PSS based secure Boot, digital signature, 4 kbit OTP\
    \ key storage, TRNG.\n- Rich peripheral set: GPIO, UART, SPI, I2C, I2S, PWM, RMT,\
    \ Timers, pulse counters, ADC, DAC, touch sensors, parallel LCD and camera interface,\
    \ etc.\n\nHere are some more details about the ESP32-S2, which was launched this\
    \ year. Compared to the ESP32, it has improved cryptographic accelerators and\
    \ physical security features. It has larger OTP key storage. It has a hardware\
    \ digital signature module, in addition to the flash encryption and secure boot,\
    \ which were present in the ESP32. The microcontroller has a wide range of peripherals\
    \ and these can be multiplexed to any of 42 general purpose I/Os. Espressif has\
    \ a couple of development boards, which make it easier to start a project based\
    \ on the ESP32-S2. For example, here on the left, you see the ESP32-S2-Saola-1.\n\
    \nSo that's it for the hardware part and the introduction. Let's move on to the\
    \ ESP-IDF.\n\n## Espressif IoT Development Framework (ESP-IDF)\n\nEspressif **IoT\
    \ Development Framework** (ESP-IDF) is the official development framework for\
    \ the ESP32 and ESP32-S series of chips.\n\nKey facts:\n\n- development in C and\
    \ C++\n- 11 major and minor releases since 2016, over 50 releases in total,\n\
    - 30 month support policy for new releases since v4.1,\n- over 70 components/libraries,\n\
    - over 200 example projects,\n- online documentation: API reference and guides\n\
    \nThe Espressif IoT Development Framework, ESP-IDF, has been in development by\
    \ Espressif since 2016. As I mentioned before, it is built around FreeRTOS real-time\
    \ operating system. The framework, written in C and C++, contains more than 70\
    \ libraries, we call them components. These components can cover many areas, for\
    \ example, drivers, security, file systems, utilities, networking, provisioning,\
    \ debugging, and probably some others. There is a large number of examples and\
    \ we have online reference documentation. Major and minor releases are maintained\
    \ for three months and we do prepare the bug fix releases.\n\n## ESP-IDF without\
    \ an IDE\n\nESP-IDF was initially developed around a set of command line tools:\n\
    \n- CMake build system\n- Kconfig configuration tools\n- Compilers, debuggers\n\
    - Various Python helper scripts:\n  *downloading and installation, code generation,\
    \ file format conversion, code and binary analysis, security related features,\
    \ flashing the code to the development board, profiling, tracing, etc.*\n\nOur\
    \ goal is to integrate all these tools into an IDE.\n\nSo what's inside? ESP-IDF\
    \ is built around a set of command line tools, such as CMake, Kconfig configuration\
    \ tools. It's the same tool set that is used in Linux kernel and other real-time\
    \ operating system projects, such as NuttX. For configuration, GCC compiler, GDB\
    \ debugger, and also multiple Python scripts, which are either driven by CMake,\
    \ for example, for code generation, or invoked by the user directly, like in the\
    \ case of flashing the application to the development board or setting up some\
    \ security related features or doing tracing or debugging. And the goal is to\
    \ integrate all these tools into the IDE."
  mdcn: "## 使用乐鑫Eclipse插件开发和调试ESP32物联网应用\n\n乐鑫以其ESP8266和ESP32 Wi-Fi微控制器而闻名，这些芯片为启动物联网项目提供了一种非常便捷的方式。这些芯片被用于消费设备，例如智能家居设备和电器，以及一些工业应用，例如数据采集网关等。\n\
    \n乐鑫本身总部位于上海，在中国、印度和欧洲的捷克共和国设有办事处，员工也在其他七个国家远程工作。如果您还不熟悉具体产品，我将在下一张幻灯片中简要介绍它们。Wi-Fi和蓝牙微控制器，或我们称之为片上系统（SoC），是主要的具体产品。我将在下一张幻灯片中展示我们目前SoC的对比。但我们需要记住的是基于ESP8266、ESP32和ESP32-S2的SoC。\n\
    \n乐鑫还设计模块，这些模块集成了额外的组件，如SPI闪存和RAM，以及一些无源组件。这些模块经过认证流程，无需太多努力即可集成到产品中。\n\n接下来是开发板。这些开发板再次基于乐鑫的芯片和模块，它们还包括其他组件，如电源、调试接口、USB连接器等。这里展示的是ESP32-DevKitC，这是一个非常常见且简单的设计。还有许多第三方开发板，它们基于单一的外形尺寸。其他开发板还包括显示屏、传感器、音频编解码器等。\n\
    \n接下来，在软件方面，乐鑫提供免费的软件开发套件，可以从GitHub下载，适用于我们所有的产品。通常，这些SDK围绕实时操作系统构建，并包括其他应用库、板级或外设驱动程序、无线和TCP/IP协议栈、文件系统以及一些高级协议库。我稍后将详细介绍其中一个SDK，即ESP-IDF。\n\
    \n乐鑫软件的最新补充是云解决方案ESP RainMaker。它提供了物联网设备、云和智能手机应用程序之间的端到端连接，使得原型设计和部署应用程序变得非常容易。我们在这次演讲中不会深入探讨ESP\
    \ RainMaker，但如果您感兴趣，请访问乐鑫网站了解详情。\n\n## ESP8266、ESP32、ESP32-S2概述\n\n| 规格 | ESP8266\
    \ | ESP32 | ESP32-S2 |\n| :--- | :--- | :--- | :--- |\n| MCU | 单核Xtensa CPU，最高160MHz时钟\
    \ | 双核Xtensa CPU，最高240MHz时钟 | 单核Xtensa CPU，最高240MHz时钟 |\n| 内部存储器（IRAM+DRAM） |\
    \ 160kB | 520kB | 320kB |\n| 连接性 | Wi-Fi 802.11bgn (HT20) | Wi-Fi 802.11bgn (HT40)\
    \ 双模BT/BLE 4.2 以太网 | Wi-Fi 802.11bgn (HT40) |\n| 外部存储器 | 最高16MB SPI闪存，（1MB可执行XIP）\
    \ | 最高16MB SPI闪存，（4MB XIP），最高4MB SPI RAM | 最高1GB SPI闪存，（7MB XIP，4MB只读数据），最高10MB\
    \ SPI RAM |\n| 外设 | GPIO, SPI, UART, I2S, ADC | GPIO, SPI, UART, I2C, I2S, PWM,\
    \ ADC, DAC, RMT, CAN, SD主机/从机，低功耗协处理器 | GPIO, SPI, UART, I2C, I2S, PWM, ADC, DAC,\
    \ RMT, USB, 低功耗协处理器 |\n| 硬件安全特性 | | SHA2, RSA, AES加速器 透明闪存解密 安全启动 1024位OTP | SHA2,\
    \ RSA, AES, HMAC加速器 透明闪存/RAM加/解密（AES-XTS） RSA-PSS 安全启动 4096位OTP |\n\n让我们快速看一下ESP8266、ESP32以及它们之间的比较。如您所见，所有这些微控制器都有几百KB的RAM，160到240兆赫兹的CPU频率，以及各种不同的外设。代码通常存储在外部SPI闪存中。此外，ESP32和ESP32-S2还可以连接额外的外部SPI\
    \ RAM。\n\n## ESP32-S2是ESP32-S系列中的第一款SoC：\n\n- 32位Xtensa® CPU，最高240 MHz频率。\n- 320kB内部RAM，支持外部Flash和PSRAM。\n\
    - 802.11 b/g/n Wi-Fi\n- 硬件加密和安全特性：AES、SHA、RSA、HMAC加速器，PSRAM和Flash的透明AES-XTS加/解密，基于RSA-PSS的安全启动，数字签名，4\
    \ kbit OTP密钥存储，TRNG。\n- 丰富的外设集：GPIO、UART、SPI、I2C、I2S、PWM、RMT、定时器、脉冲计数器、ADC、DAC、触摸传感器、并行LCD和摄像头接口等。\n\
    \n以下是关于今年推出的ESP32-S2的更多细节。与ESP32相比，它改进了加密加速器和物理安全特性。它拥有更大的OTP密钥存储。除了ESP32中已有的闪存加密和安全启动外，它还具有硬件数字签名模块。该微控制器具有广泛的外设，这些外设可以复用到42个通用I/O中的任何一个。乐鑫有几款开发板，使得基于ESP32-S2开始项目变得更加容易。例如，左边这个，您看到的是ESP32-S2-Saola-1。\n\
    \n以上就是硬件部分和介绍。让我们继续介绍ESP-IDF。\n\n## 乐鑫物联网开发框架（ESP-IDF）\n\n乐鑫**物联网开发框架**（ESP-IDF）是ESP32和ESP32-S系列芯片的官方开发框架。\n\
    \n关键事实：\n\n- 使用C和C++开发\n- 自2016年以来发布了11个主要和次要版本，总共超过50个版本，\n- 自v4.1起，新版本支持30个月，\n\
    - 超过70个组件/库，\n- 超过200个示例项目，\n- 在线文档：API参考和指南\n\n乐鑫物联网开发框架（ESP-IDF）自2016年以来一直由乐鑫开发。正如我之前提到的，它围绕FreeRTOS实时操作系统构建。该框架用C和C++编写，包含超过70个库，我们称之为组件。这些组件可以涵盖许多领域，例如驱动程序、安全、文件系统、实用程序、网络、配置、调试，可能还有一些其他领域。有大量的示例，我们有在线参考文档。主要和次要版本维护三个月，我们确实会准备错误修复版本。\n\
    \n## 不使用IDE的ESP-IDF\n\nESP-IDF最初是围绕一组命令行工具开发的：\n\n- CMake构建系统\n- Kconfig配置工具\n\
    - 编译器、调试器\n- 各种Python辅助脚本：\n  *下载和安装、代码生成、文件格式转换、代码和二进制分析、安全相关功能、将代码烧录到开发板、性能分析、跟踪等。*\n\
    \n我们的目标是将所有这些工具集成到IDE中。\n\n那么里面有什么呢？ESP-IDF围绕一组命令行工具构建，例如CMake、Kconfig配置工具。这与Linux内核和其他实时操作系统项目（如NuttX）中使用的工具集相同。配置方面，有GCC编译器、GDB调试器，以及多个Python脚本，这些脚本要么由CMake驱动（例如用于代码生成），要么由用户直接调用（例如将应用程序烧录到开发板或设置一些安全相关功能或进行跟踪或调试）。目标是将所有这些工具集成到IDE中。"
