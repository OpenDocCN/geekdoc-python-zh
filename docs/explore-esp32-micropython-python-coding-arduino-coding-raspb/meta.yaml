    # PYTHON VS MICROPYTHON - COMPARE & ACCESS


    Programming is something that every modern maker should have some grasp of. Figuring
    out exactly what program is best for your particular purpose can be half of the
    battle. I''ve had a chat previously about programming, but as an overview, programming
    is simply the process of creating instructions for a computing device to comprehend
    and execute. These instructions are referred to as software. Once the software
    program is run, the computing device will perform the specified task. The programming
    language is a set of commands, directives, and other syntaxes, which gives you
    a vocabulary to create these software programs.


    Now, Python and MicroPython are powerhouse programming languages. Each language
    can support your programming needs to almost the limits of your imagination. Both
    languages are portable, open source, growing in popularity, comparatively easy
    to use, and free. They also have similar syntax, keywords, and operators. So how
    exactly do they differ from each other?


    The biggest factor is that Python, because of its intensive processing demands,
    requires a full-sized computer, laptop, or cloud server to run effectively. In
    contrast, the hardware requirements of MicroPython are orders of magnitude lower.
    This means MicroPython can operate effectively on microcontrollers and microprocessors.
    To clarify, a microcontroller is a compact integrated circuit designed to govern
    a specific operation inside an embedded system. To illustrate, I brought an Arduino
    UNO, which is a perfect example of this. A microprocessor, on the other hand,
    is an integrated circuit that contains all the functions of a central processing
    unit of a computer, which includes an operating system. To demonstrate this, I
    brought to the table a Raspberry Pi 4 Model B 8GB, which is a perfect example
    of a microprocessor. Both these devices can easily fit in the palm of your hands
    and encourage makers'' rainbows of creativity.


    Now, with most recent modern technology, this concept of MicroPython for credit-card-sized
    computers, whereas Python for large computational devices, this concept has just
    not become so cut and dry. Some microprocessors have become so powerful they can
    functionally run Python. The newest Raspberry Pi 4 Model B 8GB is a perfect example.


    So what does it take to make a streamlined, slimmed-down Python? Start by ripping
    out heaps of libraries, leaving only a subset of libraries. A module is a Python
    object with an arbitrarily named attribute, which you can bind and reference.
    Simply, a module is a file consisting of Python code. A library is a collection
    of a whole bunch of these modules. Furthermore, of the few libraries left, remove
    unnecessary functions and classes that come with Python. A function is a bulk
    of code which only runs when it''s called. Classes are essentially a template
    to determine variables and functions of objects. Objects are simply collections
    of data. Some features that will not cater well to constrained systems are also
    removed, and some freedoms with syntax are eliminated.


    This is a simplification of what Damien George, an Australian programmer and physicist,
    did in 2014, turning Python into what we see today as MicroPython. These changes
    mean MicroPython is an extremely compact programming language that takes up less
    than a megabyte of storage space and on boot utilizes only around 16 kilobytes
    of RAM.


    If you''re interested in each and every detail at a highlight, come take a look
    at the write-up on this topic, where I go very deep into this. Jumping into the
    computer, you can see on one of the Core Electronics website, here''s a particular
    write-up. And if you jump on a deep dive on differences between Python and MicroPython,
    it will talk about the real nitty-gritty details between Python and MicroPython.


    Both Python and MicroPython programming languages are free to download and use.
    Jumping over here, you can see where you can download Python, and jumping over
    here, you can see where you can download MicroPython. They are also open source,
    so that gives individuals the freedom to modify, contribute, and propose improvement.
    There are also online, browser-based emulators for both Python and MicroPython,
    and so you don''t even need to download anything to experience these languages.


    Also, if you''re interested in micro-boards that will run MicroPython brilliantly,
    come back to that webpage that I showed you before, and under MicroPython compatible
    boards, you''ll see a whole bunch of micro-boards that will run MicroPython.


    # MicroPython for ESP32


    This is indeed the coveted just-before-lunch slot. Um, so if any of you feel yourself
    kind of slowly slumping over, I won''t take it personally. It''s the way these
    things go. So I''m here to talk about the ESP32 port of MicroPython. Um, we''ve
    talked about MicroPython as a project overall. From Damien, talked about some
    specific applications of MicroPython as a great way to prototype stuff. I''m Anna,
    and I''m coming here talking about this ESP32 port, which I''m really, really
    excited about. So it''s great to be able to come and talk about it to you.


    Um, there''s some background about MicroPython, but it''s probably not all that
    necessary since we''ve already kind of covered that fairly well. But for anyone
    who wasn''t here before, it''s a reimplementation of Python. I''d say it''s Python
    because it''s very much like all the other Pythons. And if you know how to program
    Python, you know how to program MicroPython. It runs on small controller boards
    of various kinds, including the Pyboard and the micro:bit, and these ESP8266 systems-on-a-chip
    that have become very popular recently. And now it''s got a port to the ESP32.'
