    # Main challenges in IDE integration


    +   1. Command line tools need “machine” output mode, e.g. JSON output instead
    of human-readable, progress reporting

    2. IDE should take over most of SDK installation process. Harder to troubleshoot
    is anything goes wrong (Python interpreters etc.)

    3. Automated testing of IDE features is trickier than of the equivalent command
    line tools.


    I''d like to finish my part of the talk by mentioning a few challenges we met
    when adapting the CLI tooling to, uh, ID. Okay. Uh, the first is that the command
    line tools, uh, had to be augmented with a machine output mode, for example, to
    produce Jason output instead of a human readable list or a table. Uh, this is
    especially tricky if the tool is running some lengthy operation because, uh, progress
    reporting needs to be implemented. Um, and the, the other, the other case is propagating
    errors from the COI. To the user so that these errors, they, uh, they can be,
    uh, found in the ID perspective.'
