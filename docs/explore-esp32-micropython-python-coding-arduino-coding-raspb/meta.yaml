  md: '# Overview of ESP8266, ESP32, ESP32-S2


    | Specifications | ESP8266 | ESP32 | ESP32-S2 |

    | :--- | :--- | :--- | :--- |

    | MCU | Single core Xtensa CPU up to 160MHz clock | Dual core Xtensa CPU up to
    240MHz clock | Single core Xtensa CPU up to 240MHz clock |

    | Internal Memory (IRAM+DRAM) | 160kB | 520kB | 320kB |

    | Connectivity | Wi-Fi 802.11bgn (HT20) | Wi-Fi 802.11bgn (HT40) Dual mode BT/BLE
    4.2 Ethernet | Wi-Fi 802.11bgn (HT40) |

    | External Memory | Up to 16MB SPI flash, (1MB executable XIP) | Up to 16MB SPI
    flash, (4MB XIP), Up to 4MB SPI RAM | Up to 1GB SPI flash, (7MB XIP, 4MB rodata),
    Up to 10MB SPI RAM |

    | Peripherals | GPIO, SPI, UART, I2S, ADC | GPIO, SPI, UART, I2C, I2S, PWM, ADC,
    DAC, RMT, CAN, SD host/slave, low-power coprocessor | GPIO, SPI, UART, I2C, I2S,
    PWM, ADC, DAC, RMT, USB, low-power coprocessor |

    | Hardware Security Features | | SHA2, RSA, AES accelerators Transparent flash
    decryption Secure boot 1024 bit OTP | SHA2, RSA, AES, HMAC accelerators Transparent
    flash/RAM en/decryption (AES-XTS) RSA-PSS Secure boot 4096 bit OTP |


