    # PYTHON VS MICROPYTHON - COMPARE & ACCESS


    编程是每个现代创客都应该掌握一些的技能。弄清楚哪种编程最适合你的特定目的，可能就成功了一半。我之前曾聊过编程，但作为概述，编程仅仅是为计算设备创建可理解和执行的指令的过程。这些指令被称为软件。一旦软件程序运行，计算设备就会执行指定的任务。编程语言是一套命令、指令和其他语法，它为你提供了创建这些软件程序的词汇。


    现在，Python 和 MicroPython 都是强大的编程语言。每种语言几乎都能满足你想象力所及的编程需求。这两种语言都是可移植的、开源的、日益普及的、相对易于使用的，并且是免费的。它们还有相似的语法、关键字和运算符。那么它们之间到底有什么不同呢？


    最大的因素是，Python 由于其密集的处理需求，需要一台全尺寸的计算机、笔记本电脑或云服务器才能有效运行。相比之下，MicroPython 的硬件要求要低几个数量级。这意味着
    MicroPython 可以在微控制器和微处理器上有效运行。澄清一下，微控制器是一种紧凑的集成电路，旨在控制嵌入式系统内的特定操作。举例来说，我带来了一个
    Arduino UNO，它就是这方面的完美例子。另一方面，微处理器是一种集成电路，它包含了计算机中央处理器的所有功能，包括操作系统。为了演示这一点，我带来了一个树莓派
    4 Model B 8GB，它是微处理器的完美例子。这两种设备都能轻松放入你的手掌中，并激发创客们五彩斑斓的创造力。


    现在，随着大多数现代技术的发展，MicroPython 用于信用卡大小的计算机，而 Python 用于大型计算设备的这种概念，已经变得不那么绝对了。一些微处理器已经变得如此强大，以至于它们可以有效地运行
    Python。最新的树莓派 4 Model B 8GB 就是一个完美的例子。


    那么，要打造一个精简、瘦身的 Python 需要什么呢？首先，移除大量的库，只保留一个库的子集。模块是一个具有任意命名属性的 Python 对象，你可以绑定和引用它。简单来说，模块就是一个由
    Python 代码组成的文件。库是大量这些模块的集合。此外，在剩下的少数库中，移除 Python 自带的不必要的函数和类。函数是一大块代码，只有在被调用时才会运行。类本质上是确定对象变量和函数的模板。对象只是数据的集合。一些不适合受限系统的特性也会被移除，一些语法上的自由度也被消除了。


    这是澳大利亚程序员和物理学家 Damien George 在 2014 年所做工作的简化，他将 Python 转变成了我们今天看到的 MicroPython。这些变化意味着
    MicroPython 是一种极其紧凑的编程语言，占用的存储空间不到一兆字节，启动时仅使用大约 16 千字节的 RAM。


    如果你对每一个细节都感兴趣，可以来看看这个主题的详细文章，我在其中进行了非常深入的探讨。进入计算机，你可以在 Core Electronics 网站上看到一篇特定的文章。如果你深入了解
    Python 和 MicroPython 之间的差异，它会谈论 Python 和 MicroPython 之间真正的细微差别。


    Python 和 MicroPython 编程语言都可以免费下载和使用。跳到这里，你可以看到在哪里可以下载 Python，跳到这里，你可以看到在哪里可以下载
    MicroPython。它们也是开源的，这给了个人修改、贡献和提出改进的自由。还有基于浏览器的在线模拟器，适用于 Python 和 MicroPython，所以你甚至不需要下载任何东西就能体验这些语言。


    另外，如果你对能出色运行 MicroPython 的微型开发板感兴趣，可以回到我之前展示给你的那个网页，在 MicroPython 兼容开发板下，你会看到一大堆能运行
    MicroPython 的微型开发板。


    # MicroPython for ESP32


    这确实是令人垂涎的午餐前时段。嗯，所以如果你们中有人感觉自己有点慢慢昏昏欲睡，我不会往心里去。事情就是这样。所以我在这里谈论 MicroPython 的 ESP32
    移植版。嗯，我们已经整体讨论了 MicroPython 项目。从 Damien 那里，谈到了 MicroPython 作为原型制作工具的一些具体应用。我是
    Anna，我来这里谈论这个 ESP32 移植版，我对此非常非常兴奋。所以很高兴能来和你们谈谈它。


    嗯，有一些关于 MicroPython 的背景，但可能不那么必要，因为我们已经相当好地涵盖了这些内容。但对于之前不在场的人来说，它是 Python 的一个重新实现。我会说它是
    Python，因为它非常像所有其他的 Python。如果你知道如何用 Python 编程，你就知道如何用 MicroPython 编程。它运行在各种小型控制器板上，包括
    Pyboard 和 micro:bit，以及最近非常流行的 ESP8266 系统级芯片。现在它已经移植到了 ESP32。'
