  mdcn: '## ESP8266 / ESP32


    ![](img/d40136ded51f9470eb7d16c4d668c719_8_0.png)


    ![](img/d40136ded51f9470eb7d16c4d668c719_8_1.png)


    这些芯片是什么？ESP8266，你可能看不太清楚，因为它确实很小，是一个集成了板载Wi-Fi和各种其他外设的小型片上系统。实际上，在我深入介绍之前，它们是由一家名为**乐鑫**的公司制造的，这是一家非常出色的制造商。我认为乐鑫特别有趣的一点是，他们是最早真正拥抱开源世界的中国制造商之一。他们在开源社区非常活跃，对我们的开源开发工作非常支持。这真的很棒，我认为这对他们来说也是一个巨大的优势。8266
    成为了一个真正的爱好者热门产品，部分原因是它本身功能非常强大，部分原因是你可以以大约 2 美元的价格买到它们。乐鑫从中学习了很多。他们从人们用 8266 做的事情中获得了大量灵感，其中许多相当有趣，但人们确实从中获得了很大乐趣。人们尝试了很多东西，将很多有趣的东西组合在一起，而公司能够从中学习，并将大量知识整合到
    ESP32 中。


    ## Espressif ESP32


    | Arduino | ESP8266 | ESP32 | RPi 0 W |

    | :--- | :--- | :--- | :--- |

    | AVR ATmega328P | Tensilica Xtensa LX106 | Tensilica Xtensa LX6 | ARM BCM 2835
    |

    | 8 位 | 32 位 | 32 位 | 32 位 |

    | 1 核 | 1 核 | 2 核加 ULP | 1 核加 GPU |

    | 20 MHz | 80-160 MHz | 240 MHz | 1 GHz |

    | 2 KB RAM | 160 KB RAM | 520 KB RAM | 512 MB RAM |

    | 32 KB Flash | 4 MB Flash | 16 MB Flash | MicroSD |


    正如我之前提到的，8266 最初是作为 Arduino 等设备的 Wi-Fi 附件而崭露头角，直到有人查看规格表后意识到，它实际上比它所辅助的 Arduino
    强大好几倍。这种关系似乎有点可笑，也许我们应该直接为 8266 开发。它有一个相当不错的基于 C 的 SDK，入门并不难。但确实存在一定的入门门槛。幸运的是，有人，Damien，将
    MicroPython 移植到了它上面。我发现了这个，当时我刚开始为 8266 开发一些东西。我记得是在 LinuxCon Japan 之后，我对整个 8266
    芯片和重新编写 C 代码感到非常兴奋。我已经很久没写 C 了。就在重新编写 C 代码的新鲜感和兴奋感开始消退时，MicroPython 出现了。于是我转向了
    MicroPython，觉得这是有史以来最酷的东西。我越来越投入，越来越兴奋。然后我开始用它工作，接着又开始用 C 工作。如此循环，不过没关系。所以，继 8266
    之后，现在有了 ESP32。正如我之前所说，它从人们所做的事情中汲取了大量灵感。它更强大。同样，它有两个 CPU，因为除了一个 CPU 核心外，还有一个超低功耗处理器，这是一个非常酷的小配件。它就像一个非常小、非常慢的处理器，刚好有足够的能力在发生有趣的事情时唤醒其他
    CPU，如果你使用电池供电，这非常重要。它的时钟频率稍快。对我们来说最重要的是，它拥有更多的 RAM。520 KB 对现代开发者来说听起来不算多。我昨天安装了一些软件来做机器学习，下载了大约半太字节的数据到我的笔记本电脑上才安装完成。但对于
    Python，对于 MicroPython 来说，这已经足够使用了。8266 上的 160 KB 余量足以运行 MicroPython，但你的应用程序很容易碰到那个限制。520
    KB 给了我们一些喘息的空间。它还有更大的 Flash，这非常好。这些设备比像 RPi Zero W 这样的设备功能弱得多，后者是你可能想到的下一个级别。那是无线
    Pi Zero，它拥有更强大的 CPU，运行速度更快，内存更多，扩展能力也更强，比如 Flash 等。但是，它提供了一个中间地带。在 8 位 Arduino
    AVR 世界和 RPi 世界之间，出现了一个有趣的市场细分。ESP32 非常有趣，因为它除了你所知道的 Wi-Fi 功能外，还具有蓝牙功能，这非常方便。如今很多设备都支持各种
    BLE，非常适合与移动设备和其他传感器等通信。它比 8266 有更多的 IO 线，这非常方便。它有多个模拟输入。正如 Anna 提到的，8266 只有一个模拟输入，有时会有点烦人。ESP32
    你可以配置多达八个模拟输入，而且实际上可以在引脚之间切换，这很酷。它还有一个数模转换器，这很方便，以及各种引脚的脉宽调制。他们做了一件非常有趣的事情：在芯片内部集成了一个电容式触摸感应电路。所以有八个电容式触摸传感器。如果你的项目想要一个触摸界面而不是按钮界面，这非常容易实现。你不需要任何外部组件，只需要一块铜片，这是一个非常好的特性。


    这真的很有趣，它告诉你一些关于他们方法的非常有趣的事情。这可能不是市面上最便宜的片上系统，但如果你不需要板上的其他芯片，它们仍然可以竞争。所以这是一种非常有趣的思考方式。同样，有那个超低功耗处理器，甚至还有像整个霍尔效应传感器这样的东西内置在芯片中。我认为这很酷。很少有人需要它。然而它就在那里。制造起来很容易，只是芯片上的另一块硅。如果你的应用程序出于某种原因需要一个大电流测量设备，你可以将电路板布局成让电源线正好经过处理器，你就能在霍尔效应传感器上看到信号。这很酷，又少了一个组件。


    ![](img/d40136ded51f9470eb7d16c4d668c719_11_0.png)


    一个名为 Zeptobars 的俄罗斯团队非常擅长将芯片放在酸中煮沸，然后在显微镜下拍照。所以这实际上是一张 ESP32 去封装后的照片。它让你对这些芯片架构的疯狂程度有了一些了解。


    ![](img/d40136ded51f9470eb7d16c4d668c719_12_0.png)


    如果你放大那个顶角，你实际上可以看到这个东西的电路、线圈和制造硬件无线电的部件。我认为这非常迷人，你实际上可以做到这一点。你可以用硅制造线圈、布线和电路，它们就在芯片上。


    ![](img/d40136ded51f9470eb7d16c4d668c719_12_1.png)


    它实际上相当美丽，以一种奇怪的方式……我不知道……它让我想起了那些老游戏中的地图，比如 Quake 之类的，有圆圈、路径和所有那些东西。这真的很惊人，这是我们如今能做到的事情。我认为你通常不会单独购买它作为一个独立的小硅片，因为坦率地说，引脚太小了，你甚至看不见它们，但它们以这种模块的形式提供，更容易焊接。它们在边缘有
    0.1 英寸的间距。所以如果你努力的话，实际上可以手工焊接它们。它们是非常方便的小芯片。那个小的 RF 屏蔽罩，顶部的那个标签，是内置天线。所以你甚至不需要处理任何不是数字
    3.3 伏线路的东西。哦，对不起。Flash 存储器也在那个小金属罩下面。所以基本上所有东西都为你准备好了，使用起来相当容易。


