- md: '## ESP32 开发板介绍


    ESP32 开发板也带有 ESB 接口，支持电池供电，称为 ESP32。它是 Feather 系列的一部分。它价格更高，但提供了大量附加功能板，例如实时时钟、SD
    卡、显示屏、GPS 等。另一款开发板是 PiComm YP2.0，它紧凑，带有 RGB LED，并提供外部天线选项。


    ESP32 专为高效的 Wi-Fi 和蓝牙（包括低功耗蓝牙 BLE）设计。它拥有强大的 240 MHz 双核微控制器，配备 520 KB 的 SRAM。该芯片专为移动设备设计，因此具有超低功耗。它有
    32 个 GPIO 引脚，支持 I2C、I2S、SPI 和 UART。此外，它还具有多个模数转换通道、数模转换、硬件加速加密、脉宽调制、电容触摸接口以及更多功能。内置的
    Wi-Fi 使 ESP32 成为物联网设备（如传感器、输入设备和继电器）的绝佳解决方案。如果有兴趣，我可能会将这个项目发展成一个系列，详细演示如何将传感器连接到
    ESP32，并使用 MQTT 等网络消息协议将数据报告回树莓派。


    我喜欢 ESP32 的一个主要原因是你可以用 Python 编程，更具体地说是 MicroPython。这是 Python 3 编程语言的一个非常高效、精简的版本，针对在
    ESP32 等微控制器上运行进行了优化。树莓派对许多项目来说都很棒，但它是一台功能齐全的计算机，运行 Linux 操作系统。对于简单、重复的任务，例如监控传感器和控制继电器，使用微控制器通常更容易、更便宜、更可靠、更高效。微控制器可以即时启动并直接运行你的程序。特别是如果你的项目使用电池或太阳能，因为
    ESP32 所需的功耗只是树莓派的一小部分。此外，许多传感器都有接口问题，尤其是在较长的导线上。更可靠的方法是用短线将传感器连接到 ESP32，然后使用以太网或无线协议传输结果。


    要开始使用，需要将 MicroPython 固件上传到 ESP32。这可以通过一根简单的 USB 线完成，它在树莓派和 ESP32 之间提供双向串行接口。它还提供
    5V 电源。在面包板上，我有一个 ESP32 分线板。旁边是一块旧的树莓派 B+，但任何树莓派都应该可以工作。我会将 USB 线的一端插入树莓派，另一端插入
    ESP32 板上的 micro USB 端口。红灯表示它已通电。


    现在进行软件设置。首先，请确保树莓派是最新的。在终端中输入 `sudo apt-get update` 和 `sudo apt-get upgrade`。使用最新版本的
    Raspbian Jessie 以确保你拥有所有必要的软件。一个名为 `esptool` 的实用程序将用于上传 MicroPython 固件。它使用 `sudo
    pip3 install esptool` 安装。我使用 `pip3` 来针对 Python 3。好的，安装成功了。现在输入 `dmesg | grep ttyUSB`。


    这显示一个 CP210x UART USB 桥接器连接到端口 ttyUSB0。一些设备在使用 esptool 之前需要使用板上的按钮进入编程模式。然而，我发现
    ESP32 不一定需要这样做，至少我这块板不需要。要测试连接，请输入 `esptool.py --port /dev/ttyUSB0 flash_id`。此命令查询
    ESP32 的基本信息，例如芯片类型 ESP32 和闪存大小 4MB。


    看起来一切正常。在上传固件之前，建议擦除芯片。我将使用上箭头键调用上一个 esptool 命令，并将 `flash_id` 更改为 `erase_flash`。这给了我们一个空白状态。好的，芯片擦除成功完成。需要一份
    MicroPython 固件的副本。你可以从 GitHub 仓库的源代码自己构建它，但更简单的方法是直接下载每日构建版本。打开网页浏览器并访问 micropython.org。


    点击下载选项卡，点击 ESP32。目前只有一个固件可用于 ESP32，点击下载它。下载完成后关闭浏览器。


    MicroPython 固件构建文件已下载到下载文件夹。`ls` 显示一个很长的文件名，高亮显示该名称并复制到剪贴板，或者调用上一个 esptool 命令。这次将
    `erase_flash` 更改为 `write_flash`。`0` 指定要写入的起始地址。输入 `download/` 作为下载文件夹路径，然后从剪贴板粘贴固件文件名。固件现在正在写入
    ESP32。速度很快，但我会加速播放，这样你就不用等了。验证完成。好的。


    所以开发板应该可以开始编码了。MicroPython 开发板有一个交互式解释器（REPL），这是一个简单的交互式编程环境。它类似于 Python 的 IDLE
    shell。在 ESP32 上，REPL 通过串行连接器访问。


    其他开发板，如 ESP8266（ESP32 非常流行的前身），除了串行 REPL 外，还有一个 Web REPL，允许你通过网络远程编程。此功能尚未在 ESP32
    上实现，还有许多其他功能，但新内容每天都在添加。可能会有更多选项。目前，我们将坚持使用串行。用于编程 ESP32 的同一根 USB 线也可用于访问 REPL。


    任何串行程序，如 PuTTY 或 Screen，都应该可以工作。然而，这些程序不允许你管理 ESP32 的文件系统，而文件系统可用于存储或程序。


    理想情况下，你需要一个提供 REPL 终端并能执行文件系统命令的程序。我尝试过几个程序，目前我最喜欢的是 `rshell`。它可以使用 `sudo pip3
    install rshell` 安装。这个简单的程序将在树莓派上运行，用于访问 ESP32 的 REPL 终端。


    它还提供文件管理功能，用于在树莓派和 ESP32 之间传输和操作文件。安装完成后，要启动 rshell，请输入 `rshell --buffer-size=30
    -p /dev/ttyUSB0`。好的，rshell 正在运行并已连接到 ESP32。当前终端可用于执行文件命令。例如，输入 `boards` 列出所有连接的板。返回一个
    ID 为 `pyboard` 的单板，我们稍后需要将其作为参考。`boot.py` 文件在启动时自动运行，包含用于设置板的底层代码。你通常不想编辑它。但是，你可以添加一个名为
    `main.py` 的文件，如果你需要在启动后运行自己的代码。在 `boot.py` 之后输入 `repl` 以打开 MicroPython 编程环境。终端现在将接受
    Python 命令。`print("Hello, world")` 输出 "Hello world"。让我们尝试一些更有趣的东西。典型的第一个程序是让 LED
    闪烁。我将使用一个 NeoPixel LED。


    这是一个带有内置芯片的 RGB LED，用于控制颜色和亮度。它可以使用单根数据线驱动，并且非常容易连接到 ESP32。一个 5V 引脚提供电源。


    一个 1N4004 二极管用于将 NeoPixel 的电压从 5V 降至 4.3V，这允许 NeoPixel 读取 ESP32 的 3.3V 数据输出。ESP32
    的 3.3V 输出需要至少是 NeoPixel 所需电压的 70%。'
