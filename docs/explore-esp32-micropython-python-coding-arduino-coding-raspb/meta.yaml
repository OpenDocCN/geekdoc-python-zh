- md: '## ESP8266 / ESP32


    ![](img/d40136ded51f9470eb7d16c4d668c719_8_0.png)


    ![](img/d40136ded51f9470eb7d16c4d668c719_8_1.png)


    What are those chips? An ESP8266, which you can''t really see because it''s all
    pretty horrible, is a small system on a chip featuring on-board Wi-Fi and various
    other peripherals. They kind of first, actually, before I get onto that, they''re
    made by a company called Espressif who are a fabulous manufacturer. I think the
    thing that makes Espressif particularly interesting is that they''re one of the
    first of the Chinese manufacturers to really embrace the open source world. They''re
    very active in an open source community. They''re very supportive of our open
    source development efforts. And that''s really great. And I think that''s been
    a great advantage for them as well. The 8266 became a real enthusiast stream,
    partly because it''s very powerful for what it is, partly because you could get
    them for like $2. And Espressif has learned a lot out of that. They''ve taken
    a lot of inspiration from the things people have done with 8266s, many of them
    fairly silly, but nonetheless people have had a lot of fun with them. People have
    tried a lot of things. People have put a lot of interesting stuff together and
    the company has been able to learn from that and combine a lot of that knowledge
    into the ESP32.


    ## Espressif ESP32


    | Arduino | ESP8266 | ESP32 | RPi 0 W |

    | :--- | :--- | :--- | :--- |

    | AVR ATmega328P | Tensilica Xtensa LX106 | Tensilica Xtensa LX6 | ARM BCM 2835
    |

    | 8 bit | 32 bit | 32 bit | 32 bit |

    | 1 core | 1 core | 2 core plus ULP | 1 core plus GPU |

    | 20 MHz | 80-160 MHz | 240 MHz | 1 GHz |

    | 2 KB RAM | 160 KB RAM | 520 KB RAM | 512 MB RAM |

    | 32 KB Flash | 4 MB Flash | 16 MB Flash | MicroSD |


    So as I mentioned before, the 8266 came to prominence as a Wi-Fi accessory for
    Arduinos and things like that until somebody looking at the spec sheets realized
    it was, well, several times as powerful as the Arduino it was helping out. And
    that this relationship seemed a little silly and that perhaps we should just develop
    directly for the 8266 instead. It''s got a reasonably nice C-based SDK. It''s
    not that hard to get started in. But there is a bit of a barrier to entry there.
    And thankfully someone, Damien, ported MicroPython across to it. I discovered
    this, I just started developing some stuff for the 8266. I got really fired up
    about it after LinuxCon Japan, I think it was, got really excited about this whole
    8266 chip and writing C again. And I hadn''t written C in ages. And just as the
    novelty and excitement of writing C again was starting to wear off, MicroPython
    came along. So I lit upon MicroPython and went, this is the coolest thing ever.
    And I got more into it and I got more into it. I got really excited about it.
    And then I started working on it sort of just with it. And then I started running
    C again to work. And so the cycle, but never mind. So yeah, following up on the
    8266, there''s now the ESP32. As I said before, it''s taken a lot of inspiration
    from what people have done. It''s more powerful. Again, there''s two CPUs because
    instead of one CPU core, there''s an ultra-low power processor, which is a really
    cool little accessory. That''s really just like a very small, very slow. It''s
    just got enough power to wake up the other CPUs if something interesting is happening
    and if you''re running on a battery, that''s a really important thing. Runs a
    slightly faster clock rate. Most importantly to us, it''s got a heap more RAM.
    520 KB does not sound like a great amount of RAM to a modern developer. I installed
    some software yesterday to do the machine learning things that downloaded. I went
    and got half a terabyte or something of data onto my laptop just to install. But
    it''s enough to be usable for Python, for MicroPython. 160 KB headroom on the
    8266 isn''t, is plenty enough to run MicroPython, but your applications tend to
    bump into that limit fairly easily. The 520 KB gives us a bit of breathing room.
    It''s also got a bigger flash, which is really nice. These devices are much less
    powerful than something like an RPi Zero W which is the next sort of thing up
    that you might be thinking of. That''s the wireless Pi Zero, that''s a much more
    powerful CPU running at a faster rate. It''s got a lot more memory. It''s got
    a lot more ability to expand with flash and things like that. But yeah, provide
    a little middle ground. It''s an interesting market segment that''s kind of opened
    up between the 8-bit sort of Arduino AVR world and that RPi world. The ESP32 is
    very interesting because it features as well as the Wi-Fi that you know about.
    It''s got Bluetooth, which is really handy. A lot of things these days speak BLE
    of various kinds, is great for talking to mobile devices and other sensors and
    things like that. It''s got more IO lines than the 8266, which is really handy.
    It''s got more than one analog input. As Anna mentioned, there''s only one analog
    input on the 8266, which you can get a little bit annoying at times. The ESP32,
    you can configure like eight of them and you can actually change them between
    pins, which is kind of cool. It''s also got a digital analog converter, which
    is kind of handy, pulse width modulation of various pins. They''ve done a really
    interesting thing. They''ve built a capacitive touch sensing circuit into the
    thing. And so there''s eight capacitive touch sensors. So if your project wants
    to have a touch interface, rather than a button interface, it''s really easy.
    You don''t need any external components, just a piece of copper, which is a really
    good feature.


    It''s a really interesting, it tells you something really interesting about their
    approach. This may not be the cheapest system on a chip out there, but if you
    need no other chips on the board, they can still compete. So it''s a really interesting
    little way of thinking about it. And similarly, there''s that ultra-low power
    processor and there''s even things like there''s a whole Hall effect sensor built
    into the chip. I think that''s pretty cool. Very few people need it. However it''s
    there. It''s easy to make. It''s just another piece of silicon on the die. If
    your application does, for some reason, need a high current measurement device,
    you can just lay your board out so that the processor has the power line running
    right past it. And you''ll see a signal on that Hall effect sensor. That''s kind
    of cool. One less component again.


    ![](img/d40136ded51f9470eb7d16c4d668c719_11_0.png)


    A group of Russians called Zeptobars are very good at boiling chips in acid, and
    taking photos of them under a microscope. So this is actually a picture of a decapped
    ESP32. It gives you some idea of just how crazy the architecture of these chips
    is.


    ![](img/d40136ded51f9470eb7d16c4d668c719_12_0.png)


    If you zoom in on that top corner there, you can actually see the circuitry of
    this thing, the coils and the stuff to make a hardware radio. I think that''s
    quite fascinating that you can actually do this. You can make coils and wiring
    and circuits out of silicon that are right there on the die.


    ![](img/d40136ded51f9470eb7d16c4d668c719_12_1.png)


    And it''s actually quite beautiful in a strange and... I have no... it reminds
    me of maps in those old games, like Quake and things like that with the circles
    and paths and all that stuff. It''s really amazing that this is a thing we can
    do these days. I think you normally wouldn''t buy it as an individual discreet
    little piece of silicon because frankly, the pins are far too small and you can''t
    even see them, but they''re available as these sort of modules, which are much
    easier to solder. They''re on a 0.1 inch sort of pitch on the edge. So you can
    actually hand solder to them if you work at it. And they''re quite a handy little
    chip. That little RF screen, that tab on the top there, is a built-in antenna.
    So you don''t even need to deal with anything that isn''t like a digital 3.3 volt
    line. Oh, sorry. And the flash memory is under that little can as well. So it''s
    all basically there for you to use. It''s quite easy to work with that kind of
    thing.


