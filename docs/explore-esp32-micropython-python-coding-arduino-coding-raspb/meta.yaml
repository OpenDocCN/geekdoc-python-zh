- md: '## Build process and tools


    These tools were all built with command line interface usage in mind. But eventually
    we want them to be a natural part of the integrated development environment. On
    this diagram, you can see the different tools that we have and how they relate
    to the integrated development environment. On the left side, there are tools related
    to installation configuration and the build process.


    The integration between IDE and CMake is pretty standard. But for the other parts
    of the SDK, we had to introduce new user interface and hook into the build process.
    Then on the right side, you see the parts that are related to running the program
    on the development board and to debugging. The GDB integration again is the existing
    part we are using, but for other aspects like size analysis, flashing, serial
    monitor, tracing, we have to implement some custom logic and the UI in the plugin.


    ## Main challenges in IDE integration


    1. Command line tools need “machine” output mode, e.g. JSON output instead of
    human-readable, progress reporting.

    2. IDE should take over most of SDK installation process. Harder to troubleshoot
    if anything goes wrong (Python interpreters etc.).

    3. Automated testing of IDE features is trickier than of the equivalent command
    line tools.


    I''d like to finish my part of the talk by mentioning a few challenges we met
    when adapting the CLI tooling to IDE. The first is that the command line tools
    had to be augmented with a machine output mode, for example, to produce JSON output
    instead of a human-readable list or a table. This is especially tricky if the
    tool is running some lengthy operation because progress reporting needs to be
    implemented. And the other case is propagating errors from the CLI to the user
    so that these errors can be found in the IDE perspective.


    The second one is related to users'' expectations about the installation and onboarding
    process. When we work with CLI tools, multiple installation steps are required.
    For instance, we get some prerequisites, we clone a git repository, we run a certain
    script, we install drivers, we set up environment variables and so on. An IDE
    plugin takes over many of these steps, but at the same time, users get less visibility
    into the underlying process. And it is harder for them and for us to troubleshoot
    if anything goes wrong. So when an IDE or an installer attempts to set everything
    up, expectations are higher and we need to be mindful about collecting enough
    information, enough logs and data about the system, so that in case anything goes
    wrong, we can find the reason.


    And the final one is related to automated testing. Automated testing, I think,
    becomes more challenging for an IDE toolkit compared to a set of command line
    tools. Of course, having the tests for the underlying tools in the first place
    gives us more confidence that the tools themselves work fine, but due to different
    release cycles of the SDK and the IDE plugin, we may need some regressions due
    to the changes in the argument interfaces and so on. So testing becomes very important.
    For a UI-based application, it is often less straightforward than for the command
    line tools. And this is the other thing that we are seeing. This concludes my
    part of the talk and I pass it onto [speaker] to tell us more about the ESP-IDF
    plugin for Eclipse and show how to use it. Thank you.


    Hi, everyone. Welcome to the ESP-IDF Eclipse plugin session. As I went, I already
    spoke about ESP-IDF. I''ll give you a brief idea on the Eclipse plugin for ESP-IDF,
    and then we''ll get into the demo part. So Eclipse plugin is developed based upon
    the Eclipse CDT. Eclipse is one of the most powerful IDEs for developers, it''s
    been used for years, and it has a lot of features which are required for developing
    and debugging the applications. So what we are trying to do here is enhance the
    Eclipse CDT, providing the required features, especially for ESP developers. So
    this plugin is available for Windows, Mac, and Linux platforms. And it supports
    ESP32 and ESP32-S2 applications. Here''s the current status of this plugin: it
    is open source. It should be able to access directly from the GitHub page. So
    if you guys would like to contribute anything back to the plugin, that would be
    great. So we have already released the one major version. Currently we are running
    with the 1.2.3, I would say, which is just a day back. So that supports Eclipse
    2019-09 version, which is a 4.13 version. And if you want, if you guys wanted
    to access the update in Eclipse CDT, you should be able to use the update site,
    or it is also available in the Eclipse Marketplace.


    ## IDF Eclipse Plugin Features


    - Downloading and Installing ESP-IDF

    - ESP-IDF Tools Installation

    - Creating a new CMake IDF Project

    - Create ESP Launch Target with multi-chip support

    - Compiling the Project

    - Flashing the Project

    - Viewing Serial Output


    So here are the set of features it provides. As what we are trying to do is, as
    ESP-IDF is having a set of features, we are trying to simulate all those features
    using an IDE. So quickly, let me get into the demo part. So all right. So I''m
    already having the Eclipse CDT, which is 4.16. So once you have Eclipse ready,
    what the next step would be, you need to install the ESP-IDF Eclipse plugin using
    the update site. So once that is done, then you should be able to see all the
