- md: "The included examples provide a wealth of information to help you get started.\
    \ Now let's build on these examples by adding a temperature humidity sensor and\
    \ a NeoPixel LED to our web server. The DHT22 temperature humidity sensor is connected\
    \ to the ESP32. 3.3 volt power is provided by the ESP32 along with the ground.\
    \ The sensor data line is attached to GPIO15. The NeoPixel LED is also connected.\
    \ 5 volt power from the ESP32 is stepped down to 3.3 volts using a diode. The\
    \ grounds are connected and the data line is attached to GPIO13. Here's what the\
    \ components look like on a small breadboard.\n\nI've already gone over NeoPixels\
    \ and DHT22s in the prior two projects of this series. If you're interested in\
    \ more installation details, please check them out. And my website also has the\
    \ wiring schematics and additional pictures.\n\nBack in Thonny, I have a blank\
    \ Python file. From `microWebSrv` import `MicroWebSrv`. From `machine` import\
    \ `Pin`. From `DHT` import `DHT22`. The sensor is instantiated for the DHT22.\
    \ A route GET handler method is defined called `_httpHandlerDHT`.\n\nA try statement\
    \ wraps the sensor measure call. `t` and `h` are set to the return, temperature\
    \ and humidity. An if check confirms that all instances are float values. If so,\
    \ the variable `data` is set to the format of temperature and humidity. Else,\
    \ an \"invalid reading\" error is recorded and an exception is thrown that the\
    \ sensor cannot be read.\n\nThe response is \"Okay\". The response headers are\
    \ set to \"no-cache\" because we always want to display the latest sensor readings.\
    \ Content type is set to \"text/event-stream\" because I'll be using Server-Sent\
    \ Events to ensure the sensor readings on the webpage are updated. This is a simple\
    \ alternative to WebSockets and is a good fit when the updates only go in one\
    \ direction from the server to the client, although Server-Sent Events do have\
    \ limited browser compatibility compared to the more popular WebSockets. Charset\
    \ is UTF-8 and content is set to the data, which is formatted for the Server-Sent\
    \ Events.\n\nA single route handler is specified for the `/dht` route. Upon a\
    \ GET request, it'll fire the method above to return the DHT22 sensor data. The\
    \ `MicroWebSrv` web server instance is created and passed the route handler and\
    \ the `/www` web path. The `Start` method starts the web server.\n\nI'll save\
    \ the Python file in the documents folder and call it `dht_web.py`. I'll close\
    \ Thonny, exit out of the REPL, and exit out of our shell. `cd` to the documents\
    \ folder where I saved the `dht_web.py` Python file.\n\nNow let's create an HTML\
    \ file to periodically poll the `/dht` route. `nano dht.html` creates a blank\
    \ HTML file. To save time, I'll paste in all the code.\n\nWe've got a basic boilerplate\
    \ HTML file with a few additions. A single `div` with ID `result` will be used\
    \ to display the sensor. This `div` will poll the `/dht` route approximately every\
    \ three seconds, which I believe is the default for Server-Sent Events. Error\
    \ checking ensures that the EventSource is supported by the browser. If so, a\
    \ `source` variable is set to a new `EventSource` and passed the hostname, which\
    \ will be the IP address of the ESP32 followed by `/dht`. `source.onmessage` is\
    \ fired when the EventSource receives new data from the server. It populates the\
    \ `result` div's `innerHTML` with the updated temperature and humidity readings.\
    \ Again, Server-Sent Events may have browser compatibility issues. This simple\
    \ code is just for demonstration purposes.\n\nControl-O saves the HTML file and\
    \ Control-X exits nano. I'll reopen our shell. `ls` shows the `dht.html` file\
    \ and the `dht_web.py` Python file. `cp dht_web.py /board` copies the Python file\
    \ to the root folder of the ESP32. `cp dht.html /board/www` copies the HTML file\
    \ to the `/www` web path folder on the ESP32. `repl` returns to the REPL. `import\
    \ dht_web` starts the web server. No errors this time.\n\nI'll open Chromium on\
    \ the Pi and browse to `http://10.0.7.93/dht.html`. The webpage shows 27.2 degrees\
    \ Celsius and 33.4% humidity and the data updates every few seconds. Since the\
    \ ESP32 has a battery check, the ESP32 board can now be placed anywhere within\
    \ range of my WiFi access point where I want to check temperature and humidity\
    \ via the web.\n\nFor the last example, I'll create a webpage to control the color\
    \ and brightness of a NeoPixel LED. Control-C stops the web server and I'll press\
    \ the reset switch to get a clean start and then press Control-X to exit the REPL.\
    \ Back in Thonny, I have a new blank Python file. The first two imports are the\
    \ same as the previous example. Then from `neopixel` import `NeoPixel` and import\
    \ `json` to manipulate JSON data. Variable `np` instantiates a NeoPixel on pin\
    \ 13. One indicates a single LED. A route handler called `_httpHandlerLEDPost`\
    \ will handle JSON POST content sent using the HTTP client `ReadRequestContent`\
    \ method. A `color` dict will store the posted color data.\n\n```python\nfrom\
    \ microWebSrv import MicroWebSrv\nfrom machine import Pin\nfrom neopixel import\
    \ NeoPixel\nimport json\n\nnp = NeoPixel(Pin(13), 1)\n\ndef _httpHandlerLEDPost(httpClient,\
    \ httpResponse):\n    content = httpClient.ReadRequestContent()  # Read JSON color\
    \ data\n    colors = json.loads(content)\n    blue, green, red = [colors[k] for\
    \ k in sorted(colors.keys())]\n    np[0] = (green, red, blue)\n    np.write()\n\
    \    httpResponse.WriteResponseJSONOk()\n```\n\n`json.loads` converts the JSON\
    \ color content. Blue, green, and red are extracted using this comprehension for\
    \ the color dict. `np[0]` sets the NeoPixel to the specified RGB color. I'm not\
    \ sure if there's a bug in the NeoPixel library or if it's just my NeoPixel LED,\
    \ but the argument order is currently green, red, blue, instead of red, green,\
    \ blue, as it appears in the docs. `np.write()` displays the specified color on\
    \ the LED. `httpResponse.WriteResponseJSONOk()` sends an OK response back to the\
    \ browser.\n\nA single route handler handles the `/led` route for POSTs and fires\
    \ the above route handler method accordingly. The `MicroWebSrv` instance is created\
    \ with the route handler and web path, then `Start` is used to start the web server.\n\
    \nI'll save the file in the documents folder and call it `led_web.py`. I'll close\
    \ Thonny and open a new terminal window. To control the color and brightness,\
    \ I'll use an open-source JavaScript hue color wheel for HTML5 called HueWheel.\
    \ It provides a donut-shaped control that affords color and brightness settings\
    \ for both mouse and touch support. Click `huewheel.min.js`, then click Raw, and\
    \ right-click to save the JavaScript file to the documents folder.\n\nNow let's\
    \ create an HTML webpage to host the color wheel and interact with the Python\
    \ LED route. `cd documents`. `ls` shows the downloaded `huewheel.min.js` JavaScript\
    \ file. `nano led.html` opens a blank HTML file for editing. I'll paste in all\
    \ the HTML code, which is similar to the DHT example. The `huewheel.min.js` file\
    \ is imported. Also, `underscore.js` is imported from a CDN. It will be used to\
    \ throttle the JSON POSTs. The body has a container `div`, which holds a `div`\
    \ for the hue wheel and an info `div`.\n\nThe script defines a `throttleSetColor`\
    \ function, which calls the `_.throttle` method and passes the function `setColor`\
    \ and 400 milliseconds for the wait time. This prevents the page from overloading\
    \ the web server with too many POSTs. `hw` is set to a new `HueWheel`. When the\
    \ wheel changes color or brightness, the `onChange` method is fired and calls\
    \ the `throttleSetColor` function. Most of the other settings are just defaults.\n\
    \nThe `setColor` function will post a specified color to the web server. The info\
    \ `div` displays the current RGB color: red, green, and blue. `colorJSON` stores\
    \ the RGB color data, red, green, and blue, in a JSON-compatible format. `xhr`\
    \ is set to a new `XMLHttpRequest`. `xhr.open` sends the POST to the `http://`\
    \ followed by the ESP32 IP address followed by `/led`. `setRequestHeader` sets\
    \ the content type to `application/json`. `xhr.send` posts the color JSON data.\
    \ This will fire the `/led` route handler on the web server and change the NeoPixel\
    \ LED color.\n\nControl-O to save and Control-X to exit. Back in our shell, `ls`\
    \ shows the `led_web.py` Python code, the `huewheel.min.js` JavaScript library,\
    \ and the `led.html` file."
  mdcn: "包含的示例提供了丰富的信息，帮助你入门。现在，让我们在这些示例的基础上，为我们的网页服务器添加一个温湿度传感器和一个NeoPixel LED。DHT22温湿度传感器连接到ESP32。ESP32提供3.3伏电源和接地。传感器数据线连接到GPIO15。NeoPixel\
    \ LED也已连接。来自ESP32的5伏电源通过一个二极管降压至3.3伏。接地线相连，数据线连接到GPIO13。以下是这些组件在小面包板上的样子。\n\n\
    在本系列的前两个项目中，我已经介绍过NeoPixels和DHT22。如果你对更多安装细节感兴趣，请查看它们。我的网站上也有接线原理图和额外的图片。\n\n\
    回到Thonny，我有一个空白的Python文件。从`microWebSrv`导入`MicroWebSrv`。从`machine`导入`Pin`。从`DHT`导入`DHT22`。为DHT22实例化传感器。定义了一个名为`_httpHandlerDHT`的路由GET处理方法。\n\
    \n一个try语句包裹了传感器的测量调用。`t`和`h`被设置为返回值，即温度和湿度。一个if检查确认所有实例都是浮点值。如果是，变量`data`被设置为温度和湿度的格式。否则，记录一个“无效读数”错误，并抛出一个传感器无法读取的异常。\n\
    \n响应是“Okay”。响应头被设置为“no-cache”，因为我们总是希望显示最新的传感器读数。内容类型被设置为“text/event-stream”，因为我们将使用服务器发送事件来确保网页上的传感器读数得到更新。这是WebSockets的一个简单替代方案，当更新仅从服务器单向发送到客户端时，它非常适用，尽管与更流行的WebSockets相比，服务器发送事件的浏览器兼容性有限。字符集是UTF-8，内容被设置为为服务器发送事件格式化的数据。\n\
    \n为`/dht`路由指定了一个单一的路由处理程序。收到GET请求时，它将触发上述方法以返回DHT22传感器数据。创建了`MicroWebSrv`网页服务器实例，并传入了路由处理程序和`/www`网页路径。`Start`方法启动网页服务器。\n\
    \n我将Python文件保存在documents文件夹中，并将其命名为`dht_web.py`。我将关闭Thonny，退出REPL，并退出我们的shell。`cd`到保存了`dht_web.py`\
    \ Python文件的documents文件夹。\n\n现在让我们创建一个HTML文件来定期轮询`/dht`路由。`nano dht.html`创建一个空白的HTML文件。为了节省时间，我将粘贴所有代码。\n\
    \n我们有一个基本的HTML样板文件，添加了一些内容。一个ID为`result`的单一`div`将用于显示传感器。这个`div`将大约每三秒轮询一次`/dht`路由，我相信这是服务器发送事件的默认设置。错误检查确保浏览器支持EventSource。如果是，一个`source`变量被设置为一个新的`EventSource`，并传入主机名，即ESP32的IP地址后跟`/dht`。当EventSource从服务器接收到新数据时，`source.onmessage`被触发。它用更新的温度和湿度读数填充`result`\
    \ div的`innerHTML`。同样，服务器发送事件可能存在浏览器兼容性问题。这段简单的代码仅用于演示目的。\n\nControl-O保存HTML文件，Control-X退出nano。我将重新打开我们的shell。`ls`显示`dht.html`文件和`dht_web.py`\
    \ Python文件。`cp dht_web.py /board`将Python文件复制到ESP32的根文件夹。`cp dht.html /board/www`将HTML文件复制到ESP32上的`/www`网页路径文件夹。`repl`返回REPL。`import\
    \ dht_web`启动网页服务器。这次没有错误。\n\n我将在树莓派上打开Chromium，并浏览到`http://10.0.7.93/dht.html`。网页显示27.2摄氏度和33.4%的湿度，数据每几秒更新一次。由于ESP32有电池检查，现在可以将ESP32板放置在我的WiFi接入点范围内的任何地方，通过网页检查温度和湿度。\n\
    \n对于最后一个示例，我将创建一个网页来控制NeoPixel LED的颜色和亮度。Control-C停止网页服务器，我将按下重置开关以获得一个干净的开始，然后按Control-X退出REPL。回到Thonny，我有一个新的空白Python文件。前两个导入与之前的示例相同。然后从`neopixel`导入`NeoPixel`，并导入`json`来处理JSON数据。变量`np`在引脚13上实例化一个NeoPixel。1表示单个LED。一个名为`_httpHandlerLEDPost`的路由处理程序将处理使用HTTP客户端`ReadRequestContent`方法发送的JSON\
    \ POST内容。一个`color`字典将存储发布的颜色数据。\n\n```python\nfrom microWebSrv import MicroWebSrv\n\
    from machine import Pin\nfrom neopixel import NeoPixel\nimport json\n\nnp = NeoPixel(Pin(13),\
    \ 1)\n\ndef _httpHandlerLEDPost(httpClient, httpResponse):\n    content = httpClient.ReadRequestContent()\
    \  # Read JSON color data\n    colors = json.loads(content)\n    blue, green,\
    \ red = [colors[k] for k in sorted(colors.keys())]\n    np[0] = (green, red, blue)\n\
    \    np.write()\n    httpResponse.WriteResponseJSONOk()\n```\n\n`json.loads`转换JSON颜色内容。使用这个字典推导式从颜色字典中提取蓝色、绿色和红色。`np[0]`将NeoPixel设置为指定的RGB颜色。我不确定是NeoPixel库有bug还是只是我的NeoPixel\
    \ LED，但参数顺序目前是绿色、红色、蓝色，而不是文档中显示的红色、绿色、蓝色。`np.write()`在LED上显示指定的颜色。`httpResponse.WriteResponseJSONOk()`向浏览器发送一个OK响应。\n\
    \n一个单一的路由处理程序处理`/led`路由的POST请求，并相应地触发上述路由处理方法。创建了`MicroWebSrv`实例，传入路由处理程序和网页路径，然后使用`Start`启动网页服务器。\n\
    \n我将文件保存在documents文件夹中，并将其命名为`led_web.py`。我将关闭Thonny并打开一个新的终端窗口。为了控制颜色和亮度，我将使用一个名为HueWheel的开源JavaScript色轮，适用于HTML5。它提供了一个环形控件，支持鼠标和触摸进行颜色和亮度设置。点击`huewheel.min.js`，然后点击Raw，右键单击将JavaScript文件保存到documents文件夹。\n\
    \n现在让我们创建一个HTML网页来托管色轮并与Python LED路由交互。`cd documents`。`ls`显示下载的`huewheel.min.js`\
    \ JavaScript文件。`nano led.html`打开一个空白的HTML文件进行编辑。我将粘贴所有HTML代码，这与DHT示例类似。导入了`huewheel.min.js`文件。此外，从CDN导入了`underscore.js`。它将用于节流JSON\
    \ POST请求。主体有一个容器`div`，其中包含一个用于色轮的`div`和一个信息`div`。\n\n脚本定义了一个`throttleSetColor`函数，它调用`_.throttle`方法，并传递函数`setColor`和400毫秒的等待时间。这可以防止页面因发送过多POST请求而使网页服务器过载。`hw`被设置为一个新的`HueWheel`。当色轮的颜色或亮度发生变化时，`onChange`方法被触发并调用`throttleSetColor`函数。大多数其他设置只是默认值。\n\
    \n`setColor`函数将指定的颜色发布到网页服务器。信息`div`显示当前的RGB颜色：红色、绿色和蓝色。`colorJSON`以JSON兼容格式存储RGB颜色数据：红色、绿色和蓝色。`xhr`被设置为一个新的`XMLHttpRequest`。`xhr.open`将POST发送到`http://`后跟ESP32的IP地址，再后跟`/led`。`setRequestHeader`将内容类型设置为`application/json`。`xhr.send`发布颜色JSON数据。这将触发网页服务器上的`/led`路由处理程序，并更改NeoPixel\
    \ LED的颜色。\n\nControl-O保存，Control-X退出。回到我们的shell，`ls`显示`led_web.py` Python代码、`huewheel.min.js`\
    \ JavaScript库和`led.html`文件。"
