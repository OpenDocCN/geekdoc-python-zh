    of human-readable, progress reporting

    2. IDE should take over most of SDK installation process. Harder to troubleshoot
    is anything goes wrong (Python interpreters etc.)

    3. Automated testing of IDE features is trickier than of the equivalent command
    line tools.


    The second one is, uh, related to users expectations about the installation and
    onboarding process. Uh, when we work with CLI tools, uh, multiple installation
    steps are required.

    For instance, uh, we get some prerequisites and store clone, a get repository.
    We were on a certain script. Uh, we install drivers, we set up environment variables
    and so on. And ID plugin takes over many of these steps, but at the same time,
    users get less visibility into the underlying process. Uh, and it is harder for
    them and for us to troubleshoot, if anything goes wrong.

    So when an ID or an installer attempts to sets everything up, expectations are
    higher and we need to be mindful about collecting enough information about enough
    logs and data about the system, so that in case anything goes wrong, we can find
    the reason. And, uh, the final one is related to automated testing. Uh, automated
    testing, I think becomes more challenging for, um, an ID tool kit compared to
    a set of command line tools. Uh, of course having this, the test for the underlying
    tools in the first place gives us more confidence that the tools themselves work
    fine, but due to different release cycles of the SDK and the ID plugin, we may
    need some regressions due to the changes in the argument''s interfaces and so
    on.

    So testing becomes very important, um, for an UI UI based application, it is often
    less straightforward than for the command line tools. And this is the,'
