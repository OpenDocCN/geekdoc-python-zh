  - '[PAGE 65]


    version out of fruit also has an ESB through to board with battery support called
    the who''s on 32 it''s part of their feather series.

    It''s more expensive, but they offer a large selection of add on boards with features
    such as a real-time clock SD card displays, GPS and more. Another board is the
    PI comm YPI 2.0, which is compact. Has an RGB led and has an external intent option.


    ![](img/d40136ded51f9470eb7d16c4d668c719_65_0.png)


    The MP3 two is designed for efficient wifi and Bluetooth, including Bluetooth,
    low energy or BLE. It has powerful 240 megahertz dual core. My controller with
    five 20 K of S Ram. The chip is designed for mobile devices. So it has ultra low
    power consumption. There are three, two GPL pins with support for I squared, C
    I two S by and you are in addition has multiple analog to digital channels and
    digital to analog hardware, accelerated encryption pulse with modulation capacitance,
    touch interfaces, and a bunch of. The built-in wifi makes the SB 32, a great solution
    for road devices, such as sensors, inputs, and relays. If there''s interest, I''ll
    probably turn this project into a series that demonstrates connecting sensors
    to the SB 32 in detail and using network messaging protocols, such as MQTT to
