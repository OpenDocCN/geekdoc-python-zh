- md: "## ESP32 Boards\n\nSparkfun ESP32 Thing / ESP32-DevKitC / AdaFruit HUZZAH32\n\
    \n![](img/d40136ded51f9470eb7d16c4d668c719_14_0.png)\n\nIf that seems also a little\
    \ bit too hard to deal with, in terms of soldering, there are lots of these boards\
    \ available from various manufacturers. There's a Sparkfun one there in the middle,\
    \ which has got an integrated battery controller. The other ones are Adafruit.\
    \ Oh, sorry, that one's a dev kit. So the other one is an Adafruit Feather. Uh,\
    \ you, I should know that. Does it say it in tiny little letters? No, it doesn't.\
    \ Um, one of their HUZZAH range maybe or something, it's got an onboard battery\
    \ controller as well. The battery controller is, as Anna said, very, very handy\
    \ if you want to have some kind of portable device, because it's something that's\
    \ quite easy to get wrong. So having a board that has that on there, so you can\
    \ just plug a LiPo in is really handy. Um, so they're really good in those, the\
    \ standard headers around the outside, it makes it very easy to get started on\
    \ this stuff and prototype stuff together with little wires. Um, all right.\n\n\
    ## Intel: Joule's burned, Edison switched off, and Galileo – Galileo is no more\n\
    \nChipzilla takes axe to IoT and embedded compute lines\n\nBy Shaun Nichols in\
    \ San Francisco 20 Jun 2017 at 00:03\n\n![](img/d40136ded51f9470eb7d16c4d668c719_15_0.png)\n\
    \nIntel has discontinued three of its offerings for the Internet of Things and\
    \ embedded device markets.\n\nThe chipmaker said in a series of low-key product\
    \ updates that it would be killing off the Edison [PDF], Galileo [PDF] and Joule\
    \ [PDF] compute modules and boards over the second half of the year.\n\nSo that's\
    \ the module. I was just talking about community since we're here. One of the\
    \ things about conferences is they're very much about the community and about\
    \ having a community. I think it's really important that we have a MicroPython\
    \ community, that we have a Python community and a MicroPython community within\
    \ that. Um, and an ESP32 MicroPython community within the MicroPython community.\n\
    \nI noticed this news article the other day, um, Intel launched with great fuss\
    \ and excitement, the Galileo platform and all of this sort of stuff. And it was\
    \ going to take over the world of IoT and everything is going to be fantastic.\
    \ And lots of people have them and yeah, it's all going to be beautiful.\n\nAnd\
    \ there was no real community behind it. And so whatever it was a year later when\
    \ it hadn't really taken off and everyone's looking at their watch going, did\
    \ we do anything cool with that? And then, or not, they just shelved it just like\
    \ that. So anyone who spent a lot of time and effort and stuff, developing stuff\
    \ or learning about that platform, it's kind of been pulled from under you, which\
    \ I think is really disappointing.\n\nI mean, it was a nice platform. It's just,\
    \ it was a good idea, but unless there's a community, a single company can't push\
    \ a platform along. Well, they can for a while, until they lose enthusiasm, then\
    \ they can't make it a global thing. So it needs to be more than that. It needs\
    \ to be a community of people. And that's something I'm really trying to get going\
    \ with MicroPython as well.\n\nPyConAU 2016 IoT MiniConf!\nESP32 modules start\
    \ becoming available\nInitial port to ESP32 w/ REPL (Damien George)\nWiFi, Sockets,\
    \ GPIO (Nick Moore)\n\n![](img/d40136ded51f9470eb7d16c4d668c719_16_0.png)\n\n\
    Um, so where are we at with MicroPython? And so I talked here last year, possibly\
    \ this very room about, um, ESP8266 MicroPython. Um, and there was a lot of fun.\
    \ And at the time there was so much muttering about this new ESP32. Those modules\
    \ actually finally started making it out onto the market in about November. Um,\
    \ and then they promptly disappeared off the market again. Every single one of\
    \ them sold. And then they appeared again here and there in dribs and drabs. And\
    \ everyone responded to this in the sense of a way by ordering as many of them\
    \ as they could possibly get hold of. And then they immediately went out of stock\
    \ again. Um, and finally I got hold of my first ones in November and we could\
    \ start working on stuff. Um, Damien got hold of his as well, apparently around\
    \ then. Um, because the initial port dates back to December, which is when the\
    \ REPL started to actually work. Um, I can't actually read it. I'm not very good\
    \ with dates and times, but I am pretty good at typing. Get logged into the terminal.\
    \ So it's around December, somewhere there. Uh, and then I ended up coming across\
    \ and doing some work on the project with Damien to get the WiFi stuff going and\
    \ TCP sockets and some more support for other GPIO functions then. And that work,\
    \ that initial work on this port, um, I'd just like to thank Microbian for sponsoring\
    \ that work. Um, they helped make that possible to get that off the ground. As\
    \ another port started on ESP32, they make a really cool little robot called the\
    \ Edison, which is pictured there, which is a little educational robot thing.\
    \ So I just wanted to say thank you to them and give them a little bit of a, uh,\
    \ thank you.\n\n- ESP32 branch on Github!\n- LinuxConfAU featuring \"IoTuz\"\n\
    - Support for NeoPixels (tyggerjai)\n- More I/O functions\n- Hardware SPI (Eric\
    \ Poulsen)\n\n![](img/d40136ded51f9470eb7d16c4d668c719_17_0.png)\n\nFrom there\
    \ we went on and we actually finally admitted we were doing this thing and stuck\
    \ it up on GitHub. Um, which is great because it made other people leap all over\
    \ it. And then I went down to LinuxConfAU, Tassie to kind of like, you know, launch\
    \ it. Wow. It's a good excuse, isn't it? Um, we went down there and at LinuxConfAU,\
    \ we had support from Espressif to make a little board called an IoTuz, which\
    \ is this thing pictured, um, which has a little LED display and it has a joystick\
    \ and it has an ESP32 on top and all of that sort of stuff.\n\nAnd, uh, as I'm\
    \ working up to my talk about how to develop C code for the ESP32, I got up on\
    \ stage and said, ah, look, unfortunately we haven't actually got MicroPython\
    \ booting on the IoTuz yet. And so on. And someone put up their hand and said,\
    \ Yes I have. Oh, right, okay. Excellent. So, um, we did indeed get that running\
    \ on the IoTuz, which was cool.\n\nUm, and Jaya who's probably around here somewhere,\
    \ got it working with the NeoPixels on the board and people added more stuff and\
    \ suddenly we had a snowball rolling, which is brilliant. It's this community\
    \ thing I'm talking about is that we've suddenly got multiple contributors. It's\
    \ not just one person or two people or three people pushing this thing along.\
    \ It starts snowballing. So that's really exciting. We went from software SPI\
    \ to hardware SPI, which was a great start. Um, other functions appeared. Someone\
    \ said, why is there no PWM? And I said, of course there's PWM. And I said, no,\
    \ there isn't. I mean, oh yeah, I didn't write that after all. I thought I had.\
    \ Oops. So someone implemented that, which was great. Andy Valencia there, um,\
    \ UART support arrived. So now you can talk to all three UARTs on the board. Um,\
    \ which is another thing that took me by surprise. When I discovered I actually\
    \ had three UARTs, which was kind of cool, uh, and other people are adding more\
    \ support all the time. I've mentioned a few names here. There are many, many,\
    \ many more contributors, um, in the, in the thing, get logged as your friend.\
    \ But I just want to emphasize the fact, this is becoming a community thing. This\
    \ is becoming something that is bigger than just a couple of people. And here\
    \ we are at Python again, what's in progress.\n\n- BLE Implementation (#86)\n\
    - Deepsleep modes (#32)\n- MCPWM (#94)\n- Ultra Low Power CPU\n- psRAM\n  (Serial\
    \ attached RAM in WROVER, ESP32-PRO, ALB32-WROVER)\n- Bitmap displays / framebuffers\n\
    \nUh, so the ESP32 also got used on a badge at a conference in Amsterdam, I think,\
    \ or near Amsterdam anyway, uh, called SHA, uh, and a whole bunch of people from\
    \ that, uh, community have been putting a lot of effort in it, on things like,\
    \ uh, Bluetooth LE, and, uh, I think the same people are involved in the deep\
    \ sleep thing.\n\nI can't remember now. Uh, those are pull request numbers, uh,\
    \ and those things are waiting to kind of get merged back into the main line of\
    \ ESP32 MicroPython. But once that's working, it'll support, uh, Bluetooth LE,\
    \ it'll be able to deep sleep so that you can run it off batteries and it can\
    \ wake up, do some thinking, go to sleep again.\n\nUm, there's some more sophisticated\
    \ PWM control available on the chip. Uh, one of the fun things about this is,\
    \ is that Espressif are kind of doing a lot of their development of their SDK\
    \ very publicly. This is very unusual, but they've released a very early SDK and\
    \ they call it an IDF, um, IoT Development Framework.\n\nThey released it quite\
    \ early with a lot of things missing, and then they're slowly adding those things\
    \ bit by bit. Which is a little challenging at times for us trying to keep up\
    \ with their development. But it's really exciting as well because every now and\
    \ then you'll discover a new piece of hardware is now available.\n\nWe also need\
    \ to have at some point some support for that ultra low power CPU, because that's\
    \ a really exciting piece of hardware for anyone who wants to run stuff on batteries.\
    \ And a really exciting thing that's just suddenly become a thing recently, um,\
    \ is to attach more RAM to this thing. So there's a new chip coming out from Espressif\
    \ or a new module coming out from Espressif soon, which has got four megabytes\
    \ of onboard, um, RAM, serial attached RAM.\n\nSo it's just attached to, um, the\
    \ internal bus of the module. And I think it's really exciting. Can we make MicroPython\
    \ use this big slice of RAM? You know, if we've got more RAM available, can Python\
    \ use that? And I've been sort of looking at it and poking gently at it. And just\
    \ before this talk, Googled it again, and someone's in the meantime implemented\
    \ it. So that'll be really, that's, that's pretty amazing. It's, um, something\
    \ we have to"
  mdcn: "## ESP32 开发板\n\nSparkfun ESP32 Thing / ESP32-DevKitC / AdaFruit HUZZAH32\n\
    \n![](img/d40136ded51f9470eb7d16c4d668c719_14_0.png)\n\n如果觉得焊接这些板子还是有点困难，市面上有很多来自不同制造商的类似板子。中间那块是\
    \ Sparkfun 的，它集成了电池管理控制器。其他几块是 Adafruit 的。哦，抱歉，那块是开发套件。所以另一块是 Adafruit Feather。呃，我应该知道的。上面有小字标注吗？没有。嗯，可能是他们\
    \ HUZZAH 系列的某一款，它也板载了电池管理控制器。正如 Anna 所说，如果你想做某种便携设备，电池管理控制器非常非常方便，因为这部分很容易出错。所以有一块集成了这个功能的板子，你只需插上锂电池就能用，这真的很方便。嗯，它们在这方面做得很好，标准的排针分布在四周，让你可以很容易地用小电线开始原型制作和项目搭建。嗯，好的。\n\
    \n## Intel：Joule 已烧毁，Edison 已关闭，Galileo——Galileo 不复存在\n\n芯片巨头砍掉物联网和嵌入式计算产品线\n\n\
    Shaun Nichols，旧金山，2017年6月20日 00:03\n\n![](img/d40136ded51f9470eb7d16c4d668c719_15_0.png)\n\
    \nIntel 已经停产了其面向物联网和嵌入式设备市场的三款产品。\n\n这家芯片制造商在一系列低调的产品更新中表示，将在今年下半年停产 Edison [PDF]、Galileo\
    \ [PDF] 和 Joule [PDF] 计算模块和开发板。\n\n所以这就是那个模块。既然我们在这里，我刚才谈到了社区。会议的一个重要方面就是关于社区和建立社区。我认为我们拥有一个\
    \ MicroPython 社区，拥有一个 Python 社区以及其中的 MicroPython 社区，这非常重要。嗯，还有 MicroPython 社区中的\
    \ ESP32 MicroPython 社区。\n\n前几天我注意到这篇新闻文章，嗯，Intel 曾大张旗鼓、满怀热情地推出了 Galileo 平台以及诸如此类的东西。它将接管物联网世界，一切都会变得非常美好。很多人都有它，是的，一切都会很美好。\n\
    \n但背后并没有真正的社区支持。所以大约一年后，当它并没有真正流行起来，每个人都看着手表想，我们用它做过什么酷炫的东西吗？然后，或者没有，他们就这样把它搁置了。所以任何花了很多时间和精力去开发东西或学习那个平台的人，这就好像被釜底抽薪了，我觉得这真的很令人失望。\n\
    \n我的意思是，它是个不错的平台。这是个好主意，但除非有社区支持，否则单靠一家公司无法推动一个平台发展。嗯，他们可以推动一段时间，直到他们失去热情，然后他们就无法让它成为一个全球性的东西。所以它需要的不止于此。它需要一个由人组成的社区。这也是我正努力在\
    \ MicroPython 上实现的事情。\n\nPyConAU 2016 物联网迷你会议！\nESP32 模块开始上市\n初始移植到 ESP32 w/ REPL\
    \ (Damien George)\nWiFi, Sockets, GPIO (Nick Moore)\n\n![](img/d40136ded51f9470eb7d16c4d668c719_16_0.png)\n\
    \n嗯，那么 MicroPython 现在进展如何？我去年在这里，可能就在这个房间，谈到了 ESP8266 MicroPython。嗯，那很有趣。当时有很多关于这个新\
    \ ESP32 的议论。那些模块实际上在大约十一月开始陆续上市。嗯，然后它们很快就又从市场上消失了。每一块都卖光了。然后它们又零零星星地出现在这里那里。每个人都以一种方式回应了这一点，就是尽可能多地订购他们能拿到的每一块。然后它们又立刻缺货了。嗯，最后我在十一月拿到了我的第一批，我们就可以开始做东西了。嗯，Damien\
    \ 大概也在那时拿到了他的。嗯，因为最初的移植可以追溯到十二月，那时 REPL 才开始真正工作。嗯，我其实看不清。我不太擅长记日期和时间，但我打字相当不错。登录到终端。所以大概是十二月左右。呃，然后我最终参与进来，和\
    \ Damien 一起做了一些项目工作，让 WiFi 功能、TCP 套接字以及更多 GPIO 功能支持得以实现。这项工作，这个移植的初步工作，嗯，我想感谢\
    \ Microbian 赞助了这项工作。嗯，他们帮助使其得以启动。作为另一个在 ESP32 上开始的项目，他们制作了一个非常酷的小机器人，叫做 Edison，就是图片上那个，是一个小型教育机器人。所以我想说声谢谢，并向他们表示一点感谢。\n\
    \n- ESP32 分支在 Github 上！\n- LinuxConfAU 展示 \"IoTuz\"\n- 支持 NeoPixels (tyggerjai)\n\
    - 更多 I/O 功能\n- 硬件 SPI (Eric Poulsen)\n\n![](img/d40136ded51f9470eb7d16c4d668c719_17_0.png)\n\
    \n从那里我们继续前进，最终承认我们确实在做这件事，并把它放到了 GitHub 上。嗯，这很棒，因为这让其他人蜂拥而至。然后我去了塔斯马尼亚的 LinuxConfAU，有点像是，你知道，发布它。哇。这是个好借口，不是吗？嗯，我们去了那里，在\
    \ LinuxConfAU，我们得到了 Espressif 的支持，制作了一个叫做 IoTuz 的小板子，就是图片上这个东西，嗯，它有一个小 LED 显示屏，一个摇杆，上面有一个\
    \ ESP32，以及诸如此类的东西。\n\n而且，呃，当我准备关于如何为 ESP32 开发 C 代码的演讲时，我走上台说，啊，看，不幸的是我们实际上还没有让\
    \ MicroPython 在 IoTuz 上启动。等等。然后有人举手说，是的，我做到了。哦，对，好的。太棒了。所以，嗯，我们确实让它在 IoTuz 上运行起来了，这很酷。\n\
    \n嗯，Jaya 可能就在这附近某个地方，让它在板子上的 NeoPixels 上工作了，人们添加了更多东西，突然间我们有了一个滚动的雪球，这太棒了。这就是我所说的社区效应，我们突然有了多个贡献者。不再只是一两个人或三个人推动这件事。它开始像滚雪球一样发展。所以这真的很令人兴奋。我们从软件\
    \ SPI 转向了硬件 SPI，这是一个很好的开始。嗯，其他功能也出现了。有人说，为什么没有 PWM？我说，当然有 PWM。然后我说，不，没有。我是说，哦，是的，我毕竟没写那个。我以为我写了。哎呀。所以有人实现了它，这很棒。Andy\
    \ Valencia 在那里，嗯，UART 支持也到来了。所以现在你可以与板子上的所有三个 UART 通信。嗯，这是另一件让我惊讶的事情。当我发现我实际上有三个\
    \ UART 时，这有点酷，呃，其他人一直在添加更多支持。我在这里提到了几个名字。还有很多很多很多其他的贡献者，嗯，在，在这个项目里，记录为你的朋友。但我只想强调一点，这正在成为一个社区项目。这正在成为比仅仅几个人更大的事情。我们又回到了\
    \ Python，进展中。\n\n- BLE 实现 (#86)\n- 深度睡眠模式 (#32)\n- MCPWM (#94)\n- 超低功耗 CPU\n-\
    \ psRAM\n  (WROVER, ESP32-PRO, ALB32-WROVER 中的串行附加 RAM)\n- 位图显示 / 帧缓冲\n\n呃，所以\
    \ ESP32 也被用在了阿姆斯特丹（我想是阿姆斯特丹附近）一个叫做 SHA 的会议徽章上，呃，来自那个社区的一大群人一直在努力做很多事情，比如，呃，蓝牙低功耗，呃，我想是同一批人在参与深度睡眠的事情。\n\
    \n我现在记不清了。呃，那些是拉取请求编号，呃，这些东西正等待合并回 ESP32 MicroPython 的主线。但一旦它工作起来，它将支持，呃，蓝牙低功耗，它将能够深度睡眠，这样你就可以用电池运行它，它可以醒来，思考一下，然后再去睡觉。\n\
    \n嗯，芯片上有一些更复杂的 PWM 控制可用。呃，关于这个有趣的一点是，Espressif 在非常公开地进行他们 SDK 的大量开发。这很不寻常，但他们发布了一个非常早期的\
    \ SDK，他们称之为 IDF，嗯，物联网开发框架。\n\n他们很早就发布了它，缺少很多东西，然后他们慢慢地一点一点添加这些东西。这有时对我们来说有点挑战，要跟上他们的开发。但这也非常令人兴奋，因为时不时地你会发现新的硬件现在可用了。\n\
    \n我们还需要在某个时候对那个超低功耗 CPU 提供一些支持，因为对于任何想用电池运行东西的人来说，那是一个非常令人兴奋的硬件。而最近突然变得令人兴奋的一件事，嗯，是给这个东西附加更多\
    \ RAM。所以 Espressif 很快会推出一款新芯片或新模块，它有四兆字节的板载，嗯，RAM，串行附加 RAM。\n\n所以它只是连接到，嗯，模块的内部总线上。我觉得这非常令人兴奋。我们能让\
    \ MicroPython 使用这块大 RAM 吗？你知道，如果我们有更多 RAM 可用，Python 能用上吗？我一直在研究它，轻轻地试探。就在这个演讲之前，我又谷歌了一下，有人在此期间已经实现了它。所以那将会非常，那，那太惊人了。这是，嗯，我们必须"
