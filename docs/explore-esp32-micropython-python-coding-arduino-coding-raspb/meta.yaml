  mdcn: '## 使用 ESPTOOL 刷写 MicroPython


    我们将使用 ESP 工具或集线器来刷写 MicroPython 到 ESP32。请访问 MicroPython 网站，点击下载，找出你的开发板对应的 ESP
    固件。这些命令非常重要。我们将使用这些命令来确保 ESP 工具已正确安装。


    让我们检查 ESP 工具是否已安装。打开命令提示符（只需输入 `CMD`），然后输入 `pip install esptool`。如果已安装，此要求即满足。


    我们已经下载了固件。如果尚未下载，请前往下载。这是擦除 ESP32 中数据的命令。你需要在此处更改开发板名称。这里显示的是 Linux 系统下的开发板名称，对于
    Windows 系统，它通常是 `COM6`。那么如何检查呢？请转到设备管理器，在端口下查看。你可以找到它连接到 `COM6`。然后转到命令提示符，输入 `esptool.py
    --port COM6 erase_flash`。其中 `COM6` 的 `C` 是大写。


    你需要按住 ESP32 上的 `BOOT` 按钮，然后按 `ENTER`，并在一到两秒内松开 `BOOT` 按钮。

    现在它开始擦除，并成功擦除。现在它要求重置。你需要按 ESP32 上的 `ENABLE` 按钮或 `RESET` 按钮。下一步是上传固件。我将在 `U` 盘下创建一个文件夹。我将创建一个名为
    `ESP32` 的文件夹。在其中，我保存了这个 `.bin` 文件。现在转到命令提示符，只需复制下面的命令并粘贴到这里。你需要更改两处。


    你需要更改开发板端口，即 `COM6`，我们已知是 `COM6`。最后一个是 `.bin` 文件名，你也需要将其替换为已下载的文件名。只需复制文件名。我已复制。


    我将其全部粘贴到这里。按住 `BOOT` 按钮，然后按 `ENTER` 并松开。它没有工作。好的。问题是我选择的文件夹是错误的。所以我必须转到 `ESP32`
    文件夹。命令是 `cd ESP32`。这是我创建的文件夹。然后列出这些文件，使用 `dir` 命令。这样我就能看到所有的固件和文件。只需粘贴相同的命令。

    只需通过复制此处的文件名来更改 `.bin` 文件名。


    在此处粘贴，按 `ENTER`。在此之前，你必须按住 `BOOT` 按钮，并在 1-2 秒的间隔内松开 `BOOT` 按钮。现在它开始写入，现在进度是 80%。

    现在成功刷写。MicroPython 固件已刷写，你需要通过按 ESP32 上的 `ENABLE` 或 `RESET` 按钮来重置。只需打开 PuTTY，重新连接
    ESP32。你可以打开。


    现在 shell 已加载。只需使用 `print("Hello")` 命令检查。此命令成功运行。如果 ESP 工具未正确安装。

    那么我们必须设置 ESP 工具的路径。所以我们将检查如何设置 ESP 工具的路径。首先，我们必须检查 ESP 工具安装在哪里。转到命令提示符，


    只需输入命令 `pip show -f esptool`，这将显示其安装的文件夹。这是 ESP 工具的路径。只需复制此路径。右键点击“此电脑”。转到属性，转到高级系统设置。然后


    当环境变量出现时，点击它。然后在系统变量中转到 `Path` 并点击新建。我已经设置了路径。如果未设置，你可以点击新建。粘贴你复制的路径，然后点击确定。所以如果你这样做，你可以避免这类问题，比如
    ESP 工具无法识别。


    ## 使用 ESPRESSIF 工具刷写 MicroPython


    我们将使用乐鑫（Espressif）的另一款软件将 MicroPython 刷写到 ESP32。打开任意浏览器，访问乐鑫网站。你可以搜索 `Espressif`。乐鑫是
    ESP8266 和 ESP32 芯片的制造商，提供两款软件。

    你可以转到支持。在下载下，你可以转到工具。好的。你可以选择。是的。ESP32。它已经显示出来了。那就是 Flash Download Tool。


