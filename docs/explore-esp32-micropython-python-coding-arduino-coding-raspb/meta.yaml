  mdcn: "## 目标准备\n\n- ESP-WROOM-32 模块\n  - 已移除屏蔽罩\n- 无丝印但有原理图可用\n- 我移除了连接到 VDD_CPU\
    \ 和 VDD_RTC 的电容\n\n![](img/d40136ded51f9470eb7d16c4d668c719_302_0.png)\n\n那么现在是时候准备目标了。所以我移除了屏蔽罩。这相当简单。我们现在可以看到\
    \ ESP，比如中间的两个，以及它附近的 SPI 闪存。好的。该模块没有丝印，但原理图可用。所以，这真的很容易进行逆向工程。\n我移除了连接到 VDD_CPU\
    \ 和 VDD_RTC 的电容。如果你对比两张图片，你会发现，你会看到差异，可能少了六七个电容。\n\n![](img/d40136ded51f9470eb7d16c4d668c719_303_0.png)\n\
    \n之后，我必须为那三个步骤修改 PCB。我暴露了 VDD_CPU。走线大约是第七条。我切断了这条走线，并将我的毛刺注入器连接到 VDD_CPU，然后我找到了一个\
    \ GND，一个相当、相当容易找到的点。\n\n![](img/d40136ded51f9470eb7d16c4d668c719_303_1.png)\n\n\
    然后，关于其他设置，我设计了自己的多重毛刺注入器。它基于一个 46, 19，这是一个模拟开关。我添加了一些无源元件、SMA 连接器，以便能够轻松地插拔我的线缆。我用示波器同步这个毛刺注入器，并用信号发生器触发这个毛刺。我发送\
    \ USB 命令来设置不同的参数，比如延迟、毛刺的宽度、电压。\n所以最后，它看起来像这样。我的意思是，这是一个小装置，它由 Python 脚本控制，可以完全自动化地运行压力测试。\n\
    所以当我睡觉时，我可以达到目标。\n\n![](img/d40136ded51f9470eb7d16c4d668c719_304_0.png)\n\n所以我需要，他们将为此对抗电压毛刺效应。我探测了，你得到零，因为\
    \ URL 直接由 VDD_CPU 供电。然后我注入毛刺，我可以在信号上看到非常大的毛刺效应。这意味着在芯片内部，我们可以预期相同的效果，相同的低压降效应。\n\
    所以对我来说，效果看起来相当好。我现在相当有信心。\n\n![](img/d40136ded51f9470eb7d16c4d668c719_305_0.png)\n\
    \n现在是时候对加密核心进行第三次测试了。加密核心也称为加密加速器。加密引擎有时只是一个用于加速不同算法计算的外设。比如，AES、SHA、RSA。\n为什么探测它很有趣，因为它也被\
    \ ESP-IDF 的加密库使用。他们使用专用的，但 ARM 和 GLS、Amber jealousy、ARM 加密库也使用它，如今许多物联网设备都在使用它。我的目标是专注于\
    \ CPU 加密接口。所以通常是加密驱动程序，当然，我不期望找到纯软件漏洞，因为这个加密库很久以前就由许多熟练的人员和密码学家进行了审计和持续关注。\n但我，我将寻找由故障注入触发的漏洞。\n\
    \n![](img/d40136ded51f9470eb7d16c4d668c719_306_0.png)\n\n现在是代码审查的时候了，但首先在数据手册中，他们提供了描述单个\
    \ AES 操作的第一步。所以我们可以看到寄存器的第一次初始化。然后你向特定寄存器写入 1 以启动 AES。\n你等待计算结束，然后你从 AES Text\
    \ M 寄存器读取结果。当你看到这个时，你会看到一个设计弱点，因为用于存储明文的寄存器也用于存储密文。这通常被称为就地加密，这可能是有风险的，因为如果在 AES\
    \ 期间甚至在第三步期间出了什么问题，我确信我可以直接检索到明文。\n所以这作为第一个漏洞非常酷且易于利用。这就是我现在要演示它的原因。\n\n## 漏洞\
    \ n°1 = AES 绕过\n\n- 之前的弱点已确认\n- 多个触发点\n  - AES 启动\n  - while 条件\n  - 最后的 for 循环\n\
