- md: "## 5.6 AMPERE'S LAW, AGAIN\n\nUsing the curl theorem, let us examine Ampere's\
    \ law again. We can replace $\\vec{K}$ with $\\vec{B}$, so that\n\n$$\\oint_{\\\
    text{Contour}} \\vec{B} \\cdot d\\vec{l} = \\iint_{\\text{Area}} (\\nabla \\times\
    \ \\vec{B}) \\cdot \\hat{n} da.$$\n\nAccording to Ampere's law,\n\n$$\\oint_{\\\
    text{Contour}} \\vec{B} \\cdot d\\vec{l} = \\mu_0 \\sum I = \\mu_0 \\iint_{\\\
    text{Area}} \\vec{J} \\cdot \\hat{n} da.$$\n\nThis situation is reminiscent of\
    \ Gauss’s law, which states that the amount of the electric field flux is independent\
    \ of the shape of the surface of the integral as long as the surface encloses\
    \ the same amount of electrical charges. The line integral of a magnetic field\
    \ is independent of the shape of the closed contour (and the surface defined by\
    \ it) as long as the contour encloses the same amount of current.\n\nThe integrand\
    \ of the right-hand sides must be equal to each other since the area can be an\
    \ arbitrary surface for any given contour boundary.\n\n$$\\nabla \\times \\vec{\\\
    mathbf{B}} = \\mu_0 \\vec{\\mathbf{J}}.$$\n\nThis is the differential form of\
    \ Ampere’s law.\n\n# CHAPTER 6\n\n## Force\n\n### 6.1 ELECTRIC FORCE\n\nWind moves\
    \ clouds and air balloons. Meteorologists use wind maps to analyze the weather\
    \ pattern and to make a forecast. Planets, suns, and galaxies exert gravitational\
    \ force on each other. Astronomers can analyze their interactions and predict\
    \ the movement of astronomical objects. Likewise, electrical charges exert electric\
    \ force on one another via electric fields, influencing the charges' motion. More\
    \ precisely, the electric force $\\vec{F}_{\\text{electric}}$ on a charge $q$\
    \ located at a location is proportional to the electric field $\\vec{E}$ at that\
    \ exact position.\n\n$\\vec{F}_{\\text{electric}} = q\\vec{E}$\n\nThis suggests\
    \ that the electric field is the force on a unit charge. Consider an electric\
    \ charge $Q$ placed at the origin that sets up an electric field in three dimensions:\n\
    \n$\\vec{E}(x, y, z) = \\frac{1}{4\\pi\\epsilon_0} \\frac{Q}{r^2} \\hat{\\mathbf{r}},$\n\
    \nwhere $r^2 = x^2 + y^2 + z^2$. Another charge $q$ located at position $(x, y,\
    \ z)$ will thus experience the electric force by $Q$'s electric field:\n\n$\\\
    vec{F}_{\\text{electric}} = \\frac{1}{4\\pi\\epsilon_0} \\frac{qQ}{r^2} \\hat{\\\
    mathbf{r}}$\n\nThe above expression is called the Coulomb’s law of electric force.\
    \ Note that this is symmetric for q and Q, and it can be thought of as the electric\
    \ force exerted on Q by the electric field of q. The line of reasoning that involves\
    \ an electric field addresses the question of action at a distance. How do two\
    \ electrical charges separated by a distance exert force on each other? The answer\
    \ is that they interact through their electric fields. This single formulation\
    \ captures different sign combinations of electric charges and the direction of\
    \ the force. If q and Q are both positive, the resulting force has a positive\
    \ sign, and q will be pushed away from Q. If q and Q are both negative, the resulting\
    \ force again takes on a positive sign, indicating that the force is again repulsive.\
    \ If Q and q have the opposite signs, the force is then attractive. The respective\
    \ forces on q and Q are equal in magnitude and opposite in direction.\n\n### 6.2\
    \ MAGNETIC FORCE\n\nA charge q moving with velocity v experiences the magnetic\
    \ force due to magnetic field B at that position.\n\n$\\vec{F}_{\\text{magnetic}}\
    \ = q \\vec{v} \\times \\vec{B}$\n\nUnlike the electric force, which lines up\
    \ with the direction of the electric field, the magnetic force is orthogonal to\
    \ both v and B. The sign of q influences the direction of the force. The magnitude\
    \ of the force depends on the amount of charge, the magnitude of the velocity,\
    \ the strength of the magnetic field, and the angle between v and B.\n\nWhy is\
    \ the magnetic force so much more complicated and “unintuitive” than electric?\
    \ We will have to accept it as it is, since it is verified and confirmed by numerous\
    \ rigorous experiments. We will also learn in the later chapters (on Faraday’s\
    \ law and Einstein’s special theory of relativity) that this form of magnetic\
    \ force makes electromagnetism wondrously unified and consistent.\n\nConsider\
    \ a region of space with a uniform magnetic field, which may be set up with a\
    \ solenoid. The following figure illustrates this uniform magnetic field with\
    \ regularly spaced dots. Each dot, representing a head-on view of an arrow, indicates\
    \ that the field is pointing out of a page. In order to indicate the field that\
    \ points into a page, we use a marker x, which looks like the rear end of an arrow.\
    \ The velocity of the charge is indicated with a gray arrow, and the resulting\
    \ magnetic force is marked with a black arrow. The standard units of the velocity,\
    \ force, and magnetic field are m/s, N, and T, respectively.\n\n```python\n# Code\
    \ Block 6.1\n\n# Relationship between magnetic force, velocity, and field.\n\n\
    import numpy as np\nimport matplotlib.pyplot as plt\n\n# Define the amount of\
    \ charge, velocity, position,\n# and the magnetic field.\nq = 2\nx, y = -1, -1.5\n\
    vx, vy, vz = -1, 1, 0 # vz=0, so it moves on the xy plane.\nBx, By, Bz =  0, 0,\
    \ 1 # Bx=By=0, so B field is along z.\n\n# magnetic force F = q*(v x B)\nFx, Fy\
    \ = q*(vy*Bz-vz*By), q*(vz*Bx-vx*Bz)\n\nfig = plt.figure(figsize=(3,3))\nplt.quiver(x,y,vx,vy,color='gray',\n\
    \           angles='xy',scale_units='xy',scale=1)\nplt.quiver(x,y,Fx,Fy,color='black',\n\
    \           angles='xy',scale_units='xy',scale=1)\n\nlim, step = 3, 1\nxgrid,\
    \ ygrid = np.meshgrid(np.arange(-lim,lim+step,step),\n                       \
    \    np.arange(-lim,lim+step,step),\n                           indexing='ij')\n\
    \nplt.scatter(xgrid,ygrid,marker='.',color='gray')\nplt.scatter(x,y,s=100,marker='o',color='black')\n\
    plt.legend(('velocity [m/s]','Force [N]','B field [T]'),\n           framealpha=1)\n\
    plt.axis('square')\nplt.xlim((-lim-0.5,lim+0.5))\nplt.ylim((-lim-0.5,lim+0.5))\n\
    plt.xticks((-lim,0,lim))\nplt.yticks((-lim,0,lim))\nplt.xlabel('x')\nplt.ylabel('y')\n\
    plt.tight_layout()\nplt.savefig('fig_ch6_mag_force.pdf')\nplt.show()\n```\n\n\
    Because the magnetic force is always orthogonal to the velocity of an electrically\
    \ charged particle, there is no work associated with the magnetic force. The acceleration\
    \ caused by the magnetic force will change the direction of a moving charge, but\
    \ it will not change its speed. An interesting application of this is to trap\
