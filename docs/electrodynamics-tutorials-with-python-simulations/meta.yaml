    \n一个三维向量可以写成：\n\n$\\vec{A} = a_x\\hat{x} + a_y\\hat{y} + a_z\\hat{z} = (a_x, a_y,\
    \ a_z)$，\n\n其中 $a_x$ 是向量在 $x$ 轴方向上的分量大小。类似地，$a_y$ 和 $a_z$ 是沿 $y$ 轴和 $z$ 轴的分量。一个向量的大小定义为：\n\
    \n$|\\vec{A}| = \\sqrt{a_x^2 + a_y^2 + a_z^2}$。\n\n单位向量是大小为1的向量，用帽符号表示。因此，沿 $x$、$y$\
    \ 和 $z$ 轴的三个正交方向分别表示为 $\\hat{x}$、$\\hat{y}$ 和 $\\hat{z}$。我们可以通过将任何向量除以其大小来将其转换为单位向量。\n\
    \n$\\hat{A} = \\frac{\\vec{A}}{|\\vec{A}|} = \\frac{a_x}{\\sqrt{a_x^2 + a_y^2\
    \ + a_z^2}}\\hat{x} + \\frac{a_y}{\\sqrt{a_x^2 + a_y^2 + a_z^2}}\\hat{y} + \\\
    frac{a_z}{\\sqrt{a_x^2 + a_y^2 + a_z^2}}\\hat{z}$。\n\n两个向量相加，只需将它们在每个维度上的分量相加，结果仍然是一个向量。\n\
    \n$\\vec{A} + \\vec{B} = (a_x + b_x)\\hat{x} + (a_y + b_y)\\hat{y} + (a_z + b_z)\\\
