    $r$ from the center of the wire as $r = \sqrt{p_{curr}[0]^2 + p_{curr}[1]^2}$.


    To systematically specify an array of sample positions in the wire (`p_curr`)
    and their corresponding volume elements (`dV`), we can take several different
    approaches. In the function `curr_density_r2_polar()`, the points are sampled
    in the polar coordinates along $r$ and $\phi$ with $dV = r \, dr \, d\phi$. If
    the points are sampled along the cartesian coordinates as shown in `curr_density_r2_cartesian()`,
    $dV = dxdydz$ (or $dV = (dR^2)*dL$). Finally, in `curr_density_r2_random()`, we
    pick $N$ random points inside the volume of the wire. Hence, the differential
    volume element at each point is approximately given by $dV = V/N = \pi R^2 L/N$.


