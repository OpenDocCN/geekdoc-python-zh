    An observer in one particular reference frame can describe a force as a time rate
    of the relativistic momentum according to Newton’s second law of motion. The observer
    will see this change in the momentum with respect to his or her own time in that
    frame. Therefore, the force is defined as a derivative of the momentum with respect
    to $t$, not proper time $t_0$, as $\vec{F} = \frac{d\vec{p}}{dt}$.


    With this definition of force in relativistic dynamics, we may return to our original
    question about a moving charge near a wire. The above determination of the force
