  md: 'If you throw a ball straight up inside a smoothly moving vehicle, you would
    see that it goes up and down according to Newton’s second law of motion $\vec{\mathbf{F}}_{\text{net}}
    = m\vec{\mathbf{a}}$. When I watch the motion of that ball from the outside, I
    would observe that the ball follows a parabolic trajectory $\vec{\mathbf{r}}(t)$
    that is different from the up-and-down motion $\vec{\mathbf{r}}''(t)$ observed
    by you. However, the same law of mechanics explains the parabolic motion.


    Even before Einstein, this intuitive and sensible idea that the laws of physics
    must be universal was accepted widely. The trajectory of the ball as a function
    of time can be described classically by the following two expressions, depending
    on the observer:


    $\vec{\mathbf{r}}(t) = (vt)\hat{\mathbf{x}} + (v_{0y}t - \frac{1}{2}gt^2)\hat{\mathbf{y}}$

    $\vec{\mathbf{r}}''(t) = (v_{0y}t - \frac{1}{2}gt^2)\hat{\mathbf{y}},$


    where the vehicle is moving at a constant velocity $\vec{\mathbf{v}} = v\hat{\mathbf{x}}$
    and the initial vertical velocity of the ball is $v_{0y}$. The vertical acceleration
    due to the force of gravity in both inertial frames of reference is $-g$. A seemingly
