  md: "In addition to the above functions, let’s create two more helper func-tions,\
    \ get_vfield_uniform() and get_vfield_radial(), which return uniform and radial\
    \ vector fields, respectively. Both functions accept an input argument p, a set\
    \ of points at which the vector fields are to be specified.\n\nThe get_vfield_radial()\
    \ function calculates the distance from the origin as r = np.sqrt(np.sum(p**2,axis=0)),\
    \ which computes r = \\sqrt{x^2 + y^2}. In order to generate a vector field whose\
    \ magnitude decreases as 1/r, we must divide x and y coordinates by r^2. To generate\
    \ a vector field whose magnitude is independent of r, we divide x and y by r.\
    \ Whenever there is a division, we could run into an unfortunate situation where\
    \ the divisor (in this case r) is too small and causes serious numerical errors.\
    \ There are many different ways of avoiding division by zero or small numbers.\
    \ Here, we drop points that are too close to the origin. What is “too close”?\
    \ In our case, we drop the points whose distance from the origin is less than\
    \ 1 percent of the maximum distance. We find indices that satisfy this condition\
    \ (valid_idx = np.where(r > np.max(r)*0.01) in the code) and squeeze out the unwanted\
    \ points with the squeeze() method. As a result, the get_vfield_radial() function\
    \ may return p that contains the subset of the original input argument p.\n\n\
    ```\n\n# Code Block 3.16\n\ndef get_vfield_uniform (p,type='right'):\n    if type=='right':\n\
    \        dx, dy = 1, 0\n    if type=='left':\n        dx, dy = -1, 0\n    if type=='up':\n\
    \        dx, dy = 0, 1\n    if type=='down':\n        dx, dy = 0, -1\n    vf =\
    \ np.zeros(p.shape)\n    vf[0] = dx\n    vf[1] = dy\n    return vf, p\n\ndef get_vfield_radial\
    \ (p,type='1/r'):\n    r = np.sqrt(np.sum(p**2,axis=0))\n    # The above line\
