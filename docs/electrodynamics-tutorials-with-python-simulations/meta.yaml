    # 5.2 AMPERE''S LAW


    In the previous chapter, we discussed Gauss’s law, which states that the surface
    integral of the electric field is related to the total amount of charge enclosed
    within the boundary of the integral (also known as a Gaussian surface). Similarly,
    the line integral of the magnetic field over a closed path or contour (also known
    as an Amperian loop) is related to the total amount of enclosed current, as we
    will discuss in this chapter. As a starting example, consider two current-carrying
    wires and various closed paths of different shapes (circle or square) at different
    locations. In the following code block, we reuse the previously defined function,
