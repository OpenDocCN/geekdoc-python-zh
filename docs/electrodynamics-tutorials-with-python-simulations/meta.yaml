    Other (non-linear) types of polarizations are possible, and we can analyze them
    by introducing complex amplitudes for the electromagnetic fields. A complex number
    can be expressed in a cartesian form, $a + ib$, or in a polar or exponential form,
    $\alpha e^{i\beta}$. They are related by: $\alpha = \sqrt{a^2 + b^2}$ and $\beta
    = \tan^{-1}(b/a)$.


    We can rewrite the electric field as:


    ```

    $$\vec{\mathbf{E}}(x, y, z, t) = |\tilde{E}_x|e^{i\phi_x}e^{i(kz-\omega t)}\hat{\mathbf{x}}
    + |\tilde{E}_y|e^{i\phi_y}e^{i(kz-\omega t)}\hat{\mathbf{y}}$$

    $$= |\tilde{E}_x|e^{i(kz-\omega t+\phi_x)}\hat{\mathbf{x}} + |\tilde{E}_y|e^{i(kz-\omega
    t+\phi_y)}\hat{\mathbf{y}},$$

    ```


    where the amplitudes of the electric field, $\tilde{E}_x$ and $\tilde{E}_y$, have
    been written in an exponential form with $|\tilde{E}_x|$, $|\tilde{E}_y|$, $\phi_x$,
    and $\phi_y$.'
