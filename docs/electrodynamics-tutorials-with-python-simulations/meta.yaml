    $\mathcal{E} = IR + \frac{q}{C} = R\frac{dq}{dt} + \frac{q}{C}$


    with $I = \frac{dq}{dt}$. This differential equation with respect to time has
    a solution of $q(t) = C\mathcal{E}(1 - e^{-t/RC})$, which shows the charging behavior
    of a capacitor with a characteristic time constant of $RC$. The time-derivative
    of $q(t)$ is $\frac{dq}{dt} = \frac{\mathcal{E}}{R}e^{-t/RC}$, which shows the
    exponentially decreasing current in the circuit, as the capacitor charges up.


    ```

    # Code Block 8.1

    import numpy as np

    import matplotlib.pyplot as plt

    import sympy as sym


    # Analyze RC circuit, symbolically.


    # Define emf, resistance, capacitance, and time.

    E, R, C, t = sym.symbols(''E R C t'')


    # Define charge as a function.

    q = sym.symbols(''q'', cls=sym.Function)


    # Define the ordinary differential equation.

    potential_eqn = sym.Eq(R*q(t).diff(t)+q(t)/C,E)


    # Solve the ordinary differential equation.

    q_func = sym.dsolve(potential_eqn,ics={q(0): 0},simplify=True).rhs


    # Solve for current.

    I_func = sym.diff(q_func,t)


    # Display the results.

    print(''charges q(t) ='', q_func)

    print(''current I(t) ='', I_func)

    ```'
