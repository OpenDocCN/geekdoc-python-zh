  md: '# # 7.5 RELATIVITY OF ELECTROMAGNETIC FORCES


    Now, we are ready to discuss a seemingly paradoxical situation that beautifully
    illustrates the deep connection between the electric and magnetic forces. To understand
    how electricity and magnetism are intertwined through relative motion, let us
    consider two inertial reference frames. In the first reference frame $S$, there
    is a current-carrying wire and a positive charge $q$ moving parallel to the straight
    wire at a distance $d$. The charge, moving in the same direction as the current
    at speed $v$, would experience the magnetic force of magnitude $qvB$, where $B$
    is the strength of the magnetic field due to current $I$ in the wire. In the chapter
    on magnetism, we have already discussed that a straight wire with current $I$
    generates a magnetic field of magnitude $\frac{\mu_0 I}{2\pi d}$ at a distance
    $d$.


    To make our analysis simpler, we may assume that this current is generated by
    the movements of positive and negative electrical charges in the wire moving in
    opposite directions at speed $u$. Hence, the linear charge density $\lambda$ in
    the wire would have to satisfy $I = 2\lambda u$. The factor of 2 reflects the
    fact that positive and negative charges slide past each other in the wire, and
    each charge type contributes to half of the total current. In this reference frame,
    the positive charge density is equal to the negative charge density, so the wire
    itself is electrically neutral. The force exerted on $q$ is purely magnetic, and
    its magnitude is given by:


    $$F_B = qv\frac{\mu_0 \lambda u}{\pi d}$$


    The direction of force is given by the right-hand rule. If the current $I$ and
    the charge velocity $v$ are parallel to each other, the magnetic force points
    toward the wire.


    In the second reference frame $S''$, the charge $q$ is at rest, so there would
    be no magnetic force on $q$. Hence, there seems to be a paradox. How can the charge
    $q$ experience force in $S$, but none in $S''$? How could the presence of force
    be dependent on the frame of reference? As we will see below, the relativistic
    effect of length contraction resolves this paradox. In the rest frame of $q$,
    the positive charges, which are running alongside $q$ in our arrangement, move
    slower than the negative charges, which are running in the opposite direction.
    As an extreme case, suppose both positive and negative charges move in the opposite
    direction at a speed identical to the speed of $q$. Then, according to an observer
    in $S''$, the positive charges and $q$ are at rest, while the negative charges
    are moving.'
