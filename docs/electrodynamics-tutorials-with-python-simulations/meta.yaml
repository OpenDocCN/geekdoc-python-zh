    \ field through a spherical surface. As visualized below, an infinitesimal area\
    \ on a sphere, subtending $d\\theta$ and $d\\phi$ at the spherical coordinates\
    \ $(r, \\theta, \\phi)$, is $da = r^2 \\sin \\theta d\\theta d\\phi$. From this,\
    \ we can readily derive a formula for the surface area of a sphere whose radius\
    \ is $R$:\n\n$$A_{\\text{sphere}} = \\int_{0}^{\\pi} \\int_{0}^{2\\pi} R^2 \\\
    sin \\theta d\\theta d\\phi = 4\\pi R^2.$$\n\nFor the volume of a sphere, we note\
    \ that the infinitesimal volume is $dV = da dr = r^2 \\sin \\theta dr d\\theta\
    \ d\\phi$, so\n\n$$V_{\\text{sphere}} = \\int_{0}^{R} \\int_{0}^{\\pi} \\int_{0}^{2\\\
    pi} r^2 \\sin \\theta dr d\\theta d\\phi = \\frac{4}{3}\\pi R^3.$$\n\n```\n# Code\
