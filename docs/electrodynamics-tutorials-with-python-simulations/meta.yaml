    ## 2.4 向量微积分


    微积分为描述运动提供了一种数学上精确而简洁的方法。在经典力学中，一个经历恒定加速度 *a* 的物体（例如在重力作用下自由下落的质点）的运动可以用一组运动学方程来描述：


    $$

    \begin{aligned}

    x(t) &= x_o + v_o t + \frac{1}{2} a t^2 \\

    v(t) &= v_o + at,

    \end{aligned}

    $$


    其中物体的速度随时间线性变化，其位置随时间二次变化。


    速度 \( v(t) \) 与位置 \( x(t) \) 之间的关系是导数与反导数的关系，因此如果你知道其中一个量，就可以确定另一个量。


    如果你知道 \( x(t) \)，那么 \( v(t) = \frac{dx}{dt} \)。如果你知道 \( v(t) \) 和 \( x_0 \)，那么
    \( x(t) = \int_0^t v(t'')dt'' + x_0 \)。


    换句话说，物体的运动可以用某些物理量的导数或积分来表述。无论是从 \( x(t) \) 还是 \( v(t) \) 开始的表述，都描述的是同一种运动。同样，电磁学的数学描述也可以用积分或导数来表述，正如我们将在后续章节中看到的那样。在本节中，我们将介绍几个基本的向量微积分运算的定义和示例。


    给定一个三维标量函数 \( f(x, y, z) \)，其沿 \( x \) 轴的空间变化率由 \( \frac{\partial f}{\partial
    x} \) 给出。给定一个三维向量函数 \( \vec{K} = K_x \hat{x} + K_y \hat{y} + K_z \hat{z} \)，我们可以通过计算
    \( \frac{\partial K_x}{\partial x} + \frac{\partial K_y}{\partial y} + \frac{\partial
    K_z}{\partial z} \) 来考虑沿各维度变化率的总和。这些导数的物理解释将在我们稍后在电场和磁场的背景下再次遇到时进一步讨论。现在，我们引入一个称为
    del 或 nabla（\( \nabla \)）的向量算子，以更紧凑和优雅的方式表达高维导数。该算子定义为 \( \nabla = \frac{\partial}{\partial
    x} \hat{x} + \frac{\partial}{\partial y} \hat{y} + \frac{\partial}{\partial z}
    \hat{z} \)。如果将此算子应用于一个标量函数 \( f(x, y, z) \)，我们得到一个称为**梯度**的新向量量：


    梯度：\( \nabla f(x, y, z) = \frac{\partial f}{\partial x} \hat{x} + \frac{\partial
    f}{\partial y} \hat{y} + \frac{\partial f}{\partial z} \hat{z} \)。


    此算子也可以应用于一个向量函数。给定一个向量函数 \( \vec{K} \)，其**散度**（一个标量量）定义为


    散度：\( \nabla \cdot \vec{K} = \frac{\partial K_x}{\partial x} + \frac{\partial
    K_y}{\partial y} + \frac{\partial K_z}{\partial z} \)。


    \( \vec{K} \) 的**旋度**是一个向量量，定义为


    旋度：\( \nabla \times \vec{K} = \begin{vmatrix} \hat{x} & \hat{y} & \hat{z} \\ \frac{\partial}{\partial
    x} & \frac{\partial}{\partial y} & \frac{\partial}{\partial z} \\ K_x & K_y &
    K_z \end{vmatrix} = \left( \frac{\partial K_z}{\partial y} - \frac{\partial K_y}{\partial
    z} \right) \hat{x} + \left( \frac{\partial K_x}{\partial z} - \frac{\partial K_z}{\partial
    x} \right) \hat{y} + \left( \frac{\partial K_y}{\partial x} - \frac{\partial K_x}{\partial
    y} \right) \hat{z} \)。


    在高维进行积分需要额外注意。例如，给定一个三维标量函数 \( f(x, y, z) \)，我们可以在由二维边界包围的特定区域内进行体积分。这种积分的表示法为：


    $$\iiint_{\text{Volume}} f(x, y, z) dxdydz,$$


    其中积分符号上的圆圈表示在包围的体积上进行积分。同样，我们有时可能会处理在二维表面上的积分或沿一维轮廓的积分。这些积分将在接下来的章节中结合相关背景进行介绍和解释。


    本节的最后一个主题是向量微积分的基本定理。根据更熟悉的微积分基本定理：


    $$\int_a^b \frac{df(x)}{dx} dx = f(b) - f(a),$$


    它表明，导数在一个区间上的积分可以用该区间端点（即 \( a \) 和 \( b \)）处的反导数值来计算。它优雅地捕捉了函数、其导数、积分和边界条件之间的关系。


    类似地，梯度的基本定理指出：


    $$\int_{\vec{a}}^{\vec{b}} \nabla f \cdot d\vec{l} = f(\vec{b}) - f(\vec{a}).$$


    作为一个建立直观理解的例子，考虑一个像重力这样的保守力 \( \vec{F} \)。想象在此力下做功，将物体从点 \( \vec{a} \) 移动到点 \(
    \vec{b} \)。所做的功由 \( \int_{\vec{a}}^{\vec{b}} \vec{F} \cdot d\vec{l} \) 给出，它等于物体势能的变化
    \( \Delta U = U(\vec{b}) - U(\vec{a}) \)。在没有摩擦力（即假设为保守力）的情况下，所做的功仅取决于物体的终点和起点，而物体如何到达其最终位置并不重要。换句话说，无论物体是通过直线还是曲线路径从
    \( \vec{a} \) 被带到 \( \vec{b} \)，势能的变化都是相同的。对于一个质量为 \( m \) 的物体在地球表面附近上升高度 \( h
    \) 的情况，这被总结为重力势能的公式：\( \Delta U = mgh \)。


    散度和旋度各有其基本定理。散度的基本定理指出，向量函数散度的体积分等于该向量函数在包围相关体积的表面上的面积分。对于向量函数的旋度，其面积分等于定义此表面的闭合线轮廓上的线积分。后面的章节将讨论它们的含义和应用。现在，我们将它们一起列在下方，以便于参考和比较。


    $$ \iiint_{\text{Volume}} (\nabla \cdot \vec{K}) dV = \iint_{\text{Area}} \vec{K}
    \cdot d\vec{a} $$


    $$ \iint_{\text{Area}} (\nabla \times \vec{K}) \cdot d\vec{a} = \oint_{\text{Contour}}
    \vec{K} \cdot d\vec{l} $$


    ## 2.5 \(\nabla\) 的附加运算


    正如我们对两个函数的乘积进行微分有法则 \( \frac{d}{dt}(f(t)g(t)) = f(t)\frac{dg(t)}{dt} + g(t)\frac{df(t)}{dt}
    \) 一样，当 \( \nabla \)-算子应用于标量和向量函数时，也有相应的乘积法则。例如，如果你有两个向量函数 \( \vec{K} \) 和 \(
    \vec{G} \) 的点积，其梯度由下式给出：


    $$ \nabla(\vec{K} \cdot \vec{G}) = \vec{K} \times (\nabla \times \vec{G}) + \vec{G}
    \times (\nabla \times \vec{K}) + (\vec{K} \cdot \nabla)\vec{G} + (\vec{G} \cdot
    \nabla)\vec{K} $$


    给定两个向量函数的叉积，其散度和旋度可由下式确定：


    $$ \nabla \cdot (\vec{K} \times \vec{G}) = \vec{G} \cdot (\nabla \times \vec{K})
    - \vec{K} \cdot (\nabla \times \vec{G}) $$


    以及


    $$ \nabla \times (\vec{K} \times \vec{G}) = (\vec{G} \cdot \nabla)\vec{K} - (\vec{K}
    \cdot \nabla)\vec{G} + \vec{K}(\nabla \cdot \vec{G}) - \vec{G}(\nabla \cdot \vec{K})
    $$


