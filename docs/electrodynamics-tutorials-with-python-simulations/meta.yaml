    \                    indexing='ij')\np = np.vstack((x.flatten(),y.flatten()))\n\
    \ndef get_vfield_example (p,case=1):\n    strength = 100/2\n    vfield = np.zeros(p.shape)\n\
    \    if case==0: # Top-heavy wind\n        vfield[0] = strength*(1+p[1])\n   \
