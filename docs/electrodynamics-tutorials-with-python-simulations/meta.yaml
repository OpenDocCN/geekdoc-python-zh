    \n## 8.5 磁矢势\n\n将电势想象成一个标量函数，在空间的每个位置具有特定的值，类似于重力势，这是相当直观的。电势景观中最陡峭的斜坡方向与电场方向一致，而电荷所受的电场力也指向该方向。另一方面，磁场力使电荷垂直于速度和磁场方向运动。与电场力和电场的关系不同，磁场力和磁场并不指向同一方向。因此，在磁场的情况下，我们必须使用一种不同形式的势函数。\n\
    \n一个没有方向的标量量——电荷，建立了电势 $V$，而电势本身是一个标量函数。类似地，一个既有大小又有方向的矢量量——电流，是磁场的来源，并建立了磁矢势，它是一个矢量函数。磁矢势通常用\
    \ $ \\vec{A} $ 表示。磁场与磁矢势的关系是：\n\n$ \\vec{B} = \\nabla \\times \\vec{A} $。\n\n\
    电势与电荷的势能有关，电势差告诉我们电场对单位电荷所做的功。然而，磁矢势没有这样的物理解释，因为磁场不做功。当从量子力学的角度同时考虑电场和磁场时，磁矢势扮演着重要的理论角色，但这超出了本书的范围。目前，我们可以将磁矢势\
    \ $ \\vec{A} $ 视为获得磁场 $ \\vec{B} $ 的另一种方式，就像电场 $ \\vec{E} $ 可以描述为电势 $V$ 的梯度一样。有时，使用磁矢势比使用毕奥-萨伐尔定律能更简便地计算磁场。\n\
    \n## 8.6 数学：标量势与矢量势\n\n在本节中，我们将介绍场与势关系背后一个优美的数学理论。矢量微积分的基本定理，也称为亥姆霍兹定理，指出像 $\\\
