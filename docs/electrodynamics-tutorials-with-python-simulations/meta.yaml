    \ of modern physics, unifying three previously distinct areas of physical science:\
    \ electricity, magnetism, and optics.\n\n## 10.4 MONOCHROMATIC PLANE WAVES\n\n\
    One class of functions that satisfy the free-space Maxwell’s equations is a plane\
    \ wave, whose wavefront, the set of points sharing the same position in their\
    \ oscillation cycle, is a flat plane and moves perpendicular to this plane without\
    \ bending or spreading out.\n\nA plane wave is a good approximation for many forms\
