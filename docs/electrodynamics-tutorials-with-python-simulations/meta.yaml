    Because the magnetic force is always orthogonal to the velocity of an electrically
    charged particle, there is no work associated with the magnetic force. The acceleration
    caused by the magnetic force will change the direction of a moving charge, but
    it will not change its speed. An interesting application of this is to trap a
    charged particle with mass \( m \) within a magnetic field with centripetal acceleration
    \( a_c = \frac{v^2}{R} \) for uniform circular motion with radius \( R \).


    \( a_c = \frac{v^2}{R} = \frac{F_{\text{magnetic}}}{m} = \frac{qvB}{m} \)


    which implies that \( R = \frac{mv}{qB} \). A mass spectrometer operates based
    on this principle that \( R \) is related to \( m \). If the amount of charge
    \( q \) and speed \( v \) of a molecule are known, its mass can be determined
    by measuring how much the molecule bends its trajectory inside a uniform magnetic
    field \( B \). The following code block illustrates a uniform circular motion
