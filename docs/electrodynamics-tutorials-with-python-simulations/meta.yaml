- md: "independence, it follows that a circular boundary enclosing a point charge\
    \ and a differently shaped enclosure surrounding the same charge will pass the\
    \ same amount of flux, because any boundary can be broken up into infinitesimal\
    \ pieces that subtend the same angular extents as the pieces from a circular boundary\
