    \n图 9.5\n\n## 9.4 麦克斯韦对安培定律的修正\n\nLC 电路的工作可以描述为电容器中的电场与电感器中的磁场之间连续、渐进的切换，其中一个场的变化会导致另一个场的变化。法拉第定律明确指出，变化的磁场可以感应出电动势。麦克斯韦推测，变化的电场可能类似地感应出磁场现象，但在他开始研究电磁理论时，已知的电磁学定律都没有涉及这种可能性。他假设当时已知的安培定律，$\\\
    oint_{\\text{Contour}} \\vec{\\mathbf{B}} \\cdot d\\vec{l} = \\mu_0 \\iint_{\\\
    text{Area}} \\vec{\\mathbf{J}} \\cdot \\hat{\\mathbf{n}}da$，可能并不完整。\n\n在 LC 电路中，电磁场之间的切换是通过电路中的电流流动来实现的，但电容器两极板之间究竟发生了什么？电荷不会跳过极板，因此没有物理电流。我们无法用电流密度\
    \ $\\vec{\\mathbf{J}}$ 来描述电容器内部的情况。\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_252_0.png)\n\
    \n图 9.6\n\n上图显示了一个具有两个圆形极板的电容器。电流 I(t) 影响极板上的电荷量 q(t)，而电荷量决定了极板间的电场 E(t)。在连接电容器的导线周围画一个安培环路，记为\
    \ C。注意，C 指的是环路的轮廓，而不是电容。让我们考虑两个具有相同边界的曲面。第一个曲面 S₁ 是与环路处于同一平面的平面，导线穿过这个曲面。第二个曲面\
    \ S₂ 是一个半球面，位于电容器两个极板之间，没有电流穿过。\n\n根据安培定律，由于导线中的电流，围绕闭合路径 C 存在一个环形磁场。然后，根据斯托克斯定理，围绕\
    \ C 的这个磁场的线积分可以表示为一个涉及磁场旋度的面积分。这个面积分可以使用任何具有相同边界的曲面来计算。特别是，S₁ 和 S₂ 这两个曲面都包含了轮廓\
    \ C，因此通过每个曲面的磁场旋度的面积分应该是等价的。\n\n对于曲面 $S_1$，它包围了总电流 $I(t)$，线积分 $\\oint_{\\mathcal{C}}\
    \ \\mathbf{B}(t) \\cdot d\\mathbf{l}$ 可以写成面积分 $\\iint_{S_1} (\\nabla \\times \\\
    mathbf{B}(t)) \\cdot \\hat{\\mathbf{n}} da$。这个面积分也等于内部总电流乘以自由空间磁导率，即 $\\mu_0 \\\
    iint_{S_1} \\mathbf{J} \\cdot \\hat{\\mathbf{n}} da = \\mu_0 I(t)$。然而，对于第二个曲面\
    \ $S_2$，没有电流，因此 $\\mu_0 \\iint_{S_2} \\mathbf{J} \\cdot \\hat{\\mathbf{n}} da\
    \ = 0$。\n\n这令人困惑，因为面积分 $\\iint_{S_2} (\\nabla \\times \\mathbf{B}(t)) \\cdot \\\
    hat{\\mathbf{n}} da$ 必须等于另一个面积分 $\\iint_{S_1} (\\nabla \\times \\mathbf{B}(t))\
    \ \\cdot \\hat{\\mathbf{n}} da$，而后者又应该等于 $\\oint_{\\mathcal{C}} \\mathbf{B}(t)\
    \ \\cdot d\\mathbf{l}$。\n\n为了解决电磁学定律中的这一明显矛盾，麦克斯韦提出了电容器内部的**位移电流**概念，它不同于电路中流过导线的**传导电流**。即使单个电荷不会跳过电容器两个极板之间的间隙，但电容器上的电荷量会发生变化，并伴随着电场的变化。位移电流的概念解释了电容器中的这些变化。\n\
    \n$q(t)$ 和 $\\mathbf{E}(t)$ 之间的关系可以从高斯定律推导出来。由于一个极板上的电荷 $q(t)$ 被限制在 S₁ 和 S₂ 围成的体积内，\n\
    \n$$ \\frac{q(t)}{\\epsilon_0} = \\iint_{S_1} \\vec{0} \\cdot \\hat{\\mathbf{n}}\
    \ da + \\iint_{S_2} \\vec{\\mathbf{E}}(t) \\cdot \\hat{\\mathbf{n}} da, $$\n\n\
    其中电场在电容器外部靠近 S₁ 处为零。因此，位移电流定义为电荷的变化率，可以用电场来表示：\n\n$$ \\frac{dq(t)}{dt} = \\epsilon_0\
    \ \\iint_{S_2} \\frac{\\partial \\vec{\\mathbf{E}}(t)}{\\partial t} \\cdot \\\
    hat{\\mathbf{n}} da, $$\n\n根据莱布尼茨法则，积分内使用了偏导数。\n\n于是，我们提出了修正后的安培定律，它适用于任何任意轮廓及其包围的面积，同时包含了传导电流密度\
    \ $\\mathbf{J}$ 和时变电场 $\\mathbf{E}(t)$：\n\n$$ \\oint_{\\text{Contour}} \\mathbf{B}(t)\
    \ \\cdot d\\mathbf{l} = \\iint_{\\text{Area}} (\\nabla \\times \\mathbf{B}(t))\
    \ \\cdot \\hat{\\mathbf{n}} da \\ = \\mu_0 \\iint_{\\text{Area}} \\left( \\mathbf{J}\
    \ + \\epsilon_0 \\frac{\\partial \\vec{\\mathbf{E}}(t)}{\\partial t} \\right)\
    \ \\cdot \\hat{\\mathbf{n}} da. $$\n\n以微分形式表示，麦克斯韦修正后的安培定律为\n\n$$\\nabla \\times\
    \ \\vec{\\mathbf{B}} = \\mu_0 \\vec{\\mathbf{J}} + \\mu_0 \\epsilon_0 \\frac{\\\
    partial \\vec{\\mathbf{E}}}{\\partial t}$$\n\n现在，就像法拉第定律一样，麦克斯韦修正后的安培定律展示了变化的电场如何产生磁场。在下一章中，我们将看到电场和磁场之间这种对称的、相互的感应会引发电磁波。\n\
    \n# 第 10 章\n\n## 麦克斯韦方程组与电磁波\n\n### 10.1 不存在磁单极子\n\n我们之前研究过的高斯定律指出，穿过一个闭合曲面的电通量与该曲面所包围的总电荷量成正比，其数学表达式为：$\\\
