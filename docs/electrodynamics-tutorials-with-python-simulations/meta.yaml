    # 8.3 RC CIRCUIT


    Let us consider a simple circuit where a resistor with resistance $R$ and a capacitor
    with capacitance $C$ are connected in series to a battery with $emf$ of $\mathcal{E}$.
    In the previous section, we discussed how each component acts individually, and
    here we analyze the behavior of the circuit with two conservation laws: the conservation
    of electric charge and the conservation of energy, which are also known as Kirchhoff’s
    first and second rules in the context of electrical circuits. The first rule states
    that the current flowing into any point in a circuit always equals the current
    flowing out of that point. This is true even when a point includes multiple branches.
    In other words, an electrical charge does not magically appear nor disappear within
    the circuit, or the electrical charge is conserved. The second rule states that
    the sum of the potential changes around any loop within a circuit is always zero.
    In other words, when an electrical charge travels through the circuit and returns
    to its starting point, the net change of its electrical potential energy is zero.
    It means that, while a charge is traversing a loop, any gain in the electrical
    potential energy is offset by the loss, due to the work performed by the charge
    or energy contributed to different parts of the circuit. The energy does not magically
    appear or disappear in the circuit, or the energy is conserved.


    In the context of an $RC$ circuit, the first rule implies that the number of electrical
    charges that move to or from the capacitor plate will be equal to the number passing
    through the resistor at any moment in time, so we can use the same symbol $q$
    to refer to the charges at $R$ and $C$. The second rule implies that the battery’s
    $emf$ is equal to the sum of the potential drops at $R$ and $C$. The work done
    by the battery is split into the work of moving electrical charges against the
    electrical resistance'
