    wave[(y - x > 8) | (y - x < -8)] = np.nan\nwave[(y + x < 8) | (y + x > 28)] =\
    \ np.nan\n\nfig = plt.figure(figsize=(3,3))\nax = fig.add_subplot(111, projection='3d')\n\
    ax.scatter(x.flatten(),y.flatten(),z.flatten(),\n           c=wave.flatten(),\
    \ cmap='gray')\n\n# 用箭头指示波的传播方向。\nax.quiver(15,15,0,1.5*k,1.5*k,0, color='black')\n\
