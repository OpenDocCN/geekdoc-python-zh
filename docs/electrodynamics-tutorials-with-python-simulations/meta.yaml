    $V(z) = \frac{Q}{2\pi L\epsilon_0} \ln\left(\frac{L}{z}\right)$. We can take its
    negative gradient to determine the electric field with charge density $\lambda$:


    $$\vec{E} = -\nabla V = -\frac{\partial}{\partial z} \left( \frac{\lambda}{2\pi\epsilon_0}
    \ln\left(\frac{L}{z}\right) \right) \hat{z} = \frac{\lambda}{2\pi\epsilon_0 z}
    \hat{z}.$


