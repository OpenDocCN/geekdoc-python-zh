    \ a closed boundary.\n\nWhen this boundary is a circle with radius r centered\
    \ at the location of a point charge q, the total flux can be calculated easily.\n\
    \n$$\\Phi_E = \\oint \\vec{E} \\cdot \\hat{n} dl = \\int_0^{2\\pi} \\frac{q}{2\\\
    pi\\epsilon_0 r} r d\\phi = \\frac{q}{\\epsilon_0}.$$\n\nThe above value will\
    \ be valid for any arbitrarily shaped boundary that encloses the same q.\n\nIf\
    \ there are multiple point charges (q1, q2, ...) or distribution of charge over\
    \ a finite volume, we can use the superposition principle and perform the flux\
    \ calculation over a boundary that encloses these charges.\n\n$$\\Phi_E = \\oint\
    \ \\vec{E} \\cdot \\hat{n} dl = \\oint (\\vec{E}_1 + \\vec{E}_2 + \\cdots) \\\
    cdot \\hat{n} dl$$\n$$= \\oint \\vec{E}_1 \\cdot \\hat{n} dl + \\oint \\vec{E}_2\
    \ \\cdot \\hat{n} dl + \\cdots$$\n$$= \\frac{q_1 + q_2 + \\cdots}{\\epsilon_0}$$\n\
    $$= \\frac{q_{\\text{enc}}}{\\epsilon_0},$$\n\nwhere q_enc is the total amount\
    \ of charge enclosed by the boundary.\n\nThis remarkable conclusion is known as\
    \ Gauss’s law. The enclosing boundary is known as a Gaussian surface. The term\
    \ “surface” comes from the fact that in three dimensions, a boundary is a two-dimensional\
    \ surface, just like the flexible membrane of a balloon that encloses a volume\
    \ of air. In two dimensions, a boundary is a one-dimensional closed contour.\n\
    \n## 4.6 NUMERICAL VERIFICATION OF GAUSS’S LAW\n\nLet us verify Gauss’s law numerically\
    \ for a few cases. The following series of code blocks set up single or multiple\
    \ electric charges in space and calculate the electric flux through different\
    \ boundary configurations. For each case, we can see that the pattern of the electric\
    \ field on the boundary may be complicated and asymmetric, but the total flux\
    \ is always equal to the number of enclosed charges divided by $\\epsilon_0$,\
    \ which is set to 1 in the code. This result holds whether the boundary is a circle,\
