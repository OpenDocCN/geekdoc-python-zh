    \n考虑一个具有均匀磁场的空间区域，该磁场可以由螺线管产生。下图用均匀分布的圆点示意了这个均匀磁场。每个圆点代表一个箭头的尖端，表示磁场方向垂直纸面向外。为了表示磁场方向垂直纸面向内，我们使用符号\
    \ x，它看起来像箭头的尾部。电荷的速度用灰色箭头表示，而由此产生的磁场力用黑色箭头标记。速度、力和磁场的标准单位分别是 m/s、N 和 T。\n\n```python\n\
    # Code Block 6.1\n\n# Relationship between magnetic force, velocity, and field.\n\
