    plt.savefig('fig_ch8_sphere.pdf')\nplt.show()\n```\n\n这个例子中有两个不同的区域：带电球体的内部（r\
    \ < R）和外部（r > R）。在球体外部，$V(r > R) = \\frac{Q}{4\\pi\\epsilon_0 r}$，这与单个点电荷的电势相同。在球体内部，$V(r\
    \ < R) = \\frac{Q}{8\\pi\\epsilon_0 R} \\left(3 - \\left(\\frac{r}{R}\\right)^2\\\
    right)$。\n\n### 8.9 示例：连续电流分布的磁矢势\n\n对于磁矢势，我们将使用关于矢量场旋度的旋度的以下数学恒等式：$\\nabla \\\
    times (\\nabla \\times \\vec{\\mathbf{K}}) = \\nabla(\\nabla \\cdot \\vec{\\mathbf{K}})\
    \ - \\nabla^2\\vec{\\mathbf{K}}$。让我们对磁场取旋度：\n\n$$\n\\nabla \\times \\vec{\\mathbf{B}}\
    \ = \\nabla \\times (\\nabla \\times \\vec{\\mathbf{A}}) = \\nabla(\\nabla \\\
    cdot \\vec{\\mathbf{A}}) - \\nabla^2\\vec{\\mathbf{A}} = \\mu_0\\vec{\\mathbf{J}},\n\
    $$\n\n其中我们使用了$\\vec{\\mathbf{B}} = \\nabla \\times \\vec{\\mathbf{A}}$和安培定律的微分形式。\n\
    \n如前所述，磁场的矢势不是唯一确定的，我们可以通过加上或减去一个标量函数的任意梯度来选择一个可能简化方程的解。我们将选择无散度的矢势$\\vec{A}$，使得$\\\
    nabla \\cdot \\vec{A} = 0$。那么，上述表达式简化为：\n\n$$\n\\nabla^2 \\vec{A} = -\\mu_0 \\\
    vec{J}\n$$\n\n这是泊松方程的矢量形式。它的解可以表示为：\n\n$$\n\\vec{A}(x,y,z) = \\frac{\\mu_0}{4\\\
    pi} \\iiint \\frac{\\vec{J}}{r} \\, dx_s \\, dy_s \\, dz_s\n$$\n\n其中$r$是计算势的点与电流源点之间的距离。\n\
    \n我们可以将这个表达式分解为三维空间中的三个泊松方程，每个空间维度一个泊松方程。在笛卡尔坐标系中，磁矢势$\\vec{A}$的三个分量可以通过求解三个方程得到：$\\\
    nabla^2 A_x = -\\mu_0 J_x$，$\\nabla^2 A_y = -\\mu_0 J_y$，和$\\nabla^2 A_z = -\\\
    mu_0 J_z$。\n\n让我们考虑一根长度为L、电流I沿$+\\hat{x}$方向流动的导线。假设是细导线，电流密度由$\\vec{J} \\, dx_s\
    \ \\, dy_s \\, dz_s = +I \\, dx_s \\hat{x}$给出。因为$\\vec{J}$没有y和z分量，$\\vec{A}$将只有x分量$A_x$。在距离导线中点z处的泊松方程的解为：\n\
    \n$$\nA_x(z) = \\frac{\\mu_0}{4\\pi} \\int_{-L/2}^{+L/2} \\frac{I}{\\sqrt{z^2\
    \ + x_s^2}} \\, dx_s.\n$$\n\n我们在处理带电导线的电势时遇到过相同的积分。我们可以简单地将$\\mu_0$换成$\\frac{1}{\\\
    epsilon_0}$，将I换成λ。载流导线的磁矢势为：\n\n$$\n\\vec{A}(z) = \\frac{\\mu_0 I}{2\\pi} \\ln\\\
    left[ \\frac{L}{2z} + \\sqrt{1 + \\left( \\frac{L}{2z} \\right)^2} \\right] \\\
    hat{x}.\n$$\n\n当z ≪ L时，这个解变为$\\vec{A}(z) = \\frac{\\mu_0 I}{2\\pi} \\ln\\left(\
    \ \\frac{L}{z} \\right) \\hat{x}$。在这个极限下，让我们通过取这个矢势的旋度来求磁场：\n\n$$\n\\vec{B} =\
    \ \\nabla \\times \\vec{A}(z) = \\frac{\\partial A_x(z)}{\\partial z} \\hat{y}\
    \ = -\\frac{\\mu_0 I}{2\\pi z} \\hat{y}.\n$$\n\n正如预期的那样，这与使用安培定律和右手定则得到的结果相同。\n\
    \n作为磁矢势的另一个例子，考虑一个位于xy平面原点、半径为R的载流圆环。电流可以表示为$Id\\vec{l} = -IRd\\phi \\sin \\phi\\\
    hat{x} + IRd\\phi \\cos \\phi\\hat{y}$。磁矢势只有x和y分量。在距离圆环中心z处，$A_x$和$A_y$由下式给出：\n\
    \n$$\nA_x(z) = \\frac{\\mu_0}{4\\pi} \\int_0^{2\\pi} \\frac{-IR\\sin\\phi}{\\\
    sqrt{z^2+R^2}}d\\phi = 0\n$$\n$$\nA_y(z) = \\frac{\\mu_0}{4\\pi} \\int_0^{2\\\
    pi} \\frac{IR\\cos\\phi}{\\sqrt{z^2+R^2}}d\\phi = 0\n$$\n\n上述积分看起来很复杂，但它们只是正弦函数在其整个周期上的积分，因此等于零。磁矢势沿z轴为零，即使磁场不为零，这是否令人惊讶？\n\
    \n磁场是由磁势如何变化决定的，即$\\vec{B} = \\nabla \\times \\vec{A}$，而不仅仅是由特定点的势值决定。这类似于经典力学中的一个情况：放置在地球表面的物体的重力势能被定义为零，但重力并不为零。同样，零加速度也不一定意味着零速度。\n\
    \n我们也可以基于问题的对称性来理解磁矢势为零的结果。对于圆环上的任何电流段，总会有另一个电流方向相反的段位于直径的另一端。因此，这两个段产生的磁矢势会相互抵消。\n\
    \n我们通过提及电磁“四势”来结束本章，它结合了电标势和磁矢势函数。这是更高级场论的主题，其中电场和磁场根据完整的亥姆霍兹定理被视为一个统一的场。"
