  md: '# 8.8 EXAMPLE: ELECTRIC POTENTIAL OF CONTINUOUS CHARGE DISTRIBUTION


    This second-order differential equation is important in electrostatics (and other
    branches of physics like thermodynamics), because $\nabla V = -\vec{E}$ and $\nabla
    \cdot \vec{E} = \frac{\rho}{\epsilon_0}$, so $\nabla \cdot \nabla V = \nabla^2
    V = -\frac{\rho}{\epsilon_0}$. In other words, the solution to Poisson’s equation
    is the electric potential for a given charge distribution $\rho$. In free space
    without any charge ($\rho = 0$), we have $\nabla^2 V(x, y, z) = 0$.


    For charge density $\rho$, the corresponding electric potential $V$ can be expressed
    as


    $$V(x, y, z) = \frac{1}{4\pi\epsilon_0} \iiint \frac{\rho}{r} dx_s dy_s dz_s$$


    where $r = \sqrt{(x - x_s)^2 + (y - y_s)^2 + (z - z_s)^2}$ is the distance between
    the point of observation $(x, y, z)$ and the source point $(x_s, y_s, z_s)$ of
    electric charge density. This integral will be evaluated over a volume where the
    electric charge density is non-zero.


    The intuition for this solution is as follows. In the earlier chapters, we have
    established that the total flux of the electric field through an enclosed surface
    is directly proportional to the amount of electric charge enclosed within the
    volume (this is Gauss’s law). Hence, the spread, or the divergence, of the electric
    field is determined by the electric charge density $\rho$. Another observation
    we have made earlier is that the electric field strength depends on the distance
    from the source charge, decreasing as $\frac{1}{r^2}$ in three-dimensional space.
    Since the electric field is related to the negative gradient, or the rate of spatial
    change, of the electric potential, the electric potential itself can be calculated
    by adding up electric charges while adjusting their relative contributions based
    on their positions. The charges located farther away contribute less to the electric
    potential by a factor of $\frac{1}{r}$.


    As a simple example, imagine there is a point charge $q$ located at the origin,
    or $(x_s, y_s, z_s) = (0, 0, 0)$. The volume integral that encloses the origin
    reduces to $q$, and the electric potential at $(x, y, z)$ beyond the origin is
    given by:


    $$V(x, y, z) = -\frac{1}{4\pi\epsilon_0} \frac{q}{\sqrt{x^2 + y^2 + z^2}} = -\frac{q}{4\pi\epsilon_0
    r}$$'
