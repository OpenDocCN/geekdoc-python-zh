    \ not a vector. It can also be proven that $\\vec{A} \\cdot \\vec{B} = |\\vec{A}||\\\
    vec{B}| \\cos \\theta$, where $\\theta$ is the angle between the two vectors.\n\
    \nA cross product, also known as vector product, between vector $\\vec{A}$ and\
