- md: "Throughout our study of electrodynamics, we will be considering differently\
    \ shaped enclosures. Sometimes, we will show that certain mathematical quantities\
    \ about a vector field are independent of the shape of the enclosing boundary.\
    \ For example, the flux of a special vector field, whose magnitude falls off as\
    \ $\\frac{1}{r}$ in two dimensions, is the same whether the enclosing boundary\
    \ is a square or a circle, as long as certain conditions hold (we will discuss\
    \ what these conditions are in a later chapter). In some other examples, we will\
    \ arrange the sources of a vector field (e.g., electric charges or currents) in\
    \ different ways. Therefore, in the following code block, we define two functions\
    \ we will use multiple times throughout the book. The two helper functions, **points_along_circle()**\
    \ and **points_along_square()**, return a set of points that trace circular and\
    \ square enclosures. Both functions have a parameter **step** that controls how\
    \ closely the adjacent points are spaced.\n\n```python\n# Code Block 3.15\n\n\
    def points_along_circle(r=1, step=np.pi/10):\n    phi = np.arange(-np.pi, np.pi,\
    \ step)\n    p = np.vstack((r*np.cos(phi), r*np.sin(phi)))\n    return p\n\ndef\
    \ points_along_square(s=1, step=0.1):\n    # Get points along a square, whose\
    \ sides are of length s.\n    d = s/2\n    one_side = np.arange(-d, d, step)\n\
    \    N = len(one_side)\n    p_top = np.vstack((+one_side, np.zeros(N)+d))  # top\
    \ side\n    p_rgt = np.vstack((np.zeros(N)+d, -one_side))  # right side\n    p_bot\
    \ = np.vstack((-one_side, np.zeros(N)-d))  # bottom side\n    p_lft = np.vstack((np.zeros(N)-d,\
    \ +one_side))  # left side\n    p = np.hstack((p_top, p_rgt, p_bot, p_lft))\n\
    \    return p\n\nfig = plt.figure(figsize=(2,2))\np = points_along_square(s=4)\n\
    plt.plot(p[0], p[1], color='gray')\np = points_along_circle(r=2, step=np.pi/100)\n\
    plt.plot(p[0], p[1], color='gray')\np = points_along_circle(r=np.sqrt(8), step=np.pi/100)\n\
    plt.plot(p[0], p[1], color='gray')\n\nplt.axis('equal')\nplt.axis('square')\n\
    plt.xlabel('x')\nplt.ylabel('y')\nplt.xlim((-4,4))\nplt.ylim((-4,4))\nplt.xticks((-2,0,2))\n\
    plt.yticks((-2,0,2))\nplt.savefig('fig_ch3_diff_enclosures.pdf', bbox_inches='tight')\n\
    plt.show()\n```\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_62_0.png)\n\nFigure\
    \ 3.13\n\nIn addition to the above functions, let’s create two more helper functions,\
    \ get_vfield_uniform() and get_vfield_radial(), which return uniform and radial\
    \ vector fields, respectively. Both functions accept an input argument p, a set\
    \ of points at which the vector fields are to be specified.\n\nThe get_vfield_radial()\
    \ function calculates the distance from the origin as r = np.sqrt(np.sum(p**2,axis=0)),\
    \ which computes r = \\sqrt{x^2 + y^2}. In order to generate a vector field whose\
    \ magnitude decreases as 1/r, we must divide x and y coordinates by r^2. To generate\
    \ a vector field whose magnitude is independent of r, we divide x and y by r.\
    \ Whenever there is a division, we could run into an unfortunate situation where\
    \ the divisor (in this case r) is too small and causes serious numerical errors.\
    \ There are many different ways of avoiding division by zero or small numbers.\
    \ Here, we drop points that are too close to the origin. What is “too close”?\
    \ In our case, we drop the points whose distance from the origin is less than\
    \ 1 percent of the maximum distance. We find indices that satisfy this condition\
    \ (valid_idx = np.where(r > np.max(r)*0.01) in the code) and squeeze out the unwanted\
    \ points with the squeeze() method. As a result, the get_vfield_radial() function\
    \ may return p that contains the subset of the original input argument p.\n\n\
    ```python\n# Code Block 3.16\n\ndef get_vfield_uniform(p, type='right'):\n   \
    \ if type=='right':\n        dx, dy = 1, 0\n    if type=='left':\n        dx,\
    \ dy = -1, 0\n    if type=='up':\n        dx, dy = 0, 1\n    if type=='down':\n\
    \        dx, dy = 0, -1\n    vf = np.zeros(p.shape)\n    vf[0] = dx\n    vf[1]\
    \ = dy\n    return vf, p\n\ndef get_vfield_radial(p, type='1/r'):\n    r = np.sqrt(np.sum(p**2,\
    \ axis=0))\n    # The above line is the same as:\n    # r = np.sqrt(p[0]**2+p[1]**2)\n\
    \    # When we are dividing by r, a small value of r\n    # can blow up the magnitude\
