    # 8.6 MATH: SCALAR AND VECTOR POTENTIALS


    In this section, we will introduce a beautiful mathematical theory behind the
    relationship between fields and potentials. The fundamental theorem of vector
    calculus, also known as Helmholtz theorem, states that a vector field like $\vec{E}$
    or $\vec{B}$ can always be represented as, or decomposed into, a combination of
    gradient and rotational fields, such as $\nabla V$ and $\nabla \times \vec{A}$,
    respectively. The gradient field is always curl-free, and the rotational field
    is always divergence-free.


    Theorems about decomposition or representation have foundational roles in mathematics
    and physics. For example, the fundamental theorem of arithmetic states that any
    integer can be represented as a product of prime numbers. The Fourier theorem
    states that a periodic function can be decomposed into a series of sinusoidal
    functions. With the knowledge that a mathematical object (in our case, a vector
    field) can be represented with other mathematical objects with unique properties
    (like curl-free or divergence-free), we can more easily analyze, synthesize, understand,
    and manipulate their behaviors.


    Much of our scientific and cognitive efforts of understanding the universe consist
    of breaking up a complex system or phenomena into more-approachable components.
    For example, in chemistry, the structure of a molecule is analyzed based on the
    properties of its constituent atoms. In biology, a cell is studied based on the
    complex interactions among its constituent parts such as nucleic acids, proteins,
    and organelles. In the standard model of particle physics, a theory of fundamental
    forces is considered based on a small set of elementary particles: quarks, leptons,
    elementary bosons, and their antiparticles. In economics, the behavior of a market
    is analyzed based on the different incentives and actions of its constituent players,
    such as consumers and producers. Now, let’s get into more detail about the scalar
    and vector potentials for electromagnetic fields.


    The relationship between the field and the potential, $\vec{E} = -\nabla V$ and
    $\vec{B} = \nabla \times \vec{A}$, comes from more general mathematical statements
    about a vector field. A gradient vector field $\vec{K}$ with a zero curl can always
    be expressed as a gradient of some scalar function $V$, where $\vec{K} = \nabla
    V$.


    With $\vec{K} = \nabla V$, the curl of $\vec{K}$ is:


