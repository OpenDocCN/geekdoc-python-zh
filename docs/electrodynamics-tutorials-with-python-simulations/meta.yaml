    ```\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_161_0.png)\n\nFor a given vector\
    \ field $\\vec{K}$ like a wind map, we define a mathematical quantity called circulation\
    \ as a line integral around a closed path: $\\oint_{\\text{Contour}} \\vec{K}\
    \ \\cdot d\\vec{l}$. The sign of this integral indicates the direction of the\
    \ rotation, and its magnitude is proportional to the degree of “swirling” of a\
    \ vector field.\n\nA related mathematical operation is the curl of a vector field.\
    \ As discussed in Chapter 2, it is defined as:\n\n$$\\nabla \\times \\vec{K} =\
    \ \\left( \\frac{\\partial K_z}{\\partial y} - \\frac{\\partial K_y}{\\partial\
    \ z} \\right) \\hat{x} + \\left( \\frac{\\partial K_x}{\\partial z} - \\frac{\\\
    partial K_z}{\\partial x} \\right) \\hat{y} + \\left( \\frac{\\partial K_y}{\\\
    partial x} - \\frac{\\partial K_x}{\\partial y} \\right) \\hat{z}.$$\n\nFor example,\
    \ for a vector field $\\vec{K}(x, y, z) = (x^2 + y)\\hat{x} + (y + z^2)\\hat{y}\
    \ + (x + y)\\hat{z}$, its curl is: $\\nabla \\times \\vec{K} = (1 - 2z)\\hat{x}\
    \ - \\hat{y} - \\hat{z}$. The following code block verifies this using symbolic\
    \ mathematics with sympy. Here, the components of the curl vector are defined\
    \ with the first derivatives of the vector field, obtained with the function `sym.diff()`.\n\
    \n## 146 ■ Electrodynamics Tutorials with Python Simulations\n\n```\n# Code Block\
    \ 5.22\n\n# curl with sympy\n\nx, y, z = sym.symbols('x y z')\n\n# vector field\
    \ example\nvx = x**2+y\nvy = y+z**2\nvz = x+y\n\n# Calculation of curl\ncurlx=(sym.diff(vz,y)-sym.diff(vy,z))\n\
    curly=(sym.diff(vx,z)-sym.diff(vz,x))\ncurlz=(sym.diff(vy,x)-sym.diff(vx,y))\n\
    \nprint(\"\\tVector Field:\",[vx,vy,vz])\nprint(\"\\tCurl:\",[curlx,curly,curlz])\n\
    ```\n\nVector Field: [x**2 + y, y + z**2, x + y]\nCurl: [1 - 2*z, -1, -1]\n\n\
    Curl is defined at each point of a vector field. The following code block shows\
    \ examples of a vector field and their respective curls evaluated at various points.\n\
    \n```\n# Code Block 5.23\n\n# Visualization of curl\n\n# Variables for symbolic\
    \ calculation.\nx,y,z = sym.symbols('x y z')\n\n# Variables for numerical calculation.\n\
    step = 0.25\nv = np.arange(-1,1+step,step)\nx_range,y_range,z_range = np.meshgrid(v,v,0,indexing='ij')\n\
    p = np.vstack((x_range.flatten(),y_range.flatten(),z_range.flatten()))\nN = p.shape[1]\n\
    \np_line, _ = currents_along_square (I=0, L=2, dL=step)\n\nfor s in range(2):\n\
    \    print(\"Example\",s+1)\n    if s==0:\n        vx,vy,vz = -y,x,sym.Integer(0)\n\
    \        v_line = np.vstack((-p_line[1],p_line[0]))\n    if s==1:\n        vx,vy,vz\
