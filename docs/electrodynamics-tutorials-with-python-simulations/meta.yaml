    \ (r_s \\sin \\theta_s \\cos \\phi_s, r_s \\sin \\theta_s \\sin \\phi_s, r_s \\\
    cos \\theta_s)$。下面的代码块执行了这个积分的符号计算，并绘制了单位球体（R = 1）的结果。\n\n```python\n# 代码块 8.10\n\
    \n# 球对称电荷分布的电势。\nR, r = sym.symbols('R r', positive=True)\nrho = 1/((4/3)*sym.pi*R**3)\n\
