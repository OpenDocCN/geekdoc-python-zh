    Given the above observations, a reasonable initial expression for quantifying
    the amount of flow would be an integral of vector magnitudes over the range of
    a boundary, \(\int_{a}^{b} |\vec{v}| dl\), where \(\vec{v}\) is the vector at
    the boundary, and the total length \(L\) of the boundary is broken up into infinitesimal
    segments \(dl\), such that \(\int_{a}^{b} dl = L\).


    Let''s sharpen this idea further. How should we deal with the case when the flow
    and the boundary are not perpendicular to each other? Consider the following two
    cases. In the first case, the boundary and the vectors are perpendicular. In the
    second case, the boundary is slanted (non-orthogonal) relative to the vectors.
    Even though the slanted boundary is longer, both boundaries span the same vertical
    range, and the amounts of flow would be equal. Imagine an analogous situation
    where a water hose is connected to a faucet that delivers a fixed amount of water
    for a given time. Whether the end of the hose is straight (so that its cross-section
    is perpendicular to the flow of water) or whether the hose'
