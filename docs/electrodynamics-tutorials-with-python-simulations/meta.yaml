    \ $I = \\frac{dq}{dt} = \\frac{\\lambda dy}{dt} = \\lambda v_y$, or $v_y = \\\
    frac{I}{\\lambda}$.\n\nDue to this movement of charges with speed ($v_y$), the\
    \ conductor itself is also subject to the magnetic force. According to the right-hand\
    \ rule and keeping in mind that the electrons have negative charges, the direction\
    \ of this magnetic force will be in the $-x$ direction, opposite to the motion\
