- md: '## CHAPTER 8

    ## Potential


    ### 8.1 ELECTRIC POTENTIAL


    Consider going along an electric field through a particular path. Along this path,
    let’s add up the strength of the field pointing in the same direction. Mathematically,
    this summation can be expressed as $\int_{\text{Path}} \vec{E} \cdot d\vec{l}$,
    where $d\vec{l}$ denotes the infinitesimal segment along the path. This is similar
    to the calculation of flux, which is the integration of the strength of the electric
    field parallel to the normal of some specified surface.


    Electric potential $V$ is defined as

    $$

    V = - \int_{\text{Path}} \vec{E} \cdot d\vec{l}.

    $$

    One volt ($V$) of potential is equivalent to one joule per coulomb. Unfortunately,
    the symbol $V$ is associated with several different quantities and may cause some
    confusion. $V$ may refer to electric potential, the unit volt of potential, volume,
    or velocity in lower case. We sometimes have to distinguish them based on context.
    The negative sign means that we are going against the direction of the electric
    field. That is, the voltage definition goes “up” or against the direction of the
    field, rather than “down.”


    What is the meaning and significance of $V$? As a motivating example, consider
    a well-studied example from classical mechanics: an object with mass $m$ under
    the influence of gravity near the surface of the earth. When I lift this object
    over a vertical distance $h$ by doing mechanical work, it has moved in the opposite
    direction (there is the negative sign again) of the gravitational force and gained
    gravitational potential energy, $mgh$, because

    $$

    \begin{aligned}

    \text{Gravitational Potential Energy} &= -\text{Work} \\

    &= - \int \mathbf{F} \cdot d\mathbf{l} \\

    &= - \int_{0}^{h} (-mg)dy = mgh.

    \end{aligned}

    $$

    Because the electric force $\mathbf{F} = q\mathbf{E}$, the definition of electric
    potential leads to

    $$

    \begin{aligned}

    V &= - \int \mathbf{E} \cdot d\mathbf{l} \\

    &= -\frac{1}{q} \int \mathbf{F} \cdot d\mathbf{l} \\

    &= \text{Electrical Potential Energy divided by } q.

    \end{aligned}

    $$

    Conversely, we can define the electric field in terms of the electric potential.
    The differential of the potential $dV$ along an infinitesimal segment $d\mathbf{l}
    = dx\hat{\mathbf{x}} + dy\hat{\mathbf{y}} + dz\hat{\mathbf{z}}$ is $dV = \frac{\partial
    V}{\partial x}dx + \frac{\partial V}{\partial y}dy + \frac{\partial V}{\partial
    z}dz$, which can be expressed as $\nabla V\cdot d\mathbf{l}$, or the gradient
    of the potential function, so the electric potential becomes

    $$

    V = \int_{\text{Path}} dV = \int_{\text{Path}} \nabla V \cdot d\mathbf{l}.

    $$

    Our original definition of the potential was $V = - \int_{\text{Path}} \mathbf{E}
    \cdot d\mathbf{l}$, so we identify that $\mathbf{E} = -\nabla V$. In other words,
    the three-dimensional slope of the electric potential $V$ is the negative of the
    electric field $\mathbf{E}$.


    The concept of electric potential is analogous to the gravitational potential
    energy divided by $m$, or $gh$ in the above example. Just as $gh$ indicates how
    much gravitational potential energy a unit mass would possess when it is lifted
    by height $h$, the electric potential $V$ indicates how much electrical potential
    energy a unit charge would possess when it is moved under the presence of the
    electric field between the initial and final positions.


    In the case of the gravitational potential energy, the earth’s surface often serves
    as a convenient point of reference where the gravitational potential energy is
    set to zero. Similarly, we often choose to treat a point at infinity as our reference
    point for the electric potential, so that $V(\infty) = 0$. With this reference
    point of zero potential at infinity, we can treat the electric potential at one
    point in space as being equal to the amount of work to bring a unit electrical
    charge from infinity to that particular position under the presence of the electric
    field. Sometimes, a reference point other than infinity can be more convenient.
    For example, when we are dealing with electrical circuits, we often define “ground”
    which serves as an infinite source or sink of electrical charges and assign zero
    potential to it. A biological cell also has electrical potential difference across
    its membrane, and it is customary to consider the outside of the cell to be at
    zero potential, making the intracellular region at negative potential.


    The gravitational force is conservative. The amount of mechanical work done on
    an object as it is moved within the gravitational field is independent of its
    path of movement. The change in the gravitational potential energy of an object
    is only determined by the change of its position, as long as no non-conservative
    force like air drag or friction is involved. In other words, we only need $h$,
    the change in height, to calculate the change in the gravitational potential energy.
    It does not matter whether the mass $m$ was raised straight up or in a zig-zag
    path. Similarly, the electric potential is path-independent. You can bring a charge
    along very different paths, but the change in the electric potential of a charge
    is determined solely by two positions: the charge’s starting and ending positions.


    A ball on a hilly landscape would roll down the hill, trading its potential energy
    with kinetic energy. A charge placed at a higher electric potential also rolls
    down the gradient of the electric potential landscape. Using the analogy of pressure
    can also be helpful to describe potential. As the difference in water pressure
    causes the flow of water, the difference in electric potential causes the flow
    of electric charges. An electric charge can be either positive or negative, unlike
    the mass of an object which is always a positive quantity. A positive charge rolls
    “down” the electric potential landscape, while a negative charge rolls “up” and
    moves in the opposite direction of the positive charge.


