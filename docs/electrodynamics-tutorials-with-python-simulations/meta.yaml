    pi} \\int_{-L/2}^{+L/2} \\frac{I}{\\sqrt{z^2 + x_s^2}} dx_s$.\n\nWe had come across\
    \ the same integral when we dealt with the electric potential of a charged wire.\
    \ We can simply swap $\\mu_0$ with $\\frac{1}{\\epsilon_0}$ and $I$ with $\\lambda$.\
    \ The magnetic vector potential of a current-carrying wire is:  \n$\\vec{A}(z)\
    \ = \\frac{\\mu_0 I}{2\\pi} \\ln\\left[ \\frac{L}{2z} + \\sqrt{1 + \\left( \\\
    frac{L}{2z} \\right)^2} \\right] \\hat{x}$.\n\nWhen $z \\ll L$, this solution\
    \ becomes $\\vec{A}(z) = \\frac{\\mu_0 I}{2\\pi} \\ln\\left( \\frac{L}{z} \\right)\
    \ \\hat{x}$. At this limit, let’s find the magnetic field by taking the curl of\
    \ this vector potential.  \n$\\vec{B} = \\nabla \\times \\vec{A}(z) = \\frac{\\\
    partial A_x(z)}{\\partial z} \\hat{y} = -\\frac{\\mu_0 I}{2\\pi z} \\hat{y}$."
