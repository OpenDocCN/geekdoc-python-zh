  md: '# 4.3 EXAMPLE: INFINITE LINE


    Let’s apply the superposition principle to calculate the electric field when the
    charges are distributed along a long line. As a theoretical exercise, consider
    a line with linear charge density $\rho$, so that the amount of electric charge
    along an infinitesimal length $dy$ is given by $\rho dy$. Then, the electric field
    at a distance $D$ away from this line will be given by:


    $$|\vec{\mathbf{E}}(x=D)| = \int_{-\infty}^{\infty} dE_x(y),$$


    where $dE_x(y)$ is the $\hat{\mathbf{x}}$-component of the electric field due
    to the infinitesimal charge $\rho dy$ at position $y$. We may ignore the $\hat{\mathbf{y}}$-component
    for the following reason. Because we are considering an infinite line, we can
    choose the point of interest to be at $(D,0)$ without loss of generality and always
    find a pair of charges ($q_i$ and $q_j$ in the following figure) that are symmetrically
    located with respect to the $x$-axis. Therefore, the $\hat{\mathbf{y}}$-components
    of their electric fields are equal and opposite, while the


    ![](img/c63d379c3ef3c512c4d31fbfe30defd9_83_0.png)'
  merge: -1
  pgno: 83
- img_proc: true
  md: '68 ■ Electrodynamics Tutorials with Python Simulations


    x̂-components point in the same direction. Thanks to this symmetry, the ŷ-component
    of the total field is zero.


    The magnitude of the electric field due to an infinitesimal charge at y is:


    $|d\vec{E}(x = D, y)| = \frac{\rho dy}{2\pi\epsilon_0} \frac{1}{\sqrt{D^2 + y^2}}$


    The x-component of the above expression is


    $|d\vec{E}_x(x = D, y)| = \frac{\rho dy}{2\pi\epsilon_0} \frac{1}{\sqrt{D^2 +
    y^2}} \frac{D}{\sqrt{D^2 + y^2}} = \frac{\rho dy}{2\pi\epsilon_0} \frac{D}{D^2
    + y^2}$


    Then, the total electric field is


    $|\vec{E}(x = D)| = \frac{\rho}{2\pi\epsilon_0} \int_{-\infty}^{\infty} \frac{Ddy}{D^2
    + y^2} = \frac{\rho}{2\pi\epsilon_0} \int_{-\infty}^{\infty} \frac{dt}{1 + t^2}$


    where we have defined a new variable t = y/D.


    The definite integral converges and turns out to be π, as shown by the following
    code block with the sympy module. The line sym.Symbol(''t'') allows us to treat
    t as a symbolic constant, and sym.integrate() evaluates the integral of a function
    for the specified range.


    ```

    # Code Block 4.4

    import sympy as sym

    t = sym.Symbol(''t'')

    # sym.oo is symbolic constant for infinity.

    sym.integrate(1/(1+t**2), (t,-sym.oo,sym.oo))

    ```


    π


    Let''s also show analytically that $\int_{-\infty}^{\infty} \frac{dt}{1+t^2} =
    \pi$, by a change of variable $t = \tan \theta = \frac{\sin \theta}{\cos \theta}$.
    We note that $dt = (1 + \tan^2 \theta)d\theta$ and that $1 + \tan^2 \theta = \frac{1}{\cos^2
    \theta}$. Then, the original integral becomes


    $\int_{-\infty}^{\infty} \frac{dt}{1 + t^2} = \int_{-\pi/2}^{\pi/2} \cos^2 \theta
    (1 + \tan^2 \theta) d\theta = \int_{-\pi/2}^{\pi/2} (\cos^2 \theta + \sin^2 \theta)
    d\theta = \int_{-\pi/2}^{\pi/2} d\theta = \pi$'
