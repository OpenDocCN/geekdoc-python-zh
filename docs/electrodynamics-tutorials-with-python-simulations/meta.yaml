    We will choose a convention that the normal vectors should point outward from
    an enclosure. The following functions, `get_normals_enc()` and `plot_normals_enc()`,
    accept an additional input argument `inside` that specifies a point that disambiguates
    the inside and outside of a boundary. The default `inside` point is the origin
    (0,0) of the coordinate system. We also make a simplifying assumption that the
    boundary surface is not too complex (i.e., no dips or concavity).


    Then, consider a vector between a point on the boundary $\vec{p}_b$ and the inside
    point $\vec{p}_i$. We can define a vector that points outward by $\vec{o} = \vec{p}_b
    - \vec{p}_i = (x_b - x_i, y_b - y_i)$. Given a normal vector $\vec{n}$ on the
    boundary, we can orient it outward by multiplying it by the sign of a dot product
    between $\vec{o}$ and $\vec{n}$. The sign of the dot product will be positive
    if $\vec{n}$ is indeed pointing outward. If not, the direction of $\vec{n}$ can
    be reversed. This strategy is implemented in `get_normals_enc()`.


    There is another subtle difference between `get_normals()` and `get_normals_enc()`.
    Because the normal vector at a particular point is calculated based on two neighboring
    points, the normal vector can not be calculated at the first or the last points
    in the boundary. This omission is apparent in the above figure. When we are working
    with an enclosed boundary, the first and the last points are adjacent to each
    other, and the normal vectors can be calculated for all points on the boundary
    by concatenating the first two points at the end of the boundary array (`boundary_ext
    = np.hstack((boundary,boundary[:,:2]))` in the code). The following plot shows
    that the normal vectors are displayed for all points along the boundary.'
