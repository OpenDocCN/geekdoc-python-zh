- img_proc: true
  md: 'of $x$, $y$, and $z$ axes, applies here. As we follow the swirling of the vector
    field with our four right fingers, the right thumb points in the direction of
    the rotation axis. This is the same convention used in classical mechanics for
    defining an object''s rotation or angular momentum. The curl vector calculated
    at each point of the vector field consistently points along the $+z$-axis in this
    example.


    The second example shows a more complex vector field, where the swirling of the
    vector field is counterclockwise in the upper-right corner (first quadrant) of
    the $xy$-plane, while the lower-left corner (third quadrant) shows clockwise swirling.
    It is also apparent that the vector field''s swirling increases as we move away
    from the origin along the diagonal direction of $y = x$. The curl of this vector
    field is, therefore, positive in the first quadrant and negative in the third
    quadrant. The magnitude of the curl vectors increases as we move away from the
    origin.


    According to the curl theorem, also known as Stoke''s law, the sum of curls of
    a vector field $\mathbf{K}$ over a region of interest is equal to the total circulation
    of the vector field calculated along the region''s boundary.


    $$\iint_{\text{Area}} (\nabla \times \mathbf{K}) \cdot d\vec{a} = \oint_{\text{Contour}}
    \mathbf{K} \cdot d\vec{l}$$


    The differential areal element $d\vec{a}$ is defined on the region of interest,
    which is enclosed by the contour boundary. The differential line segment $d\vec{l}$
    is defined along the one-dimensional closed contour.


    The following code block compares the areal or surface integral of the curls (left
    side of Stokes'' theorem) and the line integral of the vector field (right side
    of Stokes'' theorem). We use the same vector field examples from the above, evaluate
    the integrals with different boundary shapes and locations, and demonstrate that
    these two methods of calculations yield the same value within the numerical precision
    of the `step` parameter. For the surface integral, we will use the surface area
    on the $xy$-plane.


    In the first vector field example, where the curls are uniform with $\nabla \times
    \mathbf{K} = 2\hat{z}$, the surface integral can be trivially calculated as $2A$,
    where $A$ is the area of the region. Hence, the numerical results can be easily
    checked against the exact value. The analytical calculation is not as trivial
    for the second example. However, we note that when the boundary is centered at
    the origin or at $x0$, $y0 = 0.5, -0.5$, the symmetry of this particular'
