    \ and equal to $\\frac{L_0}{\\gamma_0}$, where $\\gamma_0 = \\frac{1}{\\sqrt{1-u^2/c^2}}$.\
    \ This length contraction of $L_0$ involves $u$, not $v$, because it is about\
    \ the movement of the charges in the wire, not the movement of $q$. Correspondingly,\
    \ if the charge density in the rest frames of the charges in the wire is denoted\
    \ as $\\lambda_0$, the charge density in $S$, where the charges are in motion,\
    \ is $\\lambda = \\gamma_0\\lambda_0$.\n\nWhat are the speeds of the moving charges\
    \ in the rest frame of $q$? To answer this question, we have to use the velocity\
    \ addition formula and write $u'$ in terms of $v$ and $u$:\n\n$$u' = \\frac{u\
    \ - v}{1 - vu/c^2}.$$\n\nThe speed of the positive charges in the wire, as observed\
    \ in $S'$, is $u'_+ = \\frac{u-v}{1-vu/c^2}$, and the speed of the negative charges\
    \ is $u'_- = \\frac{-u-v}{1+vu/c^2}$. This difference in speed leads to the different\
    \ amount of length contraction for the positive and negative charges in $S'$.\
    \ The length contraction factors for the positive and negative charges are: $\\\
    gamma_+ = \\frac{1}{\\sqrt{1-(u'_+/c)^2}}$ and $\\gamma_- = \\frac{1}{\\sqrt{1-(u'_-/c)^2}}$.\
    \ The respective charge densities are $\\lambda_+ = +(\\gamma_+\\lambda_0)$ and\
    \ $\\lambda_- = -(\\gamma_-\\lambda_0)$, for the positive and negative charges,\
    \ respectively. Due to the unequal densities, the wire would be electrically charged\
    \ with a non-zero total charge density of $\\lambda_T = \\lambda_+ + \\lambda_-$,\
    \ when observed in $S'$.\n\nThe electric field strength at a distance $d$ away\
    \ from an infinite wire with charge density $\\lambda_T$ is given by $E = \\frac{|\\\
