    \ [y0,y1],color='gray',linewidth=lw,alpha=0.4)\n    nx = 1\n    ny = -(x1-x0)/(y1-y0)\n\
    \    n_mag = np.sqrt(nx**2+ny**2)\n    plt.quiver(0,0,nx/n_mag,ny/n_mag,\n   \
    \            angles='xy',scale_units='xy',color='black',scale=2)\n    plt.axis('square')\n\
    \    plt.xlim(np.array([-1,1])*1.1)\n    plt.ylim(np.array([-1,1])*1.1)\n    plt.xticks((-1,0,1))\n\
