    \nA sinusoidal plane wave at position \\( \\vec{r} \\) and time \\( t \\) can\
    \ be mathematically represented by either \\( A \\sin(\\vec{k} \\cdot \\vec{r}\
    \ - \\omega t) \\), \\( A \\cos(\\vec{k} \\cdot \\vec{r} - \\omega t) \\), or\
    \ a complex exponential form \\( Ae^{i(\\vec{k} \\cdot \\vec{r} - \\omega t)}\
    \ \\). Here, \\( A \\) is a constant value denoting the maximum amplitude of the\
    \ wave, and the argument \\( (\\vec{k} \\cdot \\vec{r} - \\omega t) \\) is known\
    \ as a phase or phase angle in wave mechanics. The wave vector \\( \\vec{k} \\\
    ) corresponds to the direction of wave propagation, and, hence, the wavefront\
    \ of the same oscillatory cycle, or of equal phase, is a plane normal to \\( \\\
    vec{k} \\). The angular frequency \\( \\omega \\) describes the angular displacement\
    \ of the wave per unit time. The frequency, \\( \\frac{\\omega}{2\\pi} \\), describes\
    \ the displacement of wave cycles per unit time, measured in the unit of Hz.\n\
    \nBoth the wave vector and the angular frequency are related to the spatial and\
    \ temporal periodicities of a wave. For a plane wave with wavelength \\( \\lambda\
    \ \\) and period \\( T \\), moving at speed \\( v = \\frac{\\lambda}{T} \\), the\
    \ magnitude of the wave vector and the angular frequency are given by \\( |\\\
    vec{k}| = \\frac{2\\pi}{\\lambda} \\) and \\( \\omega = \\frac{2\\pi}{T} \\).\
    \ The following code block displays a snapshot of a sinusoidal plane wave moving\
    \ along a line of \\( y = x \\) or in a direction of \\( \\vec{k} = \\frac{2\\\
    pi}{\\lambda} \\left( \\frac{1}{\\sqrt{2}} \\hat{x} + \\frac{1}{\\sqrt{2}} \\\
    hat{y} \\right) \\) at t = 0. The different gray levels correspond to different\
    \ phases of the wave cycle.\n\n```\n# Code Block 10.3\n\n# Visualize a sinusoidal\
    \ plane wave, moving along a line of y=x.\n\nA = 1 # amplitude\nwavelength = 3\n\
    k = 2*np.pi/wavelength # wave vector\n\n# a meshgrid for x, y, and z coordinates\n\
    N = 30\nx, y, z = np.meshgrid(np.linspace(0,20,N),\n                      np.linspace(0,20,N),\n\
    \                      np.linspace(-10,10,N))\n\n# sinusoidal plane wave at t=0.\n\
    wave = A*np.cos(k*x/np.sqrt(2)+k*y/np.sqrt(2))\n\n# Display only a portion of\
    \ a wave.\nwave[(y - x > 8) | (y - x < -8)] = np.nan\nwave[(y + x < 8) | (y +\
    \ x > 28)] = np.nan\n\nfig = plt.figure(figsize=(3,3))\nax = fig.add_subplot(111,\
    \ projection='3d')\nax.scatter(x.flatten(),y.flatten(),z.flatten(),\n        \
    \   c=wave.flatten(), cmap='gray')\n\n# Indicate the direction of wave propagation\
    \ with an arrow.\nax.quiver(15,15,0,1.5*k,1.5*k,0, color='black')\n\nax.set_xlabel('x')\n\
    ax.set_ylabel('y')\nax.set_zlabel('z')\nax.set_xticks([0,10,20])\nax.set_yticks([0,10,20])\n\
    ax.set_zticks([-10,0,10])\nax.view_init(20, 120)\nax.set_box_aspect(aspect=None,\
    \ zoom=0.8)\nplt.tight_layout()\nplt.savefig('fig_ch10_plane_wave_diag.pdf')\n\
    plt.show()\n```\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_264_0.png)\n\n## Figure\
    \ 10.3\n\nNow let’s study a plane wave of the electromagnetic fields. We can start\
    \ with a general expression for an electric field $\\vec{E}(x, y, z, t)$:\n\n\
    $\\vec{E}(x, y, z, t) = E_x(x, y, z, t)\\hat{x} + E_y(x, y, z, t)\\hat{y} + E_z(x,\
    \ y, z, t)\\hat{z},$\n\nwhere $E_x(x, y, z, t)$ is an $x$-component of the electric\
    \ field at position $(x, y, z)$ and at time $t$. $E_y(x, y, z, t)$ and $E_z(x,\
    \ y, z, t)$ correspond to the $y$ and $z$ components. As we have discussed in\
    \ the previous section, the electric field in free space (i.e., no $\\rho$ and\
    \ no $\\vec{J}$) satisfies the wave equation, so we will consider an electric\
    \ field that is a sinusoidal plane wave with a fixed angular frequency $\\omega$.\
    \ Since the electromagnetic wave travels at speed $c$, we know its wavelength:\
    \ $\\lambda = \\frac{2\\pi c}{\\omega}$. Such a wave with a single wavelength\
    \ or a single frequency is referred to as a monochromatic wave. An example of\
    \ a monochromatic electromagnetic wave is a single-colored laser.\n\nIn general,\
    \ $E_x$, $E_y$, and $E_z$ can be different from one another with distinct functional\
    \ forms, but for a monochromatic sinusoidal plane wave,\n\n$E_x(x, y, z, t) =\
    \ E_x(\\vec{k} \\cdot \\vec{r} - \\omega t) = \\tilde{E}_x e^{i(\\vec{k} \\cdot\
    \ \\vec{r} - \\omega t)},$\n\nwhere $\\tilde{E}_x$ denotes a constant (potentially\
    \ a complex number). Likewise, $E_y$ and $E_z$ are also functions of $\\vec{k}\
    \ \\cdot \\vec{r} - \\omega t$: $E_y(x, y, z, t) = \\tilde{E}_y e^{i(\\vec{k}\
    \ \\cdot \\vec{r} - \\omega t)}$ and $E_z(x, y, z, t) = \\tilde{E}_z e^{i(\\vec{k}\
    \ \\cdot \\vec{r} - \\omega t)}$.\n\nFor simplicity, we assume that the wave is\
    \ propagating along the z-axis with a wave vector $\\mathbf{k} = k\\hat{\\mathbf{z}}$.\
    \ That means that the resulting electric field $\\vec{\\mathbf{E}}(x, y, z, t)$\
    \ can be expressed as\n\n$$\\vec{\\mathbf{E}}(x, y, z, t) = \\bar{E}_x e^{i(kz\
    \ - \\omega t)} \\hat{\\mathbf{x}} + \\bar{E}_y e^{i(kz - \\omega t)} \\hat{\\\
    mathbf{y}} + \\bar{E}_z e^{i(kz - \\omega t)} \\hat{\\mathbf{z}}.$$\n\n$E_x$,\
    \ $E_y$, and $E_z$ are the functions of $(kz - \\omega t)$, independent of the\
    \ variables $x$ and $y$ that are transverse coordinates to the wave propagation.\
    \ At any fixed value of $z$ at a specific time $t$, all the points lying on the\
    \ $xy$-plane orthogonal to the $z$-axis have the same phase of the wave, as expected\
    \ of a plane wave.\n\nWe can similarly express the magnetic field as:\n\n$$\\\
    vec{\\mathbf{B}}(x, y, z, t) = \\bar{B}_x e^{i(kz - \\omega t)} \\hat{\\mathbf{x}}\
    \ + \\bar{B}_y e^{i(kz - \\omega t)} \\hat{\\mathbf{y}} + \\bar{B}_z e^{i(kz -\
    \ \\omega t)} \\hat{\\mathbf{z}}.$$\n\nMaxwell's equations further constrain $\\\
    bar{E}$'s and $\\bar{B}$'s. In particular, because $\\nabla \\cdot \\vec{\\mathbf{E}}\
    \ = \\frac{\\partial}{\\partial x}E_x + \\frac{\\partial}{\\partial y}E_y + \\\
    frac{\\partial}{\\partial z}E_z = 0$ in free space,\n\n$$\\frac{\\partial}{\\\
    partial x}\\left(\\bar{E}_x e^{i(kz - \\omega t)}\\right) + \\frac{\\partial}{\\\
    partial y}\\left(\\bar{E}_y e^{i(kz - \\omega t)}\\right) + \\frac{\\partial}{\\\
    partial z}\\left(\\bar{E}_z e^{i(kz - \\omega t)}\\right)$$\n$$= 0 + 0 + \\frac{\\\
    partial}{\\partial z}\\left(\\bar{E}_z e^{i(kz - \\omega t)}\\right)$$\n$$= 0,$$\n\
    \nwhere the first two terms with partial derivatives with respect to $x$ and $y$\
    \ are trivially equal to zero because there is no dependence on $x$ or $y$. For\
    \ the above equation to hold true, the third term must be equal to zero, leading\
    \ to the conclusion: $\\bar{E}_z = 0$. Similarly, because $\\nabla \\cdot \\vec{\\\
    mathbf{B}} = 0$, we also conclude that $\\bar{B}_z = 0$. In other words, there\
    \ is no $z$-component in the electromagnetic plane wave that propagates in the\
    \ $z$ direction. Hence, it is a purely transverse wave without any longitudinal\
    \ component.\n\nNow, let's apply Faraday's law, $\\nabla \\times \\vec{\\mathbf{E}}\
    \ = -\\frac{\\partial \\vec{\\mathbf{B}}}{\\partial t}$, and collect $x$ and $y$\
    \ components separately. A lot of terms such as $\\frac{\\partial}{\\partial y}E_z$\
    \ or $\\frac{\\partial}{\\partial x}E_z$ will disappear trivially, because $\\\
    bar{E}_z = \\bar{B}_z = 0$.\n\nThe $x$ components of the left and right sides\
    \ of Faraday's law should be equal, or\n\n$$-\\frac{\\partial}{\\partial z}\\\
    left(\\bar{E}_y e^{i(kz - \\omega t)}\\right) = -\\frac{\\partial}{\\partial t}\\\
    left(\\bar{B}_x e^{i(kz - \\omega t)}\\right)$$\n$$-(ik)\\bar{E}_y = (i\\omega)\\\
    bar{B}_x.$$"
