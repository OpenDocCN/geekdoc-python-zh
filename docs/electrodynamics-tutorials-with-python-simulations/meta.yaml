  - '[PAGE 156]


    line integral easily, as shown below.


    $$\oint_{\text{Contour}} \vec{B} \cdot d\vec{l} = B \oint_{\text{Contour}} ds
    = 2\pi r B,$$


    where $B$ is the strength of the magnetic field at distance $r$ away from the
    center of the wire.


    According to Ampere''s law, the above quantity should be equal to $\mu_0$ times
    the amount of current enclosed by the Amperian loop. When $r > R$, it is easy
    because the total amount of current enclosed by this loop is always $I$. Hence,
    $B = \frac{\mu_0 I}{2\pi r}$.


    The case for $r < R$ is a bit more complicated since the total amount of enclosed
    current depends on $r$.


    $$I_{\text{enclosed}} = \int_0^r \int_0^{2\pi} \vec{J} \cdot \hat{n} r'' dr''
    d\phi = \frac{\alpha \pi}{2} r^4.$$


    Hence, the magnetic field inside the wire is $B = \frac{\mu_0 I_{\text{enclosed}}}{2\pi
    r} = \frac{\mu_0 \alpha}{4} r^3$.


    The following code block plots the magnetic field strengths computed with Ampere''s
    and Biot-Savart laws.


