    # 7.3 LORENTZ TRANSFORMATION


    Different observers would specify the same event, a point in space and time, differently
    according to their own coordinate systems associated with their reference frames.
    The relationship between these specifications of spatial and temporal coordinates
    is called the coordinate transformation. If the coordinate systems are in different
    inertial reference frames, the coordinate transformation must be consistent with
    the results of time dilation and length contraction.


    Suppose we have two Cartesian coordinate systems of inertial reference frames
    $S$ and $S''$, which are moving relative to each other at a constant velocity
    of $v$ along the $x$-axis. According to an observer in $S$, the location and time
    of an event may be specified with the spatial coordinates $(x, y, z)$ and the
    time coordinate $t$. The coordinates of the same event in $S''$ would be $(x'',
    y'', z'')$ and $t''$, according to an observer in $S''$. Let us assume that the
    origins of two coordinate systems, $O$ and $O''$, coincide at $t = t'' = 0$. From
    the perspective of the observer in $S$ at time $t$, the position of the origin
    of $S''$ along the $x$-axis is at $vt$. Also, the horizontal distance between
    the origin $O''$ and $x''$ in $S''$ would be length-contracted when observed in
    $S$. Therefore, the relationship between $x''$, $x$, and $t$ can be expressed
    as $x = vt + \frac{x''}{\gamma}$, or $x'' = \gamma(x - vt)$.


    ![](img/c63d379c3ef3c512c4d31fbfe30defd9_191_0.png)


    According to the observer in $S''$, the coordinate system in $S$ is moving with
    a constant velocity of $-v$. Therefore, we can obtain the inverse'
  - '[PAGE 192]


    transformation, by writing \(x\) as \(x''\), \(t\) as \(t''\), \(x''\) as \(x\),
    and \(v\) as \(-v\). Hence, \(x = \gamma(x'' + vt'')\). We can combine these two
    expressions to find the relationship between \(t''\), \(t\), and \(x\). The algebra
    is straightforward, as follows:


    ```

    \(x = \gamma(x'' + vt'') = \gamma [\gamma(x - vt) + vt''] = \gamma^2(x - vt) +
    \gamma(vt''),\)


    \(\gamma(vt'') = \gamma^2(vt) + (1 - \gamma^2)x = \gamma^2 v \left[ t + \left(
    \frac{1}{\gamma^2} - 1 \right) \frac{x}{v} \right],\)


    \(t'' = \gamma \left[ t + \left( \frac{1}{\gamma^2} - 1 \right) \frac{x}{v} \right]
    = \gamma \left( t - \frac{v}{c^2} x \right).\)

    ```


    The coordinates for the other two spatial dimensions are not affected by the horizontal
    movement (remember the previously mentioned thought experiment with two paint
    brushes?), so \(y'' = y\) and \(z'' = z\).


    Hence, the relativistic coordinate transformation, known as Lorentz transformation,
    can be summarized as:


    ```

    \(\begin{aligned}

    x'' &= \gamma(x - vt) \ny'' &= y \nz'' &= z \nt'' &= \gamma\left(t - \frac{v}{c^2}x\right).

    \end{aligned}\)

    ```


    The inverse transformation, going from \(S''\) to \(S\), is given by:


    ```

    \(\begin{aligned}

    x &= \gamma(x'' + vt'') \ny &= y'' \nz &= z'' \nt &= \gamma\left(t'' + \frac{v}{c^2}x''\right),

    \end{aligned}\)

    ```


    which can be easily obtained by swapping the primed and unprimed variables and
    changing the sign of \(v\). The Lorentz transformation formula explicitly illustrates
    the deep relationship and symmetry between space and time, and in relativity,
    we often refer to spacetime as a single, four-dimensional vector quantity.


    From the Lorentz transformation, we can also derive the relativistic velocity
    addition formula. Consider an object moving with speed \(u''\) in the reference
    frame \(S''\). The differential displacement of this object will be'
  - '[PAGE 193]


    dx'' in dt'', so u'' = dx''/dt''. From the inverse transformation formula, we
    have dx = γ(dx'' + vdt'') and dt = γ(dt'' + (v/c²)dx''). These differential displacements
    in space and time allow us to calculate the speed of an object according to an
    observer in S.


    $$

    u = \frac{dx}{dt} = \frac{\gamma(dx'' + vdt'')}{\gamma(dt'' + \frac{v}{c^2}dx'')}
    = \frac{\frac{dx''}{dt''} + v}{1 + \frac{v}{c^2}\frac{dx''}{dt''}} = \frac{u''
    + v}{1 + \frac{vu''}{c^2}}$$


    This formula implies that if u'' = c, u = c. In other words, the speed of light
    is constant regardless of the reference frame, which is consistent with the postulate
    of special relativity.


    We can also easily deduce an inverse velocity addition formula, allowing us to
    calculate the speed of an object according to an observer in S'', if u and v are
    known:


    $$

    u'' = \frac{u - v}{1 - \frac{uv}{c^2}}$$


    # 7.4 RELATIVISTIC MOMENTUM AND ENERGY


    Relativistic momentum is defined as p = m dx/dt₀, where t₀ is the proper time
    measured in the rest frame of mass m. Defining the momentum as m dx/dt as in Newtonian
    mechanics is a bad choice since the length contraction and time dilation would
    make the old Newtonian definition of momentum a non-conserved quantity.


    The time dilation result showed that Δt = γΔt₀. Hence, the definition of relativistic
    momentum suggests that p = m dx/dt₀ = γm dx/dt, where γ involves the speed of
    the object since the proper time t₀ is measured in the rest frame of the object
    itself. Energy is defined similarly as E = mc² dt/dt₀ = γmc².


    The relativistic definition of momentum p = m dx/dt₀ converts between different
    inertial reference frames according to the Lorentz transformation formula presented
    earlier, because dt₀ is the same in all reference frames and only the numerator
    requires transformation. However, for the Newtonian definition of momentum m dx/dt,
    both the numerator and the denominator must be converted via Lorentz transformations
    between frames. This assures that if both relativistic momentum and energy are
    conserved in one inertial reference frame, they are conserved in another inertial
    reference frame.


    For example, suppose p = m dx/dt₀ and E = mc² dt/dt₀ are conserved in S. Then,
    in S'', p'' = m dx''/dt₀ = mγ(dx/dt - v dt/dt₀) and E'' = mc² dt''/dt₀ = mc² γ(dt/dt₀
    - (v/c²) dx/dt₀),'
