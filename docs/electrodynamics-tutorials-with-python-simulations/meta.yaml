    \ in the wire (`p_curr`) and their corresponding volume elements (`dV`), we can\
    \ take several different approaches. In the function `curr_density_r2_polar()`,\
    \ the points are sampled in the polar coordinates along $r$ and $\\phi$ with $dV\
