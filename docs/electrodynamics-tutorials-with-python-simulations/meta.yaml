    # CHAPTER 2


    # Vector


    Whether it is a raindrop rolling down a hill or wind blowing due to the difference
    in air pressure, we often need to work with both magnitude (fast versus slow or
    strong versus weak) and direction (from high to low or from north to south) of
    a vector quantity. The following is a non-comprehensive review of vectors and
    their mathematical operations. For a more comprehensive introduction, we refer
    the readers to a textbook on linear algebra and vector calculus.


    A vector in three dimensions can be written as:


    $\vec{A} = a_x\hat{x} + a_y\hat{y} + a_z\hat{z} = (a_x, a_y, a_z)$,


    where $a_x$ is the magnitude of the vector''s component along the direction of
    $x$-axis. Similarly, $a_y$ and $a_z$ are the components along $y$ and $z$-axes.
    The magnitude of a vector is defined as:


    $|\vec{A}| = \sqrt{a_x^2 + a_y^2 + a_z^2}$.


    A unit vector is a vector of magnitude 1, and it is denoted with a hat symbol.
    Hence, the three orthogonal directions along the $x$, $y$, and $z$ axes are represented
    as $\hat{x}$, $\hat{y}$, and $\hat{z}$, respectively. We can make any vector into
    a unit vector by dividing it by its magnitude.


    $\hat{A} = \frac{\vec{A}}{|\vec{A}|} = \frac{a_x}{\sqrt{a_x^2 + a_y^2 + a_z^2}}\hat{x}
    + \frac{a_y}{\sqrt{a_x^2 + a_y^2 + a_z^2}}\hat{y} + \frac{a_z}{\sqrt{a_x^2 + a_y^2
    + a_z^2}}\hat{z}$.'
  - '[PAGE 31]


    Two vectors can be added by summing up their components along each dimension,
    and the result will also be a vector.


    $\vec{A} + \vec{B} = (a_x + b_x)\hat{x} + (a_y + b_y)\hat{y} + (a_z + b_z)\hat{z}$.


    Subtraction is the addition of an inverse, or component-wise subtractions.


    $\vec{A} - \vec{B} = \vec{A} + (-\vec{B}) = (a_x - b_x)\hat{x} + (a_y - b_y)\hat{y}
    + (a_z - b_z)\hat{z}$.


