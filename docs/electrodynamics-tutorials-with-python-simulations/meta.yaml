    # 10.4 MONOCHROMATIC PLANE WAVES


    One class of functions that satisfy the free-space Maxwell’s equations is a plane
    wave, whose wavefront, the set of points sharing the same position in their oscillation
    cycle, is a flat plane and moves perpendicular to this plane without bending or
    spreading out.


    A plane wave is a good approximation for many forms of wave. For example, in classical
    optics, light rays coming from a far enough source onto a small enough cross-section
    (like the light from the Sun or a distant star that is being observed on the Earth)
    are effectively parallel to each other, so the perpendicular cross-sections of
    these rays can be treated as plane waves.


    A sinusoidal plane wave at position \( \vec{r} \) and time \( t \) can be mathematically
    represented by either \( A \sin(\vec{k} \cdot \vec{r} - \omega t) \), \( A \cos(\vec{k}
    \cdot \vec{r} - \omega t) \), or a complex exponential form \( Ae^{i(\vec{k} \cdot
    \vec{r} - \omega t)} \). Here, \( A \) is a constant value denoting the maximum
    amplitude of the wave, and the argument \( (\vec{k} \cdot \vec{r} - \omega t)
    \) is known as a phase or phase angle in wave mechanics. The wave vector \( \vec{k}
    \) corresponds to the direction of wave propagation, and, hence, the wavefront
    of the same oscillatory cycle, or of equal phase, is a plane normal to \( \vec{k}
    \). The angular frequency \( \omega \) describes the angular displacement of the
    wave per unit time. The frequency, \( \frac{\omega}{2\pi} \), describes the displacement
    of wave cycles per unit time, measured in the unit of Hz.


    Both the wave vector and the angular frequency are related to the spatial and
    temporal periodicities of a wave. For a plane wave with wavelength \( \lambda
    \) and period \( T \), moving at speed \( v = \frac{\lambda}{T} \), the magnitude
    of the wave vector and the angular frequency are given by \( |\vec{k}| = \frac{2\pi}{\lambda}
    \) and \( \omega = \frac{2\pi}{T} \). The following code block displays a snapshot
    of a sinusoidal plane wave moving along a line of \( y = x \) or in a direction
    of \( \vec{k} = \frac{2\pi}{\lambda} \left( \frac{1}{\sqrt{2}} \hat{x} + \frac{1}{\sqrt{2}}
    \hat{y} \right) \)'
