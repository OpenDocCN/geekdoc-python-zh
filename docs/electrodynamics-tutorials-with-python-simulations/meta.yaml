    \nIn the first case, the loop is pulled to the right. This is the same situation\
    \ as the previous motional *emf* example. There will be induced *emf* on the segment\
    \ of the loop lying within the magnetic field, and there will be a flow of electrons\
    \ in the clockwise direction within the loop. Since the direction of electric\
    \ current is defined conventionally as the direction of the flow of positive charges,\
    \ the electric current is in the counterclockwise direction.\n\nIn the second\
    \ case, the loop is fixed in space, but the region of the magnetic field moves\
    \ to the left. Intuitively and unsurprisingly, this situation also produces a\
    \ counterclockwise electric current in the square loop because the relative motion\
    \ of the conducting loop and the region of the magnetic field is identical to\
    \ the first case.\n\nIn the third case, nothing is moving, but the strength of\
    \ the magnetic field is decreasing within the gray region. The magnetic field\
    \ is no longer static, since it is changing over time. There are no moving charges\
    \ relative to the magnetic field, yet this situation, as verified by experiments,\
    \ produces a counterclockwise electric current, too. What is causing the charges\
    \ to move? We need to extend our laws of electromagnetism, and this extension\
    \ is given by Faraday’s law.\n\nAccording to Faraday’s law,\n\n$$\\mathcal{E}\
    \ = -\\frac{d\\Phi_B}{dt}.$$\n\n$\\mathcal{E}$ or $emf$ equals the amount of work\
    \ to push a unit charge around a closed path or a complete circuit and is defined\
    \ as $\\mathcal{E} = \\oint \\vec{E} \\cdot d\\vec{l}$. $\\Phi_B$ denotes the\
    \ magnetic flux, or the amount of magnetic field through a surface enclosed by\
    \ the same loop for calculating $\\mathcal{E}$, similar to how we defined electric\
    \ flux. Mathematically, $\\Phi_B = \\iint \\vec{B} \\cdot d\\vec{a}$.\n\nIn the\
    \ three examples above, the square loop of side length $L$ forms a closed path.\
