    of a resistor are placed under different potentials, the charges will flow, and
    the rate of the charge flow $I$ depends on the potential difference $\Delta V$
    across the resistor and the resistor''s resistance $R$. The resistance depends
    on various factors, such as the material, temperature, shape, and size (cross-sectional
    area and length) of a resistor. The resistance is measured with a unit of ohm
    ($\Omega$). A resistor, during a typical operation of a circuit, has a constant
    resistance and exhibits a linear relationship such that $\Delta V = IR$, which
    is called Ohm''s law.


    Another common circuit element is a capacitor, which stores and releases charges,
    acting as a temporary reservoir, and it can affect the temporal behavior of a
    circuit. A pair of conducting plates that are separated by a non-conducting medium
    is a prototypical configuration of a capacitor. The capacitance $C$ is the measure
    of the capacitor''s capacity to hold charges, and it is determined mainly by the
    size of the plates and the gap between them. Capacitance can be boosted by increasing
    the size of the plates and by filling the gap with a dielectric material. The
    capacitance is measured with a unit of farad ($F$).


    When *emf* is applied across two capacitor plates, electrical charges start to
    flow. Free electrons can move and accumulate on one plate, charging it negatively,
    while the other plate becomes positively charged due to the induction.


    ---

    *It used to be called an electromotive force but is a historical misnomer, because
    *emf* is not really a force.'
