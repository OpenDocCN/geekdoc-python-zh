    independence, it follows that a circular boundary enclosing a point charge and
    a differently shaped enclosure surrounding the same charge will pass the same
    amount of flux, because any boundary can be broken up into infinitesimal pieces
    that subtend the same angular extents as the pieces from a circular boundary do.


    The total flux, the sum of flux through each boundary segment, can be expressed
    as an integral: ΦE = ∮ E·n dl, where ∮ indicates an integral over a closed boundary.


    When this boundary is a circle with radius r centered at the location of a point
    charge q, the total flux can be calculated easily.


    $$\Phi_E = \oint \vec{E} \cdot \hat{n} dl = \int_0^{2\pi} \frac{q}{2\pi\epsilon_0
    r} r d\phi = \frac{q}{\epsilon_0}.$$


    The above value will be valid for any arbitrarily shaped boundary that encloses
    the same q.


    If there are multiple point charges (q1, q2, ...) or distribution of charge over
    a finite volume, we can use the superposition principle and perform the flux calculation
    over a boundary that encloses these charges.


    $$\Phi_E = \oint \vec{E} \cdot \hat{n} dl = \oint (\vec{E}_1 + \vec{E}_2 + \cdots)
    \cdot \hat{n} dl$$

    $$= \oint \vec{E}_1 \cdot \hat{n} dl + \oint \vec{E}_2 \cdot \hat{n} dl + \cdots$$

    $$= \frac{q_1 + q_2 + \cdots}{\epsilon_0}$$

    $$= \frac{q_{\text{enc}}}{\epsilon_0},$$


    where q_enc is the total amount of charge enclosed by the boundary.


    This remarkable conclusion is known as Gauss’s law. The enclosing boundary is
    known as a Gaussian surface. The term “surface” comes from the fact that in three
    dimensions, a boundary is a two-dimensional surface, just like the flexible membrane
    of a balloon that encloses a volume of air. In two dimensions, a boundary is a
    one-dimensional closed contour.


