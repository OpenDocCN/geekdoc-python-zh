    \ of current per cross-sectional area. Hence, $\\vec{J}$ is a vector quantity.\n\
    \n```\n$I = \\iint_{\\text{Area}} \\vec{J} \\cdot \\hat{n} da$\n```\n\nwhere $\\\
    hat{n}$ is a unit vector normal to the cross-sectional area $da$. In other words,\
    \ current is the flux of current density over an area.\n\n132 ■ Electrodynamics\
    \ Tutorials with Python Simulations\n\nThe following figure compares the currents\
    \ through wires with zero and with non-zero thickness. For the zero thickness\
    \ case, we apply the Biot-Savart law by integrating over the length of a wire.\
    \ For the case with current in a wire with finite thickness, the current element\
    \ $Id\\vec{l}$ has to be considered as $(\\vec{J} \\cdot \\hat{n}da)d\\vec{l}$,\
    \ and hence we have to integrate over the differential cross-sectional areas as\
    \ well as the length segments of the wire.\n\n```\n$$\\vec{B}(x, y, z) = \\frac{\\\
    mu_0}{4\\pi} \\int_{\\text{length}} \\iint_{\\text{cross-sectional area}} \\frac{(\\\
    vec{J} \\cdot \\hat{n}da)d\\vec{l} \\times \\vec{r}}{r^3}.$$\n```\n\nIn other\
    \ words, the Biot-Savart law involves the integrals over $da$ and $d\\vec{l}$,\
    \ essentially becoming a volume integration over a wire.\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_148_0.png)\n\
    \nConsider a wire whose cross-section is a disc with a radius $R$ and a total\
    \ current $I$. To make the problem more interesting, imagine that this wire has\
    \ a non-uniform current density, such that more currents flow closer to the edge\
    \ of the wire. More specifically, let's assume that the current density is proportional\
    \ to $r^2$ where $r$ is the distance from the center of the circular cross-section\
    \ of the wire. Hence, $\\vec{J} = \\alpha r^2 \\hat{n}$, where $\\alpha$ is a\
    \ proportionality constant and $\\hat{n}$ is in the same direction as $\\vec{J}$.\
    \ The $r^2$ dependence is just an arbitrary example. We could have chosen the\
    \ current density to be proportional to $r$ or $r^3$. Such non-uniform current\
    \ density could be due to non-uniform physical properties of a wire, such as temperature\
    \ gradient or different material compositions.\n\nWe can determine the expression\
    \ for $\\alpha$ by calculating the total current in the polar coordinates: $I\
    \ = \\iint_{\\text{Area}} \\vec{J} \\cdot \\hat{n}da = \\int_0^R \\int_0^{2\\\
    pi} \\vec{J} \\cdot \\hat{n}rdrd\\phi = \\int_0^R \\int_0^{2\\pi} \\alpha r^3\
    \ drd\\phi = \\frac{\\alpha \\pi R^4}{2}$. Hence, $\\alpha = \\frac{2I}{\\pi R^4}$.\
    \ The following code block verifies the expression for $\\alpha$ with the sympy\
    \ module.\n\n### Code Block 5.16\n\n```\n# Code Block 5.16\n\n# Find the proportionality\
    \ constant, alpha,\n# for current density J = alpha*r^2.\n\nimport sympy as sym\n\
    I, r, R, phi = sym.symbols('I r R phi')\nalpha_symbolic = I/sym.integrate(r**3,(r,0,R),(phi,0,2*sym.pi))\n\
    display(alpha_symbolic)\n```\n\n$\\frac{2I}{\\pi R^4}$\n\nNow we have a well-defined\
    \ expression for current density:\n\n$\\vec{J}(r) = \\frac{2I}{\\pi R^4} r^2 \\\
    hat{z}$\n\nwhere we assume that the current is flowing along the z-direction,\
    \ so that the cross-section of the wire on the xy-plane is a disc with radius\
    \ R.\n\nThe quantity $Idl$ necessary to calculate the magnetic field with the\
    \ Biot-Savart law is $Idl = \\vec{J} \\cdot \\hat{z} dV = \\alpha r^2 dV$, where\
