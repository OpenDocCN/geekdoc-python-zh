    We can prove that the flux of the electric field is independent of the radius
    of the enclosing boundary, if this two-dimensional vector field has $\frac{1}{r}$-dependence
    according to Coulomb''s Law. Because the spatial extent of a boundary also has
    $r$-dependence, these factors cancel each other out. In other words, consider
    a point charge $+q$ and a circular boundary centered at the location of the point.
    The normal and the electric field vectors are parallel to each other, so that
    $\vec{E}\cdot\hat{n}=|\vec{E}|=\frac{q}{2\pi\epsilon_0 r}$. Furthermore, differential
    length $dl$ is given by $rd\phi$, where $\phi$ is the angle around the location
    of the charge. Then, the flux through the piece of boundary that subtends $d\phi$
    is


    $$d\Phi_{\mathrm{E}} = \vec{E}\cdot\hat{n} dl = |\vec{E}| dl = \frac{q}{2\pi\epsilon_0
    r} r d\phi = \frac{q d\phi}{2\pi\epsilon_0},$$


    which is independent of $r$. For larger $r$ (or for a piece of flux boundary farther
    away from the source charge), the electric field is weaker by a factor of $\frac{1}{r}$,
    and the extent of the boundary is again larger by a factor of $r$ ($dl = r d\phi$),
    as long as the boundary segments cover the same angular extent $d\phi$. The electric
    field is stronger for smaller $r$, but the extent of the boundary through which
    the electric field penetrates is smaller. These two variations in $r$ cancel out.
    In three dimensions where the surface area of the boundary goes like $r^2$ (or
    $da = r^2 \sin\theta d\theta d\phi$ in spherical coordinate), the electric field
    that has $\frac{1}{r^2}$-dependence would have the same property.


