  md: '# CHAPTER 9


    # Electromagnetic Induction


    # 9.1 MOTIONAL EMF


    Up until this chapter, we have dealt with static electric and magnetic fields
    from the charge and current sources that are fixed in space. Now, let’s consider
    the following situation. A conductor of length $L$ moves through a region of a
    constant magnetic field with speed $v_x$. We assume that the magnetic field is
    pointing out of the page along the $+z$ direction, and the motion is in the $+x$
    direction. Although the following diagram does not show it, the two ends of the
    conductor are connected by a wire, forming a complete circuit with resistance
    $R$.


    As the electrons within the conductor move under a constant magnetic field, magnetic
    force will be exerted on them. According to the Lorentz force formula, the magnetic
    force points in the $+y$ direction with force per unit charge of magnitude $v_xB$.


    This force generates the movement of the electrons along the length of the conductor.
    In other words, there is $emf$ or $\mathcal{E}$ induced between two ends of the
    conductor, which can be calculated by integrating this constant amount of force
    per unit charge over its length:


    $$\mathcal{E} = v_xBL$$


    Also, with Ohm’s law, the amount of this charge flow can be determined as $I =
    \frac{\mathcal{E}}{R} = \frac{v_xBL}{R}$. This expression of current tells us
    how fast the electrons'
  merge: -1
  pgno: 233
- img_proc: true
  md: 'are moving along the +y direction with speed $v_y$. With $\lambda$ denoting
    the linear charge density within the conductor, $I = \frac{dq}{dt} = \frac{\lambda
    dy}{dt} = \lambda v_y$, or $v_y = \frac{I}{\lambda}$.


    Due to this movement of charges with speed ($v_y$), the conductor itself is also
    subject to the magnetic force. According to the right-hand rule and keeping in
    mind that the electrons have negative charges, the direction of this magnetic
    force will be in the $-x$ direction, opposite to the motion of the conductor,
    which is moving in the $+x$ direction with speed ($v_x$). The amount of this force
    per unit charge is $v_yB$. The total force acting on the conductor can be obtained
    again by integrating the force on each moving charge along the entire length of
    the conductor.


    $F = \int_{0}^{L} (\lambda dy) v_y B = \lambda L \left( \frac{I}{\lambda} \right)
    B = LIB.$


    In other words, to move a conductor at constant velocity $v_x$ inside of a region
    of the magnetic field $B$, one must counteract this magnetic force that opposes
    the motion. The amount of mechanical work per time, or power, that needs to be
    provided is:


    $P_{\text{mechanical}} = Fv_x = LIBv_x.$


    It is precisely equal to the amount of electric power dissipated in the circuit:


    $P_{\text{electric}} = I\mathcal{E} = Iv_xBL.$


    This result means that the mechanical work generates electrical energy. The laws
    of electromagnetism are consistent with the principle of energy conservation.


