    In Thomson''s experiment, two oppositely charged plates created an electric field,
    pointing from the positive to the negative plate, and there was an electrical
    potential difference between them. A positive electric charge placed between the
    plates would accelerate along the electric field between the electric potential
    difference. A negative electric charge would accelerate in the opposite direction.
    An electric circuit works by the same principle. A typical battery has the capacity
    to provide the electrical potential difference due to the differential affinity
    of electrons of two different materials at each end of the electrodes. Such a
    capacity is called *emf*$^*$ or $\mathcal{E}$. When various electronic components,
    such as a resistor or a capacitor, are connected via conducting wires to a battery,
    the battery''s *emf* offers the necessary "push" for the charges to flow through
    the circuit.


