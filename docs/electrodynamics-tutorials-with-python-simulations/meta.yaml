  md: "last element in the array. Hence, x[1:]-x[:-1] produces an array of differences\
    \ between the adjacent x-coordinate values.\n\n```\npython\n# Code Block 3.10\n\
    def get_flux(boundary,vfield):\n    x, y = boundary[0], boundary[1]\n    dl_neighbor\
    \ = np.sqrt((x[1:]-x[:-1])**2+(y[1:]-y[:-1])**2)\n    dl = (0.5)*(dl_neighbor[1:]+dl_neighbor[:-1])\n\
