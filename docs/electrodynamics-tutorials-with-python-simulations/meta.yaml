    functional forms, but for a monochromatic sinusoidal plane wave,


    $E_x(x, y, z, t) = E_x(\vec{k} \cdot \vec{r} - \omega t) = \tilde{E}_x e^{i(\vec{k}
    \cdot \vec{r} - \omega t)},$


