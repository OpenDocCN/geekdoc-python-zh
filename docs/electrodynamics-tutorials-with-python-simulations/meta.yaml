    # 8.7 POISSON''S EQUATION


    Thus far, we have been mostly dealing with the first derivatives of scalar and
    vector functions and just saw a few examples of the second derivatives, where
    $\nabla$ was applied twice. Of particular importance is the divergence of gradient
    of a scalar function: $\nabla \cdot \nabla V = \frac{\partial^2 V}{\partial x^2}
    + \frac{\partial^2 V}{\partial y^2} + \frac{\partial^2 V}{\partial z^2}$, which
    is also written as $\nabla^2 V$. The second derivative operator $\nabla^2$ is
    often called Laplacian.


    Let''s consider a class of differential equations with the Laplacian operator:


    $\nabla^2 V(x, y, z) = f(x, y, z)$


    which is known as Poisson''s equation. A special version of Poisson''s equation,
    where $f(x, y, z) = 0$, is called Laplace''s equation.


    If the scalar function $V$ vanishes at infinity, or $V(\infty) \to 0$, a solution
    to Poisson''s equation can be expressed as:


    $V(x, y, z) = -\frac{1}{4\pi} \iiint \frac{f(x'', y'', z'')}{\sqrt{(x-x'')^2 +
    (y-y'')^2 + (z-z'')^2}}dx''dy''dz''$


    The proof of this result is beyond the scope of this book, as it involves other
    advanced mathematical topics, such as the Dirac delta function. In the remaining
    sections of this chapter, we will use this result to explore some examples of
    electromagnetic potentials.'
