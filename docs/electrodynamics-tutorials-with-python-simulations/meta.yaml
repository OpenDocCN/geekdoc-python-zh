  md: 'displacement vector $\vec{r} = (x - x_s)\hat{x} + (y - y_s)\hat{y} + (z - z_s)\hat{z}$,
    and $r = \sqrt{(x - x_s)^2 + (y - y_s)^2 + (z - z_s)^2}$. The electric field from
    a point charge acts along $\vec{r}$, and in three dimensions, the electric field
    strength decreases inversely with the squared distance, so the three-dimensional
    Coulomb’s law is expressed as the following:


    $$\vec{E}_{3D}(x, y, z) = \frac{q}{4\pi\epsilon_0} \frac{\vec{r}}{r^3} = \frac{q}{4\pi\epsilon_0}
    \left( \frac{x - x_s}{r^3}\hat{x} + \frac{y - y_s}{r^3}\hat{y} + \frac{z - z_s}{r^3}\hat{z}
    \right).$$


    The expression $\frac{\vec{r}}{r^3}$ signifies that the electric field is directed
    radially from the source charge, and the field strength decreases as $\frac{1}{r^2}$.
    Then,


    $$|\vec{E}_{3D}| = \frac{q}{4\pi\epsilon_0} \frac{1}{r^2}.$$


    The formulation of Gauss’s law remains the same:


    $$\oint \vec{E} \cdot \hat{n} \, da = \frac{q_{\text{enc}}}{\epsilon_0},$$


    where the three-dimensional volume that encloses $q_{\text{enc}}$ has a two-dimensional
    boundary surface. We already discussed the case of $\vec{E}_{2D}$, which has $\frac{1}{r}$-dependence
    in two dimensions. In three dimensions, $\vec{E}_{3D}$ varies with $\frac{1}{r^2}$-dependence.
    As we integrate the three-dimensional electric fields over a two-dimensional boundary
    surface whose spatial extent increases with $r^2$, the total flux is a constant
    value that is solely determined by the amount of the enclosed charge.


    # 4.9 DIVERGENCE


    The divergence of a vector field $\vec{K}$ is defined as


    $$\nabla \cdot \vec{K} = \frac{\partial K_x}{\partial x} + \frac{\partial K_y}{\partial
    y} + \frac{\partial K_z}{\partial z}.$$


    The divergence is a scalar quantity that represents the density of the outward
    flux of a vector field. For example, let’s consider a simple uniform vector field,
    $\vec{K}(x, y, z) = \hat{x}$, as shown in Figure 3.1. Its divergence is zero.
    Pick any confined region in the space, and we will see that the'
