    \ $x$ 和 $y$ 方向的向量分量。如下面的代码块所示，命令 `plt.quiver(0,0,A[0],A[1])` 绘制一个尾部位于原点，分量由 `A[0]`\
    \ 和 `A[1]` 给出的向量。在这个例子中，$\\vec{A} = 1\\hat{x} + 2\\hat{y}$。\n\n```python\n# Code\
