  md: '# Magnetic Field


    # 5.1 ELECTRIC CURRENTS AND BIOT-SAVART LAW


    A continuous flow of electric charges is called an electric current, and it generates
    another special vector field known as a magnetic field. A Danish physicist Oersted
    is known to have first noticed the deflection of a compass needle around a current-carrying
    wire. Subsequent experimental and theoretical studies have led to the following
    mathematical expression for magnetic vector field $\vec{\mathbf{B}}$, due to an
    arbitrarily shaped wire with a steady current of magnitude $I$.


    $$\vec{\mathbf{B}}(x, y, z) = \frac{\mu_0}{4\pi} \int_{\text{along wire}} \frac{I
    d\vec{\mathbf{l}} \times \vec{\mathbf{r}}}{r^3}.$$


    The above expression, known as the Biot-Savart law, states that the direction
    and magnitude of a magnetic field at position $(x, y, z)$ can be calculated by
    integrating all magnetic fields generated by infinitesimal sections of steady
    electric currents at position $(x_s, y_s, z_s)$ on a wire. As we have discussed
    in the context of an electric field, the displacement vector is defined as: $\vec{\mathbf{r}}
    = (x - x_s)\hat{\mathbf{x}} + (y - y_s)\hat{\mathbf{y}} + (z - z_s)\hat{\mathbf{z}}$,
    and its magnitude is: $r = \sqrt{(x - x_s)^2 + (y - y_s)^2 + (z - z_s)^2}$.


    This is the same superposition principle we have already encountered in the context
    of calculating the electric field: when there is a static distribution of electric
    charges (for example, along a line or along a circle), the total electric field
    is the sum of the electric fields due to individual charge elements. For magnetic
    fields, instead of an individual electrical charge, the source of the magnetic
    field is the movement of electric charges or individual current element $I d\vec{\mathbf{l}}$.'
  merge: -1
  pgno: 120
- img_proc: true
  md: 'Similar to Coulomb’s law in three dimensions, the Biot-Savart law describes
    that the strength of the magnetic field due to the infinitesimal current at point
    $(x_s, y_s, z_s)$ in a wire decreases as $\frac{1}{r^2}$. $d\vec{l}$ is an infinitesimal
    length element along the wire. If $I$ has a positive sign, the current will flow
    in the same direction as in $d\vec{l}$, and if $I$ is negative, its direction
    is opposite to that of $d\vec{l}$. A very interesting and unintuitive fact is
    that the direction of the magnetic field is determined by the cross product between
    the direction of the current $Id\vec{l}$ and the displacement vector $\vec{r}$.


    The proportionality constant $\mu_0$ is known as the permeability of free space
    with a value of $4\pi \times 10^{-7} \text{ T m A}^{-1}$. When the current and
    distance are expressed in the standard units of ampere (A) and meter (m), this
    constant returns the magnetic field in a unit of tesla (T). We will consider several
    examples of magnetic fields generated by different patterns of current flow.


    This figure illustrates the relationship between $(x, y, z)$, $(x_s, y_s, z_s)$,
    the displacement vector $\vec{r}$, and the infinitesimal length segment $d\vec{l}$.


    ![](img/c63d379c3ef3c512c4d31fbfe30defd9_121_0.png)


    As a starting example, consider a straight wire with length $L$ that carries a
    steady current $I$. Steady current means that the number of charges flowing into
    any point in a wire equals the number of charges exiting the point at any given
    time, so there is no net accumulation of electric charges. Hence, in this situation
    of a wire with finite length, we will assume that the electric charges, upon reaching
    one end, somehow loop back to the other end or that the wire stretches to infinity.
    For mathematical simplicity, we will further assume that the straight wire passes'
