    ## 2.4 VECTOR CALCULUS


    Calculus provides a mathematically precise and concise way to describe motion.
    In classical mechanics, the motion of an object undergoing constant acceleration
    a, like a free-falling mass under gravity, can be described with a set of kinematics
    equations:


    $$

    \begin{aligned}

    x(t) &= x_o + v_o t + \frac{1}{2} a t^2 \\

    v(t) &= v_o + at,

    \end{aligned}

    $$


    where the object''s velocity changes linearly in time, and its position changes
    quadratically in time.


    The relationship between velocity \( v(t) \) and position \( x(t) \) is that of
    a derivative and antiderivative, so if you know one quantity, the other can be
    determined.


    If you know \( x(t) \), \( v(t) = \frac{dx}{dt} \). If you know \( v(t) \) and
    \( x_0 \), \( x(t) = \int_0^t v(t'')dt'' + x_0 \).


    In other words, the movement of an object can be formulated in terms of a derivative
    or an integral of some physical quantities. Either formulation, whether it starts
    with \( x(t) \) or \( v(t) \), describes the same motion. Similarly, the mathematical
    descriptions of electromagnetism can be formulated in terms of either integrals
    or derivatives, as we will see in later chapters. In this section, we present
    the definitions and examples of a few essential vector calculus operations.


    Given a three-dimensional scalar function \( f(x, y, z) \), its spatial rate of
    change along the \( x \)-axis is given by \( \frac{\partial f}{\partial x} \).
    Given a three-dimensional vector function \( \vec{K} = K_x \hat{x} + K_y \hat{y}
    + K_z \hat{z} \), we may consider the sum of the rate of change along each dimension,
    by calculating \( \frac{\partial K_x}{\partial x} + \frac{\partial K_y}{\partial
    y} + \frac{\partial K_z}{\partial z} \). The physical interpretation of those
    derivatives will be discussed further when we encounter them again in the context
    of electric and magnetic fields. For now, we introduce a vector operator called
    del or nabla, \( \nabla \) for expressing the derivatives in higher dimensions
    more compactly and elegantly. This operator is defined as \( \nabla = \frac{\partial}{\partial
    x} \hat{x} + \frac{\partial}{\partial y} \hat{y} + \frac{\partial}{\partial z}
    \hat{z} \). If this operator is applied to a scalar function \( f(x, y, z) \),
    we obtain a new vector quantity called the gradient:


    Gradient: \( \nabla f(x, y, z) = \frac{\partial f}{\partial x} \hat{x} + \frac{\partial
    f}{\partial y} \hat{y} + \frac{\partial f}{\partial z} \hat{z} \).


    This operator can be applied to a vector function, too. Given a vector function
    \( \vec{K} \), its divergence, which is a scalar quantity, is defined as


    Divergence: \( \nabla \cdot \vec{K} = \frac{\partial K_x}{\partial x} + \frac{\partial
    K_y}{\partial y} + \frac{\partial K_z}{\partial z} \).


    The curl of \( \vec{K} \) is a vector quantity, and it is defined as


    Curl: \( \nabla \times \vec{K} = \begin{vmatrix} \hat{x} & \hat{y} & \hat{z} \\
    \frac{\partial}{\partial x} & \frac{\partial}{\partial y} & \frac{\partial}{\partial
    z} \\ K_x & K_y & K_z \end{vmatrix} = \left( \frac{\partial K_z}{\partial y} -
    \frac{\partial K_y}{\partial z} \right) \hat{x} + \left( \frac{\partial K_x}{\partial
    z} - \frac{\partial K_z}{\partial x} \right) \hat{y} + \left( \frac{\partial K_y}{\partial
    x} - \frac{\partial K_x}{\partial y} \right) \hat{z} \).


    Doing integrals in higher dimensions takes additional care. For example, given
    a three-dimensional scalar function \( f(x, y, z) \), we may perform a volume
    integral within a particular region enclosed by a two-dimensional boundary. The
    notation for such an integral is


    $$\iiint_{\text{Volume}} f(x, y, z) dxdydz,$$


    where the circle around the integral symbol signifies an integral over an enclosed
    volume. Similarly, we may sometimes deal with an integral over a two-dimensional
    surface or an integral along a one-dimensional contour. Such integrals will be
    introduced and explained with relevant contexts in the upcoming chapters.


    The last topic in this section is the fundamental theorems of vector calculus.
    According to the more-familiar fundamental theorem of calculus,


    $$\int_a^b \frac{df(x)}{dx} dx = f(b) - f(a),$$


    which states that the integral of a derivative over a range can be calculated
    with the values of the antiderivative at the range''s boundary (i.e., the endpoints
    \( a \) and \( b \)). It elegantly captures the relationships between a function,
    its derivative, integral, and boundary condition.


    Similarly, the fundamental theorem of gradient states that:


    $$\int_{\vec{a}}^{\vec{b}} \nabla f \cdot d\vec{l} = f(\vec{b}) - f(\vec{a}).$$


    As an intuition-building example, consider a conservative force \( \vec{F} \)
    like gravity. Imagine performing work under this force so that we are moving an
    object from point \( \vec{a} \) to point \( \vec{b} \). The amount of work is
    given by \( \int_{\vec{a}}^{\vec{b}} \vec{F} \cdot d\vec{l} \), which equals the
    change of the object''s potential energy \( \Delta U = U(\vec{b}) - U(\vec{a})
    \). In the absence of friction (i.e., with the assumption of conservative force),
    the amount of work only depends on the final and initial points of the object,
    and it does not matter how the object ended up at its final position. In other
    words, the change in potential energy is the same whether the object was brought
    from \( \vec{a} \) to \( \vec{b} \) in a straight or curved path. In the case
    of an object with mass \( m \) displaced by height \( h \) near the earth’s surface,
    this is summarized as a formula for the gravitational potential energy, \( \Delta
    U = mgh \).


    The divergence and curl have their own fundamental theorems. The fundamental theorem
    of divergence states that the volume integral of the divergence of a vector function
    equals the surface integral of the vector function over the surface enclosing
    the volume of interest. For the curl of a vector function, its surface integral
    equals the line integral of the vector function over the closed linear contour
    defining this surface. The later chapters will go over their meanings and applications.
    For now, we present them below in one place for easy reference and comparison.


    $$ \iiint_{\text{Volume}} (\nabla \cdot \vec{K}) dV = \iint_{\text{Area}} \vec{K}
    \cdot d\vec{a} $$


    $$ \iint_{\text{Area}} (\nabla \times \vec{K}) \cdot d\vec{a} = \oint_{\text{Contour}}
    \vec{K} \cdot d\vec{l} $$


    ## 2.5 ADDITIONAL OPERATIONS WITH \(\nabla\)


    Just as we have a rule for differentiating a product of two functions, \( \frac{d}{dt}(f(t)g(t))
    = f(t)\frac{dg(t)}{dt} + g(t)\frac{df(t)}{dt} \), there are product rules for
    the \( \nabla \)-operator, when it is applied to the scalar and vector functions.
    For instance, if you have a dot product of two vector functions \( \vec{K} \)
    and \( \vec{G} \), its gradient will be given by:


    $$ \nabla(\vec{K} \cdot \vec{G}) = \vec{K} \times (\nabla \times \vec{G}) + \vec{G}
    \times (\nabla \times \vec{K}) + (\vec{K} \cdot \nabla)\vec{G} + (\vec{G} \cdot
    \nabla)\vec{K} $$


    Given a cross product between two vector functions, its divergence and curl can
    be determined by


    $$ \nabla \cdot (\vec{K} \times \vec{G}) = \vec{G} \cdot (\nabla \times \vec{K})
    - \vec{K} \cdot (\nabla \times \vec{G}) $$


    and


    $$ \nabla \times (\vec{K} \times \vec{G}) = (\vec{G} \cdot \nabla)\vec{K} - (\vec{K}
    \cdot \nabla)\vec{G} + \vec{K}(\nabla \cdot \vec{G}) - \vec{G}(\nabla \cdot \vec{K})
    $$


