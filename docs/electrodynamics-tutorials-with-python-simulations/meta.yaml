    # 8.5 MAGNETIC POTENTIAL


    It is rather intuitive to imagine the electric potential as a scalar function
    with specific magnitudes at each position in space, similar to the gravitational
    potential. The steepest slope in the electric potential landscape matches the
    direction of the electric field, and the electric force on a charge points along
    that direction. The magnetic force, on the other hand, pushes a charge perpendicular
    to both the velocity and the magnetic field. The magnetic force and the magnetic
    field do not point in the same direction, unlike the electric force and the electric
    field. Therefore, we have to work with a different form of a potential function
    in the case of the magnetic field.


    An electric charge, which is a scalar quantity without direction, sets up the
    electric potential V, which is itself a scalar function. Similarly, an electric
    current, a vector quantity with both magnitude and direction, is the source of
    the magnetic field and sets up the magnetic potential, which is a vector function.
    The magnetic potential is often denoted with $ \vec{A} $. The relationship between
    the magnetic field and the magnetic potential is:


    $ \vec{B} = \nabla \times \vec{A} $.


    The electric potential is related to the potential energy of a charge, and the
    potential difference tells us the work done by the electric field per unit charge.
    However, the magnetic potential does not carry such physical interpretation because
    the magnetic field does not perform any work. The magnetic vector potential takes
    on important theoretical role when both electric and magnetic fields are considered
    in light of quantum mechanics, which is beyond the scope of this book. For now,
    we may consider the magnetic potential $ \vec{A} $ as another way of obtaining
    the magnetic field $ \vec{B} $, just as the electric field $ \vec{E} $ can be
    described as the gradient of electric potential V. Sometimes, the magnetic potential
    allows us to calculate the magnetic field more easily than the Biot-Savart law.'
