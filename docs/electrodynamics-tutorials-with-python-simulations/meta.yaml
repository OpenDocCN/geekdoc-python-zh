    # 4.2 SUPERPOSITION PRINCIPLE


    What happens when there is more than one electric charge? The answer is that the
    electric field simply adds linearly, which is known as the superposition principle.
    Such an additive property may seem most reasonable and it certainly makes our
    calculations easier, but it is not a logical necessity. In other contexts and
    phenomena, the collective “total” may be given by the minimum (e.g., a chain is
    as strong as its weakest link), average, maximum (e.g., the performance of a group
    may be determined by the most dominant member), or a nonlinear boost (e.g., the
    whole may be greater than the sum of its parts). In the case of quantum'
