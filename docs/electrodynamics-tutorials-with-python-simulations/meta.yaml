  md: 'In the third case, nothing is moving, but the strength of the magnetic field
    is decreasing within the gray region. The magnetic field is no longer static,
    since it is changing over time. There are no moving charges relative to the magnetic
    field, yet this situation, as verified by experiments, produces a counterclockwise
    electric current, too. What is causing the charges to move? We need to extend
    our laws of electromagnetism, and this extension is given by Faraday’s law.


    According to Faraday’s law,


    $$\mathcal{E} = -\frac{d\Phi_B}{dt}.$$


    $\mathcal{E}$ or $emf$ equals the amount of work to push a unit charge around
    a closed path or a complete circuit and is defined as $\mathcal{E} = \oint \vec{E}
    \cdot d\vec{l}$. $\Phi_B$ denotes the magnetic flux, or the amount of magnetic
    field through a surface enclosed by the same loop for calculating $\mathcal{E}$,
    similar to how we defined electric flux. Mathematically, $\Phi_B = \iint \vec{B}
    \cdot d\vec{a}$.


    In the three examples above, the square loop of side length $L$ forms a closed
    path. The surface vector $d\vec{a}$ for calculating magnetic flux is parallel
    to the magnetic field $\vec{B}$. Let $A$ be the shaded subarea of the square loop,
    where a non-zero, constant magnetic field is present. Then, the rest of the square
    loop area without any magnetic field is given by $L^2 - A$. The total magnetic
    flux through the square area is $\Phi_B = B \cdot A + 0 \cdot (L^2 - A) = BA$.


    Let’s examine the above three situations with Faraday’s law. In the first and
    the second cases, the area $A$ through which the magnetic field penetrates decreases
    because of the motion of either the loop or the region of the magnetic field.
    The rate of change in $A$ is $\frac{dA}{dt} = -Lv_x$, where the negative sign
    indicates that the area is decreasing. Since the magnetic field is assumed to
    be constant in these two cases, the change in the magnetic flux is entirely due
    to the change in $A$, or


    $$\frac{d\Phi_B}{dt} = B \frac{dA}{dt} = -BLv_x.$$


    After applying the negative sign in Faraday’s law, we obtain the identical expression
    for $\mathcal{E}$ as we did with the motional $emf$ analysis.


    In the motional $emf$ analysis of the previous section, the right-hand rule for
    determining the direction of magnetic force revealed that the electric current
    flows in the counterclockwise direction. Can we also determine the direction of
    the induced current with Faraday’s law? The answer is'
  merge: -1
