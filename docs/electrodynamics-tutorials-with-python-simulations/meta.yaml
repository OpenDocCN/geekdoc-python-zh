  md: 'Doing integrals in higher dimensions takes additional care. For example, given
    a three-dimensional scalar function $f(x, y, z)$, we may perform a volume integral
    within a particular region enclosed by a two-dimensional boundary. The notation
    for such an integral is


    $$\iiint_{\text{Volume}} f(x, y, z) dxdydz,$$


    where the circle around the integral symbol signifies an integral over an enclosed
    volume. Similarly, we may sometimes deal with an integral over a two-dimensional
    surface or an integral along a one-dimensional contour. Such integrals will be
    introduced and explained with relevant contexts in the upcoming chapters.


    The last topic in this section is the fundamental theorems of vector calculus.
    According to the more-familiar fundamental theorem of calculus,


    $$\int_a^b \frac{df(x)}{dx} dx = f(b) - f(a),$$


    which states that the integral of a derivative over a range can be calculated
    with the values of the antiderivative at the range''s boundary (i.e., the endpoints
    $a$ and $b$). It elegantly captures the relationships between a function, its
    derivative, integral, and boundary condition.


    Similarly, the fundamental theorem of gradient states that:


    $$\int_{\vec{a}}^{\vec{b}} \nabla f \cdot d\vec{l} = f(\vec{b}) - f(\vec{a}).$$


    As an intuition-building example, consider a conservative force $\vec{F}$ like
    gravity. Imagine performing work under this force so that we are moving an object
    from point $\vec{a}$ to point $\vec{b}$. The amount of work is given by $\int_{\vec{a}}^{\vec{b}}
    \vec{F} \cdot d\vec{l}$, which equals the change of the object''s potential energy
    $\Delta U = U(\vec{b}) - U(\vec{a})$. In the absence of friction (i.e., with the
    assumption of conservative force), the amount of work only depends on the final
    and initial points of the object, and it does not matter how the object ended
    up at its final position. In other words, the change in potential energy is the
    same whether the object was brought from $\vec{a}$ to $\vec{b}$ in a straight
    or curved'
