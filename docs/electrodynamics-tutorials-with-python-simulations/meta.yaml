    One might ask whether there exists a unique scalar or vector function, V or \vec{A},
    for a given gradient or rotational vector field \vec{K}, respectively. In our
    study of electromagnetism, this corresponds to expecting a unique electric potential
    for a given electric field and a unique vector potential for a given magnetic
    field. The answer is no. As an antiderivative F(x) of a function f(x) is only
    unique up to a constant (that is, a function F(x) + C for any constant C can be
    an antiderivative of f(x)), the scalar and vector potential functions of \vec{K}
    are not unique.


