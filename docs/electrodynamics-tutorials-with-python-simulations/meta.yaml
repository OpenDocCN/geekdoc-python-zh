    \ = v_xBL$$\n\nAlso, with Ohm’s law, the amount of this charge flow can be determined\
    \ as $I = \\frac{\\mathcal{E}}{R} = \\frac{v_xBL}{R}$. This expression of current\
    \ tells us how fast the electrons are moving along the +y direction with speed\
