    \ = \\begin{vmatrix} \\hat{\\mathbf{x}} & \\hat{\\mathbf{y}} & \\hat{\\mathbf{z}}\
    \ \\ A_x & A_y & A_z \\ B_x & B_y & B_z \\end{vmatrix} = (A_y B_z - A_z B_y)\\\
    hat{\\mathbf{x}} + (A_z B_x - A_x B_z)\\hat{\\mathbf{y}} + (A_x B_y - A_y B_x)\\\
    hat{\\mathbf{z}}$$\n\nwhich is a vector quantity. It can be proven that $\\vec{A}\
