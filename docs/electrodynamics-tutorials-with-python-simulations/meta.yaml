    is performed over $\phi$. When $z$ is far away from the ring, the potential from
    the ring will be identical to that of the single charge $Q$ located at the origin,
    with $V(z) = \frac{Q}{4\pi\epsilon_0 z}$.'
- md: "As another example, consider a uniformly charged disc with radius R and total\
    \ charge Q, placed at the origin on the xy-plane. The surface charge density of\
    \ the disc is σ = Q/(πR²). The solution of Poisson’s equation can be evaluated\
    \ as a surface integral.\n\n$$\nV(z) = \\frac{1}{4\\pi\\epsilon_0} \\iint_{\\\
    text{Disc}} \\frac{\\sigma}{\\sqrt{r^2 + z^2}} r \\, dr \\, d\\phi = \\frac{1}{4\\\
    pi\\epsilon_0} \\int_0^{2\\pi} d\\phi \\int_0^R \\frac{\\sigma}{\\sqrt{r^2 + z^2}}\
    \ r \\, dr = \\frac{\\sigma}{2\\epsilon_0} \\int_0^R \\frac{r \\, dr}{\\sqrt{r^2\
    \ + z^2}} = \\frac{\\sigma}{2\\epsilon_0} \\left. \\sqrt{r^2 + z^2} \\right|_0^R\
    \ = \\frac{\\sigma}{2\\epsilon_0} \\left( \\sqrt{R^2 + z^2} - z \\right).\n$$\n\
    \nLet’s take a limiting case where the disc extends to infinity, or R → ∞. The\
    \ above expression can be further simplified in terms of z/R.\n\n$$\nV(z) = \\\
    frac{\\sigma R}{2\\epsilon_0} \\left( \\sqrt{1 + \\left( \\frac{z}{R} \\right)^2}\
    \ - \\frac{z}{R} \\right) = \\frac{\\sigma R}{2\\epsilon_0} \\left( 1 + \\frac{1}{2}\
    \ \\left( \\frac{z}{R} \\right)^2 + \\cdots - \\frac{z}{R} \\right) = \\frac{\\\
    sigma}{2\\epsilon_0} \\left( R - z + \\frac{z^2}{2R} + \\cdots \\right).\n$$\n\
    \nThe electric field of an infinite plane can be calculated by taking the negative\
    \ derivative of the above expression with respect to z and then taking the limit\
    \ of R → ∞.\n\n$$\n\\vec{E} = -\\frac{dV}{dz} \\hat{z} = \\frac{\\sigma}{2\\epsilon_0}\
    \ \\hat{z}.\n$$\n\nwhich is independent of the distance from the plane and consistent\
    \ with the result obtained in the earlier chapter.\n\nAs our last example of the\
    \ electric potential, consider a sphere with radius R at the origin. It is uniformly\
    \ charged with a charge density of ρ = Q/(4/3 πR³). The electric potential from\
    \ this sphere can be worked out better in the spherical coordinates. You can find\
    \ the details on the spherical coordinate system in the appendix section of this\
    \ book. Thanks to the spherical symmetry, we just need to consider the radial\
    \ direction in this problem and will conveniently assume that the observation\
    \ point is on the z-axis. The electric potential as a function of distance r from\
    \ the center of the sphere will be given by:\n\n$$\nV(r) = \\frac{1}{4\\pi\\epsilon_0}\
    \ \\int_0^{2\\pi} \\int_0^{\\pi} \\int_0^R \\frac{\\rho}{\\sqrt{r^2 + r_s^2 -\
    \ 2rr_s \\cos \\theta_s}} r_s^2 \\sin \\theta_s \\, dr_s \\, d\\theta_s \\, d\\\
    phi_s,\n$$\n\nwhere $\\sqrt{r^2 + r_s^2 - 2rr_s \\cos \\theta_s}$ is the distance\
    \ between the observation point at $(x, y, z) = (0, 0, r)$ and the source point.\
    \ The coordinates of a source point is $(x_s, y_s, z_s) = (r_s \\sin \\theta_s\
    \ \\cos \\phi_s, r_s \\sin \\theta_s \\sin \\phi_s, r_s \\cos \\theta_s)$. The\
    \ code block below performs the symbolic calculation of this integral and plots\
    \ the result for a unit sphere (R = 1).\n\n```python\n# Code Block 8.10\n\n# Electric\
    \ potential for spherical charge distribution.\nR, r = sym.symbols('R r', positive=True)\n\
    rho = 1/((4/3)*sym.pi*R**3)\ntheta_s, phi_s, r_s = sym.symbols('\\theta_s \\phi_s\
    \ r_s',\n                                  positive=True)\n\n# Integral form of\
    \ Poisson equation solution.\nd = sym.sqrt(r**2 + r_s**2 - 2*r*r_s*sym.cos(theta_s))\n\
    V = sym.integrate((r_s**2)*sym.sin(theta_s)/d,\n                   (theta_s,0,sym.pi),(phi_s,0,2*sym.pi),(r_s,0,R))\n\
    V = rho/(4*sym.pi)*V.simplify()\n#display(V)\n\n# Plot of electric potential inside\
    \ and outside of the sphere.\nr_range = np.arange(0.1,3.1,0.1)\nnorm_pot = np.zeros(len(r_range))\n\
    \nfor k, r_value in enumerate(r_range):\n    norm_pot[k] = 4*np.pi*V.subs({R:1,r:r_value}).evalf()\n\
    \nfig = plt.figure(figsize=(4,3))\nplt.plot(r_range,norm_pot,label=r'$V_{sphere}$',\n\
    \         color='black',linestyle='solid',linewidth=1)\nplt.plot(r_range,1/r_range,label='1/r',\n\
    \         color='gray',linestyle='dotted',linewidth=4)\nplt.xlabel('r')\nplt.ylabel(r'norm.\
    \ potential ($\\frac{Q}{4\\pi \\epsilon_0} = 1)$')\nplt.legend()\nplt.xticks(np.array([0,1,2,3]))\n\
    \nplt.yticks(np.array([0,1,2]))\nplt.ylim(np.array([0,2.5]))\nplt.tight_layout()\n\
    plt.savefig('fig_ch8_sphere.pdf')\nplt.show()\n```\n\nThere are two distinct regions\
    \ in this example: the inside (r < R) and outside (r > R) of the charged sphere.\
    \ Outside of the sphere, $V(r > R) = \\frac{Q}{4\\pi\\epsilon_0 r}$, which is\
    \ the same as the electric potential of a single charge. Inside of the sphere,\
    \ $V(r < R) = \\frac{Q}{8\\pi\\epsilon_0 R} \\left(3 - \\left(\\frac{r}{R}\\right)^2\\\
    right)$.\n\n### 8.9 EXAMPLE: MAGNETIC POTENTIAL OF CONTINUOUS CURRENT DISTRIBUTION\n\
    \nFor the magnetic vector potential, we will use the following mathematical identity\
    \ about the curl of the curl of a vector field: $\\nabla \\times (\\nabla \\times\
    \ \\vec{\\mathbf{K}}) = \\nabla(\\nabla \\cdot \\vec{\\mathbf{K}}) - \\nabla^2\\\
    vec{\\mathbf{K}}$. Let’s take the curl of the magnetic field:\n\n$$\n\\nabla \\\
    times \\vec{\\mathbf{B}} = \\nabla \\times (\\nabla \\times \\vec{\\mathbf{A}})\
    \ = \\nabla(\\nabla \\cdot \\vec{\\mathbf{A}}) - \\nabla^2\\vec{\\mathbf{A}} =\
    \ \\mu_0\\vec{\\mathbf{J}},\n$$\n\nwhere we have used $\\vec{\\mathbf{B}} = \\\
    nabla \\times \\vec{\\mathbf{A}}$ and the differential form of the Ampere’s law.\n\
    \nAs discussed previously, the vector potential for the magnetic field is not\
    \ uniquely determined, and we can choose a solution that may simplify the equation\
    \ by adding or subtracting an arbitrary gradient of a scalar function. We will\
    \ pick the divergence-free vector potential $\\vec{A}$, such that $\\nabla \\\
    cdot \\vec{A} = 0$. Then, the above expression reduces to:\n\n$$\n\\nabla^2 \\\
    vec{A} = -\\mu_0 \\vec{J}\n$$\n\nwhich is a vector version of Poisson’s equation.\
    \ Its solution can be expressed as:\n\n$$\n\\vec{A}(x,y,z) = \\frac{\\mu_0}{4\\\
    pi} \\iiint \\frac{\\vec{J}}{r} \\, dx_s \\, dy_s \\, dz_s\n$$\n\nwhere $r$ is\
    \ the distance between the point where the potential is evaluated and the current\
    \ source point.\n\nWe can decompose this expression into three Poisson’s equations\
    \ in three-dimensional space with one Poisson’s equation for each spatial dimension.\
    \ In the cartesian coordinates, the three components of the magnetic potential\
    \ $\\vec{A}$ can be obtained by solving three equations: $\\nabla^2 A_x = -\\\
    mu_0 J_x$, $\\nabla^2 A_y = -\\mu_0 J_y$, and $\\nabla^2 A_z = -\\mu_0 J_z$.\n\
    \nLet’s consider a wire of length L with current I flowing in the direction of\
    \ $+\\hat{x}$. Assuming a thin wire, the current density is given by $\\vec{J}\
    \ \\, dx_s \\, dy_s \\, dz_s = +I \\, dx_s \\hat{x}$. Because $\\vec{J}$ has neither\
    \ y nor z-component, $\\vec{A}$ would have only x-component $A_x$. The solution\
    \ to Poisson’s equation at a distance z from the middle of the wire is:\n\n$$\n\
    A_x(z) = \\frac{\\mu_0}{4\\pi} \\int_{-L/2}^{+L/2} \\frac{I}{\\sqrt{z^2 + x_s^2}}\
    \ \\, dx_s.\n$$\n\nWe had come across the same integral when we dealt with the\
    \ electric potential of a charged wire. We can simply swap $\\mu_0$ with $\\frac{1}{\\\
    epsilon_0}$ and I with λ. The magnetic vector potential of a current-carrying\
    \ wire is:\n\n$$\n\\vec{A}(z) = \\frac{\\mu_0 I}{2\\pi} \\ln\\left[ \\frac{L}{2z}\
    \ + \\sqrt{1 + \\left( \\frac{L}{2z} \\right)^2} \\right] \\hat{x}.\n$$\n\nWhen\
    \ z ≪ L, this solution becomes $\\vec{A}(z) = \\frac{\\mu_0 I}{2\\pi} \\ln\\left(\
    \ \\frac{L}{z} \\right) \\hat{x}$. At this limit, let’s find the magnetic field\
    \ by taking the curl of this vector potential:\n\n$$\n\\vec{B} = \\nabla \\times\
    \ \\vec{A}(z) = \\frac{\\partial A_x(z)}{\\partial z} \\hat{y} = -\\frac{\\mu_0\
    \ I}{2\\pi z} \\hat{y}.\n$$\n\nwhich is, as expected, identical to the result\
    \ obtained with Ampere’s law and the right-hand rule.\n\nAs another example of\
    \ the magnetic vector potential, consider a current-carrying ring with radius\
    \ R centered at the origin on the xy-plane. The current flow can be expressed\
    \ as $Id\\vec{l} = -IRd\\phi \\sin \\phi\\hat{x} + IRd\\phi \\cos \\phi\\hat{y}$.\
    \ The magnetic potential only has the x and y components. At distance z away from\
    \ the ring’s center, $A_x$ and $A_y$ are given by:\n\n$$\nA_x(z) = \\frac{\\mu_0}{4\\\
    pi} \\int_0^{2\\pi} \\frac{-IR\\sin\\phi}{\\sqrt{z^2+R^2}}d\\phi = 0\n$$\n$$\n\
    A_y(z) = \\frac{\\mu_0}{4\\pi} \\int_0^{2\\pi} \\frac{IR\\cos\\phi}{\\sqrt{z^2+R^2}}d\\\
    phi = 0\n$$\n\nThe above integrals look complicated, but they are just integrals\
    \ of a sinusoidal function over its full period, so they are equal to zero. Is\
    \ it surprising that the magnetic vector potential is zero along the z-axis, even\
    \ though the magnetic field is non-zero?\n\nThe magnetic field is determined by\
    \ how the magnetic potential changes according to $\\vec{B} = \\nabla \\times\
    \ \\vec{A}$, not just by the potential value at a particular point. This is similar\
    \ to a situation in classical mechanics where the gravitational potential energy\
    \ of an object placed on the surface of the earth is defined to be zero, but the\
    \ gravitational force is not zero. Similarly, zero acceleration does not necessarily\
    \ imply zero velocity, either.\n\nWe can also approach this result of zero magnetic\
    \ vector potential based on the symmetry of the problem. For any current segment\
    \ on a ring, there will always be another segment with the current flowing in\
    \ the opposite direction across the diameter. Therefore, the magnetic potentials\
    \ from those two segments will cancel out.\n\nWe conclude this chapter by mentioning\
    \ an electromagnetic “four-potential,” which combines the electric scalar potential\
    \ and the magnetic vector potential functions. It is a subject of more advanced\
    \ field theories, where the electric and magnetic fields are considered as a unified\
    \ field according to the full Helmholtz theorem."
