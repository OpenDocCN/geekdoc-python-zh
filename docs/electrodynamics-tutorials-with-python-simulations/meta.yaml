    [-3 -1 1 3 5]

    [-5 -3 -1 1 3 5]

    [-3 1 5]


    For plotting, we use various functions within the matplotlib module, as illustrated
    in the following code block. As usual, we import numpy and matplotlib modules
    and assign them the nicknames of np and plt, respectively. Such nicknames allow
    us to avoid potential name conflicts.


    We define a range of data points between -1 and 1 in regular intervals with arange()
    function. By specifying an array ranging up to 1+step, we ensure that 1 is included
    as the last element in the array. The next line y = 2*(x**2)+1 specifies mathematical
    equality, $y = 2(x^2) + 1$.'
