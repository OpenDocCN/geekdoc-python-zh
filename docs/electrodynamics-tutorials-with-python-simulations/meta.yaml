    We can also address the range of elements by using :. For example, x[1:4] returns
    a sub-array with three elements: x[1], x[2], x[3], but not x[4]. If the starting
    index is omitted as in x[:4], the range is assumed to start from the very first
    element x[0]. If the ending index is omitted as in x[1:], the range is assumed
    to stretch to the very last element. We can also skip some indices by putting
    an additional :, so x[1:6:2] would return a sub-array with elements with indices
    1, 3, and 5, in steps of 2, as shown in the following code block:


    ```

    # Code Block 1.2


    print(x[1:4]) # elements 1, 2, 3 (but not 4)

    print(x[:4]) # elements 0, 1, 2, 3

    print(x[1:]) # elements 1, 2, ..., -1.

    print(x[:]) # Full array.

    print(x[1:6:2]) # elements 1, 3, 5

    ```


