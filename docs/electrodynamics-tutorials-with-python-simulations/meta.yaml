    \ a circular contour. When there is no symmetry in the current distribution, we\
    \ have to rely on the Biot-Savart law.\n\n## 5.5 CURL\n\nImagine a windmill under\
    \ three different wind conditions, as shown in the following figure. In all cases,\
    \ the wind is blowing from left to right.\n\nIn the first case, the wind is stronger\
    \ at the top, so the windmill rotates in a clockwise direction. The wind is stronger\
    \ at the bottom in the third case, and it rotates in a counterclockwise direction.\
    \ If the wind is blowing uniformly, as in the second case, the windmill will not\
    \ rotate because the net torque is zero.\n\n```\n# Code Block 5.21\n\n# Visualize\
    \ the circulation of a vector field.\n\n# To determine the circulation, we need\
    \ a vector field definition\n# and a closed path around which we can calculate\
    \ the dot product\n# between its line segments and the vectors.\n\n# Define a\
    \ closed path as a circle centered at the origin.\npath, _ = currents_along_circle\
