  md: '![](img/c63d379c3ef3c512c4d31fbfe30defd9_252_0.png)


    # Figure 9.6


    The above diagram shows a capacitor with two circular plates. The current flow
    I(t) affects the amount of charge q(t) on the plates, which is responsible for
    the electric field E(t) between the plates. An Amperian loop, denoted as C, is
    drawn around the wire connected to the capacitor. Note C refers to the contour
    of the loop, not the capacitance. Let''s consider two different surfaces that
    share the same boundary as this closed contour. The first surface, S₁, is the
    flat surface on the same plane as the loop, and the wire penetrates this surface.
    The second surface, S₂, is the half-sphere and goes between the two capacitor
    plates where no current passes.


    Around the closed path C, there is a circulating magnetic field due to the current
    through the wire, according to Ampere''s law. Then, according to Stokes'' theorem,
    the line integral of this magnetic field around C can be expressed as a surface
    integral involving the curl of the magnetic field. This surface integral can be
    calculated with any surface as long as they have the same boundary. In particular,
    the two surfaces of S₁ and S₂ both encompass the contour C, so the surface integrals
    of the curl of the magnetic field through each surface should be equivalent.'
