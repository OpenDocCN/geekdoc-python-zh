    \ 10.2\n\n通过分析从麦克斯韦方程组导出的波动方程，我们得出结论：自由空间中的电磁场 $\\vec{E}$ 和 $\\vec{B}$ 是以速度 $c\
    \ \\equiv \\frac{1}{\\sqrt{\\epsilon_0 \\mu_0}} = 2.99 \\times 10^8$ m/s 传播的波。认识到这个速度实际上与实验测定的光速非常接近，麦克斯韦正确地提出光是一种电磁波。这是现代物理学最著名的成就之一，统一了先前三个独立的物理科学领域：电学、磁学和光学。\n\
    \n## 10.4 单色平面波\n\n满足自由空间麦克斯韦方程组的一类函数是平面波，其波面（共享振动周期中相同位置的点的集合）是一个平面，并且垂直于该平面移动，不发生弯曲或扩散。\n\
    \n平面波是对许多波形式的良好近似。例如，在经典光学中，来自足够远光源的光线照射到足够小的横截面上（比如从太阳或遥远恒星到达地球的光线），这些光线实际上是相互平行的，因此这些光线的垂直横截面可以被视为平面波。\n\
    \n位置 \\( \\vec{r} \\) 和时间 \\( t \\) 处的正弦平面波可以通过 \\( A \\sin(\\vec{k} \\cdot \\\
    vec{r} - \\omega t) \\)、\\( A \\cos(\\vec{k} \\cdot \\vec{r} - \\omega t) \\)\
    \ 或复指数形式 \\( Ae^{i(\\vec{k} \\cdot \\vec{r} - \\omega t)} \\) 在数学上表示。这里，\\( A\
    \ \\) 是一个常数值，表示波的最大振幅，参数 \\( (\\vec{k} \\cdot \\vec{r} - \\omega t) \\) 在波动学中被称为相位或相位角。波矢\
    \ \\( \\vec{k} \\) 对应于波的传播方向，因此，相同振动周期或等相位的波面是一个垂直于 \\( \\vec{k} \\) 的平面。角频率 \\\
    ( \\omega \\) 描述了波单位时间内的角位移。频率 \\( \\frac{\\omega}{2\\pi} \\) 描述了单位时间内的波周期位移，以\
    \ Hz 为单位测量。\n\n波矢和角频率都与波的空间和时间周期性相关。对于波长为 \\( \\lambda \\)、周期为 \\( T \\)、以速度 \\\
    ( v = \\frac{\\lambda}{T} \\) 传播的平面波，波矢的大小和角频率由 \\( |\\vec{k}| = \\frac{2\\pi}{\\\
    lambda} \\) 和 \\( \\omega = \\frac{2\\pi}{T} \\) 给出。以下代码块显示了一个在 t = 0 时沿直线 \\\
    ( y = x \\) 或方向 \\( \\vec{k} = \\frac{2\\pi}{\\lambda} \\left( \\frac{1}{\\sqrt{2}}\
    \ \\hat{x} + \\frac{1}{\\sqrt{2}} \\hat{y} \\right) \\) 移动的正弦平面波的快照。不同的灰度对应于波周期的不同相位。\n\
    \n```\n# 代码块 10.3\n\n# 可视化一个沿直线 y=x 移动的正弦平面波。\n\nA = 1 # 振幅\nwavelength = 3\n\
    k = 2*np.pi/wavelength # 波矢\n\n# 用于 x, y 和 z 坐标的网格\nN = 30\nx, y, z = np.meshgrid(np.linspace(0,20,N),\n\
    \                      np.linspace(0,20,N),\n                      np.linspace(-10,10,N))\n\
