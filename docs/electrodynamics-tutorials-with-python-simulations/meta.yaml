    \ deal with a spherically distributed source for an electromagnetic field and\
    \ calculate the field at a specified position away from the source. The spherical\
    \ coordinates of a source point are denoted as $(r_s, \\theta_s, \\phi_s)$, while\
    \ the observation point is at $(r, \\theta, \\phi)$. The distance between the\
    \ source and the observation points is $\\sqrt{r^2 + r_s^2 - 2rr_s(\\sin\\theta\\\
    sin\\theta_s\\cos(\\phi - \\phi_s) + \\cos\\theta\\cos\\theta_s)}$. In a special\
    \ case where the observation point lies on the z-axis, corresponding to $\\theta\
    \ = 0$, the above expression for the distance simplifies to $\\sqrt{r^2 + r_s^2\
    \ - 2rr_s\\cos\\theta_s}$, which can also be verified with the law of cosine.\n\
    \n## 270 Appendix\n\nAnother example of a curved coordinate system in three dimensions\
    \ is a cylindrical coordinate system, where a point is specified with $(r, \\\
    phi, z)$. $r$ is the distance from the z-axis to the point. Sometimes, another\
    \ symbol $\\rho$ is used instead, in order to distinguish it from the radial distance\
    \ from the origin in the spherical coordinate system. $\\phi$ is the polar angle\
    \ measured on the $xy$-plane just like $\\phi$ in the spherical coordinate. The\
    \ last coordinate $z$ is the projection of the point onto the z-axis just like\
    \ $z$ in the Cartesian coordinate system. Hence, the relationship between the\
    \ Cartesian and cylindrical coordinates is given by:\n\n$$\n\\begin{aligned}\n\
    \    x & = r\\cos\\phi \\\\\n    y & = r\\sin\\phi \\\\\n    z & = z.\n\\end{aligned}\n\
    $$\n\nThe distance between two points $(r, \\phi, z)$ and $(r_s, \\phi_s, z_s)$\
    \ is $\\sqrt{r^2 + r_s^2 - 2rr_s\\cos(\\phi - \\phi_s) + (z - z_s)^2}$ in the\
    \ cylindrical coordinate system. This coordinate system is useful when there is\
    \ a rotational symmetry around the z-axis. For example, when we consider an electrical\
    \ current along the z-axis, its magnetic field can be conveniently described in\
    \ the cylindrical coordinate system.\n\n```python\n# Code Block Appendix C.4\n\
    \n# Cylindrical coordinates\nr = 1\nstep = np.pi/25\nz, phi = np.mgrid[-0.9:0.9+step:step,\
