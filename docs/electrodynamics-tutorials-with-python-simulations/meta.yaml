    \ 10.3\n\n现在，让我们研究电磁场的平面波。我们可以从电场 $\\vec{E}(x, y, z, t)$ 的一般表达式开始：\n\n$\\vec{E}(x,\
    \ y, z, t) = E_x(x, y, z, t)\\hat{x} + E_y(x, y, z, t)\\hat{y} + E_z(x, y, z,\
    \ t)\\hat{z},$\n\n其中 $E_x(x, y, z, t)$ 是位置 $(x, y, z)$ 和时间 $t$ 处电场的 $x$ 分量。$E_y(x,\
    \ y, z, t)$ 和 $E_z(x, y, z, t)$ 分别对应于 $y$ 和 $z$ 分量。正如我们在上一节中所讨论的，自由空间（即没有 $\\\
    rho$ 和 $\\vec{J}$）中的电场满足波动方程，因此我们将考虑一个具有固定角频率 $\\omega$ 的正弦平面波电场。由于电磁波以速度 $c$\
    \ 传播，我们知道其波长为：$\\lambda = \\frac{2\\pi c}{\\omega}$。这种具有单一波长或单一频率的波被称为单色波。单色电磁波的一个例子是单色激光。\n\
    \n一般来说，$E_x$、$E_y$ 和 $E_z$ 可以彼此不同，具有不同的函数形式，但对于单色正弦平面波，\n\n$E_x(x, y, z, t) =\
    \ E_x(\\vec{k} \\cdot \\vec{r} - \\omega t) = \\tilde{E}_x e^{i(\\vec{k} \\cdot\
    \ \\vec{r} - \\omega t)},$\n\n其中 $\\tilde{E}_x$ 表示一个常数（可能是复数）。同样，$E_y$ 和 $E_z$\
    \ 也是 $\\vec{k} \\cdot \\vec{r} - \\omega t$ 的函数：$E_y(x, y, z, t) = \\tilde{E}_y\
    \ e^{i(\\vec{k} \\cdot \\vec{r} - \\omega t)}$ 和 $E_z(x, y, z, t) = \\tilde{E}_z\
    \ e^{i(\\vec{k} \\cdot \\vec{r} - \\omega t)}$。\n\n为简单起见，我们假设波沿 z 轴传播，波矢为 $\\\
    mathbf{k} = k\\hat{\\mathbf{z}}$。这意味着合成的电场 $\\vec{\\mathbf{E}}(x, y, z, t)$ 可以表示为\n\
    \n$$\\vec{\\mathbf{E}}(x, y, z, t) = \\bar{E}_x e^{i(kz - \\omega t)} \\hat{\\\
    mathbf{x}} + \\bar{E}_y e^{i(kz - \\omega t)} \\hat{\\mathbf{y}} + \\bar{E}_z\
    \ e^{i(kz - \\omega t)} \\hat{\\mathbf{z}}.$$\n\n$E_x$、$E_y$ 和 $E_z$ 是 $(kz -\
    \ \\omega t)$ 的函数，独立于与波传播方向横向的变量 $x$ 和 $y$。在特定时间 $t$ 的任何固定 $z$ 值处，所有位于垂直于 z 轴的\
    \ $xy$ 平面上的点都具有相同的波相位，这正是平面波的预期特性。\n\n我们可以类似地将磁场表示为：\n\n$$\\vec{\\mathbf{B}}(x,\
    \ y, z, t) = \\bar{B}_x e^{i(kz - \\omega t)} \\hat{\\mathbf{x}} + \\bar{B}_y\
    \ e^{i(kz - \\omega t)} \\hat{\\mathbf{y}} + \\bar{B}_z e^{i(kz - \\omega t)}\
    \ \\hat{\\mathbf{z}}.$$\n\n麦克斯韦方程组进一步约束了 $\\bar{E}$ 和 $\\bar{B}$。特别是，因为在自由空间中\
    \ $\\nabla \\cdot \\vec{\\mathbf{E}} = \\frac{\\partial}{\\partial x}E_x + \\\
    frac{\\partial}{\\partial y}E_y + \\frac{\\partial}{\\partial z}E_z = 0$，\n\n\
    $$\\frac{\\partial}{\\partial x}\\left(\\bar{E}_x e^{i(kz - \\omega t)}\\right)\
    \ + \\frac{\\partial}{\\partial y}\\left(\\bar{E}_y e^{i(kz - \\omega t)}\\right)\
    \ + \\frac{\\partial}{\\partial z}\\left(\\bar{E}_z e^{i(kz - \\omega t)}\\right)$$\n\
    $$= 0 + 0 + \\frac{\\partial}{\\partial z}\\left(\\bar{E}_z e^{i(kz - \\omega\
    \ t)}\\right)$$\n$$= 0,$$\n\n其中前两项关于 $x$ 和 $y$ 的偏导数由于不依赖于 $x$ 或 $y$ 而显然为零。为使上述等式成立，第三项必须等于零，从而得出结论：$\\\
    bar{E}_z = 0$。类似地，因为 $\\nabla \\cdot \\vec{\\mathbf{B}} = 0$，我们也得出 $\\bar{B}_z\
    \ = 0$。换言之，在沿 $z$ 方向传播的电磁平面波中没有 $z$ 分量。因此，它是一个纯粹的横波，没有任何纵向分量。\n\n现在，让我们应用法拉第定律\
    \ $\\nabla \\times \\vec{\\mathbf{E}} = -\\frac{\\partial \\vec{\\mathbf{B}}}{\\\
    partial t}$，并分别收集 $x$ 和 $y$ 分量。许多项如 $\\frac{\\partial}{\\partial y}E_z$ 或 $\\\
    frac{\\partial}{\\partial x}E_z$ 将显然消失，因为 $\\bar{E}_z = \\bar{B}_z = 0$。\n\n法拉第定律左右两边的\
    \ $x$ 分量应该相等，即\n\n$$-\\frac{\\partial}{\\partial z}\\left(\\bar{E}_y e^{i(kz -\
    \ \\omega t)}\\right) = -\\frac{\\partial}{\\partial t}\\left(\\bar{B}_x e^{i(kz\
    \ - \\omega t)}\\right)$$\n$$-(ik)\\bar{E}_y = (i\\omega)\\bar{B}_x.$$"
