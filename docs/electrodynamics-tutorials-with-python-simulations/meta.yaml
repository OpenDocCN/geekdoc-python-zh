    For a given vector field $\vec{K}$ like a wind map, we define a mathematical quantity
    called circulation as a line integral around a closed path: $\oint_{\text{Contour}}
    \vec{K} \cdot d\vec{l}$. The sign of this integral indicates the direction of
    the rotation, and its magnitude is proportional to the degree of “swirling” of
    a vector field.


    A related mathematical operation is the curl of a vector field. As discussed in
    Chapter 2, it is defined as:


    $$\nabla \times \vec{K} = \left( \frac{\partial K_z}{\partial y} - \frac{\partial
    K_y}{\partial z} \right) \hat{x} + \left( \frac{\partial K_x}{\partial z} - \frac{\partial
    K_z}{\partial x} \right) \hat{y} + \left( \frac{\partial K_y}{\partial x} - \frac{\partial
    K_x}{\partial y} \right) \hat{z}.$$


    For example, for a vector field $\vec{K}(x, y, z) = (x^2 + y)\hat{x} + (y + z^2)\hat{y}
    + (x + y)\hat{z}$, its curl is: $\nabla \times \vec{K} = (1 - 2z)\hat{x} - \hat{y}
    - \hat{z}$. The following code block verifies this using symbolic mathematics
    with sympy. Here, the components of the curl vector are defined with the first
    derivatives of the vector field, obtained with the function `sym.diff()`.'
