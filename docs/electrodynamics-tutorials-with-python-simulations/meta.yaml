    as $x$ and $x''$-axis, in $S$ and $S''$, respectively. In $S''$, $F''_E = \frac{dp''_y}{dt''}$
    and $p''_y = m\frac{dy''}{dt_0}$. In $S$, $F_E = \frac{dp_y}{dt}$ and $p_y = m\frac{dy}{dt_0}$.
    Note that the spatial dimension perpendicular to the relative motion of the frame
    is invariant under the coordinate transformation, that is, $y = y''$. Hence, $p_y
    = m\frac{dy}{dt_0} = m\frac{dy''}{dt_0} = p_y''$.


    Let''s find the relationship between the respective vertical forces responsible
    for the momentum changes in each frame: $F_y = \frac{dp_y}{dt}$ and $F''_y = \frac{dp''_y}{dt''}$.
    Since, according to the Lorentz transformation, the differential time is given
    by $dt = \gamma(dt'' + \frac{v}{c^2}dx'')$,


    ```

    $$\begin{aligned} F_y &= \frac{dp_y}{dt} \\ &= \frac{dp''_y}{\gamma(dt'' + \frac{v}{c^2}dx'')}
    \\ &= \frac{\frac{dp''_y}{dt''}}{\gamma(1 + \frac{v}{c^2}\frac{dx''}{dt''})} \\
    &= \frac{1}{\gamma} \frac{dp''_y}{dt''} \\ &= \frac{1}{\gamma} F''_y \end{aligned}$$

    ```


