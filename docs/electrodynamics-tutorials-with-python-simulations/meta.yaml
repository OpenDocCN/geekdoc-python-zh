    \n![](img/c63d379c3ef3c512c4d31fbfe30defd9_155_1.png)\n\n在这三种不同的方法中，随机采样最容易扩展到更高的\
    \ $N$ 值，并且最不容易出现不需要的伪影，因为选择到与任何观察点都非常接近的随机源点的概率非常小。我们可以将基于毕奥-萨伐尔定律的数值结果与基于安培定律的精确结果进行比较。考虑一个围绕导线横截面、半径为\
    \ $r$ 的圆形环路 C。由于磁场沿环路切向（即没有径向分量），我们可以很容易地计算线积分，如下所示。\n\n$$\\oint_{\\text{Contour}}\
    \ \\vec{B} \\cdot d\\vec{l} = B \\oint_{\\text{Contour}} ds = 2\\pi r B,$$\n\n\
    其中 $B$ 是距离导线中心 $r$ 处的磁场强度。\n\n根据安培定律，上述量应该等于 $\\mu_0$ 乘以安培环路所包围的电流量。当 $r > R$\
    \ 时，这很容易，因为该环路所包围的总电流始终是 $I$。因此，$B = \\frac{\\mu_0 I}{2\\pi r}$。\n\n对于 $r < R$\
    \ 的情况稍微复杂一些，因为包围的总电流取决于 $r$。\n\n$$I_{\\text{enclosed}} = \\int_0^r \\int_0^{2\\\
    pi} \\vec{J} \\cdot \\hat{n} r' dr' d\\phi = \\frac{\\alpha \\pi}{2} r^4.$$\n\n\
    因此，导线内部的磁场为 $B = \\frac{\\mu_0 I_{\\text{enclosed}}}{2\\pi r} = \\frac{\\mu_0\
