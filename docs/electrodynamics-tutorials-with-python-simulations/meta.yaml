    # 6.3  LORENTZ FORCE


    When both electric and magnetic fields are present, the full electromagnetic force
    exerted on a charge $q$ is given by


    $$\vec{F} = q\vec{E} + q\vec{v} \times \vec{B},$$


    which is known as the Lorentz force. We can engineer a region of space with constant
    electric field $\vec{E}$ (with a pair of oppositely charged parallel plates: a
    capacitor) and constant magnetic field $\vec{B}$ (with loops of steady currents:
    a solenoid). Furthermore, we can arrange the directions of these two fields so
    that the electric and magnetic forces on a moving charge are in opposite directions.'
