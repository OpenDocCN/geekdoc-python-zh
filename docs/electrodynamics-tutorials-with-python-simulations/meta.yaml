    # 9.4 MAXWELL’S CORRECTION TO AMPERE’S LAW


    The operation of an LC circuit can be described as continuous and gradual switching
    between the electric field in the capacitor and the magnetic field in the inductor,
    where a change in one field leads to a change in the other. Faraday’s law clearly
    states that a changing magnetic field can induce an emf. Maxwell suspected that
    a changing electric field might similarly induce magnetic phenomena, but none
    of the known laws of electromagnetism addressed such a possibility when he started
    working on the theory of electromagnetism. He hypothesized that Ampere’s law known
    up to that point, $\oint_{\text{Contour}} \vec{\mathbf{B}} \cdot d\vec{l} = \mu_0
    \iint_{\text{Area}} \vec{\mathbf{J}} \cdot \hat{\mathbf{n}}da$, might not be complete.


    In the LC circuit, the switching between the electromagnetic fields is mediated
    by the current flow in the circuit, but what exactly happens between the two plates
    of the capacitor? The electrical charges do not jump across the plates, so there
    is no physical current. We would not describe what is happening in the capacitor
    with current density, $\vec{\mathbf{J}}$.'
