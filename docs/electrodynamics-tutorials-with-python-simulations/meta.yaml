    d\vec{l} = \oint_{C_2} \vec{B} \cdot d\vec{l} = \mu_0$, within numerical precision.
    This is also true for $C_3$ and $C_4$, where $\oint_{C_3} \vec{B} \cdot d\vec{l}
    = \oint_{C_4} \vec{B} \cdot d\vec{l} = 0$. What makes the line integral over $C_1$
    and $C_2$ identical is the fact that both contours contain the same, fixed amount
    of current through a single wire. The contours $C_3$ and $C_4$ do not contain
    any current, so the line integrals over them are zero. This observation indicates
    that a contour''s position and shape do not matter for the line integral. What
    matters is the amount of current enclosed within the path. Furthermore, the current
    flowing outside the closed path does not affect the value of the line integral.
    In the case of $C_5$, which encloses both wires, the line integral depends on
    the total amount of the enclosed current, as illustrated by the bottom figure.
