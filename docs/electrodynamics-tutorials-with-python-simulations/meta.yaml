    $\Phi_{\mathbf{E}} = \oint \mathbf{E} \cdot \mathbf{n} dl = \int_{\text{top}}
    \mathbf{E} \cdot \mathbf{n} dl + \int_{\text{left}} \mathbf{E} \cdot \mathbf{n}
    dl + \int_{\text{bottom}} \mathbf{E} \cdot \mathbf{n} dl + \int_{\text{right}}
    \mathbf{E} \cdot \mathbf{n} dl = 0 + \int_{+D}^{-D} \mathbf{E}(x = -D) \cdot \mathbf{n}(-dy)
    + 0 + \int_{-D}^{+D} \mathbf{E}(x = +D) \cdot \mathbf{n} dy = 2D(|\mathbf{E}(x
    = -D)| + |\mathbf{E}(x = +D)|)$.


    Because this infinite line of charge has symmetry about the $y$-axis, the magnitude
    of the field at $x = +D$ would be the same as the magnitude at $x = -D$, or $|\mathbf{E}(x
    = -D)| = |\mathbf{E}(x = +D)|$. Hence, $\Phi_{\mathbf{E}} = 4D|\mathbf{E}(x =
    D)|$.


    Now, let''s consider the right-hand side of Gauss''s law. We need to calculate
    the total amount of charge enclosed within the boundary. With the linear charge
    density $\rho$ and the height of the square being $2D$, the net charge within
    the boundary is $2D\rho$. Finally, when we equate the two sides of Gauss''s law,
    we arrive at


    $4D|\mathbf{E}(x = D)| = \frac{2D\rho}{\epsilon_0}$.


    In other words, the magnitude of the electric field is $\frac{\rho}{2\epsilon_0}$,
    which does not depend on $D$ and is consistent with what we had obtained previously.


