    which is, as expected, identical to the result obtained with Ampere’s law and
    the right-hand rule.


    As another example of the magnetic vector potential, consider a current-carrying
    ring with radius $R$ centered at the origin on the $xy$-plane. The current flow
    can be expressed as $Id\vec{l} = -IRd\phi \sin \phi\hat{x} + IRd\phi \cos \phi\hat{y}$.
    The magnetic potential only has the $x$ and $y$ components. At distance $z$ away
    from the ring’s center, $A_x$ and $A_y$ are given by:


    $$A_x(z) = \frac{\mu_0}{4\pi} \int_0^{2\pi} \frac{-IR\sin\phi}{\sqrt{z^2+R^2}}d\phi
    = 0$$

    $$A_y(z) = \frac{\mu_0}{4\pi} \int_0^{2\pi} \frac{IR\cos\phi}{\sqrt{z^2+R^2}}d\phi
    = 0$$


    The above integrals look complicated, but they are just integrals of a sinusoidal
    function over its full period, so they are equal to zero. Is it surprising that
    the magnetic vector potential is zero along the z-axis, even though the magnetic
    field is non-zero?


    The magnetic field is determined by how the magnetic potential changes according
    to $\vec{B} = \nabla \times \vec{A}$, not just by the potential value at a particular
    point. This is similar to a situation in classical mechanics where the gravitational
    potential energy of an object placed on the surface of the earth is defined to
    be zero, but the gravitational force is not zero. Similarly, zero acceleration
    does not necessarily imply zero velocity, either.


    We can also approach this result of zero magnetic vector potential based on the
    symmetry of the problem. For any current segment on a ring, there will always
    be another segment with the current flowing in the opposite direction across the
    diameter. Therefore, the magnetic potentials from those two segments will cancel
    out.


    We conclude this chapter by mentioning an electromagnetic “four-potential,” which
    combines the electric scalar potential and the magnetic vector potential functions.
    It is a subject of more advanced field theories, where the electric and magnetic
    fields are considered as a unified field according to the full Helmholtz theorem.'
