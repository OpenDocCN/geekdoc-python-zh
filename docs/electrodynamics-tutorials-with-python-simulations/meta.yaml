    \ 洛伦兹变换\n\n不同的观察者会根据各自参考系所关联的坐标系，对同一事件（时空中的一个点）给出不同的描述。这些空间和时间坐标的描述之间的关系被称为坐标变换。如果坐标系处于不同的惯性参考系中，坐标变换必须与时间膨胀和长度收缩的结果相一致。\n\
    \n假设我们有两个笛卡尔坐标系，分别属于惯性参考系 $S$ 和 $S'$，它们沿 $x$ 轴以恒定速度 $v$ 相对运动。根据 $S$ 系中的观察者，一个事件的位置和时间可以用空间坐标\
    \ $(x, y, z)$ 和时间坐标 $t$ 来指定。根据 $S'$ 系中的观察者，同一事件在 $S'$ 系中的坐标将是 $(x', y', z')$ 和\
    \ $t'$。我们假设两个坐标系的原点 $O$ 和 $O'$ 在 $t = t' = 0$ 时重合。从 $S$ 系中观察者在时间 $t$ 的视角看，$S'$\
    \ 系的原点沿 $x$ 轴的位置是 $vt$。同时，在 $S$ 系中观察时，$S'$ 系中 $O'$ 和 $x'$ 之间的水平距离会经历长度收缩。因此，$x'$、$x$\
    \ 和 $t$ 之间的关系可以表示为 $x = vt + \\frac{x'}{\\gamma}$，或 $x' = \\gamma(x - vt)$。\n\n\
    ![](img/c63d379c3ef3c512c4d31fbfe30defd9_191_0.png)\n\n根据 $S'$ 系中的观察者，$S$ 系的坐标系以恒定速度\
    \ $-v$ 运动。因此，我们可以通过将 \\(x\\) 写为 \\(x'\\)，\\(t\\) 写为 \\(t'\\)，\\(x'\\) 写为 \\(x\\\
    )，以及 \\(v\\) 写为 \\(-v\\) 来获得逆变换。于是，\\(x = \\gamma(x' + vt')\\)。我们可以将这两个表达式结合起来，找到\
    \ \\(t'\\)、\\(t\\) 和 \\(x\\) 之间的关系。代数运算很直接，如下所示：\n\n```\n\\(x = \\gamma(x' + vt')\
    \ = \\gamma [\\gamma(x - vt) + vt'] = \\gamma^2(x - vt) + \\gamma(vt'),\\)\n\n\
    \\(\\gamma(vt') = \\gamma^2(vt) + (1 - \\gamma^2)x = \\gamma^2 v \\left[ t + \\\
    left( \\frac{1}{\\gamma^2} - 1 \\right) \\frac{x}{v} \\right],\\)\n\n\\(t' = \\\
    gamma \\left[ t + \\left( \\frac{1}{\\gamma^2} - 1 \\right) \\frac{x}{v} \\right]\
    \ = \\gamma \\left( t - \\frac{v}{c^2} x \\right).\\)\n```\n\n另外两个空间维度的坐标不受水平运动的影响（还记得之前提到的两个画笔的思想实验吗？），所以\
    \ \\(y' = y\\) 且 \\(z' = z\\)。\n\n因此，相对论坐标变换，即洛伦兹变换，可以总结为：\n\n```\n\\(\\begin{aligned}\n\
    x' &= \\gamma(x - vt) \\\\\ny' &= y \\\\\nz' &= z \\\\\nt' &= \\gamma\\left(t\
    \ - \\frac{v}{c^2}x\\right).\n\\end{aligned}\\)\n```\n\n从 \\(S'\\) 到 \\(S\\) 的逆变换由下式给出：\n\
    \n```\n\\(\\begin{aligned}\nx &= \\gamma(x' + vt') \\\\\ny &= y' \\\\\nz &= z'\
    \ \\\\\nt &= \\gamma\\left(t' + \\frac{v}{c^2}x'\\right),\n\\end{aligned}\\)\n\
    ```\n\n这可以通过交换带撇和不带撇的变量并改变 \\(v\\) 的符号轻松得到。洛伦兹变换公式明确地展示了空间和时间之间的深刻关系和对称性，在相对论中，我们通常将时空视为一个单一的四维矢量量。\n\
    \n从洛伦兹变换，我们还可以推导出相对论速度叠加公式。考虑一个在参考系 \\(S'\\) 中以速度 \\(u'\\) 运动的物体。该物体的微分位移在 $dt'$\
    \ 时间内为 $dx'$，因此 $u' = dx'/dt'$。根据逆变换公式，我们有 $dx = \\gamma(dx' + vdt')$ 和 $dt =\
    \ \\gamma(dt' + \\frac{v}{c^2}dx')$。这些空间和时间的微分位移使我们能够根据 $S$ 系中的观察者计算物体的速度。\n\n\
    $$\nu = \\frac{dx}{dt} = \\frac{\\gamma(dx' + vdt')}{\\gamma(dt' + \\frac{v}{c^2}dx')}\
    \ = \\frac{\\frac{dx'}{dt'} + v}{1 + \\frac{v}{c^2}\\frac{dx'}{dt'}} = \\frac{u'\
    \ + v}{1 + \\frac{vu'}{c^2}}\n$$\n\n这个公式意味着，如果 $u' = c$，那么 $u = c$。换句话说，光速在任何参考系中都是恒定的，这与狭义相对论的假设一致。\n\
    \n我们也可以轻松推导出逆速度叠加公式，如果已知 $u$ 和 $v$，它允许我们根据 $S'$ 系中的观察者计算物体的速度：\n\n$$\nu' = \\\
    frac{u - v}{1 - \\frac{uv}{c^2}}\n$$\n\n## 7.4 相对论动量和能量\n\n相对论动量定义为 $p = m \\\
    frac{dx}{dt_0}$，其中 $t_0$ 是在质量 $m$ 的静止参考系中测量的固有时。将动量定义为 $m \\frac{dx}{dt}$（如牛顿力学中那样）是一个糟糕的选择，因为长度收缩和时间膨胀会使旧的牛顿动量定义成为一个不守恒的量。\n\
    \n时间膨胀的结果表明 $\\Delta t = \\gamma\\Delta t_0$。因此，相对论动量的定义意味着 $p = m \\frac{dx}{dt_0}\
    \ = \\gamma m \\frac{dx}{dt}$，其中 $\\gamma$ 涉及物体的速度，因为固有时 $t_0$ 是在物体自身的静止参考系中测量的。能量类似地定义为\
    \ $E = mc^2 \\frac{dt}{dt_0} = \\gamma mc^2$。\n\n动量的相对论定义 $p = m \\frac{dx}{dt_0}$\
    \ 根据前面给出的洛伦兹变换公式在不同惯性参考系之间转换，因为 $dt_0$ 在所有参考系中都是相同的，只有分子需要变换。然而，对于牛顿动量定义 $m \\\
    frac{dx}{dt}$，分子和分母都必须通过洛伦兹变换在不同参考系之间转换。这确保了如果相对论动量和能量在一个惯性参考系中守恒，它们在另一个惯性参考系中也守恒。\n\
    \n例如，假设 $p = m \\frac{dx}{dt_0}$ 和 $E = mc^2 \\frac{dt}{dt_0}$ 在 $S$ 系中守恒。那么，在\
    \ $S'$ 系中，$p' = m \\frac{dx'}{dt_0} = m\\gamma(\\frac{dx}{dt} - v \\frac{dt}{dt_0})$\
    \ 且 $E' = mc^2 \\frac{dt'}{dt_0} = mc^2 \\gamma(\\frac{dt}{dt_0} - \\frac{v}{c^2}\
    \ \\frac{dx}{dt_0})$，"
