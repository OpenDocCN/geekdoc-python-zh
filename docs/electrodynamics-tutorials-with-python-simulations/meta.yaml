    If a magnetic monopole exists, we expect there would be a version of Gauss’s law
    for magnetism, which would state that the magnetic flux $\oiint_{\mathrm{Area}}
    \vec{\mathbf{B}} \cdot d\vec{\mathbf{a}}$ through a closed surface area is proportional
    to the total amount of magnetic charges enclosed within the volume bounded by
    this surface. According to the divergence theorem, this surface integral can be
