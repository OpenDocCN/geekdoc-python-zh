    # 2.2 VECTOR PRODUCTS


    A dot product, also known as a scalar or inner product, between two vectors $\vec{A}$
    and $\vec{B}$ is defined as $$\vec{A} \cdot \vec{B} = a_x b_x + a_y b_y + a_z
    b_z = \sum_{i=1}^{d} a_i b_i,$$ where in the last expression, each dimensional
    component is identified by an integer index $i$ and the summation goes through
    all $d$ dimensions.'
