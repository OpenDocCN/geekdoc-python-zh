    # Figure 9.6


    The above diagram shows a capacitor with two circular plates. The current flow
    I(t) affects the amount of charge q(t) on the plates, which is responsible for
    the electric field E(t) between the plates. An Amperian loop, denoted as C, is
    drawn around the wire connected to the capacitor. Note C refers to the contour
    of the loop, not the capacitance. Let''s consider two different surfaces that
    share the same boundary as this closed contour. The first surface, S₁, is the
    flat surface on the same plane as the loop, and the wire penetrates this surface.
    The second surface, S₂, is the half-sphere and goes between the two capacitor
    plates where no current passes.


    Around the closed path C, there is a circulating magnetic field due to the current
    through the wire, according to Ampere''s law. Then, according to Stokes'' theorem,
    the line integral of this magnetic field around C can be expressed as a surface
    integral involving the curl of the magnetic field. This surface integral can be
    calculated with any surface as long as they have the same boundary. In particular,
    the two surfaces of S₁ and S₂ both encompass the contour C, so the surface integrals
    of the curl of the magnetic field through each surface should be equivalent.'
  - '[PAGE 253]


    For the surface $S_1$, which encloses the total current of $I(t)$, the line integral
    $\oint_{\mathcal{C}} \mathbf{B}(t) \cdot d\mathbf{l}$ can be written as the surface
    integral $\iint_{S_1} (\nabla \times \mathbf{B}(t)) \cdot \hat{\mathbf{n}} da$.
    This surface integral is also equal to the total sum of current inside times the
    free-space permeability, or $\mu_0 \iint_{S_1} \mathbf{J} \cdot \hat{\mathbf{n}}
    da = \mu_0 I(t)$. However, for the second surface $S_2$, there is no current,
    so $\mu_0 \iint_{S_2} \mathbf{J} \cdot \hat{\mathbf{n}} da = 0$.


    This is puzzling, because the surface integral $\iint_{S_2} (\nabla \times \mathbf{B}(t))
    \cdot \hat{\mathbf{n}} da$ must be equal to the other surface integral $\iint_{S_1}
    (\nabla \times \mathbf{B}(t)) \cdot \hat{\mathbf{n}} da$, which should be equal
    to $\oint_{\mathcal{C}} \mathbf{B}(t) \cdot d\mathbf{l}$.


    To resolve this apparent contradiction in the laws of electromagnetism, Maxwell
    proposed the concept of displacement current within the capacitor, which is different
    from the conduction current flowing through the wire in the circuit. Even though
    individual electrical charges do not jump across the gap between the two plates
    of a capacitor, there is a change in the amount of charges on the capacitor and
    an accompanying change in the electric field. The concept of displacement current
    accounts for these changes in the capacitor.


    This relationship between $q(t)$ and $\mathbf{E}(t)$ can be derived from Gauss''s
    law. Since the charge $q(t)$ on one capacitor plate is confined within the volume
    enclosed by $S_1$ and $S_2$,


    $$ \frac{q(t)}{\epsilon_0} = \iint_{S_1} \vec{0} \cdot \hat{\mathbf{n}} da + \iint_{S_2}
    \vec{\mathbf{E}}(t) \cdot \hat{\mathbf{n}} da, $$


    where the electric field is zero outside of the capacitor around $S_1$. Hence,
    the displacement current, defined as the rate of change of charge, can be defined
    in terms of the electric field:


    $$ \frac{dq(t)}{dt} = \epsilon_0 \iint_{S_2} \frac{\partial \vec{\mathbf{E}}(t)}{\partial
    t} \cdot \hat{\mathbf{n}} da, $$


    where according to Leibniz'' rule, a partial derivative is used inside the integral.


    Thus, we present a corrected Ampere''s law that includes both conduction current
    density $\mathbf{J}$ and time-varying electric field $\mathbf{E}(t)$ for any arbitrary
    contour and the surface area bounded by it:


    $$ \oint_{\text{Contour}} \mathbf{B}(t) \cdot d\mathbf{l} = \iint_{\text{Area}}
    (\nabla \times \mathbf{B}(t)) \cdot \hat{\mathbf{n}} da \ = \mu_0 \iint_{\text{Area}}
    \left( \mathbf{J} + \epsilon_0 \frac{\partial \vec{\mathbf{E}}(t)}{\partial t}
    \right) \cdot \hat{\mathbf{n}} da. $$'
