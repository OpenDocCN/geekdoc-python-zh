    The speed of the positive charges in the wire, as observed in $S''$, is $u''_+
    = \frac{u-v}{1-vu/c^2}$, and the speed of the negative charges is $u''_- = \frac{-u-v}{1+vu/c^2}$.
    This difference in speed leads to the different amount of length contraction for
    the positive and negative charges in $S''$. The length contraction factors for
    the positive and negative charges are: $\gamma_+ = \frac{1}{\sqrt{1-(u''_+/c)^2}}$
    and $\gamma_- = \frac{1}{\sqrt{1-(u''_-/c)^2}}$. The respective charge densities
    are $\lambda_+ = +(\gamma_+\lambda_0)$ and $\lambda_- = -(\gamma_-\lambda_0)$,
    for the positive and negative charges, respectively. Due to the unequal densities,
    the wire would be electrically charged with a non-zero total charge density of
    $\lambda_T = \lambda_+ + \lambda_-$, when observed in $S''$.


    The electric field strength at a distance $d$ away from an infinite wire with
    charge density $\lambda_T$ is given by $E = \frac{|\lambda_T|}{2\pi\epsilon_0
    d}$, which can be quickly verified with Gauss''s law. Hence, the magnitude of
    the electric force exerted on the stationary charge $q$ in $S''$ is:


    $$F''_E = \frac{q|\lambda_T|}{2\pi\epsilon_0 d} = \frac{q\lambda_0|\gamma_+ -
