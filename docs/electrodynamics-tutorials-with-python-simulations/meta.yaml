    \ \\cdot \\vec{B} = 0$ (无磁单极子)，\n\n$\\nabla \\times \\vec{E} = -\\dfrac{\\partial\
    \ \\vec{B}}{\\partial t}$ (法拉第定律)，\n\n$\\nabla \\times \\vec{B} = \\mu_o\\vec{J}\
    \ + \\mu_o\\epsilon_o\\dfrac{\\partial \\vec{E}}{\\partial t}$ (安培定律（含麦克斯韦修正）)。\n\
    \n在没有自由电荷和电流的自由空间中（即$\\rho = 0$且$\\vec{J} = 0$），麦克斯韦方程组可简化为：\n\n$\\nabla \\cdot\
    \ \\vec{E} = 0$\n\n$\\nabla \\cdot \\vec{B} = 0$\n\n$\\nabla \\times \\vec{E}\
    \ = -\\dfrac{\\partial \\vec{B}}{\\partial t}$\n\n$\\nabla \\times \\vec{B} =\
    \ \\mu_o\\epsilon_o\\dfrac{\\partial \\vec{E}}{\\partial t}$\n\n## 10.3 由麦克斯韦方程组导出的波动方程\n\
    \n让我们对自由空间中的安培定律取旋度，或者说，对第四个自由空间麦克斯韦方程的两边应用$\\nabla\\times$。等式左边变为\n\n$$\\nabla\
    \ \\times (\\nabla \\times \\vec{B}) = \\nabla(\\nabla \\cdot \\vec{B}) - \\nabla^2\\\
    vec{B} = \\nabla(0) - \\nabla^2\\vec{B} = -\\nabla^2\\vec{B}，$$\n\n这里我们使用了矢量微积分章节中的二阶导数恒等式$\\\
    nabla\\times(\\nabla\\times\\vec{K}) = \\nabla(\\nabla\\cdot\\vec{K})-\\nabla^2\\\
    vec{K}$，并结合了磁场的散度为零（即第二个麦克斯韦方程）。\n\n等式右边的旋度可写为\n\n$$\\nabla \\times (\\mu_o\\\
    epsilon_o\\dfrac{\\partial \\vec{E}}{\\partial t}) = \\mu_o\\epsilon_o\\dfrac{\\\
    partial}{\\partial t}(\\nabla \\times \\vec{E}) = \\mu_o\\epsilon_o\\dfrac{\\\
    partial}{\\partial t}\\left(-\\dfrac{\\partial \\vec{B}}{\\partial t}\\right)\
    \ = -\\mu_o\\epsilon_o\\dfrac{\\partial^2 \\vec{B}}{\\partial t^2}。$$\n\n这里我们用到了$\\\
    nabla$中的空间偏导数和时间导数$\\dfrac{\\partial}{\\partial t}$的次序可以交换，即$\\dfrac{\\partial^2}{\\\
    partial x\\partial t} = \\dfrac{\\partial^2}{\\partial t\\partial x}$，因此$\\nabla\
    \ \\times \\dfrac{\\partial \\vec{E}}{\\partial t} = \\dfrac{\\partial}{\\partial\
    \ t}(\\nabla \\times \\vec{E})$。此外，根据法拉第定律，电场的旋度可以表示为磁场的时间导数。\n\n通过使等式左右两边相等，我们得到了关于磁场的以下二阶偏微分方程。\n\
    \n$$\\nabla^2 \\vec{B} = \\mu_0 \\epsilon_0 \\frac{\\partial^2 \\vec{B}}{\\partial\
    \ t^2}$$\n\n我们也可以对法拉第定律（即自由空间中的第三个麦克斯韦方程）取旋度。考虑到自由空间中不存在电荷以及安培定律，我们可以得到另一个关于电场的二阶偏微分方程。\n\
    \n$$\\nabla^2 \\vec{E} = \\mu_0 \\epsilon_0 \\frac{\\partial^2 \\vec{E}}{\\partial\
    \ t^2}$$\n\n上述结果可以改写为以下一般形式：\n\n$$\\frac{\\partial^2 \\vec{U}}{\\partial x^2}\
    \ + \\frac{\\partial^2 \\vec{U}}{\\partial y^2} + \\frac{\\partial^2 \\vec{U}}{\\\
    partial z^2} = \\frac{1}{v^2} \\frac{\\partial^2 \\vec{U}}{\\partial t^2}$$\n\n\
    这被称为波动方程，其解以速度$v$传播。该方程也出现在经典力学中。例如，当我们处理固体介质中具有体积模量$B$和质量密度$\\rho$的声波时，声波的矢量场$\\\
    vec{U}$满足相同的方程，其中传播速度$v = \\sqrt{B/\\rho}$。\n\n让我们考虑一个更简单的、关于空间变量$z$和时间$t$的一维波动方程：\n\
    \n$$\\frac{\\partial^2 U}{\\partial z^2} = \\frac{1}{v^2} \\frac{\\partial^2 U}{\\\
    partial t^2}$$\n\n对于任何自变量可以写成$(z-vt)$或$(z+vt)$的函数$U(z,t)$，该方程都有解。换句话说，如果$U(z,t)\
    \ = f(u) = f(z \\pm vt)$，它就满足波动方程。我们可以通过对$U(z,t)$求偏导数来验证这一点。\n\n$$\\frac{\\partial\
    \ U}{\\partial z} = \\frac{df}{du} \\frac{\\partial u}{\\partial z} = \\frac{df}{du}$$\n\
    $$\\frac{\\partial U}{\\partial t} = \\frac{df}{du} \\frac{\\partial u}{\\partial\
    \ t} = \\pm v \\frac{df}{du}$$\n\n现在，我们来求二阶导数。\n\n$$\\frac{\\partial^2 U}{\\partial\
    \ z^2} = \\frac{\\partial}{\\partial z} \\left( \\frac{df}{du} \\right) = \\frac{d^2\
    \ f}{du^2} \\frac{\\partial u}{\\partial z} = \\frac{d^2 f}{du^2}$$\n\n$$\\frac{\\\
