  md: 'vector:


    $$\vec{S} = \frac{1}{\mu_0} \vec{E} \times \vec{B}.$$


    The Poynting vector points in the same direction as the wave vector, and its magnitude
    is the amount of energy transported across a unit area per unit of time. For mechanical
    waves like sound, water, or seismic waves, the energy of a wave can be intuitively
    imagined as being transmitted and exchanged through the motion and elasticity
    of the media. On the other hand, electromagnetic waves can travel through a vacuum,
    so their energy transmission does not require a medium, which is itself a rather
    remarkable fact. Thermal radiation is an instance of this phenomenon.


    The theory of electromagnetism also suggests that electromagnetic wave carries
    momentum, which is another extraordinary fact. In classical mechanics, momentum
    was defined as a product of mass and velocity, or $\vec{p} = m\vec{v}$, so how
    could the massless electromagnetic wave carry momentum? According to Einstein''s
    theory of special relativity, we have the following invariant relationship $E^2
    - |\vec{p}|^2c^2 = (mc^2)^2$ between momentum $\vec{p}$ and energy $E$, so for
    $m = 0$, $|\vec{p}| = \frac{E}{c}$. The momentum flux, the momentum of the electromagnetic
    wave per unit area and time, is given by $\vec{g} = \frac{\vec{S}}{c}$. Hence,
    the propulsion of a spaceship driven by momentum from the wind of light is not
    just a whimsical imagination.


    Starting in the early 1900s, quantum mechanics has produced another intriguing,
    yet theoretically and experimentally well-verified, idea of wave-particle duality.
    According to this idea, light, as well as other fundamental particles, must be
    considered as having both wave-like and particle-like properties. We will have
    to save this discussion and other interesting aspects of the electromagnetic wave
    for another book.'
