  md: '# Preface


    When we “do” physics, we employ a wide array of intellectual tools and methodologies.
    Mathematics stands as an essential and foundational tool, but the computational
    methods have become another powerful instrument. It is now important for physicists
    to equip themselves with the latest computational skills. We have written this
    tutorial to help readers learn basic skills in numerical and symbolic calculations,
    modeling and simulation, and data visualization using one of the most popular
    and versatile programming languages of the 2020s, Python, within the context of
    classical electrodynamics. If you are new to Python, the official homepage of
    the Python language (www.python.org) is a great place to visit.


    This book covers key topics in electrodynamics at an undergraduate level, focusing
    on intuition-building examples and visualizations of electric and magnetic fields.
    After covering a few background topics on vectors and coding, we discuss the electric
    field in two dimensions for ease of visualization and comprehension and switch
    to the full three-dimensional formulation. Then, we introduce the magnetic field,
    followed by the topic of electromagnetic force and potential. Einstein’s theory
    of special relativity is also included to show the relativity of electromagnetic
    forces. After a chapter on electromagnetic induction, we summarize the full set
    of Maxwell’s equations in both integral and differential forms. The last chapter
    presents important consequences of Maxwell’s equations in terms of the electromagnetic
    waves in free space. This book is focused mostly on the theory, but there are
    so many interesting examples around the applications of electrodynamics (e.g.,
    motors, generators, transformers, electronic circuits, data storage, optics, etc.)
    that we encourage the readers to explore other resources on such topics. There
    are many excellent textbooks on electrodynamics, and some of our favorites are
    the ones written by Purcell, Griffiths, and Jackson.'
