    \n### 2.2 向量乘积\n\n两个向量 $\\vec{A}$ 和 $\\vec{B}$ 之间的**点积**（也称为标量积或内积）定义为 $$\\vec{A}\
    \ \\cdot \\vec{B} = a_x b_x + a_y b_y + a_z b_z = \\sum_{i=1}^{d} a_i b_i,$$ 其中在最后的表达式中，每个维度的分量由一个整数索引\
    \ $i$ 标识，并且求和遍历所有 $d$ 个维度。\n\n顾名思义，这个运算的结果是一个标量值，而不是向量。也可以证明 $\\vec{A} \\cdot\
    \ \\vec{B} = |\\vec{A}||\\vec{B}| \\cos \\theta$，其中 $\\theta$ 是两个向量之间的夹角。\n\n\
    向量 $\\vec{A}$ 和 $\\vec{B}$ 之间的**叉积**（也称为向量积）在三维空间中定义为：\n\n$$\\vec{A} \\times \\\
    vec{B} = \\begin{vmatrix} \\hat{\\mathbf{x}} & \\hat{\\mathbf{y}} & \\hat{\\mathbf{z}}\
    \ \\\\ A_x & A_y & A_z \\\\ B_x & B_y & B_z \\end{vmatrix} = (A_y B_z - A_z B_y)\\\
    hat{\\mathbf{x}} + (A_z B_x - A_x B_z)\\hat{\\mathbf{y}} + (A_x B_y - A_y B_x)\\\
    hat{\\mathbf{z}}$$\n\n它是一个向量量。可以证明 $\\vec{A} \\times \\vec{B} = |\\vec{A}||\\\
    vec{B}| \\sin \\theta \\ \\hat{\\mathbf{n}}$，其中 $\\theta$ 是两个向量之间的夹角，$\\hat{\\\
    mathbf{n}}$ 是垂直于 $\\vec{A}$ 和 $\\vec{B}$ 所构成平面的单位向量。\n\n$\\hat{\\mathbf{n}}$ 的具体方向可以用你的右手找到。当你将右手的四指从\
    \ $\\vec{A}$ 弯曲到 $\\vec{B}$ 时，$\\hat{\\mathbf{n}}$ 的方向将与你的右拇指方向一致。叉积是反交换的，这意味着\
    \ $\\vec{A} \\times \\vec{B} = -\\vec{B} \\times \\vec{A}$，因此这个向量运算的顺序很重要。`np.cross()`\
    \ 函数计算叉积。\n\n```python\n# Code Block 2.2\n\n# 可视化叉积\n\nA = np.array([2,1,0])\n\
