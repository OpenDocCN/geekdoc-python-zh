    ## 电势


    ### 8.1 电势


    考虑沿着电场方向通过某条特定路径移动。沿此路径，我们将与电场方向一致的电场强度累加起来。在数学上，这个求和可表示为 $\int_{\text{Path}}
    \vec{E} \cdot d\vec{l}$，其中 $d\vec{l}$ 表示沿路径的微小线段。这与电通量的计算类似，电通量是电场在垂直于某个指定表面方向上的分量的积分。


    电势 $V$ 定义为

    $$

    V = - \int_{\text{Path}} \vec{E} \cdot d\vec{l}.

    $$

    一伏特（$V$）的电势相当于一焦耳每库仑。不幸的是，符号 $V$ 关联着几个不同的量，可能会引起一些混淆。$V$ 可以指电势、电势的单位伏特、体积，或小写的速度。我们有时不得不根据上下文来区分它们。负号意味着我们正逆着电场方向移动。也就是说，电势的定义是“逆”着或与电场方向相反，而不是“顺”着。


    $V$ 的意义和重要性是什么？作为一个启发性的例子，考虑经典力学中一个被充分研究的案例：在地球表面附近，一个质量为 $m$ 的物体受重力影响。当我通过做机械功将这个物体提升一个垂直高度
    $h$ 时，它沿着与重力相反的方向（再次出现负号）移动，并获得了重力势能 $mgh$，因为

    $$

    \begin{aligned}

    \text{重力势能} &= -\text{功} \\

    &= - \int \mathbf{F} \cdot d\mathbf{l} \\

    &= - \int_{0}^{h} (-mg)dy = mgh.

    \end{aligned}

    $$

    由于电场力 $\mathbf{F} = q\mathbf{E}$，电势的定义导致

    $$

    \begin{aligned}

    V &= - \int \mathbf{E} \cdot d\mathbf{l} \\

    &= -\frac{1}{q} \int \mathbf{F} \cdot d\mathbf{l} \\

    &= \text{电势能除以 } q.

    \end{aligned}

    $$

    反过来，我们也可以用电势来定义电场。电势沿无穷小线段 $d\mathbf{l} = dx\hat{\mathbf{x}} + dy\hat{\mathbf{y}}
    + dz\hat{\mathbf{z}}$ 的微分 $dV$ 是 $dV = \frac{\partial V}{\partial x}dx + \frac{\partial
    V}{\partial y}dy + \frac{\partial V}{\partial z}dz$，它可以表示为 $\nabla V\cdot d\mathbf{l}$，或电势函数的梯度，因此电势变为

    $$

    V = \int_{\text{Path}} dV = \int_{\text{Path}} \nabla V \cdot d\mathbf{l}.

    $$

    我们最初的电势定义是 $V = - \int_{\text{Path}} \mathbf{E} \cdot d\mathbf{l}$，因此我们确定 $\mathbf{E}
    = -\nabla V$。换句话说，电势 $V$ 的三维斜率是电场 $\mathbf{E}$ 的负值。


    电势的概念类似于重力势能除以 $m$，或上例中的 $gh$。正如 $gh$ 表示单位质量被提升高度 $h$ 时所拥有的重力势能一样，电势 $V$ 表示单位电荷在电场作用下，从初始位置移动到最终位置时所拥有的电势能。


    在重力势能的情况下，地球表面通常作为一个方便的参考点，此处重力势能设为零。类似地，我们通常选择将无穷远处的点作为电势的参考点，使得 $V(\infty) =
    0$。以无穷远处的零电势为参考点，我们可以将空间中某点的电势视为：在电场作用下，将单位电荷从无穷远带到该特定位置所需要做的功。有时，选择非无穷远的参考点可能更方便。例如，当我们处理电路时，我们经常定义“地”，它充当电荷的无限源或汇，并将其电势设为零。生物细胞膜两侧也存在电势差，习惯上认为细胞外部为零电势，从而使细胞内部区域处于负电势。


    重力是保守力。在重力场中移动物体时，所做的机械功的大小与其运动路径无关。只要不涉及空气阻力或摩擦力等非保守力，物体重力势能的变化仅取决于其位置的变化。换句话说，我们只需要高度变化
    $h$ 就可以计算重力势能的变化。无论质量 $m$ 是直线提升还是沿之字形路径提升都没有关系。同样，电势也是与路径无关的。你可以沿非常不同的路径移动电荷，但电荷电势的变化仅由两个位置决定：电荷的起始位置和终止位置。


    一个位于起伏地面上的小球会向山下滚动，将其势能转化为动能。放置在较高电势处的电荷也会沿着电势“地势”的梯度向下“滚动”。使用压力的类比也有助于描述电势。正如水压差导致水的流动一样，电势差导致电荷的流动。电荷可以是正的也可以是负的，不像物体的质量总是正量。正电荷沿着电势“地势”“向下”滚动，而负电荷则“向上”滚动，移动方向与正电荷相反。


    ### 8.2 电路


    在汤姆逊的实验中，两个带相反电荷的极板产生了一个从正极板指向负极板的电场，两者之间存在电势差。放置在两极板之间的正电荷会沿着电场方向，在电势差作用下加速。负电荷则会向相反方向加速。电路工作原理相同。一个典型的电池之所以能提供电势差，是由于电极两端不同材料的电子具有不同的亲和力。这种能力称为*电动势*$^*$或
    $\mathcal{E}$。当各种电子元件（如电阻器或电容器）通过导线连接到电池时，电池的*电动势*为电荷在电路中流动提供了必要的“推力”。


    电阻器控制电路中的电流量。当电阻器两端处于不同电势时，电荷会流动，电荷流动的速率 $I$ 取决于电阻器两端的电势差 $\Delta V$ 和电阻器的电阻 $R$。电阻取决于多种因素，如电阻器的材料、温度、形状和尺寸（横截面积和长度）。电阻的单位是欧姆（$\Omega$）。在电路的典型运行过程中，电阻器具有恒定的电阻，并表现出线性关系
    $\Delta V = IR$，这被称为欧姆定律。


    另一个常见的电路元件是电容器，它可以储存和释放电荷，充当一个临时的储存器，并能影响电路的时间行为。一对被非导电介质隔开的导电极板是电容器的典型结构。电容 $C$
    是衡量电容器容纳电荷能力的量，主要由极板的尺寸和它们之间的间隙决定。可以通过增加极板尺寸和用介电材料填充间隙来提高电容。电容的单位是法拉（$F$）。


    当在两电容器极板间施加*电动势*时，电荷开始流动。自由电子可以移动并积累在一个极板上，使其带负电，而另一个极板则由于感应而带正电。


    ---

    *它过去被称为“electromotive force”（电动势），但这是一个历史上的误称，因为*emf*实际上并不是一种力。'
