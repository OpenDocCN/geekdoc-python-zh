    # 4.8 ELECTRIC FIELD IN THREE-DIMENSION


    All of the previous discussions about electricity(Coulomb’s law, Gauss’s law,
    etc.) have been presented as if we live in a two-dimensional space for ease of
    visual illustration and mathematical simplicity. However, we live in a three-dimensional
    space, so several equations must be updated. It is convenient to consider a displacement
    vector, which is the “line of sight” between the source point (x_s, y_s, z_s)
    and the point of interest (x, y, z) at which the vector field is being calculated.
    The'
