    The first example shows a classic vector field with a vortex-like swirling around
    the z-axis. In this case, $\vec{K} = -y\hat{x} + x\hat{y}$ and $\nabla \times
    \vec{K} = 2\hat{z}$. The convention of the right-hand rule, which defines the
    relative orientations'
  merge: -1
