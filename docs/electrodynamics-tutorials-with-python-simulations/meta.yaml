  md: 'expressed in differential forms:


    $\nabla \cdot \vec{E} = \dfrac{\rho}{\epsilon_o}$ (Gauss''s law),


    $\nabla \cdot \vec{B} = 0$ (No magnetic monopole),


    $\nabla \times \vec{E} = -\dfrac{\partial \vec{B}}{\partial t}$ (Faraday''s law),


    $\nabla \times \vec{B} = \mu_o\vec{J} + \mu_o\epsilon_o\dfrac{\partial \vec{E}}{\partial
    t}$ (Ampere''s law with Maxwell''s correction).


    In free space where there are no free charges and currents present (i.e., $\rho
    = 0$ and $\vec{J} = 0$), Maxwell''s equations can be simplified as:


    $\nabla \cdot \vec{E} = 0$


    $\nabla \cdot \vec{B} = 0$


    $\nabla \times \vec{E} = -\dfrac{\partial \vec{B}}{\partial t}$


    $\nabla \times \vec{B} = \mu_o\epsilon_o\dfrac{\partial \vec{E}}{\partial t}$


    # 10.3 WAVE EQUATION FROM MAXWELL''S EQUATIONS


    Let''s take a curl on Ampere''s law in free space, or apply $\nabla\times$ to
    both sides of the fourth free-space Maxwell''s equation. The left side of the
    equation becomes


    $$\nabla \times (\nabla \times \vec{B}) = \nabla(\nabla \cdot \vec{B}) - \nabla^2\vec{B}
    = \nabla(0) - \nabla^2\vec{B} = -\nabla^2\vec{B},$$


    where we used the second derivative identity, $\nabla\times(\nabla\times\vec{K})
    = \nabla(\nabla\cdot\vec{K})-\nabla^2\vec{K}$, from the chapter on vector calculus,
    combined with zero divergence of the magnetic field, which is the second Maxwell''s
    equation.


    The curl of the right side can be written as


    $$\nabla \times (\mu_o\epsilon_o\dfrac{\partial \vec{E}}{\partial t}) = \mu_o\epsilon_o\dfrac{\partial}{\partial
    t}(\nabla \times \vec{E}) = \mu_o\epsilon_o\dfrac{\partial}{\partial t}\left(-\dfrac{\partial
    \vec{B}}{\partial t}\right) = -\mu_o\epsilon_o\dfrac{\partial^2 \vec{B}}{\partial
    t^2}.$$


    Here we used the fact that the order of the spatial partial derivative in $\nabla$
    and the temporal derivative $\dfrac{\partial}{\partial t}$ can be swapped, or
    $\dfrac{\partial^2}{\partial x\partial t} = \dfrac{\partial^2}{\partial t\partial
    x}$ so that $\nabla \times \dfrac{\partial \vec{E}}{\partial t} = \dfrac{\partial}{\partial
    t}(\nabla \times \vec{E})$. Also, according to Faraday''s law, the curl of the
    electric field can be expressed as the time derivative of the magnetic field.'
