  md: '# Electric Field


    # 4.1 ELECTRIC CHARGES AND COULOMB''S LAW


    At the beginning of the book, we introduced the analogy of water flowing on a
    landscape. We might say that this vector field that guides the water flow has
    been created by the abundance or the lack of land mass in the cases of hills and
    valleys, respectively. In the context of electricity, the vector field of electricity,
    or electric field, is created by the electric charges. Unlike mass, which is always
    a non-negative quantity, an electric charge may be positive, neutral, or negative.
    Canonical examples of electric charges are protons, neutrons, and electrons. In
    many of our analyses, we will often consider a point charge, which occupies a
    very small region of space, relative to the length scale of the analysis, so for
    all practical purposes, it is a point in space. Electric charge is measured in
    the unit of coulomb (C). The opposite charges (positive and negative) attract
    each other, and the same charges repel each other. Such interactions are mediated
    through the electric field.


    An electric point charge produces an electric field whose strength decreases as
    an inverse function of distance away from the charge. More specifically, in two
    dimensions, if a charge $q$ is placed at position $(x_s, y_s)$, the electric field
    strength at a point $(x, y)$ is given by:


    ```

    $\vec{\mathbf{E}}_{2D}(x,y) = \frac{q}{2\pi\epsilon_0} \left( \frac{x - x_s}{r^2}
    \hat{\mathbf{x}} + \frac{y - y_s}{r^2} \hat{\mathbf{y}} \right)$

    ```


    ```

    $r = \sqrt{(x - x_s)^2 + (y - y_s)^2}$

    ```'
  merge: -1
  pgno: 77
- img_proc: true
  md: "Then,\n\n$|\\vec{E}_{2D}| = \\frac{q}{2\\pi\\epsilon_0} \\frac{1}{r}$,\n\n\
    which can be easily verified with $\\sqrt{(x-x_q)^2 + (y-y_q)^2} = \\frac{1}{r}$.\
    \ The constant $\\epsilon_0$ is known as the permittivity of free space with a\
    \ value of $8.85 \\times 10^{-12}$ C$^2$ N m$^{-2}$. The above formulation is\
    \ true only in a two-dimensional universe, where the magnitude of the electric\
    \ field diminishes as $\\frac{1}{r}$. We will develop intuitions and formulations\
    \ about the electric field in two dimensions first because it is easier to visualize.\
    \ In a later section, we will present a three-dimensional formulation appropriate\
    \ for our own universe, where the field strength diminishes as $\\frac{1}{r^2}$\
    \ instead.\n\n```\n\n# Code Block 4.1\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\ndef get_vfield_radial_2d(p, p_charge):\n    # p: points at which the\
    \ electric field is calculated.\n    # p_charge: location of a point charge.\n\
    \    x, y = p[0]-p_charge[0], p[1]-p_charge[1]\n    r = np.sqrt(x**2 + y**2)\n\
    \    \n    # Avoid dividing by a very small number.\n    valid_idx = np.where(r\
    \ > np.max(r)*0.01)\n    p, r = p[:,valid_idx].squeeze(), r[valid_idx].squeeze()\n\
    \    \n    vf = np.zeros(p.shape)\n    vf[0] = (p[0]-p_charge[0])/r**2\n    vf[1]\
    \ = (p[1]-p_charge[1])/r**2\n    vf = vf/(2*np.pi)\n    return vf, p\n\n```\n\n\
    Let's visualize the electric field of a point charge placed at the origin. When\
    \ the sign of the electric charge is negative, we can simply flip the direction\
    \ of the electric field, as indicated by vf_neg = -vf_pos."
