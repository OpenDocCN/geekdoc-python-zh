    # Electrodynamics Tutorials with Python Simulations


    individual contributions. We have illustrated the Biot-Savart law with three examples.
    The implication of the cross-product embedded inside the Biot-Savart law is that
    the magnetic field “circulates” around currents, and its circulating direction
    can be described with a right-hand rule.


    For a current through a loop, whether it is a square or a ring, the right-hand
    rule reveals the direction of the magnetic field inside and outside the loop.
    If the current flows counterclockwise when the loop is viewed from the top, the
    magnetic field inside the loop points toward the top. When multiple loops are
    stacked together in the form of a long coil, also known as a solenoid, the magnetic
    field from each loop reinforces one another, producing a strong and uniform magnetic
    field inside.


    For a few simple cases, the integral of the Biot-Savart law can be calculated
    analytically, producing an exact formula. We can check the validity of our numerical
    calculations with these formulae. In the case of a straight wire of length $L$
    with current $I$ flowing in $+z$-direction, the magnetic field at a distance $r$
    away from its midpoint is given by


    $$ \vec{\mathbf{B}}_{\text{wire}} = \frac{\mu_0 IL}{2\pi r\sqrt{4r^2 + L^2}}(-\sin\phi\hat{\mathbf{x}}
    + \cos\phi\hat{\mathbf{y}}). $$


    For a square loop with side $L$ and a circular ring with radius $R$, lying on
    the $xy$-plane and having the current flow $I$ in a counter-clockwise direction
    as viewed from the $+z$-axis, the magnetic fields at distance $r$ above their
    centers are


    $$ \vec{\mathbf{B}}_{\text{square}} = \frac{\mu_0 IL^2}{2\pi\left(\left(\frac{L}{2}\right)^2
    + r^2\right)\sqrt{\frac{L^2}{2} + r^2}}\hat{\mathbf{z}} $$


    and


    $$ \vec{\mathbf{B}}_{\text{ring}} = \frac{\mu_0 IR^2}{2(R^2 + r^2)^{3/2}}\hat{\mathbf{z}}.
    $$


    We leave the verification of these results to our readers as an exercise. Before
    we calculate the magnetic fields in two different ways (analytically and numerically)
    and compare them, let us discuss how we might compare two vectors in general.
