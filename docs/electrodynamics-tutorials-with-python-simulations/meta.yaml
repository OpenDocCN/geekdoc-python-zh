    \ space. By taking into account the absence of electric charges in free space\
    \ and Ampere's law, we arrive at another second-order partial differential equation\
    \ for the electric field.\n\n```\n\\nabla^2 \\vec{E} = \\mu_0 \\epsilon_0 \\frac{\\\
    partial^2 \\vec{E}}{\\partial t^2}\n```\n\nThe above results can be rewritten\
    \ in the following general form:\n\n```\n\\frac{\\partial^2 \\vec{U}}{\\partial\
    \ x^2} + \\frac{\\partial^2 \\vec{U}}{\\partial y^2} + \\frac{\\partial^2 \\vec{U}}{\\\
    partial z^2} = \\frac{1}{v^2} \\frac{\\partial^2 \\vec{U}}{\\partial t^2}\n```\n\
    \nwhich is called a wave equation, and its solution propagates with speed $v$.\
    \ This equation also appears in classical mechanics. For instance, when we deal\
    \ with an acoustic wave in a solid medium with bulk modulus $B$ and mass density\
    \ $\\rho$, the vector field $\\vec{U}$ of the sound wave satisfies the same equation\
    \ with speed $v = \\sqrt{B/\\rho}$.\n\nLet's work with a simpler, one-dimensional\
    \ wave equation with respect to the spatial variable $z$ and time $t$:\n\n```\n\
    \\frac{\\partial^2 U}{\\partial z^2} = \\frac{1}{v^2} \\frac{\\partial^2 U}{\\\
    partial t^2}\n```\n\nThis equation has a solution for any function $U(z,t)$ whose\
    \ argument can be written as $(z-vt)$ or $(z+vt)$. In other words, if $U(z,t)\
    \ = f(u) = f(z \\pm vt)$, it satisfies the wave equation. We can verify this by\
    \ taking the partial derivatives of $U(z,t)$.\n\n```\n\\frac{\\partial U}{\\partial\
    \ z} = \\frac{df}{du} \\frac{\\partial u}{\\partial z} = \\frac{df}{du} \n\\frac{\\\
    partial U}{\\partial t} = \\frac{df}{du} \\frac{\\partial u}{\\partial t} = \\\
    pm v \\frac{df}{du}\n```\n\nNow, let's take the second derivatives.\n\n```\n\\\
    frac{\\partial^2 U}{\\partial z^2} = \\frac{\\partial}{\\partial z} \\left( \\\
    frac{df}{du} \\right) = \\frac{d^2 f}{du^2} \\frac{\\partial u}{\\partial z} =\
    \ \\frac{d^2 f}{du^2}\n```"
