    \ (Ex, Ey).\nEx, Ey = np.zeros((ny, nx)), np.zeros((ny, nx))\n\nfor charge in\
    \ charges:\n    ex, ey = E(*charge,x = X,y = Y)\n    Ex = Ex + ex\n    Ey = Ey\
