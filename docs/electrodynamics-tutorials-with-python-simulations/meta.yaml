    \ Note that `x` and `y` denote the $x$ and $y$ coordinates of the boundary. The\
    \ indexing convention in the code is such that if `x` has $N$ elements, `x[:-2]`\
    \ refers to the first $N-2$ elements (without the last two elements), and x[2:]\
    \ refers to the last N – 2 elements, starting from the third element (without\
    \ the first two elements). Therefore, x[2:]-x[:-2] calculates x_{i+1} - x_{i-1}\
    \ between the two edge points (x[0] and x[-1]) in the boundary. The edge points\
    \ have only one immediate neighbor, so the normal vectors are not calculated at\
