- md: '## 2.3 VECTOR DECOMPOSITION


    Finding the individual components of a vector is called vector decomposition.
    The vector components along the x and y axes of a two-dimensional vector, A, can
    be calculated with the cos and sin functions, based on the magnitude (r) and directional
    angle (ϕ) of the vector, where ϕ is conveniently chosen as the counterclockwise
    angle from the positive x-axis. Then, \( a_x = r \cos \phi \) and \( a_y = r \sin
    \phi \), as illustrated by the following code block.


    Using a dot product operation, \( a_x = \vec{A} \cdot \hat{x} \) and \( a_y =
    \vec{A} \cdot \hat{y} \). In other words, the vector component along each coordinate
    axis can be determined by projecting the vector onto each axis and measuring the
    extent of this projection.


    ```python

    # Code Block 2.3


    # Vector decomposition


    # defining the famous constant pi = 3.14...

    pi = np.pi


    r = 1

    phi_circle = np.arange(0,2*pi,0.01)

    x_circle = r*np.cos(phi_circle)

    y_circle = r*np.sin(phi_circle)


    phi = pi/6

    x = r*np.cos(phi)

    y = r*np.sin(phi)


    plt.figure(figsize=(5,5))

    plt.plot(x_circle,y_circle,color=''gray'')

    plt.quiver(0,0,x,y,angles=''xy'',scale_units=''xy'',scale=1)

    plt.quiver(0,0,x,0,angles=''xy'',scale_units=''xy'',scale=1)

    plt.quiver(0,0,0,y,angles=''xy'',scale_units=''xy'',scale=1)


    plt.plot([0,0],[-r,r],linestyle=''dotted'',color=''gray'')

    plt.plot([-r,r],[0,0],linestyle=''dotted'',color=''gray'')


    plt.plot([0,x],[y,y],linestyle=''dotted'',color=''gray'')

    plt.plot([x,x],[0,y],linestyle=''dotted'',color=''gray'')

    plt.text(0.3,-0.15,r"$a_x = r\ \cos \phi$")

