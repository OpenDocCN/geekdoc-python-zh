    # 2.5 ADDITIONAL OPERATIONS WITH $\nabla$


    Just as we have a rule for differentiating a product of two functions, $\frac{d}{dt}(f(t)g(t))
    = f(t)\frac{dg(t)}{dt} + g(t)\frac{df(t)}{dt}$, there are product rules for the
    $\nabla$-operator, when it is applied to the scalar and vector functions. For
    instance, if you have a dot product of two vector functions $\vec{K}$ and $\vec{G}$,
    its gradient will be given by:


    ```

    $$ \nabla(\vec{K} \cdot \vec{G}) = \vec{K} \times (\nabla \times \vec{G}) + \vec{G}
    \times (\nabla \times \vec{K}) + (\vec{K} \cdot \nabla)\vec{G} + (\vec{G} \cdot
    \nabla)\vec{K} $$

    ```


    Given a cross product between two vector functions, its divergence and curl can
