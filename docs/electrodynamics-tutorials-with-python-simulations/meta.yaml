    \nFigure 9.5\n\n## 9.4 MAXWELL’S CORRECTION TO AMPERE’S LAW\n\nThe operation of\
    \ an LC circuit can be described as continuous and gradual switching between the\
    \ electric field in the capacitor and the magnetic field in the inductor, where\
    \ a change in one field leads to a change in the other. Faraday’s law clearly\
    \ states that a changing magnetic field can induce an emf. Maxwell suspected that\
    \ a changing electric field might similarly induce magnetic phenomena, but none\
    \ of the known laws of electromagnetism addressed such a possibility when he started\
    \ working on the theory of electromagnetism. He hypothesized that Ampere’s law\
    \ known up to that point, $\\oint_{\\text{Contour}} \\vec{\\mathbf{B}} \\cdot\
    \ d\\vec{l} = \\mu_0 \\iint_{\\text{Area}} \\vec{\\mathbf{J}} \\cdot \\hat{\\\
    mathbf{n}}da$, might not be complete.\n\nIn the LC circuit, the switching between\
    \ the electromagnetic fields is mediated by the current flow in the circuit, but\
    \ what exactly happens between the two plates of the capacitor? The electrical\
    \ charges do not jump across the plates, so there is no physical current. We would\
    \ not describe what is happening in the capacitor with current density, $\\vec{\\\
    mathbf{J}}$.\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_252_0.png)\n\nFigure\
    \ 9.6\n\nThe above diagram shows a capacitor with two circular plates. The current\
    \ flow I(t) affects the amount of charge q(t) on the plates, which is responsible\
    \ for the electric field E(t) between the plates. An Amperian loop, denoted as\
    \ C, is drawn around the wire connected to the capacitor. Note C refers to the\
    \ contour of the loop, not the capacitance. Let's consider two different surfaces\
    \ that share the same boundary as this closed contour. The first surface, S₁,\
    \ is the flat surface on the same plane as the loop, and the wire penetrates this\
    \ surface. The second surface, S₂, is the half-sphere and goes between the two\
    \ capacitor plates where no current passes.\n\nAround the closed path C, there\
    \ is a circulating magnetic field due to the current through the wire, according\
    \ to Ampere's law. Then, according to Stokes' theorem, the line integral of this\
    \ magnetic field around C can be expressed as a surface integral involving the\
    \ curl of the magnetic field. This surface integral can be calculated with any\
    \ surface as long as they have the same boundary. In particular, the two surfaces\
    \ of S₁ and S₂ both encompass the contour C, so the surface integrals of the curl\
    \ of the magnetic field through each surface should be equivalent.\n\nFor the\
    \ surface $S_1$, which encloses the total current of $I(t)$, the line integral\
    \ $\\oint_{\\mathcal{C}} \\mathbf{B}(t) \\cdot d\\mathbf{l}$ can be written as\
    \ the surface integral $\\iint_{S_1} (\\nabla \\times \\mathbf{B}(t)) \\cdot \\\
    hat{\\mathbf{n}} da$. This surface integral is also equal to the total sum of\
    \ current inside times the free-space permeability, or $\\mu_0 \\iint_{S_1} \\\
    mathbf{J} \\cdot \\hat{\\mathbf{n}} da = \\mu_0 I(t)$. However, for the second\
    \ surface $S_2$, there is no current, so $\\mu_0 \\iint_{S_2} \\mathbf{J} \\cdot\
    \ \\hat{\\mathbf{n}} da = 0$.\n\nThis is puzzling, because the surface integral\
    \ $\\iint_{S_2} (\\nabla \\times \\mathbf{B}(t)) \\cdot \\hat{\\mathbf{n}} da$\
    \ must be equal to the other surface integral $\\iint_{S_1} (\\nabla \\times \\\
    mathbf{B}(t)) \\cdot \\hat{\\mathbf{n}} da$, which should be equal to $\\oint_{\\\
    mathcal{C}} \\mathbf{B}(t) \\cdot d\\mathbf{l}$.\n\nTo resolve this apparent contradiction\
    \ in the laws of electromagnetism, Maxwell proposed the concept of displacement\
    \ current within the capacitor, which is different from the conduction current\
    \ flowing through the wire in the circuit. Even though individual electrical charges\
    \ do not jump across the gap between the two plates of a capacitor, there is a\
    \ change in the amount of charges on the capacitor and an accompanying change\
    \ in the electric field. The concept of displacement current accounts for these\
    \ changes in the capacitor.\n\nThis relationship between $q(t)$ and $\\mathbf{E}(t)$\
    \ can be derived from Gauss's law. Since the charge $q(t)$ on one capacitor plate\
    \ is confined within the volume enclosed by $S_1$ and $S_2$,\n\n$$ \\frac{q(t)}{\\\
    epsilon_0} = \\iint_{S_1} \\vec{0} \\cdot \\hat{\\mathbf{n}} da + \\iint_{S_2}\
    \ \\vec{\\mathbf{E}}(t) \\cdot \\hat{\\mathbf{n}} da, $$\n\nwhere the electric\
    \ field is zero outside of the capacitor around $S_1$. Hence, the displacement\
    \ current, defined as the rate of change of charge, can be defined in terms of\
    \ the electric field:\n\n$$ \\frac{dq(t)}{dt} = \\epsilon_0 \\iint_{S_2} \\frac{\\\
    partial \\vec{\\mathbf{E}}(t)}{\\partial t} \\cdot \\hat{\\mathbf{n}} da, $$\n\
    \nwhere according to Leibniz' rule, a partial derivative is used inside the integral.\n\
    \nThus, we present a corrected Ampere's law that includes both conduction current\
    \ density $\\mathbf{J}$ and time-varying electric field $\\mathbf{E}(t)$ for any\
    \ arbitrary contour and the surface area bounded by it:\n\n$$ \\oint_{\\text{Contour}}\
    \ \\mathbf{B}(t) \\cdot d\\mathbf{l} = \\iint_{\\text{Area}} (\\nabla \\times\
    \ \\mathbf{B}(t)) \\cdot \\hat{\\mathbf{n}} da \\ = \\mu_0 \\iint_{\\text{Area}}\
    \ \\left( \\mathbf{J} + \\epsilon_0 \\frac{\\partial \\vec{\\mathbf{E}}(t)}{\\\
    partial t} \\right) \\cdot \\hat{\\mathbf{n}} da. $$\n\nIn a differential form,\
    \ Ampere’s law with Maxwell’s correction states\n\n$$\\nabla \\times \\vec{\\\
    mathbf{B}} = \\mu_0 \\vec{\\mathbf{J}} + \\mu_0 \\epsilon_0 \\frac{\\partial \\\
    vec{\\mathbf{E}}}{\\partial t}$$\n\nNow, just like Faraday’s law, Ampere’s law\
    \ with Maxwell’s correction shows how the changing electric field gives rise to\
    \ the magnetic field. In the next chapter, we will see such symmetric and mutual\
    \ induction of electric and magnetic fields leads to electromagnetic waves.\n\n\
    # CHAPTER 10\n\n## Maxwell's Equations and Electromagnetic Wave\n\n### 10.1 NO\
    \ MAGNETIC MONOPOLE\n\nGauss’s law, which we have studied earlier, states that\
    \ the electric flux across a closed surface is proportional to the total enclosed\
    \ charge, and its mathematical expression is: $\\oiint_{\\mathrm{Area}} \\vec{\\\
    mathbf{E}} \\cdot d\\vec{\\mathbf{a}} = \\frac{q_{\\mathrm{enc}}}{\\epsilon_0}$.\
    \ This law expresses the relationship between electric charges and electric fields.\
    \ We have also discussed that electrical charges come in two different types:\
    \ positive and negative. The electric field and its flux point out of the positive\
    \ charges, which act like a source, and flow into the negative charges, which\
    \ act like a sink.\n\nAnalogous to the electrical charges, can we also consider\
    \ a magnetic monopole, or an individual magnetic charge, that acts as a source\
    \ or a sink of the magnetic field? Perhaps, are the two ends of a bar magnet magnetic\
