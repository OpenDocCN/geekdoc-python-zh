- img_proc: true
  md: "As the name suggests, the result of this operation is a scalar value, not a\
    \ vector. It can also be proven that $\\vec{A} \\cdot \\vec{B} = |\\vec{A}||\\\
    vec{B}| \\cos \\theta$, where $\\theta$ is the angle between the two vectors.\n\
    \nA cross product, also known as vector product, between vector $\\vec{A}$ and\
    \ $\\vec{B}$ is defined in three dimensions as:\n\n$$\\vec{A} \\times \\vec{B}\
    \ = \\begin{vmatrix} \\hat{\\mathbf{x}} & \\hat{\\mathbf{y}} & \\hat{\\mathbf{z}}\
