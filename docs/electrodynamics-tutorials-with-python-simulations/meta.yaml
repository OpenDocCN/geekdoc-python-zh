    \ + r_s^2 - 2rr_s(\\sin\\theta\\sin\\theta_s\\cos(\\phi - \\phi_s) + \\cos\\theta\\\
    cos\\theta_s)}$。在观测点位于 z 轴上的特殊情况下，即 $\\theta = 0$，上述距离表达式简化为 $\\sqrt{r^2 + r_s^2\
    \ - 2rr_s\\cos\\theta_s}$，这也可以通过余弦定理验证。\n\n## 270 附录\n\n三维中另一个曲线坐标系的例子是柱坐标系，其中点由\
    \ $(r, \\phi, z)$ 指定。$r$ 是从 z 轴到该点的距离。有时使用另一个符号 $\\rho$ 来代替，以区分于球坐标系中从原点的径向距离。$\\\
    phi$ 是在 $xy$ 平面上测量的极角，与球坐标中的 $\\phi$ 类似。最后一个坐标 $z$ 是该点在 z 轴上的投影，与笛卡尔坐标系中的 $z$\
    \ 类似。因此，笛卡尔坐标与柱坐标之间的关系由下式给出：\n\n$$\n\\begin{aligned}\n    x & = r\\cos\\phi \\\
