    outside of the vehicle seem to be moving. In other words, I see you and your vehicle
    moving with velocity $\vec{v}$, while it would seem to you that I am moving with
    $-\vec{v}$.


    A key idea of special relativity is that there is no absolute frame of reference.
    Hence, all inertial reference frames are equivalent, and the fundamental laws
    of physics, whether they were observed by you or me in two different inertial
    frames, should be the same. In principle, if the motion of your vehicle was perfectly
    smooth, it is fundamentally imposs- ible to determine whether you and your vehicle
    are in motion or I am in motion in the opposite direction.


