    # Figure 10.3


    Now let’s study a plane wave of the electromagnetic fields. We can start with
    a general expression for an electric field $\vec{E}(x, y, z, t)$:


    $\vec{E}(x, y, z, t) = E_x(x, y, z, t)\hat{x} + E_y(x, y, z, t)\hat{y} + E_z(x,
    y, z, t)\hat{z},$


    where $E_x(x, y, z, t)$ is an $x$-component of the electric field at position
    $(x, y, z)$ and at time $t$. $E_y(x, y, z, t)$ and $E_z(x, y, z, t)$ correspond
    to the $y$ and $z$ components. As we have discussed in the previous section, the
    electric field in free space (i.e., no $\rho$ and no $\vec{J}$) satisfies the
    wave equation, so we will consider an electric field that is a sinusoidal plane
    wave with a fixed angular frequency $\omega$. Since the electromagnetic wave travels
    at speed $c$, we know its wavelength: $\lambda = \frac{2\pi c}{\omega}$. Such
    a wave with a single wavelength or a single frequency is referred to as a monochromatic
    wave. An example of a monochromatic electromagnetic wave is a single-colored laser.


    In general, $E_x$, $E_y$, and $E_z$ can be different from one another with distinct
    functional forms, but for a monochromatic sinusoidal plane wave,


    $E_x(x, y, z, t) = E_x(\vec{k} \cdot \vec{r} - \omega t) = \tilde{E}_x e^{i(\vec{k}
    \cdot \vec{r} - \omega t)},$


    where $\tilde{E}_x$ denotes a constant (potentially a complex number). Likewise,
    $E_y$ and $E_z$ are also functions of $\vec{k} \cdot \vec{r} - \omega t$: $E_y(x,
    y, z, t) = \tilde{E}_y e^{i(\vec{k} \cdot \vec{r} - \omega t)}$ and $E_z(x, y,
    z, t) = \tilde{E}_z e^{i(\vec{k} \cdot \vec{r} - \omega t)}$.'
