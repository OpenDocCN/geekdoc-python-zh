    The quantity $Idl$ necessary to calculate the magnetic field with the Biot-Savart
    law is $Idl = \vec{J} \cdot \hat{z} dV = \alpha r^2 dV$, where $dV$ is a small
    volume element in the wire. In the following code block, the function `r2_curr_from_p_curr()`
