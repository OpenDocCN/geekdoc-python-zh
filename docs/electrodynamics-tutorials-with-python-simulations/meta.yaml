  md: 'The next few lines in the code block illustrate the usage of scatter() and
    plot() functions. The scatter() function puts markers at specified coordinates,
    and plot() draws straight lines between them. Hence, if the distance between the
    data points is small, the straight line segments produced by the plot() function
    will collectively make a smooth-looking curve.


    The next lines in the code block improve the look of the plot. A good data visualization
    practice is to only include informative, relevant items and remove unnecessary,
    distracting ones in a plot. For example, three equally spaced tick-marks are enough
    to indicate the linear scale of the axis. Finer tick-marks or gridlines are unnecessary
    unless a precise reading of the coordinates is expected of a reader. Descriptive
    axis labels, titles, and legends also aid the readability of a plot. The goal
    is to increase the signal-to-noise ratio of our plots and visualizations.


    ```

    # Code Block 1.3


    import numpy as np

    import matplotlib.pyplot as plt


    # Define x and y.

    step = 0.25

    x = np.arange(-1,1+step,step)

    y = 2*(x**2)+1


    # Make a scatter plot with lines that connect adjacent points.

    plt.scatter(x,y,color=''gray'')

    plt.plot(x,y,color=''black'')


    # Make the plot look nice by specifying limits and tick marks.

    # Improve the signal-to-noise ratio of the visualization.

    plt.xlim((-1.25,1.25))

    plt.ylim((-1,5))

    plt.xticks((-1,0,1))

    plt.yticks(np.arange(0,5,2))

    plt.xlabel(''x'')

    plt.ylabel(''y'')


    # Save the plot.

    plt.savefig(''fig_ch1_scatter_plot.eps'')

    plt.show()

    ```'
