    # Figure 6.4


    As a first-order approximation, assume that the horizontal extent of the velocity
    selector $L$ is short enough, so the electrons spend very little time inside the
    region and their paths do not bend too much. Then, the motion inside the velocity
    selector region is like an elementary kinematics problem where a projectile is
    shot horizontally and undergoes uniform vertical acceleration due to gravity.
    What is the vertical velocity after traveling a distance of $L$? This answer can
    be derived as follows. The time an electron spends traversing the distance $L$
    is $t = \frac{L}{v_x}$. The additional vertical velocity $v_y$ is proportional
    to this time, so $v_y = (a_y)t = \frac{q v_x B}{m} t$, where the vertical acceleration
    $a_y = \frac{F_y}{m}$ according to the Newton''s second law of motion.


    Putting these relationships together, we can calculate the ratio of velocity components:


    $$\frac{v_y}{v_x} = \left( \frac{q v_x B}{m} \frac{L}{v_x} \right) \frac{1}{v_x}
    = \frac{q}{m} \frac{B^2 L}{E}$$'
