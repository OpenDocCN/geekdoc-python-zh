    # Epilogue


    This is just the beginning of a deeper study of electrodynamics. Even though the
    fundamental laws of electromagnetism can be captured in just a few mathematical
    relationships (namely, Maxwell’s Equations and Lorentz Force Law), the variety
    of physical phenomena that manifest out of them is stunningly diverse. So diverse
    that electricity, magnetism, and optics had been considered distinct and separate
    phenomena. It took many generations of scientists to unify them into a single
    coherent framework as we know it today. With the advance of our knowledge in electromagnetism,
    we have seen further development of new technologies (electronics, lasers, etc.),
    methodologies (microscopy, spectroscopy, etc.), and understanding of the universe
    (quantum mechanics, field theory, cosmology, etc.). A physicist Richard Feynman
    noted that “From a long view of the history of mankind – seen from, say, ten thousand
    years from now – there can be little doubt that the most significant event of
    the 19th century will be judged as Maxwell’s discovery of the laws of electrodynamics.”*
    We enjoyed writing this book, and we hope the readers found our presentation of
    electrodynamics enjoyable, too.


    *This quote is from Chapter 1 of Volume 2 of The Feynman Lectures on Physics.'
