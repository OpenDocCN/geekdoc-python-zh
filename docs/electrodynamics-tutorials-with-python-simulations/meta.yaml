    How about other shapes of current, such as a circular loop? The Biot-Savart law
    tells us that a magnetic field $\vec{B}(x, y, z)$ from a current source of an
    arbitrary shape with a current density $\vec{J}(x_s, y_s, z_s)$ can be given as
    a volume integral over the current source:


    $$\vec{B}(x, y, z) = \frac{\mu_0}{4\pi} \iiint \frac{\vec{J}(x_s, y_s, z_s) \times
    \vec{r}}{r^3} dx_s dy_s dz_s$$


    where the displacement vector between the source and observation points is $\vec{r}
    = (x - x_s)\hat{x} + (y - y_s)\hat{y} + (z - z_s)\hat{z}$ and $r = \sqrt{(x -
    x_s)^2 + (y - y_s)^2 + (z - z_s)^2}$.


    The divergence of this integral form of the magnetic field is:


    $$\nabla \cdot \vec{B}(x, y, z) = \frac{\mu_0}{4\pi} \iiint \nabla \cdot \left[
    \frac{\vec{J}(x_s, y_s, z_s) \times \vec{r}}{r^3} \right] dx_s dy_s dz_s.$$


    Here, the $\nabla$-operator, $\nabla = \frac{\partial}{\partial x}\hat{x} + \frac{\partial}{\partial
    y}\hat{y} + \frac{\partial}{\partial z}\hat{z}$, is placed inside the volume integral
    since the divergence is evaluated with respect to the observation point $(x, y,
    z)$, not the source point $(x_s, y_s, z_s)$. Also, the integrand can be re-expressed
    as


    $$\nabla \cdot \left[ \frac{\vec{J}(x_s, y_s, z_s) \times \vec{r}}{r^3} \right]
    = \frac{\vec{r}}{r^3} \cdot [\nabla \times \vec{J}(x_s, y_s, z_s)] - \vec{J}(x_s,
    y_s, z_s) \cdot \left( \nabla \times \frac{\vec{r}}{r^3} \right)$$


    by applying the product rule for the divergence of the cross-product.


