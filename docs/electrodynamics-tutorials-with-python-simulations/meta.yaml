    consider the magnetic field from an infinitely long wire (assuming zero thickness)
    with the current, $I$ flowing along $+\hat{z}$. We can determine this magnetic
    field either by considering Ampere''s law or by using $\vec{B}_{\text{wire}}$
    obtained for a wire with a finite length $L$ and taking the limit of $L$ going
