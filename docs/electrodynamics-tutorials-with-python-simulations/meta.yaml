    \ S6\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_290_0.png)\n\n## 后记\n\n这仅仅是深入研究电动力学的起点。尽管电磁学的基本定律可以被概括为寥寥几个数学关系式（即麦克斯韦方程组和洛伦兹力定律），但由它们衍生出的物理现象却异常丰富多样。其多样性使得电、磁、光曾被认为是彼此独立、截然不同的现象。经过几代科学家的努力，才将它们统一到我们今天所知的单一连贯框架中。随着我们电磁学知识的进步，我们见证了新技术（电子学、激光等）、新方法（显微术、光谱学等）以及对宇宙认识（量子力学、场论、宇宙学等）的进一步发展。物理学家理查德·费曼曾指出：“从人类历史的长远视角来看——比如从一万年后回望——19世纪最重大的事件无疑将被认定为麦克斯韦发现电动力学定律。”*\
    \ 我们很享受撰写这本书的过程，也希望读者觉得我们对电动力学的呈现同样引人入胜。\n\n*此引言出自《费曼物理学讲义》第二卷第一章。\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_292_0.png)\n\
