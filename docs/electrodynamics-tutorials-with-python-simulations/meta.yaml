    \ y):\n    q_x, q_y = q_position[0], q_position[1]\n    d3 = np.hypot(x-q_x,y-q_y)**3\n\
    \    return q*(x-q_x)/d3, q*(y-q_y)/d3\n\n# Grid of x, y points\nnx, ny = 64,\
    \ 64\nx = np.linspace(-4, 4, nx)\ny = np.linspace(-3, 3, ny)\nX, Y = np.meshgrid(x,\
    \ y)\n\n# Charge locations.\ncharges = []\ncharges.append((+1,(-1.5,-0.3)))\n\
