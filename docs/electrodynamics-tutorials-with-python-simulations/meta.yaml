  md: 'where $r = \sqrt{x^2 + y^2 + z^2}$. (At the origin where $r = 0$, we have to
    deal with infinite charge density, which can be handled with the formulation of
    the Dirac delta function. However, we can sidestep this discussion by only considering
    the region where the electric potential is finite.) The negative gradient of $V$,
    or $-\frac{dV}{dr}\hat{\mathbf{r}}$, is indeed equal to the electric field $\vec{\mathbf{E}}
    = \frac{q}{4\pi\epsilon_0 r^2}\hat{\mathbf{r}}$, as expected.


    If electric charges are distributed in space, we again rely on the superposition
    principle and approximate the charge distribution as the sum of point charges.
    For each point charge, its electric field is equal to the negative gradient of
    the electric potential. Hence, $\vec{\mathbf{E}}_{\text{total}} = \vec{\mathbf{E}}_1
    + \vec{\mathbf{E}}_2 + \cdots = -\nabla V_1 - \nabla V_2 - \cdots = -\nabla V_{\text{total}}$,
    and $V_{\text{total}} = V_1 + V_2 + \cdots$.


    When the charge is distributed along a straight line, the electric potential can
    be calculated as a line integral. For example, consider a rod of length $L$, which
    is uniformly charged with $Q$ and is lying along the $x$-axis. Its linear charge
    density is $\lambda = Q/L$. We can find the electric potential at distance $z$
    away from the center of the rod:


    $$V(x=0, y=0, z) = \frac{1}{4\pi\epsilon_0} \int_{\text{Rod}} \frac{\lambda}{r}
    dx_s = \frac{\lambda}{4\pi\epsilon_0} \int_{-L/2}^{+L/2} \frac{1}{\sqrt{z^2 +
    x_s^2}} dx_s.$$


    The following code block evaluates the above integral with the sympy module.


    ```

    # Code Block 8.8


    # Electric potential of a thin wire.


    Q, e, L, x, z = sym.symbols(''Q \epsilon_0 L x z'')

    charge_density = Q/L


    # Integral form of Poisson equation solution.

    d = sym.sqrt(z**2+x**2)

    V = sym.integrate(charge_density/(4*sym.pi*e*d), (x,-L/2,L/2))


    print(''Electric potential V(z) ='')

    display(V.nsimplify())

    ```'
