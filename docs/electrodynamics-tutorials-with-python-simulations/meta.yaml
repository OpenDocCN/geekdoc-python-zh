    The next lines in the code block improve the look of the plot. A good data visualization
    practice is to only include informative, relevant items and remove unnecessary,
    distracting ones in a plot. For example, three equally spaced tick-marks are enough
    to indicate the linear scale of the axis. Finer tick-marks or gridlines are unnecessary
    unless a precise reading of the coordinates is expected of a reader. Descriptive
    axis labels, titles, and legends also aid the readability of a plot. The goal
    is to increase the signal-to-noise ratio of our plots and visualizations.


