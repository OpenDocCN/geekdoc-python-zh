    If there is a curved boundary, it can be divided into many short, approximately
    linear segments, and a normal vector at each segment can be found. More specifically,
    consider a set of coordinates that describe a continuous boundary: $(x_1, y_1)$,
    $(x_2, y_2)$, $\cdots$, $(x_N, y_N)$. A normal vector $\hat{\mathbf{n}}$ at point
    $(x_i, y_i)$ can be approximated by finding a line perpendicular to a line between
    $(x_{i-1}, y_{i-1})$ and $(x_{i+1}, y_{i+1})$. $\hat{\mathbf{n}}$ has a slope
    of $-\frac{x_{i+1}-x_{i-1}}{y_{i+1}-y_{i-1}}$ at a point $(x_i, y_i)$. The following
    code block demonstrates this idea.


