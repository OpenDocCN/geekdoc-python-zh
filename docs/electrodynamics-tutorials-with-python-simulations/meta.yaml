    if magnetic monopoles were to exist, they cannot be present in isolation by itself.
    A positive magnetic monopole must always be co-located with a negative magnetic
    monopole with equal magnitude, forming a magnetic dipole with a net-zero magnetic
    charge. Since the volume for the integral of Gauss’s law can be chosen to be infinitesimally
    small, the magnetic dipole must exist as an inseparable pair with zero separation,
    and a single magnetic monopole can never be found by itself. Unlike the electric
    field, the source and sink of a magnetic field are located precisely at the same
    point in space, so the magnetic field always has zero divergence. Even if a magnet
    is broken into small pieces, there will never be a piece that carries a single
    magnetic pole. The north and south poles will always be perfectly matched.


    # 10.2 MAXWELL’S EQUATIONS


    Our study of electromagnetism has thus far unveiled the following observations
    and insights: Electric charges and currents underlie the formation of static electric
    and magnetic fields. There is a dynamic relationship between the electric and
    magnetic fields, where a change in one induces the other. Unlike electric charges,
    magnetic monopoles do not exist in isolation. These relations can be summarized
    in integral forms as follows:


    $$

    \oiint_{\text{Area}} \vec{E} \cdot d\vec{a} = \frac{q_{\text{enc}}}{\epsilon_0}
    \quad (\text{Gauss''s law}),

    $$

    $$

    \oiint_{\text{Area}} \vec{B} \cdot d\vec{a} = 0 \quad (\text{No magnetic monopole}),

    $$

    $$

    \oint_{\text{Contour}} \vec{E} \cdot d\vec{l} = -\frac{d}{dt} \iint_{\text{Area}}
    \vec{B} \cdot d\vec{a} \quad (\text{Faraday''s law}),

    $$

    $$

    \oint_{\text{Contour}} \vec{B} \cdot d\vec{l} = \mu_0 I_{\text{enc}} + \mu_0 \epsilon_0
    \frac{d}{dt} \iint_{\text{Area}} \vec{E} \cdot d\vec{a} \\

    \quad (\text{Ampere''s law with Maxwell''s correction}).

    $$


    Collectively, these four equations are known as Maxwell’s equations, and they,
    plus the Lorentz force equation $\vec{F} = q\vec{E} + q\vec{v} \times \vec{B}$,
    describe all of the fundamentals of electromagnetism. Maxwell’s equations can
    also be'
