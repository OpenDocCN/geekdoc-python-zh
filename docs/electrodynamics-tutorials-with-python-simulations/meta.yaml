    \ + \\cdots$), but the observed probability is given by the amplitude squared\
    \ ($|\\psi_1 + \\psi_2 + \\cdots|^2$). The laws of electromagnetism seem to operate\
    \ under the superposition principle, which is an experimental fact. The total\
    \ electric field can be calculated by adding up individual contributions of electric\
    \ charges. As shown in the following code block, when there are two point charges,\
    \ the electric field due to each one can be calculated separately and then added\
    \ together later (vf = vf0 + vf1). The last example is known as a dipole, where\
    \ a pair of equal and opposite charges are arranged a small distance apart.\n\n\
