  mdcn: "## 5.6 再次探讨安培定律\n\n运用旋度定理，让我们再次审视安培定律。我们可以将$\\vec{K}$替换为$\\vec{B}$，从而得到：\n\
    \n$$\\oint_{\\text{Contour}} \\vec{B} \\cdot d\\vec{l} = \\iint_{\\text{Area}}\
    \ (\\nabla \\times \\vec{B}) \\cdot \\hat{n} da.$$\n\n根据安培定律，\n\n$$\\oint_{\\\
    text{Contour}} \\vec{B} \\cdot d\\vec{l} = \\mu_0 \\sum I = \\mu_0 \\iint_{\\\
    text{Area}} \\vec{J} \\cdot \\hat{n} da.$$\n\n这一情况令人联想到高斯定律，该定律指出，只要积分曲面包裹着相同量的电荷，电场的通量就与积分曲面的形状无关。同样，磁场的线积分与闭合轮廓线（以及该轮廓线所定义的曲面）的形状无关，只要该轮廓线包围着相同的电流量。\n\
    \n由于对于给定的任意轮廓边界，面积可以是任意曲面，因此等式右侧的被积函数必须彼此相等。\n\n$$\\nabla \\times \\vec{\\mathbf{B}}\
    \ = \\mu_0 \\vec{\\mathbf{J}}.$$\n\n这就是安培定律的微分形式。\n\n# 第六章\n\n## 力\n\n### 6.1\
    \ 电场力\n\n风能移动云朵和热气球。气象学家使用风图来分析天气模式并进行预测。行星、太阳和星系之间相互施加引力。天文学家可以分析它们的相互作用，并预测天体的运动。类似地，电荷通过电场对彼此施加电场力，从而影响电荷的运动。更精确地说，位于某一位置的电荷\
    \ $q$ 所受的电场力 $\\vec{F}_{\\text{electric}}$ 与该位置的电场 $\\vec{E}$ 成正比。\n\n$\\vec{F}_{\\\
    text{electric}} = q\\vec{E}$\n\n这表明电场是单位电荷所受的力。考虑一个位于原点的电荷 $Q$，它在三维空间中建立了一个电场：\n\
    \n$\\vec{E}(x, y, z) = \\frac{1}{4\\pi\\epsilon_0} \\frac{Q}{r^2} \\hat{\\mathbf{r}},$\n\
    \n其中 $r^2 = x^2 + y^2 + z^2$。位于位置 $(x, y, z)$ 的另一个电荷 $q$ 将因此受到 $Q$ 的电场施加的电场力：\n\
    \n$\\vec{F}_{\\text{electric}} = \\frac{1}{4\\pi\\epsilon_0} \\frac{qQ}{r^2} \\\
    hat{\\mathbf{r}}$\n\n上述表达式被称为库仑电场力定律。请注意，该公式对 q 和 Q 是对称的，它也可以被理解为 q 的电场对 Q 施加的电场力。引入电场概念的论证思路解决了超距作用问题：两个相隔一定距离的电荷如何对彼此施加力？答案是它们通过彼此的电场发生相互作用。这一简洁的表述同时涵盖了电荷的不同符号组合以及力的方向。如果\
    \ q 和 Q 均为正，结果力为正号，q 将被推离 Q。如果 q 和 Q 均为负，结果力同样为正号，这表示该力仍是斥力。如果 Q 和 q 符号相反，则该力为引力。分别作用在\
    \ q 和 Q 上的力，其大小相等、方向相反。\n\n### 6.2 磁场力\n\n以速度 $\\vec{v}$ 运动的电荷 $q$ 在该位置会受到由磁场\
