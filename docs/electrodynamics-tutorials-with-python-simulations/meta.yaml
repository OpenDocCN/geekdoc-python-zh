    \ 3.6\n\nThis observation motivates us to improve the earlier definition for the\
    \ amount of flow by introducing a unit normal vector \\(\\hat{\\mathbf{n}}\\)\
    \ that points perpendicular to the boundary. Note that \\(\\vec{\\mathbf{v}}\\\
    ) at the boundary has two components that are orthogonal to each other. \\(\\\
    vec{\\mathbf{v}}_{\\perp}\\) is perpendicular to the boundary and parallel to\
    \ \\(\\hat{\\mathbf{n}}\\). \\(\\vec{\\mathbf{v}}_{\\parallel}\\) is parallel\
    \ to the boundary and perpendicular to \\(\\hat{\\mathbf{n}}\\). Therefore, \\\
    (\\vec{\\mathbf{v}}_{\\perp} \\cdot \\vec{\\mathbf{v}}_{\\parallel} = 0\\). \\\
    (\\vec{\\mathbf{v}}_{\\parallel}\\) does not contribute to the flow through the\
    \ boundary. Only \\(\\vec{\\mathbf{v}}_{\\perp}\\) does, and \\(|\\vec{\\mathbf{v}}\
    \ \\cdot \\hat{\\mathbf{n}}| = |\\vec{\\mathbf{v}}_{\\perp}|\\).\n\nHence, we\
    \ have an improved definition of the quantity of flow, known as the flux and often\
    \ denoted with the symbol \\(\\Phi\\):\n\n> \\(\\Phi = \\int_a^b (\\vec{\\mathbf{v}}\
    \ \\cdot \\hat{\\mathbf{n}}) \\, dl\\).\n\n## 3.3 FLUX CALCULATION\n\nIn this\
    \ section, we will build a computational routine for calculating flux through\
    \ an arbitrary boundary for a given vector field in two dimensions. First, take\
    \ a look at a few examples of slanted boundary lines and their normal vectors.\
    \ Once we have a slope of the boundary line, we can calculate the slope of its\
    \ normal vector as its negative reciprocal.\n\n```\npython\n# Code Block 3.7\n\
    \nlw = 8\ntheta_range = [-90,-75,-60,-45] # in degrees\n\nfig = plt.figure(figsize=(6,3))\n\
