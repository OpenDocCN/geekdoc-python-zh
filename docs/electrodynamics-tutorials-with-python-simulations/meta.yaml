- md: '我们已经讨论了静电场总可以表示为无旋场，即用一个标量函数的梯度来表示，而静磁场总可以表示为无散场，即用一个矢量函数的旋度来表示。这些表示并不唯一，但非唯一性也意味着我们可以调整这些函数，并选择最便于处理当前情况的表示。这种灵活性允许我们简化电磁场的数学表达式，并利用给定问题的对称性，而不改变其底层物理。


    ## 8.7 泊松方程


    至此，我们主要处理的是标量和矢量函数的一阶导数，并看到了几个二阶导数的例子，其中 $\nabla$ 被应用了两次。特别重要的是一个标量函数梯度的散度：$\nabla
    \cdot \nabla V = \frac{\partial^2 V}{\partial x^2} + \frac{\partial^2 V}{\partial
    y^2} + \frac{\partial^2 V}{\partial z^2}$，它也写作 $\nabla^2 V$。二阶导数算符 $\nabla^2$
    常被称为拉普拉斯算符。


    让我们考虑一类含有拉普拉斯算符的微分方程：


    $\nabla^2 V(x, y, z) = f(x, y, z)$


    这被称为泊松方程。泊松方程的一个特殊形式，其中 $f(x, y, z) = 0$，被称为拉普拉斯方程。


    如果标量函数 $V$ 在无穷远处趋于零，或 $V(\infty) \to 0$，泊松方程的一个解可以表示为：


    $V(x, y, z) = -\frac{1}{4\pi} \iiint \frac{f(x'', y'', z'')}{\sqrt{(x-x'')^2 +
    (y-y'')^2 + (z-z'')^2}}dx''dy''dz''$


    这个结果的证明超出了本书的范围，因为它涉及其他高等数学主题，如狄拉克δ函数。在本章的剩余部分，我们将使用这个结果来探索电磁势的一些例子。


    ## 8.8 示例：连续电荷分布的电势


    这个二阶微分方程在静电学（以及物理学的其他分支，如热力学）中很重要，因为 $\nabla V = -\vec{E}$ 且 $\nabla \cdot \vec{E}
    = \frac{\rho}{\epsilon_0}$，所以 $\nabla \cdot \nabla V = \nabla^2 V = -\frac{\rho}{\epsilon_0}$。换句话说，泊松方程的解就是给定电荷分布
    $\rho$ 的电势。在没有任何电荷的自由空间中（$\rho = 0$），我们有 $\nabla^2 V(x, y, z) = 0$。


    对于电荷密度 $\rho$，相应的电势 $V$ 可以表示为：


    $$V(x, y, z) = \frac{1}{4\pi\epsilon_0} \iiint \frac{\rho}{r} dx_s dy_s dz_s$$


    其中 $r = \sqrt{(x - x_s)^2 + (y - y_s)^2 + (z - z_s)^2}$ 是观察点 $(x, y, z)$ 与电荷密度源点
    $(x_s, y_s, z_s)$ 之间的距离。此积分将在电荷密度不为零的体积上进行。


    这个解的直观理解如下。在前面的章节中，我们已经确立，通过一个封闭曲面的电场总通量与该体积内包含的总电荷量成正比（这是高斯定律）。因此，电场的展布，或者说散度，是由电荷密度
    $\rho$ 决定的。我们之前观察到的另一个现象是，电场强度取决于与源电荷的距离，在三维空间中以 $\frac{1}{r^2}$ 的规律衰减。由于电场与电势的负梯度（即空间变化率）有关，电势本身可以通过叠加所有电荷来计算，同时根据它们的位置调整其相对贡献。距离较远的电荷对电势的贡献按
    $\frac{1}{r}$ 因子减小。


    作为一个简单的例子，想象在原点 $(x_s, y_s, z_s) = (0, 0, 0)$ 处有一个点电荷 $q$。包围原点的体积分简化为 $q$，而原点以外
    $(x, y, z)$ 点的电势由下式给出：


    $$V(x, y, z) = \frac{1}{4\pi\epsilon_0} \frac{q}{\sqrt{x^2 + y^2 + z^2}} = \frac{q}{4\pi\epsilon_0
    r}$$


    其中 $r = \sqrt{x^2 + y^2 + z^2}$。（在 $r = 0$ 的原点处，我们必须处理无限大的电荷密度，这可以用狄拉克δ函数的表述来解决。然而，我们可以回避这个讨论，只考虑电势有限的区域。）$V$
    的负梯度，即 $-\frac{dV}{dr}\hat{\mathbf{r}}$，确实等于电场 $\vec{\mathbf{E}} = \frac{q}{4\pi\epsilon_0
    r^2}\hat{\mathbf{r}}$，这与预期一致。


    如果电荷分布在空间中，我们再次依赖叠加原理，将电荷分布近似为点电荷的总和。对于每个点电荷，其电场等于其电势的负梯度。因此，$\vec{\mathbf{E}}_{\text{total}}
    = \vec{\mathbf{E}}_1 + \vec{\mathbf{E}}_2 + \cdots = -\nabla V_1 - \nabla V_2
    - \cdots = -\nabla V_{\text{total}}$，且 $V_{\text{total}} = V_1 + V_2 + \cdots$。


    当电荷沿一条直线分布时，电势可以计算为一个线积分。例如，考虑一根长度为 $L$、均匀带电 $Q$ 且沿 $x$ 轴放置的杆。其线电荷密度为 $\lambda
    = Q/L$。我们可以求出杆中心距离 $z$ 处的电势：


    $$V(x=0, y=0, z) = \frac{1}{4\pi\epsilon_0} \int_{\text{Rod}} \frac{\lambda}{r}
    dx_s = \frac{\lambda}{4\pi\epsilon_0} \int_{-L/2}^{+L/2} \frac{1}{\sqrt{z^2 +
    x_s^2}} dx_s.$$


    以下代码块使用 sympy 模块计算上述积分。


    ```

    # Code Block 8.8


    # Electric potential of a thin wire.


    Q, e, L, x, z = sym.symbols(''Q \epsilon_0 L x z'')

    charge_density = Q/L


    # Integral form of Poisson equation solution.

    d = sym.sqrt(z**2+x**2)

    V = sym.integrate(charge_density/(4*sym.pi*e*d), (x,-L/2,L/2))


    print(''Electric potential V(z) ='')

    display(V.nsimplify())

    ```


    得到的电势为：


    $$V(z) = \frac{Q \operatorname{asinh}\left(\frac{L}{2z}\right)}{2\pi L\epsilon_{0}}$$


    反双曲正弦函数，asinh()，也可以写成不同的形式：$$\operatorname{asinh}\left(\frac{L}{2z}\right) = \ln\left(\frac{L}{2z}
    + \sqrt{1 + \left(\frac{L}{2z}\right)^{2}}\right)$$


    其图像如下所示。


