    ## Hills and Valleys\n\n### 1.1 CREATING A RANGE OF VALUES WITH PYTHON\n\nMost\
    \ computational and numerical analyses of physical phenomena, including our study\
    \ of electrodynamics, require working with a large set of numbers organized in\
    \ various formats, such as tables, arrays, and vectors. In Python, we can access\
    \ many useful data structures and mathematical operations using the import command.\
    \ In the following code block, the line import numpy as np allows us to invoke\
    \ useful, pre-programmed functions like arange(). For example, x = np.arange(-5,7,2)\
    \ creates a one-dimensional array of values between -5 (inclusive) and 7 (exclusive)\
    \ in steps of 2 and stores the array in a variable named x. Then, print(x) prints\
    \ out the full array. We can address the individual elements in the array by using\
    \ an index within square brackets []. The first element of an array has an index\
    \ of 0, so x[0] returns the first element in the array, -5, and x[1] returns the\
    \ next element, -3. We can use negative integers to start indexing from the last\
    \ elements. The last element has an index of -1, so x[-1] returns 5, and x[-2]\
    \ returns 3.\n\n```\n# Code Block 1.1\n\nimport numpy as np\n\nx = np.arange(-5,7,2)\n\
    \nprint(\"Full array:\",x)\nprint(\"First element:\",x[0])\nprint(\"Second element:\"\
    ,x[1])\n```"
