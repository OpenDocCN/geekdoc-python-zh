    \ which would state that the magnetic flux $\\oiint_{\\mathrm{Area}} \\vec{\\\
    mathbf{B}} \\cdot d\\vec{\\mathbf{a}}$ through a closed surface area is proportional\
    \ to the total amount of magnetic charges enclosed within the volume bounded by\
    \ this surface. According to the divergence theorem, this surface integral can\
    \ be expressed as a volume integral of the divergence of the magnetic field:"
