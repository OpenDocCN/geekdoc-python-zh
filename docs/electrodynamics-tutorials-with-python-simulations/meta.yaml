    # ## 6.1 ELECTRIC FORCE


    Wind moves clouds and air balloons. Meteorologists use wind maps to analyze the
    weather pattern and to make a forecast. Planets, suns, and galaxies exert gravitational
    force on each other. Astronomers can analyze their interactions and predict the
    movement of astronomical objects. Likewise, electrical charges exert electric
    force on one another via electric fields, influencing the charges'' motion. More
    precisely, the electric force $\vec{F}_{\text{electric}}$ on a charge $q$ located
    at a location is proportional to the electric field $\vec{E}$ at that exact position.


    $\vec{F}_{\text{electric}} = q\vec{E}$


    This suggests that the electric field is the force on a unit charge. Consider
    an electric charge $Q$ placed at the origin that sets up an electric field in
    three dimensions:


    $\vec{E}(x, y, z) = \frac{1}{4\pi\epsilon_0} \frac{Q}{r^2} \hat{\mathbf{r}},$


    where $r^2 = x^2 + y^2 + z^2$. Another charge $q$ located at position $(x, y,
    z)$ will thus experience the electric force by $Q$''s electric field:


    $\vec{F}_{\text{electric}} = \frac{1}{4\pi\epsilon_0} \frac{qQ}{r^2} \hat{\mathbf{r}}$'
