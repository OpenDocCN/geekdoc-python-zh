  md: 'Let’s consider a small infinitesimal charge element $dq = \rho R d\phi$ at
    point $P = (R \cos \phi, R \sin \phi)$, which is at the top of the triangle in
    the figure. The angle $\angle POQ$ is denoted as $\phi$. The angle $\angle PDQ$
    is denoted as $\theta$. The distance $r$ between the point of interest at $D$
    and the charge element $dq$ is given by $r = \sqrt{(D - R \cos \phi)^2 + (R \sin
    \phi)^2} = \sqrt{(D^2 + R^2 - 2DR \cos \phi)}$.

    The electric field due to the charge element $dq$ at $P$ will point along $\overline{PD}$
    with the magnitude of $\frac{\rho R d\phi}{2\pi\epsilon_0 r}$ according to the
    two-dimensional Coulomb’s law. Because there is a matching charge element across
    $\overline{OD}$, when the electric fields due to all charge elements around the
    full circle are summed, there will be no vertical component of the electric field
    at point $D$. We used the same symmetry argument to calculate the electric field
    of an infinite line previously. The horizontal component of electric field due
    to $dq$ is then $\frac{\rho R d\phi}{2\pi\epsilon_0 r} \cos \theta$ with $\cos
    \theta = \frac{(D-R \cos \phi)}{r}$.

    The total magnitude of $\vec{\mathbf{E}}$ along the horizontal direction can thus
    be calculated by the following integral.


    $$\begin{aligned} |\mathbf{E}| &= \frac{\rho}{2\pi\epsilon_0} \int_0^{2\pi} \frac{Rd\phi}{r}
    \cos\theta \ &= \frac{\rho}{2\pi\epsilon_0} \int_0^{2\pi} \frac{D - R\cos\phi}{D^2
    + R^2 - 2DR\cos\phi} Rd\phi \ &= \frac{\rho}{2\pi\epsilon_0} \int_0^{2\pi} \frac{k
    - \cos\phi}{k^2 + 1 - 2k\cos\phi} d\phi \ &= \frac{\rho}{2\pi\epsilon_0} \frac{2\pi}{k}
    \ &= \frac{\rho 2\pi R}{2\pi\epsilon_0 D} \ &= \frac{q}{2\pi\epsilon_0 D} \end{aligned}$$


    where we have temporarily used a new dimensionless variable $k = \frac{D}{R}$.
    The complicated integral is equal to $\frac{2\pi}{k}$, as it can be shown numerically
    below. The final result shows that the electric field strength decreases as $\frac{1}{D}$,
    as if all charge elements, totaling $q$, are concentrated at the center of the
    circle, $O$.'
