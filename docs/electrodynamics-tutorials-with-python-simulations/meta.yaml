  md: 'For simplicity, we assume that the wave is propagating along the z-axis with
    a wave vector $\mathbf{k} = k\hat{\mathbf{z}}$. That means that the resulting
    electric field $\vec{\mathbf{E}}(x, y, z, t)$ can be expressed as


    $$\vec{\mathbf{E}}(x, y, z, t) = \bar{E}_x e^{i(kz - \omega t)} \hat{\mathbf{x}}
    + \bar{E}_y e^{i(kz - \omega t)} \hat{\mathbf{y}} + \bar{E}_z e^{i(kz - \omega
    t)} \hat{\mathbf{z}}.$$


    $E_x$, $E_y$, and $E_z$ are the functions of $(kz - \omega t)$, independent of
    the variables $x$ and $y$ that are transverse coordinates to the wave propagation.
    At any fixed value of $z$ at a specific time $t$, all the points lying on the
    $xy$-plane orthogonal to the $z$-axis have the same phase of the wave, as expected
    of a plane wave.


    We can similarly express the magnetic field as:


    $$\vec{\mathbf{B}}(x, y, z, t) = \bar{B}_x e^{i(kz - \omega t)} \hat{\mathbf{x}}
    + \bar{B}_y e^{i(kz - \omega t)} \hat{\mathbf{y}} + \bar{B}_z e^{i(kz - \omega
    t)} \hat{\mathbf{z}}.$$


    Maxwell''s equations further constrain $\bar{E}$''s and $\bar{B}$''s. In particular,
    because $\nabla \cdot \vec{\mathbf{E}} = \frac{\partial}{\partial x}E_x + \frac{\partial}{\partial
    y}E_y + \frac{\partial}{\partial z}E_z = 0$ in free space,


    $$\frac{\partial}{\partial x}\left(\bar{E}_x e^{i(kz - \omega t)}\right) + \frac{\partial}{\partial
    y}\left(\bar{E}_y e^{i(kz - \omega t)}\right) + \frac{\partial}{\partial z}\left(\bar{E}_z
    e^{i(kz - \omega t)}\right)$$

    $$= 0 + 0 + \frac{\partial}{\partial z}\left(\bar{E}_z e^{i(kz - \omega t)}\right)$$

    $$= 0,$$


    where the first two terms with partial derivatives with respect to $x$ and $y$
    are trivially equal to zero because there is no dependence on $x$ or $y$. For
    the above equation to hold true, the third term must be equal to zero, leading
    to the conclusion: $\bar{E}_z = 0$. Similarly, because $\nabla \cdot \vec{\mathbf{B}}
    = 0$, we also conclude that $\bar{B}_z = 0$. In other words, there is no $z$-component
    in the electromagnetic plane wave that propagates in the $z$ direction. Hence,
    it is a purely transverse wave without any longitudinal component.


    Now, let''s apply Faraday''s law, $\nabla \times \vec{\mathbf{E}} = -\frac{\partial
    \vec{\mathbf{B}}}{\partial t}$, and collect $x$ and $y$ components separately.
    A lot of terms such as $\frac{\partial}{\partial y}E_z$ or $\frac{\partial}{\partial
    x}E_z$ will disappear trivially, because $\bar{E}_z = \bar{B}_z = 0$.


    The $x$ components of the left and right sides of Faraday''s law should be equal,
    or


    $$-\frac{\partial}{\partial z}\left(\bar{E}_y e^{i(kz - \omega t)}\right) = -\frac{\partial}{\partial
    t}\left(\bar{B}_x e^{i(kz - \omega t)}\right)$$

    $$-(ik)\bar{E}_y = (i\omega)\bar{B}_x.$$'
