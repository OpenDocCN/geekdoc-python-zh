    $$\mathcal{E} = -N \frac{d\Phi_B}{dt} = -\frac{\mu_0 N^2 \pi R^2}{h} \frac{dI}{dt}$$


    where $\Phi_B$ is the magnetic flux through each coil.


    Lumping the product of constants as $L$, we can rewrite the above expression as:


    $$\mathcal{E} = -L \frac{dI}{dt}$$


    where $L$ is called the inductance and has a unit of henry ($H$). The inductance
    describes the inductor’s ability to produce an emf in response to an instantaneous
    change in electric current, and it depends mainly on its geometrical factors,
    such as $N$, $R$, and $h$.


    As we did for an $RC$ circuit, let us examine an $LC$ circuit by connecting an
    inductor with inductance $L$ and a capacitor with capacitance $C$ in series. According
    to Kirchhoff’s rule, the sum of potential changes around a closed circuit equals
    zero, so the following equation describes an $LC$ circuit:


    $$L \frac{dI}{dt} + \frac{q}{C} = 0$$


    Using $I = \frac{dq}{dt}$,


    $$L \frac{d^2 q}{dt^2} + \frac{q}{C} = 0$$


    This second-order differential equation has a solution represented by a linear
