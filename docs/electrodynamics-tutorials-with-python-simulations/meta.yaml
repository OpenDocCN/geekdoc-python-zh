    The above expression is called the Coulomb’s law of electric force. Note that
    this is symmetric for q and Q, and it can be thought of as the electric force
    exerted on Q by the electric field of q. The line of reasoning that involves an
    electric field addresses the question of action at a distance. How do two electrical
    charges separated by a distance exert force on each other? The answer is that
    they interact through their electric fields. This single formulation captures
    different sign combinations of electric charges and the direction of the force.
    If q and Q are both positive, the resulting force has a positive sign, and q will
    be pushed away from Q. If q and Q are both negative, the resulting force again
    takes on a positive sign, indicating that the force is again repulsive. If Q and
    q have the opposite signs, the force is then attractive. The respective forces
    on q and Q are equal in magnitude and opposite in direction.


    # 6.2 MAGNETIC FORCE


    A charge q moving with velocity v experiences the magnetic force due to magnetic
    field B at that position.


    ```

    $\vec{F}_{\text{magnetic}} = q \vec{v} \times \vec{B}$

    ```


    Unlike the electric force, which lines up with the direction of the electric field,
    the magnetic force is orthogonal to both v and B. The sign of q influences the
    direction of the force. The magnitude of the force depends on the amount of charge,
    the magnitude of the velocity, the strength of the magnetic field, and the angle
    between v and B.


    Why is the magnetic force so much more complicated and “unintuitive” than electric?
    We will have to accept it as it is, since it is verified and confirmed by numerous
    rigorous experiments. We will also learn in the later chapters (on Faraday’s law
    and Einstein’s special theory of relativity) that this form of magnetic force
    makes electromagnetism wondrously unified and consistent.


