  mdcn: '我们已经讨论过，静电场总可以表示为一个无旋场，即用一个标量函数的梯度来表示；而静磁场总可以表示为一个无散场，即用一个矢量函数的旋度来表示。这些表示并不唯一，但这种非唯一性意味着我们可以调整这些函数，并选择最便于处理当前问题的表示方式。这种灵活性使我们能够简化电磁场的数学表达式，并利用特定问题的对称性，而不会改变其底层的物理规律。


    ## 8.7 泊松方程


    至此，我们主要处理的是标量和矢量函数的一阶导数，并看到了几个二阶导数的例子，其中算符 $\nabla$ 被应用了两次。其中特别重要的是一个标量函数梯度的散度：$\nabla
    \cdot \nabla V = \frac{\partial^2 V}{\partial x^2} + \frac{\partial^2 V}{\partial
    y^2} + \frac{\partial^2 V}{\partial z^2}$，它也常写作 $\nabla^2 V$。这个二阶导数算符 $\nabla^2$
    被称为**拉普拉斯算符**。


    让我们考虑一类包含拉普拉斯算符的微分方程：


    $\nabla^2 V(x, y, z) = f(x, y, z)$


    这被称为**泊松方程**。泊松方程的一个特殊形式，即当 $f(x, y, z) = 0$ 时，被称为**拉普拉斯方程**。


    如果标量函数 $V$ 在无穷远处趋于零，即 $V(\infty) \to 0$，那么泊松方程的一个解可以表示为：


    $V(x, y, z) = -\frac{1}{4\pi} \iiint \frac{f(x'', y'', z'')}{\sqrt{(x-x'')^2 +
    (y-y'')^2 + (z-z'')^2}}dx''dy''dz''$


    这个结果的证明超出了本书的范围，因为它涉及其他高等数学主题，如狄拉克δ函数。在本章的剩余部分，我们将利用这个结果来探讨电磁势的一些例子。


    ## 8.8 示例：连续电荷分布的电势


    这个二阶微分方程在静电学（以及物理学的其他分支，如热力学）中非常重要，因为 $\nabla V = -\vec{E}$ 且 $\nabla \cdot \vec{E}
    = \frac{\rho}{\epsilon_0}$，因此 $\nabla \cdot \nabla V = \nabla^2 V = -\frac{\rho}{\epsilon_0}$。换句话说，泊松方程的解就是给定电荷分布
    $\rho$ 的电势。在没有电荷的自由空间中（$\rho = 0$），我们有 $\nabla^2 V(x, y, z) = 0$。


    对于电荷密度 $\rho$，相应的电势 $V$ 可以表示为：


    $$V(x, y, z) = \frac{1}{4\pi\epsilon_0} \iiint \frac{\rho}{r} dx_s dy_s dz_s$$


    其中 $r = \sqrt{(x - x_s)^2 + (y - y_s)^2 + (z - z_s)^2}$ 是观察点 $(x, y, z)$ 与电荷密度源点
    $(x_s, y_s, z_s)$ 之间的距离。该积分需在电荷密度不为零的整个体积上进行。


    我们可以这样直观地理解这个解。在前面的章节中，我们已经确定，通过一个封闭曲面的电场总通量与该曲面所包围体积内的总电荷量成正比（即高斯定律）。因此，电场的展布，或者说散度，是由电荷密度
    $\rho$ 决定的。我们之前观察到的另一个现象是，电场强度随与源电荷的距离增加而衰减，在三维空间中按 $\frac{1}{r^2}$ 规律变化。由于电场与电势的负梯度（即空间变化率）有关，因此电势本身可以通过叠加所有电荷的贡献来计算，并根据它们的位置调整其相对贡献。距离观察点较远的电荷，其对电势的贡献按
    $\frac{1}{r}$ 因子减小。


    作为一个简单的例子，考虑位于原点 $(x_s, y_s, z_s) = (0, 0, 0)$ 的一个点电荷 $q$。此时，包围原点的体积分简化为 $q$，而原点以外
    $(x, y, z)$ 点的电势由下式给出：


    $$V(x, y, z) = \frac{1}{4\pi\epsilon_0} \frac{q}{\sqrt{x^2 + y^2 + z^2}} = \frac{q}{4\pi\epsilon_0
    r}$$


    其中 $r = \sqrt{x^2 + y^2 + z^2}$。（在 $r = 0$ 的原点处，我们必须处理无限大的电荷密度，这可以用狄拉克δ函数的表述来解决。不过，我们可以暂且回避这个讨论，只考虑电势有限的区域。）$V$
    的负梯度，即 $-\frac{dV}{dr}\hat{\mathbf{r}}$，确实等于电场 $\vec{\mathbf{E}} = \frac{q}{4\pi\epsilon_0
    r^2}\hat{\mathbf{r}}$，这与预期一致。


    如果电荷分布在空间中，我们再次依赖叠加原理，将电荷分布视为无数个点电荷的总和。对于每个点电荷，其电场等于其电势的负梯度。因此，$\vec{\mathbf{E}}_{\text{total}}
    = \vec{\mathbf{E}}_1 + \vec{\mathbf{E}}_2 + \cdots = -\nabla V_1 - \nabla V_2
    - \cdots = -\nabla V_{\text{total}}$，且 $V_{\text{total}} = V_1 + V_2 + \cdots$。


    当电荷沿一条直线分布时，电势可以计算为一个线积分。例如，考虑一根长度为 $L$、均匀带电 $Q$ 且沿 $x$ 轴放置的杆。其线电荷密度为 $\lambda
    = Q/L$。我们可以求出杆中心距离 $z$ 处的电势：


    $$V(x=0, y=0, z) = \frac{1}{4\pi\epsilon_0} \int_{\text{Rod}} \frac{\lambda}{r}
    dx_s = \frac{\lambda}{4\pi\epsilon_0} \int_{-L/2}^{+L/2} \frac{1}{\sqrt{z^2 +
    x_s^2}} dx_s.$$


    以下代码块使用 `sympy` 模块计算上述积分。


    ```

    # Code Block 8.8


    # Electric potential of a thin wire.


    Q, e, L, x, z = sym.symbols(''Q \epsilon_0 L x z'')

    charge_density = Q/L


    # Integral form of Poisson equation solution.

    d = sym.sqrt(z**2+x**2)

    V = sym.integrate(charge_density/(4*sym.pi*e*d), (x,-L/2,L/2))


    print(''Electric potential V(z) ='')

    display(V.nsimplify())

    ```


    得到的电势为：


    $$V(z) = \frac{Q \operatorname{asinh}\left(\frac{L}{2z}\right)}{2\pi L\epsilon_{0}}$$


    反双曲正弦函数，`asinh()`，也可以写成不同的形式：$$\operatorname{asinh}\left(\frac{L}{2z}\right) =
    \ln\left(\frac{L}{2z} + \sqrt{1 + \left(\frac{L}{2z}\right)^{2}}\right)$$


    其图像如下所示。


    ```

    python

    # Code Block 8.9


    # inverse hyperbolic sine function in a logarithmic form


    x = np.arange(0,5,0.1)

    y1 = np.arcsinh(x)

    y2 = np.log(x + np.sqrt(1+x**2))


    fig = plt.figure(figsize=(3,3))

    plt.plot(x,y1,linewidth=5,color=''#CCCCCC'')

    plt.plot(x,y2,linewidth=1,color=''#000000'')

    plt.xticks((0,1,2,3,4,5))

    plt.yticks((0,1,2))

    plt.legend((''arcsinh(x)'',r''$\ln(x + \sqrt{1+x^2})$''))

    plt.axis(''equal'')

    plt.tight_layout()

    plt.savefig(''fig_ch8_asinh.pdf'')

    plt.show()

    ```


