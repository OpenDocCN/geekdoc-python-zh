    \nabla \cdot \vec{K} = \nabla \cdot (\nabla \times \vec{A}) = \left( \frac{\partial^2
    A_z}{\partial x \partial y} - \frac{\partial^2 A_y}{\partial x \partial z} \right)
    + \left( \frac{\partial^2 A_x}{\partial y \partial z} - \frac{\partial^2 A_z}{\partial
    y \partial x} \right) + \left( \frac{\partial^2 A_y}{\partial z \partial x} -
    \frac{\partial^2 A_x}{\partial z \partial y} \right)

