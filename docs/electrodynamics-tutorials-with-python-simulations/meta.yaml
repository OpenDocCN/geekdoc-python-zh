    We can denote the relative angle between the perpendicular and slanted boundaries
    as $\theta$, as shown in the following figure. Then, the relative angle between
    their respective normal vectors is also $\theta$. In the case of a perpendicular
    boundary, the dot product between the vector field $\vec{v}$ and the normal vector
    $\hat{\mathbf{n}}_{\perp}$ of the perpendicular boundary is $\vec{v} \cdot \hat{\mathbf{n}}_{\perp}
    = |\vec{v}|$. In the case of a slanted boundary, the dot product between $\vec{v}$
    and the normal vector of the slanted boundary is $\vec{v} \cdot \hat{\mathbf{n}}_{s}
    = |\vec{v}| \cos \theta$. At the same time, the length of the slanted boundary
    is bigger by a factor of $\frac{1}{\cos \theta}$. In other words, $dl_{s} = \frac{dl_{\perp}}{\cos
    \theta}$.


    Therefore, the amount of flux through a differential extent $dl_{\perp}$ of a
    perpendicular boundary is $d\Phi_{\perp} = |\vec{v}|dl_{\perp}$, and the flux
    through the slanted boundary is $d\Phi_{s} = |\vec{v}| \cos \theta dl_{s} = |\vec{v}|
    \cos \theta \frac{dl_{\perp}}{\cos \theta}$, which shows that $d\Phi_{\perp} =
    d\Phi_{s}$. Hence, the orientation of the boundary does not change the flux. Note
    we were considering an infinitesimal segment of a boundary, such that the two
    rays from the source charge $d\phi$ apart are considered parallel in the limit
    as $d\phi$ goes to zero.


