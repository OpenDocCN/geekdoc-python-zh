    We can easily calculate the flux through the square’s four sides and add them.
    This is the left-hand side of Gauss’s law. The flux is zero for the top and bottom
    sides because the electric field and the normal vectors are perpendicular to each
    other, making their dot products equal to zero.


    For the boundary on the left at $x = -D$, $\vec{E}(x = -D, y) \cdot \hat{n} =
    (-|\vec{E}(x = -D)|\hat{x}) \cdot (-\hat{x}) = |\vec{E}(x = -D)|$. Likewise at
    the boundary on the right at $x = +D$, $\vec{E}(x = +D, y) \cdot \hat{n} = (+|\vec{E}(x
    = +D)|\hat{x}) \cdot (+\hat{x}) = |\vec{E}(x = +D)|$. The total flux, as we go
    around the square in a counterclockwise direction,'
