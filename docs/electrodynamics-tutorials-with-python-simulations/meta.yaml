    vector field flows in from the left side and flows out to the right side along
    the x-axis. There is no source of the flow within the region, and the total flux
    equals zero.


    Now consider a different vector field, $\vec{K} = x\hat{x}$, whose divergence
    is +1. In this case, there is more flux leaving the confined region than entering.
    In other words, there is a source of the vector field inside the region. With
    a vector field $\vec{K} = -x\hat{x}$, the divergence is -1, indicating that there
    is more flux entering than leaving. In other words, there is a sink of the vector
    field.


    It is also instructive to consider a vector field of the form, $\vec{K} = f(y,z)\hat{x}$,
    where the function $f(y,z)$ does not depend on x. No matter how complex this function
    is, $\frac{\partial f(y,z)}{\partial x} = 0$, so the divergence of $\vec{K}$ is
    zero. The amount of flux entering and leaving through a surface perpendicular
    to the x-axis will always be equal to each other. In other words, there is no
    source or sink for this vector field inside any confined region of space.


    The divergence theorem captures this idea:


    $$ \iiint_{\text{Volume}} (\nabla \cdot \vec{K}) dV = \iint_{\text{Area}} \vec{K}
    \cdot d\vec{a}, $$


    where the volume for the triple integral on the left-hand side is defined by the
    enclosing surface for the double integral on the right-hand side.


    # 4.10 GAUSS''S LAW, AGAIN


    Using the divergence theorem, let us examine Gauss''s law again. We can replace
    $\vec{K}$ with $\vec{E}$, so that


    $$ \iint_{\text{Area}} \vec{E} \cdot d\vec{a} = \iiint_{\text{Volume}} (\nabla
    \cdot \vec{E}) dV. $$


    According to Gauss''s law, for a given charge density $\rho$


    $$ \iint_{\text{Area}} \vec{E} \cdot d\vec{a} = \frac{q_{\text{enc}}}{\epsilon_0}
    = \frac{1}{\epsilon_0} \iiint_{\text{Volume}} \rho dV. $$'
