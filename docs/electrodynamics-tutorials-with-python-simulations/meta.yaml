    ybox = np.array([0,q_enc/D_range[0],q_enc/D_range[0],0])\nplt.fill(xbox,ybox,color='#CCCCCC',zorder=1)\n\
    \nplt.xlabel('D')\nplt.ylabel('|E|')\nplt.xticks(np.arange(-16,18,8))\nplt.title('E\
