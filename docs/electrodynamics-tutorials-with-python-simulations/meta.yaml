    A rotational vector field \( \vec{K} \) with a zero divergence can always be expressed
    as a curl of some vector function \( \vec{A} \), where \( \vec{K} = \nabla \times
    \vec{A} \). With \( \vec{A} = A_x \hat{\imath} + A_y \hat{\jmath} + A_z \hat{k}
