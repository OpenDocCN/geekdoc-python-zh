  md: "Because the two arrays, p and p_curr, specify two different sets of positions,\
    \ we cannot calculate displacement vectors by simply subtracting them, as p -\
    \ p_curr will yield an error. Hence, we create a size-matched temporary array\
    \ p_tmp to find the difference between (x,y,z) and (x_s, y_s, z_s), and this displacement\
    \ vector is assigned to an array r.\n\nThe cross product between the displacement\
    \ and the current vectors can be calculated with a built-in NumPy np.cross() function,\
    \ or we can create our own version of cross_product(). The array dB stores the\
    \ magnetic fields due to individual current elements. Hence, by taking the sum\
    \ of dB along an appropriate axis, we can calculate the total magnetic field at\
    \ each observation location specified in p.\n\nWhat happens if some of the source\
    \ and observation points coincide? We would encounter an error since the denominator\
    \ dist3 would be zero. Thus, we will try to avoid such an error, by carefully\
    \ choosing the locations of the source and observation points and ensuring that\
    \ they do not overlap. Although not implemented here, there could be a screening\
    \ to find and disregard points for which dist3 is zero (or very small).\n\n```\n\
    # Code Block 5.5\n\ndef cross_product (A, B):\n    # A and B: 3 by N arrays\n\
    \    # This function is the same as np.cross(A.T,B.T).T\n    V = np.zeros(A.shape)\n\
    \    V[0] = A[1]*B[2] - A[2]*B[1]\n    V[1] = A[2]*B[0] - A[0]*B[2]\n    V[2]\
    \ = A[0]*B[1] - A[1]*B[0]\n    return V\n\ndef get_magnetic_field (p,p_curr,curr):\n\
    \n    # p: observation points\n    # p_curr: position coordinate of current\n\
    \    # curr: vector of current (times dl)\n\n    assert p_curr.shape[1]==curr.shape[1]\n\
    \n    mu0 = 4*np.pi*(10**-7)\n    M = p.shape[1]\n    N = p_curr.shape[1]\n\n\
    \    B = np.zeros(p.shape)\n\n    for i in range(M):\n```"
