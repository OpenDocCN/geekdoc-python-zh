    \ magnitude of currents but in opposite directions, $\\sum I$ will be zero, not\
    \ twice the current each wire carries, as illustrated by the path $C_5$.\n\n#\
    \ 5.3 CAUTIONARY EXAMPLE\n\nLet us discuss a short cautionary example illustrating\
    \ how numerical imprecision may creep into our calculations. In the following\
    \ code block, we prepare three cases where multiple currents flow in parallel.\
    \ Currents are spaced $dx$ apart and arranged symmetrically along the $x$-axis.\
    \ Because of the symmetry, the magnetic field at the origin is expected to be\
