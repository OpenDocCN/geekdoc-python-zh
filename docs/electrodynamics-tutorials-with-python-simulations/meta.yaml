    \ $q$ in $S'$ is:\n\n$$F'_E = \\frac{q|\\lambda_T|}{2\\pi\\epsilon_0 d} = \\frac{q\\\
    lambda_0|\\gamma_+ - \\gamma_-|}{2\\pi\\epsilon_0 d} = \\frac{q\\lambda_0|\\gamma_+\
    \ - \\gamma_-|}{\\gamma_0 2\\pi\\epsilon_0 d}.$$\n\nThe expression $|\\gamma_+\
