- md: "As seen from the series of temporal snapshots of the electric and magnetic\
    \ fields, the phase difference in the complex amplitude produces a rotation of\
    \ the electromagnetic fields, which is called circular polarization. If the phase\
    \ difference is $-\\frac{\\pi}{2}$ (with **example=4** in the code block), the\
    \ field rotates in the opposite direction, as shown below. If the magnitudes of\
    \ the two components are different, in addition to having a relative phase difference,\
    \ the electromagnetic wave will exhibit elliptical polarization.\n\n![](img/c63d379c3ef3c512c4d31fbfe30defd9_273_0.png)\n\
    \nThe propagation of the electromagnetic wave involves the flow or transmission\
    \ of electromagnetic energy, which is quantified by a Poynting vector:\n\n$$\\\
    vec{S} = \\frac{1}{\\mu_0} \\vec{E} \\times \\vec{B}.$$\n\nThe Poynting vector\
    \ points in the same direction as the wave vector, and its magnitude is the amount\
    \ of energy transported across a unit area per unit of time. For mechanical waves\
    \ like sound, water, or seismic waves, the energy of a wave can be intuitively\
    \ imagined as being transmitted and exchanged through the motion and elasticity\
    \ of the media. On the other hand, electromagnetic waves can travel through a\
    \ vacuum, so their energy transmission does not require a medium, which is itself\
    \ a rather remarkable fact. Thermal radiation is an instance of this phenomenon.\n\
    \nThe theory of electromagnetism also suggests that electromagnetic wave carries\
    \ momentum, which is another extraordinary fact. In classical mechanics, momentum\
    \ was defined as a product of mass and velocity, or $\\vec{p} = m\\vec{v}$, so\
    \ how could the massless electromagnetic wave carry momentum? According to Einstein's\
    \ theory of special relativity, we have the following invariant relationship $E^2\
    \ - |\\vec{p}|^2c^2 = (mc^2)^2$ between momentum $\\vec{p}$ and energy $E$, so\
    \ for $m = 0$, $|\\vec{p}| = \\frac{E}{c}$. The momentum flux, the momentum of\
    \ the electromagnetic wave per unit area and time, is given by $\\vec{g} = \\\
    frac{\\vec{S}}{c}$. Hence, the propulsion of a spaceship driven by momentum from\
    \ the wind of light is not just a whimsical imagination.\n\nStarting in the early\
    \ 1900s, quantum mechanics has produced another intriguing, yet theoretically\
    \ and experimentally well-verified, idea of wave-particle duality. According to\
    \ this idea, light, as well as other fundamental particles, must be considered\
    \ as having both wave-like and particle-like properties. We will have to save\
    \ this discussion and other interesting aspects of the electromagnetic wave for\
    \ another book.\n\n## Appendix\n\n### APPENDIX A: GETTING STARTED WITH PYTHON\n\
