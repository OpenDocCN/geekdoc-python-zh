    # which is +y-direction in our example.

    B_ampere[1][r_axis<=R] = mu0*alpha*(r[0][r_axis<=R]**3)/4

    B_ampere[1][r_axis>=R] = mu0*I/(2*np.pi*r[0][r_axis>=R])


