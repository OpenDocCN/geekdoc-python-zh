    \n## 8.3 RC 电路\n\n让我们考虑一个简单的电路，其中电阻$R$和电容$C$串联连接到电动势为$\\mathcal{E}$的电池上。在上一节中，我们讨论了每个元件的单独作用，这里我们使用两个守恒定律来分析电路的行为：电荷守恒和能量守恒，这在电路的背景下也被称为基尔霍夫第一和第二定律。第一定律指出，流入电路中任何一点的电流总是等于流出该点的电流。即使该点包含多个分支，这仍然成立。换句话说，电荷不会在电路内凭空产生或消失，即电荷是守恒的。第二定律指出，电路中任何回路内的电势变化之和总是为零。换句话说，当一个电荷流经电路并返回其起点时，其电势能的净变化为零。这意味着，当电荷在回路中行进时，任何电势能的增加都会被损失所抵消，这是由于电荷所做的功或向电路不同部分贡献的能量所致。能量不会在电路中凭空产生或消失，即能量是守恒的。\n\
    \n在$RC$电路的背景下，第一定律意味着在任何时刻，移动到或离开电容器极板的电荷数量等于流过电阻的电荷数量，因此我们可以使用相同的符号$q$来指代$R$和$C$处的电荷。第二定律意味着电池的$\\\
    mathcal{E}$等于$R$和$C$上的电势降之和。电池所做的功被分割为克服电阻移动电荷所做的功和为电容器充电所做的功。$\\mathcal{E} =\
    \ IR + \\frac{q}{C} = R\\frac{dq}{dt} + \\frac{q}{C}$，其中$I = \\frac{dq}{dt}$。这个关于时间的微分方程有一个解：$q(t)\
    \ = C\\mathcal{E}(1 - e^{-t/RC})$，它显示了具有特征时间常数$RC$的电容器的充电行为。$q(t)$的时间导数为$\\frac{dq}{dt}\
