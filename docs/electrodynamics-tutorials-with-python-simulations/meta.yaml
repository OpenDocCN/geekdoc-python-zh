    # APPENDIX D: FIELD LINES


    Throughout this book, we visualized a vector field with a convention of drawing
    arrows at numerous sample points in the space. We extensively used the `quiver()`
    function to set each arrow''s direction and length. Another visualization is to
    draw field lines, which are continuous contours whose tangent lines point in the
    direction of the vector field, and the density of the lines indicates the field
    strength. As an example, the electric field lines of an electric dipole, two equal
    and opposite charges with a small separation, are drawn below with the `streamplot()`
    function. The electric field lines start from the positive charge and end at the
    negative charge. The field lines are more densely packed where the fields are
    stronger. You may modify the `charges` variable in the code and visualize the
    field lines of different point charge distributions.


    ```

