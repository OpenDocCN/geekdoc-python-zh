  md: 'Two vectors can be added by summing up their components along each dimension,
    and the result will also be a vector.


    $\vec{A} + \vec{B} = (a_x + b_x)\hat{x} + (a_y + b_y)\hat{y} + (a_z + b_z)\hat{z}$.


    Subtraction is the addition of an inverse, or component-wise subtractions.


    $\vec{A} - \vec{B} = \vec{A} + (-\vec{B}) = (a_x - b_x)\hat{x} + (a_y - b_y)\hat{y}
    + (a_z - b_z)\hat{z}$.


    # ## 2.1 DRAWING A VECTOR WITH PYTHON


    The plt.quiver() function allows us to draw an arrow as a representation of a
    vector. The first two input arguments to this function designate the position
    of the tail of a vector, and the next two input arguments are the corresponding
    vector components in the $x$ and $y$ directions. As illustrated in the following
    code block, the command plt.quiver(0,0,A[0],A[1]) draws a vector whose tail is
    located at the origin and whose components are given by A[0] and A[1]. In this
    example, $\vec{A} = 1\hat{x} + 2\hat{y}$.


    ```

    python

    # Code Block 2.1


    import numpy as np

    import matplotlib.pyplot as plt


    # Let us draw a vector with the quiver() function.

    # Note: the extra arguments (angles, scale, ...)

    # ensures that the arrow lengths are properly scaled.

    A = np.array([1,2])

    plt.quiver(0,0,A[0],A[1],angles=''xy'',scale_units=''xy'',scale=1)

    plt.text(A[0]+0.1,A[1]+0.1,r"$\vec{A}$")


    B = np.array([1,-2])

    plt.quiver(0,0,B[0],B[1],angles=''xy'',scale_units=''xy'',scale=1)

    plt.text(B[0]+0.1,B[1]+0.1,r"$\vec{B}$")


    C = np.array([-2,-1])

    plt.quiver(0,0,C[0],C[1],angles=''xy'',scale_units=''xy'',scale=1)

    plt.text(C[0]+0.1,C[1]-0.5,r"$\vec{C}$")


    plt.grid()

    plt.axis(''square'')

    plt.xlabel(''x'')


    ```'
