    本书中的所有源代码都可在配套的 GitHub 仓库中找到，地址是 https://github.com/davecom/ComputerScienceFromScratch。代码是针对
    Python 3.12 和 3.13 版本创建和测试的。由于使用了 Python 3.12 的一些与类型提示相关的特性，部分代码无法在更早版本的 Python
    上运行（但在可预见的未来，可能适用于任何新版本的 Python）。但是，如果你移除类型提示，绝大多数代码可以在 Python 3.10 及更高版本上运行。


    我在整个源代码中使用了 Python 类型提示（或“类型注解”），因为我相信它们通过告诉你函数的参数和返回类型，而无需你仔细研究代码或注释，从而提高了可读性。如果你不喜欢它们，可以忽略它们；它们不会改变代码的任何工作方式。我尽量不过度使用类型提示，因为有些人觉得它们太冗长了。例如，我很少在函数体内使用它们，但我在每个函数签名中都使用它们。我在本书写作时，使用当时的
    Pyright 最新版本对所有源代码进行了类型检查。


    本书中的几个项目使用了外部库。你应该在为本书源代码创建的虚拟环境或你的系统 Python 解释器中安装 Pygame、NumPy 和 Pillow。对于大多数读者来说，安装它们应该就像运行
    `pip install pygame, numpy, pillow` 一样简单。本书的源代码仓库中包含了一个 pip 可以使用的 `requirements.txt`
    文件。


