- img_proc: true
  md: 'Most VMs, like the CHIP-8, also have registers, but those registers don’t always
    map directly to physical hardware registers on the microprocessor. As such, they’re
    not necessarily any faster than RAM. That may seem odd, but the registers provide
    a substrate that the instructions can operate on. There’s also nothing stopping
    a particular implementation of the VM from mapping the virtual registers to real
    hardware registers for a performance gain—as long as the number of virtual registers
    doesn’t exceed the number of physical registers.


    > NOTE: In the following discussion, the same names are used to refer to the CHIP-8
    registers as will be used in the Python code for the implementation.


    The CHIP-8 VM has 16 general-purpose 8-bit registers, referred to as v[0] through
    v[15]. They can be used for any kind of data, and all the main arithmetic and
    logic instructions operate on these registers. Of these general-purpose registers,
    v[15] (or v[0xf] in hexadecimal) is special in that it’s used for holding a flag.
    The index register, i, is for manipulations across multiple memory locations at
    once and for indicating where data that needs to be drawn to the screen exists
    in memory. The program counter, pc, is a special register that keeps track of
    the memory address of the next instruction to be executed.


    The vs, i, and pc constitute the main registers, but they’re backed up by a couple
    pseudo-registers for timing. These two bytes, delay_timer and sound_timer, are
    used for implementing a pause in the game or indicating how long the sound of
    a beep should be played. There are specialized instructions for modifying these
    timers. All the registers are listed in Table 5-1. The registers were originally
    described in the RCA COSMAC VIP CDP18S711 Instruction Manual.⁴


    # Table 5-1: CHIP-8 Registers and Pseudo-Registers


    | Register | Name | Description |

    |---|---|---|

    | v[0] to v[14] | General-purpose registers | Each can hold any kind of 8-bit
    data. |

    | v[15] | Flag register | Stores a flag (1 or 0) after certain operations, like
    a carry flag after addition. |

    | pc | Program counter | Keeps track of the 16-bit address in memory of the current
    instruction being executed. |

    | i | Memory index register | Stores a 16-bit address used for completing instructions
    that span multiple contiguous places in memory. |

    | delay_timer | Delay timer | Stores an 8-bit value that’s decremented 60 times
    per second until it reaches 0. |

    | sound_timer | Sound timer | Stores an 8-bit value that’s decremented 60 times
    per second until it reaches 0; while it’s above 0, a beep is played by the computer
    speaker. |'
