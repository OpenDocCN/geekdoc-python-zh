    \ as a powerful version of a switch statement from other languages. It executes\
    \ the code section (or case) that matches the value in the variable being matched.\
    \ In our program, the cases correspond to the possible values of instruction.\n\
    \n> ### TYPE HINTS\n\nYou probably noticed my use of type hints on some of the\
    \ local variables. I'll do that in this book where I think it adds clarity, but\
    \ I won't be religious about it. For example, I think clarifying that cells is\
    \ a list[int] makes sense because some people may not remember the list initialization\
    \ syntax I used. But it's obvious that instruction is going to be a str based\
    \ on the context, so I didn't provide a type hint for it. The other thing type\
    \ hints allow me to do is run a static type checker to aid in verifying the correctness\
    \ of all the code in the book. I always find that helpful.\n\nA quick note on\
    \ the type hint syntax file_name: str | Path used in the signature of __init__():\
    \ the syntax means that the supplied argument is expected to be of either the\
    \ str type or the Path type. Both types are acceptable. Our ArgumentParser provides\
    \ filepaths as strings, while our unit tests will supply them as Path objects.\
    \ The open() function that uses the path in __init__() can accept either.\n\n\
    Missing from Table 1-1 are two helper functions: find_bracket_match() and clamp0_255_wraparound().\
    \ First, let's look at find_bracket_match(), which helps jump from one if statement-like\
    \ bracket command to its partner. This function is implemented as a method on\
    \ the Brainfuck class since it needs to access self.source_code:\n\n```python\n\
    # Find the location of the corresponding bracket to the one at *start*.\n# If\
    \ *forward* is true go to the right looking for a matching \"]\".\n# Otherwise\
    \ do the reverse.\ndef find_bracket_match(self, start: int, forward: bool) ->\
    \ int:\n    in_between_brackets = 0\n    direction = 1 if forward else -1\n  \
    \  location = start + direction\n    start_bracket = \"[\" if forward else \"\
    ]\"\n    end_bracket = \"]\" if forward else \"[\"\n    while 0 <= location <\
    \ len(self.source_code):\n        if self.source_code[location] == end_bracket:\n\
    \            if in_between_brackets == 0:\n                return location\n \
    \           in_between_brackets -= 1\n        elif self.source_code[location]\
    \ == start_bracket:\n            in_between_brackets += 1\n        location +=\
    \ direction\n    # Didn't find a match\n    print(f\"Error: could not find match\
    \ for {start_bracket} at {start}.\")\n    return start\n```\n\nTo find a matching\
    \ bracket, we perform a linear search through the Brainfuck source code, looking\
    \ at each subsequent character one at a time. We search to the right if forward\
    \ is True or to the left if forward is False. The direction variable becomes a\
    \ proxy for forward, either incrementing or decrementing location to go to the\
    \ right or to the left ❶.\n\nThe confounding factor when searching for a matching\
    \ bracket is the *in-between brackets*, sets of brackets that occur between the\
    \ starting bracket and the bracket we want. For example, say we're searching for\
    \ the matching bracket of the first bracket in this Brainfuck snippet (I've labeled\
    \ the characters with indices for clarity):\n\n```\n[++[--]<<]\n0123456789\n```\n\
    \nThe match for the opening bracket at index 0 is the closing bracket at index\
    \ 9. If we naively accept the first closing bracket we find, however, our search\
    \ will conclude that the match for index 0 is the closing bracket at index 6.\
    \ In fact, that closing bracket matches the opening bracket at index 3.\n\nThe\
    \ solution is simply to count the in-between brackets. Every time we encounter\
    \ the start of an in-between pair of brackets, we increment the in_between_brackets\
    \ counter ❸. Every time we encounter the end of an in-between pair of brackets,\
    \ we decrement in_between_brackets, unless in_between_brackets is 0, meaning there\
    \ are no more in-between brackets and the destination bracket has been found ❷.\n\
    \n> ### A BRACKET-FINDING ALTERNATIVE\n\nAnother way to solve the in-between brackets\
    \ problem is to use a stack. Every time a start bracket is encountered, its location\
    \ is pushed to the stack. Every time an end bracket is encountered, the stack\
    \ is popped. The two bracket locations that result (the locations of the encountered\
    \ end bracket and the popped start bracket) are a pair.\n\n*(continued)*"
  mdcn: "我们将在第2章重新讨论独立的词法分析器、语法分析器和运行时的概念，届时我们将为一种稍复杂的语言NanoBASIC构建一个解释器。观察在Brainfuck解释器中融合在一起的各个部分如何在NanoBASIC解释器中被拆分开来，将具有启发意义。\n\
    \nBrainfuck解释器不仅易于编写，而且非常紧凑。受另一种名为FALSE的深奥语言启发，穆勒设计Brainfuck的目标是创建一种极简语言，他无疑做到了这一点。他最初为这种仅包含八条命令的语言编写的解释器只有240字节。更令人印象深刻的是，有一个用x86汇编语言编写的Brainfuck解释器，只有69字节。⁵我们不会达到69字节，但我们的Python\
    \ Brainfuck解释器的核心将只有25行代码和几个辅助函数。而这25行代码将能够运行任何Brainfuck程序，因此也能运行任何计算机算法。\n\n\
    穆勒最初的Brainfuck实现有一些限制，我们的解释器将沿用这些限制。与图灵机的无限磁带不同，最初的Brainfuck限制为30,000个单元格。每个单元格只能存储一个8位无符号整数。\n\
    \n## 在Python中实现Brainfuck\n\n在进入主要解释器实现之前，我们先做一些准备工作。本书中的每个项目都将被构建为一个Python包。每个包将位于自己的文件夹中，其中包含一个`__main__.py`文件，当从命令行运行项目时，该文件将启动执行。你可以在本书的GitHub仓库`https://github.com/davecom/ComputerScienceFromScratch`中找到所有代码。但是，除非另有说明，你也会在本书中直接找到所有必要的代码。每个代码清单都附有其关联的Python文件名，因此你可以在本书的仓库中定位代码。\n\
    \n## 获取源文件\n\n我们的`__main__.py`文件负责接收包含Brainfuck源文件路径的命令行参数，并将其传递给主解释器：\n\n```python\n\
    # Brainfuck/__main__.py\nfrom argparse import ArgumentParser\nfrom Brainfuck.brainfuck\
    \ import Brainfuck\n\nif __name__ == \"__main__\":\n    # Parse the file argument\n\
    \    file_parser = ArgumentParser(\"Brainfuck\")\n    file_parser.add_argument(\"\
    brainfuck_file\",\n                             help=\"A file containing Brainfuck\
    \ source code.\")\n    arguments = file_parser.parse_args()\n    Brainfuck(arguments.brainfuck_file).execute()\n\
    ```\n\nArgumentParser标准库类使得处理命令行参数变得简单。我们将在本书的每个项目中使用它。在这个代码片段中，我们创建了一个命令行参数`brainfuck_file`，它代表我们要加载Brainfuck源代码的文件路径。该参数的默认类型是字符串，因此我们最终将传递一个路径字符串给我们的Brainfuck类，该类将负责读取其内容。\n\
    \n> **注意** 要了解更多关于ArgumentParser的信息，请参阅官方argparse文档：https://docs.python.org/3/library/argparse.html。\n\
    \n## 编写解释器\n\n我们的解释器负责维护Brainfuck状态（单元格、`cell_index`和`instruction_index`）。它还需要读取源文件中的每个有效Brainfuck命令，并根据该命令更改状态或完成输入/输出操作。因为Brainfuck命令只是一个字符，所以读取它们很简单。而每个字符的“实际操作”与表1-1几乎完全相同。这就是为什么我们最终只有一个25行代码的函数（`execute()`）。\n\
    \n```python\n# Brainfuck/brainfuck.py\nfrom pathlib import Path\n\nclass Brainfuck:\n\
    \    def __init__(self, file_name: str | Path):\n        # Open text file and\
    \ store in instance variable\n        with open(file_name, \"r\") as text_file:\n\
    \            self.source_code: str = text_file.read()\n\n    def execute(self):\n\
    \        # Setup state\n        cells: list[int] = [0] * 30000\n        cell_index\
    \ = 0\n        instruction_index = 0\n        # Keep going as long as there are\
    \ potential instructions left\n        while instruction_index < len(self.source_code):\n\
    \            instruction = self.source_code[instruction_index]\n            match\
    \ instruction:\n                case \">\":\n                    cell_index +=\
    \ 1\n                case \"<\":\n                    cell_index -= 1\n      \
    \          case \"+\":\n                    cells[cell_index] = clamp0_255_wraparound(cells[cell_index]\
    \ + 1)\n                case \"-\":\n                    cells[cell_index] = clamp0_255_wraparound(cells[cell_index]\
    \ - 1)\n                case \".\":\n                    print(chr(cells[cell_index]),\
    \ end='', flush=True)\n                case \",\":\n                    cells[cell_index]\
    \ = clamp0_255_wraparound(int(input()))\n                case \"[\":\n       \
    \             if cells[cell_index] == 0:\n                        instruction_index\
    \ = self.find_bracket_match(instruction_index, True)\n                case \"\
    ]\":\n                    if cells[cell_index] != 0:\n                       \
    \ instruction_index = self.find_bracket_match(instruction_index, False)\n    \
    \        instruction_index += 1\n```\n\n每个命令的实现都直接来自表1-1，由对三个状态变量的简单操作组成。对于那些没有跟上最新Python版本的读者，`match`语句是在Python\
    \ 3.10中添加的，可以看作是其他语言中`switch`语句的强大版本。它执行与被匹配变量中的值相匹配的代码段（或case）。在我们的程序中，case对应于`instruction`的可能值。\n\
    \n> ### 类型提示\n\n你可能注意到我在一些局部变量上使用了类型提示。在本书中，我认为能增加清晰度的地方我会使用，但我不会拘泥于此。例如，我认为明确`cells`是`list[int]`是有意义的，因为有些人可能不记得我使用的列表初始化语法。但根据上下文，很明显`instruction`将是一个`str`，所以我没有为它提供类型提示。类型提示允许我做的另一件事是运行静态类型检查器，以帮助验证本书中所有代码的正确性。我总是发现这很有帮助。\n\
    \n关于`__init__()`签名中使用的类型提示语法`file_name: str | Path`的简要说明：该语法意味着提供的参数预期是`str`类型或`Path`类型。两种类型都是可接受的。我们的ArgumentParser提供字符串形式的文件路径，而我们的单元测试将提供`Path`对象。`__init__()`中使用路径的`open()`函数可以接受任一种。\n\
    \n表1-1中缺少两个辅助函数：`find_bracket_match()`和`clamp0_255_wraparound()`。首先，让我们看看`find_bracket_match()`，它帮助从一个类似if语句的括号命令跳转到其配对的括号。这个函数被实现为Brainfuck类的一个方法，因为它需要访问`self.source_code`：\n\
    \n```python\n# Find the location of the corresponding bracket to the one at *start*.\n\
    # If *forward* is true go to the right looking for a matching \"]\".\n# Otherwise\
    \ do the reverse.\ndef find_bracket_match(self, start: int, forward: bool) ->\
    \ int:\n    in_between_brackets = 0\n    direction = 1 if forward else -1\n  \
    \  location = start + direction\n    start_bracket = \"[\" if forward else \"\
    ]\"\n    end_bracket = \"]\" if forward else \"[\"\n    while 0 <= location <\
    \ len(self.source_code):\n        if self.source_code[location] == end_bracket:\n\
    \            if in_between_brackets == 0:\n                return location\n \
    \           in_between_brackets -= 1\n        elif self.source_code[location]\
    \ == start_bracket:\n            in_between_brackets += 1\n        location +=\
    \ direction\n    # Didn't find a match\n    print(f\"Error: could not find match\
    \ for {start_bracket} at {start}.\")\n    return start\n```\n\n为了找到匹配的括号，我们对Brainfuck源代码执行线性搜索，一次查看一个后续字符。如果`forward`为True，我们向右搜索；如果为False，则向左搜索。`direction`变量成为`forward`的代理，通过递增或递减`location`来向右或向左移动❶。\n\
    \n搜索匹配括号时的干扰因素是*中间括号*，即出现在起始括号和目标括号之间的一组括号。例如，假设我们正在搜索以下Brainfuck代码片段中第一个括号的匹配括号（为清晰起见，我已用索引标记了字符）：\n\
    \n```\n[++[--]<<]\n0123456789\n```\n\n索引0处的开括号的匹配项是索引9处的闭括号。然而，如果我们天真地接受找到的第一个闭括号，我们的搜索将得出结论：索引0的匹配项是索引6处的闭括号。实际上，那个闭括号匹配的是索引3处的开括号。\n\
    \n解决方法很简单，就是计算中间括号的数量。每次遇到一对中间括号的开始时，我们递增`in_between_brackets`计数器❸。每次遇到一对中间括号的结束时，我们递减`in_between_brackets`，除非`in_between_brackets`为0，这意味着没有更多的中间括号，并且已经找到了目标括号❷。\n\
    \n> ### 括号查找的替代方法\n\n解决中间括号问题的另一种方法是使用栈。每次遇到开括号时，将其位置压入栈中。每次遇到闭括号时，弹出栈。得到的两个括号位置（遇到的闭括号的位置和弹出的开括号的位置）是一对。\n\
    \n*(续)*"
