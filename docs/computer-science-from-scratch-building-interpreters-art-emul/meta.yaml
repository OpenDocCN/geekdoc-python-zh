  md: "# The SVG Format\n\nSVG stands for Scalable Vector Graphics. It's an XML-based\
    \ format for specifying vector images. All modern mainstream web browsers and\
    \ vector drawing programs support it. Instead of using a third-party library to\
    \ write to SVG, we'll write our own short class to do it. The SVG specification\
    \ is large, but we only need a small subset of it to support the shapes that our\
    \ program will output, so the task will be relatively easy.\n\nXML is a text-based\
    \ format, and since we're outputting it, not parsing it, we don't even need our\
    \ program to really understand XML's structure. We just need to amalgamate a string\
    \ out of other strings representing the constituent XML elements. While this approach\
    \ limits the testability and modularity of our SVG writer, the amount of the SVG\
    \ standard we're implementing is so small that it's almost trivial to hand check\
    \ for correctness. That said, this approach isn't production suitable.\n\nBefore\
    \ we get into the code, here's an example of a simple SVG file that our program\
    \ can output. This one has just one triangle built using the polygon element,\
    \ plus the background rectangle (I've slightly improved the formatting with a\
    \ couple of indentations for readability):\n\n```\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<svg version=\"1.1\" baseProfile=\"full\" width=\"342\" height=\"256\"\
    \n     xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"100%\" height=\"\
    100%\" fill=\"rgb(108, 98, 91)\" />\n    <polygon points=\"201,3 24,9 162,182\
    \ \" fill=\"rgb(128, 120, 112)\" />\n</svg>\n```\n\nIf you save this code in a\
    \ text file with the .svg extension, you can open it using a web browser or vector\
    \ image editor to see the resulting triangle. As we walk through creating our\
    \ SVG class, keep this example in mind to visualize how the different elements\
    \ come together to form a complete SVG file.\n\nAn SVG file starts with a declaration\
    \ that it's an XML file, and then the first element is an svg element that describes\
    \ the version of the SVG specification and the width and height of the image.\
    \ In addition, every image our program generates is backed by a big rectangle\
    \ containing the average color of the image. This helps the algorithm blend better.\
    \ Our SVG file therefore also starts with a big rect element:\n\n```\n# Impressionist/svg.py\n\
    class SVG:\n    def __init__(self, width: int, height: int, background_color:\
    \ tuple[int, int, int]):\n        self.content = '<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\\n' \\n            f'<svg version=\"1.1\" baseProfile=\"full\" width=\"\
    {width}\" ' \\n            f'height=\"{height}\" xmlns=\"http://www.w3.org/2000/svg\"\
    >\\n' \\n            f'<rect width=\"100%\" height=\"100%\" fill=\"rgb{background_color}\"\
    \ />'\n```"
