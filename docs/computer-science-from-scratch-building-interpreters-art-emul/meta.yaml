    \ Python 标准库的 `array` 类型中，使用类型码 `'B'` 定义的数组保存无符号字节。由于我们将操作大量原始字节，我们将在本章以及后续关于模拟器的章节中反复看到这种数组类型。\n\
    \n令人困惑的是，Python 提供了至少三种不同的类型来处理原始字节：`bytes`、`bytearray` 和 `array(\"B\")`。你最终可以使用其中任何一种来编写代码。`array`\
    \ 类型特别适合紧凑表示和处理文件。\n\n## MacPaint 文件格式\n\n在它之前就有绘画程序，但对于之后出现的所有程序，MacPaint 设定了标准。它由\
    \ Bill Atkinson 编写，并于 1984 年由 Apple 与初代 Macintosh 一起发布。尽管早于 Xerox Star 和 Apple\
    \ Lisa，但 Macintosh 是第一款广泛可用的、配备鼠标和图形用户界面（GUI）的个人电脑。MacPaint 是展示鼠标和 GUI 强大功能的示范软件之一。《纽约时报》的一位评论家说：“它比个人电脑上提供的同类产品好\
