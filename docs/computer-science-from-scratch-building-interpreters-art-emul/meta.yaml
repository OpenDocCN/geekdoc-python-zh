    \n# Emulating the CPU\n\nCPUs can ultimately be thought of as sophisticated finite\
    \ state machines. They maintain state in their registers and the finite amount\
    \ of memory they have access to. They make state transitions via the instructions\
    \ they can handle. This insight accounts for the key work our CPU emulator needs\
    \ to do: maintain registers, access memory, and modify registers and memory correctly\
    \ based on instructions.\n\nThe 6502 is one of the simplest CPU cores that ever\
    \ found wide industry acceptance, and the version of the 6502 in the NES is even\
    \ simpler than a standard 6502. It lacks instructions for BCD that most 6502s\
    \ had. There are only 56 different types of instructions that we need to implement\
    \ in order to have a working NES CPU, and many of them can be implemented in just\
    \ a couple lines of code. In addition, the 6502 has just three main registers\
    \ (A, X, and Y) along with a few specialized registers (SP, PC, and various flags).\
    \ The only real complexity in the 6502 comes from the multiple different memory\
    \ access methods that the various instructions can utilize, but we'll abstract\
    \ them away in a helper function.\n\n# The Setup\n\nThe code for our 6502 implementation\
    \ begins by setting up some helper constructs and constants:\n\n```\nNESEmulator/\n\
