  md: '| Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 1 | 4 |


    4: <


    The cell index is decremented. The instruction index is then incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 0 | 5 |


    5: .


    The ASCII value of the cell at the current cell index is output to the console—in
    this case, an X. Then, the instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 0 | 6 |


    6: >


    The cell index is incremented. Then, the instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 1 | 7 |


    7: -


    The value at the current cell index is decremented. The instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 9 | 1 | 8 |


    8: ]


    If the value at the current cell index is nonzero, we jump to the matching opening
    bracket. In this case, cell 1 is 9, so we jump, meaning the instruction index
    becomes 3.'
