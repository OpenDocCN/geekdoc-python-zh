    the type of person who likes to learn new subjects from first principles, in a
    hands-on way. I want more than just high-level overviews. If you''re that type
    of learner too, then you''ve found the right resource. Through the seven Python
    projects in this book, you''ll build an understanding of some fundamental ideas
    from the realm of computer science.


