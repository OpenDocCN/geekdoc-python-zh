    resource and releasing so much reference material into the public domain.*


    ## The Hardware


    The central processing unit (CPU) in the NES was a clone of the MOS Technology
    6502 microprocessor, manufactured by Ricoh, running at just below 2 MHz. The 6502
    is the same microprocessor that was in popular home computers of the time, such
    as the Apple II and the Commodore 64. Built out of around 3,500 transistors, the
    6502 was a particularly simple microprocessor; for example, it lacked instructions
    for multiplication and division.² Those arithmetic operations had to be implemented
    in software out of many simpler instructions like addition, subtraction, and bit
    shifts. When you think about just how slow and simple the 6502 was compared to
    a modern microprocessor, it’s incredible what was accomplished with it.


    The 6502 on the NES was combined with an audio chip in the same package. In NES
    development parlance, this chip is known as the *audio processing unit (APU)*.
    The APU supported five different channels of sound. To keep things simple, we
    won’t implement the APU in our emulator. When implementing audio, timing is critical,
    and our emulator won’t be timing accurate.


    The NES’s CPU could access 2KB of built-in RAM in the machine. Yes, you read that
    correctly. The working memory of the NES’s CPU was just 2KB, not even enough memory
    to store the text of this section of this chapter. It’s also less RAM than CHIP-8
    systems typically had, which came out in the prior decade. Some cartridges included
    additional RAM.


    The key to the NES’s performance was the *picture processing unit (PPU)*, manufactured
    by Ricoh as the 2C02, based on an earlier design by Texas Instruments. The PPU
    not only could output tiled background graphics, but also had built-in support
    for sprites. It featured 2KB of memory for background tile information, 256 bytes
    of memory for keeping track of up to 64 sprites, and 28 bytes to hold color palette
    information. The NES supported 54 different colors, but only 25 could be used
    at the same time. The PPU even had some primitive support for collision detection.


    The CPU communicated with the APU and PPU via *memory-mapped hardware registers*.
    These are particular memory addresses that, when written to, may modify the operation
    of the other hardware chip or, when read, will provide an update on the other
    chip’s current flags or status. For instance, the CPU may write data to a PPU
    register to change the location of a sprite. Later, it may read from a different
    PPU register to see if the sprite collided with anything. The CPU also has memory-mapped
    registers for reading from the game controllers.


