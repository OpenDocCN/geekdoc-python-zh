    89\n```\n\nThat looks right.\n\nWe're almost ready to write an implementation\
    \ of NanoBASIC, but before we get there, it's important to more formally specify\
    \ the language's syntax. We can directly use that specification to write our implementation.\n\
    \n## Formalizing NanoBASIC's Syntax\n\nA programming language's syntax is formally\
    \ defined by a *grammar*. Backus–Naur form (BNF) is the typical way the grammar\
    \ of a programming language is specified. There are many extensions and augmentations\
    \ of BNF; we'll use a form of it that I think will be very clear to intermediate\
    \ programmers because it includes some regular expression–like syntax.\n\nA grammar\
    \ consists of a set of production rules that define what's allowable syntax in\
    \ the programming language. The term *production rule* sounds fancy, but it's\
    \ just a way of substituting one thing for another. Let's say I was creating a\
    \ grammar for a language that could only consist of the letters A and B and the\
    \ numbers 1 and 2. Its production rules may look like this:\n\n```\n<expression>\
    \ ::= (<letter> | <number>)*\n<letter> ::= 'A' | 'B'\n<number> ::= '1' | '2'\n\
    ```\n\nAn identifier wrapped in angle brackets, like `<expression>`, is a *non-terminal*.\
    \ This is an item in a grammar that, when expanded, is replaced by something else.\
    \ What it gets replaced by is specified by the right side of its production rule.\
    \ In a production rule, the `::=` symbol separates a non-terminal from its replacement.\
    \ The replacement can be composed of non-terminals or terminals.\n\nA *terminal*\
    \ is something that will appear in the language in its literal form. It doesn't\
    \ get expanded any further. In our syntax, a terminal is wrapped in single quotes,\
    \ like 'A'. Our syntax also uses | to mean *or*. An *or* means that there's a\
    \ selection of options to choose from for that part of the production. We use\
    \ parentheses for grouping, and * signifies zero or more repetitions of something.\n\
    \nWith this in mind, we can read the three production rules shown earlier as indicating:\n\
    \n1. An *expression* is zero or more of letters or numbers.\n2. A *letter* is\
    \ A or B.\n3. A *number* is 1 or 2.\n\nWe can use a grammar to check whether a\
    \ particular string of text is valid syntax for a language by simply following\
    \ its production rules. For instance, our grammar specifies that “AAA21B” is valid\
    \ syntax but “AB123” is not. More than one grammar can specify the same language.\
    \ The non-terminal names are largely arbitrary and should be chosen to make the\
    \ most human sense. For example, there's no reason that letters and numbers need\
    \ to be separated in our grammar. We could simplify the grammar to be:\n\n```\n\
    <expression> ::= <character>*\n<character> ::= 'A' | 'B' | '1' | '2'\n```\n\n\
    We could even eliminate the second production rule altogether:\n\n```\n<expression>\
    \ ::= ('A' | 'B' | '1' | '2')*\n```\n\nWe generally shouldn't use unnecessary\
    \ production rules, because they overcomplicate the grammar. However, if the additional\
    \ non-terminal represents multiple possible terminals and it will be used again\
    \ somewhere else in the grammar, it makes sense to give it its own production\
    \ rule instead of duplicating a long list of terminals. This will become clearer\
    \ as we work with larger grammars with richer structures. It's analogous to programming,\
    \ where it can be better style to have many small functions that we reuse rather\
    \ than just a few large ones.\n\nLet's look at another example. Say I were specifying\
    \ production rules for a numbered list. It may look something like this:\n\n```\n\
    <list> ::= <item>*\n<item> ::= <number>'.' <text>'\\n'\n<number> ::= <digit><digit>*\n\
    <digit> ::= '0' | '1' | ... | '8' | '9'\n<text> ::= .*\n```\n\nWe've introduced\
    \ a couple more special forms. The ... symbol indicates a list of terminals continues\
    \ in the implied way (this isn't super formal, but it saves space), and . just\
    \ means any user-imaginable terminal, like in a regular expression. Let's again\
    \ put the five rules of this grammar into a more English-like form:\n\n1. A *list*\
    \ is composed of zero or more items.\n2. An *item* is a number followed by a period,\
    \ some text, and a newline.\n3. A *number* is one or more digits.\n4. A *digit*\
    \ is one of the characters 0 through 9.\n5. A *text* is any arbitrary string.\n\
    \nDid you notice a problem with this grammar regarding how it handles numbers?\
    \ A number with leading zeros, like 0020, would be allowed, but that wouldn't\
    \ make sense in a numbered list. How can it be fixed? I'll leave that as an exercise\
    \ for the reader. If you can fix it, you probably have a decent understanding\
    \ of terminals and non-terminals.\n\nThe grammars described with BNF are said\
    \ to be *context free*, meaning that each production rule can stand alone for\
    \ a non-terminal that appears within a larger string. Without any context about\
    \ the rest of the string, the production rule can still be expanded for the single\
    \ non-terminal in question. In other words, in a context-free grammar, each non-terminal\
    \ isn't dependent on other non-terminals around it to be expanded.\n\nNanoBASIC's\
    \ grammar is based on the original Tiny BASIC grammar published by Dennis Allison,\
    \ the creator of the first Tiny BASIC implementation, in 1976.⁶ It looks like\
    \ this:\n\n```\n❶ <line> ::= <number> <statement> '\\n' | 'REM' .*'\\n'\n\n❷ <statement>\
    \ ::= 'PRINT' <expr-list> |\n    'IF' <boolean-expr> 'THEN' <statement> |\n  \
    \  'GOTO' <expression> |\n    'LET' <var> '=' <expression> |\n    'GOSUB' <expression>\
    \ |\n    'RETURN'\n\n❸ <expr-list> ::= (<string> | <expression>) (',' (<string>\
    \ | <expression>))*\n\n❹ <expression> ::= <term> (('+'|'-') <term>)*\n\n❺ <term>\
    \ ::= <factor> (('*'|'/') <factor>)*\n\n❻ <factor> ::= ('-'|ε) <factor> | <var>\
    \ | <number> | '(' <expression> ')'\n\n    <var> ::= ('_'|<letter>) ('_'|<letter>)*\n\
    \n    <number> ::= <digit> <digit>*\n\n    <digit> ::= '0' | '1' | ... | '8' |\
    \ '9'\n\n    <letter> ::= 'a'|'b'| ... |'y'|'z'|'A'|'B'| ... |'Y'|'Z'\n\n<relop>\
    \ ::= '<' ('>'|'='|ε) | '>' ('<'|'='|ε) | '='\n\n⑦ <boolean-expr> ::= <expression>\
    \ <relop> <expression>\n\n<string> ::= '\"' .* '\"'\n```\n\nThe only new syntax\
    \ in the full NanoBASIC grammar is the epsilon character (ε). It means there could\
    \ be nothing (“empty”) in the spot where it appears. It always appears as part\
    \ of an *or*, meaning there could be something, or there could be nothing.\n\n\
    The NanoBASIC grammar looks a lot more sophisticated than the previous two examples—it’s\
    \ a whole programming language, after all—but it’s actually pretty easy to pick\
    \ apart:\n\n1. A *line* is either a number (the line number) followed by a statement,\
    \ or a comment (REM precedes all comments) ❶.\n2. A *statement* is one of the\
    \ six statements we learned (PRINT, IF, GOTO, LET, GOSUB, RETURN) ❷. This is the\
    \ first place we see a kind of recursion: an IF statement contains another statement\
    \ in its THEN clause, so any of the six statements can appear after THEN.\n3.\
    \ An *expression list* (expr-list) is a comma-separated list of strings or expressions\
    \ ❸. As you can see from the PRINT section in the previous production rule, expression\
    \ lists are only used for PRINT statements. This is also the only rule connecting\
    \ to strings. Therefore, a string can only be used as part of a PRINT statement’s\
    \ expression list. We call it a list, but really an expression list could have\
    \ just one expression or string in it. If there are more, that’s when we utilize\
    \ the * part of the grammar, which is attached to the comma and the following\
    \ choice of expression or string.\n4. An *expression* is something to do with\
    \ arithmetic. It could be adding some numbers, multiplying some numbers, or just\
    \ retrieving a value from a variable. The expression production rule itself only\
    \ includes the possibility of addition or subtraction ❹.\n5. An expression is\
    \ made up of *terms*. Whereas the expression production rule handled addition\
    \ and subtraction, the term production rule handles multiplication and division\
    \ ❺. The reason for this has to do with precedence: the “deeper” we go down the\
    \ walk of non-terminals, the higher the precedence of our operators when we ultimately\
    \ turn this grammar into a working language. That’s why you find multiplication\
    \ and division after addition and subtraction.\n6. Precedence is also why you\
    \ find parentheses in the production rule for a *factor* ❻ and not in the production\
    \ rules for expressions or terms. Parentheses have the highest precedence of any\
    \ arithmetic operator. The other thing we may replace a factor with is a variable\
    \ (which in the runtime will pull its value), a number literal, or a negation\
    \ (the option of a leading -).\n7. The rules for *variables*, *numbers*, *digits*,\
    \ *letters*, *relational operators* (relops), and *strings* are largely self-explanatory.\
    \ Notice how easy it is to expand"
