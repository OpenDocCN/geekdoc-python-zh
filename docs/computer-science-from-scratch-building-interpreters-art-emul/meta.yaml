    \ image, is necessary for generating the final output.\n\n### HILL CLIMBING\n\n\
    *Hill climbing* is a simple optimization technique that aims to find the maximum\
    \ or minimum of a function by continually going in the same direction while the\
    \ search seems to be “improving.” In the classic explanation of this technique,\
    \ you’re asked to imagine that you’re wearing a blindfold and standing at the\
    \ bottom of a hill that you want to climb. You can feel with your feet the gradient\
    \ of the ground around you. With each step, whatever direction seems to yield\
    \ the steepest upward slope will feel like the way that you should go if you want\
    \ to get up the hill the fastest. You can keep choosing to go up in this direction\
    \ as long as you can feel with your feet that you’re climbing. Eventually you’ll\
    \ reach a point where you’re no longer climbing no matter the direction of your\
    \ next step, and then you can stop.\n\nWill you have reached the top of the hill?\
    \ It’s certainly possible, especially if the hill has a single peak. But it’s\
    \ also possible the hill has multiple peaks and you just reached one of the smaller\
    \ ones. That’s called getting caught in a *local maximum*. Hill climbing will\
    \ always find a local maximum, but it may not find a global maximum.\n\nHill climbing\
    \ is a popular technique in artificial intelligence because it is so simple. It’s\
    \ a good starting point for many problems. In our program, we keep nudging coordinates\
    \ in the same direction until the difference with the starting image is no longer\
    \ improving. This is a type of hill climbing: we just keep going"
