  - "[PAGE 93]\n\nOur dithering code begins by defining some constants:\n\n```\nfrom\
    \ PIL import Image\nfrom array import array\nfrom typing import NamedTuple\n\n\
    THRESHOLD = 127\n\nclass PatternPart(NamedTuple):\n    dc: int  # change in column\n\
    \    dr: int  # change in row\n    numerator: int\n    denominator: int\n\nATKINSON\
    \ = [PatternPart(1, 0, 1, 8), PatternPart(2, 0, 1, 8),\n            PatternPart(-1,\
    \ 1, 1, 8), PatternPart(0, 1, 1, 8),\n            PatternPart(1, 1, 1, 8), PatternPart(0,\
    \ 2, 1, 8)]\n```\n\nWe set THRESHOLD to 127 (about the middle point between 0\
    \ and 255) as described in our algorithm. In ATKINSON, we flatten the Atkinson\
    \ dithering matrix into six PatternPart named tuples, each of which specifies\
    \ where one of the pixels being changed is located relative to the original pixel\
    \ and what fraction of the error should be added to it.\n\nNext, we'll start defining\
    \ a dither() function, where the dithering takes place:\n\n```\n# Assumes we are\
    \ working with a grayscale image (Mode \"L\" in Pillow)\n# Returns an array of\
    \ dithered pixels (255 for white, 0 for black)\ndef dither(image: Image.Image)\
    \ -> array:\n    # Distribute error among nearby pixels\n    def diffuse(c: int,\
    \ r: int, error: int, pattern: list[PatternPart]):\n        for part in pattern:\n\
    \            col = c + part.dc\n            row = r + part.dr\n            if\
    \ col < 0 or col >= image.width or row >= image.height:\n                continue\n\
    \            current_pixel: float = image.getpixel((col, row))  # type: ignore\n\
    \            # Add *error_part* to the pixel at (*col*, *row*) in *image*\n  \
    \          error_part = (error * part.numerator) // part.denominator\n       \
    \     image.putpixel((col, row), current_pixel + error_part)\n```\n\nThe dither()\
    \ function begins with a diffuse() helper function that takes the error and distributes\
    \ it among nearby pixels in portions specified by a pattern, which is just a list\
    \ of PatternPart tuples. We iterate through each PatternPart in the pattern, find\
    \ the pixel associated with that part, and add its fraction of the error to it.\
    \ As discussed, the pattern is at the heart of what makes one error-diffusion\
    \ algorithm differ from another. Note that all the arithmetic here is integer\
    \ arithmetic. This is because pixel values are stored as integers."
- md: "## SOME INEFFICIENCIES\n\nThe Pillow documentation notes that the getpixel()\
    \ and putpixel() methods are quite slow. Pillow includes more direct access to\
    \ pixel data in an array as an alternative. In addition, iterating through all\
    \ of the PatternPart tuples is less efficient than storing a raw array of locations.\
    \ In fact, since every error_part is exactly one-eighth of the total error in\
    \ Atkinson dithering, we could save a lot of calculations by just dividing error\
    \ by 8 once. However, this code isn't meant to be the most efficient possible,\
    \ but instead as readable as possible for a chapter in a book that teaches the\
    \ algorithm. We also want to be able to plug in different diffusion dithering\
    \ algorithms where error_part may not always be the same.\n\nDespite these inefficiencies,\
    \ since we first need to scale every image to fit within the constraints of MacPaint,\
    \ the performance of the overall program is nearly instantaneous. If we were dithering\
    \ larger images, the concessions made here may become a problem.\n\nIn the rest\
    \ of dither(), we go through every pixel in the image, change it to black or white\
    \ depending on THRESHOLD, calculate the difference from the original gray, and\
    \ diffuse the error among nearby pixels using the diffuse() helper function:\n\
    \n```\nresult = array('B', [0] * (image.width * image.height))\nfor y in range(image.height):\n\
    \    for x in range(image.width):\n        old_pixel: float = image.getpixel((x,\
    \ y))  # type: ignore\n        # Every new pixel is either solid white or solid\
    \ black\n        # since this is all that the original Macintosh supported\n \
    \       new_pixel = 255 if old_pixel > THRESHOLD else 0\n        result[y * image.width\
    \ + x] = new_pixel\n        difference = int(old_pixel - new_pixel)\n        #\
    \ Disperse error among nearby upcoming pixels\n        diffuse(x, y, difference,\
    \ ATKINSON)\n\nreturn result\n```\n\nThe ATKINSON pattern is currently hardcoded,\
    \ but there's an easy hook here to change to a different pattern. Note that the\
    \ result variable is actually an array of pixels, not another Pillow Image. This\
    \ is because we'll need to further process the raw pixel data of the dithered\
    \ image in order to save it in MacPaint format. In Python's array type from the\
    \ standard library, an array defined using type code 'B' holds unsigned bytes.\
    \ Since we'll be manipulating a lot of raw bytes, we'll see this array type repeatedly\
    \ both in this chapter and in the later chapters on emulators.\n\nConfusingly,\
    \ Python provides at least three different types for working with raw bytes: bytes,\
    \ bytearray, and array(\"B\"). You could ultimately write your code using any\
    \ of them. The array type is particularly geared toward compact representation\
    \ and working with files.\n\n## The MacPaint File Format\n\nThere were painting\
    \ programs before it, but for everything that would come after it, MacPaint set\
    \ the standard. It was written by Bill Atkinson and released in 1984 by Apple\
    \ alongside the original Macintosh. Although preceded by the Xerox Star and the\
    \ Apple Lisa, the Macintosh was the first widely available personal computer with\
    \ a mouse and a graphical user interface (GUI). MacPaint was one of the showcase\
    \ pieces of software that demonstrated how powerful a mouse and GUI could be.\
    \ A reviewer in the *New York Times* said, “It is better than anything else of\
    \ its kind offered on personal computers by a factor of 10.”¹ Many of the tools\
    \ and graphical manipulation techniques that first appeared in MacPaint are still\
    \ with us today in modern graphics software.\n\nI encourage you to play around\
    \ with MacPaint to get a sense of it. There’s a live demo of it on the Internet\
    \ Archive,² but you may get the maximum level of fulfillment from this chapter\
    \ by taking the time to download an emulator so that you can load the actual images\
    \ our program will be outputting directly in MacPaint. You could even go find\
    \ an old Mac on eBay! I’ve collected far too many myself.\n\nDespite being revolutionary,\
    \ MacPaint was limited by the hardware of its pioneering platform. Like the original\
    \ Macintosh, MacPaint only supported black and white. As mentioned earlier, its\
    \ documents were also limited to a fixed size of 576 pixels wide by 720 pixels\
    \ tall. The original Macintosh didn’t even have a hard drive; disk space was limited\
    \ because everything had to run off of a floppy disk. To accommodate this space\
    \ constraint, MacPaint used a simple compression scheme known as *run-length encoding*.\
    \ We’ll come back to some of these quirks shortly.\n\nThe next step in our project\
    \ will be to write code that translates the dithered pixels of an image into the\
    \ MacPaint format. My experience has been that programming against binary file\
    \ formats is just a matter of very carefully following a specification document.\
    \ Unfortunately, the MacPaint format is somewhat obscure today, so finding a specification\
    \ document requires a little bit of digging. Apple itself documented the format\
    \ in Technical Note PT24.³ However, the most accessible and comprehensive description\
    \ I’ve found was on a site called FileFormat.info.⁴\n\nOn the surface, a MacPaint\
    \ file is pretty simple. It consists of a 512-byte header followed by pixel data\
    \ that’s compressed using run-length encoding. Before being run-length encoded,\
    \ each pixel is stored as a bit, either a 1 for black or a 0 for white. That all\
    \ sounds straightforward enough. However, there’s a peculiarity: unlike almost\
    \ any other operating system, the classic Mac operating system stored files in\
    \ two “forks.” We’ll dive into that more in a bit, but in short, MacPaint files\
    \ that get transported or created on operating systems other than the classic\
    \ Mac OS should be encoded in a special format called *MacBinary* in order to\
    \ have their metadata survive transfer. We’ll therefore need to turn our output\
    \ file into a MacBinary file too, by adding a special additional header.\n\nWe’ll\
    \ tackle this esoteric file format step by step. First, we’ll handle the pixel\
    \ data. Then, we’ll implement run-length encoding. And last, we’ll create the\
    \ MacPaint and MacBinary headers. As we work, we’ll need to use various bitwise\
    \ operations including shifts, ORs, and ANDs. If this kind of low-level bit manipulation\
    \ is new to you, or if you’re just a bit rusty, see the book’s appendix for an\
    \ overview of bitwise operations in Python.\n\n## Translating Bytes to Bits\n\n\
    In “L” mode, our Pillow Image is encoded using 1 byte per pixel. However, in a\
    \ MacPaint bitmap, pixels are encoded with 1 bit per pixel, meaning each byte\
    \ represents eight pixels. This is a big savings for black and white, and it makes\
    \ total sense since we only need two values (1 and 0) to represent two colors.\
    \ After we define some constants, our first function in *macpaint.py* is a converter\
    \ that takes the byte array we got from dither() and converts it into a “bit array”:\n\
    \n```\nfrom array import array\nfrom pathlib import Path\nfrom datetime import\
    \ datetime\n\nMAX_WIDTH = 576\nMAX_HEIGHT = 720\nMACBINARY_LENGTH = 128\nHEADER_LENGTH\
    \ = 512\n\n# Convert an array of bytes where each byte is 0 or 255\n# to an array\
    \ of bits where each byte that is 0 becomes a 1\n# and each byte that is 255 becomes\
    \ a 0\ndef bytes_to_bits(original: array) -> array:\n    bits_array = array('B')\n\
    \n    for byte_index in range(0, len(original), 8):\n        next_byte = 0\n \
    \       for bit_index in range(8):\n            next_bit = 1 - (original[byte_index\
    \ + bit_index] & 1)\n            next_byte = next_byte | (next_bit << (7 - bit_index))\n\
    \            if (byte_index + bit_index + 1) >= len(original):\n             \
    \   break\n        bits_array.append(next_byte)\n    return bits_array\n```\n\n\
    The loops here iterate through 8 bytes at a time from the original array, checking\
    \ whether each is a white (255) or black (0) pixel. MacPaint’s bitmap format inverts\
    \ this, making a white pixel 0 and a black pixel 1. The line `next_bit = 1 - (original[byte_index\
    \ + bit_index] & 1)` does the inversion. Note that we don’t actually check values\
    \ against 255, instead preferring to only check the first bit (& 1) because it\
    \ makes the code more compact and more performant. We know we only stored 255s\
    \ and 0s in the array before bytes_to_bits() was called, so there’s no reason\
    \ to fear we’re accidentally capturing intermediate values; if there’s a 1 anywhere\
    \ in the byte, it must be 255. The 8 bits are encoded in next_byte by putting\
    \ each bit into the appropriate place with an OR operation: `next_byte = next_byte\
    \ | (next_bit << (7 - bit_index))`. We then append next_byte to bits_array."
