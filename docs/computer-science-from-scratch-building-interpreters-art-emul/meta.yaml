    \ for row in range(height):\n        image_location = row * width\n        image_bits\
    \ = bytes_to_bits(data[image_location:(image_location + width)])\n        bits_array\
    \ += image_bits\n        remaining_width = MAX_WIDTH - width\n        white_width_bits\
    \ = array('B', [0] * (remaining_width // 8))\n        bits_array += white_width_bits\n\
    \    remaining_height = MAX_HEIGHT - height\n    white_height_bits = array('B',\
    \ [0] * ((remaining_height * MAX_WIDTH) // 8))\n    bits_array += white_height_bits\n\
    \    return bits_array\n```\n\nWe look through the raw pixel data coming from\
    \ dither() one row at a time and convert the row to bits using bytes_to_bits().\
    \ If the row doesn't extend the full width of a MacPaint document, we add white\
    \ pixels to the row. We do the same for any full-length rows beneath the pixel\
    \ data.\n\n# Implementing Run-Length Encoding\n\nStoring pixels as individual\
    \ bits rather than bytes saves a significant amount of space, but it's not enough.\
    \ When MacPaint launched in 1984, the original Macintosh had floppy disks that\
    \ supported just 400KB of data. There was no hard drive, and a standard configuration\
    \ had just one floppy drive. Think about how big a MacPaint file would be if it\
    \ weren't compressed. The 576 pixels in a row take up 576 bits, which is 72 bytes.\
    \ There are 720 rows, so 720 multiplied by 72 bytes is 51,840 bytes. Adding in\
    \ the 512-byte header, a MacPaint file would be 52,352 bytes with no compression.\
    \ That would mean a floppy disk couldn't even store eight MacPaint files!\n\n\
    To relieve this disk space problem, the MacPaint file format incorporates a simple\
    \ compression scheme called run-length encoding. In this scheme, instead of repeating\
    \ the same thing, you say how many times it should repeat. For example, suppose\
    \ we want to store the string `AAAAAABCCCCCABBBB`. If each character uses 1 byte,\
    \ it would be 17 bytes. Would it not be more efficient to say seven As instead\
    \ of repeating A seven times? Or saying five Cs?\n\nSuppose we use up to 1 byte\
    \ before a character to store its number of repetitions. The string could then\
    \ be encoded as `6AB5CA4B`, which is 8 bytes. However, there's a problem with\
    \ this scheme. Remember, in computer memory these would be raw bytes. How do we\
    \ know that B is a character and not a byte indicating a certain number of repetitions\
    \ of the next"
  - '[PAGE 98]


    character? In other words, *B* would likely be stored in memory using its ASCII/Unicode
    code, 66. Our program would likely interpret it as indicating 66 of the next character,
    not a single letter *B*.


    We could instead have a scheme where every character is preceded by a number,
    even single characters. This would change the encoded string to *6A1B5C1A4B*.
    That''s 10 bytes, a 7-byte savings over the original, which is significant.


    This encoding scheme is a form of run-length encoding, but it breaks down pretty
    quickly: for many strings, it''s actually less efficient than just storing the
    raw characters. For example, the string *ABC* would be *1A1B1C*. That''s double
    the size.


    There''s a compromise. You can have an encoding scheme where each number indicates
    either a repetition or a certain number of literal characters. Then, *ABC* becomes
    *3ABC*. That''s still longer, but this new scheme may be a good compromise for
    more complex cases. For instance, the string *AAAAAABCBCAAAAAA* would be *5A4BCBC6A*.


    This version is close to the encoding scheme the MacPaint file format uses, but
    there''s still a problem: How would you know that the 5 means five *A*s, but the
    4 means a literal sequence of four characters (*BCBC*) rather than four *B*s?
    You may say, "Well, you could read ahead two characters and see that *C* isn''t
    a number, so the 4 couldn''t mean four *B*s," but even that doesn''t work, because
    (again) in computer memory, the *C* is stored as a number. We need another improvement.


    MacPaint eliminates the ambiguity between numbers that indicate literal runs and
    numbers that indicate repetition runs by representing both using signed 1-byte
    integers. A number *n* between 0 and 127 indicates *n* + 1 literal bytes follow.
    A number *n* between -1 and -127 indicates 1 - *n* repetitions of the following
    byte. The number -128 isn''t used. This compression scheme is known as *PackBits*,⁵
    and it was used beyond just MacPaint in several other popular file formats.


    A PackBits function was actually built into classic versions of Mac OS. According
    to Apple''s own technical note on the subject, "typical MacPaint documents compress
    to about 10K" with PackBits.⁶ Table 3-3 summarizes the PackBits encoding scheme.


    **Table 3-3: The PackBits Encoding Scheme (Signed)**


    | Value of *n* | Meaning |

    | :--- | :--- |

    | 0 to 127 | *n* + 1 literal bytes follow. |

    | -1 to -127 | The next byte is repeated 1 - *n* times. |

    | -128 | Skip. |


    We''ll be working with unsigned integers, so it''s convenient to rewrite the table
    instead of doing conversions on every byte from signed to unsigned (or thinking
    about two''s complements). Table 3-4 is the encoding scheme with the bytes converted
    to unsigned integers.'
  - "[PAGE 99]\n\nTable 3-4: The PackBits Encoding Scheme (Unsigned)\n\n| Value of\
