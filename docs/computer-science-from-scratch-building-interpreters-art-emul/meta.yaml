    The only new syntax in the full NanoBASIC grammar is the epsilon character (ε).
    It means there could be nothing (“empty”) in the spot where it appears. It always
    appears as part of an *or*, meaning there could be something, or there could be
    nothing.


    The NanoBASIC grammar looks a lot more sophisticated than the previous two examples—it’s
    a whole programming language, after all—but it’s actually pretty easy to pick
    apart:


    +   1. A *line* is either a number (the line number) followed by a statement,
    or a comment (REM precedes all comments) ❶.

    2. A *statement* is one of the six statements we learned (PRINT, IF, GOTO, LET,
    GOSUB, RETURN) ❷. This is the first place we see a kind of recursion: an IF statement
    contains another statement in its THEN clause, so any of the six statements can
    appear after THEN.

    3. An *expression list* (expr-list) is a comma-separated list of strings or expressions
    ❸. As you can see from the PRINT section in the previous production rule, expression
    lists are only used for PRINT statements. This is also the only rule connecting
    to strings. Therefore, a string can only be used as part of a PRINT statement’s
    expression list. We call it a list, but really an expression list could have just
    one expression or string in it. If there are more, that’s when we utilize the
    * part of the grammar, which is attached to the comma and the following choice
    of expression or string.

    4. An *expression* is something to do with arithmetic. It could be adding some
    numbers, multiplying some numbers, or just retrieving a value from a variable.
    The expression production rule itself only includes the possibility of addition
    or subtraction ❹.

    5. An expression is made up of *terms*. Whereas the expression production rule
    handled addition and subtraction, the term production rule handles multiplication
    and division ❺. The reason for this has to do with precedence: the “deeper” we
    go down the walk of non-terminals, the higher the precedence of our operators
    when we ultimately turn this grammar into a working language. That’s why you find
    multiplication and division after addition and subtraction.

    6. Precedence is also why you find parentheses in the production rule for a *factor*
    ❻ and not in the production rules for expressions or terms. Parentheses have the
    highest precedence of any arithmetic operator. The other thing we may replace
    a factor with is a variable (which in the runtime will pull its value), a number
    literal, or a negation (the option of a leading -).

    7. The rules for *variables*, *numbers*, *digits*, *letters*, *relational operators*
    (relops), and *strings* are largely self-explanatory. Notice how easy it is to
    expand'
- md: "what's allowed as a variable identifier: we permit one or more underscores\
    \ or letters, as opposed to the original Tiny BASIC's single letters. Those early\
    \ PCs really were memory constrained if they had to limit us to just 26 single-letter\
    \ variable names.\n\n8. A *Boolean expression* is just two numeric expressions\
    \ with a relational operator between them ⑦. Since NanoBASIC doesn't have and\
    \ or or operators, there's no need for the * special form here as we needed for\
    \ arithmetic operations like addition and multiplication.\n\nThis grammar provides\
    \ a blueprint for implementing our interpreter's tokenizer and parser. If you\
    \ recall from Chapter 1 what those pieces are, you may now be able to see how\
    \ the terminals in the grammar will become the tokens that our tokenizer reads.\
    \ And here's something even more useful: the production rules for the non-terminals\
    \ will end up each mapping to a function in our recursive descent parser. We'll\
    \ return to that in a little bit. Ultimately, though, the grammar specifies the\
    \ *syntax* for a programming language, but it doesn't give each element of the\
    \ language *meaning*. That will be the magic of our interpreter.\n\n## The NanoBASIC\
    \ Implementation\n\nNow that we've discussed NanoBASIC and how its syntax is specified,\
    \ it's finally time to start writing our implementation. You may recall from Chapter\
    \ 1 that a basic interpreter has at least three parts:\n\n- A *tokenizer* (sometimes\
    \ known as a *lexer*) that takes the original source code and divides it into\
    \ the smallest recognizable constructs allowed in the programming language. These\
    \ are known as *tokens*. For the code a + 2, the tokens may be a, +, and 2.\n\
    - A *parser* that takes tokens that are next to each other and figures out their\
    \ meaning (that is, the expressions or statements they form). Parsers typically\
    \ produce a tree of nodes representing the relative relationships between expressions,\
    \ statements, and literal values. This tree is called the *abstract syntax tree*\
    \ (AST). For example, if a Python interpreter saw the token a followed by the\
    \ token + followed by the token 2, it may construct an arithmetic expression node\
    \ and connect it to nodes for the a and the 2.\n- A *runtime environment* that\
    \ walks through the nodes of the AST and runs the appropriate operations to execute\
    \ the meaning inherent in them. For our a + 2 arithmetic expression node, this\
    \ would mean looking up the value represented by a and adding 2 to it.\n\nWe'll\
    \ build these three parts in order, but before we can even get to the tokenizer,\
    \ we need to be able to open a NanoBASIC code file:\n\n```\nNanoBASIC/__main__.py\n\
    from argparse import ArgumentParser\nfrom NanoBASIC.executioner import execute\n\
    \nif __name__ == \"__main__\":\n    # Parse the file argument\n    file_parser\
    \ = ArgumentParser(\"NanoBASIC\")\n    file_parser.add_argument(\"basic_file\"\
    ,\n                             help=\"A text file containing NanoBASIC code.\"\
    )\n    arguments = file_parser.parse_args()\n    execute(arguments.basic_file)\n\
    ```\n\nWe load a source code file based on a command line argument, much the same\
    \ as we did in our Brainfuck interpreter, and pass it a function called execute().\
    \ That function lives in a separate file so that it’s easier to reach for our\
    \ tests. It pulls together the tokenizer, parser, and interpreter (runtime) components.\
    \ The output of one is fed as the input to another (source code ▶ tokenizer ▶\
    \ parser ▶ interpreter):\n\n```\nNanoBASIC/executioner.py\nfrom pathlib import\
    \ Path\nfrom NanoBASIC.tokenizer import tokenize\nfrom NanoBASIC.parser import\
    \ Parser\nfrom NanoBASIC.interpreter import Interpreter\n\ndef execute(file_name:\
    \ str | Path):\n    # Load the text file from the argument\n    # Tokenize, parse,\
    \ and execute it\n    with open(file_name, \"r\") as text_file:\n        tokens\
    \ = tokenize(text_file)\n        ast = Parser(tokens).parse()\n        Interpreter(ast).run()\n\
    ```\n\nEach line of code in execute() passes us from one major section of the\
    \ interpreter to the next. The result of the tokenizer goes to the parser, and\
    \ the result of the parser goes to the runtime environment. For the rest of the\
    \ chapter, we’ll be building each of these components in sequence.\n\n## The Tokenizer\n\
    \nThe tokenizer takes a string of source code (the contents of a text file) and\
    \ turns it into tokens. The tokens represent all of the smallest individual chunks\
    \ of a program that can be processed. The valid tokens in NanoBASIC come directly\
    \ from the terminals in the NanoBASIC grammar described in the prior section.\n\
    \nWe’ll use regular expression patterns to find tokens: we’ll associate a regular\
    \ expression pattern with each type of token and then just search for them one\
    \ at a time. The difficulty with this setup is that we need to be careful about\
    \ the order in which the searches occur. If two regular expressions could match\
    \ the same token, then the order will matter. For instance, in our tokenizer the\
    \ regular expression for a variable name could also match the token PRINT (or\
    \ any other statement name), so the search for a variable name token purposely\
    \ comes last.\n\nWe’ll start our tokenizer by defining all the different types\
    \ of tokens as enum cases. Each case will be attached to a regular expression\
    \ for finding it. Some tokens will also have user-specified values associated\
    \ with them, indicated by True or False at the end of each enum case. For example,\
    \ a variable token will have the actual variable name connected to it as an associated\
    \ value. Here's what our TokenType enum looks like:\n\n```\nNanoBASIC/tokenizer.py\n\
    from enum import Enum\nfrom typing import TextIO\nimport re\nfrom dataclasses\
    \ import dataclass\n\nclass TokenType(Enum):\n    COMMENT = (r'rem.*', False)\n\
    \    WHITESPACE = (r'[ \\t\\n\\r]', False)\n    PRINT = (r'print', False)\n  \
    \  IF_T = (r'if', False)\n    THEN = (r'then', False)\n    LET = (r'let', False)\n\
    \    GOTO = (r'goto', False)\n    GOSUB = (r'gosub', False)\n    RETURN_T = (r'return',\
    \ False)\n    COMMA = (r',', False)\n    EQUAL = (r'=', False)\n    NOT_EQUAL\
    \ = (r'<>|><', False)\n    LESS_EQUAL = (r'<=', False)\n    GREATER_EQUAL = (r'>=',\
    \ False)\n    LESS = (r'<', False)\n    GREATER = (r'>', False)\n    PLUS = (r'\\\
    +', False)\n    MINUS = (r'-', False)\n    MULTIPLY = (r'\\*', False)\n    DIVIDE\
    \ = (r'/', False)\n    OPEN_PAREN = (r'\\(', False)\n    CLOSE_PAREN = (r'\\)',\
    \ False)\n    VARIABLE = (r'[A-Za-z_]+', True)\n    NUMBER = (r'-?[0-9]+', True)\n\
    \    STRING = (r'\".*\"', True)\n\n    def __init__(self, pattern: str, has_associated_value:\
    \ bool):\n        self.pattern = pattern\n        self.has_associated_value =\
    \ has_associated_value\n\n    def __repr__(self) -> str:\n        return self.name\n\
    ```\n\nThe TokenType enum just describes the kind of token. Beyond a token's kind,\
    \ we also want to know where it appeared in the source code file. This will be\
    \ useful so that we can pinpoint the location of syntax errors and report that\
    \ information back to the programmer. We'll encompass all this information using\
    \ Token, a composite type that combines a token's kind, location, and associated\
    \ value if applicable:\n\n```\n@dataclass(frozen=True)\nclass Token:\n    kind:\
    \ TokenType\n    line_num: int\n    col_start: int\n    col_end: int\n    associated_value:\
    \ str | int | None\n```\n\nThe type of the associated_value property, str | int\
    \ | None, uses enhanced type hint syntax that was introduced with Python 3.10\
    \ via PEP 604. I mentioned it briefly in Chapter 1, and here we’ll discuss it\
    \ a little more formally. It’s a way of creating a union type. A variable that’s\
    \ declared to be of a union type can refer to values that are of any of the types\
    \ composing the union. In versions of Python prior to 3.10, you would need to\
    \ import Union from typing and the type hint would look like Union[str, int, None].\
    \ This new syntax is obviously much less verbose. In short, it means that an associated_value\
    \ can be a string, an integer, or None.\n\nWe’re ready to read a source code file\
    \ and break it up into its constituent tokens using a tokenize() function:\n\n\
    ```\ndef tokenize(text_file: TextIO) -> list[Token]:\n    tokens: list[Token]\
    \ = []\n    for line_num, line in enumerate(text_file.readlines(), start=1):\n\
    \        col_start: int = 1\n```\n\nThe function takes in a TextIO object, a type\
    \ that represents an object that can act as a text stream. We initialize the tokens\
    \ list, where we’ll collect all the tokens in the entire file. Then, we iterate\
    \ through each line of the file. Because we want to report line and column numbers\
    \ back to the user as they may expect them to appear in their text editor, we\
    \ have both start at 1. Next, we extract all the tokens:\n\n```\nwhile len(line)\
    \ > 0:\n    found: re.Match | None = None\n    for possibility in TokenType:\n\
    \        # Try each pattern from the beginning, case-insensitive\n        # If\
    \ it’s found, store the match in *found*\n        found = re.match(possibility.pattern,\
    \ line, re.IGNORECASE)\n        if found:\n            col_end: int = col_start\
    \ + found.end() - 1\n            # Store tokens other than comments and whitespace\n\
    \            if (possibility is not TokenType.WHITESPACE\n                   \
    \ and possibility is not TokenType.COMMENT):\n                associated_value:\
    \ str | int | None = None\n                if possibility.has_associated_value:\n\
    \                    if possibility is TokenType.NUMBER:\n                   \
    \     associated_value = int(found.group(0))\n                    elif possibility\
    \ is TokenType.VARIABLE:\n                        associated_value = found.group()\n\
    \                    elif possibility is TokenType.STRING:\n                 \
    \       # Remove quote characters\n                        associated_value =\
    \ found.group(0)[1:-1]\n```"
