    \   self.pc = concat_nibbles(n1, n2, n3)\n        jumped = True\n    case (0x2,\
    \ n1, n2, n3):  # call subroutine\n        self.stack.append(self.pc + 2)  # put\
    \ return place on stack\n        self.pc = concat_nibbles(n1, n2, n3)  # goto\
