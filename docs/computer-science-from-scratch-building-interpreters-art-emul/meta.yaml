    \ | 卡带内存 | 不定 | 不定 |\n\n卡带内存的具体细节在第 148 页的“模拟卡带”中。最后，CPU 仅有的 2KB RAM 实际上有两个重要的子区域：前面讨论过的从\
    \ 0x0000 到 0x00FF 的快速零页区域，以及通常用于栈的从 0x0100 到 0x01FF 的空间。\n\n既然我们对内存的划分有了一些了解，就可以看看读写内存的方法了。我们将从\
    \ `read_memory()` 方法开始。它接受一个读取位置和一个内存模式，并返回该位置的一个字节（在 Python 中表示为 int）：\n\n```python\n\
    def read_memory(self, location: int, mode: MemMode) -> int:\n    if mode == MemMode.IMMEDIATE:\n\
    \        return location  # location is actually data in this case\n    address\
    \ = self.address_for_mode(location, mode)\n\n    # Memory map at https://wiki.nesdev.org/w/index.php/CPU_memory_map\n\
    \    if address < 0x2000:  # main RAM 2KB goes up to 0x800\n        return self.ram[address\
    \ % 0x800]  # mirrors for next 6KB\n    elif address < 0x4000:  # 2000-2007 is\
    \ PPU, mirrors every 8 bytes\n        temp = ((address % 8) | 0x2000)  # get data\
    \ from PPU register\n        return self.ppu.read_register(temp)\n    elif address\
    \ == 0x4016:  # joypad 1 status\n        if self.joypad1.strobe:\n           \
    \ return self.joypad1.a\n        self.joypad1.read_count += 1\n        match self.joypad1.read_count:\n\
    \            case 1:\n                return 0x40 | self.joypad1.a\n         \
    \   case 2:\n                return 0x40 | self.joypad1.b\n            case 3:\n\
    \                return 0x40 | self.joypad1.select\n            case 4:\n    \
    \            return 0x40 | self.joypad1.start\n            case 5:\n         \
    \       return 0x40 | self.joypad1.up\n            case 6:\n                return\
    \ 0x40 | self.joypad1.down\n            case 7:\n                return 0x40 |\
    \ self.joypad1.left\n            case 8:\n                return 0x40 | self.joypad1.right\n\
    \            case _:\n                return 0x41\n    elif address < 0x6000:\n\
    \        return 0  # unimplemented other kinds of IO\n    else:  # addresses from\
    \ 0x6000 to 0xFFFF are from the cartridge\n        return self.rom.read_cartridge(address)\n\
    ```\n\n如果内存模式是 IMMEDIATE，这意味着与指令相关的实际数据就是需要“读取”的内容。记住，我们的代码已经抽象到单个指令的方法应该能与任何内存模式配合工作。在\
    \ IMMEDIATE 模式下，我们不需要进行任何实际的查找，所以直接返回与指令相关的数据。（这里的 `location` 名称有点奇怪，但对于除 IMMEDIATE\
    \ 模式之外的所有情况，它都是个好名字。）否则，与指令关联的位置会使用 `address_for_mode()` 转换为内存地址。\n\n获得内存地址后，我们使用一系列\
