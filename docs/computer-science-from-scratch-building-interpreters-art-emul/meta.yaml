  md: 'At the end of step(), we increment the program counter if we didn''t jump.
    This ensures that we''ll have moved on to the next instruction the next time step()
    is called. Since each CHIP-8 instruction is 2 bytes long, the program counter
    is incremented by 2. If there was a jump, then execution was directly moved to
    a specific different instruction somewhere else in memory.


    # Testing the VM


    The most granular way to test the VM would be to write our own unit tests for
    each of the instructions. For each test, we would try running an instruction and
    then verify that the subsequent internal state of the VM was correct. While this
    would be ideal, in the interests of time and space we''ll instead do something
    more akin to integration tests: we''ll see how our VM performs running real CHIP-8
    programs. Do they run correctly?


    As it happens, there are even test ROMs that offer a kind of one-stop shop for
    testing a CHIP-8 VM. Two such test ROMs are included in the *Chip8/Tests* subdirectory
    of the book''s source code repository. Both test ROMs were released under open
    licenses by their developers, and those licenses are included in the subdirectories.
    Let''s run the first test ROM from the repository''s home directory:


    ```

    % python3 -m Chip8 Chip8/Tests/chip8-test-rom/test_opcode.ch8

    ```


    If the VM is working correctly, you should see a screen of OKs, as shown in Figure
    5-2.


    ![](img/2b670944a6e236c13c5019fe56234a0a_159_0.png)


    Now let''s check our work with the second test ROM:


    ```

    % python3 -m Chip8 Chip8/Tests/chip8-test-rom-2/chip8-test-rom.ch8

    ```


    This one just displays OK a single time in the upper-left corner (see Figure 5-3).'
