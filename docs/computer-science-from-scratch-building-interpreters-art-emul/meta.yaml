  md: 'What features does a programming language need to be Turing-complete? As Allen
    Tucker and Robert Noonan explain in their book *Programming Languages: Principles
    and Paradigms*, it doesn’t take much:


    > A programming language is said to be Turing complete if it contains integer
    variables, values, and operations and has assignment statements and the control
    constructs of statement sequencing, conditionals, and branching statements. All
    other statement forms (while and for loops, case selections, procedure declarations
    and calls, etc.) and data types (strings, floating point values, etc.) are provided
    in modern languages only to enhance the ease of programming various complex applications.³


    Let me reduce that description further using simpler language. A programming language
    needs integer variables, a way to change the values associated with those variables,
    something like an if statement, and something like a goto statement (a “jump”)
    to be Turing-complete. That’s not much. And if you think about it, you can imagine
    how those simple constructs can map to the elements of a Turing machine. The integer
    variables are the characters on the cells, changing the variables is the head
    writing on the cells, and the if and goto statements represent the head branching.


    Any programming language that’s Turing-complete can implement the same algorithms
    as any other programming language that’s Turing-complete. You can implement Quicksort
    in C, but you can also implement Quicksort in Brainfuck. You can write a JSON
    parser in Python, but you could also write a JSON parser in Brainfuck. In this
    sense, although Brainfuck is a “toy” programming language, it’s also a “real”
    programming language.


    # How Brainfuck Works


    The main state in a Brainfuck program is an array of integers. Each of the slots
    in the array is called a *cell*. The array of cells can be thought of as analogous
    to the tape in a Turing machine. Instead of characters being read or written on
    a cell, it’s integers. The commands in Brainfuck allow the programmer to move
    forward one cell (›), move backward one cell (‹), increment a cell’s value (+),
    decrement a cell’s value (-), output a cell (.), input data to a cell (,), and
    loop while a particular cell is nonzero ([ and ]). Several of these operations
    map directly to the operations of a Turing machine, so Brainfuck is Turing-complete.


    In Python, we’ll need two variables to contain the cells’ states: a list of all
    the cells (cells) and an integer representing the index of the current cell (cell_index).
    In addition, we’ll need to keep track of where we are in the Brainfuck source
    file. We’ll handle this with another integer, called instruction_index.'
