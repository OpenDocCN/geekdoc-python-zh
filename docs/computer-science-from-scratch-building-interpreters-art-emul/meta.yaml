    # # 4


    # ## A STOCHASTIC PAINTING ALGORITHM


    ![](img/2b670944a6e236c13c5019fe56234a0a_112_0.png)


    All the other chapters in this book follow a specification such as a programming
    language grammar, a file format, or a machine architecture. This chapter is different.
    In this chapter, we’re going to create art. And it’s going to be subjective. Can
    a simple stochastic algorithm use randomly generated shapes to create drawings
    that resemble human works of art? I think the answer is yes, but you’ll have to
    judge for yourself after you see some of the program’s output.'
  - '[PAGE 113]


    # How It Works


    This chapter’s program works by trying to redraw a photograph from scratch. We
    begin with a blank canvas. We try drawing a single randomly sized and placed colored
    shape. If the shape brings the canvas to look more similar to the photograph,
    then we keep it. Otherwise, we try a different shape. We repeat this process for
    some specified number of iterations. That’s the whole algorithm.


    If it sounds simple, that’s because it is. Of course, there are many more complex
    details to fill in, but they don’t change the overarching thrust of the program.
    How is “looking similar” measured? Should a shape be modified to try to improve
    its fit? How is the color of the shape selected? What kinds of shapes should be
    used?


    That last question will lead to many different abstract looks for our “paintings.”
    For example, Figure 4-1 utilizes ellipses to approximate a photograph of a hot
    air balloon. (For print readers, see the *figures* directory of the companion
    repository for color versions of the chapter’s images.)


    ![](img/2b670944a6e236c13c5019fe56234a0a_113_0.png)


    Figure 4-1: A hot air balloon with 540 ellipses'
  - '[PAGE 114]


    The figure shows both the original photograph and an “impression” created by our
    program using 540 ellipses over 100,000 iterations, which took 104 seconds to
    complete on my laptop. I think it looks pretty good. Almost impressionistic.


    In my opinion, ellipses give a kind of stained-glass look. It helps if the shape
    used somewhat resembles the contours of the subject in the original photograph,
    like ellipses for the hot air balloon. Figure 4-2 shows the same photograph painted
    using 307 triangles over 100,000 iterations, taking 109 seconds on my laptop.
    In my subjective opinion, it doesn’t look as good.


    ![](img/2b670944a6e236c13c5019fe56234a0a_114_0.png)


    *Figure 4-2: A hot air balloon with 307 triangles*


    While the hot air balloon’s curvaceous exterior doesn’t get filled well by triangles,
    a butterfly does much better. Figure 4-3 is an impression of a photo of a butterfly,
    using 573 triangles generated with 1 million iterations over 4,512 seconds.'
  - '[PAGE 115]


    ![](img/2b670944a6e236c13c5019fe56234a0a_115_0.png)


    Figure 4-3: A butterfly with 573 triangles


    The butterfly image took a bit longer to generate than the average million-iteration
    image because I used the “most common color” method instead of the “average color”
    method—more on that in a bit. The result is that the colors in each shape are
    sharper and blend together less.


    The output can often be improved by utilizing more shapes placed over more iterations,
    and hence more time. However, since this is based on a stochastic (randomly determined)
    process, the results will vary greatly—even with the same settings for the same
    picture. The examples I’m presenting here are cherry-picked.


    Photographs with a lot of detail take the most time to paint with a reasonable
    degree of accuracy. With a tool like this, you have to strike a balance between
    abstraction and recognizability. If an image is too abstract, it won’t be recognizable.
    But if an image has so much detail that it’s almost a perfect replica of the original,
    then it will lose its appeal as a “work of art.” This balance is particularly
    hard to achieve with images of people. For example, Figure 4-4 is an image of
    two of my friends on a beach in Santa Monica, California. It’s composed of 4,212
    ellipses generated with 10 million iterations over 8,262 seconds. My friends look
    only okay as abstract impressions, but the beach looks great!'
- md: "## Command Line Options\n\nThis is a very configurable program with many different\
    \ features and tweakable parameters. In addition to input and output filepaths,\
    \ our ArgumentParser needs to handle all the command line options in Table 4-1.\n\
    \nTable 4-1: Command Line Options for Impressionist\n\n| Option | Extended | Possibilities\
    \ | Default | Description |\n| :--- | :--- | :--- | :--- | :--- |\n| -t | --trials\
    \ | Integer | 10000 | The number of trials to run |\n| -m | --method | 'random',\
    \ 'average', 'common' | 'average' | The method for determining shape colors |\n\
    | -s | --shape | 'ellipse', 'triangle', 'quadrilateral', 'line' | 'ellipse' |\
    \ The shape type to use |\n| -l | --length | Integer | 256 | The length (height)\
    \ of the final image in pixels |\n| -v | --vector | Boolean | False | Create vector\
    \ output? |\n| -a | --animate | Integer | 0 | If a number greater than 0 is provided,\
    \ will create an animated GIF with the provided number of milliseconds per frame,\
    \ showing the image being built up one shape at a time |\n\nOur main file is just\
    \ a codification of Table 4-1. All the options are passed to the constructor of\
    \ the Impressionist class, which we'll come back to in a bit.\n\n```\n# Impressionist/__main__.py\n\
    from argparse import ArgumentParser\nfrom Impressionist.impressionist import Impressionist,\
    \ ColorMethod, ShapeType\n\nif __name__ == \"__main__\":\n    # Parse the file\
    \ argument\n    argument_parser = ArgumentParser(\"Impressionist\")\n    argument_parser.add_argument(\"\
    image_file\", help=\"The input image\")\n    argument_parser.add_argument(\"output_file\"\
    , help=\"The resulting abstract art\")\n    argument_parser.add_argument('-t',\
    \ '--trials', type=int, default=10000,\n                                help='The\
    \ number of trials to run (default 10000).')\n    argument_parser.add_argument('-m',\
    \ '--method',\n                                choices=['random', 'average', 'common'],\
    \ default='average',\n                                help='Shape color determination\
    \ method (default average).')\n    argument_parser.add_argument('-s', '--shape',\
    \ choices=['ellipse', 'triangle',\n                                          \
    \                'quadrilateral', 'line'],\n                                default='ellipse',\
    \ help='The shape type (default ellipse).')\n    argument_parser.add_argument('-l',\
    \ '--length', type=int, default=256,\n                                help='The\
    \ length of the final image in pixels (default 256).')\n    argument_parser.add_argument('-v',\
    \ '--vector', default=False, action='store_true',\n                          \
    \      help='Create vector output. A SVG file will also be output.')\n    argument_parser.add_argument('-a',\
    \ '--animate', type=int, default=0,\n                                help='If\
    \ greater than 0, will create an animated GIF '\n                            \
    \    'with the number of milliseconds per frame provided.')\n    arguments = argument_parser.parse_args()\n\
    \    method = ColorMethod[arguments.method.upper()]\n    shape_type = ShapeType[arguments.shape.upper()]\n\
    \    Impressionist(arguments.image_file, arguments.output_file, arguments.trials,\
    \ method,\n                  shape_type, arguments.length, arguments.vector, arguments.animate)\n\
    ```\n\nThe -v option instructs the program to output the result in a vector format.\
    \ In our implementation, we'll target an SVG file. Before we get into the main\
    \ algorithm of the application, let's take a little detour to see how we can support\
    \ this feature.\n\n## The SVG Format\n\nSVG stands for Scalable Vector Graphics.\
    \ It's an XML-based format for specifying vector images. All modern mainstream\
    \ web browsers and vector drawing programs support it. Instead of using a third-party\
    \ library to write to SVG, we'll write our own short class to do it. The SVG specification\
    \ is large, but we only need a small subset of it to support the shapes that our\
    \ program will output, so the task will be relatively easy.\n\nXML is a text-based\
    \ format, and since we're outputting it, not parsing it, we don't even need our\
    \ program to really understand XML's structure. We just need to amalgamate a string\
    \ out of other strings representing the constituent XML elements. While this approach\
    \ limits the testability and modularity of our SVG writer, the amount of the SVG\
    \ standard we're implementing is so small that it's almost trivial to hand check\
    \ for correctness. That said, this approach isn't production suitable.\n\nBefore\
    \ we get into the code, here's an example of a simple SVG file that our program\
    \ can output. This one has just one triangle built using the polygon element,\
    \ plus the background rectangle (I've slightly improved the formatting with a\
    \ couple of indentations for readability):\n\n```\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<svg version=\"1.1\" baseProfile=\"full\" width=\"342\" height=\"256\"\
    \n     xmlns=\"http://www.w3.org/2000/svg\">\n    <rect width=\"100%\" height=\"\
    100%\" fill=\"rgb(108, 98, 91)\" />\n    <polygon points=\"201,3 24,9 162,182\
    \ \" fill=\"rgb(128, 120, 112)\" />\n</svg>\n```\n\nIf you save this code in a\
    \ text file with the .svg extension, you can open it using a web browser or vector\
    \ image editor to see the resulting triangle. As we walk through creating our\
    \ SVG class, keep this example in mind to visualize how the different elements\
    \ come together to form a complete SVG file.\n\nAn SVG file starts with a declaration\
    \ that it's an XML file, and then the first element is an svg element that describes\
    \ the version of the SVG specification and the width and height of the image.\
    \ In addition, every image our program generates is backed by a big rectangle\
    \ containing the average color of the image. This helps the algorithm blend better.\
    \ Our SVG file therefore also starts with a big rect element:\n\n```\n# Impressionist/svg.py\n\
    class SVG:\n    def __init__(self, width: int, height: int, background_color:\
    \ tuple[int, int, int]):\n        self.content = '<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\\n' \\\n            f'<svg version=\"1.1\" baseProfile=\"full\" width=\"\
    {width}\" ' \\\n            f'height=\"{height}\" xmlns=\"http://www.w3.org/2000/svg\"\
    >\\n' \\\n            f'<rect width=\"100%\" height=\"100%\" fill=\"rgb{background_color}\"\
    \ />'\n```"
