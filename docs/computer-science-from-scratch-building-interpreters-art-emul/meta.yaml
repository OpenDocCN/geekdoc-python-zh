    \ there were no optimizations at all, and the application was completely single\
    \ threaded and CPU bound. Amazingly, the also unoptimized, but much simpler, KNN\
    \ algorithm implementation in this chapter outperforms it in both speed and accuracy.\n\
    \nThis anecdote speaks to two important lessons: the more complex algorithm isn't\
    \ always the better algorithm for a particular application, and it's important\
    \ to do some research to be well informed about what algorithms are used for what\
    \ applications. That's why I've included a \"Real-World Applications\" section\
    \ at the end of every chapter in this book.\n\nKnowing your algorithmic options\
    \ is important across many domains. To that end, one of the benefits of reading\
    \ a survey book like this is that it introduces you to new algorithms and techniques\
    \ that you may not have known about before. That way, when you encounter a problem\
    \ that they're applicable to, you'll be ready.\n\n## Real-World Applications\n\
    \nKNN can be a great tool to start with when attempting to do regression, because\
    \ it’s so easy to use. There’s very little tuning necessary, unlike with a neural\
    \ network, and because there’s effectively no training involved, a KNN-based application\
    \ is trivial to stand up.\n\nResearchers have really used KNN to predict hospital\
    \ stay lengths, as described in the beginning of the chapter. Pei, Lin, and Chen\
    \ found that KNN was approximately as accurate as more sophisticated techniques\
    \ like logistic regression or random forest for predicting COVID-19 patients’\
    \ hospital stay length.² I was able to find multiple other studies in the same\
    \ domain that used KNN. KNN regression has also been used for applications in\
    \ text mining, agriculture, and financial markets.³ It makes intuitive sense—events\
    \ or data points from the past that are most similar to what’s currently happening\
    \ are likely to be the most helpful in making predictions.\n\nDue to performance\
    \ issues, KNN doesn’t work well when the data is noisy or the dataset is too large\
    \ in terms of number of points and dimensionality. For most applications, however,\
    \ it’s a reasonable starting point to consider.\n\n## Exercises\n\n1. Prove (or\
    \ disprove) that KNN is effective for fish weight prediction by running it against\
