    \ dataset.\n3. Use either our implementation of KNN regression or that from a\
    \ library like scikit-learn to try to make predictions using a dataset of your\
    \ own interest.\n\n## Notes\n\n1. See https://github.com/davecom/SwiftSimpleNeuralNetwork.\n\
