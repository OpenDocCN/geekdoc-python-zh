    # # 3


    # ## RETRO IMAGE PROCESSING


    ![](img/2b670944a6e236c13c5019fe56234a0a_86_0.png)


    What do you do when you need to show an image on a display with fewer colors than
    are in the image itself? Solving that problem is the realm of dithering algorithms,
    which strategically use a limited color palette to create the illusion of more
    colors. In this chapter, we’ll write a program that can take any modern photo
    and display it on a classic monochrome Macintosh. It will convert the photo to
    a dithered 1-bit black-and-white version of itself and export it to a format that
    an early Macintosh can read: MacPaint. Along the way, we’ll learn a dithering
    algorithm, a compression algorithm, and a bit about file formats.'
  - '[PAGE 87]


    # What Is Dithering?


    *Dithering algorithms* purposely introduce noise into an image in a specific way
    that makes the image appear to have more color depth than it actually does. This
    trick on the human eye has both practical and artistic applications. If you’ve
    ever seen full-motion graphics on an early 1990s game console or computer, then
    you probably have a sense of what dithering looks like. The technique is also
    prevalent in animated GIFs, since GIFs can only support 256 colors. (There’s a
    hacky way to get more than 256 colors in a GIF, but most export programs don’t
    support it.)


    If you look at Figure 3-1, you’ll see the same image in JPEG and GIF formats.
    The JPEG has 45,807 colors, while the GIF has just 256. Thanks to dithering, it’s
    not as easy to see the difference as you might expect. (If you’re reading this
    book in print, see the *figures* directory of the book’s GitHub repository for
    color versions of the images.)


    ![](img/2b670944a6e236c13c5019fe56234a0a_87_0.png)


    Another common use of dithering and techniques like it is to make a black-and-white
    image appear to be grayscale. Newspapers have done something similar to dithering
    (a technique called *halftone*) for a long time to make their purely black-and-white
    printers reproduce photographs. On computing devices, dithering allows for images
    that have depth, even on a 1-bit screen that can only show two colors (typically
    black and white). It’s a technique that’s still relevant today. For example, the
    Panic Playdate, a game console released in 2022, has a 1-bit black-and-white screen.
    Most Amazon Kindle devices support 16 levels of grayscale, so many book covers
    and photographs displayed on the Kindle must be approximated via dithering (albeit
    not 1-bit dithering).


    The original 1984 Apple Macintosh had a 1-bit black-and-white screen, as did several
    subsequent models. In fact, Apple continued to sell 1-bit Macintoshes right up
    until the Classic II was discontinued in 1993, and the company only stopped providing
    user support for the Classic II in 2001. During those 17 years of supported life,
    third-party developers created plenty of cool graphics for monochrome Macintoshes,
    and they did this using dithering algorithms.


    We’ll target those classic monochrome Macintoshes in our project, along with a
    beloved graphics editor that they ran, MacPaint. Figure 3-2'
  - '[PAGE 88]


    shows the end result: the image from Figure 3-1 displayed on MacPaint running
    on a Mac Plus emulator. (The 1986 Mac Plus was a slight evolution of the original
    1984 Macintosh but had the same screen constraints.) The figure was created using
    the program built in this chapter.


    ![](img/2b670944a6e236c13c5019fe56234a0a_88_0.png)


    Figure 3-2: The beach scene from Figure 3-1, converted by our program to display
    in MacPaint


    You may notice the beach scene is more “zoomed in” in Figure 3-2 than it is in
    Figure 3-1. For Figure 3-1, I first scaled the scene to a lower resolution so
    that both versions could fit next to each other in the same figure (I used software
    to count the colors of the lower-resolution versions). I ran the original full-resolution
    image through our program to convert it to MacPaint for Figure 3-2. MacPaint is
    limited to documents that are 576 pixels wide by 720 pixels tall, so as we’ll
    see, our program will always first resize images to fit within that constraint.
    However, MacPaint’s display window on a Mac Plus is even smaller because a Mac
    Plus display is only 512 pixels across and some of those pixels are taken up by
    the toolbar. Therefore, we’re only seeing roughly 400 of the 576 pixels across
    in Figure 3-2. The full height of the image is also obscured.


