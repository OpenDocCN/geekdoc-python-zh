    # Formalizing NanoBASIC''s Syntax


    A programming language''s syntax is formally defined by a *grammar*. Backus–Naur
    form (BNF) is the typical way the grammar of a programming language is specified.
    There are many extensions and augmentations of BNF; we''ll use a form of it that
    I think will be very clear to intermediate programmers because it includes some
    regular expression–like syntax.


    A grammar consists of a set of production rules that define what''s allowable
    syntax in the programming language. The term *production rule* sounds fancy, but
    it''s just a way of substituting one thing for another. Let''s say I was creating
    a grammar for a language that could only consist of the letters A and B and the
    numbers 1 and 2. Its production rules may look like this:


    ```

    <expression> ::= (<letter> | <number>)*

    <letter> ::= ''A'' | ''B''

    <number> ::= ''1'' | ''2''

    ```


    An identifier wrapped in angle brackets, like `<expression>`, is a *non-terminal*.
    This is an item in a grammar that, when expanded, is replaced by something else.
    What it gets replaced by is specified by the right side of its production rule.
    In a production rule, the `::=` symbol separates a'
