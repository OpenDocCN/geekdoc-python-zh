    \ of Engineering Research and Applications* 3, no. 5 (2013): 605–610, https://www.ijera.com/papers/Vol3_issue5/DI35605610.pdf.\n\
    \n## AFTERWORD\n\n![](img/2b670944a6e236c13c5019fe56234a0a_254_0.png)\n\nThank\
    \ you for reading *Computer Science from Scratch*. This afterword provides more\
