- md: "Why do we need a flag to track whether drawing a sprite causes a previously\
    \ lit screen pixel to be turned off? It’s effectively a form of collision detection.\
    \ If a sprite hits something that was already on the screen, that’s particularly\
    \ helpful to know in a game. For example, if you are programming a tennis game,\
    \ you would want to know when the ball moves and hits a racket already on the\
    \ screen.\n\n## Instruction Execution\n\nNow it’s time for the heart of the VM.\
    \ We have one method left, but it’s a big one: we need to implement all of the\
    \ VM’s instructions. This isn’t dissimilar to executing the statements in our\
    \ interpreters in Chapters 1 and 2. Whether executing interpreter statements,\
    \ VM instructions, or microprocessor opcodes in an emulator, we need to do something\
    \ pretty simple: recognize what the next instruction is and then execute a different\
    \ few lines of code that manipulate the state of the VM based on its intended\
    \ operation.\n\nFor example, if we see an add instruction, we should add the two\
    \ specified numbers together and store the result in a specified location. If\
    \ we see a jump instruction, we should move execution to a specified location\
    \ in memory. It’s literally about recognizing what instruction is being executed\
    \ and changing a few state variables representing memory, registers, and the like\
    \ based on that instruction. The simplest way to do this would be with a large\
    \ number of if statements. The pseudocode may look like this:\n\n```\nif instruction\
    \ == ADD:\n    add some numbers together and store the sum\nelif instruction ==\
    \ JUMP:\n    jump to a location by changing the program counter\nelif instruction\
    \ == DRAW:\n    draw the sprite where specified by changing the display buffer\n\
    etc.\n```\n\nBeyond using a bunch of if statements, there are three common patterns\
    \ for writing the code that executes the instructions. The first is a giant switch\
    \ statement, a construct present in many languages but not quite in Python in\
    \ the same form. I assume most readers have seen a switch statement before in\
    \ a language like C or Java. If you haven’t, you can think of it as a primitive\
    \ form of Python’s match statement like we used in Chapters 1 and 2. The case\
    \ of the switch statement that executes is dependent on the instruction. This\
    \ is somewhat similar to the pseudocode just shown. In fact, prior to the introduction\
    \ of the match statement in Python 3.10, the way you would implement this pattern\
    \ in Python was indeed with a ton of if and elif clauses. This is the simplest\
    \ way to implement instruction execution, but it can become unwieldy for a large\
    \ instruction set.\n\nThe next pattern is to use a jump table, which consists\
    \ of an array of function pointers. We index into the array depending on the instruction\
    \ and then execute the appropriate function that’s returned. Instructions are\
    \ just integers, which is why they can be used as array indices. If the instructions\
    \ were strings for some reason, we could instead use a dictionary where the keys\
    \ are instructions and the values are function pointers, although this is a bit\
    \ less efficient. Because this pattern divides the work across many helper functions,\
    \ it generally results in cleaner code than a giant switch statement and may be\
    \ preferred for a larger instruction set.\n\nThe third pattern is to use *dynamic\
    \ recompilation*, where we translate each instruction into an instruction that\
    \ the underlying hardware understands (or something that can further be translated\
    \ into such). For example, if we have an addition instruction in the VM running\
    \ on an x86 microprocessor, we may translate the VM's addition instruction into\
    \ the machine code for an equivalent x86 addition instruction. This is the most\
    \ complicated pattern to implement because it requires intimate knowledge of not\
    \ just the original instruction set but also the instruction set being translated\
    \ into. It will, however, result in the fastest performance.\n\nIn this program,\
    \ we'll use a giant match statement since CHIP-8's instruction set is relatively\
    \ small. When we create an NES emulator in the next chapter, we'll use a jump\
    \ table because the 6502 microprocessor has an instruction set that's roughly\
    \ double the size (although still much smaller than almost any other microprocessor).\
    \ Dynamic recompilation is a significantly more complicated technique and beyond\
    \ the scope of this book.\n\nThe step() method is responsible for executing instructions,\
    \ but first the method needs to retrieve the next instruction to execute:\n\n\
    ```\ndef step(self):\n    # We look at the opcode in terms of its nibbles (4 bit\
    \ pieces)\n    # Opcode is 16 bits made up of next two bytes in memory\n    first2\
    \ = self.ram[self.pc]\n    last2 = self.ram[self.pc + 1]\n    first = (first2\
    \ & 0xF0) >> 4\n    second = first2 & 0xF\n    third = (last2 & 0xF0) >> 4\n \
    \   fourth = last2 & 0xF\n\n    self.needs_redraw = False\n    jumped = False\n\
    ```\n\nThe next instruction is located at the memory address stored in the program\
    \ counter (pc). Since instructions consist of 16 bits, we retrieve the next 2\
    \ bytes at pc and store them in first2 and last2. As discussed earlier, it's convenient\
    \ to think about each CHIP-8 instruction as a combination of four nibbles, since\
    \ each individual nibble is meaningful for many of the instructions. We store\
    \ the nibbles in first, second, third, and fourth. All of the pattern-matching\
    \ around our instructions will be in terms of nibbles.\n\nAs we execute the instruction,\
    \ we'll also be keeping track of whether it requires any redrawing through needs_redraw\
    \ and whether it modified pc through jumped. The run loop uses needs_redraw as\
    \ an optimization. Why do any drawing when nothing changed? Keeping track of jumped\
    \ allows for some common code to be at the bottom of step(), reducing a little\
    \ bit of code duplication.\n\nNow we arrive at the actual instructions. The giant\
    \ match statement is upon us. Our implementation utilizes Python's elegant match\
    \ syntax to capture the nibbles that are necessary for the execution of an instruction\
    \ in temporary variables. The details of each instruction's execution follow directly\
    \ from its description earlier in the chapter. Many of the instructions are able\
    \ to be implemented in just a single line of code. It would be exceedingly dry\
    \ to write about each of them in turn. Instead, what follows is a reproduction\
    \ of the rest of step(), with comments providing a bit of additional context.\n\
    \nBefore you look at the code, though, this is a good place to stop and try to\
    \ implement the instructions yourself. You don't have to use a match statement.\
    \ You could use a series of if...elif statements as I did in Python 3.9 before\
    \ the match statement existed. (I tested and there was virtually no performance\
    \ difference between the two.) You already have all the setup you need to be able\
    \ to concentrate only on what each instruction is supposed to do instead of configuring\
    \ the system's memory or register representation. You don't need to think about\
    \ loading the ROM file or what some constants should be. Just think about logic\
    \ and how each operation would modify the VM's state.\n\nSome of the descriptions\
    \ of the instructions earlier in this chapter were fairly brief, but you can find\
    \ more detailed instructions in any of a myriad of CHIP-8 references online. Don't\
    \ spend too much time on a single instruction, though. You can always look at\
    \ the implementation here if you get stuck. After you try writing your own instruction\
    \ implementations, you can return to this book's code to double-check your work.\
    \ Doing this work yourself first will give you a good idea of what goes into writing\
    \ a simple VM or emulator. Don't be afraid: you'll be amazed at how simple it\
    \ is to implement many of the instructions. Remember, the original CHIP-8 VM fit\
    \ in just 512 bytes of memory!\n\n```\nmatch (first, second, third, fourth):\n\
