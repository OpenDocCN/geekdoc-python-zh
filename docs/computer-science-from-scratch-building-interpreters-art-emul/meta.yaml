    \ = 0\n    while (((same := take_same(data, index + not_same)) == 0)\n       \
    \    and (index + not_same < len(data))):\n        not_same += 1\n```\n\nWe iterate\
    \ through each row's data 1 byte at a time, with index keeping track of the current\
