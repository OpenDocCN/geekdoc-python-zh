    # 关于作者


    大卫·科佩克是奥尔布赖特学院的计算机科学副教授。他在担任软件开发人员（专注于iOS应用开发）后，于2016年加入学术界。他是四本技术书籍的作者，其中包括*《Python经典计算机科学问题》*，该书已被翻译成八种语言并在全球出版。科佩克是一位狂热的应用开发者和播客主持人，与妻子和三个孩子住在宾夕法尼亚州的怀奥米辛。


