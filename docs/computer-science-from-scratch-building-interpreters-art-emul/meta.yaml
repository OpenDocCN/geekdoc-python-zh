    From the documentation that came with the OCR dataset (see the bottom of *KNN/datasets/digits/readme.txt*),
    we know that the authors tested the accuracy of the dataset themselves using KNN
    with various different values of *k*. They found the highest accuracy, 98 percent,
    with *k* set to 1. The test output of our classifier matches that. That means
    it works!


    > ### CODE MEETS LIFE


    A couple years ago I found myself teaching an introductory course on artificial
    intelligence to a group of senior undergraduates. I split the course into two
    halves. The first half covered what we termed at the beginning of this chapter
    “traditional AI,” including algorithms like A* and MiniMax (both of which you
    can find in my prior book *Classic Computer Science Problems in Python*) and concepts
    like expert systems. The second half was dedicated to machine learning. I used
    KNN as the first example of a machine learning algorithm thanks to its extreme
    simplicity. It served as a great transition into the world of machine learning,
    which is why I came to believe it could do the same for the readers of this book.


    Since then, my department has used KNN as a teaching demo presentation topic for
    candidates coming to campus to interview to become new computer science faculty.
    They’re told the presentation topic at least a week before they come to campus
    and have a chance to prepare. KNN works well as a topic for this purpose because,
    while there are many possible extensions and improvements to the core algorithm,
    the core algorithm itself shouldn’t take very long to explain, and even an audience
    of unfamiliar faculty or first-year students should be able to comprehend it.
    It’s a great gauge of whether someone is ready to be a good instructor.


