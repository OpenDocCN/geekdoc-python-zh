    \        # Create machinery that we are testing\n        rom = ROM(self.test_folder\
    \ / \"nestest\" / \"nestest.nes\")\n        ppu = PPU(rom)\n        cpu = CPU(ppu,\
    \ rom)\n        # Set up tests\n        cpu.PC = 0xC000  # special starting location\
    \ for tests\n        with open(self.test_folder / \"nestest\" / \"nestest.log\"\
    ) as f:\n            correct_lines = f.readlines()\n        log_line = 1\n   \
    \     # Check every line of the log against our own produced logs\n        while\
    \ log_line < 5260:  # go until first unofficial opcode test\n            our_line\
    \ = cpu.log()\n            correct_line = correct_lines[log_line - 1]\n      \
    \      self.assertEqual(correct_line[0:14], our_line[0:14],\n                \
