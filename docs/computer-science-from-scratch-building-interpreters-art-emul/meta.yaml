    \ (((same := take_same(data, index + not_same)) == 0)\n           and (index +\
    \ not_same < len(data))):\n        not_same += 1\n```\n\n我们逐字节遍历每一行的数据，`index`\
    \ 跟踪当前正在检查的字节。收集两个计数：`same`（使用所谓的海象运算符 `:=` 动态初始化）是一行中相同项目的数量，`not_same` 是字面序列的长度。它们在\
