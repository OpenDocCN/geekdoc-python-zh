    \   f\"but got {self.current}.\", self.current)\n```\n\n像 consume() 这样的辅助函数（有时也称为\
    \ eat() 或 accept()）在解析器中很常见，因为检查一个标记是否是期望的标记并在它是时继续前进，这是一个非常常见的模式。如果我们没有 consume()，你会看到很多不必要的重复代码。\n\
    \n我们的解析器的目标是生成一个 AST，运行时可以遍历它来执行 NanoBASIC 程序。AST 的根将是一个语句列表。另一种思考方式是，NanoBASIC\
