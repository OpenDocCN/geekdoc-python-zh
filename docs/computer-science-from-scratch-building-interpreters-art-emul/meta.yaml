    **ZEROPAGE_X** This is like ABSOLUTE_X, but within the first 256 bytes of memory.

    **ZEROPAGE_Y** This is like ABSOLUTE_Y, but within the first 256 bytes of memory.


    The ZEROPAGE modes may seem redundant to the ABSOLUTE modes, but there’s a nice
    optimization here: since the zero page in memory is only 256 bytes, it requires
    only a single data byte to specify an address within it. This saves a cycle of
    CPU time (a second address byte doesn’t need to be fetched) when executing an
    instruction that utilizes the zero page. Instructions in ZEROPAGE mode are therefore
    faster than other instructions that access memory. In fact, 6502 programmers sometimes
    treat the 256 memory slots in the zero page like additional registers since they’re
    so fast to read and write. This helps make up for how few actual registers the
    6502 has.


    Now that we can form memory addresses, we’re closer to reading and writing memory,
    but we also need some knowledge of the NES’s different memory regions—which addresses
    map to RAM, which to the PPU, and so on. It’s important to note that many NES
    memory regions contain extensive mirroring. For example, the first 2KB in the
    memory map, or addresses up to 0x8000 in hexadecimal, are mapped to the CPU’s
    RAM, but any address accessed below 0x2000 maps to that same RAM because the 2KB
    repeats four times up until 0x2000. In other words, address 0x801 is the same
    as address 0x001, and so are addresses 0x1001 and 0x1801 (2 × 0x800 in hexadecimal
    is 0x1000, and 3 × 0x800 is 0x1800).


    This mirroring was a result of hardware peculiarities of the NES in order to cut
    costs. For example, not all of the 6502’s memory hardware lines, which you can
    think of as wires, were needed to address that measly 2KB of RAM, so some of the
    hardware lines were simply ignored. To illustrate, 0x800 is 2,048 in decimal and
    10000000000 in binary. Each digit in the binary can be thought of as a signal
    carried by a hardware line. To address the first 2,048 addresses, you only need
    11 hardware lines, which correspond to the 11 trailing 0s in our number. Those
    11 hardware lines are enough for 2,048 different values, decimal values 0 through
    2,047. The 12th hardware line, represented by the 1 in the binary, can just be
    ignored. In other words, 0x800 maps to 12 hardware lines, but only 11 of those
    hardware lines actually existed, so 0x800 was essentially the same as 0x0.


    Table 6-4 shows the NES CPU’s memory map, as seen by our emulator. It includes
    both regions and individual memory-mapped addresses. Regions and addresses that
    our emulator ignores or doesn’t implement aren’t shown. The table also indicates
    whether a region or address is readable, writable, or both. Finally, it mentions
    if there’s any mirroring.


    There are many addresses and details missing from Table 6-4. For example, our
    simple emulator doesn’t have an APU, but a real NES has memory-mapped addresses
