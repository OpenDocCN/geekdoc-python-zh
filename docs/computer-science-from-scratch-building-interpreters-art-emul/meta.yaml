    from array import array\n\nHeader = namedtuple(\"Header\", \"signature prg_rom_size\
    \ chr_rom_size \"\n                    \"flags6 flags7 flags8 flags9 flags10 unused\"\
    )\n\nHEADER_SIZE = 16\nTRAINER_SIZE = 512\nPRG_ROM_BASE_UNIT_SIZE = 16384\nCHR_ROM_BASE_UNIT_SIZE\
    \ = 8192\nPRG_RAM_SIZE = 8192\n```\n\nThe constructor of the ROM class first utilizes\
    \ the unpack() function from the struct standard library module to read the header\
    \ from the ROM file and distribute it into appropriately sized fields, specified\
    \ by a format string:\n\n```\nclass ROM:\n    def __init__(self, file_name: str\
    \ | Path):\n        with open(file_name, \"rb\") as file:\n            # Read\
    \ header and check signature \"NES\"\n            self.header = Header._make(unpack(\"\
    !LBBBBBBB5s\",\n                                            file.read(HEADER_SIZE)))\n\
    ```\n\nThe ._make() class method on namedtuple can be used to construct an instance\
    \ of that namedtuple out of an iterable, like the one we get back from unpack().\
    \ The specific item types in the unpack() format string are listed in Table 6-2.\
    \ Each item in the format string corresponds to a header element from Table 6-1.\
    \ For more details on the format string, see the struct module's documentation\
    \ at https://docs.python.org/3/library/struct.html#struct-format-strings.\n\n\
    Table 6-2: Format String Characters for the struct Module\n\n| Item | # of bytes\
    \ | C type | Python type |\n| :--- | :--- | :--- | :--- |\n| ! | N/A | Indicates\
    \ what follows is in big-endian format | N/A |\n| L | 4 | unsigned long | int\
