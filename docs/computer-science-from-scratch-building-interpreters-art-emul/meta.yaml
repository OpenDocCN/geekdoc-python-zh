    # 第三部分


    ## 模拟器


    # 5


    ## 构建 CHIP-8 虚拟机


    ![](img/2b670944a6e236c13c5019fe56234a0a_138_0.png)


    在本章中，我们将开发一个名为 CHIP-8 的虚拟机版本。CHIP-8 是个人计算早期时代的一个平台，主要用于游戏。尽管我们的程序将能够运行 CHIP-8
    游戏，但吸引我们的并非游戏本身——而是构建 CHIP-8 虚拟机能让我们学到关于底层编程以及计算机在寄存器和指令层面如何工作的知识。这些见解使得构建 CHIP-8
    虚拟机成为进入编程模拟器世界的一个常见入门步骤。


    ## 虚拟机


    可以将*虚拟机*（VM）想象成一台完全由软件定义的计算机。设计为在 VM 中运行的程序可以在任何实现了该 VM 的平台上运行。这样，VM 实现了真正的可移植软件。


    VM 与模拟器密切相关。*模拟器*是一种假装成硬件的软件。这使得为该硬件编写的程序可以在缺乏该硬件的其他机器上运行。模拟器必须严格遵循原始硬件的规范，以便重新创建运行在模拟器上的、不知情的程序所期望的所有功能。我说*不知情*是因为运行在模拟器上的软件根本不知道它没有运行在真实硬件上；如果程序要正常工作，模拟器最好能完全像原始硬件一样工作。


    VM 也是一种紧密遵循软件运行环境规范的软件。区别在于，模拟器遵循的是硬件规范，而 VM 遵循的规范可能完全以软件术语抽象定义。


    尽管一个是硬件规范，一个是软件规范，但实现一个简单的模拟器与实现一个简单的 VM 非常相似。事实上，它们如此相似，以至于虽然本章完成的项目在技术上是一个 VM
    项目，但它通常被推荐作为第一个模拟项目。如果你是模拟器开发社区的新手，询问应该从哪里开始，CHIP-8 几乎总是答案。


    也许最著名的 VM 是 Java 虚拟机（JVM）。当 Java 在 1990 年代中期首次推出时，其“一次编写，到处运行”的理念被大肆宣传。JVM 为所有主要操作系统（Windows、Linux、Mac
    OS 等）开发，相同的 Java 程序可以编译成 JVM 的原生字节码格式，并在任何装有 JVM 的计算机上无需更改即可运行，无论底层平台如何。这在今天仍然成立，但
    Java 最初的一次编写到处运行的利基市场已在很大程度上被 Web 应用程序所取代。


    CHIP-8 VM 来自更早的时代。在 1970 年代，Joseph Weisbecker 是一位开创性的工程师，他开发了最早的 8 位微处理器之一——RCA
    1802。他和 RCA 使用他的发明构建了一台早期的个人电脑。¹ 他希望有一种方法能用比机器码更高级的语言为这台机器编写游戏程序，因此他开发了 CHIP-8（及其配套的操作码语言）。他的女儿
    Joyce Weisbecker 后来使用 CHIP-8 成为第一位发表作品的女性电子游戏开发者。² 在 1980 年代，CHIP-8 被移植到许多其他平台，包括许多图形计算器。因此，它成为了一个真正可移植的
    VM，类似于我们今天对 VM 的早期思考形式。


    ## CHIP-8 虚拟机


    CHIP-8 VM 最初是为 1970 年代末资源极其有限的个人电脑设计的，例如 COSMAC VIP。COSMAC VIP 于 1977 年发布，配备了一个运行频率低于
    2 兆赫（MHz）的 RCA 1802 8 位微处理器、2KB RAM（可扩展至 4KB）和一个 512 字节的 ROM。它还有用于显示高达 64×128
    分辨率的 1 位图形、读写盒式磁带以及播放蜂鸣声的专用芯片。³


    以今天的标准来看，在像 COSMAC VIP 这样的机器上能编程出有价值的东西是令人惊讶的，然而它就是为电子游戏设计的。事实上，这些游戏甚至通过另一层抽象——CHIP-8
    VM 来运行。那个时代最受欢迎的游戏机 Atari 2600 也是在 1977 年发布的，其规格也在同一范围内。这些限制在当时是家常便饭。


    在编程 VM 或模拟器时，你所使用工具的性能是至关重要的。VM 或模拟器在程序和硬件之间增加了另一层抽象，而每一层抽象通常都会带来一些性能成本。为了达到原始系统的预期速度，必须将开销保持在最低限度，而某些编程语言（或者更确切地说，某些编程语言的主要运行时实现）会成为障碍。这就是为什么通常看到
    VM 和模拟器是用 C、C++ 和 Rust 等低级语言编写的原因。话虽如此，考虑到 CHIP-8 原始目标硬件的局限性，在任何现代系统上创建一个高性能的
    CHIP-8 VM 并不困难。即使是像 CPython 这样相对较慢的编程语言运行时也足够了。你不会想用 Python 或 JVM 来编写一个尖端的游戏机模拟器。但
    CHIP-8 呢？Python 完全可以胜任。


    要理解 CHIP-8，让我们首先讨论它的寄存器和内存布局。然后，在深入实现细节之前，我将概述 VM 可以执行的指令。


    ## 寄存器和内存


    在物理微处理器上，*寄存器*是可用的绝对最快的存储器。它们直接位于微处理器内部，不需要访问另一块芯片的延迟。将数据放入寄存器通常是操作数据的唯一方式，因为微处理器支持的大多数数据操作指令（例如算术运算）都在寄存器内的数据上操作。单独的加载/存储指令在寄存器和外部
    RAM 之间传输数据。


    在寄存器方面，存在一个经典的时间与空间权衡：寄存器是保存数据的最快存储位置，但它们的容量极其有限。例如，1970 年代末的一个典型 8 位微处理器可能只有几个
    8 位寄存器（是的，每个只能保存一个字节），但它可以寻址数十千字节的外部 RAM。


    大多数 VM，如 CHIP-8，也有寄存器，但这些寄存器并不总是直接映射到微处理器上的物理硬件寄存器。因此，它们不一定比 RAM 更快。这可能看起来很奇怪，但寄存器为指令操作提供了一个基础。也没有什么能阻止
    VM 的特定实现将虚拟寄存器映射到真实的硬件寄存器以获得性能提升——只要虚拟寄存器的数量不超过物理寄存器的数量。


    > 注意：在以下讨论中，用于指代 CHIP-8 寄存器的名称与实现中 Python 代码将使用的名称相同。


    CHIP-8 VM 有 16 个通用的 8 位寄存器，称为 v[0] 到 v[15]。它们可以用于任何类型的数据，所有主要的算术和逻辑指令都在这些寄存器上操作。在这些通用寄存器中，v[15]（或十六进制的
    v[0xf]）是特殊的，因为它用于保存标志。索引寄存器 i 用于同时操作多个内存位置，并指示需要绘制到屏幕的数据在内存中的位置。程序计数器 pc 是一个特殊寄存器，用于跟踪下一条要执行的指令的内存地址。


    vs、i 和 pc 构成了主要寄存器，但它们由几个用于计时的伪寄存器支持。这两个字节 delay_timer 和 sound_timer 用于实现游戏中的暂停或指示蜂鸣声应播放多长时间。有专门的指令用于修改这些计时器。所有寄存器列于表
    5-1。这些寄存器最初在 RCA COSMAC VIP CDP18S711 指令手册中描述。⁴


    ### 表 5-1：CHIP-8 寄存器和伪寄存器


    | 寄存器 | 名称 | 描述 |

    |---|---|---|

    | v[0] 到 v[14] | 通用寄存器 | 每个可以保存任何类型的 8 位数据。 |

    | v[15] | 标志寄存器 | 在某些操作后存储一个标志（1 或 0），例如加法后的进位标志。 |

    | pc | 程序计数器 | 跟踪当前正在执行的指令在内存中的 16 位地址。 |

    | i | 内存索引寄存器 | 存储一个 16 位地址，用于完成跨越内存中多个连续位置的指令。 |

    | delay_timer | 延迟计时器 | 存储一个 8 位值，每秒递减 60 次，直到达到 0。 |

    | sound_timer | 声音计时器 | 存储一个 8 位值，每秒递减 60 次，直到达到 0；当其值大于 0 时，计算机扬声器会播放蜂鸣声。 |'
