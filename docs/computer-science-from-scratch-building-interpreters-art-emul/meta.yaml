    Imagine the original gray was 204. The difference would be 255 - 204 = 51. This
    is our error.

    3. Add one-eighth of the error to six specific pixels close to the original pixel.
    This is the diffusion step. In this case, 51 // 8 = 6 (we need to do integer division).
    The pixels adjusted are: one to the right, two to the right, one diagonally down
    and left, one diagonally down and right, one straight below, and one two below.


    Only step 3 is different between Floyd-Steinberg dithering and Atkinson dithering.
    You''ll note that since we''re distributing one-eighth of the error among six
    pixels, we''re only distributing a total of six-eighths or three-quarters of the
    total error. In Floyd-Steinberg dithering, *all* of the error is distributed among
    four nearby pixels. This difference in how the error is distributed gives Atkinson
    dithering a look that seems to emphasize changes in contrast, whereas Floyd-Steinberg
    dithering can have a smoother appearance. Figure 3-3 shows an original image (first
    panel), Atkinson dithering (second panel), and Floyd-Steinberg dithering (third
