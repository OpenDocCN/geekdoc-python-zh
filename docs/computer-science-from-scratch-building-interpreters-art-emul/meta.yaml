  md: 'The instructions are here as a quick reference and to give you a sense of the
    “lay of the land.” We’ll get into the details of how each instruction works in
    the code, but the reality is that most of the code is pretty self-explanatory
    based on the instruction descriptions. The vast majority of instructions can be
    implemented in just a couple lines of Python.


    I spent a lot of time thinking about how to group the instructions for this discussion.
    Ultimately, I decided to order them numerically so that they appear in the same
    order here as they do in the code. Every instruction in CHIP-8 is 16 bits, or
    in other words, 2 bytes or 4 nibbles, so it translates to four hexadecimal digits.
    Any uppercase hexadecimal digit 0–F in an instruction is a literal. Any lowercase
    letter indicates a value that will be used as part of the implementation of the
    instruction. An underscore (_) indicates the nibble is arbitrary. The instructions
    were originally described in the RCA COSMAC VIP CDP18S711 Instruction Manual.⁵


    > NOTE: A few instructions listed here weren’t present in the original CHIP-8
    specification (for example, 8x_6 and 8x_E). Their functionality sometimes differs
    across varying CHIP-8 implementations.


    # Screen Clearing and Basic Jumps


    The first set of instructions are used for cleaning up the entire screen all at
    once and for moving from one part of the program to another part of the program.


    +   - 00E0 Clear the screen.

    - 00EE Return from a subroutine.

    - 0nnn Call the program at nnn, reset the timers and registers, and clear the
    screen.

    - 1nnn Jump to address nnn without resetting.

    - 2nnn Call the subroutine at nnn.


    # Conditional Skips


    The next set of instructions are for jumps to another part of the program if a
    particular condition is true.


    +   - 3xnn Skip the next instruction if v[x] equals nn.

    - 4xnn Skip the next instruction if v[x] doesn’t equal nn.

    - 5xy_ Skip the next instruction if v[x] equals v[y].


    # General-Purpose Register Adjustments, Arithmetic, and Bit Manipulation


    Next come standard instructions that you would find in any CPU or VM for actions
    like doing math, setting registers, and shifting bits.


    +   - 6xnn Set v[x] to nn.

    - 7xnn Add nn to v[x].

    - 8xy0 Set v[x] to v[y].'
  merge: -1
  pgno: 143
- img_proc: true
  md: '8xy1 Set v[x] to v[x] | v[y] (bitwise OR).

    8xy2 Set v[x] to v[x] & v[y] (bitwise AND).

    8xy3 Set v[x] to v[x] ^ v[y] (bitwise XOR).

    8xy4 Add v[y] to v[x] and set the carry flag.

    8xy5 Subtract v[y] from v[x] and set the borrow flag.

    8x_6 Shift v[x] right one bit and set the flag to the least-significant bit.

    8xy7 Subtract v[x] from v[y] and store the result in v[x]; set the borrow flag.

    8x_E Shift v[x] left one bit and set the flag to the most-significant bit.


    # Miscellaneous Instructions


    These instructions don''t quite have a unified subject area, but their opcodes
    are close to one another numerically.


    9xy0 Skip the next instruction if v[x] doesn''t equal v[y].

    Annn Set i to nnn.

    Bnnn Jump to nnn + v[0].

    Cxnn Set v[x] to a random integer (0–255) & nn (bitwise AND).

    Dxyn Draw a sprite that''s n high at (v[x], v[y]); set the flag on a collision.


    # Key and Timer Instructions


    The next batch of instructions are for manipulating the VM''s timers and checking
    on the status of various keys or waiting for a particular key to be pressed.


    Ex9E Skip the next instruction if key v[x] is set (pressed).

    ExA1 Skip the next instruction if key v[x] is not set (not pressed).

    Fx07 Set v[x] to the delay timer.

    Fx0A Wait until the next key press, then store the key in v[x].

    Fx15 Set the delay timer to v[x].

    Fx18 Set the sound timer to v[x].


    # Register i Instructions


    All the instructions in this last set are related to the memory index register
    (i).


    Fx1E Add v[x] to i.

    Fx29 Set i to the location of character v[x] in the font set.

    Fx33 Store the binary-coded decimal (BCD) value in v[x] at memory locations i,
    i + 1, and i + 2. (See the “Binary-Coded Decimal” box on page 122 for more on
    this.)

    Fx55 Dump registers v[0] through v[x] in memory, starting at i.

    Fx65 Store memory from i through i + x in registers v[0] through v[x].'
