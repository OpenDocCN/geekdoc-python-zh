    Figure 4-4: A Santa Monica scene with 4,212 ellipses


    I''ve found that using a line shape works really well for creating paintings of
    people. Because lines are so thin, many more of them are needed to draw an image.
    Figure 4-5 shows a tiny public domain image of John F. Kennedy giving his famous
    speech in Berlin, along with a painted version using 16,633 lines generated with
    10 million iterations over 6,957 seconds.'
  - '[PAGE 117]


    ![](img/2b670944a6e236c13c5019fe56234a0a_117_0.png)


    ![](img/2b670944a6e236c13c5019fe56234a0a_117_1.png)


    Figure 4-5: JFK''s Berlin speech with 16,633 lines


    An interesting aspect of the JFK example is that the program-produced abstract
    version actually has a higher resolution than the original. This is possible because
    the program is working in the world of vector graphics, where math determines
    the output, not pixels. The algorithm isn''t assiduously copying every pixel—it''s
    providing an “impression” of the original with vector shapes.


    Lines produce some of the most stunning abstract results. Figure 4-6 is a New
    York City skyline with the Manhattan Bridge in front via 12,303 lines generated
    with 1 million iterations over 909 seconds.'
