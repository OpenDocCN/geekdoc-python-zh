    > ## C VS. PYTHON


    In a C implementation of a Brainfuck interpreter, the cells can be managed by
    a single pointer to an array of integers. The pointer can be used to initialize
    the memory for the cells and to move from cell to cell, and it can be dereferenced
    to change the value of a cell.


    Some of you may not know C, but I include this point to illustrate the differences
    between programming languages. In C, thanks to the power of pointers, we have
    a single variable construct, whereas we need multiple variables in our Python
    Brainfuck interpreter for the same functionality.


    C pointers are powerful, but they’re also dangerous and difficult to grasp for
    new programmers. Of course, different programming languages come with different
    trade-offs for implementing an interpreter. A C Brainfuck interpreter will also
    be much faster than a Python Brainfuck interpreter. The main interpreter for Python
    itself, CPython, is written in C.


    Table 1-1 is based on a table from a 2017 talk by Müller describing the commands
    that each character represents.⁴ I’ve translated the C descriptions to Python
    using the variable names just discussed.


    ### Table 1-1: Brainfuck Commands


    | Command | Python equivalent | Description |

    | :--- | :--- | :--- |

    | `>` | `cell_index += 1` | Move one cell to the right. |

    | `<` | `cell_index -= 1` | Move one cell to the left. |

    | `+` | `cells[cell_index] += 1` | Increment current cell. |

    | `-` | `cells[cell_index] -= 1` | Decrement current cell. |

    | `.` | `print(chr(cells[cell_index]), end='''', flush=True)` | Print ASCII value
    of current cell. |

    | `,` | `cells[cell_index] = int(input())` | Read value for current cell. |

    | `[` | `if cells[cell_index] == 0: instruction_index = self.find_bracket_match(instruction_index,
    True)` | If the cell is zero, move to the corresponding closing bracket. |

    | `]` | `if cells[cell_index] != 0: instruction_index = self.find_bracket_match(instruction_index,
    False)` | If the cell is nonzero, move to the corresponding opening bracket. |


    Using Table 1-1, we have enough information to step through a Brainfuck program
    and understand what it’s doing. We’ll consider a simple program that outputs a
    user-specified single character a user-specified number of times. Here’s the whole
