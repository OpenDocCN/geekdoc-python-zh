- md: "## Table 6-4: A Simplified NES Memory Map\n\n| Address or region | Length |\
    \ Description | Read/write | Mirroring? |\n|---|---|---|---|---|\n| 0x0000–0x1FFF\
    \ | 0x800 | Main 2KB of CPU memory | RW | Yes, first 0x800 is mirrored up to 0x2000\
    \ |\n| 0x2000–0x3FFF | 0x8 | 8 PPU registers | Varies | 0x2000 through 0x2007\
    \ are mirrored every 8 bytes |\n| 0x4014 | 0x1 | DMA transfer of sprite data |\
    \ W | No |\n| 0x4016 | 0x1 | Joypad 1 status | RW | No |\n| 0x6000–0xFFFF | Varies\
    \ by cartridge | Cartridge memory | Varies | Varies |\n\nSpecifics of cartridge\
    \ memory are in \"Emulating the Cartridge\" on page 148. Finally, the CPU’s measly\
    \ 2KB of RAM actually has two important subregions: the fast zero page region\
    \ from 0x0000 to 0x00FF already discussed, and the space typically used for the\
    \ stack from 0x0100 to 0x01FF.\n\nNow that we have some understanding of how the\
    \ memory is divided, we can look at our methods for reading and writing it. We’ll\
    \ start with the `read_memory()` method. It takes a location to read and a memory\
    \ mode, and returns a byte (represented as an int in Python) from that location:\n\
    \n```python\ndef read_memory(self, location: int, mode: MemMode) -> int:\n   \
    \ if mode == MemMode.IMMEDIATE:\n        return location  # location is actually\
    \ data in this case\n    address = self.address_for_mode(location, mode)\n\n \
    \   # Memory map at https://wiki.nesdev.org/w/index.php/CPU_memory_map\n    if\
    \ address < 0x2000:  # main RAM 2KB goes up to 0x800\n        return self.ram[address\
    \ % 0x800]  # mirrors for next 6KB\n    elif address < 0x4000:  # 2000-2007 is\
    \ PPU, mirrors every 8 bytes\n        temp = ((address % 8) | 0x2000)  # get data\
    \ from PPU register\n        return self.ppu.read_register(temp)\n    elif address\
    \ == 0x4016:  # joypad 1 status\n        if self.joypad1.strobe:\n           \
    \ return self.joypad1.a\n        self.joypad1.read_count += 1\n        match self.joypad1.read_count:\n\
    \            case 1:\n                return 0x40 | self.joypad1.a\n         \
    \   case 2:\n                return 0x40 | self.joypad1.b\n            case 3:\n\
    \                return 0x40 | self.joypad1.select\n            case 4:\n    \
    \            return 0x40 | self.joypad1.start\n            case 5:\n         \
    \       return 0x40 | self.joypad1.up\n            case 6:\n                return\
    \ 0x40 | self.joypad1.down\n            case 7:\n                return 0x40 |\
    \ self.joypad1.left\n            case 8:\n                return 0x40 | self.joypad1.right\n\
    \            case _:\n                return 0x41\n    elif address < 0x6000:\n\
    \        return 0  # unimplemented other kinds of IO\n    else:  # addresses from\
    \ 0x6000 to 0xFFFF are from the cartridge\n        return self.rom.read_cartridge(address)\n\
    ```\n\nIf the memory mode is IMMEDIATE, that means the actual data associated\
    \ with the instruction is what's meant to be \"read.\" Remember, our code is abstracted\
    \ to the point where a method for a single instruction is supposed to work with\
    \ any memory mode. In the case of IMMEDIATE mode, we don't need to do any actual\
    \ lookups, so we just return the data associated with the instruction. (The name\
    \ `location` is a little weird here, but it's a good name for everything but IMMEDIATE\
    \ mode.) Otherwise, the location associated with the instruction is converted\
    \ to a memory address using `address_for_mode()`.\n\nAfter obtaining the memory\
    \ address, we use a series of if statements to determine where the memory should\
    \ actually be read from, as per Table 6-4. We account for mirroring by using a\
    \ modulus. Depending on the region, the CPU, the PPU, the joypad, or the cartridge\
    \ may be accessed. The NES had a peculiar way of reading the joypad. Every time\
    \ address 0x4016 is read, the status of a different button of the joypad is returned.\
    \ You therefore need to complete eight reads to know the status of every button.\n\
    \nNext, let's look at writing to memory:\n\n```python\ndef write_memory(self,\
    \ location: int, mode: MemMode, value: int):\n    if mode == MemMode.IMMEDIATE:\n\
    \        self.ram[location] = value\n        return\n\n    address = self.address_for_mode(location,\
    \ mode)\n    # Memory map at https://wiki.nesdev.org/w/index.php/CPU_memory_map\n\
    \    if address < 0x2000:  # main RAM 2KB goes up to 0x8000\n        self.ram[address\
    \ % 0x800] = value  # mirrors for next 6KB\n    elif address < 0x3FFF:  # 2000-2007\
    \ is PPU, mirrors every 8 bytes\n        temp = ((address % 8) | 0x2000)  # write\
    \ data to PPU register\n        self.ppu.write_register(temp, value)\n    elif\
    \ address == 0x4014:  # DMA transfer of sprite data\n        from_address = value\
    \ * 0x100  # address to start copying from\n        for i in range(SPR_RAM_SIZE):\
    \  # copy all 256 bytes to sprite RAM\n            self.ppu.spr[i] = self.read_memory((from_address\
    \ + 1),\n                                               MemMode.ABSOLUTE)\n  \
    \      # Stall for 512 cycles while this completes\n        self.stall = 512\n\
    \    elif address == 0x4016:  # joypad 1\n        if self.joypad1.strobe and (not\
    \ bool(value & 1)):\n            self.joypad1.read_count = 0\n        self.joypad1.strobe\
    \ = bool(value & 1)\n        return\n    elif address < 0x6000:\n        return\
    \  # unimplemented other kinds of IO\n    else:  # addresses from 0x6000 to 0xFFFF\
    \ are from the cartridge\n        # We haven't implemented support for cartridge\
    \ RAM\n        return self.rom.write_cartridge(address, value)\n```\n\nThe `write_memory()`\
    \ method is quite similar to `read_memory()`. It handles IMMEDIATE mode, then\
    \ exchanges a location for an address for the other modes and writes to the appropriate\
    \ location.\n\n## Helper Methods\n\nWe'll round out the CPU class with a series\
    \ of helper methods, starting with these three:\n\n```python\ndef setZN(self,\
    \ value: int):\n    self.Z = (value == 0)\n    self.N = bool(value & 0x80) or\
    \ (value < 0)\n\ndef stack_push(self, value: int):\n    self.ram[(0x100 | self.SP)]\
    \ = value\n    self.SP = (self.SP - 1) & 0xFF\n\ndef stack_pop(self) -> int:\n\
    \    self.SP = (self.SP + 1) & 0xFF\n    return self.ram[(0x100 | self.SP)]\n\
    ```\n\nMany instructions need to set the zero (Z) and negative (N) flags. Instead\
    \ of repeating those couple of lines in the instruction methods, we have `setZN()`.\
    \ The `stack_push()` method puts a new value on the stack. This involves putting\
    \ the value on the stack at the write address and moving the stack pointer. Similarly,\
    \ `stack_pop()` gets a value back from the stack pointer, moves the stack pointer,\
    \ and returns the value.\n\nFor convenience, our CPU class stores the various\
    \ status flags in seven separate Boolean variables, but a real 6502 has one 8-bit\
    \ status register where each flag is a single bit. The BRK, PHP, PLP, and RTI\
    \ instructions need to work with the status register in its bit-centric format,\
    \ so the methods that follow, `status()` and `set_status()`, use bitwise operations\
    \ to translate between the two formats:\n\n```python\n@property\ndef status(self)\
    \ -> int:\n    return (self.C | self.Z << 1 | self.I << 2 | self.D << 3 |\n  \
    \          self.B << 4 | 1 << 5 | self.V << 6 | self.N << 7)\n\ndef set_status(self,\
    \ temp: int):\n    self.C = bool(temp & 0b00000001)\n    self.Z = bool(temp &\
    \ 0b00000010)\n    self.I = bool(temp & 0b00000100)\n    self.D = bool(temp &\
    \ 0b00001000)\n    # https://nesdev.org/the%20'B'%20flag%20&%20BRK%20instruction.txt\n\
    \    self.B = False\n    self.V = bool(temp & 0b01000000)\n    self.N = bool(temp\
    \ & 0b10000000)\n```\n\nFinally, we have a method to handle what happens when\
    \ an NMI is triggered, and a `log()` method for debugging:\n\n```python\ndef trigger_NMI(self):\n\
    \    self.stack_push((self.PC >> 8) & 0xFF)\n    self.stack_push(self.PC & 0xFF)\n\
    \    # https://nesdev.org/the%20'B'%20flag%20&%20BRK%20instruction.txt\n    self.B\
    \ = True\n    self.stack_push(self.status)\n    self.B = False\n    self.I = True\n\
    \    # Set PC to NMI vector\n    self.PC = (self.read_memory(NMI_VECTOR, MemMode.ABSOLUTE))\
    \ | \\\n             (self.read_memory(NMI_VECTOR + 1, MemMode.ABSOLUTE) << 8)\n\
    \ndef log(self) -> str:\n    opcode = self.read_memory(self.PC, MemMode.ABSOLUTE)\n\
    \    instruction = self.instructions[opcode]\n    data1 = \"  \" if instruction.length\
    \ < 2 else f\"{self.read_memory(self.PC + 1,\n                               \
    \                                 MemMode.ABSOLUTE):02X}\"\n    data2 = \"  \"\
    \ if instruction.length < 3 else f\"{self.read_memory(self.PC + 2,\n         \
    \                                                       MemMode.ABSOLUTE):02X}\"\
    \n    return f\"{self.PC:04X}  {opcode:02X} {data1} {data2}  {instruction.type.name}{29\
    \ * ' '}\" \\\n           f\"A:{self.A:02X} X:{self.X:02X} Y:{self.Y:02X} P:{self.status:02X}\
    \ SP:{self.SP:02X}\"\n```\n\nAn NMI sends execution to a code block at the address\
    \ specified in `NMI_VECTOR`. When an NMI is triggered, similar to BRK and JSR\
    \ instructions, we need to put a bookmark down so that we can come back to where\
    \ we were before the NMI took us away. That's the purpose of pushing PC and status\
    \ to the stack.\n\nImplementing the CPU involved writing a lot of code to a specification—a\
    \ specification that's long but made of many small, relatively easy-to-digest\
    \ pieces. The last part of the emulator that we need to implement is the PPU,\
    \ and it will feel quite different. There's still a specification with a lot of\
    \ details, but those details come together to essentially do just two big things:\
    \ draw background tiles and draw sprites.\n\n## Understanding the PPU\n\nImplementing\
    \ the PPU is the most complex part of an NES emulation project. The PPU is responsible\
    \ for drawing the graphics on the screen. For the purposes of our simple emulator,\
    \ we can think about the graphics as having two aspects: the background and the\
    \ sprites."
  mdcn: "## 表 6-4：简化的 NES 内存映射\n\n| 地址或区域 | 长度 | 描述 | 读/写 | 镜像？ |\n|---|---|---|---|---|\n\
