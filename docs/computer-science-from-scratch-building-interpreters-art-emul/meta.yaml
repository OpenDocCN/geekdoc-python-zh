    7. See https://github.com/fogleman/nes.

    8. James Wallace and Jim Erickson, *Hard Drive: Bill Gates and the Making of the
    Microsoft Empire* (HarperBusiness, 1993).'
- md: '## PART IV


    ### SUPER-SIMPLE MACHINE LEARNING


    ## 7


    ### CLASSIFICATION WITH K-NEAREST NEIGHBORS


    This chapter will introduce *k-nearest neighbors* (KNN), an extraordinarily simple
    machine learning algorithm that can be highly effective for some applications.
    First developed in the 1950s and 1960s,¹ KNN can be used for both *classification*
    (deciding what category something belongs to) and *regression* (predicting a value).
    For readers daunted by the complexities of machine learning, KNN provides an accessible
    yet real-world entry point into the field. In this chapter, we’ll use KNN to solve
    two classification problems with a high degree of accuracy: distinguishing between
    different types of fish and recognizing handwritten digits. Then, in Chapter 8,
    we’ll extend KNN to some related regression problems.


    ### The Rise of Machine Learning


    Going back to the 1950s, traditional artificial intelligence (AI) research was
    chiefly concerned with utilizing algorithms to model human intelligence. Starting
    in the 1990s, however, and especially since the advent of neural networks backed
    by GPU computing in the 2000s, much of the focus of AI research and productization
    has turned to the subfield of machine learning, which uses large datasets to train
    models that can make decisions without needing to reference the human method of
    problem solving. To understand this shift, think of the difference between a chess
    program that evaluates a position based on well-understood heuristics from grandmasters
    and a chess program that evaluates a position based on auto-tuned weights assimilated
    from statistically analyzing millions of games. Indeed, machine learning is heavily
    based on statistics.


    All the exciting machine learning applications we''re familiar with, including
    LLMs, image recognition, and digital assistants, are built using sophisticated
    multilayer neural networks trained on GPUs or specialized neural processors. This
    is known as *deep learning*. To program a deep learning framework from scratch
    you would need a significant understanding of both calculus and statistics. Even
    if you dodge some of that by using a library, you still typically need a huge
    dataset, which is often hard to obtain, and powerful hardware.


    Because of these barriers, programmers interested in getting started with machine
    learning are sometimes intimidated. They''re afraid the math will be too hard
    or they''ll lack the resources needed to develop the application they''re interested
    in. What''s more, some learning programmers like to build their projects from
    the ground up; they don''t want to just `pip install` their way to a solution
    that offers them no understanding about how the underlying process actually works.


    As you''ll see in this chapter, however, machine learning can have a very approachable
    starting point if you don''t jump right into the deep learning deep end. You can
    program the KNN algorithm from scratch and use it to solve real problems, and
    you don''t need a background in mathematics beyond the middle school level to
    understand what you''re doing. The only statistical concept required to implement
    KNN is the idea of a mean (average), and the only other formula you''ll need is
    the Pythagorean theorem to find the Euclidean distance between two points. That''s
    not asking much, right?


    > NOTE: If you want to learn more about neural networks, you can check out Chapter
    7, "Fairly Simple Neural Networks," of my prior book *Classic Computer Science
    Problems in Python* (Manning, 2019).


    ### How KNN Works


    The KNN algorithm makes a simple assumption: the neighbors of a data point are
    likely to be the other data points that have the most in common with it. For example,
    if I’m trying to figure out the disease that a patient has, perhaps other patients
    with the same symptoms and same vital signs are the best clues. Incidentally,
    this is why you probably don’t want a doctor straight out of medical school. More
    experienced doctors can use the obvious heuristic of “I’ve seen other patients
    like this before” to offer you better initial guidance.


    Another way of putting it is that the data points that are closest to an unknown
    value are the likeliest ones to tell us what that unknown value is. Perhaps you’re
    a car dealer, and you want to know if you should spend more marketing dollars
    trying to attract a potential repeat customer by sending her further mailers.
    The customer has filled in a customer satisfaction survey rating various aspects
    of your business. You have a lot of data from prior customers filling in the same
    survey, and you know whether or not they ended up buying another car with you.
    You can compare this potential repeat customer’s survey ratings to the ratings
    of prior customers to find the customers that are the most similar to her in disposition.
    If those prior customers with similar ratings ended up buying another car, you
    know it’s probably worthwhile to spend the money on sending her more marketing
    material. That’s essentially the analysis that KNN does: it lets prior data “vote”
    on a likely value associated with some new data.


    Let’s look at the last example visually along two dimensions. Figure 7-1 is a
    fictionalized dataset of respondents’ ratings on the dealer survey for “Car Happiness”
    and “Dealer Happiness.” Crosses are survey respondents who purchased another car
    from the dealer, triangles are survey respondents who did not, and the round dot
    is the new survey respondent.


    Figure 7-1: Car dealership survey respondents'' data


    How would we classify our new survey respondent? Is she likely to buy another
    car or not? Using KNN, we need to first choose a value for *k*, the *meta-heuristic*.
    This is simply the number of neighbors we''ll look at. If we set *k* to 1, then
    we look at just the data point that''s closest to our unknown value. In Figure
    7-1, with our survey respondent at (6, 8), our next closest data point to compare
    is at (7, 8), and that''s someone who did buy another car. With *k* set to 1,
    we would therefore conclude that it''s worth spending the money to send our new
    respondent some more marketing material.


    But what if *k* is set to a number greater than 1? The typical solution in the
    KNN algorithm is to “vote.” For example, if *k* is 3 in our scenario, you can
    see that the three closest data points would be two that bought a new car and
    one that didn''t. Since the majority bought another car, we would still conclude
    it''s worth spending the money on marketing to the new survey respondent. If *k*
    is set to 2, we would have a problem since one decided to buy another car and
    one didn''t. Then, we would have to have some kind of tie-breaking criterion.


    And that''s it. That''s the whole KNN algorithm for classification. We look at
    $k$ data points close to the data point in question, and we let them vote on what
    our unknown should be. We can thus summarize the KNN algorithm for classification
    as follows:


    1. Choose $k$, the number of neighbors to compare to an unclassified data point.

    2. Find the $k$-nearest neighbors to the data point.

    3. Vote on the classification of the data point based on the classes of the $k$-nearest
    neighbors.


    This simple algorithm requires three clarifications: What does it mean to be a
    “nearest” neighbor? How is the winner of the vote determined? And what is the
    right value for $k$? All these questions may have different answers for different
    applications of KNN.


    “Nearest” is most commonly determined using Euclidean distance. In other words,
    if we drew straight lines on Figure 7-1 between our unclassified point (the round
    dot) and all the other data points on the graph, the shortest lines would determine
    the neighbors. However, for some applications that don''t have numerical data
    points, something like *Hamming distance* (counting the differences) may apply.
    Distance functions other than Euclidean distance are beyond the scope of this
    chapter.


    Voting usually means determining what class a plurality of the nearest neighbors
    belongs to. You need some kind of tie-breaking criterion, though, even if you
    stick to odd numbers for $k$. This is because many applications have more than
    two classes. For instance, what if you have three classes and $k$ is set to 5?
    You may end up with two of the nearest neighbors belonging to class A, two belonging
    to class B, and one belonging to class C. Should the data point in question be
    classified as A or B?


    Determining the right value for $k$ is actually quite straightforward. Unless
    we have some specific domain knowledge to tell us otherwise, we should use the
    value that has been found to be the most accurate in testing. We can test KNN
    with several different values for $k$ with a particular dataset and set of test
    points and see which value is the most useful.


    Those are the basics of classification with KNN. Obviously, there are a lot of
    options and enhancements that can be made beyond this simple outline, but you
    already know enough to implement KNN!


    ### Implementing Classification with KNN


    Like the algorithm itself, our code to implement KNN will be quite simple. But
    before we can get to the algorithm, we need a generic type for representing a
    data point. We''ll create a `DataPoint` class that''s a *protocol*, meaning there
    will be no instances of this type itself, but only of its subclasses. It''s'
  mdcn: '## 第四部分


    ### 超级简单的机器学习


    ## 7


    ### 使用K近邻进行分类


    本章将介绍*k近邻*（KNN）算法，这是一种极其简单的机器学习算法，在某些应用中却能非常有效。KNN最早开发于20世纪50年代和60年代，¹ 既可用于*分类*（决定某物属于哪个类别），也可用于*回归*（预测一个数值）。对于那些被机器学习复杂性吓到的读者来说，KNN提供了一个易于上手且贴近实际的入门途径。在本章中，我们将使用KNN以高准确度解决两个分类问题：区分不同类型的鱼和识别手写数字。然后，在第8章中，我们将把KNN扩展到一些相关的回归问题。


    ### 机器学习的兴起


    回到20世纪50年代，传统的人工智能（AI）研究主要关注利用算法来模拟人类智能。然而，从20世纪90年代开始，特别是自2000年代GPU计算支持的神经网络出现以来，AI研究和产品化的大部分焦点已转向机器学习这一子领域。机器学习使用大型数据集来训练模型，这些模型无需参考人类解决问题的方法就能做出决策。要理解这种转变，可以想想两种国际象棋程序的区别：一种基于大师们广为人知的启发式规则来评估局面，另一种则基于从数百万局棋局的统计分析中自动调整的权重来评估局面。确实，机器学习在很大程度上基于统计学。


    我们熟悉的所有令人兴奋的机器学习应用，包括大语言模型、图像识别和数字助手，都是使用在GPU或专用神经处理器上训练的复杂多层神经网络构建的。这被称为*深度学习*。要从头开始编程一个深度学习框架，你需要对微积分和统计学都有相当深入的理解。即使你通过使用库来避开其中一些内容，你通常仍然需要一个庞大的数据集（这通常很难获得）和强大的硬件。


    由于这些障碍，有兴趣开始学习机器学习的程序员有时会感到畏惧。他们担心数学会太难，或者缺乏开发他们感兴趣的应用程序所需的资源。此外，一些学习编程的人喜欢从头开始构建他们的项目；他们不想仅仅通过`pip
    install`来获得一个解决方案，而对底层实际工作原理一无所知。


    然而，正如你将在本章中看到的，如果你不直接跳入深度学习的深水区，机器学习可以有一个非常平易近人的起点。你可以从头开始编写KNN算法，并用它来解决实际问题，而且你不需要超出初中水平的数学背景就能理解你在做什么。实现KNN所需的唯一统计概念是均值（平均值）的想法，你需要的唯一另一个公式是勾股定理，用于计算两点之间的欧几里得距离。这要求不高，对吧？


    > 注意：如果你想了解更多关于神经网络的知识，可以查看我之前的书《Python经典计算机科学问题》（Manning，2019年）的第7章“相当简单的神经网络”。


    ### KNN的工作原理


    KNN算法基于一个简单的假设：一个数据点的邻居很可能是与它有最多共同点的其他数据点。例如，如果我试图确定病人患了什么疾病，那么具有相同症状和相同生命体征的其他病人可能是最好的线索。顺便说一句，这就是为什么你可能不想要一个刚从医学院毕业的医生。更有经验的医生可以使用“我以前见过类似病人”这种明显的启发式方法，为你提供更好的初步指导。


    换一种说法，最接近未知值的数据点最有可能告诉我们这个未知值是什么。也许你是一个汽车经销商，你想知道是否应该花更多的营销费用，通过向潜在的回头客发送更多邮件来吸引她。这位客户填写了一份客户满意度调查，评估了你业务的各个方面。你有很多先前客户填写同一份调查的数据，并且你知道他们最终是否又在你这里买了车。你可以将这位潜在回头客的调查评分与先前客户的评分进行比较，找到在倾向上与她最相似的客户。如果那些评分相似的先前客户最终又买了一辆车，你就知道花钱给她发送更多营销材料可能是值得的。这本质上就是KNN所做的分析：它让先前的数据为与某些新数据相关的可能值“投票”。


    让我们从两个维度直观地看一下最后一个例子。图7-1是一个虚构的数据集，显示了受访者在经销商调查中对“汽车满意度”和“经销商满意度”的评分。叉号代表从经销商那里又购买了一辆车的受访者，三角形代表没有购买的受访者，圆点代表新的受访者。


    图7-1：汽车经销商调查受访者数据


    我们将如何分类我们的新受访者？她是否可能再买一辆车？使用KNN，我们首先需要为*k*（*元启发式*）选择一个值。这仅仅是我们要查看的邻居数量。如果我们将*k*设置为1，那么我们只查看最接近未知值的数据点。在图7-1中，我们的受访者位于(6,
    8)，下一个最接近的可比较数据点位于(7, 8)，那是一个又买了一辆车的人。因此，如果*k*设置为1，我们会得出结论：值得花钱给我们的新受访者发送更多营销材料。


    但如果*k*设置为大于1的数字呢？KNN算法中的典型解决方案是“投票”。例如，如果在我们的场景中*k*是3，你可以看到三个最接近的数据点中有两个买了新车，一个没有买。由于大多数买了另一辆车，我们仍然会得出结论：值得花钱向新的受访者进行营销。如果*k*设置为2，我们就会遇到问题，因为一个决定再买一辆车，一个没有。那么，我们就需要某种打破平局的标准。


    就是这样。这就是用于分类的整个KNN算法。我们查看与所讨论数据点接近的$k$个数据点，并让它们对我们的未知值应该是什么进行投票。因此，我们可以将用于分类的KNN算法总结如下：


    1.  选择$k$，即要与未分类数据点进行比较的邻居数量。

    2.  找到数据点的$k$个最近邻。

    3.  根据$k$个最近邻的类别对数据点的分类进行投票。


    这个简单的算法需要三点澄清：什么是“最近”邻居？如何确定投票的获胜者？以及$k$的合适值是多少？所有这些问题对于KNN的不同应用可能有不同的答案。


    “最近”最常用欧几里得距离来确定。换句话说，如果我们在图7-1中在未分类点（圆点）和图上所有其他数据点之间画直线，最短的线将决定邻居。然而，对于一些没有数值数据点的应用，可能适用类似*汉明距离*（计算差异）的方法。除欧几里得距离之外的距离函数超出了本章的范围。


    投票通常意味着确定最近邻中多数属于哪个类别。即使你坚持使用奇数作为$k$，你也需要某种打破平局的标准。这是因为许多应用有超过两个类别。例如，如果你有三个类别，而$k$设置为5呢？你可能最终得到两个最近邻属于A类，两个属于B类，一个属于C类。那么所讨论的数据点应该被分类为A还是B？


    确定$k$的合适值实际上相当直接。除非我们有特定的领域知识告诉我们其他情况，否则我们应该使用在测试中发现最准确的值。我们可以用特定的数据集和一组测试点，用几个不同的$k$值测试KNN，看看哪个值最有用。


    以上就是使用KNN进行分类的基础知识。显然，在这个简单的大纲之外还有很多选项和增强功能可以实现，但你已经知道足够多来实现KNN了！


    ### 实现KNN分类


