    I still have some of my childhood drawings saved to disk, which is what got me
    interested in the file format more recently. Amazingly, I couldn’t find any programs
    on my modern Mac that could open the classic MacPaint format. I had to turn to
    LibreOffice or transfer the files to old Macs to view them.


    Then, I found some mysterious MacPaint files that further piqued my interest on
    a floppy disk that had belonged to my brother 30 years ago. They contained strange
    artwork, quite sophisticated for the late 1980s or early 1990s, mixing digitized
    (a 1980s word for scanned and dithered) real-world objects with purely digital
    drawings. I eventually concluded that they were likely either the work of a well-known
    American artist named Robert W. Fichter¹⁰ or the work of someone who admired him.
    They had some of the same motifs and the same exact words as some of Fichter’s
    published pieces.


    Was I in possession of a valuable digital art relict lost to time? How did my
    brother get ahold of these MacPaint files? I called him up. He hadn’t thought
    about them in decades, but he said he got them from some student at the University
    of Maine while he was still in high school. He didn’t know their exact provenance,
    but the student had told him they were very important and had a hidden meaning
    to them. It made sense that the disk came from a university. Perhaps Fichter had
    lectured there, or perhaps they were copied around the sneakernet (this was in
    an era before networking was widespread). I tried contacting Fichter himself,
    but to no avail. Unfortunately, he died in 2023. I still, at the time of writing,
    don’t know if those files are the original digital artwork of Robert W. Fichter.
    If you’re an expert on his work or knew him, please get in touch with me!


    Around the same time, I was thinking about doing a dithering project for this
    book after coming across an article by John Earnest on Atkinson dithering on Hacker
    News.¹¹ I decided that the dithering algorithm on its own was too simple for a
    book chapter, but then I had an idea: the MacPaint format that I had recently
    become so interested in was also a product of Bill Atkinson, and it includes another
    interesting algorithm, run-length encoding. Why don’t I combine the two into a
    single project?


    I didn’t stop there. After writing the code for this chapter, I decided I should
    make MacPaint more accessible to modern Mac users. I ported the code, plus some
    additional dithering algorithms, to Swift and created a nice AppKit-based user
    interface around it. I sell the software as Retro Dither on the Mac App Store.¹²
    As a technical author, usually things you do as professional or hobby projects
    turn into material for a book; it’s not that usual that things go the other way.'
- md: '## Real-World Applications


    Atkinson dithering and MacPaint were just a couple of the technologies that Bill
    Atkinson used to make graphics on the original Macintosh come alive. He was also
    the creator of QuickDraw, which provided the graphics primitives on all Lisa and
    classic Macintosh computers. His immense contributions go far beyond graphics
    too. He made several refinements to elements that we now consider as standard
    widgets in a GUI. Atkinson was also the creator of HyperCard, one of the first
    widely distributed hypertext platforms. You can think about it as a non-networked
    version of the web from the late 1980s. It was very influential.


    You might be curious to know what Bill Atkinson originally developed Atkinson
    dithering for. I was too, so I obtained a copy of a rare book called *Inside MacPaint*
    by Jeffrey S. Young and published by Microsoft Press in 1985. I didn''t exactly
    find my answer, but I found a probable answer. It turns out Atkinson had worked
    on a digitizer for the early Macintosh. It''s basically a kind of scanner that
    allowed you to work with real-world images in MacPaint. While the book doesn''t
    explicitly say it used Atkinson dithering, I can''t imagine that it''s a coincidence.
    It''s likely that the first real-world application of Atkinson dithering was a
    digitizer.


    Dithering was a widely used technique on 1980s and 1990s game consoles and computers,
    which were powerful enough to support digital images but often had a limited color
    palette. And limited-palette devices like the Amazon Kindle and the Panic Playdate
    continue to be dithering strongholds. As mentioned earlier, dithering is also
    how animated GIFs appear to show many more colors than they naturally support.
    Without hacks, a GIF is limited to 256 colors.


    Run-length encoding isn''t limited to MacPaint, of course. It''s a widely used
    compression technique. Any kind of data format that has a lot of repeated characters
    is a candidate for run-length encoding. Beyond MacPaint, it was used as the main
    compression technique in several other bitmap image formats of the 1980s. It''s
    also sometimes combined with other compression techniques to formulate more sophisticated
    meta-algorithms. For example, one component of DEFLATE, the algorithm used in
    ZIP files, utilizes run-length encoding.


    I''ll leave you with a quote from Bill Atkinson, from an interview he did in *Inside
    MacPaint*. He was asked by Jeffrey Young, “What do you consider essential for
    creating a great program?”


    > The whole trick to designing a good program is deciding what things to kick
    out. I had some powerful features that I kicked out to make MacPaint cleaner,
    simpler, more approachable, and less frightening. I probably threw away more code
    than I left in. My goal was a lean, mean, and clean design. The typical programming
    process is 95 percent debugging and only 5 percent real creation. A lot of the
    bugs are simple typos, or just things that a compiler program can really help
    you with. I like to keep my sights focused more on the overall algorithm, because
    that''s where I get the big wins.


    I compare programming to modeling with clay. When you''re throwing a pot on the
    wheel, you want to keep it soft and flexible as long as you can before you fire
    it. Because after you fire it, the pot is a lot harder to scrape into shape.¹³


    ## Exercises


    - 1. Add a command line option that changes our program to use Floyd-Steinberg
    dithering.

    - 2. Try creating an error-diffusion dithering pattern of your own.

    - 3. Write a program that can go the other way, converting a MacPaint file into
    a GIF or PNG.

    - 4. If you completed Exercise 3, write integration tests that check that a MacPaint
    file converted to a GIF or PNG retains the same pixel data as the original.


    ## Notes


    - 1. Erik Sandberg-Diment, “Software for the Macintosh: Plenty on the Way,” *New
    York Times*, January 31, 1984.

    - 2. See https://archive.org/details/mac_Paint_2.

    - 3. “Technical Note PT24: MacPaint Document Format,” Apple, October 1, 1988,
    accessed August 5, 2022, https://web.archive.org/web/20040626093131/http://developer.apple.com/technotes/pt/pt_24.html.

    - 4. See https://www.fileformat.info/format/macpaint/egff.htm.

    - 5. See https://en.wikipedia.org/wiki/PackBits.

    - 6. “Technical Note TN1023: Understanding PackBits,” Apple, November 1, 1987,
    accessed August 4, 2022, https://web.archive.org/web/20030218001420/http://developer.apple.com/technotes/tn/tn1023.html.

    - 7. “MacBinary II Standard,” Stairways.com, July 24, 1987, accessed May 27, 2024,
    https://files.stairways.com/other/macbinaryii-standard-info.txt.

    - 8. See https://en.wikipedia.org/wiki/Mac_OS_Roman.

    - 9. See https://www.gryphel.com/c/minivmac/index.html.

    - 10. See https://en.wikipedia.org/wiki/Robert_W._Fichter.

    - 11. John Earnest, “Atkinson Dithering,” *Beyond Loom*, March 29, 2020, https://beyondloom.com/blog/dither.html.

    - 12. See https://oaksnow.com/retrodither/.

    - 13. Jeffrey S. Young, *Inside MacPaint: Sailing Through the Sea of FatBits on
    a Single-Pixel Raft* (Microsoft Press, 1985), 320.


    # 4


    ## A STOCHASTIC PAINTING ALGORITHM


    ![](img/2b670944a6e236c13c5019fe56234a0a_112_0.png)


    All the other chapters in this book follow a specification such as a programming
    language grammar, a file format, or a machine architecture. This chapter is different.
    In this chapter, we’re going to create art. And it’s going to be subjective. Can
    a simple stochastic algorithm use randomly generated shapes to create drawings
    that resemble human works of art? I think the answer is yes, but you’ll have to
    judge for yourself after you see some of the program’s output.


    ## How It Works


    This chapter’s program works by trying to redraw a photograph from scratch. We
    begin with a blank canvas. We try drawing a single randomly sized and placed colored
    shape. If the shape brings the canvas to look more similar to the photograph,
    then we keep it. Otherwise, we try a different shape. We repeat this process for
    some specified number of iterations. That’s the whole algorithm.


    If it sounds simple, that’s because it is. Of course, there are many more complex
    details to fill in, but they don’t change the overarching thrust of the program.
    How is “looking similar” measured? Should a shape be modified to try to improve
    its fit? How is the color of the shape selected? What kinds of shapes should be
    used?


    That last question will lead to many different abstract looks for our “paintings.”
    For example, Figure 4-1 utilizes ellipses to approximate a photograph of a hot
    air balloon. (For print readers, see the *figures* directory of the companion
    repository for color versions of the chapter’s images.)


    ![](img/2b670944a6e236c13c5019fe56234a0a_113_0.png)


    Figure 4-1: A hot air balloon with 540 ellipses


    The figure shows both the original photograph and an “impression” created by our
    program using 540 ellipses over 100,000 iterations, which took 104 seconds to
    complete on my laptop. I think it looks pretty good. Almost impressionistic.


    In my opinion, ellipses give a kind of stained-glass look. It helps if the shape
    used somewhat resembles the contours of the subject in the original photograph,
    like ellipses for the hot air balloon. Figure 4-2 shows the same photograph painted
    using 307 triangles over 100,000 iterations, taking 109 seconds on my laptop.
    In my subjective opinion, it doesn’t look as good.


    ![](img/2b670944a6e236c13c5019fe56234a0a_114_0.png)


    *Figure 4-2: A hot air balloon with 307 triangles*


    While the hot air balloon’s curvaceous exterior doesn’t get filled well by triangles,
    a butterfly does much better. Figure 4-3 is an impression of a photo of a butterfly,
    using 573 triangles generated with 1 million iterations over 4,512 seconds.


    ![](img/2b670944a6e236c13c5019fe56234a0a_115_0.png)


    Figure 4-3: A butterfly with 573 triangles


    The butterfly image took a bit longer to generate than the average million-iteration
    image because I used the “most common color” method instead of the “average color”
    method—more on that in a bit. The result is that the colors in each shape are
    sharper and blend together less.


    The output can often be improved by utilizing more shapes placed over more iterations,
    and hence more time. However, since this is based on a stochastic (randomly determined)
    process, the results will vary greatly—even with the same settings for the same
    picture. The examples I’m presenting here are cherry-picked.


    Photographs with a lot of detail take the most time to paint with a reasonable
    degree of accuracy. With a tool like this, you have to strike a balance between
    abstraction and recognizability. If an image is too abstract, it won’t be recognizable.
    But if an image has so much detail that it’s almost a perfect replica of the original,
    then it will lose its appeal as a “work of art.” This balance is particularly
    hard to achieve with images of people. For example, Figure 4-4 is an image of
    two of my friends on a beach in Santa Monica, California. It’s composed of 4,212
    ellipses generated with 10 million iterations over 8,262 seconds. My friends look
    only okay as abstract impressions, but the beach looks great!'
  mdcn: '## 现实世界的应用


    阿特金森抖动和 MacPaint 只是比尔·阿特金森用来让初代 Macintosh 图形栩栩如生的几项技术。他还是 QuickDraw 的创造者，该图形系统为所有
    Lisa 和经典 Macintosh 电脑提供了图形原语。他的巨大贡献远不止于图形领域。他对我们现在视为图形用户界面标准部件的多个元素进行了改进。阿特金森还是
    HyperCard 的创造者，这是最早广泛分发的超文本平台之一。你可以将其视为 1980 年代末的非网络版万维网。它极具影响力。


    你可能很好奇比尔·阿特金森最初开发阿特金森抖动是为了什么。我也很好奇，因此我找到了一本名为《*Inside MacPaint*》的稀有书籍，作者是杰弗里·S·杨，由微软出版社于
    1985 年出版。我并没有完全找到答案，但找到了一个可能的答案。原来阿特金森曾为早期 Macintosh 开发过一种数字化仪。它基本上是一种扫描仪，允许你在
    MacPaint 中处理真实世界的图像。虽然书中没有明确说明它使用了阿特金森抖动，但我无法想象这是巧合。很可能阿特金森抖动的第一个现实世界应用就是数字化仪。


    抖动是 1980 年代和 1990 年代游戏机和电脑上广泛使用的技术，这些设备功能足够强大以支持数字图像，但通常调色板有限。而像亚马逊 Kindle 和 Panic
    Playdate 这样调色板有限的设备，至今仍是抖动技术的重要阵地。如前所述，抖动也是动画 GIF 看起来能显示远超其原生支持颜色数量的原因。没有这些技巧，GIF
    仅限于 256 种颜色。


    当然，行程编码并不仅限于 MacPaint。它是一种广泛使用的压缩技术。任何具有大量重复字符的数据格式都是行程编码的候选对象。除了 MacPaint，它在
    1980 年代的其他几种位图图像格式中也被用作主要压缩技术。它有时也与其他压缩技术结合，形成更复杂的元算法。例如，ZIP 文件中使用的 DEFLATE 算法的一个组件就利用了行程编码。


    最后，我引用比尔·阿特金森在《*Inside MacPaint*》中接受采访时的一段话。杰弗里·杨问他：“你认为创造一个伟大程序的关键是什么？”


    > 设计一个好程序的全部诀窍在于决定要剔除哪些东西。我剔除了一些强大的功能，以使 MacPaint 更干净、更简单、更易上手、更不吓人。我可能剔除的代码比保留的还多。我的目标是精简、高效、干净的设计。典型的编程过程是
    95% 的调试和仅 5% 的真正创造。很多错误只是简单的拼写错误，或者编译器程序真正能帮上忙的地方。我喜欢将目光更多地集中在整体算法上，因为那是我获得巨大收益的地方。


    我把编程比作用黏土建模。当你在拉坯机上制作陶罐时，你会希望在烧制之前尽可能长时间地保持其柔软和可塑。因为一旦烧制完成，陶罐就很难再刮削成型了。¹³


    ## 练习


    - 1. 添加一个命令行选项，将我们的程序改为使用 Floyd-Steinberg 抖动。

    - 2. 尝试创建你自己的误差扩散抖动模式。

    - 3. 编写一个程序，实现反向转换，将 MacPaint 文件转换为 GIF 或 PNG。

    - 4. 如果你完成了练习 3，编写集成测试，检查转换为 GIF 或 PNG 的 MacPaint 文件是否保留了与原始文件相同的像素数据。


    ## 注释


    - 1. Erik Sandberg-Diment, “Software for the Macintosh: Plenty on the Way,” *New
    York Times*, January 31, 1984.

    - 2. 参见 https://archive.org/details/mac_Paint_2.

    - 3. “Technical Note PT24: MacPaint Document Format,” Apple, October 1, 1988,
    accessed August 5, 2022, https://web.archive.org/web/20040626093131/http://developer.apple.com/technotes/pt/pt_24.html.

    - 4. 参见 https://www.fileformat.info/format/macpaint/egff.htm.

    - 5. 参见 https://en.wikipedia.org/wiki/PackBits.

    - 6. “Technical Note TN1023: Understanding PackBits,” Apple, November 1, 1987,
    accessed August 4, 2022, https://web.archive.org/web/20030218001420/http://developer.apple.com/technotes/tn/tn1023.html.

    - 7. “MacBinary II Standard,” Stairways.com, July 24, 1987, accessed May 27, 2024,
    https://files.stairways.com/other/macbinaryii-standard-info.txt.

    - 8. 参见 https://en.wikipedia.org/wiki/Mac_OS_Roman.

    - 9. 参见 https://www.gryphel.com/c/minivmac/index.html.

    - 10. 参见 https://en.wikipedia.org/wiki/Robert_W._Fichter.

    - 11. John Earnest, “Atkinson Dithering,” *Beyond Loom*, March 29, 2020, https://beyondloom.com/blog/dither.html.

    - 12. 参见 https://oaksnow.com/retrodither/.

    - 13. Jeffrey S. Young, *Inside MacPaint: Sailing Through the Sea of FatBits on
    a Single-Pixel Raft* (Microsoft Press, 1985), 320.


    # 4


    ## 一种随机绘画算法


    ![](img/2b670944a6e236c13c5019fe56234a0a_112_0.png)


    本书所有其他章节都遵循某种规范，例如编程语言语法、文件格式或机器架构。本章则不同。在本章中，我们将要创造艺术。而且这将是主观的。一个简单的随机算法能否使用随机生成的形状来创作出类似人类艺术作品的图画？我认为答案是肯定的，但在你看到程序的一些输出后，你将不得不自己判断。


    ## 工作原理


    本章的程序通过尝试从头开始重绘一张照片来工作。我们从一张空白画布开始。我们尝试绘制一个随机大小和位置的彩色形状。如果这个形状使画布看起来更像照片，我们就保留它。否则，我们就尝试另一个不同的形状。我们重复这个过程，直到达到指定的迭代次数。这就是整个算法。


    如果听起来很简单，那是因为它确实如此。当然，还有很多更复杂的细节需要填充，但它们并不改变程序的整体思路。“看起来像”是如何衡量的？是否应该修改一个形状以尝试改善其匹配度？形状的颜色是如何选择的？应该使用什么样的形状？


    最后一个问题将导致我们的“绘画”呈现出许多不同的抽象外观。例如，图 4-1 使用椭圆来近似一张热气球的照片。（对于印刷版读者，请参阅配套仓库的 *figures*
    目录以获取本章图像的彩色版本。）


    ![](img/2b670944a6e236c13c5019fe56234a0a_113_0.png)


    图 4-1：一个由 540 个椭圆构成的热气球


    该图展示了原始照片以及我们的程序使用 540 个椭圆经过 100,000 次迭代创建的“印象”，在我的笔记本电脑上耗时 104 秒完成。我认为它看起来相当不错。几乎是印象派风格。


    在我看来，椭圆给人一种彩色玻璃的感觉。如果所使用的形状在某种程度上类似于原始照片中主体的轮廓，会有所帮助，比如用于热气球的椭圆。图 4-2 展示了使用 307
    个三角形经过 100,000 次迭代绘制的同一张照片，在我的笔记本电脑上耗时 109 秒。以我的主观意见来看，它看起来没那么好。


    ![](img/2b670944a6e236c13c5019fe56234a0a_114_0.png)


    *图 4-2：一个由 307 个三角形构成的热气球*


    虽然热气球弯曲的外部轮廓无法被三角形很好地填充，但蝴蝶则表现得好得多。图 4-3 是一张蝴蝶照片的印象，使用了 573 个三角形，通过 100 万次迭代生成，耗时
    4,512 秒。


    ![](img/2b670944a6e236c13c5019fe56234a0a_115_0.png)


    图 4-3：一个由 573 个三角形构成的蝴蝶


    蝴蝶图像的生成时间比平均的百万次迭代图像稍长，因为我使用了“最常见颜色”方法而不是“平均颜色”方法——稍后会详细介绍。结果是每个形状中的颜色更鲜明，混合得更少。


    通过使用更多形状并进行更多迭代（因此需要更多时间），输出通常可以得到改善。然而，由于这是基于一个随机（随机确定）的过程，结果会有很大差异——即使对于同一张图片使用相同的设置也是如此。我在这里展示的例子是精心挑选的。


    细节丰富的照片需要最多的时间才能以合理的精度绘制出来。使用这样的工具，你必须在抽象性和可识别性之间取得平衡。如果图像太抽象，它将无法被识别。但如果图像细节如此之多，以至于几乎是原始图像的完美复制品，那么它作为“艺术品”的吸引力就会丧失。对于人物图像，这种平衡尤其难以实现。例如，图
    4-4 是我的两位朋友在加利福尼亚州圣莫尼卡海滩上的照片。它由 4,212 个椭圆组成，通过 1000 万次迭代生成，耗时 8,262 秒。我的朋友们作为抽象印象看起来还行，但海滩看起来棒极了！'
