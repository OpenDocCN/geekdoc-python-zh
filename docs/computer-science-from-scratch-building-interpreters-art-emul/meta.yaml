  md: "Note that the output cuts off the leading 0s since they aren’t needed to represent\
    \ the resulting number (2 in decimal). In other words, 0010 in binary is 2 in\
    \ decimal just as 10 in binary is 2 in decimal.\n\nOne common use of the bitwise\
    \ AND operation in low-level programming is to ensure a final result only includes\
    \ some of the bits from a prior result. For instance, suppose we only care about\
    \ the rightmost 4 bits in the byte 10011110. We can AND the byte with 1111 to\
    \ ensure only the rightmost 4 bits are in the final result. The code may look\
    \ like this:\n\n```\n>>> a = 0b10011110\n>>> b = 0b1111\n>>> c = a & b\n>>> bin(c)\n\
    '0b1110'\n```\n\nLet’s see this operation with the bits lined up:\n\n```\n10011110\n\
    \   1111\n---------\n   1110\n```\n\nWe often use this technique with a single\
    \ bit in our emulator projects when working with flags. We just need to know the\
    \ single flag and whether it’s 1 or 0 (true or false).\n\n# XOR (^)\n\nA bitwise\
    \ XOR (“exclusive or”) returns a 1 if the operands are different (one 1 and one\
    \ 0); otherwise, it returns a 0. Here’s an example using the same operands we\
    \ looked at with bitwise OR and AND:\n\n```\n1010\n0110\n----\n1100\n```\n\nTable\
    \ A-5 summarizes how XOR works.\n\nTable A-5: XOR Examples\n| A | B | A ^ B |\n\
