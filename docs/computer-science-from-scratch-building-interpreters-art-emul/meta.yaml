  mdcn: "一个抽象模板，概述了更具体的数据点类型必须具备的功能：\n\n```python\nKNN/knn.py\nfrom pathlib import\
    \ Path\nimport csv\nfrom typing import Protocol, Self\nfrom collections import\
    \ Counter\nimport numpy as np\n\nclass DataPoint(Protocol):\n    kind: str\n\n\
    \    @classmethod\n    def from_string_data(cls, data: list[str]) -> Self: ...\n\
    \n    def distance(self, other: Self) -> float: ...\n```\n\n我们的协议规定，一个数据点应该有一个\
    \ `kind` 属性（或者用分类学的术语来说，是一个类别），一个 `from_string_data()` 方法用于将 CSV（逗号分隔值）文件中的一行转换为该类的一个实例，以及一个\
    \ `distance()` 方法用于计算两个同类数据点之间的距离。我们将为本章中使用的两个具体数据集创建 `DataPoint` 的子类。\n\n我们的主要\
    \ KNN 实现是通过一个毫不意外地名为 `KNN` 的类：\n\n```python\nclass KNN[DP: DataPoint]:\n    def\
    \ __init__(self, data_point_type: type[DP], file_path: str | Path,\n         \
    \        has_header: bool = True) -> None:\n        self.data_point_type = data_point_type\n\
    \        self.data_points = []\n        self._read_csv(file_path, has_header)\n\
    \n    # Read a CSV file and return a list of data points\n    def _read_csv(self,\
    \ file_path: str | Path, has_header: bool) -> None:\n        with open(file_path,\
    \ 'r') as f:\n            reader = csv.reader(f)\n            if has_header:\n\
    \                _ = next(reader)\n            for row in reader:\n          \
    \      self.data_points.append(\n                    self.data_point_type.from_string_data(row))\n\
    ```\n\n类型提示语法 `class KNN[DP: DataPoint]:` 表示一个泛型类型 `DP` 与 `KNN` 相关联，并且 `DP` 必须是\
    \ `DataPoint` 的子类。我们将从 CSV 文件加载所有数据集。我们的 `KNN` 类的 `_read_csv()` 方法利用 Python 内置的\
    \ `csv` 模块来加载这些文件。CSV 文件中的每一行都通过其 `from_string_data()` 类方法来初始化我们的一个 `DataPoint`\
    \ 子类。我们稍后在查看第一个数据集时，会再详细讨论 CSV 文件的具体内容。\n\n现在我们已经将数据集加载到 `KNN` 类中，可以开始实现实际的 KNN\
    \ 算法了。从哪里开始呢？给定一个我们想要分类的点，首先需要识别它的 $k$ 个最近邻。我们所有的数据点都有内置的 `distance()` 方法，因此我们只需计算未分类数据点到数据集中每个数据点的距离，然后找出最近的\
    \ $k$ 个：\n\n```python\ndef nearest(self, k: int, data_point: DP) -> list[DP]:\n\
    \    return sorted(self.data_points, key=data_point.distance)[:k]\n```\n\n是的，这是一行代码。我们只需使用\
    \ `distance()` 方法的结果对所有数据点进行排序，然后保留 `k` 个最小值（即与 `data_point` 距离最近的点）。KNN 算法的核心确实就这么简单。\n\
    \n这是找到最近邻的最有效方法吗？不是。排序是一个 $O(n \\log n)$ 操作，其中 $n$ 是数据集中的数据点数量。如果数据集非常大，这将是一个显著的瓶颈。我们可以通过编写代码手动评估所有数据点的距离，并利用辅助数据结构仅保留\
    \ `k` 个最小值来稍作改进。为了进一步提高性能，我们可能需要比无序列表更复杂的数据结构来存储数据集。简而言之，这里存在算法性能和数据结构复杂性之间的权衡。\n\
    \n另一种选择是不实际每次搜索整个数据集来寻找邻居。有各种方法可以限制搜索范围，例如通过预计算一个代表整体的更有限的数据点子集，或者在搜索过程中对数据集进行采样，即所谓的*近似搜索*。^2\
