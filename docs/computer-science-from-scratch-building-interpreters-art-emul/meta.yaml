  md: 'When a byte is written out, the *least-significant bit*—that is, the bit representing
    the smallest power of 2—is typically written all the way on the right (bit 0,
    representing 2⁰). The *most-significant bit*—the one representing the largest
    power of 2—is typically written all the way to the left (bit 7 representing 2⁷).
    In 10000000, for example, the 1 represents 2⁷ being turned on, so the byte has
    a decimal value of 128. This assumes we’re working with *unsigned* integers—integers
    that can’t be negative. Signs are beyond the scope of this basic introduction
    to binary.


    Some data types are represented using more than one byte. For instance, on a 64-bit
    microprocessor like the one probably powering your computer, integers are often
    stored using 64 bits (8 bytes). The maximum value of a 64-bit number in binary
    is:


    ```

    1111111111111111111111111111111111111111111111111111111111111111

    ```


    That translates to 18,446,744,073,709,551,615 in decimal.


    For several projects in this book, we need to manipulate bytes at the bit level.
    The rest of this appendix covers some common operations for doing so.


    # Common Bitwise Operations


    *Bitwise operations* manipulate a value at the level of individual binary digits.
    This means working with 1s and 0s. All microprocessors include instructions for
    performing bitwise operations, and Python has operators for tapping into these
    microprocessor instructions. *Truth tables*, which show the true/false outcome
    of logic functions based on different combinations of inputs, can be helpful in
    understanding bitwise operations. To make this more practical and applicable to
    our Python use of these operations, the tables accompanying each operation will
    show binary values instead of true and false.


    # Left Shift (<<)


    Instead of thinking about our binary data as a number, for a minute just think
    about it as a collection of 1s and 0s. Imagine the 0s are empty spaces and the
    1s are filled spaces. What if we want to move all the 1s to the left by one space?
    That’s the job of a *left shift*, which in Python is represented with the << operator.


    A left shift leaves a gap in the least-significant bit (bit position 0). With
    left shifts in Python, we fill that gap with a 0. Because Python integers are
    of arbitrary length (there’s no maximum length), we can’t move 1s off the end
    by moving them to the left. The number just grows by a digit. For example, 1010
    shifted left by 1 becomes 10100, not 0100. We can also left shift by more than
    one place, so 1010 shifted to the left by three becomes 1010000. Table A-1 shows
    the results of some left shifts.'
  merge: -1
