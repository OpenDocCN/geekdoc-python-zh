  md: '# About the Author


    David Kopec is an associate professor of computer science at Albright College.
    He joined academia in 2016 after working as a software developer, with a concentration
    in iOS app development. He’s the author of four previous technical books, including
    *Classic Computer Science Problems in Python*, which has been translated into
    eight languages and published around the world. An avid app developer and podcaster,
    Kopec lives with his wife and three children in Wyomissing, Pennsylvania.


    # About the Technical Reviewer


    Michael Kennedy is well known in the Python space through his work at the *Talk
    Python to Me* and *Python Bytes* podcasts, which have covered important topics
    and news in the Python community for almost 10 years. He’s the founder of Talk
    Python Training, which offers many developer courses online, and is a Python Software
    Foundation Fellow. Kennedy is based in Portland, Oregon. When he’s not programming
    or enjoying time with his family, you might find him exploring the local mountains
    on his motorcycle.'
