- img_proc: true
  md: '(the *A* is for *alpha*, or transparency), so each of our 1-bit pixel values
    must become a 32-bit integer when we store it in the display_buffer.

    CHIP-8 draws using *sprites*, which are little bitmaps (or images, if you like)
    that can move around the screen. Every sprite in CHIP-8 is 8 pixels wide and can
    be anywhere between 1 and 15 pixels high. Figure 5-1 illustrates an 8×3 sprite
    representing the word *HI* being drawn on the screen at location (28,15).


    ![](img/2b670944a6e236c13c5019fe56234a0a_152_0.png)


    Since each row in a CHIP-8 sprite is exactly 8 pixels, it’s represented using
    8 bits. Since 8 bits is 1 byte, each row of a sprite can therefore be represented
    by a single byte. Since the *HI* sprite is three rows high, it can be represented
    by 3 bytes. In binary, those 3 bytes would look like this:


    ```

    10100111

    11100010

    10100111

    ```


    Notice how each 1 maps to a white pixel and each 0 maps to a black pixel. With
    this information, hopefully the font set we defined earlier also makes more sense
    now: each character in the font set is just an 8×5 sprite.

    Drawing sprites is the only way to modify the display buffer, other than clearing
    it, so the CHIP-8 VM has a single draw instruction, Dxyn. It draws a sprite of
    a specified height residing at the memory location specified by the i register.
    The D in the instruction is a constant nibble, and the x and y nibbles represent
    the indices into the v registers where the x- and y-coordinates for the top left
    of the sprite should be located. In other words, the x-coordinate is retrieved
    from register v[x] and the y-coordinate from register v[y]. The n nibble represents
    the height of the sprite. This is why sprites can’t be taller than 15 pixels:
    a nibble is 4 bits, and 4 bits can maximally represent the number 15.'
  merge: -1
  pgno: 152
- img_proc: true
  md: "The nibbles of Dxyn correspond to the parameters of the draw_sprite() helper\
    \ method:\n\n```\n# Draw a sprite at *x*, *y* using data at *i* with a height\
    \ of *height*\ndef draw_sprite(self, x: int, y: int, height: int):\n    flipped_black\
    \ = False  # did drawing this flip any pixels?\n    for row in range(0, height):\n\
    \        row_bits = self.ram[self.i + row]\n        for col in range(0, SPRITE_WIDTH):\n\
    \            px = x + col\n            py = y + row\n            if px >= SCREEN_WIDTH\
    \ or py >= SCREEN_HEIGHT:\n                continue  # ignore off-screen pixels\n\
    \            new_bit = (row_bits >> (7 - col)) & 1\n            old_bit = self.display_buffer[px,\
    \ py] & 1\n            if new_bit & old_bit:  # if both set, flip white -> black\n\
    \                flipped_black = True\n            # CHIP-8 draws by XORing\n\
