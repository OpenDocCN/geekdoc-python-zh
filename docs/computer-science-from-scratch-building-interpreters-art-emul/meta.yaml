  md: "These four parse methods are fairly similar to one another. In each case, we\
    \ expect a certain starting token (LET or GOTO, for example), and then we parse\
    \ some information that we need to create a node for that type of statement. For\
    \ instance, we need a variable and a numeric expression for a LET statement, and\
    \ we need just a numeric expression (what line to go to) for a GOTO statement.\
    \ The simplest statement to parse is RETURN because nothing comes after a RETURN.\n\
    As promised, here's the parse_boolean_expression() method:\n\n```\n# NUMERIC_EXPRESSION\
    \ BOOLEAN_OPERATOR NUMERIC_EXPRESSION\ndef parse_boolean_expression(self) -> BooleanExpression:\n\
    \    left = self.parse_numeric_expression()\n    if self.current.kind in {TokenType.GREATER,\
    \ TokenType.GREATER_EQUAL, TokenType.EQUAL,\n                             TokenType.LESS,\
    \ TokenType.LESS_EQUAL, TokenType.NOT_EQUAL}:\n        operator = self.consume(self.current.kind)\n\
    \        right = self.parse_numeric_expression()\n        return BooleanExpression(line_num=left.line_num,\n\
    \                                 col_start=left.col_start, col_end=right.col_end,\n\
    \                                 operator=operator.kind, left_expr=left, right_expr=right)\n\
    \    raise ParserError(f\"Expected boolean operator but found \"\n           \
    \           f\"{self.current.kind}.\", self.current)\n```\n\nA Boolean expression\
    \ must contain two numeric expressions and one of the allowed operator tokens\
    \ between them. We call the numeric expression before the token left and the numeric\
    \ expression after the token right. The operator token is stored in the BooleanExpression\
    \ node so that we can do the appropriate comparison in the runtime.\nParsing numeric\
    \ expressions closely follows the hierarchy of non-terminals in the grammar, from\
    \ <expression> to <term> to <factor>, with a method for each. A <factor> can include\
    \ a <var> or a <number>, but these are handled directly in parse_factor() because\
    \ their needed information is already contained in their respective tokens:\n\n\
    ```\ndef parse_numeric_expression(self) -> NumericExpression:\n    left = self.parse_term()\n\
    \    # Keep parsing +s and -s until there are no more\n    while True:\n     \
    \   if self.out_of_tokens:  # what if expression is end of file?\n           \
