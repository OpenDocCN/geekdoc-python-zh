    \                print(f\"{percent}% Done, Best Difference {self.best_difference}\"\
    )\n        end = timer()\n        print(f\"{end-start} seconds elapsed. {len(self.shapes)}\
    \ shapes created.\")\n        self.create_output(output_file, length, vector,\
    \ animation_length)\n```\n\nThe heart of the algorithm is in the trial() method,\
