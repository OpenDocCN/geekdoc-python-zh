    # Classifying Fish


    Suppose you work as a programmer for a company that makes a fish-finding device
    for anglers. It consists of a camera on the end of a pole that travels underneath
    a boat. It has image recognition built in, so when a fish passes by the underwater
    camera, it can automatically take a picture of it and recognize the rectangle
    within the photo that contains the fish. It can also estimate the dimensions of
    the fish in the photo. Your task is to write a layer of software on top of this
    image recognition system that tells the angler what type of fish it is. After
    all, not all fish are legal to catch.


    Luckily, we have a dataset in the public domain that will help us with this fish
    classification task. It’s originally from a 1917 Finnish paper by Pekka Brofeldt
    that in English was called “Contribution to the Knowledge of Fish Stocks in Dangerous
    Lakes.”³ It contains the dimensions and weights of 159 fish from a lake, classified
    by species (so our program may only work in that one lake). Figure 7-2 shows the
    fish in our dataset along just two dimensions, height and width.


    ![](img/2b670944a6e236c13c5019fe56234a0a_235_0.png)


    As you may expect, fish of a similar species tend to be close together when viewed
    in terms of height and width. That’s a good indicator that KNN may be a useful
    algorithm for this problem.'
