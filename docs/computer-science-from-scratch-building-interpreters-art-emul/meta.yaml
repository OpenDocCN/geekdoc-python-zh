    # # 6

    ## EMULATING THE NES GAME CONSOLE


    ![](img/2b670944a6e236c13c5019fe56234a0a_164_0.png)


    In this chapter, we’ll build a limited emulator for a beloved 1980s video game
    console, the Nintendo Entertainment System (NES).


    In other words, we’ll create a piece of software that pretends to be NES hardware
    so that software written for the NES can be “fooled” into running on a modern
    platform. Building this project provides experience with emulating a full computer
    system. While the NES is a relatively simple computer, it features all the same
    basic components (microprocessor, memory, graphics, and so on) that more complex
    emulation projects do. And unlike CHIP-8 in Chapter 5, we’ll be emulating more
    than just a software specification—we’ll be simulating real hardware!'
