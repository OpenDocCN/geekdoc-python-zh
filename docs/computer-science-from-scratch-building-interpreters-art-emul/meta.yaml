  md: '![](img/2b670944a6e236c13c5019fe56234a0a_107_0.png)


    Figure 3-4: The space shuttle taking off


    But how can you view your own results? On a vintage Mac, of course! MacPaint runs
    on machines with System 1 all the way through Mac OS 9. You should be able to
    find a real-life classic Mac running one of these OSes to display your photos
    on. You’ll also need a program for unbundling the MacBinary file. There’s a program
    aptly called MacBinary that you can download. Stuffit Expander, a very popular
    decompression app for the classic Mac OS, can also open MacBinary files. Both
    are distributed as freeware. Most Macs you find out in the wild from the 1990s
    will have Stuffit Expander already installed.


    I realize that not everybody is going to be committed enough to this project to
    go out and find an actual retro computer. No problem—you can still experience
    the fruits of your labor through emulation. Apple started freely distributing
    early versions of the Mac OS as well as MacPaint (by releasing the full MacPaint
    source code) many years ago. It’s possible to obtain all of the software you need,
    legally and at no charge, to create a true retro Macintosh experience in an emulator.


    There are several emulators available, but probably the most retro of all is Mini
    vMac,⁹ which I used to create some of the screenshots in this chapter. Setting
    up Mini vMac or one of the several other popular classic Mac emulators (Basilisk
    II, SheepShaver, and the like) is beyond the scope of this book, but I think that,
    as a programmer, you’ll find it pretty easy to do. Each emulator has a different
    mechanism for transferring files from your machine to the emulated environment.
    Regardless of the specifics, it will probably be less of a hassle than getting
    an old Mac and getting that Mac online or finding a floppy disk drive for your
    modern machine. That said, old Macs are fun! Or maybe that fun is just my nostalgia
    from growing up with them.'
