    # The Parser


    The parser takes the tokens from the tokenizer and tries to convert them into
    structures that are meaningful for interpreting the program. Parsing is a heavily
    studied area of computer science, and there are many different parsing algorithms.
    There are even programs that will generate a parser for you. Not surprisingly,
    they''re known as *parser generators*. A parser generator can take a grammar in
    BNF form and spit out a parser.


    We certainly could have used a parser generator here, but that wouldn''t be as
    educational as writing the parser ourselves. And while there are many parsing
    algorithms, it turns out that one of the simplest is also one of the most effective,
    customizable, and widely used. It''s known as *recursive descent*, and it underlies
    the C/C++ parsers in the two most popular compilers in the world, GCC and Clang.
    It was also the technique used in the original version of Tiny BASIC by Dennis
    Allison.


    In recursive descent, generally each non-terminal defined in the grammar becomes
    a function. That function is responsible for checking that the sequence of tokens
    it''s analyzing follows a production rule specified in the grammar. The parser
    checks the tokens by looking at them sequentially. If the token being analyzed
    is expected to be a part of another production rule, the recursive descent parser
    just calls the function representing that other production rule. The recursive
    descent functions return respective nodes when they''re successful—*success* meaning
    the function did indeed find the tokens it expected.


    Recursive descent is a *top-down* parsing technique, meaning the parsing begins
    from the "start" of the grammar (<line> in our case) and "descends" until reaching
    the most specific point necessary. That''s the *descent* part, but the *recursive*
    part requires a little more visualization. Imagine we''re parsing an IF statement.
    An IF statement is a type of statement, and each non-terminal, including both
    "statement" and "IF statement," may get a corresponding function in our recursive
    descent parser. An IF statement has a THEN clause that''s also a statement. Therefore,
    when we''re parsing an IF statement, we may again call our function to parse a
    statement for the THEN clause—the same function to parse a statement that called
    our function to parse the IF statement! It''s a kind of recursion. We end up calling
    the function that called the function we''re currently within.'
