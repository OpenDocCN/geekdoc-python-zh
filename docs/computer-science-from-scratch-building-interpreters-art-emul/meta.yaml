    \ draw_sprite() method is a codification of this process. We iterate through all\
    \ of the rows and columns of a sprite that begins at the memory location specified\
    \ by register i, pulling out each pixel of the sprite using a right shift operation\
    \ and storing it in new_bit. The & operation on the data going into new_bit ensures\
    \ that only the single last bit of the shift operation is stored in new_bit. We\
