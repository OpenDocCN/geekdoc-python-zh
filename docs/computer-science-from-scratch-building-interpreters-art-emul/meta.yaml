    \ 使用了一种称为*行程长度编码*的简单压缩方案。我们稍后会回到这些特性。\n\n我们项目的下一步是编写代码，将图像的抖动像素转换为 MacPaint 格式。我的经验是，针对二进制文件格式进行编程，只需要非常仔细地遵循规范文档。不幸的是，MacPaint\
    \ 格式在今天有些晦涩，因此找到规范文档需要费点功夫。Apple 自己在技术说明 PT24 中记录了该格式。³ 然而，我发现的最易获取且最全面的描述是在一个名为\
