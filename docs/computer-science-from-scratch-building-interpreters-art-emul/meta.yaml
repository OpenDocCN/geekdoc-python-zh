    # Building the Emulator


    It’s time to write some code. Before we do, though, a note about direction and
    managing expectations: the emulator we’re writing has been simplified at every
    corner. As mentioned earlier, it won’t be compatible with many games, due to a
    very simplified PPU. It also won’t have any sound, since we aren’t implementing
    the APU. And it won’t run fast enough to play games at their intended speed. It
    will, however, run real games, and they’ll be playable. Our work here will also
    provide a firm foundation for making improvements and adding more features if
    you so choose.


    # Planning the Structure


    The general plan for the emulator’s execution isn’t dissimilar to that of the
    CHIP-8 VM from Chapter 5. Like with CHIP-8, we’ll read each instruction one at
    a time from the ROM file and interpret it. Like with CHIP-8, we’ll use Pygame
    to display graphics and handle user input. Like with CHIP-8, we’ll have one big
    loop that fetches each instruction and responds to each event. However, the structure
    of the code will be more sophisticated. In particular, we’ll divide the emulator
    into three classes, each representing one physical component of the hardware.
    We’ll have classes for the CPU, the PPU, and the cartridge. Here’s a breakdown
    of each file we’ll write and its purpose:


    +   - `__main__.py` Handles command line arguments and implements the main emulator
    loop, which dispatches instructions, displays graphics, and responds to user input.

    - `rom.py` Reads a ROM file and pretends to be a cartridge.

    - `cpu.py` Maintains CPU state, interprets instructions, and handles main memory
    accesses.

    - `ppu.py` Manages PPU state and draws backgrounds and sprites.


    We’ll tackle these files in the order listed here.


