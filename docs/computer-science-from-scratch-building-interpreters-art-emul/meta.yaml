    \ calculated in the while loop:\n\n+   1. We attempt to find a repeated run using\
    \ take_same().\n2. If the attempt fails (same is 0), then this must be a literal\
    \ run, so not_same is incremented.\n3. Steps 1 and 2 repeat until a repeated run\
    \ is found (same is not equal to 0) or the byte being looked at (index + not_same)\
