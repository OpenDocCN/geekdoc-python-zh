    \ since there was no disk. Battery-backed RAM enabled longer games. Nobody wants\
    \ to play a 40-hour game if their progress is going to be erased after they shut\
    \ down their console.\n\nThe longer the NES was on the market, the more sophisticated\
    \ the cartridges got. The same advanced cartridge designs would be manufactured"
