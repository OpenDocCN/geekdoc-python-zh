    \   pygame.init()\n    screen = pygame.display.set_mode(size=(PIXEL_WIDTH, PIXEL_HEIGHT),\n\
    \                                    flags=pygame.SCALED | pygame.RESIZABLE)\n\
    \    pygame.display.set_caption(\"Digit Recognizer\")\n```\n\nIn these first few\
    \ lines, we create the pixel array, load the dataset, and initialize Pygame. The\
    \ main window is initialized to be a \"stretched out\" 8×8 pixels. You can resize\
    \ the window and it will maintain its 8×8 dimensions. This is set via the set_mode()\
    \ flags (flags=pygame.SCALED | pygame.RESIZABLE)."
  - "[PAGE 250]\n\nNext, we need to set up the main loop:\n\n```\nwhile True:\n  \
    \  pygame.surfarray.blit_array(screen, digit_pixels)\n    pygame.display.flip()\n\
    ```\n\nSince this a GUI program using Pygame, we effectively have an event loop.\
    \ It listens for some action by the user and then responds. This action could\
    \ be a keyboard or mouse event. To keep the screen in sync, we constantly blit\
    \ digit_pixels to the screen at the beginning of the loop. Then, we handle keyboard\
    \ events:\n\n```\nfor event in pygame.event.get():\n    if event.type == pygame.KEYDOWN:\n\
    \        key_name = pygame.key.name(event.key)\n        if key_name == \"c\":\
    \  # classify the digit\n            pixels = digit_pixels.transpose((1, 0, 2))[:,\
    \ :, 0].flatten() * P_TO_D\n            classified_digit = digits_knn.classify(K,\
    \ Digit(\"\", pixels))\n            print(f\"Classified as {classified_digit}\"\
    )\n```\n\nWe start with the C key used for classification. This is similar to\
    \ the classification we did in the preceding chapter. The result is printed to\
    \ the console. The only tricky bit is the transformation of the pixels representing\
    \ the picture to a form that our classifier can use. In essence, we're moving\
    \ from a pixel format of 255 grays and multiple dimensions to a flat array of\
    \ 16 grays. The keyboard handler continues:\n\n```\nelif key_name == \"e\":  #\
    \ erase the digit\n    digit_pixels.fill(0)\nelif key_name == \"p\":  # predict\
