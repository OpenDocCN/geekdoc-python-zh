    ## About the NES


    The NES was one of the best-selling video game consoles of all time. First released
    in Japan in 1983 as the Famicom, the NES captivated a global generation of gamers
    with its 1985 international release.¹ At the time of its debut, the video game
    industry was only about a decade old. The microprocessors and other hardware in
    video game consoles were still quite primitive. Despite this, the NES managed
    60 FPS of colorful sprites and backgrounds, played catchy chip tune music, and
    was the host platform for some of the most iconic games of all time.


    > **NOTE** *Many of the hardware specifications for the NES and much of the information
