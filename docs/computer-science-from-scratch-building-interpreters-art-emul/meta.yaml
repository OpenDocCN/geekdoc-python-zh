  md: "# The Runtime\n\nThe end result of our parser will be a collection of AST Statement\
    \ nodes stored as a list that the runtime can step through and execute. I've named\
    \ the class that walks the AST Interpreter, although I realize this can be a little\
    \ confusing since this whole chapter is about building an interpreter. Yes, the\
    \ tokenizer and the parser are parts of the overall interpreter, but this Interpreter\
    \ class is the place where the language is actually interpreted in the sense that\
    \ the tokens that became nodes are turned into something meaningful—a program\
    \ that executes with some output. Regardless of whether or not it's a good name,\
    \ the Interpreter class provides a runtime environment and an understanding of\
    \ how to modify the environment or provide output based on the statement and expression\
    \ nodes that it encounters.\n\nThe Interpreter class starts off similarly to Parser:\n\
    \n```\nfrom NanoBASIC.nodes import *\nfrom NanoBASIC.errors import InterpreterError\n\
    from collections import deque\n\nclass Interpreter:\n    def __init__(self, statements:\
    \ list[Statement]):\n        self.statements = statements\n        self.variable_table:\
    \ dict[str, int] = {}\n        self.statement_index: int = 0\n        self.subroutine_stack:\
    \ deque[int] = deque()\n\n    @property\n    def current(self) -> Statement:\n\
    \        return self.statements[self.statement_index]\n```\n\nInstead of a list\
    \ of tokens as we had in the Parser class, Interpreter receives a list of statements.\
    \ There's also a current property for convenience, to access the current statement.\
    \ The runtime environment consists of the statements, a statement_index, a variable_table\
    \ to keep track of each variable's value, and a subroutine_stack that will help\
    \ us get to the right place after a GOSUB and RETURN pair.\n\nNext, we need a\
    \ way to connect a line identifier to a statement index. Consider the following\
    \ NanoBASIC program:\n\n```\n27 PRINT \"HELLO\"\n38 GOTO 50\n45 PRINT \"NEVER\"\
    \n50 PRINT \"BYE\"\n```\n\nWhen GOTO 50 is executed, the interpreter will need\
    \ to find the statement associated with line identifier 50 and continue running\
    \ from there. In NanoBASIC, the programmer can arbitrarily choose any line identifier\
    \ for any line, as long as all of the line identifiers are integers in increasing\
    \ order, so how can we find 50? We need to search the list of statements for it.\
    \ Since"
