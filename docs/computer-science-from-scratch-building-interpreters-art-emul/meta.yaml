- md: '## Color Palettes and Attribute Tables


    The PPU has *palette memory* for four different background color palettes. Recall
    from “Pattern Tables and Tiles” on page 178 that each tile is composed of pixels
    in one of four colors, with one of those being the background color or transparent.
    That means that only three colors are actually specific to a tile. Each palette
    in the PPU’s palette memory therefore defines a set of three colors. (We’ll discuss
    palette memory further in the next section.)


    To specify which color palette applies to which tile, each nametable is followed
    by an *attribute table*. The attribute table is 8×8, and each entry in it is just
    1 byte. How can there be 960 tiles and just 64 1-byte attribute table entries?
    Each entry actually defines the colors for a 2×2 set of *areas*, and each of those
    areas represents a 2×2 grid of tiles. Therefore, each 1-byte entry in the attribute
    table actually covers 16 tiles. How does that work out?


    Every 2 bits of that 1-byte entry is for one area, and 2 bits can represent up
    to four values. Each 2-bit value is a selector between one of the four different
    background color palettes. Every 2×2 region of tiles on the screen can therefore
    have a single palette out of the four possible background palettes. That means
    all four of the tiles in each area must use the same three colors (and background/transparent).

    That’s no easy feat. Artists working on graphics for the NES had to paint significant
    areas of the screen (four-tile areas) using just three non-background colors.
    And then each of those areas using just three non-background colors had to blend
    in with the adjacent areas that may be using different three-color palettes.

    Figures 6-4, 6-5, and 6-6, created for https://nesdev.org, showcase attribute
    tables in action. (If you’re reading this in print, see the figures directory
    of the companion repository for color versions of the images.) First, Figure 6-4
    shows the background of a game (Thwaite by Damian Yerrick) broken up into the
    areas the attribute table can select colors for.


    ![](img/2b670944a6e236c13c5019fe56234a0a_205_0.png)


    Figure 6-4: The attribute table layout across the screen in Thwaite


    Figure 6-5 shows the actual palette selection (which background palette, 0–3)
    for each area from Figure 6-4.


    ![](img/2b670944a6e236c13c5019fe56234a0a_206_0.png)


    Figure 6-5: The attribute table color palette mapping in Thwaite


    Finally, Figure 6-6 shows the four background palettes that can be selected. There''s
    some color overlap between the palettes, which allows the different areas of the
    screen to blend with each other.


    ![](img/2b670944a6e236c13c5019fe56234a0a_206_1.png)


    Figure 6-6: The background color palettes in Thwaite


    Each attribute table is 64 bytes, and each nametable is 960 bytes. One nametable
    and its corresponding attribute table therefore take up 960 + 64 = 1,024 bytes,
    or 1KB. This is how the 2KB of RAM on the PPU fill up with two pattern table/attribute
    table combinations.


    ## Palette Memory


    The PPU''s palette memory has room for four background palettes and four sprite
    palettes. As we''ve discussed, a palette consists of three colors (along with
    the background/transparent color). It can be used to paint a four-tile background
    area of the screen (see the prior section on attribute tables) or a sprite. In
    other words, each four-tile area of the background can be colored using one out
    of four palettes, and each sprite can be colored using one out of four palettes.


    A palette is defined using 3 bytes. Each byte specifies one of the three colors
    of the palette, although only 6 bits of each byte are actually used for selecting
    a color. Since 6 bits can select from among 64 values, this tells us that NES
    artists only had 64 colors to work with. In practice, 10 of these 64 possible
    colors amounted to essentially black, so really the NES had 54 colors. Figure
    6-7 shows these colors for an NTSC NES. The colors differed a bit for PAL NES
    machines. (Different countries used different video standards—NTSC in North America
    versus PAL in much of Europe and Asia, for instance—which would affect how the
    PPU of the NES operated.)


    ![](img/2b670944a6e236c13c5019fe56234a0a_207_0.png)


    As an example, say your background area is painted using background palette 1,
    and background palette 1 specifies the colors 0x11, 0x0A, and 0x3D. That means
    you can paint that area using shades of blue, green, and gray, as well as the
    background color.


    ## Object Attribute Memory


    OAM stores information about the sprites on the screen. Sprites are essentially
    the moving objects in a game—for example, the player, the enemies, and the projectiles.
    The NES supports 64 sprites at a time and uses 4 bytes to describe each one, so
    there are 256 bytes of OAM.


    The images for sprites come from the same CHR ROM on the cartridge as the background
    tiles—that is, the pattern tables. Unlike the background, however, sprites aren''t
    constrained to tile locations; they can be drawn at any position on the screen.
    Each sprite can also be flipped horizontally or vertically, placed in front of
    or behind the background, and colored using any of four different palettes. The
    4 bytes for each sprite and what they do are briefly described in Table 6-5.


    Table 6-5: Sprite Specification in OAM


    | Byte # | Description |

    |---|---|

    | 0 | The y-axis position of the sprite |

    | 1 | The index into the pattern table where the sprite''s graphical data is located
    |

    | 2 | Sprite attributes including palette (bits 0–1), front or back (bit 5), horizontal
    flip (bit 6), and vertical flip (bit 7) |

    | 3 | The x-axis position of the sprite |


    Why the bytes for the y-axis position and the x-axis position aren''t next to
    each other is a question I have for the NES''s creators. Perhaps it has to do
    with the physical wiring order of the lines in the PPU.


    ## Frame Creation and Timing


    The PPU in a real NES draws the screen from the top left to the bottom right,
    one pixel at a time. This reflected the “gun” in the CRT televisions that the
    NES would be hooked up to. Its electron beam “shot” behind the screen from left
    to right, one scanline at a time from top to bottom. The NTSC NES draws the entire
    screen 60 times per second (60 frames per second, or 60 FPS). A PAL NES draws
    at a slower 50 FPS. A *frame* is the gun completing its journey across the entire
    screen. As mentioned earlier in the chapter, the gun would also sometimes be temporarily
    off-screen during hblank (between scanlines) and vblank (between frames) periods.
    These were therefore the safest times for an NES program to change the memory
    that the pixels were being read from.


    Since the NES resolution is 256×240, we know that there must be at least 256 dots
    drawn per scanline and 240 scanlines in total. There’s a prerender scanline, which
    we’ll call scanline 0. Then, scanlines 1 through 240 are the “visible” scanlines
    that represent what the program actually displays on the screen. Scanlines 241
    through 261 are during the vblank phase. The NMI, mentioned earlier in the chapter,
    is therefore triggered at the start of scanline 241 to tell the program it’s safe
    to change PPU memory. Dots 0 through 255 represent the 256 visible dots on each
    scanline. Dots 256 through 340 are “silent” dots during which the hblank phase
    between scanlines occurs.


    Each dot represents one PPU cycle. If you do the math, 341 dots per scanline times
    262 scanlines means it takes 89,342 PPU cycles to draw each frame. Recall that
    there are 3 PPU cycles for every 1 CPU cycle. If we divide the PPU cycles by 3
    and round, we get 29,781 CPU cycles per frame. The CPU in the NES runs at about
    1.79 MHz, or 1,790,000 cycles per second. If you divide 1,790,000 by 29,781, you
    get a number close to 60. That’s the 60 frames per second!


    To create a cycle-accurate NES emulator, it’s important to understand the details
    of how the PPU figures out what color to draw for each pixel, one pixel at a time.
    Since we’re using the simpler but less accurate approach of drawing one frame
    at a time, we can leave those details out as beyond the scope of our project.
    What we do know based on the timing just discussed is that at some point during
    every 89,342 PPU cycles we need to draw the whole frame. To me, the logical time
    to do that is when the visible scanlines are done. In the code we’ll look at shortly,
    you’ll therefore see all of the background and all of the sprites being drawn
    at once at the timing of scanline 240, dot 256 (the last visible dot in the last
    visible scanline). Our simplified renderer does no drawing except during that
    PPU cycle, once per frame.


