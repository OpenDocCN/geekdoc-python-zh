    We''re almost ready to write an implementation of NanoBASIC, but before we get
    there, it''s important to more formally specify the language''s syntax. We can
    directly use that specification to write our implementation.


    # Formalizing NanoBASIC''s Syntax


    A programming language''s syntax is formally defined by a *grammar*. Backus–Naur
    form (BNF) is the typical way the grammar of a programming language is specified.
    There are many extensions and augmentations of BNF; we''ll use a form of it that
    I think will be very clear to intermediate programmers because it includes some
    regular expression–like syntax.


    A grammar consists of a set of production rules that define what''s allowable
    syntax in the programming language. The term *production rule* sounds fancy, but
    it''s just a way of substituting one thing for another. Let''s say I was creating
    a grammar for a language that could only consist of the letters A and B and the
    numbers 1 and 2. Its production rules may look like this:


    ```

    <expression> ::= (<letter> | <number>)*

    <letter> ::= ''A'' | ''B''

    <number> ::= ''1'' | ''2''

    ```


    An identifier wrapped in angle brackets, like `<expression>`, is a *non-terminal*.
    This is an item in a grammar that, when expanded, is replaced by something else.
    What it gets replaced by is specified by the right side of its production rule.
    In a production rule, the `::=` symbol separates a'
  - '[PAGE 52]


    non-terminal from its replacement. The replacement can be composed of non-terminals
    or terminals.


    A *terminal* is something that will appear in the language in its literal form.
    It doesn''t get expanded any further. In our syntax, a terminal is wrapped in
    single quotes, like ''A''. Our syntax also uses | to mean *or*. An *or* means
    that there''s a selection of options to choose from for that part of the production.
    We use parentheses for grouping, and * signifies zero or more repetitions of something.


    With this in mind, we can read the three production rules shown earlier as indicating:


    +   1. An *expression* is zero or more of letters or numbers.

    2. A *letter* is A or B.

    3. A *number* is 1 or 2.


    We can use a grammar to check whether a particular string of text is valid syntax
    for a language by simply following its production rules. For instance, our grammar
    specifies that “AAA21B” is valid syntax but “AB123” is not. More than one grammar
    can specify the same language. The non-terminal names are largely arbitrary and
    should be chosen to make the most human sense. For example, there''s no reason
    that letters and numbers need to be separated in our grammar. We could simplify
    the grammar to be:


    ```

    <expression> ::= <character>*

    <character> ::= ''A'' | ''B'' | ''1'' | ''2''

    ```


    We could even eliminate the second production rule altogether:


    ```

    <expression> ::= (''A'' | ''B'' | ''1'' | ''2'')*

    ```


    We generally shouldn''t use unnecessary production rules, because they overcomplicate
    the grammar. However, if the additional non-terminal represents multiple possible
    terminals and it will be used again somewhere else in the grammar, it makes sense
    to give it its own production rule instead of duplicating a long list of terminals.
    This will become clearer as we work with larger grammars with richer structures.
    It''s analogous to programming, where it can be better style to have many small
    functions that we reuse rather than just a few large ones.


    Let''s look at another example. Say I were specifying production rules for a numbered
    list. It may look something like this:


    ```

    <list> ::= <item>*

    <item> ::= <number>''.'' <text>''\n''

    <number> ::= <digit><digit>*

    <digit> ::= ''0'' | ''1'' | ... | ''8'' | ''9''

    <text> ::= .*

    ```


    We''ve introduced a couple more special forms. The ... symbol indicates a list
    of terminals continues in the implied way (this isn''t super formal,'
  - "[PAGE 53]\n\nbut it saves space), and . just means any user-imaginable terminal,\
    \ like in a regular expression. Let's again put the five rules of this grammar\
    \ into a more English-like form:\n\n+   1. A *list* is composed of zero or more\
    \ items.\n2. An *item* is a number followed by a period, some text, and a newline.\n\
    3. A *number* is one or more digits.\n4. A *digit* is one of the characters 0\
    \ through 9.\n5. A *text* is any arbitrary string.\n\nDid you notice a problem\
    \ with this grammar regarding how it handles numbers? A number with leading zeros,\
    \ like 0020, would be allowed, but that wouldn't make sense in a numbered list.\
    \ How can it be fixed? I'll leave that as an exercise for the reader. If you can\
    \ fix it, you probably have a decent understanding of terminals and non-terminals.\n\
    \nThe grammars described with BNF are said to be *context free*, meaning that\
    \ each production rule can stand alone for a non-terminal that appears within\
    \ a larger string. Without any context about the rest of the string, the production\
    \ rule can still be expanded for the single non-terminal in question. In other\
    \ words, in a context-free grammar, each non-terminal isn't dependent on other\
    \ non-terminals around it to be expanded.\n\nNanoBASIC's grammar is based on the\
    \ original Tiny BASIC grammar published by Dennis Allison, the creator of the\
    \ first Tiny BASIC implementation, in 1976.⁶ It looks like this:\n\n```\n❶ <line>\
    \ ::= <number> <statement> '\\n' | 'REM' .*'\\n'\n\n❷ <statement> ::= 'PRINT'\
    \ <expr-list> |\n    'IF' <boolean-expr> 'THEN' <statement> |\n    'GOTO' <expression>\
    \ |\n    'LET' <var> '=' <expression> |\n    'GOSUB' <expression> |\n    'RETURN'\n\
    \n❸ <expr-list> ::= (<string> | <expression>) (',' (<string> | <expression>))*\n\
    \n❹ <expression> ::= <term> (('+'|'-') <term>)*\n\n❺ <term> ::= <factor> (('*'|'/')\
    \ <factor>)*\n\n❻ <factor> ::= ('-'|ε) <factor> | <var> | <number> | '(' <expression>\
    \ ')'\n\n    <var> ::= ('_'|<letter>) ('_'|<letter>)*\n\n    <number> ::= <digit>\
    \ <digit>*\n\n    <digit> ::= '0' | '1' | ... | '8' | '9'\n\n    <letter> ::=\
    \ 'a'|'b'| ... |'y'|'z'|'A'|'B'| ... |'Y'|'Z'\n```"
