    \n让我们稍作停顿，讨论一下解释器中的错误处理。编程时最烦人的事情莫过于糟糕的错误信息。当你在代码中犯错时，你希望知道发生了什么以及错误发生在哪里。作为编程语言的创建者，你有责任为你的用户（NanoBASIC\
    \ 程序员）提供良好的错误信息。\n\nNanoBASIC 将报告两种主要类型的错误：解析器错误和解释器错误。*解析器错误*可以理解为语法错误，例如当标记的顺序错误时。例如，GOTO\
    \ 之后需要一个数字表达式（表示行号），但 IF 语句之后则不需要。*解释器错误*是语义错误。它们发生在程序试图执行某些无意义的操作时，例如在变量初始化之前就尝试使用它。我们将为这两种错误定义错误类：\n\
