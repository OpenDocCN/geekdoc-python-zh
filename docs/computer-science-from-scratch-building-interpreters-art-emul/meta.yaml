  md: "In our simple program, we can only draw with white. The prediction yields a\
    \ better-looking 7 since it can use more levels of gray. We start our program\
    \ with some imports and constants:\n\n```\nfrom KNN.knn import KNN\nfrom KNN.digit\
    \ import Digit\nfrom pathlib import Path\nimport sys\nimport pygame\nimport numpy\
    \ as np\n\nPIXEL_WIDTH = 8\nPIXEL_HEIGHT = 8\nP_TO_D = 16 / 255  # pixel to digit\
    \ scale factor\nD_TO_P = 255 / 16  # digit to pixel scale factor\nK = 9\nWHITE\
    \ = (255, 255, 255)\n```\n\nThe PIXEL_WIDTH and PIXEL_HEIGHT constants are the\
    \ size of one image. The P_TO_D constant converts between the 255 shades of gray\
    \ in the pixel representation we'll work with and the 16 shades of gray in the\
    \ source dataset; D_TO_P is its inverse. We set K, the number of neighbors KNN\
    \ will consider, to 9, and WHITE is a constant for the white color in the RGB\
    \ pixel format.\nThis is a short program. We have just one central run() function\
    \ that spends as much time handling the user interface as it does running KNN.\
    \ Here's the start of the function:\n\n```\ndef run():\n    # Create a 2D array\
    \ of pixels to represent the digit\n    digit_pixels = np.zeros((PIXEL_HEIGHT,\
    \ PIXEL_WIDTH, 3),\n                            dtype=np.uint32)\n    # Load the\
    \ training data\n    digits_file = (Path(__file__).resolve().parent\n        \
    \           / \"datasets\" / \"digits\" / \"digits.csv\")\n    digits_knn = KNN(Digit,\
    \ digits_file, has_header=False)\n    # Start up Pygame, create the window\n \
    \   pygame.init()\n    screen = pygame.display.set_mode(size=(PIXEL_WIDTH, PIXEL_HEIGHT),\n\
    \                                    flags=pygame.SCALED | pygame.RESIZABLE)\n\
    \    pygame.display.set_caption(\"Digit Recognizer\")\n```\n\nIn these first few\
    \ lines, we create the pixel array, load the dataset, and initialize Pygame. The\
    \ main window is initialized to be a \"stretched out\" 8×8 pixels. You can resize\
    \ the window and it will maintain its 8×8 dimensions. This is set via the set_mode()\
    \ flags (flags=pygame.SCALED | pygame.RESIZABLE)."
