    \ across many helper functions, it generally results in cleaner code than a giant\
    \ switch statement and may be preferred for a larger instruction set.\n\nThe third\
    \ pattern is to use *dynamic recompilation*, where we translate each instruction\
    \ into an instruction that the underlying hardware understands (or something that\
