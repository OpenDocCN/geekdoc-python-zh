  md: '# Converting to MacBinary


    On most operating systems, a file is just a single blob of data. The filesystem
    or the operating system may hold onto some metadata about each file, but the file
    itself stands alone. That wasn''t the case on the classic Mac OS, where many files
    had two forks. The *data fork* would hold the primary data of the file, while
    a *resource fork* may hold ancillary data like bitmaps, sounds, or even executable
    code. The resource fork could hold many different kinds of data in one place,
    so it was kind of like a resource database. This is one of the features of the
    operating system that allowed many applications to be completely self-contained—a
    single executable that could be dragged and dropped as a single icon, with no
    additional files.


    Unfortunately, since resource forks don''t exist on other operating systems, classic
    Mac files often get messed up when transferred to or from them. Care needs to
    be taken. This was a problem from the beginning, so “bundling” file formats were
    quickly developed. One of the most popular and well standardized is known as MacBinary.
    In a MacBinary file, a special header is followed by the data fork and resource
    fork together.


    We need to bundle our MacPaint files as MacBinary files in order for them to work
    properly on the classic Mac OS and open by default in MacPaint. Ironically, a
    MacPaint file doesn''t actually have a resource fork, it just has a data fork.
    But MacBinary files also bundle metadata that was stored in the filesystem (MFS/HFS/HFS+)
    of the classic Mac OS. The important bits are *type* and *creator codes*. The
    classic Mac OS doesn''t use file extensions to associate a file with the program
    that should open it. Instead, it uses type and creator codes, which are largely
    transparent to the user. This allows the user to name their files anything they
    want and still have the files be “double-clickable.” After the MacBinary file
    our program creates is unbundled by MacBinary (or another program like Stuffit)
    on the classic Mac OS, the resulting MacPaint file should open MacPaint when it''s
    double-clicked.


    Luckily, the MacBinary file format is fairly simple. To comply with the MacBinary
    specification, our program needs to:


    +   1. Add the 128-byte MacBinary header before the rest of the file (which is
    just the data fork since we have no resource fork).

    2. Fill in the MacBinary header with the right values in several indicated places.

    3. Ensure the file ends in a multiple of 128 bytes by padding the end of it if
    necessary.


    MacBinary has an official specification that was approved by a committee of interested
    parties.⁷ However, we only need to fill out a few fields for our MacBinary file
    to be properly recognized. (The rest of the header should be 0s.) Table 3-6 lists
    these values, their lengths, and their respective offsets within the 128-byte
    header.'
