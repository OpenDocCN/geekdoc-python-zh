    When a game needs to check the status of the first joypad (player 1’s controller),
    it uses a memory-mapped register. That register is at memory address 0x4016. If
    the game reads from 0x4016, it gets back 1 byte that indicates if a particular
    button on the joypad is pressed. Memory'
