    \ = (((value & 0b00010000) >> 4) * 0x1000)\n        self.generate_nmi = bool(value\
    \ & 0b10000000)\n    elif address == 0x2001:  # Control2\n        self.show_background\
    \ = bool(value & 0b00001000)\n```"
  - "[PAGE 216]\n\n```\nself.show_sprites = bool(value & 0b00010000)\nself.left_8_background_show\
    \ = bool(value & 0b00000010)\nself.left_8_sprite_show = bool(value & 0b00000100)\n\
    ```\n\nNext, we handle registers 0x2003 through 0x2007:\n\n```\nelif address ==\
    \ 0x2003:\n    self.spr_address = value\nelif address == 0x2004:\n    self.spr[self.spr_address]\
    \ = value\n    self.spr_address += 1\nelif address == 0x2005:  # scroll\n    pass\n\
    elif address == 0x2006:\n    # Based on https://wiki.nesdev.org/w/index.php/PPU_scrolling\n\
    \    if not self.addr_write_latch:  # first write\n        self.addr = (self.addr\
    \ & 0x00FF) | ((value & 0xFF) << 8)\n    else:  # second write\n        self.addr\
    \ = (self.addr & 0xFF00) | (value & 0xFF)\n    self.addr_write_latch = not self.addr_write_latch\n\
    elif address == 0x2007:\n    self.write_memory(self.addr, value)\n    self.addr\
    \ += self.address_increment\nelse:\n    raise LookupError(f\"Error: Unrecognized\
    \ PPU write {address:X}\")\n```\n\nRegister 0x2003 sets self.spr_address. Register\
    \ 0x2004 sets the value at self.spr_address and then increments self.spr_address\
    \ by 1. Register 0x2005 is a scroll register; we haven't implemented it in our\
    \ simple PPU, but a full implementation would require it. As it stands, our emulator\
    \ won't work with games that require scrolling. Register 0x2006 is for modifying\
    \ self.addr. This is where self.addr_write_latch comes in: we need the latch because\
    \ self.addr is 16 bits (2 bytes) but can only be written to 1 byte at a time.\
    \ Finally, 0x2007 is for writing to self.addr.\n\n# Accessing Memory\n\nOur PPU\
    \ implementation is basically done, but we need helper methods for reading and\
    \ writing to PPU memory. These read_memory() and write_memory() methods are quite\
    \ similar to their analogs in the CPU:\n\n```\ndef read_memory(self, address:\
    \ int) -> int:\n    address = address % 0x4000  # mirror >0x4000\n    if address\
    \ < 0x2000:  # pattern tables\n        return self.rom.read_cartridge(address)\n\
    \    elif address < 0x3F00:  # nametables\n        address = (address - 0x2000)\
    \ % 0x1000  # 3000-3EFF is a mirror\n        if self.rom.vertical_mirroring:\n\
    \            address = address % 0x0800\n        else:  # horizontal mirroring\n\
    \            if (address >= 0x400) and (address < 0xC00):\n                address\
    \ = address - 0x400\n```"
- md: "## Testing the Emulator\n\nMany test ROMs have been created for folks developing\
    \ NES emulators. Some are included in the repository for this book. These can\
    \ test the 6502 CPU as well as the PPU. Thank you to Shay Green and Kevin Horton\
    \ for developing these tests.\n\nOur 10 unit tests run these ROMs and then check\
    \ that certain values in the virtual NES's memory are set correctly, as specified\
    \ by the test ROMs' creators. Like all tests for the book, the file for these\
    \ unit tests appears in the *tests* directory in the root of the source code repository:\n\
