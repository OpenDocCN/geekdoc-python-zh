  md: "As the background_color property in the constructor indicates, colors are being\
    \ represented using a tuple of three integers. These are RGB color codes. Each\
    \ element is an integer between 0 and 255 representing the amount of the respective\
    \ primary color (red, green, or blue) in the output. For example, a “pure” red\
    \ color would be (255, 0, 0), and a purple would be something like (128, 0, 128),\
    \ being a blend of red and blue.\n\nDrawing the three types of shapes that our\
    \ program supports (ellipses, lines, and polygons) is just a matter of putting\
    \ the respective ellipse, line, or polygon SVG elements into the output text file:\n\
    \n```\ndef draw_ellipse(self, x1: int, y1: int, x2: int, y2: int, color: tuple[int,\
    \ int, int]):\n    self.content += f'<ellipse cx=\"{(x1 + x2) // 2}\" cy=\"{(y1\
    \ + y2) // 2}\" '\n                   f'rx=\"{abs(x1 - x2) // 2}\" ry=\"{abs(y1\
    \ - y2) // 2}\" '\n                   f'fill=\"rgb{color}\" />\\n'\n\ndef draw_line(self,\
    \ x1: int, y1: int, x2: int, y2: int, color: tuple[int, int, int]):\n    self.content\
    \ += f'<line x1=\"{x1}\" y1=\"{y1}\" x2=\"{x2}\" y2=\"{y2}\" stroke=\"rgb{color}\"\
    \ '\n                   f'stroke-width=\"1px\" shape-rendering=\"crispEdges\"\
    \ />\\n'\n\ndef draw_polygon(self, coordinates: list[int], color: tuple[int, int,\
    \ int]):\n    points = \"\"\n    for index in range(0, len(coordinates), 2):\n\
    \        points += f\"{coordinates[index]},{coordinates[index + 1]} \"\n    self.content\
    \ += f'<polygon points=\"{points}\" fill=\"rgb{color}\" />\\n'\n```\n\nFinally,\
    \ to output the SVG file, we close the svg element begun in the constructor and\
    \ write the amalgamated string to disk:\n\n```\ndef write(self, path: str):\n\
    \    self.content += '</svg>\\n'\n    with open(path, 'w') as f:\n        f.write(self.content)\n\
    ```\n\nIf you take a look at the official SVG specification, you may find it overwhelming,\
    \ but there’s no need to be intimidated. As this section hopefully shows, it doesn’t\
    \ necessarily take much to get value out of a big standard like SVG. In just 20\
    \ lines of code, we’ve written a very limited, but useful, SVG creator.\n\n# The\
    \ Algorithm\n\nThe algorithm that produces these (sometimes) beautiful abstract\
    \ impressions of photographs is remarkably simple. In short, it tries drawing\
    \ randomly sized and placed shapes, one shape at a time. If an added shape makes\
    \ the abstract image look more like the original photo, it’s kept. The improvement\
    \ is potentially further refined by resizing the shape, which is a matter of moving\
    \ each of its points. If the added shape makes the image look less like the original\
    \ photo, then it’s thrown away and a new shape is tried."
