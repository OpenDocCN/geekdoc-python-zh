    \    return max(colors, key=lambda item: item[0])[1]\n```\n\nThe ColorMethod enum\
    \ controls how we'll calculate the color in a region—that is, what color a shape\
    \ will be filled with. The ShapeType enum sets the shape we'll be drawing. The\
    \ current version of the program only draws one type of shape in each painting,\
    \ but it would be easy to modify the code to enable more than one type of shape.\
    \ I've left that for an exercise. The CoordList type applies to the coordinates\
    \ that define one shape.\n\nWhen running the algorithm, for performance, we need\
    \ to work with a limited number of total pixels. The easiest way to accomplish\
    \ this is to scale the input image if it's taller than MAX_HEIGHT. In other words,\
    \ MAX_HEIGHT is the maximum height of the scaled image. Note that, technically,\
    \ we should also define a maximum width, but in practice, it's very rare for an\
    \ image's aspect ratio to be such that only capping one dimension will be insufficient\
    \ (there aren't many images that are super wide but have very little height).\
    \ For simplicity, we just defined the one maximum dimension.\n\nThe get_most_common_color()\
    \ method figures out the most frequently occurring color in an image. It uses\
    \ a Pillow method, getcolors(), which returns all of the colors in an image along\
    \ with their counts. Then, it uses Python's built-in max() function to extract\
    \ the most frequent.\n\nThe Impressionist class's constructor is responsible for\
    \ setting up the unique parameters of a particular run of the algorithm, opening\
    \ the input image file, scaling it, creating the initial background of the output\
    \ image, calling methods to run the actual iterations of the algorithm, and calling\
