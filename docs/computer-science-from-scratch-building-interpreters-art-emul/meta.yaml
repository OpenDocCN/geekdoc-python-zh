    \ packed)\n\nif __name__ == \"__main__\":\n    unittest.main()\n```\n\nThese tests\
    \ ensure run-length encoding is working correctly and conclude our implementation\
    \ of the MacPaint file format. There's just one more step to get our dithered\
    \ pictures ready to be usable on a retro Mac.\n\n## Converting to MacBinary\n\n\
    On most operating systems, a file is just a single blob of data. The filesystem\
    \ or the operating system may hold onto some metadata about each file, but the\
    \ file itself stands alone. That wasn't the case on the classic Mac OS, where\
    \ many files had two forks. The *data fork* would hold the primary data of the\
    \ file, while a *resource fork* may hold ancillary data like bitmaps, sounds,\
    \ or even executable code. The resource fork could hold many different kinds of\
    \ data in one place, so it was kind of like a resource database. This is one of\
    \ the features of the operating system that allowed many applications to be completely\
    \ self-contained—a single executable that could be dragged and dropped as a single\
    \ icon, with no additional files.\n\nUnfortunately, since resource forks don't\
    \ exist on other operating systems, classic Mac files often get messed up when\
    \ transferred to or from them. Care needs to be taken. This was a problem from\
    \ the beginning, so “bundling” file formats were quickly developed. One of the\
    \ most popular and well standardized is known as MacBinary. In a MacBinary file,\
    \ a special header is followed by the data fork and resource fork together.\n\n\
    We need to bundle our MacPaint files as MacBinary files in order for them to work\
    \ properly on the classic Mac OS and open by default in MacPaint. Ironically,\
    \ a MacPaint file doesn't actually have a resource fork, it just has a data fork.\
    \ But MacBinary files also bundle metadata that was stored in the filesystem (MFS/HFS/HFS+)\
    \ of the classic Mac OS. The important bits are *type* and *creator codes*. The\
    \ classic Mac OS doesn't use file extensions to associate a file with the program\
    \ that should open it. Instead, it uses type and creator codes, which are largely\
    \ transparent to the user. This allows the user to name their files anything they\
    \ want and still have the files be “double-clickable.” After the MacBinary file\
    \ our program creates is unbundled by MacBinary (or another program like Stuffit)\
    \ on the classic Mac OS, the resulting MacPaint file should open MacPaint when\
    \ it's double-clicked.\n\nLuckily, the MacBinary file format is fairly simple.\
    \ To comply with the MacBinary specification, our program needs to:\n\n1. Add\
    \ the 128-byte MacBinary header before the rest of the file (which is just the\
    \ data fork since we have no resource fork).\n2. Fill in the MacBinary header\
    \ with the right values in several indicated places.\n3. Ensure the file ends\
    \ in a multiple of 128 bytes by padding the end of it if necessary.\n\nMacBinary\
    \ has an official specification that was approved by a committee of interested\
    \ parties.⁷ However, we only need to fill out a few fields for our MacBinary file\
    \ to be properly recognized. (The rest of the header should be 0s.) Table 3-6\
    \ lists these values, their lengths, and their respective offsets within the 128-byte\
    \ header.\n\n### Table 3-6: Required MacBinary Header Fields\n\n| Offset | Length\
    \ | Type | Value |\n|---|---|---|---|\n| 1 | 1 | Integer | Filename length (up\
    \ to 63) |\n| 2 | 1 to 63 | MacRoman | Filename |\n| 65 | 4 | MacRoman | File\
    \ type (should be “PNTG”) |\n| 69 | 4 | MacRoman | File creator (should be “MPNT”)\
    \ |\n| 83 | 4 | Integer | Data fork length |\n| 91 | 4 | Integer | Creation time\
    \ as seconds since 1/1/1904 |\n| 95 | 4 | Integer | Modification time as seconds\
    \ since 1/1/1904 |\n\nNote that values are stored big-endian, since the classic\
    \ Mac OS ran on big-endian microprocessors. (If that doesn’t mean anything to\
    \ you, see the “Big-Endian vs. Little-Endian” box.) MacRoman is a character encoding\
    \ used on the classic Mac OS.⁸\n\nThe `macbinary_header()` function is a codification\
    \ of Table 3-6:\n\n```\ndef macbinary_header(outfile: str, data_size: int) ->\
    \ array:\n    macbinary = array('B', [0] * MACBINARY_LENGTH)\n    filename = Path(outfile).stem\n\
    \    filename = filename[:63] if len(filename) > 63 else filename  # limit to\
    \ 63 characters max\n    macbinary[1] = len(filename)  # filename length\n   \
    \ macbinary[2:(2 + len(filename))] = array(\"B\", filename.encode(\"mac_roman\"\
    ))  # filename\n    macbinary[65:69] = array(\"B\", \"PNTG\".encode(\"mac_roman\"\
    ))  # file type\n    macbinary[69:73] = array(\"B\", \"MPNT\".encode(\"mac_roman\"\
    ))  # file creator\n    macbinary[83:87] = array(\"B\", data_size.to_bytes(4,\
    \ byteorder='big'))  # size of data fork\n    timestamp = int((datetime.now()\
    \ - datetime(1904, 1, 1)).total_seconds())  # Mac timestamp\n    macbinary[91:95]\
    \ = array(\"B\", timestamp.to_bytes(4, byteorder='big'))  # creation stamp\n \
    \   macbinary[95:99] = array(\"B\", timestamp.to_bytes(4, byteorder='big'))  #\
    \ modification stamp\n    return macbinary\n```\n\nAny filenames that are more\
    \ than 63 characters simply have their ends chopped off.\n\n### BIG-ENDIAN VS.\
    \ LITTLE-ENDIAN\n\nWhat order should the bytes representing a piece of data, such\
    \ as a number, be stored in? This is a much-debated question, with the computer\
    \ science world split between two camps: big-endian and little-endian.\n\nThink\
    \ for a moment about how we represent numbers in everyday life. If you come from\
    \ a culture that uses the Arabic numeral system, like the English-speaking world,\
    \ you’re probably used to writing numbers from left to right starting with the\
    \ digit representing the largest part of the number\n\n*(continued)*"
