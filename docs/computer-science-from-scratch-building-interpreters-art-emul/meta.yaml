- img_proc: true
  md: 'The answer is that many of Python’s runtime dynamic features wouldn’t be possible,
    or at least would be very difficult to implement, in anything but an interpreter.
    There are efforts to do so (PyPy, for instance), but they’re much harder to get
    right.


    In addition, interpreters are much easier to implement than compilers because
    they lack the entire backend phase of the compiler that’s responsible for generating
    machine code. Many languages therefore start out as interpreted because it’s simply
    the fastest way to get an implementation up and running. For instance, the first
    version of Java was interpreted, and it took a couple of years before a just-in-time
    compiled version came out.


    In short, interpreters exist because they’re easier to implement than compilers
    and because they enable certain powerful dynamic runtime features. If you’re thinking
    of implementing a new programming language, especially a dynamic one, the easiest
    place to start is probably with an interpreter.


    # Exercises


    +   1. Write a Brainfuck-to-Python transpiler. A *transpiler* is like a compiler,
    but instead of converting source code that was written in a high-level language
    into machine code, it converts source code from one high-level language to another
    high-level language. You can reuse a lot of the structure from the Brainfuck interpreter.
    Instead of executing each Brainfuck command, you can emit some equivalent Python
    code into a list of strings. The final output of your program should be the equivalent
    Python code saved to a file. The trickiest part will be figuring out what to do
