  mdcn: "表 6-3：6502 寄存器\n\n| 名称 | 大小（字节） | 用途 |\n| :--- | :--- | :--- |\n| A | 1 |\
    \ 用于算术运算的主寄存器。有时也称为 *累加器*。 |\n| X | 1 | 一个 *索引寄存器*，通常用作循环计数器。它也可以用作通用寄存器，尽管并非所有指令都能像对\
    \ A 那样对它进行操作。 |\n| Y | 1 | 与 X 相同。 |\n| PC | 2 | *程序计数器*，用于跟踪内存中下一条要执行的指令的位置。它是\
    \ 2 字节，因为 6502 最多可以寻址 64KB 的内存（不使用 bank switching）。 |\n| SP | 1 | *栈指针*，用于跟踪程序当前在栈上的位置。由于它只有\
    \ 1 字节，栈最多只能容纳 256 字节。 |\n| P | 1 | *状态* 或 *标志* 寄存器。它的各个位表示不同的信息，例如关于算术运算的某些情况（例如，结果是否为零？）或者是否发生了中断以及中断是否启用（IRQ）。\
    \ |\n\n由于 Python 对所有整数无论大小都只使用一种类型，我们使用 `int` 类型来表示除标志位以外的所有这些寄存器。我们不直接操作状态寄存器中每个标志位的各个位，而是使用\
    \ 6502 文档中常见的字母命名法将它们分成独立的布尔值。这些是 C、Z、I、D、B、V 和 N 成员变量。它们中的大多数是作为算术运算的结果而设置的，I\
    \ 在程序希望不被 IRQ 信号中断时设置，B 在中断指令后标志位被压入栈时设置。D 标志用于 BCD 码，与 NES 无关，因为 NES 没有 BCD 指令。\n\
    \n`jumped` 变量用于跟踪跳转指令是否修改了 PC 寄存器，而 `page_crossed` 用于在访问跨内存页的内存时进行记账，正如之前讨论的，这可能比访问附近的内存开销更大。NES\
    \ CPU 可能需要等待一定数量的周期来完成某些任务。这就是 `stall` 的用途。在我们的模拟器中，它仅在发生直接内存访问（DMA）传输时使用，用于将大量数据从主内存发送到对象属性内存（OAM），PPU\
    \ 在那里存储关于精灵的信息。\n\n## 跳转表\n\n接下来，我们将声明跳转表，即包含 6502 可以处理的所有潜在指令的列表。由于 6502 使用 1\
