  md: 'address 0x4016 can''t be used for anything else; it''s hooked up in hardware
    to lines coming from the joypad. To work properly, our emulator will need to do
    the right thing when several of these special memory addresses are either read
    or written to. Some are read-only, some are write-only, and some can be read or
    written. These are the memory-mapped hardware registers.


    The other key piece of NES hardware was the game cartridges. Game cartridges,
    especially the early ones, mainly consisted of a large ROM chip containing the
    graphics and program code for a game. Game cartridges could also have RAM (sometimes
    backed by a battery so that game states could be saved), simple logic chips, and
    even so-called bank switching to allow for more total memory (RAM + ROM) than
    the 6502 could address in its default configuration. That 2KB of RAM figure is
    therefore slightly misleading because the program''s code would reside on the
    ROM cartridge rather than in the game console''s limited memory. Instead, that
    2KB of memory could be used almost exclusively for holding onto state. Early game
    cartridges typically consisted of 24KB to 40KB of ROM, while later game cartridges
    may have had something like 128KB of ROM and 8KB of RAM. The largest mainstream
    cartridge for the NES featured 768KB of memory.³


    # The Software


    The NES had no BIOS or operating system. The bare NES hardware had no software
    that came with it. All software was provided by the game cartridges. The programs
    on the game cartridges would directly control the CPU, PPU, and APU, with no layers
    of abstraction between them and the hardware.


    NES games were typically written in 6502 assembly language. That may sound hardcore,
    but it was typical for the era; most programs that needed to be high performance
    on personal computers or gaming consoles were programmed in assembly language
    through to the early 1990s. Beyond an assembler, development tools were often
    built in-house. There was no NES Game Maker that one could download.


    In fact, this was an era before downloads were a thing at all. The NES was a couple
    of console generations before any kind of internet connectivity existed. The first
    mainstream console with a built-in modem was the Sega Dreamcast, which came out
    in the late 1990s. What shipped on an NES cartridge was the final version of the
    game; there would be no updates. If there was a bug, then there was a bug, so
    games had to be near perfect for version 1.0. Contrast that with the typical game
    you purchase today, where developers are often working on the first major patch
    before the game has even been released. Back then, a whole other level of attention
    to detail was required, but on the other hand, the games were much less complex
    than they are today.


    It''s amazing to think that in this primitive environment, some of the most influential
    and genre-defining games of all time were developed. The technical aptitude required
    of the programmers on the teams was in a very different niche than what game developers
    occupy today. Most games today are built using prepacked frameworks or engines
    like Unreal or Unity. Developers can spend most of their time writing game-specific
    mechanics.'
