    | i | Memory index register | Stores a 16-bit address used for completing instructions
    that span multiple contiguous places in memory. |

    | delay_timer | Delay timer | Stores an 8-bit value that’s decremented 60 times
    per second until it reaches 0. |

    | sound_timer | Sound timer | Stores an 8-bit value that’s decremented 60 times
    per second until it reaches 0; while it’s above 0, a beep is played by the computer
    speaker. |'
- md: 'A typical CHIP-8 VM has 4KB of general-purpose RAM. This is in line with the
    COSMAC VIP when loaded with expansion memory. However, there''s a catch: on the
    VIP, the first 512 bytes of memory had to contain the code for the actual CHIP-8
    VM itself (yes, the whole VM fit into just 512 bytes of machine code—think about
    that as we write our version). That left only 3.5KB of usable RAM. To be backward
    compatible today, our VM must also reserve the first 512 bytes of RAM.


    ## Instructions


    The CHIP-8 VM was largely used to program games, so it includes specialized instructions
    for actions like moving sprites and playing a beep. Those sit alongside all the
    mundane, utilitarian instructions you''d find in any microprocessor instruction
    set or low-level programming language—instructions for manipulating memory, doing
    arithmetic, overseeing control flow, handling timers, and managing the display.
    In total, there are 35 instructions that we''ll be implementing. All the instructions
    are specified in hexadecimal—see the “Hexadecimal” box for more on that numbering
    system.


    > HEXADECIMAL


    Hexadecimal, or base-16, is the number system typically used for working with
    low-level bytes on computing systems (RAM addresses, CPU instructions, and the
    like). It can more compactly and consistently refer to values in bytes than binary
    or standard decimal (base-10, the number system we''re used to). For instance,
    you can represent any 8-bit number using two hexadecimal digits, and helpfully,
    each of those two digits corresponds to exactly half of the byte when written
    out in binary (half of a byte is known as a nibble). If you were a programmer
    in the 1970s or 1980s, you would work with hexadecimal often, but today the average
    Python developer seldom uses it outside of low-level programming.


    In hexadecimal, in addition to the 10 symbols 0–9, six further symbols are provided,
    A–F, corresponding to the decimal values 10–15. In Python, hexadecimal literals
    start with the 0x prefix. For example, 0xFF is the same as the decimal number
    255, or the binary number 0b11111111. One F in the hexadecimal version refers
    to the first half of the ones in the binary version (1111), and the other F refers
    to the second set of ones (1111). This is the maximum value of 1 byte. To illustrate
    the conversion more clearly, the hexadecimal number 0xF0 can be written in binary
    as 0b11110000, with the F for the 1111 and the 0 for the 0000.


    To convert from hexadecimal to decimal, multiply each hex digit from right to
    left by a power of 16, starting with 16⁰. For example, 0xFF can be rewritten as
    (15 × 16⁰) + (15 × 16¹). The right digit (F) becomes 15 × 1 = 15, the left digit
    becomes 15 × 16 = 240, and 240 + 15 = 255. Here''s another example: 0xA5B is (11
    × 16⁰) + (5 × 16¹) + (10 × 16²). This is equivalent to 2,651 in decimal.


    The instructions are here as a quick reference and to give you a sense of the
    “lay of the land.” We’ll get into the details of how each instruction works in
    the code, but the reality is that most of the code is pretty self-explanatory
    based on the instruction descriptions. The vast majority of instructions can be
    implemented in just a couple lines of Python.


    I spent a lot of time thinking about how to group the instructions for this discussion.
    Ultimately, I decided to order them numerically so that they appear in the same
    order here as they do in the code. Every instruction in CHIP-8 is 16 bits, or
    in other words, 2 bytes or 4 nibbles, so it translates to four hexadecimal digits.
    Any uppercase hexadecimal digit 0–F in an instruction is a literal. Any lowercase
    letter indicates a value that will be used as part of the implementation of the
    instruction. An underscore (_) indicates the nibble is arbitrary. The instructions
    were originally described in the RCA COSMAC VIP CDP18S711 Instruction Manual.⁵


    > NOTE: A few instructions listed here weren’t present in the original CHIP-8
    specification (for example, 8x_6 and 8x_E). Their functionality sometimes differs
    across varying CHIP-8 implementations.


    ## Screen Clearing and Basic Jumps


    The first set of instructions are used for cleaning up the entire screen all at
    once and for moving from one part of the program to another part of the program.


    - 00E0 Clear the screen.

    - 00EE Return from a subroutine.

    - 0nnn Call the program at nnn, reset the timers and registers, and clear the
    screen.

    - 1nnn Jump to address nnn without resetting.

    - 2nnn Call the subroutine at nnn.


    ## Conditional Skips


    The next set of instructions are for jumps to another part of the program if a
    particular condition is true.


    - 3xnn Skip the next instruction if v[x] equals nn.

    - 4xnn Skip the next instruction if v[x] doesn’t equal nn.

    - 5xy_ Skip the next instruction if v[x] equals v[y].


    ## General-Purpose Register Adjustments, Arithmetic, and Bit Manipulation


    Next come standard instructions that you would find in any CPU or VM for actions
    like doing math, setting registers, and shifting bits.


    - 6xnn Set v[x] to nn.

    - 7xnn Add nn to v[x].

    - 8xy0 Set v[x] to v[y].

    - 8xy1 Set v[x] to v[x] | v[y] (bitwise OR).

    - 8xy2 Set v[x] to v[x] & v[y] (bitwise AND).

    - 8xy3 Set v[x] to v[x] ^ v[y] (bitwise XOR).

    - 8xy4 Add v[y] to v[x] and set the carry flag.

    - 8xy5 Subtract v[y] from v[x] and set the borrow flag.

    - 8x_6 Shift v[x] right one bit and set the flag to the least-significant bit.

    - 8xy7 Subtract v[x] from v[y] and store the result in v[x]; set the borrow flag.

    - 8x_E Shift v[x] left one bit and set the flag to the most-significant bit.


    ## Miscellaneous Instructions


    These instructions don''t quite have a unified subject area, but their opcodes
    are close to one another numerically.


    - 9xy0 Skip the next instruction if v[x] doesn''t equal v[y].

    - Annn Set i to nnn.

    - Bnnn Jump to nnn + v[0].

    - Cxnn Set v[x] to a random integer (0–255) & nn (bitwise AND).

    - Dxyn Draw a sprite that''s n high at (v[x], v[y]); set the flag on a collision.


    ## Key and Timer Instructions


    The next batch of instructions are for manipulating the VM''s timers and checking
    on the status of various keys or waiting for a particular key to be pressed.


    - Ex9E Skip the next instruction if key v[x] is set (pressed).

    - ExA1 Skip the next instruction if key v[x] is not set (not pressed).

    - Fx07 Set v[x] to the delay timer.

    - Fx0A Wait until the next key press, then store the key in v[x].

    - Fx15 Set the delay timer to v[x].

    - Fx18 Set the sound timer to v[x].


    ## Register i Instructions


    All the instructions in this last set are related to the memory index register
    (i).


    - Fx1E Add v[x] to i.

    - Fx29 Set i to the location of character v[x] in the font set.

    - Fx33 Store the binary-coded decimal (BCD) value in v[x] at memory locations
    i, i + 1, and i + 2. (See the “Binary-Coded Decimal” box on page 122 for more
    on this.)

    - Fx55 Dump registers v[0] through v[x] in memory, starting at i.

    - Fx65 Store memory from i through i + x in registers v[0] through v[x].


    Consider for a moment how mundane these instructions sound. You really don''t
    need any sophisticated mechanisms to have a working “computer.” Contrast the 35
    CHIP-8 instructions described here with the 8 instructions in our implementation
    of Brainfuck from Chapter 1. Both are memory-constrained Turing machines, and
    they aren''t as different from each other as their superficial instruction syntax
    may make it appear.


    > ### BINARY-CODED DECIMAL


    Binary-coded decimal (BCD) is a way of storing decimal numbers in binary. It''s
    not widely used today, but it was common in early computers. For example, several
    microprocessors from the 1970s included explicit instructions for BCD arithmetic,
    which offered more precision when dealing with decimal rounding and to some extent
    made machine code more readable. For the average modern programmer, there isn''t
    much value in learning BCD except as a curiosity. There were multiple different
    BCD schemes, and frankly I don''t think that learning the particular scheme used
    in the CHIP-8 VM is a valuable use of our space in this book.


    ## The Implementation


    Now that we know the CHIP-8 architecture, we''re ready to implement our VM. The
    file `__main__.py` will contain the main run loop that handles user input, updates
    the display, manages timers, and most importantly, tells the VM to step through
    the next instruction. This file is also where the command line argument that specifies
    the ROM file is parsed. Meanwhile, `vm.py` is the actual VM.


    > ### ROMS


    Did you ever wonder why the files that hold games used in emulators are called
    ROMs? ROM stands for read-only memory. Most early video game systems used plastic
    cartridges that were glorified holders for ROM chips that directly plugged into
    the consoles. When the games were converted into files for emulators, someone
    would have to go and plug the ROM chip into a specialized device connected to
    their computer and “rip” the data from the ROM chip to store it in a file. The
    file would have an exact copy of the data on the ROM chip, perhaps with some extra
    header information depending on the emulation ecosystem.'
  mdcn: '一个典型的 CHIP-8 虚拟机拥有 4KB 的通用 RAM。这与加载了扩展内存的 COSMAC VIP 一致。然而，这里有个问题：在 VIP 上，内存的前
    512 字节必须包含 CHIP-8 虚拟机本身的代码（是的，整个虚拟机仅用 512 字节的机器码就装下了——在编写我们自己的版本时可以思考一下这一点）。这只剩下
    3.5KB 的可用 RAM。为了向后兼容，我们的虚拟机也必须保留 RAM 的前 512 字节。


    ## 指令


    CHIP-8 虚拟机主要用于编写游戏程序，因此它包含用于移动精灵、播放蜂鸣声等操作的专用指令。这些指令与你在任何微处理器指令集或低级编程语言中都能找到的那些普通的、实用的指令并存——用于操作内存、执行算术运算、控制流程、处理定时器以及管理显示的指令。总共，我们将实现
    35 条指令。所有指令都以十六进制指定——关于该编号系统的更多信息，请参见“十六进制”框。


    > 十六进制


    十六进制，或称基数-16，是计算系统中用于处理低级字节（如 RAM 地址、CPU 指令等）的典型数制。与二进制或标准十进制（基数-10，我们习惯使用的数制）相比，它能更紧凑、更一致地表示字节中的值。例如，你可以用两个十六进制数字表示任何
    8 位数字，而且很有帮助的是，当用二进制写出时，这两个数字中的每一个都恰好对应字节的一半（字节的一半称为半字节）。如果你是 1970 年代或 1980 年代的程序员，你会经常使用十六进制，但如今，普通的
    Python 开发者除了在低级编程中很少使用它。


    在十六进制中，除了 10 个符号 0–9 外，还提供了六个额外的符号 A–F，对应十进制值 10–15。在 Python 中，十六进制字面量以 0x 前缀开头。例如，0xFF
    等同于十进制数 255，或二进制数 0b11111111。十六进制版本中的一个 F 指的是二进制版本中第一组 1（1111），另一个 F 指的是第二组 1（1111）。这是
    1 字节的最大值。为了更清楚地说明转换过程，十六进制数 0xF0 可以写成二进制 0b11110000，其中 F 对应 1111，0 对应 0000。


    要将十六进制转换为十进制，请从右到左将每个十六进制数字乘以 16 的幂，从 16⁰ 开始。例如，0xFF 可以重写为 (15 × 16⁰) + (15 ×
    16¹)。右边的数字 (F) 变成 15 × 1 = 15，左边的数字变成 15 × 16 = 240，240 + 15 = 255。再举一个例子：0xA5B
    是 (11 × 16⁰) + (5 × 16¹) + (10 × 16²)。这等同于十进制的 2,651。


    这里列出指令是为了快速参考，并让你对“全局情况”有所了解。我们将在代码中深入探讨每条指令的工作原理，但现实情况是，根据指令描述，大部分代码是相当不言自明的。绝大多数指令只需几行
    Python 代码即可实现。


    我花了很多时间思考如何为本次讨论对指令进行分组。最终，我决定按数字顺序排列它们，以便它们在此处的顺序与代码中的顺序相同。CHIP-8 中的每条指令都是 16
    位，换句话说，是 2 字节或 4 个半字节，因此它转换为四个十六进制数字。指令中任何大写的十六进制数字 0–F 都是字面量。任何小写字母表示将用作指令实现一部分的值。下划线
    (_) 表示该半字节是任意的。这些指令最初在 RCA COSMAC VIP CDP18S711 指令手册中描述。⁵


    > 注意：此处列出的一些指令在原始 CHIP-8 规范中并不存在（例如，8x_6 和 8x_E）。它们的功能在不同的 CHIP-8 实现中有时会有所不同。


    ## 清屏和基本跳转


    第一组指令用于一次性清除整个屏幕，以及从程序的一部分移动到另一部分。


    - 00E0 清除屏幕。

    - 00EE 从子程序返回。

    - 0nnn 调用地址为 nnn 的程序，重置定时器和寄存器，并清除屏幕。

    - 1nnn 跳转到地址 nnn，不重置。

    - 2nnn 调用地址为 nnn 的子程序。


    ## 条件跳过


    下一组指令用于在特定条件为真时跳转到程序的另一部分。


    - 3xnn 如果 v[x] 等于 nn，则跳过下一条指令。

    - 4xnn 如果 v[x] 不等于 nn，则跳过下一条指令。

    - 5xy_ 如果 v[x] 等于 v[y]，则跳过下一条指令。


    ## 通用寄存器调整、算术运算和位操作


    接下来是标准指令，这些指令在任何 CPU 或虚拟机中都能找到，用于执行数学运算、设置寄存器和移位等操作。


    - 6xnn 将 v[x] 设置为 nn。

    - 7xnn 将 nn 加到 v[x] 上。

    - 8xy0 将 v[x] 设置为 v[y]。

    - 8xy1 将 v[x] 设置为 v[x] | v[y]（按位或）。

    - 8xy2 将 v[x] 设置为 v[x] & v[y]（按位与）。

    - 8xy3 将 v[x] 设置为 v[x] ^ v[y]（按位异或）。

    - 8xy4 将 v[y] 加到 v[x] 上，并设置进位标志。

    - 8xy5 从 v[x] 中减去 v[y]，并设置借位标志。

    - 8x_6 将 v[x] 右移一位，并将标志设置为最低有效位。

    - 8xy7 从 v[y] 中减去 v[x]，并将结果存储在 v[x] 中；设置借位标志。

    - 8x_E 将 v[x] 左移一位，并将标志设置为最高有效位。


    ## 杂项指令


    这些指令没有统一的主题领域，但它们的 opcode 在数字上彼此接近。


    - 9xy0 如果 v[x] 不等于 v[y]，则跳过下一条指令。

    - Annn 将 i 设置为 nnn。

    - Bnnn 跳转到 nnn + v[0]。

    - Cxnn 将 v[x] 设置为一个随机整数 (0–255) & nn（按位与）。

    - Dxyn 在 (v[x], v[y]) 处绘制一个高度为 n 的精灵；如果发生碰撞则设置标志。


    ## 按键和定时器指令


    下一批指令用于操作虚拟机的定时器，以及检查各种按键的状态或等待特定按键被按下。


    - Ex9E 如果按键 v[x] 被设置（按下），则跳过下一条指令。

    - ExA1 如果按键 v[x] 未被设置（未按下），则跳过下一条指令。

    - Fx07 将 v[x] 设置为延迟定时器的值。

    - Fx0A 等待直到下一个按键被按下，然后将该键存储在 v[x] 中。

    - Fx15 将延迟定时器设置为 v[x]。

    - Fx18 将声音定时器设置为 v[x]。


    ## 寄存器 i 指令


    最后一组中的所有指令都与内存索引寄存器 (i) 相关。


    - Fx1E 将 v[x] 加到 i 上。

    - Fx29 将 i 设置为字体集中字符 v[x] 的位置。

    - Fx33 将 v[x] 中的二进制编码十进制 (BCD) 值存储在内存位置 i、i + 1 和 i + 2。（有关更多信息，请参见第 122 页的“二进制编码十进制”框。）

    - Fx55 将寄存器 v[0] 到 v[x] 的内容转储到内存中，从 i 开始。

    - Fx65 将内存中从 i 到 i + x 的内容存储到寄存器 v[0] 到 v[x] 中。


    思考一下这些指令听起来多么普通。你真的不需要任何复杂的机制就能拥有一台可工作的“计算机”。将此处描述的 35 条 CHIP-8 指令与我们在第 1 章实现的
    Brainfuck 的 8 条指令进行对比。两者都是内存受限的图灵机，它们之间的差异并不像其表面上的指令语法所显示的那么大。


    > ### 二进制编码十进制


    二进制编码十进制 (BCD) 是一种以二进制形式存储十进制数的方法。它在今天并不广泛使用，但在早期计算机中很常见。例如，1970 年代的几款微处理器包含了用于
    BCD 算术的显式指令，这在处理十进制舍入时提供了更高的精度，并在某种程度上使机器码更具可读性。对于现代普通程序员来说，学习 BCD 除了作为一项好奇心外，价值不大。存在多种不同的
    BCD 方案，坦率地说，我认为学习 CHIP-8 虚拟机中使用的特定方案并不是本书中我们篇幅的宝贵用途。


    ## 实现


    现在我们已经了解了 CHIP-8 架构，我们准备好实现我们的虚拟机了。文件 `__main__.py` 将包含主运行循环，该循环处理用户输入、更新显示、管理定时器，最重要的是，告诉虚拟机执行下一条指令。该文件也是解析指定
    ROM 文件的命令行参数的地方。同时，`vm.py` 是实际的虚拟机。


    > ### ROM


    你是否曾想知道为什么在模拟器中使用的游戏文件被称为 ROM？ROM 代表只读存储器。大多数早期的视频游戏系统使用塑料卡带，这些卡带本质上是 ROM 芯片的载体，直接插入游戏机。当游戏被转换为模拟器文件时，有人必须将
    ROM 芯片插入连接到计算机的专用设备，并从 ROM 芯片中“提取”数据以存储在文件中。该文件将包含 ROM 芯片上数据的精确副本，可能根据模拟生态系统包含一些额外的头信息。'
