    The background is the back layer of the graphics where the individual pieces typically
    either don''t move at all or only scroll together as a group. The NES hardware
    draws the background using *tiles*. In a platform game, for example, a tile might
    be a part of a platform, a part of an artistic background (a mountain, perhaps),
    a ladder, or a door. These elements typically can''t move on their own.


    By contrast, *sprites* are individual game objects that can move anywhere on the
    screen independently. Think of the player and enemies in a platform game. The
    NES has specialized hardware for handling up to 64 8×8 or 8×16 (in pixels) sprites
    on the screen at a time.


    There are many different ways to implement the PPU. The most accurate is to simulate
    what the real PPU does: generate each pixel of the screen, one at a time. If this
    implementation is done properly, any game written for the NES should work correctly.
    This approach is also the most performance intensive. A popular alternative is
    to implement graphics one scanline at a time. Instead of doing updates for every
    pixel, the updates occur when each scanline''s processing is complete.


    We won''t be doing either of these. As discussed earlier, we''ll implement the
    PPU using the even simpler approach of updating the entire screen one frame at
    a time. This is the least accurate technique, because if the game somehow changes
    the graphics between pixels or between scanlines, those updates won''t appear.
    Compatibility will still be good, but it won''t extend to all games.


    While our method is the furthest away from how the real PPU works, it''s the most
    performant technique, since it requires the fewest updates per frame (just one
    big update instead of many small updates). It''s also the least conceptually difficult,
    since it doesn''t require understanding all the details of how the real PPU works.
    Because our emulator is being written in a relatively slow programming language,
    Python, and is intended to be as simple as possible for demonstration purposes,
    per-frame rendering is arguably the best choice.


    While we don''t need to understand every detail of the PPU to implement our frame-by-frame
    approach, we still need to understand some fundamentals about where the data for
    the backgrounds and the sprites comes from. We''ll dive into that in the coming
    sections. Some of the information was already scattered throughout earlier parts
    of the chapter, but here it''s all woven together with many new ideas and details
    to cohesively explain how the PPU operates.


    # CHR ROM


    The data for both the background tiles and the sprites is initially located on
    the cartridge in a region of memory known as CHR ROM. The size of this memory
    could range quite a bit. Early games typically had just 8KB of CHR ROM, but later
    games with mappers could have hundreds of kilobytes, with the ability to swap
    in any other 8KB region for the first so as to'
  - '[PAGE 201]


    be compatible with the expectations of the PPU hardware (which can only address
    8KB of CHR ROM directly).

    Some games replaced CHR ROM with CHR RAM, which is modifiable during game operation.
    However, most games had fixed CHR ROM. If a game had CHR RAM, the game had to
    load the graphics into the CHR RAM as needed from the PRG ROM, instead of it just
    always being there. Some rare games had both CHR ROM and CHR RAM in different
    banks.


    # Pattern Tables and Tiles


    At any given time the PPU can be “hooked up” to either of two 4KB portions of
    the CHR ROM on the cartridge. These portions are known as *pattern tables*. The
    NES pulls all of its graphics data for a given frame from the selected pattern
    table. Note that some documentation refers to all 8KB of addressable CHR ROM as
    a single overall pattern table rather than calling each 4KB section a separate
    pattern table.

    Each pattern table is divided into 256 16-byte tiles, and each tile defines potential
    graphics for an 8×8 pixel region of the screen. Together, the predefined tiles
    in the pattern tables represent all the different things you might see in the
    game. For example, Figure 6-1 shows the pattern tables for the open source game
    *BrickBreaker* by Aleff Correa, which we’ll run in our emulator later in the chapter.


    ![](img/2b670944a6e236c13c5019fe56234a0a_201_0.png)


    *Figure 6-1: The pattern tables of BrickBreaker, as displayed by the FCEUX emulator’s
    PPU Viewer*


    You can see how some of the tiles in the pattern tables represent sprites, some
    represent text, and some represent background patterns. Many of the tiles in the
    pattern tables are blank because *BrickBreaker* doesn’t have the need to use them
    (it has more space in CHR ROM for graphical assets than it actually needs).'
  - '[PAGE 202]


    > Figure 6-1 was generated using the PPU Viewer feature of the FCEUX emulator,
    which allows you to see the contents of CHR ROM, separate from actual gameplay.
    Adding debug features like a pattern table viewer can be very helpful when writing
    an emulator. For example, you could compare the output of your PPU to that of
    an established emulator like FCEUX.


    As mentioned, each tile in a pattern table is 16 bytes. With 16 bytes defining
    8×8 = 64 pixels, that leaves just 2 bits per pixel, and 2 bits can only represent
    four different values (00, 01, 10, 11). The PPU therefore only supports four colors
    within a given tile. In fact, one of those is always a preset background color
    or transparent (00), so there are essentially only three programmer-selected colors
    that can appear in a specific tile. This palette of colors is set for regions
    of four tiles at a time and is controlled in a separate part of memory from the
    pattern tables themselves. This is why all of the tiles appear in grayscale in
    Figure 6-1; the color palette of each tile isn''t determined by the pattern table.
    We''ll come back to how colors are selected shortly.


    Unfortunately, the tiles get a little bit more complicated: the 2-bit values that
    define each pixel aren''t laid out sequentially. Instead, the zeroth bit of each
    pixel is laid out in the first 8 bytes of the tile, and the first bit of each
    pixel is laid out in the second 8 bytes of the tile. Each 8 bytes forms a *bit
    plane*, and the two planes combine, two bits at a time, to determine each pixel''s
    color.


    Let me phrase that another way. The first 8 bytes (first bit plane) of a tile
    can be thought of as 64 halves of the color values for the 64 pixels in the 8×8
    tile. They''re laid out sequentially. The second 8-byte bit plane defines another
    64 halves of the color values for the same 64 pixels. They''re also laid out sequentially.
    The two planes need to be combined to get the 64 final color values. As an example,
    consider the following 16 bytes of tile data:⁶


    ```

    Bit Plane 1

    Byte 1  01000001

    Byte 2  11000010

    Byte 3  01000100

    Byte 4  01001000

    Byte 5  00010000

    Byte 6  00100000

    Byte 7  01000000

    Byte 8  10000000

    Bit Plane 2

    Byte 9  00000001

    Byte 10 00000010

    Byte 11 00000100

    Byte 12 00001000

    Byte 13 00010110

    Byte 14 00100001

    Byte 15 01000010

    Byte 16 10000111

    ```


    ```

    Pixel Pattern

    01000003

    11000030

    01000300

    01003000

    00030220

    00300002

    03000020

    30000222

    ```'
