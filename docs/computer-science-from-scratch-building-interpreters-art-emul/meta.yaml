  md: "```\ntimer_accumulator = 0.0 # used to limit the timer to 60 Hz\n# Main virtual\
    \ machine loop\nwhile True:\n    frame_start = timer()\n    vm.step()\n    if\
    \ vm.needs_redraw:\n        pygame.surfarray.blit_array(screen, vm.display_buffer)\n\
    \        pygame.display.flip()\n```\n\nAt the beginning of the run loop, the time\
    \ is recorded with `frame_start = timer()` to measure the duration of each iteration\
    \ of the loop. This is because CHIP-8’s timers need to be decremented 60 times\
    \ per second (if they’re above zero). The VM is then told to execute an instruction\
    \ (and therefore to move to the next instruction) via `vm.step()`. If indicated\
    \ by `vm.needs_redraw`, the display is then redrawn via two simple calls to Pygame.\
    \ One copies the VM’s display buffer to the screen, and the other shows it.\n\n\
    Note that the code uses the term *frame* a little differently than is typical.\
    \ In most programs, a frame is one full refresh of the entirety of the program’s\
    \ graphical output, but in this context, our run loop won’t necessarily redraw\
    \ the graphics every iteration, since `vm.needs_redraw` may not always be True.\n\
    \nWhat definitely *will* happen every “frame” is that one instruction will be\
    \ executed as a result of the call to `vm.step()`. As such, I thought about using\
    \ the word *instruction* rather than *frame* in this section of the code, for\
    \ example, `instruction_start` rather than `frame_start`. However, more than just\
    \ the execution of an instruction is happening in the run loop—there’s also graphical\
    \ output, keyboard handling, and sound output—so *instruction* sounded too limited.\
    \ But again, *frame* isn’t quite accurate either. It’s true what they say: one\
    \ of the hardest problems in computer science is naming.\n\nThe run loop finishes\
    \ by handling keyboard events, playing a sound when the VM’s Boolean `vm.play_sound`\
    \ indicates, and handling timing:\n\n```\n# Handle keyboard events\nfor event\
    \ in pygame.event.get():\n    if event.type == pygame.KEYDOWN:\n        key_name\
    \ = pygame.key.name(event.key)\n        if key_name in ALLOWED_KEYS:\n       \
    \     vm.keys[ALLOWED_KEYS.index(key_name)] = True\n    elif event.type == pygame.KEYUP:\n\
    \        key_name = pygame.key.name(event.key)\n        if key_name in ALLOWED_KEYS:\n\
    \            vm.keys[ALLOWED_KEYS.index(key_name)] = False\n    elif event.type\
    \ == pygame.QUIT:\n        sys.exit()\n\n# Sound\nif vm.play_sound:\n    if not\
    \ currently_playing_sound:\n        bee_sound.play(-1)\n        currently_playing_sound\
    \ = True\n```"
