    # Real-World Applications


    Beyond looking kind of cool, the output of this program doesn’t have a lot of
    practical applications. However, the techniques that were used to build it certainly
    do. They fall under an umbrella term known as *stochastic optimization*. Suppose
    you have an optimization problem you want to solve, but you don’t know of a deterministic
    algorithm (an algorithm that gives the same result every time by following the
    same steps every time) to solve it. In that case, a technique that involves random
    (stochastic) trials may be warranted.


    It may not be abundantly clear, but the challenge in this chapter is an example
    of an optimization problem. Our program tries to optimize for a drawing that’s
    as close to the original photograph as possible. The objective function (the thing
    that checks if we’re going in the right direction) is the difference() method.
    The lower the difference, the more optimal the potential solution to the problem
    that a particular image represents.


    One famous practical area where stochastic optimization algorithms are useful
    is the classic traveling salesperson problem. The problem calls for a traveler
    to visit every specified location on a map exactly once and return to their starting
    point using the shortest route possible. It’s what delivery trucks (think FedEx
    or UPS) do every day, so it has a very practical application. Unfortunately, there’s
    no known deterministic algorithm for solving the traveling salesperson problem
    optimally for a large number of locations in a reasonable amount of time. Instead,
    stochastic optimization techniques such as genetic algorithms provide a useful
    way to solve the problem, but their solutions may be suboptimal. A genetic algorithm
    may not always yield a perfect solution to the traveling salesperson problem,
    but it will almost always yield a solution that’s good enough.


    Our program also utilized hill climbing. Although this is one of the simplest
    local search procedures (just keep going in the same direction if that direction
    is working), it’s a very common technique, and it performs as well as more advanced
    techniques in many scenarios. Hill climbing also forms the basis for other, more
    sophisticated algorithms. For example, the simplex algorithm for solving linear
    programming problems utilizes hill climbing.²'
