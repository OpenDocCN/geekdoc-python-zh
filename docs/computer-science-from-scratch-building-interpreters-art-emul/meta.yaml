    \ component, which can be thought of as the column. To get the actual index byte\
    \ (nametable_entry) we read a byte of memory at the tile_address. Later in the\
    \ method we'll use nametable_entry to retrieve the tile's pixel content from the\
    \ pattern table.\nNext, we get the attribute table entry corresponding to the\
    \ current nametable entry:\n\n```\nattrx = x // 4\nattry = y // 4\nattribute_address\
    \ = attribute_table_address + attry * 8 + attrx\nattribute_entry = self.read_memory(attribute_address)\n\
    ```\n\nBecause each entry in the 8×8 attribute table is for 16 tiles, we divide\
    \ both x and y by 4 to get the attribute entry connected to the tile in question.\
