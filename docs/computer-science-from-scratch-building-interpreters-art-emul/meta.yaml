    \ on a swing.\n\nMy aunt, who has quite a trained artistic eye, thought I had\
    \ taken up painting. That was when I knew the program was pretty good.\n\n## Real-World\
    \ Applications\n\nBeyond looking kind of cool, the output of this program doesn’t\
    \ have a lot of practical applications. However, the techniques that were used\
    \ to build it certainly do. They fall under an umbrella term known as *stochastic\
    \ optimization*. Suppose you have an optimization problem you want to solve, but\
    \ you don’t know of a deterministic algorithm (an algorithm that gives the same\
    \ result every time by following the same steps every time) to solve it. In that\
    \ case, a technique that involves random (stochastic) trials may be warranted.\n\
    \nIt may not be abundantly clear, but the challenge in this chapter is an example\
    \ of an optimization problem. Our program tries to optimize for a drawing that’s\
    \ as close to the original photograph as possible. The objective function (the\
    \ thing that checks if we’re going in the right direction) is the difference()\
    \ method. The lower the difference, the more optimal the potential solution to\
    \ the problem that a particular image represents.\n\nOne famous practical area\
