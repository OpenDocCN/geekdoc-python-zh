    \ 还需要处理表 4-1 中的所有命令行选项。\n\n表 4-1：Impressionist 的命令行选项\n\n| 选项 | 扩展形式 | 可选值 | 默认值\
    \ | 描述 |\n| :--- | :--- | :--- | :--- | :--- |\n| -t | --trials | 整数 | 10000 |\
