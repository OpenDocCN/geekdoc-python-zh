    \n为了组织方便，我将每种语句类型拆分到各自的方法中，尽管这些方法并不直接对应非终结符。相反，你可以将`<statement>`的每条产生式规则都视为拥有自己的方法。我们从PRINT语句开始，这是解析起来较为棘手的语句之一，因为它的`<expr-list>`中可以包含多种不同的逗号分隔类型。\n\
