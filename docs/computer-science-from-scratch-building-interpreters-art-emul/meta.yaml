    def draw_sprite(self, x: int, y: int, height: int):\n    flipped_black = False\
    \  # did drawing this flip any pixels?\n    for row in range(0, height):\n   \
    \     row_bits = self.ram[self.i + row]\n        for col in range(0, SPRITE_WIDTH):\n\
    \            px = x + col\n            py = y + row\n            if px >= SCREEN_WIDTH\
