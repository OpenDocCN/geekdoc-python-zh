  md: "At the end of every frame, the graphics that the user sees are updated via\
    \ the same Pygame methods that we used in Chapter 5. But how do we know a frame\
    \ is over? The NES had a resolution of 256 pixels wide by 240 pixels high. Each\
    \ row of pixels is known as a *scanline*, a term that comes from the cathode ray\
    \ tube (CRT) televisions that the NES would be hooked up to. On the real NES,\
    \ a single pixel would be updated with each PPU cycle. Because the PPU runs at\
    \ three times the speed of the CPU (5.4 MHz versus 1.8 MHz), for every CPU cycle,\
    \ the PPU draws three dots. When we get to the 257th dot on the 240th scanline,\
    \ we should therefore be done with one frame ❶.\n\nHighly accurate NES emulators\
    \ simulate the real hardware's behavior by doing what the PPU is supposed to do\
    \ every cycle: figuring out the color of the next dot. We use a much simpler technique\
    \ of just drawing all the correct tiles and sprites in the right places once per\
    \ frame. In other words, instead of thinking about one dot every cycle, we just\
    \ think about what the whole screen is supposed to look like once per frame. While\
    \ this technique is faster and doesn't require us to emulate as many details about\
    \ the PPU's internal workings, it won't work with every game. More advanced NES\
    \ games will make changes to the graphics even while a frame is being drawn to\
    \ the screen (that is, between scanlines or even between dots).\n\nNote that the\
    \ PPU actually does additional processing between scanlines. This period is known\
    \ as *hblank*. More important, the PPU has additional off-screen scanlines (it\
    \ goes all the way up to scanline 261, counting the first as scanline 0). The\
    \ time during the processing of these additional not-rendered scanlines is known\
    \ as *vblank*. During vblank, it's safe for the CPU to modify any of the PPU's\
    \ memory, since the PPU's memory isn't actively being accessed to render visible\
    \ scanlines. The PPU sends a signal to the CPU when vblank begins (after it's\
    \ done with all the visible scanlines) for this purpose ❷. The signal is a type\
    \ of *non-maskable interrupt* (NMI).\n\nThink of an NMI as an interruption to\
    \ a program that can't be stopped. In other words, it's a signal that says to\
    \ the microprocessor, \"Stop what you're doing immediately, because we're doing\
    \ this other thing now.\" In the case of the NES, the other thing is updating\
    \ the game's graphical display. Every NES game has an NMI handler that updates\
    \ the game's graphics during vblank.\n\nThe rest of the loop just handles events:\n\
    \n```\nfor event in pygame.event.get():\n    if event.type == pygame.QUIT:\n \
    \       sys.exit()\n    # Handle keyboard events as joypad changes\n    if event.type\
    \ not in {pygame.KEYDOWN, pygame.KEYUP}:\n        continue\n    is_keydown = event.type\
    \ == pygame.KEYDOWN\n    match event.key:\n        case pygame.K_LEFT:\n     \
    \       cpu.joypad1.left = is_keydown\n```"
