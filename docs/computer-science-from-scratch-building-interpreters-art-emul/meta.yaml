    \n了解你的算法选择在许多领域都很重要。为此，阅读像本书这样的综述书籍的好处之一，就是它能向你介绍你可能以前不知道的新算法和技术。这样，当你遇到它们适用的问题时，你就能做好准备。\n\
    \n## 现实世界应用\n\nKNN 可以是尝试进行回归时的一个很好的起点，因为它非常易于使用。与神经网络不同，它几乎不需要调整，而且由于实际上不涉及训练，基于\
    \ KNN 的应用程序很容易搭建。\n\n研究人员确实使用 KNN 来预测住院时间，正如本章开头所述。Pei、Lin 和 Chen 发现，KNN 在预测 COVID-19\
    \ 患者住院时间方面，其准确性与更复杂的技术（如逻辑回归或随机森林）大致相当。² 我在同一领域找到了多项其他使用 KNN 的研究。KNN 回归也已应用于文本挖掘、农业和金融市场等领域。³\
