    \ Python is so succinct! Try it out: it's not perfect, but it correctly recognizes\
    \ the majority of my scrawls.\n\n> **CODE MEETS LIFE**\n\nIn 2016 I worked on\
    \ a simple educational project called SwiftSimpleNeural Network¹ as preparation\
