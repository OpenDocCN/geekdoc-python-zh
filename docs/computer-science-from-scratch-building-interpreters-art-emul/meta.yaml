  md: "Different kinds of shapes need different numbers of coordinates. For example,\
    \ a triangle has six coordinates because it has three points, and each point has\
    \ one x-coordinate and one y-coordinate. The coordinates must be valid—that is,\
    \ they must be somewhere on the surface of the image. The method enforces this\
    \ by ensuring that the random coordinates can’t be below 0 or above the width\
    \ or height of the image.\n\nWe also need a way to look at a “region” of the original\
    \ photograph corresponding to a shape in the working image, so we can analyze\
    \ the color of that region. It would be computationally expensive to find the\
    \ exact pixels below an arbitrary shape. Instead, we’ll use a bounding_box() static\
    \ method to identify a rectangular region that encompasses the shape:\n\n```\n\
    @staticmethod\ndef bounding_box(coordinates: CoordList) -> tuple[int, int, int,\
    \ int]:\n    xcoords = coordinates[::2]\n    ycoords = coordinates[1::2]\n   \
    \ x1 = min(xcoords)\n    y1 = min(ycoords)\n    x2 = max(xcoords)\n    y2 = max(ycoords)\n\
    \    return x1, y1, x2, y2\n```\n\nA bounding box is an axis-aligned rectangle\
    \ (meaning its edges are parallel to the edges of the image) around a given shape,\
    \ determined based on that shape’s minimum and maximum x- and y-coordinates. We’ll\
    \ pass that rectangle to Pillow’s built-in crop() method to crop the original\
    \ image down to just the desired region. We’ll leave alternative techniques for\
    \ extracting a more narrowly defined region of the original image for the exercises.\n\
    \n# Trials\n\nThe heart of the algorithm is the trial() method. Each trial is\
    \ an attempt to place one shape in the working image. If the new shape brings\
    \ the working image closer to the original, it’s kept. If the difference score\
    \ can be further improved by nudging its coordinates, the coordinates of the shape\
    \ are nudged. The method begins by finding a place for the new shape using random_coordinates()\
    \ and finding the backing region of those coordinates:\n\n```\ndef trial(self):\n\
    \    while True:\n        coordinates = self.random_coordinates()\n        region\
    \ = self.original.crop(self.bounding_box(coordinates))\n        if region.width\
    \ > 0 and region.height > 0:\n            break\n```\n\nThere’s an ugly while\
    \ loop here to account for the unlikely scenario where the random coordinates\
    \ are all aligned along either axis. In that case, we need to regenerate the coordinates.\
    \ There’s an exercise at the end"
