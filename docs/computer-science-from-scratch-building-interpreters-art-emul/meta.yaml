- md: "and decreasing from there. For example, the number 450 starts with the 4 representing\
    \ the hundreds place, then the 5 representing the tens place, and then the 0 representing\
    \ the ones place. The 4 represents the largest part of the number (400) and comes\
    \ first. The decision to put the 4 first was made a long time ago and is largely\
    \ arbitrary. In theory, we could have a numeral system that writes 450 from smallest\
    \ to largest as 054, but obviously we don't.\n\nThe number 450 requires 2 bytes\
    \ to represent in binary: 00000001 and 11000010. If you know binary, you know\
    \ that each 1 represents a single power of 2 that, added with the other “on” powers\
    \ of 2, gives us the final number. The first byte, 00000001, puts its lone 1 in\
    \ the 2⁸ place and represents 256. The second byte, 11000010, represents the number\
    \ 194 because the 1s for 2¹ (2), 2⁶ (64), and 2⁷ (128) are turned on, and 128\
    \ + 64 + 2 = 194. We have bytes for 256 and 194, and 256 + 194 = 450.\n\nSince\
    \ we write 450 from largest to smallest, you might assume that your computer would\
    \ similarly store the byte representing the larger portion of 450 first, yielding\
    \ 0000000111000010 when the bytes are put together. This is known as *big-endian*\
    \ order, but it's not how most computers actually work nowadays. The typical modern\
    \ computer is built with a microprocessor that uses one of two architectures:\
    \ x86-64 (Intel, AMD) or ARM64 (Apple, Qualcomm, and so on). For technical and\
    \ historical reasons, those architectures store numbers in *little-endian* order,\
    \ where the byte representing the smallest end of the number comes first. In a\
    \ little-endian system, the 2-byte number 450 is stored as 1100001000000001. It's\
    \ important to know which system is at play, since interpreting the little-endian\
    \ 1100001000000001 as if it were in big-endian order would result in a completely\
    \ different value.\n\nWhile little-endian order dominates today's computer architectures,\
    \ certain systems, such as those that run on the 68K microprocessor architecture\
    \ (originally by Motorola)—including the original Macintosh—store their numbers\
    \ in big-endian order. Yes, on the original Macintosh, 450 was stored “the right\
    \ way” as 0000000111000010, but on the computer in front of you it's probably\
    \ stored as 1100001000000001. Further complicating matters, most data transmitted\
    \ over the internet is sent in big-endian order. When you're browsing the web\
    \ on your x86-64 or ARM64 microprocessor, there's endian conversion going on in\
    \ the background.\n\n## Putting It All Together\n\nTo write our MacPaint file\
    \ bundled as a MacBinary file, we need to take our pixel array from `dither()`\
