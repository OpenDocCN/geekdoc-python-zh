    and other “regular” people who bought the first machines. As a result, it became
    the most popular high-level programming language for personal computers from the
    mid-1970s to the mid-1980s. Common computers of the era, like the Commodore 64
    and the Apple II, came with built-in BASIC interpreters. BASIC was therefore the
    way that many people interacted with early personal computers. For example, BASIC
    was Linus Torvalds’s first programming language on the Commodore VIC-20 in 1981.²


    Interestingly, Microsoft got its start in 1975 when Bill Gates and Paul Allen
    developed a BASIC interpreter for one of the first personal computers, the Altair
    8800.³ Their company flourished when they ported their interpreter to other machines
    of the late 1970s. Microsoft BASIC was'
  - '[PAGE 46]


    shipped with many personal computers, and it became the de facto standard dialect
    of BASIC. Eventually, Microsoft entered the operating system business in 1981
    with DOS on the original IBM PC, but BASIC was the company''s start. Now you''ll
    be developing a BASIC interpreter too!


    Tiny BASIC, which NanoBASIC is a form of, in turn got its start because of Microsoft.
    Many of the people involved with the early development of Tiny BASIC were partially
    motivated by the high cost of Microsoft''s interpreters.⁴ Some of them further
    believed that people should be free to share software as they see fit. This was
    an early form of the Free Software Movement. Beyond skirting Microsoft''s high
    fees, the developers also wanted a language that would be small enough to fit
    within the extreme memory constraints of the microcomputers of the time (often
    just 4 kilobytes [KB]) and portable enough that programs could be run on multiple
    kinds of machines. Ultimately, Tiny BASIC was ported to a wide variety of different
    personal computers across multiple different microprocessor architectures and
    was widely used.


    # NanoBASIC''s Paradigm, Syntax, and Semantics


    As you''ve read, BASIC was intended to be easy to use for nontechnical people,
    and many BASICs were designed to work in memory-constrained environments. Hence,
    BASICs tend to be stripped-down languages with relatively few features, even in
    comparison to other languages of the time. The dialect we''re developing, NanoBASIC,
    is imperative, but we''d barely even call it procedural. Let''s review what those
    terms mean.


    An *imperative* language is one in which you provide detailed instructions telling
    the computer how you want it to complete a task. This contrasts with *declarative*
    languages, which concentrate on "what" you want to do instead of "how" you want
    to do it. Say I wanted you to draw a square in the center of a piece of graph
    paper. The imperative way to do it would be to tell you: "Start at point (4, 4)
    and draw a line up five units. Then, draw a line to the right five units. Then,
    draw a line down five units. Then, draw a line to the left five units." The declarative
    way to do it would be to say, "Draw a 5×5 square in the middle of the paper."
    In a declarative world, I declare what I want and let you (or the computer) figure
    out the specifics of how to accomplish it.


    Modern imperative programming languages generally fall into two main sub-paradigms:
    procedural and object-oriented. *Procedural* programming languages use the subroutine/procedure/function
    (these terms are often, but not always, used interchangeably) as the main point
    of abstraction. Code is broken into multiple functions that each have a specific
    purpose and work in concert to form the whole program. *Object-oriented* programming
    uses objects as the main point of abstraction, and since you''re an intermediate
    or advanced Python programmer, I assume you know what that means. Of course, Python
    can be programmed in either style.


    > NOTE: The most popular declarative programming sub-paradigms are functional
    and logic programming. Getting into the details of those is beyond the scope of
    this chapter.'
- md: 'NanoBASIC is decidedly not a declarative programming language. It''s firmly
    in the imperative camp. It''s also definitely not object-oriented. But is it procedural?
    While it technically has a way of making a call to a subroutine with its GOSUB
    statement, which we''ll discuss shortly, there''s nothing resembling a modern
    function in the sense of having parameters and return values. That''s why I wrote
    we would "barely even call it procedural."


    Some versions of BASIC, like Tiny BASIC and NanoBASIC, not only have no sense
    of a function, they also have no loops or other modern control structures. Instead,
    all control is handled with GOTO and GOSUB, which trigger direct jumps to a specific
    line number of the program. These, coupled with if statements, are the only way
    to control a Tiny BASIC or NanoBASIC program. Early BASICs were famous for encouraging
    "spaghetti code" due to these explicit jumps from one part of a program to another
    and poor mechanisms for organization. This criticism is completely fair. Without
    functions or objects as organizing mechanisms, an imperative language invariably
    devolves into spaghetti code. Don''t be surprised to see some spaghetti as we
    start cooking up some NanoBASIC!


    Now, let''s get into NanoBASIC''s syntax and how its six statements work.


    ## Comments and Line Numbers


    Comments in NanoBASIC start with the REM designation and can finish with any string.
    Comments won''t be processed at all by the interpreter.


    Every non-comment line in NanoBASIC begins with a line number and is followed
    by a statement. The programmer can pick any arbitrary line numbers, as long as
    they''re all in increasing order from the top of the source file to the bottom.
    For example, the following line numbers are valid:


    ```

    10 PRINT "Hello"

    REM This is a comment

    20 PRINT "Goodbye"

    30 PRINT "WOW"

    ```


    By contrast, these line numbers aren''t valid, and so the program''s behavior
    is undefined:


    ```

    10 PRINT "Hello"

    REM This is a comment

    40 PRINT "Goodbye"

    30 PRINT "WOW"

    ```


    Programs that have GOTO or GOSUB statements and out-of-order line numbers won''t
    function correctly.


    There are only six ways to start a statement in NanoBASIC: PRINT, IF, GOTO, GOSUB,
    RETURN, and LET. If you know these six statement types, you basically know the
    whole language. This is why you can learn NanoBASIC in just a few minutes if you
    already know another programming language.


    ## LET, Variables, and Mathematical Expressions


    A LET statement binds a value to a variable. All variables represent integers.
    There are no other variable types. The original Tiny BASIC was limited to just
    26 single-letter variable names (A through Z). In NanoBASIC, this is expanded
    to include any arbitrary-length identifier composed of letters and underscores.
    The following statement sets the variable A to 5:


    ```

    10 LET A = 5

    ```


    The LET keyword must be followed by a variable name and an equal sign (=). After
    that, any mathematical expression can appear. NanoBASIC mathematical expressions
    can be composed of variables; integer literals; the operators for addition (+),
    subtraction (-), multiplication (*), and division (/); and parentheses (( and
    )). In addition, you can negate any mathematical value in NanoBASIC with a negative
    sign (-). All math takes place in the realm of signed integers. From this point
    forward, we’ll just refer to mathematical expressions as *expressions*. The following
    are all valid uses of LET:


    ```

    20 LET B = A

    30 LET C = 23 - A

    40 LET D = 5 * (24 + 25)

    50 LET E = -(24 + 23 - (2 * (5 + 3)))

    ```


    Due to machine limitations, most Tiny BASIC implementations were limited to 16-bit
    integers. Our variables are backed by Python integers behind the scenes, which
    are of arbitrary precision, so they aren’t limited to 16 bits. This, and the arbitrary-length
    variable names, are some of the few areas where NanoBASIC is superior to Tiny
    BASIC instead of simply being a subset of it.


    ## PRINT Statements


    Any string literal or expression can be output to the console with PRINT. NanoBASIC
    string literals are any characters that lie between double quotation marks (").
    Unfortunately, there’s no way in NanoBASIC to include actual double quotes in
    your strings. In other words, there’s no escape mechanism. I’ll leave that as
    an exercise at the end of the chapter. Here are some valid PRINT statements with
    string literals:


    ```

    10 PRINT "What a nice program"

    20 PRINT "Who said sit down?"

    30 PRINT "6734 spells HELP upside down sorta"

    ```


    As mentioned, PRINT can also print the result of any expression:


    ```

    REM This was the first thing Paul Allen ran on the Altair 8800

    70 PRINT 2 + 2

    ```


    You can also supply a comma-separated list of items (string literals and expressions)
    to PRINT. All items printed will have tab characters between them, and PRINT always
    finishes printing by inserting a newline character. For example:


    ```

    30 PRINT "2 plus 2 is", 2 + 2, "and 3 times 5 is", 3 * 5

    ```


    This will output text that looks as follows:


    ```

    2 plus 2 is  4  and 3 times 5 is  15

    ```


    Note that the spaces between expressions are caused by tab characters. Due to
    various console settings, they may not look the same in your terminal.


    ## IF Statements and Boolean Expressions


    NanoBASIC IF statements are like if statements in other languages, but they are
    simpler and more succinct. They can have only a single Boolean expression (there''s
    no and or or operator, for example), and they have no else clause. Finally, they
    can execute only a single statement if they''re true. The statement to execute
    on truth is always preceded by the literal THEN. For example:


    ```

    500 IF N < 10 THEN PRINT "Small Number"

    700 IF V >= 34 THEN GOTO 20

    ```


    Boolean expressions mostly involve the comparisons you''d expect, but the operators
    differ slightly from standard C-style operators. For instance, *not equal* can
    be either <> or >< in NanoBASIC, and *equal* is =, not ==.


    ## GOTO, GOSUB, and RETURN Statements


    A GOTO directly jumps to a line number with no way to go back. A GOSUB jumps to
    a line number, but a matching RETURN statement will send the program back to the
    line just after where the GOSUB was originally called. Here''s an example:


    ```

    10 GOTO 50

    20 LET A = 10

    40 RETURN

    50 LET A = 5

    60 GOSUB 20

    REM RETURN returns to here; we expect A to be 10

    70 PRINT A

    ```


    This program will ultimately output 10 to the console.


    ## NanoBASIC Style and Minutiae


    It''s generally considered good style to write BASIC keywords in all capital letters.
    Because NanoBASIC doesn''t have great organizational facilities, it''s also a
    good idea to include comments throughout your program explaining what''s going
    on.


    Unfortunately, it’s normal for BASIC code to quickly fill up with GOTO statements
    and become “spaghetti code.” This is par for the course, and there’s not much
    you can do about it in NanoBASIC if you want to write a program of any moderate
    complexity. Eventually, people unhappy with the GOTO style of programming created
    the *structured programming* movement. For example, Edsger Dijkstra famously wrote
    a letter called “Go To Statement Considered Harmful.”⁵


    Here are a couple other things you should know about NanoBASIC:


    - NanoBASIC is case insensitive. This means that LET A = 5 is the same as let
    a = 5.

    - Behavior not described in this chapter is undefined.


    Ultimately, NanoBASIC is purposely damaged goods because I wanted to keep the
    interpreter simple and provide a real-world analog—Tiny BASIC—to make this chapter’s
    work feel more “real.” I also think the fact that NanoBASIC is based on a real
    language and is able to run real Tiny BASIC programs found on the internet makes
    writing the interpreter more fun. However, it would have been fairly simple for
    us to make the language more powerful. We’ll leave that for the exercises.


    ## An Example NanoBASIC Program


    Several example NanoBASIC programs are included in the *NanoBASIC/Examples* directory
    of the companion repository. One of those programs prints all the numbers in the
    Fibonacci sequence that are less than 100. The Fibonacci sequence is a progressive
    sequence of numbers where each number (except the special first two) is the sum
    of the previous two. It starts with the numbers 0 and 1. It then follows that
    0 + 1 = 1, so the next number in the sequence is 1. Then, 1 + 1 = 2, so the next
    number is 2. It continues 3, 5, 8, 13, and so on.


    Here’s *fib.bas*, the NanoBASIC Fibonacci program:


    ```

    NanoBASIC/Examples/fib.bas

    REM Printing the Fibonacci numbers less than 100

    REM A is the last number

    10 LET A = 0

    REM B is the next number

    11 LET B = 1

    20 PRINT A

    21 PRINT B

    REM C is last + next

    30 LET C = A + B

    31 LET A = B

    32 LET B = C

    40 IF B < 100 THEN GOTO 21

    ```


    In Tiny BASIC fashion, we only use single capital letters as variable names. This
    highlights the importance of plentiful comments. As previously discussed, the
    chosen values for the line numbers are arbitrary as long as they’re in increasing
    order. On lines 10 and 11, we start the sequence'
  mdcn: 'NanoBASIC 显然不是一种声明式编程语言。它坚定地属于命令式编程阵营。它也绝对不是面向对象的。但它是过程式的吗？虽然从技术上讲，它确实有一种通过
    GOSUB 语句调用子程序的方式（我们稍后会讨论），但没有任何类似于现代函数的东西，即具有参数和返回值。这就是为什么我写道我们“几乎不能称其为过程式”。


    一些版本的 BASIC，如 Tiny BASIC 和 NanoBASIC，不仅没有函数的概念，也没有循环或其他现代控制结构。相反，所有控制都通过 GOTO
    和 GOSUB 处理，它们触发到程序特定行号的直接跳转。这些语句，加上 if 语句，是控制 Tiny BASIC 或 NanoBASIC 程序的唯一方式。早期的
    BASIC 因鼓励“意大利面条式代码”而闻名，这是由于程序各部分之间的显式跳转以及糟糕的组织机制。这种批评是完全公正的。没有函数或对象作为组织机制，命令式语言不可避免地会退化成意大利面条式代码。当我们开始编写一些
    NanoBASIC 代码时，看到一些“意大利面条”请不要感到惊讶！


    现在，让我们深入了解 NanoBASIC 的语法及其六条语句的工作方式。


    ## 注释和行号


    NanoBASIC 中的注释以 REM 标识符开头，可以以任何字符串结束。解释器根本不会处理注释。


    NanoBASIC 中的每个非注释行都以行号开头，后跟一条语句。程序员可以选择任何任意的行号，只要它们从源文件顶部到底部按递增顺序排列即可。例如，以下行号是有效的：


    ```

    10 PRINT "Hello"

    REM This is a comment

    20 PRINT "Goodbye"

    30 PRINT "WOW"

    ```


    相比之下，这些行号无效，因此程序的行为是未定义的：


    ```

    10 PRINT "Hello"

    REM This is a comment

    40 PRINT "Goodbye"

    30 PRINT "WOW"

    ```


    包含 GOTO 或 GOSUB 语句且行号顺序错误的程序将无法正常工作。


    在 NanoBASIC 中，只有六种方式可以开始一条语句：PRINT、IF、GOTO、GOSUB、RETURN 和 LET。如果你知道这六种语句类型，你基本上就了解了整个语言。这就是为什么如果你已经知道另一种编程语言，你可以在几分钟内学会
    NanoBASIC。


    ## LET、变量和数学表达式


    LET 语句将一个值绑定到一个变量。所有变量都表示整数。没有其他变量类型。最初的 Tiny BASIC 仅限于 26 个单字母变量名（A 到 Z）。在 NanoBASIC
    中，这扩展到包括由字母和下划线组成的任意长度的标识符。以下语句将变量 A 设置为 5：


    ```

    10 LET A = 5

    ```


    LET 关键字后面必须跟一个变量名和一个等号（=）。之后，可以出现任何数学表达式。NanoBASIC 数学表达式可以由变量、整数字面量、加法（+）、减法（-）、乘法（*）和除法（/）运算符以及括号（(
    和 )）组成。此外，在 NanoBASIC 中，你可以用负号（-）对任何数学值取反。所有数学运算都在有符号整数的范围内进行。从现在开始，我们将数学表达式简称为*表达式*。以下是
    LET 的所有有效用法：


    ```

    20 LET B = A

    30 LET C = 23 - A

    40 LET D = 5 * (24 + 25)

    50 LET E = -(24 + 23 - (2 * (5 + 3)))

    ```


    由于机器限制，大多数 Tiny BASIC 实现仅限于 16 位整数。我们的变量在幕后由 Python 整数支持，这些整数具有任意精度，因此不受 16 位的限制。这一点，以及任意长度的变量名，是
    NanoBASIC 优于 Tiny BASIC 而不仅仅是其子集的少数几个方面。


    ## PRINT 语句


    任何字符串字面量或表达式都可以通过 PRINT 输出到控制台。NanoBASIC 字符串字面量是位于双引号（"）之间的任何字符。不幸的是，NanoBASIC
    中没有办法在字符串中包含实际的双引号。换句话说，没有转义机制。我将把它作为本章末尾的一个练习。以下是一些包含字符串字面量的有效 PRINT 语句：


    ```

    10 PRINT "What a nice program"

    20 PRINT "Who said sit down?"

    30 PRINT "6734 spells HELP upside down sorta"

    ```


    如前所述，PRINT 也可以打印任何表达式的结果：


    ```

    REM This was the first thing Paul Allen ran on the Altair 8800

    70 PRINT 2 + 2

    ```


    你还可以向 PRINT 提供一个逗号分隔的项目列表（字符串字面量和表达式）。所有打印的项目之间将用制表符分隔，并且 PRINT 总是以插入换行符结束打印。例如：


    ```

    30 PRINT "2 plus 2 is", 2 + 2, "and 3 times 5 is", 3 * 5

    ```


    这将输出如下所示的文本：


    ```

    2 plus 2 is  4  and 3 times 5 is  15

    ```


    请注意，表达式之间的空格是由制表符引起的。由于各种控制台设置，它们在你的终端中可能看起来不同。


    ## IF 语句和布尔表达式


    NanoBASIC IF 语句类似于其他语言中的 if 语句，但它们更简单、更简洁。它们只能有一个布尔表达式（例如，没有 and 或 or 运算符），并且没有
    else 子句。最后，如果条件为真，它们只能执行一条语句。要执行的语句总是以字面量 THEN 开头。例如：


    ```

    500 IF N < 10 THEN PRINT "Small Number"

    700 IF V >= 34 THEN GOTO 20

    ```


    布尔表达式主要涉及你期望的比较，但运算符与标准 C 风格运算符略有不同。例如，在 NanoBASIC 中，*不等于*可以是 <> 或 ><，而*等于*是 =，而不是
    ==。


    ## GOTO、GOSUB 和 RETURN 语句


    GOTO 直接跳转到一个行号，无法返回。GOSUB 跳转到一个行号，但匹配的 RETURN 语句会将程序发送回 GOSUB 最初调用之后的那一行。以下是一个示例：


    ```

    10 GOTO 50

    20 LET A = 10

    40 RETURN

    50 LET A = 5

    60 GOSUB 20

    REM RETURN returns to here; we expect A to be 10

    70 PRINT A

    ```


    这个程序最终将输出 10 到控制台。


    ## NanoBASIC 风格和细节


    通常认为将 BASIC 关键字全部大写是良好的风格。因为 NanoBASIC 没有很好的组织设施，所以在整个程序中包含注释来解释正在发生的事情也是一个好主意。


    不幸的是，BASIC 代码很快就会充满 GOTO 语句并变成“意大利面条式代码”是正常的。这是意料之中的事，如果你想编写任何中等复杂度的程序，在 NanoBASIC
    中你对此无能为力。最终，对 GOTO 风格编程不满意的人们创建了*结构化编程*运动。例如，Edsger Dijkstra 著名地写了一封名为“Go To Statement
    Considered Harmful”的信。⁵


    以下是关于 NanoBASIC 的其他一些你应该知道的事情：


    - NanoBASIC 不区分大小写。这意味着 LET A = 5 与 let a = 5 相同。

    - 本章未描述的行为是未定义的。


    最终，NanoBASIC 是故意设计成有缺陷的，因为我想保持解释器简单，并提供一个现实世界的类似物——Tiny BASIC——使本章的工作感觉更“真实”。我还认为
    NanoBASIC 基于一种真实语言并能够运行互联网上找到的真实 Tiny BASIC 程序这一事实，使得编写解释器更有趣。然而，对我们来说，让语言更强大是相当简单的。我们将把它留作练习。


    ## 一个 NanoBASIC 程序示例


    几个 NanoBASIC 示例程序包含在配套代码库的 *NanoBASIC/Examples* 目录中。其中一个程序打印斐波那契数列中所有小于 100 的数字。斐波那契数列是一个渐进的数字序列，其中每个数字（除了特殊的前两个）是前两个数字的和。它以数字
    0 和 1 开始。然后 0 + 1 = 1，所以序列中的下一个数字是 1。然后，1 + 1 = 2，所以下一个数字是 2。它继续是 3、5、8、13，依此类推。


    这是 *fib.bas*，NanoBASIC 斐波那契程序：


    ```

    NanoBASIC/Examples/fib.bas

    REM Printing the Fibonacci numbers less than 100

    REM A is the last number

    10 LET A = 0

    REM B is the next number

    11 LET B = 1

    20 PRINT A

    21 PRINT B

    REM C is last + next

    30 LET C = A + B

    31 LET A = B

    32 LET B = C

    40 IF B < 100 THEN GOTO 21

    ```


    以 Tiny BASIC 的风格，我们只使用单个大写字母作为变量名。这突出了大量注释的重要性。如前所述，只要行号按递增顺序排列，选择的值就是任意的。在第 10
    行和第 11 行，我们开始这个序列'
