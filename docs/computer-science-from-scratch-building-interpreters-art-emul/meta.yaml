    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 10 | 0 | 5 |


    ```

    5: .

    ```


    当前单元格索引处单元格的 ASCII 值被输出到控制台——在这种情况下，是一个 X。然后，指令索引递增。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 10 | 0 | 6 |


    ```

    6: >

    ```


    单元格索引递增。然后，指令索引递增。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 10 | 1 | 7 |


    ```

    7: -

    ```


    当前单元格索引处的值递减。指令索引递增。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 9 | 1 | 8 |


    ```

    8: ]

    ```


    如果当前单元格索引处的值非零，我们跳转到匹配的左括号。在这种情况下，单元格 1 是 9，所以我们跳转，这意味着指令索引变为 3。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 9 | 1 | 3 |


    现在我们已经完成了循环的第一次迭代，该循环将重复九次以总共打印 10 个 X。指令 3 到 8 将重复九次，直到单元格 1 为 0，此时右括号（索引 8）处的检查将结束重复，程序将结束。


    为了给这个程序一个完整的结束，让我们跳到前面，实际通过我们的解释器运行它：


    ```

    % python3 -m Brainfuck Brainfuck/Examples/repeat.bf

    88

    10

    XXXXXXXXXX

    ```


    我们的 Brainfuck 解释器只接受整数作为输入。这些整数可以对应 ASCII 字符代码，88 是 X 的 ASCII 字符代码。因此，预期的输出是 10
    个 X。完成本章后，你将能够自己运行该程序以及任何其他 Brainfuck 程序。


    ## 解释器的结构


    解释器通常至少有三个部分：


    - 一个*分词器*（有时称为*词法分析器*），它接受原始源代码并将其划分为编程语言中允许的最小可识别构造。这些被称为*词法单元*。对于代码 a + 2，词法单元可能是
    a、+ 和 2。

    - 一个*解析器*，它接受彼此相邻的词法单元并弄清楚它们的含义（即它们形成的表达式或语句）。解析器通常生成一个节点树，表示表达式、语句和字面值之间的相对关系。这棵树称为*抽象语法树（AST）*。例如，如果
    Python 解释器看到词法单元 a 后跟词法单元 + 后跟词法单元 2，它可能会构造一个算术表达式节点，并将其连接到 a 和 2 的节点。

    - 一个*运行时环境*，它遍历 AST 的节点并运行适当的操作以执行其中固有的含义。对于我们 a + 2 的算术表达式节点，这意味着查找 a 表示的值并将其加
    2。


    Brainfuck 的美妙之处在于每个语句只是一个符号，因此我们获取词法单元所需做的就是从源文件中读取一个字符。而每个词法单元本身已经代表了一个有意义的节点。这使得为
    Brainfuck 编写解释器比为几乎任何其他编程语言编写解释器更容易。我们可以将分词器、解析器和运行时合并到一个循环中，将这三个概念融合在一起。'
