    \ number of trials to run (default 10000).')\n    argument_parser.add_argument('-m',\
    \ '--method',\n                                choices=['random', 'average', 'common'],\
    \ default='average',\n                                help='Shape color determination\
    \ method (default average).')\n    argument_parser.add_argument('-s', '--shape',\
    \ choices=['ellipse', 'triangle',\n                                          \
    \                'quadrilateral', 'line'],\n                                default='ellipse',\
    \ help='The shape type (default ellipse).')\n    argument_parser.add_argument('-l',\
    \ '--length', type=int, default=256,\n                                help='The\
    \ length of the final image in pixels (default 256).')\n    argument_parser.add_argument('-v',\
    \ '--vector', default=False, action='store_true',\n                          \
    \      help='Create vector output. A SVG file will also be output.')\n    argument_parser.add_argument('-a',\
    \ '--animate', type=int, default=0,\n                                help='If\
    \ greater than 0, will create an animated GIF '\n                            \
    \    'with the number of milliseconds per frame provided.')\n    arguments = argument_parser.parse_args()\n\
    \    method = ColorMethod[arguments.method.upper()]\n    shape_type = ShapeType[arguments.shape.upper()]\n\
    \    Impressionist(arguments.image_file, arguments.output_file, arguments.trials,\
    \ method,\n                  shape_type, arguments.length, arguments.vector, arguments.animate)\n\
    ```\n\n`-v` 选项指示程序以矢量格式输出结果。在我们的实现中，我们将以 SVG 文件为目标。在深入探讨应用程序的主算法之前，让我们先稍微绕个弯，看看如何支持这个功能。\n\
    \n## SVG 格式\n\nSVG 代表可缩放矢量图形。它是一种基于 XML 的格式，用于指定矢量图像。所有现代主流网页浏览器和矢量绘图程序都支持它。我们不会使用第三方库来写入\
    \ SVG，而是编写自己的简短类来完成。SVG 规范很庞大，但我们只需要其中很小的一个子集来支持程序将要输出的形状，因此任务会相对容易。\n\nXML 是一种基于文本的格式，由于我们是输出它而不是解析它，我们的程序甚至不需要真正理解\
    \ XML 的结构。我们只需要将代表各个 XML 元素的字符串拼接成一个字符串。虽然这种方法限制了 SVG 编写器的可测试性和模块化，但我们实现的 SVG\
    \ 标准部分非常少，以至于手动检查正确性几乎是微不足道的。话虽如此，这种方法并不适合生产环境。\n\n在开始编写代码之前，这里有一个我们程序可以输出的简单\
    \ SVG 文件示例。这个文件只包含一个使用 `polygon` 元素构建的三角形，加上背景矩形（为了可读性，我稍微改进了格式，添加了几个缩进）：\n\n\
    ```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<svg version=\"1.1\" baseProfile=\"\
    full\" width=\"342\" height=\"256\"\n     xmlns=\"http://www.w3.org/2000/svg\"\
    >\n    <rect width=\"100%\" height=\"100%\" fill=\"rgb(108, 98, 91)\" />\n   \
    \ <polygon points=\"201,3 24,9 162,182 \" fill=\"rgb(128, 120, 112)\" />\n</svg>\n\
    ```\n\n如果你将这段代码保存为扩展名为 `.svg` 的文本文件，你可以使用网页浏览器或矢量图像编辑器打开它，查看生成的三角形。在我们逐步创建 SVG\
    \ 类的过程中，请记住这个示例，以可视化不同元素如何组合形成一个完整的 SVG 文件。\n\nSVG 文件以声明它是一个 XML 文件开始，然后第一个元素是\
    \ `svg` 元素，它描述了 SVG 规范的版本以及图像的宽度和高度。此外，我们程序生成的每个图像都由一个包含图像平均颜色的大矩形作为背景。这有助于算法更好地融合。因此，我们的\
    \ SVG 文件也以一个大的 `rect` 元素开始：\n\n```\n# Impressionist/svg.py\nclass SVG:\n    def\
    \ __init__(self, width: int, height: int, background_color: tuple[int, int, int]):\n\
    \        self.content = '<?xml version=\"1.0\" encoding=\"utf-8\"?>\\n' \\\n \
    \           f'<svg version=\"1.1\" baseProfile=\"full\" width=\"{width}\" ' \\\
    \n            f'height=\"{height}\" xmlns=\"http://www.w3.org/2000/svg\">\\n'\
    \ \\\n            f'<rect width=\"100%\" height=\"100%\" fill=\"rgb{background_color}\"\
    \ />'\n```"
