  md: 'Like my dad, I ended up going to Dartmouth for my undergraduate studies (as
    an economics major), and after briefly working in a job on Wall Street that I
    hated, I applied to graduate programs in computer science. The programming thread
    that started with BASIC was still in me. How can somebody without a computer science
    degree go to graduate school in computer science? I took five computer science
    courses as an undergrad, most of which I did well in, and published some projects
    on my own time, and that was enough to get into a few programs. I ended up back
    at Dartmouth for a master’s degree. For anyone considering this route, let me
    say that not having a full undergraduate degree in computer science made the transition
    to the master’s program quite difficult. I wouldn’t recommend going into a very
    different field for a graduate degree without a lot of self-study.


    To keep doubling down on my mistakes, during the first semester of my master’s
    program, I decided to take a class in the thorny subject of compilers. It ended
    up being the lowest grade of my graduate career. The class involved a big project
    building a C compiler in C (with some missing features). I had a partner for the
    project, and we broke the work up into phases of the compiler, similar to the
    phases we went over in this chapter (tokenizer, parser, code generator, and so
    on). The compiler would work only if all the phases worked. By the time the last
    week of the semester rolled around, I had written a couple thousand lines of code
    for my phases, while my partner had written fewer than 100 for his part, despite
    my consistent prodding. I think about that experience a lot today when I assign
    group projects to students: sometimes when they blame their partner, they’re telling
    the truth. No doubt my code wasn’t great either, but at least I wrote it.


    We worked in a mad dash with several all-nighters to get something working, putting
    my partner’s pittance of code together with mine and writing a lot more to fill
    in all of the blanks. In the end, our compiler did some basic things correctly,
    but it failed the majority of the professor’s automated tests.


    How did someone who nearly flunked a compilers course end up writing this chapter
    on interpreters? Eight years later, and a couple years into my career in computer
    science education, I remembered my experience with BASIC. I had also used a children’s
    programming language called Logo¹⁴ when I was growing up, and together the two
    languages were a really good way to learn to program as a kid. As a challenge
    to myself, I decided to build my own children’s programming language that’s a
    cross between BASIC and Logo. It’s not a novel idea—many people have done similar
    projects—but I wanted to make something polished and prove to myself that the
    compilers class didn’t have to be the end of programming language development
    for me.


    The result was a product called SeaTurtle¹⁵ that sold hundreds of copies. Hundreds,
    not thousands. It’s not going to make me rich, but it proved to me that I could
    write a programming language that people would actually want to buy. A real programming
    language. Okay, a real “kid” programming language.


    That experience with SeaTurtle led me to create NanoBASIC as a Swift project for
    my Emerging Languages class (mentioned in the “Code Meets Life”'
