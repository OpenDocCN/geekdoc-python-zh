    # PART III


    ## EMULATORS


    # 5


    ## BUILDING A CHIP-8 VIRTUAL MACHINE


    ![](img/2b670944a6e236c13c5019fe56234a0a_138_0.png)


    In this chapter, we’re going to develop a version of a virtual machine known as
    CHIP-8, a platform from the early days of personal computing that was primarily
    used for playing games. Although our program will be able to play CHIP-8 games,
    it’s not the games themselves that interest us—it’s what building a CHIP-8 virtual
    machine can teach us about low-level programming and how a computer works at the
    register and instruction levels. These insights make building a CHIP-8 virtual
    machine a popular first step into the world of programming emulators.


    ## Virtual Machines


    Think of a *virtual machine* (VM) as a computer that’s defined wholly in software.
    Programs that are designed to run in a VM can run on any platform that has an
    implementation of that VM. In this way, VMs enable truly portable software.


    VMs are closely related to emulators. An *emulator* is a piece of software that’s
    pretending to be a piece of hardware. This enables programs that were written
    for that hardware to run on other machines that lack the hardware. An emulator
    must follow the specification for the original hardware carefully so that it re-creates
    all the functionality that the unknowing programs running on the emulator expect.
    I say *unknowing* because the software running on an emulator has no idea it isn’t
    running on the real hardware; the emulator had better work exactly like the original
    hardware if the program is going to function correctly.


    A VM is also a piece of software that closely follows a specification of an environment
    that software runs on top of. The difference is that while an emulator follows
    a hardware specification, a VM follows a specification that may be wholly defined
    as an abstraction in software terms.


    Although one is a hardware specification and one is a software specification,
    implementing a simple emulator is quite similar to implementing a simple VM. In
    fact, they’re so similar that while the project completed in this chapter is technically
    a VM project, it’s very commonly suggested as a first emulation project. If you’re
    a newcomer to the emulator development community asking where you should start,
    CHIP-8 is almost always the answer.


    Perhaps the most famous VM is the Java Virtual Machine (JVM). When Java first
    came out in the mid-1990s, its “write once, run anywhere” philosophy was touted.
    JVMs were developed for all major operating systems (Windows, Linux, Mac OS, and
    so on), and the same Java program could be compiled into the JVM’s native bytecode
    format and run on any computer with a JVM unchanged, regardless of the underlying
    platform. That’s still true today, but Java’s original write-once-run-anywhere
    niche has largely been supplanted by web applications.


    The CHIP-8 VM comes from a much earlier era. In the 1970s, Joseph Weisbecker was
    a pioneering engineer who developed one of the first 8-bit microprocessors, the
    RCA 1802. He and RCA built an early personal computer using his invention.¹ He
    wanted to have a way to program games for the machine in a higher-level language
    than machine code, so he developed CHIP-8 (and its accompanying opcode language).
    His daughter, Joyce Weisbecker, would go on to use CHIP-8 to become the first
    published female video game developer.² In the 1980s, CHIP-8 was ported to many
    other platforms, including many graphing calculators. It therefore became a truly
    portable VM, analogous to an early form of how we think about VMs today.


    ## The CHIP-8 Virtual Machine


    The CHIP-8 VM was originally designed for the incredibly resource-constrained
    personal computers of the late 1970s, like the COSMAC VIP. Released in 1977, the
    COSMAC VIP had an RCA 1802 8-bit microprocessor running at less than 2 megahertz
    (MHz), 2KB of RAM (expandable to 4KB), and a 512-byte ROM. It also had specialized
    chips for displaying 1-bit graphics at a resolution of up to 64×128, reading and
    writing cassette tapes, and playing a beep.³


    It’s amazing by today’s standards that anything of value could have been programmed
    on a machine like the COSMAC VIP, yet it was designed for video games. In fact,
    those games even ran through another layer of abstraction, the CHIP-8 VM. The
    most popular video game console of the era, the Atari 2600, was also released
    in 1977 and had specifications that were in the same ballpark. These limitations
    were simply par for the course.


    When programming a VM or an emulator, the performance of the tools you’re using
    is a paramount concern. The VM or emulator adds another layer of abstraction between
    the program and the hardware, and each layer of abstraction generally comes with
    some performance cost. To achieve the intended speed of the original system, overhead
    has to be kept to a minimum, and some programming languages (or rather, some programming
    languages’ primary runtime implementations) get in the way. This is why it’s common
    to see VMs and emulators programmed in low-level languages like C, C++, and Rust.
