  md: 'Python has the ^ operator for performing bitwise XOR. Here''s a quick example
    of using it on a couple binary numbers in Python:


    ```

    >>> bin(0b1010 ^ 0b0110)

    ''0b1100''

    ```


    XOR is a surprisingly powerful operation. It underlies the unbreakable encryption
    scheme known as a *one-time pad*. You can also flip bits by XOR-ing with 1: if
    you XOR a 1 with a 1, it becomes a 0, but if you XOR a 0 with a 1, it becomes
    a 1. Any bit you XOR with a 1 becomes the opposite of what it was before. This
    is how drawing on the screen works in the CHIP-8 project in Chapter 5.


    # Complement (~)


    *Complement* is the simplest of all bitwise operations: it switches all 1s with
    0s and all 0s with 1s, as shown in Table A-6.


    Table A-6: Complement Examples


    | A | ~A |

    |---|---|

    | 1 | 0 |

    | 0 | 1 |

    | 1010 | 0101 |

    | 011010 | 100101 |


    Python has the ~ operator for taking a binary complement. We don''t use complements
    much in this book, except for one small place in the NES emulator in Chapter 6.'
