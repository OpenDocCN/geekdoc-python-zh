  - "[PAGE 234]\n\nwant to classify, the first thing we need is to identify its $k$-nearest\
    \ neighbors. All our data points have built-in distance() methods, so we can just\
    \ calculate the distance from our unclassified data point to every data point\
    \ in the dataset and find the $k$ nearest:\n\n```\ndef nearest(self, k: int, data_point:\
    \ DP) -> list[DP]:\n    return sorted(self.data_points, key=data_point.distance)[:k]\n\
    ```\n\nYup, it is a one-liner. We just use the distance() method's results to\
    \ sort all of the data points, and then we keep the k lowest values (the points\
    \ with the least distance from data_point). The core of the KNN algorithm really\
    \ is that simple.\n\nIs this the most efficient way to find the nearest neighbors?\
    \ No. Sorting is an $O(n \\log n)$ operation, where $n$ is the number of data\
    \ points in the dataset. If the dataset is very large, this would be a significant\
    \ bottleneck. We could improve this a bit by writing code to manually evaluate\
    \ the distances of all the data points utilizing an ancillary data structure to\
    \ only keep the k smallest. To take performance even further, we may need a more\
    \ sophisticated data structure than an unsorted list for storing the dataset.\
    \ In short, there's a trade-off here between algorithmic performance and data\
    \ structure complexity.\n\nAnother alternative would be to not actually search\
    \ the entire dataset for neighbors each time. There are various approaches to\
    \ limit the search either through precomputation of a more limited subset of data\
    \ points that are representative of the whole or sampling the dataset during the\
    \ search through a so-called *approximate search*.^2 That said, our simple sorting\
    \ technique is fast enough for our applications and is true to the title of this\
    \ part of the book, \"Super-Simple Machine Learning.\"\n\nNext, we need to do\
    \ the \"voting.\" That involves counting how many of each class (or kind) there\
    \ are in the nearest neighbors and returning the class that there are the most\
    \ of:\n\n```\ndef classify(self, k: int, data_point: DP) -> str:\n    neighbors\
    \ = self.nearest(k, data_point)\n    return Counter(neighbor.kind for neighbor\
    \ in neighbors).most_common(1)[0][0]\n```\n\nFirst, we find the neighbors. Then,\
    \ we use Python's built-in Counter collection type to find the most common kind\
    \ among the neighbors. The most_common(1) call returns the single most common\
    \ item in the Counter, and the [0][0] says retrieve that first item from the collection\
    \ and take its kind label. The Counter will internally be structured as key-value\
    \ pairs that look something like [(\"amphibian\", 3), (\"reptile\", 4), (\"mammal\"\
    , 1)]. In that example, the line would find the key-value pair with the highest\
    \ value, (\"reptile\", 4), and return just its key, \"reptile\". We don't handle\
    \ tie-breakers in any systematic way here—we just leave it up to the whim of Counter.\
    \ Again, remember the part title.\n\nThat's it. Thanks to some nice Python standard\
    \ library routines, the actual algorithmic work behind KNN is effectively just\
    \ three lines of code"
