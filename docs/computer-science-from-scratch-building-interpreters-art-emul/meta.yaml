    # This Book’s Approach


    I try to keep my books as succinct as possible. I value your time. I use a tutorial-like,
    code-centric format to teach, and where possible, I let the code speak for itself.


    This is not a textbook. You’ll find some theory, especially at the beginning of
    each chapter, but it will never be too long before we get to some code. There’s
    just enough information to help you understand how each of the projects works,
    and enough pointers so that you know where to look next if you want to dive deeper
    into any of the covered topics.


    I’m not claiming to be an expert on interpreters, computational art, emulators,
    or machine learning. That may sound weird coming from the author of a book on
    those topics, but it’s true. I’m not an expert; I’m a teacher. I’ve worked as
    a software developer, and I’ve worked as computer science faculty at a teaching
    college. My claim is that I’m able to write clean code and explain that code to
    you in an exceptionally comprehensible manner. And since I’m not an expert, I
    won’t be talking down to you. I’ll be treating you like my peer as we go on this
    journey together. This is the guide I wish I had as I tried doing projects in
    these areas on my own.


    # About the Code


    All the source code in this book is available on the companion GitHub repository
    at https://github.com/davecom/ComputerScienceFromScratch. The code was created
    and tested against Python versions 3.12 and 3.13. Because some type hint–related
    features of Python 3.12 are utilized, some of the code won’t work with earlier
    versions of Python (but will likely work with any new version of Python in the
    foreseeable future). However, if you remove the type hints, the vast majority
    of the code will work with Python version 3.10 and later.


    I’ve used Python type hints (or “type annotations”) throughout the source code
    because I believe they increase readability by telling you a function’s parameter
    and return types without you needing to scrutinize the code or the comments. If
    you don’t like them, you can ignore them; they don’t change anything about how
    the code works. I’ve tried not to overuse type hints, as some find them to be
    too verbose. For example, I rarely use them within function bodies, but I do use
    them in every function signature. I type-checked all the source code against the
    contemporary version of Pyright at the time of the book’s writing.


    Several of the projects in this book use external libraries. You should have Pygame,
    NumPy, and Pillow installed in the virtual environment you create for the book’s
    source code or in your system Python interpreter. For most readers, installing
    them should be as simple as running `pip install pygame, numpy, pillow`. A `requirements.txt`
    file that pip can use is included in the book’s source code repository.'
