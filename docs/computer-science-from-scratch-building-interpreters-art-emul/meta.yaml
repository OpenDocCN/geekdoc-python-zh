  md: 'devices that used a limited color palette. We’ll implement a dithering algorithm
    capable of displaying modern color photos on the black-and-white screen of an
    original Macintosh. Then, we’ll convert the dithered images to a format compatible
    with the classic MacPaint application, using the run-length encoding compression
    algorithm in the process. The images we output can be displayed on actual 1980s
    Macintosh hardware.


    **Chapter 4: A Stochastic Painting Algorithm** Can a relatively simple algorithm
    create sophisticated abstract art? We’ll use a stochastic technique to generate
    “impressions” of existing images by matching random shapes to the underlying image,
    and we’ll see how a hill-climbing algorithm can help optimize the results.


    Part III is all about emulators—programs that allow one type of computer to pretend
    to be another type of computer.


    **Chapter 5: Building a CHIP-8 Virtual Machine** CHIP-8 is a virtual machine (VM)
    specification that was originally used for developing video games in the 1970s.
    Building a CHIP-8 VM is often considered the best first step into the world of
    emulation: it’s relatively simple but still involves all the steps necessary to
    create an emulator. Our CHIP-8 VM will be capable of playing all the CHIP-8 games
    that ran on machines in the 1970s.


    **Chapter 6: Emulating the NES Game Console** The NES was one of the best-selling
    video game consoles of all time. We’ll create an emulator that can play real NES
    games. It will have no sound, be rather slow, and not be completely accurate or
    universally compatible, but it will still be a great way to learn not just about
    emulators but also about how computers work at a low level.


    Finally, Part IV is a very gentle introduction to the world of machine learning
    using the *k*-nearest neighbors (KNN) algorithm.


    **Chapter 7: Classification with K-Nearest Neighbors** We’ll learn KNN, perhaps
    the simplest algorithm in machine learning (ML), and use it as a gateway to understand
    some introductory ML topics. We’ll use KNN to classify fish as well as images
    of handwritten digits. Amazingly, it will complete the latter task with 98 percent
    accuracy.


    **Chapter 8: Regression with K-Nearest Neighbors** We’ll take KNN to the next
    level by using it not just to classify items into categories but also to predict
    unknown attributes of data points. In the chapter finale, we’ll use it to predict
    the missing pixels from an image of a digit that the user draws.


    Beyond the main chapters, the afterword features some suggested resources for
    learning more about the topics in this book, and the appendix covers the basics
    of low-level bit manipulation in Python, an essential component of several projects.'
