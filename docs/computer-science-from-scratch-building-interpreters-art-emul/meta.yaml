    \ with the white pixels of the screen. This is because 1 XOR 1 is 0. The CHIP-8\
    \ draw instruction tracks whether any of these overlaps occur (a screen white\
    \ pixel was turned to a black pixel by drawing the sprite). If they do, it sets\
    \ the flag register (v[0xF]).\n\nThe draw_sprite() method is a codification of\
