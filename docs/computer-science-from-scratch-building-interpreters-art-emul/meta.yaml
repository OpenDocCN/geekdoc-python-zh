    for line_start in range(0, len(original_data), MAX_WIDTH // 8):\n    data = original_data[line_start:(line_start\
    \ + (MAX_WIDTH // 8))]\n```\n\n输出将存储在 `rle_data` 中。我们逐行遍历 `original_data` 数组。MacPaint\
