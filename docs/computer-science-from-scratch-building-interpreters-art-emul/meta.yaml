    # AFTERWORD


    ![](img/2b670944a6e236c13c5019fe56234a0a_254_0.png)


    Thank you for reading *Computer Science from Scratch*. This afterword provides
    more resources for you based on the four themes of the book (interpreters, computational
    art, emulators, and machine learning). I''ve chosen to highlight nonacademic but
    highly regarded resources that I''ve personally found to be useful—there''s no
    ivory tower here. But before we get to that, I have a few thoughts I''d like to
    share with you on what we''ve accomplished.


    # What We Did and What''s Next


    By working through the projects in this book, you were exposed to a broad survey
    of several different areas in computer science. Are you an expert on them now?
    Of course not. But you know enough to get started on a project'
  - '[PAGE 255]


    of your own design in any of these four areas. More importantly, you''re in a
    good position to learn more about these topics.


    The interpreters we completed in Part I were simple, but NanoBASIC had the constituent
    parts of any real-world interpreter (tokenizer, parser, runtime environment).
    You could go build an interpreter for a more sophisticated language now without
    any further study. Where it gets tricky is when you want to make that language
    more performant. This may require more advanced techniques like implementing a
    VM or a compiler, or adding built-in runtime optimizations.


    I''ll share some more in-depth resources on interpreters later in this afterword,
    but the point is you can get started immediately. Have you ever wanted to create
    your own programming language? Now you can. I''m not necessarily saying that you
    should, but you can.


    The computer art programs we developed in Part II introduced a hodgepodge of interesting
    algorithmic techniques, yet there wasn''t really a unifying theme other than pixels.
    You know enough now to manipulate pixels. If you have an idea about how you want
    to make pixels change, you can probably do that. Computer graphics more generally
    is filled with much broader ideas and would be your next stop if you want to further
    explore manipulating pixels.


    The NES emulator in Part III was by far the largest and most complex project in
    the book. A great next step would be to either add more compatibility to the emulator
    (as described in the Chapter 6 exercises) or try emulating another system. The
    Game Boy is of similar complexity, as is the Sega Master System. As discussed
    in the chapter, writing emulators in Python is challenging from a performance
    perspective. If you don''t know C or C++, writing your next emulator may be a
    great opportunity to learn them.


    In Part IV we took baby steps into the world of machine learning. KNN is perhaps
    the simplest algorithm in all of artificial intelligence. It works well for the
    right applications, but you''ll want to learn several other techniques to know
    which ones to reach for in a given situation. Hopefully the super simple nature
    of Part IV made this area, which can often seem intimidating, feel more approachable
    to you. You don''t need to be an expert on machine learning to use machine learning
    techniques. Today, everything is a library call away. You do, however, need to
    know which library call to make.


    I hope you feel like you got a great start in all four of these areas by completing
    the projects in this book. Now it''s up to you if you want to dive into your own
    projects or complete more training. In the rest of this afterword, I''ve suggested
    some more resources in each of these areas that I think will follow this book
    well. All of them have been vetted by me. I actually read the books that I''m
    recommending to you.


    # On Learning Computer Science


    You don''t need a formal university education to learn computer science. This
    book was a great start. Like almost all subjects, everything you need is'
- md: 'available for free in a library and on the internet. It just requires perseverance
    (study time, project time).


    I''m the type of person who likes to understand how things work at a fundamental
    level as much as possible. I''ve met other people like this, and it may just be
    a personality trait. Even if that''s not you, let me try to convince you why there''s
    a real benefit to learning some more computer science so that you can understand
    how things work "under the hood."


    First, as programmers, computer science is fundamental to understanding the techniques
    we can use to solve the problems that our programs need to solve. Sure, if we''re
    just building generic CRUD apps, it might not prove very useful, but if you want
    to do something novel or tricky, computer science really comes in handy.


    Second, even if we can think of a way to solve a problem, is it the most efficient
    way? Does it create performance problems? Understanding some computer science
    fundamentals can really help you improve the performance of your code.


    And finally, understanding computer science will help you in your career. You''ll
    understand what your colleagues are talking about. You''ll "get" software technology
    on a much more fundamental level. You''ll become a better technical communicator.
    And it will help you with technical interviews. Unfortunately, far too many companies
    still require candidates to solve data structure and algorithm problems on a whiteboard.
    I don''t agree with this practice, but there''s no doubt that those who have studied
    computer science have a leg up in these interviews.


    Computer science is a big subject. Don''t be intimidated. Here are a couple friendly
    books that I think complement this book well if you''re interested in furthering
    a general computer science education.


    **Grokking Algorithms, 2nd Edition, by Aditya Y. Bhargava**

    This is an eminently readable book on algorithms. It''s much easier to consume
    than your average algorithms textbook. It''s less math heavy and includes examples
    in Python to illustrate each concept. I use it myself instead of a traditional
    textbook when I teach a college-level data structures and algorithms class.


    **Classic Computer Science Problems in Python by David Kopec**

    I wrote *Classic Computer Science Problems* as a general overview of interesting
    algorithmic topics taught in a code-first, tutorial-like fashion. It covers everything
    from search algorithms to graph algorithms to even some introductory AI material.
    It''s the perfect accompaniment to this book and there is zero content overlap
    between the two since they cover different areas of computer science. Whereas
    this book is composed of larger, entertaining projects, *Classic Computer Science
    Problems* is more about the algorithms themselves and the particular problems
    that are appropriate for them.


    ## Interpreters


    Ten years ago, there were very few nonacademic books that could be recommended
    on writing interpreters for a general programmer audience. Today, we''re fortunate
    to have several great titles in this space, including two that I highly recommend:


    **Crafting Interpreters by Robert Nystrom**

    This is an absolutely wonderful book, in terms of both its pedagogy and its code.
    The older classic books on interpreters and compilers are extremely academic and
    even somewhat stuffy (like the so-called “Dragon Book”). *Crafting Interpreters*
    is a must-read book in this space if you want to write larger practical interpreters
    after having your interest piqued by the Brainfuck and NanoBASIC projects in this
    book.


    **Writing an Interpreter in Go by Thorsten Ball**

    I read this book myself in preparation for writing an interpreted programming
    language called SeaTurtle to help kids learn to code (see the “Code Meets Life”
    box in Chapter 2). It''s less comprehensive than *Crafting Interpreters* and a
    little more niche, being written in Go. If you''re interested in something more
    succinct or if you''re a Go programmer, however, it''s a great choice. It''s well
    written, and the accompanying code is great.


    ## Computational Art


    I mostly learned about the techniques in the book''s two computational art chapters
    from short online articles, so unfortunately I don''t have any comprehensive resources
    to share, but I do want to mention Michael Fogleman''s Primitive project. It was
    the inspiration for the Impressionist chapter (Chapter 4), although that program
    uses a different algorithm. The GitHub repository for Primitive (https://github.com/fogleman/primitive)
    has some easy-to-read Go source code, and Michael has a website for the project
    as well (https://www.michaelfogleman.com/#primitive).


    ## Emulators


    There may be good texts out there on writing emulators, but I''m personally not
    aware of them. Instead, I''m sharing a couple online resources that I''ve found
    to be helpful:


    **EmuDev**

    This subreddit (https://www.reddit.com/r/EmuDev) is one of the most vibrant communities
    that I''ve come across on emulator development, where folks building every kind
    of emulator you can imagine go to share their insights. There''s also an accompanying
    Discord that can be useful for getting questions answered live.


    **NesDev**

    The wiki documentation and forums at https://www.nesdev.org were invaluable to
    me both when developing my first NES emulator and when writing the emulator for
    this book. Unfortunately, despite NES emulation being a popular project, there
    are very few good tutorials or resources about it (which is part of how I got
    the idea to write this book). NesDev is the best resource that''s out there, and
    if you want to further your NES development beyond what we did in Chapter 6 (like
    adding more mappers or a more accurate PPU), this site will be your go-to resource.


    ## Machine Learning


    There are so many resources on machine learning that it can be overwhelming to
    even decide which one to start with. That said, if you liked the simple algorithm
    presented in Chapters 7 and 8 and you liked the way that we developed it from
    scratch, then I have two particularly straightforward resources for learning about
    other machine learning algorithms that you can implement:


    *The Hundred-Page Machine Learning Book* by Andriy Burkov

    This book is straight to the point. You learn the algorithm with just enough theory
    and other information to implement it without any of the flowery trappings of
    some technical books. While it doesn''t feature a lot of code, it''s a great explainer
    that can be furthered by good online courses or YouTube channels.


    *Classic Computer Science Problems in Python* by David Kopec

    Yes, I''m recommending my own book a second time. That''s a bit self-serving,
    but I wouldn''t have written it if I didn''t think it was truly a great resource.
    In fact, five of the nine chapters in the book could be said to be about artificial
    intelligence, and two of the chapters are specifically about machine learning.
    Do you want to learn how to write a neural network from scratch in Python (with
    no libraries)? Check out Chapter 7 of *Classic Computer Science Problems in Python*.
    You learned how to write a simple classifier and regressor using KNN in this book.
    In Chapter 6 of *Classic Computer Science Problems in Python*, you''ll also learn
    how to build a clustering program using another simple algorithm, k-means.


