- img_proc: true
  md: 'Table A-1: Left-Shift Examples


    | A | A << 1 | A << 3 |

    |---|---|---|

    | 0 | 0 | 0 |

    | 1 | 10 | 1000 |

    | 1010 | 10100 | 1010000 |


    In the first row of the table, where 0 is being shifted, you may think that it
    would become 00 and 0000, but in reality those are the same as 0. Instead, you
    can think of left shift as just moving the 1s. If there are no 1s, then the shift
    is essentially not doing anything.


    Python’s left-shift operator is preceded by the thing being shifted and followed
    by an integer indicating how many places to shift. Here’s a quick example of using
    it:


    ```

    >>> bin(0b1010 << 3)

    ''0b1010000''

    ```


    Shift operators are typically used to move a bit or bits into alignment with another
    binary value in combination with other bitwise operators that we’ll learn shortly.


    # Right Shift (>>)


    A right shift is much like a left shift, except the 1s move to the right rather
    than the left. If a 1 moves off the end (past the 0-bit position), then it’s “lost.”
    There’s no wrapping around. For example, 1001 shifted right by one becomes 100,
    not 1100. We can also right shift by more than one place, so 1001 shifted right
    by three becomes 1.


    Python has the >> operator for performing right shifts. Table A-2 shows some example
    right shifts.


    Table A-2: Right-Shift Examples


    | A | A >> 1 | A >> 3 |

    |---|---|---|

    | 0 | 0 | 0 |

    | 1 | 0 | 0 |

    | 1010 | 101 | 1 |


    In the second row of the table, the 1 is shifted “off the end” and there are no
    1s left, so the result is 0.


    # OR (|)


    With a bitwise OR operation between two values, if either value is a 1, then the
    result will be a 1. If neither value is a 1, then the result will be a 0. The
    operation is performed on the binary digits that are in the same digit places'
