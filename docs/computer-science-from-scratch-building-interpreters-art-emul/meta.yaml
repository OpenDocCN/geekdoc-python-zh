- md: "Fish as a subclass of DataPoint explicitly because it provides clarity to the\
    \ reader of our code and aids in type checking.\nEach line of a CSV is provided\
    \ from the KNN class as a list of strings for the Fish class to convert into a\
    \ Fish instance. The `from_string_data()` method does this conversion. The `distance()`\
    \ calculates the Euclidean distance between the current instance and another Fish.\
    \ We find the differences between each dimension in the dataset, square those\
    \ differences, and sum them. Then, we return the square root (`** 0.5`) of that\
    \ sum. Note that we don't consider the weight attribute from the dataset as part\
    \ of the comparison. This is because we'll be using the dimensions of a fish to\
    \ predict its weight in the next chapter, so the weight will be unknown for the\
    \ fish in question.\n\n## The Unit Tests\n\nWe have unit tests to make sure we're\
