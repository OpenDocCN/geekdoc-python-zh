  md: "we are and how much time the program is taking. Finally, the completed working\
    \ image is output with the help of create_output().\n\n# Utility Methods\n\nBefore\
    \ we get to trial(), we need some helper methods. A key part of the painting algorithm\
    \ is verifying that each additional shape is bringing the working image closer\
    \ to the original image. The difference() method calculates a similarity score\
    \ for two images, measuring how similar they are to each other:\n\n```\ndef difference(self,\
    \ other_image: Image.Image) -> float:\n    diff = ImageChops.difference(self.original,\
    \ other_image)\n    stat = ImageStat.Stat(diff)\n    diff_ratio = sum(stat.mean)\
    \ / (len(stat.mean) * 255)\n    return diff_ratio\n```\n\nThe ImageChops module\
    \ from Pillow has a built-in difference() method. It finds the difference on a\
    \ pixel-by-pixel level between two images. In other words, how are two pixels\
    \ in the same locations in the two images different from each other? The difference\
    \ is just the absolute values of the subtraction of each of the color channels\
    \ in each pixel. For example, the difference between an RGB pixel that's colored\
    \ (10, 100, 50) and another that's (10, 40, 20) would be (0, 60, 30). However,\
    \ this isn't enough for our algorithm. We need a single number, a score, that\
    \ expresses how similar two images are. After finding the difference pixel by\
    \ pixel, we can compress this into a single number by averaging across all of\
    \ the differences. We do this using the same ImageStat module that did the averaging\
    \ for us to find the average color in the constructor. Finally, although not strictly\
    \ necessary (pixel averages would work as scores), we divide by the maximum difference\
    \ possible to get the score as a ratio.\n\nEach time we generate a new shape it's\
    \ placed in a random location on the screen. We calculate these random coordinates\
    \ using random_coordinates():\n\n```\ndef random_coordinates(self) -> CoordList:\n\
    \    num_coordinates = 4  # ellipse or line\n    if self.shape_type == ShapeType.TRIANGLE:\n\
    \        num_coordinates = 6\n    elif self.shape_type == ShapeType.QUADRILATERAL:\n\
    \        num_coordinates = 8\n    coordinates = []\n    for d in range(num_coordinates):\n\
    \        if d % 2 == 0:  # x coordinates\n            coordinates.append(random.randint(0,\
    \ self.original.width))\n        else:  # y coordinates\n            coordinates.append(random.randint(0,\
    \ self.original.height))\n    return coordinates\n```"
