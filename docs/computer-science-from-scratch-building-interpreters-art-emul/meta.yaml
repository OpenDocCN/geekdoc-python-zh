  md: '# Real-World Applications


    Atkinson dithering and MacPaint were just a couple of the technologies that Bill
    Atkinson used to make graphics on the original Macintosh come alive. He was also
    the creator of QuickDraw, which provided the graphics primitives on all Lisa and
    classic Macintosh computers. His immense contributions go far beyond graphics
    too. He made several refinements to elements that we now consider as standard
    widgets in a GUI. Atkinson was also the creator of HyperCard, one of the first
    widely distributed hypertext platforms. You can think about it as a non-networked
    version of the web from the late 1980s. It was very influential.


    You might be curious to know what Bill Atkinson originally developed Atkinson
    dithering for. I was too, so I obtained a copy of a rare book called *Inside MacPaint*
    by Jeffrey S. Young and published by Microsoft Press in 1985. I didn''t exactly
    find my answer, but I found a probable answer. It turns out Atkinson had worked
    on a digitizer for the early Macintosh. It''s basically a kind of scanner that
    allowed you to work with real-world images in MacPaint. While the book doesn''t
    explicitly say it used Atkinson dithering, I can''t imagine that it''s a coincidence.
    It''s likely that the first real-world application of Atkinson dithering was a
    digitizer.


    Dithering was a widely used technique on 1980s and 1990s game consoles and computers,
    which were powerful enough to support digital images but often had a limited color
    palette. And limited-palette devices like the Amazon Kindle and the Panic Playdate
    continue to be dithering strongholds. As mentioned earlier, dithering is also
    how animated GIFs appear to show many more colors than they naturally support.
    Without hacks, a GIF is limited to 256 colors.


    Run-length encoding isn''t limited to MacPaint, of course. It''s a widely used
    compression technique. Any kind of data format that has a lot of repeated characters
    is a candidate for run-length encoding. Beyond MacPaint, it was used as the main
    compression technique in several other bitmap image formats of the 1980s. It''s
    also sometimes combined with other compression techniques to formulate more sophisticated
    meta-algorithms. For example, one component of DEFLATE, the algorithm used in
    ZIP files, utilizes run-length encoding.


    I''ll leave you with a quote from Bill Atkinson, from an interview he did in *Inside
    MacPaint*. He was asked by Jeffrey Young, “What do you consider essential for
    creating a great program?”


    > The whole trick to designing a good program is deciding what things to kick
    out. I had some powerful features that I kicked out to make MacPaint cleaner,
    simpler, more approachable, and less frightening. I probably threw away more code
    than I left in. My goal was a lean, mean, and clean design. The typical programming
    process is 95 percent debugging and only 5 percent real creation. A lot of the
    bugs are simple typos, or just things that a compiler program can really help
    you with. I like to keep my sights focused more on the overall algorithm, because
    that''s where I get the big wins.'
