  md: '# Exercises


    +   1. Make it possible for escaped double-quote characters to appear in NanoBASIC
    strings. This will require learning a bit about regular expressions.

    2. Turn NanoBASIC into Tiny BASIC by implementing INPUT statements, which allow
    the user to type a numeric value that gets stored in a variable. This is enough
    to implement the “baseline” Tiny BASIC (and to be able to run Tiny BASIC programs
    you find online with your interpreter), but many real-world versions also had
    extensions, such as a way of generating random numbers called RND().

    3. Tiny BASIC runs in an interactive mode that supports the commands (seen as
    statements in the original grammar) CLEAR, LIST, RUN, and END. Lines that start
    with a line number are stored. That storage can be cleared, listed, or run. The
    program can also be terminated. Create an interactive mode (basically a REPL)
    for NanoBASIC with these same four commands. I said Exercise 2 would turn NanoBASIC
    into Tiny BASIC, but with this interactive mode, you’ll have truly implemented
    Tiny BASIC.

    4. Add support for string interpolation to NanoBASIC. When a string contains a
    dollar sign before an identifier, check if that identifier is defined in the variable
    table and output its value in place of it. For example, "The value of X is $X"
    would print The value of X is 24 if the variable X has the value 24. This will
    require modifying the tokenizer, the parser, and the runtime.

    5. Write a NanoBASIC program that does something interesting and tests every statement
    in the interpreter. Think of this as the final integration test.


