  md: 'Before we dive into the specifics of Atkinson dithering, let''s talk about
    error-diffusion dithering algorithms more generally. Most of these algorithms
    look at an image''s pixels one at a time from the top left through to the bottom
    right. The movement is from left to right across each row, and then down one row
    after each row is complete. For every pixel processed, the following steps occur:


    +   1. Find which of the output colors it''s closest to. (In dithering, the output
    colors are specified in advance, for example, black and white.)

    2. Find the difference between the output color and the original color of the
    pixel.

    3. Add part of the difference to some of the pixels to the right and below the
    current pixel.


    Let''s take those general steps and apply them to our specific scenario, where
    the pixels are being converted from grayscale to black and white via Atkinson
    dithering:


