  md: '# CODE MEETS LIFE


    I’ve been using MacPaint since my dad brought home a Macintosh LC in 1990. I was
    just three years old, but apparently I became adept enough at using it that he
    brought me in to give a demonstration at a class he was teaching at the University
    of Maine. It was probably partially for the novelty factor, or maybe the idea
    was, “This is so easy, a three-year-old can do it!” Whatever the case, he always
    believed in me.


    I still have some of my childhood drawings saved to disk, which is what got me
    interested in the file format more recently. Amazingly, I couldn’t find any programs
    on my modern Mac that could open the classic MacPaint format. I had to turn to
    LibreOffice or transfer the files to old Macs to view them.


    Then, I found some mysterious MacPaint files that further piqued my interest on
    a floppy disk that had belonged to my brother 30 years ago. They contained strange
    artwork, quite sophisticated for the late 1980s or early 1990s, mixing digitized
    (a 1980s word for scanned and dithered) real-world objects with purely digital
    drawings. I eventually concluded that they were likely either the work of a well-known
    American artist named Robert W. Fichter¹⁰ or the work of someone who admired him.
    They had some of the same motifs and the same exact words as some of Fichter’s
    published pieces.


    Was I in possession of a valuable digital art relict lost to time? How did my
    brother get ahold of these MacPaint files? I called him up. He hadn’t thought
    about them in decades, but he said he got them from some student at the University
    of Maine while he was still in high school. He didn’t know their exact provenance,
    but the student had told him they were very important and had a hidden meaning
    to them. It made sense that the disk came from a university. Perhaps Fichter had
    lectured there, or perhaps they were copied around the sneakernet (this was in
    an era before networking was widespread). I tried contacting Fichter himself,
    but to no avail. Unfortunately, he died in 2023. I still, at the time of writing,
    don’t know if those files are the original digital artwork of Robert W. Fichter.
    If you’re an expert on his work or knew him, please get in touch with me!


    Around the same time, I was thinking about doing a dithering project for this
    book after coming across an article by John Earnest on Atkinson dithering on Hacker
    News.¹¹ I decided that the dithering algorithm on its own was too simple for a
    book chapter, but then I had an idea: the MacPaint format that I had recently
    become so interested in was also a product of Bill Atkinson, and it includes another
    interesting algorithm, run-length encoding. Why don’t I combine the two into a
    single project?


    I didn’t stop there. After writing the code for this chapter, I decided I should
    make MacPaint more accessible to modern Mac users. I ported the code, plus some
    additional dithering algorithms, to Swift and created a nice AppKit-based user
    interface around it. I sell the software as Retro Dither on the Mac App Store.¹²
    As a technical author, usually things you do as professional or hobby projects
    turn into material for a book; it’s not that usual that things go the other way.'
