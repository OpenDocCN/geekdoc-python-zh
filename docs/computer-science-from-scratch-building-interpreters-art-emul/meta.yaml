    ![](img/2b670944a6e236c13c5019fe56234a0a_133_0.png)


    I want to take a moment to thank Michael for how influential he’s been on my programming
    career. Michael is a very talented programmer, but beyond being talented, he also
    writes incredibly readable code. And he happens to create projects in many areas
    that interest me. You’ll hear more about another of Michael’s projects in the
    emulation section of this book.


    While this project shares no code with Michael’s Primitive, the fact that he could
    turn photos into abstract art using such a simple algorithm spurred me to believe
