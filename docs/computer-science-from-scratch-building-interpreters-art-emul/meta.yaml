    8xy1 Set v[x] to v[x] | v[y] (bitwise OR).

    8xy2 Set v[x] to v[x] & v[y] (bitwise AND).

    8xy3 Set v[x] to v[x] ^ v[y] (bitwise XOR).

    8xy4 Add v[y] to v[x] and set the carry flag.

    8xy5 Subtract v[y] from v[x] and set the borrow flag.

    8x_6 Shift v[x] right one bit and set the flag to the least-significant bit.

    8xy7 Subtract v[x] from v[y] and store the result in v[x]; set the borrow flag.

    8x_E Shift v[x] left one bit and set the flag to the most-significant bit.


    # Miscellaneous Instructions


    These instructions don''t quite have a unified subject area, but their opcodes
    are close to one another numerically.


    9xy0 Skip the next instruction if v[x] doesn''t equal v[y].

    Annn Set i to nnn.

    Bnnn Jump to nnn + v[0].

    Cxnn Set v[x] to a random integer (0–255) & nn (bitwise AND).

    Dxyn Draw a sprite that''s n high at (v[x], v[y]); set the flag on a collision.


    # Key and Timer Instructions


    The next batch of instructions are for manipulating the VM''s timers and checking
    on the status of various keys or waiting for a particular key to be pressed.


    Ex9E Skip the next instruction if key v[x] is set (pressed).

    ExA1 Skip the next instruction if key v[x] is not set (not pressed).

    Fx07 Set v[x] to the delay timer.

    Fx0A Wait until the next key press, then store the key in v[x].

    Fx15 Set the delay timer to v[x].

    Fx18 Set the sound timer to v[x].


    # Register i Instructions


    All the instructions in this last set are related to the memory index register
    (i).


    Fx1E Add v[x] to i.

    Fx29 Set i to the location of character v[x] in the font set.

    Fx33 Store the binary-coded decimal (BCD) value in v[x] at memory locations i,
    i + 1, and i + 2. (See the “Binary-Coded Decimal” box on page 122 for more on
    this.)

    Fx55 Dump registers v[0] through v[x] in memory, starting at i.

    Fx65 Store memory from i through i + x in registers v[0] through v[x].'
  - '[PAGE 145]


    Consider for a moment how mundane these instructions sound. You really don''t
    need any sophisticated mechanisms to have a working “computer.” Contrast the 35
    CHIP-8 instructions described here with the 8 instructions in our implementation
    of Brainfuck from Chapter 1. Both are memory-constrained Turing machines, and
    they aren''t as different from each other as their superficial instruction syntax
    may make it appear.


    > ### BINARY-CODED DECIMAL


    Binary-coded decimal (BCD) is a way of storing decimal numbers in binary. It''s
    not widely used today, but it was common in early computers. For example, several
    microprocessors from the 1970s included explicit instructions for BCD arithmetic,
    which offered more precision when dealing with decimal rounding and to some extent
    made machine code more readable. For the average modern programmer, there isn''t
    much value in learning BCD except as a curiosity. There were multiple different
    BCD schemes, and frankly I don''t think that learning the particular scheme used
    in the CHIP-8 VM is a valuable use of our space in this book.


    # The Implementation


    Now that we know the CHIP-8 architecture, we''re ready to implement our VM. The
    file `__main__.py` will contain the main run loop that handles user input, updates
    the display, manages timers, and most importantly, tells the VM to step through
    the next instruction. This file is also where the command line argument that specifies
    the ROM file is parsed. Meanwhile, `vm.py` is the actual VM.


    > ### ROMS


    Did you ever wonder why the files that hold games used in emulators are called
    ROMs? ROM stands for read-only memory. Most early video game systems used plastic
    cartridges that were glorified holders for ROM chips that directly plugged into
    the consoles. When the games were converted into files for emulators, someone
    would have to go and plug the ROM chip into a specialized device connected to
    their computer and “rip” the data from the ROM chip to store it in a file. The
    file would have an exact copy of the data on the ROM chip, perhaps with some extra
    header information depending on the emulation ecosystem.'
