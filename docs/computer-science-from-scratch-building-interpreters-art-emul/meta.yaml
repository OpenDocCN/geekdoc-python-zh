    \ NumericExpression representing the value.\n\n## Errors\n\nLet's take a quick\
    \ detour to discuss error handling in our interpreter. There's nothing more annoying\
    \ when you're programming than poor error messages. When you make a mistake in\
    \ your code, you want to know what happened and where. As the creator of a programming\
    \ language, you have a responsibility to provide your user (the NanoBASIC programmer)\
    \ with good error messages.\n\nNanoBASIC is going to report two general types\
    \ of errors: parser errors and interpreter errors. *Parser errors* can be thought\
    \ of as syntax errors, such as when the tokens are in the wrong order. For example,\
    \ there needs to be a numeric expression (representing a line number) after a\
    \ GOTO, but not after an IF statement. *Interpreter errors* are semantic errors.\
    \ They occur when the program tries to do something that doesn't make sense, such\
    \ as trying to use a variable before it's initialized. We'll define error classes\
    \ for both kinds of errors:\n\n```python\nfrom NanoBASIC.tokenizer import Token\n\
    from NanoBASIC.nodes import Node\n\nclass NanoBASICError(Exception):\n    def\
    \ __init__(self, message: str, line_num: int, column: int):\n        super().__init__(message)\n\
    \        self.message = message\n        self.line_num = line_num\n        self.column\
