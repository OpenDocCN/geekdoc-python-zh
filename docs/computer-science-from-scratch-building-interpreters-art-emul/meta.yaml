  - '[PAGE 221]


    It''s important to have automated tests like this when developing an emulator.
    Even when you think your CPU is perfect, you may have missed a small bug that
    throws whole programs off. You also need to know that changing one part of your
    emulator doesn''t break another part of it.


    # Playing Games


    Unit tests are one thing, but the real test of our emulator is whether it can
    play actual NES software. For legal reasons, we won''t be testing any commercial
    software in our NES emulator. Due to its simplicity, our emulator wouldn''t be
    capable of playing most of the NES library anyway. Instead, the book''s source
    code repository includes several open source or public domain games that our emulator
    is capable of running. These are real games in the sense that they can run on
    a real NES console.


    Let''s start with *BrickBreaker*, a Breakout-like game by Aleff Correa that I
    mentioned earlier. Assuming you have Pygame and NumPy installed, you can play
    this game by just running this command from the repository''s home directory:


    ```

    % python3 -m NESEmulator NESEmulator/Games/brix.nes

    ```


    It looks pretty good (see Figure 6-8).


    ![](img/2b670944a6e236c13c5019fe56234a0a_221_0.png)


    Next, let''s try *Chase* by Shiru:


    ```

    % python3 -m NESEmulator NESEmulator/Games/Chase.nes

    ```


    Figure 6-9 shows the game.'
  - '[PAGE 222]


    ![](img/2b670944a6e236c13c5019fe56234a0a_222_0.png)


    Figure 6-9: Chase by Shiru


    Finally, let''s try *Lan Master* by Shiru:


    ```

    bash

    % python3 -m NESEmulator NESEmulator/Games/LanMaster.nes

    ```


    This one''s a puzzle game, shown in Figure 6-10.


    ![](img/2b670944a6e236c13c5019fe56234a0a_222_1.png)


    Figure 6-10: Lan Master by Shiru


    *Lan Master* is very playable on our emulator, but the other two are not. Why?
    Well, you may have noticed all of them run pretty slowly. On my M1 MacBook Air
    running CPython 3.13, for example, they run at approximately 14 FPS. That''s about
    one-quarter the speed of a real NES. Our emulator is correctly running these games,
    just very slowly.'
  - '[PAGE 223]


    What’s the lesson? Python, and in particular the mainline version of Python, CPython,
    is slow. In recent years there have been efforts to improve the performance of
    CPython, but it’s still very slow compared to most other programming language
    implementations and isn’t tuned out of the box for writing low-level programs
    like emulators. To write more performant programs, you need to jump through some
    hoops: you can use particular libraries that are implemented in a lower-level
    language, use Cython, write a C extension, or use an alternative Python interpreter
    like PyPy.


    I’ll leave speeding up the emulator using something like Cython as an exercise
    for the reader. I’m confident that with the right solution you can get this NES
    emulator up to a real NES’s 60 FPS.


    > CODE MEETS LIFE


    When I started my emulator-programming journey by writing a CHIP-8 VM in Swift,
    my real dream was to write an emulator for the first game console I owned as a
    child, the NES. Two years later I got there, writing a basic NES emulator with
    no sound in C. While the CHIP-8 VM took me a day or two, the NES emulator took
    me about 30 days, spread over a year of off-and-on research and programming time.
    I found writing the CPU portion quite straightforward, but writing a pixel-perfect
    background renderer was much more challenging. I ended up porting the background
    renderer of the PPU of Michael Fogleman’s excellent NES emulator⁷ from Go to C
    and combining it with my own sprite-rendering code.


    If the NES emulator took me about 30 days to write and the CHIP-8 VM took about
    two days, was the project 15 times harder? I don’t think so. My challenge in writing
    the PPU was keeping all of the technical details in my mind at once. I was too
    focused on writing a pixel-perfect renderer when I should have started with a
    per-frame renderer as we did in this chapter. At the time there were also no great
    tutorials, although the documentation at NesDev was invaluable. I had first wanted
    to write an NES emulator as a teenager, so completing it was a dream come true,
    even if it was pretty basic and lacked sound. (I later added sound, as well as
    more mappers than just NROM.)


    In this chapter, I tried to provide the tutorial that I wish I had when I was
    developing my NES emulator. I knew pixel-perfect rendering would be too complicated
    and too full of esoteric internal-register minutiae for a first-time emulator
    writer, so I went back and rewrote the PPU of my C NES emulator as simply as possible.
    That’s the renderer I ported to Python for this chapter.


    After finishing the NES emulator, I went on to write an emulator for the original
    IBM PC. That was a significantly more complicated project, largely because the
    Intel 8088/8086 is much more complicated than the MOS 6502. In that project, not
    writing automated tests very early on bit me. Eventually I got it working at a
    basic level, but I should have written the tests much earlier. The more complicated
    the microprocessor you’re emulating, the more you need automated tests as early
    as possible.'
  - '[PAGE 224]


    # Real-World Applications


    Emulators are probably most commonly used to play video games for systems that
    are no longer in production, but they’ve also long been used at critical junctures
    in computing history. For example, when Bill Gates and Paul Allen started Microsoft
    in 1975 by writing a BASIC interpreter for the Altair 8800, as was discussed in
    Chapter 2, they didn’t actually have an Altair 8800 available to them. Instead,
    they wrote an emulator for the Altair’s Intel 8080 microprocessor on one of the
    minicomputers at Harvard, where Gates was going to college.⁸


    Apple has transitioned the microprocessor family used in its Macintosh line of
    computers three times: from the Motorola 68K to the Motorola/IBM PowerPC, from
    the PowerPC to the Intel x86, and finally from the Intel x86 to Apple’s own ARM-derived
    Apple Silicon. Does that mean Apple had to have developers recompile or rewrite
    all of their software several times? In the long run, yes, but in the short term
    during the transitions, Apple provided emulators. PowerPC Macs could run 68K Mac
    software, Intel Macs (at the beginning) could run PowerPC Mac software, and Apple
    Silicon Macs can run Intel Mac software too. Apple is an amazing emulator developer.
    In fact, PowerPC Macs would run 68K software faster than 68K Macs. The same was
    sometimes true of Apple Silicon Macs running Intel software.


    Emulators are also important for the preservation of software. What happens when
    it’s very hard to obtain the original hardware that a piece of software was written
    for? In those cases an emulator may be the only option. On the other end of the
    spectrum, emulators are sometimes used in the design phase of a new computing
    platform. Before the platform exists, the designers may utilize an emulator to
    simulate what it will be like and help flesh out its features in a realistic environment.


    Finally, emulator writing is very educational. It’s one of the best ways to teach
    how computers work at a low level, as I hope you discovered in this chapter.


    # Exercises


    +   1. Try to get the performance of our emulator up to that of a real NES—in
    other words, 60 FPS. You’ll likely need to use something like Cython, or Python
    in combination with a low-level language like C or Rust through an extension.
    It will be nearly impossible to get pure Python to run at 60 FPS as of CPython
    3.13 and 2025 era microprocessors.

    2. Add support for scrolling to our emulator using the documentation at https://nesdev.org.

    3. Implement another mapper. Right now our emulator only implements NROM, the
    most basic mapper. Two other popular mappers are MMC1 and UxROM.

    4. And now for the largest challenge of all: try writing an APU for our emulator
    so that you can play games with sound.'
  - '[PAGE 225]


    # Notes


