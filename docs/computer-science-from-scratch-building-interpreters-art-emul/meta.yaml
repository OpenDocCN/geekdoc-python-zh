    While I do assume readers will have some programming experience, I don''t assume
    readers'' knowledge of computer science or advanced mathematics. This book is
    designed for those who either lack a formal computer science education or want
    to fill in some gaps in their knowledge. For example, if you have an interest
    in writing your own programming language but you never took a course on compilers,
    this book is a great starting point. If you want to write a video game console
    emulator, this book will show you how. It even has a very digestible introduction
    to machine learning.

    The exact projects in the book may not themselves be your end goal, but that''s
    not the point. Think of them as a means to unlock deeper knowledge about algorithmic
    thinking and how software works, and as a jumping-off point for your own explorations.


    # What''s in the Book


    Each chapter constitutes one complete project, except for Chapters 7 and 8, which
    together make up one project. The seven projects in the book range from easy (the
    Brainfuck interpreter in Chapter 1) to difficult (the NES emulator in Chapter
    6), but since all the source code is provided, you''ll never get stuck and be
    unable to proceed.

    Each project begins with some theory—just enough to understand what we''ll be
    implementing, without getting bogged down in the details—and then walks through
    the code. The chapters also include stories about how I personally got interested
    in the subject, a discussion of how the implemented algorithms or computational
    techniques are used in the real world, and challenges for the reader to extend
    the provided code.

    The book is divided into four parts. In Part I, we''ll explore the world of interpreters
    by creating implementations of two simple programming languages.


    **Chapter 1: The Smallest Possible Programming Language** Brainfuck is a minimal
    programming language often used for educational purposes because of its simplicity—the
    whole language consists of just eight characters. We''ll learn how a very simple
    interpreter works by implementing one that can run any Brainfuck program. We''ll
    also learn what it means for a language to be Turing-complete.

    **Chapter 2: Writing a BASIC Interpreter** The BASIC programming language and
    its pared-down dialect, Tiny BASIC, were popular during the PC revolution of the
    late 1970s. We''ll implement an interpreter for a slightly simplified variant
    of Tiny BASIC called NanoBASIC. Doing so will demonstrate the constituent parts
    of more sophisticated interpreters, including a tokenizer, parser, and runtime
    environment.


    In Part II, we''ll get into the vibrant world of computational art.

    **Chapter 3: Retro Image Processing** When display technology was simpler, dithering
    algorithms were necessary to adapt images for'
