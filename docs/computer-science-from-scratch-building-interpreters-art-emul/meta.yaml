  - '[PAGE 179]


    Table 6-3: 6502 Registers


    | Name | Size (in bytes) | Purpose |

    | :--- | :--- | :--- |

    | A | 1 | The main register used for arithmetic operations. Sometimes known as
    the *accumulator*. |

    | X | 1 | An *index register*, often used as a loop counter. It can also be used
    as a general-purpose register, although not all instructions work with it as they
    do with A. |

    | Y | 1 | The same as X. |

    | PC | 2 | The *program counter*, which keeps track of where in memory the next
    instruction to execute resides. It’s 2 bytes because the 6502 can address up to
    64KB of memory (without bank switching). |

    | SP | 1 | The *stack pointer*, which keeps track of where on the stack the program
    currently is. Since it’s only 1 byte, the stack can hold a maximum of 256 bytes.
    |

    | P | 1 | The *status* or *flags* register. Its individual bits indicate different
    things, such as something about an arithmetic operation (is the result zero, for
    example?) or whether a break happened or the interrupt is enabled (IRQ). |


    Since Python has only a single type for all integers regardless of size, we represent
    all of these registers except the flags with the int type. Instead of fiddling
    with the individual bits for each of the flags in the status register, we divide
    them into separate Booleans using the lettered nomenclature common in 6502 documentation.
    These are the C, Z, I, D, B, V, and N member variables. Most of them are set as
    a result of arithmetic operations, I is set when a program wants to not be interrupted
    by an IRQ signal, and B is set when flags are pushed to the stack after a break
    instruction. The D flag, used for BCD code, isn’t relevant to the NES, since the
    NES doesn’t have BCD instructions.


    The jumped variable keeps track of whether a jump instruction altered the PC register,
    and page_crossed is for bookkeeping when accessing memory across a memory page,
    which, as discussed, can be more expensive than accessing memory close by. The
    NES CPU may need to wait a certain number of cycles for some tasks to complete.
    This is the purpose of stall. In our emulator, it’s only used when a direct memory
    access (DMA) transfer occurs to send a bunch of data from main memory to object
    attribute memory (OAM), where the PPU stores information about sprites.


    # The Jump Table


    Next, we’ll declare the jump table, the list containing all of the potential instructions
    that the 6502 can process. Since the 6502 uses 1-byte opcodes, and there are 256
    possible values for a byte, there are potentially 256 different instructions.
    Later, in our step() method, we’ll index into this list to get the specific instruction
    and its corresponding function for a given opcode that we decode. We won’t actually
    implement every instruction (some are BCD or unofficial), so some are attached
    to a self.unimplemented() method.'
