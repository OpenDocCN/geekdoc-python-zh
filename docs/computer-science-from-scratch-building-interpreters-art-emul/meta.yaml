    3: [

    ```


    一个循环可能开始。由于当前单元格索引处的值不是 0（它是 10），我们不是跳转到匹配的右括号，而是简单地将指令索引增加 1 以进入下一个命令。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 10 | 1 | 4 |


    ```

    4: <

    ```


