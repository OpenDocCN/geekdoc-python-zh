    \ optimization techniques such as genetic algorithms provide a useful way to solve\
    \ the problem, but their solutions may be suboptimal. A genetic algorithm may\
    \ not always yield a perfect solution to the traveling salesperson problem, but\
    \ it will almost always yield a solution that’s good enough.\n\nOur program also\
    \ utilized hill climbing. Although this is one of the simplest local search procedures\
