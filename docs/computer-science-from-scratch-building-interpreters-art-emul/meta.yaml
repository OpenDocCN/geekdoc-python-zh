    \        self.needs_redraw = True\n    case (0x0, 0x0, 0xE, 0xE):  # return from\
    \ subroutine\n        self.pc = self.stack.pop()\n        jumped = True\n    case\
    \ (0x0, n1, n2, n3):  # call program\n        self.pc = concat_nibbles(n1, n2,\
    \ n3)  # go to start\n        # Clear registers\n        self.delay_timer = 0\n\
