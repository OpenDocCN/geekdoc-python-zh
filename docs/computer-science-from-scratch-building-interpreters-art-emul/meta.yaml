  md: 'for reuse across many games. As an emulator author, to support all games you
    need to support all of the different chipsets that cartridges could contain. However,
    there were a few particularly popular chipset designs that account for the majority
    of all games.


    Each of these cartridge chipset designs is known in the NES emulator world as
    a *mapper* because the main use of cartridge chipsets was for switching between
    different memory banks, which in programming parlance can be thought of as mapping
    an address to a bank. One of the first NES emulators developed, iNES by Marat
    Fayzullin,⁴ defined a numbering scheme for the many mappers. In addition, iNES
    defined a ROM file format that''s used by almost all NES emulators today.


    Unlike CHIP-8, which has ROM files that just consist of the raw game''s memory,
    the NES requires a more sophisticated file format due to the variability of its
    game cartridges. In particular, the iNES format defines a header that we must
    pay attention to when reading a ROM file. Luckily, we have past experience with
    headers thanks to our work with the MacBinary header in Chapter 3. The header
    of the iNES file format is defined in Table 6-1.⁵


    Table 6-1: iNES File Format Header


    | Bytes | Description |

    |---|---|

    | 0–3 | Constant 0x4E45531A (ASCII “NES” followed by MS-DOS end-of-file) |

    | 4 | Size of PRG ROM in 16KB units |

    | 5 | Size of CHR ROM in 8KB units (value 0 means the board uses CHR RAM) |

    | 6 | Flags 6: mapper, mirroring, battery, trainer |

    | 7 | Flags 7: mapper, VS/Playchoice, NES 2.0 |

    | 8 | Flags 8: PRG RAM size (rarely used extension) |

    | 9 | Flags 9: TV system (rarely used extension) |

    | 10 | Flags 10: TV system, PRG RAM presence (unofficial, rarely used extension)
    |

    | 11–15 | Unused padding (should be filled with zeros, but some rippers put their
    name here) |


    As you can see, part of the header defines the mapper number of the game. Each
    flags byte can contain multiple individual flag bits, which is why some of the
    descriptions list multiple things. Our emulator won''t make use of any of the
    information in flags 8, 9, or 10.


    > NOTE: The iNES file format has been extended by a newer format known as NES
    2.0. Much of the iNES header fields are still valid in NES 2.0, with additional
    information in bytes 11 through 15 and some changes to the flags bytes.


    The emulator we build in this chapter is only capable of playing games using the
    simplest mapper, mapper 0, known as NROM. NROM cartridges feature no bank switching,
    so they''re the easiest to emulate. An NROM cartridge will always have either
    16KB or 32KB of PRG ROM and 8KB of CHR ROM. It can optionally have PRG RAM.'
