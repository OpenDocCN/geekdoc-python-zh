    \ MacBinary 文件。\n\n我们将逐步处理这个深奥的文件格式。首先，我们将处理像素数据。然后，我们将实现行程长度编码。最后，我们将创建 MacPaint\
    \ 和 MacBinary 头部。在处理过程中，我们将需要使用各种位运算，包括移位、或（OR）和与（AND）。如果这种底层的位操作对你来说是新的，或者你只是有点生疏，请参阅本书的附录，了解\
    \ Python 中位运算的概述。\n\n## 将字节转换为位\n\n在“L”模式下，我们的 Pillow Image 使用每像素 1 字节进行编码。然而，在\
    \ MacPaint 位图中，像素使用每像素 1 位进行编码，这意味着每个字节代表八个像素。这对于黑白图像来说是一个巨大的节省，而且完全合理，因为我们只需要两个值（1\
    \ 和 0）来表示两种颜色。在定义一些常量之后，我们在 *macpaint.py* 中的第一个函数是一个转换器，它接受从 `dither()` 得到的字节数组，并将其转换为“位数组”：\n\
    \n```\nfrom array import array\nfrom pathlib import Path\nfrom datetime import\
    \ datetime\n\nMAX_WIDTH = 576\nMAX_HEIGHT = 720\nMACBINARY_LENGTH = 128\nHEADER_LENGTH\
    \ = 512\n\n# Convert an array of bytes where each byte is 0 or 255\n# to an array\
    \ of bits where each byte that is 0 becomes a 1\n# and each byte that is 255 becomes\
    \ a 0\ndef bytes_to_bits(original: array) -> array:\n    bits_array = array('B')\n\
    \n    for byte_index in range(0, len(original), 8):\n        next_byte = 0\n \
    \       for bit_index in range(8):\n            next_bit = 1 - (original[byte_index\
    \ + bit_index] & 1)\n            next_byte = next_byte | (next_bit << (7 - bit_index))\n\
    \            if (byte_index + bit_index + 1) >= len(original):\n             \
    \   break\n        bits_array.append(next_byte)\n    return bits_array\n```\n\n\
    这里的循环一次遍历原始数组中的 8 个字节，检查每个字节是白色（255）还是黑色（0）。MacPaint 的位图格式对此进行了反转，使白色像素为 0，黑色像素为\
    \ 1。`next_bit = 1 - (original[byte_index + bit_index] & 1)` 这一行执行了反转。请注意，我们实际上并不检查值是否等于\
    \ 255，而是倾向于只检查第一位（`& 1`），因为这使代码更紧凑、性能更高。我们知道在调用 `bytes_to_bits()` 之前，数组中只存储了 255\
    \ 和 0，所以不用担心会意外捕获中间值；如果字节中任何位置有 1，它一定是 255。这 8 位通过将每个位放入适当位置并使用或（OR）操作编码到 `next_byte`\
    \ 中：`next_byte = next_byte | (next_bit << (7 - bit_index))`。然后我们将 `next_byte`\
    \ 追加到 `bits_array`。"
