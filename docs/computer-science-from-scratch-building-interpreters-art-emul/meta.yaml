    \ like this:\n\n```\n>>> a = 0b10011110\n>>> b = 0b1111\n>>> c = a & b\n>>> bin(c)\n\
    '0b1110'\n```\n\nLet’s see this operation with the bits lined up:\n\n```\n10011110\n\
    \   1111\n---------\n   1110\n```\n\nWe often use this technique with a single\
    \ bit in our emulator projects when working with flags. We just need to know the\
    \ single flag and whether it’s 1 or 0 (true or false).\n\n## XOR (^)\n\nA bitwise\
    \ XOR (“exclusive or”) returns a 1 if the operands are different (one 1 and one\
    \ 0); otherwise, it returns a 0. Here’s an example using the same operands we\
