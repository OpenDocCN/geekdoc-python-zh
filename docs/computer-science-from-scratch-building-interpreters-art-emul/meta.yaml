    \ aren't able to give a good introductory lecture on a topic like KNN. It's worth\
    \ remembering that a PhD is a research degree, not a teaching degree. This is\
    \ why, when you're advising your child on where to go to college, you should consider\
    \ a teaching college. At a large research university, the student may be taught\
    \ by research faculty who don't care about teaching, an adjunct for whom teaching\
    \ is a part-time job, or in the worst case, a very inexperienced graduate student.\
    \ Having a faculty full of PhDs doesn't mean much for an undergraduate student's\
    \ experience in an introductory course when those faculty care more about research\
    \ grants than teaching. By contrast, at a teaching college, you have an entire\
    \ full-time faculty (most with PhDs anyway) who were hired because they're fully\
    \ dedicated to the art of teaching and often actually like being in an introductory\
    \ classroom. What you lose is a connection to cutting-edge research, but for an\
    \ undergraduate, that connection generally isn't what will make the biggest impact\
    \ on their trajectory anyway. But take what I'm saying with a grain of salt, since\
    \ I've worked at a teaching college for the past nine years.\n\n## Real-World\
    \ Applications\n\nKNN has been widely used in the real world for everything from\
    \ optical character recognition to recommendation systems and from text classification\
    \ to financial modeling. Its simplicity and wide applicability make it universally\
    \ taught in machine learning.\n\nHowever, when utilizing KNN in practice, several\
    \ issues that have already been alluded to in this chapter must be overcome. The\
    \ first is finding the right value for *k*. This is typically done via cross validation\
    \ using a test dataset. What's the value for *k* that worked best with the test\
    \ data? Using too small a value can lead to *overfitting*, where the model is\
    \ too close to one specific dataset. Meanwhile, too large a value can lead to\
    \ *under-fitting*, where the model is too far away from being guided by the test\
    \ data.⁶\n\nThe next challenge is the performance implications of the basic algorithm\
    \ with large datasets of high dimensionality. As mentioned earlier in the chapter,\
    \ two ways of approaching this problem are designing a better data structure for\
    \ storing the dataset or using approximate searching. One of the most popular\
    \ data structures for speeding up the finding of nearest neighbors is a k-d tree.⁷\
    \ However, this is a fairly complex data structure and is only worth the headache\
    \ if performance is critical.\n\nChoosing the right distance function is also\
    \ critical. Euclidean distance works for many applications, but Hamming distance\
    \ is appropriate for boolean dimensions, and other distance functions are well\
    \ studied in the research literature. The right distance function is application\
    \ specific; there's no one-size-fits-all solution. Often, you also have to normalize\
    \ the data to eliminate the possibility of different units or magnitudes, influencing\
    \ results. We didn't normalize the data in the fish example in this chapter, and\
    \ the data in the OCR example was all in the same units and scales and thus didn't\
    \ require normalization.\n\nWhile we saw that it's borderline trivial to implement\
    \ KNN from scratch, many popular Python machine learning libraries have highly\
    \ optimized built-in KNN functions anyway. For example, scikit-learn's implementation\
    \ is widely used.\n\n## Exercises\n\n- 1. Find another dataset of your own interest\
    \ that our KNN implementation can accurately classify.\n- 2. Try to speed up the\
    \ unit tests by improving the performance of the Digit class's distance() method\
    \ while retaining the 98 percent accuracy of the test. Feel free to move away\
    \ from using NumPy arrays if you'd like. You can even move away from using pure\
    \ Euclidean distance. Perhaps you don't even need to compare every pixel?\n- 3.\
    \ Reimplement our classifier using the scikit-learn library. Compare the performance\
    \ of our classifier to the KNN classifier built into scikit-learn.\n\n## Notes\n\
    \n- 1. Thomas Cover and Peter E. Hart, \"Nearest Neighbor Pattern Classification,\"\
    \ *IEEE Transactions on Information Theory* 13, no. 1 (January 1967): 21–27.\n\
    - 2. Shichao Zhang, \"Challenges in KNN Classification,\" *IEEE Transactions on\
    \ Knowledge and Data Engineering* 34, no. 10 (October 2022): 4663–4675, https://doi.org/10.1109/tkde.2021.3049250.\n\
    - 3. Pekka Brofeldt, \"Bidrag till kaennedom on fiskbestondet i vaara sjoear Laengelmaevesi,\"\
    \ T.H.Jaervi: Finlands Fiskeriet Band 4, Meddelanden utgivna av fiskerifoereningen\
    \ i Finland, Helsingfors, 1917.\n- 4. \"Protocols,\" typing Documentation, accessed\
    \ May 8, 2024, https://typing.readthedocs.io/en/latest/spec/protocol.html#explicitlydeclaring-implementation.\n\
    - 5. Ethem Alpaydin and Cenk Kaynak, \"Optical Recognition of Handwritten Digits,\"\
    \ UCI Machine Learning Repository, accessed December 10, 2024, https://doi.org/10.24432/C50P49.\n\
    - 6. Stuart Russell and Peter Norvig, *Artificial Intelligence: A Modern Approach*,\
    \ 4th ed. (Pearson, 2021), 688.\n- 7. Russell and Norvig, *Artificial Intelligence*.\n\
    \n# 8\n\n## REGRESSION WITH K-NEAREST NEIGHBORS\n\n![](img/2b670944a6e236c13c5019fe56234a0a_244_0.png)\n\
    \nIn this chapter, we’ll extend our KNN implementation to perform regression.\
    \ For our purposes, *regression* simply means predicting a numeric value. With\
    \ some small additions to our code from Chapter 7, we can use our same KNN class\
    \ to not only classify but also make predictions about any numeric attribute value\
    \ in our datasets.\n\nWe’ll apply regression to the two KNN examples from the\
    \ preceding chapter. First, we’ll revisit the fish dataset and use regression\
    \ to predict the weight of a fish based on its dimensions. Then, we’ll write a\
    \ program that allows the user to draw part of a digit and then predicts what\
    \ the rest of the drawing could look like.\n\nUnlike the other chapters in this\
    \ book, this chapter doesn’t stand alone. It builds off the prior chapter. Please\
    \ be sure you’ve worked through Chapter 7 before diving into this one.\n\n## How\
    \ KNN Regression Works\n\nIn KNN classification, we tried to predict the class\
    \ or category that a data point belongs to, selecting the appropriate class from\
    \ a limited set of options. In KNN regression, instead of predicting a class,\
    \ we’re trying to predict an attribute value. These attribute values will typically\
    \ be numeric, meaning there’s potentially an infinite range of values that could\
    \ be assigned. Of course, it would make sense for the attribute value to be missing\
    \ if it’s something we want to predict.\n\nAs an example, say we’re a hospital\
    \ assigning patients to rooms. We may want to know how many days the patient will\
    \ likely need to stay. We could look at past data from patients with similar diagnoses,\
    \ symptoms, and vital signs to make the prediction. Let’s look at this example\
    \ visually with a scatterplot along two dimensions (Figure 8-1).\n\n![](img/2b670944a6e236c13c5019fe56234a0a_245_0.png)\n\
    \nFigure 8-1: Hospital stay length for flu based on body temperature and illness\
    \ severity\n\nSuppose the diamonds in Figure 8-1 represent past patients who were\
    \ admitted to the hospital with flu. Their illness was rated by a doctor on a\
    \ severity scale from 1 to 10, and their temperature was noted at the time of\
    \ admission. We also have data about how long they ended up staying at the hospital.\n\
    \nThe round dot represents a patient who was just admitted. We have their severity\
    \ rating and their body temperature, and we'd like to predict how long they will\
    \ end up staying in the hospital so that we can put them in the appropriate room.\
    \ If we use KNN with Euclidean distance and set $k$ to 3, then we'll look at the\
    \ three patients in the past data that are closest on the scatterplot to the new\
    \ patient's dot. The figure notes their stays as three, four, and five days, respectively.\
    \ Estimating the new patient's hospital stay length using this method can be as\
    \ simple as averaging the three nearest neighbors. That average (whether mean\
    \ or median) would be four, so we would predict that the new patient will stay\
    \ in the hospital for four days.\n\nMore broadly, here are the steps for performing\
    \ regression with KNN:\n\n- 1. Choose $k$, the number of neighbors to compare\
    \ to a data point with a missing attribute.\n- 2. Find the $k$-nearest neighbors\
    \ to the data point.\n- 3. Average the corresponding attribute value across the\
    \ $k$-nearest neighbors to predict what that missing attribute value should be\
    \ for the data point in question.\n\nAs you can see, using KNN for regression\
    \ is very similar to using KNN for classification. It's really just the last step\
    \ that differs. We have some of the same questions and answers about this algorithm\
    \ as we had in the prior chapter too: What's the right value for $k$? How do we\
    \ calculate distance? See Chapter 7 for a discussion of those questions.\n\nWe\
    \ also have a new question: What does it mean to take the average? Typically this\
    \ is either the mean or the median. Like with the question of the right distance\
    \ function, the best way to take the average can be application specific. It generally\
    \ requires some domain knowledge to make the best determination.\n\n## Implementing\
    \ Regression with KNN\n\nTo perform regression, we'll need to add just two methods\
    \ to our KNN class from Chapter 7. One predicts a scalar numeric attribute, and\
    \ one predicts an attribute that's an array of numbers. We'll use the latter for\
    \ the handwriting example so that we can predict pixels. Here are the updates:\n\
    \n```\n# KNN/knn.py\n# Predict a numeric property of a data point based on the\
    \ k-nearest neighbors.\n# Find the average of that property from the neighbors\
    \ and return it.\ndef predict(self, k: int, data_point: DP, property_name: str)\
    \ -> float:\n    neighbors = self.nearest(k, data_point)\n    return (sum([getattr(neighbor,\
    \ property_name) for neighbor in neighbors])\n            / len(neighbors))\n\
    ```"
  mdcn: "顺便说一句，你可能会惊讶于许多拥有机器学习背景的博士，竟然无法就KNN这样的主题进行一场出色的入门讲座。值得记住的是，博士学位是研究型学位，而非教学型学位。这就是为什么，当你为孩子选择大学时，应该考虑教学型大学。在大型研究型大学，学生可能由不关心教学的研究型教员授课，或是由兼职教学的兼职教员授课，最糟糕的情况是，由经验非常不足的研究生授课。当教员们更关心研究经费而非教学时，拥有一批拥有博士学位的教员对本科生的入门课程体验意义不大。相比之下，在教学型大学，你拥有整个全职教员团队（大多数也拥有博士学位），他们被聘用是因为他们完全致力于教学艺术，并且通常确实喜欢在入门课堂上授课。你失去的是与前沿研究的联系，但对于本科生来说，这种联系通常不会对他们的轨迹产生最大影响。不过，对我所说的话要持保留态度，因为我在过去九年里一直在教学型大学工作。\n\
    \n## 现实世界的应用\n\nKNN在现实世界中已被广泛应用于从光学字符识别到推荐系统，从文本分类到金融建模等各个领域。其简单性和广泛的适用性使其在机器学习中被普遍教授。\n\
    \n然而，在实践中使用KNN时，必须克服本章已经提到的几个问题。首先是为*k*找到合适的值。这通常通过使用测试数据集进行交叉验证来完成。哪个*k*值在测试数据上效果最好？使用过小的值可能导致*过拟合*，即模型过于贴近某个特定数据集。同时，过大的值可能导致*欠拟合*，即模型过于远离测试数据的指导。⁶\n\
    \n下一个挑战是基本算法在处理高维大型数据集时的性能影响。如本章前面所述，解决此问题的两种方法是设计更好的数据结构来存储数据集，或使用近似搜索。加速查找最近邻的最流行数据结构之一是k-d树。⁷\
    \ 然而，这是一种相当复杂的数据结构，只有在性能至关重要时才值得费心。\n\n选择正确的距离函数也至关重要。欧几里得距离适用于许多应用，但汉明距离适用于布尔维度，其他距离函数在研究文献中也有充分研究。正确的距离函数取决于具体应用；没有一刀切的解决方案。通常，你还必须对数据进行归一化，以消除不同单位或量级影响结果的可能性。我们在本章的鱼类示例中没有对数据进行归一化，OCR示例中的数据都处于相同的单位和尺度，因此不需要归一化。\n\
    \n虽然我们看到从头实现KNN几乎微不足道，但许多流行的Python机器学习库无论如何都有高度优化的内置KNN函数。例如，scikit-learn的实现被广泛使用。\n\
    \n## 练习\n\n- 1. 找到另一个你自己感兴趣的、我们的KNN实现可以准确分类的数据集。\n- 2. 尝试通过提高Digit类的distance()方法的性能来加快单元测试速度，同时保持测试98%的准确率。如果你愿意，可以不再使用NumPy数组。你甚至可以不再使用纯欧几里得距离。也许你甚至不需要比较每个像素？\n\
    - 3. 使用scikit-learn库重新实现我们的分类器。将我们的分类器与scikit-learn内置的KNN分类器进行性能比较。\n\n## 注释\n\
    \n- 1. Thomas Cover and Peter E. Hart, \"Nearest Neighbor Pattern Classification,\"\
    \ *IEEE Transactions on Information Theory* 13, no. 1 (January 1967): 21–27.\n\
    - 2. Shichao Zhang, \"Challenges in KNN Classification,\" *IEEE Transactions on\
    \ Knowledge and Data Engineering* 34, no. 10 (October 2022): 4663–4675, https://doi.org/10.1109/tkde.2021.3049250.\n\
    - 3. Pekka Brofeldt, \"Bidrag till kaennedom on fiskbestondet i vaara sjoear Laengelmaevesi,\"\
    \ T.H.Jaervi: Finlands Fiskeriet Band 4, Meddelanden utgivna av fiskerifoereningen\
    \ i Finland, Helsingfors, 1917.\n- 4. \"Protocols,\" typing Documentation, accessed\
    \ May 8, 2024, https://typing.readthedocs.io/en/latest/spec/protocol.html#explicitlydeclaring-implementation.\n\
    - 5. Ethem Alpaydin and Cenk Kaynak, \"Optical Recognition of Handwritten Digits,\"\
    \ UCI Machine Learning Repository, accessed December 10, 2024, https://doi.org/10.24432/C50P49.\n\
    - 6. Stuart Russell and Peter Norvig, *Artificial Intelligence: A Modern Approach*,\
    \ 4th ed. (Pearson, 2021), 688.\n- 7. Russell and Norvig, *Artificial Intelligence*.\n\
    \n# 8\n\n## 使用K近邻进行回归\n\n![](img/2b670944a6e236c13c5019fe56234a0a_244_0.png)\n\
    \n在本章中，我们将扩展KNN实现以执行回归。就我们的目的而言，*回归*仅仅意味着预测一个数值。通过对第7章代码的一些小改动，我们可以使用相同的KNN类不仅进行分类，还可以对数据集中的任何数值属性值进行预测。\n\
    \n我们将把回归应用于前一章的两个KNN示例。首先，我们将重新审视鱼类数据集，并使用回归根据鱼的尺寸预测其重量。然后，我们将编写一个程序，允许用户绘制数字的一部分，然后预测其余部分可能的样子。\n\
    \n与本书其他章节不同，本章并非独立存在。它建立在前一章的基础上。在深入本章之前，请确保你已经完成了第7章。\n\n## KNN回归的工作原理\n\n在KNN分类中，我们试图预测数据点所属的类别或类别，从有限的选项集中选择适当的类别。在KNN回归中，我们不是预测类别，而是试图预测属性值。这些属性值通常是数值型的，这意味着可能有无限的值范围可以分配。当然，如果属性值是我们想要预测的东西，那么它缺失是合理的。\n\
    \n举个例子，假设我们是一家医院，正在为病人分配房间。我们可能想知道病人可能需要住院多少天。我们可以查看具有相似诊断、症状和生命体征的过去病人的数据来进行预测。让我们用一个沿两个维度的散点图来直观地看这个例子（图8-1）。\n\
    \n![](img/2b670944a6e236c13c5019fe56234a0a_245_0.png)\n\n图8-1：基于体温和疾病严重程度的流感住院时长\n\
    \n假设图8-1中的菱形代表过去因流感入院的病人。他们的疾病由医生在1到10的严重程度量表上进行评分，并且记录了入院时的体温。我们还有关于他们最终住院时长的数据。\n\
    \n圆点代表刚刚入院的病人。我们有他们的严重程度评分和体温，我们想预测他们最终会在医院住多久，以便将他们安排到合适的房间。如果我们使用欧几里得距离的KNN并将$k$设置为3，那么我们将查看过去数据中在散点图上离新病人点最近的三个病人。图中注明他们的住院时长分别为三天、四天和五天。使用这种方法估计新病人的住院时长可以简单地取三个最近邻的平均值。这个平均值（无论是均值还是中位数）将是四天，因此我们将预测新病人将在医院住四天。\n\
    \n更广泛地说，以下是使用KNN执行回归的步骤：\n\n- 1. 选择$k$，即与具有缺失属性的数据点进行比较的邻居数量。\n- 2. 找到数据点的$k$个最近邻。\n\
    - 3. 对$k$个最近邻的相应属性值取平均值，以预测该数据点的缺失属性值应该是多少。\n\n如你所见，使用KNN进行回归与使用KNN进行分类非常相似。实际上只是最后一步不同。关于这个算法，我们有一些与前一章相同的问题和答案：$k$的合适值是多少？我们如何计算距离？有关这些问题的讨论，请参见第7章。\n\
    \n我们还有一个新问题：取平均值意味着什么？通常这是均值或中位数。就像关于正确距离函数的问题一样，取平均值的最佳方式可能取决于具体应用。通常需要一些领域知识才能做出最佳判断。\n\
    \n## 实现KNN回归\n\n为了执行回归，我们只需要在第7章的KNN类中添加两个方法。一个预测标量数值属性，另一个预测属性为数字数组。我们将使用后者来处理手写示例，以便我们可以预测像素。以下是更新内容：\n\
    \n```\n# KNN/knn.py\n# 基于k个最近邻预测数据点的数值属性。\n# 从邻居中找到该属性的平均值并返回。\ndef predict(self,\
    \ k: int, data_point: DP, property_name: str) -> float:\n    neighbors = self.nearest(k,\
    \ data_point)\n    return (sum([getattr(neighbor, property_name) for neighbor\
    \ in neighbors])\n            / len(neighbors))\n```"
