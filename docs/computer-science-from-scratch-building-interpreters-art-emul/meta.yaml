  md: 'higher precedence than anything. As I hinted when we first discussed the NanoBASIC
    grammar, this can be modeled in recursive descent by the order in which non-terminals
    are parsed. The further you descend, the higher the precedence. In this case,
    anything handled in parse_term() will have higher precedence than anything in
    parse_numeric_expression(), and anything in parse_factor() will have higher precedence
    than anything in parse_numeric_expression() or parse_term(). This is also the
    reason that - and + appear in the same production rule while / and * appear “deeper.”


    Each time we need a left or right side of an expression in parse_numeric_expression()
    or parse_term(), we descend. For example, parse_numeric_expression() never calls
    parse_numeric_expression(). Instead, it calls parse_term(). This might seem counterintuitive,
    since you might be wondering how multiple additions in a row are handled. The
    key is that parse_numeric_expression() and parse_term() both use loops, much like
    we had in parse_print() to accommodate an arbitrary amount of arithmetic (such
    as many addition operations). One way of thinking about it is that we descend
    and handle anything of higher precedence, and then fall back up to continue looping
    in parse_numeric_expression() if there are any more addition or subtraction tokens.


    Let’s try working through an example. Say we’re parsing the expression 2 + 3 *
    4 + 5. The initialization of left in parse_numeric_expression() calls parse_term(),
    which calls parse_factor(), which returns a NumberLiteral for 2. Then, we end
    up returning the 2 all the way back up to parse_numeric_expression(), which stores
    it in left. Next, a + token is encountered and parse_term() is called. It parses
    3 * 4 using multiple calls to parse_factor(). We end up back in parse_numeric_expression()
    with a BinaryOperation node for 3 * 4 referred to as right. Then, left and right
    are combined into a new BinaryOperation and associated with left (a new binding
    for it). Finally, the last + token is encountered, and 5 is parsed in much the
    same way that 2 was (descending all the way to parse_factor()) and associated
    with right. Once again, left and right are combined together into left for the
    final return value of parse_numeric_expression().


    Try working through some arithmetic examples of your own to better understand
    how operators at a deeper level of descent have a higher precedence. You’ll probably
    want to have the parser code open as you work. The combination of loops and the
    reuse of variables for different nodes can be hard to reason about, but once you
    work through a couple examples, it starts to make sense. You can also try adding
    some print() calls to the various methods to illustrate a parsing progression.
    You can eliminate the calls to run the AST through the runtime in executioner.py
    if you haven’t yet finished entering the whole program.


    > NOTE: There are more efficient ways to parse arithmetic expressions. One popular
    method discovered by Dijkstra is called the shunting yard algorithm. A more efficient
    algorithm like shunting yard is sometimes combined with a recursive descent parser
    for the arithmetic expression parts in a kind of hybrid model.'
