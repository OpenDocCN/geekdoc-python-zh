  md: 'The matching bits from the two bit planes come together to form the pixel pattern
    shown in the listing and illustrated in Figure 6-2: an image of the fraction 1/2.


    ![](img/2b670944a6e236c13c5019fe56234a0a_203_0.png)


    Where there''s a 1 in the first bit plane and a 0 in the second, the bits combine
    to form 01, or color 1 in the color scheme. Likewise, a 0 from the first bit plane
    and a 1 from the second form 10, or color 2, and a 1 in both bit planes yields
    11, or color 3.


    # Nametables


    Nametables are where the actual tiles for the background of the screen are laid
    out. What does the background of the screen look like right now? What tiles is
    it composed of, and what colors are used in each? That''s the job of a nametable
    and its accompanying attribute table (discussed next).


    Each nametable, representing a single screen of the game, is 32 tiles wide and
    30 tiles high. Each tile in the nametable is specified by a single byte—the index
    of a tile in the current pattern table. In this way, the pattern table tiles are
    directly mapped to the nametable, so you can think of a nametable as just a specific
    ordering of tiles from a pattern table.


    How big is a nametable? Well, 32 × 30 = 960, so there are 960 locations in a nametable.
    And each location in the table is occupied by a 1-byte index, so a nametable is
    960 bytes.


    We now have enough information to understand why the NES had a 256×240 resolution.
    Each tile is 8 pixels wide and 8 pixels tall. If the nametable represents the
    background of the screen and is 32 tiles wide, it follows that 8 × 32 = 256. And
    the height of the screen in pixels is found with 8 × 30 = 240.


    The PPU only has 2KB of memory, which is only enough for two nametables (and their
    attribute tables). Those two nametables can be mirrored, so there are a total
    of four logical nametables. Figure 6-3 shows the nametables for the title screen
    of *BrickBreaker* laid out.'
