    \n为了继续加倍我的错误，在硕士课程的第一个学期，我决定选修一门棘手的编译器课程。这门课最终成了我研究生生涯中成绩最低的一门课。这门课涉及一个大型项目：用\
    \ C 语言构建一个 C 编译器（缺少一些功能）。我有一个项目搭档，我们将工作分解为编译器的几个阶段，类似于我们在本章中讨论的阶段（词法分析器、语法分析器、代码生成器等）。只有所有阶段都正常工作，编译器才能工作。到了学期最后一周，我为我的阶段写了数千行代码，而我的搭档尽管我不断催促，却只写了不到\
    \ 100 行。今天，当我给学生布置小组项目时，我经常想起那段经历：有时当他们责怪搭档时，他们说的是实话。毫无疑问，我的代码也不怎么样，但至少我写了。\n\n\
    我们疯狂地赶工，熬了几个通宵才让程序运行起来，将我搭档那点可怜的代码与我的代码结合起来，并写了更多代码来填补所有空白。最终，我们的编译器能正确完成一些基本功能，但未能通过教授的大部分自动化测试。\n\
    \n一个差点在编译器课程上不及格的人，怎么会最终写出关于解释器的这一章？八年后，在我从事计算机科学教育工作几年后，我回想起了我使用 BASIC 的经历。我在成长过程中还使用过一种名为\
    \ Logo¹⁴ 的儿童编程语言，这两种语言是儿童学习编程的绝佳方式。作为对自己的一个挑战，我决定构建一个介于 BASIC 和 Logo 之间的儿童编程语言。这不是一个新颖的想法——许多人做过类似的项目——但我想制作一个精致的产品，并向自己证明，编译器课程并不一定是我编程语言开发的终点。\n\
    \n结果是一个名为 SeaTurtle¹⁵ 的产品，卖出了几百份。几百份，不是几千份。它不会让我致富，但它向我证明，我可以编写一种人们真正想购买的编程语言。一种真正的编程语言。好吧，一种真正的“儿童”编程语言。\n\
    \n在 SeaTurtle 的那段经历促使我为我的新兴语言课程（在第 1 章的“代码遇见生活”框中提到）创建了 NanoBASIC，作为一个 Swift 项目。而那段经历又引导我写出了这一章。NanoBASIC\
    \ 非常简单，但它是真实的，一旦你构建了真实的东西，你离构建有趣的东西就不远了。最终，我从所有这些经历中获得的视角，包括痛苦的编译器课程，使我成为撰写本章的合适人选。既然你已经读完了，希望你不必像我在那门课上那样挣扎。\n\
    \n## 现实世界应用\n\n正如之前在第 22 页的“BASIC 历史”中讨论的，BASIC 是个人计算革命的标准语言。数百万程序员从编写 BASIC 开始起步，而\
    \ Tiny BASIC 是 BASIC 的一种真实且广泛使用的方言。Tiny BASIC 的一些先驱开创了自由软件运动。得益于他们的开放许可，Tiny BASIC\
    \ 被移植到各种平台，其简单性实际上成为了一个优势。它可以在内存非常有限的机器上运行，这些机器无法运行比 Tiny BASIC 复杂得多的语言。\n\n这看起来可能不算什么，但对于早期没有其他选择（由于成本或可用性）且内存有限的个人计算机用户来说，Tiny\
    \ BASIC 相比于必须编写机器代码是一个巨大的改进。由于它是自由许可的，并且被移植到如此多的平台，它也为用它编写的程序提供了一种可移植性。如果一台机器能运行\
    \ Tiny BASIC，那么它就能运行你的程序。\n\nTiny BASIC 至今仍在使用。像 Brainfuck 一样，它作为一种教育工具，但它的用途不止于此。截至本文撰写时，一家德国公司正在销售运行\
    \ Tiny BASIC 版本的微控制器。¹⁶\n\n你会发现运行现代流行编程语言的解释器比我们在本章构建的解释器复杂得多，但它们具有相同的基本构建块——词法分析器、语法分析器、像\
    \ AST 这样的中间表示以及运行时环境。增加的复杂性通常是为了支持额外的功能或性能，但本章中相对简单的技术足以构建一种新语言的工作原型，甚至为你工作构建一个生产就绪的领域特定语言（DSL）。通常，DSL\
    \ 不需要高性能。\n\n许多成功的现实世界编程语言都是从相当简单的实现开始，并随着时间的推移而演进。例如，Ruby 最初是一个像 NanoBASIC 一样的\
    \ AST 遍历解释器。Ruby 后来编译为在虚拟机上执行的字节码（关于虚拟机将在第 5 章中介绍），而更新版本的 Ruby 已经集成了即时（JIT）编译器。\n\
    \n无论语言实现是遍历 AST、使用字节码还是拥有 JIT 编译器，它都需要我们本章涵盖的原理。"
