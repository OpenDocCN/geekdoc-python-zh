    Despite being revolutionary, MacPaint was limited by the hardware of its pioneering
    platform. Like the original Macintosh, MacPaint only supported black and white.
    As mentioned earlier, its documents were also limited to a fixed size of 576 pixels
    wide by 720 pixels tall. The original Macintosh didn’t even have a hard drive;
    disk space was limited because everything had to run off of a floppy disk. To
    accommodate this space constraint, MacPaint used a simple compression scheme known
    as *run-length encoding*. We’ll come back to some of these quirks shortly.


    The next step in our project will be to write code that translates the dithered
    pixels of an image into the MacPaint format. My experience has been that programming
    against binary file formats is just a matter of very carefully following a specification
    document. Unfortunately, the MacPaint format is somewhat obscure today, so finding
    a specification document requires a little bit of digging. Apple itself documented
    the format in Technical Note PT24.³ However, the most accessible and comprehensive
    description I’ve found was on a site called FileFormat.info.⁴


    On the surface, a MacPaint file is pretty simple. It consists of a 512-byte header
    followed by pixel data that’s compressed using run-length encoding. Before being
    run-length encoded, each pixel is stored as a bit, either a 1 for black or a 0
    for white. That all sounds straightforward enough. However, there’s a peculiarity:
    unlike almost any other operating system, the classic Mac operating system stored
    files in two “forks.” We’ll dive into that more in a bit, but in short, MacPaint
    files that get transported or created on operating systems other than the classic
    Mac OS should be encoded in a special format called *MacBinary* in order to have
    their metadata survive transfer. We’ll therefore need to turn our output file
    into a MacBinary file too, by adding a special additional header.


