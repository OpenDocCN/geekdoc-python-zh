    \ `*` 特殊形式。\n\n这个语法为我们实现解释器的词法分析器和语法分析器提供了蓝图。如果你还记得第 1 章中这些组件是什么，你现在可能就能看出语法中的终结符将如何成为词法分析器读取的标记。这里还有一个更有用的地方：非终结符的产生式规则最终将各自映射到我们的递归下降解析器中的一个函数。我们稍后会回到这一点。不过，最终，语法规定了编程语言的*语法*，但它并没有赋予语言每个元素*意义*。这将是我们解释器的魔力所在。\n\
    \n## NanoBASIC 的实现\n\n既然我们已经讨论了 NanoBASIC 及其语法的指定方式，现在终于可以开始编写我们的实现了。你可能还记得第 1\
    \ 章中，一个基本的解释器至少包含三个部分：\n\n- 一个*词法分析器*（有时称为*词法器*），它接收原始源代码并将其划分为编程语言中允许的最小可识别结构。这些被称为*标记*。对于代码\
    \ `a + 2`，标记可能是 `a`、`+` 和 `2`。\n- 一个*语法分析器*，它接收相邻的标记并弄清楚它们的含义（即它们形成的表达式或语句）。语法分析器通常生成一个节点树，表示表达式、语句和字面值之间的相对关系。这棵树被称为*抽象语法树*（AST）。例如，如果一个\
    \ Python 解释器看到标记 `a` 后跟标记 `+` 再跟标记 `2`，它可能会构建一个算术表达式节点，并将其连接到 `a` 和 `2` 的节点。\n\
    - 一个*运行时环境*，它遍历 AST 的节点并执行适当的操作来执行其中固有的含义。对于我们 `a + 2` 的算术表达式节点，这意味着查找 `a` 所代表的值并将其加上\
    \ 2。\n\n我们将按顺序构建这三个部分，但在我们甚至可以开始词法分析器之前，我们需要能够打开一个 NanoBASIC 代码文件：\n\n```\nNanoBASIC/__main__.py\n\
    from argparse import ArgumentParser\nfrom NanoBASIC.executioner import execute\n\
