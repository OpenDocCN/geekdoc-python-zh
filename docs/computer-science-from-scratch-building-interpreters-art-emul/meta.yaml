    \ some kind of kickoff code to get things going at the address listed at RESET_VECTOR.\n\
    \n**NMI_VECTOR** The same thing as RESET_VECTOR but for NMIs and vblank. When\
    \ a vblank hits, control will be moved to the address in memory listed at NMI_VECTOR.\n\
    \n**IRQ_BRK_VECTOR** An address for a less commonly used type of interrupt that\
    \ won't factor into the games we test with our program. It's included here for\
    \ completeness.\n\n**MEM_SIZE** The size, in bytes, of the main RAM that the NES\
    \ CPU has access to.\n\nNext, let's look at the beginning of our CPU class's constructor,\
    \ which sets up its memory, registers, and configurable state variables:\n\n```\n\
