  md: "> While the original ROM chips couldn't have their data modified, these “ROM\
    \ files” are just like any other files and can be modified to change the games.\
    \ Hence, the subculture of *ROM hacking*, in which developers change the graphics\
    \ or gameplay of games meant to be run in emulators.\n\nWe'll utilize two external\
    \ libraries in our implementation. Pygame, a Python library designed for game\
    \ development, provides an easy way to get a window on the screen, fill that window\
    \ with the pixels from our VM's display, and handle keyboard input. NumPy, a numerical\
    \ computing library, can help create the two-dimensional array used as the backing\
    \ buffer for the Pygame window's pixels. This array will serve as the “graphics\
    \ RAM” of our VM. Pygame natively works with NumPy arrays, and NumPy arrays are\
    \ more performant than anything in the Python standard library for representing\
    \ this buffer. Make sure you've installed Pygame and NumPy before running the\
    \ program.\n\nLike replicating a file format in Chapter 3, implementing a VM or\
    \ emulator requires a fair amount of low-level bit manipulation. See the appendix\
    \ to read up on Python's bitwise operators.\n\n# The Run Loop\n\nThe run loop\
    \ is responsible for advancing the VM by one instruction, redrawing the screen,\
    \ handling any events (key presses to be passed to the VM), playing the beep sound,\
    \ and updating CHIP-8's two timers. Pygame makes drawing, playing sounds, and\
    \ reading keyboard input almost trivial; it's a very easy-to-use library. Let's\
    \ start with some initialization code and continue through to the beginning of\
    \ the run loop:\n\n```\nimport sys\nfrom argparse import ArgumentParser\nfrom\
    \ Chip8.vm import VM, SCREEN_WIDTH, SCREEN_HEIGHT\nfrom Chip8.vm import TIMER_DELAY,\
    \ FRAME_TIME_EXPECTED, ALLOWED_KEYS\nimport pygame\nfrom timeit import default_timer\
    \ as timer\nimport os\n\ndef run(program_data: bytes, name: str):\n    # Startup\
    \ Pygame, create the window, and load the sound\n    pygame.init()\n    screen\
    \ = pygame.display.set_mode((SCREEN_WIDTH, SCREEN_HEIGHT),\n                 \
    \                   pygame.SCALED)\n    pygame.display.set_caption(f\"Chip8 -\
    \ {os.path.basename(name)}\")\n    bee_sound = pygame.mixer.Sound(os.path.dirname(os.path.realpath(__file__))\n\
    \                                   + \"/bee.wav\")\n    currently_playing_sound\
    \ = False\n    vm = VM(program_data) # load the virtual machine with the program\
    \ data\n```"
