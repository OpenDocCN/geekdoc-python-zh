    \ the file argument\n    file_parser = ArgumentParser(\"Chip8\")\n    file_parser.add_argument(\"\
    rom_file\",\n                             help=\"A file containing a Chip-8 game.\"\
    )\n    arguments = file_parser.parse_args()\n    with open(arguments.rom_file,\
    \ \"rb\") as fp:\n        file_data = fp.read()\n    run(file_data, arguments.rom_file)\n\
    ```\n\nIn this case, we have just a single command line argument—the name of the\
    \ file containing the program data for the CHIP-8 VM. The file’s raw bytes are\
    \ read and passed to run(), where they in turn are passed to the constructor of\
    \ the VM."
