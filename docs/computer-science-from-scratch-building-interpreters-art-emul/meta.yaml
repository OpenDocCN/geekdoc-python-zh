    # Real-World Applications


    KNN can be a great tool to start with when attempting to do regression, because
    it’s so easy to use. There’s very little tuning necessary, unlike with a neural
    network, and because there’s effectively no training involved, a KNN-based application
    is trivial to stand up.


    Researchers have really used KNN to predict hospital stay lengths, as described
    in the beginning of the chapter. Pei, Lin, and Chen found that KNN was approximately
    as accurate as more sophisticated techniques like logistic regression or random
    forest for predicting COVID-19 patients’ hospital stay length.² I was able to
    find multiple other studies in the same domain that used KNN. KNN regression has
    also been used for applications in text mining, agriculture, and financial markets.³
    It makes intuitive sense—events or data points from the past that are most similar
    to what’s currently happening are likely to be the most helpful in making predictions.


    Due to performance issues, KNN doesn’t work well when the data is noisy or the
    dataset is too large in terms of number of points and dimensionality. For most
    applications, however, it’s a reasonable starting point to consider.


    # Exercises


    +   1. Prove (or disprove) that KNN is effective for fish weight prediction by
    running it against the entire fish dataset and comparing the KNN results to the
    known weights from the dataset. On average, how accurate are the KNN predictions?

    2. Change our digit recognizer program to use a larger grid, say 64×64 instead
    of 8×8. This will allow the user to draw more fluid digits. You’ll need to find
    a way to accurately downscale the 64×64 drawings to 8×8 to utilize them with the
    training dataset.

    3. Use either our implementation of KNN regression or that from a library like
    scikit-learn to try to make predictions using a dataset of your own interest.


    # Notes


    +   1. See https://github.com/davecom/SwiftSimpleNeuralNetwork.

    2. Jianing Pei, Xin Lin, and Qixuan Chen, “Prediction of Patients’ Length of Stay
    at Hospital During COVID-19 Pandemic,” *Journal of Physics: Conference Series*
    1802 (March 2021): https://doi.org/10.1088/1742-6596/1802/3/032038.

    3. Sadegh Bafandeh Imandoust and Mohammad Bolandraftar, “Application of K-Nearest
    Neighbor (KNN) Approach for Predicting Economic Events: Theoretical Background,”
