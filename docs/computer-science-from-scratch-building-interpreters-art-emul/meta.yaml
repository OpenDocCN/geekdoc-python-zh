- md: 'What features does a programming language need to be Turing-complete? As Allen
    Tucker and Robert Noonan explain in their book *Programming Languages: Principles
    and Paradigms*, it doesn’t take much:


    > A programming language is said to be Turing complete if it contains integer
    variables, values, and operations and has assignment statements and the control
    constructs of statement sequencing, conditionals, and branching statements. All
    other statement forms (while and for loops, case selections, procedure declarations
    and calls, etc.) and data types (strings, floating point values, etc.) are provided
    in modern languages only to enhance the ease of programming various complex applications.³


    Let me reduce that description further using simpler language. A programming language
    needs integer variables, a way to change the values associated with those variables,
    something like an if statement, and something like a goto statement (a “jump”)
    to be Turing-complete. That’s not much. And if you think about it, you can imagine
    how those simple constructs can map to the elements of a Turing machine. The integer
    variables are the characters on the cells, changing the variables is the head
    writing on the cells, and the if and goto statements represent the head branching.


    Any programming language that’s Turing-complete can implement the same algorithms
    as any other programming language that’s Turing-complete. You can implement Quicksort
    in C, but you can also implement Quicksort in Brainfuck. You can write a JSON
    parser in Python, but you could also write a JSON parser in Brainfuck. In this
    sense, although Brainfuck is a “toy” programming language, it’s also a “real”
    programming language.


    ## How Brainfuck Works


    The main state in a Brainfuck program is an array of integers. Each of the slots
    in the array is called a *cell*. The array of cells can be thought of as analogous
    to the tape in a Turing machine. Instead of characters being read or written on
    a cell, it’s integers. The commands in Brainfuck allow the programmer to move
    forward one cell (›), move backward one cell (‹), increment a cell’s value (+),
    decrement a cell’s value (-), output a cell (.), input data to a cell (,), and
    loop while a particular cell is nonzero ([ and ]). Several of these operations
    map directly to the operations of a Turing machine, so Brainfuck is Turing-complete.


    In Python, we’ll need two variables to contain the cells’ states: a list of all
    the cells (cells) and an integer representing the index of the current cell (cell_index).
    In addition, we’ll need to keep track of where we are in the Brainfuck source
    file. We’ll handle this with another integer, called instruction_index.


    ### C VS. PYTHON


    In a C implementation of a Brainfuck interpreter, the cells can be managed by
    a single pointer to an array of integers. The pointer can be used to initialize
    the memory for the cells and to move from cell to cell, and it can be dereferenced
    to change the value of a cell.


    Some of you may not know C, but I include this point to illustrate the differences
    between programming languages. In C, thanks to the power of pointers, we have
    a single variable construct, whereas we need multiple variables in our Python
    Brainfuck interpreter for the same functionality.


    C pointers are powerful, but they’re also dangerous and difficult to grasp for
    new programmers. Of course, different programming languages come with different
    trade-offs for implementing an interpreter. A C Brainfuck interpreter will also
    be much faster than a Python Brainfuck interpreter. The main interpreter for Python
    itself, CPython, is written in C.


    Table 1-1 is based on a table from a 2017 talk by Müller describing the commands
    that each character represents.⁴ I’ve translated the C descriptions to Python
    using the variable names just discussed.


    ### Table 1-1: Brainfuck Commands


    | Command | Python equivalent | Description |

    | :--- | :--- | :--- |

    | `>` | `cell_index += 1` | Move one cell to the right. |

    | `<` | `cell_index -= 1` | Move one cell to the left. |

    | `+` | `cells[cell_index] += 1` | Increment current cell. |

    | `-` | `cells[cell_index] -= 1` | Decrement current cell. |

    | `.` | `print(chr(cells[cell_index]), end='''', flush=True)` | Print ASCII value
    of current cell. |

    | `,` | `cells[cell_index] = int(input())` | Read value for current cell. |

    | `[` | `if cells[cell_index] == 0: instruction_index = self.find_bracket_match(instruction_index,
    True)` | If the cell is zero, move to the corresponding closing bracket. |

    | `]` | `if cells[cell_index] != 0: instruction_index = self.find_bracket_match(instruction_index,
    False)` | If the cell is nonzero, move to the corresponding opening bracket. |


    Using Table 1-1, we have enough information to step through a Brainfuck program
    and understand what it’s doing. We’ll consider a simple program that outputs a
    user-specified single character a user-specified number of times. Here’s the whole
    program, with each command labeled with an index so that we can refer to it later
    (you can find this program in the book’s source code repository, in *Brainfuck/Examples/repeat.bf*):


    ```

    >,>[<.>-]

    012345678

    ```


    Let''s talk about this program one command at a time. We''ll describe how each
    command works and illustrate its effect on the program state using a table. The
    program requires only two cells, plus a cell index and an instruction index. The
    table initially looks like this:


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 0 | 0 | 0 | 0 |


    Here''s the first command (for clarity, we''ll precede each command with its instruction
    index and a colon):


    ```

    0: ,

    ```


    User input is retrieved and stored in cell 0 because the cell index is initially
    0. For our example, imagine the user entered 88 (the ASCII character code for
    the capital letter X). After the command is run, the instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 0 | 0 | 1 |


    ```

    1: >

    ```


    The cell index is incremented, and then the instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 0 | 1 | 2 |


    ```

    2: ,

    ```


    User input is entered into cell 1. Let''s say the user entered 10. Then, the instruction
    index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 1 | 3 |


    ```

    3: [

    ```


    A loop is potentially started. Since the value at the current cell index isn''t
    0 (it''s 10), instead of jumping to the matching closing bracket, we simply increment
    the instruction index by 1 to go to the next command.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 1 | 4 |


    ```

    4: <

    ```


    The cell index is decremented. The instruction index is then incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 0 | 5 |


    ```

    5: .

    ```


    The ASCII value of the cell at the current cell index is output to the console—in
    this case, an X. Then, the instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 0 | 6 |


    ```

    6: >

    ```


    The cell index is incremented. Then, the instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 10 | 1 | 7 |


    ```

    7: -

    ```


    The value at the current cell index is decremented. The instruction index is incremented.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 9 | 1 | 8 |


    ```

    8: ]

    ```


    If the value at the current cell index is nonzero, we jump to the matching opening
    bracket. In this case, cell 1 is 9, so we jump, meaning the instruction index
    becomes 3.


    | Cell 0 | Cell 1 | Cell index | Instruction index |

    |---|---|---|---|

    | 88 | 9 | 1 | 3 |


    Now we’re through the first iteration of a loop that will repeat nine times to
    print a total of 10 Xs. Instructions 3 through 8 will repeat those nine times
    until cell 1 is 0, in which case the check at the closing bracket (index 8) will
    end the repeats and the program will be over.


    To provide some closure on this program, let’s jump ahead and actually run it
    through our interpreter:


    ```

    % python3 -m Brainfuck Brainfuck/Examples/repeat.bf

    88

    10

    XXXXXXXXXX

    ```


    Our Brainfuck interpreter accepts only integers as input. These integers can correspond
    to ASCII character codes, and 88 is the ASCII character code for X. Therefore,
    the expected output is 10 Xs. After you complete the chapter, you’ll be able to
    run the program yourself, as well as any other Brainfuck program.


    ## The Structure of an Interpreter


    Interpreters generally have at least three parts:


    - A *tokenizer* (sometimes known as a *lexer*) that takes the original source
    code and divides it into the smallest recognizable constructs allowed in the programming
    language. These are known as *tokens*. For the code a + 2, the tokens may be a,
    +, and 2.

    - A *parser* that takes tokens that are next to each other and figures out their
    meaning (that is, the expressions or statements they form). Parsers typically
    produce a tree of nodes representing the relative relationships between expressions,
    statements, and literal values. This tree is called the *abstract syntax tree
    (AST)*. For example, if a Python interpreter saw the token a followed by the token
    + followed by the token 2, it may construct an arithmetic expression node and
    connect it to nodes for the a and the 2.

    - A *runtime environment* that walks through the nodes of the AST and runs the
    appropriate operations to execute the meaning inherent in them. For our a + 2
    arithmetic expression node, this would mean looking up the value represented by
    a and adding 2 to it.


    The beautiful thing about Brainfuck is that every statement is just a single symbol,
    so all we need to do to get a token is just read a single character from the source
    file. And each of those tokens on its own already represents a node of meaning.
    That makes writing an interpreter for Brainfuck easier than writing one for almost
    any other programming language. We can combine the tokenizer, the parser, and
    the runtime into a single loop that merges the three concepts together.'
  mdcn: '一门编程语言需要具备哪些特性才能成为图灵完备的？正如艾伦·塔克和罗伯特·努南在其著作《*编程语言：原理与范式*》中所解释的，这并不需要太多：


    > 如果一门编程语言包含整数变量、值和运算，并且具有赋值语句以及语句顺序、条件和分支等控制结构，那么它就是图灵完备的。所有其他语句形式（如 while 和
    for 循环、case 选择、过程声明和调用等）以及数据类型（如字符串、浮点值等）在现代语言中只是为了增强编写各种复杂应用程序的便利性而提供的。³


    让我用更简单的语言进一步简化这个描述。一门编程语言要成为图灵完备的，需要整数变量、一种改变与这些变量关联值的方法、类似 if 语句的东西，以及类似 goto
    语句（“跳转”）的东西。这并不多。而且，如果你仔细想想，你可以想象这些简单的构造如何映射到图灵机的元素。整数变量是单元格上的字符，改变变量是磁头在单元格上写入，而
    if 和 goto 语句代表磁头的分支。


    任何图灵完备的编程语言都可以实现与任何其他图灵完备的编程语言相同的算法。你可以在 C 中实现快速排序，但也可以在 Brainfuck 中实现快速排序。你可以在
    Python 中编写 JSON 解析器，但也可以在 Brainfuck 中编写 JSON 解析器。从这个意义上说，尽管 Brainfuck 是一种“玩具”编程语言，但它也是一种“真正的”编程语言。


    ## Brainfuck 的工作原理


    Brainfuck 程序中的主要状态是一个整数数组。数组中的每个槽位称为一个*单元格*。单元格数组可以类比为图灵机中的纸带。不同的是，单元格上读取或写入的是整数，而不是字符。Brainfuck
    中的命令允许程序员向前移动一个单元格（›）、向后移动一个单元格（‹）、增加单元格的值（+）、减少单元格的值（-）、输出单元格（.）、向单元格输入数据（,），以及在特定单元格非零时循环（[
    和 ]）。其中一些操作直接映射到图灵机的操作，因此 Brainfuck 是图灵完备的。


    在 Python 中，我们需要两个变量来包含单元格的状态：所有单元格的列表（cells）和一个表示当前单元格索引的整数（cell_index）。此外，我们需要跟踪我们在
    Brainfuck 源文件中的位置。我们将用另一个整数来处理这个问题，称为 instruction_index。


    ### C 与 Python 的对比


    在 C 实现的 Brainfuck 解释器中，单元格可以通过一个指向整数数组的指针来管理。该指针可用于初始化单元格的内存并在单元格之间移动，并且可以解引用来更改单元格的值。


    你们中的一些人可能不了解 C，但我包含这一点是为了说明编程语言之间的差异。在 C 中，得益于指针的强大功能，我们有一个单一的变量构造，而在我们的 Python
    Brainfuck 解释器中，为了实现相同的功能，我们需要多个变量。


    C 指针很强大，但它们也很危险，并且对于新程序员来说难以掌握。当然，不同的编程语言在实现解释器时有不同的权衡。C 的 Brainfuck 解释器也会比 Python
    的 Brainfuck 解释器快得多。Python 本身的主要解释器 CPython 就是用 C 编写的。


    表 1-1 基于穆勒在 2017 年的一次演讲中的表格，描述了每个字符代表的命令。⁴ 我已经使用刚刚讨论的变量名将 C 描述翻译成了 Python。


    ### 表 1-1：Brainfuck 命令


    | 命令 | Python 等效代码 | 描述 |

    | :--- | :--- | :--- |

    | `>` | `cell_index += 1` | 向右移动一个单元格。 |

    | `<` | `cell_index -= 1` | 向左移动一个单元格。 |

    | `+` | `cells[cell_index] += 1` | 增加当前单元格的值。 |

    | `-` | `cells[cell_index] -= 1` | 减少当前单元格的值。 |

    | `.` | `print(chr(cells[cell_index]), end='''', flush=True)` | 打印当前单元格的 ASCII
    值。 |

    | `,` | `cells[cell_index] = int(input())` | 读取当前单元格的值。 |

    | `[` | `if cells[cell_index] == 0: instruction_index = self.find_bracket_match(instruction_index,
    True)` | 如果单元格为零，则移动到对应的右括号。 |

    | `]` | `if cells[cell_index] != 0: instruction_index = self.find_bracket_match(instruction_index,
    False)` | 如果单元格非零，则移动到对应的左括号。 |


    使用表 1-1，我们有足够的信息来逐步执行一个 Brainfuck 程序并理解它在做什么。我们将考虑一个简单的程序，该程序输出一个用户指定的单个字符，重复用户指定的次数。以下是整个程序，每个命令都标有索引，以便我们稍后引用（你可以在本书的源代码仓库中找到这个程序，位于
    *Brainfuck/Examples/repeat.bf*）：


    ```

    >,>[<.>-]

    012345678

    ```


    让我们一次一个命令地讨论这个程序。我们将描述每个命令如何工作，并使用表格说明其对程序状态的影响。该程序只需要两个单元格，加上一个单元格索引和一个指令索引。表格最初如下所示：


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 0 | 0 | 0 | 0 |


    这是第一个命令（为了清晰起见，我们将在每个命令前加上其指令索引和冒号）：


    ```

    0: ,

    ```


    用户输入被检索并存储在单元格 0 中，因为单元格索引最初为 0。对于我们的示例，假设用户输入了 88（大写字母 X 的 ASCII 字符代码）。命令运行后，指令索引递增。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 0 | 0 | 1 |


    ```

    1: >

    ```


    单元格索引递增，然后指令索引递增。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 0 | 1 | 2 |


    ```

    2: ,

    ```


    用户输入被输入到单元格 1 中。假设用户输入了 10。然后，指令索引递增。


    | 单元格 0 | 单元格 1 | 单元格索引 | 指令索引 |

    |---|---|---|---|

    | 88 | 10 | 1 | 3 |


