- md: "## Accessing Registers\n\nThe PPU has several memory-mapped registers, and\
    \ there are some technicalities and peculiarities when reading or writing them.\
    \ We'll tackle these through the `read_register()` and `write_register()` methods.\
    \ In `read_register()`, we first handle address `0x2002`, which is for reading\
    \ the status register:\n\n```python\ndef read_register(self, address: int) ->\
    \ int:\n    if address == 0x2002:\n        self.addr_write_latch = False\n   \
    \     current = self.status\n        self.status &= 0b01111111  # clear vblank\
    \ on read to 0x2002\n        return current\n```\n\nWhen the status register is\
    \ read, `self.addr_write_latch` is set to `False`, which modifies how addresses\
    \ are written to `0x2006` (coming up later). Also, vblank is cleared on reads\
    \ to the status register. Next, the current `self.spr_address` in OAM can be read\
    \ through `0x2004`:\n\n```python\nelif address == 0x2004:\n    return self.spr[self.spr_address]\n\
    ```\n\nThe PPU memory at `self.addr` can be read and written through register\
    \ `0x2007`. But it's read through a buffer (`self.buffer2007`), with the details\
    \ varying depending on what address is being read:\n\n```python\nelif address\
    \ == 0x2007:\n    if (self.addr % 0x4000) < 0x3F00:\n        value = self.buffer2007\n\
    \        self.buffer2007 = self.read_memory(self.addr)\n    else:\n        value\
    \ = self.read_memory(self.addr)\n        self.buffer2007 = self.read_memory(self.addr\
    \ - 0x1000)\n    # Every read to 0x2007 there is an increment\n    self.addr +=\
    \ self.address_increment\n    return value\nelse:\n    raise LookupError(f\"Error:\
    \ Unrecognized PPU read {address:X}\")\n```\n\nNotice how `self.address_increment`\
    \ is added to `self.addr` after every read. This allows for subsequent reads to\
    \ automatically get the next entry, either 1 byte or 32 bytes further.\n\nIn `write_register()`,\
    \ we change the operation of the PPU by writing to its various memory-mapped registers.\
    \ First, registers `0x2000` and `0x2001` are called control registers. They're\
    \ used for changing various internal values that we've already seen in use throughout\
    \ the rest of the PPU's implementation:\n\n```python\ndef write_register(self,\
    \ address: int, value: int):\n    if address == 0x2000:  # Control1\n        self.nametable_address\
    \ = (0x2000 + (value & 0b00000011) * 0x400)\n        self.address_increment =\
    \ 32 if (value & 0b00000100) else 1\n        self.spr_pattern_table_address =\
    \ (((value & 0b00001000) >> 3) * 0x1000)\n        self.background_pattern_table_address\
    \ = (((value & 0b00010000) >> 4) * 0x1000)\n        self.generate_nmi = bool(value\
    \ & 0b10000000)\n    elif address == 0x2001:  # Control2\n        self.show_background\
    \ = bool(value & 0b00001000)\n        self.show_sprites = bool(value & 0b00010000)\n\
    \        self.left_8_background_show = bool(value & 0b00000010)\n        self.left_8_sprite_show\
    \ = bool(value & 0b00000100)\n```\n\nNext, we handle registers `0x2003` through\
    \ `0x2007`:\n\n```python\nelif address == 0x2003:\n    self.spr_address = value\n\
    elif address == 0x2004:\n    self.spr[self.spr_address] = value\n    self.spr_address\
    \ += 1\nelif address == 0x2005:  # scroll\n    pass\nelif address == 0x2006:\n\
    \    # Based on https://wiki.nesdev.org/w/index.php/PPU_scrolling\n    if not\
    \ self.addr_write_latch:  # first write\n        self.addr = (self.addr & 0x00FF)\
    \ | ((value & 0xFF) << 8)\n    else:  # second write\n        self.addr = (self.addr\
    \ & 0xFF00) | (value & 0xFF)\n    self.addr_write_latch = not self.addr_write_latch\n\
    elif address == 0x2007:\n    self.write_memory(self.addr, value)\n    self.addr\
    \ += self.address_increment\nelse:\n    raise LookupError(f\"Error: Unrecognized\
    \ PPU write {address:X}\")\n```\n\nRegister `0x2003` sets `self.spr_address`.\
    \ Register `0x2004` sets the value at `self.spr_address` and then increments `self.spr_address`\
    \ by 1. Register `0x2005` is a scroll register; we haven't implemented it in our\
    \ simple PPU, but a full implementation would require it. As it stands, our emulator\
    \ won't work with games that require scrolling. Register `0x2006` is for modifying\
    \ `self.addr`. This is where `self.addr_write_latch` comes in: we need the latch\
    \ because `self.addr` is 16 bits (2 bytes) but can only be written to 1 byte at\
    \ a time. Finally, `0x2007` is for writing to `self.addr`.\n\n## Accessing Memory\n\
    \nOur PPU implementation is basically done, but we need helper methods for reading\
    \ and writing to PPU memory. These `read_memory()` and `write_memory()` methods\
    \ are quite similar to their analogs in the CPU:\n\n```python\ndef read_memory(self,\
    \ address: int) -> int:\n    address = address % 0x4000  # mirror >0x4000\n  \
    \  if address < 0x2000:  # pattern tables\n        return self.rom.read_cartridge(address)\n\
    \    elif address < 0x3F00:  # nametables\n        address = (address - 0x2000)\
    \ % 0x1000  # 3000-3EFF is a mirror\n        if self.rom.vertical_mirroring:\n\
    \            address = address % 0x0800\n        else:  # horizontal mirroring\n\
    \            if (address >= 0x400) and (address < 0xC00):\n                address\
    \ = address - 0x400\n```"
