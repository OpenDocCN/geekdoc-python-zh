  md: '> CODE MEETS LIFE


    I was always interested in developing my own emulator, but I didn''t feel confident
    enough to build one until well into my programming life. When I started researching
    how to write an emulator, the standard advice I found was to first try writing
    a CHIP-8 VM since doing so is easier than writing almost any emulator but requires
    all the same elements (handling opcodes, simulating memory and registers, graphics,
    and so on).


    I found an online tutorial that was reasonably good. I decided that I wanted to
    make it a little more challenging, though, so I developed my initial CHIP-8 VM
    in the then-new language Swift, which I was doing a lot of my professional work
    in at the time. It was a weekend project, the launching point that I needed to
    get started developing emulators.


    # Real-World Applications


    VMs are ubiquitous in both historical and modern software development. Their chief
    advantage is portability. A program written for a VM will run on any platform
    that has an implementation of that VM. VMs also provide infrastructure that reduces
    the burden on a language author by eliminating the need to implement common language
    runtime features like garbage collection.


    An early example was the compilation of Pascal by some compilers in the 1970s
    and 1980s to so-called *p-code* (a type of bytecode) that would run on a p-code
    VM. Two prominent modern VM environments are the JVM, mentioned earlier in this
    chapter, and Microsoft''s competing Common Language Runtime (CLR), which is part
    of its .NET platform. Both the JVM and CLR are targeted by multiple popular programming
    languages. For example, C#, F#, and Visual Basic are languages that commonly target
    the CLR, but there are also implementations of popular languages like Python and
    Swift for the CLR.


    Why do these language implementations compile into bytecode for the CLR instead
    of machine code? Once compiled, that bytecode can run on any platform that has
    an installed CLR. That''s a kind of instant portability post-compilation. In addition,
    a sophisticated VM like the CLR will provide'
