- img_proc: true
  md: 'Here''s a more detailed explanation of the algorithm in steps:


    +   1. Create a blank canvas with the same size as the original photograph and
    a background color that''s the same as the original photograph''s average color.

    2. Try drawing a shape on the canvas in a random location and of a random size.
    Color the shape using the average color of the corresponding region of the original
    photograph, the most common color of that region, or randomly.

    3. Compare the colors of the pixels of the canvas (with the added shape) to the
    original photograph. If the added shape has made the whole canvas''s pixels more
    similar to the original photograph''s pixels, then keep the added shape.

    4. Try modifying the shape at each point (expanding or contracting) one pixel
    at a time. Keep moving the points in directions that further reduce the difference
    between the whole canvas''s pixels and the original photograph''s pixels. Stop
    when the movement no longer improves the difference.

    5. Repeat steps 2, 3, and 4 trials number of times.

    6. Output the final image created on the canvas after trials number of experiments.


    There are many configurable parameters of this algorithm. What kind of shape should
    be used? How many trials should be run? How should the color for each shape be
    picked? And there are several subproblems to solve. How is the difference between
    two images calculated? How do you find the pixels in a region that encompasses
    a shape?


    # The Main Implementation


    Excluding comments, the main implementation of our painting algorithm is less
    than 150 lines of Python. A lot of that succinctness is thanks to the powerful
    Pillow library, which was already discussed in Chapter 3. Pillow handles reading
    and writing various bitmap image formats. It also has facilities for drawing simple
    primitives like the shapes we need. Finally, Pillow has functions for computing
    differences between images and computing the average color in a region of an image.
    These will be critical helper functions for our program, allowing us to concentrate
    on the core algorithm while leaving the busywork to Pillow. That''s what a great
    library enables.


    # Setup


    We begin with some basic imports, the definition of some needed types, a constant,
    and a helper function:


    ```

    from enum import Enum

    from PIL import Image, ImageDraw

    ```'
