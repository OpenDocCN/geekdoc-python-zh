- md: 'The background is the back layer of the graphics where the individual pieces
    typically either don''t move at all or only scroll together as a group. The NES
    hardware draws the background using *tiles*. In a platform game, for example,
    a tile might be a part of a platform, a part of an artistic background (a mountain,
    perhaps), a ladder, or a door. These elements typically can''t move on their own.


    By contrast, *sprites* are individual game objects that can move anywhere on the
    screen independently. Think of the player and enemies in a platform game. The
    NES has specialized hardware for handling up to 64 8×8 or 8×16 (in pixels) sprites
    on the screen at a time.


    There are many different ways to implement the PPU. The most accurate is to simulate
    what the real PPU does: generate each pixel of the screen, one at a time. If this
    implementation is done properly, any game written for the NES should work correctly.
    This approach is also the most performance intensive. A popular alternative is
    to implement graphics one scanline at a time. Instead of doing updates for every
    pixel, the updates occur when each scanline''s processing is complete.


    We won''t be doing either of these. As discussed earlier, we''ll implement the
    PPU using the even simpler approach of updating the entire screen one frame at
    a time. This is the least accurate technique, because if the game somehow changes
    the graphics between pixels or between scanlines, those updates won''t appear.
    Compatibility will still be good, but it won''t extend to all games.


    While our method is the furthest away from how the real PPU works, it''s the most
    performant technique, since it requires the fewest updates per frame (just one
    big update instead of many small updates). It''s also the least conceptually difficult,
    since it doesn''t require understanding all the details of how the real PPU works.
    Because our emulator is being written in a relatively slow programming language,
    Python, and is intended to be as simple as possible for demonstration purposes,
    per-frame rendering is arguably the best choice.


    While we don''t need to understand every detail of the PPU to implement our frame-by-frame
    approach, we still need to understand some fundamentals about where the data for
    the backgrounds and the sprites comes from. We''ll dive into that in the coming
    sections. Some of the information was already scattered throughout earlier parts
    of the chapter, but here it''s all woven together with many new ideas and details
    to cohesively explain how the PPU operates.


    ## CHR ROM


    The data for both the background tiles and the sprites is initially located on
    the cartridge in a region of memory known as CHR ROM. The size of this memory
    could range quite a bit. Early games typically had just 8KB of CHR ROM, but later
    games with mappers could have hundreds of kilobytes, with the ability to swap
    in any other 8KB region for the first so as to be compatible with the expectations
    of the PPU hardware (which can only address 8KB of CHR ROM directly).


    Some games replaced CHR ROM with CHR RAM, which is modifiable during game operation.
    However, most games had fixed CHR ROM. If a game had CHR RAM, the game had to
    load the graphics into the CHR RAM as needed from the PRG ROM, instead of it just
    always being there. Some rare games had both CHR ROM and CHR RAM in different
    banks.


    ## Pattern Tables and Tiles


    At any given time the PPU can be "hooked up" to either of two 4KB portions of
    the CHR ROM on the cartridge. These portions are known as *pattern tables*. The
    NES pulls all of its graphics data for a given frame from the selected pattern
    table. Note that some documentation refers to all 8KB of addressable CHR ROM as
    a single overall pattern table rather than calling each 4KB section a separate
    pattern table.


    Each pattern table is divided into 256 16-byte tiles, and each tile defines potential
    graphics for an 8×8 pixel region of the screen. Together, the predefined tiles
    in the pattern tables represent all the different things you might see in the
    game. For example, Figure 6-1 shows the pattern tables for the open source game
    *BrickBreaker* by Aleff Correa, which we''ll run in our emulator later in the
    chapter.


    ![](img/2b670944a6e236c13c5019fe56234a0a_201_0.png)


    *Figure 6-1: The pattern tables of BrickBreaker, as displayed by the FCEUX emulator’s
    PPU Viewer*


    You can see how some of the tiles in the pattern tables represent sprites, some
    represent text, and some represent background patterns. Many of the tiles in the
    pattern tables are blank because *BrickBreaker* doesn’t have the need to use them
    (it has more space in CHR ROM for graphical assets than it actually needs).


    > Figure 6-1 was generated using the PPU Viewer feature of the FCEUX emulator,
    which allows you to see the contents of CHR ROM, separate from actual gameplay.
    Adding debug features like a pattern table viewer can be very helpful when writing
    an emulator. For example, you could compare the output of your PPU to that of
    an established emulator like FCEUX.


    As mentioned, each tile in a pattern table is 16 bytes. With 16 bytes defining
    8×8 = 64 pixels, that leaves just 2 bits per pixel, and 2 bits can only represent
    four different values (00, 01, 10, 11). The PPU therefore only supports four colors
    within a given tile. In fact, one of those is always a preset background color
    or transparent (00), so there are essentially only three programmer-selected colors
    that can appear in a specific tile. This palette of colors is set for regions
    of four tiles at a time and is controlled in a separate part of memory from the
    pattern tables themselves. This is why all of the tiles appear in grayscale in
    Figure 6-1; the color palette of each tile isn''t determined by the pattern table.
    We''ll come back to how colors are selected shortly.


    Unfortunately, the tiles get a little bit more complicated: the 2-bit values that
    define each pixel aren''t laid out sequentially. Instead, the zeroth bit of each
    pixel is laid out in the first 8 bytes of the tile, and the first bit of each
    pixel is laid out in the second 8 bytes of the tile. Each 8 bytes forms a *bit
    plane*, and the two planes combine, two bits at a time, to determine each pixel''s
    color.


    Let me phrase that another way. The first 8 bytes (first bit plane) of a tile
    can be thought of as 64 halves of the color values for the 64 pixels in the 8×8
    tile. They''re laid out sequentially. The second 8-byte bit plane defines another
    64 halves of the color values for the same 64 pixels. They''re also laid out sequentially.
    The two planes need to be combined to get the 64 final color values. As an example,
    consider the following 16 bytes of tile data:⁶


    ```

    Bit Plane 1

    Byte 1  01000001

    Byte 2  11000010

    Byte 3  01000100

    Byte 4  01001000

    Byte 5  00010000

    Byte 6  00100000

    Byte 7  01000000

    Byte 8  10000000

    Bit Plane 2

    Byte 9  00000001

    Byte 10 00000010

    Byte 11 00000100

    Byte 12 00001000

    Byte 13 00010110

    Byte 14 00100001

    Byte 15 01000010

    Byte 16 10000111

    ```


    ```

    Pixel Pattern

    01000003

    11000030

    01000300

    01003000

    00030220

    00300002

    03000020

    30000222

    ```


    The matching bits from the two bit planes come together to form the pixel pattern
    shown in the listing and illustrated in Figure 6-2: an image of the fraction 1/2.


    ![](img/2b670944a6e236c13c5019fe56234a0a_203_0.png)


    Where there''s a 1 in the first bit plane and a 0 in the second, the bits combine
    to form 01, or color 1 in the color scheme. Likewise, a 0 from the first bit plane
    and a 1 from the second form 10, or color 2, and a 1 in both bit planes yields
    11, or color 3.


    ## Nametables


    Nametables are where the actual tiles for the background of the screen are laid
    out. What does the background of the screen look like right now? What tiles is
    it composed of, and what colors are used in each? That''s the job of a nametable
    and its accompanying attribute table (discussed next).


    Each nametable, representing a single screen of the game, is 32 tiles wide and
    30 tiles high. Each tile in the nametable is specified by a single byte—the index
    of a tile in the current pattern table. In this way, the pattern table tiles are
    directly mapped to the nametable, so you can think of a nametable as just a specific
    ordering of tiles from a pattern table.


    How big is a nametable? Well, 32 × 30 = 960, so there are 960 locations in a nametable.
    And each location in the table is occupied by a 1-byte index, so a nametable is
    960 bytes.


    We now have enough information to understand why the NES had a 256×240 resolution.
    Each tile is 8 pixels wide and 8 pixels tall. If the nametable represents the
    background of the screen and is 32 tiles wide, it follows that 8 × 32 = 256. And
    the height of the screen in pixels is found with 8 × 30 = 240.


    The PPU only has 2KB of memory, which is only enough for two nametables (and their
    attribute tables). Those two nametables can be mirrored, so there are a total
    of four logical nametables. Figure 6-3 shows the nametables for the title screen
    of *BrickBreaker* laid out.'
  mdcn: '背景是图形的后层，其中的各个部分通常要么完全不动，要么作为一个整体一起滚动。NES硬件使用*图块*来绘制背景。例如，在平台游戏中，一个图块可能是平台的一部分、艺术背景的一部分（比如一座山）、一个梯子或一扇门。这些元素通常不能独立移动。


    相比之下，*精灵*是可以在屏幕上独立移动到任何位置的单个游戏对象。想想平台游戏中的玩家和敌人。NES有专门的硬件来处理屏幕上同时出现的最多64个8×8或8×16（以像素为单位）的精灵。


    实现PPU的方式有很多种。最精确的方式是模拟真实PPU的工作方式：逐个生成屏幕上的每个像素。如果这种实现方式做得正确，那么为NES编写的任何游戏都应该能正常工作。这种方法也是性能要求最高的。一种流行的替代方案是逐扫描线实现图形。更新不是针对每个像素进行，而是在每条扫描线的处理完成时发生。


    我们不会采用这两种方法中的任何一种。如前所述，我们将采用更简单的方法来实现PPU，即逐帧更新整个屏幕。这是最不精确的技术，因为如果游戏在像素之间或扫描线之间以某种方式更改了图形，这些更新将不会显示。兼容性仍然会很好，但不会扩展到所有游戏。


    虽然我们的方法与真实PPU的工作方式相去甚远，但它是性能最高的技术，因为它每帧需要的更新最少（只需一次大更新，而不是许多小更新）。它也是概念上最简单的，因为它不需要理解真实PPU工作方式的所有细节。因为我们的模拟器是用相对较慢的编程语言Python编写的，并且旨在尽可能简单以用于演示目的，所以逐帧渲染可以说是最佳选择。


    虽然我们不需要理解PPU的每一个细节来实现我们的逐帧方法，但我们仍然需要理解一些关于背景和精灵数据来源的基本原理。我们将在接下来的章节中深入探讨这一点。其中一些信息已经分散在本章前面的部分，但在这里，它将与许多新的想法和细节交织在一起，以连贯地解释PPU是如何运作的。


    ## CHR ROM


    背景图块和精灵的数据最初位于卡带上的一个称为CHR ROM的内存区域中。这个内存的大小可能差异很大。早期的游戏通常只有8KB的CHR ROM，但后来带有映射器的游戏可能有数百KB，并且能够将任何其他8KB区域交换进来以替换第一个，从而与PPU硬件的期望保持兼容（PPU硬件只能直接寻址8KB的CHR
    ROM）。


    一些游戏用CHR RAM取代了CHR ROM，CHR RAM在游戏运行期间是可修改的。然而，大多数游戏使用的是固定的CHR ROM。如果一个游戏有CHR RAM，游戏就必须根据需要从PRG
    ROM将图形加载到CHR RAM中，而不是图形始终在那里。一些罕见的游戏在不同的存储体中同时拥有CHR ROM和CHR RAM。


    ## 图案表和图块


    在任何给定时间，PPU都可以“连接”到卡带上CHR ROM的两个4KB部分中的任何一个。这些部分被称为*图案表*。NES从选定的图案表中提取给定帧的所有图形数据。请注意，一些文档将所有8KB的可寻址CHR
    ROM称为一个整体图案表，而不是将每个4KB部分称为单独的图案表。


    每个图案表被分成256个16字节的图块，每个图块定义了屏幕上一个8×8像素区域的潜在图形。图案表中预定义的图块共同代表了你在游戏中可能看到的所有不同事物。例如，图6-1显示了Aleff
    Correa的开源游戏*BrickBreaker*的图案表，我们将在本章后面在我们的模拟器中运行它。


    ![](img/2b670944a6e236c13c5019fe56234a0a_201_0.png)


    *图6-1：BrickBreaker的图案表，由FCEUX模拟器的PPU查看器显示*


    你可以看到图案表中的一些图块代表精灵，一些代表文本，一些代表背景图案。图案表中的许多图块是空白的，因为*BrickBreaker*不需要使用它们（它在CHR
    ROM中用于图形资源的空间比实际需要的要多）。


    > 图6-1是使用FCEUX模拟器的PPU查看器功能生成的，该功能允许你查看CHR ROM的内容，与实际游戏分开。在编写模拟器时，添加调试功能（如图案表查看器）会非常有帮助。例如，你可以将你的PPU输出与像FCEUX这样的成熟模拟器进行比较。


    如前所述，图案表中的每个图块是16字节。16字节定义8×8 = 64个像素，这意味着每个像素只有2位，而2位只能表示四个不同的值（00、01、10、11）。因此，PPU在给定的图块内只支持四种颜色。事实上，其中一种总是预设的背景色或透明色（00），所以实际上只有三种程序员选择的颜色可以出现在特定的图块中。这个调色板是为四个图块的区域同时设置的，并且由与图案表本身分开的内存部分控制。这就是为什么图6-1中的所有图块都显示为灰度；每个图块的调色板不是由图案表决定的。我们稍后会回到如何选择颜色的问题。


    不幸的是，图块变得有点复杂：定义每个像素的2位值不是按顺序排列的。相反，每个像素的第0位排列在图块的前8个字节中，每个像素的第1位排列在图块的后8个字节中。每个8字节形成一个*位平面*，两个平面组合在一起，每次两位，来确定每个像素的颜色。


    让我换一种方式表达。一个图块的前8个字节（第一个位平面）可以看作是8×8图块中64个像素颜色值的64个半值。它们是按顺序排列的。第二个8字节位平面定义了相同64个像素颜色值的另外64个半值。它们也是按顺序排列的。两个平面需要组合起来才能得到64个最终的颜色值。例如，考虑以下16字节的图块数据：⁶


    ```

    位平面 1

    字节 1  01000001

    字节 2  11000010

    字节 3  01000100

    字节 4  01001000

    字节 5  00010000

    字节 6  00100000

    字节 7  01000000

    字节 8  10000000

    位平面 2

    字节 9  00000001

    字节 10 00000010

    字节 11 00000100

    字节 12 00001000

    字节 13 00010110

    字节 14 00100001

    字节 15 01000010

    字节 16 10000111

    ```


    ```

    像素图案

    01000003

    11000030

    01000300

    01003000

    00030220

    00300002

    03000020

    30000222

    ```


    两个位平面中匹配的位组合在一起，形成了清单中显示并在图6-2中说明的像素图案：一个分数1/2的图像。


    ![](img/2b670944a6e236c13c5019fe56234a0a_203_0.png)


    当第一个位平面中是1而第二个位平面中是0时，这些位组合形成01，即颜色方案中的颜色1。同样，第一个位平面中的0和第二个位平面中的1形成10，即颜色2，而两个位平面中都是1则得到11，即颜色3。


    ## 命名表


    命名表是屏幕背景的实际图块布局所在的地方。屏幕的背景现在是什么样子？它由哪些图块组成，每个图块使用什么颜色？这就是命名表及其随附的属性表（接下来讨论）的工作。


    每个命名表代表游戏的一个屏幕，宽度为32个图块，高度为30个图块。命名表中的每个图块由单个字节指定——当前图案表中图块的索引。通过这种方式，图案表中的图块直接映射到命名表，因此你可以将命名表视为图案表中图块的特定排序。


    命名表有多大？嗯，32 × 30 = 960，所以命名表中有960个位置。表中的每个位置都被一个1字节的索引占据，所以命名表是960字节。


    我们现在有足够的信息来理解为什么NES的分辨率为256×240。每个图块宽8像素，高8像素。如果命名表代表屏幕的背景，并且宽度为32个图块，那么8 × 32
    = 256。屏幕的高度（以像素为单位）是8 × 30 = 240。


    PPU只有2KB的内存，这只够容纳两个命名表（及其属性表）。这两个命名表可以被镜像，因此总共有四个逻辑命名表。图6-3显示了*BrickBreaker*标题屏幕的命名表布局。'
