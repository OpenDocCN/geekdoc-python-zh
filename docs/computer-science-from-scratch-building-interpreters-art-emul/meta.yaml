    \ SVG 这样的大型标准中获取价值并不一定需要太多东西。仅仅 20 行代码，我们就编写了一个功能非常有限但实用的 SVG 创建器。\n\n## 算法\n\n\
    生成这些（有时）美丽的抽象照片印象的算法非常简单。简而言之，它尝试绘制随机大小和位置的形状，一次一个形状。如果添加的形状使抽象图像看起来更像原始照片，则保留它。通过调整形状的大小（即移动其每个点）可以进一步优化改进。如果添加的形状使图像看起来更不像原始照片，则将其丢弃并尝试新的形状。\n\
    \n以下是该算法更详细的步骤说明：\n\n1.  创建一个与原始照片大小相同的空白画布，背景颜色与原始照片的平均颜色相同。\n2.  尝试在画布上随机位置绘制一个随机大小的形状。使用原始照片对应区域的平均颜色、该区域最常见的颜色或随机颜色为形状着色。\n\
    3.  比较画布（添加形状后）的像素颜色与原始照片的像素颜色。如果添加的形状使整个画布的像素与原始照片的像素更相似，则保留添加的形状。\n4.  尝试逐像素修改形状的每个点（扩大或收缩）。持续移动点，以进一步减少整个画布的像素与原始照片的像素之间的差异。当移动不再改善差异时停止。\n\
    5.  重复步骤 2、3 和 4，进行指定次数的试验。\n6.  在指定次数的实验后，输出在画布上创建的最终图像。\n\n该算法有许多可配置的参数。应该使用什么样的形状？应该运行多少次试验？如何为每个形状选择颜色？还有几个子问题需要解决。如何计算两个图像之间的差异？如何找到包含形状的区域中的像素？\n\
    \n## 主要实现\n\n不包括注释，我们绘画算法的主要实现不到 150 行 Python 代码。这种简洁性很大程度上归功于强大的 Pillow 库，这在第\
    \ 3 章中已经讨论过。Pillow 处理各种位图图像格式的读写。它还提供了绘制简单图元（如我们需要的形状）的功能。最后，Pillow 有计算图像之间差异和计算图像区域平均颜色的函数。这些将是我们的程序的关键辅助函数，使我们能够专注于核心算法，而将繁琐的工作交给\
    \ Pillow。这就是一个优秀库的作用。\n\n## 设置\n\n我们从一些基本的导入、一些所需类型的定义、一个常量和一个辅助函数开始：\n\n```python\n\
    from enum import Enum\nfrom PIL import Image, ImageDraw\nfrom PIL import ImageChops,\
    \ ImageStat\nimport random\nfrom math import trunc\nfrom timeit import default_timer\
    \ as timer\nfrom Impressionist.svg import SVG\n\nColorMethod = Enum(\"ColorMethod\"\
    , \"RANDOM AVERAGE COMMON\")\nShapeType = Enum(\"ShapeType\", \"ELLIPSE TRIANGLE\
    \ QUADRILATERAL LINE\")\nCoordList = list[int]\nMAX_HEIGHT = 256\n\ndef get_most_common_color(image:\
    \ Image.Image) -> tuple[int, int, int]:\n    colors = image.getcolors(image.width\
    \ * image.height)\n    return max(colors, key=lambda item: item[0])[1]\n```\n\n\
    `ColorMethod` 枚举控制我们将如何计算区域中的颜色——即形状将用什么颜色填充。`ShapeType` 枚举设置我们将要绘制的形状。当前版本的程序在每幅画中只绘制一种类型的形状，但修改代码以启用多种类型的形状很容易。我将其留作练习。`CoordList`\
    \ 类型适用于定义一个形状的坐标。\n\n运行算法时，为了性能，我们需要处理有限数量的总像素。最简单的方法是，如果输入图像的高度超过 `MAX_HEIGHT`，则对其进行缩放。换句话说，`MAX_HEIGHT`\
    \ 是缩放后图像的最大高度。请注意，从技术上讲，我们也应该定义一个最大宽度，但实际上，图像的宽高比使得仅限制一个维度就足够的情况非常罕见（没有很多图像超级宽但高度很小）。为了简单起见，我们只定义了一个最大维度。\n\
    \n`get_most_common_color()` 方法找出图像中最常出现的颜色。它使用 Pillow 的 `getcolors()` 方法，该方法返回图像中所有颜色及其计数。然后，它使用\
    \ Python 内置的 `max()` 函数提取最频繁的颜色。\n\n`Impressionist` 类的构造函数负责设置算法特定运行的唯一参数、打开输入图像文件、缩放它、创建输出图像的初始背景、调用方法运行算法的实际迭代，以及调用方法输出最终文件。这听起来可能很多，但算法的核心在其他方法中。构造函数只是一个启动点，它调用\
    \ Pillow 库的方法和我们即将介绍的其他方法来完成实际工作。以下是构造函数的开始部分：\n\n```python\nclass Impressionist:\n\
    \    def __init__(self, file_name: str, output_file: str, trials: int, method:\
    \ ColorMethod,\n                 shape_type: ShapeType, length: int, vector: bool,\
    \ animation_length: int):\n        self.method = method\n        self.shape_type\
    \ = shape_type\n        self.shapes = []\n        # 打开图像文件并存储在实例变量中，执行算法\n   \
    \     with open(file_name, \"rb\") as fp:\n            self.original = Image.open(fp).convert('RGB')\n\
    \        # 缩小图像以加快处理速度，最大高度像素维度为 256\n        width, height = self.original.size\n\
    \        aspect_ratio = width / height\n        new_size = (int(MAX_HEIGHT * aspect_ratio),\
    \ MAX_HEIGHT)\n        self.original.thumbnail(new_size, Image.Resampling.LANCZOS)\n\
    ```\n\n构造函数首先设置一些参数并缩放输入图像。生成的画作应与原始图像具有相同的宽高比，因此保留了宽高比。Pillow 的 `thumbnail()`\
    \ 方法是进行缩放的便捷方式。\n\n以下是构造函数的下一部分：\n\n```python\n        # 以原始图像所有像素的平均颜色作为背景开始生成图像\n\
    \        average_color = tuple((round(n) for n in ImageStat.Stat(self.original).mean))\n\
    \        self.glass = Image.new(\"RGB\", new_size, average_color)\n```\n\nPillow\
    \ 的 `ImageStat` 模块可用于查找图像中的平均颜色。它查看图像中每个像素的 RGB 值，并分别对红色、绿色和蓝色分量求平均值。我们获取得到的平均颜色，并将其设置为算法工作图像（`self.glass`）的背景。换句话说，原始图像的平均颜色将是工作图像中每个像素的起始颜色。\n\
    \n> **注意** *工作图像的变量名为 `glass`，因为我最初将此程序命名为“彩色玻璃”。重新命名后，我仍然觉得变量名 `glass` 解释了这是一个提供原始图像过滤印象的表面。*\n\
    \n构造函数继续：\n\n```python\n        # 跟踪进度、我们目前的最佳结果以及处理过程中经过的时间\n        self.best_difference\
    \ = self.difference(self.glass)\n        last_percent = 0\n        start = timer()\n\
    \        for test in range(trials):\n            self.trial()\n            percent\
    \ = trunc(test / trials * 100)\n            if percent > last_percent:\n     \
    \           last_percent = percent\n                print(f\"{percent}% Done,\
    \ Best Difference {self.best_difference}\")\n        end = timer()\n        print(f\"\
    {end-start} seconds elapsed. {len(self.shapes)} shapes created.\")\n        self.create_output(output_file,\
    \ length, vector, animation_length)\n```\n\n算法的核心在 `trial()` 方法中，该方法尝试绘制一个形状，看看该形状是否能改善工作图像与原始图像之间的相似度得分。在这里，`trial()`\
    \ 被调用了 `trials` 次。随着试验的执行，我们跟踪进度"
