  md: "# The Instructions\n\nNext, we need to declare all the methods that bring the\
    \ 6502 instructions to life. As discussed, we have 56 unique methods to implement,\
    \ ranging alphabetically from ADC to TYA, handling tasks such as arithmetic, control\
    \ flow, and the like.\n\nAs with the CHIP-8 project, this is a good place for\
    \ you to stop and try to write some of the methods on your own before looking\
    \ at the implementations here. In order to do that, you’ll need a good 6502 instruction\
    \ reference. There are many available online, and the aforementioned https://nesdev.org\
    \ links to several. A good reference should include the following:\n\n+   - The\
    \ name of the instruction, including its common mnemonic\n- The opcode for various\
    \ forms of the instruction\n- The memory modes it supports\n- What flags, if any,\
    \ the instruction affects\n- How many cycles it takes\n- What register(s) it operates\
    \ on\n- An example of what it does\n\nIf you choose to implement the instructions\
    \ yourself, you’ll first want to look through the rest of the CPU class to see\
    \ what helper methods are available to you. There are methods for modifying the\
    \ stack, reading from memory, and writing to memory, and there are a couple other\
    \ utility methods as well. See “Memory Access” on page 170 and “Helper Methods”\
    \ on page 175 for these methods.\n\nYou’ll find that many of the instructions\
    \ are quite simple. For example, AND is exactly the logical AND operation you’d\
    \ expect. We take the accumulator (self.A), do a bitwise AND operation between\
    \ it and whatever we read from memory, and then store the result back in the accumulator:\n\
    \n```\ndef AND(self, instruction: Instruction, data: int):\n    src = self.read_memory(data,\
    \ instruction.mode)\n    self.A = self.A & src\n    self.setZN(self.A)\n```\n\n\
    Note how two things have been abstracted away. Reading from memory is done by\
    \ another method, self.read_memory(), which is passed the instruction’s memory\
    \ mode. We’ll come back to that method’s implementation later. Second, many different\
    \ instructions affect flags, so we have methods like self.setZN() to handle flag\
    \ changes. This is the classic don’t repeat yourself (DRY) principle.\n\nWhat\
    \ follows are implementations for all 56 needed methods. We’re writing in Python\
    \ what the 6502 would be doing in hardware, and it’s really not rocket science.\
    \ Python has operators for completing most tasks. The other skill set that helps\
    \ most with this sort of work is a strong understanding of bitwise operators,\
    \ as there are several places where the instruction explicitly asks for them or\
    \ we need to cut off a result to make sure it’s still"
