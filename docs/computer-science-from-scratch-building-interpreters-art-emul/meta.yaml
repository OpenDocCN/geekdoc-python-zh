  md: "# Table 3-6: Required MacBinary Header Fields\n\n| Offset | Length | Type |\
    \ Value |\n|---|---|---|---|\n| 1 | 1 | Integer | Filename length (up to 63) |\n\
    | 2 | 1 to 63 | MacRoman | Filename |\n| 65 | 4 | MacRoman | File type (should\
    \ be “PNTG”) |\n| 69 | 4 | MacRoman | File creator (should be “MPNT”) |\n| 83\
    \ | 4 | Integer | Data fork length |\n| 91 | 4 | Integer | Creation time as seconds\
    \ since 1/1/1904 |\n| 95 | 4 | Integer | Modification time as seconds since 1/1/1904\
    \ |\n\nNote that values are stored big-endian, since the classic Mac OS ran on\
    \ big-endian microprocessors. (If that doesn’t mean anything to you, see the “Big-Endian\
    \ vs. Little-Endian” box.) MacRoman is a character encoding used on the classic\
    \ Mac OS.⁸\n\nThe `macbinary_header()` function is a codification of Table 3-6:\n\
    \n```\ndef macbinary_header(outfile: str, data_size: int) -> array:\n    macbinary\
    \ = array('B', [0] * MACBINARY_LENGTH)\n    filename = Path(outfile).stem\n  \
    \  filename = filename[:63] if len(filename) > 63 else filename  # limit to 63\
    \ characters max\n    macbinary[1] = len(filename)  # filename length\n    macbinary[2:(2\
    \ + len(filename))] = array(\"B\", filename.encode(\"mac_roman\"))  # filename\n\
    \    macbinary[65:69] = array(\"B\", \"PNTG\".encode(\"mac_roman\"))  # file type\n\
    \    macbinary[69:73] = array(\"B\", \"MPNT\".encode(\"mac_roman\"))  # file creator\n\
    \    macbinary[83:87] = array(\"B\", data_size.to_bytes(4, byteorder='big')) \
    \ # size of data fork\n    timestamp = int((datetime.now() - datetime(1904, 1,\
    \ 1)).total_seconds())  # Mac timestamp\n    macbinary[91:95] = array(\"B\", timestamp.to_bytes(4,\
    \ byteorder='big'))  # creation stamp\n    macbinary[95:99] = array(\"B\", timestamp.to_bytes(4,\
    \ byteorder='big'))  # modification stamp\n    return macbinary\n```\n\nAny filenames\
    \ that are more than 63 characters simply have their ends chopped off.\n\n> ###\
    \ BIG-ENDIAN VS. LITTLE-ENDIAN\n\nWhat order should the bytes representing a piece\
    \ of data, such as a number, be stored in? This is a much-debated question, with\
    \ the computer science world split between two camps: big-endian and little-endian.\n\
    \nThink for a moment about how we represent numbers in everyday life. If you come\
    \ from a culture that uses the Arabic numeral system, like the English-speaking\
    \ world, you’re probably used to writing numbers from left to right starting with\
    \ the digit representing the largest part of the number\n\n*(continued)*"
  merge: -1
  pgno: 104
- img_proc: true
  md: 'and decreasing from there. For example, the number 450 starts with the 4 representing
    the hundreds place, then the 5 representing the tens place, and then the 0 representing
    the ones place. The 4 represents the largest part of the number (400) and comes
    first. The decision to put the 4 first was made a long time ago and is largely
    arbitrary. In theory, we could have a numeral system that writes 450 from smallest
    to largest as 054, but obviously we don''t.


    The number 450 requires 2 bytes to represent in binary: 00000001 and 11000010.
    If you know binary, you know that each 1 represents a single power of 2 that,
    added with the other “on” powers of 2, gives us the final number. The first byte,
    00000001, puts its lone 1 in the 2⁸ place and represents 256. The second byte,
    11000010, represents the number 194 because the 1s for 2¹ (2), 2⁶ (64), and 2⁷
    (128) are turned on, and 128 + 64 + 2 = 194. We have bytes for 256 and 194, and
    256 + 194 = 450.


    Since we write 450 from largest to smallest, you might assume that your computer
    would similarly store the byte representing the larger portion of 450 first, yielding
    0000000111000010 when the bytes are put together. This is known as *big-endian*
    order, but it''s not how most computers actually work nowadays. The typical modern
    computer is built with a microprocessor that uses one of two architectures: x86-64
    (Intel, AMD) or ARM64 (Apple, Qualcomm, and so on). For technical and historical
    reasons, those architectures store numbers in *little-endian* order, where the
    byte representing the smallest end of the number comes first. In a little-endian
    system, the 2-byte number 450 is stored as 1100001000000001. It''s important to
    know which system is at play, since interpreting the little-endian 1100001000000001
    as if it were in big-endian order would result in a completely different value.


    While little-endian order dominates today''s computer architectures, certain systems,
    such as those that run on the 68K microprocessor architecture (originally by Motorola)—including
    the original Macintosh—store their numbers in big-endian order. Yes, on the original
    Macintosh, 450 was stored “the right way” as 0000000111000010, but on the computer
    in front of you it''s probably stored as 1100001000000001. Further complicating
    matters, most data transmitted over the internet is sent in big-endian order.
    When you''re browsing the web on your x86-64 or ARM64 microprocessor, there''s
    endian conversion going on in the background.


    # Putting It All Together


    To write our MacPaint file bundled as a MacBinary file, we need to take our pixel
    array from `dither()` and:


    +   1. Call `prepare()` to convert it from bytes to bits and pad it with 0s.

    2. Call `run_length_encode()` to run-length encode the bit array.'
  merge: -1
  pgno: 105
- img_proc: true
  md: "+   3. Call `macbinary_header()` to combine the result with a MacBinary header.\n\
    4. Add a 512-byte MacPaint header as well.\n5. Pad the end result with 0s up to\
    \ a multiple of 128 bytes to follow the MacBinary specification requiring this.\n\
    \nThis is mostly just a matter of calling functions we already have:\n\n```\n\
    # Writes array *data* to *out_file*\ndef write_macpaint_file(data: array, out_file:\
    \ str, width: int, height: int):\n    bits_array = prepare(data, width, height)\n\
    \    rle = run_length_encode(bits_array)\n    data_size = len(rle) + HEADER_LENGTH\
    \  # header requires this\n    output = macbinary_header(out_file, data_size)\
    \ + array('B', [0] * HEADER_LENGTH) + rle\n    output[MACBINARY_LENGTH + 3] =\
    \ 2  # Data Fork Header Signature ❶\n    # MacBinary format requires that there\
    \ be padding of 0s up to a\n    # multiple of 128 bytes for the data fork\n  \
    \  padding = 128 - (data_size % 128)\n    if padding > 0:\n        output += array('B',\
    \ [0] * padding)\n    with open(out_file + \".bin\", \"wb\") as fp:\n        output.tofile(fp)\n\
    ```\n\nThe only part of this code we haven't yet discussed is the 512-byte MacPaint\
    \ header. MacPaint mostly used this header to store user-defined pattern data.\
    \ Programs that export to MacPaint don't generally have any user-defined patterns\
    \ since they're artifacts created by a user in MacPaint. We can therefore leave\
    \ the vast majority of the MacPaint header as 0s. The only thing we must do is\
    \ put a little signature into the MacPaint header at byte 3, which is always set\
    \ to 2 ❶.\n\n# The Results\n\nTo run the program, you need to specify both an\
    \ input file and an output file. For example:\n\n```\n% python3 -m RetroDither\
    \ -g /Users/dave/Downloads/IMG_0892.jpeg /Users/dave/Downloads/AmericanFlag\n\
    ```\n\nThe program adds the `.bin` extension for the output file automatically.\
    \ Figure 3-4 shows an image created using our program that I think has a nice\
    \ artistic quality to it."
