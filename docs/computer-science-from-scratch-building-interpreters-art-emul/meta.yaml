    # The Rise of Machine Learning


    Going back to the 1950s, traditional artificial intelligence (AI) research was
    chiefly concerned with utilizing algorithms to model human intelligence. Starting
    in the 1990s, however, and especially since the advent of neural networks backed
    by GPU computing in the 2000s, much of the focus of AI research and productization
    has turned to the subfield of machine learning, which uses large datasets to train
    models that can make decisions without needing to reference the human method of
    problem solving. To understand this shift, think of the difference between a chess
    program that evaluates a position based on well-understood heuristics from grandmasters
    and a chess program that evaluates a position based on auto-tuned weights assimilated
    from statistically analyzing millions of games. Indeed, machine learning is heavily
    based on statistics.


    All the exciting machine learning applications we''re familiar with, including
    LLMs, image recognition, and digital assistants, are built using sophisticated
    multilayer neural networks trained on GPUs or specialized neural processors. This
    is known as *deep learning*. To program a deep learning framework from scratch
    you would need a significant understanding of both calculus and statistics. Even
    if you dodge some of that by using a library, you still typically need a huge
    dataset, which is often hard to obtain, and powerful hardware.


    Because of these barriers, programmers interested in getting started with machine
    learning are sometimes intimidated. They''re afraid the math will be too hard
    or they''ll lack the resources needed to develop the application they''re interested
    in. What''s more, some learning programmers like to build their projects from
    the ground up; they don''t want to just `pip install` their way to a solution
    that offers them no understanding about how the underlying process actually works.


    As you''ll see in this chapter, however, machine learning can have a very approachable
    starting point if you don''t jump right into the deep learning deep end. You can
    program the KNN algorithm from scratch and use it to solve real problems, and
    you don''t need a background in mathematics beyond the middle school level to
    understand what you''re doing. The only statistical concept required to implement
    KNN is the idea of a mean (average), and the only other formula you''ll need is
    the Pythagorean theorem to find the Euclidean distance between two points. That''s
    not asking much, right?


    > NOTE: If you want to learn more about neural networks, you can check out Chapter
    7, "Fairly Simple Neural Networks," of my prior book *Classic Computer Science
    Problems in Python* (Manning, 2019).'
