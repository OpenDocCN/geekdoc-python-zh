- img_proc: true
  md: '# The CHIP-8 Virtual Machine


    The CHIP-8 VM was originally designed for the incredibly resource-constrained
    personal computers of the late 1970s, like the COSMAC VIP. Released in 1977, the
    COSMAC VIP had an RCA 1802 8-bit microprocessor running at less than 2 megahertz
    (MHz), 2KB of RAM (expandable to 4KB), and a 512-byte ROM. It also had specialized
    chips for displaying 1-bit graphics at a resolution of up to 64×128, reading and
    writing cassette tapes, and playing a beep.³


    It’s amazing by today’s standards that anything of value could have been programmed
    on a machine like the COSMAC VIP, yet it was designed for video games. In fact,
    those games even ran through another layer of abstraction, the CHIP-8 VM. The
    most popular video game console of the era, the Atari 2600, was also released
    in 1977 and had specifications that were in the same ballpark. These limitations
    were simply par for the course.


    When programming a VM or an emulator, the performance of the tools you’re using
    is a paramount concern. The VM or emulator adds another layer of abstraction between
    the program and the hardware, and each layer of abstraction generally comes with
    some performance cost. To achieve the intended speed of the original system, overhead
    has to be kept to a minimum, and some programming languages (or rather, some programming
    languages’ primary runtime implementations) get in the way. This is why it’s common
    to see VMs and emulators programmed in low-level languages like C, C++, and Rust.
    That said, considering how limited CHIP-8’s original target hardware was, it’s
    not difficult to create a performant CHIP-8 VM today on any modern system. Even
    a relatively slow programming language runtime like CPython is sufficient. You
    wouldn’t want to program a cutting-edge game console emulator in Python, or a
    JVM. But CHIP-8? Python is more than fine for that.


    To understand CHIP-8, let’s start by discussing its registers and memory layout.
    Then, I’ll provide a general overview of the instructions that the VM can execute,
    before getting into the nitty-gritty details of an implementation.


    # Registers and Memory


    On a physical microprocessor, *registers* are the absolute fastest memory available.
    They sit directly within the microprocessor and don’t require the latency of accessing
    another chip. Putting data in registers is often the only way to manipulate it,
    since most data manipulation instructions (for example, arithmetic) that a microprocessor
    supports operate on data within the registers. Separate load/store instructions
    transfer data between the registers and external RAM.


    When it comes to registers, there’s a classic time-versus-space trade-off: the
    registers are the fastest storage locations to hold data, but they’re extremely
    limited in size. For example, a typical 8-bit microprocessor of the late 1970s
    may only have had a few 8-bit registers (yes, each can only hold a single byte),
    but it could address dozens of kilobytes of external RAM.'
