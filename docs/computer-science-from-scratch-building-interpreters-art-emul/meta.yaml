    # Real-World Applications


    Each chapter in the book ends with some real-world applications, but unfortunately
    there are no real-world applications of Brainfuck. It’s a language of curiosity,
    useful for learning about some fundamental ideas in computer science. Perhaps,
    therefore, we could say the real-world application of Brainfuck is in education.


    Interpreters more broadly are critical computing infrastructure with many real-world
    applications. As you’re probably aware, Python itself is an interpreted language.
    There are many ways that programming languages go from text files to machine code,
    but we can broadly categorize most programming language implementations as interpreted,
    ahead-of-time compiled, or just-in-time compiled. Some programming languages even
    have implementations in all three categories. For example, there are Java interpreters,
    ahead-of-time Java compilers, and the most popular implementations of Java are
    just-in-time compiled.


    As a general rule, interpreted programming language implementations tend to be
    slower than compiled programming language implementations. You may wonder, then,
    why any programming languages that people use in the real world are implemented
    as interpreters. Take Python, for instance: Why is it implemented using an interpreter
    instead of a compiler? We all know Python is a relatively slow language, and surely
    it would be faster if it were compiled.'
