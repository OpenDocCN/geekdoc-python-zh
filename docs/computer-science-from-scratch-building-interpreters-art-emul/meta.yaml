    \ = self.difference(self.glass)\nlast_percent = 0\nstart = timer()\nfor test in\
    \ range(trials):\n    self.trial()\n    percent = trunc(test / trials * 100)\n\
    \    if percent > last_percent:\n        last_percent = percent\n        print(f\"\
    {percent}% Done, Best Difference {self.best_difference}\")\nend = timer()\nprint(f\"\
    {end-start} seconds elapsed. {len(self.shapes)} shapes created.\")\nself.create_output(output_file,\
    \ length, vector, animation_length)\n```\n\nThe heart of the algorithm is in the\
    \ trial() method, which tries drawing a shape to see if the shape improves on\
    \ the similarity score between the working image and the original image. Here,\
