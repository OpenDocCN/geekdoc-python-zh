    A *terminal* is something that will appear in the language in its literal form.
    It doesn''t get expanded any further. In our syntax, a terminal is wrapped in
    single quotes, like ''A''. Our syntax also uses | to mean *or*. An *or* means
    that there''s a selection of options to choose from for that part of the production.
    We use parentheses for grouping, and * signifies zero or more repetitions of something.


    With this in mind, we can read the three production rules shown earlier as indicating:


    +   1. An *expression* is zero or more of letters or numbers.

    2. A *letter* is A or B.

    3. A *number* is 1 or 2.


    We can use a grammar to check whether a particular string of text is valid syntax
    for a language by simply following its production rules. For instance, our grammar
    specifies that “AAA21B” is valid syntax but “AB123” is not. More than one grammar
    can specify the same language. The non-terminal names are largely arbitrary and
    should be chosen to make the most human sense. For example, there''s no reason
    that letters and numbers need to be separated in our grammar. We could simplify
    the grammar to be:


    ```

    <expression> ::= <character>*

    <character> ::= ''A'' | ''B'' | ''1'' | ''2''

    ```


    We could even eliminate the second production rule altogether:


    ```

    <expression> ::= (''A'' | ''B'' | ''1'' | ''2'')*

    ```


    We generally shouldn''t use unnecessary production rules, because they overcomplicate
    the grammar. However, if the additional non-terminal represents multiple possible
    terminals and it will be used again somewhere else in the grammar, it makes sense
    to give it its own production rule instead of duplicating a long list of terminals.
    This will become clearer as we work with larger grammars with richer structures.
    It''s analogous to programming, where it can be better style to have many small
    functions that we reuse rather than just a few large ones.


