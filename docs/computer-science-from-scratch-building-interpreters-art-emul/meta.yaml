  md: 'NanoBASIC is decidedly not a declarative programming language. It''s firmly
    in the imperative camp. It''s also definitely not object-oriented. But is it procedural?
    While it technically has a way of making a call to a subroutine with its GOSUB
    statement, which we''ll discuss shortly, there''s nothing resembling a modern
    function in the sense of having parameters and return values. That''s why I wrote
    we would "barely even call it procedural."


    Some versions of BASIC, like Tiny BASIC and NanoBASIC, not only have no sense
    of a function, they also have no loops or other modern control structures. Instead,
    all control is handled with GOTO and GOSUB, which trigger direct jumps to a specific
    line number of the program. These, coupled with if statements, are the only way
    to control a Tiny BASIC or NanoBASIC program. Early BASICs were famous for encouraging
    "spaghetti code" due to these explicit jumps from one part of a program to another
    and poor mechanisms for organization. This criticism is completely fair. Without
    functions or objects as organizing mechanisms, an imperative language invariably
    devolves into spaghetti code. Don''t be surprised to see some spaghetti as we
    start cooking up some NanoBASIC!


    Now, let''s get into NanoBASIC''s syntax and how its six statements work.


    # Comments and Line Numbers


    Comments in NanoBASIC start with the REM designation and can finish with any string.
    Comments won''t be processed at all by the interpreter.


    Every non-comment line in NanoBASIC begins with a line number and is followed
    by a statement. The programmer can pick any arbitrary line numbers, as long as
    they''re all in increasing order from the top of the source file to the bottom.
    For example, the following line numbers are valid:


    ```

    10 PRINT "Hello"

    REM This is a comment

    20 PRINT "Goodbye"

    30 PRINT "WOW"

    ```


    By contrast, these line numbers aren''t valid, and so the program''s behavior
    is undefined:


    ```

    10 PRINT "Hello"

    REM This is a comment

    40 PRINT "Goodbye"

    30 PRINT "WOW"

    ```


    Programs that have GOTO or GOSUB statements and out-of-order line numbers won''t
    function correctly.


    There are only six ways to start a statement in NanoBASIC: PRINT, IF, GOTO, GOSUB,
    RETURN, and LET. If you know these six statement types, you basically know the
    whole language. This is why you can learn NanoBASIC in just a few minutes if you
    already know another programming language.'
