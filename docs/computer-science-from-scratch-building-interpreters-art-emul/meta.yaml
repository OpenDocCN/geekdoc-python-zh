  md: "# VM Setup and Helper Functions\n\nWe're ready for the actual VM implementation.\
    \ We start, as we so often do, with some constants:\n\n```\nfrom array import\
    \ array\nfrom random import randint\nimport numpy as np\nimport pygame\nimport\
    \ sys\n\nRAM_SIZE = 4096  # in bytes, aka 4 kilobytes\nSCREEN_WIDTH = 64\nSCREEN_HEIGHT\
    \ = 32\nSPRITE_WIDTH = 8\nWHITE = 0xFFFFFFFF\nBLACK = 0\nTIMER_DELAY = 1/60  #\
