  md: '# # 1


    # ## THE SMALLEST POSSIBLE PROGRAMMING LANGUAGE


    ![](img/2b670944a6e236c13c5019fe56234a0a_26_0.png)


    What’s the smallest possible programming language that can still be used to solve
    real problems? Certainly, a candidate for that prize would be Brainfuck, an esoteric
    programming language developed by Urban Müller in 1993. In this chapter, we’ll
    develop a Brainfuck interpreter. Brainfuck is perhaps the easiest possible programming
    language to write an interpreter for—you’ll be amazed at how succinct ours is.
    By the end of the chapter, you’ll have learned not only how Brainfuck works but
    also the core tenets of any interpreter.'
