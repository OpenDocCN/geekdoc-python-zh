    # How KNN Regression Works


    In KNN classification, we tried to predict the class or category that a data point
    belongs to, selecting the appropriate class from a limited set of options. In
    KNN regression, instead of predicting a class, we’re trying to predict an attribute
    value. These attribute values will typically be numeric, meaning there’s potentially
    an infinite range of values that could be assigned. Of course, it would make sense
    for the attribute value to be missing if it’s something we want to predict.


    As an example, say we’re a hospital assigning patients to rooms. We may want to
    know how many days the patient will likely need to stay. We could look at past
    data from patients with similar diagnoses, symptoms, and vital signs to make the
    prediction. Let’s look at this example visually with a scatterplot along two dimensions
    (Figure 8-1).


    ![](img/2b670944a6e236c13c5019fe56234a0a_245_0.png)


    Figure 8-1: Hospital stay length for flu based on body temperature and illness
    severity


    Suppose the diamonds in Figure 8-1 represent past patients who were admitted to
    the hospital with flu. Their illness was rated by a doctor on a'
  - "[PAGE 246]\n\nseverity scale from 1 to 10, and their temperature was noted at\
    \ the time of admission. We also have data about how long they ended up staying\
    \ at the hospital.\n\nThe round dot represents a patient who was just admitted.\
    \ We have their severity rating and their body temperature, and we'd like to predict\
    \ how long they will end up staying in the hospital so that we can put them in\
    \ the appropriate room. If we use KNN with Euclidean distance and set $k$ to 3,\
    \ then we'll look at the three patients in the past data that are closest on the\
    \ scatterplot to the new patient's dot. The figure notes their stays as three,\
    \ four, and five days, respectively. Estimating the new patient's hospital stay\
    \ length using this method can be as simple as averaging the three nearest neighbors.\
    \ That average (whether mean or median) would be four, so we would predict that\
    \ the new patient will stay in the hospital for four days.\n\nMore broadly, here\
    \ are the steps for performing regression with KNN:\n\n+   1. Choose $k$, the\
    \ number of neighbors to compare to a data point with a missing attribute.\n2.\
    \ Find the $k$-nearest neighbors to the data point.\n3. Average the corresponding\
    \ attribute value across the $k$-nearest neighbors to predict what that missing\
    \ attribute value should be for the data point in question.\n\nAs you can see,\
    \ using KNN for regression is very similar to using KNN for classification. It's\
    \ really just the last step that differs. We have some of the same questions and\
    \ answers about this algorithm as we had in the prior chapter too: What's the\
    \ right value for $k$? How do we calculate distance? See Chapter 7 for a discussion\
    \ of those questions.\n\nWe also have a new question: What does it mean to take\
    \ the average? Typically this is either the mean or the median. Like with the\
    \ question of the right distance function, the best way to take the average can\
    \ be application specific. It generally requires some domain knowledge to make\
    \ the best determination.\n\n# Implementing Regression with KNN\n\nTo perform\
    \ regression, we'll need to add just two methods to our KNN class from Chapter\
    \ 7. One predicts a scalar numeric attribute, and one predicts an attribute that's\
    \ an array of numbers. We'll use the latter for the handwriting example so that\
    \ we can predict pixels. Here are the updates:\n\n```\n# KNN/knn.py\n# Predict\
    \ a numeric property of a data point based on the k-nearest neighbors.\n# Find\
    \ the average of that property from the neighbors and return it.\ndef predict(self,\
    \ k: int, data_point: DP, property_name: str) -> float:\n    neighbors = self.nearest(k,\
    \ data_point)\n    return (sum([getattr(neighbor, property_name) for neighbor\
    \ in neighbors])\n            / len(neighbors))\n```"
- md: "## Predicting Fish Weights\n\nLet's add a unit test to FishTestCase to make\
    \ sure our new predict() method is working. We want to answer the question, \"\
    If we know the dimensions of a fish, can we make an educated guess about what\
    \ its weight could be?\" The answer, of course, is yes:\n\n```python\ndef test_predict(self):\n\
    \    k: int = 5\n    fish_knn = KNN(Fish, self.data_file)\n    test_fish: Fish\
    \ = Fish(\"\", 0.0, 20.0, 23.5, 24.0, 10.0, 4.0)\n    predict_fish: float = fish_knn.predict(k,\
    \ test_fish, \"weight\")\n    self.assertEqual(predict_fish, 165.0)\n```\n\nIn\
    \ this method, we create a test_fish with no weight specified (0.0), and we compare\
    \ it to the five closest fish to it in terms of their anatomical dimensions—length1,\
    \ length2, length3, width, and height. (Recall from the preceding chapter that\
    \ we don't compare fish by weight in the distance() method.) We then predict its\
    \ weight by averaging the weights of these five nearest neighbors. Run the unit\
    \ tests again, and you should find that the fish's weight is correctly predicted.\
    \ To test if this prediction method is accurate more generally, we could try running\
    \ it across the entire fish dataset. Since the dataset includes the known weights\
    \ of each sample, we could measure how accurate our KNN results are compared to\
    \ the actual fish weights.\n\n## Predicting the Rest of a Handwritten Digit\n\n\
    In the preceding chapter, we correctly classified 98 percent of a test set of\
    \ images of handwritten digits against a training set of the same kind of 8×8\
    \ pixel images using KNN. In this final KNN example, we’ll classify an 8×8 digit\
    \ that the user draws and even predict what the rest of the pixels of the image\
    \ could look like. Instead of implementing this as another set of unit tests,\
    \ we’ll create a fun interactive program using Pygame that allows the user to\
    \ draw in a window housing an 8×8 grid.\n\nHere’s a preview of what we’re building.\
    \ Figure 8-2 shows the drawing window with a squiggly 7 that I tried to draw.\
    \ I pressed the C key and the program correctly classified it as a 7 (that shows\
    \ in the terminal, not pictured).\n\n![](img/2b670944a6e236c13c5019fe56234a0a_248_0.png)\n\
    \nFigure 8-2: Drawing a 7 in the digit recognizer program\n\nFigure 8-3 shows\
    \ the window after pressing the P key, which triggers a prediction of what the\
    \ rest of the digit’s pixels may look like based on the average of the pixels\
    \ of the nine nearest neighbors.\n\n![](img/2b670944a6e236c13c5019fe56234a0a_248_1.png)\n\
    \nFigure 8-3: The predicted digit’s pixels based on the nearest neighbors’ pixels\n\
    \nIn our simple program, we can only draw with white. The prediction yields a\
    \ better-looking 7 since it can use more levels of gray. We start our program\
    \ with some imports and constants:\n\n```python\nfrom KNN.knn import KNN\nfrom\
    \ KNN.digit import Digit\nfrom pathlib import Path\nimport sys\nimport pygame\n\
    import numpy as np\n\nPIXEL_WIDTH = 8\nPIXEL_HEIGHT = 8\nP_TO_D = 16 / 255  #\
    \ pixel to digit scale factor\nD_TO_P = 255 / 16  # digit to pixel scale factor\n\
    K = 9\nWHITE = (255, 255, 255)\n```\n\nThe PIXEL_WIDTH and PIXEL_HEIGHT constants\
    \ are the size of one image. The P_TO_D constant converts between the 255 shades\
    \ of gray in the pixel representation we'll work with and the 16 shades of gray\
    \ in the source dataset; D_TO_P is its inverse. We set K, the number of neighbors\
    \ KNN will consider, to 9, and WHITE is a constant for the white color in the\
    \ RGB pixel format.\n\nThis is a short program. We have just one central run()\
    \ function that spends as much time handling the user interface as it does running\
    \ KNN. Here's the start of the function:\n\n```python\ndef run():\n    # Create\
    \ a 2D array of pixels to represent the digit\n    digit_pixels = np.zeros((PIXEL_HEIGHT,\
    \ PIXEL_WIDTH, 3),\n                            dtype=np.uint32)\n    # Load the\
    \ training data\n    digits_file = (Path(__file__).resolve().parent\n        \
    \           / \"datasets\" / \"digits\" / \"digits.csv\")\n    digits_knn = KNN(Digit,\
    \ digits_file, has_header=False)\n    # Start up Pygame, create the window\n \
    \   pygame.init()\n    screen = pygame.display.set_mode(size=(PIXEL_WIDTH, PIXEL_HEIGHT),\n\
    \                                    flags=pygame.SCALED | pygame.RESIZABLE)\n\
    \    pygame.display.set_caption(\"Digit Recognizer\")\n```\n\nIn these first few\
    \ lines, we create the pixel array, load the dataset, and initialize Pygame. The\
    \ main window is initialized to be a \"stretched out\" 8×8 pixels. You can resize\
    \ the window and it will maintain its 8×8 dimensions. This is set via the set_mode()\
    \ flags (flags=pygame.SCALED | pygame.RESIZABLE).\n\nNext, we need to set up the\
    \ main loop:\n\n```python\nwhile True:\n    pygame.surfarray.blit_array(screen,\
    \ digit_pixels)\n    pygame.display.flip()\n```\n\nSince this a GUI program using\
    \ Pygame, we effectively have an event loop. It listens for some action by the\
    \ user and then responds. This action could be a keyboard or mouse event. To keep\
    \ the screen in sync, we constantly blit digit_pixels to the screen at the beginning\
    \ of the loop. Then, we handle keyboard events:\n\n```python\nfor event in pygame.event.get():\n\
    \    if event.type == pygame.KEYDOWN:\n        key_name = pygame.key.name(event.key)\n\
    \        if key_name == \"c\":  # classify the digit\n            pixels = digit_pixels.transpose((1,\
    \ 0, 2))[:, :, 0].flatten() * P_TO_D\n            classified_digit = digits_knn.classify(K,\
    \ Digit(\"\", pixels))\n            print(f\"Classified as {classified_digit}\"\
    )\n```\n\nWe start with the C key used for classification. This is similar to\
    \ the classification we did in the preceding chapter. The result is printed to\
    \ the console. The only tricky bit is the transformation of the pixels representing\
    \ the picture to a form that our classifier can use. In essence, we're moving\
    \ from a pixel format of 255 grays and multiple dimensions to a flat array of\
    \ 16 grays. The keyboard handler continues:\n\n```python\nelif key_name == \"\
    e\":  # erase the digit\n    digit_pixels.fill(0)\nelif key_name == \"p\":  #\
    \ predict what the digit should look like\n    pixels = digit_pixels.transpose((1,\
    \ 0, 2))[:, :, 0].flatten() * P_TO_D\n    predicted_pixels = digits_knn.predict_array(K,\
    \ Digit(\"\", pixels), \"pixels\")\n    predicted_pixels = predicted_pixels.reshape((\n\
    \        PIXEL_HEIGHT, PIXEL_WIDTH)).transpose((1, 0)) * D_TO_P\n    digit_pixels\
    \ = np.stack((predicted_pixels, predicted_pixels,\n                          \
    \   predicted_pixels), axis=2)\n```\n\nThe E key just erases the pixel array.\
    \ The P key is the prediction part. First, we again convert the pixel array to\
    \ a form the KNN class can use, as before. Next, we use the predict_array() method\
    \ to get the predicted _pixels, which are the average of the pixels from the nine\
    \ closest entries in our training set. We then convert those results back to a\
    \ form that can be displayed in Pygame. This involves not only reshaping to a\
    \ two-dimensional array but also changing to RGB format, where the same gray level\
    \ is repeated in each of the three color channels. The reshape() and transpose()\
    \ chains go from one to two dimensions, and the stack() call creates a third dimension\
    \ that's all the same value—for example, a gray level of 128 becomes (128, 128,\
    \ 128) for RGB."
