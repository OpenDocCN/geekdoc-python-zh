    ![](img/2b670944a6e236c13c5019fe56234a0a_260_0.png)


    Low-level manipulation of bits is essential for half of the projects in this book.
    If you have no background in bitwise operations, this appendix provides an overview,
    including what the most essential bitwise operations do, how to use them in Python,
    and some examples of what they’re used for.


    # A Review of Binary


    I assume that most readers, as intermediate or advanced programmers, are familiar
    with binary. If that’s you and you just want a quick refresher on bitwise operations,
    you can skip this section. However, if you’re not familiar with binary, this section
    will get you started, although it’s not comprehensive.

    All information in computers is stored as 1s and 0s. This is convenient because
    the type of hardware used to build computers can physically'
- md: 'represent 1s and 0s quite readily. For instance, if electricity (or a “signal”)
    is present, we may say that represents a 1, while the absence of an electrical
    signal represents a 0. Binary also manifests itself physically in the now outdated
    technology of CDs and DVDs. Their readers have a laser that runs over the surface
    of the disc. When the laser doesn’t reflect back because the disc has a microscopic
    pit, that represents a 0. If the laser does reflect back because there isn’t a
    pit, that represents a 1. One final physical example is QR codes. The presence
    of a black dot can be a 1, and the absence can be a 0. There are many convenient
    physical manifestations of binary.


    How are all those 1s and 0s converted into information? A sequence of 1s and 0s
    represents a number in binary. And once we have numbers, we can represent any
    other kind of information. A specific number can represent a specific letter in
    an electronic document. Or it can represent a specific color. Another number can
    represent where on the screen to place that color. Pretty soon we have pixels.


    How does a sequence of 1s and 0s represent a number beyond 1 or 0, though? That’s
    where the binary number system, also called *base 2*, comes into play.


    Typical numbers in everyday use are in *base 10*, known as *decimal*. That means
    each digit in the number can have 10 different values (0–9), and each digit itself
    represents a power of 10. For instance, the number 427 is actually (4×10²) + (2×10¹)
    + (7×10⁰). Likewise, each digit in a binary number can have two different values
    (0 or 1), and each digit itself represents a power of 2. The number 427 is 110101011
    in binary, which is (1×2⁸) + (1×2⁷) + (0×2⁶) + (1×2⁵) + (0×2⁴) + (1×2³) + (0×2²)
    + (1×2¹) + (1×2⁰). The 1s are powers of 2 that are “on” and the 0s are powers
    of 2 that are “off.”


    To test your understanding, try converting a few numbers from decimal to binary
    and vice versa. What’s 73 in binary? What’s 11000 in decimal? Try a few more that
    you pick. You can check your work with Python, where binary numbers are represented
    as literals by using the 0b prefix, as in 0b11 for the decimal number 3:


    ```

