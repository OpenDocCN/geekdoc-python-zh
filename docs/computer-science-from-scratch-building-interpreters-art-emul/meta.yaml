    self.original.thumbnail(new_size, Image.Resampling.LANCZOS)\n```\n\nThe constructor\
    \ starts by setting up some parameters and scaling the input image. The resulting\
    \ painting should have the same aspect ratio as the original image, so the aspect\
    \ ratio is preserved. Pillow's thumbnail() method is a convenient way to do scaling.\n\
    \nHere's the next part of the constructor:\n\n```\n# Start the generated image\
    \ with a background that is the\n# average of all the original's pixels in color\n\
    average_color = tuple((round(n) for n in ImageStat.Stat(self.original).mean))\n\
    self.glass = Image.new(\"RGB\", new_size, average_color)\n```\n\nThe Pillow ImageStat\
    \ module can be used for finding the average color in an image. It looks at the\
    \ RGB values of every pixel in the image and averages the red, green, and blue\
    \ components separately. We take the resulting average color and set it as the\
    \ background of our algorithm's working image (self.glass). In other words, the\
    \ average color of the original image will be the starting color of every pixel\
    \ in the working image.\n\n> **NOTE** *The variable for the working image is named\
    \ glass because I originally called this program Stained Glass. After retitling\
    \ it, I still feel that the name glass for the variable explains that this is\
    \ a surface that's providing a filtered impression of the original.*\n\nThe constructor\
