  md: "Next, we need to set up the main loop:\n\n```\nwhile True:\n    pygame.surfarray.blit_array(screen,\
    \ digit_pixels)\n    pygame.display.flip()\n```\n\nSince this a GUI program using\
    \ Pygame, we effectively have an event loop. It listens for some action by the\
    \ user and then responds. This action could be a keyboard or mouse event. To keep\
    \ the screen in sync, we constantly blit digit_pixels to the screen at the beginning\
    \ of the loop. Then, we handle keyboard events:\n\n```\nfor event in pygame.event.get():\n\
    \    if event.type == pygame.KEYDOWN:\n        key_name = pygame.key.name(event.key)\n\
    \        if key_name == \"c\":  # classify the digit\n            pixels = digit_pixels.transpose((1,\
    \ 0, 2))[:, :, 0].flatten() * P_TO_D\n            classified_digit = digits_knn.classify(K,\
    \ Digit(\"\", pixels))\n            print(f\"Classified as {classified_digit}\"\
    )\n```\n\nWe start with the C key used for classification. This is similar to\
    \ the classification we did in the preceding chapter. The result is printed to\
    \ the console. The only tricky bit is the transformation of the pixels representing\
    \ the picture to a form that our classifier can use. In essence, we're moving\
    \ from a pixel format of 255 grays and multiple dimensions to a flat array of\
    \ 16 grays. The keyboard handler continues:\n\n```\nelif key_name == \"e\":  #\
    \ erase the digit\n    digit_pixels.fill(0)\nelif key_name == \"p\":  # predict\
    \ what the digit should look like\n    pixels = digit_pixels.transpose((1, 0,\
    \ 2))[:, :, 0].flatten() * P_TO_D\n    predicted_pixels = digits_knn.predict_array(K,\
    \ Digit(\"\", pixels), \"pixels\")\n    predicted_pixels = predicted_pixels.reshape((\n\
    \        PIXEL_HEIGHT, PIXEL_WIDTH)).transpose((1, 0)) * D_TO_P\n    digit_pixels\
    \ = np.stack((predicted_pixels, predicted_pixels,\n                          \
    \   predicted_pixels), axis=2)\n```\n\nThe E key just erases the pixel array.\
    \ The P key is the prediction part. First, we again convert the pixel array to\
    \ a form the KNN class can use, as before. Next, we use the predict_array() method\
    \ to get the predicted _pixels, which are the average of the pixels from the nine\
    \ closest entries in our training set. We then convert those results back to a\
    \ form that can be displayed in Pygame. This involves not only reshaping to a\
    \ two-dimensional array but also changing to RGB format, where the same gray level\
    \ is repeated in each of the three color channels. The reshape() and transpose()\
    \ chains go from one to two dimensions, and the stack() call creates a third dimension\
    \ that's all the same value—for example, a gray level of 128 becomes (128, 128,\
    \ 128) for RGB."
