    # 2


    ## WRITING A BASIC INTERPRETER


    In Chapter 1, we built a simple interpreter for Brainfuck, a minimalist, esoteric
    language. But Brainfuck is just a toy; while we *could* solve real problems in
    Brainfuck, we wouldn’t actually *want* to. There are other programming languages
    that aren’t much more complex than Brainfuck yet are “real” in the sense that
    regular programmers actually use(d) them for their day-to-day work. In this chapter,
    we’ll build an interpreter for one such language, NanoBASIC, and we’ll learn more
    about how interpreters work in the process.


    While Brainfuck has just eight commands, NanoBASIC, a pared-down dialect of BASIC,
    has just six types of statements. To be fair, each of those statements has more
    functionality than a Brainfuck command, but it’s still not much. It’s just complex
    enough that it will enable us to explore several aspects of an interpreter that
    got mashed together in our Brainfuck implementation. In particular, we’ll write
    a separate tokenizer, parser, and runtime, whereas our Brainfuck interpreter handled
    all three tasks at once. We’ll use a scalable approach for each component, meaning
    what we do here could be expanded to work with larger languages.


    ## Understanding NanoBASIC


    With its simple syntax and ubiquitous presence, BASIC (Beginner’s All-purpose
    Symbolic Instruction Code) democratized the computing world and became the de
    facto standard language of the personal computer revolution. NanoBASIC is a version
    of the BASIC programming language that’s derived from a popular dialect for 1970s
    microcomputers known as Tiny BASIC. NanoBASIC is even simpler (or smaller, if
    you will) than Tiny BASIC, hence the Nano designation.


    NanoBASIC is almost completely the same as Tiny BASIC, but I’ve made a few changes:
    it’s missing a couple statements, and there are some minor differences regarding
    variable names and integer widths. As we discuss the language, you may wonder
    about some of its esoteric syntax or limitations. These quirks are intentional
    because NanoBASIC is meant to be largely compatible with Tiny BASIC. At the end
    of the chapter, you’ll be able to take actual Tiny BASIC programs you find online
    and run them in our NanoBASIC interpreter. Therefore, you’ll be implementing a
    language that was used in the real world.


    You can learn everything you need to know about NanoBASIC in just a few minutes.
    Do you remember how long it took you to learn Python? By the end of this section,
    you’ll be fully capable of writing a program in NanoBASIC.


    ## BASIC History


    BASIC was originally developed in 1964 by John Kemeny and Thomas Kurtz at Dartmouth
    College to make computers more accessible, including to students not pursuing
    science or math majors.¹ In fact, it was undergraduate students who built the
    first BASIC implementation alongside Kemeny and Kurtz. When the personal computer
    revolution got started in the mid-1970s, BASIC was a natural fit for the hobbyists
    and other “regular” people who bought the first machines. As a result, it became
    the most popular high-level programming language for personal computers from the
    mid-1970s to the mid-1980s. Common computers of the era, like the Commodore 64
    and the Apple II, came with built-in BASIC interpreters. BASIC was therefore the
    way that many people interacted with early personal computers. For example, BASIC
    was Linus Torvalds’s first programming language on the Commodore VIC-20 in 1981.²


    Interestingly, Microsoft got its start in 1975 when Bill Gates and Paul Allen
    developed a BASIC interpreter for one of the first personal computers, the Altair
    8800.³ Their company flourished when they ported their interpreter to other machines
    of the late 1970s. Microsoft BASIC was shipped with many personal computers, and
    it became the de facto standard dialect of BASIC. Eventually, Microsoft entered
    the operating system business in 1981 with DOS on the original IBM PC, but BASIC
    was the company''s start. Now you''ll be developing a BASIC interpreter too!


    Tiny BASIC, which NanoBASIC is a form of, in turn got its start because of Microsoft.
    Many of the people involved with the early development of Tiny BASIC were partially
    motivated by the high cost of Microsoft''s interpreters.⁴ Some of them further
    believed that people should be free to share software as they see fit. This was
    an early form of the Free Software Movement. Beyond skirting Microsoft''s high
    fees, the developers also wanted a language that would be small enough to fit
    within the extreme memory constraints of the microcomputers of the time (often
    just 4 kilobytes [KB]) and portable enough that programs could be run on multiple
    kinds of machines. Ultimately, Tiny BASIC was ported to a wide variety of different
    personal computers across multiple different microprocessor architectures and
    was widely used.


    ## NanoBASIC''s Paradigm, Syntax, and Semantics


    As you''ve read, BASIC was intended to be easy to use for nontechnical people,
    and many BASICs were designed to work in memory-constrained environments. Hence,
    BASICs tend to be stripped-down languages with relatively few features, even in
    comparison to other languages of the time. The dialect we''re developing, NanoBASIC,
    is imperative, but we''d barely even call it procedural. Let''s review what those
    terms mean.


    An *imperative* language is one in which you provide detailed instructions telling
    the computer how you want it to complete a task. This contrasts with *declarative*
    languages, which concentrate on "what" you want to do instead of "how" you want
    to do it. Say I wanted you to draw a square in the center of a piece of graph
    paper. The imperative way to do it would be to tell you: "Start at point (4, 4)
    and draw a line up five units. Then, draw a line to the right five units. Then,
    draw a line down five units. Then, draw a line to the left five units." The declarative
    way to do it would be to say, "Draw a 5×5 square in the middle of the paper."
    In a declarative world, I declare what I want and let you (or the computer) figure
    out the specifics of how to accomplish it.


    Modern imperative programming languages generally fall into two main sub-paradigms:
    procedural and object-oriented. *Procedural* programming languages use the subroutine/procedure/function
    (these terms are often, but not always, used interchangeably) as the main point
    of abstraction. Code is broken into multiple functions that each have a specific
    purpose and work in concert to form the whole program. *Object-oriented* programming
    uses objects as the main point of abstraction, and since you''re an intermediate
    or advanced Python programmer, I assume you know what that means. Of course, Python
    can be programmed in either style.


    > NOTE: The most popular declarative programming sub-paradigms are functional
    and logic programming. Getting into the details of those is beyond the scope of
    this chapter.'
  mdcn: '答案是，Python的许多运行时动态特性在解释器之外几乎不可能实现，或者至少会非常困难。虽然有一些尝试（例如PyPy），但它们要正确实现要困难得多。


    此外，解释器比编译器更容易实现，因为它们缺少编译器中负责生成机器代码的整个后端阶段。因此，许多语言最初都是作为解释器实现的，因为这是让实现快速启动和运行的最简单方式。例如，Java的第一个版本是解释型的，过了几年才出现即时编译版本。


    简而言之，解释器之所以存在，是因为它们比编译器更容易实现，并且能够支持某些强大的动态运行时特性。如果你正在考虑实现一种新的编程语言，尤其是动态语言，最简单的起点可能就是从解释器开始。


    ## 练习


    1.  编写一个Brainfuck到Python的转译器。*转译器*类似于编译器，但它不是将高级语言编写的源代码转换为机器代码，而是将一种高级语言的源代码转换为另一种高级语言。你可以重用Brainfuck解释器的大部分结构。你不必执行每条Brainfuck命令，而是可以将一些等效的Python代码输出到一个字符串列表中。你程序的最终输出应该是保存到文件中的等效Python代码。最棘手的部分将是弄清楚如何处理方括号。

    2.  为解释器添加一个调试模式，允许你逐条命令地单步执行Brainfuck程序。每条命令之后，向控制台输出一个表格，其中包含Brainfuck解释器的所有状态，类似于本章开头用于逐步执行“repeat”程序的表格。

    3.  编写一个Brainfuck程序，读取两个数字，比较它们，并输出较大的数字。在Python中编写一个测试，验证该程序能正确处理随机生成的数字。提示：你可能需要像我们在`run()`函数中为测试修改`sys.stdout`那样修改`sys.stdin`。


    ## 注释


    1.  “Brainfuck,” Esolangs.org, accessed May 22, 2024, https://esolangs.org/wiki/Brainfuck#Hello.2C_World.21.

    2.  Terrence W. Pratt and Marvin V. Zelkowitz, *Programming Languages: Design
    and Implementation*, 3rd ed. (Prentice Hall, 1996), 409.

    3.  Allen B. Tucker and Robert E. Noonan, *Programming Languages: Principles and
    Paradigms*, 1st ed. (McGraw-Hill, 2002), 84.

    4.  Urban Müller, “Brainfuck, or How I Learned to Change the Problem,” lecture
    at Tamedia TX 2017, Zurich, Switzerland, June 13, 2017, accessed June 10, 2022,
    YouTube, 3:50:11, https://youtu.be/gjm9rBs96U?t=8610.

    5.  “bf core,” Esolangs.org, accessed May 22, 2024, https://esolangs.org/wiki/Bf_core.


    # 2


    ## 编写一个基础解释器


    在第1章中，我们为Brainfuck这种极简的、深奥的语言构建了一个简单的解释器。但Brainfuck只是一个玩具；虽然我们*可以*用Brainfuck解决实际问题，但我们实际上并不*想*这样做。还有其他一些编程语言，它们并不比Brainfuck复杂多少，但在“真实”意义上，普通程序员确实使用它们来完成日常工作。在本章中，我们将为这样一种语言——NanoBASIC——构建一个解释器，并在此过程中了解更多关于解释器工作原理的知识。


    Brainfuck只有八条命令，而NanoBASIC作为一种精简的BASIC方言，只有六种语句类型。公平地说，每种语句的功能都比Brainfuck命令多，但仍然不算多。它的复杂程度刚好能让我们探索解释器的几个方面，而这些方面在我们的Brainfuck实现中是混在一起的。特别是，我们将编写一个独立的词法分析器、解析器和运行时，而我们的Brainfuck解释器同时处理了所有这三个任务。我们将对每个组件采用可扩展的方法，这意味着我们在这里所做的可以扩展到处理更大的语言。


    ## 理解NanoBASIC


    凭借其简单的语法和无处不在的存在，BASIC（初学者通用符号指令代码）使计算世界民主化，并成为个人计算机革命的事实标准语言。NanoBASIC是BASIC编程语言的一个版本，源自1970年代微型计算机上流行的一种方言，称为Tiny
    BASIC。NanoBASIC甚至比Tiny BASIC更简单（或者更小，如果你愿意的话），因此得名Nano。


    NanoBASIC与Tiny BASIC几乎完全相同，但我做了一些改动：它缺少几个语句，并且在变量名和整数宽度方面有一些细微差别。当我们讨论这门语言时，你可能会对其一些深奥的语法或限制感到疑惑。这些特性是有意为之的，因为NanoBASIC旨在与Tiny
    BASIC保持很大程度的兼容性。在本章结束时，你将能够获取网上找到的实际Tiny BASIC程序，并在我们的NanoBASIC解释器中运行它们。因此，你将实现一种在现实世界中使用过的语言。


    你只需几分钟就能了解关于NanoBASIC所需知道的一切。你还记得学习Python花了多长时间吗？在本节结束时，你将完全有能力用NanoBASIC编写程序。


    ## BASIC历史


    BASIC最初于1964年由达特茅斯学院的John Kemeny和Thomas Kurtz开发，旨在使计算机更易于访问，包括那些不攻读科学或数学专业的学生。¹
    事实上，是本科生与Kemeny和Kurtz一起构建了第一个BASIC实现。当个人计算机革命在1970年代中期开始时，BASIC非常适合那些购买第一台机器的爱好者和其他“普通人”。因此，从1970年代中期到1980年代中期，它成为个人计算机最受欢迎的高级编程语言。那个时代的常见计算机，如Commodore
    64和Apple II，都内置了BASIC解释器。因此，BASIC是许多人与早期个人计算机交互的方式。例如，BASIC是Linus Torvalds在1981年使用Commodore
    VIC-20时学习的第一门编程语言。²


    有趣的是，微软在1975年起步，当时Bill Gates和Paul Allen为最早的个人计算机之一Altair 8800开发了一个BASIC解释器。³ 当他们将解释器移植到1970年代末的其他机器上时，他们的公司蓬勃发展。Microsoft
    BASIC随许多个人计算机一起提供，并成为BASIC的事实标准方言。最终，微软在1981年凭借DOS进入了操作系统业务，运行在最初的IBM PC上，但BASIC是该公司的起点。现在你也将开发一个BASIC解释器！


    Tiny BASIC（NanoBASIC是其一种形式）的出现，反过来也是因为微软。许多参与Tiny BASIC早期开发的人，部分动机是由于微软解释器的高昂成本。⁴
    他们中的一些人进一步认为，人们应该可以自由地按照自己的意愿分享软件。这是自由软件运动的早期形式。除了规避微软的高额费用外，开发人员还希望一种语言足够小，能够适应当时微型计算机（通常只有4千字节[KB]）的极端内存限制，并且足够可移植，以便程序可以在多种机器上运行。最终，Tiny
    BASIC被移植到各种不同的个人计算机上，跨越多种不同的微处理器架构，并被广泛使用。


    ## NanoBASIC的范式、语法和语义


    正如你所读到的，BASIC旨在让非技术人员易于使用，并且许多BASIC被设计为在内存受限的环境中工作。因此，BASIC往往是功能相对较少的精简语言，即使与当时的其他语言相比也是如此。我们正在开发的方言NanoBASIC是命令式的，但我们甚至几乎不会称其为过程式的。让我们回顾一下这些术语的含义。


    *命令式*语言是你提供详细指令，告诉计算机你希望它如何完成任务的语言。这与*声明式*语言形成对比，后者专注于你“想要做什么”，而不是“如何去做”。假设我想让你在一张方格纸的中心画一个正方形。命令式的方法是告诉你：“从点(4,
    4)开始，向上画一条5个单位的线。然后，向右画一条5个单位的线。然后，向下画一条5个单位的线。然后，向左画一条5个单位的线。”声明式的方法则是说：“在纸的中间画一个5×5的正方形。”在声明式的世界里，我声明我想要什么，然后让你（或计算机）去弄清楚如何实现的具体细节。


    现代命令式编程语言通常分为两个主要子范式：过程式和面向对象。*过程式*编程语言使用子程序/过程/函数（这些术语通常，但并非总是，可以互换使用）作为主要的抽象点。代码被分解成多个函数，每个函数都有特定的目的，并协同工作形成整个程序。*面向对象*编程使用对象作为主要的抽象点，既然你是一个中级或高级Python程序员，我假设你知道这意味着什么。当然，Python可以用这两种风格进行编程。


    > 注意：最受欢迎的声明式编程子范式是函数式和逻辑编程。深入探讨这些内容超出了本章的范围。'
