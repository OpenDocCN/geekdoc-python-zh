    \n> **代码遇见生活**\n\n我很久以前就听说过 Brainfuck，当时只是觉得它是个新奇事物，但在 2018 年，当我准备在尚普兰学院教授一门名为“新兴语言”的课程时，我开始对它产生了真正的兴趣。这是一门编程语言理论课程，但有一个特别之处：我们使用在\
    \ 2018 年刚刚开始在行业中变得相关的语言——即 Go、Swift 和 Clojure——来阐述编程思想。\n\n我和一位名叫 Josh Auerbach\
    \ 的同事一起开发了这门课程。我负责课程的 Go 和 Swift 部分，Josh 负责 Clojure 部分。\n\n我们都喜欢布置一个 Brainfuck\
    \ 作业的想法，因为它是一个很好的教育工具，可以帮助理解一个简单的解释器是如何工作的。Josh 想到了利用 Brainfuck 作业的一部分来教授 Clojure\
    \ 宏。我们使用 Clojure 宏来阐明 Lisp（Clojure 是 Lisp 的一种方言）中的 *同像性* 概念——即“代码即数据”的概念。在 Clojure\
    \ 宏中，你可以在代码运行之前操作它，将其视为 Clojure 程序中的任何其他数据。学生们在 Josh 的作业中开发的宏允许直接在 Clojure 中编写\
    \ Brainfuck 代码，并使其像原生代码一样执行。你可以在 Clojure 程序的中间直接编写类似这样的内容：\n\n`(bf +++++++.+++.,>,<.+++,------.,--------.,>+,>++.)`\n\
    \n我在教授这门课程时仍然使用这个作业（Josh 已经离开了学术界），但我承认有时我很难记住编写 Clojure 宏的语法。编写 Brainfuck 解释器甚至比编写宏更容易。这就是为什么\
    \ Brainfuck 是教育工作者的一个好工具。\n\n## 现实世界应用\n\n本书的每一章都以一些现实世界应用结尾，但不幸的是，Brainfuck 没有现实世界应用。它是一种出于好奇而设计的语言，对于学习计算机科学的一些基本思想很有用。因此，也许我们可以说\
    \ Brainfuck 的现实世界应用在于教育。\n\n更广泛地说，解释器是关键的计算基础设施，具有许多现实世界应用。正如你可能知道的，Python 本身就是一个解释型语言。编程语言从文本文件到机器代码的方式有很多种，但我们可以将大多数编程语言实现大致分为解释型、预编译型或即时编译型。一些编程语言甚至同时拥有这三种类型的实现。例如，有\
    \ Java 解释器、Java 预编译器，而最流行的 Java 实现是即时编译的。\n\n一般来说，解释型编程语言实现往往比编译型编程语言实现慢。那么你可能会问，为什么现实世界中人们使用的任何编程语言会以解释器的形式实现？以\
    \ Python 为例：为什么它使用解释器而不是编译器来实现？我们都知道 Python 是一种相对较慢的语言，如果它被编译，肯定会更快。"
