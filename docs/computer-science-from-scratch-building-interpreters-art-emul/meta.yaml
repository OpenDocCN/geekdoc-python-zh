  md: "```\n# Graphics buffer for the screen - 64 x 32 pixels\nself.display_buffer\
    \ = np.zeros((SCREEN_WIDTH, SCREEN_HEIGHT),\n                              dtype=np.uint32)\n\
    self.needs_redraw = False\n# Timers - really simple registers that count down\
    \ to 0 at 60 hertz\nself.delay_timer = 0\nself.sound_timer = 0\n# These hold the\
    \ status of whether the keys are down\n# CHIP-8 has 16 keys\nself.keys = [False]\
    \ * 16\n```\n\nA few of these state variables have important default values. For\
    \ example, the program counter (pc) should always be set to location 0x200 (512\
    \ in decimal) since the first 512 bytes of memory in CHIP-8 machines were originally\
    \ used for storing the CHIP-8 VM itself. This means CHIP-8 programs couldn't use\
    \ that memory and had to start at byte 512. I've extensively commented the constructor\
    \ to explain each variable as it's declared. Notice that the vast majority of\
    \ our VM just uses the Python standard library for its implementation, except\
    \ for display_buffer, which is a NumPy array. This is the format that Pygame expects.\n\
    \nNext, we have a trivial helper method, decrement_timers(), and a simple dynamic\
    \ property, play_sound:\n\n```\ndef decrement_timers(self):\n    if self.delay_timer\
    \ > 0:\n        self.delay_timer -= 1\n    if self.sound_timer > 0:\n        self.sound_timer\
    \ -= 1\n\n@property\ndef play_sound(self) -> bool:\n    return self.sound_timer\
    \ > 0\n```\n\nBoth decrement_timers() and play_sound were used in the run loop\
    \ we looked at earlier in __main__.py.\n\n# Graphics\n\nCHIP-8 sees the screen\
    \ as a 64×32 pixel plane with a cartesian coordinate system having the origin,\
    \ location (0,0), in the top left, and the y-axis oriented downward. In other\
    \ words, the x-coordinate increases as we travel from left to right and the y-coordinate\
    \ increases as we travel from top to bottom. The bottom-right pixel is therefore\
    \ at location (63,31). There are no negative coordinates, and it isn't possible\
    \ to access pixel locations beyond the screen.\n\nEach pixel is represented in\
    \ memory as a single bit. In our implementation, a 1 represents a white pixel\
    \ and a 0 represents a black pixel. The graphics memory (or “buffer”) is separate\
    \ from the main program memory and can only be manipulated indirectly using CHIP-8\
    \ instructions. Pygame uses 32-bit integers to represent pixels on the screen\
    \ in RGBA format"
