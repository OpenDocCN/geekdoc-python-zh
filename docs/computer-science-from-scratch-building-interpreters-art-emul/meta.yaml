    Our Brainfuck interpreter accepts only integers as input. These integers can correspond
    to ASCII character codes, and 88 is the ASCII character code for X. Therefore,
    the expected output is 10 Xs. After you complete the chapter, you’ll be able to
    run the program yourself, as well as any other Brainfuck program.


    # The Structure of an Interpreter


    Interpreters generally have at least three parts:


    +   - A *tokenizer* (sometimes known as a *lexer*) that takes the original source
    code and divides it into the smallest recognizable constructs allowed in the programming
    language. These are known as *tokens*. For the code a + 2, the tokens may be a,
    +, and 2.

    - A *parser* that takes tokens that are next to each other and figures out their
    meaning (that is, the expressions or statements they form). Parsers typically
    produce a tree of nodes representing the relative relationships between expressions,
    statements, and literal values. This tree is called the *abstract syntax tree
    (AST)*. For example, if a Python interpreter saw the token a followed by the token
    + followed by the token 2, it may construct an arithmetic expression node and
    connect it to nodes for the a and the 2.

    - A *runtime environment* that walks through the nodes of the AST and runs the
    appropriate operations to execute the meaning inherent in them. For our a + 2
    arithmetic expression node, this would mean looking up the value represented by
    a and adding 2 to it.


    The beautiful thing about Brainfuck is that every statement is just a single symbol,
    so all we need to do to get a token is just read a single character from the source
    file. And each of those tokens on its own already represents a node of meaning.
    That makes writing an interpreter for Brainfuck easier than writing one for almost
    any other programming language. We can combine the tokenizer, the parser, and
    the runtime into a single loop that merges the three concepts together.'
