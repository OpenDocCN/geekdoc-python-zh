  md: "character is specified by bits representing the pixels of the character should\
    \ it be shown on the screen. Think of it as a primitive font that only has 16\
    \ characters. Several games expect this data to live in the first 80 bytes of\
    \ memory so that they can write messages on the screen to the user.\n\nNext, we\
    \ have a helper function unrelated to the state of the VM:\n\n```\ndef concat_nibbles(*args:\
    \ int) -> int:\n    result = 0\n    for arg in args:\n        result = (result\
    \ << 4) | arg\n    return result\n```\n\nThe `concat_nibbles()` function takes\
    \ an arbitrary number of integers and concatenates one after another by shifting\
    \ each 4 bits to the left and bitwise OR-ing it with the next one. This will only\
    \ be useful if the integers themselves are 4 bits. Suppose we have the integer\
    \ 0111. Shifting it 4 bits to the left will cause four zeros to follow the original\
    \ 4 bits, as in 01110000. Now suppose we have another 4-bit integer, 1010. If\
    \ we OR it with 01110000, we obtain the result 01111010, the concatenation of\
    \ the original two 4-bit integers. We can keep doing this for an arbitrary number\
    \ of 4-bit integers to concatenate them together.\n\nRecall that a 4-bit integer\
    \ is known as a *nibble*. The 16-bit instructions in CHIP-8 are divided into four\
    \ nibbles, and each nibble often has a separate meaning. By default, we'll divide\
    \ each instruction into its four constituent nibbles, but for a few instructions,\
    \ we'll need to use the value of a few combined nibbles. Hence, the utility of\
    \ the `concat_nibbles()` helper function.\n\nThe VM class starts with a constructor\
    \ that initializes all of its mutable state including registers, RAM, the stack,\
    \ the display buffer (what today we would call VRAM or video RAM), the timers,\
    \ and a couple other helper variables:\n\n```\nclass VM:\n    def __init__(self,\
    \ program_data: bytes):\n        # Initialized registers and memory constructs\n\
    \        # General Purpose Registers - CHIP-8 has 16 of these registers\n    \
    \    self.v = array('B', [0] * 16)\n        # Index Register\n        self.i =\
    \ 0\n        # Program Counter\n        # Starts at 0x200 because addresses below\
    \ that were\n        # used for the VM itself in the original CHIP-8 machines\n\
    \        self.pc = 0x200\n        # Memory - the standard 4k on the original CHIP-8\
    \ machines\n        self.ram = array('B', [0] * RAM_SIZE)\n        # Load the\
    \ font set into the first 80 bytes\n        self.ram[0:len(FONT_SET)] = array('B',\
    \ FONT_SET)\n        # Copy program into RAM starting at byte 512 by convention\n\
    \        self.ram[512:(512 + len(program_data))] = array('B', program_data)\n\
    \        # Stack - in real hardware this is typically limited to\n        # 12\
    \ or 16 PC addresses for jumps, but since we're on modern hardware,\n        #\
    \ ours can just be unlimited and expand/contract as needed\n        self.stack\
    \ = []\n```"
