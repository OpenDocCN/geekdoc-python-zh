    \ open(file_path, 'r') as f:\n            reader = csv.reader(f)\n           \
    \ if has_header:\n                _ = next(reader)\n            for row in reader:\n\
    \                self.data_points.append(\n                    self.data_point_type.from_string_data(row))\n\
    ```\n\nThe type hint syntax class KNN[DP: DataPoint]: says that a generic type,\
    \ DP, is associated with KNN and that a DP must be a subclass of DataPoint. We'll\
    \ be loading all our datasets from CSV files. Our KNN class's _read_csv() method\
    \ utilizes the built-in Python csv module to load these files. Each line in the\
    \ CSV file is used to initialize one of our DataPoint subclasses via its from_string_data()\
    \ class method. We'll come back to the specifics of CSV files in a bit when we\
    \ look at our first dataset.\n\nNow that we have a dataset loaded in the KNN class,\
    \ we're ready to implement the actual KNN algorithm. Where do we start? Given\
