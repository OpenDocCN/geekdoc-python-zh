    \ `Counter` 的随机性。再次记住本部分的标题。\n\n就是这样。得益于一些优秀的 Python 标准库例程，KNN 背后的实际算法工作实际上只是\
    \ `nearest()` 和 `classify()` 之间的三行代码。我告诉过你它会是“超简单”的。算法就位后，现在让我们将 KNN 应用于两个分类问题。\n\
    \n## 鱼类分类\n\n假设你是一家为钓鱼者制造寻鱼设备的公司的程序员。该设备由一根杆子末端的摄像头组成，杆子在船下移动。它内置了图像识别功能，因此当一条鱼经过水下摄像头时，它可以自动拍摄照片并识别照片中包含鱼的矩形区域。它还可以估计照片中鱼的尺寸。你的任务是在这个图像识别系统之上编写一层软件，告诉钓鱼者这是什么类型的鱼。毕竟，并非所有的鱼都是合法捕捞的。\n\
    \n幸运的是，我们有一个公共领域的数据集可以帮助我们完成这个鱼类分类任务。它最初来自 1917 年 Pekka Brofeldt 的一篇芬兰论文，英文名为“Contribution\
    \ to the Knowledge of Fish Stocks in Dangerous Lakes”。^3 它包含了一个湖泊中 159 条鱼的尺寸和重量，按物种分类（因此我们的程序可能只在那个湖泊中有效）。图\
    \ 7-2 显示了我们数据集中的鱼，仅按高度和宽度两个维度展示。\n\n![](img/2b670944a6e236c13c5019fe56234a0a_235_0.png)\n\
    \n正如你可能预料的那样，相似物种的鱼在高度和宽度方面往往靠得很近。这是一个很好的指标，表明 KNN 可能是解决这个问题的有用算法。\n\n让我们看看原始数据是什么样子。以下是\
