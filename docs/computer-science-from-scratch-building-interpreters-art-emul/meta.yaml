    \ :--- | :--- |\n| A | 1 | The main register used for arithmetic operations. Sometimes\
    \ known as the *accumulator*. |\n| X | 1 | An *index register*, often used as\
    \ a loop counter. It can also be used as a general-purpose register, although\
    \ not all instructions work with it as they do with A. |\n| Y | 1 | The same as\
    \ X. |\n| PC | 2 | The *program counter*, which keeps track of where in memory\
    \ the next instruction to execute resides. It’s 2 bytes because the 6502 can address\
    \ up to 64KB of memory (without bank switching). |\n| SP | 1 | The *stack pointer*,\
    \ which keeps track of where on the stack the program currently is. Since it’s\
    \ only 1 byte, the stack can hold a maximum of 256 bytes. |\n| P | 1 | The *status*\
    \ or *flags* register. Its individual bits indicate different things, such as\
    \ something about an arithmetic operation (is the result zero, for example?) or\
    \ whether a break happened or the interrupt is enabled (IRQ). |\n\nSince Python\
    \ has only a single type for all integers regardless of size, we represent all\
    \ of these registers except the flags with the int type. Instead of fiddling with\
    \ the individual bits for each of the flags in the status register, we divide\
    \ them into separate Booleans using the lettered nomenclature common in 6502 documentation.\
    \ These are the C, Z, I, D, B, V, and N member variables. Most of them are set\
    \ as a result of arithmetic operations, I is set when a program wants to not be\
    \ interrupted by an IRQ signal, and B is set when flags are pushed to the stack\
    \ after a break instruction. The D flag, used for BCD code, isn’t relevant to\
    \ the NES, since the NES doesn’t have BCD instructions.\n\nThe jumped variable\
    \ keeps track of whether a jump instruction altered the PC register, and page_crossed\
