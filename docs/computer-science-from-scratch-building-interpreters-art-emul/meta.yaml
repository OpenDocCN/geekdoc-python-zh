  md: 'language services like garbage collection, multithreading, and security mechanisms.
    Finally, when a VM like the CLR just-in-time (JIT) compiles intermediate code
    into machine code, it will apply optimizations that the language author doesn''t
    need to think about.


    Beyond abstract machines utilized as language runtimes, the term *virtual machine*
    is also confusingly used to refer to a whole hardware implementation in software—in
    other words, an emulator. Building an emulator is the subject of the next chapter.


