  md: 'character? In other words, *B* would likely be stored in memory using its ASCII/Unicode
    code, 66. Our program would likely interpret it as indicating 66 of the next character,
    not a single letter *B*.


    We could instead have a scheme where every character is preceded by a number,
    even single characters. This would change the encoded string to *6A1B5C1A4B*.
    That''s 10 bytes, a 7-byte savings over the original, which is significant.


    This encoding scheme is a form of run-length encoding, but it breaks down pretty
    quickly: for many strings, it''s actually less efficient than just storing the
    raw characters. For example, the string *ABC* would be *1A1B1C*. That''s double
    the size.


    There''s a compromise. You can have an encoding scheme where each number indicates
    either a repetition or a certain number of literal characters. Then, *ABC* becomes
    *3ABC*. That''s still longer, but this new scheme may be a good compromise for
    more complex cases. For instance, the string *AAAAAABCBCAAAAAA* would be *5A4BCBC6A*.


    This version is close to the encoding scheme the MacPaint file format uses, but
    there''s still a problem: How would you know that the 5 means five *A*s, but the
    4 means a literal sequence of four characters (*BCBC*) rather than four *B*s?
    You may say, "Well, you could read ahead two characters and see that *C* isn''t
    a number, so the 4 couldn''t mean four *B*s," but even that doesn''t work, because
    (again) in computer memory, the *C* is stored as a number. We need another improvement.


    MacPaint eliminates the ambiguity between numbers that indicate literal runs and
    numbers that indicate repetition runs by representing both using signed 1-byte
    integers. A number *n* between 0 and 127 indicates *n* + 1 literal bytes follow.
    A number *n* between -1 and -127 indicates 1 - *n* repetitions of the following
    byte. The number -128 isn''t used. This compression scheme is known as *PackBits*,⁵
    and it was used beyond just MacPaint in several other popular file formats.


    A PackBits function was actually built into classic versions of Mac OS. According
    to Apple''s own technical note on the subject, "typical MacPaint documents compress
    to about 10K" with PackBits.⁶ Table 3-3 summarizes the PackBits encoding scheme.


