    > box in Chapter 1). And that experience led me to this chapter. NanoBASIC is
    very simple, but it’s real, and once you’ve built something real, you’re not that
    far from building something interesting. In the end, the perspective I gained
    from all of these experiences, including the painful compilers class, made me
    the right person to write this chapter. Now that you’ve read it, hopefully you
    don’t have to struggle the same way I did in that class.


    # Real-World Applications


    As previously discussed in “BASIC History” on page 22, BASIC was the standard
    language of the personal computing revolution. Millions of programmers got their
    start writing BASIC, and Tiny BASIC was a real and widely used dialect of BASIC.
    Some of the progenitors of Tiny BASIC pioneered the Free Software movement. Thanks
    to their open licensing, Tiny BASIC was ported to a wide variety of platforms
    where its simplicity was actually an advantage. It ran on machines with so little
    memory that they couldn’t run languages much more sophisticated than Tiny BASIC.


    It may not seem like much, but for an early personal computer user with no other
    alternatives (due to cost or availability) and limited memory, Tiny BASIC was
    a huge improvement over having to write machine code. Because it was freely licensed
    and ported to so many platforms, it also offered a kind of portability for programs
    written in it. If a machine could run Tiny BASIC, then it could run your program.


    Tiny BASIC is still in use today. Like Brainfuck, it serves as an educational
    tool, but it’s also being used for more than that. As of this writing, a German
    company ships microcontrollers running a version of Tiny BASIC.¹⁶


    The interpreters you’ll find running modern popular programming languages are
    much more sophisticated than the one we built in this chapter, yet they have the
    same essential building blocks—a tokenizer, a parser, an intermediate representation
    like an AST, and a runtime environment. The added sophistication is generally
    there to support additional features or performance, but the relatively simple
    techniques from this chapter are sufficient to build a working prototype of a
    new language or even a production-ready domain-specific language (DSL) for your
    work. Generally, DSLs don’t require high performance.


    Many successful real-world programming languages start out with quite simple implementations
    and evolve over time. For example, Ruby was originally an AST-walking interpreter
    like NanoBASIC. Ruby later compiled to bytecode that executes on a virtual machine
    (more about virtual machines in Chapter 5), and more recent versions of Ruby have
    incorporated a just-in-time (JIT) compiler.


    Whether a language implementation walks an AST, uses bytecode, or has a JIT compiler,
    it needs the principles we covered in this chapter.'
