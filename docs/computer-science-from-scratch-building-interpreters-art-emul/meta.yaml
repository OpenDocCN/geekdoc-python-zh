- img_proc: true
  md: "```\n# Predict a NumPy array property of a data point based on the k-nearest\
    \ neighbors.\n# Find the average of that property from the neighbors and return\
    \ it.\ndef predict_array(self, k: int, data_point: DP, property_name: str) ->\
    \ np.ndarray:\n    neighbors = self.nearest(k, data_point)\n    return (np.sum([getattr(neighbor,\
    \ property_name) for neighbor in neighbors], axis=0)\n            / len(neighbors))\n\
    ```\n\nLike classify() from the preceding chapter, these methods start by finding\
    \ the k nearest neighbors. Then, they calculate and return the mean of some property\
    \ among those neighbors. We take advantage of the dynamic nature of Python here\
    \ by allowing the caller to specify the property as a string and then using getattr()\
    \ to retrieve that specified property (or *attribute*) by name.\n\nThe only real\
    \ difference here between predict() and predict_array() is that the latter uses\
    \ the NumPy sum() function instead of Python's built-in sum() function. NumPy\
    \ arrays will actually work with the built-in sum() function too since they implement\
    \ the plus operator, but NumPy's version is a bit faster.\n\nThat's it. Essentially\
    \ it takes just two more lines of code (both functions are about the same) and\
