    \ 表示黑色，0 表示白色。这一切听起来都很直接。然而，有一个特殊之处：与几乎所有其他操作系统不同，经典 Mac 操作系统将文件存储在两个“分支”中。我们稍后会深入探讨这一点，但简而言之，在经典\
