    \ ^ 0 | 1 ^ 1 |\n| :---: | :---: | :---: | :---: |\n|   0   |   1   |   1   |\
    \   0   |\n\nThe CHIP-8 draw instruction takes a sprite and XORs its pixels with\
    \ the pixels already on the screen at the location specified. If this screen location\
