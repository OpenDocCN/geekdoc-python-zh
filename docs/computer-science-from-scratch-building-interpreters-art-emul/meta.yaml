  md: "8 bits so that it fits in the register. We cover how these bitwise operators\
    \ work in the appendix.\n\n```\n# Add memory to accumulator with carry\ndef ADC(self,\
    \ instruction: Instruction, data: int):\n    src = self.read_memory(data, instruction.mode)\n\
    \    signed_result = src + self.A + self.C\n    self.V = bool(~(self.A ^ src)\
    \ & (self.A ^ signed_result) & 0x80)\n    self.A = (self.A + src + self.C) % 256\n\
    \    self.C = signed_result > 0xFF\n    self.setZN(self.A)\n\n# Bitwise AND with\
    \ accumulator\ndef AND(self, instruction: Instruction, data: int):\n    src =\
    \ self.read_memory(data, instruction.mode)\n    self.A = self.A & src\n    self.setZN(self.A)\n\
    \n# Arithmetic shift left\ndef ASL(self, instruction: Instruction, data: int):\n\
    \    src = self.A if instruction.mode == MemMode.ACCUMULATOR else (\n        self.read_memory(data,\
    \ instruction.mode))\n    self.C = bool(src >> 7)  # carry is set to 7th bit\n\
    \    src = (src << 1) & 0xFF\n    self.setZN(src)\n    if instruction.mode ==\
    \ MemMode.ACCUMULATOR:\n        self.A = src\n    else:\n        self.write_memory(data,\
    \ instruction.mode, src)\n\n# Branch if carry clear\ndef BCC(self, instruction:\
    \ Instruction, data: int):\n    if not self.C:\n        self.PC = self.address_for_mode(data,\
    \ instruction.mode)\n        self.jumped = True\n\n# Branch if carry set\ndef\
    \ BCS(self, instruction: Instruction, data: int):\n    if self.C:\n        self.PC\
    \ = self.address_for_mode(data, instruction.mode)\n        self.jumped = True\n\
    \n# Branch on result zero\ndef BEQ(self, instruction: Instruction, data: int):\n\
    \    if self.Z:\n        self.PC = self.address_for_mode(data, instruction.mode)\n\
    \        self.jumped = True\n\n# Bit test bits in memory with accumulator\ndef\
    \ BIT(self, instruction: Instruction, data: int):\n    src = self.read_memory(data,\
    \ instruction.mode)\n    self.V = bool((src >> 6) & 1)\n    self.Z = ((src & self.A)\
    \ == 0)\n    self.N = ((src >> 7) == 1)\n```"
