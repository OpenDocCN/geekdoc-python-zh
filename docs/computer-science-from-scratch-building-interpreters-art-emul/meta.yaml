  md: "Our dithering code begins by defining some constants:\n\n```\nfrom PIL import\
    \ Image\nfrom array import array\nfrom typing import NamedTuple\n\nTHRESHOLD =\
    \ 127\n\nclass PatternPart(NamedTuple):\n    dc: int  # change in column\n   \
    \ dr: int  # change in row\n    numerator: int\n    denominator: int\n\nATKINSON\
    \ = [PatternPart(1, 0, 1, 8), PatternPart(2, 0, 1, 8),\n            PatternPart(-1,\
    \ 1, 1, 8), PatternPart(0, 1, 1, 8),\n            PatternPart(1, 1, 1, 8), PatternPart(0,\
    \ 2, 1, 8)]\n```\n\nWe set THRESHOLD to 127 (about the middle point between 0\
    \ and 255) as described in our algorithm. In ATKINSON, we flatten the Atkinson\
    \ dithering matrix into six PatternPart named tuples, each of which specifies\
    \ where one of the pixels being changed is located relative to the original pixel\
    \ and what fraction of the error should be added to it.\n\nNext, we'll start defining\
    \ a dither() function, where the dithering takes place:\n\n```\n# Assumes we are\
    \ working with a grayscale image (Mode \"L\" in Pillow)\n# Returns an array of\
    \ dithered pixels (255 for white, 0 for black)\ndef dither(image: Image.Image)\
    \ -> array:\n    # Distribute error among nearby pixels\n    def diffuse(c: int,\
    \ r: int, error: int, pattern: list[PatternPart]):\n        for part in pattern:\n\
    \            col = c + part.dc\n            row = r + part.dr\n            if\
    \ col < 0 or col >= image.width or row >= image.height:\n                continue\n\
    \            current_pixel: float = image.getpixel((col, row))  # type: ignore\n\
    \            # Add *error_part* to the pixel at (*col*, *row*) in *image*\n  \
    \          error_part = (error * part.numerator) // part.denominator\n       \
    \     image.putpixel((col, row), current_pixel + error_part)\n```\n\nThe dither()\
    \ function begins with a diffuse() helper function that takes the error and distributes\
    \ it among nearby pixels in portions specified by a pattern, which is just a list\
    \ of PatternPart tuples. We iterate through each PatternPart in the pattern, find\
    \ the pixel associated with that part, and add its fraction of the error to it.\
    \ As discussed, the pattern is at the heart of what makes one error-diffusion\
    \ algorithm differ from another. Note that all the arithmetic here is integer\
    \ arithmetic. This is because pixel values are stored as integers."
