    换句话说，我们将创建一个软件，它假装是NES硬件，以便为NES编写的软件可以被“欺骗”到现代平台上运行。构建这个项目提供了模拟完整计算机系统的经验。虽然NES是一个相对简单的计算机，但它具有与更复杂的模拟项目相同的所有基本组件（微处理器、内存、图形等）。而且与第5章的CHIP-8不同，我们将模拟的不仅仅是一个软件规范——我们将模拟真实的硬件！


