  md: '# Real-World Applications


    Emulators are probably most commonly used to play video games for systems that
    are no longer in production, but they’ve also long been used at critical junctures
    in computing history. For example, when Bill Gates and Paul Allen started Microsoft
    in 1975 by writing a BASIC interpreter for the Altair 8800, as was discussed in
    Chapter 2, they didn’t actually have an Altair 8800 available to them. Instead,
    they wrote an emulator for the Altair’s Intel 8080 microprocessor on one of the
    minicomputers at Harvard, where Gates was going to college.⁸


    Apple has transitioned the microprocessor family used in its Macintosh line of
    computers three times: from the Motorola 68K to the Motorola/IBM PowerPC, from
    the PowerPC to the Intel x86, and finally from the Intel x86 to Apple’s own ARM-derived
    Apple Silicon. Does that mean Apple had to have developers recompile or rewrite
    all of their software several times? In the long run, yes, but in the short term
    during the transitions, Apple provided emulators. PowerPC Macs could run 68K Mac
    software, Intel Macs (at the beginning) could run PowerPC Mac software, and Apple
    Silicon Macs can run Intel Mac software too. Apple is an amazing emulator developer.
    In fact, PowerPC Macs would run 68K software faster than 68K Macs. The same was
    sometimes true of Apple Silicon Macs running Intel software.


    Emulators are also important for the preservation of software. What happens when
    it’s very hard to obtain the original hardware that a piece of software was written
    for? In those cases an emulator may be the only option. On the other end of the
    spectrum, emulators are sometimes used in the design phase of a new computing
    platform. Before the platform exists, the designers may utilize an emulator to
    simulate what it will be like and help flesh out its features in a realistic environment.


    Finally, emulator writing is very educational. It’s one of the best ways to teach
    how computers work at a low level, as I hope you discovered in this chapter.


    # Exercises


    +   1. Try to get the performance of our emulator up to that of a real NES—in
    other words, 60 FPS. You’ll likely need to use something like Cython, or Python
    in combination with a low-level language like C or Rust through an extension.
    It will be nearly impossible to get pure Python to run at 60 FPS as of CPython
    3.13 and 2025 era microprocessors.

    2. Add support for scrolling to our emulator using the documentation at https://nesdev.org.

    3. Implement another mapper. Right now our emulator only implements NROM, the
    most basic mapper. Two other popular mappers are MMC1 and UxROM.

    4. And now for the largest challenge of all: try writing an APU for our emulator
    so that you can play games with sound.'
