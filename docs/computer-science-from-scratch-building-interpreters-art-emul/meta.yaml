    ## EMULATING THE NES GAME CONSOLE


    ![](img/2b670944a6e236c13c5019fe56234a0a_164_0.png)


    In this chapter, we’ll build a limited emulator for a beloved 1980s video game
    console, the Nintendo Entertainment System (NES).


    In other words, we’ll create a piece of software that pretends to be NES hardware
    so that software written for the NES can be “fooled” into running on a modern
    platform. Building this project provides experience with emulating a full computer
    system. While the NES is a relatively simple computer, it features all the same
    basic components (microprocessor, memory, graphics, and so on) that more complex
    emulation projects do. And unlike CHIP-8 in Chapter 5, we’ll be emulating more
    than just a software specification—we’ll be simulating real hardware!


    Our emulator won’t be a 100 percent accurate reimplementation of the original
    hardware. We’ll make several simplifications to make building the emulator manageable
    in one book chapter. Despite these simplifications, our emulator will still be
    capable of playing some basic NES games, including a few hobbyist free and open
    source games that are included in the book’s source code repository. We won’t
    be testing our emulator with any commercial games, although it will be capable
    of playing some simple ones. Our motivation is to learn about emulators, not to
    achieve full game compatibility. I’ll leave it as an exercise for the reader to
    further enhance the emulator’s game compatibility.


    We’ll build the emulator in pure Python, which at the time of writing isn’t fast
    enough on a modern PC to emulate the NES at full speed. The code we produce can
    be enhanced with Cython, C extensions, or other kinds of native-code layers to
    run at full speed. This, too, will be left as an exercise for the reader.


    This is the most challenging project in the book. I assume in this chapter that
    you already have the experience of completing the projects in Chapters 1, 2, and
    especially 5. You should at least complete the CHIP-8 project from Chapter 5 before
    beginning this chapter, but concepts explained in almost all the prior chapters
    show up in this project.


