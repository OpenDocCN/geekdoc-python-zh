    ## 最小的可能编程语言


    ![](img/2b670944a6e236c13c5019fe56234a0a_26_0.png)


    最小的、仍然可以用来解决实际问题的编程语言是什么？当然，Brainfuck 是这个奖项的候选者之一，它是一种由 Urban Müller 于 1993 年开发的深奥编程语言。在本章中，我们将开发一个
    Brainfuck 解释器。Brainfuck 可能是最容易编写解释器的编程语言——你会惊讶于我们的解释器是多么简洁。在本章结束时，你不仅将了解 Brainfuck
    的工作原理，还将了解任何解释器的核心原则。


