    K = 9\nWHITE = (255, 255, 255)\n```\n\nThe PIXEL_WIDTH and PIXEL_HEIGHT constants\
    \ are the size of one image. The P_TO_D constant converts between the 255 shades\
    \ of gray in the pixel representation we'll work with and the 16 shades of gray\
    \ in the source dataset; D_TO_P is its inverse. We set K, the number of neighbors\
    \ KNN will consider, to 9, and WHITE is a constant for the white color in the\
    \ RGB pixel format.\nThis is a short program. We have just one central run() function\
    \ that spends as much time handling the user interface as it does running KNN.\
    \ Here's the start of the function:\n\n```\ndef run():\n    # Create a 2D array\
    \ of pixels to represent the digit\n    digit_pixels = np.zeros((PIXEL_HEIGHT,\
    \ PIXEL_WIDTH, 3),\n                            dtype=np.uint32)\n    # Load the\
