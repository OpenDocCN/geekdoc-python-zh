    \ \"Parkki\")\n--snip--\n```\n\nTo run these unit tests we have our standard test-running\
    \ code:\n\n```python\nif __name__ == \"__main__\":\n    unittest.main()\n```\n\
    \nNote that we’ve skipped over about 40 lines in the *test_knn.py* file containing\
    \ further tests that will appear later in this chapter and the next.\n\n## Classifying\
    \ Handwritten Digits\n\nOptical character recognition (OCR) is concerned with\
    \ using computers to recognize the characters in images of typed or handwritten\
    \ text. For example, the post office has sorting machines that use OCR to automatically\
    \ read the addresses written on envelopes. A wide variety of techniques have been\
    \ successfully deployed to perform OCR, KNN among them. In this section, we’ll\
    \ use KNN to develop a handwritten digit recognizer that will achieve 98 percent\
    \ accuracy on the samples in a significant test set.\n\nThe dataset we’ll use\
    \ was developed by Cenk Kaynak and Ethem Alpaydin in 1998 at Bogazici University\
    \ in Istanbul, Turkey, and was later submitted to the UC Irvine Machine Learning\
    \ Repository under a Creative Commons Attribution 4.0 International license. It\
    \ consists of 5,620 bitmaps of handwritten digits (0–9) created by 43 different\
    \ people. The digit images are downscaled to 8×8 pixels, with each pixel represented\
    \ in a CSV file as an integer between 0 and 16 indicating its grayscale level.\
    \ Each line in the CSV consists of the 64 integers representing the 64 pixels\
    \ in the handwritten digit image, plus a 65th integer representing which digit\
    \ (0–9) the image should be classified as. Figure 7-3 shows a sampling of these\
    \ digits.\n\n![](img/2b670944a6e236c13c5019fe56234a0a_238_0.png)\n\nThe digits\
    \ are artificially enlarged a bit in the figure, but you can see that the downscaling\
    \ to 8×8 results in some loss of detail. That lower level of detail, and therefore\
    \ a lower dimensionality in the dataset, makes our program faster to execute.\
    \ Comparing 64 pixels between images is obviously much faster than comparing 1,024\
    \ pixels between images (they were originally 32×32 before being downscaled).\n\
    \n## The Digit Class\n\nTo represent each digit, we define another subclass of\
    \ DataPoint:\n\n```python\nfrom dataclasses import dataclass\nfrom KNN.knn import\
    \ DataPoint\nfrom typing import Self\nimport numpy as np\n\n@dataclass\nclass\
