  md: 'It''s important to have automated tests like this when developing an emulator.
    Even when you think your CPU is perfect, you may have missed a small bug that
    throws whole programs off. You also need to know that changing one part of your
    emulator doesn''t break another part of it.


    # Playing Games


    Unit tests are one thing, but the real test of our emulator is whether it can
    play actual NES software. For legal reasons, we won''t be testing any commercial
    software in our NES emulator. Due to its simplicity, our emulator wouldn''t be
    capable of playing most of the NES library anyway. Instead, the book''s source
    code repository includes several open source or public domain games that our emulator
    is capable of running. These are real games in the sense that they can run on
    a real NES console.


    Let''s start with *BrickBreaker*, a Breakout-like game by Aleff Correa that I
    mentioned earlier. Assuming you have Pygame and NumPy installed, you can play
    this game by just running this command from the repository''s home directory:


    ```

    % python3 -m NESEmulator NESEmulator/Games/brix.nes

    ```


    It looks pretty good (see Figure 6-8).


    ![](img/2b670944a6e236c13c5019fe56234a0a_221_0.png)


    Next, let''s try *Chase* by Shiru:


    ```

    % python3 -m NESEmulator NESEmulator/Games/Chase.nes

    ```


    Figure 6-9 shows the game.'
