    to be another type of computer.


    **Chapter 5: Building a CHIP-8 Virtual Machine** CHIP-8 is a virtual machine (VM)
    specification that was originally used for developing video games in the 1970s.
    Building a CHIP-8 VM is often considered the best first step into the world of
    emulation: it’s relatively simple but still involves all the steps necessary to
    create an emulator. Our CHIP-8 VM will be capable of playing all the CHIP-8 games
    that ran on machines in the 1970s.


    **Chapter 6: Emulating the NES Game Console** The NES was one of the best-selling
    video game consoles of all time. We’ll create an emulator that can play real NES
    games. It will have no sound, be rather slow, and not be completely accurate or
    universally compatible, but it will still be a great way to learn not just about
    emulators but also about how computers work at a low level.


    Finally, Part IV is a very gentle introduction to the world of machine learning
    using the *k*-nearest neighbors (KNN) algorithm.


    **Chapter 7: Classification with K-Nearest Neighbors** We’ll learn KNN, perhaps
    the simplest algorithm in machine learning (ML), and use it as a gateway to understand
    some introductory ML topics. We’ll use KNN to classify fish as well as images
    of handwritten digits. Amazingly, it will complete the latter task with 98 percent
    accuracy.


    **Chapter 8: Regression with K-Nearest Neighbors** We’ll take KNN to the next
    level by using it not just to classify items into categories but also to predict
    unknown attributes of data points. In the chapter finale, we’ll use it to predict
    the missing pixels from an image of a digit that the user draws.


    Beyond the main chapters, the afterword features some suggested resources for
    learning more about the topics in this book, and the appendix covers the basics
    of low-level bit manipulation in Python, an essential component of several projects.'
- md: '## This Book’s Approach


    I try to keep my books as succinct as possible. I value your time. I use a tutorial-like,
    code-centric format to teach, and where possible, I let the code speak for itself.


    This is not a textbook. You’ll find some theory, especially at the beginning of
    each chapter, but it will never be too long before we get to some code. There’s
    just enough information to help you understand how each of the projects works,
    and enough pointers so that you know where to look next if you want to dive deeper
    into any of the covered topics.


    I’m not claiming to be an expert on interpreters, computational art, emulators,
    or machine learning. That may sound weird coming from the author of a book on
    those topics, but it’s true. I’m not an expert; I’m a teacher. I’ve worked as
    a software developer, and I’ve worked as computer science faculty at a teaching
    college. My claim is that I’m able to write clean code and explain that code to
    you in an exceptionally comprehensible manner. And since I’m not an expert, I
    won’t be talking down to you. I’ll be treating you like my peer as we go on this
    journey together. This is the guide I wish I had as I tried doing projects in
    these areas on my own.


    ## About the Code


    All the source code in this book is available on the companion GitHub repository
    at https://github.com/davecom/ComputerScienceFromScratch. The code was created
    and tested against Python versions 3.12 and 3.13. Because some type hint–related
    features of Python 3.12 are utilized, some of the code won’t work with earlier
    versions of Python (but will likely work with any new version of Python in the
    foreseeable future). However, if you remove the type hints, the vast majority
    of the code will work with Python version 3.10 and later.


    I’ve used Python type hints (or “type annotations”) throughout the source code
    because I believe they increase readability by telling you a function’s parameter
    and return types without you needing to scrutinize the code or the comments. If
    you don’t like them, you can ignore them; they don’t change anything about how
    the code works. I’ve tried not to overuse type hints, as some find them to be
    too verbose. For example, I rarely use them within function bodies, but I do use
    them in every function signature. I type-checked all the source code against the
    contemporary version of Pyright at the time of the book’s writing.


    Several of the projects in this book use external libraries. You should have Pygame,
    NumPy, and Pillow installed in the virtual environment you create for the book’s
    source code or in your system Python interpreter. For most readers, installing
    them should be as simple as running `pip install pygame, numpy, pillow`. A `requirements.txt`
    file that pip can use is included in the book’s source code repository.


    ## Corrections and Comments


    The book''s GitHub repository is a great place to open an issue if you think you
    found a mistake. You''re also welcome to reach out to me by email at csfromscratch@oaksnow.com
    or via X @davekopec. I welcome your feedback, both positive and negative. If you
    enjoy the book, please also consider leaving a review on Amazon or wherever you
    purchased it.


    # PART I


    ## INTERPRETERS


    # 1


    ## THE SMALLEST POSSIBLE PROGRAMMING LANGUAGE


    ![](img/2b670944a6e236c13c5019fe56234a0a_26_0.png)


    What’s the smallest possible programming language that can still be used to solve
    real problems? Certainly, a candidate for that prize would be Brainfuck, an esoteric
    programming language developed by Urban Müller in 1993. In this chapter, we’ll
    develop a Brainfuck interpreter. Brainfuck is perhaps the easiest possible programming
    language to write an interpreter for—you’ll be amazed at how succinct ours is.
    By the end of the chapter, you’ll have learned not only how Brainfuck works but
    also the core tenets of any interpreter.


