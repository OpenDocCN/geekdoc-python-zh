    \ + 1) >= len(original):\n                break\n        bits_array.append(next_byte)\n\
    \    return bits_array\n```\n\nThe loops here iterate through 8 bytes at a time\
    \ from the original array, checking whether each is a white (255) or black (0)\
    \ pixel. MacPaint’s bitmap format inverts this, making a white pixel 0 and a black\
    \ pixel 1. The line `next_bit = 1 - (original[byte_index + bit_index] & 1)` does\
    \ the inversion. Note that we don’t actually check values against 255, instead\
