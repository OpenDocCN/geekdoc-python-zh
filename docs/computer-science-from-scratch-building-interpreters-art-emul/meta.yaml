    \ I tried optimizing it, but the issue was my algorithm, not the implementation.\
    \ At the same time, interesting machine learning–based apps for artistic photo\
    \ transformation were starting to come out for iOS, and I realized my slower,\
    \ simpler technique just couldn’t compete. It still made for a cool demo, however,\
    \ and when I was coming up with the projects for this book, I remembered it. I\
