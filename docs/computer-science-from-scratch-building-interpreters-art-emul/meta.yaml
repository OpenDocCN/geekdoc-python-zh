    \n我希望通过完成本书中的项目，你觉得在这四个领域都有了一个很好的开端。现在，如果你想深入自己的项目或完成更多训练，就取决于你了。在本后记的其余部分，我建议了每个领域的一些资源，我认为它们能很好地衔接本书。所有这些资源都经过了我的审核。我确实阅读了我推荐给你的书。\n\
