    \ interpreters in Chapters 1 and 2. Whether executing interpreter statements,\
    \ VM instructions, or microprocessor opcodes in an emulator, we need to do something\
    \ pretty simple: recognize what the next instruction is and then execute a different\
    \ few lines of code that manipulate the state of the VM based on its intended\
    \ operation.\n\nFor example, if we see an add instruction, we should add the two\
    \ specified numbers together and store the result in a specified location. If\
    \ we see a jump instruction, we should move execution to a specified location\
    \ in memory. It’s literally about recognizing what instruction is being executed\
    \ and changing a few state variables representing memory, registers, and the like\
    \ based on that instruction. The simplest way to do this would be with a large\
    \ number of if statements. The pseudocode may look like this:\n\n```\nif instruction\
    \ == ADD:\n    add some numbers together and store the sum\nelif instruction ==\
    \ JUMP:\n    jump to a location by changing the program counter\nelif instruction\
    \ == DRAW:\n    draw the sprite where specified by changing the display buffer\n\
    etc.\n```\n\nBeyond using a bunch of if statements, there are three common patterns\
    \ for writing the code that executes the instructions. The first is a giant switch\
    \ statement, a construct present in many languages but not quite in Python in\
    \ the same form. I assume most readers have seen a switch statement before in\
    \ a language like C or Java. If you haven’t, you can think of it as a primitive\
    \ form of Python’s match statement like we used in Chapters 1 and 2. The case\
    \ of the switch statement that executes is dependent on the instruction. This\
