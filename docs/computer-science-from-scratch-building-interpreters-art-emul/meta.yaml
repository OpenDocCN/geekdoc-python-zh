  - "[PAGE 37]\n\n> Using this method, you can run through all the source code at\
    \ once and find all the bracket pairs easily. The bracket pairs' locations can\
    \ then be cached to improve the interpreter's performance. Instead of running\
    \ a linear search as in find_bracket_match() every time a jump is required, finding\
    \ the other bracket (the jump-to location) just becomes a lookup from the cache.\n\
    \nThe other helper function, clamp0_255_wraparound(), simulates the original Brainfuck\
    \ by limiting cell values to 8-bit unsigned integers. We need this function because\
    \ Python's int type is of arbitrary precision, meaning it can accommodate integers\
    \ as large as you want without overflow (instead, more bytes are grabbed as needed).\
    \ A true 8-bit unsigned integer would wrap around to 0 once it exceeded 255 by\
    \ 1, and it would wrap back to 255 if it was at 0 and was decremented by 1. We\
    \ simulate this behavior in clamp0_255_wraparound() with some simple conditionals:\n\
    \n```\n# Simulate a 1-byte unsigned integer\ndef clamp0_255_wraparound(num: int)\
    \ -> int:\n    if num > 255:\n        return 0\n    elif num < 0:\n        return\
    \ 255\n    else:\n        return num\n```\n\nBecause Brainfuck can't change a\
    \ cell by more than 1 at a time, we don't need to worry about cases where we add\
    \ more than 1 to a cell that's 255 or subtract more than 1 from a cell that's\
    \ 0. The num > 255 and num < 0 tests are therefore sufficient.\n\nWith these two\
    \ helper functions, our implementation of a Brainfuck interpreter is complete.\
