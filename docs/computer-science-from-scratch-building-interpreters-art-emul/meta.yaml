  md: "```\nend_bracket = \"]\" if forward else \"[\"\nwhile 0 <= location < len(self.source_code):\n\
    \    if self.source_code[location] == end_bracket:\n        if in_between_brackets\
    \ == 0:\n            return location\n        in_between_brackets -= 1\n    elif\
    \ self.source_code[location] == start_bracket:\n        in_between_brackets +=\
    \ 1\n    location += direction\n# Didn't find a match\nprint(f\"Error: could not\
    \ find match for {start_bracket} at {start}.\")\nreturn start\n```\n\nTo find\
    \ a matching bracket, we perform a linear search through the Brainfuck source\
    \ code, looking at each subsequent character one at a time. We search to the right\
    \ if forward is True or to the left if forward is False. The direction variable\
    \ becomes a proxy for forward, either incrementing or decrementing location to\
    \ go to the right or to the left ❶.\n\nThe confounding factor when searching for\
    \ a matching bracket is the *in-between brackets*, sets of brackets that occur\
    \ between the starting bracket and the bracket we want. For example, say we're\
    \ searching for the matching bracket of the first bracket in this Brainfuck snippet\
    \ (I've labeled the characters with indices for clarity):\n\n```\n[++[--]<<]\n\
    0123456789\n```\n\nThe match for the opening bracket at index 0 is the closing\
    \ bracket at index 9. If we naively accept the first closing bracket we find,\
    \ however, our search will conclude that the match for index 0 is the closing\
    \ bracket at index 6. In fact, that closing bracket matches the opening bracket\
    \ at index 3.\n\nThe solution is simply to count the in-between brackets. Every\
    \ time we encounter the start of an in-between pair of brackets, we increment\
    \ the in_between_brackets counter ❸. Every time we encounter the end of an in-between\
    \ pair of brackets, we decrement in_between_brackets, unless in_between_brackets\
    \ is 0, meaning there are no more in-between brackets and the destination bracket\
    \ has been found ❷.\n\n> ### A BRACKET-FINDING ALTERNATIVE\n\nAnother way to solve\
    \ the in-between brackets problem is to use a stack. Every time a start bracket\
    \ is encountered, its location is pushed to the stack. Every time an end bracket\
    \ is encountered, the stack is popped. The two bracket locations that result (the\
    \ locations of the encountered end bracket and the popped start bracket) are a\
    \ pair.\n\n*(continued)*"
