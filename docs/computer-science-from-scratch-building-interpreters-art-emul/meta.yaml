    from typing import Protocol, Self\nfrom collections import Counter\nimport numpy\
    \ as np\n\nclass DataPoint(Protocol):\n    kind: str\n\n    @classmethod\n   \
    \ def from_string_data(cls, data: list[str]) -> Self: ...\n\n    def distance(self,\
    \ other: Self) -> float: ...\n```\n\nOur protocol specifies that a data point\
    \ should have a kind attribute (or a class in the words of classification), a\
    \ from_string_data() method for converting a line from a CSV (comma-separated\
    \ values) file to an instance of the class, and distance() to find the distance\
    \ between two of the same kind of data points. We'll create DataPoint subclasses\
    \ for the two concrete datasets we work with in this chapter.\n\nOur main KNN\
    \ implementation is via a class not surprisingly called KNN:\n\n```\nclass KNN[DP:\
    \ DataPoint]:\n    def __init__(self, data_point_type: type[DP], file_path: str\
    \ | Path,\n                 has_header: bool = True) -> None:\n        self.data_point_type\
