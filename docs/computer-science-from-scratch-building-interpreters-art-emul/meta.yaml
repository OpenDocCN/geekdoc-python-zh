    \ self.previous))\n        return self.tokens[self.token_index]\n\n    @property\n\
    \    def previous(self) -> Token:\n        return self.tokens[self.token_index\
    \ - 1]\n```\n\nParser 类接收来自词法分析器的标记集合。随着解析的进行，一个内部的 token_index 跟踪我们当前所在的标记。我们还定义了一些便捷属性来获取当前或上一个标记。\n\
