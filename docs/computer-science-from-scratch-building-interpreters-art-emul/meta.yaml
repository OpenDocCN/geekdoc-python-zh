    \ feature of the NanoBASIC tests is that many of them isolate a single statement\
    \ type. For example, *print2.bas* only uses PRINT statements and numeric expressions,\
    \ so if GOTO isn't working correctly, test_print2() can still pass (but hopefully\
    \ GOTO errors will be caught by another test). This isolationist methodology provides\
    \ more granular testing results, but we still need more comprehensive integration\
    \ tests like *fib.bas* to ensure the statements work correctly in concert. A more\
    \ robust set of unit tests would also include tests that check the tokenizer,\
    \ parser, and interpreter independently.\n\nYou should find that all of the tests\
    \ pass. You can also try adding a BASIC program of your own creation as an additional\
    \ test.\n\n> **CODE MEETS LIFE**\n\nMy dad, Danny Kopec,¹⁰ who was a computer\
    \ science professor, learned programming at Dartmouth College, where he took a\
    \ course in BASIC with Dartmouth president John Kemeny,¹¹ one of the language's\
    \ creators. When I was first learning to program at about eight years old in the\
    \ mid-1990s, he bought me a copy of True BASIC,¹² the \"official\" BASIC released\
    \ by a company started by Kemeny and BASIC co-creator Thomas Kurtz.¹³ BASIC was\
    \ kind of anachronistic by 1995, but I didn't know it. I spent a lot of time making\
    \ games with True BASIC, though I don't think I ever quite learned subroutines.\
    \ I guess I was writing spaghetti code.\n\n*(continued)*\n\nLike my dad, I ended\
    \ up going to Dartmouth for my undergraduate studies (as an economics major),\
    \ and after briefly working in a job on Wall Street that I hated, I applied to\
    \ graduate programs in computer science. The programming thread that started with\
    \ BASIC was still in me. How can somebody without a computer science degree go\
    \ to graduate school in computer science? I took five computer science courses\
    \ as an undergrad, most of which I did well in, and published some projects on\
    \ my own time, and that was enough to get into a few programs. I ended up back\
    \ at Dartmouth for a master’s degree. For anyone considering this route, let me\
    \ say that not having a full undergraduate degree in computer science made the\
    \ transition to the master’s program quite difficult. I wouldn’t recommend going\
    \ into a very different field for a graduate degree without a lot of self-study.\n\
    \nTo keep doubling down on my mistakes, during the first semester of my master’s\
    \ program, I decided to take a class in the thorny subject of compilers. It ended\
    \ up being the lowest grade of my graduate career. The class involved a big project\
    \ building a C compiler in C (with some missing features). I had a partner for\
    \ the project, and we broke the work up into phases of the compiler, similar to\
    \ the phases we went over in this chapter (tokenizer, parser, code generator,\
    \ and so on). The compiler would work only if all the phases worked. By the time\
    \ the last week of the semester rolled around, I had written a couple thousand\
    \ lines of code for my phases, while my partner had written fewer than 100 for\
    \ his part, despite my consistent prodding. I think about that experience a lot\
    \ today when I assign group projects to students: sometimes when they blame their\
    \ partner, they’re telling the truth. No doubt my code wasn’t great either, but\
    \ at least I wrote it.\n\nWe worked in a mad dash with several all-nighters to\
    \ get something working, putting my partner’s pittance of code together with mine\
    \ and writing a lot more to fill in all of the blanks. In the end, our compiler\
    \ did some basic things correctly, but it failed the majority of the professor’s\
    \ automated tests.\n\nHow did someone who nearly flunked a compilers course end\
    \ up writing this chapter on interpreters? Eight years later, and a couple years\
    \ into my career in computer science education, I remembered my experience with\
    \ BASIC. I had also used a children’s programming language called Logo¹⁴ when\
    \ I was growing up, and together the two languages were a really good way to learn\
    \ to program as a kid. As a challenge to myself, I decided to build my own children’s\
    \ programming language that’s a cross between BASIC and Logo. It’s not a novel\
    \ idea—many people have done similar projects—but I wanted to make something polished\
    \ and prove to myself that the compilers class didn’t have to be the end of programming\
    \ language development for me.\n\nThe result was a product called SeaTurtle¹⁵\
    \ that sold hundreds of copies. Hundreds, not thousands. It’s not going to make\
    \ me rich, but it proved to me that I could write a programming language that\
    \ people would actually want to buy. A real programming language. Okay, a real\
    \ “kid” programming language.\n\nThat experience with SeaTurtle led me to create\
    \ NanoBASIC as a Swift project for my Emerging Languages class (mentioned in the\
    \ “Code Meets Life” box in Chapter 1). And that experience led me to this chapter.\
    \ NanoBASIC is very simple, but it’s real, and once you’ve built something real,\
    \ you’re not that far from building something interesting. In the end, the perspective\
    \ I gained from all of these experiences, including the painful compilers class,\
    \ made me the right person to write this chapter. Now that you’ve read it, hopefully\
    \ you don’t have to struggle the same way I did in that class.\n\n## Real-World\
    \ Applications\n\nAs previously discussed in “BASIC History” on page 22, BASIC\
    \ was the standard language of the personal computing revolution. Millions of\
    \ programmers got their start writing BASIC, and Tiny BASIC was a real and widely\
    \ used dialect of BASIC. Some of the progenitors of Tiny BASIC pioneered the Free\
    \ Software movement. Thanks to their open licensing, Tiny BASIC was ported to\
    \ a wide variety of platforms where its simplicity was actually an advantage.\
    \ It ran on machines with so little memory that they couldn’t run languages much\
    \ more sophisticated than Tiny BASIC.\n\nIt may not seem like much, but for an\
    \ early personal computer user with no other alternatives (due to cost or availability)\
    \ and limited memory, Tiny BASIC was a huge improvement over having to write machine\
    \ code. Because it was freely licensed and ported to so many platforms, it also\
    \ offered a kind of portability for programs written in it. If a machine could\
    \ run Tiny BASIC, then it could run your program.\n\nTiny BASIC is still in use\
    \ today. Like Brainfuck, it serves as an educational tool, but it’s also being\
    \ used for more than that. As of this writing, a German company ships microcontrollers\
    \ running a version of Tiny BASIC.¹⁶\n\nThe interpreters you’ll find running modern\
    \ popular programming languages are much more sophisticated than the one we built\
    \ in this chapter, yet they have the same essential building blocks—a tokenizer,\
    \ a parser, an intermediate representation like an AST, and a runtime environment.\
    \ The added sophistication is generally there to support additional features or\
    \ performance, but the relatively simple techniques from this chapter are sufficient\
    \ to build a working prototype of a new language or even a production-ready domain-specific\
    \ language (DSL) for your work. Generally, DSLs don’t require high performance.\n\
    \nMany successful real-world programming languages start out with quite simple\
    \ implementations and evolve over time. For example, Ruby was originally an AST-walking\
    \ interpreter like NanoBASIC. Ruby later compiled to bytecode that executes on\
    \ a virtual machine (more about virtual machines in Chapter 5), and more recent\
    \ versions of Ruby have incorporated a just-in-time (JIT) compiler.\n\nWhether\
    \ a language implementation walks an AST, uses bytecode, or has a JIT compiler,\
    \ it needs the principles we covered in this chapter."
