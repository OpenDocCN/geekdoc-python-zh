    and we want nibble A to be the first half and nibble B the second half of the
    resulting byte. The code to merge them may look like this:


    ```

    >>> a = 0b1001

    >>> b = 0b0110

    >>> c = (a << 4) | b

    >>> bin(c)

    ''0b10010110''

    ```


    With (a << 4) | b we shift a to the left 4 places and then OR its values with
    b. Remember that when we shift to the left, 0s fill in from the right, so'
