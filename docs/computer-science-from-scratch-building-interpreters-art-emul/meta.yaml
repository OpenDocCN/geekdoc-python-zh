    \nThe MemMode enum lists all the various different memory access schemes in the\
    \ 6502. On some basic microprocessors, retrieving a byte from memory is as simple\
    \ as specifying an address and getting back the byte stored there. For example,\
    \ if I say “read 0x1940,” I get back whatever byte is stored in memory at address\
    \ 0x1940. The 6502 can do this with its ABSOLUTE memory mode, but it has other\
    \ memory modes that are helpful in certain situations. Some of these modes access\
    \ memory addresses that are calculated on the fly instead of being specified literally.\
    \ For example, mode ABSOLUTE_X adds"
  - '[PAGE 177]


    the value in the X register to the provided address and accesses the resulting
    memory location. In this mode, if we were to execute the same instruction again
    after incrementing X, we''d automatically read the next byte in memory. When programming
    at a low level, this can be a real convenience and even improve performance if
    the hardware is optimized for certain modes of access. We''ll discuss the NES
    memory modes in more detail later in the chapter—thankfully, many of them are
    quite similar to one another.


    The InstructionType enum lists all the different kinds of instructions that the
    6502 can handle. Some of these instruction types are for BCD operations that,
    as mentioned earlier, the NES version of the 6502 didn''t have. Some of them are
    "unofficial" instruction types that weren''t actually documented as part of the
    6502 but were found to exist through trial and error. Very few games use them.
    The remaining 56 are the instruction types that we''ll actually implement. We
    list all of the possible instruction types in this enum—even the unimplemented
    ones—because we''ll be using an auto-generated table of all 256 possible 6502
    opcodes, and we want every entry in the table to have a valid instruction type
    value.


    An Instruction refers to one of the 256 possible opcodes that the 6502 could understand.
    Every instruction has information about its type (type), its associated function
    in our program that handles it (method), its memory access mode (mode), its expected
    number of bytes (length), the number of CPU cycles it takes to run (ticks), and
    the additional number of cycles it takes to run if a memory page is crossed while
    it executes (page_ticks). A memory page is a portion of RAM that the memory controller
    can access any part of in quick succession to another part. In the 6502, memory
    pages are 256 bytes. If an instruction crosses those 256-byte boundaries, it may
    take longer to execute.


    The fact that every instruction has an associated function to handle it is a hint
    that we''ll be using quite a different design than in the CHIP-8 project. For
    the CHIP-8 VM, we used a giant match statement to process each instruction, but
    for the 6502 and its slightly more complex set of instructions, we''ll utilize
    a cleaner design. Instead of switching on every instruction, we''ll look it up
    in an array based on its opcode and then execute the associated function. This
    kind of design is a variation on a common pattern known as a jump table. In essence,
    we index into an instructions array by opcode to find what function to jump to.


    The Joypad class represents the state of a joypad during program execution. The
    CPU can directly poll the joypad through a couple memory-mapped registers, so
    it seemed appropriate to put Joypad here in the cpu module. Recall that our main
    loop sets the joypad''s state based on events detected by Pygame.


    Here''s a breakdown of the remaining helper constants in the previous code listing:


    **STACK_POINTER_RESET** The memory address that the CPU''s stack pointer initially
    points to.


    **STACK_START** Where the stack starts in memory, which is interestingly a different
    address from STACK_POINTER_RESET.'
