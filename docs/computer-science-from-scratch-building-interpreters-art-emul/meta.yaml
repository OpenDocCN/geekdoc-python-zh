  md: "```\nelse:\n    currently_playing_sound = False\n    bee_sound.stop()\n\n#\
    \ Handle timing\nframe_end = timer()\nframe_time = frame_end - frame_start # time\
    \ it took in seconds\ntimer_accumulator += frame_time\n# Every 1/60 of a second\
    \ decrement the timers\nif timer_accumulator > TIMER_DELAY:\n    vm.decrement_timers()\n\
    \    timer_accumulator = 0\n# Limit the speed of the entire machine to 500 \"\
    frames\" per second\nif frame_time < FRAME_TIME_EXPECTED:\n    difference = FRAME_TIME_EXPECTED\
    \ - frame_time\n    pygame.time.delay(int(difference * 1000))\n    timer_accumulator\
    \ += difference\n```\n\nEven though we aren't using frames to measure traditional\
    \ frames per second (FPS), as you may be familiar with from gaming, the timing\
    \ of each iteration is still important. We need to keep track of timing to ensure\
    \ the VM's countdown timers are ticked every 1/60 of a second as required by the\
    \ CHIP-8 specification ❶, and to limit the overall speed of the VM ❷. If the VM\
    \ runs too fast, games will be unplayable since they were designed for the slow\
    \ computers of the 1970s. You can adjust the speed of the VM, and therefore any\
    \ software running on it, by changing the FRAME_TIME_EXPECTED constant in vm.py.\
    \ In testing, I found that 500 “frames” per second, or in other words, each “frame”\
    \ being approximately 1/500 of a second, to be a solid speed for most games.\n\
    \n# Command Line Arguments\n\nAs in previous programs, we use ArgumentParser to\
