    NES是有史以来最畅销的视频游戏机之一。它于1983年首次在日本以Famicom的名义发布，1985年国际发布时吸引了全球一代游戏玩家。¹ 在其首次亮相时，视频游戏产业只有大约十年的历史。视频游戏机中的微处理器和其他硬件仍然相当原始。尽管如此，NES还是实现了60帧每秒的彩色精灵和背景，播放了朗朗上口的芯片音乐，并且是一些最具标志性游戏的主机平台。


