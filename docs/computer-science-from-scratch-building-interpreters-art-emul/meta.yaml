    \ 170, 170, 128, 0, 42, 34, 170, 170, 170, 170, 170, 170, 170, 170, 170 |\n| Packed\
    \ | 254, 170, 2, 128, 0, 42, 253, 170, 3, 128, 0, 42, 34, 247, 170 |\n\nLet’s\
    \ implement a PackBits encoder. The function run_length_encode() takes an array\
    \ of bytes and returns a run length–encoded array of bytes using the PackBits\
    \ scheme. It starts with an inner helper function, take_same(), that can find\
    \ runs of repeated values and return their length:\n\n```\n# MacPaint expects\
    \ RLE to happen on a per-line basis (MAX_WIDTH).\n# In other words there are line\
    \ boundaries.\ndef run_length_encode(original_data: array) -> array:\n    # Find\
    \ how many of the same bytes are in a row from *start*\n    def take_same(source:\
    \ array, start: int) -> int:\n        count = 0\n        while (start + count\
    \ + 1 < len(source)\n               and source[start + count] == source[start\
    \ + count + 1]):\n            count += 1\n        return count + 1 if count >\
    \ 0 else 0\n```\n\nTo find a run, take_same() just repeatedly looks at whether\
    \ the byte after the current byte is the same as it. It’s also careful to not\
    \ run off the end of the source array. We increment count every time a match is\
    \ found, but because the first byte examined (the byte at start) isn’t itself\
    \ a match of a previous byte, count will always be one less than the number of\
    \ items in a"
