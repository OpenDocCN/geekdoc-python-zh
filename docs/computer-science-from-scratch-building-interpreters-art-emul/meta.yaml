    \ necessarily take much to get value out of a big standard like SVG. In just 20\
    \ lines of code, we’ve written a very limited, but useful, SVG creator.\n\n##\
    \ The Algorithm\n\nThe algorithm that produces these (sometimes) beautiful abstract\
    \ impressions of photographs is remarkably simple. In short, it tries drawing\
    \ randomly sized and placed shapes, one shape at a time. If an added shape makes\
    \ the abstract image look more like the original photo, it’s kept. The improvement\
    \ is potentially further refined by resizing the shape, which is a matter of moving\
    \ each of its points. If the added shape makes the image look less like the original\
    \ photo, then it’s thrown away and a new shape is tried.\n\nHere's a more detailed\
    \ explanation of the algorithm in steps:\n\n1. Create a blank canvas with the\
    \ same size as the original photograph and a background color that's the same\
    \ as the original photograph's average color.\n2. Try drawing a shape on the canvas\
    \ in a random location and of a random size. Color the shape using the average\
    \ color of the corresponding region of the original photograph, the most common\
    \ color of that region, or randomly.\n3. Compare the colors of the pixels of the\
    \ canvas (with the added shape) to the original photograph. If the added shape\
    \ has made the whole canvas's pixels more similar to the original photograph's\
    \ pixels, then keep the added shape.\n4. Try modifying the shape at each point\
    \ (expanding or contracting) one pixel at a time. Keep moving the points in directions\
    \ that further reduce the difference between the whole canvas's pixels and the\
    \ original photograph's pixels. Stop when the movement no longer improves the\
    \ difference.\n5. Repeat steps 2, 3, and 4 trials number of times.\n6. Output\
    \ the final image created on the canvas after trials number of experiments.\n\n\
    There are many configurable parameters of this algorithm. What kind of shape should\
    \ be used? How many trials should be run? How should the color for each shape\
    \ be picked? And there are several subproblems to solve. How is the difference\
    \ between two images calculated? How do you find the pixels in a region that encompasses\
    \ a shape?\n\n## The Main Implementation\n\nExcluding comments, the main implementation\
    \ of our painting algorithm is less than 150 lines of Python. A lot of that succinctness\
    \ is thanks to the powerful Pillow library, which was already discussed in Chapter\
    \ 3. Pillow handles reading and writing various bitmap image formats. It also\
    \ has facilities for drawing simple primitives like the shapes we need. Finally,\
    \ Pillow has functions for computing differences between images and computing\
    \ the average color in a region of an image. These will be critical helper functions\
    \ for our program, allowing us to concentrate on the core algorithm while leaving\
    \ the busywork to Pillow. That's what a great library enables.\n\n## Setup\n\n\
