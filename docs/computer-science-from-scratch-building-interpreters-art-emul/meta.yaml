  md: '> As an aside, you''d be amazed how many PhDs with a background in machine
    learning aren''t able to give a good introductory lecture on a topic like KNN.
    It''s worth remembering that a PhD is a research degree, not a teaching degree.
    This is why, when you''re advising your child on where to go to college, you should
    consider a teaching college. At a large research university, the student may be
    taught by research faculty who don''t care about teaching, an adjunct for whom
    teaching is a part-time job, or in the worst case, a very inexperienced graduate
    student. Having a faculty full of PhDs doesn''t mean much for an undergraduate
    student''s experience in an introductory course when those faculty care more about
    research grants than teaching. By contrast, at a teaching college, you have an
    entire full-time faculty (most with PhDs anyway) who were hired because they''re
    fully dedicated to the art of teaching and often actually like being in an introductory
    classroom. What you lose is a connection to cutting-edge research, but for an
    undergraduate, that connection generally isn''t what will make the biggest impact
    on their trajectory anyway. But take what I''m saying with a grain of salt, since
    I''ve worked at a teaching college for the past nine years.


    # Real-World Applications


    KNN has been widely used in the real world for everything from optical character
    recognition to recommendation systems and from text classification to financial
    modeling. Its simplicity and wide applicability make it universally taught in
    machine learning.


    However, when utilizing KNN in practice, several issues that have already been
    alluded to in this chapter must be overcome. The first is finding the right value
    for *k*. This is typically done via cross validation using a test dataset. What''s
    the value for *k* that worked best with the test data? Using too small a value
    can lead to *overfitting*, where the model is too close to one specific dataset.
    Meanwhile, too large a value can lead to *under-fitting*, where the model is too
    far away from being guided by the test data.⁶


    The next challenge is the performance implications of the basic algorithm with
    large datasets of high dimensionality. As mentioned earlier in the chapter, two
    ways of approaching this problem are designing a better data structure for storing
    the dataset or using approximate searching. One of the most popular data structures
    for speeding up the finding of nearest neighbors is a k-d tree.⁷ However, this
    is a fairly complex data structure and is only worth the headache if performance
    is critical.


    Choosing the right distance function is also critical. Euclidean distance works
    for many applications, but Hamming distance is appropriate for boolean dimensions,
    and other distance functions are well studied in the research literature. The
    right distance function is application specific; there''s no one-size-fits-all
    solution. Often, you also have to normalize the data to eliminate the possibility
    of different units or magnitudes, influencing results. We didn''t normalize the
    data in the fish example in this'
