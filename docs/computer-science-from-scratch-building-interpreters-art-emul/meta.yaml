  md: "+   3. Dither it to black and white.\n4. Write it to disk in MacPaint format.\n\
    \nThe unique and interesting parts of the project are steps 3 and 4, so we'll\
    \ use a library to complete steps 1 and 2. Probably the most popular imaging library\
    \ in the Python world is Pillow. Installing it should be as easy as pip install\
    \ pillow.\n\nPillow can read an image in any popular format in a single line of\
    \ code, and it's just a few more lines to resize an image and convert it to grayscale.\
    \ We'll complete this simple preparatory work right in our __main__.py file, along\
    \ with handling command line arguments as we've done in the prior two projects.\
    \ Let's start with the code for resizing and converting to grayscale, which appears\
    \ in a function aptly called prepare():\n\n```\n# RetroDither/__main__.py\nfrom\
    \ PIL import Image\nfrom argparse import ArgumentParser\nfrom RetroDither.dither\
    \ import dither\nfrom RetroDither.macpaint import MAX_WIDTH, MAX_HEIGHT, write_macpaint_file\n\
    \ndef prepare(file_name: str) -> Image.Image:\n    with open(file_name, \"rb\"\
    ) as fp:\n        image = Image.open(fp)\n        # Size to within the bounds\
    \ of the maximum for MacPaint\n        if image.width > MAX_WIDTH or image.height\
    \ > MAX_HEIGHT:\n            desired_ratio = MAX_WIDTH / MAX_HEIGHT\n        \
    \    ratio = image.width / image.height\n            if ratio >= desired_ratio:\n\
    \                new_size = (MAX_WIDTH, int(image.height * (MAX_WIDTH / image.width)))\n\
    \            else:\n                new_size = (int(image.width * (MAX_HEIGHT\
    \ / image.height)), MAX_HEIGHT)\n            image.thumbnail(new_size, Image.Resampling.LANCZOS)\n\
    \        # Convert to grayscale\n        return image.convert(\"L\")\n```\n\n\
    As noted earlier, MacPaint images are limited to a resolution of 576 pixels wide\
    \ by 720 pixels tall. We define those values as constants in macpaint.py. In prepare(),\
    \ if the image is too large, we scale it proportionally. For that, we figure out\
    \ the ratio of the image's width to its height and compare it to the ratio of\
    \ MacPaint's maximum dimensions. By scaling one dimension to the maximum size\
    \ allowed in MacPaint and the other dimension according to the appropriate ratio,\
    \ we get a final image that's as large as possible in MacPaint without any part\
    \ of it getting cut off. To figure out the resizing formula, I did some very simple\
    \ cross-multiplication algebra on pen and paper. I recommend you do the same if\
    \ you're curious about how this works.\n\nLike reading an image file, doing a\
    \ resize in Pillow is an easy one-liner with the image.thumbnail() method. It\
    \ offers multiple built-in algorithms for actually calculating what colors each\
    \ of the resized pixels will be; LANCZOS is perhaps the highest quality (at some\
    \ performance cost). Finally, image.convert(\"L\") converts the image to grayscale.\
    \ The \"L\" for grayscale mode is"
  merge: -1
  pgno: 89
- img_proc: true
  md: "short for *luminance*, which in computer graphics is also sometimes known as\
    \ *luma*.\nNow let's handle the command line arguments:\n\n```\nif __name__ ==\
    \ \"__main__\":\n    argument_parser = ArgumentParser(\"RetroDither\")\n    argument_parser.add_argument(\"\
    image_file\", help=\"Input image file.\")\n    argument_parser.add_argument(\"\
    output_file\", help=\"Resulting MacPaint file.\")\n    argument_parser.add_argument('-g',\
    \ '--gif', default=False, action='store_true',\n                             \
    \   help='Create an output gif as well.')\n    arguments = argument_parser.parse_args()\n\
    \    original = prepare(arguments.image_file)\n    dithered_data = dither(original)\n\
    \    if arguments.gif:\n        out_image = Image.frombytes('L', original.size,\
    \ dithered_data.tobytes())\n        out_image.save(arguments.output_file + \"\
    .gif\")\n    write_macpaint_file(dithered_data, arguments.output_file, original.width,\
    \ original.height)\n```\n\nAt this point, on our third project, we've seen ArgumentParser\
    \ quite a bit. For Retro Dither, we have a couple more command line options compared\
    \ to the earlier projects. One, output_file, is for the user to specify an output\
    \ filename and path for the results. The optional -g or --gif parameter is for\
    \ the user to specify if they want GIF output in addition to MacPaint output.\
    \ If the user requests GIF output, we use Pillow to write a GIF version of the\
    \ dithered image.\nPillow is a very full-featured and powerful library. We won't\
    \ use many of its features in this chapter, but if you need to do image manipulation\
    \ in Python, it's well worth the invested time to learn it. We'll also see it\
    \ again in the next chapter. For more information, check out the Pillow documentation\
    \ at https://pillow.readthedocs.io.\n\n# The Dithering Algorithm\n\nThere are\
    \ many different dithering algorithms, the most popular class of which are known\
    \ as *error-diffusion* algorithms. This type of algorithm takes some of the difference\
    \ between where a pixel ends up and where it began (the *error*) and spreads (*diffuses*)\
    \ it among nearby pixels. The most popular error-diffusion dithering algorithm\
    \ is known as Floyd-Steinberg dithering (invented by Robert Floyd and Louis Steinberg\
    \ in 1976). In fact, Pillow has built-in support for Floyd-Steinberg dithering.\n\
    Just using Pillow to do the dithering wouldn't be any fun, and we wouldn't learn\
    \ anything in the process. Instead, we'll implement an algorithm that Pillow doesn't\
    \ have: the Atkinson dithering algorithm. It was created by Bill Atkinson in 1984\
    \ specifically for use with software on the original Macintosh, like MacPaint,\
    \ which Atkinson was the author of. It's therefore not a surprise that Atkinson\
    \ dithering was a popular technique on monochrome Macs. It will make our results\
    \ look more authentic. Like Floyd-Steinberg, Atkinson dithering is an error-diffusion\
    \ algorithm. As we'll see, it only takes a few changes to go from one error-diffusion\
    \ algorithm to another."
