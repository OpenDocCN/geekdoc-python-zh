  md: "the lines have to be in order, our find_line_index() method can perform a binary\
    \ search:\n\n```\n# Returns the index of a *line_id* using a binary search,\n\
    # or None if not found; assumes the statements list is sorted\ndef find_line_index(self,\
    \ line_id: int) -> int | None:\n    low: int = 0\n    high: int = len(self.statements)\
    \ - 1\n    while low <= high:\n        mid: int = (low + high) // 2\n        if\
    \ self.statements[mid].line_id < line_id:\n            low = mid + 1\n       \
    \ elif self.statements[mid].line_id > line_id:\n            high = mid - 1\n \
    \       else:\n            return mid\n    return None\n```\n\nNext, the run()\
    \ method sequentially executes the statements in statements:\n\n```\ndef run(self):\n\
    \    while self.statement_index < len(self.statements):\n        self.interpret(self.current)\n\
    ```\n\nNotice that we're using a while loop controlled by statement_index instead\
    \ of a for...in loop. This is because we may in fact jump around and skip or repeat\
    \ some statements due to GOTO and GOSUB. In other words, as we interpret various\
    \ statements within the loop, statement_index may be modified.\nThe interpret()\
    \ method is the heart of the interpreter. It interprets statement nodes and modifies\
    \ the runtime environment or creates some output depending on the meaning of each\
    \ particular statement:\n\n```\ndef interpret(self, statement: Statement):\n \
    \   match statement:\n        case LetStatement(name=name, expr=expr):\n     \
    \       value = self.evaluate_numeric(expr)\n            self.variable_table[name]\
    \ = value\n            self.statement_index += 1\n        case GoToStatement(line_expr=line_expr):\n\
    \            go_to_line_id = self.evaluate_numeric(line_expr)\n            if\
    \ (line_index := self.find_line_index(go_to_line_id)) is not None:\n         \
    \       self.statement_index = line_index\n            else:\n               \
    \ raise InterpreterError(\"No GOTO line id.\", self.current)\n        case GoSubStatement(line_expr=line_expr):\n\
    \            go_sub_line_id = self.evaluate_numeric(line_expr)\n            if\
