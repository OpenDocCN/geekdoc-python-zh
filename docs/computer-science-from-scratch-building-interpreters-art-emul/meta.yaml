    \n在我们的实现中，我们将使用两个外部库。Pygame是一个专为游戏开发设计的Python库，它提供了一种简便的方式来在屏幕上创建窗口、用我们虚拟机显示的像素填充该窗口，以及处理键盘输入。NumPy是一个数值计算库，可用于创建作为Pygame窗口像素后备缓冲区的二维数组。这个数组将充当我们虚拟机的“显存”。Pygame原生支持NumPy数组，并且NumPy数组在表示此缓冲区方面比Python标准库中的任何东西都更高效。请确保在运行程序之前已安装Pygame和NumPy。\n\
