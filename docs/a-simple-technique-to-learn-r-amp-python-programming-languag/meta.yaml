    ## অধ্যায় 4 :শিশুদের জন্য কোডিং


    শিশুদের জন্য কোডিং শেখা টা এখন সময়ের দাবি। অনেকেই এই কোডিং শিখতে গিয়ে বিভিন্ন
    অনলাইন প্লাটফর্মে পয়সা খরচ করে বাচ্চাদেরকে কোডিং শেখানোর চেষ্টা করছেন। আমি আপনাদের
    এই বইয়ের মাধ্যমে এমন কয়েকটি ফ্রি কোডিং প্ল্যাটফর্ম এর নাম শেয়ার করব যার মাধ্যমে
    আপনি আপনার শিশুকে বা আপনার বাচ্চাকে খুব সহজেই কোডিং এর মত একটি চমৎকার প্রবলেম
    সলভিং টেকনিক শিখতে সাহায্য করতে পারেন। কোডিং এর মাধ্যমে একটি বাচ্চা তার মনের ভেতরের
    ফ্রুস্ট্রেশনটি রয়েছে তা প্রকাশ করতে পারে। বিশেষ করে আমাদের দেশের বাচ্চাদের প্রায়ই
    দেখা যায় মোবাইলের গেম বা মোবাইল ভিডিও দেখার অসতির সমস্যা রয়েছে। মোবাইলের গেম
    এর প্রতি এই অসতি দূর করার জন্য কোডিং হতে পারে একটি চমৎকার মাধ্যম। বাংলাদেশ এ আপনি
    যদি আপনার শিশুকে কোডিংয়ের এই চমৎকার পৃথিবীতে প্রবেশ করিয়ে দিতে চাহেন গেম বা
    মোবাইল ভিডিও দেখার অসতি দূর হবে পাশাপাশি সে চাইলে এই গেম বা মোবাইল আগ্রহিকতা নিজেই
    শিশুর ভেতরে তৈরী করতে শিখে যাবে। আমাদেরকে মনে রাখতে হবে কোডিং শেখার মাধ্যমে আপনি
    আসলে প্রাগম্যারের আ ক শ শিখনে আর প্রাগম্য শিখতে পারলে ভবিষ্যতে আপনি একজন সফল ডাটা
    এনালিস্ট, ডাটা সায়েন্টিস্ট অথবা আইটি ডেভেলপার হতে পারবেন। আমাদের দেশে যখন বেকারত্বের
    হার অনেক বেশি সেখানে যদি আপনার বাচ্চা কিছু বয়স থেকে ধীরে ধীরে ফ্রি অনলাইন কোডিং
    প্ল্যাটফর্মগুলোতে কোডিং শিখা প্রাকটিস করে তাহলে একদিন সে একজন সফল প্রোগ্রামার
    হয়ে উঠতে পারবে। আর একজন সফল প্রোগ্রামার পৃথিবীতে যে কোন বিষয়ে কাজ করে আয় রোজগার
    করতে পারবে। আপনার সন্তানকে একজন ভালো প্রোগ্রামার করে গড়ে তুলতে হলে প্রথমেই তাকে
    এই কোডিং করা অর্থাৎ কম্পিউটারের ভাষা শেখানো খুবেই অগ্রণী। আর এজন্য আপনাকে এই বইয়ের
    দিয়ে দেওয়া যেকোনো একটি কোডিং প্ল্যাটফর্ম যা আপনার ভালো লাগে সেখান থেকে আপনার
    বাচ্চাকে এই কোডিং করার ব্যাপারে উৎসাহিত দিতে পারেন। আমরা এই বইয়ের উদ্দেশ্য হচ্ছে
    শিশু থেকে শুরু করে প্রায়বয়স্ক সবাই যেন ডাটা এনালিসিস, ডাটা সায়েন্টিস্ট, প্রোগ্রামার,
    প্রোগ্রামিং ল্যাংগুয়েজের ব্যাপারে দক্ষতা অর্জন করতে পারে কারন বর্তমান পৃথিবীতে
    এই ধরনের দক্ষতা সম্পন্ন ব্যক্তিদের অভাব রয়েছে। আর যদি আপনি এই দক্ষতা অর্জন করতে
    পারেন তাহলে খুব সহজেই আপনার এবং আপনার পরিবারের সফলতা আসতে বেশি সময় লাগবে না।
    বাংলাদেশের বাইরে পাশাপাশি এই কোডিং এর দক্ষতা অর্জনকারী ব্যক্তিদের বিপুল চাহিদা
    রয়েছে। দরকার হচ্ছে প্রথম থেকে এই কম্পিউটারের ভাষা শেখার ব্যাপারে আগ্রহ এবং প্রাকটিস
    করা। আর এজন্য শিশু বয়স থেকে সবচেয়ে সঠিক সময়। সাধারণত আপনার বাচ্চার বয়স **6**
    থেকে **15** বছরের মধ্যে হলে আপনি খুব সহজেই আপনার বাচ্চাকে এই কোডিং করার বিভিন্ন
    প্ল্যাটফর্ম গুলোর সাথে পরিচয় করিয়ে দিতে পারেন এবং দিনের একটি নির্দিষ্ট সময়ে
    ভাবে উৎসাহিত করতে পারেন কোডিং প্রাকটিস করতে। এই কোডিং প্রাকটিসের মাধ্যমে সে ধীরে
    ধীরে একজন প্রোগ্রামার হয়ে উঠবে। মনে রাখবেন প্রোগ্রামিং বা **problem-solving**
    আইডিয়া একদিনে চলে আসে না। যদি আপনার পরিণত প্রোগ্রামিং ল্যাংগুয়েজের ভাষা জানা
    থাকে তাহলে ধীরে ধীরে আপনি একজন ভালো প্রোগ্রামার বা প্রবলেম সলভার হতে পারবেন। কোডিং
    হচ্ছে এই ভাষা শেখার লিখিত প্রচেষ্টা। আমরা যখন কোন বাক্য নিয়ে কাজ করি তার তার
    কিন্তু লেটার বা বর্ণ মালা থাকে। সেই লেটার বা বর্ণ মালাগুলো বার বার প্রাকটিস করার
    মাধ্যমে আমরা ধীরে ধীরে নিজের সুন্দরীল বাক্য রচনা করতে পারি। কম্পিউটারের তাগতে
    প্রোগ্রামিং হচ্ছে সেই রকম সুন্দরীল বাক্য। আর কোডিং হচ্ছে সেই বাক্য গঠন করার জন্য
    আপনার কম্পিউটারের লেটার বা বর্ণ মালা। যেমন প্রথন প্রোগ্রামিং দিয়ে বার বার প্রাকটিস
    করে আগলি কোন একটি নতুন আইডিয়াকে খুব সহজেই আয়ত্ত করতে পারবেন। তাই দেরি না করে
    এই বইয়ের লিখে যে কোন কোডিং প্ল্যাটফর্ম রয়েছে তা আপনি এবং আপনার শিশু খুব সহজেই
    প্রাকটিস শুরু করতে পারেন। আমার বিশ্বাস আপনি যদি কোনোলা একটি প্ল্যাটফর্ম কে বেছে
    নিয়ে আজকে থেকে ধীরে ধীরে কোডিং এর জগতে আপনার শিশুকে প্রবেশ করিয়ে দিতে পারেন,
    তাহলে আপনি আপনার শিশুর জন্য আসলে একটি বিরাট বড় উপকার করেছেন। যাতে একদিন আপনার
    শিশু এটা বুঝতে পারবে না কিন্তু ভবিষ্যতে সে আপনাকে ধন্যবাদ জানাবে এই চমৎকার একটি
    স্কিল তাকে শেখানোর জন্য। তো চলুন নিচের যেকোনো একটি কোডিং প্ল্যাটফর্ম বেছে নেই
    আর শুরু করি আজকের কোডিং যাত্রা।


