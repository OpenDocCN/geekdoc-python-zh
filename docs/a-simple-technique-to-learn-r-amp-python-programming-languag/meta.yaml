    # আর ও পাইথন প্রাথমিক ল্যাঙ্গুয়েজ শেখার সিম্পল টেকনিক


    আর প্রাথমিক ল্যাঙ্গুয়েজ নিয়ে আমার আগের দুটো বই রয়েছে। এই বইটি লেখার উদ্দেশ্য
    হচ্ছে আর এবং পাইথন এই দুইটি প্রাথমিক ল্যাঙ্গুয়েজ আমাদের ভবিষ্যতের জন্য কেন শেখা
    দরকার এবং কিভাবে স্বল্পতম সময়ে এই দুইটি ল্যাঙ্গুয়েজ আমরা শিখতে পারি তা আমার
    অভিজ্ঞতা থেকে আপনাদের সাথে একটু শেয়ার করা। প্রাথমিক ল্যাঙ্গুয়েজ শিখা এবং সম্পর্কে
    দাবি। যেটি শিশু থেকে শুরু করে প্রাভববৃত্ত প্রত্যাকটি মানুষকে আগামীর দুনিয়ায়
    চলতে-ফিরতে গেলে প্রাথমিক ল্যাঙ্গুয়েজ শিখতে হবে। প্রাথমিক ল্যাঙ্গুয়েজ আসল কম্পিউটারকে
    ইন্সট্রাকশন বা নির্দেশনা দেওয়ার জন্য একটি ভাষা। যদি এই ভাষাটি কঠ রচন করতে পারে
    তাহলে তাকে আর কখনোই দুর্বিনময় বুঝতে প্রথম কাজ হবে। প্রাথমিক ল্যাঙ্গুয়েজ জানা
    থাকলে এই ডাটার ব্যবহারের মাধ্যমে আপনি নিজের এবং আপনার ব্যবসার অনেক উন্নতি সাধন
    করতে পারবেন। তাই আর এবং পাইথন এই দুইটি প্রাথমিক ল্যাঙ্গুয়েজ কিভাবে একসাথে শিখতে
    হয় এবং কত স্বল্পতা সহিত আমরা একে কাজে লাগাতে পারি তার মূল রহস্য এই বইতে তুলে
    ধরা হবে। এই বইটি মূলত শিশু-কিশোরের যারা বর্তমানে কম্পিউটার ব্যাপারে আগ্রহী এবং
    প্রাভববৃত্ত যারা ডাটা সায়েন্স নিয়ে কাজ করে কারিয়ার গড়ে তোলে তাদের জন্য একটি
    কমপ্লিট গাইডলাইন। আশাকারি বইটির ভেতরে আর এবং পাইথনের বাক গঠনের কৌশল এবং শিশু-কিশোরদের
    জন্য পাইথনের সহজ কিছু কাড আনতে পারলে আগামী দিনের চতুর্থ শিশু বিপ্লবের জন্য বাংলাদেশের
    প্রত্যেকটি নাগরিককে তৈরি হওয়া আরেকটুখানি সহজ হবে।


    # অধ্যায় এক: আর এবং পাইথন কার জন্য?


    আর এবং পাইথন মূলত বিভিন্ন ব্যক্তি গোষ্ঠীর জন্য বিভিন্ন কাজে ব্যবহৃত হয়। সবার
    জন্য আর শিখা ও পাইথন নিয়ে কাজ করার প্রয়োজন নেই। মূলত যারা ভবিষ্যতে একটি সাধারণ
    ল্যাঙ্গুয়েজ অর্থাৎ জুনারেল পারপাস ল্যাঙ্গুয়েজ জানতে চান এবং এই জানার মাধ্যমে
    ভবিষ্যতে অ্যাপ্লিকেশন ডেভেলপ করার ইচ্ছা রয়েছে তাদের জন্য পাইথন দিয়ে শুরু করা
    একটি উত্তম শিক্ষা। শিশু-কিশোররা যারা নিজেদের কম্পিউটার বা প্রাথমিক এর প্রাথমিক
    জ্ঞান অর্জন করতে চান তাদের জন্য পাইথন দিয়ে শুরু করাটা আমার মতে সঠিক হবে। তাহলে
    প্রশ্ন হচ্ছে আর প্রাথমিক মূলত কারদের জন্য? আর প্রাথমিক হচ্ছে যারা ভবিষ্যতে ডাটা
    এনালাইসিস করতে চান অথবা ডাটা এনালিস্ট হতে চান তাদের জন্য আর প্রাথমিক একটি পূর্ণাঙ্গ
    প্রাথমিক ল্যাঙ্গুয়েজ। এছাড়া বড় হয়ে যারা ডাটা সায়েন্টিস্ট হতে চান এবং ফিল্ডারিয়ার
    মাধ্যমে নিজের কারিয়ার গড়ে তুলতে চান তাদের জন্য আর প্রাথমিক অথবা পাইথন উভয়ই
    অত্যন্ত গুরুত্বপূর্ণ।


    এই বইটিতে আর প্রাথমিক এবং পাইথন প্রাথমিক নিয়ে প্রাথমিক প্রত্যাকটি বিষয়ে আলোচনা
    করা হবে এবং আমাদের বাচ্চাদের জন্য পাইথনের কোন কোন বিষয় গুরুত্ব দিকে শেখ উদ্দিত
    সে বিষয়ে আলোচনা করা হবে। বইটির মূল উদ্দেশ্যই হচ্ছে আর এবং পাইথন প্রাথমিক ল্যাঙ্গুয়েজ
    একসাথে কিভাবে স্বল্পতম সময়ে শেখ যায় এবং ১ শিক্ষার মাধ্যমে আপনি আপনার কারিয়ারে
    একে ব্যবহার কিভাবে করতে পারবেন তা আলোচনা করা। তো চলুন প্রথমেই আর ও পাইথনের বাক
    গঠনের তারতম্য এবং বেসিক কিছু কৌশল আপনাদের কাছে তুলে ধরার চেষ্টা করি।


    # আর প্রাথমিক ল্যাঙ্গুয়েজ শিখার সিম্পল টেকনিক


    এই অধ্যায়ে প্রথমে আর প্রাথমিক ল্যাঙ্গুয়েজের প্রাথমিক গঠন এর উদাহরণ ও সহজ কিছু
    কমান্ড তুলে ধরা হবে। আর প্রাথমিক জানার জন্য এই অধ্যায়ের প্রত্যেকটি বিষয়ে আপনি
    অনুশীলন করলে খুবই স্বল্পতম সময়ে প্রাথমিক কোড গত সকল সমস্যার সমাধান আপনি নিজেই
    করতে পারবেন।


    দরকার শুধু তিনটি বিষয় গুরুত্ব দেওয়া।


