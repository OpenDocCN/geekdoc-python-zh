    Five data verbs help us do a lot with data. We use these with the help of the
    `dplyr` package written by Wickham, contained in the `tidyverse` package.

    The five data verbs are:


    +   - `filter` to pick certain rows

    - `select` to pick columns

    - `mutate` to generate new variables

    - `summarize` to summarize

    - `arrange` to sort in some order


    All of these can be used with the `group_by()` function.

    These five verbs, along with the pipe symbol, help us accomplish a lot when working
    with data. The pipe symbol


    ```

    %>%

    ```


    helps us string together commands. The following commands are equivalent.


    ```

    f(x,y)

    ```


    is equivalent to


    ```

    x %>%

    f(,y)

    ```


    The pipe symbol pipes x into the function of x and y. So what is on the left of
    the pipe gets piped as the first argument of the function on the right. This might
    appear strange at first and takes some getting used to, but it greatly helps us
    carry out actions on data that build on each other and makes code easier to understand.


