    পাইথনের যে প্যাকেজের মাধ্যমে আপনি খুব সহজেই ম্যাট্রিক্স, ডাটা স্ট্রাকচার অর্থি
    এবং প্লটিং এর মাধ্যমে কাজ করতে পারবেন তাকে **numpy''** মডিউল বলা হয়। আপনাকে **numpy**
    মডিউল ব্যবহার করে ডাটা স্ট্রাকচার নির্ধারণ করে কাজ শুরু করতে হবে। এই **numpy**
    মডিউল এর মধ্যে রয়েছে **array, matrix, indexing** ইত্যাদি। নিচে **numpy** মডিউলের
    বিভিন্ন ডাটা স্ট্রাকচার এর উদাহরণ দেওয়া হল। পাইথন প্রোগ্রামিং ল্যাঙ্গুয়েজ শিখার
    জন্য যে চারটি মডিউল অত্যন্তগুরুত্বপূর্ণ তার প্রথমটি হচ্ছে **numpy**।

    নিচে একটি মডিউল এর ভিতরে থাকা ফাংশন কে আপনি কিভাবে একটি সাধারন কোড স্ট্রাকচার
    ব্যবহার করে শিখে নিতে পারেন তার উদাহরণ দেওয়া হল। প্রতেকটি মডিউল এর ভিতরের ফাংশন
    কে ব্যবহার করতে চাইলে এই স্ট্রাকচার ফলো করলে আপনাকে আর নতুন করে পাইথনের কোন কোড
    শেখার প্রয়োজন নেই। যখনই যে মডিউলটি প্রয়োজন পড়বে অর্থাৎ যে মডিউলের যে ফাংশনটি
    আপনি আপনার কাজে ব্যবহার করতে চান তখনই এই স্ট্রাকচার টি ফলো করলেই আপনি তার ফাংশনগুলো
    কে কল করে ব্যবহার করতে পারবেন।


