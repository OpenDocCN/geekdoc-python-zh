groups:
- md: "## আর ও পাইথন প্রাথমিক ল্যাঙ্গুয়েজ শেখার সিম্পল টেকনিক\n\nআর প্রাথমিক ল্যাঙ্গুয়েজ\
    \ নিয়ে আমার আগের দুটো বই রয়েছে। এই বইটি লেখার উদ্দেশ্য হচ্ছে আর এবং পাইথন এই\
    \ দুইটি প্রাথমিক ল্যাঙ্গুয়েজ আমাদের ভবিষ্যতের জন্য কেন শেখা দরকার এবং কিভাবে\
    \ স্বল্পতম সময়ে এই দুইটি ল্যাঙ্গুয়েজ আমরা শিখতে পারি তা আমার অভিজ্ঞতা থেকে আপনাদের\
    \ সাথে একটু শেয়ার করা। প্রাথমিক ল্যাঙ্গুয়েজ শিখা এবং সম্পর্কে দাবি। যেটি শিশু\
    \ থেকে শুরু করে প্রাভববৃত্ত প্রত্যাকটি মানুষকে আগামীর দুনিয়ায় চলতে-ফিরতে গেলে\
    \ প্রাথমিক ল্যাঙ্গুয়েজ শিখতে হবে। প্রাথমিক ল্যাঙ্গুয়েজ আসল কম্পিউটারকে ইন্সট্রাকশন\
    \ বা নির্দেশনা দেওয়ার জন্য একটি ভাষা। যদি এই ভাষাটি কঠ রচন করতে পারে তাহলে তাকে\
    \ আর কখনোই দুর্বিনময় বুঝতে প্রথম কাজ হবে। প্রাথমিক ল্যাঙ্গুয়েজ জানা থাকলে এই\
    \ ডাটার ব্যবহারের মাধ্যমে আপনি নিজের এবং আপনার ব্যবসার অনেক উন্নতি সাধন করতে পারবেন।\
    \ তাই আর এবং পাইথন এই দুইটি প্রাথমিক ল্যাঙ্গুয়েজ কিভাবে একসাথে শিখতে হয় এবং\
    \ কত স্বল্পতা সহিত আমরা একে কাজে লাগাতে পারি তার মূল রহস্য এই বইতে তুলে ধরা হবে।\
    \ এই বইটি মূলত শিশু-কিশোরের যারা বর্তমানে কম্পিউটার ব্যাপারে আগ্রহী এবং প্রাভববৃত্ত\
    \ যারা ডাটা সায়েন্স নিয়ে কাজ করে কারিয়ার গড়ে তোলে তাদের জন্য একটি কমপ্লিট\
    \ গাইডলাইন। আশাকারি বইটির ভেতরে আর এবং পাইথনের বাক গঠনের কৌশল এবং শিশু-কিশোরদের\
    \ জন্য পাইথনের সহজ কিছু কাড আনতে পারলে আগামী দিনের চতুর্থ শিশু বিপ্লবের জন্য বাংলাদেশের\
    \ প্রত্যেকটি নাগরিককে তৈরি হওয়া আরেকটুখানি সহজ হবে।\n\n## অধ্যায় এক: আর এবং\
    \ পাইথন কার জন্য?\n\nআর এবং পাইথন মূলত বিভিন্ন ব্যক্তি গোষ্ঠীর জন্য বিভিন্ন কাজে\
    \ ব্যবহৃত হয়। সবার জন্য আর শিখা ও পাইথন নিয়ে কাজ করার প্রয়োজন নেই। মূলত যারা\
    \ ভবিষ্যতে একটি সাধারণ ল্যাঙ্গুয়েজ অর্থাৎ জুনারেল পারপাস ল্যাঙ্গুয়েজ জানতে চান\
    \ এবং এই জানার মাধ্যমে ভবিষ্যতে অ্যাপ্লিকেশন ডেভেলপ করার ইচ্ছা রয়েছে তাদের জন্য\
    \ পাইথন দিয়ে শুরু করা একটি উত্তম শিক্ষা। শিশু-কিশোররা যারা নিজেদের কম্পিউটার\
    \ বা প্রাথমিক এর প্রাথমিক জ্ঞান অর্জন করতে চান তাদের জন্য পাইথন দিয়ে শুরু করাটা\
    \ আমার মতে সঠিক হবে। তাহলে প্রশ্ন হচ্ছে আর প্রাথমিক মূলত কারদের জন্য? আর প্রাথমিক\
    \ হচ্ছে যারা ভবিষ্যতে ডাটা এনালাইসিস করতে চান অথবা ডাটা এনালিস্ট হতে চান তাদের\
    \ জন্য আর প্রাথমিক একটি পূর্ণাঙ্গ প্রাথমিক ল্যাঙ্গুয়েজ। এছাড়া বড় হয়ে যারা\
    \ ডাটা সায়েন্টিস্ট হতে চান এবং ফিল্ডারিয়ার মাধ্যমে নিজের কারিয়ার গড়ে তুলতে\
    \ চান তাদের জন্য আর প্রাথমিক অথবা পাইথন উভয়ই অত্যন্ত গুরুত্বপূর্ণ।\n\nএই বইটিতে\
    \ আর প্রাথমিক এবং পাইথন প্রাথমিক নিয়ে প্রাথমিক প্রত্যাকটি বিষয়ে আলোচনা করা হবে\
    \ এবং আমাদের বাচ্চাদের জন্য পাইথনের কোন কোন বিষয় গুরুত্ব দিকে শেখ উদ্দিত সে বিষয়ে\
    \ আলোচনা করা হবে। বইটির মূল উদ্দেশ্যই হচ্ছে আর এবং পাইথন প্রাথমিক ল্যাঙ্গুয়েজ\
    \ একসাথে কিভাবে স্বল্পতম সময়ে শেখ যায় এবং ১ শিক্ষার মাধ্যমে আপনি আপনার কারিয়ারে\
    \ একে ব্যবহার কিভাবে করতে পারবেন তা আলোচনা করা। তো চলুন প্রথমেই আর ও পাইথনের বাক\
    \ গঠনের তারতম্য এবং বেসিক কিছু কৌশল আপনাদের কাছে তুলে ধরার চেষ্টা করি।\n\n## আর\
    \ প্রাথমিক ল্যাঙ্গুয়েজ শিখার সিম্পল টেকনিক\n\nএই অধ্যায়ে প্রথমে আর প্রাথমিক\
    \ ল্যাঙ্গুয়েজের প্রাথমিক গঠন এর উদাহরণ ও সহজ কিছু কমান্ড তুলে ধরা হবে। আর প্রাথমিক\
    \ জানার জন্য এই অধ্যায়ের প্রত্যেকটি বিষয়ে আপনি অনুশীলন করলে খুবই স্বল্পতম সময়ে\
    \ প্রাথমিক কোড গত সকল সমস্যার সমাধান আপনি নিজেই করতে পারবেন।\n\nদরকার শুধু তিনটি\
    \ বিষয় গুরুত্ব দেওয়া।\n\nপ্রথমত নতুন কিছু শেখার ইচ্ছা\n\nবিত্তীয়তঃ একটি কম্পিউটার\n\
    \nএবং এই বইটি যা আপনাকে দিক-নির্দেশনা দিবে হুবহু আর এবং পাইথন প্রাথমিক শিখার কৌশল\
    \ এর ব্যাপারে।\n\nআর প্রাথমিক ল্যাঙ্গুয়েজ একটি ফাংশন বইতে প্রাথমিক ল্যাঙ্গুয়েজ।\
    \ আর প্রাথমিকে সাধারণত নিম্নের বাক্যগুলোন সিনট্যাক্স দ্বারা নিয়ন্ত্রিত হয়। প্রত্যেকটি\
    \ আর কমান্ড এই নিম্নের ফর্মুলা অনুযায়ী বা কোড সিনট্যাক্স অনুযায়ী গঠিত হয়।\n\
    \n```\nnew object ← function( object or formula , object information , options\
    \ )\n```\n\nOr\n\n```\nobject<- function(argument name= argument information/value,\
    \ option)\n```\n\nআর প্রাথমিক ল্যাঙ্গুয়েজ শিখার জন্য এই কোড গঠনের প্রক্রিয়া\
    \ জানা খুবই অত্যন্তী। এই প্রক্রিয়ার মাধ্যমে প্রত্যেক কোড সাজালে যেকোনো ধরনের\
    \ কমান্ড সম্পন্ন করা সম্ভব। নিচে আরও একটি উদাহরণ দিয়ে উপরের কোড গঠনের প্রক্রিয়াকে\
    \ বুঝালো হল।\n\n```\nPrice <- c(21, 31, 34)\n```\n\nআর এর **r-studio** সম্পূর্ণ\
    \ ফ্রি সফটওয়্যার। এই দুটি সফটওয়্যার ডাউনলোড করার জন্য আপনি নিম্নের ওয়েবসাইটেতে\
    \ যাবেন।\n\nhttp://www.r-project.org/\n\nhttp://www.rstudio.com/\n\nতারপর ডাউনলোড\
    \ করে ইনস্টল করার মাধ্যমে **R-studio** প্ল্যাটফর্মটি দেখতে নিম্নের চিত্রের মত\
    \ হবে।\n\n![](img/dc5085e6d9421ec89b6df1dc9cd4d0d9_2_0.png)\n\n**R-studio** হচ্ছে\
    \ আর প্রোগ্রামিং ল্যাঙ্গুয়েজের ব্যবহারকে সহজ করার জন্য একটি আইডিয়া। আই ডি ই\
    \ এর মানে হচ্ছে ইন্টিগ্রেটেড ডেভেলপমেন্ট এনভায়রনমেন্ট। পাইথন যেমন স্পাইডার থাকে\
    \ **R-studio** ঠিক তেমনি একটি আইডি যে। আর প্রোগ্রামিং ল্যাঙ্গুয়েজ কোন একটি প্রজেক্ট\
    \ শুরু করার আগে আপনাকে একটি প্রজেক্ট ফাইল মেনু থেকে নিতে প্রজেক্ট এর মাঝখানে শুরু\
    \ করতে হবে। নিউ প্রজেক্ট এর মাঝখানে একটি ডিরেক্টরি সিলেকশন করলে আপনার সমস্ত আর\
    \ প্রোগ্রামিং এর কাজ সহজ হয়ে **save** হয়ে যাবে। তারপর ফাইল মেনু থেকে আপনি চাইলে\
    \ একটি আর স্ক্রিপ্ট অ্যাপেন্ড করে আপনার কাজ বা প্রোগ্রামিং শুরু করতে পারবেন। এইটলে\
    \ আপনাকে আর স্ক্রিপ্টাউটে গিয়ে নিতে ফাইল এবং তারপর স্ক্রিপ্ট ক্লিক করতে হবে।\
    \ স্ক্রিপ্ট অবশ্যই সেভ করবেন। আর প্রোগ্রামিং ল্যাঙ্গুয়েজ ৩ বিভিন্ন রকম অবজেক্ট\
    \ এর টাইপস থাকে। আর প্রোগ্রামিং ৩ পাইথন প্রোগ্রামিং অবজেক্ট অরিয়েন্টেড প্রোগ্রামিং\
    \ ল্যাঙ্গুয়েজ তাই বিভিন্ন টাইপের অবজেক্টকে নিয়ে এই দুইটি প্রোগ্রামিং ল্যাঙ্গুয়েজ\
    \ গড়ে উঠেছে। অবজেক্ট সাধারণত ভ্যারিয়েবল হিসেবে পরিচিত। একটি ভ্যারিয়েবল একটি\
    \ সাধারণ এলিমেন্ট কে নিয়ে গঠিত হয়। যেমন আর প্রোগ্রামিং এর চারটি গুরুত্বপূর্ণ\
    \ অবজেক্ট টাইপ হচ্ছে ভেক্টর, ম্যাট্রিক্স লিস্ট এবং ডাটাফ্রেম। প্রথমে আসি ভ্যাক্টরের\
    \ উদাহরণ। ভ্যাক্টর হচ্ছে একই জাতীয় এলিমেন্টস, এনটিটি অথবা ইউনিট নিয়ে গড়ে ওঠা\
    \ একটি অবজেক্ট টাইপ। নিচের উদাহরণটি লক্ষ করলে আমরা দেখব প্রায় একটি ভেক্টরের মধ্যে\
    \ সি ফাংশন ব্যবহার করে প্রাইসের কয়েকটি গুরুত্বপূর্ণ ইনফরমেশন সংরক্ষণ করে রাখা\
    \ হয়েছে।\n\n```\nPrice <- c(2,3,4)\nPrice[3]\n```\n\nএখানে লক্ষ করলে দেখা যাবে\
    \ যে প্রাইস ভ্যারিয়েবল এ একই টাইপের ল্যাবের রয়েছে। আর প্রাগ্রামিংয়ে ভেক্টরের\
    \ ব্যবহার অধিক গুরুত্বপূর্ণ। আর এবং পাইথনের একটি গুরুত্বপূর্ণ মূল পার্থক্য হয়\
    \ আর প্রাগ্রামিং সবসময় ভেক্টর অবজেক্ট নিয়ে মূলত কাজ করে অন্যদিকে পাইথন সাধারণত\
    \ লিস্ট অবজেক্ট টাইপ নিয়ে কাজ করে। উপরের উদাহরণটি থেকে খুব পরিষ্কার ভাবে আমরা\
    \ বুঝতে পারি আর প্রাগ্রামিংয়ে প্রথমে একটি অবজেক্ট তারপর একটি ফাংশন এবং সেই ফাংশনে\
    \ কিছু সম্ভাব্য বা সম্ভাব্যিয় সংখ্যা বা এলিমেন্টস নিয়ে একটি ভেক্টর গঠিত হয়।\
    \ সি ফাংশন ভেক্টর গঠনে সাহায্য করেছে তাকে আমরা **concatenate** ফাংশন বলি। নিচে\
    \ একটি ভেক্টরের কিছু গুরুত্বপূর্ণ বৈশিষ্ট্য উল্লেখ করা হলো। যেমন আমরা যদি ভেক্টরের\
    \ **length** দেখতে চাই অথবা এলিমেন্ট এর অবস্থান কত নম্বরে রয়েছে তা দেখতে চাই\
    \ তাহলে এই উদাহরণগুলো সাহায্য নিয়ে কাজ শুরু করা যাবে।\n\n```\nPrice <- c(10,3,15)\n\
    Price\n## [1] 10  3 15\nlength(Price)\n## [1] 3\nPrice[1]\n## [1] 10\n```\n\n\
    and the second and third elements:\n\n```\nPrice[2:3]\n## [1]  3 15\n```\n\nএবার\
    \ এসে নিচে করি।\n\nIn an R Script, type in the following two vectors in R: $Price2\
    \ \\leftarrow c(2, 12, 7, 33)$ and $Quantity2 \\leftarrow c(23, 32, 12, 33)$.\
    \ Then extract the fourth element of Price2 and Quantity2, calculate Expenditure2\
    \ and TotalExpenditure2, following what we did above with the vectors Price and\
    \ Quantity. Save the script file, we will continue the exercise.\n\nআর প্রগ্রামিং\
    \ এর আরেকটি গুরুত্বপূর্ণ অংশটি হচ্ছে ম্যাট্রিক্স। ম্যাট্রিক্স হচ্ছে একটি নির্দিষ্ট\
    \ সংখ্যক কলাম এবং র এর সমন্বয়ে একটি ভেক্টর অথবা আপনি যদি একটি ভেক্টর কে নির্দিষ্ট\
    \ সংখ্যক কলাম এবং র দিয়ে প্রকাশ করেনে তাহলে তা ম্যাট্রিক্স হিসেবে বিবেচিত হবে।\
    \ নিচে এই ধরনের ম্যাট্রিক্স গঠনের উদাহরণ দেওয়া হল।\n\n```\nMatrix_PQE <- matrix(data\
    \ = cbind(Price, Quantity, Expenditure)\n, ncol=3)\nMatrix_PQE\n##      [,1] [,2]\
    \ [,3]\n## [1,]   10   25  250\n## [2,]    3    3    9\n## [3,]   15   20  300\n\
    ```\n\nWe print the first row of the matrix.\n\n```\nMatrix_PQE[1,]\n## [1]  10\
    \  25 250\n```\n\nand then the second column.\n\n```\nMatrix_PQE[,2]\n## [1] 25\
    \  3 20\n```\n\nFirst row, second column:\n\n```\nMatrix_PQE[1,2]\n## [1] 25\n\
    ```\n\nএবার কথা বলব ডেটা ফ্রেম নিয়ে। ডেটা ফ্রেম হচ্ছে দুটি ভ্যারিয়েবল অথবা ভেক্টর\
    \ কে একত্রিত করে একেল এর মত একটি স্প্রেডশিট গঠন করা। নিচের উদাহরণটি লক্ষ্য করলে\
    \ বিষয়টি সহজে আমরা বুঝতে পারবো:\n\n```\nExp_data <- data.frame(Price, Quantity)\n\
    Exp_data\n##   Price Quantity\n## 1    10       25\n## 2     3        3\n## 3\
    \    15       20\n```\n\nএসে নিজে করি।\n\nCreate a data frame containing the vectors\
    \ Price2 and Quantity2. Try to print the first column of the data frame.\n\nYou\
    \ can find all R tutorial in Dr Munshi Naser- Skill Tone Youtube Channel\n\nআর\
    \ প্রাথমিক এর সর্বোচ্চ অবজেক্ট টাইপ হচ্ছে লিস্ট। লিস্ট হচ্ছে বিভিন্ন টাইপের এলিমেন্ট\
    \ ইউনিটকে একগ্রিত করে অবজেক্ট গঠন প্রক্রিয়া। অর্থাৎ একটি লিস্ট ফাংশনে রয়েছে\
    \ বিভিন্ন টাইপের অবজেক্ট। যেমন নিচের উদাহরণটি লক্ষ্য করলে আমরা দেখব এখানে আপনি\
    \ চাইলে সংখ্যা এবং ক্যারেক্টার উভয়ই ব্যবহার করে একটি লিস্ট অবজেক্ট তৈরি করতে\
    \ পারবেন।\n\n```\nExpenditure_list <- list(Price, Quantity, Expenditure,\n   \
    \                     Total_expenditure)\nExpenditure_list\n```\n\nThe index for\
    \ a list uses a double bracket. We print the second element below.\n\n```\nExpenditure_list[[2]]\n\
    ## [1] 25  3 20\n```"
  mdcn: "## R 与 Python 初级语言学习的简单技巧\n\n我之前已经写过两本关于 R 初级语言的书。写这本书的目的是基于我的经验，与大家分享为什么我们需要学习\
    \ R 和 Python 这两种初级语言以应对未来，以及如何能在最短时间内学会它们。关于学习初级语言，有一个主张：从儿童开始，直到所有受益的个体，为了在未来世界中生存和发展，都必须学习初级语言。初级语言本质上是向计算机发出指令或命令的语言。如果能熟练掌握这门语言，那么理解它将不再困难。了解初级语言后，通过数据的运用，你可以极大地提升自己和你的业务。因此，本书将揭示如何一起学习\
    \ R 和 Python 这两种初级语言，以及我们如何以最小的成本将其应用于实践的核心秘诀。本书主要是一份完整的指南，面向那些目前对计算机感兴趣、并致力于通过数据科学建立职业生涯的儿童和青少年。希望本书能介绍\
    \ R 和 Python 的语法结构，并为孩子们提供一些简单的 Python 代码，这将使孟加拉国的每一位公民为迎接未来的第四次儿童革命做好更充分的准备。\n\
    \n## 第一章：R 和 Python 适合谁？\n\nR 和 Python 主要用于不同人群的不同工作。并非每个人都需要学习 R 和使用 Python 工作。对于那些未来想了解一种通用语言（即通用目的语言），并希望通过这种知识在未来开发应用程序的人来说，从\
    \ Python 开始是一个很好的教育。对于那些希望获得计算机或 R 基础知识的儿童和青少年，我认为从 Python 开始是正确的。那么问题来了，R 初级语言主要是为谁准备的？R\
    \ 初级语言是为那些未来想进行数据分析或想成为数据分析师的人准备的完整初级语言。此外，对于那些长大后想成为数据科学家，并通过该领域建立自己职业生涯的人来说，R\
    \ 初级语言或 Python 都极其重要。\n\n本书将讨论 R 初级语言和 Python 初级语言的各个方面，并讨论哪些 Python 主题对我们的孩子来说是重要的学习内容。本书的主要目的是讨论如何一起学习\
    \ R 和 Python 初级语言以节省时间，以及通过学习，你如何在职业生涯中运用它们。那么，让我们首先尝试向大家介绍 R 和 Python 语法结构的差异以及一些基本技巧。\n\
    \n## R 初级语言学习的简单技巧\n\n本章首先将介绍 R 初级语言的基本结构、示例和一些简单的命令。为了学习 R 初级语言，如果你练习本章的每一个主题，你将能够在极短的时间内自己解决\
    \ R 代码中的所有问题。\n\n只需要重视三件事。\n\n首先，学习新事物的意愿。\n\n其次，一台计算机。\n\n以及本书，它将为你提供关于学习 R 和\
    \ Python 初级语言技巧的指导。\n\nR 初级语言是一种函数式初级语言。R 初级语言通常由以下句子结构控制。每个 R 命令都根据以下公式或代码语法构建。\n\
    \n```\nnew object ← function( object or formula , object information , options\
    \ )\n```\n\n或者\n\n```\nobject<- function(argument name= argument information/value,\
    \ option)\n```\n\n了解这个代码构建过程对于学习 R 初级语言至关重要。通过这个过程，可以构建任何代码来执行任何类型的命令。下面再举一个例子来解释上面的代码构建过程。\n\
    \n```\nPrice <- c(21, 31, 34)\n```\n\nR 的 **r-studio** 是完全免费的软件。你可以访问以下网站下载这两个软件。\n\
    \nhttp://www.r-project.org/\n\nhttp://www.rstudio.com/\n\n然后，通过下载并安装，**R-studio**\
    \ 平台将如下图所示。\n\n![](img/dc5085e6d9421ec89b6df1dc9cd4d0d9_2_0.png)\n\n**R-studio**\
    \ 是一个为了简化 R 编程语言使用而设计的 IDE。IDE 的意思是集成开发环境。就像 Python 有 Spyder 一样，**R-studio** 也是一个\
    \ IDE。在开始任何 R 编程项目之前，你需要从项目菜单中创建一个新项目。在新项目中选择一个目录，你所有的 R 编程工作将变得简单并自动保存。然后，你可以从文件菜单中附加一个\
    \ R 脚本，开始你的工作或编程。为此，你需要进入 R 脚本输出，然后点击文件和脚本。务必保存脚本。R 编程语言有三种不同的对象类型。R 编程和 Python\
    \ 编程是面向对象的编程语言，因此这两种编程语言由不同类型的对象构成。对象通常被称为变量。一个变量由一个基本元素组成。例如，R 编程的四个重要对象类型是向量、矩阵、列表和数据框。首先来看向量的例子。向量是由相同类型的元素、实体或单位构成的对象类型。观察下面的例子，我们可以看到在一个向量中，使用\
    \ c 函数存储了价格的一些重要信息。\n\n```\nPrice <- c(2,3,4)\nPrice[3]\n```\n\n这里需要注意的是，价格变量中包含相同类型的标签。在\
    \ R 编程中，向量的使用非常重要。R 和 Python 的一个重要区别在于，R 编程主要处理向量对象，而 Python 通常处理列表对象类型。从上面的例子可以非常清楚地理解，在\
    \ R 编程中，首先是一个对象，然后是一个函数，该函数包含一些可能的数字或元素，构成一个向量。c 函数帮助构建向量，我们称之为 **concatenate**\
    \ 函数。下面列出了一些向量的重要特征。例如，如果我们想查看向量的 **length**，或者想查看元素的位置编号，那么可以借助这些例子开始工作。\n\n\
    ```\nPrice <- c(10,3,15)\nPrice\n## [1] 10  3 15\nlength(Price)\n## [1] 3\nPrice[1]\n\
    ## [1] 10\n```\n\n以及第二个和第三个元素：\n\n```\nPrice[2:3]\n## [1]  3 15\n```\n\n现在来完成下面的练习。\n\
    \n在 R 脚本中，输入以下两个向量：$Price2 \\leftarrow c(2, 12, 7, 33)$ 和 $Quantity2 \\leftarrow\
    \ c(23, 32, 12, 33)$。然后提取 Price2 和 Quantity2 的第四个元素，计算 Expenditure2 和 TotalExpenditure2，遵循我们上面使用\
    \ Price 和 Quantity 向量所做的操作。保存脚本文件，我们将继续练习。\n\nR 编程的另一个重要部分是矩阵。矩阵是由特定数量的列和行组合而成的向量，或者如果你用特定数量的列和行来表示一个向量，那么它将被视为矩阵。下面给出了构建此类矩阵的示例。\n\
    \n```\nMatrix_PQE <- matrix(data = cbind(Price, Quantity, Expenditure)\n, ncol=3)\n\
    Matrix_PQE\n##      [,1] [,2] [,3]\n## [1,]   10   25  250\n## [2,]    3    3\
    \    9\n## [3,]   15   20  300\n```\n\n我们打印矩阵的第一行。\n\n```\nMatrix_PQE[1,]\n##\
    \ [1]  10  25 250\n```\n\n然后是第二列。\n\n```\nMatrix_PQE[,2]\n## [1] 25  3 20\n```\n\
    \n第一行，第二列：\n\n```\nMatrix_PQE[1,2]\n## [1] 25\n```\n\n现在来谈谈数据框。数据框是将两个变量或向量组合在一起，形成一个类似电子表格的结构。观察下面的例子，我们可以轻松理解：\n\
    \n```\nExp_data <- data.frame(Price, Quantity)\nExp_data\n##   Price Quantity\n\
    ## 1    10       25\n## 2     3        3\n## 3    15       20\n```\n\n现在自己动手试试。\n\
    \n创建一个包含向量 Price2 和 Quantity2 的数据框。尝试打印数据框的第一列。\n\n你可以在 Munshi Naser 博士的 Skill\
    \ Tone Youtube 频道找到所有 R 教程。\n\nR 初级语言的最高级对象类型是列表。列表是将不同类型的元素单元组合在一起构建对象的过程。也就是说，一个列表函数包含不同类型的对象。例如，观察下面的例子，我们可以看到你可以使用数字和字符来创建一个列表对象。\n\
    \n```\nExpenditure_list <- list(Price, Quantity, Expenditure,\n              \
    \          Total_expenditure)\nExpenditure_list\n```\n\n列表的索引使用双括号。我们在下面打印第二个元素。\n\
    \n```\nExpenditure_list[[2]]\n## [1] 25  3 20\n```"
