    স্পাইডার থাকে **R-studio** ঠিক তেমনি একটি আইডি যে। আর প্রোগ্রামিং ল্যাঙ্গুয়েজ
    কোন একটি প্রজেক্ট শুরু করার আগে আপনাকে একটি প্রজেক্ট ফাইল মেনু থেকে নিতে প্রজেক্ট
    এর মাঝখানে শুরু করতে হবে। নিউ প্রজেক্ট এর মাঝখানে একটি ডিরেক্টরি সিলেকশন করলে
    আপনার সমস্ত আর প্রোগ্রামিং এর কাজ সহজ হয়ে **save** হয়ে যাবে। তারপর ফাইল মেনু
    থেকে আপনি চাইলে একটি আর স্ক্রিপ্ট অ্যাপেন্ড করে আপনার কাজ বা প্রোগ্রামিং শুরু
    করতে পারবেন। এইটলে আপনাকে আর স্ক্রিপ্টাউটে গিয়ে নিতে ফাইল এবং তারপর স্ক্রিপ্ট
