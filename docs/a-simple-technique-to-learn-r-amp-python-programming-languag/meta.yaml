    \ গঠন প্রক্রিয়া। অর্থাৎ একটি লিস্ট ফাংশনে রয়েছে বিভিন্ন টাইপের অবজেক্ট। যেমন\
    \ নিচের উদাহরণটি লক্ষ্য করলে আমরা দেখব এখানে আপনি চাইলে সংখ্যা এবং ক্যারেক্টার\
    \ উভয়ই ব্যবহার করে একটি লিস্ট অবজেক্ট তৈরি করতে পারবেন।\n\n```\nExpenditure_list\
    \ <- list(Price, Quantity, Expenditure,\n                        Total_expenditure)\n\
    Expenditure_list\n```\n\nThe index for a list uses a double bracket. We print\
    \ the second element below.\n\n```\nExpenditure_list[[2]]\n## [1] 25  3 20\n```"
- md: "নিচে একটি উদাহরণ দেওয়া হলো যা উপরের প্রত্যেকটি অবজেক্ট টাইপ অর্থাৎ ভেক্টর,\
    \ ম্যাট্রিক্স, ডাটা ফ্রেম এবং লিস্ট একত্রিত করে উদাহরণটি সাজানো হয়েছে। আপনি চাইলে\
    \ নিজে নিজে এই উদাহরণটি ফলো করে আপনার অবজেক্ট তৈরি করে অনুশীলন করতে পারবেন।\n\n\
    ## Toy Example: Net Present Value\n\nWe calculate the present value of a sum of\
    \ money (121) received two years from now, the discount rate is 10%. First, we\
    \ tell R what the values are:\n\n```\nAmount <- 121\ndiscount_rate <- 0.10\ntime\
    \ <- 2\n```\n\nThen we tell R how to calculate the net present value.\n\n```\n\
    Net_present_value <- Amount/(1+discount_rate)^time\nNet_present_value\n## [1]\
    \ 100\n```\n\n## অধ্যায় দুই : আর প্রোগ্রামিং ও ডাটা সায়েন্স\n\nবর্তমান সময়ের\
    \ সবচেয়ে জনপ্রিয় আর প্রোগ্রামিং প্যাকেজ এর নাম হচ্ছে **Tidyverse**। এই প্যাকেজটি\
    \ ব্যবহার করে আপনি ডাটা সায়েন্স এর যে স্টেপ গুলো রয়েছে তা প্রত্যেকটি সম্পন্ন\
    \ করতে পারবেন খুবই সহজে। আমরা যারা ডাটা সায়েন্স নিয়ে চিন্তিত এবং কাজ শিখতে চাই\
    \ তারা খুব সহজেই এই প্যাকেজটি দিয়ে শুরু করতে পারেন। এই প্যাকেজটিতে রয়েছে মূলত\
    \ চারটি ধাপ একটি হচ্ছে ডাটাকে কিন করা তারপর ডাটাকে ট্রান্সফর্ম বা আপনার নিজের\
    \ মতো করে তৈরি করা, তারপর ডাটাকে ভিজুয়ালাইজ করা এবং সবশেষে মডেল তৈরি করে তার\
    \ আউটপুট কমিউনিকেট করা। **Tidyverse** প্যাকেজটিতে রয়েছে **Hadley Wickham** তৈরি\
    \ করেকাটি **built-in** ইন্সট্রাকশন যা দিয়ে খুব সহজেই আর প্রোগ্রামিং ব্যবহার করে\
    \ ডাটা সায়েন্স এবং মেশিন লার্নিং এর কাজগুলো করা যায় খুব সহজে। যারা আর প্রোগ্রামিং\
    \ ল্যাংগুয়েজ কেবলমাত্র ডাটা সায়েন্স শিখার জন্য শুরু করছেন তাদের জন্য এই প্যাকেজটি\
    \ হতে গারে একটি বেস্ট লার্নিং প্যাকেজ। নিচে এই প্যাকেল এর প্রত্যেকটি ধাপ কোডের\
    \ মাধ্যমে উদাহরণ দিয়ে শিখার চেষ্টা করা হয়েছে। প্রথমে এই প্যাকেট এর শুরু করার\
    \ আগে আমরা একটি ডাটা সেট নিব আর প্রোগ্রামিং ও **built-in** ডাটা সেট থেকে তারপর\
    \ আমরা একে ডাটা ফ্রেম যা **Tidyverse** প্যাকেলে **tibble** নামে পরিচিত ট্রান্সফর\
    \ করার পর এই ডাটা সেটটিকে বিভিন্ন ফাংশন ব্যবহার করে আমরা আমাদের মত করে সাজিয়ে\
    \ কাজ শুরু করতে পারি। **Tidyverse** প্যাকেজটিতে রয়েছে পাঁচটি গুরুত্বপূর্ণ ফাংশন।\
    \ এই ফাংশনগুলো ব্যবহার খুবই সহজ। এই ফাংশন গুলো ব্যবহার করার আগে তার একটি কমন কোড\
    \ ইন্সট্রাকশন নিতে দেখালে হলো। এই কোড ইন্সট্রাকশন ফলো করলে এই প্যাকেট এর প্রত্যেকটি\
    \ ফাংশন ব্যবহার করা অনেক সহজ হবে। এই বইয়ের মাধ্যমে আপনারা ডাটা সায়েন্স বা ডাটা\
    \ এনালাইসিস এর কাজ এই ফাংশন গুলো ব্যবহার করে শুরু করতে পারবেন।\n\n**verbs(dataset,\
    \ argument name=argument values)**\nAlso use pipe operator “%>%” like x%>%y()\
    \ This means take x and then apply the function y()\n\nডাটা সাইন্স, ডাটা ক্লিনিং,\
    \ ডাটা ভিজুয়ালাইজেশন অথবা ডাটা নিয়ে কোনোরকম অ্যানালাইসিস করার জন্য আপনাকে প্রথমেই\
    \ ডাটাকে বুঝতে হবে। আর ডাটা সাইন্স বা ডাটা বোঝার জন্য ব্যবহার জন্য হাটলি উইকহাম\
    \ **Tidyverse Package** এর কাল বিকল্প নেই। **Tidyverse**প্যাকেজটিতে রয়েছে পাঁচটি\
    \ গুরুত্বপূর্ণ ফাংশন যা আপনারা ডাটা কে তৈরি করে দিবে অ্যানালাইসিসের জন্য। এই ফাংশনগুলোর\
    \ নাম হচ্ছে **filter, select, mutate, summarize** এবং **arrange**। এই পাঁচটি ফাংশন\
    \ কে একত্রে **five data verbs** বলা হয়। নিচে এই প্রত্যেকটি **verb** কিভাবে আপনি\
    \ ব্যবহার করবেন ডাটা ক্লিনিং এর জন্য তার সহজ স্ট্রাকচার দেখানো হলো। এই স্ট্রাকচার\
    \ ফলে করে **tidyverse** প্যাকেজের পাঁচটি **verb**-এর মাধ্যমে ডাটা সাইন্স এর অসিটাগ\
    \ ডাটা ক্লিনিং এর কাজ করা যাবে খুব সহজে। নিচে এই প্রত্যেকটি বিষয় উদাহরণসহ কিভাবে\
    \ করতে হবে তা দেখানো হলো। ডাটা ভিজুয়ালাইজেশন এর জন্য আরো একটি গুরুত্বপূর্ণ প্যাকেজ\
    \ হচ্ছে **ggplot2**। নিচে **ggplot2** প্যাকেজটি ব্যবহার করে কিভাবে বিভিন্ন গ্রাফ\
    \ তৈরি করতে পারবেন খুব তাড়াতাড়ি তার উদাহরণ দেওয়া হলো। সর্বশেষে ডাটা ভিজুয়ালাইজেশন\
    \ এবং ক্লিনিং এর পরে আপনি মডেল তৈরি করতে পারবেন। আর এই মডেল তৈরি করার জন্য সবচেয়ে\
    \ কমন যে মডেল টি ব্যবহার করা হয় তার নাম হচ্ছে লিনিয়ার মডেল। নিচে এই লিনিয়ার\
    \ মডেলে কিভাবে আপনি একটি অ্যানালাইসিস রান করবেন তার উদাহরণ দেখা দেখানো হলো।\n\n\
    ## Data Analysis Workflow\n\n- 1. Get data into R,\n- 2. tidy and transform,\n\
    - 3. visualize and model, and\n- 4. communicate.\n\n## The Tidyverse Package\n\
    \n```\ninstall.packages(\"tidyverse\")\n\nlibrary(tidyverse)\n\nsurv_id <- c(1,2,3,4,5,6)\n\
    payment <- c(1000,700,600,1200,800,500)\nhours <- c(7,5,3,6,7,4)\ngender <- c(\"\
    F\",\"M\",\"F\",\"M\",\"M\",\"M\")\nage <- c(28,52,37,35,59,43)\n```\n\nIn R,\
    \ data is usually stored in a data frame. Wickham has designed a ‘tibble’ to improve\
    \ on R’s data frame. A tibble, which is similar to a data frame, stores our data.\
    \ We call our tibble labour. We create a tibble with the `tibble()` function.\n\
    \n```\nlabour <- tibble(surv_id,\n  payment, hours,\n  gender,age)\n```\n\n```\n\
    labour\n## # A tibble: 6 x 5\n##   surv_id payment hours gender   age\n##    \
    \ <dbl>   <dbl> <dbl> <chr>  <dbl>\n## 1       1    1000     7 F         28\n\
    ## 2       2     700     5 M         52\n## 3       3     600     3 F        \
    \ 37\n## 4       4    1200     6 M         35\n## 5       5     800     7 M  \
    \       59\n## 6       6     500     4 M         43\n```\n\nWe get a glimpse of\
    \ our data with the `glimpse` function.\n\n```\nglimpse(labour)\n## Observations:\
    \ 6\n## Variables: 5\n## $ surv_id <dbl> 1, 2, 3, 4, 5, 6\n## $ payment <dbl>\
    \ 1000, 700, 600, 1200, 800, 500\n## $ hours   <dbl> 7, 5, 3, 6, 7, 4\n## $ gender\
    \  <chr> \"F\", \"M\", \"F\", \"M\", \"M\", \"M\"\n## $ age     <dbl> 28, 52,\
    \ 37, 35, 59, 43\n```\n\nWe can now write our data to a csv file, with the `write_csv`\
    \ function, and then we read this file into RStudio with the `read_csv` function:\n\
    \n```\nwrite_csv(labour, \"labour.csv\")\nlabour2 <- read_csv(\"~/Documents/R/ies2018/labour.csv\"\
    )\n```\n\nFive data verbs help us do a lot with data. We use these with the help\
    \ of the `dplyr` package written by Wickham, contained in the `tidyverse` package.\n\
    The five data verbs are:\n\n- `filter` to pick certain rows\n- `select` to pick\
    \ columns\n- `mutate` to generate new variables\n- `summarize` to summarize\n\
    - `arrange` to sort in some order\n\nAll of these can be used with the `group_by()`\
    \ function.\nThese five verbs, along with the pipe symbol, help us accomplish\
    \ a lot when working with data. The pipe symbol\n\n```\n%>%\n```\n\nhelps us string\
    \ together commands. The following commands are equivalent.\n\n```\nf(x,y)\n```\n\
    \nis equivalent to\n\n```\nx %>%\nf(,y)\n```\n\nThe pipe symbol pipes x into the\
    \ function of x and y. So what is on the left of the pipe gets piped as the first\
    \ argument of the function on the right. This might appear strange at first and\
    \ takes some getting used to, but it greatly helps us carry out actions on data\
    \ that build on each other and makes code easier to understand.\n\n## We select\
    \ rows by using `filter`.\n\n```\nlabour_filter <- labour %>%\n  filter(gender\
    \ == \"F\")\n```\n\n```\nlabour_filter\n## # A tibble: 2 x 5\n##   surv_id payment\
    \ hours gender   age\n##     <dbl>   <dbl> <dbl> <chr>  <dbl>\n## 1       1  \
    \  1000     7 F         28\n## 2       3     600     3 F         37\n```\n\n```\n\
    labour_filter <- filter(labour, gender == \"F\")\n```\n\n```\nlabour_filter\n\
    ## # A tibble: 2 x 5\n##   surv_id payment hours gender   age\n##     <dbl>  \
    \ <dbl> <dbl> <chr>  <dbl>\n## 1       1    1000     7 F         28\n## 2    \
    \   3     600     3 F         37\n```\n\nWe create new variables with mutate;\
    \ we calculate the wage rates.\n\n```\nlabour_mutate <- labour %>%\n  mutate(wage\
    \ = payment /\n         hours)\n```\n\n```\nlabour_mutate\n## # A tibble: 6 x\
    \ 6\n##   surv_id payment hours gender   age  wage\n##     <dbl>   <dbl> <dbl>\
    \ <chr>  <dbl> <dbl>\n## 1       1    1000     7 F         28  143.\n## 2    \
    \   2     700     5 M         52  140 \n## 3       3     600     3 F         37\
    \  200 \n## 4       4    1200     6 M         35  200 \n## 5       5     800 \
    \    7 M         59  114.\n## 6       6     500     4 M         43  125\n```\n\
    \nWe arrange the data by hours worked with arrange.\n\n```\nlabour_arrange <-\
    \ labour %>%\n  arrange(hours)\n```\n\nWe select the columns hours worked and\
    \ gender.\n\n```\nlabour_select <- labour %>%\n  select(hours, gender)\n```\n\n\
    We now summarize the data; grouping by gender. The group by here groups by gender;\
    \ we get the mean hours worked by females and males.\n\n```\nlabour_summary <-\
    \ labour %>%\n  group_by(gender) %>%\n  summarize(mean = mean(hours))\n\nlabour_summary\n\
    ## # A tibble: 2 x 2\n##   gender  mean\n##   <chr>  <dbl>\n## 1 F          5\n\
    ## 2 M        5.5\n```\n\nThe package ggplot2 in the tidyverse can do wonderful\
    \ visualizations.\n\n```\ngg1 <- ggplot(data = labour_mutate,\n              aes(x\
    \ = age, y = wage))\ngg1\n```\n\nWe use geom_point() to tell R that we want points\
    \ plotted.\n\n```\ngg2 <- gg1 +\n  geom_point()\ngg2\n```\n\n## Linear Model\n\
    \nWe can fit a linear model with the lm command.\n\n```\nage_wage_fit <- lm(wage\
    \ ~ age, data = labour_mutate)\n```"
  mdcn: "下面给出一个示例，该示例整合了上述每种对象类型，即向量、矩阵、数据框和列表，以组织示例。您可以自行跟随此示例，创建自己的对象进行练习。\n\n##\
    \ 玩具示例：净现值\n\n我们计算两年后收到的一笔款项（121）的现值，折现率为10%。首先，我们告诉R这些值是多少：\n\n```\nAmount <-\
    \ 121\ndiscount_rate <- 0.10\ntime <- 2\n```\n\n然后我们告诉R如何计算净现值。\n\n```\nNet_present_value\
    \ <- Amount/(1+discount_rate)^time\nNet_present_value\n## [1] 100\n```\n\n## 第二章：R编程与数据科学\n\
    \n当前最受欢迎的R编程包名为 **Tidyverse**。使用此包，您可以非常轻松地完成数据科学的每一个步骤。我们这些对数据科学感兴趣并想学习工作的人，可以非常容易地从这个包开始。这个包主要包含四个步骤：首先是清理数据，然后转换或按您的意愿创建数据，接着可视化数据，最后建立模型并传达其输出。**Tidyverse**\
    \ 包中包含 **Hadley Wickham** 创建的一个 **内置** 指南，通过它您可以非常轻松地使用R编程完成数据科学和机器学习的工作。对于那些仅仅为了学习数据科学而开始学习R编程语言的人来说，这个包可能是最好的学习包。下面尝试通过代码示例来学习这个包的每个步骤。首先，在开始这个包之前，我们将从R编程和\
    \ **内置** 数据集中获取一个数据集，然后将其转换为数据框，在 **Tidyverse** 包中称为 **tibble**，之后我们可以使用各种函数来整理这个数据集，使其符合我们的需求并开始工作。**Tidyverse**\
    \ 包中包含五个重要的函数。这些函数使用起来非常简单。在使用这些函数之前，先展示一个通用的代码指南。遵循此代码指南，使用此包的每个函数将变得容易得多。通过本书，您可以使用这些函数开始数据科学或数据分析的工作。\n\
    \n**verbs(dataset, argument name=argument values)**\n同时使用管道操作符“%>%”，例如 x%>%y()，这意味着取x然后应用函数y()\n\
    \n要进行数据科学、数据清理、数据可视化或任何与数据相关的分析，您首先必须理解数据。而为了理解数据，哈德利·威克姆的 **Tidyverse Package**\
    \ 是无与伦比的。**Tidyverse** 包中包含五个重要的函数，它们将为您准备数据以供分析。这些函数的名称是 **filter, select, mutate,\
    \ summarize** 和 **arrange**。这五个函数合称为 **五个数据动词**。下面展示了如何使用每个 **动词** 进行数据清理的简单结构。通过此结构，使用\
    \ **tidyverse** 包的五个 **动词**，可以非常轻松地完成数据科学中的大部分数据清理工作。下面将通过示例展示如何操作每个主题。对于数据可视化，另一个重要的包是\
    \ **ggplot2**。下面给出了使用 **ggplot2** 包快速创建各种图形的示例。最后，在数据可视化和清理之后，您可以建立模型。而建立模型最常用的模型是线性模型。下面展示了如何在该线性模型中运行分析的示例。\n\
    \n## 数据分析工作流程\n\n- 1. 将数据导入R，\n- 2. 整理和转换，\n- 3. 可视化和建模，以及\n- 4. 传达。\n\n## Tidyverse\
    \ 包\n\n```\ninstall.packages(\"tidyverse\")\n\nlibrary(tidyverse)\n\nsurv_id <-\
    \ c(1,2,3,4,5,6)\npayment <- c(1000,700,600,1200,800,500)\nhours <- c(7,5,3,6,7,4)\n\
    gender <- c(\"F\",\"M\",\"F\",\"M\",\"M\",\"M\")\nage <- c(28,52,37,35,59,43)\n\
    ```\n\n在R中，数据通常存储在数据框中。威克姆设计了一个‘tibble’来改进R的数据框。tibble类似于数据框，用于存储我们的数据。我们将我们的tibble命名为labour。我们使用\
    \ `tibble()` 函数创建一个tibble。\n\n```\nlabour <- tibble(surv_id,\n  payment, hours,\n\
    \  gender,age)\n```\n\n```\nlabour\n## # A tibble: 6 x 5\n##   surv_id payment\
    \ hours gender   age\n##     <dbl>   <dbl> <dbl> <chr>  <dbl>\n## 1       1  \
    \  1000     7 F         28\n## 2       2     700     5 M         52\n## 3    \
    \   3     600     3 F         37\n## 4       4    1200     6 M         35\n##\
    \ 5       5     800     7 M         59\n## 6       6     500     4 M         43\n\
    ```\n\n我们使用 `glimpse` 函数来概览我们的数据。\n\n```\nglimpse(labour)\n## Observations: 6\n\
    ## Variables: 5\n## $ surv_id <dbl> 1, 2, 3, 4, 5, 6\n## $ payment <dbl> 1000,\
    \ 700, 600, 1200, 800, 500\n## $ hours   <dbl> 7, 5, 3, 6, 7, 4\n## $ gender \
    \ <chr> \"F\", \"M\", \"F\", \"M\", \"M\", \"M\"\n## $ age     <dbl> 28, 52, 37,\
    \ 35, 59, 43\n```\n\n我们现在可以使用 `write_csv` 函数将数据写入csv文件，然后使用 `read_csv` 函数将此文件读入RStudio：\n\
    \n```\nwrite_csv(labour, \"labour.csv\")\nlabour2 <- read_csv(\"~/Documents/R/ies2018/labour.csv\"\
    )\n```\n\n五个数据动词帮助我们处理大量数据。我们在威克姆编写的 `dplyr` 包的帮助下使用它们，该包包含在 `tidyverse` 包中。\n\
    这五个数据动词是：\n\n- `filter` 用于选择特定行\n- `select` 用于选择列\n- `mutate` 用于生成新变量\n- `summarize`\
    \ 用于汇总\n- `arrange` 用于按某种顺序排序\n\n所有这些都可以与 `group_by()` 函数一起使用。\n这五个动词，连同管道符号，在处理数据时帮助我们完成很多工作。管道符号\n\
    \n```\n%>%\n```\n\n帮助我们将命令串联起来。以下命令是等效的。\n\n```\nf(x,y)\n```\n\n等效于\n\n```\nx\
    \ %>%\nf(,y)\n```\n\n管道符号将x传递给x和y的函数。因此，管道左侧的内容作为右侧函数的第一个参数传递。这起初可能看起来很奇怪，需要一些时间来适应，但它极大地帮助我们执行相互关联的数据操作，并使代码更易于理解。\n\
    \n## 我们使用 `filter` 选择行。\n\n```\nlabour_filter <- labour %>%\n  filter(gender ==\
    \ \"F\")\n```\n\n```\nlabour_filter\n## # A tibble: 2 x 5\n##   surv_id payment\
    \ hours gender   age\n##     <dbl>   <dbl> <dbl> <chr>  <dbl>\n## 1       1  \
    \  1000     7 F         28\n## 2       3     600     3 F         37\n```\n\n```\n\
    labour_filter <- filter(labour, gender == \"F\")\n```\n\n```\nlabour_filter\n\
    ## # A tibble: 2 x 5\n##   surv_id payment hours gender   age\n##     <dbl>  \
    \ <dbl> <dbl> <chr>  <dbl>\n## 1       1    1000     7 F         28\n## 2    \
    \   3     600     3 F         37\n```\n\n我们使用mutate创建新变量；我们计算工资率。\n\n```\nlabour_mutate\
    \ <- labour %>%\n  mutate(wage = payment /\n         hours)\n```\n\n```\nlabour_mutate\n\
    ## # A tibble: 6 x 6\n##   surv_id payment hours gender   age  wage\n##     <dbl>\
    \   <dbl> <dbl> <chr>  <dbl> <dbl>\n## 1       1    1000     7 F         28  143.\n\
    ## 2       2     700     5 M         52  140 \n## 3       3     600     3 F  \
    \       37  200 \n## 4       4    1200     6 M         35  200 \n## 5       5\
    \     800     7 M         59  114.\n## 6       6     500     4 M         43  125\n\
    ```\n\n我们使用arrange按工作小时数对数据进行排序。\n\n```\nlabour_arrange <- labour %>%\n  arrange(hours)\n\
    ```\n\n我们选择工作小时数和性别列。\n\n```\nlabour_select <- labour %>%\n  select(hours, gender)\n\
    ```\n\n我们现在汇总数据；按性别分组。这里的group by按性别分组；我们得到女性和男性的平均工作小时数。\n\n```\nlabour_summary\
    \ <- labour %>%\n  group_by(gender) %>%\n  summarize(mean = mean(hours))\n\nlabour_summary\n\
    ## # A tibble: 2 x 2\n##   gender  mean\n##   <chr>  <dbl>\n## 1 F          5\n\
    ## 2 M        5.5\n```\n\ntidyverse中的ggplot2包可以进行出色的可视化。\n\n```\ngg1 <- ggplot(data\
    \ = labour_mutate,\n              aes(x = age, y = wage))\ngg1\n```\n\n我们使用geom_point()告诉R我们想要绘制点。\n\
    \n```\ngg2 <- gg1 +\n  geom_point()\ngg2\n```\n\n## 线性模型\n\n我们可以使用lm命令拟合线性模型。\n\
    \n```\nage_wage_fit <- lm(wage ~ age, data = labour_mutate)\n```"
