    অ্যালগরিদম তৈরি করে রেখেছে। এখন আপনি এই অ্যালগরিদম কে ব্যবহার করে আপনার ডাটা এনালাইসিস,
    ডাটা ক্লিনিং, ভিজুয়ালাইজেশন করতে পারবেন খুব সহজেই। পাইথনে এই ধরনের মডিউল কে সাধারণত
    ব্যবহার করার মাধ্যমে ডাটা সাইন্স এর বেশিরভাগ কাজ অতি ত্বরত সম্পন্ন করা যায়। যেহেতু
    আমাদের এই বইয়ের উদ্দেশ্য হচ্ছে অনেক ত্বরত কিভাবে ডাটা সাইন্স এর কাজে পাইথনকে
    আমরা ব্যবহার করতে পারি তাই পাইথনের খুবই বেসিক ধারণাগুলো এই বইয়ে উল্লেখ করা হয়নি।
    এর মধ্যে ভ্যারিয়েবল ও অবজেক্ট নিয়ে আলাদা করে আমি এখানে কিছু বলিনি। সাধারণত আর
    প্রোগ্রামিংয়ের অবজেক্ট বা ভ্যারিয়েবলের মতোই পাইথন প্রোগ্রামিং এ অবজেক্ট তৈরি
    করা হয়। পার্থক্য হচ্ছে আর প্রোগ্রামিং ল্যাঙ্গুয়েজ একটি ডাটা এনালাইসিস এর জন্য
