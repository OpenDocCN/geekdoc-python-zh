    # Toy Example: Net Present Value


    We calculate the present value of a sum of money (121) received two years from
    now, the discount rate is 10%. First, we tell R what the values are:


    ```

    Amount <- 121

    discount_rate <- 0.10

    time <- 2

    ```


    Then we tell R how to calculate the net present value.


    ```

    Net_present_value <- Amount/(1+discount_rate)^time

    Net_present_value

    ## [1] 100

    ```


    # অধ্যায় দুই : আর প্রোগ্রামিং ও ডাটা সায়েন্স


    বর্তমান সময়ের সবচেয়ে জনপ্রিয় আর প্রোগ্রামিং প্যাকেজ এর নাম হচ্ছে **Tidyverse**।
    এই প্যাকেজটি ব্যবহার করে আপনি ডাটা সায়েন্স এর যে স্টেপ গুলো রয়েছে তা প্রত্যেকটি
    সম্পন্ন করতে পারবেন খুবই সহজে। আমরা যারা ডাটা সায়েন্স নিয়ে চিন্তিত এবং কাজ শিখতে
    চাই তারা খুব সহজেই এই প্যাকেজটি দিয়ে শুরু করতে পারেন। এই প্যাকেজটিতে রয়েছে মূলত
    চারটি ধাপ একটি হচ্ছে ডাটাকে কিন করা তারপর ডাটাকে ট্রান্সফর্ম বা আপনার নিজের মতো
    করে তৈরি করা, তারপর ডাটাকে ভিজুয়ালাইজ করা এবং সবশেষে মডেল তৈরি করে তার আউটপুট
    কমিউনিকেট করা। **Tidyverse** প্যাকেজটিতে রয়েছে **Hadley Wickham** তৈরি করেকাটি
    **built-in** ইন্সট্রাকশন যা দিয়ে খুব সহজেই আর প্রোগ্রামিং ব্যবহার করে ডাটা সায়েন্স
    এবং মেশিন লার্নিং এর কাজগুলো করা যায় খুব সহজে। যারা আর প্রোগ্রামিং ল্যাংগুয়েজ
    কেবলমাত্র ডাটা সায়েন্স শিখার জন্য শুরু করছেন তাদের জন্য এই প্যাকেজটি হতে গারে
    একটি বেস্ট লার্নিং প্যাকেজ। নিচে এই প্যাকেল এর প্রত্যেকটি ধাপ কোডের মাধ্যমে উদাহরণ
    দিয়ে শিখার চেষ্টা করা হয়েছে। প্রথমে এই প্যাকেট এর শুরু করার আগে আমরা একটি ডাটা
    সেট নিব আর প্রোগ্রামিং ও **built-in** ডাটা সেট থেকে তারপর আমরা একে ডাটা ফ্রেম
    যা **Tidyverse** প্যাকেলে **tibble** নামে পরিচিত ট্রান্সফর করার পর এই ডাটা সেটটিকে
    বিভিন্ন ফাংশন ব্যবহার করে আমরা আমাদের মত করে সাজিয়ে কাজ শুরু করতে পারি। **Tidyverse**
    প্যাকেজটিতে রয়েছে পাঁচটি গুরুত্বপূর্ণ ফাংশন। এই ফাংশনগুলো ব্যবহার খুবই সহজ। এই
    ফাংশন গুলো ব্যবহার করার আগে তার একটি কমন কোড ইন্সট্রাকশন নিতে দেখালে হলো। এই কোড
    ইন্সট্রাকশন ফলো করলে এই প্যাকেট এর প্রত্যেকটি ফাংশন ব্যবহার করা অনেক সহজ হবে।
    এই বইয়ের মাধ্যমে আপনারা ডাটা সায়েন্স বা ডাটা এনালাইসিস এর কাজ এই ফাংশন গুলো
    ব্যবহার করে শুরু করতে পারবেন।


