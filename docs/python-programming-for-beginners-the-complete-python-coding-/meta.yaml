    \n一种使数据更接近高斯分布（或至少更规整）的方法是使用幂变换，例如著名的Box-Cox变换，由Box和Cox（1964）提出，定义如下：\n\n$$\n\
    y(\\lambda) = \n\\begin{cases}\n\\frac{x^\\lambda - 1}{\\lambda} & \\text{if }\
    \ \\lambda \\neq 0 \\\\\n\\ln(x) & \\text{if } \\lambda = 0\n\\end{cases}\n$$\n\
    \n其思想是将数据$x$提升到某个幂次$\\lambda$。但请注意，这仅适用于非负数据点，因此在尝试应用此变换时需谨慎：原则上，一个好做法是取数据的绝对值，但这取决于科学家的判断。或者，可以使用Yeo和Johnson（1997）的幂变换，它同时适用于正值和负值。\n\
    \n```python\nIn [13]: pt = PowerTransformer(method='yeo-johnson')\n         data_gauss\
    \ = pt.fit_transform(X_scaled)\n\nIn [14]: print(\"----------Before Power Transformation----------\"\
    )\n         classification_plots.plot_hist(X_scaled,features,'MEDV')\n```\n\n\
    ----------Before Power Transformation----------\n\n很明显，由于缩放效应，特征之间存在显著的变异性：税收的量级是数千，而年龄的量级，不出所料，是数百。此外，它们大多数不是正态分布的，即相当偏斜，因此我们需要在拟合模型之前对其进行缩放。同时，我们（先验地）不知道哪些特征对我们的模型可能很重要，因此缩放是一种隐式地为显示不同尺度和量级的特征赋予相等权重的方法：只有在缩放之后，我们才能挑选出那些能更好地解释我们目标变量的特征（代价是失去一些物理可解释性）。\n\
    \n通常，我们使用scikit-learn中的StandardScaler方法来缩放数据：这确保每个特征的均值为零，方差为一，将所有特征带到相同的量级。另一种缩放方法是MinMaxScaler，它在最小值和最大值之间进行缩放，通常是零和一，但它是灵活的。如果我们需要处理一些具有固定边界的特征，这尤其有用：例如，如果我需要压缩一个范围在1到100之间的特征，那么使用这种方法是有意义的。相反，如果我们处理的是来自极值分布的数据，这种方法可能完全不适用。另一种是RobustScaler，它的工作方式类似于StandardScaler，但使用中位数和分位数，而不是均值和方差：当存在（或怀疑存在）异常值时，这绝对有用，因为中位数对异常值具有稳健性。最后，可以使用Normalizer方法，它特别适用于计数数据：这里的粒度是每一行，并且归一化每个特征向量，使其范数等于一。请注意，它也允许使用其他范数，例如L1范数，这基本上转化为按绝对值之和进行归一化（其长度应等于一）。\n\
    \n**注意。** 稀疏数据集是包含许多零的数据集：这在遗传学、文本分析甚至欺诈检测中非常常见。一个实际问题是，通常我们不想存储（所有）零，而只存储非零值：这并不容易，因为为每一行存储例如100,000个零会耗尽本地机器的内存。在这种情况下，使用例如StandardScaler是没有意义的，因为我们会从一个零值记录中减去一个非零均值，这可能会对缩放产生负面影响，并影响内存的使用。\n\
    \n回到波士顿数据集，我们现在尝试将StandardScaler应用于特征集，然后比较未缩放和缩放数据集之间的性能。\n\n```python\nIn [5]:\
    \ X_train, X_test, y_train, y_test = train_test_split(X, y,\n         test_size=0.3,\
    \ random_state=42)\n```\n\n我们在波士顿数据集上的简单示例将基于StandardScaler方法和使用KNeighborsRegressor方法的回归任务，当目标是连续的（如本例中的MEDV）时，这基本上是一个更复杂的模型。在缩放数据之前，让我们看看模型在未缩放数据上的表现。\n\
    \n```python\nIn [6]: scores_unscaled = cross_val_score(KNeighborsRegressor(),\n\
    \         X_train, y_train, cv=5)\n         scores_unscaled\n\nOut[6]: array([0.63515605,\
    \ 0.17772906, 0.34902784, 0.43737922,\n         0.37189903])\n```\n\n由于我们对模型进行了交叉验证，我们获得了与分割次数（本例中为五次）一样多的分数。因此，模型性能的一个良好总结性度量是取分数的平均值，如下所示：\n\
    \n```python\nIn [7]: np.mean(scores_unscaled), np.std(scores_unscaled)\nOut[7]:\
    \ (0.3942382409253963, 0.14786600926386584)\n```\n\n为了缩放数据，我们实例化Python类StandardScaler，并在缩放器对象上调用fit方法：这实际上意味着在训练数据上计算均值和标准差，而对训练数据的transform基本上是减去均值并除以标准差，应用于训练集中的每个数据点。\n\
    \n```python\nIn [8]: scaler = StandardScaler()\n         scaler.fit(X_train)\n\
    \n         X_train_scaled = scaler.transform(X_train)\n         X_test_scaled\
    \ = scaler.transform(X_test)\n\nIn [9]: scores_scaled = cross_val_score(KNeighborsRegressor(),\n\
    \         X_train_scaled, y_train, cv=5)\n\n         np.mean(scores_scaled), np.std(scores_scaled)\n\
    Out[9]: (0.7009222608410279, 0.029897124253597467)\n```\n\n我们看到，通过缩放数据，性能显著提高。但要小心：不同的缩放方法会导致不同的结果，这需要进行适当的探索性数据分析（EDA）或研究者给予足够的关注，以理解应用的最佳方法。最后但同样重要的是，应该注意，当我们运行scikit-learn的cross_val_score方法时，我们使用了整个缩放后的训练数据集：这意味着对于交叉验证中进行的每次不同分割，其对应的测试折已经用于找到适当的缩放，因此违反了我们要求训练集和测试集具有无偏估计的独立性假设。换句话说，我们正在从测试集泄露信息以找到最优缩放！此外，当进入生产环境时，新的、未见过的数据进入模型，但该集合不会用于缩放训练数据集，因此可能具有不同的缩放和值。为了克服这个问题，我们仅在训练数据集上拟合缩放，并使用交叉验证在验证集上评估模型性能。为了避免这类问题，我们使用Pipeline类，它允许通过链接这两个步骤在交叉验证内执行分割阶段。\n\
    \n```python\nIn [10]: pipeline = make_pipeline(StandardScaler(),\n          KNeighborsRegressor())\n\
    \          scores_pipe = cross_val_score(pipeline, X_train,\n          y_train,\
    \ cv=5)\n          np.mean(scores_pipe), np.std(scores_pipe)\n\nOut[10]: (0.6944726314773543,\
    \ 0.028669555232832964)\n```\n\n```python\nIn [11]: par_grid = {'kneighborsregressor__n_neighbors':\
    \ range(1,10)}\n          grid = GridSearchCV(pipeline, param_grid=par_grid, cv=5)\n\
    \          grid.fit(X_train, y_train)\n\n          print(\"Number of Neighbors\
    \ Best Parameter: \", grid.best_params_['kneighborsregressor__n_neighbors'])\n\
    \          print(\"Score on Test set: {:.4f}\".format(grid.score(X_test, y_test)))\n\
    ```\n\nNumber of Neighbors Best Parameter: 2\nScore on Test set: 0.7887\n\n```python\n\
