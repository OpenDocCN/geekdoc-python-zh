    \ import loadtxt\nfrom urllib import urlopen\nurl = \"https://goo.gl/vhm1eU\"\n\
    raw_data = urlopen(url)\ndataset = loadtxt(raw_data, delimiter=\",\")\nprint(dataset.shape)\n\
    ```\n\nThis example can be modified to load the same dataset directly from a URL\
