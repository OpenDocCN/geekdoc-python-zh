  md: 'We don’t know which algorithms would be good on this problem or what configurations
    to use. We get an idea from the plots that some of the classes are partially linearly
    separable in some dimensions, so we are expecting generally good results. Let’s
    evaluate six different algorithms:


    +   - Logistic Regression (LR).

    - Linear Discriminant Analysis (LDA).

    - Neighbors (KNN).

    - Classification and Regression Trees (CART).

    - Gaussian Naive Bayes (NB).

    - Support Vector Machines (SVM).


    This list is a good mixture of simple linear (LR and LDA), nonlinear (KNN, CART,
    NB and SVM) algorithms. We reset the random number seed before each run to ensure
    that the evaluation of each algorithm is performed using exactly the same data
    splits. It ensures the results are directly comparable. Let’s build and evaluate
    our five models:'
  merge: -1
  pgno: 344
- img_proc: true
  md: "```\n# Spot-Check Algorithms models = []\nmodels.append((\"LR\", LogisticRegression()))\n\
    models.append((\"LDA\", LinearDiscriminantAnalysis()))\nmodels.append((\"KNN\"\
    , KNeighborsClassifier()))\nmodels.append((\"CART\", DecisionTreeClassifier()))\n\
    models.append((\"NB\", GaussianNB()))\nmodels.append((\"SVM\", SVC()))\n# evaluate\
    \ each model in turn\nresults = []\nnames = []\nfor name, model in models:\n \
    \   kfold = KFold(n_splits=10, random_state=seed)\n    cv_results = cross_val_score(model,\
    \ X_train, Y_train, cv=kfold, scoring=\"accuracy\")\n    results.append(cv_results)\n\
    \    names.append(name)\n```\n\nListing 19.15: Evaluate a suite of algorithms\
    \ on the dataset.\n\n# 19.5.4 Select The Best Model\n\n```\nZeroth Value: 1\n\
    List Length: 4\n1\n2\n3\n4\n```"
