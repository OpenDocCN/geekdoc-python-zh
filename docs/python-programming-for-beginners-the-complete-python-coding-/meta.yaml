    be a diagonal line in which the True Positive Rate and False Positive Rate are
    always equal. The area under this ROC curve would be 0.5. This area is notably
    denoted by the acronym AUC, standing for Area Under the Curve. This is one way
    in which the AUC is an informative metric to evaluate a model. If the AUC is greater
    than 0.5, the model is better than random guessing. This is always a good sign.


    We can also compute the AUC using cross validation, which is useful when we want
    to be sure the result was not obtained by chance.


