    ## Regression Metrics


    In this section will review 3 of the most common metrics for evaluating predictions
    on regression machine learning problems:


    - Mean Absolute Error.

    - Mean Squared Error.


    ## Mean Absolute Error


    ```python

    # Cross Validation Regression

    # MAE

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LinearRegression


    filename = ''housing.csv''

    names = [''CRIM'', ''ZN'', ''INDUS'', ''CHAS'', ''NOX'', ''RM'', ''AGE'', ''DIS'',
    ''RAD'', ''TAX'', ''PTRATIO'', ''B'', ''LSTAT'', ''MEDV'']

    dataframe = read_csv(filename, delim_whitespace=True, names=names)

    array = dataframe.values

    X = array[:,0:13]

    Y = array[:,13]

    kfold = KFold(n_splits=10, random_state=7)

    model = LinearRegression()

    scoring = ''neg_mean_absolute_error''

    results = cross_val_score(model, X, Y, cv=kfold, scoring=scoring)

    print("MAE : %.3f (%.3f)" % (results.mean(), results.std()))

    ```


    The Mean Absolute Error (or MAE) is the sum of the absolute differences between
    predictions and actual values. It gives an idea of how wrong the predictions were.
    The measure gives an idea of the magnitude of the error, but no idea of the direction
    (e.g. over or under predicting). The example below demonstrates calculating mean
    absolute error on the Boston house price dataset.


    Listing 10.11: Example of evaluating an algorithm by Mean Absolute Error.


    ```python

