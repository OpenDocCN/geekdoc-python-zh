    既然你已经知道了两种深入了解数据的方法，就可以开始处理数据了。在下一课中，你将学习如何准备数据，以便最好地向建模算法展示问题的结构。


    ## 第 7 章 为机器学习准备数据


    许多机器学习算法对你的数据有假设。通常，以最佳方式准备数据，以便向你打算使用的机器学习算法展示问题的结构，是一个非常好的主意。在本章中，你将学习如何使用 scikit-learn
    在 Python 中为机器学习准备数据。完成本课后，你将知道如何：


    1.  重新缩放数据。

    2.  标准化数据。

    3.  归一化数据。

    4.  二值化数据。


    让我们开始吧。


    ### 7.1 数据预处理的要求


    你几乎总是需要预处理数据。这是一个必要的步骤。一个难点是，不同的算法对你的数据有不同的假设，可能需要不同的转换。此外，即使你遵循所有规则并准备好了数据，有时算法在不进行预处理的情况下也能取得更好的结果。


    通常，我建议创建数据的多种不同视图和转换，然后在每个数据集视图上尝试几种算法。这将有助于你找出哪些数据转换可能更有利于普遍地展示问题的结构。


    ### 7.2 数据转换


    在本课中，你将学习 4 种不同的机器学习数据预处理方法。每种方法都使用 Pima 印第安人糖尿病数据集。每种方法遵循相同的结构：


    1.  从 URL 加载数据集。

    2.  将数据集拆分为用于机器学习的输入和输出变量。

    3.  对输入变量应用预处理转换。

    4.  汇总数据以显示变化。


    scikit-learn 库提供了两种标准的数据转换模式。它们在不同的情况下都很有用。这些转换的计算方式使得它们可以应用于你的训练数据以及你将来可能拥有的任何数据样本。scikit-learn
    文档中有关于如何使用各种不同预处理方法的信息：


    -  拟合与多次转换。

    -  组合拟合与转换。


    拟合与多次转换方法是首选方法。你调用 `fit()` 函数在你的数据上一次性准备转换的参数。然后，你可以在相同的数据上使用 `transform()` 函数来为建模做准备，也可以在测试集、验证集或你将来可能看到的新数据上再次使用。组合拟合与转换是一种便捷方式，可用于一次性任务。如果你对绘制或汇总转换后的数据感兴趣，这可能很有用。你可以查阅
    scikit-learn 中的预处理 API。


    ### 7.3 重新缩放数据


    ```python

    # Rescale data (between 0 and 1)

    from pandas import read_csv

    from numpy import set_printoptions

    from sklearn.preprocessing import MinMaxScaler

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    # separate array into input and output components

    X = array[:,0:8]

    Y = array[:,8]

    scaler = MinMaxScaler(feature_range=(0, 1))

    rescaledX = scaler.fit_transform(X)

    ```


    当你的数据由具有不同尺度的属性组成时，许多机器学习算法可以通过将属性重新缩放到相同的尺度而受益。这通常被称为归一化，属性通常被重新缩放到 0 到 1 之间的范围。这对于机器学习算法核心中使用的优化算法（如梯度下降）很有用。对于像回归和神经网络这样对输入进行加权的算法，以及像
    K 近邻这样使用距离度量的算法，它也很有用。你可以使用 scikit-learn 中的 `MinMaxScaler` 来重新缩放数据。'
