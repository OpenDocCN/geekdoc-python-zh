    In this chapter you worked through a regression predictive modeling machine learning
    problem from end-to-end using Python. Specifically, the steps covered were:


    - Problem Definition (Boston house price data).

    - Loading the Dataset.

    - Analyze Data (some skewed distributions and correlated attributes).

    - Evaluate Algorithms (Linear Regression looked good).

    - Evaluate Algorithms with Standardization (KNN looked good).

    - Algorithm Tuning (K=3 for KNN was best).

    - Ensemble Methods (Bagging and Boosting, Gradient Boosting looked good).

    - Tuning Ensemble Methods (getting the most from Gradient Boosting).

    - Finalize Model (use all training data and confirm using validation dataset).


    Working through this case study showed you how the recipes for specific machine
    learning tasks can be pulled together into a complete project. Working through
    this case study is good practice at applied machine learning using Python and
    scikit-learn.


    ## 20.12.1 Next Step


    You have now completed two predictive modeling machine learning projects end-to-end.
    The first was a multiclass classification problem and this second project was
    a regression problem. Next is the third and final case study on a binary classification
    problem.


    ## Chapter 21 Binary Classification Machine Learning Case Study Project


    How do you work through a predictive modeling machine learning problem end-to-end?
    In this lesson you will work through a case study classification predictive modeling
    problem in Python including each step of the applied machine learning process.
    After completing this project, you will know:


    - How to work through a classification predictive modeling problem end-to-end.

    - How to use data transforms to improve model performance.

    - How to use algorithm tuning to improve model performance.

    - How to use ensemble methods and tuning of ensemble methods to improve model
    performance.


    Let’s get started.


    ## 21.1 Problem Definition


    The focus of this project will be the Sonar Mines vs Rocks The problem is to predict
    metal or rock objects from sonar return data. Each pattern is a set of 60 numbers
    in the range 0.0 to 1.0. Each number represents the energy within a particular
    frequency band, integrated over a certain period of time. The label associated
    with each record contains the letter R if the object is a rock and M if it is
    a mine (metal cylinder). The numbers in the labels are in increasing order of
    aspect angle, but they do not encode the angle directly.


    ## 21.2 Load the Dataset


    Let’s start off by loading the libraries required for this project.


    ```python

    # Load libraries

    import numpy

    from matplotlib import pyplot

    from pandas import read_csv

    from pandas import set_option

    from pandas.tools.plotting import scatter_matrix

    from sklearn.preprocessing import StandardScaler

    from sklearn.model_selection import train_test_split

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.model_selection import GridSearchCV

    from sklearn.metrics import classification_report

    from sklearn.metrics import confusion_matrix

    from sklearn.metrics import accuracy_score

    from sklearn.pipeline import Pipeline

    from sklearn.linear_model import LogisticRegression

    from sklearn.tree import DecisionTreeClassifier

    from sklearn.neighbors import KNeighborsClassifier

    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis

    from sklearn.naive_bayes import GaussianNB

    from sklearn.svm import SVC

    ```


