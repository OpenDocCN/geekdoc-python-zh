  - "[PAGE 79]\n\nA way to make this data more Gaussian (or at least more behaved)\
    \ is to use Power Transformations such as the well-known Box-Cox Transform, introduced\
    \ by Box and Cox (1964), defined as follows:\n\n```\n(\n\\quad )^{-1} \n\\quad\
    \ /= 0\n\n= 0\n```\n\nThe idea is to raise your data x to some power, Note, however,\
    \ that this is only applicable to non-negative data points, so be careful when\
    \ trying to applying this transformation: in principle, a good practice is to\
    \ take the absolute value of your data, but this decision is up to the scientist.\
