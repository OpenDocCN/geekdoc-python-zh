    ## 第 16 章 通过算法调整提升效率


    机器学习模型是参数化的，因此其行为可以针对给定问题进行调整。模型可能有许多参数，找到最佳的参数组合可以被视为一个搜索问题。在本章中，你将发现如何使用 scikit-learn
    在 Python 中调整机器学习算法的参数。完成本课后，你将知道：


    1.  算法参数调优对于提升算法性能的重要性。

    2.  如何使用网格搜索算法调优策略。

    3.  如何使用随机搜索算法调优策略。


    让我们开始吧。


    ### 16.1 机器学习算法的参数


    算法调优是应用机器学习流程中在最终确定模型之前的最后一步。它有时被称为超参数优化，其中算法参数被称为超参数，而机器学习算法本身找到的系数被称为参数。优化意味着问题的搜索性质。将其表述为一个搜索问题，你可以使用不同的搜索策略来为给定问题上的算法找到一个良好且稳健的参数或参数集。Python
    scikit-learn 提供了两种简单的算法参数调优方法：


    -   网格搜索参数调优。

    -   随机搜索参数调优。


    ### 16.2 调整网格搜索参数


    网格搜索是一种参数调优方法，它将系统地构建并评估网格中指定的每种算法参数组合的模型。你可以使用 `GridSearchCV` 执行网格搜索。下面的示例在标准糖尿病数据集上评估了岭回归算法的不同
    alpha 值。这是一个一维网格搜索。


    ```python

    # 用于算法调优的网格搜索

    import numpy

