    # 8.2 Univariate Selection


    ```

    # Feature Extraction with Univariative Statistical Tests (Chi-squared for classification)

    from pandas import read_csv

    from numpy import set_printoptions

    from sklearn.feature_selection import SelectKBest

    from sklearn.feature_selection import chi2

    # load data

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    # feature extraction

    test = SelectKBest(score_func=chi2, k=4)

    fit = test.fit(X, Y)

    # summarize scores

    set_printoptions(precision=3)

    print(fit.scores_)

    features = fit.transform(X)

    # summarize selected features

    print(features[0:5,:])

    ```


    Statistical tests can be used to select those features that have the strongest
    relationship with the output variable. The scikit-learn library provides the SelectKBest
    that can be used with a suite of different statistical tests to select a specific
    number of features. The example below uses the chi-squared statistical test for
    non-negative features to select 4 of the best features from the Pima Indians onset
    of diabetes dataset.


    Listing 8.1: Example of univariate feature selection.


