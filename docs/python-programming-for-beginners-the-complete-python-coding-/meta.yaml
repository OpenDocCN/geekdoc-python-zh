- md: "## 20.4 Data Visualizations\n\n### 20.4.1 Unimodal Data Visualizations\n\n\
    ```python\n# histograms\ndataset.hist(sharex=False, sharey=False, xlabelsize=1,\n\
    \             ylabelsize=1)\npyplot.show()\n```\n\nLet’s look at visualizations\
    \ of individual attributes. It is often useful to look at your data using multiple\
    \ different visualizations in order to spark ideas. Let’s look at histograms of\
    \ each attribute to get a sense of the data distributions.\n\nListing 20.13: Visualize\
    \ the dataset using histogram plots.\n\nWe can see that some attributes may have\
    \ an exponential distribution, such as CRIM, ZN, AGE and B. We can see that others\
    \ may have a bimodal distribution such as RAD and TAX.\n\n![](img/c303fad5e139c19353d094c7751ad2f2_363_0.png)\n\
    \nFigure 20.1: Histogram Plots of Each Attribute.\n\n```python\n# density\ndataset.plot(kind='density',\
    \ subplots=True, layout=(4,4), sharex=False,\n             legend=False, fontsize=1)\n\
    pyplot.show()\n```\n\nLet’s look at the same distributions using density plots\
    \ that smooth them out a bit.\n\nListing 20.14: Visualize the dataset using density\
    \ plots.\n\nThis perhaps adds more evidence to our suspicion about possible exponential\
    \ and bimodal distributions. It also looks like NOX, RM and LSTAT may be skewed\
    \ Gaussian distributions, which might be helpful later with transforms.\n\n![](img/c303fad5e139c19353d094c7751ad2f2_364_0.png)\n\
    \nFigure 20.2: Density Plots of Each Attribute.\n\n```python\n# box and whisker\
    \ plots\ndataset.plot(kind='box', subplots=True, layout=(4,4), sharex=False,\n\
    \             sharey=False, fontsize=8)\npyplot.show()\n```\n\nLet’s look at the\
    \ data with box and whisker plots of each attribute.\n\nListing 20.15: Visualize\
    \ the dataset using box and whisker plots.\n\nThis helps point out the skew in\
    \ many distributions so much so that data looks like outliers (e.g. beyond the\
    \ whisker of the plots).\n\n![](img/c303fad5e139c19353d094c7751ad2f2_365_0.png)\n\
    \nFigure 20.3: Box and Whisker Plots of Each Attribute.\n\n### 20.4.2 Multimodal\
    \ Data Visualizations\n\n```python\n# scatter plot matrix\nscatter_matrix(dataset)\n\
    pyplot.show()\n```\n\nLet’s look at some visualizations of the interactions between\
    \ variables. The best place to start is a scatter plot matrix.\n\nListing 20.16:\
    \ Visualize the dataset using scatter plots.\n\nWe can see that some of the higher\
    \ correlated attributes do show good structure in their relationship. Not linear,\
    \ but nice predictable curved relationships.\n\n![](img/c303fad5e139c19353d094c7751ad2f2_366_0.png)\n\
    \nFigure 20.4: Scatter Plot Matrix of Dataset Attributes.\n\n```python\n# correlation\
    \ matrix\nfig = pyplot.figure()\nax = fig.add_subplot(111)\ncax = ax.matshow(dataset.corr(),\
    \ vmin=-1, vmax=1, interpolation='none')\nfig.colorbar(cax)\nticks = numpy.arange(0,14,1)\n\
    ax.set_xticks(ticks)\nax.set_yticks(ticks)\nax.set_xticklabels(names)\nax.set_yticklabels(names)\n\
    pyplot.show()\n```\n\nLet’s also visualize the correlations between the attributes.\n\
    \nListing 20.17: Visualize the correlations between attributes.\n\nThe dark red\
    \ color shows positive correlation whereas the dark blue color shows negative\
    \ correlation. We can also see some dark red and dark blue that suggest candidates\
    \ for removal to better improve accuracy of models later on.\n\n![](img/c303fad5e139c19353d094c7751ad2f2_367_0.png)\n\
    \nFigure 20.5: Correlation Matrix of Dataset Attributes.\n\n### 20.4.3 Summary\
    \ of Ideas\n\nThere is a lot of structure in this dataset. We need to think about\
    \ transforms that we could use later to better expose the structure which in turn\
    \ may improve modeling accuracy. So far it would be worth trying:\n\n- Feature\
    \ selection and removing the most correlated attributes.\n- Normalizing the dataset\
    \ to reduce the effect of differing scales.\n- Standardizing the dataset to reduce\
    \ the effects of differing distributions.\n\nWith lots of additional time I would\
    \ also explore the possibility of binning (discretization) of the data. This can\
    \ often improve accuracy for decision tree algorithms.\n\n## 20.5 Validation Dataset\n\
    \nIt is a good idea to use a validation hold-out set. This is a sample of the\
    \ data that we hold back from our analysis and modeling. We use it right at the\
    \ end of our project to confirm the accuracy of our final model. It is a smoke\
    \ test that we can use to see if we messed up and to for modeling and hold back\
    \ 20% for validation.\n\n```python\n# Split-out validation dataset\narray = dataset.values\n\
    X = array[:,0:4]\nY = array[:,4]\nvalidation_size = 0.20\nseed = 7\nX_train, X_validation,\
    \ Y_train, Y_validation = train_test_split(X, Y,\n    test_size=validation_size,\
    \ random_state=seed)\n```\n\nListing 20.18: Separate Data into a Training and\
    \ Validation Datasets.\n\n## 20.6 Evaluate Algorithms: Baseline\n\n```python\n\
    # Test options and evaluation metric\nnum_folds = 10\nseed = 7\nscoring = 'neg_mean_squared_error'\n\
    ```\n\nWe have no idea what algorithms will do well on this problem. Gut feel\
    \ suggests regression algorithms like Linear Regression and ElasticNet may do\
    \ well. It is also possible that decision trees and even SVM may do well. I have\
    \ no idea. Let’s design our test harness. We will use 10-fold cross validation.\
    \ The dataset is not too small and this is a good standard test harness configuration.\
    \ We will evaluate algorithms using the Mean Squared Error (MSE) metric. MSE will\
    \ give a gross idea of how wrong all predictions are (0 is perfect).\n\nListing\
    \ 20.19: Configure Algorithm Evaluation Test Harness.\n\nLet’s create a baseline\
    \ of performance on this problem and spot-check a number of different algorithms.\
    \ We will select a suite of different algorithms capable of working on this regression\
    \ problem. The six algorithms selected include:\n\n- Linear Linear Regression\
    \ (LR), Lasso Regression (LASSO) and ElasticNet (EN).\n- Nonlinear Classification\
    \ and Regression Trees (CART), Support Vector Regression (SVR) and Neighbors (KNN).\n\
    \n```python\n# Spot-Check Algorithms\nmodels = []\nmodels.append((\"LR\", LinearRegression()))\n\
    models.append((\"LASSO\", Lasso()))\nmodels.append((\"EN\", ElasticNet()))\nmodels.append((\"\
    KNN\", KNeighborsRegressor()))\nmodels.append((\"CART\", DecisionTreeRegressor()))\n\
    models.append((\"SVR\", SVR()))\n```\n\nListing 20.20: Create the List of Algorithms\
    \ to Evaluate.\n\n```python\n# evaluate each model in turn\nresults = []\nnames\
    \ = []\nfor name, model in models:\n    kfold = KFold(n_splits=num_folds, random_state=seed)\n\
    \    cv_results = cross_val_score(model, X_train, Y_train, cv=kfold, scoring=scoring)\n\
    \    results.append(cv_results)\n    names.append(name)\n    msg = \"%s: %f (%f)\"\
    \ % (name, cv_results.mean(), cv_results.std())\n    print(msg)\n```\n\ndisplay\
    \ the mean and standard deviation of MSE for each algorithm as we calculate it\
    \ and collect the results for use later.\n\nListing 20.21: Evaluate the List of\
    \ Algorithms.\n\n```\nZeroth Value: 1\nList Length: 4\n1\n2\n3\n4\n```\n\nIt looks\
    \ like LR has the lowest MSE, followed closely by CART.\n\nListing 20.22: Results\
    \ from Evaluating Algorithms.\n\n```python\n# Compare Algorithms\nfig = pyplot.figure()\n\
    fig.suptitle('Algorithm Comparison')\nax = fig.add_subplot(111)\npyplot.boxplot(results)\n\
    ax.set_xticklabels(names)\npyplot.show()\n```\n\nLet’s take a look at the distribution\
    \ of scores across all cross validation folds by algorithm.\n\nListing 20.23:\
    \ Visualize the Differences in Algorithm Performance.\n\nWe can see similar distributions\
    \ for the regression algorithms and perhaps a tighter distribution of scores for\
    \ CART.\n\n![](img/c303fad5e139c19353d094c7751ad2f2_373_0.png)\n\nFigure 20.6:\
    \ Compare Algorithm Performance.\n\nThe differing scales of the data is probably\
    \ hurting the skill of all of the algorithms and perhaps more so for SVR and KNN.\
    \ In the next section we will look at running the same algorithms using a standardized\
    \ copy of the data.\n\n## 20.7 Evaluate Algorithms: Standardization\n\n```python\n\
    # Standardize the dataset\npipelines = []\npipelines.append((\"ScaledLR\", Pipeline([(\"\
    Scaler\", StandardScaler()),(\"LR\", LinearRegression())])))\npipelines.append((\"\
    ScaledLASSO\", Pipeline([(\"Scaler\", StandardScaler()),(\"LASSO\", Lasso())])))\n\
    ```"
  mdcn: "## 20.4 数据可视化\n\n### 20.4.1 单变量数据可视化\n\n```python\n# 直方图\ndataset.hist(sharex=False,\
    \ sharey=False, xlabelsize=1,\n             ylabelsize=1)\npyplot.show()\n```\n\
    \n让我们看看单个属性的可视化。通常，使用多种不同的可视化方式来查看数据，有助于激发想法。让我们查看每个属性的直方图，以了解数据分布情况。\n\n清单 20.13：使用直方图可视化数据集。\n\
    \n我们可以看到，某些属性可能具有指数分布，例如 CRIM、ZN、AGE 和 B。我们还可以看到，其他属性可能具有双峰分布，例如 RAD 和 TAX。\n\n\
    ![](img/c303fad5e139c19353d094c7751ad2f2_363_0.png)\n\n图 20.1：每个属性的直方图。\n\n```python\n\
    # 密度图\ndataset.plot(kind='density', subplots=True, layout=(4,4), sharex=False,\n\
    \             legend=False, fontsize=1)\npyplot.show()\n```\n\n让我们使用密度图来查看相同的分布，密度图能使其稍微平滑一些。\n\
    \n清单 20.14：使用密度图可视化数据集。\n\n这或许为我们的怀疑提供了更多证据，即可能存在指数分布和双峰分布。看起来 NOX、RM 和 LSTAT\
    \ 可能是偏态高斯分布，这在后续进行数据转换时可能会有所帮助。\n\n![](img/c303fad5e139c19353d094c7751ad2f2_364_0.png)\n\
    \n图 20.2：每个属性的密度图。\n\n```python\n# 箱线图\ndataset.plot(kind='box', subplots=True,\
    \ layout=(4,4), sharex=False,\n             sharey=False, fontsize=8)\npyplot.show()\n\
    ```\n\n让我们使用每个属性的箱线图来查看数据。\n\n清单 20.15：使用箱线图可视化数据集。\n\n这有助于指出许多分布中的偏斜程度，以至于数据看起来像是异常值（例如，超出了图表的须线范围）。\n\
    \n![](img/c303fad5e139c19353d094c7751ad2f2_365_0.png)\n\n图 20.3：每个属性的箱线图。\n\n\
    ### 20.4.2 多变量数据可视化\n\n```python\n# 散点图矩阵\nscatter_matrix(dataset)\npyplot.show()\n\
    ```\n\n让我们看看变量之间交互作用的一些可视化。最好的起点是散点图矩阵。\n\n清单 20.16：使用散点图可视化数据集。\n\n我们可以看到，一些相关性较高的属性在其关系中确实显示出良好的结构。虽然不是线性的，但是是漂亮的、可预测的曲线关系。\n\
    \n![](img/c303fad5e139c19353d094c7751ad2f2_366_0.png)\n\n图 20.4：数据集属性的散点图矩阵。\n\
    \n```python\n# 相关性矩阵\nfig = pyplot.figure()\nax = fig.add_subplot(111)\ncax =\
    \ ax.matshow(dataset.corr(), vmin=-1, vmax=1, interpolation='none')\nfig.colorbar(cax)\n\
    ticks = numpy.arange(0,14,1)\nax.set_xticks(ticks)\nax.set_yticks(ticks)\nax.set_xticklabels(names)\n\
    ax.set_yticklabels(names)\npyplot.show()\n```\n\n我们还可以可视化属性之间的相关性。\n\n清单 20.17：可视化属性之间的相关性。\n\
    \n深红色表示正相关，而深蓝色表示负相关。我们还可以看到一些深红色和深蓝色，这表明这些属性可能是后续为了提高模型精度而需要移除的候选对象。\n\n![](img/c303fad5e139c19353d094c7751ad2f2_367_0.png)\n\
    \n图 20.5：数据集属性的相关性矩阵。\n\n### 20.4.3 思路总结\n\n这个数据集中存在很多结构。我们需要考虑后续可以使用的转换方法，以更好地揭示这些结构，这反过来可能会提高建模的准确性。到目前为止，值得尝试的方法有：\n\
    \n-   特征选择，移除相关性最强的属性。\n-   对数据集进行归一化，以减少不同尺度的影响。\n-   对数据集进行标准化，以减少不同分布的影响。\n\
    \n如果有大量额外的时间，我还会探索对数据进行分箱（离散化）的可能性。这通常可以提高决策树算法的准确性。\n\n## 20.5 验证数据集\n\n使用一个验证保留集是一个好主意。这是我们在分析和建模过程中保留下来的数据样本。我们在项目结束时使用它来确认最终模型的准确性。这是一个冒烟测试，我们可以用它来检查是否出错，并且在建模时保留\
    \ 20% 的数据用于验证。\n\n```python\n# 分离出验证数据集\narray = dataset.values\nX = array[:,0:4]\n\
    Y = array[:,4]\nvalidation_size = 0.20\nseed = 7\nX_train, X_validation, Y_train,\
    \ Y_validation = train_test_split(X, Y,\n    test_size=validation_size, random_state=seed)\n\
    ```\n\n清单 20.18：将数据分离为训练集和验证集。\n\n## 20.6 评估算法：基线\n\n```python\n# 测试选项和评估指标\n\
    num_folds = 10\nseed = 7\nscoring = 'neg_mean_squared_error'\n```\n\n我们不知道哪些算法在这个问题上会表现良好。直觉表明，像线性回归和弹性网络这样的回归算法可能会表现良好。决策树甚至支持向量机也可能表现良好。我也不知道。让我们设计我们的测试框架。我们将使用\
    \ 10 折交叉验证。数据集不算太小，这是一个很好的标准测试框架配置。我们将使用均方误差（MSE）指标来评估算法。MSE 可以大致了解所有预测的错误程度（0\
    \ 表示完美）。\n\n清单 20.19：配置算法评估测试框架。\n\n让我们在这个问题上创建一个性能基线，并抽查一些不同的算法。我们将选择一组能够处理这个回归问题的不同算法。选择的六种算法包括：\n\
    \n-   线性：线性回归（LR）、套索回归（LASSO）和弹性网络（EN）。\n-   非线性：分类与回归树（CART）、支持向量回归（SVR）和 K 近邻（KNN）。\n\
    \n```python\n# 抽查算法\nmodels = []\nmodels.append((\"LR\", LinearRegression()))\n\
    models.append((\"LASSO\", Lasso()))\nmodels.append((\"EN\", ElasticNet()))\nmodels.append((\"\
    KNN\", KNeighborsRegressor()))\nmodels.append((\"CART\", DecisionTreeRegressor()))\n\
    models.append((\"SVR\", SVR()))\n```\n\n清单 20.20：创建待评估的算法列表。\n\n```python\n# 依次评估每个模型\n\
    results = []\nnames = []\nfor name, model in models:\n    kfold = KFold(n_splits=num_folds,\
    \ random_state=seed)\n    cv_results = cross_val_score(model, X_train, Y_train,\
    \ cv=kfold, scoring=scoring)\n    results.append(cv_results)\n    names.append(name)\n\
    \    msg = \"%s: %f (%f)\" % (name, cv_results.mean(), cv_results.std())\n   \
    \ print(msg)\n```\n\n在计算每个算法的 MSE 均值和标准差时显示结果，并收集结果以供后续使用。\n\n清单 20.21：评估算法列表。\n\
    \n```\nZeroth Value: 1\nList Length: 4\n1\n2\n3\n4\n```\n\n看起来 LR 的 MSE 最低，CART\
    \ 紧随其后。\n\n清单 20.22：评估算法的结果。\n\n```python\n# 比较算法\nfig = pyplot.figure()\nfig.suptitle('Algorithm\
    \ Comparison')\nax = fig.add_subplot(111)\npyplot.boxplot(results)\nax.set_xticklabels(names)\n\
    pyplot.show()\n```\n\n让我们看看每个算法在所有交叉验证折上的分数分布。\n\n清单 20.23：可视化算法性能的差异。\n\n我们可以看到回归算法的分布相似，而\
    \ CART 的分数分布可能更紧凑。\n\n![](img/c303fad5e139c19353d094c7751ad2f2_373_0.png)\n\n\
    图 20.6：比较算法性能。\n\n数据的不同尺度可能损害了所有算法的性能，对 SVR 和 KNN 的影响可能更大。在下一节中，我们将研究使用数据的标准化副本来运行相同的算法。\n\
    \n## 20.7 评估算法：标准化\n\n```python\n# 标准化数据集\npipelines = []\npipelines.append((\"\
    ScaledLR\", Pipeline([(\"Scaler\", StandardScaler()),(\"LR\", LinearRegression())])))\n\
    pipelines.append((\"ScaledLASSO\", Pipeline([(\"Scaler\", StandardScaler()),(\"\
    LASSO\", Lasso())])))\n```"
