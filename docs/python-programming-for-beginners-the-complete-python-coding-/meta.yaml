    The matrix lists all attributes across the top and down the side, to give correlation
    between all pairs of attributes (twice, because the matrix is symmetrical). You
    can see the diagonal line through the matrix from the top left to bottom right
    corners of the matrix shows perfect correlation of each attribute with itself.


