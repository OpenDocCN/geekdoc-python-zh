    本书主要依靠代码示例来阐述所讨论算法的运行原理。我在加州大学伯克利分校、Galvanize、纽黑文大学和Hacker Dojo的教学中发现，程序员通常通过简单的代码示例比通过数学公式更容易理解原理。


    本书聚焦于Python，因为它提供了功能与包含机器学习算法的专用包的良好结合。Python是一种常用语言，以生成简洁、可读的代码而闻名。这一特点使得许多领先公司采用Python进行原型设计和部署。Python开发者拥有庞大的社区支持，包括开发工具、扩展等。Python在工业应用和科学编程中也被广泛使用。它拥有多个支持机器学习等计算密集型应用的包，并且集成了领先的机器学习算法（因此您无需自行编码）。Python是比R或SAS（统计分析系统）等专用统计语言更好的通用编程语言。其机器学习算法集合包含许多顶级算法，并且持续扩展。


    ## 第1章 人工智能概述


    通常在处理经典机器学习问题时，我们通常区分监督学习和无监督学习方法。在监督学习中，我们有一系列独立同分布的样本$(x_i, y_i)$，其中$x_i \in
    \mathbb{R}^d$描述了总结可用数据的特征向量，$y_i \in \mathbb{R}$是目标变量，即我们模型的因变量。监督学习的目标是找到一个函数$f(\cdot)$，使得$f(x_i)
    \approx y_i$，即我们需要找到一个函数，它在训练集上能很好地近似分布，同时也能泛化到来自同一分布的新样本。这是监督学习方法的真正目标：基于标记数据集，对来自同一分布的新数据点进行分类。相反，无监督方法适用于目标缺失或未标记的数据集。此类技术用于在可用数据中搜索共同模式，因为它们仅由输入数据向量表征。请注意，无监督方法在许多应用中广泛使用：从聚类到自然语言处理中的主题检测，再到降维——这是一个非常广泛的技术族，本书将涵盖其基本方面：简而言之，它将一组高维输入实例映射到低维空间，同时保留数据集的某些属性。如今，降维技术也用于遗传学或计算机科学等许多科学领域，这些领域的数据集具有大量特征，因此我们可以在保留模型内在变异性的同时降低问题的维度。


