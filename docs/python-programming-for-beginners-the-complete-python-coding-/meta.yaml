    This procedure is fine but has some drawbacks: for instance, it creates and imposes
    an ordering on the values. For the day variable, that is fine, but there might
    be, say, a column that indicates the city where the restaurant is, and there there
    is no meaning on imposing an (arbitrary) order. A solution for this is to use
    the Dummy using the Pandas function get_dummies, also called OneHotEncoding in
    the scikit- learn framework. In particular, what we are doing is adding a new
    feature (actually a new column in the dataframe) for each possible value of the
    categorical variable. This is easily implemented in Pandas, as follows:


    ```

    In [21]: data_dummized = pd.get_dummies(data,prefix_sep=''_'',

    prefix=categorical_variables, columns=categorical_variables,

    drop_first=False)

    ```'
