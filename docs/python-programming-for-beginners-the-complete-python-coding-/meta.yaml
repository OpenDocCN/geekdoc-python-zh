    ## 15.4 投票集成


    投票是组合多个机器学习算法预测的最简单方法之一。它的工作原理是首先从你的训练数据集中创建两个或多个独立模型。然后，可以使用投票分类器来包装你的模型，并在被要求对新数据进行预测时平均子模型的预测。子模型的预测可以加权，但手动甚至启发式地指定分类器的权重是困难的。更高级的方法可以学习如何最好地加权来自子模型的预测，但这被称为堆叠（堆叠聚合），目前在
