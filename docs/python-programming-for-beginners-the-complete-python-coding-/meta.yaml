- md: '## 13.3.1 Next


    In this lesson you learned how to compare the performance of machine learning
    algorithms to each other. But what if you need to prepare your data as part of
    the comparison process. In the next lesson you will discover Pipelines in scikit-learn
    and how they overcome the common problems of data leakage when comparing machine
    learning algorithms.


    ## Chapter 14 Use Pipelines to Automate Machine Learning Workflows


    There are standard workflows in a machine learning project that can be automated.
    In Python scikit-learn, Pipelines help to clearly define and automate these workflows.
    In this chapter you will discover Pipelines in scikit-learn and how you can automate
    common machine learning workflows. After completing this lesson you will know:


    - 1. How to use pipelines to minimize data leakage.

    - 2. How to construct a data preparation and modeling pipeline.

    - 3. How to construct a feature extraction and modeling pipeline.


    Let’s get started.


    ### 14.1 Automating Processes for Machine Learning


    There are standard workflows in applied machine learning. Standard because they
    overcome common problems like data leakage in your test harness. Python scikit-learn
    provides a Pipeline utility to help automate machine learning workflows. Pipelines
    work by allowing for a linear sequence of data transforms to be chained together
    culminating in a modeling process that can be evaluated.


    The goal is to ensure that all of the steps in the pipeline are constrained to
    the data available for the evaluation, such as the training dataset or each fold
    of the cross validation procedure. You can learn more about Pipelines in scikit-learn
    by reading the Pipeline of the user guide. You can also review the API documentation
    for the Pipeline and FeatureUnion classes and the pipeline.


    ### 14.2 Pipeline for Preparing Data and Modeling


    An easy trap to fall into in applied machine learning is leaking data from your
    training dataset to your test dataset. To avoid this trap you need a robust test
    harness with strong separation of training and testing. This includes data preparation.
    Data preparation is one easy way to leak knowledge of the whole training dataset
    to the algorithm. For example, preparing your data using normalization or standardization
    on the entire training dataset before learning would not be a valid test because
    the training dataset would have been influenced by the scale of the data in the
    test set.


    Pipelines help you prevent data leakage in your test harness by ensuring that
    data preparation like standardization is constrained to each fold of your cross
    validation procedure. The example below demonstrates this important data preparation
    and model evaluation workflow on the Pima Indians onset of diabetes dataset. The
    pipeline is defined with two steps:


    - Standardize the data.

    - Learn a Linear Discriminant Analysis model.


    ```python

    # Create a pipeline that standardizes the data then creates a model

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.preprocessing import StandardScaler

    from sklearn.pipeline import Pipeline

    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis

    # load data

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    # create pipeline

    estimators = []

    estimators.append((''standardize'', StandardScaler()))

    estimators.append((''lda'', LinearDiscriminantAnalysis()))

    model = Pipeline(estimators)

    # evaluate pipeline

    kfold = KFold(n_splits=10, random_state=7)

    ```


    The pipeline is then evaluated using 10-fold cross validation.


    Listing 14.1: Example of a Pipeline to standardize and model data.


    ```python

    python --version

    ```


    Notice how we create a Python list of steps that are provided to the Pipeline
    for process the data. Also notice how the Pipeline itself is treated like an estimator
    and is evaluated in its entirety by the cross validation procedure. Running the
    example provides a summary of accuracy of the setup on the dataset.


    Listing 14.2: Output of a Pipeline to standardize and model data.


    ### 14.3 Pipeline for Feature Extraction and Modeling


    Feature extraction is another procedure that is susceptible to data leakage. Like
    data preparation, feature extraction procedures must be restricted to the data
    in your training dataset. The pipeline provides a handy tool called the FeatureUnion
    which allows the results of multiple feature selection and extraction procedures
    to be combined into a larger dataset on which a model can be trained. Importantly,
    all the feature extraction and the feature union occurs within each fold of the
    cross validation procedure. The example below demonstrates the pipeline defined
    with four steps:


    - 1. Feature Extraction with Principal Component Analysis (3 features).

    - 2. Feature Extraction with Statistical Selection (6 features).

    - 3. Feature Union.

    - 4. Learn a Logistic Regression Model.


    ```python

    # Create a pipeline that extracts features from the data then creates a model

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.pipeline import Pipeline

    from sklearn.pipeline import FeatureUnion

    from sklearn.linear_model import LogisticRegression

    from sklearn.decomposition import PCA

    from sklearn.feature_selection import SelectKBest


    # load data

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]


    # create feature union

    features = []

    features.append((''pca'', PCA(n_components=3)))

    features.append((''select_best'', SelectKBest(k=6)))

    feature_union = FeatureUnion(features)


    # create pipeline

    estimators = []

    estimators.append((''feature_union'', feature_union))

    estimators.append((''logistic'', LogisticRegression()))

    model = Pipeline(estimators)

    ```


    The pipeline is then evaluated using 10-fold cross validation.


    Listing 14.3: Example of a Pipeline extract and combine features before modeling.


    ```python

    python --version

    ```


    Notice how the FeatureUnion is its own Pipeline that in turn is a single step
    in the final Pipeline used to feed Logistic Regression. This might get you thinking
    about how you can start embedding pipelines within pipelines. Running the example
    provides a summary of accuracy of the setup on the dataset.


    Listing 14.4: Output of a Pipeline extract and combine features before modeling.


    ### 14.4 Summary


    In this chapter you discovered the difficulties of data leakage in applied machine
    learning. You discovered the Pipeline utilities in Python scikit-learn and how
    they can be used to automate standard applied machine learning workflows. You
    learned how to use Pipelines in two important use cases:


    - Data preparation and modeling constrained to each fold of the cross validation
    procedure.

    - Feature extraction and feature union constrained to each fold of the cross validation
    procedure.


    ## 14.4.1 Next


    This completes the lessons on how to evaluate machine learning algorithms. In
    the next lesson you will take your first look at how to improve algorithm performance
    on your problems by using ensemble methods.


    ## Chapter 15 Boost Performance in Group Settings


    Ensembles can give you a boost in accuracy on your dataset. In this chapter you
    will discover how you can create some of the most powerful types of ensembles
    in Python using scikit-learn. This lesson will step you through Boosting, Bagging
    and Majority Voting and show you how you can continue to ratchet up the accuracy
    of the models on your own datasets. After completing this lesson you will know:


    - 1. How to use bagging ensemble methods such as bagged decision trees, random
    forest and extra trees.

    - 2. How to use boosting ensemble methods such as AdaBoost and stochastic gradient
    boosting.

    - 3. How to use voting ensemble methods to combine the predictions from multiple
    algorithms.


    Let’s get started.


    ### 15.1 Create ensemble predictions by combining models


    The three most popular methods for combining the predictions from different models
    are:


    - Building multiple models (typically of the same type) from different subsamples
    of the training dataset.'
  mdcn: '## 13.3.1 下一步


    在本课中，你学习了如何比较机器学习算法的性能。但如果你需要将数据准备作为比较过程的一部分，该怎么办？在下一课中，你将了解 scikit-learn 中的管道（Pipelines），以及它们如何克服比较机器学习算法时常见的数据泄露问题。


    ## 第14章 使用管道自动化机器学习工作流


    在机器学习项目中，有一些标准工作流可以实现自动化。在 Python 的 scikit-learn 中，管道有助于清晰地定义和自动化这些工作流。在本章中，你将了解
    scikit-learn 中的管道，以及如何自动化常见的机器学习工作流。完成本课后，你将知道：


    - 1. 如何使用管道来最小化数据泄露。

    - 2. 如何构建数据准备和建模管道。

    - 3. 如何构建特征提取和建模管道。


    让我们开始吧。


    ### 14.1 自动化机器学习流程


    在应用机器学习中，存在标准的工作流。之所以标准，是因为它们克服了测试框架中的常见问题，如数据泄露。Python 的 scikit-learn 提供了一个管道工具来帮助自动化机器学习工作流。管道的工作原理是允许将一系列数据转换链接在一起，最终形成一个可以被评估的建模过程。


    目标是确保管道中的所有步骤都受限于可用于评估的数据，例如训练数据集或交叉验证过程的每一折。你可以通过阅读用户指南中的管道部分来了解更多关于 scikit-learn
    中管道的信息。你也可以查看 `Pipeline` 和 `FeatureUnion` 类以及管道的 API 文档。


    ### 14.2 用于数据准备和建模的管道


    在应用机器学习中，一个容易陷入的陷阱是将训练数据集的数据泄露到测试数据集。为了避免这个陷阱，你需要一个具有强大训练和测试分离的健壮测试框架。这包括数据准备。数据准备是将整个训练数据集的知识泄露给算法的一种简单方式。例如，在学习之前对整个训练数据集使用归一化或标准化来准备数据将不是一个有效的测试，因为训练数据集会受到测试集中数据规模的影响。


    管道通过确保像标准化这样的数据准备受限于交叉验证过程的每一折，来帮助你防止测试框架中的数据泄露。下面的示例在 Pima 印第安人糖尿病发病数据集上演示了这个重要的数据准备和模型评估工作流。该管道定义了两个步骤：


    - 标准化数据。

    - 学习一个线性判别分析模型。


    ```python

    # 创建一个管道，先标准化数据然后创建模型

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.preprocessing import StandardScaler

    from sklearn.pipeline import Pipeline

    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis

    # 加载数据

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    # 创建管道

    estimators = []

    estimators.append((''standardize'', StandardScaler()))

    estimators.append((''lda'', LinearDiscriminantAnalysis()))

    model = Pipeline(estimators)

    # 评估管道

    kfold = KFold(n_splits=10, random_state=7)

    ```


    然后使用10折交叉验证来评估该管道。


    清单 14.1：用于标准化和建模数据的管道示例。


    ```python

    python --version

    ```


    注意我们如何创建一个步骤的 Python 列表，这些步骤被提供给管道以处理数据。同时注意管道本身被视为一个估计器，并通过交叉验证过程进行整体评估。运行该示例会提供该设置在数据集上的准确率摘要。


    清单 14.2：用于标准化和建模数据的管道输出。


    ### 14.3 用于特征提取和建模的管道


    特征提取是另一个容易发生数据泄露的过程。与数据准备一样，特征提取过程必须限制在训练数据集的数据内。管道提供了一个方便的工具，称为 `FeatureUnion`，它允许将多个特征选择和提取过程的结果组合成一个更大的数据集，以便在该数据集上训练模型。重要的是，所有的特征提取和特征联合都发生在交叉验证过程的每一折内。下面的示例演示了定义了四个步骤的管道：


    - 1. 使用主成分分析进行特征提取（3个特征）。

    - 2. 使用统计选择进行特征提取（6个特征）。

    - 3. 特征联合。

    - 4. 学习一个逻辑回归模型。


    ```python

    # 创建一个管道，从数据中提取特征然后创建模型

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.pipeline import Pipeline

    from sklearn.pipeline import FeatureUnion

    from sklearn.linear_model import LogisticRegression

    from sklearn.decomposition import PCA

    from sklearn.feature_selection import SelectKBest


    # 加载数据

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]


    # 创建特征联合

    features = []

    features.append((''pca'', PCA(n_components=3)))

    features.append((''select_best'', SelectKBest(k=6)))

    feature_union = FeatureUnion(features)


    # 创建管道

    estimators = []

    estimators.append((''feature_union'', feature_union))

    estimators.append((''logistic'', LogisticRegression()))

    model = Pipeline(estimators)

    ```


    然后使用10折交叉验证来评估该管道。


    清单 14.3：在建模前提取和组合特征的管道示例。


    ```python

    python --version

    ```


    注意 `FeatureUnion` 本身就是一个管道，它又成为最终管道中用于馈送逻辑回归的单个步骤。这可能会让你思考如何开始将管道嵌套在管道中。运行该示例会提供该设置在数据集上的准确率摘要。


    清单 14.4：在建模前提取和组合特征的管道输出。


    ### 14.4 总结


    在本章中，你发现了应用机器学习中数据泄露的困难。你了解了 Python scikit-learn 中的管道工具，以及它们如何用于自动化标准的应用机器学习工作流。你学习了如何在两个重要的用例中使用管道：


    - 数据准备和建模受限于交叉验证过程的每一折。

    - 特征提取和特征联合受限于交叉验证过程的每一折。


    ## 14.4.1 下一步


    至此，关于如何评估机器学习算法的课程就结束了。在下一课中，你将首次了解如何通过使用集成方法来提高算法在你的问题上的性能。


    ## 第15章 在群体设置中提升性能


    集成可以在你的数据集上提升准确率。在本章中，你将了解如何使用 scikit-learn 在 Python 中创建一些最强大的集成类型。本课程将逐步介绍提升法（Boosting）、装袋法（Bagging）和多数投票法（Majority
    Voting），并向你展示如何继续提高模型在你自己的数据集上的准确率。完成本课后，你将知道：


    - 1. 如何使用装袋集成方法，如装袋决策树、随机森林和极端随机树。

    - 2. 如何使用提升集成方法，如 AdaBoost 和随机梯度提升。

    - 3. 如何使用投票集成方法来组合多个算法的预测。


    让我们开始吧。


    ### 15.1 通过组合模型创建集成预测


    组合不同模型预测的三种最流行的方法是：


    - 从训练数据集的不同子样本构建多个模型（通常是相同类型的）。'
