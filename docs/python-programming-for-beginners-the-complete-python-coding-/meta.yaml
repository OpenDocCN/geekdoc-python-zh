    # Chapter 12 Algorithms for Spot-Check Regression


    Spot-checking is a way of discovering which algorithms perform well on your machine
    learning problem. You cannot know which algorithms are best suited to your problem
    beforehand. You must trial a number of methods and focus attention on those that
    prove themselves the most promising. In this chapter you will discover six machine
    learning algorithms that you can use when spot-checking your regression problem
    in Python with scikit-learn. After completing this lesson you will know:


