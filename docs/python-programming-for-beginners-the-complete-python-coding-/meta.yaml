    This section gives you additional details on each of the steps of the template.


    # 18.3.1 Prepare Problem


    This step is about loading everything you need to start working on your problem.
    This includes:


    Python modules, classes and functions that you intend to use.

    Loading your dataset from CSV.


    This is also the home of any global configuration you might need to do. It is
    also the place where you might need to make a reduced sample of your dataset if
    it is too large to work with. Ideally, your dataset should be small enough to
    build a model or create a visualization within a minute, ideally 30 seconds. You
    can always scale up well performing models later.'
