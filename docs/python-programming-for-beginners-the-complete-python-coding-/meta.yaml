    because of the excellent library support and because it is a general purpose programming
    language (unlike R or Matlab). For example, see the results of the Kaggle platform
    survey results in and the KDD Nuggets 2015 tool survey.


    This is a simple and very important consideration. It means that you can perform
    your research and development (figuring out what models to use) in the same programming
    language that you use for your production systems. Greatly simplifying the transition
    from development to production.


    ## SciPy


    SciPy is an ecosystem of Python libraries for mathematics, science and engineering.
    It is an add-on to Python that you will need for machine learning. The SciPy ecosystem
    is comprised of the following core modules relevant to machine learning:


    - A foundation for SciPy that allows you to efficiently work with data in arrays.

    - Allows you to create 2D charts and plots from data.

    - Tools and data structures to organize and analyze your data.


    To be effective at machine learning in Python you must install and become familiar
    with SciPy. Specifically:


    - You will prepare your data as NumPy arrays for modeling in machine learning
    algorithms.

    - You will use Matplotlib (and wrappers of Matplotlib in other frameworks) to
    create plots and charts of your data.

    - You will use Pandas to load explore and better understand your data.


    ## scikit-learn


    The scikit-learn library is how you can develop and practice machine learning
    in Python. It is built upon and requires the SciPy ecosystem. The name scikit
    suggests that it is a SciPy plug-in or toolkit. The focus of the library is machine
    learning algorithms for classification, regression, clustering and more. It also
    provides tools for related tasks such as evaluating models, tuning parameters
    and pre-processing data.


    Like Python and SciPy, scikit-learn is open source and is usable commercially
    under the BSD license. This means that you can learn about machine learning, develop
    models and put them into operations all with the same ecosystem and code. A powerful
    reason to use scikit-learn.


    ## Python Installation of Ecosystems


    There are multiple ways to install the Python ecosystem for machine learning.
    In this section we cover how to install the Python ecosystem for machine learning.


    ### Installing Python: A Guide


    The first step is to install Python. I prefer to use and recommend Python 2.7.
    The instructions for installing Python will be specific to your platform. For
    instructions see Downloading in the Python Beginners Once installed you can confirm
    the installation was successful. Open a command line and type:


    ```

    python --version

    ```


    Listing 2.2: Print the version of Python installed.


