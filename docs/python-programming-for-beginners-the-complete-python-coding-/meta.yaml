  mdcn: "## 强制数据服从高斯分布：幂变换简介\n\n在下一张图中，我们展示了缩放后的特征分布：尽管我们已经对特征进行了标准化，但仍然可以看到它们呈现出不同的分布：例如，特征B严重偏斜，而PTRATIO看起来则完全不同。\n\
    \n```python\nIn [12]: scaler = StandardScaler()\n         scaler.fit(X)\n\n  \
    \       X_scaled = scaler.transform(X)\n         plt.boxplot(X_scaled)\n\n   \
    \      plt.xticks(np.arange(1,X.shape[1]+1), list(X), rotation=30)\n         plt.ylabel('MEDV')\n\
