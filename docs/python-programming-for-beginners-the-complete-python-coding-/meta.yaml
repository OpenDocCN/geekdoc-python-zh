  md: '# Changing Hyperparameters using Cross-Validation


    We saw that to train a model, we notably split the data into a training and test
    set. However, especially in k-Nearest Neighbors (kNN), we have to set a priori
    the num- ber of neighbors, which is quite restrictive from a inferential point
    of view: this means that the user must know the number of clusters our data will
    be grouped by the training algorithm, which is actually unknown at the beginning
    of the data analysis.


    Hence, what we can do is to train a series of kNN models, and then evaluate each
    model performance on the test set. But this has a major limitation: I am picking
    the model that best performs on the test set, which is quite restrictive because
    it does just depends on the data I have observed. In other words, the test set
    prediction is not an unbiased estimate of future performances anymore.


    Instead, what we typically do is to use three folds that we split into:


    +   - Training set, which is used for model fitting;

    - Validation set, which is used for picking the (best) parameters;

    - Test set for evaluating the model on unseen data.


    To illustrate the real need of this strategy, let’s make use of the Breast Cancer
    Wisconsin (Diagnostic) Data Set, available online at The reader can find a copy
    of it within the book repository. Again, we read the data using the egeaML class
    DataIngestion.'
