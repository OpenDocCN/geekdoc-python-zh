    python --version

    ```


    Listing 9.8: Output of evaluating an algorithm with Shuffle Split Cross Validation.


    ## 9.6 Which Methods to Apply When


    This section lists some tips to consider what resampling technique to use in different
    circumstances.


    Generally cross validation is the gold standard for evaluating the performance
    of a machine learning algorithm on unseen data with k set to 3, 5, or 10.


    Using a train/test split is good for speed when using a slow algorithm and produces
    performance estimates with lower bias when using large datasets.


    Techniques like leave-one-out cross validation and repeated random splits can
    be useful intermediates when trying to balance variance in the estimated performance,
    model training speed and dataset size.


    The best advice is to experiment and find a technique for your problem that is
    fast and produces reasonable estimates of performance that you can use to make
    decisions. If in doubt, use 10-fold cross validation.


    ## 9.7 Summary


    In this chapter you discovered statistical techniques that you can use to estimate
    the performance of your machine learning algorithms, called resampling. Specifically,
    you learned about:


    - Train and Test Sets.

    - Cross Validation.

    - Leave One Out Cross Validation.

    - Repeated Random Test-Train Splits.


