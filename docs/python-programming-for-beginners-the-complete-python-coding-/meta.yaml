    harness using 10-fold cross validation is used to demonstrate how to spot-check
    each machine learning algorithm and mean accuracy measures are used to indicate
    algorithm performance. The recipes assume that you know about each machine learning
    algorithm and how to use them. We will not go into the API or parameterization
    of each algorithm.


