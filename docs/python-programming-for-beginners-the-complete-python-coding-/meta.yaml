    ## 12.4 Summary\n\nIn this chapter you discovered how to spot-check machine learning\
    \ algorithms for regression problems in Python using scikit-learn. Specifically,\
    \ you learned about four linear machine learning algorithms: Linear Regression,\
    \ Ridge Regression, LASSO Linear Regression and Elastic Net Regression. You also\
    \ learned about three nonlinear algorithms: Neighbors, Classification and Regression\
    \ Trees and Support Vector Machines.\n\n### 12.4.1 Next\n\nNow that you know how\
    \ to use classification and regression algorithms you need to know how to compare\
    \ the results of different algorithms to each other. In the next lesson you will\
    \ discover how to design simple experiments to directly compare machine learning\
    \ algorithms to each other on your dataset.\n\n## Chapter 13 Compare Machine Learning\
    \ Algorithms\n\nIt is important to compare the performance of multiple different\
    \ machine learning algorithms consistently. In this chapter you will discover\
    \ how you can create a test harness to compare multiple different machine learning\
    \ algorithms in Python with scikit-learn. You can use this test harness as a template\
    \ on your own machine learning problems and add more and different algorithms\
    \ to compare. After completing this lesson you will know:\n\n1.  How to formulate\
    \ an experiment to directly compare machine learning algorithms.\n2.  A reusable\
    \ template for evaluating the performance of multiple algorithms on one dataset.\n\
    3.  How to report and visualize the results when comparing algorithm performance.\n\
    \nLet’s get started.\n\n## 13.1 Selecting The Optimal Machine Learning Model\n\
    \nWhen you work on a machine learning project, you often end up with multiple\
    \ good models to choose from. Each model will have different performance characteristics.\
    \ Using resampling methods like cross validation, you can get an estimate for\
    \ how accurate each model may be on unseen data. You need to be able to use these\
    \ estimates to choose one or two best models from the suite of models that you\
    \ have created.\n\nWhen you have a new dataset, it is a good idea to visualize\
    \ the data using different techniques in order to look at the data from different\
    \ perspectives. The same idea applies to model selection. You should use a number\
    \ of different ways of looking at the estimated accuracy of your machine learning\
    \ algorithms in order to choose the one or two algorithm to finalize. A way to\
    \ do this is to use visualization methods to show the average accuracy, variance\
    \ and other properties of the distribution of model accuracies. In the next section\
    \ you will discover exactly how you can do that in Python with scikit-learn.\n\
    \n## 13.2 Regularly Compare Algorithms for Machine Learning\n\nThe key to a fair\
    \ comparison of machine learning algorithms is ensuring that each algorithm is\
    \ evaluated in the same way on the same data. You can achieve this by forcing\
    \ each algorithm to be evaluated on a consistent test harness. In the example\
    \ below six different classification algorithms are compared on a single dataset:\n\
    \n- Logistic Regression.\n- Linear Discriminant Analysis.\n- Neighbors.\n- Classification\
    \ and Regression Trees.\n- Naive Bayes.\n- Support Vector Machines.\n\nThe dataset\
    \ is the Pima Indians onset of diabetes problem. The problem has two classes and\
    \ eight numeric input variables of varying scales. The 10-fold cross validation\
    \ procedure is used to evaluate each algorithm, importantly configured with the\
    \ same random seed to ensure that the same splits to the training data are performed\
    \ and that each algorithm is evaluated in precisely the same way. Each algorithm\
    \ is given a short name, useful for summarizing results afterward.\n\n```python\n\
    # Compare Algorithms\nfrom pandas import read_csv\nfrom matplotlib import pyplot\n\
    from sklearn.model_selection import KFold\nfrom sklearn.model_selection import\
    \ cross_val_score\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.tree\
    \ import DecisionTreeClassifier\nfrom sklearn.neighbors import KNeighborsClassifier\n\
    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis\nfrom sklearn.naive_bayes\
    \ import GaussianNB\nfrom sklearn.svm import SVC\n\n# load dataset\nfilename =\
    \ 'pima-indians-diabetes.data.csv'\nnames = ['preg', 'plas', 'pres', 'skin', 'insu',\
    \ 'mass', 'pedi', 'age', 'class']\ndataframe = read_csv(filename, names=names)\n\
    array = dataframe.values\nX = array[:,0:8]\nY = array[:,8]\n\n# prepare models\n\
    models = []\nmodels.append(('LR', LogisticRegression()))\nmodels.append(('LDA',\
    \ LinearDiscriminantAnalysis()))\nmodels.append(('KNN', KNeighborsClassifier()))\n\
    models.append(('CART', DecisionTreeClassifier()))\nmodels.append(('NB', GaussianNB()))\n\
    models.append(('SVM', SVC()))\n\n# evaluate each model in turn\nresults = []\n\
    names = []\nscoring = 'accuracy'\nfor name, model in models:\n    kfold = KFold(n_splits=10,\
    \ random_state=7)\n    cv_results = cross_val_score(model, X, Y, cv=kfold, scoring=scoring)\n\
    \    results.append(cv_results)\n    names.append(name)\n    msg = \"%s: %f (%f)\"\
    \ % (name, cv_results.mean(), cv_results.std())\n    print(msg)\n\n# boxplot algorithm\
    \ comparison\nfig = pyplot.figure()\nfig.suptitle('Algorithm Comparison')\nax\
    \ = fig.add_subplot(111)\npyplot.boxplot(results)\nax.set_xticklabels(names)\n\
    pyplot.show()\n```\n\n![](img/c303fad5e139c19353d094c7751ad2f2_279_0.png)\n\n\
    Listing 13.1: Example of comparing multiple algorithms.\n\n```text\nZeroth Value:\
    \ 1\nList Length: 4\n1\n2\n3\n4\n```\n\nRunning the example provides a list of\
    \ each algorithm short name, the mean accuracy and the standard deviation accuracy.\n\
    \nListing 13.2: Output of comparing multiple algorithms.\n\nThe example also provides\
    \ a box and whisker plot showing the spread of the accuracy scores across each\
    \ cross validation fold for each algorithm.\n\n![](img/c303fad5e139c19353d094c7751ad2f2_280_0.png)\n\
    \nFigure 13.1: Box and Whisker Plots Comparing Algorithm Performance\n\nFrom these\
    \ it would suggest that both logistic regression and linear discriminant analysis\
    \ are perhaps worthy of further study on this problem.\n\n## 13.3 Summary\n\n\
    In this chapter you discovered how to evaluate multiple different machine learning\
    \ algorithms on a dataset in Python with scikit-learn. You learned how to both\
    \ use the same test harness to evaluate the algorithms and how to summarize the\
    \ results both numerically and using a box and whisker plot. You can use this\
    \ recipe as a template for evaluating multiple algorithms on your own problems."
