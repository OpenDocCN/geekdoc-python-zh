    Test Score: 0.9649


    Basically we use the validation to select the parameters (in this case the n_neighbors),
    and then we use the test set to figure out the model to put into production. This
    is nice because this method is simple and fast, but it has at least one problem:
    it shows high variance in the test set, since it is splitted twice, and hence
    it depends on how you really split the data. As a corollary, another problem can
    be the bad use of data, which translates into the fact that if you make the validation
    set too small, you will have even more variance in the evaluation.


    Hence, what we typically do in practice is instead of splitting the data into
    three folds as before, we are going to split the whole data into n folds of'
  merge: -1
  pgno: 60
- img_proc: true
  md: 'equal size. The idea of cross-validation is simple, yet powerful: we pick one
    fold and we fix it as the test set, whereas the other n – 1 folds are used to
    fit the model. How- ever, instead of just doing it once, we then sequentially
    fix another fold as the test set, and fit the same model on the other n – 1 folds,
    hence considering the fold that was used before for testing. We repeat this procedure
    for all the non-overlapping different folds, obtaining n different scores: this
    is more stable because is less depen- dent on the split, and each data point is
    exactly in the test set once. Likewise, the outcome of cross-validation is made
    of n scores, from which for instance we can take the mean (or the median) as overall
    score, which is indeed a more robust estimate of how good this kind of model is
    on this kind of dataset. Figure 1.5 shows how cross-validation


    ![](img/c303fad5e139c19353d094c7751ad2f2_61_0.png)


    Figure 1.5: Representation of a 5-folds cross-validation. This was taken from
    the


    If you also want to tune the parameters, you still need to have a separate test
    set: so a good strategy is to split the data into training and test set. You cross-validate
    the training set to look for the best parameters, and then you use the test set
    to evaluate how the choosen configuration of'
  merge: -1
  pgno: 61
- img_proc: true
  md: 'parameters will perform on new data. As an ex- ample, the following snippet
    shows for each n_neighbors the cross-validated score, and then I select the best
    model.


    With scikit-learn we use the cross_val_score function: it basically split the
    data into n independent folds, and computes for each split, the accuracy on that
    particular split'
  merge: -1
