  md: '# Chapter 7 Get Ready for Machine Learning with Your Data


    Many machine learning algorithms make assumptions about your data. It is often
    a very good idea to prepare your data in such way to best expose the structure
    of the problem to the machine learning algorithms that you intend to use. In this
    chapter you will discover how to prepare your data for machine learning in Python
    using scikit-learn. After completing this lesson you will know how to:


    +   1. Rescale data.

    2. Standardize data.

    3. Normalize data.

    4. Binarize data.


    Let’s get started.


    # 7.1 Requirement for Pre-processing Data


    You almost always need to pre-process your data. It is a required step. A difficulty
    is that different algorithms make different assumptions about your data and may
    require different transforms. Further, when you follow all of the rules and prepare
    your data, sometimes algorithms can deliver better results without pre-processing.

    Generally, I would recommend creating many different views and transforms of your
    data, then exercise a handful of algorithms on each view of your dataset. This
    will help you to flush out which data transforms might be better at exposing the
    structure of your problem in general.'
  merge: -1
  pgno: 198
