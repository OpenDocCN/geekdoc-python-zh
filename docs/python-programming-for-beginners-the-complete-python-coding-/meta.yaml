    \n清单 12.14：SVM回归算法的输出。\n\n## 12.4 总结\n\n在本章中，你学习了如何使用scikit-learn在Python中对回归问题的机器学习算法进行快速评估。具体来说，你学习了四种线性机器学习算法：线性回归、岭回归、LASSO线性回归和弹性网络回归。你还学习了三种非线性算法：近邻法、分类与回归树以及支持向量机。\n\
    \n### 12.4.1 下一步\n\n既然你已经知道如何使用分类和回归算法，接下来你需要了解如何比较不同算法的结果。在下一课中，你将学习如何设计简单的实验，在你的数据集上直接比较不同的机器学习算法。\n\
    \n## 第13章 比较机器学习算法\n\n一致地比较多个不同机器学习算法的性能非常重要。在本章中，你将学习如何创建一个测试框架，以便在Python中使用scikit-learn比较多个不同的机器学习算法。你可以将这个测试框架作为模板，应用于你自己的机器学习问题，并添加更多不同的算法进行比较。完成本课后，你将了解：\n\
    \n1.  如何设计一个实验来直接比较机器学习算法。\n2.  一个可重用的模板，用于评估多个算法在一个数据集上的性能。\n3.  在比较算法性能时，如何报告和可视化结果。\n\
    \n让我们开始吧。\n\n## 13.1 选择最优的机器学习模型\n\n当你进行一个机器学习项目时，你通常最终会有多个好的模型可供选择。每个模型都会有不同的性能特征。使用重采样方法（如交叉验证），你可以估计每个模型在未见数据上的准确度。你需要能够利用这些估计值，从你创建的模型套件中选择一到两个最佳模型。\n\
    \n当你有一个新数据集时，最好使用不同的技术来可视化数据，以便从不同的角度观察数据。同样的想法也适用于模型选择。你应该使用多种不同的方式来查看机器学习算法的估计准确度，以便选择一到两个算法进行最终确定。一种方法是使用可视化方法来显示模型准确度分布的平均准确度、方差和其他属性。在下一节中，你将学习如何在Python中使用scikit-learn来实现这一点。\n\
    \n## 13.2 定期比较机器学习算法\n\n公平比较机器学习算法的关键是确保每个算法在相同的数据上以相同的方式进行评估。你可以通过强制每个算法在一致的测试框架上进行评估来实现这一点。在下面的示例中，六个不同的分类算法在单个数据集上进行了比较：\n\
    \n- 逻辑回归。\n- 线性判别分析。\n- 近邻法。\n- 分类与回归树。\n- 朴素贝叶斯。\n- 支持向量机。\n\n该数据集是皮马印第安人糖尿病发病问题。该问题有两个类别和八个不同尺度的数值输入变量。使用10折交叉验证程序来评估每个算法，重要的是配置相同的随机种子，以确保对训练数据进行相同的划分，并且每个算法都以完全相同的方式进行评估。每个算法都有一个简短的名称，便于事后总结结果。\n\
    \n```python\n# Compare Algorithms\nfrom pandas import read_csv\nfrom matplotlib\
    \ import pyplot\nfrom sklearn.model_selection import KFold\nfrom sklearn.model_selection\
    \ import cross_val_score\nfrom sklearn.linear_model import LogisticRegression\n\
    from sklearn.tree import DecisionTreeClassifier\nfrom sklearn.neighbors import\
    \ KNeighborsClassifier\nfrom sklearn.discriminant_analysis import LinearDiscriminantAnalysis\n\
    from sklearn.naive_bayes import GaussianNB\nfrom sklearn.svm import SVC\n\n# load\
    \ dataset\nfilename = 'pima-indians-diabetes.data.csv'\nnames = ['preg', 'plas',\
    \ 'pres', 'skin', 'insu', 'mass', 'pedi', 'age', 'class']\ndataframe = read_csv(filename,\
    \ names=names)\narray = dataframe.values\nX = array[:,0:8]\nY = array[:,8]\n\n\
    # prepare models\nmodels = []\nmodels.append(('LR', LogisticRegression()))\nmodels.append(('LDA',\
    \ LinearDiscriminantAnalysis()))\nmodels.append(('KNN', KNeighborsClassifier()))\n\
    models.append(('CART', DecisionTreeClassifier()))\nmodels.append(('NB', GaussianNB()))\n\
    models.append(('SVM', SVC()))\n\n# evaluate each model in turn\nresults = []\n\
    names = []\nscoring = 'accuracy'\nfor name, model in models:\n    kfold = KFold(n_splits=10,\
    \ random_state=7)\n    cv_results = cross_val_score(model, X, Y, cv=kfold, scoring=scoring)\n\
    \    results.append(cv_results)\n    names.append(name)\n    msg = \"%s: %f (%f)\"\
    \ % (name, cv_results.mean(), cv_results.std())\n    print(msg)\n\n# boxplot algorithm\
    \ comparison\nfig = pyplot.figure()\nfig.suptitle('Algorithm Comparison')\nax\
    \ = fig.add_subplot(111)\npyplot.boxplot(results)\nax.set_xticklabels(names)\n\
    pyplot.show()\n```\n\n![](img/c303fad5e139c19353d094c7751ad2f2_279_0.png)\n\n\
    清单 13.1：比较多个算法的示例。\n\n```text\nZeroth Value: 1\nList Length: 4\n1\n2\n3\n4\n```\n\
    \n运行该示例会提供一个列表，包含每个算法的简短名称、平均准确度和准确度标准差。\n\n清单 13.2：比较多个算法的输出。\n\n该示例还提供了一个箱线图，显示了每个算法在每个交叉验证折中准确度分数的分布情况。\n\
    \n![](img/c303fad5e139c19353d094c7751ad2f2_280_0.png)\n\n图 13.1：比较算法性能的箱线图\n\n\
    从这些图中可以看出，逻辑回归和线性判别分析可能都值得在这个问题上进行进一步研究。\n\n## 13.3 总结\n\n在本章中，你学习了如何在Python中使用scikit-learn评估数据集上的多个不同机器学习算法。你学习了如何使用相同的测试框架来评估算法，以及如何使用数值和箱线图来总结结果。你可以将这个方法作为模板，用于评估你自己问题上的多个算法。"
