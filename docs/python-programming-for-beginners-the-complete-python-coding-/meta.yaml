    It is clear there exists an important variability among features due to the scaling
    effect: the magnitude on taxes is of thousands, whereas the one of age is, not
    surprisingly, of hundreds. Furthermore, most of them are not normally distributed,
    that is they are pretty skewed, and so we need to scale them before fitting a
    model. Also, we do not know (a priori) which features might be considered important
    for our model, so scaling is a way to implicitly assign equal weight to different
    features that show different scale and magnitude: only after scaling we will pick
    the ones who explain our target the better (with the drawback of loosing some
    physical interpretability).


    Typically, to scale data we implement the StandardScaler method in scikit-learn:
    this ensures that for each feature the mean is zero and the variance is one, bringing
    all features to the same magnitude. A different scaling is the MinMaxScaler method,
    scales between a minimum and a maximum value, typically zero and one but it is
    flexible. This is especially useful if we have to deal with some features that
    have fixed boundaries: for instance, if I have to squash a feature that ranges
    between 1 and 100, then it makes sense to use this method. If, instead, we are
    dealing with data that comes from an extrem-value distribution, probably this
    method does not make sense at all. Another one is the RobustScaler, which works'
  merge: -1
