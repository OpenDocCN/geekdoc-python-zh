    \ cv_results.std())\n    print(msg)\n```\n\n所有算法都使用默认的调优参数。让我们比较这些算法。在计算过程中，我们将显示每个算法准确率的均值和标准差，并收集结果以备后用。\n\
    \n清单 21.20：使用测试框架评估算法。\n\n运行示例会得到以下输出。结果表明，逻辑回归和K近邻都值得进一步研究。\n\n```\nZeroth Value:\
