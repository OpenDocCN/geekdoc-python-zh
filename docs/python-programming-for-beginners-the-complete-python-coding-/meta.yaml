    # Chapter 4 How to Import Data for Machine Learning


    You must be able to load your data before you can start your machine learning
    project. The most common format for machine learning data is CSV files. There
    are a number of ways to load a CSV file in Python. In this lesson you will learn
    three ways that you can use to load your CSV data in Python:


    +   1. Load CSV Files with the Python Standard Library.

    2. Load CSV Files with NumPy.

    3. Load CSV Files with Pandas.


    Let’s get started.


    # 4.1 Considerations When Loading CSV Data


    There are a number of considerations when loading your machine learning data from
    CSV files. For reference, you can learn a lot about the expectations for CSV files
    by reviewing the CSV request for comment titled Common Format and MIME Type for
    Comma-Separated Values (CSV)


    # 4.1.1 File Header


    Does your data have a file header? If so this can help in automatically assigning
    names to each column of data. If not, you may need to name'
  - '[PAGE 160]


    your attributes manually. Either way, you should explicitly specify whether or
    not your CSV file had a file header when loading your data.


    # 4.1.2 Comments


    Does your data have comments? Comments in a CSV file are indicated by a hash (#)
    at the start of a line. If you have comments in your file, depending on the method
    used to load your data, you may need to indicate whether or not to expect comments
    and the character to expect to signify a comment line.'
  - '[PAGE 161]


    # 4.1.3 Delimiter


    The standard delimiter that separates values in fields is the comma (,) character.
    Your file could use a different delimiter like tab or white space in which case
    you must specify it explicitly.


    # 4.1.4 Quotes


    Sometimes field values can have spaces. In these CSV files the values are often
    quoted. The default quote character is the double quotation marks character. Other
    characters can be used, and you must specify the quote character used in your
    file.


    # 4.2 Pima Indians Dataset


    The Pima Indians dataset is used to demonstrate data loading in this lesson. It
    will also be used in many of the lessons to come. This dataset describes the medical
    records for Pima Indians and whether or not each patient will have an onset of
    diabetes within five years. As such it is a classification problem. It is a good
    dataset for demonstration because all of the input attributes are numeric and
    the output variable to be predicted is binary (0 or 1). The data is freely available
    from the UCI Machine Learning


    # 4.3 Load CSV Files with the Python Standard Library'
