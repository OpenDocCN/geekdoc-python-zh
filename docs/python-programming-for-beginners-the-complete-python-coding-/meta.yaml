    In the next plot we have the feature distribution after scaling: although we have\
    \ standardized the features, we still see they show different distributions: for\
    \ instance, the feature B is really skewed, whereas the PTRATIO looks completely\
    \ different.\n\n```python\nIn [12]: scaler = StandardScaler()\n         scaler.fit(X)\n\
    \n         X_scaled = scaler.transform(X)\n         plt.boxplot(X_scaled)\n\n\
    \         plt.xticks(np.arange(1,X.shape[1]+1), list(X), rotation=30)\n      \
    \   plt.ylabel('MEDV')\n         plt.show()\n```\n\n![](img/c303fad5e139c19353d094c7751ad2f2_78_0.png)\n\
    \nA way to make this data more Gaussian (or at least more behaved) is to use Power\
    \ Transformations such as the well-known Box-Cox Transform, introduced by Box\
    \ and Cox (1964), defined as follows:\n\n$$\ny(\\lambda) = \n\\begin{cases}\n\\\
    frac{x^\\lambda - 1}{\\lambda} & \\text{if } \\lambda \\neq 0 \\\\\n\\ln(x) &\
    \ \\text{if } \\lambda = 0\n\\end{cases}\n$$\n\nThe idea is to raise your data\
    \ $x$ to some power $\\lambda$. Note, however, that this is only applicable to\
    \ non-negative data points, so be careful when trying to apply this transformation:\
    \ in principle, a good practice is to take the absolute value of your data, but\
    \ this decision is up to the scientist. Alternatively, one can use the Yeo and\
    \ Johnson (1997) power transformation, which accommodates for both positive and\
    \ negative values.\n\n```python\nIn [13]: pt = PowerTransformer(method='yeo-johnson')\n\
    \         data_gauss = pt.fit_transform(X_scaled)\n\nIn [14]: print(\"----------Before\
    \ Power Transformation----------\")\n         classification_plots.plot_hist(X_scaled,features,'MEDV')\n\
    ```\n\n----------Before Power Transformation----------\n\nIt is clear there exists\
    \ an important variability among features due to the scaling effect: the magnitude\
    \ on taxes is of thousands, whereas the one of age is, not surprisingly, of hundreds.\
    \ Furthermore, most of them are not normally distributed, that is they are pretty\
    \ skewed, and so we need to scale them before fitting a model. Also, we do not\
    \ know (a priori) which features might be considered important for our model,\
    \ so scaling is a way to implicitly assign equal weight to different features\
    \ that show different scale and magnitude: only after scaling we will pick the\
    \ ones who explain our target the better (with the drawback of losing some physical\
    \ interpretability).\n\nTypically, to scale data we implement the StandardScaler\
    \ method in scikit-learn: this ensures that for each feature the mean is zero\
    \ and the variance is one, bringing all features to the same magnitude. A different\
    \ scaling is the MinMaxScaler method, scales between a minimum and a maximum value,\
    \ typically zero and one but it is flexible. This is especially useful if we have\
    \ to deal with some features that have fixed boundaries: for instance, if I have\
    \ to squash a feature that ranges between 1 and 100, then it makes sense to use\
    \ this method. If, instead, we are dealing with data that comes from an extreme-value\
    \ distribution, probably this method does not make sense at all. Another one is\
    \ the RobustScaler, which works similarly to the Standard one but uses the median\
    \ and the quantiles, instead of the mean and variance: this is definitely useful\
    \ when one has (or suspect to have) outliers, since the median is known to be\
    \ robust with respect to them. Finally, one can use the Normalizer method, which\
    \ is especially used with count data: the granularity here is each single row,\
    \ and normalize each feature vector so that it has a norm equal to one. Note that\
    \ it allows also for other norms, such as the L1 norm, which basically translates\
    \ into a normalization by the sum of absolute values (and its length should be\
    \ equal to one).\n\n**Remark.** Sparse dataset are the ones with many zeros: those\
    \ are very common in genetics, text analysis and even in fraud detection. A practical\
    \ problem one might encounter is that typically we don’t want to store (all) the\
    \ zeros but only the ones: this is not easy, since storing say 100,000 zeros for\
    \ each single row will blow up the RAM of your local machine. In this scenario,\
    \ it does not make any sense to use, say, the StandardScaler, because we would\
    \ subtract a non-zero mean from a zero-value record, which might affect negatively\
    \ the scaling, and affecting the usage of RAM.\n\nComing back to the Boston Dataset,\
    \ we now try to apply the StandardScaler to the set of features, and then compare\
    \ the performances between the unscaled and the scaled dataset.\n\n```python\n\
    In [5]: X_train, X_test, y_train, y_test = train_test_split(X, y,\n         test_size=0.3,\
    \ random_state=42)\n```\n\nOur simpler example on the Boston Dataset will be based\
    \ on the StandardScaler method and on a Regression Task using the KNeighborsRegressor\
    \ method, which is basically a more sophisticated model when the target is continuous,\
    \ as in this case (i.e. MEDV). Before scaling the data, let us see how the model\
    \ performs on unscaled data.\n\n```python\nIn [6]: scores_unscaled = cross_val_score(KNeighborsRegressor(),\n\
    \         X_train, y_train, cv=5)\n         scores_unscaled\n\nOut[6]: array([0.63515605,\
    \ 0.17772906, 0.34902784, 0.43737922,\n         0.37189903])\n```\n\nSince we\
    \ are cross-validating the model, we obtain as many scores as the number of splits\
    \ (in this case, five). Hence, a good summary measure of model performance is\
    \ to take the average of the scores, as follows:\n\n```python\nIn [7]: np.mean(scores_unscaled),\
    \ np.std(scores_unscaled)\nOut[7]: (0.3942382409253963, 0.14786600926386584)\n\
    ```\n\nTo scale the data, we instantiate the Python class StandardScaler, and\
    \ we call the fit method on the scaler object: this practically means computing\
    \ the mean and standard deviation on the training data, whereas the transform\
    \ on the train data basically subtract the mean and divide by the standard deviation\
    \ each single data point in the training set.\n\n```python\nIn [8]: scaler = StandardScaler()\n\
    \         scaler.fit(X_train)\n\n         X_train_scaled = scaler.transform(X_train)\n\
    \         X_test_scaled = scaler.transform(X_test)\n\nIn [9]: scores_scaled =\
    \ cross_val_score(KNeighborsRegressor(),\n         X_train_scaled, y_train, cv=5)\n\
    \n         np.mean(scores_scaled), np.std(scores_scaled)\nOut[9]: (0.7009222608410279,\
    \ 0.029897124253597467)\n```\n\nWe see that the performance increases significantly\
    \ by scaling the data. But be careful: different scaling methods lead to different\
    \ results, which requires either proper Exploratory Data Analysis (EDA) or good\
    \ attention from the researcher to understand the best method to apply. Last,\
    \ but not least, one should note that when we run the scikit-learn cross_val_score\
    \ method, we have used the entire scaled training dataset: this means that for\
    \ each different split done in cross-validation, its corresponding test fold was\
    \ already used to find the proper scaling, which therefore violates the independence\
    \ assumption that we require from the training and the test set to have unbiased\
    \ estimates. In other words, we are leaking information from the test set to find\
    \ the optimal scaling! Furthermore, when we go into production, new, unseen data\
    \ comes into the model, but that set is not going to be used to scale the training\
    \ dataset, and therefore could have different scaling and values. To overcome\
    \ this problem, we fit the scaling on only the training dataset, and evaluate\
    \ the model performances on the validation set using cross-validation. In order\
    \ to avoid this kind of problems, we use the Pipeline class, which allows to perform\
    \ the splitting phase within the cross-validation by chaining these two steps.\n\
    \n```python\nIn [10]: pipeline = make_pipeline(StandardScaler(),\n          KNeighborsRegressor())\n\
    \          scores_pipe = cross_val_score(pipeline, X_train,\n          y_train,\
    \ cv=5)\n          np.mean(scores_pipe), np.std(scores_pipe)\n\nOut[10]: (0.6944726314773543,\
    \ 0.028669555232832964)\n```\n\n```python\nIn [11]: par_grid = {'kneighborsregressor__n_neighbors':\
    \ range(1,10)}\n          grid = GridSearchCV(pipeline, param_grid=par_grid, cv=5)\n\
    \          grid.fit(X_train, y_train)\n\n          print(\"Number of Neighbors\
    \ Best Parameter: \", grid.best_params_['kneighborsregressor__n_neighbors'])\n\
    \          print(\"Score on Test set: {:.4f}\".format(grid.score(X_test, y_test)))\n\
    ```\n\nNumber of Neighbors Best Parameter: 2\nScore on Test set: 0.7887\n\n```python\n\
