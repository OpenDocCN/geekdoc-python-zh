  md: '# 9.3 K-fold Cross Validation


    Cross validation is an approach that you can use to estimate the performance of
    a machine learning algorithm with less variance than a single train-test set split.
    It works by splitting the dataset into (e.g. k = 5 or k = 10). Each split of the
    data is called a fold. The algorithm is trained on k 1 folds with one held back
    and tested on the held back fold. This is repeated so that each fold of the dataset
    is given a chance to be the held back test set. After running cross validation
    you end up with k different performance scores that you can summarize using a
    mean and a standard deviation.


    ```

    # Evaluate using Cross Validation

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LogisticRegression

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    num_folds = 10

    seed = 7

    kfold = KFold(n_splits=num_folds, random_state=seed)

    ```


    The result is a more reliable estimate of the performance of the algorithm on
    new data. It is more accurate because the algorithm is trained and evaluated multiple
    times on different data. The choice of k must allow'
  merge: -1
  pgno: 221
- img_proc: true
  md: 'the size of each test partition to be large enough to be a reasonable sample
    of the problem, whilst allowing enough repetitions of the train-test evaluation
    of the algorithm to provide a fair estimate of the algorithms performance on unseen
    data. For modest sized datasets in the thousands or tens of thousands of records,
    k values of 3, 5 and 10 are common. In the example below we use 10-fold cross
    validation.


    Listing 9.3: Example of evaluating an algorithm with Cross Validation.


