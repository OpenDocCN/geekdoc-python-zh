    ## 回归指标


    本节将回顾评估回归机器学习问题预测结果的三个最常用指标：


    - 平均绝对误差。

    - 均方误差。


    ## 平均绝对误差


    ```python

    # 交叉验证回归

    # MAE

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LinearRegression


    filename = ''housing.csv''

    names = [''CRIM'', ''ZN'', ''INDUS'', ''CHAS'', ''NOX'', ''RM'', ''AGE'', ''DIS'',
    ''RAD'', ''TAX'', ''PTRATIO'', ''B'', ''LSTAT'', ''MEDV'']

    dataframe = read_csv(filename, delim_whitespace=True, names=names)

    array = dataframe.values

    X = array[:,0:13]

    Y = array[:,13]

    kfold = KFold(n_splits=10, random_state=7)

    model = LinearRegression()

    scoring = ''neg_mean_absolute_error''

    results = cross_val_score(model, X, Y, cv=kfold, scoring=scoring)

    print("MAE : %.3f (%.3f)" % (results.mean(), results.std()))

    ```


    平均绝对误差（或MAE）是预测值与实际值之间绝对差值的总和。它给出了预测错误程度的概念。该度量给出了误差大小的概念，但没有给出方向（例如，高估或低估）的概念。下面的例子演示了在波士顿房价数据集上计算平均绝对误差。


    清单 10.11：通过平均绝对误差评估算法的示例。


    ```python

    python --version

    ```


    值为0表示没有误差或完美的预测。与对数损失类似，该指标在`cross_val_score()`函数中是取反的。


