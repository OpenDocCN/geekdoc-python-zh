- md: "Meanwhile this book was written, a new version of scikit-learn went out (version\
    \ 0.21.0), where the interested reader can find a new, dynamic, and powerful imputing\
    \ method, called IterativeImputer, from the Impute class, which is a clever strategy\
    \ for imputing missing values by modeling each feature with missing values as\
    \ a function of other features using a supervised learning model. We basically\
    \ pick each column, and use it as a target, while using the other k – 1 features\
    \ as input of the chosen supervised model (e.g. Random Forest or Linear Regressor),\
    \ and then one uses that model to predict on the missing values.\n\n## Techniques\
    \ for Handling Unbalanced Information\n\nSo far we have focused on a few important\
    \ characteristics that, globally, distinguish a dataset, namely how to deal with\
    \ categorical variables (or missing values), and to scale the data. The dataset\
    \ preprocessing is probably the most important step in building a ML model, since\
    \ its outcome is going to be strictly dependent on that step. However, real datasets\
    \ deal with many others possible features that we have not discussed yet: among\
    \ many, it is worth to mention the issue of imbalanced datasets. Imbalanced datasets\
    \ often arise in classification problems where the classes are not equally distributed\
    \ among the examples. Unfortunately, this is quite a common problem in Machine\
    \ Learning and Computer Vision, since we might not have a sufficient number of\
    \ training examples that allows to correctly predict the minority class. This\
    \ issue affects different areas, including cancer diagnosis using f-MRI, cyber\
    \ security, and financial crime. As an example, insurance companies are investing\
    \ resources in constructing ML pipelines to detect fraudulent behaviours in reported\
    \ claims. Luckily, most of them are not fraudulent, and just a few of belong instead\
    \ to the positive class (i.e. the fraudulent one). As a consequence, if we try\
    \ to fit a classifier on such an imbalanced dataset, it is likely to get a biased\
