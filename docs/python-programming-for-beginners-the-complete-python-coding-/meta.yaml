    ## 17.3 Advice on Concluding Your Model


    This section lists some important considerations when finalizing your machine
    learning models.


    **Python** Take note of the Python version. You almost certainly require the same
    major (and maybe minor) version of Python used to serialize the model when you
    later load it and deserialize it.


    **Library** The version of all major libraries used in your machine learning project
    almost certainly need to be the same when deserializing a saved model. This is
    not limited to the version of NumPy and the version of scikit-learn.


    **Manual** You might like to manually output the parameters of your learned model
    so that you can use them directly in scikit-learn or another platform in the future.
    Often the techniques used internally by machine learning algorithms to make predictions
    are a lot simpler than those used to learn the parameters and may be easy to implement
    in custom code that you have control over.


    Take note of the version so that you can re-create the environment if for some
    reason you cannot reload your model on another machine or another platform at
    a later time.


    ## 17.4 Summary


    In this chapter you discovered how to persist your machine learning algorithms
    in Python with scikit-learn. You learned two techniques that you can use:


    - The pickle API for serializing standard Python objects.

    - The Joblib API for efficiently serializing Python objects with NumPy arrays.


