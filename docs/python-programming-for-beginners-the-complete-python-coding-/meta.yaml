    ## Mean Squared Error


    ```python

    # Cross Validation Regression

    # MSE

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LinearRegression


    filename = ''housing.csv''

    names = [''CRIM'', ''ZN'', ''INDUS'', ''CHAS'', ''NOX'', ''RM'', ''AGE'', ''DIS'',
    ''RAD'', ''TAX'', ''PTRATIO'', ''B'', ''LSTAT'', ''MEDV'']

    dataframe = read_csv(filename, delim_whitespace=True, names=names)

    array = dataframe.values

    X = array[:,0:13]

    Y = array[:,13]

    num_folds = 10

    kfold = KFold(n_splits=10, random_state=7)

    model = LinearRegression()

    scoring = ''neg_mean_squared_error''

    results = cross_val_score(model, X, Y, cv=kfold, scoring=scoring)

    print("MSE: %.3f (%.3f)" % (results.mean(), results.std()))

    ```


    The Mean Squared Error (or MSE) is much like the mean absolute error in that it
    provides a gross idea of the magnitude of error. Taking the square root of the
    mean squared error converts the units back to the original units of the output
    variable and can be meaningful for description and presentation. This is called
    the Root Mean Squared Error (or RMSE). The example below provides a demonstration
    of calculating mean squared error.


