    # Chapter 2 Python Machine Learning Ecosystem


    The Python ecosystem is growing and may become the dominant platform for machine
    learning. The primary rationale for adopting Python for machine learning is because
    it is a general purpose programming language that you can use both for R&D and
    in production. In this chapter you will discover the Python ecosystem for machine
    learning. After completing this lesson you will know:


    Python and it’s rising use for machine learning.

    SciPy and the functionality it provides with NumPy, Matplotlib and Pandas.

    scikit-learn that provides all of the machine learning algorithms.

    How to setup your Python ecosystem for machine learning and what versions to use
    Let’s get started.


    # Python


    ```

    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    Complex is better than complicated. Flat is better than nested.

    Sparse is better than dense.Readability

    ```


    Python is a general purpose interpreted programming language. It is easy to learn
    and use primarily because the language focuses on readability. The philosophy
    of Python is captured in the Zen of Python which includes phrases like:


    Listing 2.1: Sample of the Zen of Python.'
