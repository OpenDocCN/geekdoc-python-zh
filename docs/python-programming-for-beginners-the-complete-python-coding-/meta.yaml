- md: '## 18.3.2 Summarize Data


    This step is about better understanding the data that you have available. This
    includes understanding your data using:


    - Descriptive statistics such as summaries.

    - Data visualizations such as plots with Matplotlib, ideally using convenience
    functions from Pandas.


    Take your time and use the results to prompt a lot of questions, assumptions and
    hypotheses that you can investigate later with specialized models.


    ## 18.3.3 Prepare Data


    This step is about preparing the data in such a way that it best exposes the structure
    of the problem and the relationships between your input attributes with the output
    variable. This includes tasks such as:


    - Cleaning data by removing duplicates, marking missing values and even imputing
    missing values.

    - Feature selection where redundant features may be removed and new features developed.

    - Data transforms where attributes are scaled or redistributed in order to best
    expose the structure of the problem later to learning algorithms.


    Start simple. Revisit this step often and cycle with the next step until you converge
    on a subset of algorithms and a presentation of the data that results in accurate
    or accurate-enough models to proceed.


    ## 18.3.4 Evaluate Algorithms


    This step is about finding a subset of machine learning algorithms that are good
    at exploiting the structure of your data (e.g. have better than average skill).
    This involves steps such as:


    - Separating out a validation dataset to use for later confirmation of the skill
    of your developed model.

    - Defining test options using scikit-learn such as cross validation and the evaluation
    metric to use.

    - Spot-checking a suite of linear and nonlinear machine learning algorithms.

    - Comparing the estimated accuracy of algorithms.


    On a given problem you will likely spend most of your time on this and the previous
    step until you converge on a set of 3-to-5 well performing machine learning algorithms.


    ## 18.3.5 Improve Accuracy


    Once you have a shortlist of machine learning algorithms, you need to get the
    most out of them. There are two different ways to improve the accuracy of your
    models:


    - Search for a combination of parameters for each algorithm using scikit-learn
    that yields the best results.

    - Combine the prediction of multiple models into an ensemble prediction using
    ensemble techniques.


    The line between this and the previous step can blur when a project becomes concrete.
    There may be a little algorithm tuning in the previous step. And in the case of
    ensembles, you may bring more than a shortlist of algorithms forward to combine
    their predictions.


    ## 18.3.6 Finalize Model


    Once you have found a model that you believe can make accurate predictions on
    unseen data, you are ready to finalize it. Finalizing a model may involve sub-tasks
    such as:


    - Using an optimal model tuned by scikit-learn to make predictions on unseen data.

    - Creating a standalone model using the parameters tuned by scikit-learn.

    - Saving an optimal model to file for later use.


    Once you make it this far you are ready to present results to stakeholders and/or
    deploy your model to start making predictions on unseen data.


    ## 18.4 Tips For Using The Template Well


    This section lists tips that you can use to make the most of the machine learning
    project template in Python.


    - **Fast** Make a first-pass through the project steps as fast as possible. This
    will give you confidence that you have all the parts that you need and a baseline
    from which to improve.

    - The process is not linear but cyclic. You will loop between steps, and probably
    spend most of your time in tight loops between steps 3-4 or 3-4-5 until you achieve
    a level of accuracy that is sufficient or you run out of time.

    - **Attempt Every** It is easy to skip steps, especially if you are not confident
    or familiar with the tasks of that step. Try and do something at each step in
    the process, even if it does not improve accuracy. You can always build upon it
    later. Don’t skip steps, just reduce their contribution.

    - **Ratchet** The goal of the project is model accuracy. Every step contributes
    towards this goal. Treat changes that you make as experiments that increase accuracy
    as the golden path in the process and reorganize other steps around them. Accuracy
    is a ratchet that can only move in one direction (better, not worse).

    - **Adapt As** Modify the steps as you need on a project, especially as you become
    more experienced with the template. Blur the edges of tasks, such as steps 4-5
    to best serve model accuracy.


    ## 18.5 Summary


    In this lesson you discovered a machine learning project template in Python. It
    laid out the steps of a predictive modeling machine learning project with the
    goal of maximizing model accuracy. You can copy-and-paste the template and use
    it to jump-start your current or next machine learning project in Python.


    ### 18.5.1 Next Step


    Now that you know how to structure a predictive modeling machine learning project
    in Python, you need to put this knowledge to use. In the next lesson you will
    work through a simple case study problem end-to-end. This is a famous case study
    and the hello world of machine learning projects.


    ## Chapter 19 Your First Machine Learning Project in Python Step-By-Step


    You need to see how all of the pieces of a predictive modeling machine learning
    project actually fit together. In this lesson you will complete your first machine
    learning project using Python. In this step-by-step tutorial project you will:


    - Download and install Python SciPy and get the most useful package for machine
    learning in Python.

    - Load a dataset and understand its structure using statistical summaries and
    data visualization.

    - Create 6 machine learning models, pick the best and build confidence that the
    accuracy is reliable.


    If you are a machine learning beginner and looking to finally get started using
    Python, this tutorial was designed for you. Let’s get started!


    ## 19.1 The Hello World of Machine Learning


    The best small project to start with on a new tool is the classification of iris
    flowers. This is a good dataset for your first project because it is so well understood.


    - Attributes are numeric so you have to figure out how to load and handle data.

    - It is a classification problem, allowing you to practice with an easier type
    of supervised learning algorithm.

    - It is a multiclass classification problem (multi-nominal) that may require some
    specialized handling.

    - It only has 4 attributes and 150 rows, meaning it is small and easily fits into
    memory (and a screen or single sheet of paper).

    - All of the numeric attributes are in the same units and the same scale not requiring
    any special scaling or transforms to get started.


