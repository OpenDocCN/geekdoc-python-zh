  md: '# Area Under ROC Curve


    Area under ROC Curve (or AUC for short) is a performance metric for binary classification
    problems. The AUC represents a model’s ability to discriminate between positive
    and negative classes. An area of 1.0 represents a model that made all predictions
    perfectly. An area of 0.5 represents a model that is as good as random. ROC can
    be broken down into sensitivity and specificity. A binary classification problem
    is really a trade-off between sensitivity and specificity.


    Sensitivity is the true positive rate also called the recall. It is the number
    of instances from the positive (first) class that actually predicted correctly.'
  merge: -1
  pgno: 236
