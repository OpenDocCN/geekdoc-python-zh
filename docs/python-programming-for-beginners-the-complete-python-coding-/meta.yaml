- md: '## 9.3 K-fold Cross Validation


    Cross validation is an approach that you can use to estimate the performance of
    a machine learning algorithm with less variance than a single train-test set split.
    It works by splitting the dataset into (e.g. k = 5 or k = 10). Each split of the
    data is called a fold. The algorithm is trained on k-1 folds with one held back
    and tested on the held back fold. This is repeated so that each fold of the dataset
    is given a chance to be the held back test set. After running cross validation
    you end up with k different performance scores that you can summarize using a
    mean and a standard deviation.


    ```python

    # Evaluate using Cross Validation

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LogisticRegression

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    num_folds = 10

    seed = 7

    kfold = KFold(n_splits=num_folds, random_state=seed)

    ```


    The result is a more reliable estimate of the performance of the algorithm on
    new data. It is more accurate because the algorithm is trained and evaluated multiple
    times on different data. The choice of k must allow the size of each test partition
    to be large enough to be a reasonable sample of the problem, whilst allowing enough
    repetitions of the train-test evaluation of the algorithm to provide a fair estimate
    of the algorithms performance on unseen data. For modest sized datasets in the
    thousands or tens of thousands of records, k values of 3, 5 and 10 are common.
    In the example below we use 10-fold cross validation.


    Listing 9.3: Example of evaluating an algorithm with Cross Validation.


    ```python

    python --version

    ```


    You can see that we report both the mean and the standard deviation of the performance
    measure. When summarizing performance measures, it is a good practice to summarize
    the distribution of the measures, in this case assuming a Gaussian distribution
    of performance (a very reasonable assumption) and recording the mean and standard
    deviation.


    Listing 9.4: Output of evaluating an algorithm with Cross Validation.


    ## 9.4 Departure-One Cross-Validation


    You can configure cross validation so that the size of the fold is 1 is set to
    the number of observations in your dataset). This variation of cross validation
    is called leave-one-out cross validation. The result is a large number of performance
    measures that can be summarized in an effort to give a more reasonable estimate
    of the accuracy of your model on unseen data. A downside is that it can be a computationally
    more expensive procedure than cross validation. In the example below we use leave-one-out
    cross validation.


    ```python

    # Evaluate using Leave One Out Cross Validation

    from pandas import read_csv

    from sklearn.model_selection import LeaveOneOut

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LogisticRegression

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    num_folds = 10

    loocv = LeaveOneOut()

    model = LogisticRegression()

    ```


