    ```


    You can see in the standard deviation that the score has more variance than the
    cross validation results described above.


    Listing 9.6: Output of evaluating an algorithm with Leave One Out Cross Validation.


    ## 9.5 Continual Random Test-Train Splitting


    ```python

    # Evaluate using Shuffle Split Cross Validation

    from pandas import read_csv

    from sklearn.model_selection import ShuffleSplit

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LogisticRegression


    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    ```


    Another variation on cross validation is to create a random split of the data
    like the train/test split described above, but repeat the process of splitting
    and evaluation of the algorithm multiple times, like cross validation. This has
    the speed of using a train/test split and the reduction in variance in the estimated
    performance of cross validation. You can also repeat the process many more times
    as needed to improve the accuracy. A down side is that repetitions may include
    much of the same data in the train or the test split from run to run, introducing
    redundancy into the evaluation. The example below splits the data into a 67%/33%
    train/test split and repeats the process 10 times.


    ```python

    seed = 7

    kfold = ShuffleSplit(n_splits=n_splits, test_size=test_size,

    random_state=seed)

    model = LogisticRegression()

    results = cross_val_score(model, X, Y, cv=kfold)

    print("Accuracy : %.3f%% (%.3f%%)") % (results.mean()*100.0, results.std()*100.0)

    ```


    Listing 9.7: Example of evaluating an algorithm with Shuffle Split Cross Validation.


    We can see that in this case the distribution of the performance measure is on
    par with cross validation above.


