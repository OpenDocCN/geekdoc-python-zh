    ## Summary


    In this chapter you discovered how to load your machine learning data in Python.
    You learned three specific techniques that you can use:


    - Load CSV Files with the Python Standard Library.

    - Load CSV Files with NumPy.

    - Load CSV Files with Pandas.


    Generally I recommend that you load your data with Pandas in practice and all
    subsequent examples in this book will use this method.


    ## Next


    Now that you know how to load your CSV data using Python it is time to start looking
    at it. In the next lesson you will discover how to use simple descriptive statistics
    to better understand your data.


    ## Chapter 5 Use Descriptive Statistics to Gain Understanding of Your Data


    You must understand your data in order to get the best results. In this chapter
    you will discover 7 recipes that you can use in Python to better understand your
    machine learning data. After reading this lesson you will know how to:


    1. Take a peek at your raw data.

    2. Review the dimensions of your dataset.

    3. Review the data types of attributes in your data.

    4. Summarize the distribution of instances across classes in your dataset.

    5. Summarize your data using descriptive statistics.

    6. Understand the relationships in your data using correlations.

    7. Review the skew of the distributions of each attribute.


    Each recipe is demonstrated by loading the Pima Indians Diabetes classification
    dataset from the UCI Machine Learning repository. Open your Python interactive
    environment and try each recipe out in turn. Let’s get started.


    ### 5.1 Peek at Your Data


    ```python

    # View first 20 rows

    from pandas import read_csv

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    peek = data.head(20)

    ```


    There is no substitute for looking at the raw data. Looking at the raw data can
    reveal insights that you cannot get any other way. It can also plant seeds that
    may later grow into ideas on how to better pre-process and handle the data for
    machine learning tasks. You can review the first 20 rows of your data using the
    head() function on the Pandas DataFrame.


    ```python

    print(peek)

    ```


