  md: '# Chapter 8 Choosing Features for Machine Learning


    The data features that you use to train your machine learning models have a huge
    influence on the performance you can achieve. Irrelevant or partially relevant
    features can negatively impact model performance. In this chapter you will discover
    automatic feature selection techniques that you can use to prepare your machine
    learning data in Python with scikit-learn. After completing this lesson you will
    know how to use:


    +   1. Univariate Selection.

    2. Recursive Feature Elimination.

    3. Principle Component Analysis.

    4. Feature Importance.


    Let’s get started.


    # 8.1 Feature Selection


    Feature selection is a process where you automatically select those features in
    your data that contribute most to the prediction variable or output in which you
    are interested. Having irrelevant features in your data can decrease the accuracy
    of many models, especially linear algorithms like linear and logistic regression.
    Three benefits of performing feature selection before modeling your data are:


    Reduces Less redundant data means less opportunity to make decisions based on
    noise.


    Improves Less misleading data means modeling accuracy improves.'
