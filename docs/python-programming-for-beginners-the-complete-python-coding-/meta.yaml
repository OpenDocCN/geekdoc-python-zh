    在本章中，你使用Python从头到尾完成了一个回归预测建模的机器学习问题。具体涵盖的步骤如下：


    -   问题定义（波士顿房价数据）。

    -   加载数据集。

    -   分析数据（存在一些偏态分布和相关属性）。

    -   评估算法（线性回归表现良好）。

    -   使用标准化评估算法（KNN表现良好）。

