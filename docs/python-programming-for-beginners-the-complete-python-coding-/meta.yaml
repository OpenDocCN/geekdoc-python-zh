  md: "```\n# Split-out validation\ndatasetarray =\ndatasetvalues\nX = array[:,0:4]\n\
    Y = array[:,4]\nvalidation_size = 0.20\nseed = 7\nX_train, X_validation, Y_train,\
    \ Y_validation = train_test_split(X, Y,\n    test_size=validation_size, random_state=seed)\n\
    ```\n\nhow accurate the best model might actually be. We will split the loaded\
    \ dataset into two, 80% of which we will use to train our models and 20% that\
    \ we will hold back as a validation dataset.\n\nListing 19.14: Separate data into\
    \ Train and Validation Datasets.\n\nYou now have training data in the X train\
    \ and Y train for preparing models and a\n\nX validation and Y validation sets\
    \ that we can use later.\n\n# 19.5.2 Test Harness\n\nWe will use 10-fold cross\
    \ validation to estimate accuracy. This will split our dataset into 10 parts,\
    \ train on 9 and test on 1 and repeat for all combinations of train-test splits.\
    \ We are using the metric of accuracy to evaluate models. This is a ratio of the\
    \ number of correctly predicted instances divided by the total number of instances\
    \ in the dataset multiplied by 100 to give a percentage (e.g. 95% accurate). We\
    \ will be using the scoring variable when we run build and evaluate each model\
    \ next.\n\n# 19.5.3 Build Models"
