    # Reducing Dimensionality: Principal Component Analysis


    In the modern era of machine learning, people involved in data science have to
    deal with a large number of variables. For example, in computer vision problems,
    we have to deal with images classification, which machine representation is on
    term of pixels. In order to make quantitative analysis, those pixels are described
    as quantitative (binary) variables. But a natural question is: how many pixels
    does an image have? If we pick a modern 4K image, its resolution is 3840 x 2160
    pixels, and so to process such image, we need to take into account 24, 883, 200
    variables (just multiply the number of pixels by the three color channels, i.e.
    blue, red and green).


    This is a huge amount of features, and dealing with all of them might be extremely
    painful for many machine learning algorithms. Indeed, high dimensionality increases
    the computational complexity, as well as it increases the risk of overfitting
    and the chances of having sparsity. Hence, it is good practice to reduce the dimensionality
    of the problem by'
  merge: -1
  pgno: 101
- img_proc: true
  md: 'projecting the data into a space with less dimension, which allows to control
    these effects.


    There exists a large number of dimensionality reduction techniques known in litera-
    ture, but we will focus on the Principal Component Analysis.


    Principal component analysis is one of the oldest and best known methods for reduc-
    ing dimensionality in multivariate problems. It basically aims at finding a few
    prin- cipal components that contain as much information on the dependent variable
    as the'
  merge: -1
  pgno: 102
- img_proc: true
  md: 'one contained in the original set of predictors: this original set of variables
    is trans- formed into a smaller set of linear combinations, called principal components
    (PC). These new variables are uncorrelated and ordered so that the first PC accounts
    for the largest proportion of the variation present in the original set of features.
    Note that in regression problems, it is essentially used to prevent (or at least
    reduce) collinear- ity among independent variables.


    # PCA as dimensionality reduction


    PCA basically rotates the dataset so that the rotated features are statistically
    uncor- related. This rotation is often followed by selecting the principal components,
    ac- cording to how important they are for explaining the data. The algorithm works
    as follows: we look for the vector (or direction) in the data that contains most
    of the information, that is the direction along which the features are most correlated
    with each other. Then, the algorithm finds the direction that contains the most
    informa- tion while being orthogonal (at a right angle) to the first direction,
    and so on. In two dimensions, there is only one possible orientation, that is
    at a right angle, but in higher-dimensional spaces there would be (infinitely)
    many orthogonal directions. Note that the length of each vector is an indication
    of how important that axis is in describing the distribution of the data, that
    is it is a measure of the variance of the data when projected onto the axis. The
    projection of each data point onto the princi- pal axes are indeed the principal
    components of the data.


    As an illustrative example, let’s consider the following toy dataset, which is
    shown in Figure 1.6:


    ```

