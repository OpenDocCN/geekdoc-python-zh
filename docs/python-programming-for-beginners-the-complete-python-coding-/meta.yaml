    ```\n\n这些只是平均准确率值。明智的做法是查看在交叉验证折中计算出的准确率值的分布。我们可以使用箱线图以图形方式来展示这一点。\n\n清单 21.22：算法性能分布的可视化。\n\
    \n结果显示KNN的分布很紧凑，这令人鼓舞，表明其方差较低。\n\nSVM的糟糕结果令人惊讶。\n\n![](img/c303fad5e139c19353d094c7751ad2f2_412_0.png)\n\
    \n图 21.5：算法性能的箱线图。属性分布的多样性可能会影响SVM等算法的准确性。在下一节中，我们将使用标准化后的训练数据集副本重复此抽查。\n\n##\
    \ 21.6 评估算法：标准化数据\n\n```python\n# 标准化数据集\npipelines = []\npipelines.append((\"\
    ScaledLR\", Pipeline([(\"Scaler\",\n    StandardScaler()),(\"LR\", LogisticRegression())])))\n\
    pipelines.append((\"ScaledLDA\", Pipeline([(\"Scaler\",\n    StandardScaler()),(\"\
    LDA\", LinearDiscriminantAnalysis())])))\n```\n\n我们怀疑原始数据的不同分布可能对某些算法的性能产生了负面影响。让我们使用标准化后的数据集副本来评估相同的算法。这里的数据经过转换，使得每个属性的均值为零，标准差为一。在转换数据时，我们还需要避免数据泄露。避免泄露的一个好方法是使用管道，它在交叉验证测试框架的每一折中对数据进行标准化并构建模型。这样，我们就可以公平地估计每个使用标准化数据的模型在未见数据上的表现。"
