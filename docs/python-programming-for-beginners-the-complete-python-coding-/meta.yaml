    # INTRODUCTION


    Extracting actionable information from data is changing the fabric of modern business
    in ways that directly affect programmers. One way is the demand for new programming
    skills. Market analysts predict demand for people with advanced statistics and
    machine learning skills will exceed supply by 140,000 to 190,000 by 2018. That
    means good salaries and a wide choice of interesting projects for those who have
    the requisite skills. Another development that affects programmers is progress
    in developing core tools for statistics and machine learning. This relieves programmers
    of the need to program intricate algorithms for themselves each time they want
    to try a new one. Among general-purpose programming languages, Python developers
    have been in the forefront, building state-of-the-art machine learning tools,
    but there is a gap between having the tools and being able to use them efficiently.


    Programmers can gain general knowledge about machine learning in a number of ways:
    online courses, a number of well-written books, and so on. Many of these give
    excellent surveys of machine learning algorithms and examples of their use, but
    because of the availability of so many different algorithms, it’s difficult to
    cover the details of their usage in a survey.


    This leaves a gap for the practitioner. The number of algorithms available requires
    making choices that a programmer new to machine learning might not be equipped
    to make until trying several, and it leaves the programmer to fill in the details
    of the usage of these algorithms in the context of overall problem formulation
    and solution.


    This book attempts to close that gap. The approach taken is to restrict the algo-
    rithms covered to two families of algorithms that have proven to give optimum
    performance for a wide variety of problems. This assertion'
- md: 'is supported by their dominant usage in machine learning competitions, their
    early inclusion in newly developed packages of machine learning tools, and their
    performance in comparative studies (as discussed in Chapter 1, “The Two Essential
    Algorithms for Making Predictions”). Restricting attention to two algorithm families
    makes it possible to provide good coverage of the principles of operation and
    to run through the details of a number of examples showing how these algorithms
    apply to problems with different structures.


    The book largely relies on code examples to illustrate the principles of operation
    for the algorithms discussed. I’ve discovered in the classes I have taught at
    University of California, Berkeley, Galvanize, University of New Haven, and Hacker
    Dojo, that programmers generally grasp principles more readily by seeing simple
    code illustrations than by looking at math.


    This book focuses on Python because it offers a good blend of functionality and
    specialized packages containing machine learning algorithms. Python is an often-used
    language that is well known for producing compact, readable code. That fact has
    led a number of leading companies to adopt Python for prototyping and deployment.
    Python developers are supported by a large community of fellow developers, development
    tools, extensions, and so forth. Python is widely used in industrial applications
    and in scientific programming, as well. It has a number of packages that support
    computationally intensive applications like machine learning, and it is a good
    collection of the leading machine learning algorithms (so you don’t have to code
    them yourself). Python is a better general-purpose programming language than specialized
    statistical languages such as R or SAS (Statistical Analysis System). Its collection
    of machine learning algorithms incorporates a number of top-flight algorithms
    and continues to expand.


    ## Chapter 1 Overview of Artificial Intelligence


    Generally when we deal with classical machine learning problems, we typically
    distinguish between supervised and unsupervised learning methods. In supervised
    learning, we have a sequence of independent and identical distributed examples
    $(x_i, y_i)$ where $x_i \in \mathbb{R}^d$ describes a vector of features summarizing
    the available data, and $y_i \in \mathbb{R}$ is the target variable, that is the
    dependent variable of our model. The objective of supervised learning is to find
    a function $f(\cdot)$ so that $f(x_i) \approx y_i$, that is we need to find a
    function that approximates the distribution well on the training set but it also
    generalizes to new, unseen samples that are drawn from the same distribution.
    This is the real objective of supervised learning methods: based on a labelled
    dataset, you would like to classify a new data point that comes from the same
    distribution. On the contrary, unsupervised methods find applications to dataset
    where the target is either missing or has not been labelled. Such techniques are
    used to search for common patterns within the available data, since they are characterized
    only by a vector of input data. Note that unsupervised methods are widely used
    in many applications: from clustering to topic detection in Natural Language Processing
    and dimensionality reduction, which is a very wide family of techniques that in
    this book will be covered in its essential aspects: just to frame the problem,
    it maps a set of high dimensional input instances into a lower dimensional space,
    while preserving certain properties of the dataset. Nowadays, dimensionality reduction
    techniques are also used in many scientific fields, such as genetics or computer
    science, where datasets are characterized by a large amount of features, so that
    we can reduce the dimensionality of the problem while retaining the intrinsic
    variability of the model.


    ## A basic supervised model: Neighbor to Neighbor


    Let’s introduce the main machine learning modeling pipeline with a simple algorithm:
    the so-called Nearest Neighbors. We will illustrate this algorithm with a classification
    task, on a 2-dimensional vector of features, but please do note that it can also
    be used for classical regression tasks. Along this book, we will mainly use scikit-learn.
    The scikit project started in 2011 (see Pedregosa et al. (2011) for further references),
    and it is nowadays the one of the main Python open source platform for machine
    learning. In the last few years, Tensorflow, developed by Google in 2015 (see
    Abadi et al. (2015) for details) has gained a remarkable popularity, especially
    in the Deep Learning community, and is nowadays extensively used to perform ML
    projects and pipelines.


    As a first task, we import the necessary libraries and modules that will be used
    in this Chapter.


    ```

    In [1]: from egeaML import *


    from sklearn.model_selection import train_test_split

    from sklearn.model_selection import cross_val_score

