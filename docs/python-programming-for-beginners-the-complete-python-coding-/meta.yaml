    problem. In this section we will finalize the model by training it on the entire
    training dataset and make predictions for the hold-out validation dataset to confirm
    our findings. A part of the findings was that SVM performs better when the dataset
    is standardized so that all attributes have a mean value of zero and a standard
    deviation of one. We can calculate this from the entire training dataset and apply
    the same transform to the input attributes from the validation dataset.


    ```python

    print(confusion_matrix(Y_validation, predictions))

    print(classification_report(Y_validation, predictions))

    ```


    Listing 21.33: Evaluate SVM on the Validation Dataset.


    ![](img/c303fad5e139c19353d094c7751ad2f2_427_0.png)


    We can see that we achieve an accuracy of nearly 86% on the held-out validation
    dataset. A score that matches closely to our expectations estimated above during
    the tuning of SVM.


    Listing 21.34: Output of Evaluating SVM on the Validation Dataset.


    ## 21.10 Summary


    In this chapter you worked through a classification predictive modeling machine
    learning problem from end-to-end using Python. Specifically, the steps covered
    were:


    - Problem Definition (Sonar return data).

    - Loading the Dataset.

    - Analyze Data (same scale but different distributions of data).

    - Evaluate Algorithms (KNN looked good).

    - Evaluate Algorithms with Standardization (KNN and SVM looked good).

    - Algorithm Tuning (K=1 for KNN was good, SVM with an RBF kernel and C=1.5 was
    best).

    - Ensemble Methods (Bagging and Boosting, not quite as good as SVM).

    - Finalize Model (use all training data and confirm using validation dataset).


    Working through this case study showed you how the recipes for specific machine
    learning tasks can be pulled together into a complete project. Working through
    this case study is good practice at applied machine learning using Python.


    ### 21.10.1 Next Step


    This was the third and final predictive modeling project case study. Well done!
    You now have experience and skills in working through predictive modeling machine
    learning projects end-to-end. In the next section you will discover ideas for
    additional small case study projects that you could work on for further practice.


    ## Chapter 22 More Predictive Modeling Projects


    You can now work through predictive modeling machine learning projects using Python.
    Now what? In this chapter, we look at ways that you can practice and refine your
    new found skills.


    ### 22.1 Build And Maintain Recipes


    Throughout this book you have worked through many machine learning lessons using
    Python. Taken together, this is the start of your own private code base that you
    can use to jump-start your current or next machine learning project. These recipes
    are a beginning, not an end. The larger and more sophisticated that your catalog
    of machine learning recipes becomes, the faster you can get started on new projects
    and the more accurate the models that you can develop.


    As you apply your machine learning skills using the Python platform, you will
    develop experience and skills with new and different techniques with Python. You
    can pull out or abstract snippets and recipes as you go along and add them to
    your own collection of recipes, building upon the code that you can use on future
    machine learning projects. With time, you will amass your own mature and highly-tailored
    catalog of machine learning code for Python.


    ### 22.2 Small Projects on Small Datasets


    Keep practicing your skills using Python. Datasets from the UCI Machine Learning
    were used throughout this book to demonstrate how to achieve specific tasks in
    a machine learning project. They were also used in the longer case study projects.
    They are standardized, relatively clean, well understood and excellent for you
    to use as practice datasets.


    You can use the datasets on the UCI Machine Learning repository as the focus of
    small (5-to-10 hours of effort) focused machine learning projects using the Python
    platform. Once completed, you can write-up your findings and share them online
    as part of your expanding portfolio of machine learning projects.


    These can be used by you later as a repository of knowledge on which you can build
    and further develop your skills. They can also be used to demonstrate to managers
    or future employers that you are capable of delivering results on predictive modeling
    machine learning projects using the Python platform. Here is a process that you
    can use to practice machine learning on Python:


    1. Browse the list of free datasets on the repository and download some that look
    interesting to you.

    2. Use the project template and recipes in this book to work through the dataset
    and develop an accurate model.

    3. Write up your work-flow and findings in a way that you can refer to them later
    or perhaps share it publicly on a website.


    Keep the project short, limit your projects to 5-to-10 hours, say a week worth
    of nights and spare time.


    ### 22.3 Competitive Machine Learning


    Use competitive machine learning to push your skills. Working on small projects
    in the previous section is a good way to practice the fundamentals. At some point
    the problems will become easy for you. You also need to be pushed out of your
    comfort zone to help you grow your skills further.


    An excellent way to develop your machine learning skills with Python further is
    to start participating in competitions. In a competition, the organizer provides
    you with a training dataset, a test dataset on which you are to make predictions,
    a performance measure and a time limit. You and your competitors then work to
    create the most accurate model possible. Winners often get prize money.


    These competitions often last weeks to months and can be a lot of fun. They also
    offer a great opportunity to test your skills with machine learning tools on datasets
    that often require a lot of cleaning and preparation. The premier website for
    machine learning competitions is Kaggle.


    Competitions are stratified into different classes such as research, recruitment
    and 101 for beginners. A good place to start would be the beginner competitions
    as they are often less challenging and have a lot of help in the form of tutorials
    to get you started.


    ### 22.4 Summary


    In this chapter you have discovered three areas where you could practice your
    new found machine learning skills with Python. They were:


    1. To continue to build up and maintain your catalog of machine learning recipes
    starting with the catalog of recipes provided as a bonus with this book.

    2. To continue to work on the standard machine learning datasets on the UCI Machine
    Learning Repository.

    3. To start work through the larger datasets from competitive machine learning
    and even start participating in machine learning competitions.'
