    \ 21.4 Validation Dataset\n\n```python\n# Split-out validation\ndatasetarray =\
    \ dataset.values\nX = array[:,0:60].astype(float)\nY = array[:,60]\nvalidation_size\
    \ = 0.20\nseed = 7\nX_train, X_validation, Y_train, Y_validation = train_test_split(X,\
    \ Y,\n    test_size=validation_size, random_state=seed)\n```\n\nIt is a good idea\
    \ to use a validation hold-out set. This is a sample of the data that we hold\
    \ back from our analysis and modeling. We use it right at the end of our project\
    \ to confirm the accuracy of our final model. It is a smoke test that we can use\
    \ to see if we messed up and to give us confidence on our estimates of accuracy\
    \ on unseen data. We will use 80% of the dataset for modeling and hold back 20%\
    \ for validation.\n\nListing 21.17: Create Separate Training and Validation Datasets.\n\
    \n## 21.5 Evaluate Algorithms: Baseline\n\n```python\n# Test options and evaluation\
    \ metric\nnum_folds = 10\nseed = 7\nscoring = 'accuracy'\n```\n\nWe don’t know\
    \ what algorithms will do well on this dataset. Gut feel suggests distance based\
    \ algorithms like Neighbors and Support Vector Machines may do well. Let’s design\
    \ our test harness. We will use 10-fold cross validation. The dataset is not too\
    \ small and this is a good standard test harness configuration. We will evaluate\
    \ algorithms using the accuracy metric. This is a gross metric that will give\
    \ a quick idea of how correct a given model is. More useful on binary classification\
    \ problems like this one.\n\nListing 21.18: Prepare the Test Harness for Evaluating\
    \ Algorithms.\n\nLet’s create a baseline of performance on this problem and spot-check\
    \ a number of different algorithms. We will select a suite of different algorithms\
    \ capable of working on this classification problem. The six algorithms selected\
    \ include:\n\n- Linear Logistic Regression (LR) and Linear Discriminant Analysis\
    \ (LDA).\n- Nonlinear Classification and Regression Trees (CART), Support Vector\
    \ Machines (SVM), Gaussian Naive Bayes (NB) and Neighbors (KNN).\n\n```python\n\
    # Spot-Check Algorithms\nmodels = []\nmodels.append(('LR', LogisticRegression()))\n\
    models.append(('LDA', LinearDiscriminantAnalysis()))\nmodels.append(('KNN', KNeighborsClassifier()))\n\
    models.append(('CART', DecisionTreeClassifier()))\nmodels.append(('NB', GaussianNB()))\n\
    ```\n\nListing 21.19: Prepare Algorithms to Evaluate.\n\n```python\nresults =\
    \ []\nnames = []\nfor name, model in models:\n    kfold = KFold(n_splits=num_folds,\
    \ random_state=seed)\n    cv_results = cross_val_score(model, X_train, Y_train,\
    \ cv=kfold, scoring=scoring)\n    results.append(cv_results)\n    names.append(name)\n\
    \    msg = \"%s: %f (%f)\" % (name, cv_results.mean(), cv_results.std())\n   \
    \ print(msg)\n```\n\nThe algorithms all use default tuning parameters. Let’s compare\
    \ the algorithms. We will display the mean and standard deviation of accuracy\
    \ for each algorithm as we calculate it and collect the results for use later.\n\
    \nListing 21.20: Evaluate Algorithms Using the Test Harness.\n\nRunning the example\
    \ provides the output below. The results suggest that both Logistic Regression\
    \ and Neighbors may be worth further study.\n\n```\nZeroth Value: 1\nList Length:\
    \ 4\n1\n2\n3\n4\n```\n\n![](img/c303fad5e139c19353d094c7751ad2f2_411_0.png)\n\n\
    Listing 21.21: Output of Evaluating Algorithms.\n\n```python\n# Compare Algorithms\n\
    fig = pyplot.figure()\nfig.suptitle('Algorithm Comparison')\nax = fig.add_subplot(111)\n\
    pyplot.boxplot(results)\nax.set_xticklabels(names)\n```\n\nThese are just mean\
    \ accuracy values. It is always wise to look at the distribution of accuracy values\
    \ calculated across cross validation folds. We can do that graphically using box\
    \ and whisker plots.\n\nListing 21.22: Visualization of the Distribution of Algorithm\
    \ Performance.\n\nThe results show a tight distribution for KNN which is encouraging,\
    \ suggesting low variance.\n\nThe poor results for SVM are surprising.\n\n![](img/c303fad5e139c19353d094c7751ad2f2_412_0.png)\n\
    \nFigure 21.5: Box and Whisker Plots of Algorithm Performance. It is possible\
    \ that the varied distribution of the attributes is having an effect on the accuracy\
    \ of algorithms such as SVM. In the next section we will repeat this spot-check\
    \ with a standardized copy of the training dataset.\n\n## 21.6 Evaluate Algorithms:\
    \ Standardize Data\n\n```python\n# Standardize the dataset\npipelines = []\npipelines.append((\"\
    ScaledLR\", Pipeline([(\"Scaler\",\n    StandardScaler()),(\"LR\", LogisticRegression())])))\n\
    pipelines.append((\"ScaledLDA\", Pipeline([(\"Scaler\",\n    StandardScaler()),(\"\
    LDA\", LinearDiscriminantAnalysis())])))\n```\n\nWe suspect that the differing\
    \ distributions of the raw data may be negatively impacting the skill of some\
    \ of the algorithms. Let’s evaluate the same algorithms with a standardized copy\
    \ of the dataset. This is where the data is transformed such that each attribute\
    \ has a mean value of zero and a standard deviation of one. We also need to avoid\
    \ data leakage when we transform the data. A good way to avoid leakage is to use\
    \ pipelines that standardize the data and build the model for each fold in the\
    \ cross validation test harness. That way we can get a fair estimation of how\
    \ each model with standardized data might perform on unseen data."
