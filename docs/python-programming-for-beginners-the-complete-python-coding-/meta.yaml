- md: "## 19.7.1 Next Step\n\nYou have applied the lessons from Part II on a simple\
    \ problem and completed your first machine learning project. Next you will take\
    \ things one step further and work through a regression predictive modeling problem.\
    \ It will be a slightly more complex project and involve data transforms, algorithm\
    \ tuning and use of ensemble methods to improve results.\n\n## Chapter 20 Regression\
    \ Machine Learning Case Study Project\n\nHow do you work through a predictive\
    \ modeling machine learning problem end-to-end? In this lesson you will work through\
    \ a case study regression predictive modeling problem in Python including each\
    \ step of the applied machine learning process. After completing this project,\
    \ you will know:\n\n- How to work through a regression predictive modeling problem\
    \ end-to-end.\n- How to use data transforms to improve model performance.\n- How\
    \ to use algorithm tuning to improve model performance.\n- How to use ensemble\
    \ methods and tuning of ensemble methods to improve model performance.\n\nLet’s\
    \ get started.\n\n### 20.1 Problem Definition\n\nFor this project we will investigate\
    \ the Boston House Price dataset. Each record in the database describes a Boston\
    \ suburb or town. The data was drawn from the Boston Standard Metropolitan Statistical\
    \ Area (SMSA) in 1970. The attributes are defined as follows (taken from the UCI\
    \ Machine Learning repository):\n\n1. CRIM: per capita crime rate by town\n2.\
    \ ZN: proportion of residential land zoned for lots over 25,000 sq.ft.\n3. INDUS:\
    \ proportion of non-retail business acres per town\n4. CHAS: Charles River dummy\
    \ variable (= 1 if tract bounds river; 0 otherwise)\n5. NOX: nitric oxides concentration\
    \ (parts per 10 million)\n6. RM: average number of rooms per dwelling\n7. AGE:\
    \ proportion of owner-occupied units built prior to 1940\n8. DIS: weighted distances\
    \ to five Boston employment centers\n9. RAD: index of accessibility to radial\
    \ highways\n10. TAX: full-value property-tax rate per $10,000\n11. PTRATIO: pupil-teacher\
    \ ratio by town\n12. B: 1000(Bk - 0.63)^2 where Bk is the proportion of blacks\
    \ by town\n13. LSTAT: % lower status of the population\n14. MEDV: Median value\
    \ of owner-occupied homes in $1000's\n\nWe can see that the input attributes have\
    \ a mixture of units.\n\n### 20.2 Load the Dataset\n\n```python\n# Load libraries\n\
    import numpy\nfrom numpy import arange\nfrom matplotlib import pyplot\nfrom pandas\
    \ import read_csv\nfrom pandas import set_option\nfrom pandas.tools.plotting import\
    \ scatter_matrix\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.model_selection\
    \ import train_test_split\nfrom sklearn.model_selection import KFold\nfrom sklearn.model_selection\
    \ import cross_val_score\nfrom sklearn.model_selection import GridSearchCV\nfrom\
    \ sklearn.linear_model import LinearRegression\nfrom sklearn.linear_model import\
    \ Lasso\nfrom sklearn.linear_model import ElasticNet\nfrom sklearn.tree import\
    \ DecisionTreeRegressor\nfrom sklearn.neighbors import KNeighborsRegressor\nfrom\
    \ sklearn.svm import SVR\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.ensemble\
    \ import RandomForestRegressor\nfrom sklearn.ensemble import GradientBoostingRegressor\n\
    from sklearn.ensemble import ExtraTreesRegressor\nfrom sklearn.ensemble import\
    \ AdaBoostRegressor\n```\n\nLet’s start off by loading the libraries required\
    \ for this project.\n\n**Listing 20.1: Load libraries.**\n\nWe can now load the\
    \ dataset that you can download from the UCI Machine Learning repository website.\n\
    \n```python\n# Load dataset\nfilename = 'housing.csv'\nnames = ['CRIM', 'ZN',\
    \ 'INDUS', 'CHAS', 'NOX', 'RM', 'AGE', 'DIS',\n         'RAD', 'TAX', 'PTRATIO',\
    \ 'B', 'LSTAT', 'MEDV']\ndataset = read_csv(filename, delim_whitespace=True, names=names)\n\
    ```\n\n**Listing 20.2: Load the dataset.**\n\nYou can see that we are specifying\
    \ the short names for each attribute so that we can reference them clearly later.\
    \ You can also see that attributes are delimited by whitespace rather than commas\
    \ in this file and we indicate this to `read_csv()` function via the `delim_whitespace`\
    \ argument. We now have our data loaded.\n\n### 20.3 Analyze Data\n\nWe can now\
