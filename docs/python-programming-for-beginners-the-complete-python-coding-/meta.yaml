    # 18.4 Tips For Using The Template Well


    This section lists tips that you can use to make the most of the machine learning
    project template in Python.


    Fast Make a first-pass through the project steps as fast as possible. This will
    give you confidence that you have all the parts that you need and a baseline from
    which to improve.


    The process in not linear but cyclic. You will loop between steps, and probably
    spend most of your time in tight loops between steps 3-4 or 3-4-5 until you achieve
    a level of accuracy that is sufficient or you run out of time.


    Attempt Every It is easy to skip steps, especially if you are not confident or
    familiar with the tasks of that step. Try and do something at each step in the
    process, even if it does not improve accuracy. You can always build upon it later.
    Don’t skip steps, just reduce their contribution.'
