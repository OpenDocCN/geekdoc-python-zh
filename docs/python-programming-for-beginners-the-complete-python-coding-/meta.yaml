  md: 'To be effective at machine learning in Python you must install and become familiar
    with SciPy. Specifically:


    You will prepare your data as NumPy arrays for modeling in machine learning algorithms.


    You will use Matplotlib (and wrappers of Matplotlib in other frameworks) to create
    plots and charts of your data.


    You will use Pandas to load explore and better understand your data.


    # scikit-learn


    The scikit-learn library is how you can develop and practice machine learning
    in Python. It is built upon and requires the SciPy ecosystem. The name scikit
    suggests that it is a SciPy plug-in or toolkit. The focus of the library is machine
    learning algorithms for classification, regression, clustering and more. It also
    provides tools for related tasks such as evaluating models, tuning parameters
    and pre-processing data.


    Like Python and SciPy, scikit-learn is open source and is usable commercially
    under the BSD license. This means that you can learn about machine learning, develop
    models and put them into operations all with the same ecosystem and code. A powerful
    reason to use scikit-learn.'
