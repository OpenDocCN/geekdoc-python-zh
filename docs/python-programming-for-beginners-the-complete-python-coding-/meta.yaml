    -   最终确定模型（使用所有训练数据，并使用验证数据集进行确认）。


    通过完成这个案例研究，你了解了如何将特定机器学习任务的步骤整合成一个完整的项目。完成这个案例研究是使用Python和scikit-learn进行应用机器学习的良好实践。


    ## 20.12.1 下一步


    你现在已经完成了两个端到端的预测建模机器学习项目。第一个是多类分类问题，而这第二个项目是回归问题。接下来是第三个也是最后一个案例研究，关于二分类问题。


    ## 第21章 二分类机器学习案例研究项目


    如何端到端地完成一个预测建模机器学习问题？在本课中，你将通过一个Python中的案例研究分类预测建模问题，涵盖应用机器学习过程的每一步。完成本项目后，你将了解：


    -   如何端到端地完成一个分类预测建模问题。

    -   如何使用数据转换来提升模型性能。

    -   如何使用算法调优来提升模型性能。

    -   如何使用集成方法和集成方法调优来提升模型性能。


    让我们开始吧。


    ## 21.1 问题定义


    本项目的重点将是声纳探测水雷与岩石。问题是根据声纳返回数据预测金属或岩石物体。每个模式是一组60个介于0.0到1.0之间的数字。每个数字代表在特定频带内、在一定时间段内积分的能量。与每条记录关联的标签包含字母R（如果物体是岩石）或M（如果是水雷，即金属圆柱体）。标签中的数字按视角角度递增顺序排列，但并未直接编码该角度。


