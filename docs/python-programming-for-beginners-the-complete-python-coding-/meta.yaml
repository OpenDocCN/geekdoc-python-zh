    ## 15.3 Boosting Algorithms


    Boosting ensemble algorithms creates a sequence of models that attempt to correct
    the mistakes of the models before them in the sequence. Once created, the models
    make predictions which may be weighted by their demonstrated accuracy and the
    results are combined to create a final output prediction. The two most common
    boosting ensemble machine learning algorithms are:


    - AdaBoost.

    - Stochastic Gradient Boosting.


    ### 15.3.1 AdaBoost


    ```python

    # AdaBoost Classification

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.ensemble import AdaBoostClassifier


    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    num_trees = 30

    seed = 7

    kfold = KFold(n_splits=10, random_state=seed)

    model = AdaBoostClassifier(n_estimators=num_trees, random_state=seed)

    results = cross_val_score(model, X, Y, cv=kfold)

    print(results.mean())

    ```


    AdaBoost was perhaps the first successful boosting ensemble algorithm. It generally
    works by weighting instances in the dataset by how easy or difficult they are
    to classify, allowing the algorithm to pay more or less attention to them in the
