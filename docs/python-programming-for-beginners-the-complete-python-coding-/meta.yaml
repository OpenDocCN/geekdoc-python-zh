    ### 8.6.1 下一步


    现在是时候开始研究如何在你的数据集上评估机器学习算法了。在下一课中，你将学习重采样方法，这些方法可用于估计机器学习算法在未见数据上的性能。


    ## 第9章 使用重采样分析机器学习算法的性能


    你需要知道你的算法在未见数据上的表现如何。评估算法性能的最佳方法是对你已经知道答案的新数据进行预测。次佳的方法是使用统计学中称为重采样方法的巧妙技术，这些技术允许你准确估计你的算法在新数据上的表现。在本章中，你将学习如何使用Python和scikit-learn中的重采样方法，在Pima
    Indians数据集上估计你的机器学习算法的准确性。让我们开始吧。


    ## 9.1 评估机器学习算法


    为什么不能在你的数据集上训练你的机器学习算法，并使用来自同一数据集的预测来评估机器学习算法？简单的答案是过拟合。


    想象一个算法记住了它在训练期间看到的每一个观察结果。如果你在用于训练算法的同一数据集上评估你的机器学习算法，那么这样的算法在训练数据集上会得到完美的分数。但它在新数据上做出的预测会很糟糕。我们必须在未用于训练算法的数据上评估我们的机器学习算法。


    评估是一个估计，我们可以用它来讨论我们认为算法在实际中可能表现如何。它不是性能的保证。一旦我们估计了算法的性能，我们就可以在整个训练数据集上重新训练最终算法，并使其准备好投入运营使用。接下来，我们将研究四种不同的技术，我们可以用这些技术来分割我们的训练数据集，并为我们的机器学习算法创建有用的性能估计：


    - 训练集和测试集。

    - 交叉验证。

    - 留一交叉验证。

    - 重复随机测试-训练分割。


    ## 9.2 划分为测试集和训练集


    我们可以用来评估机器学习算法性能的最简单方法是使用不同的训练和测试数据集。我们可以将原始数据集分成两部分。在第一部分上训练算法，在第二部分上进行预测，并将预测结果与预期结果进行比较。分割的大小取决于数据集的大小和具体细节，尽管通常使用67%的数据进行训练，剩余的33%用于测试。


    ```python

    # 使用训练集和测试集进行评估

    from pandas import read_csv

    from sklearn.model_selection import train_test_split

    from sklearn.linear_model import LogisticRegression

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    test_size = 0.33

    seed = 7

    X_train, X_test, Y_train, Y_test = train_test_split(X, Y, test_size=test_size,
    random_state=seed)

    model = LogisticRegression()

    model.fit(X_train, Y_train)

    ```


    这种算法评估技术非常快。它非常适合大型数据集（数百万条记录），有强有力的证据表明数据的两个分割都代表了潜在的问题。由于速度快，当你研究的算法训练速度较慢时，使用这种方法很有用。这种技术的一个缺点是它可能具有高方差。这意味着训练集和测试集之间的差异可能导致准确性估计的显著差异。在下面的示例中，我们将Pima
    Indians数据集按67%/33%的比例分割为训练集和测试集，并评估逻辑回归模型的准确性。


    清单9.1：使用训练集和测试集评估算法的示例。


    ```

    python --version

    ```


    我们可以看到模型的估计准确性约为75%。请注意，除了指定分割的大小，我们还指定了随机种子。因为数据的分割是随机的，我们希望确保结果是可重现的。通过指定随机种子，我们确保每次运行代码时都得到相同的随机数，从而得到相同的数据分割。如果我们想将此结果与另一个机器学习算法或具有不同配置的同一算法的估计准确性进行比较，这一点很重要。为了确保比较是公平的，我们必须确保它们在完全相同的数据上进行训练和测试。


    清单9.2：使用训练集和测试集评估算法的输出。'
