    ## 15.4 Voting Ensemble


    Voting is one of the simplest ways of combining the predictions from multiple
    machine learning algorithms. It works by first creating two or more standalone
    models from your training dataset. A Voting Classifier can then be used to wrap
    your models and average the predictions of the sub-models when asked to make predictions
    for new data. The predictions of the sub-models can be weighted, but specifying
    the weights for classifiers manually or even heuristically is difficult. More
    advanced methods can learn how to best weight the predictions from sub-models,
    but this is called stacking (stacked aggregation) and is currently not provided
    in scikit-learn.'
