    $$f(x) = \arg\min_{y \in \mathcal{Y}} \sum_{i=1}^{N} \mathbb{I}(y_i = y) \cdot
    \mathbb{I}(\|x - x_i\| \leq \epsilon)$$


    that is in order to classify a new data point, we will look, among all the labelled
    data point, for the closest one, and assign the same training label to the new
    data point. A natural question that might arise is: given a set of data, how do
    we properly train a ML model? How can we try to evaluate the generalization performance
    of the algorithm we are using? A typical strategy is to split the available dataset
    into training and test set. Notably, we typically train our algorithm using 80%
    of the data, and the remaining 20% as the test set. As already mentioned, the
