    the main objective of supervised learning methods: we want to train a model, on
    a specified set of labelled data, and then evaluate its performance on unseen
    data by comparing the performance of the predicted labels with the available information,
    typically ob- tained retrospectively. To evaluate a ML model, what we typically
    do is to split our data into two set, the training and the test set. This has
    a major advantage: we can actually train our model on a slice of data, and the
    rest is then used to evaluate the performance of the choosen model on a set of
    data that were not used before. While the former is used to build and train the
    classifier, the latter is used as a holdout set that stands in for future unseen
    data. This is an important aspect of preprocessing and can be summarized in a
    very simple rule: do not use any test example in the training phase. Hence, test
    and training must be kept independent from each other. To do this, we use the
    scikit-learn method train_test_split from the model_selection module, which requires
    the user to specify the percentage of the available data to be used for the test
    set.


