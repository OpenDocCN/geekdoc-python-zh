    ## Chapter 9 Analyze Machine Learning Algorithms'' Performance Using Resampling


    You need to know how well your algorithms perform on unseen data. The best way
    to evaluate the performance of an algorithm would be to make predictions for new
    data to which you already know the answers. The second best way is to use clever
    techniques from statistics called resampling methods that allow you to make accurate
    estimates for how well your algorithm will perform on new data. In this chapter
    you will discover how you can estimate the accuracy of your machine learning algorithms
    using resampling methods in Python and scikit-learn on the Pima Indians dataset.
    Let’s get started.


    ## 9.1 Assess Algorithms for Machine Learning


    Why can’t you train your machine learning algorithm on your dataset and use predictions
    from this same dataset to evaluate machine learning algorithms? The simple answer
    is overfitting.


    Imagine an algorithm that remembers every observation it is shown during training.
    If you evaluated your machine learning algorithm on the same dataset used to train
    the algorithm, then an algorithm like this would have a perfect score on the training
    dataset. But the predictions it made on new data would be terrible. We must evaluate
    our machine learning algorithms on data that is not used to train the algorithm.


    The evaluation is an estimate that we can use to talk about how well we think
    the algorithm may actually do in practice. It is not a guarantee of performance.
    Once we estimate the performance of our algorithm, we can then re-train the final
    algorithm on the entire training dataset and get it ready for operational use.
    Next up we are going to look at four different techniques that we can use to split
    up our training dataset and create useful estimates of performance for our machine
    learning algorithms:


    - Train and Test Sets.

    - Cross Validation.

    - Leave One Out Cross Validation.

    - Repeated Random Test-Train Splits.


    ## 9.2 Divided Into Test and Train Sets


    The simplest method that we can use to evaluate the performance of a machine learning
    algorithm is to use different training and testing datasets. We can take our original
    dataset and split it into two parts. Train the algorithm on the first part, make
    predictions on the second part and evaluate the predictions against the expected
    results. The size of the split can depend on the size and specifics of your dataset,
    although it is common to use 67% of the data for training and the remaining 33%
    for testing.


    ```python

    # Evaluate using a train and a test set

    from pandas import read_csv

    from sklearn.model_selection import train_test_split

    from sklearn.linear_model import LogisticRegression

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    test_size = 0.33

    seed = 7

    X_train, X_test, Y_train, Y_test = train_test_split(X, Y, test_size=test_size,
    random_state=seed)

    model = LogisticRegression()

    model.fit(X_train, Y_train)

    ```


    This algorithm evaluation technique is very fast. It is ideal for large datasets
    (millions of records) where there is strong evidence that both splits of the data
    are representative of the underlying problem. Because of the speed, it is useful
    to use this approach when the algorithm you are investigating is slow to train.
    A downside of this technique is that it can have a high variance. This means that
    differences in the training and test dataset can result in meaningful differences
    in the estimate of accuracy. In the example below we split the Pima Indians dataset
    into 67%/33% splits for training and test and evaluate the accuracy of a Logistic
    Regression model.


    Listing 9.1: Example of evaluating an algorithm with a train and test set.


    ```

    python --version

    ```


    We can see that the estimated accuracy for the model was approximately 75%. Note
