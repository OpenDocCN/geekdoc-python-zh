    ## Chapter 12 Algorithms for Spot-Check Regression


    Spot-checking is a way of discovering which algorithms perform well on your machine
    learning problem. You cannot know which algorithms are best suited to your problem
    beforehand. You must trial a number of methods and focus attention on those that
    prove themselves the most promising. In this chapter you will discover six machine
    learning algorithms that you can use when spot-checking your regression problem
    in Python with scikit-learn. After completing this lesson you will know:


    - 1. How to spot-check machine learning algorithms on a regression problem.

    - 2. How to spot-check four linear regression algorithms.

    - 3. How to spot-check three nonlinear regression algorithms.


    Let’s get started.


    ## 12.1 Algorithms Overview


    In this lesson we are going to take a look at seven regression algorithms that
    you can spot-check on your dataset. Starting with four linear machine learning
    algorithms:


    - Linear Regression.

    - Ridge Regression.

    - LASSO Linear Regression.

    - Elastic Net Regression.


    Then looking at three nonlinear machine learning algorithms:


    - Neighbors.

    - Classification and Regression Trees.

    - Support Vector Machines.


    The recipe is demonstrated on the Boston House Price dataset. This is a regression
    problem where all attributes are numeric. A test harness with 10-fold cross validation
    is used to demonstrate how to spot-check each machine learning algorithm and mean
    squared error measures are used to indicate algorithm performance. Note that mean
    squared error values are inverted (negative). This is a quirk of the cross val
    score() function used that requires all algorithm metrics to be sorted in ascending
    order (larger value is better). The recipes assume that you know about each machine
    learning algorithm and how to use them. We will not go into the API or parameterization
    of each algorithm.


    ## 12.2 Linear Machine Learning Algorithms


    This section provides examples of how to use four different linear machine learning
    algorithms for regression in Python with scikit-learn.


    ### 12.2.1 Linear Regression


    ```python

    # Linear Regression

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.linear_model import LinearRegression

    filename = ''housing.csv''

    names = [''CRIM'', ''ZN'', ''INDUS'', ''CHAS'', ''NOX'', ''RM'', ''AGE'', ''DIS'',
    ''RAD'', ''TAX'', ''PTRATIO'', ''B'', ''LSTAT'', ''MEDV'']

    dataframe = read_csv(filename, delim_whitespace=True, names=names)

    array = dataframe.values

    X = array[:,0:13]

    Y = array[:,13]

    kfold = KFold(n_splits=10, random_state=7)

    model = LinearRegression()

    scoring = ''neg_mean_squared_error''

    results = cross_val_score(model, X, Y, cv=kfold, scoring=scoring)

    print(results.mean())

    ```


    Linear regression assumes that the input variables have a Gaussian distribution.
    It is also assumed that input variables are relevant to the output variable and
    that they are not highly correlated with each other (a problem called collinearity).
    You can construct a linear regression model using the LinearRegression.


    Listing 12.1: Example of the linear regression algorithm.


    ```python

    python --version

    ```


    Running the example provides an estimate of mean squared error.


    Listing 12.2: Output of the linear regression algorithm.


    ### 12.2.2 Ridge Regression


    ```python

    # Ridge Regression

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

