    Listing 2.7: Example versions of scikit-learn.


    The examples in this book assume you have this version of scikit-learn or newer.


    ### An Easy Method for Installing the Ecosystem


    If you are not confident at installing software on your machine, there is an easier
    option for you. There is a distribution called Anaconda that you can download
    and install for It supports the three main platforms of Microsoft Windows, Mac
    OS X and Linux. It includes Python, SciPy and scikit-learn. Everything you need
    to learn, practice and use machine learning with the Python Environment.


    ## Summary


    In this chapter you discovered the Python ecosystem for machine learning. You
    learned about:


    - Python and it’s rising use for machine learning.

    - SciPy and the functionality it provides with NumPy, Matplotlib and Pandas.

    - scikit-learn that provides all of the machine learning algorithms.


    You also learned how to install the Python ecosystem for machine learning on your
