    The Neighbors algorithm (or KNN) locates the k most similar instances in the training
    dataset for a new data instance. From the k neighbors, a mean or median output
    variable is taken as the prediction. Of note is the distance metric used (the
    metric argument). The Minkowski distance is used by default, which is a generalization
    of both the Euclidean distance (used when all inputs have the same scale) and
    Manhattan distance (for when the scales of the input variables differ). You can
    construct a KNN model for regression using the KNeighborsRegressor


