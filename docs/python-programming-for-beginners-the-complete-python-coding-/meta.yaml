    important. Choice of metrics influences how the performance of machine learning
    algorithms is measured and compared. They influence how you weight the importance
    of different characteristics in the results and your ultimate choice of which
    algorithm to choose. In this chapter you will discover how to select and use different
    machine learning performance metrics in Python with scikit-learn. Let’s get started.


