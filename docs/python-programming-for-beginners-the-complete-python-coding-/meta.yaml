    Start simple. Revisit this step often and cycle with the next step until you converge
    on a subset of algorithms and a presentation of the data that results in accurate
    or accurate-enough models to proceed.


    # 18.3.4 Evaluate Algorithms


    This step is about finding a subset of machine learning algorithms that are good
    at exploiting the structure of your data (e.g. have better than average skill).
    This involves steps such as:


    Separating out a validation dataset to use for later confirmation of the skill
    of your developed model.


    Defining test options using scikit-learn such as cross validation and the evaluation
    metric to use.


    Spot-checking a suite of linear and nonlinear machine learning algorithms.


    Comparing the estimated accuracy of algorithms.'
  - '[PAGE 324]


    On a given problem you will likely spend most of your time on this and the previous
    step until you converge on a set of 3-to-5 well performing machine learning algorithms.


    # 18.3.5 Improve Accuracy


    Once you have a shortlist of machine learning algorithms, you need to get the
    most out of them. There are two different ways to improve the accuracy of your
    models:


    Search for a combination of parameters for each algorithm using scikit-learn that
    yields the best results.


    Combine the prediction of multiple models into an ensemble prediction using ensemble
    techniques.


    The line between this and the previous step can blur when a project becomes concrete.
    There may be a little algorithm tuning in the previous step. And in the case of
    ensembles, you may bring more than a shortlist of algorithms forward to combine
    their predictions.


    # 18.3.6 Finalize Model


    Once you have found a model that you believe can make accurate predictions on
    unseen data, you are ready to finalize it. Finalizing a model may involve sub-tasks
    such as:'
