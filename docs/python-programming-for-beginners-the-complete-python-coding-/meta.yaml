    \ what we typically do in practice is instead of splitting the data into three\
    \ folds as before, we are going to split the whole data into n folds of equal\
    \ size. The idea of cross-validation is simple, yet powerful: we pick one fold\
    \ and we fix it as the test set, whereas the other n – 1 folds are used to fit\
    \ the model. However, instead of just doing it once, we then sequentially fix\
    \ another fold as the test set, and fit the same model on the other n – 1 folds,\
    \ hence considering the fold that was used before for testing. We repeat this\
    \ procedure for all the non-overlapping different folds, obtaining n different\
    \ scores: this is more stable because is less dependent on the split, and each\
    \ data point is exactly in the test set once. Likewise, the outcome of cross-validation\
    \ is made of n scores, from which for instance we can take the mean (or the median)\
    \ as overall score, which is indeed a more robust estimate of how good this kind\
