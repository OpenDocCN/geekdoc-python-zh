  md: '# Feature Extraction and Modeling


    # 14.3 Pipeline for Feature Extraction and Modeling


    Feature extraction is another procedure that is susceptible to data leakage. Like
    data preparation, feature extraction procedures must be restricted to the data
    in your training dataset. The pipeline provides a handy tool called the FeatureUnion
    which allows the results of multiple feature selection and extraction procedures
    to be combined into a larger dataset on which a model can be trained. Importantly,
    all the feature extraction and the feature union occurs within each fold of the
    cross validation procedure. The example below demonstrates the pipeline defined
    with four steps:


    +   1. Feature Extraction with Principal Component Analysis (3 features).

    2. Feature Extraction with Statistical Selection (6 features).

    3. Feature Union.

    4. Learn a Logistic Regression Model.'
  merge: -1
  pgno: 286
- img_proc: true
  md: '```

    # Create a pipeline that extracts features from the data then creates a model

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.pipeline import Pipeline

    from sklearn.pipeline import FeatureUnion

    from sklearn.linear_model import LogisticRegression

    from sklearn.decomposition import PCA

    from sklearn.feature_selection import SelectKBest


    # load data

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]


    # create feature union

    features = []

    features.append((''pca'', PCA(n_components=3)))

    features.append((''select_best'', SelectKBest(k=6)))

    feature_union = FeatureUnion(features)


    # create pipeline

    estimators = []

    estimators.append((''feature_union'', feature_union))

    estimators.append((''logistic'', LogisticRegression()))

    model = Pipeline(estimators)

    ```


    The pipeline is then evaluated using 10-fold cross validation.


    Listing 14.3: Example of a Pipeline extract and combine features before modeling.'
