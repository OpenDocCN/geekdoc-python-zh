    ### 5.2 Dimensions of Your Data


    You must have a very good handle on how much data you have, both in terms of rows
    and columns.


    Too many rows and algorithms may take too long to train. Too few and perhaps you
    do not have enough data to train the algorithms.


    Too many features and some algorithms can be distracted or suffer poor performance
    due to the curse of dimensionality.


    ```python

    # Dimensions of your data

    from pandas import read_csv

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    shape = data.shape

    ```


    You can review the shape and size of your dataset by printing the shape property
    on the Pandas DataFrame.


    Listing 5.3: Example of reviewing the shape of the data.


    The results are listed in rows then columns. You can see that the dataset has
    768 rows and 9 columns.


    Listing 5.4: Output of reviewing the shape of the data.


    ### 5.3 Data Type For Each Attribute


    ```python

    # Data Types for Each Attribute

    from pandas import read_csv

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    types = data.dtypes

    ```


    The type of each attribute is important. Strings may need to be converted to floating
    point values or integers to represent categorical or ordinal values. You can get
    an idea of the types of attributes by peeking at the raw data, as above. You can
    also list the data types used by the DataFrame to characterize each attribute
    using the dtypes property.


    Listing 5.5: Example of reviewing the data types of the data.


    You can see that most of the attributes are integers and that mass and pedi are
    floating point types.


    Listing 5.6: Output of reviewing the data types of the data.


    ### 5.4 Descriptive Statistics


    Descriptive statistics can give you great insight into the shape of each attribute.
    Often you can create more summaries than you have time to review. The describe()
    function on the Pandas DataFrame lists 8 statistical properties of each attribute.
    They are:


    - Count.

    - Mean.

    - Standard Deviation.

    - Minimum Value.

    - 25th Percentile.

    - 50th Percentile (Median).

    - 75th Percentile.

    - Maximum Value.


    ```python

    # Statistical Summary

    from pandas import read_csv

    from pandas import set_option

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    set_option(''display.width'', 100)

    set_option(''precision'', 3)

    description = data.describe()

    ```


    Listing 5.7: Example of reviewing a statistical summary of the data.


    You can see that you do get a lot of data. You will note some calls to pandas.set_option()
    in the recipe to change the precision of the numbers and the preferred width of
    the output. This is to make it more readable for this example. When describing
    your data this way, it is worth taking some time and reviewing observations from
    the results. This might include the presence of NA values for missing data or
    surprising distributions for attributes.


    Listing 5.8: Output of reviewing a statistical summary of the data.


    ### 5.5 Class Distribution (Classification Only)


    ```python

    # Class Distribution

    from pandas import read_csv

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    ```


    On classification problems you need to know how balanced the class values are.
    Highly imbalanced problems (a lot more observations for one class than another)
    are common and may need special handling in the data preparation stage of your
    project. You can quickly get an idea of the distribution of the class attribute
    in Pandas.


    ```python

    class_counts = data.groupby(''class'').size()

    print(class_counts)

    ```


    Listing 5.9: Example of reviewing a class breakdown of the data.


    You can see that there are nearly double the number of observations with class
    0 (no onset of diabetes) than there are with class 1 (onset of diabetes).


    Listing 5.10: Output of reviewing a class breakdown of the data.


    ### 5.6 Correlations Between Attributes


    ```python

    # Pairwise Pearson correlations

    from pandas import read_csv

    from pandas import set_option

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    set_option(''display.width'', 100)

    set_option(''precision'', 3)

    correlations = data.corr(method=''pearson'')

    print(correlations)

    ```


