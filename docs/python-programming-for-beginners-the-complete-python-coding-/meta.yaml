    ## Chapter 11 Spot-Check Classification Algorithms


    Spot-checking is a way of discovering which algorithms perform well on your machine
    learning problem. You cannot know which algorithms are best suited to your problem
    beforehand. You must trial a number of methods and focus attention on those that
    prove themselves the most promising. In this chapter you will discover six machine
    learning algorithms that you can use when spot-checking your classification problem
    in Python with scikit-learn. After completing this lesson you will know:


    - How to spot-check machine learning algorithms on a classification problem.

    - How to spot-check two linear classification algorithms.

    - How to spot-check four nonlinear classification algorithms.


    Let’s get started.


    ## Algorithm Spot-Checking


    You cannot know which algorithm will work best on your dataset beforehand. You
    must use trial and error to discover a shortlist of algorithms that do well on
    your problem that you can then double down on and tune further. I call this process
    spot-checking.


    The question is not: What algorithm should I use on my dataset? Instead it is:
    What algorithms should I spot-check on my dataset? You can guess at what algorithms
    might do well on your dataset, and this can be a good starting point. I recommend
    trying a mixture of algorithms and see what is good at picking out the structure
    in your data. Below are some suggestions when spot-checking algorithms on your
    dataset:'
