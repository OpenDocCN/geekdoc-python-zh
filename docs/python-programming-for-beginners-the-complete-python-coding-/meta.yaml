    ```\n\n使用一个保留的验证集是一个好主意。这是我们在分析和建模过程中保留下来的数据样本。我们在项目最后阶段使用它来确认最终模型的准确性。这是一个冒烟测试，我们可以用它来检查是否出错，并让我们对在未见数据上的准确性估计更有信心。我们将使用80%的数据集进行建模，保留20%用于验证。\n\
