    ## 18.4 善用模板的技巧


    本节列出了你可以用来充分利用 Python 机器学习项目模板的技巧。


    -   **快速** 尽快完成项目步骤的第一次遍历。这将给你信心，确保你拥有所有需要的部分，并为你提供一个改进的基线。

    -   该过程不是线性的，而是循环的。你将在步骤之间循环，并且可能大部分时间都花在步骤 3-4 或 3-4-5 之间的紧密循环中，直到你达到足够高的准确率或时间耗尽。

