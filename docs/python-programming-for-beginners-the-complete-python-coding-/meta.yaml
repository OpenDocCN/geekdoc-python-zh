    - Classification and Regression Trees (CART).

    - Gaussian Naive Bayes (NB).

    - Support Vector Machines (SVM).


    This list is a good mixture of simple linear (LR and LDA), nonlinear (KNN, CART,
    NB and SVM) algorithms. We reset the random number seed before each run to ensure
    that the evaluation of each algorithm is performed using exactly the same data
    splits. It ensures the results are directly comparable. Let’s build and evaluate
    our five models:'
