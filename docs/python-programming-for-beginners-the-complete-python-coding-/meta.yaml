    \ that you can use to load your CSV data in Python:\n\n1. Load CSV Files with\
    \ the Python Standard Library.\n2. Load CSV Files with NumPy.\n3. Load CSV Files\
    \ with Pandas.\n\nLet’s get started.\n\n### 4.1 Considerations When Loading CSV\
    \ Data\n\nThere are a number of considerations when loading your machine learning\
    \ data from CSV files. For reference, you can learn a lot about the expectations\
    \ for CSV files by reviewing the CSV request for comment titled Common Format\
    \ and MIME Type for Comma-Separated Values (CSV).\n\n#### 4.1.1 File Header\n\n\
    Does your data have a file header? If so this can help in automatically assigning\
    \ names to each column of data. If not, you may need to name your attributes manually.\
    \ Either way, you should explicitly specify whether or not your CSV file had a\
    \ file header when loading your data.\n\n#### 4.1.2 Comments\n\nDoes your data\
    \ have comments? Comments in a CSV file are indicated by a hash (#) at the start\
    \ of a line. If you have comments in your file, depending on the method used to\
    \ load your data, you may need to indicate whether or not to expect comments and\
    \ the character to expect to signify a comment line.\n\n#### 4.1.3 Delimiter\n\
    \nThe standard delimiter that separates values in fields is the comma (,) character.\
    \ Your file could use a different delimiter like tab or white space in which case\
    \ you must specify it explicitly.\n\n#### 4.1.4 Quotes\n\nSometimes field values\
    \ can have spaces. In these CSV files the values are often quoted. The default\
    \ quote character is the double quotation marks character. Other characters can\
    \ be used, and you must specify the quote character used in your file.\n\n###\
    \ 4.2 Pima Indians Dataset\n\nThe Pima Indians dataset is used to demonstrate\
    \ data loading in this lesson. It will also be used in many of the lessons to\
    \ come. This dataset describes the medical records for Pima Indians and whether\
    \ or not each patient will have an onset of diabetes within five years. As such\
    \ it is a classification problem. It is a good dataset for demonstration because\
    \ all of the input attributes are numeric and the output variable to be predicted\
    \ is binary (0 or 1). The data is freely available from the UCI Machine Learning\
    \ Repository.\n\n### 4.3 Load CSV Files with the Python Standard Library\n\n```python\n\
    # Load CSV Using Python Standard Library\nimport csv\nimport numpy\nfilename =\
    \ 'pima-indians-diabetes.data.csv'\nraw_data = open(filename, 'rb')\nreader =\
    \ csv.reader(raw_data, delimiter=',', quoting=csv.QUOTE_NONE)\nx = list(reader)\n\
    data = numpy.array(x).astype('float')\nprint(data.shape)\n```\n\nThe Python API\
    \ provides the module CSV and the function reader() that can be used to load CSV\
    \ files. Once loaded, you can convert the CSV data to a NumPy array and use it\
    \ for machine learning. For example, you can download the Pima Indians dataset\
    \ into your local directory with the filename pima-indians-diabetes.data.csv.\
    \ All fields in this dataset are numeric and there is no header line.\n\nListing\
    \ 4.1: Example of loading a CSV file using the Python standard library.\n\n```\n\
    (768, 9)\n```\n\nThe example loads an object that can iterate over each row of\
    \ the data and can easily be converted into a NumPy array. Running the example\
    \ prints the shape of the array.\n\nListing 4.2: Output of example loading a CSV\
    \ file using the Python standard library.\n\nFor more information on the csv.reader()\
    \ function, see CSV File Reading and Writing in the Python API.\n\n### 4.4 Load\
    \ CSV Files with NumPy\n\n```python\n# Load CSV using NumPy\nfrom numpy import\
    \ loadtxt\nfilename = \"pima-indians-diabetes.data.csv\"\nraw_data = open(filename,\
    \ \"rb\")\ndata = loadtxt(raw_data, delimiter=\",\")\nprint(data.shape)\n```\n\
    \nYou can load your CSV data using NumPy and the numpy.loadtxt() function. This\
    \ function assumes no header row and all data has the same format. The example\
    \ below assumes that the file pima-indians-diabetes.data.csv is in your current\
    \ working directory.\n\nListing 4.3: Example of loading a CSV file using NumPy.\n\
    \n```\n(768, 9)\n```\n\nRunning the example will load the file as a NumPy array\
    \ and print the shape of the data:\n\nListing 4.4: Output of example loading a\
