    -   **棘轮效应** 项目的最终目标是模型准确率。每一步都为这个目标做出贡献。将你所做的、能提高准确率的更改视为流程中的黄金路径，并围绕它们重新组织其他步骤。准确率是一个只能朝一个方向（变好，而不是变坏）移动的棘轮。

