    # Nonlinear Manifold Algorithm: t-SNE


    PCA is a method of constructing a particular linear transformation which results
    in new coordinates of the samples with very well defined properties (such as orthog-
    onality between the different components). In other words, PCA works well only
    when data is basically linearly separable. Typically, when we do not have such
    kind'
  merge: -1
  pgno: 115
- img_proc: true
  md: 'of data, we use manifold learning algorithm, such as t-SNE to compute a new
    repre- sentation of the (training) data, without actually transforming them as
    in PCA. The key idea is to find a 2-dim representation of the data that preserves
    the distances between points as best as possible.


    t-SNE is an algorithm proposed by van der Maaten and Hinton in 2008, designed
    with a different goal in mind, that is the ability to group similar data points
    even in a context of lack of linearity. However, while t-SNE is very good at tackling
    the particular goal of clustering similar samples, it has a major disadvantage
    compared to PCA: it gives you a low-dimensional representation of your data, but
    it does not give you a transformation. In other words, you cannot interpret the
    dimensions in a similar way you interpret the components in a PCA. It might be,
    therefore, useful to explore multidimensional data, but that might not be useful
    to interpret tasks that requires a physical interpretation of the ML models (like
    the example we saw when applying the PCA to Logistic regression). t-SNE are extremely
    used in genetics, es- pecially in next generation sequencing,ro evaluate single-cell
    transcriptomic data.


    ```

