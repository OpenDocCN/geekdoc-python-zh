    ```python

    # Skew for each attribute

    from pandas import read_csv

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    skew = data.skew()

    print(skew)

    ```


    Skew refers to a distribution that is assumed Gaussian (normal or bell curve)
    that is shifted or squashed in one direction or another. Many machine learning
    algorithms assume a Gaussian distribution. Knowing that an attribute has a skew
    may allow you to perform data preparation to correct the skew and later improve
    the accuracy of your models. You can calculate the skew of each attribute using
    the `skew()` function on the Pandas DataFrame.


    Listing 5.13: Example of reviewing skew of attribute distributions in the data.


    The skew result show a positive (right) or negative (left) skew. Values closer
    to zero show less skew.


    This section gives you some tips to remember when reviewing your data using summary
    statistics.


    Review Generating the summary statistics is not enough. Take a moment to pause,
    read and really think about the numbers you are seeing.


    Ask Review your numbers and ask a lot of questions. How and why are you seeing
    specific numbers. Think about how the numbers relate to the problem domain in
    general and specific entities that observations relate to.


    Write down Write down your observations and ideas. Keep a small text file or note
    pad and jot down all of the ideas for how variables may relate, for what numbers
    mean, and ideas for techniques to try later. The things you write down now while
    the data is fresh will be very valuable later when you are trying to think up
    new things to try.


