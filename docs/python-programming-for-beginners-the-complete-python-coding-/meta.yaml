    ## Chapter 7 Get Ready for Machine Learning with Your Data


    Many machine learning algorithms make assumptions about your data. It is often
    a very good idea to prepare your data in such way to best expose the structure
    of the problem to the machine learning algorithms that you intend to use. In this
    chapter you will discover how to prepare your data for machine learning in Python
    using scikit-learn. After completing this lesson you will know how to:


    1. Rescale data.

    2. Standardize data.

    3. Normalize data.

    4. Binarize data.


    Let’s get started.


    ### 7.1 Requirement for Pre-processing Data


    You almost always need to pre-process your data. It is a required step. A difficulty
    is that different algorithms make different assumptions about your data and may
    require different transforms. Further, when you follow all of the rules and prepare
    your data, sometimes algorithms can deliver better results without pre-processing.


    Generally, I would recommend creating many different views and transforms of your
    data, then exercise a handful of algorithms on each view of your dataset. This
    will help you to flush out which data transforms might be better at exposing the
    structure of your problem in general.


    ### 7.2 Data Transforms


    In this lesson you will work through 4 different data pre-processing recipes for
    machine learning. The Pima Indian diabetes dataset is used in each recipe. Each
    recipe follows the same structure:


    1. Load the dataset from a URL.

    2. Split the dataset into the input and output variables for machine learning.

    3. Apply a pre-processing transform to the input variables.

    4. Summarize the data to show the change.


    The scikit-learn library provides two standard idioms for transforming data. Each
    are useful in different circumstances. The transforms are calculated in such a
    way that they can be applied to your training data and any samples of data you
    may have in the future. The scikit-learn documentation has some information on
    how to use various different pre-processing methods:


    - Fit and Multiple Transform.

    - Combined Fit-And-Transform.


    The Fit and Multiple Transform method is the preferred approach. You call the
    `fit()` function to prepare the parameters of the transform once on your data.
    Then later you can use the `transform()` function on the same data to prepare
    it for modeling and again on the test or validation dataset or new data that you
    may see in the future. The Combined Fit-And-Transform is a convenience that you
    can use for one off tasks. This might be useful if you are interested in plotting
    or summarizing the transformed data. You can review the preprocess API in scikit-learn.


    ### 7.3 Rescale Data


    ```python

    # Rescale data (between 0 and 1)

    from pandas import read_csv

    from numpy import set_printoptions

    from sklearn.preprocessing import MinMaxScaler

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    # separate array into input and output components

    X = array[:,0:8]

    Y = array[:,8]

    scaler = MinMaxScaler(feature_range=(0, 1))

    rescaledX = scaler.fit_transform(X)

    ```


    When your data is comprised of attributes with varying scales, many machine learning
    algorithms can benefit from rescaling the attributes to all have the same scale.
    Often this is referred to as normalization and attributes are often rescaled into
    the range between 0 and 1. This is useful for optimization algorithms used in
    the core of machine learning algorithms like gradient descent. It is also useful
    for algorithms that weight inputs like regression and neural networks and algorithms
    that use distance measures like Neighbors. You can rescale your data using scikit-learn
    using the `MinMaxScaler`.'
