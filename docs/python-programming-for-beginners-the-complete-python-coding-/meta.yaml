    ## Chapter 6 Understand Your Data With Visualization


    You must understand your data in order to get the best results from machine learning
    algorithms. The fastest way to learn more about your data is to use data visualization.
    In this chapter you will discover exactly how you can visualize your machine learning
    data in Python using Pandas. Recipes in this chapter use the Pima Indians onset
    of diabetes dataset introduced in Chapter 4. Let’s get started.


    ## 6.1 Univariate Plots


    In this section we will look at three techniques that you can use to understand
    each attribute of your dataset independently.


    - Histograms.

    - Density Plots.

    - Box and Whisker Plots.


    ### 6.1.1 Histograms


    ```python

    # Univariate Histograms

    from matplotlib import pyplot

    from pandas import read_csv

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    data.hist()

    pyplot.show()

    ```


    A fast way to get an idea of the distribution of each attribute is to look at
    histograms. Histograms group data into bins and provide you a count of the number
    of observations in each bin. From the shape of the bins you can quickly get a
    feeling for whether an attribute is Gaussian, skewed or even has an exponential
    distribution. It can also help you see possible outliers.


    Listing 6.1: Example of creating histogram plots.


    We can also see that perhaps the mass and pres and plas attributes may have a
    Gaussian or nearly Gaussian distribution. This is interesting because many machine
    learning techniques assume a Gaussian univariate distribution on the input variables.


    ![](img/c303fad5e139c19353d094c7751ad2f2_184_0.png)


    ### 6.1.2 Density Plots


    ```python

    # Univariate Density Plots

    from matplotlib import pyplot

    from pandas import read_csv

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    data.plot(kind=''density'', subplots=True, layout=(3,3), sharex=False)

    pyplot.show()

    ```


    Density plots are another way of getting a quick idea of the distribution of each
    attribute. The plots look like an abstracted histogram with a smooth curve drawn
    through the top of each bin, much like your eye tried to do with the histograms.


    Listing 6.2: Example of creating density plots.


    ![](img/c303fad5e139c19353d094c7751ad2f2_186_0.png)


    Figure 6.2: Density plots of each attribute


    ### 6.1.3 Box and Whisker Plots


    ```python

    # Box and Whisker Plots

    from matplotlib import pyplot

    from pandas import read_csv

    filename = "pima-indians-diabetes.data.csv"

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    data = read_csv(filename, names=names)

    data.plot(kind=''box'', subplots=True, layout=(3,3), sharex=False, sharey=False)

    pyplot.show()

    ```


    Another useful way to review the distribution of each attribute is to use Box
    and Whisker Plots or boxplots for short. Boxplots summarize the distribution of
    each attribute, drawing a line for the median (middle value) and a box around
    the 25th and 75th percentiles (the middle 50% of the data). The whiskers give
    an idea of the spread of the data and dots outside of the whiskers show candidate
    outlier values (values that are 1.5 times greater than the size of spread of the
    middle 50% of the data).


    Listing 6.3: Example of creating box and whisker plots.


    We can see that the spread of attributes is quite different. Some like age, test
    and skin appear quite skewed towards smaller values.


