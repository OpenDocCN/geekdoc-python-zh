    程序员可通过多种途径获取机器学习的通用知识：在线课程、众多优秀书籍等。这些资源大多对机器学习算法及其应用进行了出色概述，但由于可用算法众多，概述性内容难以涵盖其使用细节。


    这给实践者留下了空白。算法数量之多要求做出选择，而机器学习新手可能需要尝试多种算法才能具备选择能力，这使得程序员需要在整体问题构建与解决的背景下自行填补算法使用的细节。


    本书旨在弥合这一差距。所采取的方法是将涵盖的算法限制在两类已被证明在广泛问题中能提供最优性能的算法族。这一论断'
