    这组数据仅包含两个测量值，即身高和体重，以及一个目标变量，即观察样本的性别。让我们回顾监督学习方法的主要目标：我们希望在指定的标记数据集上训练一个模型，然后通过将预测标签的性能与可用信息（通常是回顾性获得的）进行比较，来评估其在未见数据上的性能。为了评估机器学习模型，我们通常将数据分为两组：训练集和测试集。这有一个主要优势：我们实际上可以在一部分数据上训练模型，其余部分则用于评估所选模型在之前未使用过的数据集上的性能。前者用于构建和训练分类器，后者用作代表未来未见数据的保留集。这是预处理的一个重要方面，可以总结为一个非常简单的规则：不要在训练阶段使用任何测试样本。因此，测试集和训练集必须保持独立。为此，我们使用scikit-learn的model_selection模块中的train_test_split方法，该方法要求用户指定用于测试集的可用数据百分比。


