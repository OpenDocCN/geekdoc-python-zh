    ## 第12章 回归问题的快速检查算法


    快速检查是一种发现哪些算法在你的机器学习问题上表现良好的方法。你事先无法知道哪种算法最适合你的问题。你必须尝试多种方法，并重点关注那些被证明最有潜力的算法。在本章中，你将了解六种机器学习算法，这些算法可用于在Python中使用scikit-learn对回归问题进行快速检查。完成本课后，你将知道：


    - 1. 如何在回归问题上快速检查机器学习算法。

    - 2. 如何快速检查四种线性回归算法。

    - 3. 如何快速检查三种非线性回归算法。


    让我们开始吧。


    ## 12.1 算法概述


    在本课中，我们将介绍七种回归算法，你可以在你的数据集上对它们进行快速检查。首先是四种线性机器学习算法：


    - 线性回归。

    - 岭回归。

    - LASSO线性回归。

    - 弹性网络回归。


    然后是三种非线性机器学习算法：


    - 近邻法。

    - 分类与回归树。

    - 支持向量机。


    该示例在波士顿房价数据集上演示。这是一个回归问题，所有属性都是数值型的。使用一个包含10折交叉验证的测试框架来演示如何快速检查每种机器学习算法，并使用均方误差来衡量算法性能。请注意，均方误差值是取反的（负数）。这是所使用的`cross_val_score()`函数的一个特点，它要求所有算法指标按升序排序（值越大越好）。示例假设你了解每种机器学习算法及其使用方法。我们不会深入探讨每种算法的API或参数化。


    ## 12.2 线性机器学习算法


    本节提供了如何在Python中使用scikit-learn进行回归的四种不同线性机器学习算法的示例。


    ### 12.2.1 线性回归


