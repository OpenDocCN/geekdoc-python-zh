  md: '# Chapter 14 Use Pipelines to Automate Machine Learning Workflows


    There are standard workflows in a machine learning project that can be automated.
    In Python scikit-learn, Pipelines help to clearly define and automate these workflows.
    In this chapter you will discover Pipelines in scikit-learn and how you can automate
    common machine learning workflows. After completing this lesson you will know:


    +   1. How to use pipelines to minimize data leakage.

    2. How to construct a data preparation and modeling pipeline.

    3. How to construct a feature extraction and modeling pipeline. Let’s get started.


    # 14.1 Automating Processes for Machine Learning


    There are standard workflows in applied machine learning. Standard because they
    overcome common problems like data leakage in your test harness. Python scikit-learn
    provides a Pipeline utility to help automate machine learning workflows. Pipelines
    work by allowing for a linear sequence of data transforms to be chained together
    culminating in a modeling process that can be evaluated.


    The goal is to ensure that all of the steps in the pipeline are constrained to
    the data available for the evaluation, such as the training dataset or each fold
    of the cross validation procedure. You can learn more about Pipelines'
  merge: -1
  pgno: 282
- img_proc: true
  md: 'in scikit-learn by reading the Pipeline of the user guide. You can also review
    the API documentation for the Pipeline and FeatureUnion classes and the pipeline


    # 14.2 Pipeline for Preparing Data and Modeling


    An easy trap to fall into in applied machine learning is leaking data from your
    training dataset to your test dataset. To avoid this trap you need a robust test
    harness with strong separation of'
  merge: -1
  pgno: 283
- img_proc: true
  md: '# Data Preparation and Modeling


    training and testing. This includes data preparation. Data preparation is one
    easy way to leak knowledge of the whole training dataset to the algorithm. For
    example, preparing your data using normalization or standardization on the entire
    training dataset before learning would not be a valid test because the training
    dataset would have been influenced by the scale of the data in the test set.


    Pipelines help you prevent data leakage in your test harness by ensuring that
    data preparation like standardization is constrained to each fold of your cross
    validation procedure. The example below demonstrates this important data preparation
    and model evaluation workflow on the Pima Indians onset of diabetes dataset. The
    pipeline is defined with two steps:


    +   - Standardize the data.

    - Learn a Linear Discriminant Analysis model.'
  merge: -1
  pgno: 284
- img_proc: true
  md: '```

    # Create a pipeline that standardizes the data then creates a model

    from pandas import read_csv

    from sklearn.model_selection import KFold

    from sklearn.model_selection import cross_val_score

    from sklearn.preprocessing import StandardScaler

    from sklearn.pipeline import Pipeline

    from sklearn.discriminant_analysis import LinearDiscriminantAnalysis

    # load data

    filename = ''pima-indians-diabetes.data.csv''

    names = [''preg'', ''plas'', ''pres'', ''skin'', ''test'', ''mass'', ''pedi'',
    ''age'', ''class'']

    dataframe = read_csv(filename, names=names)

    array = dataframe.values

    X = array[:,0:8]

    Y = array[:,8]

    # create pipeline

    estimators = []

    estimators.append((''standardize'', StandardScaler()))

    estimators.append((''lda'', LinearDiscriminantAnalysis()))

    model = Pipeline(estimators)

    # evaluate pipeline

    kfold = KFold(n_splits=10, random_state=7)

    ```


    The pipeline is then evaluated using 10-fold cross validation.


