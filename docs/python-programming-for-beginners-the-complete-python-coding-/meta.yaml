    ## About Author


    Dr. James Harrison holds bachelor’s and master’s degrees in mechanical engineering,
    an ScD in instrumentation, and an MBA. He has worked in academia, technology,
    and business. Mike currently works with companies where artificial intelligence
    or machine learning are integral to success. He serves variously as part of the
    management team, a consultant, or advisor. He also teaches machine learning courses
    at UC Berkeley and Hacker Dojo, a co-working space and startup incubator in Mountain
    View, CA.


    James was born in Oklahoma and took his bachelor’s and master’s degrees there,
    then after a stint in Southeast Asia went to Cambridge for ScD and C. Stark Draper
    Chair at MIT after graduation. James left Boston to work on communications satellites
    at Hughes Aircraft Company in Southern California, and then after completing an
    MBA at UCLA moved to the San Francisco Bay Area to take roles as founder and CEO
    of two successful venture-backed startups.


    James remains actively involved in technical and startup-related work. Recent
    projects include the use of machine learning in industrial inspection and automation,
    financial prediction, predicting biological outcomes on the basis of molecular
    graph structures, and financial risk estimation. He has participated in due diligence
    work on companies in the artificial intelligence and machine learning arenas.
    James can be reached through mbowles.com.


    ## Who This Book Is For


    This book is intended for Python programmers who want to add machine learning
    to their repertoire, either for a specific project or as part of keeping their
    toolkit relevant. Perhaps a new problem has come up at work that requires machine
    learning. With machine learning being covered so much in the news these days,
    it’s a useful skill to claim on a resume.


    This book provides the following for Python programmers:


    - A description of the basic problems that machine learning attacks

    - Several state-of-the-art algorithms

    - The principles of operation for these algorithms

    - Process steps for specifying, designing, and qualifying a machine learning system

    - Examples of the processes and algorithms

    - Hackable code


    To get through this book easily, your primary background requirements include
    an understanding of programming or computer science and the ability to read and
    write code. The code examples, libraries, and packages are all Python, so the
    book will prove most useful to Python programmers. In some cases, the book runs
    through code for the core of an algorithm to demonstrate the operating principles,
    but then uses a Python package incorporating the algorithm to apply the algorithm
    to problems. Seeing code often gives programmers an intuitive grasp of an algorithm
    in the way that seeing the math does for others. Once the understanding is in
    place, examples will use developed Python packages with the bells and whistles
