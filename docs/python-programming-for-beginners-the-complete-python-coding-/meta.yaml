    通过这个案例研究，你了解了如何将特定机器学习任务的解决方案组合成一个完整的项目。完成这个案例研究是使用Python进行应用机器学习的良好实践。


    ### 21.10.1 下一步


    这是第三个也是最后一个预测建模项目案例研究。做得好！你现在拥有从头到尾完成预测建模机器学习项目的经验和技能。在下一节中，你将发现一些额外的小型案例研究项目的想法，你可以继续实践。


    ## 第22章 更多预测建模项目


    你现在可以使用Python完成预测建模机器学习项目了。接下来呢？在本章中，我们将探讨你可以用来练习和完善新技能的方法。


    ### 22.1 构建和维护解决方案集


    在整本书中，你使用Python完成了许多机器学习课程。综合来看，这是你个人代码库的开端，你可以用它来快速启动当前或下一个机器学习项目。这些解决方案是一个起点，而不是终点。你的机器学习解决方案目录越大、越复杂，你就能越快地开始新项目，开发出的模型也越准确。


    当你使用Python平台应用机器学习技能时，你将积累使用Python处理各种新技术的经验和技能。你可以随时提取或抽象代码片段和解决方案，并将它们添加到你自己的解决方案集合中，为未来的机器学习项目积累可用的代码。随着时间的推移，你将积累自己成熟且高度定制的Python机器学习代码库。


    ### 22.2 在小型数据集上进行小项目


    继续使用Python练习你的技能。本书中使用了来自UCI机器学习库的数据集来演示如何在机器学习项目中完成特定任务。它们也用于较长的案例研究项目。这些数据集是标准化的、相对干净、易于理解，并且非常适合作为你的练习数据集。


    你可以使用UCI机器学习库上的数据集作为使用Python平台进行小型（5到10小时工作量）专注的机器学习项目的重点。完成后，你可以将你的发现整理成文，并将其在线分享，作为你不断扩展的机器学习项目组合的一部分。


    这些项目可以作为你的知识库，供你日后构建和进一步发展技能。它们也可以用来向经理或未来的雇主展示，你有能力使用Python平台在预测建模机器学习项目中交付成果。以下是你可以在Python上练习机器学习的一个流程：


    1. 浏览存储库上的免费数据集列表，下载一些你感兴趣的。

    2. 使用本书中的项目模板和解决方案来处理数据集并开发一个准确的模型。

    3. 以一种你可以日后参考或可能在网站上公开分享的方式，写下你的工作流程和发现。


    保持项目简短，将项目限制在5到10小时，比如一周的晚上和空闲时间。


    ### 22.3 竞争性机器学习


    使用竞争性机器学习来推动你的技能。在上一节中处理小项目是练习基础知识的好方法。在某些时候，问题对你来说会变得容易。你也需要被推出舒适区，以帮助你进一步发展技能。


    进一步发展Python机器学习技能的一个绝佳方法是开始参加比赛。在比赛中，组织者会提供给你一个训练数据集、一个你需要进行预测的测试数据集、一个性能衡量标准和一个时间限制。然后你和你的竞争对手一起努力创建尽可能准确的模型。获胜者通常会获得奖金。


    这些比赛通常持续数周到数月，可能非常有趣。它们也提供了一个绝佳的机会，让你在通常需要大量清理和准备的数据集上测试你的机器学习工具技能。机器学习比赛的首要网站是Kaggle。


    比赛分为不同的类别，如研究、招聘和面向初学者的101。一个好的起点是初学者比赛，因为它们通常挑战性较小，并且有大量的教程形式的帮助来让你入门。


    ### 22.4 总结


    在本章中，你发现了三个可以练习新掌握的Python机器学习技能的领域。它们是：


    1. 继续构建和维护你的机器学习解决方案目录，从本书附赠的解决方案目录开始。

    2. 继续在UCI机器学习库的标准机器学习数据集上进行实践。

    3. 开始处理来自竞争性机器学习的更大数据集，甚至开始参加机器学习竞赛。'
