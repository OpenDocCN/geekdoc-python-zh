    ### 16.3 调整随机搜索参数


    随机搜索是一种参数调优方法，它将从随机分布（即均匀分布）中对算法参数进行固定次数的迭代采样。对于选择的每种参数组合，都会构建并评估一个模型。你可以使用 `RandomizedSearchCV`
