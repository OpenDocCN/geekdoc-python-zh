    ## Chapter 18 Template for Predictive Modeling Projects


    Applied machine learning is an empirical skill. You cannot get better at it by
    reading books and articles. You have to practice. In this lesson you will discover
    the simple six-step machine learning project template that you can use to jump-start
    your project in Python. After completing this lesson you will know:


    1. How to structure an end-to-end predictive modeling project.

    2. How to map the tasks you learned about in Part II onto a project.

    3. How to best use the structured project template to ensure an accurate result
    for your dataset.


    Let’s get started.


    ### 18.1 Use Projects to Practice Machine Learning


    Working through machine learning problems from end-to-end is critically important.
    You can read about machine learning. You can also try out small one-off recipes.
    But applied machine learning will not come alive for you until you work through
    a dataset from beginning to end.


    Working through a project forces you to think about how the model will be used,
    to challenge your assumptions and to get good at all parts of a project, not just
    your favorite parts. The best way to practice predictive modeling machine learning
    projects is to use standardized datasets from the UCI Machine Learning Repository.
    Once you have a practice dataset and a bunch of Python recipes, how do you put
    it all together and work through the problem end-to-end?


    #### 18.1.1 Employ a Methodical, Structured Approach


    Any predictive modeling machine learning project can be broken down into six common
    tasks:


    1. Define Problem.

    2. Summarize Data.

    3. Prepare Data.

    4. Evaluate Algorithms.

    5. Improve Results.

    6. Present Results.


    Tasks can be combined or broken down further, but this is the general structure.
    To work through predictive modeling machine learning problems in Python, you need
    to map Python onto this process. The tasks may need to be adapted or renamed slightly
    to suit the Python way of doing things (e.g. Pandas for data loading and scikit-learn
    for modeling). The next section provides exactly this mapping and elaborates each
    task and the types of sub-tasks and libraries that you can use.


    ### 18.2 Machine Learning Project Template in Python


    This section presents a project template that you can use to work through machine
    learning problems in Python end-to-end.


    #### 18.2.1 Template Summary


    ```python

    # Python Project Template


    # 1. Prepare Problem

    # a) Load libraries

    # b) Load dataset


    # 2. Summarize Data

    # a) Descriptive statistics

    # b) Data visualizations


    # 3. Prepare Data

    # a) Data Cleaning

    # b) Feature Selection

    # c) Data Transforms


    # 4. Evaluate Algorithms

    # a) Split-out validation dataset

    # b) Test options and evaluation metric

    # c) Spot Check Algorithms

    # d) Compare Algorithms


    # 5. Improve Accuracy

    # a) Algorithm Tuning

    # b) Ensembles


    # 6. Finalize Model

    ```


    Below is the project template that you can use in your machine learning projects
    in Python.


    Listing 18.1: Predictive modeling machine learning project template.


    #### 18.2.2 How To Use The Project Template


    1. Create a new file for your project (e.g. `project_name.py`).

    2. Copy the project template.

    3. Paste it into your empty project file.

    4. Start to fill it in, using recipes from this book and others.


    ### 18.3 Machine Learning Project Template Steps


    This section gives you additional details on each of the steps of the template.


    #### 18.3.1 Prepare Problem


    This step is about loading everything you need to start working on your problem.
    This includes:


    - Python modules, classes and functions that you intend to use.

    - Loading your dataset from CSV.


    This is also the home of any global configuration you might need to do. It is
    also the place where you might need to make a reduced sample of your dataset if
    it is too large to work with. Ideally, your dataset should be small enough to
    build a model or create a visualization within a minute, ideally 30 seconds. You
    can always scale up well performing models later.'
