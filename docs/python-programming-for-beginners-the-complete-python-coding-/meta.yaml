    Listing 2.3: Example Python version.


    The examples in this book assume that you are using this version of Python 2 or
    newer. The examples in this book have not been tested with Python 3.


    ### Ways To Set Up SciPy


    There are many ways to install SciPy. For example two popular ways are to use
    package management on your platform (e.g. yum on RedHat or macports on OS X) or
    use a Python package management tool like pip. The SciPy documentation is excellent
    and covers how-to instructions for many different platforms on the page Installing
    the SciPy Stack When installing SciPy, ensure that you install the following packages
    as a minimum:


    - scipy

    - numpy

    - matplotlib

    - pandas


    Once installed, you can confirm that the installation was successful. Open the
    Python interactive environment by typing python at the command line, then type
    in and run the following Python code to print the versions of the installed libraries.


