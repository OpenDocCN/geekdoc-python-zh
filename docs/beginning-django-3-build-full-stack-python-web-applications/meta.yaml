    ```\nsearchTerm = request.GET.get('searchMovie')\n```\n\nWe retrieve the search\
    \ term entered (if any) from the *searchMovie* input.\n\n```\nif searchTerm:\n\
    \    movies = Movie.objects.filter(title__icontains=searchTerm)\n```\n\nIf a search\
    \ term is entered, we call the model's *filter* method to return the movie objects\
    \ with a case-insensitive match to the search term.\n\n```\nelse:\n    movies\
