- md: "## Movies\n\nNews Login Sign Up\n\nI would do it, why not?: Dunst on possible\
    \ return to 'Spider-Man'\n\nKirsten Dunst, who portrayed the role of 'Mary Jane\
    \ Watson' in Sam Raimi's 'Spider-Man', said she \"would never say no\" to return\
    \ to the franchise. \"I would do it. Why not? That would be fun,\" she said. \"\
    I'd be old MJ (Mary Jane), with little Spidey babies,\" she added. Dunst will\
    \ next be seen in 'The Power of the Dog'.\n\nNov. 14, 2021\n\n2 Indore doctors\
    \ refuse to serve those not vaccinated for COVID-19\n\nTwo doctors in Madhya Pradesh's\
    \ Indore have announced that they will not provide their services to patients\
    \ who haven't taken both doses of COVID-19 vaccinations from November 30. Dr Ajay\
    \ Chhajlani and Dr Pankaj Bhatia have written letters to the District Collector\
    \ and the Indian Medical Association (IMA) informing them about their decision\
    \ taken to spread awareness about the vaccines.\n\nNov. 14, 2021\n\nBMC to use\
    \ satellite images to identify illegal constructions\n\nThe Brihanmumbai Municipal\
    \ Corporation (BMC) will use the help of satellite images to identify illegal\
    \ constructions and encroachments in Mumbai. Maharashtra CM Uddhav Thackeray had\
    \ recently asked the civic body to act against illegal constructions. The BMC\
    \ will take the help of the Geographic Information System to create a database\
    \ of the structures in Mumbai.\n\nNov. 12, 2021\n\n© 2021 Copyright - Greg Lim\
    \ - Daniel Correa\n\n## Figure 15.4\n\nIn the next chapter, we look at how to\
    \ display static images on our site.\n\n## CHAPTER 16: STATIC FILES\n\nSuppose\
    \ we want to display an image icon for our site (fig. 16.1):\n\n![](img/d19bfdecf695803cf46ee472b3205f51_102_0.png)\n\
    \nFigure 16.1\n\nSuch are examples of fixed images on the site. These fixed images\
    \ are static files. They are different from media files which users upload to\
    \ the site e.g. movie images.\n\nIn `/moviereviews/settings.py`, we have a property\
    \ `STATIC_URL = '/static/'`. Above the property is a comment containing a link\
    \ to the documentation on how to use static files:\n\n```\n# Static files (CSS,\
    \ JavaScript, Images)\n# https://docs.djangoproject.com/en/3.2/howto/static-files/\n\
    \nSTATIC_URL = '/static/'\n```\n\nBut we will go through it here. In `/moviereviews`,\
    \ create a folder `static`. In it, create a folder *images* to contain the fixed\
    \ images used in our site. Bring in an image file (e.g. *movie.png*) that you\
    \ want to display in your site into the *images* folder. And in *base.html*, replace\
    \ the Movies link with the following:\n\n```\n...\n<nav class=\"navbar navbar-expand-lg\
    \ navbar-light bg-light mb-3\">\n  <div class=\"container\">\n    <a class=\"\
    navbar-brand\" href=\"{% url 'home' %}\">\n      {% load static %}\n      <img\
    \ src=\"{% static 'images/movie.png' %}\" alt=\"\" width=\"30\" height=\"24\"\n\
    \           class=\"d-inline-block align-text-top\" />\n      Movies\n    </a>\n\
    \  </div>\n</nav>\n...\n```\n\n### Code Explanation\n\nWe added an image to the\
    \ navbar ([https://getbootstrap.com/docs/5.1/components/navbar/](https://getbootstrap.com/docs/5.1/components/navbar/)).\n\
    \n```\n{% load static %}\n```\n\nTo add static files to our template, we add the\
    \ above line to the top of *base.html*. Because other templates inherit from *base.html*,\
    \ we only have to add this once.\n\n```\n<img src=\"{% static 'images/movie.png'\
    \ %}\" ...\n```\n\nIn the image source, we can then reference the static image.\n\
    \nSince, the *movie.png* image is not attached to a specific app (it is attached\
    \ to the project folder), we need to include the *moviereviews/static* folder\
    \ to the application settings.\n\nAdd at the end of the */moviereviews/settings.py*\
    \ file, the following code in **bold**:\n\n```\n...\n\nSTATICFILES_DIRS = [\n\
    \    os.path.join(BASE_DIR, \"static\"),\n    'moviereviews/static/',\n]\n```\n\
    \nNow, the brand image will then be displayed in the navbar (fig. 16.2).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_104_0.png)\n\
    \nFigure 16.2\n\nOther than images, you can link to other static file types e.g.\
    \ pdf, CSS, JavaScript files. Let’s now go back to our movies app. In the next\
    \ chapter, let’s see how to navigate to a movie’s detail page from the home page.\n\
    \n## Chapter 17: Movie Detail Page\n\nLet’s now go back to our movies app. In\
    \ this chapter, we want to navigate to a movie’s detail page when a user clicks\
    \ on a movie title on the home page. First, we add the movie details path in /moviereviews/urls.py:\n\
    \n```\n...\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('',\
    \ movieViews.home, name='home'),\n    path('about/', movieViews.about, name='about'),\n\
    \    path('signup/', movieViews.signup, name='signup'),\n    path('news/', include('news.urls')),\n\
    \    path('movie/', include('movie.urls')),\n]\n...\n```\n\npath('movie/', include('movie.urls'))\
    \ will forward any requests with ‘movie/’ to movie app’s urls.py. We put all the\
    \ paths related to the movie app in its own urls.py, i.e. /movie/urls.py.\n\n\
    So let’s create /movie/urls.py with the following code:\n\n```\nfrom django.urls\
    \ import path\nfrom . import views\n\nurlpatterns = [\n    path('<int:movie_id>',\
    \ views.detail, name='detail'),\n]\n```\n\nThe path above is the primary key for\
    \ the movie represented as an integer `<int:movie_id>`. Remember that Django adds\
    \ an auto-incrementing primary key to our database models under the hood.\n\n\
    With this path, when a user comes to a url e.g. `localhost:8000/movie/4`, ‘4’\
    \ is the integer (int) representing the movie id. The url matches `path('movie/<int:movie_id>')`\
    \ and navigates to the detail page.\n\nNext in `/movie/views.py`, we add the view\
    \ `def detail`:\n\n```\nfrom django.shortcuts import render\nfrom django.http\
    \ import HttpResponse\nfrom django.shortcuts import get_object_or_404\n...\n\n\
    def detail(request, movie_id):\n    movie = get_object_or_404(Movie, pk=movie_id)\n\
    \    return render(request, 'detail.html', {'movie': movie})\n```\n\nWe use `get_object_or_404`\
    \ to get the specific movie object we want. We provide `movie_id` as the primary\
    \ key `pk=movie_id`. If there is a match, `get_object_or_404` as its name suggests,\
    \ returns us the object or the *not found (404)* object.\n\nWe then pass the movie\
    \ object to `detail.html`. So in `/movie/templates/`, create a file `detail.html`.\
    \ We will use the same Horizontal Card layout from `news/templates/news.html`\
    \ and extend from `base.html`. The code in `/movie/templates/detail.html` will\
    \ look like:\n\n```\n{% extends 'base.html' %}\n{% block content %}\n<div class=\"\
    card mb-3\">\n  <div class=\"row g-0\">\n    <div class=\"col-md-4\">\n      <img\
    \ src=\"{{ movie.image.url }}\" class=\"img-fluid rounded-start\" alt=\"\">\n\
    \    </div>\n    <div class=\"col-md-8\">\n      <div class=\"card-body\">\n \
    \       <h5 class=\"card-title\">{{ movie.title }}</h5>\n        <p class=\"card-text\"\
    >{{ movie.description }}</p>\n        <p class=\"card-text\">\n          {% if\
    \ movie.url %}\n          <a href=\"{{ movie.url }}\" class=\"btn btn-primary\"\
    >\n              Movie Link\n          </a>\n          {% endif %}\n        </p>\n\
    \      </div>\n    </div>\n  </div>\n</div>\n{% endblock content %}\n```\n\nWe\
    \ hope you are noticing the repeating pattern of creating a new view, url and\
    \ template.\n\nIf you visit a movie’s detail url e.g. *localhost:8000/movie/4*,\
    \ it will render the movie’s details in its own page (fig. 17.1).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_109_0.png)\n\
    \nFigure 17.1\n\nWe will later add a Reviews section to the details page.\n\n\
    ### Implement Links to Individual Movie Detail Page\n\nNow that we have a movie’s\
    \ detail page, we next implement the movie links to navigate to those detail pages\
    \ from *home.html*. We simply wrap the movie title in a `<a href ...>` as shown\
    \ below:\n\n```\n...\n<div class=\"row row-cols-1 row-cols-md-3 g-4 mb-3\">\n\
    \  {% for movie in movies %}\n  <div v-for=\"movie in movies\" class=\"col\">\n\
    \    <div class=\"card\">\n      <img class=\"card-img-top\" src=\"{{ movie.image.url\
    \ }}\"\n      />\n      <div class=\"card-body\">\n        <a href=\"{% url 'detail'\
    \ movie.id %}\">\n          <h5 class=\"card-title fw-bold\">{{ movie.title }}</h5>\n\
    \        </a>\n        <p class=\"card-text\">{{ movie.description }}</p>\n  \
    \    ...\n```\n\n{% url 'detail' movie.id %} links to the *detail* path back in\
    \ */movie/urls.py*. Within the {% ... %} tag, we have specified the target name\
