    \ review.movie.id)\n        except ValueError:\n            return render(request,\
    \ 'updatereview.html',\n                {'review': review, 'form': form, 'error':\
    \ 'Bad data in form'})\n```\n\n## 代码解释\n\n```\nreview = get_object_or_404(Review,\
    \ pk=review_id, user=request.user)\n```\n\n我们首先使用评论 ID 检索评论对象。我们还提供了登录用户，以确保其他用户无法访问该评论，例如，如果他们手动在浏览器中输入\
    \ URL 路径。只有创建此评论的用户才能更新/删除它。\n\n```\nif request.method == 'GET':\n    form = ReviewForm(instance=review)\n\
    \    return render(request, 'updatereview.html',\n        {'review': review, 'form':\
    \ form})\n```\n\n如果请求类型是 GET，意味着他们是从电影详情页面导航到此页面的。因此，我们渲染之前在创建评论时使用的 `ReviewForm`，但这次，我们将评论对象传递给表单，以便表单的字段将用对象的值填充，供用户编辑。看看\
    \ Django 的 `*ModelForm*` 为我们节省了多少工作！\n\n```\nelse:\n    try:\n        form = ReviewForm(request.POST,\
    \ instance=review)\n        form.save()\n        return redirect('detail', review.movie.id)\n\
    ```\n\n在 `*else*` 块中，即请求类型是 POST，意味着用户正在尝试提交更新表单。我们从表单中检索值并执行 `*form.save()*`\
    \ 以更新现有评论。然后我们重定向回电影详情页面。\n\n```\nexcept ValueError:\n    return render(request,\
    \ 'updatereview.html',\n        {'review': review, 'form': form, 'error': 'Bad\
    \ data in form'})\n```\n\n如果用户提供的内容有问题，我们使用 `*ValueError*` 异常来捕获它。\n\n## `/movie/templates/updatereview.html`\n\
    \n我们创建一个新文件 `/movie/templates/updatereview.html` 并填入以下内容：\n\n```\n{% extends 'base.html'\
    \ %}\n{% block content %}\n<div class=\"card mb-3\">\n  <div class=\"row g-0\"\
    >\n    <div>\n      <div class=\"card-body\">\n        <h5 class=\"card-title\"\
    >\n          Update Review for {{ review.movie.title }}\n        </h5>\n     \
    \   {% if error %}\n        <div class=\"alert alert-danger mt-3\" role=\"alert\"\
    >\n          {{ error }}\n        </div>\n        {% endif %}\n        <p class=\"\
    card-text\">\n          <form method=\"POST\">\n            {% csrf_token %}\n\
    \            {{ form.as_p }}\n            <button type=\"submit\" class=\"btn\
    \ btn-primary\">\n              Update Review\n            </button>\n       \
    \   </form>\n        </p>\n      </div>\n    </div>\n  </div>\n</div>\n{% endblock\
    \ content %}\n```\n\n同样，上面的标记与其他模板文件类似。看看 Django 如何极大地简化了我们的模板和表单创建！\n\n`/movie/templates/detail.html`\n\
    \n最后，回到 `*detail.html*`，我们将 `‘updatereview’` URL 添加到更新按钮。\n\n```\n...\n{% if user.is_authenticated\
    \ and user == review.user %}\n    <a class=\"btn btn-primary me-2\"\n       href=\"\
    {% url 'updatereview' review.id %}\">\n        Update\n    </a>\n    <a class=\"\
    btn btn-danger\" href=\"#\">Delete</a>\n{% endif %}\n...\n```\n\n## 运行你的应用\n\n\
    当我们运行应用并尝试更新评论时，表单将出现，并且将填充现有评论的值（图26.1）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_166_0.png)\n\
    \n图26.1\n\n用新值更新评论，提交表单后，更新后的评论将反映在电影详情页面中。\n\n## 第27章：删除评论\n\n在实现了评论更新之后，我们现在来实现评论删除。在\
    \ `/movie/urls.py` 中创建一个用于删除评论的新路径（你现在应该对此很熟悉了）：\n\n```\nurlpatterns = [\n   \
    \ path('<int:movie_id>', views.detail, name='detail'),\n    path('<int:movie_id>/create',\
    \ views.createreview, name='createreview'),\n    path('review/<int:review_id>',\
