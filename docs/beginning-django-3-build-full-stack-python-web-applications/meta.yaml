    \    searchTerm = request.GET.get('searchMovie')\n    return render(request, 'home.html',\n\
    \    {'searchTerm':searchTerm})\n```\n\n默认情况下，如果未指定请求类型，表单提交会发送 GET 请求。因此，我们通过\
    \ *request.GET* 访问请求，并指定输入字段的名称 *searchMovie*，即 *request.GET.get('searchMovie')*\
    \ 来获取输入值。我们将输入值赋给 *searchTerm*。\n\n然后，我们在 *render* 函数中通过 {'searchTerm':searchTerm}\
    \ 将 *searchTerm* 传递到 *home.html*。\n\n在 *home.html* 中，我们使用以下方式渲染 *searchTerm*：\n\
    \n```\n...\n<div class=\"container\">\n    <form action=\"\">\n        ...\n \
    \   </form>\n    Searching for {{ searchTerm }}\n</div>\n```\n\n当我们运行应用程序时，在搜索表单中输入一个值并点击“搜索”。页面重新加载，搜索词出现在表单之后（图\
    \ 8.4）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_46_0.png)\n\n图 8.4\n\n## 将表单发送到另一个页面\n\
    \n目前，我们将表单提交到同一页面。假设我们想将表单提交到另一个页面，我们该怎么做？让我们通过在搜索表单下方添加一个“加入我们的邮件列表”表单来说明。将以下标记添加到\
    \ *home.html*：\n\n```\n...\n<div class=\"container\">\n  <form action=\"\">\n\
    \    ...\n  </form>\n  Searching for {{ searchTerm }}\n  <br />\n  <br />\n  <h2>Join\
    \ our mailing list:</h2>\n  <form action=\"{% url 'signup' %}\">\n    <div class=\"\
    mb-3\">\n```\n\n```\n<label for=\"email\" class=\"form-label\"> Enter your email:\
    \ </label>\n<input type=\"email\" class=\"form-control\" name=\"email\" />\n</div>\n\
    <button type=\"submit\" class=\"btn btn-primary\">Sign Up</button>\n</form>\n\
    </div>\n```\n\n注册表单与搜索表单类似。我们有一个 *email* 输入框和一个 *Sign Up* 按钮。不同之处在于 `<form>` 标签，`<form\
    \ action=\"{% url 'signup' %}\">`。\n\n*url* 模板标签 `{% url 'signup' %}` 接受一个 URL\
    \ 模式名称作为参数，例如 'signup'，并返回一个 URL 链接。\n\n现在让我们在 `/moviereviews/urls.py` 的 urlpatterns\
    \ 中添加 'signup' 路由：\n\n```\n...\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('', movieViews.home),\n    path('about/', movieViews.about),\n    path('signup/',\
    \ movieViews.signup, name='signup'),\n]\n```\n\n这次，我们为 *path* 对象提供了一个可选的 URL 名称\
    \ 'signup'。这样，我们就可以从 url 模板标签 `{% url 'signup' %}` 中引用这个 url `name='signup'`。url\
    \ 标签使用这些名称自动为我们创建链接。虽然添加命名 URL 是可选的，但这是我们应采用的最佳实践，因为它有助于在 URL 数量增长时保持组织性。\n\n\
    `movie/views.py`\n\n接下来在 *movie/views.py* 中，添加 *signup* 函数（类似于 *home*）：\n\n```\n\
    ...\ndef signup(request):\n    email = request.GET.get('email')\n    return render(request,\
    \ 'signup.html', {'email':email})\n```\n\n我们从 GET 请求中检索电子邮件（ `request.GET.get('email')`\
    \ ），并通过传递一个键值对字典 `{'email':email}` 将其发送到 *signup.html*。\n\n在 *movie/templates/*\
    \ 中，创建一个新文件 *signup.html*，包含以下标记：\n\n```\n<h2>Added {{ email }} to mailing list</h2>\n\
    ```\n\n当你运行你的网站时，在注册表单中输入一个有效的电子邮件并点击“Sign Up”（图 8.5）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_49_0.png)\n\
    \n图 8.5\n\n你将被带到 *signup.html*，并显示一条响应消息：\n\n**Added greg@greglim.com to mailing\
    \ list**\n\n注意 signup.html 中的 url。它将是类似这样的：\n\n[http://localhost:8000/signup/?email=greg%40greglim.com](http://localhost:8000/signup/?email=greg%40greglim.com)\n\
    \n这是在 GET 请求中发送的 url。你可以看到通过 url 传递的参数。但如果你有一个传递用户名和密码的登录表单呢？你会希望这些在 url 中隐藏起来。我们稍后将看到如何从表单发送一个隐藏传递值的\
    \ POST 请求。\n\n## 创建返回链接\n\n假设我们想从 *signup.html* 创建一个返回 *home.html* 的链接。我们可以使用\
    \ <a> 标签来实现。在 *signup.html* 中，添加 **粗体** 行：\n\n```\n<h2>Added {{ email }} to mailing\
    \ list</h2>\n<a href=\"{% url 'home' %}\">Home</a>\n```\n\n在 /moviereviews/urls.py\
    \ 中，添加 **粗体** 部分：\n\n```\n...\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('', movieViews.home, **name='home'**),\n    path('about/', movieViews.about,\
    \ **name='about'**),\n    path('signup/', movieViews.signup, name='signup'),\n\
    ]\n```\n\n我们添加了 **name='home'** 来为我们的主页配置 URL 路由 {% url 'home' %}。我们还添加了 **name='about'**\
    \ 来为我们的关于页面配置 URL 路由。\n\n如果你访问 *signup.html*，将会有一个链接可以导航回主页（图 8.6）。\n\nAdded peter@gmail.com\
    \ to mailing list\n\nHome\n\n图 8.6\n\n## 总结\n\n到现在，你应该更好地理解了当用户在浏览器中输入 url、向我们的站点发送请求、经过\
    \ *urls.py* 以及我们的 Django 服务器使用模板用 HTML 响应时发生了什么。我们希望这为进入项目的下一部分奠定了坚实的基础，在那里我们将探讨更高级的主题，如模型，使我们的网站由数据库驱动。\n\
    \n## 第九章：模型\n\n在 Django 中使用数据库涉及使用模型。我们创建一个数据库模型（例如博客文章、电影），Django 会将这些模型转换成数据库表。\n\
    在 /movie 中，你有 *models.py* 文件，我们在其中创建模型。用以下内容填充它：\n\n```\nfrom django.db import\
    \ models\n\nclass Movie(models.Model):\n    title = models.CharField(max_length=100)\n\
    \    description = models.CharField(max_length=250)\n    image = models.ImageField(upload_to='movie/images/')\n\
    \    url = models.URLField(blank=True)\n```\n\n## 代码解释\n\n```\nfrom django.db\
    \ import models\n```\n\nDjango 导入一个 *models* 模块来帮助我们构建数据库模型，这些模型“建模”了数据库中数据的特征。在我们的例子中，我们创建了一个电影模型来存储电影的标题、描述、图像和\
    \ url。\n\n```\nclass Movie(models.Model)\n```\n\n*class Movie* 继承自 *Model* 类。*Model*\
    \ 类允许我们与数据库交互、创建表、检索和修改数据库中的数据。\n\n```\ntitle = models.CharField(max_length=100)\n\
    description = models.CharField(max_length=250)\nimage = models.ImageField(upload_to='movie/images/')\n\
    url = models.URLField(blank=True)\n```\n\n然后我们有了模型的属性。注意属性具有 *CharField*、*ImageField*、*URLField*\
    \ 等类型。Django 提供了许多其他模型字段来支持常见类型，如日期、整数、电子邮件等。要获得关于类型种类及其使用方法的完整文档，请参阅 Django 文档中的\
    \ *Model* 字段参考（[https://docs.djangoproject.com/en/3.2/ref/models/fields/](https://docs.djangoproject.com/en/3.2/ref/models/fields/)）。例如，CharField\
    \ 是一个用于中小型字符串的字符串字段，max_length 参数是必需的（图 9.1）。"
