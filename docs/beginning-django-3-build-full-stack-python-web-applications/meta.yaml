    \ views.deletereview, name='deletereview')\n]\n```\n\n并在 `/movie/views.py` 中添加\
    \ `def deletereview`：\n\n```\ndef deletereview(request, review_id):\n    review\
    \ = get_object_or_404(Review, pk=review_id, user=request.user)\n```"
