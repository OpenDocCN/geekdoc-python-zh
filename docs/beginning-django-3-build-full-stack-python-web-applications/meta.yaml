    and run the makemigrations/migrate command:


    ```

    python manage.py makemigrations

    python manage.py migrate

    ```


    # Final Words


    We have gone through quite a lot of content to equip you with the skills to create
    a Django full stack app. We have covered the major features of Django, templates,
    views, urls, user authentication, authorization, models, and deployment. You now
    have the knowledge to go and build your own websites with Django. The CRUD functionality
    in our Reviews app is common in many web applications. E.g. you already have all
