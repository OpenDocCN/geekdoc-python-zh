- md: "## Chapter 8: Adding a Search Form\n\nWe will add a Search Form in our home\
    \ page for users to search for movies. Let’s get a Form component from *getbootstrap*.\
    \ In *getbootstrap.com*, under ‘Docs’, go to ‘Forms’, ‘Overview’ (fig. 8.1).\n\
    \n![](img/d19bfdecf695803cf46ee472b3205f51_42_0.png)\n\nFigure 8.1\n\nUnder *Overview*,\
    \ copy the markup (fig. 8.2) and paste it within the `<div>` tags of *home.html*.\
    \ We can remove the existing `<h1>` and `<h2>` text messages.\n\n![](img/d19bfdecf695803cf46ee472b3205f51_43_0.png)\n\
    \nFigure 8.2\n\nBecause we don't need the password and checkbox, remove their\
    \ related markup. Change the 'Email address' to a 'Search for Movie' field and\
    \ change the 'Submit' button to 'Search'.\n\nhome.html will now look something\
    \ like:\n\n```\n<head>\n  ...\n</head>\n<div class=\"container\">\n  <form action=\"\
    \">\n    <div class=\"mb-3\">\n      <label for=\"searchMovie\" class=\"form-label\"\
    >\n        Search for Movie:\n      </label>\n      <input type=\"text\" class=\"\
    form-control\"\n             name=\"searchMovie\" />\n    </div>\n    <button\
    \ type=\"submit\" class=\"btn btn-primary\">Search</button>\n  </form>\n</div>\n\
    ```\n\nAnd you should have a simple search form (fig. 8.3):\n\n![](img/d19bfdecf695803cf46ee472b3205f51_44_0.png)\n\
    \nFigure 8.3\n\nFor the input, we specify `name=\"searchMovie\"` to reference\
    \ the input and retrieve its value. We have `action=\"\"` in the `form` tag. The\
    \ empty string `\"\"` specifies that upon clicking on submit, we submit the form\
    \ to the same page i.e. home.html. If we want to submit the form to another page\
    \ e.g. `about`, we will have: `<form action=\"{% url 'about' %}\">` . We will\
    \ illustrate this in a later chapter. For now, we submit to the same page.\n\n\
    Now, how do we retrieve the values submitted? Because the form submits to `\"\"\
    `, which `urls.py` routes to `def home` in `views.py`, we can retrieve the values\
    \ from the `request` object in `def home`: `movie/views.py`\n\n```\npython\n...\n\
    ```\n\n```\ndef home(request):\n    searchTerm = request.GET.get('searchMovie')\n\
    \    return render(request, 'home.html',\n    {'searchTerm':searchTerm})\n```\n\
    \nBy default, a form submission sends a GET request if the type of request is\
    \ not specified. Thus, we access the request with *request.GET* and specify the\
    \ name of the input field *searchMovie* i.e. *request.GET.get('searchMovie')*\
    \ to get the input value. We assign the input value to *searchTerm*.\n\nWe then\
    \ pass *searchTerm* into *home.html* in the *render* function with {'searchTerm':searchTerm}.\n\
    \nAnd in *home.html*, we render *searchTerm* with:\n\n```\n...\n<div class=\"\
    container\">\n    <form action=\"\">\n        ...\n    </form>\n    Searching\
    \ for {{ searchTerm }}\n</div>\n```\n\nWhen we run our app, enter a value in the\
    \ Search Form and hit ‘Search’. The page reloads and the search term appears after\
    \ the form (fig. 8.4).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_46_0.png)\n\
    \nFigure 8.4\n\n## Sending a Form to Another Page\n\nCurrently, we submit a form\
    \ to the same page. Suppose we want to submit a form to another page, how do we\
    \ do so? Let’s illustrate by having a ‘Join Our Mailing List’ form below the Search\
    \ Form. Add the below markup into *home.html*:\n\n```\n...\n<div class=\"container\"\
    >\n  <form action=\"\">\n    ...\n  </form>\n  Searching for {{ searchTerm }}\n\
    \  <br />\n  <br />\n  <h2>Join our mailing list:</h2>\n  <form action=\"{% url\
    \ 'signup' %}\">\n    <div class=\"mb-3\">\n```\n\n```\n<label for=\"email\" class=\"\
    form-label\"> Enter your email: </label>\n<input type=\"email\" class=\"form-control\"\
    \ name=\"email\" />\n</div>\n<button type=\"submit\" class=\"btn btn-primary\"\
    >Sign Up</button>\n</form>\n</div>\n```\n\nThe signup form is similar to the search\
    \ form. We have an *email* input and a *Sign Up* button. What is different is\
    \ in the `<form>` tag, `<form action=\"{% url 'signup' %}\">`.\n\nThe *url* template\
    \ tag `{% url 'signup' %}` takes a URL pattern name as an argument e.g. ‘signup’\
    \ and returns a URL link.\n\nLet’s now add the ‘signup’ route to urlpatterns in\
    \ `/moviereviews/urls.py`:\n\n```\n...\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('', movieViews.home),\n    path('about/', movieViews.about),\n    path('signup/',\
    \ movieViews.signup, name='signup'),\n]\n```\n\nThis time, we provide an optional\
    \ URL name ‘signup’ to the *path* object. In doing so, we can then refer to this\
    \ url `name='signup'` from the url template tag `{% url 'signup' %}`. The url\
    \ tag uses these names to create links for us automatically. While its optional\
    \ to add a named URL, it’s a best practice we should adopt as it helps keep things\
    \ organized as the number of URLs grows.\n\n`movie/views.py`\n\nNext in *movie/views.py*,\
    \ add the *signup* function (similar to *home*):\n\n```\n...\ndef signup(request):\n\
    \    email = request.GET.get('email')\n    return render(request, 'signup.html',\
    \ {'email':email})\n```\n\nWe retrieve the email from the GET request ( `request.GET.get('email')`\
    \ ) and sends it to *signup.html* by passing in a key-value pair dictionary `{'email':email}`.\n\
    \nAnd in *movie/templates/*, create a new file *signup.html* with the below markup:\n\
    \n```\n<h2>Added {{ email }} to mailing list</h2>\n```\n\nWhen you run your site,\
    \ add a valid email into the signup form and click ‘Sign Up’ (fig. 8.5).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_49_0.png)\n\
    \nFigure 8.5\n\nYou will be brought to *signup.html* with a response message:\n\
    \n**Added greg@greglim.com to mailing list**\n\nNote the url in signup.html. It\
    \ will be something like:\n\n[http://localhost:8000/signup/?email=greg%40greglim.com](http://localhost:8000/signup/?email=greg%40greglim.com)\n\
    \nThis is the url that is sent in the GET request. You can see the parameters\
    \ being passed in via the url. But what if you have a login form that passes in\
    \ a username and password? You will want this hidden in the url. We will later\
    \ see how to send a POST request from a form that hides the values passed in.\n\
    \n## Creating a Back Link\n\nSuppose we want to create a link from *signup.html*\
    \ back to *home.html*. We can do so using the <a> tag. In *signup.html*, add the\
    \ line in **bold**:\n\n```\n<h2>Added {{ email }} to mailing list</h2>\n<a href=\"\
    {% url 'home' %}\">Home</a>\n```\n\nAnd in /moviereviews/urls.py, add in **bold**:\n\
    \n```\n...\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('',\
    \ movieViews.home, **name='home'**),\n    path('about/', movieViews.about, **name='about'**),\n\
    \    path('signup/', movieViews.signup, name='signup'),\n]\n```\n\nWe added **name='home'**\
    \ to configure a URL route for our homepage {% url 'home' %}. And we also added\
    \ the **name='about'** to configure a URL route for our about page.\n\nIf you\
    \ go to *signup.html*, there will be a link to navigate back to home (fig. 8.6).\n\
    \nAdded peter@gmail.com to mailing list\n\nHome\n\nFigure 8.6\n\n## Summary\n\n\
    By now, you should have a better grasp of what happens when a user types a url\
    \ into the browser, sends a request to our site, goes through *urls.py* and our\
    \ Django server uses a template to respond with HTML. We hope this serves as a\
    \ solid foundation to move on to the next part of our project where we will go\
    \ through more advanced topics like Models to make our site database-driven.\n\
    \n## CHAPTER 9: MODELS\n\nWorking with databases in Django involves working with\
    \ models. We create a database model (e.g. blog posts, movies) and Django turns\
    \ these models into a database table for us.\nIn /movie, you have the file *models.py*\
    \ where we create our models. Fill it in with the following:\n\n```\nfrom django.db\
    \ import models\n\nclass Movie(models.Model):\n    title = models.CharField(max_length=100)\n\
    \    description = models.CharField(max_length=250)\n    image = models.ImageField(upload_to='movie/images/')\n\
    \    url = models.URLField(blank=True)\n```\n\n## Code Explanation\n\n```\nfrom\
    \ django.db import models\n```\n\nDjango imports a module *models* to help us\
    \ build database models which ‘model’ the characteristics of the data in the database.\
    \ In our case, we created a movie model to store the title, description, image\
    \ and url of a movie.\n\n```\nclass Movie(models.Model)\n```\n\n*class Movie*\
    \ inherits from the *Model* class. The *Model* class allows us to interact with\
    \ the database, create a table, retrieve and make changes to data in the database.\n\
    \n```\ntitle = models.CharField(max_length=100)\ndescription = models.CharField(max_length=250)\n\
    image = models.ImageField(upload_to='movie/images/')\nurl = models.URLField(blank=True)\n\
    ```\n\nWe then have the properties of the model. Notice that the properties have\
    \ types like *CharField*, *ImageField*, *URLField*. Django provides many other\
    \ model fields to support common types like dates, integers, emails and so on.\
    \ To have a complete documentation of the kinds of types and how to use them,\
    \ refer to the *Model* field reference in the Django documentation ([https://docs.djangoproject.com/en/3.2/ref/models/fields/](https://docs.djangoproject.com/en/3.2/ref/models/fields/)).\
    \ For example, CharField is a string field for small to large sized strings and\
    \ the max_length arguments is required (fig. 9.1)."
  mdcn: "## 第八章：添加搜索表单\n\n我们将在主页添加一个搜索表单，供用户搜索电影。让我们从 *getbootstrap* 获取一个表单组件。在 *getbootstrap.com*\
    \ 网站上，在“文档”下，进入“表单”、“概览”（图 8.1）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_42_0.png)\n\
    \n图 8.1\n\n在 *概览* 下，复制标记代码（图 8.2）并将其粘贴到 *home.html* 的 `<div>` 标签内。我们可以移除现有的 `<h1>`\
    \ 和 `<h2>` 文本消息。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_43_0.png)\n\n图 8.2\n\
    \n由于我们不需要密码和复选框，请移除它们相关的标记。将“电子邮件地址”更改为“搜索电影”字段，并将“提交”按钮更改为“搜索”。\n\nhome.html\
    \ 现在看起来像这样：\n\n```\n<head>\n  ...\n</head>\n<div class=\"container\">\n  <form\
    \ action=\"\">\n    <div class=\"mb-3\">\n      <label for=\"searchMovie\" class=\"\
    form-label\">\n        Search for Movie:\n      </label>\n      <input type=\"\
    text\" class=\"form-control\"\n             name=\"searchMovie\" />\n    </div>\n\
    \    <button type=\"submit\" class=\"btn btn-primary\">Search</button>\n  </form>\n\
    </div>\n```\n\n你应该会有一个简单的搜索表单（图 8.3）：\n\n![](img/d19bfdecf695803cf46ee472b3205f51_44_0.png)\n\
    \n图 8.3\n\n对于输入框，我们指定 `name=\"searchMovie\"` 来引用该输入并检索其值。我们在 `form` 标签中有 `action=\"\
    \"`。空字符串 `\"\"` 指定点击提交时，我们将表单提交到同一页面，即 home.html。如果我们想将表单提交到另一个页面，例如 `about`，我们将使用：`<form\
    \ action=\"{% url 'about' %}\">`。我们将在后面的章节中说明这一点。目前，我们提交到同一页面。\n\n现在，我们如何检索提交的值？因为表单提交到\
    \ `\"\"`，而 `urls.py` 将其路由到 `views.py` 中的 `def home`，我们可以从 `def home` 中的 `request`\
