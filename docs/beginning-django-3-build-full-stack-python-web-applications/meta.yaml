    ```\n\n它将显示你可以使用的所有选项（图 2.1）：\n\n![](img/d19bfdecf695803cf46ee472b3205f51_16_0.png)\n\
    \n图 2.1\n\n在本书的学习过程中，你将逐步了解其中一些选项。目前，我们将使用 *startproject* 选项来创建一个新项目。\n\n在终端中，导航到你计算机上想要存储\
    \ Django 项目的文件夹，例如桌面。在该文件夹中，运行：\n\n```\npython3 -m django startproject <project_name>\n\
    ```\n\n以我们为例，假设我们想将项目命名为 ‘moviereviews’。我们运行：\n\n```\npython3 manage.py startapp\
    \ movie\n```\n\n一个 ‘moviereviews’ 文件夹将被创建。我们稍后会讨论其内容。现在，让我们在 Django 本地 Web 服务器上运行我们的第一个网站。\n\
    \n## 运行 Django 本地 Web 服务器\n\n在终端中，*cd* 到已创建的文件夹：\n\n```\ncd moviereviews\n```\n\
    \n并运行：\n\n```\npython3 manage.py runserver\n```\n\n当你这样做时，你就在你的机器上启动了本地 Web 服务器（用于本地开发）。将会有一个\
    \ URL 链接 http://127.0.0.1:8000/（等同于 http://localhost:8000）。在浏览器中打开该链接，你将看到默认的着陆页（图\
    \ 2.2）：\n\n![](img/d19bfdecf695803cf46ee472b3205f51_18_0.png)\n\n图 2.2\n\n这意味着你的本地\
    \ Web 服务器正在运行并提供着陆页！要停止本地服务器，请在终端中输入 Control+c。\n\n在下一章中，我们将查看 Django 为我们创建的项目文件夹内部，并更好地理解它。\n\
    \n## 第三章：理解项目结构\n\n让我们看看为我们创建的项目文件。在代码编辑器中打开项目文件夹 *moviereviews*（我将在本书中使用 VSCode\
    \ 编辑器 - [https://code.visualstudio.com/](https://code.visualstudio.com/)）。\n\n\
    ### *manage.py*\n\n你会看到一个文件 *manage.py*，我们不应该随意修改它（图 3.1）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_19_0.png)\n\
    \n图 3.1\n\n*manage.py* 帮助我们执行管理任务。例如，我们之前运行了：\n\n```\npython3 manage.py runserver\n\
    ```\n\n来启动本地 Web 服务器。我们稍后将展示更多它的管理功能，例如创建一个新应用 – *python3 manage.py startapp*。\n\
    \n### *db.sqlite3*\n\n我们还有一个 *db.sqlite3* 文件，它包含我们的数据库。我们将在 *Models* 章节中更详细地讨论这个文件。\n\
    \n### *moviereviews* 文件夹\n\n你会发现另一个同名的 *moviereviews* 文件夹。为了避免混淆并区分这两个 *moviereviews*\
    \ 文件夹，我们将保持内部的 *moviereviews* 文件夹不变，并将外部文件夹重命名为 *moviereviewsproject*（图 3.2）。\n\
    \n![](img/d19bfdecf695803cf46ee472b3205f51_20_0.png)\n\n图 3.2\n\n在其中，我们有一个 *__pycache__*\
    \ 文件夹，用于存储生成项目时编译的字节码。你可以很大程度上忽略这个文件夹。它的目的是通过缓存已编译的代码来使你的项目启动得稍快一些，以便它可以立即执行。\n\
    \n__init__.py 指定了 Django 首次启动时要运行的内容。同样，我们可以忽略这个文件。\n\nasgi.py 允许运行一个可选的异步服务器网关接口。wsgi.py\
    \ 代表 Web 服务器网关接口，帮助 Django 提供我们的网页。这两个文件在部署我们的应用时都会用到。我们将在部署应用时重新讨论它们。\n\n###\
    \ urls.py\n\n这个文件告诉 Django 哪些页面应该响应浏览器或 URL 请求进行渲染。例如，当有人输入 url http://localhost:8000/123\
    \ 时，请求会进入 urls.py，并根据其中指定的路径路由到一个页面。我们稍后将向此文件添加路径，并更好地理解它的工作原理。\n\n### settings.py\n\
    \n*settings.py* 文件是一个重要的文件，控制着我们项目的设置。它包含几个属性：\n\n-   BASE_DIR 确定项目在你机器上的位置\n\
    -   SECRET_KEY 在你的网站有数据流入和流出时使用。永远不要与他人分享这个密钥\n-   DEBUG – 我们的站点可以在调试模式或非调试模式下运行。在调试模式下，我们会获得关于错误的详细信息。例如，如果我尝试在浏览器中运行\
    \ http://localhost:8000/123，我将看到一个 404 页面未找到的错误，并附有错误详情（图 3）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_22_0.png)\n\
    \n图 3\n\n如果 DEBUG = False，我们将看到一个没有错误详情的通用 404 页面。在开发我们的项目时，我们设置 DEBUG = True\
    \ 以帮助我们调试。当将我们的应用部署到生产环境时，我们应该将 DEBUG 设置为 False。\n\n-   INSTALLED_APPS 允许我们将不同的代码片段引入我们的项目。我们稍后将看到它的实际应用。\n\
    -   MIDDLEWARE 是 Django 的内置函数，用于辅助我们的项目\n-   ROOT_URLCONF 指定我们的 URL 位置\n-   TEMPLATES\
    \ 帮助我们返回 HTML 代码\n-   AUTH_PASSWORD_VALIDATORS 允许我们指定对密码的验证要求。例如，最小长度\n\n*settings.py*\
    \ 中还有一些其他属性，如 LANGUAGE_CODE 和 TIME_ZONE，但我们重点关注了更重要的那些。我们稍后将重新讨论这个文件，并看看它在开发我们的站点时有多重要。接下来，让我们创建我们的第一个应用！\n\
    \n## 第四章：创建我们的第一个应用\n\n在第二章中，我们创建了一个 Django 项目。一个 Django 项目可以包含一个或多个 *应用*，它们协同工作以驱动一个\
    \ Web 应用程序。Django 使用项目和应用的概念来保持代码的整洁和可读性。\n\n例如，在一个像 *rottentomatoes.com* 这样的电影评论网站（图\
    \ 4.1）中，我们可以有一个用于列出电影的应用，一个用于列出新闻的应用，一个用于支付的应用，一个用于用户身份验证的应用等等。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_24_0.png)\n\
    \nDjango 中的应用就像网站的组成部分。你可以用一个单一的应用创建整个网站。但将其分解成不同的应用，每个应用代表一个清晰的功能，是很有用的。\n\n\
    我们的电影评论网站将从一个应用开始。随着我们的进展，我们将添加更多应用。要添加一个应用，在终端中，停止服务器（Cmd + c）。导航到 *moviereviewsproject*\
    \ 文件夹（**不是 *moviereviews***），并在终端中运行：\n\n```\npython3 manage.py startapp <name\
    \ of app>\n```\n\n以我们为例，我们将添加一个 *movie* 应用。所以运行：\n\n```\npython3 manage.py startapp\
    \ movie\n```\n\n一个新的 *movie* 文件夹将被添加到项目中。随着本书的进展，我们将解释文件夹内的文件。\n\n尽管我们的新应用存在于我们的\
    \ Django 项目中，但 Django 并不“知道”它，直到我们明确添加它。为此，我们在 *settings.py* 中指定它。所以转到 */moviereviews/settings.py*，在\
    \ INSTALLED_APPS 下，你会看到已经有六个内置应用。添加应用名称（以**粗体**显示）：\n\n```\n...\nINSTALLED_APPS\
    \ = [\n    'django.contrib.admin',\n    'django.contrib.auth',\n    'django.contrib.contenttypes',\n\
    \    'django.contrib.sessions',\n    'django.contrib.messages',\n    'django.contrib.staticfiles',\n\
    \    'movie',\n]\n...\n```\n\n回到终端，运行服务器：\n\n```\npython3 manage.py runserver\n\
    ```\n\n服务器应该能正常运行。我们将在本书的学习过程中了解更多关于应用的知识。\n\n目前，你可能会在运行服务器时在终端中注意到一条消息：\n\n>\
    \ “ *你有 18 个未应用的迁移。在你为应用（admin, auth, contenttypes, sessions）应用迁移之前，你的项目可能无法正常工作。运行\
    \ 'python manage.py migrate' 来应用它们。* ”\n\n我们稍后将看到如何解决这个问题。但现在，请记住，我们可以在一个项目中拥有一个或多个应用。\n\
    \n## 第五章：URL\n\n目前，我们只有一个由 Django 提供的默认着陆页。我们如何创建自己的自定义页面，并让不同的 URL 路由到它们？\n\n\
    记住，每次有人在我们的网站上输入一个 URL 时，都会引用 /moviereviews/urls.py。例如 localhost:8000/hello。\n\
    \n目前，当我们访问上述 URL 时，会得到一个错误页面。那么，我们如何为它显示一个合适的页面呢？每次用户输入一个 URL，请求都会经过 urls.py，并查看该\
    \ URL 是否匹配任何已定义的路径，以便 Django 服务器可以返回适当的响应。\n\nurls.py 目前的代码是：\n\n```\nfrom django.contrib\
    \ import admin\nfrom django.urls import path\n\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n]\n```"
