    \ 提供的媒体文件的 URL。\n\n（参考 [https://docs.djangoproject.com/en/3.2/ref/settings/#media-root](https://docs.djangoproject.com/en/3.2/ref/settings/#media-root)\
    \ 了解更多关于设置属性的信息）\n\n当你在 admin 中添加电影（稍后解释）时，你会看到图片存储在 /moviereviews/media/ 文件夹内。\n\
    \n## 提供存储的图片\n\n接下来，要使服务器能够提供存储的图片，我们需要在 /moviereviews/urls.py 中添加：\n\n```\n...\n\
    from django.conf.urls.static import static\nfrom django.conf import settings\n\
