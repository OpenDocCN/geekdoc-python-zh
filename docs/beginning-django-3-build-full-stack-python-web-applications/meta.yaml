- md: "When a request passes through *urls.py*, it will try to match a *path* object\
    \ in *urlpatterns*. For example, if a user enters [http://localhost:8000/admin](http://localhost:8000/admin)\
    \ into the browser, it will match the path ‘admin/’. The server will then respond\
    \ with the Django admin site (fig. 5.1 - we will explore this later).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_29_0.png)\n\
    \nFigure 5.1\n\n*localhost:8000/hello* however returns a 404 not found page because\
    \ there isn't any matching paths.\n\nTo illustrate creating a custom path, let's\
    \ create a path for a home page. Add the below codes in **bold** into *urls.py*:\n\
    \n```python\nfrom django.contrib import admin\nfrom django.urls import path\n\
    from movie import views as movieViews\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('', movieViews.home),\n]\n```\n\n## Code Explanation\n\n```python\n\
    urlpatterns = [\n    path('admin/', admin.site.urls),\n    path('', movieViews.home),\n\
    ]\n```\n\nWe added a new path object with the path ‘’. That is, it matches the\
    \ url ‘localhost:8000/’ for a home page. If there is such a match, we return *movieViews.home*\
    \ which is a function that returns the home page view.\n\n```python\nfrom movie\
    \ import views as movieViews\n```\n\nWhere do we get *movieViews.home* from? We\
    \ import it from */movie/views.py*. Note that it is not **/moviereviews/views.py**.\
    \ The views are stored in the individual apps themselves i.e. */movie*. Because\
    \ we have not defined the *home* function in *views.py*, let's proceed to do so.\n\
    \n/movie/views.py\n\nIn *views.py*, add the following in **bold**:\n\n```python\n\
    from django.shortcuts import render\nfrom django.http import HttpResponse\n\n\
    def home(request):\n    return HttpResponse('<h1>Welcome to Home Page</h1>')\n\
    ```\n\nWe created a function *home* which returns a HTML markup in a *HttpResponse*.\
    \ We imported the built-in *HttpResponse* method to return a response object to\
    \ the user. Save the file and if you go back to [http://localhost:8000](http://localhost:8000),\
    \ you should see the home page displayed (fig. 5.2):\n\n![](img/d19bfdecf695803cf46ee472b3205f51_31_0.png)\n\
    \nFigure 5.2\n\nCongratulations! We have added a new home path ‘localhost:8000/’\
    \ that returns a home page. Now, let's try to create another path for an ‘About’\
    \ page when a user navigates to *localhost:8000/about*.\n\nIn /moviereviews/urls.py,\
    \ add the path in **bold**:\n\n```python\n...\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n    path('', movieViews.home),\n    path('about/', movieViews.about),\n\
    ]\n```\n\nSo if a url matches the ‘about/’ path, it will return the *about* function.\
    \ Let's create the *about* function in /movie/views.py:\n\n```python\n...\ndef\
    \ home(request):\n    return HttpResponse('<h1>Welcome to Home Page</h1>')\n\n\
    def about(request):\n    return HttpResponse('<h1>Welcome to About Page</h1>')\n\
    ```\n\nSave the file and when you navigate to *localhost:8000/about*, it will\
    \ show the About page.\n\nNotice that when we make changes to a file and save\
    \ it, Django watches the file changes and reloads the server with the changes.\
    \ So we don't have to manually restart the server each time there is a code change.\n\
    \nWe now know how to create custom paths and return views. Notice that the *urls.py*\
    \ is located in the project's main folder *moviereviews*. All requests to the\
    \ site will go through *urls.py*. But for views, e.g. Home and About views, they\
    \ are located in the individual app folders e.g. *movie/views.py*. This allows\
    \ us to separate views according to the app they belong to.\n\nSo far, we are\
    \ just returning simple HTML markups. What if we want to return full HTML pages?\
    \ We can return them as what we are doing now. But it will be more ideal if we\
    \ can define the HTML page in a separate file of its own. Let's see how to do\
    \ so in the next chapter.\n\n## Chapter 6: Generating HTML Pages with Templates\n\
    \nEvery web framework needs a way to generate full HTML pages. In Django, we use\
    \ *templates* to serve individual HTML files. In the *movie* folder, create a\
    \ folder called *templates*. Each app should have their own *templates* folder\
    \ (fig. 6.1).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_34_0.png)\n\nIn the\
    \ course of this book, you will see a pattern repeatedly in Django development:\
    \ Templates, Views and URLs. We have already worked with Views and URLs in the\
    \ previous chapter. The order between them doesn't matter, but all three are required\
    \ and work closely together. Let's implement the template and view for *home*.\n\
    \n### Template\n\nIn /movie/templates/, create a new file *home.html*. This will\
    \ be the full HTML page for Home. For now, fill it in with the following:\n\n\
    ```html\n<h1>Welcome to Home Page</h1>\n<h2>This is the full home page</h2>\n\
    ```\n\nAs you can see, the template simply holds the HTML.\n\n### View\n\nBack\
    \ in /movie/views.py, make the following change to the home function:\n\n```python\n\
    from django.shortcuts import render\nfrom django.http import HttpResponse\n\n\
    def home(request):\n    return render(request, 'home.html')\n```\n\nNote we are\
    \ now using *render* instead of *HttpResponse*. And in *render*, we specify *home.html*\
    \ instead. So we can continue to build up the HTML in *home.html*.\n\nAs you can\
    \ see, the view contains the logic or the ‘what’. For now, we don't have much\
    \ logic, but we shall explore views with more logic as we progress.\n\n### URLs\n\
    \nWe have earlier created the URL for our *home* and *about* page in /moviereviews/urls.py:\n\
    \n```python\n...\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('',\
    \ movieViews.home),\n    path('about/', movieViews.about),\n]\n```\n\nThe URLs\
    \ control the route and entry point into a page, such as ‘*about/*’. You will\
    \ see this pattern of Templates, Views, URLs for every Django web page. As we\
    \ repeat this multiple times throughout the book, you will begin to internalize\
    \ it.\n\n### Passing Data into Templates\n\nWhen rendering views, we can also\
    \ pass in data. Add the following in **bold** into `/movie/views.py`:\n\n```python\n\
    ...\ndef home(request):\n    return render(request, 'home.html', {'name':'Greg\
    \ Lim'})\n...\n```\n\nWe pass in a dictionary with key-value pair `{'name':'Greg\
    \ Lim'}` to `home.html`. And in `home.html`, we retrieve the dictionary values\
    \ with:\n\n```html\n<h1>Welcome to Home Page, {{ name }}</h1>\n...\n```\n\n{{\
    \ name }} accesses the ‘name’ key in the dictionary and thus retrieve the value\
    \ ‘Greg Lim’. So if you run the site now and go to home, you should see:\n\n![](img/d19bfdecf695803cf46ee472b3205f51_37_0.png)\n\
    \nDjango provide template tags e.g. {{ ... }}, {%.. %} to help render HTML. You\
    \ can see the full list of built-in template tags in the official docs: (https://docs.djangoproject.com/en/3.2/ref/templates/builtins/)\n\
    \nWe will introduce more template tags and their usage as we progress along.\n\
    \n## Chapter 7: Adding Bootstrap To Our Site\n\nBefore we go any further, let's\
    \ add bootstrap to our site. Bootstrap helps make our site look good without worrying\
    \ about the necessary HTML/CSS to create a beautiful site. Bootstrap is the most\
    \ popular framework for building responsive and mobile friendly websites. Instead\
    \ of writing our own CSS and JavaScript, we can choose which Bootstrap component\
    \ we want to use, e.g. a navigation bar, button, alert, list, card etc and simply\
    \ copy and paste its markup into our template.\n\nGo to *getbootstrap.com* and\
    \ go to ‘Getting Started’ (fig. 7.1).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_40_0.png)\n\
    \nFigure 7.1\n\nCopy the stylesheet link (fig. 7.2) into the <head> of *home.html*\
    \ to load the Bootstrap CSS.\n\n![](img/d19bfdecf695803cf46ee472b3205f51_40_1.png)\n\
    \nFigure 7.2\n\n*home.html* will look something like:\n\n```html\n<head>\n  <link\n\
    \    href=\"https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css\"\
    \n    rel=\"stylesheet\" crossorigin=\"anonymous\">\n</head>\n<h1>Welcome to Home\
    \ Page, {{ name }}</h1>\n<h2>This is the full home page</h2>\n```\n\nYou can immediately\
    \ see the styling applied if you go to localhost:8000 (fig. 7.3):\n\nWelcome to\
    \ Home Page, Greg Lim\nThis is the full home page\n\n### Figure 7.3\n\nTo improve\
    \ the padding of the site, let's wrap *home.html* in a *div* container:\n\n```html\n\
    <head>\n...\n</head>\n<div class=\"container\">\n  <h1>Welcome to Home Page, {{\
    \ name }}</h1>\n  <h2>This is the full home page</h2>\n</div>\n```\n\nThere are\
    \ many other Bootstrap components we will use and add to our site. In the next\
    \ chapter, we will use a Form from Bootstrap!"
  mdcn: "当一个请求经过 *urls.py* 时，它会尝试在 *urlpatterns* 中匹配一个 *path* 对象。例如，如果用户在浏览器中输入 [http://localhost:8000/admin](http://localhost:8000/admin)，它将匹配路径\
    \ 'admin/'。然后服务器将响应 Django 管理站点（图 5.1 - 我们稍后将探讨这个）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_29_0.png)\n\
    \n图 5.1\n\n然而，*localhost:8000/hello* 会返回一个 404 未找到页面，因为没有任何匹配的路径。\n\n为了说明如何创建自定义路径，让我们为一个主页创建一个路径。将下面**加粗**的代码添加到\
    \ *urls.py* 中：\n\n```python\nfrom django.contrib import admin\nfrom django.urls\
    \ import path\nfrom movie import views as movieViews\n\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n    path('', movieViews.home),\n]\n```\n\n## 代码解释\n\n```python\n\
    urlpatterns = [\n    path('admin/', admin.site.urls),\n    path('', movieViews.home),\n\
    ]\n```\n\n我们添加了一个新的 path 对象，其路径为 ''。也就是说，它匹配主页的 url 'localhost:8000/'。如果存在这样的匹配，我们将返回\
    \ *movieViews.home*，这是一个返回主页视图的函数。\n\n```python\nfrom movie import views as movieViews\n\
    ```\n\n我们从哪里获取 *movieViews.home*？我们从 */movie/views.py* 导入它。请注意，它不是 **/moviereviews/views.py**。视图存储在各个应用本身中，即\
    \ */movie*。由于我们尚未在 *views.py* 中定义 *home* 函数，让我们继续这样做。\n\n/movie/views.py\n\n在\
    \ *views.py* 中，添加以下**加粗**内容：\n\n```python\nfrom django.shortcuts import render\n\
    from django.http import HttpResponse\n\ndef home(request):\n    return HttpResponse('<h1>Welcome\
    \ to Home Page</h1>')\n```\n\n我们创建了一个函数 *home*，它在 *HttpResponse* 中返回 HTML 标记。我们导入了内置的\
    \ *HttpResponse* 方法来向用户返回响应对象。保存文件，如果你返回 [http://localhost:8000](http://localhost:8000)，你应该会看到主页显示（图\
    \ 5.2）：\n\n![](img/d19bfdecf695803cf46ee472b3205f51_31_0.png)\n\n图 5.2\n\n恭喜！我们添加了一个新的主页路径\
    \ 'localhost:8000/'，它返回一个主页。现在，让我们尝试为用户导航到 *localhost:8000/about* 时创建一个 'About'\
    \ 页面的另一个路径。\n\n在 /moviereviews/urls.py 中，添加**加粗**的路径：\n\n```python\n...\nurlpatterns\
    \ = [\n    path('admin/', admin.site.urls),\n    path('', movieViews.home),\n\
    \    path('about/', movieViews.about),\n]\n```\n\n因此，如果一个 url 匹配 'about/' 路径，它将返回\
    \ *about* 函数。让我们在 /movie/views.py 中创建 *about* 函数：\n\n```python\n...\ndef home(request):\n\
    \    return HttpResponse('<h1>Welcome to Home Page</h1>')\n\ndef about(request):\n\
    \    return HttpResponse('<h1>Welcome to About Page</h1>')\n```\n\n保存文件，当你导航到\
    \ *localhost:8000/about* 时，它将显示 About 页面。\n\n请注意，当我们对文件进行更改并保存时，Django 会监视文件更改并使用更改重新加载服务器。因此，每次代码更改时，我们不必手动重启服务器。\n\
    \n我们现在知道如何创建自定义路径并返回视图。请注意，*urls.py* 位于项目的主文件夹 *moviereviews* 中。所有对站点的请求都将通过 *urls.py*。但对于视图，例如主页和关于页面视图，它们位于各个应用文件夹中，例如\
    \ *movie/views.py*。这允许我们根据视图所属的应用来分离视图。\n\n到目前为止，我们只是返回简单的 HTML 标记。如果我们想返回完整的\
    \ HTML 页面怎么办？我们可以像现在这样返回它们。但如果我们能在单独的文件中定义 HTML 页面，那将更理想。让我们看看如何在下一章中这样做。\n\n\
    ## 第 6 章：使用模板生成 HTML 页面\n\n每个 Web 框架都需要一种生成完整 HTML 页面的方法。在 Django 中，我们使用 *templates*\
    \ 来提供单个 HTML 文件。在 *movie* 文件夹中，创建一个名为 *templates* 的文件夹。每个应用都应该有自己的 *templates*\
    \ 文件夹（图 6.1）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_34_0.png)\n\n在本书的过程中，你将在\
    \ Django 开发中反复看到一个模式：模板、视图和 URL。我们在上一章已经处理过视图和 URL。它们之间的顺序并不重要，但三者都是必需的，并且紧密协作。让我们为\
    \ *home* 实现模板和视图。\n\n### 模板\n\n在 /movie/templates/ 中，创建一个新文件 *home.html*。这将是主页的完整\
    \ HTML 页面。现在，用以下内容填充它：\n\n```html\n<h1>Welcome to Home Page</h1>\n<h2>This is\
    \ the full home page</h2>\n```\n\n如你所见，模板只是保存 HTML。\n\n### 视图\n\n回到 /movie/views.py，对\
    \ home 函数进行以下更改：\n\n```python\nfrom django.shortcuts import render\nfrom django.http\
    \ import HttpResponse\n\ndef home(request):\n    return render(request, 'home.html')\n\
    ```\n\n注意我们现在使用 *render* 而不是 *HttpResponse*。并且在 *render* 中，我们指定了 *home.html*。因此我们可以继续在\
    \ *home.html* 中构建 HTML。\n\n如你所见，视图包含逻辑或“做什么”。目前，我们没有太多逻辑，但随着我们的进展，我们将探索具有更多逻辑的视图。\n\
    \n### URL\n\n我们之前在 /moviereviews/urls.py 中为我们的 *home* 和 *about* 页面创建了 URL：\n\n\
    ```python\n...\nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('',\
    \ movieViews.home),\n    path('about/', movieViews.about),\n]\n```\n\nURL 控制进入页面的路由和入口点，例如\
    \ '*about/*'。你将看到每个 Django 网页都有这种模板、视图、URL 的模式。随着我们在本书中多次重复这一点，你将开始内化它。\n\n###\
    \ 将数据传递到模板\n\n在渲染视图时，我们也可以传入数据。将以下**加粗**内容添加到 `/movie/views.py`：\n\n```python\n\
    ...\ndef home(request):\n    return render(request, 'home.html', {'name':'Greg\
    \ Lim'})\n...\n```\n\n我们传入一个包含键值对 `{'name':'Greg Lim'}` 的字典到 `home.html`。并且在 `home.html`\
    \ 中，我们使用以下方式检索字典值：\n\n```html\n<h1>Welcome to Home Page, {{ name }}</h1>\n...\n\
    ```\n\n{{ name }} 访问字典中的 'name' 键，从而检索值 'Greg Lim'。因此，如果你现在运行站点并转到主页，你应该会看到：\n\
    \n![](img/d19bfdecf695803cf46ee472b3205f51_37_0.png)\n\nDjango 提供模板标签，例如 {{ ...\
    \ }}, {%.. %} 来帮助渲染 HTML。你可以在官方文档中查看内置模板标签的完整列表：(https://docs.djangoproject.com/en/3.2/ref/templates/builtins/)\n\
    \n随着我们的进展，我们将介绍更多的模板标签及其用法。\n\n## 第 7 章：为我们的网站添加 Bootstrap\n\n在我们继续之前，让我们为我们的网站添加\
    \ bootstrap。Bootstrap 有助于使我们的网站看起来不错，而无需担心创建漂亮网站所需的必要 HTML/CSS。Bootstrap 是构建响应式和移动友好网站的最流行框架。我们可以选择想要使用的\
    \ Bootstrap 组件，例如导航栏、按钮、警报、列表、卡片等，而不是编写自己的 CSS 和 JavaScript，只需将其标记复制并粘贴到我们的模板中。\n\
