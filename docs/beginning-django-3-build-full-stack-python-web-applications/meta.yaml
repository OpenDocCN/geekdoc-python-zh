    \ in **bold**:\n\n```\ndef detail(request, movie_id):\n    movie = get_object_or_404(Movie,\
    \ pk=movie_id)\n    **reviews = Review.objects.filter(movie=movie)**\n    return\
    \ render(request, 'detail.html',\n                 {'movie': movie, '**reviews**':\
    \ reviews})\n```\n\n## Code Explanation\n\n```\nreviews = Review.objects.filter(movie=movie)\n\
    ```\n\nUsing the *filter* function, we retrieve reviews for a particular movie\
    \ only.\n\n```\nreturn render(request, 'detail.html',\n    {'movie': movie, 'reviews':\
    \ reviews})\n```\n\nWe then pass in *reviews* to *detail.html*.\n\n*/movie/templates/detail.html*\n\
    \nWe list the reviews under the Movie’s card component by adding the section in\
    \ **bold**:\n\n```\n...\n<div class=\"card-body\">\n    <h5 class=\"card-title\"\
    >{{ movie.title }}</h5>\n    <p class=\"card-text\">{{ movie.description }}</p>\n\
    \    <p class=\"card-text\">\n        ...\n    </p>\n    <hr />\n    <h3>Reviews</h3>\n\
    \    <ul class=\"list-group\">\n        {% for review in reviews %}\n        <li\
    \ class=\"list-group-item pb-3 pt-3\">\n            <h5 class=\"card-title\">\n\
    \                Review by {{ review.user.username }}\n            </h5>\n   \
