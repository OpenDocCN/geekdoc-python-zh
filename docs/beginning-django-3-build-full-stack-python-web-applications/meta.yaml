    \ admin 路径，因此请确保你的密码足够安全。\n\n如果你希望稍后更改密码，可以运行命令：\n\n```\npython3 manage.py changepassword\
    \ <username>\n```\n\n使用你刚刚创建的用户名登录 admin（图 10.2）。\n\n在“用户”下，你将看到刚刚创建的用户（图 10.3）。你可以在此为你的团队添加额外的用户账户。\n\
