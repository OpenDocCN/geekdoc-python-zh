    \  <li class=\"list-group-item pb-3 pt-3\">\n    ...\n  </li>\n  {% endfor %}\n\
    </ul>\n```\n\n使用 `*for 循环*`，我们为每条评论渲染一个 Bootstrap 列表组项组件（[https://getbootstrap.com/docs/5.1/components/list-group/](https://getbootstrap.com/docs/5.1/components/list-group/)）。\n\
    \n```\n<h5 class=\"card-title\">\n  Review by {{ review.user.username }}\n</h5>\n\
    <h6 class=\"card-subtitle mb-2 text-muted\">\n  {{ review.date }}\n</h6>\n<p class=\"\
    card-text\">{{ review.text }}</p>\n```\n\n我们渲染用户名、评论日期和评论文本。\n\n```\n{% if user.is_authenticated\
    \ and user == review.user %}\n    <a class=\"btn btn-primary me-2\" href=\"#\"\
    >Update</a>\n    <a class=\"btn btn-danger\" href=\"#\">Delete</a>\n{% endif %}\n\
    ```\n\n我们还检查用户是否已登录，以及评论是否属于该用户，如果是，则渲染更新和删除链接，允许她更新/删除评论。否则，我们隐藏更新/删除链接，即用户只能更新/删除自己发布的评论。他们无法对其他人的评论执行此操作。\n\
    \n## 运行你的应用\n\n在电影详情页面，你现在将能够看到一部电影的评论。如果你已登录，你可以看到你发布的评论的更新和删除按钮（图25.2）。\n\n\
    ![](img/d19bfdecf695803cf46ee472b3205f51_159_0.png)\n\n图25.2\n\n当你登出时，你就看不到它们了。在接下来的几章中，我们将继续实现\
    \ `*updatereview*` 和 `*deletereview*` 函数。\n\n## 第26章：更新评论\n\n我们在 `/movie/urls.py`\
    \ 中创建一个用于更新评论的 URL 路径：\n\n```\n...\n\nurlpatterns = [\n    path('<int:movie_id>',\
    \ views.detail, name='detail'),\n    path('<int:movie_id>/create', views.createreview,\
    \ name='createreview'),\n    path('review/<int:review_id>', views.updatereview,\
