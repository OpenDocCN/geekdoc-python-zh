- img_proc: true
  md: '# Virtual Environments


    Virtual environments are used to create separate development environments for
    different projects with different requirements. For example, you can specify which
    version of Python and which libraries/modules you want installed in a particular
    virtual environment.


    As an example, to create a virtual environment in the PythonAnywhere bash, we
    run:


    ```

    mkvirtualenv -p python3.8 <environment name>

    ```


    In the above, we have specified that we use Python 3.8 in the virtualenv. Whatever
    packages we install will always be there and independent of other virtualenvs.


    If I ran:


    ```

    mkvirtualenv -p python3.8 moviereviewsenv

    ```


    I will see the name of the virtualenv in the Bash which means we are in the VE
    eg:


    ```

    (moviereviewsenv) 00:08 ~ $

    ```'
  merge: -1
