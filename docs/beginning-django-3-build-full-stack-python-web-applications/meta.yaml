- md: "## CHAPTER 21: LOGOUT\n\nCreate the logout path in /accounts/urls.py:\n\n```\n\
    ...\nurlpatterns = [\n    path('signupaccount/', views.signupaccount,\n      \
    \   name='signupaccount'),\n    path('logout/', views.logoutaccount,\n       \
    \  name='logoutaccount'),\n]\n```\n\nAnd in /accounts/views.py, implement the\
    \ logoutaccount function,\n\n```\n...\nfrom django.contrib.auth.models import\
    \ User\nfrom django.contrib.auth import login, logout\n...\n\ndef logoutaccount(request):\n\
    \    logout(request)\n    return redirect('home')\n```\n\nWe simply call logout\
    \ and redirect back to the home page.\n\nWe then need to have the `<a href>` in\
    \ the logout button call the logout path. We also have the signup button call\
    \ the signupaccount path. So in *base.html*, add in **bold**:\n\n```\n...\n<nav\
    \ class=\"navbar navbar-expand-lg navbar-light bg-light mb-3\">\n    ...\n   \
    \ <div class=\"collapse navbar-collapse\" id=\"navbarNavAltMarkup\">\n       \
    \ <div class=\"navbar-nav ms-auto\">\n            <a class=\"nav-link\" href=\"\
    {% url 'news' %}\">News</a>\n            {% if user.is_authenticated %}\n    \
    \            <a class=\"nav-link\" href=\"{% url 'logoutaccount' %}\">\n     \
    \               Logout ({{ user.username }})\n                </a>\n         \
    \   {% else %}\n                <a class=\"nav-link\" href=\"#\">Login</a>\n \
    \               <a class=\"nav-link\" href=\"{% url 'signupaccount' %}\">\n  \
    \                  Sign Up\n                </a>\n            {% endif %}\n  \
    \      </div>\n    </div>\n...\n```\n\nWhen you are logged in, you can now log\
    \ out by clicking on the logout button.\n\n## CHAPTER 22: LOG IN\n\nHaving implemented\
    \ sign up and log out, let’s now implement log in. Create a login path in *accounts/urls.py*,\n\
    \n```\n...\nurlpatterns = [\n    path('signupaccount/', views.signupaccount,\n\
    \         name='signupaccount'),\n    path('logout/', views.logoutaccount,\n \
    \        name='logoutaccount'),\n    path('login/', views.loginaccount,\n    \
    \     name='loginaccount'),\n]\n```\n\nAnd in */accounts/views.py*, implement\
    \ *loginaccount* with:\n\n```\n...\nfrom django.contrib.auth.models import User\n\
    from django.contrib.auth.forms import AuthenticationForm\nfrom django.contrib.auth\
    \ import login, logout, authenticate\n...\n\ndef loginaccount(request):\n    if\
    \ request.method == 'GET':\n        return render(request, 'loginaccount.html',\n\
    \                      {'form':AuthenticationForm})\n    else:\n        user =\
    \ authenticate(request,\n            username=request.POST['username'],\n    \
    \        password=request.POST['password'])\n        if user is None:\n      \
    \      return render(request,'loginaccount.html',\n                {'form': AuthenticationForm(),\n\
    \                 'error': 'username and password do not match'})\n        else:\n\
    \            login(request,user)\n            return redirect('home')\n```\n\n\
    ### Code Explanation\n\n```\ndef loginaccount(request):\n    if request.method\
    \ == 'GET':\n        return render(request, 'loginaccount.html',\n           \
    \ {'form':AuthenticationForm})\n```\n\n*loginaccount* will be similar to *signupaccount*.\
    \ We first handle the case where the request is a GET request, i.e. the user clicks\
    \ on *Login* on the navbar, and we render *loginaccount.html*. We then pass in\
    \ the *AuthenticationForm*. Much like the *UserCreationForm* for signup, Django\
    \ provides the *AuthenticationForm* to quickly get a login form up and running.\n\
    \n```\nelse:\n    user = authenticate(request,\n        username=request.POST['username'],\n\
    \        password=request.POST['password'])\n    if user is None:\n        return\
    \ render(request,'loginaccount.html',\n            {'form': AuthenticationForm(),\n\
    \             'error': 'username and password do not match'})\n    else:\n   \
    \     login(request,user)\n        return redirect('home')\n```\n\nIf the request\
    \ type is not GET (user submits the login form and sends a POST request), we proceed\
    \ to authenticate the user with the values he entered in the username and password\
    \ fields. If the user returned from *authenticate* is *None*, i.e. we are unable\
    \ to find an existing user with the supplied username/password, we return the\
    \ user to *loginaccount.html* with the error ‘username and password do not match’\
    \ (fig. 22.1).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_138_0.png)\n\nFigure\
    \ 22.1\n\nElse, it means the authentication is successful and we log in the user\
    \ and redirect her to the home page.\n\n### /accounts/templates/loginaccount.html\n\
    \nCreate the new file accounts/templates/loginaccount.html, and copy the markup\
    \ from accounts/templates/signupaccount.html and change the labeling from ‘Sign\
    \ Up’ to ‘Login’:\n\n```\n{% extends 'base.html' %}\n{% block content %}\n<div\
    \ class=\"card mb-3\">\n  <div class=\"row g-0\">\n    <div>\n      <div class=\"\
    card-body\">\n        <h5 class=\"card-title\">Login</h5>\n        {% if error\
    \ %}\n        <div class=\"alert alert-danger mt-3\" role=\"alert\">\n       \
    \   {{ error }}\n        </div>\n        {% endif %}\n        <p class=\"card-text\"\
    >\n          <form method=\"POST\">\n            {% csrf_token %}\n          \
    \  {{ form.as_p }}\n            <button type=\"submit\" class=\"btn btn-primary\"\
    >Login</button>\n          </form>\n        </p>\n      </div>\n    </div>\n \
    \ </div>\n</div>\n{% endblock content %}\n```\n\nFinally, in *base.html*, we set\
    \ the *href* for *loginaccount*:\n\n```\n...\n    {% if user.is_authenticated\
    \ %}\n        <a class=\"nav-link\" href=\"{% url 'logoutaccount' %}\">\n    \
    \        Logout ({{ user.username }})\n        </a>\n    {% else %}\n        <a\
    \ class=\"nav-link\" href=\"{% url 'loginaccount' %}\">Login</a>\n        <a class=\"\
    nav-link\" href=\"{% url 'signupaccount' %}\">\n            Sign Up\n        </a>\n\
    \    {% endif %}\n...\n```\n\nOur navbar is now complete and fully functioning.\
    \ For users not logged in, the navbar will show the login and sign up links. When\
    \ a user logs in, the navbar will show only the logout button. In the next chapter,\
    \ we will implement letting logged-in users post reviews for movies.\n\n## CHAPTER\
    \ 23: LETTING USERS POST MOVIE REVIEWS\n\nWe will now implement letting logged-in\
    \ users post reviews for movies. We have to first create a Review model.\n\nIn\
    \ *movie/models.py*, add the following to define a Review model:\n\n```\nfrom\
    \ django.db import models\nfrom django.contrib.auth.models import User\n...\n\n\
    class Review(models.Model):\n    text = models.CharField(max_length=100)\n   \
    \ date = models.DateTimeField(auto_now_add=True)\n    user = models.ForeignKey(User,\
    \ on_delete=models.CASCADE)\n    movie = models.ForeignKey(Movie, on_delete=models.CASCADE)\n\
    \    watchAgain = models.BooleanField()\n\n    def __str__(self):\n        return\
    \ self.text\n```\n\n### Code Explanation\n\n```\ntext = models.CharField(max_length=100)\n\
    ```\n\nThe text field stores the review text.\n\n```\ndate = models.DateTimeField(auto_now_add=True)\n\
    ```\n\nFor review date, we specify `auto_now_add=True`. That is, when someone\
    \ creates this object, the current datetime will be automatically filled in. Note\
    \ that this makes the field non-editable. Once the datetime is set, it is fixed.\n\
    \n```\nuser = models.ForeignKey(User, on_delete=models.CASCADE)\nmovie = models.ForeignKey(Movie,\
    \ on_delete=models.CASCADE)\n```\n\nFor the user and movie field, we are using\
    \ a ForeignKey which allows for a many-to-one relationship. This means that a\
    \ user can create multiple reviews. A movie similarly can have multiple reviews.\
    \ For user, the reference is to the built-in User model that Django provides for\
    \ authentication. For all many-to-one relationships such as a ForeignKey, we must\
    \ also specify an `on_delete` option. That is, when you remove a user or movie\
    \ for instance, its associated reviews will be deleted as well. Note that this\
    \ does not apply the other direction i.e. when you remove a review, the associated\
    \ movie and user still remains.\n\n```\nwatchAgain = models.BooleanField()\n```\n\
    \nLastly, we have a boolean property *watchAgain* for users to indicate if they\
    \ will watch the movie again.\n\n### Registering to Admin\n\nTo have our Review\
    \ model appear in the admin dashboard, remember that we have to register it by\
    \ adding the following in **bold** into /movie/admin.py:\n\n```\nfrom django.contrib\
    \ import admin\nfrom .models import Movie, Review\n\nadmin.site.register(Movie)\n\
    admin.site.register(Review)\n```\n\nIn Terminal, make the migration for the new\
    \ model with:\n\n```\npython3 manage.py makemigrations\n```"
  mdcn: "## 第21章：登出\n\n在 `/accounts/urls.py` 中创建登出路径：\n\n```\n...\nurlpatterns = [\n\
    \    path('signupaccount/', views.signupaccount,\n         name='signupaccount'),\n\
    \    path('logout/', views.logoutaccount,\n         name='logoutaccount'),\n]\n\
    ```\n\n然后在 `/accounts/views.py` 中实现 `logoutaccount` 函数：\n\n```\n...\nfrom django.contrib.auth.models\
    \ import User\nfrom django.contrib.auth import login, logout\n...\n\ndef logoutaccount(request):\n\
    \    logout(request)\n    return redirect('home')\n```\n\n我们只需调用 `logout` 并重定向回主页。\n\
    \n接下来，我们需要让登出按钮中的 `<a href>` 调用登出路径。同时，让注册按钮调用注册路径。因此，在 *base.html* 中，添加**加粗**部分：\n\
    \n```\n...\n<nav class=\"navbar navbar-expand-lg navbar-light bg-light mb-3\"\
    >\n    ...\n    <div class=\"collapse navbar-collapse\" id=\"navbarNavAltMarkup\"\
    >\n        <div class=\"navbar-nav ms-auto\">\n            <a class=\"nav-link\"\
    \ href=\"{% url 'news' %}\">News</a>\n            {% if user.is_authenticated\
    \ %}\n                <a class=\"nav-link\" href=\"{% url 'logoutaccount' %}\"\
    >\n                    Logout ({{ user.username }})\n                </a>\n  \
    \          {% else %}\n                <a class=\"nav-link\" href=\"#\">Login</a>\n\
    \                <a class=\"nav-link\" href=\"{% url 'signupaccount' %}\">\n \
    \                   Sign Up\n                </a>\n            {% endif %}\n \
    \       </div>\n    </div>\n...\n```\n\n当你登录后，现在可以通过点击登出按钮来登出。\n\n## 第22章：登录\n\
    \n在实现了注册和登出之后，我们现在来实现登录。在 *accounts/urls.py* 中创建登录路径：\n\n```\n...\nurlpatterns\
    \ = [\n    path('signupaccount/', views.signupaccount,\n         name='signupaccount'),\n\
    \    path('logout/', views.logoutaccount,\n         name='logoutaccount'),\n \
    \   path('login/', views.loginaccount,\n         name='loginaccount'),\n]\n```\n\
    \n然后在 */accounts/views.py* 中，实现 *loginaccount*：\n\n```\n...\nfrom django.contrib.auth.models\
    \ import User\nfrom django.contrib.auth.forms import AuthenticationForm\nfrom\
    \ django.contrib.auth import login, logout, authenticate\n...\n\ndef loginaccount(request):\n\
    \    if request.method == 'GET':\n        return render(request, 'loginaccount.html',\n\
    \                      {'form':AuthenticationForm})\n    else:\n        user =\
    \ authenticate(request,\n            username=request.POST['username'],\n    \
    \        password=request.POST['password'])\n        if user is None:\n      \
    \      return render(request,'loginaccount.html',\n                {'form': AuthenticationForm(),\n\
    \                 'error': 'username and password do not match'})\n        else:\n\
    \            login(request,user)\n            return redirect('home')\n```\n\n\
    ### 代码解释\n\n```\ndef loginaccount(request):\n    if request.method == 'GET':\n\
    \        return render(request, 'loginaccount.html',\n            {'form':AuthenticationForm})\n\
    ```\n\n*loginaccount* 与 *signupaccount* 类似。我们首先处理请求为 GET 请求的情况，即用户点击导航栏上的 *Login*，然后我们渲染\
    \ *loginaccount.html*。接着传入 *AuthenticationForm*。就像注册用的 *UserCreationForm* 一样，Django\
    \ 提供了 *AuthenticationForm* 来快速搭建登录表单。\n\n```\nelse:\n    user = authenticate(request,\n\
    \        username=request.POST['username'],\n        password=request.POST['password'])\n\
    \    if user is None:\n        return render(request,'loginaccount.html',\n  \
    \          {'form': AuthenticationForm(),\n             'error': 'username and\
    \ password do not match'})\n    else:\n        login(request,user)\n        return\
    \ redirect('home')\n```\n\n如果请求类型不是 GET（用户提交登录表单并发送 POST 请求），我们继续使用用户在用户名和密码字段中输入的值来认证用户。如果\
    \ *authenticate* 返回的用户是 *None*，即我们无法找到与提供的用户名/密码匹配的现有用户，我们将用户返回到 *loginaccount.html*，并显示错误信息“用户名和密码不匹配”（图\
    \ 22.1）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_138_0.png)\n\n图 22.1\n\n\
    否则，意味着认证成功，我们登录用户并将其重定向到主页。\n\n### /accounts/templates/loginaccount.html\n\n创建新文件\
    \ `accounts/templates/loginaccount.html`，并从 `accounts/templates/signupaccount.html`\
    \ 复制标记，将标签从“Sign Up”改为“Login”：\n\n```\n{% extends 'base.html' %}\n{% block content\
    \ %}\n<div class=\"card mb-3\">\n  <div class=\"row g-0\">\n    <div>\n      <div\
    \ class=\"card-body\">\n        <h5 class=\"card-title\">Login</h5>\n        {%\
    \ if error %}\n        <div class=\"alert alert-danger mt-3\" role=\"alert\">\n\
    \          {{ error }}\n        </div>\n        {% endif %}\n        <p class=\"\
    card-text\">\n          <form method=\"POST\">\n            {% csrf_token %}\n\
    \            {{ form.as_p }}\n            <button type=\"submit\" class=\"btn\
    \ btn-primary\">Login</button>\n          </form>\n        </p>\n      </div>\n\
    \    </div>\n  </div>\n</div>\n{% endblock content %}\n```\n\n最后，在 *base.html*\
    \ 中，我们为 *loginaccount* 设置 *href*：\n\n```\n...\n    {% if user.is_authenticated\
    \ %}\n        <a class=\"nav-link\" href=\"{% url 'logoutaccount' %}\">\n    \
    \        Logout ({{ user.username }})\n        </a>\n    {% else %}\n        <a\
    \ class=\"nav-link\" href=\"{% url 'loginaccount' %}\">Login</a>\n        <a class=\"\
    nav-link\" href=\"{% url 'signupaccount' %}\">\n            Sign Up\n        </a>\n\
    \    {% endif %}\n...\n```\n\n我们的导航栏现在完整且功能齐全。对于未登录的用户，导航栏将显示登录和注册链接。当用户登录后，导航栏将只显示登出按钮。在下一章中，我们将实现让登录用户发布电影评论。\n\
    \n## 第23章：允许用户发布电影评论\n\n我们现在将实现让登录用户发布电影评论。我们首先需要创建一个 Review 模型。\n\n在 *movie/models.py*\
    \ 中，添加以下内容来定义 Review 模型：\n\n```\nfrom django.db import models\nfrom django.contrib.auth.models\
    \ import User\n...\n\nclass Review(models.Model):\n    text = models.CharField(max_length=100)\n\
    \    date = models.DateTimeField(auto_now_add=True)\n    user = models.ForeignKey(User,\
    \ on_delete=models.CASCADE)\n    movie = models.ForeignKey(Movie, on_delete=models.CASCADE)\n\
    \    watchAgain = models.BooleanField()\n\n    def __str__(self):\n        return\
    \ self.text\n```\n\n### 代码解释\n\n```\ntext = models.CharField(max_length=100)\n\
    ```\n\n`text` 字段存储评论文本。\n\n```\ndate = models.DateTimeField(auto_now_add=True)\n\
    ```\n\n对于评论日期，我们指定 `auto_now_add=True`。也就是说，当有人创建此对象时，当前日期时间将自动填充。注意，这使得该字段不可编辑。一旦日期时间设置，它就是固定的。\n\
    \n```\nuser = models.ForeignKey(User, on_delete=models.CASCADE)\nmovie = models.ForeignKey(Movie,\
    \ on_delete=models.CASCADE)\n```\n\n对于 `user` 和 `movie` 字段，我们使用 `ForeignKey`，它允许多对一关系。这意味着一个用户可以创建多个评论。同样，一部电影也可以有多个评论。对于\
    \ `user`，引用的是 Django 提供的用于身份验证的内置 `User` 模型。对于所有多对一关系（如 `ForeignKey`），我们还必须指定\
    \ `on_delete` 选项。也就是说，例如，当你删除一个用户或电影时，其关联的评论也将被删除。注意，这不适用于反向情况，即当你删除一个评论时，关联的电影和用户仍然存在。\n\
    \n```\nwatchAgain = models.BooleanField()\n```\n\n最后，我们有一个布尔属性 *watchAgain*，供用户表示他们是否会再次观看这部电影。\n\
    \n### 注册到管理后台\n\n为了让我们的 Review 模型出现在管理后台中，记住我们必须通过在 /movie/admin.py 中添加以下**加粗**部分来注册它：\n\
    \n```\nfrom django.contrib import admin\nfrom .models import Movie, Review\n\n\
    admin.site.register(Movie)\nadmin.site.register(Review)\n```\n\n在终端中，使用以下命令为新模型创建迁移：\n\
    \n```\npython3 manage.py makemigrations\n```"
