  md: 'DJANGO_SETTINGS_MODULE and save the file.


    # Exiting and Entering a Virtualenv


    At any point you want to get out of the virtualenv, run ‘ deactivate ’ in the
    Bash. To get back in to a virtualenv, run: workon <virtualenv name>


    If you forgot the name of a virtualenv, you can see the list of virtualenvs you
    have by going to the .virtualenvs folder:


    ```

    cd .virtualenvs

    ls

    ```


    You can then see the list of virtualenvs.


    # Allowed Hosts


    Next, we need to add to the allowed hosts in settings.py. Go to the ‘ Files ’
    tab, navigate through the source code directory, and in settings.py, add:


    ```

    ALLOWED_HOSTS = [''*'']

    ```


    Save the file. Then go to the ‘ Web ’ tab and'
