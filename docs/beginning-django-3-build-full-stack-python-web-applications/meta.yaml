    \                      {'form':UserCreationForm})\n    else:\n        ...\n```\n\
    \n在 *def signupaccount* 中，我们首先检查收到的请求是 GET 还是 POST 请求。如果是 GET 请求，意味着用户通过 URL *localhost:8000/accounts/signupaccount*\
    \ 导航到注册表单，在这种情况下，我们只需将他们连同表单一起发送到 *signupaccount.html*。\n\n但如果是 POST 请求，意味着这是一个提交表单以创建新用户的请求。我们进入\
    \ *else* 代码块来创建新用户。\n\n```\nelse:\n    if request.POST['password1'] ==\n     \
