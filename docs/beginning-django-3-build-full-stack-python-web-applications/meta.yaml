    \ It is thus important that after we update a model, we need to run *migrate*.\n\
    \nEssentially, whenever we create a new model or make changes to it in *models.py*,\
    \ we need to update Django in a two-step process. First, we create a migration\
    \ file with the *makemigrations* command:\n\n```\npython3 manage.py makemigrations\n\
