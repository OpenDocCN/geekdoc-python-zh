    \ and back in bash console (inside the virtualenv), run:\n\n```\npython manage.py\
    \ collectstatic\n```\n\nThis command collects all your static files from each\
    \ of your app folders (including the static files for the admin app) and from\
    \ any other folders you specify in *settings.py* and copies them into STATIC_ROOT.\
    \ You need to re-run this command whenever you want to publish new versions of\
    \ your static files.\n\n## Set up static files mapping\n\nNext, set up a static\
    \ files mapping to get our web servers to serve out your static files for you.\n\
    \nIn the *Web* tab on the PythonAnywhere dashboard, under ‘ Static Files ’, enter\
    \ the same URL as STATIC_URL in the url section (typically, /static/)\n\nEnter\
    \ the path from STATIC_ROOT into the path section (fig. 29.10 - the full path,\
    \ including /home/username/etc)\n\n| URL | Directory |\n|---|---|\n| /static/\
    \ | /home/greglim/djangomovieviews/static |\n\n### Figure 29.10\n\nThen hit Reload\
    \ and your static images should appear in your site now.\n\n## Set up media files\
    \ mapping\n\nSet up a similar static files mapping from MEDIA_URL to MEDIA_ROOT\
    \ (fig. 29.11).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_188_0.png)\n\n###\
    \ Figure 29.11\n\nHit Reload and your media images should appear in your site\
    \ now (fig. 29.12).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_188_1.png)\n\n\
    ### Figure 29.12\n\n## Set Debug to False\n\nFor local development, we have set\
    \ DEBUG=True. This shows us the detailed error description and from which line\
    \ of code it is resulting from. We should however hide these in production (we\
    \ don't want to expose all our secrets out in the open) by setting DEBUG=False.\n\
    \nThus, in the PythonAnywhere dashboard, go your project's *settings.py* and set\
    \ DEBUG = False.\n\n## createsuperuser\n\nRemember to create a superuser in your\
    \ production environment (just as we did in our development environment) and keep\
    \ the password secure.\n\n## .gitignore\n\nWe can ignore some files when uploading\
    \ to GitHub. For e.g. the __pycache__ directory which are created automatically\
    \ when Django runs .py files. We should also ignore the db.sqlite3 file as it\
    \ might be accidentally pushed to production. And if you are using a Mac, we can\
    \ ignore *.DS_Store* which stores information about folder settings on MacOS.\n\
    \nSo the final *.gitignore* will look like:\n\n```\n__pycache__/\ndb.sqlite3\n\
    .DS_Store\n```\n\n## Change *db.sqlite3* to MySQL or PostgreSQL\n\nOur current\
    \ database is set to SQLite which works fine for small projects. But when the\
    \ project or the data size grows, we want to switch to other databases like MySQL\
    \ or PostgreSQL.\n\nPythonAnywhere allows usage of MySQL free. But for PostgreSQL,\
    \ you will need to have a paid account.\n\nTo start using MySQL, you can refer\
    \ to PythonAnywhere's brief and useful documentation (https://help.pythonanywhere.com/pages/UsingMySQL).\n\
    \nNote: After you have setup MySQL or any other database, because it’s a brand\
    \ new database, you will have to create a new superuser (*python manage.py createsuperuser*)\
    \ and run the makemigrations/migrate command:\n\n```\npython manage.py makemigrations\n\
    python manage.py migrate\n```\n\n## Final Words\n\nWe have gone through quite\
    \ a lot of content to equip you with the skills to create a Django full stack\
    \ app. We have covered the major features of Django, templates, views, urls, user\
    \ authentication, authorization, models, and deployment. You now have the knowledge\
    \ to go and build your own websites with Django. The CRUD functionality in our\
    \ Reviews app is common in many web applications. E.g. you already have all the\
    \ tools to create a blog, Todo List or shopping cart web applications.\n\nHopefully,\
    \ you have enjoyed this book and would like to learn more from me. I would"
  mdcn: "回到我们的虚拟环境中，我们需要安装 Django 和 Pillow（就像我们在开发环境中所做的那样）。因此运行：\n\n```\npip install\
    \ django pillow\n```\n\n## 设置你的 Web 应用\n\n此时，你需要准备好 3 条信息：\n\n1.  你的 Django 项目顶层文件夹的路径——即包含\
    \ \"manage.py\" 的文件夹。一个简单的方法是，在 bash 中进入你的项目文件夹，输入 *pwd*。例如：/home/greglim/djangomoviereviews\n\
    2.  你的项目名称（包含你的 settings.py 的文件夹名称），例如 *moviereviews*\n3.  你的虚拟环境名称，例如 *moviereviewsenv*\n\
    \n## 通过手动配置创建 Web 应用\n\n在你的浏览器中，打开一个新标签页并访问 PythonAnywhere 控制面板。点击 ‘ Web ’ 标签页（图\
    \ 29.4）。\n\n控制台 文件 **Web** 任务 数据库\n\n### 图 29.4\n\n点击 ‘ Add a new web app ’。在\
    \ ‘ Select a Python Web framework ’ 下，选择 ‘ Manual Configuration ’（图 29.5）。\n\n\
    ![](img/d19bfdecf695803cf46ee472b3205f51_181_0.png)\n\n### 图 29.5\n\n注意：确保你选择的是\
    \ ‘Manual Configuration’，而不是 ‘Django’ 选项，后者仅适用于新项目。\n\n选择正确的 Python 版本（与你创建虚拟环境时使用的版本相同）。\n\
    \n## 输入你的虚拟环境名称\n\n在 *Virtualenv* 部分输入你的虚拟环境名称（图 29.6）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_181_1.png)\n\
    \n### 图 29.6\n\n你可以直接使用其短名称 \"moviereviewsenv\"，它会自动补全为 /home/username/.virtualenvs\
    \ 下的完整路径。\n\n## 输入你的代码路径\n\n接下来，在 *Code* 部分输入你的项目文件夹路径，包括 ‘ Source code ’ 和 ‘\
    \ Working directory ’（图 29.7）：\n\n![](img/d19bfdecf695803cf46ee472b3205f51_182_0.png)\n\
    \n### 图 29.7\n\n## 编辑你的 WSGI 文件\n\n在 ‘ Code ’ 部分内的 *wsgi.py* 文件中（图 29.8 - 不是你本地\
    \ Django 项目文件夹中的那个），\n\n![](img/d19bfdecf695803cf46ee472b3205f51_182_1.png)\n\n\
    ### 图 29.8\n\n点击 WSGI 文件链接，它会带你到一个编辑器，你可以在那里修改它。\n\n删除除 Django 部分以外的所有内容，并取消该部分的注释。你的\
    \ WSGI 文件将如下所示：\n\n```\n# +++++++++++++ DJANGO +++++++++++++\n# To use your own\
    \ Django app use code like this:\nimport os\nimport sys\n\npath = '/home/greglim/djangomoviereviews/'\n\
    if path not in sys.path:\n    sys.path.append(path)\n\nos.environ['DJANGO_SETTINGS_MODULE']\
    \ = 'moviereviews.settings'\n\n# then:\nfrom django.core.wsgi import get_wsgi_application\n\
    application = get_wsgi_application()\n```\n\n## 代码解释\n\n```\npath = '/home/greglim/djangomoviereviews/'\n\
    ```\n\n请务必替换为你项目的正确路径，即包含 *manage.py* 的文件夹，\n\n```\nos.environ['DJANGO_SETTINGS_MODULE']\
    \ = 'moviereviews.settings'\n```\n\n确保你为 DJANGO_SETTINGS_MODULE 设置了正确的值并保存文件。\n\
    \n## 退出和进入虚拟环境\n\n任何时候你想退出虚拟环境，在 Bash 中运行 ‘ deactivate ’。要重新进入虚拟环境，运行：workon <虚拟环境名称>\n\
    \n如果你忘记了虚拟环境的名称，你可以通过进入 .virtualenvs 文件夹来查看你拥有的虚拟环境列表：\n\n```\ncd .virtualenvs\n\
    ls\n```\n\n然后你就可以看到虚拟环境列表了。\n\n## 允许的主机\n\n接下来，我们需要在 settings.py 中添加允许的主机。转到 ‘\
    \ Files ’ 标签页，浏览源代码目录，在 settings.py 中添加：\n\n```\nALLOWED_HOSTS = ['*']\n```\n\n\
    保存文件。然后转到 ‘ Web ’ 标签页，点击你的域名对应的 Reload 按钮（图 29.9）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_185_0.png)\n\
    \nALLOWED_HOSTS 设置代表我们的 Django 站点可以服务哪些主机/域名。这是一种安全措施，用于防止 HTTP Host 头攻击。我们使用了通配符星号\
    \ * 来表示所有域名都是可接受的。在你的生产项目中，你可以明确列出允许的域名。\n\n访问你的项目 URL（它是上一张图片中的蓝色链接），主页现在应该显示了！我们快完成了！但请注意，*static*\
    \ 和 *media* 图片仍然没有显示。我们将在下一节中解决这个问题。\n\n## 静态文件\n\n让我们解决静态和媒体图片不显示的问题。在 *settings.py*\
    \ 中，我们需要添加以下**粗体**内容并删除一行：\n\n```\n...\nSTATIC_URL = '/static/'\n**STATIC_ROOT\
    \ = os.path.join(BASE_DIR,'static')**\n\n# Default primary key field type\n# https://docs.djangoproject.com/en/3.2/ref/settings/#default-auto-field\n\
    \nDEFAULT_AUTO_FIELD = 'django.db.models.BigAutoField'\n\nMEDIA_ROOT = os.path.join(BASE_DIR,'media')\n\
    MEDIA_URL = '/media/'\n\nSTATICFILES_DIRS = [\n    ~~os.path.join(BASE_DIR, \"\
    static\"),~~\n    'moviereviews/static/',\n]\n```\n\nSTATIC_ROOT 变量定义了一个中心位置，我们将所有静态文件收集到该位置。\n\
    \n保存文件，然后回到 bash 控制台（在虚拟环境中），运行：\n\n```\npython manage.py collectstatic\n```\n\
    \n此命令会从你的每个应用文件夹（包括管理应用的静态文件）以及你在 *settings.py* 中指定的任何其他文件夹中收集所有静态文件，并将它们复制到 STATIC_ROOT。每次你想发布静态文件的新版本时，都需要重新运行此命令。\n\
    \n## 设置静态文件映射\n\n接下来，设置一个静态文件映射，让我们的 Web 服务器为你提供静态文件服务。\n\n在 PythonAnywhere 控制面板的\
    \ *Web* 标签页下，在 ‘ Static Files ’ 部分，在 url 部分输入与 STATIC_URL 相同的 URL（通常是 /static/）\n\
    \n在 path 部分输入 STATIC_ROOT 的路径（图 29.10 - 完整路径，包括 /home/username/etc）\n\n| URL |\
    \ 目录 |\n|---|---|\n| /static/ | /home/greglim/djangomovieviews/static |\n\n###\
    \ 图 29.10\n\n然后点击 Reload，你的静态图片现在应该会出现在你的网站中。\n\n## 设置媒体文件映射\n\n设置一个类似的静态文件映射，从\
    \ MEDIA_URL 到 MEDIA_ROOT（图 29.11）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_188_0.png)\n\
    \n### 图 29.11\n\n点击 Reload，你的媒体图片现在应该会出现在你的网站中（图 29.12）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_188_1.png)\n\
    \n### 图 29.12\n\n## 将 Debug 设置为 False\n\n对于本地开发，我们设置了 DEBUG=True。这会向我们显示详细的错误描述以及它来自哪一行代码。然而，在生产环境中，我们应该隐藏这些信息（我们不想将所有秘密暴露在公开场合），方法是设置\
    \ DEBUG=False。\n\n因此，在 PythonAnywhere 控制面板中，转到你的项目的 *settings.py* 并设置 DEBUG =\
    \ False。\n\n## 创建超级用户\n\n记得在你的生产环境中创建一个超级用户（就像我们在开发环境中所做的那样），并妥善保管密码。\n\n## .gitignore\n\
    \n在上传到 GitHub 时，我们可以忽略一些文件。例如，当 Django 运行 .py 文件时自动创建的 __pycache__ 目录。我们也应该忽略\
    \ db.sqlite3 文件，因为它可能会被意外推送到生产环境。如果你使用的是 Mac，我们可以忽略 *.DS_Store*，它存储了关于 MacOS 文件夹设置的信息。\n\
    \n所以最终的 *.gitignore* 将如下所示：\n\n```\n__pycache__/\ndb.sqlite3\n.DS_Store\n```\n\
    \n## 将 *db.sqlite3* 更改为 MySQL 或 PostgreSQL\n\n我们当前的数据库设置为 SQLite，这对于小型项目来说运行良好。但是当项目或数据规模增长时，我们希望切换到其他数据库，如\
    \ MySQL 或 PostgreSQL。\n\nPythonAnywhere 允许免费使用 MySQL。但对于 PostgreSQL，你需要有一个付费账户。\n\
    \n要开始使用 MySQL，你可以参考 PythonAnywhere 简洁而有用的文档 (https://help.pythonanywhere.com/pages/UsingMySQL)。\n\
    \n注意：在你设置好 MySQL 或任何其他数据库之后，因为它是一个全新的数据库，你将需要创建一个新的超级用户 (*python manage.py createsuperuser*)\
    \ 并运行 makemigrations/migrate 命令：\n\n```\npython manage.py makemigrations\npython\
    \ manage.py migrate\n```\n\n## 结语\n\n我们已经涵盖了相当多的内容，旨在让你掌握创建 Django 全栈应用的技能。我们介绍了\
    \ Django 的主要功能：模板、视图、URL、用户认证、授权、模型和部署。你现在拥有了使用 Django 构建自己网站的知识。我们评论应用中的 CRUD\
    \ 功能在许多 Web 应用中都很常见。例如，你已经拥有了创建博客、待办事项列表或购物车 Web 应用的所有工具。\n\n希望你喜欢这本书，并愿意从我这里学到更多。我将"
