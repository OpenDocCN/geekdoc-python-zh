- md: "## Running Your App\n\nWhen you run your app now, log in and go to a specific\
    \ movie, a user will be able to delete reviews they have posted.\n\n## CHAPTER\
    \ 28: AUTHORIZATION\n\nWe have implemented authentication where we allow users\
    \ to sign up and log in. But we also need authorization which authorizes access\
    \ to certain pages only to logged in users.\n\nCurrently, if a user manual enters\
    \ the url to create a review e.g. [http://localhost:8000/movie/2/create](http://localhost:8000/movie/2/create),\
    \ they can still access the form. We should authorize access to creating/updating/deleting\
    \ of reviews only to logged in users. We also authorize access to *logout*.\n\n\
    To do so, we import and add the `@login_required` decorator to the views which\
    \ we want to authorize as shown in **bold**:\n\n/movie/views.py\n\n```\n...\n\
    from .forms import ReviewForm\nfrom django.contrib.auth.decorators import login_required\n\
    ...\n\n@login_required\ndef createreview(request, movie_id):\n    ...\n\n@login_required\n\
    def updatereview(request, review_id):\n    ...\n\n@login_required\ndef deletereview(request,\
    \ review_id):\n    ...\n```\n\n/accounts/views.py\n\n```\n...\nfrom django.db\
    \ import IntegrityError\nfrom django.contrib.auth.decorators import login_required\n\
    ...\n\n@login_required\ndef logoutaccount(request):\n    ...\n```\n\nWe also have\
    \ to add at the end of /moviereviews/settings.py:\n\n```\n...\nLOGIN_URL = 'loginaccount'\n\
    ```\n\nThis redirects a user (who is not logged in) to the login page when they\
    \ attempt to access an authorized page.\n\nWhen you run your app now, ensure that\
    \ you are logged out and go to the create review page e.g. [http://localhost:8000/movie/2/create](http://localhost:8000/movie/2/create),\
    \ you will be redirected to the login page.\n\n* You can obtain the source code\
    \ of the completed project at www.greglim.co/p/django.\n\n## CHAPTER 29: DEPLOYMENT\n\
    \nOur project is currently running on our local machine. To have our site live\
    \ on the real, public internet for the world to use, we need to deploy it onto\
    \ an actual server. A popular way to do so is to deploy our Django project on\
    \ PythonAnywhere. For one, it is free to use for small websites.\n\nTo get our\
    \ code on to PythonAnywhere, we need our code to be on a code sharing site like\
    \ GitHub or Bitbucket. In this chapter, we will use GitHub. If you are already\
    \ familiar with uploading your code to GitHub, please skip the following section.\
    \ Else, you can follow along.\n\n### GitHub and Git\n\nIn this section, we cover\
    \ only the necessary steps to move your code onto GitHub. We will not cover all\
    \ details about Git and GitHub (entire books have been written on these alone!).\n\
    \nGo to *github.com* and sign up for an account if you don't have one. To put\
    \ your project on GitHub, you will need to create a repository for it to live\
    \ in. Create a new repository by clicking on '+' on the top-right and select 'New\
    \ repository' (fig. 29.1).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_174_0.png)\n\
    \nFigure 29.1\n\nGive your repository a name e.g. *moviereviews*. Select the 'public'\
    \ radio box and hit 'Create repository'.\n\nWe will begin to move our code onto\
    \ GitHub. In your local machine's Terminal, ensure you have *git* installed by\
    \ running: *git*\n\nNow, what is Git? Git is a version control for projects and\
    \ is very popular in the development world. It allows us to have save points (Git\
    \ calls them *commits*) in our code.\n\nIf we make mistakes in our project at\
    \ any point in time, we can go back to previous save points when the project is\
    \ working. Git also allows multiple developers to work on the project together\
    \ without worrying about one overwriting the code of another.\n\nWhen you run\
    \ *git* in the Terminal, if you see Git commands listed down, you have Git installed.\
    \ If you don't see them, you will need to install Git. Visit the Git site ([https://git-scm.com/](https://git-scm.com/))\
    \ and follow the instructions to install Git. When Git is installed, you might\
    \ need to close and re-open the Terminal and in it. Type *git* to ensure that\
    \ it is installed.\n\nIn your project folder, enter:\n\n```\ngit init\n```\n\n\
    *git init* marks your folder as a Git project where you can begin to track changes.\
    \ A hidden folder *.git* is added to the project folder. The *.git* folder stores\
    \ all the objects and refs that Git uses and creates as part of your project's\
    \ history.\n\nNext, run:\n\n```\ngit add -A\n```\n\nThis adds everything in your\
    \ project into the staging environment to prepare a snapshot before committing\
    \ it to the official history. Go ahead to commit them by running:\n\n```\ngit\
    \ commit -m \"first message\"\n```\n\nThis creates a save point in your code.\
    \ You can identify different commits by the descriptive messages you provide.\
    \ Next, we want to save our Git project on to GitHub.\n\nIn the repository page\
    \ in GitHub, copy the *git remote add origin <origin path>* command and run it\
    \ the Terminal. Eg:\n\n```\ngit remote add origin https://github.com/greglim81/moviereviews.git\n\
    ```\n\nThis creates a new connection record to the remote repository. To move\
    \ the code from your local computer to GitHub, run:\n\n```\ngit push -u origin\
    \ main\n```\n\nThis pushes the code to GitHub. When you reload the GitHub repository\
    \ page, your project's code will be reflected there.\n\n*Do note that there is\
    \ much more to Git and GitHub. We have just covered the necessary steps to upload\
    \ our code on to GitHub. With this, we have now gotten our code on GitHub. Next,\
    \ we will clone our code on to PythonAnywhere.\n\n### Cloning our Code on to PythonAnywhere\n\
    \nThe steps to deploy an existing Django project on PythonAnywhere can be found\
    \ at https://help.pythonanywhere.com/pages/DeployingDjango but I will go through\
    \ it with you here.\n\nNow that we have our code on GitHub, we will have PythonAnywhere\
    \ retrieve our code from there. First, create a beginner free account in PythonAnywhere\
    \ here: https://www.pythonanywhere.com/registration\n\nIn PythonAnywhere, click\
    \ on 'New console' -> 'Bash' to access its Linux Terminal (fig. 29.2).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_178_0.png)\n\
    \nFigure 29.2\n\nBack in your GitHub repository, click on 'Code' and copy the\
