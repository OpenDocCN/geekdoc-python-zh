  - "[PAGE 28]\n\n# CHAPTER 5: URLs\n\nCurrently, we just have a default landing page\
    \ provided by Django. How do we create our own custom pages and have different\
    \ urls to route to them?\n\nRemember that /moviereviews/urls.py is referenced\
    \ each time someone types in a url on our website. e.g. localhost:8000/hello.\n\
    \nFor now, we get an error page when we go to the above url. So, how do we display\
    \ a proper page for it? Each time a user types in a url, the request passes through\
    \ urls.py and see if the url matches any defined paths so that the Django server\
    \ can return an appropriate response.\n\nurls.py currently has the code:\n\n```\n\
    from django.contrib import admin\nfrom django.urls import path\n\nurlpatterns\
