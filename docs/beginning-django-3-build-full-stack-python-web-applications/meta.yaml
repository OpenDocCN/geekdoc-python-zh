  mdcn: "## 运行你的应用\n\n现在运行你的应用，登录并进入特定电影页面，用户将能够删除他们发布的评论。\n\n## 第28章：授权\n\n我们已经实现了身份验证，允许用户注册和登录。但我们还需要授权，即仅授权已登录用户访问特定页面。\n\
    \n目前，如果用户手动输入创建评论的网址，例如 [http://localhost:8000/movie/2/create](http://localhost:8000/movie/2/create)，他们仍然可以访问该表单。我们应该仅授权已登录用户访问创建/更新/删除评论的功能。我们同样授权访问*登出*功能。\n\
    \n为此，我们导入并为需要授权的视图添加 `@login_required` 装饰器，如**粗体**所示：\n\n/movie/views.py\n\n```\n\
    ...\nfrom .forms import ReviewForm\nfrom django.contrib.auth.decorators import\
    \ login_required\n...\n\n@login_required\ndef createreview(request, movie_id):\n\
    \    ...\n\n@login_required\ndef updatereview(request, review_id):\n    ...\n\n\
    @login_required\ndef deletereview(request, review_id):\n    ...\n```\n\n/accounts/views.py\n\
    \n```\n...\nfrom django.db import IntegrityError\nfrom django.contrib.auth.decorators\
    \ import login_required\n...\n\n@login_required\ndef logoutaccount(request):\n\
    \    ...\n```\n\n我们还需要在 /moviereviews/settings.py 的末尾添加：\n\n```\n...\nLOGIN_URL\
    \ = 'loginaccount'\n```\n\n这会在用户（未登录）尝试访问受保护页面时，将其重定向到登录页面。\n\n现在运行你的应用，确保你已登出并访问创建评论页面，例如\
    \ [http://localhost:8000/movie/2/create](http://localhost:8000/movie/2/create)，你将被重定向到登录页面。\n\
    \n* 你可以在 www.greglim.co/p/django 获取完成项目的源代码。\n\n## 第29章：部署\n\n我们的项目目前运行在本地机器上。为了让我们的网站在真实的公共互联网上供全世界使用，我们需要将其部署到实际的服务器上。一种流行的方法是将我们的\
    \ Django 项目部署到 PythonAnywhere。首先，对于小型网站，它是免费使用的。\n\n要将我们的代码放到 PythonAnywhere 上，我们需要将代码放在像\
    \ GitHub 或 Bitbucket 这样的代码共享网站上。在本章中，我们将使用 GitHub。如果你已经熟悉将代码上传到 GitHub，请跳过以下部分。否则，你可以跟着操作。\n\
    \n### GitHub 和 Git\n\n在本节中，我们仅涵盖将代码移动到 GitHub 的必要步骤。我们不会涵盖关于 Git 和 GitHub 的所有细节（已经有整本书专门讲述这些内容！）。\n\
    \n访问 *github.com*，如果你没有账户，请注册一个。要将你的项目放到 GitHub 上，你需要为它创建一个仓库。通过点击右上角的 '+' 并选择\
    \ 'New repository'（图 29.1）来创建一个新仓库。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_174_0.png)\n\
    \n图 29.1\n\n为你的仓库命名，例如 *moviereviews*。选择 'public' 单选框，然后点击 'Create repository'。\n\
    \n我们将开始将代码移动到 GitHub。在你本地机器的终端中，确保你已安装 *git*，方法是运行：*git*\n\n那么，Git 是什么？Git 是一个项目版本控制系统，在开发领域非常流行。它允许我们在代码中设置保存点（Git\
    \ 称之为 *commits*）。\n\n如果我们在项目的任何时候犯了错误，我们可以回到项目正常工作的先前保存点。Git 还允许多个开发人员一起处理项目，而不用担心一个人覆盖另一个人的代码。\n\
    \n当你在终端中运行 *git* 时，如果你看到 Git 命令列表，说明你已安装 Git。如果没有看到，你需要安装 Git。访问 Git 网站 ([https://git-scm.com/](https://git-scm.com/))\
    \ 并按照说明安装 Git。安装 Git 后，你可能需要关闭并重新打开终端，然后在其中输入 *git* 以确保它已安装。\n\n在你的项目文件夹中，输入：\n\
    \n```\ngit init\n```\n\n*git init* 将你的文件夹标记为一个 Git 项目，你可以开始跟踪更改。一个隐藏文件夹 *.git*\
    \ 被添加到项目文件夹中。*.git* 文件夹存储了 Git 作为你项目历史的一部分所使用和创建的所有对象和引用。\n\n接下来，运行：\n\n```\n\
    git add -A\n```\n\n这会将你项目中的所有内容添加到暂存环境中，以便在提交到正式历史记录之前准备一个快照。继续运行以下命令进行提交：\n\n\
    ```\ngit commit -m \"first message\"\n```\n\n这会在你的代码中创建一个保存点。你可以通过提供的描述性消息来识别不同的提交。接下来，我们想将我们的\
    \ Git 项目保存到 GitHub 上。\n\n在 GitHub 的仓库页面，复制 *git remote add origin <origin path>*\
    \ 命令并在终端中运行它。例如：\n\n```\ngit remote add origin https://github.com/greglim81/moviereviews.git\n\
    ```\n\n这会创建一个到远程仓库的新连接记录。要将代码从你的本地计算机移动到 GitHub，运行：\n\n```\ngit push -u origin\
    \ main\n```\n\n这会将代码推送到 GitHub。当你重新加载 GitHub 仓库页面时，你的项目代码将反映在那里。\n\n*请注意，Git 和\
    \ GitHub 还有更多内容。我们只是涵盖了将代码上传到 GitHub 的必要步骤。至此，我们已经将代码放到了 GitHub 上。接下来，我们将把代码克隆到\
    \ PythonAnywhere 上。\n\n### 将代码克隆到 PythonAnywhere\n\n在 PythonAnywhere 上部署现有 Django\
    \ 项目的步骤可以在 https://help.pythonanywhere.com/pages/DeployingDjango 找到，但我将在这里与你一起过一遍。\n\
    \n既然我们的代码已经在 GitHub 上，我们将让 PythonAnywhere 从那里获取我们的代码。首先，在这里创建一个初学者免费账户：https://www.pythonanywhere.com/registration\n\
    \n在 PythonAnywhere 中，点击 'New console' -> 'Bash' 以访问其 Linux 终端（图 29.2）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_178_0.png)\n\
    \n图 29.2\n\n回到你的 GitHub 仓库，点击 'Code' 并复制克隆的 URL（图 29.3）。\n\n![](img/d19bfdecf695803cf46ee472b3205f51_178_1.png)\n\
    \n图 29.3\n\n要克隆，回到 PythonAnywhere Bash，运行：*git clone <粘贴 url>*，例如\n\n```\ngit\
    \ clone https://github.com/greglim81/djangomoviereviews.git\n```\n\n这将从 GitHub\
    \ 仓库获取你的所有代码，并在 PythonAnywhere 中克隆它。克隆完成后，你可以在 bash 中执行 'ls'，你会看到与你在机器上看到的相同的文件夹。\n\
    \n### 虚拟环境\n\n虚拟环境用于为具有不同需求的不同项目创建独立的开发环境。例如，你可以指定在特定虚拟环境中安装哪个版本的 Python 以及哪些库/模块。\n\
    \n例如，要在 PythonAnywhere bash 中创建一个虚拟环境，我们运行：\n\n```\nmkvirtualenv -p python3.8\
    \ <environment name>\n```\n\n在上面，我们指定了在虚拟环境中使用 Python 3.8。我们安装的任何包都将始终存在，并且独立于其他虚拟环境。\n\
    \n如果我运行：\n\n```\nmkvirtualenv -p python3.8 moviereviewsenv\n```\n\n我将在 Bash 中看到虚拟环境的名称，这意味着我们处于\
    \ VE 中，例如：\n\n```\n(moviereviewsenv) 00:08 ~ $\n```"
