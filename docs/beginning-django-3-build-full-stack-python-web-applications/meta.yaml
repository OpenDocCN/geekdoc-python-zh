    \ OK\n  Applying auth.0012_alter_user_first_name_max_length... OK\n  Applying\
    \ sessions.0001_initial... OK\n```\n\nThe *migrate* command creates an initial\
    \ database based on Django’s default settings. Notice there is a *db.sqlite3*\
    \ file in the project folder. The file represents our SQLite database. It is created\
    \ the first time we run either *migrate* or *runserver*. *runserver* configures\
    \ the database using Django’s default settings. But *migrate* syncs the database\
