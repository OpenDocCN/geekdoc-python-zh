  md: 'hit the Reload button for your domain (fig. 29.9).


    ![](img/d19bfdecf695803cf46ee472b3205f51_185_0.png)


    The ALLOWED_HOSTS settings represent which host/domain names our Django site can
    serve. This is a security measure to prevent HTTP Host header attacks. We used
    the wildcard Asterisk * to indicate all domains are acceptable. In your production
    projects, you can explicitly list which domains are allowed.


    Go to your project ’s url (it is the blue link in the previous image) and the
    home page should now show! We are almost there! But note that the *static* and
    *media* images are still not showing. Let ’s fix that in the next section.


    # Static Files


