  md: '# Chapter 2: Installing Python and Django


    Installing Python


    Let''s check if we have Python installed and if so, what version is it.


    If you are using a Mac, open your Terminal. If you are using Windows, open your
    Command Prompt. For convenience, I will address both the Terminal and Command
    Prompt as ''Terminal'' throughout the book.


    We will need to check if we have at least Python 3.6 in order to use Django 3.
    To do so, go to your Terminal and run:


    ```

    python3 --version

    ```


    (or *python* on Windows)


    This shows the version of Python you installed. Make sure that the version is
    at least 3.6. If it is not so, get the latest version of Python by going to *python.org*.
    Go to'
  merge: -1
  pgno: 14
- img_proc: true
  md: '‘Downloads’ and install the version for your OS.


    After the installation, run `python3 --version` again and it should reflect the
    latest version of Python e.g. Python 3.9.7 (at time of book’s writing)


    # Installing Django


    We will be using `pip` to install Django. `pip` is the standard package manager
    for Python to install and manage packages not part of the standard Python library.


    First check if you have `pip` installed by going to the Terminal and running:


    ```

    pip3

    ```


    (or `pip` on Windows)


    If you have `pip` installed, it should display a list of `pip` commands.


    To install Django, run the command:


    ```

    pip3 install django

    ```


    This will retrieve the latest Django code and'
  merge: -1
  pgno: 15
- img_proc: true
  md: 'install it in your machine. After installation, close and re-open your Terminal.


    Ensure you have installed Django by running:


    ```

    python3 -m django

    ```


    It will show you all the options you can use (fig. 2.1):


    ![](img/d19bfdecf695803cf46ee472b3205f51_16_0.png)


    Figure 2.1


    Along the course of the book, you will progressively be introduced to some of
    the options. For now, we will use the *startproject* option to create a new project.'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'In Terminal, navigate to a folder on your computer where you want to store
    your Django project e.g. Desktop. In that folder, run:


    ```

    python3 -m django startproject <project_name>

    ```


    In our case, say we want to name our project ‘moviereviews’. We run:


    ```

    python3 -m django startproject moviereviews

    ```


    A ‘moviereviews’ folder will be created. We will discuss its contents later. For
    now, let’s run our first website on the Django local web server.


    # Running the Django Local Web Server


    In Terminal, *cd* to the created folder:


    ```

    cd moviereviews

    ```


    and run:


    ```

    python3 manage.py runserver

    ```


    When you do so, you start the local web server on your machine (for local development
    purposes). There will be a URL'
