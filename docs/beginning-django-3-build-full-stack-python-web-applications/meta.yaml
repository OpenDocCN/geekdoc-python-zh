- md: "## CHAPTER 11: DISPLAYING OBJECTS FROM ADMIN\n\nIn this chapter, we will see\
    \ how to display the movie objects stored in the admin database. In *movie/views.py*,\
    \ add the following in **bold**:\n\n```\n...\nfrom .models import Movie\n\ndef\
    \ home(request):\n    searchTerm = request.GET.get('searchMovie')\n    movies\
    \ = Movie.objects.all()\n    return render(request,\n    'home.html', {'searchTerm':searchTerm,\
    \ 'movies': movies})\n...\n```\n\n## Code Explanation\n\n```\nfrom .models import\
    \ Movie\n```\n\nWe first import the *Movie* model.\n\n```\nmovies = Movie.objects.all()\n\
    ```\n\nThe above grabs all the movie objects from the database and assigns it\
    \ to *movies*. We then pass movies in the dictionary to *home.html*.\n\nDjango\
    \ makes it really straightforward to access objects in the database. If we have\
    \ to write code to connect to the database, write SQL statements for retrieval,\
    \ and convert the results to Python objects, it would involve a lot more code!\
    \ But Django provides lots of database functionality to handle these for us.\n\
    \n/movie/templates/home.html\n\nAnd in *home.html*, we display the objects by\
    \ adding the following code in **bold**:\n\n```\n...\n<div class=\"container\"\
    >\n  <form action=\"\">\n    ...\n  </form>\n  <p>Searching for: {{ searchTerm\
    \ }}</p>\n  {% for movie in movies %}\n    <h2>{{ movie.title }}</h2>\n    <h3>{{\
    \ movie.description }}</h3>\n    <img src=\"{{ movie.image.url }}\">\n    {% if\
    \ movie.url %}\n      <a href=\"{{ movie.url }}\">Movie Link</a>\n      {% endif\
    \ %}\n  {% endfor %}\n  <br />\n  <br />\n  <h2>Join our mailing list:</h2>\n\
    ...\n```\n\n## Code Explanation\n\n```\n{% for movie in movies %}\n...\n{% endfor\
    \ %}\n```\n\nUsing a *for*-loop in the Django templating language, we loop through\
    \ *movies* with *movie* acting as a temporary variable to hold the element for\
    \ the current iteration. Note that we enclose code in {% ... %} tags. We use {{\
    \ ... }} to render variables like a movie's title, description and image url.\
    \ For example:\n\n```\n<h2>{{ movie.title }}</h2>\n<h3>{{ movie.description }}</h3>\n\
    <img src=\"{{ movie.image.url }}\">\n```\n\nBecause a movie url is optional, i.e.\
    \ it can be null, we check if it has a value with {% if movie.url %} , and if\
    \ so, render a <a> href to the movie url.\n\n```\n{% if movie.url %}\n<a href=\"\
    {{ movie.url }}\">Movie Link</a>\n{% endif %}\n```\n\n## Running your App\n\n\
    When you run your site, and go to the home page, you will see the movies you added\
    \ (in Admin) on the page (fig. 11.1).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_69_0.png)\n\
    \nFigure 11.1\n\nIf you add another movie in the Admin, it will be listed in the\
    \ website when you re-load it.\n\n## Using the Card Component\n\nLet's further\
    \ improve the look of our site by using the Card component from Bootstrap to display\
    \ each movie (https://getbootstrap.com/docs/5.1/components).\n\nEach movie will\
    \ be displayed in a Card component. In *movie/templates/home.html*, replace the\
    \ *for* loop markup and make the following changes in **bold**:\n\n```\n...\n\
    <div class=\"container\">\n  <form action=\"\">\n    ...\n  </form>\n  <p>Searching\
    \ for: {{ searchTerm }}</p>\n  <div class=\"row row-cols-1 row-cols-md-3 g-4\"\
    >\n    {% for movie in movies %}\n    <div v-for=\"movie in movies\" class=\"\
