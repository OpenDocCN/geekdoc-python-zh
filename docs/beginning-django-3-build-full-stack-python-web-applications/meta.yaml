    \ 'GET' in contrast has the submitted data in the url eg http://localhost:8000/signup/?email=greg%40greglim.com.\
    \ Because username and password are sensitive information, we want them hidden.\
    \ A POST request will not put the information in the url.\n\nIn general, we use\
    \ POST requests for creation and GET requests for retrieval. There are also other\
