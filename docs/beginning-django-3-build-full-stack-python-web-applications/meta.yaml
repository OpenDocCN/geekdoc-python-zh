  md: '# Chapter 3: Understanding the Project Structure


    Let''s look at the project files that have been created for us. Open the project
    folder *moviereviews* in a code editor (I will be using the VSCode editor in this
    book - [https://code.visualstudio.com/](https://code.visualstudio.com/)).


    *manage.py*


    You will see a file *manage.py* which we should not tinker (fig. 3.1).


    ![](img/d19bfdecf695803cf46ee472b3205f51_19_0.png)


    Figure 3.1


    *manage.py* helps us do administrative things. For example, we earlier ran:


    ```

    python3 manage.py runserver

    ```


    to start the local web server. We will later'
  merge: -1
  pgno: 19
- img_proc: true
  md: 'illustrate more of its administrative functions e.g. creating a new app – *python3
    manage.py startapp*


    # *db.sqlite3*


    We also have the *db.sqlite3* file that contains our database. We touch more on
    this file in the *Models* chapter.


    # *moviereviews* folder


    You will find another folder of the same name *moviereviews*. To avoid confusion
    and distinguish between the two *moviereviews* folder, we will keep the inner
    *moviereviews* folder as it is, and rename the outer folder to *moviereviewsproject*
    (fig. 3.2).


    ![](img/d19bfdecf695803cf46ee472b3205f51_20_0.png)


    Figure 3.2


    In it, we have a *__pycache__* folder that'
  merge: -1
  pgno: 20
- img_proc: true
  md: 'stores compiled bytecode when we generate our project. You can largely ignore
    this folder. Its purpose is to make your project start a little faster by caching
    the compiled code that it can readily be executed.


    __init__.py specifies what to run when Django launches for the first time. Again,
    we can ignore this file.


    asgi.py allows for an optional Asynchronous Server Gateway Interface to run. wsgi.py
    which stands for Web Server Gateway Interface helps Django serve our web pages.
    Both files are used when deploying our app. We will revisit them later when we
    deploy our app.


    # urls.py


    This is the file which tells Django which pages to render in response to a browser
    or URL request. For example, when someone enters a url http://localhost:8000/123,
    the request comes into urls.py and gets routed to a page based on the paths specified
    there. We'
  merge: -1
  pgno: 21
- img_proc: true
  md: 'will later add paths to this file and better understand how it works.


    # settings.py


    The *settings.py* file is an important file controlling our project''s settings.
    It contains several properties:


    +   - BASE_DIR determines where on your machine the project is situated at

    - SECRET_KEY is used when you have data flowing in and out of your website. Do
    not ever share this with others

    - DEBUG – Our site can run in debug or not. In debug mode, we get detailed information
    on errors. For e.g. if I try to run http://localhost:8000/123 in the browser,
    I will see a 404 page not found with details on the error (fig. 3).


    ![](img/d19bfdecf695803cf46ee472b3205f51_22_0.png)


    Figure 3


    If DEBUG = False, we will see a generic'
  merge: -1
  pgno: 22
- img_proc: true
  md: '404 page without error details. While developing our project, we set DEBUG
    = True to help us with debugging. When deploying our app to production, we should
    set DEBUG to False.


    +   - INSTALLED_APPS allow us to bring in different pieces of code into our project.
    We will see this in action later.

    - MIDDLEWARE are built-in Django functions to help in our project

    - ROOT_URLCONF specify where our urls are

    - TEMPLATES help us return HTML code

    - AUTH_PASSWORD_VALIDATORS allow us to specify validations we want on passwords.
    E.g. a minimum length


    There are some other properties in *settings.py* like LANGUAGE_CODE and TIME_ZONE
    but we have focused on the more important ones. We will later revisit this file
    and see how relevant it is in developing our site. Let ’ s next create our first
    app!'
