  - '[PAGE 143]


    # Code Explanation


    ```

    text = models.CharField(max_length=100)

    ```


    The text field stores the review text.


    ```

    date = models.DateTimeField(auto_now_add=True)

    ```


    For review date, we specify `auto_now_add=True`. That is, when someone creates
    this object, the current datetime will be automatically filled in. Note that this
    makes the field non-editable. Once the datetime is set, it is fixed.


    ```

    user = models.ForeignKey(User, on_delete=models.CASCADE)

    movie = models.ForeignKey(Movie, on_delete=models.CASCADE)

    ```


    For the user and movie field, we are using a ForeignKey which allows for a many-to-one
    relationship. This means that a user can create multiple reviews. A movie similarly
    can have multiple reviews. For user, the reference is to the built-in User model
    that Django provides for authentication. For all many-to-one relationships such
    as a ForeignKey, we must also specify an `on_delete` option. That is,'
  - '[PAGE 144]


    when you remove a user or movie for instance, its associated reviews will be deleted
