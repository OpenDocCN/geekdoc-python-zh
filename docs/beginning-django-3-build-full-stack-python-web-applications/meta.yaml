  md: '# PREFACE


    # About this book


    In this book, we take you on a fun, hands-on and pragmatic journey to learning
    Django full stack development. You''ll start building your first Django app within
    minutes. Every chapter is written in a bite-sized manner and straight to the point
    as we don''t want to waste your time (and most certainly ours) on the content
    you don''t need. In the end, you will have the skills to create a Movies review
    app and deploy it to the Internet.


    In the course of this book, we will cover:


    +   - Chapter 1: Introduction

    - Chapter 2: Installing Python and Django

    - Chapter 3: Understanding the Project Structure

    - Chapter 4: Creating Our First App

    - Chapter 5: URLs

    - Chapter 6: Generating HTML Pages with Templates

    - Chapter 7: Adding Bootstrap to Our Site

    - Chapter 8: Adding a Search Form

    - Chapter 9: Models

    - Chapter 10: Django Admin Interface

    - Chapter 11: Displaying Objects from Admin

    - Chapter 12: Revisiting Concepts - Adding A News App'
