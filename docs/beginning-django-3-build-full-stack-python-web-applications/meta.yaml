- img_proc: true
  md: '# Chapter 4: Creating Our First App


    In chapter two, we created a Django project. A single Django project can contain
    one or more *apps* that work together to power a web application. Django uses
    the concept of projects and apps to keep code clean and readable.

    For example, in a Movies review site such as *rottentomatoes.com* (fig. 4.1),
    we can have an app for listing movies, an app for listing news, an app for payments,
    an app for user authentication etc.


    ![](img/d19bfdecf695803cf46ee472b3205f51_24_0.png)


    Apps in Django are like pieces of a website. You can create an entire website
    with one'
  merge: -1
  pgno: 24
- img_proc: true
  md: 'single app. But it is useful to break it up into different apps each representing
    a clear function.


