    "manage.py". A simple way to get this is, in your project folder in bash, type
    *pwd*. Eg: /home/greglim/djangomoviereviews

    2. The name of your project (the name of the folder that contains your settings.py),
    e.g. *moviereviews*

    3. The name of your virtualenv, eg *moviereviewsenv*


