    \ (python3 manage.py migrate) which executes the SQL commands in the migrations\
    \ file.\n\nThe migrations are stored in an auto-generated folder *migrations*\
    \ (fig. 9.3).\n\nIn summary, each time you make changes to a model file, you have\
    \ to run:\n\n```\npython3 manage.py makemigrations\npython3 manage.py migrate\n\
    ```\n\nBut how do we access our database and view what’s inside? For that, we\
    \ use a powerful tool in Django called the Admin interface. More on that in the\
    \ next chapter.\n\n- You can obtain the source code of the completed project at\
    \ www.greglim.co/p/django.\n\n## Chapter 10: Django Admin Interface\n\nTo access\
    \ our database, we have to go into the Django Admin interface. Remember that there\
    \ is an *admin* path in `/moviereviews/urls.py`?\n\n```\n...\nurlpatterns = [\n\
    \    path('admin/', admin.site.urls),\n    path('', movieViews.home, name='home'),\n\
    \    path('about/', movieViews.about, name='about'),\n    path('signup/', movieViews.signup,\
    \ name='signup'),\n]\n```\n\nIf you go to *localhost:8000/admin*, it brings you\
    \ to the admin site (fig. 10.1).\n\nDjango has a powerful built-in admin interface\
    \ which provides a visual way of managing all aspects of a Django project, e.g.\
    \ users, making changes to model data.\n\nWith what username and password do we\
    \ log in to Admin? We will have to first create a superuser in the Terminal.\n\
    \nIn the Terminal, run:\n\n```\npython3 manage.py createsuperuser\n```\n\nYou\
    \ will then be asked to specify a username, email and password. Note that anyone\
    \ can access the admin path on your site, so make sure your password is something\
    \ secure.\n\nIf you wish to change your password later, you can run the command:\n\
    \n```\npython3 manage.py changepassword <username>\n```\n\nWith the username you\
    \ have just created, log into admin (fig. 10.2).\n\nUnder ‘Users’, you will see\
    \ the user you have just created (fig. 10.3). You can add additional user accounts\
    \ here for your team.\n\nCurrently, our Movie model doesn’t show up in admin.\
    \ We need to explicitly tell Django what to display in the admin. Before adding\
    \ our Movie model in admin, let’s first configure our images.\n\n## Configuring\
    \ for Images\n\nWe have to configure where to store our images when we add them.\
