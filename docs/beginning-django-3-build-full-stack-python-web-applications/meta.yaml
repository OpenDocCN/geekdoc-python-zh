    \ manage.py runserver\n```\n\nWhen you do so, you start the local web server on\
    \ your machine (for local development purposes). There will be a URL link http://127.0.0.1:8000/\
    \ (equivalent to http://localhost:8000). Open the link in a browser and you will\
