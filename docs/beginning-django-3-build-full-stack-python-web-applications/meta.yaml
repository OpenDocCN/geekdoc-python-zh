    \nFigure 2.2\n\nThis means that your local webserver is running and serving the\
    \ landing page! To stop the local server, type Control+c in the Terminal.\n\n\
    In the next chapter, we will look inside the project folder that Django has created\
    \ for us and understand it better.\n\n## Chapter 3: Understanding the Project\
    \ Structure\n\nLet's look at the project files that have been created for us.\
    \ Open the project folder *moviereviews* in a code editor (I will be using the\
    \ VSCode editor in this book - [https://code.visualstudio.com/](https://code.visualstudio.com/)).\n\
    \n### *manage.py*\n\nYou will see a file *manage.py* which we should not tinker\
    \ (fig. 3.1).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_19_0.png)\n\nFigure\
    \ 3.1\n\n*manage.py* helps us do administrative things. For example, we earlier\
    \ ran:\n\n```\npython3 manage.py runserver\n```\n\nto start the local web server.\
    \ We will later illustrate more of its administrative functions e.g. creating\
    \ a new app – *python3 manage.py startapp*\n\n### *db.sqlite3*\n\nWe also have\
    \ the *db.sqlite3* file that contains our database. We touch more on this file\
    \ in the *Models* chapter.\n\n### *moviereviews* folder\n\nYou will find another\
    \ folder of the same name *moviereviews*. To avoid confusion and distinguish between\
    \ the two *moviereviews* folder, we will keep the inner *moviereviews* folder\
    \ as it is, and rename the outer folder to *moviereviewsproject* (fig. 3.2).\n\
    \n![](img/d19bfdecf695803cf46ee472b3205f51_20_0.png)\n\nFigure 3.2\n\nIn it, we\
    \ have a *__pycache__* folder that stores compiled bytecode when we generate our\
    \ project. You can largely ignore this folder. Its purpose is to make your project\
    \ start a little faster by caching the compiled code that it can readily be executed.\n\
    \n__init__.py specifies what to run when Django launches for the first time. Again,\
    \ we can ignore this file.\n\nasgi.py allows for an optional Asynchronous Server\
    \ Gateway Interface to run. wsgi.py which stands for Web Server Gateway Interface\
    \ helps Django serve our web pages. Both files are used when deploying our app.\
    \ We will revisit them later when we deploy our app.\n\n### urls.py\n\nThis is\
    \ the file which tells Django which pages to render in response to a browser or\
    \ URL request. For example, when someone enters a url http://localhost:8000/123,\
    \ the request comes into urls.py and gets routed to a page based on the paths\
    \ specified there. We will later add paths to this file and better understand\
    \ how it works.\n\n### settings.py\n\nThe *settings.py* file is an important file\
    \ controlling our project's settings. It contains several properties:\n\n-   BASE_DIR\
    \ determines where on your machine the project is situated at\n-   SECRET_KEY\
    \ is used when you have data flowing in and out of your website. Do not ever share\
    \ this with others\n-   DEBUG – Our site can run in debug or not. In debug mode,\
    \ we get detailed information on errors. For e.g. if I try to run http://localhost:8000/123\
    \ in the browser, I will see a 404 page not found with details on the error (fig.\
    \ 3).\n\n![](img/d19bfdecf695803cf46ee472b3205f51_22_0.png)\n\nFigure 3\n\nIf\
    \ DEBUG = False, we will see a generic 404 page without error details. While developing\
    \ our project, we set DEBUG = True to help us with debugging. When deploying our\
    \ app to production, we should set DEBUG to False.\n\n-   INSTALLED_APPS allow\
    \ us to bring in different pieces of code into our project. We will see this in\
    \ action later.\n-   MIDDLEWARE are built-in Django functions to help in our project\n\
    -   ROOT_URLCONF specify where our urls are\n-   TEMPLATES help us return HTML\
    \ code\n-   AUTH_PASSWORD_VALIDATORS allow us to specify validations we want on\
    \ passwords. E.g. a minimum length\n\nThere are some other properties in *settings.py*\
    \ like LANGUAGE_CODE and TIME_ZONE but we have focused on the more important ones.\
    \ We will later revisit this file and see how relevant it is in developing our\
    \ site. Let’s next create our first app!\n\n## Chapter 4: Creating Our First App\n\
    \nIn chapter two, we created a Django project. A single Django project can contain\
    \ one or more *apps* that work together to power a web application. Django uses\
    \ the concept of projects and apps to keep code clean and readable.\n\nFor example,\
    \ in a Movies review site such as *rottentomatoes.com* (fig. 4.1), we can have\
    \ an app for listing movies, an app for listing news, an app for payments, an\
    \ app for user authentication etc.\n\n![](img/d19bfdecf695803cf46ee472b3205f51_24_0.png)\n\
    \nApps in Django are like pieces of a website. You can create an entire website\
    \ with one single app. But it is useful to break it up into different apps each\
    \ representing a clear function.\n\nOur movies review site will begin with one\
    \ app. We will later add more as we progress. To add an app, in the Terminal,\
    \ stop the server (Cmd + c). Navigate to the *moviereviewsproject* folder (**not\
    \ *moviereviews***), and run in Terminal:\n\n```\npython3 manage.py startapp <name\
    \ of app>\n```\n\nIn our case, we will add a *movie* app. So run:\n\n```\npython3\
    \ manage.py startapp movie\n```\n\nA new folder *movie* will be added to the project.\
    \ As we progress along the book, we will explain the files that are inside the\
    \ folder.\n\nThough our new app exists in our Django project, Django doesn't 'know'\
    \ it till we explicitly add it. To do so, we specify it in *settings.py*. So go\
    \ to */moviereviews/settings.py*, under INSTALLED_APPS, you will see six built-in\
    \ apps already there. Add the app name (shown in **bold**):\n\n```\n...\nINSTALLED_APPS\
    \ = [\n    'django.contrib.admin',\n    'django.contrib.auth',\n    'django.contrib.contenttypes',\n\
    \    'django.contrib.sessions',\n    'django.contrib.messages',\n    'django.contrib.staticfiles',\n\
    \    'movie',\n]\n...\n```\n\nBack in the Terminal, run the server with:\n\n```\n\
    python3 manage.py runserver\n```\n\nThe server should run without issues. We will\
    \ learn more about apps in the course of the book.\n\nCurrently, you may notice\
    \ a message in the Terminal when you run the server:\n\n> “ *You have 18 unapplied\
    \ migration(s). Your project may not work properly until you apply the migrations\
    \ for app(s): admin, auth, contenttypes, sessions. Run 'python manage.py migrate'\
    \ to apply them.* ”\n\nWe will see how to address it later. But for now, remember\
    \ that we can have one or more apps inside a project.\n\n## CHAPTER 5: URLs\n\n\
    Currently, we just have a default landing page provided by Django. How do we create\
    \ our own custom pages and have different urls to route to them?\n\nRemember that\
    \ /moviereviews/urls.py is referenced each time someone types in a url on our\
    \ website. e.g. localhost:8000/hello.\n\nFor now, we get an error page when we\
    \ go to the above url. So, how do we display a proper page for it? Each time a\
    \ user types in a url, the request passes through urls.py and see if the url matches\
    \ any defined paths so that the Django server can return an appropriate response.\n\
    \nurls.py currently has the code:\n\n```\nfrom django.contrib import admin\nfrom\
    \ django.urls import path\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    ]\n```"
