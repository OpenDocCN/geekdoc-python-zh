  md: '# CHAPTER 1: INTRODUCTION


    Welcome to Beginning Django 3! This book focuses on the key tasks and concepts
    to get you started to learn and build Django applications in a faster pace. It
    is designed for readers who don ’ t need all the details about Django at this
    point in the learning curve but concentrate on what you really need to know.


    So what ’ s Django? Django is a free, open source web framework for building modern
    Python web applications. Django helps you quickly build web apps by abstracting
    away many of the repetitive challenges in building a website, such as:


    +   - connecting to a database,

    - handling security

    - user authentication

    - URL routes,

    - display content on a page through templates and forms'
  merge: -1
  pgno: 10
- img_proc: true
  md: '+   - supporting multiple database backends

    - admin interface and more.


    This allows developers to focus on building a web application ’s functionality
    rather than reinvent the wheel for standard web application functions.


    Django is one of the most popular frameworks available and is used by established
    companies like Instagram, Pinterest, Mozilla, National Geographic and more. Yet,
    it is easy enough to be used for beginning startups and personal projects. There
    are other popular frameworks like Flash in Python and Express in JavaScript (Greg
    has written a book about [Express](https://example.com)). But they provide the
    minimum required for a simple web page and developers have to do more foundational
    work, like installing and configuring third-party packages on their own for basic
    website functionality.


    # The App We Will Be Building


    We will build a Movie reviews app which lets'
  merge: -1
  pgno: 11
- img_proc: true
  md: 'users view and search for movies. They can also log in and post reviews on
    the movies (fig. 1.1, 1.2, 1.3).


    ![](img/d19bfdecf695803cf46ee472b3205f51_12_0.png)


    Figure 1.1 – Home Page with search functionality


    ![](img/d19bfdecf695803cf46ee472b3205f51_12_1.png)'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'Figure 1.2 – Movie page listing reviews


    ![](img/d19bfdecf695803cf46ee472b3205f51_13_0.png)


    Figure 1.3 – Create Review


    Users can see the list of reviews in a Movie ’ s page and post/edit/delete their
    own review if they are logged in. They will not be able edit/delete other ’ s
    reviews though. Through this app, we will learn a lot of concepts like forms,
    user authorization, permissions, foreign keys and more. By the end of this book,
    you will be confident creating your own Django projects.


    We will begin by installing Python and Django in the next chapter.'
