    \nÊâÄ‰ª•Êàë‰ª¨ÈúÄË¶ÅÊ£ÄÊü•sys.argv‰∏≠ÁöÑÂëΩ‰ª§Ë°åÂèÇÊï∞„ÄÇÂ¶ÇÊûúÁî®Êà∑ÊåáÂÆö‰∫ÜÊñá‰ª∂ÂêçÔºåÊàë‰ª¨Â∞±Â≠òÂÇ®ÂÆÉ„ÄÇÂ¶ÇÊûúÊ≤°ÊúâÔºåÊàë‰ª¨Â≠òÂÇ®NoneÊù•Ë°®Á§∫ËøôÁßçÊÉÖÂÜµ„ÄÇÂ¶ÇÊûú‰ªñ‰ª¨ÊåáÂÆö‰∫ÜÂ§ö‰∏™ÂèÇÊï∞ÔºåÊàë‰ª¨Â∞ÜÊâìÂç∞‰∏ÄÊù°‰ΩøÁî®ËØ¥Êòé„ÄÇ\n\
