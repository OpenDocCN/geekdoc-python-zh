- md: "## Chapter 13. Reading Files\n\nBut what if you have a file that‚Äôs 200 GB of\
    \ data? You (probably, as of this writing in 2020) don‚Äôt have that much memory.\
    \ How can you deal with big files like this?\n\nThe answer is to read them a little\
    \ bit at a time.\n\nWith text files like this, a common thing to do is to read\
    \ them a *line* at a time. Then you process that line, and then move on to the\
    \ next one. This way you only need to have a single line from the file in memory\
    \ at once, instead of the whole 200 GB worth.\n\nLet‚Äôs use the `with` statement\
    \ to open a file, and then read a line at a time.\n\n```\nline_num = 1\nwith open(\"\
    wargames.txt\") as f:\n    for line in f:\n        print(f'{line_num}: {line}')\n\
    \        line_num += 1\n```\n\nAnd we get this output:\n\n```\n1: What he did\
    \ was great! He designed his computer so that it could learn\n\n2: from its own\
    \ mistakes. So, they'd be better the next time they played.\n\n3: The system actually\
    \ learned how to learn. It could teach itself!\n```\n\nPretty neat, eh? We just\
    \ get to use a `for` loop on the opened file to read one line at a time.\n\nBut\
    \ wait! Why is there an extra newline being printed out? What are those blank\
    \ lines between the lines?\n\nThis is a common beginner mistake. The reason is\
    \ that there is a newline at the end of every line of the file already (because\
    \ that‚Äôs where the line breaks are). And, in addition, `print()` adds its own\
    \ newline! So we get both of them printed.\n\nThe easiest workaround is to use\
    \ the `end` keyword argument on `print()` to stop it from adding a newline of\
    \ its own:\n\n```\nprint(f'{line_num}: {line}', end='')\n```\n\nAnother option\
    \ is to use `.rstrip()` on the string to strip newlines from the end.\n\n```\n\
    line = line.rstrip('\\r\\n')\n```\n\nThat‚Äôll strip carriage returns or newlines\
    \ from the right side of the string. We have to specify both since some OSes use\
    \ different characters to represent the end of the line, somewhat irksomely.\n\
    \nAn even-more-portable way to write this is to first:\n\n```\nimport os\n```\n\
    \nthen\n\n```\nline = line.rstrip(os.linesep)\n```\n\nand Python will automatically\
    \ use the proper end-of-line character no matter what system you‚Äôre running the\
    \ program on.\n\n### 13.7 Writing files\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nSo far we‚Äôve been dealing with getting data out of files,\
    \ but now let‚Äôs talk about creating a new file and writing data to them.\n\nThis\
    \ is how programs permanently save data that they need to use later. If you don‚Äôt\
    \ save the data to disk, then it all vanishes once the program exits.\n\nThe process\
    \ is similar to reading, except when we open the file, we need to specify that\
    \ we want to *write*. (If we don't tell open() otherwise, it assumes we're opening\
    \ for reading.)\n\n**WARNING**: if you open an existing file for writing, the\
    \ contents of that file is instantly lost!\n\nLet's open a file and write some\
    \ data to it using the `write()` method.\n\n```\nwith open(\"newfile.txt\", \"\
    w\") as f:\n    f.write(\"Hello, world!\\n\")\n```\n\nThere we go! If you run\
    \ this, then have a look, you'll see a file called `newfile.txt` that has the\
    \ magic words in it.\n\nNow you have the power to save data to disk and read it\
    \ back again!\n\n### 13.8 Chapter Project\n\nIf you need to, review the specification\
    \ at the top of the chapter.\n\nThis project is a bit bigger than the others,\
    \ eh? I mean, writing an entire editor is kinda biting off a lot, isn't it?\n\n\
    Sure! Yeah, it's a lot. But we can do it using the problem-solving framework just\
    \ like always.\n\nSomething else a little different here is that I'm not going\
    \ to include line numbers in the listings. You'll have to work out the proper\
    \ place to put the code based on my descriptions and what makes sense. With practice,\
    \ it should get clearer how things piece together.\n\nLet's start!\n\nProblem-solving\
    \ step: **Understanding the Problem**.\n\nReview the spec from earlier if you\
    \ have to, but the basic chunks of this program are:\n\n- Parse the command line\
    \ to get the filename\n- Read a file\n- Write a file\n- Read user commands as\
    \ input\n- List the file on the screen\n- Append lines to the file\n- Edit existing\
    \ lines\n- Delete lines\n\nSo first, make sure we know what all those do.\n\n\
    Then we'll attack.\n\nProblem-solving step: **Devising a Plan**\n\nWe're going\
    \ to do something a little different this time. We're going to make an overarching\
    \ plan, and then jump back and forth between Planning and Carrying Out the sub\
    \ plans the larger plan is comprised of.\n\nThis is a little more like how software\
    \ dev actually works. You have a general idea of where you're going, and you work\
    \ out the details as you get to them.\n\n> This is a bit of a double-edged sword,\
    \ and it takes practice and experience to get it right. You don't want to over-plan,\
    \ because you're undoubtedly going to have to change things and you don't want\
    \ to waste your time. And you don't want to under-plan, because then hidden gotchas\
    \ might... get you later. You want to plan *just the right amount*. Whatever that\
    \ is.\n>\n> In reality, devs consistently under-plan. And they still make it work\
    \ somehow, like *MAGIC*.\n>\n> And by \"MAGIC\", I mean tons of sweat, tears,\
    \ and off-color language.\n\nBeing able to do this is a really, really important\
    \ skill to practice. This is where software development *really* happens. The\
    \ rest of coding is just writing things down.\n\nSo let‚Äôs do the rough overall,\
    \ based on the outline, above in Understanding The Problem.\n\n- First we‚Äôll get\
    \ the filename from the command line.\n- Then we‚Äôll read the file.\n- Then we‚Äôll\
    \ loop to get input for whatever it is the user wants to do (append, list, edit,\
    \ write, etc.)\n- For whatever the user enters, we‚Äôll do that thing.\n- When the\
    \ user says q to quit, we‚Äôll quit.\n\nThat‚Äôs a pretty loose plan. I mean, ‚ÄúWe‚Äôll\
    \ do that thing,‚Äù isn‚Äôt exactly well-fleshed-out. But we know it‚Äôs possible to\
    \ do them, and we can work on those individual command components one at a time\
    \ (since none of them are really dependent on one another).\n\nLooks like some\
    \ of those we can work on right away.\n\nProblem-solving step: **Devising a Plan**\n\
    \nLet‚Äôs start simple. Simplifying the problem is always a good way to get bits\
    \ and pieces done. Also, getting a minimum working piece going as soon as possible\
    \ can help direct our efforts and keep motivation up. Get a core piece in place,\
    \ and then keep adding on.\n\nWhat‚Äôs a simple version of the program?\n\nWell,\
    \ we could start by looking at the command line to see if there‚Äôs a filename there\
    \ or not, and storing it if there is.\n\nRemember the user has the option to run\
    \ the program without specifying a filename (since maybe they‚Äôre creating a new\
    \ file).\n\nSo we want to check the command line args in sys.argv. If the user\
    \ specified a filename, we‚Äôll store it. If they didn‚Äôt, we‚Äôll store None to indicate\
    \ that case. If they specify more than one argument, we‚Äôll print out a usage message.\n\
    \nGreat! Let‚Äôs go!\n\nProblem-solving step: **Carrying Out the Plan**\n\n```\n\
    import sys\n\n# Parse the command line\n\nif len(sys.argv) == 2:\n    filename\
    \ = sys.argv[1]\n\nelif len(sys.argv) == 1:\n    # We'll use this as a sentinel\
    \ value later if we need to prompt for\n    # a filename when writing the file.\n\
    \    filename = None\n\nelse:\n    print(\"usage: lineedit.py [filename]\", file=sys.stderr)\n\
    \    sys.exit(1)\n\n# Let's just print it here to make sure it's working\nprint(filename)\n\
    ```\n\nThat last line is only there temporarily. This lets us test things out.\n\
    \n```\n$ python lineedit.py\nNone\n\n$ python lineedit.py test\ntest\n\n$ python\
    \ lineedit.py test something\nusage: lineedit.py [filename]\n```\n\nPerfect. What‚Äôs\
    \ next?\n\nProblem-solving step: **Devising a Plan**\n\nLooks like the next reasonable\
    \ step is to read the file into memory so that we can manipulate it later.\n\n\
    So a couple of questions:\n\n- How do we read a file?\n- What do we store it in?\n\
    \nAs for the first, hopefully, you‚Äôve been reading this chapter and know about\
    \ how to open a file for reading and read individual lines from it.\n\nBut how\
    \ to keep all those lines?\n\nThink about all the data structures we‚Äôve talked\
    \ about so far‚Ä¶ lists, dicts, objects‚Ä¶ What is the file the most like?\n\nGo ahead\
    \ and give it some thought before I spoil it in the next couple sentences.\n\n\
    You might argue that each line is like an object. And it is. It wouldn‚Äôt be wrong\
    \ to have a class that represents a line. But somehow you still need to store\
    \ a list of lines.\n\nGah, what a giveaway!\n\nYeah, a list seems like a good\
    \ idea. In a way, a text file is simply a list of lines.\n\nSo let‚Äôs read the\
    \ file a line at a time, storing each into a list as we go.\n\nThis seems like\
    \ a self-contained piece of code, so I‚Äôm going to go ahead and write a function\
    \ that accepts a filename as an argument, and then returns a list of all the lines\
    \ in that file.\n\n- Make an empty list\n- Open the file\n- For each line of the\
    \ file, append it to the list\n- Return the list\n\nProblem-solving step: **Carrying\
    \ Out the Plan**\n\n```\ndef read_file(filename):\n    \"\"\"Read a file from\
    \ disk\"\"\"\n    lines = []\n\n    with open(filename) as f:\n        for line\
    \ in f:\n            lines.append(line)\n\n    return lines\n\nif filename is\
    \ not None:\n    lines = read_file(filename)\nelse:\n    lines = []\n\n# Print\
    \ it out just to make sure it works right\nprint(lines)\n```\n\nNow if we run\
    \ that, and specify an input filename, it should print out a list with all the\
    \ lines in that file.\n\nOf course, we need a sample input file. You can make\
    \ one in VS Code‚Äîjust edit a new file called lines.txt and put whatever you want\
    \ in it. (About five lines is good for testing.) If you don‚Äôt want to bother,\
    \ there‚Äôs a file lines.txt in the examples directory‚Åµ.\n\nRunning it, we get our\
    \ list, just like we wanted!\n\n‚Åµhttps://beej.us/guide/bgpython/source/examples/lines.txt"
