    ## 18.3 Hexadecimal, Base 16


    Hexadecimal, or *hex* for short, is a really common number base for programmers.
    And it‚Äôs an interesting one to look at because, at base 16, it has more digits
    than base 10. With base 10, we have 0-9. But with base 16, we have 0 through‚Ä¶
    what?


    Since we need more symbols to represent digits in base 16 than the normal arabic
    numerals we use for 0-9, we‚Äôve gone ahead and co-opted the first part of the latin
    alphabet. We have 10 digits in 0-9, and we grabbed 6 more ‚Äúdigits‚Äù with A-F to
