    ## Functions


    ### 10.1 Objective


    - Understand what functions are and how they‚Äôre useful

    - Be able to use built-in functions

    - Understand what function arguments are

    - Be able to write your own functions

    - Be able to write good functions

    - Understand the difference between positional arguments and keyword arguments


    ### 10.2 Chapter Project Specification


    Allow the user to enter the locations of several starships in 3D space.


    These should be entered as x,y,z triplets when prompted. When the user enters
    ‚Äúdone‚Äù, stop entering ship locations.


    ```

    Enter ship location x,y,z (or "done"): 10,20,30

    Enter ship location x,y,z (or "done"): -17,16,50

    Enter ship location x,y,z (or "done"): 0,13,30

    Enter ship location x,y,z (or "done"): 5,20,-40

    Enter ship location x,y,z (or "done"): done

    ```


    Then print out a grid of the distances between them. The grid‚Äôs top row and left
    column should indicate the ship number (starting with 0).


    Crossing a column with a row should give you the distance between the ships.


    Distances should be printed to 2 decimal places in fields of width 8.


    We‚Äôll use a variant of the Pythagorean Theorem¬π to find the distance between two
    3D points.


    $d = \sqrt{(x_0 - x_1)^2 + (y_0 - y_1)^2 + (z_0 - z_1)^2}$


    For each pair of 3D points, we take the difference in the X coordinates squared,
    plus the difference in the Y coordinates squared plus the difference in the Z
    coordinates squared, and then we take the square root of that whole thing. And
    that‚Äôs the distance between the two points.


    Example output (corresponding to the example input, above):


    | | 0 | 1 | 2 | 3 |

    |---|---|---|---|---|

    | 0 | 0.00 | 33.84 | 12.21 | 70.18 |

    | 1 | 33.84 | 0.00 | 26.42 | 92.74 |

    | 2 | 12.21 | 26.42 | 0.00 | 70.53 |

    | 3 | 70.18 | 92.74 | 70.53 | 0.00 |


    ¬πhttps://en.wikipedia.org/wiki/Pythagorean_theorem#Euclidean_distance


    So we can see ship #2 (along the top) is distance 26.42 from ship #1 (along the
    left). And notice the diagonal is all 0.00, which makes sense because every ship
    is zero distance from itself.


    Keep this project in mind as we go through the chapter.


    ### 10.3 What Are Functions?


    You''re about to seriously level up in programming by learning how to do this,
    and it''s not even that difficult. Functions are the key to getting away from
    the toy programs we''ve been doing so far and doing *real* programs.


    So what are they?


    Problem-solving step: **Understanding the Problem.**


    Functions are self-contained pieces of code that you can *call* that do a specific
    thing.


    Does this sound at all familiar? Because we''ve been doing this the whole time
    with the built-in `print()` function.


    > Not to be confused with *statements* like `for` and `if`. Know a function because
    it has parenthesis right after the name that you can use to pass *arguments* to
    the function¬≤.


    The `print()` function has built-in functionality to print things on the screen.
    Thankfully (really, really) we don''t have to write that code ourselves. We can
    just say:


    ```

    print(23 + 34)

    ```


    and have `print()` do all the dirty work of getting us the answer printed to the
    screen.


    We''ve also used the `input()` function to get a string entered from the keyboard.


    ```

    name = input("Enter your name: ")

    ```


    This turns out to be a great way to simplify and organize code. Can you imagine
    if you had to put all the code in to print out something on the screen every time
    you wanted to print something? Much easier to *define* the `print()` function
    once, and then use it over and over again by calling it.


    We have an important principle in computer programming called the DRY principle¬≥
    (*Don''t Repeat Yourself*). If you can remove as much repetitive code as you can
    and move it to a function, that makes your code easier to read and maintain. DRY
    code is happy code.


    Not only can we use functions to make DRY code, we can also use them to organize
    our code into logical sections, even if a function is called only one time.


    It is clearer to have your functionality in discrete sections that you call in
    sequence rather than just having a single huge block of code that does everything.


    ### 10.4 Using Built-In Functions


    Problem-solving step: **Understanding the Problem.**


    Python has a *lot* of built-in functions that you can use. It''s not necessary
    to memorize the usage in detail (you can always look up the details), but it''s
    a good idea to skim their descriptions just so you can recall that they exist.


    We''ve already used `print()` and `input()` quite a bit, but there are plenty
    more. Look them up online‚Å¥.


    Here are some common ones, though this is not an exhaustive list:


    ¬≤Purists will point out exceptions to this, like with `__add__()`, but let''s
    skip that for now.

    ¬≥https://en.wikipedia.org/wiki/Don%27t_repeat_yourself

    ‚Å¥https://docs.python.org/3/library/functions.html


    | Built-in Function | Description |

    |---|---|

    | abs() | Return the absolute value of a number. |

    | bin() | Return a string representing the number in binary. |

    | chr() | Return a character for the Unicode (and ASCII) value passed in. |

    | dir() | Return a list of methods on this object. |

    | enumerate() | Return an iterator over a list of (index, value) pairs. |

    | filter() | Repeatedly run a function on items of a list filtering some out.
    |

    | float() | Convert a number or string to a floating-point value. |

    | help() | Get help on a data type. |

    | hex() | Return the hexadecimal representation of a number. |

    | input() | Get input from the keyboard and return that string. |

    | int() | Convert a floating point or string to an integer value. |

    | isinstance() | Return true if an object is an instance of a class. |

    | len() | Return the length of an iterable, like a list or string. |

    | map() | Run a function on every value in an iterable, returning the results.
    |

    | max() | Return the maximum of the arguments or of an iterable. |

    | min() | Return the minimum of the arguments or of an iterable. |

    | ord() | Return the Unicode value (code point) for a given character. |

    | pow() | Return a base value raised to an exponent. |

    | print() | Print to the console. |

    | range() | Return an iterator that runs over a range of values. |

    | reversed() | Return an iterator over a reversed version of the argument. |

    | round() | Round a number to the nearest whole number. |

    | sorted() | Return a sorted version of an iterable. |

    | str() | Convert a value to a string. |

    | sum() | Return the sum of all arguments and/or of an iterable. |

    | super() | Get access to an object''s superclass. |

    | zip() | Merge parallel lists into a dictionary. |


    These are all available for use at any time in your program.


    ### 10.5 Arguments


    > ‚ÄúOh look, this isn‚Äôt an argument.‚Äù

    ‚ÄúYes it is.‚Äù

    ‚ÄúNo it isn‚Äôt. It‚Äôs just contradiction.‚Äù

    ‚ÄúNo it isn‚Äôt.‚Äù

    ‚ÄîExcerpt from Monty Python‚Äôs Argument Clinic sketch


    Problem-solving step: **Understanding the Problem.**


    When you call a function, the things you put in the parentheses are called the
    *arguments* to the function. Arguments are separated by commas.


    ```

    print(2)        # 1 argument

    print(2, 3)     # 2 arguments

    print(2, 3, 4)  # 3 arguments

    print()         # 0 arguments

    ```


    The arguments are the way you can pass data *into* a function to have it operate
    on that data to produce a result.


    We refer to them by number, as well. ‚ÄúPass the number of goats in as the second
    argument to the function.‚Äù


    Functions often take a specific number of arguments. But, as we see above with
    `print()`, they can take variable numbers of arguments, too.


    ### 10.6 Writing Your Own Functions


    > ‚ÄúWhat do you like most about hacking?‚Äù


    ‚ÄúThe power.‚Äù


    ‚Äî*A good friend of mine trolling a reporter at DEFCON 2*


    The power. This is where we fly. Writing your own functions. This is where we
    get to DRY our code, organize it better, and make it more readable overall.


    Problem-solving step: **Understanding the Problem.**


    All programmers use their own functions heavily, and to great effect.


    Let‚Äôs say we want to write a program that adds 13 to a number, and then divides
    the resultant sum by 7.


    No problem. We got this. Let‚Äôs do it with 30.


    ```

    print((30 + 13) / 7)

    ```


    Great! Oh, and we also need it for 8, 19, 21, 37, 402, 516, 1024, and 3490.


    OK. Still no problem.


    ```

    print((30 + 13) / 7)

    print((8 + 13) / 7)

    print((19 + 13) / 7)

    print((21 + 13) / 7)

    print((37 + 13) / 7)

    print((402 + 13) / 7)

    print((516 + 13) / 7)

    print((1024 + 13) / 7)

    print((3490 + 13) / 7)

    ```


    Great! Oh, did I say ‚Äúdivide by 7‚Äù? I‚Äôm sorry, that should be ‚Äúmultiply by 7‚Äù.


    And here we get a taste of why DRY code is good code. Since the spec changed,
    we have to go back and modify all those lines of code to make them right.


    If only we hadn‚Äôt repeated ourselves, we might have been able to only change it
    in one place. This would also be better because we wouldn‚Äôt be taking the risk
    of missing a place we should have changed the code.


    But how to do it?


    With‚Ä¶ *FUNCTIONS*! Let‚Äôs write a function to do that math and return the result.
    Then we can just call it over and over, like this:


    ```

    print(do_the_math(30))

    print(do_the_math(8))

    print(do_the_math(19))

    ```'
