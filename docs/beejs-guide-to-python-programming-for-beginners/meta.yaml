    \nLet‚Äôs take another look at the sample output when the user enters 4:\n\n```\n\
    1   2   3   4\n2   4   6   8\n3   6   9   12\n4   8   12  16\n```\n\n(If you‚Äôre\
    \ rusty on your multiplication tables, what you do to multiply 3 √ó 4 is to look\
    \ up 3 along the top edge, then look up 4 along the left edge, and then look in\
    \ the table where they cross. There you‚Äôll find 12, the answer.)\n\nHow can do\
    \ we attack this? Let‚Äôs look at a couple of things.\n\nFirst, look for patterns.\
    \ See any?\n\nI‚Äôll wait while you look.\n\nThere are several in there.\n\n- The\
    \ diagonals read 1, then 2 2, then 3 4 3, then 4 6 6 4‚Ä¶ it‚Äôs symmetric.\n- The\
    \ first row is 1 2 3 4, and the second is 2 4 6 8, and the third is 3 6 9 12.\
    \ The first skips by 1, the second by 2, the third by 3.\n- Columns do the same\
    \ as rows in terms of numbers skipped.\n\nCan we use any of those to our advantage?\
    \ Maybe‚Ä¶!\n\nSecond, let‚Äôs try to simplify the problem.\n\nWhat if the problem\
    \ were to print:\n\n```\n1   2   3   4\n```\n\nand that‚Äôs all. How would you solve\
    \ that?\n\nWhat if it were to print only this:\n\n```\n3   6   9   12\n```\n\n\
    How would you solve that?\n\n> ***Fun Realism Fact:*** *There are a lot of ways\
    \ to program this. As I write this, at least four are immediately coming to mind.\
    \ Remember: **coding is creative** and there‚Äôre almost always many ways to get\
    \ the same result. Be creative! It‚Äôs your sandbox to mess around in! You can‚Äôt\
    \ break the computer.*\n\nProblem just some simple for loops, right? We could\
    \ do this with three for loops:\n\n```\n1   2   3   4\n2   4   6   8\n3   6  \
    \ 9   12\n```\n\nSomething like this (pseudocode):\n\n```\nfor i in range(1, 5,\
    \ 1): print(...)\nfor i in range(2, 10, 2): print(...)\nfor i in range(3, 15,\
    \ 3): print(...)\n```\n\nBut of course, we don‚Äôt just want to print rows three\
    \ times‚Ä¶ the end result is going to have the number of rows that the user input.\
    \ We need to loop to make it happen. A loop of loops! *A nested loop!*\n\nProblem-solving\
    \ step: **Devising a Plan.**\n\nBefore we jump into this, I‚Äôd like you to take\
    \ the time to think about this. Set a timer and work on it for 3 minutes.\n\n\
    Do it.\n\nOkay, I‚Äôm back. What did you come up with?\n\nI‚Äôll go over one solution\
    \ here, but if you came up with one and it‚Äôs different, don‚Äôt worry! There are\
    \ no wrong answers here. There are only answers that you, personally, like better\
    \ or worse than others. Part of being skilled in the art is that you can get better\
    \ at making these assessments as you progress.\n\nOne possible plan for this is\
    \ to have an *inner loop* (the *nested loop*) that prints a complete row out.\
    \ In other words, it‚Äôs printing out all the columns in the row. And then outside\
    \ of that, we have the *outer loop* that is responsible for printing out a bunch\
    \ of rows.\n\nAnd then inside there, we have to compute what values to print for\
    \ each row, based on which row we‚Äôre on.\n\nFirst, we have to get user input.\
    \ Let‚Äôs do that, and validate that it‚Äôs between 1 and 19 similar to the last project.\n\
    \n```\nwhile input isn't between 1 and 19:\n    ask the user for input\n```\n\n\
    After that, we‚Äôll print the table:\n\n```\nouter loop over rows:\n    inner loop\
    \ over columns:\n        print value for column\n```\n\nOf course, printing the\
    \ value for the column is the tricky bit.\n\nRemember when we did our sample with\
    \ three hardcoded loops, above?\n\n```\nfor i in range(1, 5, 1): print(...)\n\
    for i in range(2, 10, 2): print(...)\nfor i in range(3, 15, 3): print(...)\n```\n\
    \nSee any patterns in there? 1 2 3 is a pretty easy one. But what about that 5\
    \ 10 15? Clearly, it‚Äôs multiples of 5, but where does ‚Äú5‚Äù come from?\n\nIn that\
    \ example, we were printing rows and columns from 1 to 4. (That is, the user inputs\
    \ the number 4.) And 5 is one more than 4. That‚Äôs *a* pattern. Is it the right\
    \ one? Let‚Äôs try!\n\nIf we take the first 3 numbers in the ranges (that is, 1\
