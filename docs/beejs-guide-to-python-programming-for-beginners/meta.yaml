- md: "## Chapter 10. Functions\n\nIf we have *n* ships, we'll need an *n* by *n*\
    \ grid to be displayed to show all the distances between all of them. But how?\
    \ Think back to the loops chapter...\n\nYou can do it with a *nested loop*. The\
    \ outer one goes for *n* rows, and the inner one goes for *n* columns.\n\nFor\
    \ printing the number with 2 decimal places in a field of width 8, you can use\
    \ an f-string with some special formatting specifiers, for example:\n\n```\ndistance\
    \ = 99.99\nprint(f'{distance:8.2f}')    # prints \"   99.99\"\n```\n\nAll righty!\
    \ Let's print some stuff!\n\nProblem-solving step: **Carrying Out the Plan**\n\
    \n```\ndef print_grid(locations):\n    \"\"\"Print a grid of ship-to-ship distances.\"\
    \"\"\n\n    num_ships = len(locations)\n\n    for i in range(num_ships):\n   \
    \     for j in range(num_ships):\n            dist = 99.99\n            print(f'{dist:8.2f}',\
    \ end=\"\")\n        print()\n\nlocations = get_ship_locations()\nprint_grid(locations)\n\
    ```\n\nRunning that gives:\n\n```\nEnter ship location x,y,z (or \"done\"): 1,2,3\n\
    Enter ship location x,y,z (or \"done\"): 4,5,6\nEnter ship location x,y,z (or\
    \ \"done\"): 7,8,9\nEnter ship location x,y,z (or \"done\"): done\n   99.99  \
    \  99.99    99.99\n   99.99    99.99    99.99\n   99.99    99.99    99.99\n```\n\
    \nHey, a nice 3x3 grid for our 3 ships!\n\nNext, let's put the ship row number\
    \ just to the left of each row. Just editing the *for*-loop here:\n\n```\n   \
    \ for i in range(num_ships):\n        print(f'{i:8}', end=\"\")    # <-- add this\n\
    \        for j in range(num_ships):\n            dist = 99.99\n            print(f'{dist:8.2f}',\
    \ end=\"\")\n        print()\n```\n\nWe printed it in field width 8 just for consistency\
    \ with the distance numbers. Output is now:\n\n```\n       0    99.99    99.99\
    \    99.99\n       1    99.99    99.99    99.99\n       2    99.99    99.99  \
    \  99.99\n```\n\nWhich is good! Now we just need a row on the top. How about another\
    \ loop before everything else to print out that row?\n\n```\n    # Add this loop:\n\
    \    for i in range(num_ships):\n        print(f'{i:8}', end=\"\")\n    print()\n\
    \n    for i in range(num_ships):\n        print(f'{i:8}', end=\"\")\n        for\
    \ j in range(num_ships):\n            dist = 99.99\n            print(f'{dist:8.2f}',\
    \ end=\"\")\n        print()\n```\n\nAnd we get this:\n\n```\n        0      \
    \ 1       2\n0   99.99   99.99   99.99\n1   99.99   99.99   99.99\n2   99.99 \
    \  99.99   99.99\n```\n\nEr, well, that's *almost* right. The top row is shifted\
    \ one column left. We need to stick 8 blank spaces in before it to scooch it over.\
    \ So let's just do it, using string multiplication to make us 8 spaces:\n\n```\n\
    print(\" \" * 8, end=\"\")    # <-- Add this\n\nfor i in range(num_ships):\n \
    \   print(f'{i:8}', end=\"\")\nprint()\n```\n\nAnd now we have this:\n\n```\n\
    \                0       1       2\n0   99.99   99.99   99.99\n1   99.99   99.99\
    \   99.99\n2   99.99   99.99   99.99\n```\n\nwhich is looking *right on*. Except\
    \ that all the distances are listed as 99.99. Let's get that out of there and\
    \ replace it with the real distance between the ships.\n\nProblem-solving step:\
    \ **Devising a Plan**\n\nDistance! We see the distance formula up there at the\
    \ top, repeated here:\n\n$d = \\sqrt{(x_0 - x_1)^2 + (y_0 - y_1)^2 + (z_0 - z_1)^2}$\n\
    \nHow do we turn that into code?\n\nWe could use `math.sqrt()` to get the square\
    \ root, and `math.pow()` to square the numbers.\n\nAnother option is to compute,\
    \ say, the difference in the X coordinates and then multiply that result by itself\
    \ to square it (since $x \\times x = x^2$).\n\nLet's code them both and then use\
    \ the one you like best.\n\nProblem-solving step: **Carrying Out the Plan**\n\n\
    Here's computing the distance between points p0 and p1 (both of which are lists\
    \ of X,Y,Z triples) using `math.pow()`:\n\n```\nd = math.sqrt(\n    math.pow(p0[0]\
    \ - p1[0], 2) +  # difference in Xs\n    math.pow(p0[1] - p1[1], 2) +  # difference\
    \ in Ys\n    math.pow(p0[2] - p1[2], 2)    # difference in Zs\n)\n```\n\nAnd here's\
    \ option two:\n\n```\ndx = p0[0] - p1[0]   # difference in the Xs\ndy = p0[1]\
    \ - p1[1]   # difference in the Ys\ndz = p0[2] - p1[2]   # difference in the Zs\n\
    \nd = math.sqrt(dx*dx + dy*dy + dz*dz)\n```\n\nWhich do you prefer? Both should\
    \ give equivalent answers.\n\nNow, sure, we could just throw that equation in\
    \ the middle of our code, but this is actually ripe to be made into its own function!\
    \ If we do that, we can reuse it easily later, should we ever want to. Let's wrap\
    \ it up and add it to our file:\n\n```\ndef dist3d(p0, p1):\n    \"\"\"Return\
    \ the Euclidean distance between 2 3D points.\"\"\"\n\n    # Compute the difference\
    \ in the Xs, Ys, and Zs\n    dx = p0[0] - p1[0]\n    dy = p0[1] - p1[1]\n    dz\
    \ = p0[2] - p1[2]\n\n    # Compute the distance. (Remember that multiplying a\
    \ number by\n    # itself is the same as squaring the number.)\n    return math.sqrt(dx*dx\
    \ + dy*dy + dz*dz)\n```\n\nAnd then we can mod our code where we hardcoded that\
    \ 99.99 and have it call the distance formula instead! We just need to pass in\
