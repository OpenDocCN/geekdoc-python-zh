    \    {mother_name} ({mother_born_date})')\nprint(f'    {father_name} ({father_born_date})')\n\
    ```\n\nThat‚Äôs it!\n\nProblem-solving step: **Looking Back**\n\nWhat could we do\
    \ better? What are the shortcomings of this app?\n\nLook at the dictionary structure\
    \ we used to store the data. How could that be better? Think of all the cases\
    \ that exist in family trees. Sure, we covered the common case, but what about\
    \ kids who were adopted? How do we model that? Divorces? Second marriages? It\
    \ turns out that modeling a family tree is far more complex than you might originally\
    \ anticipate.\n\nWhat if two people have the same name? In a real family tree,\
    \ it‚Äôs entirely likely there could be multiple Tom Jones‚Å∏ in the family tree.\
    \ But since we‚Äôre using the name as the key in the dict, and keys have to be unique,\
    \ we‚Äôre in trouble. Ergo, the name can‚Äôt be the key‚Äîsomething unique must be.\n\
    \nOne option there is to use a UUID‚Åπ as the key, and map that UUID to names somehow.\
    \ Maybe you have *another* dict that, for a given name, stores a list of UUIDs\
    \ that represent people who have that name. Then we could ask the user, ‚ÄúDid you\
    \ mean the Beej Jorgensen who was born in 1971, 1982, 1997, or 2003?‚Äù if there\
    \ were multiple Beej Jorgensens. (You can create a random UUID by importing the\
    \ uuid package and running uuid.uuid4().)\n\nLots of options for improvement,\
    \ here!\n\n(Solution¬π‚Å∞.)\n\n## 9.13 Exercises\n\n**Remember: to get your value\
    \ out of this book, you have to do these exercises.** After 20 minutes of being\
    \ stuck on a problem, you‚Äôre allowed to look at the solution.\n\nUse any knowledge\
    \ you have to solve these, not only what you learned in this chapter.\n\n**Always**\
    \ use the four problem-solving steps to solve these problems: understand the problem,\
    \ devise a plan, carry it out, look back to see what you could have done better.\n\
    \n1.  For the following dictionary, print out all the keys of the dictionary:\n\
    \n```\nd = {\n    \"key1\": \"value1\",\n    \"key2\": \"value1\",\n    \"key3\"\
    : \"value1\",\n    \"key4\": \"value1\",\n}\n```\n\n(Solution<sup>11</sup>.)\n\
    \n2.  For the dictionary in problem 1, print out all the keys and values.\n\n\
    (Solution<sup>12</sup>.)\n\n3.  Given a list of names, write code that converts\
    \ that list of names into a dictionary that groups names by their first letter.\
    \ In the dict, the key should be the first letter of the names, and the value\
    \ should be a list of names that start with that letter.\n\nFor example, the list:\n\
    \n```\n[\"Chris\", \"Annie\", \"Beej\", \"Aaron\", \"Charlie\"]\n```\n\nshould\
    \ build into the dictionary (key order doesn't matter):\n\n```\n{\n    \"C\":\
    \ [\"Chris\", \"Charlie\"],\n    \"A\": [\"Annie\", \"Aaron\"],\n    \"B\": [\"\
    Beej\"]\n}\n```\n\nI don't want you to manually convert the list to a dictionary;\
    \ I want you to write code that does it for *any* list of names.\n\nAfter you\
    \ construct the dictionary, print out the keys and values in any order.\n\n(Solution<sup>13</sup>.)\n\
    \n4.  Change step 5 to print out the keys in sorted order. And the lists in sorted\
    \ order after that.\n\n(Solution<sup>14</sup>.)\n\n## 9.14 Summary\n\nThat was\
    \ a heckuva chapter, wasn't it?\n\nWhen we learned about lists, we learned that\
    \ you could index data by number. But now with dicts, we can index data by any\
    \ constant data type at all, including numbers and strings.\n\nThis gives us more\
    \ flexibility in how we store data and how we look it up.\n\nWe learned about\
    \ accessing and setting elements in a dictionary, how to determine if a key is\
    \ in a dictionary, and how to iterate over dictionaries with `for`.\n\nNot only\
    \ that, but dicts have a bunch of built-in functionality you can reference to\
    \ manipulate and access the data stored within them.\n\nFinally, we saw that since\
    \ dictionary values can be any type of data, you can have dictionaries of dictionaries,\
    \ even! The only limit is your imagination.\n\nWhat other kinds of data can you\
    \ store in dictionaries?"
