  md: "Chapter 13. Reading Files\n\n128\n\nBut what if you have a file that‚Äôs 200\
    \ GB of data? You (probably, as of this writing in 2020) don‚Äôt have that much\
    \ memory. How can you deal with big files like this?\n\nThe answer is to read\
    \ them a little bit at a time.\n\nWith text files like this, a common thing to\
    \ do is to read them a *line* at a time. Then you process that line, and then\
    \ move on to the next one. This way you only need to have a single line from the\
    \ file in memory at once, instead of the whole 200 GB worth.\n\nLet‚Äôs use the\
    \ `with` statement to open a file, and then read a line at a time.\n\n```\nline_num\
    \ = 1\nwith open(\"wargames.txt\") as f:\n    for line in f:\n        print(f'{line_num}:\
    \ {line}')\n        line_num += 1\n```\n\nAnd we get this output:\n\n```\n1: What\
    \ he did was great! He designed his computer so that it could learn\n\n2: from\
    \ its own mistakes. So, they'd be better the next time they played.\n\n3: The\
    \ system actually learned how to learn. It could teach itself!\n```\n\nPretty\
    \ neat, eh? We just get to use a `for` loop on the opened file to read one line\
    \ at a time.\n\nBut wait! Why is there an extra newline being printed out? What\
    \ are those blank lines between the lines?\n\nThis is a common beginner mistake.\
    \ The reason is that there is a newline at the end of every line of the file already\
    \ (because that‚Äôs where the line breaks are). And, in addition, `print()` adds\
    \ its own newline! So we get both of them printed.\n\nThe easiest workaround is\
    \ to use the `end` keyword argument on `print()` to stop it from adding a newline\
    \ of its own:\n\n```\nprint(f'{line_num}: {line}', end='')\n```\n\nAnother option\
    \ is to use `.rstrip()` on the string to strip newlines from the end.\n\n```\n\
    line = line.rstrip('\\r\\n')\n```\n\nThat‚Äôll strip carriage returns or newlines\
    \ from the right side of the string. We have to specify both since some OSes use\
    \ different characters to represent the end of the line, somewhat irksomely.\n\
    \nAn even-more-portable way to write this is to first:\n\n```\nimport os\n```\n\
    \nthen\n\n```\nline = line.rstrip(os.linesep)\n```\n\nand Python will automatically\
    \ use the proper end-of-line character no matter what system you‚Äôre running the\
    \ program on.\n\n# 13.7 Writing files\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nSo far we‚Äôve been dealing with getting data out of files,\
    \ but now let‚Äôs talk about creating a new file and writing data to them.\n\nThis\
    \ is how programs permanently save data that they need to use later. If you don‚Äôt\
    \ save the data to disk, then it all vanishes once the program exits."
