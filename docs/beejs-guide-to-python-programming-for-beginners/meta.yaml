  md: '# Chapter 12. Importing Modules


    So we need a ZipFile object that represents the ZIP file example.zip.


    That is, we know the ZIP is named example.zip, and we need to go from that to
    a ZipFile object. Once we have the ZipFile object for example.zip, we can call
    printdir().


    OK. So how do we do that? Time to get back to skimming docs! How do I create a
    ZipFile object?


    Skim now!


    We saw earlier this was the class:


    ```

    zipfile.ZipFile

    ```


    And a bit farther down, we have:


    ```

    {.py} class zipfile.ZipFile(file, mode=''r'', compression=ZIP_STORED, allowZip64=True,
    compresslevel=None, *, strict_timestamps=True)

    Open a ZIP file, where file can be a path to a file (a string), a file-like object
    or a path-like object.

    ```


    Recognize that? It''s a *constructor*!! That''s what we want! We want to construct
    a ZipFile object from the string example.zip, and that''s exactly what this does
    for us.


    Continuing down, I''m not seeing anything else that helps us make a ZipFile object,
    so let''s pursue this plan.


    +   1. Import the ZIP file functionality.

    2. Create a ZipFile object from example.zip.

    3. Print the table of contents with printdir() on that ZipFile object.


    Let''s go!


    Problem-solving step: **Carrying Out the Plan**


    ```

    import zipfile

