    You can also embed double quotes in double-quoted strings (or single quotes in
    single-quoted strings by putting a backslash character in front of them (\) .
    This is called *escaping* the character, which means ‚ÄúHey, Python, treat this
    like a literal quote mark‚Äîjust print a quote mark out,‚Äù as opposed to ‚ÄúHey, Python,
    this is the end of the string.‚Äù


    ```

    ''Beej\''s string''       # Equivalent to the example, above

    "Beej says, "hi!""

    ```


    Strings are commonly used when:


    +   - Printing out characters on the screen

    - Reading from the keyboard with `input()`

    - Reading/writing data from/to files (called *File I/O*, short for *File Input/Output*).

    - Network I/O


    # 7.4 Creating Strings


    Problem-solving step: **Understanding the Problem.**


    Strings are generally created one of two ways:


    +   - by declaring a *string constant*

    - getting a string back from a function


    The former we‚Äôve already seen. Here‚Äôs another example of a string constant:


    ```

    x = "This is a constant string!"

    ```


    But we‚Äôve also already seen functions that produce strings:


    ```

    y = input("Enter a string: ")

    ```


    `input()` returns a string that gets stored in `y`.


    But wait‚Äîthere‚Äôs clearly a constant string there, as well! The prompt "Enter a
    string:" is a string! Strings everywhere!


    Later we‚Äôll learn about file and network I/O and how they‚Äôre used with strings
    and other data types. But for now, we‚Äôll stick to some basics.


    # 7.5 Converting Other Types To Strings and Vice Versa


    Problem-solving step: **Understanding the Problem.**


    We‚Äôve already mentioned this in a previous chapter, but it‚Äôs worth covering again
    as a review.


    You can convert a lot of other types to strings with the `str()` function. We‚Äôll
    see how to make use of this later.


    Examples:


    ```

    x = str(3490)    # "3490"

    y = str(3.14159) # "3.14159"

    z = str("Hi!")    # "Hi!" (does nothing, since "Hi!" was already a string!)

    ```


    Likewise, you can convert from strings to other types, like `int` and `float`
    with those respective functions:


    ```

    x = int("3490")          # Integer 3490

    y = float("3.14159")     # Float 3.14159

    ```


    In this way, if you have a string with a number in it, you can convert it to a
    numeric value so that you can perform math on it.'
