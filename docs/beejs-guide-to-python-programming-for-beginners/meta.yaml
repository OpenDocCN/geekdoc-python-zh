    \ and actually make the exception handler do all the work for us by simply raising\
    \ a ValueError exception if the total_count is less than one. Then we'll get a\
    \ ValueError in both cases, and we can handle it in one place.\n\n```\n9 try:\n\
    10     total_count = int(sys.argv[2])\n11 \n12     if total_count < 1:\n13   \
    \      raise ValueError()\n14 \n15 except ValueError:\n16     print(\"head.py:\
    \ count must be a positive integer\")\n17     sys.exit(2)\n```\n\nCheck that out.\
    \ If int() raises the exception, we catch it. And if we raise the exception ourselves,\
    \ we also catch it. Plus all the logic for testing the input value for correctness\
    \ is all in the same try block, nicely.\nOK! We have the code getting the correct\
    \ input. Let's go on to the next step and print lines from the file.\nWe can start\
    \ by simplifying the problem to just print all the lines and not worrying about\
    \ the count for now.\nLet's take our code from before for printing out a file:\n\
    \n```\n19 with open(filename) as f:\n20     for line in f:\n21         print(line,\
    \ end=\"\")\n```"
- md: "## Chapter 14. Exceptions\n\nIf we run the program, passing in an existing\
    \ file, we see all the lines of that file printed out.\nBut what if we pass in\
    \ the name of a non-existent file?\nLet's try it!\n\n```\n$ python head.py nosuchfile.txt\
    \ 5\nTraceback (most recent call last):\n  File \"foo.py\", line 19, in <module>\n\
    \    with open(filename) as f:\nFileNotFoundError: [Errno 2] No such file or directory:\
    \ 'nosuchfile.txt'\n```\n\nBammo! Another exception! This time it's `FileNotFoundError`.\n\
    Let's try it on a directory:\n\n```\n$ python head.py / 5\nTraceback (most recent\
    \ call last):\n  File \"foo.py\", line 19, in <module>\n    with open(filename)\
    \ as f:\nIsADirectoryError: [Errno 21] Is a directory: '/'\n```\n\nAn `IsADirectoryError`\
    \ exception!\nLet's try it on a file we don't have permission to read:\n\n```\n\
    $ python head.py noperm.txt 5\nTraceback (most recent call last):\n  File \"foo.py\"\
    , line 19, in <module>\n    with open(filename) as f:\nPermissionError: [Errno\
    \ 13] Permission denied: 'noperm.txt'\n```\n\nYet another exception: `PermissionError`.\n\
    One option we have here is to specifically catch all these exceptions:\n\n```\n\
    try:\n    with open(filename) as f:\n        for line in f:\n            print(line,\
    \ end=\"\")\n\nexcept (FileNotFoundError, IsADirectoryError, PermissionError):\n\
    \    print(f'head.py: error reading file {filename}')\n```\n\nAnd that works.\n\
    But I have a bit of insider knowledge that we can use. All of those exceptions\
    \ are derived from `IOError`. We can see that in the list of built-in exceptions[^5].\n\
    You can see, there are a lot of exceptions that are `IOError`s. Instead of catching\
    \ them individually, an option is to just catch `IOError` and print out an appropriate\
    \ error message. This has the benefit of catching *all* those errors that `file()`\
    \ might raise. It also has the drawback of not being able to easily differentiate\
    \ between them. So how can we print an appropriate error for each one?\nLuckily,\
    \ `IOError` has a handy attribute in it called `strerror` that gives a nice human-readable\
    \ error message that describes what went wrong. We could print that.\nSo let's\
    \ just catch the `IOError` exception and print its error message out.\n\n```\n\
    try:\n    with open(filename) as f:\n        for line in f:\n            print(line,\
    \ end=\"\")\nexcept IOError as e:\n    print(f'head.py: {filename} {e.strerror}')\n\
    ```\n\n[^5] https://docs.python.org/3/library/exceptions.html\n\nAnd when we run\
    \ it, we get some nice error message for whatever error case we get:\n\n```\n\
    $ python head.py noperm.txt 5\nhead.py: noperm.txt Permission denied\n\n$ python\
    \ head.py / 5\nhead.py: / Is a directory\n\n$ python head.py nofile.txt 5\nhead.py:\
    \ nofile.txt No such file or directory\n```\n\nPretty neat!\n\nWhat's left? Oh\
    \ yeah‚Äîwe have to actually implement the functionality to only show the first\
    \ however-many lines of the file.\n\nThere are a couple of approaches to this.\n\
    \nOne, we could use a while loop and test for the end of the file *or* reaching\
    \ the required count, whichever comes first.\n\nThat would be fine. But a more\
    \ straightforward option might be to just jump out of the loop when the counter\
    \ gets high enough. The break statement can be used to bail out of a loop partway\
    \ through.\n\n```\nline_count = 0  # Number of lines we've read so far\n\ntry:\n\
    \    with open(filename) as f:\n        for line in f:\n\n            line_count\
    \ += 1\n\n            if line_count > total_count:\n                break\n\n\
    \            print(line, end=\"\")\n\nexcept IOError as e:\n    print(f'head.py:\
    \ {filename} {e.strerror}')\n```\n\nAs you see, we're keeping track of the number\
    \ of lines read so far, and if that exceeds our magic target number, we just break\
    \ straight out of the loop and we're done.\n\nAnd it works!\n\n```\n$ python head.py\
    \ rocks.txt 3\nmarble\ncoal\ngranite\n```\n\nSuper-robust against bad input and\
    \ errors. This is what we call *defensive coding*, when you prepare for the worst\
    \ and handle those cases without crashing. It's a good strategy because not only\
    \ does it make your program more capable of handling errors, but it also makes\
    \ you stop and consider what the errors are that might occur in the first place.\
    \ And, as we've said, hours of debugging can save you minutes of planning.\n\n\
    (Solution<sup>6</sup>.)\n\n<sup>6</sup>https://beej.us/guide/begpython/source/examples/head.py\n\
    \n## 14.17 Exercises\n\n1. When we run this code, it prints out ‚ÄúException‚Äù instead\
    \ of ‚ÄúDivision by Zero‚Äù. Why? What can we do, without deleting any code, to get\
    \ it to print ‚ÄúDivision by zero‚Äù?\n\n```\ntry:\n    x = 3490 / 0\nexcept Exception:\n\
    \    print(\"Exception\")\nexcept ZeroDivisionError:\n    print(\"Division by\
    \ Zero\")\n```\n\n(Solution‚Å∑.)\n\n2. Write a function that takes a list of numbers,\
    \ and two integers as index values. The function should return the sum of the\
    \ two numbers in the list at the two given indexes.\n\nCatch the specific exception\
    \ that is raised if the list indexes are out of range. Print an appropriate error.\n\
    \nHint: to see which exception is raised if the list indexes are out of range,\
    \ run the code *without* a try-except block and see what it prints when it bombs.\
    \ Then add a try-except for that exception.\n\n(Solution‚Å∏.)\n\n3. Write a function\
    \ that accepts a list of three numbers and returns the sum. If the list does not\
    \ contain three numbers, raise a `InvalidListSize` exception. (Note that this\
    \ exception doesn‚Äôt exist‚Äîyou‚Äôll have to write it.)\n\nAlso write an exception\
    \ handler that catches the exception if it is thrown.\n\n(Solution‚Åπ.)\n\n## 14.18\
    \ Summary\n\nA new big concept in this chapter with exceptions. It‚Äôs a technique\
    \ we haven‚Äôt used it before to catch errors, but is a powerful one to add to your\
    \ skillset.\n\nWe compared and contrasted error handling via return values with\
    \ error handling with exceptions, writing programs that could catch exceptions\
    \ and handle them, and also wrote programs that generate our own, new exceptions.\n\
    \nAdditionally, we learned how flow control works around exception handling, with\
    \ the `else` and `finally` clauses.\n\nAny time you learn a new basic way of doing\
    \ something, it‚Äôs difficult to wrap your head around at first. But enough practice\
    \ with it, and I guarantee after a while it will become second nature.\n\n## Chapter\
    \ 15\n\n## Appendix A: Basic Math for Programmers\n\nI know what you‚Äôre thinking:\
    \ *screw this*.\nOr maybe your language is even more blue.\nBut bear with me for\
    \ just a moment. Knowing a few basic mathematical operations can really help you\
    \ be a better developer, as well as help you understand code that you come across.\n\
    This section isn‚Äôt so much about application of these functions, but is more about\
    \ their definition. It‚Äôll be up to you to use them as you see fit.\nIt‚Äôs a short\
    \ one‚Äîjust plow through it.\n**Fun Math Fact:** Math is cool.\n\n## 15.1 Arithmetic\n\
    \nAddition, subtraction, multiplication, and‚Äîdon‚Äôt fall asleep on me already‚Äîdivision.\
    \ The *Big Four* of grade school math.\nAnd, as a quick terminology summary:\n\
    \n- The addition of two numbers produces a *sum*.\n- The subtraction of two numbers\
    \ produces a *difference*.\n- The multiplication of two numbers produces a *product*.\n\
    - The division of two numbers produces a *quotient* (and potentially a *remainder*.)\n\
    \nI‚Äôm not going to talk about what the operators do, and will presume you remember\
    \ that from however-many years ago.\nBut I do want to talk about which comes first,\
    \ because you might have forgotten.\nWhat do I mean by that?\nTake this expression:\
    \ 1 + 2 √ó 3\nIf we first add 1 + 2, we get 3. And then we multiply it by 3 and\
    \ we get the answer of 9.\nBut wait! If we first multiply 2 √ó 3 and get 6, then\
    \ we add 1 we get an answer of 7!\nSo‚Ä¶ which is it? 9 or 7?\nWhat we need to know\
    \ is the *order of operations* or the *precedence* of one operator over another.\
    \ Which happens first, + or √ó?\nFor arithmetic, here is the rule: do all the multiplications\
    \ and divisions *before* any additions and subtractions.\n\nSo: 1 + 2 √ó 3 = 7\n\
    We‚Äôll revisit order of operations as we continue on.\nIn Python, we can just use\
    \ the operators +, -, *, and / for addition, subtraction, multiplication, and\
    \ division, respectively.\n\n## 15.2 Division in Python\n\nHey‚Äîdidn‚Äôt we just\
    \ talk about this?\nYes, kinda. There are a few *details* that are of interest.\n\
    Let‚Äôs divide!\n\n```\nprint(3 / 2)   # 1.5, as expected\n```\n\nWhat we‚Äôve done\
    \ there is a floating point division. That is, it produces a floating point result\
    \ with a decimal point. Indeed, even this does the same:\n\n```\nprint(2 / 1)\
    \   # 2.0\n```\n\nSo that‚Äôs the ‚Äúnormal‚Äù way of division, right? No big surprises\
    \ there.\nBut what if I told you *there is no spoon*¬π?\nOkay, that‚Äôs a bit much.\
    \ Never mind that analogy.\nBut there is another kind of division, one that produces\
    \ an integer result only. *Integer division* uses the // operator (two slashes\
    \ instead of just one). It returns an integer result in all cases, even if normally\
    \ there would be a fraction.\nIt does this by simply dropping the part after the\
    \ decimal point like a hot potato.\n\n```\nprint(9 / 5)   # 1.8\nprint(9 // 5)\
    \  # 1\n```\n\nWhen you want an integer quotient, this is the fast way to do it.\n\
    \n## 15.3 Modulo, AKA Remainder\n\nSo when you do an integer division, it just\
    \ cuts off the fractional part after the decimal point. What happens to it? Where\
    \ does it go? If a tree falls in the forest and no one is around to hear it‚Ä¶?\n\
    Well, it‚Äôs gone forever, but there‚Äôs a way to see what it *would* have been in\
    \ the form of a *remainder*.\nThe remainder tells us how much is ‚Äúleft over‚Äù after\
    \ the integer division has taken place.\nIn the following examples, we‚Äôll use\
    \ √∑ to represent integer division.\nFor example, if we take 40 and divide it into\
    \ 4 parts, 40 √∑ 4, we get a result of 10, exactly. Because it‚Äôs exact, there are\
    \ no leftovers. So the remainder is zero.\nBut if we take 42 and divide it into\
    \ 4 parts‚Ä¶ well, 42 √∑ 4 = 10 still. But it‚Äôs not exact. If we do the inverse and\
    \ multiply 10 √ó 4, we only get 40, not 42. There are 2 left over. The remainder\
    \ is 2!\nWe do this with the *modulo* operator, or *mod* for short.\n42 √∑ 4 =\
    \ 10\n42 mod 4 = 2 The remainder!\nAnd in Python, the % operator is the modulo\
    \ operator.\n\n```\nprint(42 // 4)  # 10\nprint(42 % 4)   # 2\n```\n\n¬πhttps://www.youtube.com/watch?v=XO0pcWxcROI"
