    ¬π¬π https://beej.us/guide/bgpysource/examples/ex_sliceat.py\n\n# Á¨¨8Á´Ý\n\n## ÂàóË°®\n\
    \n### 8.1 ÁõÆÊÝá\n\n- ÁêÜËß£ÂàóË°®ÊòØ‰ªÄ‰πà\n- ÁêÜËß£ÂèØÂèòÁ±ªÂûãÁöÑËµãÂÄºÂ¶Ç‰ΩïÂ∑•‰Ωú\n- ËÆøÈóÆÂàóË°®‰∏≠ÁöÑÂçï‰∏™ÂÖÉÁ¥ÝÂíåÂàáÁâá\n- ‰ΩøÁî®`for`ÈÅçÂéÜÂàóË°®\n-\
    \ ‰ΩøÁî®Â∏∏ËßÅÁöÑÂàóË°®ÂÜÖÁΩÆÂáΩÊï∞\n- ÊûÑÈÄÝÂÖ∑ÊúâÈáçÂ§çÂõ∫ÂÆöÂÄºÁöÑÊñ∞Á©∫ÂàóË°®\n- ‰ΩøÁî®ÂàóË°®Êé®ÂØºÂºèÊûÑÈÄÝÊñ∞ÂàóË°®\n- ÊûÑÈÄÝÂíå‰ΩøÁî®ÂàóË°®ÁöÑÂàóË°®Ôºà‰∫åÁª¥ÂàóË°®Ôºâ\n\n### 8.2\
    \ Á´ÝËäÇÈ°πÁõÆËßÑËåÉ\n\nÊ∏∏ÊàèÊó∂Èó¥ÔºÅ\n\nÂÖÅËÆ∏Áî®Êà∑ÈÄöËøáËæìÂÖ•ÊñπÂêëÔºàn„ÄÅs„ÄÅwÊàñeÔºâÊù•ÂØºËà™Ëø∑ÂÆ´„ÄÇ‰ªñ‰ª¨‰πüÂèØ‰ª•ËæìÂÖ•qÈÄÄÂá∫„ÄÇ\n\nËø∑ÂÆ´Â∫îËØ•ÁúãËµ∑Êù•ÂÉèËøôÊÝ∑ÔºåÂÖ∂‰∏≠`.`‰ª£Ë°®Áé©ÂÆ∂ÂèØ‰ª•ÁßªÂä®ÁöÑÁ©∫Èó¥Ôºå`#`‰ª£Ë°®Â¢ôÂ£Å„ÄÇ`@`Á¨¶Âè∑Ë°®Á§∫Áé©ÂÆ∂ÁöÑÂΩìÂâç‰ΩçÁΩÆ„ÄÇ\n\
    \nÊØèÊ¨°ÁßªÂä®ÂêéÔºåÈÉΩÂ∫îËØ•ÊòæÁ§∫Âú∞ÂõæÔºö\n\n```\n####################\n#...#..............#\n#...#..........#...#\n\
    #...#..........#...#\n#...#..........#...#\n#...#..@.......#...#\n#..............#...#\n\
    #..............#...#\n####################\n\nEnter a move (n,s,w,e,q):\n```\n\
    \nÂú®ÈòÖËØªÊú¨Á´ÝÊó∂ÔºåËØ∑ËÆ∞‰ΩèËøô‰∏™È°πÁõÆ„ÄÇ\n\n### 8.3 ‰ªÄ‰πàÊòØÂàóË°®Ôºü\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò**„ÄÇ\n\nËøòËÆ∞ÂæóÊôÆÈÄöÂèòÈáèÂ¶Ç‰Ωï‰øùÂ≠ò‰∏Ä‰∏™‰∏úË•øÂêóÔºüÂóØÔºå*ÂàóË°®*ÊòØÂèØ‰ª•‰øùÂ≠òÂæàÂ§ö‰∏úË•øÁöÑÂèòÈáè„ÄÇ\n\
    \n> **ÊúâË∂£ÁöÑÂàóË°®‰∫ãÂÆûÔºö** Â§ßÂ§öÊï∞ÂÖ∂‰ªñËØ≠Ë®ÄÂØπÂàóË°®Êúâ‰∏çÂêåÁöÑÁß∞ÂëºÔºöÂÆÉ‰ª¨Áß∞‰πã‰∏∫‚ÄúÊï∞ÁªÑ‚Äù„ÄÇÊòØÂêå‰∏ÄÂõû‰∫ã„ÄÇ\n\n‰ΩÜÊòØÁ≠âÁ≠â‚Äî‚ÄîÂ¶ÇÊûú‰∏Ä‰∏™ÂàóË°®ÂèØ‰ª•‰øùÂ≠òÂæàÂ§ö‰∏úË•øÔºåÊàë‰ª¨Â¶Ç‰ΩïÂå∫ÂàÜÔºüÊàëÂ¶Ç‰ΩïÂëäËØâPythonÊàëÊÉ≥Ë¶ÅÂàóË°®‰∏≠ÁöÑÁ¨¨‰∫å‰∏™‰∏úË•øÔºüÊàñËÄÖÁ¨¨‰∫î‰∏™‰∏úË•øÔºü\n\
    \nÂπ∏ËøêÁöÑÊòØÔºåËøôÂæàÂÆπÊòìÔºõÊàë‰ª¨Âè™ÈúÄË¶ÅÊåáÂÆöÂàóË°®‰∏≠‰øùÂ≠òÊàë‰ª¨ÊÉ≥Ë¶ÅÁöÑ‰∏úË•øÁöÑ*Á¥¢Âºï*„ÄÇ\n\nÊääÂÆÉÊÉ≥Ë±°Êàê‰∏ÄÊéíÈÇÆÁÆ±ÔºåÁºñÂè∑‰ªé0ÂºÄÂßãÔºåÁÑ∂ÂêéÊòØ1ÔºåÁÑ∂ÂêéÊòØ2Ôºå‰∏ÄÁõ¥ÊéíÂà∞Êàë‰ª¨Êã•ÊúâÁöÑÈÇÆÁÆ±Êï∞Èáè„ÄÇÊØè‰∏™ÈÇÆÁÆ±ÂèØ‰ª•‰øùÂ≠ò‰∏Ä‰∏™‰∏úË•øÔºå‰ΩÝÂèØ‰ª•ÈÄöËøáÁªôÂá∫ÈÇÆÁÆ±ÁºñÂè∑Êù•ÂºïÁî®ÂÆÉ„ÄÇ\n\
    \nËÆ©Êàë‰ª¨Áúã‰∏Ä‰∏™ÁÆÄÂçïÁöÑ‰æãÂ≠êÔºö\n\n```\nx = [10, 3, 7, 9]\n```\n\nËøôÊòØ‰∏Ä‰∏™ÂàóË°®„ÄÇÊàë‰ª¨Áü•ÈÅìÂÆÉÊòØ‰∏Ä‰∏™ÂàóË°®ÔºåÂõÝ‰∏∫ÂÆÉÂë®Âõ¥ÊúâÊñπÊã¨Âè∑„ÄÇÂÆÉÊòØ‰∏Ä‰∏™ÂåÖÂê´Âõõ‰∏™Êï¥Êï∞ÁöÑÂàóË°®„ÄÇ\n\
    \nËÆ©Êàë‰ª¨ÊâìÂç∞Âá∫ÂàóË°®‰∏≠ÁöÑÁ¨¨Èõ∂‰∏™ÂÖÉÁ¥Ý„ÄÇÊàë‰ª¨ÈÄöËøáÂú®ÂàóË°®ÂèòÈáèÂêçÂêé‰ΩøÁî®ÊñπÊã¨Âè∑Âπ∂Âú®Ëøô‰∫õÊã¨Âè∑ÂÜÖÁªôÂá∫Á¥¢ÂºïÊù•ÂÆûÁé∞„ÄÇËøôÁúãËµ∑Êù•ÁÜüÊÇâÂêóÔºüËøô‰∏éÊàë‰ª¨Áî®Êù•‰ªéÂ≠óÁ¨¶‰∏≤‰∏≠Ëé∑ÂèñÂçï‰∏™Â≠óÁ¨¶ÁöÑËØ≠Ê≥ïÁõ∏ÂêåÔºÅ\n\
    \n```\nprint(x[0])  # ÊâìÂç∞ 10\n```\n\n‰ª•ÂèäÁ¥¢Âºï‰∏∫2ÁöÑÂÖÉÁ¥ÝÔºö\n\n```\nprint(x[2])  # ÊâìÂç∞ 7\n```\n\
    \n‰ΩÝËøòËÆ∞ÂæóÂ≠óÁ¨¶‰∏≤Êúâ‰∏Ä‰∏™ÂæàÈÖ∑ÁöÑÊäÄÂ∑ßÔºå‰ΩÝÂèØ‰ª•‰ΩøÁî®Ë¥üÁ¥¢ÂºïÊù•ÂºïÁî®Â≠óÁ¨¶‰∏≤Êú´Â∞æÁöÑÂ≠óÁ¨¶ÂêóÔºüÊàë‰ª¨‰πüÂèØ‰ª•ÂØπÂàóË°®ÂÅöÂêåÊÝ∑ÁöÑ‰∫ãÊÉÖÔºÅ\n\n```\nprint(x[-1])  #\
    \ ÊâìÂç∞ 9ÔºåÂàóË°®Êú´Â∞æÁöÑÂÖÉÁ¥Ý\n```\n\nËÆ∞‰ΩèÔºåÁ¥¢Âºï‰ªéÈõ∂ÂºÄÂßãÔºåÂÜçÊ¨°Âº∫Ë∞ÉÔºåÂ∞±ÂÉèÂ≠óÁ¨¶‰∏≤‰∏ÄÊÝ∑„ÄÇ\n\nÁªßÁª≠‚Äú‰ΩÝ‰πüÂèØ‰ª•ÂØπÂ≠óÁ¨¶‰∏≤ÂÅöÁöÑ‰∫ãÊÉÖ‚ÄùËøô‰∏™‰∏ªÈ¢òÔºå‰ΩÝ‰πüÂèØ‰ª•ÂÉèÂàáÁâáÂ≠óÁ¨¶‰∏≤‰∏ÄÊÝ∑ÂàáÁâáÊï∞ÁªÑ„ÄÇ\n\
    \n```\na = [1, 2, 3, 4, 5]\n\nb = a[1:-1]  # ÂàáÁâáÔºåÈô§‰∫ÜÁ¨¨‰∏Ä‰∏™ÂíåÊúÄÂêé‰∏Ä‰∏™ÂÖÉÁ¥Ý\n\nprint(b)  # [2,\
    \ 3, 4]\n```\n\n‰ΩÝËøòÂèØ‰ª•*ËÆæÁΩÆ*Âçï‰∏™ÂÖÉÁ¥ÝÔºåËÄåÂàóË°®ÁöÑÂÖ∂‰ΩôÈÉ®ÂàÜ‰øùÊåÅ‰∏çÂèòÔºö\n\n```\nx[1] = 99\n\nprint(x[1])  #\
    \ Áé∞Âú®ÊâìÂç∞ 99\n```\n\nËøôÂºïÂá∫‰∫ÜÂàóË°®ÂíåÂ≠óÁ¨¶‰∏≤‰πãÈó¥ÁöÑ‰∏Ä‰∏™ÊòæËëóÂå∫Âà´Ôºö*ÂàóË°®ÊòØÂèØÂèòÁöÑ*„ÄÇ‰ΩÝÂèØ‰ª•Êõ¥ÊîπÂàóË°®‰∏≠ÁöÑÂçï‰∏™ÂÖÉÁ¥ÝÔºåËÄåÊóÝÈúÄÂàõÂª∫Êñ∞ÂàóË°®ÔºÅËÆ∞‰ΩèÂ≠óÁ¨¶‰∏≤Ôºå‰ΩÝ‰∏çËÉΩÊõ¥ÊîπÂÆÉ‰ª¨‚Äî‚Äî‰ΩÝÂè™ËÉΩÂàõÂª∫Êñ∞ÁöÑ„ÄÇ\n\
    \nËøôÊòØ‰∏Ä‰∏™ÂÖ≥ÈîÆÂå∫Âà´ÔºåÊàë‰ª¨Áé∞Âú®Â∞ÜËØ¶ÁªÜËÆ®ËÆ∫ÔºåÁ®çÂêé‰πü‰ºöÂÜçÊ¨°ËÆ®ËÆ∫„ÄÇËøôÊòØÊñ∞ÂºÄÂèëËÄÖÂõ∞ÊÉëÁöÑ‰∏Ä‰∏™‰∏ªË¶ÅÊù•Ê∫ê„ÄÇ\n\n### 8.4 ÂàóË°®ËµãÂÄº\n\n‰ΩÝËøòËÆ∞ÂæóÂú®ÂèòÈáèÁ´ÝËäÇ‰∏≠ÊàëË∞àÂà∞ÂèòÈáèËµãÂÄºÊòØÂ¶Ç‰ΩïÂ∑•‰ΩúÁöÑÂêóÔºüÂ¶ÇÊûúÈúÄË¶ÅÔºåËØ∑ÂõûÈ°æ‰∏Ä‰∏ã„ÄÇ\n\
    \n‰ΩÝÂΩìÊó∂ÊÉ≥Áü•ÈÅìÈÇ£Êúâ‰ªÄ‰πàÂÖ≥Á≥ªÂêóÔºü\n\nÂóØÔºåÊàë‰ª¨Â∞ÜÂÜçÊ¨°Êü•ÁúãÂÆÉÔºå‰ΩÜËøôÊ¨°ÊòØÂú®ÂàóË°®ÁöÑËÉåÊôØ‰∏ã„ÄÇ\n\nÊàë‰ª¨ÂàöÂàöÊèêÂà∞ÂàóË°®‰∏éÊï¥Êï∞‰∏çÂêåÔºåÂõÝ‰∏∫ÂàóË°®ÊòØÂèØÂèòÁöÑ„ÄÇÊàë‰ª¨ÂèØ‰ª•Êõ¥ÊîπÂÆÉ‰ª¨„ÄÇËøôÊúâ‰∏Ä‰∫õÊúâË∂£ÁöÑÂΩ±Âìç„ÄÇ\n\
    \nËÆ©Êàë‰ª¨ÁúãÁúãÂ≠óÁ¨¶‰∏≤‰∏éÂàóË°®„ÄÇ\n\n```\nx = \"Hello\"\ny = x\n```\n\nÂú®Ëøô‰∏™‰æãÂ≠ê‰∏≠ÔºåÊ≠£Â¶ÇÊàë‰ª¨‰πãÂâçÊâÄÂ≠¶ÁöÑÔºåÂÜÖÂ≠ò‰∏≠Êúâ‰∏Ä‰∏™Â≠óÁ¨¶‰∏≤\"\
    Hello\"ÔºåxÂíåyÈÉΩÊåáÂêëÂÆÉ„ÄÇ\n\nÂ≠óÁ¨¶‰∏≤ÊòØ‰∏çÂèØÂèòÁöÑ„ÄÇÊâÄ‰ª•‰ΩÝ‰∏çËÉΩËøôÊÝ∑ÂÅöÔºö\n\n```\nx = \"Hello\"\ny = x\n\n# Â∞ÜÁ¥¢Âºï2Â§ÑÁöÑÂ≠óÁ¨¶Êõ¥Êîπ‰∏∫'Z'\n\
    x[2] = \"Z\"  # ÈîôËØØÔºÅÂ≠óÁ¨¶‰∏≤ÊòØ‰∏çÂèØÂèòÁöÑ‚Äî‚Äî‰ΩÝ‰∏çËÉΩÊõ¥ÊîπÂÆÉ‰ª¨\n```\n\n‰ΩÜÂàóË°®ÊòØÂèØÂèòÁöÑ„ÄÇÊàë‰ª¨ÂèØ‰ª•Êõ¥ÊîπÂàóË°®‰∏≠ÁöÑÂÜÖÂÆπ„ÄÇËÆ©Êàë‰ª¨ÂÅö‰∏Ä‰∏™Á±ª‰ººÁöÑ‰æãÂ≠êÔºö\n\
    \n```\nx = [\"A\", \"B\", \"C\", \"D\"]\ny = x\n\n# Â∞ÜÁ¥¢Âºï2Â§ÑÁöÑÂ≠óÁ¨¶‰∏≤Êõ¥Êîπ‰∏∫'Z'\nx[2] = \"\
    Z\"  # ÊúâÊïà\n\nprint(x[2])  # \"Z\"\nprint(y[2])  # ‰πüÊòØ\"Z\"ÔºÅÔºÅÔºÅ\n```\n\nÁ≠âÁ≠â‚Äî‚ÄîÂèëÁîü‰∫Ü‰ªÄ‰πàÔºüÊàë‰ª¨Êõ¥Êîπ‰∫Üx‰∏≠Á¨¨‰∫å‰∏™Á¥¢ÂºïÁöÑÂÄºÔºå‰ΩÜÂÆÉ‰πüÂú®y‰∏≠Êõ¥Êîπ‰∫ÜÔºÅËøôÊòØÊÄé‰πàÂèëÁîüÁöÑÔºü\n\
