  - "[PAGE 56]\n\n# Chapter 8. Lists\n\nRemember our good friend the for loop? We\
    \ used it with range to loop a number of times, and we used it with strings to\
    \ loop over each character in the string.\n\nWe can also use it with lists¬≤ to\
    \ do things with each list element in order!\n\nHere‚Äôs a simple example that prints\
    \ all the elements in a list:\n\n```\nx = [11, 55, 33, 99]\n\nfor i in x:\n  \
    \  print(f\"element is: {i}\")\n```\n\nand this will output:\n\n```\nelement is:\
    \ 11\nelement is: 55\nelement is: 33\nelement is: 99\n```\n\nBut wait, there‚Äôs\
    \ more!\n\nRecall from above that you can get the element out of a list if you\
    \ know its index, for example, x[2].\n\nLet‚Äôs put those together in another way\
    \ to use for and lists. This example does the same thing as the one above, just\
    \ in a different way:\n\n```\nx = [11, 55, 33, 99]\n\nfor i in range(4):\n   \
    \ print(f\"element is: {x[i]}\")\n```\n\nAlthough that‚Äôs not idiomatic Python¬≥\
    \ (the first example is better), it demonstrates how to use a variable as the\
    \ index. We refer to x[i] inside the loop, and then have i change to loop over\
    \ every element‚Äôs index.\n\nIt‚Äôs irking me that we have that hard-coded 4 in the\
    \ range(). It only works for lists of length 4. Let‚Äôs see if we can fix it.\n\n\
    Sneak preview: you can get the number of elements in a list with len().\n\nLet‚Äôs\
    \ make the range() go up to ‚Äúthe length of the list‚Äù instead of to 4:\n\n```\n\
    x = [11, 55, 33, 99]\n\nfor i in range(len(x)):          # <---\n    print(f\"\
    element is: {x[i]}\")\n```\n\nAnd now that works for lists of any length‚Äîmuch\
    \ better!\n\n# 8.6 for and enumerate()\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nIn the examples above, we used for with the elements in the\
    \ list themselves, and also with range() over the indexes of the elements in the\
    \ list.\n\nWhat if you want to do both at the same time? That is, you want the\
    \ elements and you want the indexes?\n\nA function that‚Äôs worthy of mention is\
    \ enumerate(). It will iterate through each element in the list, returning the\
    \ element and its index. You can get them both at the same time!\n\n```\nx = [11,\
    \ 55, 33, 99]\n\nfor i, v in enumerate(x):\n    print(f\"The element at index\
    \ {i} has value {v}\")\n```"
