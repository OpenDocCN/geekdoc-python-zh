    on a blank line.

    - delete: Works like list, except deletes the line.

    - edit: Edits a single line, replacing it. If the line is out of range, an error
    message should be printed.

    - write: Saves the file to disk. If the filename wasn''t specified on the command
    line, the user must specify a filename after the w.

    - quit: exit the editor without saving the file.


