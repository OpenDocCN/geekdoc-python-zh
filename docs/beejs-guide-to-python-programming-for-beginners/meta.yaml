    # Chapter 16


    # Appendix B: The REPL


    # 16.1 What is the REPL?


    The REPL, pronounced *REP-…ôl*, is short for the *Read-Evaluate-Print Loop*.


    Great. I mean, truly, that‚Äôs awesome.


    But what does any of that mean?!


    Check this out. If you run python on the command line (or whatever your OS‚Äôs variant
    is), you‚Äôll end up with a prompt that looks like this:


    ```

    $ python

    Python 3.8.0 (default, Oct 23 2019, 18:51:26)

    [GCC 9.2.0] on linux

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    And it just sits there, waiting for you to type something.


    Actually, it‚Äôs *reading*. The *Read* part of REPL.


    So type something and hit RETURN!


    ```

    >>> print("Hello, world!")

    Hello, world!

    ```


    What happened after you hit RETURN was that Python *Evaluated* your expression,
    and the *Printed* the result. And then it printed another >>> prompt, because
    it‚Äôs doing this in a *Loop*! The REPL!


    This is a method you could use to quickly test out Python commands to see how
    they work. It‚Äôs not commonly used for development, but it is there if you find
    it convenient.


    Any time you see the >>> prompt, it‚Äôs waiting for another Python command.


    ```

    >>> a = 20

    >>> b = 30

    >>> c = a + b

    >>> print(c)

    50

    ```


    What about multi-line commands? Let‚Äôs try printing numbers in a loop:


    ```

    >>> for i in range(5):

    ...

    ```


    Wait! What‚Äôs that . . . prompt? That means Python is waiting for more. The fact
    that the previous line ended in a : indicates that a block is to follow it. So
    Python is waiting for a properly-indented block. (Hit RETURN on a blank line to
    exit the block. If you get stuck in . . . mode, just keep hitting RETURN until
    you get back out to the >>> prompt.)'
