  md: "Chapter 13. Reading Files\n\n127\n\nProblem-solving step: **Carrying Out the\
    \ Plan**\n\n```\n# Open the file\nf = open(\"wargames.txt\")\n\n# Read all data\
    \ from the file\ndata = f.read()\n\n# Close the file\nf.close()\n\n# Print out\
    \ the data we read earlier\nprint(data)\n```\n\nSome things to note:\n\n+   -\
    \ When we opened the file, we didn't specify read or write. In Python, it's ‚Äúread‚Äù\
    \ by default.\n- Notice that we close the file before we print anything. We didn't\
    \ *have* to, but it demonstrates how we now have a *copy* of the data in memory.\
    \ We can still use it, even though we've closed the file.\n\nSince we have a copy\
    \ of the data, we can do all kinds of stuff to change it.\n\nIf you modify the\
    \ last two lines to be:\n\n```\n# Print out the data we read earlier\nprint(data.upper())\n\
    ```\n\nwe'll get the output in uppercase. (But the original file is still lowercase,\
    \ of course!) It's our copy of the data to do with as we please!\n\n# 13.5 Opening\
    \ Files with with\n\nNow there is a more *canonical*<sup>4</sup> approach to reading\
    \ files using the `with` statement in Python.\n\nEarlier, we read a file\n\n```\n\
    f = open(\"wargames.txt\")\ndata = f.read()\nf.close()\nprint(data)\n```\n\nThe\
    \ equivalent using the `with` statement looks like this:\n\n```\nwith open(\"\
    wargames.txt\") as f:\n    data = f.read()\n    print(data)\n```\n\nIf you're\
    \ looking closely, you'll notice that the `f.close()` is missing. That's because\
    \ when you use `with` to open the file, that gets handled automatically for you!\
    \ Not only that but even if some error occurs, the file will be properly closed.\n\
    \nAlthough the pattern of open-read-close is really common in other languages\
    \ and Python supports it, the preferred way of doing things is with the fantastic\
    \ `with` statement.\n\n# 13.6 Reading Data a Line at a Time\n\nCheck this out:\
    \ in our previous examples, we read the entire file into memory at once. That's\
    \ what the `.read()` method does.\n\nFor small files, that's no problem.\n\n<sup>4</sup>Meaning,\
    \ the One Right-*ish* Way to do something."
