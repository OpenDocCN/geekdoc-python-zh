    # 13.2 Project


    Write a *line editor*.


    Back in the day, before terminals were very capable and before we had nice editors
    and IDEs like we do today, people used line editors. These were bare-bones file
    editors that used simple commands to edit files.


    For example:


    ```

    $ python lineedit.py foo.txt

    > l 1

    1: This is some text that was already in the file.

    > a 1

    This is some text that I''m appending to the file.

    And some more.

    .

    > l 1

    1: This is some text that was already in the file.

    2: This is some text that I''m appending to the file.

    3: And some more.

    > e 3

    And really some more.

    > l 1

    1: This is some text that was already in the file.

    2: This is some text that I''m appending to the file.

    3: And really some more.

    > d 2

    > l 1

    1: This is some text that was already in the file.

    2: And really some more.

    > w

    > q

    ```


    In the example, everything following a > prompt is a line editor command.


    In order:'
