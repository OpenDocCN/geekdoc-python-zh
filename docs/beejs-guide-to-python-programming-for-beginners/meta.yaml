    Eagle-eyed readers might notice that the 13th digit is always 4. That‚Äôs because
    there are different types of UUIDs, and this digit indicates the type. (This case
    it‚Äôs type 4, meaning random. Except for the 4.)


    You might also have noticed that, in addition to the numerals, only the letters
    ‚Äúa‚Äù through ‚Äúf‚Äù make an appearance. Surprise! UUIDs, except for the hyphens, are
    actually numbers! They‚Äôre written in a base-16 numbering system called *hexadecimal*.
    More on that in another chapter.


    UUIDs are good any time you want to create an ID that you can be confident isn‚Äôt
    already used by anyone, anywhere.


    You might wonder how you can be sure? I mean, there‚Äôs a chance someone else will
    choose that number, right?


    Yes, there is a chance. It‚Äôs:


    1 in 21,267,647,932,558,653,966,460,912,964,485,513,216.


    For comparison, the odds of winning the Mega Millions lottery jackpot are:


    1 in 258,900,000.


    So unless you‚Äôre worried about winning the lottery jackpot 82,146,187,456,773,479,978,605,303,068
    times, you shouldn‚Äôt be worried about someone choosing a duplicate UUID.


    And I wouldn‚Äôt say I‚Äôm *worried* I‚Äôd win the lottery that many times. More like
    *disappointed*.


