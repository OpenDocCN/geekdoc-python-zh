    # 11.8 More on Methods


    Problem-solving step: **Understanding the Problem**.


    Remember that methods are functions that are connected to the object. Just like
    you could think of attributes as things the object *has*, you can think of methods
    like things the object *does*.


    Let''s add another method to set the ship location.


    ```

    1  class StarShip:

    2      def __init__(self, name):  # The constructor

    3          self.name = name

    4          self.location = [0, 0, 0]  # <-- Add this

    5

    6      def set_location(self, x, y, z):

    7          """Set a ship''s location to x,y,z"""

    8

    9          self.location[0] = x

    10         self.location[1] = y

    11         self.location[2] = z

    12

    13 s0 = StarShip("MCRN Tachi")

    14

    15 print(s0.location)  # [0, 0, 0]

    16

    17 s0.set_location(10, 20, 30)

    18

    19 print(s0.location)  # [10, 20, 30]

    ```


    On line 6, we define our new method, `set_location()`. Importantly, notice the
    first parameter is `self`, which will be initialized to represent the object we''re
    setting the location of. (That is, when we call `s0.set_location()`, `self` will
    be set to refer to `s0` inside `set_location()`.)


    > **Fun Debugging Fact:** If you get an error about the incorrect number of arguments
    to your method, make sure you have `self` as the first parameter!


    Then on line 17, when we call `set_location()` on `s0`, `self` gets set to `s0`,
    and `x`, `y`, and `z` get set to 10, 20, and 30, respectively.


    Then we use `x`, `y`, `z`, and `self` inside the method to change the values in
    this ship''s location.


    This way, when we print it out on line 19, we see the new values there.


    Attributes!


    # 11.9 Pretty Printing


    Right now when we print one of our starship objects, Python prints something like
    this on the screen:


    ```

    <__main__.StarShip object at 0x7fa11828c8e0>

    ```'
