  md: 'But their unquenchable thirst for power didn‚Äôt end there. Mathematicians also
    decided that there was such a thing as *negative exponents*.


    If you have a negative exponent, you need to invert the fraction before applying
    the exponent. The following is true:


    $$4^{-3} = \left(\frac{1}{4}\right)^3$$


    $$\left(\frac{3}{4}\right)^{-8} = \left(\frac{4}{3}\right)^8$$


    And in case you‚Äôre wondering how to raise a fraction to an exponent, you just
    apply the exponent to the numerator and denominator:


    $$\left(\frac{4}{3}\right)^8 = \frac{4^8}{3^8} = \frac{65536}{6561}$$


    We also have some shorthand names for certain exponents.


    $n^2$ we say ‚Äú$n$ squared‚Äù. Anything raised to the power of 2 is that number *squared*.


    $n^3$ we say ‚Äú$n$ cubed‚Äù. Anything raised to the third power is that number *cubed*.


    In casual writing, you‚Äôll often see the caret character ^ used to indicate an
    exponent. So if someone writes 14^4, that‚Äôs the same as $14^4$.


    Lastly, precedence. We know that multiplication and division happen before addition
    and subtraction, but what about exponentiation?


    Here‚Äôs the rule: exponentiation happens before arithmetic.


    With $2 + 3^4$, we first compute $3^4 = 81$, *then* add 2 for a total of 83.


    # 15.7 Parentheses


    So what if you *want* to change the order of operations, like some kind of mathematical
    rebel?


    What if you have $1 + 2^3$ and you want $1 + 2$ to happen before the exponentiation?


    You can use parentheses to indicate that operation should occur first, like this:


    $$(1 + 2)^3$$


    With that, we first compute $1 + 2 = 3$, and then we raise that to the 3rd power
    for a result of 27.


    You could also do this:


    $$2^{(3+4)}$$


    Remember: parentheses first! $3 + 4 = 7$, so we want to compute $2^7$ which is
    128. (Good software developers have all the powers of 2 memorized up through $2^{16}$.
    Well, crazy ones do, anyway.)


    Python uses parentheses, as well. The above expression could be written in Python
    like this:


    ```

    2 ** (3+4)

    ```


    Easy peasy.


    One final note: if an exponent is a long expression without parentheses, it turns
    out the parentheses are *implied*. The following equation is true:


    $$2^{(3+4)} = 2^{3+4}$$'
