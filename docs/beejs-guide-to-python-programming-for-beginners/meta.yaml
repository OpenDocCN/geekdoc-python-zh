  md: 'Chapter 15. Appendix A: Basic Math for Programmers 163


    So: 1 + 2 √ó 3 = 7

    We‚Äôll revisit order of operations as we continue on.

    In Python, we can just use the operators +, -, *, and / for addition, subtraction,
    multiplication, and division, respectively.


    # 15.2 Division in Python


    Hey‚Äîdidn‚Äôt we just talk about this?

    Yes, kinda. There are a few *details* that are of interest.

    Let‚Äôs divide!


    ```

    print(3 / 2)   # 1.5, as expected

    ```


    What we‚Äôve done there is a floating point division. That is, it produces a floating
    point result with a decimal point. Indeed, even this does the same:


    ```

    print(2 / 1)   # 2.0

    ```


    So that‚Äôs the ‚Äúnormal‚Äù way of division, right? No big surprises there.

    But what if I told you *there is no spoon*¬π?

    Okay, that‚Äôs a bit much. Never mind that analogy.

    But there is another kind of division, one that produces an integer result only.
    *Integer division* uses the // operator (two slashes instead of just one). It
    returns an integer result in all cases, even if normally there would be a fraction.

    It does this by simply dropping the part after the decimal point like a hot potato.


    ```

    print(9 / 5)   # 1.8

    print(9 // 5)  # 1

    ```


    When you want an integer quotient, this is the fast way to do it.


    # 15.3 Modulo, AKA Remainder


    So when you do an integer division, it just cuts off the fractional part after
    the decimal point. What happens to it? Where does it go? If a tree falls in the
    forest and no one is around to hear it‚Ä¶?

    Well, it‚Äôs gone forever, but there‚Äôs a way to see what it *would* have been in
    the form of a *remainder*.

    The remainder tells us how much is ‚Äúleft over‚Äù after the integer division has
    taken place.

    In the following examples, we‚Äôll use √∑ to represent integer division.

    For example, if we take 40 and divide it into 4 parts, 40 √∑ 4, we get a result
    of 10, exactly. Because it‚Äôs exact, there are no leftovers. So the remainder is
    zero.

    But if we take 42 and divide it into 4 parts‚Ä¶ well, 42 √∑ 4 = 10 still. But it‚Äôs
    not exact. If we do the inverse and multiply 10 √ó 4, we only get 40, not 42. There
    are 2 left over. The remainder is 2!

    We do this with the *modulo* operator, or *mod* for short.

    42 √∑ 4 = 10

    42 mod 4 = 2 The remainder!

    And in Python, the % operator is the modulo operator.


    ```

    print(42 // 4)  # 10

    print(42 % 4)   # 2

    ```


    ¬πhttps://www.youtube.com/watch?v=XO0pcWxcROI'
