    # 19.6.1 Start with the Terminal


    We‚Äôre going to do this old-school. Programmers have been using the command line
    for over 10,000 years, and it has staying power for a reason.


    Launch a terminal and bring up a shell. You can use another shell if you want,
    but I‚Äôll be talking bash/zsh here.


    At the prompt, type the following commands, one per line:


    ```

    cd

    mkdir bgpython

    cd bgpython

    ls -la

    ```


    These commands do four amazing things:


    +   1. cd means *change directory*. (A directory is the same as a folder.) On
    a line by itself, it means ‚Äúchange to my *home directory*‚Äù.

    2. mkdir means *make directory*. We‚Äôre creating a new folder called bgpython.

    3. cd bgpython to change into that directory.

    4. ls -la to get a long directory listing (i.e. all the files in that folder.)


    At this point you should see something like this:


    ```

    $ ls -la

    total 0

    drwxr-xr-x   2 beej  staff    64 Nov 18 23:14 .

    drwxr-xr-x+ 123 beej  staff  3936 Nov 18 23:14 ..

    ```


    This is showing you all the files you have. Namely, there are two of them: . and
    .. These mean ‚Äúthis directory‚Äù and ‚Äúparent directory‚Äù, respectively. (You know
    how folders can be inside other folders? The outer folder is called the ‚Äúparent‚Äù
    folder, which is what the parent directory is. If you want to get back to your
    home directory from here, you can type cd ‚Ä¶)


    > You should think of the shell as ‚Äúbeing‚Äù in a certain directory at any particular
    time. You can cd into directories, or cd .. back into the parent, or cd to get
    to your home directory from anywhere. It‚Äôs like the folder you have open that
    has focus in a GUI.


    (The remaining information on each line tells you the permissions on the file,
    who owns it, how big it is, when it was modified, and so on. We can worry about
    that later.)


    Other than those there are no other files. We‚Äôll soon fix that! Let‚Äôs add a Python
    program and run it!


    # 19.7 Launching Your Code Editor


    Usually launching an editor to edit a file is as simple as typing the editor name
    directly followed by the filename on the command line.


    For example, to launch VS Code to edit the file hello.py:


    ```

    code hello.py

    ```


    But wait‚Äìisn‚Äôt VS Code a full-fledged IDE? Yes, it is. Another popular editor
    is Vim:


    ```

    vim hello.py

    ```


    But in any case, you‚Äôre in the editor and ready to type code.


    This is your canvas! This is where the magic happens!


    > If you get in Vim and have no idea how to get out, hit the ESC key and then
    type :q! and hit RETURN‚Äîthis will exit without saving. If you want to save and
    exit, hit ESC then type ZZ in caps.'
