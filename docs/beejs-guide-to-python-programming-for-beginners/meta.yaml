    \ done!\n```\n\nÂú®ÊâÄÊúâÊÉÖÂÜµ‰∏ãÔºå`finally` ‰ª£ÁÝÅÂùóÈÉΩ‰ºöËøêË°å„ÄÇ\nÂ¶ÇÊûúÈúÄË¶ÅÔºå‰ΩÝÂèØ‰ª•‰ΩøÁî®Ëøô‰∏™‰ª£ÁÝÅÂùóÊù•ÊâßË°åÁªàÁªìÊàñÊ∏ÖÁêÜ‰ª£ÁÝÅ„ÄÇ\n`try-except`\
    \ ÈùûÂ∏∏Â∏∏ËßÅ„ÄÇ`finally` Âàô‰∏çÈÇ£‰πàÂ∏∏ËßÅÔºå‰ΩÜ‰πüÂπ∂ÈùûÂÆåÂÖ®‰∏çÂ∏∏ËßÅ„ÄÇ\n\n## 14.12 What Else? else!\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò**\n\
    Â∞±Âú®‰ΩÝ‰ª•‰∏∫ `try-except-finally` Â∞±ÊòØÂÖ®ÈÉ®ÁöÑÊó∂ÂÄôÔºåÁªìÊûúÊàë‰ª¨ÂèØ‰ª•Âú®ÂÖ∂‰∏≠Ê∑ªÂäÝ‰∏Ä‰∏™ `else`ÔºåÂΩ¢Êàê `try-except-else-finally`„ÄÇ\n\
    ‰ΩÝÂèØËÉΩÊ∞∏Ëøú‰∏ç‰ºöÁúãÂà∞Ëøô‰∏™Ôºå‰ΩÜÊàëÊÉ≥Âú®ËøôÈáåÂø´ÈÄüÊèê‰∏Ä‰∏ã„ÄÇÂè™ÈúÄÁúã‰∏ÄÁúºÔºö\n\n```\ntry:\n    print(\"This is what we're trying\
