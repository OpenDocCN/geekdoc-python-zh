  md: '# Chapter 3


    # What software will I need?


    # 3.1 Objectives


    +   - Install Python, and explain what it does

    - Learn what an *Integrated Development Environment* (IDE) is.


    # 3.2 What Is All This?


    Python is a *programming language*. It interprets instructions that you, the programmer,
    give it, and it executes them. Think of it like a robot you can give a series
    of commands to ahead of time, and then have it run off and do them on its own.


    In programmer parlance, we call these sets of instructions *code*.


    In addition to being a programming language, Python is also a program, itself!
    It''s a program that runs other programs! We don''t have to worry about the details
    of that at all, except that since Python is a program, it''s something we''ll
    have to install on our computers.


    Python comes in different versions. The big versions are 2 and 3. We''ll be using
    Python 3 for everything in this book. Python 2 is older, and is rarely used in
    new projects.


    Python also comes with an *Integrated Development Environment*, or IDE. An IDE
    is a program that helps you write, run, and debug (remove the errors from) code.


    It''s main components are:


    +   - The *editor*. This is like a word processor except specifically designed
    for use with code.

    - The *debugger*. This helps you step through your code a line at a time and watch
    the data values change as you go. It can help you find places where your code
    is incorrect.

    - The *console* or *terminal*. This is a window where the output from your program
    appears (and where you might type input to the program).


    The name of Python''s built-in IDE is *IDLE*. There are other IDEs we''ll talk
    about later.


    # 3.3 Installing Python


    # 3.3.1 Windows


    There are two ways to do this:


    +   - Install from the Microsoft Store

    - Install from the official website


    I can''t see any disadvantage to installing it from the store. Just remember to
    install Python 3 (not Python 2).'
