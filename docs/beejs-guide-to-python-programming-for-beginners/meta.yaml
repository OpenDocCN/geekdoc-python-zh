    I''ll leave round_down() as an exercise. :)


    If you want to always round up to the next whole number instead of doing banker''s
    rounding, you can use this trick: add 0.5 to the number and then convert it to
    an int(). (If the number is negative, subtract 0.5 from it.)


    ```

    int(0.5 + 0.5)   # 1

