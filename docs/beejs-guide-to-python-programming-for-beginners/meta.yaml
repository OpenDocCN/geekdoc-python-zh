    \n## 15.11 ÂØπÊï∞\n\nÂùöÊåÅ‰ΩèÔºåÂõÝ‰∏∫‰∫ãÊÉÖË¶ÅÂèòÂæóÊúâÁÇπÂ•áÊÄ™‰∫Ü„ÄÇ\nÂóØÔºå‰∏çÊòØ*Â§™*Â•áÊÄ™Ôºå‰ΩÜÁõ∏ÂΩìÂ•áÊÄ™„ÄÇ\nÂØπÊï∞ÔºåÁÆÄÁß∞*log*ÔºåÂú®ÊüêÁßçÁ®ãÂ∫¶‰∏äÊòØÊåáÊï∞ÁöÑÈÄÜËøêÁÆó„ÄÇ\n\
    ‰ΩÜ‰∏çÂÉèÂπ≥ÊñπÊÝπÈÇ£ÊÝ∑ÊòØÁÆÄÂçïÁöÑÈÄÜËøêÁÆó„ÄÇ\nËøôÂæàÊñπ‰æøÔºåÂØπÂêßÔºü\nÂØπ‰∫éÂØπÊï∞ÔºåÊàë‰ª¨ËØ¥‚Äú‰ª•x‰∏∫Â∫ïyÁöÑÂØπÊï∞‚Äù„ÄÇ‰æãÂ¶ÇÔºå‚Äú‰ª•2‰∏∫Â∫ï32ÁöÑÂØπÊï∞‚ÄùÔºåÂÜô‰ΩúÔºö\nlog‚ÇÇ 32\nËøôÈóÆÁöÑÊòØ‚Äú2ÁöÑÂ§öÂ∞ëÊ¨°ÊñπÁ≠â‰∫é32Ôºü‚ÄùÊàñËÄÖÁî®Êï∞Â≠¶Ë°®Á§∫Ôºö\n\
    ‰ª•‰∏ã‰∏§‰∏™Á≠âÂºèÈÉΩÊàêÁ´ãÔºö\nx = log‚ÇÇ 32\n2^x = 32\nÈÇ£‰πàÁ≠îÊ°àÊòØ‰ªÄ‰πàÔºüÈÄöËøá‰∏Ä‰∫õËØïÈîôÔºå‰ΩÝÂèØËÉΩ‰ºöÊÑèËØÜÂà∞2^5 = 32ÔºåÂõÝÊ≠§Ôºö\nx = log‚ÇÇ\
    \ 32 = 5\nËôΩÁÑ∂Â∫ïÊï∞ÂèØ‰ª•ÊòØ‰ªª‰ΩïÊï∞Â≠óÔºå‰ΩÜÂØπÊï∞Êúâ‰∏â‰∏™Â∏∏ËßÅÁöÑÂ∫ïÊï∞Ôºö2„ÄÅ10Âíå*e*„ÄÇ\nÂ∫ïÊï∞2Âú®ÁºñÁ®ã‰∏≠ÈùûÂ∏∏Â∏∏ËßÅ„ÄÇ‰∫ãÂÆû‰∏äÔºåÂÆÉÂ¶ÇÊ≠§Â∏∏ËßÅÔºå‰ª•Ëá≥‰∫éÂ¶ÇÊûú‰ΩÝÂú®ËÆ°ÁÆóÁéØÂ¢É‰∏≠ÁúãÂà∞Êúâ‰∫∫ÂÜôlog\
    \ *n*Ôºå‰ΩÝÂ∫îËØ•ÂÅáËÆæ‰ªñ‰ª¨ÊåáÁöÑÊòØlog‚ÇÇ *n*„ÄÇ\n*e*ÊòØ*Ëá™ÁÑ∂ÂØπÊï∞*‚Å¥ÁöÑÂ∫ïÊï∞ÔºåÂú®Êï∞Â≠¶‰∏≠Â∏∏ËßÅÔºåÂú®ËÆ°ÁÆó‰∏≠‰∏çÂ∏∏ËßÅ„ÄÇ\nÈÇ£‰πàÂÆÉ‰ª¨Êúâ‰ªÄ‰πàÁî®Âë¢Ôºü\nÂú®ÁºñÁ®ã‰∏≠Ôºå‰ΩÝÁúãÂà∞ÂØπÊï∞ÁöÑ‰∏Ä‰∏™Â∏∏ËßÅÂú∞ÊñπÊòØ‰ΩøÁî®Â§ßOÁ¨¶Âè∑Ë°®Á§∫ËÆ°ÁÆóÂ§çÊùÇÂ∫¶‚Åµ„ÄÇ\n\
    \nË¶ÅÂú®Python‰∏≠ËÆ°ÁÆó‰∏Ä‰∏™Êï∞ÁöÑÂØπÊï∞ÔºåËØ∑‰ΩøÁî®`math`Ê®°Âùó‰∏≠ÁöÑ`log()`ÂáΩÊï∞„ÄÇ‰ΩÝÂ∞ÜÂ∫ïÊï∞ÊåáÂÆö‰∏∫Á¨¨‰∫å‰∏™ÂèÇÊï∞„ÄÇÔºàÂ¶ÇÊûúÊú™ÊåáÂÆöÔºåÂÆÉËÆ°ÁÆó‰ª•*e*‰∏∫Â∫ïÁöÑËá™ÁÑ∂ÂØπÊï∞„ÄÇÔºâ\n\
    \n‰æãÂ¶ÇÔºåËÆ°ÁÆólog‚ÇÇ 999Ôºö\n\n```python\nimport math\n\nprint(math.log(999, 2))    # Prints\
    \ 9.96434086779242\n\n# Because 2^9.96434086779242 == 999. Ish.\n```\n\nÈúÄË¶ÅËÆ∞‰ΩèÁöÑÈáçË¶Å‰∏ÄÁÇπÊòØÔºåÈöèÁùÄÊï∞Â≠óÂèòÂ§ßÔºåËØ•Êï∞Â≠óÁöÑÂØπÊï∞‰ªçÁÑ∂ÂæàÂ∞è„ÄÇ‰ª•‰∏ãÊòØ‰∏Ä‰∫õ‰æãÂ≠êÔºö\n\
    \n| x | log‚ÇÇx |\n|---|---|\n| 1 | 0.0000 |\n| 10 | 3.3219 |\n| 100 | 6.6439 |\n\
    | 1000 | 9.9658 |\n| 10000 | 13.2877 |\n| 100000 | 16.6096 |\n| 1000000 | 19.9316\
    \ |\n| 10000000 | 23.2535 |\n\n‰∏Ä‰∏™Â§ßÊï∞ÁöÑ‰ª•2‰∏∫Â∫ïÁöÑÂØπÊï∞ÂæÄÂæÄÊòØ‰∏Ä‰∏™Â∞èÂæóÂ§öÁöÑÊï∞Â≠ó„ÄÇ\n\n## 15.12 ËàçÂÖ•\n\nÂΩìÊàë‰ª¨ÂØπ‰∏Ä‰∏™Êï∞ËøõË°åËàçÂÖ•Êó∂ÔºåÊàë‰ª¨ÊòØÂú®ÂØªÊâæÂÖ∑ÊúâÁâπÂÆöÂ∞èÊï∞‰ΩçÊï∞ÁöÑ*ÊúÄÊé•ËøëÁöÑÊï∞*ÔºåÂπ∂ËàçÂºÉÊâÄÊúâÊõ¥Â∞èÁöÑÂ∞èÊï∞‰Ωç„ÄÇ\n\
    \nÈªòËÆ§ÊÉÖÂÜµ‰∏ãÔºåÊàë‰ª¨ÊåáÁöÑÊòØÈõ∂‰∏™Â∞èÊï∞‰ΩçÔºåÂç≥Êàë‰ª¨Â∏åÊúõËàçÂÖ•Âà∞ÊúÄÊé•ËøëÁöÑÊï¥Êï∞„ÄÇ\n\nÊâÄ‰ª•Â¶ÇÊûúÊàëËØ¥Ôºå‚ÄúÂ∞Ü2.3ËàçÂÖ•Âà∞ÊúÄÊé•ËøëÁöÑÊï¥Êï∞‚ÄùÔºå‰ΩÝ‰ºöÂõûÁ≠î‚Äú2‚ÄùÔºåÂõÝ‰∏∫ÈÇ£ÊòØÊúÄÊé•Ëøë2.3ÁöÑÊï¥Êï∞„ÄÇ\n\
    \nÂ¶ÇÊûúÊàëËØ¥Ôºå‚ÄúÂ∞Ü2.8ËàçÂÖ•Âà∞ÊúÄÊé•ËøëÁöÑÊï¥Êï∞‚ÄùÔºå‰ΩÝ‰ºöÂõûÁ≠î‚Äú3‚ÄùÔºåÂõÝ‰∏∫ÈÇ£ÊòØÊúÄÊé•Ëøë2.8ÁöÑÊï¥Êï∞„ÄÇ\n\nÂΩìÊàë‰ª¨ÂêëÊõ¥Â§ßÁöÑÊï∞ËàçÂÖ•Êó∂ÔºåÊàë‰ª¨Áß∞‰πã‰∏∫*Âêë‰∏äËàçÂÖ•*„ÄÇ\n\n\
    Âè¶‰∏Ä‰∏™ÊñπÂêëÊòØ*Âêë‰∏ãËàçÂÖ•*„ÄÇ\n\n‰ΩÜÂ¶ÇÊûúÊàëËØ¥‚ÄúÂ∞Ü2.5ËàçÂÖ•Âà∞ÊúÄÊé•ËøëÁöÑÊï¥Êï∞‚ÄùÂë¢ÔºüÂÆÉÊ≠£Â•ΩÂú®2Âíå3‰πãÈó¥ÔºÅÂú®ËøôÁßçÊÉÖÂÜµ‰∏ãÔºåÊåâÁÖßÊÉØ‰æãÔºåÊàë‰ª¨ÂæàÂ§ö‰∫∫Â≠¶Âà∞ÁöÑÊòØÂêë‰∏äËàçÂÖ•„ÄÇÊâÄ‰ª•Á≠îÊ°à‰ºöÊòØ3„ÄÇ\n\
    \nÊàë‰ª¨‰πüÂèØ‰ª•ÈÄöËøáÂ£∞ÊòéËàçÂÖ•ÊñπÂêëÊù•Âº∫Âà∂‰∏Ä‰∏™Êï∞ÂêëÁâπÂÆöÊñπÂêëËàçÂÖ•„ÄÇ\n\n‚ÄúÂ∞Ü*x*Èô§‰ª•3ÔºåÁÑ∂ÂêéÂêë‰∏äËàçÂÖ•„ÄÇ‚Äù\n\nÂú®Python‰∏≠ÔºåÊàë‰ª¨ÊúâÂáÝÁßçËàçÂÖ•ÈÄâÈ°π„ÄÇ\n\n\
    Êàë‰ª¨ÂèØ‰ª•‰ΩøÁî®ÂÜÖÁΩÆÁöÑ`round()`ÂáΩÊï∞„ÄÇ\n\n‰ΩÜÂÆÉÁöÑË°å‰∏∫ÂèØËÉΩ‰∏éÊàë‰ª¨‰πÝÊÉØÁöÑÁï•Êúâ‰∏çÂêå„ÄÇÂÄºÂæóÊ≥®ÊÑèÁöÑÊòØÔºåÂÉè1.5„ÄÅ2.5Âíå3.5ËøôÊÝ∑‰∏é‰∏§‰∏™Êï¥Êï∞Á≠âË∑ùÁöÑÊï∞*ÊÄªÊòØËàçÂÖ•Âà∞ÊúÄÊé•ËøëÁöÑÂÅ∂Êï∞*„ÄÇËøôÈÄöÂ∏∏Ë¢´Áß∞‰∏∫*ÂõõËàçÂÖ≠ÂÖ•‰∫îÊàêÂèå*Êàñ*Èì∂Ë°åÂÆ∂ËàçÂÖ•Ê≥ï*„ÄÇ\n\
    \n```python\nround(2.8)   # 3\nround(-2.2)  # -2\nround(-2.8)  # -3\n\nround(1.5)\
    \   # 2\nround(2.5)  # 2\nround(3.5)  # 4\n```\n\n‰ΩÝ‰πüÂèØ‰ª•ÂëäËØâ`round()`‰ΩÝÊÉ≥ËàçÂÖ•Âà∞Â§öÂ∞ë‰ΩçÂ∞èÊï∞Ôºö\n\
    \n```python\nround(3.1415926, 4)  # 3.1416\n```\n\nËØ∑Ê≥®ÊÑèÔºåÁî±‰∫éÊµÆÁÇπÊï∞ÁöÑÁ≤æÂ∫¶ÊúâÈôêÔºåPythonÊúâÈ¢ùÂ§ñÁöÑÂ•áÊÄ™ËàçÂÖ•Ë°å‰∏∫‚Å∂„ÄÇ\n\
    \nË¶ÅÊÄªÊòØÂêë‰∏äÊàñÂêë‰∏ãËàçÂÖ•ÔºåËØ∑‰ΩøÁî®`math`Ê®°Âùó‰∏≠ÁöÑ`ceil()`Âíå`floor()`ÂáΩÊï∞„ÄÇ\n\n`ceil()`ËøîÂõûÂ§ß‰∫éÊ≠§Êï∞ÁöÑ‰∏ã‰∏Ä‰∏™Êï¥Êï∞Ôºå`floor()`ËøîÂõûÂ∞è‰∫éÊ≠§Êï∞ÁöÑ‰∏ä‰∏Ä‰∏™Êï¥Êï∞„ÄÇ\n\
    \nËøôÂØπ‰∫éÊ≠£Êï∞Êù•ËØ¥ÈùûÂ∏∏ÂêàÁêÜÔºö\n\n```python\nimport math\n\nmath.ceil(2.1)  # 3\nmath.ceil(2.9)\
    \  # 3\nmath.ceil(3.0)  # 3\nmath.ceil(3.1)  # 4\n\nmath.floor(2.1)  # 2\nmath.floor(2.9)\
