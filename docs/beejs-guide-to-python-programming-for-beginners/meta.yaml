    \ list index out of range\n```\n\nÊâÄ‰ª•ÊòæÁÑ∂‰∫ãÊÉÖÂá∫‰∫ÜÂ∑ÆÈîô„ÄÇÈÇ£‰∏™Â∑®Â§ßÁöÑÈîôËØØ‰ø°ÊÅØÂçÝÊçÆ‰∫Ü‰∫ãÊïÖÁé∞Âú∫ÔºåÈô§‰∫ÜÈ°∂ÈÉ®ÊâìÂç∞ÁöÑÊñá‰ª∂Ë°å‰πãÂ§ñÔºåÂæàÈöæÊ≥®ÊÑèÂà∞ÂÖ∂‰ªñ‰ªª‰Ωï‰∏úË•ø„ÄÇ\n\
