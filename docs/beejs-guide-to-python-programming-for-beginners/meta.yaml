    \nËøôÈáåÊúâÂæàÂ§öÊîπËøõÁöÑÈÄâÈ°πÔºÅ\n\nÔºàËß£ÂÜ≥ÊñπÊ°à¬π‚Å∞„ÄÇÔºâ\n\n## 9.13 ÁªÉ‰πÝ\n\n**ËÆ∞‰ΩèÔºöË¶Å‰ªéÊú¨‰π¶‰∏≠Ëé∑Âæó‰ª∑ÂÄºÔºå‰ΩÝÂøÖÈ°ªÂÅöËøô‰∫õÁªÉ‰πÝ„ÄÇ** Âú®‰∏Ä‰∏™ÈóÆÈ¢ò‰∏äÂç°‰Ωè20ÂàÜÈíüÂêéÔºå‰ΩÝÂèØ‰ª•Êü•ÁúãËß£ÂÜ≥ÊñπÊ°à„ÄÇ\n\
    \n‰ΩøÁî®‰ΩÝÊâÄÁü•ÈÅìÁöÑ‰ªª‰ΩïÁü•ËØÜÊù•Ëß£ÂÜ≥Ëøô‰∫õÈóÆÈ¢òÔºåËÄå‰∏ç‰ªÖ‰ªÖÊòØ‰ΩÝÂú®Êú¨Á´ÝÂ≠¶Âà∞ÁöÑÂÜÖÂÆπ„ÄÇ\n\n**ÂßãÁªà**‰ΩøÁî®Âõõ‰∏™ÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Êù•Ëß£ÂÜ≥Ëøô‰∫õÈóÆÈ¢òÔºöÁêÜËß£ÈóÆÈ¢ò„ÄÅÂà∂ÂÆöËÆ°Âàí„ÄÅÊâßË°åËÆ°Âàí„ÄÅÂõûÈ°æ‰ª•Êü•Áúã‰ΩÝÂèØ‰ª•ÂÅöÂæóÊõ¥Â•ΩÁöÑÂú∞Êñπ„ÄÇ\n\
    \n1.  ÂØπ‰∫é‰ª•‰∏ãÂ≠óÂÖ∏ÔºåÊâìÂç∞Âá∫Â≠óÂÖ∏ÁöÑÊâÄÊúâÈîÆÔºö\n\n```\nd = {\n    \"key1\": \"value1\",\n    \"key2\"\
    : \"value1\",\n    \"key3\": \"value1\",\n    \"key4\": \"value1\",\n}\n```\n\n\
    ÔºàËß£ÂÜ≥ÊñπÊ°à<sup>11</sup>„ÄÇÔºâ\n\n2.  ÂØπ‰∫éÈóÆÈ¢ò1‰∏≠ÁöÑÂ≠óÂÖ∏ÔºåÊâìÂç∞Âá∫ÊâÄÊúâÁöÑÈîÆÂíåÂÄº„ÄÇ\n\nÔºàËß£ÂÜ≥ÊñπÊ°à<sup>12</sup>„ÄÇÔºâ\n\n3.\
