    # ## 12.3 What and Why of Modules


    Problem-solving step: **Understanding the Problem.**


    Modules are pieces of self-contained code that you can *import* into your code
    and use. Think of them as prefabricated building blocks that you can put together
    in your project to accomplish tasks without needing to write out the details yourself.


    This is actually a really powerful concept that you have at your disposal. Tons
    of code have already been written, and you can just use it!


    Do you want to compute anything to do with date and time? Python has a module
    for that.


    Do you want to draw graphics on the screen? Python has a module for that.


    Do you want to generate animated GIFs from a sequence of stills? There‚Äôs a module
    for that.'
