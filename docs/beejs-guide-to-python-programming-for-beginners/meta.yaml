    \n# 14.6 Catching Exceptions\n\nProblem-solving step: **Understanding the Problem**\n\
    Bear with me, because this code is a little different in how it gets executed.\n\
    We're going to use two new statements in conjunction: try and catch. Let's jump\
    \ right in with an example that we can dissect:\n\n```\ntry:\n    x = input(\"\
    Enter a number: \")\n\n    x = int(x)    # Convert to integer\n\n    print(x *\
    \ 1000)\n\nexcept ValueError:\n    print(f'error converting \"{x}\" to integer')\n\
    ```\n\nWhat's happening there? Look at the big blocks first. We have a try block\
    \ and an except block.\nThink of the try block as the code you want to execute\
    \ in your shiny dreamworld where your user enters correct information every time.\n\
    Like the user enters 3490, and it converts to integer just fine, and then you\
    \ print out 3490000.\nPerfect.\nBut what if the user enters beans instead of a\
    \ number? int() is going to freak out and raise a ValueError, just like we saw\
    \ earlier.\n*Here's the magic.* If that happens, execution of the try block will\
    \ stop immediately, and Python will transfer control to the matching except block,\
    \ if it exists.\nSo for example, here's a successful run:\n\n```\nEnter a number:\
    \ 3490\n3490000\n```\n\nand here's a run where an exception is thrown:\n\n```\n\
    Enter a number: beans\nerror converting \"beans\" to integer\n```\n\nSee how it\
    \ transferred control right into the except block?\nThat's how we handle exceptions!"
  - "[PAGE 155]\n\n# 14.7 Catching Multiple Exceptions\n\nProblem-solving step: **Understanding\
    \ the Problem**\n\nWhat if your `try` block throws multiple exceptions?\n\nTurns\
    \ out you can catch multiple exceptions just by having multiple `except` clauses.\n\
    \nLet's try a program that divides a number by another:\n\n```\nx, y = input('Enter\
    \ two numbers separated by a space: ').split()\n\nx = int(x)\ny = int(y)\n\nprint(f'{x}\
    \ / {y} == {x / y}')\n```\n\nWhat are the exceptions that can be thrown?\n\nGood\
    \ question. Although there is a list of built-in exceptions¬π, it's not immediately\
    \ obvious which one gets raised when.\n\nThe easy thing to do is try it in the\
    \ REPL. But try what?\n\n*Think like a villain.* What are the things that can\
    \ go wrong? What kinds of bad input can you pass this program?\n\nGive it some\
    \ thought. I count four things that can go wrong with bad user input. Can you\
    \ see them?\n\nWell, we're taking input, running it through `.split()`, and then\
    \ assigning the results into two variables. So the `split()` better return a list\
    \ of length 2, or something bad is going to happen.\n\nI'm going to put that line\
    \ of code into the REPL and see what it says if I enter something that's not two\
    \ numbers separated by a space.\n\n```\n>>> x, y = input(\"Enter 2 numbers: \"\
    ).split()\nEnter 2 numbers: 1\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: not enough values to unpack (expected 2, got\
    \ 1)\n```\n\nCheck it out! I entered a single number, and it raised `ValueError`\
    \ exception (with a message saying there weren't enough values).\n\nLet's try\
    \ too many values:\n\n```\n>>> x, y = input(\"Enter 2 numbers: \").split()\nEnter\
    \ 2 numbers: 1 2 3\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nValueError: too many values to unpack (expected 2)\n```\n\n\
    `ValueError` again! That means we can do something like this to catch it:\n\n\
    ```\ntry:\n    x, y = input('Enter two numbers separated by a space: ').split()\n\
    \n    x = int(x)\n    y = int(y)\n\n    print(f'{x} / {y} == {x / y}')\n\nexcept\
    \ ValueError:\n    print(\"That's not two numbers separated by a space!\")\n```\n\
    \n¬πhttps://docs.python.org/3/library/exceptions.html"
- md: "And that will catch it. Here‚Äôs a run:\n\n```\nEnter two numbers separated by\
    \ a space: 1 2 3\nThat's not two numbers separated by a space!\n```\n\nWhee!\n\
    \nWhat‚Äôs the next place we can mess things up?\n\nWell, we‚Äôre converting to int()‚Ä¶\
    \ what does that function do if we pass in something awful, like the word manfrengensenton?\n\
    \nAgain in the REPL:\n\n```\n>>> int(\"manfrengensenton\")\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nValueError: invalid literal\
    \ for int() with base 10: 'manfrengensenton'\n```\n\nHey, it‚Äôs ValueError again!\
    \ Conveniently, we‚Äôre already catching that with an appropriate error message.\
    \ Totally handled.\n\nThat takes care of three of the four cases I saw where we\
    \ could get exceptions. What‚Äôs the fourth?\n\n*Mathematics hat on.* Do you see\
    \ it?\n\nThat‚Äôs right, we‚Äôre dividing there‚Ä¶ and you can‚Äôt divide by zero. What\
    \ happens when we do?\n\nWe already saw, above, that we get a ZeroDivisionError.\
    \ So let‚Äôs add that to the end of our code:\n\n```\ntry:\n    x, y = input('Enter\
    \ two numbers separated by a space: ').split()\n\n    x = int(x)\n    y = int(y)\n\
    \n    print(f'{x} / {y} == {x / y}')\n\nexcept ValueError:\n    print(\"That's\
    \ not two numbers separated by a space!\")\n\nexcept ZeroDivisionError:\n    print(\"\
    Can't divide by zero!\")\n```\n\nSo as you can see, you can handle as many different\
    \ types of exceptions as you want in their own except clauses after the try.\n\
    \n## 14.8 Catching Multiple Exceptions II\n\nIf you want to handle multiple exceptions\
    \ with the same handler code, you can make a list of them:\n\n```\nexcept (FileNotFoundError,\
    \ PermissionError):\n    print(\"File not found or insufficient permissions\"\
    )\n```\n\nThis isn‚Äôt as frequently used, since often you want to take a different\
    \ course of action for different exceptions.\n\n## 14.9 Getting More Exception\
    \ Information\n\nEach exception is actually an instance of a class. And the class\
    \ name is the name you use in your except clauses.\n\nBecause it‚Äôs an instance,\
    \ it has some additional information attached to it we can grab, but first, we\
    \ have to bind it (assign it) to a variable name. We can do that with the as statement.\n\
    \n```\ntry:\n    1 / 0\nexcept ZeroDivisionError as e:  # e is a reference to\
    \ the exception\n    print(e)\n    print(repr(e))  # Print its representation\n\
    ```\n\nresults in:\ndivision by zero\nZeroDivisionError('division by zero')\n\n\
    That could be useful for getting more detailed information. In our example in\
    \ the previous chapter, we catch ValueError, but we saw three different circumstances\
    \ that could lead to it. We could use this technique to give the user more detailed\
    \ information about the nature of the exception, should we choose.\n\nAll exceptions\
    \ have an attribute called args that is a list of the arguments that are passed\
    \ to the exception when it was created. The first of these is often a human-readable\
    \ error message.\n\nFor instance, this code:\n\n```\ntry:\n    1 / 0\nexcept Exception\
    \ as e:\n    print(e.args[0])\n```\n\nprints the helpful message:\ndivision by\
    \ zero\n\nFurthermore, any exception that is based on IOError includes the string\
    \ attribute strerror that contains a human-readable error message corresponding\
    \ to the error. You can find the list of exceptions that are derived from IOError\
    \ in the exceptions documentation¬≤.\n\n## 14.10 Catching All Exceptions\n\nA catch\
    \ statement that doesn't specify a particular exception will catch *all* previously\
    \ uncaught exceptions.\n\nFor this reason, a blank catch should definitely be\
    \ last, after all the other catches. Python will stop at the first catch that\
    \ matches, even if it's a \"catch all\".\n\nWhen you're in any catch, you can\
    \ look at the results from the built-in function sys.exc_info(). This function\
    \ returns a tuple (think \"list\" for now, if you're not familiar with tuples)\
    \ with three pieces of information: the type of the exception, a reference to\
    \ the exception itself, and a traceback¬≥\n\nLet's mod our division program to\
    \ catch all exceptions and print out the exception info:\n\n```\nimport sys\n\n\
    try:\n    x, y = input('Enter two numbers separated by a space: ').split()\n\n\
    \    x = int(x)\n    y = int(y)\n\n    print(f'{x} / {y} == {x / y}')\n\nexcept:\n\
    \    print(sys.exc_info())\n```\n\n¬≤https://docs.python.org/3/library/exceptions.html\n\
    ¬≥A traceback, also known as a stack trace, is a list of all the function calls\
    \ that have taken place to get to this point. It's really useful information for\
    \ debugging.\n\nHere are some sample runs:\n\n```\nEnter two numbers separated\
    \ by a space: 1\n(<class 'ValueError'>, ValueError('not enough values to unpack\
    \ (expected 2, got 1)'), <traceback object at 0x7f7899794f80>)\n```\n\n```\nEnter\
    \ two numbers separated by a space: a b\n(<class 'ValueError'>, ValueError(\"\
    invalid literal for int() with base 10: 'a'\"), <traceback object at 0x7f6d0c9732c0>)\n\
    ```\n\n```\nEnter two numbers separated by a space: 1 0 (<class 'ZeroDivisionError'>,\
    \ ZeroDivisionError('division by zero'), <traceback object at 0x7fe2ea373040>)\n\
    ```\n\nThis isn't as common, to catch and examine exceptions in this way. But\
    \ it is another tool in your toolbox.\nBe careful with catch-alls. They might\
    \ hide exceptions that you weren't expecting and should have let through. They're\
    \ rare in practice.\n\n## 14.11 Finally finally\n\nProblem-solving step: **Understanding\
    \ the Problem**\nThere's a greater structure to be found here. We've already talked\
    \ about try and catch, but there's a way to add code that runs after the try no\
    \ matter what, regardless of whether or not an exception occurred.\nIt's the finally\
    \ clause, and it comes after the except clause(s).\nAgain, this block of code\
    \ will run no matter what.\n\n```\ntry:\n    print(1/1)\nexcept ZeroDivisionError:\n\
    \    print(\"Divide by zero!\")\nfinally:\n    print(\"All done!\")\n```\n\nThe\
    \ above code will print:\n\n```\n1\nAll done!\n```\n\nIf we modified that first\
    \ line to print(1/0), we'd get a divide by zero exception and the output would\
    \ be:\n\n```\nDivide by zero!\nAll done!\n```\n\nIn all cases, the finally block\
    \ will run.\nYou can use this block to execute finalization or cleanup code if\
    \ you need to.\ntry-except is really common. finally is less so, but not entirely\
    \ uncommon.\n\n## 14.12 What Else? else!\n\nProblem-solving step: **Understanding\
    \ the Problem**\nJust when you thought try-except-finally was all she wrote, turns\
    \ out we can add an else in there for try-except-else-finally.\nIt's entirely\
    \ possible that you won't ever see this, but I wanted to quickly touch on it here.\
    \ Just glance at it:\n\n```\ntry:\n    print(\"This is what we're trying to do\"\
    )\n    print(\"and where exceptions might occur.\")\n\nexcept:\n    print(\"Caught\
    \ an exception!\")\n\nelse:\n    print(\"This only runs if there was no exception.\"\
    )\n\nfinally:\n    print(\"This runs no matter what.\")\n```\n\nUsing else can\
    \ give you more control over the flow of your program when exceptions occur.\n\
    \n## 14.13 Exception Objects\n\nProblem-solving step: **Understanding the Problem**\n\
    \nAt this point, we've covered catching exceptions, and this is all you need to\
    \ know 99% of the time you're using Python.\n\nBut that doesn't mean we should\
    \ stop there. Part of being a good dev is having a good mental model of *how*\
    \ these things work, not just to memorize some patterns to use. Having a deeper\
    \ understanding will serve you well.\n\nSo let's talk about how exceptions in\
    \ Python are represented by objects.\n\nWe've already hinted at this, above, where\
    \ we talk about getting more information from exceptions.\n\nWe found there is\
    \ a class named ZeroDivisionError and another named ValueError. Indeed, we can\
    \ just make new ones of these if we want:\n\n```\ne = ValueError()    # Construct\
    \ a new ValueError object\n```\n\nThere's a whole list of exceptions that are\
    \ ready to use‚Å¥, but if none of those seem to fit, you can just make a new Exception\
    \ with some information passed to it:\n\n```\ne = Exception('Something went horribly\
    \ awry')\n```\n\nLastly, you can make your own new exception classes if you'd\
    \ like. You don't have to‚Äîyou can use Exception or any of the other preexisting\
    \ ones.\n\nBut if you do make your own, the only catch is that these **must**\
    \ *inherit* from the Exception base class.\n\nWhooooaa, there, Beej. What are\
    \ you even talking about?\n\nOkay, you got me. I stepped into some Object-Oriented\
    \ Programming terminology, there. Now, we'll talk about what that all means in\
    \ a later chapter, but for now, take my word that you need to declare your new\
    \ exception, you have to use similar syntax to this:\n\n```\nclass MyAwesomeException(Exception):\
    \    # <-- Note \"(Exception)\"\n    pass\n```\n\nThis is telling Python, \"I'm\
    \ making a new class called MyAwesomeException, but, here's the thing, MyAwesomeException\
    \ *is* an Exception.\"\n\nAlso, if you have a constructor, make sure you do this:\n\
    \n```\nclass MyAwesomeException(Exception):    # <-- Note \"(Exception)\"\n\n\
    \    def __init__(self, *args):            # <-- Get all positional args\n   \
    \     print(\"In my constructor\")\n```\n\n‚Å¥https://docs.python.org/3/library/exceptions.html"
