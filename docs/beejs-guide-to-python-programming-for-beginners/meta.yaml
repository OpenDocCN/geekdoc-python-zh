    # 11.8 More on Methods


    Problem-solving step: **Understanding the Problem**.


    Remember that methods are functions that are connected to the object. Just like
    you could think of attributes as things the object *has*, you can think of methods
    like things the object *does*.


    Let''s add another method to set the ship location.


    ```

    1  class StarShip:

