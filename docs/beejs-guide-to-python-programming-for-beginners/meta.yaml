  - "[PAGE 92]\n\nChapter 10. Functions\n\n87\n\n+   - Anything that happens repeatedly\n\
    - Breaking up code into smaller, self-contained sections\n\nLet‚Äôs talk about that\
    \ last item more, since it‚Äôs less obvious.\n\nVery frequently‚Äîalmost always‚Äîyou‚Äôll\
    \ start with a series of steps you need to perform to solve the problem, like\
    \ this:\n\n```\n# While we still have data to process\n    # Process the data\n\
    \    # Output the data\n```\n\nAnd then you go in and fill in all the code for\
    \ processing the data and outputting the data.\n\nBut that could make for a bulky,\
    \ hard-to-read while loop. It might be better to code it up like this:\n\n```\n\
    while d in data:\n    d = process(d)\n    output(d)\n```\n\nand the write the\
    \ functions process() and output() to operate on the data that is passed into\
    \ them.\n\nThis makes the logic of the loop *really* easy to read. And being easy-to-read\
    \ is *king* (or *queen*, if you prefer).\n\nIf you find you have some large amounts\
    \ of code that are getting deeply-nested, it might be time to break them out into\
    \ functions, even if you only call those functions from that single place.\n\n\
    Knowing *when* to break up code into functions is more of an art than a science.\
    \ If you start feeling like your code is remotely unwieldy, consider what it might\
    \ look like split into different functions. If you like it more, do it!\n\n# 10.9\
    \ Positional Arguments versus Keyword Arguments\n\nProblem-solving step: **Understanding\
    \ the Problem**.\n\nWe‚Äôll talk more about this in detail later, but function arguments\
    \ can be split into these two broad classes in Python: *positional* and *keyword*.\n\
    \nPositional arguments are the arguments that have to occur at certain positions\
    \ in a function call.\n\nFor instance, if we want to compute 14<sup>12</sup>,\
    \ we need to pass those two arguments in a specific order to the math.pow() function,\
    \ which expects the base to be first and the exponent to be second:\n\n```\nmath.pow(14,\
    \ 12)    # 56693912375296.0\n```\n\nIf you put the 12 first, you get a different\
    \ answer. These are positional arguments.\n\nBut for some functions, after the\
    \ positional arguments, you can specify additional keyword arguments. These are\
    \ arguments that are identified by a certain name.\n\nFor example, normally print()\
    \ puts a newline at the end of the string. But you can override this behavior\
    \ with the end keyword argument by telling print() to put nothing (an empty string)\
    \ at the end of the line:\n\n```\n# Together, prints \"Beej\" on a single line\n\
    \nprint(\"Be\", end=\"\")\nprint(\"ej\")\n```\n\nNotice how we had to identify\
    \ the keyword argument by name.\n\nIf you‚Äôre looking through documentation, you\
    \ might find something that looks like this (the documentation for print()):\n\
    \n```\nprint(*objects, sep=' ', end='\\n', file=sys.stdout, flush=False)\n```"
  - "[PAGE 93]\n\nIgnoring the *objects for now, look at all those keyword arguments‚Ä¶\
    \ in the docs, they have = followed by some value. This indicates the *default*\
    \ value if you don't specify one otherwise. In other words, they're optional keyword\
    \ arguments.\n\nYou can see that `print()` ends each line with a newline `\\n`\
    \ unless we tell it to end the line with some other string.\n\nFor now, it's enough\
    \ to know that these exist and how to call them. Later on, we'll talk about how\
    \ to write our own.\n\n# 10.10 Interlude: Evaluation Strategies\n\nIf you don't\
    \ want to read this section, it's OK to skip. But it's more fun if you read it.\n\
    \nDifferent languages have different behaviors when it comes to passing arguments\
    \ to functions.\n\nSome of them make copies of the values. Some of them just make\
    \ it so the parameter name is an alias for the argument name. Some of them give\
    \ you the option through some keyword.\n\nHow the programming language does this\
    \ is called it's *evaluation strategy*<sup>7</sup>.\n\nThree very common ones\
    \ are:\n\n+   - **Call by Sharing**: This is what Python does. When you call a\
    \ function, the parameters become references to the same objects as their corresponding\
    \ arguments. This means that if, inside the function, you change the thing the\
    \ parameter refers to, you'll see that change reflected out in the caller. However,\
    \ if you assign a new value into a parameter, you will *not* see the change.\n\
    \n```\npython\ndef foo(x):\n    # Modify the passed-in object. Caller will see\
    \ this change.\n    x[1] = 99\n\n    # Assign a new list into x. The caller will\
    \ _not_ see this change.\n    x = [4, 5, 6]\n\na = [1, 2, 3]\n\nfoo(a)\nprint(a)\
    \   # [1, 99, 3]\n```\n\n+   - **Call by Value**: a *copy* of the argument is\
    \ made and stored in the parameter. The C programming language<sup>8</sup>, among\
    \ others, uses this one. (Sometimes people say Python uses Call by Value, but\
    \ this is technically not accurate since parameters are not copied when they are\
    \ passed in; only the reference to the argument is copied. You can make Python\
    \ simulate Call by Value by making a copy of the parameter when calling the function.)\n\
    \n```\npython\n# Simulating call-by-value in Python\n\ndef foo(x):\n    # Modify\
    \ the passed-in object. The caller would normally see this\n    # change, but\
    \ if they called it with a copy, only the copy will\n    # be affected.\n    x[1]\
    \ = 99\n\na = [1, 2, 3]\n\n# Simulate call-by-value by making a copy\nfoo(a.copy())\n\
    \nprint(a)   # [1, 2, 3]\n```\n\n<sup>7</sup>https://en.wikipedia.org/wiki/Evaluation_strategy\n\
    \n<sup>8</sup>https://en.wikipedia.org/wiki/C_(programming_language)"
- md: "## 10.11 The Chapter Project\n\n**Call by Reference**: the parameter effectively\
    \ becomes an alias for the variable name passed in as the argument. Anything you\
    \ do to the parameter you effectively do to the argument, including assigning\
    \ it some other value. Example languages Fortran<sup>9</sup>, C++<sup>10</sup>\
    \ (usually by value, but can be made by reference). (Sometimes people say Python\
    \ uses Call by Reference, but this is technically not accurate since you can‚Äôt\
    \ assign new values to parameters and see that reflected in the argument.)\n\n\
    Here‚Äôs a quick summary between them.\n\nNote: In the following table, ‚ÄúCan modify\
    \ item in caller‚Äù means that if you have a variable in the caller that refers\
    \ to a thing, changes to the thing in the function will be reflected in the caller‚Äôs\
    \ variable.\n\n‚ÄúParameter reassignment affects caller‚Äù means that if you assign\
    \ into a parameter variable (i.e. change the parameter to refer to a completely\
    \ different thing) the argument variable will also change.\n\n| | Can modify item\
    \ in caller | Parameter reassignment affects caller |\n|---|---|---|\n| **Call\
    \ by Sharing** | Yes | No |\n| **Call by Value** | No | No |\n| **Call by Reference**\
    \ | Yes | Yes |\n\nNow, I‚Äôve seen people be fast and loose with these descriptions\
    \ when it comes to Python, so don‚Äôt hold them to it. In my opinion, from the above\
    \ three items, Call by Sharing is the most accurate. Call by Reference is the\
    \ second-most.\n\nProblem-solving step: **Understanding the Problem**\n\nIt‚Äôs\
    \ that time! If you need a refresher, pop back up to the top and check out the\
    \ spec.\n\nSo we want to do a couple of things:\n\n1.  Read in a list of starship\
    \ positions.\n2.  Print out a grid of distances between each ship.\n\nThe positions\
    \ are entered as X, Y, Z coordinates (until the user enters ‚Äúdone‚Äù).\n\nThe distances\
    \ are computed with the distance formula variation of the Pythagorean Theorem.\n\
    \nA grid of distances is printed. There should be ship numbers along the axes.\n\
    \nProblem-solving step: **Devising a Plan**\n\nWe already have a bit of a plan,\
    \ don‚Äôt we? We listed it right up there.\n\n1.  Read in a list of starship positions.\n\
    2.  Print out a grid of distances between each ship.\n\nDon‚Äôt look now, but these\
    \ would make a great couple of functions. Sure, we *could* stick them all in one\
    \ big main routine, but it‚Äôs way more logical and easier to read if we make them\
    \ their own functions.\n\nWe could have one function read the list of positions\
    \ and return it.\n\nAnd we could take that returned list and pass it into another\
    \ function to print the grid.\n\n```\nlocations = get_ship_locations()\nprint_grid(locations)\n\
    ```\n\nWe‚Äôre taking a _top-down_ approach, here. Starting with the big pieces\
    \ of logic and then implementing them as we go down.\n\nIn fact, let‚Äôs simplify\
    \ the problem, and just start like this:\n\n```\nlocations = get_ship_locations()\n\
    print(locations)\n#print_grid(locations)\n```\n\nThat way we can just do one bit\
    \ and make sure it‚Äôs working.\n\n> **Fun Motto Fact:** Get something working as\
    \ quickly as possible, no matter how much a piece of the project it is.\n\nProblem-solving\
    \ step: **Understanding the Problem**\n\nFor getting the ship locations, looks\
    \ like we want to have the user enter an X, Y, Z coordinate. Then we want to split\
    \ that into a list of numbers. And we need to make sure they are int type‚Äîremember\
    \ that input() returns a string, so we‚Äôll have to convert them to int.\n\nAnd\
    \ we repeat that until the user enters ‚Äúdone‚Äù.\n\nProblem-solving step: **Devising\
    \ a Plan**\n\nLooping until the user enters ‚Äúdone‚Äù is a solved problem. We‚Äôve\
    \ done that a few times now. Just make a variable for the while() condition, and\
    \ then set it when the user enters ‚Äúdone‚Äù.\n\nOtherwise, we have to split the\
    \ string up into a list of 3 numbers, splitting on the comma. Remember how to\
    \ do that?\n\nYes, that‚Äôs right (or no, not right, if you don‚Äôt remember), it‚Äôs\
    \ the split() string method. Example:\n\n```\n\"1,2,3\".split(',')  # produces\
    \ list [\"1\", \"2\", \"3\"]\n```\n\nBut that‚Äôs not enough. As we noted, we need\
    \ to convert that list from a list of strings to a list of numbers. Remember how\
    \ to convert a string to a number? Yes, with the built-in int() function!\n\n\
    ```\nint(\"2\") == 2  # True!\n```\n\nSo we can loop through our list of strings\
    \ and convert them to ints.\n\nAnd then we‚Äôll have a list of 3 ints, representing\
    \ the X, Y, Z coordinates of a single ship. Of course, the user is going to enter\
    \ any number of ships, and we‚Äôll have to keep all those lists of coordinates somewhere‚Ä¶\
    \ where?\n\nIt‚Äôs almost like we‚Äôll need a list for all those lists. A list of\
    \ lists! Why not? We made some of those in the lists chapter, right?\n\nSo we\
    \ add the new X, Y, Z list to the end of a master list that holds all the coordinates.\n\
    \nThen we can return that master list to be used later when we print the grid.\n\
    \nLet‚Äôs code!\n\nWait‚Äîyou‚Äôre right‚Äîwe haven‚Äôt finished the *entire* plan for the\
    \ whole project. True. But that‚Äôs okay. We completed enough devising of a plan\
    \ to do the first part of the project.\n\nAnd this is one of the beautiful things\
    \ about functions. We‚Äôve split the problem up so nicely that we can implement\
    \ different parts of it *completely independently*! In fact, if you have a programming\
    \ pal, you could get them to write the print_grid() function at the same time\
    \ you were writing the get_ship_locations() function!\n\nProblem-solving step:\
    \ **Carrying Out the Plan**\n\nLet‚Äôs get coding!\n\n```\ndef get_ship_locations():\n\
    \    \"\"\"\n    Ask the user to enter a number of X, Y, Z ships coordinates.\n\
    \    Returns a list of all the coordinates.\n    \"\"\"\n\n    done = False  #\
    \ True when the user asks to be done\n    locations = []   # Master list of all\
    \ ship positions\n\n    while not done:\n        xyz = input('Enter ship location\
    \ x,y,z (or \"done\"): ')\n\n        if xyz == \"done\":\n            done = True\n\
    \        else:\n            # Get a list of the x,y,z coordinates\n          \
    \  xyz_list = xyz.split(',')\n\n            # Convert to integers\n          \
    \  for i, v in enumerate(xyz_list):\n                xyz_list[i] = int(v)\n\n\
    \            # Build the master list\n            locations.append(xyz_list)\n\
    \n    return locations\n```\n\n```\nlocations = get_ship_locations()\nprint(locations)\n\
    #print_grid(locations)\n```\n\nIf we give that a run, we see something like this:\n\
