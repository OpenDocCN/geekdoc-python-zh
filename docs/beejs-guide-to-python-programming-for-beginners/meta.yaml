    ```

    1  x = 34      # Variable x is assigned value 34

    2  print(x)

    3  x = 90      # Variable x is assigned value 90

    4  print(x)

    ```


    Before we begin, x has no value. So represent that in your head as ‚Äúx has no value;
    it‚Äôs invalid‚Äù.


    Then the first line runs.


    x is now 34.


    Then the second line runs.


    x is still 34, and we print it out. (So 34 is printed.)


    Then the third line runs.


    x is no longer 34. It is now 90. 34 is gone.


    Then the fourth line runs.


    x is still 90, and 90 gets printed out.


    Then we‚Äôre out of code, so the program exits. And we have ‚Äú34‚Äù and ‚Äú90‚Äù on the
    screen from when they were printed.


    *That‚Äôs* keeping a mental model of computation.


    This is *the key* to being able to debug. When your mental computing model shows
    different results than the actual program run, you have a bug somewhere. You have
    to dig through your code to find the *first* place your mental model and the actual
    program run diverge. That‚Äôs where your bug is.


    # 5.5 User Input


    Problem-solving step: **Understanding the Problem**.


    We want to get input from the user and store it in a variable so that we can do
    things with it.


    Remember that our goal in this chapter is to write a program that inputs two values
    from the user on the keyboard and prints the sum of those values.


    Python comes with a built-in *function* that allows us to get user input. It‚Äôs
    called, not coincidentally, `input()`.


    But wait‚Äîwhat is a function?


    A function is a chunk of code that does something for you when you *call* it (that
    is when you ask it to). Functions accept *arguments* that you can *pass in* to
    cause the function to modify its behavior. Additionally, functions *return* a
    value that you can get back from the function after it‚Äôs done its work.


    So here we have the `input()` function‚Å∏, which reads from the keyboard when you
    call it. As an argument, you can pass in a *prompt* to show the user when they
    are ready to type something in. And it returns whatever the user typed in.


    What do we do with that return value? We can store it in a variable! Let‚Äôs try!


    Here‚Äôs another program, `inputtest.py`‚Åπ:


    ```

    1  # Take whatever `input()` returns and store it in `value`:

    2

    3  value = input("Enter a value: ")

    4  print("You entered", value)

    ```


    We can run it like this:


    ‚Å∏`input()` is what we call a *built-in* in Python. It comes with the language
    and we get to make use of it. Later we‚Äôll learn to write our own functions from
    scratch!


