    \ delete that line with the pop() method.\n\n```python\ndef handle_delete(args,\
    \ lines):\n    \"\"\"Delete a line in the file.\"\"\"\n\n    if len(args) == 1:\n\
    \        # Get the line number to delete\n        line_num = one_to_zero(int(args[0]))\n\
    \n    else:\n        print(\"usage: d line_num]\")\n        return\n\n    # Make\
