    \n## 11.3 What Problem Are We Even Trying To Solve?\n\nProblem-solving step: **Understanding\
    \ the Problem.**\nLet‚Äôs first learn about the problem we‚Äôre trying to solve, and\
    \ then let‚Äôs take a look at how classes and objects can help us solve it.\nOkay,\
    \ I said ‚Äúproblem‚Äù, but it‚Äôs actually multiple problems. Let‚Äôs start with the\
    \ easier one.\nOkay, I said ‚Äúeasier‚Äù, but really they‚Äôre the same.\n*Get on with\
    \ it!*\nLet‚Äôs pretend you have a game where you have a starship that has multiple\
    \ attributes. For example, it might have two attributes: XYZ coordinates in 3-space\
    \ (e.g. [10, 20, 30]), and a ship name (e.g. \"USS Enterprise\").\nThese two pieces\
    \ of information are clearly related. They apply to one single instance of a starship.\n\
    If we have multiple starships in the universe, they‚Äôll each have their own names\
    \ and coordinates.\nSo far so good?\nNow‚Ä¶ how do we store that data with what\
    \ we know so far?\nWell, we have lists, so let‚Äôs try with those. We‚Äôll have three\
    \ starships with different names and different locations:\n\n```\nship_location\
    \ = [\n    [10, 20, 30],\n    [-10, 20, -30],\n    [10, -20, 30]\n]\n\nship_name\
    \ = [\n    \"MCRN Tachi\",\n    \"Red Dwarf\",\n    \"USCSS Nostromo\"\n]\n```\n\
    \nAnd then we can access ship #1 like this:\n\n```\nprint(ship_name[1])\nprint(ship_location[1])\n\
    ```\n\nSo we have two lists, one for name and one for location¬π.\nIt works, but\
    \ it‚Äôs a bummer to have to maintain two (or more) lists this way. If we ever added\
    \ a ship, we have to be sure we add all the information to all the lists and make\
    \ sure things don‚Äôt get out of order. It‚Äôs easy to make a mistake and get the\
    \ lists out of sync.\nWhat would be nice is if we could bundle all the information\
    \ about one single ship into one single *object* that held the information about\
    \ just that one ship. Other ships would be represented by other objects. And then\
    \ we‚Äôd have a list of those objects‚Äîjust one list to maintain!\n\n## 11.4 What\
    \ are Classes and Objects?\n\nProblem-solving step: **Understanding the Problem.**\n\
    \n¬πThis technique is called *parallel arrays* or, in the case of Python, *parallel\
    \ lists*. It‚Äôs not a popular technique today, having been made obsolete by the\
    \ very thing we‚Äôre talking about in this chapter.\n\nWhat we're starting to delve\
    \ into here is the world of *Object-Oriented Programming*. To discuss *everything*\
    \ about it would definitely be information overload, so we're just going to start\
    \ with the basics here, and revisit some of the concepts later.\n\nA bit of terminology\
    \ here, following up on the starship example from above.\n\nFirst of all, we're\
    \ going to *construct* new starship *objects* that hold all the information about\
    \ a single ship.\n\nWhen the object is constructed, it is done based on a blueprint.\
    \ We call this blueprint a *class*.\n\nSo we're going to define a blueprint for\
    \ a starship in a class, and then we're going to build multiple, different starships\
    \ based on that class.\n\nLet's do this as simple as possible to start. It's not\
    \ going to be a common way of doing things, but it's a place to get your feet\
    \ wet. We'll fix it soon.\n\nFirst of all, we'll define a new class. Remember,\
    \ this is just the blueprint for starships‚Äîit's not a starship itself.\n\nClass\
    \ names use camel case¬≤ by convention. Let's define that starship class!\n\n```\n\
    class StarShip:\n    pass\n```\n\n...that's it? What's that pass in there?\n\n\
    Okay, you got me. I did say we were going to start simple (and not quite *Right*),\
    \ in my defense. What we have there is a class StarShip, except it's like a blank\
    \ blueprint. There's nothing in it.\n\nThe keyword pass means \"do nothing\" in\
    \ Python. It's just there to indicate to Python that there's no body inside this\
    \ class.\n\n> **Random Terminology Facts:** We also say a starship object is an\
    \ *instance* of the StarShip class.\n\nConstructing a new starship object is also\
    \ referred to as *instantiating* the object from the class.\n\nLet's go on to\
    \ make a couple of objects from the blueprint.\n\n```\nclass StarShip:\n    pass\n\
    \ns0 = StarShip()\ns1 = StarShip()\ns2 = StarShip()\n```\n\nBy putting parens\
    \ after the class name, we're telling Python that we are creating a new starship\
    \ object from the StarShip class. In fact, we made three of them and saved a reference\
    \ to each in s0, s1, and s2. Of course, none of them have names or locations,\
    \ but we'll remedy that shortly.\n\nIf we print one, we get something like this:\n\
    \n```\nprint(s1)  # <__main__.StarShip object at 0x7fa11828c8e0>\n```\n\nNot so\
    \ pretty. But we'll make that better soon, as well.\n\n## 11.5 Making Different\
    \ StarShips\n\nProblem-solving step: **Understanding the Problem.**\n\nIn the\
    \ previous example, all our starship objects were identical and contained no information.\n\
    \nWhat we need is a way to pass that information in when the starships are constructed.\n\
    \nWe do this by defining a special function *inside* the class.\n\n> **Another\
    \ Fun Terminology Fact:** functions declared inside classes are called *methods*.\n\
    \nThis special function is always named `__init__()` (with the dunders) and is\
    \ called *the constructor*.\n\nLet's add a constructor to our StarShip class that\
    \ allows us to pass in a ship name when the ship is constructed:\n\n```\nclass\
    \ StarShip:\n    def __init__(self, shipname):  # The constructor\n        self.name\
    \ = shipname\n\ns0 = StarShip(\"MCRN Tachi\")\ns1 = StarShip(\"Red Dwarf\")\n\
    s2 = StarShip(\"USCSS Nostromo\")\n```\n\nWhoa, now... that's a lot of hard-to-read\
    \ punctuation¬≥ to sift through.\n\nAnd there's that crazy `self` parameter to\
    \ the function, whatever that means!\n\nLet's start with `self`‚Å¥. This is one\
    \ of the hardest concepts to grok about in this chapter, so we'll spend some time\
    \ on it.\n\nRemember how the class is the blueprint, and the objects are made\
    \ from that blueprint?\n\nAnd how after they're constructed, you get a reference\
    \ back to that newly-minted object? (These are the references we were storing\
    \ in s0, s1, and s2.)\n\nWell, what about the object that's being constructed\
    \ *right now* inside the `__init__()` method? It already exists but isn't fully\
    \ initialized yet. But inside the constructor, we have a reference to that object\
    \ that is being built right now. And that reference is in `self`.\n\n`self` means\
    \ \"the object that this method is operating on\".\n\nWhat's weird is that when\
    \ we instantiated the starships, we only passed one argument to `__init__()`.\n\
    \n```\ns0 = StarShip(\"MCRN Tachi\")\n```\n\nWhen clearly `__init__()` has two\
    \ parameters: `self` and `name`. What gives?\n\n```\ndef __init__(self, shipname):\
    \  # The constructor\n```\n\nDoesn't the number of arguments need to match the\
    \ number of parameters?\n\nIt does! But Python's doing something sneaky behind\
    \ your back, here. When a method has been called for a particular object, Python\
    \ automagically fills in the first parameter with the object that is being operated\
    \ on. We don't have to worry about it.\n\nPython then takes the arguments we *did*\
    \ pass and tacks them on after that.\n\nLet's take a look at that constructor\
    \ again:\n\n```\nclass StarShip:\n    def __init__(self, shipname):  # The constructor\n\
    \        self.name = shipname\n\ns0 = StarShip(\"MCRN Tachi\")\n```\n\nThis is\
    \ a really common pattern, so let's make sure we understand what's going on here.\
    \ In particular, there's a weird dot after `self`. What does that mean? But before\
    \ we get there, let's look at `shipname`.\n\nWhen we create our new starship s0,\
    \ we pass in the name \"MCRN Tachi\". This calls the constructor `__init__()`.\n\
    \nPython automatically puts a reference to the object that's now being constructed\
    \ into `self`. And then it copies the string \"MCRN Tachi\" to the `shipname`\
    \ parameter of the function. So `shipname` is \"MCRN Tachi\".\n\nAnd now we're\
    \ to the guts of the thing. `self.name`? The saga continues!\n\n¬≥In fact, I think\
    \ the choice to use all those underscores in `__init__()` is one of the few bad\
    \ design choices in the language.\n‚Å¥A lot of other languages use the variable\
    \ name `this` instead of `self`.\n\n## 11.6 Attributes\n\nProblem-solving step:\
    \ **Understanding the Problem.**\n\nObjects have variables attached to them, and\
    \ we call these *attributes*<sup>5</sup>.\n\nAttributes are qualities that an\
    \ object possesses‚Äîwhat things it *has*. For example, a starship would possess\
    \ a name. In other words, a starship would have a name attribute.\n\nAnd we refer\
    \ to these attribute by using the dot operator (.).\n\nWhen we have a line like\
    \ this:\n\n```\nself.name = shipname\n```\n\nWe‚Äôre saying ‚Äúchange the name attribute\
    \ on this starship object to be the same as the shipname parameter that was passed\
    \ into this method‚Äù.\n\nThis is how we take the ship name that was passed in as\
    \ an argument and attach it to the newly constructed object! We save a reference\
    \ to the name in an attribute on the object!\n\nNote that I named shipname differently\
    \ than ship deliberately. (I did this to show that they *could* be different,\
    \ but also to avoid confusion when looking at the example.) But it‚Äôs far more\
    \ common to just name them the same thing. This is OK since self.name, the attribute\
    \ on self, is different than name, the parameter.\n\nLike so:\n\n```\nclass StarShip:\n\
    \    def __init__(self, name):  # The constructor\n        self.name = name\n\
    ```\n\n## 11.7 Using Attributes\n\nProblem-solving step: **Understanding the Problem.**\n\
    \nNow let‚Äôs add one more thing to our starships: their location.\n\nInstead of\
    \ passing the location into the constructor, let‚Äôs just initialize it to location\
    \ [0,0,0] right off the bat. Then we can manually set it later.\n\n```\nclass\
    \ StarShip:\n    def __init__(self, name):  # The constructor\n        self.name\
    \ = name\n        self.location = [0, 0, 0]  # <-- Add this\n```\n\nAll ships\
    \ will now start at [0,0,0] because that‚Äôs what the blueprint says they‚Äôll do.\n\
    \nAnd we can print it! We‚Äôll access the values in those attributes by using the\
    \ dot operator on s0!\n\n```\ns0 = StarShip(\"MCRN Tachi\")\n\nprint(s0.name)\
    \          # MCRN Tachi\nprint(s0.location)      # [0, 0, 0]\n```\n\nBut wait!\
    \ There‚Äôs more! That‚Äôs not all!\n\nYou can also *set* values!\n\n```\nprint(s0.name)\
    \      # MCRN Tachi\n\ns0.name = \"Rocinante\"\n\nprint(s0.name)      # Rocinante\n\
    ```\n\n<sup>5</sup>Technically, even the methods are attributes, but we‚Äôll get\
    \ into the pedantic details another time."
