    \nNow... what about that stretch goal to add movie times to all this?\n\nProblem-solving\
    \ step: **Understanding the Problem**.\n\nThis one might not seem tricky at first,\
    \ but it comes to get you with the details.\n\nYou might think, no problem, we'll\
