  md: 'print(new_list)    # [8, 16, 24]


    Well, it''s certainly more concise!


    But it''s also, I''m suspecting you''re finding, a lot harder to read. Yeah.


    It''s *always* like this when you try to pick up a new piece of weird syntax you''ve
    never seen before. At first, it''s all weird, but the more you study it, the more
    used to it you get.


    What I *don''t* want is for you to look at it and think, "It''s unreadable! Forget
    it!"


    All you have to do is take it a step at a time.


    What do we have in that line?


    ```

    #          result    loop          filter

    #          |----|   |--------|   |----------|

    new_list = [v * 4 for v in a if v % 2 == 0]

    ```


    It''s split into three parts.


    The "result": this is what values will be included in the output list. The variable
    named here is the one in the "loop" clause.


    The "loop": assigns elements from the list into a variable, repeatedly.


    The "filter" (optional): only elements for which the condition is true will be
    included in the output.


    If we wanted to include only the *odd* numbers times 4, we could have done this:


    ```

    #          result    loop          filter

    #          |----|   |--------|   |----------|

    new_list = [v * 4 for v in a if v % 2 == 1]

    ```


    Or the odd numbers divided by 3:


    ```

    #          result    loop          filter

    #          |----|   |--------|   |----------|

    new_list = [v / 3 for v in a if v % 2 == 1]

    ```


    Leaving the filter off makes the list unconditionally. For example, all the numbers
    in the list times 4:


    ```

    #          result    loop

    #          |----|   |--------|

    new_list = [v * 4 for v in a]

    ```


    When should I use them?


    Any time you''re making a new list from an existing one and you want to optionally
    change or filter elements from the original list, list comprehensions are a great
    tool to us.


    # 8.13 Lists of Lists


    Problem-solving step: **Understanding the Problem**.


    You can have lists of just about anything in Python. Lists of numbers, lists of
    strings, lists of lists...


    That''s right, folks. Lists containing other lists. How does that work?


    Here''s one example where we''ll make a bunch of lists, and then put them in another
    list.


    ```

    x = [1, 2, 3]

    y = [4, 5, 6]

    z = [x, y]

    ```


    > It''s important to note that when we assign into z, we''re not copying lists
    x and y. What we''re doing is making it so that the values in list z refer to
    the same lists as x and y do.'
