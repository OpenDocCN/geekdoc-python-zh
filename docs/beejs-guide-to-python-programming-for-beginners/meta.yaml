    \ 20, 'beej': 30, 'chris': 40}\n```\n\n## 9.10 Â≠óÂÖ∏ÁöÑÂ≠óÂÖ∏\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò„ÄÇ**\n\nÊÉÖÂÜµÊòØËøôÊÝ∑ÁöÑÔºö‰ΩÝ‰∏∫ÁªôÂÆöÈîÆÂ≠òÂÇ®ÁöÑÂÄºÂèØ‰ª•ÊòØ*‰ªª‰Ωï‰∏úË•ø*ÔºÅ\n\
    ÂóØÔºå‰∏çÊòØÂÉèÈ≤∏È±ºÊàñÁÅ´ÊòüÈÇ£ÊÝ∑ÁöÑ‰∏úË•øÔºåËÄåÊòØ‰ªª‰ΩïÊï∞ÊçÆÁ±ªÂûã„ÄÇÂõÝÊ≠§Ôºå‰ΩÝÂèØ‰ª•Â∞ÜÂ≠óÁ¨¶‰∏≤„ÄÅÊï¥Êï∞„ÄÅÊµÆÁÇπÊï∞„ÄÅÂàóË°®ÔºåÁîöËá≥ÂÖ∂‰ªñÂ≠óÂÖ∏‰Ωú‰∏∫Â≠óÂÖ∏ÈîÆÁöÑÂÄºÂ≠òÂÇ®ÔºÅ\nÁúãÁúãËøô‰∏™*ÂµåÂ•óÂ£∞Êòé*ÔºåÁúãÁúãÊàë‰ª¨Â¶Ç‰ΩïÈÄêÂ±ÇÊ∑±ÂÖ•Â≠óÂÖ∏‰ª•Ëé∑ÂèñÊï∞ÊçÆÔºö\n\
    \n```\nd = {\n    \"a\": {\n        \"b\": \"Mars! Ha!\"\n    }\n}\n\nprint(d)\
