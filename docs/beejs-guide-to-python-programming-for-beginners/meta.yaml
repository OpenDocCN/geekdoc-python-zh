    \        ]\n    }\n}\n```\n\nÊâÄ‰ª•ËøôÁúãËµ∑Êù•ÊòØÂ≠òÂÇ®Êï∞ÊçÆÁöÑÂêàÁêÜÊñπÊ≥ï„ÄÇÊàë‰ª¨Âè™ÈúÄÂú®ÊúÄÂ§ñÂ±ÇÂ∞ÜÂÖ∂‰ªñ‰∫∫Ê∑ªÂäÝÂà∞Â≠óÂÖ∏‰∏≠Âç≥ÂèØ„ÄÇ\n\n‰∏ç‰ªÖÂ¶ÇÊ≠§ÔºåÊàë‰ª¨Áé∞Âú®ËøòËß£ÂÜ≥‰∫ÜÈÉ®ÂàÜÈóÆÈ¢ò„ÄÇÂ¶ÇÊûúÁî®Êà∑ËæìÂÖ•‚ÄúBeej\
    \ Jorgensen‚ÄùÔºåÊàë‰ª¨Âè™ÈúÄÂú®Â§ñÂ±ÇÂ≠óÂÖ∏‰∏≠Áõ¥Êé•Êü•ÊâæÔºåÁÑ∂ÂêéÂ∞±ÂèØ‰ª•ÊâìÂç∞Âá∫ÊàëÁà∂ÊØçÁöÑÂêçÂ≠óÔºÅ\n\nÂΩìÁÑ∂ÔºåÊàë‰ª¨‰ªçÁÑ∂Áº∫Â∞ëÊâìÂç∞‰ªñ‰ª¨ÁöÑÂá∫ÁîüÂπ¥‰ªΩÔºå‰ΩÜËÆ©Êàë‰ª¨ÂÖàËß£ÂÜ≥ËæÉÂ∞èÁöÑÈóÆÈ¢òÔºå*ÁÑ∂Âêé*ÂÜçÊÉ≥ÂäûÊ≥ïÊèêÂèñÁº∫Â§±ÁöÑÊï∞ÊçÆ„ÄÇ\n\
    \nÊàë‰ª¨Á®çÂêé‰ºöÂõûÂà∞‚ÄúÁêÜËß£ÈóÆÈ¢ò‚ÄùÊ≠•È™§Êù•ÈáçÊñ∞ÂÆ°ËßÜËøô‰∏ÄÁÇπ„ÄÇ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÊâßË°åËÆ°Âàí**\n\nÊàë‰ª¨Â∞Ü‰ªé‰∏Ä‰∏™Âè™ÊúâÂçï‰∏™‰∫∫ÁöÑÁÆÄÂçïÊÝëÂºÄÂßã„ÄÇËÆ©Êàë‰ª¨Â∞ΩÂèØËÉΩ‰øùÊåÅÁÆÄÂçïÔºåÁÑ∂ÂêéÂú®Ê≠§Âü∫Á°Ä‰∏äÊâ©Â±ï„ÄÇ\n\
    \n```\ntree = {\n    \"Beej Jorgensen\": {\n        \"born\": 1990,\n        \"\
    mother\": \"Mom Jorgensen\",\n        \"father\": \"Dad Jorgensen\",\n       \
    \ \"siblings\": [\n            \"Brother Jorgensen\",\n            \"Sister Jorgensen\"\
    ,\n            \"Little Sister Jorgensen\"\n        ]\n    }\n}\n```\n\nÁé∞Âú®ËÆ©Êàë‰ª¨Ê∑ªÂäÝ‰∏Ä‰∫õ‰ª£ÁÝÅÊù•Ëé∑Âèñ‰∫∫ÁöÑÂêçÂ≠óÔºåÊàñËÄÖÂ¶ÇÊûú‰ªñ‰ª¨ËæìÂÖ•‚Äúq‚ÄùÂàôÈÄÄÂá∫Ôºö\n\
