    # ÈÄöËøáÂà∂‰ΩúÂâØÊú¨Êù•Ê®°ÊãüÊåâÂÄºË∞ÉÁî®\nfoo(a.copy())\n\nprint(a)   # [1, 2, 3]\n```\n\n<sup>7</sup>https://en.wikipedia.org/wiki/Evaluation_strategy\n\
