    # 15.13 Large Numbers


    Python is really good with large integer numbers. In fact, it has what we call
    arbitrary precision integer math. That means we can hold numbers as big as memory
    can handle, which is large.


    So if you ask Python to compute 100000!, it will do it. The result, incidentally,
    is 465,575 digits long. No problem.


    But the same is not true for floating point numbers (numbers with a decimal point).
    Python generally uses 64 bits to represent floating point numbers, which means
    there''s a limit to the amount of precision‚Äîyou can only have 16 digits in your
    number, though you can raise that number to huge positive or negative powers to
    get very large or very small numbers.


    Floating point is brilliant because it can represent really huge and really small
    numbers, but the number of digits you have at your disposal is limited.'
