    ¬π¬π https://beej.us/guide/bgpysource/examples/ex_sliceat.py\n\n# Chapter 8\n\n\
    ## Lists\n\n### 8.1 Objective\n\n- Understand what lists are\n- Understand how\
    \ assignments with mutable types work\n- Access individual elements and slices\
    \ in a list\n- Iterate over lists with for\n- Use common lists built-in functions\n\
    - Construct new empty lists of repeating fixed values\n- Construct new lists with\
    \ list comprehensions\n- Construct and use lists of lists (2D lists)\n\n### 8.2\
    \ Chapter Project Specification\n\nGame time!\n\nAllow the user to navigate a\
    \ maze by entering directions to move (n, s, w, or e). They can also enter q to\
    \ quit.\n\nThe maze should look like this, with . representing a space the player\
    \ can move into, and # representing a wall. An @ symbol indicates the player‚Äôs\
    \ current position.\n\nEvery move, the map should be displayed:\n\n```\n####################\n\
    #...#..............#\n#...#..........#...#\n#...#..........#...#\n#...#..........#...#\n\
    #...#..@.......#...#\n#..............#...#\n#..............#...#\n####################\n\
    \nEnter a move (n,s,w,e,q):\n```\n\nKeep this project in mind as you read through\
    \ the chapter.\n\n### 8.3 What Are Lists?\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nRemember how regular variables hold one thing? Well, *lists*\
    \ are variables that can hold a lot of things.\n\n> **Fun Lists Fact:** Most other\
    \ languages have a different name for lists: they call them ‚Äúarrays‚Äù. Same thing.\n\
    \nBut wait‚Äîif a list can hold a lot of things, how do we differentiate? How do\
    \ I tell Python that I want the second thing in the list? Or the fifth thing?\n\
    \nLuckily it‚Äôs easy enough; we just have to specify the *index* into the list\
    \ that holds the thing we want.\n\nThink of it as a row of postboxes, numbered\
    \ starting from 0, then 1, then 2, and going on up to however many postboxes we\
    \ have. Each postbox can hold a thing, and you can refer to it by giving the postbox\
    \ number.\n\nLet‚Äôs take a look at a simple example:\n\n```\nx = [10, 3, 7, 9]\n\
    ```\n\nThere‚Äôs a list. We know it‚Äôs a list because of the square brackets around\
    \ it. It‚Äôs a list of four integers.\n\nLet‚Äôs print out the zeroth element in the\
    \ list. We do this by using square brackets after the list variable name and giving\
    \ the index inside those brackets. Does this look familiar? It‚Äôs the same syntax\
    \ we used to get individual characters out of strings!\n\n```\nprint(x[0])  #\
    \ prints 10\n```\n\nand the element at index 2:\n\n```\nprint(x[2])  # prints\
    \ 7\n```\n\nDo you remember that strings had a cool trick where you could use\
    \ a negative index to refer to characters from the end of the string? We can do\
    \ the same thing with lists!\n\n```\nprint(x[-1])  # prints 9, the element at\
    \ the end of the list\n```\n\nRemember that indexes start at zero, again, just\
    \ like with strings.\n\nKeeping with the ‚Äúthings you can also do with strings‚Äù\
    \ theme, you can also slice an array, just like a string.\n\n```\na = [1, 2, 3,\
    \ 4, 5]\n\nb = a[1:-1]  # Slice all but the first and last elements\n\nprint(b)\
    \  # [2, 3, 4]\n```\n\nYou can also *set* individual elements, leaving the rest\
    \ of the list unchanged:\n\n```\nx[1] = 99\n\nprint(x[1])  # now prints 99\n```\n\
    \nThis brings us to a stark difference between lists and strings: *lists are mutable*.\
    \ You can change individual elements inside the list without creating a new list!\
    \ Remember with strings, you couldn‚Äôt change them‚Äîyou could only make new ones.\n\
    \nIt‚Äôs such a key difference, we‚Äôre going to talk about it in detail now, and\
    \ then again later. This is a big source of confusion among new developers.\n\n\
    ### 8.4 List Assignments\n\nDo you remember way back in the variables chapter\
    \ when I was talking about how variable assignment worked? Revisit it if you have\
    \ to.\n\nAnd you were wondering what that had to do with anything?\n\nWell, we‚Äôre\
    \ going to check it out again, but this time in the context of lists.\n\nWe just\
    \ mentioned that lists are different than integers in that lists are mutable.\
    \ We can change them. This has some interesting repercussions.\n\nLet‚Äôs look at\
    \ strings versus lists.\n\n```\nx = \"Hello\"\ny = x\n```\n\nIn that example,\
    \ as we learned earlier, there is one string \"Hello\" in memory, and both x and\
    \ y refer to it.\n\nStrings are immutable. So you can‚Äôt do something like this:\n\
    \n```\nx = \"Hello\"\ny = x\n\n# Change character at index 2 to 'Z'\nx[2] = \"\
    Z\"  # ERROR! Strings are immutable--you can't change them\n```\n\nBut lists are\
    \ mutable. We can change something that‚Äôs in a list. Let‚Äôs do an analogous example:\n\
    \n```\nx = [\"A\", \"B\", \"C\", \"D\"]\ny = x\n\n# Change string at index 2 to\
    \ 'Z'\nx[2] = \"Z\"  # Works\n\nprint(x[2])  # \"Z\"\nprint(y[2])  # \"Z\" also!!!\n\
    ```\n\nWait‚Äîwhat happened there? We changed the value in the second index of x,\
    \ but it also changed it in y! How did that happen?\n\nRemember: it‚Äôs because\
    \ when we did:\n\n```\nx = [\"A\", \"B\", \"C\", \"D\"]\ny = x\n```\n\nboth x\
    \ and y came to point to the same list. There is only one list. Both x and y refer\
    \ to it. So if you change that one list, you see that change reflected in both\
    \ x and y.\n\n(If you could change a string, it would work the same way. But you\
    \ can‚Äôt because it‚Äôs immutable.)\n\nMutable types include the following (some\
    \ of which we haven‚Äôt talked about yet):\n\n- Lists\n- Dictionaries\n- Objects¬π\n\
    - Sets\n\n> In some languages, types that appear to get copied on assignment (like\
    \ strings and integers) are called value types. Whereas types that can be referred\
    \ to by multiple variables through assignment (like lists) are called reference\
    \ types. Python doesn‚Äôt make this distinction, although you might hear this phraseology\
    \ used in the wild.\n\nWhat if you want a copy of a list, and not just a copy\
    \ of the reference? You can force a list copy a number of ways, but these are\
    \ three common ones:\n\n```\nb = a.copy()  # Copy with .copy() method\nb = list(a)\
    \   # Copy with the list() function\nb = a[:]      # Copy by slicing the entire\
    \ list\n```\n\nEven if you don‚Äôt have it quite down yet, don‚Äôt worry. We‚Äôll hit\
    \ this topic a few more times as we progress.\n\n### 8.5 for and Lists‚ÄîPowerful\
    \ Stuff\n\nProblem-solving step: Understanding the Problem.\n\n¬π Technically,\
    \ lists and dictionaries are objects, so we‚Äôre being a bit redundant."
