    \nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÂõûÈ°æ„ÄÇ**\n\nÊàë‰ª¨Êú¨ÂèØ‰ª•ÂÅöÂæóÊõ¥Â•ΩÂêóÔºü\n\nÊàë‰ª¨‰∏çÈúÄË¶Å‰∏≠Èó¥ÂèòÈáèy„ÄÇÊàë‰ª¨ÂèØ‰ª•ÁÆÄÂçïÂú∞Ôºö\n\n```python\n1  x = input(\"\
    Enter a string of at least 3 characters: \")\n2  print(x[1:-1])   # all but the\
    \ first and last\n```\n\nÊ≠§Â§ñÔºåÊàë‰ª¨ÂÆûÈôÖ‰∏äÂπ∂Ê≤°ÊúâÂº∫Âà∂Áî®Êà∑ËæìÂÖ•Ëá≥Â∞ë3‰∏™Â≠óÁ¨¶„ÄÇÊàë‰ª¨ËØ•Â¶Ç‰ΩïÂÅöÂà∞Ëøô‰∏ÄÁÇπÔºüËøòËÆ∞ÂæóÊàë‰ª¨‰πãÂâçÂ¶Ç‰Ωï‰ΩøÁî®whileÂæ™ÁéØÊù•È™åËØÅËæìÂÖ•ÂêóÔºüÊàë‰ª¨ÂèØ‰ª•ÂÅöÂêåÊÝ∑ÁöÑ‰∫ãÊÉÖ„ÄÇ\n\
    \n‰ΩÜÊòØÊàë‰ª¨Â¶Ç‰ΩïÂà§Êñ≠‰∏Ä‰∏™Â≠óÁ¨¶‰∏≤ÊòØÂê¶Ëá≥Â∞ëËææÂà∞Êüê‰∏™ÈïøÂ∫¶Âë¢ÔºüÊúâÂáÝÁßçÊñπÊ≥ï„ÄÇ‰∫ãÂÆûËØÅÊòéÔºåÂ¶ÇÊûúÂ≠óÁ¨¶‰∏≤ÁöÑÈïøÂ∫¶Â∞è‰∫é3Ôºå‰ΩÝÁöÑÂàáÁâáÂ∞ÜÊòØ‰∏Ä‰∏™Á©∫Â≠óÁ¨¶‰∏≤Ôºà\"\"ÔºâÔºå‰ΩÝÂèØ‰ª•Áî®ÂÆÉÊù•Ê£ÄÊµã„ÄÇ\n\
    \nÁ®çÂêéÔºåÊàë‰ª¨ËøòÂ∞ÜËÆ®ËÆ∫*len()*ÂáΩÊï∞ÔºåÂÆÉÂ∞ÜÁªô‰ΩÝ‰ºÝÂÖ•ÁöÑ‰ªª‰ΩïÂ≠óÁ¨¶‰∏≤ÁöÑÈïøÂ∫¶„ÄÇ\n\n### 7.11 ÊèíÊõ≤ÔºöÂèØÂèò‰∏é‰∏çÂèØÂèòÁ±ªÂûã\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò„ÄÇ**\n\
    \nÂà∞ÁõÆÂâç‰∏∫Ê≠¢ÔºåÊàë‰ª¨Â∑≤ÁªèÂ≠¶‰πÝ‰∫Ü‰∏âÁßçÊï∞ÊçÆÁ±ªÂûãÔºöÊï¥Êï∞„ÄÅÊµÆÁÇπÊï∞ÂíåÂ≠óÁ¨¶‰∏≤„ÄÇÊâÄÊúâËøô‰∫õÈÉΩÊúâ‰∏Ä‰∏™ÂÖ±ÂêåÁâπÁÇπÔºöÂÆÉ‰ª¨ÈÉΩÊòØ*‰∏çÂèØÂèòÁöÑ*„ÄÇÔºà‰πüÂ∞±ÊòØËØ¥Ôºå‰ΩÝ‰∏çËÉΩÊîπÂèòÂÆÉ‰ª¨„ÄÇÊ≥®ÊÑèÔºå‰ΩÝÊÄªÊòØÂèØ‰ª•ÊîπÂèòÂèòÈáèÂºïÁî®ÁöÑ‰∏úË•ø‚Äî‚Äî‰πüÂ∞±ÊòØËØ¥Ôºå‰ΩÝÂèØ‰ª•Â∞ÜÂèòÈáèËµãÂÄº‰∏∫ÂºïÁî®ÂÖ∂‰ªñ‰∏úË•ø‚Äî‚Äî‰ΩÜ‰ΩÝ‰∏çËÉΩÊîπÂèò‰∏çÂèØÂèòÁöÑ‰∏úË•øÊú¨Ë∫´„ÄÇÔºâ\n\
    \nËøôÊÑèÂë≥ÁùÄ*‰ªª‰ΩïÊó∂ÂÄô‰ΩÝÂØπËøô‰∫õÁ±ªÂûã‰∏≠ÁöÑ‰ªª‰Ωï‰∏ÄÁßçËøõË°åÊìç‰ΩúÔºå‰ΩÝÈÉΩ‰ºöÂæóÂà∞‰∏Ä‰∏™Êñ∞ÁöÑÂÆû‰Ωì*„ÄÇ‰πüËÆ∏ÊóßÁöÑÂÆû‰ΩìË¢´‰øùÁïôÔºåÊàñËÄÖÊÝπÊçÆ‰ΩÝÁöÑ‰ª£ÁÝÅÂ¶Ç‰ΩïÂ∑•‰ΩúËÄåË¢´ÈÅóÂøò„ÄÇ\n\nÁÆÄËÄåË®Ä‰πãÔºåÊ≤°ÊúâÂäûÊ≥ïÂú®Â≠óÁ¨¶‰∏≤Êú´Â∞æÊ∑ªÂäÝ‰∏úË•ø„ÄÇ‰ΩÝÂèØ‰ª•Âèñ‰∏Ä‰∏™Â≠óÁ¨¶‰∏≤Âπ∂Âú®ÂÖ∂Êú´Â∞æÊ∑ªÂäÝ‰∏Ä‰∫õ‰∏úË•øÔºå‰ªéËÄåÂàõÂª∫‰∏Ä‰∏™ÂÖ®Êñ∞ÁöÑÂ≠óÁ¨¶‰∏≤Ôºå‰ΩÜËøôÊòØ‰∏Ä‰∏™Êñ∞Â≠óÁ¨¶‰∏≤„ÄÇÂéüÂßãÂ≠óÁ¨¶‰∏≤Ê∞∏Ëøú‰∏ç‰ºöË¢´‰øÆÊîπÔºåÂõÝ‰∏∫ÂÆÉÊòØ‰∏çÂèØÂèòÁöÑ„ÄÇ\n\
    \n```python\nx = \"hello\"\ny = x + \" world\"\n\nprint(x)  # hello\nprint(y)\
    \  # hello world\n```\n\nÂú®ÈÇ£‰∏™‰æãÂ≠ê‰∏≠ÁúãÂà∞xÁöÑÂÄºÊ≤°ÊúâÊîπÂèòÂêóÔºüÂç≥‰ΩøÊàë‰ª¨ÊÉ≥ÊîπÂèòÂÆÉÔºåÊàë‰ª¨‰πüÂÅö‰∏çÂà∞„ÄÇÁúãÁúãËøô‰∏™Ôºö\n\n```python\n\
    x = \"hello\"\nprint(x[2])  # print character 2, namely \"l\"\n\nx[2] = \"z\"\
    \  # ERROR! Python won't allow you to change the string!\n```\n\nÂ¶ÇÊûú‰ΩÝÊÉ≥ÂàõÂª∫‰∏Ä‰∏™Â≠óÁ¨¶‰∏≤ÔºåÂÖ∂‰∏≠Á¨¨2‰∏™Â≠óÁ¨¶Ë¢´ÊõøÊç¢ÊéâÔºå‰ΩÝÂøÖÈ°ªÂ∞ÜÂÖ∂ÂàáÁâáÂπ∂Ëá™Â∑±ÊûÑÂª∫„ÄÇ\n\
    \n```python\nx = \"hello\"\ny = x[:2] + \"z\" + x[3:]  # Make a new string\n\n\
    print(y)  # hezlo\n```\n\nÊàñËÄÖ‰ΩÝÂèØ‰ª•‰ΩøÁî®*Ê≠£ÂàôË°®ËææÂºè*¬πÊàñÂÖ∂‰ªñÂ≠óÁ¨¶‰∏≤ÊñπÊ≥ïÊù•ÊõøÊç¢Â≠óÊØç‚Ä¶‚Ä¶‰ΩÜËØ∑ËÆ∞‰ΩèÔºåËøô‰∫õÊñπÊ≥ï‰ºö‰∫ßÁîü‰∏Ä‰∏™Êñ∞ÁöÑÂ≠óÁ¨¶‰∏≤‚Äî‚ÄîÂÆÉ‰ª¨ÂøÖÈ°ªËøôÊÝ∑ÂÅöÔºåÂõÝ‰∏∫Â≠óÁ¨¶‰∏≤ÊòØ‰∏çÂèØÂèòÁöÑÔºÅ\n\
    \nÊï∞Â≠ó‰πüÊòØÂ¶ÇÊ≠§ÔºåÂ∞ΩÁÆ°ËøôÁßçË°å‰∏∫‰ΩÝÂèØËÉΩËÆ§‰∏∫ÊòØÁêÜÊâÄÂΩìÁÑ∂ÁöÑÔºåÂõÝ‰∏∫ÂÆÉÂ§™Â∏∏ËßÅ‰∫Ü„ÄÇ\n\n```python\nx = 12\ny = x + 2  # This creates\
    \ a new number--it doesn't change 12\n\nprint(x)  # 12\nprint(y)  # 14\n```\n\n\
    Â∞±ÂÉèÊàëËØ¥ÁöÑÔºåÂà∞ÁõÆÂâç‰∏∫Ê≠¢Êàë‰ª¨Â≠¶‰πÝÁöÑÊâÄÊúâÁ±ªÂûãÈÉΩÊòØ‰∏çÂèØÂèòÁöÑ„ÄÇ‰ΩÜÁ®çÂêéÔºåÊàë‰ª¨Â∞ÜËÆ®ËÆ∫ÂàóË°®„ÄÅÂ≠óÂÖ∏ÂíåÈõÜÂêàÔºåÂÆÉ‰ª¨ÊòØPython‰∏≠ÁöÑ‰∏âÁßçÂèØÂèòÁ±ªÂûã„ÄÇ\n\nÊâÄ‰ª•ËØ∑ËÆ∞‰ΩèÔºö‰ªª‰ΩïÊó∂ÂÄô‰ΩÝËÆ§‰∏∫‰ΩÝÊ≠£Âú®‚ÄúÊîπÂèò‚Äù‰∏Ä‰∏™Â≠óÁ¨¶‰∏≤Ôºå‰ΩÝÂÆûÈôÖ‰∏äÊòØÂú®ÂàõÂª∫‰∏Ä‰∏™ÂÖ®Êñ∞ÁöÑÂ≠óÁ¨¶‰∏≤„ÄÇËÆ∞‰ΩèËøô‰∏™Ê®°ÂûãÂæàÈáçË¶ÅÔºåÂõÝ‰∏∫ÂÆÉÂ∞ÜÈò≤Ê≠¢Êàë‰ª¨Âú®Â≠¶‰πÝËøáÁ®ã‰∏≠Âá∫Áé∞ÂêÑÁßçÈîôËØØÂíåËØØËß£„ÄÇ\n\
    \n### 7.12 Â≠óÁ¨¶‰∏≤ÁöÑforÂæ™ÁéØ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò„ÄÇ**\n\nËøòËÆ∞ÂæóÊàë‰ª¨‰πãÂâçÂ¶Ç‰Ωï‰ΩøÁî®for‰∏érange()Êù•ËÆ°Êï∞Âà∞Êüê‰∏™Êï∞Â≠óÂêóÔºü‰∫ãÂÆûËØÅÊòéÔºåforÁöÑÂäüËÉΩËøú‰∏çÊ≠¢‰∫éÊ≠§„ÄÇÂÆÉÂÖÖÊª°‰∫ÜÊÉäÂñúÔºÅ\n\
    \nÊàë‰ª¨ÂèØ‰ª•ÂØπÂ≠óÁ¨¶‰∏≤‰ΩøÁî®forÂæ™ÁéØÊù•ÈÄê‰∏™Â§ÑÁêÜÂ≠óÁ¨¶„ÄÇ\n\n```python\ns = \"Hello!\"\n\nfor c in s:\n    print(\"\
    character:\", c)\n```\n\n¬πÊàë‰ª¨Á®çÂêé‰ºöËÆ®ËÆ∫Ê≠£ÂàôË°®ËææÂºèÔºåÊàñÁß∞regexes„ÄÇ\n\nÂ¶ÇÊûú‰ΩÝËøêË°åËøô‰∏™Ôºå‰ΩÝ‰ºöÁúãÂà∞ÂÆÉ‰æùÊ¨°ÊâìÂç∞Âá∫ÊØè‰∏™Â≠óÁ¨¶Ôºö\n\
    \n```\ncharacter: H\ncharacter: e\ncharacter: l\ncharacter: l\ncharacter: o\n\
    character: !\n```\n\nÂ¶ÇÊûú‰ΩÝÈúÄË¶ÅÈÄê‰∏™Â≠óÁ¨¶Âú∞ÈÅçÂéÜÂ≠óÁ¨¶‰∏≤ÔºåÂèØ‰ª•‰ΩøÁî®Ëøô‰∏™„ÄÇÂΩìÁÑ∂ÔºåÂ¶ÇÊûú‰ΩÝÂè™ÊÉ≥ÈÅçÂéÜÂ≠óÁ¨¶‰∏≤ÁöÑ*‰∏ÄÈÉ®ÂàÜ*Ôºå‰ΩÝÂèØ‰ª•ÂÖàÂØπÂÖ∂ËøõË°åÂàáÁâáÔºÅ\n\n\
    ËøôÈáåËøòÊúâ‰∏Ä‰∏™ÂèØËÉΩÊúâÁî®ÁöÑÂ∞èÁü•ËØÜÁÇπÔºåÈÇ£Â∞±ÊòØ`enumerate()`ÂáΩÊï∞„ÄÇÂÆÉÂ∞ÜËøîÂõû‰∏ÄÁ≥ªÂàó*Á¥¢Âºï-ÂÄºÂØπ*„ÄÇ‰πüÂ∞±ÊòØËØ¥ÔºåÂÆÉÂêåÊó∂ËøîÂõûÂ≠óÁ¨¶‰∏≤ÁöÑÁ¥¢Âºï*Âíå*ËØ•Á¥¢ÂºïÂ§ÑÁöÑÂ≠óÁ¨¶„ÄÇ\n\
    \n```python\ns = \"Hello!\"\n\nfor i, c in enumerate(s):\n    print(\"character\
    \ at index\", i, \"is:\", c)\n```\n\nËæìÂá∫Ôºö\n\n```\ncharacter at index 0 is: H\n\
    character at index 1 is: e\ncharacter at index 2 is: l\ncharacter at index 3 is:\
    \ l\ncharacter at index 4 is: o\ncharacter at index 5 is: !\n```\n\nÂ¶ÇÊûú‰ΩÝÈúÄË¶ÅÁü•ÈÅìÁ¥¢Âºï*Âíå*Â≠óÁ¨¶ÔºåËøôÂæàÊúâÁî®„ÄÇÁ®çÂêé‰ºöÊõ¥Â§öÂú∞‰ªãÁªç`enumerate()`ÂáΩÊï∞„ÄÇ\n\
    \n### 7.13 Â≠óÁ¨¶‰∏≤ÂáΩÊï∞ÂíåÊñπÊ≥ï\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò„ÄÇ**\n\nPythonÊúâËÆ∏Â§öÂÜÖÁΩÆÂáΩÊï∞Êù•Â∏ÆÂä©‰ΩÝÊìç‰ΩúÂíå‰ΩøÁî®Â≠óÁ¨¶‰∏≤„ÄÇ\n\n‰ª•‰∏ãÊòØ‰∏Ä‰∫õÔºö\n\
    \n| ÂáΩÊï∞ | Á§∫‰æã | ÊèèËø∞ |\n| :--- | :--- | :--- |\n| `bool()` | `bool(s)` | ËΩ¨Êç¢‰∏∫Â∏ÉÂ∞îÂÄº„ÄÇÂîØ‰∏ÄËΩ¨Êç¢‰∏∫`False`ÁöÑÂ≠óÁ¨¶‰∏≤ÊòØÁ©∫Â≠óÁ¨¶‰∏≤`\"\
    \"`„ÄÇÔºàËøôÊÑèÂë≥ÁùÄÁ©∫Â≠óÁ¨¶‰∏≤Âú®`if`Êù°‰ª∂‰∏≠Â∞ÜË¢´ËßÜ‰∏∫`False`„ÄÇÔºâ |\n| `float()` | `float(s)` | ËΩ¨Êç¢‰∏∫ÊµÆÁÇπÂÄº„ÄÇ |\n|\
    \ `input()` | `input(s)` | ÊâìÂç∞ÊèêÁ§∫Á¨¶`s`ÔºåÁÑ∂ÂêéËøîÂõûÈîÆÁõòËæìÂÖ•ÁöÑÂ≠óÁ¨¶‰∏≤„ÄÇ |\n| `int()` | `int(s)` | ËΩ¨Êç¢‰∏∫Êï¥Êï∞ÂÄº„ÄÇ\
