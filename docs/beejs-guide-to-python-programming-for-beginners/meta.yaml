    \ enters a period, and insert them into the correct location in the list.\n\n\
    ```\ndone = False\n\n# We're going to loop until the user enters a single `.`\
    \ on a line\nwhile not done:\n\n    # Read a line of input\n    line = input()\n\
    \n    # Check if we're done\n    if line == '.':\n        done = True\n      \
    \  continue  # Jump back to the `while`\n\n    # Otherwise, insert the line, adding\
    \ a newline to the end (since\n    # input() strips it off).\n    lines.insert(line_num,\
    \ line + '\\n')\n\n    # And now on to the next line\n    line_num += 1\n```\n\
    \nAll right, let's test it. Let's insert lines at the beginning:\n\n```\n> l 1\n\
    1: This is line 1\n2: This is line 2\n3: This is line 3\n4: This is line 4\n5:\
    \ This is line 5\n> a 0\nNEW line 1\nNEW line 2\n.\n> l 1\n1: NEW line 1\n2: NEW\
    \ line 2\n3: This is line 1\n4: This is line 2\n5: This is line 3\n6: This is\
    \ line 4\n7: This is line 5\n```\n\nWorks!\n\nLet's insert lines in the middle:\n\
    \n```\n> a 4\nNEW line in the middle\n.\n> l 1\n1: NEW line 1\n2: NEW line 2\n\
    3: This is line 1\n4: This is line 2\n5: NEW line in the middle\n6: This is line\
    \ 3\n7: This is line 4\n8: This is line 5\n```\n\nWorks!\n\nLet's insert some\
    \ lines at the end:\n\n```\n> a 8\nNEW end line 1\nNEW end line 2\n.\n> l 1\n\
    1: NEW line 1\n2: NEW line 2\n3: This is line 1\n4: This is line 2\n5: NEW line\
    \ in the middle\n6: This is line 3\n7: This is line 4\n8: This is line 5\n9: NEW\
    \ end line 1\n10: NEW end line 2\n```\n\nAlso works! *Woot!*\n\nAlthough it's\
    \ not automated, this is good *test coverage*. We looked at the common case (insert\
    \ in the middle), but we also looked at the *edge cases* (insert at the beginning\
    \ and end) just to make sure those worked properly. When testing, always think\
    \ about which cases *aren't* common and test those explicitly.\n\nNow there's\
    \ but one thing remaining: saving the file to disk with the \"w\" (write) command.\n\
    \nProblem-solving step: **Understanding the Problem**\n\nWe already wrote some\
    \ code back in the day to read a file a line at a time and store the results in\
    \ a list.\n\nThis time, we want to do the opposite. Go through our list and write\
    \ the file a line at a time until we're done.\n\nProblem-solving step: **Devising\
    \ a Plan**\n\nCompared to the append command, this is cake.\n\n- Open the file\
    \ for writing\n- Loop through all the lines\n- Write each line to the file\n\n\
    Also:\n\n- Hook up the ‚Äúw‚Äù command in the main input loop.\n\nAnd:\n\n- Parse\
    \ the argument from the ‚Äúw‚Äù command to get the filename\n\nSince ‚Äúwrite a bunch\
    \ of lines to disk‚Äù is a good self-contained operation, I plan to write a function\
    \ that does just that and nothing more. I‚Äôll write a different function to get\
    \ called when a write is requested which will make sure the args are correct and\
    \ so on. Keep it modular!\n\nProblem-solving step: **Carrying Out the Plan**\n\
    \nFirst, let‚Äôs add a function to write the file to disk. As arguments, it‚Äôll take\
    \ the list of lines to write and a filename to write it to.\n\nWhen we open the\
    \ file, we‚Äôll pass the \"w\" argument to it to indicate that we‚Äôre writing this\
    \ file.\n\nNote that as soon as you open a file for writing, it erases that file\
    \ if it exists. But this should be OK in this case since we‚Äôre about to write\
    \ it again.\n\nAnd since every line already has a newline at the end, we don‚Äôt\
    \ have to add one when we write it to disk.\n\n```\ndef write_file(lines, filename):\n\
    \    \"\"\"Write a file to disk\"\"\"\n    with open(filename, \"w\") as f:\n\
    \        for line in lines:\n            f.write(line)\n```\n\nNow let‚Äôs write\
    \ the handler for the command. This will check if the arg was specified and print\
    \ an error if not. And then write the file.\n\n```\ndef handle_write(args, lines):\n\
    \    \"\"\"Handle the write command\"\"\"\n\n    if len(args) == 1:\n        filename\
    \ = args[0]\n    else:\n        print(\"usage: w filename\")\n        return\n\
    \n    write_file(lines, filename)\n```\n\nLastly, we need to add a handler to\
    \ the main command loop so that when we type ‚Äúw‚Äù, it saves the file:\n\n```\n\
    # Write (save) the file\nelif command[0] == 'w':\n    handle_write(args, lines,\
    \ filename)\n```\n\nAnd that‚Äôs that!\n\nProblem-solving step: **Looking Back**\n\
    \nThere are a lot of things we can do to improve the code here.\n\n- Add the option\
    \ for the delete command to specify an ending as well as a starting line to erase\
    \ a block of lines at once.\n- Make it so that if the user specifies a filename\
    \ on the command line and does *not* specify one after the write command, it writes\
    \ to the same file specified on the command line.\n- Add an insert command that\
    \ works like append, except it puts the new material *before* the line specified.\
    \ How can you do this with minimal addition of code? After all, append and insert\
    \ are *very* similar.\n\nWhat's crazy is that you can use this to write Python\
    \ programs. Let's do one!\n\n```\n$ python lineedit.py\n> a 0\nprint(\"Hello,\
    \ world!\")\nprint(\"I wrote this with my own editor!\")\n.\n> l 1\n1: print(\"\
    Hello, world!\")\n2: print(\"I wrote this with my own editor!\")\n> w my_hello.py\n\
    > q\n$ python3 my_hello.py\nHello, world!\nI wrote this with my own editor!\n\
    $\n```\n\nWell, you can probably tell that's not quite as easy as using VS Code\
    \ (or any other editor, for that matter). But, believe it or not, line editors\
    \ were *the* way to enter programs for a long time.\n\nBe thankful for standing\
    \ on the shoulders of giants!\n\n(Solution<sup>8</sup>.)\n\n## 13.9 Exercises\n\
