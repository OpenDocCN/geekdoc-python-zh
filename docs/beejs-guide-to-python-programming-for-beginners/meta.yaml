  - "[PAGE 97]\n\nChapter 10. Functions\n\n92\n\nIf we have *n* ships, we'll need\
    \ and *n* by *n* grid to be displayed to show all the distances between all of\
    \ them. But how? Think back to the loops chapter...\n\nYou can do it with a *nested\
    \ loop*. The outer one goes for *n* rows, and the inner one goes for *n* columns.\n\
    \nFor printing the number with 2 decimal places in a field of width 8, you can\
    \ use a f-string with some special formatting specifiers, for example:\n\n```\n\
    distance = 99.99\nprint(f'{distance:8.2f}')    # prints \"   99.99\"\n```\n\n\
    All righty! Let's print some stuff!\n\nProblem-solving step: **Carrying Out the\
    \ Plan**\n\n```\ndef print_grid(locations):\n    \"\"\"Print a grid of ship-to-ship\
    \ distances.\"\"\"\n\n    num_ships = len(locations)\n\n    for i in range(num_ships):\n\
    \        for j in range(num_ships):\n            dist = 99.99\n            print(f'{dist:8.2f}',\
    \ end=\"\")\n        print()\n\nlocations = get_ship_locations()\nprint_grid(locations)\n\
    ```\n\nRunning that gives:\n\n```\nEnter ship location x,y,z (or \"done\"): 1,2,3\n\
    Enter ship location x,y,z (or \"done\"): 4,5,6\nEnter ship location x,y,z (or\
    \ \"done\"): 7,8,9\nEnter ship location x,y,z (or \"done\"): done\n   99.99  \
    \  99.99    99.99\n   99.99    99.99    99.99\n   99.99    99.99    99.99\n```\n\
    \nHey, a nice 3x3 grid for our 3 ships!\n\nNext, let's put the ship row number\
    \ just to the left of each row. Just editing the *for*-loop here:\n\n```\n   \
    \ for i in range(num_ships):\n        print(f'{i:8}', end=\"\")    # <-- add this\n\
    \        for j in range(num_ships):\n            dist = 99.99\n            print(f'{dist:8.2f}',\
    \ end=\"\")\n        print()\n```\n\nWe printed it in field width 8 just for consistency\
    \ with the distance numbers. Output is now:\n\n```\n       0    99.99    99.99\
    \    99.99\n       1    99.99    99.99    99.99\n       2    99.99    99.99  \
    \  99.99\n```\n\nWhich is good! Now we just need a row on the top. How about another\
    \ loop before everything else to print out that row?\n\n```\n    # Add this loop:\n\
    \    for i in range(num_ships):\n        print(f'{i:8}', end=\"\")\n    print()\n\
    \n    for i in range(num_ships):\n```"
  - "[PAGE 98]\n\nChapter 10. Functions\n\n93\n\n```\nprint(f'{i:8}', end=\"\")\n\
    for j in range(num_ships):\n    dist = 99.99\n    print(f'{dist:8.2f}', end=\"\
    \")\nprint()\n```\n\nAnd we get this:\n\n```\n        0       1       2\n0   99.99\
    \   99.99   99.99\n1   99.99   99.99   99.99\n2   99.99   99.99   99.99\n```\n\
    \nEr, well, that's *almost* right. The top row is shifted one column left. We\
    \ need to stick 8 blank spaces in before it to scooch it over. So let's just do\
    \ it, using string multiplication to make us 8 spaces:\n\n```\nprint(\" \" * 8,\
    \ end=\"\")    # <-- Add this\n\nfor i in range(num_ships):\n    print(f'{i:8}',\
    \ end=\"\")\nprint()\n```\n\nAnd now we have this:\n\n```\n                0 \
    \      1       2\n0   99.99   99.99   99.99\n1   99.99   99.99   99.99\n2   99.99\
    \   99.99   99.99\n```\n\nwhich is looking *right on*. Except that all the distances\
    \ are listed as 99.99. Let's get that out of there and replace it with the real\
    \ distance between the ships.\n\nProblem-solving step: **Devising a Plan**\n\n\
    Distance! We see the distance formula up there at the top, repeated here:\n\n\
    $d = \\sqrt{(x_0 - x_1)^2 + (y_0 - y_1)^2 + (z_0 - z_1)^2}$\n\nHow do we turn\
    \ that into code?\n\nWe could use `math.sqrt()` to get the square root, and `math.pow()`\
    \ to square the numbers.\n\nAnother option is to compute, say, the difference\
    \ in the X coordinates and then multiply that result by itself to square it (since\
    \ $x \\times x = x^2$).\n\nLet's code them both and then use the one you like\
    \ best.\n\nProblem-solving step: **Carrying Out the Plan**\n\nHere's computing\
    \ the distance between points p0 and p1 (both of which are lists of X,Y,Z triples)\
    \ using `math.pow()`:\n\n```\nd = math.sqrt(\n    math.pow(p0[0] - p1[0], 2) +\
    \  # difference in Xs\n    math.pow(p0[1] - p1[1], 2) +  # difference in Ys\n\
    \    math.pow(p0[2] - p1[2], 2)    # difference in Zs\n)\n```\n\nAnd here's option\
    \ two:\n\n```\ndx = p0[0] - p1[0]   # difference in the Xs\ndy = p0[1] - p1[1]\
    \   # difference in the Ys\ndz = p0[2] - p1[2]   # difference in the Zs\n\nd =\
    \ math.sqrt(dx*dx + dy*dy + dz*dz)\n```\n\nWhich do you prefer? Both should give\
    \ equivalent answers."
  - "[PAGE 99]\n\nNow, sure, we could just throw that equation in the middle of our\
    \ code, but this is actually ripe to be made into its own function! If we do that,\
    \ we can reuse it easily later, should we ever want to. Let's wrap it up and add\
    \ it to our file:\n\n```\ndef dist3d(p0, p1):\n    \"\"\"Return the Euclidean\
    \ distance between 2 3D points.\"\"\"\n\n    # Compute the difference in the Xs,\
    \ Ys, and Zs\n    dx = p0[0] - p1[0]\n    dy = p0[1] - p1[1]\n    dz = p0[2] -\
    \ p1[2]\n\n    # Compute the distance. (Remember that multiplying a number by\n\
    \    # itself is the same as squaring the number.)\n    return math.sqrt(dx*dx\
    \ + dy*dy + dz*dz)\n```\n\nAnd then we can mod our code where we hardcoded that\
    \ 99.99 and have it call the distance formula instead! We just need to pass in\
    \ the two ships' locations‚Äîone is represented by the column number, and the other\
    \ by the row number:\n\n```\nfor i in range(num_ships):\n    print(f'{i:8}', end=\"\
    \")\n    for j in range(num_ships):\n        dist = dist3d(locations[i], locations[j])\
    \  # <-- Mod here\n        print(f'{dist:8.2f}', end=\"\")\n    print()\n```\n\
    \nAnd there we have it!\n\n(Solution<sup>11</sup>.)\n\n# 10.12 Exercises\n\n**Remember:\
    \ to get your value out of this book, you have to do these exercises.** After\
    \ 20 minutes of being stuck on a problem, you're allowed to look at the solution.\n\
    \nUse any knowledge you have to solve these, not only what you learned in this\
    \ chapter.\n\n**Always** use the four problem-solving steps to solve these problems:\
    \ understand the problem, devise a plan, carry it out, look back to see what you\
    \ could have done better.\n\n+   1. Write a program to input numbers repeatedly\
    \ until the user types ‚Äúdone‚Äù. Keep track of all the numbers in a list.\n\n  \
    \ Print out the maximum value the user entered using built-in functions.\n\n \
    \  (Solution<sup>12</sup>.)\n\n2. Write a function that takes an integer between\
    \ 0 and 9 as an argument. It should return a string that corresponds to the English\
    \ word for that number. For example, if the argument is 3, the function should\
    \ return \"three\".\n\n   (Solution<sup>13</sup>.)\n\n3. Write a function that\
    \ accepts the mass of two planets and the distance between them (for a total of\
    \ 3 arguments) and returns the force between them.\n\n   Use Newton's Universal\
    \ Law of Gravitation to calculate the force $F$:\n\n   $$F = G\\frac{m_1 m_2}{r^2}$$"
  - '[PAGE 100]


    In mathematical notation, to variables next to each other like $m_1 m_2$, above,
    indicate multiplication. And for $r^2$, a simple equivalent is $r \times r$.


    So we can convert that whole equation to:


    ```

    F = G * (m1 * m2) / (r * r)

    ```


    where m1 is the mass of one planet, m2 is the mass of the other planet and r is
    the distance between them.


    So far so good.


    But what''s G? It''s the *gravitational constant*:


    $G = 6.67430 \times 10^{-11}$


    That''s written in scientific notation, but we can do the same thing in Python:


    ```

    G = 6.67430e-11

    ```


    That should be enough to go on. Write the function and call it with a variety
    of different values. Here are some sample values so you can see if your code is
    working:


    | m1 | m2 | r | result |

    |---|---|---|---|

    | 10 | 20 | 30 | 1.48317e-11 |

    | 10 | 40 | 30 | 2.96635e-11 |

    | 100 | 5 | 10 | 3.33714e-10 |


    (Solution$^{14}$.)


    # 10.13 Summary


    Functions are a super-important part of programming and a highly valuable tool
    to have at your disposal. You can use them to break up code into smaller, more
    manageable pieces. You can also use them to create standalone, reusable pieces
    of code.


    Python comes with a pile of built-in functions, and it pays to know what they
    are (so you don''t reinvent them yourself!)


    Finally, you also learned that function arguments come in two flavors: positional
    and keyword. We''ll revisit more of that topic later.


    But now: well-deserved break time!'
