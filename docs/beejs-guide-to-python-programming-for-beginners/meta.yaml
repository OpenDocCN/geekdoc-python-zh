    # Chapter 6. Flow Control and Looping


    But how do we ask them repeatedly until they enter something valid? We need to
    loop! How about looping while the input is invalid? Sure!


    ```

    1  input_valid = False  # Assume it''s invalid to start

    2

    3  while not input_valid:   # While not input valid ("while input invalid")

    4      x = input("Enter a number, 5-50 inclusive: ")

    5      x = int(x)

    6

    7      if x >= 5 and x <= 50:

    8          input_valid = True   # We got a good number!

    ```


    Let''s study that pattern because it''s a common use of while.

    We start by assuming that the success condition isn''t met. And then we check
    every iteration of the loop, with if, to see if it is met. And we loop while the
    success condition is not true.

    Now, we''re also supposed to print an error if the input is out of range. How?
    We can do it in two lines.

    If the if condition is True, then we have good input. Otherwise we have bad input
    and should print a message... if... else!


    (Note: the code below is a continuation of the program, above. Pay attention to
    the line numbers!)


    ```

    7      if x >= 5 and x <= 50:

    8          input_valid = True   # We got a good number!

    9      else:

    10         print("The number must be between 5 and 50, inclusive!")

    11

    ```


    If you haven''t already, code that up and run it. No, it''s not the complete program,
    but it''s the complete first step of the program, and we can test it before moving
    on just to be confident that this part works.

    Run it and try it with some numbers. If you enter an invalid number, it should
    tell you so and ask again. If you enter a valid number, input_valid becomes True
    and the while loop exits (because the continuation condition is not input_valid).

    Once you''re satisfied it''s working correctly, let''s move back to the spec and
    concentrate on printing out the asterisks.


    Problem-solving step: **Devising a Plan.**

    If the user enters x, we want to print out x count of characters, total. The first
    30 of these will be #, and any after that will be *.

    Before we start things out, let''s use a different planning technique: *simplify
    the problem*.

    Let''s forget about the * for now and just print out # characters, however many
    the user-specified. Later we''ll add the code for *.


    > Simplifying the problem allows you to more easily tackle it, and leads you to
    see ways to add the missing features later.


    The plan for this simplified phase isn''t that tough:

    For however many numbers the user inputs:

    Print a `#`.


    Problem-solving step: **Carrying out the Plan.**

    Since we know how many #s we want to print (the user entered the number!) this
    would be a great place for a for loop. Let''s print those:


    ```

    12 # Print the line

    13 for i in range(x):

    14     print("#")

    ```


