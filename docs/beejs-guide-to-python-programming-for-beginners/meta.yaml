    \ Ha!'}\nprint(d[\"a\"][\"b\"]) # Mars! Ha!\n```\n\nÂÉèËøôÊÝ∑ÂµåÂ•óÂ≠óÂÖ∏ÂèØ‰ª•ÊòØ‰∏ÄÁßçÈùûÂ∏∏Âº∫Â§ßÁöÑÊï∞ÊçÆÂ≠òÂÇ®ÊñπÊ≥ï„ÄÇ\n\
    \n## 9.11 Â≠óÂÖ∏ÊòØÂèØÂèòÁöÑ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò„ÄÇ**\n\nÂΩì‰ΩÝÂØπÂ≠óÂÖ∏ËøõË°åËµãÂÄºÂ§çÂà∂Êó∂ÔºåÂÆÉÂ§çÂà∂ÁöÑÊòØÊåáÂêëÂêå‰∏Ä‰∏™Â≠óÂÖ∏ÁöÑ*ÂºïÁî®*ÔºåËÄå‰∏çÊòØÂàõÂª∫‰∏Ä‰∏™Êñ∞ÁöÑÂ≠óÂÖ∏„ÄÇÂ∞±ÂÉè*ÂàóË°®*ÂíåÂÖ∂‰ªñ‰ªª‰Ωï‰∏úË•ø‰∏ÄÊÝ∑„ÄÇ\n\
    ËøôÂæàÈáçË¶ÅÔºåÂõÝ‰∏∫Â≠óÂÖ∏ÊòØÂèØÂèòÁöÑÔºåÂ∞±ÂÉèÂàóË°®‰∏ÄÊÝ∑„ÄÇ\n\n```\nd = { \"beej\": 3490 }\n\ne = d  # e Âíå d ÈÉΩÊåáÂêëÂêå‰∏Ä‰∏™Â≠óÂÖ∏ÔºÅ\n\
    \ne[\"beej\"] = 3491  # ‰øÆÊîπÂÆÉ\n\nprint(d[\"beej\"])  # 3491\n```\n\nÂ¶ÇÊûú‰ΩÝÊÉ≥Â§çÂà∂‰∏Ä‰∏™Â≠óÂÖ∏ÔºåËØ∑‰ΩøÁî®‰ª•‰∏ãÊñπÊ≥ï‰πã‰∏ÄÔºö\n\
    \n```\nd = { \"beej\": 3490 }\n\ne = d.copy()  # Âà∂‰ΩúÂâØÊú¨ÔºåËøôÊòØÈ¶ñÈÄâÊñπÂºè\ne = dict(d)   #\
    \ Âà∂‰ΩúÂâØÊú¨\n```\n\nÁ¨¨‰∏ÄÁßçÊñπÂºèÊòØÈ¶ñÈÄâÔºåÂõÝ‰∏∫ÂÆÉÊõ¥ÊòìËØªÔºåËÄåÊòìËØªÁöÑ‰ª£ÁÝÅÊòØ*Âø´‰πê‰ª£ÁÝÅ‚Ñ¢*„ÄÇ\n\n## 9.12 Á´ÝËäÇÈ°πÁõÆ\n\nÂ¶ÇÊûúÈúÄË¶ÅÔºåËØ∑ÂõûÂà∞È°∂ÈÉ®Âà∑Êñ∞‰∏Ä‰∏ãËßÑËåÉ„ÄÇËÆ©Êàë‰ª¨ÂàÜËß£‰∏Ä‰∏ãÔºÅ\n\
    \nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò„ÄÇ**\n\nËØ•È°πÁõÆÁöÑÁõÆÊÝáÊòØÔºåÂØπ‰∫éÁªôÂÆöÁöÑ‰∫∫ÔºåÊâìÂç∞Âá∫‰ªñ‰ª¨Áà∂ÊØçÁöÑÂêçÂ≠ó‰ª•ÂèäÂá∫ÁîüÂπ¥‰ªΩ„ÄÇ\n\nÈùûÂ∏∏Áõ¥Êé•Ôºå‰ΩÜÁªÜËäÇÂÜ≥ÂÆöÊàêË¥•ÔºÅ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**Âà∂ÂÆöËÆ°Âàí„ÄÇ**\n\
    \nÂ¶ÇÊûúÊàë‰ª¨Êü•Áúã‰∏Ä‰∏™Á§∫‰æãËÆ∞ÂΩïÔºåÂèØ‰ª•ÁúãÂà∞Â≠óÂÖ∏ÈùûÂ∏∏ÈÄÇÂêàÂ≠òÂÇ®Ëøô‰∫õÊï∞ÊçÆÔºåÈîÆÂåÖÊã¨ `born`„ÄÅ`mother`„ÄÅ`siblings` Á≠â„ÄÇ\n\n```\nBeej\
    \ Jorgensen:\n    Born: 1990 [yes, I'm 29, is my story I'm sticking to]\n    Mother:\
    \ Mom Jorgensen\n    Father: Dad Jorgensen\n    Siblings: [Brother Jorgensen,\
    \ Sister Jorgensen, Little Sister Jorgensen]\n```\n\n‰∏ç‰ªÖÂ¶ÇÊ≠§ÔºåÊàë‰ª¨ËøòÂèØ‰ª•Â∞ÜÊâÄÊúâ*Ëøô‰∫õ*Â≠óÂÖ∏Â≠òÂÇ®Âú®Âè¶‰∏Ä‰∏™ÂÆπÂô®Â≠óÂÖ∏‰∏≠ÔºåËØ•ÂÆπÂô®Â≠óÂÖ∏‰ΩøÁî®‰∫∫ÁöÑÂêçÂ≠ó‰Ωú‰∏∫ÈîÆÔºÅ\n\
    \n```\ntree = { # Â§ñÂ±ÇÂ≠óÂÖ∏‰øùÂ≠òÊâÄÊúâ‰∫∫ÁöÑËÆ∞ÂΩï\n    \"Beej Jorgensen\": { # ÂÜÖÂ±ÇÂ≠óÂÖ∏‰øùÂ≠òÊØè‰∏™‰∫∫ÁöÑËØ¶ÁªÜ‰ø°ÊÅØ\n \
