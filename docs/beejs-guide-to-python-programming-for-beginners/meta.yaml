    python foo.py


    You can also run it like this:

    python foo.py something another antelopes


    Those extra words after the program name are called *command line arguments*.

    But *why* would you do this?

    So you can control the behavior of the program from the command line! When you
    run it, it‚Äôs nice to be able to influence behavior this way instead of having
    to call `input()` with prompts and everything else.

    But *how* do you get those extra command-line arguments?

    Our good friend `sys` module can help us again here.

    The variable `sys.argv` is a list that contains the program name followed by all
    the command line arguments.

    Run this program with a variety of command-line arguments and see what it outputs:


    ```

    import sys


    print(sys.argv)

    ```


    Example output:

    $ python foo.py

    [''foo.py'']


    $ python foo.py aa bb cc

    [''foo.py'', ''aa'', ''bb'', ''cc'']


    So at runtime, we can look in `sys.argv` and make decisions about what we want
    to do!

    Let‚Äôs put it to use in the next section.


