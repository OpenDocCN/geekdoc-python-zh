  md: "2. Our *off-by-one error*<sup>7</sup> that's causing our lines to be off by\
    \ one.\n\nYes, off-by-one errors are famous enough to have their own Wikipedia\
    \ page.\n\nAs the name suggests, our computations are one-off. But why? How?\n\
    \nThis is a really common disagreement between humans and computers. We humans\
    \ like to have our lists start at index ‚Äú1‚Äù, and computers like them to start\
    \ at index ‚Äú0‚Äù. It‚Äôs the age-old battle. Even the Romans started with ‚ÄúI‚Äù, but\
    \ that was mainly because Roman numerals didn‚Äôt have a character for zero until\
    \ 725 AD‚Äîlatecomers!\n\nAnd in this case, we have a human entering numbers that\
    \ start indexing at ‚Äú1‚Äù. And we print them out for the human to see starting with\
    \ index ‚Äú1‚Äù‚Ä¶\n\nBut in Python, the lines are in a list starting from index ‚Äú0‚Äù!\n\
    \nProblem-solving step: **Devising a Plan**\n\nWe need to do some math.\n\n+ \
    \  - When we want to go from a human (1-based) index to a computer (0-based) index,\
    \ we *subtract* one from the number. 1 becomes 0.\n- When we want to go from a\
    \ computer (0-based) index to a human (1-based) index, we *add* one from the number.\
    \ 0 becomes 1.\n\nSince we‚Äôre using `start` and `end` to index the list, I feel\
    \ a bit better having them 0-based because the list is 0-based.\n\nThere‚Äôs a general\
    \ rule of thumb at play here:\n\n+   - When a user enters a 1-based number, convert\
    \ it to 0-based as soon as you can for internal use in the program.\n- When you\
    \ have to display a 1-based number, keep it 0-based for as long as you can, and\
    \ only convert it at the last second when you output it.\n\nKeeping these conversions\
    \ to a minimum and doing them only on input and output can save you a lot of headaches.\n\
    \nWhat **not** to do: don‚Äôt just jump in and start adding +1s and -1s all over\
    \ the place and hoping for the best. That way lies madness, assuredly. Stop, understand,\
    \ and plan. And then carry it out.\n\nProblem-solving step: **Carrying Out the\
    \ Plan**\n\nI‚Äôm going to write a little helper function here to convert from 0-based\
    \ to 1-based since I think we‚Äôre going to be using this all over the place. And\
    \ it helps clarify the code a bit; instead of having a bunch of +1s and -1s all\
    \ over, you have a function name that has some meaning to future readers.\n\n\
    ```\ndef one_to_zero(n):\n    \"\"\"Convert a number from a 1-based index to a\
    \ 0-based index.\"\"\"\n    return n - 1\n```\n\nAnd now we can make use of that.\
    \ Let‚Äôs make `start` 0-based and try it out.\n\n```\nstart = one_to_zero(int(args[0]))\n\
    ```\n\nNow running it gives:\n\n```\n$ python lineedit.py lines.txt\n> l 1\n0:\
    \ This is line 1\n1: This is line 2\n2: This is line 3\n3: This is line 4\n4:\
    \ This is line 5\nTraceback (most recent call last):\n  File \"lineedit.py\",\
    \ line 76, in <module>\n```\n\n<sup>7</sup>https://en.wikipedia.org/wiki/Off-by-one_error"
