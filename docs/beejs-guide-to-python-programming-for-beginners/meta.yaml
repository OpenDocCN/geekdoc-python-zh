  - "[PAGE 37]\n\n# Chapter 6. Flow Control and Looping\n\nHmmm. Looks like it's printing\
    \ a hash on each line. The `print()` function puts a *newline* at the end of the\
    \ line. We need to override that behavior, and there's an easy way to do it.\n\
    \n```\n# Print the line\nfor i in range(x):\n    print(\"#\", end=\"\")  # Set\
    \ the end-of-line character to nothing\n\nprint()  # Add a newline to the end\
    \ of the line\n```\n\nWe did a bit of magic there. We passed another argument\
    \ to `print()` that told it we wanted it to put nothing (an empty string, \"\"\
    ) at the end of the line instead of the newline character it normally tacks on.\n\
    \nYou could go crazy and say `end=\"Beej\"` and it would put the word \"Beej\"\
    \ after every hashmark. Do it. Go crazy.\n\nGetting there! But we're not out of\
    \ the woods yet. We need to make it so that for character more than 30 characters\
    \ out, we print a `*` instead of a `#`.\n\nProblem-solving step: **Devising a\
    \ Plan.**\n\nThis is like the plan for printing the line from before, but we simplified\
    \ that, remember? So we have to add some complexity to meet the spec.\n\n```\n\
    For however many numbers the user inputs:\n    If we're at the 30th character\
    \ or earlier:\n        Print a `#`.\n    Otherwise:\n        Print a `*`.\n```\n\
    \nAnd that's looking like a good case for *if* inside our *for* loop!\n\nProblem-solving\
    \ step: **Carrying out the Plan.**\n\nLet's add that *if* logic to the *for* loop\
    \ at the end:\n\n```\n# Print the line\nfor i in range(x):\n    if i < 30:\n \
    \       print(\"#\", end=\"\")  # Set the end-of-line character to nothing\n \
    \   else:\n        print(\"*\", end=\"\")\n\nprint()  # Add a newline to the end\
    \ of the line\n```\n\nThere's something here to note that's subtle and important:\n\
    \n+   - If the user enters 40, the value of `i` runs from 0 to 39, because the\
    \ body of the *for* loop does not execute when `i` reaches its maximum value.\n\
    - But 0 to 39 is still 40 iterations, right? Just like 0,1,2,3 is a total of 4\
    \ iterations. So we're still getting all 40 characters even though the counter\
    \ is running from 0 to 39.\n- However, since the counter is running from 0, that\
    \ means the highest character that will be a `#` occurs when `i` is 29, not when\
    \ `i` is 30. This is why we test `i < 30` and not `i < 31`.\n\nBut there we have\
    \ it!\n\nBe sure to test with the *edge cases*. These are inputs that are at the\
    \ edges of conditions in your program.\n\nFor example, we have conditions testing\
    \ input against 5 and 50. So test with 4, 5, 50, and 51, both sides of those conditions.\n\
    \nWhere else do we have an edge case in the code? That right: the *if* when printing.\
    \ The first 30 are supposed to be `#` with `*` after that. So test with 30 and\
    \ make sure it's all `#`s, and then test with 31 and make sure there's a single\
    \ `*`.\n\n*Testing the edge cases* is an all-powerful programming technique that\
    \ all devs use to great effect.\n\n6We could have also tested `i <= 29`."
