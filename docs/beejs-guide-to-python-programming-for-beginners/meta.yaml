    \ with those. We‚Äôll have three starships with different names and different locations:\n\
    \n```\nship_location = [\n    [10, 20, 30],\n    [-10, 20, -30],\n    [10, -20,\
    \ 30]\n]\n\nship_name = [\n    \"MCRN Tachi\",\n    \"Red Dwarf\",\n    \"USCSS\
    \ Nostromo\"\n]\n```\n\nAnd then we can access ship #1 like this:\n\n```\nprint(ship_name[1])\n\
