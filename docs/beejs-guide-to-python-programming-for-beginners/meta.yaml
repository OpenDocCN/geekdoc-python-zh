    The slice starts at the first index number and stops *just before* the second
    index number. (Remind you of anything? Yes‚Äîjust like *range()*!)


    In this way, you can pull out any *substring* from a string.


    # 7.10 Midterm Challenge


    Problem-solving step: **Understanding the Problem.**


    Write a program that will allow the user to input a string, then will print out
    the entire string *except* the first and last characters. You can assume the string
    will be at least 3 characters long.


    So if the user enters Beej!, we want to print out eej. If they enter Python, we
    want to print out ytho.


    Problem-solving step: **Devising a Plan.**


    We need to:


    +   1. Input a string.

    2. Get a slice of the string not including the first and last characters.

    3. Print the slice.


    Steps 1 and 3 are pretty straightforward. But what about step 2?


    Since we don‚Äôt know how long the string will be (other than it‚Äôs three or more
    characters), we can‚Äôt just get a slice from 1 to, say, 5. We have to get a slice
    from index 1 to the second-from-the-end character.


    Fortunately, we know how to index to the second from the end: index -2! But wait‚Äìthere‚Äôs
    a catch: slices only go up to, but not including, the second index! So we need
    to end the slice at index -1 to cause it to not include the last character.


    Problem-solving step: **Carrying out the Plan.**


    ```

    1  x = input("Enter a string of at least 3 characters: ")

    2  y = x[1:-1]   # all but the first and last

    3  print(y)

    ```


    Easy peasy!


    Problem-solving step: **Looking Back.**


    What could we have done better?


    We didn‚Äôt need the intermediate variable y. We could have simply:


    ```

    1  x = input("Enter a string of at least 3 characters: ")

    2  print(x[1:-1])   # all but the first and last

    ```


    Also, we‚Äôre not actually enforcing the user to enter at least 3 characters. How
    would we do that? Remember how we used a while loop before to verify input? We
    could do the same.


    But how can we tell if a string is at least a certain length? There are a couple
    of ways. Turns out, your slice will be an empty string ("") if the length of the
    string is less than 3, and you could use that to detect.


    In a bit, we‚Äôll also discuss the *len()* function that will give you the length
    of any string you pass in.


