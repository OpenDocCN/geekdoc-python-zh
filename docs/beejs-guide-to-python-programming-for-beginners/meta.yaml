  md: 'Chapter 8. Lists


    49


    > **Fun Lists Fact:** Most other languages have a different name for lists: they
    call them ‚Äúarrays‚Äù. Same thing.


    But wait‚Äîif a list can hold a lot of things, how do we differentiate? How do I
    tell Python that I want the second thing in the list? Or the fifth thing?


    Luckily it‚Äôs easy enough; we just have to specify the *index* into the list that
    holds the thing we want.


    Think of it as a row of postboxes, numbered starting from 0, then 1, then 2, and
    going on up to however many postboxes we have. Each postbox can hold a thing,
    and you can refer to it by giving the postbox number.


    Let‚Äôs take a look at a simple example:


    ```

    x = [10, 3, 7, 9]

    ```


    There‚Äôs a list. We know it‚Äôs a list because of the square brackets around it.
    It‚Äôs a list of four integers.


    Let‚Äôs print out the zeroth element in the list. We do this by using square brackets
    after the list variable name and giving the index inside those brackets. Does
    this look familiar? It‚Äôs the same syntax we used to get individual characters
    out of strings!


    ```

    print(x[0])  # prints 10

    ```


    and the element at index 2:


    ```

    print(x[2])  # prints 7

    ```


    Do you remember that strings had a cool trick where you could use a negative index
    to refer to characters from the end of the string? We can do the same thing with
    lists!


    ```

    print(x[-1])  # prints 9, the element at the end of the list

    ```


    Remember that indexes start at zero, again, just like with strings.


    Keeping with the ‚Äúthings you can also do with strings‚Äù theme, you can also slice
    an array, just like a string.


    ```

    a = [1, 2, 3, 4, 5]


    b = a[1:-1]  # Slice all but the first and last elements


    print(b)  # [2, 3, 4]

    ```


    You can also *set* individual elements, leaving the rest of the list unchanged:


    ```

    x[1] = 99


    print(x[1])  # now prints 99

    ```


    This brings us to a stark difference between lists and strings: *lists are mutable*.
    You can change individual elements inside the list without creating a new list!
    Remember with strings, you couldn‚Äôt change them‚Äîyou could only make new ones.


    It‚Äôs such a key difference, we‚Äôre going to talk about it in detail now, and then
    again later. This is a big source of confusion among new developers.


    # 8.4 List Assignments


    Do you remember way back in the variables chapter when I was talking about how
    variable assignment worked? Revisit it if you have to.


    And you were wondering what that had to do with anything?


    Well, we‚Äôre going to check it out again, but this time in the context of lists.


    We just mentioned that lists are different than integers in that lists are mutable.
    We can change them. This has some interesting repercussions.'
