  - "[PAGE 135]\n\n# Chapter 13. Reading Files\n\nSo let‚Äôs do the rough overall, based\
    \ on the outline, above in Understanding The Problem.\n\n+   - First we‚Äôll get\
    \ the filename from the command line.\n- Then we‚Äôll read the file.\n- Then we‚Äôll\
    \ loop to get input for whatever it is the user wants to do (append, list, edit,\
    \ write, etc.)\n- For whatever the user enters, we‚Äôll do that thing.\n- When the\
    \ user says q to quit, we‚Äôll quit.\n\nThat‚Äôs a pretty loose plan. I mean, ‚ÄúWe‚Äôll\
    \ do that thing,‚Äù isn‚Äôt exactly well-fleshed-out. But we know it‚Äôs possible to\
    \ do them, and we can work on those individual command components one at a time\
    \ (since none of them are really dependent on one another).\n\nLooks like some\
    \ of those we can work on right away.\n\nProblem-solving step: **Devising a Plan**\n\
    \nLet‚Äôs start simple. Simplifying the problem is always a good way to get bits\
    \ and pieces done. Also, getting a minimum working piece going as soon as possible\
    \ can help direct our efforts and keep motivation up. Get a core piece in place,\
    \ and then keep adding on.\n\nWhat‚Äôs a simple version of the program?\n\nWell,\
    \ we could start by looking at the command line to see if there‚Äôs a filename there\
    \ or not, and storing it if there is.\n\nRemember the user has the option to run\
    \ the program without specifying a filename (since maybe they‚Äôre creating a new\
    \ file).\n\nSo we want to check the command line args in sys.argv. If the user\
    \ specified a filename, we‚Äôll store it. If they didn‚Äôt, we‚Äôll store None to indicate\
    \ that case. If they specify more than one argument, we‚Äôll print out a usage message.\n\
    \nGreat! Let‚Äôs go!\n\nProblem-solving step: **Carrying Out the Plan**\n\n```\n\
    import sys\n\n# Parse the command line\n\nif len(sys.argv) == 2:\n    filename\
