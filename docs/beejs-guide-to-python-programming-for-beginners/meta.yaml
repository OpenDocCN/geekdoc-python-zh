    # Chapter 18


    # Appendix D: Number Bases


    # 18.1 How to Count like a Boss


    You all have figured out by now how much I love numbers. So I‚Äôm going to keep
    talking about them! Yay!


    At some point, you might have heard that computers run on a bunch of 1s and 0s.
    That they‚Äôre binary. But what does that mean?


    As humans, we‚Äôre used to numbers. We use them all the time. 7 Dwarves. Speed limit
    55. 99 bottles of [your favorite beverage] on the wall.


    We use the digits 0-9. And we use them repeatedly.


    Computers, though, only have two digits: 0 and 1.


    That seems kind of limiting. What happens if you want to go higher than 1, to
    say, 2?


    Fortunately, there is a workaround. When computers want to go higher than 1, they
    do the same thing we humans do when we want to go higher than 9: we all add another
    *place*.


    As a human counting apples on a table, you start with 0, 1, and keep going‚Ä¶ 7,
    8, 9‚Ä¶ and then you‚Äôre out of digits for the *ones place*, which represents the
    number of individual items (1s of items) we‚Äôve seen so far.


    So you add another place, the *tens place*, which represents the number of 10s
    of items we‚Äôve seen so far.


    If we count to 27 apples, a number made up of 2 and 7, we know we have 2 10s of
    apples, and 7 1s of apples. Let that sink in. Every value in the 10s place is
    worth 10 apples. And every value in the 1s place is worth 1 apple.


    Therefore for 27 apples, we have


    $2 \times 10 + 7 \times 1 = 27$


    apples.


    Let‚Äôs do the same thing with $100. With that, I‚Äôm saying there‚Äôs a 1 in the 100s
    place, a 0 in the 10s place, and a 0 in the 1s place. This means the value is


    $1 \times 100 + 0 \times 10 + 0 \times 1$


    or $100.


    Computers go through this same process when they run out of digits, except they
    run out of digits a lot sooner, since they only have two of them.


    Let‚Äôs count apples in binary.


    0, 1‚Ä¶ oh no! We‚Äôre out of digits. We have to add another place. Except this time,
    in binary, it‚Äôs not the 10s place‚Ä¶ it‚Äôs the 2s place.'
