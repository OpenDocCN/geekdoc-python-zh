- md: "## 13.10 Summary\n\nWhat a chapter! That was like a 50% project, eh?\n\nBut\
    \ look at what we learned!\n\nWe covered how to open and read and write text files.\
    \ We talked about how to read and write a line at a time, as well.\n\nAnd we wrote\
    \ a simple line-based text editor! Most developers go their entire careers without\
    \ doing that.\n\nMore Python goodness in the next chapter‚Äîsee you there!\n\n##\
    \ Chapter 14\n\n## Exceptions\n\n### 14.1 Objective\n\n- Learn about different\
    \ ways of handling errors\n- Understand what exceptions are\n- Write programs\
    \ that catch exceptions\n- Throw your own exceptions\n\n### 14.2 Project\n\nWrite\
    \ a program called head.py that returns the first few lines of a file. For example,\
    \ if the user enters:\n`python head.py filename.txt 12`\nit should show the first\
    \ 12 lines of filename.txt.\nTake extra care to error-check all the input. Catch\
    \ any exceptions that might occur.\nSpend some time thinking about this; what\
    \ are *all* the things that can go wrong with *any* user input?\nIf there is some\
    \ kind of error condition, the program should print an appropriate error message\
    \ and exit.\n\n### 14.3 Errors in Programs\n\nProblem-solving step: **Understanding\
    \ the Problem**\nLet‚Äôs stop and think about this from a conceptual standpoint\
    \ for just a minute.\nNormally, a program produces data in the way you‚Äôve asked\
    \ for it. Unless something goes wrong. In which case, it produces ‚Äúbad‚Äù data.\n\
    Now, computers don‚Äôt really have much sense of right and wrong, as you‚Äôve seen\
    \ in the documentary *The Terminator*. So how can we differentiate between good\
    \ and bad data?\nHow can we tell that something‚Äôs gone wrong?\n\n### 14.4 Classic\
    \ Error Handling\n\nProblem-solving step: **Understanding the Problem**\nThere‚Äôs\
    \ one way we‚Äôve been using so far: the return value from a function. If it‚Äôs a\
    \ particular *sentinel value* that we‚Äôre on the lookout for, we can use that to\
    \ determine success or failure.\nFor example, let‚Äôs check out the .find() method\
    \ on strings. This returns the index in a string that a given substring can be\
    \ found. For example:\n\n```python\ns = 'Bears, beets, Battlestar Galactica'\n\
    \nx = s.find('beets')\n\nprint(x)  # 7, because that's the index 'beets' starts\
    \ at in the string\n```\n\nThe return value there of 7 is ‚Äúgood‚Äù data. We asked\
    \ for a thing and we got it. But what if something goes wrong?\n\n```python\n\
    s = 'Bears, beets, Battlestar Galactica'\n\nx = s.find('Dwight')\n\nprint(x) \
    \ # -1, because the substring isn't found\n```\n\n-1 here is the sentinel value\
    \ we're looking for to tell us if there's an error.\nWe can make decisions on\
    \ it. This is what I'd call ‚Äúclassic‚Äù error handling. This is the way people used\
    \ to handle errors when Stonehenge was built. And, like Stonehenge, this method\
    \ of handling errors is still in use to this day. If it ain't broke, don't fix\
    \ it.\nOK, yes, I admit Stonehenge is broke. Allow me my analogy!\n\n```python\n\
    s = 'Bears, beets, Battlestar Galactica'\n\nx = s.find(substring)\n\nif x == -1:\n\
    \    print(f\"Couldn't find {substring}\")\nelse:\n    print(f\"Found {substring}\
    \ at index {x}\")\n```\n\nThere! We successfully handled an error the classic\
    \ way.\nBut now let's learn another way.\n\n### 14.5 Error Handling with Exceptions\n\
    \nProblem-solving step: **Understanding the Problem**\nExceptions are another\
    \ way of indicating that something's gone wrong.\nWe've already seen some of these.\
    \ For example, if we run code that does this:\n\n```python\nint(\"Hello!\")  #\
    \ Convert Hello! to integer\n```\n\nPython's going to be upset. \"Hello!\" isn't\
    \ a number it's ever heard of. And when we run it, we get this message, and the\
    \ program exits:\n\n```\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: invalid literal for int() with base 10: 'Hello!'\n\
    ```\n\nThat's an exception in action. We tried some code, and it *raised an exception*\
    \ to tell us that what we were doing just wasn't going to work.\nExceptions are\
    \ raised (also sometimes said to be *thrown*) for all kinds of things in Python.\n\
    Try to open a nonexistent file for reading:\n\n```\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nFileNotFoundError: [Errno 2]\
    \ No such file or directory: 'keyser_soze.txt'\n```\n\nTry to divide a number\
    \ by zero:\n\n```\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nZeroDivisionError: division by zero\n```\n\nThose first condensed\
    \ words on the last line of the exception you see there? That's the name of the\
    \ exception that occurred.\n\n```\nValueError\nFileNotFoundError\nZeroDivisionError\n\
    ```\n\nSo, like using return values to indicate errors, exceptions also indicate\
    \ that an error occurred.\nNow‚Äîhow do we detect that and do something with it?\n\
    \n### 14.6 Catching Exceptions\n\nProblem-solving step: **Understanding the Problem**\n\
    Bear with me, because this code is a little different in how it gets executed.\n\
    We're going to use two new statements in conjunction: try and catch. Let's jump\
    \ right in with an example that we can dissect:\n\n```python\ntry:\n    x = input(\"\
    Enter a number: \")\n\n    x = int(x)    # Convert to integer\n\n    print(x *\
    \ 1000)\n\nexcept ValueError:\n    print(f'error converting \"{x}\" to integer')\n\
    ```\n\nWhat's happening there? Look at the big blocks first. We have a try block\
    \ and an except block.\nThink of the try block as the code you want to execute\
    \ in your shiny dreamworld where your user enters correct information every time.\n\
    Like the user enters 3490, and it converts to integer just fine, and then you\
    \ print out 3490000.\nPerfect.\nBut what if the user enters beans instead of a\
    \ number? int() is going to freak out and raise a ValueError, just like we saw\
    \ earlier.\n*Here's the magic.* If that happens, execution of the try block will\
    \ stop immediately, and Python will transfer control to the matching except block,\
    \ if it exists.\nSo for example, here's a successful run:\n\n```\nEnter a number:\
    \ 3490\n3490000\n```\n\nand here's a run where an exception is thrown:\n\n```\n\
    Enter a number: beans\nerror converting \"beans\" to integer\n```\n\nSee how it\
    \ transferred control right into the except block?\nThat's how we handle exceptions!\n\
    \n### 14.7 Catching Multiple Exceptions\n\nProblem-solving step: **Understanding\
    \ the Problem**\n\nWhat if your `try` block throws multiple exceptions?\n\nTurns\
    \ out you can catch multiple exceptions just by having multiple `except` clauses.\n\
    \nLet's try a program that divides a number by another:\n\n```python\nx, y = input('Enter\
    \ two numbers separated by a space: ').split()\n\nx = int(x)\ny = int(y)\n\nprint(f'{x}\
    \ / {y} == {x / y}')\n```\n\nWhat are the exceptions that can be thrown?\n\nGood\
    \ question. Although there is a list of built-in exceptions¬π, it's not immediately\
    \ obvious which one gets raised when.\n\nThe easy thing to do is try it in the\
    \ REPL. But try what?\n\n*Think like a villain.* What are the things that can\
    \ go wrong? What kinds of bad input can you pass this program?\n\nGive it some\
    \ thought. I count four things that can go wrong with bad user input. Can you\
    \ see them?\n\nWell, we're taking input, running it through `.split()`, and then\
    \ assigning the results into two variables. So the `split()` better return a list\
    \ of length 2, or something bad is going to happen.\n\nI'm going to put that line\
    \ of code into the REPL and see what it says if I enter something that's not two\
    \ numbers separated by a space.\n\n```\n>>> x, y = input(\"Enter 2 numbers: \"\
    ).split()\nEnter 2 numbers: 1\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nValueError: not enough values to unpack (expected 2, got\
    \ 1)\n```\n\nCheck it out! I entered a single number, and it raised `ValueError`\
    \ exception (with a message saying there weren't enough values).\n\nLet's try\
    \ too many values:\n\n```\n>>> x, y = input(\"Enter 2 numbers: \").split()\nEnter\
    \ 2 numbers: 1 2 3\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nValueError: too many values to unpack (expected 2)\n```\n\n\
    `ValueError` again! That means we can do something like this to catch it:\n\n\
    ```python\ntry:\n    x, y = input('Enter two numbers separated by a space: ').split()\n\
    \n    x = int(x)\n    y = int(y)\n\n    print(f'{x} / {y} == {x / y}')\n\nexcept\
    \ ValueError:\n    print(\"That's not two numbers separated by a space!\")\n```\n\
    \n¬πhttps://docs.python.org/3/library/exceptions.html"
