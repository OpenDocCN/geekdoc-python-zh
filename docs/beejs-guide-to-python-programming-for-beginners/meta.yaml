  md: '# # Chapter 2


    # # What is Programming, Anyway?


    # ## 2.1 Objectives


    +   - Be able to explain what a programmer does

    - Be able to explain what a program is

    - Be able to summarize the four big steps in solving problems


    # ## 2.2 More Terminology Than You Wanted


    Let‚Äôs say you‚Äôre entirely new to this stuff. You have a computer, you know how
    to use it, but you don‚Äôt know how to make it do exactly what you want it to.


    It‚Äôs the difference between a *user* and a *programmer*, right?


    But what does it mean to *program* a computer?


    In a nutshell, you have a goal (what you want to compute), and programming is
    the way you get there.


    A *program* is a description of a series of steps to complete that computation,
    blah blah blah‚Ä¶


    Okay‚Äîinstead think of a sequence of steps that you have to do to do *anything*.
    Like baking cookies for example.


    > **Fun Computing Fact:** *everyone likes yummy cookies.*


    You often have that sequence of steps, that recipe, written down on a piece of
    paper. By itself, it‚Äôs definitely not cookies. But when you apply a number of
    kitchen implements and ingredients and an oven to it, pretty soon you have some
    cookies.


    Of course, in that case, *you* have to do the work. With programming, the computer
    does the work for you. But you have to write down the recipe.


    The recipe *is* the program. Programming is the act of writing down that recipe
    so the computer can execute it. And get those cookies baked.


    Mmmm. Cookies.


    Some programs are simple. ‚ÄúAdd up these 12 numbers‚Äù is an example. It‚Äôs a breeze
    for the computer to do that.


    But others are more complicated. They can extend into millions of lines long,
    or even tens of millions, written by large teams over many years. Think triple-A
    video game titles or the Linux operating system.


    When you‚Äôre first starting, large programs like that seem impossible. But here‚Äôs
    the secret: each of those large programs is made up of smaller, well-designed
    building blocks. And each of those building blocks is made up of smaller of the
    same.


    And when you start learning to be a programmer, you start with the smallest, most
    basic blocks, and you build up from there.'
