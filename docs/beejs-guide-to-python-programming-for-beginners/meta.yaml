    \ would be:\n\n```\nrow_number * (x + 1)\n```\n\nand the first and last numbers\
    \ in the range would simply be the row number!\n\nThe last thing we need to do\
    \ is make sure we have the times table all formatted correctly so that the columns\
    \ line up. The biggest number we‚Äôll print is 361 (19 √ó 19) so we‚Äôll need a space\
    \ between columns and three spaces for the number. We can use an F-string with\
    \ a field width of 4 to make this happen.\n\nProblem-solving step: **Carrying\
