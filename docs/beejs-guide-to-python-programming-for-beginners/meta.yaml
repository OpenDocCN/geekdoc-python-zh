    # # Chapter 1


    # ## Intro


    *This is an alpha-quality book. There are mistakes, oh yes. When you find them,
    please drop an issue in GitHub, or a pull request, or email me at beej@beej.us.
    When the number of defects gets low enough, I‚Äôll offer a print version.*


    Hey, everyone! Have you been thinking about learning to program? Have you also
    been thinking of how to do it in the easy-to-approach Python programming language?


    Yes? Then this is the book for you. We‚Äôre going to start with the absolute basics
    and build up from there, building up to being an intermediate developer and problem-solver!
    Python is the language we‚Äôll be using to make this happen.


    But by the end of the book, you will have developed programming techniques that
    *transcend* languages. After picking up Python, maybe try another language like
    JavaScript, Go, or Rust. They all have their own features to explore and learn.


    # ### 1.1 Audience


    Beginning programmers. If you have limited experience or no experience, this book
    is targeted at you!


    Attitude Prerequisite: be inquisitive, curious, have an eye for puzzles and problem
    solving, and be willing to take on difficult challenges.


    Technical Prerequisite: be a computer user. You know what files are, how to move
    them and delete them, what subdirectories (folders) are, can install software,
    and how to type.


    Are you a seasoned developer looking to start with Python? I‚Äôm sorry but this
    is not likely to be the book you‚Äôre looking for. It will progress too slowly for
    your tastes. Just jump straight into the official Python documentation¬π.


    # ### 1.2 Platform and Tools


    I make an effort in this book to cover Mac, Windows, and Unix variants (via Arch
    Linux).


    We‚Äôll cover installing Python 3 and the Visual Studio Code editor. (Both are free.)
    If you already have a code editor you prefer using (Vim, Emacs, Sublime, Atom,
    PyCharm, etc.) feel free to use that. This book‚Äôs 100% certified editor agnostic!


    # ### 1.3 Official Homepage and Books For Sale


    The official location of this document is:


    +   - http://beej.us/guide/bgpython/'
  - '[PAGE 7]


    There you will also find example code.


    # 1.4 Email Policy


    I‚Äôm generally available to help out with email questions so feel free to write
    in, but I can‚Äôt guarantee a response. I lead a pretty busy life and there are
    times when I just can‚Äôt answer a question you have. When that‚Äôs the case, I usually
    just delete the message. It‚Äôs nothing personal; I just won‚Äôt ever have the time
    to give the detailed answer you require.


    As a rule, the more complex the question, the less likely I am to respond. If
    you can narrow down your question before mailing it and be sure to include any
    pertinent information (like platform, compiler, error messages you‚Äôre getting,
    and anything else you think might help me troubleshoot), you‚Äôre much more likely
    to get a response. For more pointers, read ESR‚Äôs document, How To Ask Questions
    The Smart Way¬≤.


    If you don‚Äôt get a response, hack on it some more, try to find the answer, and
    if it‚Äôs still elusive, then write me again with the information you‚Äôve found,
    and hopefully, it will be enough for me to help out.


    Now that I‚Äôve badgered you about how to write and not write me, I‚Äôd just like
    to let you know that I *fully* appreciate all the praise the guide has received
    over the years. It‚Äôs a real morale boost, and it gladdens me to hear that it is
    being used for good! : - ) Thank you!


    # 1.5 Mirroring


    You are more than welcome to mirror this site, whether publicly or privately.
    If you publicly mirror the site and want me to link to it from the main page,
    drop me a line at beej@beej.us.


    # 1.6 Note for Translators


    If you want to translate the guide into another language, write me at beej@beej.us
    and I‚Äôll link to your translation from the main page. Feel free to add your name
    and contact info to the translation.


    This source markdown document uses UTF-8 encoding.


    Please note the license restrictions in the Copyright, Distribution, and Legal
    section, below.


    If you want me to host the translation, just ask. I‚Äôll also link to it if you
    want to host it; either way is fine.


