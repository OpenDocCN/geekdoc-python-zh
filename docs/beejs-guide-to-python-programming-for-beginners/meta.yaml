    # 12.4 Using a Module


    Problem-solving step: **Understanding the Problem.**


    You declare your intent to use a module with the `import` keyword. We‚Äôre going
    to do an example with the built-in sys module<sup>4</sup>, which contains all
    kinds of useful information about the system.


    Let‚Äôs see what platform Python thinks we‚Äôre running.


    But first, some syntax.


    When using a function or variable inside a module, you use the dot operator to
    get the variable, similar to how you get attributes from objects. In fact, very
    similar. When you `import` a module, Python gives you an object by that name with
    functions and data attached to it as attributes.


    Step one is to `import` the module. Then you can access the members of that module.


    For example, if we:


    ```

    import sys

    ```


    we‚Äôll end up with an object called `sys` with attributes that you can access!


    Problem-solving step: **Devising a Plan**


    Digging through the documentation for the sys module, we find there‚Äôs something
    called `sys.platform` that looks really promising.


    Let‚Äôs print it!


    Problem-solving step: **Carrying Out the Plan**


    ```

    import sys    # Gets us access to all the sys goodies


    print(sys.platform)

    ```


    What does it output for you?


    For me, on Linux or Windows WSL, it prints ‚Äúlinux‚Äù. On Windows, it prints ‚Äúwin32‚Äù.


    Notice there was nothing we had to do ourselves to make this determination. (Which
    is good, because it would be a pain to write!) Fortunately, the sys module had
    everything we needed right there.


    # 12.5 Command Line Arguments


    Problem-solving step: **Understanding the Problem.**


    I‚Äôve been hiding something.


    In terms of how you run Python programs from the command line.


    It turns out you can add things *after* the Python program name.


    Say what?


    Let‚Äôs say you have a program called `foo.py`. You can run it like this, of course:


    <sup>2</sup>https://docs.python.org/3/library/index.html

