    # # Accelerating Beyond IDLE


    # ## 19.1 Objectives


    +   - Install a real IDE

    - Learn about the *command line*.

    - Get your terminal/shell up and running, and explain how it‚Äôs used


    # ## 19.2 What with the What Now?


    We‚Äôve been using IDLE to edit code, and that‚Äôs fine to get started. But it‚Äôs a
    little bit underpowered for getting to the next level when it comes to programming.


    In this section, we‚Äôll look at some tools that professional programmers use to
    get the job done.


    # ## 19.3 The Terminal


    Back in the day, people accessed mainframes through dedicated pieces of hardware
    called *terminals*. These looked like old TV sets with keyboards attached. Screens
    were typically monochrome, either white, green, or amber colored, with pixely
    text.


    Barely anyone has a real terminal anymore, but they have programs called *terminal
    emulators* that pretend to be terminals. In fact, real terminals are so rare,
    and terminal emulators are so common, if you hear someone say ‚Äúterminal‚Äù, they‚Äôre
    certainly talking about a terminal emulator.


    So a terminal emulator is a program you run that gives you a text window to interact
    with your computer.


    You know how you point, click, and drag with the mouse to command your computer
    to do things? We‚Äôre going to do the same things, except we‚Äôre going type commands
    in to get them done, instead.


    # ### 19.3.1 The Shell


    Sometimes you‚Äôll hear people talk about the ‚Äúshell‚Äù and ‚Äúterminal‚Äù interchangeably.


    Technically, though, the terminal is what you launch, and then the terminal immediately
    launches another program, the *shell*, that you interact with.


    > > The terminal is pretty dumb on its own. All it does it handle input from the
    keyboard and output to its ‚Äúscreen‚Äù. It‚Äôs the middleperson between you and the
    shell. The shell is the real brains of the outfit.


    The shell is a program that takes your typed-in commands and executes them, and
    tells you if something went wrong.'
