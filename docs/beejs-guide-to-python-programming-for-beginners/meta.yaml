    # 1.4 Email Policy


    I‚Äôm generally available to help out with email questions so feel free to write
    in, but I can‚Äôt guarantee a response. I lead a pretty busy life and there are
    times when I just can‚Äôt answer a question you have. When that‚Äôs the case, I usually
    just delete the message. It‚Äôs nothing personal; I just won‚Äôt ever have the time
    to give the detailed answer you require.


    As a rule, the more complex the question, the less likely I am to respond. If
    you can narrow down your question before mailing it and be sure to include any
    pertinent information (like platform, compiler, error messages you‚Äôre getting,
    and anything else you think might help me troubleshoot), you‚Äôre much more likely
    to get a response. For more pointers, read ESR‚Äôs document, How To Ask Questions
    The Smart Way¬≤.


    If you don‚Äôt get a response, hack on it some more, try to find the answer, and
    if it‚Äôs still elusive, then write me again with the information you‚Äôve found,
    and hopefully, it will be enough for me to help out.


    Now that I‚Äôve badgered you about how to write and not write me, I‚Äôd just like
    to let you know that I *fully* appreciate all the praise the guide has received
