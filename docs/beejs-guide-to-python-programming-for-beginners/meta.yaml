    \nÁÑ∂ÂêéÊàë‰ª¨ÂºÄÂßãÁùÄÊâã„ÄÇ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**Âà∂ÂÆöËÆ°Âàí**\n\nËøôÊ¨°Êàë‰ª¨Ë¶ÅÂÅöÁÇπ‰∏çÂêåÁöÑ‰∫ãÊÉÖ„ÄÇÊàë‰ª¨Ë¶ÅÂà∂ÂÆö‰∏Ä‰∏™ÊÄª‰ΩìËÆ°ÂàíÔºåÁÑ∂ÂêéÂú®ËßÑÂàíÂíåÊâßË°åÊûÑÊàêËøô‰∏™Â§ßËÆ°ÂàíÁöÑÂ≠êËÆ°Âàí‰πãÈó¥Êù•ÂõûÂàáÊç¢„ÄÇ\n\
    \nËøôÊõ¥Êé•ËøëËΩØ‰ª∂ÂºÄÂèëÁöÑÂÆûÈôÖÂ∑•‰ΩúÊñπÂºè„ÄÇ‰ΩÝÊúâ‰∏Ä‰∏™Â§ßËá¥ÁöÑÊñπÂêëÔºåÁÑ∂ÂêéÂú®ÂâçËøõÁöÑËøáÁ®ã‰∏≠Ëß£ÂÜ≥ÁªÜËäÇÈóÆÈ¢ò„ÄÇ\n\n> ËøôÊúâÁÇπÂÉè‰∏ÄÊääÂèåÂàÉÂâëÔºåÈúÄË¶ÅÂÆûË∑µÂíåÁªèÈ™åÊâçËÉΩÊéåÊè°ÂæóÂΩì„ÄÇ‰ΩÝ‰∏çÊÉ≥ËøáÂ∫¶ËßÑÂàíÔºåÂõÝ‰∏∫‰ΩÝÊóÝÁñë‰ºöÈúÄË¶ÅÊîπÂèò‰∏Ä‰∫õ‰∏úË•øÔºå‰∏çÊÉ≥Êµ™Ë¥πÊó∂Èó¥„ÄÇ‰ΩÝ‰πü‰∏çÊÉ≥ËßÑÂàí‰∏çË∂≥ÔºåÂõÝ‰∏∫ÈÇ£ÊÝ∑ÈöêËóèÁöÑÈô∑Èò±ÂèØËÉΩ‰ºö...Âú®ÂêéÈù¢Á≠âÁùÄ‰ΩÝ„ÄÇ‰ΩÝÊÉ≥ËßÑÂàí*ÊÅ∞Âà∞Â•ΩÂ§Ñ*„ÄÇÊóÝËÆ∫ÈÇ£ÊòØ‰ªÄ‰πàÁ®ãÂ∫¶„ÄÇ\n\
    >\n> ÂÆûÈôÖ‰∏äÔºåÂºÄÂèëËÄÖÊÄªÊòØËßÑÂàí‰∏çË∂≥„ÄÇ‰ΩÜ‰ªñ‰ª¨‰ªçÁÑ∂ËÆæÊ≥ïÂÆåÊàê‰∫ÜÔºåÂ∞±ÂÉè*È≠îÊ≥ï*‰∏ÄÊÝ∑„ÄÇ\n>\n> ËÄåÊàëËØ¥ÁöÑ‚ÄúÈ≠îÊ≥ï‚ÄùÔºåÊåáÁöÑÊòØÂ§ßÈáèÁöÑÊ±óÊ∞¥„ÄÅÊ≥™Ê∞¥Âíå‰∏çÈõÖÁöÑËØ≠Ë®Ä„ÄÇ\n\n\
