    int(2.5 + 0.5)   # 3


    int(2.8 + 0.5)   # 3

    int(2.2 + 0.5)   # 2


    int(-2.2 - 0.5)  # -2

    int(-2.8 - 0.5)  # -3

    ```


    # 15.13 Large Numbers


    Python is really good with large integer numbers. In fact, it has what we call
    arbitrary precision integer math. That means we can hold numbers as big as memory
    can handle, which is large.


    So if you ask Python to compute 100000!, it will do it. The result, incidentally,
    is 465,575 digits long. No problem.


    But the same is not true for floating point numbers (numbers with a decimal point).
    Python generally uses 64 bits to represent floating point numbers, which means
    there''s a limit to the amount of precision‚Äîyou can only have 16 digits in your
    number, though you can raise that number to huge positive or negative powers to
    get very large or very small numbers.


    Floating point is brilliant because it can represent really huge and really small
    numbers, but the number of digits you have at your disposal is limited.'
- md: "## Chapter 16\n\n## Appendix B: The REPL\n\n### 16.1 What is the REPL?\n\n\
    The REPL, pronounced *REP-…ôl*, is short for the *Read-Evaluate-Print Loop*.\n\n\
    Great. I mean, truly, that‚Äôs awesome.\n\nBut what does any of that mean?!\n\n\
    Check this out. If you run python on the command line (or whatever your OS‚Äôs variant\
    \ is), you‚Äôll end up with a prompt that looks like this:\n\n```\n$ python\nPython\
    \ 3.8.0 (default, Oct 23 2019, 18:51:26)\n[GCC 9.2.0] on linux\nType \"help\"\
    , \"copyright\", \"credits\" or \"license\" for more information.\n>>>\n```\n\n\
    And it just sits there, waiting for you to type something.\n\nActually, it‚Äôs *reading*.\
    \ The *Read* part of REPL.\n\nSo type something and hit RETURN!\n\n```\n>>> print(\"\
    Hello, world!\")\nHello, world!\n```\n\nWhat happened after you hit RETURN was\
    \ that Python *Evaluated* your expression, and the *Printed* the result. And then\
    \ it printed another >>> prompt, because it‚Äôs doing this in a *Loop*! The REPL!\n\
    \nThis is a method you could use to quickly test out Python commands to see how\
    \ they work. It‚Äôs not commonly used for development, but it is there if you find\
    \ it convenient.\n\nAny time you see the >>> prompt, it‚Äôs waiting for another\
    \ Python command.\n\n```\n>>> a = 20\n>>> b = 30\n>>> c = a + b\n>>> print(c)\n\
    50\n```\n\nWhat about multi-line commands? Let‚Äôs try printing numbers in a loop:\n\
    \n```\n>>> for i in range(5):\n...\n```\n\nWait! What‚Äôs that . . . prompt? That\
    \ means Python is waiting for more. The fact that the previous line ended in a\
    \ : indicates that a block is to follow it. So Python is waiting for a properly-indented\
    \ block. (Hit RETURN on a blank line to exit the block. If you get stuck in .\
    \ . . mode, just keep hitting RETURN until you get back out to the >>> prompt.)\n\
    \n```\n>>> for i in range(5):\n...     print(i)\n...\n0\n1\n2\n3\n4\n```\n\n###\
    \ 16.2 Calculator\n\nYou can use the Python REPL as a quick and dirty calculator.\n\
    \n```\n>>> 50 + 20 * 10\n250\n>>> import math\n>>> math.factorial(10)\n3628800\n\
    >>> math.sqrt(2)\n1.4142135623730951\n```\n\n### 16.3 Getting Help\n\nPython has\
    \ a powerful built-in help system.\n\nYou can ask for help on any expression;\
    \ help will be returned on the type of that expression.\n\nFor example, if we\
    \ ask for help on a variable of type string, we get help on what we can do with\
    \ that variable:\n\n```\n>>> s = \"Hello!\"\n>>> help(s)\n```\n\nThis will output\
    \ all kinds of stuff.\n\nHelp on class str in module builtins:\n\n```\nclass str(object)\n\
    \ |  str(object='') -> str\n |  str(bytes_or_buffer[, encoding[, errors]]) ->\
    \ str\n |\n |  Create a new string object from the given object. If encoding or\n\
    \ |  errors is specified, then the object must expose a data buffer\n |  that\
    \ will be decoded using the given encoding and error handler.\n```\n\nEt cetera.\
    \ The : prompt at the bottom is the prompt for the pager. You can hit RETURN to\
    \ go to the next line, or SPACE to go to the next page. Up and Down arrow keys\
    \ also work. Type q to get out of the pager and return to normal.\n\nThe first\
    \ thing you might notice are a bunch of functions that have double underscores\
    \ around them, like this:\n\n```\n|  __add__(self, value, /)\n|      Return self+value.\n\
    ```\n\nThose double underscores, AKA dunderscores or just dunders, indicate that\
    \ this is an internal or special functions. As a beginner, you can ignore them.\
    \ As you get more advanced, you might want to see how to make use of them.\n\n\
    So hit SPACE a bunch of times until you're past the dunders. After that, you start\
    \ getting to the documentation for the more common functions, like this one:\n\
    \n```\n|\tcount(...)\n|\tS.count(sub[, start[, end]]) -> int\n|\n|\tReturn the\
    \ number of non-overlapping occurrences of substring sub in\n|\tstring S[start:end].\
    \  Optional arguments start and end are\n|\tinterpreted as in slice notation.\n\
    ```\n\nWe see there's a description there of what the method does, as well as\
    \ an important description of what each parameter to the function means. But let's\
    \ look at this line in particular:\n\n```\n|\tS.count(sub[, start[, end]]) ->\
    \ int\n```\n\nThat's not Python. It's documentation, and it has its own way of\
    \ being read.\n\nGenerally:\nThe S. refers to this string that we're operating\
    \ on. For example, if I say:\n\n```\n\"fee fie foe foo\".count(\"fo\")\n```\n\n\
    the string \"fee fie foe foo\" is represented by S in the documentation.\nThe\
    \ stuff after the -> indicates the type of the return value. This function returns\
    \ an integer.\n\nNow, what about that start and end stuff in the middle with the\
    \ square brackets?\nIn documentation, square brackets indicate *optional* parameters\
    \ to the function. Notice in my example, above, I didn't pass start or end...\
    \ they're in square brackets, so they're optional.\n\nLooking in more detail,\
    \ you see the brackets are nested. This means you can make the call with a sub\
    \ and a start... and *then* the end becomes optional. There's no way to call it\
    \ with just a sub and an end, but no start. The optional end is optional if-and-only-if\
    \ the optional start had already been specified.\n\nFinally, you can ask for help\
    \ on a specific function or method:\n\n```\nhelp(\"\".count)  # Get help specifically\
    \ on string.count method\n```\n\n### 16.4 dir()‚ÄîQuick and Dirty Help\n\nThe dir()\
    \ built-in function is like help(), except extraordinarily terse. It just returns\
    \ a list of the methods on a particular thing.\n\nFor instance, we can get that\
    \ list of methods and data attached to a dictionary by asking for dir({}) (or\
    \ by passing any dict to dir()).\n\n```\n>>> dir({})\n['__class__', '__contains__',\
    \ '__delattr__', '__delitem__', '__dir__',\n'__doc__', '__eq__', '__format__',\
    \ '__ge__', '__getattribute__',\n'__getitem__', '__gt__', '__hash__', '__init__',\
    \ '__init_subclass__',\n'__iter__', '__le__', '__len__', '__lt__', '__ne__', '__new__',\n\
    '__reduce__', '__reduce_ex__', '__repr__', '__reversed__',\n'__setattr__', '__setitem__',\
