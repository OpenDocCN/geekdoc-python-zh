    called `sys.platform` that looks really promising.


    Let‚Äôs print it!


    Problem-solving step: **Carrying Out the Plan**


    ```

    import sys    # Gets us access to all the sys goodies


    print(sys.platform)

    ```


    What does it output for you?


    For me, on Linux or Windows WSL, it prints ‚Äúlinux‚Äù. On Windows, it prints ‚Äúwin32‚Äù.


