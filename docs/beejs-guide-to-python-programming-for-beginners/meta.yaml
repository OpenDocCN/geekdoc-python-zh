    \nWe're going to use square bracket notation again, but even more so.\n\n```\n\
    x = [1, 2, 3]\ny = [4, 5, 6]\nz = [x, y]\n\nprint(z[0]) # z[0] refers to x, so\
    \ this prints [1, 2, 3]\nprint(z[1]) # z[1] refers to y, so this prints [4, 5,\
    \ 6]\n```\n\nSo far so good?\n\nHere's the thing to notice: since z[0] and z[1]\
    \ are lists, you can access the elements within those lists by using square bracket\
    \ notation *again*.\n\nLet's try to get the number 6 out of that second list.\n\
    \n```\nprint(z[1][2]) # prints 6\n```\n\nTake apart that line of code. What's\
    \ happening there?\n\nFirst Python evaluates the first square brackets it comes\
    \ to. It knows z is a list, and so it evaluates z[1] to get the list [4, 5, 6].\
    \ Then it takes that list and evaluates it with [2], getting the 6 out of it.\n\
    \nAnother way to think of it would be to imagine using parentheses:\n\n```\n(z[1])[2]\
    \ # first evaluate z[1], then evaluate [2] on the result\n\nz[1][2]   # this is\
    \ equivalent to the previous line\n```\n\n(While Python doesn't mind if you use\
    \ parentheses like this, programmers don't do it since it makes the code look\
    \ messy.)\n\nBut what does this buy us? Lists of lists are exciting and all. (Right?)\
    \ What are they useful for?\n\nHaving a list of lists literally adds a second\
    \ dimension to the data you can represent. With a single list, you can represent\
    \ one \"row\" of data. With a list of lists, you can represent multiple rows or\
    \ a *grid* of data.\n\nWhat are some places in computing a grid or multiple rows\
    \ of data are used?\n\nSpreadsheets! What else? See if any other ideas come to\
    \ mind.\n\nFor declaring lists of lists, it's really common to just declare them\
    \ all at once, and not use an intermediate variable to represent the sublists.\n\
    \nFor example, the previous list we were using, above, could be declared more\
    \ simply like so:\n\n```\nz = [\n    [1, 2, 3],\n    [4, 5, 6]\n]\n```\n\nor,\
    \ if it looks better and your style guide allows it, you can put it on one line:\n\
    \n```\nz = [ [1, 2, 3], [4, 5, 6] ]\n\nprint(z[0][1])  # Prints 2\n```\n\nNow\
    \ let's see if we can put it all together for this chapter's project!\n\n# 8.14\
    \ Chapter Project Implementation\n\nThis is the big one. This project is going\
    \ to draw on multiple things we've learned so far and put them all together into\
    \ a working solution."
- md: "## Chapter 8. Lists\n\nThat makes this project more difficult than the previous\
    \ ones. We‚Äôre going to break down the problem and decide what tools we know that\
    \ we can bring to bear to solve it.\n\nAnd this is what being a software developer\
    \ is all about.\n\nI‚Äôm not expecting the answer to be obvious. You‚Äôll rarely see\
    \ a problem that has an obvious solution, even as a seasoned developer. But we\
    \ do have our problem-solving framework to break down the problem into workable\
    \ parts. So let‚Äôs do it!\n\nProblem-solving step: **Understanding the Problem.**\n\
    \nWe want to do several things with this project:\n\n- Print a map on the screen\n\
    - Get user input\n- Use the input to move a player indicator around the map\n\
    - Make sure the player doesn‚Äôt move through walls\n- Keep repeating until the\
    \ player quits\n\nWhat‚Äôs missing from the spec that we need to know?\n\nRemember\
    \ your compass directions?\n\n```\nN\n|\nW -+- E\n|\nS\n```\n\nNow‚Äôs the time\
    \ to get the answers to questions clarified. Much easier to do it now than after\
    \ you‚Äôve coded up the wrong thing!\n\nWhat if the user provides invalid input?\
    \ What happens then is missing from the spec. For that, let‚Äôs print an error message:\n\
    \n```\nUnknown command: {x}\n```\n\nWhere x is whatever the user entered.\n\n\
    What if the player tries to move through a wall? Let‚Äôs use this error message:\n\
    \n```\nYou can't go that way.\n```\n\nAnything else missing from the spec?\n\n\
    Problem-solving step: **Make A Plan.**\n\nWe‚Äôre going to make use of two important\
    \ techniques as we make this plan: *simplify the problem* and *breaking down subproblems*.\n\
    \nSimplifying the problem means taking our eventual goal and remove requirements\
    \ to make it easier to code. Sure, eventually we‚Äôll have to add those requirements\
    \ back in, but simplifying the problem makes the initial coding easier.\n\nWhat\
    \ are examples of things we can simplify about this project? Here are some ideas:\n\
    \n- Don‚Äôt bother putting the @ on the map where the player is\n- Allow the player\
    \ to move through walls\n- Keep repeating forever, ignoring q\n- Don‚Äôt validate\
    \ user input\n\nAgain, we‚Äôll have to add this eventually, but removing them temporarily\
    \ makes it much easier to reach an initial version.\n\nThe other technique, breaking\
    \ down subproblems, is a variant of what we‚Äôve been doing already.\n\nLet‚Äôs start\
    \ with high-level pseudocode, and then break it down where required.\n\n```\n\
    while not quit:\n    print map and player indicator\n    get input\n    make sure\
    \ input is valid\n    make sure we're not moving through walls\n```\n\nHow do\
    \ we know that breaking down subproblems will be useful with this pseudocode?\
    \ The first clue is that some of the steps are substantial, e.g. ‚Äúprint map and\
    \ player indicator‚Äù immediately brings to mind the question, ‚ÄúHow the heck can\
    \ we do that?‚Äù\n\nIf any steps are too complex or are unclear, it means you have\
    \ to break them down further. Let‚Äôs do that for all the unclear sections:\n\n\
    ```\nwhile not quit:\n    print map and player indicator\n    for each row of\
    \ the map:\n        for each column of the map:\n            if this is where\
    \ the player is:\n                print @\n            else:\n               \
    \ print the map character\n\n    get input\n    make sure input is valid\n\n \
    \   if input invalid:\n        print error message\n\n    elif input is \"q\"\
    :\n        quit\n\n    else:\n        figure out the new row and column of the\
    \ player\n\n    if the map at the new player position is \"#\":\n        print\
    \ \"You can't go that way.\"\n    else:\n        set the current position to the\
    \ new position\n```\n\nThat‚Äôs significantly better. It‚Äôll be a lot easier to translate\
    \ to Python.\n\nNow‚Ä¶ how are we going to store the data we need for this project?\
    \ And what data do we need, anyway?\n\n- The map representation\n- The player‚Äôs\
    \ current position, row, and column\n\nHow are we going to store the map? In the\
    \ spec, it‚Äôs displayed as text, like so:\n\n```\n#####################\n#...#.............#.#\n\
    #...#.............#.#\n#...#.............#.#\n#...#.............#.#\n#...#.............#.#\n\
    #...#.............#.#\n#...#.............#.#\n#####################\n```\n\nwhere\
    \ # is a wall and . is an empty floor (that we can move through).\n\nWe could\
    \ store all that as a single string‚Ä¶ but that might make our lives a little more\
    \ difficult since we have to put an @ in where the player is located.\n\nAnd,\
    \ because of that, we‚Äôre planning to print the map out a character at a time so\
    \ we can decide if we‚Äôre going to draw an @ or the map character.\n\nWhat would\
    \ be a more sensible way to store the map rather than a single big string?\n\n\
    Ponder that for a second.\n\nSpoiler alert!\n\nHow about a list of strings? One\
    \ string would be one row of the map. Then we could go through the single row\
    \ a character at a time and decide what to print. (Remember we can use array bracket\
    \ notation on a string to get single characters out!)\n\nLook at all the techniques\
    \ we‚Äôre using!\n\n- Variables to store player‚Äôs current row and column on the\
    \ map\n- A list of strings to store the map\n- Iterating through a list with for\n\
    - Iterating through strings with for\n- Nested for loops\n- if conditions to decide\
    \ what to do with user input\n- if conditions to determine if we can move that\
    \ direction\n- Booleans and a while loop to run the game until the user quits\n\
    \nHoly moly! That‚Äôs a lot of stuff. But that‚Äôs what we do as software developers:\
    \ we take all we know and figure out how to put it together into the solution.\n\
    \nAnd it‚Äôs rarely an obvious one. We all have to work hard to come up with the\
    \ answers.\n\nProblem-solving step: **Carrying out the Plan.**\n\nBefore we start\
    \ this phase, I want you to notice how much time we‚Äôve spent on the Understand\
    \ and Plan phases without writing any code at all. It‚Äôs very tempting, especially\
    \ for junior devs, to want to jump into the code without spending sufficient time\
    \ on Understanding and Planning. Unfortunately, this practice causes one to waste\
    \ productivity unnecessarily.\n\nYou‚Äôre not done understanding the problem until\
    \ you have no more questions about it.\n\nYou‚Äôre not done making a plan until\
    \ you know how to convert every step of the plan to code.\n\nIf you spend enough\
    \ time understanding and planning, coding almost becomes an afterthought.\n\n\
    And here we are. Let‚Äôs take our pseudocode and convert it into Python.\n\nComing\
    \ back to *simplify the problem*, let‚Äôs start by just storing and printing the\
    \ map. No player, no input, no loop. Let‚Äôs just get that working.\n\nFirst of\
    \ all, we need to store the map data, so let‚Äôs do that:\n\n```\n# The map\n\n\
    map_data = [\n    \"####################\",\n    \"#..#..............#\",\n  \
    \  \"#..#..............#\",\n    \"#..#..............#\",\n    \"#..#..............#\"\
    ,\n    \"#..#..............#\",\n    \"#..#..............#\",\n    \"#..#..............#\"\
    ,\n    \"####################\"\n]\n```\n\nWe‚Äôve split the map list into multiple\
    \ lines to make it easier to read.\n\nNow we need to print it out. In our pseudocode,\
    \ we used a nested for loop with if conditions.\n\n```\n# The map\n\nmap_data\
    \ = [\n    \"####################\",\n    \"#...#..............#\",\n    \"#...#..............#\"\
    ,\n    \"#...#..............#\",\n    \"#...#..............#\",\n    \"#...#..............#\"\
    ,\n    \"#...#..............#\",\n    \"#...#..............#\",\n    \"#...#..............#\"\
    ,\n    \"####################\"\n]\n\n# Print map and player indicator\n\nfor\
    \ row in map_data:  # for each row\n    for map_character in row:  # for each\
    \ col\n        print(map_character, end=\"\")\n    print()\n```\n\nThere are a\
    \ couple of things to note there, so make sure to digest the code. We're going\
    \ through each row, and for each row, we're going through each column and printing\
    \ the character.\n\nWe want the characters to all print on the same line for a\
    \ given row, so we use the end=\"\" trick to keep Python from going to the next\
    \ line.\n\nAnd at the end of each row, we have an empty print() to get the cursor\
    \ down to the next line for starting to print the next row.\n\nAnd when we run\
    \ that, we get the map printed out!\n\nBut we don't have the player position stored\
    \ anywhere, and we're not showing it on the screen. Let's add that next.\n\n```\n\
    # The map\n\nmap_data = [\n    \"####################\",\n    \"#...#..............#\"\
    ,\n    \"#...#..............#\",\n    \"#...#..............#\",\n    \"#...#..............#\"\
    ,\n    \"#...#..............#\",\n    \"#...#..............#\",\n    \"#...#..............#\"\
    ,\n    \"#...#..............#\",\n    \"####################\"\n]\n\n# Player\
    \ position\n\nplayer_row = 4          # <-- add player position\nplayer_column\
    \ = 9\n\n# Print map and player indicator\n\n# Use enumerate() to get the row\
    \ and column indexes for the if:\nfor row_index, row in enumerate(map_data): \
    \ # for each row\n    for col_index, map_character in enumerate(row):  # for each\
    \ col\n        if row_index == player_row and col_index == player_column:\n```"
