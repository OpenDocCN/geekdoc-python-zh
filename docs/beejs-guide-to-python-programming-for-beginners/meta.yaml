    Chapter 15. Appendix A: Basic Math for Programmers


    169


    ```

    print(2.7**100)   # 1.3689147905858927e+43

    ```


    What''s that e+43 at the end?

    This is what we call *scientific notation*. It''s a shorthand way of writing really
    large (or small) numbers.

    The number above, 1.3689147905858927e+43, is saying this, mathematically:

    1.3689147905858927 √ó 10^43

    Now, 10^43 is a *big* number. So multiplying 1.3689 etc. by it results in a very
    large number, indeed.

    But that''s not all. We can use it to represent very small numbers, too.


    ```

    print(3.6/5000000000000000000)   # 7.2e-19

    ```


    7.2e-19 means:

    7.2 √ó 10^-19

    And 10^-19 is a very small number (very close to 0‚Äîremember that 10^-19 = 1/10^19),
    so multiplying 7.2

    by it results in a very small number as well.

    Remember this:


    +   - If you see e-something at the end, it''s a very small number (close to 0).

    - If you see e+something at the end, it''s a very large number (far from 0).


    # 15.11 Logarithms


    Hang on, because things are about to get weird.

    Well, not *too* weird, but pretty weird.

    Logarithms, or *logs* for short, are kind of the opposite of exponents.

    But not opposite in the same way square roots are opposite.

    That''s convenient, right?

    With logs, we say "log base x of y". For example, "log base 2 of 32", which is
    written like this:

    log‚ÇÇ 32

    What that is asking is "2 to the what power is 32?" Or, in math:

    These are both true:

    x = log‚ÇÇ 32

    2^x = 32

    So what''s the answer? Some trial and error might lead you to realize that 2^5
    = 32, so therefore:

    x = log‚ÇÇ 32 = 5

    There are three common bases that you see for logs, though the base can be any
    number: 2, 10, and *e*.

    Base 2 is super common in programming. In fact, it''s so common that if you ever
    see someone write log *n*

    in a computing context, you should assume they mean log‚ÇÇ *n*.

    *e* is the base of the *natural logarithm*‚Å¥, common in math, and uncommon in computing.

    So what are they good for?

    A common place you see logarithms in programming is when using Big-O notation
    to indicate computa-

    tional complexity‚Åµ.


    ‚Å¥https://en.wikipedia.org/wiki/Natural_logarithm

    ‚Åµhttps://en.wikipedia.org/wiki/Big_O_notation'
  - '[PAGE 175]


    To compute the log of a number in Python, use the `log()` function in the `math`
    module. You specify the base as the second argument. (If unspecified, it computes
    the natural log, base *e*.)


    For example, to compute log‚ÇÇ 999:


    ```

    import math


    print(math.log(999, 2))    # Prints 9.96434086779242


    # Because 2^9.96434086779242 == 999. Ish.

    ```


    The big thing to remember there is that as a number gets large, the log of the
    number remains small. Here are some examples:


    | x | log‚ÇÇx |

    |---|---|

    | 1 | 0.0000 |

    | 10 | 3.3219 |

    | 100 | 6.6439 |

    | 1000 | 9.9658 |

    | 10000 | 13.2877 |

    | 100000 | 16.6096 |

    | 1000000 | 19.9316 |

    | 10000000 | 23.2535 |


    The log-base-2 of a big number tends to be a much smaller number.


    # 15.12 Rounding


    When we round a number, we are looking for the *nearest number* of a certain number
    of decimal places, dropping all the decimal places smaller than that.


    By default, we mean zero decimal places, i.e. we want to round to the nearest
    whole number.


    So if I said, ‚ÄúRound 2.3 to the nearest whole number,‚Äù you‚Äôd answer ‚Äú2‚Äù, because
    that‚Äôs the closest whole number to 2.3.


    And if I said, ‚ÄúRound 2.8 to the nearest whole number,‚Äù you‚Äôd answer ‚Äú3‚Äù, because
    that‚Äôs the closest whole number to 2.8.


    When we round to a higher number, we call that *rounding up*.


    The other direction is *rounding down*.


    But what if I said ‚ÄúRound 2.5 to the nearest whole number?‚Äù It‚Äôs perfectly between
    2 and 3! In those cases, conventionally, lots of us learned to round up. So the
    answer would be 3.


    We can also force a number to round a certain direction by declaring which way
    to round.


    ‚ÄúDivide *x* by 3, then round up.‚Äù


    In Python, we have a few options for rounding.


    We can use the built-in `round()` function.


    But it behaves a little bit differently than we might be used to. Notably, numbers
    like 1.5, 2.5, and 3.5 that are equally close to two whole numbers *always round
    to the nearest even number*. This is commonly known as *round half to even* or
    *banker‚Äôs rounding*.


    ```

    round(2.8)   # 3

    round(-2.2)  # -2

    round(-2.8)  # -3


    round(1.5)   # 2

    ```'
