  - "[PAGE 156]\n\nAnd that will catch it. Here‚Äôs a run:\n\n```\nEnter two numbers\
    \ separated by a space: 1 2 3\nThat's not two numbers separated by a space!\n\
    ```\n\nWhee!\n\nWhat‚Äôs the next place we can mess things up?\n\nWell, we‚Äôre converting\
    \ to int()‚Ä¶ what does that function do if we pass in something awful, like the\
    \ word manfrengensenton?\n\nAgain in the REPL:\n\n```\n>>> int(\"manfrengensenton\"\
    )\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ValueError: invalid literal for int() with base 10: 'manfrengensenton'\n```\n\n\
    Hey, it‚Äôs ValueError again! Conveniently, we‚Äôre already catching that with an\
    \ appropriate error message. Totally handled.\n\nThat takes care of three of the\
    \ four cases I saw where we could get exceptions. What‚Äôs the fourth?\n\n*Mathematics\
    \ hat on.* Do you see it?\n\nThat‚Äôs right, we‚Äôre dividing there‚Ä¶ and you can‚Äôt\
    \ divide by zero. What happens when we do?\n\nWe already saw, above, that we get\
    \ a ZeroDivisionError. So let‚Äôs add that to the end of our code:\n\n```\ntry:\n\
    \    x, y = input('Enter two numbers separated by a space: ').split()\n\n    x\
    \ = int(x)\n    y = int(y)\n\n    print(f'{x} / {y} == {x / y}')\n\nexcept ValueError:\n\
    \    print(\"That's not two numbers separated by a space!\")\n\nexcept ZeroDivisionError:\n\
    \    print(\"Can't divide by zero!\")\n```\n\nSo as you can see, you can handle\
    \ as many different types of exceptions as you want in their own except clauses\
    \ after the try.\n\n# 14.8 Catching Multiple Exceptions II\n\nIf you want to handle\
    \ multiple exceptions with the same handler code, you can make a list of them:\n\
    \n```\nexcept (FileNotFoundError, PermissionError):\n    print(\"File not found\
    \ or insufficient permissions\")\n```\n\nThis isn‚Äôt as frequently used, since\
    \ often you want to take a different course of action for different exceptions.\n\
    \n# 14.9 Getting More Exception Information\n\nEach exception is actually an instance\
    \ of a class. And the class name is the name you use in your except clauses.\n\
    \nBecause it‚Äôs an instance, it has some additional information attached to it\
    \ we can grab, but first, we have to bind it (assign it) to a variable name. We\
    \ can do that with the as statement."
  - "[PAGE 157]\n\nChapter 14. Exceptions\n\n152\n\n```\ntry:\n    1 / 0\nexcept ZeroDivisionError\
    \ as e:  # e is a reference to the exception\n    print(e)\n    print(repr(e))\
    \  # Print its representation\n```\n\nresults in:\ndivision by zero\nZeroDivisionError('division\
    \ by zero')\n\nThat could be useful for getting more detailed information. In\
    \ our example in the previous chapter, we catch ValueError, but we saw three different\
    \ circumstances that could lead to it. We could use this technique to give the\
    \ user more detailed information about the nature of the exception, should we\
    \ choose.\n\nAll exceptions have an attribute called args that is a list of the\
    \ arguments that are passed to the exception when it was created. The first of\
    \ these is often a human-readable error message.\n\nFor instance, this code:\n\
    \n```\ntry:\n    1 / 0\nexcept Exception as e:\n    print(e.args[0])\n```\n\n\
    prints the helpful message:\ndivision by zero\n\nFurthermore, any exception that\
    \ is based on IOError includes the string attribute strerror that contains a human-readable\
    \ error message corresponding to the error. You can find the list of exceptions\
    \ that are derived from IOError in the exceptions documentation¬≤.\n\n# 14.10 Catching\
    \ All Exceptions\n\nA catch statement that doesn't specify a particular exception\
    \ will catch *all* previously uncaught exceptions.\n\nFor this reason, a blank\
    \ catch should definitely be last, after all the other catches. Python will stop\
    \ at the first catch that matches, even if it's a \"catch all\".\n\nWhen you're\
    \ in any catch, you can look at the results from the built-in function sys.exc_info().\
    \ This function returns a tuple (think \"list\" for now, if you're not familiar\
    \ with tuples) with three pieces of information: the type of the exception, a\
    \ reference to the exception itself, and a traceback¬≥\n\nLet's mod our division\
    \ program to catch all exceptions and print out the exception info:\n\n```\nimport\
    \ sys\n\ntry:\n    x, y = input('Enter two numbers separated by a space: ').split()\n\
    \n    x = int(x)\n    y = int(y)\n\n    print(f'{x} / {y} == {x / y}')\n\nexcept:\n\
    \    print(sys.exc_info())\n```\n\n¬≤https://docs.python.org/3/library/exceptions.html\n\
    ¬≥A traceback, also known as a stack trace, is a list of all the function calls\
    \ that have taken place to get to this point. It's really useful information for\
    \ debugging."
