  md: "# 9.8 Common Built-in Dictionary Functionality\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nYou have a number of tools in your toolkit for working with\
    \ dicts in Python:\n\n| Method | Description |\n|---|---|\n| .clear() | Empty\
    \ a dictionary, removing all keys/values |\n| .copy() | Return a copy of a dictionary\
    \ |\n| .get(key) | Get a value from a dictionary, with a default if it doesn't\
    \ exist |\n| .items() | Return a list-ish of the (key, value) pairs in the dictionary\
    \ |\n| .keys() | Return a list-ish of the keys in the dictionary |\n| .values()\
    \ | Return a list-ish of the values in the dictionary |\n| .pop(key) | Return\
    \ the value for the given key, and remove it from the dictionary |\n| .popitem()\
    \ | Pop and return the most-recently-added (key, value) pair |\n\nWe already saw\
    \ use of .get(), earlier, but it can also be modified to return a default value\
    \ if the key doesn't exist in the dictionary.\n\n```\nd = {\n    \"c\": 10,\n\
    \    \"b\": 20,\n    \"a\": 30\n}\n\nv = d.get(\"x\", -99)  # Return -99 if key\
    \ doesn't exist\n\nprint(v)  # Prints -99, since key `x` doesn't exist\n```\n\n\
    We've already seen a use of .items(), above. If you want to see just all the keys\
    \ or values, you can get an iterable back with the .keys() and .values():\n\n\
    ```\nd = {\n    \"c\": 10,\n    \"b\": 20,\n    \"a\": 30\n}\n\nfor k in d.keys():\n\
    \    print(k)  # Prints \"c\", \"b\", \"a\"\n\nfor v in d.values():\n    print(v)\
    \  # Prints 10, 20, 30\n```\n\n# 9.9 Dictionary Comprehensions\n\nProblem-solving\
    \ step: **Understanding the Problem.**\n\nRemember list comprehensions? If you\
    \ don't, pop over there for a quick refresher, because this is the same thing\
    \ except for dictionaries.\n\nYou can create a dictionary from any iterable that\
    \ you can go over in a for loop. This is a pretty powerful way of creating a dictionary\
    \ if you have the data in another, iterable, form, like a list or an input stream\
    \ of something.\n\nLet's go through a list and store the list value as the key,\
    \ and the list value times 10 as the value in the dictionary. And let's ignore\
    \ the number 20 in the list, just for fun."
