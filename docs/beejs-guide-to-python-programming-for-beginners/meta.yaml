    # 8.12 List Comprehensions\n\nProblem-solving step: **Understanding the Problem.**\n\
    This is a really neat language feature of Python. It allows you to construct a\
    \ new list from an old one, modifying and filtering elements as you go.\nBefore\
    \ going into the syntax, we'll write something using what we know so far with\
    \ for and if and see how that looks. Then we'll compare it to a list comprehension\
    \ version.\nI'm going to write some code that takes a list and produces a new\
    \ list from it, not including all the odd numbers, and replacing the even numbers\
    \ with the even number times 4.\n\n```\na = [1, 2, 3, 4, 5, 6]\nnew_list = []\n\
    \nfor v in a:\n    if v % 2 == 0:  # if v is even\n        new_list.append(v *\
    \ 4)\n\nprint(new_list)    # [8, 16, 24]\n```\n\nStudy that until you're sure\
    \ you have it down.\nNow, here's that same program as a list comprehension:\n\n\
    ```\na = [1, 2, 3, 4, 5, 6]\nnew_list = [v * 4 for v in a if v % 2 == 0]\n```"
