    # 5.2 Data, Variables, and Math


    Problem-solving step: **Understanding the Problem.**


    *Data* is the general term we use to describe information stored in the computer.
    In the case of programming, we‚Äôre interested in values that we‚Äôll do things with.
    Like add together. Or turn into a video game.


    Really, data is information. Can you glean information from a symbol? Then it‚Äôs
    data. Sometimes it‚Äôs a symbol like ‚Äú8‚Äù, or maybe a string of symbols like ‚Äúcat‚Äù.


    Your goal as a software developer is to write programs that manipulate data. You
    have to manipulate the input data in such a way that the desired output is achieved.
    And you have to solve the problem of how to do that.


    In a program, data is commonly stored in what we call *variables*. If you‚Äôve taken
