    \nÊâÄ‰ª•ÔºåÂ¶ÇÊûúÁî®Êà∑ËæìÂÖ•Beej!ÔºåÊàë‰ª¨ÊÉ≥ÊâìÂç∞Âá∫eej„ÄÇÂ¶ÇÊûú‰ªñ‰ª¨ËæìÂÖ•PythonÔºåÊàë‰ª¨ÊÉ≥ÊâìÂç∞Âá∫ytho„ÄÇ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**Âà∂ÂÆöËÆ°Âàí„ÄÇ**\n\nÊàë‰ª¨ÈúÄË¶ÅÔºö\n\
    \n- 1. ËæìÂÖ•‰∏Ä‰∏™Â≠óÁ¨¶‰∏≤„ÄÇ\n- 2. Ëé∑Âèñ‰∏Ä‰∏™‰∏çÂåÖÊã¨Á¨¨‰∏Ä‰∏™ÂíåÊúÄÂêé‰∏Ä‰∏™Â≠óÁ¨¶ÁöÑÂ≠óÁ¨¶‰∏≤ÂàáÁâá„ÄÇ\n- 3. ÊâìÂç∞Ëøô‰∏™ÂàáÁâá„ÄÇ\n\nÊ≠•È™§1Âíå3ÈùûÂ∏∏Áõ¥Êé•„ÄÇ‰ΩÜÊòØÊ≠•È™§2Âë¢Ôºü\n\
    \nÁî±‰∫éÊàë‰ª¨‰∏çÁü•ÈÅìÂ≠óÁ¨¶‰∏≤‰ºöÊúâÂ§öÈïøÔºàÂè™Áü•ÈÅìÂÆÉËá≥Â∞ëÊúâ‰∏â‰∏™Â≠óÁ¨¶ÔºâÔºåÊàë‰ª¨‰∏çËÉΩÁÆÄÂçïÂú∞‰ªé1Âà∞ÔºåÊØîÂ¶ÇËØ¥Ôºå5Ëé∑Âèñ‰∏Ä‰∏™ÂàáÁâá„ÄÇÊàë‰ª¨ÂøÖÈ°ª‰ªéÁ¥¢Âºï1Ëé∑ÂèñÂà∞ÂÄíÊï∞Á¨¨‰∫å‰∏™Â≠óÁ¨¶„ÄÇ\n\nÂπ∏ËøêÁöÑÊòØÔºåÊàë‰ª¨Áü•ÈÅìÂ¶Ç‰ΩïÁ¥¢ÂºïÂà∞ÂÄíÊï∞Á¨¨‰∫å‰∏™Â≠óÁ¨¶ÔºöÁ¥¢Âºï-2ÔºÅ‰ΩÜÊòØÁ≠âÁ≠â‚Äî‚ÄîËøôÈáåÊúâ‰∏™Èô∑Èò±ÔºöÂàáÁâáÂè™Âà∞Á¨¨‰∫å‰∏™Á¥¢ÂºïÔºå‰ΩÜ‰∏çÂåÖÊã¨ÂÆÉÔºÅÊâÄ‰ª•Êàë‰ª¨ÈúÄË¶ÅÂú®Á¥¢Âºï-1Â§ÑÁªìÊùüÂàáÁâáÔºå‰ª•‰ΩøÂÖ∂‰∏çÂåÖÊã¨ÊúÄÂêé‰∏Ä‰∏™Â≠óÁ¨¶„ÄÇ\n\
    \nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÊâßË°åËÆ°Âàí„ÄÇ**\n\n```python\n1  x = input(\"Enter a string of at least 3 characters:\
