    \ = name\n        self.movietimes = []    # <-- Now this is MovieTime objects\n\
    ```\n\nAnd now when we construct our lists of theater information, we need to\
    \ add new MovieTime objects to the list in the theater. The MovieTime objects\
    \ contain references to the movie being shown, as well as a list of showtimes."
