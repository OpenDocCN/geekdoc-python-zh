    month = int(sys.argv[2])\n\nif month < 1 or month > 12:\n    print(\"Month must\
    \ be 1-12!\")\n    sys.exit()  # stop running\n\ncalendar.prmonth(year, month)\n\
    ```\n\nShip it!\n\n## 12.7 Importing Specific Attributes\n\nThere's an alternate\
    \ syntax for `import` that you can use to bring attributes from a module directly\
    \ into the global namespace.\n\nWhat do I mean by that?\n\nWell, the upshot is\
    \ that if you're tired of typing the module name followed by a dot to access a\
    \ particular function or piece of data, you can bring that in to use directly,\
    \ instead.\n\nLet's do an example.\n\nThe `time` modules have a function called\
    \ `ctime()` that prints the time out in a classic format.\n\n```python\nimport\
    \ time\n\nprint(time.ctime())  # \"Sun Feb  9 13:37:00 2020\"\n```\n\nBut if you're\
    \ going to call it repeatedly, it might make the code look worse to have \"time.\"\
    \ all over the place.\n\nWe can do this, instead:\n\n```python\n# Bring in ctime()\
    \ explicitly:\n\nfrom time import ctime\n\nprint(ctime())  # Look, ma! No \"time.\"\
    !\n```\n\nIf a module has multiple things you want to import, you can bring them\
    \ in with a comma list:\n\n```python\n# import all three!\n\nfrom time import\
    \ ctime, localtime, monotonic\n```\n\nOr, if you're feeling bold, you can import\
    \ it all!\n\n```python\nfrom time import *\n```\n\nBut I generally recommend against\
    \ that. It takes time for Python to do it, and if you only need a few things,\
    \ pick them explicitly.\n\nFurthermore, a lot of devs rely on the module name\
    \ being a visual cue that we're talking about a function in a module, here. If\
    \ we come across some code that says:\n\n```python\nprint(ctime())\n```\n\nIs\
    \ that a function that the programmer-defined, or is it something that we `from`\
    \ imported from somewhere? By putting the name of the module first, it helps mitigate\
    \ that ambiguity:\n\n```python\nprint(time.ctime())\n```\n\nSo in general, I don‚Äôt\
    \ use `import from` unless it makes the code decidedly more readable to do so.\n\
    Remember: readable code is high-value code!\n\n## 12.8 Learning All The Modules\n\
    \nIf you check out the list of modules‚Å∂ you get with Python, it looks pretty intimidating.\
    \ I mean, there‚Äôs a *lot* there.\n\nHow do you deal with it?\n\nThis is one of\
    \ the toughest parts of learning a new language: learning the *standard library*\
    \ (the bundled modules) that comes with it. Each language has its own way of doing\
    \ things, and those ways are legion.\n\nStep one: give up now. You‚Äôre not going\
    \ to memorize all this.\n\nThe best thing to do is skim it at the level of the\
    \ contents. Just try to remember that there exists a module for dealing with times.\
    \ And a module for dealing with calendars. And for dealing with network communication.\
    \ And so on.\n\nDon‚Äôt worry about the details. You can always look them up later.\
    \ But if you don‚Äôt know that there even *is* a module that handles reading and\
    \ writing of CSV‚Å∑ files, then you won‚Äôt know to look it up when you need it.\n\
    \nAll devs, even experienced ones, look things up. All the time.\n\n## 12.9 Chapter\
    \ Project\n\nIf you need to, review the specification at the top of the chapter.\n\
