  mdcn: "## Á¨¨1Ë°åÔºöÂÆö‰πâÂáΩÊï∞\n\nÂΩìÊàë‰ª¨ÂÜô‰∏ã `def do_the_math` Êó∂ÔºåÊàë‰ª¨ÊòØÂú®ÂëäËØâ PythonÔºö‚ÄúÂòøÔºåÊàëË¶Å‰ªéÂ§¥ÂºÄÂßãÂàõÂª∫‰∏Ä‰∏™Âêç‰∏∫ `do_the_math`\
