    # Chapter 7. Strings


    Let‚Äôs look at an example with the .upper() method. (Usually pronounced ‚Äúdot upper‚Äù
    or ‚Äúupper method‚Äù.)


    ```

    a = "Beej!"

    b = a.upper()

    print(b)        # BEEJ!


    print(a)        # Beej! -- unchanged since .upper() returns a new string

    ```


    The upper method converts a string to uppercase.


    Now, conversationally, I said ‚Äúconverts to‚Äù, but remember that strings are *immutable*,
    so it really doesn‚Äôt change the string in a at all. It makes a new uppercase version
    of the string and returns it, and we refer that to the new string by b.


    As for methods, there are a whole bunch of them attached to strings. So you can
    take any string, add a dot (.), and then put the method name to operate on that
    string. They work just like regular functions, except have this different notation.


    > *Fun Objected-Oriented Programming Fact:* all this talk about methods and objects
    has its roots in a programming paradigm called Object-Oriented Programming (OOP).
    A programming paradigm is a way of modeling problems so that you can solve them.
    So far, we‚Äôve been using the imperative programming paradigm, which means we think
    of a problem as a sequence of steps and conditions. But with OOP, you think of
    a problem as a collection of objects that you can do things with.


    *Python is ‚Äúmultiparadigm‚Äù, which means it can do OOP or imperative as we see
    fit. We‚Äôll use a mix of them from now on, and we‚Äôll cover OOP in more detail in
    its own chapter.*


    Here are some common string methods:


    | Method | Description |

    | :--- | :--- |

    | .split() | Split a string into a list¬≤ on the given string. |

    | .strip() | Strip whitespace¬≥ from both ends of the string. |

    | .upper() | Convert string to all uppercase. |

    | .lower() | Convert string to all lowercase. |

    | .replace() | Replace all occurrences of one word with another in the string.
    |

    | .find() | Find the index of the substring in the string, or -1 if it‚Äôs not found.
    |

    | .count() | Count the number of occurrences of the substring. |

    | .startswith() | Return True if the string starts with the given string. |

    | .endswith() | Return True if the string ends with the given string. |

    | .capitalize() | Capitalize the first letter of each word in the string. |


    Here are some examples:


    ```

    s = "hello, goats! "


    s.split(",") # [ "hello", "goats! " ]

    s.strip()    # "hello, goats!"

    s.upper()    # "HELLO, GOATS! "

    s.lower()    # "hello, goats! "


    s.find("goats")          # 8 (index of "goats" in the string)

    s.count("goats")         # 1

    s.startswith("Goats")    # False

    s.endswith("goats! ")     # True

    s.capitalize()           # "Hello, goats! "

    ```


