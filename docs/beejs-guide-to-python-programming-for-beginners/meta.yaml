    \nWe're shimming a new class in the middle with *both* the movie and the showtimes.\
    \ This is how we can bundle that together.\n\nProblem-solving step: **Carrying\
    \ Out the Plan**\n\nLet's add that new class that holds both a reference to a\
    \ movie as well as the times it's showing:\n\n```\nclass MovieTime:\n    \"\"\"\
    Holds a movie and the times it is playing\"\"\"\n    def __init__(self, movie,\
    \ times):\n        self.movie = movie\n        self.times = times\n```\n\nThen\
