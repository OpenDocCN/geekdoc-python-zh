  md: '# Chapter 8. Lists


    Let‚Äôs look at strings versus lists.


    ```

    x = "Hello"

    y = x

    ```


    In that example, as we learned earlier, there is one string "Hello" in memory,
    and both x and y refer to it.


    Strings are immutable. So you can‚Äôt do something like this:


    ```

    x = "Hello"

    y = x


    # Change character at index 2 to ''Z''

    x[2] = "Z"  # ERROR! Strings are immutable--you can''t change them

    ```


    But lists are mutable. We can change something that‚Äôs in a list. Let‚Äôs do an analogous
    example:


    ```

    x = ["A", "B", "C", "D"]

    y = x


    # Change string at index 2 to ''Z''

    x[2] = "Z"  # Works


    print(x[2])  # "Z"

    print(y[2])  # "Z" also!!!

    ```


    Wait‚Äîwhat happened there? We changed the value in the second index of x, but it
    also changed it in y! How did that happen?


    Remember: it‚Äôs because when we did:


    ```

    x = ["A", "B", "C", "D"]

    y = x

    ```


    both x and y came to point to the same list. There is only one list. Both x and
    y refer to it. So if you change that one list, you see that change reflected in
    both x and y.


    (If you could change a string, it would work the same way. But you can‚Äôt because
    it‚Äôs immutable.)


    Mutable types include the following (some of which we haven‚Äôt talked about yet):


    +   - Lists

    - Dictionaries

    - Objects¬π

    - Sets


    > In some languages, types that appear to get copied on assignment (like strings
    and integers) are called value types. Whereas types that can be referred to by
    multiple variables through assignment (like lists) are called reference types.
    Python doesn‚Äôt make this distinction, although you might hear this phraseology
    used in the wild.


    What if you want a copy of a list, and not just a copy of the reference? You can
    force a list copy a number of ways, but these are three common ones:


    ```

    b = a.copy()  # Copy with .copy() method

    b = list(a)   # Copy with the list() function

    b = a[:]      # Copy by slicing the entire list

    ```


    Even if you don‚Äôt have it quite down yet, don‚Äôt worry. We‚Äôll hit this topic a
    few more times as we progress.


