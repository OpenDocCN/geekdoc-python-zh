    \ 135301852344706746049, 218922995834555169026]\n\nProblem-solving step: **Looking\
    \ Back.**\n\nNotice how the list grows bigger and bigger with each step of the\
    \ loop. If we were to print out the list for every iteration of the loop, we‚Äôd\
    \ see something like this:\n\n```\n[0, 1]\n[0, 1, 1]\n[0, 1, 1, 2]\n[0, 1, 1,\
    \ 2, 3]\n[0, 1, 1, 2, 3, 5]\n[0, 1, 1, 2, 3, 5, 8]\n[0, 1, 1, 2, 3, 5, 8, 13]\n\
    ```\n\nand so on. We‚Äôre constructing the list as we go, building it from the previous\
