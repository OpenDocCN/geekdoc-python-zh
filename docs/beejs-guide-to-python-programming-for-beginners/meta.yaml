    # # Chapter 17


    # # Appendix C: Assignment Behavior


    In this book, we‚Äôve talked about how Python variables work, but let‚Äôs dig into
    it a little more here.

    When we have data of some kind, like a number or a list or a string, that‚Äôs stored
    in memory. And we can assign it to a variable name so that we can have a way to
    refer to it.

    That variable name is a reference to the data.

    So if everything‚Äôs a reference, that must mean that if we do this, there‚Äôs only
    one string, right? Just two names for the same string?


    ```

    s = "Beej!"

    t = s

    ```


    Yes! That‚Äôs exactly what that means. s and t both refer to the same string in
    memory. That means if you changed the string, both s and t would show the changes
    because they‚Äôre both two names for the same string.

    *But you can‚Äôt change the string! It‚Äôs immutable!*

    It‚Äôs the same with numbers:


    ```

    x = -3490

    y = x

    ```


    Both x and y refer to the same number in memory. If you changed the number, both
    x and y would show the change.

    *But you can‚Äôt change the number! It‚Äôs immutable!*

    Let‚Äôs try a list:


    ```

    c = [1, 2, 3]

    d = c

    ```


    Just like with strings and numbers, both variables c and d refer to the same thing
    in memory. But the difference is that the list *is* mutable! We *can* change it,
    and we‚Äôd see the change in c and d.


    ```

    c = [1, 2, 3]

    d = c


    c[1] = 99

    print(d[1])    # 99

    ```


    Of course, you can reassign a variable to point at anything else at any time.


    # ## 17.1 How This Relates To Functions


    All this adds up to Python‚Äôs call-by-sharing evaluation strategy.'
- md: "## Chapter 17. Appendix C: Assignment Behavior\n\nWhen you call a function,\
    \ all the arguments passed to the function are assigned into the parameters in\
    \ the parameter list.\n\nThat assignment, even though it doesn't use the = assignment\
    \ operator, behaves in the same way, nonetheless.\n\nIn the following example,\
    \ both x and a refer to the same object... right up to the moment we reassign\
    \ x on line 4. At that point, x refers to a different list, but a still refers\
    \ to the original.\n\n```python\ndef foo(x):\n    x[1] = 99  # x still refers\
    \ to the same list as a\n\n    x = [4, 5, 6]  # x refers to a different list than\
    \ a, now\n\na = [1, 2, 3]\nfoo(a)\n```\n\n### 17.2 Is Any of This True?\n\nYes,\
    \ believe it!\n\nWe can verify it in the REPL with the built-in id() function\
    \ and the is operator.\n\nThe id() function will give us the location in memory\
    \ where a thing (like a string or number) that a variable refers to is stored.\
    \ If two variables return the same ID, they must be pointing to the same thing\
    \ in memory.\n\nLet's try in the REPL:\n\n```python\n>>> s = \"Beej!\"\n>>> t\
    \ = s\n>>> id(s)\n140156808252976\n>>> id(t)\n140156808252976\n```\n\nThe exact\
    \ number doesn't matter (it will vary), but what matters is that they're identical.\
    \ Both s and t refer to the entity in memory at that location, namely the string\
    \ \"Beej!\".\n\nYou could compare those numbers to determine if both variables\
    \ point to the same thing:\n\n```python\n>>> id(s) == id(t)\nTrue\n```\n\nbut\
    \ there's a shorthand for that with the is operator:\n\n```python\n>>> s is t\n\
    True\n```\n\nNote that it's typically only when you assign from one variable to\
    \ another that they refer to the same thing. If you assign to them independently,\
    \ they typically won't:\n\n```python\n>>> s = \"Beej!\"\n>>> t = \"Beej!\"\n>>>\
    \ s is t\nFalse\n```\n\nIn the above example, there are two strings in memory\
