  md: 'Chapter 2. What is Programming, Anyway? 5


    And you keep building! Writing software is a lifelong learning process. There
    are *always* new things to learn, new technologies, new languages, new techniques.
    It‚Äôs a craft to be developed and perfected over a lifetime. Sure, at first you
    won‚Äôt have that many tools in your toolkit. But every moment you spend working
    on software gives you more experience solving problems and gives you more methods
    to attack them.


    # 2.3 What‚Äôs This Talk About Problem Solving?


    In other words, I know what I want to see‚Ä¶ how do I get there with the tools I
    know?


    There‚Äôs a great scene in the movie Apollo 13¬π that I love. The CO‚ÇÇ scrubbers on
    the command module are spent, and the team wants to use the scrubbers from the
    lunar module to replace them. But the former are round, and the latter are square
    and won‚Äôt fit. Of course, the spacecraft has limited resources to repair it‚Äîjust
    miscellaneous stuff on board that was meant for the mission.


    On the ground, the team has all those items at hand, and they dump them on a table.
    A staff member holds up a square scrubber and a round scrubber and tells everyone,
    ‚ÄúWe gotta find a way to make *this* fit into the hole for *this*.‚Äù He then gestures
    toward the table, adding, ‚ÄúUsing nothing but *that*.‚Äù


    And that‚Äôs what programming is like, except, obviously and fortunately no lives
    are at stake. (Typically.)


    You have a limited set of programming techniques at your disposal, and you have
    the goal that you want to achieve. How can you get to that goal using only those
    tools? It‚Äôs a puzzle!


    # 2.4 So How To Solve It?


    > *Fun Programming Fact:* Most devs have no idea how to solve a problem when they‚Äôre
    first presented with it. They have to systematically attack it.


    Programmers fully intend to use a well-reasoned approach to solving arbitrary
    problems. In reality, they often run off in high spirits and dive right into coding
    before they‚Äôve done some of the very important preliminary work, but since they
    love programming so much they don‚Äôt seem to mind wasting time.


    (And it‚Äôs not a waste of time because every second you‚Äôre programming, you‚Äôre
    learning!)


    But lots of *bosses* do consider unplanned development to be a waste of time.
    Time is also known as ‚Äúmoney‚Äù to the company that hired you. And the only thing
    more precious to a company than money is more money.


    Imagine that you said, ‚ÄúI want to build an airplane!‚Äù and ran off an bought a
    pile of tools and metal and rivets and levers and started bolting it together
    immediately. You might find after a while that, oh you should have figured out
    how big the engine was before you built the fuselage, but, hey, no problem, you
    have time. You can just rebuild the fuselage. So you do. But now the canopy doesn‚Äôt
    fit. So you have to rebuild it again, and so on.


    You could have saved a lot of time by actually *planning* what you were going
    to do before you started building.


    It‚Äôs the same with software.


    > *Fun Programming Proverb:* Hours of debugging can save you minutes of planning.


    There are several problem-solving frameworks out there. These are blueprints for
    how to approach a programming problem and solve it, even if you have no idea how
    to solve it when you first see it.


    One of my favorite problem-solving frameworks was popularized by mathematician
    George P√≥lya in 1945 in his book *How To Solve It*. It was originally written
    for solving math problems, but it‚Äôs surprisingly effective at solving just about
    anything. The Four Main Steps are:


    +   1. **Understanding the Problem.** Get clarity on all parts of the problem.
    Break it down into subproblems, and break those subproblems down. If you don‚Äôt
    understand the problem, any solutions you'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'come up with will be solving the wrong problem! You know you understand the
    problem when you can explain it to someone completely.


    +   2. **Devising a Plan.** How are you going to attack this with the tools you
    have at your disposal and the techniques you know? You know you‚Äôre done making
    a plan when you‚Äôre able to easily convert your plan into code.


    Often when planning you realize there‚Äôs something about the problem you don‚Äôt
    fully understand. Just for a bit, pop back to Step 1 until it‚Äôs clear, then come
    back to planning.


    3. **Carrying out the plan** Convert your plan into code and get it working.


    Often in this phase, you find that there was either something you didn‚Äôt understand
    or something the plan didn‚Äôt account for. Drop back a step or two until it‚Äôs resolved,
    then come back here.


    4. **Looking Back.** Look back on the code you got working, and consider what
    went right and what went wrong. What would you do differently next time? What
    techniques did you learn while writing the code? Was there any place you could
    have structured things better, or anyplace you could have removed redundant code?


    What‚Äôs neat about this is that developers apply the steps of problem-solving to
    the *entire program*, and they also apply it to the smaller problems *within the
    program*. A big computing problem is always composed of many subproblems! The
    problem-solving framework is used within the problem-solving framework!


    An example of a real-life problem might be ‚Äúbuild a house‚Äù. But that‚Äôs made up
    of subproblems, like ‚Äúbuild a foundation‚Äù and ‚Äúframe the walls‚Äù and ‚Äúadd a roof‚Äù.
    And those are made up of subproblems, like ‚Äúgrade the lot‚Äù and ‚Äúpour concrete‚Äù.


    In programming, we break down problems into smaller and smaller subproblems until
    we know how to solve them with the techniques we know. And if we don‚Äôt know a
    technique to solve it, we go and learn one!


    Being a developer is the same as being a problem solver. The problems ain‚Äôt easy,
    but that‚Äôs why it pays the big bucks.


    So you should expect that any time you see a programming problem in this book,
    on a programming challenge website, at school, or work, that the answer will not
    be obvious. You‚Äôre going to have to work hard and spend a lot of time to get through
    the first problem-solving steps before you‚Äôll even be ready to start coding.


    # 2.5 What is Python?


    Python is a *programming language*. This means it‚Äôs vaguely readable by humans,
    and completely readable by a machine. (As long as you don‚Äôt make the tiniest mistake!)
    This is a good combination, since people are bad at reading the actual 1011010100110
    code that machines use. We use these *higher-level* languages to help us get by.


    In this case, another piece of software called the Python *interpreter* takes
    the code we write in the Python language and runs it, performing the operations
    we‚Äôve requested.


    So before we begin, we need to install the Python interpreter. This is one of
    the most annoyingly painful parts of the whole book, but luckily it only has to
    be done once.


    Okay, gang! Let‚Äôs get it‚Ä¶ over with!


    ‚Ä¶I really need to work on the end of that inspirational speech.


    # 2.6 Summary


    +   - A programmer is a problem solver. They then write programs that implement
    a solution to that problem.

    - A program is a series of instructions that can be carried out by a computer
    to solve the problem.

    - The main problem-solving steps are: Understand the Problem, Devise a Plan, Carry
    out the Plan, Look Back.'
