    \nBut in the meantime, we can construct exceptions. But so what? What can we do\
    \ with them?\n\n# 14.14 Raising Exceptions\n\n**Problem-solving step: Understanding\
    \ the Problem**\n\nLet's say you've written some code and you want to use exceptions\
