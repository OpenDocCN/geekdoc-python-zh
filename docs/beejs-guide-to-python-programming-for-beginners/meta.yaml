    by a $ prompt (sometimes prefixed with other information about which directory
    you‚Äôre in, or something similar). Zsh uses a % prompt.


    There are multitudes of shells, but we‚Äôll just assuming you‚Äôre going to use Bash
    or Zsh (with a hat-tip to Windows‚Äôs built-in shells), and they‚Äôre compatible enough
    for our purposes.


    # 19.3.2 Windows Terminals and Shells


    For Windows, there are plenty of options, some of which you have installed already.


    +   - **CMD**: classic shell with origins way back in the MS-DOS days.

    - **PowerShell**: a new, more powerful shell.

    - **Bash via Git**: the famous Git¬≤ software package has a bash shell called,
    appropriately, ‚Äúgitbash‚Äù.

