  md: "# Chapter 14. Exceptions\n\n```\nexcept IOError as e:\n    print(f'head.py:\
    \ {filename} {e.strerror}')\n```\n\nAnd when we run it, we get some nice error\
    \ message for whatever error case we get:\n\n```\n$ python head.py noperm.txt\
    \ 5\nhead.py: noperm.txt Permission denied\n\n$ python head.py / 5\nhead.py: /\
    \ Is a directory\n\n$ python head.py nofile.txt 5\nhead.py: nofile.txt No such\
    \ file or directory\n```\n\nPretty neat!\n\nWhat's left? Oh yeah‚Äîwe have to actually\
    \ implement the functionality to only show the first however-many lines of the\
    \ file.\n\nThere are a couple of approaches to this.\n\nOne, we could use a while\
    \ loop and test for the end of the file *or* reaching the required count, whichever\
    \ comes first.\n\nThat would be fine. But a more straightforward option might\
    \ be to just jump out of the loop when the counter gets high enough. The break\
    \ statement can be used to bail out of a loop partway through.\n\n```\nline_count\
    \ = 0  # Number of lines we've read so far\n\ntry:\n    with open(filename) as\
    \ f:\n        for line in f:\n\n            line_count += 1\n\n            if\
    \ line_count > total_count:\n                break\n\n            print(line,\
    \ end=\"\")\n\nexcept IOError as e:\n    print(f'head.py: {filename} {e.strerror}')\n\
    ```\n\nAs you see, we're keeping track of the number of lines read so far, and\
    \ if that exceeds our magic target number, we just break straight out of the loop\
    \ and we're done.\n\nAnd it works!\n\n```\n$ python head.py rocks.txt 3\nmarble\n\
    coal\ngranite\n```\n\nSuper-robust against bad input and errors. This is what\
    \ we call *defensive coding*, when you prepare for the worst and handle those\
    \ cases without crashing. It's a good strategy because not only does it make your\
    \ program more capable of handling errors, but it also makes you stop and consider\
    \ what the errors are that might occur in the first place. And, as we've said,\
    \ hours of debugging can save you minutes of planning.\n\n(Solution<sup>6</sup>.)\n\
    \n<sup>6</sup>https://beej.us/guide/begpython/source/examples/head.py"
