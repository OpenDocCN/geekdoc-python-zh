  md: '# 15.8 Square root


    Square root is a funny one. It‚Äôs the opposite of *squaring*, which if you remember
    from the earlier section means *raising to a power of 2*. But, again, *square
    root* is the opposite of that.


    It‚Äôs asking the question, ‚ÄúFor a given number, which number do I have to multiply
    by itself to get that number?‚Äù


    Let‚Äôs examplify!


    But before we do, the weird lightning bolt line thing is the mathematical symbol
    for the square root of a number.


    Let‚Äôs ask for the square root of 9:


    $\sqrt{9} = ?$


    That‚Äôs asking, what number multiplied by itself makes 9? Or, in other words, what
    number raised to the 2nd power makes 9? Or, in other words, what number squared
    makes 9?


    Hopefully by now you‚Äôve determined that:


    $3 \times 3 = 9$


    and, equivalently:


    $3^2 = 9$


    so therefore:


    $\sqrt{9} = 3$


    What about some other ones?


    $\sqrt{16} = ? \sqrt{25} = ? \sqrt{36} = ? \sqrt{12180100} = ?$


    Note that all of those have integer answers. If the square root of number is an
    integer, we call that number a *perfect square*. 16, 25, 36‚Ä¶ these are all perfect
    squares.


    But you can take the square root of any number.


    $\sqrt{17} = 4.123105625617661$ approximately.


    17 is *not* a perfect square, since it doesn‚Äôt have an integer result.


    Now, you might be imagining what would happen if you tried to take the square
    root of a negative number:


    $\sqrt{-100} = ?$


    After a bit of thought, you might realize that no number multiplied by itself
    can ever result in $-100$ so‚Ä¶ what can you do?


    You might think, ‚ÄúWe‚Äôre doomed,‚Äù but not mathematicians! They simply defined:


    $\sqrt{-1} = i$


    and invented an entire mathematical system around what they called *imaginary
    numbers*¬≥ that actually have some amazing applications. But that‚Äôs something you
    can look up on your own.


    In addition to square roots, there are also cube roots. This is asking, ‚ÄúWhat
    number cubed results in this number?‚Äù This is indicated by a small 3 above the
    root symbol:


    $\sqrt[3]{27} = x$


    which is the inverse of the equation:


    $x^3 = 27$


    Can you figure out what $x$ is?


    What about how to do this in Python?'
