    \nmother_name = record[\"mother\"]  # ‰ªéÂÜÖÂ±ÇÂ≠óÂÖ∏‰∏≠ÊèêÂèñÁà∂ÊØçÁöÑÂêçÂ≠ó\nfather_name = record[\"father\"\
    ]\n\nprint(\"Parents:\")\nprint(f'    {mother_name}')\nprint(f'    {father_name}')\n\
