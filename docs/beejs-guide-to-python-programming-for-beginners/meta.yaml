    \ make the code look worse to have \"time.\" all over the place.\n\nWe can do\
    \ this, instead:\n\n```\n# Bring in ctime() explicitly:\n\nfrom time import ctime\n\
    \nprint(ctime())  # Look, ma! No \"time.\"!\n```\n\nIf a module has multiple things\
    \ you want to import, you can bring them in with a comma list:\n\n```\n# import\
