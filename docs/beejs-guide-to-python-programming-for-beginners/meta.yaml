  md: "Now, sure, we could just throw that equation in the middle of our code, but\
    \ this is actually ripe to be made into its own function! If we do that, we can\
    \ reuse it easily later, should we ever want to. Let's wrap it up and add it to\
    \ our file:\n\n```\ndef dist3d(p0, p1):\n    \"\"\"Return the Euclidean distance\
    \ between 2 3D points.\"\"\"\n\n    # Compute the difference in the Xs, Ys, and\
    \ Zs\n    dx = p0[0] - p1[0]\n    dy = p0[1] - p1[1]\n    dz = p0[2] - p1[2]\n\
    \n    # Compute the distance. (Remember that multiplying a number by\n    # itself\
    \ is the same as squaring the number.)\n    return math.sqrt(dx*dx + dy*dy + dz*dz)\n\
    ```\n\nAnd then we can mod our code where we hardcoded that 99.99 and have it\
    \ call the distance formula instead! We just need to pass in the two ships' locations‚Äîone\
