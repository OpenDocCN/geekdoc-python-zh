    # 6.5 Boolean Operations in Python


    Problem-solving step: **Understanding the Problem.**


    The comparison operators in Python are:


    | Operator | Effect |

    |---|---|

    | < | Less than, e.g. x < y |

    | > | Greater than, e.g. x > y |

    | == | Equal to, e.g. x == y |

    | != | Not equal to, e.g. x != y |

    | <= | Less than or equal to, e.g. x <= y |

    | >= | Greater than or equal to, e.g. x >= y |


    So we can take a variable and convert it to a true or false value by comparing
    it to numbers or other variables.


    What is true and false in Python?


    | Boolean | Python Keyword |

    |---|---|

    | True | True |

    | False | False |


    Easy enough.


    Let‚Äôs try a quick demo¬≥:


    ```

    1 print(True)    # True

    2 print(False)   # False

    3

    4 x = 10

    5 print(x == 10) # True

    ```


