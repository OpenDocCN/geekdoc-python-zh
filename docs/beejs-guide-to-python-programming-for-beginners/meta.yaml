    \ `ZeroDivisionError` ÁöÑÁ±ªÂíåÂè¶‰∏Ä‰∏™Âêç‰∏∫ `ValueError` ÁöÑÁ±ª„ÄÇÂÆûÈôÖ‰∏äÔºåÂ¶ÇÊûúÊàë‰ª¨ÊÑøÊÑèÔºåÊàë‰ª¨ÂèØ‰ª•Áõ¥Êé•ÂàõÂª∫Ëøô‰∫õÁ±ªÁöÑÊñ∞ÂÆû‰æãÔºö\n\n\
    ```\ne = ValueError()    # ÊûÑÈÄÝ‰∏Ä‰∏™Êñ∞ÁöÑ ValueError ÂØπË±°\n```\n\nÊúâ‰∏ÄÊï¥Â•óÁé∞ÊàêÁöÑÂºÇÂ∏∏ÂèØ‰æõ‰ΩøÁî®‚Å¥Ôºå‰ΩÜÂ¶ÇÊûúËøô‰∫õ‰ºº‰πéÈÉΩ‰∏çÂêàÈÄÇÔºå‰ΩÝÂèØ‰ª•ÂàõÂª∫‰∏Ä‰∏™Êñ∞ÁöÑ\
    \ `Exception` Âπ∂‰ºÝÈÄí‰∏Ä‰∫õ‰ø°ÊÅØÁªôÂÆÉÔºö\n\n```\ne = Exception('Something went horribly awry')\n\
    ```\n\nÊúÄÂêéÔºåÂ¶ÇÊûú‰ΩÝÊÑøÊÑèÔºå‰ΩÝÂèØ‰ª•ÂàõÂª∫Ëá™Â∑±ÁöÑÊñ∞ÂºÇÂ∏∏Á±ª„ÄÇ‰ΩÝ‰∏çÂøÖËøôÊÝ∑ÂÅö‚Äî‚Äî‰ΩÝÂèØ‰ª•‰ΩøÁî® `Exception` Êàñ‰ªª‰ΩïÂÖ∂‰ªñÈ¢ÑÂÖàÂ≠òÂú®ÁöÑÂºÇÂ∏∏„ÄÇ\n\n‰ΩÜÂ¶ÇÊûú‰ΩÝÁ°ÆÂÆûÂàõÂª∫‰∫ÜËá™Â∑±ÁöÑÂºÇÂ∏∏ÔºåÂîØ‰∏ÄÁöÑÊ≥®ÊÑè‰∫ãÈ°πÊòØËøô‰∫õÂºÇÂ∏∏**ÂøÖÈ°ª**\
    \ *ÁªßÊâø*Ëá™ `Exception` Âü∫Á±ª„ÄÇ\n\nÂìáÂì¶ÔºåBeejÔºå‰ΩÝÂà∞Â∫ïÂú®ËØ¥‰ªÄ‰πàÔºü\n\nÂ•ΩÂêßÔºå‰ΩÝÊäì‰ΩèÊàë‰∫Ü„ÄÇÊàëÂàöÊâçÁî®‰∫Ü‰∏Ä‰∫õÈù¢ÂêëÂØπË±°ÁºñÁ®ãÁöÑÊúØËØ≠„ÄÇÊàë‰ª¨Â∞ÜÂú®ÂêéÈù¢ÁöÑÁ´ÝËäÇ‰∏≠ËÆ®ËÆ∫Ëøô‰∏ÄÂàáÁöÑÂê´‰πâÔºå‰ΩÜÁé∞Âú®ÔºåËØ∑Áõ∏‰ø°ÊàëÔºå‰ΩÝÈúÄË¶ÅÂ£∞Êòé‰ΩÝÁöÑÊñ∞ÂºÇÂ∏∏Ôºå‰ΩÝÂøÖÈ°ª‰ΩøÁî®Á±ª‰ººËøôÊÝ∑ÁöÑËØ≠Ê≥ïÔºö\n\
