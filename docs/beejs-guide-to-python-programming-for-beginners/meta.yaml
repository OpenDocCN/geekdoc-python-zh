    „ÄÇÔºâ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò**„ÄÇ\n\nÊàë‰ª¨Êúâ‰∏§‰∏™ÈóÆÈ¢ò„ÄÇ\n\n1. ÈÇ£‰∏™ÂàóË°®Á¥¢ÂºïË∂ÖÂá∫ËåÉÂõ¥ÁöÑÈîôËØØ\n2. Êàë‰ª¨ÁöÑ*Â∑Æ‰∏ÄÈîôËØØ*<sup>7</sup>ÔºåÂØºËá¥Êàë‰ª¨ÁöÑË°åÂÅèÁßª‰∫Ü‰∏ÄË°å„ÄÇ\n\
    \nÊòØÁöÑÔºåÂ∑Æ‰∏ÄÈîôËØØÈùûÂ∏∏ÊúâÂêçÔºå‰ª•Ëá≥‰∫éÊúâËá™Â∑±ÁöÑÁª¥Âü∫ÁôæÁßëÈ°µÈù¢„ÄÇ\n\nÈ°æÂêçÊÄù‰πâÔºåÊàë‰ª¨ÁöÑËÆ°ÁÆóÂ∑Æ‰∫Ü‰∏Ä‰∏™„ÄÇ‰ΩÜ‰∏∫‰ªÄ‰πàÔºüÊÄé‰πàÂ∑ÆÁöÑÔºü\n\nËøôÊòØ‰∫∫Á±ªÂíåËÆ°ÁÆóÊú∫‰πãÈó¥‰∏Ä‰∏™ÈùûÂ∏∏Â∏∏ËßÅÁöÑÂàÜÊ≠ß„ÄÇÊàë‰ª¨‰∫∫Á±ªÂñúÊ¨¢ÂàóË°®‰ªéÁ¥¢Âºï‚Äú1‚ÄùÂºÄÂßãÔºåËÄåËÆ°ÁÆóÊú∫ÂñúÊ¨¢ÂÆÉ‰ª¨‰ªéÁ¥¢Âºï‚Äú0‚ÄùÂºÄÂßã„ÄÇËøôÊòØÁî±Êù•Â∑≤‰πÖÁöÑÊñó‰∫â„ÄÇÁîöËá≥ÁΩóÈ©¨‰∫∫‰πü‰ªé‚ÄúI‚ÄùÂºÄÂßãÔºå‰ΩÜËøô‰∏ªË¶ÅÊòØÂõÝ‰∏∫ÁΩóÈ©¨Êï∞Â≠óÁõ¥Âà∞ÂÖ¨ÂÖÉ725Âπ¥ÊâçÊúâ‰∏Ä‰∏™Ë°®Á§∫Èõ∂ÁöÑÂ≠óÁ¨¶‚Äî‚ÄîÁúüÊòØÂêéÊù•ËÄÖÔºÅ\n\
