    \n\nOkay then!\n\n### 17.3 Python Compiler Optimizations\n\nIf you take this example\
    \ from the REPL, above:\n\n```python\n>>> s = \"Beej!\"\n>>> t = \"Beej!\"\n>>>\
    \ s is t\nFalse\n```\n\nand you put it in a python program, like `test.py`:\n\n\
    ```python\ns = \"Beej!\"\nt = \"Beej!\"\nprint(s is t)\n```\n\nand run it from\
