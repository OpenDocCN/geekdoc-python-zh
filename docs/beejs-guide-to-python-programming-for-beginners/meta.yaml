    \n```python\nvalid_input = False\n\nwhile not valid_input:\n    x = input(\"Enter\
    \ a number between 1 and 19: \")\n    x = int(x)\n\n    if x >= 1 and x <= 19:\n\
    \        valid_input = True\n```\n\nWe just loop until we get valid input, just\
