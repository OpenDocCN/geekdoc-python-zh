    \n## Á¨¨2Ë°åÔºöËÆ°ÁÆóÁªìÊûú\n\n‰ΩÝÂú®Á¨¨2Ë°åÂèØ‰ª•ÁúãÂà∞ÔºåÊàë‰ª¨Ëé∑ÂèñÂèÇÊï∞ `x` Âπ∂Â∞ÜÂÖ∂ËæìÂÖ•Âà∞ËÄÅÊùø‰∫§ÁªôÊàë‰ª¨ÁöÑÊñπÁ®ãÂºè‰∏≠„ÄÇÔºà‰ªñ‰ª¨ÂëäËØâÊàë‰ª¨Ë¶ÅÊîπÊàê‰πò‰ª•7ÔºåËÆ∞ÂæóÂêóÔºüÔºâ\n\n\
    ÁÑ∂Âêé Python ÊâßË°åËØ•Êï∞Â≠¶ËøêÁÆóÔºåÂπ∂Â∞ÜÁªìÊûúÂ≠òÂÇ®Âà∞ÂèòÈáè `result` ‰∏≠„ÄÇ\n\nÁé∞Âú®ÂèòÈáè `result` ÊòØÁâπÊÆäÁöÑ„ÄÇÂÆÉÊòØÊàë‰ª¨ÊâÄËØ¥ÁöÑ*Â±ÄÈÉ®ÂèòÈáè*„ÄÇÂõÝ‰∏∫ÂÆÉÂú®ÂáΩÊï∞ÂÜÖÈÉ®‰ΩøÁî®ÔºåÊâÄ‰ª•Âè™Âú®ÂáΩÊï∞ÂÜÖÈÉ®ÂèØËßÅ„ÄÇ‰∏ÄÊó¶ÂáΩÊï∞ËøîÂõûÔºà‰∏ãÈù¢‰ºöËØ¶ÁªÜ‰ªãÁªçÔºâÔºåÂ±ÄÈÉ®ÂèòÈáè‰∏≠ÁöÑÂÄºÂ∞±‰ºöÊ∞∏ËøúÊ∂àÂ§±„ÄÇ\n\
    \n‰ΩÝÂèØ‰ª•ÈöèÊÑèÂëΩÂêçÂ±ÄÈÉ®ÂèòÈáèÔºåÂç≥‰Ωø‰ΩÝÂú®Âè¶‰∏Ä‰∏™ÂáΩÊï∞‰∏≠‰ΩøÁî®‰∫ÜÁõ∏ÂêåÁöÑÂêçÁß∞ÔºÅÊØè‰∏™Â±ÄÈÉ®ÂèòÈáèÈÉΩ‰∏éÂ§ñÁïåÈöîÁ¶ªÔºåÂè™Â≠òÂú®‰∫éÂÖ∂Ëá™Ë∫´ÁöÑÂáΩÊï∞‰∏≠„ÄÇ\n\nÊ≠£Â¶ÇÊàë‰∏äÈù¢ÊèêÂà∞ÁöÑÔºåÂèÇÊï∞‰πüÊòØÂ±ÄÈÉ®ÂèòÈáè„ÄÇÂÆÉ‰ª¨Âè™ÊòØÈ¢ùÂ§ñÂÖ∑ÊúâËá™Âä®Ë¢´ËµãÂÄº‰∏∫ÂÆûÂèÇÂÄºÁöÑÁâπÊÄß„ÄÇ\n\
    \n## Á¨¨4Ë°åÔºöËøîÂõûÁªìÊûú\n\nÂáΩÊï∞ÂèØ‰ª•ÈÄâÊã©ÊÄßÂú∞ËøîÂõû‰∏Ä‰∏™ÂÄº„ÄÇ‰ΩÝÁü•ÈÅìÂÆûÂèÇÊòØÂ∞ÜÊï∞ÊçÆ*‰ºÝÂÖ•*ÂáΩÊï∞ÁöÑ‰∏ÄÁßçÊñπÂºèÂêóÔºüËøîÂõûÂÄºÊòØÂ∞ÜÊï∞ÊçÆ‰ªéÂáΩÊï∞*‰ºÝÂá∫*ÁªôË∞ÉÁî®ËÄÖÁöÑ‰∏ÄÁßçÊñπÂºè„ÄÇ\n\
    \nÂõûÂà∞Ë∞ÉÁî®ÂáΩÊï∞ÁöÑÂú∞ÊñπÔºå‰ΩÝÂèØ‰ª•Â∞ÜÂáΩÊï∞Ë∞ÉÁî®ËßÜ‰∏∫*Êã•Êúâ*ËøîÂõûÂÄº„ÄÇÁÑ∂Âêé‰ΩÝÂèØ‰ª•ÂÅö‰∏Ä‰∫õ‰∫ãÊÉÖÔºåÊØîÂ¶ÇÂ∞ÜÂÖ∂ËµãÂÄºÁªô‰∏Ä‰∏™ÂèòÈáè„ÄÇ\n\n## Á¨¨6Ë°åÔºöÂú®ÂèòÈáè‰∏≠ÊçïËé∑ËøîÂõûÁöÑÁªìÊûú\n\n\
    Êàë‰ª¨Ë∞ÉÁî®ÂáΩÊï∞ÔºåÂπ∂‰ªéËØ•ÂáΩÊï∞Ëé∑Âèñ*ËøîÂõûÂÄº*ÔºåÁÑ∂ÂêéÂ∞ÜÂÖ∂ËµãÂÄºÁªôÂèòÈáè `answer`„ÄÇÁÑ∂ÂêéÊàë‰ª¨ÂèØ‰ª•ÂØπÂÆÉËøõË°åÊìç‰ΩúÔºåÊØîÂ¶ÇÂú®Á¨¨7Ë°åÊâìÂç∞Âá∫Êù•„ÄÇ\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÂõûÈ°æ**„ÄÇ\n\
    \nÂú®‰∏äÈù¢ÁºñÂÜôÁöÑÂáΩÊï∞‰∏≠ÔºåÊàë‰ª¨‰ΩøÁî®‰∫ÜËÆ∏Â§öÂèòÈáèÊù•Â∏ÆÂä©ÊºîÁ§∫Âõ¥ÁªïÂáΩÊï∞ÁöÑËÆ∏Â§öÊ¶ÇÂøµÂíåÊÉ≥Ê≥ï„ÄÇ\n\n‰ΩÜÂú®Áé∞ÂÆû‰∏≠ÔºåÂºÄÂèëËÄÖÂèØËÉΩ‰ºöÂ∞Ü‰∏äËø∞‰ª£ÁÝÅÁÆÄÂåñ‰∏∫Ôºö\n\n```\ndef do_the_math(x):\n\
    \    return (x + 13) * 7\n\nprint(do_the_math(30))\n```\n\nÊØîËæÉËøô‰∏§ÊÆµ‰ª£ÁÝÅÔºåÁõ¥Âà∞‰ΩÝÁ°Æ‰ø°ÂÆÉ‰ª¨ÊòØÁ≠âÊïàÁöÑ„ÄÇ\n\
    \n## 10.7 Â§ö‰∏™ËøîÂõûÂÄº\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò**„ÄÇ\n\n‰ΩÝÊÄªÊòØÂèØ‰ª•‰ªéÂáΩÊï∞ËøîÂõû‰∏Ä‰∏™ÂàóË°®„ÄÅ‰∏Ä‰∏™Â≠óÂÖ∏Êàñ‰ªª‰Ωï‰∏úË•øÔºå‰ΩÜ‰ΩÝ‰πüÂèØ‰ª•ËøîÂõû‰∏§‰∏™ÂÄºÂπ∂Â∞ÜÂÆÉ‰ª¨ËµãÂÄºÁªô‰∏çÂêåÁöÑÂèòÈáè„ÄÇ\n\
    \n```\n# ËøîÂõûÂèÇÊï∞‰πò‰ª•10ÔºåÂÜçÈô§‰ª•10ÁöÑÂáΩÊï∞\n\ndef timesdiv10(x):\n    return x * 10, x / 10\n\n\
    a, b = timesdiv10(100)\n\nprint(a, b)    # 1000 10\n```\n\nÊàñËÄÖ‰ΩÝÂèØ‰ª•Â∞ÜÁªìÊûúËµãÂÄºÁªôÂçï‰∏™ÂèòÈáè„ÄÇÁªìÊûúÂ∞ÜÊòØ‰∏Ä‰∏™*ÂÖÉÁªÑ*ÔºåËøôÊòØ‰∏Ä‰∏™Âè™ËØªÂàóË°®Ôºå‰ΩÝÂèØ‰ª•‰ΩøÁî®ÊñπÊã¨Âè∑Ë°®Á§∫Ê≥ïËÆøÈóÆÂÆÉÔºö\n\
    \n```\na = timesdiv10(100)\n\nprint(a[0], a[1])    # 1000 10\n```\n\nÁ•ûÂ•áÂêßÔºÅ\n\n\
    ## 10.8 ‰ªÄ‰πàÊòØÂ•ΩÁöÑÂáΩÊï∞\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò**„ÄÇ\n\nÊúÄÂ§ßÁöÑËßÑÂàôÊòØ‚ÄúÂè™ÂÅö‰∏Ä‰ª∂‰∫ãÔºåÂπ∂ÊääÂÆÉÂÅöÂ•Ω‚Äù„ÄÇ\n\nËøôÊõ¥ÂÉèÊòØ‰∏Ä‰∏™ÊåáÂØºÂéüÂàôÔºåËÄå‰∏çÊòØËßÑÂàôÔºåÂõÝ‰∏∫Âú®ÁºñÁ®ãÊñπÈù¢‰ΩÝÊâçÊòØËÄÅÊùø„ÄÇ\n\
    \n‰ΩÜËøôÊòØ‰∏Ä‰∏™ÂæàÂ•ΩÁöÑÊåáÂØºÂéüÂàôÔºåÂú®ÂèØËÉΩÁöÑÊÉÖÂÜµ‰∏ãÂ∫îËØ•ÈÅµÂæ™„ÄÇ\n\n‰ΩÝ‰ΩøÁî®ÂáΩÊï∞ÁöÑ‰∏ªË¶ÅÁõÆÁöÑÊòØÔºö\n\n- Êï∞Â≠¶ÊñπÁ®ãÂºè\n- ‰ªª‰ΩïÈáçÂ§çÂèëÁîüÁöÑ‰∫ãÊÉÖ\n- Â∞Ü‰ª£ÁÝÅÂàÜËß£ÊàêÊõ¥Â∞èÁöÑ„ÄÅËá™ÂåÖÂê´ÁöÑÈÉ®ÂàÜ\n\
    \nËÆ©Êàë‰ª¨Êõ¥ËØ¶ÁªÜÂú∞ËÆ®ËÆ∫ÊúÄÂêé‰∏ÄÈ°πÔºåÂõÝ‰∏∫ÂÆÉ‰∏çÂ§™ÊòéÊòæ„ÄÇ\n\nÈùûÂ∏∏È¢ëÁπÅÂú∞‚Äî‚ÄîÂáÝ‰πéÊÄªÊòØ‚Äî‚Äî‰ΩÝ‰ºö‰ªé‰∏ÄÁ≥ªÂàóÈúÄË¶ÅÊâßË°åÁöÑÊ≠•È™§ÂºÄÂßãÊù•Ëß£ÂÜ≥ÈóÆÈ¢òÔºåÂÉèËøôÊÝ∑Ôºö\n\n```\n# ÂΩìÊàë‰ª¨ËøòÊúâÊï∞ÊçÆÈúÄË¶ÅÂ§ÑÁêÜÊó∂\n\
    \    # Â§ÑÁêÜÊï∞ÊçÆ\n    # ËæìÂá∫Êï∞ÊçÆ\n```\n\nÁÑ∂Âêé‰ΩÝËøõÂéªÂ°´ÂÜôÂ§ÑÁêÜÊï∞ÊçÆÂíåËæìÂá∫Êï∞ÊçÆÁöÑÊâÄÊúâ‰ª£ÁÝÅ„ÄÇ\n\n‰ΩÜËøôÂèØËÉΩ‰ºöÂØºËá¥‰∏Ä‰∏™ËáÉËÇø„ÄÅÈöæ‰ª•ÈòÖËØªÁöÑ while\
    \ Âæ™ÁéØ„ÄÇÊúÄÂ•ΩÂÉèËøôÊÝ∑ÁºñÂÜô‰ª£ÁÝÅÔºö\n\n```\nwhile d in data:\n    d = process(d)\n    output(d)\n\
    ```\n\nÁÑ∂ÂêéÁºñÂÜôÂáΩÊï∞ `process()` Âíå `output()` Êù•Â§ÑÁêÜ‰ºÝÈÄíÁªôÂÆÉ‰ª¨ÁöÑÊï∞ÊçÆ„ÄÇ\n\nËøô‰ΩøÂæóÂæ™ÁéØÁöÑÈÄªËæë*ÈùûÂ∏∏*ÂÆπÊòìÈòÖËØª„ÄÇËÄåÊòì‰∫éÈòÖËØªÊòØ*ÁéãÈÅì*ÔºàÊàñËÄÖ*Â•≥Áéã*ÔºåÂ¶ÇÊûú‰ΩÝÂñúÊ¨¢ÁöÑËØùÔºâ„ÄÇ\n\
    \nÂ¶ÇÊûú‰ΩÝÂèëÁé∞‰ΩÝÊúâ‰∏Ä‰∫õÂ§ßÈáèÁöÑ‰ª£ÁÝÅÂµåÂ•óÂæóÂæàÊ∑±Ôºå‰πüËÆ∏ÊòØÊó∂ÂÄôÂ∞ÜÂÆÉ‰ª¨ÂàÜËß£ÊàêÂáΩÊï∞‰∫ÜÔºåÂç≥‰Ωø‰ΩÝÂè™‰ªéÈÇ£‰∏™Âçï‰∏ÄÁöÑÂú∞ÊñπË∞ÉÁî®Ëøô‰∫õÂáΩÊï∞„ÄÇ\n\nÁü•ÈÅì*‰ΩïÊó∂*Â∞Ü‰ª£ÁÝÅÂàÜËß£ÊàêÂáΩÊï∞Êõ¥ÂÉèÊòØ‰∏ÄÈó®Ëâ∫ÊúØÔºåËÄå‰∏çÊòØÁßëÂ≠¶„ÄÇÂ¶ÇÊûú‰ΩÝÂºÄÂßãËßâÂæó‰ΩÝÁöÑ‰ª£ÁÝÅÊúâÁÇπÈöæ‰ª•È©æÈ©≠ÔºåËÄÉËôë‰∏Ä‰∏ãÂ¶ÇÊûúÂ∞ÜÂÖ∂ÂàÜËß£Êàê‰∏çÂêåÁöÑÂáΩÊï∞‰ºöÊòØ‰ªÄ‰πàÊÝ∑Â≠ê„ÄÇÂ¶ÇÊûú‰ΩÝÊõ¥ÂñúÊ¨¢ÔºåÈÇ£Â∞±ÂéªÂÅöÂêßÔºÅ\n\
    \n## 10.9 ‰ΩçÁΩÆÂèÇÊï∞‰∏éÂÖ≥ÈîÆÂ≠óÂèÇÊï∞\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò**„ÄÇ\n\nÊàë‰ª¨Á®çÂêé‰ºöÊõ¥ËØ¶ÁªÜÂú∞ËÆ®ËÆ∫Ëøô‰∏ÄÁÇπÔºå‰ΩÜÂú® Python ‰∏≠ÔºåÂáΩÊï∞ÂèÇÊï∞ÂèØ‰ª•ÂàÜ‰∏∫‰∏§Â§ßÁ±ªÔºö*‰ΩçÁΩÆ*ÂèÇÊï∞Âíå*ÂÖ≥ÈîÆÂ≠ó*ÂèÇÊï∞„ÄÇ\n\
    \n‰ΩçÁΩÆÂèÇÊï∞ÊòØÂøÖÈ°ªÂú®ÂáΩÊï∞Ë∞ÉÁî®‰∏≠Âá∫Áé∞Âú®ÁâπÂÆö‰ΩçÁΩÆÁöÑÂèÇÊï∞„ÄÇ\n\n‰æãÂ¶ÇÔºåÂ¶ÇÊûúÊàë‰ª¨ÊÉ≥ËÆ°ÁÆó 14<sup>12</sup>ÔºåÊàë‰ª¨ÈúÄË¶ÅÊåâÁâπÂÆöÈ°∫Â∫èÂ∞ÜËøô‰∏§‰∏™ÂèÇÊï∞‰ºÝÈÄíÁªô `math.pow()`\
    \ ÂáΩÊï∞ÔºåËØ•ÂáΩÊï∞ÊúüÊúõÂ∫ïÊï∞Âú®ÂâçÔºåÊåáÊï∞Âú®ÂêéÔºö\n\n```\nmath.pow(14, 12)    # 56693912375296.0\n```\n\nÂ¶ÇÊûú‰ΩÝÊää12ÊîæÂú®ÂâçÈù¢Ôºå‰ΩÝ‰ºöÂæóÂà∞‰∏çÂêåÁöÑÁ≠îÊ°à„ÄÇËøô‰∫õÂ∞±ÊòØ‰ΩçÁΩÆÂèÇÊï∞„ÄÇ\n\
    \n‰ΩÜÂØπ‰∫éÊüê‰∫õÂáΩÊï∞ÔºåÂú®‰ΩçÁΩÆÂèÇÊï∞‰πãÂêéÔºå‰ΩÝÂèØ‰ª•ÊåáÂÆöÈ¢ùÂ§ñÁöÑÂÖ≥ÈîÆÂ≠óÂèÇÊï∞„ÄÇËøô‰∫õÊòØÈÄöËøáÁâπÂÆöÂêçÁß∞ÊÝáËØÜÁöÑÂèÇÊï∞„ÄÇ\n\n‰æãÂ¶ÇÔºåÈÄöÂ∏∏ `print()` ‰ºöÂú®Â≠óÁ¨¶‰∏≤Êú´Â∞æÊ∑ªÂäÝ‰∏Ä‰∏™Êç¢Ë°åÁ¨¶„ÄÇ‰ΩÜ‰ΩÝÂèØ‰ª•ÈÄöËøá\
    \ `end` ÂÖ≥ÈîÆÂ≠óÂèÇÊï∞Ë¶ÜÁõñÊ≠§Ë°å‰∏∫ÔºåÂëäËØâ `print()` Âú®Ë°åÂ∞æ‰∏çÊîæ‰ªª‰ΩïÂÜÖÂÆπÔºà‰∏Ä‰∏™Á©∫Â≠óÁ¨¶‰∏≤ÔºâÔºö\n\n```\n# ‰∏ÄËµ∑Âú®ÂçïË°å‰∏äÊâìÂç∞ \"Beej\"\
    \n\nprint(\"Be\", end=\"\")\nprint(\"ej\")\n```\n\nÊ≥®ÊÑèÊàë‰ª¨ÂøÖÈ°ªÈÄöËøáÂêçÁß∞Êù•ÊÝáËØÜÂÖ≥ÈîÆÂ≠óÂèÇÊï∞„ÄÇ\n\nÂ¶ÇÊûú‰ΩÝÊ≠£Âú®Êü•ÈòÖÊñáÊ°£Ôºå‰ΩÝÂèØËÉΩ‰ºöÂèëÁé∞Á±ª‰ººËøôÊÝ∑ÁöÑÂÜÖÂÆπÔºà`print()`\
    \ ÁöÑÊñáÊ°£ÔºâÔºö\n\n```\nprint(*objects, sep=' ', end='\\n', file=sys.stdout, flush=False)\n\
    ```\n\nÊöÇÊó∂ÂøΩÁï• `*objects`ÔºåÁúãÁúãÊâÄÊúâËøô‰∫õÂÖ≥ÈîÆÂ≠óÂèÇÊï∞‚Ä¶‚Ä¶Âú®ÊñáÊ°£‰∏≠ÔºåÂÆÉ‰ª¨Êúâ `=` ÂêéË∑ü‰∏Ä‰∫õÂÄº„ÄÇËøôË°®Á§∫Â¶ÇÊûú‰ΩÝÊ≤°ÊúâÊåáÂÆöÔºåÂàô‰ΩøÁî®*ÈªòËÆ§*ÂÄº„ÄÇÊç¢Âè•ËØùËØ¥ÔºåÂÆÉ‰ª¨ÊòØÂèØÈÄâÁöÑÂÖ≥ÈîÆÂ≠óÂèÇÊï∞„ÄÇ\n\
    \n‰ΩÝÂèØ‰ª•ÁúãÂà∞ `print()` ‰ª•Êç¢Ë°åÁ¨¶ `\\n` ÁªìÊùüÊØè‰∏ÄË°åÔºåÈô§ÈùûÊàë‰ª¨ÂëäËØâÂÆÉÁî®ÂÖ∂‰ªñÂ≠óÁ¨¶‰∏≤ÁªìÊùüËØ•Ë°å„ÄÇ\n\nÁõÆÂâçÔºåÁü•ÈÅìËøô‰∫õÂ≠òÂú®‰ª•ÂèäÂ¶Ç‰ΩïË∞ÉÁî®ÂÆÉ‰ª¨Â∞±Ë∂≥Â§ü‰∫Ü„ÄÇÁ®çÂêéÔºåÊàë‰ª¨Â∞ÜËÆ®ËÆ∫Â¶Ç‰ΩïÁºñÂÜôÊàë‰ª¨Ëá™Â∑±ÁöÑ„ÄÇ\n\
    \n## 10.10 ÊèíÊõ≤ÔºöÊ±ÇÂÄºÁ≠ñÁï•\n\nÂ¶ÇÊûú‰ΩÝ‰∏çÊÉ≥ÈòÖËØªÊú¨ËäÇÔºåÂèØ‰ª•Ë∑≥Ëøá„ÄÇ‰ΩÜÈòÖËØªÂÆÉ‰ºöÊõ¥ÊúâË∂£„ÄÇ\n\n‰∏çÂêåÁöÑËØ≠Ë®ÄÂú®ÂêëÂáΩÊï∞‰ºÝÈÄíÂèÇÊï∞Êó∂Êúâ‰∏çÂêåÁöÑË°å‰∏∫„ÄÇ\n\nÊúâ‰∫õËØ≠Ë®Ä‰ºöÂ§çÂà∂ÂÄº„ÄÇÊúâ‰∫õËØ≠Ë®ÄÂè™ÊòØËÆ©ÂèÇÊï∞ÂêçÊàê‰∏∫ÂÆûÂèÇÂêçÁöÑÂà´Âêç„ÄÇÊúâ‰∫õËØ≠Ë®ÄÈÄöËøáÊüê‰∫õÂÖ≥ÈîÆÂ≠óÁªô‰ΩÝÈÄâÊã©ÊùÉ„ÄÇ\n\
    \nÁºñÁ®ãËØ≠Ë®ÄÂ¶Ç‰ΩïÂÅöÂà∞Ëøô‰∏ÄÁÇπË¢´Áß∞‰∏∫ÂÆÉÁöÑ*Ê±ÇÂÄºÁ≠ñÁï•*<sup>7</sup>„ÄÇ\n\n‰∏âÁßçÈùûÂ∏∏Â∏∏ËßÅÁöÑÁ≠ñÁï•ÊòØÔºö\n\n- **ÊåâÂÖ±‰∫´Ë∞ÉÁî®**ÔºöËøôÊòØ Python\
