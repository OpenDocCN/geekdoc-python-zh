    # 11.15 Summary


    All kinds of goodies in this chapter! We dipped our toes in the magical world
    of classes and objects, which is the beginning of learning the world-famous Object-Oriented
    Programming (OOP).

    We saw how we could concisely bundle data and functionality into a single convenient
    class and the make objects from the class, using the class as a blueprint.

    And, importantly, we learned that multiple variables can refer to the same object‚Äîthat
    objects are *not* copied when you make an assignment.

    Finally, we touched on the idea that None could be used to indicate ‚Äúabsence of
    an object‚Äù.

    Though objects and classes form the basis for OOP, we really haven‚Äôt touched on
    what that means yet. But that‚Äôs a story for another chapter.'
