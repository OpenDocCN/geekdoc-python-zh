    We've already seen how to initialize a list with a few elements in it:\n\n```\n\
    a = [11, 55, 33, 99]\n```\n\nYou can multiply a list by a constant value to get\
    \ a new list repeated that many times.\nWhat?\nEasier demonstrated:\n\n```\na\
