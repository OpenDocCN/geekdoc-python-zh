  md: '# Chapter 13. Reading Files


    Looking at the documentation, there is an append() method for lists, but it only
    appends onto the end of the list.


    We want ours to be able to do that, but also to be able to put those lines in
    the middle, or at the top.


    Let''s keep looking down the documentation.


    There''s insert() to put an object *before* an index. This seems to work for the
    beginning and the middle, but what about appending to the end? Do we have to use
    the append() method in that special case?


    The docs aren''t entirely clear on the matter. Let''s bring up the REPL and try
    some tests.


    I''ll make a list and then try to insert() values in various places.


    First, let''s try inserting before element 0, which should insert at the beginning:


    ```

    >>> a = [11, 22, 33]

    >>> a.insert(0, 99)

    >>> a

    [99, 11, 22, 33]

    ```


    Great! The 99 went in first, just like I wanted.


    Let''s insert another number before index 2:


    ```

    >>> a.insert(2, 999)

    >>> a

    [99, 11, 999, 22, 33]

    ```


    That worked, too.


    Now, the list only has up to element index 4... but let''s go out on a limb and
    try inserting before index 5 (which doesn''t exist) and see if that appends on
    the end:


    ```

    >>> a.insert(5, 9999)

    >>> a

    [99, 11, 999, 22, 33, 9999]

    ```


    Yes! It worked! We don''t have to special-case a call to append().


    It is a little weird, but if you put *any* index past the last one in for append,
    it''ll put the value at the end of the list.


    If we make a small list and try to insert the value 3490 at index 99, it just
    puts it at the end:


    ```

    >>> a = [1, 2, 3]

    >>> a.insert(99, 3490)

    >>> a

    [1, 2, 3, 3490]

    ```


    This kind of experimentation to see what works and what doesn''t is really common,
    and is a great way to explore and learn how the system works.


    Ok, so we:


    +   - Get the line number to append after. Remember that we want this to be zero-based,
    so we''ll subtract 1 from whatever they enter. If they enter "2", that means that
    we want to insert *after* index 1.

    - But since the insert() method inserts *before* a line, not after, we''d better
    add one to the line index so that we append after that line.

    - Then we loop until the user enters a period, inputting a line and inserting
    it into the list in the right place.


    Now, you might wonder why bother subtracting one just so we could add one right
    after?


    And you''re right‚Äîit does nothing. We don''t have to do that.'
