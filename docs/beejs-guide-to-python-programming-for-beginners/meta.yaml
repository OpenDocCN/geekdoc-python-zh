    y = x

    ```


    Something interesting happens here that I want you to make note of. It‚Äôs not going
    to be super useful right now, but it will be later when we get to more intermediate
    types of data.


    When you do this, both x and y refer to the same 1000.


    That‚Äôs a weird sentence.


    But think of it this way. Somewhere in the computer memory is the value 1000.
    And both x and y refer to that single value.


    If you do this:


    ```

    x = 1000

    y = 1000

    ```


    Now there are two 1000 values. x points to one, and y points to the other.


    Finally, adding on to the original example:


    ```

    x = 1000

    y = x

    y = 1000

    ```


    What happens there is that first there is one 1000, and x refers to it.


    Then we assign x into y, and now both x and y refer to the same 1000.


    But then we assign a *different* 1000 to y, so now there are two 1000s, referred
    to by x and y, respectively.


    (The details of this are rather more nuanced than I‚Äôve mentioned here. See Appendix
    C if you‚Äôre crazy enough.)


    Takeaway: variables are just names for items in memory. You can assign from one
    variable to another and have them both point to the same item.


