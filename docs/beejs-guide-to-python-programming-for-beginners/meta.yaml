    \ `IOError` ÁöÑÂºÇÂ∏∏ÂàóË°®„ÄÇ\n\n## 14.10 ÊçïËé∑ÊâÄÊúâÂºÇÂ∏∏\n\n‰∏Ä‰∏™‰∏çÊåáÂÆöÁâπÂÆöÂºÇÂ∏∏ÁöÑ `catch` ËØ≠Âè•Â∞ÜÊçïËé∑*ÊâÄÊúâ*ÂÖàÂâçÊú™ÊçïËé∑ÁöÑÂºÇÂ∏∏„ÄÇ\n\
    \nÂõÝÊ≠§Ôºå‰∏Ä‰∏™Á©∫ÁöÑ `catch` ÁªùÂØπÂ∫îËØ•ÊîæÂú®ÊúÄÂêéÔºåÂú®ÊâÄÊúâÂÖ∂‰ªñ `catch` ‰πãÂêé„ÄÇPython ‰ºöÂú®Á¨¨‰∏Ä‰∏™ÂåπÈÖçÁöÑ `catch` Â§ÑÂÅúÊ≠¢ÔºåÂç≥‰ΩøÂÆÉÊòØ‰∏Ä‰∏™‚ÄúÊçïËé∑ÊâÄÊúâ‚ÄùÁöÑËØ≠Âè•„ÄÇ\n\
    \nÂΩì‰ΩÝÂú®‰ªª‰Ωï `catch` ‰∏≠Êó∂Ôºå‰ΩÝÂèØ‰ª•Êü•ÁúãÂÜÖÁΩÆÂáΩÊï∞ `sys.exc_info()` ÁöÑÁªìÊûú„ÄÇËøô‰∏™ÂáΩÊï∞ËøîÂõû‰∏Ä‰∏™ÂÖÉÁªÑÔºàÂ¶ÇÊûú‰ΩÝ‰∏çÁÜüÊÇâÂÖÉÁªÑÔºåÁé∞Âú®ÂèØ‰ª•ÊääÂÆÉÊÉ≥Êàê‚ÄúÂàóË°®‚ÄùÔºâÔºåÂåÖÂê´‰∏âÈÉ®ÂàÜ‰ø°ÊÅØÔºöÂºÇÂ∏∏ÁöÑÁ±ªÂûã„ÄÅÂØπÂºÇÂ∏∏Êú¨Ë∫´ÁöÑÂºïÁî®Âíå‰∏Ä‰∏™ÂõûÊ∫Ø¬≥„ÄÇ\n\
    \nËÆ©Êàë‰ª¨‰øÆÊîπÊàë‰ª¨ÁöÑÈô§Ê≥ïÁ®ãÂ∫è‰ª•ÊçïËé∑ÊâÄÊúâÂºÇÂ∏∏Âπ∂ÊâìÂç∞Âá∫ÂºÇÂ∏∏‰ø°ÊÅØÔºö\n\n```\nimport sys\n\ntry:\n    x, y = input('Enter\
