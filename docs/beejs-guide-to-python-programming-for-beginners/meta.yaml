  - "[PAGE 78]\n\n# 9.8 Common Built-in Dictionary Functionality\n\nProblem-solving\
    \ step: **Understanding the Problem.**\n\nYou have a number of tools in your toolkit\
    \ for working with dicts in Python:\n\n| Method | Description |\n|---|---|\n|\
    \ .clear() | Empty a dictionary, removing all keys/values |\n| .copy() | Return\
    \ a copy of a dictionary |\n| .get(key) | Get a value from a dictionary, with\
    \ a default if it doesn't exist |\n| .items() | Return a list-ish of the (key,\
    \ value) pairs in the dictionary |\n| .keys() | Return a list-ish of the keys\
    \ in the dictionary |\n| .values() | Return a list-ish of the values in the dictionary\
    \ |\n| .pop(key) | Return the value for the given key, and remove it from the\
    \ dictionary |\n| .popitem() | Pop and return the most-recently-added (key, value)\
    \ pair |\n\nWe already saw use of .get(), earlier, but it can also be modified\
    \ to return a default value if the key doesn't exist in the dictionary.\n\n```\n\
    d = {\n    \"c\": 10,\n    \"b\": 20,\n    \"a\": 30\n}\n\nv = d.get(\"x\", -99)\
    \  # Return -99 if key doesn't exist\n\nprint(v)  # Prints -99, since key `x`\
    \ doesn't exist\n```\n\nWe've already seen a use of .items(), above. If you want\
    \ to see just all the keys or values, you can get an iterable back with the .keys()\
    \ and .values():\n\n```\nd = {\n    \"c\": 10,\n    \"b\": 20,\n    \"a\": 30\n\
    }\n\nfor k in d.keys():\n    print(k)  # Prints \"c\", \"b\", \"a\"\n\nfor v in\
    \ d.values():\n    print(v)  # Prints 10, 20, 30\n```\n\n# 9.9 Dictionary Comprehensions\n\
    \nProblem-solving step: **Understanding the Problem.**\n\nRemember list comprehensions?\
    \ If you don't, pop over there for a quick refresher, because this is the same\
    \ thing except for dictionaries.\n\nYou can create a dictionary from any iterable\
    \ that you can go over in a for loop. This is a pretty powerful way of creating\
    \ a dictionary if you have the data in another, iterable, form, like a list or\
    \ an input stream of something.\n\nLet's go through a list and store the list\
    \ value as the key, and the list value times 10 as the value in the dictionary.\
    \ And let's ignore the number 20 in the list, just for fun."
  - "[PAGE 79]\n\n```\na = [10, 20, 30]\nd = { x: x*10 for x in a if x != 20 }\n\n\
    print(d)  # {10: 100, 30: 300}\n```\n\nIf you have a list of key/value pairs,\
    \ you can read those into a dictionary pretty easily, too.\n\n```\na = [[\"alice\"\
    , 20], [\"beej\", 30], [\"chris\", 40]]\nd = { k: v for k, v in a }\n\nprint(d)\
    \ # {'alice': 20, 'beej': 30, 'chris': 40}\n```\n\n# 9.10 Dictionaries of Dictionaries\n\
    \nProblem-solving step: **Understanding the Problem.**\nHere‚Äôs the deal: the value\
    \ that you store for a given key can be *anything*!\nWell, not like a whale, or\
    \ Mars, but any data type. So you can store strings, ints, floats, lists, or even\
    \ other dictionaries as the value for the dictionary key!\nCheck out this *nested\
    \ declaration*, and check out how we drill down through the dictionary layers\
    \ to get to the data:\n\n```\nd = {\n    \"a\": {\n        \"b\": \"Mars! Ha!\"\
    \n    }\n}\n\nprint(d)            # {'a': {'b': 'Mars! Ha!'}}\nprint(d[\"a\"])\
    \       # {'b': 'Mars! Ha!'}\nprint(d[\"a\"][\"b\"]) # Mars! Ha!\n```\n\nNesting\
    \ dictionaries like this can be a really powerful method of storing data.\n\n\
    # 9.11 Dictionaries are Mutable\n\nProblem-solving step: **Understanding the Problem.**\n\
    When you make an assignment copy of a dictionary, it‚Äôs copying the *reference*\
    \ to the same dictionary, not making a new one. Just like with *lists* and anything\
    \ else.\nAnd this is important, because dictionaries are mutable, just like lists.\n\
    \n```\nd = { \"beej\": 3490 }\n\ne = d  # both e and d refer to the same dict!\n\
    \ne[\"beej\"] = 3491  # modify it\n\nprint(d[\"beej\"])  # 3491\n```\n\nIf you\
    \ want to make a copy of a dictionary use one of the following:\n\n```\nd = {\
    \ \"beej\": 3490 }\n\ne = d.copy()  # make a copy, the preferred way\ne = dict(d)\
    \   # make a copy\n```\n\nThat first way is preferred because it‚Äôs easier to read,\
    \ and easy to read code is *Happy Code‚Ñ¢*."
  - "[PAGE 80]\n\nChapter 9. Dictionaries\n\n75\n\n# 9.12 The Chapter Project\n\n\
    Pop back up top and refresh on the spec if you need to. Let‚Äôs break it down!\n\
    \nProblem-solving step: **Understanding the Problem.**\n\nThe goal of the project\
    \ is to, for a given person, print out their parents‚Äô names as well as their year\
    \ of birth.\n\nPretty straightforward, but the devil‚Äôs in the details!\n\nProblem-solving\
    \ step: **Devising a Plan.**\n\nIf we look at a sample record, we can see that\
    \ a dict lends itself quite well to the data, with keys born, mother, siblings,\
    \ etc.\n\n```\nBeej Jorgensen:\n    Born: 1990 [yes, I'm 29, is my story I'm sticking\
    \ to]\n    Mother: Mom Jorgensen\n    Father: Dad Jorgensen\n    Siblings: [Brother\
    \ Jorgensen, Sister Jorgensen, Little Sister Jorgensen]\n```\n\nNot only that,\
    \ but we can store all of *those* dicts in another container dict which uses the\
    \ person‚Äôs name as the key!\n\n```\ntree = { # Outer dict holds records for all\
    \ the people\n    \"Beej Jorgensen: { # Inner dict holds details for each person\n\
    \        \"born\": 1990,\n        \"mother\": \"Mom Jorgensen\",\n        \"father\"\
    : \"Dad Jorgensen\",\n        \"siblings\": [\n            \"Brother Jorgensen\"\
    ,\n            \"Sister Jorgensen\",\n            \"Little Sister Jorgensen\"\n\
    \        ]\n    }\n}\n```\n\nSo that looks like a reasonable approach to storing\
    \ data. We can just add the other people to the dictionary at that outermost layer.\n\
    \nNot only that, but we now have part of the problem solved. If the user enters\
    \ ‚ÄúBeej Jorgensen‚Äù, all we have to do is look that directly up in the outer dict,\
    \ and then we can print out my parents‚Äô names!\n\nOf course, we‚Äôre still missing\
    \ out on printing their birth years, but let‚Äôs tackle the smaller problem first,\
    \ and *then* figure out how to extract that missing data.\n\nWe‚Äôll come back to\
    \ the ‚ÄúUnderstanding the Problem‚Äù step in a while to revisit that.\n\nProblem-solving\
    \ step: **Carrying out the Plan**\n\nWe‚Äôll start with a simple tree of just a\
    \ single person. Let‚Äôs keep it as simple as possible, and then go from there.\n\
    \n```\n1  tree = {\n2      \"Beej Jorgensen\": {\n3          \"born\": 1990,\n\
    4          \"mother\": \"Mom Jorgensen\",\n5          \"father\": \"Dad Jorgensen\"\
    ,\n6          \"siblings\": [\n7              \"Brother Jorgensen\",\n8      \
    \        \"Sister Jorgensen\",\n9              \"Little Sister Jorgensen\"\n10\
    \         ]\n11     }\n12 }\n```"
  - "[PAGE 81]\n\n}\n\nAnd now let‚Äôs add some code to get the person‚Äôs name, or quit\
    \ if they enter ‚Äúq‚Äù:\n\n```\ndone = False\n\nwhile not done:\n    name = input(\"\
    Enter a name (or q to quit): \")\n\n    if name == \"q\":\n        done = True\n\
    \        continue  # Jump back to the top of the loop\n```\n\nAnd, finally, let‚Äôs\
    \ print out the person‚Äôs name and their parents‚Äô names:\n\n```\nrecord = tree[name]\
    \  # Look up the record in the outer dict\n\nmother_name = record[\"mother\"]\
    \  # Extract parent names from inner dict\nfather_name = record[\"father\"]\n\n\
    print(\"Parents:\")\nprint(f'    {mother_name}')\nprint(f'    {father_name}')\n\
    ```\n\nGiving this a run, we get some good output!\n\n```\n$ python3 familytree.py\n\
    Enter a name (or q to quit): Beej Jorgensen\nParents:\n    Mom Jorgensen\n   \
    \ Dad Jorgensen\nEnter a name (or q to quit): q\n```\n\nWe‚Äôre still missing the\
    \ parents‚Äô birth years, but, as I said, we‚Äôll tackle that later.\n\nWhat happens\
    \ if we run it with an unknown name? Remember that when you‚Äôre testing your code,\
    \ you should think like a villain and enter the most unexpected things you can.\n\
    \nLet‚Äôs try it with someone it doesn‚Äôt know.\n\n```\n$ python3 familytree.py\n\
    Enter a name (or q to quit): Arch Stanton\nTraceback (most recent call last):\n\
    \  File \"familytree.py\", line 23, in <module>\n    record = tree[name]  # Look\
    \ up the record in the outer dict\nKeyError: 'Arch Stanton'\n```\n\nWell, that‚Äôs\
    \ ugly. It would be much nicer to print out some kind of error message.\n\nWhat\
    \ does the spec say we should do?\n\n‚Ä¶nothing! It says nothing about this case!\
    \ That‚Äôs not useful! The spec is missing information!\n\nTrue, it is.\n\nTurns\
    \ out, this is a really common thing when programming. Your boss asks you to implement\
    \ a thing but doesn‚Äôt fully define what that thing is. It‚Äôs not that your boss\
    \ is bad at this; it‚Äôs just that writing down the exact spec and not leaving anything\
    \ out is *hard*.\n\nI promise you that if I asked you to write out the rules to\
    \ Tic-Tac-Toe‚Å∑, I‚Äôd find something you left out. (‚ÄúYou never said my ‚ÄòX‚Äô could\
    \ only take up one grid square!‚Äù)\n\n‚Å∑That‚Äôs Noughts and Crosses, to some of you."
