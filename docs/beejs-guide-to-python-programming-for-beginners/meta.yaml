    # ## Intro


    *This is an alpha-quality book. There are mistakes, oh yes. When you find them,
    please drop an issue in GitHub, or a pull request, or email me at beej@beej.us.
    When the number of defects gets low enough, I‚Äôll offer a print version.*


    Hey, everyone! Have you been thinking about learning to program? Have you also
    been thinking of how to do it in the easy-to-approach Python programming language?


    Yes? Then this is the book for you. We‚Äôre going to start with the absolute basics
    and build up from there, building up to being an intermediate developer and problem-solver!
    Python is the language we‚Äôll be using to make this happen.


    But by the end of the book, you will have developed programming techniques that
    *transcend* languages. After picking up Python, maybe try another language like
    JavaScript, Go, or Rust. They all have their own features to explore and learn.


    # ### 1.1 Audience


    Beginning programmers. If you have limited experience or no experience, this book
    is targeted at you!


    Attitude Prerequisite: be inquisitive, curious, have an eye for puzzles and problem
    solving, and be willing to take on difficult challenges.


    Technical Prerequisite: be a computer user. You know what files are, how to move
    them and delete them, what subdirectories (folders) are, can install software,
    and how to type.


    Are you a seasoned developer looking to start with Python? I‚Äôm sorry but this
    is not likely to be the book you‚Äôre looking for. It will progress too slowly for
    your tastes. Just jump straight into the official Python documentation¬π.


    # ### 1.2 Platform and Tools


    I make an effort in this book to cover Mac, Windows, and Unix variants (via Arch
    Linux).


    We‚Äôll cover installing Python 3 and the Visual Studio Code editor. (Both are free.)
    If you already have a code editor you prefer using (Vim, Emacs, Sublime, Atom,
    PyCharm, etc.) feel free to use that. This book‚Äôs 100% certified editor agnostic!


