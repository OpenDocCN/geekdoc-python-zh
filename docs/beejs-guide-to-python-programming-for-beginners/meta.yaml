    3. Build out the handler function\n4. Repeat\n\nWhat‚Äôs the next simplest thing\
    \ to work on? How about ‚Äúdelete a line‚Äù?\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nSo we want to delete a single line. This is as easy as removing\
