  md: '# 17.3 Python Compiler Optimizations


    If you take this example from the REPL, above:


    ```

    >>> s = "Beej!"

    >>> t = "Beej!"

    >>> s is t

    False

    ```


    and you put it in a python program, like `test.py`:


    ```

    s = "Beej!"

    t = "Beej!"

    print(s is t)

    ```


    and run it from the command line, you''d think you''d get `False`, just like in
    the REPL. Wrong!


    ```

    $ python test.py

    True

    ```


    What gives? Why is it `False` in the first case and `True` in the second? Well,
    in the latter case, the Python interpreter is getting a little clever. Before
    it even runs your code, it analyzes it. It sees that you have two "Beej!" strings
    in there, so it just makes them the same one to save you memory. Since strings
    are immutable, you can''t tell the difference.


    # 17.4 Internment


    In that same example, above:


    ```

    >>> s = "Beej!"

    >>> t = "Beej!"

    >>> s is t

    False

    ```


    what if we use a different string, like "Alice"?


    ```

    >>> s = "Alice"

    >>> t = "Alice"

    >>> s is t

    True

    ```


    True?? What''s up with that? Why does Alice get special treatment?


    Or look at this:


    ```

    >>> x = 257

    >>> y = 257

    >>> x is y

    False

    ```


    which is fine‚Äîbut then check this out, with 256 instead of 257:


    ```

    >>> x = 256

    >>> y = 256

    >>> x is y

    True

    ```


    True, again?


    We''re getting into a deep language feature of Python called *internment*. Basically
    Python makes sure to only have one copy in memory of certain, specific values
    of data.


    For these values, all variables will refer to the same item in memory.


    They are:


    +   - Integers between -5 and 256 inclusive.'
