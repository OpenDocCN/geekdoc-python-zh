  - '[PAGE 94]


    - **Call by Reference**: the parameter effectively becomes an alias for the variable
    name passed in as the argument. Anything you do to the parameter you effectively
    do to the argument, including assigning it some other value. Example languages
    Fortran<sup>9</sup>, C++<sup>10</sup> (usually by value, but can be made by reference).
    (Sometimes people say Python uses Call by Reference, but this is technically not
    accurate since you can‚Äôt assign new values to parameters and see that reflected
    in the argument.)


    Here‚Äôs a quick summary between them.


    Note: In the following table, ‚ÄúCan modify item in caller‚Äù means that if you have
    a variable in the caller that refers to a thing, changes to the thing in the function
    will be reflected in the caller‚Äôs variable.


    ‚ÄúParameter reassignment affects caller‚Äù means that if you assign into a parameter
    variable (i.e. change the parameter to refer to a completely different thing)
    the argument variable will also change.


    | | Can modify item in caller | Parameter reassignment affects caller |

    |---|---|---|

    | **Call by Sharing** | Yes | No |

    | **Call by Value** | No | No |

    | **Call by Reference** | Yes | Yes |


    Now, I‚Äôve seen people be fast and loose with these descriptions when it comes
    to Python, so don‚Äôt hold them to it. In my opinion, from the above three items,
    Call by Sharing is the most accurate. Call by Reference is the second-most.


    # 10.11 The Chapter Project


    Problem-solving step: **Understanding the Problem**


    It‚Äôs that time! If you need a refresher, pop back up to the top and check out
    the spec.


    So we want to do a couple of things:


    +   1. Read in a list of starship positions.

    2. Print out a grid of distances between each ship.


    The positions are entered as X, Y, Z coordinates (until the user enters ‚Äúdone‚Äù).


    The distances are computed with the distance formula variation of the Pythagorean
    Theorem.


    A grid of distances is printed. There should be ship numbers along the axes.


    Problem-solving step: **Devising a Plan**


    We already have a bit of a plan, don‚Äôt we? We listed it right up there.


    +   1. Read in a list of starship positions.

    2. Print out a grid of distances between each ship.


    Don‚Äôt look now, but these would make a great couple of functions. Sure, we *could*
    stick them all in one big main routine, but it‚Äôs way more logical and easier to
    read if we make them their own functions.


    We could have one function read the list of positions and return it.


    And we could take that returned list and pass it into another function to print
    the grid.


    ```

    locations = get_ship_locations()

    print_grid(locations)

    ```


    We‚Äôre taking a _top-down_ approach, here. Starting with the big pieces of logic
    and then implementing them as we go down.


    In fact, let‚Äôs simplify the problem, and just start like this:'
