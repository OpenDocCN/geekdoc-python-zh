    \ [1, 99, 3]\n```\n\n- **ÊåâÂÄºË∞ÉÁî®**ÔºöÂàõÂª∫ÂÆûÂèÇÁöÑ*ÂâØÊú¨*Âπ∂Â≠òÂÇ®Âú®ÂèÇÊï∞‰∏≠„ÄÇC ÁºñÁ®ãËØ≠Ë®Ä<sup>8</sup>Á≠â‰ΩøÁî®ËøôÁßçÊñπÂºè„ÄÇÔºàÊúâÊó∂‰∫∫‰ª¨ËØ¥\
