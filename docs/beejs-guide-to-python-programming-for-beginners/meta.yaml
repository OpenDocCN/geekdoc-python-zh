  md: "Chapter 9. Dictionaries\n\n70\n\nWe want to write an app that will allow you\
    \ to print out the birthdays of the parents of any given person.\n\nExample:\n\
    \n```\nEnter a name (or q to quit): Beej Jorgensen\nParents:\n    Mom Jorgensen\
    \ (1970)\n    Dad Jorgensen (1965)\n```\n\nSo we'll need some way to store that,\
    \ and some way to look through the data to get information about other people\
    \ who are referenced.\n\nYes, we could use lists of people and just search through,\
    \ but there's a less clunky way we might go about doing this.\n\nThis chapter\
    \ is all about how we might store such data.\n\n# 9.3 What are Dictionaries?\n\
    \nProblem-solving step: **Understanding the Problem.**\n\nRemember how with lists,\
    \ we could key an index number into the list and get a value out, and how we could\
    \ use that same index number to store something in that \"slot\"?\n\nWas really\
    \ convenient for storing collections of information that you could index by number,\
    \ right?\n\nWell, what if you wanted to refer to a slot with something that *wasn't*\
    \ a number? What if you wanted to use, say, a string, like so?\n\n```\nx = [1,\
    \ 2, 3]\n\nx[\"beej\"] = 3490  # Not going to work with a list\n```\n\nThat makes\
    \ Python unhappy because \"beej\" isn't an integer. And with lists, it wants integers.\n\
    \nBut we can get around that limitation with *dictionaries*, or *dicts* for short.\n\
    \nDeclaring a dictionary is a little bit different, but here's a simple example\
    \ to start:\n\n```\nd = {}  # Squirrelly braces, not square brackets!\n\nd[\"\
    beej\"] = 3490\n\nprint(d[\"beej\"])  # 3490\n```\n\nSo very similar in usage,\
    \ though the initial declaration of the variable is different than a list.\n\n\
    With dicts, the value in the square brackets is called the *key*, and the value\
    \ stored there is the *value*.\n\n```\n#    key          value\n#     |      \
    \      |\n#  --+--        ---+---\nd[\"goats\"] = \"awesome\"\n```\n\nYou use\
    \ the key to lookup a value in the dictionary, or to set a value in the dictionary.\n\
    \nThe key can be any immutable type (e.g. integers, floats, strings). The value\
    \ can be any type.\n\n# 9.4 Initializing a Dictionary\n\nProblem-solving step:\
    \ **Understanding the Problem.**\n\nAs we saw above, you can initialize an empty\
    \ dictionary like so:\n\n```\nd = {}\n```"
  merge: -1
