    \nProblem-solving step: **Devising a Plan.**\n\nLet‚Äôs break this program into\
    \ two parts, and tackle them individually.\n\n1. We want to get some valid user\
    \ input in the range 5-50, inclusive.\n2. We want to print out some # and xs based\
    \ on the input.\n\nBy *breaking down the problem*, we make it more approachable.\
    \ We can even break down step 1 into more:\n\n```\nWhile user input isn't valid:\n\
    \    Ask the user for input\n    If input invalid, print an error message\n```\n\
    \nDon‚Äôt look now, but our ‚Äúplan‚Äù is looking like really good pseudocode at this\
    \ point.\n\nLet‚Äôs go ahead and code up the user input portion. We‚Äôll do printing\
    \ asterisks later.\n\nProblem-solving step: **Carrying out the Plan.**\n\nAsking\
    \ the user for input, we already know.\n\nBut how do we ask them repeatedly until\
    \ they enter something valid? We need to loop! How about looping while the input\
    \ is invalid? Sure!\n\n```python\n1  input_valid = False  # Assume it's invalid\
    \ to start\n2\n3  while not input_valid:   # While not input valid (\"while input\
    \ invalid\")\n4      x = input(\"Enter a number, 5-50 inclusive: \")\n5      x\
    \ = int(x)\n6\n7      if x >= 5 and x <= 50:\n8          input_valid = True  \
    \ # We got a good number!\n```\n\nLet's study that pattern because it's a common\
    \ use of while.\nWe start by assuming that the success condition isn't met. And\
    \ then we check every iteration of the loop, with if, to see if it is met. And\
    \ we loop while the success condition is not true.\nNow, we're also supposed to\
    \ print an error if the input is out of range. How? We can do it in two lines.\n\
    If the if condition is True, then we have good input. Otherwise we have bad input\
    \ and should print a message... if... else!\n\n(Note: the code below is a continuation\
    \ of the program, above. Pay attention to the line numbers!)\n\n```python\n7 \
    \     if x >= 5 and x <= 50:\n8          input_valid = True   # We got a good\
    \ number!\n9      else:\n10         print(\"The number must be between 5 and 50,\
    \ inclusive!\")\n11\n```\n\nIf you haven't already, code that up and run it. No,\
    \ it's not the complete program, but it's the complete first step of the program,\
    \ and we can test it before moving on just to be confident that this part works.\n\
    Run it and try it with some numbers. If you enter an invalid number, it should\
    \ tell you so and ask again. If you enter a valid number, input_valid becomes\
    \ True and the while loop exits (because the continuation condition is not input_valid).\n\
    Once you're satisfied it's working correctly, let's move back to the spec and\
    \ concentrate on printing out the asterisks.\n\nProblem-solving step: **Devising\
    \ a Plan.**\nIf the user enters x, we want to print out x count of characters,\
    \ total. The first 30 of these will be #, and any after that will be *.\nBefore\
    \ we start things out, let's use a different planning technique: *simplify the\
    \ problem*.\nLet's forget about the * for now and just print out # characters,\
    \ however many the user-specified. Later we'll add the code for *.\n\n> Simplifying\
    \ the problem allows you to more easily tackle it, and leads you to see ways to\
    \ add the missing features later.\n\nThe plan for this simplified phase isn't\
    \ that tough:\nFor however many numbers the user inputs:\nPrint a `#`.\n\nProblem-solving\
    \ step: **Carrying out the Plan.**\nSince we know how many #s we want to print\
    \ (the user entered the number!) this would be a great place for a for loop. Let's\
    \ print those:\n\n```python\n12 # Print the line\n13 for i in range(x):\n14  \
    \   print(\"#\")\n```\n\nRun it! How did it do?\n\nHmmm. Looks like it's printing\
    \ a hash on each line. The `print()` function puts a *newline* at the end of the\
    \ line. We need to override that behavior, and there's an easy way to do it.\n\
    \n```python\n# Print the line\nfor i in range(x):\n    print(\"#\", end=\"\")\
    \  # Set the end-of-line character to nothing\n\nprint()  # Add a newline to the\
    \ end of the line\n```\n\nWe did a bit of magic there. We passed another argument\
    \ to `print()` that told it we wanted it to put nothing (an empty string, \"\"\
    ) at the end of the line instead of the newline character it normally tacks on.\n\
    \nYou could go crazy and say `end=\"Beej\"` and it would put the word \"Beej\"\
    \ after every hashmark. Do it. Go crazy.\n\nGetting there! But we're not out of\
    \ the woods yet. We need to make it so that for character more than 30 characters\
    \ out, we print a `*` instead of a `#`.\n\nProblem-solving step: **Devising a\
    \ Plan.**\n\nThis is like the plan for printing the line from before, but we simplified\
    \ that, remember? So we have to add some complexity to meet the spec.\n\n```\n\
    For however many numbers the user inputs:\n    If we're at the 30th character\
    \ or earlier:\n        Print a `#`.\n    Otherwise:\n        Print a `*`.\n```\n\
    \nAnd that's looking like a good case for *if* inside our *for* loop!\n\nProblem-solving\
    \ step: **Carrying out the Plan.**\n\nLet's add that *if* logic to the *for* loop\
    \ at the end:\n\n```python\n# Print the line\nfor i in range(x):\n    if i < 30:\n\
    \        print(\"#\", end=\"\")  # Set the end-of-line character to nothing\n\
    \    else:\n        print(\"*\", end=\"\")\n\nprint()  # Add a newline to the\
    \ end of the line\n```\n\nThere's something here to note that's subtle and important:\n\
    \n- If the user enters 40, the value of `i` runs from 0 to 39, because the body\
    \ of the *for* loop does not execute when `i` reaches its maximum value.\n- But\
    \ 0 to 39 is still 40 iterations, right? Just like 0,1,2,3 is a total of 4 iterations.\
    \ So we're still getting all 40 characters even though the counter is running\
    \ from 0 to 39.\n- However, since the counter is running from 0, that means the\
    \ highest character that will be a `#` occurs when `i` is 29, not when `i` is\
    \ 30. This is why we test `i < 30` and not `i < 31`.\n\nBut there we have it!\n\
    \nBe sure to test with the *edge cases*. These are inputs that are at the edges\
    \ of conditions in your program.\n\nFor example, we have conditions testing input\
    \ against 5 and 50. So test with 4, 5, 50, and 51, both sides of those conditions.\n\
    \nWhere else do we have an edge case in the code? That right: the *if* when printing.\
    \ The first 30 are supposed to be `#` with `*` after that. So test with 30 and\
    \ make sure it's all `#`s, and then test with 31 and make sure there's a single\
    \ `*`.\n\n*Testing the edge cases* is an all-powerful programming technique that\
    \ all devs use to great effect.\n\n6We could have also tested `i <= 29`.\n\nAnd,\
    \ while you‚Äôre at it, test a bunch of other numbers to make sure it behaves as\
    \ you‚Äôd expect.\n\n**Bonus Question:** Can you think of another way to draw the\
    \ line of characters without using an `if` inside the loop? (There‚Äôs a hint at\
    \ this footnote<sup>7</sup>.) *Coding is creative!* There‚Äôs more than one way\
    \ to do these things. Try them and see which you like better.\n\n(Solution<sup>8</sup>.)\n\
    \n### 6.11 Exercises\n\n**Remember: to get your value out of this book, you have\
    \ to do these exercises.** After 20 minutes of being stuck on a problem, you‚Äôre\
