    \ meant 1.\n- Start looping from that number, printing out 10 lines.\n- If we\
    \ hit the last line, stop printing.\n\nSince we have all these different kinds\
    \ of functionality, let‚Äôs put them in individual functions to keep the code well\
    \ organized.\n\nWe‚Äôll make a `handle_list()` function that is called when the\
    \ user asks to list the file. It‚Äôll take a couple of arguments: the arguments\
    \ the user typed after a command, as well as the list of lines we‚Äôre going to\
    \ manipulate.\n\nProblem-solving step: **Carrying Out the Plan**\n\nFirstly, let‚Äôs\
    \ check and see if the user wants to list lines by checking to see if the first\
