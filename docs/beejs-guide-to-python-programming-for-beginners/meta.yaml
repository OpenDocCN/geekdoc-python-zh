    # 7.8 Getting Individual Characters From Strings


    Problem-solving step: **Understanding the Problem.**


    What if we want to extract a single character from a string?


    We can do it, but we have to introduce new notation to allow it: [ and ], AKA
    *square brackets*.


    Let''s print out just the first two characters in a string:


    ```

    x = "Beej!"


    print(x[0])  # Print character in position 0, "B"

    print(x[1])  # Print character in position 1, "e"

    print(x[4])  # Print character in position 4, "!"

    ```


    When reading this code, x[1] would be read aloud as ‚Äúx sub 1‚Äù, a nod to classic
    mathematical notation $x_1$. The 1 in this case is called the *index* into the
    string.


    **Really important:** index numbers start at 0!! The first character in a string
    is sometimes referred to in speech as the *zeroth character* and the second character
    is sometimes referred to as the *oneth character*, and *twoth*, and *threeth*,
    and so on, in an attempt to avoid ambiguity. Say ‚ÄúThe character at index 3‚Äù if
    you want to be sure.


    > *Fun Indexing Fact:* every programming language in serious use today uses 0-based
    indexing (that is, indexes start at 0). There are some useful mathematical implications
    for doing so, even if it''s trickier to think about.


    Do some experimentation here. Try getting characters past the end of the string?
    What happens? (We''ll learn to mitigate this later.)


    What if you try a negative index? What do you think will happen? What *does* happen?


    Turns out if you specify a negative index in Python, it gets the character starting
    from the *end* of the string!


    ```

    x = "Beej!"


    print(x[-1])  # Print 1st from the end character: "!"

    print(x[-4])  # Print 4th from the end character: "e"

    print(x[-5])  # Print 5th from the end character: "B"

    ```


    We''re going to use these next when we talk about slices.


    # 7.9 Slices


    Problem-solving step: **Understanding the Problem.**


    A *slice* is part of a string. You specify them by knowing the *starting index*
    and *ending index* into a string, and separating them by a colon :.'
