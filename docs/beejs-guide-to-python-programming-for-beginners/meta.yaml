    # 19.3.2 Windows Terminals and Shells


    For Windows, there are plenty of options, some of which you have installed already.


    +   - **CMD**: classic shell with origins way back in the MS-DOS days.

    - **PowerShell**: a new, more powerful shell.

    - **Bash via Git**: the famous Git¬≤ software package has a bash shell called,
    appropriately, ‚Äúgitbash‚Äù.

    - **Bash via WSL**: if you install WSL (below), it uses bash, as well.


    Unless you‚Äôre going with one of the bash options, you should use PowerShell because
    it‚Äôs newer, better, and maintained.


    Almost all of the bash commands we use in this guide also work in PowerShell and
    CMD.


    Hitting the Windows key and running `cmd` will bring up the CMD prompt. (Type
    `exit` to get out.)


    Hitting the Windows key and running `PowerShell` will bring up the PowerShell
    prompt. (Type `exit` to get out.)


