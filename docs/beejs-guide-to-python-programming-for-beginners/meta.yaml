    Problem-solving step: **Carrying Out the Plan**\n\nTo our main input loop, let‚Äôs\
    \ go ahead and add a call to the handler if the user requests a deletion:\n\n\
    ```python\n# Delete a line\nelif command[0] == 'd':\n    handle_delete(args, lines)\n\
    ```\n\nAnd now let‚Äôs write the delete handler. This is going to be similar to\
