    \ with .append()) just makes another reference to the same object. There‚Äôs only\
    \ one, but it‚Äôs referred to by two Theater objects. And also referred to by the\
    \ movies list. So many references to the same object for good memory savings.\n\
    \nNow we want to print out all the theaters and their showtimes. I‚Äôm going to\
