    # 7.14  Formatted Output with F-Strings


    Problem-solving step: **Understanding the Problem.**


    So far we‚Äôve just been using print() like so:


    ```

    x = 10

    print("x is", 10)

    ```


    which works, but doesn‚Äôt offer as much control over the output.


    Let‚Äôs take a look at something called *F-strings* which are new in Python 3.6.
    (‚ÄúFormatting strings‚Äù.)


    These offer us a really powerful method of formatting output. So powerful we‚Äôll
    only be scratching the surface here.


    The gist is that we can make a new string where we inject the value of variables
    (or expressions) into a string at a specific spot.


    Simple example:


    ```

    x = 10

    print(f"x is {x}")  # x is 10

    ```


    Notice a couple of things:


    +   1. There‚Äôs an f in front of the quotes. This signifies that this is an F-string,
    as opposed to a regular string.

    2. We inject the expression to evaluate inside *curly braces*‚Åµ { and }.


    Python automagically evaluates that expression and puts the result into the F-string
    at that point.


    Here‚Äôs another:


    ```

    x = 10

    print(f"x plus 10 is {x + 10}")  # x plus 10 is 20

    ```


    But that‚Äôs not all!


    We can also put a field width in there which controls how big the ‚Äúcell‚Äù is in
    which the number is printed.


    Compare this:


    ```

    print(f"a number: {1000}")

    print(f"a number: {50}")

    print(f"a number: {250}")

    ```


    which outputs:


    ```

    a number: 1000

    a number: 50

    a number: 250

    ```


    to this:'
  - '[PAGE 48]


    Chapter 7. Strings


    43


    ```

    print(f"another number: {1000:4}")

    print(f"another number: {50:4}")

    print(f"another number: {250:4}")

    ```


    which outputs:


    ```

    another number: 1000

    another number:   50

    another number:  250

    ```


    The :4 says to output the expression in a 4-space-wide field. This gives us a
    great way to make columns align on subsequent rows, like if you were printing
    out a spreadsheet.


    Another thing it can do is specify a number of decimal places to print out floating-point
    numbers.


    ```

    x = 3.1415926

    print(f"Pi is {x:.2f}")  # Pi is 3.14

    ```


    That format string says ‚Äúprint x as a floating-point number, with 2 decimal places‚Äù.


    F-strings are *really* powerful when it comes to controlling your output. We‚Äôll
    explore more as we go.


    # 7.14.1 .format() Method


    There is yet-another method of printing formatted strings that are really similar
    to F-strings: using .format():


    ```

    x = 3.1415926

    print("Pi is {:.2f}".format(x))  # Pi is 3.14

    ```


    This form has fallen out of favor due to the popularity of F-strings.


    # 7.14.2 % printf Operator


    If you go back even farther in time, you might find instances of % being used
    as the *printf operator* to format output. An example:


    ```

    x = 3.1415926

    print("Pi is %.2f" % x)  # Pi is 3.14

    ```


    It‚Äôs even *farther* out of favor. F-strings are the new thing.


    > **Fun Computing History Fact:** *printf()* is a function in the C programming
    language that was considered so awesome that the creators of Python decided to
    immortalize it with the % operator that does the same thing. And even now, the
    format specifiers used in F-strings to describe the type of data being printed
    match those from the C language. Not bad for a language invented in the 1970s,
    eh?


    Note that the printf % operator is the same as the arithmetic modulo (remainder)
    operator %. Python looks at the arguments to the operator and does the right thing.
    If the left argument is a string, it‚Äôs printf. If it‚Äôs a number, it‚Äôs modulo.


