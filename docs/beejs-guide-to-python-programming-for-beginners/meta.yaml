    \ if n < 0 or n > 9:\n        # If out of range, raise a ValueError:\n       \
    \ raise ValueError(\"out of range\")\n\n    return n\n```\n\nAnd then add some\
    \ code to call it and catch any exceptions:\n\n```\ntry:\n    n = getnum()\n \
