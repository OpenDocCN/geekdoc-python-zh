    \nÊàë‰ª¨Â∞ÜÂàõÂª∫‰∏Ä‰∏™ `handle_list()` ÂáΩÊï∞ÔºåÂΩìÁî®Êà∑ËØ∑Ê±ÇÂàóÂá∫Êñá‰ª∂Êó∂Ë∞ÉÁî®ÂÆÉ„ÄÇÂÆÉÂ∞ÜÊé•ÂèóÂáÝ‰∏™ÂèÇÊï∞ÔºöÁî®Êà∑Âú®ÂëΩ‰ª§ÂêéËæìÂÖ•ÁöÑÂèÇÊï∞Ôºå‰ª•ÂèäÊàë‰ª¨Ë¶ÅÊìç‰ΩúÁöÑË°åÂàóË°®„ÄÇ\n\
    \nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÊâßË°åËÆ°Âàí**\n\nÈ¶ñÂÖàÔºåËÆ©Êàë‰ª¨Ê£ÄÊü•Áî®Êà∑ÊòØÂê¶ÊÉ≥ÂàóÂá∫Ë°åÔºåÊñπÊ≥ïÊòØÊ£ÄÊü•ÂëΩ‰ª§ÁöÑÁ¨¨‰∏Ä‰∏™Â≠óÊØçÊòØÂê¶ÊòØ `l`„ÄÇÂ¶ÇÊûúÊòØÔºåÈÇ£‰πà*Â∞±ÂºÄÂßãÂêß*„ÄÇ\n\n‰ΩÜÊòØ\
    \ `l` ÂêéÈù¢Êúâ‰∏Ä‰∏™ÂèÇÊï∞ÔºåÂØπÂêßÔºüÁî®Êà∑ÂøÖÈ°ªÊåáÂÆö‰ªéÂì™‰∏ÄË°åÂºÄÂßãÂàóÂá∫„ÄÇÊàë‰ª¨ÂøÖÈ°ª‰ª•ÊüêÁßçÊñπÂºèÂ∞ÜËøô‰∏™ÂèÇÊï∞‰ºÝÈÄíÁªôÊàë‰ª¨ÁöÑ `handle_list()` ÂáΩÊï∞„ÄÇ\n\nÊâÄ‰ª•ËÆ©Êàë‰ª¨ÂÅö‰∏§‰ª∂‰∫ã„ÄÇËÆ©Êàë‰ª¨‰ªéÊï¥‰∏™ÂëΩ‰ª§‰∏≠Ëß£ÊûêÂá∫Ëøô‰∫õÂèÇÊï∞ÔºàÂ¶ÇÊûúÊúâÁöÑËØùÔºâ„ÄÇÊàë‰ª¨Â∞Ü‰ΩøÁî®\
    \ `split()` ÊåâÁ©∫ÊÝºÂàÜÂâ≤ÂëΩ‰ª§ÔºåÁÑ∂Âêé‰ΩøÁî®ÂàáÁâá `[1:]`ÔºàÂç≥‰ªéÁ¨¨‰∫å‰∏™ÂÖÉÁ¥ÝÂà∞Êú´Â∞æÔºâÊù•Ëé∑ÂèñÊâÄÊúâÂèÇÊï∞„ÄÇ\n\nÁªìÊûúÂ∞ÜÊòØ‰∏Ä‰∏™ÂåÖÂê´ÂëΩ‰ª§ÂêéÊâÄÊúâÂèÇÊï∞ÁöÑÂàóË°®ÔºåÂ¶ÇÊûúÊ≤°ÊúâÂèÇÊï∞ÔºåÂàôÊòØ‰∏Ä‰∏™Á©∫ÂàóË°®„ÄÇ\n\
    \nÁÑ∂ÂêéÊàë‰ª¨Â∞ÜÂÆÉ‰ºÝÈÄíÁªôÊàë‰ª¨ÁöÑÂ§ÑÁêÜÂáΩÊï∞Ôºö\n\n```\n# Grab the arguments after the command\nargs = command.split(\"\
    \ \")[1:]\n\nif command[0] == 'q':\n    done = True\n\n# List lines\nelif command[0]\
    \ == 'l':\n    handle_list(args, lines)\n```\n\nËÆ©Êàë‰ª¨ÁºñÂÜô‰∏Ä‰∏™ÂáΩÊï∞Â≠òÊÝπ‚Å∂Êù•Â§ÑÁêÜÂÆÉÔºåÂè™ÊòØ‰∏∫‰∫ÜÁúãÁúãÂÆÉÊòØÂê¶Â∑•‰ΩúÔºö\n\
    \n```\ndef handle_list(args, lines):\n    print(f'Handle list: {args}, {lines}')\n\
    ```\n\nËøêË°åÂêéÔºåÊàë‰ª¨ÂæóÂà∞Ôºö\n\n```\n$ python lineedit.py lines.txt\n> l\nHandle list: [],\
