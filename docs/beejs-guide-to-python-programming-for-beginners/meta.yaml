- md: "## Chapter 7\n\n## Strings\n\n### 7.1 Objective\n\n- Get a firm grip on what\
    \ a string is\n- Convert from other types to strings\n- Concatenate strings\n\
    - Understand that strings are immutable\n- Get individual characters with strings\n\
    - Slice a string\n- for loop through a string\n- Use basic string manipulation\
    \ methods and functions\n- Print strings using formatted output\n\n### 7.2 Chapter\
    \ Project Specification\n\nCompute and print out a multiplication table. Allow\
    \ the user to enter a number between 1 and 19, inclusive, and then print out a\
    \ times table up to that value.\n\nFor example, if the user enters 4, the output\
    \ should be:\n\n```\n1   2   3   4\n2   4   6   8\n3   6   9  12\n4   8  12  16\n\
    ```\n\nBe sure to leave enough room for the maximum number of digits you'll need\
    \ in the largest product.\n\n### 7.3 What is a String?\n\nProblem-solving step:\
    \ **Understanding the Problem.**\n\nA string in Python is a sequence of characters\
    \ (letters, punctuation, numbers, foreign characters, etc.). You enclose it in\
    \ either single quotes (') or double quotes (\"), your choice, as long as they\
    \ match on either side.\n\nHere are some strings:\n\n```\n\"Hello!\"\n\"This is\
    \ test #37\"\n\"3490\"              # string of digits\n\" \"                \
    \ # string of spaces\n\"\"                  # empty string, 0 characters\n\"Beej's\
    \ String\"     # string with an apostrophe\n'Beej says, \"hi!\"'  # string with\
    \ double quotes in it\n```\n\nYou can also embed double quotes in double-quoted\
    \ strings (or single quotes in single-quoted strings by putting a backslash character\
    \ in front of them (\\)). This is called *escaping* the character, which means\
    \ ‚ÄúHey, Python, treat this like a literal quote mark‚Äîjust print a quote mark out,‚Äù\
    \ as opposed to ‚ÄúHey, Python, this is the end of the string.‚Äù\n\n```\n'Beej\\\
    's string'       # Equivalent to the example, above\n\"Beej says, \\\"hi!\\\"\"\
    \n```\n\nStrings are commonly used when:\n\n- Printing out characters on the screen\n\
    - Reading from the keyboard with `input()`\n- Reading/writing data from/to files\
    \ (called *File I/O*, short for *File Input/Output*).\n- Network I/O\n\n### 7.4\
    \ Creating Strings\n\nProblem-solving step: **Understanding the Problem.**\n\n\
    Strings are generally created one of two ways:\n\n- by declaring a *string constant*\n\
    - getting a string back from a function\n\nThe former we‚Äôve already seen. Here‚Äôs\
    \ another example of a string constant:\n\n```\nx = \"This is a constant string!\"\
    \n```\n\nBut we‚Äôve also already seen functions that produce strings:\n\n```\n\
    y = input(\"Enter a string: \")\n```\n\n`input()` returns a string that gets stored\
    \ in `y`.\n\nBut wait‚Äîthere‚Äôs clearly a constant string there, as well! The prompt\
    \ \"Enter a string:\" is a string! Strings everywhere!\n\nLater we‚Äôll learn about\
    \ file and network I/O and how they‚Äôre used with strings and other data types.\
    \ But for now, we‚Äôll stick to some basics.\n\n### 7.5 Converting Other Types To\
    \ Strings and Vice Versa\n\nProblem-solving step: **Understanding the Problem.**\n\
    \nWe‚Äôve already mentioned this in a previous chapter, but it‚Äôs worth covering\
    \ again as a review.\n\nYou can convert a lot of other types to strings with the\
    \ `str()` function. We‚Äôll see how to make use of this later.\n\nExamples:\n\n\
    ```\nx = str(3490)    # \"3490\"\ny = str(3.14159) # \"3.14159\"\nz = str(\"Hi!\"\
    )    # \"Hi!\" (does nothing, since \"Hi!\" was already a string!)\n```\n\nLikewise,\
    \ you can convert from strings to other types, like `int` and `float` with those\
    \ respective functions:\n\n```\nx = int(\"3490\")          # Integer 3490\ny =\
    \ float(\"3.14159\")     # Float 3.14159\n```\n\nIn this way, if you have a string\
    \ with a number in it, you can convert it to a numeric value so that you can perform\
    \ math on it.\n\n### 7.6 String Concatenation with +\n\nProblem-solving step:\
    \ **Understanding the Problem.**\n\nYou‚Äôre used to using + to add two numbers,\
    \ but did you know you could also ‚Äúadd‚Äù strings? It doesn‚Äôt do it arithmetically,\
    \ but it will glue the strings together, a process known as *concatenation* (c…ôn-CA-t…ôn-ay-shun‚Äî‚Äúcat‚Äù\
    \ in the middle pronounced like the animal.) You can *concatenate* two strings.\n\
    \n```\nx = \"Hello, \"\ny = \"world!\"\nz = x + y       # z becomes \"Hello, world!\"\
    \n```\n\nThis is how you build smaller strings together into larger ones.\n\n\
    You often find the assignment-concatenation operator in use to add to the end\
    \ of a string:\n\n```\nx = \"B\"   # start with \"B\"\nx += \"e\"  # add an \"\
    e\" to the end of the string\nx += \"e\"  # add an \"e\" to the end of the string\n\
    x += \"j\"  # add a \"j\" to the end of the string\nx += \"!\"  # add an \"!\"\
    \ to the end of the string\n\nprint(x)    # Beej!\n```\n\n### 7.7 Midterm Challenge\n\
    \nUse what we‚Äôve learned so far to concatenate a string \"Hello\" with the number\
    \ 3490 (an integer, not a string).\n\nProblem-solving step: **Devising a Plan.**\n\
    \nOK, so let‚Äôs use + to concatenate the number onto the end of the string.\n\n\
    Problem-solving step: **Carrying out the Plan.**\n\n```\nx = \"Hello\"\ny = 3490\n\
    print(x + y)\n```\n\nBut running it, we get this output:\n\n```\nTraceback (most\
    \ recent call last):\n  File \"foo.py\", line 3, in <module>\n    print(x + y)\n\
    TypeError: can only concatenate str (not \"int\") to str\n```\n\nLet‚Äôs take a\
    \ close look at that. It‚Äôs telling us that on line 3 of foo.py, where we have\
    \ print(x + y) we‚Äôre getting this error:\n\n```\nTypeError: can only concatenate\
    \ str (not \"int\") to str\n```\n\ny is an int, but x is a str. This error is\
    \ telling us that we can‚Äôt concatenate an int onto a str. What to do now?\n\n\
    Problem-solving step: **Devising a Plan.**\n\nSince we can‚Äôt concatenate an int\
    \ to a str, can we turn the int into a str? Sure! New plan: convert the int to\
    \ a str with the str() function, and then concatenate it onto the first string\
    \ with +.\n\nProblem-solving step: **Carrying out the Plan.**\n\n```\nx = \"Hello\"\
    \ny = str(3490)\nprint(x + y)    # Hello3490\n```\n\nSuccess!\n\nProblem-solving\
    \ step: **Looking Back.**\n\nAny other ways to solve this? We could have done\
    \ the str() call later:\n\n```\nx = \"Hello\"\ny = 3490\nprint(x + str(y))   \
    \ # Hello3490\n```\n\nand that would have worked just as well.\n\nAlso ponder\
    \ a related problem: what if you had a string \"3490\" and you wanted to arithmetically\
    \ add 1000 to it, and then produce a final string of \"4490\"? What kinds of conversions\
    \ and operations would you have to do?\n\n### 7.8 Getting Individual Characters\
    \ From Strings\n\nProblem-solving step: **Understanding the Problem.**\n\nWhat\
    \ if we want to extract a single character from a string?\n\nWe can do it, but\
    \ we have to introduce new notation to allow it: [ and ], AKA *square brackets*.\n\
    \nLet's print out just the first two characters in a string:\n\n```\nx = \"Beej!\"\
    \n\nprint(x[0])  # Print character in position 0, \"B\"\nprint(x[1])  # Print\
    \ character in position 1, \"e\"\nprint(x[4])  # Print character in position 4,\
    \ \"!\"\n```\n\nWhen reading this code, x[1] would be read aloud as ‚Äúx sub 1‚Äù,\
    \ a nod to classic mathematical notation $x_1$. The 1 in this case is called the\
    \ *index* into the string.\n\n**Really important:** index numbers start at 0!!\
    \ The first character in a string is sometimes referred to in speech as the *zeroth\
    \ character* and the second character is sometimes referred to as the *oneth character*,\
    \ and *twoth*, and *threeth*, and so on, in an attempt to avoid ambiguity. Say\
    \ ‚ÄúThe character at index 3‚Äù if you want to be sure.\n\n> *Fun Indexing Fact:*\
    \ every programming language in serious use today uses 0-based indexing (that\
    \ is, indexes start at 0). There are some useful mathematical implications for\
    \ doing so, even if it's trickier to think about.\n\nDo some experimentation here.\
    \ Try getting characters past the end of the string? What happens? (We'll learn\
    \ to mitigate this later.)\n\nWhat if you try a negative index? What do you think\
    \ will happen? What *does* happen?\n\nTurns out if you specify a negative index\
    \ in Python, it gets the character starting from the *end* of the string!\n\n\
    ```\nx = \"Beej!\"\n\nprint(x[-1])  # Print 1st from the end character: \"!\"\n\
    print(x[-4])  # Print 4th from the end character: \"e\"\nprint(x[-5])  # Print\
    \ 5th from the end character: \"B\"\n```\n\nWe're going to use these next when\
    \ we talk about slices.\n\n### 7.9 Slices\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nA *slice* is part of a string. You specify them by knowing\
    \ the *starting index* and *ending index* into a string, and separating them by\
    \ a colon :."
