    # Chapter 15


    # Appendix A: Basic Math for Programmers


    I know what you‚Äôre thinking: *screw this*.

    Or maybe your language is even more blue.

    But bear with me for just a moment. Knowing a few basic mathematical operations
    can really help you be a better developer, as well as help you understand code
    that you come across.

    This section isn‚Äôt so much about application of these functions, but is more about
    their definition. It‚Äôll be up to you to use them as you see fit.

    It‚Äôs a short one‚Äîjust plow through it.

    **Fun Math Fact:** Math is cool.


    # 15.1 Arithmetic


    Addition, subtraction, multiplication, and‚Äîdon‚Äôt fall asleep on me already‚Äîdivision.
    The *Big Four* of grade school math.

    And, as a quick terminology summary:


    +   - The addition of two numbers produces a *sum*.

    - The subtraction of two numbers produces a *difference*.

    - The multiplication of two numbers produces a *product*.

    - The division of two numbers produces a *quotient* (and potentially a *remainder*.)


    I‚Äôm not going to talk about what the operators do, and will presume you remember
    that from however-many years ago.

    But I do want to talk about which comes first, because you might have forgotten.

    What do I mean by that?

    Take this expression: 1 + 2 √ó 3

    If we first add 1 + 2, we get 3. And then we multiply it by 3 and we get the answer
    of 9.

    But wait! If we first multiply 2 √ó 3 and get 6, then we add 1 we get an answer
    of 7!

    So‚Ä¶ which is it? 9 or 7?

    What we need to know is the *order of operations* or the *precedence* of one operator
    over another. Which happens first, + or √ó?

    For arithmetic, here is the rule: do all the multiplications and divisions *before*
    any additions and subtractions.'
