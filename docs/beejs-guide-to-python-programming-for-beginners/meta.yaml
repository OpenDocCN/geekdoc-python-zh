    \ the Problem.**\n\nSo far we‚Äôve just been using `print()` like so:\n\n```python\n\
    x = 10\nprint(\"x is\", 10)\n```\n\nwhich works, but doesn‚Äôt offer as much control\
    \ over the output.\n\nLet‚Äôs take a look at something called *F-strings* which\
    \ are new in Python 3.6. (‚ÄúFormatting strings‚Äù.)\n\nThese offer us a really powerful\
    \ method of formatting output. So powerful we‚Äôll only be scratching the surface\
    \ here.\n\nThe gist is that we can make a new string where we inject the value\
    \ of variables (or expressions) into a string at a specific spot.\n\nSimple example:\n\
    \n```python\nx = 10\nprint(f\"x is {x}\")  # x is 10\n```\n\nNotice a couple of\
    \ things:\n\n1.  There‚Äôs an `f` in front of the quotes. This signifies that this\
    \ is an F-string, as opposed to a regular string.\n2.  We inject the expression\
    \ to evaluate inside *curly braces* `{` and `}`.\n\nPython automagically evaluates\
    \ that expression and puts the result into the F-string at that point.\n\nHere‚Äôs\
    \ another:\n\n```python\nx = 10\nprint(f\"x plus 10 is {x + 10}\")  # x plus 10\
    \ is 20\n```\n\nBut that‚Äôs not all!\n\nWe can also put a field width in there\
    \ which controls how big the ‚Äúcell‚Äù is in which the number is printed.\n\nCompare\
    \ this:\n\n```python\nprint(f\"a number: {1000}\")\nprint(f\"a number: {50}\"\
    )\nprint(f\"a number: {250}\")\n```\n\nwhich outputs:\n\n```\na number: 1000\n\
    a number: 50\na number: 250\n```\n\nto this:\n\n```python\nprint(f\"another number:\
    \ {1000:4}\")\nprint(f\"another number: {50:4}\")\nprint(f\"another number: {250:4}\"\
    )\n```\n\nwhich outputs:\n\n```\nanother number: 1000\nanother number:   50\n\
    another number:  250\n```\n\nThe `:4` says to output the expression in a 4-space-wide\
    \ field. This gives us a great way to make columns align on subsequent rows, like\
    \ if you were printing out a spreadsheet.\n\nAnother thing it can do is specify\
    \ a number of decimal places to print out floating-point numbers.\n\n```python\n\
    x = 3.1415926\nprint(f\"Pi is {x:.2f}\")  # Pi is 3.14\n```\n\nThat format string\
    \ says ‚Äúprint `x` as a floating-point number, with 2 decimal places‚Äù.\n\nF-strings\
    \ are *really* powerful when it comes to controlling your output. We‚Äôll explore\
    \ more as we go.\n\n### 7.14.1 .format() Method\n\nThere is yet-another method\
    \ of printing formatted strings that are really similar to F-strings: using `.format()`:\n\
    \n```python\nx = 3.1415926\nprint(\"Pi is {:.2f}\".format(x))  # Pi is 3.14\n\
    ```\n\nThis form has fallen out of favor due to the popularity of F-strings.\n\
    \n### 7.14.2 % printf Operator\n\nIf you go back even farther in time, you might\
    \ find instances of `%` being used as the *printf operator* to format output.\
    \ An example:\n\n```python\nx = 3.1415926\nprint(\"Pi is %.2f\" % x)  # Pi is\
    \ 3.14\n```\n\nIt‚Äôs even *farther* out of favor. F-strings are the new thing.\n\
    \n> **Fun Computing History Fact:** *printf()* is a function in the C programming\
    \ language that was considered so awesome that the creators of Python decided\
    \ to immortalize it with the `%` operator that does the same thing. And even now,\
    \ the format specifiers used in F-strings to describe the type of data being printed\
    \ match those from the C language. Not bad for a language invented in the 1970s,\
    \ eh?\n\nNote that the `printf` `%` operator is the same as the arithmetic modulo\
    \ (remainder) operator `%`. Python looks at the arguments to the operator and\
    \ does the right thing. If the left argument is a string, it‚Äôs `printf`. If it‚Äôs\
    \ a number, it‚Äôs modulo.\n\n## 7.15 Chapter Project\n\nIt‚Äôs time to do that project‚Ä¶\
    \ way back from the beginning of the chapter! Remember? If not, jump back to the\
