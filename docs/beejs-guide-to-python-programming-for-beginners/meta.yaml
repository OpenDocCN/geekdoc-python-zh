- md: '## 5.6 Data Types


    Problem-solving step: **Understanding the Problem.**


    We started with numbers, earlier. That was pretty straightforward. The variable
    was assigned a value and then we could do math on it.


    But then we saw in the previous section that `input()` was returning whatever
    we typed in, including Goats rock! which is certainly not any number I''ve ever
    heard of.


    And, no, it''s not a number, indeed. It''s a sequence of characters, which we
    call a *string*. A string is something like a word, or a sentence, for example.


    Wait... there''s another type of data besides numbers? Yes! Lots of types of data!
    We call them *data types*.


    Python associates a *type* with every variable. This means it keeps track of whether
    a variable holds an integer, a *floating point* number or a string of characters.


    Here are some examples and their associated types. When you store one of these
    values in a variable, the variable remembers the type of data stored within it.


    | Example Data | Type in English | Type name in Python |

    | :--- | :--- | :--- |

    | 2 | Integer | int |

    | 3490 | Integer | int |

    | -45 | Integer | int |

    | 0 | Integer | int |

    | 3.14159 | Floating Point | float |

    | -13.8 | Floating Point | float |

    | 0.0 | Floating Point | float |

    | "Hello!" | String | str |

    | "3490" | String | str |

    | "" | String (empty) | str |


    In the examples, above, strings are declared using double quotes ("), but they
    can also be done with single quotes, as long as the quotes match on both ends:


    ```

    "Hello!" # is the same as ''Hello!''

    ''Hello!'' # is the same as "Hello!"

    ```


    Okay, that''s all fine. But is `input()` returning a string or a number? We saw
    both happen when we tried it out, right?


    10This is the way most computers represent numbers with a decimal point in them,
    such as 3.14159265358979. When you see "floating point" or "float", think "number
    with a decimal point in it" as opposed to "integer".


    Actually, turns out, input() **always** returns a string. Period. Even if that''s
    a string of numbers. Note that these things are **not** the same:


    ```

    3490    # int, a numeric value we can do math with

    "3490"  # string, a sequence of characters

    ```


    Sure, they look kinda the same, but they aren''t the same *because they have different
    types*. You can do arithmetic on an int, but not on a string.


    Well, that''s just great. The task for this chapter is to get two numbers from
    the keyboard and add them together, but the input() function only returns strings,
    and we can''t add strings together numerically!


    How can we solve this problem?


    ## 5.7 Converting Between Data Types


    Problem-solving step: **Understanding the Problem.**


    If we can''t add strings mathematically, can we convert the string "3490" into
    the integer 3490 and then do math on that?


    Yes!


    In fact, we can convert back and forth between all kinds of data types! Watch
    us convert a string to a number and store it in a variable:


    ```

    a = "3490"    # a is a string "3490"

    b = int(a)    # b is an integer 3490!


    print(b + 5)  # 3495

    ```


    How did that work? We called the built-in int() function and passed it a string
    "3490". int() did all the hard work and converted that string to an integer and
    returned it. We then stored the returned value in y. And finally, we printed the
    value of b+5 just to show that we could do math on it.


    Perfect!


    Here are some of the conversion functions available to you in Python:


    | Function | Effect |

    | --- | --- |

    | int() | Convert argument to an integer and return it |

    | float() | Convert argument to a floating-point number and return it |

    | str() | Convert argument to a string and return it |


    So... given all that we know so far, how can we solve this chapter''s problem:
    input two numbers from the keyboard and print the sum?


    ## 5.8 Input Two Numbers and Print the Sum


    Problem-solving step: **Devising a Plan.**


    We know:


    - How to input strings from the keyboard

    - How to convert strings to numbers

    - How to add numbers together

    - How to print things out


    Now‚Äîhow do we put all that together to write a program that inputs two numbers
    from the keyboard and prints their sum?


    ## Chapter 5. Data and Processing Data


    This is the *Devising a Plan* portion of problem-solving. We''re not going to
    write code to make this happen. We''re just going to write an outline of the individual
    steps the program must describe in a language called *pseudocode* (which is English
    that looks kinda like code).


    Then when we''re satisfied it''ll work, we can code it up for realsies.


    So stop here and take a moment to consider what the step by step might be to get
    this done.


    Really, take a moment, because I''m about to give spoilers. Thinking about how
    to solve problems is 80% of what a software developer gets paid to do, so you
    might as well practice right now.


    What do we know? What tools do we have at our disposal? What resources? How do
    I put all those together to solve this problem, like solving a puzzle?


    Here''s some pseudocode that would get the job done, it looks like:


    ```

    read string from keyboard into variable x

    convert x to int and store it back in x again

    read string from keyboard into variable y

    convert y to int and store it back in y again

    print the sum of x + y

    ```


    If we''re satisfied that our plan is solid, it''s time to move to the next phase.


    Problem-solving step: **Carrying out the Plan.**


    Now let''s convert each of those lines to real Python. I''ll throw in the pseudocode
    as comments so we can see how they compare. (Source code link<sup>11</sup>.)


    ```

    1  # Read string from keyboard into variable x

    2  x = input("Enter a number: ")

    3

    4  # Convert x to int and store it back in x again

    5  x = int(x)

    6

    7  # Read string from keyboard into variable y

    8  y = input("Enter another number: ")

    9

    10 # Convert y to int and store it back in y again

    11 y = int(y)

    12

    13 # Print the sum of x + y

    14 print("The sum of the two numbers is:", x + y)

    ```


    Save that file as twosum.py and run it:


    ```

    $ python3 twosum.py

    Enter a number: 9

    Enter another number: 8

    The sum of the two numbers is: 17

    ```


    Too easy! Let''s challenge it:


    ```

    $ python3 twosum.py

    Enter a number: 235896423496865928659832536289

    Enter another number: 94673984675289643982463929238

    The sum of the two numbers is: 330570408172155572642296465527

    ```


    Not even breaking a sweat!


    Nice. Now, I want you to *think like a villain*. What would a villain pass into
    our program for input that would cause it to break?


    - Negative numbers?

    - Zero?

    - Decimal numbers?

    - Non-numbers, like ‚Äúgoat‚Äù?


    Try all those things with your program. What happens when you try it? Which ones
    work and which ones don‚Äôt?


    Notice that a big, spewing error message is really the *worst case scenario* here.
    And it‚Äôs not really that painful. Don‚Äôt be afraid to try to break your code. The
    computer can handle it. Just run it again.


    Later, we‚Äôll learn techniques to catch errors like this so that the program doesn‚Äôt
    bomb out, and prints a nice message to the user to please try again with valid
    input, thank you very much.


    > Notice that when the program crashes, buried in all that output, is the line
    number the program crashed on! Very, very useful! And the last line tells you
    exactly what Python thinks went wrong.


    The point is, if you‚Äôre not sure how something will work, **just try it**. Experiment!
    Break things! Fix things! Again, the computer can absolutely handle it. It‚Äôs just
    a big sandbox for you to play in.


    ## 5.9 Wrapping it Up


    Problem-solving step: **Looking Back**.


    This grimly-named step is where we take a look at our code and decide if there
    was a better way to attack this problem. It‚Äôs important to remember that *coding
    is a creative endeavor*. There are many ways to solve the same problem.


    Admittedly, right now, you don‚Äôt have many tools in the toolkit, so your creativity
    is limited. But eventually, in the not-too-distant future, you‚Äôll know several
    ways to solve a problem, and you‚Äôll have to weigh the pros and cons of each, and
    be creative and choose one!


    What could be better?


    - We saw earlier that passing in floating point numbers (with a decimal point)
    bombed out. It would be nice if the program would add both floating-point.


    What else could we do?


    - What about other math operations?


    ## 5.10 Exercises


    > ‚ÄúYou know how to get to Carnegie Hall?‚Äù

    > ‚ÄúPractice!‚Äù


    Zeus says, ‚Äú**This book assumes you complete all of the exercises!**‚Äù and when
    Zeus speaks, people really should listen.


    I know, I know. You get to the exercises part of a book and you just skip ahead.
    I mean, it‚Äôs not like I‚Äôm *grading* you or anything.


    But there‚Äôs only one way to get to be a better dev: practice and repetition. Going
    through this book without doing the exercises is like training for a marathon
    by reading about how to run. It‚Äôs simply not going to get you there on its own.


    **Resist the urge to look at the solution until you‚Äôve solved it!** Give yourself
    a time limit. ‚ÄúIf I haven‚Äôt solved this in 20 minutes, I can look at the solution.‚Äù
    That 20 minute isn‚Äôt wasted‚Äîit‚Äôs invaluable problem-solving practice time. During
    that time, you‚Äôre building a scaffold in your brain that can *hold* the solution
    once you see it.'
