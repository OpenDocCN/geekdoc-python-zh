    \ sees that you have two \"Beej!\" strings in there, so it just makes them the\
    \ same one to save you memory. Since strings are immutable, you can't tell the\
    \ difference.\n\n### 17.4 Internment\n\nIn that same example, above:\n\n```python\n\
    >>> s = \"Beej!\"\n>>> t = \"Beej!\"\n>>> s is t\nFalse\n```\n\nwhat if we use\
    \ a different string, like \"Alice\"?\n\n```python\n>>> s = \"Alice\"\n>>> t =\
    \ \"Alice\"\n>>> s is t\nTrue\n```\n\nTrue?? What's up with that? Why does Alice\
    \ get special treatment?\n\nOr look at this:\n\n```python\n>>> x = 257\n>>> y\
    \ = 257\n>>> x is y\nFalse\n```\n\nwhich is fine‚Äîbut then check this out, with\
    \ 256 instead of 257:\n\n```python\n>>> x = 256\n>>> y = 256\n>>> x is y\nTrue\n\
    ```\n\nTrue, again?\n\nWe're getting into a deep language feature of Python called\
    \ *internment*. Basically Python makes sure to only have one copy in memory of\
    \ certain, specific values of data.\n\nFor these values, all variables will refer\
    \ to the same item in memory.\n\nThey are:\n\n- Integers between -5 and 256 inclusive.\n\
    - Strings that contain only letters, numbers, or underscores.\n- The None object.\n\
    \nThis is why \"Beej!\" isn't interned (because it contains punctuation), and\
    \ why \"Alice\" *is* interned.\n\nYou can intern your own strings with `sys.intern()`\
    \ for dictionary lookup optimization, but that's something 99.99999% of the Python\
    \ programming populace will never bother doing.\n\n## Chapter 18. Appendix D:\
    \ Number Bases\n\n### 18.1 How to Count like a Boss\n\nYou all have figured out\
    \ by now how much I love numbers. So I‚Äôm going to keep talking about them! Yay!\n\
    \nAt some point, you might have heard that computers run on a bunch of 1s and\
    \ 0s. That they‚Äôre binary. But what does that mean?\n\nAs humans, we‚Äôre used to\
    \ numbers. We use them all the time. 7 Dwarves. Speed limit 55. 99 bottles of\
    \ [your favorite beverage] on the wall.\n\nWe use the digits 0-9. And we use them\
    \ repeatedly.\n\nComputers, though, only have two digits: 0 and 1.\n\nThat seems\
    \ kind of limiting. What happens if you want to go higher than 1, to say, 2?\n\
    \nFortunately, there is a workaround. When computers want to go higher than 1,\
    \ they do the same thing we humans do when we want to go higher than 9: we all\
    \ add another *place*.\n\nAs a human counting apples on a table, you start with\
    \ 0, 1, and keep going‚Ä¶ 7, 8, 9‚Ä¶ and then you‚Äôre out of digits for the *ones place*,\
    \ which represents the number of individual items (1s of items) we‚Äôve seen so\
    \ far.\n\nSo you add another place, the *tens place*, which represents the number\
    \ of 10s of items we‚Äôve seen so far.\n\nIf we count to 27 apples, a number made\
    \ up of 2 and 7, we know we have 2 10s of apples, and 7 1s of apples. Let that\
    \ sink in. Every value in the 10s place is worth 10 apples. And every value in\
    \ the 1s place is worth 1 apple.\n\nTherefore for 27 apples, we have\n\n$2 \\\
    times 10 + 7 \\times 1 = 27$\n\napples.\n\nLet‚Äôs do the same thing with $100.\
    \ With that, I‚Äôm saying there‚Äôs a 1 in the 100s place, a 0 in the 10s place, and\
    \ a 0 in the 1s place. This means the value is\n\n$1 \\times 100 + 0 \\times 10\
    \ + 0 \\times 1$\n\nor $100.\n\nComputers go through this same process when they\
    \ run out of digits, except they run out of digits a lot sooner, since they only\
    \ have two of them.\n\nLet‚Äôs count apples in binary.\n\n0, 1‚Ä¶ oh no! We‚Äôre out\
    \ of digits. We have to add another place. Except this time, in binary, it‚Äôs not\
    \ the 10s place‚Ä¶ it‚Äôs the 2s place.\n\n0, 1, 10, 11‚Ä¶ out of digits again! We have\
    \ to add another place. This time it‚Äôs the 4s place:\n0, 1, 10, 11, 100.\n\nLet‚Äôs\
    \ look at that last number. In binary, that‚Äôs saying we have 1 4, 0 2s, and 0\
    \ 1s. For a total value of 4. For 5, we just have to put a 1 in the 1s place:\
    \ 101.\n\nIn fact, we can take any number and digest it that way. Take the human\
    \ number 7. That‚Äôs made up of one 4, one 2, and one 1. 4 + 2 + 1 = 7. So in binary,\
    \ we need a 1 in the 4s place, the 2s place, and the 1s place. Which looks like\
    \ this in binary: 111.\n\nWe‚Äôve written the number 7 in two ‚Äúlanguages‚Äù. In human\
    \ language, it looks like 7. In computer language it looks like 111.\n\nBut, and\
    \ this is important: *human 7 and computer 111 are the same number*. They‚Äôre just\
    \ written in a different language, of sorts.\n\n### 18.2 Number Bases\n\nThese\
    \ ‚Äúnumber languages‚Äù actually have names for convenience. Human numbers are called\
    \ Jeff, and computer numbers, Alice.\n\nI‚Äôm kidding. That‚Äôs completely false‚Äîthey‚Äôre\
    \ not named that.\n\nHuman numbers are called *decimal* numbers.\n\nComputer 1-and-0\
    \ numbers are called *binary* numbers.\n\nWe also refer to these numbers by something\
    \ called their *base*. This basically means ‚Äúthe number of digits this number\
    \ system has‚Äù.\n\nIn decimal, we have 10 digits: 0-9. So decimal is a *base 10*\
    \ numbering system.\n\nIn binary, we have 2 digits: 0 and 1. So binary is a *base\
    \ 2* numbering system.\n\nAs we saw in the previous section, 7 in decimal (base\
    \ 10) is the same as 111 in binary (base 2).\n\nAnd we also saw that as we counted\
    \ up in any numbering system, when we ran out of digits, we had to add another\
    \ place to create higher-valued numbers.\n\nThere are other number bases in use.\
    \ In fact, for any number you can think of, you can use that as a base for a numbering\
    \ system. Base 3. Base 3490. Base 27. Whatever you want. Of course, a base 3490\
    \ numbering system will have 3490 different digits, so I don‚Äôt know what you‚Äôre\
    \ going to use for those‚Ä¶ you‚Äôll have to come up with a lot of new shapes to draw\
    \ numbers with.\n\nBase 8, AKA *octal*, isn‚Äôt that common any longer, but used\
    \ to be used by programmers consistently. Since it‚Äôs base 8, it has the digits\
    \ 0-7 available to use. When you use them up, you have to add another place, the\
    \ 8s place.\n\nNotice how when you add a second place when you‚Äôre adding up, the\
    \ value of that place is the base!\n\nWhen you run out of digits with decimal\
    \ (base 10), you add the 10s place.\n\nWhen you run out of digits with binary\
    \ (base 2), you add the 2s place.\n\nWhen you run out of digits with octal (base\
    \ 8), you add the 8s place.\n\nMore generally, the place value is the base to\
    \ the power of how many digits you are from the right of the number, just counting\
    \ up."
