- md: "## 12.11 Summary\n\nModules make the world go around‚Ä¶ a lot more easily than\
    \ it would have if you had to write all that stuff yourself.\n\nIn this chapter,\
    \ we learned what modules were and how to find them in the official Python docs.\n\
    \nAlso, we learned how to import entire modules and individual components from\
    \ within modules.\n\nLater we'll learn to write and import our own modules.\n\n\
    ## Chapter 13\n\n## Reading Files\n\n### 13.1 Objective\n\n- Understand what a\
    \ file is\n- Be able to open and close a file\n- Be able to read and write from\
    \ files\n\n### 13.2 Project\n\nWrite a *line editor*.\n\nBack in the day, before\
    \ terminals were very capable and before we had nice editors and IDEs like we\
    \ do today, people used line editors. These were bare-bones file editors that\
    \ used simple commands to edit files.\n\nFor example:\n\n```\n$ python lineedit.py\
    \ foo.txt\n> l 1\n1: This is some text that was already in the file.\n> a 1\n\
    This is some text that I'm appending to the file.\nAnd some more.\n.\n> l 1\n\
    1: This is some text that was already in the file.\n2: This is some text that\
    \ I'm appending to the file.\n3: And some more.\n> e 3\nAnd really some more.\n\
    > l 1\n1: This is some text that was already in the file.\n2: This is some text\
    \ that I'm appending to the file.\n3: And really some more.\n> d 2\n> l 1\n1:\
    \ This is some text that was already in the file.\n2: And really some more.\n\
    > w\n> q\n```\n\nIn the example, everything following a > prompt is a line editor\
    \ command.\n\nIn order:\n\n1. list the file starting from the given line.\n2.\
    \ append multiple lines of text after the given line (until the user types . on\
    \ its own line).\n3. list the file from line 1.\n4. edit line 3.\n5. list the\
    \ file from line 1.\n6. delete line 2.\n7. list the file from line 1.\n8. write\
    \ the file to disk.\n9. quit.\n\nThe commands are:\n\n- list: list 10 lines (or\
    \ up through the last line if fewer than 10 lines are remaining) starting from\
    \ the line the user specifies. If the user specifies a number less than 1, assume\
    \ they entered 1.\n- append: append multiple lines after the line the user-specified.\
    \ Read lines one at a time, storing them in turn, until the user enters a sole\
    \ period (\".\") on a blank line.\n- delete: Works like list, except deletes the\
    \ line.\n- edit: Edits a single line, replacing it. If the line is out of range,\
    \ an error message should be printed.\n- write: Saves the file to disk. If the\
    \ filename wasn't specified on the command line, the user must specify a filename\
    \ after the w.\n- quit: exit the editor without saving the file.\n\nFrom the user\
    \ standpoint, lines are numbered starting from 1.\nKeep this project in mind while\
    \ you read through this chapter.\n\n### 13.3 What are Files, Anyway?\n\nProblem-solving\
    \ step: **Understanding the Problem.**\nWe're sort of used to them, already, right?\
    \ I mean, you have MP3 files, GIF files, or MPEG files‚Ä¶\n\n> ‚ÄúSo this guy comes\
    \ up to me and he says, ‚ÄòWhat do you do?‚Äô\n> ‚Äú‚ÄòWell,‚Äô I says, ‚ÄòI work on computers.‚Äô\n\
    > ‚ÄúAn‚Äô he says, ‚ÄòWow‚Äîif you work on computers? Do you use files?‚Äô\n> ‚ÄúAn‚Äô I says,\
    \ ‚ÄòDo I use files? Why I use‚Ä¶ ARJ files, GIF files, JPEG files, JAR files, RAR\
    \ files, PNG files, DOC files, MPEG files, TXT files, PUB files, PY files, LOG\
    \ files‚Ä¶\n> ‚Äú ‚ÄòAn‚Äô I use files, files, files, files, files, files, files, files,\
    \ files, files, files, files, files, files, files, files, files, files, files,\
    \ files, files‚Ä¶ files all the time!‚Äô‚ÄîTake shots! 11!‚Äù\n> ‚ÄîWith sincere apologies\
    \ to *Jughead* and *The Hockey Song*.\n\nWe're going to take a look at files from\
    \ a high level, look at how to do some basic operations on files, and we'll leave\
    \ it there for now. Later we'll revisit some more advanced techniques.\nBut what\
    \ *is* a file actually?\nLet's start by saying a file is a collection of characters\
    \ stored in a particular order on your disk or SSD on your computer.\nWe've already\
    \ seen a bunch of examples‚Äîour Python source files that we've been saving this\
    \ whole time! They're sequences of characters stored in a specific order and saved\
    \ on disk.\nNow, files are actually far more general-purpose than that, but let's\
    \ start with this. We can always chase the rabbit further down the rabbit hole\
    \ later.\nFor this chapter, we're going to use a type of file commonly called\
    \ a *text file*. This is also just a sequence of characters, just like a Python\
    \ source file. But text files can be anything. Love letters, The Gettysburg Address,\
    \ the lyrics for the latest hit single by that one band, the number œÄ computed\
    \ to a million decimal places, or whatever.\n\nTechnically, Python source files\
    \ are text files, as well, but they‚Äôre a specific type. All Python source files\
    \ are text files, but not all text files are Python source files.\n\nAs a human,\
    \ you can identify the type of file by its *extension*. That is, the part of the\
    \ filename after the last period in the file.\n\nFor Python, we‚Äôve been using\
    \ .py (pronounced ‚Äúdot-pie‚Äù) as the extension, identifying this file as a Python\
    \ source file.\n\nGeneral text files use .txt (‚Äúdot-text‚Äù) as an extension. And\
    \ you can make them with the same editor you‚Äôve been using to write Python code.\n\
    \nGo ahead and open a new file, and call it wargames.txt. Enter some text into\
    \ it, like this:\n\nWhat he did was great! He designed his computer so that it\
    \ could learn from its own mistakes. So, they‚Äôd be better the next time they played.\
    \ The system actually learned how to learn. It could teach itself!\n\nNow, the\
    \ question is, how do you run a Python program that *reads* this file in, and\
    \ stores or manipulates the data in memory?\n\n### 13.4 Reading Files, The Classic\
    \ Way\n\nProblem-solving step: **Understanding the Problem.**\n\nIn many programming\
    \ languages, there are three steps to reading a file:\n\n1. Open the file for\
    \ reading.\n2. Read data from the file.\n3. Close the file.\n\nThis is super-duper\
    \ common.\n\nWhat does it mean to ‚Äúopen‚Äù and ‚Äúclose‚Äù the file?\n\nWell, it‚Äôs analogous\
    \ to when you open the file in your editor, and then close it.\n\n‚ÄúOpening‚Äù is\
    \ asking the *operating system*¬π (OS) to give you access to the file. You can\
    \ open for reading, for writing, or both.\n\nFor this section, we‚Äôll want to ask\
    \ the OS to open the file for reading.\n\n‚ÄúClosing‚Äù the file is the opposite of\
    \ opening. We‚Äôre telling the OS that we‚Äôre done with the file. The OS does any\
    \ cleanup it has to. You should always close any files you open. (All files that\
    \ you open will automatically be closed when your program completes its run, but\
    \ you still should explicitly close them anyway¬≤.)\n\nAnd ‚Äúreading‚Äù is actually\
    \ pulling the data from the file on disk into strings in memory.\n\nProblem-solving\
    \ step: **Devising a Plan**\n\nLet‚Äôs write some code¬≥ to read our wargames.txt\
    \ file and print out the contents on the screen.\n\nOur steps will be:\n\n1. Open\
    \ the file\n2. Read the data\n3. Close the file\n4. Print the data\n\nProblem-solving\
    \ step: **Carrying Out the Plan**\n\n```\n# Open the file\nf = open(\"wargames.txt\"\
    )\n\n# Read all data from the file\ndata = f.read()\n\n# Close the file\nf.close()\n\
    \n# Print out the data we read earlier\nprint(data)\n```\n\nSome things to note:\n\
    \n- When we opened the file, we didn't specify read or write. In Python, it's\
    \ ‚Äúread‚Äù by default.\n- Notice that we close the file before we print anything.\
    \ We didn't *have* to, but it demonstrates how we now have a *copy* of the data\
    \ in memory. We can still use it, even though we've closed the file.\n\nSince\
    \ we have a copy of the data, we can do all kinds of stuff to change it.\n\nIf\
    \ you modify the last two lines to be:\n\n```\n# Print out the data we read earlier\n\
    print(data.upper())\n```\n\nwe'll get the output in uppercase. (But the original\
    \ file is still lowercase, of course!) It's our copy of the data to do with as\
    \ we please!\n\n### 13.5 Opening Files with with\n\nNow there is a more *canonical*‚Å¥\
    \ approach to reading files using the `with` statement in Python.\n\nEarlier,\
    \ we read a file\n\n```\nf = open(\"wargames.txt\")\ndata = f.read()\nf.close()\n\
    print(data)\n```\n\nThe equivalent using the `with` statement looks like this:\n\
    \n```\nwith open(\"wargames.txt\") as f:\n    data = f.read()\n    print(data)\n\
    ```\n\nIf you're looking closely, you'll notice that the `f.close()` is missing.\
    \ That's because when you use `with` to open the file, that gets handled automatically\
    \ for you! Not only that but even if some error occurs, the file will be properly\
    \ closed.\n\nAlthough the pattern of open-read-close is really common in other\
    \ languages and Python supports it, the preferred way of doing things is with\
    \ the fantastic `with` statement.\n\n### 13.6 Reading Data a Line at a Time\n\n\
    Check this out: in our previous examples, we read the entire file into memory\
    \ at once. That's what the `.read()` method does.\n\nFor small files, that's no\
    \ problem.\n\n‚Å¥Meaning, the One Right-*ish* Way to do something."
