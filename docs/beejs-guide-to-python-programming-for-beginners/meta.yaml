    \ to solve these problems: understand the problem, devise a plan, carry it out,\
    \ look back to see what you could have done better.\n\n1.  Write a class that\
    \ describes a car. What are the attributes the class would have? What methods?\
    \ (There‚Äôs no one right answer here‚Äîthink freely.)\n\n    (Potential Solution‚Åπ.)\n\
    \n2.  Write a class called SubwayCar that represents a single train car on a subway\
    \ train. What attributes would it have? What methods?\n\n    Add a name attribute\
    \ to the class so you can name the cars.\n\n    Add a next attribute to the class\
    \ that points to the next SubwayCar in the train. This should refer to the next\
    \ SubwayCar instance, or to None if it‚Äôs the last car.\n\n    Have a variable,\
    \ head, that points at the first subway car.\n\n    This way you can ‚Äúhook together‚Äù\
    \ a train, like this (pseudocode):\n\n    ```\n    head = SubwayCar(\"Engine\"\
    )\n    car1 = SubwayCar(\"Passenger car 1\")\n    car2 = SubwayCar(\"Passenger\
    \ car 2\")\n    car3 = SubwayCar(\"Passenger car 3\")\n\n    head.next = car1\n\
    \    car1.next = car2\n    car2.next = car3\n    car3.next = None    # End of\
    \ the train\n    ```\n\n    Now have a variable, location, that is your current\
    \ location in the train. Start it at the head:\n\n    ```\n    location = head\n\
    \    ```\n\n    Then write a loop to ‚Äúwalk‚Äù the location variable down the train\
    \ (by following the next pointers), printing out the name of each car as it goes,\
    \ until it reaches the end.\n\n    This famous data structure is actually called\
    \ a linked list. But I disguised it as a subway train to be less intimidating.\n\
    \n    (Solution¬π‚Å∞.)\n\n3.  Make a Room class that has a name attribute.\n\n  \
    \  Also give it n_to, s_to, w_to, and e_to attributes. These will refer to the\
    \ rooms that are north, south, west, and east of a particular room. None in one\
    \ of these attributes means there‚Äôs no exit in that direction.\n\n    For example,\
    \ two rooms that are hooked up west to east (and vice versa) could be constructed\
    \ like this:\n\n    ```\n    room0 = Room(\"Cobble Crawl\")\n    room1 = Room(\"\
    Debris Room\")\n\n    room0.e_to = room1    # east from Cobble Crawl to Debris\
    \ Room\n    room1.w_to = room0    # west from Debris Room to Cobble Crawl\n  \
    \  ```\n\n    Make 5-6 rooms and hook them up in various directions.\n\n    Now\
    \ have a variable, location, that is the current player location in the world.\
    \ Start it pointing to the starting room, e.g.:\n\n    ```\n    location = room0\n\
    \    ```\n\n    Next, get player input of either n, s, w, or e, and change location\
    \ to the room in the specified direction.\n\n    If there's no room there, print\
    \ the string \"You can't go that way.\".\n    If the user enters q, quit the game.\n\
    \    (Solution¬π¬π.)\n\n## 11.15 Summary\n\nAll kinds of goodies in this chapter!\
    \ We dipped our toes in the magical world of classes and objects, which is the\
    \ beginning of learning the world-famous Object-Oriented Programming (OOP).\n\
    We saw how we could concisely bundle data and functionality into a single convenient\
    \ class and the make objects from the class, using the class as a blueprint.\n\
    And, importantly, we learned that multiple variables can refer to the same object‚Äîthat\
    \ objects are *not* copied when you make an assignment.\nFinally, we touched on\
    \ the idea that None could be used to indicate ‚Äúabsence of an object‚Äù.\nThough\
    \ objects and classes form the basis for OOP, we really haven‚Äôt touched on what\
    \ that means yet. But that‚Äôs a story for another chapter.\n\n## Chapter 12. Importing\
    \ Modules\n\n### 12.1 Objective\n\n- Learn what a module is\n- How to find modules\
    \ to use\n- How to import modules\n\n### 12.2 Chapter Project Specification\n\n\
    Open a ZIP archive and print out a directory of the files that are in there, their\
    \ size in bytes, and the time they were last modified.\n\n> If you‚Äôre unfamiliar\
    \ with the ZIP format, it‚Äôs a way to take multiple files and compress them into\
    \ a single file, called a *ZIP archive*. The *table of contents* shows what files\
    \ exist within the ZIP file. They can be recovered later by *extracting* them,\
    \ but we‚Äôre not going to do that for this project.\n\nAn example ZIP file can\
    \ be found in the examples directory¬π.\n\nOutput should be:\n\n| File Name | Modified\
    \ | Size |\n| --- | --- | --- |\n| hello.txt | 2020-02-09 15:12:20 | 6 |\n| world.txt\
    \ | 2020-02-09 15:12:24 | 7 |\n\n(Spacing in the above example was changed to\
    \ fit the margins‚Äîyou don‚Äôt have to match spacing exactly.)\n\nKeep this project\
    \ in mind as we go through this chapter‚Äôs material.\n\n### 12.3 What and Why of\
    \ Modules\n\nProblem-solving step: **Understanding the Problem.**\n\nModules are\
    \ pieces of self-contained code that you can *import* into your code and use.\
    \ Think of them as prefabricated building blocks that you can put together in\
    \ your project to accomplish tasks without needing to write out the details yourself.\n\
    \nThis is actually a really powerful concept that you have at your disposal. Tons\
    \ of code have already been written, and you can just use it!\n\nDo you want to\
    \ compute anything to do with date and time? Python has a module for that.\n\n\
    Do you want to draw graphics on the screen? Python has a module for that.\n\n\
    Do you want to generate animated GIFs from a sequence of stills? There‚Äôs a module\
    \ for that.\n\nDo you want to download an image from a URL and save it to disk?\
    \ There are modules for that.\n\nThere are *tons* of modules built-in to Python¬≤.\
    \ Give the list a skim so you know what‚Äôs there, but you don‚Äôt need to drill down\
    \ at all unless you‚Äôre dying of curiosity over a particular module.\n\nAre there\
    \ are *zillions* of third-party modules¬≥ you can use, as well.\n\nYou can import\
    \ as many modules as you want into an individual project.\n\n### 12.4 Using a\
    \ Module\n\nProblem-solving step: **Understanding the Problem.**\n\nYou declare\
    \ your intent to use a module with the `import` keyword. We‚Äôre going to do an\
    \ example with the built-in sys module‚Å¥, which contains all kinds of useful information\
    \ about the system.\n\nLet‚Äôs see what platform Python thinks we‚Äôre running.\n\n\
    But first, some syntax.\n\nWhen using a function or variable inside a module,\
    \ you use the dot operator to get the variable, similar to how you get attributes\
    \ from objects. In fact, very similar. When you `import` a module, Python gives\
    \ you an object by that name with functions and data attached to it as attributes.\n\
    \nStep one is to `import` the module. Then you can access the members of that\
    \ module.\n\nFor example, if we:\n\n```\nimport sys\n```\n\nwe‚Äôll end up with\
    \ an object called `sys` with attributes that you can access!\n\nProblem-solving\
    \ step: **Devising a Plan**\n\nDigging through the documentation for the sys module,\
    \ we find there‚Äôs something called `sys.platform` that looks really promising.\n\
    \nLet‚Äôs print it!\n\nProblem-solving step: **Carrying Out the Plan**\n\n```\n\
    import sys    # Gets us access to all the sys goodies\n\nprint(sys.platform)\n\
    ```\n\nWhat does it output for you?\n\nFor me, on Linux or Windows WSL, it prints\
    \ ‚Äúlinux‚Äù. On Windows, it prints ‚Äúwin32‚Äù.\n\nNotice there was nothing we had to\
    \ do ourselves to make this determination. (Which is good, because it would be\
    \ a pain to write!) Fortunately, the sys module had everything we needed right\
    \ there.\n\n### 12.5 Command Line Arguments\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nI‚Äôve been hiding something.\n\nIn terms of how you run Python\
    \ programs from the command line.\n\nIt turns out you can add things *after* the\
    \ Python program name.\n\nSay what?\n\nLet‚Äôs say you have a program called `foo.py`.\
    \ You can run it like this, of course:\n\n```\npython foo.py\n```\n\nYou can also\
    \ run it like this:\n\n```\npython foo.py something another antelopes\n```\n\n\
    Those extra words after the program name are called *command line arguments*.\n\
    But *why* would you do this?\nSo you can control the behavior of the program from\
    \ the command line! When you run it, it‚Äôs nice to be able to influence behavior\
    \ this way instead of having to call `input()` with prompts and everything else.\n\
    But *how* do you get those extra command-line arguments?\nOur good friend `sys`\
    \ module can help us again here.\nThe variable `sys.argv` is a list that contains\
    \ the program name followed by all the command line arguments.\nRun this program\
    \ with a variety of command-line arguments and see what it outputs:\n\n```\nimport\
    \ sys\n\nprint(sys.argv)\n```\n\nExample output:\n\n```\n$ python foo.py\n['foo.py']\n\
    \n$ python foo.py aa bb cc\n['foo.py', 'aa', 'bb', 'cc']\n```\n\nSo at runtime,\
    \ we can look in `sys.argv` and make decisions about what we want to do!\nLet‚Äôs\
    \ put it to use in the next section.\n\n### 12.6 Printing Calendars\n\nPrint a\
    \ calendar for any month and year!\nProblem-solving step: **Understanding the\
    \ Problem**.\nYour first thought should have been something like, ‚ÄúHoly cow, Beej‚Äîhow\
    \ am I supposed to figure all that out? Was November 12, 1955, a Friday or a Saturday?\
    \ I don‚Äôt know!‚Äù\nLuckily, we don‚Äôt have to know! There‚Äôs a module, `calendar`,\
    \ that we can use to do all the dirty work for us.\nIf you pop to the instructions‚Åµ,\
    \ you‚Äôll see pages and pages of material. It‚Äôs intimidatingly impenetrable.\n\
    Reading docs is one of the things you‚Äôll get better at with practice. At first,\
    \ it‚Äôs a bit of a slog, but you‚Äôll improve.\nFirst of all, start skimming down\
    \ and looking for anything that has to do with text calendars. If it doesn‚Äôt seem\
