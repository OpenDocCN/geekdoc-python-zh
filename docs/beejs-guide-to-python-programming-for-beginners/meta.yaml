    \ .get(key) | ‰ªéÂ≠óÂÖ∏‰∏≠Ëé∑Âèñ‰∏Ä‰∏™ÂÄºÔºåÂ¶ÇÊûúÈîÆ‰∏çÂ≠òÂú®ÂàôËøîÂõûÈªòËÆ§ÂÄº |\n| .items() | ËøîÂõûÂ≠óÂÖ∏‰∏≠ÔºàÈîÆÔºåÂÄºÔºâÂØπÁöÑÁ±ªÂàóË°®ÂØπË±° |\n| .keys()\
    \ | ËøîÂõûÂ≠óÂÖ∏‰∏≠ÈîÆÁöÑÁ±ªÂàóË°®ÂØπË±° |\n| .values() | ËøîÂõûÂ≠óÂÖ∏‰∏≠ÂÄºÁöÑÁ±ªÂàóË°®ÂØπË±° |\n| .pop(key) | ËøîÂõûÁªôÂÆöÈîÆÂØπÂ∫îÁöÑÂÄºÔºåÂπ∂Â∞ÜÂÖ∂‰ªéÂ≠óÂÖ∏‰∏≠ÁßªÈô§\
    \ |\n| .popitem() | ÂºπÂá∫Âπ∂ËøîÂõûÊúÄËøëÊ∑ªÂäÝÁöÑÔºàÈîÆÔºåÂÄºÔºâÂØπ |\n\nÊàë‰ª¨‰πãÂâçÂ∑≤ÁªèËßÅËøá `.get()` ÁöÑÁî®Ê≥ïÔºå‰ΩÜÂÆÉ‰πüÂèØ‰ª•Ë¢´‰øÆÊîπ‰∏∫Âú®ÈîÆ‰∏çÂ≠òÂú®‰∫éÂ≠óÂÖ∏‰∏≠Êó∂ËøîÂõû‰∏Ä‰∏™ÈªòËÆ§ÂÄº„ÄÇ\n\
    \n```\nd = {\n    \"c\": 10,\n    \"b\": 20,\n    \"a\": 30\n}\n\nv = d.get(\"\
    x\", -99)  # Â¶ÇÊûúÈîÆ‰∏çÂ≠òÂú®ÔºåÂàôËøîÂõû -99\n\nprint(v)  # ÊâìÂç∞ -99ÔºåÂõÝ‰∏∫ÈîÆ `x` ‰∏çÂ≠òÂú®\n```\n\nÊàë‰ª¨‰πãÂâç‰πüËßÅËøá\
    \ `.items()` ÁöÑÁî®Ê≥ï„ÄÇÂ¶ÇÊûú‰ΩÝÂè™ÊÉ≥Êü•ÁúãÊâÄÊúâÁöÑÈîÆÊàñÂÄºÔºåÂèØ‰ª•‰ΩøÁî® `.keys()` Âíå `.values()` Ëé∑Âèñ‰∏Ä‰∏™ÂèØËø≠‰ª£ÂØπË±°Ôºö\n\n```\n\
    d = {\n    \"c\": 10,\n    \"b\": 20,\n    \"a\": 30\n}\n\nfor k in d.keys():\n\
    \    print(k)  # ÊâìÂç∞ \"c\", \"b\", \"a\"\n\nfor v in d.values():\n    print(v)\
    \  # ÊâìÂç∞ 10, 20, 30\n```\n\n## 9.9 Â≠óÂÖ∏Êé®ÂØºÂºè\n\nÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò„ÄÇ**\n\nËøòËÆ∞ÂæóÂàóË°®Êé®ÂØºÂºèÂêóÔºüÂ¶ÇÊûúÂøò‰∫ÜÔºåÂèØ‰ª•Âø´ÈÄüÂõûÈ°æ‰∏Ä‰∏ãÔºåÂõÝ‰∏∫Â≠óÂÖ∏Êé®ÂØºÂºè‰∏é‰πãÁ±ª‰ººÔºåÂè™ÊòØÁî®‰∫éÂ≠óÂÖ∏„ÄÇ\n\
    \n‰ΩÝÂèØ‰ª•‰ªé‰ªª‰ΩïÂèØ‰ª•Âú® `for` Âæ™ÁéØ‰∏≠ÈÅçÂéÜÁöÑÂèØËø≠‰ª£ÂØπË±°ÂàõÂª∫Â≠óÂÖ∏„ÄÇÂ¶ÇÊûú‰ΩÝÁöÑÊï∞ÊçÆÂ∑≤ÁªèÊòØÂè¶‰∏ÄÁßçÂèØËø≠‰ª£ÂΩ¢ÂºèÔºàÊØîÂ¶ÇÂàóË°®ÊàñÊüêÁßçËæìÂÖ•ÊµÅÔºâÔºåËøôÊòØ‰∏ÄÁßçÈùûÂ∏∏Âº∫Â§ßÁöÑÂàõÂª∫Â≠óÂÖ∏ÁöÑÊñπÂºè„ÄÇ\n\
    \nËÆ©Êàë‰ª¨ÈÅçÂéÜ‰∏Ä‰∏™ÂàóË°®ÔºåÂ∞ÜÂàóË°®ÁöÑÂÄº‰Ωú‰∏∫ÈîÆÔºåÂ∞ÜÂàóË°®ÂÄº‰πò‰ª• 10 ‰Ωú‰∏∫Â≠óÂÖ∏‰∏≠ÁöÑÂÄº„ÄÇÂπ∂‰∏îÔºå‰∏∫‰∫ÜÂ•ΩÁé©ÔºåÊàë‰ª¨ÂøΩÁï•ÂàóË°®‰∏≠ÁöÑÊï∞Â≠ó 20„ÄÇ\n\n```\na = [10,\
    \ 20, 30]\nd = { x: x*10 for x in a if x != 20 }\n\nprint(d)  # {10: 100, 30:\
    \ 300}\n```\n\nÂ¶ÇÊûú‰ΩÝÊúâ‰∏Ä‰∏™ÈîÆ/ÂÄºÂØπÁöÑÂàóË°®Ôºå‰πüÂèØ‰ª•ÂæàÂÆπÊòìÂú∞Â∞ÜÂÆÉ‰ª¨ËØªÂÖ•Â≠óÂÖ∏„ÄÇ\n\n```\na = [[\"alice\", 20], [\"\
