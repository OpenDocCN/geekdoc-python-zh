    - Cats are superior to dogs OR dogs are superior to cats.


    All right! Now one more thing to remember: unless there are parentheses in an
    expression saying otherwise, AND takes precedence over OR. That is, do the ANDs
    first, and then do the ORs.


    Level: Advanced.


    Let‚Äôs say it‚Äôs raining, I‚Äôm over 25, and this fish is big. We could evaluate this
    expression:


    It‚Äôs sunny AND this fish is big OR I‚Äôm over 25.


    We do the AND first. It‚Äôs not sunny, and the fish is big. So that‚Äôs ‚Äúfalse AND
    true‚Äù, which evaluates to ‚Äúfalse‚Äù.


    So replace that AND expression with ‚Äúfalse‚Äù. And then we‚Äôll do the OR:


    false OR I‚Äôm over 25.


    Now I am over 25, so that evaluates to ‚Äúfalse OR true‚Äù, which is ‚Äútrue‚Äù.


    So the entire expression is true.


    And you can override with parentheses:


    It‚Äôs sunny AND (this fish is big OR I‚Äôm over 25).


    Do the work in parens first. So now we evaluate the OR, which evaluates to ‚Äútrue
    OR true‚Äù which is ‚Äútrue‚Äù. Then we evaluate the AND, which is ‚ÄúIt‚Äôs sunny AND true‚Äù,
    which is ‚Äúfalse AND true‚Äù, which is ‚Äúfalse‚Äù.


    So the entire expression is false.


    Let‚Äôs do some examples with numeric conditional expressions. Do these evaluate
    to true or false?


    +   - 1 < 5

    - 5 > 1

    - 1 < 5 AND 5 < 10

    - 1 > 5 OR 5 < 10

    - 1 < 5 AND 5 > 10 OR 10 > 20

    - 1 < 5 AND (5 > 10 OR 10 > 20)


