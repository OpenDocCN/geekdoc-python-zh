    2. Print out values for `x` and `x**4` for all `x` between 0 and 99, inclusive.\
    \ (Solution<sup>10</sup>.)\n3. Ask the user to input a number, or the word `quit`.\
    \ If the user enters a number, print out that number times 10. If the user enters\
    \ `quit`, the program should complete. (Solution<sup>11</sup>.)\n4. Prompt the\
    \ user for two numbers. Print out all the odd numbers between and including those\
    \ two numbers. (Solution<sup>12</sup>.)\n5. Print out the numbers from 1 to 100.\
    \ Except if the number is divisible by 3<sup>13</sup>, print `Fizz` instead. If\
    \ the number is divisible by 5, print `Buzz` instead. And if the number is divisible\
    \ by 3 and divisible by 5, print `FizzBuzz`<sup>14</sup>. There are a lot of ways\
    \ to solve this one. (Solution<sup>15</sup>.)\n6. Make up two more exercises and\
    \ code them up.\n\n### 6.12 Summary\n\nWe covered all kinds of super-important\
    \ things in this chapter.\n\n- Flow Control\n- Boolean algebra, conditional expressions,\
    \ `True`, `False`\n- `if-else`\n- `while` loops and `for` loops\n- A bit about\
    \ testing edge cases\n\nGuess what! You now know enough Python syntax to solve\
    \ any computing problem! I‚Äôm not kidding<sup>16</sup>!\n\nSee, it‚Äôs not knowing\
    \ all the syntax that‚Äôs important; it‚Äôs the ability to figure out how to put it\
    \ all together in the right way.\n\nThat said, we haven‚Äôt learned enough Python\
    \ syntax to necessarily make solving every computing problem *easy*. In the upcoming\
    \ chapters, we‚Äôll learn more tools that Python gives you to increase the size\
    \ of your problem-solving toolkit."
