    +   - True

    - True

    - True AND True = True

    - False OR True = True

    - True AND False OR False = False OR False = False

    - True AND (False OR False) = True AND False = False


    Sometimes developers (but more usually hardware folks) describe these operations
    in what are called *truth tables*. A truth table shows what the result of a Boolean
    expression will be for some given inputs.


    Often these tables use 1 to represent True and 0 to represent False¬≤.


    Here are some truth tables for the operations we‚Äôve seen so far.


    | A | B | A AND B |

    |---|---|---|

    | 0 | 0 | 0 |


