  md: 'In mathematical notation, to variables next to each other like $m_1 m_2$, above,
    indicate multiplication. And for $r^2$, a simple equivalent is $r \times r$.


    So we can convert that whole equation to:


    ```

    F = G * (m1 * m2) / (r * r)

    ```


    where m1 is the mass of one planet, m2 is the mass of the other planet and r is
    the distance between them.


    So far so good.


    But what''s G? It''s the *gravitational constant*:


    $G = 6.67430 \times 10^{-11}$


    That''s written in scientific notation, but we can do the same thing in Python:


    ```

    G = 6.67430e-11

    ```


    That should be enough to go on. Write the function and call it with a variety
    of different values. Here are some sample values so you can see if your code is
    working:


