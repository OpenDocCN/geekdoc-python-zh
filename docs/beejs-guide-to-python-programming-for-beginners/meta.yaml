- md: '## 5.2 Variables


    In Python, *variables refer to values*. We‚Äôre saying on line 1 of the code, above,
    ‚ÄúThe variable x refers to the value 34.‚Äù Another way to think of this that might
    be more congruent with other languages is that x is a bucket that you can put
    a value in.


    Then Python moves to the next line of code and runs it, printing 34 to the screen.
    And then on line 3, we put something different in that bucket. We store 90 in
    x. The 34 is gone‚Äìthis type of bucket only holds one thing.


    So the output will be:


    ```

    34

    90

    ```


    You can see how the variable x can be used and reused to store different values.


    > *We‚Äôre using x and y for variable names, but they can be made up of any letter
    or group of letters, or digits, and can also include underscores (_). The only
    rule is they can‚Äôt start with a digit!*


    *These are all valid variable names (and, of course, you can make up any name
    you want!):*


    ```

    y

    a1b2

    foo

    Bar

    F00BAZ12

    Goats_Rock

    ```


    You can also do basic math on numeric variables. Add to the code above:


    ```

    1 x = 34      # Variable x is assigned value 34

    2 print(x)

    3 x = 90      # Variable x is assigned value 90

    4 print(x)

    5

    6 y = x + 40  # y is assigned x + 40 which is 90 + 40, or 130

    7 print(x)    # Still 90! Nothing changed here

    8 print(y)    # Prints "130"

    ```


    On line 6, we introduced a new variable, y, and gave it the value of ‚Äúwhatever
    x‚Äôs value is plus 40‚Äù.


    > *What are all these # marks in the file? We call those hash marks, and in the
    case of Python, they mean the rest of the line is a comment and will be ignored
    by the Python interpreter.*


    One last important point about variables: when you do an assignment like we did,
    above, on line 6:


    ```

    y = x + 40  # y is assigned 130

    ```


    When you do this, y refers to the value 130 even if x changes later. The assignment
    happens once, when that line is executed, with the value in x at that snapshot
    in time, and that‚Äôs it.


    Let‚Äôs expand the example farther to demonstrate:


    ```

    1 x = 34      # Variable x is assigned value 34

    2 print(x)

    3 x = 90      # Variable x is assigned value 90

    4 print(x)

    5

    6 y = x + 40  # y is assigned x + 40 which is 90 + 40, or 130

    7 print(x)    # Still 90! Nothing changed here

    8 print(y)    # Prints "130"

    9

    10 x = 1000

    11 print(y)    # Still 130!

    ```


    Even though we had y = x + 40 higher up in the code, x was 90 at the time that
    code executed, and y is set to 130 until we assign into it again. Changing x to
    1000 did **not** magically change y to 1040.


    *Fun Tax Fact:* The 1040 is nearly my least-favorite tax form.


    For more math fun, you have the following operators at your disposal (there are
    more, but this is enough to start):


    | Function | Operator |

    | --- | --- |

    | Add | + |

    | Subtract | - |

    | Multiply | * |

    | Divide | / |

    | Integer Divide | // |

    | Exponent | ** |


    You can also use parentheses similar to how you do in algebra to force part of
    an expression to evaluate first. Normal mathematical order of operations rules
    apply.


    ```

    8 + 4 / 2   # 8 + 4 / 2 == 8 + 2 == 10

    (8 + 4) / 2 # (8 + 4) / 2 == 12 / 2 == 6

    ```


    And you thought all that algebra wouldn''t be useful... *pshaw!*


    There''s a common pattern in programming where you want to, say, add 5 to a variable.
    Whatever value it has now, we want to make it 5 more than that.


    We can do this like so:


    ```

    x = 10


    x = x + 5  # x = 10 + 5 = 15

    ```


    This pattern is so common, there''s a piece of shorthand that we can use instead.


    These two lines are identical:


    ```

    x = x + 10

    x += 10

    ```


    As are these:


    ```

    x = x / 5

    x /= 10

    ```


    Here are a few of the arithmetic assignment expressions available in Python:


    | Operator | Meaning | Usage |

    | --- | --- | --- |

    | += | Add and assign | x += y |

    | -= | Subtract and assign | x -= y |

    | *= | Multiply and assign | x *= y |

    | /= | Divide and assign | x /= y |

    | %= | Modulo and assign | x %= y |


    These are very frequently used by devs. If you have x = x + 2, use x += 2, instead!


    ## 5.3 Assigning from One Variable to Another


    Let‚Äôs check out this code:


    ```

    x = 1000

    y = x

    ```


    Something interesting happens here that I want you to make note of. It‚Äôs not going
    to be super useful right now, but it will be later when we get to more intermediate
    types of data.


    When you do this, both x and y refer to the same 1000.


    That‚Äôs a weird sentence.


    But think of it this way. Somewhere in the computer memory is the value 1000.
    And both x and y refer to that single value.


    If you do this:


    ```

    x = 1000

    y = 1000

    ```


    Now there are two 1000 values. x points to one, and y points to the other.


    Finally, adding on to the original example:


    ```

    x = 1000

    y = x

    y = 1000

    ```


    What happens there is that first there is one 1000, and x refers to it.


    Then we assign x into y, and now both x and y refer to the same 1000.


    But then we assign a *different* 1000 to y, so now there are two 1000s, referred
    to by x and y, respectively.


    (The details of this are rather more nuanced than I‚Äôve mentioned here. See Appendix
    C if you‚Äôre crazy enough.)


    Takeaway: variables are just names for items in memory. You can assign from one
    variable to another and have them both point to the same item.


    We‚Äôre just putting that in your brain early so that we can revive it later.


    ## 5.4 Your Mental Model of Computation


    Problem-solving step: **Understanding the Problem.**


    This is a biggie, so listen up for it.


    When you‚Äôre programming, it‚Äôs important to keep a mental model of what *should*
    happen when this program runs.


    Let‚Äôs take our example from before. Step through it in your head, one line at
    a time. Keep track of the *state* of the system as you go:


    ```

    1  x = 34      # Variable x is assigned value 34

    2  print(x)

    3  x = 90      # Variable x is assigned value 90

    4  print(x)

    ```


    Before we begin, x has no value. So represent that in your head as ‚Äúx has no value;
    it‚Äôs invalid‚Äù.


    Then the first line runs.


    x is now 34.


    Then the second line runs.


    x is still 34, and we print it out. (So 34 is printed.)


    Then the third line runs.


    x is no longer 34. It is now 90. 34 is gone.


    Then the fourth line runs.


    x is still 90, and 90 gets printed out.


    Then we‚Äôre out of code, so the program exits. And we have ‚Äú34‚Äù and ‚Äú90‚Äù on the
    screen from when they were printed.


    *That‚Äôs* keeping a mental model of computation.


    This is *the key* to being able to debug. When your mental computing model shows
    different results than the actual program run, you have a bug somewhere. You have
    to dig through your code to find the *first* place your mental model and the actual
    program run diverge. That‚Äôs where your bug is.


    ## 5.5 User Input


    Problem-solving step: **Understanding the Problem**.


    We want to get input from the user and store it in a variable so that we can do
    things with it.


    Remember that our goal in this chapter is to write a program that inputs two values
    from the user on the keyboard and prints the sum of those values.


    Python comes with a built-in *function* that allows us to get user input. It‚Äôs
    called, not coincidentally, `input()`.


    But wait‚Äîwhat is a function?


    A function is a chunk of code that does something for you when you *call* it (that
    is when you ask it to). Functions accept *arguments* that you can *pass in* to
    cause the function to modify its behavior. Additionally, functions *return* a
    value that you can get back from the function after it‚Äôs done its work.


    So here we have the `input()` function, which reads from the keyboard when you
    call it. As an argument, you can pass in a *prompt* to show the user when they
    are ready to type something in. And it returns whatever the user typed in.


    What do we do with that return value? We can store it in a variable! Let‚Äôs try!


    Here‚Äôs another program, `inputtest.py`:


    ```

    1  # Take whatever `input()` returns and store it in `value`:

    2

    3  value = input("Enter a value: ")

    4  print("You entered", value)

    ```


    We can run it like this:


    `input()` is what we call a *built-in* in Python. It comes with the language and
    we get to make use of it. Later we‚Äôll learn to write our own functions from scratch!


