  md: 'Chapter 15. Appendix A: Basic Math for Programmers


    165


    +   - The absolute value of a positive number is itself.

    - The absolute value of a negative number is its negation, the positive version
    of itself.


    In summary, if it‚Äôs negative, the absolute value makes it positive.


    In mathematical notation, we represent the absolute value with vertical bars:


    $x = -17$ If $x$ is $-17$...


    $|x| = 17$ ...the absolute value of $x$ is 17.


    $|12| = 12$ The absolute value of 12 is 12.


    $|-13.8| = 13.8$ The absolute value of $-13.8$ is 13.8.


    In Python we compute absolute value with the abs() built-in function:


    ```

    print(abs(-17))  # 17

    print(abs(28.2)) # 28.2

    ```


    In terms of precedence, you can think of absolute value kind of like parentheses.
    Do the stuff inside the absolute value first, then take the absolute value of
    the result.


    # 15.6 The Power of Exponents


    Let‚Äôs say you wanted to multiply the number 7 by itself, say, 8 times. We could
    write this:


    $7 \times 7 \times 7 \times 7 \times 7 \times 7 \times 7 \times 7$


    I *guess* that‚Äôs not entirely awful.


    So let‚Äôs go all out. I want to multiply 7 by itself 3490 times. I‚Äôm going to head
    to the pub while you work on that. Let me know when you‚Äôre done.


    Luckily for you, mathematicians are lazy. They hate writing more than they have
    to, so they invent new notations out of thin air to avoid the extra work. Just
    like how I keep packing the kitchen trash down so I don‚Äôt have to run it outside.


    Actually, no, it‚Äôs not really like that at all$^2$.


    So what they invented is another way of saying ‚Äú3490 7s multiplied by each other‚Äù
    that didn‚Äôt involve an endless line of 7s and $\times$s. And it looks like this:


    $7^{3490}$ (read ‚Äú7 to the 3490th power‚Äù)


    That means 3490 7s multiplied together. We call this *raising to a power* or *exponentiation*.


    Or, put another way:


    $7^8 = 7 \times 7 \times 7 \times 7 \times 7 \times 7 \times 7 \times 7$


    We have all kinds of fun facts! Ready?


    In the example $7^8$, the number 7 is what we call the *base* and the number 8
    we call the *exponent*.


    If you want to write that code in Python, you‚Äôd write:


    ```

    print(7**8)  # prints 5764801

    ```


    The exponent must be non-negative, so zero or larger.


    But wait‚Äîzero? How do you multiply a number by itself zero times? It‚Äôs a valid
    question, and one that has baffled philosophers for time immemorial. But not mathematicians!
    Like power-crazed numerical dictators, they cried, ‚ÄúWe made this up, and we declare
    that *anything* to the zeroth power is 1. End of story!‚Äù


    So there we have it. $n^0 = 1$ for all $n$.


    $^2$Apart from the lazy factor, that is.'
