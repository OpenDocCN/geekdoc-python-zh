    # 7.3 What is a String?


    Problem-solving step: **Understanding the Problem.**


    A string in Python is a sequence of characters (letters, punctuation, numbers,
    foreign characters, etc.). You enclose it in either single quotes ('') or double
    quotes ("), your choice, as long as they match on either side.


    Here are some strings:


    ```

    "Hello!"

    "This is test #37"

    "3490"              # string of digits

    " "                 # string of spaces

    ""                  # empty string, 0 characters

    "Beej''s String"     # string with an apostrophe

    ''Beej says, "hi!"''  # string with double quotes in it

    ```'
