  - '[PAGE 26]


    Remember to use the four problem-solving steps to solve these problems: understand
    the problem, devise a plan, carry it out, look back to see what you could have
    done better.


    Here they are:


    +   1. Make a version of the two number sum code that works with floats instead
    of ints. Do the numbers always add correctly, or are they sometimes just a little
    bit off? Lesson: *floating point math isn''t always exact*. Sometimes it''s off
    by a tiny fraction. (Solution<sup>12</sup>.)

    2. Have the program print out the sum and the difference between two numbers.
    (Solution<sup>13</sup>.)

    3. Allow the user to enter 3 numbers and perform the math on those. (Solution<sup>14</sup>.)

    4. Write a program that allows the user to enter a value for $x$, and then computes
    and prints $x^2$. Remember ** is the exponentiation operator in Python. 3**2 is
    9. (Solution<sup>15</sup>.)

    5. Write a program that allows the user to enter a, b, and c, and the solves the
    quadratic formula<sup>16</sup> for those values.


    A refresher: with equations of the form:


    $$ax^2 + bx + c = 0$$


    you can solve for $x$ with the quadratic formula:


    $$x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$$


    This all looks terrifying! Can you feel your brain seizing up over it? Deer in
    the headlights? *That''s OK*. This is how developers feel when confronted with
    a new problem. Really! All of us! But what we know is that we have a problem solving
    framework we can use to attack this problem regardless of how difficult it seems
    initially.


    Remember: Understand, Plan, then Code It Up.


    Take a deep breath. Shake off the fear!


    You can absolutely do this. It''s not any harder than anything so far! Let''s
    go!


    Your program should plug a, b, and c into the above formula and print out the
    result value in x.


    > Make sure $b^2 \ge 4ac$ or there won''t be a solution and you''ll get a "domain
    error" when you try to take the square root of a negative number. Some test values
    for $a$, $b$, and $c$ that work: 5, 9, 3, or 20, 140, 60.


    What is that $\pm$ symbol after $-b$ in the equation? That''s "plus or minus".
    It means there are actually two equations, one with $+$ and one with $-$:


