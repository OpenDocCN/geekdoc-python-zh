  - '[PAGE 193]


    Vim is a complex editor that is hard to learn. But after you learn it, I maintain
    it‚Äôs the fastest editor on the planet. I‚Äôm using it to type this very sentence
    right now.


    To learn it, I recommend OpenVim‚Äôs interactive Vim tutorial and this reference
    of Vim commands from beginner to expert.


    Type the following‚Å∂ into your editor (the line numbers, below, are for reference
    only and shouldn‚Äôt be typed in):


    ```

    1 print("Hello, world!")

    2 print("My name''s Beej and this is (possibly) my first program!")

    ```


    Pull down File ‚Üí Save to save the file.


    # 19.8 Running the Program!


    Pop back into your terminal window and type `ls -la` to get a directory listing:


    ```

    $ ls -la

    total 8

    drwxr-xr-x   3 beej  staff    96 Nov 18 23:27 .

    drwxr-xr-x+ 123 beej  staff  3936 Nov 18 23:14 ..

    -rw-r--r--   1 beej  staff    87 Nov 18 23:27 hello.py

    ```


    There it is! `hello.py` clocking in at 87 bytes (characters, roughly) in size.


    Let‚Äôs run this puppy. Remember how the program is just a recipe for doing a thing‚Äîwhat
    do you think our `hello.py` program does? Guess!


    Then type this to run it (if `python` doesn‚Äôt work, try `python3` or `py` depending
    on your system):


    ```

    python hello.py

    ```


    and hit RETURN! *[Angelic Chorus!]*


    ```

    $ python hello.py

    Hello, world!

    My name''s Beej and this is (possibly) my first program!

    ```


    You just wrote some instructions and the computer carried it out!


    Next up: write a Quake III clone!


    Okay, so maybe there might be a small number of *in between* things that I skimmed
    over, but, as Obi-Wan Kenobi once said, ‚ÄúYou‚Äôve taken your first step into a larger
    world.‚Äù


    # 19.9 Exercises


    Remember to use the four problem-solving steps to solve these problems: understand
    the problem, devise a plan, carry it out, look back to see what you could have
    done better.


    +   1. Make another program called `dijkstra.py` that prints out your three favorite
    Edsger Dijkstra quotes‚Å∑.


    # 19.10 Summary


    +   - Move around the directory hierarchy using the shell

    - Edit some source code in an editor

    - Run that program from the command line'
