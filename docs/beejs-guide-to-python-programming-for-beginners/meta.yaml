    \ How do we associate a set of times with a particular Movie object? We need a\
    \ way in code to show that they're linked so that we can print them out together.\n\
    \nProblem-solving step: **Devising a Plan**\n\nWe can do this with a new class‚Äîcall\
    \ it MovieTime‚Äîthat contains both a reference to a movie *and* a list of times\
    \ that movie is showing. And then we can add instances of this new class to the\
    \ Theater objects.\n\nIn this way, if we have a reference to a Theater, we can\
    \ look up its list of MovieTime objects, and then for each of those, look up the\
