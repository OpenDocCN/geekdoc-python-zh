    The log-base-2 of a big number tends to be a much smaller number.


    # 15.12 Rounding


    When we round a number, we are looking for the *nearest number* of a certain number
    of decimal places, dropping all the decimal places smaller than that.


    By default, we mean zero decimal places, i.e. we want to round to the nearest
    whole number.


    So if I said, ‚ÄúRound 2.3 to the nearest whole number,‚Äù you‚Äôd answer ‚Äú2‚Äù, because
    that‚Äôs the closest whole number to 2.3.


    And if I said, ‚ÄúRound 2.8 to the nearest whole number,‚Äù you‚Äôd answer ‚Äú3‚Äù, because
    that‚Äôs the closest whole number to 2.8.


    When we round to a higher number, we call that *rounding up*.


    The other direction is *rounding down*.


    But what if I said ‚ÄúRound 2.5 to the nearest whole number?‚Äù It‚Äôs perfectly between
    2 and 3! In those cases, conventionally, lots of us learned to round up. So the
    answer would be 3.


    We can also force a number to round a certain direction by declaring which way
    to round.


    ‚ÄúDivide *x* by 3, then round up.‚Äù


    In Python, we have a few options for rounding.


    We can use the built-in `round()` function.


    But it behaves a little bit differently than we might be used to. Notably, numbers
    like 1.5, 2.5, and 3.5 that are equally close to two whole numbers *always round
    to the nearest even number*. This is commonly known as *round half to even* or
    *banker‚Äôs rounding*.


    ```

    round(2.8)   # 3

    round(-2.2)  # -2

    round(-2.8)  # -3


    round(1.5)   # 2

    ```'
