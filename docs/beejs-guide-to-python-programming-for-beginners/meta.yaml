    # 12.8 Learning All The Modules


    If you check out the list of modules‚Å∂ you get with Python, it looks pretty intimidating.
    I mean, there‚Äôs a *lot* there.


    How do you deal with it?


    This is one of the toughest parts of learning a new language: learning the *standard
    library* (the bundled modules) that comes with it. Each language has its own way
    of doing things, and those ways are legion.


    Step one: give up now. You‚Äôre not going to memorize all this.


    The best thing to do is skim it at the level of the contents. Just try to remember
    that there exists a module for dealing with times. And a module for dealing with
    calendars. And for dealing with network communication. And so on.


    Don‚Äôt worry about the details. You can always look them up later. But if you don‚Äôt
    know that there even *is* a module that handles reading and writing of CSV‚Å∑ files,
    then you won‚Äôt know to look it up when you need it.


    All devs, even experienced ones, look things up. All the time.


