  - "[PAGE 103]\n\nWhat we're starting to delve into here is the world of *Object-Oriented\
    \ Programming*. To discuss *every-thing* about it would definitely be information\
    \ overload, so we're just going to start with the basics here, and revisit some\
    \ of the concepts later.\n\nA bit of terminology here, following up on the starship\
    \ example from above.\n\nFirst of all, we're going to *construct* new starship\
    \ *objects* that hold all the information about a single ship.\n\nWhen the object\
    \ is constructed, it is done based on a blueprint. We call this blueprint a *class*.\n\
    \nSo we're going to define a blueprint for a starship in a class, and then we're\
    \ going to build multiple, different starships based on that class.\n\nLet's do\
    \ this as simple as possible to start. It's not going to be a common way of doing\
    \ things, but it's a place to get your feet wet. We'll fix it soon.\n\nFirst of\
    \ all, we'll define a new class. Remember, this is just the blueprint for starships‚Äîit's\
    \ not a starship itself.\n\nClass names use camel case¬≤ by convention. Let's define\
    \ that starship class!\n\n```\nclass StarShip:\n    pass\n```\n\n...that's it?\
    \ What's that pass in there?\n\nOkay, you got me. I did say we were going to start\
    \ simple (and not quite *Right*), in my defense. What we have there is a class\
    \ StarShip, except it's like a blank blueprint. There's nothing in it.\n\nThe\
    \ keyword pass means \"do nothing\" in Python. It's just there to indicate to\
    \ Python that there's no body inside this class.\n\n> **Random Terminology Facts:**\
    \ We also say a starship object is an *instance* of the StarShip class.\n\nConstructing\
    \ a new starship object is also referred to as *instantiating* the object from\
    \ the class.\n\nLet's go on to make a couple of objects from the blueprint.\n\n\
    ```\nclass StarShip:\n    pass\n\ns0 = StarShip()\ns1 = StarShip()\ns2 = StarShip()\n\
    ```\n\nBy putting parens after the class name, we're telling Python that we are\
    \ creating a new starship object from the StarShip class. In fact, we made three\
    \ of them and saved a reference to each in s0, s1, and s2. Of course, none of\
    \ them have names or locations, but we'll remedy that shortly.\n\nIf we print\
    \ one, we get something like this:\n\n```\nprint(s1)  # <__main__.StarShip object\
    \ at 0x7fa11828c8e0>\n```\n\nNot so pretty. But we'll make that better soon, as\
    \ well.\n\n# 11.5 Making Different StarShips\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nIn the previous example, all our starship objects were identical\
    \ and contained no information.\n\nWhat we need is a way to pass that information\
    \ in when the starships are constructed.\n\nWe do this by defining a special function\
    \ *inside* the class.\n\n> **Another Fun Terminology Fact:** functions declared\
    \ inside classes are called *methods*."
  - "[PAGE 104]\n\nChapter 11. Classes and Objects\n\n99\n\nThis special function\
    \ is always named `__init__()` (with the dunders) and is called *the constructor*.\n\
    \nLet's add a constructor to our StarShip class that allows us to pass in a ship\
    \ name when the ship is constructed:\n\n```\nclass StarShip:\n    def __init__(self,\
    \ shipname):  # The constructor\n        self.name = shipname\n\ns0 = StarShip(\"\
    MCRN Tachi\")\ns1 = StarShip(\"Red Dwarf\")\ns2 = StarShip(\"USCSS Nostromo\"\
    )\n```\n\nWhoa, now... that's a lot of hard-to-read punctuation¬≥ to sift through.\n\
    \nAnd there's that crazy `self` parameter to the function, whatever that means!\n\
    \nLet's start with `self`‚Å¥. This is one of the hardest concepts to grok about\
    \ in this chapter, so we'll spend some time on it.\n\nRemember how the class is\
    \ the blueprint, and the objects are made from that blueprint?\n\nAnd how after\
    \ they're constructed, you get a reference back to that newly-minted object? (These\
    \ are the references we were storing in s0, s1, and s2.)\n\nWell, what about the\
    \ object that's being constructed *right now* inside the `__init__()` method?\
    \ It already exists but isn't fully initialized yet. But inside the constructor,\
    \ we have a reference to that object that is being built right now. And that reference\
    \ is in `self`.\n\n`self` means \"the object that this method is operating on\"\
    .\n\nWhat's weird is that when we instantiated the starships, we only passed one\
    \ argument to `__init__()`.\n\n```\ns0 = StarShip(\"MCRN Tachi\")\n```\n\nWhen\
    \ clearly `__init__()` has two parameters: `self` and `name`. What gives?\n\n\
    ```\ndef __init__(self, shipname):  # The constructor\n```\n\nDoesn't the number\
    \ of arguments need to match the number of parameters?\n\nIt does! But Python's\
    \ doing something sneaky behind your back, here. When a method has been called\
    \ for a particular object, Python automagically fills in the first parameter with\
    \ the object that is being operated on. We don't have to worry about it.\n\nPython\
    \ then takes the arguments we *did* pass and tacks them on after that.\n\nLet's\
    \ take a look at that constructor again:\n\n```\nclass StarShip:\n    def __init__(self,\
    \ shipname):  # The constructor\n        self.name = shipname\n\ns0 = StarShip(\"\
    MCRN Tachi\")\n```\n\nThis is a really common pattern, so let's make sure we understand\
    \ what's going on here. In particular, there's a weird dot after `self`. What\
    \ does that mean? But before we get there, let's look at `shipname`.\n\nWhen we\
    \ create our new starship s0, we pass in the name \"MCRN Tachi\". This calls the\
    \ constructor `__init__()`.\n\nPython automatically puts a reference to the object\
    \ that's now being constructed into `self`. And then it copies the string \"MCRN\
    \ Tachi\" to the `shipname` parameter of the function. So `shipname` is \"MCRN\
    \ Tachi\".\n\nAnd now we're to the guts of the thing. `self.name`? The saga continues!\n\
    \n¬≥In fact, I think the choice to use all those underscores in `__init__()` is\
    \ one of the few bad design choices in the language.\n‚Å¥A lot of other languages\
    \ use the variable name `this` instead of `self`."
  - "[PAGE 105]\n\n# # 11.6 Attributes\n\nProblem-solving step: **Understanding the\
    \ Problem.**\n\nObjects have variables attached to them, and we call these *attributes*<sup>5</sup>.\n\
    \nAttributes are qualities that an object possesses‚Äîwhat things it *has*. For\
    \ example, a starship would possess a name. In other words, a starship would have\
    \ a name attribute.\n\nAnd we refer to these attribute by using the dot operator\
    \ (.).\n\nWhen we have a line like this:\n\n```\nself.name = shipname\n```\n\n\
    We‚Äôre saying ‚Äúchange the name attribute on this starship object to be the same\
    \ as the shipname parameter that was passed into this method‚Äù.\n\nThis is how\
    \ we take the ship name that was passed in as an argument and attach it to the\
    \ newly constructed object! We save a reference to the name in an attribute on\
    \ the object!\n\nNote that I named shipname differently than ship deliberately.\
    \ (I did this to show that they *could* be different, but also to avoid confusion\
    \ when looking at the example.) But it‚Äôs far more common to just name them the\
    \ same thing. This is OK since self.name, the attribute on self, is different\
    \ than name, the parameter.\n\nLike so:\n\n```\nclass StarShip:\n    def __init__(self,\
    \ name):  # The constructor\n        self.name = name\n```\n\n# # 11.7 Using Attributes\n\
    \nProblem-solving step: **Understanding the Problem.**\n\nNow let‚Äôs add one more\
    \ thing to our starships: their location.\n\nInstead of passing the location into\
    \ the constructor, let‚Äôs just initialize it to location [0,0,0] right off the\
    \ bat. Then we can manually set it later.\n\n```\nclass StarShip:\n    def __init__(self,\
    \ name):  # The constructor\n        self.name = name\n        self.location =\
    \ [0, 0, 0]  # <-- Add this\n```\n\nAll ships will now start at [0,0,0] because\
    \ that‚Äôs what the blueprint says they‚Äôll do.\n\nAnd we can print it! We‚Äôll access\
    \ the values in those attributes by using the dot operator on s0!\n\n```\ns0 =\
    \ StarShip(\"MCRN Tachi\")\n\nprint(s0.name)          # MCRN Tachi\nprint(s0.location)\
    \      # [0, 0, 0]\n```\n\nBut wait! There‚Äôs more! That‚Äôs not all!\n\nYou can\
    \ also *set* values!\n\n```\nprint(s0.name)      # MCRN Tachi\n\ns0.name = \"\
    Rocinante\"\n\nprint(s0.name)      # Rocinante\n```\n\n<sup>5</sup>Technically,\
    \ even the methods are attributes, but we‚Äôll get into the pedantic details another\
    \ time."
- md: "And we could modify the location of the ship this way, as well:\n\n```python\n\
    s0.location[1] = 99\n\nprint(s0.location)  # [0, 99, 0]\n```\n\n*This is important!*\
    \ Even though we're changing the values for the attributes of s0, the attributes\
    \ of the other objects (like s1 and s2) remain unchanged! (Until we explicitly\
    \ change them.)\n\nWe've successfully bundled all the information about a single\
    \ ship into this single object. Nice and consolidated.\n\n## 11.8 More on Methods\n\
    \nProblem-solving step: **Understanding the Problem**.\n\nRemember that methods\
    \ are functions that are connected to the object. Just like you could think of\
    \ attributes as things the object *has*, you can think of methods like things\
    \ the object *does*.\n\nLet's add another method to set the ship location.\n\n\
    ```python\nclass StarShip:\n    def __init__(self, name):  # The constructor\n\
    \        self.name = name\n        self.location = [0, 0, 0]  # <-- Add this\n\
    \n    def set_location(self, x, y, z):\n        \"\"\"Set a ship's location to\
    \ x,y,z\"\"\"\n\n        self.location[0] = x\n        self.location[1] = y\n\
    \        self.location[2] = z\n\ns0 = StarShip(\"MCRN Tachi\")\n\nprint(s0.location)\
    \  # [0, 0, 0]\n\ns0.set_location(10, 20, 30)\n\nprint(s0.location)  # [10, 20,\
    \ 30]\n```\n\nOn line 6, we define our new method, `set_location()`. Importantly,\
    \ notice the first parameter is `self`, which will be initialized to represent\
    \ the object we're setting the location of. (That is, when we call `s0.set_location()`,\
    \ `self` will be set to refer to `s0` inside `set_location()`.)\n\n> **Fun Debugging\
    \ Fact:** If you get an error about the incorrect number of arguments to your\
    \ method, make sure you have `self` as the first parameter!\n\nThen on line 17,\
    \ when we call `set_location()` on `s0`, `self` gets set to `s0`, and `x`, `y`,\
    \ and `z` get set to 10, 20, and 30, respectively.\n\nThen we use `x`, `y`, `z`,\
    \ and `self` inside the method to change the values in this ship's location.\n\
    \nThis way, when we print it out on line 19, we see the new values there.\n\n\
    Attributes!\n\n## 11.9 Pretty Printing\n\nRight now when we print one of our starship\
    \ objects, Python prints something like this on the screen:\n\n```\n<__main__.StarShip\
    \ object at 0x7fa11828c8e0>\n```\n\nNot particularly useful. Let's *override*\
    \ that functionality and have it print something nicer.\nGo ahead and add this\
    \ method to the StarShip class:\n\n```python\ndef __str__(self):\n    \"\"\"Return\
    \ string representation of this object.\"\"\"\n    return f'{self.name}: {self.location}'\n\
    ```\n\nThe `__str__()` method returns a string to use any time an object is printed.\n\
    Now if we build three new ships and print them all:\n\n```python\ns0 = StarShip(\"\
    Rocinante\")\ns1 = StarShip(\"Red Dwarf\")\ns2 = StarShip(\"USCSS Nostromo\")\n\
    \ns0.set_location(10, 20, 30)\ns1.set_location(40, 50, 60)\ns2.set_location(70,\
    \ 80, 90)\n\nprint(s0)\nprint(s1)\nprint(s2)\n```\n\nWe get some nice output,\
    \ like this:\n\n```\nRocinante: [10, 20, 30]\nRed Dwarf: [40, 50, 60]\nUSCSS Nostromo:\
    \ [70, 80, 90]\n```\n\nPerfect!\n\n## 11.10 Objects are Mutable\n\nWhen you assign\
    \ one object to another, you don't get a second object. You get another reference\
    \ to the first object. Just like happens with lists and dictionaries.\n\nOr, another\
    \ way, doing an assignment with an object does *not* result in a new object. Both\
    \ variables are names for the same object. (Check out Appendix C for details.)\n\
    \n```python\nclass Forest:\n    pass\n\nx = Forest()  # Construct a new object\n\
    y = x\n\nx.antelopes = 4\n\nprint(y.antelopes)  # 4, since y and x refer to the\
    \ same object\n```\n\nThis means you can pass objects to functions as arguments,\
    \ and the function can change the values in the object's attributes.\n\n```python\n\
    def set_antelopes_to_10(o):\n    o.antelopes = 10\n\nclass Forest:\n    pass\n\
    \nx = Forest()\nx.antelopes = 4\n\nset_antelopes_to_10(x)\n\nprint(x.antelopes)\
    \  # 10!\n```\n\nRemember that when you call a function, it is assigning the argument\
    \ into the parameter name, so both of them refer to the same object. That is,\
    \ in the code above, o refers to the same object x does, just as if we'd done\
    \ an assignment with o = x.\n\n## 11.11 Objects and None\n\nWe've already seen\
    \ that variables can point to the value None to indicate nothing.\nThis gets commonly\
    \ used with objects to indicate some \"not found\" or error condition.\nFor example,\
    \ let's have a list of objects and a function to search them by name. The function\
    \ should return the object that has a name attribute that matches the name parameter\
    \ to the function.\nBut a question should naturally arise! What if there is no\
    \ object by that name in the list? What should the function return? None is a\
    \ prime candidate here.\n\n```python\nclass Person:\n    def __init__(self, name):\n\
    \        self.name = name\n\n    def __str__(self):\n        return self.name\n\
    \ndef get_person_by_name(person_list, name):\n    \"\"\"Return a person object\
    \ with this name, or None if not found\"\"\"\n    for p in person_list:\n    \
    \    if p.name == name:\n            # If we found them, return the object\n \
    \           return p\n\n    # If we got here, we didn't find anyone by that name\n\
    \    return None\n\nperson_list = [\n    Person(\"Annie\"),\n    Person(\"Beej\"\
    ),\n    Person(\"Chris\")\n]\n\np = get_person_by_name(person_list, \"Chris\"\
    )\n\nprint(p)  # \"Chris\"\n\np = get_person_by_name(person_list, \"Dave\")\n\n\
    if p is None:\n    print(\"Dave's not here.\")\n```\n\n## 11.12 Testing for Attributes\n\
    \nSometimes at runtime, you want to see if an object has an attribute or not.\
    \ Or maybe you have the attribute name as a string and you want to get or set\
    \ that attribute on an object.\nThree built-in functions help make this happen:\n\
    \n- `hasattr()` tests to see if an attribute exists on an object.\n- `getattr()`\
    \ returns the value of an attribute, optionally returning a default value if the\
    \ attribute doesn't exist.\n- `setattr()` sets the value of an attribute, creating\
    \ it if it doesn't exist.\n\nThis gives you more flexibility in writing your objects,\
    \ because then you can have *optional* attributes on them.\n\nLet's demo!\n\n\
    ```python\nclass Foo:\n    pass\n\nf = Foo()\nf.bar = 12\n\nprint(hasattr(f, \"\
    bar\"))    # True\nprint(hasattr(f, \"frotz\"))  # False\n\nprint(getattr(f, \"\
    bar\"))            # 12\nprint(getattr(f, \"frotz\", None))    # None, since attr\
    \ frotz doesn't exist\n\nsetattr(f, \"frotz\", 99)  # Just like saying \"f.frotz\
    \ = 99\"\n\nprint(f.frotz)  # 99\n```\n\nI wouldn't say that these functions get\
    \ a lot of day-to-day use, but they're a powerful thing to add to your toolkit.\n\
    \n## 11.13 Chapter Project\n\nIn case you've forgotten, review the chapter project\
    \ specification at the beginning of this chapter.\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nLooks like we need to store information about a number of\
    \ theaters, as well as information about a number of movies.\n\nAnd a movie might\
    \ be showing in multiple theaters simultaneously.\n\nProblem-solving step: **Devising\
    \ a Plan**\n\nThere are a lot of ways to store this data. But since this chapter\
    \ is all about classes and objects, how about we use those?\n\nLooks like we should\
    \ have a Theater class to handle information about each theater.\n\nAnd a Movie\
    \ class to handle information about each movie.\n\nAnd a theater can be showing\
    \ several movies, so we can give it an attribute that is a list of movies that\
    \ is currently showing there.\n\nWe'll also keep a list of all the theaters and\
    \ a list of all the movies, as well.\n\nProblem-solving step: **Carrying Out the\
    \ Plan**\n\nHere's a theater class. We pass a name to the constructor but initialize\
    \ the movies to an empty list. We can fill them in later.\n\n```python\nclass\
    \ Theater:\n    \"\"\"Holds all the information about a specific theater.\"\"\"\
    \n    def __init__(self, name):\n        self.name = name\n        self.movies\
    \ = []\n```\n\nand a movie class:\n\n```python\nclass Movie:\n    \"\"\"Holds\
    \ all the information about a specific movie.\"\"\"\n    def __init__(self, name,\
    \ duration, genre):\n        self.name = name\n        self.duration = duration\n\
    \        self.genre = genre\n```\n\nSo far so good.\n\nNow we need to instantiate\
    \ a bunch of movies so that we can add them to the theaters‚Äô `.movie` lists.\n\
    \nThere are a couple of things we could do.\n\nWe could use one variable per movie,\
    \ but that‚Äôs a bit unwieldy. Let‚Äôs use some kind of collection, like a list! We‚Äôll\
    \ make one for all the movies and all the theaters. Go ahead and add your favorites.\n\
    \n```python\nmovies = [\n    Movie(\"Star Wars\", 125, \"scifi\"),\n    Movie(\"\
    Shaun of the Dead\", 100, \"romzomcom\"),\n    Movie(\"Citizen Kane\", 119, \"\
    drama\")\n]\n\ntheaters = [\n    Theater(\"McMenamin's Old St. Francis Theater\"\
    ),\n    Theater(\"Tin Pan Theater\"),\n    Theater(\"Tower Theater\")\n]\n```\n\
    \nTake a look in there to see what we‚Äôve done. Notice that `movies` is a list,\
    \ and inside the list, while we‚Äôre initializing it, we‚Äôre constructing new `Movie`\
    \ objects.\n\nAnd we do the same thing with `theaters`. It‚Äôs a list of newly-constructed\
    \ `Theater` objects.\n\nNextly, we need to associate those movies with the theaters\
    \ that are showing them.\n\nRemember that each `Theater` object has a list of\
    \ movies in its `.movies` attribute. So we need to append the movies to that list.\n\
    \nThis next bit is a little cryptic, so make sure\n\n```python\n# McMenamin's\
    \ is showing Star Wars and Shaun of the Dead\ntheaters[0].movies.append(movies[0])\n\
    theaters[0].movies.append(movies[1])\n```\n\nWhat‚Äôs that saying?\n\nWell, take\
    \ it a bit at a time, each line from left to right.\n\nWhat‚Äôs `theaters[0]`?\n\
    \nIf we look in our `theaters` list, we see that‚Äôs McMenamin‚Äôs.\n\nAnd then we\
