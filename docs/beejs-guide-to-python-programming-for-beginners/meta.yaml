  - "[PAGE 136]\n\n# Chapter 13. Reading Files\n\nPerfect. What‚Äôs next?\n\nProblem-solving\
    \ step: **Devising a Plan**\n\nLooks like the next reasonable step is to read\
    \ the file into memory so that we can manipulate it later.\n\nSo a couple of questions:\n\
    \n+   - How do we read a file?\n- What do we store it in?\n\nAs for the first,\
    \ hopefully, you‚Äôve been reading this chapter and know about how to open a file\
    \ for reading and read individual lines from it.\n\nBut how to keep all those\
    \ lines?\n\nThink about all the data structures we‚Äôve talked about so far‚Ä¶ lists,\
    \ dicts, objects‚Ä¶ What is the file the most like?\n\nGo ahead and give it some\
    \ thought before I spoil it in the next couple sentences.\n\nYou might argue that\
    \ each line is like an object. And it is. It wouldn‚Äôt be wrong to have a class\
    \ that represents a line. But somehow you still need to store a list of lines.\n\
    \nGah, what a giveaway!\n\nYeah, a list seems like a good idea. In a way, a text\
    \ file is simply a list of lines.\n\nSo let‚Äôs read the file a line at a time,\
    \ storing each into a list as we go.\n\nThis seems like a self-contained piece\
    \ of code, so I‚Äôm going to go ahead and write a function that accepts a filename\
    \ as an argument, and then returns a list of all the lines in that file.\n\n+\
    \   - Make an empty list\n- Open the file\n- For each line of the file, append\
    \ it to the list\n- Return the list\n\nProblem-solving step: **Carrying Out the\
    \ Plan**\n\n```\ndef read_file(filename):\n    \"\"\"Read a file from disk\"\"\
    \"\n    lines = []\n\n    with open(filename) as f:\n        for line in f:\n\
    \            lines.append(line)\n\n    return lines\n\nif filename is not None:\n\
    \    lines = read_file(filename)\nelse:\n    lines = []\n\n# Print it out just\
    \ to make sure it works right\nprint(lines)\n```\n\nNow if we run that, and specify\
    \ an input filename, it should print out a list with all the lines in that file.\n\
    \nOf course, we need a sample input file. You can make one in VS Code‚Äîjust edit\
    \ a new file called lines.txt and put whatever you want in it. (About five lines\
    \ is good for testing.) If you don‚Äôt want to bother, there‚Äôs a file lines.txt\
    \ in the examples directory‚Åµ.\n\nRunning it, we get our list, just like we wanted!\n\
    \n‚Åµhttps://beej.us/guide/bgpython/source/examples/lines.txt"
- md: "## Chapter 13. Reading Files\n\n```\n$ python lineedit.py lines.txt\n['This\
    \ is line 1\\n', 'This is line 2\\n', 'This is line 3\\n',\n'This is line 4\\\
    n', 'This is line 5']\n\n$ python lineedit.py\n[]\n```\n\nTake a moment to digest\
    \ what we did there: we made a *copy* of the data that was on disk and stored\
    \ that copy in memory.\n\nWhat's next in the big overall plan? Looks like it might\
    \ be time for a user-input loop.\n\nProblem-solving step: **Devising a Plan**\n\
    \nThis is like so many other input loops we've done so far:\n\n- Print a prompt\n\
    - Parse the input\n- Run the command\n- Stop looping when the user says to quit\n\
    \nProblem-solving step: **Carrying Out the Plan**\n\nYour standard input loop.\
    \ All it does is let you type q:\n\n```\n# Main loop\n\ndone = False\n\nwhile\
    \ not done:\n    command = input(\"> \").strip()\n\n    if command[0] == 'q':\n\
    \        done = True\n```\n\nIf you hit RETURN it pukes right away because command[0]\
    \ isn't a thing if the string is empty.\n\nA common thing to do here is just print\
    \ another prompt if the user enters a blank line. We can add this after the input()\
    \ line to do that:\n\n```\n# If the user entered a blank line, just give them\
    \ another prompt\nif command == '':\n    continue\n```\n\nAnd finally, let's add\
    \ some output as an else to tell the user if they input something we didn't recognize:\n\
    \n```\nelse:\n    print(\"unknown command\")\n```\n\nOK! Now if we run it, we\
    \ should be able to handle blank lines, unknown commands, and q for quit.\n\n\
    ```\n$ python lineedit.py lines.txt\n> x\nunknown command\n> \n> \n> q\n$\n```\n\
    \nNot much of an editor so far, but Facebook wasn't built in a day. We're just\
    \ slowly getting the pieces in place.\n\nWhat's a good piece to do next? Lots\
    \ of options, because now we're to the point of implementing the handlers for\
    \ the various commands (besides the one for quitting, which we just did).\n\n\
    Personally, if we have things that display data and things that modify data, I\
    \ prefer to do the ones that display the data first. They‚Äôre less likely to mess\
    \ things up (since we‚Äôre not modifying data), and if you can‚Äôt display the data\
    \ correctly, your odds of modifying it correctly are low, indeed.\n\nSo let‚Äôs\
    \ hit up that ‚Äúlist‚Äù command that will show us lines from the file.\n\nProblem-solving\
    \ step: **Devising a Plan**\n\nThe list command takes a single argument representing\
    \ the line number to start listing from. And then it should list for 10 lines.\n\
    \nSince we have all the lines in a list already, this isn‚Äôt too entirely horrible.\
    \ We just have to:\n\n- Parse the starting position as entered by the user.\n\
    - If they entered a number less than 1, assume they meant 1.\n- Start looping\
    \ from that number, printing out 10 lines.\n- If we hit the last line, stop printing.\n\
    \nSince we have all these different kinds of functionality, let‚Äôs put them in\
    \ individual functions to keep the code well organized.\n\nWe‚Äôll make a `handle_list()`\
    \ function that is called when the user asks to list the file. It‚Äôll take a couple\
    \ of arguments: the arguments the user typed after a command, as well as the list\
    \ of lines we‚Äôre going to manipulate.\n\nProblem-solving step: **Carrying Out\
    \ the Plan**\n\nFirstly, let‚Äôs check and see if the user wants to list lines by\
    \ checking to see if the first letter of the command is `l`. If it is, then *it‚Äôs\
    \ on*.\n\nBut there‚Äôs an argument after the `l`, right? The user has to specify\
    \ which line to start listing from. And we have to get that into our `handle_list()`\
    \ function somehow.\n\nSo let‚Äôs do two things. Let‚Äôs parse those arguments, if\
    \ any, out of the overall command. We‚Äôll use `split()` to break the command apart\
    \ on spaces, and then we‚Äôll use a slice from `[1:]` (that is, from the second\
    \ element to the end) to get all the arguments.\n\nThe result will have any arguments\
    \ following the command in a list, or an empty list if there were no arguments.\n\
    \nAnd then we‚Äôll pass that to our handler function:\n\n```\n# Grab the arguments\
    \ after the command\nargs = command.split(\" \")[1:]\n\nif command[0] == 'q':\n\
    \    done = True\n\n# List lines\nelif command[0] == 'l':\n    handle_list(args,\
    \ lines)\n```\n\nAnd let‚Äôs code up a stub‚Å∂ of the function to handle it, just\
    \ to see if it‚Äôs working:\n\n```\ndef handle_list(args, lines):\n    print(f'Handle\
    \ list: {args}, {lines}')\n```\n\nRunning, we get this:\n\n```\n$ python lineedit.py\
    \ lines.txt\n> l\nHandle list: [], ['This is line 1\\n', 'This is line 2\\n',\n\
    'This is line 3\\n', 'This is line 4\\n', 'This is line 5\\n']\n> l 99\n```\n\n\
    > ‚Å∂A function stub is a callable function that takes all the same arguments and,\
    \ if necessary, returns a sensible value. But it doesn‚Äôt, in fact, do anything\
    \ of use. It‚Äôs a good way to test that your overall call flow is working right.\
    \ And it gives you a nice, easy TODO spot to fill out.\n\nHandle list: ['99'],\
    \ ['This is line 1\\n', 'This is line 2\\n', 'This is line 3\\n', 'This is line\
    \ 4\\n', 'This is line 5\\n']\n\nSo you can see that the lines are all coming\
    \ in right. But, more importantly, our *argument* is coming in right.\n\nIn the\
    \ first call, it prints out as [] empty.\n\nBut on the second, we see ['99'] which\
    \ is the number we told it to list.\n\nWe just have to extract that number somehow.\n\
    \nBut before we do, we'd better test to see if the user entered an argument at\
    \ all. It's required for the list command, after all.\n\nThen we'll use the start\
    \ and end lines to print out everything in between.\n\n```\ndef handle_list(args,\
    \ lines):\n    if len(args) == 1:\n        # Compute start and end lines\n   \
    \     start = int(args[0])\n        end = start + 10  # print 10 lines\n    else:\n\
    \        print(\"usage: l line_num\")\n        return\n\n    # Print all the lines\n\
    \    for i in range(start, end):\n        # end=\"\" to suppress newlines (since\
    \ lines already have them)\n        print(f'{i}: {lines[i]}', end=\"\")\n```\n\
    \nNow, if we run this, we see a problem:\n\n```\n$ python lineedit.py lines.txt\n\
    > l 1\n1: This is line 2\n2: This is line 3\n3: This is line 4\n4: This is line\
    \ 5\nTraceback (most recent call last):\n  File \"lineedit.py\", line 71, in <module>\n\
    \    handle_list(args, lines)\n  File \"lineedit.py\", line 43, in handle_list\n\
    \    print(f'{i}: {lines[i]}', end=\"\")\nIndexError: list index out of range\n\
    ```\n\nSo clearly things have gone awry. There's that huge error message that's\
    \ dominating the accident scene and it's hard to notice anything else other than\
    \ the lines of the file being printed at the top.\n\nAt least nothing went wrong\
    \ before that error, right?\n\n...Or *did* it?\n\nNotice anything weird about\
    \ those first printed lines? Sure, the numbers start at 1, but the first line\
    \ says This is line 2! That sets off some alarm bells. (Especially since when\
    \ you opened the file in your real editor, you see the first line says This is\
    \ line 1.)\n\nProblem-solving step: **Understanding the Problem**.\n\nWe have\
    \ two problems.\n\n1. That list index out of range error\n2. Our *off-by-one error*<sup>7</sup>\
    \ that's causing our lines to be off by one.\n\nYes, off-by-one errors are famous\
    \ enough to have their own Wikipedia page.\n\nAs the name suggests, our computations\
    \ are one-off. But why? How?\n\nThis is a really common disagreement between humans\
    \ and computers. We humans like to have our lists start at index ‚Äú1‚Äù, and computers\
    \ like them to start at index ‚Äú0‚Äù. It‚Äôs the age-old battle. Even the Romans started\
    \ with ‚ÄúI‚Äù, but that was mainly because Roman numerals didn‚Äôt have a character\
    \ for zero until 725 AD‚Äîlatecomers!\n\nAnd in this case, we have a human entering\
    \ numbers that start indexing at ‚Äú1‚Äù. And we print them out for the human to see\
    \ starting with index ‚Äú1‚Äù‚Ä¶\n\nBut in Python, the lines are in a list starting\
    \ from index ‚Äú0‚Äù!\n\nProblem-solving step: **Devising a Plan**\n\nWe need to do\
    \ some math.\n\n- When we want to go from a human (1-based) index to a computer\
    \ (0-based) index, we *subtract* one from the number. 1 becomes 0.\n- When we\
    \ want to go from a computer (0-based) index to a human (1-based) index, we *add*\
    \ one from the number. 0 becomes 1.\n\nSince we‚Äôre using `start` and `end` to\
    \ index the list, I feel a bit better having them 0-based because the list is\
    \ 0-based.\n\nThere‚Äôs a general rule of thumb at play here:\n\n- When a user enters\
    \ a 1-based number, convert it to 0-based as soon as you can for internal use\
    \ in the program.\n- When you have to display a 1-based number, keep it 0-based\
    \ for as long as you can, and only convert it at the last second when you output\
    \ it.\n\nKeeping these conversions to a minimum and doing them only on input and\
    \ output can save you a lot of headaches.\n\nWhat **not** to do: don‚Äôt just jump\
    \ in and start adding +1s and -1s all over the place and hoping for the best.\
    \ That way lies madness, assuredly. Stop, understand, and plan. And then carry\
    \ it out.\n\nProblem-solving step: **Carrying Out the Plan**\n\nI‚Äôm going to write\
    \ a little helper function here to convert from 0-based to 1-based since I think\
    \ we‚Äôre going to be using this all over the place. And it helps clarify the code\
    \ a bit; instead of having a bunch of +1s and -1s all over, you have a function\
    \ name that has some meaning to future readers.\n\n```\ndef one_to_zero(n):\n\
    \    \"\"\"Convert a number from a 1-based index to a 0-based index.\"\"\"\n \
    \   return n - 1\n```\n\nAnd now we can make use of that. Let‚Äôs make `start` 0-based\
    \ and try it out.\n\n```\nstart = one_to_zero(int(args[0]))\n```\n\nNow running\
    \ it gives:\n\n```\n$ python lineedit.py lines.txt\n> l 1\n0: This is line 1\n\
    1: This is line 2\n2: This is line 3\n3: This is line 4\n4: This is line 5\nTraceback\
    \ (most recent call last):\n  File \"lineedit.py\", line 76, in <module>\n```\n\
    \n<sup>7</sup>https://en.wikipedia.org/wiki/Off-by-one_error"
