    # 18.2 Number Bases


    These ‚Äúnumber languages‚Äù actually have names for convenience. Human numbers are
    called Jeff, and computer numbers, Alice.


    I‚Äôm kidding. That‚Äôs completely false‚Äîthey‚Äôre not named that.


    Human numbers are called *decimal* numbers.


    Computer 1-and-0 numbers are called *binary* numbers.


    We also refer to these numbers by something called their *base*. This basically
    means ‚Äúthe number of digits this number system has‚Äù.


    In decimal, we have 10 digits: 0-9. So decimal is a *base 10* numbering system.


    In binary, we have 2 digits: 0 and 1. So binary is a *base 2* numbering system.


    As we saw in the previous section, 7 in decimal (base 10) is the same as 111 in
    binary (base 2).


    And we also saw that as we counted up in any numbering system, when we ran out
    of digits, we had to add another place to create higher-valued numbers.


    There are other number bases in use. In fact, for any number you can think of,
    you can use that as a base for a numbering system. Base 3. Base 3490. Base 27.
    Whatever you want. Of course, a base 3490 numbering system will have 3490 different
    digits, so I don‚Äôt know what you‚Äôre going to use for those‚Ä¶ you‚Äôll have to come
    up with a lot of new shapes to draw numbers with.


    Base 8, AKA *octal*, isn‚Äôt that common any longer, but used to be used by programmers
    consistently. Since it‚Äôs base 8, it has the digits 0-7 available to use. When
    you use them up, you have to add another place, the 8s place.


    Notice how when you add a second place when you‚Äôre adding up, the value of that
    place is the base!


    When you run out of digits with decimal (base 10), you add the 10s place.


    When you run out of digits with binary (base 2), you add the 2s place.


    When you run out of digits with octal (base 8), you add the 8s place.


    More generally, the place value is the base to the power of how many digits you
    are from the right of the number, just counting up.'
