    # 6.6 The Almighty if Statement


    Problem-solving step: **Understanding the Problem.**

    It''s all well and good for Python to tell me that 1 < 5 is True, but how can
    we actually use that to make choices in a program?

    Let''s consider a small program that will let the user input a number and it will
    tell the user if the number is between 50 and 59, inclusive.

    Before coding, let''s think about how to approach it. If the number is stored
    in x, what would the Boolean expression in Python be that would be True if x were
    between 50 and 59?

    I''m talking ands and ors and nots and <s and >s... not necessarily all of them,
    but the ones needed.

    Did you get it? Spoilers ahead!


    ```

    x >= 50 and x <= 59  # True if x in that range!

    ```


    Let''s take that knowledge and turn it into a complete program‚Å¥ using if, and
    then we can take it apart in more detail:


    ```

    1 x = input("Enter a number: ")

    2 x = float(x)

    3

    4 if x >= 50 and x <= 59:

    5     print(x, "is between 50 and 59, inclusive")

    6     print("Well done!")

    7 else:

    8     print(x, "is not between 50 and 59, inclusive")

    ```


    So if x >=50 and x <= 59 is True, then we execute the *block* that is indented
    afterward.


