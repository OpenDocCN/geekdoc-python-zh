  - '[PAGE 183]


    Chapter 17. Appendix C: Assignment Behavior


    178


    When you call a function, all the arguments passed to the function are assigned
    into the parameters in the parameter list.


    That assignment, even though it doesn''t use the = assignment operator, behaves
    in the same way, nonetheless.


    In the following example, both x and a refer to the same object... right up to
    the moment we reassign x on line 4. At that point, x refers to a different list,
    but a still refers to the original.


    ```

    1 def foo(x):

    2     x[1] = 99  # x still refers to the same list as a

    3

    4     x = [4, 5, 6]  # x refers to a different list than a, now

    5

    6 a = [1, 2, 3]

    7 foo(a)

    ```


    # 17.2 Is Any of This True?


    Yes, believe it!


    We can verify it in the REPL with the built-in id() function and the is operator.


    The id() function will give us the location in memory where a thing (like a string
    or number) that a variable refers to is stored. If two variables return the same
    ID, they must be pointing to the same thing in memory.


    Let''s try in the REPL:


    ```

    >>> s = "Beej!"

    >>> t = s

    >>> id(s)

    140156808252976

    >>> id(t)

    140156808252976

    ```


    The exact number doesn''t matter (it will vary), but what matters is that they''re
    identical. Both s and t refer to the entity in memory at that location, namely
    the string "Beej!".


    You could compare those numbers to determine if both variables point to the same
    thing:


    ```

    >>> id(s) == id(t)

    True

    ```


    but there''s a shorthand for that with the is operator:


    ```

    >>> s is t

    True

    ```


    Note that it''s typically only want you assign from one variable to another that
    they refer to the same thing. If you assign to them independently, they typically
    won''t:


    ```

    >>> s = "Beej!"

    >>> t = "Beej!"

    >>> s is t

    False

    ```


    In the above example, there are two strings in memory with value "Beej!".


    I recognize that I said "typically" a bunch up there, and that should rightfully
    raise a bunch of "Beej is hand-waving" red flags.


    The actual details get a bit more gritty, but if you want to stop with what we''ve
    said up there, you''re good.


    "No, keep going down the rabbit hole!"


    Okay then!'
  - '[PAGE 184]


    # 17.3 Python Compiler Optimizations


    If you take this example from the REPL, above:


    ```

    >>> s = "Beej!"

    >>> t = "Beej!"

    >>> s is t

    False

    ```


    and you put it in a python program, like `test.py`:


    ```

    s = "Beej!"

    t = "Beej!"

    print(s is t)

    ```


    and run it from the command line, you''d think you''d get `False`, just like in
    the REPL. Wrong!


    ```

    $ python test.py

    True

    ```


    What gives? Why is it `False` in the first case and `True` in the second? Well,
    in the latter case, the Python interpreter is getting a little clever. Before
    it even runs your code, it analyzes it. It sees that you have two "Beej!" strings
    in there, so it just makes them the same one to save you memory. Since strings
    are immutable, you can''t tell the difference.


    # 17.4 Internment


    In that same example, above:


    ```

    >>> s = "Beej!"

    >>> t = "Beej!"

    >>> s is t

    False

    ```


    what if we use a different string, like "Alice"?


    ```

    >>> s = "Alice"

    >>> t = "Alice"

    >>> s is t

    True

    ```


    True?? What''s up with that? Why does Alice get special treatment?


    Or look at this:


    ```

    >>> x = 257

    >>> y = 257

    >>> x is y

    False

    ```


    which is fine‚Äîbut then check this out, with 256 instead of 257:


    ```

    >>> x = 256

    >>> y = 256

    >>> x is y

    True

    ```


    True, again?


    We''re getting into a deep language feature of Python called *internment*. Basically
    Python makes sure to only have one copy in memory of certain, specific values
    of data.


    For these values, all variables will refer to the same item in memory.


    They are:


    +   - Integers between -5 and 256 inclusive.'
  - '[PAGE 185]


    # Chapter 17. Appendix C: Assignment Behavior


    180


    +   - Strings that contain only letters, numbers, or underscores.

    - The None object.


    This is why "Beej!" isn''t interned (because it contains punctuation), and why
    "Alice" *is* interned.


    You can intern your own strings with `sys.intern()` for dictionary lookup optimization,
    but that''s something 99.99999% of the Python programming populace will never
    bother doing.'
