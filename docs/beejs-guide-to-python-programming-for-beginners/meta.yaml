    # 13.4 Reading Files, The Classic Way


    Problem-solving step: **Understanding the Problem.**


    In many programming languages, there are three steps to reading a file:


    +   1. Open the file for reading.

    2. Read data from the file.

    3. Close the file.


    This is super-duper common.


    What does it mean to ‚Äúopen‚Äù and ‚Äúclose‚Äù the file?


    Well, it‚Äôs analogous to when you open the file in your editor, and then close
    it.


    ‚ÄúOpening‚Äù is asking the *operating system*¬π (OS) to give you access to the file.
    You can open for reading, for writing, or both.


    For this section, we‚Äôll want to ask the OS to open the file for reading.


    ‚ÄúClosing‚Äù the file is the opposite of opening. We‚Äôre telling the OS that we‚Äôre
    done with the file. The OS does any cleanup it has to. You should always close
    any files you open. (All files that you open will automatically be closed when
    your program completes its run, but you still should explicitly close them anyway¬≤.)


    And ‚Äúreading‚Äù is actually pulling the data from the file on disk into strings
    in memory.


    Problem-solving step: **Devising a Plan**


