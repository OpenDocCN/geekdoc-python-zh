    \ Later on, we'll talk about how to write our own.\n\n## 10.10 Interlude: Evaluation\
    \ Strategies\n\nIf you don't want to read this section, it's OK to skip. But it's\
    \ more fun if you read it.\n\nDifferent languages have different behaviors when\
