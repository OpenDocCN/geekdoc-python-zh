    for i in range(num_ships):\n    print(f'{i:8}', end=\"\")\nprint()\n```\n\nAnd\
    \ now we have this:\n\n```\n                0       1       2\n0   99.99   99.99\
    \   99.99\n1   99.99   99.99   99.99\n2   99.99   99.99   99.99\n```\n\nwhich\
    \ is looking *right on*. Except that all the distances are listed as 99.99. Let's\
    \ get that out of there and replace it with the real distance between the ships.\n\
    \nProblem-solving step: **Devising a Plan**\n\nDistance! We see the distance formula\
    \ up there at the top, repeated here:\n\n$d = \\sqrt{(x_0 - x_1)^2 + (y_0 - y_1)^2\
    \ + (z_0 - z_1)^2}$\n\nHow do we turn that into code?\n\nWe could use `math.sqrt()`\
    \ to get the square root, and `math.pow()` to square the numbers.\n\nAnother option\
    \ is to compute, say, the difference in the X coordinates and then multiply that\
    \ result by itself to square it (since $x \\times x = x^2$).\n\nLet's code them\
    \ both and then use the one you like best.\n\nProblem-solving step: **Carrying\
    \ Out the Plan**\n\nHere's computing the distance between points p0 and p1 (both\
    \ of which are lists of X,Y,Z triples) using `math.pow()`:\n\n```\nd = math.sqrt(\n\
    \    math.pow(p0[0] - p1[0], 2) +  # difference in Xs\n    math.pow(p0[1] - p1[1],\
    \ 2) +  # difference in Ys\n    math.pow(p0[2] - p1[2], 2)    # difference in\
    \ Zs\n)\n```\n\nAnd here's option two:\n\n```\ndx = p0[0] - p1[0]   # difference\
    \ in the Xs\ndy = p0[1] - p1[1]   # difference in the Ys\ndz = p0[2] - p1[2] \
    \  # difference in the Zs\n\nd = math.sqrt(dx*dx + dy*dy + dz*dz)\n```\n\nWhich\
    \ do you prefer? Both should give equivalent answers."
