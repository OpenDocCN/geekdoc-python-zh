    \n# 11.3 What Problem Are We Even Trying To Solve?\n\nProblem-solving step: **Understanding\
    \ the Problem.**\nLet‚Äôs first learn about the problem we‚Äôre trying to solve, and\
    \ then let‚Äôs take a look at how classes and objects can help us solve it.\nOkay,\
    \ I said ‚Äúproblem‚Äù, but it‚Äôs actually multiple problems. Let‚Äôs start with the\
    \ easier one.\nOkay, I said ‚Äúeasier‚Äù, but really they‚Äôre the same.\n*Get on with\
    \ it!*\nLet‚Äôs pretend you have a game where you have a starship that has multiple\
    \ attributes. For example, it might have two attributes: XYZ coordinates in 3-space\
    \ (e.g. [10, 20, 30]), and a ship name (e.g. \"USS Enterprise\").\nThese two pieces\
    \ of information are clearly related. They apply to one single instance of a starship.\n\
    If we have multiple starships in the universe, they‚Äôll each have their own names\
    \ and coordinates.\nSo far so good?\nNow‚Ä¶ how do we store that data with what\
    \ we know so far?\nWell, we have lists, so let‚Äôs try with those. We‚Äôll have three\
    \ starships with different names and different locations:\n\n```\nship_location\
    \ = [\n    [10, 20, 30],\n    [-10, 20, -30],\n    [10, -20, 30]\n]\n\nship_name\
    \ = [\n    \"MCRN Tachi\",\n    \"Red Dwarf\",\n    \"USCSS Nostromo\"\n]\n```\n\
    \nAnd then we can access ship #1 like this:\n\n```\nprint(ship_name[1])\nprint(ship_location[1])\n\
    ```\n\nSo we have two lists, one for name and one for location¬π.\nIt works, but\
    \ it‚Äôs a bummer to have to maintain two (or more) lists this way. If we ever added\
    \ a ship, we have to be sure we add all the information to all the lists and make\
    \ sure things don‚Äôt get out of order. It‚Äôs easy to make a mistake and get the\
    \ lists out of sync.\nWhat would be nice is if we could bundle all the information\
    \ about one single ship into one single *object* that held the information about\
    \ just that one ship. Other ships would be represented by other objects. And then\
    \ we‚Äôd have a list of those objects‚Äîjust one list to maintain!\n\n# 11.4 What\
    \ are Classes and Objects?\n\nProblem-solving step: **Understanding the Problem.**\n\
    \n¬πThis technique is called *parallel arrays* or, in the case of Python, *parallel\
    \ lists*. It‚Äôs not a popular technique today, having been made obsolete by the\
    \ very thing we‚Äôre talking about in this chapter."
