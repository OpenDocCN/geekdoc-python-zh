    # 3.4 Running IDLE


    Here‚Äôs where we get to run the IDE for the first time. First we‚Äôll look at how
    to do it on various platforms, and then we‚Äôll run some Python code in it.


    Running IDLE depends on the platform:


    | Platform | Commands |

    | :--- | :--- |

    | Windows | Hit the Start menu and type ‚Äúidle‚Äù. It should show up in the pick
    list and you can click to open it. |

    | Mac | Hit CMD-SPACE and type ‚Äúidle‚Äù. It should show up in the pick list and
    you can click to open it. |

    | Unix-like | Type `idle` in the terminal or find it in your desktop pulldown
    menu. |


    If you run `idle` on the command line and it says something about the command
    not being found, try running `idle3`.


    If you get an error on the command line that looks like this:


    ```

    ** IDLE can''t import Tkinter.

    Your Python may not be configured for Tk. **

    ```


    you‚Äôll have to install the Tk graphical toolkit. This might be a package called
    `tk` or maybe `python-tk`. If you‚Äôre on a Unix-like, search for how to install
    on your system. On a Mac with Homebrew, you can `brew install python-tk`.


    If you get another error, cut and paste that error into your favorite search engine
    to see what other people say about how to solve it.


    Once IDLE is up, you should see a window that looks vaguely like this:


    # 3.5 Your First Command


    In the IDLE window after the `>>>` prompt, type:


    ```

    print("Hello, world!")

    ```


    and hit RETURN. This commands Python to output the words ‚ÄúHello, world!‚Äù.


    ```

    >>> print("Hello, world!")

    Hello, world!

    ```'
