    \ statement.\n\nHow can we tell if a number is odd?\n\nThere‚Äôs a very common way\
    \ to do this. Divide by 2 and take the remainder. If the remainder is 1, it‚Äôs\
    \ odd. If it‚Äôs 0, it‚Äôs even.\n\nDo you remember how to take the remainder in Python?\
    \ With the *modulo* operator: `%`.\n\n```\nx = 12\n\nif x % 2 == 0:\n    print(\"\
    x is even!\")\nelse:\n    print(\"x is odd!\")\n```\n\nSo our plan is shaping\
    \ up like this:\n\n```\nfor each element in the list:\n    if that element is\
