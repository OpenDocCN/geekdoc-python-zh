    # # Chapter 2


    # # What is Programming, Anyway?


    # ## 2.1 Objectives


    +   - Be able to explain what a programmer does

    - Be able to explain what a program is

    - Be able to summarize the four big steps in solving problems


    # ## 2.2 More Terminology Than You Wanted


    Let‚Äôs say you‚Äôre entirely new to this stuff. You have a computer, you know how
    to use it, but you don‚Äôt know how to make it do exactly what you want it to.


    It‚Äôs the difference between a *user* and a *programmer*, right?


    But what does it mean to *program* a computer?


    In a nutshell, you have a goal (what you want to compute), and programming is
    the way you get there.


    A *program* is a description of a series of steps to complete that computation,
    blah blah blah‚Ä¶


    Okay‚Äîinstead think of a sequence of steps that you have to do to do *anything*.
    Like baking cookies for example.


    > **Fun Computing Fact:** *everyone likes yummy cookies.*


    You often have that sequence of steps, that recipe, written down on a piece of
    paper. By itself, it‚Äôs definitely not cookies. But when you apply a number of
    kitchen implements and ingredients and an oven to it, pretty soon you have some
    cookies.


    Of course, in that case, *you* have to do the work. With programming, the computer
    does the work for you. But you have to write down the recipe.


    The recipe *is* the program. Programming is the act of writing down that recipe
    so the computer can execute it. And get those cookies baked.


    Mmmm. Cookies.


    Some programs are simple. ‚ÄúAdd up these 12 numbers‚Äù is an example. It‚Äôs a breeze
    for the computer to do that.


    But others are more complicated. They can extend into millions of lines long,
    or even tens of millions, written by large teams over many years. Think triple-A
    video game titles or the Linux operating system.


    When you‚Äôre first starting, large programs like that seem impossible. But here‚Äôs
    the secret: each of those large programs is made up of smaller, well-designed
    building blocks. And each of those building blocks is made up of smaller of the
    same.


    And when you start learning to be a programmer, you start with the smallest, most
    basic blocks, and you build up from there.'
- md: "## Chapter 2. What is Programming, Anyway?\n\nAnd you keep building! Writing\
    \ software is a lifelong learning process. There are *always* new things to learn,\
    \ new technologies, new languages, new techniques. It‚Äôs a craft to be developed\
    \ and perfected over a lifetime. Sure, at first you won‚Äôt have that many tools\
    \ in your toolkit. But every moment you spend working on software gives you more\
    \ experience solving problems and gives you more methods to attack them.\n\n###\
    \ 2.3 What‚Äôs This Talk About Problem Solving?\n\nIn other words, I know what I\
    \ want to see‚Ä¶ how do I get there with the tools I know?\n\nThere‚Äôs a great scene\
    \ in the movie Apollo 13¬π that I love. The CO‚ÇÇ scrubbers on the command module\
    \ are spent, and the team wants to use the scrubbers from the lunar module to\
    \ replace them. But the former are round, and the latter are square and won‚Äôt\
    \ fit. Of course, the spacecraft has limited resources to repair it‚Äîjust miscellaneous\
    \ stuff on board that was meant for the mission.\n\nOn the ground, the team has\
    \ all those items at hand, and they dump them on a table. A staff member holds\
    \ up a square scrubber and a round scrubber and tells everyone, ‚ÄúWe gotta find\
    \ a way to make *this* fit into the hole for *this*.‚Äù He then gestures toward\
    \ the table, adding, ‚ÄúUsing nothing but *that*.‚Äù\n\nAnd that‚Äôs what programming\
    \ is like, except, obviously and fortunately no lives are at stake. (Typically.)\n\
    \nYou have a limited set of programming techniques at your disposal, and you have\
    \ the goal that you want to achieve. How can you get to that goal using only those\
    \ tools? It‚Äôs a puzzle!\n\n### 2.4 So How To Solve It?\n\n> *Fun Programming Fact:*\
    \ Most devs have no idea how to solve a problem when they‚Äôre first presented with\
    \ it. They have to systematically attack it.\n\nProgrammers fully intend to use\
    \ a well-reasoned approach to solving arbitrary problems. In reality, they often\
    \ run off in high spirits and dive right into coding before they‚Äôve done some\
    \ of the very important preliminary work, but since they love programming so much\
    \ they don‚Äôt seem to mind wasting time.\n\n(And it‚Äôs not a waste of time because\
    \ every second you‚Äôre programming, you‚Äôre learning!)\n\nBut lots of *bosses* do\
    \ consider unplanned development to be a waste of time. Time is also known as\
    \ ‚Äúmoney‚Äù to the company that hired you. And the only thing more precious to a\
    \ company than money is more money.\n\nImagine that you said, ‚ÄúI want to build\
    \ an airplane!‚Äù and ran off and bought a pile of tools and metal and rivets and\
    \ levers and started bolting it together immediately. You might find after a while\
    \ that, oh you should have figured out how big the engine was before you built\
    \ the fuselage, but, hey, no problem, you have time. You can just rebuild the\
    \ fuselage. So you do. But now the canopy doesn‚Äôt fit. So you have to rebuild\
    \ it again, and so on.\n\nYou could have saved a lot of time by actually *planning*\
    \ what you were going to do before you started building.\n\nIt‚Äôs the same with\
    \ software.\n\n> *Fun Programming Proverb:* Hours of debugging can save you minutes\
    \ of planning.\n\nThere are several problem-solving frameworks out there. These\
    \ are blueprints for how to approach a programming problem and solve it, even\
    \ if you have no idea how to solve it when you first see it.\n\nOne of my favorite\
    \ problem-solving frameworks was popularized by mathematician George P√≥lya in\
    \ 1945 in his book *How To Solve It*. It was originally written for solving math\
    \ problems, but it‚Äôs surprisingly effective at solving just about anything. The\
    \ Four Main Steps are:\n\n1.  **Understanding the Problem.** Get clarity on all\
    \ parts of the problem. Break it down into subproblems, and break those subproblems\
    \ down. If you don‚Äôt understand the problem, any solutions you come up with will\
    \ be solving the wrong problem! You know you understand the problem when you can\
    \ explain it to someone completely.\n\n2.  **Devising a Plan.** How are you going\
    \ to attack this with the tools you have at your disposal and the techniques you\
    \ know? You know you‚Äôre done making a plan when you‚Äôre able to easily convert\
    \ your plan into code.\n\n    Often when planning you realize there‚Äôs something\
    \ about the problem you don‚Äôt fully understand. Just for a bit, pop back to Step\
    \ 1 until it‚Äôs clear, then come back to planning.\n\n3.  **Carrying out the plan.**\
    \ Convert your plan into code and get it working.\n\n    Often in this phase,\
    \ you find that there was either something you didn‚Äôt understand or something\
    \ the plan didn‚Äôt account for. Drop back a step or two until it‚Äôs resolved, then\
    \ come back here.\n\n4.  **Looking Back.** Look back on the code you got working,\
    \ and consider what went right and what went wrong. What would you do differently\
    \ next time? What techniques did you learn while writing the code? Was there any\
    \ place you could have structured things better, or anyplace you could have removed\
    \ redundant code?\n\nWhat‚Äôs neat about this is that developers apply the steps\
    \ of problem-solving to the *entire program*, and they also apply it to the smaller\
    \ problems *within the program*. A big computing problem is always composed of\
    \ many subproblems! The problem-solving framework is used within the problem-solving\
    \ framework!\n\nAn example of a real-life problem might be ‚Äúbuild a house‚Äù. But\
    \ that‚Äôs made up of subproblems, like ‚Äúbuild a foundation‚Äù and ‚Äúframe the walls‚Äù\
    \ and ‚Äúadd a roof‚Äù. And those are made up of subproblems, like ‚Äúgrade the lot‚Äù\
    \ and ‚Äúpour concrete‚Äù.\n\nIn programming, we break down problems into smaller\
    \ and smaller subproblems until we know how to solve them with the techniques\
    \ we know. And if we don‚Äôt know a technique to solve it, we go and learn one!\n\
    \nBeing a developer is the same as being a problem solver. The problems ain‚Äôt\
    \ easy, but that‚Äôs why it pays the big bucks.\n\nSo you should expect that any\
    \ time you see a programming problem in this book, on a programming challenge\
    \ website, at school, or work, that the answer will not be obvious. You‚Äôre going\
    \ to have to work hard and spend a lot of time to get through the first problem-solving\
    \ steps before you‚Äôll even be ready to start coding.\n\n### 2.5 What is Python?\n\
    \nPython is a *programming language*. This means it‚Äôs vaguely readable by humans,\
    \ and completely readable by a machine. (As long as you don‚Äôt make the tiniest\
    \ mistake!) This is a good combination, since people are bad at reading the actual\
    \ 1011010100110 code that machines use. We use these *higher-level* languages\
    \ to help us get by.\n\nIn this case, another piece of software called the Python\
    \ *interpreter* takes the code we write in the Python language and runs it, performing\
    \ the operations we‚Äôve requested.\n\nSo before we begin, we need to install the\
    \ Python interpreter. This is one of the most annoyingly painful parts of the\
    \ whole book, but luckily it only has to be done once.\n\nOkay, gang! Let‚Äôs get\
    \ it‚Ä¶ over with!\n\n‚Ä¶I really need to work on the end of that inspirational speech.\n\
    \n### 2.6 Summary\n\n- A programmer is a problem solver. They then write programs\
    \ that implement a solution to that problem.\n- A program is a series of instructions\
    \ that can be carried out by a computer to solve the problem.\n- The main problem-solving\
    \ steps are: Understand the Problem, Devise a Plan, Carry out the Plan, Look Back.\n\
    \n## Chapter 3. What software will I need?\n\n### 3.1 Objectives\n\n- Install\
    \ Python, and explain what it does.\n- Learn what an *Integrated Development Environment*\
    \ (IDE) is.\n\n### 3.2 What Is All This?\n\nPython is a *programming language*.\
    \ It interprets instructions that you, the programmer, give it, and it executes\
    \ them. Think of it like a robot you can give a series of commands to ahead of\
    \ time, and then have it run off and do them on its own.\n\nIn programmer parlance,\
    \ we call these sets of instructions *code*.\n\nIn addition to being a programming\
    \ language, Python is also a program, itself! It's a program that runs other programs!\
    \ We don't have to worry about the details of that at all, except that since Python\
    \ is a program, it's something we'll have to install on our computers.\n\nPython\
    \ comes in different versions. The big versions are 2 and 3. We'll be using Python\
    \ 3 for everything in this book. Python 2 is older, and is rarely used in new\
    \ projects.\n\nPython also comes with an *Integrated Development Environment*,\
    \ or IDE. An IDE is a program that helps you write, run, and debug (remove the\
    \ errors from) code.\n\nIts main components are:\n\n- The *editor*. This is like\
    \ a word processor except specifically designed for use with code.\n- The *debugger*.\
    \ This helps you step through your code a line at a time and watch the data values\
    \ change as you go. It can help you find places where your code is incorrect.\n\
    - The *console* or *terminal*. This is a window where the output from your program\
    \ appears (and where you might type input to the program).\n\nThe name of Python's\
    \ built-in IDE is *IDLE*. There are other IDEs we'll talk about later.\n\n###\
    \ 3.3 Installing Python\n\n#### 3.3.1 Windows\n\nThere are two ways to do this:\n\
    \n- Install from the Microsoft Store.\n- Install from the official website.\n\n\
    I can't see any disadvantage to installing it from the store. Just remember to\
    \ install Python 3 (not Python 2)."
