    # Chapter 19


    ## Accelerating Beyond IDLE


    ### 19.1 Objectives


    - Install a real IDE

    - Learn about the *command line*.

    - Get your terminal/shell up and running, and explain how it‚Äôs used


    ### 19.2 What with the What Now?


    We‚Äôve been using IDLE to edit code, and that‚Äôs fine to get started. But it‚Äôs a
    little bit underpowered for getting to the next level when it comes to programming.


    In this section, we‚Äôll look at some tools that professional programmers use to
    get the job done.


    ### 19.3 The Terminal


    Back in the day, people accessed mainframes through dedicated pieces of hardware
    called *terminals*. These looked like old TV sets with keyboards attached. Screens
    were typically monochrome, either white, green, or amber colored, with pixely
    text.


    Barely anyone has a real terminal anymore, but they have programs called *terminal
    emulators* that pretend to be terminals. In fact, real terminals are so rare,
    and terminal emulators are so common, if you hear someone say ‚Äúterminal‚Äù, they‚Äôre
    certainly talking about a terminal emulator.


    So a terminal emulator is a program you run that gives you a text window to interact
    with your computer.


    You know how you point, click, and drag with the mouse to command your computer
    to do things? We‚Äôre going to do the same things, except we‚Äôre going type commands
    in to get them done, instead.


    #### 19.3.1 The Shell


    Sometimes you‚Äôll hear people talk about the ‚Äúshell‚Äù and ‚Äúterminal‚Äù interchangeably.


    Technically, though, the terminal is what you launch, and then the terminal immediately
    launches another program, the *shell*, that you interact with.


    > The terminal is pretty dumb on its own. All it does is handle input from the
    keyboard and output to its ‚Äúscreen‚Äù. It‚Äôs the middleperson between you and the
    shell. The shell is the real brains of the outfit.


    The shell is a program that takes your typed-in commands and executes them, and
    tells you if something went wrong.


    The most popular shell program on Unix-likes and Macs is the *Bourne Again Shell*
    (Bash)¬π, although the *Z-shell* (Zsh) is growing in popularity. Bash is known
    by a $ prompt (sometimes prefixed with other information about which directory
    you‚Äôre in, or something similar). Zsh uses a % prompt.


    There are multitudes of shells, but we‚Äôll just assume you‚Äôre going to use Bash
    or Zsh (with a hat-tip to Windows‚Äôs built-in shells), and they‚Äôre compatible enough
    for our purposes.


    #### 19.3.2 Windows Terminals and Shells


    For Windows, there are plenty of options, some of which you have installed already.


    - **CMD**: classic shell with origins way back in the MS-DOS days.

    - **PowerShell**: a new, more powerful shell.

    - **Bash via Git**: the famous Git¬≤ software package has a bash shell called,
    appropriately, ‚Äúgitbash‚Äù.

    - **Bash via WSL**: if you install WSL (below), it uses bash, as well.


    Unless you‚Äôre going with one of the bash options, you should use PowerShell because
    it‚Äôs newer, better, and maintained.


    Almost all of the bash commands we use in this guide also work in PowerShell and
    CMD.


    Hitting the Windows key and running `cmd` will bring up the CMD prompt. (Type
    `exit` to get out.)


    Hitting the Windows key and running `PowerShell` will bring up the PowerShell
    prompt. (Type `exit` to get out.)


    #### 19.3.3 Windows gitbash


    Git¬≥ is a *source code control system*. And it‚Äôs great. Tons of people use it.
    You should install it.


    When you install it, it installs a bash shell called gitbash that you can use.


    #### 19.3.4 Windows WSL


    The Windows Subsystem for Linux is an awesome piece of kit. It unobtrusively puts
    a little Linux install on your Windows machine. And then you can use the Linux
    command line.


    To install, follow the WSL setup instructions‚Å¥.


    There‚Äôs a recommendation in there to also install Windows Terminal, an alternate
    terminal to the existing ones. It‚Äôs a good choice.


    After installing, update the system:


    ```

    sudo apt update

    sudo apt -y upgrade

    ```


    and Python should be there; running this should get you the version number:


    ```

    python3 --version

    ```


    You can open a File Explorer window with:


    ```

    iexplore.exe .

    ```


    (Yes, that‚Äôs a period after a space at the end.)


    #### 19.3.5 Mac


    Macs come with a terminal built-in. Run the `Terminal` app and you‚Äôll be presented
    with a bash shell prompt.


    ¬πThis is a bit of a pun around the original *Bourne Shell* from back in the day.
    Bash improves on it a bit.

    ¬≤https://git-scm.com/

    ¬≥https://git-scm.com/downloads

    ‚Å¥https://learn.microsoft.com/en-us/windows/wsl/install


    #### 19.3.6 Linux/Unix-likes


    All Unix-likes come with a variety of terminals and shells. Google for your distribution.


    ### 19.4 Installing an IDE


    There are a lot of IDEs out there, but a good free one is VS Code.


    Visit the Visual Studio Code<sup>5</sup> website for downloads.


    Let‚Äôs get it installed!


    #### 19.4.1 Windows VS Code


    When you install:


    - Make sure ‚ÄúAdd Path‚Äù is checked

    - Check ‚ÄúRegister Code as an editor for supported file types‚Äù

    - Recommended: Check ‚ÄúAdd ‚ÄòOpen with Code‚Äô option‚Äù


    If you‚Äôre using WSL, first run VS Code from *outside* WSL, and install the ‚ÄúRemote
    WSL‚Äù extension. Then you should be able to run it from inside WSL.


    #### 19.4.2 Mac


    Just install it. No special instructions.


    #### 19.4.3 Linux and other Unix-likes


    Linux and Unix-like users can use their package manager to install VS Code. Google
    for `ubuntu vscode install`, substituting the name of your distro for `ubuntu`.


    If you already have a code editor you prefer using (Vim, Emacs, Sublime, Atom,
    PyCharm, etc.) feel free to use that, no problem!


    ### 19.5 Running VS Code


    In the shell of your choice, if all has gone well, you should be able to type:


    ```

    code

    ```


    and have it launch VS Code.


    Once launched, click the icon on the left bar of VS Code to manage extensions.


    - Install Python extension

    - Install Pylint extension


    ### 19.6 Using a Barebones Editor and Terminal


    Not all development environments are integrated. Some programmers use standalone
    editors and debuggers to get the work done.


    A typical cycle is:


    1. Edit code in your editor

    2. Run the code from the command line

    3. Check the output, prepare to debug

    4. Repeat!


    #### 19.6.1 Start with the Terminal


    We‚Äôre going to do this old-school. Programmers have been using the command line
    for over 10,000 years, and it has staying power for a reason.


    Launch a terminal and bring up a shell. You can use another shell if you want,
    but I‚Äôll be talking bash/zsh here.


    At the prompt, type the following commands, one per line:


    ```

    cd

    mkdir bgpython

    cd bgpython

    ls -la

    ```


    These commands do four amazing things:


    1. `cd` means *change directory*. (A directory is the same as a folder.) On a
    line by itself, it means ‚Äúchange to my *home directory*‚Äù.

    2. `mkdir` means *make directory*. We‚Äôre creating a new folder called bgpython.

    3. `cd bgpython` to change into that directory.

    4. `ls -la` to get a long directory listing (i.e. all the files in that folder.)


    At this point you should see something like this:


    ```

    $ ls -la

    total 0

    drwxr-xr-x   2 beej  staff    64 Nov 18 23:14 .

    drwxr-xr-x+ 123 beej  staff  3936 Nov 18 23:14 ..

    ```


    This is showing you all the files you have. Namely, there are two of them: . and
    .. These mean ‚Äúthis directory‚Äù and ‚Äúparent directory‚Äù, respectively. (You know
    how folders can be inside other folders? The outer folder is called the ‚Äúparent‚Äù
    folder, which is what the parent directory is. If you want to get back to your
    home directory from here, you can type `cd ..`)


    > You should think of the shell as ‚Äúbeing‚Äù in a certain directory at any particular
    time. You can `cd` into directories, or `cd ..` back into the parent, or `cd`
    to get to your home directory from anywhere. It‚Äôs like the folder you have open
    that has focus in a GUI.


    (The remaining information on each line tells you the permissions on the file,
    who owns it, how big it is, when it was modified, and so on. We can worry about
    that later.)


    Other than those there are no other files. We‚Äôll soon fix that! Let‚Äôs add a Python
    program and run it!


    ### 19.7 Launching Your Code Editor


    Usually launching an editor to edit a file is as simple as typing the editor name
    directly followed by the filename on the command line.


    For example, to launch VS Code to edit the file hello.py:


    ```

    code hello.py

    ```


    But wait‚Äìisn‚Äôt VS Code a full-fledged IDE? Yes, it is. Another popular editor
    is Vim:


    ```

    vim hello.py

    ```


    But in any case, you‚Äôre in the editor and ready to type code.


    This is your canvas! This is where the magic happens!


    > If you get in Vim and have no idea how to get out, hit the ESC key and then
    type `:q!` and hit RETURN‚Äîthis will exit without saving. If you want to save and
    exit, hit ESC then type `ZZ` in caps.'
