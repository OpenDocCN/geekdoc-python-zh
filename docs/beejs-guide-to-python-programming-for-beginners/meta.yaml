    \ it nice and slow.\n\n# Line 1: defining the function\n\nWhen we say `def do_the_math`,\
    \ we're telling Python, \"Hey, I'm making a brand new function from scratch called\
    \ `do_the_math`.\n\nThe part in the parentheses is a list of what we call *parameters*.\
    \ This describes what can be passed to the function. The actual values we pass\
    \ to the function are called *arguments*.\n\nIn this case, we can pass a single\
    \ argument to our function. It will be represented inside the function by the\
    \ variable `x`.\n\nWhen we call the function on line 6, `x` will be initialized\
    \ with the argument, just as if it had been assigned to. So in this example, `x`\
    \ will be assigned 30, because that's the argument we passed to the function for\
    \ that call.\n\n> In particular, whatever you pass as an argument will also be\
    \ referred to by the corresponding variable in the parameter list.\n\nRemember:\
    \ *you pass in arguments that get assigned into parameters*.\n\nA parameter is\
    \ a special type of *local variable*, one that comes pre-initialized with whatever\
    \ value we passed in as an argument. We'll get into their story on line 2.\n\n\
    # Line 2: Compute the result\n\nYou can see on line 2 that we take the parameter\
    \ `x` and feed it into the equation our boss tasked us with. (They told us to\
    \ change it to multiply by 7, remember?)\n\nAnd then Python does that math and\
    \ stores that into the variable `result`.\n\nNow that variable `result` is special.\
    \ It's what we call a *local variable*. Because it's used inside the function,\
    \ it's only visible inside the function. Once the function returns (more on that\
    \ below), the value in the local variables vanish forever.\n\nYou can name the\
    \ local variables anything you want, even if you've used that same name in another\
    \ function! Each local variable is isolated from the rest of the world and only\
