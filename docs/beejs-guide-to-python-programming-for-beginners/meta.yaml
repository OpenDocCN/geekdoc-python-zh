- md: "## 8.16 Summary\n\nLook at all the stuff we've covered in this chapter!\n\n\
    - A brand new data structure to hold lists of information\n- Understanding assignments\
    \ with mutable types\n- How to access and change items in a list\n- How to modify\
    \ and copy the list\n- How to create new lists of repeating values\n- List comprehensions!\
    \ Wow!\n- Lists of lists!\n\nLists are a powerful tool to add to our arsenal.\
    \ We're going to make heavy use of them as our programs get more complex.\n\n\
    ## Chapter 9\n\n## Dictionaries\n\n### 9.1 Objective\n\n- Understand what dictionaries\
    \ are\n- Initialize a dictionary\n- Access individual elements in a dictionary\n\
    - Check to see if a key is in a dictionary\n- Iterate over dictionaries with for\n\
    - Use common dictionaries built-in functions\n- Construct new dictionaries with\
    \ dictionary comprehensions\n- Build Dictionaries of Dictionaries\n- Understand\
    \ that Dictionaries are Mutable\n\n### 9.2 Chapter Project Specification\n\nLet‚Äôs\
    \ store some genealogical¬π data!\n\nWe‚Äôll have several data records associated\
    \ with each person:\n\n```\nBeej Jorgensen:\n    Born: 1993 [yes, I'm 29, is my\
    \ story I'm sticking to]\n    Mother: Mom Jorgensen\n    Father: Dad Jorgensen\n\
    \    Siblings: [Brother Jorgensen, Sister Jorgensen, Little Sister Jorgensen]\n\
    \nMom Jorgensen:\n    Born: 1970\n    Mother: Grandma Jorgensen\n    Father: Grandpa\
    \ Jorgensen\n    Siblings: [Auntie Jorgensen]\n\nDad Jorgensen:\n    Born: 1965\n\
    \    Mother: Granny Jorgensen\n    Father: Grandad Jorgensen\n    Siblings: [Uncle\
    \ Jorgensen]\n```\n\n(Ok, I hear you saying, ‚ÄúWait, your mom and dad were both\
    \ Jorgensens? That‚Äôs suspicious. I mean, I‚Äôm not saying, but I‚Äôm just saying.‚Äù\
    \ Hold your tongue! I can assure you they‚Äôre not related¬≤.)\n\n> ¬πThis is all\
    \ about family trees. Did you know I‚Äôm related to Queen Elizabeth II (by marriage)?\
    \ I‚Äôm her mother‚Äôs sister‚Äôs husband‚Äôs father‚Äôs father‚Äôs sister‚Äôs daughter‚Äôs husband‚Äôs\
    \ wife‚Äôs (drama!) sister‚Äôs husband‚Äôs father‚Äôs brother‚Äôs son‚Äôs son‚Äôs daughter‚Äôs\
    \ son‚Äôs daughter‚Äôs son. For realsies! I‚Äôm willing to bet that you‚Äôre related to\
    \ Queen Elizabeth II, as well. That makes us cousins!\n¬≤Except via Queen Elizabeth\
    \ II, like the rest of us.\n\nWe want to write an app that will allow you to print\
    \ out the birthdays of the parents of any given person.\n\nExample:\n\n```\nEnter\
    \ a name (or q to quit): Beej Jorgensen\nParents:\n    Mom Jorgensen (1970)\n\
    \    Dad Jorgensen (1965)\n```\n\nSo we'll need some way to store that, and some\
    \ way to look through the data to get information about other people who are referenced.\n\
    \nYes, we could use lists of people and just search through, but there's a less\
    \ clunky way we might go about doing this.\n\nThis chapter is all about how we\
    \ might store such data.\n\n### 9.3 What are Dictionaries?\n\nProblem-solving\
    \ step: **Understanding the Problem.**\n\nRemember how with lists, we could key\
    \ an index number into the list and get a value out, and how we could use that\
    \ same index number to store something in that \"slot\"?\n\nWas really convenient\
    \ for storing collections of information that you could index by number, right?\n\
    \nWell, what if you wanted to refer to a slot with something that *wasn't* a number?\
    \ What if you wanted to use, say, a string, like so?\n\n```\nx = [1, 2, 3]\n\n\
    x[\"beej\"] = 3490  # Not going to work with a list\n```\n\nThat makes Python\
    \ unhappy because \"beej\" isn't an integer. And with lists, it wants integers.\n\
    \nBut we can get around that limitation with *dictionaries*, or *dicts* for short.\n\
    \nDeclaring a dictionary is a little bit different, but here's a simple example\
    \ to start:\n\n```\nd = {}  # Squirrelly braces, not square brackets!\n\nd[\"\
    beej\"] = 3490\n\nprint(d[\"beej\"])  # 3490\n```\n\nSo very similar in usage,\
    \ though the initial declaration of the variable is different than a list.\n\n\
    With dicts, the value in the square brackets is called the *key*, and the value\
    \ stored there is the *value*.\n\n```\n#    key          value\n#     |      \
    \      |\n#  --+--        ---+---\nd[\"goats\"] = \"awesome\"\n```\n\nYou use\
    \ the key to lookup a value in the dictionary, or to set a value in the dictionary.\n\
    \nThe key can be any immutable type (e.g. integers, floats, strings). The value\
    \ can be any type.\n\n### 9.4 Initializing a Dictionary\n\nProblem-solving step:\
    \ **Understanding the Problem.**\n\nAs we saw above, you can initialize an empty\
    \ dictionary like so:\n\n```\nd = {}\n```\n\nBut you can also pre-initialize the\
    \ dictionary with a number of keys and values:\n\n```\nd = {\n    \"name\": \"\
    Beej\",\n    \"age\": 29,  # ish\n    \"favorite OS\": \"windows\",\n    \"no\
    \ really, favorite OS\": \"linux\"\n}\n```\n\nThat's the equivalent of setting\
    \ them by hand, albeit less verbose:\n\n```\nd = {}\nd[\"name\"] = \"Beej\"\n\
    d[\"age\"] = 29  # ish\n# etc.\n```\n\nIf you come from a web background, you\
    \ might have come across JSON¬≥-format data. The Python dictionary is very similar\
    \ in format, though not exactly the same.\n\n### 9.5 Speed Demon\n\nProblem-solving\
    \ step: **Understanding the Problem.**\n\nLike lists, dicts are really fast at\
    \ looking up information. In fact, on average, it takes the same amount of time\
    \ to get a value out of a dictionary, *regardless of how many items are in the\
    \ dictionary*‚Å¥.\n\nKeep this fact in mind going forward. We'll get into more complex\
    \ problems that can make use of this feature to keep your programs running quickly.\
    \ *Vroom!*\n\n### 9.6 Does this dict have this key?\n\nProblem-solving step: **Understanding\
    \ the Problem.**\n\nIf you have a dictionary, it's nice to be able to check to\
    \ see if a key even exists.\n\nThe secret to doing this is the `in` statement\
    \ that will return a Boolean indicating if a key is in a dict.\n\n```\nd = {\n\
    \    \"a\": 10,\n    \"b\": 20\n}\n\nif \"a\" in d:\n    print(f'key a\\'s value\
    \ is: {d[\"a\"]}')\n\nif \"x\" not in d:\n    print('There is no key \"x\" in\
    \ \"d\"')\n```\n\nThere is also a way to get an item out of a dictionary using\
    \ the `.get()` method. This method returns a default value of `None`‚Åµ if the key\
    \ doesn't exist.\n\n```\nval = d.get(\"x\")\n\nif val is None:  # Note: use \"\
    is\", not \"==\" with \"None\"!\n    print(\"Key x does not exist\")\nelse:\n\
    \    print(f\"Value of key x is {d[x]}\")\n```\n\n¬≥https://en.wikipedia.org/wiki/JSON\n\
    ‚Å¥Time complexity enthusiasts will recognize this as *O(1)*, or *constant* time.\n\
    ‚ÅµIf you haven't seen it before or need a refresher, this is a value that represents\
    \ \"no value\". It's a placeholder (what we call a *sentinel value*) to indicate\
    \ a no-value condition.\n\nYou can also detect a non-existent key with try/catch.\
    \ But that‚Äôs a story for another time.\n\n### 9.7 Iterating over Dictionaries\n\
    \nProblem-solving step: **Understanding the Problem.**\n\nRemember how you could\
    \ iterate over all the elements in a list with for? Well, we can do the same thing\
    \ with dictionaries. Except, in this case, we‚Äôll be looping over the *keys* in\
    \ the dictionary, not the values.\n\nLet‚Äôs try it!\n\n```\nd = {\n    \"c\": 10,\n\
    \    \"b\": 20,\n    \"a\": 30\n}\n\nfor k in d:\n    print(f\"key {k} has value\
    \ {d[k]}\")\n```\n\nThis gives us the output:\n\n```\nkey c has value 10\nkey\
    \ b has value 20\nkey a has value 30\n```\n\nNote that in the latest version of\
    \ Python, the keys come out in the same order they‚Äôve been added to the dictionary.\n\
    \nIf you want them in another order, there are options:\n\n```\nd = {\n    \"\
    c\": 10,\n    \"b\": 20,\n    \"a\": 30\n}\n\nfor k in sorted(d):  # <--- Add\
    \ the call to sorted()\n    print(f\"key {k} has value {d[k]}\")\n```\n\nAnd now\
    \ we have this, where the keys have been sorted alphabetically‚Å∂.\n\n```\nkey a\
