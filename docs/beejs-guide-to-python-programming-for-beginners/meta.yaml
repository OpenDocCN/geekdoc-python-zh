    8. write the file to disk.

    9. quit.


    The commands are:


    +   - list: list 10 lines (or up through the last line if fewer than 10 lines
    are remaining) starting from the line the user specifies. If the user specifies
    a number less than 1, assume they entered 1.

    - append: append multiple lines after the line the user-specified. Read lines
    one at a time, storing them in turn, until the user enters a sole period (".")
    on a blank line.

    - delete: Works like list, except deletes the line.

    - edit: Edits a single line, replacing it. If the line is out of range, an error
    message should be printed.

    - write: Saves the file to disk. If the filename wasn''t specified on the command
    line, the user must specify a filename after the w.

    - quit: exit the editor without saving the file.


    From the user standpoint, lines are numbered starting from 1.

