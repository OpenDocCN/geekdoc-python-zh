    ÈóÆÈ¢òËß£ÂÜ≥Ê≠•È™§Ôºö**ÁêÜËß£ÈóÆÈ¢ò**\nËøôÈáåÊúâ‰∏Ä‰∏™Êõ¥Â§ßÁöÑÁªìÊûÑÂèØ‰ª•ÂèëÁé∞„ÄÇÊàë‰ª¨Â∑≤ÁªèËÆ®ËÆ∫‰∫Ü `try` Âíå `catch`Ôºå‰ΩÜÊúâ‰∏ÄÁßçÊñπÊ≥ïÂèØ‰ª•Ê∑ªÂäÝ‰ª£ÁÝÅÔºåÊóÝËÆ∫ÊòØÂê¶ÂèëÁîüÂºÇÂ∏∏ÔºåËøô‰∫õ‰ª£ÁÝÅÈÉΩ‰ºöÂú®\
