  md: "Chapter 11. Classes and Objects\n\n99\n\nThis special function is always named\
    \ `__init__()` (with the dunders) and is called *the constructor*.\n\nLet's add\
    \ a constructor to our StarShip class that allows us to pass in a ship name when\
    \ the ship is constructed:\n\n```\nclass StarShip:\n    def __init__(self, shipname):\
    \  # The constructor\n        self.name = shipname\n\ns0 = StarShip(\"MCRN Tachi\"\
    )\ns1 = StarShip(\"Red Dwarf\")\ns2 = StarShip(\"USCSS Nostromo\")\n```\n\nWhoa,\
    \ now... that's a lot of hard-to-read punctuation¬≥ to sift through.\n\nAnd there's\
    \ that crazy `self` parameter to the function, whatever that means!\n\nLet's start\
    \ with `self`‚Å¥. This is one of the hardest concepts to grok about in this chapter,\
    \ so we'll spend some time on it.\n\nRemember how the class is the blueprint,\
    \ and the objects are made from that blueprint?\n\nAnd how after they're constructed,\
    \ you get a reference back to that newly-minted object? (These are the references\
    \ we were storing in s0, s1, and s2.)\n\nWell, what about the object that's being\
    \ constructed *right now* inside the `__init__()` method? It already exists but\
    \ isn't fully initialized yet. But inside the constructor, we have a reference\
    \ to that object that is being built right now. And that reference is in `self`.\n\
    \n`self` means \"the object that this method is operating on\".\n\nWhat's weird\
    \ is that when we instantiated the starships, we only passed one argument to `__init__()`.\n\
    \n```\ns0 = StarShip(\"MCRN Tachi\")\n```\n\nWhen clearly `__init__()` has two\
    \ parameters: `self` and `name`. What gives?\n\n```\ndef __init__(self, shipname):\
    \  # The constructor\n```\n\nDoesn't the number of arguments need to match the\
    \ number of parameters?\n\nIt does! But Python's doing something sneaky behind\
    \ your back, here. When a method has been called for a particular object, Python\
    \ automagically fills in the first parameter with the object that is being operated\
    \ on. We don't have to worry about it.\n\nPython then takes the arguments we *did*\
    \ pass and tacks them on after that.\n\nLet's take a look at that constructor\
    \ again:\n\n```\nclass StarShip:\n    def __init__(self, shipname):  # The constructor\n\
    \        self.name = shipname\n\ns0 = StarShip(\"MCRN Tachi\")\n```\n\nThis is\
    \ a really common pattern, so let's make sure we understand what's going on here.\
    \ In particular, there's a weird dot after `self`. What does that mean? But before\
    \ we get there, let's look at `shipname`.\n\nWhen we create our new starship s0,\
    \ we pass in the name \"MCRN Tachi\". This calls the constructor `__init__()`.\n\
    \nPython automatically puts a reference to the object that's now being constructed\
    \ into `self`. And then it copies the string \"MCRN Tachi\" to the `shipname`\
    \ parameter of the function. So `shipname` is \"MCRN Tachi\".\n\nAnd now we're\
    \ to the guts of the thing. `self.name`? The saga continues!\n\n¬≥In fact, I think\
    \ the choice to use all those underscores in `__init__()` is one of the few bad\
    \ design choices in the language.\n‚Å¥A lot of other languages use the variable\
    \ name `this` instead of `self`."
