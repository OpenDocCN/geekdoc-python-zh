- img_proc: true
  md: "But you can also pre-initialize the dictionary with a number of keys and values:\n\
    \n```\nd = {\n    \"name\": \"Beej\",\n    \"age\": 29,  # ish\n    \"favorite\
    \ OS\": \"windows\",\n    \"no really, favorite OS\": \"linux\"\n}\n```\n\nThat's\
    \ the equivalent of setting them by hand, albeit less verbose:\n\n```\nd = {}\n\
    d[\"name\"] = \"Beej\"\nd[\"age\"] = 29  # ish\n# etc.\n```\n\nIf you come from\
    \ a web background, you might have come across JSON¬≥-format data. The Python dictionary\
    \ is very similar in format, though not exactly the same.\n\n# 9.5 Speed Demon\n\
    \nProblem-solving step: **Understanding the Problem.**\n\nLike lists, dicts are\
    \ really fast at looking up information. In fact, on average, it takes the same\
    \ amount of time to get a value out of a dictionary, *regardless of how many items\
    \ are in the dictionary*‚Å¥.\n\nKeep this fact in mind going forward. We'll get\
    \ into more complex problems that can make use of this feature to keep your programs\
    \ running quickly. *Vroom!*\n\n# 9.6 Does this dict have this key?\n\nProblem-solving\
    \ step: **Understanding the Problem.**\n\nIf you have a dictionary, it's nice\
    \ to be able to check to see if a key even exists.\n\nThe secret to doing this\
    \ is the `in` statement that will return a Boolean indicating if a key is in a\
    \ dict.\n\n```\nd = {\n    \"a\": 10,\n    \"b\": 20\n}\n\nif \"a\" in d:\n  \
    \  print(f'key a\\'s value is: {d[\"a\"]}')\n\nif \"x\" not in d:\n    print('There\
    \ is no key \"x\" in \"d\"')\n```\n\nThere is also a way to get an item out of\
    \ a dictionary using the `.get()` method. This method returns a default value\
    \ of `None`‚Åµ if the key doesn't exist.\n\n```\nval = d.get(\"x\")\n\nif val is\
    \ None:  # Note: use \"is\", not \"==\" with \"None\"!\n    print(\"Key x does\
    \ not exist\")\nelse:\n    print(f\"Value of key x is {d[x]}\")\n```\n\n¬≥https://en.wikipedia.org/wiki/JSON\n\
    ‚Å¥Time complexity enthusiasts will recognize this as *O(1)*, or *constant* time.\n\
    ‚ÅµIf you haven't seen it before or need a refresher, this is a value that represents\
    \ \"no value\". It's a placeholder (what we call a *sentinel value*) to indicate\
    \ a no-value condition."
