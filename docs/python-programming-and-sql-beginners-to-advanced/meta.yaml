    ## Parse and format


    Module **time** provides some functions used to parse a string into time. And
    vice versa, format the time into a string.


    | Function | Description |

    | --- | --- |

    | time.strptime(string[, format]) | Parse a string representing a time according
    to a format. The return value is a **struct_time** as returned by **gmtime()**
    or **localtime()**. |

    | time.strftime(format[, t]) | Convert a tuple or **struct_time** representing
    a time as returned by **gmtime()** or **localtime()** to a string as specified
    by the format argument. If t is not provided, the current time as returned by
    **localtime()** is used. **format** must be a string. **ValueError** is raised
    if any field in ''t'' is outside of the allowed range. |


    An example of parsing a string into a **struct_time**.


