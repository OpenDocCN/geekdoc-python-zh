    ## Python Dictionary Tutorial with Examples


    ## Python Dictionary


    In **Python**, dictionary is a data type and it is a list of elements, each of
    which is a pair of key & value and is quite similar to the **Map** concept in
    **Java**.


    Dictionaries all are objects of the dict class.


    In order to write a dictionary, you need to use { }, and write the elements into
    it, the elements are separated by comma. Each element is a pair of key and value
    separated by a colon '':''.


    # Example:


    ```python

    # Dictionary

    myinfo = {"Name": "Tran", "Age": 37, "Address" : "Vietnam" }

    ```


    You can also create a dictionary object from the constructor of the **dict** class.


    # createDictionaryFromClass.py


    ```python

    # Create a dictionary via constructor of dict class.

    mydict = dict()


    mydict["E01"] = "John"

    mydict["E02"] = "King"


    print ("mydict: ", mydict)

    ```


    # Output:


    ```

    mydict: {''E01'': ''John'', ''E02'': ''King''}

    ```


    ## Features of the value in the dictionary:


    - Each element of the dictionary is a pair of key and value, the value can be
    a certain type (string, number, user-defined types,...), and can be the same.


    ## Features of the key in the dictionary.


    - The key in dictionary is a immutable type. So, it can be string, number, Tuple,...

    - Some types are not allowed (for example: **List**) because **List** is a mutable
    data type.

    - Keys in dictionary are not allowed to be duplicated.


    # Example:


    # dictionaryExample.py


    ```python

    # Dictionary

    myinfo = {"Name": "Tran", "Age": 37, "Address" : "Vietnam" }


    print ("myinfo[''Name''] = ", myinfo["Name"])

    print ("myinfo[''Age''] = ", myinfo["Age"])

    print ("myinfo[''Address''] = ", myinfo["Address"])

    ```


    # Output:


    ```

    myinfo[''Name''] = Tran

    myinfo[''Age''] = 37

    myinfo[''Address''] = Vietnam

    ```


    ## Update Dictionary


    Dictionary allows you to update the value of a certain key, it adds a new element
    if the key does not exist on the dictionary.


    # updateDictionaryExample.py


    ```python

    # Dictionary

    myinfo = {"Name": "Tran", "Age": 37, "Address" : "Vietnam" }


    # update value for key ''Address''

    myinfo["Address"] = "HCM Vietnam"


    # Add new element with key ''Phone''

    myinfo["Phone"] = "12345"


    print ("Element count: ", len(myinfo) )

    print ("myinfo[''Name''] = ", myinfo["Name"])

    print ("myinfo[''Age''] = ", myinfo["Age"])

    print ("myinfo[''Address''] = ", myinfo["Address"])

    print ("myinfo[''Phone''] = ", myinfo["Phone"])

    ```


    # Output:


    ```

    Element count: 4

    myinfo[''Name''] = Tran

    myinfo[''Age''] = 37

    myinfo[''Address''] = HCM Vietnam

    myinfo[''Phone''] = 12345

    ```


    ## Delete dictionary


    There are 2 ways to remove an element from a dictionary.


    1. Use the **del** operator

    2. Using the "**__delitem__ (key)**" method


    # deleteDictionaryExample.py


    ```python

    # (Key,Value) = (Name, Phone)

    contacts = {"John": "01217000111", "Tom": "01234000111", "Addison":"01217000222",
    "Jack":"01227000123"}


    print ("Contacts: ", contacts)

    print ("\n")

    print ("Delete key = ''John'' ")


    # Delete element with key ''John''

    del contacts["John"]

    print ("Contacts (After delete): ", contacts)

    print ("\n")

    print ("Delete key = ''Tom'' ")


    # Delete element with key ''Tom''

    contacts.__delitem__( "Tom")

    print ("Contacts (After delete): ", contacts)

    print ("Clear all element")


    # Clear all element

    contacts.clear()

    print ("Contacts (After clear): ", contacts)


    # Delete dictionary ''contact'' from memory

    del contacts

    # An error occured while accessing a variable that does not exist in memory

    print ("Contacts (After delete): ", contacts)

    ```'
