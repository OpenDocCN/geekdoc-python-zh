- md: "## try-except-finally\n\nWe have got accustomed with catching error through\
    \ **try-except** block. **try-except-finally** is used to fully handle exception.\
    \ The **finally** block is always executed, regardless of whether the exception\
    \ occurs in the **try** block or not.\n\n## try - except - finally\n\n```\ntry\
    \ :\n    # Do something here.\nexcept Exception1 as e :\n    # Do something here.\n\
    except Exception2 as e :\n    # Do something here.\nfinally :\n    # The finally\
    \ block is always executed.\n    # Do something here.\n```\n\n## Example:\n\n\
    ## tryExceptFinallyDemo.py\n\n```\ndef toInteger(text) :\n    try :\n        print\
    \ (\"-- Begin parse text: \", text)\n        # An Exception can throw here (ValueError).\n\
    \        value = int(text)\n        return value\n    except ValueError as e :\n\
    \        # In the case of 'text' is not a number.\n        # This 'except' block\
    \ will be executed.\n        print (\"ValueError message: \", str(e))\n      \
    \  print (\"type(e): \", type(e))\n        # Returns 0 if ValueError occurs.\n\
    \        return 0\n    finally :\n        print (\"-- End parse text: \" + text)\n\
    ```\n\n```\ntext = \"001234A2\"\nvalue = toInteger(text)\nprint (\"Value= \",\
    \ value)\n```\n\n## Running the example:\n\n```\n-- Begin parse text: 001234A2\n\
    ValueError message: invalid literal for int() with base 10: '001234A2'\ntype(e):\
    \ <class 'ValueError'>\n-- End parse text: 001234A2\nValue= 0\n```\n\nThis is\
    \ the flow of the program. **Finally** block is always executed.\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_86_0.png)\n\
    \n## pass statement\n\nIf you do not want to process anything in the 'except'\
    \ or 'finally' block you can use the 'pass' statement. The pass statement does\
    \ not do anything, it's like a null statement.\n\n## passStatementExample.py\n\
    \n```\nprint(\"Three\")\ntry:\n    value = 10 / 0;\nexcept Exception as e:\n \
    \   pass\n```\n\n```\nprint (\"Two\")\nprint (\"One\")\nprint (\"Let's go\")\n\
    ```\n\n## Output:\n\nThree\nTwo\nOne\nLet's go\n\n## Re-throw exception\n\nWhile\
    \ handling the exception, you can catch that exception and handle it or you can\
    \ re-throw it.\n\n## reRaiseExceptionDemo1.py\n\n```\ndef checkScore(score) :\n\
    \    if score < 0 or score > 100:\n        raise Exception(\"Invalid Score \"\
    \ + str(score) )\n\ndef checkPlayer(name, score):\n    try :\n        checkScore(score)\n\
    \    except Exception as e :\n        print (\"Something invalid with player:\
    \ \",name, ' >> ', str(e) )\n        # re throw exception.\n        raise\n\n\
    # -----------------------------------------\ncheckPlayer(\"Tran\", 101)\n```\n\
    \n```\nSomething invalid with player:  Tran  >>  Invalid Score 101\nTraceback\
    \ (most recent call last):\n  File \"E:\\ECLIPSE TUTORIAL\\PYTHON\\PythonException\\\
    reRaiseExceptionDemo1.py\", line 27, in <module>\n    checkPlayer(\"Tran\", 101)\n\
    \  File \"E:\\ECLIPSE TUTORIAL\\PYTHON\\PythonException\\reRaiseExceptionDemo1.py\"\
    , line 14, in checkPlayer\n    checkScore(score)\n  File \"E:\\ECLIPSE TUTORIAL\\\
    PYTHON\\PythonException\\reRaiseExceptionDemo1.py\", line 6, in checkScore\n \
    \   raise Exception(\"Invalid Score \" + str(score) )\nException: Invalid Score\
    \ 101\n```\n\nFor example, catch an exception and throw an other exception.\n\n\
    ## reRaiseExceptionDemo2.py\n\n```\ndef checkScore(score) :\n    if score < 0\
    \ or score > 100:\n        raise Exception(\"Invalid Score \" + str(score) )\n\
    \ndef checkPlayer(name, score):\n    try :\n        checkScore(score)\n    except\
    \ Exception as e :\n        print (\"Something invalid with player: \",name, '\
    \ >> ', str(e) )\n        # throw new exception.\n        raise Exception(\"Something\
    \ invalid with player: \"+ name + \" >> \"+ str(e))\n\n# -----------------------------------------\n\
    checkPlayer(\"Tran\", 101)\n```\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_88_0.png)\n\
    \n## Exception Wrapping\n\n**Python** allows catching exceptions, and throws a\
    \ new exception. New exceptions can store information of the original exception,\
    \ which you can access through the **__cause__** attribute.\n\n## Syntax\n\n```\n\
    try :\n    # Do Something here...\nexcept Exception as e :\n    raise OtherException(\"\
    Message...\") from e\n```\n\nSee full example:\n\n## wrapExceptionDemo.py\n\n\
    ```\n# Python 3.x:\n# Gender exception\nclass GenderException(Exception):\n  \
    \  def __init__(self, msg):\n        super().__init__(msg)\n\n# Language exception.\n\
    class LanguageException(Exception):\n    def __init__(self, msg):\n        super().__init__(msg)\n\
    \nclass PersonException(Exception):\n    def __init__(self, msg):\n        super().__init__(msg)\n\
    \n# This function may throw GenderException.\ndef checkGender(gender):\n    if\
    \ gender != 'Female' :\n        raise GenderException(\"Accept female only\")\n\
    \n# This function may throw LanguageException.\ndef checkLanguage(language):\n\
    \    if language != 'English' :\n        raise LanguageException(\"Accept english\
    \ language only\")\n\ndef checkPerson(name, gender, language):\n    try :\n  \
    \      # May throw GenderException.\n        checkGender(gender)\n        # May\
    \ throw LanguageException.\n        checkLanguage(language)\n    except Exception\
    \ as e:\n        # Catch exception and raise other exception.\n        # New exception\
    \ has __cause__ = e.\n        raise PersonException(name + \" does not pass\"\
    ) from e\n\n# --------------------------------------------------\ntry :\n    checkPerson(\"\
    Nguyen\", \"Female\", \"Vietnamese\")\nexcept PersonException as e:\n    print\
    \ (\"Error message: \", str(e) )\n    # GenderException or LanguageException\n\
    \    cause = e.__cause__\n    print ('e.__cause__: ', repr(cause))\n    print\
    \ (\"type(cause): \", type(cause) )\n```\n\n```\nprint (\" -------------------\
    \ \")\nif type(cause) is GenderException :\n    print (\"Gender exception: \"\
    , cause)\nelif type(cause) is LanguageException:\n    print (\"Language exception:\
    \ \", cause)\n```\n\n## Output:\n\nError message: Nguyen does not pass\ne.__cause__:\
    \ LanguageException('Accept english language only',)\ntype(cause): <class '__main__.LanguageException'>\n\
    -------------------\nLanguage exception: Accept english language only\n\n## Python\
    \ String Tutorial with Examples\n\n## Python String\n\nString is the most common\
    \ type in **Python**, and you often have to work with them. Note that there is\
    \ no character type in **Python**, a simple character is called as a string of\
    \ length 1.\n\nThere are two ways to declare a string written on a line by using\
    \ single quotes or double quotes.\n\n```\nstr1 = \"Hello Python\"\nstr2 = 'Hello\
    \ Python'\n\nstr3 = \"I'm from Vietnam\"\n\nstr4 = 'This is a \"Cat\"! '\n```\n\
    \nIf you want to write string on multiple lines using a pair of 3 single quotes.\n\
    \n```\nstr = \"\"\"Hello World\n    Hello Python\"\"\"\n```\n\n## Access values\
    \ in string\n\n**Python** does not support character type, the character is considered\
    \ as a string of length 1. The characters in string are indexed by starting index\
    \ 0. You can access substrings via index.\n\n```\nmystr = \"This is text\"\n```\n\
    \n![](img/32bef8dd64dcf85a8518a3e4c521c46c_91_0.png)\n\n## stringExample.py\n\n\
    ```\nmystr = \"This is text\"\n\n# --> h\nprint (\"mystr[1] = \", mystr[1])\n\n\
    # --> is is t\nprint (\"mystr[2,9] = \", mystr[2:9])\n\n# --> s is text\nprint\
    \ (\"mystr[3:] = \", mystr[3:])\n```\n\n## String is immutable\n\nString is a\
    \ special data type in **Python**, and it is immutable. Each string has an address\
    \ stored on memory. All operations on strings create another object. For example,\
    \ if you want to concatenate a string with another string, this action creates\
    \ another string on memory.\n\n```\nstr1 = \"Hello \"\nstr2 = str1 + \"Python\"\
    \n```\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_91_1.png)\n\n## == and is operator\n\
    \nPython uses the == operator to compare the values of two objects. And use the\
    \ \"is\" operator to compare locations on memory.\n\n## compareObject.py\n\n```\n\
    class Person(object):\n    def __init__(self, name, age):\n        self.name =\
    \ name\n        self.age = age\n    # Override __eq__ method\n    def __eq__(self,\
    \ other):\n        return self.name == other.name and self.age == other.age\n\n\
    jack1 = Person('Jack', 23)\njack2 = Person('Jack', 23)\n\n# Call to __eq__ method\n\
    print (\"jack1 == jack2 ?\", jack1 == jack2) # True\nprint (\"jack1 is jack2 ?\"\
    , jack1 is jack2) # False\n```\n\nString is a special data type and is frequently\
    \ used in Python applications. And so it has some below:\n\n- If you declare two\
    \ string type variable with the same value, they all will point to the actual\
    \ string in memory."
  mdcn: "## try-except-finally\n\n我们已经习惯通过 **try-except** 块来捕获错误。**try-except-finally**\
    \ 用于全面处理异常。无论 **try** 块中是否发生异常，**finally** 块总会被执行。\n\n## try - except - finally\n\
    \n```\ntry :\n    # 在此处执行某些操作。\nexcept Exception1 as e :\n    # 在此处执行某些操作。\nexcept\
    \ Exception2 as e :\n    # 在此处执行某些操作。\nfinally :\n    # finally 块总会被执行。\n    #\
    \ 在此处执行某些操作。\n```\n\n## 示例：\n\n## tryExceptFinallyDemo.py\n\n```\ndef toInteger(text)\
    \ :\n    try :\n        print (\"-- 开始解析文本: \", text)\n        # 此处可能抛出异常 (ValueError)。\n\
    \        value = int(text)\n        return value\n    except ValueError as e :\n\
    \        # 当 'text' 不是数字时。\n        # 此 'except' 块将被执行。\n        print (\"ValueError\
    \ 消息: \", str(e))\n        print (\"type(e): \", type(e))\n        # 如果发生 ValueError，则返回\
    \ 0。\n        return 0\n    finally :\n        print (\"-- 结束解析文本: \" + text)\n\
    ```\n\n```\ntext = \"001234A2\"\nvalue = toInteger(text)\nprint (\"Value= \",\
    \ value)\n```\n\n## 运行示例：\n\n```\n-- 开始解析文本: 001234A2\nValueError 消息: invalid\
    \ literal for int() with base 10: '001234A2'\ntype(e): <class 'ValueError'>\n\
    -- 结束解析文本: 001234A2\nValue= 0\n```\n\n这是程序的执行流程。**Finally** 块总会被执行。\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_86_0.png)\n\
    \n## pass 语句\n\n如果你不想在 'except' 或 'finally' 块中处理任何内容，可以使用 'pass' 语句。pass 语句不执行任何操作，它就像一个空语句。\n\
    \n## passStatementExample.py\n\n```\nprint(\"Three\")\ntry:\n    value = 10 /\
