    # --> s is text\nprint (\"mystr[3:] = \", mystr[3:])\n```\n\n## 字符串是不可变的\n\n字符串是\
    \ **Python** 中的一种特殊数据类型，它是不可变的。每个字符串在内存中都有一个存储地址。所有对字符串的操作都会创建另一个对象。例如，如果你想将一个字符串与另一个字符串连接起来，这个操作会在内存中创建另一个字符串。\n\
    \n```\nstr1 = \"Hello \"\nstr2 = str1 + \"Python\"\n```\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_91_1.png)\n\
    \n## == 和 is 运算符\n\nPython 使用 == 运算符比较两个对象的值。并使用 \"is\" 运算符比较内存中的位置。\n\n## compareObject.py\n\
    \n```\nclass Person(object):\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n    # 重写 __eq__ 方法\n    def __eq__(self, other):\n\
    \        return self.name == other.name and self.age == other.age\n\njack1 = Person('Jack',\
    \ 23)\njack2 = Person('Jack', 23)\n\n# 调用 __eq__ 方法\nprint (\"jack1 == jack2 ?\"\
    , jack1 == jack2) # True\nprint (\"jack1 is jack2 ?\", jack1 is jack2) # False\n\
    ```\n\n字符串是一种特殊的数据类型，在 Python 应用程序中经常使用。因此它具有以下特点：\n\n- 如果你声明两个具有相同值的字符串类型变量，它们都将指向内存中的实际字符串。"
