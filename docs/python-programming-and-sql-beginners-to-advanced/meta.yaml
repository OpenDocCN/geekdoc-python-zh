- img_proc: true
  md: "```\nfinally:\n    # Close connection.\n    connection.close()\n```\n\n# Output:\n\
    \nconnect successful!\nDeleted! 1 rows\n\n# Call Procedure\n\nThere are some problems\
    \ when you call a function or procedure in **Python**. I set up a situation like\
    \ this:\nYou have a procedure:\n\n+   - Get_Employee_Info(p_Emp_Id, v_Emp_No,\
    \ v_First_Name, v_Last_Name, v_Hire_Date)\n\n# get_Employee_Info\n\n```\nDELIMITER\
    \ $$\n\n-- This procedure retrieves information of an employee,\n-- Input parameter:\
    \ p_Emp_ID (Integer)\n-- There are four output parameters v_Emp_No, v_First_Name,\
    \ v_Last_Name, v_Hire_Date\n\nCREATE PROCEDURE get_Employee_Info(p_Emp_ID Integer,\n\
    \                                    out v_Emp_No Varchar(50) ,\n            \
    \                        out v_First_Name Varchar(50) ,\n                    \
    \                Out v_Last_name Varchar(50) ,\n                             \
    \       Out v_Hire_date Date)\nBEGIN\nset v_Emp_No = concat( 'E' , Cast(p_Emp_Id\
    \ as char(15)) );\n--\nset v_First_Name = 'Michael';\nset v_Last_Name = 'Smith';\n\
    set v_Hire_date = curdate();\nEND\n```\n\nThe procedure above has an input parameter\
    \ **p_Emp_Id** and the four output parameters **v_Emp_No, v_First_Name, v_Last_Name,\
    \ v_Hire_Date**, and you call this procedure from **Python** passing the value\
    \ to **p_Emp_Id** to get 4 output values. Unfortunately, the value received is\
    \ not guaranteed to be true (as stated in the DB-API specification). **Python**\
    \ can only retrieve values from a SELECT clause."
  merge: -1
  pgno: 137
- img_proc: true
  md: "# Note :\n\n# DB-API specification:\n\n```\ndef callproc(self, procname, args=()):\n\
    \    \"\"\"Execute stored procedure procname with args\n\n    procname -- string,\
    \ name of procedure to execute on server\n\n    args -- Sequence of parameters\
    \ to use with procedure\n\n    Returns the original args.\n\n    Compatibility\
    \ warning: PEP-249 specifies that any modified\n    parameters must be returned.\
    \ This is currently impossible\n    as they are only available by storing them\
    \ in a server\n    variable and then retrieved by a query. Since stored\n    procedures\
    \ return zero or more result sets, there is no\n    reliable way to get at OUT\
    \ or INOUT parameters via callproc.\n    The server variables are named @_procname_n,\
    \ where procname\n    is the parameter above and n is the position of the parameter\n\
    \    (from zero). Once all result sets generated by the procedure\n    have been\
    \ fetched, you can issue a SELECT @_procname_0, ...\n    query using .execute()\
    \ to get any OUT or INOUT values.\n\n    Compatibility warning: The act of calling\
    \ a stored procedure\n    itself creates an empty result set. This appears after\
    \ any\n    result sets generated by the procedure. This is non-standard\n    behavior\
    \ with respect to the DB-API. Be sure to use nextset()\n    to advance through\
    \ all result sets; otherwise you may get\n    disconnected.\n    \"\"\"\n```\n\
    \nHowever you can still solve the problem above, you need to wrap **Get_Employee_Info**\
    \ procedure by another procedure (for example **Get_Employee_Info_Wrap**), this\
    \ procedure returns the values from the SELECT clause.\n\n# get_Employee_Info_Wrap\n\
    \n```\nDROP procedure IF EXISTS `get_Employee_Info_Wrap`;\n\nDELIMITER $$\n\n\
    -- This procedure wrap Get_Employee_info\nCREATE PROCEDURE get_Employee_Info_Wrap(p_Emp_ID\
    \ Integer,\n                                        out v_Emp_No Varchar(50),\n\
    \                                        out v_First_Name Varchar(50),\n     \
    \                                   Out v_Last_name Varchar(50),\n```"
  merge: -1
  pgno: 138
- img_proc: true
  md: "```\nOut     v_Hire_date    Date)\nBEGIN\nCall get_Employee_Info( p_Emp_Id,\
    \ v_Emp_No, v_First_Name, v_Last_Name, v_Hire_Date);\n-- SELECT\nSelect v_Emp_No,\
    \ v_First_Name, v_Last_Name, v_Hire_Date;\nEND\n```\n\nInstead of calling the\
    \ **Get_Employee_Info** procedure in **Python**, call **Get_Employee_Info_Wrap**\
    \ procedure.\n\n# callProcedureExample.py\n\n```\n# Use your utility module.\n\
    import myconnutils\nimport datetime\n\nconnection = myconnutils.getConnection()\n\
    print (\"Connect successful!\")\ntry :\n    cursor = connection.cursor()\n   \
    \ # Get_Employee_Info_Wrap\n    # @p_Emp_Id     Integer ,\n    # @v_Emp_No   \
    \  Varchar(50)  OUTPUT\n    # @v_First_Name Varchar(50)  OUTPUT\n    # @v_Last_Name\
    \  Varchar(50)  OUTPUT\n    # @v_Hire_Date  Date         OUTPUT\n    v_Emp_No\
    \ = \"\"\n    v_First_Name= \"\"\n    v_Last_Name= \"\"\n    v_Hire_Date = None\n\
    \n    inOutParams = ( 100, v_Emp_No, v_First_Name , v_Last_Name, v_Hire_Date )\n\
    \    resultArgs = cursor.callproc(\"Get_Employee_Info_Wrap\", inOutParams  )\n\
    \n    print ('resultArgs:', resultArgs )\n    print ( 'inOutParams:', inOutParams\
    \ )\n    print ( '----------------------------------- ')\n    for row in cursor:\n\
    \        print('Row: ', row )\n        print('Row[v_Emp_No]: ', row['v_Emp_No']\
    \ )\n        print('Row[v_First_Name]: ', row['v_First_Name'] )\n        print('Row[v_Last_Name]:\
    \ ', row['v_Last_Name'] )\n        # datetime.date\n        v_Hire_Date = row['v_Hire_Date']\n\
    \        print('Row[v_Hire_Date]: ', v_Hire_Date )\nfinally:\n    # Close connection.\n\
    ```"
