    \ method of parent class.\n        super().showInfo()\n        print (\" age \"\
    \ + str(self.age))\n        print (\" height \" + str(self.height))\n\n    # Override\
    \ method.\n    def move(self):\n        print (\"Mouse moving ...\")\n```\n\n\
    #### mouseTest.py\n\n```python\nfrom mouse import Mouse\n\njerry = Mouse(\"Jerry\"\
    , 3, 5)\n\nprint (\"Call move() method\")\njerry.move()\n\nprint (\"\\n\")\nprint\
    \ (\"Call showInfo() method\")\njerry.showInfo()\n```\n\n### 输出：\n\nCall move()\
    \ method\nMouse moving ...\n\nCall showInfo() method\nI'm Jerry\nage 3\nheight\
    \ 5\n\n### 抽象方法\n\n抽象方法或抽象类的概念在 **Java**、**C#** 等语言中有明确定义。但在 **Python** 中没有明确定义。然而，我们有一种方法来定义它。一个被称为抽象的类定义了抽象方法，如果你想使用它们，子类必须重写这些方法。抽象方法总是抛出\
    \ **NotImplementedError** 异常。\n\n#### abstractExample.py\n\n```python\n# An abstract\
    \ class.\nclass AbstractDocument :\n\n    def __init__(self, name):\n        self.name\
    \ = name\n\n    # A method can not be used, because it always throws an error.\n\
    \    def show(self):\n        raise NotImplementedError(\"Subclass must implement\
    \ abstract method\")\n\nclass PDF(AbstractDocument):\n\n    # Override method\
    \ of parent class\n    def show(self):\n        print (\"Show PDF document:\"\
    , self.name)\n\nclass Word(AbstractDocument):\n\n    def show(self):\n       \
    \ print (\"Show Word document:\", self.name)\n\n# --------------------------------------------------\n\
    documents = [ PDF(\"Python tutorial\"),\n              Word(\"Java IO Tutorial\"\
    ),\n              PDF(\"Python Date & Time Tutorial\") ]\n\nfor doc in documents\
    \ :\n    doc.show()\n```\n\n### 输出：\n\nShow PDF document: Python tutorial\nShow\
    \ Word document: Java IO Tutorial\nShow PDF document: Python Date & Time Tutorial\n\
    \n上面的例子展示了 **Python** 中的多态。一个 **Document** 对象可以以多种形式（**PDF**、**Word**、**Excel**\
    \ 等）表示。\n另一个例子说明了多态：当我谈到一个亚洲人时，这是相当抽象的，他可能是日本人、越南人或印度人。然而，他们具有亚洲人的特征。\n\n### 多重继承\n\
