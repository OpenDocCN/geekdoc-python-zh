    \n**Python** 允许捕获异常，并抛出一个新异常。新异常可以存储原始异常的信息，你可以通过 **__cause__** 属性访问它。\n\n## 语法\n\
    \n```\ntry :\n    # 在此处执行某些操作...\nexcept Exception as e :\n    raise OtherException(\"\
