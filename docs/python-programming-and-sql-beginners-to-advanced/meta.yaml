    \ by the procedure\n    have been fetched, you can issue a SELECT @_procname_0,\
    \ ...\n    query using .execute() to get any OUT or INOUT values.\n\n    Compatibility\
    \ warning: The act of calling a stored procedure\n    itself creates an empty\
    \ result set. This appears after any\n    result sets generated by the procedure.\
    \ This is non-standard\n    behavior with respect to the DB-API. Be sure to use\
    \ nextset()\n    to advance through all result sets; otherwise you may get\n \
    \   disconnected.\n    \"\"\"\n```\n\nHowever you can still solve the problem\
