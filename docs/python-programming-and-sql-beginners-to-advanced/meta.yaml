    | * | The operator is used to concatenate multiple copies of the same Tuple. And
    create a new Tuple | (1, 2) * 3 --> (1, 2, 1, 2, 1, 2) |

    | in | Check whether an element is in a Tuple, which returns True or False. |
    "Abc" in ("One", "Abc") --> True |


