  md: 'Python is a programming language that distinguishes between uppercase and lowercase,
    MyObject and myobject are two different ones.


    # Some naming rules in Python:


    +   1. Class name should begin with a capital letter, other names should begin
    with lowercase ones.

    2. A name begins with an underscore, it means that the name is private.

    3. A name begins with two underscores, it means that the name is very private.

    4. If a name bigins with two underscores and ends with two underscores, it means
    the name is special one that has already defined by Python.


    # The keywords in Python


    There are a few the keywords in Python which can not be used to name and has no
    capital letters. Below is list of all the keywords in Python.


    ** keywords **


    and    assert    break    class

    continue    def    del    elif    else

    except    exec    finally    for

    from    global    if    import    in    is

    lambda    not    or    pass

    raise    return    try    yield    while


    # List of special words:


    ** special words **


    None    True    False

    self    cls    class_'
