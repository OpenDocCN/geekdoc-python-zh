  - '[PAGE 130]


    | Method | Description |

    |---|---|

    | `date.replace(year=self.year, month=self.month, day=self.day)` | Return a date
    with the same attributes, except for those attributes given new values by whichever
    keyword arguments are specified. For example: `d == date(2002, 12, 31), d.replace(day=26)
    == date(2002, 12, 26)`. |

    | `date.timetuple()` | Return a `time.struct_time` such as returned by `time.localtime()`.
    The hours, minutes and seconds are 0, and the DST flag is -1. `d.timetuple()`
    is equivalent to `time.struct_time((d.year, d.month, d.day, 0, 0, 0, d.weekday(),
    yday, -1))`, where `yday = d.toordinal() - date(d.year, 1, 1).toordinal() + 1`
    is the day number within the current year starting with 1 for January 1st. |

    | `date.toordinal()` | Return the proleptic Gregorian ordinal of the date, where
    January 1 of year 1 has ordinal 1. For any date object `d`, `date.fromordinal(d.toordinal())
    == d`. |

    | `date.weekday()` | Return the day of the week as an integer, where Monday is
    0 and Sunday is 6. For example, `date(2002, 12, 4).weekday() == 2`, a Wednesday.
    See also `isoweekday()`. |

    | `date.isoweekday()` | Return the day of the week as an integer (According to
    ISO standard), where Monday is 1 and Sunday is 7. For example, `date(2002, 12,
    4).isoweekday() == 3`, a Wednesday. See also `weekday()`, `isocalendar()`. |

    | `date.isocalendar()` | Return a 3-tuple, (ISO year, ISO week number, ISO weekday).
    |

    | `date.isoformat()` | Return a string representing the date in ISO 8601 format,
    ‘YYYY-MM-DD’. For example, `date(2002, 12, 4).isoformat() == ''2002-12-04''`.
    |

    | `date.__str__()` | For a date `d`, `str(d)` is equivalent to `d.isoformat()`.
    |

    | `date.ctime()` | Return a string representing the date, for example `date(2002,
    12, 4).ctime() == ''Wed Dec 4 00:00:00 2002''`. `d.ctime()` is equivalent to `time.ctime(time.mktime(d.timetuple()))`.
    The native C `ctime()` function conforms to the C standard when it run on flatform.
    |

    | `date.strftime(format)` | Return a string representing the date, In the format
    given by the parameter. Format codes referring to hours, minutes or seconds will
    see 0 values. See more `strftime()` and `strptime()` function of `time` module.
    |

    | `date.__format__(format)` | Same as `date.strftime()`. |'
- md: "## Connect to MySQL Database in Python using PyMySQL\n\n## What is PyMySQL?\n\
    \nIn order to connect **Python** to a database you need a driver, which is a library\
    \ used to interact with the database. For **MySQL** database, you have such 3\
    \ driver choices:\n\n- 1. MySQL/Connector for Python\n- 2. MySQLdb\n- 3. PyMySQL\n\
    \n| Driver | Description |\n|---|---|\n| MySQL/Connector for Python | This is\
    \ a library provided by the MySQL community. |\n| MySQLdb | MySQLdb is a library\
    \ that connects to MySQL from Python, it is written in C language and it is free\
    \ and open source software. |\n| PyMySQL | This is a library that connects to\
    \ MySQL from Python and it is a pure Python library. PyMySQL's goal is to replace\
    \ MySQLdb and work on CPython, PyPy and IronPython. |\n\n**Note:** **PyMySQL**\
    \ is an open source project, and you can see its source code here.\n\n## Install\
    \ PyMySQL\n\nIn order to install **PyMySQL** on **Windows** (or **Ubuntu/Linux**)\
    \ you need to open the **CMD** window, and run the following statement:\n\n```\n\
    pip install PyMySQL\n```\n\n**\"Simplehr\"** is a sample database.\nYou can create\
    \ the database based on the guide below.\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_132_0.png)\n\
    \n## Connect MySQL from Python with PyMySQL\n\nThe following simple example uses\
    \ **Python** to connect to **MySQL** and query the **Department** table:\n\n###\
    \ connectExample.py\n\n```\nimport pymysql.cursors\n# Connect to the database.\n\
    connection = pymysql.connect(host='192.168.5.134',\n                         \
    \  user='root',\n                           password='1234',\n               \
    \            db='simplehr',\n                           charset='utf8mb4',\n \
    \                          cursorclass=pymysql.cursors.DictCursor)\nprint (\"\
    connect successful!!!\")\ntry:\n    with connection.cursor() as cursor:\n    \
    \    # SQL\n        sql = \"SELECT Dept_No, Dept_Name FROM Department \"\n   \
    \     # Execute query.\n        cursor.execute(sql)\n        print (\"cursor.description:\
    \ \", cursor.description)\n        print()\n        for row in cursor:\n     \
    \       print(row)\nfinally:\n    # Close connection.\n    connection.close()\n\
    ```\n\n### Results of the example:\n\n```\nconnect successful!!\ncursor.description:\
    \ (('Dept_No', 253, None, 80, 80, 0, False), ('Dept_Name', 253, None, 1020, 1020,\
    \ 0, False))\n\n{'Dept_No': 'D10', 'Dept_Name': 'ACCOUNTING'}\n{'Dept_No': 'D20',\
    \ 'Dept_Name': 'RESEARCH'}\n{'Dept_No': 'D30', 'Dept_Name': 'SALES'}\n{'Dept_No':\
    \ 'D40', 'Dept_Name': 'OPERATIONS'}\n```\n\n## Utility Module\n\nThe advice here\
    \ is that you should create a utility **module** to connect to the database. In\
    \ case I create a module named as \"**myconnutils**\", which defines the `getConnection()`\
    \ function to returns a **connection**.\n\n### myconnutils.py\n\n```\nimport pymysql.cursors\n\
    # Function return a connection.\ndef getConnection():\n    # You can change the\
    \ connection arguments.\n    connection = pymysql.connect(host='192.168.5.129',\n\
    \                                user='root',\n                              \
    \  password='1234',\n                                db='simplehr',\n        \
    \                        charset='utf8mb4',\n                                cursorclass=pymysql.cursors.DictCursor)\n\
    \    return connection\n```\n\n## Query Example\n\nThe following example queries\
    \ the Employee table. **Python** uses `%s` as a \"placeholder\" for the parameter,\
    \ which is independent of the parameter type. For example:\n\n```\nsql1 = \"Insert\
    \ into Department (Dept_Id, Dept_No, Dept_Name) values (%s, %s, %s) \"\nsql2 =\
    \ \"Select * from Employee Where Dept_Id = %s \"\n```\n\n### queryExample.py\n\
    \n```\n# Use your utility module.\nimport myconnutils\n\nconnection = myconnutils.getConnection()\n\
    print (\"Connect successful!\")\nsql = \"Select Emp_No, Emp_Name, Hire_Date from\
    \ Employee Where Dept_Id = %s \"\ntry :\n    cursor = connection.cursor()\n  \
    \  # Execute sql, and pass 1 parameter.\n    cursor.execute(sql, ( 10 ) )\n  \
    \  print (\"cursor.description: \", cursor.description)\n    print()\n    for\
    \ row in cursor:\n        print (\" ----------- \")\n        print(\"Row: \",\
    \ row)\n        print (\"Emp_No: \", row[\"Emp_No\"])\n        print (\"Emp_Name:\
    \ \", row[\"Emp_Name\"])\n        print (\"Hire_Date: \", row[\"Hire_Date\"],\
    \ type(row[\"Hire_Date\"]) )\nfinally:\n    # Close connection.\n    connection.close()\n\
    ```\n\n```\nConnect successful!\ncursor.description:  (('Emp_No', 253, None, 80,\
    \ 80, 0, False), ('Emp_Name', 253, None, 20\n\n ----------- \nRow:  {'Emp_No':\
    \ 'E7839', 'Emp_Name': 'KING', 'Hire_Date': datetime.date(1981, 11, 17)}\nEmp_No:\
    \  E7839\nEmp_Name:  KING\nHire_Date:  1981-11-17 <class 'datetime.date'>\n -----------\
    \ \nRow:  {'Emp_No': 'E7934', 'Emp_Name': 'MILLER', 'Hire_Date': datetime.date(1982,\
    \ 1, 23)}\nEmp_No:  E7934\nEmp_Name:  MILLER\nHire_Date:  1982-01-23 <class 'datetime.date'>\n\
    ```\n\n## Insert Example\n\n### insertExample.py\n\n```\n# Use your utility module.\n\
    import myconnutils\nimport pymysql.cursors\n\nconnection = myconnutils.getConnection()\n\
    print (\"Connect successful!\")\ntry :\n    cursor = connection.cursor()\n   \
    \ sql = \"Select max(Grade) as Max_Grade from Salary_Grade \"\n    cursor.execute(sql)\n\
    \    # 1 row.\n    oneRow = cursor.fetchone()\n\n    # Output: {'Max_Grade': 4}\
    \ or {'Max_Grade': None}\n    print (\"Row Result: \", oneRow)\n    grade = 1\n\
    \n    if oneRow != None and oneRow[\"Max_Grade\"] != None:\n        grade = oneRow[\"\
    Max_Grade\"] + 1\n    cursor = connection.cursor()\n    sql = \"Insert into Salary_Grade\
    \ (Grade, High_Salary, Low_Salary) \" \\\n        + \" values (%s, %s, %s) \"\n\
    \    print (\"Insert Grade: \", grade)\n    # Execute sql, and pass 3 parameters.\n\
    \    cursor.execute(sql, (grade, 2000, 1000 ) )\n    connection.commit()\nfinally:\n\
    \    connection.close()\n```\n\n### Output:\n\n```\nconnect successful!!\nRow\
    \ Result: {'Max_Grade': 2}\nInsert Grade: 3\n```\n\n## Update Example\n\n### updateExample.py\n\
    \n```\n# Use your utility module.\nimport myconnutils\nimport pymysql.cursors\n\
    import datetime\n\nconnection = myconnutils.getConnection()\nprint (\"Connect\
    \ successful!\")\ntry :\n    cursor = connection.cursor()\n    sql = \"Update\
    \ Employee set Salary = %s, Hire_Date = %s where Emp_Id = %s \"\n    # Hire_Date\n\
    \    newHireDate = datetime.date(2002, 10, 11)\n    # Execute sql, and pass 3\
    \ parameters.\n    rowCount = cursor.execute(sql, (850, newHireDate, 7369 ) )\n\
    \    connection.commit()\n    print (\"Updated! \", rowCount, \" rows\")\nfinally:\n\
    \    # Close connection.\n    connection.close()\n```\n\n### Output:\n\n```\n\
    connect successful!\nUpdate! 1 rows\n```\n\n## Delete Example\n\n### deleteExample.py\n\
    \n```\n# Use your utility module.\nimport myconnutils\n\nconnection = myconnutils.getConnection()\n\
    print (\"Connect successful!\")\ntry :\n    cursor = connection.cursor()\n   \
    \ sql = \"Delete from Salary_Grade where Grade = %s\"\n\n    # Execute sql, and\
    \ pass 1 parameters.\n    rowCount = cursor.execute(sql, ( 3 ) )\n    connection.commit()\n\
    \    print (\"Deleted! \", rowCount, \" rows\")\nfinally:\n    # Close connection.\n\
    \    connection.close()\n```\n\n### Output:\n\n```\nconnect successful!\nDeleted!\
    \ 1 rows\n```\n\n## Call Procedure\n\nThere are some problems when you call a\
    \ function or procedure in **Python**. I set up a situation like this:\nYou have\
    \ a procedure:\n\n- Get_Employee_Info(p_Emp_Id, v_Emp_No, v_First_Name, v_Last_Name,\
    \ v_Hire_Date)\n\n### get_Employee_Info\n\n```\nDELIMITER $$\n\n-- This procedure\
    \ retrieves information of an employee,\n-- Input parameter: p_Emp_ID (Integer)\n\
    -- There are four output parameters v_Emp_No, v_First_Name, v_Last_Name, v_Hire_Date\n\
    \nCREATE PROCEDURE get_Employee_Info(p_Emp_ID Integer,\n                     \
    \               out v_Emp_No Varchar(50) ,\n                                 \
    \   out v_First_Name Varchar(50) ,\n                                    Out v_Last_name\
    \ Varchar(50) ,\n                                    Out v_Hire_date Date)\nBEGIN\n\
    set v_Emp_No = concat( 'E' , Cast(p_Emp_Id as char(15)) );\n--\nset v_First_Name\
    \ = 'Michael';\nset v_Last_Name = 'Smith';\nset v_Hire_date = curdate();\nEND\n\
    ```\n\nThe procedure above has an input parameter **p_Emp_Id** and the four output\
    \ parameters **v_Emp_No, v_First_Name, v_Last_Name, v_Hire_Date**, and you call\
    \ this procedure from **Python** passing the value to **p_Emp_Id** to get 4 output\
    \ values. Unfortunately, the value received is not guaranteed to be true (as stated\
    \ in the DB-API specification). **Python** can only retrieve values from a SELECT\
    \ clause."
