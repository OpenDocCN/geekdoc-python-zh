    ## datetime module


    **Datetime** is a module which is designed with object-oriented programming to
    work with date and time in **Python**. It defines several classes that represent
    date and time.


    ![](img/32bef8dd64dcf85a8518a3e4c521c46c_127_0.png)


    | Class | Description |

    |---|---|

    | datetime.date | A date object represents a date, excluding time, according to
    the Gregorian calendar. |

    | datetime.datetime | A datetime object represents a date and time, according
    to the Gregorian calendar. |

    | datetime.time | A time object represents time, excluding date. |

    | datetime.tzinfo | A base abstract class for time zone information objects. |

    | datetime.timezone | A direct child class of the tzinfo class, in UTC (Coordinated
    Universal Time). |

    | datetime.timedelta | A timedelta object represents a duration, the difference
    between two dates or times. |


    ## datetime.timedelta


    **Timedelta** is a class located in the **datetime** module, which describes a
    time period. As the difference between 2 time periods.


    The **timedelta** class has seven attributes, all of which have a default value
    of 0.


    | Attribute | | Range |

    | --- | --- | --- |

    | days | | -999999999 : 999999999 |

    | seconds | | 0 : 86399 |

    | microseconds | 1 seconds = 1000,000 microseconds | 0 : 999999 |

    | milliseconds | 1 seconds = 1000 milliseconds | |

    | minutes | | |

    | hours | | |

    | weeks | | |


    ## Operators:


    | Operation | Example |

    | --- | --- |

    | t1 = t2 + t3 | t2 = (hours = 10, seconds= 2)<br>t3 = (hours = 1, minutes = 3)<br>-->
    t1 = (hours= 11, minutes = 3, seconds = 2) |

    | t1 = t2 - t3 | t2 = (hours = 10, seconds= 2)<br>t3 = (hours = 1, minutes = 3)<br>-->
    t1 = (hours= 8, minutes = 57, seconds = 2) |

    | t1 = t2 * i<br>t1 = i * t2 | t2 = (hours = 10, seconds= 2)<br>i = 3<br>--> t1
    = (days =1, hours = 6, seconds= 6) |

    | t1 = t2 | t2 = (hours = 25, seconds= 2)<br>--> t1 = (days: 1, hours: 1, seconds:
    2) |

    | +t1 | return t1 |

    | -t1 | t1 = (hours = 10, seconds= 2)<br>--> -t1 = (days = -1, hours = 13, minutes
    = 59, seconds= 58) |

    | abs(t) | Absolute value, equivalent to + t when t.days>= 0, and is -t when t.days
    <0.<br>t = (hours= -25, minutes = 3)<br>--> t = (days = -2, hours = 23, minutes
    = 3)<br>--> abs(t) = (days = 1, hours = 0, minutes = 57) |

    | str(t) | Returns the string in the form [D day [s,]] [H] H: MM: SS [.UUUUUU],
    D can get negative value. |

    | repr(t) | Returns a string in the form datetime.timedelta (D [, S [, U]]), D
    can get negative value |


    ## datetime.date


    **Datetime.date** is a class, its object represents date, excluding time information.


    ## Constructor


    **constructor**


    ```python

    # MINYEAR <= year <= MAXYEAR

    # 1 <= month <= 12

    # 1 <= day <= number of days in the given month and year

    date (year, month, day)

    ```


    The constructor of the **date** class can raise a **ValueError** if the values
    passed in are invalid (out of range).


    ## Constants:


    | Constants | Description |

    |---|---|

    | date.min | The earliest representable date, date(MINYEAR, 1, 1). |

    | date.max | The latest representable date, date(MAXYEAR, 12, 31). |

    | date.resolution | The smallest possible difference between non-equal date objects,
    timedelta(days=1). |


    ## Operators


    | Operation | Description |

    |---|---|

    | date2 = date1 + timedelta | Add a duration, timedelta |

    | date2 = date1 - timedelta | Subtract a duration, timedelta |

    | timedelta = date1 - date2 | Subtract two **date** object. |

    | date1 < date2 | Compare two **date** objects. |


    ## Methods:


    | Method | Description |

    |---|---|

    | `date.replace(year=self.year, month=self.month, day=self.day)` | Return a date
    with the same attributes, except for those attributes given new values by whichever
    keyword arguments are specified. For example: `d == date(2002, 12, 31), d.replace(day=26)
    == date(2002, 12, 26)`. |

    | `date.timetuple()` | Return a `time.struct_time` such as returned by `time.localtime()`.
    The hours, minutes and seconds are 0, and the DST flag is -1. `d.timetuple()`
    is equivalent to `time.struct_time((d.year, d.month, d.day, 0, 0, 0, d.weekday(),
    yday, -1))`, where `yday = d.toordinal() - date(d.year, 1, 1).toordinal() + 1`
    is the day number within the current year starting with 1 for January 1st. |

    | `date.toordinal()` | Return the proleptic Gregorian ordinal of the date, where
    January 1 of year 1 has ordinal 1. For any date object `d`, `date.fromordinal(d.toordinal())
    == d`. |

    | `date.weekday()` | Return the day of the week as an integer, where Monday is
    0 and Sunday is 6. For example, `date(2002, 12, 4).weekday() == 2`, a Wednesday.
    See also `isoweekday()`. |

    | `date.isoweekday()` | Return the day of the week as an integer (According to
    ISO standard), where Monday is 1 and Sunday is 7. For example, `date(2002, 12,
    4).isoweekday() == 3`, a Wednesday. See also `weekday()`, `isocalendar()`. |

    | `date.isocalendar()` | Return a 3-tuple, (ISO year, ISO week number, ISO weekday).
    |

    | `date.isoformat()` | Return a string representing the date in ISO 8601 format,
    ‘YYYY-MM-DD’. For example, `date(2002, 12, 4).isoformat() == ''2002-12-04''`.
    |

    | `date.__str__()` | For a date `d`, `str(d)` is equivalent to `d.isoformat()`.
    |

    | `date.ctime()` | Return a string representing the date, for example `date(2002,
    12, 4).ctime() == ''Wed Dec 4 00:00:00 2002''`. `d.ctime()` is equivalent to `time.ctime(time.mktime(d.timetuple()))`.
    The native C `ctime()` function conforms to the C standard when it run on platform.
    |

    | `date.strftime(format)` | Return a string representing the date, In the format
    given by the parameter. Format codes referring to hours, minutes or seconds will
    see 0 values. See more `strftime()` and `strptime()` function of `time` module.
    |

    | `date.__format__(format)` | Same as `date.strftime()`. |'
