    \n## testVariablePlayer.py\n\n```python\nfrom player import Player\n\nplayer1\
    \ = Player(\"Tom\", 20)\n\nplayer2 = Player(\"Jerry\", 20)\n\n# Access via class\
    \ name.\nprint (\"Player.minAge = \", Player.minAge)\n\n# Access via object.\n\
    print (\"player1.minAge = \", player1.minAge)\nprint (\"player2.minAge = \", player2.minAge)\n\
    \nprint (\" ----------- \")\n\nprint (\"Assign new value to minAge via class name,\
    \ and print..\")\n\n# Assign new value to minAge via class name\nPlayer.minAge\
    \ = 19\n\nprint (\"Player.minAge = \", Player.minAge)\nprint (\"player1.minAge\
    \ = \", player1.minAge)\nprint (\"player2.minAge = \", player2.minAge)\n```\n\n\
    ## List members of a class or object\n\nPython provides you with the function\
    \ **dir**, the function shows the list of the methods, attributes, variables of\
    \ the class or object.\n\n## testDirFunction.py\n\n```python\nfrom player import\
    \ Player\n\n# Print out list of attributes, methods and variables of class 'Player'\n\
    print ( dir(Player) )\n\nprint (\"\\n\\n\")\n\nplayer1 = Player(\"Tom\", 20)\n\
    \nplayer1.address =\"USA\"\n\n# Print out list of attributes, methods and variables\
    \ of object 'player1'\nprint ( dir(player1) )\n```\n\n## Inheritance and polymorphism\
    \ in Python\n\n### Introduction\n\nInheritance and polymorphism - this is a very\
    \ important concept in **Python**. You must understand it better if you want to\
    \ learn **Python**.\n\n> *Note : Before you start learning about \"Inheritance\
    \ in Python\", make sure you have the concept of \"Class and object\", if not,\
    \ let's learn it:*\n\n### Inheritance in Python\n\n**Python** allows you to create\
    \ an extension class from one or more other classes. This class is called a derived\
    \ class, or a subclass.\n\nThe child class inherits the attributes, methods, and\
    \ other members from the parent class. It can also override methods from the parent\
    \ class. If the child class does not define its own constructor, by default, it\
    \ will inherit the constructor of the parent class.\n\n> *Note : Unlike Java,\
    \ CSharp and several other languages, Python allows multiple inheritance. A class\
    \ can be extended from one or more parent classes.*\n\nWe need a few classes to\
    \ participate in examples.\n\n- **Animal**: Class simulate an animal.\n- **Duck**:\
    \ Subclass of Animal.\n- **Cat**: Subclass of Animal.\n- **Mouse**: Subclass of\
    \ Animal.\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_67_0.png)\n\nIn **Python**,\
    \ constructor of class used to create an object (instance), and assign the value\
    \ for the attributes.\nConstructor of subclasses always called to a constructor\
    \ of parent class to initialize value for the attributes in the parent class,\
    \ then it start assign value for its attributes.\n\n### Example:\n\n#### animal.py\n\
    \n```python\nclass Animal :\n\n    # Constructor\n    def __init__(self, name):\n\
    \n        # Animal class has one attribute: 'name'.\n        self.name= name\n\
    \n    # Method\n    def showInfo(self):\n        print (\"I'm \" + self.name)\n\
    \n    # Method:\n    def move(self):\n        print (\"moving ...\")\n```\n\n\
    **Cat** is the class that inherits from the **Animal** class, it also has its\
    \ attributes.\n\n#### cat.py\n\n```python\nfrom animal import Animal\n\n# Cat\
    \ class extends from Animal.\nclass Cat (Animal):\n\n    def __init__(self, name,\
    \ age, height):\n        # Call to constructor of parent class (Animal)\n    \
    \    # to assign value to attribute 'name' of parent class.\n        super().__init__(name)\n\
    \n        self.age = age\n        self.height = height\n\n    # Override method.\n\
    \    def showInfo(self):\n\n        print (\"I'm \" + self.name)\n        print\
    \ (\" age \" + str(self.age))\n        print (\" height \" + str(self.height))\n\
    ```\n\n#### catTest.py\n\n```python\nfrom cat import Cat\n\ntom = Cat(\"Tom\"\
    , 3, 20)\n\nprint (\"Call move() method\")\ntom.move()\nprint(\"\\n\")\nprint(\"\
    Call showInfo() method\")\ntom.showInfo()\n```\n\n### Running catTest module:\n\
    \nCall move() method\nmoving ...\n\nCall showInfo() method\nI'm Tom\nage 3\nheight\
    \ 20\n\nWhat's happened when you create an object from constructor . How does\
    \ it call up a constructor of the parent class? Please see the illustration below:\n\
    \n![](img/32bef8dd64dcf85a8518a3e4c521c46c_69_0.png)\n\nWith the above illustration\
    \ you see that, constructor of parent class is called in constructor of subclass,\
    \ it will assign values to the attributes of the parent class, then the attributes\
    \ of the subclass.\n\n### Override method\n\nBy default, child classes inherit\
    \ methods from the parent class, but parent classes can override the method of\
    \ the parent class.\n\n#### mouse.py\n\n```python\nfrom animal import Animal\n\
    \n# Mouse class extends from Animal.\nclass Mouse (Animal):\n    def __init__(self,\
    \ name, age, height):\n        # Call to constructor of parent class (Animal)\n\
    \        # to assign value to attribute 'name' of parent class.\n        super().__init__(name)\n\
    \        self.age = age\n        self.height = height\n\n    # Override method.\n\
    \    def showInfo(self):\n        # Call method of parent class.\n        super().showInfo()\n\
    \        print (\" age \" + str(self.age))\n        print (\" height \" + str(self.height))\n\
    \n    # Override method.\n    def move(self):\n        print (\"Mouse moving ...\"\
    )\n```\n\n#### mouseTest.py\n\n```python\nfrom mouse import Mouse\n\njerry = Mouse(\"\
    Jerry\", 3, 5)\n\nprint (\"Call move() method\")\njerry.move()\n\nprint (\"\\\
    n\")\nprint (\"Call showInfo() method\")\njerry.showInfo()\n```\n\n### Output:\n\
    \nCall move() method\nMouse moving ...\n\nCall showInfo() method\nI'm Jerry\n\
    age 3\nheight 5\n\n### Abstract Method\n\nThe concept of an abstract method or\
    \ abstract class is defined in languages such as **Java**, **C#**. But it is not\
    \ clearly defined in **Python**. However, we have a way to define it. A class\
    \ called as abstract defines abstract methods and child class must override these\
    \ methods if you want to use them. The abstract methods always throw the exception\
    \ **NotImplementedError**.\n\n#### abstractExample.py\n\n```python\n# An abstract\
    \ class.\nclass AbstractDocument :\n\n    def __init__(self, name):\n        self.name\
    \ = name\n\n    # A method can not be used, because it always throws an error.\n\
    \    def show(self):\n        raise NotImplementedError(\"Subclass must implement\
    \ abstract method\")\n\nclass PDF(AbstractDocument):\n\n    # Override method\
    \ of parent class\n    def show(self):\n        print (\"Show PDF document:\"\
    , self.name)\n\nclass Word(AbstractDocument):\n\n    def show(self):\n       \
    \ print (\"Show Word document:\", self.name)\n\n# --------------------------------------------------\n\
    documents = [ PDF(\"Python tutorial\"),\n              Word(\"Java IO Tutorial\"\
    ),\n              PDF(\"Python Date & Time Tutorial\") ]\n\nfor doc in documents\
    \ :\n    doc.show()\n```\n\n### Output:\n\nShow PDF document: Python tutorial\n\
    Show Word document: Java IO Tutorial\nShow PDF document: Python Date & Time Tutorial\n\
    \nThe example above demonstrates Polymorphism in **Python**. A **Document** object\
    \ can be represented in various forms (**PDF**, **Word**, **Excel**, ...).\nAnother\
    \ example illustrates polymorphism: When I talk about an Asian people, it's quite\
    \ abstract, he can be Japanese, Vietnamese, or Indian. However, there are features\
    \ of Asian people.\n\n### Multiple inheritance\n\n**Python** allows multiple inheritance,\
    \ which means you can create an extension class from two or more other classes.\
    \ The parent classes can have the same attributes, or the same methods, ....The\
    \ child class will prioritize to inherit attributes, methods, ... of the first\
    \ class in a list of inheritance\n\n#### multipleInheritanceExample.py\n\n```python\n\
    class Horse:\n    maxHeight = 200; # centimeter\n\n    def __init__(self, name,\
    \ horsehair):\n        self.name = name\n        self.horsehair = horsehair\n\n\
    \    def run(self):\n        print (\"Horse run\")\n\n    def showName(self):\n\
    \        print (\"Name: (House's method): \", self.name)\n\n    def showInfo(self):\n\
    \        print (\"Horse Info\")\n\nclass Donkey:\n    def __init__(self, name,\
    \ weight):\n        self.name = name\n```"
