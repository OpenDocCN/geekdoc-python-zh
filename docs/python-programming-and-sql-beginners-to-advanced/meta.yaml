    | 1 | tm_mon | range [1, 12] |

    | 2 | tm_mday | range [1, 31] |

    | 3 | tm_hour | range [0, 23] |

    | 4 | tm_min | range [0, 59] |

    | 5 | tm_sec | range [0, 61]; See more below |

    | 6 | tm_wday | range [0, 6], Monday is 0 |

    | 7 | tm_yday | range [1, 366] |

    | 8 | tm_isdst | 0, 1 or -1; see below |

    | N/A | tm_zone | abbreviation of timezone name |

    | N/A | tm_gmtoff | offset east of UTC in seconds |


    **Note :** The range of second really is 0 to 61; this accounts for leap seconds
    and the (very rare) double leap seconds.


    The functions of **time** call functions written in **C** language. Here is a
    list of common functions, in order to detail it, you can refer to document on
    official website of **Python**.


    # Ticks ==> struct_time


    | Function | Discription |

    | :--- | :--- |

    | time.gmtime([secs]) | Convert the time in seconds from the spoch time to a struct_time
    in **UTC**, where the dst flag is 0. If the secs parameter is not supplied or
    None, it will have the default value returned by the **time()** function. |

    | time.localtime([secs]) | The same as **gmtime()** function, but is converted
    into local time. And the dst flag has a value of 1. |


    The **gmtime([secs])** and **localtime([secs])** functions return the **struct_time**
    type.'
