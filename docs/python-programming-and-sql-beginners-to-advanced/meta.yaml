    | time.asctime([struct_t]) | Convert a **tuple** or **struct_time** representing
    a time as returned by **gmtime()** or **localtime()** to a string of the following
    form: ''Sun Jun 20 23:21:05 1993''. If t is not provided, the current time as
    returned by **localtime()** is used. Locale information is not used by **asctime()**.
    |

    | time.ctime([secs]) | Convert a time expressed in seconds since the epoch to
    a string representing local time. If **secs** is not provided or **None**, the
    current time as returned by **time()** is used. **ctime(secs)** is equivalent
    to **asctime(localtime(secs))**. Locale information is not used by **ctime()**.
