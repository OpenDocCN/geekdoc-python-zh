  md: "# try-except-finally\n\nWe have got accustomed with catching error through\
    \ **try-except** block. **try-except-finally** is used to fully handle exception.\
    \ The **finally** block is always executed, regardless of whether the exception\
    \ occurs in the **try** block or not.\n\n# try - except - finally\n\n```\ntry\
    \ :\n    # Do something here.\nexcept Exception1 as e :\n    # Do something here.\n\
    except Exception2 as e :\n    # Do something here.\nfinally :\n    # The finally\
    \ block is always executed.\n    # Do something here.\n```\n\n# Example:\n\n#\
    \ tryExceptFinallyDemo.py\n\n```\ndef toInteger(text) :\n    try :\n        print\
    \ (\"-- Begin parse text: \", text)\n        # An Exception can throw here (ValueError).\n\
    \        value = int(text)\n        return value\n    except ValueError as e :\n\
    \        # In the case of 'text' is not a number.\n        # This 'except' block\
    \ will be executed.\n        print (\"ValueError message: \", str(e))\n      \
    \  print (\"type(e): \", type(e))\n        # Returns 0 if ValueError occurs.\n\
    \        return 0\n    finally :\n        print (\"-- End parse text: \" + text)\n\
    ```"
