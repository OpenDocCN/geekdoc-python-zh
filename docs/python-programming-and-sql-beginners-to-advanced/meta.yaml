    \        # 返回一个值。\n        # 函数在此结束。\n        return \"Hello every body!\"\n\n\
    \    # 如果 name 不为空且不为 null (not None)，\n    # 将执行此代码。\n    return \"Hello \" +\
    \ name\n\n# 调用函数，向函数传递参数。\ngreeting = getGreeting(\"\")\nprint(greeting)\ngreeting\
    \ = getGreeting(\"Python\")\nprint(greeting)\n```\n\n### 输出：\n\nHello every body!\n\
    Hello Python\n\n## 带有必需参数的函数\n\n以下示例定义了一个名为 showInfo 的函数，它有2个参数。这两个参数都是必需的。当你调用该函数时，需要向函数提供2个参数。否则程序将抛出错误。\n\
    \n### requiredParameterExample.py\n\n```python\ndef showInfo(name, gender):\n\
    \    print (\"Name: \", name);\n    print (\"Gender: \", gender);\n\n# 有效\nshowInfo(\"\
    Tran\", \"Male\")\n# 无效 ==> 错误!!\nshowInfo(\"Tran\")\n```\n\n## 带有默认参数的函数\n\n\
    函数可以有很多参数，包括必需参数和具有默认值的参数。\n下面的 showInfo 函数有三个参数（*name, gender = \"Male\", country\
    \ = \"US\"*）：\n\n1.  Name 是一个必需参数。\n2.  Gender 是一个默认值为 \"Male\" 的参数。\n3.  Country\
    \ 是一个默认值为 \"US\" 的参数。\n\n### defaultParameterExample.py\n\n```python\ndef showInfo(name,\
    \ gender = \"Male\", country =\"US\"):\n    print (\"Name: \", name)\n    print\
    \ (\"Gender: \", gender)\n    print (\"Country: \", country)\n\n# 有效\nshowInfo(\"\
    Aladdin\", \"Male\", \"India\")\nprint (\" ------ \")\n# 有效\nshowInfo(\"Tom\"\
    , \"Male\")\nprint (\" ------ \")\n# 有效\nshowInfo(\"Jerry\")\nprint (\" ------\
    \ \")\n# 有效\nshowInfo(name = \"Tintin\", country =\"France\")\nprint (\" ------\
    \ \")\n```\n\n### 输出：\n\nName: Aladdin\nGender: Male\nCountry: India\n------\n\
    Name: Tom\nGender: Male\nCountry: US\n------\nName: Jerry\nGender: Male\nCountry:\
    \ US\n------\nName: Tintin\nGender: Male\nCountry: France\n------\n\n## 带有可变长度参数的函数\n\
    \n可变长度参数是一种特殊参数。调用函数时，你可以向该参数传递0个、1个或多个值。\n\n注意：“可变长度参数”必须始终是函数的最后一个参数。\n\n###\
    \ 示例：\n\nSumValues 函数有三个参数：\n\n-   参数 a, b 是必需的。\n-   参数 *others 是“可变长度参数”。\n\n\
    ### variableLengthParameterExample.py\n\n```python\ndef sumValues(a, b, *others):\n\
    \    retValue = a + b\n\n    # 'others' 参数类似一个数组。\n    for other in others :\n\
    \        retValue = retValue + other\n\n    return retValue\n```\n\n如何调用函数：\n\n\
    ### testVariableLengthParameter.py\n\n```python\nfrom variableLengthParameterExample\
    \ import sumValues\n\n# 传递: *others = []\na = sumValues(10, 20)\nprint(\"sumValues(10,\
    \ 20) = \", a);\n\n# 传递: *others = [1]\na = sumValues(10, 20, 1);\nprint(\"sumValues(10,\
    \ 20, 1 ) = \", a);\n\n# 传递: *others = [1,2]\na = sumValues(10, 20, 1, 2);\nprint(\"\
    sumValues(10, 20, 1 , 2) = \", a);\n\n# 传递: *others = [1,2,3,4,5]\na = sumValues(10,\
    \ 20, 1, 2,3,4,5);\nprint(\"sumValues(10, 20, 1, 2, 3, 4, 5) = \", a);\n```\n\n\
    ### 输出：\n\nsumValues(10, 20) = 30\nsumValues(10, 20, 1) = 31\nsumValues(10, 20,\
    \ 1, 2) = 33\nsumValues(10, 20, 1, 2, 3, 4, 5) = 45\n\n## 匿名函数\n\n如果函数不是通过通常的\
    \ def 关键字定义的，而是使用 lambda 关键字定义的，则称为匿名函数。\n\n1.  匿名函数可以有0个或多个参数，但函数体中只能有一个表达式。表达式的值就是函数的返回值。但不要使用关键字\
    \ 'return'。\n2.  参数列表以逗号分隔，且不包含在括号 ( ) 中。\n3.  在匿名函数体中，你不能访问外部变量，只能访问其参数。\n4.\
    \  匿名函数不能直接调用 print，因为 lambda 需要一个表达式。\n\n### 语法：\n\n```\nlambda [arg1 [,arg2,.....argn]]\
    \ : expression\n```\n\n### 示例：\n\n### lambdaFunctionExample.py\n\n```python\n\
    # 声明一个变量：hello = 一个没有参数的匿名函数。\nhello = lambda : \"Hello\"\n\n# 声明一个变量：mySum =\
    \ 一个有2个参数的匿名函数。\nmySum = lambda a, b : a + b\n\na= hello()\nprint (a)\n\na = mySum(10,\
    \ 20)\nprint (a)\n```\n\n### 输出：\n\nHello\n30\n\n## Python 中的类和对象\n\n### Python\
    \ 中的面向对象\n\nPython 是一种面向过程的编程语言，同时也是一种面向对象的编程语言。\n\n### 面向过程\n\n“面向过程”在 Python\
    \ 中体现为使用函数。你可以定义函数，并且这些函数可以在 Python 程序的其他模块中使用。\n\n### 面向对象\n\nPython 中的“面向对象”体现为使用类，你可以定义一个类，类是创建对象的原型。\n\
    \n### 在 Python 中创建类\n\n创建类的语法：\n\n**类语法**\n\n```python\nclass ClassName:\n   \
    \ '类的简要描述（可选）'\n    # 代码 ...\n```\n\n-   要定义一个类，你需要使用 class 关键字，后跟类名和冒号 (:)。类体中的第一行是一个简要描述此类的字符串。（可选），你可以通过\
    \ *Class*.__Doc__ 访问此字符串。\n-   在类体中，你可以声明属性、方法和构造函数。\n\n### 属性：\n\n属性是类的成员。例如，矩形有两个属性，包括宽度和高度。\n\
    \n### 方法：\n\n-   类的方法类似于普通函数，但它是类的函数，为了使用它，你需要通过对象调用。\n-   方法的第一个参数始终是 self（一个指向类本身的关键字）。\n\
    \n### 构造函数：\n\n-   构造函数是类的一个特殊方法，始终命名为 __init__。\n-   构造函数的第一个参数始终是 self（一个指向类本身的关键字）。\n\
    -   构造函数用于创建对象。\n-   构造函数将参数的值赋给将要创建的对象的属性。\n-   你只能在类中定义构造函数。\n-   如果类没有定义构造函数，Python\
    \ 会假定它有一个默认的构造函数，__init__ (self)，其函数体为空。\n\n### rectangle.py\n\n```python\n# 矩形。\n\
    class Rectangle :\n    '这是 Rectangle 类'\n\n    # 创建对象的方法（构造函数）\n    def __init__(self,\
    \ width, height):\n        self.width= width\n        self.height = height\n\n\
    \    def getWidth(self):\n        return self.width\n\n    def getHeight(self):\n\
    \        return self.height\n\n    # 计算面积的方法。\n    def getArea(self):\n      \
    \  return self.width * self.height\n```\n\n从 Rectangle 类创建一个对象：\n\n### testRectangle.py\n\
    \n```python\nfrom rectangle import Rectangle\n\n# 创建2个对象：r1 和 r2\nr1 = Rectangle(10,5)\n\
    \nr2 = Rectangle(20,11)\n\nprint (\"r1.width = \", r1.width)\nprint (\"r1.height\
    \ = \", r1.height)\nprint (\"r1.getWidth() = \", r1.getWidth())\nprint (\"r1.getArea()\
    \ = \", r1.getArea())\n\nprint (\"------------------\")\n\nprint (\"r2.width =\
    \ \", r2.width)\nprint (\"r2.height = \", r2.height)\nprint (\"r2.getWidth() =\
    \ \", r2.getWidth())\nprint (\"r2.getArea() = \", r2.getArea())\n```\n\n```\n\
    r1.width =  10\nr1.height =  5\nr1.getWidth() =  10\nr1.getArea() =  50\n------------------\n\
    r2.width =  20\nr2.height =  11\nr2.getWidth() =  20\nr2.getArea() =  220\n```"
