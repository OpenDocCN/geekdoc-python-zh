    # Python Tuples


    In **Python**, Tuples is a sequence of values containing many elements, which
    is similar to **List**. Unlike List, **Tuples** is an immutable data type, all
    updates on the Tuple create a new entity on the memory.


    In order to write a Tuple, you need to put the elements into parentheses ( ) and
    separated by comma. These elements of the list are indexed with the starting index
    0.


    # tupleExample.py'
