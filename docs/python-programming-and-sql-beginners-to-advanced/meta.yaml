  - '[PAGE 131]


    # Connect to MySQL Database in Python using PyMySQL


    # What is PyMySQL?


    In order to connect **Python** to a database you need a driver, which is a library
    used to Interact with the database. For **MySQL** database, you have such 3 Driver
    choices:


    +   1. MySQL/connector for Python

    2. MySQLdb

    3. PyMySQL

    4.


    | Driver | Discription |

    |---|---|

    | MySQL/Connector for Python | This is a library provided by the MySQL community.
    |

    | MySQLdb | MySQLdb is a library that connects to MySQL from Python, it is written
    in C language and it is free and open source software. |

    | PyMySQL | This is a library that connects to MySQL from Python and it is a pure
    Python library. PyMySQL''s goal is to replace MySQLdb and work on CPython, PyPy
    and IronPython. |


    **Note : PyMySQL** is an open source project, and you can see its source code
    here:


    # Install PyMySQL


    In order to install **PyMySQL** on **Windows** (or **Ubuntu/Linux**) you need
    to open the **CMD** window, and run the following statement:


    ```

    pip install PyMySQL

    ```


    **"Simplehr"** is a sample database.

    You can create the database based on the guide below.'
