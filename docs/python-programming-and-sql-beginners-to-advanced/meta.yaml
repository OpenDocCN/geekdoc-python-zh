    # 性别异常\nclass GenderException(Exception):\n    def __init__(self, msg):\n    \
    \    super().__init__(msg)\n\n# 语言异常。\nclass LanguageException(Exception):\n \
    \   def __init__(self, msg):\n        super().__init__(msg)\n\nclass PersonException(Exception):\n\
    \    def __init__(self, msg):\n        super().__init__(msg)\n\n# 此函数可能抛出 GenderException。\n\
