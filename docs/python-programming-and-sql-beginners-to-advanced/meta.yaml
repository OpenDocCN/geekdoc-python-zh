- md: "## What happens when you create an object from a class?\n\nWhen you create\
    \ an object of the Rectangle class, the constructor method of that class will\
    \ be called to create an object, and the properties of the object will be assigned\
    \ the value from the parameter. It is similar to the illustration below:\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_54_0.png)\n\
    \n## Constructor with default parameters\n\nUnlike other languages, the class\
    \ in Python only has one constructor. However, Python allows the parameter to\
    \ have a default value.\n\n**Note:** All required parameters must precede all\
    \ parameters with default values.\n\n## person.py\n\n```python\nclass Person:\n\
    \n    # The age and gender parameters has a default value.\n    def __init__(self,\
    \ name, age=1, gender=\"Male\"):\n\n        self.name = name\n        self.age\
    \ = age\n        self.gender = gender\n\n    def showInfo(self):\n\n        print(\"\
    Name: \", self.name)\n        print(\"Age: \", self.age)\n        print(\"Gender:\
    \ \", self.gender)\n```\n\n## For example:\n\n## testPerson.py\n\n```python\n\
    from person import Person\n\n# Create an object of Person.\naimee = Person(\"\
    Aimee\", 21, \"Female\")\n\naimee.showInfo()\n\nprint(\"----------------\")\n\n\
    # default age, gender.\nalice = Person(\"Alice\")\n\nalice.showInfo()\n\nprint(\"\
    ----------------\")\n\n# Default gender.\ntran = Person(\"Tran\", 37)\n\ntran.showInfo()\n\
    ```\n\n```\nName:  Aimee\nAge:  21\nGender:  Female\n------------------\nName:\
    \  Alice\nAge:  1\nGender:  Male\n------------------\nName:  Tran\nAge:  37\n\
    Gender:  Male\n```\n\n## Compare objects\n\nIn Python, when you create an object\
    \ through Constructor, will be a real entity is created in memory, it has a specified\
    \ address.\n\nAn operator assigned AA object by an BB object does not create new\
    \ entity on the memory, it's just pointing to address of AA to BB's address.\n\
    \n```python\nr1 = Rectangle(width=20, height=10)\nr2 = Rectangle(width=20, height=10)\n\
    r3 = r1\n```\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_56_0.png)\n\n== Operator\
    \ used to compare two objects that is pointing to, it returns True if the two\
    \ objects refer to the same address in memory. Operators != is used to compare\
    \ the two addresses of two objects that is pointing to, it returns True if the\
    \ two objects that point to two different addresses.\n\n## compareObject.py\n\n\
    ```python\nfrom rectangle import Rectangle\n\nr1 = Rectangle(20, 10)\n\nr2 = Rectangle(20,\
    \ 10)\n\nr3 = r1\n\n# Compare the address of r1 and r2\ntest1 = r1 == r2  # -->\
    \ False\n\n# Compare the address of r1 and r2\ntest2 = r1 == r3  # --> True\n\n\
    print(\"r1 == r2 ? \", test1)\n\nprint(\"r1 == r3 ? \", test2)\n\nprint(\"----------------\
    \ \")\n\nprint(\"r1 != r2 ? \", r1 != r2)\n\nprint(\"r1 != r3 ? \", r1 != r3)\n\
    ```\n\n```\nr1 == r2 ?  False\nr1 == r3 ?  True\n----------------\nr1 != r2 ?\
    \  True\nr1 != r3 ?  False\n```\n\n## Attributes\n\nIn Python, there are 2 similar\
    \ concepts that you need to distinguish them:\n\n1. Attribute\n2. Class's variable\n\
    \nTo simplify that, let's analyze the example below:\n\n## player.py\n\n```python\n\
    class Player:\n    # Class's Variable\n    minAge = 18\n\n    maxAge = 50\n\n\
    \    def __init__(self, name, age):\n\n        self.name = name\n        self.age\
    \ = age\n```\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_58_0.png)\n\n## Attribute\n\
    \nObjects created from one class will be located at different addresses on memory,\
    \ and their \"same name\" properties also have different addresses on memory.\
    \ For example:\n\n![](img/32bef8dd64dcf85a8518a3e4c521c46c_59_0.png)\n\n## testAttributePlayer.py\n\
    \n```python\nfrom player import Player\n\nplayer1 = Player(\"Tom\", 20)\n\nplayer2\
    \ = Player(\"Jerry\", 20)\n\nprint(\"player1.name = \", player1.name)\nprint(\"\
    player1.age = \", player1.age)\n\nprint(\"player2.name = \", player2.name)\nprint(\"\
    player2.age = \", player2.age)\n\nprint(\"------------ \")\n\nprint(\"Assign new\
    \ value to player1.age = 21 \")\n\n# Assign new value to age attribute of player1.\n\
    player1.age = 21\n\nprint(\"player1.name = \", player1.name)\nprint(\"player1.age\
