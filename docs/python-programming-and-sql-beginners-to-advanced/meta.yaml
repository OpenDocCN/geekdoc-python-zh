  md: '**Python** allows you to create an extension class from one or more other classes.
    This class is called a derived class, or a subclass.


    The child class inherits the attributes, methods, and other members from the parent
    class. It can also override methods from the parent class. If the child class
    does not define its own constructor, by default, it will inherit the constructor
    of the parent class.


    > *Note : Unlike Java, CSharp and several other languages, Python allows multiple
    inheritance. A class can be extended from one or more parent classes.*


