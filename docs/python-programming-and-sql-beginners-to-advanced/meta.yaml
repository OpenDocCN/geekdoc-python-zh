    ```\n\n### 运行 catTest 模块：\n\nCall move() method\nmoving ...\n\nCall showInfo()\
    \ method\nI'm Tom\nage 3\nheight 20\n\n当你从构造函数创建一个对象时发生了什么？它是如何调用父类的构造函数的？请看下面的图示：\n\
    \n![](img/32bef8dd64dcf85a8518a3e4c521c46c_69_0.png)\n\n通过上面的图示，你可以看到，父类的构造函数在子类的构造函数中被调用，它将为父类的属性赋值，然后才是子类的属性。\n\
    \n### 重写方法\n\n默认情况下，子类继承父类的方法，但父类可以重写父类的方法。\n\n#### mouse.py\n\n```python\nfrom\
    \ animal import Animal\n\n# Mouse class extends from Animal.\nclass Mouse (Animal):\n\
    \    def __init__(self, name, age, height):\n        # Call to constructor of\
