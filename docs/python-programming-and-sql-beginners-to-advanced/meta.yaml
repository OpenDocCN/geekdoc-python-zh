  md: '# Escape Characters


    Escape characters are special characters in **Python**. It is non-printable characters.
    However if you want it to appear in your string, you need a notation to notify
    to **Python**. For example, "\n" is a newline character.


    # escapeCharacterExample.py


    ```

    # Two "tab" characters between "Hello World" and "Hello Python".

    mystr = "Hello World\t\tHello Python"

    print (mystr)


    # Two "newline" characters between "Hello World" and "Hello Python".

    mystr = "Hello World\n\nHello Python"

    print (mystr)

    ```


    # Output:


    Hello World    Hello Python

    Hello World


    Hello Python


    | Backslash notation | Hexadecimal character | Description |

    | :--- | :--- | :--- |

    | \a | 0x07 | Bell or alert |

    | \b | 0x08 | Backspace |

    | \cx | | Control-x |

    | \C-x | | Control-x |

    | \e | 0x1b | Escape |

    | \f | 0x0c | Formfeed |

    | \M-\C-x | | Meta-Control-x |

    | \n | 0x0a | Newline |

    | \nnn | | Octal notation, where n is in the range 0.7 |'
