- md: "# PYTHON PROGRAMMING AND SQL BEGINNERS TO ADVANCE\n\nAMIT K\n\n## Introduction\
    \ to Python\n\n### What is Python\n\n**Python** is an interpreted, object-oriented,\
    \ high-level programming language with dynamic semantics. **Python** supports\
    \ modules and packages, which encourages program modularity and code reuse. The\
    \ Python interpreter and the extensive standard library are available in source\
    \ or binary form without charge for all major platforms, and can be freely distributed.\n\
    \nHere are the features of **Python**:\n\n- Grammar is simple and legible.\n-\
    \ Being procedural-oriented and object-oriented\n- Supporting module and package\n\
    - Handling errors with exception\n- Having high level dynamic data types\n- Having\
    \ standard libraries and external modules that meet all the needs of programming.\n\
    - Being able to interact with other modules written on C / C ++ (Or Java for Jython,\
    \ or Net for IronPython).\n- Being able to embed the application as a scripting\
    \ interface.\n\n**Python is easy to connect to other components:**\n\n- **Python**\
    \ can connect to the objects such as **COM**, **.NET** (Ironpython, Python for\
    \ .net), and **CORBA**, Java... **Python** is also supported by **Internet Communications\
    \ Engine (ICE)** and other connectivity technologies.\n- Being able to write libraries\
    \ on **C/C ++** to embed into **Python** and vice versa.\n\n**Python is a language\
    \ that can run on multiple platforms.**\n\n- **Python** is used for all the OS:\
    \ **Windows**, **Linux/Unix**, **OS/2**, **Mac**, **Amiga**, and other OSs. There\
    \ are even versions running on **.NET**, **Java** virtual machine, and Nokia Series\
    \ 60. For the same source code, it will be the same when running on all the platforms.\n\
    \n**Python is very simple and easy to learn**\n\n- **Python** has very large programming\
    \ communities, standard library systems, and open source libraries that are shared\
    \ on internet.\n\n**Python is an open source language**\n\n- **Python** instalment\
    \ using open source license should be used and be freely distributed even in commerce.\
    \ The **Python** license is managed by **Python Software Foundation**.\n\n## Content\n\
    \n- Introduction to Python\n    - What is Python\n    - Python is easy to connect\
    \ to other components:\n    - Python is a language that can run on multiple platforms.\n\
    \    - Python is very simple and easy to learn\n    - Python is an open source\
    \ language\n- Install Python on Windows\n    - What is Python\n    - Download\
    \ Python\n    - Install Python\n    - Start with Python\n- Install PyDev for Eclipse\n\
    \    - What is PyDev\n    - Requirements\n    - Installing PyDev\n- Conventions\
    \ and Grammar versions in Python\n    - Conventions in Python\n    - Some naming\
    \ rules in Python\n    - The keywords in Python\n    - List of special words\n\
    \    - The common functions\n    - Statement and Block\n    - The rule of writing\
    \ a statement on multiple lines\n    - The rules of writing multiple statements\
    \ on a line\n- Rule writing a string\n- Comment\n- Grammar Versions in Python\n\
    \n## Python Tutorial for Beginners\n\n- Requirements\n- Create Project\n- Create\
    \ your first module\n\n## Branching statements in Python\n\n- Comparison operators\n\
    - if-else statement\n\n## Python Loops Tutorial with Examples\n\n- Overview of\
    \ the loops in Python\n- while loop\n- for loop with range\n- Use for loop and\
    \ array\n- Use the break statement in the loop\n- Use the continue statement in\
    \ the loop\n- Use the pass statement in the loop\n- Use the 'else' statement with\
    \ a loop\n\n## Python Function Tutorial with Examples\n\n- Python Function\n-\
    \ Function examples\n- Function with required parameters\n- Function with default\
    \ parameters\n- Function with Variable-Length parameter\n- Anonymous function\n\
    \n## Class and Object in Python\n\n- Object Oriented in Python\n- Create class\
    \ in Python\n- Constructor with default parameters\n- Compare objects\n- Attributes\n\
    - Function Attributes\n- Built-In Class Attributes\n- Class's Variables\n- List\
    \ members of a class or object\n\n## Inheritance and polymorphism in Python\n\n\
    - Introduction\n- Inheritance in Python\n- Override method\n- Abstract Method\n\
    - Multiple inheritance\n- issubclass and isinstance function\n- Polymorphism with\
    \ function\n\n## Python exception handling Tutorial with Examples\n\n- What is\
    \ Exception\n- Exception Hierarchy\n- Handling exception with try-except\n- try-except-finally\n\
    - Re-throw exception\n- Exception Wrapping\n\n## Python String Tutorial with Examples\n\
    \n- Python String\n- Access values in string\n- String is immutable\n- Escape\
    \ Characters\n- String operators\n\n## Python Lists Tutorial with Examples\n\n\
    - Python List\n- Access the elements of the list\n- Update List\n- Delete the\
    \ elements in the list\n- Operators\n- Functions of List\n- Methods of List\n\n\
    ## Python Tuples Tutorial with Examples\n\n- Python Tuples\n- List vs Tuple\n\
    - Access the elements of Tuples\n- Update Tuples\n- Operators for Tuples\n- Functions\
    \ for Tuples\n- Methods\n\n## Python Dictionary Tutorial with Examples\n\n###\
    \ Python Dictionary\n\n- Update Dictionary\n- Delete dictionary\n- Functions for\
    \ Dictionary\n\n## Python Date Time Tutorial with Examples\n\n- Overview\n- The\
    \ concept of Ticks\n- time module\n- datetime module\n- datetime.timedelta\n-\
    \ datetime.date\n\n## Connect to MySQL Database in Python using PyMySQL\n\n- What\
    \ is PyMySQL\n- Install PyMySQL\n- Sample Database\n- Connect MySQL from Python\
    \ with PyMySQL\n- Query Example\n- Insert Example\n- Update Example\n- Delete\
    \ Example\n- Call Procedure\n- Call Function\n\n## Install Python on Windows\n\
    \n### Download Python\n\nTo download **Python**, you can access to the address:\n\
    \n- https://www.python.org/downloads/\n\nAfter having downloaded, you have a file:\n\
    \n### Install Python\n\nRun the file you have downloaded above to start installing.\
    \ Select \"Customize Installation\" so that you can select the **Python** location\
    \ installed.\n\nSelect the **Python** location to install:\n\n### Start with Python\n\
    \nOn \"Start Menu\" of **Windows**, you run **IDLE (Python 3.6 64bit)**:\n\n##\
    \ Install PyDev for Eclipse\n\n### What is PyDev?\n\nPyDev is a Plugin allowing\
    \ you to install on Eclipse, and you can program Python on Eclipse IDE.\n\n###\
    \ Requirements\n\nEclipse is an IDE used to develop Java. However it allow you\
    \ to install other plugins to become programming tools of other languages such\
    \ as C/C++, Ruby, Python,...\n\nSo, in order to program Python, firstly you have\
    \ to install Eclipse, then install a Plugin named as PyDev on Eclipse. You can\
    \ see How to install Eclipse here:\n\n### Installing PyDev\n\nOn Eclipse, select:\n\
    \n- Help/Eclipse Marketplace...\n\nEnter \"PyDev\" to search:\n\n### Eclipse Marketplace\n\
    \nSelect solutions to install. Press Install Now to proceed with installation.\
    \ Press the \"more info\" link to learn more about a solution.\n\nFind: pydev\n\
    \n### PyDev - Python IDE for Eclipse 5.5.0\n\nPyDev is a plugin that enables Eclipse\
    \ to be used as a Python IDE (supporting also Jython and IronPython). It uses\
    \ advanced type inference techniques which...\n\nmore info\n\nby Brainwy Software\
    \ EPL\n\nIDE Python Aptana Pydev Django ...\n\nInstalls: 718K (20,406 last month)\n\
    \n### Live Coding in Python 2.14.0\n\nRun your Python code while you type. Displays\
    \ variable state or turtle graphics that are updated as you type your code. Requires\
    \ PyDev, so install that first.\n\n### Marketplaces"
  mdcn: "# PYTHON编程与SQL从入门到精通\n\nAMIT K\n\n## Python简介\n\n### 什么是Python\n\n**Python**\
    \ 是一种解释型、面向对象、具有动态语义的高级编程语言。**Python** 支持模块和包，这鼓励了程序的模块化和代码重用。Python解释器和广泛的标准库以源代码或二进制形式提供，适用于所有主要平台，且无需付费，可以自由分发。\n\
    \n以下是 **Python** 的特点：\n\n-   语法简洁易读。\n-   兼具过程式和面向对象特性。\n-   支持模块和包。\n-   通过异常处理错误。\n\
    -   拥有高级动态数据类型。\n-   拥有满足所有编程需求的标准库和外部模块。\n-   能够与用C/C++（或Jython的Java，或IronPython的.NET）编写的其他模块交互。\n\
    -   能够将应用程序嵌入为脚本接口。\n\n**Python易于与其他组件连接：**\n\n-   **Python** 可以连接到诸如 **COM**、**.NET**（Ironpython，Python\
    \ for .net）和 **CORBA**、Java等对象。**Python** 也受到 **Internet Communications Engine\
    \ (ICE)** 和其他连接技术的支持。\n-   能够在 **C/C++** 上编写库以嵌入到 **Python** 中，反之亦然。\n\n**Python是一种可以在多个平台上运行的语言。**\n\
    \n-   **Python** 用于所有操作系统：**Windows**、**Linux/Unix**、**OS/2**、**Mac**、**Amiga**\
    \ 以及其他操作系统。甚至有在 **.NET**、**Java** 虚拟机和诺基亚Series 60上运行的版本。对于相同的源代码，在所有平台上运行时都将保持一致。\n\
    \n**Python非常简单且易于学习**\n\n-   **Python** 拥有非常庞大的编程社区、标准库系统以及在互联网上共享的开源库。\n\n**Python是一种开源语言**\n\
    \n-   **Python** 安装应使用开源许可证，并且即使在商业环境中也可以自由分发。**Python** 许可证由 **Python Software\
    \ Foundation** 管理。\n\n## 内容\n\n-   Python简介\n    -   什么是Python\n    -   Python易于与其他组件连接：\n\
    \    -   Python是一种可以在多个平台上运行的语言。\n    -   Python非常简单且易于学习\n    -   Python是一种开源语言\n\
    -   在Windows上安装Python\n    -   什么是Python\n    -   下载Python\n    -   安装Python\n\
    \    -   开始使用Python\n-   为Eclipse安装PyDev\n    -   什么是PyDev\n    -   要求\n    -\
    \   安装PyDev\n-   Python中的约定和语法版本\n    -   Python中的约定\n    -   Python中的一些命名规则\n\
    \    -   Python中的关键字\n    -   特殊词汇列表\n    -   常用函数\n    -   语句和代码块\n    -   多行编写语句的规则\n\
    \    -   单行编写多条语句的规则\n-   编写字符串的规则\n-   注释\n-   Python中的语法版本\n\n## Python初学者教程\n\
    \n-   要求\n-   创建项目\n-   创建你的第一个模块\n\n## Python中的分支语句\n\n-   比较运算符\n-   if-else语句\n\
    \n## Python循环教程与示例\n\n-   Python中循环概述\n-   while循环\n-   带range的for循环\n-   使用for循环和数组\n\
    -   在循环中使用break语句\n-   在循环中使用continue语句\n-   在循环中使用pass语句\n-   在循环中使用'else'语句\n\
    \n## Python函数教程与示例\n\n-   Python函数\n-   函数示例\n-   带有必需参数的函数\n-   带有默认参数的函数\n-\
    \   带有可变长度参数的函数\n-   匿名函数\n\n## Python中的类和对象\n\n-   Python中的面向对象\n-   在Python中创建类\n\
    -   带有默认参数的构造函数\n-   比较对象\n-   属性\n-   函数属性\n-   内置类属性\n-   类的变量\n-   列出类或对象的成员\n\
    \n## Python中的继承和多态\n\n-   简介\n-   Python中的继承\n-   重写方法\n-   抽象方法\n-   多重继承\n-\
    \   issubclass和isinstance函数\n-   使用函数的多态\n\n## Python异常处理教程与示例\n\n-   什么是异常\n\
    -   异常层次结构\n-   使用try-except处理异常\n-   try-except-finally\n-   重新抛出异常\n-   异常包装\n\
    \n## Python字符串教程与示例\n\n-   Python字符串\n-   访问字符串中的值\n-   字符串是不可变的\n-   转义字符\n-\
    \   字符串运算符\n\n## Python列表教程与示例\n\n-   Python列表\n-   访问列表元素\n-   更新列表\n-   删除列表中的元素\n\
    -   运算符\n-   列表函数\n-   列表方法\n\n## Python元组教程与示例\n\n-   Python元组\n-   列表 vs 元组\n\
    -   访问元组元素\n-   更新元组\n-   元组运算符\n-   元组函数\n-   方法\n\n## Python字典教程与示例\n\n### Python字典\n\
    \n-   更新字典\n-   删除字典\n-   字典函数\n\n## Python日期时间教程与示例\n\n-   概述\n-   Ticks的概念\n\
    -   time模块\n-   datetime模块\n-   datetime.timedelta\n-   datetime.date\n\n## 在Python中使用PyMySQL连接MySQL数据库\n\
    \n-   什么是PyMySQL\n-   安装PyMySQL\n-   示例数据库\n-   使用PyMySQL从Python连接MySQL\n-   查询示例\n\
    -   插入示例\n-   更新示例\n-   删除示例\n-   调用存储过程\n-   调用函数\n\n## 在Windows上安装Python\n\n\
    ### 下载Python\n\n要下载 **Python**，您可以访问以下地址：\n\n-   https://www.python.org/downloads/\n\
    \n下载后，您将得到一个文件：\n\n### 安装Python\n\n运行您上面下载的文件以开始安装。选择“自定义安装”，以便您可以选择 **Python**\
    \ 的安装位置。\n\n选择 **Python** 的安装位置：\n\n### 开始使用Python\n\n在 **Windows** 的“开始菜单”中，运行\
    \ **IDLE (Python 3.6 64bit)**：\n\n## 为Eclipse安装PyDev\n\n### 什么是PyDev？\n\nPyDev是一个允许您安装在Eclipse上的插件，您可以在Eclipse\
    \ IDE中编写Python程序。\n\n### 要求\n\nEclipse是一个用于开发Java的IDE。但是，它允许您安装其他插件，使其成为其他语言（如C/C++、Ruby、Python等）的编程工具。\n\
    \n因此，为了编写Python程序，您首先需要安装Eclipse，然后在Eclipse上安装一个名为PyDev的插件。您可以在此处查看如何安装Eclipse：\n\
    \n### 安装PyDev\n\n在Eclipse上，选择：\n\n-   Help/Eclipse Marketplace...\n\n输入“PyDev”进行搜索：\n\
    \n### Eclipse Marketplace\n\n选择要安装的解决方案。按“立即安装”以继续安装。按“更多信息”链接以了解有关解决方案的更多信息。\n\
    \n查找：pydev\n\n### PyDev - Python IDE for Eclipse 5.5.0\n\nPyDev是一个插件，使Eclipse可用作Python\
    \ IDE（也支持Jython和IronPython）。它使用先进的类型推断技术...\n\n更多信息\n\n由Brainwy Software EPL提供\n\
    \nIDE Python Aptana Pydev Django ...\n\n安装次数：718K（上月20,406次）\n\n### Python实时编码\
    \ 2.14.0\n\n在输入时运行您的Python代码。显示变量状态或海龟图形，这些内容会随着您输入代码而更新。需要PyDev，请先安装它。\n\n###\
    \ Marketplaces"
