    # String operators


    In **Python**, there are some special operators below:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | + | Concatenation - Adds values on either side of the operator | "Hello" +"Python"
    ==> "Hello Python" |

    | * | Repetition - Creates new strings, concatenating multiple copies of the same
    string | "Hello"*2 ==> "HelloHello" |

    | [] | Slice - Gives the character from the given index | a = "Hello"

    a[1] ==> "e" |

    | [:] | Range Slice - Gives the characters from the given range | a = "Hello"

    a[1:4] ==> "ell"

    a[1: ] ==> "ello" |

    | in | Membership - Returns true if a character exists in the given string | a
    = "Hello"

    ''H'' in a ==> True |

    | not in | Membership - Returns true if a character does not exist in the given
    string | a = "Hello"

    ''M'' not in a ==> True |

    | r/R | Raw String - Suppresses actual meaning of Escape characters. The syntax
    for raw strings is exactly the same as for normal strings with the exception of
    the "**raw string operator**", the letter "r," which precedes the quotation marks.
    The "r" can be lowercase (r) or uppercase (R) and must be placed immediately preceding
    the first quote mark. | print (r''\n\t'') ==> \n\t

    print (R''\n\t'') ==> \n\t |

    | % | Format - Performs String formatting | See at next section |'
