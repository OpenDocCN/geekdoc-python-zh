  md: '# Python Lists Tutorial with Examples


    # Python List


    In **Python**, List is the most flexible data type. It is a sequence of elements,
    which allows you to remove or add the elements to list and allows you to slice
    the elements.


    In order to write a list, you need to put the elements into a pair of square brackets
    [] and separate them by the comma. The elements in the list are indexed from the
    left to right and started from the index 0.


    # listExample.py


    ```

    fruitList = ["apple", "apricot", "banana","coconut", "lemen"]

    otherList = [100, "one", "two", 3]


    print ("Fruit List:")

    print (fruitList)

    print (" ------------------------- ")


    print ("Other List:")

    print (otherList)

    ```


