    # # Conventions and Grammar versions in Python


    # ## Conventions in Python


    Like other languages, Python has some naming conventions such as naming rules
    of variable, function, class, module,...


    A name can begin with capital letters (A-Z), or lowercase ones (a-z), or underscore
    (_), followed by other letters or nothing.

    Python does not accept the characters: @, $ and % in the name.'
