    and time, there are several classes written in C/C ++ defined on this module.
    For example, the **struct_time** class.


    On module **time**, time is represented by **Ticks** or **struct_time**. It has
    functions that format **Ticks** or **struct_time** into strings, and vice versa
    parse a string into **Ticks** or **struct_time**.


