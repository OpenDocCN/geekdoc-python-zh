    # # Introduction to Python


    # ## What is Python


    **Python** is an interpreted, object-oriented, high-level programming language
    with dynamic semantics. **Python** supports modules and packages, which encourages
    program modularity and code reuse. The Python interpreter and the extensive standard
    library are available in source or binary form without charge for all major platforms,
    and can be freely distributed.


    Here are the features of **Python**:


    +   - Grammar is simple and legible.

    - Being procedural-oriented and object-oriented

    - Supporting module and package

    - Handling errors with exception

    - Having high level dynamic data types

    - Having standard libraries and external modules that meet all the needs of programming.

    - Being able to interact with other modules written on C / C ++ (Or Java for Jython,
    or Net for IronPython).

    - Being able to embed the application as a scripting interface.


    **Python is easy to connect to other components:**


    +   - **Python** can connect to the objects such as **COM**, **.NET** (Ironpython,
    Python for .net), and **CORBA**, Java... **Python** is also supported by **Internet
    Communications Engine (ICE)** and other connectivity technologies.

    - Being able to write libraries on **C/C ++** to embed into **Python** and vice
    versa.


    **Python is a language that can run on multiple platforms.**


    +   - **Python** is used for all the OS: **Windows**, **Linux/Unix**, **OS/2**,
    **Mac**, **Amiga**, and other OSs. There are even versions running on **.NET**,
    **Java** virtual machine, and Nokia Series 60. For the same source code, it will
    be the same when running on all the platforms.


    **Python is very simple and easy to learn**


    +   - **Python** has very large programming communities, standard library systems,
    and open source libraries that are shared on internet.


    **Python is an open source language**


    +   - **Python** instalment using open source license should be used and be freely
    distributed even in commerce. The **Python** license is managed by **Python Software
    Foundation**.'
