- md: "When being successfully installed, you need to restart **Eclipse**:\n\nNext,\
    \ you need re-check **Eclipse** after installing. On **Eclipse**, select:\n\n\
    - File/New/Other...\n\nIf you see **PyDev** on **Wizard** window, it means that\
    \ **PyDev** has been successfully installed on **Eclipse**.\n\n## Conventions\
    \ and Grammar versions in Python\n\n### Conventions in Python\n\nLike other languages,\
    \ Python has some naming conventions such as naming rules of variable, function,\
    \ class, module,...\n\nA name can begin with capital letters (A-Z), or lowercase\
    \ ones (a-z), or underscore (_), followed by other letters or nothing.\nPython\
    \ does not accept the characters: @, $ and % in the name.\n\nPython is a programming\
    \ language that distinguishes between uppercase and lowercase, MyObject and myobject\
    \ are two different ones.\n\n### Some naming rules in Python:\n\n1. Class name\
    \ should begin with a capital letter, other names should begin with lowercase\
    \ ones.\n2. A name begins with an underscore, it means that the name is private.\n\
    3. A name begins with two underscores, it means that the name is very private.\n\
    4. If a name begins with two underscores and ends with two underscores, it means\
    \ the name is special one that has already defined by Python.\n\n### The keywords\
    \ in Python\n\nThere are a few the keywords in Python which can not be used to\
    \ name and has no capital letters. Below is list of all the keywords in Python.\n\
    \n**keywords**\n\nand    assert    break    class\ncontinue    def    del    elif\
    \    else\nexcept    exec    finally    for\nfrom    global    if    import  \
    \  in    is\nlambda    not    or    pass\nraise    return    try    yield    while\n\
    \n### List of special words:\n\n**special words**\n\nNone    True    False\nself\
    \    cls    class_\n\n### The common functions:\n\n**func**\n\n__import__ abs\
    \ all any apply\nbasestring bin bool buffer callable\nchr classmethod cmp coerce\n\
    compile complex delattr dict dir\ndivmod enumerate eval execfile\nfile filter\
    \ float format frozenset\ngetattr globals hasattr hash\nhelp hex id input int\
    \ intern\nisinstance issubclass iter len\nlist locals long map max min next\n\
    object oct open ord pow print\nproperty range raw_input reduce\nreload repr reversed\
    \ round set\nsetattr slice sorted staticmethod\nstr sum super tuple type type\n\
    unichr unicode vars xrange zip\n\n### Statement and Block\n\nUnlike other programming\
    \ languages, Python does not use the pairs of keywords such as “begin” and “end”\
    \ or “{” and “}” to open or close a set of commands. Instead, Python makes rules\
    \ that sequential commands having the same line indentation belongs in the same\
    \ set of commands.\n\n```\nif True:\n    print (\"Hello\")\n    print (\"True\"\
    )\nelse:\n    print (\"False\")\n```\n\n### The rule of writing a statement on\
    \ multiple lines:\n\nNormally, a statement of Python will be written in 1 line,\
    \ and a line break means the end of that statement. However, there are long statement\
    \ that you want to write them on multiple lines, you need to inform Python of\
    \ your intent. Let's use symbol \\ to inform Python that the statement includes\
    \ the next line. For example:\n\n```\nvalue = 1 + \\\n        2 + \\\n       \
    \ 3\n```\n\n### The rules of writing multiple statements on a line\n\nYou can\
    \ write multiple statements on a line, you need to use a semicolon (;) to separate\
    \ them. For example:\n\n```\na = 'One'; b = \"Two\"; c =\"Three\"\n```\n\n###\
    \ Rule writing a string\n\nPython allows you to use single quotes ('), or double\
    \ quotes (\") to denote a string on a line:\n\n```\nstr1 = 'Hello every body'\n\
    \nstr2 = \"Hello Python\"\n```\n\nIf a string is written on multiple lines, you\
    \ need to use a pair of 3 quotes (And not use \\):\n\n```\nmultiLineStr = \"\"\
    \"This is a paragraph. It is\n    made up of multiple lines and sentences.\"\"\
    \"\n```\n\n### Comment\n\nThe notation (#) not being in the string will begin\
    \ with a comment line.\nAll the characters behind it until the end of line are\
    \ considered a part of the comment and interpreter of Python and they will be\
    \ ignored when running the programme.\n\n```\n# First comment\nprint (\"Hello,\
    \ Python!\") # second comment\n\n# This is a comment.\n# This is a comment, too.\n\
    # This is a comment, too.\nprint (\"Finish\")\n```\n\n### Grammar Versions in\
    \ Python\n\nCurrently, the latest version of Python is 3.x, Python 3.x has some\
    \ stricter rules of grammar compared to Python 2.x, most the Python current documents\
    \ on Internet are using Grammar 2.x and it can confuse you because you have carried\
    \ out according to the guide but still getting error report.\n\n### Example:\n\
    \nIn order to print out on the screen with the words \"Hello World\", for the\
    \ version 2.x you need to use the \"print\" statement without round brackets (\
    \ ):\n\n```\n# Grammar Python 2.x\nprint \"Hello World\"\n```\n\nFor the Python\
    \ 3.x grammar, in order to print out the words \"Hello World\", you have to put\
    \ it into round brackets ( ), or you will get error report.\n\n```\n# Grammar\
    \ Python 3.x\nprint (\"Hello World\")\n```\n\n## Python Tutorial for Beginners\n\
    \n### Requirements\n\nMake sure that your computer has already installed **Python**\
    \ and a tool (IDE) for **Python** programming (E.g: **PyDev**). If not, you can\
    \ see the guides below.\n\n### Create Project\n\nFrom Eclipse, let's select:\n\
    \n- File/New/Other..\n\n### New\n\nSelect a wizard\n\nWizards:\n\n- Plug-in Development\n\
    - PyDev\n  - &Link to Existing Source\n  - &Source Folder\n  - PyDev &Module\n\
    \  - PyDev Django Project\n  - PyDev Google App Engine Project\n  - PyDev P&ackage\n\
    \  - PyDev Project\n- Remote System Explorer\n\nUse \"Grammar Version\" 3.x\n\n\
    ### PyDev Project\n\nCreate a new PyDev Project.\n\nProject name: HelloPython\n\
    \nProject contents:\n\n- [x] Use default\n\nDirectory: E:\\ECLIPSE_TUTORIAL\\\
    PYTHON\\HelloPython\n\nProject type\n\nChoose the project type\n\n- (•) Python\n\
    - ( ) Jython\n- ( ) IronPython\n\nGrammar Version\n\n3.6\n\nInterpreter\n\nDefault\n\
    \nClick here to configure an interpreter not listed.\n\nAdditional syntax validation:\
    \ <no additional grammars selected>.\n\n- (•) Add project directory to the PYTHONPATH\n\
    - ( ) Create 'src' folder and add it to the PYTHONPATH\n- ( ) Create links to\
    \ existing sources (select them on the next page)\n- ( ) Don't configure PYTHONPATH\
    \ (to be done manually later on)\n\nWorking sets\n\n- [ ] Add project to working\
    \ sets\n\n< Back\n\nNext >\n\nFinish\n\nCancel\n\nProject was created.\n\n###\
    \ Create your first module\n\nOn Eclipse select:\n\n- **File/New/File**\n\nEnter\
    \ name of file:\n\n- **main.py**\n\nAdd content to **main.py**:\n\n### main.py\n\
    \n```\nprint (\"Hello Python!\");\n\nx = 5;\ny = 10;\nz = 20;\n\nprint (x + y\
    \ + z);\n```\n\nRun the **main.py** file by right-clicking it and select:\n\n\
    - **Run As/Python Run**\n\nThe result received when running **main.py**:\n\n##\
    \ Branching statements in Python\n\n### Comparison operators\n\nThe common comparison\
    \ operators:\n\n| Operator | Meaning | Example |\n| :--- | :--- | :--- |\n| >\
    \ | greater than | 5 > 4 is true |\n| < | less than | 4 < 5 is true |\n| >= |\
    \ greater than or equal | 4 >= 4 is true |\n| <= | less than or equal | 3 <= 4\
    \ is true |\n| == | equal to | 1 == 1 is true |\n| != | not equal to | 1 != 2\
    \ is true |\n| and | and | a > 4 and a < 10 |\n| or | or | a == 1 or a == 4 |\n\
    \n### if-else statement\n\nif is a statement which checks a certain condition\
    \ in Python. For example: If a> b, then do something ....\n\nSyntax:\n\n```\n\
    if condition_1 :\n    # Do something\n\nelif condition_2 :\n    # Do something\n\
    \nelif condition_N:\n    # Do something\n\nelse :\n    # Do something\n```\n\n\
    The program checks the condition from top to bottom until it encounters a condition\
    \ that is true, and run this block and the program does not check the remaining\
    \ conditions in the branching structure.\n\nExample (if - else):\n\n```\nifElseExample.py\n\
    \noption = 5\n\nif option == 1:\n    print(\"Hello\")\nelse :\n    print(\"Bye!\"\
    )\n```"
  mdcn: "当成功安装后，你需要重启 **Eclipse**：\n\n接下来，安装完成后你需要重新检查 **Eclipse**。在 **Eclipse** 中，选择：\n\
    \n- 文件/新建/其他...\n\n如果你在 **向导** 窗口中看到 **PyDev**，这意味着 **PyDev** 已成功安装在 **Eclipse**\
    \ 上。\n\n## Python 中的约定和语法版本\n\n### Python 中的约定\n\n与其他语言一样，Python 有一些命名约定，例如变量、函数、类、模块等的命名规则。\n\
    \n名称可以以大写字母（A-Z）、小写字母（a-z）或下划线（_）开头，后跟其他字母或不跟任何字符。\nPython 不接受名称中使用字符：@、$ 和 %。\n\
    \nPython 是一种区分大小写的编程语言，MyObject 和 myobject 是两个不同的名称。\n\n### Python 中的一些命名规则：\n\
    \n1. 类名应以大写字母开头，其他名称应以小写字母开头。\n2. 以下划线开头的名称表示该名称是私有的。\n3. 以两个下划线开头的名称表示该名称是非常私有的。\n\
    4. 如果一个名称以两个下划线开头并以两个下划线结尾，则表示该名称是 Python 已经定义的特殊名称。\n\n### Python 中的关键字\n\nPython\
    \ 中有一些关键字不能用于命名，并且没有大写字母。以下是 Python 中所有关键字的列表。\n\n**关键字**\n\nand    assert   \
    \ break    class\ncontinue    def    del    elif    else\nexcept    exec    finally\
    \    for\nfrom    global    if    import    in    is\nlambda    not    or    pass\n\
    raise    return    try    yield    while\n\n### 特殊单词列表：\n\n**特殊单词**\n\nNone  \
    \  True    False\nself    cls    class_\n\n### 常用函数：\n\n**函数**\n\n__import__ abs\
    \ all any apply\nbasestring bin bool buffer callable\nchr classmethod cmp coerce\n\
    compile complex delattr dict dir\ndivmod enumerate eval execfile\nfile filter\
    \ float format frozenset\ngetattr globals hasattr hash\nhelp hex id input int\
    \ intern\nisinstance issubclass iter len\nlist locals long map max min next\n\
    object oct open ord pow print\nproperty range raw_input reduce\nreload repr reversed\
    \ round set\nsetattr slice sorted staticmethod\nstr sum super tuple type type\n\
    unichr unicode vars xrange zip\n\n### 语句和代码块\n\n与其他编程语言不同，Python 不使用成对的关键字（如 “begin”\
    \ 和 “end” 或 “{” 和 “}”）来开始或结束一组命令。相反，Python 制定了规则：具有相同行缩进的顺序命令属于同一组命令。\n\n```\n\
    if True:\n    print (\"Hello\")\n    print (\"True\")\nelse:\n    print (\"False\"\
    )\n```\n\n### 多行书写语句的规则：\n\n通常，Python 的语句会写在 1 行中，换行意味着该语句的结束。但是，有些长语句你想写在多行中，你需要告知\
    \ Python 你的意图。让我们使用符号 \\ 来告知 Python 该语句包含下一行。例如：\n\n```\nvalue = 1 + \\\n    \
    \    2 + \\\n        3\n```\n\n### 单行书写多条语句的规则\n\n你可以在一行中书写多条语句，你需要使用分号（;）来分隔它们。例如：\n\
    \n```\na = 'One'; b = \"Two\"; c =\"Three\"\n```\n\n### 书写字符串的规则\n\nPython 允许你使用单引号（'）或双引号（\"\
    ）来表示一行中的字符串：\n\n```\nstr1 = 'Hello every body'\n\nstr2 = \"Hello Python\"\n```\n\
    \n如果字符串写在多行中，你需要使用一对三引号（并且不使用 \\）：\n\n```\nmultiLineStr = \"\"\"This is a paragraph.\
    \ It is\n    made up of multiple lines and sentences.\"\"\"\n```\n\n### 注释\n\n\
    不在字符串中的井号（#）将开始一个注释行。\n其后直到行尾的所有字符都被视为 Python 解释器注释的一部分，在运行程序时将被忽略。\n\n```\n#\
    \ First comment\nprint (\"Hello, Python!\") # second comment\n\n# This is a comment.\n\
    # This is a comment, too.\n# This is a comment, too.\nprint (\"Finish\")\n```\n\
    \n### Python 中的语法版本\n\n目前，Python 的最新版本是 3.x，与 Python 2.x 相比，Python 3.x 有一些更严格的语法规则，目前互联网上大多数\
    \ Python 文档使用的是语法 2.x，这可能会让你感到困惑，因为你按照指南操作但仍然收到错误报告。\n\n### 示例：\n\n为了在屏幕上打印出 “Hello\
    \ World” 这几个字，对于 2.x 版本，你需要使用不带圆括号（ ）的 “print” 语句：\n\n```\n# Grammar Python 2.x\n\
    print \"Hello World\"\n```\n\n对于 Python 3.x 语法，为了打印出 “Hello World” 这几个字，你必须将其放入圆括号（\
    \ ）中，否则你会收到错误报告。\n\n```\n# Grammar Python 3.x\nprint (\"Hello World\")\n```\n\n\
    ## Python 初学者教程\n\n### 要求\n\n确保你的计算机已经安装了 **Python** 和一个用于 **Python** 编程的工具（IDE）（例如：**PyDev**）。如果没有，你可以参考下面的指南。\n\
    \n### 创建项目\n\n从 Eclipse 中，我们选择：\n\n- 文件/新建/其他..\n\n### 新建\n\n选择一个向导\n\n向导：\n\n\
    - 插件开发\n- PyDev\n  - &链接到现有源\n  - &源文件夹\n  - PyDev &模块\n  - PyDev Django 项目\n\
    \  - PyDev Google App Engine 项目\n  - PyDev P&ackage\n  - PyDev 项目\n- 远程系统资源管理器\n\
    \n使用 “语法版本” 3.x\n\n### PyDev 项目\n\n创建一个新的 PyDev 项目。\n\n项目名称：HelloPython\n\n项目内容：\n\
    \n- [x] 使用默认值\n\n目录：E:\\ECLIPSE_TUTORIAL\\PYTHON\\HelloPython\n\n项目类型\n\n选择项目类型\n\
    \n- (•) Python\n- ( ) Jython\n- ( ) IronPython\n\n语法版本\n\n3.6\n\n解释器\n\n默认\n\n\
    点击此处配置未列出的解释器。\n\n附加语法验证：<未选择附加语法>。\n\n- (•) 将项目目录添加到 PYTHONPATH\n- ( ) 创建 'src'\
    \ 文件夹并将其添加到 PYTHONPATH\n- ( ) 创建到现有源的链接（在下一页选择它们）\n- ( ) 不配置 PYTHONPATH（稍后手动完成）\n\
    \n工作集\n\n- [ ] 将项目添加到工作集\n\n< 上一步\n\n下一步 >\n\n完成\n\n取消\n\n项目已创建。\n\n### 创建你的第一个模块\n\
    \n在 Eclipse 中选择：\n\n- **文件/新建/文件**\n\n输入文件名：\n\n- **main.py**\n\n向 **main.py**\
    \ 添加内容：\n\n### main.py\n\n```\nprint (\"Hello Python!\");\n\nx = 5;\ny = 10;\n\
    z = 20;\n\nprint (x + y + z);\n```\n\n通过右键单击 **main.py** 文件并选择来运行它：\n\n- **运行方式/Python\
    \ 运行**\n\n运行 **main.py** 时收到的结果：\n\n## Python 中的分支语句\n\n### 比较运算符\n\n常见的比较运算符：\n\
    \n| 运算符 | 含义 | 示例 |\n| :--- | :--- | :--- |\n| > | 大于 | 5 > 4 为真 |\n| < | 小于 |\
    \ 4 < 5 为真 |\n| >= | 大于或等于 | 4 >= 4 为真 |\n| <= | 小于或等于 | 3 <= 4 为真 |\n| == | 等于\
    \ | 1 == 1 为真 |\n| != | 不等于 | 1 != 2 为真 |\n| and | 与 | a > 4 and a < 10 |\n| or\
    \ | 或 | a == 1 or a == 4 |\n\n### if-else 语句\n\nif 是 Python 中检查特定条件的语句。例如：如果 a\
    \ > b，那么做某事....\n\n语法：\n\n```\nif condition_1 :\n    # Do something\n\nelif condition_2\
    \ :\n    # Do something\n\nelif condition_N:\n    # Do something\n\nelse :\n \
    \   # Do something\n```\n\n程序从上到下检查条件，直到遇到一个为真的条件，然后运行该代码块，程序不会检查分支结构中的剩余条件。\n\
    \n示例（if - else）：\n\n```\nifElseExample.py\n\noption = 5\n\nif option == 1:\n \
    \   print(\"Hello\")\nelse :\n    print(\"Bye!\")\n```"
