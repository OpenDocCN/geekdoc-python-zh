  md: "| != | not equal to | 1 != 2 is true |\n|---|---|---|\n| and | and | a > 4\
    \ and a < 10 |\n| or | or | a == 1 or a == 4 |\n\n# if-else statement\n\nif is\
    \ a statement which checks a certain condition in Python. For example: If a> b,\
    \ then do something ....\n\nSyntax:\n\n```\nif condition_1 :\n    # Do something\n\
    \nelif condition_2 :\n    # Do something\n\nelif condition_N:\n    # Do something\n\
    \nelse :\n    # Do something\n```\n\nThe program checks the condition from top\
