  md: 'can hold. A bit represents either a 0 or a 1, which literally means ''off or
    on. A byte is another unit of measurement the computer uses to represent information
    like letters or numbers. One byte is equal to eight bits. It also happens to equal
    exactly one RGB value!


    So, in 8-bit binary, this makes the number 0 equal to 00000000 and the number
    255 equal to 11111111. As you can see, the most amount of data we


    can store is the same as using up all eight bits in a single byte. And since an
    RGB value is exactly one byte of data, this translates to the


    maximum number of 255 for RGB values.


