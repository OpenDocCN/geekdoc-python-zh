- md: "## CREATING YOUR OWN REUSABLE FUNCTIONS\n\nAt the core of coding is the concept\
    \ of reusability, or how easy it is to use something again and again. We write\
    \ code that can do repetitive, complex or time-consuming things for us. If we\
    \ had to write it every single time we needed to use it, coding wouldn't be very\
    \ useful.\n\nFunctions and modules provide a way for us to write code that's reusable.\
    \ If you think about it, we've already used so many in this book! We've used the\
    \ print() function since the beginning and we've just learned about how fun and\
    \ interactive the multipurpose turtle module is. Most programs are made up of\
    \ one or many modules, and each of those modules is usually made up of several\
    \ functions/methods. Let's see how writing code in this way helps us have smarter\
    \ programs.\n\n### FUNCTIONS\n\nAs we've learned, functions are reusable blocks\
    \ of code that can do something specific or return a value. Usually, we write\
    \ functions for things that we often repeat. For example, say we needed to greet\
    \ a person every time they used our program. We could write a print() function\
    \ every single time we needed to greet them:\n\n```python\nprint(\"Hello, person!\
    \ \")\nprint(\"Hello, person! \")\nprint(\"Hello, person! \")\n```\n\nOr, we could\
    \ make the action of greeting someone a function\n\n```python\ndef greet():\n\
    \    print('Hello, person!')\n```\n\nNow anytime you need to call that action\
    \ you can just write your code like this:\n\n```python\ngreet()\n```\n\nHere's\
    \ what's happening! To create a function, we first need to describe what it will\
    \ be called and what it will do. We start by using the `def` keyword, which signals\
    \ to the computer that we are writing a function. It's short for define. Just\
    \ like a dictionary defines what a word means, we define what our function will\
    \ do when we use the def keyword.\n\nNext, we name our function. Because we will\
    \ be greeting people when we use this function, the name \"greet\" is a good choice,\
    \ as it clearly describes what our function is doing. We then add some parentheses\
    \ () to our function name. We may add parameters in the parentheses later, but\
    \ for now, we don't have any. Lastly, a colon (:) shows that the following indented\
    \ lines of code will be part of our function. That's it!\n\nAn important thing\
    \ to know about functions is that they don't run on their own. This means that\
    \ whenever a computer comes across one, it automatically skips the code within\
    \ it. In order to actually use a function, it needs to be called, meaning we must\
    \ clearly tell the computer to start executing the called function's code. If\
    \ we don't call functions, the code within them will never be run!\n\n### PARAMETERS\n\
    \nOur greet() function is pretty normal. We say 'Hello, person!' whenever we call\
    \ it. But what if we wanted to greet the person by their name, instead of the\
    \ word person? That would be a better greeting, wouldn't it? Parameters are just\
    \ the thing we need to add to our function in order to do this! A parameter is\
    \ a piece of input data we give to a function to do something with. A function\
    \ can have no parameters, just like our original greet() function, or it can have\
    \ one or more parameters. When we create functions that use parameters, we say\
    \ that these functions accept parameters, which lets us know that the function\
    \ can take pieces of input data.\n\nTo make our greet() function a little nicer\
    \ let's have it accept one parameter called name and then use it in our greeting!\
    \ We add a parameter to a function by placing it in between the parentheses that\
    \ come after the function name, like this:\n\n```python\ndef greet(name):\n  \
    \  print('Hello, person! ')\n```\n\nBy adding this parameter to the function,\
    \ we are now able to use it within our function. This means we can do something\
    \ like this:\n\n```python\ndef greet(name):\n    print(f\"Hello, {name}! \")\n\
    ```\n\nNow, when we call our greet() function, it will use the parameter you pass\
    \ into it, meaning this code:\n\n```python\ngreet('Robert')\n```\n\nwill result\
    \ in this output:\n\n```\n'Hello, Robert!'\n```\n\nPretty cool! You know what,\
    \ though? We can make our greet() function even cooler. Let's decide that we not\
    \ only want to greet someone by their name, but that we also want to change our\
    \ greeting depending on the person. We might say, \"What's up, Robert? Nice to\
    \ see you again!\" if we are greeting someone we know very well, or \"Hello, Duke!\
    \ Nice to meet you!\" if it's someone new.\n\nRemember, code is all about reusability,\
    \ so we are already ahead of the game by putting our greeting into a function.\
    \ We just have to change it a little bit to do these other things we mentioned!\
    \ To start, let's add another parameter to our greet() function. We'll add a parameter\
    \ called is_new, which can tell the function whether the person we are greeting\
    \ is someone we know:\n\n```python\ndef greet(name, isNew):\n    print(f'Hello,\
    \ {name}! ')\n```\n\nGreat! Now, we just need to add some logic to our function.\
    \ Remember, we want to print a different greeting for the people we know than\
    \ the one we print for the people we don't know. In this case, we can use our\
    \ newly added is_new parameter to help us make this decision! So, if we don't\
    \ know the person, we can use a specific greeting:\n\n```python\ndef greet(name,\
    \ isNew):\n    if(isNew):\n        print(f'Hello, {name}! Nice to meet you!')\n\
    \    else:\n        print(f'Hello, {name}! Nice to see you again!')\n```\n\nThat's\
    \ it! Now, when we use our greet() function, we just need to pass in a few inputs\
    \ for the parameters and it can do the rest of the work for us! Using the parameters\
    \ we pass in, the computer can decide which greeting to use. We can also call\
    \ our greet() function as many times as we want, and it will print out a greeting\
    \ every time. Think of the parenthesis of your function like a luggage portal,\
    \ you can put items in your function's luggage and your function will take the\
    \ luggage with it.\n\n![](img/251ee116a6217aca1f698bcb97555b16_172_0.png)\n\n\
    Can you imagine having to write an if statement and print a different f-string\
    \ each time you needed to do this greeting? Functions make it much easier and\
    \ smarter to do actions like this in code!\n\n### RETURN VALUES\n\nAs we've seen,\
    \ functions are great for actions we need to repeat. We can use them to do something\
    \ for us once or 100 times, depending on how many times we need it.\n\nFunctions\
    \ are also good at helping us perform calculations or make some changes to data\
    \ before we can continue using it in our code. These kinds of functions usually\
    \ have return values, which is the resulting output a function gives us back after\
    \ calling it. We've already used many functions that return some data to us throughout\
    \ this book.\n\nHow about the function when we talked about loops, we used the\
    \ range() function to iterate through specific ranges or numbers. This function\
    \ accepted a starting and stopping index (our input parameters). The range() function\
    \ then takes these parameters and creates a list of all the numbers that are between\
    \ these starting and stopping indices. This newly created list of numbers is then\
    \ returned to us (our return value) so we can iterate through it in the loop we\
    \ originally called it in.\n\n### CALLING FUNCTIONS\n\nCalling a function is easy!\
    \ Whenever there is a point in your code that you need to use a function, simply\
    \ call it by writing the function name followed by parentheses ():\n\n```python\n\
    greet()\n```\n\nThat's it! This is the way we call functions that are in the same\
    \ file.\n\n### SAYING HELLO TO PYTHON\n\nNow that you've installed the Spyder\
    \ IDE on your computer, let's say hello! Open the program and follow the instructions\
    \ below:\n\nIn your Spyder editor (left hand side of the screen), go ahead and\
    \ type the following code:\n\n```python\nprint(\"Hello!\")\n```"
  mdcn: "## 创建你自己的可复用函数\n\n编程的核心是可复用性，或者说一件事被重复使用的容易程度。我们编写代码来为我们处理那些重复的、复杂的或耗时的事情。如果我们每次使用都得重新编写，编程就不会那么有用了。\n\
    \n函数和模块为我们提供了一种编写可复用代码的方式。仔细想想，我们在这本书里已经用过很多了！从一开始我们就使用了 `print()` 函数，而且我们刚刚了解了多功能\
    \ `turtle` 模块多么有趣和交互性强。大多数程序由一个或多个模块组成，而每个模块通常又由几个函数/方法构成。让我们看看以这种方式编写代码如何帮助我们构建更智能的程序。\n\
    \n### 函数\n\n正如我们所学，函数是可复用的代码块，可以执行特定任务或返回一个值。通常，我们为那些经常重复执行的任务编写函数。例如，假设我们每次都需要在某人使用我们的程序时问候他们。我们每次都需要写一个\
    \ `print()` 函数来问候：\n\n```python\nprint(\"Hello, person! \")\nprint(\"Hello, person!\
    \ \")\nprint(\"Hello, person! \")\n```\n\n或者，我们可以将问候某人的动作定义成一个函数：\n\n```python\n\
    def greet():\n    print('Hello, person!')\n```\n\n现在，任何时候你需要调用这个动作，只需这样编写代码即可：\n\
    \n```python\ngreet()\n```\n\n这就是正在发生的事情！要创建一个函数，我们首先需要描述它叫什么名字以及它将做什么。我们从使用 `def`\
    \ 关键字开始，它向计算机发出信号，表明我们正在编写一个函数。它是 “define（定义）” 的缩写。就像字典定义了一个词的含义一样，当我们使用 `def`\
    \ 关键字时，我们定义了我们的函数将做什么。\n\n接下来，我们给函数命名。因为我们将在这个函数中问候人们，所以 “greet” 这个名字是个不错的选择，它清晰地描述了我们函数的功能。然后，我们在函数名后添加一些括号\
    \ `()`。我们稍后可能会在括号中添加参数，但现在不需要。最后，一个冒号 `:` 表示后面缩进的代码行将成为我们函数的一部分。就这样！\n\n关于函数有一个重要的知识：它们不会自行运行。这意味着每当计算机遇到一个函数定义时，它会自动跳过其内部的代码。为了实际使用一个函数，必须调用它，这意味着我们必须明确告诉计算机开始执行被调用函数的代码。如果我们不调用函数，它们内部的代码将永远不会运行！\n\
    \n### 参数\n\n我们的 `greet()` 函数很普通。每次调用时，我们都说 “Hello, person!”。但如果我们想用他们的名字来问候这个人，而不是用\
    \ “person” 这个词呢？那样问候会更好，不是吗？参数正是我们需要添加到函数中以实现此目的的东西！参数是我们提供给函数的一段输入数据，以便它执行操作。一个函数可以没有参数，就像我们最初的\
    \ `greet()` 函数一样，也可以有一个或多个参数。当我们创建使用参数的函数时，我们称这些函数“接受参数”，这让我们知道该函数可以接收输入数据。\n\n\
    为了让我们的 `greet()` 函数更友好一点，让我们让它接受一个名为 `name` 的参数，并在问候语中使用它！我们通过将参数放在函数名后的括号中来为函数添加参数，像这样：\n\
    \n```python\ndef greet(name):\n    print('Hello, person! ')\n```\n\n通过向函数添加这个参数，我们现在可以在函数内部使用它。这意味着我们可以这样做：\n\
    \n```python\ndef greet(name):\n    print(f\"Hello, {name}! \")\n```\n\n现在，当我们调用\
    \ `greet()` 函数时，它将使用你传入的参数，意味着这段代码：\n\n```python\ngreet('Robert')\n```\n\n将产生此输出：\n\
    \n```\n'Hello, Robert!'\n```\n\n很酷吧！不过你知道吗？我们可以让我们的 `greet()` 函数更酷一些。我们决定不仅想通过名字问候某人，还想根据对方的不同来改变问候语。如果我们非常熟悉的人，我们可能会说：“最近怎么样，罗伯特？很高兴再次见到你！”如果是新人，我们可能会说：“你好，公爵！很高兴认识你！”\n\
    \n记住，代码的核心是可复用性，所以我们将问候语放入函数中已经领先一步了。我们只需稍作修改即可完成我们提到的这些其他事情！首先，让我们为 `greet()`\
    \ 函数添加另一个参数。我们将添加一个名为 `isNew` 的参数，它可以告诉我们所问候的人是否是我们认识的：\n\n```python\ndef greet(name,\
    \ isNew):\n    print(f'Hello, {name}! ')\n```\n\n很好！现在，我们只需要给函数添加一些逻辑。记住，我们希望为认识的人打印不同于陌生人的问候语。在这种情况下，我们可以使用我们新添加的\
    \ `isNew` 参数来帮助我们做出决定！所以，如果我们不认识这个人，我们可以使用特定的问候语：\n\n```python\ndef greet(name,\
    \ isNew):\n    if(isNew):\n        print(f'Hello, {name}! Nice to meet you!')\n\
    \    else:\n        print(f'Hello, {name}! Nice to see you again!')\n```\n\n就这样！现在，当我们使用\
    \ `greet()` 函数时，只需要传入几个参数值，它就能帮我们完成剩下的工作！计算机可以根据我们传入的参数来决定使用哪种问候语。我们也可以根据需要调用任意多次\
    \ `greet()` 函数，每次都会打印一句问候语。把函数的参数想象成一个行李传送口，你可以把物品放进函数的行李里，函数会带着这些行李运行。\n\n![](img/251ee116a6217aca1f698bcb97555b16_172_0.png)\n\
    \n你能想象每次需要进行这种问候时都要写一个 if 语句并打印不同的 f 字符串吗？函数使得在代码中执行此类操作变得更加简单和智能！\n\n### 返回值\n\
    \n正如我们所见，函数非常适合我们需要重复执行的操作。我们可以用它们为我们执行一次或一百次操作，取决于我们需要多少次。\n\n函数还擅长帮助我们执行计算或在我们继续在代码中使用数据之前对其进行一些修改。这类函数通常具有返回值，即调用函数后它给我们的结果输出。在这本书中，我们已经使用了很多返回数据的函数。\n\
    \n还记得我们讲循环时用到的 `range()` 函数吗？我们使用它来遍历特定范围或数字。该函数接受一个起始和结束索引（我们的输入参数）。然后，`range()`\
    \ 函数会获取这些参数，并创建一个包含起始和结束索引之间所有数字的列表。这个新创建的数字列表随后被返回给我们（我们的返回值），以便我们在最初调用它的循环中遍历它。\n\
    \n### 调用函数\n\n调用函数很简单！只要在代码中需要使用函数的地方，只需写出函数名，后跟括号 `()` 即可：\n\n```python\ngreet()\n\
    ```\n\n就这样！这是我们调用同一文件中函数的方式。\n\n### 向 Python 打招呼\n\n既然你已经在计算机上安装了 Spyder IDE，让我们向它打个招呼吧！打开程序并按照以下步骤操作：\n\
    \n在你的 Spyder 编辑器（屏幕左侧），输入以下代码：\n\n```python\nprint(\"Hello!\")\n```"
