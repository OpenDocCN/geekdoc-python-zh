    How will this return?


    ```

    23 == 22

    ```


    False because 23 is not equal to 22.


    What about this one?


    ```

    10 == 10

    ```


    True because they are exactly the same.


    Here''s a tricky one:


    ```

    10 == "10"

    ```


    False because the 10 on the right is a string type and the 10 on the left is an
