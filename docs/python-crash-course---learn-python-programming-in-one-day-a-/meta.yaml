    # # Colors Are Just R, G & B


    On a computer, all colors are really just specific combinations of the three primary
    additive colors, which are red, green, and blue. Computers use additive color,
    which means colors are created by adding different levels of red, green, and blue
    together. This makes sense, because computer screens give off light and can only
    combine levels of light to make colors.


    When choosing colors on a computer, we need to tell it exactly how much of each
    primary color to use to get the resulting color we want. This is called the RGB
    color model. The RGB color model stands for the red green blue color model and
    is written using three numbers, with each number representing how much red, green,
    and blue should be used:


    ```

    `(R,G,B)`

    ```


    Each number represents the amount of red, green, and blue contained in the specific
    color you want. The first number is how strong you want the red color to be. If
    you wanted the strongest red and absolutely no other color, you’d give the RGB
    model the maximum amount of red, zero for green, and zero for blue


    ```

    `(255, 0, 0)`

    ```


    Similarly, for the strongest green color, you’d give the maximum amount of green,
    and no red or blue:


    ```

    `(0, 255, 0)`

    ```


    And lastly, to create a total blue, you would have no red and no green:


    ```

    `(0, 0, 255)`

    ```


    Why is the maximum amount 255? We use this number because of how computers store
    information. Computers uses the numbers 0 and 1 to process information. A bit
    which is short for binary digit, is the smallest unit of data a computer'
