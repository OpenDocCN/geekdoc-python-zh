  md: 'Now, we''re left with a few addition and subtraction calculations. Since addition
    and subtraction have the same level of importance, we use the left-to-right order
    of calculating them, just like we did with multiplication and division. Let''s
    see the remaining steps


    +   - First add 20 to 1.65, which would equal 21.65

    - Next, subtract the 1.5 from 21.65, which would equal 20.15

    - Finally, add the last calculation of 3 to 20.15 for a total of 23.15


    Keep in mind, all the steps above aren''t actually going to show in your shell.
