  md: '# NUMERIC TYPES


    There are two main numeric types that we will be using in Python: integers and
    floats. The first one is one that you''re already familiar with and will use most
    of the time. These are integers, which are the whole numbers (positive or negative)
    that we are used to. Even though we will not use the other numeric type as much,
    it''s still a good idea to know what it is. The other types are Floats


    Floats: Floating point numbers, or simply floats, are numbers that can have whole
    and fractional parts and are also written using decimal points.


    ```

    myGpa=3.27

    ```


    Even though these look like decimal numbers, they are not completely the same.
    This numeric type is used when we need precise calculations which happens most
    often in math and science. We actually have a built-in module in Python called
    the decimal module which is based on the float type.


    # OPERATORS'
