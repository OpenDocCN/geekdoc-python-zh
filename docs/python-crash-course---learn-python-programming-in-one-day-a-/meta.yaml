  md: '**Order of** A special set of rules are followed for arithmetic operators This
    set of rules is called the order of operations. It is the proper order in which
    arithmetic operations should be calculated. Let us pretend that you have many
    calculations for a single variable. For example, how we calculate our total when
    eating out at a restaurant:'
  merge: -1
  pgno: 9
- img_proc: true
  md: '```

    total=20 + (20 * .0825) - 1.5 + 3

    ```


    Here, there is a sales tax (the multiplication of .0825) added to our meal price
    (first addition calculation, $20), a coupon (the subtraction of $1.50),'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'and a tip for the waiter (the second addition calculation, $3). We can find
    the proper total by using the order of operations.


    # 1. Parentheses


    In calculations like this, the computer always calculates any expression in parentheses
    first. Parentheses. In our example, we would calculate the sales tax first (the.o825
    represents sales tax of 8.25 percent). In this calculation, `20*0825` would equal
    1.65


    # 2. Exponentiation


    The next calculation that is performed is exponentiation When the computer sees
    the `**` operator, it raises one number to the power of another. What this means
    is, if you type `2 ** 4` in your shell, you''ll get 16, because 2 to the power
    of 4 (also 2 x 2x2x2) equals 16. Because Our dinner calculation does not have
    any exponentiation calculations, we move onto the next operation of importance.


    # 3. Multiplication and Division


    In the order of operations, multiplication and division are next. They have the
    same level of importance as each other, so if both a multiplication and division
    calculation appear in the same line, we start with the calculation on the left
    and work our way to the right. For example, in this calculation:


    ```

    4 * 3/ 2

    ```


    We would first calculate `4 * 3` (which would be 12), since it''s the calculation
    at the very left. Then, we would calculate the resulting `12 / 2`, since we have
    worked our way to the right the final answer would be 6. Since our dinner calculation
    does not have any other multiplication or division calculations (except for the
    one we already calculated in the parentheses step), we can move to the next rule
    of importance.


    # 4. Addition and Subtraction


    The calculations with the least importance are addition and subtraction This means
    they are performed last. So far, our total dinner bill now looks like this, with
    the sales tax calculated first because'
