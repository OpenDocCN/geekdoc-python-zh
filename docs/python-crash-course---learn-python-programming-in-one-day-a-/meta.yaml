    ## 小于等于


    <=


    希望你开始看到这里的规律了！这是小于等于运算符。就像大于等于运算符一样，我们确保至少有一个运算符是正确的。对于小于等于运算符，我们查看值，看 `<=` 运算符左侧的值是否小于或等于右侧的值。


    当你在命令行中写下这段代码时，你认为它会返回什么？


