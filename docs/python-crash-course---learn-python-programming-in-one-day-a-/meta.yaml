    \nturtle.done()\n```\n\n第三个参数 `steps`（方向）会根据传入的值改变绘制方向。所以，代码 `pen.circle(200,\
    \ 270, 30)` 是在告诉计算机：嘿，你能给我画一个半径为200，但只画270度范围的圆，并且在绘制过程中每30度转一下笔吗？\n\n__________\n\
    \n## stamp()\n\nTurtle对象提供的另一个非常酷的内置函数是 `stamp()` 函数。就像听起来的那样，`stamp()` 函数每次使用时会盖印一个你所选形状的副本。为了看到实际效果，让我们首先创建一个新的海龟形状，我们希望颜色是绿色，并且使用\
    \ `penup()` 方法以便我们能真正看到海龟。\n\n```python\nimport turtle\n\nturtle.setup(500,500)\n\
    \nexample = turtle.Turtle()\nexample.shape('turtle')\nexample.color('green')\n\
    example.penup()\n\nturtle.done()\n```\n\n![](img/251ee116a6217aca1f698bcb97555b16_148_0.png)\n\
    \n现在我们要使用 `forward()` 方法和 `stamp()` 方法来移动这个海龟并盖印它。我们还可以在每次向前移动之前旋转海龟。\n\n```python\n\
    import turtle\n\nturtle.setup(500,500)\n\nexample = turtle.Turtle()\nexample.shape('turtle')\n\
    example.color('green')\nexample.penup()\n\nexample.forward(100)\nexample.stamp()\n\
    \nexample.left(90)\nexample.forward(100)\nexample.stamp()\n\nexample.left(90)\n\
    example.forward(100)\nexample.stamp()\n\nexample.left(90)\nexample.forward(100)\n\
    example.stamp()\n\nturtle.done()\n```\n\n![](img/251ee116a6217aca1f698bcb97555b16_149_0.png)\n\
    \n你试过了吗？现在让我们通过使用循环让代码更短、更易读。\n\n```python\nimport turtle\nturtle.setup(500,500)\n\
    \nexample = turtle.Turtle()\nexample.shape('turtle')\nexample.color('green')\n\
    example.penup()\n\nfor i in range(1,5):\n    example.forward(100)\n    example.stamp()\n\
    \    example.left(90)\n\nturtle.done()\n```\n\n![](img/251ee116a6217aca1f698bcb97555b16_150_0.png)\n\
    \n## write()\n\nTurtle对象提供的另一个有趣的内置函数是 `write()` 函数。如果你需要在屏幕上写文本，这个函数就派上用场了。它类似于\
    \ `print()` 函数。让我们创建一个笔（或任何你想命名的）海龟的副本，然后写点东西。\n\n```python\npen=turtle.Turtle()\n\
    pen.write('Python is fun!')\n```\n\n![](img/251ee116a6217aca1f698bcb97555b16_152_0.png)\n\
    \n这将使用当前的笔的大小和颜色来写文本。如果我们想改变字体（字型）、文本大小，我们可以给 `write()` 函数第二个参数！你可以在实际的 `write`\
    \ 方法中更改所有这些：\n\n`pen.write('Python is fun!', font=('impact', 20, 'bold'))`\n\n\
    看到我们怎么做的了吗？第一个参数是我们要输出的文本，第二个参数是一个元组，其中包含字体的详细信息（字体、大小、类型）！执行这段代码，我们得到：\n\n```python\n\
    pen=turtle.Turtle()\npen.write('Python is fun!' , font=('impact', 20, 'bold'))\n\
    \nturtle.done()\n```\n\n![](img/251ee116a6217aca1f698bcb97555b16_153_0.png)\n\n\
    在这些章节中，我们学习了：\n\n-   如何使用 turtle 模块来绘制和创建形状。\n-   我们创建了一些画笔。\n-   我们学习了如何改变颜色和画笔大小。\n\
    -   我们学习了如何绘制形状并用颜色填充它们。\n-   我们学习了如何盖章。\n\n## 练习活动\n\n### 活动 #1 - 画一颗星星！\n\n\
