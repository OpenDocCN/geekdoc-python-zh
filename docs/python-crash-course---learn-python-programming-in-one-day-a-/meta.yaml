    ## 列表切片


    这可能听起来很奇怪，但别担心，因为这对列表来说是正常的事情。就像我们切下想要的那块派一样，切片是在列表中选择特定范围项目的方法。它类似于我们如何通过索引访问列表中的项目，只是我们可以选择多个项目。


    我们不是在列表的方括号内放置单个索引，而是给它一个切片范围，其中包括一个起始索引、中间的冒号（:）字符和一个结束索引。它看起来像这样：


