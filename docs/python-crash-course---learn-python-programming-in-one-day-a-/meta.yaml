    is greater than (>), less than (<), greater than or equal to (>=), less than or
    equal to (<=), equal to (==), and not equal to (!=) another.


    Finally, we learned about logical operators, which help us make smarter comparisons


    The and operator helps us determine if two expressions are both True.'
