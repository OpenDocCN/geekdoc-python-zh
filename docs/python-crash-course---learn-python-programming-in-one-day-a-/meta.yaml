  md: 'At the core of coding is the concept of reusability, or how easy it is to use
    something again and again. We write code that can do repetitive, complex or time-consuming
    things for us. If we had to write it every single time we needed to use it, coding
    wouldn''t be very useful.


    Functions and modules provide a way for us to write code that''s reusable. If
    you think about it, we''ve already used so many in this book! We''ve used the
    print() function since the beginning and we''ve just learned about how fun and
    interactive the multipurpose turtle module is. Most programs are made up of one
    or many modules, and each of those modules is usually made up of several functions/methods.
    Let''s see how writing code in this way helps us have smarter programs.


    # # FUNCTIONS


    As we''ve learned, functions are reusable blocks of code that can do something
    specific or return a value. Usually, we write functions for things that we often
    repeat. For example, say we needed to greet a person every time they used our
    program. We could write a print() function every single time we needed to greet
    them:


    ```


    print("Hello, person! ")

    print("Hello, person! ")

    print("Hello, person! ")


    ```'
  merge: -1
  pgno: 166
- img_proc: true
  md: "Or, we could make the action of greeting someone a function\n\n```\ndef greet():\n\
    \    print('Hello, person!')\n```\n\nNow anytime you need to call that action\
    \ you can just write your code like this:\n\n```\ngreet ()\n```\n\nHere's what's\
    \ happening! To create a function, we first need to describe what it will be called\
    \ and what it will do. We start by using the\n\ndef keyword, which signals to\
    \ the computer that we are writing a function. It's short for define. Just Like\
    \ a dictionary defines what a word\n\nmeans, we define what our Function will\
    \ do when we use the def keyword.\n\nNext, we name our function. Because we will\
    \ be greeting people when we use this function, the name \"greet\" is a good choice,\
    \ as it"
  merge: -1
  pgno: 167
- img_proc: true
  md: "clearly describes what our function is doing. We then add some parentheses\
    \ () to our function name. We may add parameters in the parentheses later, but\
    \ for now, we don't have any. Lastly, a colon (:) shows that the following indented\
    \ lines of code will be part of our Function. That's it!\n\nAn important thing\
    \ to know about functions is that they don't run on their own. This means that\
    \ whenever a computer comes across one, it automatically skips the code within\
    \ it. In order to actually use a function, it needs to be called, meaning we must\
    \ clearly tell the computer to start executing the called function's code. If\
    \ we don't call functions, the code within them will never be run!\n\n# PARAMETERS\n\
    \nOur greet() function is pretty normal. We say 'Hello, person! whenever we call\
    \ it. But what if we wanted to greet the person by their name, instead of the\
    \ word person? That would be a better greeting. wouldn't it? Parameters are just\
    \ the thing we need to add to our function in order to do this! A parameter is\
    \ a piece of input data we give to a function to do something with. A function\
    \ can have no parameters, just like our original greet() Function, or it can have\
    \ one or more parameters. When we create functions that use parameters, we say\
    \ that these functions accept parameters, which lets us know that the function\
    \ can take pieces of input data.\n\nTo make Our greet() function a little nicer\
