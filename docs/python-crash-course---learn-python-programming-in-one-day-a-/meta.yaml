    My name is Scott, I am very happy and I love to program

    ```


    ### Activity #2 - Change Your Mood


    Using your code from Activity #1 change your mood from happy to a different mood.


    **Do not look at the next page until you have completed the activity!**


    ![](img/251ee116a6217aca1f698bcb97555b16_216_0.png)


    ### Activity #3 - Change An Additional Mood


    Using your code from Activity #2 add an emotion variable, then use that variable
    to replace the word “love” in your printed statement.


    **Do not look at the next page until you have completed the activity!**


    ![](img/251ee116a6217aca1f698bcb97555b16_216_1.png)


