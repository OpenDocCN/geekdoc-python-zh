    i=0

    while(i < len(numbers)):


    ```


    We create a boolean express, that''s how! The boolean expression is literally
    saying “I will continue this loop as long as the iteration counter is less than
    the length of the list”. We know that our numbers list has a certain number of
    objects in it. If we iterate through our list the same number of times as the
    total amount of objects in it then we know we have gone through them all.


    This means our Boolean expression is asking if our iterator variable less than
    the total amount of objects in our numbers list. As long as the iterator count
    variable is less than the list length then the loop will continue. As soon as
    the counter becomes equal or greater than the length it will stop and exit the
    loop.


    The len () function is a reusable block of code that returns a value. The len
    () function literally tells you the length of things. There could be 10,000 items
    in a list, 1 million, 5, etc. and the len () function will tell you that.


    This simply means that we receive some sort of output back from the function we
    use. Usually, the values we receive back is an integer, but they can also be a
    string Boolean, list, or any other data type that we might find useful.


    The len() function isn''t just any plain function, though. It is one of Python''s
    many built-in functions and that''s exactly what we needed for our specific Boolean
    expression! We will learn more about other built-in functions, as well as how
    to create our own later on.'
