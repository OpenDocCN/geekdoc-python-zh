    Also like the name, the not-equal-to operator asks the computer to figure out
    if the value on the left side of the != symbol is not the same as the value on
    the right side of the != symbol. Go ahead and try to guess the next few examples.


    5 != "five"


    True because the integer 5 is **not equal to** the string text "five".


    10 != "10"


    True because the integer 10 is **not equal to** the string text "10".


    4 != 3


    True because the integer 4 is **not equal to** the integer 3.


    9 != 9


    False because the integer 9 **is equal to** the integer 9.


    **Logical** operators are used to help us compare True or False operands. These
    are very helpful because they can make our decision making rules more complex,
    which means smarter code! There are three main logical operators: and, or, and
    not. Let''s see what each can do.


    ## And Operator


    The and operator checks that the values on the right and left of it are both True.
    It looks like this: and. If there''s a point in our code that should only run
    when two conditions are met we should use the and operator. Let''s say that we
    are looking for a specific pizza with pepperoni and mushrooms.


    ```

    pizzaHasPepperoni = True

    ```


    ```

    pizzaHasMushrooms = False

    ```


    To check that the pizza you were evaluating had both pepperoni and mushrooms,
    you''d use the and operator like this `pizzaHasPepperoni and pizzaHasMushrooms`.


    The and operator allows you to check both conditions: that the pizza slice has
    pepperoni and that it has mushrooms. Only then would you take that slice of pizza,
    only if both of your conditions were met! In this case there were no mushrooms...
    so your condition returned false and you do not get the slice with pepperoni and
    mushrooms.


    ## Or Operator


    The or operator checks to make sure that **at least** one value being compared
    is True. It looks like this: or. On our pizza example, we couldn''t find any pizza
    slices that had both pepperoni and mushroom on it. Still wanting pizza, you decide
    that if the pizza has either pepperoni or mushroom on it you will still select
    and eat that pizza. Here is where the or operator will come into play. To check
    for either pepperoni **or** mushroom, you''d write code like this:


    ```

    pizzaHasPepperoni or pizzaHasMushrooms

    ```


    This way, if the pizza you were checking had either pepperoni or mushroom on it,
    you''d take it.


    ## Not Operator


    The not operator checks to make sure that the value being compared is False. It
    looks like this: not. Just as you''d take any pizza that had pepperoni or mushroom
    on it, you definitely would not take any that had onions on it. Let''s say we
    have variable called pizzaHasOnions and its value was True. To make sure you do
    not get any pizza with onions on it, you could use the not operator:


    ```

    not pizzaHasOnions

    ```


    It looks a little strange if you read it out loud, but it is correct! You''re
    basically saying, hey computer, make sure that the pizza having onions is not
    true.


    In this section we have learned:


    There are two main numeric types we will work with most often: integers and floats.
    Operators are special keywords or characters that enable us to perform actions.
    The first set we learned about were arithmetic operators. Arithmetic operators
    are similar to the ones we use in math and it is important to remember the order
    of operations to calculate something correctly.


    The order of operations, from most important to least important, is: parentheses,
    exponentiation, multiplication, division, addition, and subtraction (PEMDAS).
    If there is more than one calculation with the same level of importance to evaluate,
    we go from left to right.


    Another set of operators we learned about are comparison operators. These help
    us compare two values to each other. We have operators to compare if one value
    is greater than (>), less than (<), greater than or equal to (>=), less than or
    equal to (<=), equal to (==), and not equal to (!=) another.


    Finally, we learned about logical operators, which help us make smarter comparisons.
    The and operator helps us determine if two expressions are both True. The or operator
    checks that at least one expression we pass to it is True. The not operator determines
    if the expression we pass to it is False.


