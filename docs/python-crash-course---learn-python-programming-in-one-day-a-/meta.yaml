  md: 'We are trying to decide if the value on the left of the >= operator is greater
    than the one on the right OR if the value on the left is the same as the value
    on the right. Only one of these cases needs to be true in order for the computer
    to decide that the entire expression is True. So, in code:


    ```

    isItGreaterOrEqual = 4 >= 3

    ```


    What do you think this will return? True or False? Did you say True? You''re right
    because 4 is greater than 3, we know that the greater-than operator is correct.
    So even though the second operator, the equal-to operator, is not correct (because
    4 is obviously not the same as 3), the computer still returns True because at
    least one operator is correct (the greater-than action).


    Next example;


    ```

    isItGreaterOrEqual = 3 >= 3

    ```


    This one is also True! This time, the equal-to operator is correct, instead of
    the greater-than operator.


    Here''s one more:


    ```

    isItGreaterOrEqual = 1 >= 3

    ```


    What do you think? False? That''s right because BOTH operators are not correct.
    The number 1 is not greater than 3, so the greater-than operator is incorrect,
    and 1 is not the same as 3, which also makes the equal-to operator incorrect.'
