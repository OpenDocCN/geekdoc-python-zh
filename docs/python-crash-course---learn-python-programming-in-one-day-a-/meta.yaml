    ## SLICING LISTS


    That may sound odd, but don''t worry because it''s a normal thing for lists. Just
    like we slice the piece of pie we want, slicing is the method of selecting a specific
    range of items within a list. It''s similar to how we access items in a list with
    an index, except we can choose more than one item.


    Instead of placing a single index within the list''s brackets, we give it a slice
    range, which includes a starting index, the colon (:) character in the middle,
    and an ending index. Here''s what it looks like:


    ```python

    print(citrusFruits[2:4])

    ```


    This tells the computer, "Hey there, I need some items from the citrusFruits list.
    I need all items starting at the second index all the way up to, but not including
    the item at the fourth index."


    Here''s what''s happening: The first index we give in the citrusFruits list is
    2. This is our starting index which is the location of the first item we select
    in our slice range. We only begin selecting items at this index. The colon (:)
    character tells the computer we are slicing the list. Once it knows this, it will
    be looking for an ending index, which is the location of the last item in the
    slice range. This lets the computer know when to stop selecting items. In this
    case, our ending index is 4. The computer will keep selecting items until the
    ending index, but will not include the item at the ending index itself. This is
    why Lime is not part of our sliced range.


    Let''s say we wanted the first three items in our citrusFruits array. We can slice
    it like this:

    `print(citrusFruits[0:4])`

    which would give us this output:


    ```python

    citrusFruits=[''orange'',''Lemon'',''grapefruit'',''pomelo'',''Lime'']

    moreCitrusFruits=[''orange'',''grapefruit'',''lemon'',''pomelo'',''lime'']

    print(citrusFruits[0:4])

    ```


    Also, you could have left out the starting index number 0. This is because the
    computer assumes you want to start at the beginning of the list if you do not
    give it a starting index. Therefore, we can write a slice range without the starting
    index if we know that we need items from the beginning of a list.


    This works on the ending index, too. So if we wanted to grab only the last three
    items, we''d write:

    `print(citrusFruits[2:])`

    which returns this output:


    ```python

    citrusFruits=[''orange'',''Lemon'',''grapefruit'',''pomelo'',''Lime'']

    moreCitrusFruits=[''orange'',''grapefruit'',''lemon'',''pomelo'',''lime'']

    print(citrusFruits[2:])

