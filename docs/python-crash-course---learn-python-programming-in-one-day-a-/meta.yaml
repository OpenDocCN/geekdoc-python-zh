  md: '# Or Operator


    The or operator checks to make sure that **at least** one value being compared
    is True.

    It looks like this: or

    On our pizza example, we couldn''t find any pizza slices that had both pepperoni
    and mushroom on it.

    Still wanting pizza, you decide that if the pizza has either pepperoni or mushroom
    on it you will still select and eat that pizza. Here is where the or operator
    will come ito play. To check for either pepperoni **or** mushroom, you''d write
    code like this:


    ```

    pizzaHasPepperoni or pizzaHasMushrooms

    ```


    This way, if the pizza you were checking had either pepperoni or mushroom on it,
    you''d take it.


    # Not Operator


    The not operator checks to make sure that the value being compared is False.

    It looks like this: not

    Just as you''d take any pizza that had pepperoni or mushroom on it, you definitely
    would not take any that had onions on it. Let''s say we have variable called pizzaHasOnions
    and its value was True. To make sure you do not get any pizza with onions on it,
    you could use the not operator


    ```

    not pizzaHasOnion

    ```


    It looks a little strange if you read it out loud, but it is correct! You''re
