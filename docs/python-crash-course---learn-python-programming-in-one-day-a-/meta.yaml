    So you want to learn Python? This book will start off with super basics and will
    guide you step-by-step to becoming a fully capable Python programmer. So let’s
    skip all the fancy intros and start learning some Python!


    We will start by installing an Integrated Development Environment (IDE) called
    Spyder where we can program in the Python language and run our programs.


    About Spyder: “Spyder is a free and open source scientific environment written
    in Python, for Python, and designed by and for scientists, engineers and data
    analysts. It features a unique combination of the advanced editing, analysis,
    debugging, and profiling functionality of a comprehensive development tool with
    the data exploration, interactive execution, deep inspection, and beautiful visualization
    capabilities of a scientific package.”


    # NUMERIC TYPES


    There are two main numeric types that we will be using in Python: integers and
    floats. The first one is one that you''re already familiar with and will use most
    of the time. These are integers, which are the whole numbers (positive or negative)
    that we are used to. Even though we will not use the other numeric type as much,
    it''s still a good idea to know what it is. The other types are Floats:


    Floats: Floating point numbers, or simply floats, are numbers that can have whole
    and fractional parts and are also written using decimal points.


    ```

    myGpa=3.27

    ```


    Even though these look like decimal numbers, they are not completely the same.
    This numeric type is used when we need precise calculations which happens most
    often in math and science. We actually have a built-in module in Python called
    the decimal module which is based on the float type.


    # OPERATORS


    You already learned about integers when we played with variables, now let''s see
    different ways we can use integers with operators.


    **Arithmetic**

    Also known as the math operators, arithmetic operators are used to perform the
    basic functions of math. As you will see in the following chart most arithmetic
    operators work like they do in regular mathematics with a few exceptions.


    **Order of Operations**

    A special set of rules are followed for arithmetic operators. This set of rules
    is called the order of operations. It is the proper order in which arithmetic
    operations should be calculated. Let us pretend that you have many calculations
    for a single variable. For example, how we calculate our total when eating out
    at a restaurant:


    ```

    total=20 + (20 * .0825) - 1.5 + 3

    ```


    Here, there is a sales tax (the multiplication of .0825) added to our meal price
    (first addition calculation, $20), a coupon (the subtraction of $1.50), and a
    tip for the waiter (the second addition calculation, $3). We can find the proper
    total by using the order of operations.


    ## 1. Parentheses


    In calculations like this, the computer always calculates any expression in parentheses
    first. In our example, we would calculate the sales tax first (the .0825 represents
    sales tax of 8.25 percent). In this calculation, `20 * 0.0825` would equal 1.65.


    ## 2. Exponentiation


    The next calculation that is performed is exponentiation. When the computer sees
    the `**` operator, it raises one number to the power of another. What this means
    is, if you type `2 ** 4` in your shell, you''ll get 16, because 2 to the power
    of 4 (also 2 x 2x2x2) equals 16. Because our dinner calculation does not have
    any exponentiation calculations, we move onto the next operation of importance.


    ## 3. Multiplication and Division


    In the order of operations, multiplication and division are next. They have the
    same level of importance as each other, so if both a multiplication and division
    calculation appear in the same line, we start with the calculation on the left
    and work our way to the right. For example, in this calculation:


    ```

    4 * 3/ 2

    ```


    We would first calculate `4 * 3` (which would be 12), since it''s the calculation
    at the very left. Then, we would calculate the resulting `12 / 2`, since we have
    worked our way to the right the final answer would be 6. Since our dinner calculation
    does not have any other multiplication or division calculations (except for the
    one we already calculated in the parentheses step), we can move to the next rule
    of importance.


    ## 4. Addition and Subtraction


    The calculations with the least importance are addition and subtraction. This
    means they are performed last. So far, our total dinner bill now looks like this,
    with the sales tax calculated first because it was in parentheses.


    ```

    total = 20 + 1.65 - 1.5 + 3

    ```


    Now, we''re left with a few addition and subtraction calculations. Since addition
    and subtraction have the same level of importance, we use the left-to-right order
    of calculating them, just like we did with multiplication and division. Let''s
    see the remaining steps:


    1. First add 20 to 1.65, which would equal 21.65.

    2. Next, subtract the 1.5 from 21.65, which would equal 20.15.

    3. Finally, add the last calculation of 3 to 20.15 for a total of 23.15.


    Keep in mind, all the steps above aren''t actually going to show in your shell.
    We simply went through the same steps that the computer takes to see how it actually
    calculates things.


    Let''s try printing this out in our shell:


    ```

    total=20+(20*.0825)-1.5+3

    print(total)

    ```


    Here is what your printed output should look like:


    ```

    23.15

    ```


    ## Comparison


    The next set of operators we use in programming are called comparison operators.
    Just like their name, comparison operators help us compare one value to another.
    When we use comparison operators, they return a True or False answer known as
    a Boolean type. Comparison operators and Booleans are very important because they
    help us make decisions in our code.


    There are 6 main Comparison Operators:


    ### Greater Than


    ```

    >

    ```


    When you use it, the computer decides whether the value on the left side of the
    > symbol is larger than the value on the right side of the symbol.


    ```

    isItGreater = 37 > 12

    ```


    This variable is going to hold the answer to this question: Is 37 greater than
    12? This returns a value of True because 37 is greater than 12. Now if you were
    to print the variable someNumber it would output the word True.


    ### Less Than


    ```

    <

    ```


    When you use it, the computer decides whether the value on the left side of the
    < symbol is less than the value on the right side of the symbol.


    ```

    IsItLess = 37 < 12

    ```


    This variable is going to hold the answer to this question: Is 37 less than 12?
    This returns a value of False because 37 is not less than 12. Now if you were
    to print the variable someNumber it would output the word False.


    ![](img/251ee116a6217aca1f698bcb97555b16_17_0.png)


    ### Greater Than Or Equal To


    ```

    >=

    ```'
