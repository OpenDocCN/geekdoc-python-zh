    *Before you run your code again make sure to close the python turtle graphics
    popup window. This is because the last line of our code is turtle.done().


    Here''s what''s happening. First, we need to tell the computer which object we
    want to interact with. In this case, it''s the Screen.


    Because the Screen object belongs to the turtle module, we make this connection
    known using dot notation. In modern programming styles, dot notation isa way to
    show that certain blocks of code are related to each other. So, to tell the computer
    we want to specifically use the Screen object that belongs to the turtle module,
    we use a dot (.) in between them. That''s how we get the first part: turtle.Screen()


    We still have to tell the computer to use a specific function that belongs to
    the Screen object to change the color. In our case, its the bgcolor() function.
    Just as before, we put a dot in between the Screen object and the name of the
    function we want to use turtle.Screen().bgcolor()


    Finally, we give the bgcolor () function a color turtle.Screen().bgcolor(''blue'')


    So, altogether, the computer understands our code to mean, "Please find the turtle
    module''s Screen object. When you do, find the bgcolor () function that belongs
    to it. Finally, do what the bgcolor () function says to do with the color we''ve
    given it


    Remember, we didn''t write the code for this; it''s already written for us in
    the turtle module. That''s why we needed to import the turtle module first before
    using it. Now, the computer can go through the turtle module''s code, find the
    objects and functions we are asking it to use, and run the code that is already
    written for us.


