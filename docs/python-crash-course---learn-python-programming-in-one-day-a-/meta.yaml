    ## TUPLES


    Tuples are another type in Python that hold a collection of items or objects.
    They are very similar to lists, and everything you know about lists is most likely
    the same for tuples! This means they are ordered, can be accessed with indices,
    work with slice ranges, and can be made of the same or different types of items.
    However, there are two major differences between tuples and lists:


    ### Tuples Use Parentheses


    Tuples use parentheses () to hold their items, instead of the brackets [ ] used
    with lists. This means they are created like this:


    ```python

    rgbColors = (''red'',''green'',''blue'')

    ```


    But the most important difference of all is that tuples are immutable.


    ### Tuples Are Immutable


    Remember, immutable means unable to change. This is a very important difference
    tuples have from lists. Adding, removing or changing the contents of tuples is
    not possible, since this is a special characteristic of tuples. This means methods
    like the append() and remove() functions and del will not work with tuples.


    To remember the meaning of immutable vs mutable I like to think of it like a TV
    and a remote. A TV that is mutable means that I can click the mute button on a
    remote and mute it, so I just changed that. On the other hand, if I could not
    mute the TV no matter how many times I hit the mute button nothing will happen,
    so it is immutable.


    ### When To Use Tuples Over Lists


    For the most part, lists will probably be the type to choose when dealing with
    collections of items. A big sign that should tell you to use a tuple is that the
    collection of items you will be storing should not be changed. Our earlier tuple
    is a great example of this, as the RGB colors can''t change.


