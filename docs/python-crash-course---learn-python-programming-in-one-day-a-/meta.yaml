    # SLICING LISTS


    That may sound odd, but don''t worry because it''s a normal thing for lists. Just
    like we slice the piece of pie we want, slicing is the method of selecting a specific
    range of items within a list. It''s similar to how we access items in a list with
    an index, except we can choose more than one item.


    Instead of placing a single index within the list''s brackets, we give it a slice
    range, which includes a starting index, the colon (:) character in the middle,
    and an ending index. Here''s what it looks like:


    ```

    print(citrusFruits[2:4])

    ```


    This tells the computer, "Hey there, I need some items from the citrusFruits list.
    I need all items starting at the second index all the way up to, but not including
    the item at the fourth index:


    ![](img/251ee116a6217aca1f698bcb97555b16_48_1.png)'
  - '[PAGE 49]


    Here''s what''s happening: The first index we give in the citrusFruits list is
    2. This is our starting index which is the location of the first item we select
    in our slice range. We only begin selecting items at this index. The colon (:)
    character tells the computer we are slicing the list.

    Once it knows this, it will be looking for an ending index, which is the location
    of the last item in the slice range. This lets the computer know when to stop
    selecting items. In this case, our ending index is 4. The computer will keep selecting
    items until the ending index, but will not include the item at the ending index
    itself. This is why Lime is not part of our sliced range. Let''s say we wanted
    the first three items in our citrusFruits array. We can slice it like this:

    print(citrusFruits[0:4])

