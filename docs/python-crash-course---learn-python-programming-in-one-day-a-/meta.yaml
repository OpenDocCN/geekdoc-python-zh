    them (underscores_between_words). If you use spaces, you will get an error message.


    ## Variables Should Have Meaning


    Lastly, variable names should be as descriptive as possible. This means that when
    you read your code, you should know right away what your variable is and what
    kind of data it is storing. You should be able to understand it.


