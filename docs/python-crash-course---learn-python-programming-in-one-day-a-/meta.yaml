    Here''s what''s happening: When you use the f character before a string the computer
    knows that you are about to create an f-string. Once it knows this, it starts
    looking for the opening and closing quotes of the string like normal, but when
    it comes across some braces {something}, it says, "Oh, here''s a part of the string
    this Human wants me to replace. What does it say?'
