    ```


    ```

    CurDay = "Thursday"

    FvorltE_DrInk = "coffee"

    ```


    See the difference? Clear names with meaning and style consistency are your best
    bets for great variable names.


    ## GETTING FAMILIAR


    Now that you are getting familiar with your IDE interface let''s make it more
    comfortable to look at. You can change the layout to whatever feels best for you,
    but I will just show you how to increase the font on the editor window and move
    the output console to where it is directly to the right of our editor. To enlarge
    the text font size in my editor I right clicked, then selected the zoom in option
    3 times.


    ```python

    # -*- coding: utf-8 -*-

    """

    Spyder Editor


    This is a temporary script file.

    """


    myFavoriteNumber = ''7''

    type(myFavoriteNumber)

    print(type(myFavoriteNumber))

    ```


    Next, I want to move the output console so I would go to the View menu and choose
    to unlock panes and toolbars


    ![](img/251ee116a6217aca1f698bcb97555b16_201_0.png)


    Now I can drag my output window to rest beneath the editor to the right and drag
    the other windows around until I like the layout. Once you are happy with the
    layout go back to the View menu and lock the panes/toolbars:


    ![](img/251ee116a6217aca1f698bcb97555b16_202_0.png)


    ## FORMATTED STRING LITERALS


    Don''t let the term formatted string literals'' scare you off. Strings are more
    useful when we can change or manipulate certain parts of them.


    ```python

    print("I am so happy to learn Python coding!")

    ```


    Imagine that you have another emotion about learning to code in Python. How would
    you change this code to reflect your mood?


    With formatted string literals of course!


    Using string literals gives us an easy way to replace parts of a string or change
    their order. To do this, we create a variable, then we can place that variable
    in a string by surrounding it with braces, which look like this: {}


    We tell the string that we are placing a formatted string literal in it by starting
    the string with f”. Let''s try it out:


    In your editor, create a food variable and print command like this:


    ```

    food=''cake''

    print(f''I like {food}'')

    ```


    Now click Run


    ![](img/251ee116a6217aca1f698bcb97555b16_204_0.png)


    Here''s what''s happening: When you use the f character before a string the computer
    knows that you are about to create an f-string. Once it knows this, it starts
    looking for the opening and closing quotes of the string like normal, but when
    it comes across some braces {something}, it says, "Oh, here''s a part of the string
    this Human wants me to replace. What does it say?


    food''? Oh! I know that variable and I know exactly where I stored it, let me
    get that real quick... now, let me just put the word cake in there and remove
    this f-string placeholder. Nice!


    Once it finishes replacing all the parts of our string it outputs the final version
    to our console.


    So let’s go back to our earlier example and change a string in the print () function
    from "happy" to “SUPER Happy”.


    Since we know “happy” is the only part that will be changing and will probably
    be different each time we change it, it''s a good idea to store it in a variable.
    Let''s do that:


    ```

    feeling=''happy''

    ```


    Let''s change the parameter in our print () function to be an f-string instead:


    ```

    print(f''I am so to learn Python coding!'')

    ```


    ![](img/251ee116a6217aca1f698bcb97555b16_206_0.png)


    Great! Now our print () function will always print out the current feeling we
    have. Let''s change that feeling now by changing the variable data, write your
    print () function, then run your program:


    ```

    feeling=''SUPER Happy''

    print(f''I am so {feeling} to learn Python coding!'')

    ```


    ![](img/251ee116a6217aca1f698bcb97555b16_207_0.png)


    ## MULTI-LINE STRINGS


    With f-strings, we can make our code a lot cleaner and easier to read. Let''s
    write a multi-line sentence like this:


    ```

    mLines="""

    Jack & Jill

    went up

    the hill

    to fetch a

    pail of water''''''

    ```


    ```

    print(f''{mLines}'')

    ```


    ![](img/251ee116a6217aca1f698bcb97555b16_211_0.png)


    Here''s what''s happening: We create a variable called mLines. We then assign
    that variable to our actual multi-line sentence, which is typed out exactly as
    we want it to look like on its different lines. You''ll notice that instead of
    our normal quotes we use a special type of character for multi-line strings. We
    use triple quotes. You can use a pair of 3 double quotes or a pair of 3 single
    quotes but do not mix and match these. This tells the computer to print out what
    we put in between these triple quotes exactly the way we have it. After that,
    we use our f-string to print or display it.


    What have you learned so far?


    The print() function is used to write text output from our code, which can be
    seen in our output console.


    We can print single or multi-line text.


    Another important topic we covered is variables. We learned:

    - Variables can''t start with a number.

    - Variables should have the same styling, meaning they should use capitalization,
    underscores, or no spaces consistently.

    - Variables should be descriptive and have meaning so we can understand them.


    Finally, we learned about fancier ways to print text, specifically by using f-strings.
    We learned:

    - F-strings allow us to use variables in our output text.

    - F-strings let us print something exactly as we type it, even with multi-line
    text.

    - F-strings make our code a lot cleaner and easier to read.


    Let’s do some Practice Activities and put what we''ve learned into action!


