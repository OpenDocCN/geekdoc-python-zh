    Why does Screen have parentheses, but turtle does not? If you look back at the
    code we wrote, you''ll see


    ```

    `turtle. Screen().bgcolor (''blue'')`

    ```


    This is part of a modern programming style called object-oriented programming.
    In object-oriented programming programmers focus on writing code that is organized
    into groups that are related, can be reused, and can work with each other like
    building blocks.


    This way,code can be written into modules that we use directly, like the turtle
    module, or written in a way that we have to create a copy of it, like the Screen
    object. In Python''s turtle module, the Screen object is something we have to
    create a copy, or instance of because we might want to make changes to it. You''ll
    notice this more and more as you work with other modules and object oriented languages.'
