    ## Less Than Or Equal To


    <=


    Hopefully you are starting to see a pattern here! This is the less-than-or-equal-to
    operator. Just like the greater-than-or-equal-to operator, we are making sure
    at least one of the operators is correct. For the less-than-or-equal to operator,
    we are looking at the values to see if the value on the left of the <= operator
    is either smaller than the one on the right of the operator or the same as the
    one on the right.


    What do you think this code will return when you write it in your shell?


    ```

    isItLessOrEqual = 1 <= 3

    ```


    That''s right! This returns True because 1 is smaller than 3. This makes the less-than
    operator correct, even if the equal-to operator is not. And since one of the operators
    is correct, the whole thing returns True.


    How about this one?


    ```

    isItLessOrEqual = 7 <= 7

    ```


    Same thing. This also returns True, as the equal-to operator is correct.


    ## Equal To


    ==


    This one is much more simple than the last two operators. Just like it sounds,
