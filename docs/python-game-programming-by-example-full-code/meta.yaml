- img_proc: true
  md: '+   3. Place an equal number of stones or seeds in each of the 12 smaller pits.
    A common starting configuration is four stones in each pit.


    # Starting the Game:


    +   1. Players sit opposite each other, facing the board, with their Mancalas
    on their right-hand side.

    2. Decide who goes first. Players may use a coin toss, rock-paper-scissors, or
    any other method to determine the starting player.


    # Gameplay:


    +   1. On a player''s turn, they select one of the pits from their row that contains
    stones or seeds.

    2. The player then picks up all the stones or seeds from the chosen pit and distributes
    them, one by one, in a counterclockwise direction into the succeeding pits, including
    their own Mancala but skipping the opponent''s Mancala.

    3. If the last stone or seed is dropped into the player''s Mancala, they get another
    turn. If the last stone lands in an empty pit on their side, the player captures
    that stone and any stones in the opponent''s pit directly opposite. These captured
    stones are placed in the player''s Mancala.

    4. The game continues with players taking turns until one side of the board is
    empty.


    **Ending the Game:** The game ends when one player no longer has stones or seeds
    in their pits. The remaining stones on the opposite side of the board are captured
    by the other player. The player with the most stones or seeds in their Mancala
    is declared the winner.'
