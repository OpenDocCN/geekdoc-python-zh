  md: '# 1. Setup :


    +   - The game is typically played on a 6x7 grid, though the size can vary .

    - Each player is assigned a color ( commonly red and yellow ) or a symbol ( like
    " X " and " O ").

    - The game starts with an empty grid .


    # 2. Starting Player :


    +   - Players decide who goes first . This can be done through a coin toss, rock
    - paper - scissors, or any other agreed - upon method .


    # 3. Taking Turns :


    +   - Players take turns dropping one of their pieces into any of the seven columns
    on the grid .

    - The piece will fall to the lowest available space in the chosen column .


    # 4. Goal :


    +   - The goal is to be the first to connect four of your pieces in a row, either
    horizontally, vertically, or diagonally .


    # 5. Winning :


    +   - The game ends as soon as one player successfully connects four of their
    pieces in a row .

    - The winning player should announce their victory, and the game concludes .


    # 6. Draw :'
