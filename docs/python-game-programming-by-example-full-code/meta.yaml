    +   - Your goal is to shoot down the descending enemy ships (Space Invaders) while
    avoiding collisions with them.


    # 3. Player Movement :


    +   - Use the left and right arrow keys to move your player spaceship horizontally
    across the bottom of the screen.


    # 4. Shooting :


    +   - Press the spacebar to shoot bullets upward from your player spaceship.


    # 5. Enemy Ships :


    +   - Enemy ships will spawn at the top of the screen and move downward towards
    your player.

    - Your objective is to shoot down these enemy ships before they reach the bottom
    of the screen.


    # 6. Scoring :


    +   - You earn points for each enemy ship you successfully shoot down.

    - The score is displayed on the screen.


    # 7. Levels :'
