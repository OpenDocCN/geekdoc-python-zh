  md: '# 6. Game Over :


    +   - The game ends if an enemy collides with your player . In this case, the
    game over message will be displayed .

    - You can restart the game by pressing the ''R'' key after a game over . This
    clears the enemies, bullets, and resets the score .


    # 7. Pause :


    +   - You can pause the game by pressing the ''P'' key . The pause message will
    be displayed, and the game will be temporarily halted .

    - To resume, press the ''P'' key again .


    # 8. Tips :


    +   - Try to eliminate enemies efficiently to maximize your score .

    - Pay attention to the position of enemies and time your shots strategically .

