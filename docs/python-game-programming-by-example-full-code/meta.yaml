    \ Game\n\n## 1. GuessMaster: Number Adventure\n\n```python\nimport tkinter as\
    \ tk\nfrom tkinter import messagebox\nimport random\n\nclass NumberGuessingGame:\n\
    \    def __init__(self, master):\n        self.master = master\n        self.master.title(\"\
    Number Guessing Game\")\n\n        self.total_levels = 5\n        self.level =\
    \ 1\n        self.target_number = self.generate_target_number()\n        self.guesses_left\
    \ = 10\n        self.score = 0\n\n        self.label = tk.Label(\n           \
    \ master, text=\"Guess the number between 1 and 100:\")\n        self.label.pack(pady=10)\n\
    \n        self.entry = tk.Entry(master)\n        self.entry.pack(pady=10)\n\n\
    \        self.level_label = tk.Label(\n            master, text=f\"Level: {self.level}\"\
    , font=(\"Helvetica\", 16))\n        self.level_label.pack(pady=10)\n\n      \
    \  self.result_label = tk.Label(master, text=\"\")\n        self.result_label.pack(pady=10)\n\
    \n        self.submit_button = tk.Button(\n            master, text=\"Submit Guess\"\
    , command=self.check_guess)\n        self.submit_button.pack(pady=10)\n\n    \
    \    self.reset_button = tk.Button(\n            master, text=\"Play Again\",\
    \ command=self.reset_game)\n        self.reset_button.pack(pady=10)\n        self.reset_button.pack_forget()\n\
    \n        self.score_label = tk.Label(master, text=f\"Score: {self.score}\")\n\
    \        self.score_label.pack(pady=10)\n\n        self.start_level_message()\n\
    \n    def generate_target_number(self):\n        return random.randint(1, 10 *\
    \ self.level)\n\n    def start_level_message(self):\n        level_message = f\"\
    Welcome to Level {self.level}! The target number range is now 1 to {10 * self.level}.\"\
    \n        self.level_label.config(text=level_message)\n        # Display for 3\
    \ seconds\n        self.master.after(3000, self.clear_level_message)\n\n    def\
    \ clear_level_message(self):\n        self.entry.delete(0, tk.END)\n        self.entry.focus_set()\n\
    \n    def check_guess(self):\n        user_input = self.entry.get()\n\n      \
    \  if not user_input:\n            self.result_label.config(text=\"Please enter\
    \ a valid guess.\")\n            return\n\n        try:\n            user_guess\
    \ = int(user_input)\n        except ValueError:\n            self.result_label.config(text=\"\
    Please enter a valid integer.\")\n            return\n\n        if user_guess\
    \ == self.target_number:\n            self.result_label.config(\n            \
    \    text=f\"Congratulations! You guessed the correct number. Score: {self.calculate_score()}\"\
    \n            )\n            self.submit_button.config(state=tk.DISABLED)\n  \
    \          self.reset_button.pack(pady=10)\n\n            if self.level < self.total_levels:\n\
    \                # Display for 1 second before moving to the next level\n    \
    \            self.master.after(1000, self.next_level_message)\n            else:\n\
    \                self.show_performance_feedback()\n        else:\n           \
    \ self.guesses_left -= 1\n            if self.guesses_left == 0:\n           \
    \     self.result_label.config(\n                    text=f\"Sorry, you're out\
    \ of guesses. The correct number was {self.target_number}.\")\n              \
    \  self.submit_button.config(state=tk.DISABLED)\n                self.reset_button.pack(pady=10)\n\
    \                self.show_performance_feedback()\n            else:\n       \
    \         hint = \"Too low. Try again!\" if user_guess < self.target_number else\
    \ \"Too high. Try again!\"\n                self.result_label.config(\n      \
    \              text=f\"Incorrect! {hint} Guesses left: {self.guesses_left}\")\n\
    \                self.update_score_label()\n\n    def calculate_score(self):\n\
    \        score = self.guesses_left * 10 * self.level\n        self.score += score\n\
    \        self.update_score_label()\n        return self.score\n\n    def update_score_label(self):\n\
    \        self.score_label.config(text=f\"Score: {self.score}\")\n\n    def next_level_message(self):\n\
    \        self.level += 1\n        self.target_number = self.generate_target_number()\n\
    \        self.guesses_left = 10\n        self.submit_button.config(state=tk.NORMAL)\n\
    \        self.level_label.config(text=f\"Level: {self.level}\")\n        self.start_level_message()\n\
    \n    def show_performance_feedback(self):\n        feedback = f\"All levels completed!\
    \ Your total score is {self.score}.\"\n        messagebox.showinfo(\"Game Over\"\
    , feedback)\n\n    def reset_game(self):\n        self.level = 1\n        self.target_number\
    \ = self.generate_target_number()\n        self.guesses_left = 10\n        self.label.config(text=\"\
    Guess the number between 1 and 100:\")\n        self.result_label.config(text=\"\
    \")\n        self.submit_button.config(state=tk.NORMAL)\n        self.reset_button.pack_forget()\n\
    \        self.score = 0\n        self.update_score_label()\n        self.level_label.config(text=f\"\
    Level: {self.level}\")\n        self.start_level_message()\n\nif __name__ == \"\
    __main__\":\n    root = tk.Tk()\n    game = NumberGuessingGame(root)\n    root.mainloop()\n\
    ```\n\nThis Python script creates a simple number guessing game using the Tkinter\
    \ library for the graphical user interface (GUI). Let's break down the code step\
    \ by step:\n\n### Importing Libraries :\n\n- tkinter : This library is used for\
    \ creating GUI applications .\n- random : This library is used for generating\
    \ random numbers .\n\n### NumberGuessingGame Class :\n\nThis class represents\
    \ the main functionality of the game .\n\n### Constructor ( __init__ ):\n\n- Initializes\
    \ the game parameters such as total_levels , level , target_number , guesses_left\
    \ , and score .\n- Sets up the GUI elements including labels, entry fields, buttons,\
    \ etc .\n- Calls `start_level_message()` method to display a welcome message for\
    \ the first level.\n\n### **generate_target_number() Method:**\n\n- Generates\
    \ a random target number within a specific range based on the current level.\n\
    \n### **start_level_message() Method:**\n\n- Displays a welcome message for the\
    \ current level.\n- Clears the message after 3 seconds using `after()` method.\n\
    \n### **clear_level_message() Method:**\n\n- Clears the entry field after displaying\
    \ the level message.\n\n### **check_guess() Method:**\n\n- Checks the user's guess\
    \ against the target number.\n- Handles cases where the input is invalid, the\
    \ guess is correct, or the guess is incorrect.\n- Updates the GUI accordingly.\n\
    \n### **calculate_score() Method:**\n\n- Calculates the score based on the remaining\
    \ guesses and the current level.\n- Updates the total score and the score label.\n\
    \n### **update_score_label() Method:**\n\n- Updates the score label with the current\
    \ score."
