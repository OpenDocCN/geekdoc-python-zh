  md: '# 1. Objective :


    +   - The objective of the game is to **defend** your position against waves of
    incoming enemies .


    # 2. Controls :


    +   - Use the **left and right arrow keys** to move the player left and right
    across the bottom of the screen .

    - Press the **spacebar** to shoot bullets upward and destroy incoming enemies
    .


    # 3. Towers :


    +   - There is a tower element in the game, but its functionality is not fully
    implemented in the provided code . However, you can extend the code to include
    tower placement and use for additional **defense** .


    # 4. Gameplay :


    +   - Enemies will spawn randomly at the top of the screen and move downwards
    .

    - Your goal is to shoot bullets to destroy the enemies before they reach your
    position at the bottom of the screen .


    # 5. Scoring :


    +   - You earn points for each enemy you successfully eliminate with your bullets
    .

    - The score is displayed on the screen, and there is also a high score that represents
    your best performance in a single game .'
