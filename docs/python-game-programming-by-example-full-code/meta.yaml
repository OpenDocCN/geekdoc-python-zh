    Overall, this script provides a functional implementation of the 2048 game with\
    \ basic features and Pygame for handling graphics and user input. Players can\
    \ move tiles, merge them, achieve a winning condition, and restart the game.\n\
    \n## How To Play 2048 Game\n\nThe 2048 game is a single-player sliding puzzle\
    \ game where the goal is to combine matching tiles to reach the tile with a value\
    \ of 2048. The game is played on a 4x4 grid, and tiles with the same value can\
    \ be merged by moving them in a specific direction. Here's a detailed breakdown\
    \ of how to play the 2048 game based on the provided **Python Code**:\n\n### 1.\
    \ Game Initialization :\n\n- The game starts with an empty 4x4 grid.\n- Two tiles\
    \ with a value of either 2 or 4 are randomly placed on the grid.\n\n### 2. Controls\
    \ :\n\n- You can control the movement of tiles using the arrow keys on your keyboard.\n\
    - Press the **left arrow key** to move all tiles to the left.\n- Press the **right\
    \ arrow key** to move all tiles to the right.\n- Press the **up arrow key** to\
    \ move all tiles upwards.\n- Press the **down arrow key** to move all tiles downwards.\n\
    - Press the **R key** to restart the game at any time.\n\n### 3. Gameplay :\n\n\
    - Tiles with the same value can be merged into a single tile by moving them towards\
    \ each other.\n- When you make a move, a new tile with a value of 2 or 4 will\
    \ appear in an empty spot.\n- The goal is to keep merging tiles to create larger\
    \ values and reach the tile with a value of 2048.\n- The game continues until\
    \ you either reach the 2048 tile (winning the game) or the grid is full with no\
    \ more moves possible (losing the game).\n\n### 4. Scoring :\n\n- Your score is\
    \ based on the values of the tiles you merge.\n- Each time two tiles are merged,\
    \ the value of the resulting tile is added to your score.\n\n### 5. Special Features\
    \ :\n\n- The game includes a winning condition where reaching the 2048 tile displays\
    \ a victory screen.\n- There is an undo feature (press the **U key**) that allows\
    \ you to undo your last move. However, it has limitations and can't be used **indefinitely**.\n\
    - The game tracks and displays your current score and the highest score achieved\
    \ in the session.\n\n### 6. Game Over :\n\n- The game ends when you reach the\
    \ 2048 tile, displaying a victory screen.\n- If the grid is full and no more moves\
    \ are possible, the game ends, and a game over screen is displayed.\n- You can\
    \ restart the game at any time by pressing the **R key**.\n\n### 7. High Score\
    \ :\n\n- The game keeps track of the highest score achieved during the session.\n\
    \n### 8. Additional Details :\n\n- The grid and tiles are displayed using the\
    \ Pygame library, and the game provides a graphical interface.\n\nOverall, the\
    \ 2048 game involves strategic thinking, planning your moves, and aiming to create\
    \ the largest possible tiles to achieve the highest score. It's a simple yet challenging\
    \ puzzle game that requires both skill and a bit of luck.\n\n## 10. BlackJack\
