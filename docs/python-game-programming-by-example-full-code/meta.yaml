    +   - The game continues until you either reach the 2048 tile ( winning the game
    ) or the grid is full with no more moves possible ( losing the game ).


    # 4. Scoring :


    +   - Your score is based on the values of the tiles you merge .

    - Each time two tiles are merged, the value of the resulting tile is added to
    your score .


    # 5. Special Features :


    +   - The game includes a winning condition where reaching the 2048 tile displays
    a victory screen .

    - There is an undo feature ( press the **U key** ) that allows you to undo your
