    \    self.player_label.grid(row=6, columnspan=7)\n\n        self.score_label =\
    \ tk.Label(\n            self.window, text=f\"Scores: {self.scores[0]} - {self.scores[1]}\"\
    )\n        self.score_label.grid(row=7, columnspan=7)\n\n        restart_button\
