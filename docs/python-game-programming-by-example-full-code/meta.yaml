    - The game tracks and displays your current score and the highest score achieved
    in the session .


    # 6. Game Over :


    +   - The game ends when you reach the 2048 tile, displaying a victory screen
    .

    - If the grid is full and no more moves are possible, the game ends, and a game
    over screen is displayed .

    - You can restart the game at any time by pressing the **R key** .'
