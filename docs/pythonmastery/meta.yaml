    \ book in self.books:\n            if book['available']:\n                print(f\"\
    {book['title']} by {book['author']}\")\n\n    def checkout_book(self, title):\n\
    \        \"\"\"Check out a book from the library.\"\"\"\n        for book in self.books:\n\
    \            if book['title'] == title and book['available']:\n              \
