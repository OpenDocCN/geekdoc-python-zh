    \"\"A function to greet a person with an optional message.\"\"\"\n    print(f\"\
    Hello, {name}! {message}\")\n\n# Calling the function with and without a custom\
    \ message\ngreet_with_message(\"Bob\")\ngreet_with_message(\"Alice\", \"Good morning!\"\
    )\n```\n\nIn this example, the `greet_with_message` function has a default value\
    \ for the `message` parameter, allowing flexibility in greeting messages.\n\n\
    ## Crafting Modular and Reusable Code\n\nCreating modular and reusable code is\
    \ an art that involves thoughtful design and adherence to best practices. Let's\
    \ explore strategies for crafting functions that enhance code modularity.\n\n\
    ### Choosing Descriptive Function Names\n\nSelecting clear and descriptive names\
    \ for your functions is essential for code readability. A well-named function\
    \ communicates its purpose and makes the code more understandable.\n\n```python\n\
    # Functions and Modularity: Descriptive Function Names\ndef calculate_area_of_rectangle(length,\
    \ width):\n    \"\"\"A function to calculate the area of a rectangle.\"\"\"\n\
    \    area = length * width\n    return area\n\n# Calling the function\nrectangle_area\
    \ = calculate_area_of_rectangle(8, 5)\nprint(f\"Area of the rectangle: {rectangle_area}\"\
    )\n```\n\nHere, the function name `calculate_area_of_rectangle` clearly conveys\
    \ its purpose.\n\n### Using Docstrings for Documentation\n\nDocstrings are triple-quoted\
    \ strings used to provide documentation for functions. Including docstrings enhances\
    \ code documentation and makes it easier for others (or yourself) to understand\
    \ the purpose and usage of functions.\n\n```python\n# Functions and Modularity:\
    \ Using Docstrings for Documentation\ndef calculate_area_of_circle(radius):\n\
    \    \"\"\"\n    A function to calculate the area of a circle.\n\n    Parameters:\n\
    \    - radius (float): The radius of the circle.\n\n    Returns:\n    float: The\
    \ area of the circle.\n    \"\"\"\n    area = 3.14 * radius ** 2\n    return area\n\
    \n# Calling the function\ncircle_area = calculate_area_of_circle(4)\nprint(f\"\
    Area of the circle: {circle_area}\")\n```\n\nIn this example, the docstring provides\
    \ information about the function's parameters and return value.\n\n### Avoiding\
    \ Global Variables When Possible\n\nWhile global variables can be convenient,\
    \ minimizing their use is generally recommended to enhance code modularity. Functions\
    \ that rely solely on parameters and return values are more predictable and easier\
    \ to test.\n\n```python\n# Functions and Modularity: Avoiding Global Variables\n\
    global_variable = 5\n\ndef multiply_by_global(value):\n    \"\"\"A function to\
    \ multiply a value by a global variable.\"\"\"\n    return value * global_variable\n\
    \n# Calling the function\nresult = multiply_by_global(10)\nprint(f\"Result: {result}\"\
    )\n```\n\nIn this example, the `multiply_by_global` function relies on a global\
    \ variable. While this works, it's often preferable to pass such values as parameters.\n\
    \n### Leveraging Function Composition\n\nFunction composition involves combining\
    \ multiple functions to create more complex functionality. This approach allows\
    \ you to build on existing functions and create a modular structure.\n\n```python\n\
