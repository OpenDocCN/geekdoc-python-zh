- md: "## Chapter 13: Leveling Up with Object-Oriented Programming\n\nWelcome to the\
    \ world of Object-Oriented Programming (OOP), a paradigm that transforms code\
    \ into modular, reusable, and organized structures. In this chapter, we'll embark\
    \ on a journey to understand the fundamental concepts of OOP in Python. Whether\
    \ you're new to programming or looking to enhance your skills, this chapter will\
    \ guide you through the principles of classes, objects, inheritance, encapsulation,\
    \ and polymorphism in easy-to-understand English.\n\n### Understanding the Basics\
    \ of Object-Oriented Programming\n\nObject-Oriented Programming is a programming\
    \ paradigm centered around the concept of \"objects.\" An object is a self-contained\
    \ unit that combines data and the operations that can be performed on that data.\
    \ At the core of OOP are four key principles: encapsulation, abstraction, inheritance,\
    \ and polymorphism.\n\n### Classes and Objects\n\n#### Classes: Blueprints of\
    \ Objects\n\nA class is a blueprint for creating objects. It defines a data structure\
    \ along with the methods that operate on that data. Think of a class as a template\
    \ that describes the common characteristics and behaviors that objects of the\
    \ class will exhibit.\n\n```python\n# Object-Oriented Programming: Class Example\n\
    \nclass Dog:\n    def __init__(self, name, age):\n        self.name = name\n \
    \       self.age = age\n\n    def bark(self):\n        print(\"Woof!\")\n\n# Creating\
    \ an instance of the Dog class\nmy_dog = Dog(name=\"Buddy\", age=3)\n\n# Accessing\
    \ attributes and calling methods\nprint(f\"My dog's name is {my_dog.name}.\")\n\
    print(f\"My dog is {my_dog.age} years old.\")\nmy_dog.bark()\n```\n\nIn this example,\
    \ the `Dog` class has attributes (`name` and `age`) and a method (`bark`). The\
    \ `__init__` method is a special method used for initializing the object.\n\n\
    #### Objects: Instances of Classes\n\nAn object is an instance of a class. It\
    \ is a concrete realization of the concepts defined in the class. You can create\
    \ multiple objects from a single class, each with its own unique state.\n\n```python\n\
    # Object-Oriented Programming: Creating Multiple Objects\ndog1 = Dog(name=\"Max\"\
    , age=2)\ndog2 = Dog(name=\"Lucy\", age=4)\n\n# Accessing attributes and calling\
    \ methods for each object\nprint(f\"{dog1.name} is {dog1.age} years old.\")\n\
    dog1.bark()\n\nprint(f\"{dog2.name} is {dog2.age} years old.\")\ndog2.bark()\n\
    ```\n\nHere, `dog1` and `dog2` are distinct objects created from the `Dog` class,\
    \ each with its own set of attributes.\n\n### Encapsulation and Abstraction\n\n\
    #### Encapsulation: Bundling Data and Methods\n\nEncapsulation refers to the bundling\
    \ of data (attributes) and methods that operate on the data within a single unit\
    \ (a class). It allows you to hide the implementation details and expose only\
    \ what is necessary.\n\n```python\n# Object-Oriented Programming: Encapsulation\n\
    \nclass Car:\n    def __init__(self, make, model, year):\n        self.make =\
    \ make\n        self.model = model\n        self.year = year\n        self.__mileage\
    \ = 0  # Private attribute\n\n    def drive(self, miles):\n        print(f\"Driving\
    \ {miles} miles.\")\n        self.__mileage += miles\n\n    def get_mileage(self):\n\
    \        return self.__mileage\n\n# Creating an instance of the Car class\nmy_car\
    \ = Car(make=\"Toyota\", model=\"Camry\", year=2022)\n\n# Accessing attributes\
    \ and calling methods\nmy_car.drive(50)\nprint(f\"My car's mileage: {my_car.get_mileage()}\
    \ miles.\")\n```\n\nIn this example, the `Car` class encapsulates attributes (`make`,\
    \ `model`, `year`, and `__mileage`) and methods (`drive` and `get_mileage`). The\
    \ `__mileage` attribute is marked as private using a double underscore, indicating\
    \ that it should not be accessed directly from outside the class.\n\n#### Abstraction:\
    \ Simplifying Complex Systems\n\nAbstraction involves simplifying complex systems\
    \ by modeling classes based on essential properties and behaviors. It allows you\
    \ to focus on the essential aspects while hiding the unnecessary details.\n\n\
    ```python\n# Object-Oriented Programming: Abstraction\nclass BankAccount:\n  \
    \  def __init__(self, account_holder, balance=0):\n        self.account_holder\
    \ = account_holder\n        self.balance = balance\n\n    def deposit(self, amount):\n\
    \        print(f\"Depositing ${amount}.\")\n        self.balance += amount\n\n\
    \    def withdraw(self, amount):\n        if amount <= self.balance:\n       \
    \     print(f\"Withdrawing ${amount}.\")\n            self.balance -= amount\n\
    \        else:\n            print(\"Insufficient funds.\")\n\n    def get_balance(self):\n\
    \        return self.balance\n\n# Creating an instance of the BankAccount class\n\
    my_account = BankAccount(account_holder=\"John Doe\")\n\n# Accessing attributes\
    \ and calling methods\nmy_account.deposit(1000)\nmy_account.withdraw(500)\nprint(f\"\
    My account balance: ${my_account.get_balance()}\")\n```\n\nIn this example, the\
    \ `BankAccount` class abstracts the essential features of a bank account, providing\
    \ methods for deposit, withdrawal, and checking the balance.\n\n### Inheritance:\
    \ Building on Existing Classes\n\nInheritance is a powerful concept in OOP that\
    \ allows a new class (subclass or derived class) to inherit attributes and methods\
    \ from an existing class (base class or parent class). This promotes code reuse\
    \ and facilitates the creation of specialized classes.\n\n```python\n# Object-Oriented\
    \ Programming: Inheritance\n\nclass Animal:\n    def __init__(self, name):\n \
    \       self.name = name\n\n    def speak(self):\n        pass # Abstract method\n\
    \nclass Dog(Animal):\n    def speak(self):\n        return \"Woof!\"\n\nclass\
    \ Cat(Animal):\n```\n\nIn this enhanced version, the function checks if the title\
    \ tag exists in the HTML structure before attempting to extract its text. If the\
    \ title tag is not found, a `ValueError` is raised with a specific error message\
    \ related to HTML parsing.\n\n### Incorporating Retry Logic\n\nNetwork-related\
    \ errors, such as temporary connection issues, can occur during web scraping.\
    \ To enhance the robustness of the function, let's incorporate a simple retry\
    \ mechanism.\n\n```python\n# Exception Handling: Incorporating Retry Logic in\
    \ Web Scraping\nimport requests\nfrom bs4 import BeautifulSoup\nfrom requests.exceptions\
    \ import RequestException\n\ndef scrape_website_with_retry(url, max_retries=3):\n\
    \    for attempt in range(1, max_retries + 1):\n        try:\n            # Make\
    \ a request to the website\n            response = requests.get(url)\n       \
    \     response.raise_for_status() # Raise an exception for HTTP errors\n     \
    \       # Parse the HTML content\n            soup = BeautifulSoup(response.text,\
    \ 'html.parser')\n            # Extract information from the HTML\n          \
    \  title_tag = soup.title\n            if title_tag:\n                title =\
    \ title_tag.text\n                print(f\"Website Title: {title}\")\n       \
    \     else:\n                raise ValueError(\"Title tag not found in HTML structure.\"\
    )\n            # If successful, break out of the loop\n            break\n   \
    \     except RequestException as re:\n            # Handle network-related errors\n\
    \            print(f\"Network Error (Attempt {attempt}): {re}\")\n        except\
    \ ValueError as ve:\n            # Handle specific error related to HTML structure\n\
    \            print(f\"HTML Parsing Error: {ve}\")\n            # Break the loop\
    \ if a specific error occurs\n            break\n        except Exception as e:\n\
    \            # Handle other unexpected errors\n            print(f\"An unexpected\
    \ error occurred: {e}\")\n        finally:\n            # Cleanup: Close the response\
    \ object\n            if 'response' in locals() and response:\n              \
    \  response.close()\n\n# Example Usage (Continued)\nscrape_website_with_retry(\"\
    https://www.example.com\")\n```\n\nIn this version, the `scrape_website_with_retry`\
    \ function attempts to scrape the website multiple times (defaulting to three\
    \ attempts) in case of network-related errors. The loop breaks when a successful\
    \ scraping occurs or when a specific error related to HTML parsing is encountered.\n\
    \n### Conclusion\n\nCongratulations! You've now explored the intricacies of exception\
    \ handling in Python and applied these concepts to a real-world scenario involving\
    \ web scraping. By understanding the types of errors, implementing basic and advanced\
    \ exception handling strategies, and incorporating these techniques into practical\
    \ coding scenarios, you've gained valuable insights into building robust and resilient\
    \ Python programs."
  mdcn: "## 第13章：通过面向对象编程提升技能\n\n欢迎来到面向对象编程（OOP）的世界，这是一种将代码转化为模块化、可重用且组织有序结构的范式。在本章中，我们将踏上理解Python中OOP基本概念的旅程。无论你是编程新手还是希望提升技能，本章都将用易于理解的语言，引导你掌握类、对象、继承、封装和多态等原则。\n\
    \n### 理解面向对象编程的基础\n\n面向对象编程是一种以“对象”概念为中心的编程范式。对象是一个独立的单元，它将数据以及可以对该数据执行的操作结合在一起。OOP的核心是四个关键原则：封装、抽象、继承和多态。\n\
    \n### 类和对象\n\n#### 类：对象的蓝图\n\n类是创建对象的蓝图。它定义了一个数据结构以及操作该数据的方法。可以将类视为一个模板，它描述了该类对象将表现出的共同特征和行为。\n\
    \n```python\n# 面向对象编程：类示例\n\nclass Dog:\n    def __init__(self, name, age):\n\
    \        self.name = name\n        self.age = age\n\n    def bark(self):\n   \
    \     print(\"Woof!\")\n\n# 创建 Dog 类的一个实例\nmy_dog = Dog(name=\"Buddy\", age=3)\n\
    \n# 访问属性并调用方法\nprint(f\"My dog's name is {my_dog.name}.\")\nprint(f\"My dog is\
    \ {my_dog.age} years old.\")\nmy_dog.bark()\n```\n\n在这个例子中，`Dog` 类有属性（`name` 和\
    \ `age`）和一个方法（`bark`）。`__init__` 方法是一个特殊的方法，用于初始化对象。\n\n#### 对象：类的实例\n\n对象是类的一个实例。它是类中定义概念的具体实现。你可以从一个类创建多个对象，每个对象都有自己独特的状态。\n\
    \n```python\n# 面向对象编程：创建多个对象\ndog1 = Dog(name=\"Max\", age=2)\ndog2 = Dog(name=\"\
    Lucy\", age=4)\n\n# 访问每个对象的属性并调用方法\nprint(f\"{dog1.name} is {dog1.age} years old.\"\
    )\ndog1.bark()\n\nprint(f\"{dog2.name} is {dog2.age} years old.\")\ndog2.bark()\n\
    ```\n\n这里，`dog1` 和 `dog2` 是从 `Dog` 类创建的两个不同的对象，每个对象都有自己的一组属性。\n\n### 封装和抽象\n\n\
    #### 封装：捆绑数据和方法\n\n封装是指将数据（属性）和操作数据的方法捆绑在一个单元（一个类）中。它允许你隐藏实现细节，只暴露必要的部分。\n\n```python\n\
    # 面向对象编程：封装\n\nclass Car:\n    def __init__(self, make, model, year):\n      \
    \  self.make = make\n        self.model = model\n        self.year = year\n  \
    \      self.__mileage = 0  # 私有属性\n\n    def drive(self, miles):\n        print(f\"\
    Driving {miles} miles.\")\n        self.__mileage += miles\n\n    def get_mileage(self):\n\
    \        return self.__mileage\n\n# 创建 Car 类的一个实例\nmy_car = Car(make=\"Toyota\"\
    , model=\"Camry\", year=2022)\n\n# 访问属性并调用方法\nmy_car.drive(50)\nprint(f\"My car's\
    \ mileage: {my_car.get_mileage()} miles.\")\n```\n\n在这个例子中，`Car` 类封装了属性（`make`、`model`、`year`\
    \ 和 `__mileage`）和方法（`drive` 和 `get_mileage`）。`__mileage` 属性使用双下划线标记为私有，表示不应从类外部直接访问。\n\
    \n#### 抽象：简化复杂系统\n\n抽象涉及通过基于本质属性和行为对类进行建模来简化复杂系统。它允许你专注于本质方面，同时隐藏不必要的细节。\n\n```python\n\
    # 面向对象编程：抽象\nclass BankAccount:\n    def __init__(self, account_holder, balance=0):\n\
    \        self.account_holder = account_holder\n        self.balance = balance\n\
    \n    def deposit(self, amount):\n        print(f\"Depositing ${amount}.\")\n\
    \        self.balance += amount\n\n    def withdraw(self, amount):\n        if\
    \ amount <= self.balance:\n            print(f\"Withdrawing ${amount}.\")\n  \
    \          self.balance -= amount\n        else:\n            print(\"Insufficient\
    \ funds.\")\n\n    def get_balance(self):\n        return self.balance\n\n# 创建\
    \ BankAccount 类的一个实例\nmy_account = BankAccount(account_holder=\"John Doe\")\n\n\
    # 访问属性并调用方法\nmy_account.deposit(1000)\nmy_account.withdraw(500)\nprint(f\"My account\
    \ balance: ${my_account.get_balance()}\")\n```\n\n在这个例子中，`BankAccount` 类抽象了银行账户的基本特征，提供了存款、取款和查询余额的方法。\n\
    \n### 继承：基于现有类构建\n\n继承是OOP中的一个强大概念，它允许一个新类（子类或派生类）从现有类（基类或父类）继承属性和方法。这促进了代码重用，并便于创建专门化的类。\n\
    \n```python\n# 面向对象编程：继承\n\nclass Animal:\n    def __init__(self, name):\n   \
    \     self.name = name\n\n    def speak(self):\n        pass # 抽象方法\n\nclass Dog(Animal):\n\
    \    def speak(self):\n        return \"Woof!\"\n\nclass Cat(Animal):\n```\n\n\
    在这个增强版本中，函数在尝试提取标题标签的文本之前，会检查HTML结构中是否存在标题标签。如果未找到标题标签，则会引发一个与HTML解析相关的特定错误消息的\
    \ `ValueError`。\n\n### 加入重试逻辑\n\n网络相关错误，例如临时连接问题，在网页抓取过程中可能发生。为了增强函数的健壮性，让我们加入一个简单的重试机制。\n\
    \n```python\n# 异常处理：在网页抓取中加入重试逻辑\nimport requests\nfrom bs4 import BeautifulSoup\n\
    from requests.exceptions import RequestException\n\ndef scrape_website_with_retry(url,\
    \ max_retries=3):\n    for attempt in range(1, max_retries + 1):\n        try:\n\
    \            # 向网站发起请求\n            response = requests.get(url)\n           \
    \ response.raise_for_status() # 为HTTP错误引发异常\n            # 解析HTML内容\n        \
    \    soup = BeautifulSoup(response.text, 'html.parser')\n            # 从HTML中提取信息\n\
    \            title_tag = soup.title\n            if title_tag:\n             \
    \   title = title_tag.text\n                print(f\"Website Title: {title}\"\
    )\n            else:\n                raise ValueError(\"Title tag not found in\
    \ HTML structure.\")\n            # 如果成功，跳出循环\n            break\n        except\
    \ RequestException as re:\n            # 处理网络相关错误\n            print(f\"Network\
    \ Error (Attempt {attempt}): {re}\")\n        except ValueError as ve:\n     \
    \       # 处理与HTML结构相关的特定错误\n            print(f\"HTML Parsing Error: {ve}\")\n\
    \            # 如果发生特定错误，跳出循环\n            break\n        except Exception as e:\n\
    \            # 处理其他意外错误\n            print(f\"An unexpected error occurred: {e}\"\
