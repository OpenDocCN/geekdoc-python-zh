    \n# 尝试在函数外部访问 'square' 变量（将导致错误）\n# print(square)\n```\n\n在这个例子中，`square` 变量是\
    \ `calculate_square` 函数的局部变量，无法在其外部访问。\n\n### 全局变量和修改值\n\n在任何函数外部定义的变量被认为是全局变量，可以在函数内部访问。但是，从函数内部修改全局变量需要使用\
