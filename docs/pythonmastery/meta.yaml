    # File Handling: Reading from a Text File\nfile_path = \"sample.txt\"\n\n# Open\
    \ the file in read mode\nwith open(file_path, \"r\") as file:\n    # Read the\
    \ entire contents of the file\n    content = file.read()\n    print(content)\n\
    ```\n\nIn this example, the `open()` function opens the file specified by `file_path`\
