  md: "Reading from a text file involves opening the file, reading its contents, and\
    \ closing it. Python's `open()` function is used for this purpose.\n\n```\npython\n\
    # File Handling: Reading from a Text File\nfile_path = \"sample.txt\"\n\n# Open\
    \ the file in read mode\nwith open(file_path, \"r\") as file:\n    # Read the\
    \ entire contents of the file\n    content = file.read()\n    print(content)\n\
    ```\n\nIn this example, the `open()` function opens the file specified by `file_path`\
    \ in read mode (`\"r\"`), and the `with` statement ensures that the file is properly\
    \ closed after reading its contents.\n\n# #### Reading Line by Line"
  merge: -1
