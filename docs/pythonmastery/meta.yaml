    \ to remove newline characters\n```\n\nHere, the `for` loop iterates over each\
    \ line in the file, and the `strip()` method removes newline characters for cleaner\
    \ output.\n\n### Writing to a File\n\n#### Writing Text Files\n\nWriting to a\
