    \ content to the file.\n\n```python\n# File Handling: Writing to a Text File\n\
    file_path = \"output.txt\"\n\n# Open the file in write mode\nwith open(file_path,\
    \ \"w\") as file:\n    # Write content to the file\n    file.write(\"Hello, World!\\\
    n\")\n    file.write(\"Python is amazing.\")\n```\n\nIn this example, the `open()`\
    \ function opens the file specified by `file_path` in write mode (`\"w\"`), and\
    \ the `write()` method adds content to the file. Note the use of the newline character\
    \ (`\"\\n\"`) to separate lines.\n\n#### Appending to a File\n\nIf you want to\
