  md: "To read a file line by line, you can use a loop or the `readline()` method.\n\
    \n```\npython\n# File Handling: Reading Lines from a Text File\nfile_path = \"\
    sample.txt\"\n\n# Open the file in read mode\nwith open(file_path, \"r\") as file:\n\
    \    # Read lines one by one\n    for line in file:\n        print(line.strip())\
