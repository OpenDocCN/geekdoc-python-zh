  mdcn: '为了直观感受 `ORDER BY` 的强大，不妨想象这样一种愿望：沿着文学史的编年脉络，从最初的书写文字开始，一路漫游至当代创作。这样的叙事之旅，只需通过以下语句便能轻松实现：


