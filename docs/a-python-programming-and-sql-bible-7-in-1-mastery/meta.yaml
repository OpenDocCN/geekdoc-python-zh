  mdcn: "WITH RecursiveCTE AS (\n    SELECT sale_date, sale_amount, sale_amount AS\
    \ smoothed_value\n    FROM daily_sales\n    WHERE sale_date = (SELECT MIN(sale_date)\
    \ FROM daily_sales)\n\n    UNION ALL\n\n    SELECT\n        ds.sale_date,\n  \
    \      ds.sale_amount,\n        (0.2 * ds.sale_amount) + (0.8 * rcte.smoothed_value)\n\
    \    FROM daily_sales ds\n    JOIN RecursiveCTE rcte ON ds.sale_date = rcte.sale_date\
    \ + INTERVAL 1 DAY\n)\n\nSELECT sale_date, smoothed_value\nFROM RecursiveCTE\n\
    ORDER BY sale_date;\n\n然而，一位敏锐的分析师会认识到其工具的边界。虽然SQL是预测分析中的强大盟友，但理解其最擅长的领域至关重要。SQL在数据预处理方面无与伦比，并提供了一系列从基础到中级的预测技术。然而，对于更复杂的任务，更广阔的分析世界正以其专业工具和平台招手，所有这些都等待着与SQL协同工作。\n\
    \n在技术领域不断拓宽的视野中，SQL不仅作为一种工具出现，更是一位可靠的伙伴。通过掌握其预测技术，你不仅巩固了自己作为观察者的地位，更成为了一位开拓者。预测分析不仅仅是对未来的窥探；它是对过去的拥抱、对现在的理解，以及对未来的飞跃。凭借SQL及其预测能力，你已做好充分准备，迎接这一飞跃。\n\
    \n## 评估与改进你的预测模型\n\n在预测分析的领域中航行，尤其是在快节奏的技术世界里，需要的不仅仅是原始数据或令人印象深刻的算法。它关乎理解你预测的表现，基于可靠的指标来优化模型，并确保你提供真正的价值。正如你可能已经感觉到的，这段旅程既有艺术性也有科学性，而SQL则是你的指南针和向导。\n\
    \n```sql\nSELECT\n    SUM(CASE WHEN predicted = 1 AND actual = 1 THEN 1 ELSE 0\
    \ END) * 1.0 /\n    SUM(CASE WHEN predicted = 1 THEN 1 ELSE 0 END) AS Precision\n\
    FROM loan_predictions;\n```\n\n大多数进入分析领域的人首先接触到的概念是准确率。准确率无疑至关重要。但在许多现实场景中，它可能只是触及了真正重要问题的表面。以一家希望预测贷款违约的银行为例。高准确率听起来很有希望，直到你意识到模型可能仍然遗漏了那些导致重大财务损失的关键少数案例。这就是为什么精确率或召回率等替代指标变得至关重要。好消息是？SQL虽然传统上被视为数据处理工具，但也提供了深入研究这些指标的方法。例如，可以从预测和实际贷款违约的表格中推导出精确率：\n\
    \n但指标只是等式的一部分。有一种较少被提及但非常有效的方法来理解模型的性能：残差分析。简单来说，残差是模型预测值与实际发生值之间的差异。持续均匀分布的残差意味着模型与数据和谐一致。另一方面，如果这些残差显示出明显的模式，则可能表明模型遗漏了某些内在的数据模式。SQL可以有效地用于计算这些差异，并将其呈现出来以供进一步可视化：\n\
    \n```sql\nSELECT actual_value, predicted_value, (actual_value - predicted_value)\
    \ AS residual\nFROM predictions_table;\n```\n\n然而，仅评估一次模型可能还不够。这引出了交叉验证的概念，这是一种通过在多个数据集上测试模型来增强模型评估的技术。可以将其视为评估一名运动员在整个赛季中的表现，而不仅仅是一场比赛。每一轮，模型都从不同的数据子集中学习，确保其稳健性。SQL结合策略性脚本，可以促进这种迭代验证所需的数据分割。\n\
    \n然而，知道缺点并不是终点。这是一个信号，表明需要进入模型优化的领域，而SQL在这里证明了其无价的价值。例如，如果残差显示在某些时间段存在持续的预测偏低，那么可能是时候在数据中引入新的特征了。一个未能考虑假日销售高峰的零售模型可能需要一个新的数据集标记：\n\
    \n```sql\nALTER TABLE sales_data\nADD COLUMN is_holiday BOOLEAN DEFAULT FALSE;\n\
    ```\n\n```sql\nUPDATE sales_data\nSET is_holiday = TRUE\nWHERE sale_date IN ('2023-12-25',\
    \ '2023-11-28', ...);\n```\n\n增强模型也可能涉及融合来自不同来源的数据。一个房产定价模型可以从当地设施或学校质量的数据中受益。SQL强大的JOIN操作可以无缝地合并这些数据集，为预测提供更丰富的背景。\n\
    \n现在，抛开所有这些技术细节，让我们来探讨问题的核心：为什么这一切都很重要？在数据和技术的浩瀚宇宙中，其本质不仅在于指标或模型。它关乎你提供的价值，无论是帮助企业预测趋势，赋能医疗专业人员预测患者结果，还是以无数其他方式提供帮助。预测分析的本质在于塑造有影响力的、数据驱动的决策。\n\
    \n技术领域不断变化。在这种演变中，感到担忧或过时是很自然的。然而，拥有像SQL这样的工具以及对模型评估和优化的清晰理解，你不仅仅是在生存；你正在蓬勃发展。这段与预测分析和SQL的旅程不仅仅关乎保持相关性。它关乎塑造卓越的遗产。每一次评估、每一次重新校准、每一次改进的预测，都是远见力量的证明。以SQL为可信赖的盟友，你不仅成为一名观察者，更成为预测分析宏大叙事中的远见卓识的领导者。\n\
    \n当我们通过SQL的视角结束对预测分析的探索时，让我们回顾一下我们的旅程。我们从基础开始，理解了预测分析真正包含什么。我们强调了向前看的重要性，而不仅仅是回顾过去或现在，同时也强调了SQL在这个领域中被低估的能力。在此基础上，我们深入探讨了SQL提供的具体技术，超越了基础查询，进入了预测函数和方法论的领域。\n\
    \n评估和优化模型不仅作为一个重要的技术过程脱颖而出，更是一种哲学上的必然。任何预测的目标都是尽可能接近现实，而持续的评估确保我们保持在这条道路上。每一次迭代，每一次调整，我们都更接近预测准确性的顶峰，确保模型不仅仅存在于理论真空中，而是与现实世界场景产生共鸣。\n\
    \n然而，超越技术、代码和方法论，是预测分析的核心本质：影响力。编写的每一行SQL代码、评估的每一个模型、做出的每一次预测，都蕴含着改变企业、优化资源和塑造决策的潜力。作为这门艺术的实践者，你的角色超越了编码员或分析师的范畴。你是一位预见者、一位战略家，引导利益相关者穿越不确定性的迷雾。\n\
    \n拥抱这段与SQL同行的预测分析之旅，将其视为一个持续的过程，一场永无止境的追求卓越的探索。技术领域将继续演变，新的工具和技术将不断涌现。但基础保持不变：数据、洞察力和远见。只要你将这些原则铭记于心，以SQL为坚定的伙伴，你不仅免于过时，更将在充满活力的预测分析世界中，踏上通往卓越的轨迹。\n\
    \n# 第五册：数据科学用Python\n\n## 第一章：驾驭数据景观\n\n踏上数据科学的旅程，犹如扬帆起航，驶向我们世界浩瀚的海洋。这里有无尽的地平线等待探索，未知的深度等待潜入，以及无数的挑战等待克服。正如每片海洋都有其洋流、潮汐和导航地标，数据景观也有其自身的复杂性、趋势和指引。在这个快速演变的技术时代，数据已成为创新的基石，驱动着从医疗保健到金融等各行各业的决策。然而，对许多人来说，在这个动态领域中对过时的恐惧，或对角色转变的不确定性，给他们的航程蒙上了阴影。\n\
    \n第一章：驾驭数据景观旨在成为你值得信赖的指南针，引导你穿越数据科学的广阔领域。我们首先理解Python在数据科学中不可或缺的作用，这门语言在这个领域中是多功能性和强大能力的代名词。深入探索，我们将揭开数据处理的复杂面纱——这是一个基础阶段，原始数据在此被转化为可操作的洞察。最后，我们通过设置你的Python数据环境来奠定基础，确保你拥有合适的工具和设置以获得最佳性能。\n\
    \n本章不仅仅是工具或技术的介绍。它是对准备、理解和正确环境重要性的证明。正如任何经验丰富的水手都会证实的那样，这不仅仅关乎知道目的地，更关乎了解水域、解读风向，以及拥有一艘既坚固又灵活的船只。\n\
    \n### Python在数据科学中的作用"
