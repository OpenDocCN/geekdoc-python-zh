  mdcn: "## Python 内置函数\n\nPython 以其卓越的性能，提供了大量工具和实用程序来简化你的编码之旅。其中最强大的工具之一便是内置函数。想象一座庞大的图书馆，书架上摆满了精心编写的书籍，每一本都代表一个独特的函数。作为读者，你可以即时获取丰富的知识和工具，而最妙的是？它们都是现成的礼物，随时可用。\n\
