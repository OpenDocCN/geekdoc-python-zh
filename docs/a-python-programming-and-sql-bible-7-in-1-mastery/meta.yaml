    # Handling NULL Values


    In data''s vast landscape, the gaps—the missing pieces and unfinished stories—often
    hold as much weight as the visible elements. In SQL, these silences go by the
    name of NULL. These absent figures represent a whisper in the data chatter. While
    they may not scream for attention, understanding and adeptly handling these NULL
    values is often the key to sculpting meaningful narratives from our databases.'
  - '[PAGE 85]


    The term NULL in SQL is a placeholder for the unknown. It''s neither zero nor
    an empty string. Think about an online retailer''s customer database. When a customer
    chooses not to provide a phone number, the database doesn''t slap a zero or leave
    an empty slot. Instead, it labels it as NULL. This differentiation is subtle but
    substantial. A zero could mean an intentional blank by the customer, while an
    empty string might hint at a system glitch. NULL cuts through these assumptions,
    signifying the data isn''t there.


    For those at the crossroads of understanding this concept, let''s dive deeper.
    Identifying NULL values is your first step, achieved via the IS NULL and IS NOT
    NULL conditions in SQL. Revisiting our retailer example, imagine the marketing
    crew wishes to figure out the number of customers who''ve kept their phone numbers
    a mystery. An SQL query effortlessly brings this data out of the shadows:


    ```

    SELECT COUNT(*) FROM customers WHERE phone_number IS NULL;

    ```


    Simple as it appears, this query isn''t just about counting. It can be a compass
    pointing towards business strategy realignments. Could it be that the website''s
    phone number entry design is clunky? Or perhaps there''s a trust deficit, with
    customers reluctant to share their number.


    Now, once these NULL entities are in your grasp, decision time looms: how do you
    handle them? At times, replacing them with a default or computed value might be
    apt, using tools like the COALESCE function or the CASE statement.


    ```

    UPDATE customers SET reward_points = COALESCE(reward_points, 0);

    ```


    Take, for instance, the retailer''s rewards system. If points are based on purchases,
    and some customers, possibly the non-buyers, have a NULL in the points column,
    ambiguity ensues. A more transparent approach would be to replace these NULLs
    with zeros, indicating no purchases and thus, no points:


    Such tweaks in the data might seem minor, but they streamline analysis. They ensure
    that promotional emails don''t mistakenly land in a non-buyer''s inbox, or worse,
    a loyal customer isn''t overlooked for an exclusive offer.'
  - '[PAGE 86]


    NULL values, however, have their quirks. For instance, any mathematical or string
    operation involving NULL begets another NULL. So if our retailer tried computing
    average sales and even a single price entry was NULL, the entire operation could
    be jeopardized. Luckily, functions like COALESCE or NULLIF can counter such mishaps:


    ```

    SELECT AVG(COALESCE(price, 0)) FROM sales;

    ```


    Here''s another twist. Directly comparing two NULLs in SQL doesn''t yield a ''true''.
    It''s because if you think about it, NULL stands for the unknown. So, if two entities
    are mysteries, who''s to say they''re identical? Especially when searching for
    duplicate entries in databases, NULLs demand special attention and care.

    To wind up our journey into the world of NULL, let''s appreciate its intricate
    dance between presence and absence. Those on the path to mastering SQL, or pivoting
    into a data science role, will undoubtedly find themselves decoding these NULL
