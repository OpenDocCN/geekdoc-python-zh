- img_proc: true
  md: "Beyond basic aggregates, SQL boasts other techniques designed to illuminate\
    \ the path ahead. Among these is the moving average technique. It's a method that,\
    \ in its essence, aids forecasting by reducing noise. Imagine a business that\
    \ assesses weekly sales data, aiming to discern future demands. SQL can be used\
    \ to compute a moving average over a chosen period, say four weeks, offering a\
    \ harmonized view of sales tendencies.\n\n```\nWITH WeeklySales AS (\n    SELECT\
    \ DATE_TRUNC('week', sale_date) AS SaleWeek, SUM(sale_amount) AS TotalSales\n\
    \    FROM sales\n    GROUP BY DATE_TRUNC('week', sale_date)\n)\n\nSELECT a.SaleWeek,\
    \ AVG(b.TotalSales) AS FourWeekMovingAverage\nFROM WeeklySales a\nJOIN WeeklySales\
    \ b ON a.SaleWeek BETWEEN b.SaleWeek - INTERVAL 3 WEEK AND b.SaleWeek\nGROUP BY\
    \ a.SaleWeek\nORDER BY a.SaleWeek;\n```\n\nSQL, however, doesn't halt at averages.\
    \ It ventures further into the predictive domain with techniques like linear regression.\
    \ Now, while SQL might not traditionally be synonymous with statistical modeling,\
    \ it can effectively compute regressions. For instance, a real estate firm could\
    \ be keen to predict house prices based on specific features. Using SQL, you can\
    \ unearth the relationship between variables such as size and price, forming a\
    \ foundation upon which predictions can be laid."
  merge: -1
  pgno: 172
- img_proc: true
  md: "```\nWITH RegressionData AS (\n  SELECT\n    AVG(size_sqft) AS avg_size,\n\
    \    AVG(price) AS avg_price,\n    SUM(size_sqft * price) AS sum_xy,\n    SUM(size_sqft\
    \ * size_sqft) AS sum_x2\n  FROM real_estate\n)\n\nSELECT\n  (sum_xy - (count(*)\
    \ * avg_size * avg_price)) / (sum_x2 - (count(*) * avg_size * avg_size)) AS slope\n\
    FROM RegressionData;\n```\n\nAnother gem in SQL's predictive toolkit is exponential\
    \ smoothing, tailor-made for time series forecasting. The principle here is to\
    \ place more emphasis on recent observations. By doing so, predictions remain\
    \ sensitive to new shifts, ensuring you're not just relying on ancient data. Imagine\
    \ a retailer keen on predicting future sales patterns. Through SQL, they can employ\
    \ exponential smoothing, accounting for the undulating nature of sales over time."
  merge: -1
  pgno: 173
- img_proc: true
  md: "```\nWITH RecursiveCTE AS (\n    SELECT sale_date, sale_amount, sale_amount\
    \ AS smoothed_value\n    FROM daily_sales\n    WHERE sale_date = (SELECT MIN(sale_date)\
    \ FROM daily_sales)\n\n    UNION ALL\n\n    SELECT\n        ds.sale_date,\n  \
    \      ds.sale_amount,\n        (0.2 * ds.sale_amount) + (0.8 * rcte.smoothed_value)\n\
    \    FROM daily_sales ds\n    JOIN RecursiveCTE rcte ON ds.sale_date = rcte.sale_date\
    \ + INTERVAL 1 DAY\n)\n\nSELECT sale_date, smoothed_value\nFROM RecursiveCTE\n\
    ORDER BY sale_date;\n```"
