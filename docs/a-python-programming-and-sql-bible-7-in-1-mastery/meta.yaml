    \    FROM daily_sales\n    WHERE sale_date = (SELECT MIN(sale_date) FROM daily_sales)\n\
    \n    UNION ALL\n\n    SELECT\n        ds.sale_date,\n        ds.sale_amount,\n\
    \        (0.2 * ds.sale_amount) + (0.8 * rcte.smoothed_value)\n    FROM daily_sales\
    \ ds\n    JOIN RecursiveCTE rcte ON ds.sale_date = rcte.sale_date + INTERVAL 1\
