- img_proc: true
  md: 'Switching between Seaborn''s default darkgrid theme and something like whitegrid
    can drastically alter the narrative of your visualization. While darkgrid might
    be reminiscent of a timeless room with soft lighting, emphasizing every trend
    in your data, whitegrid provides a minimalist, modern art gallery feel. This stark
    contrast guides the viewer''s focus differently in each setting. With just a few
    lines of code, your data visualization can wear an entirely new attire.


    ```

    import seaborn as sns

    import matplotlib.pyplot as plt

    ```


    ```

    # Switching the ambiance with a line

    sns.set_style("darkgrid")

    tips = sns.load_dataset("tips")

    sns.histplot(tips[''total_bill''])

    plt.show()

    ```'
