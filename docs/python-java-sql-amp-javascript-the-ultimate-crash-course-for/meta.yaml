    # Chapter 5: Generic Programming


    # The Need for Generics


    Before generics were introduced in Java 5, collections like ArrayList, LinkedList,
    HashMap, etc., were raw types with no type safety. This posed significant issues
    and limitations which generics aimed to resolve.


    # Lack of Type Safety


    Non-generic collections allowed adding any object without restrictions. This compromised
    type of safety in several ways:


    # Unexpected object types:


    Consider an ArrayList declared as ArrayList list = new ArrayList();. It could
    contain Strings, Integers, or any object. Retrieving an element would not guarantee
    its actual runtime type:


    ```

    list.add("Hello");

    list.add(1);

    Object obj = list.get(0); // obj could be String or Integer

    ```


    This made the code error-prone as operations on retrieved objects assumed types
    that may not match.


    # ClassCastExceptions:


    When retrieving elements and casting:


    ```

    list.add("Hello");

    String str = (String) list.get(0);

    // Throws ClassCastException

    ```


    The cast would fail as the element type differs from what was expected. This resulted
    in runtime errors that generics help prevent.


    # Incorrect usage:


    Developers could inadvertently add incompatible types since the compiler did not
    enforce constraints:


    ```

    class Employee {

    ```'
