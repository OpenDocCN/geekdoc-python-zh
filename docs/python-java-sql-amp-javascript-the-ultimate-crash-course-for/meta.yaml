    ```

    public String name;

    public int id;

    }

    ArrayList list = new ArrayList();

    list.add("Hello");

    list.add(new Employee());

    // Compiler allows but risks issues

    ```


    Such mistakes reduced reliability and increased debugging efforts.


    # Maintenance Issues


    The absence of type information at the collection object level made the code complex
    and hard to understand:


    +   - It was not obvious what could be stored in a collection just by looking
    at its declaration.

    - Related methods operating on the collection''s elements assumed incompatible
    types.

    - Collection APIs were difficult to document as element types varied per usage
    instead of being fixed.

    - Changes to the type of elements added required thorough testing across all code
    interacting with that collection.

    - Refactoring was challenging as element types behaved dynamically instead of
    being static.


    # Compile-time Type Checking


    Since the actual element types were only known at runtime, compilers could not
    validate type safety. Bugs remained hidden and only surfaced after running code:


    +   - Incompatible types could be added or retrieved without compiler warnings.

    - Methods declared to receive or return element types did not enforce correctness.

    - Contracts specifying element types were effectively suggestions without guarantees.


    This delayed errors, reduced code quality, and increased debugging efforts compared
    to compile-time checks in generics.'
