    ```


    ## Output:


    ```

    [[5, 123, 4], 56, 32, 14]

    ```


    You can call the elements in the child list using the ''list[][]'' format.


    ## Program Code:


    ```

    x = [[5,123,4],56,32,14]

    print(x[0][1])

    ```


    ## Output:


    ```

    123

    ```


    In the previous example, the second element of the nested list is 123, which is
