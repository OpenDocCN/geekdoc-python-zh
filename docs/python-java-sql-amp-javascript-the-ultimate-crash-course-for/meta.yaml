    \ offer information about the document as a whole. Apart from that, this model\
    \ offers a variety of methods that can be used to set or receive document property\
    \ values. These methods are offered for your convenience.\n\n## Example\n\nWith\
    \ HTML DOM, we are able to discover any HTML element included inside any HTML\
    \ page. For instance, if a web page has a form element, we may refer to it using\
    \ JavaScript as a `document.forms[0]` if the element is present in the document.\
    \ In the event that your website document has two form elements, the first form\
