    ## Tuples


    Even though lists are popular data structures that Python programmers frequently
    use in their applications, they have several implementation issues. Because all
    lists created with Python are mutual objects, they are simple to replace, delete,
    or manipulate.

    As a software developer, you may be required to keep immutable lists that cannot
    be altered in any way. That''s why tuples exist. Within Tuples, it is not possible
    to change initiated elements in any way. When you try to change the content of
    a tuple, you will get a "Type Error" message.


    ## Program Code:


    ```

    # Let''s create a tuple using Python

    t = (''Cat'', ''Tree'', ''Apple'')

    print(t)

    ```


    ## Output:


    ```

    (''Cat'', ''Tree'', ''Apple'')

    ```


    In the previous example, we simply initiated a tuple and used a print function
    to display it on the screen. Tuples, unlike lists, are not represented with square
    brackets, but rather with parenthesis to distinguish them from lists.

    To understand how tuples work, try changing one of the elements in the preceding
    example and printing the tuple to see what happens.


    ## Program Code:


    ```

    t = (''Cat'', ''Tree'', ''Apple'')

    print(t)


    # Trying to replace an element in the tuple...

    t[2] = ''Mango''

    print(t)

    ```


    ## Output:


    ```

    (''Cat'', ''Tree'', ''Apple'')

    TypeError: ''tuple'' object does not support item assignment

    ```


    In the previous example, if a tuple element is changed, the interpreter will throw
    an error. This demonstrates that all tuple elements are immutable and cannot be
    replaced, deleted, or added.


    ## Tuples Concatenation


    Tuples, like the many list operations we''ve seen, can be used to work on specific
    operations. For example, just like lists, you can use Python to add or multiply
    the elements in a tuple.


    ## Program Code:


    ```

    tuple1 = (17,18,19)

    tuple2 = (16,19,28)

    # Adding two tuples

    print(tuple1 + tuple2)

    ```


    ## Output:


    ```

    (17, 18, 19, 16, 19, 28)

    ```


    The Addition operator is used to concatenate two tuples in the preceding example.
    Similarly, you can use the multiplication operator to quickly increase the elements
    in your tuple. We can also nest tuples within tuples. This is commonly referred
    to as nesting tuples.


    ## Program Code:


    ```

    X = (1,2,3)

    Y = (''Orange'',''Apple'',''Banana'')

    Z = (X,Y)

    print(Z)

    ```


    ## Output:


    ```

    ((1, 2, 3), (''Orange'', ''Apple'', ''Banana''))

    ```


    Two tuples are nested within another tuple in the previous example.


