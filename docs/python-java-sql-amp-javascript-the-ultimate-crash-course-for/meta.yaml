    # PATCH version


    This number is increased whenever problems are addressed or modest modifications
    are made to the package that does not impact the API. PATCH versions are available
    for download from the project''s GitHub repository. This indicates that the code
    functional with the earlier package version should also continue to function with
    the updated version. A patch could consist of, for instance, correcting a misspelt
    word in the documentation or bringing an existing dependency up to date.


    SemVer permits the inclusion of pre-release versions and builds information to
    the version number, in addition to the standard three-part format for the version
    number. Pre-release versions are indicated by adding a hyphen and a string, such
    as 1.0.0-alpha.1, and signify that the version has not yet reached a stable state
    or may still be subject to modifications. Build metadata is indicated by inserting
    a plus sign and a string, such as 1.0.0+build.1, and is used to identify the particular
    build or commit from which the version was created. For example, 1.0.0+build.1
    is an example of build metadata.


    Developers have a much simpler time managing dependencies when they adhere to
    the SemVer standard, which also helps them verify that their code is compatible
