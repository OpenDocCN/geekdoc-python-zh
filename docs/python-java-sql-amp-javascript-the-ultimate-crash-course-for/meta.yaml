    values value1, value2, and value3 relate to the values you want to put into the
    respective columns, indicating them. Those values may be found in the respective
    columns.


    Syntax:

    INSERT INTO table_name (column1, column2, column3, ...)

    VALUES (value1, value2, value3, ...);'
