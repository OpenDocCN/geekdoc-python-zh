    ```


    When you run the above program, only the print statement is executed, just like
    single-line comments.


    ### Why Are Multiline Comments Important?


    Multiline comments are frequently used by programmers to define license details
    or to explain comprehensive information about various packages and methods with
    various implementation examples. The code can be effectively understood by the
    programmers who are reading it.


    ## Reserved Keywords


    Reserved keywords are programming language default keywords that programmers cannot
    use as identifiers while writing code. Identifiers are commonly used to name variables,
    classes, and functions.

    The interpreter will throw an error if you use a reserved keyword in your program.
    For example, using ''for'' for one of your variables will not work because ''for''
    is typically used in Python programming to define a specific type of loop structure.

    There are 33 reserved keywords that you are not permitted to use in your programs.
    As a Python programmer, it is critical to avoid making unnecessary mistakes when
    working on complex projects.


    ## Exercise:


    Using the Python terminal, try to find the reserved keywords in Python to become
    familiar with the Python commands we discussed previously.


    ## Operators in Python


    In mathematics, operators are first used to form mathematical expressions. The
    first programmers used these operators and the basic programming components to
    easily assign and manipulate values. Operators are commonly used by computer programmers
    to combine literals and form statements or expressions.


    ### Example:


    2x + 3z = 34


    Here, 2x, 3z, and 34 are literals, and + and = are operators that are applied
    to these literals to form an expression. Operators can be combined with any number
    of literal values to form complex expressions that can aid programmers in the
    implementation of difficult algorithms.


    ### Example:


    ```

    a = 18

    b = 20

    print(a + b)

    ```


    ### Output:


    ```

    38

    ```


    a and b are the operands, whereas = and + are operators that are used.


    ### Different Types of Operators


    Different types of operators can be used by programmers to implement various types
    of programming logic. The most commonly used operators are arithmetic operators,
    which assist programmers in applying mathematical logic to various literals, such
    as variables, in their code. The arithmetic operators that a Python programmer
    needs to know to write better programming structures are addition, subtraction,
    multiplication, and'
