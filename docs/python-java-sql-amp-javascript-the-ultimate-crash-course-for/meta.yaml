    Unlike ‘undefined,’ which indicates that a variable or property has not been assigned
    a value, ‘null’ is a value that is deliberately assigned to represent the absence
    of an object or value. It can be used to indicate that a variable or property
    is intentionally devoid of any meaningful data.

    When working with null, it''s important to handle it appropriately in your code.
    If you encounter a variable or property with a value of null, you can check for
