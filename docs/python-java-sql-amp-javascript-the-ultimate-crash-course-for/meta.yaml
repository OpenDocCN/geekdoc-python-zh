- md: '## Value errors


    These errors occur when you pass arguments to a function that doesn’t accept those
    data types. A value error can cause your application to crash unexpectedly. Uploading
    a pdf file when only image files are permitted is an example of an exception trigger.


    ## Import error


    These errors occur when you are unable to import a module directly into your program.
    They are typically caused by a network connection failure or issues with online
    package managers. Example of an Exception Trigger: You are unable to sync your
    data on your private cloud accounts due to an import error.


    ## OS error


    You may occasionally encounter issues because the software is incompatible with
    your operating system version. These errors frequently occur because the system
    kernel does not understand what the application is saying. These errors are fairly
    common when using Linux distributions. Example of an Exception Trigger: The application
    crashes because the host is running an unsupported version of an operating system.


    ## Type error


    This error typically occurs when a user or developer enters a value for a data
    type that the application does not yet support.


    ## Name error


    When a variable or function that has not yet been defined in the program is called,
    this error occurs.


    ## Index error


    Index errors typically occur when you provide an index that is greater than the
    list you have created.


    ## Chapter 12: Advanced Programming


    Many third-party Python frameworks provide specific functionalities to programmers.
    It''s sufficient to import the base libraries. That''s why Python''s popularity
    has skyrocketed. Libraries are great for developers to create real-world applications
    that ordinary users can use. You should be aware of certain commonly used Python
    libraries to write valid complex code without having to start from scratch.


    The source codes for the majority of these libraries will be available for exploration
    on websites such as GitHub or Bitbucket.


    ## Pip Package Manager


    All operating systems make applications available to their users. Python isn''t
    an operating system, but rather a software interpreter. Any software that is not
    written in Python can''t run using a Python interpreter because the Python interpreter
    does not understand the source code used by that software.


    There are thousands of paid and free Python software downloads available from
    many sources. A simple Google search for Python software for the domain you are
    interested in can provide thousands of results. To install this software on your
    own, you will need at least a basic understanding of executable files.


    Python offers package managers to download package files into your operating system
    to be immediately executed. In this way, you can easily install the software you
    need. While there are many third-party Python package managers, the default pip
    is the most common and every Python programmer should be familiar with it.


    ### Why Using Pip


    - New packages and dependencies can be installed.

    - There is an index that lists all Python package repositories that are available
    on pip servers.

    - Before installing the software, use it to go over the requirements.

    - Remove all packages and dependencies that you no longer use.


    First, check if pip is installed on your system. Pip is usually included with
    Python.


    ### Terminal Code:


    ```

    $ pip --version

    ```


    If it prints out the pip version information details, your system has the package
    manager installed. If not, you may need to manually download and install it from
    the official website.


    ### How to Install Packages?


    To install packages, you should always use the syntax format shown below.


    ```

    $ pip install name_of_the_software

    ```


    For example, if you want to install the "Seaborn" package, the syntax is the following:


    ```

    $ pip install seaborn

    ```


    To check the information associated with the content before installing, use the
    command below:


    ```

    $ pip show seaborn

    ```


    This terminal code will return a lot of metadata information, including the Author,
    Package name and location.


    Use the code syntax format below to uninstall any package installed on your system
    using the pip package manager.


    Syntax:


    ```

    $ pip uninstall nameofthepackage

    ```


    For example, to uninstall the Seaborn package you previously installed, use the
    command below:


    ```

    $ pip uninstall seaborn

    ```


    You can also search for a package using the code format shown below.


    ```

    $ pip search name_of_the_package

    ```


    This will show you all packages from the package index for you to examine and
    select from.


    ## Virtual Environment


    Typically, when you install a package, you are also installing many dependencies.
    These dependencies may occasionally overlap with other software, causing the package
    to fail to install. To help developers in creating independent projects, the ''virtualenv''
    package can be used to create an isolated virtual environment. First, use the
    pip package manager to install the ''virtualenv'' package.


    ### Installation command:


    ```

    $ pip install virtualenv

    ```


    Once the package is installed, you can use the below command to create a new directory
    using a virtual machine.


    ```

    $ virtualenv mydir

    ```


    All the packages, files, and software you install will be saved in this new directory,
    without interfering with any system dependencies or packages. To begin, run the
    following command to activate the virtual machine.


    ### Terminal Command:


    ```

    $ source mydir/bin/activate

    ```


    After you''ve installed all of your packages, deactivate this virtual environment
    with the following command:


    ### Terminal Command:


    ```

    (mydir) $ deactivate

    ```


    ## The sys Module


    To master Python it''s crucial to understand how a Python interpreter works. An
    interpreter typically parses every variable, method or literal in the code before
    executing a logically written program and checking for syntax, type, and index
    errors. It is important to examine how an interpreter works and stores information
    required for the use of specific software. The Sys module in Python makes it simple
    for developers to check this information.


    ```

    import sys

    ```


    ### path


    This sys library argument will tell you the default path of the Python interpreter
    installed on your system:


    ```

    print(sys.path)

    ```


    ### argv


    This method will return a list of all the existing modules in the system:


    ```

    print(sys.argv)

    ```


    ### copyright


    This method will show the user the copyright information for the Python interpreter
    or software:


    ```

    print(sys.copyright)

    ```


    ### getrefcount


    This method shows how frequently a program uses a variable or object:


    ```

    print(sys.getrefcount(myvariable))

    ```


    ## Unit Testing


    Before developing, a programmer must ensure that the program follows all Python''s
    guidelines. Even if the logic in your programs is correct, it may cause problems
    in the future due to practical issues. These bottleneck situations should be avoided
    to provide a better user experience. Python allows and encourages programmers
    to check their code using unit testing frameworks. The framework ''unittest''
    is installed by default to force programmers to create testing conditions from
    scratch for their programs.


    ### How Do Unit Tests Work?


    You may become overwhelmed when testing their code because the Python documentation
    does not provide a specific set of rules for conducting unit tests. However, experienced
    programmers always emphasize that it is best to start testing code for methods
    first and then expand to other programming components. Using this methodology,
    you can test any part of the software. The tested code can be easily shared with
    other developers. Furthermore, eventual build and runtime errors during this process
    will be shared with your team. You can group tests and call them collections,
    and then manually organize them to keep these tests up to date.'
