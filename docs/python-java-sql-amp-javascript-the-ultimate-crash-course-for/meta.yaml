- md: "A while loop repeats as long as a condition remains true:\nwhile (condition)\
    \ {  // code block  }\nIt's useful when the number of iterations is unknown:\n\
    \n```\nint i = 0;\nwhile (i < input) {\n    i++;\n}\n```\n\nHere, we don't know\
    \ the input, so a for loop can't be used, but it allows repeating until the condition\
    \ is met.\n\n## do-while Loop\n\nSimilar to while, but the block is guaranteed\
