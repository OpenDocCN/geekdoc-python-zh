    \ can contain any type that extends a Number like Integer or extends it like BigDecimal.\
    \ Calling methods on each element is type-safe since it is treated as a Number.\n\
    \n## Lower Bounded Wildcards\n\nThe <? super T> sets a lower bound, specifying\
    \ argument types that are supertypes of T:\n\n```java\npublic void copy(List<?\
    \ super Number> dest, List<Number> src){\n    dest.addAll(src);\n}\n```\n\nHere,\
    \ dest allows container types like List<? super Number> (ex: List<Object>) since\
    \ objects assignment compatible with supertypes is allowed.\n\nBounded wildcards\
    \ are useful when the specific element types are unknown while ensuring certain\
    \ guaranteed operations. This increases flexibility compared to rigid-type parameters.\n\
    \n## Wildcards in Generics\n\nWildcards help make generics more powerful and flexible\
    \ by enabling support for unknown type parameters. They allow writing highly reusable\
    \ generic code that can work with a variety of type arguments.\n\n## Wildcard\
    \ Types\n\nA wildcard type is denoted using the '?' symbol. It represents an unknown\
    \ type that is either read-only or write-only.\nFor example, a List with a wildcard\
    \ type of '?' could hold elements of any unknown type:\n\n```java\nList<?> list\
    \ = new ArrayList<>();\n```\n\nThis list can be passed around, but we cannot add\
    \ to it since the element type is unknown. It allows only reading/consuming values\
    \ generically.\n\n## Bounded Wildcards\n\nWildcards can be bounded to specify\
    \ the unknown type is a subtype or supertype of a known type:\nList<? extends\
    \ Number> - Unknown type that must extend Number\nList<? super Integer> - Unknown\
    \ supertype of Integer\nBounding provides context on allowable operations. For\
    \ the first, only get() works assuming Number. The second allows add() of Integers.\n\
    \n## Using Wildcards\n\nWildcards help design highly reusable methods that accept\
    \ arguments with unknown type parameters:\n\n```java\npublic void process(List<?>\
    \ list) {\n    for(Object o : list)\n        // do something\n}\n```\n\nThis processes\
    \ any list generically without restrictions on element types. They are also useful\
    \ in collection APIs like addAll() that need to abstract over varying element\
    \ types.\n\n## Compatibility\n\nWildcards enhance flexibility and compatibility\
    \ in generics. For example, a copy method can accept lists with matching but unknown\
    \ element types:\n\n```java\npublic static <E> void copy(List<? extends E> from,\n\
    \    List<? super E> to) {\n    to.addAll(from);\n}\n```\n\nWithout wildcards,\
    \ this method would only work for lists with the exact same concrete type arguments.\n\
    \n## Type Inference\n\nThe Java compiler automatically infers the appropriate\
    \ wildcard types based on context. For example:\n\n```java\nList<String> strings\
    \ = new ArrayList<>();\nList<Object> objects = strings;\n```\n\nHere, objects\
    \ is inferred as List<? extends String> as only reading is allowed from it. While\
    \ wildcards increase flexibility, they also restrict certain operations since\
    \ the actual type is unknown. Methods cannot generally return wildcard parameterized\
    \ types.\n\n# Chapter 6: Functional Programming in Java\n\n## An Introduction\
    \ to Lambda Expressions\n\n### What are Lambda Expressions?\n\nLambda expressions\
    \ were introduced in Java 8 to support functional programming features in Java.\
    \ Lambda expressions allow treating functionality as a method argument or code\
    \ as data. They enable the implementation of functional interfaces more concisely\
    \ without anonymous classes. A lambda expression is a non-named method that can\
    \ be passed around and used without ever being declared or named. It removes a\
    \ lot of syntactic noise involved in using interfaces and anonymous inner classes\
    \ as callback definitions.\n\n### Lambda Syntax\n\nLambda expressions use the\
    \ -> operator to separate the parameter list from the body of the expression.\
    \ This is known as the lambda operator or arrow operator.\nThe general syntax\
    \ of a lambda expression is:\n(parameter types) -> { body }\nFor example, a lambda\
    \ that takes an integer as a parameter and returns its square is:\n(int x) ->\
    \ { return x * x; }\nIf the body contains a single statement, return is optional,\
    \ and braces {} are not required.\n(int x) -> x * x\n\n### Type Inference\n\n\
    Lambda expressions don't require the lambda parameter types and return types to\
    \ be defined explicitly. Java compiler performs type inference to determine types\
    \ from context.\nFor example, in the following code, the compiler infers that\
    \ the parameter is an Integer and the result is an Integer:\n\n```java\nx -> x\
    \ * x\n```\n\n### Functional Interfaces\n\nLambda expressions were introduced\
    \ mainly to provide small, anonymous inline implementations for functional interfaces.\
    \ A functional interface is an interface that contains only one abstract method.\n\
    \nExamples of functional interfaces in Java are:\n\n- Predicate<T> - evaluates\
    \ a condition for objects of T type\n- Consumer<T> - performs an action on objects\
    \ of T type\n- Function<T, R> - maps input of type T to output of type R\n\nPrior\
    \ to Java 8, functional interfaces had to be implemented using anonymous classes\
    \ like:\n\n```java\nnew Predicate<String>() {\n    public boolean test(String\
    \ s) {\n        return s.length() > 0;\n    }\n}\n```\n\nNow, with lambda expressions,\
    \ they can be implemented much more succinctly as:\n\n```java\ns -> s.length()\
    \ > 0\n```\n\n### Method References\n\nIn addition to lambda expressions, Java\
    \ 8 also supports method references to refer to existing methods without rewriting\
    \ the method implementation. A method reference is a constant reference to a method\
    \ that is being passed around like a lambda expression.\n\nFor example, a method\
    \ reference to an existing isEmpty() method is:\n\n```java\nString::isEmpty\n\
    ```\n\nThis is semantically equivalent to:\n\n```java\n(String s) -> s.isEmpty()\n\
    ```\n\nBut reads better in a context like collections operations:\n\n```java\n\
    list.removeIf(String::isEmpty)\n```\n\n### Multiple Lambda parameters\n\nLambdas\
    \ can have multiple parameters separated by commas:\n\n```java\n(int x, int y)\
    \ -> x + y\n```\n\n### Capturing outer scope variables\n\nLambdas can capture\
    \ and use local variables from the enclosing scope:\n\n```java\nint multiplier\
    \ = 10;\nlist.forEach(x -> System.out.println(x * multiplier));\n```\n\nHere,\
    \ the multiplier is effectively final, so it doesn't cause problematic side effects.\n\
    \n### Generic type inference\n\nJust like generic methods, lambdas also support\
    \ generic type inference:\n\n```java\nlistOfStrings.forEach(string -> {\n    List<Character>\
    \ chars = new ArrayList<>();\n    for(char c : string.toCharArray())\n       \
    \ chars.add(c); });\n```\n\nHere, the generic type of List in chars is inferred\
    \ from the type of string in the loop.\n\n### Method overloading resolution\n\n\
    When a lambda is passed as a method argument, Java resolves the overload based\
    \ on the target signature matching the functional interface signature.\nFor example,\
    \ in Collections.sort(), the comparator is a functional interface, so lambda is\
    \ inferred appropriately.\n\n### Applications of Lambda Expressions\n\nSome common\
    \ uses of lambda expressions are:\n\n- As callback handler in Swing/FX event listeners\n\
    - Processing streams sequentially\n- Implementing simple Runnable or callable\
    \ tasks for threading\n- Sorting/Searching collections using comparator lambdas\n\
    - Database querying using predicate lambdas\n\nLambda expressions make Java code\
    \ more functional and concise by treating code as data. They have reduced the\
    \ verbosity in functional interface usage and enabled new functional capabilities\
    \ in existing class libraries.\n\n## Streams: Processing Collections More Elegantly\n\
    \n### What are Streams?"
