    Comparison and logical operators have final operator precedence.


    # Augmented Assignment Operators


    Augmented assignment operators provide a shorthand way to update the value of
    a variable based on its current value. These operators combine an arithmetic or
    bitwise operation with an assignment operation. They can make your code more concise
    and potentially easier to read.

    Here''s a list of common augmented assignment operators and their equivalent long-form
    operations:


    | Augmented Assignment Operator | Equivalent Long-Form Operation | Description
    |

    | :--- | :--- | :--- |

    | a += b | a = a + b | Addition |

    | a -= b | a = a - b | Subtraction |

    | a *= b | a = a * b | Multiplication |

    | a /= b | a = a / b | Division |

    | a %= b | a = a % b | Modulus |

    | a //= b | a = a // b | Floor Division |

    | a **= b | a = a ** b | Exponentiation |

    | a &= b | a = a & b | Bitwise AND |

    | a |= b | a = a | b | Bitwise OR |


    # Example:


    ```

    # Using += for incrementing a value

    count = 10

    count += 5 # This is the same as count = count + 5

    print(count) # Output: 15


    # Using *= for squaring a value

    num = 6

    num *= num # This is the same as num = num * num

    print(num) # Output: 36

    ```


