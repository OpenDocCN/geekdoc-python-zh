    ## 7. Bitwise Operators


    Bitwise operators are advanced operators that developers frequently use to perform
    special features such as compression, encryption, and error detection.


    Bitwise operators of various types are used in all high-level programming languages.


    - AND (&)

    - OR (|)

    - XOR (^)

    - NOT (~)


    All these bitwise operators follow the same principles as logical operators in
    mathematics.


    ## Operator Precedence


    Because there are different operators and mathematical expressions are formed
    by combining them, dealing with advanced mathematical expressions to create real-world
    applications can quickly become complex. Operator precedence provides programmers
    with clear objectives for prioritizing which operators perform a mathematical
    operation.


    If a developer fails to follow operator precedence rules, the values may change
    completely, resulting in application crashes.


    ### Operator Precedence Rules in Python:


    In any mathematical expression you deal with in Python, precedence takes precedence.
    As a result, if operators are enclosed by parenthesis, the interpreter will address
    them first and then move on to the others.


    Bitwise operators are usually given second precedence.


    The mathematical operators used for multiplication and division are given the
    highest priority. The operators that must be preferred in the same order are *,
    /, %, and //.


    The remaining arithmetic operations, such as addition and subtraction, take precedence.
    These operators are represented by the symbols + and -.


    Comparison and logical operators have final operator precedence.


    ## Augmented Assignment Operators


    Augmented assignment operators provide a shorthand way to update the value of
    a variable based on its current value. These operators combine an arithmetic or
    bitwise operation with an assignment operation. They can make your code more concise
    and potentially easier to read.


    Here''s a list of common augmented assignment operators and their equivalent long-form
    operations:


    | Augmented Assignment Operator | Equivalent Long-Form Operation | Description
    |

    | :--- | :--- | :--- |

    | a += b | a = a + b | Addition |

    | a -= b | a = a - b | Subtraction |

    | a *= b | a = a * b | Multiplication |

    | a /= b | a = a / b | Division |

    | a %= b | a = a % b | Modulus |

    | a //= b | a = a // b | Floor Division |

    | a **= b | a = a ** b | Exponentiation |

    | a &= b | a = a & b | Bitwise AND |

    | a |= b | a = a | b | Bitwise OR |


    ### Example:


    ```

    # Using += for incrementing a value

    count = 10

    count += 5 # This is the same as count = count + 5

    print(count) # Output: 15


    # Using *= for squaring a value

    num = 6

    num *= num # This is the same as num = num * num

    print(num) # Output: 36

    ```


