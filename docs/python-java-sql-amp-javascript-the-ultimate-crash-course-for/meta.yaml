- md: 'It applies the function to every element of the stream.

    For example, to extract the first name from Person objects:

    List<Person> people = ... people.stream().map(person -> person.getFirstName())

    This maps each Person to their first name property value and returns a Stream
    of Strings containing first names.

    The mapping function must be non-interfering - producing results based only on
    its input argument without side effects.


    ## Understanding the Map Operation in Java Streams


    In the world of Java Streams, the map operation plays a pivotal role, enabling
    developers to transform data seamlessly. At its core, the map operation allows
    for the application of a function to each element in the stream, producing a new
    stream that holds the transformed elements.

    One of the intriguing characteristics of the map operation is its lazy execution.
    This means that when the map method is invoked on a stream, the actual computation
    doesn''t happen immediately. Instead, the mapping function waits in a dormant
    state and is only activated when a terminal operation is called on the stream.
    This behavior ensures efficient resource usage, only carrying out computations
    when the results are genuinely needed.

    Another key aspect of the map operation is its flexibility concerning the type
    of output stream. The type of elements in the resulting stream is determined by
    the return type of the mapping function. This flexibility means that the map operation
    can not only alter the value of elements but can also change their type. For example,
    a stream of strings can be transformed into a stream of integers based on some
    conversion logic.

    In practical scenarios, the map operation finds a plethora of applications. One
    common use case is the extraction of specific properties from objects. Suppose
    you have a stream of Person objects, and you''re interested only in their names.
    Using the map operation, you can extract just the names, resulting in a stream
    of strings. Another frequent application is the transformation of one type to
    another. This could involve converting a stream of numbers into their string representations
    or vice versa. Furthermore, the map operation is instrumental in formatting or
    modifying elements. This might involve adjusting the format of date strings, capitalizing
    words, or any other form of data transformation.


    ## FlatMap Operation


    The flatMap operation differs from the map in that it further flattens the elements
    of the outer stream by mapping them to inner streams and then concatenating all
    inner streams.


    For example, to extract all course titles from a list of Student objects:


    ```

    List<Student> students = ... students.stream() .flatMap(s -> s.getCourses().stream())
    .map(Course::getTitle)

    ```


    Here, each Student is mapped to a Stream of Courses. These inner streams are then
    flattened to a single stream of Courses, which is further mapped to titles.


    FlatMap is useful when elements need to be transformed into multiple elements
    or traverse hierarchical/nested structures like trees.


    ## FlatMap Operation in Java Streams


    In Java Streams, the flatMap operation stands out as a specialized and versatile
    tool tailored for handling nested or multi-level data structures. While the map
    operation is geared towards applying transformations to individual elements, flatMap
    delves deeper, unraveling and streamlining nested structures into a single unified
    stream.


    A prominent characteristic of flatMap is its ability to flatten nested streams.
    When faced with a stream whose elements are themselves streams or collections,
    using flatMap can consolidate these into one continuous stream. This ability to
    transform a Stream<Stream<T>> or a Stream<List<T>> into a Stream<T> is particularly
    useful in scenarios where the data is inherently hierarchical or multi-layered.


    Another essential property of flatMap is its applicability in situations where
    a single input element can map to multiple output values. Instead of producing
    a nested structure, flatMap ensures that the output remains as a single, cohesive
    stream. This behavior ensures that subsequent operations on the stream can proceed
    without the need to navigate layers of nesting.


    Just like the map operation, the type of elements in the resulting stream after
    applying flatMap is not arbitrary. It''s intrinsically tied to the element type
    of the inner stream or collection that flatMap processes. This implies that the
    transformation function supplied to flatMap can, and often does, change the type
    of elements in the stream.


    In terms of practical applications, flatMap has a wide array of uses. For instance,
    when working with nested collections, such as lists of lists, flatMap can flatten
    these into a singular list, making further processing more straightforward. Additionally,
    in the context of Java''s Optional class, flatMap serves as a means to unpack
    and process values, especially when these optional values are themselves containers
    or can result in other optional values. Another intriguing application is in the
    traversal of object graphs, where an object might contain references to other
    collections or streams of objects. By employing flatMap, developers can traverse
    and process these graphs seamlessly without getting bogged down by the intricacies
    of the nested structures.


    ## Collect Operation


    The collect operation accumulates the output of stream pipeline execution and
    returns the result. It is a terminal operation that causes the stream to be consumed.


    It is the only stream operation that can produce a non-stream result. The result
    can be collected into Collections, summaries like counting, summarization, etc.


    For example, collecting names into a List:

    List<String> names list = names.stream().collect(Collectors.toList());

    And counting names:

    long count = names.stream().collect(Collectors.counting());


    Java provides collector implementations for common use cases in the Collectors
    class like:


    - toList(), toSet() - collect to Collection

    - joining() - concatenating elements

    - averaging(), summing() - numerical aggregation

    - groupingBy(), partitioningBy() - grouping streams


    Custom collectors can also be created when the built-in collectors don''t meet
    the need.


    Collect is typically the last operation in the pipeline as it concludes the aggregation
    result. But it can also act as an intermediate operation to collect results at
    intermediate stages.


    Some common uses of collect include:


    - Accumulating stream results into collections

    - Producing summaries like counts, sums, averages

    - Grouping elements based on classifiers

    - Extracting summations extremes from streams


    ## Chapter 7: Java Features Overview


    ## Exception Handling: Dealing with the Unexpected


    ### What are Exceptions?


    In programming, exceptions refer to problems, errors, or other unexpected events
    that occur when a program is executed. These issues are called "exceptions" because
    they represent situations that are outside of the normal or expected flow of the
    program. Some common types of exceptions include:


    - NullPointerException - Occurs when trying to use an object reference that is
    null.

    - ArrayIndexOutOfBoundsException - Thrown when trying to access an array element
    with an illegal index (either negative or greater than or equal to the array size).

    - ClassCastException - Occurs when an attempt is made to cast an object to a subclass
    that it is not compatible with.

    - FileNotFoundException - Thrown when attempting to open a file that does not
    exist or cannot be found.

    - SQLException - Indicates a problem or error related to working with SQL databases
    using JDBC.

    - IOException - Signals that an input/output exception of some kind has occurred,
    such as being unable to open or read from a file.


    There are many other kinds of exceptions that represent different types of unexpected
    errors or events that can occur. Some exceptions are low-level and represent system
    failures or API issues, while others may indicate logical errors in application
    code.


    ### Dealing with Exceptions


    When exceptions occur, they will often cause the program to crash and exit unexpectedly
    if nothing is done to catch and handle them properly. However, Java provides an
    exception-handling mechanism to deal with errors gracefully instead of causing
    failures.'
