    \nDOUBLE 是一种浮点数数据类型，用于存储更大的、包含小数部分的值。该类型被称为 DOUBLE。DOUBLE 的长度根据具体的 SQL 实现而变化；然而，其值的范围通常在\
    \ -2.23E+308 到 2.23E+308 之间。\n\n### 语法：\n\nvariable_name DOUBLE\n\n### 代码：\n\n\
    ```sql\nCREATE TABLE Manager_Tab(\n    Yearly_Allowance DOUBLE\n);\n```\n\n##\
    \ CHAR\n\nCHAR 是一种具有固定长度的字符串数据类型，用于存储字符字符串。CHAR 的大小以字符为单位衡量，其长度限制在 0 到 255 之间。\n\
    \n### 语法：\n\nvariable_name CHAR(char_length)\n\n### 代码：\n\n```sql\nCREATE TABLE\
    \ Customer_Tab(\n    Email CHAR(30)\n);\n```\n\n## VARCHAR\n\n它是一种可变长度的字符串数据类型，用于保存字符字符串。VARCHAR\
    \ 代表“可变字符”。VARCHAR 的长度以字符为单位衡量，其宽度可以是 0 到 65535 个字符之间的任意值。\n\n### 语法：\n\nvariable_name\
    \ VARCHAR(varchar_length)\n\n### 代码：\n\n```sql\nCREATE TABLE Customer_Tab(\n \
    \   Name VARCHAR(20)\n);\n```\n\n## TEXT\n\nTEXT 是一种可以存储可变数量字节文本的数据类型，其字符串长度可以变化。TEXT\
    \ 的大小可能因具体的 SQL 实现而异，但其可能的值范围通常在 0 到 2^31 -1 个字符之间。\n\n### 语法：\n\nvariable_name\
    \ TEXT\n\n### 代码：\n\n```sql\nCREATE TABLE Order_Tab(\n    Order_Details TEXT\n\
    );\n```\n\n## DATE\n\nDATE 是一种用于日期的数据类型，可以以 YYYY-MM-DD 的格式存储日期。你可以使用此类型来保存日期。\n\
    \n### 语法：\n\nvariable_name DATE\n\n### 代码：\n\n```sql\nCREATE TABLE Order_Tab(\n\
    \    Order_date DATE\n);\n```\n\n## TIME\n\nTIME 是一种用于存储时间的数据类型，格式为 HH:MM:SS。\n\
    \n### 语法：\n\nvariable_name TIME\n\n### 代码：\n\n```sql\nCREATE TABLE Order_Tab(\n\
    \    Order_time TIME\n);\n```\n\n## 第三章：SQL 数据结构\n\n数据库的组织旨在提供对其所包含数据集的直接访问、管理和修改。企业使用数据库来跟踪所有运营，洞察哪些因素有助于其更有效地运作，从而帮助所有者、管理者和分析师做出更好的决策。“数据结构”一词指的是在机器上保存数据的各种方法，是任何中央数据库设计的关键组成部分。可以在这些数据结构上执行的操作以及为执行这些操作而给出的指令称为算法。通常，算法的基本功能会根据数据结构的结构进行专门调整。\n\
    \n### 如何使用数据结构\n\n除了支持核心操作系统功能和资源以及为数据持久性存储新生成的数据外，数据结构还存储新创建的数据。链表、树和队列是三种不同的数据结构，可以处理内存分配、文件目录管理和进程调度。开发者可以使用基于数据结构组织的\
    \ TCP/IP 协议来共享数据包。例如，对于二叉搜索树，有多种高效排序和排序的技术，而优先队列使程序员能够在遵循预定优先级顺序的同时处理对象。在各种数据结构中，有多种简单的方法可用于索引和搜索你的数据。在大型数据应用中，数据结构还在确保高性能和可扩展性方面发挥着重要作用，这就是这些应用如此重要的原因。\n\
    \n### 如何选择数据结构\n\n多种因素有助于数据结构的分类。例如，它们可能具有线性结构，类似于数组，其中数据项以特定顺序出现。它们也可能具有非线性结构，如图，其中组件不按任何特定顺序排列。同构数据结构要求所有组件具有相同的数据类型，而异构数据结构可以存储不同类型的数据。相比之下，数据结构可以是静态的，其中大小和\
    \ RAM 位置是预先确定的；也可以是动态的，其中大小和存储位置可以根据当前任务的需求进行调整。关于可以实现哪种数据结构的问题，没有简单的答案。每种数据格式可能都有其优点和缺点，具体取决于使用场景。因此，在决定使用哪种数据结构之前，考虑你将对数据执行的操作至关重要。例如，虽然使用数组索引检索数组中的任何成员很简单，但当你想要调整数组中项目的大小时，链表更可取。另一方面，如果你使用了不合适的数据结构，程序的执行时间将会增加，并且程序将无法正常响应。在选择数据结构时，开发者通常会考虑以下五个因素：\n\
    \n- 你想要保存的信息类型称为数据类型。\n- 用例指的是你打算如何使用这些知识。\n- 位置指的是数据存储的地方。\n- 效率是你安排事物以便于访问的最有效方法。\n\
    - 如何使用你的存储空间并最大化其潜力。\n\n### 栈数据结构\n\n栈是计算机科学中一种重要的数据结构，遵循后进先出（LIFO）原则。这意味着最后添加到栈中的元素将首先被移除。然而，SQL\
    \ 作为一种管理和查询关系数据库的语言，并不像传统编程语言或数据结构库那样原生支持栈操作。尽管如此，你可以通过使用表并精心设计插入和选择语句来在 SQL 中模拟栈行为。以下是一个使用\
    \ SQL 表模拟栈的实际示例：\n\n#### 示例：创建栈表\n\n```sql\nCREATE TABLE Stack(\n    id INT PRIMARY\
    \ KEY AUTO_INCREMENT,\n    value VARCHAR(255)\n);\n```\n\n此表有一个‘id’列，该列在每次新条目时自动递增，这有助于跟踪元素插入的顺序。\n\
    \n#### Push 操作（插入元素）：\n\n```sql\nINSERT INTO Stack (value) VALUES ('First Element');\n\
    ```\n\n每次插入新元素时，它都会进入栈的“顶部”。\n\n#### Pop 操作（移除最后一个元素）：\n\n要模拟 pop 操作，你需要两个步骤：\n\
    \n1. 首先，选择最后插入的元素：\n\n```sql\nSELECT value FROM Stack ORDER BY id DESC LIMIT 1;\n\
    ```\n\n2. 然后，删除最后插入的元素：\n\n```sql\nDELETE FROM Stack ORDER BY id DESC LIMIT 1;\n\
    ```\n\nSELECT 和 DELETE 命令的这种组合模拟了 pop 操作。\n\n#### 检查栈是否为空：\n\n```sql\nSELECT CASE\
    \ WHEN COUNT(*) = 0 THEN 'Stack is empty'\n           ELSE 'Stack is not empty'\
    \ END\nFROM Stack;\n```\n\n这种方法使用 SQL 表来模拟栈的行为，但需要注意的是，这不是 SQL 的典型用法。SQL 数据库旨在高效管理大型数据集和复杂查询，而不是充当像栈这样的数据结构。在实际场景中，栈操作通常在应用层使用编程语言来处理。"
