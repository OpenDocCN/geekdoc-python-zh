    # Custom Annotations\n\nFor custom behavior not covered by default, annotations\
    \ can also be defined through a simple annotation type.\nFor example:\n\n```\n\
    @Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.METHOD)\npublic @interface\
    \ LogCall {\n    String calledBy();\n}\n```\n\nHere, we define a custom @LogCall\
    \ annotation specifying its target, retention policy, and the calledBy() attribute\
    \ it contains. This annotation can then be used on methods:\n\n```\n@LogCall(calledBy=\"\
    doSomething()\")\npublic void myMethod() {\n    //...\n}\n```\n\nReflection is\
    \ then used at runtime to dynamically access annotated elements and their metadata.\
    \ This opens up annotations to a whole world of possibilities.\n\n# Applying Annotations\n\
    \nAnnotations have many real-world applications:\n\n+   - Dependency Injection:\
    \ Frameworks like Spring use annotations to declaratively wire beans and service\
    \ endpoints.\n- Validation: JSR-303 validations add constraints via annotations\
    \ processed by Bean Validation.\n- JSON/XML Conversion: Jackson/Gson examines\
    \ annotations to automate POJO to JSON conversion.\n- Caching: Implementations\
    \ use annotations to mark cache-eligible methods."
- md: "## Defining Custom Annotations\n\nTo define a reusable custom annotation, follow\
    \ these steps:\n\n1. Choose an appropriate retention policy\n2. Designate target\
    \ elements - types, methods, etc.\n3. Define the annotation interface with attributes\n\
    4. Add default values for attributes if needed\n5. Specify runtime retention for\
    \ reflective access\n6. Process annotations within the code\n7. Consider repeatable\
    \ if multiple instances are allowed\n8. Document usage through JavaDocs\n9. Package\
    \ the annotation for external use\n10. Provide tooling/APIs to leverage annotation\n\
    \nWith care and planning, custom annotations create powerful abstractions over\
    \ code that are self-documenting and aid many automated tasks.\n\n## Best Practices\n\
    \nSome best practices when using annotations:\n\n- Use only for metadata, not\
    \ program logic\n- Keep small, focused and avoid multiple nested annotations\n\
    - Choose targets wisely based on semantic meaning\n- Default/repeatable policies,\
    \ where applicable\n- Document thoroughly with JavaDocs\n- Validate annotations\
    \ during compilation\n- Thoroughly test runtime behavior\n- Version annotations\
    \ with care during changes\n- Avoid abuse that harms code readability\n\nWhen\
    \ applied judiciously, annotations are a highly effective technique to enrich\
    \ Java code with semantics. They significantly aid the readability, automation,\
    \ and maintenance of large modern applications.\n\n## Java I/O: Interacting with\
    \ External Data\n\nNo Java program is complete without the ability to interact\
    \ with external data sources like files, network endpoints, databases, etc. The\
    \ Java platform provides robust and flexible I/O capabilities through its java.io\
    \ package and associated classes for working with streams of data at varying levels\
    \ of abstraction.\n\n## Core I/O Classes\n\nSome core classes that form the building\
    \ blocks of Java I/O include:\n\n- File: Represents files and directories on the\
    \ local filesystem.\n- InputStream: Read-only sequence of bytes from a source\
    \ (Files, network, etc).\n- OutputStream: Write-only sequence of bytes to a sink\
    \ (Files, network, etc).\n- Reader: Read-only sequence of characters from a character-based\
    \ source.\n- Writer: Write-only sequence of characters to a character-based sink.\n\
    - Buffered*: Wraps an I/O stream/reader to provide buffering capabilities.\n\n\
    Using these classes either directly or via convenience wrappers, Java can interact\
    \ with local files, network endpoints, database tables/records, and more.\n\n\
    ## Streams vs. Reader/Writer\n\nThe key difference between Streams and Reader/Writer\
    \ classes is:\n\n- Streams deal with sequences of raw bytes, agnostic of character\
    \ encoding.\n- Readers/Writers work at a higher character abstraction layer using\
    \ a specified character encoding like UTF-8 to translate bytes to characters and\
    \ vice versa.\n\nFor text-based files using encodings, Readers/Writers are preferred\
    \ over raw Input/OutputStreams. Streams are useful for binary data or when encoding\
    \ is unknown.\n\n## Working with Files\n\nCommon file-handling operations include:\n\
    \n- Create/Open: File and RandomAccessFile classes\n- Read: Using FileReader/BufferedReader\
    \ for text; FileInputStream for binary\n- Write: FileWriter/BufferedWriter; FileOutputStream\n\
    - Operations: rename(), delete(), length(), canRead/Write() etc.\n\nFor example,\
    \ to read the entire contents of a file:\n\n```java\nBufferedReader br = new BufferedReader(new\
    \ FileReader(\"file.txt\"));\nString line;\nwhile((line = br.readLine()) != null)\
    \ {\n    //process line\n}\n```\n\nJava 7+ brought many conveniences like try-with-resources\
    \ and NIO.2 for file system navigation/watching capabilities.\n\n## Network I/O\n\
    \nURL-based classes enable fetching resources over HTTP/HTTPS protocols:\n\n-\
    \ URL: location representation\n- URLConnection: obtain streams for a URL\n- HttpURLConnection:\
    \ extended connection for HTTP verbs\n\nFor raw socket communication:\n\n- ServerSocket\
    \ listens for client connections\n- Socket for a client connecting/communicating\
    \ with the server\n- Datastreams provide a common interface over network/file\
    \ streams.\n\n## Database Access\n\nFor relational databases, the ubiquitous standard\
    \ is JDBC - the Java Database Connectivity API. It defines interfaces and classes\
    \ to connect to RDBMS, execute SQL queries, and retrieve/manipulate results using:\n\
    \n- DriverManager: loads appropriate driver class\n- Connection: represents a\
    \ live connection to DB\n- Statement: executes basic SQL statements\n- PreparedStatement:\
    \ for parameterized query execution\n- ResultSet: fetches data from queries row-by-row\n\
    \nORMs like Hibernate abstract over JDBC for object-relational mapping. NoSQL\
    \ stores often provide their own Java driver implementations. MongoDB, for instance,\
    \ uses a robust driver API for operations over data collections.\n\nOverall, I/O\
    \ provides Java with versatile connectivity across the board - making data availability\
    \ a core language capability. When combined with streams and appropriate wrappers,\
    \ it enables clean, efficient information flow in programs.\n\n## Best Practices\n\
    \nSome best practices for reliable, efficient, and maintainable Java I/O include:\n\
    \n- Close resources explicitly in final blocks\n- Wrap streams in Buffered variants\
    \ for substantial performance gains\n- Leverage try-with-resources where possible\
    \ for auto-closing\n- Use character streams for text, binary for unknown data\n\
    - Connection pooling for database access\n- Asynchronous I/O for non-blocking\
    \ network ops\n- Validate user inputs before parsing\n- Consider serialization\
    \ for persistent object storage\n- Compress/encrypt where applicable before transmitting\n\
    \nProperly implementing these practices eliminates resource leaks while optimizing\
    \ throughput. The rich I/O facilities in Java combined with diligent coding make\
    \ for robust data-driven applications.\n\n## Chapter 9: Real-World Java Development\n\
    \n## Building a CRUD Application: From Start to Finish\n\n### Planning the Application\n\
    \nThe first step in building any software application is planning. For a CRUD\
    \ application, we need to determine what data we will manage and how users will\
    \ interact with it.\n\nFor this bookstore application, we identified that books\
    \ will be the main data entity. Each book will have fields for title, author,\
    \ price, and quantity available. These translate directly into columns in the\
    \ database table that will store book records.\n\nNext, we considered the basic\
    \ functionality users need. At a minimum, they should be able to:\n\n- View a\
    \ list of all books\n- Add a new book\n- View/edit an individual book's details\n\
    - Delete a book\n\nThese operations map to the standard CRUD operations - Read\
    \ (view list), Create (add new), Update (edit), and Delete. Additional features\
    \ like searching and sorting could be expanded on later.\n\nFinally, we thought\
    \ about how this will be delivered. A web application using JSP/Servlets is a\
    \ common way to build CRUD systems. Users will interact through web pages displayed\
    \ in a browser. This allows accessing the application from anywhere without installing\
    \ additional software.\n\nWith the planning done, we had the foundation to start\
    \ development.\n\n### Setting Up the Development Environment\n\nFor a Java web\
    \ application, we need a server environment to run the application code and a\
    \ persistence layer to store data. We chose Apache Tomcat as our server since\
    \ it is a lightweight and popular open-source Java Servlet container. It was downloaded\
    \ and configured on our development machines. For the database, H2 was selected\
    \ as it is an in-memory SQL database ideal for development/testing. Its JDBC driver\
    \ was also downloaded. To connect Tomcat and H2, we added the required JDBC libraries\
    \ to Tomcat's classpath. This allows our Java code to communicate with the database.\
    \ H2 has a built-in browser-based console to view and manipulate data. We used\
    \ it to create the 'books' table with the four book fields as columns. This completed\
    \ the basic infrastructure preparation.\n\n### Creating the Model Layer\n\nNext,\
    \ we implemented the model layer that represents our application's data. This\
    \ included:\n\n1. Book entity class: A simple POJO mapping to the database table\
    \ with fields and getter/setter methods\n2. DAO interfaces: Defined database access\
    \ methods like findAll(), save(), update(), delete()\n3. DAO implementations:\
    \ Contain JDBC code to execute CRUD SQL and return results\n\nThe DAOs abstracted\
    \ JDBC for cleaner code. Utility methods like connection opening/closing were\
    \ also created. To summarize, the model layer focuses on managing the data and\
    \ interacts with the database infrastructure behind a clean interface. Its role\
    \ is to retrieve and persist Book objects.\n\n### Building the View Layer\n\n\
    JSP allows the creation of attractive and dynamic web pages simply. We designed\
    \ the view layer to:\n\n1. books.jsp - Display all books in a table with edit/delete\
    \ links\n2. addBook.jsp - Form to add a new book with submission to a servlet\n\
    3. editBook.jsp - Pre-populate form with book details for updating\n4. message.jsp\
    \ - Display status/errors returned from servlets\n\nSimple HTML constructs, JSP\
    \ expressions to embed Java variables, and SQL tags to iterate over data allowed\
    \ building these pages quickly. We followed best practices like separating presentation\
    \ from logic, using consistent formatting/styling, and keeping pages focused on\
    \ a single task. The result is cleanly designed templated content for users to\
    \ interact with."
  mdcn: "## 定义自定义注解\n\n要定义一个可复用的自定义注解，请遵循以下步骤：\n\n1.  选择合适的保留策略\n2.  指定目标元素 - 类型、方法等\n\
    3.  定义带有属性的注解接口\n4.  根据需要为属性添加默认值\n5.  指定运行时保留以支持反射访问\n6.  在代码中处理注解\n7.  考虑是否允许多个实例（可重复注解）\n\
    8.  通过 JavaDoc 记录用法\n9.  将注解打包以供外部使用\n10. 提供工具/API 以利用注解\n\n通过仔细规划，自定义注解可以在代码之上创建强大的抽象，这些抽象具有自文档化特性，并能辅助许多自动化任务。\n\
    \n## 最佳实践\n\n使用注解时的一些最佳实践：\n\n-   仅用于元数据，而非程序逻辑\n-   保持小巧、专注，避免多重嵌套注解\n-   根据语义含义明智地选择目标\n\
    -   在适用时使用默认/可重复策略\n-   通过 JavaDoc 进行详尽的文档记录\n-   在编译期间验证注解\n-   彻底测试运行时行为\n-\
    \   在更改时谨慎地对注解进行版本管理\n-   避免滥用，以免损害代码可读性\n\n当审慎应用时，注解是一种高效的技术，可以为 Java 代码添加语义。它们显著提升了大型现代应用程序的可读性、自动化和可维护性。\n\
    \n## Java I/O：与外部数据交互\n\n任何 Java 程序都离不开与外部数据源（如文件、网络端点、数据库等）交互的能力。Java 平台通过其 `java.io`\
    \ 包及相关类，提供了强大而灵活的 I/O 功能，用于在不同抽象层次上处理数据流。\n\n## 核心 I/O 类\n\n构成 Java I/O 基础的一些核心类包括：\n\
    \n-   `File`：表示本地文件系统上的文件和目录。\n-   `InputStream`：来自源（文件、网络等）的只读字节序列。\n-   `OutputStream`：写入接收器（文件、网络等）的只写字节序列。\n\
    -   `Reader`：来自基于字符源的只读字符序列。\n-   `Writer`：写入基于字符接收器的只写字符序列。\n-   `Buffered*`：包装\
    \ I/O 流/读取器以提供缓冲功能。\n\n通过直接使用这些类或通过便捷包装器，Java 可以与本地文件、网络端点、数据库表/记录等进行交互。\n\n##\
    \ 流与 Reader/Writer\n\n流（Streams）与 Reader/Writer 类之间的关键区别在于：\n\n-   流处理原始字节序列，与字符编码无关。\n\
    -   Reader/Writer 在更高的字符抽象层上工作，使用指定的字符编码（如 UTF-8）将字节转换为字符，反之亦然。\n\n对于使用编码的文本文件，Reader/Writer\
    \ 优于原始的 Input/OutputStream。流适用于二进制数据或编码未知的情况。\n\n## 处理文件\n\n常见的文件处理操作包括：\n\n-\
    \   创建/打开：`File` 和 `RandomAccessFile` 类\n-   读取：使用 `FileReader`/`BufferedReader`\
    \ 读取文本；使用 `FileInputStream` 读取二进制数据\n-   写入：`FileWriter`/`BufferedWriter`；`FileOutputStream`\n\
    -   操作：`rename()`、`delete()`、`length()`、`canRead()`/`canWrite()` 等\n\n例如，要读取文件的全部内容：\n\
    \n```java\nBufferedReader br = new BufferedReader(new FileReader(\"file.txt\"\
    ));\nString line;\nwhile((line = br.readLine()) != null) {\n    //process line\n\
    }\n```\n\nJava 7+ 带来了许多便利，如 try-with-resources 和用于文件系统导航/监视功能的 NIO.2。\n\n## 网络\
    \ I/O\n\n基于 URL 的类支持通过 HTTP/HTTPS 协议获取资源：\n\n-   `URL`：位置表示\n-   `URLConnection`：获取\
    \ URL 的流\n-   `HttpURLConnection`：用于 HTTP 动词的扩展连接\n\n对于原始套接字通信：\n\n-   `ServerSocket`\
    \ 监听客户端连接\n-   `Socket` 用于客户端连接/与服务器通信\n-   `DataInputStream`/`DataOutputStream`\
    \ 在网络/文件流上提供通用接口。\n\n## 数据库访问\n\n对于关系型数据库，普遍的标准是 JDBC - Java 数据库连接 API。它定义了连接到关系数据库管理系统、执行\
    \ SQL 查询以及使用以下方式检索/操作结果的接口和类：\n\n-   `DriverManager`：加载适当的驱动程序类\n-   `Connection`：表示与数据库的活动连接\n\
    -   `Statement`：执行基本 SQL 语句\n-   `PreparedStatement`：用于参数化查询执行\n-   `ResultSet`：逐行从查询中获取数据\n\
    \n像 Hibernate 这样的 ORM 在 JDBC 之上进行了抽象，实现了对象关系映射。NoSQL 存储通常提供自己的 Java 驱动程序实现。例如，MongoDB\
    \ 使用了一个强大的驱动程序 API 来操作数据集合。\n\n总的来说，I/O 为 Java 提供了全方位的通用连接能力 - 使数据可用性成为核心语言特性。当与流和适当的包装器结合使用时，它能在程序中实现清晰、高效的信息流。\n\
    \n## 最佳实践\n\n一些可靠、高效且可维护的 Java I/O 最佳实践包括：\n\n-   在 finally 块中显式关闭资源\n-   将流包装在\
    \ Buffered 变体中以获得显著的性能提升\n-   尽可能利用 try-with-resources 进行自动关闭\n-   对文本使用字符流，对未知数据使用二进制流\n\
    -   数据库访问使用连接池\n-   非阻塞网络操作使用异步 I/O\n-   在解析前验证用户输入\n-   考虑使用序列化进行持久化对象存储\n- \
    \  在传输前根据需要进行压缩/加密\n\n正确实施这些实践可以消除资源泄漏，同时优化吞吐量。Java 丰富的 I/O 设施与严谨的编码相结合，能够构建出健壮的数据驱动应用程序。\n\
    \n## 第 9 章：真实的 Java 开发\n\n## 构建一个 CRUD 应用程序：从开始到结束\n\n### 规划应用程序\n\n构建任何软件应用程序的第一步是规划。对于一个\
    \ CRUD 应用程序，我们需要确定将管理什么数据以及用户将如何与之交互。\n\n对于这个书店应用程序，我们确定书籍将是主要的数据实体。每本书将包含书名、作者、价格和可用数量等字段。这些字段直接对应到存储书籍记录的数据库表中的列。\n\
    \n接下来，我们考虑了用户需要的基本功能。至少，他们应该能够：\n\n-   查看所有书籍的列表\n-   添加一本新书\n-   查看/编辑单本书的详细信息\n\
    -   删除一本书\n\n这些操作对应标准的 CRUD 操作 - 读取（查看列表）、创建（添加新项）、更新（编辑）和删除。搜索和排序等附加功能可以稍后扩展。\n\
    \n最后，我们考虑了如何交付这个应用程序。使用 JSP/Servlet 构建 Web 应用程序是构建 CRUD 系统的常见方式。用户将通过浏览器中显示的网页进行交互。这允许从任何地方访问应用程序，而无需安装额外的软件。\n\
    \n规划完成后，我们就有了开始开发的基础。\n\n### 设置开发环境\n\n对于一个 Java Web 应用程序，我们需要一个服务器环境来运行应用程序代码，以及一个持久层来存储数据。我们选择了\
    \ Apache Tomcat 作为服务器，因为它是一个轻量级且流行的开源 Java Servlet 容器。它被下载并配置在我们的开发机器上。对于数据库，选择了\
    \ H2，因为它是一个适合开发/测试的内存 SQL 数据库。它的 JDBC 驱动程序也被下载了。为了连接 Tomcat 和 H2，我们将所需的 JDBC 库添加到了\
    \ Tomcat 的类路径中。这使得我们的 Java 代码能够与数据库通信。H2 有一个内置的基于浏览器的控制台来查看和操作数据。我们用它创建了 'books'\
    \ 表，将四个书籍字段作为列。这完成了基本的基础设施准备。\n\n### 创建模型层\n\n接下来，我们实现了表示应用程序数据的模型层。这包括：\n\n1.\
    \  `Book` 实体类：一个简单的 POJO，映射到数据库表，包含字段和 getter/setter 方法\n2.  DAO 接口：定义了数据库访问方法，如\
    \ `findAll()`、`save()`、`update()`、`delete()`\n3.  DAO 实现：包含执行 CRUD SQL 并返回结果的\
    \ JDBC 代码\n\nDAO 对 JDBC 进行了抽象，使代码更清晰。还创建了诸如打开/关闭连接之类的实用方法。总而言之，模型层专注于管理数据，并通过清晰的接口与数据库基础设施交互。其角色是检索和持久化\
    \ `Book` 对象。\n\n### 构建视图层\n\nJSP 允许简单地创建美观且动态的网页。我们将视图层设计为：\n\n1.  `books.jsp`\
    \ - 在表格中显示所有书籍，并带有编辑/删除链接\n2.  `addBook.jsp` - 用于添加新书的表单，提交到 servlet\n3.  `editBook.jsp`\
    \ - 预填充书籍详细信息的表单，用于更新\n4.  `message.jsp` - 显示从 servlet 返回的状态/错误信息\n\n简单的 HTML\
    \ 结构、用于嵌入 Java 变量的 JSP 表达式以及用于迭代数据的 SQL 标签，使得这些页面能够快速构建。我们遵循了最佳实践，如将表示与逻辑分离、使用一致的格式/样式，以及保持页面专注于单一任务。结果是为用户交互而清晰设计的模板化内容。"
