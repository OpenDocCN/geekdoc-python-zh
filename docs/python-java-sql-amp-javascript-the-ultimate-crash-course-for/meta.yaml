    \ Java 程序所需的基础知识。\n\n## 数据类型\n\n在 Java 编程语言中，“数据类型”一词定义了变量可以存储的信息种类。这些数据类型主要分为两大类：基本数据类型和引用数据类型。虽然引用数据类型涉及面向对象编程领域的对象和类，但目前我们的重点将放在基本数据类型上。Java\
