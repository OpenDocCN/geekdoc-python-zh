    同样的关系运算符也可以用于浮点值和其他数据类型，例如元组。\n\n### 3. 等于（==）运算符\n\n*等于*运算符用于判断右操作数和左操作数的值是否相等。如果操作数值相同，则布尔值为True。否则，为False。\n\
