    \ list. Import this module into another script and use the function to sum a list\
    \ of numbers.\n\n# Chapter 9: Object Oriented Programming (OOP)\n\nUntil now we\
    \ have discussed functional-oriented programming and provided several examples\
    \ of code. While the functional programming paradigm is popular among independent\
