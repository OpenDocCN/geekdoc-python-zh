    as data fields and method declarations in the class.


    The key aspects of a class are:


    +   - It encapsulates data in the form of fields/attributes that describe the
    object.

    - It encapsulates behaviors through method declarations that the object can exhibit.

    - It establishes a common foundation on which similar objects can be based.

    - A class is a logical entity rather than a physical one - it does not create
    actual objects by itself.


