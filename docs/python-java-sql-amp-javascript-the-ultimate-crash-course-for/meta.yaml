    oversight layer.


    # 7. Designing data pipeline in SQL


    There are a few stages involved in creating a data pipeline using SQL, including
    the following:


    +   - Finding where the data came from: Identify the source or sources that will
    feed into your pipeline. Databases, flat files, application programming interfaces
