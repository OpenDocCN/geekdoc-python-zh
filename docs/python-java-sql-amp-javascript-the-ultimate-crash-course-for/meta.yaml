    # ORDER BY DESC


    It is possible to categorize the outcome set in ascending or descending directives
    using the ORDER BY command.

    The ORDER BY command will default sort the result set using an ascending sorting
    order. Use the DESC keyword to sort the entries in descending order from highest
    to lowest.


