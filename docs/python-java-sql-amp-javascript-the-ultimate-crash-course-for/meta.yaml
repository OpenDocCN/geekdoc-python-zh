    # Chapter 12: Advanced Programming


    Many third-party Python frameworks provide specific functionalities to programmers.
    It''s sufficient to import the base libraries. That''s why Python''s popularity
    has skyrocketed. Libraries are great for developers to create real-world applications
    that ordinary users can use. You should be aware of certain commonly used Python
    libraries to write valid complex code without having to start from scratch.


    The source codes for the majority of these libraries will be available for exploration
    on websites such as GitHub or Bitbucket.


    # Pip Package Manager


    All operating systems make applications available to their users. Python isn''t
    an operating system, but rather a software interpreter. Any software that is not
    written in Python can''t run using a Python interpreter because the Python interpreter
    does not understand the source code used by that software.


    There are thousands of paid and free Python software downloads available from
    many sources. A simple Google search for Python software for the domain you are
    interested in can provide thousands of results. To install this software on your
    own, you will need at least a basic understanding of executable files.


    Python offers package managers to download package files into your operating system
    to be immediately executed. In this way, you can easily install the software you
    need. While there are many third-party Python package managers, the default pip
    is the most common and every Python programmer should be familiar with it.


    # Why Using Pip


    +   - New packages and dependencies can be installed.

    - There is an index that lists all Python package repositories that are available
    on pip servers.

    - Before installing the software, use it to go over the requirements.

    - Remove all packages and dependencies that you no longer use.'
