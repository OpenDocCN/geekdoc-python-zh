    It''s crucial to plan your table structure carefully, considering how the data
    will be used and the relationships between different tables.


    # Altering Tables


    Altering tables in SQL is a common task that involves making changes to the structure
    of an existing table. This could include adding new columns, modifying existing
    columns, deleting columns, or changing constraints. Let''s use the Customers table
    from the previous example to illustrate various ALTER TABLE operations.


    # Adding a New Column:


    To add a new column, for example, a column for storing the customer''s phone number:


    ```

    ALTER TABLE Customers

    ADD PhoneNumber VARCHAR(15);

    ```


    This command adds a new column named PhoneNumber with a data type of VARCHAR(15).


    # Modifying an Existing Column:


    If you need to change a column''s data type or size, use the MODIFY or ALTER COLUMN
    command (syntax can vary between SQL databases).'
