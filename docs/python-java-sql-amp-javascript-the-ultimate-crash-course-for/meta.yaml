  md: "# Chapter 4: Working with Tables\n\nIn the previous chapters we have created\
    \ tables with the command CREATE TABLE.\nIn this chapter we will explore more\
    \ in detail the different options SQL offers for handling tables. This includes\
    \ altering table structures, manipulating data, and employing advanced techniques\
    \ to maximize the potential of our databases.\n\n# Creating Tables\n\nCreating\
    \ tables in SQL is a fundamental task for structuring and storing data in a database.\
    \ The process involves defining the table and its columns, specifying data types\
    \ for each column, and setting any necessary constraints like primary keys. Here's\
    \ a step-by-step guide on how to create a table using SQL:\n\n+   1. Choose a\
    \ table name: select a meaningful name for your table that reflects the data it\
    \ will store.\n2. Define columns and data types: for each column in the table,\
    \ you need to specify a name and a data type. The data type specifies what kind\
    \ of data the column can store (e.g., integer, text, date, etc.).\n3. Set constraints\
    \ (optional): constraints are rules that table columns must follow to ensure data\
    \ integrity. Common constraints include:\n    a. PRIMARY KEY: Uniquely identifies\
    \ each record in the table.\n    b. FOREIGN KEY: Links data between two tables.\n\
    \    c. NOT NULL: Prevents a column from containing a NULL value.\n    d. UNIQUE:\
    \ Prevents a column from having two identical values.\n    e. CHECK: Verifies\
    \ that the value in a particular column meets a certain criterion."
  merge: -1
  pgno: 295
- img_proc: true
  md: "f. DEFAULT: Assigns a default value to a column when no value is given.\n\n\
    4. Create the table using use the CREATE TABLE statement.\n\n# Example\n\nLet's\
    \ say you want to create a simple table named Customers, which stores customers'\
    \ information with columns for customer ID, name, and email:\n\n```\nCREATE TABLE\
    \ Customers (\n    CustomerID INT PRIMARY KEY,\n    Name VARCHAR(100),\n    Email\
    \ VARCHAR(100) NOT NULL\n);\n```\n\nIn this example:\n\n+   - Customers is the\
    \ name of the table.\n- CustomerID, Name, and Email are column names.\n- INT and\
