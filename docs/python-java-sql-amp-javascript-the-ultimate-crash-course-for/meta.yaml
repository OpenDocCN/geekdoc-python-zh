    - Data quality ensures that data is correct and useable for the purpose it was
    collected from beginning to finish. Regardless of the amount or kind of data,
    it assists in producing better and cleaner results.

    - Preparing data for analytics and reporting is called "data preparation."

    - Integration of data refers to the processes carried out to merge several sorts
    of data.

    - Data federation is the process of virtually integrating data in such a way as
    to make it possible to see combined data drawn from several different sources,
    all without having to relocate and store the integrated view in a new place.

    - Data governance may be defined as the rules and choices that assist in managing
    data to ensure harmony between the digital strategy and the business plan. It
    makes it possible to effectively manage all vital data assets, irrespective of
    their size, nature, or location.

    - Identifying, organizing, and maintaining all necessary and common data in a
    single hub is called master data management, or MDM for short.

    - Examining data as it is generated is known as "data streaming." It allows users
    to filter, purify, and rectify rapidly changing data before it''s saved, enabling
    them to receive immediate, concrete benefits in real-time and via a single interface.


