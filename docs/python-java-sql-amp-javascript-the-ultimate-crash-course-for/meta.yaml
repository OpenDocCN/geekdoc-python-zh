  md: '# # Chapter 9: Object Oriented Programming (OOP)


    Until now we have discussed functional-oriented programming and provided several
    examples of code. While the functional programming paradigm is popular among independent
    developers, it can be difficult to implement when working with a team where many
    members must effectively communicate using their code.

    Even though functional-oriented programming reduces a lot of code clutter, it
    is still difficult to import modules every time you create a new file. Importing
    more modules increases the program''s run time exponentially.

    Because of these issues, many programmers preferred to use Object-Oriented Programming
    languages such as Java during Python''s initial release. But when Python 2 was
    released, everyone was enthusiastic to learn that Python had begun to support
    Object-Oriented Programming, transforming it into a multi-paradigm language.

    With several examples, this chapter delves deeply into various object-oriented
    principles.


    # ## What Is OOP?


    OOP is a popular programming paradigm in which classes and objects are used to
    organize functions into logical templates.

    A class is a collection of data or methods that can be easily accessed using dot
    notation. Classes are accessible to variables and methods outside the class due
    to object behavior.


    # ## A Real-World Example:


    Assume you are developing an application that explains details about various vehicles
    and models of those vehicles.

    A functional programmer would create a function for each vehicle and then another
    for each model. It may appear simple when there are only a few vehicle models,
    but as the number of vehicle models grows, code reuse becomes difficult for developers.'
  merge: -1
  pgno: 117
- img_proc: true
  md: "In Object Oriented programming, however, the programmer will first create a\
    \ 'vehicle' class and define various properties and values. The developer will\
    \ then create a separate class for each type of vehicle. Because of the Object\
    \ Oriented programming paradigm, the developer can access and call all those properties\
    \ with a simple dot notation rather than creating functions for each property\
    \ again.\nObject Oriented programming saves time and is useful to reuse code thanks\
    \ to features like polymorphism and inheritance.\n\n# How Do I Create Classes?\n\
    \nClasses are a way to create custom data types and they represent a blueprint\
    \ from which objects are typically created. Classes include various logical entities\
    \ such as attributes and methods. Specific rules must be followed when creating\
    \ classes.\n\n+   - All classes that are created must be preceded by the keyword\
    \ 'class.'\n- Variables created within a class are nothing more than class attributes.\n\
    - All attributes in a class are public and can be used at any time by using the\
    \ . (dot) operator.\n\nThe syntax for class creation:\n\n```\nclass ClassName:\n\
    \    # Class-level attributes\n    Definition of the attributes\n\n    # Initialization\
    \ method\n    The self method that we'll discuss\n\n    # Class methods\n    Specific\
    \ methods (functions) of the class\n```\n\nIn Python, you can't use reserved keywords\
    \ for class names. Otherwise, a traceback error will occur, causing the application\
    \ to crash.\n\n# How Do I Create Objects?"
