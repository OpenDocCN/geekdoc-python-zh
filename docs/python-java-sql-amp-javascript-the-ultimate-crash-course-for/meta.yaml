    # Destructuring assignment


    The destructuring assignment was another feature introduced with ES6, and it gives
    programmers the ability to pull values out of arrays or objects and assign them
    to variables. Older browsers do not support the destructuring assignment programming
    construct. Babel can convert destructuring assignments into comparable code that
    is compatible with earlier browsers, including the following:


    ```

    // ES6 destructuring assignment

    const person = { name: ''Mike'', age: 30 };

    const { name, age } = person;

    // Transpiled ES5 code

    var person = { name: ''Mike'', age: 30 };

    var name = person.name;

    var age = person.age;

    ```


    Babel is an important piece of software for contemporary web development since
    it enables developers to use the most recent features and syntax while preserving
    compatibility with older web browsers. Using Babel, developers can write code
    in the most recent version of JavaScript and then have it automatically transpire
    into earlier versions. These older versions of JavaScript can operate on older
    browsers or environments that do not yet support the most recent capabilities.'
