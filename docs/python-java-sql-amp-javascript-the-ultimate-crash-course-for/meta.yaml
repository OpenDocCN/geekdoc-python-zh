    ```

    This is an example.

    ```


    Because a single-line comment was used, the interpreter ignored it and only executed
    the print statement.


    ### Why are Single-Line Comments Important?


    Single-line comments are commonly used in the middle of code to assist other programmers
    in understanding how the program logic works and to detail the functions of the
    implemented variables.


    ### Comments in Multiple Lines


    While it is possible to write three or four lines of continuous comments using
    single-line comments, it is not recommended because Python provides a better way
    to annotate multi-line comments. Python programmers can use string literals to
    create multi-line comments, as shown below.


    ## Program Code:


    ```

