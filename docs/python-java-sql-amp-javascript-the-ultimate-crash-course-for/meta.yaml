    age_last = age - 1

    print("Last year you were", age_last, "years old.")

    ```


    ## Output:


    ```

    Enter your age: 50

    ERROR!

    Traceback (most recent call last):

    NameError: name ''age'' is not defined

    ```


    ## Practical Example for ‘float’:


    Suppose we want to calculate the area of a circle. The user will input the radius,
    which might be a decimal number, so we use float.


    ```

    # Ask the user for the radius of a circle

    radius = float(input("Enter the radius of the circle: "))


    # Calculate the area (using 3.14 as an approximation of Pi)

    area = 3.14 * radius * radius


    # Print the area

    print("The area of the circle is:", area)

    ```


