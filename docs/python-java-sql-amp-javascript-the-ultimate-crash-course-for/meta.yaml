    # Subqueries and temporary tables


    Subqueries are queries within queries that are used to perform more complex data
    manipulations. They are a powerful tool for data analysts and can be used to extract
    data from multiple tables, filter data based on complex conditions, and perform
    aggregations.


    For example, a subquery could be used to find all the customers who have made
    purchases over a certain amount and use that data to perform further analysis.


    Temporary tables are another way to work with complex data sets. They are tables
    that are created on the fly and are used to store the intermediate results of
    a query. This can be helpful in situations where the data is too large to fit
    into memory or when a query needs to be broken down into smaller, more manageable
    steps.


    Subqueries and temporary tables are advanced SQL techniques that can significantly
    improve the efficiency and flexibility of SQL data management.


    Assume you have two tables: **orders** and **customers**. The columns of the **orders**
    table are ‘order_id’, ‘customer_id’, and ‘order_amount’. The **customer** table
    has ‘customer_id’, ‘customer_name’, and ‘customer_email’.


    We want to find the total amount of orders made by customers who have a Gmail
    email address. We can use a subquery to filter out the customers with non-Gmail
    email addresses and then use a temporary table to store the intermediate result:'
  - '[PAGE 314]


    # Code:


    ```

    CREATE TEMPORARY TABLE temp_customers AS

    SELECT customer_id

    FROM customers

    WHERE customer_email LIKE ''%@gmail.com'';

    SELECT SUM(order_amount) AS total_order_amount

    FROM orders

    WHERE customer_id IN (SELECT customer_id FROM temp_customers);

    ```


    # Output:


    ```

    total_order_amount

    ------------------

    $12,345.67

    ```


    The first query creates a temporary table called temp_customers that contains
    only the customer IDs of customers with a Gmail email address. The LIKE operator
    is used to match any email address that contains "@gmail.com". The second query
    uses the temporary table to filter the orders table and retrieve the total order
    amount made by those customers.

    The output of this query would be a single row with the total amount of orders
    made by customers with Gmail email addresses.

    Note that the use of temporary tables and subqueries can greatly improve the efficiency
    and flexibility of SQL data management, especially when dealing with complex data
    manipulations. However, it''s important to use them judiciously and optimize queries
    for performance, as they can also lead to slower query execution times if not
    used correctly.


    # Grouping and Aggregating Data


    Grouping and aggregating data are important methods for summarizing large data
    sets and extracting insights from them. Grouping involves combining rows based
    on shared values in one or more columns, while aggregation involves computing
    summary statistics like counts, sums, averages, and max/min values for each group.
    For instance, grouping customer purchase data by date can reveal sales trends
    over time, while aggregating by product category can show which products are most
    popular.'
