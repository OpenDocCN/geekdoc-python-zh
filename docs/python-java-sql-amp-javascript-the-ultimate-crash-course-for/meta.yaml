- md: "Let’s see an example.\n\n## Inserting a Complete Row\n\nTo insert a new row\
    \ into the Customers table, you need to provide values for all the columns since\
    \ all are mandatory (assuming we didn't change the original structure):\n\n```sql\n\
    INSERT INTO Customers (CustomerID, Name, Email)\nVALUES (1, 'John Doe', 'john.doe@example.com');\n\
    SELECT * FROM Customers;\n```\n\nIn this example, you are adding a new customer\
    \ with a CustomerID of 1, name 'John Doe', and email 'john.doe@example.com'.\n\
    \n### Output\n\n```\n1|John Doe|john.doe@example.com\n```\n\n## Inserting Multiple\
    \ Rows\n\nYou can also insert multiple rows in a single statement by providing\
    \ multiple sets of values:\n\n```sql\nINSERT INTO Customers (CustomerID, Name,\
    \ Email)\nVALUES (2, 'Jane Smith', 'jane.smith@example.com'),\n      (3, 'Emily\
    \ Johnson', 'emily.johnson@example.com');\nSELECT * FROM Customers;\n```\n\n###\
    \ Output\n\n```\n1|John Doe|john.doe@example.com\n2|Jane Smith|jane.smith@example.com\n\
    3|Emily Johnson|emily.johnson@example.com\n```\n\nThis statement adds two more\
    \ customers, each with their own ID, name, and email address.\n\n## Updating Table\n\
    \nIn SQL, the UPDATE command is executed whenever you need to modify the data\
    \ already stored in a database.\n\n### Syntax:\n\n```sql\nUPDATE table_name\n\
    SET column1 = value1, column2 = value2\nWHERE condition\n```\n\n### Example\n\n\
    ```sql\nUPDATE Customers\nSET Email = 'new.email@example.com'\nWHERE CustomerID\
    \ = 1;\n\nSELECT * FROM Customers;\n```\n\n### Output\n\n```\n1|John Doe|new.email@example.com\n\
    2|Jane Smith|jane.smith@example.com\n3|Emily Johnson|emily.johnson@example.com\n\
    ```\n\nIt's often a good practice to run a SELECT statement first to ensure you're\
    \ updating the correct records, especially in tables with many rows. Consider\
    \ backing up your data before performing mass updates, as an incorrect UPDATE\
    \ can alter all rows in a table.\n\n## Deleting Data\n\nYou can use the DELETE\
    \ command in SQL to delete records from a table if you already have entries in\
    \ the table and wish to remove them.\n\n### Syntax:\n\n```sql\nDELETE FROM table_name\n\
    WHERE condition\n```\n\n### Example\n\n```sql\nDELETE FROM Customers\nWHERE CustomerID\
    \ = 1;\nSELECT * FROM Customers;\n```\n\n### Output\n\n```\n2|Jane Smith|jane.smith@example.com\n\
    3|Emily Johnson|emily.johnson@example.com\n```\n\nIn this example, WHERE CustomerID\
    \ = 1 is the condition that specifies which record(s) to delete. In this case,\
    \ it's the record where CustomerID equals 1.\n\n## Chapter 5: Basic and Advanced\
    \ Query Techniques\n\nSQL facilitates communication with relational databases.\
    \ The following is a list of some fundamental and sophisticated methods for choosing\
    \ data:\n\n## JOIN\n\nThe JOIN operation combines the data from two or more tables,\
    \ given that there is at least one common column between them.\n\n### Syntax:\n\
    \n```sql\nSELECT * FROM table1\nJOIN table2\nON table1.column1 = table2.column2\n\
    ```\n\n### Code:\n\n```sql\nSELECT *\nFROM Store_Tab\nJOIN Staff_Tab\nON Store_Tab.Store_id\
    \ = Staff_Tab.Staff_id;\n```\n\n### Output:\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_302_0.png)\n\
    \n## GROUP BY\n\nThis function groups data according to your column and produces\
    \ aggregate statistics such as SUM, AVG, MIN, MAX, etc.\n\n### Syntax:\n\n```sql\n\
    SELECT column_name, SUM(column_name)\nFROM table_name\nGROUP BY column_name\n\
    ```\n\n### Code:\n\n```sql\nSELECT Store_id, SUM(Store_id)\nFROM Store_Tab\nGROUP\
    \ BY Store_id;\n```\n\n### Output:\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_303_0.png)\n\
    \n## HAVING\n\nThe HAVING clause is a filter that sorts groups according to a\
    \ certain condition.\n\n### Syntax:\n\n```sql\nSELECT column_name, SUM(column_name)\n\
    FROM table_name\nGROUP BY column_name\nHAVING SUM(column_name) [ Condition ]\n\
    ```\n\n### Code:\n\n```sql\nSELECT Store_id, SUM(Store_id)\nFROM Store_Tab\nGROUP\
    \ BY Store_id\nHAVING SUM(Store_id) > 10;\n```\n\n### Output:\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_304_0.png)\n\
    \n## UNION\n\nThe UNION operator combines the findings of many SELECT queries\
    \ into a single overall set of findings.\n\n### Syntax:\n\n```sql\nSELECT column_name\
    \ FROM table_name\nUNION\nSELECT column_name FROM table_name\n```\n\n### Code:\n\
    \n```sql\nSELECT Store_Name\nFROM Store_Tab\nUNION\nSELECT Staff_Name\nFROM Staff_Tab;\n\
    ```\n\n### Output:\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_304_1.png)\n\n\
    ## ORDER BY\n\nWe can sort the output of a query in SQL by using the \"ORDER BY\"\
    \ clause, which allows you to sort the results in either descending or ascending\
    \ order. When sorting the results of the SELECT mainly depending on one or even\
    \ more columns, the \"ORDER BY\" phrase is utilized in the statement.\n\n### Syntax:\n\
    \n```sql\nSELECT column1, column2\nFROM table_name\nORDER BY column_name\n```\n\
    \n### Code:\n\n```sql\nSELECT Store_Name, Store_id\nFROM Store_Tab\nORDER BY Store_id;\n\
    ```\n\n### Output:\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_305_0.png)\n\n\
    ## ORDER BY DESC\n\nIt is possible to categorize the outcome set in ascending\
    \ or descending directives using the ORDER BY command. The ORDER BY command will\
    \ default sort the result set using an ascending sorting order. Use the DESC keyword\
    \ to sort the entries in descending order from highest to lowest.\n\n### Syntax:\n\
    \n```sql\nSELECT column1, column2\nFROM table_name\nORDER BY column_name DESC\n\
    ```\n\n### Code:\n\n```sql\nSELECT Staff_Name, Staff_salary, Staff_id\nFROM Staff_Tab\n\
    ORDER BY Staff_id DESC;\n```\n\n### Output:\n\n| Staff_Name | Staff_salary | Staff_id\
    \ |\n|---|---|---|\n| Andrew Smith | 2500 | 35 |\n| Janet Yew | 5000 | 20 |\n\n\
    ORDER BY Ascending example:\n\n### Syntax:\n\n```sql\nSELECT column1, column2\n\
    FROM table_name\nORDER BY column_name ASC\n```\n\n### Code:\n\n```sql\nSELECT\
    \ Staff_Name, Staff_salary, Staff_id\nFROM Staff_Tab\nORDER BY Staff_id ASC;\n\
    ```\n\n### Output:\n\n| Staff_Name | Staff_salary | Staff_id |\n|---|---|---|\n\
    | Janet Yew | 5000 | 20 |\n| Andrew Smith | 2500 | 35 |\n\n## INTERSECT\n\nThe\
    \ UNION command and the INTERSECT operator work on a single set of SQL statements,\
    \ whereas the INTERSECT operator acts on two statements. The INTERSECT and UNION\
    \ operators function as OR operators. However, the INTERSECT operator also functions\
    \ as an AND operator. This is the chief difference between the two.\n\n### Syntax:\n\
    \n```sql\nSELECT column_name FROM table_name\nINTERSECT\nSELECT column_name FROM\
    \ table_name\n```\n\n### Code:\n\n```sql\nSELECT Store_id FROM Store_Tab\nINTERSECT\n\
    SELECT Staff_id FROM Staff_Tab;\n```\n\n### Output:\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_307_0.png)\n\
    \n## MINUS\n\nThe MINUS command also works on two different SQL queries simultaneously.\
    \ The MINUS command begins by retaining the result from the first statement. It\
    \ then takes the result received from the second statement and subtracts it from\
    \ the result acquired from the first statement to arrive at the final result.\
    \ If the second statement produces outcomes that were not obtained from the first\
    \ statement, then the first result will be disregarded, and the second result\
    \ will be considered valid. It is important to notice that the MINUS command may\
    \ only choose values unique from one another.\n\n### Syntax:\n\n```sql\nSELECT\
    \ column_name FROM table_name\nMINUS\nSELECT column_name FROM table_name\n```\n\
    \n### Code:\n\n```sql\nSELECT Store_id FROM Store_Tab\nMINUS\nSELECT Staff_id\
    \ FROM Staff_Tab;\n```\n\n### Output:\n\n| | Store_id |\n|---|---|\n| 1 | 30 |\n\
    | 2 | 22 |\n| 3 | 20 |\n| 4 | 48 |\n\n| | Staff_id |\n|---|---|\n| 1 | 20 |\n\
    | 2 | 35 |\n\n## Chapter 6: Advanced SQL Techniques and Optimization\n\n## Joining\
    \ Tables and Working with Multiple Data Sources\n\nIn many scenarios, it can be\
    \ challenging to work with data that is spread across multiple tables or data\
    \ sources. This is where the concept of joining tables comes into play. Joining\
    \ tables is the process of combining data from numerous tables into a single result\
    \ set. This is achieved by identifying a common column between the tables that\
    \ can be used to match the rows. By doing so, we can create a more comprehensive\
    \ and useful dataset that can provide valuable insights and aid in decision-making.\n\
    \nJoining tables in SQL is a fundamental technique that is widely used in data\
    \ management and analysis. It allows us to retrieve data from different tables\
    \ and combine it into a single result set. Joining tables are performed using\
    \ the JOIN operator, which can be used with different types of joins, such as\
    \ inner joins, left outer joins, and right outer joins. The type of join used\
    \ depends on the desired result.\n\nInner joins are the most common sort of join\
    \ in SQL. They only fetch rows with matching values from both tables. Therefore,\
    \ rows with no matching values will be excluded from the result set. On the other\
    \ hand, left and right outer joins retrieve every row from one table and any matching\
    \ rows from the other. In case there are no matching rows, the non-matching rows\
    \ will have NULL values. This is useful when we want to retrieve all data from\
    \ one table but only the matching data from the other.\n\nJoining tables in SQL\
    \ can be a difficult task, especially if dealing with huge datasets. It's important\
    \ to understand well the data structure and how the tables are connected. However,\
    \ once mastered, it is an extremely effective tool for data analysis and management.\
    \ By merging data from multiple sources, we can gain a more comprehensive understanding\
    \ of our data and make more enlightened decisions based on the insights gained."
  mdcn: "让我们来看一个例子。\n\n## 插入完整行\n\n要向 Customers 表中插入新行，你需要为所有列提供值，因为所有列都是必填的（假设我们没有更改原始结构）：\n\
    \n```sql\nINSERT INTO Customers (CustomerID, Name, Email)\nVALUES (1, 'John Doe',\
    \ 'john.doe@example.com');\nSELECT * FROM Customers;\n```\n\n在此示例中，你正在添加一个新客户，其\
    \ CustomerID 为 1，姓名为 'John Doe'，电子邮件为 'john.doe@example.com'。\n\n### 输出\n\n```\n\
    1|John Doe|john.doe@example.com\n```\n\n## 插入多行\n\n你也可以通过提供多组值，在单个语句中插入多行：\n\n\
    ```sql\nINSERT INTO Customers (CustomerID, Name, Email)\nVALUES (2, 'Jane Smith',\
    \ 'jane.smith@example.com'),\n      (3, 'Emily Johnson', 'emily.johnson@example.com');\n\
    SELECT * FROM Customers;\n```\n\n### 输出\n\n```\n1|John Doe|john.doe@example.com\n\
    2|Jane Smith|jane.smith@example.com\n3|Emily Johnson|emily.johnson@example.com\n\
    ```\n\n此语句添加了另外两个客户，每个客户都有自己的 ID、姓名和电子邮件地址。\n\n## 更新表\n\n在 SQL 中，当你需要修改数据库中已存储的数据时，就会执行\
    \ UPDATE 命令。\n\n### 语法：\n\n```sql\nUPDATE table_name\nSET column1 = value1, column2\
    \ = value2\nWHERE condition\n```\n\n### 示例\n\n```sql\nUPDATE Customers\nSET Email\
    \ = 'new.email@example.com'\nWHERE CustomerID = 1;\n\nSELECT * FROM Customers;\n\
    ```\n\n### 输出\n\n```\n1|John Doe|new.email@example.com\n2|Jane Smith|jane.smith@example.com\n\
    3|Emily Johnson|emily.johnson@example.com\n```\n\n通常，先运行 SELECT 语句以确保你正在更新正确的记录是一个好习惯，尤其是在行数很多的表中。在执行批量更新之前，请考虑备份你的数据，因为不正确的\
    \ UPDATE 可能会更改表中的所有行。\n\n## 删除数据\n\n如果你已有表中的条目并希望删除它们，可以使用 SQL 中的 DELETE 命令从表中删除记录。\n\
    \n### 语法：\n\n```sql\nDELETE FROM table_name\nWHERE condition\n```\n\n### 示例\n\n\
    ```sql\nDELETE FROM Customers\nWHERE CustomerID = 1;\nSELECT * FROM Customers;\n\
    ```\n\n### 输出\n\n```\n2|Jane Smith|jane.smith@example.com\n3|Emily Johnson|emily.johnson@example.com\n\
    ```\n\n在此示例中，`WHERE CustomerID = 1` 是指定要删除哪条记录的条件。在这种情况下，它是 CustomerID 等于 1 的记录。\n\
    \n## 第五章：基础与高级查询技术\n\nSQL 促进了与关系型数据库的通信。以下是一些用于选择数据的基础和高级方法列表：\n\n## JOIN\n\n\
    JOIN 操作将两个或多个表中的数据组合起来，前提是它们之间至少有一个公共列。\n\n### 语法：\n\n```sql\nSELECT * FROM table1\n\
    JOIN table2\nON table1.column1 = table2.column2\n```\n\n### 代码：\n\n```sql\nSELECT\
    \ *\nFROM Store_Tab\nJOIN Staff_Tab\nON Store_Tab.Store_id = Staff_Tab.Staff_id;\n\
    ```\n\n### 输出：\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_302_0.png)\n\n## GROUP\
    \ BY\n\n此函数根据你的列对数据进行分组，并生成聚合统计信息，如 SUM、AVG、MIN、MAX 等。\n\n### 语法：\n\n```sql\n\
    SELECT column_name, SUM(column_name)\nFROM table_name\nGROUP BY column_name\n\
    ```\n\n### 代码：\n\n```sql\nSELECT Store_id, SUM(Store_id)\nFROM Store_Tab\nGROUP\
    \ BY Store_id;\n```\n\n### 输出：\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_303_0.png)\n\
    \n## HAVING\n\nHAVING 子句是一个过滤器，它根据特定条件对分组进行排序。\n\n### 语法：\n\n```sql\nSELECT column_name,\
    \ SUM(column_name)\nFROM table_name\nGROUP BY column_name\nHAVING SUM(column_name)\
    \ [ Condition ]\n```\n\n### 代码：\n\n```sql\nSELECT Store_id, SUM(Store_id)\nFROM\
    \ Store_Tab\nGROUP BY Store_id\nHAVING SUM(Store_id) > 10;\n```\n\n### 输出：\n\n\
    ![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_304_0.png)\n\n## UNION\n\nUNION 运算符将多个\
    \ SELECT 查询的结果合并为一个整体结果集。\n\n### 语法：\n\n```sql\nSELECT column_name FROM table_name\n\
    UNION\nSELECT column_name FROM table_name\n```\n\n### 代码：\n\n```sql\nSELECT Store_Name\n\
    FROM Store_Tab\nUNION\nSELECT Staff_Name\nFROM Staff_Tab;\n```\n\n### 输出：\n\n\
    ![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_304_1.png)\n\n## ORDER BY\n\n我们可以使用 \"\
    ORDER BY\" 子句对 SQL 查询的输出进行排序，它允许你按降序或升序对结果进行排序。当主要根据一个或多个列对 SELECT 的结果进行排序时，语句中会使用\
    \ \"ORDER BY\" 短语。\n\n### 语法：\n\n```sql\nSELECT column1, column2\nFROM table_name\n\
    ORDER BY column_name\n```\n\n### 代码：\n\n```sql\nSELECT Store_Name, Store_id\n\
    FROM Store_Tab\nORDER BY Store_id;\n```\n\n### 输出：\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_305_0.png)\n\
    \n## ORDER BY DESC\n\n可以使用 ORDER BY 命令按升序或降序对结果集进行分类。ORDER BY 命令默认使用升序对结果集进行排序。使用\
    \ DESC 关键字可按从高到低的降序对条目进行排序。\n\n### 语法：\n\n```sql\nSELECT column1, column2\nFROM\
    \ table_name\nORDER BY column_name DESC\n```\n\n### 代码：\n\n```sql\nSELECT Staff_Name,\
    \ Staff_salary, Staff_id\nFROM Staff_Tab\nORDER BY Staff_id DESC;\n```\n\n###\
    \ 输出：\n\n| Staff_Name | Staff_salary | Staff_id |\n|---|---|---|\n| Andrew Smith\
    \ | 2500 | 35 |\n| Janet Yew | 5000 | 20 |\n\nORDER BY 升序示例：\n\n### 语法：\n\n```sql\n\
    SELECT column1, column2\nFROM table_name\nORDER BY column_name ASC\n```\n\n###\
    \ 代码：\n\n```sql\nSELECT Staff_Name, Staff_salary, Staff_id\nFROM Staff_Tab\nORDER\
    \ BY Staff_id ASC;\n```\n\n### 输出：\n\n| Staff_Name | Staff_salary | Staff_id |\n\
    |---|---|---|\n| Janet Yew | 5000 | 20 |\n| Andrew Smith | 2500 | 35 |\n\n## INTERSECT\n\
    \nUNION 命令和 INTERSECT 运算符作用于一组 SQL 语句，而 INTERSECT 运算符作用于两个语句。INTERSECT 和 UNION\
    \ 运算符的功能类似于 OR 运算符。然而，INTERSECT 运算符的功能也类似于 AND 运算符。这是两者之间的主要区别。\n\n### 语法：\n\n\
    ```sql\nSELECT column_name FROM table_name\nINTERSECT\nSELECT column_name FROM\
    \ table_name\n```\n\n### 代码：\n\n```sql\nSELECT Store_id FROM Store_Tab\nINTERSECT\n\
    SELECT Staff_id FROM Staff_Tab;\n```\n\n### 输出：\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_307_0.png)\n\
    \n## MINUS\n\nMINUS 命令也同时作用于两个不同的 SQL 查询。MINUS 命令首先保留第一个语句的结果。然后，它获取从第二个语句收到的结果，并将其从从第一个语句获得的结果中减去，以得出最终结果。如果第二个语句产生了未从第一个语句获得的结果，那么第一个结果将被忽略，第二个结果将被视为有效。需要注意的是，MINUS\
    \ 命令只能选择彼此唯一的值。\n\n### 语法：\n\n```sql\nSELECT column_name FROM table_name\nMINUS\n\
    SELECT column_name FROM table_name\n```\n\n### 代码：\n\n```sql\nSELECT Store_id\
    \ FROM Store_Tab\nMINUS\nSELECT Staff_id FROM Staff_Tab;\n```\n\n### 输出：\n\n|\
    \ | Store_id |\n|---|---|\n| 1 | 30 |\n| 2 | 22 |\n| 3 | 20 |\n| 4 | 48 |\n\n\
    | | Staff_id |\n|---|---|\n| 1 | 20 |\n| 2 | 35 |\n\n## 第六章：高级 SQL 技术与优化\n\n##\
    \ 连接表与处理多个数据源\n\n在许多场景中，处理分布在多个表或数据源中的数据可能具有挑战性。这就是连接表概念发挥作用的地方。连接表是将来自多个表的数据组合成单个结果集的过程。这是通过识别表之间的公共列来实现的，该列可用于匹配行。通过这样做，我们可以创建一个更全面、更有用的数据集，从而提供有价值的见解并辅助决策。\n\
    \n在 SQL 中连接表是一种基础技术，广泛用于数据管理和分析。它允许我们从不同的表中检索数据并将其组合成单个结果集。连接表使用 JOIN 运算符执行，该运算符可以与不同类型的连接一起使用，例如内连接、左外连接和右外连接。使用的连接类型取决于所需的结果。\n\
    \n内连接是 SQL 中最常见的连接类型。它只从两个表中获取具有匹配值的行。因此，没有匹配值的行将被排除在结果集之外。另一方面，左外连接和右外连接从一个表中检索每一行，并从另一个表中检索任何匹配的行。如果没有匹配的行，非匹配的行将具有\
    \ NULL 值。当我们想从一个表中检索所有数据，但只从另一个表中检索匹配的数据时，这很有用。\n\n在 SQL 中连接表可能是一项艰巨的任务，尤其是在处理大型数据集时。充分理解数据结构以及表之间的连接方式非常重要。然而，一旦掌握，它就是数据分析和管理的极其有效的工具。通过合并来自多个源的数据，我们可以更全面地理解我们的数据，并根据获得的见解做出更明智的决策。"
