    \n## Chapter 11: Asynchronous Programming\n\n## Asynchronous vs. Synchronous communication\n\
    \nBefore we get started, let's define these two terms: synchronous and asynchronous.\n\
    It is a synchronous, single-threaded language of programming by default. This\
    \ indicates that instructions may only be executed sequentially, not concurrently.\
    \ Consider the following code snippet:\n\n```javascript\nlet a = 1;\nlet b = 2;\n\
    let sum = a + b;\nconsole.log(sum);\n```\n\nThe given code sums two integers and\
    \ then reports the result to the web console. The interpreter performs these instructions\
    \ sequentially until they are completed.\nYet, there are several drawbacks to\
    \ this strategy. Suppose we want to get a large quantity of data from a repository\
    \ and present it on our UI. When the interpreter finds the instruction that retrieves\
    \ this data, the remainder of the code is halted until the data is retrieved and\
    \ returned. You can argue that the information to also be retrieved isn't that\
    \ vast and won't take long. Assume you need to get data from numerous locations.\
    \ This delay, when combined, does not seem like anything people would want to\
    \ encounter. Fortunately, the issues with synchronous JavaScript were solved with\
    \ the introduction of asynchronous JavaScript.\nConsider asynchronous programming\
    \ to be code that may start now and end later. Because JavaScript runs asynchronously,\
    \ the commands are not always performed sequentially, as we previously observed.\
    \ There are a various of unique techniques that developers have tried throughout\
    \ the years to appropriately handle this asynchronous behavior. Each solution\
    \ improves on the one before it, making the code more efficient and simpler to\
    \ comprehend if it becomes complicated.\nTo further comprehend JavaScript's asynchronous\
    \ nature, we'll look at callback functions, promises, async and await.\n\n## What\
    \ are JavaScript callbacks?\n\nA callback is a procedure that is given within\
    \ another function and then invoked to accomplish a job inside that function.\n\
    A console-logging software is above. It's new. The interpreter executes the first\
    \ two instructions but skips the third and executes the last.\nJavaScript's two-parameter\
    \ setTimeout method. The first argument is yet another procedure, and the next\
    \ is a millisecond timeout. Callbacks are now defined.\nThis setTimeout method\
    \ must execute after 2 seconds (2000 milliseconds). Imagine it being taken away\
    \ to be processed in a different browser section while the other\n\n### Code\n\
    \n```javascript\nconsole.log('fired first');\nconsole.log('fired second');\nsetTimeout(()=>{\n\
    \    console.log('fired third');\n},2000);\nconsole.log('fired last');\n```\n\n\
    ### Output\n\n```\nfired first\nfired second\nfired last\nfired third\n```\n\n\
    ## Promises in JavaScript\n\nPromises fixed callback functions. Promises to need\
    \ two functions. Resolve and refuse. Resolve is a success, and reject is wrong.\n\
    \n### Example\n\n```javascript\nconst getData = (dataEndpoint) => {\n    return\
    \ new Promise ((resolve, reject) => {\n        //some request to the endpoint;\n\
    \n        if(request is successful){\n            //do something;\n          \
    \  resolve();\n        }\n        else if(there is an error){\n            reject();\n\
    \        }\n\n    });\n};\n```\n\nA request to an endpoint encloses the promise\
    \ above. As said, the promise requires resolution and rejection. If the endpoint\
    \ call succeeds, we fulfil the promise and use the response. Errors invalidate\
    \ promises. Promise chaining can solve callback issues. This approach successively\
    \ retrieves data from numerous endpoints with much less code and simpler procedures.\n\
    \n## JavaScript's Async/Await\n\nChaining promises like callbacks may become messy.\
    \ Therefore, Async and Await.\n\n### Async Syntax\n\n```javascript\nconst asyncFunc\
    \ = async() => {\n}\n```\n\nAsync functions always return Promises;\n\n```javascript\n\
    const test = asyncFunc();\nconsole.log(test);\n```\n\nAsyncFunc delivers a promise\
    \ in the browser console.\n\n```javascript\nconst asyncFunc = async () => {\n\
    \    const response = await fetch(resource);\n    const data = await response.json();\n\
    }\n```\n\nWe may use await now to defer assigning till the .json method resolves.\n\
    \n## Chapter 12: JavaScript Framework and Libraries\n\nThere is a notable difference\
    \ between a programming framework and a library, even though they could seem to\
    \ be the same thing or conceptually equivalent at first glance. It is necessary\
    \ to consider the purposes for which they were designed.\n\n## Comparing Libraries\
    \ and Frameworks\n\nIn computer programming, a \"framework\" is a collection of\
    \ related \"library\" files to solve a certain problem. The key difference it\
    \ offers is that the creator retains control over how it is used.\n\n### Library\
    \ Definition\n\nThe library is a collection of code developers can include addressing\
    \ a specific problem in their projects. For a library's code to be useful across\
    \ various applications and scenarios, it has to be flexible and highly reusable.\
    \ The timing of when the developer uses the library in their code is entirely\
    \ up to them, and they are free to do so many times if they deem it essential.\n\
    \n### Framework Definition\n\nA Framework, in contrast, offers developers a more\
    \ tightly organized code that they may insert their code at specified points of\
    \ control. These points enable the developer to extend the framework's capabilities\
    \ to meet their requirements. The framework is responsible for calling the developer-provided\
    \ code when it considers it required.\n\nThe primary distinction is the developer's\
    \ control over the code's application. Frameworks invoke the developer's code,\
    \ which may then use Libraries to tackle common or difficult issues more readily.\n\
    \nAs a real-world analogy, consider the bread-making process. Various stages must\
    \ occur in a certain sequence for the production of bread. A framework for bread\
    \ production can include, for instance:\n\n```javascript\n// Make Bread Framework\n\
    function plantWheat() {\n    // Put the code for Planting Wheat here\n}\nfunction\
    \ millFlour() {\n    // Put the code for Milling Flour here\n}\nfunction makeBread()\
    \ {\n    // Put the code for Making Bread here\n}\nfunction produceBread() {\n\
    \    plantWheat();\n    millFlour();\n    makeBread();\n}\n```\n\nNo matter what\
    \ occurs, makeBread() will always execute in the same manner. First, it will cultivate\
    \ wheat, mill it into flour, and last, utilize the flour to produce the bread.\n\
    Yet, this framework provides the control plant points\nWheat(), millFlour(), and\
    \ makeBread() let you describe the planting of wheat, milling of flour, and baking\
    \ of bread. Depending on the inner workings of the control points, the bread you\
    \ create might be vastly different, even though the foundation for their product\
    \ remains the same.\nLet's further specify this method by establishing these control\
    \ points.\nWe wish to mill wheat into flour, eventually used to produce bread.\
    \ Nevertheless, these processes might generate the desired result in drastically\
    \ diverse ways. So, this is where the library comes in.\n\n```javascript\nimport\
    \ * as farm from './modules/farm.js';\nimport * as windmill from './modules/windmill.js';\n\
    import * as bakery from './modules/bakery.js';\n// Make Bread Framework\nfunction\
    \ plantWheat() {\n    farm.plantWheat();\n}\nfunction millFlour() {\n    getWheat();\n\
    \    mill.millFlour();\n}\n```"
