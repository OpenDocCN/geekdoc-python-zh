    \ immutable identifiers. They are often used as keys in object properties to ensure\
    \ uniqueness and avoid naming conflicts. JavaScript objects and classes can be\
    \ customized with unique behaviors using symbols, which offer a certain degree\
    \ of privacy.\n\n## undefined\n\nA variable or attribute that is either nonexistent\
    \ or has not been given a value is represented by the value \"undefined.\" It\
    \ is one of JavaScript's basic data types and represents the absence of a relevant\
    \ value.\n\nWhen a variable is declared but not assigned a value, or if a property\
    \ does not exist in an object, its value is automatically set to ‘undefined.’\
    \ For example:\n\n```\nlet myVariable;\nconsole.log(myVariable); // undefined\n\
    \nconst myObject = {};\nconsole.log(myObject.property); // undefined\n```\n\n\
    In the above example, the variable ‘myVariable’ is declared but not assigned a\
    \ value, so its value is ‘undefined.’ Similarly, the property key does not exist\
    \ in the ‘myObject’ object, so accessing it returns ‘undefined.’ It's important\
    \ to note that ‘undefined’ is distinct from other values like ‘null,’ ‘false,’\
    \ or an empty string (\"\"). It represents the absence of any value, whereas null\
    \ is an explicitly assigned value that represents the absence of an object.\n\n\
    It's also possible to directly give the value undefined to a variable. For instance,\n\
    \n```\nlet name = undefined;\nconsole.log(name); // undefined\n```\n\nIt’s a best\
    \ practice to use ‘null’ to give a variable an \"unknown\" or \"empty\" value\
    \ rather than assigning ‘undefined’ directly to a variable.\n\n## null\n\nA unique\
    \ basic data type called \"null\" denotes the intended lack of any object value.\
    \ It is used to show that a property or variable has been specifically given the\
    \ value \"null,\" indicating that it is purposefully pointing to nothing.\n\n\
    When a variable or property is assigned the value ‘null,’ it signifies that there\
    \ is an absence of a meaningful value or that it is explicitly set to indicate\
    \ \"no value.\" For example:\n\n```\nlet myVariable = null;\nconsole.log(myVariable);\
    \ // null\n\nconst myObject = {\n  property: null\n};\nconsole.log(myObject.property);\
    \ // null\n```\n\nThe variable \"myVariable\" in the example above has the value\
    \ \"null,\" meaning that it represents nothing. Similarly, the ‘property’ key\
    \ of the ‘myObject’ object is explicitly set to ‘null.’\nUnlike ‘undefined,’ which\
    \ indicates that a variable or property has not been assigned a value, ‘null’\
    \ is a value that is deliberately assigned to represent the absence of an object\
    \ or value. It can be used to indicate that a variable or property is intentionally\
    \ devoid of any meaningful data.\nWhen working with null, it's important to handle\
    \ it appropriately in your code. If you encounter a variable or property with\
    \ a value of null, you can check for it explicitly and handle it according to\
    \ your application's logic.\n\n## typeof\n\nThe built-in unary operator called\
    \ \"typeof\" lets you establish the data type of a given item or expression. It\
    \ gives back a string that describes the operand's type.\nThe syntax for using\
    \ the typeof operator is as follows:\n\n```\ntypeof operand\n```\n\nHere, the\
    \ ‘operand’ can be any value or expression that you want to evaluate the type\
    \ of. The ‘typeof’ operator returns a string representing the data type of the\
    \ operand.\nHere are some examples of using the typeof operator:\n\n```\nconsole.log(typeof\
    \ 42); // \"number\"\nconsole.log(typeof \"Hello\"); // \"string\"\nconsole.log(typeof\
    \ true); // \"boolean\"\nconsole.log(typeof undefined); // \"undefined\"\nconsole.log(typeof\
    \ null); // \"object\"\nconsole.log(typeof Symbol(\"symbol\")); // \"symbol\"\n\
    console.log(typeof BigInt(10)); // \"bigint\"\nconsole.log(typeof [1, 2, 3]);\
    \ // \"object\"\nconsole.log(typeof { name: \"Mike\" }); // \"object\"\n```\n\n\
    Note that this operator has some limits. For example, it treats ‘null’ as an object,\
    \ which is a historical mistake in JavaScript.\nThe ‘typeof’ operator is often\
    \ used in conditional statements, type checking, and debugging scenarios to perform\
    \ specific actions based on the data type of a value.\n\n## JavaScript Data Types\
    \ – Recap\n\nThe following table provides a recap of JavaScript data types:\n\n\
    | Data Types | Description | Example |\n| :--- | :--- | :--- |\n| **String** |\
    \ displays textual information | \"Hello world!\", ‘hello’ |\n| **Number** | an\
    \ integer or a floating-point value | 3, 3.234, 3e-2, etc. |\n| **BigInt** | a\
    \ number with undetermined precision | 900719925124740999n, 1n |\n| **Boolean**\
    \ | either of the 2 values: true or false | true and false |\n| **Object** | key-value\
    \ pairs in a data collection | let student = { }; |\n| **Symbol** | data type\
    \ with immutable, unique instances. | let value = Symbol('hello'); |\n| **undefined**\
    \ | Uninitialized data type variable | let a; |\n| **null** | represents a null\
    \ value | let a = null; |\n\nThe Object data type in the above table is not a\
    \ primitive data type, but all other data types are primitive. The non-primitive\
    \ Object data type may hold data collections, while primitive data types can only\
    \ store a single piece of information."
  mdcn: "运算符（`&&`、`||`、`!`）用于执行逻辑运算并得出布尔值。\n布尔值在控制结构（如 `if` 语句和循环）中起着至关重要的作用（我们将在第\
    \ 3 章和第 4 章详细讨论）。例如：\n\n```\nconst isRaining = true;\n\nif (isRaining) {\n   \
    \ console.log(\"Take an umbrella!\");\n} else {\n    console.log(\"Enjoy the sunshine!\"\
    );\n}\n```\n\n## 对象\n\nJavaScript 中的对象是键值对的集合，其中键是字符串（或 Symbol），值可以是数字、字符串、函数，甚至是其他对象。这些键值对被称为对象的属性。\n\
    对象可以使用对象字面量语法（即一对花括号 `{}`）创建，也可以使用 `new` 关键字后跟构造函数或类来创建。\n以下是使用对象字面量语法创建对象的示例：\n\
    \n```\nconst person = {\n    name: \"Mike\",\n    age: 30,\n    profession: \"\
    Engineer\"\n};\n```\n\n在上面的例子中，`person` 是一个具有三个属性的对象：`name`、`age` 和 `profession`。每个属性都定义了一个键值对，其中字符串作为键（`\"\
    name\"`、`\"age\"` 和 `\"profession\"`），任何类型的数据作为值。\n对象中的属性可以使用点表示法或方括号表示法访问。例如：\n\
    \n```\nconsole.log(person.name); // \"Mike\"\nconsole.log(person[\"age\"]); //\
    \ 30\n```\n\n对象创建后，属性可以被添加、修改或删除，这使得对象本质上是动态的。\n以下是修改对象属性的示例：\n\n```\nperson.age\
    \ = 35;\nconsole.log(person.age); // 35\n```\n\n总的来说，JavaScript 中的对象是强大且多功能的数据结构，能够以键值对的形式组织和操作数据。它们为\
    \ JavaScript 中的面向对象编程奠定了基础，并广泛应用于 Web 开发的各个方面，包括状态管理、现实世界实体建模以及与文档对象模型（DOM）的交互。\n\
    \n## Symbol\n\nSymbol 是一种原始数据类型，用于创建唯一且不可变的标识符。Symbol 通常用作对象属性的键，以避免命名冲突并提供一定程度的隐私性。\n\
    你可以使用 `Symbol()` 函数来创建一个 symbol。每个使用 `Symbol()` 创建的 symbol 都是唯一的，即使提供的描述相同。例如：\n\
    \n```\nconst symbol1 = Symbol();\nconst symbol2 = Symbol();\n\nconsole.log(symbol1\
    \ === symbol2); // false\n```\n\nSymbol 也可以带有可选的描述创建，这对于调试或提供额外信息很有用。描述不会影响 symbol\
    \ 的唯一性。例如：\n\n```\nconst symbol3 = Symbol(\"symbolDescription\");\nconst symbol4\
    \ = Symbol(\"symbolDescription\");\n\nconsole.log(symbol3 === symbol4); // false\n\
    ```\n\nSymbol 主要用作对象属性的键。当代码的多个部分使用相同的属性名时，它们有助于避免意外的名称冲突。以下是一个示例：\n\n```\nconst\
    \ id = Symbol(\"id\");\n\nconst user = {\n  name: \"Mike\",\n  [id]: 123\n};\n\
    \nconsole.log(user[id]); // 123\n```\n\n在上面的例子中，`id` symbol 被用作 `user` 对象中的属性键。使用方括号表示法以\
    \ symbol 作为键来访问属性值。\n\n你可以使用 `Object.getOwnPropertySymbols()` 方法显式地检索 symbol。例如：\n\
    \n```\nconst id = Symbol(\"id\");\n\nconst user = {\n  name: \"Mike\",\n  [id]:\
    \ 123\n};\n\nconst symbols = Object.getOwnPropertySymbols(user);\nconsole.log(symbols);\
    \ // [Symbol(id)]\nconsole.log(user[symbols[0]]); // 123\n```\n\nSymbol 还有内置的众所周知的\
    \ symbol，例如 `Symbol.iterator` 和 `Symbol.toStringTag`，它们可用于自定义 JavaScript 中对象或类的行为。\n\
    \n总之，JavaScript 中的 symbol 是唯一且不可变的标识符。它们通常用作对象属性的键，以确保唯一性并避免命名冲突。JavaScript 对象和类可以使用\
    \ symbol 来定制独特的行为，这提供了一定程度的隐私性。\n\n## undefined\n\n值 `\"undefined\"` 表示一个不存在或尚未被赋值的变量或属性。它是\
    \ JavaScript 的基本数据类型之一，表示相关值的缺失。\n\n当一个变量被声明但未被赋值，或者对象中不存在某个属性时，其值会自动设置为 `undefined`。例如：\n\
    \n```\nlet myVariable;\nconsole.log(myVariable); // undefined\n\nconst myObject\
    \ = {};\nconsole.log(myObject.property); // undefined\n```\n\n在上面的例子中，变量 `myVariable`\
    \ 被声明但未被赋值，所以它的值是 `undefined`。同样，属性键在 `myObject` 对象中不存在，所以访问它会返回 `undefined`。需要注意的是，`undefined`\
    \ 与其他值（如 `null`、`false` 或空字符串 `\"\"`）是不同的。它表示任何值的缺失，而 `null` 是一个被显式赋值的值，表示对象的缺失。\n\
    \n也可以直接将值 `undefined` 赋给一个变量。例如，\n\n```\nlet name = undefined;\nconsole.log(name);\
    \ // undefined\n```\n\n最佳实践是使用 `null` 来给变量一个“未知”或“空”的值，而不是直接将 `undefined` 赋给变量。\n\
    \n## null\n\n一种独特的基本数据类型叫做 `\"null\"`，它表示有意缺少任何对象值。它用于表示一个属性或变量被特意赋予了值 `\"null\"\
    `，表明它有意指向无。\n\n当一个变量或属性被赋值为 `null` 时，它表示没有有意义的值，或者被显式设置为表示“无值”。例如：\n\n```\nlet\
    \ myVariable = null;\nconsole.log(myVariable); // null\n\nconst myObject = {\n\
    \  property: null\n};\nconsole.log(myObject.property); // null\n```\n\n在上面的例子中，变量\
    \ `myVariable` 的值是 `null`，意味着它表示无。同样，`myObject` 对象的 `property` 键被显式设置为 `null`。\n\
    与 `undefined`（表示变量或属性尚未被赋值）不同，`null` 是一个被特意赋值以表示对象或值缺失的值。它可以用来表示一个变量或属性有意地不包含任何有意义的数据。\n\
    使用 `null` 时，在代码中适当地处理它很重要。如果你遇到一个值为 `null` 的变量或属性，你可以显式地检查它，并根据你的应用程序逻辑进行处理。\n\
    \n## typeof\n\n名为 `\"typeof\"` 的内置一元运算符允许你确定给定项或表达式的数据类型。它返回一个描述操作数类型的字符串。\n使用\
    \ `typeof` 运算符的语法如下：\n\n```\ntypeof operand\n```\n\n这里，`operand` 可以是任何你想要评估其类型的值或表达式。`typeof`\
    \ 运算符返回一个表示操作数数据类型的字符串。\n以下是使用 `typeof` 运算符的一些示例：\n\n```\nconsole.log(typeof 42);\
    \ // \"number\"\nconsole.log(typeof \"Hello\"); // \"string\"\nconsole.log(typeof\
    \ true); // \"boolean\"\nconsole.log(typeof undefined); // \"undefined\"\nconsole.log(typeof\
    \ null); // \"object\"\nconsole.log(typeof Symbol(\"symbol\")); // \"symbol\"\n\
    console.log(typeof BigInt(10)); // \"bigint\"\nconsole.log(typeof [1, 2, 3]);\
    \ // \"object\"\nconsole.log(typeof { name: \"Mike\" }); // \"object\"\n```\n\n\
    请注意，此运算符有一些限制。例如，它将 `null` 视为对象，这是 JavaScript 中的一个历史错误。\n`typeof` 运算符通常用于条件语句、类型检查和调试场景中，以根据值的数据类型执行特定操作。\n\
    \n## JavaScript 数据类型 – 回顾\n\n下表提供了 JavaScript 数据类型的回顾：\n\n| 数据类型 | 描述 | 示例 |\n\
    | :--- | :--- | :--- |\n| **String** | 显示文本信息 | \"Hello world!\", ‘hello’ |\n\
    | **Number** | 整数或浮点值 | 3, 3.234, 3e-2, 等 |\n| **BigInt** | 精度不确定的数字 | 900719925124740999n,\
    \ 1n |\n| **Boolean** | 两个值之一：true 或 false | true 和 false |\n| **Object** | 数据集合中的键值对\
    \ | let student = { }; |\n| **Symbol** | 具有不可变、唯一实例的数据类型。 | let value = Symbol('hello');\
    \ |\n| **undefined** | 未初始化的数据类型变量 | let a; |\n| **null** | 表示空值 | let a = null;\
    \ |\n\n上表中的 Object 数据类型不是原始数据类型，但所有其他数据类型都是原始数据类型。非原始的 Object 数据类型可以持有数据集合，而原始数据类型只能存储单个信息。"
