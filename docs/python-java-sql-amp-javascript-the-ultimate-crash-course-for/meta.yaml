    \n# Getting Started\n\nTo begin working with Webpack, we must install it using\
    \ the npm package manager. Using the following command on our terminal will allow\
    \ us to do this:\n\n```\nnpm install webpack webpack-cli --save-dev\n```\n\nThe\
    \ most recent version of Webpack and its command-line interface will be installed\
    \ due to this (CLI). Using the command line, Webpack is executed via the command\
    \ line interface (CLI).\nWhen Webpack has been installed, all required to bundle\
    \ our application is a simple JavaScript file and some CSS. For the demonstration,\
    \ we will construct a simple web page with a button that allows us to alter the\
    \ colour of the page's backdrop.\n\n```\n// index.js\nimport './style.css';\n\
    document.querySelector('button').addEventListener('click', () => {\n  document.body.style.backgroundColor\
    \ = 'red';\n});\n/* style.css */\nbutton {\n  background-color: blue;\n}\n```\n\
    \nWith a simple HTML file, we will be able to execute this code in the browser:\n\
    \n```\n<!doctype html>\n<html>\n  <head>\n    <title>Webpack Example</title>\n\
    \  </head>\n  <body>\n```"
  merge: -1
  pgno: 441
- img_proc: true
  md: "```\n<h1>Webpack Example</h1>\n<button>Change Color</button>\n<script src=\"\
    index.js\"></script>\n</body>\n</html>\n```\n\nNow that we have Webpack, we can\
    \ combine JavaScript and CSS into a single file using that tool. To do this, a\
    \ Webpack configuration file has to be created. In the directory that is the base\
    \ of our project, we may create a file with the name webpack.config.js and fill\
    \ it with the following contents:\n\n```\nconst path = require('path');\nmodule.exports\
    \ = {\n  entry: './index.js',\n  Output {\n    filename: 'bundle.js',\n    path:\
    \ path.resolve(__dirname, 'dist'),\n  },\n  module: {\n    rules: [\n      {\n\
    \        test: /\\.css$/i,\n        use: ['style-loader', 'css-loader'],\n   \
    \   },\n    ],\n  },\n};\n```\n\nThis configuration file instructs Webpack to\
    \ use index.js as the entry point for our application and to output the bundled\
    \ code to a file named bundle.js in a new directory named dist. It also tells\
    \ Webpack to output the bundled code to a file named bundle.js in the application's\
    \ root directory.\nAlso, a module rule is specified to manage CSS files using\
    \ the style-loader and the CSS-loader. Whereas the css-loader is responsible for\
    \ interpreting the CSS and resolving any dependencies, the style loader injects\
    \ it into the HTML content during runtime."
  merge: -1
  pgno: 442
- img_proc: true
  md: "Now that everything is set up, we can execute Webpack from the command line\
    \ by using the following command:\n\n```\nnpm webpack\n```\n\nThis will start\
    \ Webpack and create a new file in the dist directory called bundle.js. Now that\
    \ we have this new file, we can change our HTML file to incorporate it:\n\n```\n\
    <!doctype html>\n<html>\n  <head>\n    <title>Webpack Example</title>\n  </head>\n\
    \  <body>\n    <h1>Webpack Example</h1>\n    <button>Change Color</button>\n \
    \   <script src=\"dist/bundle.js\"></script>\n  </body>\n</html>\n```\n\nWhen\
    \ we load up this file in a browser, we will see that the website's background\
    \ color is altered when we click our button.\nOne of the most useful tools for\
    \ current web development is Webpack since it bundles and optimizes assets. Because\
    \ of its adaptability and extensibility, it can be set up to support a wide variety\
    \ of development workflows and can be combined with a wide variety of plugins\
    \ to improve the efficiency of the build process further. Both of these features\
    \ allow it to be utilized in several different contexts. Developers can enhance\
    \ the functionality of their web apps and provide their customers with a more\
    \ satisfying experience by using the usage of Webpack.\n\n# Babel\n\nBabel is\
    \ a popular JavaScript compiler that enables developers to write code in the most\
    \ recent version of JavaScript (ES6/ES2015 and beyond) and convert it into backwards-compatible\
    \ versions that can run on older browsers or environments that do not yet support\
    \ the most recent syntax or features. Babel also allows developers to write code\
    \ in a language beyond the most recent version of JavaScript. In the present world\
    \ of web"
  merge: -1
  pgno: 443
- img_proc: true
  md: "development, where new features and syntax are being released quickly, Babel\
    \ is a crucial tool. This is because developers want to use these new capabilities\
    \ while keeping backward compatibility with older browsers. Babel's ability to\
    \ enable developers to employ new language capabilities that are not yet widely\
    \ supported by browsers is one of the most significant advantages offered by the\
    \ platform. For instance, earlier browsers did not support the arrow functions\
    \ and template literals introduced in ES6. These functions were introduced in\
    \ ES6. Babel may convert this code into an equivalent version that will operate\
    \ with browsers of a previous generation. Babel has the additional benefit of\
    \ being compatible with various tools and frameworks, such as webpack, gulp, and\
    \ rollup. This is just another one of its many benefits. Moreover, well-known\
    \ frameworks like React, Vue, and Angular may be used with Babel.\n\nThe following\
    \ is a selection of examples demonstrating how Babel may be used to convert code\
    \ written in ES6 to code written in ES5:\n\n# Arrow Functions\n\nThe arrow function\
    \ syntax was first introduced in ES6, enabling developers to construct more succinct\
    \ functions. On the other hand, older browsers do not allow arrow functions. Babel\
    \ can translate the syntax of arrow functions into code that is equivalent and\
    \ will operate in earlier browsers as follows:\n\n```\n// ES6 arrow function\n\
    const add = (a, b) => a + b;\n\n// Transpiled ES5 code\nvar add = function add(a,\
    \ b) {\n  return a + b;\n};\n```\n\n# Template literals\n\nIn addition, ES6 introduces\
    \ template literals, which make it possible for programmers to include expressions\
    \ in string literals. Template literals are not supported in browsers of the previous\
    \ generation. Babel may transform template literals into comparable code that\
    \ is compatible with older browsers in the following ways:\n\n```\n// ES6 template\
    \ literal\nconst name = 'Mike';\n```"
  merge: -1
  pgno: 444
- img_proc: true
  md: '```

    const message = `Hello, ${name}!`;

    // Transpiled ES5 code

    var name = ''Mike'';

    var message = ''Hello, '' + name + ''!'';

    ```


    # Destructuring assignment


    The destructuring assignment was another feature introduced with ES6, and it gives
    programmers the ability to pull values out of arrays or objects and assign them
    to variables. Older browsers do not support the destructuring assignment programming
    construct. Babel can convert destructuring assignments into comparable code that
    is compatible with earlier browsers, including the following:


    ```

    // ES6 destructuring assignment

    const person = { name: ''Mike'', age: 30 };

    const { name, age } = person;

    // Transpiled ES5 code

    var person = { name: ''Mike'', age: 30 };

    var name = person.name;

    var age = person.age;

    ```


    Babel is an important piece of software for contemporary web development since
    it enables developers to use the most recent features and syntax while preserving
    compatibility with older web browsers. Using Babel, developers can write code
    in the most recent version of JavaScript and then have it automatically transpire
    into earlier versions. These older versions of JavaScript can operate on older
    browsers or environments that do not yet support the most recent capabilities.'
  merge: -1
  pgno: 445
