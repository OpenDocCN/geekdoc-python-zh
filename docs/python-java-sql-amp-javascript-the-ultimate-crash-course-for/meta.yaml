  - '[PAGE 222]


    # Synchronization


    With concurrency comes the need to synchronize access to shared mutable states
    across threads. The synchronized keyword in Java can lock entire method sections
    or code blocks to exclude other thread entries until unlocked. Also useful are
    atomic object wrappers like:


    +   - AtomicInteger - Thread-safe counter alternative to int.

    - AtomicBoolean - Thread-safe boolean flag.

    - AtomicReference - Safe reference updates.


    Low-level locks allow finer-grained locking of objects or code regions with try/finally
    via ReentrantLock. These synchronization primitives prevent critical sections
    from overlapping and introducing race conditions or inconsistencies.


    # Best Practices


    Some concurrency best practices include designing for:


    +   - Independence - Minimize shared mutable state between threads.

    - Isolation - Wrap shared access in synchronization.

    - Limited scope - Minimize lock holding durations.

    - Non-blocking - Use concurrent queue patterns where possible.

    - Progress - Ensure threads cannot deadlock or livelock.

    - Recovery - Consider exception-handling strategies in concurrent contexts.

    - Performance - Profile and optimize bottlenecks.


    When applied judiciously, concurrency can significantly improve the performance
    and responsiveness of Java programs. With care taken for thread safety and synchronization,
    the full power of multi-core systems can be unleashed. Understanding the Java
    primitives for managing threads forms a strong foundation for building highly
    concurrent systems.'
  - "[PAGE 223]\n\n# Chapter 8: Advanced Java Concepts\n\n# Modules: Organizing and\
    \ Scaling Your Java Projects\n\nAs Java applications grow in size and complexity,\
    \ proper organization and modularization of the codebase becomes crucial. Left\
    \ unmanaged, a large monolithic codebase can become difficult to understand, update,\
    \ and maintain over time. The module system introduced in Java 9 provides an elegant\
    \ way to tackle these scaling challenges.\n\n# What are Modules?\n\n# Module Basics\n\
    \nIn Java, a module is simply a logical separation of code into independent units.\
    \ It allows you to compartmentalize your code into cohesive packages that represent\
    \ certain functionality or domains. Each module is self-contained and only exposes\
    \ certain APIs to other parts of the codebase via its public interfaces.\n\nModules\
    \ are declared using a simple module-info.java file at the root of the source\
    \ directories. This file defines the module name and exports/opens certain packages.\
    \ For example:\n\n```\nmodule com.example.app {\n    exports com.example.app.controllers;\n\
    }\n```\n\nHere, we define a module named 'com.example.app' that exports the 'controllers'\
    \ package, making its public classes and interfaces available to other modules.\n\
    \nUnder the hood, modules result in separate class loaders so that classes from\
    \ different modules don't conflict. This modularity helps avoid problems like\
    \ naming collisions and greatly simplifies dependency management across codebases\
    \ and applications.\n\n# Key Concepts in Modules"
  - '[PAGE 224]


    Some key concepts related to Java modules:


    +   - Modules - Logical separation of code into independent building blocks

    - Requires - Dependencies between modules defined via ''requires'' keyword

    - Exports - Control which packages are visible to dependent modules

    - Opens - Allow reflective access to classes even in non-exported packages

    - Services - Publishing and consuming services via the ServiceLoader interface

    - Provides/Uses - Resolving module dependencies via services


    By exposing only intended contracts through exports and requirements, modules
    allow the safe composition of independently developed and maintained components.


    # Application of Modules


    # Real World Uses


    Let''s look at some real-world scenarios where modules really help:


    # Application Framework as Module:


    Core framework code can be extracted as a module that cleanly separates application
    code from framework code. The framework module exports only the interfaces needed
    by the application code.


    # Plugins/Extensions:


    Rewritable modules allow others to extend functionality through plug-ins and extensions
    that require add-to-original modules functionality.


    # Library/Utility Modules:


    Common utilities, database libraries, etc., can be packaged as modular JARs that
    export only agreed-upon APIs for safe consumption.


    # Microservices:'
  - '[PAGE 225]


    Each microservice can be defined as a module boundary with strict requirements/export
    definitions between autonomous services.


    # IDE/Build Tools Integration:


    Modules define explicit compile-time and run-time dependencies that building/packaging
    tools can leverage for tasks like building, testing, packaging, and deploying
    modules.

    The key benefits of modularizing Java code include reduced coupling, improved
    readability, testability, upgradeability, and overall manageability of large and
    complex codebases over time. Though the use of modules is optional in Java, they
    offer immense promise for future-proofing applications as systems evolve.


    # Defining Modules


    Let''s look at how to construct modules in practice:


    +   1. Define module-info files:

    As mentioned earlier, each module is declared using the module-info.java file
    at the root of the source directory.

    2. Structure code into packages:

    Group related functionality into cohesive packages under the module.

    3. Specify required clauses:

    Define other module dependencies via the required keyword.

    4. Export/Open packages:

    Use exports/opens to selectively publish APIs for external use.

    5. Resolve dependencies:

    Address any dependency conflicts or issues during compilation.

    6. Build and package modules:

    Build tooling like Maven can produce modular JARs and modular layouts.

    7. Run modular applications:

    Use the java command with --module-path and --modules flags to run modular apps.


    With a little refactoring effort upfront, modules can pay huge dividends as code
    evolves from small to very large scales over time.'
  - '[PAGE 226]


    Java modules provide an effective way to organize large and complex codebases
    into cohesive bundles. By reducing tight coupling between components and defining
    explicit dependencies, modules greatly aid code readability, maintainability,
    and scalability. While optional currently, modules enable future-proofing Java
    applications as a preferred approach for componentization going forward. When
    applied correctly, modules can unlock immense gains for projects of all sizes.


    # Annotations: Adding Metadata to Your Code


    # Annotations


    Annotations in Java are a form of metadata that can be embedded directly in code
    using the ''@'' symbol. They allow attaching additional information to various
    language elements like classes, methods, fields, etc., without modifying their
    behavior. This metadata can then be consumed and acted upon through reflection
    at both compile-time and run-time.

    Annotations provide a non-intrusive way to enrich code with extra semantic information
    that can help tools, frameworks, and developers better understand code purpose
    and intent. Common uses include validation, serialization, injection, and more.
    Though optional, annotations streamline many development tasks and improve overall
    productivity.


    # Builtin Annotations


    The Java platform ships with several useful predefined annotations:


    +   - @Override: Ensures a method properly overrides a superclass one by throwing
    a compilation error if not

    - @Deprecated: Marks a symbol as deprecated and instructs users against its usage.
    Generates warning message during compilation.

    - @SuppressWarnings: Suppresses specific compilation warnings like deprecated,
    unused, etc., by attaching to fields, methods, or classes.

    - @FunctionalInterface: identifies a functional interface type - an interface
    with a single abstract method that can be assigned to lambda expressions.'
  - "[PAGE 227]\n\n+   - @SafeVarargs: Prevents unintended warnings caused by type\
    \ erasure due to polymorphic array parameters in generics.\n- @repeatable: Indicates\
