- md: "## For example:\n\n```java\npublic class Car extends Vehicle {\n    // car-specific\
    \ fields and methods\n}\n```\n\nThe Car subclass now inherits everything already\
    \ defined in the Vehicle class, like wheels, engine, move() method, etc., and\
    \ can add new fields and behaviors related to being a car. The subclass augments\
    \ but does not replace the parent class. Both could still be used independently\
    \ as needed.\n\n## Access Modifiers and Inheritance\n\nIn the object-oriented\
    \ tapestry of Java, inheritance stands as a pivotal mechanism, enabling classes\
    \ to inherit attributes and behaviors from their predecessors. However, not all\
    \ that is part of a class is meant to be freely inherited. The landscape of inheritance\
    \ is often crisscrossed with boundaries and access points, and it's here that\
    \ access modifiers come into play, guiding the flow of inheritance.\n\nAccess\
    \ modifiers determine the scope of visibility and accessibility for classes, methods,\
    \ and fields. They act as gatekeepers, deciding what parts of a class can be reached\
    \ and from where. In the realm of inheritance, they play a definitive role in\
    \ delineating how subclasses interact with the inherited code from their parent\
    \ classes.\n\nConsider the **public** access modifier, which is akin to an open\
    \ invitation. Classes or members tagged as **public** proclaim their availability\
    \ far and wide. Whether you're in the same package, a different package, or even\
    \ in a subclass, **public** members throw open their doors to you.\n\nContrast\
    \ this with the **protected** modifier, which is more selective. While it allows\
    \ members to be accessed within their own package, its unique offering is its\
    \ openness to subclasses. Subclasses, even if they are in a different package,\
    \ can freely access the **protected** attributes and methods of their parent,\
    \ making this modifier particularly significant in the inheritance paradigm.\n\
    \nHowever, not all members are as forthcoming. Some prefer to stay confined to\
    \ their local neighborhood—their package. Members adorned with the package-private\
    \ access level (signified by the absence of an access modifier) are accessible\
    \ only to classes within the same package. Subclasses outside the package are\
    \ left at the door.\n\nThe most restrictive of all is the **private** access modifier.\
    \ Guarded and exclusive, **private** members are resolutely introverted. They\
    \ allow access exclusively within their class, shutting out everyone else, including\
    \ subclasses. This means that even if a class intends to pass on its legacy through\
    \ inheritance, its **private** members remain untouched, un-inherited, and un-seen\
    \ by its descendants.\n\nWhen crafting classes with the intent of inheritance,\
    \ it's paramount to choose the access modifiers wisely. **Public** and **protected**\
    \ members are typically preferred, for they can be seamlessly carried forward\
    \ to subclasses. However, **private** members, given their inaccessibility, should\
    \ be designed with the understanding that they remain an internal affair of the\
    \ class, untouched by the currents of inheritance.\n\n## Overriding Methods\n\n\
    A key feature of subclasses is overriding or extending existing methods of the\
    \ parent class. This is done by using the same name and signature for the method.\
    \ For example:\n\n```java\npublic class Vehicle {\n    public void move() {\n\
    \        // generic movement logic\n    }\n}\n\npublic class Car extends Vehicle\
    \ {\n    @Override\n    public void move() {\n        // car-specific movement\
    \ logic\n        System.out.println(\"Vroom vroom!\");\n    }\n}\n```\n\nHere,\
    \ the subclass overrides the move() method to provide specialized logic for cars.\
    \ This is how polymorphism emerges - an instance can be treated as the parent\
    \ type and call move() while getting the specific subclass implementation at runtime.\n\
    \n## Overriding Methods Correctly\n\nOverriding methods is a quintessential aspect\
    \ of object-oriented programming, particularly in the context of inheritance.\
    \ However, doing it right requires adhering to certain rules and conventions.\
    \ When a method is overridden in a subclass, its signature should mirror exactly\
    \ what's specified in the parent class, ensuring consistency across the hierarchy.\
    \ While the access level of the method can be adjusted, it should always be tilted\
    \ towards broader accessibility; narrowing it down further can lead to accessibility\
    \ issues.\n\nFor those abstract methods that the parent class only declares without\
    \ implementing, it falls upon the shoulders of the subclasses to provide a concrete\
    \ implementation. To ensure you're genuinely overriding a method and not mistakenly\
    \ creating a new one, it's advised to use the **@Override** annotation. This small\
    \ but powerful annotation catches unintended errors stemming from typographical\
    \ mistakes. If a situation demands invoking the superclass version of a method\
    \ from within its overridden counterpart, one can use the **super.method()** construct.\n\
    \n## Best Practices for Inheritance\n\nWhile method overriding is pivotal, understanding\
    \ the broader dynamics of inheritance is equally essential. In the journey of\
    \ object-oriented design, it's often recommended to lean more towards composition\
    \ than inheritance. This entails using other classes as components rather than\
    \ inheriting from them, promoting flexibility. When opting for inheritance, ensure\
    \ the parent classes are robust representations of clear and appropriately abstract\
    \ concepts. The cornerstone of inheritance should be a genuine \"is-a\" relationship\
    \ between the subclass and the superclass and not merely an avenue for code reuse.\n\
    \nFor classes that aren't meant to be part of an inheritance hierarchy, marking\
    \ them as **final** can shield them from being subclassed. Moreover, it's prudent\
    \ to avoid deep inheritance hierarchies that sprawl with too many subclasses,\
    \ as they can become challenging to manage and understand. It's often beneficial\
    \ to encapsulate interactions between subclasses and parents behind interfaces,\
    \ laying down a common contract. Adhering to these practices ensures that inheritance\
    \ serves its purpose effectively, leading to cleaner, more extensible, and organized\
    \ code structures.\n\n## Polymorphism: Flexibility in Action\n\nPolymorphism refers\
    \ to the ability of objects belonging to different types to be accessed through\
    \ a common interface. This flexibility in programming allows for code to be reused\
    \ in a variety of contexts. This chapter will explore how polymorphism gives Java\
    \ code greater reusability through dynamic binding and inheritance.\n\n## Defining\
    \ Polymorphism\n\nThe word polymorphism means \"many forms\", which refers to\
    \ the ability of an entity, like a method, to exhibit multiple forms. In object-oriented\
    \ programming, this is usually seen as a parent class reference being used to\
    \ call a subclass-specific implementation of a method.\n\nFor example, we could\
    \ have an Animal parent class with a method makeSound(). Subclasses could override\
    \ this to define specific sounds:\n\n```java\nclass Dog extends Animal {\n   \
    \ @Override\n    public void makeSound() {\n        System.out.println(\"Woof!\"\
    );\n    }\n}\n\nclass Cat extends Animal {\n    @Override\n    public void makeSound()\
    \ {\n        System.out.println(\"Meow!\");\n    }\n}\n```\n\nEven though the\
    \ code uses an Animal reference variable, the actual object type could be a Dog\
    \ or Cat. Polymorphism allows calling makeSound() and getting the appropriate\
    \ subclass implementation at runtime based on the object's actual type. This provides\
    \ flexibility where code written for the parent class can still work transparently\
    \ with any subclass. New animal types can be added without modifying existing\
    \ code.\n\n## Achieving Polymorphism with Inheritance\n\nAs seen above, polymorphism\
    \ is achieved in Java through inheritance and method overriding. For a method\
    \ to be polymorphic:\n\n- It must be present in the parent class.\n- Subclasses\
    \ must override this method and provide their own implementation.\n- Child object\
    \ reference must be accessed through a parent-type variable.\n\nThe latter point\
    \ ensures the JVM performs dynamic binding at runtime to determine the appropriate\
    \ implementation based on the actual object type. With a parent reference, makeSound()\
    \ could call any subclass override transparently.\n\n## Other Applications of\
    \ Polymorphism\n\nPolymorphism allows code to be written more generically and\
    \ increases reusability across contexts. Beyond method overriding, some other\
    \ examples include:\n\n- Concrete vs abstract classes - The abstract parent class\
    \ defines the common interface, and subclasses provide concrete implementations.\n\
    - Interfaces - Define only method signatures; polymorphic implementations exist\
    \ across multiple classes.\n- Generics - Type parameters allow defining a common\
    \ method signature that accepts subclasses of a type.\n- Collections - Heterogeneous\
    \ collection of mixed object types handled via their common interface.\n- Factories\
    \ - Produce subclasses through a common factory interface without coupling code\
    \ to concrete classes.\n\nSo, in summary, polymorphism is a key way to write flexible\
    \ object-oriented code in Java by abstracting up to a common parent interface\
    \ for"
  mdcn: "## 例如：\n\n```java\npublic class Car extends Vehicle {\n    // car-specific\
    \ fields and methods\n}\n```\n\nCar 子类现在继承了 Vehicle 类中已定义的所有内容，例如轮子、引擎、move()\
    \ 方法等，并且可以添加与汽车相关的新字段和行为。子类是增强而非替代父类。两者仍可根据需要独立使用。\n\n## 访问修饰符与继承\n\n在 Java 面向对象的体系中，继承是一个关键机制，它使类能够从其前身继承属性和行为。然而，并非类的所有部分都适合自由继承。继承的版图常常被边界和访问点所划分，而访问修饰符正是在此发挥作用，引导着继承的流向。\n\
    \n访问修饰符决定了类、方法和字段的可见性和可访问范围。它们如同守门人，决定类的哪些部分可以被访问以及从何处访问。在继承领域，它们在界定子类如何与从父类继承的代码交互方面起着决定性作用。\n\
    \n考虑 **public** 访问修饰符，它类似于一份公开邀请。标记为 **public** 的类或成员宣告其广泛可用。无论你是在同一个包、不同的包，甚至是在子类中，**public**\
    \ 成员都向你敞开大门。\n\n与之形成对比的是 **protected** 修饰符，它更具选择性。虽然它允许在自身包内访问成员，但其独特之处在于对子类的开放性。子类，即使位于不同的包中，也可以自由访问其父类的\
    \ **protected** 属性和方法，这使得该修饰符在继承范式中尤为重要。\n\n然而，并非所有成员都如此开放。有些成员更愿意局限于其本地区域——即它们所在的包。带有包私有访问级别（通过缺少访问修饰符来表示）的成员仅对同一包内的类可访问。包外的子类则被拒之门外。\n\
    \n所有修饰符中限制性最强的是 **private** 访问修饰符。**private** 成员被严密守护且排外，它们坚决内向。它们只允许在其所属的类内部访问，将其他所有人（包括子类）拒之门外。这意味着，即使一个类打算通过继承传递其遗产，其\
    \ **private** 成员也保持原样，不被继承，也不被其后代所见。\n\n在设计用于继承的类时，明智地选择访问修饰符至关重要。通常首选 **public**\
    \ 和 **protected** 成员，因为它们可以无缝地传递给子类。然而，**private** 成员由于其不可访问性，在设计时应理解它们将保持为类的内部事务，不受继承潮流的影响。\n\
    \n## 方法重写\n\n子类的一个关键特性是重写或扩展父类的现有方法。这是通过使用相同的方法名和签名来完成的。例如：\n\n```java\npublic\
    \ class Vehicle {\n    public void move() {\n        // generic movement logic\n\
    \    }\n}\n\npublic class Car extends Vehicle {\n    @Override\n    public void\
    \ move() {\n        // car-specific movement logic\n        System.out.println(\"\
    Vroom vroom!\");\n    }\n}\n```\n\n这里，子类重写了 move() 方法，为汽车提供了专门的逻辑。这就是多态性产生的原理——一个实例可以被视为父类型并调用\
    \ move()，同时在运行时获得特定的子类实现。\n\n## 正确重写方法\n\n方法重写是面向对象编程的一个核心方面，尤其是在继承的背景下。然而，要正确地做到这一点，需要遵守某些规则和约定。当一个方法在子类中被重写时，其签名应与父类中指定的完全一致，以确保整个层次结构的一致性。虽然方法的访问级别可以调整，但应始终倾向于更广泛的可访问性；进一步缩小范围可能会导致可访问性问题。\n\
    \n对于父类仅声明而未实现的抽象方法，提供具体实现的责任就落在了子类的肩上。为了确保你确实在重写一个方法而不是错误地创建了一个新方法，建议使用 **@Override**\
    \ 注解。这个虽小但强大的注解可以捕获因拼写错误而导致的意外错误。如果需要在重写的方法中调用其父类版本，可以使用 **super.method()** 结构。\n\
    \n## 继承的最佳实践\n\n虽然方法重写至关重要，但理解更广泛的继承动态同样重要。在面向对象设计的旅程中，通常建议更多地倾向于组合而非继承。这意味着将其他类用作组件而不是从它们继承，从而提高灵活性。当选择继承时，确保父类是清晰且适当抽象概念的稳健表示。继承的基石应该是子类和父类之间真正的“is-a”关系，而不仅仅是代码重用的途径。\n\
    \n对于那些不打算成为继承层次结构一部分的类，将其标记为 **final** 可以防止它们被子类化。此外，明智的做法是避免那些子类过多、层次过深的继承结构，因为它们可能变得难以管理和理解。通常有益的做法是将子类和父类之间的交互封装在接口之后，制定一个共同的契约。遵循这些实践可以确保继承有效地发挥作用，从而产生更清晰、更可扩展和更有组织的代码结构。\n\
    \n## 多态性：行动中的灵活性\n\n多态性指的是属于不同类型的对象能够通过公共接口进行访问的能力。这种编程中的灵活性允许代码在各种上下文中被重用。本章将探讨多态性如何通过动态绑定和继承赋予\
    \ Java 代码更强的可重用性。\n\n## 定义多态性\n\n“多态性”一词意为“多种形式”，指的是一个实体（如方法）能够表现出多种形式的能力。在面向对象编程中，这通常表现为使用父类引用来调用方法的子类特定实现。\n\
    \n例如，我们可以有一个 Animal 父类，其中有一个 makeSound() 方法。子类可以重写此方法以定义特定的声音：\n\n```java\nclass\
    \ Dog extends Animal {\n    @Override\n    public void makeSound() {\n       \
    \ System.out.println(\"Woof!\");\n    }\n}\n\nclass Cat extends Animal {\n   \
    \ @Override\n    public void makeSound() {\n        System.out.println(\"Meow!\"\
    );\n    }\n}\n```\n\n即使代码使用的是 Animal 引用变量，实际的对象类型可能是 Dog 或 Cat。多态性允许调用 makeSound()，并在运行时根据对象的实际类型获得适当的子类实现。这提供了灵活性，为父类编写的代码仍然可以透明地与任何子类一起工作。可以添加新的动物类型而无需修改现有代码。\n\
    \n## 通过继承实现多态性\n\n如上所述，多态性在 Java 中是通过继承和方法重写实现的。一个方法要具有多态性：\n\n- 它必须存在于父类中。\n\
    - 子类必须重写此方法并提供自己的实现。\n- 子对象引用必须通过父类型变量访问。\n\n最后一点确保 JVM 在运行时执行动态绑定，以根据实际对象类型确定适当的实现。通过父引用，makeSound()\
    \ 可以透明地调用任何子类的重写版本。\n\n## 多态性的其他应用\n\n多态性允许代码编写得更通用，并增加了跨上下文的可重用性。除了方法重写，其他一些例子包括：\n\
    \n- 具体类与抽象类 - 抽象父类定义公共接口，子类提供具体实现。\n- 接口 - 仅定义方法签名；多态实现存在于多个类中。\n- 泛型 - 类型参数允许定义接受某类型子类的公共方法签名。\n\
    - 集合 - 通过其公共接口处理的混合对象类型的异构集合。\n- 工厂 - 通过公共工厂接口生产子类，而无需将代码与具体类耦合。\n\n因此，总而言之，多态性是编写灵活面向对象\
    \ Java 代码的关键方式，它通过抽象到一个公共父接口来实现。"
