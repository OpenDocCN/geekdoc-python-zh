    <script src=\"index.js\"></script>\n</body>\n</html>\n```\n\nNow that we have\
    \ Webpack, we can combine JavaScript and CSS into a single file using that tool.\
    \ To do this, a Webpack configuration file has to be created. In the directory\
    \ that is the base of our project, we may create a file with the name webpack.config.js\
    \ and fill it with the following contents:\n\n```\nconst path = require('path');\n\
    module.exports = {\n  entry: './index.js',\n  Output {\n    filename: 'bundle.js',\n\
    \    path: path.resolve(__dirname, 'dist'),\n  },\n  module: {\n    rules: [\n\
    \      {\n        test: /\\.css$/i,\n        use: ['style-loader', 'css-loader'],\n\
    \      },\n    ],\n  },\n};\n```\n\nThis configuration file instructs Webpack\
    \ to use index.js as the entry point for our application and to output the bundled\
    \ code to a file named bundle.js in a new directory named dist. It also tells\
    \ Webpack to output the bundled code to a file named bundle.js in the application's\
    \ root directory.\nAlso, a module rule is specified to manage CSS files using\
    \ the style-loader and the CSS-loader. Whereas the css-loader is responsible for\
    \ interpreting the CSS and resolving any dependencies, the style loader injects\
    \ it into the HTML content during runtime."
