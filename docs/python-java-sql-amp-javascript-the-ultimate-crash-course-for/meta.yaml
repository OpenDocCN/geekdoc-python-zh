    \ | 2000   |\n| 3       | 2021-02-01 | 3000   |\n| 5       | 2021-03-01 | 4000\
    \   |\n\n## Stored procedures and functions\n\nStored procedures and functions\
    \ are pre-written blocks of code that can be executed within SQL. They are a way\
    \ to encapsulate complex SQL logic into reusable modules, which can be called\
    \ from other parts of the code. Stored procedures and functions can improve the\
    \ efficiency and maintainability of SQL code, as well as provide a way to modularize\
    \ complex data manipulation tasks. For instance, a stored procedure could be used\
    \ to calculate the average order value for a customer, which could then be used\
    \ in other parts of the code to make decisions about how to market to that customer.\n\
    \nStored procedures and functions are critical tools for database administrators\
    \ and developers as they can help to simplify the management of large, complex\
    \ databases.\n\n### Example 1: Creating a stored procedure\n\nSuppose we have\
    \ a table called Orders with columns OrderId, CustomerId, and OrderAmount. We\
    \ want to create a stored procedure that calculates the average order amount for\
    \ a given customer. Here's how we can create the stored procedure:\n\n#### Code:\n\
    \n```sql\nCREATE PROCEDURE CalculateAvgOrderAmount\n    @customerId INT\nAS\n\
    BEGIN\n    SELECT AVG(OrderAmount) AS AvgAmount\n    FROM Orders\n    WHERE CustomerId\
    \ = @customerId\nEND\n```\n\nThe CREATE PROCEDURE statement creates a new stored\
    \ procedure called CalculateAvgOrderAmount. This stored procedure takes one input\
    \ parameter @customerId, which is used in the WHERE clause to filter the orders\
    \ for the given customer. The SELECT statement calculates the average order amount\
    \ for the given customer and returns the result in a column called AvgAmount.\n\
    \nTo execute the stored procedure and see the output, we can use the EXEC statement.\n\
    \n#### Code:\n\n```sql\nEXEC CalculateAvgOrderAmount @customerId = 123\n```\n\n\
    This will calculate the average order amount for a customer with CustomerId =\
    \ 123 and return the result in a column called AvgAmount.\n\n### Example 2: Creating\
    \ a function\n\nSuppose we want to create a function that calculates the discount\
    \ amount for a given order amount. The discount amount is calculated as follows:\n\
    If the order amount is less than 100, the discount amount is 0%\nIf the order\
    \ amount is between 100 and 500, the discount amount is 5%\nIf the order amount\
    \ is greater than 500, the discount amount is 10%\n\nHere's how we can create\
    \ the function:\n\n#### Code:\n\n```sql\nCREATE FUNCTION CalculateDiscountAmount\n\
    \    (@orderAmount DECIMAL(10, 2))\nRETURNS DECIMAL(10, 2)\nAS\nBEGIN\n    DECLARE\
    \ @discountAmount DECIMAL(10, 2)\n    IF @orderAmount < 100\n        SET @discountAmount\
    \ = 0\n    ELSE IF @orderAmount <= 500\n        SET @discountAmount = @orderAmount\
    \ * 0.05\n    ELSE\n        SET @discountAmount = @orderAmount * 0.1\n    RETURN\
    \ @discountAmount\nEND\n```\n\nThe CREATE FUNCTION statement creates a new function\
    \ called CalculateDiscountAmount. This function gets one input argument, @orderAmount,\
    \ that is used to determine the discount amount. The RETURNS clause indicates\
    \ that the function will return a decimal value with a 10 digits accuracy and\
    \ a 2 digits scale.\n\nWe use an IF statement within the function to compute the\
    \ discount amount depending on the order amount. The result is stored in the variable\
    \ @discountAmount and returned with the RETURN command.\n\nTo execute the function\
    \ and see the output, we can use the SELECT statement:\n\n```sql\nSELECT OrderId,\
    \ OrderAmount, dbo.CalculateDiscountAmount(OrderAmount) AS DiscountAmount\nFROM\
    \ Orders\n```\n\nThis will calculate the discount amount for each order in the\
    \ Orders table using the CalculateDiscountAmount function and return the result\
    \ in a column called DiscountAmount.\n\n## Indexing and performance optimization\n\
    \nIndexing is a crucial aspect of performance optimization in SQL. When a database\
    \ table contains a large number of records, the database engine may take longer\
    \ to search for specific data within the table. This is where indexing comes into\
    \ play. An index is a type of data structure with information about the information\
    \ stored in one or more columns of a table, allowing the database engine to rapidly\
    \ find the desired rows. It works similarly to a book's table of contents, allowing\
    \ readers to locate relevant sections quickly and easily.\n\nTo construct an index\
    \ in SQL, use the CREATE INDEX statement, which provides the index's name, the\
    \ table and column(s) to be indexed, as well as other parameters like index type\
    \ and sort order.\n\nRemember that indexing isn't always the answer to slow query\
    \ performance. In some cases, indexing too many columns or creating indexes on\
    \ columns that are rarely used can actually slow down query performance. Therefore,\
    \ it's essential to analyze the query execution plan and determine which columns\
    \ would benefit from indexing.\n\nIn addition to indexing, there are other techniques\
    \ that can be used to optimize SQL queries for better performance. One of these\
    \ techniques is query optimization, which involves rewriting queries to minimize\
    \ the use of subqueries, selecting appropriate data types and normalization, and\
    \ using efficient join techniques.\n\nAnother technique for optimizing SQL queries\
    \ is to use appropriate data types and normalization. For example, if a column\
    \ in a table contains only numeric data, it's best to use a numeric data type\
    \ (such as INT or FLOAT) rather than a text data type (such as VARCHAR). This\
    \ can help to optimize memory while improving query performance.\n\nNormalization\
    \ is the process of structuring data in a database to decrease redundancy and\
    \ increase consistency. By breaking up large tables into smaller tables and establishing\
    \ relationships between them, normalization can help to eliminate duplicate data\
    \ and improve query performance.\n\nIf indexing and query optimization do not\
    \ improve query performance, the database administrator may consider partitioning\
    \ data across multiple servers or using advanced techniques such as sharding or\
    \ replication. Partitioning is the process of splitting a large table into smaller,\
    \ easier to manage sections depending on specified criteria like date range or\
    \ geographic area. Sharding distributes data over several servers using a predetermined\
    \ sharding key, whereas replication creates multiple copies of the same data on\
    \ multiple servers.\n\nIn conclusion, indexing and performance optimization are\
    \ critical techniques for managing large and complex databases. By creating indexes\
    \ on commonly used columns and optimizing SQL queries through these methods, database\
    \ administrators and developers can ensure that their applications run efficiently\
    \ and effectively.\n\n### Example 1: Indexing\n\nSuppose we have a table named\
    \ \"users\" with columns \"id\", \"username\", \"email\", and \"created_at\".\
    \ To improve query performance, we can create an index on the \"username\" column,\
    \ which is commonly used in queries:\n\n#### Code:\n\n```sql\nCREATE INDEX idx_username\
    \ ON users (username);\nSELECT * FROM users WHERE username = 'jdoe';\n```\n\n\
    #### Output:\n\n| id | username | email              | created_at          |\n\
    |----|----------|--------------------|---------------------|\n| 1  | jdoe    \
    \ | jdoe@example.com   | 2022-01-01 12:00:00 |"
