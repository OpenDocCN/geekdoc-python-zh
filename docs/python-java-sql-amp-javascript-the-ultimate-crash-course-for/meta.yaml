    \n## Advanced Data Filtering and Sorting Techniques\n\nFiltering and sorting data\
    \ are fundamental SQL techniques, but advanced techniques can enhance these tasks.\
    \ SQL offers various operators like LIKE, IN, and BETWEEN to filter data based\
    \ on complex criteria. Additionally, SQL enables sorting data by multiple columns\
    \ with different sort orders for each column. These advanced filtering and sorting\
    \ techniques help identify patterns and trends in large and complex data sets,\
    \ making them essential for anyone working with such datasets.\n\nUsing the LIKE\
    \ operator to filter data based on pattern matching;\n\n### Code:\n\n```sql\n\
    SELECT * FROM employees WHERE last_name LIKE 'S%';\n```\n\n### Output:\n\n| emp_id\
    \ | first_name | last_name |\n|--------|------------|-----------|\n| 1      |\
    \ John       | Smith     |\n| 4      | Sarah      | Sanders   |\n\nUsing the IN\
    \ operator to filter data based on a list of values:\n\n### Code:\n\n```sql\n\
    SELECT * FROM products WHERE category IN ('Electronics', 'Home Appliances');\n\
    ```\n\n### Output:\n\n| prod_id | product_name | category       |\n|---------|--------------|----------------|\n\
    | 1       | TV           | Electronics    |\n| 3       | Refrigerator | Home Appliances|\n\
    | 4       | Microwave    | Home Appliances|\n\nUsing the BETWEEN operator to filter\
    \ data based on a range of values:\n\n### Code:\n\n```sql\nSELECT * FROM sales\
    \ WHERE amount BETWEEN 1000 AND 5000;\n```\n\n### Output:\n\n| sale_id | date\
