  md: '# Glossary of Common Java Terms


    Abstract Class - A class that is declared as abstract using the abstract keyword.
    It cannot be instantiated but serves as a base for subclasses to extend from.


    Abstract Method - A method declared as abstract using the abstract keyword that
    must be implemented by a concrete subclass.


    Access Modifier - Keywords like public, private, and protected that determine
    access/visibility of classes, methods, fields, etc.


    Anonymous Class - An unnamed class defined and instantiated within code without
    a class declaration statement.


    API - Application Programming Interface provided by classes, packages, and frameworks
    that define how others can interact with them.


    Argument - Values passed into a method or constructor to execute its logic. Alternative
    to parameter.


    Array - A data structure that stores multiple elements of the same type in contiguous
    memory locations.


    ArrayList - The most commonly used implementation of the List interface. Stores
    elements dynamically with access by index.


    Bounded Type Parameter - A generic type restricted to classes within a specified
    class hierarchy via a wildcard.


    Bytecode - The intermediate format instructions that are generated from Java source
    code and executed by the JVM.


    Class - A blueprint used to create objects. Classes define what properties the
    object has and what actions it can perform.


    Collection - A generic framework in Java used to work with groups of objects.
    Interfaces like List, Set, Queue.


    Compilation - The process of converting Java source code files to bytecode that
    can be understood by JVMs.


    Constructor - A special type of method used to initialize objects. It has the
    same name as the class.'
  merge: -1
  pgno: 266
- img_proc: true
  md: 'Encapsulation - The grouping of related attributes and methods within a class
    and restricting access to them. Safeguards the data.


    Enum - A special reference type that represents a group of constants like days
    of the week.


    Exception - An error condition that occurs during program execution that can be
    caught and handled.


    Field - Attributes defined within a class to store data for objects of that class.
    Also called variables or properties.


    Final - Marks a class, variable, or method that can''t be overridden or reassigned
    once assigned.


    Generics - A language feature that allows classes, interfaces, and methods to
    operate on objects of various types while providing compile-time type safety.


    IDE - Integrated Development Environment used for developing, debugging, and testing
    Java programs.


    Immutable - Describes objects that cannot be modified after construction. Prevents
    unwanted side effects.


    Inheritance - A mechanism where one class acquires the properties and behaviors
    of another class. The child class extends the parent class.


    Interface - A blueprint of methods that can be implemented by classes. Defines
    behavior without implementation.


    JDK - Java Development Kit used for developing Java applications and includes
    development tools, compilers, debuggers, etc.


    JVM - Java Virtual Machine that executes Java bytecode at runtime on various platforms.


    Lambda Expression - Anonymous functions that can be used to simplify the creation
    of anonymous implementation classes.


    Method - A function defined within a class that contains a series of statements
    to perform an action related to that class.


    Override - Ability to redefine inherited methods to modify behavior using the
    @Override annotation.


    Package - A namespace that organizes related classes and interfaces. The equivalent
    of a directory.'
