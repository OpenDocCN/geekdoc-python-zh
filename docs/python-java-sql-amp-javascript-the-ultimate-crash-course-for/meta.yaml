    # UPDATE


    The UPDATE command in SQL changes the data already in a table.

    The table name refers to the table title that this command will update. The SET
    clause allows you to specify the columns and values you wish to modify. The WHERE
    article governs which rows should be changed depending on the given conditions.

    Because changing the wrong rows might result in inaccurate data, it is essential
    to utilize the WHERE clause with extreme caution. Before altering the data, it
    is recommended to validate your UPDATE statement using a SELECT query to validate
    the row that the change would impact.


    # Syntax:


    ```

    UPDATE table_name

    SET column1 = value1, column2 = value2

    WHERE condition

    ```


    # Code:


    ```

    UPDATE Employee_Tab

    SET Name = ''Houston''

    WHERE Salary = ''4000'';


    SELECT * FROM Employee_Tab;

    ```


    # Output:


    ```

    Houston|30|4000|johndoe@gmail.com

    Jane Doe|28|5000|janedow@gmail.com

    ```'
