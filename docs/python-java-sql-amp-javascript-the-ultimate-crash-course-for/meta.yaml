    Guido van Rossum, who created Python, made it as a side project over the Christmas
    break. Using what he learned working with the ABC programming language, he made
    an interpreted programming language that is easy to understand and use. He first
    used Python to impress hackers in an online community with his knowledge of how
    Unix works.


    But after getting feedback from his fellow programmers, he worked on it for a
    few months to make it better. So, he made a programming language that was easy
    and quick to understand. Guido van Rossum has been called the "benevolent dictator"
    of the Python community because of what he has done for the Python project. Open-source
    developers can be given this high award.


    Python has always been one of the 10 most popular programming languages, according
    to TIOBE rankings, ever since it came out. Python''s simple way of solving problems
    has helped it beat other programming languages, like Pearl, and become one of
    the easier ones for beginners to learn.


    Python is based on the idea that there is only one way to solve a problem, which
    is different from the idea behind programming languages like Pearl,'
  - '[PAGE 22]


    which is that there are many ways to solve a problem. So, Python gave the programming
    community the discipline it needed and made software development grow by a factor
    of ten.

    Look at the Python Applications below to see how important Python was to programmers
    around the world.


    # Applications of Python


    Python made its mark in many areas of science and technology today.


    Web Domain


    Python has had most of its early effect as a programming language on web technology.
    While Java was the most popular thing on the web, Python wasn''t as popular. Over
    time, Python has become popular among web developers thanks to third-party frameworks
    like Django and Tornado.

    In the twenty years since then, Python has become one of the most popular scripting
    languages for websites, second only to JavaScript. Python is a programming language
    that is used by big companies like Google, Facebook, and Netflix. A well-known
    web framework called Django can also help programmers write backend code for several
    APIs.

    Python is also popular for automating tasks, so it is often used to make bots
    like Pinflux.


    Scientific Computing


    Python is popular with scientists because it is free for anyone to use. Also,
    programs like Numpy and Scipy make it easier for computer scientists to do experiments
    with less code. Since Python is also better at mathematical calculations and software,
    Scientists have no choice but to use it these days.


    Machine Learning and AI


    AI and machine learning are now two technologies that can be used together to
    give more jobs to developers. There are a lot of third-party libraries for Python,
    like Tensorflow, that are all about implementing Machine Learning algorithms.

    Python is also very good at adapting to technologies like Deep Learning and Natural
    Language Processing. This makes it one of the main candidates to become a better
    language for making AI-related technology.


    Linux and the Management of Databases'
  - '[PAGE 23]


    As businesses around the world grow, there is a big need for developers who can
    manage databases and internal systems well. Developers need to know enough about
    different operating systems, like Linux, and they also need to know enough about
    Python to automate other procedures that are needed to test how well methods work
    on an internal network.


    Penetration Testing and Hacking

    Python is also used by hackers with both good and bad intentions. For example,
    white-hat hackers use Python tools that are widely used to do penetration testing.
    On the other hand, hackers with bad intentions use Python scripting to make exploits
    that automatically steal sensitive information from their targets.


    Python''s ability to be used in almost any area of computer programming has led
    to the development of several other high-level programming languages, like Go,
    Groovy, and Swift. Python spread the idea that programming should be as simple
    as possible.


    # Different Versions of Python


    When Python came out at the start of the 1990s, it wasn''t as good as it is now.
    Rossum built the library without any help from anyone else, so it had a lot of
    bugs and mistakes. But because Python was so popular right away in the programming
    community, hundreds of independent developers helped Rossum make a much bigger
    project in the two years after the first version came out.


    Python was also able to get a lot of smart people to check and change the code
    because it was open source. Because of this, the Python core programming team
    has put out two main versions, Python 2 and Python 3, for developers all over
    the world in the last 20 years.


    In 2022, Python 2 is still used by a lot of programmers, even though Python core
    developers no longer support it. Choosing which version to use depends on what
    you are doing.


    # Python 2


    Python 2 is now an old version that came out in the year 2000. Still, it has been
    the most used version of Python for more than 20 years. Python 2 is'
  - '[PAGE 24]


    easier to use and has a lot more frameworks and libraries from outside sources
    that can be used for development.

    Even though Python 2.7 will no longer get official updates after 2021, it is still
    the best version for many software domains. But it''s hard to move all of the
    frameworks and libraries from Python 2 to Python 3, so many companies still use
    Python 2 as their default version.


    # Python 3


    Python 3.9 is the most recent version of the programming language that developers
    can use. Python 3 is faster and gives developers many more classes for working
    with the core library. Compared to Python 2, it is also easy to keep up with.


    # Which one Should I Choose?


    Which version of Python you use should depend on what kind of software you are
    making. For example, a lot of data scientists use Python 3, while developers who
    work with legacy software use Python 2 to connect components.


    # Note:


    All the Python code in this book is written in Python 3, since it makes more sense
    for beginners to start with a newer version.


    # Why You Should Learn Python


    Python started to become more popular in the early 1990s, when companies all over
    the world started to use the internet''s power to make complex web applications.
    Traditional programming languages like C and C+ were hard to learn and made it
    hard for programmers to write good code quickly. During this time, Python helped
    many companies make libraries that worked well with the C and C++ libraries they
    already had. Also, programmers started using Python to quickly deploy code because
    it was easier to work with than other high-level languages.

    By learning about some of Python''s many benefits, you can see how powerful and
    easy it can be for developers with different backgrounds in computer science.


    # It Is an Interpreted Language'
  - '[PAGE 25]


    Instead of using a compiler to run instructions like other programming languages
    do, Python uses a new piece of software called an interpreter. Instead of taking
    a lot of time to run a program with a compiler, the interpreter uses modern computer
    techniques to parse the code before the program is run. This dynamic parse time
    can cut down on the time you have to wait while the program is running. Python
    also uses parts of natural language to get rid of unproductive ways of coding
    that can slow down production. Because of how it is set up, it is also easy to
    automate programming in Python, which is why system developers and Linux administrators
    like it so much.


    # It is Open Source


    One of the first things that led to the open-source revolution was Python. Because
    Python is open source, you can change any code and share it on your own. Open-source
    culture also makes it easier for programmers all over the world to share their
    knowledge and resources to make libraries and frameworks that can help developers
    make new projects.

    As a beginner, having one-click access to both complex and simple projects can
    help you understand how programming works and make it easy to make new, creative
    projects.


    # It Supports Multiple Paradigms


    To write and run code, different programming languages use different programming
    paradigms. Java, on the other hand, uses an object-oriented paradigm, while C
    uses a functional paradigm. A programming paradigm changes how developers work
    and how they try to solve a problem.

    Python supports multiple paradigms, like the structured, functional, and object-oriented
    paradigms. This makes it a good choice for programmers who want to solve problems
    in different ways.


    # It uses a Garbage Collection Mechanism


    Managing memory is an important skill for application developers to have. High-level
    languages such as Java and C use complex data management techniques. Even though
    these mechanisms work perfectly, it takes a lot of time to keep them in good shape.
    In Python, on the other hand, memory is handled by garbage collectors. You can
    easily use the data and variables that this strategy no longer uses.'
- md: '## It Is Easy to Understand


    One of the many reasons developers like Python is that it is easy to read. All
    of the code is easy to understand, which makes it easy to keep up. When Python
    code is easier to read, its quality goes up, and when the quality goes up, it
    takes less time to fix bugs in the code.


    ## Portability


    Python can also run on any operating system, which makes it easy for developers
    to use it in different ways with just a few hours of work. Users only need to
    install the interpreter on their system for Python programs to work.


    For instance, let''s say a programmer writes a program for Linux that makes it
    easy to automate SQL database management. Then, anyone who has access to the code
    can place it on Windows or Mac machines by changing a few parts of it.


    ## It Has Great Custom Libraries


    If you want a programming language to be widely used, it needs to have great libraries.
    Developers can play around with a lot of these libraries in Python.


    Aside from these custom libraries, programmers can also make interesting software
    with the standard libraries that the Python core development team gives them.


    ## It Supports Component Integration


    Python makes it easy for programmers to add new code to code that has already
    been written. Also, its advanced integration of components makes it a good choice
    for making advanced customization options for different software applications.


    Component integration keeps developers busy by adding new features to older software
    so it can run on newer operating systems.


    ## It Has a Great Community


    The Python community is very helpful and can help new programmers quickly solve
    any problems they run into while writing code. Aside from Python forums, resources
    and well-written guides from a variety of experienced programmers can help developers
    get past any problems.


    Since there are a lot of open-source Python projects on GitHub, a hobbyist programmer
    can just look at the code to see how complex logic is implemented in software.


    ## How to Install Python


    To write Python code, you must install an interpreter on your system. Without
    this interpreter, no developer would be able to write or run Python programs.
    Python can be put on any modern operating system because it can be moved around.
    In this section, we''ll talk about how to install Python on Linux, Mac, and Windows.


    ## How do I Install Python in Linux?


    Since most programmers use Linux as their main operating system, we''ll start
    by installing Python on your local machine using Linux. Linux is a free operating
    system that most programmers and businesses use. Because of this, Python is already
    on many Linux distributions.


    To see if Python is installed on your Linux system, use the CTRL+ALT+N command
    to open a new command terminal.


    When the new command terminal opens, type the following command into it.


    ### Terminal Code:


    ```

    $ python3

    ```


    If Python is installed on your system, the license information for the version
    of Python that is installed will show up in your terminal.


    If you get the output "command not found," on the other hand, it means that Python
    is not installed on your system. Since Python is not installed, you can now use
    the package managers for Linux to install Python for different distros.


    Before installing any software on Linux, you must first update all the tools on
    Linux and make sure there are no conflict errors that could stop Python installation.


    ### Terminal Code:


    ```

    $ sudo apt-get upgrade

    ```


    You can use the code above to update package files on a Linux system that is based
    on Debian.

    Use the following Pacman command to upgrade packages on an Arch-based system.


    ### Terminal Code:


    ```

    $ sudo pacman -S

    ```


    After upgrading the packages, you can use the commands below to install Python
    on your Linux system.

    Terminal code for Debian systems:


    ```

    $ sudo apt-get install python3

    ```


    Terminal code for Arch systems:


    ```

    $ pacman -u python3

    ```


    Look at the official Python documentation to install in other Linux distributions
    like Gentoo and kali.


    ## How do I Install Python on macOS?


    macOS is the operating system that Apple makes by default. Python 2 is often installed
    as native software because it is built with UNIX support.

    Make sure you open a new terminal from Settings > Utilities > Terminal to see
    if macOS is installed on your Apple-supported hardware.

    Enter the following command once a new terminal has been opened.


    ### Terminal Code:


    ```

    $ python3

    ```


    If you don''t see a Python version message, it means that Python is not installed
    on your system. To install Python from scratch, use homebrew.


    ### Terminal Code:


    ```

    $ brew install python3

    ```


    ## How do I Install Python on Windows?


    Windows is the most used operating system in the world, based on the number of
    people who use it. Many people and programmers use Windows because it is easy
    to use, and there are many ways for Python programmers to quickly get their code
    into Windows.


    To install Python on your Windows system, you must first download an executable
    package from the official Python website. Once the package is downloaded, you
    can install the software by double-clicking on it. For Python code development
    to work on some Windows systems, you may need to change the environment variables
    in the Control panel.

    Once everything is set up as needed, open a command prompt window to see if the
    Python interpreter is correctly installed.


    ### Command Prompt Code:


    ```

    >> python --version

    ```


    If the command tells you what version of Python is installed, then Python is set
    up correctly on your system. If not, you might have to copy and paste the error
    into Google or use Python forums to figure out what''s wrong.


    ## Chapter 2: PyCharm and IDLE


    Once you''ve installed Python, you''ll need a development environment on your
    system to write programs. IDLE stands for "Integrated Development and Learning
    Environment." Even though you can work with the basic IDLE that comes with a basic
    Python installation, developers are encouraged to use IDEs (Integrated Development
    Environments) like PyCharm for better software development workflow. IDEs make
    developers more productive and make it easier for them to find bugs in code that
    has already been turned into software.


    ## Why is Python Interpreter Good?


    The Python interpreter is great because it is flexible and has more features than
    traditional compilers. For example, compared to compilers, a Python interpreter
    makes you wait less. Compilers run the code after it has been written and check
    for mistakes. The interpreter, on the other hand, checks the code as it is being
    written and lets the programmer know if there is a problem before the code is
    run. Real-time error reporting is a good way for beginners to learn how to code
    while they are doing it.


    When you install Python on your computer, it also installs the IDLE. To start
    the IDLE, you can type "Python" in the terminal interface. The REPL mechanism
    (Read-Eval-Print Loop) is used by IDLE to show the output on the computer screen.
    REPL is a basic method that Python interpreters use to check the lines that have
    been written and parse them so that they can be shown on the screen. This is done
    based on the input and output that are given.


    Python IDLE can be a great tool for people who are just starting to learn how
    to code. Even though most enterprise software development is done on IDEs like
    PyCharm, learning some basic commands for Python IDLE can help you understand
    how Python interpretation works.


    ## How to Use the Python IDLE Shell?


    Once Python is installed, open a terminal or command prompt and type the following
    command to start the IDLE.


    ### Command:


    ```

    $ python

    ```


    As shown below, when you press Enter or Return, a new shell will open.


    ```

    >>>

    ```


    You can test how Python IDLE works on your system by using some of the basic math
    or Print commands.


    ### Program Code:


    ```

    >>> print("This is a sample to check that the IDLE works")

    ```


    ### Output:


    ```

    This is a sample to check that the IDLE works

    ```


    When the Enter button is pressed, the program goes into REPL mode, and the text
    between the double quotes is shown on the computer screen. This is because IDLE
    knew that the shell window used the print() method to show strings.


    You can also use math operations to test the IDLE workflow.


    ### Program Code:


    ```

    >>> 8 + 3

    ```


    ### Output:


    ```

    11

    ```


    ### Exercise:


    Use the IDLE window to check the results of other math operations, like multiplication
    and division.


    ### Note:


    It''s important to remember that as soon as you close the terminal window, all
    of your code will be lost. So, even if we use an IDLE, we need to make sure that
    all of our code is put into a Python file.


    ## How to Use IDLE to Open Python Files?


    IDLE makes it simple to open and read Python files with a .py extension on the
    terminal. Keep in mind that this command will only function if you are'
  mdcn: '## 易于理解


    开发者喜欢 Python 的众多原因之一是它易于阅读。所有代码都易于理解，这使得跟进变得简单。当 Python 代码更易读时，其质量就会提升；而质量提升后，修复代码中的错误所需时间也会减少。


    ## 可移植性


    Python 还可以在任何操作系统上运行，这使得开发者只需花费几小时的工作，就能轻松地以不同方式使用它。用户只需在其系统上安装解释器，Python 程序即可运行。


    例如，假设一位程序员为 Linux 编写了一个程序，用于简化 SQL 数据库管理的自动化。那么，任何有权访问该代码的人，只需修改其中几个部分，就可以将其部署到
    Windows 或 Mac 机器上。


