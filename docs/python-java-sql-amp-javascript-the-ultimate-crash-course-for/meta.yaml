    \n## Angular 组件\n\n组件是 Angular 应用的基本构建块。用 Angular 编写的应用由定义用户界面（UI）和应用行为的组件构成。组件通过\
    \ TypeScript 类来定义。一个简单的组件示例如下：\n\n```typescript\nimport { Component } from '@angular/core';\n\
    @Component({\n  selector: 'app-hello',\n  template: `<h1>Hello, {{name}}!</h1>`\n\
    })\nexport class HelloComponent {\n  name = 'World';\n}\n```\n\n在这个演示中，我们将使用一个\
    \ TypeScript 类来创建一个名为 HelloComponent 的组件。`@Component` 装饰器负责向 Angular 提供信息，并指导其如何生成和使用组件。`selector`\
    \ 和 `template` 属性定义了组件的 HTML 内容。`selector` 属性负责确定组件 HTML 元素的名称。每当使用 `name` 属性时，将显示用户的名称。要将此组件包含在\
    \ Angular 应用中，需要创建一个使用它的新组件。\n\n```typescript\nimport { Component } from '@angular/core';\n\
    import { HelloComponent } from './hello.component';\n\n@Component({\n  selector:\
    \ 'app-root',\n  template: `<app-hello></app-hello>`\n})\nexport class AppComponent\
    \ {\n}\n```\n\n在这个演示中，我们将构建一个名为 'AppComponent' 的新组件，并使用 'HelloComponent'。代表 'HelloComponent'\
    \ 的 HTML 元素被包含在 '@Component' 装饰器的 'template' 中。\n\n## Angular 服务\n\nAngular 服务为应用提供可在整个应用中重复使用的功能。服务通过\
    \ TypeScript 类来定义，通常被注入到其他组件或服务的定义中。一个简单的服务示例如下：\n\n```typescript\nimport { Injectable\
    \ } from '@angular/core';\n@Injectable({\n  providedIn: 'root'\n})\nexport class\
    \ DataService {\n  getData(): string {\n    return 'Hello, World!';\n  }\n}\n\
    ```\n\n在下面的示例中，我们将使用一个 TypeScript 类来定义一个名为 'DataService' 的服务。`@Injectable` 装饰器负责向\
    \ Angular 提供信息，并指导其如何创建和使用该服务。`providedIn` 属性负责确定服务的作用域，在此例中，它指的是整个应用。`getData`\
    \ 函数生成一个字符串，该字符串可被其他组件或服务使用并传递给它们。要让一个组件使用此服务，我们可以将其注入到组件的构造函数中：\n\n```typescript\n\
    import { Component } from '@angular/core';\nimport { DataService } from './data.service';\n\
    @Component({\n  selector: 'app-hello',\n  template: `<h1>{{message}}</h1>`\n})\n\
    export class HelloComponent {\n  message: string;\n  constructor(private dataService:\
