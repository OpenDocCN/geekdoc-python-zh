    ```


    ## List Indexing


    Python makes it simple to manipulate or replace the elements of a list, specifically
    through the use of indexes. Indexes typically begin with 0 and provide Python
    programmers with numerous functions, such as "slicing" and "searching," to ensure
    that their programs run smoothly.

    Assume we have a list that we have previously used. We will print each element
    on the computer screen using the indexes.


    ## Program Code:


    ```

    myList = [''California'', ''Alaska'', ''Alabama'']

    print(myList[0])

    print(myList[1])

    print(myList[2])

    ```


    ## Output:


    ```

    ''California''

    ''Alaska''

    ''Alabama''

    ```


    In the previous example, when the Python interpreter detects 0 as an index, it
    prints the first element. As the index rises, so does the position on the list.
    The items in the list can also be called as shown below, along with a string literal.


    ## Program Code:


    ```

    myList = [''California'', ''Alaska'', ''Alabama'']

    print(myList[1] + '' is a wonderful state'')

    ```


    ## Output:


    ```

    Alaska is a wonderful state

    ```


    If you provide an index value that is greater than the number of list elements
    present, an index error will be returned.


    ## Program Code:


    ```

    myList = [''California'', ''Alaska'', ''Alabama'']

    print(myList[3])

    ```


