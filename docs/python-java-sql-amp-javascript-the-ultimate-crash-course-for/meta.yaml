    ## Lists


    Lists are Python data types that allow you to add different data types sequentially.
    Lists have all of the same properties as variables. They can be easily replaced,
    passed, or manipulated with the help of the Python core library''s methods.


    In Python, lists are typically represented as follows:

    [22, 23, 24]


    The list elements here are 22, 23, and 24. It is also important to understand
    that all list elements are of integer data type and are not explicitly defined
    because the Python interpreter can detect their data type.


    In the above format, lists begin and end with a square bracket. A comma will be
    used to separate all of the elements in the list. It''s also worth noting that
    if the elements in a list are of the string data type, they''re usually surrounded
    by quotes. All of the elements in a list are also referred to as items.


    ## Example:


    [Alaska, California, Alabama]


    Alaska, California, and Alabama are referred to as list elements in this context.
    As an example, all of the lists can be assigned to a variable. When you print
    the variable, the list will be printed like any other data type.


    ## Program Code:


    ```

    x = [''Alaska'', ''California'', ''Alabama'']

    print(x)

    ```


    ## Output:


    ```

    [''Alaska'', ''California'', ''Alabama'']

    ```


    ## Empty List


    If a Python list has no elements, it is referred to as an empty list. An empty
    list is also known as a null list. It''s usually written as [].


