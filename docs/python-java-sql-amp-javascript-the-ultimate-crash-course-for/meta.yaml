    that can be passed around and used without ever being declared or named. It removes
    a lot of syntactic noise involved in using interfaces and anonymous inner classes
    as callback definitions.


    # Lambda Syntax


    Lambda expressions use the -> operator to separate the parameter list from the
    body of the expression. This is known as the lambda operator or arrow operator.

    The general syntax of a lambda expression is:

    (parameter types) -> { body }

    For example, a lambda that takes an integer as a parameter and returns its square
    is:

    (int x) -> { return x * x; }

    If the body contains a single statement, return is optional, and braces {} are
    not required.

    (int x) -> x * x


    # Type Inference


    Lambda expressions don''t require the lambda parameter types and return types
    to be defined explicitly. Java compiler performs type inference to determine types
    from context.

    For example, in the following code, the compiler infers that the parameter is
    an Integer and the result is an Integer:


    ```

    x -> x * x

    ```'
