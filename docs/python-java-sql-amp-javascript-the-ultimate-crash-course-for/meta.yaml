  md: "+   - @SafeVarargs: Prevents unintended warnings caused by type erasure due\
    \ to polymorphic array parameters in generics.\n- @repeatable: Indicates an annotation\
    \ can be applied multiple times to the same program element.\n\n# Custom Annotations\n\
    \nFor custom behavior not covered by default, annotations can also be defined\
    \ through a simple annotation type.\nFor example:\n\n```\n@Retention(RetentionPolicy.RUNTIME)\n\
    @Target(ElementType.METHOD)\npublic @interface LogCall {\n    String calledBy();\n\
    }\n```\n\nHere, we define a custom @LogCall annotation specifying its target,\
