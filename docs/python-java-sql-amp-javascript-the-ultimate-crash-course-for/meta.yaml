    It employs Application Programming Interfaces (APIs) that enhance the functionality
    of the programming. Electron and React is beneficial in this field.


    # Server Applications


    Node.js facilitated the transition of JavaScript from client to server, the most
    capable server-side language.


    # Games


    Not only is JavaScript useful for websites, but also for designing recreational
    games. Combining JavaScript and HTML 5 increases JavaScript''s popularity in game
    creation. It offers the EaseJS Library, which offers methods for dealing with
    complex visuals.


    # Smartwatches


    JavaScript is utilized in every device and application imaginable. It supplies
    the PebbleJS Library, which is used by wearable apps. This framework is compatible
    with apps that need internet connectivity to operate.


    # Art


    JavaScript may be used to draw onto HTML 5 canvas, allowing artists and designers
    to construct whatever they can imagine. Additionally, the p5.js package can be
    used to enhance the sound quality of their creations.


    # Machine Learning


    The JavaScript ml5.js library may be used for web development using machine learning.'
- md: '## Mobile Applications


    JavaScript may be used to create applications for non-web environments as well.
    JavaScript''s capabilities and applications make it an effective tool for developing
    mobile apps. It is a framework to develop online and mobile applications using
    JavaScript. Thanks to React Native it''s possible to create mobile apps for several
    operating systems. We are not required to create code for several platforms. Create
    once, and use everywhere!


    ## Limitations of JavaScript


    ### Security Risks


    JavaScript may get data through AJAX or through manipulating data-loading elements
    such as `<img>`, `<object>`, and `<script>`. These are referred to as cross-site
    script assaults. They inject non-site-related JS into the visitor''s browser,
    retrieving the information.


    ### Performance


    JavaScript does not give the same degree of speed as many classic programming
    languages; thus, a complicated JavaScript application would be quite sluggish.
    Speed is not a significant limitation as JavaScript is utilized to accomplish
    basic activities on a web browser.


    ### Complexity


    Programmers must fully understand all programming principles, fundamental language
    objects, and client and server-side objects to learn a scripting language; otherwise,
    building complex JavaScript scripts would be impossible.


    ### Ineffective error handling and type checking


    It is a language with weak typing since it is unnecessary to indicate the type
    of data variables. So incorrect type verification is not done by compile.


    ## What makes JavaScript a lightweight programming language?


    JavaScript is lightweight because it uses little CPU, is simple to implement,
    and has a limited syntax. Minimal syntax, in that it lacks data types. Here, everything
    is considered an item. Due to its syntactic similarity to C++ and Java, it is
    fairly straightforward to learn.


    A lightweight programming language consumes little CPU resources. It does not
    place an excess burden on your RAM or CPU. Despite its complicated paradigms and
    logic, JavaScript operates on a web browser, using fewer resources than other
    languages. For instance, Node.js, a variant of JavaScript, not only executes calculations
    quicker than Dart or Java and utilizes fewer resources.


    In contrast to other programming languages, it contains fewer built-in libraries
    and frameworks, contributing to its lightweight nature. Nonetheless, this necessitates
    the incorporation of other libraries and frameworks.


    ## Is JavaScript interpreted, compiled, or both?


    JavaScript is compiled as well as interpreted. In older versions of JavaScript,
    only the interpreter that processed code line by line and instantly displayed
    the output was employed. However, performance has become a problem since interpretation
    is extremely sluggish. Therefore, the JIT compiler was added to subsequent versions
    of JS, perhaps after V8, to optimize execution and show the output more rapidly.
    This JIT compiler creates substantially simpler-to-code bytecode. This bytecode
    is an instruction set that has been significantly optimized.


    The V8 engine first interprets the code using an interpreter. On subsequent executions,
    a V8 engine compiles performance-enhancing patterns like frequently performed
    functions and commonly used variables.


    JavaScript is often associated with web page creation, although utilized in several
    non-browser contexts. JavaScript can be learned from the ground up with our JavaScript
    Tutorial and JavaScript Examples.


    ## Chapter 1: JavaScript Syntax and Data Types


    Several data types can be used in a JavaScript application. For instance:


    ```javascript

    const x = 5;

    const y = "Hello";

    ```


    In this example, 5 and "Hello" are integer and string data types. JavaScript provides
    eight fundamental data types.


    - String

    - Number

    - BigInt

    - Boolean

    - undefined

    - null

    - Symbol

    - Object


    ### String


    In JavaScript, a string is a sequence of characters enclosed within single quotes
    (`''`) or double quotes (`""`). Strings are one of the primary data types in the
    language and are typically used to represent text-based data. They allow you to
    store and manipulate text-based information such as names, messages, and any other
    form of textual content.


    To create a string, simply enclose the desired text within quotes. For example:


    ```javascript

    let message = ''Hello, World!'';

    let name = "Mike Doe";

    ```


    Strings in JavaScript are immutable, meaning that their values cannot be changed
    after they have been created. Nonetheless, they can be altered and new strings
    can be created by applying different operations to preexisting ones.


    String concatenation is the process of joining two or more strings together to
    form a single string. This can be done using the plus (`+`) operator or the concatenation
    assignment operator (`+=`).


    For example:


    ```javascript

    let firstName = "Mike";

    let lastName = "Doe";

    let fullName = firstName + " " + lastName; // "Mike Doe"


    let greeting = "Hello, ";

    greeting += fullName; // "Hello, Mike Doe"

    ```


    Strings also have several built-in methods that allow you to manipulate and extract
    information from them. Some commonly used string methods include `length`, `toUpperCase()`,
    `toLowerCase()`, `charAt()`, `substring()`, `split()`, and `indexOf()`. Here''s
    an example of using some of these methods:


    ```javascript

    let message = "Hello, World!";

    console.log(message.length); // 13

    console.log(message.toUpperCase()); // "HELLO, WORLD!"

    console.log(message.charAt(7)); // "W"

    console.log(message.substring(7, 12)); // "World"

    console.log(message.split(", ")); // ["Hello", "World!"]

    console.log(message.indexOf("W")); // 7

    ```


    Strings in JavaScript can also contain special characters and escape sequences.
    These allow you to include characters that are difficult to type directly or characters
    with special meaning, such as newline (`\n`) or tab (`\t`). For example:


    ```javascript

    let specialCharacters = "This string contains a newline:\nAnd a tab:\tEnd of string.";

    console.log(specialCharacters);

    ```


    **Output:**


    ```

    This string contains a newline:

    And a tab:    End of string.

    ```


    Working with strings and their manipulation is essential for handling textual
    data in JavaScript. They provide the foundation for tasks such as handling user
    input, manipulating strings in algorithms, and generating dynamic content in web
    applications.


    ### Number


    The number data type is used to represent numeric values. It encompasses both
    integer and floating-point numbers. Numbers can be positive, negative, or zero
    and can be expressed using decimal notation or scientific notation. You can assign
    a number to a variable directly:


    ```javascript

    let age = 25;

    let temperature = -10.5;

    let pi = 3.14159;

    ```


    A number type may be `-Infinity`, `+Infinity`, or `NaN` (Not a Number). For instance:


    ```javascript

    const number1 = 3/0;

    console.log(number1); // +Infinity

    const number2 = -3/0;

    console.log(number2); // -Infinity

    // strings cannot be divided by numbers

    const number3 = "abc"/3;

    console.log(number3); // NaN

    ```


    JavaScript uses a binary floating-point representation for numbers, which can
    lead to precision issues when performing certain calculations. To mitigate these
    issues, the language provides the `toFixed()` method to control the decimal places
    when displaying or formatting numbers. Additionally, the `Number` object provides
    various useful methods, such as `parseInt()` and `parseFloat()`, for converting
    strings to numbers.


    ### BigInt


    In JavaScript, the BigInt data type was introduced to address the limitation of
    the Number data type when dealing with large integers. The Number type in JavaScript
    has a maximum safe integer value, which is 2^53-1, beyond which it loses precision.
    BigInt allows developers to work with arbitrarily large integers without losing
    accuracy. You can use the `BigInt()` function or just attach the letter "n" to
    the end of an integer to create a BigInt. For example:


    ```javascript

    const bigNumber = 1234567890123456789012345678901234567890n;

    const convertedNumber = BigInt("9876543210987654321098765432109876543210");

    ```


    BigInt values can be used in mathematical operations just like regular numbers.
    However, BigInts cannot be mixed directly with regular numbers, and explicit conversion
    is required. For instance:


    ```javascript

    const bigNumber = 1234567890123456789012345678901234567890n;

    const regularNumber = 42;


    const sum = bigNumber + BigInt(regularNumber); // Valid

    const multiplication = bigNumber * BigInt(regularNumber); // Valid


    const invalid = bigNumber + regularNumber; // Invalid

    ```


    ### Boolean


    The Boolean data type represents a logical value that can be either `true` or
    `false`. Booleans are fundamental to decision-making and conditional logic in
    programming. They are used to evaluate conditions and control the flow of a program.


    Boolean values can be assigned directly to variables or result from comparisons
    or logical operations. For example:


    ```javascript

    const isTrue = true;

    const isFalse = false;


    const num1 = 10;

    const num2 = 5;

    const greaterThan = num1 > num2; // true

    const equalTo = num1 === num2; // false

    const logicalAnd = greaterThan && equalTo; // false

    const logicalOr = greaterThan || equalTo; // true

    const logicalNot = !logicalAnd; // true

    ```


    In the above example, `isTrue` and `isFalse` are variables directly assigned with
    Boolean values. The variables `greaterThan` and `equalTo` hold Boolean values
    resulting from the comparison operations. The variables `logicalAnd`, `logicalOr`,
    and `logicalNot` demonstrate the use of logical operators.'
  mdcn: '## 移动应用


    JavaScript 也可用于创建非 Web 环境的应用程序。JavaScript 的功能和应用使其成为开发移动应用的有效工具。它是一个使用 JavaScript
    开发在线和移动应用的框架。得益于 React Native，我们可以为多个操作系统创建移动应用。我们无需为不同平台编写代码。一次创建，处处使用！


    ## JavaScript 的局限性


    ### 安全风险


    JavaScript 可能通过 AJAX 或通过操作数据加载元素（如 `<img>`、`<object>` 和 `<script>`）来获取数据。这些被称为跨站脚本攻击。它们将与网站无关的
    JS 注入访问者的浏览器，从而窃取信息。


    ### 性能


    JavaScript 的速度无法与许多传统编程语言相提并论；因此，复杂的 JavaScript 应用程序可能会相当缓慢。由于 JavaScript 主要用于在
    Web 浏览器上执行基本任务，速度并非一个主要的限制因素。


    ### 复杂性


    程序员必须完全理解所有编程原则、基本语言对象以及客户端和服务器端对象，才能学习脚本语言；否则，构建复杂的 JavaScript 脚本将不可能实现。


    ### 低效的错误处理和类型检查


    由于无需指定数据变量的类型，JavaScript 是一种弱类型语言。因此，编译器不会进行不正确的类型验证。


    ## 为什么 JavaScript 是一种轻量级编程语言？


    JavaScript 是轻量级的，因为它占用 CPU 资源少、易于实现且语法有限。语法极简，因为它没有数据类型。在这里，一切都被视为一个对象。由于其语法与
    C++ 和 Java 相似，学习起来相当简单。


    轻量级编程语言消耗的 CPU 资源很少。它不会给你的 RAM 或 CPU 带来过重的负担。尽管其范式和逻辑复杂，JavaScript 在 Web 浏览器上运行，使用的资源比其他语言少。例如，JavaScript
    的一个变体 Node.js，不仅比 Dart 或 Java 执行计算更快，而且使用的资源也更少。


    与其他编程语言相比，它包含的内置库和框架较少，这有助于其轻量级特性。尽管如此，这需要引入其他库和框架。


    ## JavaScript 是解释型、编译型还是两者兼有？


    JavaScript 既是编译型也是解释型语言。在 JavaScript 的早期版本中，只使用逐行处理代码并立即显示输出的解释器。然而，由于解释执行速度极慢，性能成为了一个问题。因此，在后续版本的
    JS 中（可能是在 V8 之后）加入了 JIT 编译器，以优化执行并更快地显示输出。这个 JIT 编译器生成了显著更易于编码的字节码。这种字节码是一组经过大幅优化的指令集。


    V8 引擎首先使用解释器解释代码。在后续执行中，V8 引擎会编译性能增强的模式，例如频繁执行的函数和常用的变量。


    JavaScript 通常与网页创建相关联，但也用于多种非浏览器环境。你可以通过我们的 JavaScript 教程和 JavaScript 示例从头开始学习
    JavaScript。


    ## 第 1 章：JavaScript 语法和数据类型


    JavaScript 应用程序可以使用多种数据类型。例如：


    ```javascript

    const x = 5;

    const y = "Hello";

    ```


    在这个例子中，5 和 "Hello" 分别是整数和字符串数据类型。JavaScript 提供了八种基本数据类型。


    - String

    - Number

    - BigInt

    - Boolean

    - undefined

    - null

    - Symbol

    - Object


    ### String


    在 JavaScript 中，字符串是用单引号 (`''`) 或双引号 (`""`) 括起来的字符序列。字符串是该语言的主要数据类型之一，通常用于表示基于文本的数据。它们允许你存储和操作基于文本的信息，如名称、消息和任何其他形式的文本内容。


    要创建一个字符串，只需将所需的文本用引号括起来。例如：


    ```javascript

    let message = ''Hello, World!'';

    let name = "Mike Doe";

    ```


    JavaScript 中的字符串是不可变的，这意味着它们的值在创建后无法更改。尽管如此，可以通过对现有字符串应用不同的操作来修改它们并创建新字符串。


    字符串连接是将两个或多个字符串连接在一起形成一个新字符串的过程。这可以使用加号 (`+`) 运算符或连接赋值运算符 (`+=`) 来完成。


    例如：


    ```javascript

    let firstName = "Mike";

    let lastName = "Doe";

    let fullName = firstName + " " + lastName; // "Mike Doe"


    let greeting = "Hello, ";

    greeting += fullName; // "Hello, Mike Doe"

    ```


    字符串还具有多种内置方法，允许你操作和提取信息。一些常用的字符串方法包括 `length`、`toUpperCase()`、`toLowerCase()`、`charAt()`、`substring()`、`split()`
    和 `indexOf()`。以下是使用其中一些方法的示例：


    ```javascript

    let message = "Hello, World!";

    console.log(message.length); // 13

    console.log(message.toUpperCase()); // "HELLO, WORLD!"

    console.log(message.charAt(7)); // "W"

    console.log(message.substring(7, 12)); // "World"

    console.log(message.split(", ")); // ["Hello", "World!"]

    console.log(message.indexOf("W")); // 7

    ```


    JavaScript 中的字符串还可以包含特殊字符和转义序列。这些允许你包含难以直接输入的字符或具有特殊含义的字符，例如换行符 (`\n`) 或制表符 (`\t`)。例如：


    ```javascript

    let specialCharacters = "This string contains a newline:\nAnd a tab:\tEnd of string.";

    console.log(specialCharacters);

    ```


    **输出：**


    ```

    This string contains a newline:

    And a tab:    End of string.

    ```


    处理字符串及其操作对于在 JavaScript 中处理文本数据至关重要。它们为处理用户输入、在算法中操作字符串以及在 Web 应用程序中生成动态内容等任务提供了基础。


    ### Number


    数字数据类型用于表示数值。它包括整数和浮点数。数字可以是正数、负数或零，可以使用十进制表示法或科学计数法表示。你可以直接将数字赋值给变量：


    ```javascript

    let age = 25;

    let temperature = -10.5;

    let pi = 3.14159;

    ```


    数字类型可以是 `-Infinity`、`+Infinity` 或 `NaN`（非数字）。例如：


    ```javascript

    const number1 = 3/0;

    console.log(number1); // +Infinity

    const number2 = -3/0;

    console.log(number2); // -Infinity

    // 字符串不能除以数字

    const number3 = "abc"/3;

    console.log(number3); // NaN

    ```


    JavaScript 使用二进制浮点数表示数字，这在执行某些计算时可能导致精度问题。为了缓解这些问题，该语言提供了 `toFixed()` 方法，用于在显示或格式化数字时控制小数位数。此外，`Number`
    对象提供了各种有用的方法，如 `parseInt()` 和 `parseFloat()`，用于将字符串转换为数字。


    ### BigInt


    在 JavaScript 中，引入 BigInt 数据类型是为了解决 Number 数据类型在处理大整数时的限制。JavaScript 中的 Number
    类型有一个最大安全整数值，即 2^53-1，超过这个值就会失去精度。BigInt 允许开发者处理任意大的整数而不会损失精度。你可以使用 `BigInt()`
    函数或直接在整数末尾附加字母 "n" 来创建一个 BigInt。例如：


    ```javascript

    const bigNumber = 1234567890123456789012345678901234567890n;

    const convertedNumber = BigInt("9876543210987654321098765432109876543210");

    ```


    BigInt 值可以像普通数字一样用于数学运算。但是，BigInt 不能直接与普通数字混合使用，需要显式转换。例如：


    ```javascript

    const bigNumber = 1234567890123456789012345678901234567890n;

    const regularNumber = 42;


    const sum = bigNumber + BigInt(regularNumber); // 有效

    const multiplication = bigNumber * BigInt(regularNumber); // 有效


    const invalid = bigNumber + regularNumber; // 无效

    ```


    ### Boolean


    布尔数据类型表示一个逻辑值，可以是 `true` 或 `false`。布尔值是编程中决策和条件逻辑的基础。它们用于评估条件并控制程序的流程。


    布尔值可以直接赋值给变量，也可以是比较或逻辑运算的结果。例如：


    ```javascript

    const isTrue = true;

    const isFalse = false;


    const num1 = 10;

    const num2 = 5;

    const greaterThan = num1 > num2; // true

    const equalTo = num1 === num2; // false

    const logicalAnd = greaterThan && equalTo; // false

    const logicalOr = greaterThan || equalTo; // true

    const logicalNot = !logicalAnd; // true

    ```


    在上面的例子中，`isTrue` 和 `isFalse` 是直接赋值了布尔值的变量。变量 `greaterThan` 和 `equalTo` 保存了比较运算产生的布尔值。变量
    `logicalAnd`、`logicalOr` 和 `logicalNot` 演示了逻辑运算符的使用。'
