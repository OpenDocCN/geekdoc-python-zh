    Python 论坛来找出问题所在。


    ## 第 2 章：PyCharm 和 IDLE


    安装 Python 后，您需要在系统上拥有一个开发环境来编写程序。IDLE 代表 "集成开发和学习环境"。尽管您可以使用基本 Python 安装附带的基本
    IDLE 进行工作，但鼓励开发者使用像 PyCharm 这样的 IDE（集成开发环境），以获得更好的软件开发工作流程。IDE 使开发者更高效，并使他们更容易在已转换为软件的代码中找到错误。


