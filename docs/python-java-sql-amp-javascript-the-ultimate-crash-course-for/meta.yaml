    # DELETE


    When you want to remove records already in a table, you may use the DELETE command
    in SQL.

    Because accidentally removing the incorrect rows might result in lost data, it
    is essential to utilize the WHERE clause with extreme caution. Before removing
    the data, it is a good idea to validate your DELETE statement using a SELECT query
    to validate the rows the deletion could impact. This is a recommended best practice.

    Be aware that the data you delete using DELETE statements is irretrievably destroyed
    and cannot be recovered under any circumstances. This information is gone forever.
    It is important to keep regular backups of your data to prevent it from being
    lost in the event it is inadvertently deleted.


    # Syntax:


    ```

    DELETE FROM table_name

    WHERE condition

