    # Chapter 9: Real-World Java Development


    # Building a CRUD Application: From Start to Finish


    # Planning the Application


    The first step in building any software application is planning. For a CRUD application,
    we need to determine what data we will manage and how users will interact with
    it.


    For this bookstore application, we identified that books will be the main data
    entity. Each book will have fields for title, author, price, and quantity available.
    These translate directly into columns in the database table that will store book
    records.


    Next, we considered the basic functionality users need. At a minimum, they should
    be able to:


    +   - View a list of all books

    - Add a new book

    - View/edit an individual book''s details

    - Delete a book


    These operations map to the standard CRUD operations - Read (view list), Create
    (add new), Update (edit), and Delete. Additional features like searching and sorting
    could be expanded on later.


    Finally, we thought about how this will be delivered. A web application using
    JSP/Servlets is a common way to build CRUD systems. Users will interact through
    web pages displayed in a browser. This allows accessing the application from anywhere
    without installing additional software.


    With the planning done, we had the foundation to start development.


    # Setting Up the Development Environment


    For a Java web application, we need a server environment to run the application
    code and a persistence layer to store data. We chose Apache Tomcat as our server
    since it is a lightweight and popular open-source Java Servlet container. It was
    downloaded and configured on our development machines. For the database, H2 was
    selected as it is an in-memory SQL'
  - '[PAGE 233]


    database ideal for development/testing. Its JDBC driver was also downloaded. To
    connect Tomcat and H2, we added the required JDBC libraries to Tomcat''s classpath.
    This allows our Java code to communicate with the database. H2 has a built-in
    browser-based console to view and manipulate data. We used it to create the ''books''
    table with the four book fields as columns. This completed the basic infrastructure
    preparation.


    # Creating the Model Layer


    Next, we implemented the model layer that represents our application''s data.
    This included:


    +   1. Book entity class: A simple POJO mapping to the database table with fields
    and getter/setter methods

    2. DAO interfaces: Defined database access methods like findAll(), save(), update(),
    delete()

    3. DAO implementations: Contain JDBC code to execute CRUD SQL and return results


    The DAOs abstracted JDBC for cleaner code. Utility methods like connection opening/closing
    were also created.

    To summarize, the model layer focuses on managing the data and interacts with
    the database infrastructure behind a clean interface. Its role is to retrieve
    and persist Book objects.


    # Building the View Layer


    JSP allows the creation of attractive and dynamic web pages simply. We designed
    the view layer to:


    +   1. Books. jsp - Display all books in a table with edit/delete links

    2. and add books. jsp - Form to add a new book with submission to a servlet

    3. editBook.jsp - Pre-populate form with book details for updating

    4. message.jsp - Display status/errors returned from servlets


    Simple HTML constructs, JSP expressions to embed Java variables, and SQL tags
    to iterate over data allowed building these pages quickly.

    We followed best practices like separating presentation from logic, using consistent
    formatting/ styling, and keeping pages focused on a single task.

    The result is cleanly designed templated content for users to interact with.'
- md: "## Implementing the Controller Layer\n\nServlets act as controllers that bridge\
    \ the view and model layers. We implemented:\n\n- 1. BookServlet - Handle HTTP\
    \ requests, call DAO methods, forward to views\n- 2. AddBookServlet - Accept form\
    \ data, save to database, show success/error\n- 3. EditBookServlet - Update existing\
    \ book details from the form submit\n- 4. DeleteBookServlet - Remove a book record\
    \ by id\n\nServlets validate input, interact with the DAO layer as needed, and\
    \ then dispatch to appropriate JSP views. Parameters are passed between requests\
    \ using the HTTP session.\n\nFinally, utility classes were written for common\
    \ tasks like request handling and user input validation. They reduce redundant\
    \ code across servlets.\n\n## Integrated Testing\n\nThorough testing ensures quality\
    \ and prevents regressions. We covered:\n\n- Model layer tests: Use JUnit to test\
    \ DAO functionality independently of other layers\n- Controller layer tests: Mock\
    \ model interactions, validate servlet responses\n- Integration tests: Mimic real\
    \ usage with edge cases by making full HTTP requests\n\nContinuous integration\
    \ using Jenkins automates running the full test suite on code changes. This lets\
    \ developers focus on features while knowing existing logic is unchanged.\n\n\
    The testing establishes trust in the application to handle real-world usage reliably\
    \ as features are added over time.\n\n## Putting it All Together\n\nTo launch\
    \ the finished application:\n\n- 1. Create war file packaging classes, JSPs, dependencies\n\
    - 2. Deploy war to the Tomcat server\n- 3. Access the homepage and try all CRUD\
    \ operations\n- 4. Integrate with continuous delivery using Jenkins\n- 5. Release\
    \ version 1.0 of the bookstore app\n\nThe completed project showcases applying\
    \ core Java technologies end-to-end. It demonstrates architecture best practices\
    \ like separation of concerns, unit testing, and extensibility at each layer to\
    \ create a robust application. The examples and explanations give readers practical\
    \ knowledge to develop their own functional and maintainable CRUD systems using\
    \ Java/JSP for real business needs, and learning objectives are fully covered.\n\
    \n## Connecting Java with Databases\n\n## Choosing a Database\n\nThe first step\
    \ in connecting a Java application to persistent data storage is selecting an\
    \ appropriate database. There are several options to choose from:\n\n- Relational\
    \ Databases: Like MySQL, Oracle, PostgreSQL - Store data in tables with rows and\
    \ columns. Support structured querying via SQL.\n- Non-Relational Databases: Like\
    \ MongoDB, Cassandra - Flexible document or key-value data models. Distributed\
    \ computing oriented.\n- In-Memory Databases: Like H2, HSQLDB - primarily for\
    \ development/testing. Data resides only in RAM.\n\nFor most Java enterprise applications,\
    \ a relational database provides the right balance of structure, performance,\
    \ and functionality. The two most common choices are MySQL for open-source and\
    \ Oracle for large commercial projects. Key factors in deciding are data model\
    \ needs, query requirements, scale expectations, budget, and vendor support availability.\
    \ Relational databases excel when data can be organized into logical relationships.\n\
    \n## Setting Up the Database\n\nOnce the database is selected, it needs to be\
    \ installed and configured for use with Java code. For MySQL, the server software\
    \ is downloaded, installed, and started. A default database and user account are\
    \ also created during setup.\n\nFor connectivity, the MySQL JDBC driver JAR file\
    \ must be placed on the Java classpath. This is typically done by copying it to\
    \ the Tomcat/lib folder for web apps. Setting an environment variable for the\
    \ database URL like:\n`export DB_URL=jdbc:mysql://localhost:3306/books`\nAllows\
    \ programs to connect without hardcoding server details. To confirm installation\
    \ and access, tools like MySQL Workbench can be used to interact with the database\
    \ in the exact same way Java code will - submitting queries and viewing results.\
    \ This verifies the database is ready to use as a persistent data store for the\
    \ Java application.\n\n## Connecting with JDBC\n\nThe Java Database Connectivity\
    \ (JDBC) API provides a standard way for Java code to communicate with all major\
    \ relational databases through SQL. JDBC follows the typical data access steps:\n\
    \n### 1. Load driver class\n\n```java\nClass.forName(\"com.mysql.cj.jdbc.Driver\"\
    );\n```\n\n### 2. Get a database connection\n\n```java\nConnection conn = DriverManager.getConnection(DB_URL,\
    \ DB_USERNAME, DB_PASSWORD);\n```\n\n### 3. Create SQL statement\n\n```java\n\
    String sql = \"SELECT * FROM books\";\n```\n\n### 4. Execute statement\n\n```java\n\
    Statement stmt = conn.createStatement();\n```\n\n### 5. Process ResultSet\n\n\
    ```java\nResultSet rs = stmt.executeQuery(sql);\n```\n\n### 6. Close resources\n\
    \n```java\nrs.close();\nstmt.close();\nconn.close();\n```\n\nWhile simple, raw\
    \ JDBC is verbose and error-prone. Most code delegates data access to specialized\
    \ classes instead.\n\n## Simplifying Data Access\n\nCode to interact with the\
    \ database is abstracted behind DAOs (Data Access Objects). DAOs provide cleaner\
    \ interfaces focused on core data operations. For example, a BookDAO may define\
    \ methods like:\n\n```java\npublic interface BookDAO {\n    List<Book> findAll();\n\
    \    Book findById(long id);\n    void save(Book book);\n    void update(Book\
    \ book);\n    void deleteById(long id);\n}\n```\n\nTheir implementations handle\
    \ all JDBC calls without cluttering other classes.\n\nFrameworks like Spring JDBC\
    \ Template provide pre-built DAO functionality with only domain logic code specific\
    \ to each entity. This drastically simplifies the data access code.\n\nLibraries\
    \ like Hibernate take it further by automatically mapping objects to database\
    \ tables and handling SQL under the hood completely transparently.\n\n## Overall\
    \ Benefits\n\nThe major benefits of using a standard relational database with\
    \ JDBC/DAO approach include:\n\n- Formal data structure with integrity constraints\
    \ enforced by the database itself.\n- Persistent storage of objects independent\
    \ of the application lifecycle.\n- Isolation from specific database versions through\
    \ abstraction layers.\n- Leverage decades of database optimization, security hardening,\
    \ and scalability features.\n- Easy migration between database vendors if needed.\n\
    - Industry-standard skillset applicable industry-wide.\n\nBy understanding the\
    \ fundamentals of selecting and connecting to a database through JDBC, developers\
    \ are equipped to design and build robust, scalable Java enterprise applications\
    \ backed by powerful yet approachable persistence capabilities.\n\n## Best Practices:\
    \ Writing Clean, Maintainable Code\n\n## Object-Oriented Design Principles\n\n\
    Object-oriented design promotes code organization, reuse, and extensibility through\
    \ concepts like encapsulation, loose coupling, and high cohesion. Encapsulation\
    \ groups related data and behavior within classes. Exposing only necessary public\
    \ methods hides implementation details. This allows flexibility to change internals\
    \ without affecting other code. Loose coupling minimizes interdependencies between\
    \ classes. For example, interfaces can be implemented instead of concrete classes,\
    \ so classes are only aware of method signatures, not implementations.\n\nHigh\
    \ cohesion means classes have a well-defined, narrowly focused responsibility.\
    \ There should be a clear relationship between a class's methods and attributes.\
    \ This makes classes easier to understand and reuse. Proper utilization of objects,\
    \ interfaces, abstraction, and other core OO principles results in code that ages\
    \ better when requirements change over time.\n\n## Separation of Concerns\n\n\
    Large applications involve many distinct areas of functionality. Separation of\
    \ concerns modularity principles tackle complexity by dividing code into logical\
    \ sections, each of which has a clear purpose.\n\nCommon separations include:\n\
    \n- Model - Represent and interact with application data\n- Controller - Handle\
    \ user input and flow of control\n- View - Generate output and display UI\n\n\
    Separating the implementation of distinct activities makes code more readable\
    \ and maintainable by developers. It also allows teams to work independently on\
    \ isolated concerns.\n\n## Naming Conventions"
  mdcn: "## 实现控制器层\n\nServlet充当连接视图层和模型层的控制器。我们实现了：\n\n- 1. BookServlet - 处理HTTP请求，调用DAO方法，转发到视图\n\
    - 2. AddBookServlet - 接收表单数据，保存到数据库，显示成功/错误信息\n- 3. EditBookServlet - 通过表单提交更新现有图书详情\n\
    - 4. DeleteBookServlet - 通过id删除图书记录\n\nServlet验证输入，根据需要与DAO层交互，然后分派到相应的JSP视图。参数通过HTTP会话在请求之间传递。\n\
    \n最后，为常见任务编写了实用类，如请求处理和用户输入验证。它们减少了Servlet之间的冗余代码。\n\n## 集成测试\n\n彻底的测试确保质量并防止回归。我们涵盖了：\n\
    \n- 模型层测试：使用JUnit独立于其他层测试DAO功能\n- 控制器层测试：模拟模型交互，验证Servlet响应\n- 集成测试：通过发出完整的HTTP请求，模拟真实使用场景和边界情况\n\
    \n使用Jenkins进行持续集成，可在代码更改时自动运行完整的测试套件。这让开发者可以专注于功能开发，同时确信现有逻辑未被改变。\n\n测试建立了对应用程序可靠处理真实世界使用情况的信任，随着功能的增加，这种信任会持续增长。\n\
    \n## 整合所有部分\n\n要启动完成的应用程序：\n\n- 1. 创建war文件，打包类、JSP、依赖项\n- 2. 将war部署到Tomcat服务器\n\
    - 3. 访问主页并尝试所有CRUD操作\n- 4. 使用Jenkins集成持续交付\n- 5. 发布书店应用的1.0版本\n\n完成的项目展示了端到端应用核心Java技术。它演示了架构最佳实践，如关注点分离、单元测试以及每一层的可扩展性，以创建健壮的应用程序。示例和解释为读者提供了实用知识，使他们能够使用Java/JSP为实际业务需求开发自己的功能性和可维护的CRUD系统，学习目标已完全涵盖。\n\
    \n## 连接Java与数据库\n\n## 选择数据库\n\n将Java应用程序连接到持久数据存储的第一步是选择合适的数据库。有几种选择：\n\n- 关系型数据库：如MySQL、Oracle、PostgreSQL\
    \ - 以行和列的形式存储在表中。支持通过SQL进行结构化查询。\n- 非关系型数据库：如MongoDB、Cassandra - 灵活的文档或键值数据模型。面向分布式计算。\n\
    - 内存数据库：如H2、HSQLDB - 主要用于开发/测试。数据仅驻留在RAM中。\n\n对于大多数Java企业应用程序，关系型数据库在结构、性能和功能之间提供了恰当的平衡。最常见的两种选择是用于开源项目的MySQL和用于大型商业项目的Oracle。决策的关键因素包括数据模型需求、查询要求、规模预期、预算和供应商支持可用性。当数据可以组织成逻辑关系时，关系型数据库表现出色。\n\
    \n## 设置数据库\n\n一旦选择了数据库，就需要安装并配置它以与Java代码一起使用。对于MySQL，需要下载、安装并启动服务器软件。在设置过程中还会创建一个默认数据库和用户帐户。\n\
    \n为了连接，必须将MySQL JDBC驱动程序JAR文件放在Java类路径上。对于Web应用程序，通常通过将其复制到Tomcat/lib文件夹来完成。设置数据库URL的环境变量，例如：\n\
    `export DB_URL=jdbc:mysql://localhost:3306/books`\n允许程序连接而无需硬编码服务器详细信息。为了确认安装和访问，可以使用MySQL\
    \ Workbench等工具以与Java代码完全相同的方式与数据库交互——提交查询并查看结果。这验证了数据库已准备好作为Java应用程序的持久数据存储使用。\n\
    \n## 使用JDBC连接\n\nJava数据库连接（JDBC）API为Java代码通过SQL与所有主要关系型数据库通信提供了标准方式。JDBC遵循典型的数据访问步骤：\n\
    \n### 1. 加载驱动程序类\n\n```java\nClass.forName(\"com.mysql.cj.jdbc.Driver\");\n```\n\
    \n### 2. 获取数据库连接\n\n```java\nConnection conn = DriverManager.getConnection(DB_URL,\
    \ DB_USERNAME, DB_PASSWORD);\n```\n\n### 3. 创建SQL语句\n\n```java\nString sql = \"\
    SELECT * FROM books\";\n```\n\n### 4. 执行语句\n\n```java\nStatement stmt = conn.createStatement();\n\
    ```\n\n### 5. 处理ResultSet\n\n```java\nResultSet rs = stmt.executeQuery(sql);\n\
    ```\n\n### 6. 关闭资源\n\n```java\nrs.close();\nstmt.close();\nconn.close();\n```\n\
    \n虽然简单，但原始JDBC代码冗长且容易出错。大多数代码将数据访问委托给专门的类。\n\n## 简化数据访问\n\n与数据库交互的代码被抽象在DAO（数据访问对象）之后。DAO提供了专注于核心数据操作的更清晰的接口。例如，BookDAO可能定义如下方法：\n\
    \n```java\npublic interface BookDAO {\n    List<Book> findAll();\n    Book findById(long\
    \ id);\n    void save(Book book);\n    void update(Book book);\n    void deleteById(long\
    \ id);\n}\n```\n\n它们的实现处理所有JDBC调用，而不会使其他类变得混乱。\n\n像Spring JDBC Template这样的框架提供了预构建的DAO功能，只需要每个实体特定的领域逻辑代码。这极大地简化了数据访问代码。\n\
    \n像Hibernate这样的库更进一步，通过自动将对象映射到数据库表，并在底层完全透明地处理SQL。\n\n## 总体优势\n\n使用标准关系型数据库与JDBC/DAO方法的主要优势包括：\n\
    \n- 由数据库本身强制执行完整性约束的正式数据结构。\n- 独立于应用程序生命周期的对象持久存储。\n- 通过抽象层隔离特定数据库版本。\n- 利用数十年的数据库优化、安全加固和可扩展性功能。\n\
    - 如有需要，可在数据库供应商之间轻松迁移。\n- 适用于整个行业的行业标准技能组合。\n\n通过理解通过JDBC选择和连接数据库的基础知识，开发者能够设计和构建健壮、可扩展的Java企业应用程序，这些应用程序由强大但易于使用的持久化能力提供支持。\n\
    \n## 最佳实践：编写清晰、可维护的代码\n\n## 面向对象设计原则\n\n面向对象设计通过封装、松耦合和高内聚等概念促进代码组织、重用和可扩展性。封装将相关数据和行为分组在类中。仅暴露必要的公共方法隐藏了实现细节。这允许在不影响其他代码的情况下灵活更改内部实现。松耦合最小化了类之间的相互依赖性。例如，可以实现接口而不是具体类，因此类只知道方法签名，而不知道实现。\n\
    \n高内聚意味着类具有定义明确、范围狭窄的职责。类的方法和属性之间应该有清晰的关系。这使得类更容易理解和重用。正确利用对象、接口、抽象和其他核心OO原则，可以产生在需求随时间变化时表现更好的代码。\n\
    \n## 关注点分离\n\n大型应用程序涉及许多不同的功能领域。关注点分离的模块化原则通过将代码划分为逻辑部分来解决复杂性，每个部分都有明确的目的。\n\n\
    常见的分离包括：\n\n- 模型 - 表示和与应用程序数据交互\n- 控制器 - 处理用户输入和控制流\n- 视图 - 生成输出和显示UI\n\n分离不同活动的实现使代码对开发者更具可读性和可维护性。它还允许团队在隔离的关注点上独立工作。\n\
    \n## 命名约定"
