    \        chars.add(c); });\n```\n\nHere, the generic type of List in chars is\
    \ inferred from the type of string in the loop.\n\n# Method overloading resolution\n\
    \nWhen a lambda is passed as a method argument, Java resolves the overload based\
    \ on the target signature matching the functional interface signature.\nFor example,\
    \ in Collections. Sort (), the comparator is a functional interface, so lambda\
    \ is inferred appropriately.\n\n# Applications of Lambda Expressions\n\nSome common\
    \ uses of lambda expressions are:\n\n+   - As callback handler in Swing/FX event\
    \ listeners\n- Processing streams sequentially\n- Implementing simple Runnable\
    \ or callable tasks for threading\n- Sorting/Searching collections using comparator\
    \ lambdas\n- Database querying using predicate lambdas\n\nLambda expressions make\
    \ Java code more functional and concise by treating code as data. They have reduced\
    \ the verbosity in functional interface usage and enabled new functional capabilities\
    \ in existing class libraries.\n\n# Streams: Processing Collections More Elegantly\n\
    \n# What are Streams?"
- md: 'Streams introduced in Java 8 provide a new abstraction for processing data
    sequentially and aggregate operations on them in a declarative way. A stream is
    not a data structure; instead, it relies on existing data structures but allows
    extracting and transforming elements from sources in a declarative manner.


    ## Sources of Stream


    Any data structure that supports iteration can serve as a source for a Stream.
    Some common examples are:


    - Collections like List, Set, Map

    - Arrays

    - I/O resources like Files

    - Generator functions


    ## Streams vs Collections in Java


    Streams and Collections are both core concepts in Java, but they serve distinct
    purposes and exhibit different behaviors. Collections, as their name implies,
    are essentially in-memory data structures, like lists, sets, or maps, that store
    elements. They allow operations that often modify the state of the collection
    itself. On the other hand, Streams don''t hold data in the traditional sense.
    Instead, they are more like conduits that offer operations to access and transform
    elements on the fly, usually sourced from Collections or other data sources.


    A salient difference arises in how they handle operations. Collections involve
    modifying their internal state when operations are performed on them. Streams,
    in contrast, primarily operate using non-mutating methods. This makes Streams
    inherently more favorable for concurrent or parallel operations, as they avoid
    the pitfalls of shared mutable state. Furthermore, Stream operations are designed
    to be chained, allowing multiple transformations to be executed sequentially in
    a pipeline. Unlike Collections, where each operation is typically executed independently
    and immediately, Streams defer execution, processing elements on-demand.


    ## Stream Operations and Their Characteristics


    Streams in Java are equipped with a range of both intermediate and terminal operations.
    Intermediate operations, such as **filter**, **map**, and **sorted**, return a
    new Stream. These operations are lazy, meaning they don''t do any actual computation
    until a terminal operation demands results. This behavior is foundational to the
    efficiency of Streams, as it enables operations to be set up in advance, with
    actual computation deferred until genuinely required.


    Terminal operations, like **forEach**, **count**, and **collect**, however, produce
    a result or a side-effect and mark the end of the Stream processing pipeline.
    Once a terminal operation is invoked, the stream is consumed, meaning it can''t
    be reused.


    One of the defining features of Streams is pipelining. By chaining together multiple
    intermediate operations, developers can craft intricate data flow pipelines. When
    a terminal operation is finally called, these operations are executed in sequence,
    processing the elements through the pipeline.


    ## Lazy Evaluation and Optimization in Streams


    The lazy nature of Streams brings about several benefits. Operations set up in
    a stream pipeline aren''t executed immediately. Instead, they wait patiently until
    a terminal operation kickstarts the computation. This deferred execution model
    aids in conserving resources, executing computations only when results are genuinely
    necessary. Additionally, it paves the way for certain optimizations. For instance,
    Streams can employ short-circuiting, where computation ceases once the desired
    outcome is achieved, preventing unnecessary processing.


    ## Parallel Streams and Their Advantages


    Java Streams also provide support for parallel processing. By employing parallel
    streams, the source data can be divided into multiple sub-streams. These sub-streams
    are then processed concurrently, leveraging multiple threads. After processing,
    the results from the various sub-streams are aggregated. This model abstracts
    the intricacies of parallelization and thread coordination, presenting developers
    with a high-level, efficient mechanism for concurrent data processing. The result
    is a powerful combination of simplicity and performance, allowing for significant
    speed-ups, especially with large datasets.


    ## Declarative vs Imperative


    Streams make aggregation operations more declarative - concentrating on what rather
    than how. Passing lambda predicates and functions is more declarative than iterative
    looping.


    This declarative nature makes code easier to read, reason about, and optimize,
    like enabling parallelism in certain cases.


    ## Common Stream Operations: Filtering, Mapping, and Collecting


    ### Filter Operation


    The filter operation allows pruning a stream to only include elements matching
    a given predicate function. This is an intermediate operation that returns a new
    stream.


    For example, to filter a list of names to only include names starting with ''A'':


    ```java

    List<String> names = ... names.stream().filter(name -> name.startsWith("A"))

    ```


    This filter returns a new stream containing only those elements of the original
    stream where the predicate `name.startsWith("A")` returned true.


    The filter predicate can reference immutable state and effectively final local
    variables from enclosing scope. However, it should not perform any side-effects
    like mutating external objects or variables.


    ### Some key properties of filter operation:


    The **filter** operation is an integral part of Java''s Stream API, allowing developers
    to sift through data and retain only those elements that satisfy a given condition
    or predicate. Here are the key characteristics of the **filter** operation:


    1.  **Laziness**: One of the most defining attributes of the filter operation
    is its lazy nature. When filter is invoked, it doesn''t immediately evaluate the
    predicate against the elements. Instead, it sets up a condition that will be checked
    later, precisely when a terminal operation is called on the stream. This ensures
    that computations are deferred and only executed when results are truly necessary.

    2.  **Chainability**: The filter operation can be seamlessly chained with other
    intermediate operations in a Stream pipeline. This means you can have multiple
    filter calls one after the other or interleave them with other operations like
    map or sorted. This allows for the construction of complex data processing pipelines
    that are both efficient and readable.

    3.  **Short-Circuiting**: While the filter operation itself doesn''t inherently
    short-circuit, its behavior in combination with certain terminal operations can
    lead to short-circuiting. For instance, when combined with findFirst in a Stream,
    the processing will stop as soon as an element that satisfies the predicate is
    found. However, it''s crucial to note that the claim "Short-circuits if predicate
    ever returns false" is slightly misleading. The filter operation will evaluate
    the predicate for all elements when required, but the resultant stream will only
    contain those elements for which the predicate returns true.


    ### Common uses of filters include:


    The **filter** operation finds extensive use in various scenarios to refine and
    process data. Some of its common applications include:


    1.  **Criteria-based Extraction**: One of the primary uses of filter is to extract
    elements from a collection based on specific criteria. For instance, you might
    want to retrieve all even numbers from a list or select all strings of a certain
    length.

    2.  **Purging Null or Empty Values**: In many data processing tasks, it''s crucial
    to cleanse the data of null or empty values to prevent potential errors further
    down the line. Using filter, you can easily remove such undesired elements from
    your data stream.

    3.  **Selective Inclusion Based on Object Properties**: When dealing with streams
    of objects, the filter operation proves invaluable in selecting objects based
    on their attributes. For instance, in a stream of Person objects, you might want
    to filter out all persons below a certain age or those who live in a specific
    city.


    ### Map Operation


    The map operation transforms each element in the stream through the mapping function
    provided and returns a new stream containing the results.'
  mdcn: 'Java 8 中引入的流（Streams）为数据处理提供了一种新的抽象，支持以声明式方式对数据进行顺序处理和聚合操作。流并非数据结构；相反，它依赖于现有的数据结构，但允许以声明式方式从数据源中提取和转换元素。


    ## 流的来源


    任何支持迭代的数据结构都可以作为流的来源。一些常见示例包括：


    -   集合，如 List、Set、Map

    -   数组

    -   I/O 资源，如文件

    -   生成器函数


    ## Java 中的流与集合


    流和集合都是 Java 中的核心概念，但它们服务于不同的目的并表现出不同的行为。顾名思义，集合本质上是内存中的数据结构，如列表、集合或映射，用于存储元素。它们允许的操作通常会修改集合本身的状态。另一方面，流在传统意义上并不持有数据。相反，它们更像是管道，提供操作来实时访问和转换元素，这些元素通常来源于集合或其他数据源。


    一个显著的区别在于它们处理操作的方式。集合在执行操作时会修改其内部状态。相比之下，流主要使用非变更方法进行操作。这使得流天然更适合并发或并行操作，因为它们避免了共享可变状态的陷阱。此外，流操作被设计为可链式调用，允许在管道中顺序执行多个转换。与集合中每个操作通常独立且立即执行不同，流会延迟执行，按需处理元素。


    ## 流操作及其特性


    Java 中的流配备了一系列中间操作和终端操作。中间操作，如 **filter**、**map** 和 **sorted**，返回一个新的流。这些操作是惰性的，这意味着在终端操作要求结果之前，它们不会进行任何实际计算。这种行为是流效率的基础，因为它允许操作预先设置，而实际计算则延迟到真正需要时才进行。


    然而，终端操作，如 **forEach**、**count** 和 **collect**，会产生结果或副作用，并标志着流处理管道的结束。一旦调用终端操作，流就会被消耗，这意味着它不能被重用。


    流的一个定义性特征是管道化。通过将多个中间操作链接在一起，开发者可以构建复杂的数据流管道。当最终调用终端操作时，这些操作将按顺序执行，通过管道处理元素。


    ## 流中的惰性求值与优化


    流的惰性特性带来了诸多好处。流管道中设置的操作不会立即执行。相反，它们会耐心等待，直到终端操作启动计算。这种延迟执行模型有助于节省资源，仅在真正需要结果时才执行计算。此外，它还为某些优化铺平了道路。例如，流可以使用短路操作，即一旦达到预期结果就停止计算，从而避免不必要的处理。


    ## 并行流及其优势


    Java 流还提供了对并行处理的支持。通过使用并行流，源数据可以被划分为多个子流。然后，这些子流被并发处理，利用多个线程。处理完成后，来自各个子流的结果会被聚合。这种模型抽象了并行化和线程协调的复杂性，为开发者提供了一种高级、高效的并发数据处理机制。其结果是简单性与性能的强大结合，尤其在处理大型数据集时，可以实现显著的加速。


    ## 声明式与命令式


    流使聚合操作更具声明式——专注于做什么，而不是如何做。传递 lambda 谓词和函数比迭代循环更具声明性。


    这种声明式特性使代码更易于阅读、理解和优化，例如在某些情况下启用并行性。


    ## 常见的流操作：过滤、映射和收集


    ### 过滤操作


    过滤操作允许修剪流，仅包含与给定谓词函数匹配的元素。这是一个中间操作，返回一个新的流。


    例如，要过滤一个名称列表，仅包含以 ''A'' 开头的名称：


    ```java

    List<String> names = ... names.stream().filter(name -> name.startsWith("A"))

    ```


    此过滤器返回一个新流，仅包含原始流中谓词 `name.startsWith("A")` 返回 true 的那些元素。


    过滤器谓词可以引用不可变状态和来自封闭作用域的有效最终局部变量。但是，它不应执行任何副作用，如修改外部对象或变量。


    ### 过滤操作的一些关键属性：


    **filter** 操作是 Java Stream API 的重要组成部分，允许开发者筛选数据并仅保留满足给定条件或谓词的元素。以下是 **filter**
    操作的关键特性：


    1.  **惰性**：过滤操作最显著的属性之一是其惰性特性。当调用 filter 时，它不会立即对元素求值谓词。相反，它设置一个条件，该条件将在稍后检查，确切地说是在对流调用终端操作时。这确保了计算被延迟，仅在真正需要结果时才执行。

    2.  **可链式调用**：过滤操作可以无缝地与流管道中的其他中间操作链接。这意味着你可以连续进行多次过滤调用，或者将其与其他操作（如 map 或 sorted）交错进行。这允许构建既高效又可读的复杂数据处理管道。

    3.  **短路**：虽然过滤操作本身并不固有地短路，但其与某些终端操作结合使用时可能导致短路。例如，当与流中的 findFirst 结合使用时，一旦找到满足谓词的元素，处理就会停止。然而，必须注意，“如果谓词返回
    false 则短路”的说法略有误导性。过滤操作会在需要时对所有元素求值谓词，但结果流将仅包含谓词返回 true 的那些元素。


    ### 过滤器的常见用途包括：


    **filter** 操作在各种场景中被广泛用于细化和处理数据。其一些常见应用包括：


    1.  **基于标准的提取**：过滤器的主要用途之一是根据特定标准从集合中提取元素。例如，你可能想从列表中检索所有偶数，或选择所有特定长度的字符串。

    2.  **清除空值或空值**：在许多数据处理任务中，清除数据中的空值或空值以防止后续潜在错误至关重要。使用过滤器，你可以轻松地从数据流中移除这些不需要的元素。

    3.  **基于对象属性的选择性包含**：在处理对象流时，过滤操作在根据对象属性选择对象方面非常宝贵。例如，在 Person 对象的流中，你可能想过滤掉所有低于特定年龄的人或居住在特定城市的人。


    ### 映射操作


    映射操作通过提供的映射函数转换流中的每个元素，并返回一个包含结果的新流。'
