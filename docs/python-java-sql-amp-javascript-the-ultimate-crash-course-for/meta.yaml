    \n### Erasure Issues\n\nDue to type erasure, the actual runtime element type was\
    \ erased. So, operations assumed element types differed from what was specified:\n\
    \n- A method declared for a `LinkedList<String>` could still return a raw LinkedList.\n\
    - Iterate and process elements assuming one type, but elements may be of another.\n\
    - Persist collections whose type parameters disappear post-compilation.\n\nThis\
    \ broke assumptions and introduced subtle bugs that generics address by preserving\
    \ type information.\n\n### Understanding and Creating Generic Classes\n\nGenerics\
    \ allow defining classes or interfaces whose element types are arguments that\
    \ can vary per instance. This makes them type-safe and compatible across client\
    \ code and libraries.\n\n### Defining a Generic Class\n\nA generic class is declared\
    \ by specifying a type variable between angle brackets (`<>`) in the class declaration.\
    \ This variable acts as a placeholder for actual types that will be passed at\
    \ runtime.\n\nFor example, to define a generic List class:\n\n```\npublic class\
    \ List<E> {\n    private E[] elements;\n    public void add(E e) {\n        //\
    \ elements array can now only hold type E\n    }\n}\n```\n\nHere, `E` is the type\
    \ parameter that will be replaced by actual types like `Integer`, `String`, etc.\
    \ when `List` is instantiated.\n\n### Specifying Type Arguments\n\nThe actual\
    \ type is specified between angle brackets when creating an instance of the generic\
    \ class:\n\n```\nList<String> stringList = new List<String>();\n```\n\nNow, `stringList`\
    \ can only contain `String` elements as the type parameter `E` is replaced by\
    \ `String`.\n\n### Bounded Type Parameters\n\nSometimes, we need to restrict the\
    \ type parameter to specific types or supertypes. This is done using bounded type\
    \ parameters.\n\n```\npublic class Box<T extends Comparable<T>> {\n    private\
    \ T item;\n    // T must implement Comparable\n    public int compareTo(Box<T>\
    \ b) {\n        return item.compareTo(b.item);\n    }\n}\n```\n\nHere, `T` is\
    \ bounded to any type that implements `Comparable<T>`, ensuring `compareTo` can\
    \ be called.\n\n### Benefits of Generics\n\nGenerics, introduced in Java 5, have\
    \ revolutionized how developers approach type safety and code reusability. At\
    \ the heart of generics is the principle of type safety. Through generics, the\
    \ Java compiler is empowered to validate the correct use of types. This means\
    \ that many potential issues can be flagged at compile-time rather than waiting\
    \ for runtime, thereby reducing the likelihood of bugs cropping up later.\nFurthermore,\
    \ generics are designed to be backward compatible, ensuring they operate seamlessly\
    \ with legacy code and libraries without necessitating major overhauls. A major\
    \ boost to readability comes from the fact that generics make the element types\
    \ evident right from the class or method signatures, effectively reducing ambiguity\
    \ and potential misunderstandings.\nOne of the standout benefits is reusability.\
    \ With generics, it becomes possible to craft classes and methods that can operate\
    \ on multiple, yet compatible, types—essentially slashing code redundancy. This\
    \ robust system means that most issues are highlighted during the compilation\
    \ phase, vastly reducing runtime failures. Lastly, when APIs employ generics judiciously,\
    \ their clarity and understandability are enhanced, making them more developer-friendly.\n\
    \n### Generics Support Key Java Features\n\nGenerics have been seamlessly woven\
    \ into numerous Java constructs, augmenting their power and type safety. A clear\
    \ example is the Collections framework. With generics, developers can create collections\
    \ like lists or maps that securely store objects of specific types, preventing\
    \ unintended mix-ups. In the realm of inheritance, generics enable the definition\
    \ of subtypes that can be specialized based on particular type argument combinations.\
    \ This provides more granularity and specificity in the type system. Additionally,\
    \ generics play a role in annotations, allowing annotation types to be parameterized\
    \ based on element types.\n\nJava 8 introduced lambda expressions and the Streams\
    \ API, both of which deeply incorporate generics. Lambda expressions can use generics\
    \ for their parameter and return types, making them more versatile. Similarly,\
    \ the Streams API, which facilitates functional-style operations on sequences\
    \ of elements, heavily leverages generics, especially in stream processing pipelines,\
    \ ensuring type-safe operations throughout. Lastly, the Reflection API, which\
    \ provides the capability to inspect and manipulate class structures at runtime,\
    \ has been enhanced to support generic types through `Type` objects.\n\n### Bounded\
    \ Type Parameters\n\nSometimes, we want to restrict the allowed types for a type\
    \ parameter to classes that extend or implement a specific type. This is known\
    \ as bounding the type parameter. Bounded type parameters ensure type safety by\
    \ enabling the usage of common methods on the generic class's element types.\n\
    \n### Basic Syntax\n\nA type parameter is bounded by specifying the bound after\
    \ the parameter name, separated by the `extends`/`super` keyword in angle brackets\
    \ `<>`.\n\nFor example, to bind a type `T` to a `Number` and its subclasses:\n\
    \n```\npublic class Box<T extends Number> {\n    private T item;\n    public void\
    \ set(T item) {\n        this.item = item;\n    }\n}\n```"
  mdcn: "变得更具可复用性。另一个显著的好处是减少了不同类和软件层之间的耦合，因为依赖关系是基于通用契约建立的。\n抽象也简化了测试过程，因为测试人员可以模拟接口，而无需深入实现细节。通过隐藏复杂的细节，抽象确保开发者能够专注于相关方面。因此，在一个经过深思熟虑的系统中，拥抱抽象对于保持接口、行为和实现细节之间的区别至关重要。当部署得当时，它使软件能够相对轻松地适应不断变化的需求。\n\
    \n## 抽象的最佳实践\n\n为了充分发挥抽象的潜力，建议遵循某些最佳实践。开发者应倾向于使用接口或抽象类进行编程，而不是直接使用具体实现。在定义具体子类时，重点应放在简洁性上，确保它们作为接口的清晰实现。至关重要的是，将实现的复杂性隐藏起来，最好是在子类或内部类中。\n\
    在灵活性方面，使用抽象类型作为参数和返回值是有利的。在抽象类型中，重点应放在定义接口上，避免引入具体操作的诱惑。最后，紧凑且相关的抽象优于庞大、无焦点的契约。通过坚定地遵循这些准则，开发者可以利用抽象来生成松散耦合、独立演进并能抵御需求不可避免变化的代码。\n\
    \n## 第5章：泛型编程\n\n### 泛型的必要性\n\n在Java 5引入泛型之前，像ArrayList、LinkedList、HashMap等集合是原始类型，没有类型安全性。这带来了泛型旨在解决的重大问题和限制。\n\
    \n### 缺乏类型安全性\n\n非泛型集合允许无限制地添加任何对象。这在几个方面损害了类型安全性：\n\n### 意外的对象类型：\n\n考虑一个声明为`ArrayList\
    \ list = new ArrayList();`的ArrayList。它可能包含字符串、整数或任何对象。检索元素不能保证其实际的运行时类型：\n\n```\n\
    list.add(\"Hello\");\nlist.add(1);\nObject obj = list.get(0); // obj可能是String或Integer\n\
    ```\n\n这使得代码容易出错，因为对检索对象的操作假定了可能不匹配的类型。\n\n### ClassCastException：\n\n当检索元素并进行类型转换时：\n\
    \n```\nlist.add(\"Hello\");\nString str = (String) list.get(0);\n// 抛出ClassCastException\n\
    ```\n\n转换会失败，因为元素类型与预期不同。这导致了泛型有助于防止的运行时错误。\n\n### 错误使用：\n\n开发者可能无意中添加不兼容的类型，因为编译器没有强制约束：\n\
    \n```\nclass Employee {\n    public String name;\n    public int id;\n}\nArrayList\
    \ list = new ArrayList();\nlist.add(\"Hello\");\nlist.add(new Employee());\n//\
    \ 编译器允许但存在风险\n```\n\n此类错误降低了可靠性并增加了调试工作量。\n\n### 维护问题\n\n集合对象级别缺少类型信息使代码变得复杂且难以理解：\n\
    \n- 仅通过查看集合的声明，无法明显看出可以存储什么。\n- 操作集合元素的相关方法假定了不兼容的类型。\n- 集合API难以文档化，因为元素类型因使用而异，而不是固定的。\n\
    - 添加的元素类型更改需要对与该集合交互的所有代码进行彻底测试。\n- 重构具有挑战性，因为元素类型是动态行为的，而不是静态的。\n\n### 编译时类型检查\n\
    \n由于实际元素类型仅在运行时已知，编译器无法验证类型安全性。错误被隐藏起来，只有在运行代码后才会显现：\n\n- 可以添加或检索不兼容的类型，而编译器不会发出警告。\n\
    - 声明接收或返回元素类型的方法不强制正确性。\n- 指定元素类型的契约实际上是建议，没有保证。\n\n与泛型中的编译时检查相比，这延迟了错误，降低了代码质量，并增加了调试工作量。\n\
    \n### 类型擦除问题\n\n由于类型擦除，实际的运行时元素类型被擦除。因此，操作假定的元素类型与指定的不同：\n\n- 为`LinkedList<String>`声明的方法仍然可以返回原始的LinkedList。\n\
    - 迭代和处理元素时假定一种类型，但元素可能是另一种类型。\n- 持久化类型参数在编译后消失的集合。\n\n这破坏了假设并引入了微妙的错误，而泛型通过保留类型信息来解决这些问题。\n\
    \n### 理解和创建泛型类\n\n泛型允许定义类或接口，其元素类型是参数，可以根据每个实例变化。这使它们在客户端代码和库之间具有类型安全性和兼容性。\n\n\
    ### 定义泛型类\n\n泛型类通过在类声明中指定尖括号（`<>`）之间的类型变量来声明。此变量充当将在运行时传递的实际类型的占位符。\n\n例如，要定义一个泛型List类：\n\
    \n```\npublic class List<E> {\n    private E[] elements;\n    public void add(E\
    \ e) {\n        // elements数组现在只能持有类型E\n    }\n}\n```\n\n这里，`E`是类型参数，当`List`实例化时，它将被实际类型如`Integer`、`String`等替换。\n\
    \n### 指定类型参数\n\n在创建泛型类的实例时，在尖括号之间指定实际类型：\n\n```\nList<String> stringList = new\
    \ List<String>();\n```\n\n现在，`stringList`只能包含`String`元素，因为类型参数`E`被`String`替换。\n\
    \n### 有界类型参数\n\n有时，我们需要将类型参数限制为特定类型或超类型。这是通过有界类型参数完成的。\n\n```\npublic class Box<T\
    \ extends Comparable<T>> {\n    private T item;\n    // T必须实现Comparable\n    public\
    \ int compareTo(Box<T> b) {\n        return item.compareTo(b.item);\n    }\n}\n\
    ```\n\n这里，`T`被限制为任何实现`Comparable<T>`的类型，确保可以调用`compareTo`。\n\n### 泛型的好处\n\nJava\
    \ 5中引入的泛型彻底改变了开发者处理类型安全性和代码可重用性的方式。泛型的核心是类型安全原则。通过泛型，Java编译器被赋予验证类型正确使用的能力。这意味着许多潜在问题可以在编译时被标记出来，而不是等到运行时，从而减少了后期出现错误的可能性。\n\
    此外，泛型被设计为向后兼容，确保它们与遗留代码和库无缝协作，而无需进行重大改造。可读性的主要提升来自于泛型使元素类型从类或方法签名中就显而易见，有效地减少了歧义和潜在的误解。\n\
    一个突出的好处是可重用性。通过泛型，可以创建能够操作多种但兼容类型的类和方法——本质上减少了代码冗余。这个强大的系统意味着大多数问题在编译阶段就被突出显示，大大减少了运行时故障。最后，当API明智地使用泛型时，它们的清晰度和可理解性得到增强，使其对开发者更加友好。\n\
    \n### 泛型支持关键Java特性\n\n泛型已无缝融入众多Java构造中，增强了它们的功能和类型安全性。一个明显的例子是集合框架。通过泛型，开发者可以创建像列表或映射这样的集合，安全地存储特定类型的对象，防止意外的混淆。在继承领域，泛型允许定义可以根据特定类型参数组合进行特化的子类型。这在类型系统中提供了更多的粒度和特异性。此外，泛型在注解中发挥作用，允许注解类型根据元素类型进行参数化。\n\
    \nJava 8引入了lambda表达式和Streams API，两者都深度融入了泛型。Lambda表达式可以使用泛型作为其参数和返回类型，使其更加通用。同样，Streams\
    \ API（它促进了对元素序列的函数式风格操作）大量利用了泛型，特别是在流处理管道中，确保整个过程中的类型安全操作。最后，Reflection API（它提供了在运行时检查和操作类结构的能力）已通过`Type`对象增强以支持泛型类型。\n\
    \n### 有界类型参数\n\n有时，我们希望将类型参数的允许类型限制为扩展或实现特定类型的类。这被称为限制类型参数。有界类型参数通过允许在泛型类的元素类型上使用通用方法来确保类型安全性。\n\
    \n### 基本语法\n\n通过在参数名称后指定界限，用`extends`/`super`关键字在尖括号`<>`中分隔来限制类型参数。\n\n例如，要将类型`T`绑定到`Number`及其子类：\n\
    \n```\npublic class Box<T extends Number> {\n    private T item;\n    public void\
    \ set(T item) {\n        this.item = item;\n    }\n}\n```"
