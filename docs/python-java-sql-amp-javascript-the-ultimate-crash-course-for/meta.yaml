  md: 'With data types established, we can now create variables in Java. A variable
    provides a name to reference a location in memory where a value of a specified
    data type can be stored and manipulated during program execution. Variables are
    declared using the following format:

    {DataType} {VariableName};

    For example, to declare an integer variable called “number” we will type:

    int number;

    In this example, we have indicated that the variable number will store an int-type
    value by using the data type int. Some key points about variable declaration:


    +   - Variables must be declared before they are used, specifying the DataType

    - The semicolon ";" at the end of every declaration statement is important syntax

    - Variable names should be descriptive yet concise, using camelCase formatting

    - Variables can be declared at the class level or within blocks like methods


    Once declared, variables need to be initialized by assigning them an initial value
    before they can be used:


    ```

    int number = 0;

    ```


    Now, the number has been initialized to hold the integer value 0. Variable names
    provide a human-readable identifier to reference a location in memory during runtime.
    Properly declaring and initializing variables is fundamental to any Java program.


