    \        <form id = \"form1\" name = \"FirstForm\">\n            <input type =\
    \ \"button\" value = \"Click Me\" onclick = \"myFunc();\" />\n            <input\
    \ type = \"button\" value = \"Cancel\">\n        </form>\n\n        <form id =\
    \ \"form2\" name = \"SecondForm\">\n            <input type = \"button\" value\
    \ = \"Don't ClickMe\"/>\n        </form>\n    </body>\n</html>\n```\n\n## Output\n\
    \n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_413_0.png)\n\n## The IE4 DOM\n\nThe\
