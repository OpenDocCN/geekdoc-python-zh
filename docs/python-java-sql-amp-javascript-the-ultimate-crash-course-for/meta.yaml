    \ = Symbol();\nconst symbol2 = Symbol();\n\nconsole.log(symbol1 === symbol2);\
    \ // false\n```\n\nSymbols can also be created with an optional description, which\
    \ is useful for debugging or providing additional information. The description\
    \ does not affect the uniqueness of the symbol. For example:\n\n```\nconst symbol3\
    \ = Symbol(\"symbolDescription\");\nconst symbol4 = Symbol(\"symbolDescription\"\
    );\n\nconsole.log(symbol3 === symbol4); // false\n```\n\nSymbols are primarily\
    \ used as keys in object properties. They help avoid unintentional name collisions\
    \ when multiple parts of code use the same property names. Here's an example:\n\
    \n```\nconst id = Symbol(\"id\");\n\nconst user = {\n  name: \"Mike\",\n  [id]:\
