    # Chapter 2: Java Fundamentals


    # Data Types, Variables, and Constants: The Building Blocks


    Any programming language requires a way to store and manipulate data in memory
    as a program executes. In Java, the fundamental units for working with data are
    known as data types, variables, and constants. This chapter will provide an in-depth
    look at each of these core concepts. By understanding data types, how to declare
    and assign values to variables, and how to define constants, you will gain the
    foundational knowledge necessary to begin writing Java programs.


    # Data Types


    In the Java programming language, the term "data type" defines the kind of information
    that a variable can store. These data types fall into two primary categories:
    primitive data types and reference data types. While reference data types pertain
    to objects and classes that delve into the territory of object-oriented programming,
    for now, our focus will be on the primitive data types. Java offers eight primitive
    data types, each designed for specific purposes and having its own characteristics.
    Here''s a closer look:


    # Int


    The **int** data type in Java is designed to store integer values, which are whole
    numbers without a decimal point. The value range for an **int** lies between -2,147,483,648
    and 2,147,483,647. It''s a commonly used data type for variables that involve
    mathematical operations or loop counters.


    # Long


    When there''s a requirement to represent very large (or very small) whole numbers,
    the **long** data type comes into play. Its range starts from -9,223,372,036,854,775,808
    and goes up to 9,223,372,036,854,775,807. **long** is especially useful when dealing
    with massive datasets or calculations involving large numbers.'
  - '[PAGE 165]


    # Short


    **short** is another integer data type but has a more restricted range, spanning
    from -32,768 to 32,767. Even though it consumes less memory compared to an **int**,
    its limited range means it isn''t as commonly used.


    # Byte


    **byte** is the smallest of the integer data types, accommodating values from
    -128 to 127. While it''s memory-efficient, its extremely narrow range makes it
    suitable for only specific scenarios.


    # Float


    For numbers with decimal points, we use the **float** data type. It represents
    single-precision floating-point numbers, which essentially means they can store
    values with up to 7 decimal places of precision.


    # Double


    **double** is another floating-point data type but with double the precision of
    **float**. It''s suitable for values that need up to 15 decimal places of precision,
    making it the preferred choice for many mathematical computations.


    # Char


    The **char** data type is used to represent individual characters, be it a letter,
    digit, punctuation, or any other symbol. Characters stored using **char** are
    enclosed in single quotes.


    # Boolean


    The simplest of all data types, **boolean** can store just two values: **true**
    or **false**. This binary nature makes it perfect for variables representing conditions,
    switches, or binary decisions.


    By grasping the specificities and memory requirements of each of these primitive
    data types, developers can make informed decisions, ensuring that their code is
    both efficient and accurate. Selecting the appropriate data type is a foundational
    aspect of crafting robust and performant Java programs.


    # Variables'
