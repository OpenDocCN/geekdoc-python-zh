    Python documentation contains a plethora of system errors. When we discussed the
    Zero division error in the previous example, you may have noticed a straightforward
    approach. Different errors have different methods for avoiding them or running
    applications even when they are present.

    Understanding the causes of some system errors can help you understand the fundamentals
    of debugging your applications.


    # Value errors


    These errors occur when you pass arguments to a function that doesn’t accept those
    data types. A value error can cause your application to crash unexpectedly.

    Uploading a pdf file when only image files are permitted is an example of an exception
    trigger.


    # Import error


    These errors occur when you are unable to import a module directly into your program.
    They are typically caused by a network connection failure or issues with online
    package managers.

    Example of an Exception Trigger: You are unable to sync your data on your private
    cloud accounts due to an import error.


    # OS error


    You may occasionally encounter issues because the software is incompatible with
    your operating system version. These errors frequently occur because the system
    kernel does not understand what the application is saying. These errors are fairly
    common when using Linux distributions.

    Example of an Exception Trigger: The application crashes because the host is running
    an unsupported version of an operating system.


    # Type error


    This error typically occurs when a user or developer enters a value for a data
    type that the application does not yet support.


    # Name error


    When a variable or function that has not yet been defined in the program is called,
    this error occurs.


    # Index error'
