    \n[Don't ClickMe]\n\n## 第10章：事件处理\n\n对象从一个状态到另一个状态的转换被称为事件。HTML中有许多不同的事件，每个事件都代表用户或浏览器执行的特定操作。当JavaScript包含在HTML中时，JS将响应这些事件并允许代码执行。响应事件发生的行为被称为“事件处理”。因此，jQuery负责处理由HTML生成的事件。\n\
