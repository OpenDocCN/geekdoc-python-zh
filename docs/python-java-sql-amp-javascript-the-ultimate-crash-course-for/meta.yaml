    # ORDER BY


    We can sort the output of a query in SQL by using the "ORDER BY" clause, which
    allows you to sort the results in either descending or ascending order. When sorting
    the results of the SELECT mainly depending on one or even more columns, the "ORDER
    BY" phrase is utilized in the statement.


    # Syntax:


    Select column 1, column 2

    From table_name

    Order column_name


    # Code:


    ```

