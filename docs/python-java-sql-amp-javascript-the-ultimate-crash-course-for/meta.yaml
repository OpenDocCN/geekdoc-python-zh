    ```\n\n### Output:\n\n```\nName of person 1: Alex\nName of person 2: Sam\nHello,\
    \ my name is Alex\nHello, my name is Sam\n```\n\nExplanation:\nIn the above example,\
    \ a class attribute is created, and then a method is created along with the __init__\
    \ function. In the end, the object is instantiated and the method is called."
