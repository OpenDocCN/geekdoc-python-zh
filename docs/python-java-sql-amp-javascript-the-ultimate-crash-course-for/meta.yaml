    ## Dictionaries


    Dictionaries are special data structures that Python provides to store values
    as pairs rather than single values as lists and tuples do. The "key: value" pair
    is used by dictionaries to ensure that the data provided is more optimized and
    works better. Dictionaries are also represented by curly brackets, which distinguishes
    them from lists and tuples.


    ## How Do I Create a Dictionary?


    As previously stated, dictionaries are defined using key: value pairs separated
    by commas. The elements will be placed in sequential order and must be separated.

    Syntax:

    Dictionary_sample = { key: value , key: value .......) }

    As a developer, you can add an unlimited number of key:value pairs to a dictionary.


    ## Example:


    ```

    Capitals = {''France'': ''Paris'', ''Spain'': ''Madrid'', ''Italy'': ''Rome''}

    print(Capitals)

    ```


    ## Output:


    ```

    {''France'': ''Paris'', ''Spain'': ''Madrid'', ''Italy'': ''Rome''}

    ```


    You can also build a nested dictionary. A nested dictionary is a dictionary within
    a dictionary:


    ```

    Capitals = {''France'': ''Paris'', ''Spain'': ''Madrid'', ''Italy'': ''Rome'',
    ''Australia'': {''Melbourne'', ''Sydney''}}

    print(Capitals)

    ```


    ## Output:


    ```

    {''France'': ''Paris'', ''Spain'': ''Madrid'', ''Italy'': ''Rome'', ''Australia'':
    {''Sydney'', ''Melbourne''}}

    ```


    The last key: pair value in the second example has a dictionary with two key:pair
    values.


