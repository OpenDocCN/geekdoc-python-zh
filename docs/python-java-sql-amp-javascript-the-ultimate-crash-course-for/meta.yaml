    # 6. Data governance


    The security and oversight layer protects the data in the data layer and the processing
    resources of all other levels from unauthorized access. Mechanisms for password
    protection, encryption, network security, use monitoring, and auditing are included
    in this tier of the security stack. In addition, the security layer records the
    activities of all the other levels and generates an exhaustive audit trail. Additionally,
