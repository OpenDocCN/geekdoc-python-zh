    ## Slicing Using Lists


    Slicing lists allows programmers to avoid dealing with an overwhelming number
    of elements contained within a list. By slicing, you can focus only on the part
    of a list that is relevant to your program logic.


    Syntax:

    Listname[start of the index : end of the index]

    A colon is typically used to separate the beginning and ending indexes of the
    list that you want to slice.


    ## Program Code:


    ```

    myList = [23,34,78,94,54]

    print(myList[1:3]) # 2nd and 3rd elements (index 1 and 2)

    ```


    ## Output:


    ```

    [34, 78]

    ```


    You do not need to enter the list''s beginning or end when slicing the list elements.
    If it is not entered, the interpreter will assume it is the first or last element
    in the list.


    ## Program Code:


    ```

    myList = [23,34,78,94,54]

    print(myList[:3])

    ```


    ## Output:


    ```

    [23, 34, 78]

