    \ Java 程序的基础。\n\n## 变量\n\n确定了数据类型后，我们现在可以在 Java 中创建变量。变量提供了一个名称来引用内存中的一个位置，在程序执行期间，可以在该位置存储和操作指定数据类型的值。变量使用以下格式声明：\n\
