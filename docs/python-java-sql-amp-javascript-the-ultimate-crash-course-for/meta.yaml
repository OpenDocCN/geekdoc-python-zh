  mdcn: "`while` 循环在条件为真时重复执行：\nwhile (condition) {  // 代码块  }\n当迭代次数未知时，它非常有用：\n\n\
    ```\nint i = 0;\nwhile (i < input) {\n    i++;\n}\n```\n\n这里，我们不知道 `input` 的值，因此无法使用\
    \ `for` 循环，但 `while` 循环允许重复执行直到条件满足。\n\n## do-while 循环\n\n与 `while` 类似，但即使初始条件为假，代码块也保证至少执行一次：\n\
    do {  // 代码块 } while (condition);\n例如，显示菜单直到做出有效选择：\n\n```\ndo {\n    displayMenu();\n\
    \    choice = get input();\n}\nwhile (!isValid(choice));\n```\n\n## 循环控制语句\n\n\
    Java 中的循环控制语句用于控制循环的流程，允许程序员对重复操作进行更精细的控制。它们使得跳出循环、跳过一次迭代或在继续循环迭代之前评估条件成为可能。鉴于其多功能性，在处理数组、列表等迭代结构或模拟现实世界系统和算法时，这些循环控制语句是不可或缺的。\n\
    \n## break 语句\n\n`break` 语句用于提前退出循环。当满足特定条件并执行 `break` 时，循环立即终止，程序继续执行循环之后的下一行代码。\n\
    **示例：** 假设你正在数组中搜索数字 5。一旦找到它，就没有必要继续循环了。\n\n```\nfor(int i=0; i<arr.length; i++)\
    \ {\n    if(arr[i] == 5) {\n        System.out.println(\"Number 5 found!\");\n\
    \        break;\n    }\n}\n```\n\n## continue 语句\n\n`continue` 语句跳过当前迭代并跳转到下一次迭代。当循环迭代中的特定条件不需要进一步执行，但循环不应完全终止时，这特别有用。\n\
    \n**示例：** 假设你想打印 1 到 10 之间的所有数字，但不包括 5。\n\n```\nfor(int i=1; i<=10; i++) {\n \
    \   if(i == 5) {\n        continue;\n    }\n    System.out.println(i);\n}\n```\n\
    \n## 循环条件\n\n这些是在 `for`、`while` 和 `do-while` 等循环中的条件检查。这些条件决定循环是继续还是终止。只要条件保持为真，循环就会运行。\n\
    \n**示例：** 使用 `for` 循环打印数字 1 到 5：\n\n```\nfor(int i=1; i<=5; i++) {\n    System.out.println(i);\n\
    }\n```\n\n使用 `while` 循环打印数字，直到计数器达到限制：\n\n```\nint counter = 1;\nwhile(counter\
    \ <= 5) {\n    System.out.println(counter);\n    counter++;\n}\n```\n\n策略性地使用循环控制语句可以编写更高效、更易读的代码。例如，在遍历复杂数据结构时，跳过不必要的迭代或在达到预期结果后退出循环的能力可以节省计算资源。同样，在模拟现实场景时，对重复动作的精确控制至关重要。想象一个模拟你在道路上建模汽车行为的场景；跳过特定汽车的移动或在特定事件发生时停止模拟的能力对于准确性和效率至关重要。\n\
    \n## Java 的面向对象范式：温和入门\n\n虽然前面的章节确立了 Java 的基本编程构造，但该语言真正通过其面向对象（OO）的特性脱颖而出。OO\
    \ 编程使用类、对象、继承和多态性来在软件中建模现实世界的实体和问题。这种范式提供了许多好处，但起初可能令人生畏。本章将以温和、概念性的水平介绍 Java\
    \ 中的核心 OO 概念，让你在不被技术细节压倒的情况下获得实用知识。通过学习 OO 设计背后的原则，你将为未来开发高质量、可维护的应用程序奠定基础。\n\n\
    ## 类和对象\n\n面向对象的核心是类。类定义了描述某个实体的属性和行为。例如，一个 `Student` 类可能有 `name` 和 `age` 属性，以及\
    \ `enroll()`、`pay tuition()` 等方法。\n\n类充当创建多个对象的模板或蓝图。对象是类的一个实例——一个具有自己一组属性值的独特实体。我们通过实例化类来创建对象：\n\
    Student Sarah = new Student();\n这使用 `Student` 类模板声明了一个名为 `Sarah` 的 `Student` 对象。对象将数据（存储在属性中）和功能（通过方法）封装到单个程序表示中。类和对象构成了任何\
    \ OO 程序的基本构建块。\n\n## 继承\n\n类的一个关键好处是能够从父类继承共同特征。例如，我们的 `Student` 类可以扩展一个 `Person`\
    \ 类：\nclass Person { String name; //... }\nclass Student extends Person { int\
    \ student; //... }\n现在，`Student` 自动获得 `Person` 的所有属性和方法。继承创建了一种“是一个”关系，因为 `Student`\
    \ “是一个”具有额外学生特定细节的 `Person`。\n\n## 多态性\n\n与继承一起，多态性是 OO 设计的另一个支柱。它允许子类以不同的方式覆盖或实现父类的方法：\n\
    \n```\nclass Person {\n    public void speak(){\n        System.out.println(\"\
    Hello!\");\n    }\n}\n\nclass Student extends Person {\n    @Override public void\
    \ speak(){\n        System.out.println(\"Hello, I'm a student!\");\n    }\n}\n\
    ```\n\n现在，`speak()` 根据实际对象类型以多态方式执行，即使它是通过父类 `Person` 引用类型访问的。这允许行为以类型安全、可读的方式变化。\n\
    \n## 抽象和封装\n\n另外两个关键的 OO 原则是抽象和封装。\n抽象建模实体的本质特征，独立于实现细节。类充当概念的抽象。封装将操作数据的数据和函数绑定在一起，并防止外部代码直接访问或操作它们。在\
    \ Java 中，字段被声明为 `private` 以实现封装，公共的 getter/setter 方法提供受控访问。抽象和封装共同促进了松耦合和高内聚，从而产生灵活、可重用的类设计。这些原则适用于大型、复杂的系统。\n\
    \n## 示例程序\n\n为了总结 OO 概念，让我们构建一个简单的评分程序：\n\n```\nclass Student{\n    private String\
    \ name;\n    private int score;\n    public Student(String name) {\n        this.name\
    \ = name;\n    }\n\n    public void setScore(int score) {\n        this.score\
    \ = score;\n    }\n    public String getName() {\n        return name;\n    }\n\
    \    public int getScore() {\n        return score;\n    }\n}\n\nclass GradingProgram\
    \ {\n    public static void main(String[] args) {\n        Student student = new\
    \ Student(\"John\");\n        student.setScore(95);\n        System.out.println(student.getName()\
    \ + \": \" + student.getScore());\n    }\n}\n```\n\n这通过封装的类和对象在代码中建模现实世界实体，展示了核心\
    \ OO 原则。\n\n虽然肯定还有更多高级的 OO 概念有待探索，但本介绍提供了 Java 中关键 OO 范式的高层概述——类、对象、继承、多态性、抽象和封装。掌握这些原则是流畅设计健壮、可维护的\
    \ Java 应用程序的基石。在未来的章节中，我们将在此基础上应用 OO 技术和最佳实践来解决更大、更复杂的问题。\n\n# 第 3 章：深入面向对象编程\n\
    \n## 类和对象：Java 的蓝图\n\n在面向对象编程中，类和对象是围绕其设计整个应用程序的基本构建块。本节将详细解释这些概念及其相互关系。\n\n##\
    \ 什么是类？\n\n类是一个蓝图或模板，定义了适用于特定种类所有对象的共同属性和行为。它充当一组现实世界实体的通用描述。\n例如，如果我们要在编程上下文中建模狗，我们可以定义一个\
    \ `Dog` 类。这个类将指定所有狗对象都具有诸如名字、品种、颜色等属性。它还将定义狗的预期共同行为，如吠叫、捡东西、摇尾巴等。这些将在类中表示为数据字段和方法声明。\n\
    \n类的关键方面是：\n\n- 它以字段/属性的形式封装描述对象的数据。\n- 它通过对象可以展示的方法声明来封装行为。\n- 它建立了一个共同的基础，相似的对象可以基于此。\n\
    - 类是一个逻辑实体，而不是物理实体——它本身不创建实际对象。\n\n关于类的一些重要点：\n\n- 类只提供模板——它不是实际对象本身的实例。\n- 类在\
    \ Java 中使用 `class` 关键字定义。"
