    # Understanding Inheritance: Leveraging Existing Code


    Inheritance is one of the core concepts of object-oriented programming that allows
    programmers to leverage existing code by building upon existing classes. Not only
    does inheritance facilitate code reuse, but it also makes code more modular and
    maintainable over time. This chapter will explain in detail how inheritance works
    in Java and how to properly implement inheritance in your own classes.


    # What is Inheritance?


    Inheritance allows a subclass to inherit attributes and behaviors from a parent
    or superclass. The subclass extends the parent class and inherits all of its properties
    and behaviors while also being able to add its own additional properties or overwrite
    existing behaviors. This principle of extending existing functionality is what
    enables programmers to reuse code and avoid rewriting similar logic from scratch
    for every new class.


    For example, you may have a superclass called Vehicle that defines common behavior
    like having wheels, an engine, and the ability to move. Then, subclasses can be
    inherited from Vehicles like cars, bikes, Boats, etc. Each subclass can focus
    only on the new unique characteristics it introduces without redefining common
    vehicle behaviors already defined in the parent Vehicle class.


    Inheritance provides an "is-a" relationship. A car IS A vehicle, so it inherits
    from the Vehicle class. A key benefit is that code written for the parent Vehicle
    class automatically applies to any subclass like Car without needing modification.
    New subclasses can extend Vehicles as new vehicle types are introduced without
    impacting existing vehicle codes, increasing flexibility.


