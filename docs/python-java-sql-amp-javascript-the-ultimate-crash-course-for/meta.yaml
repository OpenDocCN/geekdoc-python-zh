    or superclass. The subclass extends the parent class and inherits all of its properties
    and behaviors while also being able to add its own additional properties or overwrite
    existing behaviors. This principle of extending existing functionality is what
    enables programmers to reuse code and avoid rewriting similar logic from scratch
    for every new class.


