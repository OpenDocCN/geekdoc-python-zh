- md: '## Example 2: Performance optimization


    Suppose we have a table named "orders" with columns "id", "customer_id", "product_id",
    and "quantity". To optimize the performance of a query that calculates the total
    order value for each customer, we can use the SUM() function to aggregate the
    order values and GROUP BY the "customer_id" column:


    Code:


    ```sql

    SELECT customer_id, SUM(quantity * price) AS total_order_value

    FROM orders

    JOIN products ON orders.product_id = products.id

    GROUP BY customer_id;

    ```


    This query joins the "orders" and "products" tables on the "product_id" column
    and calculates the total order value for each customer by multiplying the "quantity"
    and "price" columns and aggregating the results with SUM(). The GROUP BY clause
    groups the results by the "customer_id" column.


    Output:


    | customer_id | total_order_value |

    |-------------|-------------------|

    | 1           | 150.00            |

    | 2           | 75.00             |


    These examples demonstrate how indexing and performance optimization can be used
    to improve the performance of SQL queries and make them more efficient for managing
    large, complex databases.


    ## Example 3: Normalization


    Suppose we have the following table called "Orders":


    | Order ID | Customer Name | Item Name | Quantity | Price |

    |----------|---------------|-----------|----------|-------|

    | 1        | John Smith    | T-Shirt   | 2        | 20    |

    | 2        | Jane Doe      | Jacket    | 1        | 50    |

    | 3        | John Smith    | Jeans     | 1        | 30    |

    | 4        | Bob Johnson   | T-Shirt   | 3        | 20    |

    | 5        | Jane Doe      | Hat       | 2        | 10    |


    This table violates the first normal form (1NF) because some columns contain multiple
    values. Specifically, the "Item Name" column contains multiple values, which makes
    it difficult to query the data. We can fix this by creating two new tables: one
    for the customers and another for the items.


    The "Customers" table would look like this:


    | Customer ID | Customer Name |

    |---|---|

    | 1 | John Smith |

    | 2 | Jane Doe |

    | 3 | Bob Johnson |


    The "Items" table would look like this:


    | Item ID | Item Name | Price |

    |---|---|---|

    | 1 | T-Shirt | 20 |

    | 2 | Jacket | 50 |

    | 3 | Jeans | 30 |

    | 4 | Hat | 10 |


    We can then create a new "Orders" table that references the "Customers" and "Items"
    tables:


    | Order ID | Customer ID | Item ID | Quantity |

    |---|---|---|---|

    | 1 | 1 | 1 | 2 |

    | 2 | 2 | 2 | 1 |

    | 3 | 1 | 3 | 1 |

    | 4 | 3 | 1 | 3 |

    | 5 | 2 | 4 | 2 |


    This new "Orders" table is now in second normal form (2NF) because it does not
    have any partial dependencies. Specifically, the "Quantity" column is dependent
    only on the "Order ID" and "Item ID" columns, and the "Price" column is dependent
    only on the "Item ID" column.


    It is also in the third normal form (3NF) because it does not have any transitive
    dependencies. Specifically, the "Price" column is not dependent on the "Customer
    ID" column, only on the "Item ID" column.


    Code:


    ```sql

    SELECT o.OrderID, c.CustomerName, i.ItemName, o.Quantity, (o.Quantity * i.Price)
    AS TotalPrice

    FROM Orders o

    INNER JOIN Customers c ON o.CustomerID = c.CustomerID

    INNER JOIN Items i ON o.ItemID = i.ItemID

    ```


