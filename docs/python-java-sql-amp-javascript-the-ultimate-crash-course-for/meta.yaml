    \ ret = document.forms[0].elements[1];\n                alert(\"Second element\
    \ : \" + ret );\n            }\n        //-->\n    </script>\n</head>\n<body>\n\
    \    <h1 id = \"title\">This is main title</h1>\n    <p>Click the following to\
    \ see the result:</p>\n\n    <form name = \"FirstForm\">\n        <input type\
    \ = \"button\" value = \"Click Me\" onclick = \"myFunc();\" />\n        <input\
    \ type = \"button\" value=\"Cancel\">\n    </form>\n\n    <form name = \"SecondForm\"\
    >\n        <input type = \"button\" value = \"Don't ClickMe\"/>\n    </form>\n\
