    Use the code syntax format below to uninstall any package installed on your system
    using the pip package manager.


    Syntax:


    ```

    $ pip uninstall nameofthepackage

    ```


    For example, to uninstall the Seaborn package you previously installed, use the
    command below:


    ```

    $ pip uninstall seaborn

    ```


    You can also search for a package using the code format shown below.


    ```

    $ pip search name_of_the_package

    ```


    This will show you all packages from the package index for you to examine and
    select from.


    # Virtual Environment'
