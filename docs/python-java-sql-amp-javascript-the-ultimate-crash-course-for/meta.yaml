    为了充分利用循环结构，开发者必须编写循环开始和循环终止的逻辑。While和for循环是Python程序员可以在代码中使用的两种常见循环结构。\n\n###\
    \ If/Else条件语句\n\n要执行特定操作，条件语句依赖于基本的决策制定。如果条件不满足，条件逻辑将跳过该特定代码块。\nPython包含一个基本的if/else语句，用于使用逻辑语句在两个代码块之间进行选择。\n\
    \n语法：\n\n```\nif condition:\n    execute statement\nelse:\n    execute statement\n\
