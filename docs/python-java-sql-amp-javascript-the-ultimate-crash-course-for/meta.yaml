    \n```java\npublic static <E> void copy(List<? extends E> from,\n    List<? super\
    \ E> to) {\n    to.addAll(from);\n}\n```\n\n如果没有通配符，这个方法只能用于具有完全相同具体类型参数的列表。\n\
    \n## 类型推断\n\nJava 编译器会根据上下文自动推断合适的通配符类型。例如：\n\n```java\nList<String> strings =\
