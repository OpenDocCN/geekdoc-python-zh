    # Java I/O: Interacting with External Data


    No Java program is complete without the ability to interact with external data
    sources like files, network endpoints, databases, etc. The Java platform provides
    robust and flexible I/O capabilities through its java.io package and associated
    classes for working with streams of data at varying levels of abstraction.


    # Core I/O Classes


    Some core classes that form the building blocks of Java I/O include:


    +   - File: Represents files and directories on the local filesystem.

    - InputStream: Read-only sequence of bytes from a source (Files, network, etc).

    - OutputStream: Write-only sequence of bytes to a sink (Files, network, etc).

    - Reader: Read-only sequence of characters from a character-based source.

    - Writer: Write-only sequence of characters to a character-based sink.

    - Buffered*: Wraps an I/O stream/reader to provide buffering capabilities.


    Using these classes either directly or via convenience wrappers, Java can interact
    with local files, network endpoints, database tables/records, and more.


    # Streams vs. Reader/Writer


    The key difference between Streams and Reader/Writer classes is:


    +   - Streams deal with sequences of raw bytes, agnostic of character encoding.

    - Readers/Writers work at a higher character abstraction layer using a specified
    character encoding like UTF-8 to translate bytes to characters and vice versa.'
