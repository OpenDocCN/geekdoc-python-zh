    \ 函数向控制台打印了一条消息。\n\n## Node.js HTTP 服务器\n\n借助 Node.js，可以构建能够处理 HTTP 请求和响应的 Web\
    \ 服务器。Node.js 中的 HTTP 模块允许用户建立一个能够监听传入请求并做出适当响应的 HTTP 服务器。以下是如何使用 Node.js 建立一个基本\
