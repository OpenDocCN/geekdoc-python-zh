    # Java''s Object-Oriented Paradigm: A Gentle Introduction


    While the previous chapters established Java''s fundamental programming constructs,
    the language truly differentiates itself through its object-oriented (OO) nature.
    OO programming uses classes, objects, inheritance, and polymorphism to model real-world
    entities and problems in software. This paradigm provides many benefits but can
    seem daunting at first. This chapter will introduce core OO concepts in Java at
    a gentle, conceptual level to give you a working knowledge without overwhelming
    technical details. By learning the principles behind OO design, you will lay the
    foundation to develop quality, maintainable applications down the road.


    # Classes and Objects


    At the core of object orientation is the class. A class defines the attributes
    and behaviors that characterize some entity. For example, a Student class may
    have name and age attributes, with methods to enroll (), pay tuition (), etc.


    Classes act as a template or blueprint to create multiple objects. An object is
    an instance of a class - a unique entity with its own set of attribute values.
    We create objects by instantiating classes:

    Student Sarah = new Student();

    This declares a Student object called Sarah using the Student class template.
    Objects encapsulate both data (stored in attributes) and functionality ( through
    methods) into a single programmatic representation. Classes and objects form the
    basic building blocks of any OO program.


