    #### 2. Multiply


    When you use the String multiply technique, your string value is continuously
    repeated. The * operator can be used to multiply string content.


    Program Code:


    ```

    example = ''Yes '' * 4

    print(example)

    ```


    Output:


    ```

    Yes Yes Yes Yes

    ```


    #### 3. Appending


    You can use this operation to add any string to the end of another string by using
    the arithmetic operator +=. Keep in mind that the appended string will only be
    added at the end of the string, not in the middle.


    Program Code:


    ```

    example = "Today is a beautiful day "

