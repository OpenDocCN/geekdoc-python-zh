- md: "## Chapter 1: Basic SQL Syntax and Commands\n\nSQL allows users to communicate\
    \ with databases using a set of fundamental instructions. The following are a\
    \ few of the frequently used commands:\n\n## Create\n\nThe *CREATE* command is\
    \ used to create different objects. One of the most important objects to store\
    \ information is a database.\n\n### Syntax:\n\n```\nCREATE DATABASE database_name;\n\
    ```\n\n### Code:\n\n```\nCREATE DATABASE office;\n```\n\n### Output:\n\nIt results\
    \ in creating a database named office in the system database folder. CREATE is\
    \ also used to create tables within a database. The *CREATE TABLE* command creates\
    \ the table and also specifies its columns and data types as follows:\n\n### Syntax:\n\
    \n```\nCREATE TABLE table_name(column_name DATATYPE);\n```\n\n### Code:\n\n```\n\
    CREATE TABLE Employee_Tab(Name varchar(20), Age int, Salary int, Email varchar(30));\n\
    CREATE TABLE Customer_Tab(Name varchar(20), Age int, Email varchar(30));\nCREATE\
    \ TABLE Manager_Tab(Name varchar(20), Code int, Email varchar(30));\n```\n\n###\
    \ Output:\n\nIt creates 3 tables named Employee_Tab, Customer_Tab and Manager_Tab\
    \ in the Tables folder of the office database.\n\n## INSERT INTO\n\nIn SQL, the\
    \ INSERT INTO statement is used to feed a database with data. In this case, ‘**table_name**’\
    \ refers to the tag of the table where you want to insert data. ‘**column1**’,\
    \ ‘**column2**’, ‘**column3**’, etc., are the names of the columns of the table.\
    \ The values ‘**value1**’, ‘**value2**’, ‘**value3**’, correspond to the values\
    \ you wish to enter into the corresponding columns, denoting them.\n\nIt is important\
    \ to remember that you may insert many records into a table all at once if you\
    \ use the same INSERT INTO command and add extra sets of information.\n\n### Syntax:\n\
    \n```\nINSERT INTO table_name (column1, column2, column3, ...)\nVALUES (value1,\
    \ value2, value3, ...);\n```\n\n### Code:\n\n```\nINSERT INTO Employee_Tab (Name,\
    \ Age, Salary, Email)\nVALUES ('John Doe', 30, 4000, 'johndoe@gmail.com'),\n \
    \      ('Jane Doe', 28, 5000, 'janedow@gmail.com'),\n       ('Jim Smith', 35,\
    \ 5000, 'jimsith@gmail.com');\n\nINSERT INTO Customer_Tab (Name, Age, Email)\n\
    VALUES ('Janet Yew', 20, 'janetyew@gmail.com'),\n       ('Peter Son', 48, 'peterson@gmail.com'),\n\
    \       ('Andrew Smith', 32, 'smith@gmail.com');\n```\n\n### Output:\n\nAs a result,\
    \ 3 rows are affected because we have entered three records in the Employee and\
    \ Customer tables.\n\n## SELECT\n\nSELECT will be the starting point for many\
    \ queries because it tells the database which variables we want to see. We can\
    \ either give the names of the columns, separated by commas, or use the * symbol,\
    \ which will return all the columns in the table.\n\n### Syntax:\n\n```\nSELECT\
    \ * FROM table_name;\n```\n\n### Code:\n\n```\nSELECT * FROM Employee_Tab;\nSELECT\
    \ * FROM Customer_Tab;\n```\n\n### Output:\n\n```\nJohn Doe|30|4000|johndoe@gmail.com\n\
    Jane Doe|28|5000|janedow@gmail.com\nJim Smith|35|5000|jimsith@gmail.com\n\nJanet\
    \ Yew|20|janetyew@gmail.com\nPeter Son|48|peterson@gmail.com\nAndrew Smith|32|smith@gmail.com\n\
    ```\n\nIf you want to extract data from specific columns you have to replace *\
    \ with the names of the columns.\n\n### Syntax:\n\n```\nSELECT column1, column2\n\
    FROM table_name;\n```\n\n### Code:\n\n```\nSELECT Name, Age FROM Employee_Tab;\n\
    SELECT Age, Email FROM Customer_Tab;\n```\n\n### Output:\n\n```\nJohn Doe|30\n\
    Jane Doe|28\nJim Smith|35\n\n20|janetyew@gmail.com\n48|peterson@gmail.com\n32|smith@gmail.com\n\
    ```\n\n## UPDATE\n\nThe UPDATE command in SQL changes the data already in a table.\n\
    The table name refers to the table title that this command will update. The SET\
    \ clause allows you to specify the columns and values you wish to modify. The\
    \ WHERE article governs which rows should be changed depending on the given conditions.\n\
    Because changing the wrong rows might result in inaccurate data, it is essential\
    \ to utilize the WHERE clause with extreme caution. Before altering the data,\
    \ it is recommended to validate your UPDATE statement using a SELECT query to\
    \ validate the row that the change would impact.\n\n### Syntax:\n\n```\nUPDATE\
    \ table_name\nSET column1 = value1, column2 = value2\nWHERE condition\n```\n\n\
    ### Code:\n\n```\nUPDATE Employee_Tab\nSET Name = 'Houston'\nWHERE Salary = '4000';\n\
    \nSELECT * FROM Employee_Tab;\n```\n\n### Output:\n\n```\nHouston|30|4000|johndoe@gmail.com\n\
    Jane Doe|28|5000|janedow@gmail.com\nJim Smith|35|5000|jimsith@gmail.com\n```\n\
    \nThe name John Doe is updated to Houston as his Salary was 4000 according to\
    \ the condition mentioned.\n\n## DELETE\n\nWhen you want to remove records already\
    \ in a table, you may use the DELETE command in SQL.\nBecause accidentally removing\
    \ the incorrect rows might result in lost data, it is essential to utilize the\
    \ WHERE clause with extreme caution. Before removing the data, it is a good idea\
    \ to validate your DELETE statement using a SELECT query to validate the rows\
    \ the deletion could impact. This is a recommended best practice.\nBe aware that\
    \ the data you delete using DELETE statements is irretrievably destroyed and cannot\
    \ be recovered under any circumstances. This information is gone forever. It is\
    \ important to keep regular backups of your data to prevent it from being lost\
    \ in the event it is inadvertently deleted.\n\n### Syntax:\n\n```\nDELETE FROM\
    \ table_name\nWHERE condition\n```\n\n### Code:\n\n```\nDELETE FROM Customer_Tab\n\
    WHERE Name = 'Peter Son';\nSELECT * FROM Customer_Tab;\n```\n\n### Output:\n\n\
    ```\nJanet Yew|20|janetyew@gmail.com\nAndrew Smith|32|smith@gmail.com\n```\n\n\
    ### Code:\n\n```\nDELETE FROM Employee_Tab\nWHERE Name = 'Jim Smith';\nSELECT\
    \ * FROM Employee_Tab;\n```\n\n### Output:\n\n```\nHouston|30|4000|johndoe@gmail.com\n\
    Jane Doe|28|5000|janedow@gmail.com\n```\n\n### Code:\n\n```\nDELETE FROM Customer_Tab\n\
    WHERE Age = '32';\nSELECT * FROM Customer_Tab;\n```\n\n### Output:\n\n```\nJanet\
    \ Yew|20|janetyew@gmail.com\n```\n\n## DROP\n\nIt is used to remove the table's\
    \ structure and any entries. You must use the DROP statement with extreme care\
    \ since it will irreversibly erase the object you provide together with all its\
    \ contents. The data that has been destroyed cannot be retrieved once the DROP\
    \ instruction has been carried out.\nThe DROP command may be used to destroy additional\
    \ database objects and tables. Some examples of these other database objects are\
    \ indexes, views, and databases. There may be particular subtle modifications\
    \ in the syntax of these objects, but the fundamental idea remains the same.\n\
    \n### Syntax:\n\n```\nDROP TABLE table_name;\n```\n\n### Code:\n\n```\nDROP TABLE\
    \ Manager_Tab;\n```\n\n### Output:\n\nIt results in dropping the table named Manager_Tab\
    \ from the table's folder.\n\n## Chapter 2: SQL Data Types\n\n### Basic SQL Syntax\n\
    \nThere are several fundamental principles and rules to keep in mind when using\
    \ SQL. Let’s have a look to the most important rules:\n\n- Although SQL keywords\
    \ do not care about capitalization, it is best practice to write them with all\
    \ capital letters.\n- The semicolon is required after SQL statements (;).\n- In\
    \ SQL, the keywords are almost always typed with an uppercase letter.\n- String\
    \ values are required to be encapsulated in single quotation characters (').\n\
    - Executing SQL instructions is impossible until the semicolon has been reached.\n\
    - SQL statements rely on the lines of text they are written on. We can utilize\
    \ a single SQL query on more than one text line if necessary.\n- SQL queries are\
    \ processed starting at the left and working to the right.\n- It is not necessary\
    \ to put numerical numbers in quotation marks.\n- SQL comments are denoted by\
    \ a pair of hyphens (--) at the opening of the line and continue to the decision.\n\
    - You can carry out most of the tasks in a database using SQL statements.\n- Structured\
    \ Query Language relies on Tuple Relationship Calculus and Relational Algebra.\n\
    \n### Data Types\n\nA data type in SQL Server specifies the information that may\
    \ be found in a database column or variable. In the process of creating a table,\
    \ this phase is required and very necessary. Inappropriate data types in a table\
    \ may contribute to various problems, including ineffective query optimization,\
    \ poor performance, and truncated data.\n\n- Data types that deal with numbers\
    \ are called Numeric, such as INT, TINYINT, BIGINT, FLOAT, and REAL, amongst others.\n\
    - Date and time-related data types include dates, TIME, and DATETIME, among others.\n\
    - Data types for characters and strings include the likes CHAR, VARCHAR, and TEXT.\n\
    - Data types that correspond to Unicode character strings, such as NCHAR, NVARCHAR,\
    \ and NTEXT, among others.\n- Binary data types include things like BINARY and\
    \ VARBINARY, amongst others.\n- Miscellaneous data types include CLOB, BLOB, XML,\
    \ CURSOR, and TABLE.\n\nSQL is equipped with several fundamental data types that\
    \ may be used to save various kinds of information in a database. These are the\
    \ details of the data type as mentioned above.\n\n## INT\n\nINT stands for \"\
    integer\" and is the data type used to hold entire numbers and integers. The size\
    \ of an INT may vary depending on the particular SQL implementation, although\
    \ it generally falls between the range of -2147483648 and 21473647.\n\n### Syntax:\n\
    \n```\nvariable_name INT\n```\n\n### Code:\n\n```\nCREATE TABLE Employee_Tab(\n\
    \    Age INT\n);\n```\n\n## BIGINT\n\nBIGINT is a whole integer data type that\
    \ may be used to store bigger integer values. BIGINT values normally fall in the\
    \ range of -9223372036854775808 to 9223372036854775807; however, the size of a\
    \ BIGINT might vary depending on the particular SQL implementation.\n\n### Syntax:"
  mdcn: "## 第一章：基础 SQL 语法与命令\n\nSQL 允许用户使用一套基本指令与数据库进行通信。以下是一些常用命令：\n\n## 创建\n\n*CREATE*\
    \ 命令用于创建不同的对象。存储信息最重要的对象之一是数据库。\n\n### 语法：\n\n```\nCREATE DATABASE database_name;\n\
    ```\n\n### 代码：\n\n```\nCREATE DATABASE office;\n```\n\n### 输出：\n\n这将在系统数据库文件夹中创建一个名为\
    \ office 的数据库。CREATE 也用于在数据库中创建表。*CREATE TABLE* 命令创建表并指定其列和数据类型，如下所示：\n\n### 语法：\n\
    \n```\nCREATE TABLE table_name(column_name DATATYPE);\n```\n\n### 代码：\n\n```\n\
    CREATE TABLE Employee_Tab(Name varchar(20), Age int, Salary int, Email varchar(30));\n\
    CREATE TABLE Customer_Tab(Name varchar(20), Age int, Email varchar(30));\nCREATE\
    \ TABLE Manager_Tab(Name varchar(20), Code int, Email varchar(30));\n```\n\n###\
    \ 输出：\n\n这将在 office 数据库的 Tables 文件夹中创建三个名为 Employee_Tab、Customer_Tab 和 Manager_Tab\
    \ 的表。\n\n## INSERT INTO\n\n在 SQL 中，INSERT INTO 语句用于向数据库填充数据。在这种情况下，‘**table_name**’\
    \ 指的是要插入数据的表的标签。‘**column1**’、‘**column2**’、‘**column3**’ 等是表的列名。值 ‘**value1**’、‘**value2**’、‘**value3**’\
    \ 对应于你希望输入到相应列中的值。\n\n重要的是要记住，如果你使用相同的 INSERT INTO 命令并添加额外的信息集，你可以一次向表中插入多条记录。\n\
    \n### 语法：\n\n```\nINSERT INTO table_name (column1, column2, column3, ...)\nVALUES\
    \ (value1, value2, value3, ...);\n```\n\n### 代码：\n\n```\nINSERT INTO Employee_Tab\
    \ (Name, Age, Salary, Email)\nVALUES ('John Doe', 30, 4000, 'johndoe@gmail.com'),\n\
    \       ('Jane Doe', 28, 5000, 'janedow@gmail.com'),\n       ('Jim Smith', 35,\
    \ 5000, 'jimsith@gmail.com');\n\nINSERT INTO Customer_Tab (Name, Age, Email)\n\
    VALUES ('Janet Yew', 20, 'janetyew@gmail.com'),\n       ('Peter Son', 48, 'peterson@gmail.com'),\n\
    \       ('Andrew Smith', 32, 'smith@gmail.com');\n```\n\n### 输出：\n\n结果，影响了 3 行，因为我们在\
    \ Employee 和 Customer 表中输入了三条记录。\n\n## SELECT\n\nSELECT 将是许多查询的起点，因为它告诉数据库我们想要查看哪些变量。我们可以提供列名（用逗号分隔），或者使用\
    \ * 符号，它将返回表中的所有列。\n\n### 语法：\n\n```\nSELECT * FROM table_name;\n```\n\n### 代码：\n\
    \n```\nSELECT * FROM Employee_Tab;\nSELECT * FROM Customer_Tab;\n```\n\n### 输出：\n\
    \n```\nJohn Doe|30|4000|johndoe@gmail.com\nJane Doe|28|5000|janedow@gmail.com\n\
    Jim Smith|35|5000|jimsith@gmail.com\n\nJanet Yew|20|janetyew@gmail.com\nPeter\
    \ Son|48|peterson@gmail.com\nAndrew Smith|32|smith@gmail.com\n```\n\n如果你想从特定列中提取数据，必须用列名替换\
    \ *。\n\n### 语法：\n\n```\nSELECT column1, column2\nFROM table_name;\n```\n\n###\
    \ 代码：\n\n```\nSELECT Name, Age FROM Employee_Tab;\nSELECT Age, Email FROM Customer_Tab;\n\
    ```\n\n### 输出：\n\n```\nJohn Doe|30\nJane Doe|28\nJim Smith|35\n\n20|janetyew@gmail.com\n\
    48|peterson@gmail.com\n32|smith@gmail.com\n```\n\n## UPDATE\n\nSQL 中的 UPDATE 命令更改表中已有的数据。\n\
    表名指的是此命令将更新的表标题。SET 子句允许你指定要修改的列和值。WHERE 子句根据给定条件控制应更改哪些行。\n因为更改错误的行可能导致数据不准确，所以必须极其谨慎地使用\
    \ WHERE 子句。在更改数据之前，建议使用 SELECT 查询验证你的 UPDATE 语句，以验证更改将影响的行。\n\n### 语法：\n\n```\n\
    UPDATE table_name\nSET column1 = value1, column2 = value2\nWHERE condition\n```\n\
    \n### 代码：\n\n```\nUPDATE Employee_Tab\nSET Name = 'Houston'\nWHERE Salary = '4000';\n\
