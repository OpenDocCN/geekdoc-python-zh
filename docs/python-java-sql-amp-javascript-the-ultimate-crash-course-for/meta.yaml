    | === | Strict equal to: True if the operands are equal and of the same type |
    a === b |

    | !== | Strict not equal to: If the operands are equal but of distinct types or
    not equal at all, this returns true | a !== b |

    | > | Greater than: When the left operand is bigger, it returns true | a > b |

    | >= | Greater than or equal to: When the left operand is equal to or larger,
    it returns true | a >= b |

    | < | Less than: When the right operand is bigger, it returns true | a < b |

    | <= | Less than or equal to: When the left operand is equal to or smaller, it
    returns true | a <= b |'
