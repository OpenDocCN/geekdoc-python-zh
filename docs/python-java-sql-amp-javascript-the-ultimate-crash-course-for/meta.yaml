    # Chapter 2: SQL Data Types


    # Basic SQL Syntax


    There are several fundamental principles and rules to keep in mind when using
    SQL Let’s have a look to the most important rules:


    +   - Although SQL keywords do not care about capitalization, it is best practice
    to write them with all capital letters.

    - The semicolon is required after SQL statements (;).

    - In SQL, the keywords are almost always typed with an uppercase letter.

    - String values are required to be encapsulated in single quotation characters
    ('').

    - Executing SQL instructions is impossible until the semicolon has been reached.

    - SQL statements rely on the lines of text they are written on. We can utilize
    a single SQL query on more than one text line if necessary.

    - SQL queries are processed starting at the left and working to the right.

    - It is not necessary to put numerical numbers in quotation marks.

    - SQL comments are denoted by a pair of hyphens (--) at the opening of the line
    and continue to the decision.

    - You can carry out most of the tasks in a database using SQL statements.

    - Structured Query Language relies on Tuple Relationship Calculus and Relational
    Algebra.


    # Data Types


    A data type in SQL Server specifies the information that may be found in a database
    column or variable. In the process of creating a table, this phase is required
    and very necessary. Inappropriate data types in a table may contribute to various
    problems, including ineffective query optimization, poor performance, and truncated
    data.'
