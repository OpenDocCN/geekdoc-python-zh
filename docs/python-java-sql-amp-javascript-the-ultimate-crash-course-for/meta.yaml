    \ Object Model (DOM), and more features have also been added. In addition to the\
    \ support it provides for forms, images, and other array characteristics of the\
    \ Document item, it also defines methods that enable scripts to manipulate and\
    \ access any document element, not just elements with a specific purpose like\
    \ shapes and images. These methods can be found in the element definitions.\n\n\
    ## Example\n\nWith W3C Document Object Model (DOM), it is relatively simple to\
    \ modify (access and set) document elements. You are free to make use of any of\
    \ the available methods, such as getElementsByName, getElementsByTagName, or getElementById.\n\
    Accessing document properties with the W3C DOM technique is shown here with an\
