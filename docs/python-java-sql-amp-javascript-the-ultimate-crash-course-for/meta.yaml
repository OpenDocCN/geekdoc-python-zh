    \ Symbol(\"id\");\n\nconst user = {\n  name: \"Mike\",\n  [id]: 123\n};\n\nconst\
    \ symbols = Object.getOwnPropertySymbols(user);\nconsole.log(symbols); // [Symbol(id)]\n\
    console.log(user[symbols[0]]); // 123\n```\n\nSymbols also have built-in well-known\
    \ symbols, such as ‘Symbol.iterator’ and ‘Symbol.toStringTag,’ which can be used\
    \ to customize the behavior of objects or classes in JavaScript.\n\nIn summary,\
    \ symbols in JavaScript are unique and immutable identifiers. They are often used\
    \ as keys in object properties to ensure uniqueness and avoid naming conflicts.\
    \ JavaScript objects and classes can be customized with unique behaviors using\
    \ symbols, which offer a certain degree of privacy.\n\n# undefined\n\nA variable\
    \ or attribute that is either nonexistent or has not been given a value is represented\
    \ by the value \"undefined.\" It is one of JavaScript's basic data types and represents\
    \ the absence of a relevant value."
