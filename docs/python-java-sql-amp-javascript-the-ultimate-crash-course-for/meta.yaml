  md: '# # Chapter 12: JavaScript Framework and Libraries


    There is a notable difference between a programming framework and a library, even
    though they could seem to be the same thing or conceptually equivalent at first
    glance. It is necessary to consider the purposes for which they were designed.


    # ## Comparing Libraries and Frameworks


    In computer programming, a "framework" is a collection of related "library" files
    to solve a certain problem. The key difference it offers is that the creator retains
    control over how it is used.


    # ### Library Definition


    The library is a collection of code developers can include addressing a specific
    problem in their projects. For a library''s code to be useful across various applications
    and scenarios, it has to be flexible and highly reusable. The timing of when the
    developer uses the library in their code is entirely up to them, and they are
    free to do so many times if they deem it essential.


    # ### Framework Definition


    A Framework, in contrast, offers developers a more tightly organized code that
    they may insert their code at specified points of control. These points enable
    the developer to extend the framework''s capabilities to meet their requirements.
    The framework is responsible for calling the developer-provided code when it considers
    it required.


    The primary distinction is the developer''s control over the code''s application.
    Frameworks invoke the developer''s code, which may then use Libraries to tackle
    common or difficult issues more readily.


    As a real-world analogy, consider the bread-making process. Various stages must
    occur in a certain sequence for the production of bread. A framework for bread
    production can include, for instance:


    ```

    javascript

