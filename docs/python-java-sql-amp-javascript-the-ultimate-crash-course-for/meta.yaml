- md: "## Inheritance\n\nOne of the most important aspects of Object-Oriented programming\
    \ is inheritance. Inheritance refers to the process of defining a new class without\
    \ adding new methods or arguments but rather deriving them from other classes.\
    \ The new class is commonly referred to as the child class. The parent class is\
    \ the class from which all methods are inherited.\n\n## Real-World Example:\n\n\
    When developing real-world applications, inheritance comes in handy in a variety\
    \ of situations. Assume you are developing a camera mobile application for iOS.\
    \ While creating the application, you may need to create several modules for the\
    \ various functions it provides. You've noticed that you're reusing code for GUI\
    \ interfaces after a few months of development because your team is still using\
    \ function-oriented programming. You decided to use an object-oriented framework\
    \ for your project to save time and money. Since you're now using the OOP paradigm,\
    \ you can reuse the code you've already written for GUI interfaces and link it\
    \ to the new classes you're creating. This saves time and energy by allowing programmers\
    \ to add new features without having to rewrite the old ones.\n\nSyntax for Python\
    \ inheritance:\n```python\nclass BaseClass:\n    { Body of base class }\nclass\
    \ DerivedClass(BaseClass):\n    { Body of derived class }\n```\n\nPlease keep\
    \ in mind that both base and derived classes must follow all the previously described\
    \ class rules.\n\n## Program Code:\n\n```python\n# Define a base class \"Polygon\"\
    \ with a method to return the number of edges\nclass Polygon:\n    def __init__(self,\
    \ num_edges):\n        self.num_edges = num_edges\n\n    def edges(self):\n  \
    \      return self.num_edges\n\n# Define a subclass \"Rectangle\" based on the\
    \ Polygon class\nclass Rectangle(Polygon):\n    def __init__(self, length, width):\n\
    \        # Call the __init__ method of the parent class to initialize the number\
    \ of edges\n        Polygon.__init__(self, 4)\n        self.length = length\n\
    \        self.width = width\n\n    # Define a method to calculate the area of\
    \ the rectangle\n    def area(self):\n        return self.length * self.width\n\
    \n# Create an instance of the Rectangle class\nrect = Rectangle(40, 10)\n\n# Print\
    \ the number of edges and the area of the rectangle\nprint(\"Number of edges:\"\
    , rect.edges())\nprint(\"Area:\", rect.area())\n```\n\n## Output:\n\n```\nNumber\
    \ of edges: 4\nArea: 400\n```\n\nExplanation:\nIn the previous example, we defined\
    \ the class 'Polygon' first, and then built the second class 'Rectangle' on top\
    \ of it. A rectangle with dimensions of 40 by 10 is created. When the 'area' method\
    \ is called, the area of the square is computed. You can create another polygon\
    \ class in the future by simply writing a method to calculate the area.\n\nWith\
    \ enough knowledge of Object-Oriented Programming, you can create classes and\
    \ objects that can interact to create software that uses many components and performs\
    \ multiple tasks. Look at the open-source code hosted on GitHub to learn more\
