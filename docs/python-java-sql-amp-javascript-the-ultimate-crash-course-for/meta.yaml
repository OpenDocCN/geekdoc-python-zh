    # Symbol


    The Symbol is a primitive data type used to create unique and immutable identifiers.
    Symbols are often used as keys in object properties to avoid naming conflicts
    and provide a level of privacy.

    You can use the ''Symbol()'' function for creating a symbol. Each symbol created
    using ‘Symbol()’ is unique, even if the description provided is the same. For
    example:


    ```

    const symbol1 = Symbol();

    const symbol2 = Symbol();


    console.log(symbol1 === symbol2); // false

    ```


    Symbols can also be created with an optional description, which is useful for
    debugging or providing additional information. The description does not affect
    the uniqueness of the symbol. For example:


    ```

    const symbol3 = Symbol("symbolDescription");

    const symbol4 = Symbol("symbolDescription");


    console.log(symbol3 === symbol4); // false

    ```


    Symbols are primarily used as keys in object properties. They help avoid unintentional
    name collisions when multiple parts of code use the same property names. Here''s
    an example:


    ```

    const id = Symbol("id");

    ```'
