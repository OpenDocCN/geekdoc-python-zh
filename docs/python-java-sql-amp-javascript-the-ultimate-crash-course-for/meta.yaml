    \ that return the area and perimeter of the rectangle, respectively. Create an\
    \ instance of the class and call the methods to display the values.\n- 4. Create\
    \ a class called BankAccount with a constructor that takes in the owner's name,\
    \ balance, and type of account. The class should have methods get_balance(), deposit(amount),\
    \ and withdraw(amount) that return the balance, deposit an amount, and withdraw\
