    \n## 'Try' 和 'Except'\n\n在创建异常处理任务时，您应该了解主要的编程组件Try和Except。try块是开发人员必须指定在Python解释器中可能发现错误的位置。另一方面，except块需要关于如果在程序执行期间发生我们定义的特定错误该怎么办的信息。\n\
    \n## 程序代码：\n\n```\n# Try and except block in a function\ndef divide32(x):\n  \
