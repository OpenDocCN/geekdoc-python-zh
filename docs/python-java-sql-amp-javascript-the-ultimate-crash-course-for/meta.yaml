    As a programmer, you should be aware that Windows systems use Backslashes to differentiate
    between the root directory and subdirectories. Other operating systems, such as
    Mac and Linux, use forward slashes to distinguish between root and subdirectories.


    If you don''t want to use back or forward slashes while entering code on the terminal
    for whatever reason, you can use a function called os.path.join.


    # Program Code:


    ```

    os.path.join(''C'', ''first'', ''second'')

    ```


    # Output:


    ```

    ''C\first\second''

    ```


    # Current Working Directory


    While running complex code, you may need to interact with multiple files in the
    same directory as a Python programmer. A function called os.getcwd() can be used
    to help programmers interact with other files in the same directory. When your
    absolute path is identified, all files in the directory or subdirectory will be
    shown as output.


    # Creating New Folders


    Several Python programs usually require users to generate files or the application
    to create files in different directories on its own. A save file for a game, for
    example, may be generated automatically by the software without any user intervention.
    All Python programmers must be aware of the importance of creating new folders
    for the applications they create. To create a new directory, use the os.makedirs()
    function.


    # Program Code:


    ```

    import os

    os.makedirs(''D: /user/ Python/myfolder'')

    ```


    In the previous example, we first imported the ''os'' module containing the system
    function design. The makedirs() function was then called with a path as the function
    parameter. "myfolder" is the name of the new folder created in the directory by
    the above function. You can check by opening your file manager or typing cd into
    a command prompt.'
