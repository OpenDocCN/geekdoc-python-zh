  md: "# Break and Continue\n\nLoops can complete a large amount of complex programming\
    \ logic in a short period. While they are useful in many situations, they can\
    \ consume a lot of run-time memory, causing programs to crash unexpectedly.\n\
    To solve this problem, Python provides two programming components known as break\
    \ and continue.\n\n# Break Statement\n\nWhen the Python interpreter encounters\
    \ a 'break' in a program, it immediately ends the loop and moves on to the line\
    \ following the loop. Any time the 'break' occurs inside a loop, the loop will\
    \ end and the next statements will be executed.\nSyntax:\nbreak\n\n# Example Program:\n\
    \n```\nM = 10\nj = 1\nwhile j <= M:\n    if j %2 == 0:\n        print(j, \"is\
    \ divisible by 2 \")\n    if j % 3 == 0:\n        print(j, \"is divisible by 3\
    \ \")\n        break\n    j = j + 1\n```\n\n# Output:\n\n```\n2 is divisible by\
    \ 2\n3 is divisible by 3\n```\n\nWhen the interpreter reads the break statement\
    \ in the previous example, the program will end. What would the output be without\
    \ the 'break'? (hint: all the numbers <= 10 that are divisible by 2 and 3...).\n\
    \n# Continue Statement?\n\nWhen the Python interpreter encounters 'continue' in\
    \ a program, it immediately ends the loop and moves on to the next iteration.\
    \ Keep in mind"
  merge: -1
