    # Chapter 8: Working with Data in a Distributed Environment


    # What is a Distributed Environment?


    Relational databases fall into the category known as distributed SQL, which incorporates
    the most important aspects of both standard SQL and NoSQL systems. It offers a
    distributed implementation of a single relational, logical database that may be
    used across several network hosts. Distributed SQL databases instantly duplicate
    and distribute data across all servers, often called nodes. Each node in the database
    can process read and write queries. Around the middle of the 2010s, distributed
    SQL databases were available with transactional applications. They provide the
    fundamental functionality that may be encountered in both relational databases
    (SQL) and non-relational databases (NoSQL). The database is capable of horizontal
    scaling and robust consistency and natively supports ACID transactions across
    unavailability and regional zones in on-premises data centers or the cloud.


    # Key Features and Concepts of the Distributed Database


    +   - An SQL application programming interface (API) for data modelling and querying,
    including support for conventional RDBMS, features such as database objects, partial
    indexing, database objects, and triggers.

    - Smart distributed processing execution means that the processing of queries
    may get closer to the facts rather than the data being sent across the network,
    which can slow down the response times of queries.

    - Intelligent and transparent distributed information storage, comprising data
    and index that should be continuously shared among various cluster''s nodes so
    that no one node creates a bottleneck in processing requests. Data dissemination
    and intelligent rebalancing may ensure good performance and high reliability.'
  - '[PAGE 333]


    +   - When you spread your data over different servers, you must select how to
    divide your data. This decision must be made before you distribute your data.
    To do this, your data will need to be segmented into subsets that will be kept
    on separate nodes. Several values, such as a timeframe or geographical location,
    may be used to divide data. This may assist in increasing the performance as well
    as the scalability of the system.

    - Joining tables in a cloud system hosted on various nodes might be difficult
    from a performance standpoint due to the distributed nature of the environment.
    If you want to maximize the efficiency of your queries, you may need to use specific
    methods such as multicast joins or partitioned joins.

    - Maintaining data consistency may be difficult when dispersed over numerous nodes,
    making errors more likely to occur. To guarantee that any changes made to the
    data are accurately transmitted across all nodes, you may be required to use distributed
    protocols or other methods.

    - If you have a great number of nodes, it is necessary to ensure that the burden
    is spread evenly among all the nodes in the system. This process is called “load
    balancing.” You may need to implement a network interface or another strategy
    to guarantee that the system operates at peak performance.

    - Maintaining privacy and integrity becomes an even more pressing concern when
    data is stored across numerous nodes. You are responsible for ensuring that the
    data is adequately secured and that use is strictly regulated.


    # Primary Requirements of the Distributed Database


    It is significant to keep in observance that distributed SQL is still a database,
    and as such, it is needed to meet the baseline requirements necessary for it to
    be considered a database. Even though the seven requirements listed above are
    specific to dividing up SQL (well, all of them except for the SQL thing), it is
    still important to remember that distributed SQL has these requirements. There
    is a predetermined level of performance expected for the following:'
- md: '## Administration

    You should have no trouble installing and configuring the database with the help
    of a collection of tools based on command lines and graphical interfaces. This
    comprises the capabilities of controlling the environment and the information
    lifecycle for backup and restoration, configuring indexes and partitions, constructing
    new DDL, building new tables, defining the new schema, and applying new schema.


    ## Optimization

    The database ought to make it possible for a database administrator (DBA) to obtain
    information about the effectiveness of queries and their role in improving how
    they are executed. This includes more complex features like a cost-based estimator
    and a cloud system that may be challenging to implement and introduces novel ideas.


    ## Authentication, Authorization, and Accountability

    Authentication, authorization, and accountability are three of the most important
    aspects of data safety that a database needs to be able to provide. Data safety
    is an essential component of every corporate software product. It should not be
    able to function alone and should instead integrate with a single truth source
    for identity management and governance.


    ## Integration

    A database cannot work independently and has to be integrated with the apps you
    already have using tried and proven drivers. It should be able to interact smoothly
    with any current ORMs and give the capability to either import or export data
    in bulk. It should also give essential features that enable it to interact with
    ETL tools and update data capture features to interface with more modern services
    such as carried out and the results or cloud storage. In addition, it should have
    controls that help it to work with ETL tools.


    ## How is data processed in distributed database?

    A vast quantity of data enters a distributed data processing system via various
    distinct entry points. This causes the system to process the data. The act of
    taking in new information is referred to as data ingestion.

    Once the input begins to flood in, the system architecture consists of many layers,
    each of which divides the processing into several distinct components at various
    points.


    ### Layer for the Collection and Preparation of Data

    This layer is in charge of gathering data from various outside sources and processing
    it to be analyzed by the system. It also handles any necessary formatting. When
    there is no consistent format for the data being ingested, in its natural state,
    it is either raw and unstructured or semi-structured. It could also be tax returns,
    policy forms, medical bills, etc. The data processing layer is responsible for
    transforming the data into a consistent and standard format and classifying the
    data according to the business logic the system will handle. The layer has an
    intelligence high enough to do all of this without any assistance from a person
    of any kind.


    ### Layer for Data Security

    Moving data exposes it to potential security vulnerabilities. The information
    security protocol has to guarantee that the data transfer is carried out securely
    by keeping a close eye on it at all times, using various security protocols, and
    so on.


    ### Layer for the Data Storage

    After the data has been received, it must be stored somewhere permanent. There
    are many various ways to do this task. When analytics are performed in real-time
    on streaming data, data storage and management are handled via distributed caches
    that are kept in memory. On the other hand, if the data is just being handled
    in a conventional manner, such as batch processing, distributed databases specifically
    developed to manage large amounts of data are utilized to store the information.


    ### Layer for Processing of Data

    This tier processes the data and includes the logic that is the real thing. It
    is accountable for the layer above it. This layer applies business logic to the
    data to get information that is useful from the data. The most common approaches
    for this purpose are machine learning, predictive modelling, descriptive modelling,
    and decision modelling.


    ### Data Visualization Layer

    The data visualization layer is a critical component of the data analysis process.
    It serves as a bridge between the raw data and the user, presenting complex information
    in an easily understandable format. Once data has been collected and processed,
    it is transmitted to the data visualization layer.


    Web-accessible dashboards make up the data visualization layer. These dashboards
    display data in graphs, charts, and infographics. Users can quickly understand
    data trends and insights.


    One of the key benefits of the data visualization layer is that it allows users
    to interact with the data in real time. This means that users can modify the parameters
    of the visualization, such as changing the timeframe or selecting specific data
    sets, to gain a more detailed understanding of the information being presented.


    Another benefit of the data visualization layer is that it can be customized to
    suit the needs of different users. For example, a sales team might use a different
    dashboard than a marketing team, as their needs and objectives are likely to be
    different. This flexibility means that the data visualization layer can be tailored
    to meet the specific needs of different departments within an organization.


    Overall, the data visualization layer is an important part of the data analysis
    workflow. It allows users to acquire insights quickly and easily from complicated
    data sets and may be tailored to the specific needs of individuals within an organization.
    Organizations that use data visualization tools effectively can make more informed
    decisions and acquire a competitive advantage in their marketplaces.


    ## Advantages of the distributed database

    - Data warehouses are skilled in modular development, which means that processes
    can be expanded by introducing new desktops and local data to a new site and integrating
    them in a distributed manner without any interruptions. This can be done without
    disrupting the overall operation of the distributed database.

    - When there is an issue with one of the system''s centralized databases, the
    whole thing grinds to a halt. However, with distributed database systems, if a
    component fails, the system will continue to operate, although with a decreased
    level of performance, until the issue is resolved.

    - Suppose the data is stored close to the areas in which it is used the most.
    In that case, administrators of distributed database systems may reduce the amount
    of money spent on communication. In centralized systems, this is not something
    that can be done.


    ## Chapter 9: Building Data Pipelines and Automating Data Processes


    ### What are data pipelines and their uses?

    A data pipeline is a series of components that work together to automate the gathering,
    organization, mobility, modification, and processing of information as it travels
    from a source to its destination. This ensures that the data arrives in a form
    that businesses can use to facilitate the development of a data-driven culture.


    Pipelines for data movement are an essential component of every organization''s
    data architecture. Implementing a data pipeline that is well-designed, resilient,
    and scalable in your organization will assist your company in successfully managing,
    analyzing, and organizing massive amounts of data to generate business value.


    There is a use case for data pipelines in almost every business and sector today.
    It may be anything as simple as moving data from one location to another, or it
    could be something as involved as processing data for use in supervised ml recommendation
    engines that enhance product offers. Some popular data pipeline use applications
    include:

    - Consolidating data from many sources (SaaS tools, databases) into a big data
    repository (data warehouses, data lakes) to create a single authoritative source
    for the organization''s data is known as data consolidation.

    - They are improving the overall performance of the backend system by moving data
    to huge data stores and minimizing the amount of strain placed on operational
    databases.

    - Ensuring the data''s quality, dependability, and consistency across all business
    units to provide quicker data access.


    ### Components of a data pipeline


    #### 1. Data sources'
  mdcn: '## 管理

    借助一系列基于命令行和图形界面的工具，您应该能够轻松安装和配置数据库。这包括控制环境和信息生命周期以进行备份和恢复、配置索引和分区、构建新的DDL、创建新表、定义新架构以及应用新架构的能力。


    ## 优化

    数据库应使数据库管理员（DBA）能够获取有关查询效率及其在改进执行方式方面作用的信息。这包括更复杂的功能，如基于成本的估算器和云系统，这些可能难以实现并引入了新概念。


    ## 认证、授权和问责

    认证、授权和问责是数据库需要能够提供的数据安全最重要的三个方面。数据安全是每个企业软件产品的基本组成部分。它不应能够独立运行，而应与用于身份管理和治理的单一事实来源集成。


    ## 集成

    数据库无法独立工作，必须使用经过验证的驱动程序与您现有的应用程序集成。它应能够与任何现有的ORM顺畅交互，并提供批量导入或导出数据的能力。它还应提供基本功能，使其能够与ETL工具交互，并更新数据捕获功能以与更现代的服务（如执行和结果或云存储）接口。此外，它应具有帮助其与ETL工具协作的控制机制。


    ## 分布式数据库如何处理数据？

    大量数据通过各种不同的入口点进入分布式数据处理系统。这导致系统处理数据。接收新信息的行为被称为数据摄取。

    一旦输入开始涌入，系统架构由多个层组成，每一层在不同点将处理分成几个不同的组件。


    ### 数据收集和准备层

    此层负责从各种外部源收集数据并进行处理以供系统分析。它还处理任何必要的格式化。当摄取的数据没有一致的格式时，其自然状态是原始且非结构化或半结构化的。它也可能是纳税申报表、保单表格、医疗账单等。数据处理层负责将数据转换为一致和标准的格式，并根据系统将处理的业务逻辑对数据进行分类。该层具有足够高的智能，可以在没有任何人类协助的情况下完成所有这些工作。


    ### 数据安全层

    移动数据会使其暴露于潜在的安全漏洞。信息安全协议必须通过密切监控数据传输、使用各种安全协议等来保证数据传输的安全进行。


    ### 数据存储层

    数据接收后，必须存储在某个永久位置。完成此任务有多种不同的方法。当对流数据进行实时分析时，数据存储和管理通过保存在内存中的分布式缓存来处理。另一方面，如果数据仅以传统方式处理，例如批处理，则使用专门开发用于处理大量数据的分布式数据库来存储信息。


    ### 数据处理层

    此层处理数据并包含实际的逻辑。它对其上方的层负责。此层将业务逻辑应用于数据，以从数据中获取有用的信息。最常用的方法包括机器学习、预测建模、描述性建模和决策建模。


    ### 数据可视化层

    数据可视化层是数据分析过程的关键组成部分。它充当原始数据和用户之间的桥梁，以易于理解的格式呈现复杂信息。数据收集和处理后，会传输到数据可视化层。


    数据可视化层由可通过Web访问的仪表板组成。这些仪表板以图形、图表和信息图的形式显示数据。用户可以快速理解数据趋势和洞察。


    数据可视化层的主要优势之一是它允许用户实时与数据交互。这意味着用户可以修改可视化的参数，例如更改时间范围或选择特定数据集，以更详细地理解所呈现的信息。


    数据可视化层的另一个优势是可以根据不同用户的需求进行定制。例如，销售团队可能使用与营销团队不同的仪表板，因为他们的需求和目标可能不同。这种灵活性意味着数据可视化层可以根据组织内不同部门的具体需求进行定制。


    总体而言，数据可视化层是数据分析工作流程的重要组成部分。它允许用户快速轻松地从复杂数据集中获取洞察，并且可以根据组织内个人的具体需求进行定制。有效使用数据可视化工具的组织可以做出更明智的决策并在其市场中获得竞争优势。


    ## 分布式数据库的优势

    - 数据仓库擅长模块化开发，这意味着可以通过引入新的桌面和本地数据到新站点并以分布式方式集成它们来扩展流程，而不会中断分布式数据库的整体运行。

    - 当系统的某个集中式数据库出现问题时，整个系统就会停止运行。然而，使用分布式数据库系统，如果某个组件发生故障，系统将继续运行，尽管性能水平会降低，直到问题解决。

    - 如果数据存储在最常使用它的区域附近，分布式数据库系统管理员可以减少通信成本。在集中式系统中，这是无法做到的。


    ## 第9章：构建数据管道和自动化数据流程


    ### 什么是数据管道及其用途？

    数据管道是一系列组件协同工作，以自动化信息从源到目的地的收集、组织、移动、修改和处理过程。这确保了数据以企业可以使用的格式到达，从而促进数据驱动文化的形成。


    数据移动管道是每个组织数据架构的基本组成部分。在您的组织中实施设计良好、弹性强且可扩展的数据管道将帮助您的公司成功管理、分析和组织大量数据以产生业务价值。


    如今，几乎每个行业和领域都有数据管道的用例。它可能像将数据从一个位置移动到另一个位置一样简单，也可能像处理数据用于监督式机器学习推荐引擎以增强产品供应一样复杂。一些流行的数据管道应用包括：

    - 将来自多个来源（SaaS工具、数据库）的数据整合到一个大数据存储库（数据仓库、数据湖）中，为组织的数据创建单一权威来源，这被称为数据整合。

    - 通过将数据移动到大型数据存储并减少对操作数据库的压力来提高后端系统的整体性能。

    - 确保数据在所有业务单元中的质量、可靠性和一致性，以提供更快的数据访问。


    ### 数据管道的组件


