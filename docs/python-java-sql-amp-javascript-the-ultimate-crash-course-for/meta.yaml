    # Chapter 1: Setting Up Your Java Environment


    # The Basics of Java Installation


    Installing Java on your computer is the first step to starting your journey as
    a Java programmer. In this section, we will cover everything you need to know
    to download and set up a Java Development Kit (JDK) on Windows, Mac, or Linux.
    Let''s get started!


    # What is the Java Development Kit (JDK)?


    The JDK, or Java Development Kit, is an essential software development package
    that includes the tools needed to compile and run Java applications. It contains
    the Java Runtime Environment (JRE), which handles running Java code, as well as
    additional tools like compilers and debuggers used during development. When installing
    the JDK, you will have the core functionality required to both write and execute
    Java programs on your computer.


    # Choosing a JDK Version


    Oracle releases new versions of the JDK regularly, with the latest version at
    the time of writing being JDK 17. However, you may want to choose an earlier long-term
    support (LTS) version for a stable development environment, such as JDK 11. Be
    aware that each version introduces changes and new features, so you should choose
    one and stick with it until you are comfortable upgrading. Compatibility issues
    can arise between versions, so it''s best to select a version and use it consistently
    for all of your projects.


    # Downloading the JDK


    Now that you''ve chosen a JDK version, it''s time to download the installer file.
    Navigate to the Oracle downloads page for your Java development platform of choice.
    For Windows, you can search for and locate the Windows x64 or Windows i586 installer
    executable. For macOS, download the PKG installer package. Linux users have tar.gz
    installers available for'
  - '[PAGE 154]


    their distribution. Be sure to click through all the license agreements before
    initiating the download.


    # Installing on Windows


    To install the JDK on Windows, simply run the executable installer file you downloaded
    earlier. Accept all licenses and click through the installation wizard, leaving
    defaults checked where possible. The only mandatory configuration is to select
    a destination folder - the default Program Files location is typically fine. Make
    sure to check the box to add the Java bin folder to your PATH environment variable
    if prompted. This step makes the Java command accessible from any folder in your
    command prompt.


    # Installing on macOS


    Like Windows, macOS installation is fairly straightforward. Open the PKG file
    you downloaded and follow the prompts to continue through installation. The default
    installation path of /Library/Java/Java Virtual Machines is recommended. When
    complete, you may need to add the Java bin path to your PATH variable manually
    by updating your ~/.profile file. Restart any open Terminal sessions for the change
    to take effect.


    # Installing on Linux


    Linux JDK installation requires extracting the downloaded tar.gz file and setting
    some environment variables. First, create a folder like /opt/java and extract
    the tar contents there using tar -xzf filename.tar.gz. Then set JAVA_HOME=/opt/java/JDK-version
    and add $JAVA_HOME/bin to your PATH. For system-wide changes, modify /etc/profile.d/java.sh.
    For your user, edit ~/.profile or ~/.bashrc instead before sourcing it. Common
    Linux paths are /usr/lib/jvm or /usr/local/java.


    # Verifying Your Installation


    To verify that your JDK installation was successful, open a new command prompt
    or terminal session and run the Java --version command. You should see an output
    listing the Java version number, VM vendor, and other details. You can also test
    that the java compiler works by creating a new HelloWorld.java file containing
    a simple program and running javac HelloWorld.java to compile it. If both commands
    run without errors,'
  - '[PAGE 155]


    congratulations - you now have a functioning Java environment ready to start programming!


    # Common Installation Issues


    While installation generally goes smoothly, a few common issues can occur. Verify
    your permissions if they are met with authorization errors. Conflicts between
    multiple Java versions installed simultaneously can also cause problems - consider
    uninstalling others. Path errors are frequent on Linux/macOS - double-check path
    settings. If strange errors occur, try reinstalling the JDK to a fresh folder.
    Oracle''s documentation covers additional troubleshooting advice for specific
    platforms. Being able to resolve installation problems independently is a big
    part of learning Java.


    # Wrapping Up


    This covers the essential basics of downloading and installing a Java Development
    Kit on Windows, Mac, and Linux systems. Having the JDK provides the core tools
    required to begin programming in Java. In upcoming chapters, we''ll discuss using
    build tools like Maven and Gradle as well as writing our first Java program. However,
    the installation process is the mandatory first step.


    # Understanding and Installing Package Managers: Maven, Gradle, and Beyond


    Now that you have a JDK installed, it''s time to supplement your Java development
    environment with additional tools. Package managers provide automation, standardization,
    and ease of use when building Java projects. In this section, we''ll look at Maven
    and Gradle - two of the most popular options - as well as some alternatives beyond
    the basics.


    # What is a Build Tool or Package Manager?


    A build tool, also referred to as a package manager, facilitates the incremental
    development process. It automates repetitive but necessary tasks like compiling
    code, running tests, packaging artifacts into distributable JAR files, and more.
    Build tools also help manage dependencies on third-party libraries, ensuring consistent
    builds across different machines. This allows developers to focus on coding rather
    than manual configuration and setup work.'
  - '[PAGE 156]


    # Maven - The De facto Standard


    Maven is likely the most well-known Java build tool due to its first-mover status
    and adoption in large open-source projects. Maven projects are defined through
    POM (Project Object Model) files containing declarations of project metadata like
    groupId, artifactId, version, and dependencies. Maven handles downloading dependencies,
    compiling code, running tests, and building jars - all based on standardized conventions.
    The central Maven repository hosts thousands of pre-configured dependencies.


    # Installing Maven


    To install Maven on Windows, download the mvn-version-bin.zip file from their
    website. Extract to a folder like C:\Program Files\Maven and add it to your PATH.
    On Linux/Mac, you can use a package manager like apt, brew, or yum instead. Then,
    run the mvn -version to verify. Maven is configured through settings.xml, which
    lives in the ~/.m2 folder by default. You may also need to tweak environment variables.
    Maven projects then use the pom.xml structure.


    # Gradle - Rising Star Flexibility


    Gradle is a newer build tool gaining popularity due to its flexible, convention-over-configuration
    approach. It uses Groovy and a domain-specific language (DSL) implemented through
    build. Gradle scripts instead of hardcoded conventions. This grants richer customization
    than Maven at the cost of a steeper learning curve. The main benefits are multi-project
    structure, custom tasks, broader language support, and incremental compilation.


    # Installing Gradle


    Download the gradle-version-bin.zip file for your system from gradle.org. Unzip
    and add the bin folder to your PATH, just like Maven. Windows users can also use
    Chocolatey or Scoop package managers instead. Then, run the Gradle -version to
    test. Gradle has its own repository but also supports Maven dependencies. Projects
    define tasks and plugins through the build. Gradle file.


    # Ant - The Legacy Grandfather'
- md: "## Build Tools in the Enterprise\n\nAnt served as the original automated build\
    \ system for Java long before Maven or Gradle. It uses XML configuration files\
    \ named build.xml for defining targets (tasks) and dependencies in a less standardized\
    \ way than Maven's conventions. Ant is lightweight and flexible but more low-level\
    \ than modern options. It remains useful for smaller projects due to widespread\
    \ toolchain support and familiarity among older Java developers.\n\nLarger organizations\
    \ frequently adopt enterprise-grade build servers like Jenkins or Bamboo for continuous\
    \ integration instead of strict command-line tools. These server-based options\
    \ provide features like version control integration, flexible jobs/pipelines,\
    \ email notifications, dashboards, and more advanced build automation across teams.\
    \ JBoss Maven Plugin, Gradle Enterprise Edition, and proprietary build systems\
    \ round out options for big companies.\n\n## Additional Build Tools\n\nOther options\
    \ include:\n\n- SBT (Simple Build Tool) - Scala's equivalent to Gradle featuring\
    \ interactive mode\n- Leiningen - Clojure's build system, inspired by Maven and\
    \ SBT\n- Buck - A build system from Facebook aiming for high optimization\n- Pants\
    \ - Twitter's build tool for Java/Scala supporting incremental compilation\n-\
    \ Bazel - Google's build system offering significant improvements to compile times\n\
    \n## Choosing Your Build Tool\n\nIn summary, Maven remains the standard for Java\
    \ projects due to its wide use and good conventions. Gradle offers richer customization\
    \ at the cost of complexity. For smaller projects, Maven or Gradle will likely\
    \ suffice, depending on preferences around conventions versus flexibility. Understanding\
    \ the options gives the flexibility to choose the best fit or migrate between\
    \ tools as needed.\n\n## First Steps: Writing and Running Your First Java Program\n\
    \nNow that you have your Java Development Kit and build tool configured, it's\
    \ time to verify everything is working properly by creating your first Java program.\
    \ Writing \"Hello World\" is a rite of passage for programmers of all languages,\
    \ serving as a baseline test to confirm the tools are installed correctly before\
    \ moving on to more complex code. In this section, we'll walk through developing\
    \ a simple greeting program from start to finish.\n\n## Creating the Source File\n\
    \nTo begin, we need to create the Java source code file that will contain our\
    \ program. Files ending in .java define Java classes and are compiled into bytecode\
    \ files with a .class extension. In your project directory, create a new text\
    \ file called HelloWorld.java using your preferred code editor or IDE. Save it\
    \ so the file path ends with the class name and .java extension, as this naming\
    \ convention is important.\n\n## Writing the Code\n\nA basic Java application\
    \ needs, at minimum, a class declaration and main method. Inside the HelloWorld.java\
    \ file, add:\n\n```\npublic class HelloWorld {\n    public static void main(String[]\
    \ args) {\n    }\n}\n```\n\nThis defines a public class called HelloWorld containing\
    \ a public static void main method that can accept command line arguments. The\
    \ main method is treated as the entry point where program execution begins.\n\n\
    ## Printing Output\n\nTo display output, we use the System.out.println() method.\
    \ Add the statement “System.out.println(\"Hello World!\")” inside the main method\
    \ body:\n\n```\npublic class HelloWorld {\n    public static void main(String[]\
    \ args) {\n        System.out.println(\"Hello World!\");\n    }\n}\n```\n\nThis\
    \ will print our greeting message to the console when the program runs. The out\
    \ PrintStream object represents the standard output, and println prints the string\
    \ plus a new line.\n\n## Compiling the Code\n\nNow it's time to compile our Java\
    \ source code into bytecode using the Javac compiler included in the JDK. Open\
    \ a command prompt, navigate to the project folder, and enter:\n\n```\njavac HelloWorld.java\n\
    ```\n\nIf there are no errors, this will generate a HelloWorld.class file containing\
    \ the compiled code. The .class extension indicates it is bytecode, not human-readable\
    \ source code.\n\n## Running the Program\n\nTo execute our program, use the java\
    \ command while specifying the fully qualified class name:\n\n```\njava HelloWorld\n\
    ```\n\nIf all goes well, you should see \"Hello World!\" printed on the console.\
    \ This verifies that the code runs as expected and the environment is configured\
    \ properly to compile and launch Java applications.\n\n## Building with Maven\n\
    \nLet's recreate the above using Maven instead of raw commands. Inside your project\
    \ folder, create a pom.xml with:\n\n```\n<project>\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <groupId>com.mycompany.app</groupId>\n    <artifactId>my-app</artifactId>\n\
    \    <version>1.0</version>\n    <properties>\n        <maven.compiler.source>17</maven.compiler.source>\n\
    \        <maven.compiler.target>17</maven.compiler.target>\n    </properties>\n\
    \    <dependencies>\n    </dependencies>\n</project>\n```\n\nThen run mvn compile\
    \ and mvn exec:java -Dexec.mainClass=\"HelloWorld\" to compile and run, respectively.\
    \ Maven handles the steps behind the scenes.\n\n## Building with Gradle\n\nFor\
    \ Gradle, create a build.gradle file:\n\n```\nplugins {\n    id 'java'\n}\n\n\
    group 'com.mycompany.app'\nversion '1.0'\nrepositories {\n    mavenCentral()\n\
    }\ndependencies {\n}\nmainClassName = \"HelloWorld\"\n```\n\nThen, run gradle\
    \ build to compile and gradle run to execute - Gradle provides the same functionality\
    \ in a more customizable manner.\n\n## Testing Your Output\n\nTo confirm \"Hello\
    \ World!\" is output as expected, you can also redirect the program output to\
    \ a file using java HelloWorld > output.txt. Then, opening output.txt should contain\
    \ only that greeting string. This verifies the code compiles and runs correctly\
    \ on your system before progressing.\n\n## Taking the Next Steps\n\nCongratulations,\
    \ you've now created your very first working Java application! This covers the\
    \ process of using a text editor or IDE to write code, compiling it with Javac,\
    \ executing with Java, and automating build flows with Maven and Gradle. With\
    \ a functioning development environment in place, you're now ready to start practicing\
    \ and expanding your Java programming knowledge. In future lessons, we'll take\
    \ what we've learned here and apply it by creating more advanced projects.\n\n\
    ## Common Issues and Troubleshooting\n\nNow that you've successfully written and\
    \ run a simple Java program, it's time to discuss some common problems beginners\
    \ encounter and how to troubleshoot them. No journey in programming is without\
    \ its bumps, but being able to resolve issues independently is an important skill.\
    \ In this section, we'll cover typical errors, where to find help, and general\
    \ debugging strategies.\n\n## Classpath and PATH Issues\n\nOne frequent cause\
    \ of errors is improperly configured environment variables. The classpath (Windows)\
    \ or PATH (Linux/Mac) needs to include the Java bin directory so commands like\
    \ java and javac are found. Missing or incorrect values here can lead to \"file\
    \ not found\" exceptions. Similarly, if multiple JDKs exist, the paths must point\
    \ to the desired one. Carefully double-check installation documentation.\n\n##\
    \ No Main Method Error\n\nA common first program mistake is neglecting to include\
    \ a public static void main(String[] args) method in the class. Without it, Java\
    \ won't know where to start execution and will complain about \"no main method\"\
    . Be sure any runnable Java files define this signature entry point method. The\
    \ access modifiers and argument types are important.\n\n## Compilation Errors\n\
    \nTypos, syntax errors, and missing imports will cause the Javac compiler to fail\
    \ with messages like \"cannot find symbol\". Go line by line through error descriptions\
    \ to spot issues in code. Formatting/indentation errors are also syntax problems.\
    \ Remember to recompile after fixes. IDEs can help find errors, but manual checking\
    \ is valuable too.\n\n## Runtime Errors\n\nEven if the code compiles, logic errors\
    \ may cause exceptions at runtime like:\n\n- NullPointerException\n- ArrayIndexOutOfBounds\n\
    - ExceptionInInitializerError\n\nThese indicate problems in program flow not caught\
    \ by the compiler. Use print statements, debugger, or exception handling to trace\
    \ variables and find the origin. Reproducing in smaller pieces helps isolate issues.\n\
    \n## Version Conflicts\n\nMultiple JDK versions, mixed JRE/JDK paths, or old patches\
    \ can conflict. Common signs are VersionFormatExceptions, UnsupportedClassVersions,\
    \ or NoClassDefFoundErrors. Uninstall legacy versions, update PATH/classpath,\
    \ and ensure all tools/code match the installed JDK. Incompatible library versions\
    \ also cause linkage errors.\n\n## Maven/Gradle Problems\n\nProblems in POM/build.gradle\
    \ files, missing repositories, or dependencies that won't resolve are typically\
    \ built tool configuration issues. Check syntax, network access, and settings\
    \ files, and try simplifying. Build logs often provide clues. Repositories may\
    \ need Maven Central declaration. Versions and conflicts between transitive dependencies\
    \ also occur.\n\n## Common Questions Database\n\nIf an error isn't immediately\
    \ clear, search online. Sites like Stack Overflow maintain searchable databases\
    \ of common problems and solutions crowdsourced from developers worldwide. Search\
    \ for the exact error message or describe your issue - chances are someone else\
    \ encountered it before. The answers often include sample code demonstrating fixes.\n\
    \n## Getting Live Help\n\nOnline documentation and forums are great, but sometimes,\
    \ human interaction is needed fast. Consider joining a Java help Discord server\
    \ for immediate assistance from other beginners/experts. Pose very specific questions\
    \ with code samples - vague descriptions waste people's time. Be polite, thankful\
    \ for any help received, and pay it forward by helping others when skills increase."
  mdcn: "## 企业级构建工具\n\n在 Maven 或 Gradle 出现之前很久，Ant 就作为 Java 最初的自动化构建系统。它使用名为 `build.xml`\
    \ 的 XML 配置文件来定义目标（任务）和依赖关系，其方式比 Maven 的约定更不标准化。Ant 轻量且灵活，但比现代选项更底层。由于广泛的工具链支持以及在资深\
    \ Java 开发者中的熟悉度，它对于较小的项目仍然有用。\n\n大型组织通常采用企业级构建服务器（如 Jenkins 或 Bamboo）进行持续集成，而不是严格的命令行工具。这些基于服务器的选项提供了版本控制集成、灵活的作业/流水线、电子邮件通知、仪表板以及跨团队更高级的构建自动化等功能。JBoss\
    \ Maven 插件、Gradle 企业版和专有构建系统则为大型公司提供了更多选择。\n\n## 其他构建工具\n\n其他选项包括：\n\n- SBT（Simple\
    \ Build Tool）- Scala 的等效工具，具有交互模式\n- Leiningen - Clojure 的构建系统，受 Maven 和 SBT 启发\n\
    - Buck - Facebook 的构建系统，旨在实现高度优化\n- Pants - Twitter 的构建工具，支持 Java/Scala 的增量编译\n\
    - Bazel - Google 的构建系统，显著改进了编译时间\n\n## 选择你的构建工具\n\n总而言之，Maven 仍然是 Java 项目的标准，因其广泛使用和良好的约定。Gradle\
    \ 以复杂性为代价提供了更丰富的定制性。对于较小的项目，Maven 或 Gradle 可能就足够了，具体取决于你对约定与灵活性的偏好。了解这些选项可以让你灵活地选择最适合的工具，或在需要时在工具之间迁移。\n\
    \n## 第一步：编写并运行你的第一个 Java 程序\n\n现在你已经配置好了 Java 开发工具包和构建工具，是时候通过创建你的第一个 Java 程序来验证一切是否正常工作了。编写\
    \ \"Hello World\" 是所有语言程序员的必经之路，它作为一个基准测试，用于确认工具已正确安装，然后再进行更复杂的编码。在本节中，我们将从头到尾指导你开发一个简单的问候程序。\n\
    \n## 创建源文件\n\n首先，我们需要创建包含程序的 Java 源代码文件。以 `.java` 结尾的文件定义了 Java 类，并被编译成带有 `.class`\
    \ 扩展名的字节码文件。在你的项目目录中，使用你首选的代码编辑器或 IDE 创建一个名为 `HelloWorld.java` 的新文本文件。保存它，使文件路径以类名和\
    \ `.java` 扩展名结尾，因为这个命名约定很重要。\n\n## 编写代码\n\n一个基本的 Java 应用程序至少需要一个类声明和一个 main 方法。在\
    \ `HelloWorld.java` 文件中，添加：\n\n```\npublic class HelloWorld {\n    public static\
    \ void main(String[] args) {\n    }\n}\n```\n\n这定义了一个名为 `HelloWorld` 的公共类，其中包含一个可以接受命令行参数的公共静态\
    \ void main 方法。main 方法被视为程序执行开始的入口点。\n\n## 打印输出\n\n要显示输出，我们使用 `System.out.println()`\
    \ 方法。在 main 方法体中添加语句 `System.out.println(\"Hello World!\")`：\n\n```\npublic class\
    \ HelloWorld {\n    public static void main(String[] args) {\n        System.out.println(\"\
    Hello World!\");\n    }\n}\n```\n\n这将在程序运行时将我们的问候消息打印到控制台。`out` PrintStream 对象代表标准输出，`println`\
    \ 打印字符串并换行。\n\n## 编译代码\n\n现在是时候使用 JDK 中包含的 Javac 编译器将我们的 Java 源代码编译成字节码了。打开命令提示符，导航到项目文件夹，然后输入：\n\
    \n```\njavac HelloWorld.java\n```\n\n如果没有错误，这将生成一个包含编译代码的 `HelloWorld.class` 文件。`.class`\
    \ 扩展名表示它是字节码，而不是人类可读的源代码。\n\n## 运行程序\n\n要执行我们的程序，使用 `java` 命令并指定完全限定的类名：\n\n```\n\
    java HelloWorld\n```\n\n如果一切顺利，你应该会在控制台上看到打印出的 \"Hello World!\"。这验证了代码按预期运行，并且环境已正确配置以编译和启动\
    \ Java 应用程序。\n\n## 使用 Maven 构建\n\n让我们使用 Maven 而不是原始命令来重新创建上述过程。在你的项目文件夹内，创建一个\
    \ `pom.xml` 文件，内容如下：\n\n```\n<project>\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <groupId>com.mycompany.app</groupId>\n    <artifactId>my-app</artifactId>\n\
    \    <version>1.0</version>\n    <properties>\n        <maven.compiler.source>17</maven.compiler.source>\n\
    \        <maven.compiler.target>17</maven.compiler.target>\n    </properties>\n\
    \    <dependencies>\n    </dependencies>\n</project>\n```\n\n然后分别运行 `mvn compile`\
    \ 和 `mvn exec:java -Dexec.mainClass=\"HelloWorld\"` 来编译和运行。Maven 在后台处理这些步骤。\n\n\
    ## 使用 Gradle 构建\n\n对于 Gradle，创建一个 `build.gradle` 文件：\n\n```\nplugins {\n    id\
    \ 'java'\n}\n\ngroup 'com.mycompany.app'\nversion '1.0'\nrepositories {\n    mavenCentral()\n\
    }\ndependencies {\n}\nmainClassName = \"HelloWorld\"\n```\n\n然后，运行 `gradle build`\
    \ 进行编译，运行 `gradle run` 执行 - Gradle 以更可定制的方式提供相同的功能。\n\n## 测试你的输出\n\n要确认 \"Hello\
    \ World!\" 按预期输出，你也可以使用 `java HelloWorld > output.txt` 将程序输出重定向到文件。然后，打开 `output.txt`\
    \ 应该只包含那个问候字符串。这验证了代码在你的系统上编译和运行正确，然后再继续下一步。\n\n## 迈出下一步\n\n恭喜，你现在已经创建了你的第一个可工作的\
    \ Java 应用程序！这涵盖了使用文本编辑器或 IDE 编写代码、使用 Javac 编译、使用 Java 执行以及使用 Maven 和 Gradle 自动化构建流程的过程。有了一个功能正常的开发环境，你现在可以开始练习并扩展你的\
    \ Java 编程知识了。在未来的课程中，我们将运用这里学到的知识，通过创建更高级的项目来应用它。\n\n## 常见问题与故障排除\n\n现在你已经成功编写并运行了一个简单的\
    \ Java 程序，是时候讨论一些初学者遇到的常见问题以及如何排除故障了。编程之旅没有一帆风顺的，但能够独立解决问题是一项重要技能。在本节中，我们将涵盖典型的错误、在哪里寻求帮助以及一般的调试策略。\n\
    \n## 类路径和 PATH 问题\n\n一个常见的错误原因是环境变量配置不当。类路径（Windows）或 PATH（Linux/Mac）需要包含 Java\
    \ 的 bin 目录，以便找到 `java` 和 `javac` 等命令。此处缺失或不正确的值可能导致 \"file not found\" 异常。同样，如果存在多个\
    \ JDK，路径必须指向所需的版本。请仔细检查安装文档。\n\n## 没有 main 方法错误\n\n第一个程序的常见错误是忘记在类中包含 `public\
    \ static void main(String[] args)` 方法。没有它，Java 将不知道从哪里开始执行，并会抱怨 \"no main method\"\
    。确保任何可运行的 Java 文件都定义了这个签名的入口点方法。访问修饰符和参数类型很重要。\n\n## 编译错误\n\n拼写错误、语法错误和缺少导入会导致\
    \ Javac 编译器失败，并显示 \"cannot find symbol\" 等消息。逐行检查错误描述以发现代码中的问题。格式/缩进错误也是语法问题。记住在修复后重新编译。IDE\
    \ 可以帮助查找错误，但手动检查也很有价值。\n\n## 运行时错误\n\n即使代码编译通过，逻辑错误也可能在运行时导致异常，例如：\n\n- NullPointerException\n\
    - ArrayIndexOutOfBounds\n- ExceptionInInitializerError\n\n这些表明程序流程中存在编译器未捕获的问题。使用打印语句、调试器或异常处理来跟踪变量并找到根源。在较小的片段中重现问题有助于隔离问题。\n\
    \n## 版本冲突\n\n多个 JDK 版本、混合的 JRE/JDK 路径或旧的补丁可能会冲突。常见迹象是 VersionFormatExceptions、UnsupportedClassVersions\
    \ 或 NoClassDefFoundErrors。卸载旧版本，更新 PATH/classpath，并确保所有工具/代码与已安装的 JDK 匹配。不兼容的库版本也会导致链接错误。\n\
    \n## Maven/Gradle 问题\n\nPOM/build.gradle 文件中的问题、缺失的仓库或无法解析的依赖项通常是构建工具配置问题。检查语法、网络访问和设置文件，并尝试简化。构建日志通常提供线索。仓库可能需要声明\
    \ Maven Central。版本和传递依赖项之间的冲突也可能发生。\n\n## 常见问题数据库\n\n如果错误不立即清楚，请在线搜索。像 Stack Overflow\
    \ 这样的网站维护着一个可搜索的数据库，其中包含来自全球开发者的众包常见问题和解决方案。搜索确切的错误消息或描述你的问题 - 很可能以前有人遇到过。答案通常包括演示修复的示例代码。\n\
    \n## 获取实时帮助\n\n在线文档和论坛很棒，但有时需要快速的人际互动。考虑加入一个 Java 帮助 Discord 服务器，以从其他初学者/专家那里获得即时帮助。提出非常具体的问题并附上代码示例\
    \ - 模糊的描述会浪费人们的时间。要有礼貌，感谢收到的任何帮助，并在技能提高时通过帮助他人来传递善意。"
