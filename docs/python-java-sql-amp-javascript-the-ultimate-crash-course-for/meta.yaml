    \ to retrieve and set the year, month, day, hours, minutes, and seconds, among\
    \ other components of a date. With the Date object, you can perform operations\
    \ like formatting dates, comparing dates, and performing calculations based on\
    \ dates.\n\n## Array Object\n\nCollections of elements are stored and managed\
    \ using the Array object. It offers several methods to change, add, and remove\
    \ elements from within an array by its location in the array. Arrays can hold\
    \ values of any data type, making them versatile for organizing and working with\
    \ data.\n\n## Accessing and using methods and properties of built-in objects\n\
    \nTo access the methods and properties of built-in objects, you use dot notation,\
    \ which involves referencing the object name followed by a dot (.) and the method\
    \ or property name.\n\n```\n// Example with Math object\nconst randomNumber =\
    \ Math.random(); // Generates a random number between 0 and 1\nconst roundedNumber\
    \ = Math.round(3.7); // Rounds the number to the nearest integer\n\n// Example\
    \ with Date object\nconst currentDate = new Date(); // Creates a new Date object\
    \ representing the current date and time\nconst currentYear = currentDate.getFullYear();\
    \ // Retrieves the current year\n\n// Example with Array object\nconst fruits\
    \ = ['apple', 'banana', 'orange'];\nconst fruitCount = fruits.length; // Retrieves\
    \ the number of elements in the array\n\n// Using methods and properties of built-in\
    \ objects\nconsole.log(randomNumber);\nconsole.log(roundedNumber);\nconsole.log(currentYear);\n\
    console.log(fruitCount);\n```\n\n## Output\n\n```\n0.6852906581451517\n4\n2023\n\
    3\n```\n\n## Exercises\n\n### 1. Create an object to represent a person\n\n- Define\
    \ an object called **person** with properties such as **name**, **age**, and **occupation**.\n\
    - Assign values to these properties to represent a specific person.\n- Access\
    \ and display the values of the object properties using dot notation.\n\n### 2.\
    \ Create an object to represent a car\n\n- Define an object called **car** with\
    \ properties such as **make**, **model**, and **year**.\n- Assign values to these\
    \ properties to represent a specific car.\n- Access and display the values of\
    \ the object properties using dot notation.\n\n### 3. Create an object to represent\
    \ a shopping cart\n\n- Define an object called **cart** with properties such as\
    \ **items**, **totalQuantity**, and **totalPrice**.\n- Initialize the **items**\
    \ property as an empty array.\n- Implement methods to add items to the cart, update\
    \ the quantity of items, and calculate the total price.\n- Test the methods by\
    \ adding items to the cart and displaying the updated quantity and total price.\n\
    \n### 4. Modify an object property\n\n- Take the previously defined **person**\
    \ object and change the value of the **occupation** property to a new occupation.\n\
    - Display the updated value of the **occupation** property.\n\n### 5. Invoke an\
    \ object method\n\n- Expand the **cart** object created earlier by adding a method\
    \ called **removeItem** that takes an item name as a parameter and removes it\
    \ from the **items** array.\n- Invoke the **removeItem** method to remove a specific\
    \ item from the cart and display the updated **items** array.\n\n### 6. Create\
    \ a new object method\n\n- Add a method called `getFullName` to the `person` object\
    \ that concatenates the `name` property with a greeting, such as \"Hello, \".\n\
    - Invoke the `getFullName` method and display the full name.\n\n## Chapter 7:\
    \ Closures\n\n### What is a Closure in JavaScript?\n\nIn JavaScript, closure is\
    \ a type of lexical scoping that enables variables from the outer scope of a function\
    \ to be preserved within the inner scope of that function. Lexical scoping uses\
    \ a variable's place in the source code to determine its scope.\nAll variables\
    \ that are contained within a function that you define are only accessible from\
    \ within the function. A scope error will occur if you try to access variables\
    \ inside a function from outside; this is when closure comes in handy.\nTo better\
    \ understand the concept of scope, consider the code example below that demonstrates\
    \ variables declared in both global and local scopes.\n\n```\nlet msg = 'Hi';\n\
    \nfunction Greeting() {\n    let people = \"World\";\n    console.log(msg + '\
    \ ' + people)\n}\n\nbuildGreeting();\n```\n\n### Output\n\n```\nHello World\n\
    ```\n\nThe example shows two scopes: the global scope containing the declaration\
    \ of the variable \"message\" and the local scope of the function containing the\
    \ declaration of the variable \"audience\". While the function can access the\
    \ global variable \"message\", the local variable \"audience\" is restricted to\
    \ the function's scope only. Attempting to access the function's local variable\
    \ will result in a runtime error.\nUnderstanding this concept is essential as\
    \ it can aid in identifying and preventing errors in code, and it also sheds light\
    \ on the functionality of lexical scoping. It's noteworthy that lexical scoping\
    \ permits an internal scope to reach a variable in its encompassing function.\
    \ To illustrate this, let's examine the code sample provided below.\nA function\
    \ stated at the global level is considered to be a nested scope. Every function\
    \ declared in this range has its own level of accessibility and cannot be accessed\
    \ from the global scope. Additionally, the scope of one function is not accessible\
    \ from other functions. The following code block will illustrate this concept.\n\
    \n```\nfunction buildGreeting() {\n    let message = \"Hello\";\n}\n\nfunction\
    \ greetUser() {\n    let audience = \"World\";\n    console.log(message)\n}\n\n\
    greetUser();\n```\n\n### Output\n\n```\nERROR!\nReferenceError: message is not\
    \ defined\n```\n\nIf the greetUser() function is called, an error message will\
    \ be displayed, causing the program to terminate. This design decision simplifies\
    \ the debugging process by making it easier to identify the root cause of the\
    \ error message.\n\n### JavaScript Closure\n\nIn JavaScript, a function has access\
    \ to its local scope but not the global scope. This means the greetUser() function\
    \ cannot be accessed from this global scope. However, it's worth noting that the\
    \ greetUser() function can be accessed using the buildGreeting() function.\nTo\
    \ make the greetUser() method accessible globally, we should return the greetUser()\
    \ method from the buildGreeting() method and then assign the buildGreeting() method\
    \ to a variable and invoke that variable like a method:\n\n```\nfunction buildGreeting(message)\
    \ {\n    return function(audience){\n        return message + ' ' + audience;\n\
    \    }\n}\n\nlet greeting1 = buildGreeting('Hi');\nlet greeting2 = buildGreeting('Hello');\n\
    \nconsole.log(greeting1('User'));\nconsole.log(greeting2('World'));\n```\n\n###\
    \ Output\n\n```\nHi User\nHello World\n```\n\nThis code example involves the creation\
    \ of a function named buildGreeting(). The function returns another function that\
    \ produces a string by combining two variables. These variables are passed in\
    \ twice within the code. The first instance occurs when assigning the method to\
    \ a variable, as demonstrated below.\n\n```\nlet greeting1 = buildGreeting('Hi');\n\
    ```\n\nFollowing the assignment, the variable is invoked as a function with a\
    \ specific value being passed in as an argument for your inner function. This\
    \ function call is executed within a console log statement, which enables the\
    \ user to view the string generated by the inner function.\n\n### JavaScript Closures\
    \ and Loops\n\nIn JavaScript, implementing closure can be challenging when working\
    \ with loops, as it can result in unintended consequences. This is demonstrated\
    \ by the following function, which leverages a setTimeout function within a loop.\n\
    \n```\nfor(var id=0; id<3; id++){\n    setTimeout(function(){\n        console.log('seconds:\
    \ ' + id);\n    }, id*1000)\n}\n```\n\n### Output\n\n```\nseconds: 3\nseconds:\
    \ 3\nseconds: 3\n```\n\nThe code above utilizes a loop that executes three times.\
    \ In each iteration, the setTimeout function waits for a designated moment to\
    \ pass before executing the code within its scope. Based on the loop's current\
    \ index value, one might anticipate the code to execute three times.\nNevertheless,\
    \ the loops iterate and modify the id variable accordingly. The code executes\
    \ from within the setTimeout function, which means that the id variable has already\
    \ been incremented to the maximum value. Due to the shared scope of all 3 iterations\
    \ of the loop, the setTimeout function generates a closure that each loop shares.\n\
    The implication of this fact is that the output displayed in the console log may\
    \ not be the anticipated message. In reality, the log reflects the ultimate id\
    \ value.\n\n### ES6 let Keyword\n\nTo resolve this problem, the JavaScript ES6\
    \ let keyword can be used to make sure that the code within this block runs as\
    \ intended. With the let keyword, a new scope is created for every loop iteration,\
    \ allowing the index value to be declared within the scope of the if block. The\
    \ example below demonstrates how to use the let keyword to achieve this goal.\n\
    \n```\nfor(let id=0; id<3; id++){\n    setTimeout(function(){\n        console.log('seconds:\
    \ ' + id);\n    }, id*1000)\n}\n```\n\n### Output\n\n```\nseconds: 0\nseconds:\
    \ 1\nseconds: 2\n```\n\nThe provided code works as intended, with the setTimeout\
    \ function executing during each iteration of the loop. This can be seen in the\
    \ output."
  mdcn: "一个特定的时间点由 Date 对象表示。它提供了检索和设置年、月、日、小时、分钟和秒等日期组成部分的方法。使用 Date 对象，你可以执行诸如格式化日期、比较日期以及基于日期进行计算等操作。\n\
    \n## 数组对象\n\n元素的集合使用数组对象进行存储和管理。它提供了多种方法，可以根据元素在数组中的位置来更改、添加和删除数组中的元素。数组可以保存任何数据类型的值，使其在组织和处理数据时非常灵活。\n\
    \n## 访问和使用内置对象的方法和属性\n\n要访问内置对象的方法和属性，你需要使用点表示法，即引用对象名称，后跟一个点（.）和方法或属性名称。\n\n\
    ```\n// 使用 Math 对象的示例\nconst randomNumber = Math.random(); // 生成一个介于 0 和 1 之间的随机数\n\
    const roundedNumber = Math.round(3.7); // 将数字四舍五入到最接近的整数\n\n// 使用 Date 对象的示例\n\
    const currentDate = new Date(); // 创建一个表示当前日期和时间的新 Date 对象\nconst currentYear\
    \ = currentDate.getFullYear(); // 获取当前年份\n\n// 使用 Array 对象的示例\nconst fruits =\
    \ ['apple', 'banana', 'orange'];\nconst fruitCount = fruits.length; // 获取数组中的元素数量\n\
    \n// 使用内置对象的方法和属性\nconsole.log(randomNumber);\nconsole.log(roundedNumber);\nconsole.log(currentYear);\n\
    console.log(fruitCount);\n```\n\n## 输出\n\n```\n0.6852906581451517\n4\n2023\n3\n\
    ```\n\n## 练习\n\n### 1. 创建一个表示人的对象\n\n- 定义一个名为 **person** 的对象，包含 **name**、**age**\
    \ 和 **occupation** 等属性。\n- 为这些属性赋值以表示一个特定的人。\n- 使用点表示法访问并显示对象属性的值。\n\n### 2. 创建一个表示汽车的对象\n\
    \n- 定义一个名为 **car** 的对象，包含 **make**、**model** 和 **year** 等属性。\n- 为这些属性赋值以表示一辆特定的汽车。\n\
    - 使用点表示法访问并显示对象属性的值。\n\n### 3. 创建一个表示购物车的对象\n\n- 定义一个名为 **cart** 的对象，包含 **items**、**totalQuantity**\
    \ 和 **totalPrice** 等属性。\n- 将 **items** 属性初始化为空数组。\n- 实现向购物车添加商品、更新商品数量以及计算总价的方法。\n\
    - 通过向购物车添加商品并显示更新后的数量和总价来测试这些方法。\n\n### 4. 修改对象属性\n\n- 使用之前定义的 **person** 对象，将\
    \ **occupation** 属性的值更改为新的职业。\n- 显示更新后的 **occupation** 属性值。\n\n### 5. 调用对象方法\n\
    \n- 扩展之前创建的 **cart** 对象，添加一个名为 **removeItem** 的方法，该方法接受一个商品名称作为参数，并将其从 **items**\
    \ 数组中移除。\n- 调用 **removeItem** 方法从购物车中移除一个特定商品，并显示更新后的 **items** 数组。\n\n### 6.\
    \ 创建新的对象方法\n\n- 向 `person` 对象添加一个名为 `getFullName` 的方法，该方法将 `name` 属性与问候语（如 \"\
    Hello, \"）连接起来。\n- 调用 `getFullName` 方法并显示全名。\n\n## 第7章：闭包\n\n### JavaScript 中的闭包是什么？\n\
    \n在 JavaScript 中，闭包是一种词法作用域类型，它允许函数外部作用域中的变量在该函数的内部作用域中被保留。词法作用域使用变量在源代码中的位置来确定其作用域。\n\
    你定义的函数中包含的所有变量只能从函数内部访问。如果你尝试从函数外部访问函数内部的变量，将会发生作用域错误；这时闭包就派上用场了。\n为了更好地理解作用域的概念，请看下面的代码示例，它演示了在全局作用域和局部作用域中声明的变量。\n\
    \n```\nlet msg = 'Hi';\n\nfunction Greeting() {\n    let people = \"World\";\n\
    \    console.log(msg + ' ' + people)\n}\n\nbuildGreeting();\n```\n\n### 输出\n\n\
    ```\nHello World\n```\n\n该示例展示了两个作用域：包含变量 \"message\" 声明的全局作用域，以及包含变量 \"audience\"\
    \ 声明的函数局部作用域。虽然函数可以访问全局变量 \"message\"，但局部变量 \"audience\" 仅限于函数的作用域内。尝试访问函数的局部变量将导致运行时错误。\n\
    理解这个概念至关重要，因为它有助于识别和防止代码中的错误，并且它也阐明了词法作用域的功能。值得注意的是，词法作用域允许内部作用域访问其包含函数中的变量。为了说明这一点，让我们看看下面提供的代码示例。\n\
    在全局级别声明的函数被认为是一个嵌套作用域。在此范围内声明的每个函数都有自己的可访问级别，无法从全局作用域访问。此外，一个函数的作用域无法从其他函数访问。以下代码块将说明这个概念。\n\
    \n```\nfunction buildGreeting() {\n    let message = \"Hello\";\n}\n\nfunction\
    \ greetUser() {\n    let audience = \"World\";\n    console.log(message)\n}\n\n\
    greetUser();\n```\n\n### 输出\n\n```\nERROR!\nReferenceError: message is not defined\n\
    ```\n\n如果调用 greetUser() 函数，将显示错误消息，导致程序终止。这个设计决策通过使识别错误消息的根本原因变得更容易，从而简化了调试过程。\n\
    \n### JavaScript 闭包\n\n在 JavaScript 中，函数可以访问其局部作用域，但不能访问全局作用域。这意味着 greetUser()\
    \ 函数无法从这个全局作用域访问。然而，值得注意的是，greetUser() 函数可以使用 buildGreeting() 函数来访问。\n为了使 greetUser()\
    \ 方法可以全局访问，我们应该从 buildGreeting() 方法返回 greetUser() 方法，然后将 buildGreeting() 方法赋值给一个变量，并像调用方法一样调用该变量：\n\
    \n```\nfunction buildGreeting(message) {\n    return function(audience){\n   \
    \     return message + ' ' + audience;\n    }\n}\n\nlet greeting1 = buildGreeting('Hi');\n\
    let greeting2 = buildGreeting('Hello');\n\nconsole.log(greeting1('User'));\nconsole.log(greeting2('World'));\n\
    ```\n\n### 输出\n\n```\nHi User\nHello World\n```\n\n这个代码示例涉及创建一个名为 buildGreeting()\
    \ 的函数。该函数返回另一个函数，该函数通过组合两个变量来生成一个字符串。这些变量在代码中被传递了两次。第一次发生在将方法赋值给变量时，如下所示。\n\n\
    ```\nlet greeting1 = buildGreeting('Hi');\n```\n\n赋值之后，该变量作为函数被调用，一个特定的值作为参数传递给你的内部函数。这个函数调用在\
    \ console log 语句中执行，使用户能够查看内部函数生成的字符串。\n\n### JavaScript 闭包与循环\n\n在 JavaScript\
    \ 中，当处理循环时，实现闭包可能具有挑战性，因为它可能导致意外的后果。以下函数演示了这一点，该函数在循环中使用了 setTimeout 函数。\n\n```\n\
    for(var id=0; id<3; id++){\n    setTimeout(function(){\n        console.log('seconds:\
    \ ' + id);\n    }, id*1000)\n}\n```\n\n### 输出\n\n```\nseconds: 3\nseconds: 3\n\
    seconds: 3\n```\n\n上面的代码使用了一个执行三次的循环。在每次迭代中，setTimeout 函数等待指定的时间过去，然后执行其作用域内的代码。根据循环的当前索引值，人们可能期望代码执行三次。\n\
    然而，循环会迭代并相应地修改 id 变量。代码在 setTimeout 函数内部执行，这意味着 id 变量已经递增到最大值。由于循环的所有 3 次迭代共享相同的作用域，setTimeout\
    \ 函数生成了一个每个循环共享的闭包。\n这个事实的含义是，控制台日志中显示的输出可能不是预期的消息。实际上，日志反映的是最终的 id 值。\n\n###\
    \ ES6 let 关键字\n\n为了解决这个问题，可以使用 JavaScript ES6 的 let 关键字来确保此块中的代码按预期运行。使用 let 关键字，为每次循环迭代创建一个新的作用域，允许在\
    \ if 块的作用域内声明索引值。下面的示例演示了如何使用 let 关键字来实现这个目标。\n\n```\nfor(let id=0; id<3; id++){\n\
    \    setTimeout(function(){\n        console.log('seconds: ' + id);\n    }, id*1000)\n\
    }\n```\n\n### 输出\n\n```\nseconds: 0\nseconds: 1\nseconds: 2\n```\n\n提供的代码按预期工作，setTimeout\
    \ 函数在循环的每次迭代期间执行。这可以从输出中看出。"
