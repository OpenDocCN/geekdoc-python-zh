  md: 'In Python programming, an object is an entity that has a state and behavior.
    Everything within a class can be considered an object. A variable created within
    a class, for example, can be used as an object. Objects are frequently used by
    programmers who are unaware of their existence.


    What exactly is an object?


    Every object is made up of a state. A state usually reflects the properties of
    an object.


    Every object has a behavior. The behavior of an object changes depending on the
    method in which it is used.


    All objects have an identity. Objects use identity to interact with one another.


    Assume there is a Cat class that describes different cat features and behavior.
