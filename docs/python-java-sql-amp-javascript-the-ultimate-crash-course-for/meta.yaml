- md: "## Tree Data Structure\n\nTree data structures are not directly supported in\
    \ SQL as they are in programming languages, but hierarchical data can be represented\
    \ and managed in SQL databases. A tree structure is typically represented in SQL\
    \ using a table with a self-referencing foreign key. This is often done in the\
    \ context of representing hierarchies or parent-child relationships.\n\n## Example\n\
    \nConsider an organization where each employee has a manager, creating a tree-like\
    \ hierarchy. Here's how you can represent this in SQL:\n\n```sql\nCREATE TABLE\
    \ Employee(\n    EmployeeID INT PRIMARY KEY,\n    Name VARCHAR(100),\n    ManagerID\
    \ INT,\n    FOREIGN KEY (ManagerID) REFERENCES Employee(EmployeeID)\n);\n```\n\
    \nIn this table, EmployeeID is the primary key for each employee, Name is the\
    \ employee's name, and ManagerID is a foreign key that refers to the EmployeeID\
    \ of the employee's manager. For the top-level employee (like a CEO), ManagerID\
    \ can be null.\n\n## Inserting Data:\n\n```sql\nINSERT INTO Employee (EmployeeID,\
    \ Name, ManagerID) VALUES (1, 'CEO', NULL);\nINSERT INTO Employee (EmployeeID,\
    \ Name, ManagerID) VALUES (2, 'Manager A', 1);\nINSERT INTO Employee (EmployeeID,\
    \ Name, ManagerID) VALUES (3, 'Manager B', 1);\nINSERT INTO Employee (EmployeeID,\
    \ Name, ManagerID) VALUES (4, 'Employee 1', 2);\nINSERT INTO Employee (EmployeeID,\
    \ Name, ManagerID) VALUES (5, 'Employee 2', 2);\n```\n\nThis creates a hierarchy\
    \ where 'Manager A' and 'Manager B' report to 'CEO', and 'Employee 1' and 'Employee\
    \ 2' report to 'Manager A'.\n\n## Querying the Tree:\n\nTo retrieve the hierarchy,\
    \ recursive queries are used, especially in systems that support Common Table\
    \ Expressions (CTEs) like SQL Server, PostgreSQL, and MySQL 8.0+.\n\nExample of\
    \ a Recursive Query:\n\n```sql\nWITH RECURSIVE EmployeeCTE AS(\n    SELECT EmployeeID,\
    \ Name, ManagerID\n    FROM Employee\n    WHERE ManagerID IS NULL\n    UNION ALL\n\
    \    SELECT e.EmployeeID, e.Name, e.ManagerID\n    FROM Employee e\n    INNER\
    \ JOIN EmployeeCTE ecte ON e.ManagerID = ecte.EmployeeID\n)\nSELECT * FROM EmployeeCTE;\n\
    ```\n\n## Output:\n\n```\n1|CEO|\n2|Manager A|1\n3|Manager B|1\n4|Employee 1|2\n\
    5|Employee 2|2\n```\n\nThis query will recursively traverse the tree, starting\
    \ from the top-level employee (CEO) and going down through all levels of managers\
    \ and employees.\n\n## Linked List Data Structure\n\nA linked list is an elementary\
    \ data structure in computer science used in many programming languages. It is\
    \ made up of a series of nodes. Each node has data and a reference to the next\
    \ node in the chain.\nIn SQL, which is designed primarily for managing and querying\
    \ data in relational databases, there isn't a direct, native implementation of\
    \ linked lists as there is in programming languages like Python, Java, or C++.\
    \ However, you can simulate a linked list in SQL by using a table structure where\
    \ each row references another row in the same table, creating a chain of links.\n\
    Let's see an example.\n\n## Creating the Linked List Table:\n\n```sql\nCREATE\
    \ TABLE LinkedList(\n    NodeID INT PRIMARY KEY,\n    Data VARCHAR(255),\n   \
    \ NextNodeID INT,\n    FOREIGN KEY (NextNodeID) REFERENCES LinkedList(NodeID)\n\
    );\n```\n\nIn this table, NodeID is a unique identifier for each node, Data is\
    \ the value stored in the node, and NextNodeID is a reference to the next node\
    \ in the list. The foreign key constraint ensures integrity by linking NextNodeID\
    \ to another NodeID in the same table.\n\n## Inserting Data:\n\n```sql\nINSERT\
    \ INTO LinkedList (NodeID, Data, NextNodeID) VALUES (1, 'Node 1 Data', 2);\nINSERT\
    \ INTO LinkedList (NodeID, Data, NextNodeID) VALUES (2, 'Node 2 Data', 3);\nINSERT\
    \ INTO LinkedList (NodeID, Data, NextNodeID) VALUES (3, 'Node 3 Data', NULL);\n\
    ```\n\n```sql\nSELECT * FROM LinkedList;\n```\n\nWe insert nodes into the list,\
    \ specifying the NextNodeID to create the links. The last node's NextNodeID is\
    \ set to NULL, indicating the end of the list. The output will be the following:\n\
    \n```\n1|Node 1 Data|2\n2|Node 2 Data|3\n3|Node 3 Data|\n```\n\n## Traversing\
    \ the Linked List:\n\nTraversing a linked list in SQL can be complex, especially\
    \ if the list is long. You may need to use recursive queries or stored procedures,\
    \ depending on your SQL database's capabilities.\n\n```sql\nWITH RECURSIVE LinkedListCTE\
    \ AS (\n    SELECT NodeID, Data, NextNodeID\n    FROM LinkedList\n    WHERE NodeID\
    \ = 2 -- Assuming we start from the 2nd node\n    UNION ALL\n    SELECT ll.NodeID,\
    \ ll.Data, ll.NextNodeID\n    FROM LinkedList ll\n    INNER JOIN LinkedListCTE\
    \ cte ON ll.NodeID = cte.NextNodeID\n)\nSELECT * FROM LinkedListCTE;\n```\n\n\
    This recursive query will traverse the linked list starting from NodeID = 2.\n\
    The output will be:\n\n```\n2|Node 2 Data|3\n3|Node 3 Data|\n```\n\n## Chapter\
    \ 4: Working with Tables\n\nIn the previous chapters we have created tables with\
    \ the command CREATE TABLE.\nIn this chapter we will explore more in detail the\
    \ different options SQL offers for handling tables. This includes altering table\
    \ structures, manipulating data, and employing advanced techniques to maximize\
    \ the potential of our databases.\n\n## Creating Tables\n\nCreating tables in\
    \ SQL is a fundamental task for structuring and storing data in a database. The\
    \ process involves defining the table and its columns, specifying data types for\
    \ each column, and setting any necessary constraints like primary keys. Here's\
    \ a step-by-step guide on how to create a table using SQL:\n\n1.  Choose a table\
    \ name: select a meaningful name for your table that reflects the data it will\
    \ store.\n2.  Define columns and data types: for each column in the table, you\
    \ need to specify a name and a data type. The data type specifies what kind of\
    \ data the column can store (e.g., integer, text, date, etc.).\n3.  Set constraints\
    \ (optional): constraints are rules that table columns must follow to ensure data\
    \ integrity. Common constraints include:\n    a. PRIMARY KEY: Uniquely identifies\
    \ each record in the table.\n    b. FOREIGN KEY: Links data between two tables.\n\
    \    c. NOT NULL: Prevents a column from containing a NULL value.\n    d. UNIQUE:\
    \ Prevents a column from having two identical values.\n    e. CHECK: Verifies\
    \ that the value in a particular column meets a certain criterion.\n    f. DEFAULT:\
    \ Assigns a default value to a column when no value is given.\n4.  Create the\
    \ table using the CREATE TABLE statement.\n\n## Example\n\nLet's say you want\
    \ to create a simple table named Customers, which stores customers' information\
    \ with columns for customer ID, name, and email:\n\n```sql\nCREATE TABLE Customers\
    \ (\n    CustomerID INT PRIMARY KEY,\n    Name VARCHAR(100),\n    Email VARCHAR(100)\
    \ NOT NULL\n);\n```\n\nIn this example:\n\n-   Customers is the name of the table.\n\
    -   CustomerID, Name, and Email are column names.\n-   INT and VARCHAR(100) are\
    \ data types. INT is for integers, and VARCHAR(100) is for variable-length strings\
    \ up to 100 characters.\n-   PRIMARY KEY is a constraint on CustomerID to ensure\
    \ each customer has a unique ID.\n-   NOT NULL on the Email column ensures that\
    \ every customer must have an email address.\n\n## Output\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_297_0.png)\n\
    \nIt's crucial to plan your table structure carefully, considering how the data\
    \ will be used and the relationships between different tables.\n\n## Altering\
    \ Tables\n\nAltering tables in SQL is a common task that involves making changes\
    \ to the structure of an existing table. This could include adding new columns,\
    \ modifying existing columns, deleting columns, or changing constraints. Let's\
    \ use the Customers table from the previous example to illustrate various ALTER\
    \ TABLE operations.\n\n## Adding a New Column:\n\nTo add a new column, for example,\
    \ a column for storing the customer's phone number:\n\n```sql\nALTER TABLE Customers\n\
    ADD PhoneNumber VARCHAR(15);\n```\n\nThis command adds a new column named PhoneNumber\
    \ with a data type of VARCHAR(15).\n\n## Modifying an Existing Column:\n\nIf you\
    \ need to change a column's data type or size, use the MODIFY or ALTER COLUMN\
    \ command (syntax can vary between SQL databases).\n\nFor instance, extending\
    \ the Email column to allow 150 characters:\n\n```sql\nALTER TABLE Customers\n\
    MODIFY Email VARCHAR(150) NOT NULL;\n```\n\n## Deleting a Column:\n\nTo remove\
    \ a column, use the DROP COLUMN command. For example, removing the PhoneNumber\
    \ column:\n\n```sql\nALTER TABLE Customers\nDROP COLUMN PhoneNumber;\n```\n\n\
    ## Adding a Constraint:\n\nYou can also add constraints. For example, adding a\
    \ unique constraint to the Email column to ensure all email addresses are unique:\n\
    \n```sql\nALTER TABLE Customers\nADD UNIQUE (Email);\n```\n\nAltering a table\
    \ can have significant implications on data integrity, especially when modifying\
    \ or deleting columns. Be cautious with tables that have relationships with other\
    \ tables. Changes can affect foreign keys and related data.\n\nAltering tables\
    \ is a powerful feature in SQL that allows you to evolve your database schema\
    \ as requirements change. However, it should be used judiciously to maintain data\
    \ integrity and system stability.\n\n## Inserting Data\n\nIn SQL you can enter\
    \ data into a database with the help of the INSERT INTO command. The table name\
    \ in this context refers to the table title into which you want to put data. The\
    \ names of the different columns included in the table are given in the form of\
    \ their column numbers, such as column 1, column 2, column 3, etc. The values\
    \ value1, value2, and value3 relate to the values you want to put into the respective\
    \ columns, indicating them. Those values may be found in the respective columns.\n\
    \nSyntax:\n```sql\nINSERT INTO table_name (column1, column2, column3, ...)\nVALUES\
    \ (value1, value2, value3, ...);\n```"
  mdcn: "## 树数据结构\n\nSQL 并不像编程语言那样直接支持树数据结构，但可以在 SQL 数据库中表示和管理层次化数据。树结构在 SQL 中通常通过一个具有自引用外键的表来表示。这通常用于表示层次结构或父子关系。\n\
    \n## 示例\n\n考虑一个组织，其中每位员工都有一位经理，从而形成一个树状的层次结构。以下是如何在 SQL 中表示这一点：\n\n```sql\nCREATE\
    \ TABLE Employee(\n    EmployeeID INT PRIMARY KEY,\n    Name VARCHAR(100),\n \
    \   ManagerID INT,\n    FOREIGN KEY (ManagerID) REFERENCES Employee(EmployeeID)\n\
    );\n```\n\n在此表中，`EmployeeID` 是每位员工的主键，`Name` 是员工姓名，`ManagerID` 是一个外键，引用该员工经理的\
    \ `EmployeeID`。对于顶层员工（如 CEO），`ManagerID` 可以为 NULL。\n\n## 插入数据：\n\n```sql\nINSERT\
    \ INTO Employee (EmployeeID, Name, ManagerID) VALUES (1, 'CEO', NULL);\nINSERT\
    \ INTO Employee (EmployeeID, Name, ManagerID) VALUES (2, 'Manager A', 1);\nINSERT\
    \ INTO Employee (EmployeeID, Name, ManagerID) VALUES (3, 'Manager B', 1);\nINSERT\
    \ INTO Employee (EmployeeID, Name, ManagerID) VALUES (4, 'Employee 1', 2);\nINSERT\
    \ INTO Employee (EmployeeID, Name, ManagerID) VALUES (5, 'Employee 2', 2);\n```\n\
    \n这创建了一个层次结构，其中 'Manager A' 和 'Manager B' 向 'CEO' 汇报，而 'Employee 1' 和 'Employee\
    \ 2' 向 'Manager A' 汇报。\n\n## 查询树：\n\n要检索层次结构，需要使用递归查询，尤其是在支持公共表表达式（CTEs）的系统中，如\
    \ SQL Server、PostgreSQL 和 MySQL 8.0+。\n\n递归查询示例：\n\n```sql\nWITH RECURSIVE EmployeeCTE\
    \ AS(\n    SELECT EmployeeID, Name, ManagerID\n    FROM Employee\n    WHERE ManagerID\
    \ IS NULL\n    UNION ALL\n    SELECT e.EmployeeID, e.Name, e.ManagerID\n    FROM\
    \ Employee e\n    INNER JOIN EmployeeCTE ecte ON e.ManagerID = ecte.EmployeeID\n\
    )\nSELECT * FROM EmployeeCTE;\n```\n\n## 输出：\n\n```\n1|CEO|\n2|Manager A|1\n3|Manager\
    \ B|1\n4|Employee 1|2\n5|Employee 2|2\n```\n\n此查询将递归遍历树，从顶层员工（CEO）开始，向下遍历所有级别的经理和员工。\n\
    \n## 链表数据结构\n\n链表是计算机科学中的一种基本数据结构，在许多编程语言中都有使用。它由一系列节点组成。每个节点包含数据和对链中下一个节点的引用。\n\
    在 SQL 中，其主要设计用于管理和查询关系数据库中的数据，因此没有像 Python、Java 或 C++ 等编程语言中那样的直接、原生的链表实现。但是，你可以通过使用表结构来模拟链表，其中每一行引用同一表中的另一行，从而创建一个链接链。\n\
    让我们看一个例子。\n\n## 创建链表表：\n\n```sql\nCREATE TABLE LinkedList(\n    NodeID INT PRIMARY\
    \ KEY,\n    Data VARCHAR(255),\n    NextNodeID INT,\n    FOREIGN KEY (NextNodeID)\
    \ REFERENCES LinkedList(NodeID)\n);\n```\n\n在此表中，`NodeID` 是每个节点的唯一标识符，`Data` 是存储在节点中的值，`NextNodeID`\
    \ 是对列表中下一个节点的引用。外键约束通过将 `NextNodeID` 链接到同一表中的另一个 `NodeID` 来确保完整性。\n\n## 插入数据：\n\
    \n```sql\nINSERT INTO LinkedList (NodeID, Data, NextNodeID) VALUES (1, 'Node 1\
    \ Data', 2);\nINSERT INTO LinkedList (NodeID, Data, NextNodeID) VALUES (2, 'Node\
    \ 2 Data', 3);\nINSERT INTO LinkedList (NodeID, Data, NextNodeID) VALUES (3, 'Node\
    \ 3 Data', NULL);\n```\n\n```sql\nSELECT * FROM LinkedList;\n```\n\n我们将节点插入列表，指定\
    \ `NextNodeID` 以创建链接。最后一个节点的 `NextNodeID` 设置为 NULL，表示列表的结束。输出将如下所示：\n\n```\n1|Node\
    \ 1 Data|2\n2|Node 2 Data|3\n3|Node 3 Data|\n```\n\n## 遍历链表：\n\n在 SQL 中遍历链表可能很复杂，尤其是当列表很长时。你可能需要使用递归查询或存储过程，具体取决于你的\
    \ SQL 数据库的功能。\n\n```sql\nWITH RECURSIVE LinkedListCTE AS (\n    SELECT NodeID,\
    \ Data, NextNodeID\n    FROM LinkedList\n    WHERE NodeID = 2 -- 假设我们从第2个节点开始\n\
    \    UNION ALL\n    SELECT ll.NodeID, ll.Data, ll.NextNodeID\n    FROM LinkedList\
    \ ll\n    INNER JOIN LinkedListCTE cte ON ll.NodeID = cte.NextNodeID\n)\nSELECT\
    \ * FROM LinkedListCTE;\n```\n\n此递归查询将从 `NodeID = 2` 开始遍历链表。\n输出将是：\n\n```\n2|Node\
    \ 2 Data|3\n3|Node 3 Data|\n```\n\n## 第4章：使用表\n\n在前面的章节中，我们已经使用 `CREATE TABLE`\
    \ 命令创建了表。\n在本章中，我们将更详细地探讨 SQL 提供的用于处理表的不同选项。这包括修改表结构、操作数据以及采用高级技术来最大化我们数据库的潜力。\n\
    \n## 创建表\n\n在 SQL 中创建表是构建和存储数据库中数据的基本任务。该过程涉及定义表及其列、为每列指定数据类型，以及设置任何必要的约束（如主键）。以下是使用\
    \ SQL 创建表的分步指南：\n\n1.  选择表名：为你的表选择一个有意义的名称，反映它将存储的数据。\n2.  定义列和数据类型：对于表中的每一列，你需要指定一个名称和一个数据类型。数据类型指定该列可以存储哪种数据（例如，整数、文本、日期等）。\n\
    3.  设置约束（可选）：约束是表列必须遵循的规则，以确保数据完整性。常见的约束包括：\n    a. `PRIMARY KEY`：唯一标识表中的每条记录。\n\
    \    b. `FOREIGN KEY`：链接两个表之间的数据。\n    c. `NOT NULL`：防止列包含 NULL 值。\n    d. `UNIQUE`：防止列具有两个相同的值。\n\
    \    e. `CHECK`：验证特定列中的值是否满足某个条件。\n    f. `DEFAULT`：在未给定值时为列分配默认值。\n4.  使用 `CREATE\
    \ TABLE` 语句创建表。\n\n## 示例\n\n假设你想创建一个名为 `Customers` 的简单表，该表存储客户信息，包含客户 ID、姓名和电子邮件列：\n\
    \n```sql\nCREATE TABLE Customers (\n    CustomerID INT PRIMARY KEY,\n    Name\
    \ VARCHAR(100),\n    Email VARCHAR(100) NOT NULL\n);\n```\n\n在此示例中：\n\n-   `Customers`\
    \ 是表名。\n-   `CustomerID`、`Name` 和 `Email` 是列名。\n-   `INT` 和 `VARCHAR(100)` 是数据类型。`INT`\
    \ 用于整数，`VARCHAR(100)` 用于最多 100 个字符的可变长度字符串。\n-   `PRIMARY KEY` 是 `CustomerID`\
    \ 上的约束，确保每个客户都有一个唯一的 ID。\n-   `Email` 列上的 `NOT NULL` 确保每个客户都必须有一个电子邮件地址。\n\n##\
    \ 输出\n\n![](img/e3d5a68d433d3f77bc2dfd5968a9ebb8_297_0.png)\n\n仔细规划表结构至关重要，需要考虑数据将如何使用以及不同表之间的关系。\n\
    \n## 修改表\n\n在 SQL 中修改表是一项常见任务，涉及对现有表的结构进行更改。这可能包括添加新列、修改现有列、删除列或更改约束。让我们使用前面示例中的\
    \ `Customers` 表来说明各种 `ALTER TABLE` 操作。\n\n## 添加新列：\n\n要添加新列，例如，一个用于存储客户电话号码的列：\n\
    \n```sql\nALTER TABLE Customers\nADD PhoneNumber VARCHAR(15);\n```\n\n此命令添加一个名为\
    \ `PhoneNumber` 的新列，数据类型为 `VARCHAR(15)`。\n\n## 修改现有列：\n\n如果需要更改列的数据类型或大小，请使用 `MODIFY`\
    \ 或 `ALTER COLUMN` 命令（语法在不同 SQL 数据库之间可能有所不同）。\n\n例如，将 `Email` 列扩展为允许 150 个字符：\n\
    \n```sql\nALTER TABLE Customers\nMODIFY Email VARCHAR(150) NOT NULL;\n```\n\n\
    ## 删除列：\n\n要删除列，请使用 `DROP COLUMN` 命令。例如，删除 `PhoneNumber` 列：\n\n```sql\nALTER TABLE\
    \ Customers\nDROP COLUMN PhoneNumber;\n```\n\n## 添加约束：\n\n你也可以添加约束。例如，向 `Email`\
    \ 列添加唯一约束以确保所有电子邮件地址都是唯一的：\n\n```sql\nALTER TABLE Customers\nADD UNIQUE (Email);\n\
    ```\n\n修改表可能对数据完整性产生重大影响，尤其是在修改或删除列时。对于与其他表有关系的表要谨慎操作。更改可能会影响外键和相关数据。\n\n修改表是\
    \ SQL 中的一个强大功能，允许你随着需求的变化来演进数据库模式。但是，应谨慎使用，以维护数据完整性和系统稳定性。\n\n## 插入数据\n\n在 SQL\
    \ 中，你可以借助 `INSERT INTO` 命令将数据输入数据库。此上下文中的表名指的是你要将数据放入的表标题。表中包含的不同列的名称以列号的形式给出，如第\
    \ 1 列、第 2 列、第 3 列等。值 `value1`、`value2` 和 `value3` 对应于你要放入相应列的值，表示它们。这些值可以在相应的列中找到。\n\
    \n语法：\n```sql\nINSERT INTO table_name (column1, column2, column3, ...)\nVALUES\
    \ (value1, value2, value3, ...);\n```"
