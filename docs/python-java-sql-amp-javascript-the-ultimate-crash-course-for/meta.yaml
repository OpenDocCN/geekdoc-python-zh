  md: '# Introduction


    Computers can be categorized as machines with no inherent intelligence, but they
    have drastically helped to advance our world in countless ways. With computers,
    our world runs much more efficiently and error-free—we tell them what to do, and
    they deliver flawless results. Computer programmers are the people who communicate
    with computers in what are called programming languages, and they have been doing
    so for many years. These programming languages vary based on their working systems,
    just as human language varies based on region.

    One of these computer programming languages is called Python, and in the computer
    realm, this is a quite popular (and easy to learn) high-level programming language.
    This book will intuitively teach you Python. Even if you have no experience with
    any programming language, you will be able to grasp the basics of Python and put
    them to use.


    # What Is Python?


    Python is a high-level programming language that is popular within the programming
    community. It is simple, versatile, and contains an extensive library of third-party
    frameworks. It is also considered to be one of the most popular modern programming
    languages, being highly accessible for beginners. You can even use it to create
    software in your programming domain of choice.

    Accredited universities such as Stanford teach Python to computer science graduates
    as an introductory language. Many online courses that explore programming basics
    also use Python as the default language. As you can see, it’s very prevalent and
    therefore highly useful to learn. For these reasons, I am happy that you have
    chosen this book to help you learn Python quickly and intuitively.'
