    # Java Collections: Lists, Sets, and Maps


    # What are Collections?


    In programming, it is very common to need to work with multiple objects or values
    at the same time. For example, you may want to store a list of customer names
    or keep track of invoices for many orders. Organizing and managing groups of related
    objects is where collections in Java are invaluable. Collections provide built-in
    ways to store, retrieve, manipulate, and search collections of objects. The Java
    Collections Framework defines several core collection interfaces like List, Set,
    and Map. It also provides classes that implement these interfaces to handle the
    low-level details for you.


    Using collections allows code to operate on entire groups of objects together
    in a very clean and organized way. Things like iterating, searching, adding/removing
    items, and sorting becomes easy and standardized across collections. This chapter
    will explore some of the most common collection interfaces and how to apply them
    effectively in software development with Java.


    # Lists


    The List interface defines a collection that maintains ordering and allows duplicate
    elements. Some key List implementations are:


    +   - ArrayList - Resizable array-backed implementation. Fast indexed access,
    but slower adds/removes.'
  - '[PAGE 219]


    +   - LinkedList - Doubly-linked list. Slow indexed access but faster adds/removes.

    - Vector - Legacy synchronized list. Not recommended in most cases.


    Elements can be accessed by numeric index like an array. Some common List methods
    include:


    +   - add(obj) - Add object to the end of the list

    - get(index) - Get the object at the specified index

    - remove(index) - Remove and return the object at an index

    - size() - Get the number of elements in the list


    Lists are very useful for maintaining ordered sequences of objects where duplicates
    are allowed and indexed access is important.


    # Sets


    The Set interface ensures uniqueness by not allowing duplicates and does not maintain
    ordering. Specific Set implementations include:


    +   - HashSet - Stores elements in a HashMap for quick lookups. Very fast performance.

    - LinkedHashSet - Maintains insertion order when iterating. Slightly slower than
    HashSet.

    - TreeSet - Stores in a sorted binary tree. Slowest but provides ordered elements.


    Typical Set features involve adding/removing unique elements like:


    +   - add(obj) - Add an object, returning true/false if added

    - contains(obj) - Check if the set contains the object

    - remove(obj) - Remove and return object, returning false if not present


    Sets are useful for ensuring uniqueness among stored elements efficiently. Common
    uses include tracking unique words in a document or filtering duplicate entries
    from a collection.


    # Maps


    The Map interface stores objects in key-value pairs for fast retrieval by key.
    Common Map classes are:'
  - '[PAGE 220]


    +   - HashMap - Default Map implementation using a hash table for key/value storage.

    - LinkedHashMap - Preserves insertion order during iteration in addition to key-based
    access.

    - TreeMap - Stores keys in a red-black tree for ordered iteration and lookup based
    on natural or custom sorting.


    Maps allow accessing values by key through methods like:


    +   - put(key, value) - Add key/value pair to map

    - get(key) - Return value associated with a key

    - containsKey(key) - Check if the map contains the key

    - remove(key) - Remove key/value pair if the key exists


    Maps provide an elegant way to associate objects together and look up values using
    deterministic keys. Common uses include caching data, indexing database entries
    by ID, and storing application configurations.


    # Java Tips and Best Practices


    Some best practices to follow when using collections include:


    +   - Choosing the appropriate collection type based on your specific needs.

    - Using generics to specify the concrete type of objects in collections for type
    safety.

    - Iterating with for-each loops or Iterator objects instead of indexed iteration
    when possible.

    - Synchronizing collection access in multi-threaded code.

    - Defensively copying collection instances when returning from methods to avoid
    mutations to the internal state.


    Following these tips can help maximize performance and prevent bugs when applying
    collections effectively in Java code. Understanding common patterns and idioms
    is vital to solving many real-world programming problems with collections.


    # Concurrency and Multi-threading: Harnessing the Power of Modern Processors


    Modern computer processors are capable of executing multiple tasks concurrently
    through the use of multiple CPU cores. This allows computers'
  - '[PAGE 221]


    to maximize throughput and efficiently perform many operations at the same time.
    Concurrency in programming leverages this capability through the simultaneous
    execution of independent threads. Threads are lightweight processes that can run
    independently and concurrently within a larger application. Code that is not inherently
    sequential can often benefit greatly from being broken out into concurrent threads
    of execution. For example, downloading multiple files at once, encoding video
    frames in parallel, or performing background database operations asynchronously.


    Properly using concurrency allows programs to take advantage of modern hardware
    and feel more responsive by overlapping I/O with computation. However, special
    care must be taken to correctly synchronize access to shared data between threads.
    When not managed properly, concurrency can also introduce difficult bugs from
    race conditions and deadlocks.


    # The Java Approach


    From early on, Java was designed with concurrency as a core concern. It provides
    robust thread management and synchronization utilities to simplify concurrent
    programming compared to lower-level languages.


    The basic threading model in Java revolves around the Thread class. By extending
    Thread or implementing Runnable, a class can define the code executed in a concurrent
    thread context when started. Common features of Thread include:


    +   - Start () - Begin thread execution.

    - Run () - Implemented entry point for thread task.

    - Join () - Wait for thread completion before continuing.

    - Sleep (millis) - Pause the thread for a time period.

    - Yield () - Signal willingness to relinquish current use of CPU.


    However, directly managing threads can easily lead to issues, so higher-level
    concurrency utilities are recommended:


    +   - ExecutorService - Manages ThreadPools and simplifies asynchronous/parallel
    task submission.

    - Callable/Future - Provides checked asynchronous execution with return values.

    - BlockingQueue - First-in, first-out producer/consumer design pattern.'
- md: "## Synchronization\n\nWith concurrency comes the need to synchronize access\
    \ to shared mutable states across threads. The synchronized keyword in Java can\
    \ lock entire method sections or code blocks to exclude other thread entries until\
    \ unlocked. Also useful are atomic object wrappers like:\n\n- AtomicInteger -\
    \ Thread-safe counter alternative to int.\n- AtomicBoolean - Thread-safe boolean\
    \ flag.\n- AtomicReference - Safe reference updates.\n\nLow-level locks allow\
    \ finer-grained locking of objects or code regions with try/finally via ReentrantLock.\
    \ These synchronization primitives prevent critical sections from overlapping\
    \ and introducing race conditions or inconsistencies.\n\n## Best Practices\n\n\
    Some concurrency best practices include designing for:\n\n- Independence - Minimize\
    \ shared mutable state between threads.\n- Isolation - Wrap shared access in synchronization.\n\
    - Limited scope - Minimize lock holding durations.\n- Non-blocking - Use concurrent\
    \ queue patterns where possible.\n- Progress - Ensure threads cannot deadlock\
    \ or livelock.\n- Recovery - Consider exception-handling strategies in concurrent\
    \ contexts.\n- Performance - Profile and optimize bottlenecks.\n\nWhen applied\
    \ judiciously, concurrency can significantly improve the performance and responsiveness\
    \ of Java programs. With care taken for thread safety and synchronization, the\
    \ full power of multi-core systems can be unleashed. Understanding the Java primitives\
    \ for managing threads forms a strong foundation for building highly concurrent\
    \ systems.\n\n## Chapter 8: Advanced Java Concepts\n\n## Modules: Organizing and\
    \ Scaling Your Java Projects\n\nAs Java applications grow in size and complexity,\
    \ proper organization and modularization of the codebase becomes crucial. Left\
    \ unmanaged, a large monolithic codebase can become difficult to understand, update,\
    \ and maintain over time. The module system introduced in Java 9 provides an elegant\
    \ way to tackle these scaling challenges.\n\n## What are Modules?\n\n### Module\
    \ Basics\n\nIn Java, a module is simply a logical separation of code into independent\
    \ units. It allows you to compartmentalize your code into cohesive packages that\
    \ represent certain functionality or domains. Each module is self-contained and\
    \ only exposes certain APIs to other parts of the codebase via its public interfaces.\n\
    \nModules are declared using a simple module-info.java file at the root of the\
    \ source directories. This file defines the module name and exports/opens certain\
    \ packages. For example:\n\n```\nmodule com.example.app {\n    exports com.example.app.controllers;\n\
    }\n```\n\nHere, we define a module named 'com.example.app' that exports the 'controllers'\
    \ package, making its public classes and interfaces available to other modules.\n\
    \nUnder the hood, modules result in separate class loaders so that classes from\
    \ different modules don't conflict. This modularity helps avoid problems like\
    \ naming collisions and greatly simplifies dependency management across codebases\
    \ and applications.\n\n### Key Concepts in Modules\n\nSome key concepts related\
    \ to Java modules:\n\n- Modules - Logical separation of code into independent\
    \ building blocks\n- Requires - Dependencies between modules defined via 'requires'\
    \ keyword\n- Exports - Control which packages are visible to dependent modules\n\
    - Opens - Allow reflective access to classes even in non-exported packages\n-\
    \ Services - Publishing and consuming services via the ServiceLoader interface\n\
    - Provides/Uses - Resolving module dependencies via services\n\nBy exposing only\
    \ intended contracts through exports and requirements, modules allow the safe\
    \ composition of independently developed and maintained components.\n\n### Application\
    \ of Modules\n\n#### Real World Uses\n\nLet's look at some real-world scenarios\
    \ where modules really help:\n\n#### Application Framework as Module:\n\nCore\
    \ framework code can be extracted as a module that cleanly separates application\
    \ code from framework code. The framework module exports only the interfaces needed\
    \ by the application code.\n\n#### Plugins/Extensions:\n\nRewritable modules allow\
    \ others to extend functionality through plug-ins and extensions that require\
    \ add-to-original modules functionality.\n\n#### Library/Utility Modules:\n\n\
    Common utilities, database libraries, etc., can be packaged as modular JARs that\
    \ export only agreed-upon APIs for safe consumption.\n\n#### Microservices:\n\n\
    Each microservice can be defined as a module boundary with strict requirements/export\
    \ definitions between autonomous services.\n\n#### IDE/Build Tools Integration:\n\
    \nModules define explicit compile-time and run-time dependencies that building/packaging\
    \ tools can leverage for tasks like building, testing, packaging, and deploying\
    \ modules.\n\nThe key benefits of modularizing Java code include reduced coupling,\
    \ improved readability, testability, upgradeability, and overall manageability\
    \ of large and complex codebases over time. Though the use of modules is optional\
    \ in Java, they offer immense promise for future-proofing applications as systems\
    \ evolve.\n\n### Defining Modules\n\nLet's look at how to construct modules in\
    \ practice:\n\n1. Define module-info files:\nAs mentioned earlier, each module\
    \ is declared using the module-info.java file at the root of the source directory.\n\
    2. Structure code into packages:\nGroup related functionality into cohesive packages\
    \ under the module.\n3. Specify required clauses:\nDefine other module dependencies\
    \ via the required keyword.\n4. Export/Open packages:\nUse exports/opens to selectively\
    \ publish APIs for external use.\n5. Resolve dependencies:\nAddress any dependency\
    \ conflicts or issues during compilation.\n6. Build and package modules:\nBuild\
    \ tooling like Maven can produce modular JARs and modular layouts.\n7. Run modular\
    \ applications:\nUse the java command with --module-path and --modules flags to\
    \ run modular apps.\n\nWith a little refactoring effort upfront, modules can pay\
    \ huge dividends as code evolves from small to very large scales over time.\n\n\
    Java modules provide an effective way to organize large and complex codebases\
    \ into cohesive bundles. By reducing tight coupling between components and defining\
    \ explicit dependencies, modules greatly aid code readability, maintainability,\
    \ and scalability. While optional currently, modules enable future-proofing Java\
    \ applications as a preferred approach for componentization going forward. When\
    \ applied correctly, modules can unlock immense gains for projects of all sizes.\n\
    \n## Annotations: Adding Metadata to Your Code\n\n### Annotations\n\nAnnotations\
    \ in Java are a form of metadata that can be embedded directly in code using the\
    \ '@' symbol. They allow attaching additional information to various language\
    \ elements like classes, methods, fields, etc., without modifying their behavior.\
    \ This metadata can then be consumed and acted upon through reflection at both\
    \ compile-time and run-time.\n\nAnnotations provide a non-intrusive way to enrich\
    \ code with extra semantic information that can help tools, frameworks, and developers\
    \ better understand code purpose and intent. Common uses include validation, serialization,\
    \ injection, and more. Though optional, annotations streamline many development\
    \ tasks and improve overall productivity.\n\n### Builtin Annotations\n\nThe Java\
    \ platform ships with several useful predefined annotations:\n\n- @Override: Ensures\
    \ a method properly overrides a superclass one by throwing a compilation error\
    \ if not\n- @Deprecated: Marks a symbol as deprecated and instructs users against\
    \ its usage. Generates warning message during compilation.\n- @SuppressWarnings:\
    \ Suppresses specific compilation warnings like deprecated, unused, etc., by attaching\
    \ to fields, methods, or classes.\n- @FunctionalInterface: identifies a functional\
    \ interface type - an interface with a single abstract method that can be assigned\
    \ to lambda expressions.\n- @SafeVarargs: Prevents unintended warnings caused\
    \ by type erasure due to polymorphic array parameters in generics.\n- @Repeatable:\
    \ Indicates an annotation can be applied multiple times to the same program element.\n\
    \n### Custom Annotations\n\nFor custom behavior not covered by default, annotations\
    \ can also be defined through a simple annotation type.\n\nFor example:\n\n```\n\
    @Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.METHOD)\npublic @interface\
    \ LogCall {\n    String calledBy();\n}\n```\n\nHere, we define a custom @LogCall\
    \ annotation specifying its target, retention policy, and the calledBy() attribute\
    \ it contains. This annotation can then be used on methods:\n\n```\n@LogCall(calledBy=\"\
    doSomething()\")\npublic void myMethod() {\n    //...\n}\n```\n\nReflection is\
    \ then used at runtime to dynamically access annotated elements and their metadata.\
    \ This opens up annotations to a whole world of possibilities.\n\n### Applying\
    \ Annotations\n\nAnnotations have many real-world applications:\n\n- Dependency\
    \ Injection: Frameworks like Spring use annotations to declaratively wire beans\
    \ and service endpoints.\n- Validation: JSR-303 validations add constraints via\
