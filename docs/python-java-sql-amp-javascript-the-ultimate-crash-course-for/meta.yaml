    # typeof


    The built-in unary operator called "typeof" lets you establish the data type of
    a given item or expression. It gives back a string that describes the operand''s
    type.

    The syntax for using the typeof operator is as follows:


    ```

    typeof operand

    ```


    Here, the ‘operand’ can be any value or expression that you want to evaluate the
    type of. The ‘typeof’ operator returns a string representing the data type of
    the operand.

    Here are some examples of using the typeof operator:


    ```

    console.log(typeof 42); // "number"

    console.log(typeof "Hello"); // "string"

    console.log(typeof true); // "boolean"

    console.log(typeof undefined); // "undefined"

    console.log(typeof null); // "object"

    console.log(typeof Symbol("symbol")); // "symbol"

    console.log(typeof BigInt(10)); // "bigint"

