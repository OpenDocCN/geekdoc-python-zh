    # Annotations: Adding Metadata to Your Code


    # Annotations


    Annotations in Java are a form of metadata that can be embedded directly in code
    using the ''@'' symbol. They allow attaching additional information to various
    language elements like classes, methods, fields, etc., without modifying their
    behavior. This metadata can then be consumed and acted upon through reflection
    at both compile-time and run-time.

    Annotations provide a non-intrusive way to enrich code with extra semantic information
    that can help tools, frameworks, and developers better understand code purpose
    and intent. Common uses include validation, serialization, injection, and more.
    Though optional, annotations streamline many development tasks and improve overall
    productivity.


    # Builtin Annotations


    The Java platform ships with several useful predefined annotations:


    +   - @Override: Ensures a method properly overrides a superclass one by throwing
    a compilation error if not

    - @Deprecated: Marks a symbol as deprecated and instructs users against its usage.
    Generates warning message during compilation.

    - @SuppressWarnings: Suppresses specific compilation warnings like deprecated,
    unused, etc., by attaching to fields, methods, or classes.

    - @FunctionalInterface: identifies a functional interface type - an interface
    with a single abstract method that can be assigned to lambda expressions.'
