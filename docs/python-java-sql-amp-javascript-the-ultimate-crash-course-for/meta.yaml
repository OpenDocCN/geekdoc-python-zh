    # MINUS


    The MINUS command also works on two different SQL queries simultaneously. The
    MINUS command begins by retaining the result from the first statement. It then
    takes the result received from the second statement and subtracts it from the
    result acquired from the first statement to arrive at the final result. If the
    second statement produces outcomes that were not obtained from the first statement,
    then the first result will be disregarded, and the second result will be considered
    valid. It is important to notice that the MINUS command may only choose values
    unique from one another.


    # Syntax:


    SELECT column_name FROM table_name'
