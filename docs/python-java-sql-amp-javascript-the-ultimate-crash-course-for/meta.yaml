    \ `List<? extends String>`，因为只允许从中读取。虽然通配符增加了灵活性，但它们也限制了某些操作，因为实际类型是未知的。方法通常不能返回通配符参数化的类型。\n\
    \n# 第 6 章：Java 中的函数式编程\n\n## Lambda 表达式简介\n\n### 什么是 Lambda 表达式？\n\nLambda 表达式在\
    \ Java 8 中引入，以支持 Java 中的函数式编程特性。Lambda 表达式允许将功能作为方法参数或将代码作为数据。它们使得无需匿名类就能更简洁地实现函数式接口。Lambda\
    \ 表达式是一个非命名方法，可以被传递和使用，而无需声明或命名。它消除了使用接口和匿名内部类作为回调定义时涉及的许多语法噪音。\n\n### Lambda\
    \ 语法\n\nLambda 表达式使用 `->` 运算符将参数列表与表达式体分开。这被称为 lambda 运算符或箭头运算符。\nLambda 表达式的一般语法是：\n\
    `(参数类型) -> { 主体 }`\n例如，一个接受整数作为参数并返回其平方的 lambda 是：\n`(int x) -> { return x * x;\
    \ }`\n如果主体包含单个语句，则 `return` 是可选的，且不需要花括号 `{}`。\n`(int x) -> x * x`\n\n### 类型推断\n\
    \nLambda 表达式不需要显式定义 lambda 参数类型和返回类型。Java 编译器执行类型推断以从上下文确定类型。\n例如，在以下代码中，编译器推断参数是\
    \ `Integer`，结果也是 `Integer`：\n\n```java\nx -> x * x\n```\n\n### 函数式接口\n\nLambda\
    \ 表达式主要是为了提供小型、匿名的内联实现而引入的，用于函数式接口。函数式接口是仅包含一个抽象方法的接口。\n\nJava 中函数式接口的示例有：\n\n\
    - `Predicate<T>` - 评估 `T` 类型对象的条件\n- `Consumer<T>` - 对 `T` 类型对象执行操作\n- `Function<T,\
    \ R>` - 将 `T` 类型的输入映射到 `R` 类型的输出\n\n在 Java 8 之前，函数式接口必须使用匿名类实现，例如：\n\n```java\n\
    new Predicate<String>() {\n    public boolean test(String s) {\n        return\
    \ s.length() > 0;\n    }\n}\n```\n\n现在，使用 lambda 表达式，它们可以更简洁地实现为：\n\n```java\n\
    s -> s.length() > 0\n```\n\n### 方法引用\n\n除了 lambda 表达式，Java 8 还支持方法引用，用于引用现有方法而无需重写方法实现。方法引用是对方法的常量引用，可以像\
    \ lambda 表达式一样被传递。\n\n例如，对现有 `isEmpty()` 方法的方法引用是：\n\n```java\nString::isEmpty\n\
    ```\n\n这在语义上等同于：\n\n```java\n(String s) -> s.isEmpty()\n```\n\n但在集合操作等上下文中可读性更好：\n\
    \n```java\nlist.removeIf(String::isEmpty)\n```\n\n### 多个 Lambda 参数\n\nLambda 可以有多个参数，用逗号分隔：\n\
    \n```java\n(int x, int y) -> x + y\n```\n\n### 捕获外部作用域变量\n\nLambda 可以捕获并使用来自封闭作用域的局部变量：\n\
    \n```java\nint multiplier = 10;\nlist.forEach(x -> System.out.println(x * multiplier));\n\
    ```\n\n此处，`multiplier` 是 effectively final 的，因此不会引起有问题的副作用。\n\n### 泛型类型推断\n\n\
    就像泛型方法一样，lambda 也支持泛型类型推断：\n\n```java\nlistOfStrings.forEach(string -> {\n   \
    \ List<Character> chars = new ArrayList<>();\n    for(char c : string.toCharArray())\n\
    \        chars.add(c); });\n```\n\n此处，`chars` 中 `List` 的泛型类型是从循环中 `string` 的类型推断出来的。\n\
    \n### 方法重载解析\n\n当 lambda 作为方法参数传递时，Java 会根据与函数式接口签名匹配的目标签名来解析重载。\n例如，在 `Collections.sort()`\
    \ 中，比较器是一个函数式接口，因此 lambda 会被适当地推断。\n\n### Lambda 表达式的应用\n\nLambda 表达式的一些常见用途包括：\n\
    \n- 作为 Swing/FX 事件监听器中的回调处理器\n- 顺序处理流\n- 为线程实现简单的 `Runnable` 或 `Callable` 任务\n\
    - 使用比较器 lambda 对集合进行排序/搜索\n- 使用谓词 lambda 进行数据库查询\n\nLambda 表达式通过将代码视为数据，使 Java\
    \ 代码更具函数式和简洁性。它们减少了函数式接口使用的冗长性，并在现有类库中启用了新的函数式功能。\n\n## 流：更优雅地处理集合\n\n### 什么是流？"
