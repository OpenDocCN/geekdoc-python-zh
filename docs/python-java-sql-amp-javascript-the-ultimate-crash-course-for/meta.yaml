  md: '# Chapter 8: Prototypes


    Prototypes in JavaScript are a fundamental part of the language''s object-oriented
    nature. Every object in JavaScript has a prototype, which is used as a guide or
    template when making new objects. An object that serves as the model for other
    objects'' functions and properties is called a prototype.

    JavaScript''s approach to OOP heavily relies on prototypes. By enabling object
    inheritance, they make it possible for objects to reuse and share the attributes
    and functions specified in their prototypes.

    When an object needs to access a property or method that it doesn''t have, JavaScript
    searches the prototype chain to locate a property or method in its prototype and
    its prototype''s prototype, and so on, until it reaches the top-level prototype.

    Using prototypes in JavaScript offers several advantages:


    # Code reusability


    Prototypes allow you to define properties and methods once in a prototype and
    have all instances of objects derived from that prototype share those properties
    and methods. This promotes code reusability and helps avoid duplication.


    # Dynamic property assignment


    Prototypes allow you to add or modify properties and methods dynamically at runtime.
    This flexibility enables you to extend the functionality of objects even after
    they have been instantiated.


    # Memory efficiency


    When multiple objects share the same prototype, they reference the prototype''s
    properties and methods rather than duplicating them. This results in memory efficiency
    as the shared properties and methods are stored in a single location in memory.


    # Easy object modification'
  merge: -1
  pgno: 404
- img_proc: true
  md: "By modifying the properties and methods in a prototype, you can apply changes\
    \ to all objects derived from that prototype. This simplifies the process of making\
    \ modifications to object behavior and reduces the need for updating individual\
    \ objects.\n\n# Prototype chaining and inheritance\n\nPrototypes form a hierarchical\
    \ chain known as the prototype chain. This enables objects to inherit properties\
    \ and methods from their prototypes, allowing for the implementation of inheritance\
    \ patterns and the creation of object hierarchies.\n\nBy leveraging prototypes,\
    \ you can create more efficient and flexible code structures, improve code reuse,\
    \ and take advantage of the dynamic nature of JavaScript to build powerful and\
    \ scalable applications.\n\n# Prototype Chain\n\nIn JavaScript Objects can inherit\
    \ properties and functions from their prototypes. Once an object is created, it\
    \ is linked to a prototype object. If a property or method is not found on the\
    \ object itself, JavaScript looks for it in the object's prototype. If it still\
    \ doesn't find it, the search continues up the prototype chain until it hits the\
    \ top-level prototype, **Object.prototype**. This chain of prototypes establishes\
    \ the inheritance hierarchy in JavaScript. For example, consider an object **person**\
    \ created using the following code:\n\n```\nconst person = {\n  name: 'Mike',\n\
    \  age: 30,\n};\n```\n\nIf you access **person.name**, JavaScript finds the **name**\
    \ property directly on the **person** object. However, if you access **person.toString()**,\
    \ JavaScript doesn't find the **toString()** method on person itself. It continues\
    \ up the prototype chain and finds it in **Object.prototype**, which is inherited\
    \ by all objects.\n\n# Prototypal inheritance\n\nPrototypal inheritance is the\
    \ mechanism by which objects inherit properties and methods from their prototypes."
  merge: -1
  pgno: 405
- img_proc: true
  md: "Let's illustrate prototypal inheritance using constructor functions:\n\n```\n\
    function Person(name, age) {\n  this.name = name;\n  this.age = age;\n}\n\nPerson.prototype.sayHello\
    \ = function() {\n  console.log(`Hello, my name is ${this.name}.`);\n};\n\nconst\
    \ person1 = new Person('Mike', 30);\nperson1.sayHello(); // Output: Hello, my\
    \ name is Mike.\n```\n\nIn this example, **`Person.prototype`** contains the **`sayHello()`**\
    \ method. When **`person1`** is created using the **`Person`** constructor, it\
    \ inherits the **`sayHello()`** method from **`Person.prototype`**. Thus, **`person1`**\
    \ can access and invoke the **`sayHello()`** method.\n\n# Creating and Using Prototypes\n\
    \nPrototypes in JavaScript are created through constructor functions. To distinguish\
    \ constructor functions from normal functions, they are usually named with an\
    \ uppercase letter at the beginning. When a constructor function is called with\
    \ the **new** keyword, it generates a new object and assigns its prototype to\
    \ the constructor's prototype property.\nLet's see an example of creating a prototype\
    \ for the object **Person** using a constructor function:\n\n```\nfunction Person(name,\
    \ age) {\n  this.name = name;\n  this.age = age;\n}\n\nconst personPrototype =\
    \ new Person();\n```\n\nIn this above example, the **Person** constructor function\
    \ provides the name and age attributes. The **personPrototype** object is generated\
    \ by using the **Person** constructor without specifying any parameters. It serves\
    \ as a prototype for future objects generated using the **Person** constructor."
  merge: -1
  pgno: 406
- img_proc: true
  md: "Once a prototype has been established, you may add attributes and methods to\
    \ it. Any objects derived from the same prototype will inherit these attributes\
    \ and methods.\n\nContinuing with the **Person** example, let's add a **sayHello**\
    \ method to the **personPrototype**:\n\n```\npersonPrototype.sayHello = function()\
    \ {\n  console.log(`Hello, my name is ${this.name}.`);\n};\n```\n\nNow, any objects\
    \ created from the **personPrototype** will have the **sayHello** method available.\n\
    \n# Instantiating objects from prototypes\n\nTo create new objects that inherit\
    \ from a prototype, you can use the **Object.create()** method or the constructor\
    \ function with the **new** keyword.\n\nUsing the **Object.create()** method:\n\
    \n```\nconst person1 = Object.create(personPrototype);\nperson1.name = \"Mike\"\
    ;\nperson1.age = 30;\n```\n\nIn this example, **person1** is created by using\
    \ **Object.create()** and passing **personPrototype** as the prototype. The **name**\
    \ and **age** properties are then added directly to **person1**.\n\nUsing the\
    \ constructor function:\n\n```\nconst person2 = new Person(\"Jane\", 25);\n```\n\
    \nThe **Person** constructor is used to create **person2** with the **name** and\
    \ **age** properties.\n\n**Person1** and **Person2** inherit the properties and\
    \ methods provided in **'personPrototype'**."
