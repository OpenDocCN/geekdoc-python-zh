    # Relationship between Class and Object


    The interrelationship between a class and its objects is foundational to OOP.
    A class is fundamentally a logical construct—a template if you will, that outlines
    the structure and behaviors of potential objects. Conversely, objects are the
    physical manifestations created during runtime, crafted meticulously using the
    class as a mold.


    It''s crucial to note the following about this relationship:

    A single class can be the progenitor for countless objects, each with its distinct
    state. While each object is unique in its state, it uniformly inherits properties
    and behaviors from its parent class. Any modifications to the class''s definition
    ripple through, affecting all instantiated objects from that class.


