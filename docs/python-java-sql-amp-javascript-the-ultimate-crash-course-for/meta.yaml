    # Chapter 11: Asynchronous Programming


    # Asynchronous vs. Synchronous communication


    Before we get started, let''s define these two terms: synchronous and asynchronous.

    It is a synchronous, single-threaded language of programming by default. This
    indicates that instructions may only be executed sequentially, not concurrently.
    Consider the following code snippet:


    ```

    let a = 1;

    let b = 2;

    let sum = a + b;

    console.log(sum);

    ```


    The given code sums two integers and then reports the result to the web console.
    The interpreter performs these instructions sequentially until they are completed.

    Yet, there are several drawbacks to this strategy. Suppose we want to get a large
    quantity of data from a repository and present it on our UI. When the interpreter
    finds the instruction that retrieves this data, the remainder of the code is halted
    until the data is retrieved and returned. You can argue that the information to
    also be retrieved isn''t that vast and won''t take long. Assume you need to get
    data from numerous locations. This delay, when combined, does not seem like anything
    people would want to encounter. Fortunately, the issues with synchronous JavaScript
    were solved with the introduction of asynchronous JavaScript.

    Consider asynchronous programming to be code that may start now and end later.
    Because JavaScript runs asynchronously, the commands are not always performed
    sequentially, as we previously observed. There are a various of unique techniques
    that developers have tried throughout the years to appropriately handle this asynchronous
    behavior. Each solution improves on the one before it, making the code more efficient
    and simpler to comprehend if it becomes complicated.

    To further comprehend JavaScript''s asynchronous nature, we''ll look at callback
    functions, promises, async and await.'
