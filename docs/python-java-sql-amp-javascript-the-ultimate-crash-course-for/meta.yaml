  md: '# Chapter 9: Building Data Pipelines and Automating Data Processes


    # What are data pipelines and their uses?


    A data pipeline is a series of components that work together to automate the gathering,
    organization, mobility, modification, and processing of information as it travels
    from a source to its destination. This ensures that the data arrives in a form
    that businesses can use to facilitate the development of a data-driven culture.


    Pipelines for data movement are an essential component of every organization''s
    data architecture. Implementing a data pipeline that is well-designed, resilient,
    and scalable in your organization will assist your company in successfully managing,
    analyzing, and organizing massive amounts of data to generate business value.


    There is a use case for data pipelines in almost every business and sector today.
    It may be anything as simple as moving data from one location to another, or it
    could be something as involved as processing data for use in supervised ml recommendation
    engines that enhance product offers. Some popular data pipeline use applications
    include:


    +   - Consolidating data from many sources (SaaS tools, databases) into a big
    data repository (data warehouses, data lakes) to create a single authoritative
    source for the organization''s data is known as data consolidation.

    - They are improving the overall performance of the backend system by moving data
    to huge data stores and minimizing the amount of strain placed on operational
    databases.

    - Ensuring the data''s quality, dependability, and consistency across all business
    units to provide quicker data access


    # Components of a data pipeline


    # 1. Data sources'
  merge: -1
  pgno: 338
- img_proc: true
  md: 'The point of origin of the data is the primary focus of the first stage of
    a contemporary data pipeline. Any system that your company makes use of to create
    data has the potential to serve as a data source, including the following systems:


    +   - Analytics data (user behavior data)

    - Transactional data (data from sales and product records)

    - Data obtained from third parties, or data that your organization does not directly
    acquire but does utilize.


    # 2. The gathering and processing of data:


    The ingestion layer is the next element in the data pipeline, and it is responsible
    for delivering information into the pipeline. This layer connects to a variety
    of internal and external data sources via various protocols, using tools like
    Striim. This layer can transport both batch and streaming data to big data storage.


    # 3. Data processing


    Through data validation, cleaning, normalization, transformation, and enrichment,
    the processing layer is responsible for bringing the data to a condition where
    the system can consume it. This processing component of the data pipeline may
    be done either before or after the data is saved in the data store. This decision
    is made based on the firm''s unique architecture, either ETL (Extract Transform
    Load) or ELT (Extract Load Transform). The data is extracted, converted, and fed
    into the data stores in an Attach processing architecture. This architecture is
    often used when the data storage is a data warehouse. In systems based on ELT,
    the data is first imported into data lakes and then converted into a state consumable
    for various business use cases.


    # 4. Data storage


    This component is in charge of supplying the data pipeline with storage that is
    reliable, scalable, and protected from unauthorized access. Large data repositories,
    such as database systems (for structured data) and data lakes, are often included
    in their composition.'
  merge: -1
  pgno: 339
- img_proc: true
  md: '# 5. Data consumption


    The consumption layer delivers and integrates scalable, high-performance tools
    for drawing data from storage locations. In addition, the process of considering
