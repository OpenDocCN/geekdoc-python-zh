    # Chapter 10: Files in Python


    Python stores data in variables for both static and dynamic data. While variables
    are ideal for storing data during the execution of a program, they can be difficult
    to use when the data is sensitive and needs to be reused repeatedly. Variables
    can self-destruct to clear memory, which is inconvenient for users who want to
    save or reuse their data for multiple purposes. Python provides files to better
    interact with data of any size or format. Understanding file operations and implementing
    them in your programs is essential for creating better software as a Python programmer.


    # File Paths


    Python programmers typically work with multiple files and two parameters. The
    first is the file name, which makes it easy to find, the second is the file path.


    For example, if file.pdf is the name of a file, then "C:/ users/ downloads/file.pdf"
    is the path format of a file. The file extension in the file name ''file.pdf''
    is pdf. To manage files, most operating systems employ an efficient file management
    system.


    It is critical to understand file management techniques. For this reason, you
    must understand the fundamentals of file managers used in the operating systems
    you are working in. For example, Windows uses file explorer to manage files, whereas
    Mac systems use Finder. Regardless of the operating system and file manager you
    use, files are typically organized in a logical hierarchical order using root
    directories, folders, and subdirectories.


    # Hierarchical Arrangement of Files


    For the program to detect the file location, you must enter the entire path. The
    entire path of the file is generally written hierarchically to determine the directory,
    subdirectories, and folders.


    For example, in ''C:/users/sample/example.pdf,'' C is the system''s root directory
    and sample and users are subdirectories within it. Because there may be multiple
    files with the same name in different folders, it is critical to use the entire
    path to determine the file''s location.'
