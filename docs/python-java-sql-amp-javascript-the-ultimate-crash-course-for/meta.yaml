  md: '# Chapter 11: Exception Handling


    All applications occasionally crash as a result of incorrect user input or an
    error that occurs. It is possible to inform the user about why the application
    has crashed. If you can''t help them, your software should at the very least detect
    that the application has collapsed and send the logs to your server to help them
    find solutions. Giving users a heads-up about errors is the bare minimum that
    modern application developers can do to improve their user experience.


    Exception handling is a computer programming feature that helps developers to
    write scenarios for which an application may crash and explicitly instruct the
    user if this occurs.


    Do you remember the famous "This application has stopped responding" with a red
    ''x'' mark on Windows systems? It is one of the most well-known exception handling
    interfaces in any system. While your exceptions do not have to be of the highest
    quality, they should be adequate for a better end-user experience.


    In Python development, writing valid exceptions is considered a sophisticated
    skill. Exception handling also assists programmers in detecting bugs and logical
    defects in a program early in the workflow. An exception also saves a significant
    amount of time during testing and maintenance.


