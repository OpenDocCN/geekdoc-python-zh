    # Subqueries and temporary tables


    Subqueries are queries within queries that are used to perform more complex data
    manipulations. They are a powerful tool for data analysts and can be used to extract
    data from multiple tables, filter data based on complex conditions, and perform
    aggregations.


    For example, a subquery could be used to find all the customers who have made
    purchases over a certain amount and use that data to perform further analysis.


    Temporary tables are another way to work with complex data sets. They are tables
    that are created on the fly and are used to store the intermediate results of
    a query. This can be helpful in situations where the data is too large to fit
    into memory or when a query needs to be broken down into smaller, more manageable
    steps.


    Subqueries and temporary tables are advanced SQL techniques that can significantly
    improve the efficiency and flexibility of SQL data management.


    Assume you have two tables: **orders** and **customers**. The columns of the **orders**
    table are ‘order_id’, ‘customer_id’, and ‘order_amount’. The **customer** table
    has ‘customer_id’, ‘customer_name’, and ‘customer_email’.


    We want to find the total amount of orders made by customers who have a Gmail
    email address. We can use a subquery to filter out the customers with non-Gmail
    email addresses and then use a temporary table to store the intermediate result:'
