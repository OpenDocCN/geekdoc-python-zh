    \        <script type = \"text/JavaScript\">\n            <!--\n             \
    \   function myFunc() {\n                    var ret = document.getElementsByTagName(\"\
    title\");\n                    alert(\"Document Title : \" + ret[0].text );\n\n\
    \                    var ret = document.getElementById(\"heading\");\n       \
    \             alert(ret.innerHTML );\n                }\n            //-->\n \
    \       </script>\n    </head>\n    <body>\n        <h1 id = \"heading\">This\
