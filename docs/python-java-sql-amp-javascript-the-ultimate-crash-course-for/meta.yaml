    \ type of vehicle. Because of the Object Oriented programming paradigm, the developer\
    \ can access and call all those properties with a simple dot notation rather than\
    \ creating functions for each property again.\nObject Oriented programming saves\
    \ time and is useful to reuse code thanks to features like polymorphism and inheritance.\n\
    \n## How Do I Create Classes?\n\nClasses are a way to create custom data types\
    \ and they represent a blueprint from which objects are typically created. Classes\
