    \n### 顺序结构\n\n在顺序结构中，你程序的所有步骤通常都会线性执行。因此，许多程序采用顺序结构以避免编写复杂的代码。然而，顺序代码对程序员的技能要求很高，因为线性地开发编程逻辑可能很困难。\n\
