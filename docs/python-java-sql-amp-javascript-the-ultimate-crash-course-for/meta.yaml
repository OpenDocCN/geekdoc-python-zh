    ## 程序代码：


    ```

    x = [''Alaska'', ''California'', ''Alabama'']

    print(x)

    ```


    ## 输出：


    ```

    [''Alaska'', ''California'', ''Alabama'']

    ```


    ## 空列表


    如果一个 Python 列表没有元素，则称为空列表。空列表也称为 null 列表。它通常写为 []。


