    - 最终在if（else）语句之后执行的代码需要缩进。\n- 高级程序使用自动输入方法从用户那里获取值。\n- 存储变量后，解释器将解析if块使用的条件。\n\
    - Python解释器将执行取余运算，以查看该数字是否能被4整除。\n- 如果能被4整除，那么if语句之后的代码块本应被执行。\n- 由于条件为假，解释器将跳过if块，转而执行else块中的语句，从而产生输出。\n\
    \n让我们看一个满足if块条件的例子。\n\n**程序代码：**\n\n```\nx = 32\nif x % 4 == 0:\n    print(\"\
