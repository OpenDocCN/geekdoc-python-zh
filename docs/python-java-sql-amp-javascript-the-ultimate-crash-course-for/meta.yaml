    \n## 异步与同步通信\n\n在开始之前，我们先定义这两个术语：同步和异步。\n默认情况下，它是一种同步、单线程的编程语言。这意味着指令只能顺序执行，而不能并发执行。考虑以下代码片段：\n\
    \n```javascript\nlet a = 1;\nlet b = 2;\nlet sum = a + b;\nconsole.log(sum);\n\
    ```\n\n给定的代码将两个整数相加，然后将结果报告给 Web 控制台。解释器顺序执行这些指令，直到它们完成。\n然而，这种策略有几个缺点。假设我们想从一个仓库获取大量数据并将其显示在我们的\
    \ UI 上。当解释器找到获取此数据的指令时，其余代码会暂停，直到数据被检索并返回。你可能会说，要检索的信息量并不大，不会花很长时间。假设你需要从多个位置获取数据。当这些延迟叠加起来时，似乎并不是人们想要遇到的情况。幸运的是，随着异步\
    \ JavaScript 的引入，同步 JavaScript 的问题得到了解决。\n将异步编程视为可以现在开始、稍后结束的代码。因为 JavaScript\
    \ 是异步运行的，所以命令并不总是像我们之前观察到的那样顺序执行。多年来，开发者尝试了各种独特的技术来恰当地处理这种异步行为。每种解决方案都在前一种的基础上进行了改进，使代码更高效，如果变得复杂也更容易理解。\n\
    为了进一步理解 JavaScript 的异步特性，我们将探讨回调函数、Promise、async 和 await。\n\n## 什么是 JavaScript\
    \ 回调？\n\n回调是在另一个函数内提供并在该函数内调用以完成任务的过程。\n上面是一个控制台日志记录程序。它是新的。解释器执行前两条指令，但跳过第三条并执行最后一条。\n\
    JavaScript 的 `setTimeout` 方法有两个参数。第一个参数是另一个过程，第二个是毫秒超时。现在定义了回调。\n这个 `setTimeout`\
    \ 方法必须在 2 秒（2000 毫秒）后执行。想象一下它被带到另一个浏览器部分进行处理，而其他部分继续执行。\n\n### 代码\n\n```javascript\n\
    console.log('fired first');\nconsole.log('fired second');\nsetTimeout(()=>{\n\
    \    console.log('fired third');\n},2000);\nconsole.log('fired last');\n```\n\n\
