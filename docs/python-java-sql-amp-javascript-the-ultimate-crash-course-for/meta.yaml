- md: "## Chapter 2: Variables and Operators\n\n### What is an operator?\n\nThe operator\
    \ is a special symbol that executes operations on operands in JavaScript (values\
    \ and variables). For instance,\n\n```\n2 + 3; // returns \"5\"\n```\n\n2 and\
    \ 3 are operands, whereas + is the operator that executes addition.\nThe following\
    \ operators are supported in JavaScript:\n\n### JavaScript Assignment Operators\n\
    \nWe employ assignment operators to allocate values to variables. For instance,\n\
    \n```\nconst x = 5; // returns \"5\"\n```\n\nWith the = operator, the value 5\
    \ is assigned to the variable x.\nThe following is a list of frequently used assignment\
    \ operators:\n\n| Operator | Name | Example |\n| :--- | :--- | :--- |\n| = | Assignment\
    \ operator | a=7; //returns “7.” |\n| += | Addition assignment | a += 5; // a\
    \ = a + 5 |\n| -= | Subtraction assignment | a -= 2; // a = a - 2 |\n| *= | Multiplication\
    \ assignment | a *= 3; // a = a * 3 |\n| /= | Division assignment | a /= 2; //\
    \ a = a / 2 |\n| %= | Remainder assignment | a %= 2; // a = a % 2 |\n| **= | Exponentiation\
    \ assignment | a **= 2; // a = a**2 |\n\n### JavaScript Arithmetic Operators\n\
    \nArithmetic computations are performed using arithmetic operators. For instance,\n\
    \n```\nconst number = 3 + 5; // returns \"8\"\n```\n\nHere, two operands are added\
    \ using the + operator.\n\n| Operator | Name | Example |\n| :--- | :--- | :---\
    \ |\n| + | Addition | a + b |\n| - | Subtraction | a – b |\n| * | Multiplication\
    \ | a * b |\n| / | Division | a / b |\n| % | Remainder | a % b |\n| ++ | Increment\
    \ (increments by 1) | ++a or a++ |\n| -- | Decrement (decrements by 1) | --a or\
    \ a-- |\n| ** | Exponentiation (Power) | a ** b |\n\n### Example\n\n```\nlet a\
    \ = 5;\nlet b = 3;\n\n// addition\nconsole.log('a + b =', a + b); // returns \"\
    8\"\n\n// subtraction\nconsole.log('a - b =', a - b); // returns \"2\"\n\n// multiplication\n\
    console.log('a * b =', a * b); // returns \"15\"\n\n// division\nconsole.log('a\
    \ / b =', a / b); // returns \"1.6666666666666667\"\n\n// remainder\nconsole.log('a\
    \ % b =', a % b); // returns \"2\"\n\n// increment\nconsole.log('++a = ', ++a);\
    \ // a is now 6\nconsole.log('a++ = ', a++); // prints 6 and then it is increased\
    \ to 7\nconsole.log('a = ', a);    // returns \"7\"\n\n// decrement\nconsole.log('--a\
    \ = ', --a); // a is now 6\nconsole.log('a-- = ', a--); // prints 6 and then it\
    \ is decreased to 5\nconsole.log('a = ', a);    // returns \"5\"\n\n//exponentiation\n\
    console.log('a ** b =', a ** b);\n```\n\n### Output\n\n```\na + b = 8\na - b =\
    \ 2\na * b = 15\na / b = 1.6666666666666667\na % b = 2\n++a = 6\na++ = 6\na =\
    \ 7\n--a = 6\na-- = 6\na = 5\na ** b = 125\n```\n\nSome browsers may not support\
    \ the ** operator.\n\n### JavaScript Comparison Operators\n\nComparison operators\
    \ compare 2 values and return either true or false as a Boolean value. For instance,\n\
    \n```\nconst a = 3, b = 2;\nconsole.log(a > b);\n```\n\n### Output\n\n```\ntrue\n\
    ```\n\nHere, comparison operator > is employed to determine if a is greater than\
    \ b.\n\n| Operator | Description | Example |\n| :--- | :--- | :--- |\n| == | Equal\
    \ to: If both the operands are equal, the expression returns true | a == b |\n\
    | != | Not equal to: If the operands are not equal, returns true | a != b |\n\
    | === | Strict equal to: True if the operands are equal and of the same type |\
    \ a === b |\n| !== | Strict not equal to: If the operands are equal but of distinct\
    \ types or not equal at all, this returns true | a !== b |\n| > | Greater than:\
    \ When the left operand is bigger, it returns true | a > b |\n| >= | Greater than\
    \ or equal to: When the left operand is equal to or larger, it returns true |\
    \ a >= b |\n| < | Less than: When the right operand is bigger, it returns true\
    \ | a < b |\n| <= | Less than or equal to: When the left operand is equal to or\
    \ smaller, it returns true | a <= b |\n\n### Example\n\n```\n// equal operator\n\
    console.log(2 == 2); // true\nconsole.log(2 == '2'); // true\n// not equal operator\n\
    console.log(3 != 2); // true\nconsole.log('hello' != 'Hello'); // true\n// strict\
    \ equal operator\nconsole.log(2 === 2); // true\nconsole.log(2 === '2'); // false\n\
    // strict not equal operator\nconsole.log(2 !== '2'); // true\nconsole.log(2 !==\
    \ 2); // false\n```\n\n### Output\n\n```\ntrue\ntrue\ntrue\ntrue\ntrue\nfalse\n\
    true\nfalse\n```\n\nOperators are used to evaluating whether a condition is true\
    \ or false within if/else statements or loops. We’ll discuss in detail about these.\n\
    \n### JavaScript Logical Operators\n\nLogical operators execute logical operations\
    \ and yield a true or false Boolean result. For instance,\n\n```\nconst a = 5,\
    \ b = 3;\n(a < 6) && (b < 5); // returns \"true\"\n```\n\nHere, && represents\
    \ the logical AND operator. Since a < 6 and b < 5 are both true, the outcome is\
    \ also true.\n\n| Operator | Description | Example |\n| :--- | :--- | :--- |\n\
    | && | Logical AND: True if both operands are true or else false | a && b |\n\
    | || | Logical OR: True if either of the operands evaluates to true; false otherwise\
    \ | a || b |\n| ! | Logical NOT: False if the operand is true and vice-versa.\
    \ | !a |\n\n### Example\n\n```\n// logical AND\nconsole.log(true && true);\nconsole.log(true\
    \ && false);\n\n// logical OR\nconsole.log(true || false);\n\n// logical NOT\n\
    console.log(!true);\n```\n\n### Output\n\n```\ntrue\nfalse\ntrue\nfalse\n```\n\
    \n### JavaScript Bitwise Operator\n\nOperations upon binary representations of\
    \ integers are carried out using bitwise operators.\n\n| Operator | Description\
    \ |\n| :--- | :--- |\n| & | Bitwise AND |\n| | | Bitwise OR |\n| ^ | Bitwise XOR\
    \ |\n| ~ | Bitwise NOT |\n| << | Left shift |\n| >> | Right shift with sign propagation\
    \ |\n| >>> | Right shift with zero-fill |\n\n### JavaScript String Operators\n\
    \nThe + operator may also be utilized to concatenate (join) 2 or more strings\
    \ in JavaScript.\n\n### Example\n\n```\n// concatenation operator\nconsole.log('hello'\
    \ + 'world');\n\nlet x = 'JavaScript';\nx += ' programming'; // x = x + ' tutorial';\n\
    console.log(x);\n```\n\n### Output\n\n```\nhelloworld\nJavaScript programming\n\
    ```\n\nWhen + is applied to strings, concatenation occurs. When + is paired with\
    \ numbers, though, it executes addition.\n\n## Chapter 3: Conditional Statements\n\
    \n### If-Else\n\nThe if-else statement in JavaScript runs code if the condition\
    \ is true or false. JavaScript has three versions of if statements:\n\n- 1. If\
    \ statement\n- 2. If else statement\n- 3. If else if statement\n\n### If statement\n\
    \nIt only analyses the content if an expression evaluates to true. Here is the\
    \ signature of the JavaScript if statement:\n\n```\nif(expression)\n{\n//content\
    \ to be evaluated\n}\n```\n\n### Example\n\n```\nhour=20;\nif (hour < 18)\n{\n\
    \    console.log(\"Good day\");\n}\n```\n\n### JavaScript If else statement\n\n\
    It determines whether the condition is true or false. Here is the syntax of the\
    \ JavaScript if-else expression:\n\n```\nif(expression)\n{\n//code to run if the\
    \ condition is true\n}\nElse\n{\n//code to run if the condition is false\n}\n\
    ```\n\n### Example of an if-else statement in JavaScript to determine if a number\
    \ is odd or even\n\n```\nvar num=20;\nif(num%2==0){\nconsole.log(\"num is even\
    \ number\");\n}\nelse{\nconsole.log(\"num is odd number\");\n}\n```\n\nOutput\n\
    \n```\nnum is even number\n```\n\n### JavaScript if else if statement\n\nIt examines\
    \ the conditions only if several expressions evaluate to be true. Here is the\
    \ signature of the JavaScript if else if statement:\n\n```\nif(expression1)\n\
    {\n//content to be evaluated if expression1 is true\n}\nelse if(expression2)\n\
    {\n//content to be evaluated if expression2 is true\n}\nelse if(expression3)\n\
    {\n//content to be evaluated if expression3 is true\n}\nelse\n{\n//content to\
    \ be evaluated if no expression is true\n}\n```\n\n### If else if statement example\
    \ in JavaScript\n\n```\nvar num=20;\nif(num==10){\nconsole.log(\"num is equal\
    \ to 10\");\n}\nelse if(num==15){\nconsole.log(\"num is equal to 15\");\n}\nelse\
    \ if(num==20){\nconsole.log(\"num is equal to 20\");\n}\nelse{\nconsole.log(\"\
    num is not equal to 10, 15 or 20\");\n}\n```\n\n### Output\n\nnum is equal to\
    \ 20\n\n## Chapter 4: Loops\n\nJavaScript iterates the code using while, for,\
    \ do-while, or for-in loops. It makes the code more concise. It is often used\
    \ in an array. There are four different forms of JavaScript loops:\n\n### For\
    \ loop\n\nJavaScript For loop iterates through the specified number of items.\
    \ It must be used if the number of iterations is known. The syntax for the for\
    \ loop is shown below:\n\n```\nfor (initialization; condition; increment) {\n\
    \    code to be executed\n}\n```\n\n### JavaScript example of the For loop\n\n\
    ```\nfor (i=1; i<=5; i++) {\n    console.log(i + \" \")\n}\n```\n\n### Output\n\
    \n```\n1\n2\n3\n4\n5\n```\n\n### While loop\n\nThe While loop in JavaScript iterates\
    \ through the components an unlimited number of times. It must be used when the\
    \ number of iterations is unknown. The while loop syntax is shown below:\n\n```\n\
    while (condition)\n{\n    code to be executed\n}\n```\n\n### JavaScript While\
    \ loop example\n\n```\nvar i=11;\n```"
  mdcn: "## 第二章：变量与运算符\n\n### 什么是运算符？\n\n运算符是 JavaScript 中用于对操作数（值和变量）执行操作的特殊符号。例如，\n\
    \n```\n2 + 3; // 返回 \"5\"\n```\n\n2 和 3 是操作数，而 + 是执行加法的运算符。\nJavaScript 支持以下运算符：\n\
    \n### JavaScript 赋值运算符\n\n我们使用赋值运算符为变量分配值。例如，\n\n```\nconst x = 5; // 返回 \"5\"\
    \n```\n\n使用 = 运算符，将值 5 赋给变量 x。\n以下是常用赋值运算符的列表：\n\n| 运算符 | 名称 | 示例 |\n| :--- |\
    \ :--- | :--- |\n| = | 赋值运算符 | a=7; //返回 “7.” |\n| += | 加法赋值 | a += 5; // a =\
    \ a + 5 |\n| -= | 减法赋值 | a -= 2; // a = a - 2 |\n| *= | 乘法赋值 | a *= 3; // a =\
    \ a * 3 |\n| /= | 除法赋值 | a /= 2; // a = a / 2 |\n| %= | 取余赋值 | a %= 2; // a =\
    \ a % 2 |\n| **= | 指数赋值 | a **= 2; // a = a**2 |\n\n### JavaScript 算术运算符\n\n算术运算使用算术运算符执行。例如，\n\
    \n```\nconst number = 3 + 5; // 返回 \"8\"\n```\n\n这里，使用 + 运算符将两个操作数相加。\n\n| 运算符\
    \ | 名称 | 示例 |\n| :--- | :--- | :--- |\n| + | 加法 | a + b |\n| - | 减法 | a – b |\n\
    | * | 乘法 | a * b |\n| / | 除法 | a / b |\n| % | 取余 | a % b |\n| ++ | 自增（增加 1） |\
    \ ++a 或 a++ |\n| -- | 自减（减少 1） | --a 或 a-- |\n| ** | 指数（幂） | a ** b |\n\n### 示例\n\
    \n```\nlet a = 5;\nlet b = 3;\n\n// 加法\nconsole.log('a + b =', a + b); // 返回 \"\
    8\"\n\n// 减法\nconsole.log('a - b =', a - b); // 返回 \"2\"\n\n// 乘法\nconsole.log('a\
    \ * b =', a * b); // 返回 \"15\"\n\n// 除法\nconsole.log('a / b =', a / b); // 返回\
    \ \"1.6666666666666667\"\n\n// 取余\nconsole.log('a % b =', a % b); // 返回 \"2\"\n\
    \n// 自增\nconsole.log('++a = ', ++a); // a 现在是 6\nconsole.log('a++ = ', a++); //\
    \ 打印 6，然后增加到 7\nconsole.log('a = ', a);    // 返回 \"7\"\n\n// 自减\nconsole.log('--a\
    \ = ', --a); // a 现在是 6\nconsole.log('a-- = ', a--); // 打印 6，然后减少到 5\nconsole.log('a\
    \ = ', a);    // 返回 \"5\"\n\n// 指数\nconsole.log('a ** b =', a ** b);\n```\n\n\
    ### 输出\n\n```\na + b = 8\na - b = 2\na * b = 15\na / b = 1.6666666666666667\n\
    a % b = 2\n++a = 6\na++ = 6\na = 7\n--a = 6\na-- = 6\na = 5\na ** b = 125\n```\n\
    \n某些浏览器可能不支持 ** 运算符。\n\n### JavaScript 比较运算符\n\n比较运算符比较两个值，并返回 true 或 false 作为布尔值。例如，\n\
    \n```\nconst a = 3, b = 2;\nconsole.log(a > b);\n```\n\n### 输出\n\n```\ntrue\n\
    ```\n\n这里，使用比较运算符 > 来确定 a 是否大于 b。\n\n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n\
    | == | 等于：如果两个操作数相等，则表达式返回 true | a == b |\n| != | 不等于：如果操作数不相等，则返回 true | a !=\
    \ b |\n| === | 严格等于：如果操作数相等且类型相同，则为 true | a === b |\n| !== | 严格不等于：如果操作数相等但类型不同，或根本不相等，则返回\
    \ true | a !== b |\n| > | 大于：当左操作数较大时，返回 true | a > b |\n| >= | 大于或等于：当左操作数等于或较大时，返回\
    \ true | a >= b |\n| < | 小于：当右操作数较大时，返回 true | a < b |\n| <= | 小于或等于：当左操作数等于或较小时，返回\
    \ true | a <= b |\n\n### 示例\n\n```\n// 等于运算符\nconsole.log(2 == 2); // true\nconsole.log(2\
    \ == '2'); // true\n// 不等于运算符\nconsole.log(3 != 2); // true\nconsole.log('hello'\
    \ != 'Hello'); // true\n// 严格等于运算符\nconsole.log(2 === 2); // true\nconsole.log(2\
    \ === '2'); // false\n// 严格不等于运算符\nconsole.log(2 !== '2'); // true\nconsole.log(2\
    \ !== 2); // false\n```\n\n### 输出\n\n```\ntrue\ntrue\ntrue\ntrue\ntrue\nfalse\n\
    true\nfalse\n```\n\n运算符用于在 if/else 语句或循环中评估条件是 true 还是 false。我们将在后面详细讨论这些。\n\n\
    ### JavaScript 逻辑运算符\n\n逻辑运算符执行逻辑运算并产生 true 或 false 的布尔结果。例如，\n\n```\nconst a\
    \ = 5, b = 3;\n(a < 6) && (b < 5); // 返回 \"true\"\n```\n\n这里，&& 代表逻辑与运算符。由于 a\
    \ < 6 和 b < 5 都为 true，因此结果也为 true。\n\n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :---\
    \ |\n| && | 逻辑与：如果两个操作数都为 true，则为 true，否则为 false | a && b |\n| \\|\\| | 逻辑或：如果任一操作数为\
    \ true，则为 true；否则为 false | a \\|\\| b |\n| ! | 逻辑非：如果操作数为 true，则为 false，反之亦然。\
    \ | !a |\n\n### 示例\n\n```\n// 逻辑与\nconsole.log(true && true);\nconsole.log(true\
    \ && false);\n\n// 逻辑或\nconsole.log(true || false);\n\n// 逻辑非\nconsole.log(!true);\n\
    ```\n\n### 输出\n\n```\ntrue\nfalse\ntrue\nfalse\n```\n\n### JavaScript 位运算符\n\n\
    位运算符用于对整数的二进制表示执行操作。\n\n| 运算符 | 描述 |\n| :--- | :--- |\n| & | 按位与 |\n| \\| | 按位或\
    \ |\n| ^ | 按位异或 |\n| ~ | 按位非 |\n| << | 左移 |\n| >> | 带符号传播的右移 |\n| >>> | 零填充右移\
    \ |\n\n### JavaScript 字符串运算符\n\n+ 运算符也可用于在 JavaScript 中连接（拼接）两个或多个字符串。\n\n###\
    \ 示例\n\n```\n// 连接运算符\nconsole.log('hello' + 'world');\n\nlet x = 'JavaScript';\n\
    x += ' programming'; // x = x + ' tutorial';\nconsole.log(x);\n```\n\n### 输出\n\
    \n```\nhelloworld\nJavaScript programming\n```\n\n当 + 用于字符串时，会发生连接。但是，当 + 与数字一起使用时，它执行加法。\n\
    \n## 第三章：条件语句\n\n### If-Else\n\nJavaScript 中的 if-else 语句在条件为 true 或 false 时运行代码。JavaScript\
    \ 有三种 if 语句版本：\n\n- 1. If 语句\n- 2. If else 语句\n- 3. If else if 语句\n\n### If 语句\n\
