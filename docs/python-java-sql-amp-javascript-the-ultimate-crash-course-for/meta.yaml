    # 5. Modulus


    Modulus is typically used to calculate the remainder of a division operation.
    The modulus operator can be used to implement a wide range of programming logic,
    and% is the modulus operation symbol.


    # Program Code:


    ```

    x = 9

    y = 4

    z = x % y

    # % is the modulus operator

    print(z)

    ```


    When the program is executed using an IDE or IDLE, the interpreter will find the
    remainder of the two variable values and input them into ‘z’ as specified by the
    developer.


    # Output:


    ```

    1

    ```


    The quotient, in this case, is 2.25, but the remainder is 1, as shown in the program
    output. You can use floor division operations instead of displaying floating-point
    numbers as a quotient for division operations.


    # 6. Floor Division


    Floor division is an alternative arithmetic operator that developers frequently
    use when they are not concerned with the precision of the result. The nearest
    integer for the quotient obtained after a division operation is usually displayed
    by this operator.

    "//" is the symbol for a floor division operator.


    # Program Code:


    ```

    x = 9

    y = 4

    z = x // y

    # This is the floor division operator

    print (z)

    ```


    # Output:


    ```

    2

    ```'
