    ## What are String Literals?


    String literals are advanced characters that can assist you in quickly formatting
    your data. For example, \n is a common string literal that can assist you in entering
    data from a new line.


    ## Program Code:


    ```

    prompt = "This is a simple question to find out what you like."

    prompt += "\n So, please say your favorite food: "

