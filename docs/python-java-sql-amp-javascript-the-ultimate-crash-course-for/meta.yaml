- md: "## IIFE and Closures\n\nTo avoid the issue of closures in the loop, an alternative\
    \ solution is to utilize the syntax for IIFE (Immediately Invoked Function Expression).\
    \ This involves immediately invoking the setTimeout function as the loop begins\
    \ to run rather than waiting for a loop to finish and then executing the code.\
    \ By doing so, the setTimeout function behaves as intended. Below is an example\
    \ of what the syntax for an IIFE looks like.\n\n```javascript\nfor(var id=1; id<=3;\
    \ id++){\n    (function(id){\n        setTimeout(function(){\n            console.log('seconds:\
    \ ' + id);\n        }, id * 1000);\n    })(id)\n}\n```\n\n## Output\n\n```\nseconds:\
    \ 1\nseconds: 2\nseconds: 3\n```\n\nThe provided code runs loops that immediately\
    \ invoke the function on each iteration. This results in the setTimeout function\
    \ starting immediately and preserving the id's state for each iteration. It is\
    \ important to acknowledge that the ES6 method is a more concise solution to this\
    \ problem, but there may be instances where an IIFE is a better approach.\n\n\
    ## Moving Forward With JavaScript Closures\n\nTo progress in your understanding\
    \ of closures in JavaScript, it is essential to practice the concepts you've learned.\
    \ Since closures can be complex, it's especially critical to experiment with creating\
    \ closures in various situations. Closures can be used to achieve a variety of\
    \ tasks that would otherwise be challenging. Recognizing closures is the most\
    \ excellent way to cement your understanding of how they work and how to implement\
    \ them.\n\n## Chapter 8: Prototypes\n\nPrototypes in JavaScript are a fundamental\
    \ part of the language's object-oriented nature. Every object in JavaScript has\
    \ a prototype, which is used as a guide or template when making new objects. An\
    \ object that serves as the model for other objects' functions and properties\
    \ is called a prototype.\n\nJavaScript's approach to OOP heavily relies on prototypes.\
    \ By enabling object inheritance, they make it possible for objects to reuse and\
    \ share the attributes and functions specified in their prototypes.\n\nWhen an\
    \ object needs to access a property or method that it doesn't have, JavaScript\
    \ searches the prototype chain to locate a property or method in its prototype\
    \ and its prototype's prototype, and so on, until it reaches the top-level prototype.\n\
    \nUsing prototypes in JavaScript offers several advantages:\n\n### Code reusability\n\
    \nPrototypes allow you to define properties and methods once in a prototype and\
    \ have all instances of objects derived from that prototype share those properties\
    \ and methods. This promotes code reusability and helps avoid duplication.\n\n\
    ### Dynamic property assignment\n\nPrototypes allow you to add or modify properties\
    \ and methods dynamically at runtime. This flexibility enables you to extend the\
    \ functionality of objects even after they have been instantiated.\n\n### Memory\
    \ efficiency\n\nWhen multiple objects share the same prototype, they reference\
    \ the prototype's properties and methods rather than duplicating them. This results\
    \ in memory efficiency as the shared properties and methods are stored in a single\
    \ location in memory.\n\n### Easy object modification\n\nBy modifying the properties\
    \ and methods in a prototype, you can apply changes to all objects derived from\
    \ that prototype. This simplifies the process of making modifications to object\
    \ behavior and reduces the need for updating individual objects.\n\n### Prototype\
    \ chaining and inheritance\n\nPrototypes form a hierarchical chain known as the\
    \ prototype chain. This enables objects to inherit properties and methods from\
    \ their prototypes, allowing for the implementation of inheritance patterns and\
    \ the creation of object hierarchies.\n\nBy leveraging prototypes, you can create\
    \ more efficient and flexible code structures, improve code reuse, and take advantage\
    \ of the dynamic nature of JavaScript to build powerful and scalable applications.\n\
    \n## Prototype Chain\n\nIn JavaScript, objects can inherit properties and functions\
    \ from their prototypes. Once an object is created, it is linked to a prototype\
    \ object. If a property or method is not found on the object itself, JavaScript\
    \ looks for it in the object's prototype. If it still doesn't find it, the search\
    \ continues up the prototype chain until it hits the top-level prototype, **Object.prototype**.\
    \ This chain of prototypes establishes the inheritance hierarchy in JavaScript.\
    \ For example, consider an object **person** created using the following code:\n\
    \n```javascript\nconst person = {\n  name: 'Mike',\n  age: 30,\n};\n```\n\nIf\
    \ you access **person.name**, JavaScript finds the **name** property directly\
    \ on the **person** object. However, if you access **person.toString()**, JavaScript\
    \ doesn't find the **toString()** method on person itself. It continues up the\
    \ prototype chain and finds it in **Object.prototype**, which is inherited by\
    \ all objects.\n\n## Prototypal inheritance\n\nPrototypal inheritance is the mechanism\
    \ by which objects inherit properties and methods from their prototypes.\n\nLet's\
    \ illustrate prototypal inheritance using constructor functions:\n\n```javascript\n\
    function Person(name, age) {\n  this.name = name;\n  this.age = age;\n}\n\nPerson.prototype.sayHello\
    \ = function() {\n  console.log(`Hello, my name is ${this.name}.`);\n};\n\nconst\
    \ person1 = new Person('Mike', 30);\nperson1.sayHello(); // Output: Hello, my\
    \ name is Mike.\n```\n\nIn this example, **`Person.prototype`** contains the **`sayHello()`**\
    \ method. When **`person1`** is created using the **`Person`** constructor, it\
    \ inherits the **`sayHello()`** method from **`Person.prototype`**. Thus, **`person1`**\
    \ can access and invoke the **`sayHello()`** method.\n\n## Creating and Using\
    \ Prototypes\n\nPrototypes in JavaScript are created through constructor functions.\
    \ To distinguish constructor functions from normal functions, they are usually\
    \ named with an uppercase letter at the beginning. When a constructor function\
    \ is called with the **new** keyword, it generates a new object and assigns its\
    \ prototype to the constructor's prototype property.\n\nLet's see an example of\
    \ creating a prototype for the object **Person** using a constructor function:\n\
    \n```javascript\nfunction Person(name, age) {\n  this.name = name;\n  this.age\
    \ = age;\n}\n\nconst personPrototype = new Person();\n```\n\nIn this above example,\
    \ the **Person** constructor function provides the name and age attributes. The\
    \ **personPrototype** object is generated by using the **Person** constructor\
    \ without specifying any parameters. It serves as a prototype for future objects\
    \ generated using the **Person** constructor.\n\nOnce a prototype has been established,\
    \ you may add attributes and methods to it. Any objects derived from the same\
    \ prototype will inherit these attributes and methods.\n\nContinuing with the\
    \ **Person** example, let's add a **sayHello** method to the **personPrototype**:\n\
    \n```javascript\npersonPrototype.sayHello = function() {\n  console.log(`Hello,\
    \ my name is ${this.name}.`);\n};\n```\n\nNow, any objects created from the **personPrototype**\
    \ will have the **sayHello** method available.\n\n## Instantiating objects from\
    \ prototypes\n\nTo create new objects that inherit from a prototype, you can use\
    \ the **Object.create()** method or the constructor function with the **new**\
    \ keyword.\n\nUsing the **Object.create()** method:\n\n```javascript\nconst person1\
    \ = Object.create(personPrototype);\nperson1.name = \"Mike\";\nperson1.age = 30;\n\
    ```\n\nIn this example, **person1** is created by using **Object.create()** and\
    \ passing **personPrototype** as the prototype. The **name** and **age** properties\
    \ are then added directly to **person1**.\n\nUsing the constructor function:\n\
    \n```javascript\nconst person2 = new Person(\"Jane\", 25);\n```\n\nThe **Person**\
    \ constructor is used to create **person2** with the **name** and **age** properties.\n\
    \n**Person1** and **Person2** inherit the properties and methods provided in **'personPrototype'**.\n\
    \n## Chapter 9: The Document Object Model (DOM)\n\nThe Document Object Model (DOM)\
    \ is an API for web documents that provides a programming interface. It models\
    \ the webpage, enabling programs to modify the document's structure, style, and\
    \ content. The DOM represents the document as a collection of nodes and objects,\
    \ enabling developers to interact with and manipulate the webpage using JavaScript.\
    \ The items have been arranged in a hierarchical fashion. When it comes to the\
    \ organizing of items on a Web page, this hierarchical structure is the one to\
    \ choose.\n\n- The Window object - Represents the highest level in the hierarchy.\
    \ The very last component of the object hierarchy is this very item.\n- Document\
    \ Object - Any HTML page that is imported into a window is converted into an object\
    \ of type document. The information that is on the page is included in the document.\n\
    - Form object - Anything that is included within the `<form>...</form>` tags is\
    \ considered to be part of the form object.\n- Control elements - The form object\
    \ includes all of the components that have been specified for that object, including\
    \ buttons, radio buttons, text fields, and checks.\n\nThere are a few different\
    \ DOMs active in the world nowadays. In the next sections, each of these Document\
    \ Object Models (DOMs) will have its own detailed explanation, as well as a description\
    \ of how you may use it to access and alter document content.\n\nWhen a web page\
    \ loads, the browser creates a hierarchical tree-like structure, known as the\
    \ DOM tree that represents the structure of the document. Each element in the\
    \ HTML code is treated as a node in the tree. The top node in the tree is the\
    \ document object, representing the entire web page.\n\nJavaScript can be used\
    \ to manipulate the DOM, allowing developers to modify the content, attributes,\
    \ and styles of the webpage dynamically."
  mdcn: "## IIFE 与闭包\n\n为避免循环中的闭包问题，一个替代方案是利用 IIFE（立即调用函数表达式）的语法。这涉及在循环开始运行时立即调用 setTimeout\
    \ 函数，而不是等待循环完成后再执行代码。通过这样做，setTimeout 函数就能按预期工作。以下是 IIFE 语法的一个示例。\n\n```javascript\n\
    for(var id=1; id<=3; id++){\n    (function(id){\n        setTimeout(function(){\n\
    \            console.log('seconds: ' + id);\n        }, id * 1000);\n    })(id)\n\
    }\n```\n\n## 输出\n\n```\nseconds: 1\nseconds: 2\nseconds: 3\n```\n\n提供的代码运行循环，在每次迭代中立即调用函数。这导致\
    \ setTimeout 函数立即启动，并为每次迭代保留 id 的状态。需要认识到，ES6 方法是解决此问题的更简洁方案，但在某些情况下，IIFE 可能是更好的方法。\n\
    \n## 进阶学习 JavaScript 闭包\n\n要加深对 JavaScript 闭包的理解，练习所学概念至关重要。由于闭包可能很复杂，因此在各种情况下尝试创建闭包尤其关键。闭包可用于完成许多原本具有挑战性的任务。识别闭包是巩固你对其工作原理和实现方式理解的最佳途径。\n\
    \n## 第 8 章：原型\n\nJavaScript 中的原型是其面向对象特性的基本组成部分。JavaScript 中的每个对象都有一个原型，该原型在创建新对象时用作指南或模板。作为其他对象功能和属性模型的对象称为原型。\n\
    \nJavaScript 的面向对象编程方法严重依赖原型。通过实现对象继承，它们使得对象能够重用和共享其原型中指定的属性和函数。\n\n当对象需要访问其自身没有的属性或方法时，JavaScript\
    \ 会搜索原型链，以在其原型及其原型的原型中查找属性或方法，依此类推，直到到达顶层原型。\n\n在 JavaScript 中使用原型有几个优点：\n\n###\
    \ 代码可重用性\n\n原型允许你在原型中定义一次属性和方法，并让从该原型派生的所有对象实例共享这些属性和方法。这促进了代码重用，并有助于避免重复。\n\n\
    ### 动态属性分配\n\n原型允许你在运行时动态添加或修改属性和方法。这种灵活性使你能够在对象实例化后扩展其功能。\n\n### 内存效率\n\n当多个对象共享同一个原型时，它们引用原型的属性和方法，而不是复制它们。这提高了内存效率，因为共享的属性和方法存储在内存中的单个位置。\n\
    \n### 易于修改对象\n\n通过修改原型中的属性和方法，你可以将更改应用于从该原型派生的所有对象。这简化了修改对象行为的过程，并减少了更新单个对象的需要。\n\
    \n### 原型链与继承\n\n原型形成一个称为原型链的分层链。这使得对象能够从其原型继承属性和方法，从而实现继承模式和创建对象层次结构。\n\n通过利用原型，你可以创建更高效、更灵活的代码结构，提高代码重用性，并利用\
    \ JavaScript 的动态特性构建强大且可扩展的应用程序。\n\n## 原型链\n\n在 JavaScript 中，对象可以从其原型继承属性和函数。一旦对象被创建，它就与一个原型对象相关联。如果在对象本身上找不到属性或方法，JavaScript\
    \ 会在对象的原型中查找。如果仍然找不到，则搜索会沿着原型链向上继续，直到到达顶层原型 **Object.prototype**。这条原型链确立了 JavaScript\
    \ 中的继承层次结构。例如，考虑使用以下代码创建的对象 **person**：\n\n```javascript\nconst person = {\n \
    \ name: 'Mike',\n  age: 30,\n};\n```\n\n如果你访问 **person.name**，JavaScript 会直接在\
    \ **person** 对象上找到 **name** 属性。但是，如果你访问 **person.toString()**，JavaScript 在 person\
    \ 本身上找不到 **toString()** 方法。它会沿着原型链向上查找，并在 **Object.prototype** 中找到它，该原型被所有对象继承。\n\
    \n## 原型继承\n\n原型继承是对象从其原型继承属性和方法的机制。\n\n让我们使用构造函数来说明原型继承：\n\n```javascript\nfunction\
    \ Person(name, age) {\n  this.name = name;\n  this.age = age;\n}\n\nPerson.prototype.sayHello\
    \ = function() {\n  console.log(`Hello, my name is ${this.name}.`);\n};\n\nconst\
    \ person1 = new Person('Mike', 30);\nperson1.sayHello(); // 输出：Hello, my name\
    \ is Mike.\n```\n\n在这个例子中，**`Person.prototype`** 包含 **`sayHello()`** 方法。当使用 **`Person`**\
    \ 构造函数创建 **`person1`** 时，它从 **`Person.prototype`** 继承了 **`sayHello()`** 方法。因此，**`person1`**\
    \ 可以访问并调用 **`sayHello()`** 方法。\n\n## 创建和使用原型\n\nJavaScript 中的原型是通过构造函数创建的。为了将构造函数与普通函数区分开来，它们通常以大写字母开头命名。当使用\
    \ **new** 关键字调用构造函数时，它会生成一个新对象，并将其原型分配给构造函数的 prototype 属性。\n\n让我们看一个使用构造函数为对象\
    \ **Person** 创建原型的例子：\n\n```javascript\nfunction Person(name, age) {\n  this.name\
    \ = name;\n  this.age = age;\n}\n\nconst personPrototype = new Person();\n```\n\
    \n在上面的例子中，**Person** 构造函数提供了 name 和 age 属性。**personPrototype** 对象是通过使用 **Person**\
    \ 构造函数而不指定任何参数生成的。它作为使用 **Person** 构造函数生成的未来对象的原型。\n\n一旦建立了原型，你就可以向其添加属性和方法。从同一原型派生的任何对象都将继承这些属性和方法。\n\
    \n继续使用 **Person** 的例子，让我们向 **personPrototype** 添加一个 **sayHello** 方法：\n\n```javascript\n\
    personPrototype.sayHello = function() {\n  console.log(`Hello, my name is ${this.name}.`);\n\
    };\n```\n\n现在，从 **personPrototype** 创建的任何对象都将拥有 **sayHello** 方法。\n\n## 从原型实例化对象\n\
    \n要创建从原型继承的新对象，你可以使用 **Object.create()** 方法或使用 **new** 关键字的构造函数。\n\n使用 **Object.create()**\
    \ 方法：\n\n```javascript\nconst person1 = Object.create(personPrototype);\nperson1.name\
    \ = \"Mike\";\nperson1.age = 30;\n```\n\n在这个例子中，**person1** 是通过使用 **Object.create()**\
    \ 并传递 **personPrototype** 作为原型创建的。然后将 **name** 和 **age** 属性直接添加到 **person1**。\n\
    \n使用构造函数：\n\n```javascript\nconst person2 = new Person(\"Jane\", 25);\n```\n\n\
    使用 **Person** 构造函数创建具有 **name** 和 **age** 属性的 **person2**。\n\n**Person1** 和 **Person2**\
    \ 继承了 **'personPrototype'** 中提供的属性和方法。\n\n## 第 9 章：文档对象模型（DOM）\n\n文档对象模型（DOM）是一个用于\
    \ Web 文档的 API，它提供了一个编程接口。它对网页进行建模，使程序能够修改文档的结构、样式和内容。DOM 将文档表示为节点和对象的集合，使开发人员能够使用\
    \ JavaScript 与网页交互并对其进行操作。这些项目以分层方式排列。在组织网页上的项目时，这种分层结构是首选。\n\n- Window 对象 - 代表层次结构中的最高级别。这是对象层次结构的最后一个组件。\n\
    - Document 对象 - 导入到窗口中的任何 HTML 页面都会转换为 document 类型的对象。页面上的信息包含在 document 中。\n\
    - Form 对象 - 包含在 `<form>...</form>` 标签内的任何内容都被视为 form 对象的一部分。\n- 控件元素 - form 对象包括为该对象指定的所有组件，包括按钮、单选按钮、文本字段和复选框。\n\
    \n当今世界有几种不同的 DOM 在活跃使用。在接下来的章节中，将对每种文档对象模型（DOM）进行详细解释，并描述如何使用它来访问和更改文档内容。\n\n\
    当网页加载时，浏览器会创建一个分层的树状结构，称为 DOM 树，它代表文档的结构。HTML 代码中的每个元素都被视为树中的一个节点。树中的顶层节点是 document\
    \ 对象，代表整个网页。\n\nJavaScript 可用于操作 DOM，允许开发人员动态修改网页的内容、属性和样式。"
