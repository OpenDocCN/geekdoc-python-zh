    \ have access to the object's properties through the ‘this’ keyword. Within the\
    \ method, you can access the properties of the current object instance by using\
    \ the 'this' keyword. This allows the method to work with the data of that particular\
    \ object. For example:\n\n```\nconst person = {\n  name: 'Mike',\n  age: 25,\n\
    \  introduce: function() {\n    console.log('My name is ' + this.name + ' and\
    \ I am ' + this.age + ' years old.');\n  },\n};\n\nperson.introduce(); // Output:\
    \ My name is Mike and I am 25 years old.\n```\n\n‘this’ is an important keyword\
    \ in object methods. It denotes the object on which the method is called and offers\
    \ access to and manipulation of the object's properties along with access to other\
    \ methods. The value of ‘this’ is set dynamically at runtime based on how the\
    \ method is called. This is the actual object when a method is called with dot\
    \ notation, like 'object.method()'.\n\nWorking with object methods allows you\
    \ to define reusable behavior associated with objects. Methods enable objects\
    \ to perform specific actions, access and modify their own properties, and interact\
    \ with other objects or the environment.\n\n## Object Iteration and Manipulation\n\
    \nLooping through object properties allows you to iterate over the properties\
    \ of an object and perform operations on them. ‘for...in’ loop and ‘Object.keys()’\
    \ are two methods for object iteration in JavaScript. For example:\n\n```\nconst\
    \ person = {\n    name: 'Mike',\n    age: 25,\n    occupation: 'Engineer'\n};\n\
    \n// Using for...in loop\nfor (let key in person) {\n    console.log(key + ':\
    \ ' + person[key]);\n}\n\n// Using Object.keys()\nconst keys = Object.keys(person);\n\
    keys.forEach(key => {\n    console.log(key + ': ' + person[key]);\n});\n```\n\n\
    **Output**\n\n```\nname: Mike\nage: 25\noccupation: Engineer\nname: Mike\nage:\
    \ 25\noccupation: Engineer\n```\n\n### Object property enumeration\n\nObject property\
    \ enumeration refers to the process of listing all properties of an object. JavaScript\
    \ provides methods like `Object.keys()`, `Object.values()`, and `Object.entries()`\
    \ to extract specific information about an object's properties. For example:\n\
    \n```\nconst person = {\n    name: 'Mike',\n    age: 25,\n    occupation: 'Engineer'\n\
    };\n\nconst keys = Object.keys(person);\nconst values = Object.values(person);\n\
    const entries = Object.entries(person);\n\nconsole.log(keys);\nconsole.log(values);\n\
    console.log(entries);\n```\n\n**Output**\n\n```\n[ 'name', 'age', 'occupation'\
    \ ]\n[ 'Mike', 25, 'Engineer' ]\n[ [ 'name', 'Mike' ], [ 'age', 25 ], [ 'occupation',\
    \ 'Engineer' ] ]\n```\n\nThese methods allow you to extract the keys, values,\
    \ or entries of an object, providing flexibility in how you access and manipulate\
    \ its properties.\n\n### Adding, removing, and modifying object properties dynamically\n\
    \nJavaScript allows you to dynamically add, remove, and modify object properties\
    \ at runtime. You can add a new property by simply assigning a value to a new\
    \ key, remove a property using the ‘delete’ keyword, and modify an existing property\
    \ by reassigning its value. For example:\n\n```\nconst person = {\n  name: 'Mike',\n\
    \  age: 25\n};\n\nperson.occupation = 'Engineer'; // Adding a new property\nconsole.log(person);\
    \ // Output: { name: 'Mike', age: 25, occupation: 'Engineer' }\n\ndelete person.age;\
    \ // Removing a property\nconsole.log(person); // Output: { name: 'Mike', occupation:\
    \ 'Engineer' }\n\nperson.name = 'Jane'; // Modifying an existing property\nconsole.log(person);\
    \ // Output: { name: 'Jane', occupation: 'Engineer' }\n```\n\nDynamically manipulating\
    \ object properties allows you to adapt and update the object's data as needed\
    \ during the execution of your program.\n\n## Working with Built-in Objects\n\n\
    JavaScript provides a set of built-in objects that offer a wide range of functionalities\
    \ for performing common tasks. Some of the commonly used built-in objects include\
    \ Math, Date, and Array.\n\n### Math Object\n\nThe Math object in JavaScript provides\
    \ mathematical operations and functions. It allows you to perform operations like\
    \ rounding numbers, generating random numbers, calculating trigonometric values,\
    \ and more. The Math object does not require instantiation and can be accessed\
    \ directly using the Math keyword.\n\n### Date Object"
  mdcn: "减少冗余，使你的代码更具模块化，从而实现更高效的开发和更便捷的维护。\n\n## 面向对象编程原则\n\n对象是面向对象编程的基本方面。理解并使用对象，使你能够利用关键的面向对象编程原则，如封装、继承和多态，这些对于编写清晰、可扩展和可维护的代码至关重要。\n\
    \n通过掌握 JavaScript 中的对象，你获得了一套强大的工具集，用于组织和操作数据、建模复杂系统，以及开发高效且可扩展的应用程序。\n\n## 创建对象\n\
    \n### 对象字面量及其语法\n\n对象字面量提供了一种在 JavaScript 中创建对象的直接方式。它们允许你使用键值对语法，在花括号（`{}`）内直接定义一个对象及其属性。键代表属性名，后跟一个冒号（`:`），值代表与该属性关联的数据。可以在对象字面量内定义多个属性，用逗号分隔。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 25,\n  address: '123 Main St',\n\
    };\n```\n\n除了对象字面量，你还可以使用 `new` 关键字和构造函数来创建对象。构造函数是用作构建新对象模板的普通函数。它们使用 `function`\
    \ 关键字定义，并通常按照帕斯卡命名法（PascalCase）的惯例命名。使用 `this` 关键字（它指向正在形成的对象），你可以在构造函数内声明对象属性。\n\
    \n这是一个例子：\n\n```\nfunction Person(name, age, address) {\n  this.name = name;\n\
    \  this.age = age;\n  this.address = address;\n}\n\nconst Mike = new Person('Mike',\
    \ 25, '123 Main St');\n```\n\n### 对象属性和方法\n\n对象由属性和方法组成。属性是指定对象特征并存储值的变量。你可以使用点表示法或方括号表示法来访问它们。例如，`person.name`\
    \ 或 `person['name']` 可用于访问先前构建的 `person` 对象的 `name` 属性。另一方面，与对象关联的函数称为方法。它们可以直接在对象字面量内定义，也可以动态添加到对象上。方法允许对象执行动作或任务。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 25,\n  greet: function() {\n\
    \    console.log('Hello, I am ' + this.name);\n  },\n};\n\nperson.greet(); //\
    \ 输出：Hello, I am Mike\n```\n\n理解如何创建对象、定义属性和添加方法对于在 JavaScript 中有效使用对象至关重要。它允许你创建自定义数据结构并定义与这些对象相关联的行为。\n\
    \n## 访问和修改对象属性\n\n如前所述，访问对象属性时，你有两种选择：点表示法和方括号表示法。点表示法是最常见和直接的访问属性的方式。只需使用点运算符后跟属性名。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 25,\n};\n\nconsole.log(person.name);\
    \ // 输出：Mike\n```\n\n另一方面，方括号表示法使用方括号，允许你动态访问属性，或在属性名包含特殊字符或空格时使用。属性名在括号内指定为字符串。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 25,\n};\n\nconsole.log(person['name']);\
    \ // 输出：Mike\n```\n\n### 嵌套对象属性\n\n对象可以具有嵌套结构，这意味着一个对象可以包含也是对象的属性。你可以使用方括号表示法或链式点表示法来访问嵌套对象内的属性。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 28,\n  address: {\n    street:\
    \ '616 Burgess St',\n    city: 'New Hampshire',\n  },\n};\n\nconsole.log(person.address.street);\
    \ // 输出：616 Burgess St\n```\n\n### 修改对象属性\n\n你可以通过赋予新值来更改对象的属性。你可以使用点表示法或方括号表示法来修改属性。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 28,\n};\n\nperson.age = 32; //\
    \ 修改 'age' 属性\nconsole.log(person.age); // 输出：32\n\nperson['name'] = 'Jane'; //\
    \ 修改 'name' 属性\nconsole.log(person.name); // 输出：Jane\n```\n\n需要注意的是，修改对象属性时，更改会直接反映在对象本身中。\n\
    \n## 使用对象方法\n\n对象方法是链接到对象的函数，可用于执行特定任务。方法可以直接在对象字面量内定义，也可以动态添加到对象上。要定义方法，你将一个函数赋值给一个属性作为其值。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 25,\n  greet: function() {\n\
    \    console.log('Hello, my name is ' + this.name);\n  },\n};\n\nperson.greet();\
    \ // 输出：Hello, my name is Mike\n```\n\n要调用方法，你使用点表示法，后跟方法名和括号。在上面的例子中，`person.greet()`\
    \ 调用了 `greet` 方法。\n\n### 在方法内访问对象属性\n\n对象方法可以通过 `this` 关键字访问对象的属性。在方法内部，你可以使用\
    \ `this` 关键字访问当前对象实例的属性。这允许方法处理该特定对象的数据。例如：\n\n```\nconst person = {\n  name:\
    \ 'Mike',\n  age: 25,\n  introduce: function() {\n    console.log('My name is\
    \ ' + this.name + ' and I am ' + this.age + ' years old.');\n  },\n};\n\nperson.introduce();\
    \ // 输出：My name is Mike and I am 25 years old.\n```\n\n`this` 是对象方法中的一个重要关键字。它表示调用该方法的对象，并提供对该对象属性的访问和操作，以及对其他方法的访问。`this`\
    \ 的值在运行时根据方法的调用方式动态设置。当使用点表示法调用方法时（如 `object.method()`），`this` 就是实际的对象。\n\n使用对象方法允许你定义与对象相关联的可重用行为。方法使对象能够执行特定操作、访问和修改自身属性，以及与其他对象或环境交互。\n\
    \n## 对象迭代和操作\n\n遍历对象属性允许你迭代对象的属性并对其执行操作。`for...in` 循环和 `Object.keys()` 是 JavaScript\
    \ 中用于对象迭代的两种方法。例如：\n\n```\nconst person = {\n    name: 'Mike',\n    age: 25,\n\
    \    occupation: 'Engineer'\n};\n\n// 使用 for...in 循环\nfor (let key in person)\
    \ {\n    console.log(key + ': ' + person[key]);\n}\n\n// 使用 Object.keys()\nconst\
    \ keys = Object.keys(person);\nkeys.forEach(key => {\n    console.log(key + ':\
    \ ' + person[key]);\n});\n```\n\n**输出**\n\n```\nname: Mike\nage: 25\noccupation:\
    \ Engineer\nname: Mike\nage: 25\noccupation: Engineer\n```\n\n### 对象属性枚举\n\n对象属性枚举是指列出对象所有属性的过程。JavaScript\
    \ 提供了 `Object.keys()`、`Object.values()` 和 `Object.entries()` 等方法来提取对象属性的特定信息。例如：\n\
    \n```\nconst person = {\n    name: 'Mike',\n    age: 25,\n    occupation: 'Engineer'\n\
    };\n\nconst keys = Object.keys(person);\nconst values = Object.values(person);\n\
    const entries = Object.entries(person);\n\nconsole.log(keys);\nconsole.log(values);\n\
    console.log(entries);\n```\n\n**输出**\n\n```\n[ 'name', 'age', 'occupation' ]\n\
    [ 'Mike', 25, 'Engineer' ]\n[ [ 'name', 'Mike' ], [ 'age', 25 ], [ 'occupation',\
    \ 'Engineer' ] ]\n```\n\n这些方法允许你提取对象的键、值或条目，为你访问和操作其属性提供了灵活性。\n\n### 动态添加、删除和修改对象属性\n\
    \nJavaScript 允许你在运行时动态添加、删除和修改对象属性。你可以通过简单地为新键赋值来添加新属性，使用 `delete` 关键字删除属性，以及通过重新赋值来修改现有属性。例如：\n\
    \n```\nconst person = {\n  name: 'Mike',\n  age: 25\n};\n\nperson.occupation =\
    \ 'Engineer'; // 添加新属性\nconsole.log(person); // 输出：{ name: 'Mike', age: 25, occupation:\
    \ 'Engineer' }\n\ndelete person.age; // 删除属性\nconsole.log(person); // 输出：{ name:\
    \ 'Mike', occupation: 'Engineer' }\n\nperson.name = 'Jane'; // 修改现有属性\nconsole.log(person);\
    \ // 输出：{ name: 'Jane', occupation: 'Engineer' }\n```\n\n动态操作对象属性允许你在程序执行期间根据需要调整和更新对象的数据。\n\
    \n## 使用内置对象\n\nJavaScript 提供了一组内置对象，为执行常见任务提供了广泛的功能。一些常用的内置对象包括 `Math`、`Date`\
    \ 和 `Array`。\n\n### Math 对象\n\nJavaScript 中的 `Math` 对象提供数学运算和函数。它允许你执行诸如四舍五入数字、生成随机数、计算三角函数值等操作。`Math`\
    \ 对象不需要实例化，可以直接使用 `Math` 关键字访问。\n\n### Date 对象"
