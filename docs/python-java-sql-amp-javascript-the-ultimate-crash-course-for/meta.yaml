    \n循环可以在短时间内完成大量复杂的编程逻辑。虽然它们在许多情况下很有用，但它们会消耗大量的运行时内存，导致程序意外崩溃。\n为了解决这个问题，Python\
    \ 提供了两个称为 break 和 continue 的编程组件。\n\n## Break 语句\n\n当 Python 解释器在程序中遇到 'break'\
    \ 时，它会立即结束循环并移动到循环之后的下一行。任何时候在循环内部发生 'break'，循环都会结束，并且将执行下一条语句。\n语法：\nbreak\n\n\
    ## 示例程序：\n\n```\nM = 10\nj = 1\nwhile j <= M:\n    if j %2 == 0:\n        print(j,\
    \ \"is divisible by 2 \")\n    if j % 3 == 0:\n        print(j, \"is divisible\
    \ by 3 \")\n        break\n    j = j + 1\n```\n\n## 输出：\n\n```\n2 is divisible\
    \ by 2\n3 is divisible by 3\n```\n\n当解释器在前面的示例中读取 break 语句时，程序将结束。如果没有 'break'，输出会是什么？（提示：所有\
    \ <= 10 且能被 2 和 3 整除的数字...）。\n\n## Continue 语句？\n\n当 Python 解释器在程序中遇到 'continue'\
    \ 时，它会立即结束当前循环迭代并移动到下一次迭代。请记住，此语句不会完全结束循环。继续执行循环中的下一条逻辑语句只会节省时间和处理资源。\n\n## 示例程序：\n\
    \n```\nfor letter in 'Productivity':\n    if letter == 't':\n        continue\n\
    \    print('Letter now:', letter)\n```\n\n## 输出：\n\n```\nLetter now: P\nLetter\
    \ now: r\nLetter now: o\nLetter now: d\nLetter now: u\nLetter now: c\nLetter now:\
    \ i\nLetter now: v\nLetter now: i\nLetter now: y\n```\n\n## 练习\n\n- 1. 编写一个程序，要求用户输入一个整数，并计算给定数字的阶乘。使用\
