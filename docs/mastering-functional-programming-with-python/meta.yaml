    \n### 纯函数的缺点\n\n-   **对副作用操作的限制**：某些操作本质上涉及副作用，例如读写文件、发起网络请求或更新用户界面。纯粹地实现这些任务可能需要额外的抽象层，从而使代码复杂化。\n\
