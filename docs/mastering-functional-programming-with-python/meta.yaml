    as a predictable mapping between a specific set of inputs and their corresponding
    output. For a function f that takes an input x, the output f(x) remains consistent
    irrespective of external circumstances. This consistency is not just a theoretical
    ideal but a practical tool for reasoning about the behavior of programs.


    Consider the example of a pure function that squares a number:


    ```

    1 def square(x):

    2     return x * x

    ```


