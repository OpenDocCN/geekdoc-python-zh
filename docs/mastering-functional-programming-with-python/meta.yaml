    # 5.10 Performance Considerations with Higher-Order Functions


    In the context of higher-order functions, a crucial consideration is performance.
    The use of functions as first-class citizens, while offering flexibility and expressiveness,
    can introduce overheads absent in more straightforward iterative approaches. Understanding
    these performance implications is essential for writing efficient code that harnesses
    the power of higher-order functions without unnecessary sacrifices in execution
    speed or resource utilization.


    Firstly, it''s imperative to acknowledge that function calls in Python are not
    free. Each call involves creating a new stack frame, performing the actual call,
    and then returning the result. When higher-order functions are used, especially
    in nested or repeated patterns, the overhead associated with these calls can accumulate,
    leading to reduced performance compared to loop-based counterparts.


    Example of Higher-Order Function Performance Overhead:'
  - '[PAGE 196]


    ```

    # Using ''map'' to square elements

    numbers = range(1, 1000000)

    result = map(lambda x: x**2, numbers)

    ```


    In the above example, the map function takes a lambda expression and a list of
    numbers, returning an iterator that applies the lambda to each number. While elegant,
    each application of the lambda involves function call overheads, which can be
    significant over large datasets.


    To quantify the performance considerations, let''s compare the execution time
    of the map approach with that of a loop achieving the same result.


    ```

    import time


    # Higher-order function approach

    start_time = time.time()

    result = list(map(lambda x: x**2, numbers))

    print("Higher-order function time:", time.time() - start_time)


    # Loop-based approach

    start_time = time.time()

    result = [x**2 for x in numbers]

    print("Loop-based time:", time.time() - start_time)

    ```'
