    \ provide an elegant means to create iterators without the overhead of storing\
    \ the entire dataset in memory at once. This section delves into the nuances of\
    \ achieving memory efficiency through lazy evaluation in Python, focusing on generators\
    \ and their role in conserving memory.\n\nGenerators are created using functions\
    \ and the `yield` keyword. Unlike regular functions that return a value and exit,\
