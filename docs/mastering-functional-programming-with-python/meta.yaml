    \n## 6.7 operator模块：内置运算符的函数式接口\n\nPython中的`operator`模块为语言的内置运算符提供了函数式接口。该模块不使用`+`、`-`、`*`、`/`等语法运算符进行算术运算，或使用`>`、`<`进行比较，而是提供了函数等价物。这些函数对应物在函数式编程范式中至关重要，尤其是在函数作为参数传递时。\n\
    \n例如，考虑加法运算符（`+`）。`operator`模块提供了一个名为`add`的函数，可以如下使用：\n\n```python\nimport operator\n\
    result = operator.add(1, 2) # 等价于 1 + 2\n```\n\n这种函数式方法有几个优点。首先，它允许高阶函数将数学运算作为参数。其次，在函数式范式占主导地位的上下文中，它使代码的意图更加清晰。\n\
    \n`operator`模块将其函数分为几类：算术运算、比较运算、序列操作和就地操作。以下是说明这些类别用法的示例。\n\n- **算术运算：** 像`add()`、`sub()`（减法）、`mul()`（乘法）和`div()`（除法）这样的函数属于此类。它们可以用来替代各自的运算符。\n\
    \n```python\n# 乘法示例\nresult = operator.mul(3, 10) # 等价于 3 * 10\n```\n\n- **比较运算：**\
    \ 这包括`eq()`（等于）、`ne()`（不等于）、`lt()`（小于）和`gt()`（大于）等函数。\n\n```python\n# 比较示例\nis_greater\
    \ = operator.gt(5, 3) # 等价于 5 > 3\n```\n\n- **序列操作：** 像`getitem()`、`setitem()`和`delitem()`这样的函数分别提供了访问、赋值和删除序列中元素的方法。\n\
    \n```python\n# 访问列表中的项目\nitem = operator.getitem([1, 2, 3], 1) # 等价于 [1, 2, 3][1]\n\
    ```\n\n- **就地操作：** 这些函数，如`iadd()`（就地加法）和`isub()`（就地减法），执行操作并将结果赋回左操作数。\n\n```python\n\
    # 就地加法\na = 1\noperator.iadd(a, 2) # 等价于 a += 2\n```\n\n除了上述内容，`operator`模块还包括逻辑运算（例如`and_()`、`or_()`），允许对逻辑表达式进行函数式应用。\n\
    \n`operator`模块提供的更强大功能之一是函数组合和链式调用的概念。通过函数组合，可以从更简单的函数构建复杂的操作。这促进了代码重用和模块化，这是函数式编程的标志。\n\
    \n```python\nresult = operator.mul(operator.add(2, 3), 5)\n```\n\n这里，首先计算2和3的和，然后将结果乘以5。\n\
    \n使用`operator`模块符合函数式编程的不可变性和无状态性原则，鼓励使用纯函数而不是直接操作变量。它是Python标准库中用于函数式编程的关键工具，使操作不仅更加抽象，而且便于构建高阶函数。\n\
    \n## 6.8 使用装饰器进行函数式组合和记忆化\n\nPython中的装饰器是修改函数或方法行为的强大工具。它们允许进行函数式组合，并且对于实现记忆化（一种用于缓存昂贵函数调用结果的技术）非常有用。本节深入探讨装饰器如何通过提供一种简洁且可读的方式来扩展函数功能，而不改变其核心逻辑，从而增强函数式编程。\n\
    \n首先，函数式组合是将两个或多个函数组合以创建一个新函数的过程。这个新函数能够按照特定顺序执行原始函数的组合操作。让我们看看装饰器如何在Python中促进函数式组合。考虑两个函数`f`和`g`，其中`g`的结果作为参数传递给`f`：\n\
    \n```python\ndef f(x):\n    return x + 2\n\ndef g(x):\n    return x * 3\n\ndef\
    \ compose(f, g):\n    def inner(x):\n        return f(g(x))\n    return inner\n\
    \ncomposed_function = compose(f, g)\nprint(composed_function(5)) # 输出: 17\n```\n\
    \n虽然上面的例子通过手动方式展示了函数式组合，但装饰器可以通过更优雅的方式进行组合来简化这一点：\n\n```python\ndef compose(f):\n\
    \    def wrapper(g):\n        def inner(x):\n            return f(g(x))\n    \
    \    return inner\n    return wrapper\n\n@compose\ndef f(x):\n    return x + 2\n\
    \n@f\ndef g(x):\n    return x * 3\n\nprint(g(5)) # 输出: 17\n```\n\n接下来，记忆化是一种用于存储昂贵函数调用结果的技术，并在相同输入再次出现时返回缓存的结果。这对于优化具有昂贵或迭代计算的函数特别有用。Python装饰器可用于实现记忆化：\n\
    \n```python\ndef memoize(func):\n    cache = {}\n    def wrapper(*args):\n   \
    \     if args in cache:\n            return cache[args]\n        else:\n     \
    \       result = func(*args)\n            cache[args] = result\n            return\
    \ result\n    return wrapper\n```"
