    # The map Function


    The map function applies a specified function to each item of an iterable (like
    list, tuple) and returns an iterator. This function is typically used to perform
    some operation on each element of the collection and generate a new collection
    containing the results. The syntax of map is as follows:


    ```

    1 map(function, iterable, ...)

    ```


    Here, function is a single-parameter function that will be applied to elements
    of iterable. Importantly, map can take more than one iterable; the specified function
    should then accept that many arguments. When multiple iterables are provided,
    map applies the function to the elements of the iterables in a parallel fashion,
    until the shortest iterable is exhausted.


    For example, to square each number in a list:


    ```

    1 numbers = [1, 2, 3, 4, 5]

    2 squared = map(lambda x: x**2, numbers)

    3 print(list(squared))

    ```


