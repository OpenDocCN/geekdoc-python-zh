- md: "## 7.8 Functional Techniques for Working with Immutable Data\n\nIn this section,\
    \ we will discuss functional techniques to manage and utilize immutable data structures\
    \ in Python efficiently. Harnessing the full potential of immutability requires\
    \ a shift in perspective from traditional programming methods, wherein mutable\
    \ objects are often manipulated in place. Functional programming offers a different\
    \ paradigm, focusing on the application of pure functions, expressions that yield\
    \ the same result for the same input and do not cause side effects, such as modifying\
    \ an argument or outputting something. This approach aligns well with the use\
    \ of immutable data, as it encourages the creation of new data structures from\
    \ existing ones without altering the original structure.\n\nThe first step in\
    \ defining an immutable class is to ensure that all its attributes are set only\
    \ once, during the instance creation. To achieve this, all of the attributes should\
    \ be defined within the `__init__` method, making sure not to expose any methods\
    \ that alter the state.\n- Secondly, properties should be used with read-only\
    \ access to provide access to the attributes without allowing them to be changed.\n\
    - Thirdly, if the object contains references to other objects, those objects also\
    \ must be immutable for the parent object to be truly immutable.\n\nLet’s consider\
    \ an example of creating a custom immutable class, `ImmutablePoint`, representing\
    \ a point in a two-dimensional space.\n\n```python\nclass ImmutablePoint:\n  \
    \  def __init__(self, x, y):\n        self._x = x\n        self._y = y\n\n   \
    \ @property\n    def x(self):\n        return self._x\n\n    @property\n    def\
    \ y(self):\n        return self._y\n```\n\nIn the example above, `ImmutablePoint`\
    \ is designed to be immutable. The `_x` and `_y` attributes are set upon object\
    \ instantiation and cannot be modified afterwards because:\n- The class does not\
    \ provide any setter methods.\n- Access to the attributes is provided through\
    \ the read-only properties `x` and `y`.\n\nFurthermore, to ensure complete immutability,\
    \ especially when dealing with more complex structures that involve nested objects,\
    \ the `__hash__` and `__eq__` methods should be properly implemented. This makes\
    \ the custom type usable as a dictionary key and supports equality checks, reinforcing\
    \ its immutable nature.\n\n```python\ndef __eq__(self, other):\n    if isinstance(other,\
    \ ImmutablePoint):\n        return self.x == other.x and self.y == other.y\n \
    \   return False\n\ndef __hash__(self):\n    return hash((self.x, self.y))\n```\n\
    \nBy implementing `__eq__` and `__hash__`, instances of `ImmutablePoint` can now\
    \ be compared for equality and used in hashed collections, such as sets or dictionary\
    \ keys, ensuring that the integrity and immutability of the object are maintained\
    \ across different uses within your application.\n\nTo incorporate instances of\
    \ this immutable class effectively, consider the following example where two `ImmutablePoint`\
    \ objects are created and compared:\n\n```python\npoint1 = ImmutablePoint(1, 2)\n\
    point2 = ImmutablePoint(1, 2)\n\nprint(point1 == point2)\nprint(hash(point1),\
    \ hash(point2))\n```\n\n```\nTrue\n3713081631934410656 3713081631934410656\n```\n\
    \nAs demonstrated, both `point1` and `point2` represent the same point in space,\
    \ illustrated by their equality and identical hash values. This outcome confirms\
    \ the immutable and predictable behavior of custom immutable types in Python when\
    \ correctly designed and implemented.\n\nWhile Python does not inherently support\
    \ immutability in custom classes, by adhering to the outlined practices and patterns,\
    \ such as defining attributes only within the `__init__` method, using read-only\
    \ properties, respecting the composition of immutable objects, and properly implementing\
    \ `__eq__` and `__hash__`, developers can create robust and truly immutable types.\
    \ This reinforces the principles of functional programming within Python applications,\
    \ leading to clearer, more reliable, and thread-safe code.\n\n### Mapping Over\
    \ Data Structures\n\nMapping is a cornerstone technique in functional programming\
    \ that involves applying a function to each element in a data structure, creating\
    \ a new structure as a result. For immutable sequences in Python, such as tuples\
    \ or strings, the `map` function offers a succinct way to achieve this.\n\n```python\n\
    numbers = (1, 2, 3, 4)\nsquared_numbers = tuple(map(lambda x: x ** 2, numbers))\n\
    ```\n\nThe above code snippet applies a lambda function to square each element\
    \ in the tuple `numbers`, resulting in a new tuple `squared_numbers` with the\
    \ squared values. This technique preserves the immutability of the original tuple\
    \ while allowing for the transformed data to be used in subsequent operations.\n\
    \n### Filtering Data\n\nFiltering is another functional programming technique,\
    \ where a new data structure is created from elements of an existing one that\
    \ satisfy a specific condition. The `filter` function in Python embodies this\
    \ concept, enabling selective data processing in a functional style.\n\n```python\n\
    numbers = (1, 2, 3, 4, 5)\neven_numbers = tuple(filter(lambda x: x % 2 == 0, numbers))\n\
    ```\n\nIn this example, `filter` is used with a lambda function to select even\
    \ numbers from a tuple. The result is a new tuple `even_numbers` containing only\
    \ the elements that meet the criterion (i.e., divisible by 2). This operation\
    \ leaves the original data unchanged, adhering to the principles of immutability.\n\
    \n### Reducing Data Collections\n\nThe reduction process involves combining elements\
    \ of a data structure using a function to produce a single value. Python's `functools.reduce`\
    \ function can apply a given operation cumulatively to items of an iterable, starting\
    \ with an initial value if provided.\n\n```python\nfrom functools import reduce\n\
    numbers = (1, 2, 3, 4)\nsum_of_numbers = reduce(lambda x, y: x + y, numbers)\n\
    ```\n\nThis snippet demonstrates the summation of elements in a tuple `numbers`,\
    \ yielding a single scalar value `sum_of_numbers`. This operation is particularly\
    \ useful for aggregating data in an immutable context.\n\n### Generating Comprehensions\n\
    \nPython's comprehension syntax provides a concise and readable way to construct\
    \ new data structures. For immutable types, list comprehensions can be adapted\
    \ to create tuples or strings.\n\n```python\nnumbers = [1, 2, 3, 4]\nsquared_numbers\
    \ = tuple(x ** 2 for x in numbers)\n```\n\nThis example demonstrates creating\
    \ a new tuple of squared numbers from a list. The comprehension inside the tuple\
    \ constructor maintains the immutability of the generated data structure.\n\n\
    ### Leveraging Higher-Order Functions\n\nHigher-order functions, which can take\
    \ other functions as arguments or return them as results, are integral to functional\
    \ programming. They can be effectively used with immutable data to create versatile\
    \ and reusable code patterns.\n\n```python\ndef apply_operations(operations, data):\n\
    \    for operation in operations:\n        data = tuple(map(operation, data))\n\
    \    return data\n\nnumbers = (1, 2, 3, 4)\noperations = [lambda x: x ** 2, lambda\
    \ x: x + 2]\nresult = apply_operations(operations, numbers)\n```\n\nHere, `apply_operations`\
    \ is a higher-order function that applies a sequence of operations to data and\
    \ returns a new, transformed data structure. This function exemplifies the power\
    \ and flexibility of combining higher-order functions with immutable data structures.\n\
    \nBy understanding and applying these functional techniques, developers can effectively\
    \ navigate the complexities of working with immutable data in Python. These strategies\
    \ not only enhance code clarity and predictability but also harness the benefits\
    \ of functional programming to produce robust and maintainable software.\n\n##\
    \ 7.9 Performance Considerations: Immutable vs. Mutable Data Structures\n\nIn\
    \ this section, we will discuss the performance implications of choosing between\
    \ immutable and mutable data structures in Python. Understanding these differences\
    \ is crucial for writing efficient code, especially in applications where performance\
    \ and resource management are of paramount importance.\n\n### Memory Usage\n\n\
    When comparing immutable to mutable data structures in terms of memory usage,\
    \ it is important to understand how Python manages memory for these types. Immutable\
    \ objects can sometimes use less memory than their mutable counterparts because\
    \ Python can reuse immutable objects.\n\nFor instance, every time a new immutable\
    \ string is created with the same value as an existing one, Python may simply\
    \ point the new variable to the already existing object, rather than creating\
    \ a completely new object. This process is known as *interning*. However, this\
    \ behavior is not guaranteed for all immutable types or values, and its benefits\
    \ are most often seen with small and commonly used objects.\n\n```python\n# Example\
    \ of string interning\na = \"hello\"\nb = \"hello\"\nprint(a is b) # Output: True,\
    \ indicating a and b reference the same object\n```\n\nMutable objects, on the\
    \ other hand, require separate memory allocations even if they have the same value.\
    \ This is because the value of mutable objects can change, necessitating a unique\
    \ object for each variable to ensure that modifications in one does not affect\
    \ the other."
  mdcn: "## 7.8 处理不可变数据的函数式技术\n\n在本节中，我们将讨论在Python中高效管理和利用不可变数据结构的函数式技术。要充分发挥不可变性的潜力，需要从传统的编程方法（即通常就地操作可变对象）中转变视角。函数式编程提供了一种不同的范式，它专注于应用纯函数——即对相同输入产生相同结果且不会引起副作用（如修改参数或输出某些内容）的表达式。这种方法与不可变数据的使用非常契合，因为它鼓励从现有数据结构创建新的数据结构，而不改变原始结构。\n\
    \n定义不可变类的第一步是确保其所有属性仅在实例创建时设置一次。为此，所有属性都应在`__init__`方法内定义，并确保不暴露任何改变状态的方法。\n-\
    \ 其次，应使用只读属性来提供对属性的访问，而不允许它们被更改。\n- 第三，如果对象包含对其他对象的引用，那么这些对象也必须是不可变的，父对象才能真正不可变。\n\
    \n让我们考虑一个创建自定义不可变类`ImmutablePoint`的例子，它表示二维空间中的一个点。\n\n```python\nclass ImmutablePoint:\n\
    \    def __init__(self, x, y):\n        self._x = x\n        self._y = y\n\n \
    \   @property\n    def x(self):\n        return self._x\n\n    @property\n   \
    \ def y(self):\n        return self._y\n```\n\n在上面的例子中，`ImmutablePoint`被设计为不可变的。`_x`和`_y`属性在对象实例化时设置，之后无法修改，因为：\n\
    - 该类不提供任何setter方法。\n- 对属性的访问通过只读属性`x`和`y`提供。\n\n此外，为确保完全的不可变性，特别是在处理涉及嵌套对象的更复杂结构时，应正确实现`__hash__`和`__eq__`方法。这使得自定义类型可以用作字典键并支持相等性检查，从而强化其不可变性。\n\
    \n```python\ndef __eq__(self, other):\n    if isinstance(other, ImmutablePoint):\n\
    \        return self.x == other.x and self.y == other.y\n    return False\n\n\
    def __hash__(self):\n    return hash((self.x, self.y))\n```\n\n通过实现`__eq__`和`__hash__`，`ImmutablePoint`的实例现在可以进行相等性比较，并用于哈希集合（如集合或字典键），确保对象在应用程序中的不同使用场景下保持其完整性和不可变性。\n\
    \n为了有效使用这个不可变类的实例，请考虑以下示例，其中创建并比较了两个`ImmutablePoint`对象：\n\n```python\npoint1 =\
    \ ImmutablePoint(1, 2)\npoint2 = ImmutablePoint(1, 2)\n\nprint(point1 == point2)\n\
    print(hash(point1), hash(point2))\n```\n\n```\nTrue\n3713081631934410656 3713081631934410656\n\
    ```\n\n如示例所示，`point1`和`point2`都表示空间中的同一个点，这通过它们的相等性和相同的哈希值得以体现。这一结果证实了在Python中正确设计和实现的自定义不可变类型具有不可变和可预测的行为。\n\
    \n虽然Python在自定义类中并不原生支持不可变性，但通过遵循概述的实践和模式，例如仅在`__init__`方法内定义属性、使用只读属性、尊重不可变对象的组合以及正确实现`__eq__`和`__hash__`，开发者可以创建健壮且真正不可变的类型。这强化了Python应用程序中的函数式编程原则，从而产生更清晰、更可靠且线程安全的代码。\n\
    \n### 映射数据结构\n\n映射是函数式编程中的一个基石技术，它涉及将函数应用于数据结构中的每个元素，并创建一个新的结构作为结果。对于Python中的不可变序列（如元组或字符串），`map`函数提供了一种简洁的方式来实现这一点。\n\
    \n```python\nnumbers = (1, 2, 3, 4)\nsquared_numbers = tuple(map(lambda x: x **\
    \ 2, numbers))\n```\n\n上面的代码片段将一个lambda函数应用于对元组`numbers`中的每个元素求平方，从而生成一个包含平方值的新元组`squared_numbers`。这种技术保留了原始元组的不可变性，同时允许转换后的数据用于后续操作。\n\
