    calculates the sum of two numbers:


    ```

    1 def add(x, y):

    2     return x + y

    ```


    The add function is pure because it always returns the same result for the same
    pair of x and y, and it does not modify any external state or have side effects.


    In contrast, the following function is not pure because it modifies an external
    state by appending to a list:'
  - '[PAGE 32]


    ```

    1 def append_to_list(value, lst=[]):

    2     lst.append(value)

    3     return lst

    ```


    Pure functions are a cornerstone of functional programming, offering significant
    benefits in terms of predictability, testability, maintainability, and potential
    for parallel execution. By adhering to the principles of determinism and lack
    of side-effects, developers can write more reliable, understandable, and efficient
    code.


    # 1.8 Immutability in Functional Programming


    Immutability is a cornerstone concept in functional programming, enforcing the
    idea that data should not be changed once created. This principle aids in reducing
    side effects, simplifying debugging, and making code easier to reason about. In
    Python, which supports multiple paradigms including functional programming, understanding
    immutability and its implications is critical for embracing functional programming
    principles effectively.


    In functional programming, data structures are immutable, meaning once a data
    structure is created, it cannot be altered. For every modification or update,
    a new instance of the data structure is created with the desired changes, leaving
    the original untouched. This approach contrasts sharply with imperative programming,
    where data structures are often mutable and changes to data are made in place.'
  - '[PAGE 33]


    Consider the following Python example illustrating the immutability principle:


    ```

    1 def update_list(original_list, value):

    2     new_list = original_list + [value]

    3     return new_list

    4

    5 original_list = [1, 2, 3]

    6 new_list = update_list(original_list, 4)

    7

    8 print("Original List:", original_list)

    9 print("New List:", new_list)

    ```


    In this example, update_list function creates a new list (new_list) by adding
    a new element to the existing list (original_list). Instead of modifying the original_list
    in place, it returns a new list. This is a demonstration of immutability, where
    the original data is not altered.


    The output of this example will be:


    Original List: [1, 2, 3]

    New List: [1, 2, 3, 4]'
  - '[PAGE 34]


    This example underlines the importance of immutability in creating predictable
    and bug-resistant code. Since the original data structure is not modified, functions
    become more predictable; given the same inputs, they always produce the same outputs
    without causing any side effects to the outside world.


    To further illustrate the importance of immutability, consider an equation in
    mathematics: $y = x + 3$. Whenever we provide a value for $x$, $y$ will always
    yield the same result for a particular value of $x$. This predictability and consistency
    are what immutability seeks to bring into programming.


    Another crucial aspect brought by immutability is thread-safety in concurrent
    executions. Since data cannot be modified, the risk of data being changed in unpredictable
    ways by different threads is eliminated, making programs safer and easier to parallelize.


    However, it''s important to note that immutability comes with its own set of challenges,
    primarily related to performance and memory usage. Creating new instances for
    every change can lead to increased memory consumption and can affect the performance
    of the application, especially with large datasets. To mitigate these drawbacks,
    Python and other functional languages provide specialized immutable data structures
    and techniques aimed at optimizing performance and memory usage.


    +   - Python''s tuple is an example of an immutable data structure, contrasted
    with lists, which are mutable.

    - Persistent data structures and techniques like structural sharing can help optimize
    memory usage and performance in functional programming.'
