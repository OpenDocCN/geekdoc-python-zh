    \ neighbor in graph[vertex]:\n        if neighbor not in visited:\n          \
    \  dfs(graph, neighbor, visited)\n```\n\n这里，对 `dfs` 的递归调用允许算法深入图内部，标记已访问的顶点，并高效地遍历结构。\n\
    \n### 动态规划\n\n递归在动态规划中同样重要，其中子问题的解决方案被存储（记忆化）以避免重复计算。递归方法可以清晰而简洁地定义这些子问题之间的关系。例如，使用带记忆化的递归计算第\
    \ n 个斐波那契数：\n\n```python\ndef fib_memo(n, memo={}):\n    if n in memo:\n     \
    \   return memo[n]\n    if n <= 2:\n        return 1\n    memo[n] = fib_memo(n-1,\
    \ memo) + fib_memo(n-2, memo)\n    return memo[n]\n```\n\n此实现通过存储中间结果增强了朴素递归解决方案，展示了递归如何促进对复杂问题的清晰有效解决。\n\
    \n递归在数据处理中的重要性怎么强调都不为过。它将复杂任务分解为可管理子任务的能力，使其成为程序员武器库中不可或缺的工具。从树遍历和排序算法到图处理和动态规划，递归提供了一种系统性的方法，以高效且优雅的方式解决以数据为中心的问题。\n\
    \n## 4.12 高级递归模式：斐波那契数与阶乘\n\n高级递归模式通常作为介绍编程中递归力量和优雅性的经典入门。两个这样的典型例子是斐波那契数和阶乘的计算。这些案例不仅说明了递归的实现，还突出了其潜在的陷阱和效率问题。\n\
    \n### 斐波那契数\n\n斐波那契数列是一个数字序列，其中每个数字是前两个数字的和，通常从 0 和 1 开始。数学上可以表示为：\n\n$$F(n) =\
    \ F(n-1) + F(n-2) \\quad (4.4)$$\n\n基本情况为 $F(0) = 0$ 和 $F(1) = 1$。\n\n在 Python\
    \ 中使用递归实现斐波那契数涉及定义一个函数，该函数调用自身来计算第 $n$ 个斐波那契数：\n\n```python\ndef fibonacci(n):\n\
    \    if n <= 1:\n        return n\n    else:\n        return fibonacci(n-1) +\
    \ fibonacci(n-2)\n```\n\n虽然此实现简洁而优雅，但由于重复计算，它存在显著的效率低下问题。例如，计算 $fibonacci(5)$\
    \ 需要计算 $fibonacci(4)$ 和 $fibonacci(3)$，但计算 $fibonacci(4)$ 也需要重新计算 $fibonacci(3)$。这种冗余导致随着\
    \ $n$ 的增长，计算次数呈指数级增加，展示了朴素递归的一个缺点。\n\n### 阶乘函数\n\n非负整数 $n$ 的阶乘，记为 $n!$，是所有小于或等于\
    \ $n$ 的正整数的乘积。数学定义为：\n\n$$n! = n \\times (n - 1) \\times (n - 2) \\times \\dots\
    \ \\times 2 \\times 1 \\qquad (4.5)$$\n\n基本情况定义为 0! = 1。\n\n在 Python 中计算阶乘的递归方法可以定义如下：\n\
    \n```python\ndef factorial(n):\n    if n == 0:\n        return 1\n    else:\n\
    \        return n * factorial(n-1)\n```\n\n此函数通过递归地将 *n* 乘以 *n*− 1 的阶乘来正确计算 *n*!，直到达到基本情况\
    \ 0! = 1 时停止。与斐波那契示例不同，此递归实现不会遭受重复计算的困扰，因为每个 *n* 值只计算一次。\n\n### 比较斐波那契和阶乘实现中的递归\n\
    \n斐波那契数和阶乘的递归实现都强调了理解递归算法计算复杂性和潜在冗余的重要性。虽然两者都是递归的基础示例，但斐波那契数列突出了优化技术（如记忆化或转换为迭代方法）以提高效率的必要性。"
