    \n然而，区分这两个概念很重要。虽然偏函数允许固定任意数量的参数，每次可能创建不同的函数，但柯里化总是创建一系列一元（单参数）函数，从而改变了函数接受其参数的方式。\n\
    \n这些技术为 Python 程序员提供了强大的工具，以编写更模块化和更高层次的抽象，充分利用函数作为语言中一等公民的全部潜力。\n\n## 2.10 回调：在运行时定义代码行为\n\
    \n回调代表了一种动态编程范式，其中函数作为参数传递给其他函数或方法，并在程序执行的特定点执行。这种机制允许开发者自定义和扩展库、框架或任何其他代码结构的行为，而无需直接修改其内部代码。回调是\
    \ Python 中将函数视为一等公民的直接结果，为软件开发提供了显著的灵活性和适应性。\n\n### 理解回调\n\n回调函数本质上是一个在另一个函数执行完毕后执行的函数——因此得名“回调”。在\
