    \ result\n    return wrapper\n\n@timing_decorator\ndef example_function(n):\n\
    \    return sum(range(n))\n```\n\nAlthough the decorator provides valuable insights\
    \ into the execution time, it also introduces additional execution overhead. This\
    \ trade-off must be carefully considered, especially in performance-critical code.\n\
    \n### Readability and Complexity\n\nAnother consideration is the potential impact\
    \ on code readability and complexity. The extensive use of first-class functions\
    \ can lead to code that is hard to follow, particularly for those who are not\
    \ familiar with the functional programming paradigm. This is especially true with\
