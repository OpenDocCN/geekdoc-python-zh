    two functions, $f$ and $g$, where $f: X \rightarrow Y$ and $g: Y \rightarrow Z$,
    the composition of $f$ and $g$ (denoted as $g \circ f$) maps $X$ to $Z$. This
    is expressed in the following equation:'
