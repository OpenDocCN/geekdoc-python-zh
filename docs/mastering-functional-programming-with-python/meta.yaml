  md: '# 2.6 Using Map, Filter, and Reduce with Functions


    The functional programming paradigms in Python provide us with three powerful
    built-in functions: map, filter, and reduce. Each of these functions embodies
    the essence of functional programming by enabling the efficient processing of
    collections. They accomplish this by applying a function to each item in a collection
    (like a list or tuple) in a concise, readable manner. This section will delve
    into the mechanics and applications of these functions to demonstrate their capabilities
    and versatility.


    # The map Function


    The map function is used to apply a given function to every item in an iterable,
    such as a list, and return a new iterable containing the results. Its syntax is
    as follows:


    ```

    1 map(function, iterable)

    ```


    The first argument is the function to be applied, and the second is the iterable
    whose items the function is applied to. For example:


    ```

    1 def square(number):

