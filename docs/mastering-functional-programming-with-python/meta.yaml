    `timer_func` 高阶函数定义了一个内部函数 `wrapper`，它捕获传递给它的任何参数并将其转发给 `target_function`。它通过测量\
    \ `target_function` 执行前后的时间来计算执行时间，并返回 `target_function` 的结果。\n\n### 自定义高阶函数的使用\n\
    \n要使用 `timer_func`，只需将另一个函数作为参数传递给它。这可以是预定义的函数，甚至是 lambda 函数。为了演示，考虑以下计算从 1 到给定值的数字之和的函数：\n\
    \n```python\ndef sum_numbers(n):\n    return sum(range(1, n+1))\n\ntimed_sum =\
