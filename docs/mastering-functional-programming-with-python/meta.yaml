    of items, similar to lists. However, unlike lists, tuples are immutable, meaning
    once a tuple is created, its contents cannot be altered. This immutability makes
    tuples an essential part of functional programming in Python, contributing to
    the predictability and thread-safety of applications.


    To declare a tuple, parentheses are used, enclosing the sequence of values separated
    by commas. For example:


    ```

    1 example_tuple = (1, 2, 3, 4)

    ```


