- img_proc: true
  md: 'execution time of a program. This is particularly beneficial in scenarios where
    only a subset of the results of a computation is needed.


    +   - It enables the handling of very large or infinite data sets by computing
    elements on demand.

    - It avoids unnecessary computations, leading to performance improvements.

    - It allows for more straightforward expression of complex logic, improving code
    readability.


    Another significant advantage of lazy evaluation is its impact on memory usage.
    Since values are only calculated when needed, there''s a reduction in the memory
    footprint of a program. This is especially useful when dealing with large data
    sets, as it prevents the allocation of memory that may never be used.


    Furthermore, lazy evaluation facilitates the representation and manipulation of
    infinite data structures. Since values within these structures are only calculated
    upon request, it is possible to work with them as though they were finite, opening
    up new possibilities for data processing and manipulation.


