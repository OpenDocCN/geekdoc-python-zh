    \n### 多线程应用程序中的并发控制\n\n不可变数据结构固有的线程安全性减轻了与并发控制相关的复杂性。鉴于不可变对象在创建后无法更改状态，数据竞争的风险显著降低，从而允许更安全的多线程操作。\n\
