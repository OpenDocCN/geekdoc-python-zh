    \nprint(user_promise.execute()) # Output: {'name': 'John Doe', 'age': 25, 'processed':\
    \ True}\n```\n\n这种模式可以显著简化异步操作的处理，使代码更具可读性和可维护性。\n\n高阶函数在 Python 中的应用超越了简单的示例，进入了高级编程技术的领域。通过利用这些概念，开发者可以编写出不仅更具表现力，而且更符合函数式编程原则的代码。这包括创建数据处理管道、采用函数组合以实现更高的可重用性，以及简化异步代码管理。每一个用例都展示了高阶函数抽象复杂性、促进代码重用和增强表达能力的强大能力。\n\
    \n## 5.7 装饰器：高阶函数的一个特例\n\n装饰器是 Python 中高阶函数的一个独特应用，它允许在不修改函数或方法实际代码的情况下对其进行修改。这一概念不仅突显了高阶函数的灵活性和强大功能，也展示了\
    \ Python 致力于支持简洁且富有表现力的代码。本质上，装饰器是一个高阶函数，它接受一个函数作为参数，并返回一个新函数，该新函数增强或修改了原始函数的行为。\n\
    \n让我们用一个简单的例子来说明装饰器的基本结构。假设我们有一个将两个数字相加的函数。我们希望扩展这个函数的行为，使其在不改变原始代码的情况下记录输入和输出。\n\
    \n```python\ndef simple_decorator(func):\n    def wrapper(a, b):\n        print(f\"\
    Adding {a} and {b}\")\n        result = func(a, b)\n        print(f\"Result: {result}\"\
    )\n        return result\n    return wrapper\n\ndef add(a, b):\n    return a +\
    \ b\n\nadd = simple_decorator(add)\n```\n\n`simple_decorator` 函数通过添加额外的日志记录功能包装了\
    \ `add` 函数的功能。这是通过定义一个内部函数 `wrapper` 来实现的，该函数在调用 `add` 之前和之后执行日志记录，然后返回这个包装函数。原始的\
    \ `add` 函数被传递给装饰器，其行为在不改变代码的情况下得到了增强。\n\nPython 提供了一种更符合语法且更优雅的方式来应用装饰器，即使用 `@`\
    \ 符号后跟装饰器函数名，放置在要装饰的函数定义之上。\n\n```python\n@simple_decorator\ndef add(a, b):\n\
    \    return a + b\n```\n\n这种语法等同于 `add = simple_decorator(add)`，使代码更简洁、更直观。\n\n\
    为了进一步说明装饰器的强大功能和实用性，考虑一个用例：我们需要验证函数的输入，以确保它只处理正整数。\n\n```python\ndef validate_inputs(func):\n\
    \    def wrapper(a, b):\n        if a < 0 or b < 0:\n            raise ValueError(\"\
    Only positive integers are allowed\")\n        return func(a, b)\n    return wrapper\n\
    \n@validate_inputs\ndef multiply(a, b):\n    return a * b\n```\n\n在这个例子中，`validate_inputs`\
    \ 装饰器包装了 `multiply` 函数，添加了输入验证逻辑。这种方法保持了 `multiply` 函数核心逻辑的清晰，并专注于其主要职责，遵循了单一职责原则。\n\
    \n装饰器可以堆叠，允许对单个函数应用多个增强或修改。这一特性提供了一种高度模块化和可组合的方式来扩展函数行为。\n\n```python\n@simple_decorator\n\
    @validate_inputs\ndef subtract(a, b):\n    return a - b\n```\n\n堆叠装饰器时，它们按自下而上的顺序应用；因此，`validate_inputs`\
    \ 装饰器首先应用，然后是 `simple_decorator`。\n\n装饰器作为高阶函数的一个特例，为 Python 中的函数修改提供了一个强大且富有表现力的工具。它们通过分离关注点和以模块化方式添加功能，支持编写清晰、可读和可维护的代码。通过理解和利用装饰器，Python\
    \ 开发者可以编写出不仅功能性强，而且优雅高效的代码。\n\n## 5.8 使用高阶函数的函数式编程技术\n\n使用高阶函数的函数式编程技术为构建代码提供了一个强大的范式。"
