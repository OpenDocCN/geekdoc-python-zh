    \ number. Here's a simple usage:\n\n```python\nfrom itertools import count\n\n\
    counter = count(start=10) # Starts counting from 10.\nfor number in counter:\n\
    \    print(number)\n```\n\n**Performance Considerations**: Evaluate the performance\
    \ implications of using higher-order functions, especially in critical sections\
