    Currying is a transformative step further from partial function application. It
    is the process of decomposing a function that takes multiple arguments into a
    series of functions that each take a single argument. In essence, currying transforms
    a function of the form $f(x,y,z)$ into $g(x)(y)(z)$.


    Currying can be manually implemented in Python but requires a bit more boilerplate
    code compared to partial function application. Let''s illustrate currying by transforming
    the add function:


    ```

    1 def curry_add(x):

    2     def add_x(y):

    3         return x + y

    4     return add_x

    ```


    Now, curry_add returns a function that takes the second argument y and adds it
    to the first argument x:


    ```

    1 add_five = curry_add(5)

    2 result = add_five(10) # Equivalent to curry_add(5)(10)

    ```


