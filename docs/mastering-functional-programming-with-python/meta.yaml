- md: '## Customer Segmentation for Targeted Marketing


    The second case study focuses on customer segmentation in an e-commerce context,
    aiming to classify customers based on their purchase history to enable targeted
    marketing strategies.


    Utilizing the functional programming features in Python, customer transaction
    data was processed to compute metrics such as total expenditure, average purchase
    value, and purchase frequency. These metrics served as a basis for segmenting
    the customer base into distinct groups using k-means clustering, a popular machine
    learning algorithm for segmentation.


    ```python

    from sklearn.cluster import KMeans

    import pandas as pd


    # Load the transaction dataset

    transactions_df = pd.read_csv(''customer_transactions.csv'')


    # Define a function to compute total expenditure

    total_expenditure = lambda df: df[''Quantity''] * df[''UnitPrice'']


    # Use ''map'' to apply the function to the dataset

    transactions_df[''TotalExpenditure''] = transactions_df.apply(total_expenditure,
    axis=1)


    # Prepare the features for clustering

    features = transactions_df[[''TotalExpenditure'', ''Quantity'']]


    # Instantiate and fit the KMeans model

    kmeans = KMeans(n_clusters=3)

    kmeans.fit(features)


    # Add the cluster labels to the dataframe

    transactions_df[''Segment''] = kmeans.labels_

    ```


