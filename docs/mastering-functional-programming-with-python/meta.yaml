    ```


    10


    In this case, partial effectively binds the first argument of the multiply function
    to 2, producing a new function called double that only needs a single argument
    to perform the multiplication by two.


    # Exploring the Power of reduce


    The reduce function, also part of the functools module, is a tool for performing
    cumulative operations on a list of items. It applies a given function of two arguments
    cumulatively to the items of a sequence, from left to right, so as to reduce the
    sequence to a single value.


    Here is an example of using reduce to calculate the factorial of a number:


    ```

    1 from functools import reduce

    2

    3 def factorial(n):

    4     return reduce(lambda x, y: x*y, range(1, n+1))

    5

    6 print(factorial(5))

    ```'
