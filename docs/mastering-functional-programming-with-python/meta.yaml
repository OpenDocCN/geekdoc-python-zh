    \n## 7.6 collections 模块：namedtuple 和 MappingProxyType\n\nPython 中的 `collections`\
    \ 模块通过提供专门的容器数据类型来增强内置数据结构的功能。其中，`namedtuple` 和 `MappingProxyType` 在不可变数据结构的上下文中尤为重要。这些工具不仅强制执行不可变性，还为\
    \ Python 程序引入了更清晰的语法和增强的安全特性。\n\n### namedtuple\n\n`namedtuple` 函数生成一个具有命名字段的元组子类。与通过索引访问元素的常规元组不同，`namedtuple`\
    \ 允许通过名称访问元素。此特性显著提高了代码的可读性和可维护性。\n\n要定义一个 `namedtuple`，请指定类型名称和字段名称。以下示例说明了如何创建一个名为\
    \ `Point`、具有字段 `x` 和 `y` 的 `namedtuple`：\n\n```python\nfrom collections import\
    \ namedtuple\n\nPoint = namedtuple('Point', ['x', 'y'])\np1 = Point(11, y=22)\n\
    ```\n\n可以使用点表示法访问元素，如下所示：\n\n```python\nprint(p1.x, p1.y) # 输出将是：11 22\n```\n\n\
    需要注意的是，`namedtuple` 实例是不可变的。尝试更改字段值将导致 `AttributeError`。\n\n### MappingProxyType\n\
    \n`MappingProxyType` 提供了一种创建不可变映射的方法。它包装一个标准字典并暴露其只读视图。任何通过代理修改字典的尝试都将引发 `TypeError`，从而强制执行不可变性。\n\
    \n当应用程序中需要常量映射，并且应防止任何意外修改时，这尤其有用。\n\n以下代码演示了如何使用 `MappingProxyType` 创建字典的只读视图：\n\
    \n```python\nfrom types import MappingProxyType\n\nwritable = {'one': 1, 'two':\
    \ 2}\nread_only = MappingProxyType(writable)\n\nprint(read_only['one']) # 输出：1\n\
    \n# 尝试修改代理会引发 TypeError。\ntry:\n    read_only['one'] = 23\nexcept TypeError as\
    \ e:\n    print(e) # 输出：'mappingproxy' object does not support item assignment\n\
    ```\n\n请注意，虽然代理是不可变的，但原始字典仍然可以修改。原始字典中的更改将反映在代理中：\n\n```python\nwritable['one']\
    \ = 3\nprint(read_only['one']) # 输出：3\n```\n\n总之，`collections` 模块中的 `namedtuple`\
    \ 和 `MappingProxyType` 是在 Python 中处理不可变数据结构的强大工具。它们通过防止意外的突变来增强代码的可读性、可维护性和安全性。明智地使用这些数据结构可以带来更清晰、更模块化、更可预测的程序。\n\
    \n## 7.7 在 Python 中创建自定义不可变类型\n\n在 Python 中创建自定义不可变类型利用了不可变性原则来设计本质上是线程安全的、创建后可预测地不可更改的数据结构。此任务涉及特定的策略和技术，本节将对此进行深入探讨。\n\
    \nPython 没有直接的机制来强制用户定义类的不可变性，类似于语言提供的不可变数据类型（如元组、冻结集合）。但是，通过遵循某些设计模式并利用 Python\
    \ 的特性，开发者可以创建自己的不可变类型。"
