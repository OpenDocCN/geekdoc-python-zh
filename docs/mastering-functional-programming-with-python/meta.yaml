    constructs: map, filter, and reduce, showing how they can be applied to data transformation
    tasks in Python. These constructs allow for a concise, readable approach to processing
    collections of data. By operating on lists or any iterable objects, they offer
    a functional way to perform transformations, filtrations, and aggregations.


    # Map Function


    The map function applies a specified function to each item of an iterable (such
    as a list) and returns an iterator. This can be particularly useful for transforming
    data.


    Consider an example where you have a list of numbers and you want to square each
    number:


    ```

    1  numbers = [1, 2, 3, 4, 5]

    2  squared_numbers = list(map(lambda x: x**2, numbers))

    ```


