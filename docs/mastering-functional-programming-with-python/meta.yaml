    # MappingProxyType


    MappingProxyType offers a way to create immutable mappings. It wraps a standard
    dictionary and exposes a read-only view of it. Any attempt to modify the dictionary
    through the proxy will raise a TypeError, thereby enforcing immutability.


    This is particularly useful when a constant mapping is required in an application,
    and any accidental modification should be prevented.


    The following code demonstrates how to create a read-only view of a dictionary
    using MappingProxyType:


    ```

    1 from types import MappingProxyType

    2

    3 writable = {''one'': 1, ''two'': 2}

    4 read_only = MappingProxyType(writable)

    5

    6 print(read_only[''one'']) # Output: 1

    7

    8 # Attempting to modify the proxy raises a TypeError.

    9 try:

    10    read_only[''one''] = 23

    ```'
