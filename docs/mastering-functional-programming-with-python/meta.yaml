    the items with commas:


    ```

    1 another_example = 5, 6, 7, 8

    ```


    A tuple containing a single item must include a comma after the item, otherwise
    Python will not interpret it as a tuple:


    ```

    1 single_item_tuple = (9,)

    ```


    Tuples support various operations similar to lists, such as indexing and slicing,
    which do not modify the tuple:'
