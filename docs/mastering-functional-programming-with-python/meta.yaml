    \n为了进一步说明不可变性的重要性，考虑一个数学方程式：$y = x + 3$。每当我们为 $x$ 提供一个值时，对于特定的 $x$ 值，$y$ 总是会产生相同的结果。这种可预测性和一致性正是不可变性试图引入编程的。\n\
    \n不可变性带来的另一个关键方面是并发执行中的线程安全性。由于数据不能被修改，因此消除了数据被不同线程以不可预测的方式更改的风险，使程序更安全且更容易并行化。\n\
    \n然而，重要的是要注意，不可变性也带来了一系列挑战，主要与性能和内存使用有关。为每次更改创建新实例可能导致内存消耗增加，并可能影响应用程序的性能，尤其是在处理大型数据集时。为了缓解这些缺点，Python\
