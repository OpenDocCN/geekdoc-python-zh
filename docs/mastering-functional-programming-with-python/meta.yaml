    # Memory Usage


    When comparing immutable to mutable data structures in terms of memory usage,
    it is important to understand how Python manages memory for these types. Immutable
    objects can sometimes use less memory than their mutable counterparts because
    Python can reuse immutable objects.


    For instance, every time a new immutable string is created with the same value
    as an existing one, Python may simply point the new variable to the already existing
    object, rather than creating a completely new object. This process is known as
    *interning*. However, this behavior is not guaranteed for all immutable types
    or values, and its benefits are most often seen with small and commonly used objects.


    ```

    # Example of string interning

    a = "hello"

    b = "hello"

    print(a is b) # Output: True, indicating a and b reference the same object

    ```


    Mutable objects, on the other hand, require separate memory allocations even if
    they have the same value. This is because the value of mutable objects can change,
    necessitating a unique object for each variable to ensure that modifications in
    one does not affect the other.'
