    \ `x`）被固定。\n\n```python\nfrom functools import partial\n\nadd_five = partial(add,\
    \ 5)\n```\n\n现在，`add_five` 是 `add` 的一个偏函数，其中 `x` 始终为 5。用单个参数调用 `add_five` 将执行\
    \ `add(5, y)`：\n\n```python\nresult = add_five(10)  # 这等同于 add(5, 10)\n```\n\n\
    柯里化是偏函数应用更进一步的转换步骤。它是将一个接受多个参数的函数分解为一系列每个只接受单个参数的函数的过程。本质上，柯里化将形式为 $f(x,y,z)$\
