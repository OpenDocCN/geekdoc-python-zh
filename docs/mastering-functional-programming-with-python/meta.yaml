    programming. In declarative programming, the focus is on what needs to be done,
    rather than how to do it. SQL, for example, is a declarative language used for
    querying databases; users define the data they want to retrieve, not the procedure
    for fetching it.


    Functional programming, therefore, emphasizes the description of the logic of
    computation without detailing its control flow. Imperative programming, by contrast,
    is explicit about the sequence of operations and the state changes that occur.
    This contrast leads to a fundamental shift in thinking when one moves from imperative
    to functional programming. Rather than constructing a series of steps to solve
    a problem, functional programming involves composing functions to describe the
    problem''s solution.


    # Examples


    Consider a simple imperative Python function that computes the sum of a list of
    numbers:


    ```

    1 def sum_list(imperative_list):

    2     total = 0

    3     for number in imperative_list:

    4         total += number

    5     return total

    ```


    The functional equivalent, leveraging Python''s built-in sum function, which operates
    in a functional style (though Python itself is not a purely functional language),
    is markedly simpler:'
