    \n### 装饰器与函数式编程\n\n装饰器的使用与 Python 中的函数式编程原则相一致。通过将函数视为一等公民，装饰器能够以一种清晰、表达力强且模块化的方式修改函数行为。它们可用于实现横切关注点，如日志记录、验证、计时等，而无需修改原始函数的逻辑。这增强了代码的可重用性和可读性。\n\
    \n装饰器是 Python 中一个强大的特性，它完美地体现了函数作为一等公民的概念。它们提供了一种优雅的方式来扩展函数的功能，并且在方法论上契合 Python\
    \ 所支持的函数式编程范式。\n\n## 2.9 偏函数与柯里化\n\nPython 中的偏函数使我们能够固定函数的某些参数，并生成一个新函数。当函数需要多个参数，但其中大多数在调用中保持不变时，这种能力变得特别有用。Python\
