    # 8.7 Memory Efficiency with Lazy Evaluation


    Lazy evaluation, a cornerstone concept in functional programming, provides significant
    memory efficiency improvements when contrasted with eager evaluation. This efficiency
    is particularly evident in scenarios involving large datasets or computations
    that may not need to be fully realized. The fundamental principle of lazy evaluation
    is that values are computed on-demand and not beforehand. In Python, this approach
    to handling computation and data retrieval is implemented through generators.


    Generators provide an elegant means to create iterators without the overhead of
    storing the entire dataset in memory at once. This section delves into the nuances
    of achieving memory efficiency through lazy evaluation in Python, focusing on
    generators and their role in conserving memory.


    Generators are created using functions and the yield keyword. Unlike regular functions
    that return a value and exit, generator functions suspend and resume their execution
    and state around the last point of value'
  - '[PAGE 306]


    generation. This behavior is instrumental in conserving memory, as it allows the
    generator to produce one item at a time, moving to the next only upon request.


    Consider a scenario requiring the processing of a large file. Using traditional
    eager evaluation approaches may result in considerable memory usage, as all lines
    of the file would need to be loaded into memory. In contrast, a generator can
    be employed to read the file line by line, substantially reducing the memory footprint:


    ```

    1 def read_large_file(file_name):

    2     with open(file_name, ''r'') as file:

    3         for line in file:

    4             yield line

    ```


    The above generator, read_large_file, iterates over each line in a file, yielding
    one line at a time. This method enables the processing of files of practically
    any size with minimal memory consumption.


    Another powerful feature of Python supporting lazy evaluation is generator expressions.
    These expressions provide a concise syntax for creating generators, akin to list
    comprehensions, but without generating the entire list in memory. For example,
    to generate a sequence of squares for numbers in a range without storing the entire
    sequence:


