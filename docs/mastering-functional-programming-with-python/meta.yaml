    \ The `map()` function applies a given function to all items in an input list.\
    \ Here is how a lambda function can be used with `map()`:\n\n```\nnumbers = [1,\
    \ 2, 3, 4]\nsquared = map(lambda x: x ** 2, numbers)\nprint(list(squared))\n```\n\
    \nThe result would be:\n\n[1, 4, 9, 16]\n\nUsing ‘filter()’, another higher-order\
    \ function, lambda functions can help in extracting elements from a list that\
