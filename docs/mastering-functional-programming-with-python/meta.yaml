    # 8.6 Using Generators for Stateful Computations


    Stateful computations are those in which the current state (or context) of the
    computation affects its future behavior. In traditional, eagerly evaluated programming
    paradigms, implementing stateful computations often involves maintaining and modifying
    state through external data structures or class members. However, when employing
    lazy evaluation through generators in Python, state can be encapsulated within
