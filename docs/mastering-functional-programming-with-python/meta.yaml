- md: "## 2.8 Decorators: Enhancing Function Behavior\n\nDecorators in Python are\
    \ a powerful design pattern, allowing developers to modify or enhance the behavior\
    \ of functions or methods. They are a clear example of the flexibility provided\
    \ by treating functions as first-class citizens. A decorator is essentially a\
    \ function that takes another function as an argument, wraps its behavior in some\
    \ way, and returns a new function that adds some additional capabilities or alterations\
    \ to the original function.\n\nTo understand decorators, it is essential to grasp\
    \ that functions can be passed around, assigned to variables, and returned from\
    \ other functions in Python. This concept is foundational to implementing decorators.\n\
    \n### Creating a Simple Decorator\n\nLet's begin with an example of a simple decorator\
    \ that logs the arguments a function receives and its return value.\n\n```python\n\
    def logger(func):\n    def wrapper(*args, **kwargs):\n        print(f\"Calling\
    \ {func.__name__} with arguments {args} and keyword arguments {kwargs}\")\n  \
    \      result = func(*args, **kwargs)\n        print(f\"{func.__name__} returned\
    \ {result}\")\n        return result\n    return wrapper\n\n@logger\ndef add(a,\
    \ b):\n    return a + b\n\nprint(add(1, 2))\n```\n\nWhen you decorate `add` with\
    \ `@logger`, you're essentially saying `add = logger(add)`. The `@` syntax is\
    \ just syntactic sugar for this operation. The `add` function is passed to `logger`,\
    \ which returns the `wrapper` function. Therefore, when you call `add(1, 2)`,\
    \ you're actually calling `wrapper(1, 2)`.\n\nThe output of this code will be:\n\
    \n```\nCalling add with arguments (1, 2) and keyword arguments {}\nadd returned\
    \ 3\n3\n```\n\n### Using Decorators with Arguments\n\nSometimes, it may be necessary\
    \ to pass arguments to the decorator itself. This can be achieved by adding another\
    \ level of function nesting.\n\n```python\ndef repeat(times):\n    def decorator_repeat(func):\n\
    \        def wrapper(*args, **kwargs):\n            for _ in range(times):\n \
    \               result = func(*args, **kwargs)\n            return result\n  \
    \      return wrapper\n    return decorator_repeat\n\n@repeat(times=3)\ndef say_hello(name):\n\
    \    print(f\"Hello, {name}\")\n\nsay_hello(\"Alice\")\n```\n\nIn this example,\
    \ `repeat` is a decorator factory that creates and returns a decorator, which\
    \ in turn creates and returns the `wrapper` function. This allows us to specify\
    \ how many times we want the function `say_hello` to be repeated.\n\n### Decorators\
    \ and Functional Programming\n\nThe use of decorators is aligned with the principles\
    \ of functional programming in Python. By treating functions as first-class citizens,\
    \ decorators enable the modification of function behavior in a clean, expressive,\
    \ and modular way. They can be used to implement cross-cutting concerns such as\
    \ logging, validation, timing, and more, without altering the original function's\
    \ logic. This enhances code reusability and readability.\n\nDecorators are a powerful\
    \ feature in Python that perfectly embodies the concept of functions as first-class\
    \ citizens. They provide an elegant way to extend the functionality of functions\
    \ and methodologically fit into the functional programming paradigm that Python\
    \ supports.\n\n## 2.9 Partial Functions and Currying\n\nPartial functions in Python\
    \ enable us to fix a certain number of arguments of a function and generate a\
    \ new function. This ability becomes particularly useful in scenarios where the\
    \ function requires several parameters, but most of them remain constant across\
    \ calls. Python's `functools` module provides the `partial` function to facilitate\
    \ the creation of these partial functions.\n\nTo begin, let's define a simple\
    \ function that performs addition:\n\n```python\ndef add(x, y):\n    return x\
    \ + y\n```\n\nUsing the `partial` function, we can create a new function that\
    \ has one of the parameters, say `x`, fixed.\n\n```python\nfrom functools import\
    \ partial\n\nadd_five = partial(add, 5)\n```\n\nNow, `add_five` is a partial function\
    \ of `add`, where `x` is always 5. Calling `add_five` with a single argument will\
    \ execute `add(5, y)`:\n\n```python\nresult = add_five(10)  # This is equivalent\
    \ to add(5, 10)\n```\n\nCurrying is a transformative step further from partial\
    \ function application. It is the process of decomposing a function that takes\
    \ multiple arguments into a series of functions that each take a single argument.\
    \ In essence, currying transforms a function of the form $f(x,y,z)$ into $g(x)(y)(z)$.\n\
    \nCurrying can be manually implemented in Python but requires a bit more boilerplate\
    \ code compared to partial function application. Let's illustrate currying by\
    \ transforming the `add` function:\n\n```python\ndef curry_add(x):\n    def add_x(y):\n\
    \        return x + y\n    return add_x\n```\n\nNow, `curry_add` returns a function\
    \ that takes the second argument `y` and adds it to the first argument `x`:\n\n\
    ```python\nadd_five = curry_add(5)\nresult = add_five(10)  # Equivalent to curry_add(5)(10)\n\
    ```\n\nBoth partial function application and currying enhance the flexibility\
    \ and reusability of functions by enabling the pre-specification of some of their\
    \ arguments. This can lead to more concise and expressive code, especially in\
    \ functional programming patterns.\n\nHowever, it is important to distinguish\
    \ between the two concepts. While partial functions allow fixing any number of\
    \ arguments, creating a potentially different function each time, currying always\
    \ creates a series of unary (single argument) functions, thus transforming the\
    \ way a function accepts its arguments.\n\nThese techniques afford Python programmers\
    \ potent tools to write more modular and higher-level abstractions, leveraging\
    \ the full potential of functions as first-class citizens in the language.\n\n\
    ## 2.10 Callbacks: Defining Code Behavior at Runtime\n\nCallbacks represent a\
    \ dynamic programming paradigm where functions are passed as arguments to other\
    \ functions or methods and are executed at a specific point in the program execution.\
    \ This mechanism allows developers to customize and extend the behavior of libraries,\
    \ frameworks, or any other code structures without modifying their internal code\
    \ directly. Callbacks are a direct consequence of treating functions as first-class\
    \ citizens in Python, enabling significant flexibility and adaptability in software\
    \ development.\n\n### Understanding Callbacks\n\nA callback function is, essentially,\
    \ a function that is to be executed after another function has finished executing\
    \ — hence the name 'callback'. In the context of Python, callbacks are often used\
    \ in event-driven programming, asynchronous programming, and in situations where\
    \ certain actions need to be delayed until another action completes.\n\n### Implementing\
    \ Callbacks in Python\n\nTo demonstrate the use of callbacks in Python, consider\
    \ a scenario where a process needs to perform an operation, such as accessing\
    \ a web resource, and then process that resource's data using a function passed\
    \ as an argument.\n\n```python\ndef download_data(url, callback):\n    # Simulating\
    \ data download\n    print(f\"Downloading data from {url}\")\n    data = f\"Data\
    \ from {url}\"\n    # Once the data is downloaded, the callback function is called\
    \ with the downloaded data\n    callback(data)\n\ndef process_data(data):\n```"
