    \n## 10.3 用于数据清洗的函数式技术\n\n数据清洗是任何数据分析过程中的关键步骤，它使底层信息更易于访问和操作。本节将讨论如何应用函数式编程概念在Python中有效地清洗数据。函数式编程的本质——将函数视为一等公民以及对不可变性的强调——为执行数据清洗任务提供了一个强大的框架。\n\
    \n用于数据清洗的核心函数式编程技术之一是使用`map`函数。`map`函数将给定的函数应用于可迭代对象（如列表）的每个元素，并返回一个迭代器。\n\n考虑一个包含以字符串形式表示的数值的数据集，其中一些字符串包含不需要的字符，如美元符号（$）或逗号（,）。可以使用`map`函数结合一个简单的清洗函数来移除这些字符。\n\
