    # 3.1 Understanding Pure Functions: Basics and Benefits


    Pure functions are the bedrock upon which functional programming is constructed.
    A function is considered pure if it adheres to two primary criteria:


    +   - It produces the same output for the same set of inputs, regardless of how
    many times the function is executed or when.

    - It has no side effects, meaning it does not alter any external state or depend
    on any state outside its scope.'
