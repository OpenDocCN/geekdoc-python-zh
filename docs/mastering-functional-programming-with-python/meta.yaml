    in mathematics, particularly lambda calculus. This paradigm emphasizes the use
    of mathematical functions to perform computation. Unlike imperative programming,
    which focuses on how a program operates by sequentially executing statements that
    change its state, FP focuses on what to solve by defining and applying functions
    without side effects or state changes.'
