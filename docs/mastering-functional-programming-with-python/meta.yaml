    # Chapter 5

    Higher-Order Functions


    Higher-order functions, which can take other functions as arguments or return
    them as results, are a central feature of functional programming that boost the
    language''s capacity for abstraction and code reuse. This chapter delves into
    how these functions allow for flexible, expressive programming patterns by abstracting
    operations over data, thereby reducing redundancy and enhancing code clarity.
    With a focus on Python, we demonstrate the practical usage of built-in higher-order
    functions like map, filter, and reduce, as well as guide readers through creating
    their custom higher-order functions to solve complex problems in an elegant, functional
    style.


    # 5.1 Introduction to Higher-Order Functions


    Higher-order functions represent a pivotal concept in functional programming,
    turning functions into first-class citizens by allowing them to be passed as arguments
    to other functions, returned as values from other functions, or both. This feature
    opens up a new paradigm for solving problems by enabling a high degree of abstraction
    and code modularization, which are fundamental in writing concise, readable, and
    reusable code.'
  - '[PAGE 166]


    Let''s start with the definition of a higher-order function. A function is considered
    higher-order if it does at least one of the following:


    +   - Takes one or more functions as arguments

    - Returns a function as its result


    The beauty of higher-order functions lies in their ability to abstract behaviors.
    Instead of focusing on how to iterate through elements or apply operations step
    by step, higher-order functions allow developers to think about what operations
    should be performed. This shift from the ''how'' to the ''what'' simplifies the
    reasoning about code and facilitates the creation of more general, flexible solutions.


    For illustration, consider the map function, a quintessential example of a higher-order
    function in many programming languages, including Python. The map function takes
    a function and an iterable as arguments, and it applies the function to each item
    of the iterable, yielding the results. Here is a basic example in Python:


    ```

    1 def square(x):

    2     return x * x

    3

    4 numbers = [1, 2, 3, 4, 5]

    5 squared_numbers = list(map(square, numbers))

    ```'
  - '[PAGE 167]


    The result of executing the above code is a new list where each element is the
    square of the corresponding element in the original list:


    ```

    [1, 4, 9, 16, 25]

    ```


    This code snippet highlights the essence of higher-order functions: they encapsulate
    common patterns of computation (in this case, applying a function to every element
    of a list) in a way that is both expressive and reusable.


    Mathematically, the concept of higher-order functions is closely related to functional
    composition and lambda calculus, foundational elements of functional programming.
    Consider a function $f: A \rightarrow B$ and a function $g: B \rightarrow C$.
    A higher-order function that takes $g$ and $f$ as arguments might combine them
    into a new function $h: A \rightarrow C$, defined by $h(x) = g(f(x))$. This operation
    is known as function composition and is central to many functional programming
    patterns.


    Overall, higher-order functions offer a powerful mechanism for abstraction, promoting
    a declarative style of programming where the focus is on what operations are performed
    rather than how they are implemented. As we progress through this chapter, we
    will explore the built-in higher-order functions provided by Python and learn
    how to create custom higher-order functions to solve complex problems elegantly
    and efficiently.'
  - '[PAGE 168]


    # 5.2 Understanding Functions that Operate on Other Functions


    The design of higher-order functions is rooted in the concept that functions themselves
    can be treated as data. This means that, just like integers, strings, or lists,
    functions can be passed as arguments to other functions, can be returned as values
    from functions, and can be assigned to variables. In this section, we will discuss
    the mechanics and implications of functions that operate on other functions and
    how this capability serves as a powerful tool in functional programming with Python.


    To begin, let''s consider a simple example that demonstrates a higher-order function
    taking another function as an argument:


    ```

    1 def execute(function, value):

    2     return function(value)

    3

    4 def double(x):

    5     return x * 2

    6

    7 result = execute(double, 5)

    ```


    Here, the execute function is a higher-order function because it takes another
    function, function, as an argument along with a value, value, and applies this
    function to the value. The output of this application is'
  - '[PAGE 169]


    returned by the execute function. When execute is called with the double function
    and the integer 5, it returns 10, demonstrating how double has been applied to
    the given value.


    10


    Higher-order functions can also return functions as results. This is another hallmark
    of their versatility. The following example illustrates this:


    ```

    1 def multiplier(n):

    2     def inner(x):

    3         return x * n

    4     return inner

    5

    6 double = multiplier(2)

    7 triple = multiplier(3)

    8

    9 print(double(5))

    10 print(triple(5))

    ```


    In this example, multiplier is a higher-order function that takes a single argument,
    n, and returns a new function, inner, which multiplies its argument by n. When
    multiplier is used to create the double and triple functions, these new functions
    retain knowledge of the value of n they were created with (2 and 3,'
  - '[PAGE 170]


    respectively). The output illustrates how double and triple behave as distinct
    functions that have been customized by the multiplier higher-order function.


    10

    15


    One of the key benefits of higher-order functions is their ability to abstract
    common patterns of computation into more general, reusable functions. Consider
    looping over a list to apply a function to each element. This operation can be
    abstracted using the built-in higher-order function map, which applies a specified
    function to each item of an iterable (like a list) and returns an iterator:


    ```

    1 numbers = [1, 2, 3, 4, 5]

    2 doubled_numbers = map(double, numbers)

    3 print(list(doubled_numbers))

    ```


    In this snippet, map takes the double function and a list of numbers. It applies
    double to each number in the list, demonstrating how map abstracts the pattern
    of applying a function to each item in an iterable.


    [2, 4, 6, 8, 10]


    In summary, higher-order functions expand the capabilities of Python by treating
    functions as first-class citizens, enabling them to be passed as arguments, returned
    as values, and assigned to variables. This flexibility allows for more abstract
    and reusable code constructions, central to the functional programming paradigm.'
