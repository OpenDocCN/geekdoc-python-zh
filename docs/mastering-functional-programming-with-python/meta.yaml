    # 5.3 Using Higher-Order Functions for Abstraction and Reusability


    One of the primary advantages of higher-order functions is their ability to abstract
    operations. This is particularly beneficial in a programming paradigm like functional
    programming, where abstraction and reusability are of paramount importance. By
    passing functions as arguments or using them as return values, higher-order functions
    allow for dynamic behavior that can adapt to different needs without changing
    the underlying algorithm.


    Consider an example of a list transformation. Suppose we have a list of integers
    and we would like to apply various operations on this list, such as doubling each
    element, computing the square of each element, or filtering out odd numbers. Using
    traditional programming approaches, one might write separate loops for each operation.
    This not only results in redundant code but also contradicts the DRY (Don''t Repeat
    Yourself) principle. Higher-order functions offer a more elegant solution.


    ```

    1 def apply_operation_to_list(operation, data_list):

    2     return [operation(item) for item in data_list]

    3

    4 def double(x):

    5     return x * 2

    6

    7 def square(x):

    8     return x ** 2

    ```'
- md: "## 5.4 Built-in Higher-Order Functions in Python\n\nIn this section, we will\
    \ discuss the built-in higher-order functions in Python: map, filter, and reduce.\
    \ These functions exemplify the power and elegance of functional programming by\
    \ allowing operations to be applied across iterables in a concise manner. Understanding\
    \ and applying these functions effectively can lead to more readable, efficient,\
    \ and Pythonic code.\n\n### The map Function\n\nThe map function applies a given\
    \ function to every item of an iterable (such as a list) and returns a map object\
    \ (an iterator), which can be converted into a list for readability. The syntax\
    \ of the map function is as follows:\n\n```python\nmap(function, iterable, ...)\n\
    ```\n\nConsider an example where we wish to square all the numbers in a list:\n\
    \n```python\nnumbers = [1, 2, 3, 4, 5]\nsquared = map(lambda x: x**2, numbers)\n\
    print(list(squared))\n```\n\nThe output of the above code will be:\n\n[1, 4, 9,\
    \ 16, 25]\n\n### The filter Function\n\nThe filter function constructs an iterator\
    \ from elements of an iterable for which a function returns true. In simple terms,\
    \ filter extracts elements from an iterable that satisfy a certain condition.\
    \ Its syntax is given by:\n\n```python\nfilter(function, iterable)\n```\n\nFor\
    \ an example of filter in action, consider retaining only the even numbers from\
    \ a list:\n\n```python\nnumbers = [1, 2, 3, 4, 5]\neven_numbers = filter(lambda\
    \ x: x % 2 == 0, numbers)\nprint(list(even_numbers))\n```\n\nThe expected output\
    \ is:\n\n[2, 4]\n\n### The reduce Function\n\nUnlike map and filter, the reduce\
    \ function is not a built-in function in Python and needs to be imported from\
    \ the functools module. reduce function applies a provided function cumulatively\
    \ to the items of an iterable, from left to right, so as to reduce the iterable\
    \ to a single value. Its use is illustrated as follows:\n\n```python\nfrom functools\
    \ import reduce\n\nnumbers = [1, 2, 3, 4, 5]\nsum_result = reduce(lambda x, y:\
    \ x + y, numbers)\nprint(sum_result)\n```\n\nThis results in the sum of all elements\
    \ in the list:\n\n15\n\nThe built-in higher-order functions map, filter, and reduce\
    \ provide Python programmers with powerful tools for processing iterables in a\
    \ functional programming style. These functions abstract common patterns of data\
    \ processing, resulting in cleaner, more readable code that is often also more\
    \ directly related to the problem being solved.\n\n## 5.5 Creating Custom Higher-Order\
    \ Functions\n\nIn this section, we will explore how to define and implement custom\
    \ higher-order functions in Python. These functions are capable of accepting other\
    \ functions as parameters or return them as output. This characteristic serves\
    \ as a powerful tool for abstraction, allowing for more generalized and reusable\
    \ code structures.\n\n### Defining a Custom Higher-Order Function\n\nTo create\
    \ a higher-order function, define a Python function in the usual manner, but ensure\
    \ it takes a function as an argument and/or returns a function. For instance,\
    \ consider the task of timing the execution of various functions. We can write\
    \ a higher-order function timer_func that accepts any function and prints out\
    \ the time it takes to execute that function.\n\n```python\nimport time\n\ndef\
    \ timer_func(target_function):\n    def wrapper(*args, **kwargs):\n        start_time\
    \ = time.perf_counter()\n        result = target_function(*args, **kwargs)\n \
    \       end_time = time.perf_counter()\n        print(f\"Function {target_function.__name__}\
    \ executed in {end_time - start_time} seconds.\")\n        return result\n   \
    \ return wrapper\n```\n\nThe timer_func higher-order function defines an inner\
    \ function wrapper, which captures any arguments passed to it and forwards them\
    \ to the target_function. It calculates the execution time by measuring the time\
    \ before and after the target_function's execution and returns the target_function's\
    \ result.\n\n### Usage of the Custom Higher-Order Function\n\nTo use timer_func,\
    \ simply pass another function as an argument to it. This can be a predefined\
    \ function, or even a lambda function. For demonstration, consider the following\
    \ function that calculates the sum of numbers up to a given value:\n\n```python\n\
    def sum_numbers(n):\n    return sum(range(1, n+1))\n\ntimed_sum = timer_func(sum_numbers)\n\
    result = timed_sum(10000)\n\nprint(f\"Sum result: {result}\")\n```\n\nThe output\
    \ indicates both the execution time and the result of the sum_numbers function:\n\
    \nFunction sum_numbers executed in 0.0001736 seconds.\nSum result: 50005000\n\n\
    ### Advantages of Creating Custom Higher-Order Functions\n\nThe primary advantage\
    \ of creating custom higher-order functions lies in the abstraction they offer.\
    \ By encapsulating common patterns or concerns (e.g., execution timing, logging,\
    \ access control) in a higher-order function, developers can:\n\n- Enhance code\
    \ reusability by applying the same higher-order function to different target functions.\n\
    - Reduce code duplication by abstracting away repetitive logic into the higher-order\
    \ function.\n- Improve code readability and maintainability by separating concerns\
    \ and highlighting the primary purpose of the target function.\n\nFurthermore,\
    \ custom higher-order functions can beautifully leverage Python's dynamic nature,\
    \ allowing developers to create flexible and powerful abstractions that cater\
    \ to a wide range of programming scenarios.\n\nCreating custom higher-order functions\
    \ in Python can significantly enhance the expressiveness and modularity of the\
    \ code. By understanding and utilizing the potential of these functions, developers\
    \ can implement sophisticated programming constructs that are both succinct and\
    \ efficient. The example provided in this section only scratches the surface of\
    \ what's possible, encouraging further exploration and experimentation with higher-order\
    \ functions to solve specific programming challenges in an elegant, functional\
    \ programming style.\n\n## 5.6 Advanced Use Cases of Higher-Order Functions\n\n\
    Higher-order functions extend the utility of Python far beyond simple iterative\
    \ tasks, serving as powerful tools for building complex, efficient, and elegant\
    \ software architectures. They enable developers to implement solutions in a more\
    \ abstracted, expressive manner that is not only concise but also closer to the\
    \ problem domain. This section explores some advanced applications of higher-order\
    \ functions that showcase their potential to simplify coding tasks that would\
    \ otherwise require verbose and intricate imperative code."
  mdcn: "## 5.4 Python 内置高阶函数\n\n本节我们将讨论 Python 的内置高阶函数：`map`、`filter` 和 `reduce`。这些函数通过允许以简洁的方式对可迭代对象应用操作，体现了函数式编程的强大与优雅。有效理解和应用这些函数，可以编写出更具可读性、更高效且更符合\
    \ Python 风格的代码。\n\n### map 函数\n\n`map` 函数将给定的函数应用于可迭代对象（如列表）的每个元素，并返回一个 map 对象（一个迭代器），为了可读性，可以将其转换为列表。`map`\
    \ 函数的语法如下：\n\n```python\nmap(function, iterable, ...)\n```\n\n考虑一个例子，我们希望对列表中的所有数字求平方：\n\
    \n```python\nnumbers = [1, 2, 3, 4, 5]\nsquared = map(lambda x: x**2, numbers)\n\
    print(list(squared))\n```\n\n上述代码的输出将是：\n\n[1, 4, 9, 16, 25]\n\n### filter 函数\n\
    \n`filter` 函数从可迭代对象的元素中构造一个迭代器，这些元素是函数返回 true 的元素。简单来说，`filter` 从可迭代对象中提取满足特定条件的元素。其语法如下：\n\
    \n```python\nfilter(function, iterable)\n```\n\n以 `filter` 的一个实际应用为例，考虑从列表中仅保留偶数：\n\
    \n```python\nnumbers = [1, 2, 3, 4, 5]\neven_numbers = filter(lambda x: x % 2\
    \ == 0, numbers)\nprint(list(even_numbers))\n```\n\n预期输出为：\n\n[2, 4]\n\n### reduce\
    \ 函数\n\n与 `map` 和 `filter` 不同，`reduce` 函数不是 Python 的内置函数，需要从 `functools` 模块导入。`reduce`\
    \ 函数将提供的函数累积地应用于可迭代对象的项，从左到右，从而将可迭代对象归约为单个值。其用法如下所示：\n\n```python\nfrom functools\
    \ import reduce\n\nnumbers = [1, 2, 3, 4, 5]\nsum_result = reduce(lambda x, y:\
    \ x + y, numbers)\nprint(sum_result)\n```\n\n这将得到列表中所有元素的和：\n\n15\n\n内置高阶函数 `map`、`filter`\
    \ 和 `reduce` 为 Python 程序员提供了以函数式编程风格处理可迭代对象的强大工具。这些函数抽象了常见的数据处理模式，从而产生更简洁、更具可读性的代码，并且通常与所解决的问题更直接相关。\n\
    \n## 5.5 创建自定义高阶函数\n\n本节我们将探讨如何在 Python 中定义和实现自定义高阶函数。这些函数能够接受其他函数作为参数或将其作为输出返回。这一特性是抽象的强大工具，允许创建更通用和可重用的代码结构。\n\
    \n### 定义自定义高阶函数\n\n要创建一个高阶函数，请以通常的方式定义一个 Python 函数，但确保它接受一个函数作为参数和/或返回一个函数。例如，考虑计时各种函数执行的任务。我们可以编写一个高阶函数\
