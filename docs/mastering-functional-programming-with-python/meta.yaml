    \n```python\nnumbers = [1, 2, 3, 4]\nsquared_numbers = tuple(x ** 2 for x in numbers)\n\
    ```\n\n此示例演示了从列表创建一个新的平方数元组。元组构造函数内的推导式保持了生成的数据结构的不可变性。\n\n### 利用高阶函数\n\n高阶函数可以接受其他函数作为参数或返回它们作为结果，是函数式编程不可或缺的一部分。它们可以与不可变数据有效结合，以创建通用且可重用的代码模式。\n\
