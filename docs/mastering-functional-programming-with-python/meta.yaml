    \n并发编程涉及并行执行多个操作序列，这些序列可能操作共享数据。传统的可变数据结构在多个线程同时访问时，会引入数据竞争和状态损坏的风险。在允许副作用的语言中，这些问题尤为突出。Python虽然提供了更高级的抽象和线程安全机制（如全局解释器锁\
