    In this example, reduce applies the lambda function, which multiplies two numbers,
    across the range from 1 to *n* (inclusive), effectively calculating the factorial
    of *n*.


    # Additional Utilities in the functools Module


    Beyond partial and reduce, the functools module includes several other utilities
    worth mentioning:


    +   - total_ordering: A class decorator that fills in missing ordering methods.

    - lru_cache: Decorator to wrap a function with a memoizing callable that saves
    up to the maxsize most recent calls.

    - cached_property: Transform a method of a class into a property whose value is
    computed once and then cached as a normal attribute for the life of the instance.

    - cmp_to_key: Convert a cmp= function into a key= function.


    Each of these utilities brings additional capabilities for working with functions
    and achieving more advanced functional programming techniques, such as caching
    results of expensive functions, creating fully ordered classes with less boilerplate,
    or adapting older code to use modern Python conventions.'
