    \n[1200.0, 5600.0, 3450.0]\n\n另一个用于数据清洗的关键函数是`filter`函数。它从可迭代对象的元素中构建一个迭代器，这些元素使得函数返回true。例如，过滤掉不符合特定标准的值。\n\
    \n假设有一个年龄列表，要求过滤出所有18岁以下的年龄。`filter`函数可以通过应用一个简单的谓词函数来实现这一点。\n\n```python\ndef\
