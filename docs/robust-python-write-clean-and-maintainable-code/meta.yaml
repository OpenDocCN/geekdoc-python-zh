  md: "# Generating Algorithms\n\nIn previous examples, I focused on generating input\
    \ data to create your tests. However, Hypothesis can go a step further and generate\
    \ combinations of operations as well. Hypothesis calls this *stateful testing*.\n\
    \nConsider our meal recommendation system. I showed you how to filter by calories,\
    \ but now I also want to filter by price, number of courses, proximity to user,\
    \ and so on. Here are some properties I want to assert about the system:\n\n+\
    \   - The meal recommendation system always returns three meal options; it may\
    \ be possible that not all recommended options fit all of the user’s criteria.\n\
    - All three meal options are unique.\n- The meal options are ordered based on\
    \ the most recent filter applied. In the case of ties, the next most recent filter\
    \ is used.\n- New filters replace old filters of the same type. For example, if\
    \ you set the price filter to <$20, and then change it to <$15, only the <$15\
    \ filter is applied. Setting something like a calorie filter, such as <1800 calories,\
    \ does not affect the price filter.\n\nRather than writing a slew of test cases,\
    \ I will represent my tests using a hypothesis.stateful.RuleBasedStateMachine.\
    \ This will let me test entire algorithms using Hypothesis, while checking for\
    \ invariants along the way. It’s a bit complicated, so I’ll show the entire code\
    \ first, and then break it down afterward piece by piece.\n\n```\nfrom functools\
    \ import reduce\nfrom hypothesis.strategies import integers\nfrom hypothesis.stateful\
    \ import Bundle, RuleBasedStateMachine, invariant, rule\n\nclass RecommendationChecker(RuleBasedStateMachine):\n\
    \    def __init__(self):\n        super().__init__()\n        self.recommender\
    \ = MealRecommendationEngine()\n        self.filters = []\n\n    @rule(price_limit=integers(min_value=6,\
    \ max_value=200))\n    def filter_by_price(self, price_limit):\n        self.recommender.apply_price_filter(price_limit)\n\
    \        self.filters = [f for f in self.filters if f[0] != \"price\"]\n     \
    \   self.filters.append((\"price\", lambda m: m.price))\n\n    @rule(calorie_limit=integers(min_value=500,\
    \ max_value=2000))\n    def filter_by_calories(self, calorie_limit):\n       \
    \ self.recommender.apply_calorie_filter(calorie_limit)\n        self.filters =\
    \ [f for f in self.filters if f[0] != \"calorie\"]\n        self.filters.append((\"\
    calorie\", lambda m: m.calories))\n```"
