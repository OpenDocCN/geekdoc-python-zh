    \ load_restaurant function:\n\n```\npython\nimport restaurant\nfrom load_restaurant\
    \ import load_restaurant\n\n# Loads our restaurant model\nload_restaurant(restaurant)\n\
    ```\n\nIn main.py, the call to load_restaurant will typecheck just fine. The restaurant\
    \ module satisfies the Restaurant protocol I've defined. Protocols are even smart\
    \ enough to ignore the self argument in render_menu when a module is passed in.\
    \ Using a protocol to define a module isn't an everyday Python sort of thing,\
    \ but you'll see it crop up if you have Python configuration files or plug-in\
    \ architectures that need to enforce a contract.\n\n> Not every typechecker may\
    \ support using a module as a protocol just yet; double-check the bugs and documentation\
    \ of your favorite typechecker for support.\n\n# Closing Thoughts\n\nProtocols\
    \ were just introduced in Python 3.8, so they are still relatively new. However,\
    \ they patch a huge hole in what you can do with Python's static typechecking.\
    \ Remember, while the runtime is structurally subtyped, most of the static typechecking\
    \ is nominally subtyped. Protocols fill that gap and let you do structural subtyping\
    \ during typechecking. You'll most commonly use them whenever you're writing library\
    \ code and want to provide a solid API that users can depend on, without relying\
    \ on a specific type. Using protocols reduces physical dependencies of code, which\
    \ helps with maintainability, but you still can catch errors early.\n\nIn the\
    \ next chapter, you'll learn about one more way to enhance your types: modeled\
    \ types. Modeling a type allows you to create a rich set of constraints that are\
    \ checked at typecheck and runtime, and can eliminate a whole class of errors\
    \ without having to manually write validation for every field. Even better, by\
    \ modeling your types, you provide built-in documentation for what is and what\
    \ is not allowed in your codebase. Throughout the next chapter, you'll see how\
    \ to do all of this using the popular library pydantic."
