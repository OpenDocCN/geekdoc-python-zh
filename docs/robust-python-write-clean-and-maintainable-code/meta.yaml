    # CHAPTER 6


    # Customizing Your Typechecker


    Typecheckers are one of your best resources for building robust codebases. Jukka
    Lehtosalo, the lead developer of mypy, offers a beautifully concise definition
    of typecheckers: “In essence, [a typechecker] provides verified documentation.”¹
    Type annotations provide documentation about your codebase, allowing other developers
    the ability to reason about your intentions. Typecheckers use those annotations
    to verify that the documentation matches the behavior.


    As such, a typechecker is invaluable. Confucius once said, “The mechanic, who
    wishes to do his work well, must first sharpen his tools.”² This chapter is all
    about sharpening your typechecker. Great coding techniques can get you far, but
    it’s your surrounding tooling that takes you to the next level. Don’t stop with
    just learning your editor, compiler, or operating system. Learn your typechecker
    too. I will show you some of the more useful options to get the most out of your
    tools.


    # Configuring Your Typechecker


    I will focus on one of the most popular typecheckers out there: mypy. When you
    run a typechecker in an IDE (such as PyCharm), it typically runs mypy underneath
    the hood (although many IDEs will allow you to change the default typechecker).
    Anytime you configure mypy (or whatever your default typechecker is), your IDE
    will use that configuration as well.


    1 Jukka Lehtosalo. “Our Journey to Type Checking 4 Million Lines of Python.” *Dropbox
    Tech* (blog). Dropbox, September 5, 2019. https://oreil.ly/4BK3k.


    2 Confucius and Arthur Waley. *The Analects of Confucius*. New York, NY: Random
    House, 1938.'
  - '[PAGE 99]


    Mypy offers quite a few configuration options to control the typechecker''s *strictness*,
    or the amount of errors reported. The stricter you make your typechecker, the
    more type annotations you need to write, which provides better documentation and
    creates fewer bugs. However, make the typechecker too strict, and you will find
    the minimum bar for developing code too high, incurring high costs to make changes.
    Mypy configuration options control these strictness levels. I''ll go through the
    different options available to you, and you can decide where that bar lies for
    you and your codebase.


    First, you need to install mypy (if you haven''t already). The easiest way is
    through pip on the command line:


    ```

    pip install mypy

    ```


    Once you have mypy installed, you you can control configuration in one of three
    ways:


    *Command line*

    When instantiating mypy from a terminal, you can pass various options to configure
    behavior. This is great for exploring new checks in your codebase.


    *Inline configuration*

    You can specify configuration values at the top of a file to indicate any options
    you may want to set. For example:


    ```

    # mypy: disallow-any-generics

    ```


    Putting this line at the top of your file will tell mypy to explicitly fail if
    it finds any generic type annotated with Any.


    *Configuration file*

    You can set up a configuration file to use the same options every time mypy runs.
    This is extremely useful when needing to share the same options across a team.
    This file is typically stored in version control alongside the code.


    # Configuring mypy


    When running mypy, it looks in your current directory for a configuration file
    named *mypy.ini*. This file will define which options you have set up for the
    project. Some options will be global, applied to every file, and other options
    will be per-module. A sample *mypy.ini* file might look as follows:


    ```

    # Global options:


    [mypy]

    python_version = 3.9

    warn_return_any = True


    # Per-module options:

    ```'
  - '[PAGE 100]


    ```

    [mypy-mycode.foo.*]

    disallow_untyped_defs = True


    [mypy-mycode.bar]

    warn_return_any = False


    [mypy-somelibrary]

    ignore_missing_imports = True

    ```


    You can use the --config-file command-line option to specify config files in different
    places. Also, mypy will look for configuration files in specific home directories
    if it can''t find a local config file, in case you want the same settings across
    multiple projects. For more information, check out the [mypy documentation](https://mypy.readthedocs.io/).


    As a note, I won''t cover too much more about the configuration file. Most options
    that I''ll talk about work in both a configuration file and on the command line,
    and for the sake of simplicity, I''ll show you how to run the commands on mypy
    invocations.


    In the following pages, I will cover a multitude of typechecker configurations;
    you do not need to apply every single one of them to see value in a typechecker.
    Most typecheckers provide immense value right out of the box. However, feel free
    to consider the following options to improve a typechecker''s likelihood of finding
    errors.


    # Catching dynamic behavior


    As mentioned before, Python''s dynamically typed nature will make maintenance
    hard on codebases that last a long time. Variables are free to be rebound to values
    with different types at any time. When this happens, the variable is essentially
    an Any type. Any types indicate that you should make no assumptions about what
    type that variable is. This makes it tricky to reason about: your typechecker
    won''t be of much use in preventing errors and you aren''t communicating anything
    special to future developers.


    Mypy comes with a set of flags that you can turn on to flag instances of the Any
    type. For instance, you can turn on the --disallow-any-expr option to flag any
    expression that has an Any type. The following code will fail with that option
    turned on:


    ```

    from typing import Any

    x: Any = 1

    y = x + 1


    test.py:4: error: Expression has type "Any"

    Found 1 error in 1 file (checked 1 source file)

    ```'
  - "[PAGE 101]\n\nAnother option I like for disallowing Any in type declarations\
    \ (such as in collections) is --disallow-any-generics. This catches the use of\
    \ Any for anything using a generic (such as collection types). The following code\
    \ fails to typecheck with this option turned on:\n\n```\nx: list = [1,2,3,4]\n\
    ```\n\nYou would need to use list[int] explicitly to get this code to work.\n\n\
    You can check out all the ways to disable the use of Any in the [mypy dynamic\
    \ typing documentation](https://mypy.readthedocs.io/en/stable/dynamic_typing.html).\n\
    \nBe careful with disabling Any too broadly, though. There is a valid use case\
    \ of Any that you don't want to flag erroneously. Any should be reserved for when\
    \ you absolutely don't care what type something is and that it is up to the caller\
    \ to verify the type. A prime example is a heterogeneous key-value store (perhaps\
    \ a general-purpose cache).\n\n# Requiring types\n\nAn expression is untyped if\
    \ there is no type annotation. In these cases, mypy treats the result of that\
    \ expression as an Any type if it can't otherwise infer the type. However, the\
    \ previous checks for disallowing Any will not catch where a function is left\
    \ untyped. There is a separate set of flags for checking for untyped functions.\n\
    \nThis code will not error out in a typechecker unless the --disallow-untyped-defs\
    \ option is set:\n\n```\ndef plus_four(x):\n    return x + 4\n```\n\nWith that\
    \ option set, you receive the following error:\n\n```\ntest.py:4: error: Function\
    \ is missing a type annotation\n```\n\nIf this is too severe for you, you might\
    \ want to check out --disallow-incomplete-defs, which only flags functions if\
    \ they only have some variables/return values annotated (but not all), or --disallow-untyped-calls,\
    \ which only flags calls from annotated functions to unannotated functions. You'll\
    \ find all the different options concerning untyped functions in the [mypy documentation](https://mypy.readthedocs.io/en/stable/command_line.html).\n\
    \n# Handling None/Optional\n\nIn [Chapter 4](https://example.com/chapter4), you\
    \ learned how easy it was to make the “billion-dollar mistake” when using None\
    \ values. If you turn on no other options, make sure that you have --strict-optional\
    \ turned on in your typechecker to catch these costly errors. You absolutely want\
    \ to be checking that your use of None is not hiding any latent bugs.\n\nWhen\
    \ using --strict-optional, you must explicitly perform is None checks; otherwise,\
    \ your code will fail typechecking."
- md: "If `--strict-optional` is set (the default is different depending on the mypy\
    \ version, so be sure to double-check), this code should fail:\n\n```python\n\
    from typing import Optional\nx: Optional[int] = None\nprint(x + 5)\n```\n\n```\n\
    test.py:3: error: Unsupported operand types for + (\"None\" and \"int\")\ntest.py:3:\
    \ note: Left operand is of type \"Optional[int]\"\n```\n\nIt's worth noting that\
    \ mypy also treats `None` values as `Optional`s implicitly. I recommend turning\
    \ this off, so that you are being more explicit in your code. For example:\n\n\
    ```python\ndef foo(x: int = None) -> None:\n    print(x)\n```\n\nThe parameter\
    \ `x` is implicitly converted to an `Optional[int]`, since `None` is a valid value\
    \ for it. If you were to do any integer operations on `x`, the typechecker would\
    \ flag it. However, it's better to be more explicit and express that a value can\
    \ be `None` (to disambiguate for future readers).\n\nYou can set `--no-implicit-optional`\
    \ in order to get an error, forcing you to specify `Optional`. If you were to\
    \ typecheck the above code with this option set, you would see:\n\n```\ntest.py:2:\
    \ error: Incompatible default for argument \"x\"\n    (default has type \"None\"\
    , argument has type \"int\")\n```\n\n## Mypy Reporting\n\nIf a typechecker fails\
    \ in the forest and nobody is around to see it, does it print an error message?\
    \ How do you know that mypy is actually checking your files, and that it will\
    \ actually catch errors? Use mypy's built-in reporting techniques to better visualize\
    \ results.\n\nFirst, you can get an HTML report about how many lines of code mypy\
    \ was able to check by passing in `--html-report` to mypy. This produces a HTML\
    \ file that will provide a table similar to the one pictured in Figure 6-1.\n\n\
    | mypy.sharedparse | 0.00% imprecise | 114 LOC |\n| mypy.sitepkgs | 3.13% imprecise\
    \ | 32 LOC |\n| mypy.solve | 3.90% imprecise | 77 LOC |\n| mypy.split_namespace\
    \ | 38.24% imprecise | 34 LOC |\n| mypy.state | 0.00% imprecise | 18 LOC |\n\n\
    Figure 6-1. HTML report from running mypy on the mypy source code\n\nIf you want\
    \ a plain-text file, you can use `--linecount-report` instead.\n\nMypy also allows\
    \ you to track explicit `Any` expressions to understand how you are doing on a\
    \ line-by-line basis. When using the `--any-exprs-report` command-line option,\
    \ mypy will create a text file enumerating per-module statistics for how many\
    \ times you use `Any`. This is very useful for seeing how explicit your type annotations\
    \ are across a codebase. Here are the first few lines from running the `--any-exprs-report`\
    \ option on the mypy codebase itself:\n\n| Name | Anys | Exprs | Coverage |\n\
    |---|---|---|---|\n| mypy.__main__ | 0 | 29 | 100.00% |\n| mypy.api | 0 | 57 |\
    \ 100.00% |\n| mypy.applytype | 0 | 169 | 100.00% |\n| mypy.argmap | 0 | 394 |\
    \ 100.00% |\n| mypy.binder | 0 | 817 | 100.00% |\n| mypy.bogus_type | 0 | 10 |\
    \ 100.00% |\n| mypy.build | 97 | 6257 | 98.45% |\n| mypy.checker | 10 | 12914\
    \ | 99.92% |\n| mypy.checkexpr | 18 | 10646 | 99.83% |\n| mypy.checkmember | 6\
    \ | 2274 | 99.74% |\n| mypy.checkstrformat | 53 | 2271 | 97.67% |\n| mypy.config_parser\
    \ | 16 | 737 | 97.83% |\n\nIf you'd like more machine-readable formats, you can\
    \ use the `--junit-xml` option to create an XML file in the JUnit format. Most\
    \ continuous integration systems can parse this format, making it ideal for automated\
    \ report generation as part of your build system. To learn about all the different\
    \ reporting options, check out the mypy [report-generation documentation](https://mypy.readthedocs.io/en/stable/command_line.html#report-generation).\n\
    \n## Speeding Up mypy\n\nOne of the common complaints about mypy is the time it\
    \ takes to typecheck large codebases. By default, mypy *incrementally* checks\
    \ files. That is, it uses a cache (typically a `.mypy_cache` folder, but the location\
    \ is also configurable) to check only what has changed since last typecheck. This\
    \ does speed up typechecking, but as your codebase gets larger, your typechecker\
    \ will take longer to run, no matter what. This is detrimental for fast feedback\
    \ during development cycles. The longer a tool takes to provide useful feedback\
    \ to developers, the less often developers will run the tool, thus defeating the\
    \ purpose. It is in everyone's interest for typecheckers to run as fast as possible,\
    \ so that developers are getting type errors at near real time.\n\nIn order to\
    \ speed up mypy even more, you may want to consider a *remote cache*. A remote\
    \ cache provides a way of caching your mypy typechecks somewhere accessible to\
    \ your entire team. This way, you can cache results based on specific commit IDs\
    \ in your version control and share typechecker information. Building this system\
    \ is outside the scope of this book, but the [remote cache documentation](https://mypy.readthedocs.io/en/stable/mypy_daemon.html)\
    \ in mypy will provide a solid start.\n\nYou also should consider mypy in daemon\
    \ mode. Daemon mode is when mypy runs as a standalone process, and keeps the previous\
    \ mypy state in memory rather than on a file system (or across a network link).\
    \ You can start a mypy daemon by running `dmypy run -- mypy-flags <mypy-files>`.\
    \ Once the daemon is running, you can run the exact same command to check the\
    \ files again.\n\nFor instance, I ran mypy on the mypy source code itself. My\
    \ initial run took 23 seconds. Subsequent typechecks on my system took between\
    \ 16 and 18 seconds. This is *technically* faster, but I would not consider it\
    \ fast. When I use the mypy daemon, though, my subsequent runs ended up being\
    \ under half a second. With times like that, I can run my typechecker much more\
    \ often to get feedback faster. Check out more about `dmypy` in the [mypy daemon\
    \ mode documentation](https://mypy.readthedocs.io/en/stable/mypy_daemon.html).\n\
    \n## Alternative Typecheckers\n\nMypy is highly configurable, and its wealth of\
    \ options will let you decide on the exact behavior you are looking for, but it\
    \ won't meet all of your needs all of the time. It isn't the only typechecker\
    \ out there. I'd like to introduce two other typecheckers: Pyre (written by Facebook)\
    \ and Pyright (written by Microsoft).\n\n## Pyre\n\nYou can install Pyre with\
    \ pip:\n\n```\npip install pyre-check\n```\n\nPyre runs very similarly to mypy's\
    \ daemon mode. A separate process will run, from which you can ask for typechecking\
    \ results. To typecheck your code, you need to set up Pyre (by running `pyre init`)\
    \ in your project directory, and then run `pyre` to start the daemon. From here,\
    \ the information you receive is pretty similar to mypy. However, there are two\
    \ features that set Pyre apart from other typecheckers: codebase querying and\
    \ the Python Static Analyzer (Pysa) framework.\n\n### Codebase querying\n\nOnce\
    \ the pyre daemon is running, there are a lot of cool queries you can make to\
    \ inspect your codebase. I'll use the mypy codebase as an example codebase for\
    \ all of the following queries.\n\nFor instance, I can learn about the attributes\
    \ of any class in my codebase:\n\n```\npyre query \"attributes(mypy.errors.CompileError)\"\
    \n```\n\n```json\n{\n    \"response\": {\n        \"attributes\": [\n        \
    \    {\n                \"name\": \"__init__\",\n                \"annotation\"\
    : \"BoundMethod[\\n                    typing.Callable(\\n                   \
    \     mypy.errors.CompileError.__init__)\\n                    [[Named(self, mypy.errors.CompileError),\\\
    n                     Named(messages, typing.list[str]),\\n                  \
    \   Named(use_stdout, bool, default),\\n                     Named(module_with_blocker,\\\
    n                        typing.Optional[str], default)], None],\\n          \
    \          mypy.errors.CompileError]\",\n                \"kind\": \"regular\"\
    ,\n                \"final\": false\n            },\n            {\n         \
    \       \"name\": \"messages\",\n                \"annotation\": \"typing.list[str]\"\
    ,\n                \"kind\": \"regular\",\n                \"final\": false\n\
    \            },\n            {\n                \"name\": \"module_with_blocker\"\
    ,\n                \"annotation\": \"typing.Optional[str]\",\n               \
    \ \"kind\": \"regular\",\n                \"final\": false\n            },\n \
    \           {\n                \"name\": \"use_stdout\",\n                \"annotation\"\
    : \"bool\",\n                \"kind\": \"regular\",\n                \"final\"\
    : false\n            }\n        ]\n    }\n}\n```\n\n1. Pyre query for attributes\n\
    2. A description of the constructor\n3. A list of strings for messages\n4. An\
    \ Optional string describing a module with blocker"
  mdcn: "如果设置了 `--strict-optional`（默认值因 mypy 版本而异，请务必仔细检查），此代码应该会失败：\n\n```python\n\
    from typing import Optional\nx: Optional[int] = None\nprint(x + 5)\n```\n\n```\n\
    test.py:3: error: Unsupported operand types for + (\"None\" and \"int\")\ntest.py:3:\
    \ note: Left operand is of type \"Optional[int]\"\n```\n\n值得注意的是，mypy 也会隐式地将 `None`\
    \ 值视为 `Optional`。我建议关闭此功能，以便在代码中更加明确。例如：\n\n```python\ndef foo(x: int = None)\
    \ -> None:\n    print(x)\n```\n\n参数 `x` 被隐式转换为 `Optional[int]`，因为 `None` 是其有效值。如果你对\
    \ `x` 进行任何整数操作，类型检查器会标记错误。然而，最好更加明确地表达一个值可以是 `None`（以便为未来的读者消除歧义）。\n\n你可以设置 `--no-implicit-optional`\
    \ 来获取错误，强制你指定 `Optional`。如果你使用此选项对上述代码进行类型检查，你会看到：\n\n```\ntest.py:2: error: Incompatible\
    \ default for argument \"x\"\n    (default has type \"None\", argument has type\
    \ \"int\")\n```\n\n## Mypy 报告\n\n如果一个类型检查器在森林里失败了，而周围没有人看到，它会打印错误信息吗？你怎么知道 mypy\
    \ 实际上在检查你的文件，并且它确实会捕获错误？使用 mypy 的内置报告技术来更好地可视化结果。\n\n首先，你可以通过向 mypy 传递 `--html-report`\
    \ 来获取关于 mypy 能够检查多少行代码的 HTML 报告。这会生成一个 HTML 文件，提供一个类似于图 6-1 所示的表格。\n\n| mypy.sharedparse\
    \ | 0.00% 不精确 | 114 行代码 |\n| mypy.sitepkgs | 3.13% 不精确 | 32 行代码 |\n| mypy.solve\
    \ | 3.90% 不精确 | 77 行代码 |\n| mypy.split_namespace | 38.24% 不精确 | 34 行代码 |\n| mypy.state\
    \ | 0.00% 不精确 | 18 行代码 |\n\n图 6-1. 在 mypy 源代码上运行 mypy 生成的 HTML 报告\n\n如果你想要一个纯文本文件，可以改用\
    \ `--linecount-report`。\n\nMypy 还允许你跟踪显式的 `Any` 表达式，以了解你在逐行基础上的表现。当使用 `--any-exprs-report`\
    \ 命令行选项时，mypy 将创建一个文本文件，按模块枚举你使用 `Any` 的次数统计。这对于查看整个代码库中类型注解的明确程度非常有用。以下是在 mypy\
    \ 代码库本身上运行 `--any-exprs-report` 选项的前几行：\n\n| 名称 | Any 数量 | 表达式数量 | 覆盖率 |\n|---|---|---|---|\n\
    | mypy.__main__ | 0 | 29 | 100.00% |\n| mypy.api | 0 | 57 | 100.00% |\n| mypy.applytype\
    \ | 0 | 169 | 100.00% |\n| mypy.argmap | 0 | 394 | 100.00% |\n| mypy.binder |\
    \ 0 | 817 | 100.00% |\n| mypy.bogus_type | 0 | 10 | 100.00% |\n| mypy.build |\
    \ 97 | 6257 | 98.45% |\n| mypy.checker | 10 | 12914 | 99.92% |\n| mypy.checkexpr\
    \ | 18 | 10646 | 99.83% |\n| mypy.checkmember | 6 | 2274 | 99.74% |\n| mypy.checkstrformat\
    \ | 53 | 2271 | 97.67% |\n| mypy.config_parser | 16 | 737 | 97.83% |\n\n如果你想要更多机器可读的格式，可以使用\
    \ `--junit-xml` 选项来创建 JUnit 格式的 XML 文件。大多数持续集成系统都可以解析此格式，使其成为构建系统中自动化报告生成的理想选择。要了解所有不同的报告选项，请查看\
    \ mypy 的 [报告生成文档](https://mypy.readthedocs.io/en/stable/command_line.html#report-generation)。\n\
    \n## 加速 mypy\n\n关于 mypy 的一个常见抱怨是它对大型代码库进行类型检查所需的时间。默认情况下，mypy *增量式*地检查文件。也就是说，它使用缓存（通常是一个\
    \ `.mypy_cache` 文件夹，但位置也是可配置的）来仅检查自上次类型检查以来发生更改的内容。这确实加快了类型检查速度，但随着代码库变大，无论怎样，你的类型检查器运行时间都会变长。这对开发周期中的快速反馈是有害的。工具为开发者提供有用反馈所需的时间越长，开发者运行该工具的频率就越低，从而违背了初衷。类型检查器尽可能快地运行符合每个人的利益，这样开发者就能近乎实时地获得类型错误。\n\
    \n为了进一步加速 mypy，你可能需要考虑使用*远程缓存*。远程缓存提供了一种将你的 mypy 类型检查结果缓存在整个团队可访问的地方的方式。这样，你可以根据版本控制中的特定提交\
    \ ID 来缓存结果，并共享类型检查器信息。构建此系统超出了本书的范围，但 mypy 的 [远程缓存文档](https://mypy.readthedocs.io/en/stable/mypy_daemon.html)\
    \ 将提供一个坚实的起点。\n\n你还应该考虑使用 mypy 的守护进程模式。守护进程模式是指 mypy 作为独立进程运行，并将之前的 mypy 状态保留在内存中，而不是文件系统（或网络链接）上。你可以通过运行\
    \ `dmypy run -- mypy-flags <mypy-files>` 来启动 mypy 守护进程。一旦守护进程运行，你可以运行完全相同的命令来再次检查文件。\n\
    \n例如，我在 mypy 源代码本身上运行了 mypy。我最初的运行耗时 23 秒。我系统上后续的类型检查耗时在 16 到 18 秒之间。这*技术上*更快，但我不会认为它很快。然而，当我使用\
    \ mypy 守护进程时，我后续的运行时间最终不到半秒。有了这样的时间，我可以更频繁地运行类型检查器以更快地获得反馈。在 [mypy 守护进程模式文档](https://mypy.readthedocs.io/en/stable/mypy_daemon.html)\
    \ 中了解更多关于 `dmypy` 的信息。\n\n## 替代类型检查器\n\nMypy 高度可配置，其丰富的选项将让你决定你所寻求的确切行为，但它不会在所有时间满足你所有的需求。它并不是唯一的类型检查器。我想介绍另外两个类型检查器：Pyre（由\
    \ Facebook 编写）和 Pyright（由 Microsoft 编写）。\n\n## Pyre\n\n你可以使用 pip 安装 Pyre：\n\n\
    ```\npip install pyre-check\n```\n\nPyre 的运行方式与 mypy 的守护进程模式非常相似。一个单独的进程将运行，你可以从中请求类型检查结果。要对你的代码进行类型检查，你需要在项目目录中设置\
    \ Pyre（通过运行 `pyre init`），然后运行 `pyre` 来启动守护进程。从这里开始，你收到的信息与 mypy 非常相似。然而，有两个特性使\
    \ Pyre 与其他类型检查器不同：代码库查询和 Python 静态分析器（Pysa）框架。\n\n### 代码库查询\n\n一旦 pyre 守护进程运行，你可以进行许多很酷的查询来检查你的代码库。我将使用\
    \ mypy 代码库作为以下所有查询的示例代码库。\n\n例如，我可以了解代码库中任何类的属性：\n\n```\npyre query \"attributes(mypy.errors.CompileError)\"\
    \n```\n\n```json\n{\n    \"response\": {\n        \"attributes\": [\n        \
    \    {\n                \"name\": \"__init__\",\n                \"annotation\"\
    : \"BoundMethod[\\n                    typing.Callable(\\n                   \
    \     mypy.errors.CompileError.__init__)\\n                    [[Named(self, mypy.errors.CompileError),\\\
    n                     Named(messages, typing.list[str]),\\n                  \
    \   Named(use_stdout, bool, default),\\n                     Named(module_with_blocker,\\\
    n                        typing.Optional[str], default)], None],\\n          \
    \          mypy.errors.CompileError]\",\n                \"kind\": \"regular\"\
    ,\n                \"final\": false\n            },\n            {\n         \
    \       \"name\": \"messages\",\n                \"annotation\": \"typing.list[str]\"\
    ,\n                \"kind\": \"regular\",\n                \"final\": false\n\
    \            },\n            {\n                \"name\": \"module_with_blocker\"\
    ,\n                \"annotation\": \"typing.Optional[str]\",\n               \
    \ \"kind\": \"regular\",\n                \"final\": false\n            },\n \
    \           {\n                \"name\": \"use_stdout\",\n                \"annotation\"\
    : \"bool\",\n                \"kind\": \"regular\",\n                \"final\"\
    : false\n            }\n        ]\n    }\n}\n```\n\n1. Pyre 查询属性\n2. 构造函数的描述\n\
    3. 消息的字符串列表\n4. 描述带有阻塞器的模块的可选字符串"
