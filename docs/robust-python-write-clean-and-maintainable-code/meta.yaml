    \ I highly recommend testing out Optional behavior specifically. For the version\
    \ of mypy I am running (0.800), I have to use --strict-optional as a command-line\
    \ flag to catch this error.\n\nIf you are interested in silencing the typechecker,\
    \ you need to check for None explicitly and handle the None value, or assert that\
    \ the value cannot be None. The following code typechecks successfully:\n\n```\n\
    def create_hot_dog():\n    bun = dispense_bun()\n    if bun is None:\n       \
    \ print_error_code(\"Bun could not be dispensed\")\n        return\n\n    frank\
