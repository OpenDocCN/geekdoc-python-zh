    \n![](img/d64d2be45ca85b398807d181202e7046_279_0.png)\n\n## 缺点\n\n因为生产者和消费者依赖于传输机制，它们必须就消息格式达成一致。在大多数事件驱动架构中，生产者和消费者都同意使用一个通用的标识符和消息格式。这确实在两者之间创建了一个\
