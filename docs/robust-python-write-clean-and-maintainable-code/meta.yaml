    \ and needs to be tested for. As cyclomatic complexity grows, code gets harder\
    \ to read and harder to reason about. There is no magic number for cyclomatic\
    \ complexity; you will need to inspect your codebase and look for a suitable limit.\n\
    \n# Whitespace heuristic\n\nThere's another complexity heuristic that I am quite\
    \ fond of that is a bit simpler to reason about than cyclomatic complexity: whitespace\
    \ checking. The idea is as follows: count how many levels of indentation there\
    \ are in a single Python file. High levels of indentation indicate nested loops\
    \ and branches, which may signal complex code.\n\nUnfortunately, there are no\
    \ popular tools at the time of writing that handle whitespace heuristics. However,\
    \ it is easy to write this checker yourself:\n\n```\ndef get_amount_of_preceding_whitespace(line:\
