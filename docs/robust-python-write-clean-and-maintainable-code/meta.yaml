    ing a feature by examining call stacks and not being sure if you found every place
    that needs to be changed, or one file that is easy to modify and doesn’t require
    extensive changes. I know what I’d pick.


    You’ve already been exposed to the OCP in this book. Duck typing (in Chapter 2),
    subtyping (in Chapter 12), and protocols (in Chapter 13) are all mechanisms that
    can help with the OCP. The common thread among all these mechanisms is that they
    allow you to program in a generic fashion. You no longer need to handle every
    special case directly where the functionality is used. Instead, you provide extension
    points for other developers to utilize, allowing them to inject their own functionality
    without modifying your code.


    The OCP is the heart of extensibility. Keeping your code extensible will improve
    robustness. Developers can implement functionality with confidence; there is one
    place to make the change, and the rest of the codebase is all geared up to support
    the change. Less cognitive overhead and less code to change will lead to fewer
    errors.


    # Detecting OCP Violations


    How can you tell if you should be writing code to be more extensible, adhering
    to the OCP? Here are some indicators that should raise an eyebrow as you think
    about your codebase:


    *Are the easy things hard to do?*

    Some things should be conceptually easy in your codebase. The effort needed to
    implement the concept should match the domain complexity. I once worked in a codebase
    that required 13 different files to be modified in order to add a user-configurable
    option. For a product that had hundreds of configurable options, this should have
    been an easy task. Suffice to say, it was not.


    *Do you encounter pushback against similar features?*

    If feature requesters are constantly pushing back on timelines for a feature,
    especially if it, in their words, “is almost identical to previous feature X”,
    ask yourself if the disconnect is due to complexity. It might be that the complexity
    is inherent in the domain, in which case you should make sure the feature requester
    is on the same page as you. If the complexity is accidental, though, your code
    probably needs to be reworked to make it easier to work in.


    *Do you have consistently high estimates?*

    Some teams use estimates to predict the amount of work they will do in a given
    timeline. If features consistently have high estimates, ask yourself the source
    of the estimate. Is complexity driving the high estimate, and is that complexity
    necessary? Is it risk and fear of the unknown? If it’s the latter, ask why your
    codebase feels risky to work in. Some teams split features into separate estimates
    by'
