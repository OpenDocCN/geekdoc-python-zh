  mdcn: "## 讨论主题\n\n审视你代码库中集合与泛型的使用情况，并评估其向未来开发者传递的信息量。你的代码库中有多少自定义集合类型？新开发者仅通过类型签名和名称，能了解这些集合类型的哪些信息？是否存在可以更通用地定义的集合？其他使用泛型的类型又如何呢？\n\
    \n现在，类型注解若没有类型检查器的辅助，便无法发挥其全部潜力。在下一章中，我将聚焦于类型检查器本身。你将学习如何有效配置类型检查器、生成报告以及评估不同的检查器。你对工具了解得越多，就能越有效地运用它。对于你的类型检查器来说，尤其如此。\n\
    \n## 第六章\n\n## 定制你的类型检查器\n\n类型检查器是构建健壮代码库的最佳资源之一。mypy 的首席开发者 Jukka Lehtosalo 对类型检查器给出了一个简洁而优美的定义：“本质上，[类型检查器]提供的是经过验证的文档。”¹\
    \ 类型注解为你的代码库提供文档，使其他开发者能够理解你的意图。类型检查器利用这些注解来验证文档是否与行为一致。\n\n因此，类型检查器是无价之宝。孔子曾说：“工欲善其事，必先利其器。”²\
    \ 本章就是关于如何磨利你的类型检查器。优秀的编码技巧能让你走得很远，但真正让你提升到新境界的是你周围的工具链。不要仅仅满足于学习你的编辑器、编译器或操作系统。也要学习你的类型检查器。我将向你展示一些更有用的选项，以帮助你最大限度地利用这些工具。\n\
    \n## 配置你的类型检查器\n\n我将聚焦于目前最受欢迎的类型检查器之一：mypy。当你在 IDE（如 PyCharm）中运行类型检查器时，它通常在底层运行的是\
    \ mypy（尽管许多 IDE 允许你更改默认的类型检查器）。任何时候你配置了 mypy（或你默认的类型检查器），你的 IDE 也会使用该配置。\n\nMypy\
    \ 提供了相当多的配置选项来控制类型检查器的*严格程度*，即报告错误的数量。你将类型检查器设置得越严格，就需要编写越多的类型注解，这提供了更好的文档并减少了\
    \ bug。然而，如果类型检查器过于严格，你会发现开发代码的最低门槛太高，导致修改成本高昂。Mypy 的配置选项控制着这些严格程度。我将介绍不同的可用选项，你可以为你和你的代码库决定这个门槛在哪里。\n\
    \n首先，你需要安装 mypy（如果尚未安装）。最简单的方法是通过命令行使用 pip：\n\n```\npip install mypy\n```\n\n\
    安装 mypy 后，你可以通过以下三种方式之一来控制配置：\n\n*命令行*\n从终端启动 mypy 时，你可以传递各种选项来配置行为。这对于在代码库中探索新的检查非常有用。\n\
    \n*内联配置*\n你可以在文件顶部指定配置值，以指示你可能想要设置的任何选项。例如：\n\n```\n# mypy: disallow-any-generics\n\
    ```\n\n将此行放在文件顶部，将告诉 mypy 如果发现任何用 Any 注解的泛型类型，则显式地报错。\n\n*配置文件*\n你可以设置一个配置文件，以便每次运行\
    \ mypy 时都使用相同的选项。当需要在团队中共享相同选项时，这非常有用。此文件通常与代码一起存储在版本控制中。\n\n## 配置 mypy\n\n运行\
    \ mypy 时，它会在当前目录中查找名为 *mypy.ini* 的配置文件。此文件将定义你为项目设置的选项。一些选项是全局的，应用于每个文件，而其他选项是按模块的。一个示例\
    \ *mypy.ini* 文件可能如下所示：\n\n```\n# 全局选项：\n\n[mypy]\npython_version = 3.9\nwarn_return_any\
    \ = True\n\n# 按模块选项：\n\n[mypy-mycode.foo.*]\ndisallow_untyped_defs = True\n\n\
    [mypy-mycode.bar]\nwarn_return_any = False\n\n[mypy-somelibrary]\nignore_missing_imports\
    \ = True\n```\n\n你可以使用 --config-file 命令行选项来指定不同位置的配置文件。此外，如果 mypy 找不到本地配置文件，它会在特定的主目录中查找配置文件，以防你希望在多个项目中使用相同的设置。更多信息，请查看\
    \ [mypy 文档](https://mypy.readthedocs.io/)。\n\n请注意，我不会过多介绍配置文件。我将讨论的大多数选项在配置文件和命令行中都有效，为了简单起见，我将向你展示如何在\
    \ mypy 调用中运行这些命令。\n\n在接下来的页面中，我将介绍多种类型检查器配置；你不需要应用每一个配置才能看到类型检查器的价值。大多数类型检查器开箱即用就能提供巨大的价值。然而，请随意考虑以下选项，以提高类型检查器发现错误的可能性。\n\
    \n## 捕获动态行为\n\n如前所述，Python 的动态类型特性会使长期维护的代码库变得困难。变量可以随时重新绑定到具有不同类型的值。当这种情况发生时，变量本质上就是\
    \ Any 类型。Any 类型表明你不应该对该变量的类型做任何假设。这使得推理变得棘手：你的类型检查器在防止错误方面不会有太大用处，而且你也没有向未来的开发者传达任何特殊信息。\n\
    \nMypy 提供了一组标志，你可以打开它们来标记 Any 类型的实例。例如，你可以打开 --disallow-any-expr 选项来标记任何具有 Any\
    \ 类型的表达式。打开该选项后，以下代码将失败：\n\n```\nfrom typing import Any\nx: Any = 1\ny = x + 1\n\
    \ntest.py:4: error: Expression has type \"Any\"\nFound 1 error in 1 file (checked\
    \ 1 source file)\n```\n\n另一个我喜欢的用于禁止在类型声明（如集合）中使用 Any 的选项是 --disallow-any-generics。这会捕获在任何使用泛型（如集合类型）的地方使用\
    \ Any 的情况。打开此选项后，以下代码将无法通过类型检查：\n\n```\nx: list = [1,2,3,4]\n```\n\n你需要显式地使用 list[int]\
    \ 才能使此代码正常工作。\n\n你可以在 [mypy 动态类型文档](https://mypy.readthedocs.io/en/stable/dynamic_typing.html)\
    \ 中查看所有禁用 Any 使用的方法。\n\n不过，要小心过于宽泛地禁用 Any。Any 有一个有效的用例，你不希望错误地标记它。Any 应保留用于你绝对不关心某物是什么类型，并且由调用者负责验证类型的情况。一个典型的例子是异构键值存储（可能是一个通用缓存）。\n\
    \n## 要求类型\n\n如果没有类型注解，则表达式是无类型的。在这些情况下，如果 mypy 无法推断类型，则会将该表达式的结果视为 Any 类型。但是，之前用于禁止\
    \ Any 的检查不会捕获函数未被注解的情况。有一组单独的标志用于检查未注解的函数。\n\n除非设置了 --disallow-untyped-defs 选项，否则此代码在类型检查器中不会报错：\n\
    \n```\ndef plus_four(x):\n    return x + 4\n```\n\n设置该选项后，你将收到以下错误：\n\n```\ntest.py:4:\
    \ error: Function is missing a type annotation\n```\n\n如果这对你来说太严格了，你可能需要查看 --disallow-incomplete-defs，它仅在函数只有部分变量/返回值被注解（但不是全部）时才标记，或者\
    \ --disallow-untyped-calls，它仅标记从已注解函数到未注解函数的调用。你可以在 [mypy 文档](https://mypy.readthedocs.io/en/stable/command_line.html)\
    \ 中找到所有关于未注解函数的不同选项。\n\n## 处理 None/Optional\n\n在[第四章](https://example.com/chapter4)中，你了解到在使用\
    \ None 值时，很容易犯下“价值十亿美元的错误”。如果你不打开其他任何选项，请确保在类型检查器中打开 --strict-optional 以捕获这些代价高昂的错误。你绝对希望检查你对\
    \ None 的使用是否隐藏了任何潜在的 bug。\n\n使用 --strict-optional 时，你必须显式执行 is None 检查；否则，你的代码将无法通过类型检查。\n\
    \n---\n¹ Jukka Lehtosalo. “Our Journey to Type Checking 4 Million Lines of Python.”\
    \ *Dropbox Tech* (blog). Dropbox, September 5, 2019. https://oreil.ly/4BK3k.\n\
    ² Confucius and Arthur Waley. *The Analects of Confucius*. New York, NY: Random\
    \ House, 1938."
