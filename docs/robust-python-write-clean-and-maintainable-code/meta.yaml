    # Security Analysis


    Security is difficult to do right, and hardly anyone ever gets lauded for breach
    prevention. Instead, it''s the breaches themselves that seem to dominate the news.
    Every month I hear of another breach or data leak. These breakdowns are incredibly
    costly to a company, be it from regulatory fines or loss of customer base.


    Every developer needs to be hyperaware of the security of their codebase. You
    don''t want to hear about how *your* codebase is the root cause of the latest
    massive data breach in the news. Thankfully, there are static analysis tools that
    can prevent common security flaws.


    # Leaking secrets


    If you ever want to be terrified, search for the text `AWS_SECRET_KEY` in your
    favorite code-hosting tool, like [GitHub](https://github.com). You will be amazed
    at how many people commit secret values such as the key that provides access to
    AWS.⁴


    Once a secret is in a version control system, especially a publicly hosted one,
    it is very hard to remove traces of it. The organization is forced to revoke any
    leaked credentials, but they have to do it faster than the troves of hackers trawling
    repositories for keys. To prevent this, use a static analysis tool that specifically
    looks for leaked secrets, such as [dodgy](https://github.com/Yelp/dodgy). If you
    don''t choose to use a prebuilt tool, at least perform a text search on your codebase
    to make sure that nobody is leaking common credentials.


    # Security flaw checking


    Checking for leaked credentials is one thing, but what about more serious security
    flaws? How do you find things like SQL injection, arbitrary code execution, or
    incorrectly configured network settings? When exploited, these sorts of flaws
    can be detrimental to your security profile. But, just like every other problem
    in this chapter, there is a static analysis tool for handling this: Bandit.


    Bandit checks for common security problems. You can find a full list in the [Bandit
    documentation](https://bandit.readthedocs.io), but here is a preview of the sorts
    of flaws Bandit looks for:


    +   - Flask in debug mode, which can lead to remote code execution

    - Making an HTTPS request without certificate validation turned on


