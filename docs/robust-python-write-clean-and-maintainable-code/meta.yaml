    - There are six error codes (0–5); 0 indicates success).\n- disposed_of is only\
    \ True or False.\n\nNow how many different values can be represented in this combination\
    \ of fields? The answer is 144, which is a grossly large number. I achieve this\
    \ by the following:\n\n3 possible types for name × 4 possible types for condiments\
    \ × 6 error codes × 2 boolean values for if the entry has been disposed of = 3×4×6×2\
    \ = 144.\n\nIf you were to accept that any of these values could be None, the\
    \ total balloons to 420. While you should always think about None while coding\
    \ (see earlier in this chapter about Optional), for this thought exercise, I’m\
    \ going to ignore None values.\n\nThis sort of operation is known as a *product\
    \ type*; the number of representable states is determined by the product of possible\
    \ values. The problem is, not all of these states are valid. The variable disposed_of\
    \ should only be set to True if an error code is set to nonzero. Developers will\
    \ make this assumption, and trust that the illegal state never shows up. However,\
    \ one innocent mistake can bring your whole system crashing to a halt. Consider\
    \ the following code:\n\n```\ndef serve(snack):\n    # if something went wrong,\
    \ return early\n    if snack.disposed_of:\n        return\n    # ...\n```\n\n\
    In this case, a developer is checking disposed_of without checking for the nonzero\
    \ error code first. This is a logic bomb waiting to happen. This code will work\
    \ completely fine as long as disposed_of is True *and* the error code is nonzero.\
    \ If a valid snack ever sets the disposed_of flag to True erroneously, this code\
    \ will start producing invalid results. This can be hard to find, as there’s no\
    \ reason for a developer who is creating the snack to check this code. As it stands,\
    \ you have no way of catching this sort of error other than manually inspecting\
