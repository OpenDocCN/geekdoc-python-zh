    My favorite part about stevedore is that it actually can work *across* packages.
    You can write plug-ins in a completely separate Python package than the core.
    As long as the same namespace is used for the plug-in, stevedore can stitch everything
    together. stevedore has a load of other features that are worth checking out,
    such as event notifications, enabling plug-ins through a variety of methods, and
    automatic plug-in documentation generation. If a plug-in architecture meets your
    needs, I highly recommend checking out more of stevedore.


    ![](img/d64d2be45ca85b398807d181202e7046_300_0.png)


    You can technically register any class as a plug-in, regardless of whether it
    is substitutable for the base class or not. Because the code is separated by an
    abstract layer with stevedore, your type-checker will not be able to detect this.
    Consider checking the interface at runtime to catch any mismatches before using
    the plug-in.


    # Closing Thoughts


    When you create pluggable Python, you give your collaborators the ability to isolate
    new functionality but still easily integrate it into an existing codebase. Developers
    can plug into an existing algorithm with the Template Method Pattern, an entire
    class or algorithm with the Strategy Pattern, or even entire subsystems with stevedore.
    stevedore is especially useful when you want to split your plug-ins across discrete
    Python packages.


    This concludes Part III, which was all about extensibility. Writing extensible
    code is adhering to the Open-Closed Principle, where you make it easy to add onto
    your code without requiring modifications to existing code. Event-driven architectures
    and plug-in architectures are fantastic examples of designing with extensibility
    in mind. All of these architectural patterns require you to be aware of dependencies:
    physical, logical, and temporal. As you find ways to minimize physical dependencies,
    you’ll find that your code becomes composable, and can be rearranged in new compositions
    at will.


    The first three parts of this book focused on changes that can make your code
    more maintainable and readable and reduce the chance of errors. However, errors
    still have a chance of showing up; they are an unavoidable part of developing
    software. To combat this, you need to make it easy to detect errors before they
    hit production. You’ll learn how to do just that with tools like linters and tests
    in Part IV, *Building a Safety Net*.'
