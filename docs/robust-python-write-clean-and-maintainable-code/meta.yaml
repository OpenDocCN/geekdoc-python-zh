    \ to reduce maintainability and make code harder to reuse for general purposes.\n\
    \n## Logical Dependencies\n\nA *logical dependency* is when two entities have\
    \ a relationship but no direct linkage in code. The dependency is abstracted;\
    \ it contains a layer of indirection. It's a dependency that is only present at\
    \ runtime. In our pizza maker example, we have three subsystems interacting with\
    \ one another. We represented the dependency with arrows in Figure 16-3. If those\
    \ arrows are imports or function calls, then they are physical dependencies. However,\
    \ it's possible to link these subsystems at runtime without function calls or\
    \ imports.\n\nSuppose subsystems live on different computers and communicate over\
    \ HTTP. If the pizza maker were to notify the table management service on when\
    \ the pizza is made over HTTP using the requests library, it would look something\
    \ like this:\n\n```\ndef on_pizza_made(order: int, pizza: Pizza):\n    requests.post(\"\
    table-management/pizza-made\", {\n        \"id\": order,\n        \"pizza\": pizza.to_json()\n\
    \    })\n```\n\nThe physical dependency is no longer from the pizza maker to our\
    \ table management system, but from the pizza maker to the requests library. As\
    \ far as the pizza maker is concerned, it just needs an HTTP endpoint that it\
    \ can post to an endpoint called “/pizza-done” from some web server named “table-management.”\
    \ That endpoint needs to accept an ID and pizza data formatted as JSON.\n\nNow,\
    \ in reality, your pizza maker still needs a table management service to work.\
    \ This is the logical dependency at play. Even though there is no direct dependency,\
    \ there is still a relationship between the pizza maker and table management systems.\
    \ This relationship doesn’t just disappear; it transforms from physical to logical.\n\
    \nThe key benefit for introducing a logical dependency is substitutability. It\
    \ is much easier to replace a component when nothing is physically depending on\
    \ it. Take the example with the on_pizza_done over HTTP request. You could completely\
    \ replace the table management service, as long as it upholds the same contract\
    \ as the original service. If that sounds familiar, it should, as it’s the exact\
    \ same idea you learned about in Chapter 12. Subtyping, whether through duck typing,\
    \ inheritance, or something similar, introduces logical dependencies. Calling\
    \ code physically depends on the base class, but the logical dependency of which\
    \ child class is used isn’t determined until runtime.\n\nImproving substitutability\
    \ improves maintainability. Remember, maintainable code is easy to change. If\
    \ you can substitute entire swaths of functionality with minimal impact, you give\
    \ your future maintainers immense flexibility in making decisions. If a specific\
    \ function or class or subsystem isn’t growing to your needs, you can just replace\
    \ it. Code that is easy to delete is inherently easy to change.\n\nAs with anything\
    \ though, logical dependencies come with a cost. Every logical dependency is an\
    \ indirect reference to some relationship. Because there is no physical linkage,\
    \ tooling has a very hard time identifying logical dependencies. You won’t be\
    \ able to create a nice box-and-arrows diagram of logical dependencies. Furthermore,\
    \ as developers read your code, the logical dependencies won’t be immediately\
    \ apparent. Often, a reader of code will see the physical dependency to some layer\
