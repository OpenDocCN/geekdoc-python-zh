    - Weak cryptographic key creation

    - Flagging untrusted data influencing code paths, such as unsafe YAML loading


    Bandit checks for so many different potential security flaws. I highly recommend
    running it against your codebase:


    ```

    pip install bandit

    bandit -r path/to/your/code

    ```


    Bandit also has a robust plug-in system, so that you can augment the flaw detection
    with your own security checks.


    > While security-oriented static analyzers are very useful, do not make them your
    only line of defense. Supplement these tools by continuing additional security
    practices (such as conducting audits, running penetration tests, and securing
    your networks).


    # Closing Thoughts


    Catching errors early saves you time and money. Your goal is to find errors as
    you develop code. Static analysis tools are your friends in this endeavor. They
    are a cheap, quick way to find any problems in your codebase. There are a variety
    of static analyzers to meet your needs: linters, security checkers, and complexity
    checkers. Each has its own purpose and provides a layer of defense. And for the
    errors that these tools don''t catch, you extend the static analyzers through
    the use of a plug-in system.


    While static analyzers are your first line of defense, they are not your only
    line. For the rest of the book, I will focus on tests. The next chapter will focus
    on your testing strategy. I''ll walk through how you need to organize your tests,
    as well as the best practices surrounding writing tests. You''ll learn how to
    write a testing triangle, how to ask the right questions around testing, and how
    to write effective developer tests.'
