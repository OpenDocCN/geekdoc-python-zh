  - "[PAGE 334]\n\n# CHAPTER 22\nAcceptance Testing\n\nAs a developer, it is easy\
    \ to focus on the tests that directly surround your codebase: unit tests, integration\
    \ tests, UI tests, and the like. These tests verify that the code is doing what\
    \ you intend. They are an invaluable tool to keep your codebase regression free.\
    \ They are also completely the *wrong* tool for building what a customer expects.\n\
    \nDevelopers write these tests with full knowledge of the code, which means the\
    \ tests are biased toward that developer's expectations. There is no guarantee\
    \ that this tested behavior is actually what the *customer* wants, though.\n\n\
    Consider the following unit test:\n\n```\ndef test_chili_has_correct_ingredients():\n\
    \    assert make_chili().ingredients() == [\n        \"Ground Beef\",\n      \
    \  \"Chile Blend\",\n        \"Onion\",\n        ...\n        \"Tomatoes\",\n\
    \        \"Pinto Beans\"\n    ]\n```\n\nThis test might be airtight; it passes\
    \ and catches any regression made in the code. However, when presented to a customer,\
    \ you might be confronted with: “No, I wanted Texas-style chili! You know, no\
    \ tomatoes or beans?” All the unit tests in the world won't save you from building\
    \ the wrong thing.\n\nThis is where acceptance testing comes in. *Acceptance tests*\
    \ check that you are building the correct product. While unit tests and integration\
    \ tests are a form of *verification*, acceptance tests are *validation*. They\
    \ validate that you are building what the user expects."
  - '[PAGE 335]


    In this chapter, you will learn about acceptance testing in Python. I''ll show
    you the behave framework, which uses the Gherkin language to define requirements
    in a whole new fashion.¹ You''ll walk through behavior-driven development (BDD)
    as a tool to clarify conversations. Acceptance testing is a crucial part of building
    a safety net; it will protect you from building the wrong thing.


    # Behavior-Driven Development


    The mismatch between customer expectations and software behavior is as old as
    software development. The problem stems from translating natural language to programming
    language. Natural language is rife with ambiguities, inconsistencies, and nuance.
    Programming languages are rigid. The computer does exactly what you tell it to
    do (even if it''s not what you meant). Even worse, it''s like a game of Telephone²
    as the requirements get passed through a few people (customers, sales, managers,
    testers) before the test is ever written.


    As with everything in the software life cycle, this error case only gets more
    costly the longer it takes to fix. Ideally, you want to find out these issues
    as you''re coming up with user requirements. This is where behavior-driven development
    comes into play.


    # The Gherkin Language


    *Behavior-driven development*, first pioneered by Daniel Terhorst-North, is a
    practice that focuses on defining the behaviors in your system. BDD focuses on
    clarifying communications; you iterate over the requirements with the end user,
    defining the behaviors they want.


    Before you write a single lick of code, you make sure that you have agreement
    on what the right thing to build is. The set of defined behaviors will *drive*
    what code you write. You work with the end user (or their proxy, such as a business
    analyst or product manager) to define your requirements as a specification. These
    specifications follow a formal language, to introduce a bit more rigidity in their
    definition. One of the most common languages for specifying requirements is Gherkin.


    Gherkin is a specification that follows the *Given-When-Then* (GWT) format. Every
    requirement is organized as follows:


    > 1 The Gherkin language was created by Aslak Hellesøy. His wife suggested that
    his BDD testing tool be named Cucumber (apparently for no specific reason), and
    he wanted to distinguish the specification language from the testing tool itself.
    Since a gherkin is a small, pickled cucumber, he continued the theme, and the
    Gherkin specification language was born.


    2 Telephone is a game where everyone sits in a circle, and one person whispers
    a message to another. The message continues to get whispered around the circle
    until it reaches the origin. Everyone has a laugh at how the message has gotten
    distorted.'
  - "[PAGE 336]\n\n```\nFeature: Name of test suite\n\nScenario: A test case\n   \
    \ Given some precondition\n    When I take some action\n    Then I expect this\
    \ result\n```\n\nFor instance, if I wanted to capture a requirement that checks\
    \ for vegan substitution of a dish, I would write it as follows:\n\n```\nFeature:\
    \ Vegan-friendly menu\n\nScenario: Can substitute for vegan alternative\n    Given\
    \ an order containing a Cheeseburger with Fries\n    When I ask for vegan substitutions\n\
    \    Then I receive the meal with no animal products\n```\n\nAnother requirement\
    \ might be that certain dishes can’t be made vegan:\n\n```\nScenario: Cannot substitute\
    \ vegan alternatives for certain meals\n    Given an order containing Meatloaf\n\
    \    When I ask for vegan substitutions\n    Then an error shows up stating the\
    \ meal is not vegan substitutable\n```\n\n> If the GWT format feels familiar,\
    \ that’s because it’s identical to the AAA test organization you learned about\
    \ in Chapter 21.\n\nBy working with your end users to write your requirements\
    \ in this fashion, you benefit from a few key principles:\n\n*Write using plain\
    \ language*\nThere’s no need to delve into any programming languages or formal\
    \ logic. Everything is written in a form that is intelligible to both business\
    \ people and developers. This makes it incredibly easy to home in on what the\
    \ end user actually wants.\n\n*Build a shared vocabulary*\nAs the number of requirements\
    \ increases, you find that you start having the same clauses in multiple requirements\
    \ (see above with When I ask for vegan substitutions). This builds up your domain\
    \ language and will make it easier for all involved parties to understand the\
    \ requirements.\n\n*Requirements are testable*\nThis is probably the biggest benefit\
    \ of this requirement format. Because you are writing the requirement as GWT,\
    \ you are inherently specifying an acceptance test to write. With the chili example\
    \ used in this chapter, imagine if the Gherkin test was specified as such:"
  - '[PAGE 337]


    ```

    Scenario: Texas-Style Chili

    Given a Chili-Making Machine

    When a Chili is dispensed

    Then that dish does not contain beans

    And that dish does not contain tomatoes

    ```


    It becomes much clearer what tests need to be written to act as acceptance tests.
    If the Gherkin test has any ambiguities, you can work with the end user to figure
    out what a concrete test should be. This can also help with traditionally vague
    requirements such as, “The Chili-Making Machine should be fast.” Instead, by focusing
    on a concrete test, you end up with a test like this:


    ```

    Scenario: Chili order takes less than two minutes

    Given a Chili-Making Machine

    When a Chili is ordered

    Then the Chili is dispensed to the customer within two minutes

    ```


    ![](img/d64d2be45ca85b398807d181202e7046_337_0.png)


    These requirements specifications are not a silver bullet to eliminate bugs in
    requirements. They are instead a mitigation strategy. If you have technical and
    business people review them before code is written, you will have a better chance
    of discovering ambiguities or mismatched intentions.


    Once you start defining your tests in Gherkin, you can do something awesome: you
    can make your specifications *executable*.


    # Executable Specifications


    *Executable specifications* translate a set of requirements directly to code.
    This means that not only are your requirements *testable*, but they are *tests*
    as well. When the requirements change, your tests will change at the same time.
    This is the ultimate form of *traceability*, or the ability to connect your requirements
    to specific tests or code.


    ![](img/d64d2be45ca85b398807d181202e7046_337_1.png)


    **Discussion Topic**

    How does your organization track requirements? How do you trace those requirements
    to test cases? How do you handle requirements changing? Discuss how your processes
    would change if your requirements and tests were the same thing.


    The Python module `behave` allows you to back your Gherkin requirements with concrete
    tests. It does so by associating functions with specific clauses in the requirement.'
- md: "## Additional behave Features\n\nThe previous example was a bit bare-bones,\
    \ but thankfully, behave provides some extra features to make test writing even\
    \ easier.\n\n### Parameterized Steps\n\nYou may have noticed that I have two Given\
    \ steps that are very similar:\n\n```\nGiven an order containing a Cheeseburger\
    \ with Fries\n```\n\nand\n\n```\nGiven an order containing Meatloaf\n```\n\nIt'd\
    \ be silly to write two similar functions to link this in Python. behave lets\
    \ you parameterize the steps to reduce the need for writing multiple steps:\n\n\
    ```\n@given(\"an order containing {dish_name}\")\ndef setup_order(ctx, dish_name):\n\
    \    if dish_name == \"a Cheeseburger with Fries\":\n        ctx.dish = CheeseburgerWithFries()\n\
    \    elif dish_name == \"Meatloaf\":\n        ctx.dish = Meatloaf()\n```\n\nAlternatively,\
    \ you can stack clauses on a function if needed:\n\n```\n@given(\"an order containing\
    \ a Cheeseburger with Fries\")\n@given(\"a typical drive-thru order\")\ndef setup_order(context):\n\
    \    ctx.dish = CheeseBurgerWithFries()\n```\n\nParameterizing and reusing steps\
    \ will help you build up vocabulary that is intuitive to use, which will reduce\
    \ the cost of writing Gherkin tests.\n\n### Table-Driven Requirements\n\nIn Chapter\
    \ 21, I mentioned how you can parameterize tests so that all your pre-conditions\
    \ and assertions are defined in a table. behave offers something very similar:\n\
    \n```\nFeature: Vegan-friendly menu\n\nScenario Outline: Vegan Substitutions\n\
    \  Given an order containing <dish_name>,\n  When I ask for vegan substitutions\n\
    \  Then <result>\n\nExamples: Vegan Substitutable\n  | dish_name             \
    \   | result |\n  | a Cheeseburger with Fries | I receive the meal with no animal\
    \ products |\n  | Cobb Salad               | I receive the meal with no animal\
    \ products |\n  | French Fries             | I receive the meal with no animal\
    \ products |\n  | Lemonade                 | I receive the meal with no animal\
    \ products |\n\nExamples: Not Vegan Substitutable\n  | dish_name    | result |\n\
    \  | Meatloaf     | a non-vegan-substitutable error shows up |\n  | Meatballs\
    \    | a non-vegan-substitutable error shows up |\n  | Fried Shrimp | a non-vegan-substitutable\
    \ error shows up |\n```\n\nbehave will automatically run a test for each table\
    \ entry. This is a great way to run the same test on very similar data.\n\n###\
    \ Step Matching\n\nSometimes, the basic decorators don't have enough flexibility\
    \ to capture what you are trying to express. You can tell behave to use regular\
    \ expression parsing in your decorators. This is useful to make the Gherkin specifications\
    \ feel more natural to write (especially getting around complex data formats or\
    \ wonky grammar issues). Here's an example that allows you to specify dishes with\
    \ an optional \"a\" or \"an\" beforehand (so that dish names can be simplified).\n\
    \n```\nfrom behave import use_context_matcher\n\nuse_step_matcher(\"re\")\n\n\
    @given(\"an order containing [a |an ]?(?P<dish_name>.*)\")\ndef setup_order(ctx,\
    \ dish_name):\n    ctx.dish = create_dish(dish_name)\n```\n\n### Customizing the\
    \ Test Life Cycle\n\nSometimes you need to run code before or after your tests\
    \ run. Say you need to set up a database before all the specifications are set,\
    \ or tell a service to clear its cache between test runs. Just like setUp and\
    \ tearDown in the built-in unittest module, behave offers functions that let you\
    \ hook in functions before or after steps, features, or the entire test run. Use\
    \ this to consolidate common setup code. To take full advantage of this functionality,\
    \ you can define specifically named functions in a file named environment.py.\n\
    \n```\ndef before_all(ctx):\n    ctx.database = setup_database()\n\ndef before_feature(ctx,\
    \ feature):\n    ctx.database.empty_tables()\n\ndef after_all(ctx):\n    ctx.database.cleanup()\n\
    ```\n\nCheck out the [behave documentation](https://behave.readthedocs.io/) for\
    \ more information on controlling your environment. If you are more comfortable\
    \ with pytest fixtures, check out behave [fixtures](https://behave.readthedocs.io/en/latest/fixtures.html)\
    \ for very similar ideas.\n\nFunctions like before_feature and before_scenario\
    \ get the feature or scenario, respectively, passed to them. You can key off the\
    \ names of these features and scenarios to do specific actions for specific parts\
    \ of your tests.\n\n### Using Tags to Selectively Run Tests\n\nbehave also offers\
    \ the ability to tag certain tests with arbitrary text. These tags can be anything\
    \ you want: @wip for work in progress, @slow for slow running tests, @smoke for\
    \ a select few tests for running on each check-in, and so on.\n\nTo tag a test\
    \ in behave, just decorate your Gherkin scenario:\n\n```\nFeature: Vegan-friendly\
    \ Menu\n\n@smoke\n@wip\nScenario: Can substitute for vegan alternatives\n    Given\
    \ an order containing a Cheeseburger with Fries\n    When I ask for vegan substitutions\n\
    \    Then I receive the meal with no animal products\n```\n\nTo run just tests\
    \ with a specific tag, you can pass a --tags flag to your behave invocation:\n\
    \n```\nbehave code_examples/chapter22 --tags=smoke\n```\n\nIf you'd like to exclude\
    \ tests from being run, prefix the tags with a hyphen, as seen in this example\
    \ where I exclude tests tagged with wip from being run:\n\n```\nbehave code_examples/chapter22\
    \ --tags=-wip\n```\n\n### Report Generation\n\nUsing behave and BDD to drive your\
    \ acceptance testing will not pay off if you are not involving your end users\
    \ or their proxies. Find ways to make it easy for them to understand and use the\
    \ Gherkin requirements.\n\nYou can get a list of all step definitions by invoking\
    \ behave --steps-catalog.\n\nOf course, you also need a way of showing test results\
    \ to give your end users an idea of what is working and what is not. behave lets\
    \ you format outputs in a variety of different ways (and you can define your own).\
    \ Out of the box, there is also the ability to create reports from JUnit, a unit-testing\
    \ framework designed for the Java language. JUnit writes its test results as a\
    \ XML file, and a lot of tools were built to ingest and visualize the test results.\n\
    \nTo generate a JUnit test report, you can pass --junit to your behave invocation.\
    \ Then, you can use a tool junit2html to get a report for all of your test cases:\n\
    \n```\npip install junit2html\nbehave code_examples/chapter22/features/ --junit\n\
    ```"
  mdcn: "## 额外的 behave 功能\n\n前面的例子有点简陋，但值得庆幸的是，behave 提供了一些额外功能，使测试编写变得更加轻松。\n\n###\
    \ 参数化步骤\n\n你可能已经注意到，我有两个非常相似的 Given 步骤：\n\n```\nGiven an order containing a Cheeseburger\
    \ with Fries\n```\n\n和\n\n```\nGiven an order containing Meatloaf\n```\n\n编写两个类似的函数来在\
    \ Python 中链接它们是愚蠢的。behave 允许你对步骤进行参数化，以减少编写多个步骤的需要：\n\n```\n@given(\"an order\
    \ containing {dish_name}\")\ndef setup_order(ctx, dish_name):\n    if dish_name\
    \ == \"a Cheeseburger with Fries\":\n        ctx.dish = CheeseburgerWithFries()\n\
    \    elif dish_name == \"Meatloaf\":\n        ctx.dish = Meatloaf()\n```\n\n或者，如果需要，你可以在一个函数上堆叠多个子句：\n\
    \n```\n@given(\"an order containing a Cheeseburger with Fries\")\n@given(\"a typical\
    \ drive-thru order\")\ndef setup_order(context):\n    ctx.dish = CheeseBurgerWithFries()\n\
    ```\n\n参数化和重用步骤将帮助你构建直观易用的词汇表，从而降低编写 Gherkin 测试的成本。\n\n### 表格驱动的需求\n\n在第 21 章中，我提到了如何对测试进行参数化，以便在表格中定义所有前置条件和断言。behave\
    \ 提供了非常相似的功能：\n\n```\nFeature: Vegan-friendly menu\n\nScenario Outline: Vegan\
    \ Substitutions\n  Given an order containing <dish_name>,\n  When I ask for vegan\
    \ substitutions\n  Then <result>\n\nExamples: Vegan Substitutable\n  | dish_name\
    \                | result |\n  | a Cheeseburger with Fries | I receive the meal\
    \ with no animal products |\n  | Cobb Salad               | I receive the meal\
    \ with no animal products |\n  | French Fries             | I receive the meal\
    \ with no animal products |\n  | Lemonade                 | I receive the meal\
    \ with no animal products |\n\nExamples: Not Vegan Substitutable\n  | dish_name\
    \    | result |\n  | Meatloaf     | a non-vegan-substitutable error shows up |\n\
    \  | Meatballs    | a non-vegan-substitutable error shows up |\n  | Fried Shrimp\
    \ | a non-vegan-substitutable error shows up |\n```\n\nbehave 将自动为表格中的每个条目运行一次测试。这是在非常相似的数据上运行相同测试的好方法。\n\
    \n### 步骤匹配\n\n有时，基本的装饰器没有足够的灵活性来捕捉你想要表达的内容。你可以告诉 behave 在装饰器中使用正则表达式解析。这对于使 Gherkin\
    \ 规范感觉更自然地编写非常有用（特别是处理复杂的数据格式或奇怪的语法问题）。下面是一个例子，允许你在菜名前指定可选的 \"a\" 或 \"an\"（这样可以简化菜名）。\n\
    \n```\nfrom behave import use_context_matcher\n\nuse_step_matcher(\"re\")\n\n\
    @given(\"an order containing [a |an ]?(?P<dish_name>.*)\")\ndef setup_order(ctx,\
    \ dish_name):\n    ctx.dish = create_dish(dish_name)\n```\n\n### 自定义测试生命周期\n\n\
    有时你需要在测试运行之前或之后运行代码。假设你需要在所有规范设置之前建立数据库，或者告诉服务在测试运行之间清除缓存。就像内置的 unittest 模块中的\
    \ setUp 和 tearDown 一样，behave 提供了函数，让你可以在步骤、功能或整个测试运行之前或之后挂接函数。使用此功能来整合常见的设置代码。要充分利用此功能，你可以在名为\
    \ `environment.py` 的文件中定义特定命名的函数。\n\n```\ndef before_all(ctx):\n    ctx.database\
    \ = setup_database()\n\ndef before_feature(ctx, feature):\n    ctx.database.empty_tables()\n\
    \ndef after_all(ctx):\n    ctx.database.cleanup()\n```\n\n查看 [behave 文档](https://behave.readthedocs.io/)\
    \ 以获取有关控制环境的更多信息。如果你更熟悉 pytest fixtures，请查看 behave [fixtures](https://behave.readthedocs.io/en/latest/fixtures.html)，其中包含非常相似的概念。\n\
    \n像 `before_feature` 和 `before_scenario` 这样的函数会分别接收功能或场景作为参数。你可以根据这些功能和场景的名称来为测试的特定部分执行特定操作。\n\
    \n### 使用标签选择性运行测试\n\nbehave 还提供了用任意文本标记某些测试的能力。这些标签可以是任何你想要的东西：`@wip` 表示进行中的工作，`@slow`\
    \ 表示运行缓慢的测试，`@smoke` 表示每次签入时运行的少数几个测试，等等。\n\n要在 behave 中标记测试，只需装饰你的 Gherkin 场景：\n\
    \n```\nFeature: Vegan-friendly Menu\n\n@smoke\n@wip\nScenario: Can substitute\
    \ for vegan alternatives\n    Given an order containing a Cheeseburger with Fries\n\
    \    When I ask for vegan substitutions\n    Then I receive the meal with no animal\
    \ products\n```\n\n要仅运行带有特定标签的测试，你可以向 behave 调用传递 `--tags` 标志：\n\n```\nbehave\
    \ code_examples/chapter22 --tags=smoke\n```\n\n如果你想排除某些测试不运行，请在标签前加上连字符，如本例所示，我排除了标记为\
    \ `wip` 的测试：\n\n```\nbehave code_examples/chapter22 --tags=-wip\n```\n\n### 报告生成\n\
