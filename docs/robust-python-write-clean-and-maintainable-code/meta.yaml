    # Benefits of Type Annotations


    As with every decision you make, you need to weigh the costs and benefits. Thinking
    about types up front helps your deliberate design process, but do type annotations
    provide other benefits? I''ll show you how type annotations really pull their
    weight through tooling.


    # Autocomplete


    I''ve mainly talked about communication to other developers, but your Python environment
    benefits from type annotations as well. Since Python is dynamically typed, it
    is difficult to know what operations are available. With type annotations, many
    Python-aware code editors will autocomplete your variable''s operations.


    In Figure 3-1, you''ll see a screenshot that illustrates a popular code editor,
    VS Code, detecting a datetime and offering to autocomplete my variables.


    ![](img/d64d2be45ca85b398807d181202e7046_59_0.png)


    Figure 3-1. VS Code showing autocompletion


    # Typecheckers


    Throughout this book, I''ve been talking about how types communicate intent, but
    have been leaving out one key detail: no programmer has to honor these type annotations
    if they don''t want to. If your code contradicts a type annotation, it is probably
    an error and you''re still relying on humans to catch bugs. I want to do better.
    I want a computer to find these sorts of bugs for me.


    I showed this snippet when talking about dynamic typing back in Chapter 2:


    ```

    >>> a: int = 5

    >>> a = "string"

    >>> a

    "string"

    ```'
