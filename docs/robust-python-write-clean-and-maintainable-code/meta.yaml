    When you focus on making code composable, you need to separate the policies from
    the mechanisms. The mechanisms are often the thing you want to reuse; it doesn''t
    help when they are linked together with a policy. It''s this reason why a Soup
    Preparer depending on a BLT Maker doesn''t make sense. You end up with policy
    depending on a completely separate and unrelated policy.


    When you link two unrelated policies, you start creating a dependency that becomes
    tough to break later on. As you link more and more policies, you create spaghetti
    code. You get a tangled mess of dependencies, and extricating any one dependency
    becomes problematic. This is why you need to be cognizant of which parts of your
    codebase are policies and which are mechanisms.


    A great example of policy versus mechanisms is the `logging` module in Python.
    The policy outlines what you need logged and where to log it; the mechanisms are
    what let you set log levels, filter log messages, and format logs.


    Mechanically, any module can call logging methods:


    ```

    logging.basicConfig(format=''%(levelname)s:%(message)s'', level=logging.DEBUG)

    logger.warning("Family did not match any restaurants: Lookup code A1503")

    ```


    The `logging` module does not care what it is logging or about the format of the
    log message. The `logging` module simply provides the *how* of logging. It''s
    up to any consuming application to define the policies, or the *what*, which outline
    what needs to get logged. Separating the policy from the mechanism makes the `logging`
    module reusable. You can easily extend your codebase''s functionality without
    pulling along heaps of baggage. This is the model you should strive for in the
    mechanisms present in your codebase.


    > ## Composability in the Wild


    Once you start thinking about separating policies and mechanisms, you will start
    to see composability patterns show up in your everyday development life.


    Consider a Unix-style command line. Rather than defining new applications, the
    command line gives you small discrete programs that you can compose together through
    piping.


    Instead of writing a hyper-specialized program, such as parsing a log to get the
    error code, sorted by datetime, I could write the following on the command line:


    `grep -i "ERROR" log.txt | cut 3,5 | sort -r`


    Another example is continuous integration pipelines with third-party integrations
    (such as GitHub Actions or Travis CI). Developers want to run a series of checks
    and actions as part of their check-in process; many of these checks are provided
    by third-party entities (such as security scanners or pushing to a container registry).
    Developers don''t have to know the internals of how this is done. Instead, they
    define policies'
