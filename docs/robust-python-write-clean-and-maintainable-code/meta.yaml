  md: "![](img/d64d2be45ca85b398807d181202e7046_193_0.png)\n\nFigure 12-1. Inheritance\
    \ tree of restaurants\n\nBy defining inheritance in this fashion, you ensure that\
    \ the derived classes will inherit all the methods and attributes from the base\
    \ class, without needing to redefine them.\n\nThis means that if you were to instantiate\
