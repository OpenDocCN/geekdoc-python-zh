  md: '# CHAPTER 16

    Dependencies


    It is difficult to write a program with no dependencies. Functions depend on other
    functions, modules depend on other modules, and programs depend on other programs.
    Architecture is fractal; no matter what level you''re looking at, your code can
    be represented as some sort of box-and-arrows diagram, like in Figure 16-1. It
    doesn''t matter if it''s functions, classes, modules, programs, or systems, you
    can draw a similar diagram to Figure 16-1 to represent the dependencies in your
    code.


    ![](img/d64d2be45ca85b398807d181202e7046_244_0.png)


    Figure 16-1. Box-and-arrows diagram


    However, if you don''t actively manage your dependencies, you soon get to what''s
    known as “spaghetti code,” making your box-and-arrows diagram look like Figure
    16-2.'
  merge: -1
