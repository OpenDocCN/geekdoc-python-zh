    # Dynamic Versus Static Indexing


    Depending on the collection type you are using, you may or may not want to use
    a *static index*. A static index is what you get when you use a constant literal
    to index into the collection, such as `my_list[4]` or `my_dict["Python"]`. In
    general, lists and dictionaries will not often need a use case for this. You have
    no guarantee that the collection has the element you are looking for at that index,
    due to their dynamic nature. If you are looking for specific fields in these types
    of collections, this is a good sign that you need a user-defined type (explored
    in Chapters 8, 9 and 10). It is safe to statically index into a tuple, since they
    are fixed size. Sets and generators are never indexed into.


    Exceptions to this rule include:


    +   - Getting the first or last element of a sequence (`my_list[0]` or `my_list[-1]`)

    - Using a dictionary as an intermediate data type such as when reading JSON or
    YAML

    - Operations on a sequence dealing specifically with fixed chunks (e.g., always
    splitting after the third element or checking for a specific character in a fixed-format
    string)

    - Performance reasons for a specific collection type


    In contrast, *dynamic indexing* occurs whenever you index into a collection with
    a variable that is not known until runtime. This is the most appropriate choice
    for lists and dictionaries. You''ll see this when iterating over collections or
    searching for a specific element with an `index()` function.


    These are basic collections, but there are more ways to express intent. Here are
    some special collection types that are even more expressive in communicating to
    the future:


    `frozenset`

    A set that is immutable.


    `OrderedDict`

    A dictionary that preserves order of elements based on insertion time. As of CPython
    3.6 and Python 3.7, built-in dictionaries will also preserve order of elements
    based on insertion of time.'
