  - '[PAGE 174]


    # CHAPTER 11

    Defining Your Interfaces


    You have learned how to create your own user-defined types, but creating them
    is just half the battle. Now developers have to actually use your types. To do
    this, they use your type''s API. This is the set of types and related functions,
    along with any external functions, that a developer interacts with to use your
    code.


    Once you get your types in front of users, those types will be used (and abused)
    in ways that you never thought of. And once the developers depend on your types,
    it will be hard to change their behavior. This gives rise to what I call the *Paradox
    of Code Interfaces*:


    > You have one chance to get your interface right, but you won''t know it''s right
    until it''s used.


    As soon as developers use the types you create, they come to depend on the behavior
    that those types encompass. If you try to make a backward-incompatible change,
    you potentially break all calling code. The riskiness in changing your interface
    is proportional to the amount of outside code depending on it.


    This paradox doesn''t apply if you control all the code that depends on your type;
    you can change it. But as soon as that type hits production, and people start
    using it, you''ll find it difficult to change. In a large codebase, where robustness
    and maintainability matter, coordinating the change and buy-in needed to make
    a sweeping change is costly. It becomes near impossible if your type is used by
    entities outside your organizational control, such as open source libraries or
    platform SDKs. This quickly leads to code that is difficult to work with, and
    code that is difficult to work with will slow developers down.


    What''s worse is that you won''t truly know if an interface is natural to use
    until enough people depend on it, giving rise to the paradox. How can you even
    begin to design an interface if you don''t know how it will be used? Sure, you
    know how *you* would use'
  - '[PAGE 175]


    the interface, and that''s a great start, but you have an implicit bias when creating
    the interface. What feels natural to you won''t feel natural to everyone else.
    Your goal is for your users to do the right things (and avoid the wrong things)
    with minimal effort. Ideally, the users should not need to do anything extra to
    use your interface correctly.


    I don''t have a silver bullet for you; there is no foolproof way of writing an
    interface that meets everyone''s needs on the first try. Instead, I''ll talk about
    some principles you can apply to give you the best chance. For the cases where
    you need to make changes to an existing API, you''ll learn mitigation strategies.
    Your API is a first impression for other developers; make it count.


    ![](img/d64d2be45ca85b398807d181202e7046_175_0.png)


    **Discussion Topic**


    What interfaces are hard to use in your codebase? Look for common errors that
    people make when using your types. Also look for parts of your interface that
    are rarely invoked, especially if you feel like they are useful. Why don''t users
    call these useful functions? Discuss what costs appear when developers encounter
    these hard-to-use interfaces.


    # Natural Interface Design


    Your goal, tough as it may seem, is to make your interface appear natural to use.
    In other words, you want to reduce friction for the callers of your code. When
    code is hard to use, the following happens:


    *Duplicated functionality*


    Some developers who find your types hard to use will write their own types, duplicating
    functionality. It may be healthy for different ideas to compete on a large scale
    (like competing open source projects), but it is not healthy for that divergence
    to be present in your codebase. Developers are presented with a multitude of types,
    not sure which one to use. With their attention split, their wires will get crossed
    and they will make mistakes, which creates bugs, which costs money. Also, if you
    want to add anything to one of these types, you need to add them in all the places
    the functionality has diverged, or you''ll create bugs, which costs money.


    *Broken mental model*


    Developers build up a mental model of the code they work with. If certain types
    are difficult to reason about, that mental model breaks. Developers will misuse
    your types, causing subtle bugs. Perhaps they don''t call methods in the order
    that you require. Perhaps they miss calling a method that they should have. Perhaps
    they just misunderstand what the code is doing and pass the wrong information
    to it. Any of these will introduce fragility into your codebase.'
- md: '## Reduced testing


    Code that is hard to use is hard to test. It doesn’t matter if it’s a complicated
    interface, a large chain of dependencies, or involved interactions; if you can’t
    easily test the code, fewer tests will be written. The fewer tests that are written,
    the fewer bugs you’ll catch when things change. It is very frustrating to deal
    with tests breaking in subtle ways every time a seemingly unrelated change is
    made.


    Hard-to-use code will make your codebase unhealthy. You must take special care
    when designing your interfaces. Try to adhere to this rule of thumb from Scott
    Meyers:


    > Make interfaces easy to use correctly and hard to use incorrectly.¹


    You want developers to find your type easy to use, as if everything behaved as
    expected (this is a subtle restatement of the Law of Least Surprise, as mentioned
    in Chapter 1). Furthermore, you also want to prevent users from using your types
    the wrong way. It is your job to think about all the behaviors that you should
    support and forbid in your interface. To do this, you need to get into the heads
    of your collaborators.


    ## Thinking Like a User


    It’s tricky to think like a user, for you have been bestowed with the Curse of
    Knowledge. No arcane hex or mystical spell causes this; it is a by-product of
    your time with the codebase. As you build out ideas, you become so intimately
    familiar with them that it can blind you to how new users perceive your code.
    The first step to dealing with cognitive biases is to acknowledge them. From that
    point, you can take biases into account as you try to get into your users’ mindspace.
    Here are some useful strategies you can employ.


    ## Test-driven development


    Test-driven development (TDD), formulated by Kent Beck in the early 2000s, is
    a popular framework for testing your code.² TDD revolves around a simple loop:


    - Add a failing test.

    - Write just enough code to pass that test.

    - Refactor.


    There are entire books written about TDD, so I won''t go into too much detail
    about the mechanics.³ However, the intent of TDD is *fabulous* for understanding
    how to use a type.


    Many developers think that test-*driven* development (writing tests first) has
    similar benefits to test-*after* development (writing tests second). In both cases,
    you have tested code, right? When simplified to this degree, TDD doesn''t seem
    worth the effort.


    However, this is an unfortunate oversimplification. The confusion stems from thinking
    of TDD as a testing methodology, when in fact, it is a *design methodology*. The
    tests are important, but they are merely a by-product of the methodology. The
    true value lies in how tests help design your interface.


    With TDD, you are able to see how calling code looks before you write the implementation.
    Since you write the test first, you are given a chance to pause and ask yourself
    if how you interact with your types feels frictionless. If you find yourself making
    confusing function calls, building up long chains of dependencies, or having to
    write tests in a fixed order, you are experiencing red flags that should alert
    you that the type you''re building is too complicated. In these cases, reevaluate
    or refactor your interface. How great is it that you can simplify this code before
    you even write it?


    As an additional benefit, your tests serve as a form of documentation. Other developers
    will want to know how to use your code, especially the parts that are not described
    in top-level documentation. A good set of comprehensive unit tests provides working
    documentation of exactly how to use your type; you want them to leave a good first
    impression. Just as your code is a single source of truth for the behavior in
    your system, your tests are the single source of truth for interacting with your
    code.


    ## README-driven development


    Similar to TDD, README-driven development (RDD), coined by Tom Preston-Werner,
    is another design methodology aimed at catching hard-to-use code before it''s
    written. The goal with RDD is to distill your top-level ideas and most important
    interactions with your code into a single document that lives in your project:
    a README file. This is a great way to formulate how different parts of your code
    interact, and might provide higher level patterns for users to follow.


    RDD boasts some of the following benefits:


    - No need to create every level of documentation up front, like you would in a
    Waterfall methodology.

    - A README is often the first thing a developer sees; RDD gives you a chance to
    craft the best first impression you can.

    - It is easier to change the documentation based on team discussion than it is
    to change written code.

    - You don''t need to use the README to explain poor code decisions; instead, the
    code needs to morph to support the ideal use cases.


    Remember, you are only successful in building maintainable software if future
    developers can actually maintain it. Give them every chance you can to succeed
    and craft them an experience starting at your documentation.


    ## Usability testing


    Ultimately, you are trying to think about how your users think. There is a whole
    discipline dedicated to this very task: user experience (UX). UX is another area
    where there are countless books available, so I''ll just focus on one strategy
    that has done me wonders in simplifying code: usability testing.


    Usability testing is the process of actively asking your users what they think
    of your product. It sounds so simple, doesn''t it? In order to think about how
    your users will behave, just ask them. The simplest thing you can do is talk to
    potential users (in this case, other developers), but it''s easy to overlook.


    It''s incredibly easy to get started with usability testing through hallway testing.
    As you design your interface, just grab the first person to walk down your hallway
    and ask them to give feedback on your design. This is a great low-cost way of
    learning pain points. Don''t take this advice too literally though. Feel free
    to expand beyond whoever you see in a hallway and ask teammates, peers, or testers
    to evaluate your interface.


    However, for interfaces that will be used by a much broader audience (such as
    the interface of a popular open source library), you may want something a tad
    more formal. In these cases, usability testing involves placing your prospective
    users in front of the interface that you''re writing. You give them a set of tasks
    to complete, and then observe. Your role is not to teach them or lead them through
    the exercises, but to see where they struggle and where they excel. Learn from
    their struggles; they are showing areas that are definitively hard to use.


    ![](img/d64d2be45ca85b398807d181202e7046_178_0.png)


    Usability testing is a great task for the more junior members on your team. Their
    curse of knowledge won''t be as strong as with the senior members, and they will
    be more likely to evaluate the design with a fresh set of eyes.


    ## Natural Interactions


    Donald Norman describes a mapping as a relationship between “controls and their
    movements with results in the real world.” That mapping is natural if it “takes
    advantage of physical analogies and cultural standards, [leading] to immediate
    understanding.”⁴ This is what you strive for when you write an interface. You
    want that immediate understanding to eliminate confusion.


    The “controls and their movements” in this case are the functions and types that
    make up your interface. The “results in the real world” represent the behavior
    of the code. For this to feel natural, the operations have to agree with the mental
    model of the user. This is what Donald Norman means when talking about “physical
    analogies and cultural standards.” You must connect with the readers of your code
    in a way that they understand, drawing on their experiences and knowledge. The
    best way to do this is mapping your domain and other common knowledge into your
    code.


    When designing an interface, you need to think through the entire life cycle of
    a user’s interactions and ask yourself if the entirety of it maps to what a user
    unfamiliar with your code would understand. Model your interface such that it
    is easy to comprehend for someone who knows the domain well, even if they aren’t
    familiar with code. As you do this, your interface becomes intuitive, which lessens
    the chances of developers making mistakes.


    ## Natural Interfaces in Action


    For this chapter, you’re going to design an interface for part of an automated
    grocery pick-up service. A user scans their recipes using their smartphone, and
    the app will automatically figure out what ingredients are required. After the
    user confirms the order, the app queries local grocery stores for ingredient availability
    and schedules delivery. Figure 11-1 provides a representation of this workflow.


    I’m going to focus on the specific interface for building up an order given a
    set of recipes.


    ---


    ¹ Kevlin Henney and Scott Meyers. “Make Interfaces Easy to Use Correctly and Hard
    to Use Incorrectly” Chap. 55 in *97 Things Every Programmer Should Know: Collective
    Wisdom from the Experts*. Sebastopol: O’Reilly Media, 2010.


    ² Kent Beck. *Test Driven Development: By Example*. Upper Saddle River, NJ: Addison-Wesley
    Professional, 2002.


    ³ I recommend *Test-Driven Development with Python* by Harry Percival (O''Reilly,
    2017) if you''d like more information.


    ⁴ This is from *Design of Everyday Things* by Donald Norman (Basic Books). This
    classic book is essential to anyone wanting to get into a UX mindset.'
  mdcn: '## 测试减少


    难以使用的代码难以测试。无论它是复杂的接口、庞大的依赖链还是复杂的交互；如果你无法轻松测试代码，那么编写的测试就会更少。编写的测试越少，在发生变更时能捕获的
    bug 就越少。每次做出看似无关的更改时，测试都会以微妙的方式中断，这非常令人沮丧。


    难以使用的代码会使你的代码库不健康。在设计接口时，你必须特别小心。请尽量遵循 Scott Meyers 的这条经验法则：


    > 让接口易于正确使用，难以错误使用。¹


    你希望开发者觉得你的类型易于使用，仿佛一切都如预期般运行（这是对第 1 章提到的“最小惊讶原则”的一种微妙重述）。此外，你还希望防止用户以错误的方式使用你的类型。思考所有你应在接口中支持和禁止的行为，是你的职责。为此，你需要设身处地为协作者着想。


    ## 像用户一样思考


    像用户一样思考是棘手的，因为你已被赋予了“知识诅咒”。这并非源于什么神秘的诅咒或法术；而是你与代码库相处时间的副产品。随着你构建想法，你会对它们变得如此熟悉，以至于可能让你对新用户如何看待你的代码视而不见。处理认知偏差的第一步是承认它们的存在。从那时起，你可以在尝试进入用户思维空间时将偏差考虑在内。以下是一些你可以采用的有效策略。


    ## 测试驱动开发


    测试驱动开发（TDD）由 Kent Beck 在 2000 年代初提出，是一种流行的代码测试框架。² TDD 围绕一个简单的循环展开：


    - 添加一个失败的测试。

    - 编写刚好能通过该测试的代码。

    - 重构。


    关于 TDD 有整本书籍，因此我不会过多深入其机制细节。³ 然而，TDD 的意图对于理解如何使用一个类型是*极好的*。


    许多开发者认为测试*驱动*开发（先写测试）与测试*后置*开发（后写测试）有相似的好处。在这两种情况下，你都有经过测试的代码，对吧？当简化到这种程度时，TDD
    似乎不值得付出努力。


    然而，这是一种不幸的过度简化。这种混淆源于将 TDD 视为一种测试方法，而实际上，它是一种*设计方法*。测试很重要，但它们仅仅是该方法的副产品。真正的价值在于测试如何帮助你设计接口。


    通过 TDD，你能够在编写实现之前看到调用代码的样子。由于你先编写测试，你有机会停下来问自己，与你的类型交互是否感觉顺畅。如果你发现自己在进行令人困惑的函数调用、构建长长的依赖链，或者必须按固定顺序编写测试，这些都是危险信号，应该提醒你正在构建的类型过于复杂。在这些情况下，重新评估或重构你的接口。在编写代码之前就能简化它，这有多棒？


    作为额外的好处，你的测试可以作为一种文档形式。其他开发者会想知道如何使用你的代码，尤其是那些在顶层文档中未描述的部分。一套好的全面单元测试提供了关于如何使用你的类型的可工作文档；你希望它们能留下良好的第一印象。正如你的代码是系统行为的唯一真实来源一样，你的测试是与你的代码交互的唯一真实来源。


    ## README 驱动开发


    与 TDD 类似，README 驱动开发（RDD）由 Tom Preston-Werner 提出，是另一种旨在编写难以使用的代码之前就将其捕获的设计方法。RDD
    的目标是将你的顶层想法和与代码最重要的交互提炼成一个位于项目中的单一文档：README 文件。这是构思代码不同部分如何交互的好方法，并可能为用户提供更高层次的模式来遵循。


    RDD 具有以下一些优点：


    - 无需像在瀑布方法中那样预先创建每一级文档。

    - README 通常是开发者看到的第一样东西；RDD 让你有机会打造你能做到的最佳第一印象。

    - 基于团队讨论修改文档比修改已编写的代码更容易。

    - 你不需要使用 README 来解释糟糕的代码决策；相反，代码需要调整以支持理想的用例。


    请记住，只有当未来的开发者能够真正维护它时，你才算成功构建了可维护的软件。给他们每一个成功的机会，并从你的文档开始为他们打造一种体验。


    ## 可用性测试


    最终，你是在尝试思考你的用户如何思考。有一个完整的学科专门致力于这项任务：用户体验（UX）。UX 是另一个有无数书籍可用的领域，因此我将只关注一种在简化代码方面对我有奇效的策略：可用性测试。


    可用性测试是主动询问用户对你的产品看法的过程。这听起来很简单，不是吗？为了思考你的用户将如何行为，只需询问他们。你能做的最简单的事情是与潜在用户（在这种情况下，是其他开发者）交谈，但这很容易被忽视。


    通过走廊测试开始可用性测试非常容易。在设计接口时，只需抓住第一个走过你走廊的人，请他们对你的设计提供反馈。这是了解痛点的一种低成本的好方法。不过，不要过于字面地理解这个建议。可以自由地扩展到你在走廊看到的任何人之外，邀请队友、同行或测试人员来评估你的接口。


    然而，对于将被更广泛受众使用的接口（例如流行的开源库的接口），你可能需要稍微更正式一些。在这些情况下，可用性测试涉及将你的潜在用户置于你正在编写的接口前。你给他们一组任务来完成，然后观察。你的角色不是教导他们或引导他们完成练习，而是观察他们在何处挣扎，在何处表现出色。从他们的挣扎中学习；他们正在展示明确难以使用的领域。


    ![](img/d64d2be45ca85b398807d181202e7046_178_0.png)


    可用性测试非常适合团队中较初级的成员。他们的知识诅咒不会像资深成员那么强，而且他们更有可能以全新的视角来评估设计。


    ## 自然交互


    唐纳德·诺曼将映射描述为“控件及其动作与现实世界结果之间的关系”。如果这种映射“利用了物理类比和文化标准，[导致]立即理解”，那么它就是自然的。⁴ 这就是你在编写接口时所追求的。你希望那种立即的理解能消除混淆。


    在这种情况下，“控件及其动作”是构成你接口的函数和类型。“现实世界的结果”代表代码的行为。为了使其感觉自然，操作必须与用户的心智模型一致。这就是唐纳德·诺曼在谈论“物理类比和文化标准”时的意思。你必须以读者理解的方式与他们建立联系，利用他们的经验和知识。最好的方法是将你的领域和其他常见知识映射到你的代码中。


    在设计接口时，你需要思考用户交互的整个生命周期，并问自己整个过程是否映射到不熟悉你的代码的用户所能理解的内容。建模你的接口，使其易于理解，即使对于熟悉领域但不熟悉代码的人来说也是如此。当你这样做时，你的接口就变得直观，从而减少了开发者犯错的可能性。


    ## 自然接口实践


    在本章中，你将为自动杂货取货服务的一部分设计一个接口。用户使用智能手机扫描他们的食谱，应用程序将自动计算出所需的食材。用户确认订单后，应用程序会查询当地杂货店的食材可用性并安排配送。图
    11-1 展示了这个工作流程。


    我将专注于给定一组食谱来构建订单的具体接口。


    ---


    ¹ Kevlin Henney 和 Scott Meyers。“让接口易于正确使用，难以错误使用”，载于《程序员应知的 97 件事：专家集体智慧》第 55
    章。Sebastopol: O’Reilly Media, 2010。


    ² Kent Beck.《测试驱动开发：示例》。Upper Saddle River, NJ: Addison-Wesley Professional, 2002。


    ³ 如果你想了解更多信息，我推荐 Harry Percival 的《Python 测试驱动开发》（O''Reilly, 2017）。


    ⁴ 这出自唐纳德·诺曼的《设计心理学》（Basic Books）。这本经典书籍对于任何想要进入 UX 思维模式的人来说都是必不可少的。'
