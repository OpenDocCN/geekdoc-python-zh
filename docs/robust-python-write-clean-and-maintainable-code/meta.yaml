  md: 'In contrast, the Observer Pattern requires the caller of the notification (in
    the previous case, this was complete_order) to know about the observers. If the
    caller doesn''t know directly about the observers, then its caller needs to pass
    in the observers. This can continue all the way up the call stack until you are
    in a piece of code that directly knows about the observers. This can pollute a
    lot your function calls with extra parameters if there is a large gap between
    what knows about the observers and the actual code issuing the notification. If
    you find yourself passing observers through multiple functions to get to a producer
    deep in the call stack, consider using a message broker instead.


    If you would like to go more in-depth into event-driven architectures with simple
    events, I recommend the book *Architecture Patterns with Python* by Harry Percival
    and Bob Gregory (O''Reilly); its Part II is all about event-driven architecture.


    ![](img/d64d2be45ca85b398807d181202e7046_285_0.png)


    **Discussion Topic**


    How would event-driven architecture improve the decoupling within your codebase?
    Would the Observer Pattern or a message broker be more suitable for your needs?


    # Streaming Events


    In the preceding section, simple events were each represented as a discrete event
    that happened when a certain condition was fulfilled. Message brokers and the
    Observer Pattern are great ways to handle simple events. However, some systems
    deal with a never-ending series of events. The events flow into the system as
    a continuous series of data known as a stream. Think about the drone systems described
    in the last section. Consider all the data that comes from each drone. There might
    be location data, battery levels, current speed, wind data, weather data, and
    current weight carried. This data will be coming in at regular intervals, and
    you need a way to handle it.


    In these sorts of use cases, you don''t want to build all the boilerplate of pub/sub
    or observers; you want an architecture that matches your use case. You need a
    programming model that centers on events and defines workflows for handling every
    single event. Enter reactive programming.


    *Reactive programming* is an architectural style that revolves around streams
    of events. You define data sources as producers of these streams, and then link
    together multiple observers. Each observer is notified whenever there is a change
    in data and defines a series of operations for handling the data stream. The reactive
    programming style was popularized by ReactiveX. In this section, I''ll use the
    Python implementation of ReactiveX: RxPY.'
  merge: -1
  pgno: 285
- img_proc: true
  md: "I will install RxPy with pip:\n\n```\npip install rx\n```\n\nFrom there, I\
    \ need to define a stream of data. In RxPY parlance, this is known as an *observable*.\
    \ For example purposes, I'll use a single hard-coded observable, but in practice,\
    \ you will generate multiple observables from real data.\n\n```\nimport rx\n#\
    \ Each one of these is simulating an independent real-world event streaming in\n\
    observable = rx.of(\n    LocationData(x=3, y=12, z=40),\n    BatteryLevel(percent=95),\n\
    \    BatteryLevel(percent=94),\n    WindData(speed=15, direction=Direction.NORTH),\n\
    \    # ... snip 100s of events\n    BatteryLevel(percent=72),\n    CurrentWeight(grams=300)\n\
    )\n```\n\nThis observable is generated from a list of events of different types\
    \ for the drone data.\n\nI next need to define what to do to process each event.\
    \ Once I have an observable, observers can subscribe to it, in a similar manner\
    \ to the pub/sub mechanism:\n\n```\ndef handle_drone_data(value):\n    # ... snip\
    \ handle drone data ...\n\nobservable.subscribe(handle_drone_data)\n```\n\nThis\
    \ doesn't look too different from a normal pub/sub idiom.\n\nThe real magic comes\
    \ with *pipable* operators. RxPY allows you to *pipe*, or chain, operations together\
    \ to produce a pipeline of filters, transformations, and calculations. For instance,\
    \ I can write an operator pipeline with `rx.pipe` to grab the average weight the\
    \ drone has carried:\n\n```\nimport rx.operators\n\nget_average_weight = observable.pipe(\n\
    \    rx.operators.filter(lambda data: isinstance(data, CurrentWeight)),\n    rx.operators.map(lambda\
    \ cw: cw.grams),\n    rx.operators.average()\n)\n\n# save_average_weight does\
    \ something with the final data\n# (e.g. save to database, print to screen, etc.)\n\
    get_average_weight.subscribe(save_average_weight)\n```"
  merge: -1
