  md: "However, there is one case that I am fond of for multiple inheritance: mixins.\
    \ Mixins are classes that you can inherit generic functionality from. These base\
    \ classes typically do not contain any invariants or data; they are just a set\
    \ of methods that are not intended to be overridden.\n\nFor example, in the Python\
    \ standard library, there are abstractions for creating a TCP socket server:\n\
    \n```\nfrom socketserver import TCPServer\nclass Server(TCPServer):\n    # ...\
    \ snip ...\n```\n\nYou can customize this server to use multiple threads by also\
    \ inheriting socket server.ThreadingMixIn:\n\n```\nfrom socketserver import TCPServer,\
    \ ThreadingMixIn\nclass Server(TCPServer, ThreadingMixIn):\n    # ... snip ...\n\
    ```\n\nThis mixin does not bring in any invariants, and none of its methods need\
    \ to be called or overridden from the derived class. Just the mere act of inheriting\
    \ the mixin provides everything you need. This simplification makes it much easier\
    \ for maintainers to reason about your class.\n\n# Substitutability\n\nAs described\
    \ earlier, inheritance is all about modeling an *is-a* relationship. Describing\
    \ something with an *is-a* relationship may sound simple, but you'd be surprised\
    \ just how wrong things can go. To model *is-a* relationships properly, you need\
    \ to understand substitutability.\n\n*Substitutability* states that when you derive\
    \ from a base class, you should be able to use that derived class in every instance\
    \ that you use a base class.\n\nIf I were to create a function that could display\
    \ relevant restaurant data:\n\n```\ndef display_restaurant(restaurant: Restaurant):\n\
    \    # ... snip ...\n```\n\nI should be able to pass a Restaurant, a FoodTruck,\
    \ or a PopUpStall, and this function should be none the wiser. Again, this sounds\
    \ simple; what's the catch?\n\nThere is indeed a catch. To show you, I'd like\
    \ to step away from the food concept for a second, and go back to a fundamental\
    \ question that any first grader should be able to answer: is a square a rectangle?\n\
    \nFrom your early days of school, you probably know the answer as \"yes, a square\
    \ is a rectangle.\" A rectangle is a polygon that has four sides, and each intersection\
    \ of two"
  merge: -1
  pgno: 195
- img_proc: true
  md: "sides is a 90-degree angle. A square is the same, with the extra requirement\
    \ that each side must be the exact same length.\n\nIf I were to model this with\
    \ inheritance, I might do so as follows:\n\n```\nclass Rectangle:\n    def __init__(self,\
    \ height: int, width: int):\n        self._height = height\n        self._width\
    \ = width\n\n    def set_width(self, new_width):\n        self._width = new_width\n\
    \n    def set_height(self, new_height):\n        self._height = new_height\n\n\
    \    def get_width(self) -> int:\n        return self._width\n\n    def get_height(self)\
    \ -> int:\n        return self._height\n\nclass Square(Rectangle):\n    def __init__(self,\
    \ length: int):\n        super().__init__(length, length)\n\n    def set_side_length(self,\
    \ new_length):\n        super().set_width(new_length)\n        super().set_height(new_length)\n\
    \n    def set_width(self, new_width):\n        self.set_side_length(new_width)\n\
    \n    def set_height(self, new_height):\n        self.set_side_length(new_height)\n\
    ```\n\nSo yes, from a geometry perspective a square is indeed a rectangle. But\
    \ this assumption when mapped to *is-a* relationships is flawed. Take a few moments\
    \ and see if you can catch where my assumptions break down.\n\nStill don't see\
    \ it? Here's a hint: what if I asked you if a Square is *substitutable* for a\
    \ Rectangle for every use case? Can you construct a use case for a rectangle that\
    \ a square would not be substitutable for?\n\nSuppose the user of the app selects\
    \ squares and rectangles on a map of restaurants to gauge market size. A user\
    \ can draw a shape on the map, and then expand it as needed. One of the functions\
    \ to handle this is as follows:\n\n```\ndef double_width(rectangle: Rectangle):\n\
    \    old_height = rectangle.get_height()\n    rectangle.set_width(rectangle.get_width()\
    \ * 2)\n```"
  merge: -1
