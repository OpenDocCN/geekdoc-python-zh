- md: '## CHAPTER 1

    ## Introduction to Robust Python


    This book is all about making your Python more manageable. As your codebase grows,
    you need a specific toolbox of tips, tricks, and strategies to build maintainable
    code. This book will guide you toward fewer bugs and happier developers. You''ll
    be taking a hard look at how you write code, and you''ll learn the implications
    of your decisions. When discussing how code is written, I am reminded of these
    wise words from C.A.R. Hoare:


    > There are two ways of constructing a software design: One way is to make it
    so simple that there are obviously no deficiencies, and the other way is to make
    it so complicated that there are no obvious deficiencies. The first method is
    far more difficult.¹


    This book is about developing systems the first way. It will be more difficult,
    yes, but have no fear. I will be your guide on your journey to leveling up your
    Python game such that, as C.A.R. Hoare says above, *there are obviously no deficiencies*
    in your code. Ultimately, this is a book all about writing *robust* Python.


    In this chapter we''re going to cover what *robustness* means and why you should
    care about it. We''ll go through how your communication method implies certain
    benefits and drawbacks, and how best to represent your intentions. "The Zen of
    Python" states that, when developing code, "There should be one -- and preferably
    only one -- obvious way to do it." You''ll learn how to evaluate whether your
    code is written in an obvious way, and what you can do to fix it. First, we need
    to address the basics. What is *robustness* in the first place?


    ¹ Charles Antony Richard Hoare. "The Emperor''s Old Clothes." *Commun. ACM* 24,
    2 (Feb. 1981), 75–83. https://doi.org/10.1145/358549.358561.


    ## Robustness


    Every book needs at least one dictionary definition, so I’ll get this out of the
    way nice and early. Merriam-Webster offers many definitions for *robustness*:


    1. having or exhibiting strength or vigorous health

    2. having or showing vigor, strength, or firmness

    3. strongly formed or constructed

    4. capable of performing without failure under a wide range of conditions


    These are fantastic descriptions of what to aim for. We want a *healthy* system,
    one that meets expectations for years. We want our software to *exhibit strength*;
    it should be obvious that this code will stand the test of time. We want a *strongly
    constructed* system, one that is built upon solid foundations. Crucially, we want
    a system that is *capable of performing without failure*; the system should not
    become vulnerable as changes are introduced.


    It is common to think of a software like a skyscraper, some grand structure that
    stands as a bulwark against all change and a paragon of immortality. The truth
    is, unfortunately, messier. Software systems constantly evolve. Bugs are fixed,
    user interfaces get tweaked, and features are added, removed, and then re-added.
    Frameworks shift, components go out of date, and security bugs arise. Software
    changes. Developing software is more akin to handling sprawl in city planning
    than it is constructing a static building. With ever changing codebases, how can
    you make your code robust? How can you build a strong foundation that is resilient
    to bugs?


    The truth is, you have to accept change. Your code will be split apart, stitched
    together, and reworked. New use cases will alter huge swaths of code—and that’s
    OK. Embrace it. Understand that it’s not enough that your code can easily be changed;
    it might be best for it to be deleted and rewritten as it goes out of date. That
    doesn’t diminish its value; it will still have a long life in the spotlight. Your
    job is to make it easy to rewrite parts of the system. Once you start to accept
    the ephemeral nature of your code, you start to realize that it’s not enough to
    write bug-free code for the present; you need to enable the codebase’s future
    owners to be able to change your code with confidence. That is what this book
    is about.


    You are going to learn to build strong systems. This strength doesn’t come from
    rigidity, as exhibited by a bar of iron. It instead comes from flexibility. Your
    code needs to be strong like a tall willow tree, swaying in the wind, flexing
    but not breaking. Your software will need to handle situations you would never
    dream of. Your codebase needs to be able to adapt to new circumstances, because
    it won’t always be you maintaining it. Those future maintainers need to know they
    are working in a healthy codebase. Your codebase needs to communicate its strength.
    You must write Python code in a way that reduces failure, even as future maintainers
    tear it apart and reconstruct it.


    Writing robust code means deliberately thinking about the future. You want future
    maintainers to look at your code and understand your intentions easily, not curse
    your name during late-night debugging sessions. You must convey your thoughts,
    reasoning, and cautions. Future developers will need to bend your code into new
    shapes—and will want to do so without worrying that each change may cause it to
    collapse like a teetering house of cards.


    Put simply, you don’t want your systems to fail, especially when the unexpected
    happens. Testing and quality assurance are huge parts of this, but neither of
    those bake quality completely in. They are more suited to illuminating gaps in
    expectations and offering a safety net. Instead, you must make your software stand
    the test of time. In order to do that, you must write *clean and maintainable
    code*.


    Clean code expresses its intent clearly and concisely, in that order. When you
    look at a line of code and say to yourself, “ah, that makes complete sense,” that’s
    an indicator of clean code. The more you have to step through a debugger, the
    more you have to look at a lot of other code to figure out what’s happening, the
    more you have to stop and stare at the code, the less clean it is. Clean code
    does not favor clever tricks if it makes the code unreadable to other developers.
    Just like C.A.R. Hoare said earlier, you do not want to make your code so obtuse
    that it will be difficult to understand upon visual inspection.


    ### The Importance of Clean Code


    Having clean code is paramount to having robust code; consider it table stakes
    for any meaningful project. There are often specific practices tied to writing
    clean code, including:


    - Organizing your code in an appropriately granular fashion

    - Providing good documentation

    - Naming your variables/functions/types well

    - Keeping functions short and simple


    While the motifs of clean code weave throughout this book, I will not be dedicating
    substantial time to these specific practices. There are other books that capture
    clean code practices much better. I recommend *Clean Code* by Robert C. Martin
    (Prentice Hall), *The Pragmatic Programmer* by Andy Hunt and Dave Thomas (Addison-Wesley),
    and *Code Complete* by Steve McConnell (Microsoft Press). All three of these books
    greatly improved my skills as a developer and are great resources for anyone looking
    to grow.


    While you should absolutely strive to write code cleanly, you must be prepared
    to work in codebases that aren''t a shining example of cleanliness. Software development
    is a messy endeavor, and there will be times where the purity of clean code will
    be sacrificed for various reasons, both business and technical. Use the advice
    given in this book to help drive toward cleaner code through discussions about
    maintainability.


    Maintainable code is code that...well, can be easily maintained. Maintenance begins
    immediately after the first commit and continues until not a single developer
    is looking at the project anymore. Developers will be fixing bugs, adding features,
    reading code, extracting code for use in other libraries, and more. Maintainable
    code makes these tasks frictionless. Software lives for years, if not decades.
    Focus on your maintainability *today*.


    You don''t want to be the reason systems fail, whether you are actively working
    on them or not. You need to be proactive in making your system stand the test
    of time. You need a testing strategy to be your safety net, but you also need
    to be able to avoid falling in the first place. So with all that in mind, I offer
    my definition of robustness in terms of your codebase:


    > A robust codebase is resilient and error-free in spite of constant change.


    ## Why Does Robustness Matter?


    A lot of energy goes into making software do what it''s supposed to, but it''s
    not easy to know when you''re done. Development milestones are not easily predicted.
    Human factors such as UX, accessibility, and documentation only increase the complexity.
    Now add in testing to ensure that you''ve covered a slice of known and unknown
    behaviors, and you are looking at lengthy development cycles.


    The purpose of software is to provide value. It is in every stakeholder''s interests
    to deliver that full value as early as possible. Given the uncertainty around
    some development schedules, there is often extra pressure to meet expectations.
    We''ve all been on the wrong end of an unrealistic schedule or deadline. Unfortunately,
    many of the tools to make software incredibly robust only add onto our development
    cycle in the short term.


    It''s true that there is an inherent tension between immediate delivery of value
    and making code robust. If your software is "good enough," why add even more complexity?
    To answer that, consider how often that piece of software will be iterated upon.
    Delivering software value is typically not a static exercise; it''s rare that
    a system provides value and is never modified again. Software is ever-evolving
    by its very nature. The codebase needs to be prepared to deliver value frequently
    and for long periods of time. This is where robust software engineering practices
    come into play. If you can''t'
  mdcn: '## 第一章

    ## 健壮 Python 简介


    本书旨在让你的 Python 代码更易于管理。随着代码库的增长，你需要一套特定的技巧、策略和工具箱来构建可维护的代码。本书将引导你减少 bug，让开发者更快乐。你将深入审视自己的编码方式，并了解每个决策带来的影响。在讨论代码编写方式时，我想起了
    C.A.R. 霍尔的这句名言：


    > 构建软件设计有两种方式：一种是将其设计得如此简单，以至于明显没有缺陷；另一种是将其设计得如此复杂，以至于没有明显的缺陷。第一种方式要困难得多。¹


    本书正是关于如何以第一种方式开发系统。是的，这会更困难，但请不要害怕。我将作为你的向导，陪伴你提升 Python 技能，正如 C.A.R. 霍尔在上面所说，让你的代码*明显没有缺陷*。归根结底，这是一本关于编写*健壮*
    Python 代码的书。


    在本章中，我们将探讨*健壮性*的含义以及为何你应该关注它。我们会讨论你的沟通方式如何隐含着某些优缺点，以及如何最好地表达你的意图。"Python 之禅"指出，在开发代码时，"应该有一种——最好只有一种——显而易见的方式。"你将学会如何评估你的代码是否以一种显而易见的方式编写，以及如何改进它。首先，我们需要解决基础问题：究竟什么是*健壮性*？


    ¹ Charles Antony Richard Hoare. "The Emperor''s Old Clothes." *Commun. ACM* 24,
    2 (Feb. 1981), 75–83. https://doi.org/10.1145/358549.358561.


    ## 健壮性


    每本书至少需要一个字典定义，所以我现在就把它讲清楚。韦氏词典为*健壮性*提供了多种定义：


    1.  拥有或表现出力量或活力

    2.  拥有或表现出活力、力量或坚定性

    3.  结构坚固或构造牢固

    4.  能够在各种条件下无故障运行


    这些是对我们目标的绝佳描述。我们想要一个*健康的*系统，一个能持续满足期望多年的系统。我们希望我们的软件*表现出力量*；很明显，这段代码将经受住时间的考验。我们想要一个*构造坚固的*系统，一个建立在坚实基础上的系统。至关重要的是，我们想要一个*能够无故障运行*的系统；系统不应因引入变更而变得脆弱。


    人们常把软件想象成摩天大楼，某种宏伟的结构，作为抵御所有变化的堡垒和不朽的典范。但不幸的是，现实更为混乱。软件系统不断演进。修复 bug，调整用户界面，添加、移除、然后重新添加功能。框架更迭，组件过时，安全漏洞出现。软件在变化。开发软件更像是处理城市规划中的蔓延问题，而不是建造一栋静态的建筑。面对不断变化的代码库，你如何让你的代码变得健壮？如何构建一个能抵御
    bug 的坚实基础？


    事实是，你必须接受变化。你的代码会被拆开、缝合、重新设计。新的用例会改变大段代码——这没关系。拥抱它。要明白，仅仅让你的代码易于修改是不够的；当它过时被删除和重写时，这可能是最好的归宿。这并不会降低它的价值；它仍将在聚光灯下拥有长久的生命。你的工作是让系统的部分重写变得容易。一旦你开始接受代码的短暂性，你就会意识到，仅仅为当下编写无
    bug 的代码是不够的；你需要让代码库未来的维护者能够自信地修改你的代码。这正是本书的主旨。


    你将学习构建强大的系统。这种力量并非来自铁条般的僵硬，而是来自灵活性。你的代码需要像高大的柳树一样坚韧，在风中摇曳，弯曲但不折断。你的软件将需要处理你从未想象过的情况。你的代码库需要能够适应新的环境，因为它不会总是由你来维护。那些未来的维护者需要知道他们是在一个健康的代码库中工作。你的代码库需要传达它的力量。你必须以一种减少故障的方式编写
    Python 代码，即使未来的维护者将其拆解和重构。


    编写健壮的代码意味着要深思熟虑地考虑未来。你希望未来的维护者看到你的代码时能轻松理解你的意图，而不是在深夜调试时诅咒你的名字。你必须传达你的想法、推理和注意事项。未来的开发者需要将你的代码塑造成新的形态——并且希望在这样做时，不必担心每次修改都可能导致它像摇摇欲坠的纸牌屋一样崩塌。


    简而言之，你不希望你的系统失败，尤其是在意外发生时。测试和质量保证是其中的重要部分，但两者都不能完全内建质量。它们更适合揭示期望的差距并提供安全网。相反，你必须让你的软件经受住时间的考验。为此，你必须编写*干净且可维护的代码*。


    干净的代码清晰而简洁地表达其意图，顺序是先清晰后简洁。当你看到一行代码并对自己说："啊，这完全说得通"，这就是干净代码的标志。你越需要单步调试，越需要查看大量其他代码来弄清楚发生了什么，越需要停下来盯着代码看，它就越不干净。如果聪明的技巧让代码对其他开发者来说难以阅读，那么干净的代码就不会偏爱它们。就像
    C.A.R. 霍尔之前说的，你不希望你的代码如此晦涩，以至于通过目视检查都难以理解。


    ### 干净代码的重要性


    拥有干净的代码对于拥有健壮的代码至关重要；可以将其视为任何有意义项目的入场券。编写干净的代码通常涉及一些特定的实践，包括：


    -   以适当的粒度组织你的代码

    -   提供良好的文档

    -   为变量/函数/类型起好名字

    -   保持函数简短而简单


    虽然干净代码的主题贯穿本书，但我不会专门花大量时间讨论这些特定实践。其他书籍对干净代码实践的阐述要好得多。我推荐罗伯特·C·马丁的《代码整洁之道》（Prentice
    Hall）、安迪·亨特和戴夫·托马斯的《程序员修炼之道》（Addison-Wesley）以及史蒂夫·迈克康奈尔的《代码大全》（Microsoft Press）。这三本书都极大地提升了我作为开发者的技能，对于任何想要成长的人来说都是极好的资源。


    虽然你绝对应该努力编写干净的代码，但你也必须准备好在并非干净典范的代码库中工作。软件开发是一项混乱的工作，有时出于各种业务和技术原因，纯净的干净代码会被牺牲。利用本书给出的建议，通过关于可维护性的讨论来推动代码变得更干净。


    可维护的代码是……嗯，易于维护的代码。维护从第一次提交后立即开始，直到没有一个开发者再关注这个项目为止。开发者将修复 bug、添加功能、阅读代码、提取代码用于其他库等等。可维护的代码让这些任务变得毫无阻碍。软件的生命周期长达数年，甚至数十年。关注你*今天*的可维护性。


    你不希望成为系统失败的原因，无论你是否正在积极开发它们。你需要主动让你的系统经受住时间的考验。你需要一个测试策略作为安全网，但你也需要能够避免一开始就掉进去。因此，考虑到所有这些，我提出我对代码库健壮性的定义：


    > 一个健壮的代码库是具有弹性且无错误的，尽管它不断变化。


    ## 为什么健壮性很重要？


    人们投入了大量精力让软件按预期工作，但很难知道何时才算完成。开发里程碑难以预测。用户体验、可访问性和文档等人为因素只会增加复杂性。现在再加上测试，以确保你覆盖了已知和未知行为的一部分，你面对的是漫长的开发周期。


    软件的目的是提供价值。尽早交付全部价值符合每个利益相关者的利益。鉴于某些开发计划的不确定性，满足期望往往带来额外压力。我们都曾经历过不切实际的进度安排或截止日期。不幸的是，许多让软件变得极其健壮的工具，在短期内只会增加我们的开发周期。


    确实，立即交付价值与使代码健壮之间存在固有的张力。如果你的软件"足够好"，为什么还要增加更多复杂性？要回答这个问题，请考虑这段软件将被迭代多少次。交付软件价值通常不是一项静态工作；一个系统提供价值后就再也不会被修改的情况很少见。软件本质上是不断演进的。代码库需要准备好频繁且长期地交付价值。这就是健壮的软件工程实践发挥作用的地方。如果你不能'
