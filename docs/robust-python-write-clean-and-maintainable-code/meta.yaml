  md: "and/or change data. This is accomplished using an *application programming\
    \ interface* (API).\n\nWhen most people think of an API, things like REST or SDKs\
    \ (software development kits) come to mind. But every class has its own API. It's\
    \ the cornerstone of how you interact with classes. Every function call, every\
    \ property access, every initialization is part of an object's API.\n\nSo far,\
    \ I've covered two parts of the API in the `PizzaSpecification`: the initialization\
    \ (constructor) and property access. I don't have much more to say about the constructor;\
    \ its done its job in verifying invariants. Now, I will address how to preserve\
    \ those invariants as you flesh out the rest of an API (the operations that we\
    \ wish to bundle with this class).\n\n# Protecting Data Access\n\nThat leads us\
    \ back to the problem at the beginning of this section: how do we prevent users\
    \ of our API (our class) from breaking invariants? By signaling that this data\
    \ should be *private*.\n\nThere are three types of access control in many programming\
    \ languages:\n\n+   *Public*\n    Any other piece of code can access this part\
    \ of the API.\n\n*Protected*\n    Only subclasses (we'll see these more in Chapter\
    \ 12) should access this part of the API.\n\n*Private*\n    Only this class (and\
    \ any other instances of this class) should access this part of the API.\n\nPublic\
    \ and protected attributes form your public API, and should be relatively stable\
    \ before people depend on your class heavily. However, it is a general convention\
    \ that people should leave your private API alone. This should leave you free\
    \ to hide things that you feel need to be inaccessible. This is how you can preserve\
    \ your invariants.\n\nIn Python, you signal to other developers that an attribute\
    \ should be protected by prefixing it with an underscore (`_`). Private attributes\
    \ and methods should be prefixed with two underscores (`__`). (Note that this\
    \ is not the same as functions *surrounded* by two underscores—those denote special\
    \ magic methods, which I'll cover in Chapter 11.) In Python, you don't have a\
    \ compiler that can catch when this access control is broken. There is nothing\
    \ stopping a developer from reaching in and messing with your protected and private\
    \ members. Enforcing this becomes an organizational challenge, part of the nature\
    \ of the beast with a dynamically typed language like Python."
