  - "[PAGE 28]\n\nContrast that with *synchronous communication*. Synchronous communication\
    \ is the exchange of ideas live (in real time). This form of direct communication\
    \ is one of the best ways to express your thoughts but unfortunately, it doesn’t\
    \ scale, and you won’t always be around to answer questions.\n\nIn order to evaluate\
    \ how appropriate each method of communication is when trying to understand intentions,\
    \ let’s look at two axes: proximity and cost.\n\n*Proximity* is how close in time\
    \ the communicators need to be in order for that communication to be fruitful.\
    \ Some methods of communication excel with real-time transfer of information.\
    \ Other methods of communication excel at communicating years later.\n\n*Cost*\
    \ is the measure of effort to communicate. You must weigh the time and money expended\
    \ to communicate with the value provided. Your future consumers then have to weigh\
    \ the cost of consuming the information with the value they are trying to deliver.\
    \ Writing code and not providing any other communication channels is your baseline;\
    \ you have to do this to produce value. To evaluate additional communication channels’\
    \ cost, here is what I factor in:\n\n*Discoverability*\n    How easy was it to\
    \ find this information outside of a normal workflow? How ephemeral is the knowledge?\
    \ Is it easy to search for information?\n\n*Maintenance cost*\n    How accurate\
    \ is the information? How often does it need to be updated? What goes wrong if\
    \ this information is out of date?\n\n*Production cost*\n    How much time and\
    \ money went into producing the communication?\n\nIn Figure 1-1, I plot some common\
    \ communication methods’ cost and proximity required, based on my own experience."
  - '[PAGE 29]


    ![](img/d64d2be45ca85b398807d181202e7046_29_0.png)


    Figure 1-1. Plotting cost and proximity of communication methods


    There are four quadrants that make up the cost/proximity graph.


    *Low cost, high proximity required*

    These are cheap to produce and consume, but are not scalable across time. Direct
    communication and instant messaging are great examples of these methods. Treat
    these as snapshots of information in time; they are only valuable when the user
    is actively listening. Don''t rely on these methods to communicate to the future.


    *High cost, high proximity required*

    These are costly events, and often only happen once (such as meetings or conferences).
    These events should deliver a lot of value at the time of communication, because
    they do not provide much value to the future. How many times have you been to
    a meeting that felt like a waste of time? You''re feeling the direct loss of value.
    Talks require a multiplicative cost for each attendee (time spent, hosting space,
    logistics, etc.). Code reviews are rarely looked at once they are done.


    *High cost, low proximity required*

    These are costly, but that cost can be paid back over time in value delivered,
    due to the low proximity needed. Emails and agile boards contain a wealth of information,
    but are not discoverable by others. These are great for bigger concepts'
  - '[PAGE 30]


    that don''t need frequent updates. It becomes a nightmare to try and sift through
    all the noise just to find the nugget of information you are looking for. Video
    recordings and design documentation are great for understanding snapshots in time,
    but are costly to keep updated. Don''t rely on these communication methods to
    understand day-to-day decisions.


    *Low cost, low proximity required*


    These are cheap to create, and are easily consumable. Code comments, version control
    history, and project READMEs all fall into this category, since they are adjacent
    to the source code we write. Users can view this communication years after it
    was produced. Anything that a developer encounters during their day-to-day workflow
    is inherently discoverable. These communication methods are a natural fit for
    the first place someone will look after the source code. However, your code is
    one of your best documentation tools, as it is the living record and single source
    of truth for your system.


    ![](img/d64d2be45ca85b398807d181202e7046_30_0.png)


    **Discussion Topic**


    This plot in Figure 1-1 was created based on generalized use cases. Think about
    the communication paths you and your organization use. Where would you plot them
    on the graph? How easy is it to consume accurate information? How costly is it
    to produce information? Your answers to these questions may result in a slightly
    different graph, but the single source of truth will be in the executable software
    you deliver.


    Low cost, low proximity communication methods are the best tools for communicating
    to the future. You should strive to minimize the cost of production and of consumption
    of communication. You have to write software to deliver value anyway, so the lowest
    cost option is making your code your primary communication tool. Your codebase
    becomes the best possible option for expressing your decisions, opinions, and
    workarounds clearly.


    However, for this assertion to hold true, the code has to be cheap to consume
    as well. Your intent has to come across clearly in your code. Your goal is to
    minimize the time needed for a reader of your code to understand it. Ideally,
    a reader does not need to read your implementation, but just your function signature.
    Through the use of good types, comments and variable names, it should be crystal
    clear what your code does.'
  - "[PAGE 31]\n\n> ## Self-Documenting Code\nThe wrong response to Figure 1-1 is\
    \ “Self-documenting code is all I need!” Code should absolutely self-document\
    \ *what* is being done, but can’t cover every use case of communication. For example,\
    \ version control will give you a history of changes. Design documents discuss\
    \ sweeping ideals that are not local to any one code file. Meetings (when done\
    \ right) can be an important event for synchronizing plan execution. Talks are\
    \ great for sharing ideas with a large audience all at once. While this book focuses\
    \ on what you can do in your code, don’t throw away any other valuable means of\
    \ communication.\n\n# # Examples of Intent in Python\n\nNow that I’ve talked through\
    \ what intent is and how it matters, let’s look at examples through a Python lens.\
    \ How can you make sure that you are correctly expressing your intentions? I will\
    \ take a look at two different examples of how a decision affects intentions:\
    \ collections and iteration.\n\n# ## Collections\n\nWhen you pick a collection,\
    \ you are communicating specific information. You must pick the right collection\
    \ for the task at hand. Otherwise, maintainers will infer the wrong intention\
    \ from your code.\n\nConsider this code that takes a list of cookbooks and provides\
    \ a mapping between authors and the number of books written:\n\n```\npython\n\
    def create_author_count_mapping(cookbooks: list[Cookbook]):\n    counter = {}\n\
    \    for cookbook in cookbooks:\n        if cookbook.author not in counter:\n\
    \            counter[cookbook.author] = 0\n        counter[cookbook.author] +=\
    \ 1\n    return counter\n```\n\nWhat does my use of collections tell you? Why\
    \ am I not passing a dictionary or a set? Why am I not returning a list? Based\
    \ on my current usage of collections, here’s what you can assume:\n\n+   - I pass\
    \ in a list of cookbooks. There may be duplicate cookbooks in this list (I might\
