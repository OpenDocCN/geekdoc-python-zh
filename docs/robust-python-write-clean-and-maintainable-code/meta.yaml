- md: "With that in mind, and the help of the itertools module, I'll take another\
    \ crack at writing the recommendation algorithm:\n\n```python\nimport itertools\n\
    \ndef recommend_meal(policy: RecommendationPolicy) -> list[Meal]:\n    meals =\
    \ policy.meals\n    sorted_meals = sorted(meals, key=policy.initial_sorting_criteria,\n\
    \                         reverse=True)\n    grouped_meals = itertools.groupby(sorted_meals,\
    \ key=policy.grouping_criteria)\n    _, top_grouped = next(grouped_meals)\n  \
    \  secondary_sorted = sorted(top_grouped, key=policy.secondary_sorting_criteria,\n\
    \                              reverse=True)\n    candidates = itertools.takewhile(policy.selection_criteria,\
    \ secondary_sorted)\n    return list(candidates)[:policy.desired_number_of_recommendations]\n\
    ```\n\nThen, to use this with an algorithm, I do the following:\n\n```python\n\
    # I've used named functions to increase readability in the following example\n\
    # instead of lambda functions\nrecommend_meal(RecommendationPolicy(\n    meals=get_specials(),\n\
    \    initial_sorting_criteria=get_proximity_to_surplus_ingredients,\n    grouping_criteria=get_proximity_to_surplus_ingredients,\n\
    \    secondary_sorting_criteria=get_proximity_to_last_meal,\n    selection_criteria=proximity_greater_than_75_percent,\n\
    \    desired_number_of_recommendations=3)\n)\n```\n\nThink of how nice it would\
    \ be to be able to tweak the algorithm on the fly here. I created a different\
    \ RecommendationPolicy and passed it into recommend_meal. By separating the algorithm's\
    \ policy from the mechanism, I've provided a number of benefits. I've made the\
    \ code easier to read, easier to extend, and more flexible.\n\n## Closing Thoughts\n\
    \nComposable code is reusable code. When you build small, discrete units of work,\
    \ you'll find that they are easy to introduce into new contexts or programs. To\
    \ make your code composable, focus on separating your policies and your mechanisms.\
    \ It doesn't matter if you're working with subsystems, algorithms, or even functions.\
    \ You will find that your mechanisms benefit from greater reuse, and policies\
    \ become easier to modify. Your system's robustness will greatly improve as you\
    \ identify composable code.\n\nIn the next chapter, you're going to learn how\
    \ to apply extensibility and composability at an architectural level with event-based\
    \ architectures. Event-based architectures help you decouple your code into publishers\
    \ and consumers of information. They provide a way for you to minimize dependencies\
    \ while still retaining extensibility.\n\n# CHAPTER 18\n## Event-Driven Architecture\n\
    \nExtensibility is important at every level of your codebase. At the code level,\
    \ you employ extensibility to make your functions and classes flexible. At the\
    \ abstract level, you utilize the same principles in your codebase’s architecture.\
    \ *Architecture* is the set of high-level guidelines and constraints that shape\
    \ how you design software. It is the vision that influences all developers, past,\
    \ present, and future. This chapter, as well as the next one, are going to show\
    \ two examples of how architectural examples improve maintainability. Everything\
    \ you’ve learned so far in this part of the book applies: good architecture promotes\
    \ extensibility, manages dependencies well, and fosters composability.\n\nIn this\
    \ chapter, you will learn about event-driven architecture. *Event-driven architecture*\
    \ revolves around events, or notifications in your system. It is a fantastic way\
    \ to decouple different parts of your codebase, as well as extend your system\
    \ for new functionality or performance. Event-driven architectures allow you to\
    \ introduce new changes easily with minimal impact. First, I want to talk about\
    \ the flexibility that event-driven architectures provide. Then, I’ll cover two\
    \ separate variations of event-driven architectures: simple events and streaming\
    \ events. While they are similar, you will use them in slightly different scenarios.\n\
    \n## How It Works\n\nWhen you focus on event-driven architectures, you are revolving\
    \ around reactions to stimuli. You deal with reactions to stimuli all the time,\
    \ whether it’s pulling a casserole out of the oven or picking up a delivery from\
    \ your front door after a phone notification. In an event-driven architecture,\
    \ you architect your code to represent this model. Your stimulus is some *producer*\
    \ of events. A *consumer* of these events is the reaction to that stimulus. An\
    \ event is just a transmission of information from a producer to a consumer. Table\
    \ 18-1 shows some common producer–consumer pairs.\n\nTable 18-1. Everyday events\
    \ and their consumers\n\n| Producer | Consumer |\n| :--- | :--- |\n| Kitchen timer\
    \ going off | Chef retrieves a casserole from the oven |\n| Cook ringing a bell\
    \ when a dish is done | Server picks it up and serves it |\n| Alarm clock going\
    \ off | Late sleeper wakes up |\n| A last call for boarding at an airport | Rushing\
    \ family rushes, trying to make their connection |\n\nYou actually deal with producers\
    \ and consumers every time you program. Any function that returns a value is a\
    \ producer, and any piece of code that uses that returned value is a consumer.\
