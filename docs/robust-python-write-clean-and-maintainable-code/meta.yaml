    \ are just passing a single function rather than a collection of functions.\n\n\
    A future developer just has to write a function that does the actual preparation,\
    \ given the ingredients. They could write:\n\n```\nimport tex_mex_module as tmm\n\
    \ndef make_soft_taco(ingredients: TexMexIngredients) -> tmm.Dish:\n    tortilla\
