    \ when you can't trust that developers will follow their guidance? In order to\
    \ be robust, you want your code to stand the test of time. To do that, you need\
    \ some sort of tool that can check all your type annotations and flag if anything\
    \ is amiss. That tool is called a typechecker.\n\nTypecheckers are what allow\
    \ the type annotations to transcend from communication method to a safety net.\
    \ It is a form of static analysis. *Static analysis tools* are tools that run\
    \ on your source code, and don't impact your runtime at all. You'll learn more\
    \ about static analysis tools in Chapter 20, but for now, I will just explain\
    \ typecheckers.\n\nFirst, I need to install one. I'll use mypy, a very popular\
    \ typechecker.\n\n```\npip install mypy\n```\n\nNow I'll create a file named *invalid_type.py*\
    \ with incorrect behavior:\n\n```\na: int = 5\na = \"string\"\n```\n\nIf I run\
