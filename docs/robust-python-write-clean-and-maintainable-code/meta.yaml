- md: "## Discussion Topic\n\nDo you use duck typing in your codebase? Are there places\
    \ where you can pass in types that don't match what the code is looking for, but\
    \ things still work? Do you think these increase or decrease robustness for your\
    \ use cases?\n\n## Closing Thoughts\n\nTypes are a pillar of clean, maintainable\
    \ code and serve as a communication tool to other developers. If you take care\
    \ with types, you communicate a great deal, creating less burden for future maintainers.\
    \ The rest of Part I will show you how to use types to enhance a codebase's robustness.\n\
    \nRemember, Python is dynamically and strongly typed. The strongly typed nature\
    \ will be a boon for us; Python will notify us about errors when we use incompatible\
    \ types. But its dynamically typed nature is something we will have to overcome\
    \ in order to write better code. These language choices shape how Python code\
    \ is written and you should keep them in mind as you write your code.\n\nIn the\
    \ next chapter, we're going to talk about type annotations, which is how we can\
    \ be explicit about the type we use. Type annotations serve a crucial role: our\
    \ primary communication method of behaviors to future developers. They help overcome\
    \ the limitations of a dynamically typed language and allow you to enforce intentions\
    \ throughout a codebase.\n\n# CHAPTER 3\n## Type Annotations\n\nPython is a dynamically\
    \ typed language; types aren’t known until runtime. This is an obstacle when trying\
    \ to write robust code. Since types are embedded in the value itself, developers\
    \ have a very tough time knowing what type they are working with. Sure, that name\
    \ looks like a str today, but what happens if someone makes it bytes? Assumptions\
    \ about types are built on shaky ground with dynamically typed languages. Hope\
    \ is not lost, though. In Python 3.5, a brand-new feature was introduced: type\
    \ annotations.\n\nType annotations bring your ability to write robust code to\
    \ a whole new level. Guido van Rossum, creator of Python, says it best:\n\n> I’ve\
    \ learned a painful lesson that for small programs dynamic typing is great. For\
    \ large programs you have to have a more disciplined approach and it helps if\
    \ the language actually gives you that discipline, rather than telling you “Well,\
    \ you can do whatever you want.”¹\n\nType annotations are the more disciplined\
    \ approach, the extra bit of care you need to wrangle larger codebases. In this\
    \ chapter, you’ll learn how to use type annotations, why they are so important,\
    \ and how to utilize a tool called a typechecker to enforce your intentions throughout\
    \ your codebase.\n\n¹ Guido van Rossum. “A Language Creators’ Conversation.” PuPPy\
    \ (Puget Sound Programming Python) Annual Benefit 2019. https://oreil.ly/1xf01.\n\
    \n## What Are Type Annotations?\n\nIn Chapter 2, you got your first glance at\
    \ a type annotation:\n\n```python\ndef close_kitchen_if_past_close(point_in_time:\
    \ datetime.datetime): ❶\n    if point_in_time >= closing_time():\n        close_kitchen()\n\
    \        log_time_closed(point_in_time)\n```\n\n❶ The type annotation here is\
    \ `: datetime.datetime`\n\nType annotations are an additional syntax notifying\
    \ the user of an expected type of your variables. These annotations serve as *type\
    \ hints*; they provide hints to the reader, but they are not actually used by\
    \ the Python language at runtime. In fact, you are completely free to ignore the\
    \ hints. Consider the following snippet of code, along with a comment written\
    \ by the developer.\n\n```python\n# CustomDateTime offers all the same functionality\
    \ with\n# datetime.datetime. I'm using it here for its better\n# logging facilities.\n\
    close_kitchen_if_past_close(CustomDateTime(\"now\")) # no error\n```\n\nIt should\
    \ be a rare case where you go against a type hint. The author very clearly intended\
    \ a specific use case. If you aren't going to follow the type annotation, you\
    \ are setting yourself up for problems if the original code changes in a way that\
    \ is incompatible with the types that you are using (such as expecting a certain\
    \ function to work with that type).\n\nPython will not throw any error at runtime\
    \ in this scenario. As a matter of fact, it won't use the type annotations at\
    \ all during runtime. There is no checking or cost for using these when Python\
    \ executes. These type annotations still serve a crucial purpose: informing your\
    \ readers of the expected type. Maintainers of code will know what types they\
    \ are allowed to use when changing your implementation. Calling code will also\
    \ benefit, as developers will know exactly what type to pass in. By implementing\
    \ type annotations, you reduce friction.\n\nPut yourself in your future maintainer's\
    \ shoes. Wouldn't it be nice to come across code that is intuitive to use? You\
    \ wouldn't have to dig through function after function to determine usage. You\
    \ wouldn't assume a wrong type and then need to deal with the fallout of exceptions\
    \ and wrong behavior.\n\nConsider another piece of code that takes in employees'\
    \ availability and a restaurant's opening time, and then schedules available workers\
    \ for that day. You want to use this piece of code and you see the following:\n\
    \n```python\ndef schedule_restaurant_open(open_time, workers_needed):\n```\n\n\
    Let's ignore the implementation for a minute, because I want to focus on first\
    \ impressions. What do you think can get passed into this? Stop, close your eyes,\
    \ and ask yourself what are reasonable types that can be passed in before reading\
    \ on. Is `open_time` a `datetime`, the number of seconds since epoch, or maybe\
    \ a string containing an hour? Is `workers_needed` a list of names, a list of\
    \ `Worker` objects, or something else? If you guess wrong, or aren't sure, you\
    \ need to go look at either the implementation or calling code, which I've established\
    \ takes time and is frustrating.\n\nLet me provide an implementation and you can\
    \ see how close you were.\n\n```python\nimport datetime\nimport random\n\ndef\
    \ schedule_restaurant_open(open_time: datetime.datetime,\n                   \
    \         workers_needed: int):\n    workers = find_workers_available_for_time(open_time)\n\
    \    # Use random.sample to pick X available workers\n    # where X is the number\
    \ of workers needed.\n    for worker in random.sample(workers, workers_needed):\n\
    \        worker.schedule(open_time)\n```\n\nYou probably guessed that `open_time`\
    \ is a `datetime`, but did you consider that `workers_needed` could have been\
    \ an `int`? As soon as you see the type annotations, you get a much better picture\
    \ of what's happening. This reduces cognitive overhead and reduces friction for\
    \ maintainers.\n\n> This is certainly a step in the right direction, but don't\
    \ stop here. If you see code like this, consider renaming the variable to `number_of_workers_needed`\
    \ to reflect just what the integer means. In the next chapter, I'll also explore\
    \ type aliases, which provide an alternate way of expressing yourself.\n\nSo far,\
    \ all the examples I've shown have focused on parameters, but you're also allowed\
    \ to annotate return types.\n\nConsider the `schedule_restaurant_open` function.\
    \ In the middle of that snippet, I called `find_workers_available_for_time`. This\
    \ returns to a variable named `workers`. Suppose you want to change the code to\
    \ pick workers who have gone the longest without working, rather than random sampling?\
    \ Do you have any indication what type `workers` is?\n\nIf you were to just look\
    \ at the function signature, you would see the following:\n\n```python\ndef find_workers_available_for_time(open_time:\
    \ datetime.datetime):\n```\n\nNothing in here helps us do your job more quickly.\
    \ You could guess and the tests would tell us, right? Maybe it's a list of names?\
    \ Instead of letting the tests fail, maybe you should go look through the implementation.\n\
    \n```python\ndef find_workers_available_for_time(open_time: datetime.datetime):\n\
    \    workers = worker_database.get_all_workers()\n    available_workers = [worker\
    \ for worker in workers\n                         if is_available(worker)]\n \
    \   if available_workers:\n        return available_workers\n\n    # fall back\
    \ to workers who listed they are available\n    # in an emergency\n    emergency_workers\
    \ = [worker for worker in get_emergency_workers()\n                         if\
    \ is_available(worker)]\n\n    if emergency_workers:\n        return emergency_workers\n\
    \n    # Schedule the owner to open, they will find someone else\n    return [OWNER]\n\
    ```\n\nOh no, there's nothing in here that tells you what type you should be expecting.\
    \ There are three different return statements throughout this code, and you hope\
    \ that they all return the same type. (Surely every if statement is tested through\
    \ unit tests to make sure they are consistent, right? Right?) You need to dig\
    \ deeper. You need to look at `worker_database`. You need to look at `is_available`\
    \ and `get_emergency_workers`. You need to look at the `OWNER` variable. Every\
    \ one of these needs to be consistent, or else you'll need to handle special cases\
    \ in your original code.\n\nAnd what if these functions also don't tell you exactly\
    \ what you need? What if you have to go deeper through multiple function calls?\
    \ Every layer you have to go through is another layer of abstraction you need\
    \ to keep in your brain. Every piece of information contributes to cognitive overload.\
    \ The more cognitive overload you are burdened with, the more likely it is that\
    \ a mistake will happen.\n\nAll of this is avoided by annotating a return type.\
    \ Return types are annotated by putting `-> <type>` at the end of the function\
    \ declaration. Suppose you came across this function signature:\n\n```python\n\
    def find_workers_available_for_time(open_time: datetime.datetime) -> list[str]:\n\
    ```\n\nYou now know that you should indeed treat `workers` as a list of strings.\
    \ No digging through databases, function calls, or modules needed."
  mdcn: "## 讨论话题\n\n你在代码库中使用鸭子类型吗？是否存在这样的情况：你可以传入与代码预期不符的类型，但程序仍然能正常工作？你认为这会增强还是削弱你使用场景下的代码健壮性？\n\
    \n## 结语\n\n类型是编写清晰、可维护代码的基石，也是与其他开发者沟通的工具。如果你重视类型，就能传达大量信息，减轻未来维护者的负担。第一部分的其余内容将向你展示如何利用类型来增强代码库的健壮性。\n\
    \n请记住，Python 是动态且强类型的。其强类型特性将对我们大有裨益；当使用不兼容的类型时，Python 会通知我们错误。但其动态类型特性是我们为了编写更好代码而必须克服的挑战。这些语言特性塑造了\
    \ Python 代码的编写方式，你在编写代码时应牢记这一点。\n\n在下一章中，我们将讨论类型注解，这是我们明确指定所用类型的方式。类型注解扮演着至关重要的角色：它们是我们向未来开发者传达行为的主要方式。它们有助于克服动态类型语言的局限性，并允许你在整个代码库中强制执行意图。\n\
    \n# 第 3 章\n## 类型注解\n\nPython 是一种动态类型语言；类型在运行时才确定。这在编写健壮代码时是一个障碍。由于类型内嵌于值本身，开发者很难知道他们正在处理什么类型。当然，这个名称今天看起来像\
    \ `str`，但如果有人把它变成 `bytes` 呢？在动态类型语言中，对类型的假设建立在不稳定的基础上。不过，希望并未破灭。在 Python 3.5 中，引入了一个全新的特性：类型注解。\n\
    \n类型注解将你编写健壮代码的能力提升到了一个全新的水平。Python 的创造者 Guido van Rossum 说得好：\n\n> 我学到了一个痛苦的教训：对于小程序，动态类型很棒。对于大型程序，你必须采用更有纪律的方法，如果语言本身能提供这种纪律，而不是告诉你“嗯，你想做什么都可以”，那会很有帮助。¹\n\
    \n类型注解就是这种更有纪律的方法，是你驾驭大型代码库所需的额外关怀。在本章中，你将学习如何使用类型注解，为什么它们如此重要，以及如何利用一个叫做类型检查器的工具在整个代码库中强制执行你的意图。\n\
    \n¹ Guido van Rossum. “A Language Creators’ Conversation.” PuPPy (Puget Sound\
    \ Programming Python) Annual Benefit 2019. https://oreil.ly/1xf01.\n\n## 什么是类型注解？\n\
    \n在第 2 章中，你第一次看到了类型注解：\n\n```python\ndef close_kitchen_if_past_close(point_in_time:\
    \ datetime.datetime): ❶\n    if point_in_time >= closing_time():\n        close_kitchen()\n\
    \        log_time_closed(point_in_time)\n```\n\n❶ 这里的类型注解是 `: datetime.datetime`\n\
    \n类型注解是一种额外的语法，用于通知用户你变量的预期类型。这些注解充当*类型提示*；它们为读者提供提示，但在运行时实际上并不被 Python 语言使用。事实上，你完全可以忽略这些提示。考虑以下代码片段以及开发者写的注释。\n\
    \n```python\n# CustomDateTime 提供了与 datetime.datetime 相同的所有功能。\n# 我在这里使用它是因为它有更好的日志记录功能。\n\
    close_kitchen_if_past_close(CustomDateTime(\"now\")) # 无错误\n```\n\n违背类型提示的情况应该很少见。作者非常清楚地指明了特定的用例。如果你不遵循类型注解，当原始代码以与你使用的类型不兼容的方式更改时（例如期望某个函数能与该类型一起工作），你就会给自己制造问题。\n\
    \n在这种情况下，Python 在运行时不会抛出任何错误。事实上，它在运行时根本不会使用类型注解。Python 执行时，使用这些注解没有检查或成本。这些类型注解仍然服务于一个至关重要的目的：告知你的读者预期的类型。代码的维护者在更改你的实现时，会知道允许使用哪些类型。调用代码也会受益，因为开发者将确切知道应该传入什么类型。通过实现类型注解，你减少了摩擦。\n\
    \n设身处地为未来的维护者着想。遇到直观易用的代码不是很好吗？你不必翻遍一个又一个函数来确定用法。你不会假设错误的类型，然后需要处理异常和错误行为的后果。\n\
    \n考虑另一段代码，它接收员工的可用时间和餐厅的营业时间，然后为当天安排可用的员工。你想使用这段代码，你看到以下内容：\n\n```python\ndef\
    \ schedule_restaurant_open(open_time, workers_needed):\n```\n\n让我们暂时忽略实现，因为我想专注于第一印象。你认为可以传入什么？停下来，闭上眼睛，在继续阅读之前，问问自己哪些类型是合理的。`open_time`\
    \ 是 `datetime`、自纪元以来的秒数，还是包含小时的字符串？`workers_needed` 是名称列表、`Worker` 对象列表，还是其他什么？如果你猜错了，或者不确定，你需要去查看实现或调用代码，我之前已经说过这既耗时又令人沮丧。\n\
    \n让我提供一个实现，你可以看看你猜得有多接近。\n\n```python\nimport datetime\nimport random\n\ndef schedule_restaurant_open(open_time:\
    \ datetime.datetime,\n                            workers_needed: int):\n    workers\
    \ = find_workers_available_for_time(open_time)\n    # 使用 random.sample 选择 X 个可用员工，\n\
    \    # 其中 X 是所需员工的数量。\n    for worker in random.sample(workers, workers_needed):\n\
    \        worker.schedule(open_time)\n```\n\n你可能猜到 `open_time` 是 `datetime`，但你是否考虑过\
    \ `workers_needed` 可能是 `int`？一旦你看到类型注解，你就能更清楚地了解发生了什么。这减少了认知开销，并减少了维护者的摩擦。\n\n\
    > 这无疑是朝着正确方向迈出的一步，但不要止步于此。如果你看到这样的代码，考虑将变量重命名为 `number_of_workers_needed`，以反映整数的含义。在下一章中，我还将探讨类型别名，它提供了另一种表达方式。\n\
    \n到目前为止，我展示的所有示例都集中在参数上，但你也可以注解返回类型。\n\n考虑 `schedule_restaurant_open` 函数。在那段代码片段中，我调用了\
    \ `find_workers_available_for_time`。它返回一个名为 `workers` 的变量。假设你想更改代码，选择那些长时间未工作的员工，而不是随机抽样？你有任何迹象表明\
    \ `workers` 的类型是什么吗？\n\n如果你只看函数签名，你会看到以下内容：\n\n```python\ndef find_workers_available_for_time(open_time:\
    \ datetime.datetime):\n```\n\n这里没有任何东西能帮助我们更快地完成工作。你可以猜测，测试会告诉我们，对吧？也许是一个名称列表？与其让测试失败，也许你应该去看看实现。\n\
    \n```python\ndef find_workers_available_for_time(open_time: datetime.datetime):\n\
    \    workers = worker_database.get_all_workers()\n    available_workers = [worker\
    \ for worker in workers\n                         if is_available(worker)]\n \
    \   if available_workers:\n        return available_workers\n\n    # 回退到在紧急情况下表示可用的员工\n\
    \    emergency_workers = [worker for worker in get_emergency_workers()\n     \
    \                    if is_available(worker)]\n\n    if emergency_workers:\n \
    \       return emergency_workers\n\n    # 安排所有者来开门，他们会找其他人\n    return [OWNER]\n\
    ```\n\n哦不，这里没有任何东西告诉你应该期望什么类型。这段代码中有三个不同的返回语句，你希望它们都返回相同的类型。（当然，每个 if 语句都通过单元测试来确保它们是一致的，对吧？对吧？）你需要深入挖掘。你需要查看\
    \ `worker_database`。你需要查看 `is_available` 和 `get_emergency_workers`。你需要查看 `OWNER`\
    \ 变量。所有这些都需要保持一致，否则你需要在原始代码中处理特殊情况。\n\n如果这些函数也没有确切告诉你需要什么怎么办？如果你必须通过多个函数调用深入挖掘怎么办？你必须经过的每一层抽象都需要在你的脑海中保持。每一条信息都会导致认知过载。你承受的认知过载越多，发生错误的可能性就越大。\n\
    \n所有这些都可以通过注解返回类型来避免。返回类型通过在函数声明末尾放置 `-> <type>` 来注解。假设你遇到这个函数签名：\n\n```python\n\
    def find_workers_available_for_time(open_time: datetime.datetime) -> list[str]:\n\
    ```\n\n你现在知道确实应该将 `workers` 视为字符串列表。无需挖掘数据库、函数调用或模块。"
