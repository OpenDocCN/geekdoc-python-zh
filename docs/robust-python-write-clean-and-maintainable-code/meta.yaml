    \ How can you break that cycle? What are the pros and cons of each direction of\
    \ dependencies?\n\n## When Code Gets Too DRY\n\nThe DRY principle (Don't Repeat\
    \ Yourself—see Chapter 10 for more detail) is ingrained in most developers' heads.\
    \ Anytime you see very similar code in your codebase, you are required to shout\
