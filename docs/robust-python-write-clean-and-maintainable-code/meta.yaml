  - "[PAGE 365]\n\nYou should absolutely look for areas with very low coverage and\
    \ improve the testing story around them.\n\nConversely, this causes many people\
    \ to assume that high coverage is a predictor of robustness, when it really isn't.\
    \ You can have every line and every branch covered by tests, and still have abysmal\
    \ maintainability. The tests could be brittle or even flat-out useless.\n\nI once\
    \ worked in a codebase that was beginning to adopt unit testing. I came across\
    \ a file with the equivalent of the following:\n\n```\ndef test_foo_can_do_something():\n\
    \    foo = Thingamajiggy()\n    foo.doSomething()\n    assert foo is not None\n\
    \ndef test_foo_parameterized_still_does_the_right_thing():\n    foo = Thingamajiggy(y=12)\n\
    \    foo.doSomethingElse(15)\n    assert foo is not None\n```\n\nThere were about\
    \ 30 of these tests, all with good names and following the AAA pattern (as seen\
    \ in Chapter 21). But they were all effectively useless: all they did was make\
    \ sure that no exception was thrown. The worst part of all of this was the tests\
    \ actually had 100% line coverage and near >80% branch coverage. It's not bad\
    \ that the tests were checking that no exception was thrown; it was bad that they\
    \ didn't actually test the actual functions, despite indicating otherwise.\n\n\
    Mutation testing is your best defense against poor assumptions about code coverage.\
    \ When you are measuring the efficacy of your tests, it becomes much harder to\
    \ write useless, meaningless tests while still eliminating mutants. Mutation testing\
    \ elevates coverage measurements to become a truer predictor of robustness. Coverage\
    \ metrics still won't be a perfect proxy for business value, but mutation testing\
    \ certainly makes them more valuable as an indicator of robustness.\n\n> As mutation\
    \ testing becomes more popular, I fully expect “number of mutants eliminated”\
    \ to be the new buzzword metric replacing “100% code coverage.” While you definitely\
    \ want fewer mutants to survive, beware any goal tied to one metric out of context;\
    \ this number can be gamed just like all the others. You still need a full testing\
    \ strategy to ensure robustness in your codebase.\n\n# Closing Thoughts\n\nMutation\
    \ testing will probably not be the first tool you reach for. However, it's a perfect\
    \ complement for your testing strategy; it finds holes in your safety net and\
    \ brings them to your attention. With automated tools such as mutmut, you can\
    \ leverage your"
  - '[PAGE 366]


    existing test suite to perform mutation testing effortlessly. Mutation testing
    helps you improve the robustness of your test suite, which in turn will help you
    write more robust code.


    This concludes Part IV of this book. You started by learning about static analysis,
    which provides early feedback at a low cost. You then learned about testing strategies
    and how to ask yourself what sorts of questions you want your tests to answer.
    From there, you learned about three specific types of testing: acceptance testing,
    property-based testing, and mutation testing. All of these serve as ways of enhancing
    your existing testing strategy, building a denser and stronger safety net around
    your codebase. With a strong safety net, you will give future developers the confidence
    and flexibility to evolve your system as they need.


    This also concludes the book as a whole. It''s been a long journey, and you''ve
    learned a variety of tips, tools, and methods along the way. You''ve dived deep
    into Python''s type system, learned how writing your own types benefit the codebase,
    and discovered how to write extensible Python. Each part of this book has given
    you building blocks that will help your codebase stand the test of time.


    While this is the end of the book, this is not the end of the story of robustness
    in Python. Our relatively young industry continues to evolve and transform, and
    as software continues to eat the world, the health and maintainability of complex
    systems become paramount. I expect continuing changes in how we understand software,
    and new tools and techniques to build better systems.


    Never stop learning. Python will continue to evolve, adding features and providing
    new tools. Each one of these has the potential to transform how you write code.
    I can''t predict the future of Python or its ecosystem. As Python introduces new
    features, ask yourself about the intentions that feature conveys. What do readers
    of code assume if they see this new feature? What do they assume if that feature
    is not used? Understand how developers interact with your codebase, and empathize
    with them to create systems that are pleasant to develop in.


    Furthermore, take every single thing you''ve read in this book and apply critical
    thought to it. Ask yourself: what value is provided and what does it cost to implement?
    The last thing I want readers to do is take the advice in this book as completely
    prescriptive and use it as a hammer to force codebases to adhere to the standards
    that "the book said to use" (any developer who worked in the ''90s or ''00s probably
    remembers "Design Pattern Fever," where you couldn''t walk 10 steps without running
    into an AbstractInterfaceFactorySingleton). Each of the concepts in this book
    should be seen as a tool in a toolbox; my hope is that you''ve learned enough
    of the background context to make the right decisions about how you use them.


    Above all, remember that you are a human working on a complex system, and other
    humans will work on these systems with you and after you. Each person has their'
  - '[PAGE 367]


    own motivations, their own goals, their own dreams. Everybody will have their
    own challenges and struggles. Mistakes will happen. We will never eliminate them
    all. Instead, I want you to look at these mistakes and push our field forward
    by learning from them. I want you to help the future build off of your work. In
    spite of all the changes, all the ambiguities, all the deadlines and scope creep,
    and all the tribulations of software development, I want you to be able to stand
    behind your work and say: “I’m proud I built this. This was a good system.”


    Thank you for taking the time to read this book. Now go forth and write awesome
    code that stands the test of time.'
