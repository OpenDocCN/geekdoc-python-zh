  mdcn: "# 健壮的 Python\n\n编写清晰且可维护的代码\n\n帕特里克·维亚福尔\n\n你的 Python 项目是否看起来越来越大？随着代码库的扩展，调试和维护变得越来越困难，你是否感到痛苦？Python\
    \ 是一门易于学习和使用的语言，但这也意味着系统可能很快变得难以理解。幸运的是，Python 提供了一些特性来帮助开发者克服可维护性的难题。\n\n在这本实用的书中，作者帕特里克·维亚福尔将向你展示如何充分利用\
    \ Python 的类型系统。你将了解用户定义的类型，如类和枚举，以及 Python 的类型提示系统。你还将学习如何使 Python 具有可扩展性，以及如何使用全面的测试策略作为安全网。运用这些技巧和方法，你将能编写出更清晰、更可维护的代码。\n\
    \n帕特里克·维亚福尔在关键任务软件领域拥有超过 13 年的工作经验，涉及闪电检测、电信和操作系统等领域。他开发用于将 Ubuntu 镜像部署到公共云提供商的流水线和工具，并通过他的公司\
    \ Kudzera, LLC 提供软件咨询和合同服务。帕特里克的目标是让计算机科学和软件工程主题对开发者社区更加平易近人。\n\n-   了解类型在现代开发生态系统中为何至关重要\n\
    -   理解类、字典和枚举等类型选择如何反映特定意图\n-   在不增加臃肿的情况下，使 Python 具备面向未来的可扩展性\n-   使用流行的 Python\
    \ 工具来提高代码库的安全性和健壮性\n-   评估当前代码以检测常见的可维护性陷阱\n-   通过代码检查工具和测试为你的代码库构建安全网\n\n北京 •\
