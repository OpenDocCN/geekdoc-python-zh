  md: "```\n@dataclass(eq=True)\nclass Recipe:\n    # ...\n\nchicken_noodle_soup ==\
    \ noodle_soup\n>>> False\n\nnoodle_soup == deepcopy(noodle_soup)\n>>> True\n```\n\
    \nBy default, equality checks will compare every field across two instances of\
    \ a data class. Mechanically, Python invokes a function named __eq__ when doing\
    \ equality checks. If you'd like to provide different default functionality for\
    \ equality checks, you can write your own __eq__ function.\n\n# Relational Comparison\n\
    \nSuppose I want to display nutritional information in my soup app for the health-conscious.\
    \ I want to be able to sort the soups by various axes, such as the number of calories\
    \ or carbohydrates.\n\n```\nnutritionals = [NutritionInformation(calories=100,\
    \ fat=1, carbohydrates=3),\n                NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n                NutritionInformation(calories=125,\
    \ fat=12, carbohydrates=3)]\n```\n\nBy default, data classes do not support relational\
    \ comparison (<, >, <=, >=), so you cannot sort the information:\n\n```\n>>> sorted(nutritionals)\n\
    TypeError: '<' not supported between instances of\n           'NutritionInformation'\
    \ and 'NutritionInformation'\n```\n\nIf you want to be able to define relational\
    \ comparison (<, >, <=, >=), you need to set eq=True and order=True in the dataclass\
    \ definition. The generated comparison functions will go through each field, comparing\
    \ them in the order in which they were defined.\n\n```\n@dataclass(eq=True, order=True)\n\
    class NutritionInformation:\n    calories: int\n    fat: int\n    carbohydrates:\
    \ int\nnutritionals = [NutritionInformation(calories=100, fat=1, carbohydrates=3),\n\
    \                NutritionInformation(calories=50, fat=6, carbohydrates=4),\n\
    \                NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n\
    \n>>> sorted(nutritionals)\n[NutritionInformation(calories=50, fat=6, carbohydrates=4),\n\
    \ NutritionInformation(calories=100, fat=1, carbohydrates=3),\n NutritionInformation(calories=125,\
    \ fat=12, carbohydrates=3)]\n```"
