  - "[PAGE 361]\n\n# Fixing Mutants\n\nOnce you identify mutants, it's time to fix\
    \ them. One of the best ways to do so is to apply the mutants to the files you\
    \ have on disk. In my previous example, my mutants had the numbers 32, 33, and\
    \ 34. I can apply them to my codebase like so:\n\n```\nmutmut apply 32\nmutmut\
