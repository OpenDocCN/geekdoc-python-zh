  md: "```\nfinances: ops.Finances):\n    super().__init__(name, location, employees,\
    \ inventory, menu, finances)\n    self.__gps = initialize_gps()\n\ndef move_location(self,\
    \ new_location: geo.Coordinates):\n    # schedule a task to drive us to our new\
