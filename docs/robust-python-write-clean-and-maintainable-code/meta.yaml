    \ return None without encoding information in the return type. You can catch a\
    \ common mistake and make this code more robust. But what about the calling code?\n\
    \nIt turns out that the calling code benefits from this as well. Consider:\n\n\
    ```\ndef create_hot_dog():\n    bun = dispense_bun()\n    frank = dispense_frank()\n\
    \    hot_dog = bun.add_frank(frank)\n    ketchup = dispense_ketchup()\n    mustard\
