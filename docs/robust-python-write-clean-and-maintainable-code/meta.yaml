    \n如果你做出了错误的假设，并且这段代码进入了生产环境，你将使代码变得不那么健壮。也许这段代码不在经常执行的代码路径上。也许其他一些 bug 阻止了这段代码运行。也许这段代码周围没有很多测试，后来变成了运行时错误。无论如何，代码中潜伏着一个\
    \ bug，你降低了可维护性。\n\n负责任的开发者尽最大努力不让 bug 进入生产环境。他们会搜索测试、文档（当然要持保留态度——文档可能很快过时）或调用代码。他们会查看\
