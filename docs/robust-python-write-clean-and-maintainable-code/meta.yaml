    # A Note About Manual Testing


    Since this is a book about robust Python, I am focusing mostly on your codebase
    and the tools that support it. This means there is a heavy bias toward automated
    testing in Python. However, do not take this to mean that manual testing should
    be tossed to the wayside.


    *Manual testing*, which is having a person execute testing steps instead of the
    computer, has its place. It is fantastic for things such as exploring your codebase
    in ways that are not easy for a computer, such as validating how a user will interact
    with your system, checking for security vulnerabilities, or running any other
    type of test that relies on subjective analysis.


    In cases where it is cheaper to run manual tests than automated tests (say for
    expensive test equipment or other constraints), it may also be appropriate to
    keep a human in the loop. Before you jump to this conclusion, though, factor in
    the cost of repetition: think through how often you will run the test. In some
    cases, the cost of manual testing will overtake the cost of automated testing
    after just a few test runs.


    Notice that Table 21-1 did not say anything about making sure your software is
    bug free. As Edsger Dijkstra wrote, “Program testing can be used to show the presence
    of bugs, but never to show their absence!”¹ Tests answer questions regarding the
    *quality* of your software.


    *Quality* is this nebulous, ill-defined term that gets tossed around quite a bit.
    It’s a tough thing to pin down, but I prefer this quote from Gerald Weinberg:
    “Quality is value to some person.”² I love how open-ended this quote is; you need
    to think of anyone who may receive some value from your system. It’s not just
    your direct customers, but your customers’ customers, your operations team, your
    sales, your coworkers, and so on.


    Once you’ve identified who receives the value of your system, you need to measure
    the impact when something goes wrong. For every test that is not run, you lose
    a chance to learn whether you are delivering value. What is the impact if that
    value is not delivered? For core business needs, the impact is pretty high. For
    features that lie outside of an end user’s critical path, the impact may be low.
    Know your impact, and weigh that against the cost of testing. If the impact’s
    cost is higher than the test, write


    1 Edsger W. Dijkstra. “Notes on Structured Programming.” Technological University
    Eindhoven, The Netherlands, Department of Mathematics, 1970. https://oreil.ly/NAhWf.


    2 Gerald M. Weinberg. *Quality Software Management*. Vol. 1: *Systems Thinking*.
    New York, NY: Dorset House Publishing, 1992.'
- md: "## The testing pyramid\n\nIn just about any testing book, you are bound to\
    \ come across a figure similar to Figure 21-1: a “testing pyramid.”³\n\n![](img/d64d2be45ca85b398807d181202e7046_320_0.png)\n\
    \nFigure 21-1. The testing pyramid\n\nThe idea is that you want to write a lot\
    \ of small, isolated unit tests. These are theoretically cheaper and should make\
    \ up the bulk of your testing, hence they’re at the bottom. You have fewer integration\
    \ tests, which are costly, and even fewer UI tests, which are very costly. Now,\
    \ ever since its inception, developers have argued about the testing pyramid in\
    \ a multitude of ways, including where the lines get drawn, the usefulness of\
    \ unit tests, and even the shape of the triangle (I’ve even seen the triangle\
    \ inverted).\n\nThe truth is, it doesn’t matter what the labels are or how you\
    \ separate your tests. What you want is your triangle to look like Figure 21-2,\
    \ which focuses on the ratio of value to cost.\n\n> ³ This is known as the testing\
    \ pyramid, introduced in *Succeeding with Agile* by Mike Cohn (Addison-Wesley\
    \ Professional). Cohn originally has “Service” level tests in place of integration\
    \ tests, but I’ve seen more iterations with “integration” tests as the middle\
    \ layer.\n\n![](img/d64d2be45ca85b398807d181202e7046_321_0.png)\n\nFigure 21-2.\
    \ The testing pyramid focused on value-to-cost\n\nWrite lots of tests that have\
    \ a high value-to-cost ratio. It doesn’t matter if they are unit tests or acceptance\
    \ tests. Find ways to run them often. Make tests fast so that developers run them\
    \ multiple times between commits to verify that things are still working. Keep\
    \ your less valuable, slower, or more costly tests for testing on each commit\
    \ (or at least periodically).\n\nThe more tests you have, the fewer unknowns you\
    \ have. The fewer unknowns you have, the more robust your codebase will be. With\
    \ every change you make, you have a bigger safety net to check for any regression.\
    \ But what if the tests are becoming too costly, far outweighing the cost of any\
    \ impact? If you feel these tests are still worthwhile, you need to find a way\
    \ to reduce their cost.\n\nThe cost of a test is threefold: the initial cost of\
    \ writing, the cost of running, and the cost for maintenance. Tests, at a minimum,\
    \ will have to run for some amount of time, and that does cost money. However,\
    \ reducing that cost often becomes an optimization exercise, where you look for\
    \ ways of parallelizing your tests or running them more frequently on developer\
    \ machines. You still need to reduce the initial cost of writing and ongoing cost\
    \ of maintaining your tests. Fortunately, everything you’ve read in this book\
    \ so far directly applies to reducing those costs. Your test code is just as much\
    \ a part of your codebase as the rest of your code, and you need to make sure\
    \ it is robust as well. Choose the right tools, organize your test cases properly,\
    \ and make your tests clear to read and maintain.\n\n![](img/d64d2be45ca85b398807d181202e7046_322_0.png)\n\
    \n## Discussion Topic\n\nMeasure the costs of tests in your system. Does time\
    \ to write, time to run, or time spent maintaining dominate your costs? What can\
    \ you do to reduce those costs?\n\n## Reducing Test Cost\n\nWhen you examine the\
    \ value against the cost of a test, you are gathering information that will help\
    \ you prioritize your testing strategy. Some tests may not be worth running, and\
    \ some will stand out as the first tests you want to write to maximize value.\
    \ However, sometimes you run into the case where there is a really important test\
    \ that you want to write, but it is incredibly costly to write and/or maintain.\
    \ In these cases, find a way to reduce the costs of that test. The way you write\
    \ and organize your tests is paramount to making a test cheaper to write and understand.\n\
    \n### Using pytest\n\nFor the examples in this chapter, I will use the popular\
    \ testing library `pytest`. There are fantastic resources for learning pytest,\
    \ such as *Python Testing with pytest: Simple, Rapid, Effective, and Scalable*\
    \ by Brian Okken (Pragmatic Bookshelf). Here, I'll cover the basics to give you\
    \ context for this chapter.\n\nA test in `pytest` is any function that is prefixed\
    \ with `test_` in a file that is also prefixed by `test_`. Here's a file named\
    \ `test_calorie_count.py` with a single test:\n\n```python\nfrom nutrition import\
    \ get_calorie_count\n\ndef test_get_calorie_count():\n    assert get_calorie_count(\"\
    Bacon Cheeseburger w/ Fries\") == 1200\n```\n\nTests contain assertions, or things\
    \ that should be true. pytest uses the built-in `assert` statement for assertions.\
    \ If a test's assertion is false, an `AssertionError` is raised and the test fails.\
    \ If the assertion is true, the test continues executing.\n\nIf you are hesitant\
    \ to introduce a dependency on a library, there is a built-in unit testing framework\
    \ with the `unittest` module in Python. I prefer pytest because of some advanced\
    \ features (fixtures, plug-ins, etc.), but all of the principles in this chapter\
    \ apply to other testing frameworks as well.\n\n## AAA Testing\n\nAs with production\
    \ code, focus on readability and maintainability in your test code. Communicate\
    \ your intent as clearly as possible. Future test readers will thank you if they\
    \ can see exactly what you are trying to test. When writing a test, it helps for\
    \ each test to follow the same basic pattern.\n\nOne of the most common patterns\
    \ you'll find in tests is the 3A, or AAA, test pattern.⁴ AAA stands for *Arrange-Act-Assert*.\
    \ You break up each test into three separate blocks of code, one for setting up\
    \ your preconditions (arrange), one for performing the operations that are being\
    \ tested (act), and then one for checking for any post-conditions (assert). You\
    \ may also hear about a fourth A, for *annihilate*, or your clean-up code. I'll\
    \ cover each of these steps in detail to discuss how to make your tests easier\
    \ to read and maintain.\n\n## Arrange\n\nThe *arrange* step is all about setting\
    \ up the system in a state that is ready to test. These are called the *preconditions*\
    \ of the test. You set up any dependencies or test data that are needed for the\
    \ test to operate correctly.\n\nConsider the following test:\n\n```python\ndef\
    \ test_calorie_calculation():\n\n    # arrange (set up everything the test needs\
    \ to run)\n    add_ingredient_to_database(\"Ground Beef\", calories_per_pound=1500)\n\
    \    add_ingredient_to_database(\"Bacon\", calories_per_pound=2400)\n    add_ingredient_to_database(\"\
    Cheese\", calories_per_pound=1800)\n    # ... snip 13 more ingredients\n\n   \
    \ set_ingredients(\"Bacon Cheeseburger w/ Fries\",\n                    ingredients=[\"\
    Ground Beef\", \"Bacon\" ... ])\n\n    # act (the thing getting tested)\n    calories\
    \ = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    # assert (verify some\
    \ property about the program)\n    assert calories == 1200\n\n    #annihilate\
    \ (cleanup any resources that were allocated)\n    cleanup_database()\n```\n\n\
    First, I add ingredients to a database and associate a list of ingredients with\
    \ a dish called “Bacon Cheeseburger w/ Fries.” Then I find out how many calories\
    \ are in the burger, check this against a known value, and clean up the database.\n\
    \nLook how much code there is before I actually get to the test itself (the *get_calories*\
    \ invocation). Large *arrange* blocks are a red flag. You will have many tests\
    \ that look very similar, and you want readers to be able to know how they differ\
    \ at a glance.\n\n![](img/d64d2be45ca85b398807d181202e7046_324_0.png)\n\nLarge\
    \ *arrange* blocks may indicate a complicated setup of dependencies. Any user\
    \ of this code will presumably have to set up the dependencies in a similar way.\
    \ Take a step back and ask if there are simpler ways to handle dependencies, such\
    \ as using the strategies described in Part III.\n\nIn the preceding example,\
    \ if I have to add 15 ingredients in two separate tests but set an ingredient\
    \ slightly differently to simulate substitutions, it will be difficult to eyeball\
    \ how the tests differ. Giving the tests verbose names indicating their differences\
    \ is a good step to make, but that only goes so far. Find a balance between keeping\
    \ the test informative and making it easy to read at a glance.\n\n**Consistent\
    \ preconditions versus changing preconditions.** Look through your tests and ask\
    \ yourself what preconditions are the same across sets of tests. Extract these\
    \ through a function and reuse that function across each test. Look how much easier\
    \ it is to compare the following two tests:\n\n```python\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Bacon\"\
    , calories_per_pound=2400)\n\n    setup_bacon_cheeseburger(bacon=\"Bacon\")\n\
    \    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert calories\
    \ == 1200\n\n    cleanup_database()\n\ndef test_calorie_calculation_bacon_cheeseburger_with_substitution():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Turkey\
    \ Bacon\", calories_per_pound=1700)\n\n    setup_bacon_cheeseburger(bacon=\"Turkey\
    \ Bacon\")\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1100\n\n    cleanup_database()\n```\n\nBy creating helper\
    \ functions (in this case, add_base_ingredients_to_database and setup_bacon_cheeseburger),\
    \ you take all the unimportant boilerplate of the tests and reduce it, allowing\
    \ developers to hone in on differences between tests.\n\n**Use test framework\
    \ features for boilerplate code.** Most test frameworks provide a way to run code\
    \ automatically before tests. In the built-in unittest module, you can write a\
    \ setUp function to run before every test. In pytest, you accomplish something\
    \ similar with fixtures."
  mdcn: "## 测试金字塔\n\n在几乎任何测试书籍中，你都会遇到类似图21-1的图表：“测试金字塔”。³\n\n![](img/d64d2be45ca85b398807d181202e7046_320_0.png)\n\
    \n图21-1. 测试金字塔\n\n其理念是，你应该编写大量小型、独立的单元测试。这些测试理论上成本较低，应该构成你测试工作的主体，因此它们位于金字塔底部。集成测试数量较少，成本较高；UI测试数量更少，成本非常高。然而，自其诞生以来，开发者们以多种方式争论着测试金字塔，包括界限如何划分、单元测试的实用性，甚至三角形的形状（我甚至见过倒置的三角形）。\n\
    \n事实是，标签是什么或你如何划分测试并不重要。你想要的是你的三角形看起来像图21-2，它关注的是价值与成本的比率。\n\n> ³ 这就是所谓的测试金字塔，由Mike\
    \ Cohn在《Succeeding with Agile》（Addison-Wesley Professional）中引入。Cohn最初用“服务”级测试代替集成测试，但我见过更多迭代版本将“集成”测试作为中间层。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_321_0.png)\n\n图21-2. 关注价值与成本比率的测试金字塔\n\
    \n编写大量具有高价值成本比的测试。它们是单元测试还是验收测试并不重要。找到经常运行它们的方法。让测试运行得足够快，以便开发者在提交代码之间多次运行它们，以验证一切仍然正常。将价值较低、速度较慢或成本较高的测试保留用于每次提交时的测试（或至少定期进行）。\n\
    \n你拥有的测试越多，未知数就越少。未知数越少，你的代码库就越健壮。每次你进行更改，你都有一个更大的安全网来检查任何回归。但是，如果测试变得过于昂贵，远远超过任何影响的成本怎么办？如果你觉得这些测试仍然值得，你需要找到降低其成本的方法。\n\
    \n测试的成本是三方面的：编写的初始成本、运行成本和维护成本。测试至少需要运行一段时间，这确实需要花钱。然而，降低这种成本通常会变成一项优化工作，你需要寻找并行化测试或在开发者机器上更频繁运行测试的方法。你仍然需要降低编写的初始成本和持续的维护成本。幸运的是，到目前为止你在本书中读到的一切都直接适用于降低这些成本。你的测试代码与代码库的其他部分一样重要，你需要确保它也是健壮的。选择正确的工具，合理组织你的测试用例，并使你的测试清晰易读且易于维护。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_322_0.png)\n\n## 讨论主题\n\n衡量你系统中测试的成本。编写时间、运行时间还是维护时间主导了你的成本？你能做些什么来降低这些成本？\n\
    \n## 降低测试成本\n\n当你审视测试的价值与成本时，你正在收集信息，这将帮助你优先考虑测试策略。有些测试可能不值得运行，而有些测试则会脱颖而出，成为你为了最大化价值而想要编写的首批测试。然而，有时你会遇到这样的情况：有一个非常重要的测试你想编写，但编写和/或维护的成本高得令人难以置信。在这些情况下，找到降低该测试成本的方法。你编写和组织测试的方式对于使测试更易于编写和理解至关重要。\n\
    \n### 使用 pytest\n\n对于本章的示例，我将使用流行的测试库 `pytest`。有很多优秀的资源可以学习 pytest，例如 Brian Okken\
    \ 所著的《Python Testing with pytest: Simple, Rapid, Effective, and Scalable》（Pragmatic\
    \ Bookshelf）。在这里，我将介绍基础知识，为本章提供背景。\n\n`pytest` 中的测试是任何在文件名以 `test_` 为前缀的文件中，函数名也以\
    \ `test_` 为前缀的函数。这是一个名为 `test_calorie_count.py` 的文件，其中包含一个测试：\n\n```python\nfrom\
    \ nutrition import get_calorie_count\n\ndef test_get_calorie_count():\n    assert\
    \ get_calorie_count(\"Bacon Cheeseburger w/ Fries\") == 1200\n```\n\n测试包含断言，即应该为真的条件。pytest\
    \ 使用内置的 `assert` 语句进行断言。如果测试的断言为假，则会引发 `AssertionError`，测试失败。如果断言为真，测试将继续执行。\n\
    \n如果你对引入库依赖有所犹豫，Python 中有一个内置的单元测试框架 `unittest` 模块。我更喜欢 pytest，因为它具有一些高级功能（fixtures、插件等），但本章中的所有原则也适用于其他测试框架。\n\
    \n## AAA 测试\n\n与生产代码一样，在测试代码中也要关注可读性和可维护性。尽可能清晰地传达你的意图。未来的测试读者如果能确切地看到你试图测试什么，他们会感谢你。在编写测试时，让每个测试遵循相同的基本模式会很有帮助。\n\
    \n你在测试中会发现的最常见的模式之一是 3A 或 AAA 测试模式。⁴ AAA 代表 *Arrange-Act-Assert*（准备-执行-断言）。你将每个测试分成三个独立的代码块：一个用于设置前置条件（准备），一个用于执行被测试的操作（执行），然后一个用于检查任何后置条件（断言）。你可能还会听到第四个\
    \ A，代表 *annihilate*（清理），即你的清理代码。我将详细介绍每个步骤，讨论如何使你的测试更易于阅读和维护。\n\n## 准备\n\n*准备*\
    \ 步骤是关于将系统设置为准备好测试的状态。这些被称为测试的 *前置条件*。你设置测试正确运行所需的任何依赖项或测试数据。\n\n考虑以下测试：\n\n```python\n\
    def test_calorie_calculation():\n\n    # arrange (set up everything the test needs\
    \ to run)\n    add_ingredient_to_database(\"Ground Beef\", calories_per_pound=1500)\n\
    \    add_ingredient_to_database(\"Bacon\", calories_per_pound=2400)\n    add_ingredient_to_database(\"\
    Cheese\", calories_per_pound=1800)\n    # ... snip 13 more ingredients\n\n   \
    \ set_ingredients(\"Bacon Cheeseburger w/ Fries\",\n                    ingredients=[\"\
    Ground Beef\", \"Bacon\" ... ])\n\n    # act (the thing getting tested)\n    calories\
    \ = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    # assert (verify some\
    \ property about the program)\n    assert calories == 1200\n\n    #annihilate\
    \ (cleanup any resources that were allocated)\n    cleanup_database()\n```\n\n\
    首先，我向数据库添加食材，并将一组食材与名为“Bacon Cheeseburger w/ Fries”的菜肴关联起来。然后我找出汉堡的卡路里含量，将其与已知值进行比较，并清理数据库。\n\
    \n看看在实际测试本身（*get_calories* 调用）之前有多少代码。大型的 *准备* 代码块是一个危险信号。你会有很多看起来非常相似的测试，你希望读者能够一目了然地知道它们的区别。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_324_0.png)\n\n大型的 *准备* 代码块可能表明依赖项的设置很复杂。此代码的任何用户大概都必须以类似的方式设置依赖项。退一步问一下，是否有更简单的方法来处理依赖项，例如使用第三部分中描述的策略。\n\
    \n在前面的例子中，如果我必须在两个独立的测试中添加15种食材，但为了模拟替换而以略有不同的方式设置一种食材，那么很难一眼看出测试的区别。给测试起冗长的名称来表明它们的区别是一个好的开始，但这只能做到一定程度。在保持测试信息丰富和易于一目了然之间找到平衡。\n\
    \n**一致的前置条件与变化的前置条件。** 浏览你的测试，问问自己哪些前置条件在测试集之间是相同的。通过函数提取这些前置条件，并在每个测试中重用该函数。看看比较以下两个测试变得多么容易：\n\
    \n```python\ndef test_calorie_calculation_bacon_cheeseburger():\n    add_base_ingredients_to_database()\n\
    \    add_ingredient_to_database(\"Bacon\", calories_per_pound=2400)\n\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n   \
    \ assert calories == 1200\n\n    cleanup_database()\n\ndef test_calorie_calculation_bacon_cheeseburger_with_substitution():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Turkey\
    \ Bacon\", calories_per_pound=1700)\n\n    setup_bacon_cheeseburger(bacon=\"Turkey\
    \ Bacon\")\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1100\n\n    cleanup_database()\n```\n\n通过创建辅助函数（在本例中是 `add_base_ingredients_to_database`\
    \ 和 `setup_bacon_cheeseburger`），你减少了测试中所有不重要的样板代码，让开发者能够专注于测试之间的差异。\n\n**使用测试框架功能处理样板代码。**\
    \ 大多数测试框架提供了一种在测试之前自动运行代码的方法。在内置的 `unittest` 模块中，你可以编写一个 `setUp` 函数，在每个测试之前运行。在\
    \ `pytest` 中，你可以使用 fixtures 实现类似的功能。"
