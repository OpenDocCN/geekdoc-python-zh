    \ tester hat for a second. The requirements I've just given are certainly not\
    \ exhaustive; how would you refine them? I want you to take a few minutes and\
    \ list out all the different constraints you can think of with just the dictionary\
    \ given. Assuming the YAML file parses and returns a dictionary, how many invalid\
    \ test cases can you think of?\n\n> You may notice that the routing number and\
    \ account numbers are strings in the example above. This is intentional. Despite\
    \ being a string of numerals, I do not want this to be a numeric type. Numeric\
    \ operations (such as addition or multiplication) do not make sense, and I do\
    \ not want an account number of 00000001234 to be truncated to 1234.\n\nHere are\
    \ some ideas to think about when enumerating test cases:\n\n- Python is a dynamic\
    \ language. Are you sure that everything is the right type?\n- Dictionaries don't\
    \ require any sort of required fields—are you sure every field is present?\n-\
    \ Are all the constraints from the problem statement tested for?\n- What about\
    \ additional constraints (correct routing numbers, account numbers, and addresses?)\n\
    - What about negative numbers where there shouldn't be?\n\nI came up with 67 different\
    \ test cases with invalid data in about five minutes. Some of my test cases included\
    \ (the full list is included in the [GitHub repo for this book](https://github.com/example)):\n\
    \n- Name is zero characters.\n- Name is not a string.\n- There are no chefs.\n\
    - Employee has no bank details or address.\n- Employee's routing number is truncated\
    \ (0000123 becomes 123).\n- Number of seats is negative.\n\nThis, admittedly,\
    \ is not a very complex class. Could you imagine the number of test cases for\
    \ a much more involved class? Even with 67 test cases, could you imagine opening\
    \ up a constructor of a type and checking 67 different conditions? In most of\
    \ the codebases I've worked on, the validation logic is nowhere near as comprehensive.\
    \ However, this is user-configurable data and I want errors to be caught as early\
    \ as possible in runtime. You should prefer catching the errors at data injection\
    \ over first use.\n\nAfter all, the first use of these values might not happen\
    \ until you are in a separate system, decoupled from your parse logic.\n\n![](img/d64d2be45ca85b398807d181202e7046_223_0.png)\n\
    \n## Discussion Topic\n\nThink about some user data represented as data types\
    \ in your system. How complex is that data? How many ways can you construct it\
    \ incorrectly? Discuss the impact of creating this data incorrectly and how confident\
    \ you are that your code will catch all the errors.\n\nThroughout this chapter,\
    \ I'll show you how to create a type that is easy to read and models all the constraints\
    \ listed. Since I've focused on type annotations so much, it'd be nice if I can\
    \ catch missing fields or wrong types at typecheck time. A first idea is to use\
    \ a TypedDict (see Chapter 5 for more information on TypedDict):\n\n```python\n\
    from typing import Literal, TypedDict, Union\n\nclass AccountAndRoutingNumber(TypedDict):\n\
    \    account_number: str\n    routing_number: str\n\nclass BankDetails(TypedDict):\n\
    \    bank_details: AccountAndRoutingNumber\n\nAddressOrBankDetails = Union[str,\
    \ BankDetails]\n\nPosition = Literal['Chef', 'Sous Chef', 'Host',\n          \
    \         'Server', 'Delivery Driver']\n\nclass Dish(TypedDict):\n    name: str\n\
    \    price_in_cents: int\n    description: str\n\nclass DishWithOptionalPicture(Dish,\
    \ TypedDict, total=False):\n    picture: str\n\nclass Employee(TypedDict):\n \
    \   name: str\n    position: Position\n    payment_information: AddressOrBankDetails\n\
    \nclass Restaurant(TypedDict):\n    name: str\n    owner: str\n    address: str\n\
    \    employees: list[Employee]\n    dishes: list[Dish]\n    number_of_seats: int\n\
    \    to_go: bool\n    delivery: bool\n```\n\nThis is a huge step in readability;\
    \ you can tell exactly what types are needed to construct your type. You could\
    \ write the following function:\n\n```python\ndef load_restaurant(filename: str)\
    \ -> Restaurant:\n    with open(filename) as yaml_file:\n        return yaml.safe_load(yaml_file)\n\
    ```\n\nDownstream consumers would automatically benefit from the types I've just\
    \ laid out. However, there are a few problems with this approach:\n\n- I can't\
    \ control construction of a TypedDict, so I can't validate any fields as part\
    \ of type construction. I must force consumers to do the validation.\n- TypedDict\
    \ cannot have additional methods on it.\n- TypedDict does no validation implicitly.\
    \ If you create the wrong dictionary from YAML, the typechecker will not complain.\n\
    \nThat last point is important. In fact, I could have the following contents as\
    \ the entirety of my YAML file, and the code will still typecheck:\n\n```\ninvalid_name:\
    \ \"This is the wrong file format\"\n```\n\nTypechecking will not catch errors\
    \ at runtime. You need something stronger. Enter pydantic.\n\n## pydantic\n\n\
    pydantic is a library that provides runtime checking of your types without sacrificing\
    \ readability. You can use pydantic to model your classes like so:\n\n```python\n\
    from pydantic.dataclasses import dataclass\nfrom typing import Literal, Optional,\
    \ TypedDict, Union\n\n@dataclass\nclass AccountAndRoutingNumber:\n    account_number:\
    \ str\n    routing_number: str\n\n@dataclass\nclass BankDetails:\n    bank_details:\
    \ AccountAndRoutingNumber\n\nAddressOrBankDetails = Union[str, BankDetails]\n\n\
    Position = Literal['Chef', 'Sous Chef', 'Host',\n                   'Server',\
    \ 'Delivery Driver']\n\n@dataclass\nclass Dish:\n    name: str\n```"
