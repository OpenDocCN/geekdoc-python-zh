- md: "If you want to control how comparison is defined, you can write your own `__le__`,\
    \ `__lt__`, `__gt__`, and `__ge__` functions in the dataclass, which map to less-than-or-equals,\
    \ less-than, greater-than, and greater-than-or-equals, respectively. For instance,\
    \ if you wanted your `NutritionInformation` sorted first by fat, then carbohydrates,\
    \ and then calories by default:\n\n```python\n@dataclass(eq=True)\nclass NutritionInformation:\n\
    \    calories: int\n    fat: int\n    carbohydrates: int\n\n    def __lt__(self,\
    \ rhs) -> bool:\n        return ((self.fat, self.carbohydrates, self.calories)\
    \ <\n                (rhs.fat, rhs.carbohydrates, rhs.calories))\n\n    def __le__(self,\
    \ rhs) -> bool:\n        return self < rhs or self == rhs\n\n    def __gt__(self,\
    \ rhs) -> bool:\n        return not self <= rhs\n\n    def __ge__(self, rhs) ->\
    \ bool:\n        return not self < rhs\n\nnutritionals = [NutritionInformation(calories=100,\
    \ fat=1, carbohydrates=3),\n                NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n                NutritionInformation(calories=125,\
    \ fat=12, carbohydrates=3)]\n\n>>> sorted(nutritionals)\n[NutritionInformation(calories=100,\
    \ fat=1, carbohydrates=3),\n NutritionInformation(calories=50, fat=6, carbohydrates=4),\n\
    \ NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n```\n\n> If you\
    \ override comparison functions, do not specify `order=True`, as that will raise\
    \ a `ValueError`.\n\n## Immutability\n\nSometimes, you need to convey that a dataclass\
    \ should not be able to be changed. In that case, you can specify that a dataclass\
    \ must be frozen, or unable to change. Anytime you change the state of a dataclass,\
    \ you introduce entire classes of errors that might happen:\n\n- Callers of your\
    \ code may be unaware that the fields changed; they could erroneously assume that\
    \ the fields are static.\n- Setting a single field to an incorrect value might\
    \ be incompatible with how the other fields are set.\n- If there are multiple\
    \ threads modifying the fields, you run the risk of a data race, which means you\
    \ cannot guarantee in which order the modifications are applied in relation to\
    \ one another.\n\nNone of these error cases occur if your dataclass is frozen.\
    \ To freeze a dataclass, add a `frozen=True` to the dataclass decorator:\n\n```python\n\
    @dataclass(frozen=True)\nclass Recipe:\n    aromatics: Set[Ingredient]\n    broth:\
    \ Broth\n    vegetables: Set[Ingredient]\n    meats: Set[Ingredient]\n    starches:\
    \ Set[Ingredient]\n    garnishes: Set[Ingredient]\n    time_to_cook: datetime.timedelta\n\
    ```\n\nIf you want to use your dataclass in a set or as a key in a dictionary\
    \ it must be hashable. This means it must define a `__hash__` function that takes\
    \ your object and distills it down to a number.² When you freeze a dataclass,\
    \ it automatically becomes hashable, as long as you don't explicitly disable equality\
    \ checking and all fields are hashable.\n\nThere are two caveats around this immutability,\
    \ however. First, when I say immutability, I am referencing the fields in the\
    \ dataclass, not the variable containing the dataclass itself. For example:\n\n\
    ```python\n# assume that Recipe is immutable because\n# frozen was set to true\
    \ in the decorator\nsoup = Recipe(\n    aromatics={pepper, garlic},\n    broth=Broth.CHICKEN,\n\
    \    vegetables={celery, onions, carrots},\n    meats={chicken},\n    starches={noodles},\n\
    \    garnishes={parsley},\n    time_to_cook=datetime.timedelta(minutes=60))\n\n\
    # this is an error\nsoup.broth = Broth.VEGETABLE\n```\n\n² Hashing is a complicated\
    \ subject, beyond the scope of this book. You can learn more about the hash function\
    \ in the Python documentation.\n\n```python\n# this is not an error\nsoup = Recipe(\n\
    \    aromatics=set(),\n    broth=Broth.CHICKEN,\n    vegetables=set(),\n    meats=set(),\n\
    \    starches=set(),\n    garnishes=set(),\n    time_to_cook=datetime.timedelta(seconds=3600)\n\
    )\n```\n\nIf you would like the typechecker to error out if the variable is rebound,\
    \ you can annotate the variable as `Final` (see Chapter 4 for more details on\
    \ `Final`).\n\nSecondly, a frozen dataclass only prevents its members from being\
    \ set. If the members are mutable, you are still able to call methods on those\
    \ members to modify their values. `frozen` dataclasses do not extend immutability\
    \ to their attributes.\n\nFor example, this code is perfectly fine:\n\n```python\n\
    soup.aromatics.add(Ingredient(\"Garlic\"))\n```\n\nEven though it is modifying\
    \ the `aromatics` field of a frozen dataclass, no error is raised. When using\
    \ frozen dataclasses, make the members immutable (such as integers, strings, or\
    \ other frozen dataclasses) to avoid this pitfall.\n\n## Comparison to Other Types\n\
    \nData classes are relatively new (introduced in Python 3.7); a lot of legacy\
    \ code will not contain data classes. As you evaluate data class adoption, you\
    \ need to understand where a data class shines in relation to other constructs.\n\
    \n### Data Classes Versus Dictionaries\n\nAs discussed in Chapter 5, dictionaries\
    \ are fantastic for mapping keys to values, but they are most appropriate when\
    \ they are homogeneous (when all the keys are the same type and all the values\
    \ are the same type). When used for heterogeneous data, dictionaries are tougher\
    \ for humans to reason about. Also, typecheckers don't know enough about the dictionary\
    \ to check for errors.\n\nData classes, however, are a natural fit for fundamentally\
    \ heterogeneous data. Readers of the code know the exact fields present in the\
    \ type and typecheckers can check for correct usage. If you have heterogeneous\
    \ data, use a data class before you reach for a dictionary.\n\n### Data Classes\
    \ Versus TypedDict\n\nAlso discussed in Chapter 5 was the `TypedDict` type. This\
    \ is another way to store heterogeneous data that makes sense for readers and\
    \ typecheckers. At first glance, `TypedDict` and data classes solve a very similar\
    \ problem, so it can be tough to decide which one is appropriate. My rule of thumb\
    \ is to think of a dataclass as the default, as it can have functions defined\
    \ on it and you can control immutability, comparability, equality, and other operations.\
    \ However, if you are already working with dictionaries (such as for working with\
    \ JSON), you should reach for a `TypedDict`, provided that you don't need any\
    \ of the benefits of a dataclass.\n\n### Data Classes Versus namedtuple\n\n`namedtuple`\
    \ is a tuple-like collection type in the `collections` module. Unlike tuples,\
    \ it allows for you to name the fields in a tuple like so:\n\n```python\n>>> from\
    \ collections import namedtuple\n>>> NutritionInformation = namedtuple('NutritionInformation',\n\
    ...                                  ['calories', 'fat', 'carbohydrates'])\n>>>\
    \ nutrition = NutritionInformation(calories=100, fat=5, carbohydrates=10)\n>>>\
    \ print(nutrition.calories)\n100\n```\n\nA `namedtuple` goes a long way toward\
    \ making a tuple more readable, but so does using a dataclass in its place. I\
    \ almost always pick a dataclass instead of a `namedtuple`. A dataclass, like\
    \ a `namedtuple`, provides named fields along with other benefits like:\n\n- Explicitly\
    \ type annotating your arguments\n- Control of immutability, comparability, and\
    \ equality\n- Easier to define functions in the type\n\nIn general, I only reach\
    \ for a `namedtuple` if I explicitly need compatibility with Python 3.6 or before.\n\
    \n![Discussion Topic](img/d64d2be45ca85b398807d181202e7046_152_0.png)\n\n**Discussion\
    \ Topic**\n\nWhat types do you use to represent heterogeneous data in your codebase?\
    \ If you use dictionaries, how easy is it for developers to know all the key-value\
    \ pairs in the dictionary? If you use tuples, how easy is it for developers to\
    \ know what the meaning of individual fields are?\n\n## Closing Thoughts\n\nData\
    \ classes were a game changer when released in Python 3.7, because they allowed\
    \ developers to define heterogeneous types that were fully typed while still staying\
    \ lightweight. As I write code, I find myself reaching for data classes more and\
    \ more. Whenever you encounter heterogeneous, developer-controlled dictionaries\
    \ or namedtuples, a data class is more suitable. You can find a wealth of additional\
    \ information in the [dataclass documentation](https://docs.python.org/3/library/dataclasses.html).\n\
    \nHowever, as great as data classes are, they should not be universally used.\
    \ A data class, at its heart, represents a conceptual relationship, but it really\
    \ is only appropriate when the members within the data class are independent of\
    \ one another. If any of the members should be restricted depending on the other\
    \ members, a data class will make it harder to reason about your code. Any developer\
    \ could change the fields during your data classes’ lifetime, potentially creating\
    \ an illegal state. In these cases, you need to reach for something a bit heavier.\
    \ In the next chapter, I’ll teach you how to do just that with classes."
  mdcn: "如果你想控制比较的定义方式，可以在数据类中编写自己的 `__le__`、`__lt__`、`__gt__` 和 `__ge__` 函数，它们分别对应小于等于、小于、大于和大于等于。例如，如果你希望\
    \ `NutritionInformation` 默认先按脂肪排序，然后是碳水化合物，最后是卡路里：\n\n```python\n@dataclass(eq=True)\n\
    class NutritionInformation:\n    calories: int\n    fat: int\n    carbohydrates:\
    \ int\n\n    def __lt__(self, rhs) -> bool:\n        return ((self.fat, self.carbohydrates,\
    \ self.calories) <\n                (rhs.fat, rhs.carbohydrates, rhs.calories))\n\
    \n    def __le__(self, rhs) -> bool:\n        return self < rhs or self == rhs\n\
    \n    def __gt__(self, rhs) -> bool:\n        return not self <= rhs\n\n    def\
    \ __ge__(self, rhs) -> bool:\n        return not self < rhs\n\nnutritionals =\
    \ [NutritionInformation(calories=100, fat=1, carbohydrates=3),\n             \
    \   NutritionInformation(calories=50, fat=6, carbohydrates=4),\n             \
    \   NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n\n>>> sorted(nutritionals)\n\
    [NutritionInformation(calories=100, fat=1, carbohydrates=3),\n NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n\
    ```\n\n> 如果你重写了比较函数，请不要指定 `order=True`，因为这会引发 `ValueError`。\n\n## 不可变性\n\n有时，你需要表达一个数据类不应被修改。在这种情况下，你可以指定数据类必须是冻结的，即无法更改。每次你改变数据类的状态时，都可能引入一整类错误：\n\
    \n- 你的代码调用者可能不知道字段已经改变；他们可能错误地假设字段是静态的。\n- 将单个字段设置为错误的值可能与其他字段的设置方式不兼容。\n- 如果有多个线程修改字段，你就有数据竞争的风险，这意味着你无法保证修改以何种顺序相互应用。\n\
    \n如果你的数据类是冻结的，这些错误情况都不会发生。要冻结一个数据类，请在数据类装饰器中添加 `frozen=True`：\n\n```python\n@dataclass(frozen=True)\n\
    class Recipe:\n    aromatics: Set[Ingredient]\n    broth: Broth\n    vegetables:\
    \ Set[Ingredient]\n    meats: Set[Ingredient]\n    starches: Set[Ingredient]\n\
    \    garnishes: Set[Ingredient]\n    time_to_cook: datetime.timedelta\n```\n\n\
    如果你想在集合中使用你的数据类或将其用作字典的键，它必须是可哈希的。这意味着它必须定义一个 `__hash__` 函数，该函数接受你的对象并将其提炼为一个数字。²\
    \ 当你冻结一个数据类时，只要你不显式禁用相等性检查且所有字段都是可哈希的，它就会自动变为可哈希的。\n\n然而，关于这种不可变性有两个注意事项。首先，当我说不可变性时，我指的是数据类中的字段，而不是包含数据类本身的变量。例如：\n\
    \n```python\n# 假设 Recipe 是不可变的，因为\n# 装饰器中 frozen 被设置为 true\nsoup = Recipe(\n \
    \   aromatics={pepper, garlic},\n    broth=Broth.CHICKEN,\n    vegetables={celery,\
    \ onions, carrots},\n    meats={chicken},\n    starches={noodles},\n    garnishes={parsley},\n\
    \    time_to_cook=datetime.timedelta(minutes=60))\n\n# 这是一个错误\nsoup.broth = Broth.VEGETABLE\n\
    ```\n\n² 哈希是一个复杂的主题，超出了本书的范围。你可以在 Python 文档中了解更多关于哈希函数的信息。\n\n```python\n# 这不是一个错误\n\
    soup = Recipe(\n    aromatics=set(),\n    broth=Broth.CHICKEN,\n    vegetables=set(),\n\
    \    meats=set(),\n    starches=set(),\n    garnishes=set(),\n    time_to_cook=datetime.timedelta(seconds=3600)\n\
    )\n```\n\n如果你希望类型检查器在变量被重新绑定时报错，可以将变量标注为 `Final`（有关 `Final` 的更多细节，请参见第 4 章）。\n\
    \n其次，冻结的数据类只阻止其成员被设置。如果成员是可变的，你仍然可以调用这些成员上的方法来修改它们的值。`frozen` 数据类不会将其不可变性扩展到其属性。\n\
    \n例如，这段代码完全没问题：\n\n```python\nsoup.aromatics.add(Ingredient(\"Garlic\"))\n```\n\
    \n即使它正在修改冻结数据类的 `aromatics` 字段，也不会引发错误。使用冻结数据类时，请使成员不可变（例如整数、字符串或其他冻结数据类），以避免这个陷阱。\n\
    \n## 与其他类型的比较\n\n数据类相对较新（在 Python 3.7 中引入）；许多遗留代码不包含数据类。在评估数据类采用时，你需要理解数据类相对于其他构造的优势所在。\n\
    \n### 数据类与字典\n\n如第 5 章所述，字典非常适合将键映射到值，但当它们是同构的（当所有键都是相同类型且所有值都是相同类型时）时最为合适。当用于异构数据时，字典对人类来说更难推理。此外，类型检查器对字典了解不足，无法检查错误。\n\
    \n然而，数据类天然适合根本性的异构数据。代码的读者知道类型中存在的确切字段，类型检查器可以检查正确的用法。如果你有异构数据，在使用字典之前先考虑使用数据类。\n\
    \n### 数据类与 TypedDict\n\n第 5 章还讨论了 `TypedDict` 类型。这是另一种存储异构数据的方式，对读者和类型检查器都有意义。乍一看，`TypedDict`\
    \ 和数据类解决的问题非常相似，因此很难决定哪个更合适。我的经验法则是将数据类视为默认选择，因为它可以在其上定义函数，并且你可以控制不可变性、可比较性、相等性和其他操作。然而，如果你已经在使用字典（例如处理\
    \ JSON），你应该使用 `TypedDict`，前提是你不需要数据类的任何好处。\n\n### 数据类与 namedtuple\n\n`namedtuple`\
    \ 是 `collections` 模块中的一种类似元组的集合类型。与元组不同，它允许你为元组中的字段命名，如下所示：\n\n```python\n>>>\
    \ from collections import namedtuple\n>>> NutritionInformation = namedtuple('NutritionInformation',\n\
    ...                                  ['calories', 'fat', 'carbohydrates'])\n>>>\
    \ nutrition = NutritionInformation(calories=100, fat=5, carbohydrates=10)\n>>>\
    \ print(nutrition.calories)\n100\n```\n\n`namedtuple` 在使元组更具可读性方面大有帮助，但使用数据类代替它同样如此。我几乎总是选择数据类而不是\
    \ `namedtuple`。数据类，像 `namedtuple` 一样，提供命名字段以及其他好处，例如：\n\n- 显式地为你的参数添加类型注解\n- 控制不可变性、可比较性和相等性\n\
    - 更容易在类型中定义函数\n\n通常，只有在明确需要与 Python 3.6 或更早版本兼容时，我才会使用 `namedtuple`。\n\n![讨论主题](img/d64d2be45ca85b398807d181202e7046_152_0.png)\n\
    \n**讨论主题**\n\n你在代码库中使用什么类型来表示异构数据？如果你使用字典，开发人员了解字典中所有键值对的难易程度如何？如果你使用元组，开发人员了解各个字段含义的难易程度如何？\n\
    \n## 结语\n\n数据类在 Python 3.7 中发布时是一个游戏规则改变者，因为它们允许开发者定义完全类型化的异构类型，同时保持轻量级。随着我编写代码，我发现自己越来越多地使用数据类。每当你遇到异构的、开发者控制的字典或\
    \ namedtuple 时，数据类更合适。你可以在 [dataclass 文档](https://docs.python.org/3/library/dataclasses.html)中找到大量额外信息。\n\
    \n然而，尽管数据类很棒，但它们不应该被普遍使用。数据类本质上代表了一种概念关系，但它真的只在数据类中的成员彼此独立时才合适。如果任何成员应该根据其他成员受到限制，数据类将使你的代码更难推理。任何开发者都可能在你的数据类生命周期内更改字段，从而可能创建非法状态。在这些情况下，你需要使用更重量级的东西。在下一章中，我将教你如何用类来做到这一点。"
