  md: "Similarly, I could write a pipeline chain that tracks the drone's maximum altitude\
    \ once it's left the restaurant:\n\n```\nget_max_altitude = observable.pipe(\n\
    \    rx.operators.skip_while(is_close_to_restaurant),\n    rx.operators.filter(lambda\
    \ data: isinstance(data, LocationData)),\n    rx.operators.map(lambda loc: loc.z),\n\
    \    rx.operators.max()\n)\n\n# save max altitude does something with the final\
    \ data\n# (e.g. save to database, print to screen, etc)\nget_max_altitude.subscribe(save_max_altitude)\n\
    ```\n\n> A *lambda function* is just an inline function without a name. It is\
    \ often used for functions that are only used once where you don't want to place\
    \ the definition of the function too far away from its use.\n\nThis is our old\
    \ friend *composability* (as seen in Chapter 17) coming to our aid. I can compose\
    \ different operators however I want to produce a datastream that matches my use\
    \ case. RxPY has support for over one hundred built-in operators, as well as a\
    \ framework for defining your own operators. You can even compose the results\
    \ from one pipe into a new stream of events that other parts of the program can\
    \ observe. This composability, paired with the decoupled nature of event subscription,\
    \ gives you a large amount of flexibility in writing code. Furthermore, reactive\
    \ programming encourages immutability, which greatly decreases the chance of bugs.\
    \ You can hook up new pipes, compose operators together, handle data asynchronously,\
    \ and more with a reactive framework like RxPY.\n\nIt also becomes easy to debug\
    \ in isolation. While you can't easily step through RxPY with a debugger (you'll\
    \ end up in a lot of complicated code related to operations and observables),\
    \ you can instead step into the functions that you pass to operators. Testing\
    \ is a breeze too. Since all the functions are meant to be immutable, you can\
    \ test any of them on their own. You end up with a lot of small, single-purpose\
    \ functions that are easy to understand.\n\nThis type of model excels in systems\
    \ that revolve around streams of data, such as data pipelines and extract, transform,\
    \ load (ETL) systems. It is also incredibly useful in applications dominated by\
    \ reactions to I/O events, such as server applications and GUI applications. If\
    \ reactive programming fits your domain model, I encourage you to read the [RxPY\
    \ documentation](https://rxpy.readthedocs.io/). If you'd like more structured\
    \ learning, I recommend the video course *Reactive Python for Data Science* or\
    \ the book *Hands-On Reactive Programming with Python: Event-Driven Development\
    \ Unraveled with RxPY* by Romain Picard (O'Reilly)."
