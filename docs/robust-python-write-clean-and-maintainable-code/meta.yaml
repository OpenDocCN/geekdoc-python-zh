  - "[PAGE 42]\n\n# CHAPTER 2\nIntroduction to Python Types\n\nTo write maintainable\
    \ Python, you must be aware of the nature of types and be deliberate about using\
    \ them. I’ll start by talking about what a type actually is and why that matters.\
    \ I’ll then move on to how the Python language’s decisions about its type system\
    \ affects the robustness of your codebase.\n\n# What’s in a Type?\n\nI want you\
    \ to pause and answer a question: without mentioning numbers, strings, text, or\
    \ Booleans, how would you explain what a type is?\n\nIt’s not a simple answer\
    \ for everyone. It’s even harder to explain what the benefits are, especially\
    \ in a language like Python where you do not have to explicitly declare types\
    \ of variables.\n\nI consider a type to have a very simple definition: a communication\
    \ method. Types convey information. They provide a representation that users and\
    \ computers can reason about. I break the representation down into two different\
    \ facets:\n\n+   *Mechanical representation*\n    Types communicate behaviors\
    \ and constraints to the Python language itself.\n*Semantic representation*\n\
    \    Types communicate behaviors and constraints to other developers.\n\nLet’s\
    \ go learn a little more about each representation."
  - "[PAGE 43]\n\n# Mechanical Representation\n\nAt its core, computers are all about\
    \ binary code. Your processor doesn't speak Python; all it sees is the presence\
