  md: "# Usage\n\nData classes have some built-in functions that make them really\
    \ easy to work with. You've already seen that constructing data classes is a cinch,\
    \ but what else can you do?\n\n# String Conversion\n\nThere are two special methods,\
    \ `__str__` and `__repr__`, used to convert your object to its informal and official\
    \ string representation.¹ Note the double underscores surrounding them; they are\
    \ known as *magic methods*. I'll cover magic methods more in Chapter 11, but for\
    \ now, you can treat them as functions that get called when you invoke `str()`\
    \ or `repr()` on an object. Data classes define these functions by default:\n\n\
    ```\n# Both repr() and str() will return the output below\nstr(chicken_noodle_soup)\n\
    >>> Recipe(\n    aromatics={\n        Ingredient(name='Pepper', amount=1, units=<ImperialMeasure.TABLESPOON:\
    \ 2>),\n        Ingredient(name='Garlic', amount=2, units=<ImperialMeasure.TEASPOON:\
    \ 1>)},\n    broth=<Broth.CHICKEN: 2>,\n    vegetables={\n        Ingredient(name='Celery',\
    \ amount=0.25, units=<ImperialMeasure.CUP: 3>),\n        Ingredient(name='Onions',\
    \ amount=0.25, units=<ImperialMeasure.CUP: 3>),\n        Ingredient(name='Carrots',\
    \ amount=0.25, units=<ImperialMeasure.CUP: 3>)},\n    meats={\n        Ingredient(name='Chicken',\
    \ amount=1.5, units=<ImperialMeasure.CUP: 3>)},\n    starches={\n        Ingredient(name='Noodles',\
    \ amount=1.5, units=<ImperialMeasure.CUP: 3>)},\n    garnishes={\n        Ingredient(name='Parsley',\
    \ amount=2,\n                   units=<ImperialMeasure.TABLESPOON: 2>)},\n   \
    \ time_to_cook=datetime.timedelta(seconds=3600)\n)\n```\n\nA bit lengthy, but\
    \ it means that you won't get something uglier like `<__main__.Recipe object at\
    \ 0x7fef44240730>`, which is the default string conversion for other user-defined\
    \ types.\n\n# Equality\n\nIf you want to be able to test equality (`==`, `!=`)\
    \ between two data classes, you can specify `eq=True` when defining your dataclass:\n\
    \n```\nfrom copy import deepcopy\n```\n\n> ¹ The informal string representation\
    \ is useful for printing the object. The official string representation reproduces\
    \ all information about the object so that it can be reconstructed."
