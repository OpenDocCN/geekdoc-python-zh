- md: "## Multiple Inheritance\n\nIn Python, it is possible to inherit from multiple\
    \ classes:\n\n```python\nclass FoodTruck(Restaurant, Vehicle):\n    # ... snip\
    \ ...\n```\n\nIn this case, you inherit all the methods and attributes from both\
    \ base classes. When you call super(), you now have to decide exactly which class\
    \ is initialized. This can get very confusing for beginners, and there is a complex\
    \ set of rules governing the resolution order of methods. You can learn more about\
    \ Method Resolution Ordering (MRO) and how multiple base classes interact in the\
    \ [Python documentation](https://docs.python.org/3/).\n\nDo not reach for multiple\
    \ inheritance often. When a single class inherits two separate sets of invariants\
    \ from its base classes, it creates extra cognitive burden for your readers. They\
    \ not only have to keep two sets of invariants in their head but also the potential\
    \ interactions between those invariants. Furthermore, the complex rules surrounding\
    \ MRO make it incredibly easy to make mistakes if you don’t fully understand Python’s\
    \ behavior. For the cases where you absolutely must use multiple inheritance,\
    \ document it well with comments to explain why you need it and how you’re using\
    \ it.\n\nHowever, there is one case that I am fond of for multiple inheritance:\
    \ mixins. Mixins are classes that you can inherit generic functionality from.\
    \ These base classes typically do not contain any invariants or data; they are\
    \ just a set of methods that are not intended to be overridden.\n\nFor example,\
    \ in the Python standard library, there are abstractions for creating a TCP socket\
    \ server:\n\n```python\nfrom socketserver import TCPServer\nclass Server(TCPServer):\n\
    \    # ... snip ...\n```\n\nYou can customize this server to use multiple threads\
    \ by also inheriting socket server.ThreadingMixIn:\n\n```python\nfrom socketserver\
    \ import TCPServer, ThreadingMixIn\nclass Server(TCPServer, ThreadingMixIn):\n\
    \    # ... snip ...\n```\n\nThis mixin does not bring in any invariants, and none\
    \ of its methods need to be called or overridden from the derived class. Just\
    \ the mere act of inheriting the mixin provides everything you need. This simplification\
    \ makes it much easier for maintainers to reason about your class.\n\n## Substitutability\n\
    \nAs described earlier, inheritance is all about modeling an *is-a* relationship.\
    \ Describing something with an *is-a* relationship may sound simple, but you'd\
    \ be surprised just how wrong things can go. To model *is-a* relationships properly,\
    \ you need to understand substitutability.\n\n*Substitutability* states that when\
    \ you derive from a base class, you should be able to use that derived class in\
    \ every instance that you use a base class.\n\nIf I were to create a function\
    \ that could display relevant restaurant data:\n\n```python\ndef display_restaurant(restaurant:\
    \ Restaurant):\n    # ... snip ...\n```\n\nI should be able to pass a Restaurant,\
    \ a FoodTruck, or a PopUpStall, and this function should be none the wiser. Again,\
    \ this sounds simple; what's the catch?\n\nThere is indeed a catch. To show you,\
    \ I'd like to step away from the food concept for a second, and go back to a fundamental\
    \ question that any first grader should be able to answer: is a square a rectangle?\n\
    \nFrom your early days of school, you probably know the answer as \"yes, a square\
    \ is a rectangle.\" A rectangle is a polygon that has four sides, and each intersection\
    \ of two sides is a 90-degree angle. A square is the same, with the extra requirement\
    \ that each side must be the exact same length.\n\nIf I were to model this with\
    \ inheritance, I might do so as follows:\n\n```python\nclass Rectangle:\n    def\
    \ __init__(self, height: int, width: int):\n        self._height = height\n  \
    \      self._width = width\n\n    def set_width(self, new_width):\n        self._width\
    \ = new_width\n\n    def set_height(self, new_height):\n        self._height =\
    \ new_height\n\n    def get_width(self) -> int:\n        return self._width\n\n\
    \    def get_height(self) -> int:\n        return self._height\n\nclass Square(Rectangle):\n\
    \    def __init__(self, length: int):\n        super().__init__(length, length)\n\
    \n    def set_side_length(self, new_length):\n        super().set_width(new_length)\n\
    \        super().set_height(new_length)\n\n    def set_width(self, new_width):\n\
    \        self.set_side_length(new_width)\n\n    def set_height(self, new_height):\n\
    \        self.set_side_length(new_height)\n```\n\nSo yes, from a geometry perspective\
    \ a square is indeed a rectangle. But this assumption when mapped to *is-a* relationships\
    \ is flawed. Take a few moments and see if you can catch where my assumptions\
    \ break down.\n\nStill don't see it? Here's a hint: what if I asked you if a Square\
    \ is *substitutable* for a Rectangle for every use case? Can you construct a use\
    \ case for a rectangle that a square would not be substitutable for?\n\nSuppose\
    \ the user of the app selects squares and rectangles on a map of restaurants to\
    \ gauge market size. A user can draw a shape on the map, and then expand it as\
    \ needed. One of the functions to handle this is as follows:\n\n```python\ndef\
    \ double_width(rectangle: Rectangle):\n    old_height = rectangle.get_height()\n\
    \    rectangle.set_width(rectangle.get_width() * 2)\n    # check that the height\
    \ is unchanged\n    assert rectangle.get_height() == old_height\n```\n\nWith this\
    \ code, what would happen if I were to pass a Square as the argument? All of a\
    \ sudden, a previously passing assertion would start to fail, since the height\
    \ of a square changes when the length changes. This is catastrophic; the whole\
    \ intention of inheritance is to extend functionality without breaking existing\
    \ code. In this case, by passing in a Square (since it's also a Rectangle, the\
    \ type checker won't complain), I have introduced a bug just waiting to happen.\n\
    \nThis sort of mistake impacts the derived class as well. The error above stems\
    \ from overriding set_width in Square so that the height is changed as well. What\
    \ if set_width were not overridden and the Rectangle's set_width function were\
    \ invoked? Well, if this were the case, and you passed a Square into the function,\
    \ the assertion would not fail. Instead, something far less obvious but much more\
    \ detrimental happens: the function succeeds. No longer do you receive an AssertionError\
    \ with a stack trace that leads you to the bug. Now, you create a square that\
    \ is no longer a square; the width is changed, but the height has not. You have\
    \ committed a cardinal sin and have broken the invariants of that class.\n\nWhat\
    \ makes this so sinister is that the goal of inheritance is to decouple, or remove\
    \ dependencies from, existing code and new code. Implementers and consumers of\
    \ the base class have no view into different derived classes at runtime. It might\
    \ be that the derived class definitions live in a completely different codebase,\
    \ owned by a different organization. With this error case, you make it so that\
    \ every time a derived class changes, you need to look at every invocation and\
    \ use of the base class and assess whether or not your changes will break code.\n\
    \nIn order to solve this, you have a few options available to you. First, you\
    \ can not inherit Square from Rectangle in the first place and avoid the whole\
    \ problem. Second, you can restrict the methods of Rectangle so that the Square\
    \ does not contradict it (such as making the fields immutable). Last, you can\
    \ abolish the class hierarchy altogether and provide an is_square method in the\
    \ Rectangle.\n\nThese sorts of errors can break your codebase in subtle ways.\
    \ Consider the use case where I want to franchise my restaurants; franchisees\
    \ are allowed to create their own menu, but must always have a common set of dishes.\n\
    \nHere's a potential implementation:\n\n```python\nclass RestrictedMenuRestaurant(Restaurant):\n\
    \n    def __init__(self,\n               name: str,\n               location:\
    \ geo.Coordinates,\n               employees: list[ops.Employee],\n          \
    \     inventory: list[ops.Ingredient],\n               menu: ops.Menu,\n     \
    \          finances: ops.Finances):\n        super().__init__(name, location,\
    \ employees, inventory, menu, finances)\n        self.__gps = initialize_gps()\n\
    \n    def move_location(self, new_location: geo.Coordinates):\n        # schedule\
    \ a task to drive us to our new location\n        schedule_auto_driving_task(new_location)\n\
    \        super().move_location(new_location)\n\n    def get_current_location(self)\
    \ -> geo.Coordinates:\n        return self.__gps.get_coordinates()\n```\n\nI am\
    \ using a special function, super(), to access the base class. When I call super().__init__(),\
    \ I am actually calling Restaurant’s constructor. When I call super().move_location,\
    \ I am calling Restaurant’s move_location, not FoodTruck’s move_location. This\
    \ way, the code can behave exactly like the base class.\n\nTake a moment and reflect\
    \ on the implications of extending code through subclassing. You can insert new\
    \ behaviors into existing code without ever modifying that existing code. If you\
    \ avoid modifying existing code, you drastically reduce the chance of introducing\
    \ new bugs; you won’t inadvertently break consumers’ assumptions if you aren’t\
    \ changing the code they depend on. A well-designed inheritance structure can\
    \ greatly improve maintainability. Unfortunately, the inverse is true as well;\
    \ design your inheritance poorly, and maintainability suffers. When working with\
    \ inheritance, you always need to be thinking about how easy it is to substitute\
    \ your code."
  mdcn: "## 多重继承\n\n在 Python 中，可以从多个类进行继承：\n\n```python\nclass FoodTruck(Restaurant,\
    \ Vehicle):\n    # ... snip ...\n```\n\n在这种情况下，你会继承两个基类的所有方法和属性。当你调用 `super()`\
    \ 时，现在必须明确决定初始化哪个类。这对初学者来说可能会变得非常困惑，并且有一套复杂的规则来管理方法的解析顺序。你可以在 [Python 文档](https://docs.python.org/3/)\
    \ 中了解更多关于方法解析顺序（MRO）以及多个基类如何交互的信息。\n\n不要经常使用多重继承。当一个类从其基类继承两组独立的不变量时，它会给你的读者带来额外的认知负担。他们不仅必须在脑海中记住两组不变量，还要记住这些不变量之间潜在的交互。此外，围绕\
    \ MRO 的复杂规则使得如果你不完全理解 Python 的行为，就极其容易犯错。对于那些绝对必须使用多重继承的情况，请用注释详细记录，解释为什么需要它以及如何使用它。\n\
    \n然而，有一个我比较喜欢的多重继承用例：混入类（mixins）。混入类是你可从中继承通用功能的类。这些基类通常不包含任何不变量或数据；它们只是一组不打算被重写的方法。\n\
    \n例如，在 Python 标准库中，有用于创建 TCP 套接字服务器的抽象：\n\n```python\nfrom socketserver import\
    \ TCPServer\nclass Server(TCPServer):\n    # ... snip ...\n```\n\n你可以通过同时继承 `socketserver.ThreadingMixIn`\
    \ 来自定义此服务器以使用多线程：\n\n```python\nfrom socketserver import TCPServer, ThreadingMixIn\n\
    class Server(TCPServer, ThreadingMixIn):\n    # ... snip ...\n```\n\n这个混入类没有引入任何不变量，它的任何方法都不需要从派生类中调用或重写。仅仅是继承这个混入类的行为就提供了你所需的一切。这种简化使得维护者更容易理解你的类。\n\
    \n## 可替换性\n\n如前所述，继承是关于建模 *is-a*（是一种）关系。用 *is-a* 关系描述事物听起来可能很简单，但你会惊讶于事情可能错得有多离谱。要正确建模\
    \ *is-a* 关系，你需要理解可替换性。\n\n*可替换性* 指出，当你从一个基类派生时，你应该能够在使用该基类的每个实例中使用该派生类。\n\n如果我要创建一个可以显示相关餐厅数据的函数：\n\
    \n```python\ndef display_restaurant(restaurant: Restaurant):\n    # ... snip ...\n\
    ```\n\n我应该能够传递一个 `Restaurant`、一个 `FoodTruck` 或一个 `PopUpStall`，而这个函数应该毫无察觉。再次强调，这听起来很简单；问题出在哪里呢？\n\
    \n确实有问题。为了向你展示，我想暂时离开食物的概念，回到一个任何一年级学生都应该能回答的基本问题：正方形是矩形吗？\n\n从你上学的早期，你可能知道答案是“是的，正方形是矩形。”矩形是一个有四条边的多边形，每两条边的交点都是一个\
    \ 90 度角。正方形也是如此，只是额外要求每条边的长度必须完全相同。\n\n如果我用继承来建模这个，我可能会这样做：\n\n```python\nclass\
    \ Rectangle:\n    def __init__(self, height: int, width: int):\n        self._height\
    \ = height\n        self._width = width\n\n    def set_width(self, new_width):\n\
    \        self._width = new_width\n\n    def set_height(self, new_height):\n  \
    \      self._height = new_height\n\n    def get_width(self) -> int:\n        return\
    \ self._width\n\n    def get_height(self) -> int:\n        return self._height\n\
    \nclass Square(Rectangle):\n    def __init__(self, length: int):\n        super().__init__(length,\
    \ length)\n\n    def set_side_length(self, new_length):\n        super().set_width(new_length)\n\
    \        super().set_height(new_length)\n\n    def set_width(self, new_width):\n\
    \        self.set_side_length(new_width)\n\n    def set_height(self, new_height):\n\
    \        self.set_side_length(new_height)\n```\n\n所以，是的，从几何学的角度来看，正方形确实是一个矩形。但当这个假设映射到\
    \ *is-a* 关系时，它是有缺陷的。花点时间看看你是否能发现我的假设在哪里失效了。\n\n还是没看出来？这里有个提示：如果我问你，在每种用例中，正方形是否可以\
    \ *替换* 矩形？你能构造一个矩形的用例，而正方形无法替换它吗？\n\n假设应用程序的用户在餐厅地图上选择正方形和矩形来评估市场规模。用户可以在地图上绘制一个形状，然后根据需要扩展它。处理此操作的函数之一如下：\n\
    \n```python\ndef double_width(rectangle: Rectangle):\n    old_height = rectangle.get_height()\n\
    \    rectangle.set_width(rectangle.get_width() * 2)\n    # check that the height\
    \ is unchanged\n    assert rectangle.get_height() == old_height\n```\n\n使用这段代码，如果我传递一个\
    \ `Square` 作为参数会发生什么？突然之间，一个之前通过的断言会开始失败，因为正方形的高度在长度改变时也会改变。这是灾难性的；继承的全部意义在于扩展功能而不破坏现有代码。在这种情况下，通过传入一个\
    \ `Square`（因为它也是一个 `Rectangle`，类型检查器不会报错），我引入了一个等待发生的 bug。\n\n这种错误也会影响派生类。上面的错误源于在\
    \ `Square` 中重写了 `set_width`，导致高度也随之改变。如果 `set_width` 没有被重写，而是调用了 `Rectangle` 的\
    \ `set_width` 函数呢？嗯，如果是这种情况，并且你将一个 `Square` 传入函数，断言不会失败。相反，会发生一些不那么明显但更有害的事情：函数成功了。你不再收到带有指向\
    \ bug 的堆栈跟踪的 `AssertionError`。现在，你创建了一个不再是正方形的正方形；宽度改变了，但高度没有。你犯了一个严重的错误，破坏了该类的不变量。\n\
    \n这之所以如此阴险，是因为继承的目标是将现有代码与新代码解耦，或移除它们之间的依赖关系。基类的实现者和消费者在运行时无法查看不同的派生类。派生类的定义可能位于完全不同的代码库中，由不同的组织拥有。在这种错误情况下，你会使得每次派生类更改时，都需要查看基类的每次调用和使用，并评估你的更改是否会破坏代码。\n\
    \n为了解决这个问题，你有几个选择。首先，你可以根本不从 `Rectangle` 继承 `Square`，从而避免整个问题。其次，你可以限制 `Rectangle`\
    \ 的方法，使 `Square` 不与之矛盾（例如使字段不可变）。最后，你可以完全废除类层次结构，并在 `Rectangle` 中提供一个 `is_square`\
    \ 方法。\n\n这类错误会以微妙的方式破坏你的代码库。考虑我想将我的餐厅特许经营的用例；加盟商可以创建自己的菜单，但必须始终有一套共同的菜品。\n\n这是一个潜在的实现：\n\
    \n```python\nclass RestrictedMenuRestaurant(Restaurant):\n\n    def __init__(self,\n\
    \               name: str,\n               location: geo.Coordinates,\n      \
    \         employees: list[ops.Employee],\n               inventory: list[ops.Ingredient],\n\
    \               menu: ops.Menu,\n               finances: ops.Finances):\n   \
    \     super().__init__(name, location, employees, inventory, menu, finances)\n\
    \        self.__gps = initialize_gps()\n\n    def move_location(self, new_location:\
    \ geo.Coordinates):\n        # schedule a task to drive us to our new location\n\
    \        schedule_auto_driving_task(new_location)\n        super().move_location(new_location)\n\
    \n    def get_current_location(self) -> geo.Coordinates:\n        return self.__gps.get_coordinates()\n\
    ```\n\n我正在使用一个特殊的函数 `super()` 来访问基类。当我调用 `super().__init__()` 时，我实际上是在调用 `Restaurant`\
    \ 的构造函数。当我调用 `super().move_location` 时，我是在调用 `Restaurant` 的 `move_location`，而不是\
    \ `FoodTruck` 的 `move_location`。这样，代码的行为就可以完全像基类一样。\n\n花点时间反思一下通过子类化扩展代码的含义。你可以在不修改现有代码的情况下，将新行为插入到现有代码中。如果你避免修改现有代码，你就能大大降低引入新\
    \ bug 的机会；如果你不改变消费者依赖的代码，你就不会无意中破坏他们的假设。一个设计良好的继承结构可以大大提高可维护性。不幸的是，反之亦然；继承设计得不好，可维护性就会受损。在使用继承时，你始终需要思考你的代码有多容易被替换。"
