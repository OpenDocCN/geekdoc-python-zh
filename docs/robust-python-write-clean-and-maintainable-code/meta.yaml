  - "[PAGE 228]\n\nTo catch the remaining set of errors, I can use custom validators\
    \ to embed those last pieces of validation logic:\n\n```\nfrom pydantic import\
    \ validator\n@dataclass\nclass Restaurant:\n    name: constr(regex=r'^[a-zA-Z0-9\
    \ ]*$',\n                 min_length=1, max_length=16)\n    owner: constr(min_length=1)\n\
    \    address: constr(min_length=1)\n    employees: conlist(Employee, min_items=2)\n\
    \    dishes: conlist(Dish, min_items=3)\n    number_of_seats: PositiveInt\n  \
    \  to_go: bool\n    delivery: bool\n\n    @validator('employees')\n    def check_chef_and_server(cls,\
    \ employees):\n        if (any(e for e in employees if e.position == 'Chef') and\n\
    \            any(e for e in employees if e.position == 'Server')):\n         \
    \   return employees\n        raise ValueError('Must have at least one chef and\
    \ one server')\n```\n\nIf I then fail to provide at least one chef and server:\n\
    \n```\npydantic.error_wrappers.ValidationError: 1 validation error for Restaurant\n\
    employees\n  Must have at least one chef and one server (type=value_error)\n```\n\
    \nI will leave it up to you to write custom validators for other error cases (such\
    \ as valid addresses, valid routing numbers, or a valid image that exists on a\
    \ filesystem).\n\n# Validation Versus Parsing\n\nAdmittedly, pydantic is not strictly\
    \ a validation library, but also a *parsing* library. The difference is slight,\
    \ but needs to be called out. In all my examples, I have been using pydantic to\
    \ check arguments and types, but it is not a strict validator. Pydantic advertises\
    \ itself as a *parsing library*, which means it is providing a guarantee of what\
    \ comes *out* of the data model, not what goes in. That is, when you are defining\
    \ pydantic models, pydantic will do whatever it can to coerce data into the types\
    \ you defined.\n\nIf you were to have a model:\n\n```\nfrom pydantic import dataclass\n\
    @dataclass\nclass Model:\n    value: int\n```\n\nThere is no problem passing in\
    \ a string or a float into this model; pydantic will do its best to coerce the\
    \ value to an integer (or throw an exception if the value is not coercible). This\
    \ code throws no exceptions:"
  - "[PAGE 229]\n\n```\nModel(value=\"123\") # value is set to the integer 123\nModel(value=5.5)\
    \ # this truncates the value to 5\n```\n\nPydantic is parsing these values, not\
    \ validating them. You are not guaranteed to pass an integer into the model, but\
    \ you are always guaranteed an int comes out on the other side (or an exception\
    \ is thrown).\n\nIf you'd like to restrict this sort of behavior, you can use\
    \ pydantic's strict fields:\n\n```\nfrom pydantic.dataclasses import dataclass\n\
    from pydantic import StrictInt\n@dataclass\nclass Model:\n    value: StrictInt\n\
    ```\n\nNow, when constructing from another type,\n\n```\nx = Model(value=\"0023\"\
    ).value\n```\n\nyou will get an error:\n\n```\npydantic.error_wrappers.ValidationError:\
    \ 1 validation error for Model\nvalue\n  value is not a valid integer (type=type_error.integer)\n\
    ```\n\nSo, while pydantic advertises itself as a parsing library, it is possible\
    \ to enforce more strict behavior in your data models.\n\n# Closing Thoughts\n\
    \nI've been harping on the importance of typecheckers throughout this book, but\
    \ that doesn't mean catching errors at runtime is meaningless. While typecheckers\
    \ catch their fair share of errors and reduce runtime checks, they can't catch\
    \ everything. You still need validation logic to fill in the gaps.\n\nFor these\
    \ sorts of checks, the pydantic library is a great tool in your toolbox. By embedding\
    \ your validation logic directly into your types (without writing tons of tedious\
    \ if statements), you improve robustness twofold. First, you dramatically increase\
    \ readability; developers reading your type definition will know exactly what\
    \ constraints are imposed upon it. Second, it gives you that much-needed layer\
    \ of protection with runtime checking.\n\nI find that pydantic also helps fill\
    \ in the middle ground between a data class and a class. Each constraint is technically\
    \ fulfilling invariants about that class. I normally advise not to give your data\
    \ classes an invariant because you can't protect it; you don't control construction\
    \ and property access is public. However, pydantic protects the invariant even\
    \ when you call a constructor or set a field. But, if you have fields that are\
    \ interdependent (such as needing to set both at the same time or needing to set\
    \ only one field based on the value of another), stick with a class."
- md: "## PART III\n\n## Extensible Python\n\nRobust code is maintainable code. In\
    \ order to be maintainable, code must be easy to read, easy to check for errors,\
    \ and easy to change. Parts I and II of this book focused on readability and error\
    \ detection, but not necessarily how to extend or modify existing code. Type annotations\
    \ and typecheckers provide confidence to maintainers when interacting with individual\
    \ types, but what about larger changes in a codebase, such as introducing new\
    \ workflows or switching out a key component?\n\nPart III examines larger changes\
    \ and shows you how to enable future developers to make them. You'll learn about\
    \ extensibility and composability, both core principles that improve robustness.\
    \ You'll learn how to manage dependencies, to make sure that simple changes don't\
    \ create a ripple effect of bugs and errors. You'll then apply these concepts\
    \ to architectural models, such as plug-in-based systems, reactive programming,\
    \ and task-oriented programs.\n\n## CHAPTER 15\nExtensibility\n\nThis chapter\
    \ focuses on extensibility. Extensibility underpins this part of the book; it’s\
    \ important to understand this key concept. Once you know how extensibility affects\
    \ robustness, you’ll start seeing opportunities to apply it throughout your codebase.\
    \ Extensible systems allow other developers to enhance your codebase with confidence,\
    \ reducing the chance of errors. Let’s examine how.\n\n## What Is Extensibility?\n\
    \n*Extensibility* is the property of systems that allows new functionality to\
    \ be added without modifying existing parts of your system. Software is not static;\
    \ it will change. Throughout your codebase’s lifetime, developers will change\
    \ your software. The *soft* part of *software* indicates as much. These changes\
    \ can be quite large. Think about the times you need to swap out a key piece of\
    \ your architecture as you scale, or add in new workflows. These changes touch\
    \ multiple parts of your codebase; simple type-checking won’t catch all errors\
    \ at this level. After all, you may be redesigning your types completely. The\
    \ goal of extensible software is to be designed in such a way that you have provided\
    \ easy extension points for future developers, especially in areas of code that\
    \ are changed often.\n\nTo illustrate this idea, let’s consider a restaurant chain\
    \ that wants to implement some sort of notification system to help suppliers respond\
    \ to demand. A restaurant may have a special, or be out of a certain ingredient,\
    \ or indicate that some ingredient has gone bad. In each case, the restaurant\
    \ wants the supplier to automatically be notified that a restock is needed. The\
    \ supplier has provided a Python library to do the actual notifications.\n\nThe\
    \ implementation looks like the following:\n\n```python\ndef declare_special(dish:\
    \ Dish, start_date: datetime.datetime,\n                   end_time: datetime.datetime):\n\
    \    # ... snip setup in local system ...\n    # ... snip send notification to\
    \ the supplier ...\n\ndef order_dish(dish: Dish):\n    # ... snip automated preparation\n\
    \    out_of_stock_ingredients = {ingred for ingred in dish\n                 \
    \               if out_of_stock(ingred)}\n    if out_of_stock_ingredients:\n \
    \       # ... snip taking dishes off menu ...\n        # ... snip send notification\
    \ to the supplier ...\n\n# called every 24 hours\ndef check_for_expired_ingredients():\n\
    \    expired_ingredients = {ing for ing in get_items_in_stock()}\n    if expired_ingredients:\n\
    \        # ... snip taking dishes off menu ...\n        # ... snip send notifications\
    \ to the supplier ...\n```\n\nThis code is pretty straightforward at first glance.\
    \ Whenever an event of note occurs, the appropriate notification can be sent to\
    \ the supplier (imagine some dictionary being sent as part of a JSON request).\n\
    \nFast forward a few months, and a new work item comes in. Your boss at the restaurant\
    \ is so pleased with the notification system that they want to expand it. They\
    \ want notifications to come to their email address. Sounds simple enough, right?\
    \ You make the `declare_special` function take an email address as well:\n\n```python\n\
    def declare_special(notification: NotificationType,\n                   start_date:\
    \ datetime.datetime,\n                   end_time: datetime.datetime,\n      \
    \             email: Email):\n    # ... snip ...\n```\n\nThis has far-reaching\
    \ implications, though. A function calling `declare_special` will also need knowledge\
    \ of what email to pass down. Thankfully, typecheckers will catch any omission.\
    \ But what if other use cases start rolling in? You take a look at your backlog\
    \ and the following tasks are present:\n\n- Notify sales team about specials and\
    \ items out of stock.\n- Notify the restaurant's customers of new specials.\n\
    - Support different APIs for different suppliers.\n- Support text message notifications\
    \ so your boss can get notifications, too.\n- Create a new notification type:\
    \ New Menu Item. Marketers and the boss want to know about this, but not the supplier.\n\
    \nAs developers implement these features, `declare_special` gets bigger and bigger.\
    \ It handles more and more cases, and as the logic gets more complex, the potential\
    \ for making a mistake grows. What's worse, any changes to the API (such as adding\
    \ a list of email addresses or phone numbers for texting) will have repercussions\
    \ for all the callers. At some point, doing simple things like adding a new email\
