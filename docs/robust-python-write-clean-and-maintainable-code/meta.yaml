    \ bug. And herein lies your problem: counting on manual intervention to catch\
    \ error cases is unreliable.\n\n> ## Exceptions\n\nA valiant attempt at solving\
    \ the billion-dollar problem is exceptions. Anytime something goes wrong in your\
    \ system, throw an exception! When an exception is thrown, that function stops\
    \ executing and the exception gets passed up the call chain, until either a) some\
    \ code catches it in an appropriate except block, or b) nobody catches it and\
