  - "[PAGE 272]\n\n```\npython\ndef log_time_per_dish(dish: Dish, number_of_seconds:\
    \ int):\n    dish_db[dish].time_spent.append(number_of_seconds)\n```\n\nWhenever\
    \ you work with a database (or any other I/O request), you always need to be prepared\
    \ for errors. The database may be down, the network might be out, there might\
    \ be a conflict with the data you are entering, or any other error might pop up.\
    \ You can't always rely on this code executing without errors. The business doesn't\
    \ want the code to give up on the first error; these operations should retry a\
    \ set number of times or for a certain time period before giving up.\n\nI can\
    \ use the backoff.on_exception to specify that these functions should be retried\
    \ if they throw an exception:\n\n```\npython\nimport backoff\nimport requests\n\
    from autokitchen.database import OperationException\n# setting properties of self.*_db\
    \ objects will\n# update data in the database\n@backoff.on_exception(backoff.expo,\n\
    \                     OperationException,\n                     max_tries=5)\n\
    def on_dish_ordered(dish: Dish):\n    self.dish_db[dish].count += 1\n\n@backoff.on_exception(backoff.expo,\n\
    \                     OperationException,\n                     max_tries=5)\n\
    @backoff.on_exception(backoff.expo,\n                     requests.exceptions.HTTPError,\n\
    \                     max_time=60)\ndef save_inventory_counts(inventory):\n  \
    \  for ingredient in inventory:\n        self.inventory_db[ingredient.name] =\
    \ ingredient.count\n\n@backoff.on_exception(backoff.expo,\n                  \
    \   OperationException,\n                     max_time=60)\ndef log_time_per_dish(dish:\
    \ Dish, number_of_seconds: int):\n    self.dish_db[dish].time_spent.append(number_of_seconds)\n\
    ```\n\nThrough the use of decorators, I am able to modify behavior without messing\
    \ with the function body. Each function will now back off exponentially (take\
    \ longer between each retry) when specific exceptions are raised. Each function\
    \ also has its own conditions for how much time to take or how many times to retry\
    \ before giving up completely. I've defined the policy in this code, but left\
    \ the actual *how* to do it, the mechanisms, abstracted away in the backoff library."
  - "[PAGE 273]\n\nTake special note of the save_inventory_counts function:\n\n```\n\
    @backoff.on_exception(backoff.expo,\n                    OperationException,\n\
    \                    max_tries=5)\n@backoff.on_exception(backoff.expo,\n     \
    \               requests.exceptions.HTTPError,\n                    max_time=60)\n\
    def save_inventory_counts(inventory):\n    # ...\n```\n\nI have two decorators\
    \ defined here. In this case, I’ll retry up to five times on an OperationException\
    \ or up to 60 seconds for a requests.exceptions.HTTPError. This is composability\
    \ at work; I can mix’n’match completely separate backoff decorators to define\
    \ the policies however I want.\n\nContrast this with writing the mechanisms directly\
    \ into the function:\n\n```\ndef save_inventory_counts(inventory):\n    retry\
    \ = True\n    retry_counter = 0\n    time_to_sleep = 1\n    while retry:\n   \
    \     try:\n            for ingredient in inventory:\n                self.inventory_db[ingredient.name]\
    \ = ingredient.count\n        except OperationException:\n            retry_counter\
    \ += 1\n            if retry_counter == 5:\n                retry = False\n  \
    \      except requests.exception.HTTPError:\n            time.sleep(time_to_sleep)\n\
    \            time_to_sleep *= 2\n            if time_to_sleep > 60:\n        \
    \        retry = False\n```\n\nThe amount of code needed to handle retry mechanisms\
    \ ends up obscuring the actual intent of the function. It is difficult to ascertain\
    \ what this function is doing at a quick glance. Furthermore, you would need to\
    \ write similar retry logic into every function that needs to handle nondeterministic\
    \ operations. It is far easier to compose decorators to define your business needs,\
    \ and avoid tedious repetition throughout your code.\n\nbackoff is not the only\
    \ useful decorator out there. There is a bevy of composable decorators that you\
    \ can use to simplify your code, such as functools.lru_cache for saving function\
    \ results, click.command from the click library for command-line applications,\
    \ or timeout_decorator.timeout from the timeout_decorator library for limiting\
    \ execution time of functions. Don’t be afraid to write your own decorators either.\
    \ Find areas of your code that have similar program structure, and look for ways\
    \ to abstract the mechanisms away from the policies."
