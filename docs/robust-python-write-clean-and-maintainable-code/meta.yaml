  md: "![](img/d64d2be45ca85b398807d181202e7046_322_0.png)\n\n# Discussion Topic\n\
    \nMeasure the costs of tests in your system. Does time to write, time to run,\
    \ or time spent maintaining dominate your costs? What can you do to reduce those\
    \ costs?\n\n# Reducing Test Cost\n\nWhen you examine the value against the cost\
    \ of a test, you are gathering information that will help you prioritize your\
    \ testing strategy. Some tests may not be worth running, and some will stand out\
    \ as the first tests you want to write to maximize value. However, sometimes you\
    \ run into the case where there is a really important test that you want to write,\
    \ but it is incredibly costly to write and/or maintain. In these cases, find a\
    \ way to reduce the costs of that test. The way you write and organize your tests\
    \ is paramount to making a test cheaper to write and understand.\n\n> ## Using\
    \ pytest\n\nFor the examples in this chapter, I will use the popular testing library\
    \ `pytest`. There are fantastic resources for learning pytest, such as *Python\
    \ Testing with pytest: Simple, Rapid, Effective, and Scalable* by Brian Okken\
    \ (Pragmatic Bookshelf). Here, I'll cover the basics to give you context for this\
    \ chapter.\n\nA test in `pytest` is any function that is prefixed with `test_`\
    \ in a file that is also prefixed by `test_`. Here's a file named `test_calorie_count.py`\
    \ with a single test:\n\npython\nfrom nutrition import get_calorie_count\n\ndef\
    \ test_get_calorie_count():\n    assert get_calorie_count(\"Bacon Cheeseburger\
    \ w/ Fries\") == 1200\n\n\nTests contain assertions, or things that should be\
    \ true. pytest uses the built-in `assert` statement for assertions. If a test's\
    \ assertion is false, an `AssertionError` is raised and the test fails. If the\
    \ assertion is true, the test continues executing.\n\nIf you are hesitant to introduce\
    \ a dependency on a library, there is a built-in unit testing framework with the\
    \ `unittest` module in Python. I prefer pytest because of some advanced features\
    \ (fixtures, plug-ins, etc.), but all of the principles in this chapter apply\
    \ to other testing frameworks as well.\n\n# AAA Testing\n\nAs with production\
    \ code, focus on readability and maintainability in your test code. Communicate\
    \ your intent as clearly as possible. Future test readers will thank you if they\
    \ can see exactly what you are trying to test. When writing a test, it helps for\
    \ each test to follow the same basic pattern."
