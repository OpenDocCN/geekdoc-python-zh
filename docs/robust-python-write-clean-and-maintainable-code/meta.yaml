- md: "## As Easy as ABC\n\nAbstract base classes (ABCs) in the `collections.abc`\
    \ module provide another grouping of classes that you can override to create your\
    \ own collections. ABCs are classes intended to be subclassed, and require the\
    \ subclass to implement very specific functions. For the `collections.abc`, these\
    \ ABCs are all centered on custom collections. In order to create a custom collection,\
    \ you must override specific functions, depending on the type you want to emulate.\
    \ Once you implement these required functions, though, the ABC fills in other\
    \ functions automatically. You can find a full list of required functions to implement\
    \ at the `collections.abc`'s [module documentation](module_documentation).\n\n\
    In contrast to the `User*` classes, there is no built-in storage, such as `self.data`,\
    \ inside the `collections.abc` classes. You must provide your own storage.\n\n\
    Let's look at a `collections.abc.Set`, since there is no `UserSet` elsewhere in\
    \ `collections`. I want to create a custom set that automatically handles aliases\
    \ of ingredients (such as rocket and arugula). In order to create this custom\
    \ set, I need to implement three methods, as required by `collections.abc.Set`:\n\
    \n- `__contains__`: This is for membership checks: `\"arugula\" in ingredients`.\n\
    - `__iter__`: This is for iterating: `for ingredient in ingredients`.\n- `__len__`:\
    \ This is for checking the length: `len(ingredients)`.\n\nOnce these three methods\
    \ are defined, methods like relational operations, equality operations, and set\
    \ operations (union, intersection, difference, disjoint) will just work. That's\
    \ the beauty of `collections.abc`. Once you define a select few methods, the rest\
    \ come for free. Here it is in action:\n\n```python\nimport collections\n\nclass\
    \ AliasedIngredients(collections.abc.Set):\n    def __init__(self, ingredients:\
    \ set[str]):\n        self.ingredients = ingredients\n\n    def __contains__(self,\
    \ value: str):\n        return value in self.ingredients or any(alias in self.ingredients\n\
    \                                               for alias in get_aliases(value))\n\
    \n    def __iter__(self):\n        return iter(self.ingredients)\n\n    def __len__(self):\n\
    \        return len(self.ingredients)\n\n>>> ingredients = AliasedIngredients({'arugula',\
    \ 'eggplant', 'pepper'})\n>>> for ingredient in ingredients:\n...     print(ingredient)\n\
    'arugula'\n'eggplant'\n'pepper'\n\n>>> print(len(ingredients))\n3\n\n>>> print('arugula'\
    \ in ingredients)\nTrue\n\n>>> print('rocket' in ingredients)\nTrue\n\n>>> list(ingredients\
    \ | AliasedIngredients({'garlic'}))\n['pepper', 'arugula', 'eggplant', 'garlic']\n\
    ```\n\nThat's not the only cool thing about `collections.abc`, though. Using it\
    \ in type annotations can help you write more generic code. Take this code from\
    \ all the way back in Chapter 2:\n\n```python\ndef print_items(items):\n    for\
    \ item in items:\n        print(item)\n\nprint_items([1,2,3])\nprint_items({4,\
    \ 5, 6})\nprint_items({\"A\": 1, \"B\": 2, \"C\": 3})\n```\n\nI talked about how\
    \ duck typing can be both a boon and a curse for robust code. It's great that\
    \ I can write a single function that can take so many different types, but communicating\
    \ intent through type annotations becomes challenging. Fortunately, I can use\
    \ the `collections.abc` classes to provide type hints:\n\n```python\ndef print_items(items:\
    \ collections.abc.Iterable):\n    for item in items:\n        print(item)\n```\n\
    \nIn this case, I am indicating that `items` are simply iterable through the `Iterable`\
    \ ABC. As long as the parameter supports an `__iter__` method (and most collections\
    \ do), this code will typecheck.\n\nAs of Python 3.9, there are 25 different ABCs\
    \ for you to use. Check them all out in the [Python documentation](https://docs.python.org/3/library/collections.abc.html).\n\
    \n## Closing Thoughts\n\nYou can't go far without running into collections in\
    \ Python. Lists, dictionaries, and sets are commonplace, and it's imperative that\
    \ you provide hints to the future about what collection types you're working with.\
    \ Consider whether your collections are homogeneous or heterogeneous and what\
    \ that tells future readers. For the cases where you do use heterogeneous collections,\
    \ provide enough information for other developers to reason about them, such as\
    \ a `TypedDict`. Once you learn the techniques to allow other developers to reason\
    \ about your collections, your codebase becomes so much more understandable.\n\
    \nAlways think through your options when creating new collections:\n\n- If you\
    \ are just extending a type, such as adding new methods, you can subclass directly\
    \ from collections such as a list or dictionary. However, beware the rough edges,\
    \ as there is some surprising Python behavior if a user ever overrides a built-in\
    \ method.\n- If you are looking to change out a small part of a list, dictionary\
    \ or string, use `collections.UserList`, `collections.UserDict`, or `collections.UserString`,\
    \ respectively. Remember to reference `self.data` to access the storage of the\
    \ respective type.\n- If you need to write a more complicated class with the interface\
    \ of another collection type, use `collections.abc`. You will need to provide\
    \ your own storage for the data inside the class and implement all required methods,\
    \ but once you do, you can customize that collection to your heart's content."
  mdcn: "## 简单如ABC\n\n`collections.abc` 模块中的抽象基类（ABCs）提供了另一组你可以重写以创建自定义集合的类。ABCs 是旨在被继承的类，并要求子类实现非常特定的函数。对于\
    \ `collections.abc`，这些 ABCs 都围绕自定义集合展开。为了创建自定义集合，你必须重写特定的函数，具体取决于你想要模拟的类型。然而，一旦你实现了这些必需的函数，ABC\
    \ 会自动填充其他函数。你可以在 `collections.abc` 的[模块文档](module_documentation)中找到需要实现的完整函数列表。\n\
    \n与 `User*` 类不同，`collections.abc` 类内部没有内置的存储，例如 `self.data`。你必须提供自己的存储。\n\n让我们看看\
    \ `collections.abc.Set`，因为 `collections` 中没有其他地方的 `UserSet`。我想创建一个自定义集合，它可以自动处理食材的别名（例如\
    \ rocket 和 arugula）。为了创建这个自定义集合，我需要实现三个方法，这是 `collections.abc.Set` 所要求的：\n\n-\
    \ `__contains__`：用于成员检查：`\"arugula\" in ingredients`。\n- `__iter__`：用于迭代：`for\
    \ ingredient in ingredients`。\n- `__len__`：用于检查长度：`len(ingredients)`。\n\n一旦定义了这三个方法，关系运算、相等运算和集合运算（并集、交集、差集、不相交）等方法就会自动生效。这就是\
    \ `collections.abc` 的美妙之处。一旦你定义了少数几个方法，其余的就会免费获得。以下是实际应用：\n\n```python\nimport\
    \ collections\n\nclass AliasedIngredients(collections.abc.Set):\n    def __init__(self,\
    \ ingredients: set[str]):\n        self.ingredients = ingredients\n\n    def __contains__(self,\
    \ value: str):\n        return value in self.ingredients or any(alias in self.ingredients\n\
    \                                               for alias in get_aliases(value))\n\
    \n    def __iter__(self):\n        return iter(self.ingredients)\n\n    def __len__(self):\n\
    \        return len(self.ingredients)\n\n>>> ingredients = AliasedIngredients({'arugula',\
    \ 'eggplant', 'pepper'})\n>>> for ingredient in ingredients:\n...     print(ingredient)\n\
    'arugula'\n'eggplant'\n'pepper'\n\n>>> print(len(ingredients))\n3\n\n>>> print('arugula'\
    \ in ingredients)\nTrue\n\n>>> print('rocket' in ingredients)\nTrue\n\n>>> list(ingredients\
    \ | AliasedIngredients({'garlic'}))\n['pepper', 'arugula', 'eggplant', 'garlic']\n\
    ```\n\n然而，这并不是 `collections.abc` 唯一的酷炫之处。在类型注解中使用它可以帮助你编写更通用的代码。看看这段来自第2章的代码：\n\
    \n```python\ndef print_items(items):\n    for item in items:\n        print(item)\n\
    \nprint_items([1,2,3])\nprint_items({4, 5, 6})\nprint_items({\"A\": 1, \"B\":\
    \ 2, \"C\": 3})\n```\n\n我曾谈到鸭子类型对于健壮代码来说既是福音也是诅咒。我可以编写一个函数来接受如此多的不同类型，这很棒，但通过类型注解来传达意图就变得具有挑战性。幸运的是，我可以使用\
    \ `collections.abc` 类来提供类型提示：\n\n```python\ndef print_items(items: collections.abc.Iterable):\n\
    \    for item in items:\n        print(item)\n```\n\n在这种情况下，我通过 `Iterable` ABC\
    \ 表明 `items` 是可迭代的。只要参数支持 `__iter__` 方法（大多数集合都支持），这段代码就能通过类型检查。\n\n截至 Python 3.9，有\
    \ 25 个不同的 ABCs 供你使用。请在 [Python 文档](https://docs.python.org/3/library/collections.abc.html)中查看它们。\n\
    \n## 结语\n\n在 Python 中，你无法走远而不遇到集合。列表、字典和集合都很常见，你必须为未来提供关于你正在使用哪些集合类型的提示。考虑你的集合是同构的还是异构的，以及这告诉未来的读者什么。对于你确实使用异构集合的情况，提供足够的信息让其他开发者能够理解它们，例如\
    \ `TypedDict`。一旦你学会了让其他开发者理解你的集合的技术，你的代码库就会变得更容易理解。\n\n在创建新集合时，始终考虑你的选择：\n\n-\
    \ 如果你只是扩展一个类型，例如添加新方法，你可以直接从集合（如列表或字典）继承子类。但是，要小心粗糙的边缘，因为如果用户重写了内置方法，Python 会有一些令人惊讶的行为。\n\
    - 如果你想要更改列表、字典或字符串的一小部分，请分别使用 `collections.UserList`、`collections.UserDict` 或\
    \ `collections.UserString`。记住引用 `self.data` 来访问相应类型的存储。\n- 如果你需要编写一个具有另一个集合类型接口的更复杂的类，请使用\
    \ `collections.abc`。你需要为类内部的数据提供自己的存储并实现所有必需的方法，但一旦你这样做了，你就可以随心所欲地自定义该集合。"
