  md: "# Homogeneous Versus Heterogeneous Collections\n\nHomogeneous collections are\
    \ collections in which every value has the same type. In contrast, values in heterogeneous\
    \ collections may have different types within them. From a usability standpoint,\
    \ your lists, sets, and dictionaries should nearly always be homogeneous. Users\
    \ need a way to reason about your collections, and they can't if they don't have\
    \ the guarantee that every value is the same type. If you make a list, set, or\
    \ dictionary a heterogeneous collection, you are indicating to the user that they\
    \ need to take care to handle special cases. Suppose I want to resurrect an example\
    \ from Chapter 1 for adjusting recipes for my cookbook app:\n\n```\ndef adjust_recipe(recipe,\
    \ servings):\n    \"\"\"\n    Take a meal recipe and change the number of servings\n\
    \    :param recipe: A list, where the first element is the number of servings,\n\
    \                   and the remainder of elements follow the (name, amount, unit)\n\
    \                   format, such as (\"flour\", 1.5, \"cup\")\n    :param servings:\
    \ the number of servings\n    :return list: a new list of ingredients, where the\
    \ first element is the\n                  number of servings\n    \"\"\"\n   \
    \ new_recipe = [servings]\n    old_servings = recipe[0]\n    factor = servings\
    \ / old_servings\n    recipe.pop(0)\n    while recipe:\n        ingredient, amount,\
    \ unit = recipe.pop(0)\n        # please only use numbers that will be easily\
    \ measurable\n        new_recipe.append((ingredient, amount * factor, unit))\n\
    \    return new_recipe\n```\n\nAt the time, I mentioned how parts of this code\
    \ were ugly; one confounding factor was the fact that the first element of the\
    \ recipe list was a special case: an integer representing the servings. This contrasts\
    \ with the rest of the list elements, which are tuples representing actual ingredients,\
    \ such as (\"flour\", 1.5, \"cup\"). This highlights the troubles of a heterogeneous\
    \ collection. For every use of your collection, the user needs to remember to\
    \ handle the special case. This is predicated on the assumption that the developer\
    \ even knew about the special case in the first place. There's no way as it stands\
    \ to represent that a specific element needs to be handled differently. Therefore,\
    \ a typechecker will not catch when a developer forgets. This leads to brittle\
    \ code down the road.\n\nWhen talking about homogeneity, it's important to talk\
    \ about what a single type means. When I mention a single type, I'm not necessarily\
    \ referring to a concrete type in Python; rather, I'm referring to a set of behaviors\
    \ that define that type. A single type indicates that a consumer must operate\
    \ on every value of that type in the exact same way. For the cookbook list, the\
    \ single type is a Cookbook. For the dictionary"
  merge: -1
