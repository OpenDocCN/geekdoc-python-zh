    \    tab_normalized_text = line.replace(\"\\t\", \"    \")\n    return len(tab_normalized_text)\
    \ - len(tab_normalized_text.lstrip())\n\ndef get_average_whitespace(filename:\
    \ str):\n    with open(filename) as file_to_check:\n        whitespace_count =\
    \ [get_amount_of_preceding_whitespace(line)\n                            for line\
    \ in file_to_check\n                            if line != \"\"]\n        average\
    \ = sum(whitespace_count) / len(whitespace_count) / 4\n        print(f\"Avg indentation\
    \ level for {filename}: {average}\")\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_313_0.png)\n\
    \nAnother possible measure of whitespace is the “area” of indentation per function,\
