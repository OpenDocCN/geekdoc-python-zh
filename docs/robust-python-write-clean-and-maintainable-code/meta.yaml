    \ to group my soup ingredients together. Using dataclass, it looks like this:\n\
    \n```\nimport datetime\nfrom dataclasses import dataclass\nfrom enum import auto,\
    \ Enum\n\nclass ImperialMeasure(Enum):\n    TEASPOON = auto()\n    TABLESPOON\
    \ = auto()\n    CUP = auto()\n\nclass Broth(Enum):\n    VEGETABLE = auto()\n \
    \   CHICKEN = auto()\n    BEEF = auto()\n    FISH = auto()\n\n@dataclass(frozen=True)\n\
    # Ingredients added into the broth\nclass Ingredient:\n    name: str\n    amount:\
    \ float = 1\n    units: ImperialMeasure = ImperialMeasure.CUP\n\n@dataclass\n\
    class Recipe:\n```"
- md: "## Usage\n\nData classes have some built-in functions that make them really\
    \ easy to work with. You've already seen that constructing data classes is a cinch,\
    \ but what else can you do?\n\n## String Conversion\n\nThere are two special methods,\
    \ `__str__` and `__repr__`, used to convert your object to its informal and official\
    \ string representation.¹ Note the double underscores surrounding them; they are\
    \ known as *magic methods*. I'll cover magic methods more in Chapter 11, but for\
    \ now, you can treat them as functions that get called when you invoke `str()`\
    \ or `repr()` on an object. Data classes define these functions by default:\n\n\
    ```python\n# Both repr() and str() will return the output below\nstr(chicken_noodle_soup)\n\
    >>> Recipe(\n    aromatics={\n        Ingredient(name='Pepper', amount=1, units=<ImperialMeasure.TABLESPOON:\
    \ 2>),\n        Ingredient(name='Garlic', amount=2, units=<ImperialMeasure.TEASPOON:\
    \ 1>)},\n    broth=<Broth.CHICKEN: 2>,\n    vegetables={\n        Ingredient(name='Celery',\
    \ amount=0.25, units=<ImperialMeasure.CUP: 3>),\n        Ingredient(name='Onions',\
    \ amount=0.25, units=<ImperialMeasure.CUP: 3>),\n        Ingredient(name='Carrots',\
    \ amount=0.25, units=<ImperialMeasure.CUP: 3>)},\n    meats={\n        Ingredient(name='Chicken',\
    \ amount=1.5, units=<ImperialMeasure.CUP: 3>)},\n    starches={\n        Ingredient(name='Noodles',\
    \ amount=1.5, units=<ImperialMeasure.CUP: 3>)},\n    garnishes={\n        Ingredient(name='Parsley',\
    \ amount=2,\n                   units=<ImperialMeasure.TABLESPOON: 2>)},\n   \
    \ time_to_cook=datetime.timedelta(seconds=3600)\n)\n```\n\nA bit lengthy, but\
    \ it means that you won't get something uglier like `<__main__.Recipe object at\
    \ 0x7fef44240730>`, which is the default string conversion for other user-defined\
    \ types.\n\n## Equality\n\nIf you want to be able to test equality (`==`, `!=`)\
    \ between two data classes, you can specify `eq=True` when defining your dataclass:\n\
    \n```python\nfrom copy import deepcopy\n\n@dataclass(eq=True)\nclass Recipe:\n\
    \    # ...\n\nchicken_noodle_soup == noodle_soup\n>>> False\n\nnoodle_soup ==\
    \ deepcopy(noodle_soup)\n>>> True\n```\n\nBy default, equality checks will compare\
    \ every field across two instances of a data class. Mechanically, Python invokes\
    \ a function named `__eq__` when doing equality checks. If you'd like to provide\
    \ different default functionality for equality checks, you can write your own\
    \ `__eq__` function.\n\n## Relational Comparison\n\nSuppose I want to display\
    \ nutritional information in my soup app for the health-conscious. I want to be\
    \ able to sort the soups by various axes, such as the number of calories or carbohydrates.\n\
    \n```python\nnutritionals = [NutritionInformation(calories=100, fat=1, carbohydrates=3),\n\
    \                NutritionInformation(calories=50, fat=6, carbohydrates=4),\n\
    \                NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n\
    ```\n\nBy default, data classes do not support relational comparison (<, >, <=,\
    \ >=), so you cannot sort the information:\n\n```python\n>>> sorted(nutritionals)\n\
    TypeError: '<' not supported between instances of\n           'NutritionInformation'\
    \ and 'NutritionInformation'\n```\n\nIf you want to be able to define relational\
    \ comparison (<, >, <=, >=), you need to set `eq=True` and `order=True` in the\
    \ dataclass definition. The generated comparison functions will go through each\
    \ field, comparing them in the order in which they were defined.\n\n```python\n\
    @dataclass(eq=True, order=True)\nclass NutritionInformation:\n    calories: int\n\
    \    fat: int\n    carbohydrates: int\n\nnutritionals = [NutritionInformation(calories=100,\
    \ fat=1, carbohydrates=3),\n                NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n                NutritionInformation(calories=125,\
    \ fat=12, carbohydrates=3)]\n\n>>> sorted(nutritionals)\n[NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n NutritionInformation(calories=100, fat=1, carbohydrates=3),\n\
    \ NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n```\n\n---\n\n\
    ¹ The informal string representation is useful for printing the object. The official\
    \ string representation reproduces all information about the object so that it\
    \ can be reconstructed."
  mdcn: "## 用法\n\n数据类具有一些内置功能，使其非常易于使用。你已经看到构造数据类非常简单，但你还能做什么呢？\n\n## 字符串转换\n\n有两种特殊方法，`__str__`\
    \ 和 `__repr__`，用于将你的对象转换为其非正式和正式的字符串表示形式。¹ 注意它们周围的双下划线；它们被称为*魔法方法*。我将在第 11 章更详细地介绍魔法方法，但现在，你可以将它们视为在对象上调用\
    \ `str()` 或 `repr()` 时被调用的函数。数据类默认定义了这些函数：\n\n```python\n# repr() 和 str() 都将返回以下输出\n\
    str(chicken_noodle_soup)\n>>> Recipe(\n    aromatics={\n        Ingredient(name='Pepper',\
    \ amount=1, units=<ImperialMeasure.TABLESPOON: 2>),\n        Ingredient(name='Garlic',\
    \ amount=2, units=<ImperialMeasure.TEASPOON: 1>)},\n    broth=<Broth.CHICKEN:\
    \ 2>,\n    vegetables={\n        Ingredient(name='Celery', amount=0.25, units=<ImperialMeasure.CUP:\
    \ 3>),\n        Ingredient(name='Onions', amount=0.25, units=<ImperialMeasure.CUP:\
    \ 3>),\n        Ingredient(name='Carrots', amount=0.25, units=<ImperialMeasure.CUP:\
    \ 3>)},\n    meats={\n        Ingredient(name='Chicken', amount=1.5, units=<ImperialMeasure.CUP:\
    \ 3>)},\n    starches={\n        Ingredient(name='Noodles', amount=1.5, units=<ImperialMeasure.CUP:\
    \ 3>)},\n    garnishes={\n        Ingredient(name='Parsley', amount=2,\n     \
    \              units=<ImperialMeasure.TABLESPOON: 2>)},\n    time_to_cook=datetime.timedelta(seconds=3600)\n\
    )\n```\n\n有点长，但这意味着你不会得到像 `<__main__.Recipe object at 0x7fef44240730>` 这样更难看的东西，这是其他用户定义类型的默认字符串转换。\n\
    \n## 相等性\n\n如果你想能够在两个数据类之间测试相等性（`==`、`!=`），你可以在定义数据类时指定 `eq=True`：\n\n```python\n\
    from copy import deepcopy\n\n@dataclass(eq=True)\nclass Recipe:\n    # ...\n\n\
    chicken_noodle_soup == noodle_soup\n>>> False\n\nnoodle_soup == deepcopy(noodle_soup)\n\
    >>> True\n```\n\n默认情况下，相等性检查会比较数据类两个实例中的每个字段。从机制上讲，Python 在进行相等性检查时会调用一个名为 `__eq__`\
    \ 的函数。如果你想为相等性检查提供不同的默认功能，你可以编写自己的 `__eq__` 函数。\n\n## 关系比较\n\n假设我想在我的汤应用中为注重健康的人显示营养信息。我希望能够按各种轴对汤进行排序，例如卡路里或碳水化合物的数量。\n\
    \n```python\nnutritionals = [NutritionInformation(calories=100, fat=1, carbohydrates=3),\n\
    \                NutritionInformation(calories=50, fat=6, carbohydrates=4),\n\
    \                NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n\
    ```\n\n默认情况下，数据类不支持关系比较（<、>、<=、>=），因此你无法对信息进行排序：\n\n```python\n>>> sorted(nutritionals)\n\
    TypeError: '<' not supported between instances of\n           'NutritionInformation'\
    \ and 'NutritionInformation'\n```\n\n如果你想能够定义关系比较（<、>、<=、>=），你需要在数据类定义中设置 `eq=True`\
    \ 和 `order=True`。生成的比较函数将遍历每个字段，并按照它们定义的顺序进行比较。\n\n```python\n@dataclass(eq=True,\
    \ order=True)\nclass NutritionInformation:\n    calories: int\n    fat: int\n\
    \    carbohydrates: int\n\nnutritionals = [NutritionInformation(calories=100,\
    \ fat=1, carbohydrates=3),\n                NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n                NutritionInformation(calories=125,\
    \ fat=12, carbohydrates=3)]\n\n>>> sorted(nutritionals)\n[NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n NutritionInformation(calories=100, fat=1, carbohydrates=3),\n\
    \ NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n```\n\n---\n\n\
    ¹ 非正式字符串表示形式对于打印对象很有用。正式字符串表示形式会重现关于对象的所有信息，以便可以重建它。"
