  mdcn: "代码库。可以将每个工具想象成一片瑞士奶酪。¹ 每一片瑞士奶酪都有各种宽度或大小的孔洞，但当多片奶酪堆叠在一起时，就不太可能出现所有孔洞对齐、让你能看穿整个堆叠的区域。\n\
    \n同样，你用来构建安全网的每个工具都会遗漏某些错误。类型检查器无法捕获常见的编程错误，代码检查工具不会检查安全违规，安全检查器无法捕获复杂代码，依此类推。但当这些工具堆叠在一起时，合法错误溜走的可能性就大大降低了（对于那些溜走的错误，这就是为什么你还有测试）。正如布鲁斯·麦克伦南所说：“建立一系列防御，这样如果一个错误没有被一个工具捕获，它很可能会被另一个工具捕获。”²\n\
    \n## 复杂度检查器\n\n本书的大部分内容都围绕着可读和可维护的代码展开。我讨论了复杂代码如何影响功能开发的速度。如果有一个工具能指出代码库中哪些部分复杂度很高，那就太好了。不幸的是，复杂度是主观的，降低复杂度并不总是能减少错误。然而，我可以将复杂度度量视为一种*启发式方法*。启发式方法是提供答案但不保证该答案是最优的方法。在这种情况下，问题是：“我可以在代码的哪里找到最多的错误？”大多数时候，它会在复杂度高的代码中，但请记住，这并不是保证。\n\
    \n## 使用 mccabe 进行圈复杂度分析\n\n最受欢迎的复杂度启发式方法之一是*圈复杂度*，由托马斯·麦凯布首次描述。³ 要测量代码的圈复杂度，你必须将代码视为*控制流图*，即描绘代码可能执行的不同路径的图。图\
    \ 20-1 展示了几个不同的例子。\n\n1 J. Reason. “Human Error: Models and Management.” *BMJ*\
    \ 320, no. 7237 (2000): 768–70. https://doi.org/10.1136/bmj.320.7237.768.\n2 Bruce\
    \ MacLennan. “Principles of Programming Language Design.” web.eecs.utk.edu, September\
    \ 10, 1998. https://oreil.ly/hrjdR.\n3 T.J. McCabe. “A Complexity Measure.” *IEEE\
    \ Transactions on Software Engineering* SE-2, no. 4 (December 1976): 308–20. https://doi.org/10.1109/tse.1976.233837.\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_312_0.png)\n\n图 20-1 的 A 部分演示了语句的线性流，其复杂度为\
    \ 1。如图 20-1 的 B 部分所示，一个没有 `elif` 语句的 `if` 语句有两条路径（if 或 else/直通），因此复杂度为 2。类似地，像图\
    \ 20-1 的 C 部分那样的 `while` 循环也有两条独立的路径：要么循环继续，要么退出。随着代码变得越来越复杂，圈复杂度的数值也会越来越高。\n\n\
    你可以使用 Python 中的静态分析工具来测量圈复杂度，这个工具恰如其分地命名为 `mccabe`。\n\n我将使用 `pip` 安装它：\n\n```\n\
    pip install mccabe\n```\n\n为了测试它，我将在 `mccabe` 代码库本身上运行它，并标记任何圈复杂度大于或等于五的函数：\n\n\
    ```\npython -m mccabe --min 5 mccabe.py\n192:4: 'PathGraphingAstVisitor._subgraph_parse'\
    \ 5\n273:0: 'get_code_complexity' 5\n298:0: '_read' 5\n315:0: 'main' 7\n```\n\n\
    让我们看看 `PathGraphingAstVisitor._subgraph_parse`：\n\n```\ndef _subgraph_parse(self,\
    \ node, pathnode, extra_blocks):\n    \"\"\"parse the body and any `else` block\
    \ of `if` and `for` statements\"\"\"\n    loose_ends = []\n    self.tail = pathnode\n\
    \    self.dispatch_list(node.body)\n    loose_ends.append(self.tail)\n    for\
    \ extra in extra_blocks:\n        self.tail = pathnode\n        self.dispatch_list(extra.body)\n\
    \        loose_ends.append(self.tail)\n    if node.orelse:\n        self.tail\
    \ = pathnode\n        self.dispatch_list(node.orelse)\n        loose_ends.append(self.tail)\n\
    \    else:\n        loose_ends.append(pathnode)\n    if pathnode:\n        bottom\
    \ = PathNode(\"\", look='point')\n        for le in loose_ends:\n            self.graph.connect(le,\
    \ bottom)\n        self.tail = bottom\n```\n\n这个函数中发生了一些事情：各种条件分支、循环，甚至是一个嵌套在\
    \ `if` 语句中的循环。这些路径中的每一条都是独立的，需要进行测试。随着圈复杂度的增长，代码变得更难阅读，也更难推理。圈复杂度没有神奇的数字；你需要检查你的代码库并寻找一个合适的限制。\n\
    \n## 空白启发式方法\n\n还有另一种我非常喜欢的复杂度启发式方法，它比圈复杂度更容易推理：空白检查。其思想如下：计算单个 Python 文件中有多少级缩进。高缩进级别表示嵌套的循环和分支，这可能预示着复杂的代码。\n\
    \n不幸的是，在撰写本文时，没有流行的工具处理空白启发式方法。然而，自己编写这个检查器很容易：\n\n```\ndef get_amount_of_preceding_whitespace(line:\
    \ str) -> int:\n    # replace tabs with 4 spaces (and start tab/spaces flame-war)\n\
    \    tab_normalized_text = line.replace(\"\\t\", \"    \")\n    return len(tab_normalized_text)\
    \ - len(tab_normalized_text.lstrip())\n\ndef get_average_whitespace(filename:\
    \ str):\n    with open(filename) as file_to_check:\n        whitespace_count =\
    \ [get_amount_of_preceding_whitespace(line)\n                            for line\
    \ in file_to_check\n                            if line != \"\"]\n        average\
    \ = sum(whitespace_count) / len(whitespace_count) / 4\n        print(f\"Avg indentation\
    \ level for {filename}: {average}\")\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_313_0.png)\n\
    \n另一种可能的空白度量是每个函数的缩进“面积”，即对所有缩进求和而不是取平均值。我将此作为练习留给读者实现。\n\n与圈复杂度一样，空白复杂度也没有神奇的数字可以检查。我鼓励你在代码库中尝试，并确定合适的缩进量。\n\
    \n## 安全分析\n\n安全很难做好，几乎没有人会因为预防了数据泄露而受到赞扬。相反，似乎是泄露事件本身占据了新闻头条。每个月我都会听到另一次泄露或数据泄露事件。这些故障对公司来说代价高昂，无论是来自监管罚款还是客户群的流失。\n\
    \n每个开发者都需要高度关注其代码库的安全性。你不想听到*你的*代码库是新闻中最新大规模数据泄露事件的根源。值得庆幸的是，有静态分析工具可以防止常见的安全漏洞。\n\
    \n## 泄露密钥\n\n如果你曾经想感到恐惧，可以在你最喜欢的代码托管工具（如 [GitHub](https://github.com)）中搜索文本 `AWS_SECRET_KEY`。你会惊讶于有多少人提交了诸如提供\
    \ AWS 访问权限的密钥之类的秘密值。⁴\n\n一旦密钥进入版本控制系统，尤其是公开托管的系统，就很难清除其痕迹。该组织被迫撤销任何泄露的凭证，但他们必须比那些在代码库中搜寻密钥的黑客大军更快地完成。为了防止这种情况，请使用专门查找泄露密钥的静态分析工具，例如\
    \ [dodgy](https://github.com/Yelp/dodgy)。如果你不选择使用预构建的工具，至少对你的代码库进行文本搜索，以确保没有人泄露常见凭证。\n\
    \n## 安全漏洞检查\n\n检查泄露的凭证是一回事，但更严重的安全漏洞呢？你如何发现诸如 SQL 注入、任意代码执行或配置错误的网络设置之类的问题？当被利用时，这些漏洞可能对你的安全状况造成损害。但是，就像本章中的其他问题一样，有一个静态分析工具可以处理这个问题：Bandit。\n\
    \nBandit 检查常见的安全问题。你可以在 [Bandit 文档](https://bandit.readthedocs.io) 中找到完整列表，但以下是\
    \ Bandit 查找的漏洞类型预览：\n\n- Flask 处于调试模式，这可能导致远程代码执行\n- 发起 HTTPS 请求时未开启证书验证\n\n⁴\
    \ 这有现实世界的影响。在互联网上快速搜索会发现大量详细描述此问题的文章，例如 [https://oreil.ly/gimse](https://oreil.ly/gimse)。"
