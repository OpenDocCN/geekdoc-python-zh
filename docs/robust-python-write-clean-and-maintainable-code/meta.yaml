    \ 和移位\n- 可使用 `str` 或 `repr` 函数转换为字符串\n- 能够通过 `ceil`、`floor` 和 `round` 方法进行四舍五入（即使它们返回整数本身，这些也是支持的方法）\n\
    \n一个 `int` 有许多行为。你可以在交互式 Python 控制台中输入 `help(int)` 来查看完整列表。\n\n现在考虑一个 datetime：\n\
    \n```python\n>>> import datetime\n>>> datetime.datetime.now()\ndatetime.datetime(2020,\
    \ 9, 8, 22, 19, 28, 838667)\n```\n\ndatetime 与 int 并没有太大不同。通常，它表示为从某个纪元时间（如 1970\
    \ 年 1 月 1 日）开始的秒数或毫秒数。但想想 datetime 具有的行为（我将与整数不同的行为用斜体标出）：\n\n- 可从字符串或表示日/月/年等的一组整数构造\n\
    - 数学运算，如时间增量的加法和减法\n- 关系比较\n- 没有可用的位运算\n- 可使用 `str` 或 `repr` 函数转换为字符串\n- 不能通过\
    \ `ceil`、`floor` 或 `round` 方法进行四舍五入\n\ndatetime 支持加法和减法，但不是与其他 datetime 进行。我们只添加时间增量（例如添加一天或减去一年）。乘法和除法对\
    \ datetime 来说确实没有意义。同样，四舍五入日期在标准库中不是支持的操作。然而，datetime 确实提供了与整数类似语义的比较和字符串格式化操作。所以即使\
    \ datetime 本质上是一个整数，它包含了一个受限的操作子集。\n\n> 语义指的是操作的含义。虽然 `str(int)` 和 `str(datetime.datetime.now())`\
    \ 会返回不同格式的字符串，但含义是相同的：我正在从一个值创建一个字符串。\n\nDatetime 还支持自己的行为，以进一步将它们与整数区分开来。这些包括：\n\
