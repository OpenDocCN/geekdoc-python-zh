    \ benefit. First, let's look at what the constructor of a class actually provides\
    \ you.\n\n# Constructors\n\nA constructor describes how to initialize your class.\
    \ You define a constructor with an __init__ method:\n\n```\nclass Person:\n  \
    \  def __init__(self,\n               name: str,\n```"
