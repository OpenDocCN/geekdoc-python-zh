- img_proc: true
  md: '# CHAPTER 9

    User-Defined Types: Data Classes


    Data classes are user-defined types that let you group related data together.
    Many types, such as integers, strings, and enumerations, are *scalar*; they represent
    one and only one value. Other types, such as lists, sets, and dictionaries, represent
    homogeneous collections. However, you still need to be able compose multiple fields
    of data into a single data type. Dictionaries and tuples are OK at this, but they
    suffer from a few issues. Readability is tricky, as it can be difficult knowing
    what a dictionary or tuple contains at runtime. This makes them hard to reason
    about when reading and reviewing code, which is a major blow to robustness.


    When your data is hard to understand, readers will make incorrect assumptions
    and won''t be able to spot bugs as easily. Data classes are easier to read and
    understand, and the typechecker knows how to naturally handle them.


    # Data Classes in Action


    Data classes represent a heterogeneous collection of variables, all rolled into
    a *composite type*. Composite types are made up of multiple values, and should
    always represent some sort of relationship or logical grouping. For example, a
    `Fraction` is an excellent example of a composite type. It contains two scalar
    values: a numerator and a denominator.


    ```

    from fraction import Fraction

    Fraction(numerator=3, denominator=5)

    ```


    This `Fraction` represents the relationship between that numerator and denominator.
    The numerator and denominator are independent of each other; changing one does
    not change the other. However, by combining them into a single type, they are
    grouped together to create a logical concept.'
  merge: -1
  pgno: 142
- img_proc: true
  md: "Data classes allow you to create these concepts quite easily. To represent\
    \ a fraction with a dataclass, you do the following:\n\n```\nfrom dataclasses\
    \ import dataclass\n\n@dataclass\nclass MyFraction:\n    numerator: int = 0\n\
    \    denominator: int = 1\n```\n\nSimple, isn't it? The @dataclass before the\
    \ class definition is known as a *decorator*. You'll learn more about decorators\
    \ in Chapter 17, but for now, all you need to know is that putting @dataclass\
    \ before your class turns it into a dataclass. Once you've decorated the class,\
    \ you need to list out all the fields that you want to represent as a relationship.\
    \ It is imperative that you provide a default value or a type, so that Python\
    \ recognizes it as a member of that dataclass. In the above case, I am demonstrating\
    \ both.\n\nBy building relationships like this, you are adding to the shared vocabulary\
    \ in your codebase. Instead of developers always needing to implement each field\
    \ individually, you instead provide a reusable grouping. Data classes force you\
    \ to explicitly assign types to your fields, so there's less chance of type confusion\
    \ among maintainers.\n\nData classes and other user-defined types can be nested\
    \ within the dataclass. Suppose I'm creating an automated soup maker and I need\
    \ to group my soup ingredients together. Using dataclass, it looks like this:\n\
    \n```\nimport datetime\nfrom dataclasses import dataclass\nfrom enum import auto,\
    \ Enum\n\nclass ImperialMeasure(Enum):\n    TEASPOON = auto()\n    TABLESPOON\
    \ = auto()\n    CUP = auto()\n\nclass Broth(Enum):\n    VEGETABLE = auto()\n \
    \   CHICKEN = auto()\n    BEEF = auto()\n    FISH = auto()\n\n@dataclass(frozen=True)\n\
    # Ingredients added into the broth\nclass Ingredient:\n    name: str\n    amount:\
    \ float = 1\n    units: ImperialMeasure = ImperialMeasure.CUP\n\n@dataclass\n\
    class Recipe:\n```"
  merge: -1
  pgno: 143
- img_proc: true
  md: "```\naromatics: set[Ingredient]\nbroth: Broth\nvegetables: set[Ingredient]\n\
    meats: set[Ingredient]\nstarches: set[Ingredient]\ngarnishes: set[Ingredient]\n\
    time_to_cook: datetime.timedelta\n```\n\n+   1. An enumeration to track different\
    \ liquid measure sizes\n2. An enumeration to track which broth is used in the\
    \ soup\n3. A dataclass representing an individual ingredient to be put in the\
    \ soup. Note that the parameter frozen=True is a special property of data classes\
    \ to indicate that this dataclass is immutable (more on that later). This does\
    \ not mean the ingredients come from the freezer section of the supermarket.\n\
    4. A dataclass representing a soup recipe\n\nWe're able to take multiple user-defined\
    \ types (ImperialMeasure, Broth, and Ingredient) to compose them all into the\
    \ composite type: Recipe. From this Recipe, you can infer multiple concepts:\n\
    \n+   - A soup recipe is a set of grouped information. Specifically, it can be\
    \ defined by its ingredients (separated into specific categories), the broth used,\
    \ and how long it takes to cook.\n- Each ingredient has a name and an amount you\
    \ need for the recipe.\n- You have enumerations to tell you about the soup broth\
    \ and measures. These are not a relationship by themselves, but they do communicate\
    \ intention to the reader.\n- Each grouping of ingredients is a set, rather than\
    \ a tuple. This means that the user can change these after construction, but still\
    \ prevent duplicates.\n\nTo create the dataclass, I do the following:\n\n```\n\
    pepper = Ingredient(\"Pepper\", 1, ImperialMeasure.TABLESPOON)\ngarlic = Ingredient(\"\
    Garlic\", 2, ImperialMeasure.TEASPOON)\ncarrots = Ingredient(\"Carrots\", .25,\
    \ ImperialMeasure.CUP)\ncelery = Ingredient(\"Celery\", .25, ImperialMeasure.CUP)\n\
    onions = Ingredient(\"Onions\", .25, ImperialMeasure.CUP)\nparsley = Ingredient(\"\
    Parsley\", 2, ImperialMeasure.TABLESPOON)\nnoodles = Ingredient(\"Noodles\", 1.5,\
    \ ImperialMeasure.CUP)\nchicken = Ingredient(\"Chicken\", 1.5, ImperialMeasure.CUP)\n\
    \nchicken_noodle_soup = Recipe(\n    aromatics={pepper, garlic},\n    broth=Broth.CHICKEN,\n\
    ```"
