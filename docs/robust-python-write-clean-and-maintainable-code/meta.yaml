    \ a Union offers much the same benefit as an Optional. First, you reap the same\
    \ communication advantages. A developer encountering a Union knows that they must\
    \ be able to handle more than one type in their calling code. Furthermore, a type-checker\
    \ is just as aware of Union as it is of Optional.\n\nYou will find Unions useful\
    \ in a variety of applications:\n\n+   - Handling disparate types returned based\
