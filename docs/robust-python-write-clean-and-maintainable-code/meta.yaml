    Figure 16-7. Visualizing function calls statically


    Note that this only tracks physical dependencies, as logical dependencies aren''t
    known until runtime. If you''d like to see a call graph at runtime, you will need
    to execute your code in concert with a *dynamic* call graph generator. For this
    purpose, I like using the built-in Python profiler. A *profiler* audits all function
    calls you are making during the execution of a program and records performance
    data. As a side benefit, the entire function call history is preserved in the
    profile. Let''s try this out.


    I''ll first build the profile (I''m profiling a test file in mypy for size reasons):


    ```

    python -m cProfile -o deps.profile mypy/test/testutil.py

    ```


    Then I''ll convert the profile into a file that GraphViz can understand: a dot
    file.


    ```

    pip install gprof2dot

    gprof2dot --format=pstats deps.profile -o deps.dot

    ```


    Finally, I''ll use GraphViz to convert the *.dot* file to a *.png*.


    ```

    dot deps.dot -Tpng > deps.png

