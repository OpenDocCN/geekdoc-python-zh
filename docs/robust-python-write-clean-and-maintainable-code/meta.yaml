    \ an abstract layer with stevedore, your type-checker will not be able to detect\
    \ this. Consider checking the interface at runtime to catch any mismatches before\
    \ using the plug-in.\n\n## Closing Thoughts\n\nWhen you create pluggable Python,\
    \ you give your collaborators the ability to isolate new functionality but still\
    \ easily integrate it into an existing codebase. Developers can plug into an existing\
    \ algorithm with the Template Method Pattern, an entire class or algorithm with\
    \ the Strategy Pattern, or even entire subsystems with stevedore. stevedore is\
    \ especially useful when you want to split your plug-ins across discrete Python\
    \ packages.\n\nThis concludes Part III, which was all about extensibility. Writing\
    \ extensible code is adhering to the Open-Closed Principle, where you make it\
    \ easy to add onto your code without requiring modifications to existing code.\
    \ Event-driven architectures and plug-in architectures are fantastic examples\
    \ of designing with extensibility in mind. All of these architectural patterns\
    \ require you to be aware of dependencies: physical, logical, and temporal. As\
    \ you find ways to minimize physical dependencies, you’ll find that your code\
    \ becomes composable, and can be rearranged in new compositions at will.\n\nThe\
    \ first three parts of this book focused on changes that can make your code more\
    \ maintainable and readable and reduce the chance of errors. However, errors still\
    \ have a chance of showing up; they are an unavoidable part of developing software.\
    \ To combat this, you need to make it easy to detect errors before they hit production.\
    \ You’ll learn how to do just that with tools like linters and tests in Part IV,\
    \ *Building a Safety Net*.\n\n# PART IV\n\n## Building a Safety Net\n\nWelcome\
    \ to Part IV of the book, which is about the importance of building a safety net\
    \ around your codebase. Think about a tightrope walker perilously balanced, high\
    \ in the air. No matter how many times the performer has practiced their routine,\
    \ there is always a set of safety precautions should the worst happen. The tightrope\
    \ walker can perform their act with confidence, trusting in the fact that something\
    \ will break their fall if they slip. You want to provide your fellow collaborators\
    \ with the same sort of confidence and trust as they work in your codebase.\n\n\
    Even if your code is completely error free, how long will it stay that way? Every\
    \ change introduces risk. Every new developer coming into a codebase will take\
    \ time before fully understanding all of its intricacies. Customers will change\
    \ their minds and ask for the complete opposite of what they asked for six months\
    \ ago. This is all a natural part of any software development life cycle.\n\n\
    Your development safety net is a combination of static analysis and tests. Much\
    \ has been written on the topic of testing and how to write good tests. In the\
    \ chapters that follow, I will focus on *why* you write tests, how to decide which\
    \ tests you write, and how you can make those tests more valuable. I'll go beyond\
    \ simple unit and integration testing to talk about advanced testing techniques\
    \ like acceptance testing, property-based testing, and mutation testing.\n\n#\
    \ CHAPTER 20\n\n## Static Analysis\n\nBefore I get to testing, I first want to\
    \ talk about static analysis. *Static analysis* is a set of tools that inspect\
    \ your codebase, looking for potential errors or inconsistencies. It's a great\
    \ asset for finding common mistakes. In fact, you've already been working with\
    \ a static analysis tool: mypy. Mypy (and other typecheckers) inspect your codebase\
    \ and find typing errors. Other static analysis tools check for other types of\
    \ errors. In this chapter, I'll walk you through common static analyzers for linting,\
    \ complexity checking, and security scanning.\n\n## Linting\n\nThe first class\
    \ of static analysis tools that I'll walk you through is called a *linter*. Linters\
    \ search for common programming mistakes and style violations within your codebase.\
    \ They get their name from the original linter: a program named *lint* that used\
    \ to check C programs for common errors. It would search for “fuzzy” logic and\
    \ try to remove that fuzz (hence, linting). In Python, the most common linter\
    \ you will come across is Pylint. Pylint is used to check for a myriad of common\
    \ mistakes:\n\n- Certain style violations of the PEP 8 Python style guide\n- Dead\
    \ code that is unreachable (such as code after a return statement)\n- Violations\
    \ of access constraints (such as private or protected members of a class)\n- Unused\
    \ variables and functions\n- Lack of cohesion in a class (no use of self in a\
    \ method, too many public methods)\n- Missing documentation in the form of docstrings\n\
    - Common programming errors\n\nMany of these error classes are things that we've\
    \ discussed previously, such as accessing private members or a function needing\
    \ to be a free function instead of a member function (as discussed in Chapter\
    \ 10.) A linter like Pylint will complement all of the techniques you've learned\
    \ throughout this book; if you violate some of the principles I've been espousing,\
    \ linters will catch those violations for you.\n\nPylint is also incredibly handy\
    \ at finding some common errors in your code. Consider a developer adding code\
    \ that adds all of an author's cookbooks to an existing list:\n\n```python\ndef\
    \ add_authors_cookbooks(author_name: str, cookbooks: list[str] = []) -> bool:\n\
    \    author = find_author(author_name)\n    if author is None:\n        assert\
    \ False, \"Author does not exist\"\n    else:\n        for cookbook in author.get_cookbooks():\n\
    \            cookbooks.append(cookbook)\n        return True\n```\n\nThis seems\
    \ innocuous, but there are two issues in this code. Take a few minutes and see\
    \ if you can find them.\n\nNow let's see what Pylint can do. First, I need to\
    \ install it:\n\n```\npip install pylint\n```\n\nThen, I'll run Pylint against\
    \ the example above:\n\n```\npylint code_examples/chapter20/lint_example.py\n\
    ************* Module lint_example\ncode_examples/chapter20/lint_example.py:11:0:\
    \ W0102:\n    Dangerous default value [] as argument (dangerous-default-value)\n\
    code_examples/chapter20/lint_example.py:11:0: R1710:\n    Either all return statements\
    \ in a function should return an expression,\n    or none of them should. (inconsistent-return-statements)\n\
    ```\n\nPylint has identified the two issues in my code (it actually found more,\
    \ such as missing documentation strings, but I've elided them for the purposes\
    \ of this discussion). First, there is a dangerous mutable default value of an\
    \ argument in the form of []. Much has been written on this behavior before, but\
    \ it's a common gotcha for errors, especially for people new to the language.\n\
    \nThe other error is a bit more subtle: not all branches return the same type.\
    \ \"But wait!\" you exclaim. \"It's OK, because I assert, which raises an error\
    \ instead of falling through the if statement (which returns None).\" However,\
    \ while assert statements are fantastic, they can be turned off. When you pass\
    \ the -O flag to Python, it disables all assert statements. So, when the -O flag\
    \ is turned on, this function returns None. For the record, mypy does not catch\
    \ this error, but Pylint does. Even better, Pylint ran in under a second to find\
    \ those bugs.\n\nIt doesn't matter if you don't make those errors, or you if always\
    \ find them in code review. There are countless developers working in any codebase,\
    \ and errors can happen anywhere. By enforcing a linter like Pylint, you can eliminate\
    \ very common, detectable errors. For a full list of built-in checkers, see the\
    \ [Pylint documentation](https://pylint.readthedocs.io/).\n\n> ## Shift Errors\
    \ Left\n\nOne of the common tenets of the DevOps mindset is to “shift your errors\
    \ left.” I mentioned this when discussing types, but it applies to static analysis\
    \ and tests as well. The idea is to think of your errors in terms of their cost.\
    \ How expensive is it to fix an error? It depends on where you find that error.\
    \ An error found in production by a customer is costly. Developers have to spend\
    \ time away from their normal feature development, tech support and testers get\
    \ involved, and there are risks when you have to do an emergency deployment.\n\
    \nThe earlier in the development cycle you are, the less expensive it is to address\
    \ errors. If you can find errors during testing, you can avoid a slew of production\
    \ costs. However, you want to find these issues even earlier, before they ever\
    \ enter into the codebase. I talked at length in Part I about how typecheckers\
    \ can shift those errors even further left, so that you find the errors right\
    \ as you develop. It's not just typecheckers that allow you to do this, but static\
    \ analysis tools such as linters and complexity checkers as well.\n\nThese static\
    \ analysis tools are your first line of defense against errors, even more so than\
    \ tests. They aren't a silver bullet (nothing is), but they are invaluable in\
    \ finding problems early. Add them to your continuous integration pipeline and\
    \ set them up as pre-commit hooks or server-side hooks in your version control\
    \ system. Save yourself time and money and don't let easy-to-detect errors ever\
    \ enter your codebase.\n\n## Writing Your Own Pylint Plug-in\n\nThe real Pylint\
    \ magic starts to happen when you write your own plug-ins (see Chapter 19 for\
    \ more information on plug-in architectures). A Pylint plug-in lets you write\
    \ your own custom *checkers*, or rules. While built-in checkers look for common\
    \ Python errors, your custom checkers can look for errors in your problem domain.\n\
    \nTake a look at a snippet of code way back from Chapter 4:\n\n```python\nReadyToServeHotDog\
    \ = NewType(\"ReadyToServeHotDog\", HotDog)\n\ndef prepare_for_serving() -> ReadyToServeHotDog:\n\
    \    # snip preparation\n    return ReadyToServeHotDog(hotdog)\n```"
  mdcn: "我最喜欢 stevedore 的一点是它实际上可以*跨*包工作。你可以在一个与核心完全独立的 Python 包中编写插件。只要插件使用相同的命名空间，stevedore\
    \ 就能将所有内容整合在一起。stevedore 还有许多其他值得探索的功能，例如事件通知、通过多种方式启用插件以及自动生成插件文档。如果插件架构符合你的需求，我强烈建议你进一步了解\
    \ stevedore。\n\n![](img/d64d2be45ca85b398807d181202e7046_300_0.png)\n\n从技术上讲，你可以将任何类注册为插件，无论它是否可替代基类。因为代码通过\
    \ stevedore 的抽象层分离，你的类型检查器将无法检测到这一点。建议在运行时检查接口，以便在使用插件之前捕获任何不匹配的情况。\n\n## 结语\n\
    \n当你创建可插拔的 Python 时，你赋予了协作者隔离新功能但仍能轻松将其集成到现有代码库中的能力。开发者可以使用模板方法模式接入现有算法，使用策略模式接入整个类或算法，甚至可以使用\
    \ stevedore 接入整个子系统。当你希望将插件分散到不同的 Python 包中时，stevedore 尤其有用。\n\n第三部分到此结束，全部围绕可扩展性展开。编写可扩展的代码就是遵循开闭原则，即让你能够轻松地扩展代码，而无需修改现有代码。事件驱动架构和插件架构是注重可扩展性设计的绝佳范例。所有这些架构模式都要求你关注依赖关系：物理的、逻辑的和时间的。当你找到最小化物理依赖的方法时，你会发现你的代码变得可组合，并且可以随意重新排列成新的组合。\n\
    \n本书的前三部分侧重于可以使你的代码更易于维护和阅读，并减少错误机会的更改。然而，错误仍然有可能出现；它们是软件开发过程中不可避免的一部分。为了应对这一点，你需要让错误在进入生产环境之前易于检测。你将在第四部分*构建安全网*中学习如何使用\
    \ linters 和测试等工具来做到这一点。\n\n# 第四部分\n\n## 构建安全网\n\n欢迎来到本书的第四部分，这一部分关于围绕你的代码库构建安全网的重要性。想象一下，一个走钢丝的人危险地平衡在高空。无论表演者练习了多少次他们的套路，总有一套安全预防措施以防最坏的情况发生。走钢丝的人可以自信地表演，相信如果他们滑倒，会有东西接住他们。你希望为你的协作者提供同样的信心和信任，让他们在你的代码库中工作。\n\
    \n即使你的代码完全没有错误，它能保持多久？每一次更改都会引入风险。每一个进入代码库的新开发者都需要时间才能完全理解其所有复杂性。客户会改变主意，要求与六个月前完全相反的东西。这都是任何软件开发生命周期的自然组成部分。\n\
    \n你的开发安全网是静态分析和测试的结合。关于测试以及如何编写好的测试已经有很多著述。在接下来的章节中，我将专注于*为什么*编写测试，如何决定编写哪些测试，以及如何使这些测试更有价值。我将超越简单的单元测试和集成测试，讨论高级测试技术，如验收测试、基于属性的测试和变异测试。\n\
    \n# 第 20 章\n\n## 静态分析\n\n在讨论测试之前，我首先想谈谈静态分析。*静态分析*是一组检查你的代码库、寻找潜在错误或不一致之处的工具。它是发现常见错误的利器。事实上，你已经在使用一个静态分析工具了：mypy。Mypy（以及其他类型检查器）检查你的代码库并发现类型错误。其他静态分析工具则检查其他类型的错误。在本章中，我将带你了解用于代码检查、复杂性检查和安全扫描的常见静态分析器。\n\
    \n## 代码检查\n\n我将带你了解的第一类静态分析工具叫做 *linter*。Linter 在你的代码库中搜索常见的编程错误和风格违规。它们的名字来源于最初的\
    \ linter：一个名为 *lint* 的程序，过去用于检查 C 程序中的常见错误。它会搜索“模糊”逻辑并试图消除这种模糊性（因此得名 linting）。在\
    \ Python 中，你最常遇到的 linter 是 Pylint。Pylint 用于检查大量常见错误：\n\n-   PEP 8 Python 风格指南的某些风格违规\n\
    -   不可达的死代码（例如 `return` 语句之后的代码）\n-   访问约束违规（例如类的私有或受保护成员）\n-   未使用的变量和函数\n- \
