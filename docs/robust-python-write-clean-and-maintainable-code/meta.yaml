- img_proc: true
  md: "Here is the get_calories test with parameterization:\n\n```\n@pytest.mark.parametrize(\n\
    \    \"extra_ingredients,dish_name,expected_calories\",\n    [\n        ([\"Bacon\"\
    , 2400], \"Bacon Cheeseburger\", 900),\n        ([],  \"Cobb Salad\", 1000),\n\
    \        ([],  \"Buffalo Wings\", 800),\n        ([],  \"Garlicky Brussels Sprouts\"\
    , 200),\n        ([],  \"Mashed Potatoes\", 400)\n    ]\n)\ndef test_calorie_calculation_bacon_cheeseburger(extra_ingredients,\n\
    \                                                dish_name,\n                \
    \                                expected_calories,\n                        \
    \                        test_database):\n    for ingredient in extra_ingredients:\n\
    \        test_database.add_ingredient(ingredient)\n\n    # assume this function\
    \ can set up any dish\n    # alternatively, dish ingredients could be passed in\
    \ as a test parameter\n    setup_dish_ingredients(dish_name)\n\n    calories =\
    \ get_calories(dish_name)\n\n    assert calories == expected_calories\n```\n\n\
    You define your parameters as a list of tuples, one per test case. Each parameter\
    \ is passed to the test case as an argument. pytest automatically will run this\
    \ test, once per parameter set.\n\nParameterized tests have the benefit of condensing\
    \ a lot of test cases into one function. Readers of the test can just go down\
    \ through the table listed in the parameterization to understand what expected\
    \ input and output is (Cobb salad should have 1,000 calories, mashed potatoes\
    \ should have 400 calories, and so on).\n\n> Parameterization is a great way to\
    \ separate the test data from the actual test (similar to separating policy and\
    \ mechanisms, as discussed in Chapter 17). However, be careful. If you make your\
    \ tests too generic, it will be harder to ascertain what they are testing. Avoid\
    \ using more than three or four parameters if you can.\n\n# Assert\n\nThe last\
    \ step to do before cleaning up is *asserting* some property is true about the\
    \ system. Preferably, there should be one logical assertion near the end of your\
    \ test. If you find yourself jamming too many assertions into a test, you either\
    \ have too many actions in your test or too many tests matched into one. When\
    \ a test has too many responsibilities, it makes it harder for maintainers to\
    \ debug software. If they make a"
  merge: -1
  pgno: 329
- img_proc: true
  md: "change that produces a failed test, you want them to be able to quickly find\
    \ out what the problem is. Ideally, they can figure out what's wrong based on\
    \ the test name, but at the very least, they should be able to open up the test,\
    \ look for about 20 or 30 seconds, and realize what went wrong. If you have multiple\
    \ assertions, you have multiple reasons a test can go wrong, and it will take\
    \ maintainers time to sort through them.\n\nThis doesn't mean that you should\
    \ only have one *assert* statement; it is OK to have a few *assert* statements\
    \ as long as they are all involved in testing the same property. Make your assertions\
    \ verbose as well, so that developers get an informative message when things go\
    \ wrong. In Python, you can supply a text message that gets passed along with\
    \ the AssertionError to help with debugging.\n\n```\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200, \"Incorrect calories for Bacon Cheeseburger w/ Fries\"\
    \n```\n\npytest rewrites assertion statements, which also provides an extra level\
    \ of debug messages. If the above test were to fail, the message returned to the\
    \ test writer would be:\n\n```\nE       AssertionError: Incorrect calories for\
    \ Bacon Cheeseburger w/ Fries\nE       assert 1100 == 1200\n```\n\nFor more complex\
    \ assertions, build up an assertion library that makes it incredibly easy to define\
    \ new tests. This is like building a vocabulary in your codebase; you want a diverse\
    \ set of concepts to share in your test code as well. For this, I recommend using\
    \ Hamcrest matchers.⁵\n\n*Hamcrest matchers* are a way of writing assertions to\
    \ read similarly to natural language. The PyHamcrest library supplies common matchers\
    \ to help you write your asserts. Take a look at how it uses custom assertion\
    \ matchers to make tests more clear:\n\n```\nfrom hamcrest import assert_that,\
    \ matches_regexp, is_, empty, equal_to\ndef test_all_menu_items_are_alphanumeric():\n\
    \    menu = create_menu()\n    for item in menu:\n        assert_that(item, matches_regexp(r'[a-zA-Z0-9\
    \ ]'))\n\ndef test_getting_calories():\n    dish = \"Bacon Cheeseburger w/ Fries\"\
    \n```\n\n5 Hamcrest is an anagram of \"matchers.\""
