  md: "You cannot accidentally create a MotherSauce with an unexpected value:\n\n\
    ```\n>>>MotherSauce(\"Hollandaise\") # OKAY\n\n>>>MotherSauce(\"Alabama White\
    \ BBQ Sauce\")\nValueError: 'Alabama White BBQ Sauce' is not a valid MotherSauce\n\
    ```\n\nThat will certainly limit errors (either with invalid sauces or innocent\
    \ typos).\n\nIf you wanted to print out all the values of the enumeration, you\
    \ can simply iterate over the enumeration (no need to create a separate list).\n\
    \n```\n>>>for option_number, sauce in enumerate(MotherSauce, start=1):\n>>>  \
    \  print(f\"Option {option_number}: {sauce.value}\")\n```\n\n+   Option 1: Béchamel\n\
    Option 2: Velouté\nOption 3: Espagnole\nOption 4: Tomato\nOption 5: Hollandaise\n\
    \nFinally, and crucially, you can communicate your intent in functions that use\
    \ this Enum:\n\n```\ndef create_daughter_sauce(mother_sauce: MotherSauce,\n  \
    \                      extra_ingredients: list[str]):\n    # ...\n```\n\nThis\
    \ tells all the developers looking at this function that they should be passing\
    \ in a MotherSauce enumeration, and not just any old string. It becomes much harder\
    \ to introduce typos or incorrect values. (A user can still pass wrong values\
    \ if they really want to, but they would be in direct violation of what's expected,\
    \ which is easier to catch—I covered how to catch these errors in Part I.)\n\n\
    ![](img/d64d2be45ca85b398807d181202e7046_134_0.png)\n\n# When Not to Use\n\nEnumerations\
    \ are great for communicating a static set of choices for users. You don't want\
    \ to use them where your options are determined at runtime, as you lose a lot\
    \ of their benefits around communicating intent and tooling (it is much tougher\
    \ for a reader of code to know what values are possible if they can change in\
    \ every run-through). If you find yourself in this situation, I recommend a dictionary,\
    \ which offers a natural mapping between two values that can be changed at runtime.\
    \ You will"
  merge: -1
  pgno: 134
- img_proc: true
  md: "need to perform membership checks if you need to restrict what values a user\
    \ can select, though.\n\n# Advanced Usage\n\nOnce you master the basics of enumerations,\
    \ there are quite a few things you can do to even further refine your usage. Remember,\
    \ the more specific type you choose, the more specific information you convey.\n\
    \n# Automatic Values\n\nFor some enumerations, you might want to explicitly specify\
    \ that you don't care about the value that the enumeration is tied to. This tells\
    \ users that they should not rely on these values. For this, you can use the auto()\
    \ function.\n\n```\nfrom enum import auto, Enum\nclass MotherSauce(Enum):\n  \
    \  BÉCHAMEL = auto()\n    VELOUTÉ = auto()\n    ESPAGNOLE = auto()\n    TOMATO\
    \ = auto()\n    HOLLANDAISE = auto()\n\n>>>list(MotherSauce)\n[<MotherSauce.BÉCHAMEL:\
    \ 1>, <MotherSauce.VELOUTÉ: 2>, <MotherSauce.ESPAGNOLE: 3>,\n <MotherSauce.TOMATO:\
    \ 4>, <MotherSauce.HOLLANDAISE: 5>]\n```\n\nBy default, auto() will select monotonically\
    \ increasing values (1, 2, 3, 4, 5...). If you would like to control what values\
    \ are set, you should implement a _generate_next_value_() function:\n\n```\nfrom\
    \ enum import auto, Enum\nclass MotherSauce(Enum):\n    def _generate_next_value_(name,\
    \ start, count, last_values):\n        return name.capitalize()\n    BÉCHAMEL\
    \ = auto()\n    VELOUTÉ = auto()\n    ESPAGNOLE = auto()\n    TOMATO = auto()\n\
    \    HOLLANDAISE = auto()\n\n>>>list(MotherSauce)\n[<MotherSauce.BÉCHAMEL: 'Béchamel'>,\
    \ <MotherSauce.VELOUTÉ: 'Velouté'>,\n <MotherSauce.ESPAGNOLE: 'Espagnole'>, <MotherSauce.TOMATO:\
    \ 'Tomato'>,\n <MotherSauce.HOLLANDAISE: 'Hollandaise'>]\n```\n\nVery rarely will\
    \ you see _generate_next_value_ defined like this, right inside of an enumeration\
    \ with values. If auto is used to indicate that the value doesn't matter, then\
    \ _generate_next_value_ indicates that you want very specific values for auto.\
    \ It feels"
  merge: -1
