- md: "## Discussion Topic\n\nLook through the uses of collections and generics in\
    \ your codebase, and assess how much information is conveyed to future developers.\
    \ How many custom collection types are in your codebase? What can a new developer\
    \ tell about the collection types by just looking at type signatures and names?\
    \ Are there collections you could be defining more generically? What about other\
    \ types using generics?\n\nNow, type annotations don't reach their full potential\
    \ without the aid of a type-checker. In the next chapter, I'm going to focus on\
    \ the typechecker itself. You'll learn how to effectively configure a typechecker,\
    \ generate reports, and evaluate different checkers. The more you know about a\
    \ tool, the more effectively you can wield it. This is especially true for your\
    \ typechecker.\n\n## CHAPTER 6\n\n## Customizing Your Typechecker\n\nTypecheckers\
    \ are one of your best resources for building robust codebases. Jukka Lehtosalo,\
    \ the lead developer of mypy, offers a beautifully concise definition of typecheckers:\
    \ “In essence, [a typechecker] provides verified documentation.”¹ Type annotations\
    \ provide documentation about your codebase, allowing other developers the ability\
    \ to reason about your intentions. Typecheckers use those annotations to verify\
    \ that the documentation matches the behavior.\n\nAs such, a typechecker is invaluable.\
    \ Confucius once said, “The mechanic, who wishes to do his work well, must first\
    \ sharpen his tools.”² This chapter is all about sharpening your typechecker.\
    \ Great coding techniques can get you far, but it’s your surrounding tooling that\
    \ takes you to the next level. Don’t stop with just learning your editor, compiler,\
    \ or operating system. Learn your typechecker too. I will show you some of the\
    \ more useful options to get the most out of your tools.\n\n## Configuring Your\
    \ Typechecker\n\nI will focus on one of the most popular typecheckers out there:\
    \ mypy. When you run a typechecker in an IDE (such as PyCharm), it typically runs\
    \ mypy underneath the hood (although many IDEs will allow you to change the default\
    \ typechecker). Anytime you configure mypy (or whatever your default typechecker\
    \ is), your IDE will use that configuration as well.\n\nMypy offers quite a few\
    \ configuration options to control the typechecker's *strictness*, or the amount\
    \ of errors reported. The stricter you make your typechecker, the more type annotations\
    \ you need to write, which provides better documentation and creates fewer bugs.\
    \ However, make the typechecker too strict, and you will find the minimum bar\
    \ for developing code too high, incurring high costs to make changes. Mypy configuration\
    \ options control these strictness levels. I'll go through the different options\
    \ available to you, and you can decide where that bar lies for you and your codebase.\n\
    \nFirst, you need to install mypy (if you haven't already). The easiest way is\
    \ through pip on the command line:\n\n```\npip install mypy\n```\n\nOnce you have\
    \ mypy installed, you can control configuration in one of three ways:\n\n*Command\
    \ line*\nWhen instantiating mypy from a terminal, you can pass various options\
    \ to configure behavior. This is great for exploring new checks in your codebase.\n\
    \n*Inline configuration*\nYou can specify configuration values at the top of a\
    \ file to indicate any options you may want to set. For example:\n\n```\n# mypy:\
    \ disallow-any-generics\n```\n\nPutting this line at the top of your file will\
    \ tell mypy to explicitly fail if it finds any generic type annotated with Any.\n\
    \n*Configuration file*\nYou can set up a configuration file to use the same options\
    \ every time mypy runs. This is extremely useful when needing to share the same\
    \ options across a team. This file is typically stored in version control alongside\
    \ the code.\n\n## Configuring mypy\n\nWhen running mypy, it looks in your current\
    \ directory for a configuration file named *mypy.ini*. This file will define which\
    \ options you have set up for the project. Some options will be global, applied\
    \ to every file, and other options will be per-module. A sample *mypy.ini* file\
    \ might look as follows:\n\n```\n# Global options:\n\n[mypy]\npython_version =\
    \ 3.9\nwarn_return_any = True\n\n# Per-module options:\n\n[mypy-mycode.foo.*]\n\
    disallow_untyped_defs = True\n\n[mypy-mycode.bar]\nwarn_return_any = False\n\n\
    [mypy-somelibrary]\nignore_missing_imports = True\n```\n\nYou can use the --config-file\
    \ command-line option to specify config files in different places. Also, mypy\
    \ will look for configuration files in specific home directories if it can't find\
    \ a local config file, in case you want the same settings across multiple projects.\
    \ For more information, check out the [mypy documentation](https://mypy.readthedocs.io/).\n\
    \nAs a note, I won't cover too much more about the configuration file. Most options\
    \ that I'll talk about work in both a configuration file and on the command line,\
    \ and for the sake of simplicity, I'll show you how to run the commands on mypy\
    \ invocations.\n\nIn the following pages, I will cover a multitude of typechecker\
    \ configurations; you do not need to apply every single one of them to see value\
    \ in a typechecker. Most typecheckers provide immense value right out of the box.\
    \ However, feel free to consider the following options to improve a typechecker's\
    \ likelihood of finding errors.\n\n## Catching dynamic behavior\n\nAs mentioned\
    \ before, Python's dynamically typed nature will make maintenance hard on codebases\
    \ that last a long time. Variables are free to be rebound to values with different\
    \ types at any time. When this happens, the variable is essentially an Any type.\
    \ Any types indicate that you should make no assumptions about what type that\
    \ variable is. This makes it tricky to reason about: your typechecker won't be\
    \ of much use in preventing errors and you aren't communicating anything special\
    \ to future developers.\n\nMypy comes with a set of flags that you can turn on\
    \ to flag instances of the Any type. For instance, you can turn on the --disallow-any-expr\
    \ option to flag any expression that has an Any type. The following code will\
    \ fail with that option turned on:\n\n```\nfrom typing import Any\nx: Any = 1\n\
    y = x + 1\n\ntest.py:4: error: Expression has type \"Any\"\nFound 1 error in 1\
    \ file (checked 1 source file)\n```\n\nAnother option I like for disallowing Any\
    \ in type declarations (such as in collections) is --disallow-any-generics. This\
    \ catches the use of Any for anything using a generic (such as collection types).\
    \ The following code fails to typecheck with this option turned on:\n\n```\nx:\
    \ list = [1,2,3,4]\n```\n\nYou would need to use list[int] explicitly to get this\
    \ code to work.\n\nYou can check out all the ways to disable the use of Any in\
    \ the [mypy dynamic typing documentation](https://mypy.readthedocs.io/en/stable/dynamic_typing.html).\n\
    \nBe careful with disabling Any too broadly, though. There is a valid use case\
    \ of Any that you don't want to flag erroneously. Any should be reserved for when\
    \ you absolutely don't care what type something is and that it is up to the caller\
    \ to verify the type. A prime example is a heterogeneous key-value store (perhaps\
    \ a general-purpose cache).\n\n## Requiring types\n\nAn expression is untyped\
    \ if there is no type annotation. In these cases, mypy treats the result of that\
    \ expression as an Any type if it can't otherwise infer the type. However, the\
    \ previous checks for disallowing Any will not catch where a function is left\
    \ untyped. There is a separate set of flags for checking for untyped functions.\n\
    \nThis code will not error out in a typechecker unless the --disallow-untyped-defs\
    \ option is set:\n\n```\ndef plus_four(x):\n    return x + 4\n```\n\nWith that\
    \ option set, you receive the following error:\n\n```\ntest.py:4: error: Function\
    \ is missing a type annotation\n```\n\nIf this is too severe for you, you might\
    \ want to check out --disallow-incomplete-defs, which only flags functions if\
    \ they only have some variables/return values annotated (but not all), or --disallow-untyped-calls,\
    \ which only flags calls from annotated functions to unannotated functions. You'll\
    \ find all the different options concerning untyped functions in the [mypy documentation](https://mypy.readthedocs.io/en/stable/command_line.html).\n\
    \n## Handling None/Optional\n\nIn [Chapter 4](https://example.com/chapter4), you\
    \ learned how easy it was to make the “billion-dollar mistake” when using None\
    \ values. If you turn on no other options, make sure that you have --strict-optional\
    \ turned on in your typechecker to catch these costly errors. You absolutely want\
    \ to be checking that your use of None is not hiding any latent bugs.\n\nWhen\
    \ using --strict-optional, you must explicitly perform is None checks; otherwise,\
    \ your code will fail typechecking.\n\n---\n¹ Jukka Lehtosalo. “Our Journey to\
    \ Type Checking 4 Million Lines of Python.” *Dropbox Tech* (blog). Dropbox, September\
