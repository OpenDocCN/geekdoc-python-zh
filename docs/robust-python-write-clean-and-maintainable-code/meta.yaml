  md: "As a final note, you are free to create your own aliases for built-in multiple\
    \ enumeration selections, as I did with SEAFOOD and ALL_NUTS above.\n\n# Integer\
    \ Conversion\n\nThere are two more special case enumerations called IntEnum and\
    \ IntFlag. These map to Enum and Flag, respectively, but allow degradation to\
    \ raw integers for comparison. I actually do not recommend using these features,\
    \ and it's important to understand why. First, let's look at the problem they\
    \ intend to solve.\n\nIn French cooking, the measurement of certain ingredients\
    \ is paramount to success, so you need to make sure you have that covered as well.\
    \ You create a metric and imperial liquid measure (you want to work internationally,\
    \ after all) as enumerations, but are dismayed to find that you can't just compare\
    \ your enumerations to integers.\n\nThis code doesn't work:\n\n```\nclass ImperialLiquidMeasure(Enum):\n\
    \    CUP = 8\n    PINT = 16\n    QUART = 32\n    GALLON = 128\n\n>>>ImperialLiquidMeasure.CUP\
    \ == 8\nFalse\n```\n\nBut, if you were to subclass from IntEnum, it works just\
    \ fine:\n\n```\nclass ImperialLiquidMeasure(IntEnum):\n    CUP = 8\n    PINT =\
    \ 16\n    QUART = 32\n    GALLON = 128\n\n>>>ImperialLiquidMeasure.CUP == 8\n\
    True\n```\n\nAn IntFlag performs similarly. You'll see this more when interoperating\
    \ between systems or possibly hardware. If you were not using an IntEnum, you\
    \ would need to do something like:\n\n```\n>>>ImperialLiquidMeasure.CUP.value\
    \ == 8\nTrue\n```\n\nThe convenience of using an IntEnum does not often outweigh\
    \ the drawback of being a weaker type. Any implicit conversion to integer hides\
    \ the true intent of the class. Since implicit integer conversion happens, you\
    \ might run into a copy/paste mistake (we've all made those, right?) in situations\
    \ that don't do what you want."
