- md: "In contrast, the Observer Pattern requires the caller of the notification (in\
    \ the previous case, this was `complete_order`) to know about the observers. If\
    \ the caller doesn't know directly about the observers, then its caller needs\
    \ to pass in the observers. This can continue all the way up the call stack until\
    \ you are in a piece of code that directly knows about the observers. This can\
    \ pollute a lot your function calls with extra parameters if there is a large\
    \ gap between what knows about the observers and the actual code issuing the notification.\
    \ If you find yourself passing observers through multiple functions to get to\
    \ a producer deep in the call stack, consider using a message broker instead.\n\
    \nIf you would like to go more in-depth into event-driven architectures with simple\
    \ events, I recommend the book *Architecture Patterns with Python* by Harry Percival\
    \ and Bob Gregory (O'Reilly); its Part II is all about event-driven architecture.\n\
    \n**Discussion Topic**\n\nHow would event-driven architecture improve the decoupling\
    \ within your codebase? Would the Observer Pattern or a message broker be more\
    \ suitable for your needs?\n\n## Streaming Events\n\nIn the preceding section,\
    \ simple events were each represented as a discrete event that happened when a\
    \ certain condition was fulfilled. Message brokers and the Observer Pattern are\
    \ great ways to handle simple events. However, some systems deal with a never-ending\
    \ series of events. The events flow into the system as a continuous series of\
    \ data known as a stream. Think about the drone systems described in the last\
    \ section. Consider all the data that comes from each drone. There might be location\
    \ data, battery levels, current speed, wind data, weather data, and current weight\
    \ carried. This data will be coming in at regular intervals, and you need a way\
    \ to handle it.\n\nIn these sorts of use cases, you don't want to build all the\
    \ boilerplate of pub/sub or observers; you want an architecture that matches your\
    \ use case. You need a programming model that centers on events and defines workflows\
    \ for handling every single event. Enter reactive programming.\n\n*Reactive programming*\
    \ is an architectural style that revolves around streams of events. You define\
    \ data sources as producers of these streams, and then link together multiple\
    \ observers. Each observer is notified whenever there is a change in data and\
    \ defines a series of operations for handling the data stream. The reactive programming\
    \ style was popularized by ReactiveX. In this section, I'll use the Python implementation\
    \ of ReactiveX: RxPY.\n\nI will install RxPy with pip:\n\n```\npip install rx\n\
    ```\n\nFrom there, I need to define a stream of data. In RxPY parlance, this is\
    \ known as an *observable*. For example purposes, I'll use a single hard-coded\
    \ observable, but in practice, you will generate multiple observables from real\
    \ data.\n\n```python\nimport rx\n# Each one of these is simulating an independent\
    \ real-world event streaming in\nobservable = rx.of(\n    LocationData(x=3, y=12,\
    \ z=40),\n    BatteryLevel(percent=95),\n    BatteryLevel(percent=94),\n    WindData(speed=15,\
    \ direction=Direction.NORTH),\n    # ... snip 100s of events\n    BatteryLevel(percent=72),\n\
    \    CurrentWeight(grams=300)\n)\n```\n\nThis observable is generated from a list\
    \ of events of different types for the drone data.\n\nI next need to define what\
    \ to do to process each event. Once I have an observable, observers can subscribe\
    \ to it, in a similar manner to the pub/sub mechanism:\n\n```python\ndef handle_drone_data(value):\n\
    \    # ... snip handle drone data ...\n\nobservable.subscribe(handle_drone_data)\n\
    ```\n\nThis doesn't look too different from a normal pub/sub idiom.\n\nThe real\
    \ magic comes with *pipable* operators. RxPY allows you to *pipe*, or chain, operations\
    \ together to produce a pipeline of filters, transformations, and calculations.\
    \ For instance, I can write an operator pipeline with `rx.pipe` to grab the average\
    \ weight the drone has carried:\n\n```python\nimport rx.operators\n\nget_average_weight\
    \ = observable.pipe(\n    rx.operators.filter(lambda data: isinstance(data, CurrentWeight)),\n\
    \    rx.operators.map(lambda cw: cw.grams),\n    rx.operators.average()\n)\n\n\
    # save_average_weight does something with the final data\n# (e.g. save to database,\
    \ print to screen, etc.)\nget_average_weight.subscribe(save_average_weight)\n\
    ```\n\nSimilarly, I could write a pipeline chain that tracks the drone's maximum\
    \ altitude once it's left the restaurant:\n\n```python\nget_max_altitude = observable.pipe(\n\
    \    rx.operators.skip_while(is_close_to_restaurant),\n    rx.operators.filter(lambda\
    \ data: isinstance(data, LocationData)),\n    rx.operators.map(lambda loc: loc.z),\n\
    \    rx.operators.max()\n)\n\n# save max altitude does something with the final\
    \ data\n# (e.g. save to database, print to screen, etc)\nget_max_altitude.subscribe(save_max_altitude)\n\
    ```\n\n> A *lambda function* is just an inline function without a name. It is\
    \ often used for functions that are only used once where you don't want to place\
    \ the definition of the function too far away from its use.\n\nThis is our old\
    \ friend *composability* (as seen in Chapter 17) coming to our aid. I can compose\
    \ different operators however I want to produce a datastream that matches my use\
    \ case. RxPY has support for over one hundred built-in operators, as well as a\
    \ framework for defining your own operators. You can even compose the results\
    \ from one pipe into a new stream of events that other parts of the program can\
    \ observe. This composability, paired with the decoupled nature of event subscription,\
    \ gives you a large amount of flexibility in writing code. Furthermore, reactive\
    \ programming encourages immutability, which greatly decreases the chance of bugs.\
    \ You can hook up new pipes, compose operators together, handle data asynchronously,\
    \ and more with a reactive framework like RxPY.\n\nIt also becomes easy to debug\
    \ in isolation. While you can't easily step through RxPY with a debugger (you'll\
    \ end up in a lot of complicated code related to operations and observables),\
    \ you can instead step into the functions that you pass to operators. Testing\
    \ is a breeze too. Since all the functions are meant to be immutable, you can\
    \ test any of them on their own. You end up with a lot of small, single-purpose\
    \ functions that are easy to understand.\n\nThis type of model excels in systems\
    \ that revolve around streams of data, such as data pipelines and extract, transform,\
    \ load (ETL) systems. It is also incredibly useful in applications dominated by\
    \ reactions to I/O events, such as server applications and GUI applications. If\
    \ reactive programming fits your domain model, I encourage you to read the [RxPY\
    \ documentation](https://rxpy.readthedocs.io/). If you'd like more structured\
    \ learning, I recommend the video course *Reactive Python for Data Science* or\
    \ the book *Hands-On Reactive Programming with Python: Event-Driven Development\
    \ Unraveled with RxPY* by Romain Picard (O'Reilly).\n\n## Closing Thoughts\n\n\
    Event-driven architectures are incredibly powerful. An event-driven architecture\
    \ allows you to separate producers and consumers of information. By decoupling\
    \ the two, you introduce flexibility into your system. You can replace functionality,\
    \ test your code in isolation, or extend new functionality by introducing new\
    \ producers or consumers.\n\nThere are many ways to architect an event-driven\
    \ system. You can choose to stay with simple events and the Observer Pattern for\
    \ lightweight events in your system. As you scale up, you may need to introduce\
    \ a message broker, such as with PyPubSub. You may even need to use another library\
    \ as a message broker if you want to scale across processes or systems. Finally,\
    \ as you approach streams of events, you can consider a reactive programming framework,\
    \ such as RxPY.\n\nIn the next chapter, I will cover a different type of architectural\
    \ paradigm: plug-in architectures. Plug-in architectures offer similar flexibility,\
    \ composability, and extensibility to event-driven architectures, but in a completely\
    \ different way. Whereas event-driven architectures focus on events, plug-in architecture\
    \ focuses on pluggable units of implementation. You'll see how plug-in architectures\
    \ can give you plenty of options to build a robust codebase that is easy to maintain."
  mdcn: "相比之下，观察者模式要求通知的调用者（在之前的例子中，是`complete_order`）了解观察者。如果调用者不直接了解观察者，那么它的调用者就需要传入观察者。这可以一直沿着调用栈向上追溯，直到你到达一段直接了解观察者的代码。如果了解观察者的代码与实际发出通知的代码之间存在很大差距，这可能会用额外的参数污染你的许多函数调用。如果你发现自己需要将观察者传递给多个函数，才能到达调用栈深处的某个生产者，那么请考虑改用消息代理。\n\
    \n如果你想更深入地了解使用简单事件的事件驱动架构，我推荐Harry Percival和Bob Gregory（O'Reilly）所著的*《Python架构模式》*一书；其第二部分全部关于事件驱动架构。\n\
    \n**讨论主题**\n\n事件驱动架构将如何改善你代码库中的解耦？观察者模式还是消息代理更适合你的需求？\n\n## 流式事件\n\n在上一节中，每个简单事件都被表示为一个在满足特定条件时发生的离散事件。消息代理和观察者模式是处理简单事件的绝佳方式。然而，有些系统处理的是永无止境的事件序列。这些事件作为连续的数据流进入系统，称为流。想想上一节描述的无人机系统。考虑来自每架无人机的所有数据。可能包括位置数据、电池电量、当前速度、风力数据、天气数据和当前携带重量。这些数据会以固定的时间间隔传入，你需要一种方法来处理它。\n\
    \n在这类用例中，你不想构建发布/订阅或观察者的所有样板代码；你需要一个与你的用例相匹配的架构。你需要一个以事件为中心并为处理每个事件定义工作流的编程模型。这就引出了响应式编程。\n\
    \n*响应式编程*是一种围绕事件流展开的架构风格。你将数据源定义为这些流的生产者，然后将多个观察者链接在一起。每当数据发生变化时，每个观察者都会收到通知，并定义一系列操作来处理数据流。响应式编程风格由ReactiveX推广。在本节中，我将使用ReactiveX的Python实现：RxPY。\n\
    \n我将使用pip安装RxPY：\n\n```\npip install rx\n```\n\n接下来，我需要定义一个数据流。在RxPY术语中，这被称为*可观察对象*。为了举例说明，我将使用一个硬编码的可观察对象，但在实践中，你将从真实数据生成多个可观察对象。\n\
    \n```python\nimport rx\n# 这些中的每一个都在模拟一个独立的、正在流入的真实世界事件\nobservable = rx.of(\n\
    \    LocationData(x=3, y=12, z=40),\n    BatteryLevel(percent=95),\n    BatteryLevel(percent=94),\n\
    \    WindData(speed=15, direction=Direction.NORTH),\n    # ... 省略数百个事件\n    BatteryLevel(percent=72),\n\
    \    CurrentWeight(grams=300)\n)\n```\n\n这个可观察对象是由无人机数据的不同类型事件列表生成的。\n\n接下来，我需要定义如何处理每个事件。一旦我有了一个可观察对象，观察者就可以订阅它，类似于发布/订阅机制：\n\
    \n```python\ndef handle_drone_data(value):\n    # ... 省略处理无人机数据的代码 ...\n\nobservable.subscribe(handle_drone_data)\n\
    ```\n\n这看起来与普通的发布/订阅模式没有太大不同。\n\n真正的魔力在于*可管道化*的操作符。RxPY允许你将操作*管道化*或链接在一起，形成一个包含过滤、转换和计算的管道。例如，我可以使用`rx.pipe`编写一个操作符管道来获取无人机携带的平均重量：\n\
    \n```python\nimport rx.operators\n\nget_average_weight = observable.pipe(\n  \
    \  rx.operators.filter(lambda data: isinstance(data, CurrentWeight)),\n    rx.operators.map(lambda\
    \ cw: cw.grams),\n    rx.operators.average()\n)\n\n# save_average_weight 对最终数据执行某些操作\n\
    # （例如保存到数据库、打印到屏幕等）\nget_average_weight.subscribe(save_average_weight)\n```\n\n\
    类似地，我可以编写一个管道链来跟踪无人机离开餐厅后的最大高度：\n\n```python\nget_max_altitude = observable.pipe(\n\
    \    rx.operators.skip_while(is_close_to_restaurant),\n    rx.operators.filter(lambda\
    \ data: isinstance(data, LocationData)),\n    rx.operators.map(lambda loc: loc.z),\n\
    \    rx.operators.max()\n)\n\n# save_max_altitude 对最终数据执行某些操作\n# （例如保存到数据库、打印到屏幕等）\n\
    get_max_altitude.subscribe(save_max_altitude)\n```\n\n> *Lambda函数*只是一个没有名称的内联函数。它通常用于那些只使用一次的函数，你不想将函数的定义放得离它的使用位置太远。\n\
    \n这是我们熟悉的老朋友*可组合性*（如第17章所见）在帮助我们。我可以随心所欲地组合不同的操作符，以产生与我的用例相匹配的数据流。RxPY支持超过一百个内置操作符，以及一个用于定义你自己的操作符的框架。你甚至可以将一个管道的结果组合成一个新的事件流，供程序的其他部分观察。这种可组合性，加上事件订阅的解耦特性，为你编写代码提供了极大的灵活性。此外，响应式编程鼓励不可变性，这大大减少了出现错误的可能性。你可以使用像RxPY这样的响应式框架来连接新的管道、组合操作符、异步处理数据等等。\n\
    \n它还使得隔离调试变得容易。虽然你无法轻松地使用调试器单步执行RxPY（最终会陷入大量与操作和可观察对象相关的复杂代码中），但你可以改为单步执行传递给操作符的函数。测试也很轻松。由于所有函数都旨在是不可变的，你可以单独测试其中任何一个。最终你会得到许多小型、单一用途且易于理解的函数。\n\
    \n这种类型的模型在围绕数据流的系统中表现出色，例如数据管道和提取、转换、加载（ETL）系统。它在主要处理I/O事件反应的应用程序中也非常有用，例如服务器应用程序和GUI应用程序。如果响应式编程适合你的领域模型，我鼓励你阅读[RxPY文档](https://rxpy.readthedocs.io/)。如果你想进行更有结构的学习，我推荐视频课程*《面向数据科学的响应式Python》*或Romain\
    \ Picard（O'Reilly）所著的*《Python响应式编程实战：用RxPY解开事件驱动开发》*一书。\n\n## 结语\n\n事件驱动架构功能极其强大。事件驱动架构允许你将信息的生产者和消费者分离。通过将两者解耦，你为系统引入了灵活性。你可以替换功能、隔离测试代码，或者通过引入新的生产者或消费者来扩展新功能。\n\
    \n构建事件驱动系统的方式多种多样。你可以选择坚持使用简单事件和观察者模式来处理系统中的轻量级事件。随着规模扩大，你可能需要引入消息代理，例如使用PyPubSub。如果你想跨进程或系统扩展，你甚至可能需要使用另一个库作为消息代理。最后，当你处理事件流时，可以考虑使用响应式编程框架，例如RxPY。\n\
    \n在下一章中，我将介绍一种不同类型的架构范式：插件架构。插件架构提供了与事件驱动架构类似的灵活性、可组合性和可扩展性，但方式完全不同。事件驱动架构关注的是事件，而插件架构关注的是可插拔的实现单元。你将看到插件架构如何为你提供多种选择，以构建一个易于维护的健壮代码库。"
