  md: "To catch the remaining set of errors, I can use custom validators to embed\
    \ those last pieces of validation logic:\n\n```\nfrom pydantic import validator\n\
    @dataclass\nclass Restaurant:\n    name: constr(regex=r'^[a-zA-Z0-9 ]*$',\n  \
    \               min_length=1, max_length=16)\n    owner: constr(min_length=1)\n\
