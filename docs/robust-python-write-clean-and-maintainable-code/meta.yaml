    \ The specific name for this parameter is arbitrary, but you'll see most code\
    \ use `self` as the convention. Each time you instantiate a class, the `self`\
    \ argument refers to that specific instance; one instance's attributes won't conflict\
    \ with another instance's attributes, even though they are the same class.\n\n\
    So why would you ever write a class? Dictionaries or data classes are simpler\
    \ to write and involve less ceremony. For something like the Person object listed\
