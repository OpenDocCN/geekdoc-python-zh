  mdcn: "在第四章中，我提到过，为了让 NewType 有效，你需要确保只通过*受信任的*方法来构造它，也就是那些强制执行与该类型相关约束的方法。当时，我的建议是使用注释来给代码读者提供提示。然而，借助\
    \ Pylint，你可以编写一个自定义检查器来发现你何时违反了这一预期。\n\n以下是该插件的完整代码。稍后我会为你分解讲解：\n\n```python\n\
