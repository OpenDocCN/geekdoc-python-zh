    \ on a per-module basis:\n\n```\n# Global options:\n\n[mypy]\npython_version =\
    \ 3.9\nwarn_return_any = True\n\n# Per-module options:\n\n[mypy-mycode.foo.*]\n\
    disallow_untyped_defs = True\n\n[mypy-mycode.bar]\nwarn_return_any = False\n\n\
    [mypy-somelibrary]\nignore_missing_imports = True\n```\n\nUsing this format, you\
    \ can pick and choose which errors your typechecker tracks. You can mask all of\
    \ your existing errors, while focusing on fixing new errors. Be as specific as\
    \ possible in defining which errors get ignored; you don't want to mask new errors\
