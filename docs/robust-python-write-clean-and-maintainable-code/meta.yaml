    \ benefit from the types I've just laid out. However, there are a few problems\
    \ with this approach:\n\n+   - I can't control construction of a TypedDict, so\
    \ I can't validate any fields as part of type construction. I must force consumers\
    \ to do the validation.\n- TypedDict cannot have additional methods on it.\n-\
    \ TypedDict does no validation implicitly. If you create the wrong dictionary\
    \ from YAML, the typechecker will not complain.\n\nThat last point is important.\
    \ In fact, I could have the following contents as the entirety of my YAML file,\
    \ and the code will still typecheck:\n\n```\ninvalid_name: \"This is the wrong\
    \ file format\"\n```\n\nTypechecking will not catch errors at runtime. You need\
    \ something stronger. Enter pydantic.\n\n# pydantic\n\npydantic is a library that\
    \ provides runtime checking of your types without sacrificing readability. You\
    \ can use pydantic to model your classes like so:\n\n```\nfrom pydantic.dataclasses\
    \ import dataclass\nfrom typing import Literal, Optional, TypedDict, Union\n\n\
    @dataclass\nclass AccountAndRoutingNumber:\n    account_number: str\n    routing_number:\
    \ str\n\n@dataclass\nclass BankDetails:\n    bank_details: AccountAndRoutingNumber\n\
    \nAddressOrBankDetails = Union[str, BankDetails]\n\nPosition = Literal['Chef',\
    \ 'Sous Chef', 'Host',\n                   'Server', 'Delivery Driver']\n\n@dataclass\n\
    class Dish:\n    name: str\n```"
