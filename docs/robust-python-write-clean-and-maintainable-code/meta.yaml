  md: "A *fixture* in pytest is a way of specifying initialization and teardown code\
    \ for tests. Fixtures offer a ton of useful features, like defining dependencies\
    \ on other fixtures (letting pytest control initialization order) and controlling\
    \ initialization so that a fixture is only initialized once per module. In the\
    \ previous example, we could have used a fixture for the test_database:\n\n```\n\
    import pytest\n\n@pytest.fixture\ndef db_creation():\n    # ... snip set up local\
    \ sqlite database\n    return database\n\n@pytest.fixture\ndef test_database(db_creation):\n\
    \    # ... snip adding all ingredients and meals\n    return database\n\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n\n    test_database.cleanup()()\n```\n\nNotice how\
    \ the test has an argument for test_database now. This is the fixture at work;\
    \ the function test_database (as well as db_creation) will get called before the\
    \ test. Fixtures only become more useful as the number of tests grows. They are\
    \ composable, allowing you to mix them together and reduce code duplication. I\
    \ won't generally use them to abstract code in a single file, but as soon as that\
    \ initialization needs to be used in multiple files, fixtures are the way to go.\n\
    \n**Mocking.** Python offers duck typing (first mentioned in Chapter 2) as part\
    \ of its type system, which means that you can easily substitute types for one\
    \ another as long as they uphold the same contract (as discussed in Chapter 12).\
    \ This means that you can tackle complex dependencies in a completely different\
    \ way: use a simple mocked object instead. A *mocked* object is something that\
    \ looks identical to a production object as far as methods and fields go, but\
    \ offers simplified data.\n\n![](img/d64d2be45ca85b398807d181202e7046_325_0.png)\n\
    \nMocks are used a lot in unit tests, but you will see their usage decline the\
    \ less granular the tests become. This is because you try to test more of the\
    \ system at a higher level; the services you are mocking are often part of the\
    \ tests."
  merge: -1
