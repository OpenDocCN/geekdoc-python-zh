- md: "Future developers would come across code like this:\n\n```\ncreate_daughter_sauce(MOTHER_SAUCES[0],\
    \ [\"Onions\"]) # not super helpful\ncreate_daughter_sauce(BÉCHAMEL, [\"Onions\"\
    ]) # Better\n```\n\nOr:\n\n```\ncreate_daughter_sauce(\"Hollandaise\", [\"Horseradish\"\
    ])\ncreate_daughter_sauce(\"Veloute\", [\"Mustard\"])\n```\n\n```\n# Definitely\
    \ wrong\ncreate_daughter_sauce(\"Alabama White BBQ Sauce\", [])\n```\n\nAnd here\
    \ lies the crux of the problem. On the happy path, a developer can use the predefined\
    \ variables. But if somebody accidentally were to use the wrong sauce (after all,\
    \ create_daughter_sauce expects a string, which could be anything), you soon get\
    \ unwanted behavior. Remember, I am talking about developers looking at this months\
    \ (or potentially years) later. They have been tasked to add a feature to the\
    \ codebase, even though they are not familiar with it. By choosing a string type,\
    \ I'm just inviting the wrong values to be supplied later.\n\n![](img/d64d2be45ca85b398807d181202e7046_133_0.png)\n\
    \nEven honest mistakes have ramifications. Did you catch that I left an accent\
    \ off of the “e” in Velouté? Have fun debugging that in production.\n\nInstead,\
    \ you want to find a way to communicate that you want a very specific, restricted\
    \ set of values in specific locations. Since you're in a chapter about “enumerations”\
    \ and I haven't shown them yet, I'm sure you can guess what the solution is.\n\
    \n## Enum\n\nHere's an example of Python's enumeration, Enum, in action:\n\n```\n\
    from enum import Enum\nclass MotherSauce(Enum):\n    BÉCHAMEL = \"Béchamel\"\n\
    \    VELOUTÉ = \"Velouté\"\n    ESPAGNOLE = \"Espagnole\"\n    TOMATO = \"Tomato\"\
    \n    HOLLANDAISE = \"Hollandaise\"\n```\n\nTo access specific instances, you\
    \ can just do:\n\n```\nMotherSauce.BÉCHAMEL\nMotherSauce.HOLLANDAISE\n```\n\n\
    This is near identical to the string aliases, but there are a few extra benefits.\n\
    \nYou cannot accidentally create a MotherSauce with an unexpected value:\n\n```\n\
    >>>MotherSauce(\"Hollandaise\") # OKAY\n\n>>>MotherSauce(\"Alabama White BBQ Sauce\"\
    )\nValueError: 'Alabama White BBQ Sauce' is not a valid MotherSauce\n```\n\nThat\
    \ will certainly limit errors (either with invalid sauces or innocent typos).\n\
    \nIf you wanted to print out all the values of the enumeration, you can simply\
    \ iterate over the enumeration (no need to create a separate list).\n\n```\n>>>for\
    \ option_number, sauce in enumerate(MotherSauce, start=1):\n>>>    print(f\"Option\
    \ {option_number}: {sauce.value}\")\n```\n\nOption 1: Béchamel\nOption 2: Velouté\n\
    Option 3: Espagnole\nOption 4: Tomato\nOption 5: Hollandaise\n\nFinally, and crucially,\
    \ you can communicate your intent in functions that use this Enum:\n\n```\ndef\
    \ create_daughter_sauce(mother_sauce: MotherSauce,\n                        extra_ingredients:\
    \ list[str]):\n    # ...\n```\n\nThis tells all the developers looking at this\
    \ function that they should be passing in a MotherSauce enumeration, and not just\
    \ any old string. It becomes much harder to introduce typos or incorrect values.\
    \ (A user can still pass wrong values if they really want to, but they would be\
    \ in direct violation of what's expected, which is easier to catch—I covered how\
    \ to catch these errors in Part I.)\n\n![](img/d64d2be45ca85b398807d181202e7046_134_0.png)\n\
    \n## When Not to Use\n\nEnumerations are great for communicating a static set\
    \ of choices for users. You don't want to use them where your options are determined\
    \ at runtime, as you lose a lot of their benefits around communicating intent\
    \ and tooling (it is much tougher for a reader of code to know what values are\
    \ possible if they can change in every run-through). If you find yourself in this\
    \ situation, I recommend a dictionary, which offers a natural mapping between\
    \ two values that can be changed at runtime. You will need to perform membership\
    \ checks if you need to restrict what values a user can select, though.\n\n##\
    \ Advanced Usage\n\nOnce you master the basics of enumerations, there are quite\
    \ a few things you can do to even further refine your usage. Remember, the more\
    \ specific type you choose, the more specific information you convey.\n\n### Automatic\
    \ Values\n\nFor some enumerations, you might want to explicitly specify that you\
    \ don't care about the value that the enumeration is tied to. This tells users\
    \ that they should not rely on these values. For this, you can use the auto()\
    \ function.\n\n```\nfrom enum import auto, Enum\nclass MotherSauce(Enum):\n  \
    \  BÉCHAMEL = auto()\n    VELOUTÉ = auto()\n    ESPAGNOLE = auto()\n    TOMATO\
    \ = auto()\n    HOLLANDAISE = auto()\n\n>>>list(MotherSauce)\n[<MotherSauce.BÉCHAMEL:\
    \ 1>, <MotherSauce.VELOUTÉ: 2>, <MotherSauce.ESPAGNOLE: 3>,\n <MotherSauce.TOMATO:\
    \ 4>, <MotherSauce.HOLLANDAISE: 5>]\n```\n\nBy default, auto() will select monotonically\
    \ increasing values (1, 2, 3, 4, 5...). If you would like to control what values\
    \ are set, you should implement a _generate_next_value_() function:\n\n```\nfrom\
    \ enum import auto, Enum\nclass MotherSauce(Enum):\n    def _generate_next_value_(name,\
    \ start, count, last_values):\n        return name.capitalize()\n    BÉCHAMEL\
    \ = auto()\n    VELOUTÉ = auto()\n    ESPAGNOLE = auto()\n    TOMATO = auto()\n\
    \    HOLLANDAISE = auto()\n\n>>>list(MotherSauce)\n[<MotherSauce.BÉCHAMEL: 'Béchamel'>,\
    \ <MotherSauce.VELOUTÉ: 'Velouté'>,\n <MotherSauce.ESPAGNOLE: 'Espagnole'>, <MotherSauce.TOMATO:\
    \ 'Tomato'>,\n <MotherSauce.HOLLANDAISE: 'Hollandaise'>]\n```\n\nVery rarely will\
    \ you see _generate_next_value_ defined like this, right inside of an enumeration\
    \ with values. If auto is used to indicate that the value doesn't matter, then\
    \ _generate_next_value_ indicates that you want very specific values for auto.\
    \ It feels contradictory. This is why you typically use _generate_next_value_\
    \ in base Enum classes, which are enumerations that are meant to be subtyped and\
    \ don't include any values. The Flag class, which you'll see next, is a good example\
    \ of a base class.\n\n### Enums Versus Literals\n\nPython's Literal (introduced\
    \ in Python 3.8) has many of the same benefits as an Enum with automatically set\
    \ values (assuming there is no _generate_next_value_). In both cases, you are\
    \ restricting your variables to a very specific set of values.\n\nFrom a typechecker's\
    \ perspective, there is very little difference between this:\n\n```python\nsauce:\
    \ Literal['Béchamel', 'Velouté', 'Espagnole',\n               'Tomato', 'Hollandaise']\
    \ = 'Hollandaise'\n```\n\nand this:\n\n```python\nsauce: MotherSauce = MotherSauce.HOLLANDAISE\n\
    ```\n\nIf you just need a simple restriction, reach for Literal first. However,\
    \ if you want iteration, runtime checking, or different values mapped from name\
    \ to value, use an Enum.\n\n### Flags\n\nNow that you have the mother sauces represented\
    \ in an Enum, you decide that you are ready to start serving meals with those\
    \ sauces. But before you begin, you want to be conscious of your customers' allergies,\
    \ so you decide to represent allergy information for each dish. With your newfound\
    \ knowledge of auto(), setting up the Allergen enumeration is a piece of cake:\n\
    \n```python\nfrom enum import auto, Enum\nfrom typing import Set\nclass Allergen(Enum):\n\
    \    FISH = auto()\n    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS\
    \ = auto()\n    GLUTEN = auto()\n    SOY = auto()\n    DAIRY = auto()\n```\n\n\
    And for a recipe, you might track a list of allergens as such:\n\n```python\n\
    allergens: Set[Allergen] = {Allergen.FISH, Allergen.SOY}\n```\n\nThis tells readers\
    \ that a collection of allergens will be unique, and that there might be zero,\
    \ one, or many allergens. This is exactly what you want. But what if I wanted\
    \ all allergen information in the system to be tracked like this? I don't want\
    \ to rely on every developer remembering to use a set (just one use of a list\
    \ or dictionary can invite wrong behavior). I want some way to represent a grouping\
    \ of unique enumeration values universally.\n\nThe enum module gives you a handy\
    \ base class to use—Flag:\n\n```\nfrom enum import Flag\nclass Allergen(Flag):\n\
    \    FISH = auto()\n    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS\
    \ = auto()\n    GLUTEN = auto()\n    SOY = auto()\n    DAIRY = auto()\n```\n\n\
    This lets you perform bitwise operations to combine allergens or check if certain\
    \ allergens are present.\n\n```\n>>>allergens = Allergen.FISH | Allergen.SHELLFISH\n\
    >>>allergens\n<Allergen.SHELLFISH|FISH: 3>\n\n>>>if allergens & Allergen.FISH:\n\
    >>>    print(\"This recipe contains fish.\")\nThis recipe contains fish.\n```\n\
    \nThis is great when you want to represent a selection of values (say, something\
    \ that was set through a multi-drop down or a bitmask). There are some limitations,\
    \ though. The values must support the bitwise operations (|, &, etc.). Strings\
    \ would be an example of types that don't, while integers do. Furthermore, the\
    \ values cannot overlap when bitwise operations are performed. For example, you\
    \ cannot use the values from 1 through 4 (inclusive) for your Enum because 4 will\
    \ “bitwise and” for the values 1, 2, and 4 which is probably not what you want.\
    \ auto() takes care of this for you because the _generate_next_value_ of Flag\
    \ automatically uses powers of 2.\n\n```\nclass Allergen(Flag):\n    FISH = auto()\n\
    \    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS = auto()\n    GLUTEN\
    \ = auto()\n    SOY = auto()\n    DAIRY = auto()\n    SEAFOOD = Allergen.FISH\
    \ | Allergen.SHELLFISH\n    ALL_NUTS = Allergen.TREE_NUTS | Allergen.PEANUTS\n\
    ```\n\nThe use of flags can express what you mean in very specific circumstances,\
    \ but if you ever want more control of your values, or are enumerating values\
    \ that don't support bitwise operations, use a nonflag Enum."
