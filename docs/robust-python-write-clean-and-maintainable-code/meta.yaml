- md: "## CHAPTER 19\nPluggable Python\n\nThe greatest challenge in building a robust\
    \ codebase is predicting the future. You will never completely guess what a future\
    \ developer will do. The best strategy is not being perfectly prescient, but instead\
    \ creating flexibility so that future collaborators can hook into your system\
    \ with minimal work. In this chapter, I will focus on creating *pluggable* code.\
    \ Pluggable code allows you to define behaviors that are to be supplied later.\
    \ You define a framework with *extension points*, or parts of your system that\
    \ other developers will use to extend functionality.\n\nThink about a stand mixer\
    \ sitting on a kitchen counter. You can select a variety of attachments to use\
    \ with your mixer: a hook for mixing bread, a whisk for beating eggs and cream,\
    \ and a flat beater to do general-purpose mixing. Each attachment serves a specific\
    \ purpose. What's great is that you can detach and attach hooks or blades as the\
    \ situation calls for it. You don't need to buy an entire new mixer for each use\
    \ case; you *plug in* whatever you need when you need it.\n\nThis is the goal\
    \ for pluggable Python. You don't need to rebuild entire applications when new\
    \ functionality is needed. You build extensions or attachments that snap onto\
    \ a solid foundation. You pick the functionality you need for your specific use\
    \ case and you plug that into your system.\n\nIn most of this book, I've been\
    \ illustrating examples with automated food makers of some sort or another. In\
    \ this chapter, I will perform the mother of mergers and design a system that\
    \ can combine them all. I want to build a system that can take any of the recipes\
    \ I've talked about and cook them. I call it the \"Ultimate Kitchen Assistant\"\
    \ (if you think this is a terrible name, you now know why I don't work in marketing).\n\
    \nThe Ultimate Kitchen Assistant contains all the instructions and gear you will\
    \ need for working around the kitchen. It knows how to slice, dice, fry, sauté,\
    \ bake, broil, and blend any ingredient. It comes with some premade recipes, but\
    \ the real magic is that customers can buy off-the-shelf modules to extend its\
    \ functionality (such as a “Pasta-Making Module” for sating Italian cuisine cravings).\n\
    \nThe problem is, I don't want the code to become burdensome to maintain. There\
    \ are a lot of different dishes to make, and I want to give the system some sort\
    \ of flexibility without oodles of physical dependencies turning the system into\
    \ spaghetti code (although your system making spaghetti itself in the kitchen\
    \ is highly encouraged!). Just like plugging a new attachment onto the stand mixer,\
    \ I want developers to affix different attachments to solve their use cases. I\
    \ even want other organizations to build modules for the Ultimate Kitchen Assistant.\
    \ I want this codebase to be extensible and composable.\n\nI'll use this example\
    \ to illustrate three separate ways of plugging into different Python constructs.\
    \ First, I'll focus on how to plug in specific parts of an algorithm with the\
    \ Template Method Pattern. Then, I'll talk through plugging in an entire class\
    \ with the Strategy Pattern. Finally, I'll introduce you to an incredibly useful\
    \ library, stevedore, to do plug-ins at a much larger architectural scale. All\
    \ of these techniques will help you give future developers the extensibility they\
    \ need.\n\n## The Template Method Pattern\n\nThe *Template Method Pattern* is\
    \ a pattern for filling in the blanks of an algorithm.¹ The idea is that you define\
    \ an algorithm as a series of steps, but you force the caller to override some\
    \ of those steps, as shown in Figure 19-1.\n\n![](img/d64d2be45ca85b398807d181202e7046_291_0.png)\n\
    \nFigure 19-1. The Template Method Pattern\n\n> ¹ Erich Gamma, Richard Helm, Ralph\
    \ E. Johnson, and John Vlissides. *Design Patterns: Elements of Reusable Object-Oriented\
    \ Software*. Boston, MA: Addison-Wesley Professional, 1994.\n\nFirst up for the\
    \ Ultimate Kitchen Assistant is a pizza-making module. While traditional sauce-and-cheese\
    \ pizzas are great, I want the Ultimate Kitchen Assistant to be more flexible.\
    \ I want it to handle all sorts of pizza-like entities, from a Lebanese manoush\
    \ to a Korean bulgogi pizza. To make any of these pizza-like dishes, I want the\
    \ machinery to perform a similar set of steps, but let developers tweak certain\
    \ operations to make their style of pizza. Figure 19-2 describes such a pizza-making\
    \ algorithm.\n\n![](img/d64d2be45ca85b398807d181202e7046_292_0.png)\n\nFigure\
    \ 19-2. Pizza-making algorithm\n\nEach pizza will use the same basic steps, but\
    \ I want to be able to tweak certain steps (preparing ingredients, adding prebake\
    \ toppings, and adding postbake toppings). My goal in applying the Template Method\
    \ Pattern is to make these steps pluggable.\n\nIn its simplest incarnation, I\
    \ can pass functions into the template method:\n\n```python\n@dataclass\nclass\
    \ PizzaCreationFunctions:\n    prepare_ingredients: Callable\n    add_pre_bake_toppings:\
    \ Callable\n    add_post_bake_toppings: Callable\n\ndef create_pizza(pizza_creation_functions:\
    \ PizzaCreationFunctions):\n    pizza_creation_functions.prepare_ingredients()\n\
    \    roll_out_pizza_base()\n    pizza_creation_functions.add_pre_bake_toppings()\n\
    \    bake_pizza()\n    pizza_creation_functions.add_post_bake_toppings()\n```\n\
    \nNow, if you want to create a pizza, you just pass in your own functions:\n\n\
    ```python\npizza_creation_functions = PizzaCreationFunctions(\n    prepare_ingredients=mix_zaatar,\n\
    \    add_pre_bake_toppings=add_meat_and_halloumi,\n    add_post_bake_toppings=drizzle_olive_oil\n\
    )\n\ncreate_pizza(pizza_creation_functions)\n```\n\nThis is incredibly convenient\
    \ for any pizza, now or in the future. As new pizza-making capabilities come online,\
    \ developers need to pass their new functions into the template method. These\
    \ developers can plug in specific parts of the pizza-making algorithm to suit\
    \ their needs. They don't need to know anything about their use case at all; they\
    \ are free to grow the system without being bogged down with changing legacy code.\
    \ Suppose they want to create the bulgogi pizza. Instead of changing create_pizza,\
    \ I simply need to pass in a new PizzaCreationFunctions:\n\n```python\npizza_creation_functions\
    \ = PizzaCreationFunctions(\n    prepare_ingredients=cook_bulgogi,\n    add_pre_bake_toppings=add_bulgogi_toppings,\n\
    \    add_post_bake_toppings=garnish_with_scallions_and_sesame\n)\n\ncreate_pizza(pizza_creation_functions)\n\
    ```\n\n## The Canonical Template Method Pattern\n\nThe Template Method Pattern\
    \ described in the Gang of Four book is a bit different than what I've shown in\
    \ this section. This is another case where the Gang of Four book leans heavily\
    \ on class- and inheritance-based design. In the original Template Method Pattern,\
    \ you are required to write a base class:\n\n```python\nclass PizzaCreator:\n\
    \    def roll_out_dough():\n        # snip\n    def bake():\n        # snip\n\
    \    def serve():\n        # snip\n\n    def prepare_ingredients():\n        raise\
    \ NotImplementedError()\n\n    def add_pre_bake_toppings():\n        raise NotImplementedError()\n\
    \n    def add_post_bake_toppings():\n        raise NotImplementedError()\n```\n\
    \n> To use this base class, you have to subclass and override the three required\
    \ methods. You then have to find a way to substitute your derived class into any\
    \ code that needs a pizza maker. You typically have to set up Abstract Factories\
    \ (another design pattern found in the Gang of Four book) to inject derived classes.\n\
    \nSince Python does not require everything to be in a class and offers first-class\
    \ support for functions, I prefer using a data class of functions to fill in a\
    \ template. It involves less boilerplate, but still provides similar flexibility\
    \ and extensibility. Just be aware that design-pattern purists may prefer the\
    \ OO pattern described above.\n\n## The Strategy Pattern\n\nThe Template Method\
    \ Pattern is great for swapping out select parts of an algorithm, but what if\
    \ you want to swap out the *entire* algorithm? A very similar design pattern exists\
    \ for this use case: the Strategy Pattern.\n\nThe Strategy Pattern is for plugging\
    \ entire algorithms into a context.² For the Ultimate Kitchen Assistant, consider\
    \ a module that specializes in Tex-Mex (a regional American cuisine that blends\
    \ southwestern US and northern Mexican cuisines). A large variety of dishes can\
    \ be made from a common set of items; you mix and match the different ingredients\
    \ in new ways.\n\nFor instance, you will find the following ingredients on most\
    \ Tex-Mex menus: tortillas (corn or flour), beans, ground beef, chicken, lettuce,\
    \ tomato, guacamole, salsa, and cheese. From these ingredients, you can create\
    \ tacos, flautas, chimichangas, enchiladas, taco salads, nachos, gorditas…the\
    \ list goes on. I don't want the system to restrict all the different Tex-Mex\
    \ dishes; I want different groups of developers to supply *how* to make the dish.\n\
    \nTo do this with the Strategy Pattern, I need to define what the Ultimate Kitchen\
    \ Assistant does and what the strategy does. In this case, the Ultimate Kitchen\
    \ Assistant should provide the mechanisms for interacting with ingredients, but\
    \ future developers are free to keep adding new Tex-Mex concoctions with a *TexMexStrategy*.\n\
    \nAs with any code designed to be extensible, I need to make sure that the interaction\
    \ between my Ultimate Kitchen Assistant and the Tex-Mex module agrees on the pre-\
    \ and postconditions, namely what gets passed into the Tex-Mex module and what\
    \ comes out.\n\n² Erich Gamma, Richard Helm, Ralph E. Johnson, and John Vlissides.\
    \ *Design Patterns: Elements of Reusable Object-Oriented Software*. Boston, MA:\
    \ Addison-Wesley Professional, 1994."
  mdcn: "## 第19章\n可插拔的Python\n\n构建健壮代码库的最大挑战在于预测未来。你永远无法完全猜到未来的开发者会做什么。最佳策略并非拥有完美的预见力，而是创造灵活性，让未来的协作者能以最小的工作量接入你的系统。本章我将重点讨论如何创建*可插拔*的代码。可插拔代码允许你定义稍后才提供的行为。你定义一个带有*扩展点*的框架，这些扩展点就是系统中其他开发者将用来扩展功能的部分。\n\
    \n想象一下厨房台面上的立式搅拌机。你可以选择各种附件与之配合使用：用于揉面团的钩子、用于打发鸡蛋和奶油的搅拌器，以及用于通用搅拌的平桨。每个附件都有特定用途。妙处在于，你可以根据情况随时拆卸和安装钩子或刀片。你不需要为每种用途购买全新的搅拌机；你只需在需要时*插入*所需的附件即可。\n\
    \n这就是可插拔Python的目标。当需要新功能时，你无需重建整个应用程序。你构建的是可以安装在坚实基础上的扩展或附件。你根据特定用例选择所需功能，并将其插入系统。\n\
    \n在本书的大部分内容中，我一直在用各种自动化食品制作设备来举例说明。在本章中，我将进行一次大融合，设计一个能将它们全部组合起来的系统。我想构建一个系统，它能处理我之前讨论过的任何食谱并进行烹饪。我称之为“终极厨房助手”（如果你觉得这个名字很糟糕，现在你知道为什么我不从事市场营销工作了）。\n\
    \n终极厨房助手包含了你在厨房工作所需的所有指令和工具。它知道如何切片、切丁、煎炒、煸炒、烘焙、炙烤和混合任何食材。它附带一些预制食谱，但真正的魔力在于，客户可以购买现成的模块来扩展其功能（例如，用于满足意大利菜渴望的“意面制作模块”）。\n\
    \n问题是，我不希望代码变得难以维护。有太多不同的菜肴需要制作，我希望给系统某种灵活性，而不会让大量的物理依赖将系统变成意大利面条式代码（尽管你的系统在厨房里制作意大利面本身是高度鼓励的！）。就像在立式搅拌机上插入新附件一样，我希望开发者能安装不同的附件来解决他们的用例。我甚至希望其他组织能为终极厨房助手构建模块。我希望这个代码库是可扩展和可组合的。\n\
    \n我将用这个例子来说明三种不同的方式，以插入不同的Python构造。首先，我将重点介绍如何使用模板方法模式插入算法的特定部分。然后，我将讨论如何使用策略模式插入整个类。最后，我将向你介绍一个非常有用的库——stevedore，用于在更大的架构规模上进行插件开发。所有这些技术都将帮助你为未来的开发者提供所需的扩展性。\n\
    \n## 模板方法模式\n\n*模板方法模式*是一种用于填补算法空白的模式。¹ 其思想是将算法定义为一系列步骤，但强制调用者覆盖其中某些步骤，如图19-1所示。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_291_0.png)\n\n图19-1. 模板方法模式\n\n> ¹\
    \ Erich Gamma, Richard Helm, Ralph E. Johnson, and John Vlissides. *Design Patterns:\
    \ Elements of Reusable Object-Oriented Software*. Boston, MA: Addison-Wesley Professional,\
    \ 1994.\n\n终极厨房助手首先要实现的是一个制作披萨的模块。虽然传统的酱料和奶酪披萨很棒，但我希望终极厨房助手更加灵活。我希望它能处理各种类似披萨的食物，从黎巴嫩的曼努什到韩式烤肉披萨。为了制作任何这些类似披萨的食物，我希望机器执行一系列相似的步骤，但让开发者调整某些操作以制作他们风格的披萨。图19-2描述了这样一个披萨制作算法。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_292_0.png)\n\n图19-2. 披萨制作算法\n\n每个披萨都将使用相同的基本步骤，但我希望能够调整某些步骤（准备食材、添加预烤配料和添加后烤配料）。我应用模板方法模式的目标是使这些步骤可插拔。\n\
    \n在其最简单的形式中，我可以将函数传递给模板方法：\n\n```python\n@dataclass\nclass PizzaCreationFunctions:\n\
    \    prepare_ingredients: Callable\n    add_pre_bake_toppings: Callable\n    add_post_bake_toppings:\
    \ Callable\n\ndef create_pizza(pizza_creation_functions: PizzaCreationFunctions):\n\
    \    pizza_creation_functions.prepare_ingredients()\n    roll_out_pizza_base()\n\
    \    pizza_creation_functions.add_pre_bake_toppings()\n    bake_pizza()\n    pizza_creation_functions.add_post_bake_toppings()\n\
    ```\n\n现在，如果你想制作披萨，只需传入你自己的函数：\n\n```python\npizza_creation_functions = PizzaCreationFunctions(\n\
    \    prepare_ingredients=mix_zaatar,\n    add_pre_bake_toppings=add_meat_and_halloumi,\n\
    \    add_post_bake_toppings=drizzle_olive_oil\n)\n\ncreate_pizza(pizza_creation_functions)\n\
    ```\n\n这对于现在或未来的任何披萨来说都极其方便。随着新的披萨制作功能上线，开发者只需将他们的新函数传递给模板方法。这些开发者可以插入披萨制作算法的特定部分以满足他们的需求。他们根本不需要了解他们的用例；他们可以自由地扩展系统，而不会被遗留代码的修改所困扰。假设他们想制作烤肉披萨。我无需更改`create_pizza`，只需传入一个新的`PizzaCreationFunctions`：\n\
    \n```python\npizza_creation_functions = PizzaCreationFunctions(\n    prepare_ingredients=cook_bulgogi,\n\
    \    add_pre_bake_toppings=add_bulgogi_toppings,\n    add_post_bake_toppings=garnish_with_scallions_and_sesame\n\
    )\n\ncreate_pizza(pizza_creation_functions)\n```\n\n## 经典的模板方法模式\n\n四人帮书中描述的模板方法模式与我在本节中展示的有所不同。这是四人帮书籍严重依赖基于类和继承的设计的另一个例子。在原始的模板方法模式中，你需要编写一个基类：\n\
    \n```python\nclass PizzaCreator:\n    def roll_out_dough():\n        # 省略\n  \
    \  def bake():\n        # 省略\n    def serve():\n        # 省略\n\n    def prepare_ingredients():\n\
    \        raise NotImplementedError()\n\n    def add_pre_bake_toppings():\n   \
    \     raise NotImplementedError()\n\n    def add_post_bake_toppings():\n     \
    \   raise NotImplementedError()\n```\n\n> 要使用这个基类，你必须创建子类并覆盖三个必需的方法。然后，你必须找到一种方法将你的派生类替换到任何需要披萨制作器的代码中。你通常需要设置抽象工厂（四人帮书中发现的另一种设计模式）来注入派生类。\n\
    \n由于Python不要求所有内容都在类中，并且对函数提供一等支持，我更喜欢使用函数的数据类来填充模板。它涉及更少的样板代码，但仍提供类似的灵活性和可扩展性。只需注意，设计模式纯粹主义者可能更喜欢上面描述的面向对象模式。\n\
    \n## 策略模式\n\n模板方法模式非常适合替换算法的特定部分，但如果你想替换*整个*算法呢？一个非常相似的设计模式适用于这种用例：策略模式。\n\n策略模式用于将整个算法插入到上下文中。²\
    \ 对于终极厨房助手，考虑一个专门从事德州-墨西哥菜（一种融合美国西南部和墨西哥北部菜肴的地区性美国菜）的模块。大量的菜肴可以从一组共同的物品中制作出来；你以新的方式混合搭配不同的食材。\n\
    \n例如，你可以在大多数德州-墨西哥菜单上找到以下食材：玉米饼或面粉饼、豆子、碎牛肉、鸡肉、生菜、番茄、牛油果酱、莎莎酱和奶酪。从这些食材中，你可以制作墨西哥卷饼、炸玉米卷、墨西哥卷饼、墨西哥辣肉酱、塔可沙拉、玉米片、戈迪塔斯……列表还在继续。我不希望系统限制所有不同的德州-墨西哥菜肴；我希望不同的开发者团队来提供*如何*制作这些菜肴。\n\
    \n要使用策略模式实现这一点，我需要定义终极厨房助手做什么以及策略做什么。在这种情况下，终极厨房助手应该提供与食材交互的机制，但未来的开发者可以自由地使用*TexMexStrategy*不断添加新的德州-墨西哥混合菜肴。\n\
    \n与任何旨在可扩展的代码一样，我需要确保我的终极厨房助手和德州-墨西哥模块之间的交互就前置和后置条件达成一致，即什么被传递到德州-墨西哥模块，以及什么从中输出。\n\
    \n² Erich Gamma, Richard Helm, Ralph E. Johnson, and John Vlissides. *Design Patterns:\
    \ Elements of Reusable Object-Oriented Software*. Boston, MA: Addison-Wesley Professional,\
    \ 1994."
