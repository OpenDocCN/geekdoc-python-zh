    in Python, such as `float` or `str`. But what is a type? How does mastering types
    make your codebase stronger? Types are a fundamental underpinning of any programming
    language, but, unfortunately, most introductory texts gloss over just how types
    benefit your codebase (or if misused, those same types increase complexity).


