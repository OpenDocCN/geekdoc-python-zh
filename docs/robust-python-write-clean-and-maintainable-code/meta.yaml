    \ = sauces[:1]\n        self.toppings = sauce + \\n            [t for t in toppings\
    \ if not is_sauce(t)]\n```\n\nLet's break down this invariant checking:\n\n+ \
    \  - dough_radius_in_inches is an integer. This doesn't stop callers from passing\
    \ floats/strings/whatever into the constructor, but if used in conjunction with\
    \ a typechecker (like those you used in Part I), you can detect when callers pass\
