  md: 'dictionary is natural, such as API interactions or user-configurable data?
    For these cases, you should use a TypedDict.


    # TypedDict


    TypedDict, introduced in Python 3.8, is for the scenarios where you absolutely
    must store heterogeneous data in a dictionary. These are typically situations
    where you can''t avoid heterogeneous data. JSON APIs, YAML, TOML, XML, and CSVs
    all have easy-to-use Python modules that convert these data formats into a dictionary
    and are naturally heterogeneous. This means the data that gets returned has all
    the same problems as listed in the previous section. Your typechecker won''t help
    out much and users won''t know what keys and values are available.


    > If you have full control of the dictionary, meaning you create it in code you
    own and handle it in code you own, you should consider using a dataclass (see
    Chapter 9) or a class (see Chapter 10) instead.


    For example, suppose I want to augment my digital cookbook app to provide nutritional
    information for the recipes listed. I decide to use the Spoonacular API and write
    some code to get nutritional information:


    ```

    nutrition_information = get_nutrition_from_spoonacular(recipe_name)

    # print grams of fat in recipe

    print(nutrition_information["fat"]["value"])

    ```


    If you were reviewing the code, how would you know that this code is right? If
    you wanted to also print out the calories, how do you access the data? What guarantees
    do you have about the fields inside of this dictionary? To answer these questions,
    you have two options:


    +   - Look up the API documentation (if any) and confirm that the right fields
    are being used. In this scenario, you hope that the documentation is actually
    complete and correct.

    - Run the code and print out the returned dictionary. In this situation, you hope
    that test responses are pretty identical to production responses.


    The problem is that you are requiring every reader, reviewer, and maintainer to
    do one of these two steps in order to understand the code. If they don''t, you
    will not get good code review feedback and developers will run the risk of using
    the response incorrectly. This leads to incorrect assumptions and brittle code.
    TypedDict allows you to encode what you''ve learned about that API directly into
    your type system.'
