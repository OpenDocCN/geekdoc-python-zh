    \ you want your tests to answer. From there, you learned about three specific\
    \ types of testing: acceptance testing, property-based testing, and mutation testing.\
    \ All of these serve as ways of enhancing your existing testing strategy, building\
    \ a denser and stronger safety net around your codebase. With a strong safety\
    \ net, you will give future developers the confidence and flexibility to evolve\
    \ your system as they need.\n\nThis also concludes the book as a whole. It's been\
    \ a long journey, and you've learned a variety of tips, tools, and methods along\
    \ the way. You've dived deep into Python's type system, learned how writing your\
    \ own types benefit the codebase, and discovered how to write extensible Python.\
    \ Each part of this book has given you building blocks that will help your codebase\
    \ stand the test of time.\n\nWhile this is the end of the book, this is not the\
    \ end of the story of robustness in Python. Our relatively young industry continues\
    \ to evolve and transform, and as software continues to eat the world, the health\
    \ and maintainability of complex systems become paramount. I expect continuing\
    \ changes in how we understand software, and new tools and techniques to build\
    \ better systems.\n\nNever stop learning. Python will continue to evolve, adding\
    \ features and providing new tools. Each one of these has the potential to transform\
    \ how you write code. I can't predict the future of Python or its ecosystem. As\
    \ Python introduces new features, ask yourself about the intentions that feature\
    \ conveys. What do readers of code assume if they see this new feature? What do\
    \ they assume if that feature is not used? Understand how developers interact\
    \ with your codebase, and empathize with them to create systems that are pleasant\
    \ to develop in.\n\nFurthermore, take every single thing you've read in this book\
    \ and apply critical thought to it. Ask yourself: what value is provided and what\
    \ does it cost to implement? The last thing I want readers to do is take the advice\
    \ in this book as completely prescriptive and use it as a hammer to force codebases\
    \ to adhere to the standards that \"the book said to use\" (any developer who\
    \ worked in the '90s or '00s probably remembers \"Design Pattern Fever,\" where\
    \ you couldn't walk 10 steps without running into an AbstractInterfaceFactorySingleton).\
    \ Each of the concepts in this book should be seen as a tool in a toolbox; my\
    \ hope is that you've learned enough of the background context to make the right\
    \ decisions about how you use them.\n\nAbove all, remember that you are a human\
    \ working on a complex system, and other humans will work on these systems with\
    \ you and after you. Each person has their own motivations, their own goals, their\
    \ own dreams. Everybody will have their own challenges and struggles. Mistakes\
