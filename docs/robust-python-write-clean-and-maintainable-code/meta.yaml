  md: 'For this to work, you need to be diligent about what you pin. If any dependencies
    are unpinned, they shouldn''t depend on any other pinned dependency. Otherwise,
    when the unpinned dependencies change, they are liable to have a conflict with
    the pinned dependencies.


    Secondly, in order to pin dependencies, those dependencies actually need to be
    pinnable. The dependencies need to be represented as a specific commit or version
    number to reference. You cannot pin dependencies that are solely inside your codebase,
    such as an individual function or class.


    Lastly, you need to evaluate the likelihood of actually needing to update the
    pin at any time. Think about new features, security updates, or bug fixes that
    might happen. Any one of these will inevitably cause a pin to get updated. The
    longer you wait on updating a pin, the more changes that may have been introduced,
    incompatible with your codebase''s assumptions. This can make for a painful integration.


    If you foresee the need to change the pinning of a dependency, you need a strategy
    for updating those dependencies. I recommend keeping the dependencies pinned,
    but lean on a continuous integration workflow and dependency managers such as
    poetry to update those dependencies. With continuous integration, you are constantly
    scanning for new dependencies. When dependencies change, the tools will update
    the dependencies, run tests, and if tests pass, check in the new pins for the
    updated dependencies. This way, dependencies stay up to date, but you always maintain
    a checked-in set of pins for reproducibility. The downside here is that you need
    to have the discipline and supporting culture to fix the failed integrations as
    they appear. Tackling failures piecemeal is much less effort in the long run than
    delaying the integration.


    Carefully balance your use of dependencies. Your code will inherently have dependencies,
    and that is a good thing. The trick is to be smart with how you manage them. Being
    careless will lead to a sloppy, tangled mess. To learn how to handle dependencies,
    you first need to know how to identify the different types.


    # Types of Dependencies


    I group dependencies into three classifications: physical, logical, and temporal.
    Each impacts your code''s robustness in different ways. You have to be able to
    spot them and know when they go awry. When wielded correctly, dependencies can
    keep your code extensible without bogging it down.


    # Physical Dependencies


    When most developers think about dependencies, it''s the physical dependencies
    they think about. *Physical dependencies* are a relationship observed directly
    in code. Functions calling functions, types composed of other types, modules importing
    modules,'
