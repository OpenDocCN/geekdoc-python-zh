    \ one last thing as a contributor to robust code, and then start diving into the\
    \ meat of improving our codebase.\n\n## Duck Typing\n\nIt is perhaps an unwritten\
    \ law that whenever someone mentions duck typing, someone must reply with:\n\n\
    > If it walks like a duck and it quacks like a duck, then it must be a duck.\n\
    \nMy problem with this saying is that I find it completely unhelpful for explaining\
    \ what duck typing actually is. It's catchy, concise, and, crucially, only comprehensible\
    \ to those who already understand duck typing. When I was younger, I just nodded\
    \ politely, afraid that I was missing something profound in this simple phrase.\
    \ It wasn't until later on that I truly understood the power of duck typing.\n\
    \n*Duck typing* is the ability to use objects and entities in a programming language\
    \ as long as they adhere to some interface. It is a wonderful thing in Python,\
    \ and most people use it without even knowing it. Let's look at a simple example\
    \ to illustrate what I'm talking about:\n\n```\nfrom typing import Iterable\n\
    def print_items(items: Iterable):\n    for item in items:\n        print(item)\n\
    \nprint_items([1,2,3])\nprint_items({4, 5, 6})\nprint_items({\"A\": 1, \"B\":\
    \ 2, \"C\": 3})\n```\n\nIn all three invocations of `print_items`, we loop through\
    \ the collection and print each item. Think about how this works. `print_items`\
    \ has absolutely no knowledge of what type it will receive. It just receives a\
    \ type at runtime and operates upon it. It's not introspecting each argument and\
    \ deciding to do different things based on the type. The truth is much simpler.\
    \ Instead, all `print_items` is doing is checking that whatever is passed in can\
    \ be iterated upon (by calling an `__iter__` method). If the attribute `__iter__`\
    \ exists, it's called and the returned iterator is looped over.\n\nWe can verify\
    \ this with a simple code example:\n\n```\n>>> print_items(5)\n\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\"\
    , line 2, in print_items\nTypeError: 'int' object is not iterable\n\n>>> '__iter__'\
    \ in dir(int)\nFalse\n>>> '__iter__' in dir(list)\nTrue\n```\n\nDuck typing is\
    \ what makes this possible. As long as a type supports the variables and methods\
    \ used by a function, you can use that type in that function freely.\n\nHere's\
    \ another example:\n\n```\n>>> def double_value(value):\n...     return value\
    \ + value\n\n>>> double_value(5)\n10\n\n>>> double_value(\"abc\")\n\"abcabc\"\n\
    ```\n\nIt doesn't matter that we're passing an integer in one place or a string\
    \ in another; both support the + operator, so either will work just fine. Any\
    \ object that supports the + operator can be passed in. We can even do it with\
    \ a list:\n\n```\n>>> double_value([1, 2, 3])\n[1, 2, 3, 1, 2, 3]\n```\n\nSo how\
    \ does this play into robustness? It turns out that duck typing is a double-edged\
    \ sword. It can increase robustness because it increases composability (we'll\
    \ learn more about composability in Chapter 17). Building up a library of solid\
    \ abstractions able to handle a multitude of types lessens the need for complex\
    \ special cases. However, if duck typing is overused, you start to break down\
    \ assumptions that a developer can rely upon. When updating code, it's not simple\
    \ enough to just make the changes; you must look at all calling code and make\
    \ sure that the types passed into your function satisfy your new changes as well.\n\
    \nWith all this in mind, it might be best to reword the idiom earlier in this\
    \ section as such:\n\n> If it walks like a duck and quacks like a duck, and you\
    \ are looking for things that walk and quack like ducks, then you can treat it\
    \ as if it were a duck.\n\nDoesn't roll off the tongue as well, does it?"
  mdcn: "类型，你会通过编译器错误或运行时错误（有时声音相当大）被告知。像Haskell、TypeScript和Rust这样的语言都被认为是强类型的。强类型语言的支持者之所以大力推崇，是因为在构建或运行代码时，错误会更加明显。\n\
    \n相反，位于类型谱系较弱一端的语言不会将操作限制在支持它们的类型上。类型通常会被强制转换为不同的类型，以使操作有意义。像JavaScript、Perl和旧版本的C这样的语言是弱类型的。弱类型语言的支持者推崇开发者可以快速迭代代码，而无需与语言本身作斗争的速度。\n\
    \nPython位于类型谱系较强的一端。类型之间发生的隐式转换非常少。当你执行非法操作时，这一点很明显：\n\n```\n>>> [] + {}\nTypeError:\
    \ can only concatenate list (not \"dict\") to list\n\n>>> {} + []\nTypeError:\
    \ unsupported operand type(s) for +: 'dict' and list\n```\n\n与弱类型语言（如JavaScript）对比一下：\n\
    \n```\n>>> [] + {}\n\"[object Object]\"\n\n>>> {} + []\n0\n```\n\n在健壮性方面，像Python这样的强类型语言确实对我们有帮助。虽然错误仍然会在运行时而不是开发时出现，但它们仍然会以明显的TypeError异常形式出现。这显著减少了调试问题所需的时间，再次让你能够更快地交付增量价值。\n\
    \n## 弱类型语言天生就不健壮吗？\n\n弱类型语言的代码库完全可以是健壮的；我绝不是在贬低这些语言。想想世界上运行的大量生产级JavaScript代码。然而，弱类型语言需要格外小心才能保持健壮。很容易混淆变量的类型并做出错误的假设。开发者非常依赖代码检查工具、测试和其他工具来提高可维护性。\n\
    \n## 动态类型与静态类型\n\n我需要讨论另一个类型谱系：静态类型与动态类型。这本质上是处理类型机械表示方式的差异。\n\n提供静态类型的语言在构建时将类型信息嵌入到变量中。开发者可以显式地向变量添加类型信息，或者由编译器等工具为开发者推断类型。变量在运行时不会改变其类型（因此称为“静态”）。静态类型的支持者宣扬能够从一开始就编写安全代码，并受益于强大的安全网。\n\
    \n另一方面，动态类型将类型信息与值或变量本身嵌入在一起。变量在运行时可以很容易地改变类型，因为没有类型信息绑定到该变量。动态类型的支持者推崇开发的灵活性和速度；与编译器的斗争要少得多。\n\
    \nPython是一种动态类型语言。正如你在讨论机械表示时所看到的，变量的值内部嵌入了类型信息。Python在运行时改变变量类型时毫无顾虑：\n\n```\n\
    >>> a = 5\n>>> a = \"string\"\n>>> a\n\"string\"\n\n>>> a = tuple()\n>>> a\n()\n\
    ```\n\n不幸的是，在许多情况下，运行时改变类型的能力是健壮代码的障碍。你无法在整个变量生命周期内对其做出强有力的假设。当假设被打破时，很容易在其之上编写不稳定的假设，导致代码中出现定时逻辑炸弹。\n\
    \n**动态类型语言天生就不健壮吗？**\n\n就像弱类型语言一样，在动态类型语言中编写健壮的代码仍然是完全可能的。你只需要为此付出更多努力。你必须做出更审慎的决策，使你的代码库更具可维护性。另一方面，静态类型也不能保证健壮性；一个人可以只做类型方面的最低限度工作，而几乎看不到好处。\n\
    \n更糟糕的是，我之前展示的类型注解在运行时对这种行为没有影响：\n\n```\n>>> a: int = 5\n>>> a = \"string\"\n\
    >>> a\n\"string\"\n```\n\n没有错误，没有警告，什么都没有。但希望并未破灭，你有很多策略可以使代码更健壮（否则，这本书就会相当短了）。我们将讨论最后一个有助于健壮代码的因素，然后开始深入探讨改进代码库的核心内容。\n\
    \n## 鸭子类型\n\n或许有一条不成文的规定：每当有人提到鸭子类型时，必须有人回应：\n\n> 如果它走起来像鸭子，叫起来也像鸭子，那么它一定是鸭子。\n\
    \n我对这句话的问题在于，我发现它对于解释鸭子类型到底是什么完全没有帮助。它朗朗上口、简洁，而且关键的是，只有那些已经理解鸭子类型的人才能理解。我年轻时只是礼貌地点头，担心自己错过了这个简单短语中的深刻含义。直到后来，我才真正理解了鸭子类型的力量。\n\
    \n*鸭子类型*是指只要对象和实体遵循某种接口，就可以在编程语言中使用它们的能力。这在Python中是一件美妙的事情，大多数人甚至不知道自己在使用它。让我们看一个简单的例子来说明我在说什么：\n\
    \n```\nfrom typing import Iterable\ndef print_items(items: Iterable):\n    for\
    \ item in items:\n        print(item)\n\nprint_items([1,2,3])\nprint_items({4,\
    \ 5, 6})\nprint_items({\"A\": 1, \"B\": 2, \"C\": 3})\n```\n\n在所有三次调用`print_items`中，我们都遍历集合并打印每个项目。想想这是如何工作的。`print_items`完全不知道它将接收什么类型。它只是在运行时接收一个类型并对其进行操作。它不是在内省每个参数并根据类型决定做不同的事情。事实要简单得多。相反，`print_items`所做的只是检查传入的任何内容是否可以被迭代（通过调用`__iter__`方法）。如果属性`__iter__`存在，它就会被调用，并且返回的迭代器会被循环遍历。\n\
    \n我们可以通过一个简单的代码示例来验证这一点：\n\n```\n>>> print_items(5)\n\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"<stdin>\", line\
    \ 2, in print_items\nTypeError: 'int' object is not iterable\n\n>>> '__iter__'\
    \ in dir(int)\nFalse\n>>> '__iter__' in dir(list)\nTrue\n```\n\n鸭子类型使这成为可能。只要一个类型支持函数使用的变量和方法，你就可以在该函数中自由使用该类型。\n\
    \n这是另一个例子：\n\n```\n>>> def double_value(value):\n...     return value + value\n\
    \n>>> double_value(5)\n10\n\n>>> double_value(\"abc\")\n\"abcabc\"\n```\n\n无论我们是在一个地方传递整数还是在另一个地方传递字符串，这都不重要；两者都支持+运算符，所以两者都可以正常工作。任何支持+运算符的对象都可以传入。我们甚至可以用列表来做：\n\
    \n```\n>>> double_value([1, 2, 3])\n[1, 2, 3, 1, 2, 3]\n```\n\n那么，这如何影响健壮性呢？事实证明，鸭子类型是一把双刃剑。它可以增加健壮性，因为它增加了可组合性（我们将在第17章学习更多关于可组合性的内容）。构建一个能够处理多种类型的坚实抽象库，减少了对复杂特殊情况的需求。然而，如果鸭子类型被过度使用，你就会开始破坏开发者可以依赖的假设。在更新代码时，仅仅做出更改是不够的；你必须查看所有调用代码，并确保传入函数的类型也满足你的新更改。\n\
    \n考虑到所有这些，也许最好将本节前面的习语重新表述为：\n\n> 如果它走起来像鸭子，叫起来也像鸭子，并且你正在寻找走起来和叫起来像鸭子的东西，那么你可以把它当作鸭子来对待。\n\
    \n这样说起来就不那么顺口了，对吧？"
