- md: "## CHAPTER 22\nAcceptance Testing\n\nAs a developer, it is easy to focus on\
    \ the tests that directly surround your codebase: unit tests, integration tests,\
    \ UI tests, and the like. These tests verify that the code is doing what you intend.\
    \ They are an invaluable tool to keep your codebase regression free. They are\
    \ also completely the *wrong* tool for building what a customer expects.\n\nDevelopers\
    \ write these tests with full knowledge of the code, which means the tests are\
    \ biased toward that developer's expectations. There is no guarantee that this\
    \ tested behavior is actually what the *customer* wants, though.\n\nConsider the\
    \ following unit test:\n\n```\ndef test_chili_has_correct_ingredients():\n   \
    \ assert make_chili().ingredients() == [\n        \"Ground Beef\",\n        \"\
    Chile Blend\",\n        \"Onion\",\n        ...\n        \"Tomatoes\",\n     \
    \   \"Pinto Beans\"\n    ]\n```\n\nThis test might be airtight; it passes and\
    \ catches any regression made in the code. However, when presented to a customer,\
    \ you might be confronted with: “No, I wanted Texas-style chili! You know, no\
    \ tomatoes or beans?” All the unit tests in the world won't save you from building\
    \ the wrong thing.\n\nThis is where acceptance testing comes in. *Acceptance tests*\
    \ check that you are building the correct product. While unit tests and integration\
    \ tests are a form of *verification*, acceptance tests are *validation*. They\
    \ validate that you are building what the user expects.\n\nIn this chapter, you\
    \ will learn about acceptance testing in Python. I'll show you the behave framework,\
    \ which uses the Gherkin language to define requirements in a whole new fashion.¹\
    \ You'll walk through behavior-driven development (BDD) as a tool to clarify conversations.\
    \ Acceptance testing is a crucial part of building a safety net; it will protect\
    \ you from building the wrong thing.\n\n## Behavior-Driven Development\n\nThe\
    \ mismatch between customer expectations and software behavior is as old as software\
    \ development. The problem stems from translating natural language to programming\
    \ language. Natural language is rife with ambiguities, inconsistencies, and nuance.\
    \ Programming languages are rigid. The computer does exactly what you tell it\
    \ to do (even if it's not what you meant). Even worse, it's like a game of Telephone²\
    \ as the requirements get passed through a few people (customers, sales, managers,\
    \ testers) before the test is ever written.\n\nAs with everything in the software\
    \ life cycle, this error case only gets more costly the longer it takes to fix.\
    \ Ideally, you want to find out these issues as you're coming up with user requirements.\
    \ This is where behavior-driven development comes into play.\n\n## The Gherkin\
    \ Language\n\n*Behavior-driven development*, first pioneered by Daniel Terhorst-North,\
    \ is a practice that focuses on defining the behaviors in your system. BDD focuses\
    \ on clarifying communications; you iterate over the requirements with the end\
    \ user, defining the behaviors they want.\n\nBefore you write a single lick of\
    \ code, you make sure that you have agreement on what the right thing to build\
    \ is. The set of defined behaviors will *drive* what code you write. You work\
    \ with the end user (or their proxy, such as a business analyst or product manager)\
    \ to define your requirements as a specification. These specifications follow\
    \ a formal language, to introduce a bit more rigidity in their definition. One\
    \ of the most common languages for specifying requirements is Gherkin.\n\nGherkin\
    \ is a specification that follows the *Given-When-Then* (GWT) format. Every requirement\
    \ is organized as follows:\n\n> ¹ The Gherkin language was created by Aslak Hellesøy.\
    \ His wife suggested that his BDD testing tool be named Cucumber (apparently for\
    \ no specific reason), and he wanted to distinguish the specification language\
    \ from the testing tool itself. Since a gherkin is a small, pickled cucumber,\
    \ he continued the theme, and the Gherkin specification language was born.\n\n\
    > ² Telephone is a game where everyone sits in a circle, and one person whispers\
    \ a message to another. The message continues to get whispered around the circle\
    \ until it reaches the origin. Everyone has a laugh at how the message has gotten\
    \ distorted.\n\n```\nFeature: Name of test suite\n\nScenario: A test case\n  \
    \  Given some precondition\n    When I take some action\n    Then I expect this\
    \ result\n```\n\nFor instance, if I wanted to capture a requirement that checks\
    \ for vegan substitution of a dish, I would write it as follows:\n\n```\nFeature:\
    \ Vegan-friendly menu\n\nScenario: Can substitute for vegan alternative\n    Given\
    \ an order containing a Cheeseburger with Fries\n    When I ask for vegan substitutions\n\
    \    Then I receive the meal with no animal products\n```\n\nAnother requirement\
    \ might be that certain dishes can’t be made vegan:\n\n```\nScenario: Cannot substitute\
    \ vegan alternatives for certain meals\n    Given an order containing Meatloaf\n\
    \    When I ask for vegan substitutions\n    Then an error shows up stating the\
    \ meal is not vegan substitutable\n```\n\n> If the GWT format feels familiar,\
    \ that’s because it’s identical to the AAA test organization you learned about\
    \ in Chapter 21.\n\nBy working with your end users to write your requirements\
    \ in this fashion, you benefit from a few key principles:\n\n*Write using plain\
    \ language*\nThere’s no need to delve into any programming languages or formal\
    \ logic. Everything is written in a form that is intelligible to both business\
    \ people and developers. This makes it incredibly easy to home in on what the\
    \ end user actually wants.\n\n*Build a shared vocabulary*\nAs the number of requirements\
    \ increases, you find that you start having the same clauses in multiple requirements\
    \ (see above with When I ask for vegan substitutions). This builds up your domain\
    \ language and will make it easier for all involved parties to understand the\
    \ requirements.\n\n*Requirements are testable*\nThis is probably the biggest benefit\
    \ of this requirement format. Because you are writing the requirement as GWT,\
    \ you are inherently specifying an acceptance test to write. With the chili example\
    \ used in this chapter, imagine if the Gherkin test was specified as such:\n\n\
    ```\nScenario: Texas-Style Chili\nGiven a Chili-Making Machine\nWhen a Chili is\
    \ dispensed\nThen that dish does not contain beans\nAnd that dish does not contain\
    \ tomatoes\n```\n\nIt becomes much clearer what tests need to be written to act\
    \ as acceptance tests. If the Gherkin test has any ambiguities, you can work with\
    \ the end user to figure out what a concrete test should be. This can also help\
    \ with traditionally vague requirements such as, “The Chili-Making Machine should\
    \ be fast.” Instead, by focusing on a concrete test, you end up with a test like\
    \ this:\n\n```\nScenario: Chili order takes less than two minutes\nGiven a Chili-Making\
    \ Machine\nWhen a Chili is ordered\nThen the Chili is dispensed to the customer\
    \ within two minutes\n```\n\nThese requirements specifications are not a silver\
    \ bullet to eliminate bugs in requirements. They are instead a mitigation strategy.\
    \ If you have technical and business people review them before code is written,\
    \ you will have a better chance of discovering ambiguities or mismatched intentions.\n\
    \nOnce you start defining your tests in Gherkin, you can do something awesome:\
    \ you can make your specifications *executable*.\n\n## Executable Specifications\n\
    \n*Executable specifications* translate a set of requirements directly to code.\
    \ This means that not only are your requirements *testable*, but they are *tests*\
    \ as well. When the requirements change, your tests will change at the same time.\
    \ This is the ultimate form of *traceability*, or the ability to connect your\
    \ requirements to specific tests or code.\n\n**Discussion Topic**\nHow does your\
    \ organization track requirements? How do you trace those requirements to test\
    \ cases? How do you handle requirements changing? Discuss how your processes would\
    \ change if your requirements and tests were the same thing.\n\nThe Python module\
    \ `behave` allows you to back your Gherkin requirements with concrete tests. It\
    \ does so by associating functions with specific clauses in the requirement."
  mdcn: "## 第22章\n验收测试\n\n作为开发者，很容易将注意力集中在直接围绕代码库的测试上：单元测试、集成测试、UI测试等。这些测试验证代码是否按预期工作。它们是保持代码库无回归问题的宝贵工具。然而，它们完全不是构建客户期望产品的*正确*工具。\n\
    \n开发者编写这些测试时完全了解代码，这意味着测试偏向于该开发者的预期。但无法保证这种经过测试的行为确实是*客户*想要的。\n\n考虑以下单元测试：\n\n\
    ```\ndef test_chili_has_correct_ingredients():\n    assert make_chili().ingredients()\
    \ == [\n        \"Ground Beef\",\n        \"Chile Blend\",\n        \"Onion\"\
    ,\n        ...\n        \"Tomatoes\",\n        \"Pinto Beans\"\n    ]\n```\n\n\
    这个测试可能无懈可击；它通过了，并能捕获代码中的任何回归问题。然而，当展示给客户时，你可能会遇到这样的质疑：“不，我想要的是德州风味辣椒！你知道的，不加番茄和豆子？”世界上所有的单元测试都无法挽救你构建错误产品的命运。\n\
    \n这就是验收测试的用武之地。*验收测试*检查你是否构建了正确的产品。虽然单元测试和集成测试是一种*验证*形式，但验收测试是*确认*。它们确认你正在构建用户期望的产品。\n\
    \n在本章中，你将学习Python中的验收测试。我将向你展示behave框架，它使用Gherkin语言以全新的方式定义需求。¹ 你将了解行为驱动开发（BDD）作为澄清对话的工具。验收测试是构建安全网的关键部分；它将保护你免于构建错误的产品。\n\
    \n## 行为驱动开发\n\n客户期望与软件行为之间的不匹配与软件开发本身一样古老。问题源于将自然语言转换为编程语言。自然语言充满了歧义、不一致性和细微差别。编程语言是严格的。计算机完全按照你告诉它的去做（即使这不是你的本意）。更糟糕的是，当需求经过几个人（客户、销售、管理人员、测试人员）传递后才编写测试时，这就像一场传话游戏²。\n\
    \n与软件生命周期中的所有事情一样，这种错误情况修复得越晚，成本就越高。理想情况下，你希望在制定用户需求时就发现这些问题。这就是行为驱动开发发挥作用的地方。\n\
    \n## Gherkin语言\n\n*行为驱动开发*，最初由Daniel Terhorst-North提出，是一种专注于定义系统行为的实践。BDD专注于澄清沟通；你与最终用户反复讨论需求，定义他们想要的行为。\n\
    \n在编写任何代码之前，你确保就构建正确的产品达成一致。定义好的行为集合将*驱动*你编写的代码。你与最终用户（或其代理人，如业务分析师或产品经理）合作，将需求定义为规范。这些规范遵循一种形式化语言，以在定义中引入更多的严格性。最常用的需求规范语言之一是Gherkin。\n\
    \nGherkin是一种遵循*Given-When-Then*（GWT）格式的规范。每个需求都按如下方式组织：\n\n> ¹ Gherkin语言由Aslak\
    \ Hellesøy创建。他的妻子建议他的BDD测试工具命名为Cucumber（显然没有特定原因），他希望将规范语言与测试工具本身区分开来。由于gherkin是一种小的腌黄瓜，他延续了这个主题，Gherkin规范语言由此诞生。\n\
    \n> ² 传话游戏是一种游戏，所有人围成一圈，一个人向另一个人低声传递一条信息。信息继续在圈内低声传递，直到传回起点。每个人都为信息如何被扭曲而发笑。\n\
    \n```\nFeature: 测试套件名称\n\nScenario: 测试用例\n    Given 某些前置条件\n    When 我执行某些操作\n\
    \    Then 我期望这个结果\n```\n\n例如，如果我想捕获一个检查菜品是否可素食替代的需求，我会这样写：\n\n```\nFeature: 素食友好菜单\n\
    \nScenario: 可以替代为素食选项\n    Given 一份包含芝士汉堡和薯条的订单\n    When 我要求素食替代\n    Then 我收到不含动物产品的餐点\n\
    ```\n\n另一个需求可能是某些菜品不能做成素食：\n\n```\nScenario: 某些餐点不能替代为素食选项\n    Given 一份包含肉饼的订单\n\
    \    When 我要求素食替代\n    Then 显示错误信息，说明该餐点不可素食替代\n```\n\n> 如果GWT格式感觉很熟悉，那是因为它与你在第21章学到的AAA测试组织方式完全相同。\n\
    \n通过与最终用户合作以这种方式编写需求，你受益于几个关键原则：\n\n*使用自然语言编写*\n无需深入任何编程语言或形式逻辑。所有内容都以业务人员和开发者都能理解的形式编写。这使得专注于最终用户真正想要的内容变得极其容易。\n\
    \n*建立共享词汇表*\n随着需求数量的增加，你会发现多个需求中开始出现相同的子句（参见上面的When I ask for vegan substitutions）。这建立了你的领域语言，并将使所有相关方更容易理解需求。\n\
    \n*需求是可测试的*\n这可能是这种需求格式最大的好处。因为你是以GWT格式编写需求，所以你本质上是在指定一个要编写的验收测试。以本章使用的辣椒为例，想象一下如果Gherkin测试被指定为：\n\
    \n```\nScenario: 德州风味辣椒\nGiven 一台辣椒制作机\nWhen 辣椒被分发出来\nThen 该餐点不含豆子\nAnd 该餐点不含番茄\n\
    ```\n\n需要编写哪些测试作为验收测试就变得清晰多了。如果Gherkin测试有任何歧义，你可以与最终用户合作确定具体的测试应该是什么。这也有助于处理传统上模糊的需求，例如“辣椒制作机应该很快”。相反，通过专注于具体的测试，你最终会得到这样的测试：\n\
    \n```\nScenario: 辣椒订单在两分钟内完成\nGiven 一台辣椒制作机\nWhen 下达辣椒订单\nThen 辣椒在两分钟内分发给客户\n\
    ```\n\n这些需求规范不是消除需求中错误的银弹。它们是一种缓解策略。如果在编写代码之前让技术和业务人员审查它们，你将有更好的机会发现歧义或不匹配的意图。\n\
    \n一旦你开始用Gherkin定义测试，你就可以做一些很棒的事情：你可以让你的规范*可执行*。\n\n## 可执行规范\n\n*可执行规范*将一组需求直接转换为代码。这意味着你的需求不仅是*可测试的*，而且它们本身就是*测试*。当需求改变时，你的测试也会同时改变。这是*可追溯性*的最终形式，即将你的需求与特定测试或代码连接起来的能力。\n\
    \n**讨论主题**\n你的组织如何跟踪需求？你如何将这些需求追溯到测试用例？你如何处理需求变更？讨论如果你的需求和测试是同一回事，你的流程会如何改变。\n\
    \nPython模块`behave`允许你用具体的测试来支持你的Gherkin需求。它通过将函数与需求中的特定子句关联来实现这一点。"
