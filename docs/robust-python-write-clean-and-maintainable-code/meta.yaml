    \n![](img/d64d2be45ca85b398807d181202e7046_362_0.png)\n\nFigure 24-1. Example\
    \ mutmut report with junit2html\n\n## Adopting Mutation Testing\n\nMutation testing\
    \ is not widespread in the software development community today. I believe this\
    \ to be for three reasons:\n\n- People are unaware of it and the benefits it provides.\n\
    - A codebase's tests are not mature enough yet for useful mutation testing.\n\
    - The cost-to-value ratio is too high.\n\nThis book is actively working to improve\
    \ the first point, but the second and third points certainly have merit.\n\nIf\
    \ your codebase does not have a mature set of tests, you will see little value\
    \ in introducing mutation testing. It will end up providing too high of a noise-to-signal\
    \ ratio. You will see much more value from improving your test suite than trying\
    \ to find all the mutants. Consider running mutation testing on smaller parts\
    \ of your codebase that do have mature test suites.\n\nMutation testing does have\
    \ a high cost; it's important to maximize the value received in order to make\
    \ mutation testing worth it. Mutation tests are slow, by virtue of running test\
    \ suites multiple times. Introducing mutation testing to an existing codebase\
    \ is painful, as well. It is far easier to start on brand-new code from the beginning.\n\
    \nHowever, since you are reading a book about improving the robustness of potentially\
    \ complex codebases, there's a good chance you are working in an existing codebase.\
    \ Hope is not lost if you'd like to introduce mutation testing, though. As with\
    \ any method of improving robustness, the trick is to be selective in where you\
    \ run mutation testing.\n\nLook for areas of code that have lots of bugs. Look\
    \ through bug reports and find trends that indicate that a certain area of code\
    \ is troublesome. Also consider finding areas of code with high churn, as these\
    \ are the areas that are most likely to introduce a change that current tests\
    \ do not fully cover.² Find the areas where mutation testing will pay back the\
    \ cost multifold. You can use mutmut to run mutation testing selectively on just\
    \ these areas.\n\nAlso, mutmut comes with an option to mutation test only the\
    \ parts of your codebase that have *line coverage*. A line of code has *coverage*\
    \ by test suite if it is executed at least once by any test. Other coverage types\
    \ exist, such as API coverage and branch coverage, but mutmut focuses on line\
    \ coverage. mutmut will only generate mutants for code that you actually have\
    \ tests for in the first place.\n\n> ² You can find code with high churn by measuring\
    \ files with the highest number of commits. I found the following Git one-liner\
    \ after a quick Google search: `git rev-list --objects --all | awk '$2' | sort\
    \ -k2 | uniq -cf1 | sort -rn | head`. This was provided by sehe on [this Stack\
    \ Overflow question](https://stackoverflow.com/questions/10568859).\n\nTo generate\
    \ coverage, first install coverage:\n\n```\npip install coverage\n```\n\nThen\
    \ run your test suite with the coverage command. For the example above, I run:\n\
    \n```\ncoverage run -m pytest code_examples/chapter24\n```\n\nNext, all you have\
    \ to do is pass the --use-coverage flag to your mutmut run:\n\n```\nmutmut run\
    \ --paths-to-mutate code_examples/chapter24 --use-coverage\n```\n\nWith this,\
    \ mutmut will ignore any untested code, drastically reducing the amount of noise.\n\
    \n## The Fallacy of Coverage (and Other Metrics)\n\nAny time a way of measuring\
    \ code emerges, there is a rush to use that measurement as a *metric*, or a goal\
    \ that acts as a proxy predictor of business value. However, there have been numerous\
    \ ill-advised metrics through software development history, and none more infamous\
    \ than using lines of code written as an indicator of project progress. The thinking\
    \ went that if you could directly measure how much code any one person was writing,\
    \ you would be able to directly measure that person's productivity. Unfortunately,\
    \ this led developers to game the system and try to write intentionally verbose\
    \ code. This backfired as a metric, because the systems ended up complex and bloated,\
    \ and development slowed due to poor maintainability.\n\nAs an industry, we have\
    \ moved past measuring lines of code (I hope). However, where one metric disappears,\
    \ two more come to take its place. I've seen other maligned metrics emerge such\
    \ as number of bugs fixed or number of tests written. At face value, these are\
    \ good things to be doing, but the problem comes when they are scrutinized as\
    \ a metric tied to business value. There are ways to manipulate data in each of\
    \ these metrics. Are you being judged by the number of bugs fixed? Then, just\
    \ write more bugs in the first place!\n\nUnfortunately, code coverage has fallen\
    \ into the same trap in recent years. You hear goals such as “This code should\
    \ be 100% line covered” or “We should strive for 90% branch coverage.” This is\
    \ laudable in isolation, but it falls short of predicting business value. It misses\
    \ the point of *why* you want these goals in the first place.\n\nCode coverage\
    \ is a predictor of the absence of robustness, not quality as many assume. Code\
    \ with low coverage may or may not do everything you need; you don't know with\
    \ any reliability. It is a sign that you will have challenges with modifying the\
    \ code, as you do not have any sort of safety net built around that part of your\
    \ system."
