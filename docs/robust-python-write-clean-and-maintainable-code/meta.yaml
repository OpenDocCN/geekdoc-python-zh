  md: "# Annihilate\n\nTechnically, the *annihilate* stage is the last thing you do\
    \ in a test, but I’m covering it second. Why? Because it’s inherently tied to\
    \ your *arrange* step. Whatever you set up in *arrange* needs to be torn down\
    \ if it could influence other tests.\n\nYou want your tests to be isolated from\
    \ one another; it will make them easier to maintain. One of the biggest nightmares\
    \ for a test automation writer is having tests fail depending on what order they\
    \ run in (especially if you have thousands). This is a sure sign of tests having\
    \ subtle dependencies on one another. Clean up your tests before you leave them\
    \ and reduce the chances of tests interacting with one another. Here are some\
    \ strategies for dealing with test cleanup.\n\n**Don’t use shared resources.**\
    \ If you can get away with it, share nothing between tests. This isn’t always\
    \ feasible, but it should be your goal. If no tests share any resources, then\
    \ you don’t need to clean anything up. A shared resource can be in Python (global\
    \ variable, class variables) or in the environment (database, file access, socket\
    \ pools).\n\n**Use context managers.** Use a context manager (discussed in Chapter\
    \ 11) to ensure that resources are always cleaned up. In my previous example,\
    \ eagle-eyed readers may have noticed a bug:\n\n```\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Bacon\"\
    , calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"Bacon\")\n\n\
    \    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert calories\
    \ == 1200\n\n    cleanup_database()\n```\n\nIf the assertion fails, an exception\
    \ is raised and `cleanup_database` never executes. It would be much better to\
    \ force usage through a context manager:\n\n```\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    with construct_test_database() as db:\n        db.add_ingredient(\"Bacon\"\
    , calories_per_pound=2400)\n        setup_bacon_cheeseburger(bacon=\"Bacon\")\n\
    \n        calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n       \
    \ assert calories == 1200\n```\n\nPut your cleanup code in the context manager\
    \ so that your test writers never have to actively think about it; it’s just done\
    \ for them."
  merge: -1
  pgno: 327
- img_proc: true
  md: "**Use fixtures.** If you are using pytest fixtures, you can use them much like\
    \ you could a context manager. You can *yield* values from a fixture, allowing\
    \ you to return to the fixture's execution after the test finishes. Observe:\n\
    \n```\npython\nimport pytest\n\n@pytest.fixture\ndef db_creation():\n    # ...\
    \ snip  set up local sqlite database\n    return database\n\n@pytest.fixture\n\
    def test_database(db_creation):\n    # ... snip adding all ingredients and meals\n\
    \    try:\n        yield database\n    finally:\n        database.cleanup()\n\n\
    def test_calorie_calculation_bacon_cheeseburger(test_database):\n    test_database.add_ingredient(\"\
    Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"Bacon\"\
    )\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert\
    \ calories == 1200\n```\n\nNotice how the test_database fixture now yields the\
    \ database. When any test using this function finishes (whether it passes or fails),\
    \ the database cleanup function will always execute.\n\n# Act\n\nThe *act* stage\
    \ is the most important part of the test. It embodies the actual operation that\
    \ you are testing. In the preceding examples, the *act* stage was getting the\
    \ calories for a specific dish. You do not want an *act* stage to be much longer\
    \ than one or two lines of code. Less is more; by keeping this stage small, you\
    \ reduce the time it takes readers to understand the meat of the test.\n\nSometimes,\
    \ you want to reuse the same *act* stage across multiple tests. If you find yourself\
    \ wanting to write the same test on the same action, but with slightly different\
    \ input data and assertions, consider *parameterizing* your tests. Test *parameterization*\
    \ is a way of running the same test on different parameters. This allows you to\
    \ write *table-driven* tests, or a way of organizing your test data in a tabular\
    \ form."
