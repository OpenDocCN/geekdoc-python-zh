- img_proc: true
  md: "Consider:\n\n```\nclass Kitchenware(IntEnum):\n    # Note to future programmers:\
    \ these numbers are customer-defined\n    # and apt to change\n    PLATE = 7\n\
    \    CUP = 8\n    UTENSILS = 9\n```\n\nSuppose somebody were to mistakenly do\
    \ the following:\n\n```\ndef pour_liquid(volume: ImperialLiquidMeasure):\n   \
    \ if volume == Kitchenware.CUP:\n        pour_into_smaller_vessel()\n    else:\n\
    \        pour_into_larger_vessel()\n```\n\nIf this makes it into production, it\
    \ will be just fine, no exceptions thrown, all tests pass. However, once the Kitchenware\
    \ enumeration changes (maybe it adds a BOWL into value 8 and moves CUP to 10),\
    \ this code will now do the exact opposite of what it was supposed to. Kitchenware.CUP\
    \ is no longer the same as an ImperialLiquidMeasure.CUP (there's no reason they\
    \ should be linked); then you'll start pouring into larger vessels instead of\
    \ smaller vessels, which probably will create an overflow (of your liquid, not\
    \ of an integer).\n\nThis is a textbook example of how unrobust code can lead\
    \ to subtle mistakes that won't become an issue until much later in the codebase's\
    \ life. This may be a quick fix, but the bug incurs a very real cost. Tests fail\
    \ (or worse, a customer complains about pouring the wrong amount of liquid into\
    \ a vessel), someone has to go crawl through the source code, find the bug, fix\
    \ it, then take a long coffee break after wondering how this ever worked. All\
    \ because somebody decided to be lazy and use an IntEnum so that they wouldn't\
    \ have to type out .value over and over again. So pay your future maintainers\
    \ a favor: don't use IntEnum unless you absolutely have to for legacy purposes.\n\
    \n# Unique\n\nOne great feature of enumerations is the ability to alias values.\
    \ Let's go back to the MotherSauce enumeration. Maybe the codebase developed on\
    \ French keyboards needs to be adapted to US keyboards, where the keyboard layout\
    \ is not conducive to adding accent marks over vowels. Removing the accents to\
    \ anglicize the native French spelling is a nonstarter for many of the developers\
    \ (they insist we use the original spelling). To avoid an international incident,\
    \ I will add an alias to some of the sauces.\n\n```\nfrom enum import Enum\nclass\
    \ MotherSauce(Enum):\n    BÉCHAMEL = \"Béchamel\"\n```"
