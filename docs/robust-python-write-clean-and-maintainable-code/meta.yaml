    Once you get used to protocols, inheritance appears redundant. While inheritance
    makes a lot of sense for nominal subtyping, it is too heavyweight for anything
    regarding structural subtyping. You are introducing linkages that don''t need
    to be there, increasing the maintenance cost of your system.


    To decide whether to use a protocol or subclass, I want you to remember the lessons
    learned in Chapter 12. Anything subclassing another class or adhering to a protocol
    is a subtype. Therefore, it needs to uphold the contract of the parent type. If
    the contract just defines the structure of the type (such as being Splittable,
    which just needed certain attributes to be defined), use a protocol. However,
    if the parent type''s contract defines behaviors that need to be upheld, such
    as how to operate in certain conditions, use inheritance to better reflect the
    *is-a* relationship.


