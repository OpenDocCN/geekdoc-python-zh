  md: 'Less fragility

    When testing for specific input/output combinations, you are at the mercy of a
    slew of hard-coded assumptions. You assume that lists will always be in the same
    order, that dictionaries won''t get any key-value pairs added to them, and that
    your dependencies will never change their behavior. Any one of these seemingly
    unrelated changes can break one of your tests.


    When tests break for reasons unrelated to the functionality under test, it''s
    frustrating. The tests get a bad reputation for being flaky, and either they get
    ignored (masking true failures), or developers live with the constant nagging
    of needing to fix tests. Use property-based testing to add resilience to your
    testing.


    Better chance at finding bugs

    Property-based testing isn''t just about reducing the cost of test creation and
    maintenance. It will increase your chances of finding bugs. Even if you write
    your tests covering every path through your code today, there''s still a chance
    that you haven''t caught everything. If your functions change in a backward-incompatible
    way (say, by now erroring out on a value that you previously thought was fine),
    your luck depends on if you have a test case for that specific value. Property-based
    testing, by the nature of generating new test cases, will have a better chance
    of finding that bug over multiple runs.


    ![](img/d64d2be45ca85b398807d181202e7046_350_0.png)


    **Discussion Topic**

    Examine your current test cases and pick tests that are complicated to read. Search
    for tests that require a large amount of inputs and outputs to adequately test
    functionality. Discuss how property-based testing can replace these tests and
    simplify your test suite.


    # Getting the Most Out of Hypothesis


    I''ve just scratched the surface of Hypothesis so far. Once you really dive into
    property-based testing, you start opening up tons of doors for yourself. Hypothesis
    ships with some pretty cool features out of the box that can improve your testing
    experience.


    # Hypothesis Strategies


    In the previous section, I introduced you to the `integers()` strategy. A Hypothesis
    strategy defines how test cases are generated, as well as how the data gets shrunk
    when a test case fails. Hypothesis ships with a ton of strategies right out of
    the box. Similar to passing `integers()` into your test case, you can pass things
    like `floats()`, `text()`, or `times()` to generate values for floating-point
    numbers, strings, or date time.time objects, respectively.'
