  md: 'There is no simple way for you to force a user to construct this dictionary
    correctly. You would have to rely on callers doing the right thing in every invocation
    (which will only become more difficult as the codebase grows). There is also no
    way to prevent users from modifying the dictionary freely and breaking invariants.


    ![](img/d64d2be45ca85b398807d181202e7046_161_0.png)


    It''s true, you could define methods that construct dictionaries after checking
    invariants, and only mutate the dictionary through functions that also check invariants.
    Or, you could certainly write a constructor and invariant-checking methods on
    data classes. But if you go through all that trouble, why not write a class? Be
    mindful of what your choices communicate to future maintainers. You must be deliberate
    between your choice of dictionaries, data classes and classes. Each of these abstractions
    conveys a very specific meaning, and if you choose the wrong one, you''ll confuse
    maintainers.


    There''s another benefit that I haven''t talked about, and it relates to the “S”
    in SOLID (see the next sidebar): the Single Responsibility Principle. The Single
    Responsibility Principle states that each object “should have one and only one
    reason to change.”² It sounds simple, but in practice it can be a struggle to
    know exactly how granular *one* reason to change is. My suggestion to you is to
    define a set of related invariants (such as your dough and toppings) and write
    a class per set of related invariants. If you ever find yourself writing attributes
    or methods that do not directly relate to one of those invariants, your class
    has low *cohesion*, which means it has too many responsibilities.


