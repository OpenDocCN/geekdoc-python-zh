  md: '# Simple Events


    The simplest case for event-oriented architectures is dealing with *simple events*
    such as acting or alerting you when certain conditions change. Your producer of
    information is the one sending the event, and your consumer receives and acts
    upon the event. There are two typical ways of implementing this: with or without
    a message broker.


    # Using a Message Broker


    A message broker is a specific piece of code that acts as a transport of data.
    Producers will publish data, known as a message, to a specific *topic* on the
    message broker. The topic is simply a unique identifier, such as a string. It
    could be something simple, like “orders,” or complex, like “sandwich order is
    finished.” It’s just a namespace that distinguishes one message channel from another.
    Consumers use the same identifier to *subscribe* to a topic. The message broker
    then sends the message to all consumers subscribed to the topic. This type of
    system is also known as *publisher/subscriber*, or pub/sub for short. Figure 18-2
    shows a hypothetical pub/sub architecture.


    ![](img/d64d2be45ca85b398807d181202e7046_281_0.png)


    For this chapter, I will design the notification system for an automated drone
    delivery service for restaurants. When a customer order is cooked, the drone system
    kicks into action, picks up the order, and delivers the meal to the correct address.
    There are five notifications that happen in this system, and I’ve broken them
    down into producer–consumer in Table 18-2.


    Table 18-2. Producers and consumers in the automated drone delivery system


    | Producer | Consumer |

    | :--- | :--- |

    | Meal has finished cooking | Drone is notified for pickup |

    | Meal has finished cooking | Customer is notified that the meal is cooked |

    | Drone is en route | Customer is notified about an ETA |

    | Drone has delivered meal | Customer is notified about delivery |

    | Drone has delivered meal | Restaurant is notified about delivery |'
