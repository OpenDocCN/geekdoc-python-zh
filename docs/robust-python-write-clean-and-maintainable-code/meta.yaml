  raw:
  - "[PAGE 325]\n\nA *fixture* in pytest is a way of specifying initialization and\
    \ teardown code for tests. Fixtures offer a ton of useful features, like defining\
    \ dependencies on other fixtures (letting pytest control initialization order)\
    \ and controlling initialization so that a fixture is only initialized once per\
    \ module. In the previous example, we could have used a fixture for the test_database:\n\
    \n```\nimport pytest\n\n@pytest.fixture\ndef db_creation():\n    # ... snip set\
    \ up local sqlite database\n    return database\n\n@pytest.fixture\ndef test_database(db_creation):\n\
    \    # ... snip adding all ingredients and meals\n    return database\n\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n\n    test_database.cleanup()()\n```\n\nNotice how\
    \ the test has an argument for test_database now. This is the fixture at work;\
    \ the function test_database (as well as db_creation) will get called before the\
    \ test. Fixtures only become more useful as the number of tests grows. They are\
    \ composable, allowing you to mix them together and reduce code duplication. I\
    \ won't generally use them to abstract code in a single file, but as soon as that\
    \ initialization needs to be used in multiple files, fixtures are the way to go.\n\
    \n**Mocking.** Python offers duck typing (first mentioned in Chapter 2) as part\
    \ of its type system, which means that you can easily substitute types for one\
    \ another as long as they uphold the same contract (as discussed in Chapter 12).\
    \ This means that you can tackle complex dependencies in a completely different\
    \ way: use a simple mocked object instead. A *mocked* object is something that\
    \ looks identical to a production object as far as methods and fields go, but\
    \ offers simplified data.\n\n![](img/d64d2be45ca85b398807d181202e7046_325_0.png)\n\
    \nMocks are used a lot in unit tests, but you will see their usage decline the\
    \ less granular the tests become. This is because you try to test more of the\
    \ system at a higher level; the services you are mocking are often part of the\
    \ tests."
  - "[PAGE 326]\n\nFor instance, if the database in the previous example was quite\
    \ complex to set up with multiple tables and schemas, it might not be worth setting\
    \ up for every test, especially if tests share a database; you want to keep tests\
    \ isolated from one another. (I'll cover this more in a moment.) The class handling\
    \ the database might look like this:\n\n```\nclass DatabaseHandler:\n    def __init__(self):\n\
    \        # ... snip complex setup\n\n    def add_ingredient(self, ingredient):\n\
    \        # ... snip complex queries\n\n    def get_calories_for_ingredient(self,\
    \ ingredient):\n        # ... snip complex queries\n```\n\nInstead of using this\
    \ class verbatim, create a mock class that just looks like a database handler:\n\
    \n```\nclass MockDatabaseHandler\n    def __init__(self):\n        self.data =\
    \ {\n            \"Ground Beef\": 1500,\n            \"Bacon\": 2400,\n      \
    \      # ... snip ...\n        }\n\n    def add_ingredient(self, ingredient):\n\
    \        name, calories = ingredient\n        self.data[name] = calories\n\n \
    \   def get_calories_for_ingredient(self, ingredient):\n        return self.data[ingredient]\n\
    ```\n\nWith the mock, I'm just using a simple dictionary to store my data. How\
    \ you mock your data will be different for each scenario, but if you can find\
    \ a way to substitute the real object with a mock object, you can dramatically\
    \ reduce the complexity of your setup.\n\n![](img/d64d2be45ca85b398807d181202e7046_326_0.png)\n\
    \nSome people use *monkeypatching*, or swapping out methods at run-time to inject\
    \ mocks. This is OK in moderation, but if you find your tests littered with monkeypatching,\
    \ this is an antipattern. It means that you have far too rigid a physical dependency\
    \ between different modules and should look at finding ways to make your system\
    \ more modular. (Consult **Part III** for more ideas on making code extensible.)"
  - "[PAGE 327]\n\n# Annihilate\n\nTechnically, the *annihilate* stage is the last\
    \ thing you do in a test, but I’m covering it second. Why? Because it’s inherently\
    \ tied to your *arrange* step. Whatever you set up in *arrange* needs to be torn\
    \ down if it could influence other tests.\n\nYou want your tests to be isolated\
    \ from one another; it will make them easier to maintain. One of the biggest nightmares\
    \ for a test automation writer is having tests fail depending on what order they\
    \ run in (especially if you have thousands). This is a sure sign of tests having\
    \ subtle dependencies on one another. Clean up your tests before you leave them\
    \ and reduce the chances of tests interacting with one another. Here are some\
    \ strategies for dealing with test cleanup.\n\n**Don’t use shared resources.**\
    \ If you can get away with it, share nothing between tests. This isn’t always\
    \ feasible, but it should be your goal. If no tests share any resources, then\
    \ you don’t need to clean anything up. A shared resource can be in Python (global\
    \ variable, class variables) or in the environment (database, file access, socket\
    \ pools).\n\n**Use context managers.** Use a context manager (discussed in Chapter\
    \ 11) to ensure that resources are always cleaned up. In my previous example,\
    \ eagle-eyed readers may have noticed a bug:\n\n```\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Bacon\"\
    , calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"Bacon\")\n\n\
    \    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert calories\
    \ == 1200\n\n    cleanup_database()\n```\n\nIf the assertion fails, an exception\
    \ is raised and `cleanup_database` never executes. It would be much better to\
    \ force usage through a context manager:\n\n```\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    with construct_test_database() as db:\n        db.add_ingredient(\"Bacon\"\
    , calories_per_pound=2400)\n        setup_bacon_cheeseburger(bacon=\"Bacon\")\n\
    \n        calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n       \
    \ assert calories == 1200\n```\n\nPut your cleanup code in the context manager\
    \ so that your test writers never have to actively think about it; it’s just done\
    \ for them."
  - "[PAGE 328]\n\n**Use fixtures.** If you are using pytest fixtures, you can use\
    \ them much like you could a context manager. You can *yield* values from a fixture,\
    \ allowing you to return to the fixture's execution after the test finishes. Observe:\n\
    \n```\npython\nimport pytest\n\n@pytest.fixture\ndef db_creation():\n    # ...\
    \ snip  set up local sqlite database\n    return database\n\n@pytest.fixture\n\
    def test_database(db_creation):\n    # ... snip adding all ingredients and meals\n\
    \    try:\n        yield database\n    finally:\n        database.cleanup()\n\n\
    def test_calorie_calculation_bacon_cheeseburger(test_database):\n    test_database.add_ingredient(\"\
    Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"Bacon\"\
    )\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert\
    \ calories == 1200\n```\n\nNotice how the test_database fixture now yields the\
    \ database. When any test using this function finishes (whether it passes or fails),\
    \ the database cleanup function will always execute.\n\n# Act\n\nThe *act* stage\
    \ is the most important part of the test. It embodies the actual operation that\
    \ you are testing. In the preceding examples, the *act* stage was getting the\
    \ calories for a specific dish. You do not want an *act* stage to be much longer\
    \ than one or two lines of code. Less is more; by keeping this stage small, you\
    \ reduce the time it takes readers to understand the meat of the test.\n\nSometimes,\
    \ you want to reuse the same *act* stage across multiple tests. If you find yourself\
    \ wanting to write the same test on the same action, but with slightly different\
    \ input data and assertions, consider *parameterizing* your tests. Test *parameterization*\
    \ is a way of running the same test on different parameters. This allows you to\
    \ write *table-driven* tests, or a way of organizing your test data in a tabular\
    \ form."
- md: "Here is the get_calories test with parameterization:\n\n```python\n@pytest.mark.parametrize(\n\
    \    \"extra_ingredients,dish_name,expected_calories\",\n    [\n        ([\"Bacon\"\
    , 2400], \"Bacon Cheeseburger\", 900),\n        ([],  \"Cobb Salad\", 1000),\n\
    \        ([],  \"Buffalo Wings\", 800),\n        ([],  \"Garlicky Brussels Sprouts\"\
    , 200),\n        ([],  \"Mashed Potatoes\", 400)\n    ]\n)\ndef test_calorie_calculation_bacon_cheeseburger(extra_ingredients,\n\
    \                                                dish_name,\n                \
    \                                expected_calories,\n                        \
    \                        test_database):\n    for ingredient in extra_ingredients:\n\
    \        test_database.add_ingredient(ingredient)\n\n    # assume this function\
    \ can set up any dish\n    # alternatively, dish ingredients could be passed in\
    \ as a test parameter\n    setup_dish_ingredients(dish_name)\n\n    calories =\
    \ get_calories(dish_name)\n\n    assert calories == expected_calories\n```\n\n\
    You define your parameters as a list of tuples, one per test case. Each parameter\
    \ is passed to the test case as an argument. pytest automatically will run this\
    \ test, once per parameter set.\n\nParameterized tests have the benefit of condensing\
    \ a lot of test cases into one function. Readers of the test can just go down\
    \ through the table listed in the parameterization to understand what expected\
    \ input and output is (Cobb salad should have 1,000 calories, mashed potatoes\
    \ should have 400 calories, and so on).\n\n> Parameterization is a great way to\
    \ separate the test data from the actual test (similar to separating policy and\
    \ mechanisms, as discussed in Chapter 17). However, be careful. If you make your\
    \ tests too generic, it will be harder to ascertain what they are testing. Avoid\
    \ using more than three or four parameters if you can.\n\n## Assert\n\nThe last\
    \ step to do before cleaning up is *asserting* some property is true about the\
    \ system. Preferably, there should be one logical assertion near the end of your\
    \ test. If you find yourself jamming too many assertions into a test, you either\
    \ have too many actions in your test or too many tests matched into one. When\
    \ a test has too many responsibilities, it makes it harder for maintainers to\
    \ debug software. If they make a change that produces a failed test, you want\
    \ them to be able to quickly find out what the problem is. Ideally, they can figure\
    \ out what's wrong based on the test name, but at the very least, they should\
    \ be able to open up the test, look for about 20 or 30 seconds, and realize what\
    \ went wrong. If you have multiple assertions, you have multiple reasons a test\
    \ can go wrong, and it will take maintainers time to sort through them.\n\nThis\
    \ doesn't mean that you should only have one *assert* statement; it is OK to have\
    \ a few *assert* statements as long as they are all involved in testing the same\
    \ property. Make your assertions verbose as well, so that developers get an informative\
    \ message when things go wrong. In Python, you can supply a text message that\
    \ gets passed along with the AssertionError to help with debugging.\n\n```python\n\
    def test_calorie_calculation_bacon_cheeseburger(test_database):\n    test_database.add_ingredient(\"\
    Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"Bacon\"\
    )\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert\
    \ calories == 1200, \"Incorrect calories for Bacon Cheeseburger w/ Fries\"\n```\n\
    \npytest rewrites assertion statements, which also provides an extra level of\
    \ debug messages. If the above test were to fail, the message returned to the\
    \ test writer would be:\n\n```\nE       AssertionError: Incorrect calories for\
    \ Bacon Cheeseburger w/ Fries\nE       assert 1100 == 1200\n```\n\nFor more complex\
    \ assertions, build up an assertion library that makes it incredibly easy to define\
    \ new tests. This is like building a vocabulary in your codebase; you want a diverse\
    \ set of concepts to share in your test code as well. For this, I recommend using\
    \ Hamcrest matchers.⁵\n\n*Hamcrest matchers* are a way of writing assertions to\
    \ read similarly to natural language. The PyHamcrest library supplies common matchers\
    \ to help you write your asserts. Take a look at how it uses custom assertion\
    \ matchers to make tests more clear:\n\n```python\nfrom hamcrest import assert_that,\
    \ matches_regexp, is_, empty, equal_to\n\ndef test_all_menu_items_are_alphanumeric():\n\
    \    menu = create_menu()\n    for item in menu:\n        assert_that(item, matches_regexp(r'[a-zA-Z0-9\
    \ ]'))\n\ndef test_getting_calories():\n    dish = \"Bacon Cheeseburger w/ Fries\"\
    \n    calories = get_calories(dish)\n    assert_that(calories, is_(equal_to(1200)))\n\
    \ndef test_no_restaurant_found_in_non_matching_areas():\n    city = \"Huntsville,\
    \ AL\"\n    restaurants = find_owned_restaurants_in(city)\n    assert_that(restaurants,\
    \ is_(empty()))\n```\n\nThe real strength of PyHamcrest is that you can define\
    \ your own matchers.⁶ Here’s an example of a matcher for checking if a dish is\
    \ vegan:\n\n```python\nfrom hamcrest.core.base_matcher import BaseMatcher\nfrom\
    \ hamcrest.core.helpers.hasmethod import hasmethod\n\ndef is_vegan(ingredient:\
    \ str) -> bool:\n    return ingredient not in [\"Beef Burger\"]\n\nclass IsVegan(BaseMatcher):\n\
    \n    def _matches(self, dish):\n        if not hasmethod(dish, \"ingredients\"\
    ):\n            return False\n        return all(is_vegan(ingredient) for ingredient\
    \ in dish.ingredients())\n\n    def describe_to(self, description):\n        description.append_text(\"\
    Expected dish to be vegan\")\n\n    def describe_mismatch(self, dish, description):\n\
    \        message = f\"the following ingredients are not vegan: \"\n        message\
    \ += \", \".join(ing for ing in dish.ingredients()\n                         \
    \    if not is_vegan(ing))\n        description.append_text(message)\n\ndef vegan():\n\
    \    return IsVegan()\n\nfrom hamcrest import assert_that, is_\n\ndef test_vegan_substitution():\n\
    \    dish = create_dish(\"Hamburger and Fries\")\n    dish.make_vegan()\n    assert_that(dish,\
    \ is_(vegan()))\n```\n\nIf the test fails, you get the following error:\n\n```\n\
    def test_vegan_substitution():\n    dish = create_dish(\"Hamburger and Fries\"\
    )\n    dish.make_vegan()\n    assert_that(dish, is_(vegan()))\nE    AssertionError:\n\
    E    Expected: Expected dish to be vegan\nE        but: the following ingredients\
    \ are not vegan: Beef Burger\n```\n\n**Discussion Topic**\n\nWhere in your tests\
    \ can you use custom matchers? Discuss what a shared testing vocabulary would\
    \ be in your tests and how custom matchers would improve readability.\n\n## Closing\
    \ Thoughts\n\nJust like a tightrope walker's safety net, tests give you comfort\
    \ and confidence as you work. It's not just about finding bugs. Tests verify that\
    \ what you build is performing as you expect. They give future collaborators leeway\
    \ to make more risky changes; they know that if they fall, the tests will catch\
    \ them. You will find that regressions become more rare, and your codebase becomes\
    \ easier to work in.\n\nHowever, tests are not free. There is a cost to writing,\
    \ running, and maintaining them. You need to be careful how you spend your time\
    \ and effort. Use well-known patterns in constructing tests to minimize the cost:\
    \ follow the AAA pattern, keep each stage small, and make your tests clear and\
    \ readable. Your tests are just as important as your codebase. Treat them with\
    \ just as much respect and make them robust.\n\nIn the next chapter, I will focus\
    \ on acceptance tests. Acceptance tests have a different purpose than unit or\
    \ integration tests, and some of the patterns you use will differ.\n\nYou will\
    \ learn about how acceptance tests create conversations, as well as how they make\
    \ sure your codebase is doing the right thing for your customers. They are an\
    \ invaluable tool for your codebase in delivering value.\n\n---\n⁵ Hamcrest is\
    \ an anagram of \"matchers.\"\n⁶ Check out the PyHamcrest documentation for more\
    \ information, such as additional matchers or integrating with test frameworks.\n\
    312 | Chapter 21: Testing Strategy"
  mdcn: "以下是使用参数化的 `get_calories` 测试：\n\n```python\n@pytest.mark.parametrize(\n  \
    \  \"extra_ingredients,dish_name,expected_calories\",\n    [\n        ([\"Bacon\"\
    , 2400], \"Bacon Cheeseburger\", 900),\n        ([],  \"Cobb Salad\", 1000),\n\
    \        ([],  \"Buffalo Wings\", 800),\n        ([],  \"Garlicky Brussels Sprouts\"\
    , 200),\n        ([],  \"Mashed Potatoes\", 400)\n    ]\n)\ndef test_calorie_calculation_bacon_cheeseburger(extra_ingredients,\n\
    \                                                dish_name,\n                \
    \                                expected_calories,\n                        \
    \                        test_database):\n    for ingredient in extra_ingredients:\n\
    \        test_database.add_ingredient(ingredient)\n\n    # 假设此函数可以设置任何菜品\n   \
    \ # 或者，也可以将菜品成分作为测试参数传入\n    setup_dish_ingredients(dish_name)\n\n    calories\
    \ = get_calories(dish_name)\n\n    assert calories == expected_calories\n```\n\
    \n你将参数定义为一个元组列表，每个元组对应一个测试用例。每个参数集都会作为参数传递给测试用例。pytest 会自动为每个参数集运行一次此测试。\n\n参数化测试的好处在于，它能将大量测试用例浓缩到一个函数中。测试的读者只需查看参数化中列出的表格，就能理解预期的输入和输出（例如，Cobb\
    \ 沙拉应有 1000 卡路里，土豆泥应有 400 卡路里，等等）。\n\n> 参数化是将测试数据与实际测试分离的好方法（类似于第 17 章讨论的策略与机制分离）。但需注意，如果你的测试过于通用，将更难确定它们在测试什么。如果可能，避免使用超过三到四个参数。\n\
    \n## 断言\n\n清理前的最后一步是*断言*系统的某个属性为真。理想情况下，测试末尾应有一个逻辑断言。如果你发现自己在一个测试中塞入了太多断言，那么要么是测试中的操作太多，要么是太多测试被合并到了一个测试中。当一个测试承担过多职责时，维护人员调试软件会变得更困难。如果他们进行的更改导致测试失败，你希望他们能快速找出问题所在。理想情况下，他们能根据测试名称判断问题，但至少，他们应该能打开测试，花大约\
    \ 20 到 30 秒查看，就能意识到哪里出了问题。如果你有多个断言，测试失败的原因就有多个，维护人员需要花时间逐一排查。\n\n这并不意味着你只能有一个\
    \ *assert* 语句；只要它们都用于测试同一个属性，有几个 *assert* 语句是可以的。同时，让你的断言信息尽可能详细，这样当出现问题时，开发者能获得有帮助的消息。在\
    \ Python 中，你可以提供一个文本消息，它会随 AssertionError 一起传递，以帮助调试。\n\n```python\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200, \"Incorrect calories for Bacon Cheeseburger w/ Fries\"\
    \n```\n\npytest 会重写断言语句，这额外提供了一层调试信息。如果上述测试失败，返回给测试编写者的消息将是：\n\n```\nE       AssertionError:\
    \ Incorrect calories for Bacon Cheeseburger w/ Fries\nE       assert 1100 == 1200\n\
    ```\n\n对于更复杂的断言，可以构建一个断言库，使定义新测试变得极其容易。这就像在你的代码库中建立词汇表；你也希望在测试代码中有一套多样化的概念。为此，我推荐使用\
    \ Hamcrest 匹配器。⁵\n\n*Hamcrest 匹配器*是一种编写断言的方式，使其读起来类似于自然语言。PyHamcrest 库提供了常用的匹配器来帮助你编写断言。看看它如何使用自定义断言匹配器使测试更清晰：\n\
    \n```python\nfrom hamcrest import assert_that, matches_regexp, is_, empty, equal_to\n\
    \ndef test_all_menu_items_are_alphanumeric():\n    menu = create_menu()\n    for\
    \ item in menu:\n        assert_that(item, matches_regexp(r'[a-zA-Z0-9 ]'))\n\n\
    def test_getting_calories():\n    dish = \"Bacon Cheeseburger w/ Fries\"\n   \
    \ calories = get_calories(dish)\n    assert_that(calories, is_(equal_to(1200)))\n\
    \ndef test_no_restaurant_found_in_non_matching_areas():\n    city = \"Huntsville,\
    \ AL\"\n    restaurants = find_owned_restaurants_in(city)\n    assert_that(restaurants,\
    \ is_(empty()))\n```\n\nPyHamcrest 的真正强大之处在于你可以定义自己的匹配器。⁶ 这是一个检查菜品是否为素食的匹配器示例：\n\
    \n```python\nfrom hamcrest.core.base_matcher import BaseMatcher\nfrom hamcrest.core.helpers.hasmethod\
    \ import hasmethod\n\ndef is_vegan(ingredient: str) -> bool:\n    return ingredient\
    \ not in [\"Beef Burger\"]\n\nclass IsVegan(BaseMatcher):\n\n    def _matches(self,\
    \ dish):\n        if not hasmethod(dish, \"ingredients\"):\n            return\
