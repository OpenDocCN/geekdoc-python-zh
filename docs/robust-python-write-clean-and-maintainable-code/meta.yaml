    \ *生产者*。这些事件的 *消费者* 是对该刺激的反应。事件只是从生产者到消费者的信息传输。表 18-1 展示了一些常见的生产者-消费者对。\n\n表 18-1.\
    \ 日常事件及其消费者\n\n| 生产者 | 消费者 |\n| :--- | :--- |\n| 厨房计时器响起 | 厨师从烤箱中取出砂锅 |\n| 厨师在菜品完成时按铃\
    \ | 服务员取走并上菜 |\n| 闹钟响起 | 晚睡者醒来 |\n| 机场最后一次登机广播 | 匆忙的家庭赶路，试图赶上转机 |\n\n实际上，你每次编程时都在处理生产者和消费者。任何返回值的函数都是生产者，任何使用该返回值的代码都是消费者。观察：\n\
