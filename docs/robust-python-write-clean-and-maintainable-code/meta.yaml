  md: "One of the most common patterns you'll find in tests is the 3A, or AAA, test\
    \ pattern.⁴ AAA stands for *Arrange-Act-Assert*. You break up each test into three\
    \ separate blocks of code, one for setting up your preconditions (arrange), one\
    \ for performing the operations that are being tested (act), and then one for\
    \ checking for any post-conditions (assert). You may also hear about a fourth\
    \ A, for *annihilate*, or your clean-up code. I'll cover each of these steps in\
    \ detail to discuss how to make your tests easier to read and maintain.\n\n# Arrange\n\
    \nThe *arrange* step is all about setting up the system in a state that is ready\
    \ to test. These are called the *preconditions* of the test. You set up any dependencies\
    \ or test data that are needed for the test to operate correctly.\n\nConsider\
    \ the following test:\n\n```\ndef test_calorie_calculation():\n\n    # arrange\
    \ (set up everything the test needs to run)\n    add_ingredient_to_database(\"\
    Ground Beef\", calories_per_pound=1500)\n    add_ingredient_to_database(\"Bacon\"\
    , calories_per_pound=2400)\n    add_ingredient_to_database(\"Cheese\", calories_per_pound=1800)\n\
    \    # ... snip 13 more ingredients\n\n    set_ingredients(\"Bacon Cheeseburger\
    \ w/ Fries\",\n                    ingredients=[\"Ground Beef\", \"Bacon\" ...\
    \ ])\n\n    # act (the thing getting tested)\n    calories = get_calories(\"Bacon\
    \ Cheeseburger w/ Fries\")\n\n    # assert (verify some property about the program)\n\
    \    assert calories == 1200\n\n    #annihilate (cleanup any resources that were\
    \ allocated)\n    cleanup_database()\n```\n\nFirst, I add ingredients to a database\
    \ and associate a list of ingredients with a dish called “Bacon Cheeseburger w/\
    \ Fries.” Then I find out how many calories are in the burger, check this against\
    \ a known value, and clean up the database.\n\nLook how much code there is before\
    \ I actually get to the test itself (the *get_calories* invocation). Large *arrange*\
    \ blocks are a red flag. You will have many tests that look very similar, and\
    \ you want readers to be able to know how they differ at a glance."
  merge: -1
  pgno: 323
- img_proc: true
  md: "![](img/d64d2be45ca85b398807d181202e7046_324_0.png)\n\nLarge *arrange* blocks\
    \ may indicate a complicated setup of dependencies. Any user of this code will\
    \ presumably have to set up the dependencies in a similar way. Take a step back\
    \ and ask if there are simpler ways to handle dependencies, such as using the\
    \ strategies described in Part III.\n\nIn the preceding example, if I have to\
    \ add 15 ingredients in two separate tests but set an ingredient slightly differently\
    \ to simulate substitutions, it will be difficult to eyeball how the tests differ.\
    \ Giving the tests verbose names indicating their differences is a good step to\
    \ make, but that only goes so far. Find a balance between keeping the test informative\
    \ and making it easy to read at a glance.\n\n**Consistent preconditions versus\
    \ changing preconditions.** Look through your tests and ask yourself what preconditions\
    \ are the same across sets of tests. Extract these through a function and reuse\
    \ that function across each test. Look how much easier it is to compare the following\
    \ two tests:\n\n```\npython\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Bacon\"\
    , calories_per_pound=2400)\n\n    st /etup_bacon_cheeseburger(bacon=\"Bacon\"\
    )\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert\
    \ calories == 1200\n\n    cleanup_database()\n\ndef test_calorie_calculation_bacon_cheeseburger_with_substitution():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Turkey\
    \ Bacon\", calories_per_pound=1700)\n\n    setup_bacon_cheeseburger(bacon=\"Turkey\
    \ Bacon\")\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1100\n\n    cleanup_database()\n```\n\nBy creating helper\
    \ functions (in this case, add_base_ingredients_to_database and setup_bacon_cheeseburger),\
    \ you take all the unimportant boilerplate of the tests and reduce it, allowing\
    \ developers to hone in on differences between tests.\n\n**Use test framework\
    \ features for boilerplate code.** Most test frameworks provide a way to run code\
    \ automatically before tests. In the built-in unittest module, you can write a\
    \ setUp function to run before every test. In pytest, you accomplish something\
    \ similar with fixtures."
