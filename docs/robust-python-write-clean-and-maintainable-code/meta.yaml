  - "[PAGE 150]\n\n+   - Callers of your code may be unaware that the fields changed;\
    \ they could erroneously assume that the fields are static.\n- Setting a single\
    \ field to an incorrect value might be incompatible with how the other fields\
    \ are set.\n- If there are multiple threads modifying the fields, you run the\
    \ risk of a data race, which means you cannot guarantee in which order the modifications\
    \ are applied in relation to one another.\n\nNone of these error cases occur if\
    \ your dataclass is frozen. To freeze a dataclass, add a frozen=True to the dataclass\
    \ decorator:\n\n```\n@dataclass(frozen=True)\nclass Recipe:\n    aromatics: Set[Ingredient]\n\
    \    broth: Broth\n    vegetables: Set[Ingredient]\n    meats: Set[Ingredient]\n\
    \    starches: Set[Ingredient]\n    garnishes: Set[Ingredient]\n    time_to_cook:\
    \ datetime.timedelta\n```\n\nIf you want to use your dataclass in a set or as\
    \ a key in a dictionary it must be hashable. This means it must define a __hash__\
    \ function that takes your object and distills it down to a number.² When you\
    \ freeze a dataclass, it automatically becomes hashable, as long as you don't\
    \ explicitly disable equality checking and all fields are hashable.\n\nThere are\
    \ two caveats around this immutability, however. First, when I say immutability,\
    \ I am referencing the fields in the dataclass, not the variable containing the\
    \ dataclass itself. For example:\n\n```\n# assume that Recipe is immutable because\n\
    # frozen was set to true in the decorator\nsoup = Recipe(\n    aromatics={pepper,\
    \ garlic},\n    broth=Broth.CHICKEN,\n    vegetables={celery, onions, carrots},\n\
