- md: "## Validators\n\nPydantic offers a ton of built-in *validators*. Validators\
    \ are custom types that will check for specific constraints upon a field. For\
    \ instance, if I wanted to make sure that strings were a certain size or that\
    \ all integers were positive, I could use pydantic's constrained types:\n\n```python\n\
    from typing import Optional\n\nfrom pydantic.dataclasses import dataclass\nfrom\
    \ pydantic import constr, PositiveInt\n\n@dataclass\nclass AccountAndRoutingNumber:\n\
    \    account_number: constr(min_length=9, max_length=9) ❶\n    routing_number:\
    \ constr(min_length=8, max_length=12)\n\n@dataclass\nclass Address:\n    address:\
    \ constr(min_length=1)\n\n# ... snip ...\n\n@dataclass\nclass Dish:\n    name:\
    \ constr(min_length=1, max_length=16)\n    price_in_cents: PositiveInt\n    description:\
    \ constr(min_length=1, max_length=80)\n    picture: Optional[str] = None\n\n@dataclass\n\
    class Restaurant:\n    name: constr(regex=r'^[a-zA-Z0-9 ]*$', ❷\n            \
    \     min_length=1, max_length=16)\n    owner: constr(min_length=1)\n    address:\
    \ constr(min_length=1)\n    employees: List[Employee]\n    dishes: List[Dish]\n\
    \    number_of_seats: PositiveInt\n    to_go: bool\n    delivery: bool\n```\n\n\
    ❶ I'm constraining a string to be a certain length.\n\n❷ I'm constraining a string\
    \ to match a regular expression (in this case, only alphanumeric characters and\
    \ spaces).\n\nIf I pass in an invalid type (such as a restaurant name with special\
    \ characters or a negative number of seats), I get the following error:\n\n```\n\
    pydantic.error_wrappers.ValidationError: 2 validation errors for Restaurant\n\
    name\n  string does not match regex \"^[a-zA-Z0-9 ]$\" (type=value_error.str.regex;\
    \ pattern=^[a-zA-Z0-9 ]$)\nnumber_of_seats\n  ensure this value is greater than\
    \ 0\n    (type=value_error.number.not_gt; limit_value=0)\n```\n\nI can even constrain\
    \ lists to enforce further restrictions.\n\n```python\nfrom pydantic import conlist,\
    \ constr\n\n@dataclass\nclass Restaurant:\n    name: constr(regex=r'^[a-zA-Z0-9\
    \ ]*$',\n                 min_length=1, max_length=16)\n    owner: constr(min_length=1)\n\
    \    address: constr(min_length=1)\n    employees: conlist(Employee, min_items=2)\
    \ ❶\n    dishes: conlist(Dish, min_items=3) ❷\n    number_of_seats: PositiveInt\n\
    \    to_go: bool\n    delivery: bool\n```\n\n❶ This list is constrained to Employee\
    \ types and must have at least two employees.\n\n❷ This list is constrained to\
    \ Dish types and must have at least three dishes.\n\nIf I pass in something that\
    \ doesn't follow these constraints (such as forgetting a dish):\n\n```\npydantic.error_wrappers.ValidationError:\
    \ 1 validation error for Restaurant\ndishes\n  ensure this value has at least\
    \ 3 items\n    (type=value_error.list.min_items; limit_value=3)\n```\n\nWith constrained\
    \ types, I catch an additional 17 of my previously thought-up test cases, bringing\
    \ my total up to 55 out of 67 test cases covered. Pretty nice, isn't it?\n\nTo\
    \ catch the remaining set of errors, I can use custom validators to embed those\
    \ last pieces of validation logic:\n\n```python\nfrom pydantic import validator\n\
    \n@dataclass\nclass Restaurant:\n    name: constr(regex=r'^[a-zA-Z0-9 ]*$',\n\
    \                 min_length=1, max_length=16)\n    owner: constr(min_length=1)\n\
    \    address: constr(min_length=1)\n    employees: conlist(Employee, min_items=2)\n\
    \    dishes: conlist(Dish, min_items=3)\n    number_of_seats: PositiveInt\n  \
    \  to_go: bool\n    delivery: bool\n\n    @validator('employees')\n    def check_chef_and_server(cls,\
    \ employees):\n        if (any(e for e in employees if e.position == 'Chef') and\n\
    \            any(e for e in employees if e.position == 'Server')):\n         \
    \   return employees\n        raise ValueError('Must have at least one chef and\
    \ one server')\n```\n\nIf I then fail to provide at least one chef and server:\n\
    \n```\npydantic.error_wrappers.ValidationError: 1 validation error for Restaurant\n\
    employees\n  Must have at least one chef and one server (type=value_error)\n```\n\
    \nI will leave it up to you to write custom validators for other error cases (such\
    \ as valid addresses, valid routing numbers, or a valid image that exists on a\
    \ filesystem).\n\n## Validation Versus Parsing\n\nAdmittedly, pydantic is not\
    \ strictly a validation library, but also a *parsing* library. The difference\
    \ is slight, but needs to be called out. In all my examples, I have been using\
    \ pydantic to check arguments and types, but it is not a strict validator. Pydantic\
    \ advertises itself as a *parsing library*, which means it is providing a guarantee\
    \ of what comes *out* of the data model, not what goes in. That is, when you are\
    \ defining pydantic models, pydantic will do whatever it can to coerce data into\
    \ the types you defined.\n\nIf you were to have a model:\n\n```python\nfrom pydantic\
    \ import dataclass\n\n@dataclass\nclass Model:\n    value: int\n```\n\nThere is\
    \ no problem passing in a string or a float into this model; pydantic will do\
    \ its best to coerce the value to an integer (or throw an exception if the value\
    \ is not coercible). This code throws no exceptions:\n\n```python\nModel(value=\"\
    123\") # value is set to the integer 123\nModel(value=5.5) # this truncates the\
    \ value to 5\n```\n\nPydantic is parsing these values, not validating them. You\
    \ are not guaranteed to pass an integer into the model, but you are always guaranteed\
    \ an int comes out on the other side (or an exception is thrown).\n\nIf you'd\
    \ like to restrict this sort of behavior, you can use pydantic's strict fields:\n\
    \n```python\nfrom pydantic.dataclasses import dataclass\nfrom pydantic import\
    \ StrictInt\n\n@dataclass\nclass Model:\n    value: StrictInt\n```\n\nNow, when\
    \ constructing from another type,\n\n```python\nx = Model(value=\"0023\").value\n\
    ```\n\nyou will get an error:\n\n```\npydantic.error_wrappers.ValidationError:\
    \ 1 validation error for Model\nvalue\n  value is not a valid integer (type=type_error.integer)\n\
    ```\n\nSo, while pydantic advertises itself as a parsing library, it is possible\
    \ to enforce more strict behavior in your data models.\n\n## Closing Thoughts\n\
    \nI've been harping on the importance of typecheckers throughout this book, but\
    \ that doesn't mean catching errors at runtime is meaningless. While typecheckers\
    \ catch their fair share of errors and reduce runtime checks, they can't catch\
    \ everything. You still need validation logic to fill in the gaps.\n\nFor these\
    \ sorts of checks, the pydantic library is a great tool in your toolbox. By embedding\
    \ your validation logic directly into your types (without writing tons of tedious\
    \ if statements), you improve robustness twofold. First, you dramatically increase\
    \ readability; developers reading your type definition will know exactly what\
    \ constraints are imposed upon it. Second, it gives you that much-needed layer\
    \ of protection with runtime checking.\n\nI find that pydantic also helps fill\
    \ in the middle ground between a data class and a class. Each constraint is technically\
    \ fulfilling invariants about that class. I normally advise not to give your data\
    \ classes an invariant because you can't protect it; you don't control construction\
    \ and property access is public. However, pydantic protects the invariant even\
    \ when you call a constructor or set a field. But, if you have fields that are\
    \ interdependent (such as needing to set both at the same time or needing to set\
    \ only one field based on the value of another), stick with a class."
  mdcn: "## 验证器\n\nPydantic 提供了大量内置的*验证器*。验证器是自定义类型，用于检查字段上的特定约束。例如，如果我想确保字符串具有特定长度，或者所有整数都是正数，我可以使用\
    \ pydantic 的约束类型：\n\n```python\nfrom typing import Optional\n\nfrom pydantic.dataclasses\
    \ import dataclass\nfrom pydantic import constr, PositiveInt\n\n@dataclass\nclass\
    \ AccountAndRoutingNumber:\n    account_number: constr(min_length=9, max_length=9)\
    \ ❶\n    routing_number: constr(min_length=8, max_length=12)\n\n@dataclass\nclass\
    \ Address:\n    address: constr(min_length=1)\n\n# ... 省略 ...\n\n@dataclass\n\
    class Dish:\n    name: constr(min_length=1, max_length=16)\n    price_in_cents:\
    \ PositiveInt\n    description: constr(min_length=1, max_length=80)\n    picture:\
    \ Optional[str] = None\n\n@dataclass\nclass Restaurant:\n    name: constr(regex=r'^[a-zA-Z0-9\
    \ ]*$', ❷\n                 min_length=1, max_length=16)\n    owner: constr(min_length=1)\n\
    \    address: constr(min_length=1)\n    employees: List[Employee]\n    dishes:\
    \ List[Dish]\n    number_of_seats: PositiveInt\n    to_go: bool\n    delivery:\
    \ bool\n```\n\n❶ 我将字符串约束为特定长度。\n\n❷ 我将字符串约束为匹配正则表达式（在此例中，仅允许字母数字字符和空格）。\n\n如果我传入无效类型（例如包含特殊字符的餐厅名称或负数的座位数），我会得到以下错误：\n\
    \n```\npydantic.error_wrappers.ValidationError: 2 validation errors for Restaurant\n\
    name\n  string does not match regex \"^[a-zA-Z0-9 ]$\" (type=value_error.str.regex;\
    \ pattern=^[a-zA-Z0-9 ]$)\nnumber_of_seats\n  ensure this value is greater than\
    \ 0\n    (type=value_error.number.not_gt; limit_value=0)\n```\n\n我甚至可以约束列表以实施进一步的限制。\n\
    \n```python\nfrom pydantic import conlist, constr\n\n@dataclass\nclass Restaurant:\n\
    \    name: constr(regex=r'^[a-zA-Z0-9 ]*$',\n                 min_length=1, max_length=16)\n\
    \    owner: constr(min_length=1)\n    address: constr(min_length=1)\n    employees:\
    \ conlist(Employee, min_items=2) ❶\n    dishes: conlist(Dish, min_items=3) ❷\n\
    \    number_of_seats: PositiveInt\n    to_go: bool\n    delivery: bool\n```\n\n\
    ❶ 此列表被约束为 Employee 类型，并且必须至少有两名员工。\n\n❷ 此列表被约束为 Dish 类型，并且必须至少有三道菜。\n\n如果我传入不符合这些约束的内容（例如忘记一道菜）：\n\
    \n```\npydantic.error_wrappers.ValidationError: 1 validation error for Restaurant\n\
    dishes\n  ensure this value has at least 3 items\n    (type=value_error.list.min_items;\
    \ limit_value=3)\n```\n\n通过使用约束类型，我额外捕获了之前想到的 17 个测试用例，使我的总覆盖率达到 67 个测试用例中的 55\
    \ 个。相当不错，不是吗？\n\n为了捕获剩余的错误集，我可以使用自定义验证器来嵌入最后的验证逻辑：\n\n```python\nfrom pydantic\
    \ import validator\n\n@dataclass\nclass Restaurant:\n    name: constr(regex=r'^[a-zA-Z0-9\
    \ ]*$',\n                 min_length=1, max_length=16)\n    owner: constr(min_length=1)\n\
    \    address: constr(min_length=1)\n    employees: conlist(Employee, min_items=2)\n\
    \    dishes: conlist(Dish, min_items=3)\n    number_of_seats: PositiveInt\n  \
    \  to_go: bool\n    delivery: bool\n\n    @validator('employees')\n    def check_chef_and_server(cls,\
    \ employees):\n        if (any(e for e in employees if e.position == 'Chef') and\n\
    \            any(e for e in employees if e.position == 'Server')):\n         \
    \   return employees\n        raise ValueError('Must have at least one chef and\
    \ one server')\n```\n\n如果我未能提供至少一名厨师和一名服务员：\n\n```\npydantic.error_wrappers.ValidationError:\
    \ 1 validation error for Restaurant\nemployees\n  Must have at least one chef\
    \ and one server (type=value_error)\n```\n\n我将把为其他错误情况（例如有效地址、有效路由号或文件系统上存在的有效图像）编写自定义验证器的任务留给您。\n\
    \n## 验证与解析\n\n诚然，pydantic 严格来说不是一个验证库，而是一个*解析*库。区别虽小，但需要指出。在我所有的示例中，我都使用 pydantic\
    \ 来检查参数和类型，但它不是一个严格的验证器。Pydantic 自称是一个*解析库*，这意味着它保证的是数据模型*输出*的内容，而不是输入的内容。也就是说，当您定义\
    \ pydantic 模型时，pydantic 会尽其所能将数据强制转换为您定义的类型。\n\n如果您有一个模型：\n\n```python\nfrom pydantic\
    \ import dataclass\n\n@dataclass\nclass Model:\n    value: int\n```\n\n传入字符串或浮点数到此模型是没有问题的；pydantic\
    \ 会尽力将值强制转换为整数（如果值无法转换，则抛出异常）。此代码不会抛出任何异常：\n\n```python\nModel(value=\"123\")\
    \ # 值被设置为整数 123\nModel(value=5.5) # 此值被截断为 5\n```\n\nPydantic 正在解析这些值，而不是验证它们。您不能保证传入模型的是整数，但您总是保证另一端输出的是整数（或者抛出异常）。\n\
    \n如果您想限制这种行为，可以使用 pydantic 的严格字段：\n\n```python\nfrom pydantic.dataclasses import\
    \ dataclass\nfrom pydantic import StrictInt\n\n@dataclass\nclass Model:\n    value:\
    \ StrictInt\n```\n\n现在，当从其他类型构造时，\n\n```python\nx = Model(value=\"0023\").value\n\
    ```\n\n您将得到一个错误：\n\n```\npydantic.error_wrappers.ValidationError: 1 validation\
    \ error for Model\nvalue\n  value is not a valid integer (type=type_error.integer)\n\
    ```\n\n因此，虽然 pydantic 自称是一个解析库，但在您的数据模型中强制执行更严格的行为是可能的。\n\n## 结语\n\n我在本书中一直强调类型检查器的重要性，但这并不意味着在运行时捕获错误毫无意义。虽然类型检查器捕获了相当一部分错误并减少了运行时检查，但它们无法捕获所有错误。您仍然需要验证逻辑来填补空白。\n\
    \n对于这类检查，pydantic 库是您工具箱中的一个绝佳工具。通过将验证逻辑直接嵌入到您的类型中（而无需编写大量繁琐的 if 语句），您可以从两方面提高健壮性。首先，它显著提高了可读性；阅读您类型定义的开发人员将确切知道对其施加了哪些约束。其次，它为您提供了运行时检查所需的保护层。\n\
    \n我发现 pydantic 还有助于填补数据类和类之间的中间地带。每个约束在技术上都满足了该类的不变量。我通常建议不要给您的数据类提供不变量，因为您无法保护它；您不控制构造，并且属性访问是公共的。然而，pydantic\
    \ 即使在您调用构造函数或设置字段时也能保护不变量。但是，如果您的字段是相互依赖的（例如需要同时设置两个字段，或者需要根据另一个字段的值设置一个字段），请坚持使用类。"
