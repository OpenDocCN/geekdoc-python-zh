  - '[PAGE 189]


    This is how you can effectively force a user to clean up after themselves. You
    are eliminating an entire class of errors that can happen when you use context
    managers—the errors of omission. Errors of omission are so easy to make; you literally
    have to do nothing. Instead, a context manager lets users do the right thing,
    even when they do nothing. It’s a sure sign of a robust codebase when a user can
    do the right thing without even knowing it.


    ![](img/d64d2be45ca85b398807d181202e7046_189_0.png)


    Context managers will not finish if the program is forcibly closed, such as a
    force kill from the operating system or a power loss. Context managers are just
    a tool to keep developers from forgetting to clean up after themselves; make sure
    your system can still handle things outside a developer’s control.


    # Closing Thoughts


    You can create all the types in the world, but if other developers can’t use them
    without error, your codebase will suffer. Just like a house needs a strong foundation
    to stand upon, the types you create and vocabulary you surround them with need
    to be rock solid for your codebase to be healthy. When you have natural interfaces
    to your code, future developers will be able to reach for these types and build
    new features effortlessly. Have empathy for those future developers, and design
    your types with care.


    You’ll need to think through the domain concepts your types represent, and how
    users interact with those types. By building a natural mapping, you tie real-world
    operations to your codebase. The interfaces you build should feel intuitive; remember,
    they should be easy to use correctly and hard to use incorrectly. Use every trick
    and tip at your disposal, from proper naming to magic methods to context managers.


    In the next chapter, I’m going to cover how types relate to one another when you
    create subtypes. Subtypes are a way of specializing a type’s interface; they allow
    for extension without modifying the original types. Any modification to existing
    code is a potential regression, so being able to create new types without changing
    old ones can significantly reduce erratic behavior.'
  - '[PAGE 190]


    # CHAPTER 12

    Subtyping


    Most of Part II has focused on creating your own types and defining interfaces.
    These types do not exist in isolation; types are often related to one another.
    So far, you’ve seen *composition*, where types use other types as members. In
    this chapter, you’ll learn about *subtyping*, or creating types based on other
    types.


    When applied correctly, subtyping makes it incredibly easy to extend your codebase.
    You can introduce new behaviors without ever worrying about breaking the rest
    of your codebase. However, you must be diligent when creating a subtyping relationship;
    if you do it poorly, you can decrease the robustness of your codebase in unexpected
    ways.


    I’ll start with one of the most common subtype relationships: inheritance. Inheritance
    is seen as a traditional pillar of object-oriented programming (OOP).¹ Inheritance
    can be tricky if not applied correctly. I’ll then move on to other forms of subtyping
    present in the Python programming language. You’ll also learn about one of the
    more fundamental SOLID design principles, the Liskov Substitution Principle. This
    chapter will help you make sense of when and where subtyping is appropriate and
    where it is not.


    1 Object-oriented programming is a programming paradigm where you organize your
    code around encapsulated data and their behaviors. If you’d like an introduction
    to OOP, I suggest *Head First Object-Oriented Analysis and Design* by Brett McLaughlin,
    Gary Pollice, and Dave West (O’Reilly).'
