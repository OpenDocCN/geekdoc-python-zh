  md: "# Inheritance\n\nMost developers immediately think of inheritance when they\
    \ talk about subtyping. *Inheritance* is a way of creating a new type from another\
    \ type, copying all the behaviors into the new type. This new type is known as\
    \ a *child class*, *derived class*, or *subclass*. In contrast, the type being\
    \ inherited from is known as a *parent class*, *base class*, or *superclass*.\
    \ When talking about types in this way, we say that the relationship is an *is-a*\
    \ relationship. Any object of a derived class is also an instance of a base class.\n\
    \nTo illustrate this, you are going to design an app that helps owners of restaurants\
    \ organize operations (tracking finances, customizing menus, etc.). For this scenario,\
    \ a restaurant has the following behaviors:\n\n+   - A restaurant has the following\
    \ attributes: a name, a location, a list of employees and their schedules, inventory,\
    \ a menu, and current finances. All of these attributes are mutable; even a restaurant\
    \ can be renamed or change locations. When a restaurant changes locations, its\
    \ location attribute reflects its final destination.\n- An owner can own multiple\
    \ restaurants.\n- Employees can be moved from one restaurant to another, but they\
    \ cannot work at two restaurants at the same time.\n- When a dish is ordered,\
    \ the ingredients used are removed from the inventory. When a specific item is\
    \ depleted in the inventory, any dish requiring the ingredient is no longer available\
    \ through the menu.\n- Whenever a menu item is sold, the restaurant's funds increase.\
    \ Whenever new inventory is purchased, the restaurant's funds decrease. For every\
    \ hour that an employee works at that restaurant, the restaurant's funds decrease\
    \ according to the employee's salary and/or wage.\n\nRestaurant owners will use\
    \ this app to view all their restaurants, manage their inventory, and track profits\
    \ in real time.\n\nSince there are specific invariants about the restaurant, I'll\
    \ use a class to represent a restaurant:\n\n```\nfrom restaurant import geo\n\
    from restaurant import operations as ops\nclass Restaurant:\n    def __init__(self,\n\
    \                 name: str,\n                 location: geo.Coordinates,\n  \
    \               employees: list[ops.Employee],\n                 inventory: list[ops.Ingredient],\n\
    \                 menu: ops.Menu,\n                 finances: ops.Finances):\n\
    ```"
