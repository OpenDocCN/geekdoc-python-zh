  md: 'If I''m writing some code for learning purposes, my *why* is purely for self-fulfilment,
    and the value is derived from how much I learn. If I do things wrong, that is
    still a learning opportunity; I can get by if all my tests are just manual spot
    checks at the end of the project. However, a company that markets tools to other
    developers might have a completely different strategy. Developers at that company
    may choose to write tests to make sure they are not regressing any functionality
    so that the company does not lose customers (which would translate to a loss of
    profit). Each of these projects needs a different level of testing.


    So, what is a test? Is it something that catches errors? Is it something that
    gives you confidence to ship your product? Yes, but the true answer goes a little
    deeper. Tests answer questions about your system. I want you to think about the
    software you write. What is its purpose? What do you want to always know about
    the things you build? The things that are important to you form your test strategy.


    When you ask yourself questions, you really are asking yourself what tests you
    find valuable:


    +   - Will my application handle a predicted load?

    - Does my code meet the customer’s needs?

    - Is my application secure?

    - What happens when a customer inputs bad data into my system?


    Each one of these questions points to a different type of test that you might
    need to write. Check out Table 21-1 for a list of common questions and the appropriate
    tests that answer those questions.


    *Table 21-1. Types of tests and the questions they answer*


    | Test type | Question the test answers |

    | :--- | :--- |

    | Unit | Do units (functions and classes) act as developers expect? |

    | Integration | Are separate parts of the system stitched together properly? |

    | Acceptance | Does the system do what the end user expects? |

    | Load | Does the system stay operational under heavy duress? |

    | Security | Does the system resist specific attacks and exploits? |

    | Usability | Is the system intuitive to use? |'
