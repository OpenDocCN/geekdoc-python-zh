  md: '# Law of Least Surprise


    Distractions from intent are bad, but there’s a class of communication that is
    even worse: when code actively surprises your future collaborators. You want to
    adhere even to the *Law of Least Surprise*; when someone reads through the codebase,
    they should almost never be surprised at behavior or implementation (and when
    they are surprised, there should be a great comment near the code to explain why
    it is that way). This is why communicating intent is paramount. Clear, clean code
    lowers the likelihood of miscommunication.


    ![](img/d64d2be45ca85b398807d181202e7046_36_0.png)


    The *Law Of Least Surprise*, also known as the *Law of Least Astonishment*, states
    that a program should always respond to the user in the way that astonishes them
    the least.³ Surprising behavior leads to confusion. Confusion leads to misplaced
    assumptions. Misplaced assumptions lead to bugs. And that is how you get unreliable
    software.


    Bear in mind, you can write completely correct code and still surprise someone
