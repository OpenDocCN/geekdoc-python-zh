  md: "```\nBECHAMEL = \"Béchamel\"\nVELOUTÉ = \"Velouté\"\nVELOUTE = \"Velouté\"\n\
    ESPAGNOLE = \"Espagnole\"\nTOMATO = \"Tomato\"\nHOLLANDAISE = \"Hollandaise\"\n\
    ```\n\nWith this, there was much rejoicing from all keyboard owners. Enumerations\
    \ absolutely allow this sort of behavior; they can have duplicate values as long\
    \ as the keys are not duplicated.\n\nHowever, there are cases where you want to\
    \ force uniqueness on the values. Perhaps you are relying on the enumeration to\
    \ always contain a set number of values, or perhaps it messes with some of the\
    \ string representations that are shown to customers. No matter the case, if you\
    \ want to preserve uniqueness in your Enum, simply add a @unique decorator.\n\n\
    ```\nfrom enum import Enum, unique\n@unique\nclass MotherSauce(Enum):\n    BÉCHAMEL\
    \ = \"Béchamel\"\n    VELOUTÉ = \"Velouté\"\n    ESPAGNOLE = \"Espagnole\"\n \
    \   TOMATO = \"Tomato\"\n    HOLLANDAISE = \"Hollandaise\"\n```\n\nCreating aliases\
    \ is more likely than preserving uniqueness in most of the use cases I've come\
    \ across, so I default to making enumerations nonunique at first, and only adding\
    \ the unique decorator when needed.\n\n# Closing Thoughts\n\nEnumerations are\
    \ simple, and often overlooked as a powerful communication method. Any time that\
    \ you want to represent a single value from a static collection of values, an\
    \ enumeration should be your go-to user-defined type. It's easy to define and\
    \ use them. They offer a wealth of operations, including iteration, bitwise operations\
    \ (in the case of Flag enumerations), and control over uniqueness.\n\nRemember\
    \ these key limitations:\n\n+   - Enumerations are not meant for dynamic key-value\
    \ mappings that change at runtime. Use a dictionary for this.\n- Flag enumerations\
    \ only work with values that support bitwise operations with nonoverlapping values.\n\
    - Avoid IntEnum and IntFlag unless absolutely necessary for system interoperability."
