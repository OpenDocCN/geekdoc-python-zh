    \n> 如果你完全控制字典，意味着你在自己拥有的代码中创建它并在自己拥有的代码中处理它，你应该考虑使用数据类（参见第9章）或类（参见第10章）。\n\n例如，假设我想增强我的数字食谱应用，为列出的食谱提供营养信息。我决定使用Spoonacular\
