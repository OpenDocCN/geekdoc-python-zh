    \ Fortunately, a tool exists to fill in this gap: Pytype, written by Google. Pytype\
    \ adds type annotations through static analysis, which means it does not need\
    \ to run your code to figure out types.\n\nTo run Pytype, install it with pip:\n\
    \n```\npip install pytype\n```\n\nThen, run Pytype against your code folder (e.g.,\
    \ *code_examples/chapter7*):\n\n```\npytype code_examples/chapter7\n```\n\nThis\
    \ will generate a set of *.pyi* files in a *.pytype* folder. These are very similar\
    \ to the stub files that MonkeyType created. They contain annotated function signatures\
    \ and variables that you can then copy into your source files.\n\nPytype offers\
    \ other intriguing benefits as well. Pytype is not just a type annotator; it is\
    \ a full linter and typechecker. It has a different typechecking philosophy than\
    \ other typecheckers such as mypy, Pyright, and Pyre.\n\nPytype will use inference\
    \ to do its typechecking, which means it will typecheck your code even in the\
    \ absence of type annotations. This is a great way to get the benefit of a typechecker\
    \ without having to write types throughout your codebase.\n\nPytype is also a\
    \ little more lenient on types changing in the middle of their lifetime. This\
    \ is a boon for those who fully embrace Python's dynamically typed nature. As\
    \ long as code will work at runtime, Pytype is happy. For instance:\n\n```\n#\
    \ Run in Python 3.6\ndef get_pasta_dish_ingredients(ingredients: list[Ingredient]\n\
