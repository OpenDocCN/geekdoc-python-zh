  md: "# Patterns Without Classes\n\nThe example in this chapter is not the typical\
    \ representation of the Observer Pattern. The traditional implementation of this\
    \ design pattern (as well as with many others) is represented in a very object-oriented\
    \ fashion with classes, subclasses, inheritance, and interfaces. For example,\
    \ the original Observer Pattern might be expressed in this way in Python:\n\n\
    ```\nfrom typing import Any\nclass Subscriber:\n    def notify(data: Any):\n \
    \       raise NotImplementedError()\n\nclass Publisher:\n    def __init__(self):\n\
    \        self.subscribers = []\n\n    def add_subscriber(self, sub: Subscriber):\n\
    \        self.subscribers.append(sub)\n\n    def notify_subscribers(self, data:\
    \ Any):\n        for subscriber in subscribers:\n            subscriber.notify(data)\n\
    ```\n\nClasses that needed to publish or subscribe would then inherit from the\
    \ appropriate base class. This is useful from a reuse standpoint, but it can be\
    \ cumbersome to introduce classes when the example with functions is much simpler.\n\
    \nAs such, design patterns have earned some criticism around the number of boilerplate\
    \ classes and interfaces needed to implement them. As the development community\
    \ has evolved, public opinion has soured toward many patterns because of their\
    \ association with class-/interface-heavy code that was described as “object-oriented”\
    \ in the mid 1990s and 2000s.\n\nHowever, do not throw away the concept of many\
    \ design patterns because of how the example was originally presented. There have\
    \ been many iterations on these patterns that simplify implementation. Most patterns\
    \ don’t focus on the state management aspect of object-oriented code but on decoupling\
    \ dependencies, and are still beneficial to larger system design.\n\nThe Observer\
    \ Pattern above does have some drawbacks. First, you are a bit more sensitive\
    \ to errors that crop up. If the observer throws an exception, the producer needs\
    \ to be able to handle that directly (or use a helper function or class to handle\
    \ the notification wrapped in a try...except). Second, the linking of producer\
    \ to observer is more direct than in the message broker paradigm. In a message\
    \ broker paradigm, the publisher and subscriber can become connected regardless\
    \ of where they live in the codebase."
  merge: -1
