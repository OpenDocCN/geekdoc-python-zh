- md: "## CHAPTER 10\nUser-Defined Types: Classes\n\nClasses will be the final user-defined\
    \ type that I'll cover in this book. Many developers learn classes early, and\
    \ this is both a boon and a bane. Classes are used in many frameworks and codebases,\
    \ so it pays off to be fluent in class design. However, when developers learn\
    \ classes too early, they miss the nuance of when and, more importantly, when\
    \ not to use them.\n\nThink back to your use of classes. Could you represent that\
    \ data as a dataclass instead? What about a set of free functions? I've seen too\
    \ many codebases that use classes everywhere when they really shouldn't, and maintainability\
    \ suffers because of it.\n\nHowever, I've also come across codebases that swing\
    \ the pendulum the other way: using no classes at all. This also affects maintainability;\
    \ it is easy to break assumptions and have inconsistent data throughout. In Python,\
    \ you should strive for a balance. Classes have a place in your codebase, but\
    \ it is important to recognize their strengths and weaknesses. It's time to really\
    \ dig deep, cast aside your preconceptions, and learn how classes help you make\
    \ more robust code.\n\n## Class Anatomy\n\nClasses are intended to be another\
    \ way of grouping related data together. They have decades of history in the object-oriented\
    \ paradigm and, at first glance, don't differ that much from what you learned\
    \ about data classes. In fact, you can write a class just like you wrote a dataclass:\n\
    \n```\nclass Person:\n    name: str = \"\"\n    years_experience: int = 0\n  \
    \  address: str = \"\"\n```\n\n```\npat = Person()\npat.name = \"Pat\"\nprint(f\"\
    Hello {pat.name}\")\n```\n\nLooking at the code above, you could easily write\
    \ it a different way with a dict or dataclass:\n\n```\npat = {\n    \"name\":\
    \ \"\",\n    \"years_experience\": 0,\n    \"address\": \"\"\n}\n\n@dataclass\n\
    class Person():\n    name: str = \"\"\n    years_experience: int = 0\n    address:\
    \ str = \"\"\n```\n\nIn Chapter 9, you learned the advantages of data classes\
    \ over raw dictionaries, and classes offer many of the same benefits. But you\
    \ might (rightly) wonder why you would ever use a class instead of a data class\
    \ again?\n\nIn fact, given the flexibility and convenience of data classes, classes\
    \ might feel inferior. You don't get the fancy features like frozen or ordered.\
    \ You don't get built-in string methods. Why, you can't even instantiate a Person\
    \ as nicely as with data classes.\n\nTry to do something like:\n\n```\npat = Person(\"\
    Pat\", 13, \"123 Fake St.\")\n```\n\nWhen trying this with a class, you'll be\
    \ immediately greeted with an error:\n\n```\nTypeError: Person() takes no arguments\n\
    ```\n\nThat's really frustrating, at first glance. However, this design decision\
    \ is intentional. You need to explicitly define how a class gets constructed,\
