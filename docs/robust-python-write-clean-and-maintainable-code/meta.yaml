    no communication to other developers? What can you do to simplify complexities
    identified in this exercise (especially if they are in often-changing code)?


    Throughout the rest of the book, I will look at different techniques for communicating
    intent in Python.


    # Closing Thoughts


    Robust code matters. Clean code matters. Your code needs to be maintainable for
    the entire lifetime of the codebase, and in order to ensure that outcome, you
    need to put active foresight into what you are communicating and how. You need
    to clearly embody your knowledge as close to the code as possible. It will feel
    like a burden to'
