    # Interpreting Your Dependency Graph


    Alright, you''ve drawn all these pretty graphs; what can you do with them? When
    you see your dependencies graphed out in this fashion, you get a pretty good idea
    where your maintainability hotspots are. Remember, every dependency is a reason
    for code to change. Whenever anything changes in your codebase, it can ripple
    up through physical and logical dependencies, potentially impacting large swaths
    of code.


    With this in mind, you need to think about the relationships between what you''re
    changing and the things that depend upon them. Consider the amount of code depending
    on you, as well as the code that you yourself depend upon. If you have a lot of
    dependencies coming in, but not going out, you have what''s known as high *fan-in*.
    Conversely, if you don''t have a lot of dependencies coming in, but you depend
    on'
  merge: -1
  pgno: 259
- img_proc: true
  md: 'a large number of other entities, this is known as high *fan-out*. Figure 16-9
    illustrates the difference between fan-in and fan-out.


    ![](img/d64d2be45ca85b398807d181202e7046_260_0.png)


    *Figure 16-9. The difference between fan-in and fan-out*


    You want the entities in your system that have a high amount of fan-in to be leaves
    of your dependency graph, or at the bottom. Large parts of your codebase depend
    on these entities; every dependency you have is a dependency the rest of your
    codebase will have as well. You also want these entities to be stable, which means
    that they should be changing infrequently. Every time you introduce change, you
    potentially impact most of your codebase due to the large fan-in.


    On the other hand, fan-out entities should be toward the top of your dependency
    graph. This is where most of your business logic will likely live; it will change
    as the business evolves. These parts of your codebase can withstand a much higher
    rate of change; due to their relatively few upstream dependencies, their code
    won''t break as often when behaviors change.


    > > Changing fan-out entities won''t impact as much of your codebase''s assumptions,
    but I can''t say whether or not it will break customer''s assumptions. How much
    you want external behavior to remain backward compatible is a UX concern and outside
    the scope of this book.


    # # Closing Thoughts


    The presence of dependencies does not dictate how robust your code is. It''s about
    how you utilize and manage those dependencies. Dependencies are absolutely crucial
    to sane reuse in your system. You can break code into smaller chunks and reorganize
    your codebase appropriately. By giving your dependencies the right directionality,
    you can actually increase the robustness of your code. You can make your code
    more maintainable by increasing substitutability and extensibility.


    But, as with anything in engineering, there is always a cost. Dependencies are
    a coupling; linking different parts of your codebase together and making changes
    can have a wider impact than you might be looking for. There are different types
    of'
  merge: -1
  pgno: 260
- img_proc: true
  md: 'dependencies that must be handled in different ways. Physical dependencies
    are easy to visualize through tooling, but are also rigid in the structure they
    impose. Logical dependencies provide an extensibility to your codebase, but their
    nature is hidden until runtime. Temporal dependencies are a necessary part of
    executing Python in a linear fashion, but when those dependencies become unintuitive,
    they incur a ton of future pain.


    All of these lessons assume that you have pieces of code that you can depend upon.
    In the next chapter, you’ll explore *composable code*, or breaking code into smaller
    pieces for reuse. You’ll learn how to compose objects, looping patterns, and functions
    to reorganize your code into new use cases. When you think in terms of composable
