- md: "codebase. Think about each tool as a piece of Swiss cheese.¹ Each individual\
    \ piece of Swiss cheese has holes of various widths or sizes, but when multiple\
    \ pieces are stacked together, it is unlikely that there is an area where all\
    \ holes align and you can see through the stack.\n\nLikewise, each tool you use\
    \ to build a safety net will miss certain errors. Typecheckers won’t catch common\
    \ programming mistakes, linters won’t check security violations, security checkers\
    \ won’t catch complex code, and so on. But when these tools are stacked together,\
    \ it’s much less likely for a legitimate error to squeak by (and for those that\
    \ do, that’s why you have tests). As Bruce MacLennan says, “Have a series of defenses\
    \ so that if an error is not caught by one, it will probably be caught by another.”²\n\
    \n## Complexity Checkers\n\nMost of this book has been centered on readable and\
    \ maintainable code. I’ve talked about how complex code impacts the speed of feature\
    \ development. It’d be nice for a tool to indicate which parts of your codebase\
    \ have high complexity. Unfortunately, complexity is subjective and reducing complexity\
    \ will not always reduce errors. I can, however, treat complexity measures as\
    \ a *heuristic*. A heuristic is something that provides an answer, but offers\
    \ no guarantee that it is an optimal answer. In this case, the question is, “Where\
    \ can I find the most bugs in my code?” Most of the time, it will be in code with\
    \ high complexity, but remember that this is not a guarantee.\n\n## Cyclomatic\
    \ complexity with mccabe\n\nOne of the most popular complexity heuristics is known\
    \ as *cyclomatic complexity*, first described by Thomas McCabe.³ To measure code’s\
    \ cyclomatic complexity, you must view your code as a *control flow graph*, or\
    \ a graph that maps out the different paths of execution your code can take. Figure\
    \ 20-1 shows you a few different examples.\n\n1 J. Reason. “Human Error: Models\
    \ and Management.” *BMJ* 320, no. 7237 (2000): 768–70. https://doi.org/10.1136/bmj.320.7237.768.\n\
    2 Bruce MacLennan. “Principles of Programming Language Design.” web.eecs.utk.edu,\
    \ September 10, 1998. https://oreil.ly/hrjdR.\n3 T.J. McCabe. “A Complexity Measure.”\
    \ *IEEE Transactions on Software Engineering* SE-2, no. 4 (December 1976): 308–20.\
    \ https://doi.org/10.1109/tse.1976.233837.\n\n![](img/d64d2be45ca85b398807d181202e7046_312_0.png)\n\
    \nSection A of Figure 20-1 demonstrates a linear flow of statements, which has\
    \ a complexity of one. An if with no elif statement, as shown in Section B of\
    \ Figure 20-1, has two paths (if or else/fall-through), so the complexity is two.\
    \ Similarly a while loop, like in Section C of Figure 20-1, has two separate paths:\
    \ either the loop continues or exits. As the code gets more complex, the cyclomatic\
    \ complexity number gets higher.\n\nYou can use a static analysis tool in Python\
    \ to measure cyclomatic complexity, aptly named mccabe.\n\nI'll install it with\
    \ pip:\n\n```\npip install mccabe\n```\n\nTo test it out, I'll run it on the mccabe\
    \ codebase itself and flag any function that has a cyclomatic complexity greater\
    \ than or equal to five:\n\n```\npython -m mccabe --min 5 mccabe.py\n192:4: 'PathGraphingAstVisitor._subgraph_parse'\
    \ 5\n273:0: 'get_code_complexity' 5\n298:0: '_read' 5\n315:0: 'main' 7\n```\n\n\
    Let's take a look at PathGraphingAstVisitor._subgraph_parse:\n\n```\ndef _subgraph_parse(self,\
    \ node, pathnode, extra_blocks):\n    \"\"\"parse the body and any `else` block\
    \ of `if` and `for` statements\"\"\"\n    loose_ends = []\n    self.tail = pathnode\n\
    \    self.dispatch_list(node.body)\n    loose_ends.append(self.tail)\n    for\
    \ extra in extra_blocks:\n        self.tail = pathnode\n        self.dispatch_list(extra.body)\n\
    \        loose_ends.append(self.tail)\n    if node.orelse:\n        self.tail\
    \ = pathnode\n        self.dispatch_list(node.orelse)\n        loose_ends.append(self.tail)\n\
    \    else:\n        loose_ends.append(pathnode)\n    if pathnode:\n        bottom\
    \ = PathNode(\"\", look='point')\n        for le in loose_ends:\n            self.graph.connect(le,\
    \ bottom)\n        self.tail = bottom\n```\n\nThere are a few things going on\
    \ in this function: various conditional branches, loops, and even a loop nested\
    \ in an if statement. Each of these paths is independent and needs to be tested\
    \ for. As cyclomatic complexity grows, code gets harder to read and harder to\
    \ reason about. There is no magic number for cyclomatic complexity; you will need\
    \ to inspect your codebase and look for a suitable limit.\n\n## Whitespace heuristic\n\
    \nThere's another complexity heuristic that I am quite fond of that is a bit simpler\
    \ to reason about than cyclomatic complexity: whitespace checking. The idea is\
    \ as follows: count how many levels of indentation there are in a single Python\
    \ file. High levels of indentation indicate nested loops and branches, which may\
