  md: "![](img/d64d2be45ca85b398807d181202e7046_93_0.png)\n\nInheriting from these\
    \ classes does incur a performance cost. Built-in collections make some assumptions\
    \ in order to achieve performance. With UserDict, UserString, and UserList, methods\
    \ can't be inlined, since you might override them. If you need to use these constructs\
    \ in performance-critical code, make sure you benchmark and measure your code\
    \ to find potential problems.\n\nYou'll notice that I talked about dictionaries,\
    \ lists, and strings above, but left out one big built-in: sets. There exists\
    \ no UserSet in the collections module. I'll have to select a different abstraction\
    \ from the collections module. More specifically, I need abstract base classes,\
    \ which are found in collections.abc.\n\n# As Easy as ABC\n\nAbstract base classes\
    \ (ABCs) in the collections.abc module provide another grouping of classes that\
    \ you can override to create your own collections. ABCs are classes intended to\
    \ be subclassed, and require the subclass to implement very specific functions.\
    \ For the collections.abc, these ABCs are all centered on custom collections.\
    \ In order to create a custom collection, you must override specific functions,\
    \ depending on the type you want to emulate. Once you implement these required\
    \ functions, though, the ABC fills in other functions automatically. You can find\
    \ a full list of required functions to implement at the collections.abc's [module\
    \ documentation](module_documentation).\n\n![](img/d64d2be45ca85b398807d181202e7046_93_1.png)\n\
    \nIn contrast to the User* classes, there is no built-in storage, such as self.data,\
    \ inside the collections.abc classes. You must provide your own storage.\n\nLet's\
    \ look at a collections.abc.Set, since there is no UserSet elsewhere in collections.\
    \ I want to create a custom set that automatically handles aliases of ingredients\
    \ (such as rocket and arugula). In order to create this custom set, I need to\
    \ implement three methods, as required by collections.abc.Set:\n\n```\n\n__contains__\n\
    \    This is for membership checks: \"arugula\" in ingredients.\n\n__iter__\n\
    \    This is for iterating: for ingredient in ingredients.\n\n__len__\n    This\
    \ is for checking the length: len(ingredients).\n```"
