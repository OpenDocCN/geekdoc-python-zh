  md: "To remedy this, I need to make this illegal state unrepresentable. To do that,\
    \ I'll rework my example and use a Union:\n\n```\nfrom dataclasses import dataclass\n\
    from typing import Union\n@dataclass\nclass Error:\n    error_code: int\n    disposed_of:\
    \ bool\n\n@dataclass\nclass Snack:\n    name: str\n    condiments: set[str]\n\n\
    snack: Union[Snack, Error] = Snack(\"Hotdog\", {\"Mustard\", \"Ketchup\"})\n\n\
    snack = Error(5, True)\n```\n\nIn this case, snack can be either a Snack (which\
    \ is just a name and condiments) or an Error (which is just a number and a boolean).\
    \ With the use of a Union, how many representable states are there now?\n\nFor\
    \ Snack, there are 3 names and 4 possible list values, which is a total of 12\
    \ representable states. For ErrorCode, I can remove the 0 error code (since that\
    \ was only for success), which gives me 5 values for the error code and 2 values\
    \ for the boolean for a total of 10 representable states. Since the Union is an\
    \ either/or construct, I can either have 12 representable states in one case or\
    \ 10 in the other, for a total of 22. This is an example of a *sum type*, since\
    \ I'm adding the number of representable states together rather than multiplying.\n\
    \nThat's 22 total representable states. Compare that with the 144 states when\
    \ all the fields were lumped in a single entity. I've reduced my representable\
    \ state space by almost 85%. I've made it impossible to mix and match fields that\
    \ are incompatible with one another. It becomes much harder to make a mistake,\
    \ and there are far fewer combinations to test. Anytime you use a sum type, such\
    \ as a Union, you are dramatically decreasing the number of possible representable\
    \ states.\n\n# Literal Types\n\nWhen calculating the number of representable states,\
    \ I made some assumptions in the last section. I limited the number of values\
    \ that were possible, but that's a bit of a cheat, isn't it? As I said before,\
    \ there is almost an infinite number of values possible. Fortunately, there is\
    \ a way to limit the values through Python: Literals. Literal types allow you\
    \ to restrict the variable to a very specific set of values.\n\nI'll change my\
    \ earlier Snack class to employ Literal values:"
