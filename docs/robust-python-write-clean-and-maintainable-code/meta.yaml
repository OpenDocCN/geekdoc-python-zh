  md: "```\n# this is not an error\nsoup = Recipe(\n    aromatics=set(),\n    broth=Broth.CHICKEN,\n\
    \    vegetables=set(),\n    meats=set(),\n    starches=set(),\n    garnishes=set(),\n\
    \    time_to_cook=datetime.timedelta(seconds=3600)\n)\n```\n\nIf you would like\
    \ the typechecker to error out if the variable is rebound, you can annotate the\
    \ variable as Final (see Chapter 4 for more details on Final).\n\nSecondly, a\
    \ frozen dataclass only prevents its members from being set. If the members are\
    \ mutable, you are still able to call methods on those members to modify their\
    \ values. frozen dataclasses do not extend immutability to their attributes.\n\
    \nFor example, this code is perfectly fine:\n\n```\nsoup.aromatics.add(Ingredient(\"\
    Garlic\"))\n```\n\nEven though it is modifying the aromatics field of a frozen\
    \ dataclass, no error is raised. When using frozen dataclasses, make the members\
    \ immutable (such as integers, strings, or other frozen dataclasses) to avoid\
    \ this pitfall.\n\n# Comparison to Other Types\n\nData classes are relatively\
    \ new (introduced in Python 3.7); a lot of legacy code will not contain data classes.\
    \ As you evaluate data class adoption, you need to understand where a data class\
    \ shines in relation to other constructs.\n\n# Data Classes Versus Dictionaries\n\
    \nAs discussed in Chapter 5, dictionaries are fantastic for mapping keys to values,\
    \ but they are most appropriate when they are homogeneous (when all the keys are\
    \ the same type and all the values are the same type). When used for heterogeneous\
    \ data, dictionaries are tougher for humans to reason about. Also, typecheckers\
    \ don't know enough about the dictionary to check for errors.\n\nData classes,\
    \ however, are a natural fit for fundamentally heterogeneous data. Readers of\
    \ the code know the exact fields present in the type and typecheckers can check\
    \ for correct usage. If you have heterogeneous data, use a data class before you\
    \ reach for a dictionary."
