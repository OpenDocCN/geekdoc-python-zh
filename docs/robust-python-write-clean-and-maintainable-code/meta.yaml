  md: '# A Note About Manual Testing


    Since this is a book about robust Python, I am focusing mostly on your codebase
    and the tools that support it. This means there is a heavy bias toward automated
    testing in Python. However, do not take this to mean that manual testing should
    be tossed to the wayside.


    *Manual testing*, which is having a person execute testing steps instead of the
    computer, has its place. It is fantastic for things such as exploring your codebase
    in ways that are not easy for a computer, such as validating how a user will interact
    with your system, checking for security vulnerabilities, or running any other
    type of test that relies on subjective analysis.


    In cases where it is cheaper to run manual tests than automated tests (say for
    expensive test equipment or other constraints), it may also be appropriate to
    keep a human in the loop. Before you jump to this conclusion, though, factor in
    the cost of repetition: think through how often you will run the test. In some
    cases, the cost of manual testing will overtake the cost of automated testing
    after just a few test runs.


    Notice that Table 21-1 did not say anything about making sure your software is
    bug free. As Edsger Dijkstra wrote, “Program testing can be used to show the presence
    of bugs, but never to show their absence!”¹ Tests answer questions regarding the
    *quality* of your software.


    *Quality* is this nebulous, ill-defined term that gets tossed around quite a bit.
    It’s a tough thing to pin down, but I prefer this quote from Gerald Weinberg:
    “Quality is value to some person.”² I love how open-ended this quote is; you need
    to think of anyone who may receive some value from your system. It’s not just
    your direct customers, but your customers’ customers, your operations team, your
    sales, your coworkers, and so on.


    Once you’ve identified who receives the value of your system, you need to measure
    the impact when something goes wrong. For every test that is not run, you lose
    a chance to learn whether you are delivering value. What is the impact if that
    value is not delivered? For core business needs, the impact is pretty high. For
    features that lie outside of an end user’s critical path, the impact may be low.
    Know your impact, and weigh that against the cost of testing. If the impact’s
    cost is higher than the test, write


    1 Edsger W. Dijkstra. “Notes on Structured Programming.” Technological University
    Eindhoven, The Netherlands, Department of Mathematics, 1970. https://oreil.ly/NAhWf.


    2 Gerald M. Weinberg. *Quality Software Management*. Vol. 1: *Systems Thinking*.
    New York, NY: Dorset House Publishing, 1992.'
