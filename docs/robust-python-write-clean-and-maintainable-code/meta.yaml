    \n图 24-1. 使用 junit2html 生成的 mutmut 报告示例\n\n## 采用变异测试\n\n变异测试在当今的软件开发社区中并不普遍。我认为这有三个原因：\n\
    \n-   人们不了解它及其带来的好处。\n-   代码库的测试还不够成熟，无法进行有用的变异测试。\n-   成本效益比太高。\n\n本书正在积极努力改善第一点，但第二点和第三点确实有其道理。\n\
    \n如果你的代码库没有一套成熟的测试，那么引入变异测试你将看不到什么价值。它最终会提供过高的噪声信号比。改进你的测试套件比试图找到所有变异体会带来更大的价值。考虑在代码库中那些确实有成熟测试套件的较小部分上运行变异测试。\n\
    \n变异测试确实成本很高；为了使其值得，最大化所获得的价值非常重要。变异测试很慢，因为需要多次运行测试套件。将变异测试引入现有代码库也是痛苦的。从一开始就针对全新的代码开始要容易得多。\n\
    \n然而，由于你正在阅读一本关于提高潜在复杂代码库健壮性的书，你很有可能是在一个现有的代码库中工作。不过，如果你想引入变异测试，希望并未破灭。与任何提高健壮性的方法一样，技巧在于有选择性地运行变异测试。\n\
    \n寻找那些有很多 bug 的代码区域。浏览 bug 报告，找出表明某个代码区域问题重重的趋势。还要考虑寻找那些高变动率的代码区域，因为这些区域最有可能引入当前测试未完全覆盖的更改。²\
    \ 找到那些变异测试能带来数倍回报的区域。你可以使用 mutmut 仅在这些区域上选择性地运行变异测试。\n\n此外，mutmut 有一个选项，可以仅对代码库中具有\
    \ *行覆盖率* 的部分进行变异测试。如果一行代码被任何测试至少执行一次，则该行代码具有 *覆盖率*。还存在其他类型的覆盖率，例如 API 覆盖率和分支覆盖率，但\
    \ mutmut 专注于行覆盖率。mutmut 只会为你实际有测试的代码生成变异体。\n\n> ² 你可以通过测量提交次数最多的文件来找到高变动率的代码。我在快速搜索后找到了以下\
    \ Git 单行命令：`git rev-list --objects --all | awk '$2' | sort -k2 | uniq -cf1 | sort\
    \ -rn | head`。这是由 sehe 在 [这个 Stack Overflow 问题](https://stackoverflow.com/questions/10568859)\
    \ 中提供的。\n\n要生成覆盖率，首先安装 coverage：\n\n```\npip install coverage\n```\n\n然后使用 coverage\
    \ 命令运行你的测试套件。对于上面的示例，我运行：\n\n```\ncoverage run -m pytest code_examples/chapter24\n\
    ```\n\n接下来，你所要做的就是将 `--use-coverage` 标志传递给你的 mutmut 运行：\n\n```\nmutmut run --paths-to-mutate\
    \ code_examples/chapter24 --use-coverage\n```\n\n这样，mutmut 将忽略任何未经测试的代码，从而大大减少噪声。\n\
    \n## 覆盖率（及其他指标）的谬误\n\n每当出现一种衡量代码的方法时，人们就会急于将该衡量标准用作 *指标*，或作为业务价值代理预测器的目标。然而，在软件开发史上出现了许多不明智的指标，其中最臭名昭著的是使用编写的代码行数作为项目进度的指标。其逻辑是，如果能直接衡量每个人编写的代码量，就能直接衡量该人的生产力。不幸的是，这导致开发者操纵系统，试图编写故意冗长的代码。这作为指标适得其反，因为系统最终变得复杂臃肿，由于可维护性差，开发速度也放缓了。\n\
    \n作为一个行业，我们已经超越了衡量代码行数（我希望如此）。然而，一个指标消失的地方，又会有两个指标取而代之。我见过其他备受诟病的指标出现，比如修复的 bug\
    \ 数量或编写的测试数量。表面上看，这些都是好事，但问题在于当它们被当作与业务价值挂钩的指标来审视时。在这些指标中，每一种都有操纵数据的方法。你是根据修复的\
    \ bug 数量来评判的吗？那么，一开始就多写一些 bug 吧！\n\n不幸的是，代码覆盖率在近年来也陷入了同样的陷阱。你听到诸如“这段代码应该达到 100%\
    \ 的行覆盖率”或“我们应该努力达到 90% 的分支覆盖率”之类的目标。这在孤立来看是值得称赞的，但它未能预测业务价值。它忽略了你最初想要这些目标的 *原因*。\n\
    \n代码覆盖率是缺乏健壮性的预测指标，而不是许多人认为的质量指标。覆盖率低的代码可能满足也可能不满足你的所有需求；你无法可靠地知道。这是一个信号，表明你在修改代码时会遇到挑战，因为你没有在该部分系统周围建立任何安全网。"
