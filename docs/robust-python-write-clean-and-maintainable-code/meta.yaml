    \ [get_amount_of_preceding_whitespace(line)\n                            for line\
    \ in file_to_check\n                            if line != \"\"]\n        average\
    \ = sum(whitespace_count) / len(whitespace_count) / 4\n        print(f\"Avg indentation\
    \ level for {filename}: {average}\")\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_313_0.png)\n\
    \nAnother possible measure of whitespace is the “area” of indentation per function,\
    \ where you sum up all the indentation instead of averaging it. I am leaving this\
    \ as an exercise for the reader to implement.\n\nAs with cyclomatic complexity,\
    \ there is no magic number to check for with white-space complexity. I encourage\
    \ you to play around in your codebase and determine what an appropriate amount\
    \ of indentation is.\n\n## Security Analysis\n\nSecurity is difficult to do right,\
    \ and hardly anyone ever gets lauded for breach prevention. Instead, it's the\
    \ breaches themselves that seem to dominate the news. Every month I hear of another\
    \ breach or data leak. These breakdowns are incredibly costly to a company, be\
    \ it from regulatory fines or loss of customer base.\n\nEvery developer needs\
    \ to be hyperaware of the security of their codebase. You don't want to hear about\
    \ how *your* codebase is the root cause of the latest massive data breach in the\
    \ news. Thankfully, there are static analysis tools that can prevent common security\
    \ flaws.\n\n## Leaking secrets\n\nIf you ever want to be terrified, search for\
    \ the text `AWS_SECRET_KEY` in your favorite code-hosting tool, like [GitHub](https://github.com).\
    \ You will be amazed at how many people commit secret values such as the key that\
    \ provides access to AWS.⁴\n\nOnce a secret is in a version control system, especially\
    \ a publicly hosted one, it is very hard to remove traces of it. The organization\
