    Pytype''s leniency and approach to typechecking make it very forgiving for adopting
    into existing codebases. You don''t need any type annotations in order to see
    the value. This means you get all the benefits of a typechecker with very minimal
    work. High value, but low cost? Yes, please.


    However, Pytype is a double-edged sword in this case. Make sure you don''t use
    Pytype as a crutch; you should still be writing type annotations. It becomes incredibly
    easy with Pytype to think that you don''t need type annotations at all. However,
    you should still write them for two reasons. Firstly, type annotations provide
    a documentation benefit, which helps your code''s readability. Secondly, Pytype
    will be able to make even more intelligent decisions if type annotations are present.


    # Closing Thoughts


    Type annotations are incredibly useful, but there is no denying their cost. The
    larger the codebase, the higher the cost will be for practically adopting type
    annotations. Every codebase is different; you need to evaluate the value and cost
    of type annotations for your specific scenario. If type annotations are too costly
    to adopt, consider three strategies to get past that hurdle:


    *Find pain points*

    If you can eliminate entire classes of pain points through type annotations, such
    as errors, broken tests, or unclear code, you will save time and money. You target
    the areas that hurt the most, and by lessening that pain you are making it easier
    for developers to deliver value over time (which is a sure sign of maintainable
    code).


    *Target code strategically*

    Pick your spots wisely. In a large codebase, it will be near impossible to annotate
    every meaningful part of your code. Instead, focus on smaller sections that would
    see a huge benefit.


    *Lean on your tooling*

    Use mypy to help you selectively ignore files (and make sure that you are ignoring
    fewer lines of code over time). Use type annotators such as MonkeyType and Pytype
    to quickly generate types throughout your code. Don''t discount Pytype as a typechecker
    either, as it can find bugs lurking in your code with minimal setup.'
