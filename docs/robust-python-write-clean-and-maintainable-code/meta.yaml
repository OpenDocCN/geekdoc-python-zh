  - '[PAGE 86]


    dictionary is natural, such as API interactions or user-configurable data? For
    these cases, you should use a TypedDict.


    # TypedDict


    TypedDict, introduced in Python 3.8, is for the scenarios where you absolutely
    must store heterogeneous data in a dictionary. These are typically situations
    where you can''t avoid heterogeneous data. JSON APIs, YAML, TOML, XML, and CSVs
    all have easy-to-use Python modules that convert these data formats into a dictionary
    and are naturally heterogeneous. This means the data that gets returned has all
    the same problems as listed in the previous section. Your typechecker won''t help
    out much and users won''t know what keys and values are available.


    > If you have full control of the dictionary, meaning you create it in code you
    own and handle it in code you own, you should consider using a dataclass (see
    Chapter 9) or a class (see Chapter 10) instead.


    For example, suppose I want to augment my digital cookbook app to provide nutritional
    information for the recipes listed. I decide to use the Spoonacular API and write
    some code to get nutritional information:


    ```

    nutrition_information = get_nutrition_from_spoonacular(recipe_name)

    # print grams of fat in recipe

    print(nutrition_information["fat"]["value"])

    ```


    If you were reviewing the code, how would you know that this code is right? If
    you wanted to also print out the calories, how do you access the data? What guarantees
    do you have about the fields inside of this dictionary? To answer these questions,
    you have two options:


    +   - Look up the API documentation (if any) and confirm that the right fields
    are being used. In this scenario, you hope that the documentation is actually
    complete and correct.

    - Run the code and print out the returned dictionary. In this situation, you hope
    that test responses are pretty identical to production responses.


    The problem is that you are requiring every reader, reviewer, and maintainer to
    do one of these two steps in order to understand the code. If they don''t, you
    will not get good code review feedback and developers will run the risk of using
    the response incorrectly. This leads to incorrect assumptions and brittle code.
    TypedDict allows you to encode what you''ve learned about that API directly into
    your type system.'
- md: "from typing import TypedDict\n\nclass Range(TypedDict):\n    min: float\n \
    \   max: float\n\nclass NutritionInformation(TypedDict):\n    value: int\n   \
    \ unit: str\n    confidenceRange95Percent: Range\n    standardDeviation: float\n\
    \nclass RecipeNutritionInformation(TypedDict):\n    recipes_used: int\n    calories:\
    \ NutritionInformation\n    fat: NutritionInformation\n    protein: NutritionInformation\n\
    \    carbs: NutritionInformation\n\nnutrition_information: RecipeNutritionInformation\
    \ = get_nutrition_from_spoonacular(recipe_name)\n\nNow it is incredibly apparent\
    \ exactly what data types you can rely upon. If the API ever changes, a developer\
    \ can update all the TypedDict classes and let the typechecker catch any incongruities.\
    \ Your typechecker now completely understands your dictionary, and readers of\
    \ your code can reason about responses without having to do any external searching.\n\
    \nEven better, these TypedDict collections can be as arbitrarily complex as you\
    \ need them to be. You’ll see that I nested TypedDict instances for reusability\
    \ purposes, but you can also embed your own custom types, Unions, and Optionals\
    \ to reflect the possibilities that an API can return. And while I’ve mostly been\
    \ talking about API, remember that these benefits apply to any heterogeneous dictionary,\
    \ such as when reading JSON or YAML.\n\n> TypedDict is only for the typechecker’s\
    \ benefit. There is no runtime validation at all; the runtime type is just a dictionary.\n\
    \nSo far, I’ve been teaching you how to deal with built-in collection types: lists/sets/dictionaries\
    \ for homogeneous collections and tuples/TypedDict for heterogeneous collections.\
    \ What if these types don’t do *everything* that you want? What if you want to\
    \ create new collections that are easy to use? To do that, you’ll need a new set\
    \ of tools.\n\n## Creating New Collections\n\nWhen writing a new collection, you\
    \ should ask yourself: am I trying to write a new collection that isn't representable\
    \ by another collection type, or am I trying to modify an existing collection\
    \ to provide some new behavior? Depending on the answer, you may need to employ\
    \ different techniques to achieve your goal.\n\nIf you write a collection type\
    \ that isn't representable by another collection type, you are bound to come across\
    \ *generics* at some point.\n\n## Generics\n\nA generic type indicates that you\
    \ don't care what type you are using. However, it helps restrict users from mixing\
    \ types where inappropriate.\n\nConsider the innocuous reverse list function:\n\
    \n```python\ndef reverse(coll: list) -> list:\n    return coll[::-1]\n```\n\n\
    How do I indicate that the returned list should contain the same type as the passed-in\
    \ list? To achieve this, I use a generic, which is done with a TypeVar in Python:\n\
    \n```python\nfrom typing import TypeVar\nT = TypeVar('T')\ndef reverse(coll: list[T])\
    \ -> list[T]:\n    return coll[::-1]\n```\n\nThis says that for a type T, reverse\
    \ takes in a list of elements of type T and returns a list of elements of type\
    \ T. I can't mix types: a list of integers will never be able to become a list\
    \ of strings if those lists aren't using the same TypeVar.\n\nI can use this sort\
    \ of pattern to define entire classes. Suppose I want to integrate a cookbook\
    \ recommender service into the cookbook collection app. I want to be able to recommend\
    \ cookbooks or recipes based on a customer's ratings. To do this, I want to store\
    \ each of these pieces of rating information in a *graph*. A graph is a data structure\
    \ that contains a series of entities known as *nodes* and that tracks *edges*\
    \ (relationships between those nodes). However, I don't want to write separate\
    \ code for a cookbook graph and a recipe graph. So I define a Graph class that\
    \ can be used for generic types:\n\n```python\nfrom collections import defaultdict\n\
    from typing import Generic, TypeVar\n\nNode = TypeVar(\"Node\")\nEdge = TypeVar(\"\
    Edge\")\n\n# directed graph\nclass Graph(Generic[Node, Edge]):\n    def __init__(self):\n\
    \        self.edges: dict[Node, list[Edge]] = defaultdict(list)\n\n    def add_relation(self,\
    \ node: Node, to: Edge):\n        self.edges[node].append(to)\n\n    def get_relations(self,\
    \ node: Node) -> list[Edge]:\n        return self.edges[node]\n```\n\nWith this\
    \ code, I can define all sorts of graphs and still have them typecheck successfully:\n\
    \n```python\ncookbooks: Graph[Cookbook, Cookbook] = Graph()\nrecipes: Graph[Recipe,\
    \ Recipe] = Graph()\n\ncookbook_recipes: Graph[Cookbook, Recipe] = Graph()\n\n\
    recipes.add_relation(Recipe('Pasta Bolognese'),\n                    Recipe('Pasta\
    \ with Sausage and Basil'))\n\ncookbook_recipes.add_relation(Cookbook('The Food\
    \ Lab'),\n                            Recipe('Pasta Bolognese'))\n```\n\nWhereas\
    \ this code does not typecheck:\n\n```python\ncookbooks.add_relation(Recipe('Cheeseburger'),\
    \ Recipe('Hamburger'))\n\n# code_examples/chapter5/invalid/graph.py:25:\n#   \
    \  error: Argument 1 to \"add_relation\" of \"Graph\" has\n#         incompatible\
    \ type \"Recipe\"; expected \"Cookbook\"\n```\n\nUsing generics can help you write\
    \ collections that use types consistently throughout their lifetime. This reduces\
    \ the amount of duplication in your codebase, which minimizes the chances of bugs\
    \ and reduces cognitive burden.\n\n### Other Uses for Generics\n\nWhile generics\
    \ are often used for collections, you can technically use them for any type. For\
    \ example, suppose you want to simplify your API error handling. You've already\
    \ forced your code to return a Union of the response type and an error type like\
    \ so:\n\n```python\ndef get_nutrition_info(recipe: str) -> Union[NutritionInfo,\
    \ APIError]:\n    # ...\n\ndef get_ingredients(recipe: str) -> Union[list[Ingredient],\
    \ APIError]:\n    #...\n\ndef get_restaurants_serving(recipe: str) -> Union[list[Restaurant],\
    \ APIError]:\n    # ...\n```\n\nBut this is unnecessarily duplicated code. You\
    \ have to specify a Union[X, APIError] each time, where only X changes. What if\
    \ you wanted to change the error response class, or force users to handle different\
    \ types of errors separately? Generics can help with deduplicating these types:\n\
    \n```python\nT = TypeVar(\"T\")\nAPIResponse = Union[T, APIError]\n\ndef get_nutrition_info(recipe:\
    \ str) -> APIResponse[NutritionInfo]:\n    # ...\n\ndef get_ingredients(recipe:\
    \ str) -> APIResponse[list[Ingredient]]:\n    #...\n\ndef get_restaurants_serving(recipe:\
    \ str) -> APIResponse[list[Restaurant]]:\n    # ...\n```\n\nNow you have a single\
    \ place to control all of your API error handling. If you were to change it, you\
    \ can rely on your typechecker to catch all the places needing changes.\n\n##\
    \ Modifying Existing Types\n\nGenerics are nice for creating your own collection\
    \ types, but what if you just want to tweak some behavior of an existing collection\
    \ type, such as a list or dictionary? Having to completely rewrite all the semantics\
    \ of a collection would be tedious and error-prone. Thankfully, methods exist\
    \ to make this a snap. Let’s go back to our cookbook app. I’ve written code earlier\
    \ that grabs nutrition information, but now I want to store all that nutrition\
    \ information in a dictionary.\n\nHowever, I hit a problem: the same ingredient\
    \ has very different names depending on where you’re from. Take a dark leafy green,\
    \ common in salads. While an American chef might call it “arugula,” a European\
    \ might call it “rocket.” This doesn’t even begin to cover the names in languages\
    \ other than English. To combat this, I want to create a dictionary-like object\
    \ that automatically handles these aliases:\n\n```python\n>>> nutrition = NutritionalInformation()\n\
    >>> nutrition[\"arugula\"] = get_nutrition_information(\"arugula\")\n>>> print(nutrition[\"\
    rocket\"]) # arugula is the same as rocket\n{\n    \"name\": \"arugula\",\n  \
    \  \"calories_per_serving\": 5,\n    # ... snip ...\n}\n```\n\nSo how can I write\
    \ NutritionalInformation to act like a dict?\n\nA lot of a developer’s first instinct\
    \ is to subclass dictionaries. No worries if you aren’t awesome at subclassing;\
    \ I’ll be going much more in depth in Chapter 12. For now, just treat subclassing\
    \ as a way of saying, “I want my subclass to behave exactly like the parent class.”\
    \ However, you’ll learn that subclassing a dictionary may not always be what you\
    \ want. Consider the following code:"
