    \ `[]`。关于这种行为已经有很多论述，但它是错误的常见陷阱，尤其是对于语言新手来说。\n\n另一个错误则更为微妙：并非所有分支都返回相同的类型。“但是等等！”你惊呼道。“没关系，因为我用了\
    \ `assert`，它会引发错误而不是继续执行 `if` 语句（返回 `None`）。”然而，虽然 `assert` 语句很棒，但它们可以被禁用。当你向\
    \ Python 传递 `-O` 标志时，它会禁用所有 `assert` 语句。所以，当 `-O` 标志开启时，这个函数返回 `None`。需要说明的是，mypy\
