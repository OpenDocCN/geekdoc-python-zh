    \ weaker side of the spectrum will not restrict the use of operations to the types\
    \ that support them. Types are often coerced into a different type to make sense\
    \ of an operation. Languages such as JavaScript, Perl, and older versions of C\
    \ are weakly typed. Proponents advocate the speed with which developers can quickly\
    \ iterate on code without fighting the language along the way.\n\nPython falls\
    \ toward the stronger side of the spectrum. There are very few implicit conversions\
    \ that happen between types. It is noticeable when you perform illegal operations:\n\
