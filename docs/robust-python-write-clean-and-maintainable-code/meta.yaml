    In terms of robustness, a strongly typed language such as Python certainly helps
    us out. While errors still will show up at runtime instead of at development time,
    they still will show up in an obvious TypeError exception. This reduces the time
    taken to debug issues significantly, again allowing you to deliver incremental
    value more quickly.


