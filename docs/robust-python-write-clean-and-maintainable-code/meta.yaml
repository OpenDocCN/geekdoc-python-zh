  md: "this for you. The best you can do until such a tool exists is write dummy annotations\
    \ or use strings to describe your constraints. At this point, Annotated is best\
    \ served as a communication method.\n\n# NewType\n\nWhile waiting for tooling\
    \ to support Annotated, there is another way to represent more complicated constraints:\
    \ NewType. NewType allows you to, well, create a new type.\n\nSuppose I want to\
    \ separate my hot dog stand code to handle two separate cases: a hot dog in its\
    \ unservable form (no plate, no napkins) and a hot dog that is ready to serve\
    \ (plated, with napkins). In my code, there exist some functions that should only\
    \ be operating on the hot dog in one case or the other. For example, an unservable\
    \ hot dog should never be dispensed to the customer.\n\n```\nclass HotDog:\n \
    \   # ... snip hot dog class implementation ...\n\ndef dispense_to_customer(hot_dog:\
    \ HotDog):\n    # note, this should only accept ready-to-serve hot dogs.\n   \
    \ # ...\n```\n\nHowever, nothing prevents someone from passing in an unservable\
    \ hot dog. If a developer makes a mistake and passes an unservable hot dog to\
    \ this function, customers will be quite surprised to see just their order with\
    \ no plate or napkins come out of the machine.\n\nRather than relying on developers\
    \ to catch these errors whenever they happen, you need a way for your typechecker\
    \ to catch this. To do that, you can use NewType:\n\n```\nfrom typing import NewType\n\
    \nclass HotDog:\n    '''Used to represent an unservable hot dog'''\n    # ...\
    \ snip hot dog class implementation ...\n\nReadyToServeHotDog = NewType(\"ReadyToServeHotDog\"\
    , HotDog)\n\ndef dispense_to_customer(hot_dog: ReadyToServeHotDog):\n    # ...\n\
    ```\n\nA NewType takes an existing type and creates a brand new type that has\
    \ all the same fields and methods as the existing type. In this case, I am creating\
    \ a type ReadyToServeHotDog that is distinct from HotDog; they are not interchangeable.\
    \ What's beautiful about this is that this type restricts implicit type conversions.\
    \ You cannot use a Hot Dog anywhere you are expecting a ReadyToServeHotDog (you\
    \ can use a ReadyToServe HotDog in place of HotDog, though). In the previous example,\
    \ I am restricting"
  merge: -1
