    # Discussion Topic


    Where can you use protocols in your codebase? Discuss areas where you use duck
    typing heavily or write generic code. Discuss how it would be easy to misuse these
    areas of code without using a protocol.


    The typechecker will detect that a BLTSandwich is Splittable just by virtue of
    the fields and method it has defined. This simplifies class hierarchies immensely.
    You don''t need a complicated tree structure, even as you add more protocols.
    You can simply define a different protocol for each set of required behaviors,
    including Shareable, Substitutable, or PickUppable. Functions that depend on those
    behaviors can then rely on those protocols instead of any sort of base class.
    The original classes don''t need to change in any form, as long as they implement
    the needed functionality.


    > ## Do Protocols Eliminate the Need for Inheritance?


    Once you get used to protocols, inheritance appears redundant. While inheritance
    makes a lot of sense for nominal subtyping, it is too heavyweight for anything
    regarding structural subtyping. You are introducing linkages that don''t need
    to be there, increasing the maintenance cost of your system.


    To decide whether to use a protocol or subclass, I want you to remember the lessons
    learned in Chapter 12. Anything subclassing another class or adhering to a protocol
    is a subtype. Therefore, it needs to uphold the contract of the parent type. If
    the contract just defines the structure of the type (such as being Splittable,
    which just needed certain attributes to be defined), use a protocol. However,
    if the parent type''s contract defines behaviors that need to be upheld, such
    as how to operate in certain conditions, use inheritance to better reflect the
    *is-a* relationship.


    # Advanced Usage


    I''ve covered the primary use case for protocols so far, but there''s a little
    more I''d like to show you. You won''t be reaching for these features as often,
    but they fill out a critical niche for protocols.


    # Composite Protocols


    I talked in the last section about how a class might satisfy multiple protocols.
    For instance, a single lunch item may be Splittable, Shareable, Substitutable,
    and PickUppable. While you can mix in these protocols quite easily, what if you
    found out that over half the lunch entries fall into this category? You could
    designate these'
