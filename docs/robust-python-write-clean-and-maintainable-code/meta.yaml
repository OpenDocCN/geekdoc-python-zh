  md: "If you want to control how comparison is defined, you can write your own __le__,\
    \ __lt__, __gt__, and __ge__ functions in the dataclass, which map to less-than-or-equals,\
    \ less-than, greater-than, and greater-than-or-equals, respectively. For instance,\
    \ if you wanted your NutritionInformation sorted first by fat, then carbohydrates,\
    \ and then calories by default:\n\n```\n@dataclass(eq=True)\nclass NutritionInformation:\n\
    \    calories: int\n    fat: int\n    carbohydrates: int\n\n    def __lt__(self,\
    \ rhs) -> bool:\n        return ((self.fat, self.carbohydrates, self.calories)\
    \ <\n                (rhs.fat, rhs.carbohydrates, rhs.calories))\n\n    def __le__(self,\
    \ rhs) -> bool:\n        return self < rhs or self == rhs\n\n    def __gt__(self,\
    \ rhs) -> bool:\n        return not self <= rhs\n\n    def __ge__(self, rhs) ->\
    \ bool:\n        return not self < rhs\n\nnutritionals = [NutritionInformation(calories=100,\
    \ fat=1, carbohydrates=3),\n                NutritionInformation(calories=50,\
    \ fat=6, carbohydrates=4),\n                NutritionInformation(calories=125,\
    \ fat=12, carbohydrates=3)]\n\n>>> sorted(nutritionals)\n[NutritionInformation(calories=100,\
    \ fat=1, carbohydrates=3),\n NutritionInformation(calories=50, fat=6, carbohydrates=4),\n\
    \ NutritionInformation(calories=125, fat=12, carbohydrates=3)]\n```\n\n> If you\
    \ override comparison functions, do not specify order=True, as that will raise\
    \ a ValueError.\n\n# Immutability\n\nSometimes, you need to convey that a dataclass\
    \ should not be able to be changed. In that case, you can specify that a dataclass\
    \ must be frozen, or unable to change. Anytime you change the state of a dataclass,\
    \ you introduce entire classes of errors that might happen:"
  merge: -1
  pgno: 149
- img_proc: true
  md: "+   - Callers of your code may be unaware that the fields changed; they could\
    \ erroneously assume that the fields are static.\n- Setting a single field to\
    \ an incorrect value might be incompatible with how the other fields are set.\n\
    - If there are multiple threads modifying the fields, you run the risk of a data\
    \ race, which means you cannot guarantee in which order the modifications are\
    \ applied in relation to one another.\n\nNone of these error cases occur if your\
    \ dataclass is frozen. To freeze a dataclass, add a frozen=True to the dataclass\
    \ decorator:\n\n```\n@dataclass(frozen=True)\nclass Recipe:\n    aromatics: Set[Ingredient]\n\
    \    broth: Broth\n    vegetables: Set[Ingredient]\n    meats: Set[Ingredient]\n\
    \    starches: Set[Ingredient]\n    garnishes: Set[Ingredient]\n    time_to_cook:\
    \ datetime.timedelta\n```\n\nIf you want to use your dataclass in a set or as\
    \ a key in a dictionary it must be hashable. This means it must define a __hash__\
    \ function that takes your object and distills it down to a number.² When you\
    \ freeze a dataclass, it automatically becomes hashable, as long as you don't\
    \ explicitly disable equality checking and all fields are hashable.\n\nThere are\
    \ two caveats around this immutability, however. First, when I say immutability,\
    \ I am referencing the fields in the dataclass, not the variable containing the\
    \ dataclass itself. For example:\n\n```\n# assume that Recipe is immutable because\n\
    # frozen was set to true in the decorator\nsoup = Recipe(\n    aromatics={pepper,\
    \ garlic},\n    broth=Broth.CHICKEN,\n    vegetables={celery, onions, carrots},\n\
    \    meats={chicken},\n    starches={noodles},\n    garnishes={parsley},\n   \
    \ time_to_cook=datetime.timedelta(minutes=60))\n\n# this is an error\nsoup.broth\
    \ = Broth.VEGETABLE\n```\n\n² Hashing is a complicated subject, beyond the scope\
    \ of this book. You can learn more about the hash function in the Python documentation."
