    )\n```\n\nOption 1: Béchamel\nOption 2: Velouté\nOption 3: Espagnole\nOption 4:\
    \ Tomato\nOption 5: Hollandaise\n\n最后，也是至关重要的一点，你可以在使用此枚举的函数中传达你的意图：\n\n```\n\
    def create_daughter_sauce(mother_sauce: MotherSauce,\n                       \
    \ extra_ingredients: list[str]):\n    # ...\n```\n\n这告诉所有查看此函数的开发者，他们应该传入一个 `MotherSauce`\
    \ 枚举，而不仅仅是任何旧的字符串。这样就更难引入拼写错误或不正确的值了。（如果用户真的想，他们仍然可以传递错误的值，但这将直接违反预期，这更容易被发现——我在第一部分中介绍了如何捕获这些错误。）\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_134_0.png)\n\n## 何时不使用\n\n枚举非常适合向用户传达一组静态的选择。你不希望在选项在运行时确定的情况下使用它们，因为你会失去它们在传达意图和工具支持方面的许多好处（如果值在每次运行时都可能改变，代码的读者就很难知道哪些值是可能的）。如果你发现自己处于这种情况，我建议使用字典，它提供了两个可以在运行时更改的值之间的自然映射。不过，如果你需要限制用户可以选择的值，你需要执行成员检查。\n\
    \n## 高级用法\n\n一旦掌握了枚举的基础知识，你可以做很多事情来进一步优化你的用法。请记住，你选择的类型越具体，传达的信息就越具体。\n\n### 自动值\n\
    \n对于某些枚举，你可能想明确表示你并不关心枚举所关联的值。这告诉用户他们不应该依赖这些值。为此，你可以使用 `auto()` 函数。\n\n```\nfrom\
    \ enum import auto, Enum\nclass MotherSauce(Enum):\n    BÉCHAMEL = auto()\n  \
    \  VELOUTÉ = auto()\n    ESPAGNOLE = auto()\n    TOMATO = auto()\n    HOLLANDAISE\
    \ = auto()\n\n>>>list(MotherSauce)\n[<MotherSauce.BÉCHAMEL: 1>, <MotherSauce.VELOUTÉ:\
    \ 2>, <MotherSauce.ESPAGNOLE: 3>,\n <MotherSauce.TOMATO: 4>, <MotherSauce.HOLLANDAISE:\
    \ 5>]\n```\n\n默认情况下，`auto()` 会选择单调递增的值（1, 2, 3, 4, 5...）。如果你想控制设置的值，你应该实现一个 `_generate_next_value_()`\
    \ 函数：\n\n```\nfrom enum import auto, Enum\nclass MotherSauce(Enum):\n    def _generate_next_value_(name,\
    \ start, count, last_values):\n        return name.capitalize()\n    BÉCHAMEL\
    \ = auto()\n    VELOUTÉ = auto()\n    ESPAGNOLE = auto()\n    TOMATO = auto()\n\
    \    HOLLANDAISE = auto()\n\n>>>list(MotherSauce)\n[<MotherSauce.BÉCHAMEL: 'Béchamel'>,\
    \ <MotherSauce.VELOUTÉ: 'Velouté'>,\n <MotherSauce.ESPAGNOLE: 'Espagnole'>, <MotherSauce.TOMATO:\
    \ 'Tomato'>,\n <MotherSauce.HOLLANDAISE: 'Hollandaise'>]\n```\n\n你很少会看到像这样在枚举内部直接定义\
    \ `_generate_next_value_`，其中包含值。如果使用 `auto` 表示值无关紧要，那么 `_generate_next_value_`\
    \ 则表示你希望 `auto` 有非常具体的值。这感觉很矛盾。这就是为什么你通常在基类 `Enum` 中使用 `_generate_next_value_`，这些枚举旨在被子类化，并且不包含任何值。你接下来会看到的\
    \ `Flag` 类就是一个基类的好例子。\n\n### 枚举与字面量\n\nPython 的 `Literal`（在 Python 3.8 中引入）与具有自动设置值的\
    \ `Enum`（假设没有 `_generate_next_value_`）有许多相同的好处。在这两种情况下，你都将变量限制为一组非常特定的值。\n\n从类型检查器的角度来看，以下两者之间几乎没有区别：\n\
    \n```python\nsauce: Literal['Béchamel', 'Velouté', 'Espagnole',\n            \
    \   'Tomato', 'Hollandaise'] = 'Hollandaise'\n```\n\n和这个：\n\n```python\nsauce:\
    \ MotherSauce = MotherSauce.HOLLANDAISE\n```\n\n如果你只需要简单的限制，首先使用 `Literal`。但是，如果你需要迭代、运行时检查或从名称到值的不同映射，请使用枚举。\n\
    \n### 标志\n\n现在你已经用枚举表示了母酱，你决定开始用这些酱料提供餐点。但在开始之前，你想了解顾客的过敏情况，因此你决定为每道菜表示过敏信息。利用你新学到的\
    \ `auto()` 知识，设置 `Allergen` 枚举是小菜一碟：\n\n```python\nfrom enum import auto, Enum\n\
    from typing import Set\nclass Allergen(Enum):\n    FISH = auto()\n    SHELLFISH\
    \ = auto()\n    TREE_NUTS = auto()\n    PEANUTS = auto()\n    GLUTEN = auto()\n\
    \    SOY = auto()\n    DAIRY = auto()\n```\n\n对于一个食谱，你可能会这样跟踪过敏原列表：\n\n```python\n\
    allergens: Set[Allergen] = {Allergen.FISH, Allergen.SOY}\n```\n\n这告诉读者，过敏原的集合将是唯一的，并且可能有零个、一个或多个过敏原。这正是你想要的。但如果我希望系统中的所有过敏原信息都像这样跟踪呢？我不想依赖每个开发者都记得使用集合（仅仅使用一次列表或字典就可能引入错误行为）。我需要某种方式来普遍表示一组唯一的枚举值。\n\
    \n`enum` 模块为你提供了一个方便的基类——`Flag`：\n\n```\nfrom enum import Flag\nclass Allergen(Flag):\n\
    \    FISH = auto()\n    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS\
    \ = auto()\n    GLUTEN = auto()\n    SOY = auto()\n    DAIRY = auto()\n```\n\n\
    这让你可以执行位运算来组合过敏原或检查是否存在某些过敏原。\n\n```\n>>>allergens = Allergen.FISH | Allergen.SHELLFISH\n\
    >>>allergens\n<Allergen.SHELLFISH|FISH: 3>\n\n>>>if allergens & Allergen.FISH:\n\
    >>>    print(\"This recipe contains fish.\")\nThis recipe contains fish.\n```\n\
    \n当你想表示一组值的选择时（例如，通过多选下拉菜单或位掩码设置的内容），这非常有用。但是，存在一些限制。值必须支持位运算（`|`、`&` 等）。字符串就是不支持位运算的类型示例，而整数支持。此外，执行位运算时值不能重叠。例如，你不能在枚举中使用\
    \ 1 到 4（含）的值，因为 4 将与值 1、2 和 4 进行“按位与”运算，这可能不是你想要的。`auto()` 会为你处理这个问题，因为 `Flag`\
    \ 的 `_generate_next_value_` 自动使用 2 的幂。\n\n```\nclass Allergen(Flag):\n    FISH\
    \ = auto()\n    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS = auto()\n\
    \    GLUTEN = auto()\n    SOY = auto()\n    DAIRY = auto()\n    SEAFOOD = Allergen.FISH\
    \ | Allergen.SHELLFISH\n    ALL_NUTS = Allergen.TREE_NUTS | Allergen.PEANUTS\n\
    ```\n\n标志的使用可以在非常特定的情况下表达你的意思，但如果你想要更多地控制你的值，或者正在枚举不支持位运算的值，请使用非标志枚举。"
