  - "[PAGE 137]\n\nevery developer remembering to use a set (just one use of a list\
    \ or dictionary can invite wrong behavior). I want some way to represent a grouping\
    \ of unique enumeration values universally.\n\nThe enum module gives you a handy\
    \ base class to use—Flag:\n\n```\nfrom enum import Flag\nclass Allergen(Flag):\n\
    \    FISH = auto()\n    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS\
    \ = auto()\n    GLUTEN = auto()\n    SOY = auto()\n    DAIRY = auto()\n```\n\n\
    This lets you perform bitwise operations to combine allergens or check if certain\
    \ allergens are present.\n\n```\n>>>allergens = Allergen.FISH | Allergen.SHELLFISH\n\
    >>>allergens\n<Allergen.SHELLFISH|FISH: 3>\n\n>>>if allergens & Allergen.FISH:\n\
    >>>    print(\"This recipe contains fish.\")\nThis recipe contains fish.\n```\n\
    \nThis is great when you want to represent a selection of values (say, something\
    \ that was set through a multi-drop down or a bitmask). There are some limitations,\
    \ though. The values must support the bitwise operations (|, &, etc.). Strings\
    \ would be an example of types that don't, while integers do. Furthermore, the\
    \ values cannot overlap when bitwise operations are performed. For example, you\
    \ cannot use the values from 1 through 4 (inclusive) for your Enum because 4 will\
    \ “bitwise and” for the values 1, 2, and 4 which is probably not what you want.\
    \ auto() takes care of this for you because the _generate_next_value_ of Flag\
    \ automatically uses powers of 2.\n\n```\nclass Allergen(Flag):\n    FISH = auto()\n\
    \    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS = auto()\n    GLUTEN\
    \ = auto()\n    SOY = auto()\n    DAIRY = auto()\n    SEAFOOD = Allergen.FISH\
    \ | Allergen.SHELLFISH\n    ALL_NUTS = Allergen.TREE_NUTS | Allergen.PEANUTS\n\
    ```\n\nThe use of flags can express what you mean in very specific circumstances,\
    \ but if you ever want more control of your values, or are enumerating values\
    \ that don't support bitwise operations, use a nonflag Enum."
- md: "As a final note, you are free to create your own aliases for built-in multiple\
    \ enumeration selections, as I did with SEAFOOD and ALL_NUTS above.\n\n## Integer\
    \ Conversion\n\nThere are two more special case enumerations called IntEnum and\
    \ IntFlag. These map to Enum and Flag, respectively, but allow degradation to\
    \ raw integers for comparison. I actually do not recommend using these features,\
    \ and it's important to understand why. First, let's look at the problem they\
    \ intend to solve.\n\nIn French cooking, the measurement of certain ingredients\
    \ is paramount to success, so you need to make sure you have that covered as well.\
    \ You create a metric and imperial liquid measure (you want to work internationally,\
    \ after all) as enumerations, but are dismayed to find that you can't just compare\
    \ your enumerations to integers.\n\nThis code doesn't work:\n\n```python\nclass\
    \ ImperialLiquidMeasure(Enum):\n    CUP = 8\n    PINT = 16\n    QUART = 32\n \
    \   GALLON = 128\n\n>>>ImperialLiquidMeasure.CUP == 8\nFalse\n```\n\nBut, if you\
    \ were to subclass from IntEnum, it works just fine:\n\n```python\nclass ImperialLiquidMeasure(IntEnum):\n\
    \    CUP = 8\n    PINT = 16\n    QUART = 32\n    GALLON = 128\n\n>>>ImperialLiquidMeasure.CUP\
    \ == 8\nTrue\n```\n\nAn IntFlag performs similarly. You'll see this more when\
    \ interoperating between systems or possibly hardware. If you were not using an\
    \ IntEnum, you would need to do something like:\n\n```python\n>>>ImperialLiquidMeasure.CUP.value\
    \ == 8\nTrue\n```\n\nThe convenience of using an IntEnum does not often outweigh\
    \ the drawback of being a weaker type. Any implicit conversion to integer hides\
    \ the true intent of the class. Since implicit integer conversion happens, you\
    \ might run into a copy/paste mistake (we've all made those, right?) in situations\
    \ that don't do what you want.\n\nConsider:\n\n```python\nclass Kitchenware(IntEnum):\n\
    \    # Note to future programmers: these numbers are customer-defined\n    # and\
    \ apt to change\n    PLATE = 7\n    CUP = 8\n    UTENSILS = 9\n```\n\nSuppose\
    \ somebody were to mistakenly do the following:\n\n```python\ndef pour_liquid(volume:\
    \ ImperialLiquidMeasure):\n    if volume == Kitchenware.CUP:\n        pour_into_smaller_vessel()\n\
    \    else:\n        pour_into_larger_vessel()\n```\n\nIf this makes it into production,\
    \ it will be just fine, no exceptions thrown, all tests pass. However, once the\
    \ Kitchenware enumeration changes (maybe it adds a BOWL into value 8 and moves\
    \ CUP to 10), this code will now do the exact opposite of what it was supposed\
    \ to. Kitchenware.CUP is no longer the same as an ImperialLiquidMeasure.CUP (there's\
    \ no reason they should be linked); then you'll start pouring into larger vessels\
    \ instead of smaller vessels, which probably will create an overflow (of your\
    \ liquid, not of an integer).\n\nThis is a textbook example of how unrobust code\
    \ can lead to subtle mistakes that won't become an issue until much later in the\
    \ codebase's life. This may be a quick fix, but the bug incurs a very real cost.\
    \ Tests fail (or worse, a customer complains about pouring the wrong amount of\
    \ liquid into a vessel), someone has to go crawl through the source code, find\
    \ the bug, fix it, then take a long coffee break after wondering how this ever\
    \ worked. All because somebody decided to be lazy and use an IntEnum so that they\
    \ wouldn't have to type out .value over and over again. So pay your future maintainers\
    \ a favor: don't use IntEnum unless you absolutely have to for legacy purposes.\n\
    \n## Unique\n\nOne great feature of enumerations is the ability to alias values.\
    \ Let's go back to the MotherSauce enumeration. Maybe the codebase developed on\
    \ French keyboards needs to be adapted to US keyboards, where the keyboard layout\
    \ is not conducive to adding accent marks over vowels. Removing the accents to\
    \ anglicize the native French spelling is a nonstarter for many of the developers\
    \ (they insist we use the original spelling). To avoid an international incident,\
    \ I will add an alias to some of the sauces.\n\n```python\nfrom enum import Enum\n\
    class MotherSauce(Enum):\n    BÉCHAMEL = \"Béchamel\"\n    BECHAMEL = \"Béchamel\"\
    \n    VELOUTÉ = \"Velouté\"\n    VELOUTE = \"Velouté\"\n    ESPAGNOLE = \"Espagnole\"\
    \n    TOMATO = \"Tomato\"\n    HOLLANDAISE = \"Hollandaise\"\n```\n\nWith this,\
    \ there was much rejoicing from all keyboard owners. Enumerations absolutely allow\
    \ this sort of behavior; they can have duplicate values as long as the keys are\
    \ not duplicated.\n\nHowever, there are cases where you want to force uniqueness\
    \ on the values. Perhaps you are relying on the enumeration to always contain\
    \ a set number of values, or perhaps it messes with some of the string representations\
    \ that are shown to customers. No matter the case, if you want to preserve uniqueness\
    \ in your Enum, simply add a @unique decorator.\n\n```python\nfrom enum import\
    \ Enum, unique\n@unique\nclass MotherSauce(Enum):\n    BÉCHAMEL = \"Béchamel\"\
    \n    VELOUTÉ = \"Velouté\"\n    ESPAGNOLE = \"Espagnole\"\n    TOMATO = \"Tomato\"\
    \n    HOLLANDAISE = \"Hollandaise\"\n```\n\nCreating aliases is more likely than\
    \ preserving uniqueness in most of the use cases I've come across, so I default\
    \ to making enumerations nonunique at first, and only adding the unique decorator\
    \ when needed.\n\n## Closing Thoughts\n\nEnumerations are simple, and often overlooked\
    \ as a powerful communication method. Any time that you want to represent a single\
    \ value from a static collection of values, an enumeration should be your go-to\
    \ user-defined type. It's easy to define and use them. They offer a wealth of\
    \ operations, including iteration, bitwise operations (in the case of Flag enumerations),\
    \ and control over uniqueness.\n\nRemember these key limitations:\n\n- Enumerations\
    \ are not meant for dynamic key-value mappings that change at runtime. Use a dictionary\
    \ for this.\n- Flag enumerations only work with values that support bitwise operations\
    \ with nonoverlapping values.\n- Avoid IntEnum and IntFlag unless absolutely necessary\
    \ for system interoperability.\n\nNext up, I will explore another user-defined\
    \ type: a dataclass. While enumerations are great at specifying a relationship\
    \ about a set of values in just one variable, data classes define relationships\
    \ between multiple variables.\n\n# CHAPTER 9\n## User-Defined Types: Data Classes\n\
    \nData classes are user-defined types that let you group related data together.\
    \ Many types, such as integers, strings, and enumerations, are *scalar*; they\
    \ represent one and only one value. Other types, such as lists, sets, and dictionaries,\
    \ represent homogeneous collections. However, you still need to be able compose\
    \ multiple fields of data into a single data type. Dictionaries and tuples are\
    \ OK at this, but they suffer from a few issues. Readability is tricky, as it\
    \ can be difficult knowing what a dictionary or tuple contains at runtime. This\
    \ makes them hard to reason about when reading and reviewing code, which is a\
    \ major blow to robustness.\n\nWhen your data is hard to understand, readers will\
    \ make incorrect assumptions and won't be able to spot bugs as easily. Data classes\
    \ are easier to read and understand, and the typechecker knows how to naturally\
    \ handle them.\n\n## Data Classes in Action\n\nData classes represent a heterogeneous\
    \ collection of variables, all rolled into a *composite type*. Composite types\
    \ are made up of multiple values, and should always represent some sort of relationship\
    \ or logical grouping. For example, a `Fraction` is an excellent example of a\
    \ composite type. It contains two scalar values: a numerator and a denominator.\n\
    \n```python\nfrom fraction import Fraction\nFraction(numerator=3, denominator=5)\n\
    ```\n\nThis `Fraction` represents the relationship between that numerator and\
    \ denominator. The numerator and denominator are independent of each other; changing\
    \ one does not change the other. However, by combining them into a single type,\
    \ they are grouped together to create a logical concept.\n\nData classes allow\
    \ you to create these concepts quite easily. To represent a fraction with a dataclass,\
    \ you do the following:\n\n```python\nfrom dataclasses import dataclass\n\n@dataclass\n\
    class MyFraction:\n    numerator: int = 0\n    denominator: int = 1\n```\n\nSimple,\
    \ isn't it? The @dataclass before the class definition is known as a *decorator*.\
    \ You'll learn more about decorators in Chapter 17, but for now, all you need\
    \ to know is that putting @dataclass before your class turns it into a dataclass.\
    \ Once you've decorated the class, you need to list out all the fields that you\
    \ want to represent as a relationship. It is imperative that you provide a default\
    \ value or a type, so that Python recognizes it as a member of that dataclass.\
    \ In the above case, I am demonstrating both.\n\nBy building relationships like\
    \ this, you are adding to the shared vocabulary in your codebase. Instead of developers\
    \ always needing to implement each field individually, you instead provide a reusable\
    \ grouping. Data classes force you to explicitly assign types to your fields,\
    \ so there's less chance of type confusion among maintainers.\n\nData classes\
    \ and other user-defined types can be nested within the dataclass. Suppose I'm\
    \ creating an automated soup maker and I need to group my soup ingredients together.\
    \ Using dataclass, it looks like this:\n\n```python\nimport datetime\nfrom dataclasses\
    \ import dataclass\nfrom enum import auto, Enum\n\nclass ImperialMeasure(Enum):\n\
    \    TEASPOON = auto()\n    TABLESPOON = auto()\n    CUP = auto()\n\nclass Broth(Enum):\n\
    \    VEGETABLE = auto()\n    CHICKEN = auto()\n    BEEF = auto()\n    FISH = auto()\n\
    \n@dataclass(frozen=True)\n# Ingredients added into the broth\nclass Ingredient:\n\
    \    name: str\n    amount: float = 1\n    units: ImperialMeasure = ImperialMeasure.CUP\n\
    \n@dataclass\nclass Recipe:\n```"
