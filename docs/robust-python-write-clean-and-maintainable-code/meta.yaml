    These hex strings display the contents of the memory containing a Python object.
    You’ll find pointers to the next and previous object in a linked list (for garbage
    collection purposes), a reference count, a type, and the actual data itself. You
    can see the bytes at the end of each returned value to see the number or string
    (look for the bytes 0x544150 or 0x504154). The important part of this is that
    there is a type encoded into that memory. When Python looks at a variable, it
    knows exactly what type everything is at runtime (just as when you use the type()
    function.)


    It’s easy to think that this is the only reason for types—the computer needs to
    know how to interpret various blobs of memory. It is important to be aware of
    how Python uses types, as it has some implications for writing robust code, but
    even more important is the second representation: semantic representation.


    # Semantic Representation


    While the first definition of types is great for lower-level programming, it’s
    the second definition that applies to every developer. Types, in addition to having
    a mechanical representation, also manifest a semantic representation. A semantic
    representation is a communication tool; the types you choose communicate information
    across time and space to a future developer.


    Types tell a user what behaviors they can expect when interacting with that entity.
    In this context, “behaviors” are the operations that you associate with that type
    (plus any preconditions or postconditions). They are the boundaries, constraints,
    and freedoms that a user interacts with whenever they use that type. Types used
    correctly have low barriers to understanding; they become natural to use. Conversely,
    types used poorly are a hindrance.


    Consider the lowly `int`. Take a minute to think about what behaviors an integer
    has in Python. Here’s a quick (noncomprehensive) list I came up with:


    +   - Constructible from integers, floats, or strings

    - Mathematical operations such as addition, subtraction, division, multiplication,
    exponentiation, and negation

    - Relational comparison such as <, >, ==, and !=

    - Bitwise operations (manipulating individual bits of a number) such as &, |,
    ^, ~, and shifting

    - Convertible to a string using `str` or `repr` functions

    - Able to be rounded through `ceil`, `floor`, and `round` methods (even though
    they return the integer itself, these are supported methods)


    An `int` has many behaviors. You can view the full list if you if you type `help(int)`
    into your interactive Python console.'
