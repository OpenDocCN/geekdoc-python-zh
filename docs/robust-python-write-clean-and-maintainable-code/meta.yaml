    > ## Assertions Versus Exceptions


    Throughout this book, I will use assertions in some cases, and raise exceptions
    in other cases. When an assertion fails, it raises an `AssertionError`, which
    is a type of exception. This may make assertions and exceptions seem interchangeable,
    but I am actually picking one or the other intentionally.


    Assertions are not guaranteed to execute at runtime, as your code may be deployed
    with options that disable assertions. In this case, I use them for things that
    I always expect to be true, unless a developer in the system messes up. It is
    intended to catch mistakes during development, and it signals to other developers
    that it is up to them to not create a situation that fails an assertion.


    Exceptions, on the other hand, indicate to a developer that something may be possible
    due to user error or malicious actors. It is unlikely to happen, but other developers
    must be prepared to catch the exception if something goes wrong.


    If the error is not an exceptional use case, I may choose to return an `Optional`
    or `Union` instead (see Chapter 4 for more information). Note that this only applies
    if the function returns a value. The constructors in this chapter do not return
    any values, so using an `Optional` or `Union` is inappropriate. In these cases,
    make it crystal clear to future developers that an exception (or assertion) can
    be thrown, because the type-checker will not be much help.'
