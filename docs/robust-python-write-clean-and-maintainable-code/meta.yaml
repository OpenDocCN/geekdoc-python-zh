- img_proc: true
  md: 'In order to speed up mypy even more, you may want to consider a *remote cache*.
    A remote cache provides a way of caching your mypy typechecks somewhere accessible
    to your entire team. This way, you can cache results based on specific commit
    IDs in your version control and share typechecker information. Building this system
    is outside the scope of this book, but the [remote cache documentation](https://mypy.readthedocs.io/en/stable/mypy_daemon.html)
    in mypy will provide a solid start.


    You also should consider mypy in daemon mode. Daemon mode is when mypy runs as
    a standalone process, and keeps the previous mypy state in memory rather than
    on a file system (or across a network link). You can start a mypy daemon by running
    `dmypy run -- mypy-flags <mypy-files>`. Once the daemon is running, you can run
    the exact same command to check the files again.


    For instance, I ran mypy on the mypy source code itself. My initial run took 23
    seconds. Subsequent typechecks on my system took between 16 and 18 seconds. This
    is *technically* faster, but I would not consider it fast. When I use the mypy
    daemon, though, my subsequent runs ended up being under half a second. With times
    like that, I can run my typechecker much more often to get feedback faster. Check
    out more about dmypy in the [mypy daemon mode documentation](https://mypy.readthedocs.io/en/stable/mypy_daemon.html).


    # Alternative Typecheckers


    Mypy is highly configurable, and its wealth of options will let you decide on
    the exact behavior you are looking for, but it won''t meet all of your needs all
    of the time. It isn''t the only typechecker out there. I''d like to introduce
    two other typecheckers: Pyre (written by Facebook) and Pyright (written by Microsoft).


    # Pyre


    You can install Pyre with pip:


    ```

    pip install pyre-check

    ```


    Pyre runs very similarly to mypy''s daemon mode. A separate process will run,
    from which you can ask for typechecking results. To typecheck your code, you need
    to set up Pyre (by running `pyre init`) in your project directory, and then run
    `pyre` to start the daemon. From here, the information you receive is pretty similar
    to mypy. However, there are two features that set Pyre apart from other typecheckers:
    codebase querying and the Python Static Analyzer (Pysa) framework.


    # Codebase querying


    Once the pyre daemon is running, there are a lot of cool queries you can make
    to inspect your codebase. I''ll use the mypy codebase as an example codebase for
    all of the following queries.'
