  md: "# Is Invariant Checking Slow?\n\nThere is a runtime cost to checking all these\
    \ invariants, especially for more complex data types than a pizza. Checking invariants\
    \ provides a real benefit for making humans go faster, but for an object that\
    \ is created multiple times in a tight loop, developers may want to eschew conditionals\
    \ and/or exceptions in favor of code execution performance. If you're in a case\
    \ where your program is not meeting a benchmark, you've profiled the code, and\
    \ the invariant checking is the biggest culprit, here's what I want you to do:\n\
    \nContinue to document the invariants the class has, but convey through very explicit\
    \ means that the onus is on callers to satisfy the invariants, not the class itself.\
    \ The class should still try to maintain the invariants to help reasonability,\
    \ but it can't do as much precondition checking as you may like. You are deliberately,\
    \ in essence, sacrificing maintainability for speed. It will be case by case just\
    \ how much maintainability suffers and how much of a speedup you will receive.\
    \ If you do choose this route, supplement other processes in your environment\
    \ to make up for the decrease of maintainability (more robust linting, more stringent\
    \ code reviews, etc.).\n\n# Encapsulation and Maintaining Invariants\n\nI have\
    \ a little secret for you. I wasn't completely honest in the last section. I know,\
    \ I know, shame on me, and I'm sure the eagle-eyed readers have already spotted\
    \ my deception.\n\nConsider this:\n\n```\npizza_spec = PizzaSpecification(dough_radius_in_inches=8,\n\
    \                               toppings=['Olive Oil',\n                     \
    \                    'Garlic',\n                                         'Sliced\
    \ Roma Tomatoes',\n                                         'Mozzarella'])\n```\n\
    \nNothing at all is preventing a future developer from changing some invariants\
    \ after the fact.\n\n```\npizza_spec.dough_radius_in_inches = 100  # BAD!\npizza_spec.toppings.append('Tomato\
    \ Sauce')  # Second sauce, oh no!\n```\n\nWhat was the point of talking about\
    \ invariants if any developer can immediately invalidate them? Well, it turns\
    \ out that I have another concept to discuss: *encapsulation*.\n\n# Encapsul-what,\
    \ Now?\n\nEncapsulation. Simply put, it's the ability for an entity to hide properties\
    \ and the actions that operate upon those properties. Practically speaking, it\
    \ means that you decide what properties are visible to callers, and restrict how\
    \ they can access them"
