  - "[PAGE 146]\n\nSo far, I've just described the fields in a dataclass, but you\
    \ are also able to add in behaviors in the form of methods. Suppose I want to\
    \ make any soup vegetarian by substituting vegetable broth and removing any meats.\
    \ I also want to list out all the ingredients so that you can make sure that no\
    \ meat products snuck in.\n\nI can add methods directly to the dataclass like\
    \ so:\n\n```\n@dataclass\nclass Recipe:\n    aromatics: set[Ingredient]\n    broth:\
    \ Broth\n    vegetables: set[Ingredient]\n    meats: set[Ingredient]\n    starches:\
    \ set[Ingredient]\n    garnishes: set[ingredient]\n    time_to_cook: datetime.timedelta\n\
    \n    def make_vegetarian(self):\n        self.meats.clear()\n        self.broth\
    \ = Broth.VEGETABLE\n\n    def get_ingredient_names(self):\n        ingredients\
    \ = (self.aromatics |\n                       self.vegetables |\n            \
    \           self.meats |\n                       self.starches |\n           \
    \            self.garnishes)\n\n        return ({i.name for i in ingredients}\
    \ |\n                {self.broth.name.capitalize() + \" broth\"})\n```\n\nThis\
    \ is a major improvement over raw dictionaries or tuples. I can embed functionality\
    \ directly inside my dataclass, improving reusability. If a user wants to get\
    \ all the ingredient names or make a recipe vegetarian, they don't have to remember\
    \ to do it on their own every time. It's simple enough to call the function. Here's\
    \ an example of calling a function directly on a dataclass.\n\n```\nfrom copy\
    \ import deepcopy\n# make a deep copy so that changing one soup\n# does not change\
