  md: "The typechecker needs to store all this information to do its job. It's a huge\
    \ bonus that you can query the information as well. I could write a whole extra\
    \ book on what you can do with this information, but for now, check out the [Pyre\
    \ query documentation](https://pyre-check.org/). You will learn about different\
    \ queries you can execute, such as observing class hierarchies, call graphs, and\
    \ more. These queries allow you to learn more about your codebase or to build\
    \ new tools to better understand your codebase (and catch other types of errors\
    \ that a typechecker can't, such as temporal dependencies, which I'll cover in\
    \ Part III).\n\n# Python Static Analyzer (Pysa)\n\n*Pysa* (pronounced like the\
    \ Leaning Tower of Pisa) is a static code analyzer built into Pyre. Pysa specializes\
    \ in a type of security static analysis known as *taint analysis*. Taint analysis\
    \ is the tracking of potentially tainted data, such as user-supplied input. The\
    \ tainted data is tracked for the entire life cycle of the data; Pyre makes sure\
    \ that any tainted data cannot propagate to a system in an insecure fashion.\n\
    \nLet me walk you through the process to catch a simple security flaw (modified\
    \ from the [Pyre documentation](https://pyre-check.org/)). Consider the case where\
    \ a user creates a new recipe in a filesystem:\n\n```\nimport os\n\ndef create_recipe():\n\
    \    recipe = input(\"Enter in recipe\")\n    create_recipe_on_disk(recipe)\n\n\
    def create_recipe_on_disk(recipe):\n    command = \"touch ~/food_data/{}.json\"\
    .format(recipe)\n    return os.system(command)\n```\n\nThis looks pretty innocuous.\
    \ A user can enter in carrots to create the file ~/food_data/carrots.json. But\
    \ what if a user enters in carrots; ls ~/? If this were entered, it would print\
    \ out the entire home directory (the command becomes touch ~/food_data/carrots;\
    \ ls ~;.json). Based on input, a malicious user could enter in arbitrary commands\
    \ on your server (this is known as remote code execution [RCE]), which is a huge\
    \ security risk.\n\nPysa provides tools to check this. I can specify that anything\
    \ coming from `input()` is potentially tainted data (known as a *taint source*),\
    \ and anything passed to `os.system` should not be tainted (known as a *taint\
    \ sink*). With this information, I need to build a *taint model*, which is a set\
    \ of rules for detecting potential security holes. First, I must specify a *taint.config*\
    \ file:"
  merge: -1
  pgno: 107
- img_proc: true
  md: "```\n{\n  sources: [\n    {\n      name: \"UserControlled\",\n      comment:\
    \ \"use to annotate user input\"\n    }\n  ],\n  sinks: [\n    {\n      name:\
    \ \"RemoteCodeExecution\",\n      comment: \"use to annotate execution of code\"\
    \n    }\n  ],\n  features: [],\n  rules: [\n    {\n      name: \"Possible shell\
    \ injection\",\n      code: 5001,\n      sources: [ \"UserControlled\" ],\n  \
    \    sinks: [ \"RemoteCodeExecution\" ],\n      message_format: \"Data from [{$sources}]\
    \ source(s) may reach \" +\n                      \"[{$sinks}] sink(s)\"\n   \
    \ }\n  ]\n}\n```\n\n+   1. Specify an annotation for user-controlled input.\n\
    2. Specify an annotation for RCE flaws.\n3. Specify a rule that makes any tainted\
    \ data from UserControlled sources an error if it ends up in a RemoteCodeExecution\
    \ sink.\n\nFrom there, I must specify a taint model to annotate these sources\
    \ as tainted:\n\n```\n# stubs/taint/general.pysa\n\n# model for raw_input\ndef\
    \ input(__prompt = ...) -> TaintSource[UserControlled]: ...\n\n# model for os.system\n\
    def os.system(command: TaintSink[RemoteCodeExecution]): ...\n```\n\nThese stubs\
    \ tell Pysa through type annotations about where your taint sources and sinks\
    \ are in your system."
  merge: -1
  pgno: 108
- img_proc: true
  md: "Finally, you need to tell Pyre to detect tainted information by modifying the\
    \ .pyre_configuration to add in your directory:\n\n```\n\"source_directories\"\
    : [\".\"],\n\"taint_models_path\": [\"stubs/taint\"]\n```\n\nNow, when I run pyre\
    \ analyze on that code, Pysa flags an error.\n\n```\n[\n    {\n        \"line\"\
    : 9,\n        \"column\": 26,\n        \"stop_line\": 9,\n        \"stop_column\"\
    : 32,\n        \"path\": \"insecure.py\",\n        \"code\": 5001,\n        \"\
    name\": \"Possible shell injection\",\n        \"description\":\n            \"\
    Possible shell injection [5001]: \" +\n            \"Data from [UserControlled]\
    \ source(s) may reach \" +\n            \"[RemoteCodeExecution] sink(s)\",\n \
    \       \"long_description\":\n            \"Possible shell injection [5001]:\
    \ \" +\n            \"Data from [UserControlled] source(s) may reach \" +\n  \
    \          \"[RemoteCodeExecution] sink(s)\",\n        \"concise_description\"\
    :\n            \"Possible shell injection [5001]: \" +\n            \"Data from\
    \ [UserControlled] source(s) may reach \" +\n            \"[RemoteCodeExecution]\
    \ sink(s)\",\n        \"inference\": null,\n        \"define\": \"insecure.create_recipe\"\
    \n    }\n]\n```\n\nIn order to fix this, I either need to make this data flow\
    \ impossible or run tainted data through a *sanitizer* function. Sanitizer functions\
    \ take untrusted data and inspect/modify it so that it can be trusted. Pysa allows\
    \ you decorate functions with @sanitize to specify your sanitizers.³\n\nThis was\
    \ admittedly a simple example, but Pysa allows you to annotate your codebase to\
    \ catch more complicated problems (such as SQL injection and cookie mismanagement).\
    \ To learn everything that Pysa can do (including built-in common security flaw\
    \ checking), check out the [complete documentation](https://example.com).\n\n\
    ³ You can learn more about sanitizers at [https://oreil.ly/AghGg](https://oreil.ly/AghGg)."
