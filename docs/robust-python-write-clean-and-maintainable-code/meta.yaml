    I want you to put on your tester hat for a second. The requirements I''ve just
    given are certainly not exhaustive; how would you refine them? I want you to take
    a few minutes and list out all the different constraints you can think of with
    just the dictionary given. Assuming the YAML file parses and returns a dictionary,
    how many invalid test cases can you think of?


    > You may notice that the routing number and account numbers are strings in the
    example above. This is intentional. Despite being a string of numerals, I do not
    want this to be a numeric type. Numeric operations (such as addition or multiplication)
    do not make sense, and I do not want an account number of 00000001234 to be truncated
    to 1234.


    Here are some ideas to think about when enumerating test cases:


    +   - Python is a dynamic language. Are you sure that everything is the right
    type?

    - Dictionaries don''t require any sort of required fields—are you sure every field
    is present?

    - Are all the constraints from the problem statement tested for?

    - What about additional constraints (correct routing numbers, account numbers,
    and addresses?)

    - What about negative numbers where there shouldn''t be?


    I came up with 67 different test cases with invalid data in about five minutes.
    Some of my test cases included (the full list is included in the [GitHub repo
    for this book](https://github.com/example)):


    +   - Name is zero characters.

    - Name is not a string.

    - There are no chefs.

    - Employee has no bank details or address.

    - Employee''s routing number is truncated (0000123 becomes 123).

    - Number of seats is negative.


    This, admittedly, is not a very complex class. Could you imagine the number of
    test cases for a much more involved class? Even with 67 test cases, could you
    imagine opening up a constructor of a type and checking 67 different conditions?
    In most of the codebases I''ve worked on, the validation logic is nowhere near
    as comprehensive. However, this is user-configurable data and I want errors to
    be caught as early as possible in runtime. You should prefer catching the errors
    at data injection over first use.'
