    \n```python\nfrom enum import Enum\nclass MotherSauce(Enum):\n    BÉCHAMEL = \"\
    Béchamel\"\n    BECHAMEL = \"Béchamel\"\n    VELOUTÉ = \"Velouté\"\n    VELOUTE\
    \ = \"Velouté\"\n    ESPAGNOLE = \"Espagnole\"\n    TOMATO = \"Tomato\"\n    HOLLANDAISE\
    \ = \"Hollandaise\"\n```\n\n这样，所有键盘拥有者都欢欣鼓舞。枚举绝对允许这种行为；只要键不重复，它们可以有重复的值。\n\n然而，在某些情况下，你希望强制值的唯一性。也许你依赖枚举始终包含固定数量的值，或者它可能干扰显示给客户的某些字符串表示。无论哪种情况，如果你想在\
    \ `Enum` 中保持唯一性，只需添加 `@unique` 装饰器。\n\n```python\nfrom enum import Enum, unique\n\
