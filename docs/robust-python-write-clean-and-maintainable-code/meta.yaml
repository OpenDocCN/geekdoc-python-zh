    ## Closing Thoughts


    Python typecheckers put a wealth of options at your disposal, and you need to
    be comfortable with advanced configuration to get the most out of your tooling.
    You can control severity options and reporting, or even use different typecheckers
    to reap benefits. As you evaluate tools and options, ask yourself how strict you
    want your typecheckers to be. As you increase the scope of errors that can be
    caught, you will increase the amount of time and effort needed to make your codebase
    compliant. However, the more informative you can make your code, the more robust
    it will be in its lifetime.


    In the next chapter, I will talk about how to assess the trade-offs between benefits
    and costs associated with typechecking. You''ll learn how to identify important
    areas to typecheck and use strategies to mitigate your pain.


    # CHAPTER 7


    ## Adopting Typechecking Practically


    Many developers dream of the days when they’ll finally work in a completely *green-field*
    project. A green-field project is one that is brand-new, where you have a blank
    slate with your code’s architecture, design, and modularity. However, most projects
    soon become *brown-field*, or legacy code. These projects have been around the
    block a bit; much of the architecture and design has been solidified. Making big,
    sweeping changes will impact real users. The term *brown-field* is often seen
    as derogatory, especially when it feels like you are slogging through a big ball
    of mud.


    However, not all brown-field projects are a punishment to work in. Michael Feathers,
    author of *Working Effectively With Legacy Code* (Pearson), has this to say:


    > In a well-maintained system, it might take a while to figure out how to make
    a change, but once you do, the change is usually easy and you feel much more comfortable
    with the system. In a legacy system, it can take a long time to figure out what
    to do, and the change is difficult also.¹


    Feathers defines legacy code as “code without tests.” I prefer an alternate definition:
    legacy code is simply code where you can no longer discuss the code with the developers
    who wrote it. In lieu of that communication, you rely on the codebase itself to
    describe its behavior. If the codebase clearly communicates its intentions, it
    is a well-maintained system that is easy to work in. It may take a little bit
    of time to understand it all, but once you do, you are able to add features and
    evolve the system. However, if that codebase is difficult to understand, you will
    face an uphill battle. That code becomes unmaintainable. This is why robustness
    is paramount. Writing robust code eases the transition from green-field to brown-field
    by making the code more maintainable.


    1 Michael C. Feathers. *Working Effectively with Legacy Code*. Upper Saddle River,
    NJ: Pearson, 2013.


    Most of the type annotation strategies that I''ve shown in the first part of this
    book are easier to adopt when a project is new. Adopting these practices in a
    mature project is more challenging. It is not impossible, but the cost may be
    higher. This is the heart of engineering: making smart decisions about trade-offs.


    ## Trade-offs


    Every decision you make involves a trade-off. Lots of developers focus on the
    classic time versus space trade-off in algorithms. But there are plenty of other
    trade-offs, often involving intangible qualities. I''ve already covered the benefits
    of a typechecker quite extensively throughout this first part of the book:


    - A typechecker increases communication and reduces the chances of bugs.

    - A typechecker provides a safety net for making changes and increases the robustness
    of your codebase.

    - A typechecker allows you to deliver functionality faster.


    But what are the costs? Adopting type annotations is not free, and they only get
    worse the larger your codebase is. These costs include:


    - The need for buy-in. Depending on culture, it might take some time convincing
    an organization to adopt typechecking.

    - Once you have buy-in, there is an initial cost of adoption. Developers don''t
    start type annotating their code overnight, and it takes time before they grok
    it. They need to learn it and experiment before they are on board.

    - It takes time and effort to adopt tooling. You need centralized checking of
    some fashion, and developers need to familiarize themselves with running the tooling
    as part of their workflows.

    - It will take time to write type annotations in your codebase.

    - As type annotations are checked, developers will have to get used to the slowdown
    in fighting the typechecker. There is additional cognitive overload in thinking
    about types.


    Developer time is expensive, and it is easy to focus on what else those developers
    could be doing. Adopting type annotations is not free. Worse, with a large enough
    codebase, these costs can easily dwarf the initial benefit you get from typechecking.
    The problem is fundamentally a chicken-and-egg conundrum. You won''t see benefits
    for annotating types until you have written enough types in your codebase. However,
    it is tough to get buy-in for writing types when the benefit isn''t there early
    on. You can model your value as such:


    Value = (Total Benefits) – (Total Costs)


    Your benefits and costs will follow a curve; they are not linear functions. I''ve
    outlined the basic shapes of the curves in Figure 7-1.


    Figure 7-1. Cost and benefit curves over time


    I''ve purposely left off the range, because the scale will change depending on
    the size of your codebase, but the shapes remain the same. Your costs will start
    out high, but get easier as adoption increases. Your benefits will start off low,
    but as you annotate your codebase, you will see more value. You won''t see a return
    on investment until these two curves meet. To maximize value, you need to reach
    that intersection as early as possible.


    ## Breaking Even Earlier


    To maximize the benefits of type annotations, you need to either get value earlier
    or decrease your costs earlier. The intersection of these two curves is a break-even
    point; this is where the amount of effort that you''re expending is paid back
    by the value you are receiving. You want to reach this point as fast as sustainably
    possible so that your type annotations have a positive impact. Here are some strategies
    to do that.


    ## Find Your Pain Points


    One of the best ways to produce value is to reduce the pain you are currently
    experiencing. Ask yourself: where do I currently lose time in my process? Where
    do I lose money? Take a look at your test failures and customer bugs. These error
    cases incur real costs; you should be doing root cause analysis. If you find that
    a common root cause can be fixed by type annotations, you have a solid case for
    type annotation adoption. Here are specific bug classes you need to keep an eye
    out for:


    - Any error surrounding None

    - Invalid attribute access, such as trying to access variables of functions on
    the wrong type

    - Errors surrounding type conversions such as integers versus strings, bytes versus
    strings, or lists versus tuples


    Also, talk to the people who have to work in the codebase itself. Root out the
    areas that are a constant source of confusion. If developers have trouble with
    certain parts of the codebase today, it''s likely that future developers will
    struggle too.


    Don''t forget to talk to those who are invested in your codebase but maybe don''t
    directly work in it, such as your tech support, product management, and QA. They
    often have a unique perspective on painful areas of the codebase that might not
    be apparent when looking through the code. Try to put these costs into concrete
    terms, such as time or money. This will be invaluable in evaluating where type
    annotations will be of benefit.


    ## Target Code Strategically


    You may want to focus on trying to receive value earlier. Type annotations do
    not appear overnight in a large codebase. Instead, you will need to identify specific
    and strategic areas of code to target for type annotations. The beauty of type
    annotations is that they are completely optional. By typechecking just these areas,
    you very quickly see benefits without a huge up-front investment. Here are some
    strategies that you might employ to selectively type annotate your code.


    ### Type annotate new code only


    Consider leaving your current unannotated code the way it is and annotate code
    based on these two rules:


    - Annotate any new code that you write.

    - Annotate any old code that you change.


    Throughout time, you''ll build out your type annotations in all code except code
    that hasn''t been changed in a long time. Code that hasn''t been changing is relatively
    stable, and is probably not read too often. Type annotating it is not likely to
    gain you much benefit.'
