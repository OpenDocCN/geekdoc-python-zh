    from typing import TypeVar\nT = TypeVar('T')\ndef reverse(coll: list[T]) -> list[T]:\n\
    \    return coll[::-1]\n```\n\n这表示对于类型 T，`reverse` 接收一个类型为 T 的元素列表，并返回一个类型为 T\
    \ 的元素列表。我不能混合类型：如果列表没有使用相同的 TypeVar，整数列表永远无法变成字符串列表。\n\n我可以使用这种模式来定义整个类。假设我想将一个食谱推荐服务集成到食谱收藏应用中。我想能够根据客户的评分推荐食谱或食谱。为此，我想将每条评分信息存储在一个*图*中。图是一种数据结构，包含一系列称为*节点*的实体，并跟踪*边*（这些节点之间的关系）。然而，我不想为食谱图和食谱图编写单独的代码。因此，我定义了一个可用于泛型类型的\
