    \n**Discussion Topic**\n\nWhere in your tests can you use custom matchers? Discuss\
    \ what a shared testing vocabulary would be in your tests and how custom matchers\
    \ would improve readability.\n\n# Closing Thoughts\n\nJust like a tightrope walker's\
    \ safety net, tests give you comfort and confidence as you work. It's not just\
    \ about finding bugs. Tests verify that what you build is performing as you expect.\
    \ They give future collaborators leeway to make more risky changes; they know\
    \ that if they fall, the tests will catch them. You will find that regressions\
    \ become more rare, and your codebase becomes easier to work in.\n\nHowever, tests\
    \ are not free. There is a cost to writing, running, and maintaining them. You\
    \ need to be careful how you spend your time and effort. Use well-known patterns\
    \ in constructing tests to minimize the cost: follow the AAA pattern, keep each\
    \ stage small, and make your tests clear and readable. Your tests are just as\
    \ important as your codebase. Treat them with just as much respect and make them\
    \ robust.\n\nIn the next chapter, I will focus on acceptance tests. Acceptance\
    \ tests have a different purpose than unit or integration tests, and some of the\
