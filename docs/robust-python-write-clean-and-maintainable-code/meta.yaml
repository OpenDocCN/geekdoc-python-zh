    \n## Composing on a Smaller Scale\n\nThe AutoKitchen example showed you how to\
    \ compose different modules and sub-systems, but you can also apply composability\
    \ principles at a smaller scale. You can write functions and algorithms to be\
    \ composable, allowing you to build new code with ease.\n\n## Composing Functions\n\
    \nA lot of this book focuses on OOP principles (such as SOLID and class-based\
    \ designs), but it’s important to learn from other software paradigms as well.\
    \ An increasingly popular paradigm is *functional programming* (FP). Where OOP’s\
    \ first-class citizens are objects, FP focuses on *pure functions*. A pure function\
    \ is a function whose output is solely derived from the inputs. Given a pure function\
    \ and a set of input arguments, it will always return the same output, regardless\
    \ of any global state or environment change.\n\nWhat makes functional programming\
    \ so attractive is that pure functions are much easier to compose than functions\
    \ laden with side effects. A *side effect* is anything a function does that is\
    \ outside of its returned values, such as logging a message, making a network\
    \ call, or mutating variables. By removing side effects from your functions, you\
    \ make them easier to reuse. There are no hidden dependencies or surprising outcomes;\
    \ the entire function is dependent on the input data, and the only observable\
    \ effect is the data that is returned.\n\nHowever, when you attempt to reuse code,\
    \ you must pull in all of that code’s physical dependencies as well (and provide\
    \ logical dependencies at runtime if needed). With pure functions, you don’t have\
    \ any physical dependencies outside of a function call graph. You don’t need to\
    \ pull in extra objects with complicated setup or global variables. FP encourages\
    \ developers to write short, single-purpose functions that are inherently composable.\n\
    \nDevelopers get used to treating functions just like any other variable. They\
    \ create *higher-order* functions, which are functions that take other functions\
    \ as arguments, or functions that return other functions as a return value. The\
    \ simplest example is something that takes a function and calls it twice:\n\n\
    ```python\nfrom typing import Callable\n\ndef do_twice(func: Callable, *args,\
    \ **kwargs):\n    func(*args, **kwargs)\n    func(*args, **kwargs)\n```\n\nThis\
    \ isn’t a very exciting example, but it opens the door for some very interesting\
    \ ways of composing functions. In fact, there is an entire Python module dedicated\
    \ to higher-order functions: `functools`. Most of `functools`, as well as any\
    \ function composition you write, will be in the form of decorators.\n\n## Decorators\n\
    \nDecorators are functions that take another function and *wrap* it, or specify\
    \ behavior that must execute before the function executes. It provides a way for\
    \ you to compose functions together without requiring the function bodies to know\
    \ about each other.\n\nDecorators are one of the main ways of wrapping functions\
    \ in Python. I can rewrite the `do_twice` function into a more generic `repeat`\
    \ function like such:\n\n```python\ndef repeat(func: Callable, times: int = 1)\
    \ -> Callable:\n    ''' this is a function that calls the wrapped function\n \
    \       a specified number of times\n    '''\n    def _wrapper(*args, **kwargs):\n\
    \        for _ in range(times):\n            func(*args, **kwargs)\n    return\
    \ _wrapper\n\n@repeat(times=3)\ndef say_hello():\n    print(\"Hello\")\n\nsay_hello()\n\
    >>> \"Hello\"\n\"Hello\"\n\"Hello\"\n```\n\nOnce again, I've separated the policy\
    \ (saying hello repeatedly) from the mechanisms (actually repeating the function\
    \ calls). That mechanism is something I can use throughout other codebases without\
    \ any repercussions. I can apply this decorator to all sorts of functions in my\
    \ codebase, such as making two hamburger patties at once for a double cheeseburger\
    \ or mass-producing specific orders for a catering event.\n\nOf course, decorators\
    \ can do so much more than simply repeating a function invocation. One of my favorite\
    \ decorators comes from the `backoff` library. `backoff` helps you define *retry\
    \ logic*, or the actions you take to retry nondeterministic parts of your code.\
    \ Consider the `AutoKitchen` from earlier needing to save data in a database.\
    \ It will save orders taken, current inventory levels, and time spent making each\
    \ dish.\n\nAt its simplest, the code would look like this:\n\n```python\n# setting\
    \ properties of self.*_db objects will\n# update data in the database\ndef on_dish_ordered(dish:\
    \ Dish):\n    dish_db[dish].count += 1\n\ndef save_inventory_counts(inventory):\n\
    \    for ingredient in inventory:\n        inventory_db[ingredient.name] = ingredient.count\n\
    ```"
  mdcn: "这些策略会告诉第三方集成该做什么——比如应该扫描哪个文件夹，或者在容器注册表中应用哪些标签。开发者不会被*如何实现*的细节所困扰；他们通过将这些集成组合到自己的流水线中来复用它们，然后继续推进工作。\n\
    \n在之前的咖啡馆示例中，我可以改变代码架构，将机制分离出来。我的目标是设计一个系统，使得制作任何菜肴组件都是独立的，并且我可以将这些组件组合在一起创建一个食谱。这将使我能够在不同系统间复用代码，并在创建新食谱时具有灵活性。图17-4展示了一个更具组合性的架构（注意，为了节省空间，我省略了一些系统）。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_268_0.png)\n\n通过将特定的制备器分离到各自的系统中，我同时获得了可扩展性和可组合性。不仅扩展新菜肴（如新三明治）变得容易，而且定义新的连接也变得简单，例如让汤制备器复用培根制备代码。\n\
    \n当你的机制像这样被分离出来时，你会发现编写策略变得简单得多。由于没有任何机制与策略绑定，你可以开始以*声明式*风格编写，即简单地声明要做什么。看看下面的土豆、韭葱和培根汤的定义：\n\
    \n```python\nimport bacon_preparer\nimport veg_cheese_preparer\n\ndef make_potato_leek_and_bacon_soup():\n\
    \    bacon = bacon_preparer.make_bacon(slices=2)\n    potatoes = veg_cheese_preparer.cube_potatoes(grams=300)\n\
    \    leeks = veg_cheese_preparer.slice(ingredient=Vegetable.LEEKS, grams=250)\n\
    \n    chopped_bacon = chop(bacon)\n\n    # the following methods are provided\
    \ by soup preparer\n    add_chicken_stock()\n    add(potatoes)\n    add(leeks)\n\
    \    cook_for(minutes=30)\n    blend()\n    garnish(chopped_bacon)\n    garnish(Garnish.BLACK_PEPPER)\n\
    ```\n\n通过只关注代码中食谱是什么，我不必被诸如如何制作培根或切土豆块等无关细节所困扰。我将培根制备器和蔬菜/奶酪制备器与汤制备器组合在一起，定义了新的食谱。如果明天有新的汤（或任何其他菜肴）出现，定义它就像编写一系列线性指令一样简单。策略会比机制变化得更频繁；让它们易于添加、修改或删除，以满足你的业务需求。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_269_0.png)\n\n**讨论主题**\n\n你代码库的哪些部分容易复用？哪些部分难以复用？你是想复用代码的策略还是机制？讨论使你的代码更具组合性和可复用性的策略。\n\
    \n如果你预见到有复用的理由，尽量使你的机制具有可组合性。这将加速未来的开发，因为开发者将能够真正复用你的代码，而几乎没有附加条件。你正在增加灵活性和可复用性，这将使代码更易于维护。\n\
    \n然而，组合性是有代价的。通过将功能分散到更多文件中，你降低了可读性，并且引入了更多可变部分，这意味着变更产生负面影响的可能性更大。寻找引入组合性的机会，但要小心不要让你的代码*过于*灵活，以至于开发者需要浏览整个代码库才能了解如何编写简单的工作流。\n\
    \n## 在更小的规模上组合\n\nAutoKitchen示例向你展示了如何组合不同的模块和子系统，但你也可以在更小的规模上应用组合性原则。你可以编写可组合的函数和算法，让你能够轻松构建新代码。\n\
    \n## 组合函数\n\n本书的很多内容都集中在面向对象编程原则（如SOLID和基于类的设计）上，但同样重要的是从其他软件范式中学习。一个日益流行的范式是*函数式编程*（FP）。OOP的一等公民是对象，而FP则专注于*纯函数*。纯函数是其输出完全由输入派生的函数。给定一个纯函数和一组输入参数，无论任何全局状态或环境变化，它总是返回相同的输出。\n\
    \n函数式编程如此吸引人的原因在于，纯函数比充满副作用的函数更容易组合。*副作用*是函数在其返回值之外所做的任何事情，例如记录消息、进行网络调用或修改变量。通过从函数中移除副作用，你使它们更容易复用。没有隐藏的依赖关系或意外的结果；整个函数依赖于输入数据，唯一可观察的效果是返回的数据。\n\
    \n然而，当你尝试复用代码时，你必须同时引入该代码的所有物理依赖项（如果需要，还要在运行时提供逻辑依赖项）。对于纯函数，除了函数调用图之外，你没有任何物理依赖项。你不需要引入具有复杂设置或全局变量的额外对象。FP鼓励开发者编写简短、单一用途的函数，这些函数本质上是可组合的。\n\
    \n开发者习惯于像对待任何其他变量一样对待函数。他们创建*高阶*函数，即接受其他函数作为参数的函数，或返回其他函数作为返回值的函数。最简单的例子是接受一个函数并调用它两次：\n\
    \n```python\nfrom typing import Callable\n\ndef do_twice(func: Callable, *args,\
    \ **kwargs):\n    func(*args, **kwargs)\n    func(*args, **kwargs)\n```\n\n这不是一个非常令人兴奋的例子，但它为一些非常有趣的函数组合方式打开了大门。事实上，有一个完整的Python模块专门用于高阶函数：`functools`。`functools`的大部分内容，以及你编写的任何函数组合，都将以装饰器的形式出现。\n\
    \n## 装饰器\n\n装饰器是接受另一个函数并*包装*它的函数，或者指定在函数执行之前必须执行的行为。它提供了一种将函数组合在一起的方式，而无需函数体彼此了解。\n\
    \n装饰器是在Python中包装函数的主要方式之一。我可以将`do_twice`函数重写为更通用的`repeat`函数，如下所示：\n\n```python\n\
    def repeat(func: Callable, times: int = 1) -> Callable:\n    ''' this is a function\
    \ that calls the wrapped function\n        a specified number of times\n    '''\n\
    \    def _wrapper(*args, **kwargs):\n        for _ in range(times):\n        \
    \    func(*args, **kwargs)\n    return _wrapper\n\n@repeat(times=3)\ndef say_hello():\n\
    \    print(\"Hello\")\n\nsay_hello()\n>>> \"Hello\"\n\"Hello\"\n\"Hello\"\n```\n\
    \n我再次将策略（重复说你好）与机制（实际重复函数调用）分离开来。这个机制是我可以在其他代码库中使用而没有任何副作用的。我可以将这个装饰器应用于代码库中的各种函数，例如一次制作两个汉堡肉饼用于双层芝士汉堡，或者为餐饮活动批量生产特定订单。\n\
    \n当然，装饰器可以做的远不止简单地重复函数调用。我最喜欢的装饰器之一来自`backoff`库。`backoff`帮助你定义*重试逻辑*，即你为重试代码中非确定性部分所采取的操作。考虑之前的`AutoKitchen`需要将数据保存到数据库中。它将保存接取的订单、当前库存水平以及制作每道菜所花费的时间。\n\
    \n最简单的代码看起来像这样：\n\n```python\n# setting properties of self.*_db objects will\n\
    # update data in the database\ndef on_dish_ordered(dish: Dish):\n    dish_db[dish].count\
    \ += 1\n\ndef save_inventory_counts(inventory):\n    for ingredient in inventory:\n\
    \        inventory_db[ingredient.name] = ingredient.count\n```"
