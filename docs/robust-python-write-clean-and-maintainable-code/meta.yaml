  md: "It'd be silly to write two similar functions to link this in Python. behave\
    \ lets you parameterize the steps to reduce the need for writing multiple steps:\n\
    \n```\n@given(\"an order containing {dish_name}\")\ndef setup_order(ctx, dish_name):\n\
    \    if dish_name == \"a Cheeseburger with Fries\":\n        ctx.dish = CheeseburgerWithFries()\n\
    \    elif dish_name == \"Meatloaf\":\n        ctx.dish = Meatloaf()\n```\n\nAlternatively,\
    \ you can stack clauses on a function if needed:\n\n```\n@given(\"an order containing\
    \ a Cheeseburger with Fries\")\n@given(\"a typical drive-thru order\")\ndef setup_order(context):\n\
    \    ctx.dish = CheeseBurgerWithFries()\n```\n\nParameterizing and reusing steps\
    \ will help you build up vocabulary that is intuitive to use, which will reduce\
    \ the cost of writing Gherkin tests.\n\n# Table-Driven Requirements\n\nIn Chapter\
    \ 21, I mentioned how you can parameterize tests so that all your pre-conditions\
    \ and assertions are defined in a table. behave offers something very similar:\n\
    \n```\nFeature: Vegan-friendly menu\n\nScenario Outline: Vegan Substitutions\n\
    \  Given an order containing <dish_name>,\n  When I ask for vegan substitutions\n\
    \  Then <result>\n\nExamples: Vegan Substitutable\n  | dish_name             \
    \   | result |\n  | a Cheeseburger with Fries | I receive the meal with no animal\
    \ products |\n  | Cobb Salad               | I receive the meal with no animal\
    \ products |\n  | French Fries             | I receive the meal with no animal\
    \ products |\n  | Lemonade                 | I receive the meal with no animal\
    \ products |\n\nExamples: Not Vegan Substitutable\n  | dish_name    | result |\n\
    \  | Meatloaf     | a non-vegan-substitutable error shows up |\n  | Meatballs\
    \    | a non-vegan-substitutable error shows up |\n  | Fried Shrimp | a non-vegan-substitutable\
    \ error shows up |\n```\n\nbehave will automatically run a test for each table\
    \ entry. This is a great way to run the same test on very similar data."
