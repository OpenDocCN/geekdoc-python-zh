    \n事件驱动架构可能使调试变得更困难。在调试器中单步执行代码时，你会到达产生事件的代码，但当你单步进入传输机制时，你通常会单步进入第三方代码。在最坏的情况下，实际传输你事件的代码可能在不同的进程中运行，甚至在不同的机器上运行。你可能需要多个调试器处于活动状态（每个进程或系统一个）才能正确调试事件驱动架构。\n\
