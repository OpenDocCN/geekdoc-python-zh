    \    dispense_hot_dog_to_customer(hot_dog)\n```\n\nNone values truly are a billion-dollar\
    \ mistake. If they slip through, programs can crash, users are frustrated, and\
    \ money is lost. Use Optional types to tell other developers to beware of None,\
    \ and benefit from the automated checking of your tools.\n\n![](img/d64d2be45ca85b398807d181202e7046_70_1.png)\n\
    \n**Discussion Topic**\n\nHow often do you deal with None in your codebase? How\
