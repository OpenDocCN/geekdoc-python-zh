    \ the gap between type hinting and the runtime type system. They allow you to\
    \ provide structural subtyping during typechecking. As a matter of fact, you probably\
    \ are familiar with a protocol without even knowing it: the iterator protocol.\n\
    \nThe iterator protocol is a defined set of behaviors that objects may implement.\
    \ If an object implements these behaviors, you can loop over the object. Consider:\n\
    \n```\nfrom random import shuffle\nfrom typing import Iterator, MutableSequence\n\
    class ShuffleIterator:\n    def __init__(self, sequence: MutableSequence):\n \
    \       self.sequence = list(sequence)\n        shuffle(self.sequence)\n\n   \
    \ def __iter__(self):\n        return self\n\n    def __next__(self):\n      \
    \  if not self.sequence:\n            raise StopIteration\n        return self.sequence.pop(0)\n\
    \nmy_list = [1, 2, 3, 4]\niterator: Iterator = ShuffleIterator(my_list)\n```"
  - "[PAGE 212]\n\n```\nfor num in iterator:\n    print(num)\n```\n\nNotice how I\
    \ didn't have to subclass Iterator in order for the typing to work. This is because\
    \ the ShuffleIterator has the two methods needed for iterators to work: an __iter__\
    \ method for looping over iterators, and a __next__ method for getting the next\
    \ item in the sequence.\n\nThis is exactly the sort of pattern I want to achieve\
    \ with the Splittable examples. I want to be able to have typing work based on\
    \ the structure of the code. To do this, you can define your own protocol.\n\n\
    # Defining a Protocol\n\nDefining a protocol is extremely simple. If you want\
    \ something to be splittable, you define Splittable in terms of a protocol:\n\n\
    ```\nfrom typing import Protocol\nclass Splittable(Protocol):\n    cost: int\n\
    \    name: str\n\n    def split_in_half(self) -> tuple['Splittable', 'Splittable']:\n\
    \        \"\"\" No implementation needed \"\"\"\n        ...\n```\n\nThis looks\
    \ pretty close to the example for subclassing earlier in this chapter, but you\
    \ use it a tad differently.\n\nTo have the BLTSandwich be splittable, you don't\
    \ have to indicate anything different in the class. There is no subclassing needed:\n\
    \n```\nclass BLTSandwich:\n    def __init__(self):\n        self.cost = 6.95\n\
    \        self.name = 'BLT'\n        # This class handles a fully constructed BLT\
    \ sandwich\n        # ...\n\n    def split_in_half(self) -> ('BLTSandwich', 'BLTSandwich'):\n\
    \        # Instructions for how to split a sandwich in half\n        # Cut along\
    \ diagonal, wrap separately, etc.\n        # Return two sandwiches in return\n\
    ```\n\nThere is no explicit parent class for BLTSandwich. If you'd like to be\
    \ explicit, you can still subclass from Splittable, but it's not a requirement.\n\
    \nThe split_dish function can now expect to use anything that supports the new\
    \ Splittable protocol:\n\n```\ndef split_dish(order: Splittable) -> tuple[Splittable,\
    \ Splittable]:\n```"
- md: "## Discussion Topic\n\nWhere can you use protocols in your codebase? Discuss\
    \ areas where you use duck typing heavily or write generic code. Discuss how it\
    \ would be easy to misuse these areas of code without using a protocol.\n\nThe\
    \ typechecker will detect that a BLTSandwich is Splittable just by virtue of the\
    \ fields and method it has defined. This simplifies class hierarchies immensely.\
    \ You don't need a complicated tree structure, even as you add more protocols.\
    \ You can simply define a different protocol for each set of required behaviors,\
    \ including Shareable, Substitutable, or PickUppable. Functions that depend on\
    \ those behaviors can then rely on those protocols instead of any sort of base\
    \ class. The original classes don't need to change in any form, as long as they\
    \ implement the needed functionality.\n\n> ## Do Protocols Eliminate the Need\
    \ for Inheritance?\n\nOnce you get used to protocols, inheritance appears redundant.\
    \ While inheritance makes a lot of sense for nominal subtyping, it is too heavyweight\
    \ for anything regarding structural subtyping. You are introducing linkages that\
    \ don't need to be there, increasing the maintenance cost of your system.\n\n\
    To decide whether to use a protocol or subclass, I want you to remember the lessons\
    \ learned in Chapter 12. Anything subclassing another class or adhering to a protocol\
    \ is a subtype. Therefore, it needs to uphold the contract of the parent type.\
    \ If the contract just defines the structure of the type (such as being Splittable,\
    \ which just needed certain attributes to be defined), use a protocol. However,\
    \ if the parent type's contract defines behaviors that need to be upheld, such\
    \ as how to operate in certain conditions, use inheritance to better reflect the\
    \ *is-a* relationship.\n\n## Advanced Usage\n\nI've covered the primary use case\
    \ for protocols so far, but there's a little more I'd like to show you. You won't\
    \ be reaching for these features as often, but they fill out a critical niche\
    \ for protocols.\n\n## Composite Protocols\n\nI talked in the last section about\
    \ how a class might satisfy multiple protocols. For instance, a single lunch item\
    \ may be Splittable, Shareable, Substitutable, and PickUppable. While you can\
    \ mix in these protocols quite easily, what if you found out that over half the\
    \ lunch entries fall into this category? You could designate these lunch entries\
    \ as a StandardLunchEntry, allowing you to refer to all four protocols as a single\
    \ type.\n\nYour first attempt might just be to write a type alias to cover your\
    \ bases:\n\n```python\nStandardLunchEntry = Union[Splittable, Shareable,\n   \
    \                       Substitutable, PickUppable]\n```\n\nHowever, this will\
    \ match anything that satisfies at least one protocol, not all four. To match\
    \ all four protocols, you need to use a composite protocol:\n\n```python\nclass\
    \ StandardLunchEntry(Splittable, Shareable, Substitutable,\n                 \
    \       PickUppable, Protocol):\n    pass\n\n# Remember, you don't need to explicitly\
    \ subclass from the protocol\n# I do so here for clarity's sake\nclass BLTSandwich(StandardLunchEntry):\n\
    \    # ... snip ...\n```\n\nThen, you can use StandardLunchEntry anywhere an item\
    \ should support all four protocols. This allows you to group protocols together,\
    \ without having to duplicate the same combinations again and again throughout\
    \ your codebase.\n\n## Runtime Checkable Protocols\n\nThroughout all of this protocol\
    \ discussion, I've stayed in the realm of static type-checking. Sometimes, you\
    \ just need to check a type at runtime, though. Unfortunately, protocols out of\
    \ the box do not support any sort of isinstance() or issubclass() check. It's\
    \ easy to add, though:\n\n```python\nfrom typing import runtime_checkable, Protocol\n\
    \n@runtime_checkable\nclass Splittable(Protocol):\n    cost: int\n    name: str\n\
    \n    def split_in_half(self) -> tuple['Splittable', 'Splittable']:\n        ...\n\
    \nclass BLTSandwich():\n    # ... snip ...\n```\n\n```python\nassert isinstance(BLTSandwich(),\
    \ Splittable)\n```\n\nAs long as you throw the `runtime_checkable` decorator in\
    \ there, you can do an `isinstance()` check to see if an object satisfies a protocol.\
    \ When you do, `isinstance()` is essentially calling a `__hasattr__` method on\
    \ each of the expected variables and functions of the protocol.\n\n> issubclass()\
    \ will only work if your protocol is a nondata protocol, which is one that does\
    \ not have any protocol variables. This has to deal with edge cases concerning\
    \ setting variables in constructors.\n\nYou will typically mark protocols as `runtime_checkable`\
    \ when you are using a Union of protocols. Functions may expect either one protocol\
    \ or a different protocol, and those functions might need some way to differentiate\
    \ the two inside the body of a function at runtime.\n\n## Modules Satisfying Protocols\n\
    \nWhile I've so far only talked about objects satisfying protocols, there's a\
    \ narrower use case that is worth mentioning. It turns out that modules can satisfy\
    \ protocols, too. After all, a module is still an object.\n\nSuppose I want to\
    \ define a protocol around a restaurant and each restaurant is defined in a separate\
    \ file. Here's one such file:\n\n```python\nname = \"Chameleon Café\"\naddress\
    \ = \"123 Fake St.\"\n\nstandard_lunch_entries = [BLTSandwich, TurkeyAvocadoWrap,\
    \ Chili]\nother_entries = [BaconCheeseburger, FrenchOnionSoup]\n\ndef render_menu()\
    \ -> Menu:\n    # Code to render a menu\n```\n\nThen, I need some code that will\
    \ define the `Restaurant` protocol and be able to load a restaurant:\n\n```python\n\
    from typing import Protocol\nfrom lunch import LunchEntry, Menu, StandardLunchEntry\n\
    \nclass Restaurant(Protocol):\n    name: str\n    address: str\n    standard_lunch_entries:\
    \ list[StandardLunchEntry]\n    other_entries: List[LunchEntry]\n\n    def render_menu(self)\
    \ -> Menu:\n        \"\"\" No implementation needed \"\"\"\n        ...\n\ndef\
    \ load_restaurant(restaurant: Restaurant):\n    # code to load restaurant\n  \
    \  # ...\n```\n\nNow, I can pass imported modules to my load_restaurant function:\n\
    \n```python\nimport restaurant\nfrom load_restaurant import load_restaurant\n\n\
    # Loads our restaurant model\nload_restaurant(restaurant)\n```\n\nIn main.py,\
    \ the call to load_restaurant will typecheck just fine. The restaurant module\
    \ satisfies the Restaurant protocol I've defined. Protocols are even smart enough\
    \ to ignore the self argument in render_menu when a module is passed in. Using\
    \ a protocol to define a module isn't an everyday Python sort of thing, but you'll\
    \ see it crop up if you have Python configuration files or plug-in architectures\
    \ that need to enforce a contract.\n\n> Not every typechecker may support using\
    \ a module as a protocol just yet; double-check the bugs and documentation of\
    \ your favorite typechecker for support.\n\n## Closing Thoughts\n\nProtocols were\
    \ just introduced in Python 3.8, so they are still relatively new. However, they\
    \ patch a huge hole in what you can do with Python's static typechecking. Remember,\
    \ while the runtime is structurally subtyped, most of the static typechecking\
    \ is nominally subtyped. Protocols fill that gap and let you do structural subtyping\
    \ during typechecking. You'll most commonly use them whenever you're writing library\
    \ code and want to provide a solid API that users can depend on, without relying\
    \ on a specific type. Using protocols reduces physical dependencies of code, which\
    \ helps with maintainability, but you still can catch errors early.\n\nIn the\
    \ next chapter, you'll learn about one more way to enhance your types: modeled\
    \ types. Modeling a type allows you to create a rich set of constraints that are\
    \ checked at typecheck and runtime, and can eliminate a whole class of errors\
    \ without having to manually write validation for every field. Even better, by\
    \ modeling your types, you provide built-in documentation for what is and what\
    \ is not allowed in your codebase. Throughout the next chapter, you'll see how\
    \ to do all of this using the popular library pydantic.\n\n# CHAPTER 14\n\n##\
    \ Runtime Checking With pydantic\n\nThe central theme of robust code is making\
    \ it easier to detect errors. Errors are an inevitable part of developing complex\
    \ systems; you can’t avoid them. By writing your own types, you create a vocabulary\
    \ that makes it harder to introduce inconsistencies. Using type annotations provides\
    \ you a safety net, letting you catch mistakes as you are developing. Both of\
    \ these are examples of *shifting errors left*; instead of finding errors during\
    \ testing (or worse, in production), you find them earlier, ideally as you develop\
    \ code.\n\nHowever, not every error is easily found through code inspection and\
    \ static analysis. There is a whole class of errors that will only be detectable\
    \ at runtime. Any time you interact with data supplied from outside your program\
    \ (such as databases, config files, network requests), you run the risk of inputting\
    \ invalid data. Your code can be rock-solid in how you retrieve and parse data,\
    \ but there’s not much you can do to prevent users from passing in invalid data.\n\
    \nYour first inclination might be to write a lot of *validation logic*: `if` statements\
    \ and checks to see if all of the data passed in is correct. The problem is that\
    \ validation logic is often complex, sprawling, and tough to understand at a glance.\
    \ The more comprehensive your validation, the worse it gets. If your goal is to\
    \ find errors, reading all the code (and tests) will be your best shot. In that\
    \ case, you need to minimize the amount of code you look at. Herein lies the rub:\
    \ you will understand more of the code the more you read, but the more you read,\
    \ the higher the cognitive burden you will have, decreasing your chances of finding\
    \ an error.\n\nIn this chapter, you’ll learn how using the pydantic library will\
    \ fix this problem. pydantic lets you define modeled classes, reducing the amount\
    \ of validation logic you need to write, without sacrificing readability. pydantic\
    \ will easily parse user-supplied data, providing guarantees about output data\
    \ structures. I’ll go through a few basic"
  mdcn: "## 讨论主题\n\n你可以在代码库的哪些地方使用协议？讨论你大量使用鸭子类型或编写泛型代码的领域。讨论在不使用协议的情况下，这些代码区域可能如何容易被误用。\n\
    \n类型检查器仅凭 `BLTSandwich` 定义的字段和方法，就能检测出它实现了 `Splittable` 协议。这极大地简化了类层次结构。即使添加更多协议，你也不需要复杂的树形结构。你可以为每组所需行为简单地定义不同的协议，例如\
    \ `Shareable`、`Substitutable` 或 `PickUppable`。依赖这些行为的函数可以依赖这些协议，而不是任何基类。原始类无需以任何形式更改，只要它们实现了所需的功能。\n\
    \n> ## 协议是否消除了对继承的需求？\n\n一旦你习惯了协议，继承就显得多余了。虽然继承对于名义子类型化非常有意义，但对于任何涉及结构子类型化的情况来说，它都过于笨重。你引入了不必要的关联，增加了系统的维护成本。\n\
    \n要决定是使用协议还是子类化，我希望你记住第 12 章学到的教训。任何子类化另一个类或遵循协议的类型都是子类型。因此，它需要维护父类型的契约。如果契约只是定义了类型的结构（例如\
    \ `Splittable`，只需要定义某些属性），那么使用协议。然而，如果父类型的契约定义了需要维护的行为，例如在特定条件下如何操作，那么使用继承能更好地反映\
    \ *is-a* 关系。\n\n## 高级用法\n\n到目前为止，我已经介绍了协议的主要用例，但还有一些内容我想向你展示。你不会经常用到这些特性，但它们填补了协议的一个关键空白。\n\
    \n## 组合协议\n\n我在上一节中谈到一个类可能满足多个协议。例如，一份午餐项目可能同时是 `Splittable`、`Shareable`、`Substitutable`\
    \ 和 `PickUppable`。虽然你可以很容易地混合这些协议，但如果你发现超过一半的午餐条目都属于这一类呢？你可以将这些午餐条目指定为 `StandardLunchEntry`，从而允许你将所有四个协议作为一个类型来引用。\n\
    \n你的第一次尝试可能只是编写一个类型别名来覆盖所有情况：\n\n```python\nStandardLunchEntry = Union[Splittable,\
    \ Shareable,\n                          Substitutable, PickUppable]\n```\n\n然而，这将匹配任何满足至少一个协议的类型，而不是全部四个。要匹配所有四个协议，你需要使用组合协议：\n\
    \n```python\nclass StandardLunchEntry(Splittable, Shareable, Substitutable,\n\
    \                        PickUppable, Protocol):\n    pass\n\n# 记住，你不需要显式地从协议继承\n\
    # 我在这里这样做是为了清晰起见\nclass BLTSandwich(StandardLunchEntry):\n    # ... 省略 ...\n```\n\
    \n然后，你可以在任何需要项目支持所有四个协议的地方使用 `StandardLunchEntry`。这允许你将协议组合在一起，而无需在代码库中一遍又一遍地重复相同的组合。\n\
    \n## 运行时可检查协议\n\n在所有这些协议讨论中，我一直停留在静态类型检查的领域。但有时，你只需要在运行时检查类型。不幸的是，协议开箱即用不支持任何\
    \ `isinstance()` 或 `issubclass()` 检查。不过，添加起来很容易：\n\n```python\nfrom typing import\
    \ runtime_checkable, Protocol\n\n@runtime_checkable\nclass Splittable(Protocol):\n\
    \    cost: int\n    name: str\n\n    def split_in_half(self) -> tuple['Splittable',\
    \ 'Splittable']:\n        ...\n\nclass BLTSandwich():\n    # ... 省略 ...\n```\n\
    \n```python\nassert isinstance(BLTSandwich(), Splittable)\n```\n\n只要你在其中添加了 `runtime_checkable`\
    \ 装饰器，你就可以进行 `isinstance()` 检查，以查看对象是否满足协议。当你这样做时，`isinstance()` 本质上是在协议的每个预期变量和函数上调用\
    \ `__hasattr__` 方法。\n\n> `issubclass()` 只有在你的协议是非数据协议（即没有任何协议变量的协议）时才有效。这与在构造函数中设置变量的边缘情况有关。\n\
    \n当你使用协议的 `Union` 时，通常会将协议标记为 `runtime_checkable`。函数可能期望一个协议或另一个协议，并且这些函数可能需要在函数体内部以某种方式在运行时区分两者。\n\
    \n## 满足协议的模块\n\n虽然到目前为止我只讨论了对象满足协议，但有一个更窄的用例值得一提。事实证明，模块也可以满足协议。毕竟，模块仍然是一个对象。\n\
    \n假设我想围绕餐厅定义一个协议，每个餐厅定义在一个单独的文件中。这是一个这样的文件：\n\n```python\nname = \"Chameleon Café\"\
    \naddress = \"123 Fake St.\"\n\nstandard_lunch_entries = [BLTSandwich, TurkeyAvocadoWrap,\
    \ Chili]\nother_entries = [BaconCheeseburger, FrenchOnionSoup]\n\ndef render_menu()\
    \ -> Menu:\n    # 渲染菜单的代码\n```\n\n然后，我需要一些代码来定义 `Restaurant` 协议并能够加载餐厅：\n\n```python\n\
    from typing import Protocol\nfrom lunch import LunchEntry, Menu, StandardLunchEntry\n\
    \nclass Restaurant(Protocol):\n    name: str\n    address: str\n    standard_lunch_entries:\
    \ list[StandardLunchEntry]\n    other_entries: List[LunchEntry]\n\n    def render_menu(self)\
    \ -> Menu:\n        \"\"\" 不需要实现 \"\"\"\n        ...\n\ndef load_restaurant(restaurant:\
    \ Restaurant):\n    # 加载餐厅的代码\n    # ...\n```\n\n现在，我可以将导入的模块传递给我的 `load_restaurant`\
    \ 函数：\n\n```python\nimport restaurant\nfrom load_restaurant import load_restaurant\n\
    \n# 加载我们的餐厅模型\nload_restaurant(restaurant)\n```\n\n在 `main.py` 中，对 `load_restaurant`\
    \ 的调用将通过类型检查。`restaurant` 模块满足我定义的 `Restaurant` 协议。协议甚至足够智能，当传入模块时，会忽略 `render_menu`\
    \ 中的 `self` 参数。使用协议来定义模块不是日常的 Python 事情，但如果你有 Python 配置文件或需要强制执行契约的插件架构，你会看到它出现。\n\
    \n> 并非每个类型检查器都可能支持将模块用作协议；请仔细检查你最喜欢的类型检查器的错误报告和文档以获取支持信息。\n\n## 结束语\n\n协议是在 Python\
    \ 3.8 中引入的，所以它们仍然相对较新。然而，它们弥补了 Python 静态类型检查能力的一个巨大空白。记住，虽然运行时是结构子类型化的，但大多数静态类型检查是名义子类型化的。协议填补了这一空白，让你在类型检查期间进行结构子类型化。你最常在编写库代码并希望提供一个可靠的、用户可以依赖的\
    \ API 时使用它们，而无需依赖特定类型。使用协议减少了代码的物理依赖性，这有助于可维护性，但你仍然可以及早捕获错误。\n\n在下一章中，你将学习另一种增强类型的方法：建模类型。建模类型允许你创建一组丰富的约束，这些约束在类型检查和运行时进行检查，并且可以消除一整类错误，而无需为每个字段手动编写验证。更好的是，通过建模你的类型，你为代码库中允许和不允许的内容提供了内置文档。在下一章中，你将看到如何使用流行的库\
    \ `pydantic` 来完成所有这些操作。\n\n# 第 14 章\n\n## 使用 pydantic 进行运行时检查\n\n健壮代码的核心主题是使错误更容易被检测到。错误是开发复杂系统不可避免的一部分；你无法避免它们。通过编写自己的类型，你创建了一种词汇表，使得引入不一致性变得更加困难。使用类型注解为你提供了一个安全网，让你在开发过程中就能捕获错误。这两者都是\
    \ *将错误左移* 的例子；你不是在测试期间（或更糟，在生产环境中）发现错误，而是更早地发现它们，理想情况下是在编写代码时。\n\n然而，并非每个错误都能通过代码检查和静态分析轻松发现。有一整类错误只能在运行时检测到。每当你与程序外部提供的数据（如数据库、配置文件、网络请求）交互时，你都有输入无效数据的风险。你的代码在检索和解析数据方面可能坚如磐石，但对于防止用户传入无效数据，你能做的并不多。\n\
    \n你的第一反应可能是编写大量的 *验证逻辑*：`if` 语句和检查，以查看传入的所有数据是否正确。问题在于验证逻辑通常很复杂、庞大，并且难以一目了然。你的验证越全面，情况就越糟。如果你的目标是发现错误，阅读所有代码（和测试）将是你的最佳选择。在这种情况下，你需要最小化你查看的代码量。问题就在这里：你阅读的代码越多，你理解的就越多，但你阅读的越多，你的认知负担就越高，从而降低了你发现错误的机会。\n\
    \n在本章中，你将学习如何使用 `pydantic` 库来解决这个问题。`pydantic` 让你定义建模类，减少你需要编写的验证逻辑量，而不会牺牲可读性。`pydantic`\
    \ 将轻松解析用户提供的数据，并提供关于输出数据结构的保证。我将介绍一些基本"
