  md: '# Data Classes Versus TypedDict


    Also discussed in Chapter 5 was the TypedDict type. This is another way to store
    heterogeneous data that makes sense for readers and typecheckers. At first glance,
    TypedDict and data classes solve a very similar problem, so it can be tough to
    decide which one is appropriate. My rule of thumb is to think of a dataclass as
    the default, as it can have functions defined on it and you can control immutability,
    comparability, equality, and other operations. However, if you are already working
    with dictionaries (such as for working with JSON), you should reach for a TypedDict,
    provided that you don''t need any of the benefits of a dataclass.


    # Data Classes Versus namedtuple


    namedtuple is a tuple-like collection type in the collections module. Unlike tuples,
    it allows for you to name the fields in a tuple like so:


    ```

    >>> from collections import namedtuple

    >>> NutritionInformation = namedtuple(''NutritionInformation'',

    ...                                  [''calories'', ''fat'', ''carbohydrates''])

    >>> nutrition = NutritionInformation(calories=100, fat=5, carbohydrates=10)

    >>> print(nutrition.calories)

    100

    ```


    A namedtuple goes a long way toward making a tuple more readable, but so does
    using a dataclass in its place. I almost always pick a dataclass instead of a
    namedtuple. A dataclass, like a namedtuple, provides named fields along with other
    benefits like:


    +   - Explicitly type annotating your arguments

    - Control of immutability, comparability, and equality

    - Easier to define functions in the type


    In general, I only reach for a namedtuple if I explicitly need compatibility with
    Python 3.6 or before.


    ![](img/d64d2be45ca85b398807d181202e7046_152_0.png)


    **Discussion Topic**


    What types do you use to represent heterogeneous data in your codebase? If you
    use dictionaries, how easy is it for developers to know all the key-value pairs
    in the dictionary? If you use tuples, how easy is it for developers to know what
    the meaning of individual fields are?'
  merge: -1
  pgno: 152
- img_proc: true
  md: '# Closing Thoughts


    Data classes were a game changer when released in Python 3.7, because they allowed
    developers to define heterogeneous types that were fully typed while still staying
    lightweight. As I write code, I find myself reaching for data classes more and
    more. Whenever you encounter heterogeneous, developer-controlled dictionaries
    or namedtuples, a data class is more suitable. You can find a wealth of additional
    information in the [dataclass documentation](https://docs.python.org/3/library/dataclasses.html).


    However, as great as data classes are, they should not be universally used. A
    data class, at its heart, represents a conceptual relationship, but it really
    is only appropriate when the members within the data class are independent of
    one another. If any of the members should be restricted depending on the other
    members, a data class will make it harder to reason about your code. Any developer
    could change the fields during your data classes’ lifetime, potentially creating
    an illegal state. In these cases, you need to reach for something a bit heavier.
    In the next chapter, I’ll teach you how to do just that with classes.'
