  md: '# Pyright


    Pyright is a typechecker designed by Microsoft. I have found it to be the most
    configurable of the typecheckers I’ve come across. If you would like more control
    than your current typechecker, explore the Pyright configuration documentation
    for all that you can do. However, Pyright has an additional awesome feature: VS
    Code integration.


    VS Code (also built by Microsoft) is an immensely popular code editor for developers.
    Microsoft leveraged the ownership of both tools to create a VS Code extension
    called Pylance. You can install Pylance from your VS Code extensions browser.
    Pylance is built upon Pyright and uses type annotations to provide a better code-editing
    experience. Before, I mentioned that autocomplete was a benefit of type annotations
    in IDEs, but Pylance takes it to the next level. Pylance offers the following
    features:


    +   - Automatic insertion of imports based on your types

    - Tooltips with full type annotations based on signatures

    - Codebase browsing such as finding references or browsing a call graph

    - Real-time diagnostic checking


    It’s this last feature that sells Pylance/Pyright for me. Pylance has a setting
    that allows you to constantly run diagnostics in your whole workspace. This means
    that every time you edit a file, pyright will run across your entire workspace
    (and it runs fast, too) to look for additional areas that you broke. You don’t
    need to manually run any commands; it happens automatically. As someone who likes
    to refactor often, I find this tool invaluable for finding breakages early. Remember,
    you want to find your errors in as close to real time as possible.


    I’ve pulled up the mypy source codebase again and have Pylance enabled and in
    workplace diagnostics mode. I want to change one type on line 19 from a sequence
    to a tuple and see how Pylance handles the change. The code snippet I’m changing
    is shown in Figure 6-2.'
