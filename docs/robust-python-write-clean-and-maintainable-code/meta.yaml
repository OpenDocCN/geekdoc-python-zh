- img_proc: true
  md: '> To use this base class, you have to subclass and override the three required
    methods. You then have to find a way to substitute your derived class into any
    code that needs a pizza maker. You typically have to set up Abstract Factories
    (another design pattern found in the Gang of Four book) to inject derived classes.


    Since Python does not require everything to be in a class and offers first-class
    support for functions, I prefer using a data class of functions to fill in a template.
    It involves less boilerplate, but still provides similar flexibility and extensibility.
    Just be aware that design-pattern purists may prefer the OO pattern described
    above.


    # The Strategy Pattern


    The Template Method Pattern is great for swapping out select parts of an algorithm,
    but what if you want to swap out the *entire* algorithm? A very similar design
    pattern exists for this use case: the Strategy Pattern.


    The Strategy Pattern is for plugging entire algorithms into a context.² For the
    Ultimate Kitchen Assistant, consider a module that specializes in Tex-Mex (a regional
    American cuisine that blends southwestern US and northern Mexican cuisines). A
    large variety of dishes can be made from a common set of items; you mix and match
    the different ingredients in new ways.


    For instance, you will find the following ingredients on most Tex-Mex menus: tortillas
    (corn or flour), beans, ground beef, chicken, lettuce, tomato, guacamole, salsa,
    and cheese. From these ingredients, you can create tacos, flautas, chimichangas,
    enchiladas, taco salads, nachos, gorditas…the list goes on. I don''t want the
    system to restrict all the different Tex-Mex dishes; I want different groups of
    developers to supply *how* to make the dish.


    To do this with the Strategy Pattern, I need to define what the Ultimate Kitchen
    Assistant does and what the strategy does. In this case, the Ultimate Kitchen
    Assistant should provide the mechanisms for interacting with ingredients, but
    future developers are free to keep adding new Tex-Mex concoctions with a *TexMexStrategy*.


    As with any code designed to be extensible, I need to make sure that the interaction
    between my Ultimate Kitchen Assistant and the Tex-Mex module agrees on the pre-
    and postconditions, namely what gets passed into the Tex-Mex module and what comes
    out.


    ² Erich Gamma, Richard Helm, Ralph E. Johnson, and John Vlissides. *Design Patterns:
    Elements of Reusable Object-Oriented Software*. Boston, MA: Addison-Wesley Professional,
    1994.'
