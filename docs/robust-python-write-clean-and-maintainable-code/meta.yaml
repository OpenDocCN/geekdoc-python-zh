  - '[PAGE 294]


    > To use this base class, you have to subclass and override the three required
    methods. You then have to find a way to substitute your derived class into any
    code that needs a pizza maker. You typically have to set up Abstract Factories
    (another design pattern found in the Gang of Four book) to inject derived classes.


    Since Python does not require everything to be in a class and offers first-class
    support for functions, I prefer using a data class of functions to fill in a template.
    It involves less boilerplate, but still provides similar flexibility and extensibility.
    Just be aware that design-pattern purists may prefer the OO pattern described
    above.


    # The Strategy Pattern


    The Template Method Pattern is great for swapping out select parts of an algorithm,
    but what if you want to swap out the *entire* algorithm? A very similar design
    pattern exists for this use case: the Strategy Pattern.


    The Strategy Pattern is for plugging entire algorithms into a context.² For the
    Ultimate Kitchen Assistant, consider a module that specializes in Tex-Mex (a regional
    American cuisine that blends southwestern US and northern Mexican cuisines). A
    large variety of dishes can be made from a common set of items; you mix and match
    the different ingredients in new ways.


    For instance, you will find the following ingredients on most Tex-Mex menus: tortillas
    (corn or flour), beans, ground beef, chicken, lettuce, tomato, guacamole, salsa,
    and cheese. From these ingredients, you can create tacos, flautas, chimichangas,
    enchiladas, taco salads, nachos, gorditas…the list goes on. I don''t want the
    system to restrict all the different Tex-Mex dishes; I want different groups of
    developers to supply *how* to make the dish.


    To do this with the Strategy Pattern, I need to define what the Ultimate Kitchen
    Assistant does and what the strategy does. In this case, the Ultimate Kitchen
    Assistant should provide the mechanisms for interacting with ingredients, but
    future developers are free to keep adding new Tex-Mex concoctions with a *TexMexStrategy*.


    As with any code designed to be extensible, I need to make sure that the interaction
    between my Ultimate Kitchen Assistant and the Tex-Mex module agrees on the pre-
    and postconditions, namely what gets passed into the Tex-Mex module and what comes
    out.


    ² Erich Gamma, Richard Helm, Ralph E. Johnson, and John Vlissides. *Design Patterns:
    Elements of Reusable Object-Oriented Software*. Boston, MA: Addison-Wesley Professional,
    1994.'
- md: "Suppose the Ultimate Kitchen Assistant has numbered bins to put ingredients\
    \ in. The Tex-Mex module needs to know what bins the common Tex-Mex ingredients\
    \ are in, so it can use the Ultimate Kitchen Assistant to actually do the prepping\
    \ and cooking.\n\n```python\n@dataclass\nclass TexMexIngredients:\n    corn_tortilla_bin:\
    \ int\n    flour_tortilla_bin: int\n    salsa_bin: int\n    ground_beef_bin: int\n\
    \    # ... snip ...\n    shredded_cheese_bin: int\n\ndef prepare_tex_mex_dish(tex_mex_recipe_maker:\
    \ Callable[TexMexIngredients]):\n    tex_mex_ingredients = get_available_ingredients(\"\
    Tex-Mex\")\n    dish = tex_mex_recipe_maker(tex_mex_ingredients)\n    serve(dish)\n\
    ```\n\nThe function `prepare_tex_mex_dish` collects ingredients, then delegates\
    \ to the actual `tex_mex_recipe_maker` to create the dish to serve. The `tex_mex_recipe_maker`\
    \ is the strategy. It's very similar to the Template Method Pattern, but you typically\
    \ are just passing a single function rather than a collection of functions.\n\n\
    A future developer just has to write a function that does the actual preparation,\
    \ given the ingredients. They could write:\n\n```python\nimport tex_mex_module\
    \ as tmm\n\ndef make_soft_taco(ingredients: TexMexIngredients) -> tmm.Dish:\n\
    \    tortilla = tmm.get_ingredient_from_bin(ingredients.flour_tortilla_bin)\n\
    \    beef = tmm.get_ingredient_from_bin(ingredients.ground_beef_bin)\n    dish\
    \ = tmm.get_plate()\n    dish.lay_on_dish(tortilla)\n    tmm.season(beef, tmm.CHILE_POWDER_BLEND)\n\
    \    # ... snip ...\n\nprepare_tex_mex_dish(make_soft_taco)\n```\n\nIf they decide\
    \ they want to provide support for a different dish at some point in the future,\
    \ they just have to write a new function:\n\n```python\ndef make_chimichanga(ingredients:\
    \ TexMexIngredients):\n    # ... snip ...\n```\n\nDevelopers can continue to define\
    \ functions however they want, whenever they want. Just like the Template Method\
    \ Pattern, they can plug in new functionality with minimal impact to the original\
    \ code.\n\nAs with the Template Method, the implementation I've shown is a bit\
    \ different than what was originally described in the Gang of Four book. The original\
    \ implementation involved classes and subclasses that wrap a single method. In\
    \ Python, it's far easier to just pass the single function.\n\n## Plug-in Architectures\n\
    \nThe Strategy and Template Method Patterns are great for plugging in small bits\
    \ of functionality: a class here or a function there. However, the same patterns\
    \ apply to your architecture as well. Being able to inject classes, modules, or\
    \ subsystems is just as important. A Python library called stevedore is an incredibly\
    \ useful tool for managing plug-ins.\n\nA plug-in is a piece of code that can\
    \ be dynamically loaded at runtime. Code can scan for installed plug-ins, select\
    \ an appropriate one, and delegate responsibilities to that plug-in. This is another\
    \ example of extensibility; developers can focus on specific plug-ins without\
    \ touching the core codebase.\n\nThere are a number of benefits beyond extensibility\
    \ to a plug-in architecture:\n\n- You can deploy plug-ins independently from the\
    \ core, giving you more granularity for rolling out updates.\n- Third parties\
    \ can write plug-ins without modifying your codebase.\n- Plug-ins are able to\
    \ be developed in isolation from the core codebase, reducing the chances of creating\
    \ tightly coupled code.\n\nTo demonstrate how plug-ins work, say I want to support\
    \ an ecosystem for the Ultimate Kitchen Assistant where users can buy and install\
    \ modules (such as the Tex-Mex module in the last section) separately from the\
    \ main kitchen assistant. Each module provides a set of recipes, special equipment,\
    \ and storage of ingredients for the Ultimate Kitchen Assistant to do work. The\
    \ real benefit is that each module can be developed separately from the Ultimate\
    \ Kitchen Assistant core; each module is a plug-in.\n\nThe first thing to do when\
    \ designing plug-ins is determine the contract between the core and the various\
    \ plug-ins. Ask yourself what services the core platform provides and what you\
    \ expect the plug-ins to provide. In the case of the Ultimate Kitchen Assistant,\
    \ Figure 19-3 demonstrates the contract I will be using in the following examples.\n\
    \nFigure 19-3. Contract between core and plug-in\n\nI want to put this contract\
    \ into code, so that it is unambiguous what I expect out of a plug-in:\n\n```python\n\
    from abc import abstractmethod\nfrom typing import runtime_checkable, Protocol\n\
    \nfrom ultimate_kitchen_assistant import Amount, Dish, Ingredient, Recipe\n\n\
    @runtime_checkable\nclass UltimateKitchenAssistantModule(Protocol):\n    ingredients:\
    \ list[Ingredient]\n\n    @abstractmethod\n    def get_recipes() -> list[Recipe]:\n\
    \        raise NotImplementedError\n\n    @abstractmethod\n    def prepare_dish(inventory:\
    \ dict[Ingredient, Amount],\n                    recipe: Recipe) -> Dish:\n  \
    \      raise NotImplementedError\n```\n\nThis serves as the definition of what\
    \ the plug-in looks like. To create a plug-in that satisfies my expectations,\
    \ I just need to create a class that inherits from my base class.\n\n```python\n\
    class PastaModule(UltimateKitchenAssistantModule):\n    def __init__(self):\n\
    \        self.ingredients = [\"Linguine\",\n                           # ... snip\
    \ ...\n                           \"Spaghetti\" ]\n\n    def get_recipes(self)\
    \ -> list[Recipe]:\n        # ... snip returning all possible recipes ...\n\n\
    \    def prepare_dish(self, inventory: dict[Ingredient, Amount],\n           \
    \          recipe: Recipe) -> Dish:\n        # interact with Ultimate Kitchen\
    \ Assistant to make recipe\n        # ... snip ...\n```\n\nOnce you have created\
    \ the plug-in, you need to register it with stevedore. stevedore matches plug-ins\
    \ to a *namespace*, or an identifier that groups plug-ins together. It does so\
    \ by using Python's *entry points*, which allow Python to discover components\
    \ at runtime.³\n\nYou register plug-ins with the help of setuptools and setup.py.\
    \ Many Python packages use setup.py to define packaging rules, one of which being\
    \ entry points. In the setup.py for ultimate_kitchen_assistant, I would register\
    \ my plug-in as follows:\n\n```python\nfrom setuptools import setup\n\nsetup(\n\
    \    name='ultimate_kitchen_assistant',\n    version='1.0',\n    #.... snip ....\n\
    \n    entry_points={\n        'ultimate_kitchen_assistant.recipe_maker': [\n \
    \           'pasta_maker = ultimate_kitchen_assistant.pasta_maker:PastaModule',\n\
    \            'tex_mex = ultimate_kitchen_assistant.tex_mex:TexMexModule'\n   \
    \     ],\n    },\n)\n```\n\n> If you are having trouble linking your plug-ins,\
    \ check out the entry-point-inspector package for debugging help.\n\nI am binding\
    \ my PastaMaker class (in the ultimate_kitchen_assistant.pasta_maker package)\
    \ to a plug-in with the namespace ultimate_kitchen_assistant.recipe_maker. I've\
    \ created another hypothetical plug-in called TexMexModule, as well.\n\nOnce the\
    \ plug-ins are registered as entry points, you can use stevedore to load them\
    \ dynamically at runtime. For instance, if I wanted to collect all recipes from\
    \ all plug-ins, I could write the following:\n\n³ Entry points can be complex\
    \ in how they interact with Python packaging, but that's beyond the scope of this\
    \ book. You can learn more at https://oreil.ly/bMyjS.\n\n```python\nimport itertools\n\
    from stevedore import extension\nfrom ultimate_kitchen_assisstant import Recipe\n\
    \ndef get_all_recipes() -> list[Recipe]:\n    mgr = extension.ExtensionManager(\n\
    \        namespace='ultimate_kitchen_assistant.recipe_maker',\n        invoke_on_load=True,\n\
    \    )\n\n    def get_recipes(extension):\n        return extension.obj.get_recipes()\n\
    \n    return list(itertools.chain(mgr.map(get_recipes)))\n```\n\nI use stevedore.extension.ExtensionManager\
    \ to find and load all plug-ins in the namespace ultimate_kitchen_assistant.recipe_maker.\
    \ I can then map (or apply) a function to every plug-in that gets found to get\
    \ their recipes. Lastly, I use itertools to chain them all together. It doesn't\
    \ matter how many plug-ins I have set up; I can load them all with this code.\n\
    \nLet's say a user wants to make something from the pasta maker, such as \"Pasta\
    \ with Sausage.\" All the calling code needs to do is ask for a plug-in named\
    \ pasta_maker. I can load the specific plug-in with a stevedore.driver.DriverManager.\n\
    \n```python\nfrom stevedore import driver\n\ndef make_dish(recipe: Recipe, module_name:\
    \ str) -> Dish:\n    mgr = driver.DriverManager(\n        namespace='ultimate_kitchen_assistant.recipe_maker',\n\
    \        name=module_name,\n        invoke_on_load=True,\n    )\n\n    return\
    \ mgr.driver.prepare_dish(get_inventory(), recipe)\n```\n\n> **Discussion Topic**\n\
    >\n> What parts of your system could use a plug-in architecture? How would this\
    \ benefit your codebase?\n\nstevedore provides a great way to decouple code; separating\
    \ the code into plug-ins keeps it flexible and extensible. Remember, the goal\
    \ of extensible programs is to limit the number of modifications needed in the\
    \ core system. Developers can create plug-ins in isolation, test them, and integrate\
    \ them into your core seamlessly."
  mdcn: "假设终极厨房助手有编号的储物箱来存放食材。德州-墨西哥风味模块需要知道常用德州-墨西哥风味食材存放在哪些储物箱中，这样才能利用终极厨房助手进行实际的备料和烹饪。\n\
    \n```python\n@dataclass\nclass TexMexIngredients:\n    corn_tortilla_bin: int\n\
    \    flour_tortilla_bin: int\n    salsa_bin: int\n    ground_beef_bin: int\n \
    \   # ... 省略 ...\n    shredded_cheese_bin: int\n\ndef prepare_tex_mex_dish(tex_mex_recipe_maker:\
    \ Callable[TexMexIngredients]):\n    tex_mex_ingredients = get_available_ingredients(\"\
    Tex-Mex\")\n    dish = tex_mex_recipe_maker(tex_mex_ingredients)\n    serve(dish)\n\
    ```\n\n函数 `prepare_tex_mex_dish` 收集食材，然后委托给实际的 `tex_mex_recipe_maker` 来创建要上菜的菜肴。`tex_mex_recipe_maker`\
    \ 就是策略。它与模板方法模式非常相似，但通常你只是传递单个函数，而不是一组函数。\n\n未来的开发者只需编写一个函数，根据给定的食材进行实际准备。他们可以这样写：\n\
    \n```python\nimport tex_mex_module as tmm\n\ndef make_soft_taco(ingredients: TexMexIngredients)\
    \ -> tmm.Dish:\n    tortilla = tmm.get_ingredient_from_bin(ingredients.flour_tortilla_bin)\n\
    \    beef = tmm.get_ingredient_from_bin(ingredients.ground_beef_bin)\n    dish\
    \ = tmm.get_plate()\n    dish.lay_on_dish(tortilla)\n    tmm.season(beef, tmm.CHILE_POWDER_BLEND)\n\
    \    # ... 省略 ...\n\nprepare_tex_mex_dish(make_soft_taco)\n```\n\n如果他们决定在未来某个时候支持不同的菜肴，只需编写一个新的函数：\n\
    \n```python\ndef make_chimichanga(ingredients: TexMexIngredients):\n    # ...\
    \ 省略 ...\n```\n\n开发者可以随时按照自己的意愿定义函数。就像模板方法模式一样，他们可以以最小的影响将新功能插入到原始代码中。\n\n与模板方法一样，我展示的实现与《设计模式》一书中最初描述的略有不同。原始实现涉及包装单个方法的类和子类。在\
    \ Python 中，直接传递单个函数要容易得多。\n\n## 插件架构\n\n策略模式和模板方法模式非常适合插入小的功能片段：这里一个类，那里一个函数。然而，同样的模式也适用于你的架构。能够注入类、模块或子系统同样重要。一个名为\
    \ stevedore 的 Python 库是管理插件的极其有用的工具。\n\n插件是一段可以在运行时动态加载的代码。代码可以扫描已安装的插件，选择一个合适的插件，并将职责委托给该插件。这是可扩展性的另一个例子；开发者可以专注于特定的插件，而无需接触核心代码库。\n\
    \n除了可扩展性之外，插件架构还有许多好处：\n\n- 你可以独立于核心部署插件，从而为推出更新提供更细粒度的控制。\n- 第三方可以编写插件，而无需修改你的代码库。\n\
    - 插件可以独立于核心代码库进行开发，从而减少创建紧耦合代码的机会。\n\n为了演示插件的工作原理，假设我想为终极厨房助手支持一个生态系统，用户可以单独购买和安装模块（例如上一节中的德州-墨西哥风味模块），与主厨房助手分开。每个模块提供一组食谱、特殊设备和食材存储，供终极厨房助手使用。真正的好处是每个模块都可以独立于终极厨房助手核心进行开发；每个模块都是一个插件。\n\
    \n设计插件时要做的第一件事是确定核心与各个插件之间的契约。问问自己核心平台提供什么服务，以及你期望插件提供什么。在终极厨房助手的案例中，图 19-3 展示了我将在以下示例中使用的契约。\n\
    \n图 19-3. 核心与插件之间的契约\n\n我想把这个契约写成代码，这样我对插件的期望就毫无歧义了：\n\n```python\nfrom abc import\
    \ abstractmethod\nfrom typing import runtime_checkable, Protocol\n\nfrom ultimate_kitchen_assistant\
    \ import Amount, Dish, Ingredient, Recipe\n\n@runtime_checkable\nclass UltimateKitchenAssistantModule(Protocol):\n\
    \    ingredients: list[Ingredient]\n\n    @abstractmethod\n    def get_recipes()\
    \ -> list[Recipe]:\n        raise NotImplementedError\n\n    @abstractmethod\n\
    \    def prepare_dish(inventory: dict[Ingredient, Amount],\n                 \
    \   recipe: Recipe) -> Dish:\n        raise NotImplementedError\n```\n\n这定义了插件的外观。要创建一个满足我期望的插件，我只需要创建一个继承自我的基类的类。\n\
    \n```python\nclass PastaModule(UltimateKitchenAssistantModule):\n    def __init__(self):\n\
    \        self.ingredients = [\"Linguine\",\n                           # ... 省略\
    \ ...\n                           \"Spaghetti\" ]\n\n    def get_recipes(self)\
    \ -> list[Recipe]:\n        # ... 省略，返回所有可能的食谱 ...\n\n    def prepare_dish(self,\
    \ inventory: dict[Ingredient, Amount],\n                     recipe: Recipe) ->\
    \ Dish:\n        # 与终极厨房助手交互以制作食谱\n        # ... 省略 ...\n```\n\n一旦你创建了插件，就需要在\
    \ stevedore 中注册它。stevedore 将插件匹配到一个*命名空间*，或一个将插件分组在一起的标识符。它通过使用 Python 的*入口点*来实现这一点，这允许\
    \ Python 在运行时发现组件。³\n\n你可以在 setuptools 和 setup.py 的帮助下注册插件。许多 Python 包使用 setup.py\
    \ 来定义打包规则，其中之一就是入口点。在 ultimate_kitchen_assistant 的 setup.py 中，我会这样注册我的插件：\n\n\
    ```python\nfrom setuptools import setup\n\nsetup(\n    name='ultimate_kitchen_assistant',\n\
    \    version='1.0',\n    #.... 省略 ....\n\n    entry_points={\n        'ultimate_kitchen_assistant.recipe_maker':\
    \ [\n            'pasta_maker = ultimate_kitchen_assistant.pasta_maker:PastaModule',\n\
    \            'tex_mex = ultimate_kitchen_assistant.tex_mex:TexMexModule'\n   \
    \     ],\n    },\n)\n```\n\n> 如果你在链接插件时遇到问题，可以查看 entry-point-inspector 包以获取调试帮助。\n\
    \n我将我的 PastaMaker 类（在 ultimate_kitchen_assistant.pasta_maker 包中）绑定到一个命名空间为 ultimate_kitchen_assistant.recipe_maker\
    \ 的插件。我还创建了另一个假设的插件 TexMexModule。\n\n一旦插件注册为入口点，你就可以使用 stevedore 在运行时动态加载它们。例如，如果我想从所有插件中收集所有食谱，我可以编写以下代码：\n\
    \n³ 入口点在与 Python 打包交互时可能很复杂，但这超出了本书的范围。你可以在 https://oreil.ly/bMyjS 了解更多。\n\n```python\n\
    import itertools\nfrom stevedore import extension\nfrom ultimate_kitchen_assisstant\
    \ import Recipe\n\ndef get_all_recipes() -> list[Recipe]:\n    mgr = extension.ExtensionManager(\n\
    \        namespace='ultimate_kitchen_assistant.recipe_maker',\n        invoke_on_load=True,\n\
    \    )\n\n    def get_recipes(extension):\n        return extension.obj.get_recipes()\n\
    \n    return list(itertools.chain(mgr.map(get_recipes)))\n```\n\n我使用 stevedore.extension.ExtensionManager\
    \ 来查找和加载命名空间 ultimate_kitchen_assistant.recipe_maker 中的所有插件。然后，我可以对找到的每个插件映射（或应用）一个函数来获取它们的食谱。最后，我使用\
    \ itertools 将它们全部链接在一起。无论我设置了有多少插件，我都可以用这段代码加载它们。\n\n假设用户想从意面制作器中制作一些东西，比如“香肠意面”。所有调用代码需要做的就是请求一个名为\
    \ pasta_maker 的插件。我可以使用 stevedore.driver.DriverManager 加载特定的插件。\n\n```python\n\
    from stevedore import driver\n\ndef make_dish(recipe: Recipe, module_name: str)\
    \ -> Dish:\n    mgr = driver.DriverManager(\n        namespace='ultimate_kitchen_assistant.recipe_maker',\n\
    \        name=module_name,\n        invoke_on_load=True,\n    )\n\n    return\
    \ mgr.driver.prepare_dish(get_inventory(), recipe)\n```\n\n> **讨论主题**\n>\n> 你系统的哪些部分可以使用插件架构？这将如何使你的代码库受益？\n\
    \nstevedore 提供了一种解耦代码的好方法；将代码分离成插件可以保持其灵活性和可扩展性。请记住，可扩展程序的目标是限制核心系统所需的修改数量。开发者可以独立创建插件，测试它们，并将它们无缝集成到你的核心中。"
