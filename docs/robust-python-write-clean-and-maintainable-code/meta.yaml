- md: "These hex strings display the contents of the memory containing a Python object.\
    \ You’ll find pointers to the next and previous object in a linked list (for garbage\
    \ collection purposes), a reference count, a type, and the actual data itself.\
    \ You can see the bytes at the end of each returned value to see the number or\
    \ string (look for the bytes 0x544150 or 0x504154). The important part of this\
    \ is that there is a type encoded into that memory. When Python looks at a variable,\
    \ it knows exactly what type everything is at runtime (just as when you use the\
    \ type() function.)\n\nIt’s easy to think that this is the only reason for types—the\
    \ computer needs to know how to interpret various blobs of memory. It is important\
    \ to be aware of how Python uses types, as it has some implications for writing\
    \ robust code, but even more important is the second representation: semantic\
    \ representation.\n\n## Semantic Representation\n\nWhile the first definition\
    \ of types is great for lower-level programming, it’s the second definition that\
    \ applies to every developer. Types, in addition to having a mechanical representation,\
    \ also manifest a semantic representation. A semantic representation is a communication\
    \ tool; the types you choose communicate information across time and space to\
    \ a future developer.\n\nTypes tell a user what behaviors they can expect when\
    \ interacting with that entity. In this context, “behaviors” are the operations\
    \ that you associate with that type (plus any preconditions or postconditions).\
    \ They are the boundaries, constraints, and freedoms that a user interacts with\
    \ whenever they use that type. Types used correctly have low barriers to understanding;\
    \ they become natural to use. Conversely, types used poorly are a hindrance.\n\
    \nConsider the lowly `int`. Take a minute to think about what behaviors an integer\
    \ has in Python. Here’s a quick (noncomprehensive) list I came up with:\n\n- Constructible\
    \ from integers, floats, or strings\n- Mathematical operations such as addition,\
    \ subtraction, division, multiplication, exponentiation, and negation\n- Relational\
    \ comparison such as <, >, ==, and !=\n- Bitwise operations (manipulating individual\
    \ bits of a number) such as &, |, ^, ~, and shifting\n- Convertible to a string\
    \ using `str` or `repr` functions\n- Able to be rounded through `ceil`, `floor`,\
    \ and `round` methods (even though they return the integer itself, these are supported\
    \ methods)\n\nAn `int` has many behaviors. You can view the full list if you type\
    \ `help(int)` into your interactive Python console.\n\nNow consider a datetime:\n\
    \n```python\n>>> import datetime\n>>> datetime.datetime.now()\ndatetime.datetime(2020,\
    \ 9, 8, 22, 19, 28, 838667)\n```\n\nA datetime is not that different from an int.\
    \ Typically, it's represented as a number of seconds or milliseconds from some\
    \ epoch of time (such as January 1, 1970). But think about the behaviors a datetime\
    \ has (I've italicized the differences in behavior from an integer):\n\n- Constructible\
    \ from a string, or a set of integers representing day/month/year/etc.\n- Mathematical\
    \ operations such as addition and subtraction of time deltas\n- Relational comparison\n\
    - No bitwise operations available\n- Convertible to a string using str or repr\
    \ functions\n- Is not able to be rounded through ceil, floor, or round methods\n\
    \nA datetime supports addition and subtraction, but not of other datetimes. We\
    \ only add time deltas (such as adding a day or subtracting a year). Multiplying\
    \ and dividing really don't make sense for a datetime. Similarly, rounding dates\
    \ is not a supported operation in the standard library. However, datetimes do\
    \ offer comparison and string formatting operations with similar semantics to\
    \ an integer. So even though datetime is at heart an integer, it contains a constrained\
    \ subset of operations.\n\n> Semantics refers to the meaning of an operation.\
    \ While str(int) and str(datetime.datetime.now()) will return differently formatted\
    \ strings, the meaning is the same: I am creating a string from a value.\n\nDatetimes\
    \ also support their own behaviors, to further distinguish them from integers.\
    \ These include:\n\n- Changing values based on time zones\n- Being able to control\
    \ the format of strings\n- Finding what weekday it is\n\nAgain, if you'd like\
    \ a full list of behaviors, type `import datetime; help(datetime.datetime)` into\
    \ your REPL.\n\nA datetime is more specific than an int. It conveys a more specific\
    \ use case than just a plain old number. When you choose to use a more specific\
    \ type, you are telling future contributors that there are operations that are\
    \ possible and constraints to be aware of that aren't present in the less specific\
    \ type.\n\nLet's dive into how this ties into robust code. Say you inherit a codebase\
    \ that handles the opening and closing of a completely automated kitchen. You\
    \ need to add in functionality to be able to change closing time (say, for extending\
    \ a kitchen's hours on holidays).\n\n```python\ndef close_kitchen_if_past_cutoff_time(point_in_time):\n\
    \    if point_in_time >= closing_time():\n        close_kitchen()\n        log_time_closed(point_in_time)\n\
    ```\n\nYou know you need to be operating on `point_in_time`, but how do you get\
    \ started? What type are you even dealing with? Is it a `str`, `int`, `datetime`,\
    \ or some custom class? What operations are you allowed to perform on `point_in_time`?\
    \ You didn't write this code, and you have no history with it. The same problems\
    \ exist if you want to call the code as well. You have no idea what is legal to\
    \ pass into this function.\n\nIf you make an incorrect assumption one way or the\
    \ other, and that code makes it to production, you will have made the code less\
    \ robust. Maybe that code doesn't lie on a codepath that is executed often. Maybe\
    \ some other bug is hiding this code from being run. Maybe there aren't a whole\
    \ lot of tests around this piece of code, and it becomes a runtime error later\
    \ on. No matter what, there is a bug lurking in the code, and you've decreased\
    \ maintainability.\n\nResponsible developers do their best not to have bugs hit\
    \ production. They will search for tests, documentation (with a grain of salt,\
    \ of course—documentation can go out of date quickly), or calling code. They will\
    \ look at `closing_time()` and `log_time_closed()` to see what types they expect\
    \ or provide, and plan accordingly. This is a correct path in this case, but I\
    \ still consider it a suboptimal path. While an error won't reach production,\
    \ they are still expending time in looking through the code, which prevents value\
    \ from being delivered as quickly. With such a small example, you would be forgiven\
    \ for thinking that this isn't that big a problem if it happens once. But beware\
    \ of death by a thousand cuts: any one slice isn't too detrimental on its own,\
    \ but thousands piled up and strewn across a codebase will leave you limping along,\
    \ trying to deliver code.\n\nThe root cause is that the semantic representation\
    \ was not clear for the parameter. As you write code, do what you can to express\
    \ your intent through types. You can do it as a comment where needed, but I recommend\
    \ using type annotations (supported in Python 3.5+) to explain parts of your code.\n\
    \n```python\ndef close_kitchen_if_past_cutoff_time(point_in_time: datetime.datetime):\n\
    \    if point_in_time >= closing_time():\n        close_kitchen()\n        log_time_closed(point_in_time)\n\
    ```\n\nAll I need to do is put in a `: <type>` after my parameters. Most code\
    \ examples in this book will utilize type annotations to make it clear what type\
    \ the code expects.\n\nNow, as developers come across this code, they will know\
    \ what's expected of `point_in_time`. They don't have to look through other methods,\
    \ tests, or documentation to know how to manipulate the variable. They have a\
    \ crystal clear clue on what to do, and they can get right to work performing\
