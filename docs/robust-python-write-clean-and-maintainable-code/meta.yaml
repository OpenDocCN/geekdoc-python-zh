- md: '## Visualizing Function Calls


    If you want even *more* information than an import graph, you can see which functions
    call each other. This is known as a *call graph*. First, I''ll look at a *static*
    call graph generator. These generators look at your source code and see which
    functions call which; no code is executed. For this example, I''ll use the library
    `pyan3`, which can be installed with:


    ```

    pip install pyan3

    ```


    To run `pyan3`, you execute the following on the command line:


    ```

    pyan3 <Python files> --grouped --annotated --html > deps.html

    ```


    When I run this on the `dmypy` folder inside of `mypy` (I picked a subfolder to
    limit the amount of information drawn), I receive an interactive HTML page that
    lets me explore the dependencies. Figure 16-7 shows a snippet from the tool.


    ![Figure 16-7. Visualizing function calls statically](img/d64d2be45ca85b398807d181202e7046_258_0.png)


    Note that this only tracks physical dependencies, as logical dependencies aren''t
    known until runtime. If you''d like to see a call graph at runtime, you will need
    to execute your code in concert with a *dynamic* call graph generator. For this
    purpose, I like using the built-in Python profiler. A *profiler* audits all function
    calls you are making during the execution of a program and records performance
    data. As a side benefit, the entire function call history is preserved in the
    profile. Let''s try this out.


    I''ll first build the profile (I''m profiling a test file in mypy for size reasons):


    ```

    python -m cProfile -o deps.profile mypy/test/testutil.py

    ```


    Then I''ll convert the profile into a file that GraphViz can understand: a dot
    file.


    ```

    pip install gprof2dot

    gprof2dot --format=pstats deps.profile -o deps.dot

    ```


    Finally, I''ll use GraphViz to convert the *.dot* file to a *.png*.


    ```

    dot deps.dot -Tpng > deps.png

    ```


    Again, this produces oodles of boxes and arrows, so Figure 16-8 is just a small
    screenshot illustrating part of the call graph.


    ![Figure 16-8. Visualizing function calls dynamically](img/d64d2be45ca85b398807d181202e7046_259_0.png)


    You can find out how many times the function gets called, as well as how much
    of the execution time was spent in the function. This can be a great way to find
    performance bottlenecks in addition to understanding your call graph.


    ## Interpreting Your Dependency Graph


    Alright, you''ve drawn all these pretty graphs; what can you do with them? When
    you see your dependencies graphed out in this fashion, you get a pretty good idea
    where your maintainability hotspots are. Remember, every dependency is a reason
    for code to change. Whenever anything changes in your codebase, it can ripple
    up through physical and logical dependencies, potentially impacting large swaths
    of code.


    With this in mind, you need to think about the relationships between what you''re
    changing and the things that depend upon them. Consider the amount of code depending
    on you, as well as the code that you yourself depend upon. If you have a lot of
    dependencies coming in, but not going out, you have what''s known as high *fan-in*.
    Conversely, if you don''t have a lot of dependencies coming in, but you depend
    on a large number of other entities, this is known as high *fan-out*. Figure 16-9
    illustrates the difference between fan-in and fan-out.


    ![Figure 16-9. The difference between fan-in and fan-out](img/d64d2be45ca85b398807d181202e7046_260_0.png)


    You want the entities in your system that have a high amount of fan-in to be leaves
    of your dependency graph, or at the bottom. Large parts of your codebase depend
    on these entities; every dependency you have is a dependency the rest of your
    codebase will have as well. You also want these entities to be stable, which means
    that they should be changing infrequently. Every time you introduce change, you
    potentially impact most of your codebase due to the large fan-in.


    On the other hand, fan-out entities should be toward the top of your dependency
    graph. This is where most of your business logic will likely live; it will change
    as the business evolves. These parts of your codebase can withstand a much higher
    rate of change; due to their relatively few upstream dependencies, their code
    won''t break as often when behaviors change.


    > Changing fan-out entities won''t impact as much of your codebase''s assumptions,
    but I can''t say whether or not it will break customer''s assumptions. How much
    you want external behavior to remain backward compatible is a UX concern and outside
    the scope of this book.


    ## Closing Thoughts


    The presence of dependencies does not dictate how robust your code is. It''s about
    how you utilize and manage those dependencies. Dependencies are absolutely crucial
    to sane reuse in your system. You can break code into smaller chunks and reorganize
    your codebase appropriately. By giving your dependencies the right directionality,
    you can actually increase the robustness of your code. You can make your code
    more maintainable by increasing substitutability and extensibility.


    But, as with anything in engineering, there is always a cost. Dependencies are
    a coupling; linking different parts of your codebase together and making changes
    can have a wider impact than you might be looking for. There are different types
    of dependencies that must be handled in different ways. Physical dependencies
    are easy to visualize through tooling, but are also rigid in the structure they
    impose. Logical dependencies provide an extensibility to your codebase, but their
    nature is hidden until runtime. Temporal dependencies are a necessary part of
    executing Python in a linear fashion, but when those dependencies become unintuitive,
    they incur a ton of future pain.


    All of these lessons assume that you have pieces of code that you can depend upon.
    In the next chapter, you’ll explore *composable code*, or breaking code into smaller
    pieces for reuse. You’ll learn how to compose objects, looping patterns, and functions
    to reorganize your code into new use cases. When you think in terms of composable
    code, you’ll start building in new functionality with ease. Your future maintainers
    will thank you.


    # CHAPTER 17


    ## Composability


    One of the biggest challenges you face as a developer is predicting how future
    developers will change your system. Businesses evolve, and the assertions of today
    become the legacy systems of the future. How would you support such a system?
    How do you reduce the friction that future developers will face when adapting
    your system? You will need to develop your code so that it can perform in all
    sorts of circumstances.


    In this chapter, you are going to learn how to develop that code by thinking in
    terms of composability. When you write with composability in mind, you create
    your code to be small, discrete, and reusable. I’ll show you an architecture that
    is not composable and how that can hinder development. You’ll then learn how to
    fix it with composability in mind. You’ll learn how to compose objects, functions,
    and algorithms to make your codebase more extensible. But first, let’s examine
    how composability increases maintainability.


    ## Composability


    *Composability* focuses on building small components with minimal interdependencies
    and little business logic embedded inside. The goal is that future developers
    can use any one of these components to build their own solutions. By making them
    small, you make them easier to read and understand. By reducing dependencies,
    you save future developers from worrying about all the costs involved in pulling
    new code (such as the costs you learned about in Chapter 16). By keeping the components
    mostly free of business logic, you allow your code to solve new problems, even
    if those new problems look nothing like the problems you encounter today. As the
    number of composable components increases, developers can mix’n’match your code
    to create brand-new applications with the utmost ease. By focusing on composability,
    you make it easier to reuse and extend your code.'
  mdcn: '## 可视化函数调用


    如果你想获得比导入图*更多*的信息，可以查看哪些函数相互调用。这被称为*调用图*。首先，我将介绍一种*静态*调用图生成器。这类生成器会分析你的源代码，查看哪些函数调用了哪些函数；不会执行任何代码。在本例中，我将使用`pyan3`库，可通过以下命令安装：


    ```

    pip install pyan3

    ```


    要运行`pyan3`，你需要在命令行执行以下命令：


    ```

    pyan3 <Python files> --grouped --annotated --html > deps.html

    ```


    当我在`mypy`中的`dmypy`文件夹（我选择了一个子文件夹以限制绘制的信息量）上运行此命令时，会得到一个交互式HTML页面，让我可以探索依赖关系。图16-7展示了该工具的一个片段。


    ![图16-7. 静态可视化函数调用](img/d64d2be45ca85b398807d181202e7046_258_0.png)


    请注意，这仅跟踪物理依赖，因为逻辑依赖在运行时才会被知晓。如果你想查看运行时的调用图，需要将代码与*动态*调用图生成器一起执行。为此，我喜欢使用内置的Python分析器。*分析器*会审计程序执行期间进行的所有函数调用，并记录性能数据。作为附带好处，整个函数调用历史都会保存在分析文件中。让我们来试试。


    我将首先构建分析文件（出于大小考虑，我分析的是mypy中的一个测试文件）：


    ```

    python -m cProfile -o deps.profile mypy/test/testutil.py

    ```


    然后，我将分析文件转换为GraphViz可以理解的文件：一个dot文件。


    ```

    pip install gprof2dot

    gprof2dot --format=pstats deps.profile -o deps.dot

    ```


    最后，我将使用GraphViz将*.dot*文件转换为*.png*。


    ```

    dot deps.dot -Tpng > deps.png

    ```


    同样，这会产生大量的方框和箭头，因此图16-8只是一个小截图，展示了调用图的一部分。


    ![图16-8. 动态可视化函数调用](img/d64d2be45ca85b398807d181202e7046_259_0.png)


    你可以找出函数被调用的次数，以及执行时间在该函数中花费了多少。除了理解调用图之外，这还是发现性能瓶颈的好方法。


    ## 解读你的依赖图


    好了，你已经绘制了所有这些漂亮的图表；你能用它们做什么呢？当你以这种方式看到依赖关系图时，就能很好地了解可维护性的热点在哪里。记住，每个依赖都是代码需要变更的原因。每当代码库中的任何内容发生变化时，它都可能通过物理和逻辑依赖产生连锁反应，潜在地影响大范围的代码。


    考虑到这一点，你需要思考你正在更改的内容与依赖于它们的内容之间的关系。考虑依赖于你的代码量，以及你自己依赖的代码量。如果你有很多依赖流入，但流出很少，你就拥有了所谓的高*扇入*。相反，如果你没有很多依赖流入，但你依赖大量其他实体，这就被称为高*扇出*。图16-9说明了扇入和扇出之间的区别。


    ![图16-9. 扇入与扇出的区别](img/d64d2be45ca85b398807d181202e7046_260_0.png)


    你希望系统中具有高扇入的实体成为依赖图的叶子节点，或者位于底部。代码库的大部分都依赖于这些实体；你拥有的每个依赖，代码库的其余部分也会拥有。你还希望这些实体是稳定的，这意味着它们应该很少变更。每次引入变更时，由于高扇入，你都可能影响代码库的大部分。


    另一方面，扇出实体应该位于依赖图的顶部。这可能是大部分业务逻辑所在的地方；它会随着业务的发展而变化。代码库的这些部分可以承受更高的变更率；由于它们的上游依赖相对较少，当行为发生变化时，它们的代码不会经常中断。


    > 更改扇出实体不会影响代码库的太多假设，但我不能说它是否会破坏客户的假设。你希望外部行为在多大程度上保持向后兼容性，这是一个用户体验问题，超出了本书的范围。


    ## 结语


    依赖的存在并不决定你的代码有多健壮。关键在于你如何利用和管理这些依赖。依赖对于系统中合理的复用绝对至关重要。你可以将代码分解成更小的块，并相应地重组代码库。通过赋予依赖正确的方向性，你实际上可以增强代码的健壮性。你可以通过提高可替代性和可扩展性，使代码更易于维护。


    但是，与工程中的任何事情一样，总是有成本的。依赖是一种耦合；将代码库的不同部分链接在一起并进行更改，可能会产生比你预期更广泛的影响。不同类型的依赖必须以不同的方式处理。物理依赖很容易通过工具可视化，但它们强加的结构也很僵化。逻辑依赖为代码库提供了可扩展性，但其本质在运行时之前是隐藏的。时间依赖是线性执行Python的必要部分，但当这些依赖变得不直观时，它们会带来大量的未来痛苦。


    所有这些经验教训都假设你拥有可以依赖的代码片段。在下一章中，你将探索*可组合代码*，或将代码分解成更小的片段以供复用。你将学习如何组合对象、循环模式和函数，将代码重组为新的用例。当你以可组合代码的思维来思考时，你将能够轻松地构建新功能。你未来的维护者会感谢你。


    # 第17章


    ## 可组合性


    作为开发者，你面临的最大挑战之一是预测未来的开发者将如何改变你的系统。业务在发展，今天的断言将成为未来的遗留系统。你将如何支持这样的系统？你如何减少未来开发者在适配你的系统时面临的阻力？你需要开发你的代码，使其能够在各种情况下运行。


    在本章中，你将学习如何通过可组合性的思维来开发代码。当你以可组合性为出发点编写代码时，你会将代码创建得小巧、离散且可复用。我将展示一个不可组合的架构，以及它如何阻碍开发。然后，你将学习如何以可组合性的思维来修复它。你将学习如何组合对象、函数和算法，使你的代码库更具可扩展性。但首先，让我们探讨一下可组合性如何提高可维护性。


    ## 可组合性


    *可组合性*专注于构建具有最小相互依赖且内部嵌入很少业务逻辑的小型组件。目标是未来的开发者可以使用这些组件中的任何一个来构建他们自己的解决方案。通过使它们小巧，你使它们更易于阅读和理解。通过减少依赖，你让未来的开发者不必担心引入新代码所涉及的所有成本（例如你在第16章学到的成本）。通过让组件基本不包含业务逻辑，你允许你的代码解决新问题，即使这些新问题与你今天遇到的问题完全不同。随着可组合组件数量的增加，开发者可以轻松地混合搭配你的代码，以极其简单的方式创建全新的应用程序。通过专注于可组合性，你使代码更易于复用和扩展。'
