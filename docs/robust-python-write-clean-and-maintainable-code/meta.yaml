    more impactful.


    # The testing pyramid


    In just about any testing book, you are bound to come across a figure similar
    to Figure 21-1: a “testing pyramid.”³


    ![](img/d64d2be45ca85b398807d181202e7046_320_0.png)


    Figure 21-1. The testing pyramid


    The idea is that you want to write a lot of small, isolated unit tests. These
    are theoretically cheaper and should make up the bulk of your testing, hence they’re
    at the bottom. You have fewer integration tests, which are costly, and even fewer
    UI tests, which are very costly. Now, ever since its inception, developers have
    argued about the testing pyramid in a multitude of ways, including where the lines
    get drawn, the usefulness of unit tests, and even the shape of the triangle (I’ve
    even seen the triangle inverted).


    The truth is, it doesn’t matter what the labels are or how you separate your tests.
    What you want is your triangle to look like Figure 21-2, which focuses on the
    ratio of value to cost.


    > ³ This is known as the testing pyramid, introduced in *Succeeding with Agile*
    by Mike Cohn (Addison-Wesley Professional). Cohn originally has “Service” level
    tests in place of integration tests, but I’ve seen more iterations with “integration”
    tests as the middle layer.'
