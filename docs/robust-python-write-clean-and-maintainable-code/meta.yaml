  md: '# CHAPTER 18

    Event-Driven Architecture


    Extensibility is important at every level of your codebase. At the code level,
    you employ extensibility to make your functions and classes flexible. At the abstract
    level, you utilize the same principles in your codebase’s architecture. *Architecture*
    is the set of high-level guidelines and constraints that shape how you design
    software. It is the vision that influences all developers, past, present, and
    future. This chapter, as well as the next one, are going to show two examples
    of how architectural examples improve maintainability. Everything you’ve learned
    so far in this part of the book applies: good architecture promotes extensibility,
    manages dependencies well, and fosters composability.


    In this chapter, you will learn about event-driven architecture. *Event-driven
    architecture* revolves around events, or notifications in your system. It is a
    fantastic way to decouple different parts of your codebase, as well as extend
    your system for new functionality or performance. Event-driven architectures allow
    you to introduce new changes easily with minimal impact. First, I want to talk
    about the flexibility that event-driven architectures provide. Then, I’ll cover
    two separate variations of event-driven architectures: simple events and streaming
    events. While they are similar, you will use them in slightly different scenarios.


    # How It Works


    When you focus on event-driven architectures, you are revolving around reactions
    to stimuli. You deal with reactions to stimuli all the time, whether it’s pulling
    a casserole out of the oven or picking up a delivery from your front door after
    a phone notification. In an event-driven architecture, you architect your code
    to represent this model. Your stimulus is some *producer* of events. A *consumer*
    of these events is the reaction to that stimulus. An event is just a transmission
    of information from a producer to a consumer. Table 18-1 shows some common producer–consumer
    pairs.'
  merge: -1
  pgno: 278
- img_proc: true
  md: "Table 18-1. Everyday events and their consumers\n\n| Producer | Consumer |\n\
    | :--- | :--- |\n| Kitchen timer going off | Chef retrieves a casserole from the\
    \ oven |\n| Cook ringing a bell when a dish is done | Server picks it up and serves\
    \ it |\n| Alarm clock going off | Late sleeper wakes up |\n| A last call for boarding\
    \ at an airport | Rushing family rushes, trying to make their connection |\n\n\
    You actually deal with producers and consumers every time you program. Any function\
    \ that returns a value is a producer, and any piece of code that uses that returned\
    \ value is a consumer. Observe:\n\n```\ndef complete_order(order: Order):\n  \
    \  package_order(order)\n    notify_customer_that_order_is_done(order)\n    notify_restaurant_that_order_is_done(order)\n\
    ```\n\nIn this case, `complete_order` is *producing* information in the form of\
    \ a completed order. Based on the function names, the customer and the restaurant\
    \ are *consuming* the fact that an order is done. There is a direct linkage where\
    \ the producer notifies the consumer. Event-driven architectures aim to sever\
    \ this physical dependency. The goal is to decouple producers and consumers. Producers\
    \ do not know about the consumers, and consumers do not know about the producers.\
    \ This is what drives the flexibility of an event-driven architecture.\n\nWith\
    \ this decoupling, it becomes incredibly easy to add onto your system. If you\
    \ need new consumers, you can add them without ever touching the producer. If\
    \ you need different producers, you can add them without ever touching the consumers.\
    \ This bidirectional extensibility allows you to substantially change multiple\
    \ parts of your codebase in isolation.\n\nWhat's happening behind the scenes is\
    \ quite ingenious. Instead of any dependencies between producer and consumer,\
    \ they both depend on a transport mechanism, as shown in Figure 18-1. A *transport\
    \ mechanism* is simply the way that two pieces of code pass data back and forth.\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_279_0.png)"
