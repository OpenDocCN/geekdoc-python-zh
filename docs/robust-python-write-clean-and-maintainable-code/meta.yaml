    \ a Union (and some type aliases to make the code more readable):\n\n```\nIngredient\
    \ = tuple[str, int, str] # (name, quantity, units)\nRecipe = list[Union[int, Ingredient]]\
    \ # the list can be servings or ingredients\ndef adjust_recipe(recipe: Recipe,\
    \ servings):\n    # ...\n```\n\nThis takes a heterogeneous collection (items could\
    \ be an integer or an ingredient) and allows developers to reason about the collection\
    \ as if it were homogeneous. The developer needs to treat every single value as\
    \ the same—it is either an integer or an Ingredient—before operating on it. While\
    \ more code is needed to handle the type-checks, you can rest easier knowing that\
    \ your typechecker will catch users not checking for special cases. Bear in mind,\
    \ this is not perfect by any means; it'd be better if there was no special case\
    \ in the first place and servings was passed to the function another way. But\
    \ for the cases where you absolutely must handle special cases, represent them\
    \ as a type so that the typechecker benefits you.\n\n> When heterogeneous collections\
    \ are complex enough that they involve lots of validation logic strewn about your\
    \ codebase, consider making them a user-defined type, such as a data class or\
    \ class. Consult Part II for more information on creating user-defined types."
