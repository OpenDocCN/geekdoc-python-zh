  - "[PAGE 187]\n\nHere's a reminder of the grocery list handling:\n\n+   1. A Grocery\
    \ List contains a list of stores and the items to pick up from each store. Each\
    \ item is reserved at the store until the app places the order. Items may come\
    \ from different stores; the app tries to find the cheapest item that matches.\n\
    2. Once the user confirms the GroceryList, place the order. Grocery items are\
    \ unreserved and set for delivery.\n\nFrom a calling code perspective, here's\
    \ what I have:\n\n```\norder = Order(recipes)\n# the user can make changes if\
    \ needed\ndisplay_order(order)\nwait_for_user_order_confirmation()\nif order.is_confirmed():\n\
    \    grocery_inventory = get_grocery_inventory()\n    grocery_list = GroceryList(order,\
    \ grocery_inventory)\n    grocery_list.reserve_items_from_stores()\n    wait_for_user_grocery_confirmation(grocery_list)\n\
    \    if grocery_list.is_confirmed():\n        grocery_list.order_and_unreserve_items()\n\
    \        deliver_ingredients(grocery_list)\n    else:\n        grocery_list.unreserve_items()\n\
    ```\n\nGiven this grocery list interface, this is certainly easy to use (if I\
    \ do say so myself). It's clear what the code is doing, and if making the interface\
    \ intuitive were the full story, I'd be golden. But I forgot the other half of\
    \ Scott Meyers's quote. I forgot to make the code *hard to use incorrectly*.\n\
    \nTake a look again. What happens if the user doesn't confirm their order? What\
    \ if some exception were thrown while waiting? If this were to happen, I would\
    \ never unreserve the items, leaving them reserved in perpetuity. Sure, I could\
    \ hope that calling code would always try to catch an exception, but that's easy\
    \ to forget to do. In fact, it'd be quite easy to use incorrectly, wouldn't you\
    \ agree?\n\n> You can't only focus on the happy path, which is the execution of\
    \ the code when everything goes as planned. Your interface must also handle all\
    \ the possible ways problems can arise.\n\nWanting to automatically invoke some\
    \ sort of function when you are done with an operation is a common case in Python.\
    \ File open/close, session authenticate/logout, database command batching/submission;\
    \ these are all examples where you want to always make sure to invoke the second\
    \ operation, regardless of what the previous code did. If you don't, you often\
    \ leak resources or otherwise tie up the system."
  - "[PAGE 188]\n\nChances are, you've actually run across how to handle this: using\
    \ a with block.\n\n```\nwith open(filename, \"r\") as handle:\n    print(handle.read())\n\
    # at this point, the with block has ended, closing the file handle\n```\n\nThis\
    \ is something you learn early on in your Python journey as a best practice. As\
    \ soon as the with block is finished (when the code returns to the original indent\
    \ level of the with statement), Python closes the opened file. This is a convenient\
    \ way of making sure that an operation occurs, even with no explicit user interaction.\
    \ This is the key you need to making your grocery list interface hard to use incorrectly—what\
    \ if you could make the grocery list unreserve items automatically, regardless\
    \ of what path the code takes?\n\nTo do this, you need to employ a context manager,\
    \ which is a Python construct that lets you take advantage of with blocks. Using\
    \ a context manager, I can make our grocery list code much more fault-tolerant:\n\
    \n```\nfrom contextlib import contextmanager\n\n@contextmanager\ndef create_grocery_list(order:\
    \ Order, inventory: Inventory):\n    grocery_list = _GroceryList(order, inventory)\n\
    \    try:\n        yield grocery_list\n    finally:\n        if grocery_list.has_reserved_items():\n\
    \            grocery_list.unreserve_items()\n```\n\nAny function decorated with\
    \ @contextmanager will be usable alongside a with block. I construct a _GroceryList\
    \ (notice how it's private, so nobody should be creating a grocery list in ways\
    \ other than create_grocery_list), then yield it. Yielding a value interrupts\
    \ this function, returning the value yielded to the calling code. The user can\
    \ then use it like so:\n\n```\n# ... snip ...\nif order.is_confirmed():\n    grocery_inventory\
    \ = get_grocery_inventory()\n    with create_grocery_list(order, grocery_inventory)\
    \ as grocery_list:\n        grocery_list.reserve_items_from_stores()\n       \
    \ wait_for_user_grocery_confirmation(grocery_list)\n        grocery_list.order_and_unreserve_items()\n\
    \        deliver_ingredients(grocery_list)\n```\n\nThe yielded value becomes grocery_list\
    \ in the example above. When the with block exits, execution is returned to the\
    \ context manager, right after the yield statement. It doesn't matter if an exception\
    \ is thrown, or if the with block finishes normally; because I wrapped our yield\
    \ in a try...finally block, the grocery list will always clear any reserved items."
- md: "This is how you can effectively force a user to clean up after themselves.\
    \ You are eliminating an entire class of errors that can happen when you use context\
    \ managers—the errors of omission. Errors of omission are so easy to make; you\
    \ literally have to do nothing. Instead, a context manager lets users do the right\
    \ thing, even when they do nothing. It’s a sure sign of a robust codebase when\
    \ a user can do the right thing without even knowing it.\n\nContext managers will\
    \ not finish if the program is forcibly closed, such as a force kill from the\
    \ operating system or a power loss. Context managers are just a tool to keep developers\
    \ from forgetting to clean up after themselves; make sure your system can still\
    \ handle things outside a developer’s control.\n\n## Closing Thoughts\n\nYou can\
    \ create all the types in the world, but if other developers can’t use them without\
    \ error, your codebase will suffer. Just like a house needs a strong foundation\
    \ to stand upon, the types you create and vocabulary you surround them with need\
    \ to be rock solid for your codebase to be healthy. When you have natural interfaces\
    \ to your code, future developers will be able to reach for these types and build\
    \ new features effortlessly. Have empathy for those future developers, and design\
    \ your types with care.\n\nYou’ll need to think through the domain concepts your\
    \ types represent, and how users interact with those types. By building a natural\
    \ mapping, you tie real-world operations to your codebase. The interfaces you\
    \ build should feel intuitive; remember, they should be easy to use correctly\
    \ and hard to use incorrectly. Use every trick and tip at your disposal, from\
    \ proper naming to magic methods to context managers.\n\nIn the next chapter,\
    \ I’m going to cover how types relate to one another when you create subtypes.\
    \ Subtypes are a way of specializing a type’s interface; they allow for extension\
    \ without modifying the original types. Any modification to existing code is a\
    \ potential regression, so being able to create new types without changing old\
    \ ones can significantly reduce erratic behavior.\n\n# CHAPTER 12\n## Subtyping\n\
    \nMost of Part II has focused on creating your own types and defining interfaces.\
    \ These types do not exist in isolation; types are often related to one another.\
    \ So far, you’ve seen *composition*, where types use other types as members. In\
    \ this chapter, you’ll learn about *subtyping*, or creating types based on other\
    \ types.\n\nWhen applied correctly, subtyping makes it incredibly easy to extend\
    \ your codebase. You can introduce new behaviors without ever worrying about breaking\
    \ the rest of your codebase. However, you must be diligent when creating a subtyping\
    \ relationship; if you do it poorly, you can decrease the robustness of your codebase\
    \ in unexpected ways.\n\nI’ll start with one of the most common subtype relationships:\
    \ inheritance. Inheritance is seen as a traditional pillar of object-oriented\
    \ programming (OOP).¹ Inheritance can be tricky if not applied correctly. I’ll\
    \ then move on to other forms of subtyping present in the Python programming language.\
    \ You’ll also learn about one of the more fundamental SOLID design principles,\
    \ the Liskov Substitution Principle. This chapter will help you make sense of\
    \ when and where subtyping is appropriate and where it is not.\n\n¹ Object-oriented\
    \ programming is a programming paradigm where you organize your code around encapsulated\
    \ data and their behaviors. If you’d like an introduction to OOP, I suggest *Head\
    \ First Object-Oriented Analysis and Design* by Brett McLaughlin, Gary Pollice,\
    \ and Dave West (O’Reilly).\n\n## Inheritance\n\nMost developers immediately think\
    \ of inheritance when they talk about subtyping. *Inheritance* is a way of creating\
    \ a new type from another type, copying all the behaviors into the new type. This\
    \ new type is known as a *child class*, *derived class*, or *subclass*. In contrast,\
    \ the type being inherited from is known as a *parent class*, *base class*, or\
    \ *superclass*. When talking about types in this way, we say that the relationship\
    \ is an *is-a* relationship. Any object of a derived class is also an instance\
    \ of a base class.\n\nTo illustrate this, you are going to design an app that\
    \ helps owners of restaurants organize operations (tracking finances, customizing\
    \ menus, etc.). For this scenario, a restaurant has the following behaviors:\n\
    \n- A restaurant has the following attributes: a name, a location, a list of employees\
    \ and their schedules, inventory, a menu, and current finances. All of these attributes\
    \ are mutable; even a restaurant can be renamed or change locations. When a restaurant\
    \ changes locations, its location attribute reflects its final destination.\n\
    - An owner can own multiple restaurants.\n- Employees can be moved from one restaurant\
    \ to another, but they cannot work at two restaurants at the same time.\n- When\
    \ a dish is ordered, the ingredients used are removed from the inventory. When\
    \ a specific item is depleted in the inventory, any dish requiring the ingredient\
    \ is no longer available through the menu.\n- Whenever a menu item is sold, the\
    \ restaurant's funds increase. Whenever new inventory is purchased, the restaurant's\
    \ funds decrease. For every hour that an employee works at that restaurant, the\
    \ restaurant's funds decrease according to the employee's salary and/or wage.\n\
    \nRestaurant owners will use this app to view all their restaurants, manage their\
    \ inventory, and track profits in real time.\n\nSince there are specific invariants\
    \ about the restaurant, I'll use a class to represent a restaurant:\n\n```python\n\
    from restaurant import geo\nfrom restaurant import operations as ops\n\nclass\
    \ Restaurant:\n    def __init__(self,\n                 name: str,\n         \
    \        location: geo.Coordinates,\n                 employees: list[ops.Employee],\n\
    \                 inventory: list[ops.Ingredient],\n                 menu: ops.Menu,\n\
    \                 finances: ops.Finances):\n        # ... snip ...\n        #\
    \ note that location refers to where the restaurant is located when\n        #\
    \ serving food\n\n    def transfer_employees(self,\n                         \
    \ employees: list[ops.Employee],\n                          restaurant: 'Restaurant'):\n\
    \        # ... snip ...\n\n    def order_dish(self, dish: ops.Dish):\n       \
    \ # ... snip ...\n\n    def add_inventory(self, ingredients: list[ops.Ingredient],\n\
    \                      cost_in_cents: int):\n        # ... snip ...\n\n    def\
    \ register_hours_employee_worked(self,\n                                     \
    \  employee: Employee,\n                                       minutes_worked:\
    \ int):\n        # ... snip ...\n\n    def get_restaurant_data(self) -> ops.RestaurantData:\n\
    \        # ... snip ...\n\n    def change_menu(self, menu: ops.Menu):\n      \
    \  self.__menu = menu\n\n    def move_location(self, new_location: geo.Coordinates):\n\
    \        # ... snip ...\n```\n\nIn addition to a “standard” restaurant, as described\
    \ above, there are a few “specialized” restaurants: a food truck and a pop-up\
    \ stall.\n\nFood trucks are mobile: they drive around to different spots and change\
    \ their menu based on the occasion. Pop-up stalls are transient; they appear for\
    \ a limited time with a limited menu (typically for some sort of event like a\
    \ festival or fair). While slightly different in how they operate, both a food\
    \ truck and pop-up stall are still restaurants. This is what I mean when I say\
    \ an *is-a* relationship—a food truck *is a* restaurant and a pop-up stall *is\
    \ a* restaurant. Because this is an *is-a* relationship, inheritance is an appropriate\
    \ construct to use.\n\nYou denote inheritance by specifying the base class when\
    \ you define your derived class:\n\n```python\nclass FoodTruck(Restaurant):\n\
    \    # ... snip ...\n\nclass PopUpStall(Restaurant):\n    # ... snip ...\n```\n\
    \nFigure 12-1 shows how this relationship is typically drawn.\n\nFigure 12-1.\
    \ Inheritance tree of restaurants\n\nBy defining inheritance in this fashion,\
    \ you ensure that the derived classes will inherit all the methods and attributes\
    \ from the base class, without needing to redefine them.\n\nThis means that if\
    \ you were to instantiate one of the derived classes, such as Food Truck, you\
    \ would be able to use all the same methods as if you were interacting with a\
    \ Restaurant.\n\n```python\nfood_truck = FoodTruck(\"Pat's Food Truck\", location,\
    \ employees,\n                      inventory, menu, finances)\nfood_truck.order_dish(Dish('Pasta\
    \ with Sausage'))\nfood_truck.move_location(geo.find_coordinates('Huntsville,\
    \ Alabama'))\n```\n\nWhat's really nice about this is that a derived class can\
    \ be passed to a function expecting a base class and the typechecker will not\
    \ complain one bit:\n\n```python\ndef display_restaurant_data(restaurant: Restaurant):\n\
    \    data = restaurant.get_restaurant_data()\n    # ... snip drawing code here\
    \ ...\n\nrestaurants: list[Restaurant] = [food_truck]\nfor restaurant in restaurants:\n\
    \    display_restaurant_data(restaurant)\n```\n\nBy default, the derived class\
    \ operates exactly like the base class. If you'd like the derived class to do\
    \ something different, you can override methods or redefine the methods in the\
    \ derived class.\n\nSuppose I want my food truck to automatically drive to the\
    \ next location when the location changes. For this use case, however, when asking\
    \ for restaurant data, I only want the final location, not the location while\
    \ the food truck is en route. Developers can call a separate method to show the\
    \ current location (for use in a separate food truck-only map). I'll set up a\
    \ GPS locator in the FoodTruck's constructor, and override move_location to start\
    \ the automatic driving:\n\n```python\nfrom restaurant.logging import log_error\n\
    \nclass FoodTruck(Restaurant):\n    def __init__(self,\n                 name:\
    \ str,\n                 location: geo.Coordinates,\n                 employees:\
    \ list[ops.Employee],\n                 inventory: list[ops.Ingredient],\n   \
    \              menu: ops.Menu,\n                 finances: ops.Finances):\n  \
    \      # ... snip ...\n```"
  mdcn: "这就是你如何有效地强制用户自行清理。你消除了使用上下文管理器时可能发生的一整类错误——遗漏错误。遗漏错误非常容易犯；你实际上什么都不用做。相反，上下文管理器让用户即使什么都不做，也能做正确的事情。当用户甚至无需知道就能做正确的事情时，这无疑是代码库健壮性的标志。\n\
    \n如果程序被强制关闭，例如被操作系统强制终止或断电，上下文管理器将不会完成。上下文管理器只是防止开发者忘记自行清理的工具；请确保你的系统仍然能够处理开发者控制之外的情况。\n\
    \n## 结语\n\n你可以创建世界上所有的类型，但如果其他开发者无法无误地使用它们，你的代码库将会受损。就像房子需要坚固的地基才能矗立一样，你创建的类型以及围绕它们构建的词汇表必须坚如磐石，你的代码库才能健康。当你为代码提供自然的接口时，未来的开发者将能够轻松地使用这些类型来构建新功能。请体谅那些未来的开发者，用心设计你的类型。\n\
    \n你需要深入思考你的类型所代表的领域概念，以及用户如何与这些类型交互。通过建立自然的映射，你将现实世界的操作与你的代码库联系起来。你构建的接口应该感觉直观；记住，它们应该易于正确使用，而难以错误使用。运用你掌握的所有技巧和诀窍，从恰当的命名到魔法方法，再到上下文管理器。\n\
    \n在下一章中，我将介绍当你创建子类型时，类型之间如何相互关联。子类型是特化类型接口的一种方式；它们允许在不修改原始类型的情况下进行扩展。对现有代码的任何修改都是一种潜在的回归，因此能够在不改变旧类型的情况下创建新类型，可以显著减少不稳定的行为。\n\
    \n# 第12章\n## 子类型化\n\n第二部分的大部分内容都集中在创建你自己的类型和定义接口上。这些类型并非孤立存在；类型之间通常是相互关联的。到目前为止，你已经看到了*组合*，即类型将其他类型用作成员。在本章中，你将学习*子类型化*，即基于其他类型创建类型。\n\
    \n正确应用子类型化可以让你极其轻松地扩展代码库。你可以引入新的行为，而无需担心破坏代码库的其余部分。然而，在创建子类型关系时必须谨慎；如果处理不当，可能会以意想不到的方式降低代码库的健壮性。\n\
    \n我将从最常见的子类型关系之一开始：继承。继承被视为面向对象编程（OOP）的传统支柱之一。¹ 如果应用不当，继承可能会很棘手。然后，我将继续介绍 Python\
    \ 编程语言中存在的其他形式的子类型化。你还将学习更基本的 SOLID 设计原则之一——里氏替换原则。本章将帮助你理解子类型化在何时何地是合适的，以及在何时何地是不合适的。\n\
    \n¹ 面向对象编程是一种编程范式，你围绕封装的数据及其行为来组织代码。如果你想了解 OOP 的入门知识，我建议阅读 Brett McLaughlin、Gary\
    \ Pollice 和 Dave West 所著的《*Head First Object-Oriented Analysis and Design*》（O'Reilly\
    \ 出版）。\n\n## 继承\n\n大多数开发者在谈论子类型化时，首先想到的就是继承。*继承*是一种从另一个类型创建新类型的方式，将所有行为复制到新类型中。这个新类型被称为*子类*、*派生类*或*子类*。相比之下，被继承的类型被称为*父类*、*基类*或*超类*。当以这种方式谈论类型时，我们说这种关系是*is-a*（是一个）关系。派生类的任何对象也是基类的实例。\n\
    \n为了说明这一点，你将设计一个应用程序，帮助餐厅老板组织运营（跟踪财务、定制菜单等）。在这个场景中，餐厅具有以下行为：\n\n- 餐厅具有以下属性：名称、位置、员工列表及其排班、库存、菜单和当前财务状况。所有这些属性都是可变的；即使是餐厅也可以更名或更改位置。当餐厅更改位置时，其位置属性会反映其最终目的地。\n\
    - 一个老板可以拥有多家餐厅。\n- 员工可以从一家餐厅调到另一家餐厅，但他们不能同时在两家餐厅工作。\n- 当点一道菜时，所用的食材会从库存中移除。当库存中某种特定物品耗尽时，任何需要该食材的菜品将不再通过菜单提供。\n\
    - 每当售出一道菜品，餐厅的资金就会增加。每当购买新库存，餐厅的资金就会减少。员工在餐厅工作的每一小时，餐厅的资金会根据该员工的薪水和/或工资而减少。\n\n\
    餐厅老板将使用此应用程序来查看他们所有的餐厅、管理库存并实时跟踪利润。\n\n由于餐厅存在特定的不变性，我将使用一个类来表示餐厅：\n\n```python\n\
    from restaurant import geo\nfrom restaurant import operations as ops\n\nclass\
    \ Restaurant:\n    def __init__(self,\n                 name: str,\n         \
    \        location: geo.Coordinates,\n                 employees: list[ops.Employee],\n\
    \                 inventory: list[ops.Ingredient],\n                 menu: ops.Menu,\n\
    \                 finances: ops.Finances):\n        # ... snip ...\n        #\
    \ 注意，location 指的是餐厅提供食物时的位置\n\n    def transfer_employees(self,\n            \
    \              employees: list[ops.Employee],\n                          restaurant:\
    \ 'Restaurant'):\n        # ... snip ...\n\n    def order_dish(self, dish: ops.Dish):\n\
    \        # ... snip ...\n\n    def add_inventory(self, ingredients: list[ops.Ingredient],\n\
    \                      cost_in_cents: int):\n        # ... snip ...\n\n    def\
    \ register_hours_employee_worked(self,\n                                     \
    \  employee: Employee,\n                                       minutes_worked:\
    \ int):\n        # ... snip ...\n\n    def get_restaurant_data(self) -> ops.RestaurantData:\n\
    \        # ... snip ...\n\n    def change_menu(self, menu: ops.Menu):\n      \
    \  self.__menu = menu\n\n    def move_location(self, new_location: geo.Coordinates):\n\
    \        # ... snip ...\n```\n\n除了上述“标准”餐厅外，还有几种“专业化”餐厅：餐车和快闪摊位。\n\n餐车是可移动的：它们会开到不同的地点，并根据场合更改菜单。快闪摊位是临时性的；它们只在有限的时间内出现，菜单也有限（通常是为了某种活动，如节日或集市）。虽然运营方式略有不同，但餐车和快闪摊位仍然是餐厅。这就是我所说的*is-a*关系——餐车*是*餐厅，快闪摊位*是*餐厅。因为这是一种*is-a*关系，所以继承是合适的构造方式。\n\
    \n你在定义派生类时通过指定基类来表示继承：\n\n```python\nclass FoodTruck(Restaurant):\n    # ... snip\
    \ ...\n\nclass PopUpStall(Restaurant):\n    # ... snip ...\n```\n\n图 12-1 展示了这种关系通常的绘制方式。\n\
    \n图 12-1. 餐厅的继承树\n\n通过这种方式定义继承，你可以确保派生类将继承基类的所有方法和属性，而无需重新定义它们。\n\n这意味着，如果你实例化一个派生类，例如餐车，你将能够使用与餐厅相同的所有方法。\n\
    \n```python\nfood_truck = FoodTruck(\"Pat's Food Truck\", location, employees,\n\
    \                      inventory, menu, finances)\nfood_truck.order_dish(Dish('Pasta\
    \ with Sausage'))\nfood_truck.move_location(geo.find_coordinates('Huntsville,\
    \ Alabama'))\n```\n\n真正的好处在于，派生类可以传递给期望基类的函数，而类型检查器不会有任何抱怨：\n\n```python\ndef\
    \ display_restaurant_data(restaurant: Restaurant):\n    data = restaurant.get_restaurant_data()\n\
    \    # ... snip drawing code here ...\n\nrestaurants: list[Restaurant] = [food_truck]\n\
    for restaurant in restaurants:\n    display_restaurant_data(restaurant)\n```\n\
    \n默认情况下，派生类的行为与基类完全相同。如果你希望派生类做不同的事情，你可以重写方法或在派生类中重新定义方法。\n\n假设我希望我的餐车在位置更改时自动驶向下一个地点。然而，对于这个用例，当请求餐厅数据时，我只想要最终位置，而不是餐车在途中的位置。开发者可以调用一个单独的方法来显示当前位置（用于单独的仅限餐车的地图）。我将在\
    \ FoodTruck 的构造函数中设置一个 GPS 定位器，并重写 move_location 以启动自动行驶：\n\n```python\nfrom restaurant.logging\
    \ import log_error\n\nclass FoodTruck(Restaurant):\n    def __init__(self,\n \
    \                name: str,\n                 location: geo.Coordinates,\n   \
    \              employees: list[ops.Employee],\n                 inventory: list[ops.Ingredient],\n\
    \                 menu: ops.Menu,\n                 finances: ops.Finances):\n\
    \        # ... snip ...\n```"
