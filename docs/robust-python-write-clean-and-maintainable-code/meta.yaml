    \ code. Your processor doesn't speak Python; all it sees is the presence or absence\
    \ of electrical current on circuits going through it. Same goes for what's in\
    \ your computer memory.\n\nSuppose your memory looked like the following:\n\n\
    ```\n001100101000100100010100100100010010001000010101\n001010101010100000001111111100100100111110100100\n\
    010010001001010010101110111101101010101010101010\n\n010100000100000101010100\n\
    \n1010010010010001010100010100100101010101001001001\n000111101010110101101010111000000000000000000111\n\
    ```\n\nLooks like a bunch of gibberish. Let's zoom in on the middle part there:\n\
    \n```\n01010000 01000001 01010100\n```\n\nThere is no way to tell exactly what\
    \ this number means by itself. Depending on computer architecture it is plausible\
    \ that this could represent the number 5259604 or 5521744. It could also be the\
    \ string “PAT.” Without any sort of context, you can't know for certain. This\
    \ is why Python needs types. Type information gives Python what it needs to know\
    \ to make sense of all the ones and zeroes. Let's see it in action:\n\n```\nfrom\
    \ ctypes import string_at\nfrom sys import getsizeof\nfrom binascii import hexlify\n\
    \na = 0b01010000_01000001_01010100\nprint(a)\n>>> 5259604\n\n# prints out the\
    \ memory of the variable\nprint(hexlify(string_at(id(a), getsizeof(a))))\n>>>\
    \ b'0100000000000000607c054995550000100000000000000054415000'\n\ntext = \"PAT\"\
    \nprint(hexlify(string_at(id(text), getsizeof(text))))\n>>>b'0100000000000000a00f0649955500003000000000000000375c9f1f02'\n\
    \    b'acdbe4e5379218b77f000000000000000000000050415400'\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_43_0.png)\n\
    \nI am running CPython 3.9.0 on a little-endian machine, so if you see different\
    \ results, don't worry, there are subtle things that can change your answers.\
    \ (This code is not guaranteed to run on other Python implementations such as\
