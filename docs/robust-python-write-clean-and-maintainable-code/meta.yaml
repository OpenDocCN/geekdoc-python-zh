    # The Magic of Hypothesis


    Hypothesis is very good at generating test cases that will find errors. It seems
    like magic, but it''s actually quite clever. In the previous example, you may
    have noticed that Hypothesis errored out on the value 5001. If you were to run
    the same code and introduce an error for values greater than 5000, you''ll find
    that the test errors out at 5001 as well. If Hypothesis is testing different values,
    shouldn''t we all see slightly different results?


    Hypothesis does something really nice for you when it finds a failure: it *shrinks*
    the test case. Shrinking is when Hypothesis tries to find the minimal input that
    still fails the test. For `integers()`, Hypothesis will try successively smaller
    numbers (or bigger numbers when dealing with negatives) until the input value
    reaches zero. Hypothesis tries to zero in (no pun intended) on the smallest value
    that still fails the test.


    To learn more about how Hypothesis generates and shrinks values, it''s worth reading
    the original [QuickCheck paper](https://www.cs.kent.ac.uk/people/staff/dat/miranda/quickcheck.pdf).
    QuickCheck was one of the first property-based tools, and even though it deals
    with the Haskell programming language, it is quite informative. Most property-based
    testing tools like Hypothesis are descendents from the ideas put forth by QuickCheck.


    # Contrast with Traditional Tests


    Property-based testing can greatly simplify the test-writing process. There are
    entire classes of problems that you do not need to worry about:


    *Easier testing of nondeterminism*


    Nondeterminism is the bane of most traditional tests. Random behavior, creating
    temporary directories, or retrieving different records from a database can make
    it incredibly hard to write tests. You have to create a specific set of output
    values in your test, and to do that, you need to be deterministic; otherwise,
    your test will keep failing. You often try to control the nondeterminism by forcing
    specific behaviors, such as forcing the same folder to always be created or seeding
    a random number generator.


    With property-based testing, nondeterminism is part of the package. Hypothesis
    will give you different inputs for each test run. You don''t have to worry about
    testing for specific values anymore; define properties and embrace the nondeterminism.
    Your codebase will be better because of it.'
