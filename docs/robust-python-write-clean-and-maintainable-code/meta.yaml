- md: "## Type annotate from the bottom up\n\nYour codebase may depend on common areas\
    \ of code. These are your core libraries and utilities that serve as a foundation\
    \ upon which everything else is built. Type annotating these parts of your codebase\
    \ makes your benefit less about depth and more about breadth. Because so many\
    \ other pieces sit atop this foundation, they will all reap the benefits of typechecking.\
    \ New code will quite often depend on these utilities as well, so your new code\
    \ will have an extra layer of protection.\n\n## Type annotate your moneymakers\n\
    \nIn some codebases, there is a clear separation between the core business logic\
    \ and all the rest of the code that supports your business logic. Your *business\
    \ logic* is the area of your system that is most responsible for delivering value.\
    \ It might be the core reservation system for a travel agency, an ordering system\
    \ in a restaurant, or a recommendation system for media services. All of the rest\
    \ of the code (such as logging, messaging, database drivers, and user interface)\
    \ exists to support your business logic. By type annotating your business logic,\
    \ you are protecting a core part of your codebase. This code is often long-lived,\
    \ making it an easy win for long-lasting value.\n\n## Type annotate the churners\n\
    \nSome parts of your codebase change way more often than the others. Every time\
    \ a piece of code changes, you run the risk of an incorrect assumption introducing\
    \ a bug. The whole point of robust code is to lessen the chance of introducing\
    \ errors, so what better place to protect than the code that changes the most\
    \ often? Look for your code that has many different commits in version control,\
    \ or analyze which files have the most lines of code changed over a time period.\
    \ Also take a look at which files have the most committers; this is a great indication\
    \ that this is an area where you can shore up type annotations for communication\
    \ purposes.\n\n## Type annotate the complex\n\nIf you come across some complex\
    \ code, it will take some time to understand. After understanding that code, the\
    \ best thing you can do is reduce the complexity for the next developer who reads\
