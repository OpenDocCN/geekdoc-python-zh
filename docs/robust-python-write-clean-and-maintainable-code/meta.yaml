    ```\n\n如果你看到像这样的属性访问，你应该亮起红灯：开发者正在搞乱类的内部结构，这可能会破坏不变量。幸运的是，在检查代码库时，这非常容易发现（你将在第20章了解更多关于代码检查工具的信息）。与你的共同贡献者达成协议，不要碰任何私有的东西；否则，你会发现自己陷入无法维护的混乱中。\n\
