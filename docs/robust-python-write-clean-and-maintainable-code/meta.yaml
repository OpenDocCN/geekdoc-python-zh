  - '[PAGE 363]


    # Adopting Mutation Testing


    Mutation testing is not widespread in the software development community today.
    I believe this to be for three reasons:


    +   - People are unaware of it and the benefits it provides.

    - A codebase''s tests are not mature enough yet for useful mutation testing.

    - The cost-to-value ratio is too high.


    This book is actively working to improve the first point, but the second and third
    points certainly have merit.


    If your codebase does not have a mature set of tests, you will see little value
    in introducing mutation testing. It will end up providing too high of a noise-to-signal
    ratio. You will see much more value from improving your test suite than trying
    to find all the mutants. Consider running mutation testing on smaller parts of
    your codebase that do have mature test suites.


    Mutation testing does have a high cost; it''s important to maximize the value
    received in order to make mutation testing worth it. Mutation tests are slow,
    by virtue of running test suites multiple times. Introducing mutation testing
    to an existing codebase is painful, as well. It is far easier to start on brand-new
    code from the beginning.


    However, since you are reading a book about improving the robustness of potentially
    complex codebases, there''s a good chance you are working in an existing codebase.
    Hope is not lost if you''d like to introduce mutation testing, though. As with
    any method of improving robustness, the trick is to be selective in where you
    run mutation testing.


    Look for areas of code that have lots of bugs. Look through bug reports and find
    trends that indicate that a certain area of code is troublesome. Also consider
    finding areas of code with high churn, as these are the areas that are most likely
    to introduce a change that current tests do not fully cover.² Find the areas where
    mutation testing will pay back the cost multifold. You can use mutmut to run mutation
    testing selectively on just these areas.


    Also, mutmut comes with an option to mutation test only the parts of your codebase
    that have *line coverage*. A line of code has *coverage* by test suite if it is
    executed at least once by any test. Other coverage types exist, such as API coverage
    and branch


    > ² You can find code with high churn by measuring files with the highest number
    of commits. I found the following Git one-liner after a quick Google search: `git
    rev-list --objects --all | awk ''$2'' | sort -k2 | uniq -cf1 | sort -rn | head`.
    This was provided by sehe on [this Stack Overflow question](https://stackoverflow.com/questions/10568859).'
