    \ instead.\n\nIn contrast, accidental complexity is complexity that produces superfluous,\
    \ wasteful, or confusing statements in code. It's what happens when a system evolves\
    \ over time and developers are jamming features in without reevaluating old code\
    \ to determine whether their original assertions hold true. I once worked on a\
    \ project where adding a single command-line option (and associated means of programmatically\
    \ setting it) touched no fewer than 10 files. Why would adding one simple value\
    \ ever need to require changes all over the codebase?\n\nYou know you have accidental\
    \ complexity if you've ever experienced the following:\n\n- Things that sound\
    \ simple (adding users, changing a UI control, etc.) are non-trivial to implement.\n\
    - Difficulty onboarding new developers into understanding your codebase. New developers\
    \ on a project are your best indicators of how maintainable your code is right\
    \ now—no need to wait years.\n- Estimates for adding functionality are always\
    \ high, yet you slip the schedule nonetheless.\n\nRemove accidental complexity\
    \ and isolate your necessary complexity wherever possible. Those will be the stumbling\
    \ blocks for your future collaborators. These sources of complexity compound miscommunication,\
    \ as they obscure and diffuse intent throughout the codebase.\n\n![](img/d64d2be45ca85b398807d181202e7046_37_0.png)\n\
    \n**Discussion Topic**\n\nWhat accidental complexities do you have in your codebase?\
    \ How challenging would it be to understand simple concepts if you were dropped\
    \ into the codebase with no communication to other developers? What can you do\
    \ to simplify complexities identified in this exercise (especially if they are\
    \ in often-changing code)?\n\nThroughout the rest of the book, I will look at\
    \ different techniques for communicating intent in Python.\n\n## Closing Thoughts\n\
    \nRobust code matters. Clean code matters. Your code needs to be maintainable\
    \ for the entire lifetime of the codebase, and in order to ensure that outcome,\
    \ you need to put active foresight into what you are communicating and how. You\
    \ need to clearly embody your knowledge as close to the code as possible. It will\
    \ feel like a burden to continuously look forward, but with practice it becomes\
    \ natural, and you start reaping the benefits as you work in your own codebase.\n\
    \nEvery time you map a real-world concept to code, you are creating an abstraction,\
    \ whether it is through the use of a collection or your decision to keep functions\
    \ separate. Every abstraction is a choice, and every choice communicates something,\
    \ whether intentional or not. I encourage you to think about each line of code\
    \ you are writing and ask yourself, “What will a future developer learn from this?”\
    \ You owe it to future maintainers to enable them to deliver value at the same\
    \ speed that you can today. Otherwise, your codebase will get bloated, schedules\
    \ will slip, and complexity will grow. It is your job as a developer to mitigate\
    \ that risk.\n\nLook for potential hotspots, such as incorrect abstractions (such\
    \ as collections or iteration) or accidental complexity. These are prime areas\
    \ where communication can break down over time. If these types of hotspots are\
    \ in areas that change often, they are a priority to address now.\n\nIn the next\
    \ chapter, you’re going to take what you learned from this chapter and apply it\
    \ to a fundamental Python concept: types. The types you choose express your intent\
    \ to future developers, and picking the correct types will lead to better maintainability.\n\
    \n# PART I\n\n## Annotating Your Code with Types\n\nWelcome to Part I, where I\
    \ will focus on *types* in Python. Types model the behavior of your program. Beginner\
    \ programmers understand that there are different types in Python, such as `float`\
    \ or `str`. But what is a type? How does mastering types make your codebase stronger?\
    \ Types are a fundamental underpinning of any programming language, but, unfortunately,\
    \ most introductory texts gloss over just how types benefit your codebase (or\
    \ if misused, those same types increase complexity).\n\nTell me if you've seen\
    \ this before:\n\n```\n>>> type(3.14)\n<class 'float'>\n\n>>> type(\"This is another\
    \ boring example\")\n<class 'str'>\n\n>>> type([\"Even\", \"more\", \"boring\"\
    , \"examples\"])\n<class 'list'>\n```\n\nThis could be pulled from almost any\
    \ beginner's guide to Python. You will learn about the `int`, `str`, `float`,\
    \ and `bool` data types, and all sorts of other things the language offers. Then,\
    \ boom, you move on, because let's face it, this Python is not flashy. You want\
    \ to dive into the cool stuff, like functions and loops and dictionaries, and\
    \ I don't blame you. But it's a shame that many tutorials never revisit types\
    \ and give them their proper due. As users dig deeper, they may discover type\
    \ annotations (which I cover in the next chapter) or start writing classes, but\
    \ often miss out on the fundamental discussion about when to use types appropriately.\n\
    \nThat's where I'll start.\n\n# CHAPTER 2\n\n## Introduction to Python Types\n\
    \nTo write maintainable Python, you must be aware of the nature of types and be\
    \ deliberate about using them. I’ll start by talking about what a type actually\
    \ is and why that matters. I’ll then move on to how the Python language’s decisions\
    \ about its type system affects the robustness of your codebase.\n\n## What’s\
    \ in a Type?\n\nI want you to pause and answer a question: without mentioning\
    \ numbers, strings, text, or Booleans, how would you explain what a type is?\n\
    \nIt’s not a simple answer for everyone. It’s even harder to explain what the\
    \ benefits are, especially in a language like Python where you do not have to\
    \ explicitly declare types of variables.\n\nI consider a type to have a very simple\
    \ definition: a communication method. Types convey information. They provide a\
    \ representation that users and computers can reason about. I break the representation\
    \ down into two different facets:\n\n- *Mechanical representation*: Types communicate\
    \ behaviors and constraints to the Python language itself.\n- *Semantic representation*:\
    \ Types communicate behaviors and constraints to other developers.\n\nLet’s go\
    \ learn a little more about each representation.\n\n## Mechanical Representation\n\
    \nAt its core, computers are all about binary code. Your processor doesn't speak\
    \ Python; all it sees is the presence or absence of electrical current on circuits\
    \ going through it. Same goes for what's in your computer memory.\n\nSuppose your\
    \ memory looked like the following:\n\n```\n001100101000100100010100100100010010001000010101\n\
    001010101010100000001111111100100100111110100100\n010010001001010010101110111101101010101010101010\n\
    \n010100000100000101010100\n\n1010010010010001010100010100100101010101001001001\n\
    000111101010110101101010111000000000000000000111\n```\n\nLooks like a bunch of\
    \ gibberish. Let's zoom in on the middle part there:\n\n```\n01010000 01000001\
    \ 01010100\n```\n\nThere is no way to tell exactly what this number means by itself.\
    \ Depending on computer architecture it is plausible that this could represent\
    \ the number 5259604 or 5521744. It could also be the string “PAT.” Without any\
    \ sort of context, you can't know for certain. This is why Python needs types.\
    \ Type information gives Python what it needs to know to make sense of all the\
    \ ones and zeroes. Let's see it in action:\n\n```\nfrom ctypes import string_at\n\
    from sys import getsizeof\nfrom binascii import hexlify\n\na = 0b01010000_01000001_01010100\n\
    print(a)\n>>> 5259604\n\n# prints out the memory of the variable\nprint(hexlify(string_at(id(a),\
    \ getsizeof(a))))\n>>> b'0100000000000000607c054995550000100000000000000054415000'\n\
    \ntext = \"PAT\"\nprint(hexlify(string_at(id(text), getsizeof(text))))\n>>> b'0100000000000000a00f0649955500003000000000000000375c9f1f02'\n\
