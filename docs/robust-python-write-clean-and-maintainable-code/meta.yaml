    ```\n\n我可以运行我的自定义 Pylint 检查器：\n\n```\nPYTHONPATH=code_examples/chapter20 pylint\
    \ --load-plugins \\\n    hotdog_checker code_examples/chapter20/hotdog.py\n```\n\
    \nPylint 确认，提供一个“不可提供”的热狗现在是一个错误：\n\n```\n************* Module hotdog\ncode_examples/chapter20/hotdog.py:13:12:\
    \ W0001:\n    ReadyToServeHotDog created outside of prepare_for_serving.\n   \
    \ (unverified-ready-to-serve-hotdog)\n```\n\n这太棒了。现在我可以编写自动化工具来检查像 mypy 这样的类型检查器甚至无法开始查找的错误。不要让你的想象力受限。使用\
    \ Pylint 来捕获你能想到的任何东西：业务逻辑约束违反、时间依赖性或自定义风格指南。现在，让我们来看看这个 linter 是如何工作的，以便你可以构建自己的。\n\
    \n## 分解插件\n\n编写插件的第一步是定义一个继承自 `pylint.checkers.BaseChecker` 的类：\n\n```python\n\
    import astroid\n\nfrom pylint.checkers import BaseChecker\nfrom pylint.interfaces\
    \ import IAstroidChecker\n\nclass ReadyToServeHotDogChecker(BaseChecker):\n  \
    \  __implements__ = IAstroidChecker\n```\n\n你还会注意到一些对 `astroid` 的引用。`astroid`\
    \ 库对于将 Python 文件解析为抽象语法树（AST）非常有用。这提供了一种结构便利的方式来与 Python 源代码交互。你很快就会看到这有什么用。\n\
    \n接下来，我定义了关于插件的元数据。这提供了诸如插件名称、显示给用户的消息以及一个标识符（`unverified-ready-to-serve-hotdog`）等信息，我稍后可以引用它。\n\
    \n```python\nname = 'unverified-ready-to-serve-hotdog'\npriority = -1\nmsgs =\
