    You need to write tests that catch not only errors in what you wrote, but errors
    other developers make as they change your code.


    It doesn''t matter if a future developer is refactoring the method to use a common
    library, changing a single line, or adding more functionality to the code; you
    want your tests to catch any errors that they introduced. To get into the mindset
    of mutation testing, you need to think about all the possible changes that can
    be made to the code and check if your tests would catch any erroneous change.
    Table 24-1 breaks down the above code line by line and shows the outcome of the
    tests if that line is missing.


    Table 24-1. Impact of each line removed


    | Code line | Impact if removed |

    | :--- | :--- |

    | for meal in meals: | Tests fail: Syntax errors and code does no looping |

    | target -= meal.calories | Tests fail: no warnings are ever displayed |

    | if target < 0 | Tests fail: all meals show a warning |

    | display_warning(meal, Warning Type.OVER_CALORIE_LIMIT) | Tests fail: no warnings
    are shown |

    | continue | Tests pass |

    | display_checkmark(meal) | Tests fail: checkmarks are not displayed on meals
    |


    Look at the row in Table 24-1 for the continue statement. If I delete that line,
    all tests pass. This means one of three scenarios occurred: the line isn''t needed;
    the line is needed, but not important enough to test; or there is missing coverage
    in our test suite.


    The first two scenarios are easy to handle. If the line isn''t needed, delete
    it. If the line isn''t important enough to test (this is common for things such
    as debug logging statements or version strings), you can ignore mutation testing
    on this line. But, if the third scenario is true, you are missing test coverage.
    You have found a hole in your safety net.


    If continue is removed from the algorithm, both a checkmark and a warning will
    show up on any meal that is over the calorie limit. This is not ideal behavior;
    this is a signal that I should have a test to cover for this case. If I were to
    just add an assertion that meals with warnings also have no checkmarks, then our
    test suite would have caught this mutant.


    Deleting lines is just one example of a mutation. There are numerous other mutants
    I could apply to the code above. As a matter of fact, if I change the continue
    to a break, the tests still pass. Going through every mutation I can think of
    is tedious, so I want an automated tool to do this process for me. Enter mutmut.'
  - '[PAGE 359]


    # Mutation Testing with mutmut


    mutmut is a Python tool that does mutation testing for you. It comes with a pre-programmed
    set of mutations to apply to your codebase, such as:


    +   - Finding integer literals and adding 1 to them to catch off-by-one errors

    - Changing string literals by inserting text inside them

    - Exchanging break and continue

    - Exchanging True and False

    - Negating expressions, such as converting x is None to x is not None

    - Changing operators (especially changing from / to //)


    This is by no means a comprehensive list; mutmut has quite a few clever ways of
    mutating your code. It works by making discrete mutations, running your test suite
    for you, and then displaying which mutants survived the testing process.


    To get started, you need to install mutmut:


    ```

    pip install mutmut

    ```


    Then, you run mutmut against all your tests (warning, this can take some time).
    You can run mutmut on my code snippet above with the following:


    ```

    mutmut run --paths-to-mutate code_examples/chapter24

    ```


    ![](img/d64d2be45ca85b398807d181202e7046_359_0.png)


    For long-running tests and large codebases, you may want to break up your mutmut
    runs, as they do take some time. However, mutmut is intelligent enough to save
    its progress in a folder called .mutmut-cache, so if you exit in the middle, it
    will pick up execution at the same point on future runs.


    mutmut will display some statistics as it runs, including the number of surviving
    mutants, the number of eliminated mutants, and which tests were taking a suspiciously
    long time (such as accidentally introducing an infinite loop).


    Once execution completes, you can view the results with mutmut results. In my
    code snippet, mutmut identifies three surviving mutants. It will list mutants
    as numeric IDs, and you can show the specific mutant with the mutmut show <id>
    command.'
