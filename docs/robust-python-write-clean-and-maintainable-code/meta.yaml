  raw:
  - '[PAGE 249]


    different building) owns the table management system, and an independent contractor
    has been providing the payment system. You''ve been part of a huge rollout to
    provide a new item in your pizza maker: stromboli. You''ve been working for weeks,
    carefully coordinating changes. Every system requires changes to handle the new
    menu item. After countless late nights (all pizza-fueled, of course), you are
    ready for the big update for your customers. However, as soon as the update rolls
    out, error reports start rolling in. An unfortunate set of events has introduced
    a bug, leading to pizza shops around the world breaking. As more and more systems
    come online, the problem becomes more dire. Management decides that you need to
    fix it as soon as possible.


    Take a minute to ask how you would like your night to go. Do you want to spend
    it frantically trying to reach all of the other teams, attempting to hack in a
    fix across the three systems? You happen to know that the contractor has already
    turned off notifications for the night and the other team got a little too carried
    away with their launch celebration after work today. Or do you want to take a
    look at the code and realize that it''s incredibly easy to remove stromboli from
    all three systems by just messing with a few lines of code, with no input from
    the other teams?


    Dependencies are a one-way relationship. You are beholden to your dependencies.
    If they don''t do exactly what you want when you need it, you have little recourse.
    Remember, living, breathing humans are on the other side of your dependencies
    and they won''t necessarily jump when you ask them to jump. How you construct
    your dependencies will directly impact how you maintain a system.


    In our stromboli example, the dependencies are a circle; any one change can potentially
    affect the other two systems. You need to think about every direction of your
    dependencies and how changes ripple through your system. With PizzaMat, the support
    of the pizza-making equipment is our single source of truth; there''s no use in
    setting up billing and table management for pizza products that don''t exist.
    However, in the example above, all three systems were written with their own copy
    of what menu items are available. Based on the direction of the dependencies,
    the pizza maker could take out the stromboli code, but stromboli would still show
    up in the payment system. How could you make this more extensible to avoid these
    dependency problems?


    ![](img/d64d2be45ca85b398807d181202e7046_249_0.png)


    > The tricky thing about large architectural changes is that the right answer
    always depends on the context of your specific problem. If *you* were to build
    an automated pizza maker, you might draw your dependency tree differently, based
    on a variety of different factors and constraints. It''s important to focus on
    *why* you are drawing your dependencies the way you are, not making sure that
    they are always drawn the same way as someone else''s system.'
  - '[PAGE 250]


    To start, you can construct your system such that all the menu definitions live
    in the pizza-making system; after all, it is the system that knows what it can
    and cannot make. From there, the pricing system can query the pizza maker as to
    what items are actually available. That way, if you need to remove stromboli in
    an emergency, you can do it in the pizza-making system; the pricing system doesn''t
    control what is and is not available. By inverting, or reversing the direction
    of, the dependency, you restore control to the pizza-making system. If I were
    to invert this one dependency, the dependency graph looks like Figure 16-4.


    ![](img/d64d2be45ca85b398807d181202e7046_250_0.png)


    Figure 16-4. More sensible dependencies


    Now the pizza maker calls the shots for what can and cannot be ordered. This can
    go a long way toward limiting the amount of changes needed. If the pizza maker
    needs to stop supporting a type of ingredient in a dish, the payment system will
    pick up the changes automatically. Not only will this save your hide during an
    emergency, but it gives your business more flexibility in the future. You''ve
    added the ability to optionally display different dishes in the payment system
    depending on what the pizza maker can automatically make, all without needing
    to coordinate with an external payment team.


    ![](img/d64d2be45ca85b398807d181202e7046_250_1.png)


    # Discussion Topic


    Think through how you would add a feature that prevents the payment system from
    showing certain options if the pizza maker was out of ingredients. Consider the
    systems in Figures 16-3 and 16-4.


    As an additional discussion topic, discuss the cycle between the table management
    system and payment system. How can you break that cycle? What are the pros and
    cons of each direction of dependencies?'
  - "[PAGE 251]\n\n# When Code Gets Too DRY\n\nThe DRY principle (Don't Repeat Yourself—see\
    \ Chapter 10 for more detail) is ingrained in most developers' heads. Anytime\
    \ you see very similar code in your codebase, you are required to shout “DUPLICATION!”\
    \ to warn other developers, and dutifully refactor that code so that it lives\
    \ in one place. After all, you don't want to fix the same bug in multiple places.\n\
    \nIt's possible for the DRY principle to go too far, though. Every time you refactor\
    \ code, you are introducing a physical dependency to the refactored code. If other\
    \ parts of your codebase depend on this piece of code, you are coupling them together.\
    \ If that refactored central piece of code needs to change, it can affect a large\
    \ amount of code.\n\nWhen applying the DRY principle, don't deduplicate code just\
    \ because it looks the same; deduplicate it only if that code has the same *reasons*\
    \ to change. Otherwise, you'll start getting into cases where the refactored code\
    \ needs to change for one reason, but that reason is incompatible with other parts\
    \ of code that depend on the refactored code. You need to start putting special\
    \ logic into the deduplicated code to handle special cases. Any time you increase\
    \ complexity like this, you start to reduce maintainability and make code harder\
    \ to reuse for general purposes.\n\n# Logical Dependencies\n\nA *logical dependency*\
    \ is when two entities have a relationship but no direct linkage in code. The\
    \ dependency is abstracted; it contains a layer of indirection. It's a dependency\
    \ that is only present at runtime. In our pizza maker example, we have three subsystems\
    \ interacting with one another. We represented the dependency with arrows in Figure\
    \ 16-3. If those arrows are imports or function calls, then they are physical\
    \ dependencies. However, it's possible to link these subsystems at runtime without\
    \ function calls or imports.\n\nSuppose subsystems live on different computers\
    \ and communicate over HTTP. If the pizza maker were to notify the table management\
    \ service on when the pizza is made over HTTP using the requests library, it would\
    \ look something like this:\n\n```\ndef on_pizza_made(order: int, pizza: Pizza):\n\
    \    requests.post(\"table-management/pizza-made\", {\n        \"id\": order,\n\
    \        \"pizza\": pizza.to_json()\n    })\n```\n\nThe physical dependency is\
    \ no longer from the pizza maker to our table management system, but from the\
    \ pizza maker to the requests library. As far as the pizza maker is concerned,\
    \ it just needs an HTTP endpoint that it can post to an endpoint called"
  - '[PAGE 252]


    “/pizza-done” from some web server named “table-management.” That endpoint needs
    to accept an ID and pizza data formatted as JSON.


    Now, in reality, your pizza maker still needs a table management service to work.
    This is the logical dependency at play. Even though there is no direct dependency,
    there is still a relationship between the pizza maker and table management systems.
    This relationship doesn’t just disappear; it transforms from physical to logical.


    The key benefit for introducing a logical dependency is substitutability. It is
    much easier to replace a component when nothing is physically depending on it.
    Take the example with the on_pizza_done over HTTP request. You could completely
    replace the table management service, as long as it upholds the same contract
    as the original service. If that sounds familiar, it should, as it’s the exact
    same idea you learned about in Chapter 12. Subtyping, whether through duck typing,
    inheritance, or something similar, introduces logical dependencies. Calling code
    physically depends on the base class, but the logical dependency of which child
    class is used isn’t determined until runtime.


    Improving substitutability improves maintainability. Remember, maintainable code
    is easy to change. If you can substitute entire swaths of functionality with minimal
    impact, you give your future maintainers immense flexibility in making decisions.
    If a specific function or class or subsystem isn’t growing to your needs, you
    can just replace it. Code that is easy to delete is inherently easy to change.


    As with anything though, logical dependencies come with a cost. Every logical
    dependency is an indirect reference to some relationship. Because there is no
    physical linkage, tooling has a very hard time identifying logical dependencies.
    You won’t be able to create a nice box-and-arrows diagram of logical dependencies.
    Furthermore, as developers read your code, the logical dependencies won’t be immediately
    apparent. Often, a reader of code will see the physical dependency to some layer
    of abstraction, while the logical dependency isn’t noticed or resolved until runtime.


    This is the trade-off of introducing a logical dependency. You increase maintainability
    by increasing substitutability and reducing coupling, but you also decrease maintainability
    by making your code harder to read and understand. Too many layers of abstraction
    create a tangled mess just as easily as too few layers of abstraction. There is
    no hard and fast rule for what the right number of layers of abstraction are;
    you need to use your best judgment for whether you need flexibility or readability
    for your specific scenario.


    Some logical dependencies create relationships that aren’t detectable through
    tooling, such as depending on the specific ordering of a collection or relying
    on specific fields to be present in a class. When found, these often surprise
    developers because there was little indication they existed without close inspection.'
- md: "I once worked on a codebase that stored network interfaces. Two pieces of code\
    \ depended on these interfaces: one system for performance statistics and one\
    \ for setting up communication paths with other systems. The problem was they\
    \ had different assumptions about the ordering of those interfaces. It worked\
    \ for years, until new network interfaces were added. Due to how communication\
    \ paths worked, new interfaces needed to be put in the front of the list. But\
    \ the performance statistics would have only worked with those interfaces in the\
    \ back. Due to a hidden logical dependency, these two parts of code were inextricably\
    \ linked (I never would have thought that adding communication paths would break\
    \ performance statistics).\n\nIn hindsight, the fix was easy. I created a function\
    \ that mapped the ordering from the communication path expectations to a reordered\
    \ list. The performance statistics system then depended on this new function.\
    \ However, that didn't retroactively fix the bug (or give me back the hours of\
    \ my time spent trying to figure out why performance statistics were broken).\
    \ Whenever you create a dependency on something that is not directly apparent\
    \ in code, find a way to make it apparent. Leave a trail of breadcrumbs, preferably\
    \ with a separate codepath (like the intermediary function above) or types. If\
    \ you can't do that, leave a comment. Had one comment in the network interface\
    \ list indicated a dependency upon a specific ordering, I never would have had\
    \ such a headache with that code.\n\n## Temporal Dependencies\n\nThe last type\
    \ of dependency is the temporal dependency. This is actually a type of logical\
    \ dependency, but how you handle it is slightly different. A *temporal dependency*\
    \ is a dependency that is linked by time. Anytime there is a concrete order of\
    \ operations, such as “dough must be laid down before sauce and cheese” or “an\
    \ order must be paid for before the pizza begins being made,” you have a temporal\
    \ dependency. Most temporal dependencies are straightforward; they are a natural\
    \ part of your business domain. (Where would you put pizza sauce and cheese without\
    \ the dough, anyway?) These are not the temporal dependencies that will cause\
    \ you problems. Instead, it’s the ones that aren’t always so apparent.\n\nTemporal\
    \ dependencies bite you the most in situations where you must do certain operations\
    \ in a specific order, but you have no indication that you need to do so. Imagine\
    \ if your automated pizza maker could be configured in two modes: single-pizza\
    \ (for high-quality pizzas) or mass-produce (for cheap and fast pizzas). Whenever\
    \ a pizza maker goes from single-pizza to mass-produce, it needs an explicit reconfiguration.\
    \ If that reconfiguration doesn't happen, the machine's failsafe kicks in and\
    \ refuses to make pizzas until a manual operator override occurs.\n\nWhen this\
    \ option is first introduced, developers take the utmost care in making sure that\
    \ before any call to `mass_produce`, such as:\n\n```\npizza_maker.mass_produce(number_of_pizzas=50,\
    \ type=PizzaType.CHEESE)\n```\n\nThere has to be a check:\n\n```\nif not pizza_maker.is_configured(ProductionType.MASS_PRODUCE):\n\
    \    pizza_maker.configure_for_mass_production()\n    pizza_maker.wait_for_reconfiguration()\n\
    ```\n\nDevelopers diligently look for this code in code reviews and make sure\
    \ that the proper checks are always made. However, as the years go by, and developers\
    \ cycle in and out of the project, the team's knowledge of mandatory checks starts\
    \ to dwindle. Imagine a newer automated pizza maker model comes to market, which\
    \ doesn't need reconfiguration (calls to `configure_for_mass_production` result\
    \ in no change to the system). Developers who are only familiar with this new\
    \ model may never think to call `configure_for_mass_production` in these cases.\n\
    \nNow, put yourself in a developer's shoes a few years in the future. Let's say\
    \ you are writing new functionality for the pizza maker, and the `mass_produce`\
    \ function fits the exact use case you need. How would you know that you need\
    \ to do explicit checking for mass production, especially for older models? Unit\
    \ tests won't help you, as they don't exist yet for the new functionality. Do\
    \ you really want to wait until integration tests fail (or a customer complains)\
    \ to find out that you missed that check?\n\nHere are some strategies to mitigate\
    \ missing such a check:\n\n- *Lean on your type system*\n  By restricting certain\
    \ operations to specific types, you can prevent confusion. Imagine if `mass_produce`\
    \ was only callable from a `MassProductionPizzaMaker` object. You could write\
    \ function calls to make sure that a `MassProductionPizzaMaker` was only created\
    \ after reconfiguration. You are using the type system to make it impossible to\
    \ a mistake (NewType does something very similar, as described in Chapter 4).\n\
    \n- *Embed preconditions deeper*\n  The fact that the pizza maker has to be configured\
    \ before use is a *precondition*. Consider making this precondition of the `mass_produce`\
    \ function by moving the checks inside `mass_produce`. Think about how you will\
    \ handle error conditions (such as throwing an exception). You'll be able to prevent\
    \ violating the temporal dependency, but you've introduced a different error at\
    \ runtime. Your specific use case will dictate what you consider to be the lesser\
    \ of two evils: violating the temporal dependency or dealing with a new error\
    \ case.\n\n- *Leave breadcrumbs*\n  This isn't necessarily a strategy to catch\
    \ a violated temporal dependency. Instead it is more of a last-ditch effort to\
    \ alert developers about temporal dependencies if all other efforts fail. Try\
    \ to organize temporal dependencies in the same file (ideally within a few lines\
    \ of each other). Leave comments and documentation to notify future developers\
    \ of this linkage. With any luck, those future developers will see the clues and\
    \ know that there is a temporal dependency.\n\nIn any linear program, most lines\
    \ have a temporal dependency on the lines that precede them. This is normal, and\
    \ you don't need to apply mitigations for each of these cases. Instead, look for\
    \ temporal dependencies that might only be applied in certain cases (such as machine\
    \ reconfiguration on older models), or temporal dependencies that are catastrophic\
    \ if missed (such as not sanitizing a user input string before passing it to a\
    \ database). Weigh the cost of violating a temporal dependency against the effort\
    \ to detect it and mitigate it. It will depend on your use case, but when you\
    \ do mitigate a temporal dependency, it can save you immense headaches later on.\n\
    \n## Visualizing Your Dependencies\n\nIt can be challenging to find these sorts\
    \ of dependencies and understand where to look for potential problem points. Sometimes\
    \ you need a more visual representation. Fortunately, tools exist to help you\
    \ make sense of your dependencies visually.\n\n![](img/d64d2be45ca85b398807d181202e7046_255_0.png)\n\
    \nFor many of the following examples, I will be using the GraphViz library to\
    \ display pictures. To install it, follow the instructions on the [GraphViz website](https://graphviz.org/).\n\
    \n## Visualizing Packages\n\nChances are, your code uses other packages, installed\
    \ by pip. It can be helpful to know all the packages that you depend on, their\
    \ dependencies, the dependencies of those dependencies, and so on.\n\nTo do so,\
    \ I'm going to install two packages, pipdeptree and GraphViz. pipdeptree is a\
    \ useful tool to tell you how packages interact with one another, and GraphViz\
    \ does the actual visualization part. For this example, I'll be using the mypy\
    \ codebase. I've downloaded the mypy source code, created a virtual environment,\
    \ and installed mypy from source.²\n\n² Creating a virtual environment is a great\
    \ way to isolate your dependencies from your system's Python installation.\n\n\
    From within that virtual environment, I've installed pipdeptree and GraphViz:\n\
    \n```\npip install pipdeptree graphviz\n```\n\nNow I run the following command:\n\
    \n```\npipdeptree --graph-output png --exclude pipdeptree,graphviz > deps.png\n\
    ```\n\nYou can see the results in Figure 16-5.\n\n![](img/d64d2be45ca85b398807d181202e7046_256_0.png)\n\
    \nI'm going to ignore wheel, setuptools, and pip packages, and focus on mypy.\
    \ In this case, I see the exact version of mypy that is installed, as well as\
    \ the direct dependencies (in this case typed_ast 1.4.2, typing-extensions 3.7.4.3,\
    \ and mypy-extensions 0.4.3). pipdeptree is also nice enough to specify what version\
    \ constraints exist (such as only allowing mypy-extensions to be a version greater\
    \ or equal to 0.4.3, but less than 0.5.0). With these tools, you can get a handy\
    \ pictorial representation of your packaged dependencies. This is extremely useful\
    \ for projects with a large number of dependencies, especially if you actively\
    \ maintain a lot of the packages.\n\n## Visualizing Imports\n\nVisualizing packages\
    \ is quite a high-level view, so it helps to go one step deeper. How can you find\
    \ out what's being imported at the module level? Another tool, called pydeps,\
    \ is great for this.\n\nTo install it, you can:\n\n```\npip install pydeps\n```\n\
    \nOnce installed, you can run:\n\n```\npydeps --show-deps <source code location>\
    \ -T png -o deps.png\n```\n\nI ran this for mypy and received a very complex and\
    \ dense graph. Reproducing it in print would be a waste of paper, so I've decided\
    \ to zoom into a specific section in Figure 16-6."
  mdcn: "我曾参与过一个存储网络接口的代码库。有两部分代码依赖于这些接口：一个系统用于性能统计，另一个用于与其他系统建立通信路径。问题在于，它们对这些接口的排序有不同的假设。多年来一直运行正常，直到新增了网络接口。由于通信路径的工作方式，新接口需要放在列表的前面。但性能统计系统只有在接口位于列表后面时才能正常工作。由于存在隐藏的逻辑依赖，这两部分代码被紧密地联系在一起（我从未想过添加通信路径会破坏性能统计功能）。\n\
    \n事后看来，修复很简单。我创建了一个函数，将通信路径期望的排序映射到一个重新排序的列表。性能统计系统随后依赖于这个新函数。然而，这并不能追溯修复这个bug（也无法挽回我为弄清楚性能统计为何出错而花费的数小时）。每当你在代码中创建一个不直接明显的依赖时，都要想办法让它变得明显。留下面包屑线索，最好通过单独的代码路径（如上面的中间函数）或类型来实现。如果做不到，就留下注释。如果网络接口列表中有一条注释表明依赖于特定排序，我就不会为那段代码如此头疼了。\n\
    \n## 时间依赖\n\n最后一种依赖是时间依赖。这实际上是一种逻辑依赖，但处理方式略有不同。*时间依赖*是通过时间链接的依赖。任何时候存在具体的操作顺序，比如“必须先放面团，再放酱料和奶酪”或“必须先付款，披萨才开始制作”，你就有了时间依赖。大多数时间依赖是直接明了的；它们是业务领域的自然组成部分。（没有面团，你把披萨酱和奶酪放哪里呢？）这些不会给你带来问题的时间依赖。相反，问题出在那些不总是那么明显的时间依赖上。\n\
    \n时间依赖在你必须按特定顺序执行某些操作，但你没有迹象表明需要这样做的情况下，最会让你头疼。想象一下，如果你的自动披萨机可以配置两种模式：单份披萨（用于高质量披萨）或批量生产（用于廉价快速的披萨）。每当披萨机从单份模式切换到批量生产模式时，都需要进行显式重新配置。如果重新配置没有发生，机器的安全机制会启动，拒绝制作披萨，直到手动操作员覆盖为止。\n\
    \n当这个选项首次引入时，开发者会极其小心地确保在调用`mass_produce`之前，例如：\n\n```\npizza_maker.mass_produce(number_of_pizzas=50,\
    \ type=PizzaType.CHEESE)\n```\n\n必须有一个检查：\n\n```\nif not pizza_maker.is_configured(ProductionType.MASS_PRODUCE):\n\
    \    pizza_maker.configure_for_mass_production()\n    pizza_maker.wait_for_reconfiguration()\n\
    ```\n\n开发者在代码审查中勤奋地寻找这段代码，并确保始终进行适当的检查。然而，随着岁月流逝，开发者在项目中更替，团队对强制性检查的知识开始减少。想象一下，一款新的自动披萨机型号上市，它不需要重新配置（调用`configure_for_mass_production`不会对系统产生任何改变）。只熟悉这个新型号的开发者可能永远不会想到在这些情况下调用`configure_for_mass_production`。\n\
    \n现在，把自己想象成几年后的一名开发者。假设你正在为披萨机编写新功能，而`mass_produce`函数正好符合你需要的用例。你如何知道需要对批量生产进行显式检查，尤其是对于旧型号？单元测试对你没有帮助，因为新功能还没有单元测试。你真的想等到集成测试失败（或客户投诉）才发现你漏掉了那个检查吗？\n\
    \n以下是一些策略，可以缓解遗漏此类检查的问题：\n\n- *依赖你的类型系统*\n  通过将某些操作限制为特定类型，你可以防止混淆。想象一下，如果`mass_produce`只能从`MassProductionPizzaMaker`对象调用。你可以编写函数调用，确保`MassProductionPizzaMaker`只在重新配置后创建。你正在使用类型系统来使错误变得不可能（NewType的功能非常相似，如第4章所述）。\n\
    \n- *将前置条件嵌入更深*\n  披萨机在使用前必须配置这一事实是一个*前置条件*。考虑通过将检查移入`mass_produce`内部，使其成为`mass_produce`函数的前置条件。思考你将如何处理错误条件（例如抛出异常）。你将能够防止违反时间依赖，但你在运行时引入了不同的错误。你的具体用例将决定你认为哪种情况是两害相权取其轻：违反时间依赖还是处理新的错误情况。\n\
    \n- *留下面包屑线索*\n  这不一定是一种捕获被违反的时间依赖的策略。相反，如果所有其他努力都失败了，它更像是一种最后的手段，用来提醒开发者注意时间依赖。尝试将时间依赖组织在同一个文件中（最好在几行之内）。留下注释和文档，通知未来的开发者这种关联。幸运的话，那些未来的开发者会看到线索，并知道存在时间依赖。\n\
    \n在任何线性程序中，大多数行都对前面的行有时间依赖。这是正常的，你不需要对每种情况都应用缓解措施。相反，寻找那些可能只在特定情况下应用的时间依赖（例如旧型号的机器重新配置），或者那些如果遗漏会造成灾难性后果的时间依赖（例如在将用户输入字符串传递给数据库之前未进行清理）。权衡违反时间依赖的成本与检测和缓解它的努力。这将取决于你的用例，但当你确实缓解了时间依赖时，它可以为你以后节省巨大的麻烦。\n\
    \n## 可视化你的依赖\n\n找到这类依赖并理解在哪里寻找潜在问题点可能具有挑战性。有时你需要更直观的表示。幸运的是，存在工具可以帮助你直观地理解依赖关系。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_255_0.png)\n\n在接下来的许多示例中，我将使用GraphViz库来显示图片。要安装它，请按照[GraphViz网站](https://graphviz.org/)上的说明操作。\n\
    \n## 可视化包\n\n很可能，你的代码使用了其他通过pip安装的包。了解你依赖的所有包、它们的依赖项、这些依赖项的依赖项等等，会很有帮助。\n\n为此，我将安装两个包：pipdeptree和GraphViz。pipdeptree是一个有用的工具，可以告诉你包之间如何交互，而GraphViz负责实际的可视化部分。在这个示例中，我将使用mypy代码库。我已经下载了mypy源代码，创建了一个虚拟环境，并从源代码安装了mypy。²\n\
    \n² 创建虚拟环境是将你的依赖与系统Python安装隔离的好方法。\n\n在该虚拟环境中，我安装了pipdeptree和GraphViz：\n\n```\n\
    pip install pipdeptree graphviz\n```\n\n现在我运行以下命令：\n\n```\npipdeptree --graph-output\
    \ png --exclude pipdeptree,graphviz > deps.png\n```\n\n你可以在图16-5中看到结果。\n\n![](img/d64d2be45ca85b398807d181202e7046_256_0.png)\n\
    \n我将忽略wheel、setuptools和pip包，专注于mypy。在这种情况下，我看到了安装的mypy的确切版本，以及直接依赖项（在这种情况下是typed_ast\
    \ 1.4.2、typing-extensions 3.7.4.3和mypy-extensions 0.4.3）。pipdeptree还很好地指定了存在的版本约束（例如，只允许mypy-extensions版本大于或等于0.4.3，但小于0.5.0）。使用这些工具，你可以获得包依赖关系的便捷图形表示。这对于具有大量依赖项的项目非常有用，特别是如果你积极维护许多包。\n\
    \n## 可视化导入\n\n可视化包是一个相当高层次的视图，因此深入一步会很有帮助。如何找出在模块级别导入了什么？另一个名为pydeps的工具非常适合这个。\n\
    \n要安装它，你可以：\n\n```\npip install pydeps\n```\n\n安装后，你可以运行：\n\n```\npydeps --show-deps\
    \ <source code location> -T png -o deps.png\n```\n\n我为mypy运行了这个命令，得到了一个非常复杂和密集的图。在印刷品中复制它会浪费纸张，所以我决定在图16-6中放大特定部分。"
