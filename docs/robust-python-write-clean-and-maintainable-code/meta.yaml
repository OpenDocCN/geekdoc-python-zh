    float. It’s clearer for all involved that I am dealing with fractional units,
    and can easily do things such as limit_denominator(), which can be called when
    people want to restrict measuring units (instead of relying on a comment).


    I’ve replaced variables with types, such as a recipe type and an ingredient type.
    I’ve also defined operations (clear_ingredients, adjust_proportion) to communicate
    my intent. By making these changes, I’ve made the code’s behavior crystal clear
    to future readers. They no longer have to come talk to me to understand the code.
    Instead, they comprehend what I’m doing without ever talking to me. This is asynchronous
    communication at its finest.


    # Asynchronous Communication


    It’s weird writing about asynchronous communication in a Python book without mentioning
    async and await. But I’m afraid I have to discuss asynchronous communication in
    a much more complex place: the real world.


    Asynchronous communication means that producing information and consuming that
    information are independent of each other. There is a time gap between the production
    and consumption. It might be a few hours, as is the case of collaborators in different
    time zones. Or it might be years, as future maintainers try to do a deep dive
    into the inner workings of code. You can’t predict when somebody will need to
    understand your logic. You might not even be working on that codebase (or for
    that company) by the time they consume the information you produced.'
- md: "Contrast that with *synchronous communication*. Synchronous communication is\
    \ the exchange of ideas live (in real time). This form of direct communication\
    \ is one of the best ways to express your thoughts but unfortunately, it doesn’t\
    \ scale, and you won’t always be around to answer questions.\n\nIn order to evaluate\
    \ how appropriate each method of communication is when trying to understand intentions,\
    \ let’s look at two axes: proximity and cost.\n\n*Proximity* is how close in time\
    \ the communicators need to be in order for that communication to be fruitful.\
    \ Some methods of communication excel with real-time transfer of information.\
    \ Other methods of communication excel at communicating years later.\n\n*Cost*\
    \ is the measure of effort to communicate. You must weigh the time and money expended\
    \ to communicate with the value provided. Your future consumers then have to weigh\
    \ the cost of consuming the information with the value they are trying to deliver.\
    \ Writing code and not providing any other communication channels is your baseline;\
    \ you have to do this to produce value. To evaluate additional communication channels’\
    \ cost, here is what I factor in:\n\n*Discoverability*\nHow easy was it to find\
    \ this information outside of a normal workflow? How ephemeral is the knowledge?\
    \ Is it easy to search for information?\n\n*Maintenance cost*\nHow accurate is\
    \ the information? How often does it need to be updated? What goes wrong if this\
    \ information is out of date?\n\n*Production cost*\nHow much time and money went\
    \ into producing the communication?\n\nIn Figure 1-1, I plot some common communication\
    \ methods’ cost and proximity required, based on my own experience.\n\n![Figure\
    \ 1-1. Plotting cost and proximity of communication methods](img/d64d2be45ca85b398807d181202e7046_29_0.png)\n\
    \nThere are four quadrants that make up the cost/proximity graph.\n\n*Low cost,\
    \ high proximity required*\nThese are cheap to produce and consume, but are not\
    \ scalable across time. Direct communication and instant messaging are great examples\
    \ of these methods. Treat these as snapshots of information in time; they are\
    \ only valuable when the user is actively listening. Don't rely on these methods\
    \ to communicate to the future.\n\n*High cost, high proximity required*\nThese\
    \ are costly events, and often only happen once (such as meetings or conferences).\
    \ These events should deliver a lot of value at the time of communication, because\
    \ they do not provide much value to the future. How many times have you been to\
    \ a meeting that felt like a waste of time? You're feeling the direct loss of\
    \ value. Talks require a multiplicative cost for each attendee (time spent, hosting\
    \ space, logistics, etc.). Code reviews are rarely looked at once they are done.\n\
    \n*High cost, low proximity required*\nThese are costly, but that cost can be\
    \ paid back over time in value delivered, due to the low proximity needed. Emails\
    \ and agile boards contain a wealth of information, but are not discoverable by\
    \ others. These are great for bigger concepts that don't need frequent updates.\
    \ It becomes a nightmare to try and sift through all the noise just to find the\
    \ nugget of information you are looking for. Video recordings and design documentation\
    \ are great for understanding snapshots in time, but are costly to keep updated.\
    \ Don't rely on these communication methods to understand day-to-day decisions.\n\
    \n*Low cost, low proximity required*\nThese are cheap to create, and are easily\
    \ consumable. Code comments, version control history, and project READMEs all\
    \ fall into this category, since they are adjacent to the source code we write.\
    \ Users can view this communication years after it was produced. Anything that\
    \ a developer encounters during their day-to-day workflow is inherently discoverable.\
    \ These communication methods are a natural fit for the first place someone will\
    \ look after the source code. However, your code is one of your best documentation\
    \ tools, as it is the living record and single source of truth for your system.\n\
    \n![Figure 1-1. Plotting cost and proximity of communication methods](img/d64d2be45ca85b398807d181202e7046_30_0.png)\n\
    \n**Discussion Topic**\n\nThis plot in Figure 1-1 was created based on generalized\
    \ use cases. Think about the communication paths you and your organization use.\
    \ Where would you plot them on the graph? How easy is it to consume accurate information?\
    \ How costly is it to produce information? Your answers to these questions may\
    \ result in a slightly different graph, but the single source of truth will be\
    \ in the executable software you deliver.\n\nLow cost, low proximity communication\
    \ methods are the best tools for communicating to the future. You should strive\
    \ to minimize the cost of production and of consumption of communication. You\
    \ have to write software to deliver value anyway, so the lowest cost option is\
    \ making your code your primary communication tool. Your codebase becomes the\
    \ best possible option for expressing your decisions, opinions, and workarounds\
    \ clearly.\n\nHowever, for this assertion to hold true, the code has to be cheap\
    \ to consume as well. Your intent has to come across clearly in your code. Your\
    \ goal is to minimize the time needed for a reader of your code to understand\
    \ it. Ideally, a reader does not need to read your implementation, but just your\
    \ function signature. Through the use of good types, comments and variable names,\
    \ it should be crystal clear what your code does.\n\n## Self-Documenting Code\n\
    \nThe wrong response to Figure 1-1 is “Self-documenting code is all I need!” Code\
    \ should absolutely self-document *what* is being done, but can’t cover every\
    \ use case of communication. For example, version control will give you a history\
    \ of changes. Design documents discuss sweeping ideals that are not local to any\
    \ one code file. Meetings (when done right) can be an important event for synchronizing\
    \ plan execution. Talks are great for sharing ideas with a large audience all\
    \ at once. While this book focuses on what you can do in your code, don’t throw\
    \ away any other valuable means of communication.\n\n## Examples of Intent in\
    \ Python\n\nNow that I’ve talked through what intent is and how it matters, let’s\
    \ look at examples through a Python lens. How can you make sure that you are correctly\
    \ expressing your intentions? I will take a look at two different examples of\
    \ how a decision affects intentions: collections and iteration.\n\n## Collections\n\
    \nWhen you pick a collection, you are communicating specific information. You\
    \ must pick the right collection for the task at hand. Otherwise, maintainers\
    \ will infer the wrong intention from your code.\n\nConsider this code that takes\
    \ a list of cookbooks and provides a mapping between authors and the number of\
    \ books written:\n\n```python\ndef create_author_count_mapping(cookbooks: list[Cookbook]):\n\
    \    counter = {}\n    for cookbook in cookbooks:\n        if cookbook.author\
    \ not in counter:\n            counter[cookbook.author] = 0\n        counter[cookbook.author]\
    \ += 1\n    return counter\n```\n\nWhat does my use of collections tell you? Why\
    \ am I not passing a dictionary or a set? Why am I not returning a list? Based\
    \ on my current usage of collections, here’s what you can assume:\n\n- I pass\
    \ in a list of cookbooks. There may be duplicate cookbooks in this list (I might\
    \ be counting a shelf of cookbooks in a store with multiple copies).\n- I am returning\
    \ a dictionary. Users can look up a specific author, or iterate over the entire\
    \ dictionary. I do not have to worry about duplicate authors in the returned collection.\n\
    \nWhat if I wanted to communicate that no duplicates should be passed into this\
    \ function? A list communicates the wrong intention. Instead, I should have chosen\
    \ a set to communicate that this code absolutely will not handle duplicates.\n\
    \nChoosing a collection tells readers about your specific intentions. Here's a\
    \ list of common collection types, and the intention they convey:\n\n*List*\n\
    This is a collection to be iterated over. It is *mutable*: able to be changed\
    \ at any time. Very rarely do you expect to be retrieving specific elements from\
    \ the middle of the list (using a static list index). There may be duplicate elements.\
    \ The cookbooks on a shelf might be stored in a list.\n\n*String*\nAn immutable\
    \ collection of characters. The name of a cookbook would be a string.\n\n*Generator*\n\
    A collection to be iterated over, and never indexed into. Each element access\
    \ is performed lazily, so it may take time and/or resources through each loop\
    \ iteration. They are great for computationally expensive or infinite collections.\
    \ An online database of recipes might be returned as a generator; you don't want\
    \ to fetch all the recipes in the world when the user is only going to look at\
    \ the first 10 results of a search.\n\n*Tuple*\nAn immutable collection. You do\
    \ not expect it to change, so it is more likely to extract specific elements from\
    \ the middle of the tuple (either through indices or unpacking). It is very rarely\
    \ iterated over. The information about a specific cookbook might be represented\
    \ as a tuple, such as `(cookbook_name, author, page count)`.\n\n*Set*\nAn iterable\
    \ collection that contains no duplicates. You cannot rely on ordering of elements.\
    \ The ingredients in a cookbook might be stored as a set.\n\n*Dictionary*\nA mapping\
    \ from keys to values. Keys are unique across the dictionary. Dictionaries are\
    \ typically iterated over, or indexed into using dynamic keys. A cookbook's index\
    \ is a great example of a key to value mapping (from topic to page number.)\n\n\
    Do not use the wrong collection for your purposes. Too many times have I come\
    \ across a list that should not have had duplicates or a dictionary that wasn't\
    \ actually being used to map keys to values. Every time there is a disconnect\
    \ between what you intend and what is in code, you create a maintenance burden.\
    \ Maintainers must"
  mdcn: "与*同步通信*形成对比。同步通信是实时（即时）的思想交流。这种直接的沟通方式是表达想法的最佳途径之一，但不幸的是，它无法扩展，而且你不可能总是在场回答问题。\n\
    \n为了评估在试图理解意图时，每种沟通方式的适用性，让我们来看两个维度：接近度和成本。\n\n*接近度*是指沟通者需要在时间上多接近，才能使沟通富有成效。有些沟通方式擅长实时信息传递，而另一些则擅长在多年后进行沟通。\n\
    \n*成本*是沟通所需付出的努力的衡量。你必须权衡沟通所花费的时间和金钱与所提供的价值。你的未来消费者则需要权衡获取信息的成本与他们试图传递的价值。编写代码而不提供任何其他沟通渠道是你的基线；你必须这样做才能产生价值。为了评估额外沟通渠道的成本，以下是我考虑的因素：\n\
    \n*可发现性*\n在正常工作流程之外，找到这些信息有多容易？这些知识有多短暂？信息是否易于搜索？\n\n*维护成本*\n信息有多准确？需要多久更新一次？如果信息过时会出什么问题？\n\
    \n*生产成本*\n生产这些沟通投入了多少时间和金钱？\n\n在图1-1中，我根据自己的经验，绘制了一些常见沟通方法的成本和所需接近度。\n\n![图1-1.\
    \ 绘制沟通方法的成本和接近度](img/d64d2be45ca85b398807d181202e7046_29_0.png)\n\n成本/接近度图由四个象限组成。\n\
    \n*低成本，高接近度要求*\n这些方法生产成本低，消费成本也低，但无法跨时间扩展。直接沟通和即时消息是这类方法的绝佳例子。将它们视为时间点上的信息快照；它们只在用户积极倾听时才有价值。不要依赖这些方法向未来传递信息。\n\
    \n*高成本，高接近度要求*\n这些是昂贵的活动，通常只发生一次（例如会议或研讨会）。这些活动在沟通时应该提供大量价值，因为它们对未来提供的价值有限。你有多少次参加过感觉浪费时间的会议？你感受到的就是价值的直接损失。演讲需要为每位参与者付出倍增的成本（花费的时间、举办场地、后勤等）。代码审查完成后很少再被查看。\n\
    \n*高成本，低接近度要求*\n这些方法成本高昂，但由于所需的接近度低，其成本可以随着时间的推移通过传递的价值得到回报。电子邮件和敏捷看板包含大量信息，但不易被他人发现。它们非常适合那些不需要频繁更新的更大概念。试图从所有噪音中筛选出你想要的信息片段会变成一场噩梦。视频录像和设计文档非常适合理解时间点上的快照，但保持更新的成本很高。不要依赖这些沟通方法来理解日常决策。\n\
    \n*低成本，低接近度要求*\n这些方法创建成本低，且易于消费。代码注释、版本控制历史和项目README都属于这一类，因为它们与我们编写的源代码相邻。用户可以在产生这些沟通多年后查看它们。开发者在日常工作中遇到的任何东西都具有内在的可发现性。这些沟通方法天然适合成为人们在查看源代码后首先寻找的地方。然而，你的代码是你最好的文档工具之一，因为它是系统的活记录和唯一的真实来源。\n\
    \n![图1-1. 绘制沟通方法的成本和接近度](img/d64d2be45ca85b398807d181202e7046_30_0.png)\n\n**讨论话题**\n\
    \n图1-1中的这个图表是基于通用用例创建的。思考一下你和你的组织使用的沟通路径。你会将它们绘制在图表的哪个位置？获取准确信息有多容易？生产信息有多昂贵？你对这些问题的答案可能会产生一个略有不同的图表，但唯一的真实来源将是你交付的可执行软件。\n\
    \n低成本、低接近度的沟通方法是向未来传递信息的最佳工具。你应该努力最小化沟通的生产和消费成本。无论如何你都必须编写软件来交付价值，因此最低成本的选择是让你的代码成为你的主要沟通工具。你的代码库成为清晰表达你的决策、观点和变通方法的最佳选择。\n\
    \n然而，要使这一论断成立，代码也必须易于消费。你的意图必须在代码中清晰地传达出来。你的目标是最大限度地减少代码读者理解它所需的时间。理想情况下，读者不需要阅读你的实现，只需要阅读你的函数签名。通过使用良好的类型、注释和变量名，你的代码功能应该一目了然。\n\
    \n## 自文档化代码\n\n对图1-1的错误反应是“我只需要自文档化代码！”代码绝对应该自文档化*正在做什么*，但无法涵盖沟通的每一个用例。例如，版本控制会给你变更历史。设计文档讨论的是不局限于任何单个代码文件的宏大理念。会议（如果做得好）可以是同步计划执行的重要事件。演讲非常适合一次性与大量观众分享想法。虽然本书专注于你能在代码中做什么，但不要丢弃任何其他有价值的沟通方式。\n\
    \n## Python中的意图示例\n\n既然我已经讨论了什么是意图以及它为何重要，让我们通过Python的视角来看一些例子。你如何确保正确地表达你的意图？我将通过两个不同的例子来说明决策如何影响意图：集合和迭代。\n\
    \n## 集合\n\n当你选择一个集合时，你是在传达特定的信息。你必须为手头的任务选择正确的集合。否则，维护者会从你的代码中推断出错误的意图。\n\n考虑这段代码，它接收一个食谱书列表，并提供作者与所写书籍数量之间的映射：\n\
    \n```python\ndef create_author_count_mapping(cookbooks: list[Cookbook]):\n   \
    \ counter = {}\n    for cookbook in cookbooks:\n        if cookbook.author not\
    \ in counter:\n            counter[cookbook.author] = 0\n        counter[cookbook.author]\
    \ += 1\n    return counter\n```\n\n我对集合的使用告诉你什么？为什么我不传递一个字典或一个集合？为什么我不返回一个列表？根据我目前对集合的使用，你可以假设：\n\
    \n- 我传递的是一个食谱书列表。这个列表中可能有重复的食谱书（我可能在统计书店书架上有多本副本的食谱书）。\n- 我返回的是一个字典。用户可以查找特定作者，或者遍历整个字典。我不必担心返回集合中有重复的作者。\n\
    \n如果我想传达不应该向此函数传递重复项呢？列表传达了错误的意图。相反，我应该选择一个集合来传达这段代码绝对不会处理重复项。\n\n选择集合可以告诉读者你的具体意图。以下是一些常见集合类型及其传达的意图：\n\
    \n*列表*\n这是一个要被迭代的集合。它是*可变的*：可以随时更改。你很少期望从列表中间检索特定元素（使用静态列表索引）。可能存在重复元素。书架上的食谱书可能存储在列表中。\n\
    \n*字符串*\n一个不可变的字符集合。食谱书的名称将是一个字符串。\n\n*生成器*\n一个要被迭代的集合，且永远不会被索引。每个元素的访问都是惰性执行的，因此每次循环迭代可能需要时间和/或资源。它们非常适合计算成本高昂或无限的集合。在线食谱数据库可能作为生成器返回；当用户只打算查看搜索的前10个结果时，你不想获取世界上所有的食谱。\n\
    \n*元组*\n一个不可变的集合。你不期望它改变，因此更可能从元组中间提取特定元素（通过索引或解包）。它很少被迭代。关于特定食谱书的信息可能表示为一个元组，例如\
    \ `(cookbook_name, author, page count)`。\n\n*集合*\n一个不包含重复项的可迭代集合。你不能依赖元素的顺序。食谱书中的成分可能存储为一个集合。\n\
    \n*字典*\n一个从键到值的映射。键在字典中是唯一的。字典通常被迭代，或使用动态键进行索引。食谱书的索引是键值映射（从主题到页码）的一个绝佳例子。\n\n\
    不要为你的目的使用错误的集合。我遇到过太多次本不该有重复项的列表，或者实际上并未用于映射键值的字典。每次你的意图与代码中的内容之间存在脱节，你都会制造维护负担。维护者必须"
