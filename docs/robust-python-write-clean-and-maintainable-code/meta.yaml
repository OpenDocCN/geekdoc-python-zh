    \n## 结语\n\n基于属性的测试并非为了取代传统测试；它是为了补充传统测试。当你的代码具有明确定义的输入和输出时，使用硬编码的前置条件和预期断言进行测试就足够了。然而，随着你的代码变得越来越复杂，你的测试也会变得越来越复杂，你会发现自己花费比预期更多的时间来解析和理解测试。\n\
