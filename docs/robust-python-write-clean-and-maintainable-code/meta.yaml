- md: "## Closing Thoughts\n\nCatching errors early saves you time and money. Your\
    \ goal is to find errors as you develop code. Static analysis tools are your friends\
    \ in this endeavor. They are a cheap, quick way to find any problems in your codebase.\
    \ There are a variety of static analyzers to meet your needs: linters, security\
    \ checkers, and complexity checkers. Each has its own purpose and provides a layer\
    \ of defense. And for the errors that these tools don't catch, you extend the\
    \ static analyzers through the use of a plug-in system.\n\nWhile static analyzers\
    \ are your first line of defense, they are not your only line. For the rest of\
    \ the book, I will focus on tests. The next chapter will focus on your testing\
    \ strategy. I'll walk through how you need to organize your tests, as well as\
    \ the best practices surrounding writing tests. You'll learn how to write a testing\
    \ triangle, how to ask the right questions around testing, and how to write effective\
    \ developer tests.\n\n## CHAPTER 21\n### Testing Strategy\n\nTests are one of\
    \ most important safety nets you can build around your codebase. It is incredibly\
    \ comforting to make a change and see that all tests pass afterwards. However,\
    \ it is challenging to gauge the best use of your time regarding testing. Too\
    \ many tests and they become a burden; you spend more time maintaining tests than\
    \ delivering features. Too few tests and you are letting potential catastrophes\
    \ make it into production.\n\nIn this chapter, I will ask you to focus on your\
    \ testing strategy. I'll break down the different types of tests and how to choose\
    \ which tests to write. I'll focus on Python best practices around test construction,\
    \ and then I'll end with some common testing strategies specific to Python.\n\n\
    ### Defining Your Test Strategy\n\nBefore you write tests, you should decide what\
    \ your *test strategy* will be. A test strategy is a plan for spending time and\
    \ effort to test your software in order to mitigate risk. This strategy will influence\
    \ what types of tests you write, how you write them, and how much time you spend\
    \ writing (and maintaining) them. Everybody's test strategy will be different,\
    \ but they will all be in a similar form: a list of questions about your system\
    \ and how you plan on answering them. For example, if I were writing a calorie-counting\
    \ app, here would be a part of my test strategy:\n\n```\nDoes my system function\
    \ as expected?\nTests to write (automated - run daily):\n    Acceptance tests:\
    \ Adding calories to the daily count\n    Acceptance tests: Resetting calories\
    \ on daily boundaries\n    Acceptance tests: Aggregating calories over a time\
    \ period\n    Unit tests: Corner Cases\n    Unit tests: Happy Path\n```\n\nWill\
    \ this application be usable by a large user base?\nTests to write (automated\
    \ - run weekly):\n    Interoperability tests: Phones (Apple, Android, etc.)\n\
    \    Interoperability tests: Tablets\n    Interoperability tests: Smart Fridge\n\
    \nIs it hard to use maliciously?\nTests to write: (ongoing audit by security engineer)\n\
    \    Security tests: Device Interactions\n    Security tests: Network Interactions\n\
    \    Security tests: Backend Vulnerability Scanning (automated)\n\n... etc. ...\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_317_0.png)\n\n> Do not treat your test\
    \ strategy as a static document that is created once and never modified. As you\
    \ develop your software, continue to ask questions as they come to mind, and discuss\
    \ whether your strategy needs to evolve as you learn more.\n\nThis test strategy\
    \ will govern where you put your focus for writing tests. As you start to fill\
    \ it out, the first thing you need to do is understand what a test is and why\
    \ you write them.\n\n### What Is a Test?\n\nYou should understand the *what* and\
    \ the *why* you are writing the software. Answering these questions will frame\
    \ your goals for writing tests. Tests serve as a way of verifying *what* the code\
    \ is doing, and you write tests so that you don't negatively impact the *why*.\
    \ Software produces value. That's it. Every piece of software has some value attached\
    \ to it. Web apps provide important services for the general population. Data\
    \ science pipelines may create prediction models that help us better understand\
    \ the patterns in our world. Even malicious software has value; the people who\
    \ are performing the exploit are using the software to achieve a goal (even if\
    \ there is negative value to anyone affected).\n\nThat's *what* software provides,\
    \ but *why* does anyone write software? Most people answer \"money,\" and I don't\
    \ want to knock that, but there are other reasons too. Sometimes software is written\
    \ for money, sometimes it's written for self-fulfillment, and sometimes it's written\
    \ for advertising (such as contributing to an open source project to bolster a\
    \ resume). Tests serve as validation for these systems. They go so much deeper\
    \ than just catching errors or giving you confidence in shipping a product.\n\n\
    If I'm writing some code for learning purposes, my *why* is purely for self-fulfillment,\
    \ and the value is derived from how much I learn. If I do things wrong, that is\
    \ still a learning opportunity; I can get by if all my tests are just manual spot\
    \ checks at the end of the project. However, a company that markets tools to other\
    \ developers might have a completely different strategy. Developers at that company\
    \ may choose to write tests to make sure they are not regressing any functionality\
    \ so that the company does not lose customers (which would translate to a loss\
    \ of profit). Each of these projects needs a different level of testing.\n\nSo,\
    \ what is a test? Is it something that catches errors? Is it something that gives\
    \ you confidence to ship your product? Yes, but the true answer goes a little\
    \ deeper. Tests answer questions about your system. I want you to think about\
    \ the software you write. What is its purpose? What do you want to always know\
    \ about the things you build? The things that are important to you form your test\
    \ strategy.\n\nWhen you ask yourself questions, you really are asking yourself\
    \ what tests you find valuable:\n\n- Will my application handle a predicted load?\n\
    - Does my code meet the customer’s needs?\n- Is my application secure?\n- What\
    \ happens when a customer inputs bad data into my system?\n\nEach one of these\
    \ questions points to a different type of test that you might need to write. Check\
    \ out Table 21-1 for a list of common questions and the appropriate tests that\
    \ answer those questions.\n\n*Table 21-1. Types of tests and the questions they\
    \ answer*\n\n| Test type | Question the test answers |\n| :--- | :--- |\n| Unit\
    \ | Do units (functions and classes) act as developers expect? |\n| Integration\
    \ | Are separate parts of the system stitched together properly? |\n| Acceptance\
    \ | Does the system do what the end user expects? |\n| Load | Does the system\
    \ stay operational under heavy duress? |\n| Security | Does the system resist\
    \ specific attacks and exploits? |\n| Usability | Is the system intuitive to use?\
    \ |\n\n### A Note About Manual Testing\n\nSince this is a book about robust Python,\
    \ I am focusing mostly on your codebase and the tools that support it. This means\
    \ there is a heavy bias toward automated testing in Python. However, do not take\
    \ this to mean that manual testing should be tossed to the wayside.\n\n*Manual\
    \ testing*, which is having a person execute testing steps instead of the computer,\
    \ has its place. It is fantastic for things such as exploring your codebase in\
    \ ways that are not easy for a computer, such as validating how a user will interact\
    \ with your system, checking for security vulnerabilities, or running any other\
    \ type of test that relies on subjective analysis.\n\nIn cases where it is cheaper\
    \ to run manual tests than automated tests (say for expensive test equipment or\
    \ other constraints), it may also be appropriate to keep a human in the loop.\
    \ Before you jump to this conclusion, though, factor in the cost of repetition:\
    \ think through how often you will run the test. In some cases, the cost of manual\
    \ testing will overtake the cost of automated testing after just a few test runs.\n\
    \nNotice that Table 21-1 did not say anything about making sure your software\
    \ is bug free. As Edsger Dijkstra wrote, “Program testing can be used to show\
    \ the presence of bugs, but never to show their absence!”¹ Tests answer questions\
    \ regarding the *quality* of your software.\n\n*Quality* is this nebulous, ill-defined\
    \ term that gets tossed around quite a bit. It’s a tough thing to pin down, but\
    \ I prefer this quote from Gerald Weinberg: “Quality is value to some person.”²\
    \ I love how open-ended this quote is; you need to think of anyone who may receive\
    \ some value from your system. It’s not just your direct customers, but your customers’\
    \ customers, your operations team, your sales, your coworkers, and so on.\n\n\
    Once you’ve identified who receives the value of your system, you need to measure\
    \ the impact when something goes wrong. For every test that is not run, you lose\
    \ a chance to learn whether you are delivering value. What is the impact if that\
    \ value is not delivered? For core business needs, the impact is pretty high.\
    \ For features that lie outside of an end user’s critical path, the impact may\
    \ be low. Know your impact, and weigh that against the cost of testing. If the\
    \ impact’s cost is higher than the test, write\n\n¹ Edsger W. Dijkstra. “Notes\
    \ on Structured Programming.” Technological University Eindhoven, The Netherlands,\
    \ Department of Mathematics, 1970. https://oreil.ly/NAhWf.\n\n² Gerald M. Weinberg.\
    \ *Quality Software Management*. Vol. 1: *Systems Thinking*. New York, NY: Dorset\
    \ House Publishing, 1992."
  mdcn: "## 结语\n\n尽早发现错误能为你节省时间和金钱。你的目标是在开发代码时就发现错误。静态分析工具是实现这一目标的得力助手。它们是一种廉价、快速的方式来发现代码库中的任何问题。有多种静态分析工具可以满足你的需求：代码检查工具、安全检查工具和复杂度检查工具。每种工具都有其特定用途，并提供一层防护。对于这些工具未能捕获的错误，你可以通过插件系统来扩展静态分析工具的功能。\n\
    \n虽然静态分析工具是你的第一道防线，但它们并非唯一的防线。在本书的剩余部分，我将重点讨论测试。下一章将聚焦于你的测试策略。我将详细介绍如何组织测试，以及围绕编写测试的最佳实践。你将学习如何构建测试三角，如何提出关于测试的正确问题，以及如何编写有效的开发者测试。\n\
    \n## 第21章\n### 测试策略\n\n测试是你能为代码库构建的最重要的安全网之一。做出更改后看到所有测试都通过，这会带来极大的安慰。然而，如何合理分配时间进行测试却颇具挑战。测试过多会成为负担；你花费在维护测试上的时间会超过交付功能的时间。测试过少则可能让潜在的灾难性问题进入生产环境。\n\
    \n在本章中，我将请你专注于你的测试策略。我将分解不同类型的测试，以及如何选择编写哪些测试。我将重点介绍围绕测试构建的Python最佳实践，最后以一些特定于Python的常见测试策略作为结束。\n\
    \n### 定义你的测试策略\n\n在编写测试之前，你应该决定你的*测试策略*是什么。测试策略是一个计划，用于分配时间和精力来测试你的软件，以降低风险。这个策略将影响你编写哪些类型的测试、如何编写测试，以及你花费多少时间编写（和维护）测试。每个人的测试策略都会不同，但它们的形式都相似：一份关于你的系统以及你计划如何回答这些问题的清单。例如，如果我正在编写一个卡路里计数应用，我的测试策略的一部分可能是：\n\
    \n```\n我的系统是否按预期运行？\n需要编写的测试（自动化 - 每日运行）：\n    验收测试：向每日计数添加卡路里\n    验收测试：在每日边界重置卡路里\n\
    \    验收测试：在一段时间内汇总卡路里\n    单元测试：边界情况\n    单元测试：正常路径\n```\n\n这个应用程序是否可供大量用户使用？\n\
    需要编写的测试（自动化 - 每周运行）：\n    互操作性测试：手机（苹果、安卓等）\n    互操作性测试：平板电脑\n    互操作性测试：智能冰箱\n\
    \n是否难以被恶意使用？\n需要编写的测试：（由安全工程师持续审计）\n    安全测试：设备交互\n    安全测试：网络交互\n    安全测试：后端漏洞扫描（自动化）\n\
    \n... 等等 ...\n\n![](img/d64d2be45ca85b398807d181202e7046_317_0.png)\n\n> 不要将你的测试策略视为一个创建后就永不修改的静态文档。在开发软件的过程中，继续在想到问题时提出问题，并在了解更多情况时讨论你的策略是否需要演进。\n\
    \n这个测试策略将指导你将编写测试的重点放在哪里。当你开始填写它时，你需要做的第一件事是理解什么是测试以及为什么编写测试。\n\n### 什么是测试？\n\n\
    你应该理解你编写软件的*目的*和*原因*。回答这些问题将为你编写测试的目标设定框架。测试是验证代码*在做什么*的一种方式，你编写测试是为了不负面影响软件的*目的*。软件创造价值。仅此而已。每个软件都附带某种价值。Web应用为大众提供重要服务。数据科学流程可能创建预测模型，帮助我们更好地理解世界中的模式。即使是恶意软件也有价值；执行漏洞利用的人使用软件来实现目标（即使对受影响的人来说是负面价值）。\n\
    \n这是软件*提供*的东西，但*为什么*有人编写软件？大多数人回答“钱”，我不想贬低这一点，但也有其他原因。有时软件是为钱而写，有时是为自我实现而写，有时是为广告而写（例如为开源项目做贡献以增强简历）。测试是对这些系统的验证。它们远不止是捕获错误或让你对发布产品有信心那么简单。\n\
    \n如果我为了学习目的编写一些代码，我的*目的*纯粹是为了自我实现，价值来源于我学到了多少。如果我做错了，这仍然是一个学习机会；如果我所有的测试都只是在项目结束时进行手动抽查，我也可以应付。然而，一家向其他开发者销售工具的公司可能有完全不同的策略。该公司的开发者可能会选择编写测试，以确保他们没有回退任何功能，这样公司就不会失去客户（这将转化为利润损失）。每个项目都需要不同级别的测试。\n\
    \n那么，什么是测试？它是捕获错误的东西吗？它是让你有信心发布产品的东西吗？是的，但真正的答案更深入一些。测试回答关于你的系统的问题。我希望你思考你编写的软件。它的目的是什么？你希望始终了解你构建的东西的哪些方面？对你重要的事情构成了你的测试策略。\n\
    \n当你问自己问题时，你实际上是在问自己你认为哪些测试是有价值的：\n\n- 我的应用程序能否处理预期的负载？\n- 我的代码是否满足客户的需求？\n- 我的应用程序是否安全？\n\
    - 当客户向我的系统输入错误数据时会发生什么？\n\n这些问题中的每一个都指向你可能需要编写的不同类型的测试。请查看表21-1，了解常见问题列表以及回答这些问题的相应测试。\n\
    \n*表21-1. 测试类型及其回答的问题*\n\n| 测试类型 | 测试回答的问题 |\n| :--- | :--- |\n| 单元测试 | 单元（函数和类）是否按开发者的预期运行？\
    \ |\n| 集成测试 | 系统的各个部分是否正确地连接在一起？ |\n| 验收测试 | 系统是否做了最终用户期望的事情？ |\n| 负载测试 | 系统在重压下是否能保持运行？\
    \ |\n| 安全测试 | 系统是否能抵御特定的攻击和漏洞利用？ |\n| 可用性测试 | 系统是否直观易用？ |\n\n### 关于手动测试的说明\n\n\
    由于这是一本关于健壮Python的书，我主要关注你的代码库和支持它的工具。这意味着在Python中，我们强烈倾向于自动化测试。然而，不要因此认为手动测试应该被抛弃。\n\
    \n*手动测试*，即由人而不是计算机执行测试步骤，有其适用之处。它非常适合那些计算机不容易做到的事情，例如以计算机不易实现的方式探索你的代码库，验证用户将如何与你的系统交互，检查安全漏洞，或运行任何其他依赖于主观分析的测试。\n\
    \n在运行手动测试比自动化测试更便宜的情况下（例如，由于昂贵的测试设备或其他限制），让人类参与其中也可能是合适的。不过，在得出这个结论之前，请考虑重复的成本：想一想你将运行测试的频率。在某些情况下，仅仅几次测试运行后，手动测试的成本就会超过自动化测试的成本。\n\
    \n请注意，表21-1没有提到确保你的软件没有错误。正如艾兹格·迪科斯彻所写：“程序测试可以用来显示错误的存在，但永远不能用来证明错误的不存在！”¹ 测试回答的是关于软件*质量*的问题。\n\
    \n*质量*是一个模糊、定义不清的术语，经常被提及。它很难准确定义，但我喜欢杰拉尔德·温伯格的这句话：“质量是对某些人的价值。”² 我喜欢这句话的开放性；你需要考虑任何可能从你的系统中获得价值的人。这不仅仅是你的直接客户，还有你客户的客户、你的运营团队、你的销售、你的同事等等。\n\
    \n一旦你确定了谁从你的系统中获得价值，你就需要衡量当出现问题时的影响。每一个未运行的测试，你都失去了一个了解你是否在提供价值的机会。如果这个价值没有被提供，影响是什么？对于核心业务需求，影响相当大。对于不在最终用户关键路径上的功能，影响可能很小。了解你的影响，并将其与测试成本进行权衡。如果影响的成本高于测试成本，就编写测试。\n\
    \n¹ 艾兹格·W·迪科斯彻。“结构化编程笔记。”荷兰埃因霍温理工大学数学系，1970年。https://oreil.ly/NAhWf。\n\n² 杰拉尔德·M·温伯格。《质量软件管理》。第1卷：《系统思维》。纽约州纽约市：多塞特出版社，1992年。"
