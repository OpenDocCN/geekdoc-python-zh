    numbers: list[int] = []\nratio: float = get_ratio(5,3)\n```\n\nWhile I will annotate\
    \ all of my functions, I typically don't bother annotating variables unless there\
    \ is something specific I want to convey in my code (such as a type that is different\
    \ than expected). I don't want to get too into the realm of putting type annotations\
    \ on literally everything—the lack of verbosity is what drew many developers to\
    \ Python in the first place. The types can clutter your code, especially when\
    \ it is blindingly obvious what the type is.\n\n```\npython\nnumber: int = 0\n\
