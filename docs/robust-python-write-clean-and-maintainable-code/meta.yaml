- md: "## Magic Methods\n\nMagic methods allow you to define custom behavior when\
    \ built-in operations are invoked in Python. A magic method is prefixed and suffixed\
    \ by two underscores. Because of this, they are sometimes called dunder methods\
    \ (or double underscore methods). You've already seen them in earlier chapters:\n\
    \n- In Chapter 10, I used the `__init__` method to construct a class. `__init__`\
    \ gets called whenever a class is constructed.\n- In Chapter 9, I used `__lt__`,\
    \ `__gt__`, and others to define what happens when two objects were compared with\
    \ < or >, respectively.\n- In Chapter 5, I introduced `__getitem__` for intercepting\
    \ calls to indexing with brackets such as `recipes['Stromboli']`.\n\nI can use\
    \ the magic method `__add__` to control behavior for addition:\n\n```python\n\
    @dataclass(frozen=True)\nclass Ingredient:\n    name: str\n    brand: str\n  \
    \  amount: float = 1\n    units: ImperialMeasure = ImperialMeasure.CUP\n\n   \
    \ def __add__(self, rhs: Ingredient):\n        # make sure we are adding the same\
    \ ingredient\n        assert (self.name, self.brand) == (rhs.name, rhs.brand)\n\
    \        # build up conversion chart (lhs, rhs): multiplication factor\n     \
    \   conversion: dict[tuple[ImperialMeasure, ImperialMeasure], float] = {\n   \
    \         (ImperialMeasure.CUP, ImperialMeasure.CUP): 1,\n            (ImperialMeasure.CUP,\
    \ ImperialMeasure.TABLESPOON): 16,\n            (ImperialMeasure.CUP, ImperialMeasure.TEASPOON):\
    \ 48,\n            (ImperialMeasure.TABLESPOON, ImperialMeasure.CUP): 1/16,\n\
    \            (ImperialMeasure.TABLESPOON, ImperialMeasure.TABLESPOON): 1,\n  \
    \          (ImperialMeasure.TABLESPOON, ImperialMeasure.TEASPOON): 3,\n      \
    \      (ImperialMeasure.TEASPOON, ImperialMeasure.CUP): 1/48,\n            (ImperialMeasure.TEASPOON,\
    \ ImperialMeasure.TABLESPOON): 1/3,\n            (ImperialMeasure.TEASPOON, ImperialMeasure.TEASPOON):\
    \ 1\n        }\n\n        return Ingredient(rhs.name,\n                      \
    \    rhs.brand,\n                          rhs.amount + self.amount * conversion[(rhs.units,\n\
    \                                                                self.units)],\n\
    \                          rhs.units)\n```\n\nNow with the `__add__` method defined,\
    \ I can add ingredients together with the + operator. The add_ingredient method\
    \ can look like the following:\n\n```python\ndef add_ingredient(self, ingredient:\
    \ Ingredient):\n    '''Adds the ingredient if it's not already added,\n      \
    \ or increases the amount if it has '''\n\n    target_ingredient = self._get_matching_ingredient(ingredient)\n\
    \    if target_ingredient is None:\n        # ingredient for the first time -\
    \ add it\n        self.__ingredients.add(ingredient)\n    else:\n        # add\
    \ ingredient to existing set\n        target_ingredient += ingredient\n```\n\n\
    I can now express the idea of adding ingredients naturally. It doesn't stop here,\
    \ either. I can define subtraction, or multiplication/division (for scaling serving\
    \ numbers), or comparison. It is far easier for users to understand your codebase\
    \ when such natural operations are available. Just about every operation in Python\
    \ has a magic method backing it. There are so many that I can't even begin to\
    \ enumerate them all. However, some common methods are listed in Table 11-1.\n\
    \nTable 11-1. Common magic methods in Python\n\n| Magic method | Used for |\n\
    | :--- | :--- |\n| `__add__`, `__sub__`, `__mul__`, `__div__` | Arithmetic operations\
    \ (add, subtract, multiply, divide) |\n| `__bool__` | Implicitly converting to\
    \ Boolean for if <expression> checks |\n| `__and__`, `__or__` | Logical operations\
    \ (and and or) |\n| `__getattr__`, `__setattr__`, `__delattr__` | Attribute access\
    \ (such as obj.name or del obj.name) |\n| `__le__`, `__lt__`, `__eq__`, `__ne__`,\
    \ `__gt__`, `__ge__` | Comparison (<=, <, ==, !=, >, >=) |\n| `__str__`, `__repr__`\
    \ | Converting to string (str()) or reproducible (repr()) forms |\n\nIf you want\
    \ to learn more, check out the Python documentation regarding the data model.\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_186_0.png)\n\n**Discussion Topic**\n\
    \nWhat are some types in your codebase that could benefit from a more natural\
    \ mapping? Discuss where magic methods might make sense, and where they might\
    \ not.\n\n## Context Managers\n\nYour code can now handle orders, but it's time\
    \ to fill in the other half: the grocery list handling. I want you to take a break\
    \ from reading and think about filling in the blanks of the grocery list handling\
    \ code. Take what you learned from the last section and create an interface that\
    \ naturally maps to the written description of the problem.\n\nHere's a reminder\
    \ of the grocery list handling:\n\n1. A Grocery List contains a list of stores\
    \ and the items to pick up from each store. Each item is reserved at the store\
    \ until the app places the order. Items may come from different stores; the app\
    \ tries to find the cheapest item that matches.\n2. Once the user confirms the\
    \ GroceryList, place the order. Grocery items are unreserved and set for delivery.\n\
    \nFrom a calling code perspective, here's what I have:\n\n```python\norder = Order(recipes)\n\
    # the user can make changes if needed\ndisplay_order(order)\nwait_for_user_order_confirmation()\n\
    if order.is_confirmed():\n    grocery_inventory = get_grocery_inventory()\n  \
    \  grocery_list = GroceryList(order, grocery_inventory)\n    grocery_list.reserve_items_from_stores()\n\
    \    wait_for_user_grocery_confirmation(grocery_list)\n    if grocery_list.is_confirmed():\n\
    \        grocery_list.order_and_unreserve_items()\n        deliver_ingredients(grocery_list)\n\
    \    else:\n        grocery_list.unreserve_items()\n```\n\nGiven this grocery\
    \ list interface, this is certainly easy to use (if I do say so myself). It's\
    \ clear what the code is doing, and if making the interface intuitive were the\
    \ full story, I'd be golden. But I forgot the other half of Scott Meyers's quote.\
    \ I forgot to make the code *hard to use incorrectly*.\n\nTake a look again. What\
    \ happens if the user doesn't confirm their order? What if some exception were\
    \ thrown while waiting? If this were to happen, I would never unreserve the items,\
    \ leaving them reserved in perpetuity. Sure, I could hope that calling code would\
    \ always try to catch an exception, but that's easy to forget to do. In fact,\
    \ it'd be quite easy to use incorrectly, wouldn't you agree?\n\n> You can't only\
    \ focus on the happy path, which is the execution of the code when everything\
    \ goes as planned. Your interface must also handle all the possible ways problems\
    \ can arise.\n\nWanting to automatically invoke some sort of function when you\
    \ are done with an operation is a common case in Python. File open/close, session\
    \ authenticate/logout, database command batching/submission; these are all examples\
    \ where you want to always make sure to invoke the second operation, regardless\
    \ of what the previous code did. If you don't, you often leak resources or otherwise\
    \ tie up the system.\n\nChances are, you've actually run across how to handle\
    \ this: using a with block.\n\n```python\nwith open(filename, \"r\") as handle:\n\
    \    print(handle.read())\n# at this point, the with block has ended, closing\
    \ the file handle\n```\n\nThis is something you learn early on in your Python\
    \ journey as a best practice. As soon as the with block is finished (when the\
    \ code returns to the original indent level of the with statement), Python closes\
    \ the opened file. This is a convenient way of making sure that an operation occurs,\
    \ even with no explicit user interaction. This is the key you need to making your\
    \ grocery list interface hard to use incorrectly—what if you could make the grocery\
    \ list unreserve items automatically, regardless of what path the code takes?\n\
    \nTo do this, you need to employ a context manager, which is a Python construct\
    \ that lets you take advantage of with blocks. Using a context manager, I can\
    \ make our grocery list code much more fault-tolerant:\n\n```python\nfrom contextlib\
    \ import contextmanager\n\n@contextmanager\ndef create_grocery_list(order: Order,\
    \ inventory: Inventory):\n    grocery_list = _GroceryList(order, inventory)\n\
    \    try:\n        yield grocery_list\n    finally:\n        if grocery_list.has_reserved_items():\n\
    \            grocery_list.unreserve_items()\n```\n\nAny function decorated with\
    \ @contextmanager will be usable alongside a with block. I construct a _GroceryList\
    \ (notice how it's private, so nobody should be creating a grocery list in ways\
    \ other than create_grocery_list), then yield it. Yielding a value interrupts\
    \ this function, returning the value yielded to the calling code. The user can\
    \ then use it like so:\n\n```python\n# ... snip ...\nif order.is_confirmed():\n\
    \    grocery_inventory = get_grocery_inventory()\n    with create_grocery_list(order,\
    \ grocery_inventory) as grocery_list:\n        grocery_list.reserve_items_from_stores()\n\
    \        wait_for_user_grocery_confirmation(grocery_list)\n        grocery_list.order_and_unreserve_items()\n\
    \        deliver_ingredients(grocery_list)\n```\n\nThe yielded value becomes grocery_list\
    \ in the example above. When the with block exits, execution is returned to the\
    \ context manager, right after the yield statement. It doesn't matter if an exception\
    \ is thrown, or if the with block finishes normally; because I wrapped our yield\
    \ in a try...finally block, the grocery list will always clear any reserved items."
  mdcn: "## 魔术方法\n\n魔术方法允许你在 Python 中调用内置操作时定义自定义行为。魔术方法以两个下划线作为前缀和后缀。因此，它们有时也被称为\
    \ dunder 方法（或双下划线方法）。你已经在前面的章节中见过它们了：\n\n- 在第 10 章，我使用了 `__init__` 方法来构造一个类。每当一个类被构造时，`__init__`\
    \ 就会被调用。\n- 在第 9 章，我使用了 `__lt__`、`__gt__` 等方法来定义当两个对象分别使用 < 或 > 进行比较时会发生什么。\n\
    - 在第 5 章，我介绍了 `__getitem__`，用于拦截使用方括号进行的索引调用，例如 `recipes['Stromboli']`。\n\n我可以使用魔术方法\
    \ `__add__` 来控制加法的行为：\n\n```python\n@dataclass(frozen=True)\nclass Ingredient:\n\
    \    name: str\n    brand: str\n    amount: float = 1\n    units: ImperialMeasure\
    \ = ImperialMeasure.CUP\n\n    def __add__(self, rhs: Ingredient):\n        #\
    \ make sure we are adding the same ingredient\n        assert (self.name, self.brand)\
    \ == (rhs.name, rhs.brand)\n        # build up conversion chart (lhs, rhs): multiplication\
    \ factor\n        conversion: dict[tuple[ImperialMeasure, ImperialMeasure], float]\
    \ = {\n            (ImperialMeasure.CUP, ImperialMeasure.CUP): 1,\n          \
    \  (ImperialMeasure.CUP, ImperialMeasure.TABLESPOON): 16,\n            (ImperialMeasure.CUP,\
    \ ImperialMeasure.TEASPOON): 48,\n            (ImperialMeasure.TABLESPOON, ImperialMeasure.CUP):\
    \ 1/16,\n            (ImperialMeasure.TABLESPOON, ImperialMeasure.TABLESPOON):\
    \ 1,\n            (ImperialMeasure.TABLESPOON, ImperialMeasure.TEASPOON): 3,\n\
    \            (ImperialMeasure.TEASPOON, ImperialMeasure.CUP): 1/48,\n        \
    \    (ImperialMeasure.TEASPOON, ImperialMeasure.TABLESPOON): 1/3,\n          \
    \  (ImperialMeasure.TEASPOON, ImperialMeasure.TEASPOON): 1\n        }\n\n    \
    \    return Ingredient(rhs.name,\n                          rhs.brand,\n     \
    \                     rhs.amount + self.amount * conversion[(rhs.units,\n    \
    \                                                            self.units)],\n \
    \                         rhs.units)\n```\n\n现在定义了 `__add__` 方法，我就可以使用 + 运算符将食材相加。`add_ingredient`\
    \ 方法可以如下所示：\n\n```python\ndef add_ingredient(self, ingredient: Ingredient):\n\
    \    '''Adds the ingredient if it's not already added,\n       or increases the\
    \ amount if it has '''\n\n    target_ingredient = self._get_matching_ingredient(ingredient)\n\
    \    if target_ingredient is None:\n        # ingredient for the first time -\
    \ add it\n        self.__ingredients.add(ingredient)\n    else:\n        # add\
    \ ingredient to existing set\n        target_ingredient += ingredient\n```\n\n\
    我现在可以自然地表达添加食材的想法了。不仅如此，我还可以定义减法，或者乘法/除法（用于调整份量），或者比较。当提供这些自然的操作时，用户理解你的代码库会容易得多。Python\
    \ 中几乎每个操作都有一个魔术方法作为支撑。它们如此之多，我甚至无法开始一一列举。然而，一些常见的方法列在表 11-1 中。\n\n表 11-1. Python\
    \ 中常见的魔术方法\n\n| 魔术方法 | 用途 |\n| :--- | :--- |\n| `__add__`、`__sub__`、`__mul__`、`__div__`\
    \ | 算术运算（加、减、乘、除） |\n| `__bool__` | 隐式转换为布尔值，用于 if <表达式> 检查 |\n| `__and__`、`__or__`\
    \ | 逻辑运算（与和或） |\n| `__getattr__`、`__setattr__`、`__delattr__` | 属性访问（例如 obj.name\
    \ 或 del obj.name） |\n| `__le__`、`__lt__`、`__eq__`、`__ne__`、`__gt__`、`__ge__` |\
    \ 比较（<=, <, ==, !=, >, >=） |\n| `__str__`、`__repr__` | 转换为字符串（str()）或可重现（repr()）形式\
    \ |\n\n如果你想了解更多，请查阅 Python 关于数据模型的文档。\n\n![](img/d64d2be45ca85b398807d181202e7046_186_0.png)\n\
    \n**讨论主题**\n\n在你的代码库中，有哪些类型可以从更自然的映射中受益？讨论在哪些地方使用魔术方法可能是合理的，在哪些地方可能不合适。\n\n##\
    \ 上下文管理器\n\n你的代码现在可以处理订单了，但是时候填补另一半了：杂货清单处理。我希望你暂停阅读，思考一下如何填补杂货清单处理代码的空白。运用你在上一节学到的知识，创建一个自然映射到问题书面描述的接口。\n\
    \n以下是杂货清单处理的提醒：\n\n1.  一个杂货清单包含一个商店列表以及需要从每个商店取回的物品。每个物品在商店中被保留，直到应用程序下订单。物品可能来自不同的商店；应用程序会尝试找到最便宜的匹配物品。\n\
    2.  一旦用户确认了杂货清单，就下订单。杂货物品被取消保留并安排配送。\n\n从调用代码的角度来看，我有以下内容：\n\n```python\norder\
    \ = Order(recipes)\n# the user can make changes if needed\ndisplay_order(order)\n\
    wait_for_user_order_confirmation()\nif order.is_confirmed():\n    grocery_inventory\
    \ = get_grocery_inventory()\n    grocery_list = GroceryList(order, grocery_inventory)\n\
    \    grocery_list.reserve_items_from_stores()\n    wait_for_user_grocery_confirmation(grocery_list)\n\
    \    if grocery_list.is_confirmed():\n        grocery_list.order_and_unreserve_items()\n\
    \        deliver_ingredients(grocery_list)\n    else:\n        grocery_list.unreserve_items()\n\
    ```\n\n考虑到这个杂货清单接口，它当然易于使用（如果我可以这么说的话）。代码在做什么很清楚，如果让接口直观就是全部故事的话，那我就太棒了。但我忘记了\
    \ Scott Meyers 名言的另一半。我忘记了让代码*难以被误用*。\n\n再看看。如果用户没有确认订单会怎样？如果在等待过程中抛出异常会怎样？如果发生这种情况，我将永远不会取消保留物品，使它们永久保留。当然，我可以希望调用代码总是尝试捕获异常，但这很容易忘记去做。事实上，它很容易被误用，你同意吗？\n\
    \n> 你不能只关注快乐路径，即一切按计划进行时的代码执行。你的接口还必须处理所有可能出现问题的方式。\n\n在操作完成后自动调用某种函数是 Python\
    \ 中的常见情况。文件打开/关闭、会话认证/注销、数据库命令批处理/提交；这些都是你希望始终确保调用第二个操作的例子，无论之前的代码做了什么。如果你不这样做，你通常会泄漏资源或以其他方式占用系统。\n\
    \n很可能，你实际上已经遇到过如何处理这个问题：使用 with 块。\n\n```python\nwith open(filename, \"r\") as\
    \ handle:\n    print(handle.read())\n# at this point, the with block has ended,\
    \ closing the file handle\n```\n\n这是你在 Python 学习早期就学到的最佳实践。一旦 with 块结束（当代码返回到\
    \ with 语句的原始缩进级别时），Python 就会关闭打开的文件。这是一种确保操作发生的便捷方式，即使没有明确的用户交互。这是你需要让杂货清单接口难以被误用的关键——如果你能让杂货清单自动取消保留物品，无论代码走哪条路径，会怎样？\n\
    \n为此，你需要使用上下文管理器，这是一种 Python 构造，让你可以利用 with 块。使用上下文管理器，我可以让我们的杂货清单代码更具容错性：\n\n\
    ```python\nfrom contextlib import contextmanager\n\n@contextmanager\ndef create_grocery_list(order:\
    \ Order, inventory: Inventory):\n    grocery_list = _GroceryList(order, inventory)\n\
    \    try:\n        yield grocery_list\n    finally:\n        if grocery_list.has_reserved_items():\n\
    \            grocery_list.unreserve_items()\n```\n\n任何用 @contextmanager 装饰的函数都可以与\
    \ with 块一起使用。我构造一个 _GroceryList（注意它是私有的，所以除了通过 create_grocery_list 之外，没有人应该以其他方式创建杂货清单），然后\
    \ yield 它。Yield 一个值会中断此函数，将 yield 的值返回给调用代码。用户然后可以这样使用它：\n\n```python\n# ... snip\
    \ ...\nif order.is_confirmed():\n    grocery_inventory = get_grocery_inventory()\n\
    \    with create_grocery_list(order, grocery_inventory) as grocery_list:\n   \
    \     grocery_list.reserve_items_from_stores()\n        wait_for_user_grocery_confirmation(grocery_list)\n\
    \        grocery_list.order_and_unreserve_items()\n        deliver_ingredients(grocery_list)\n\
    ```\n\n在上面的例子中，yield 的值变成了 grocery_list。当 with 块退出时，执行权返回给上下文管理器，就在 yield 语句之后。无论是否抛出异常，或者\
    \ with 块是否正常完成；因为我在 yield 周围包装了 try...finally 块，杂货清单将始终清除任何保留的物品。"
