  md: "# When Code Gets Too DRY\n\nThe DRY principle (Don't Repeat Yourself—see Chapter\
    \ 10 for more detail) is ingrained in most developers' heads. Anytime you see\
    \ very similar code in your codebase, you are required to shout “DUPLICATION!”\
    \ to warn other developers, and dutifully refactor that code so that it lives\
    \ in one place. After all, you don't want to fix the same bug in multiple places.\n\
    \nIt's possible for the DRY principle to go too far, though. Every time you refactor\
    \ code, you are introducing a physical dependency to the refactored code. If other\
    \ parts of your codebase depend on this piece of code, you are coupling them together.\
    \ If that refactored central piece of code needs to change, it can affect a large\
    \ amount of code.\n\nWhen applying the DRY principle, don't deduplicate code just\
    \ because it looks the same; deduplicate it only if that code has the same *reasons*\
    \ to change. Otherwise, you'll start getting into cases where the refactored code\
    \ needs to change for one reason, but that reason is incompatible with other parts\
    \ of code that depend on the refactored code. You need to start putting special\
    \ logic into the deduplicated code to handle special cases. Any time you increase\
    \ complexity like this, you start to reduce maintainability and make code harder\
    \ to reuse for general purposes.\n\n# Logical Dependencies\n\nA *logical dependency*\
    \ is when two entities have a relationship but no direct linkage in code. The\
    \ dependency is abstracted; it contains a layer of indirection. It's a dependency\
    \ that is only present at runtime. In our pizza maker example, we have three subsystems\
    \ interacting with one another. We represented the dependency with arrows in Figure\
    \ 16-3. If those arrows are imports or function calls, then they are physical\
    \ dependencies. However, it's possible to link these subsystems at runtime without\
    \ function calls or imports.\n\nSuppose subsystems live on different computers\
    \ and communicate over HTTP. If the pizza maker were to notify the table management\
    \ service on when the pizza is made over HTTP using the requests library, it would\
    \ look something like this:\n\n```\ndef on_pizza_made(order: int, pizza: Pizza):\n\
    \    requests.post(\"table-management/pizza-made\", {\n        \"id\": order,\n\
    \        \"pizza\": pizza.to_json()\n    })\n```\n\nThe physical dependency is\
    \ no longer from the pizza maker to our table management system, but from the\
    \ pizza maker to the requests library. As far as the pizza maker is concerned,\
    \ it just needs an HTTP endpoint that it can post to an endpoint called"
  merge: -1
