  md: "relationship), among other things. You should prefer composition to inheritance\
    \ anytime you need to reuse code but aren't going to substitute types for one\
    \ another.\n\nComposition is preferable to inheritance as a reuse mechanism because\
    \ it is a weaker form of coupling, which is another term for dependencies between\
    \ entities. All other things being equal, you want weaker forms of coupling, as\
    \ it makes it easier to reorganize classes and refactor functionality. If classes\
    \ have high coupling between them, changes in one more directly affect the behavior\
    \ of the other.\n\n![](img/d64d2be45ca85b398807d181202e7046_203_0.png)\n\nMixins\
    \ are the exception to preferring composition over inheritance, as they are classes\
    \ explicitly meant to be inherited to provide additions to a type's interface.\n\
    \nWith inheritance, a derived class is beholden to the base class's changes. A\
    \ developer must be cognizant of not only the public interface changing, but also\
    \ changes to invariants and protected members. By contrast, when another class\
    \ has an instance of your class, that class is only affected by a subset of changes:\
    \ those impacting the public methods and invariants it depends on. By limiting\
    \ the impact of changes, you lessen the chance of broken assumptions, decreasing\
    \ fragility. To write robust code, use inheritance judiciously.\n\n# Subtyping\
    \ Outside Inheritance\n\nMost of this chapter has focused exclusively on class-based\
    \ subtyping, or inheritance. However, the notion of subtyping is much broader,\
    \ mathematically speaking. Back in Chapter 2, I described how types are really\
    \ just a communication method around behaviors. You can apply this notion to subtypes\
    \ as well: a subtype is a set of behaviors that can be completely used in place\
    \ of some other supertype's behaviors.\n\nIn fact, duck typing is a subtype/supertype\
    \ relationship as well:\n\n```\npython\ndef double_value(x):\n    return x + x\n\
    \n>>> double_value(3)\n6\n>>> double_value(\"abc\")\nabcabc\n```\n\nIn this case,\
    \ the supertype is the parameter. It supports the addition method, which must\
    \ return the same type as its addends. Note that a supertype does not necessarily\
    \ have to be a named type in Python; it is all about the expected behaviors."
