    \ tmm.CHILE_POWDER_BLEND)\n    # ... snip ...\n\nprepare_tex_mex_dish(make_soft_taco)\n\
    ```\n\nIf they decide they want to provide support for a different dish at some\
    \ point in the future, they just have to write a new function:\n\n```\ndef make_chimichanga(ingredients:\
    \ TexMexIngredients):\n    # ... snip ...\n```\n\nDevelopers can continue to define\
    \ functions however they want, whenever they want. Just like the Template Method\
    \ Pattern, they can plug in new functionality with minimal impact to the original\
    \ code."
