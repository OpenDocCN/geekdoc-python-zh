  md: "You can't get much more extensible. By defining topics that exist within the\
    \ system, you can create new producers or consumers with the utmost ease. As your\
    \ system needs to grow, you extend it by interacting with the existing messaging\
    \ system.\n\nPyPubSub also comes with a few options to help with debugging. You\
    \ can add audit operations by adding your own functionality for things like new\
    \ topics being created or a message being sent. You can add error handlers for\
    \ any subscriber exception being thrown. You can also set up subscribers for *all*\
    \ topics at once. If you would like to learn more about any of these features,\
    \ or any other piece of functionality in PyPubSub, check out the [PyPubSub documentation](https://pypubsub.readthedocs.io/).\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_283_0.png)\n\nPyPubSub is meant for\
    \ single-process applications; you cannot publish to code running in other processes\
    \ or systems. Other applications can be used to provide this functionality, such\
    \ as [Kafka](https://kafka.apache.org/), [Redis](https://redis.io/), or [RabbitMQ](https://www.rabbitmq.com/).\
    \ Check out each of these tool's documentation to learn how to use them in Python.\n\
    \n# The Observer Pattern\n\nIf you don't want to use a message broker, you can\
    \ choose to implement the Observer Pattern.¹ With the Observer Pattern, your producer\
    \ contains of a list of *observers*: the consumers in this scenario. The Observer\
    \ Pattern does not need a separate library to act as a message broker.\n\nTo avoid\
    \ directly linking producers and consumers, you need to keep the knowledge of\
    \ observers *generic*. In other words, keep any specific knowledge about the observers\
    \ abstracted away. I will do this by just using functions (type annotated as a\
    \ Callable). Here is how I would rewrite the previous example to use an Observer\
    \ Pattern:\n\n```\npython\ndef complete_order(order: Order, observers: list[Callable[Order]]):\n\
    \    package_order(order)\n    for observer_func in observers:\n        observer(order)\n\
    ```\n\nIn this case, the producer only knows about a list of functions to call\
    \ to notify. To add new observers, you just need to add them to the list passed\
    \ in as an argument. Furthermore, since this is just function calls, your typechecker\
    \ will be able to detect when a producer or its observers change in an incompatible\
    \ way, which is a huge benefit over the message broker paradigm. It is also easier\
    \ to debug, as you don't need to step through third-party message broker code\
    \ in your debugger.\n\n> ¹ The Observer Pattern is first described in *Design\
    \ Patterns: Elements of Reusable Object-Oriented Software* by Erich Gamma, Richard\
    \ Helm, Ralph Johnson, and John Vlissides (Addison-Wesley Professional). This\
    \ book is colloquially known as the \"Gang of Four (GoF)\" book."
