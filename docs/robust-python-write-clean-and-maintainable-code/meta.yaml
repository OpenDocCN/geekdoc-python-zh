  md: 'The Liskov Substitution Principle (LSP), named after Barbara Liskov, states
    the following:²


    > Subtype Requirement: Let Φ(X) be a property provable about objects X of type
    T. Then Φ(Y) should be true for objects Y of type S where S is a subtype of T.


    Don''t let the formal notation scare you. The LSP is quite simple: in order for
    a subtype to exist, it must adhere to all the same properties (behaviors) as the
    supertype. It all comes back to substitutability. You should keep the LSP in mind
    whenever you think about properties of supertypes and what they mean for subtypes.
    When designing with inheritance, think through the following:


    # Invariants


    Chapter 10 focused mostly on invariants (truths about your types that must not
    be violated). When you''re subtyping from other types, the subtypes *must* preserve
    all invariants. When I subtyped Square from Rectangle, I disregarded the invariant
    that heights and widths can be set independent of one another.


    # Preconditions


    A precondition is anything that must be true before interacting with a type''s
    property (such as calling a function). If the supertype defines preconditions
    that happen, the subtype *must not* be more restrictive. This is what happened
    when I subtyped RestrictedMenuRestaurant from Restaurant. I added an extra precondition
    that certain ingredients were mandatory when changing the menu. By throwing an
    exception, I''ve made it so that previously good data would now fail.


    # Postcondition


    A postcondition is anything that must be true after interacting with a type''s
    property. If a supertype defines postconditions, the subtype must not *weaken*
    those postconditions. A postcondition is weakened if any of its guarantees are
    not met. When I subtyped RestrictedMenuRestaurant from Restaurant and returned
    early instead of changing the menu, I violated a postcondition. The base class
    guaranteed a postcondition that the menu would be updated, regardless of the menu
    contents. When subtyped like I did, I could no longer guarantee that postcondition.


    If at any time you break an invariant, precondition, or postcondition in an overridden
    function, you are begging for an error to show up. Here are some red flags that
    I look for in the derived class''s overridden functions when evaluating inheritance
    relationships:


    ² Barbara H. Liskov and Jeannette M. Wing. "A Behavioral Notion of Subtyping,"
    *ACM Trans. Program. Lang. Syst.* 16, 6 (Nov. 1994), 1811–41. https://doi.org/10.1145/197320.197383.'
  merge: -1
