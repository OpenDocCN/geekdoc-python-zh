- md: "## Python Static Analyzer (Pysa)\n\n*Pysa* (pronounced like the Leaning Tower\
    \ of Pisa) is a static code analyzer built into Pyre. Pysa specializes in a type\
    \ of security static analysis known as *taint analysis*. Taint analysis is the\
    \ tracking of potentially tainted data, such as user-supplied input. The tainted\
    \ data is tracked for the entire life cycle of the data; Pyre makes sure that\
    \ any tainted data cannot propagate to a system in an insecure fashion.\n\nLet\
    \ me walk you through the process to catch a simple security flaw (modified from\
    \ the [Pyre documentation](https://pyre-check.org/)). Consider the case where\
    \ a user creates a new recipe in a filesystem:\n\n```python\nimport os\n\ndef\
    \ create_recipe():\n    recipe = input(\"Enter in recipe\")\n    create_recipe_on_disk(recipe)\n\
    \ndef create_recipe_on_disk(recipe):\n    command = \"touch ~/food_data/{}.json\"\
    .format(recipe)\n    return os.system(command)\n```\n\nThis looks pretty innocuous.\
    \ A user can enter in carrots to create the file ~/food_data/carrots.json. But\
    \ what if a user enters in carrots; ls ~/? If this were entered, it would print\
    \ out the entire home directory (the command becomes touch ~/food_data/carrots;\
    \ ls ~;.json). Based on input, a malicious user could enter in arbitrary commands\
    \ on your server (this is known as remote code execution [RCE]), which is a huge\
    \ security risk.\n\nPysa provides tools to check this. I can specify that anything\
    \ coming from `input()` is potentially tainted data (known as a *taint source*),\
    \ and anything passed to `os.system` should not be tainted (known as a *taint\
    \ sink*). With this information, I need to build a *taint model*, which is a set\
    \ of rules for detecting potential security holes. First, I must specify a *taint.config*\
    \ file:\n\n```json\n{\n  sources: [\n    {\n      name: \"UserControlled\",\n\
    \      comment: \"use to annotate user input\"\n    }\n  ],\n  sinks: [\n    {\n\
    \      name: \"RemoteCodeExecution\",\n      comment: \"use to annotate execution\
    \ of code\"\n    }\n  ],\n  features: [],\n  rules: [\n    {\n      name: \"Possible\
    \ shell injection\",\n      code: 5001,\n      sources: [ \"UserControlled\" ],\n\
    \      sinks: [ \"RemoteCodeExecution\" ],\n      message_format: \"Data from\
    \ [{$sources}] source(s) may reach \" +\n                      \"[{$sinks}] sink(s)\"\
