    \ will ignore any line commented with `# type: ignore`.\n\n```\n# typechecks just\
    \ fine\na: int = \"not an int\" # type: ignore\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_120_0.png)\n\
    \n> # type: ignore should not be an excuse to be lazy! When writing new code,\
