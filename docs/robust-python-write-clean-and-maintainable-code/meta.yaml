    codebase. Think about each tool as a piece of Swiss cheese.¹ Each individual piece
    of Swiss cheese has holes of various widths or sizes, but when multiple pieces
    are stacked together, it is unlikely that there is an area where all holes align
    and you can see through the stack.


    Likewise, each tool you use to build a safety net will miss certain errors. Typecheckers
    won’t catch common programming mistakes, linters won’t check security violations,
    security checkers won’t catch complex code, and so on. But when these tools are
    stacked together, it’s much less likely for a legitimate error to squeak by (and
    for those that do, that’s why you have tests). As Bruce MacLennan says, “Have
    a series of defenses so that if an error is not caught by one, it will probably
    be caught by another.”²


    # Complexity Checkers


    Most of this book has been centered on readable and maintainable code. I’ve talked
    about how complex code impacts the speed of feature development. It’d be nice
    for a tool to indicate which parts of your codebase have high complexity. Unfortunately,
    complexity is subjective and reducing complexity will not always reduce errors.
    I can, however, treat complexity measures as a *heuristic*. A heuristic is something
    that provides an answer, but offers no guarantee that it is an optimal answer.
    In this case, the question is, “Where can I find the most bugs in my code?” Most
    of the time, it will be in code with high complexity, but remember that this is
    not a guarantee.


    # Cyclomatic complexity with mccabe


    One of the most popular complexity heuristics is known as *cyclomatic complexity*,
    first described by Thomas McCabe.³ To measure code’s cyclomatic complexity, you
    must view your code as a *control flow graph*, or a graph that maps out the different
    paths of execution your code can take. Figure 20-1 shows you a few different examples.


    1 J. Reason. “Human Error: Models and Management.” *BMJ* 320, no. 7237 (2000):
    768–70. https://doi.org/10.1136/bmj.320.7237.768.

    2 Bruce MacLennan. “Principles of Programming Language Design.” web.eecs.utk.edu,
    September 10, 1998. https://oreil.ly/hrjdR.

    3 T.J. McCabe. “A Complexity Measure.” *IEEE Transactions on Software Engineering*
    SE-2, no. 4 (December 1976): 308–20. https://doi.org/10.1109/tse.1976.233837.'
