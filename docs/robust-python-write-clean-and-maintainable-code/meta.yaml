    \n到目前为止，我已经介绍了`PizzaSpecification`中API的两个部分：初始化（构造函数）和属性访问。关于构造函数，我没有更多要说的；它在验证不变量方面已经完成了自己的工作。现在，我将讨论如何在充实API的其余部分（我们希望与该类捆绑的操作）时，保持这些不变量。\n\
