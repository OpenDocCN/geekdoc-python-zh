    \ndef get_current_location(self) -> geo.Coordinates:\n    return self.__gps.get_coordinates()\n\
    ```\n\nI am using a special function, super(), to access the base class. When\
    \ I call super().__init__(), I am actually calling Restaurant’s constructor. When\
    \ I call super().move_location, I am calling Restaurant’s move_location, not FoodTruck’s\
    \ move_location. This way, the code can behave exactly like the base class.\n\n\
    Take a moment and reflect on the implications of extending code through subclassing.\
    \ You can insert new behaviors into existing code without ever modifying that\
    \ existing code. If you avoid modifying existing code, you drastically reduce\
    \ the chance of introducing new bugs; you won’t inadvertently break consumers’\
    \ assumptions if you aren’t changing the code they depend on. A well-designed\
    \ inheritance structure can greatly improve maintainability. Unfortunately, the\
    \ inverse is true as well; design your inheritance poorly, and maintainability\
    \ suffers. When working with inheritance, you always need to be thinking about\
    \ how easy it is to substitute your code.\n\n# Multiple Inheritance\n\nIn Python,\
    \ it is possible to inherit from multiple classes:\n\n```\nclass FoodTruck(Restaurant,\
    \ Vehicle):\n    # ... snip ...\n```\n\nIn this case, you inherit all the methods\
    \ and attributes from both base classes. When you call super(), you now have to\
    \ decide exactly which class is initialized. This can get very confusing for beginners,\
    \ and there is a complex set of rules governing the resolution order of methods.\
    \ You can learn more about Method Resolution Ordering (MRO) and how multiple base\
    \ classes interact in the [Python documentation](https://docs.python.org/3/).\n\
    \nDo not reach for multiple inheritance often. When a single class inherits two\
    \ separate sets of invariants from its base classes, it creates extra cognitive\
    \ burden for your readers. They not only have to keep two sets of invariants in\
    \ their head but also the potential interactions between those invariants. Furthermore,\
    \ the complex rules surrounding MRO make it incredibly easy to make mistakes if\
    \ you don’t fully understand Python’s behavior. For the cases where you absolutely\
    \ must use multiple inheritance, document it well with comments to explain why\
    \ you need it and how you’re using it."
