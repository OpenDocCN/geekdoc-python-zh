    \n如果你编写的集合类型无法用其他集合类型表示，那么你迟早会遇到*泛型*。\n\n## 泛型\n\n泛型类型表示你不关心使用的是什么类型。然而，它有助于限制用户在不适当的地方混合类型。\n\
