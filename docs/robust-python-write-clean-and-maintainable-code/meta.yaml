- md: '## Detecting OCP Violations


    How can you tell if you should be writing code to be more extensible, adhering
    to the OCP? Here are some indicators that should raise an eyebrow as you think
    about your codebase:


    *Are the easy things hard to do?*

    Some things should be conceptually easy in your codebase. The effort needed to
    implement the concept should match the domain complexity. I once worked in a codebase
    that required 13 different files to be modified in order to add a user-configurable
    option. For a product that had hundreds of configurable options, this should have
    been an easy task. Suffice to say, it was not.


    *Do you encounter pushback against similar features?*

    If feature requesters are constantly pushing back on timelines for a feature,
    especially if it, in their words, “is almost identical to previous feature X”,
    ask yourself if the disconnect is due to complexity. It might be that the complexity
    is inherent in the domain, in which case you should make sure the feature requester
    is on the same page as you. If the complexity is accidental, though, your code
    probably needs to be reworked to make it easier to work in.


    *Do you have consistently high estimates?*

    Some teams use estimates to predict the amount of work they will do in a given
    timeline. If features consistently have high estimates, ask yourself the source
    of the estimate. Is complexity driving the high estimate, and is that complexity
    necessary? Is it risk and fear of the unknown? If it’s the latter, ask why your
    codebase feels risky to work in. Some teams split features into separate estimates
    by splitting the work. If you''re doing this consistently, ask if restructuring
    the codebase could have mitigated the split.


    *Do commits contain large changesets?*

    Look for commits in your version control system that have a large number of files.
    This is a great indication that shotgun surgery is happening, especially if the
    same files keep showing up in multiple commits. Keep in mind this is a guideline;
    big commits don''t always indicate a problem, but if they happen frequently, it''s
    worth checking into.


    **Discussion Topic**

    Which OCP violations have you encountered in your codebase?

    How could you restructure code to avoid them?


    ## Drawbacks


    Extensibility is not a panacea to all of your coding woes. In fact, you can actually
    *degrade* your codebase with too much flexibility. If you overdo the OCP and try
    to make everything configurable and extensible, you will quickly find yourself
    in a mess. The problem is that while making your code extensible reduces accidental
    complexity in making changes, it can *increase* accidental complexity in other
    areas.


    First, readability suffers. You are creating a whole new layer of abstraction
    that separates your business logic from other parts of your codebase. Anyone who
    wants to understand the entire picture has to jump through a few extra hoops.
    This will affect new developers getting up to speed, as well as hinder debugging
    efforts. You can mitigate this with good documentation and explaining your code
    structure.


    Secondly, you introduce a coupling that may not have been present before. Before,
    separate parts of the codebase were independent of each other. Now, they share
    a common subsystem; any change in that subsystem will affect all the consumers.
    I''ll go more in depth in [Chapter 16](#). Mitigate this with a strong set of
    tests.


    Use the OCP in moderation and take care when applying these principles. Use them
    too much, and your codebase will be overabstracted with a confusing tangle of
    dependencies. Use it too little, and developers will take longer to make changes
    as well as introduce more bugs. Define extension points in areas that you are
    reasonably sure that someone will have to modify again, and you will drastically
    improve your future maintainer''s experience with your codebase.


    ## Closing Thoughts


    Extensibility is one of the most important aspects of codebase maintenance. It
    allows your collaborators a way of adding functionality without modifying existing
    code. Any time you get away without modifying existing code is a time that you
    aren''t introducing any regressions. Adding extensible code now prevents bugs
    in the future. Remember the OCP: keep code open to extension but closed for modification.
    Apply this principle judiciously and you will see your codebase become more maintainable.


    Extensibility is an important theme that will weave throughout the next few chapters.
    In the next chapter, I''m going to focus on dependencies and how relationships
    in your codebase can constrain its extensibility. You''ll learn about the different
    types of dependencies and how to manage them. You''ll learn how to visualize and
    understand your dependencies, and why some parts of your codebases can have more
    dependencies than others. Once you start managing your dependencies, you will
    find it much easier to extend and modify code.


    # CHAPTER 16

    ## Dependencies


    It is difficult to write a program with no dependencies. Functions depend on other
    functions, modules depend on other modules, and programs depend on other programs.
    Architecture is fractal; no matter what level you''re looking at, your code can
    be represented as some sort of box-and-arrows diagram, like in Figure 16-1. It
    doesn''t matter if it''s functions, classes, modules, programs, or systems, you
    can draw a similar diagram to Figure 16-1 to represent the dependencies in your
    code.


    ![](img/d64d2be45ca85b398807d181202e7046_244_0.png)


    Figure 16-1. Box-and-arrows diagram


    However, if you don''t actively manage your dependencies, you soon get to what''s
    known as “spaghetti code,” making your box-and-arrows diagram look like Figure
    16-2.


    ![](img/d64d2be45ca85b398807d181202e7046_245_0.png)


    Figure 16-2. A tangled mess of dependencies


    In this chapter, you are going to learn all about dependencies and how to keep
    them under control. You’ll learn about different types of dependencies, all of
    which should be managed with different techniques. You’ll learn how to graph your
    dependencies, and how to interpret whether you have a healthy system. You’ll learn
    how to truly simplify your code architecture, which will help you manage complexity
    and increase the robustness of your codebase.


    ## Relationships


    Dependencies are, in essence, relationships. When a piece of code requires another
    piece of code to behave in some specific way, we call that a *dependency*. You
    typically use a dependency to benefit from code reuse in some fashion. Functions
    call other functions to reuse behaviors. Modules import other modules to reuse
    the types and functions defined in that module. It doesn’t make sense in most
    codebases to write literally everything from scratch. Reusing other parts of the
    codebase, or even code from other organizations, can be immensely beneficial.


    When you reuse code, you save time. You don’t need to waste effort writing code;
    you can just call or import the functionality that you need. Furthermore, any
    code you are depending on is presumably used in other places. This means that
    some layer of testing has already been done, which should reduce the number of
    bugs. Bonus points if the code is readily available to read. *As Linus’s Law*
    (as in Linus Torvalds, creator of Linux) states:¹


    > “Given enough eyeballs, all bugs are shallow.”


    Put another way, the likeliness of finding bugs is higher because so many people
    are looking at the code. This is another point in favor of readability leading
    to maintainability. If your code is readable, other developers will find and fix
    errors in it more easily, helping your robustness grow.


    ¹ Eric S. Raymond. *The Cathedral & the Bazaar*. Sebastopol, CA: O’Reilly Media,
    2001.'
  mdcn: '## 检测 OCP 违规


    如何判断你是否应该编写更具扩展性的代码，以遵循 OCP？以下是一些在审视你的代码库时应引起注意的指标：


    *简单的事情是否变得困难？*

    在你的代码库中，有些事情在概念上应该是简单的。实现该概念所需的工作量应与领域复杂性相匹配。我曾在一个代码库中工作，为了添加一个用户可配置的选项，需要修改 13
    个不同的文件。对于一个拥有数百个可配置选项的产品来说，这本应是一项简单的任务。不用说，事实并非如此。


    *你是否在类似功能上遇到阻力？*

    如果功能请求者不断推迟某个功能的时间表，尤其是当他们说“这与之前的功能 X 几乎完全相同”时，问问自己这种脱节是否源于复杂性。可能是复杂性固有于领域之中，在这种情况下，你应该确保功能请求者与你达成共识。然而，如果复杂性是偶然的，那么你的代码可能需要重构，以便更容易地进行修改。


    *你的估算是否一直很高？*

    一些团队使用估算来预测他们在给定时间线内将完成的工作量。如果功能的估算一直很高，问问自己估算的来源。是复杂性导致了高估，而这种复杂性是必要的吗？还是因为风险和对未知的恐惧？如果是后者，问问为什么你的代码库让人感觉修改起来有风险。一些团队通过拆分工作来将功能分成单独的估算。如果你一直这样做，问问重构代码库是否可以避免这种拆分。


    *提交是否包含大量变更集？*

    在你的版本控制系统中查找包含大量文件的提交。这是一个很好的指标，表明“霰弹式修改”正在发生，尤其是当相同的文件在多个提交中反复出现时。请记住，这是一个指导原则；大型提交并不总是表明存在问题，但如果它们频繁发生，就值得深入调查。


    **讨论主题**

    你在代码库中遇到过哪些 OCP 违规？

    如何重构代码以避免它们？


    ## 缺点


    扩展性并非解决所有编码难题的万能药。事实上，过度的灵活性实际上可能会*降低*你的代码库质量。如果你过度使用 OCP，试图让一切都可配置和可扩展，你会很快发现自己陷入混乱。问题在于，虽然使代码可扩展减少了修改时的意外复杂性，但它可能会在其他领域*增加*意外复杂性。


    首先，可读性会受损。你正在创建一个全新的抽象层，将你的业务逻辑与代码库的其他部分分离开来。任何想要理解全貌的人都必须多费周折。这将影响新开发人员的上手速度，也会阻碍调试工作。你可以通过良好的文档和解释代码结构来缓解这个问题。


    其次，你引入了一种之前可能不存在的耦合。之前，代码库的各个部分是相互独立的。现在，它们共享一个公共子系统；该子系统的任何更改都会影响所有使用者。我将在[第
    16 章](#)中更深入地探讨这一点。通过一套强大的测试来缓解这个问题。


    适度使用 OCP，并在应用这些原则时谨慎行事。使用过多，你的代码库将过度抽象，依赖关系错综复杂，令人困惑。使用过少，开发人员将花费更长时间进行修改，并引入更多错误。在你相当确定有人会再次修改的区域定义扩展点，你将极大地改善未来的维护者对你代码库的体验。


    ## 结语


    扩展性是代码库维护最重要的方面之一。它为你的协作者提供了一种在不修改现有代码的情况下添加功能的方法。任何时候你无需修改现有代码就能完成工作，就意味着你没有引入任何回归问题。现在添加可扩展的代码可以防止未来的错误。记住
    OCP：保持代码对扩展开放，但对修改关闭。明智地应用这一原则，你将看到你的代码库变得更具可维护性。


    扩展性是一个重要的主题，它将贯穿接下来的几章。在下一章中，我将专注于依赖关系，以及代码库中的关系如何限制其扩展性。你将了解不同类型的依赖关系以及如何管理它们。你将学习如何可视化和理解你的依赖关系，以及为什么代码库的某些部分可能比其他部分有更多的依赖关系。一旦你开始管理依赖关系，你会发现扩展和修改代码变得容易得多。


    # 第 16 章

    ## 依赖关系


    编写一个没有依赖关系的程序是困难的。函数依赖于其他函数，模块依赖于其他模块，程序依赖于其他程序。架构是分形的；无论你在哪个层面观察，你的代码都可以表示为某种框图，如图
    16-1 所示。无论是函数、类、模块、程序还是系统，你都可以绘制一个类似于图 16-1 的图表来表示代码中的依赖关系。


    ![](img/d64d2be45ca85b398807d181202e7046_244_0.png)


    图 16-1. 框图


    然而，如果你不主动管理依赖关系，你很快就会陷入所谓的“意大利面条式代码”，让你的框图看起来像图 16-2。


    ![](img/d64d2be45ca85b398807d181202e7046_245_0.png)


    图 16-2. 纠缠不清的依赖关系


    在本章中，你将全面了解依赖关系以及如何控制它们。你将了解不同类型的依赖关系，所有这些都应该用不同的技术来管理。你将学习如何绘制依赖关系图，以及如何判断你的系统是否健康。你将学习如何真正简化你的代码架构，这将帮助你管理复杂性并提高代码库的健壮性。


    ## 关系


    依赖关系本质上是关系。当一段代码需要另一段代码以某种特定方式运行时，我们称之为*依赖*。你通常使用依赖关系是为了以某种方式受益于代码重用。函数调用其他函数以重用行为。模块导入其他模块以重用该模块中定义的类型和函数。在大多数代码库中，从头开始编写所有内容是没有意义的。重用代码库的其他部分，甚至来自其他组织的代码，都可能带来巨大的好处。


    当你重用代码时，你节省了时间。你不需要浪费精力编写代码；你可以直接调用或导入你需要的功能。此外，你所依赖的任何代码大概也在其他地方使用。这意味着已经进行了一定程度的测试，这应该会减少错误的数量。如果代码易于阅读，那就更好了。*正如林纳斯定律*（指
    Linux 的创造者 Linus Torvalds）所言：¹


    > “足够多的眼睛，就可让所有问题浮现。”


    换句话说，发现错误的可能性更高，因为有很多人在查看代码。这是支持可读性带来可维护性的另一个观点。如果你的代码可读性强，其他开发人员将更容易发现和修复其中的错误，从而帮助你的代码库变得更加健壮。


    ¹ Eric S. Raymond. *The Cathedral & the Bazaar*. Sebastopol, CA: O’Reilly Media,
    2001.'
