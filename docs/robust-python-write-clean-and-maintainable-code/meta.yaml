  md: 'architectural patterns, and how to catch errors in your codebase before they
    make it into production. This book zeroes in on the robustness of your Python
    codebase, not the robustness of your system as a whole.


    I will be covering a wealth of information, from many different areas of software,
    including software engineering, computer science, testing, functional programming,
    and object-oriented programming (OOP). I do not expect you to have a background
    in these fields. There are sections where I explain things at a beginner level;
    this is often to deconstruct how we think about core fundamentals of the language.
    This is, for the most part, an intermediate-level text.


    Ideal readers include:


    +   - Developers currently working in a large codebase, looking to find better
    ways to communicate with their colleagues

    - Primary codebase maintainers, looking for ways to help lessen the burden of
    future maintainers

    - Self-taught developers who can write Python really well but need to better understand
    why we do the things we do

    - Software engineering graduates who need a reminder of practical advice for development

    - Senior developers looking for a way to tie their design rationale to first principles
    of robustness


    This book focuses on writing software over time. If a lot of your code is a prototype,
    throwaway, or disposable in any other fashion, the advice in this book will end
    up creating more work than is necessary for your project. Likewise if your project
    is small—say, under one hundred lines of Python. Making code maintainable does
    add complexity; there’s no doubt about that. However, I’ll guide you through minimizing
    that complexity. If your code lives longer than a few weeks or grows to a considerable
    size, you need to consider the sustainability of your codebase.


    # About This Book


    This book covers a wide swath of knowledge, across many chapters. It is broken
    up into four parts:


    *Part I, Annotating Your Code with Types*

    We’ll start with types in Python. Types are fundamental to the language, but are
    not often examined in great detail. The types you choose matter, as they convey
    a very specific intent. We’ll examine type annotations and what specific annotations
    communicate to the developer. We’ll also go over typecheckers and how those help
    catch bugs early.'
