- img_proc: true
  md: "contradictory. This is why you typically use _generate_next_value_ in base\
    \ Enum classes, which are enumerations that are meant to be subtyped and don't\
    \ include any values. The Flag class, which you'll see next, is a good example\
    \ of a base class.\n\n> ## Enums Versus Literals\n\nPython's Literal (introduced\
    \ in Python 3.8) has many of the same benefits as an Enum with automatically set\
    \ values (assuming there is no _generate_next_value_). In both cases, you are\
    \ restricting your variables to a very specific set of values.\n\nFrom a typechecker's\
    \ perspective, there is very little difference between this:\n\npython\nsauce:\
    \ Literal['Béchamel', 'Velouté', 'Espagnole',\n               'Tomato', 'Hollandaise']\
    \ = 'Hollandaise'\n\n\nand this:\n\npython\nsauce: MotherSauce = MotherSauce.HOLLANDAISE\n\
    \n\nIf you just need a simple restriction, reach for Literal first. However, if\
    \ you want iteration, runtime checking, or different values mapped from name to\
    \ value, use an Enum.\n\n# Flags\n\nNow that you have the mother sauces represented\
    \ in an Enum, you decide that you are ready to start serving meals with those\
    \ sauces. But before you begin, you want to be conscious of your customers' allergies,\
    \ so you decide to represent allergy information for each dish. With your newfound\
    \ knowledge of auto(), setting up the Allergen enumeration is a piece of cake:\n\
    \n```\npython\nfrom enum import auto, Enum\nfrom typing import Set\nclass Allergen(Enum):\n\
    \    FISH = auto()\n    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS\
    \ = auto()\n    GLUTEN = auto()\n    SOY = auto()\n    DAIRY = auto()\n```\n\n\
    And for a recipe, you might track a list of allergens as such:\n\n```\npython\n\
    allergens: Set[Allergen] = {Allergen.FISH, Allergen.SOY}\n```\n\nThis tells readers\
    \ that a collection of allergens will be unique, and that there might be zero,\
    \ one, or many allergens. This is exactly what you want. But what if I wanted\
    \ all allergen information in the system to be tracked like this? I don't want\
    \ to rely on"
  merge: -1
  pgno: 136
- img_proc: true
  md: "every developer remembering to use a set (just one use of a list or dictionary\
    \ can invite wrong behavior). I want some way to represent a grouping of unique\
    \ enumeration values universally.\n\nThe enum module gives you a handy base class\
    \ to use—Flag:\n\n```\nfrom enum import Flag\nclass Allergen(Flag):\n    FISH\
    \ = auto()\n    SHELLFISH = auto()\n    TREE_NUTS = auto()\n    PEANUTS = auto()\n\
    \    GLUTEN = auto()\n    SOY = auto()\n    DAIRY = auto()\n```\n\nThis lets you\
    \ perform bitwise operations to combine allergens or check if certain allergens\
    \ are present.\n\n```\n>>>allergens = Allergen.FISH | Allergen.SHELLFISH\n>>>allergens\n\
    <Allergen.SHELLFISH|FISH: 3>\n\n>>>if allergens & Allergen.FISH:\n>>>    print(\"\
    This recipe contains fish.\")\nThis recipe contains fish.\n```\n\nThis is great\
    \ when you want to represent a selection of values (say, something that was set\
    \ through a multi-drop down or a bitmask). There are some limitations, though.\
    \ The values must support the bitwise operations (|, &, etc.). Strings would be\
    \ an example of types that don't, while integers do. Furthermore, the values cannot\
    \ overlap when bitwise operations are performed. For example, you cannot use the\
    \ values from 1 through 4 (inclusive) for your Enum because 4 will “bitwise and”\
    \ for the values 1, 2, and 4 which is probably not what you want. auto() takes\
    \ care of this for you because the _generate_next_value_ of Flag automatically\
    \ uses powers of 2.\n\n```\nclass Allergen(Flag):\n    FISH = auto()\n    SHELLFISH\
    \ = auto()\n    TREE_NUTS = auto()\n    PEANUTS = auto()\n    GLUTEN = auto()\n\
    \    SOY = auto()\n    DAIRY = auto()\n    SEAFOOD = Allergen.FISH | Allergen.SHELLFISH\n\
    \    ALL_NUTS = Allergen.TREE_NUTS | Allergen.PEANUTS\n```\n\nThe use of flags\
    \ can express what you mean in very specific circumstances, but if you ever want\
    \ more control of your values, or are enumerating values that don't support bitwise\
    \ operations, use a nonflag Enum."
