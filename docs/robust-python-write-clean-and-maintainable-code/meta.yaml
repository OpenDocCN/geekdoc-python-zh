    \ provides, and provides unwanted cognitive burden.\n\n## Law of Least Surprise\n\
    \nDistractions from intent are bad, but there’s a class of communication that\
    \ is even worse: when code actively surprises your future collaborators. You want\
    \ to adhere even to the *Law of Least Surprise*; when someone reads through the\
