  md: "```\nassert isinstance(BLTSandwich(), Splittable)\n```\n\nAs long as you throw\
    \ the `runtime_checkable` decorator in there, you can do an `isinstance()` check\
    \ to see if an object satisfies a protocol. When you do, `isinstance()` is essentially\
    \ calling a `__hasattr__` method on each of the expected variables and functions\
    \ of the protocol.\n\n> issubclass() will only work if your protocol is a nondata\
    \ protocol, which is one that does not have any protocol variables. This has to\
    \ deal with edge cases concerning setting variables in constructors.\n\nYou will\
    \ typically mark protocols as `runtime_checkable` when you are using a Union of\
    \ protocols. Functions may expect either one protocol or a different protocol,\
    \ and those functions might need some way to differentiate the two inside the\
    \ body of a function at runtime.\n\n# Modules Satisfying Protocols\n\nWhile I've\
    \ so far only talked about objects satisfying protocols, there's a narrower use\
    \ case that is worth mentioning. It turns out that modules can satisfy protocols,\
    \ too. After all, a module is still an object.\n\nSuppose I want to define a protocol\
    \ around a restaurant and each restaurant is defined in a separate file. Here's\
    \ one such file:\n\n```\nname = \"Chameleon Café\"\naddress = \"123 Fake St.\"\
    \n\nstandard_lunch_entries = [BLTSandwich, TurkeyAvocadoWrap, Chili]\nother_entries\
    \ = [BaconCheeseburger, FrenchOnionSoup]\n\ndef render_menu() -> Menu:\n    #\
    \ Code to render a menu\n```\n\nThen, I need some code that will define the `Restaurant`\
    \ protocol and be able to load a restaurant:\n\n```\nfrom typing import Protocol\n\
    from lunch import LunchEntry, Menu, StandardLunchEntry\n\nclass Restaurant(Protocol):\n\
    \    name: str\n    address: str\n    standard_lunch_entries: list[StandardLunchEntry]\n\
    \    other_entries: List[LunchEntry]\n```"
