  md: "I don't want any of these systems to directly know about one another, as the\
    \ code handling customers, drones, and restaurants should remain independent (they\
    \ are maintained by separate teams and I want to keep physical dependencies low).\n\
    \nFirst, I will define the topics that exist in the system: a meal has finished\
    \ cooking, the drone is en route, and the order is delivered.\n\nFor this example,\
    \ I will use the Python library PyPubSub, which is a publish-subscribe API used\
    \ in single-process applications. To use it, you need to set up code to subscribe\
    \ to a topic and other code to publish to the topic. First, you need to install\
    \ pypubsub:\n\n```\npip install pypubsub\n```\n\nThen, to subscribe to the topic,\
    \ you specify the topic and the function you want to be called:\n\n```\nfrom pubsub\
    \ import pub\n\ndef notify_customer_that_meal_is_done(order: Order):\n    # ...\
    \ snip ...\n\npub.subscribe(notify_customer_that_meal_is_done, \"meal-done\")\n\
    ```\n\nThen to publish to this topic, you do the following:\n\n```\nfrom pubsub\
    \ import pub\n\ndef complete_order(order: Order):\n    packge_order(order)\n \
    \   pub.publish(\"meal-done\", order)\n```\n\n> Subscribers operate in the same\
    \ thread as the publisher, which means that any blocking I/O, such as waiting\
    \ on a socket to be read, will block the publisher. This will affect all other\
    \ subscribers and should be avoided.\n\nThese two pieces of code have no knowledge\
    \ of each other; all they depend upon is the PyPubSub library as well as agreeing\
    \ on the topic/message data. This makes it incredibly easy to add new subscribers:\n\
    \n```\nfrom pubsub import pub\n\ndef schedule_pick_up_for_meal(order: Order):\n\
    \    '''Schedule a drone pick-up'''\n    # ... snip ...\n\npub.subscribe(schedule_pick_up_for_meal,\
    \ \"meal-done\")\n```"
