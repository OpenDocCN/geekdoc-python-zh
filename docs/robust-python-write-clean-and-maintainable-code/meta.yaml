- md: "# Robust Python\n\nWrite Clean and Maintainable Code\n\nPatrick Viafore\n\n\
    Does it seem like your Python projects are getting bigger and bigger? Are you\
    \ feeling the pain as your codebase expands and gets tougher to debug and maintain?\
    \ Python is an easy language to learn and use, but that also means systems can\
    \ quickly grow beyond comprehension. Thankfully, Python has features to help developers\
    \ overcome maintainability woes.\n\nIn this practical book, author Patrick Viafore\
    \ shows you how to use Python's type system to the max. You'll look at user-defined\
    \ types, such as classes and enums, and Python's type hinting system. You'll also\
    \ learn how to make Python extensible and how to use a comprehensive testing strategy\
    \ as a safety net. With these tips and techniques, you'll write clearer and more\
    \ maintainable code.\n\nPatrick Viafore has worked for more than 13 years on mission-critical\
    \ software, including lightning detection, telecommunications, and operating systems.\
    \ He develops pipelines and tools to deploy Ubuntu images to public cloud providers\
    \ and performs software consulting and contracting through his business, Kudzera,\
    \ LLC. Patrick's goal is to make computer science and software engineering topics\
    \ more approachable to the developer community.\n\n- Learn why types are essential\
    \ in modern development ecosystems\n- Understand how type choices such as classes,\
    \ dictionaries, and enums reflect specific intents\n- Make Python extensible for\
    \ the future without adding bloat\n- Use popular Python tools to increase the\
    \ safety and robustness of your codebase\n- Evaluate current code to detect common\
    \ maintainability gotchas\n- Build a safety net around your codebase with linters\
    \ and tests\n\nBeijing • Boston • Farnham • Sebastopol • Tokyo\n\nCopyright ©\
    \ 2021 Kudzera, LLC. All rights reserved.\n\nPrinted in the United States of America.\n\
    \nPublished by O'Reilly Media, Inc., 1005 Gravenstein Highway North, Sebastopol,\
    \ CA 95472.\n\nO'Reilly books may be purchased for educational, business, or sales\
    \ promotional use. Online editions are also available for most titles (http://oreilly.com).\
    \ For more information, contact our corporate/institutional sales department:\
    \ 800-998-9938 or corporate@oreilly.com.\n\n**Acquisitions Editor:** Amanda Quinn\n\
    **Development Editor:** Sarah Grey\n**Production Editor:** Kristen Brown\n**Copyeditor:**\
    \ Justin Billing\n**Proofreader:** Shannon Turlington\n\n**Indexer:** Ellen Troutman-Zaig\n\
