    \ I want to create a strategy that maps dish names (text) to calories (a number\
    \ between 100 and 2,000):\n\n```\nfrom hypothesis import given\nfrom hypothesis.strategies\
    \ import dictionary, integers, text\n\n@given(dictionaries(text(), integers(min_value=100,\
    \ max_value=2000)))\ndef test_calorie_count(ingredient_to_calorie_mapping : dict[str,\
    \ int]):\n    # ... snip ...\n```\n\nFor even more complicated data, you can use\
    \ Hypothesis to define your own strategies. You are allowed to map and filter\
    \ strategies, which are similar in concept to the built-in map and filter functions.\n\
    \nYou can also use the hypothesis.composite strategy decorator to define your\
