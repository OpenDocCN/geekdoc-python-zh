  md: "Let's suppose I represent the mother sauces as a Python tuple:\n\n```\n# Note:\
    \ use UPPER_CASE variable names to denote constant/immutable values\nMOTHER_SAUCES\
    \ = (\"Béchamel\", \"Velouté\", \"Espagnole\", \"Tomato\", \"Hollandaise\")\n\
    ```\n\nWhat does this tuple communicate to other developers?\n\n+   - This collection\
    \ is immutable.\n- They can iterate over this collection to get all the sauces.\n\
    - They can retrieve a specific element through static indexing.\n\nThe immutability\
    \ and retrieval properties are important for my application. I don't want to add\
    \ or subtract any mother sauces at runtime (such would be culinary blasphemy).\
    \ Using a tuple makes it clear to future developers that they should not change\
    \ these values. Retrieval lets me choose just one sauce, although it is a bit\
    \ clunky. Every time I need to reference an element, I can do so through static\
    \ indexing:\n\n```\nMOTHER_SAUCES[2]\n```\n\nThis unfortunately does not communicate\
    \ intent. Every time a developer sees this, they must remember that 2 means \"\
    Espagnole\". Constantly correlating numbers to sauces wastes time. This is fragile\
    \ and will invariably cause mistakes. Should somebody alphabetically sort the\
    \ sauces, the indices will change, breaking the code. Statically indexing into\
    \ this tuple will not help the robustness of this code.\n\nTo combat this, I'll\
    \ make aliases for each of these:\n\n```\nBÉCHAMEL = \"Béchamel\"\nVELOUTÉ = \"\
    Velouté\"\nESPAGNOLE = \"Espagnole\"\nTOMATO = \"Tomato\"\nHOLLANDAISE = \"Hollandaise\"\
    \nMOTHER_SAUCES = (BÉCHAMEL, VELOUTÉ, ESPAGNOLE, TOMATO, HOLLANDAISE)\n```\n\n\
    That's a bit more code, and still doesn't make it any easier to index into that\
    \ tuple. Furthermore, there is still a lingering issue in calling code.\n\nConsider\
    \ a function that creates a daughter sauce:\n\n```\ndef create_daughter_sauce(mother_sauce:\
    \ str,\n                        extra_ingredients: list[str]):\n    # ...\n```\n\
    \nI want you to pause a moment and consider what this function tells future developers.\
