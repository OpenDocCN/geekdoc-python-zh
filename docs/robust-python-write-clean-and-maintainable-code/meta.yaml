    \ through hotdog.prepare_for_serving.'\n    ),\n}\n```\n\n接下来，我想跟踪我所在的函数，以便判断我是否在使用\
    \ `prepare_for_serving`。这就是 `astroid` 库将发挥作用的地方。如前所述，`astroid` 库帮助 Pylint 检查器以\
    \ AST 的方式思考；你不需要担心字符串解析。如果你想了解更多关于 AST 和 Python 解析的知识，可以查看 `astroid` 的文档，但现在，你需要知道的是，如果你在检查器中定义了特定的函数，它们会在\
    \ `astroid` 解析代码时被调用。每个被调用的函数都会接收一个节点，该节点代表代码的特定部分，例如表达式或类定义。\n\n```python\ndef\
    \ __init__(self, linter: Optional[PyLinter] = None):\n    super(ReadyToServeHotDogChecker,\
    \ self).__init__(linter)\n    self._is_in_prepare_for_serving = False\n\ndef visit_functiondef(self,\
    \ node: astroid.scoped_nodes.FunctionDef):\n    if (node.name == \"prepare_for_serving\"\
    \ and\n        node.parent.name == \"hotdog\" and\n        isinstance(node.parent,\
    \ astroid.scoped_nodes.Module)):\n            self._is_in_prepare_for_serving\
    \ = True\n\ndef leave_functiondef(self, node: astroid.scoped_nodes.FunctionDef):\n\
    \    if (node.name == \"prepare_for_serving\" and\n        node.parent.name ==\
    \ \"hotdog\" and\n        isinstance(node.parent, astroid.scoped_nodes.Module)):\n\
    \n        self._is_in_prepare_for_serving = False\n```\n\n在这种情况下，我定义了一个构造函数来保存一个成员变量，以跟踪我是否在正确的函数中。我还定义了两个函数：`visit_functiondef`\
    \ 和 `leave_functiondef`。每当 `astroid` 解析一个函数定义时，`visit_functiondef` 就会被调用；每当解析器停止解析一个函数定义时，`leave_functiondef`\
    \ 就会被调用。所以当解析器遇到一个函数时，我会检查该函数是否名为 `prepare_for_serving`，并且它位于名为 `hotdog` 的模块内。\n\
    \n现在我有了一个成员变量来跟踪我是否在正确的函数中，我可以编写另一个 `astroid` 钩子，以便在每次调用函数时（例如 `ReadyToServeHotDog(hot_dog)`）被调用。\n\
    \n```python\ndef visit_call(self, node: astroid.node_classes.Call):\n    if node.func.name\
    \ != 'ReadyToServeHotDog':\n        return\n\n    if self._is_in_prepare_for_serving:\n\
    \        return\n\n    self.add_message(\n        'unverified-ready-to-serve-hotdog',\
    \ node=node,\n    )\n```\n\n如果函数调用不是 `ReadyToServeHotDog`，或者执行在 `prepare_for_serving`\
    \ 中，这个检查器认为没有问题并提前返回。如果函数调用是 `ReadyToServeHotDog` 且执行不在 `prepare_for_serving`\
    \ 中，检查器会失败并添加一条消息，指示 `unverified-ready-to-serve-hotdog` 检查失败。通过添加消息，Pylint 会将其传递给用户并将其标记为检查失败。\n\
    \n最后，我需要注册这个 linter：\n\n```python\ndef register(linter: PyLinter):\n    linter.register_checker(ReadyToServeHotDogChecker(linter))\n\
    ```\n\n就是这样！通过大约 45 行 Python 代码，我定义了一个 Pylint 插件。这是一个简单的检查器，但你的想象力决定了你能做什么。Pylint\
    \ 检查器，无论是内置的还是用户创建的，对于发现错误都是无价的。\n\n> **讨论主题**\n> 你能在你的代码库中创建哪些检查器？使用这些检查器你能捕获哪些错误情况？\n\
    \n## 其他静态分析器\n\n类型检查器和 linter 通常是人们听到“静态分析”时首先想到的东西，但还有许多其他工具可以帮助你编写健壮的代码。每个工具都充当一道独立的防线，所有这些防线叠加在一起，共同保护你的"
