  md: "Future developers would come across code like this:\n\n```\ncreate_daughter_sauce(MOTHER_SAUCES[0],\
    \ [\"Onions\"]) # not super helpful\ncreate_daughter_sauce(BÉCHAMEL, [\"Onions\"\
    ]) # Better\n```\n\nOr:\n\n```\ncreate_daughter_sauce(\"Hollandaise\", [\"Horseradish\"\
    ])\ncreate_daughter_sauce(\"Veloute\", [\"Mustard\"])\n```\n\n```\n# Definitely\
    \ wrong\ncreate_daughter_sauce(\"Alabama White BBQ Sauce\", [])\n```\n\nAnd here\
    \ lies the crux of the problem. On the happy path, a developer can use the predefined\
    \ variables. But if somebody accidentally were to use the wrong sauce (after all,\
    \ create_daughter_sauce expects a string, which could be anything), you soon get\
    \ unwanted behavior. Remember, I am talking about developers looking at this months\
    \ (or potentially years) later. They have been tasked to add a feature to the\
    \ codebase, even though they are not familiar with it. By choosing a string type,\
    \ I'm just inviting the wrong values to be supplied later.\n\n![](img/d64d2be45ca85b398807d181202e7046_133_0.png)\n\
    \nEven honest mistakes have ramifications. Did you catch that I left an accent\
    \ off of the “e” in Velouté? Have fun debugging that in production.\n\nInstead,\
    \ you want to find a way to communicate that you want a very specific, restricted\
    \ set of values in specific locations. Since you're in a chapter about “enumerations”\
    \ and I haven't shown them yet, I'm sure you can guess what the solution is.\n\
    \n# Enum\n\nHere's an example of Python's enumeration, Enum, in action:\n\n```\n\
    from enum import Enum\nclass MotherSauce(Enum):\n    BÉCHAMEL = \"Béchamel\"\n\
    \    VELOUTÉ = \"Velouté\"\n    ESPAGNOLE = \"Espagnole\"\n    TOMATO = \"Tomato\"\
    \n    HOLLANDAISE = \"Hollandaise\"\n```\n\nTo access specific instances, you\
    \ can just do:\n\n```\nMotherSauce.BÉCHAMEL\nMotherSauce.HOLLANDAISE\n```\n\n\
    This is near identical to the string aliases, but there are a few extra benefits."
