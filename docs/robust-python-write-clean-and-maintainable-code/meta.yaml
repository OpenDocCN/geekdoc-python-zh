  md: '# CHAPTER 7


    # Adopting Typechecking Practically


    Many developers dream of the days when they’ll finally work in a completely *green-field*
    project. A green-field project is one that is brand-new, where you have a blank
    slate with your code’s architecture, design, and modularity. However, most projects
    soon become *brown-field*, or legacy code. These projects have been around the
    block a bit; much of the architecture and design has been solidified. Making big,
    sweeping changes will impact real users. The term *brown-field* is often seen
    as derogatory, especially when it feels like you are slogging through a big ball
    of mud.


    However, not all brown-field projects are a punishment to work in. Michael Feathers,
    author of *Working Effectively With Legacy Code* (Pearson), has this to say:


    > In a well-maintained system, it might take a while to figure out how to make
    a change, but once you do, the change is usually easy and you feel much more comfortable
    with the system. In a legacy system, it can take a long time to figure out what
    to do, and the change is difficult also.¹


    Feathers defines legacy code as “code without tests.” I prefer an alternate definition:
    legacy code is simply code where you can no longer discuss the code with the developers
    who wrote it. In lieu of that communication, you rely on the codebase itself to
    describe its behavior. If the codebase clearly communicates its intentions, it
    is a well-maintained system that is easy to work in. It may take a little bit
    of time to understand it all, but once you do, you are able to add features and
    evolve the system. However, if that codebase is difficult to understand, you will
    face an uphill battle. That code becomes unmaintainable. This is why robustness
    is paramount. Writing robust code eases the transition from green-field to brown-field
    by making the code more maintainable.


    1 Michael C. Feathers. *Working Effectively with Legacy Code*. Upper Saddle River,
    NJ: Pearson, 2013.'
  merge: -1
