    \ delve into that will help you adopt typechecking. One of the biggest problems\
    \ you will run into is the sheer number of errors that mypy will report the first\
    \ time you run it on a larger codebase. The biggest mistake you can make in this\
    \ situation is to keep the hundreds (or thousands) of errors turned on and hope\
    \ that developers whittle away at the errors over time.\n\nThese errors will not\
    \ get fixed in any quick fashion. If these errors are always turned on, you will\
    \ not see the benefits of a typechecker, because it will be nearly impossible\
    \ to detect new errors. Any new issue will simply be lost in the noise of the\
    \ multitude of other issues.\n\nWith mypy, you can tell the typechecker to ignore\
    \ certain classes of errors or modules through configuration. Here's a sample\
