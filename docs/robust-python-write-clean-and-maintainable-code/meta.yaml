    \n> ## 将错误左移\n\nDevOps 思维模式的一个常见原则是“将你的错误左移”。我在讨论类型时提到过这一点，但它也适用于静态分析和测试。这个想法是从成本的角度来考虑你的错误。修复一个错误有多昂贵？这取决于你在哪里发现那个错误。在生产环境中被客户发现的错误代价高昂。开发者必须花时间离开他们正常的特性开发，技术支持和测试人员也会介入，而且当你必须进行紧急部署时，还存在风险。\n\
