- img_proc: true
  md: 'the interface, and that''s a great start, but you have an implicit bias when
    creating the interface. What feels natural to you won''t feel natural to everyone
    else. Your goal is for your users to do the right things (and avoid the wrong
    things) with minimal effort. Ideally, the users should not need to do anything
    extra to use your interface correctly.


    I don''t have a silver bullet for you; there is no foolproof way of writing an
    interface that meets everyone''s needs on the first try. Instead, I''ll talk about
    some principles you can apply to give you the best chance. For the cases where
    you need to make changes to an existing API, you''ll learn mitigation strategies.
    Your API is a first impression for other developers; make it count.


    ![](img/d64d2be45ca85b398807d181202e7046_175_0.png)


    **Discussion Topic**


    What interfaces are hard to use in your codebase? Look for common errors that
    people make when using your types. Also look for parts of your interface that
    are rarely invoked, especially if you feel like they are useful. Why don''t users
    call these useful functions? Discuss what costs appear when developers encounter
    these hard-to-use interfaces.


    # Natural Interface Design


    Your goal, tough as it may seem, is to make your interface appear natural to use.
    In other words, you want to reduce friction for the callers of your code. When
    code is hard to use, the following happens:


    *Duplicated functionality*


    Some developers who find your types hard to use will write their own types, duplicating
    functionality. It may be healthy for different ideas to compete on a large scale
    (like competing open source projects), but it is not healthy for that divergence
    to be present in your codebase. Developers are presented with a multitude of types,
    not sure which one to use. With their attention split, their wires will get crossed
    and they will make mistakes, which creates bugs, which costs money. Also, if you
    want to add anything to one of these types, you need to add them in all the places
    the functionality has diverged, or you''ll create bugs, which costs money.


    *Broken mental model*


    Developers build up a mental model of the code they work with. If certain types
    are difficult to reason about, that mental model breaks. Developers will misuse
    your types, causing subtle bugs. Perhaps they don''t call methods in the order
    that you require. Perhaps they miss calling a method that they should have. Perhaps
    they just misunderstand what the code is doing and pass the wrong information
    to it. Any of these will introduce fragility into your codebase.'
