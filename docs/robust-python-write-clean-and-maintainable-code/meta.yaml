  - "[PAGE 185]\n\n# Magic Methods\n\nMagic methods allow you to define custom behavior\
    \ when built-in operations are invoked in Python. A magic method is prefixed and\
    \ suffixed by two underscores. Because of this, they are sometimes called dunder\
    \ methods (or double underscore methods). You've already seen them in earlier\
