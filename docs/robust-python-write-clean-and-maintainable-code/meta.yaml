  md: "# Creating New Collections\n\nWhen writing a new collection, you should ask\
    \ yourself: am I trying to write a new collection that isn't representable by\
    \ another collection type, or am I trying to modify an existing collection to\
    \ provide some new behavior? Depending on the answer, you may need to employ different\
    \ techniques to achieve your goal.\n\nIf you write a collection type that isn't\
    \ representable by another collection type, you are bound to come across *generics*\
    \ at some point.\n\n# Generics\n\nA generic type indicates that you don't care\
    \ what type you are using. However, it helps restrict users from mixing types\
    \ where inappropriate.\n\nConsider the innocuous reverse list function:\n\n```\n\
    def reverse(coll: list) -> list:\n    return coll[::-1]\n```\n\nHow do I indicate\
    \ that the returned list should contain the same type as the passed-in list? To\
    \ achieve this, I use a generic, which is done with a TypeVar in Python:\n\n```\n\
    from typing import TypeVar\nT = TypeVar('T')\ndef reverse(coll: list[T]) -> list[T]:\n\
    \    return coll[::-1]\n```\n\nThis says that for a type T, reverse takes in a\
    \ list of elements of type T and returns a list of elements of type T. I can't\
    \ mix types: a list of integers will never be able to become a list of strings\
    \ if those lists aren't using the same TypeVar.\n\nI can use this sort of pattern\
    \ to define entire classes. Suppose I want to integrate a cookbook recommender\
    \ service into the cookbook collection app. I want to be able to recommend cookbooks\
    \ or recipes based on a customer's ratings. To do this, I want to store each of\
    \ these pieces of rating information in a *graph*. A graph is a data structure\
    \ that contains a series of entities known as *nodes* and that tracks *edges*\
    \ (relationships between those nodes). However, I don't want to write separate\
    \ code for a cookbook graph and a recipe graph. So I define a Graph class that\
    \ can be used for generic types:\n\n```\nfrom collections import defaultdict\n\
    from typing import Generic, TypeVar\n\nNode = TypeVar(\"Node\")\nEdge = TypeVar(\"\
    Edge\")\n\n# directed graph\nclass Graph(Generic[Node, Edge]):\n    def __init__(self):\n\
    \        self.edges: dict[Node, list[Edge]] = defaultdict(list)\n```"
