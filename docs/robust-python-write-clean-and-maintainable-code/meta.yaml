    it becomes harder to understand how our mental models map onto the real world.
    If left unchecked, software systems bloat and become brittle, earning the frightening
    moniker “legacy code.” These codebases often come with warnings such as, “Do not
    touch these files; we don’t know why, but it breaks when you do,” and, “Oh, only
    So-and-So knows that code, and they left for a high-paying Silicon Valley job
    two years ago.” Software development is a young field, but these sort of statements
    should be terrifying to developers and businesspeople alike.


    The truth is, to write systems that last, you need to be deliberate in the choices
    you make. As stated by Titus Winters, Tom Manshreck, and Hyrum Wright, “Software
    engineering is programming integrated over time.”¹ Your code might last a long
    time —I’ve stepped into projects whose code was written while I was in elementary
    school. How long will your code last? Will it last longer than your tenure at
    your current job (or when you finish maintaining that project)? How do you want
    your code to be received in a few years when someone is building core components
    from it? Do you want your successors to thank you for your foresight, or curse
    your name for the complexities you bore into this world?


    1 Titus Winters, Tom Manshreck, and Hyrum Wright. *Software Engineering at Google:
    Lessons Learned from Programming over Time*. Sebastopol, CA: O’Reilly Media, Inc.,
    2020.'
  - '[PAGE 13]


    Python is a wonderful language, but it occasionally makes building for the future
    tricky. Some proponents of other programming languages have decried Python as
    “not production-grade” or “useful for prototyping only,” but the truth is that
    many developers only scratch the surface, rather than learning all the tools and
    tricks for writing robust Python. Throughout this book, you’ll learn how to do
    better. You’ll journey through numerous ways to make Python clean and maintainable.
    Your future maintainers will enjoy working with your code, as it was designed
    up front to make things easy. So go, read this book, look toward the future, and
    build awesome software that will last.


    # Who Should Read This Book


    This book is for any Python developer who is looking to grow the code they work
    on in a sustainable and maintainable fashion. This is not intended to be your
    first Python text; I expect that you have written Python before. You should be
    comfortable with Python control flow, and have worked with classes before. If
    you are looking for a more introductory text, I suggest reading *Learning Python*
    by Mark Lutz (O’Reilly) first.


    While I will be covering many advanced Python topics, the goal of this book is
    not to be a how-to for using all of Python’s features. Instead, the features are
    a backdrop for a larger conversation about robustness and how your choices impact
    maintainability. At times I will discuss strategies that you should rarely use,
    if at all. That is because I want to illustrate first principles of robustness;
    the journey of understanding why and how we make decisions in code is more important
    than knowing what tools to use in an optimal scenario. In practice, the optimal
    scenario is a rare occurrence. Use the principles in this book to draw your own
    conclusions from your codebase.


    This book is not a reference book. You might call it a discussion book. Each chapter
    should be a starting point for developers in your organization to discuss, together,
    how best to apply these principles. Start a book club, discussion group, or lunch
    and learn to foster communication. I have proposed discussion topics in each chapter
    to get the conversation started. When you come across these topics, I encourage
    you to stop and reflect on your current codebase. Talk among your peers and use
    these topics as a springboard for discussing the state of your code, processes,
    and workflows. If you are interested in a reference book about the Python language,
    I heartily recommend *Fluent Python* by Luciano Ramalho (O’Reilly; a second edition
    is forthcoming in late 2021).


    A system can be robust in many different ways. It can be security hardened, scalable,
    fault-tolerant, or less likely to introduce new errors. Each one of these facets
    of robustness warrants a full book; this book is focused on preventing the developers
    who inherit your code from creating new faults in your system. I will show you
    how to communicate to future developers, how to make their lives easier through'
  - '[PAGE 14]


    architectural patterns, and how to catch errors in your codebase before they make
    it into production. This book zeroes in on the robustness of your Python codebase,
    not the robustness of your system as a whole.


    I will be covering a wealth of information, from many different areas of software,
    including software engineering, computer science, testing, functional programming,
    and object-oriented programming (OOP). I do not expect you to have a background
    in these fields. There are sections where I explain things at a beginner level;
    this is often to deconstruct how we think about core fundamentals of the language.
    This is, for the most part, an intermediate-level text.


    Ideal readers include:


    +   - Developers currently working in a large codebase, looking to find better
    ways to communicate with their colleagues

    - Primary codebase maintainers, looking for ways to help lessen the burden of
    future maintainers

    - Self-taught developers who can write Python really well but need to better understand
    why we do the things we do

    - Software engineering graduates who need a reminder of practical advice for development

    - Senior developers looking for a way to tie their design rationale to first principles
    of robustness


    This book focuses on writing software over time. If a lot of your code is a prototype,
    throwaway, or disposable in any other fashion, the advice in this book will end
    up creating more work than is necessary for your project. Likewise if your project
    is small—say, under one hundred lines of Python. Making code maintainable does
    add complexity; there’s no doubt about that. However, I’ll guide you through minimizing
    that complexity. If your code lives longer than a few weeks or grows to a considerable
    size, you need to consider the sustainability of your codebase.


    # About This Book


    This book covers a wide swath of knowledge, across many chapters. It is broken
    up into four parts:


    *Part I, Annotating Your Code with Types*

    We’ll start with types in Python. Types are fundamental to the language, but are
    not often examined in great detail. The types you choose matter, as they convey
    a very specific intent. We’ll examine type annotations and what specific annotations
    communicate to the developer. We’ll also go over typecheckers and how those help
    catch bugs early.'
- md: '## Part II, Defining Your Own Types


    After covering how to think about Python’s types, we’ll focus on how to create
    your own types. We’ll walk through enumerations, data classes, and classes in
    depth. We’ll explore how making certain design choices in designing a type can
    increase or decrease the robustness of your code.


    ## Part III, Extensible Python


    After learning how to better express your intentions, we’ll focus on how to enable
    developers to change your code effortlessly, building with confidence on your
    strong foundation. We’ll cover extensibility, dependencies, and architectural
    patterns that allow you to modify your system with minimal impact.


    ## Part IV, Building a Safety Net


    Lastly, we’ll explore how to build a safety net, so that you can gently catch
    your future collaborators when they do fall. Their confidence will increase, knowing
    that they have a strong, robust system that they can fearlessly adapt to their
    use case. Finally, we’ll cover a variety of static analysis and testing tools
    that will help you catch rogue behavior.


    Each chapter is mostly self-contained, with references to other chapters where
    applicable. You can read this book from cover to cover, or bounce around to chapters
    that suit your fancy. Chapters grouped in each part will be related to one another,
    but there will be fewer relations between book parts.


    All code examples were run using Python 3.9.0, and I’ll try to call out when you
    need a specific Python version or later to run examples (such as Python 3.7 for
    the use of data classes).


    Throughout this book, I will be doing most of my work on the command line. I ran
    all of these commands from an Ubuntu operating system, but most tools should work
    just as well on Mac or Windows systems. In some cases, I will show how certain
    tools interact with integrated development environments (IDEs), such as Visual
    Studio Code (VS Code). Most IDEs use the command-line options underneath the hood;
    most of what you learn on the command line will translate directly to IDE options.


    This book will be presenting many different techniques that can improve the robustness
    of your code. However, there are no silver bullets in software development. Trade-offs
    are the heart of solid engineering, and there is no exception in the methods that
    I present. I will be transparent about benefits and drawbacks as I discuss these
    topics. You will know more about your systems than I will, and you are best suited
    to choose which tool is appropriate for which job. All I am doing is stocking
    your toolbox.


