    \ with calories under 650 calories, one test exactly at the boundary of 650 calories,\
    \ and one test with a value higher than 650 calories. In practice, this verifies\
    \ that no developer has messed up relational operators (such as writing <= instead\
    \ of <) or has made off-by-one errors.\n\nHowever, boundary value analysis is\
    \ only useful if you can easily segment your input domain. If it is difficult\
    \ to ascertain where you should split the domain, picking boundary values will\
    \ not be easy. This is where the generative nature of Hypothesis comes in; Hypothesis\
    \ generates input for test cases. It will find boundary values for you.\n\nYou\
