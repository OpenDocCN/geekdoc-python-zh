- md: "## Benefits of Type Annotations\n\nAs with every decision you make, you need\
    \ to weigh the costs and benefits. Thinking about types up front helps your deliberate\
    \ design process, but do type annotations provide other benefits? I'll show you\
    \ how type annotations really pull their weight through tooling.\n\n### Autocomplete\n\
    \nI've mainly talked about communication to other developers, but your Python\
    \ environment benefits from type annotations as well. Since Python is dynamically\
    \ typed, it is difficult to know what operations are available. With type annotations,\
    \ many Python-aware code editors will autocomplete your variable's operations.\n\
    \nIn Figure 3-1, you'll see a screenshot that illustrates a popular code editor,\
    \ VS Code, detecting a datetime and offering to autocomplete my variables.\n\n\
    ![](img/d64d2be45ca85b398807d181202e7046_59_0.png)\n\nFigure 3-1. VS Code showing\
    \ autocompletion\n\n### Typecheckers\n\nThroughout this book, I've been talking\
    \ about how types communicate intent, but have been leaving out one key detail:\
    \ no programmer has to honor these type annotations if they don't want to. If\
    \ your code contradicts a type annotation, it is probably an error and you're\
    \ still relying on humans to catch bugs. I want to do better. I want a computer\
    \ to find these sorts of bugs for me.\n\nI showed this snippet when talking about\
    \ dynamic typing back in Chapter 2:\n\n```python\n>>> a: int = 5\n>>> a = \"string\"\
    \n>>> a\n\"string\"\n```\n\nHerein lies the challenge: how do type annotations\
    \ make your codebase robust, when you can't trust that developers will follow\
    \ their guidance? In order to be robust, you want your code to stand the test\
    \ of time. To do that, you need some sort of tool that can check all your type\
    \ annotations and flag if anything is amiss. That tool is called a typechecker.\n\
    \nTypecheckers are what allow the type annotations to transcend from communication\
    \ method to a safety net. It is a form of static analysis. *Static analysis tools*\
    \ are tools that run on your source code, and don't impact your runtime at all.\
    \ You'll learn more about static analysis tools in Chapter 20, but for now, I\
    \ will just explain typecheckers.\n\nFirst, I need to install one. I'll use mypy,\
    \ a very popular typechecker.\n\n```bash\npip install mypy\n```\n\nNow I'll create\
    \ a file named *invalid_type.py* with incorrect behavior:\n\n```python\na: int\
    \ = 5\na = \"string\"\n```\n\nIf I run mypy on the command line against that file,\
    \ I will get an error:\n\n```\nmypy invalid_type.py\n\nchapter3/invalid_type.py:2:\
    \ error: Incompatible types in assignment\n    (expression has type \"str\", variable\
    \ has type\n    \"int\")\nFound 1 error in 1 file (checked 1 source file)\n```\n\
    \nAnd just like that, my type annotations become a first line of defense against\
    \ errors. Anytime you make a mistake and go against the author's intent, a type\
    \ checker will find out and alert you. In fact, in most development environments,\
    \ it's possible to get this analysis in real time, notifying you of errors as\
    \ you type. (Without reading your mind, this is about as early as a tool can catch\
    \ errors, which is pretty great.)\n\n### Exercise: Spot the Bug\n\nHere are some\
    \ more examples of mypy catching errors in my code. I want you to look for the\
    \ error in each code snippet and time how long it takes you to find the bug or\
    \ give up, and then check the output listed below the snippet to see if you got\
    \ it right.\n\n```python\ndef read_file_and_reverse_it(filename: str) -> str:\n\
    \    with open(filename) as f:\n        # Convert bytes back into str\n      \
    \  return f.read().encode(\"utf-8\")[::-1]\n```\n\nHere's the mypy output showing\
    \ the error:\n\n```\nmypy chapter3/invalid_example1.py\nchapter3/invalid_example1.py:3:\
    \ error: Incompatible return value type\n                                    \
    \    (got \"bytes\", expected \"str\")\nFound 1 error in 1 file (checked 1 source\
    \ file)\n```\n\nWhoops, I'm returning bytes, not a str. I made a call to encode\
    \ instead of decode, and got my return type all mixed up. I can't even tell you\
    \ how many times I made this mistake moving Python 2.7 code to Python 3. Thank\
    \ goodness for typecheckers.\n\nHere's another example:\n\n```python\n# takes\
    \ a list and adds the doubled values\n# to the end\n# [1,2,3] => [1,2,3,2,4,6]\n\
    def add_doubled_values(my_list: list[int]):\n    my_list.update([x*2 for x in\
    \ my_list])\n\nadd_doubled_values([1,2,3])\n```\n\nThe mypy error is as follows:\n\
    \n```\nmypy chapter3/invalid_example2.py\nchapter3/invalid_example2.py:6: error:\
    \ \"list[int]\" has no attribute \"update\"\nFound 1 error in 1 file (checked\
    \ 1 source file)\n```\n\nAnother innocent mistake I made by calling update on\
    \ a list instead of extend. These sorts of mistakes can happen quite easily when\
    \ moving between collection types (in this case from a set, which does offer an\
    \ update method, to a list, which doesn't).\n\nOne more example to wrap it up:\n\
    \n```python\n# The restaurant is named differently\n# in different parts of the\
    \ world\ndef get_restaurant_name(city: str) -> str:\n    if city in ITALY_CITIES:\n\
    \        return \"Trattoria Viaore\"\n    if city in GERMANY_CITIES:\n       \
    \ return \"Pat's Kantine\"\n    if city in US_CITIES:\n        return \"Pat's\
    \ Place\"\n    return None\n\nif get_restaurant_name('Boston'):\n    print(\"\
    Location Found\")\n```\n\nThe mypy error is as follows:\n\n```\nchapter3/invalid_example3.py:14:\
    \ error: Incompatible return value type\n                                    \
    \    (got \"None\", expected \"str\")\nFound 1 error in 1 file (checked 1 source\
    \ file)\n```\n\nThis one is subtle. I'm returning None when a string value is\
    \ expected. If all the code is just checking conditionally for the restaurant\
    \ name to make decisions, like I do above, tests will pass, and nothing will be\
    \ amiss. This is true even for the negative case, because None is absolutely fine\
    \ to check for in if statements (it is false-y). This is an example of Python's\
    \ dynamic typing coming back to bite us.\n\nHowever, a few months from now, some\
    \ developer will start trying to use this return value as a string, and as soon\
    \ as a new city needs to be added, the code starts trying to operate on None values,\
    \ which causes exceptions to be raised. This is not very robust; there is a latent\
    \ code bug just waiting to happen. But with typecheckers, you can stop worrying\
    \ about this and catch these mistakes early.\n\n![](img/d64d2be45ca85b398807d181202e7046_62_0.png)\n\
    \nWith typecheckers available, do you even need tests? You certainly do. Typecheckers\
    \ catch a specific class of errors: those of incompatible types. There are plenty\
    \ of other classes of errors that you still need to test for. Treat typecheckers\
    \ as just one tool in your arsenal of bug identification.\n\nIn all of these examples,\
    \ typecheckers found a bug just waiting to happen. It doesn't matter if the bug\
    \ would have been caught by tests, or by code review, or by customers; typecheckers\
    \ catch it earlier, which saves time and money. Typecheckers start giving us the\
    \ benefit of a statically typed language, while still allowing the Python runtime\
    \ to remain dynamically typed. This truly is the best of both worlds.\n\nAt the\
    \ beginning of the chapter, you'll find a quote from Guido van Rossum. While working\
    \ at Dropbox, he found that large codebases struggled without having a safety\
    \ net. He became a huge proponent for driving type hinting into the language.\
    \ If you want your code to communicate intent and catch errors, start adopting\
    \ type annotations and typechecking today.\n\n![](img/d64d2be45ca85b398807d181202e7046_62_1.png)\n\
    \n**Discussion Topic**\n\nHas your codebase had an error slip through that could\
    \ have been caught by typecheckers? How much do those errors cost you? How many\
    \ times has it been a code review or an integration test that caught the bug?\
    \ How about bugs that made it to production?\n\n## When to Use Type Annotations\n\
    \nNow, before you go adding types to everything, I need to talk about the cost.\
    \ Adding types is simple, but can be overdone. As users try to test and play around\
    \ with code, they may start fighting the typechecker because they feel bogged\
    \ down when writing all the type annotations. There is an adoption cost for users\
    \ who are just getting started with type hinting. I also mentioned that I don't\
    \ type annotate everything. I won't annotate all my variables, especially if the\
    \ type is obvious. I also won't typically type annotate parameters for every small\
    \ private method in a class.\n\nIn Python 3.8 and earlier, built-in collection\
    \ types such as list, dict, and set did not allow bracket syntax such as list[Cookbook]\
    \ or dict[str,int]. Instead, you needed to use type annotations from the typing\
    \ module:\n\n```python\nfrom typing import Dict, List\nAuthorToCountMapping =\
    \ Dict[str, int]\ndef count_author(\n    cookbooks: List[Cookbook]\n) -> AuthorToCountMapping:\n\
    \    # ...\n```\n\nYou can also annotate variables when needed:\n\n```python\n\
    workers: list[str] = find_workers_available_for_time(open_time)\nnumbers: list[int]\
    \ = []\nratio: float = get_ratio(5,3)\n```\n\nWhile I will annotate all of my\
    \ functions, I typically don't bother annotating variables unless there is something\
    \ specific I want to convey in my code (such as a type that is different than\
    \ expected). I don't want to get too into the realm of putting type annotations\
    \ on literally everything—the lack of verbosity is what drew many developers to\
    \ Python in the first place. The types can clutter your code, especially when\
    \ it is blindingly obvious what the type is.\n\n```python\nnumber: int = 0\ntext:\
    \ str = \"useless\"\nvalues: list[float] = [1.2, 3.4, 6.0]\nworker: Worker = Worker()\n\
    ```\n\nNone of these type annotations provide more value than what is already\
    \ provided by Python itself. Readers of this code know that \"useless\" is a str.\
    \ Remember, type annotations are used for type hinting; you are providing notes\
    \ for the future to improve communication. You don't need to state the obvious\
    \ everywhere.\n\n### Type Annotations Before Python 3.5\n\nIf you have the misfortune\
    \ of not being able to use a later version of Python, hope is not lost. There\
    \ is an alternative syntax for type annotations, even for Python 2.7.\n\nTo write\
    \ the annotations, you need to do so in a comment:\n\n```python\nratio = get_ratio(5,3)\
    \ # type: float\ndef get_workers(open): # type: (datetime.datetime) -> List[str]\n\
    ```\n\nThis is easier to miss, as the types are not visually close to the variable\
    \ itself. If you have the ability to upgrade to Python 3.5, consider doing so\
    \ and using the newer method of type annotations."
  mdcn: "## 类型注解的好处\n\n正如你做出的每一个决定一样，你需要权衡成本和收益。提前考虑类型有助于你的深思熟虑的设计过程，但类型注解是否提供其他好处呢？我将向你展示类型注解如何通过工具真正发挥其价值。\n\
    \n### 自动补全\n\n我主要谈论了向其他开发者的沟通，但你的Python环境也受益于类型注解。由于Python是动态类型的，很难知道有哪些操作可用。有了类型注解，许多支持Python的代码编辑器会自动补全你变量的操作。\n\
    \n在图3-1中，你会看到一个截图，展示了一个流行的代码编辑器VS Code检测到一个datetime并提供自动补全我的变量。\n\n![](img/d64d2be45ca85b398807d181202e7046_59_0.png)\n\
    \n图3-1. VS Code显示自动补全\n\n### 类型检查器\n\n在整本书中，我一直在谈论类型如何传达意图，但遗漏了一个关键细节：如果程序员不愿意，没有人必须遵守这些类型注解。如果你的代码与类型注解相矛盾，这可能是一个错误，而你仍然依赖人类来捕获错误。我想做得更好。我想让计算机为我找到这类错误。\n\
    \n在第2章讨论动态类型时，我展示了这个代码片段：\n\n```python\n>>> a: int = 5\n>>> a = \"string\"\n>>>\
    \ a\n\"string\"\n```\n\n这里存在一个挑战：当你不能相信开发者会遵循类型注解的指导时，类型注解如何使你的代码库变得健壮？为了健壮，你希望你的代码经得起时间的考验。为此，你需要某种工具来检查你所有的类型注解，并标记出任何异常。这个工具叫做类型检查器。\n\
    \n类型检查器使类型注解从沟通方法转变为安全网。它是一种静态分析的形式。*静态分析工具*是运行在你的源代码上，完全不影响你的运行时的工具。你将在第20章了解更多关于静态分析工具的内容，但现在，我将只解释类型检查器。\n\
    \n首先，我需要安装一个。我将使用mypy，一个非常流行的类型检查器。\n\n```bash\npip install mypy\n```\n\n现在我将创建一个名为*invalid_type.py*的文件，其中包含不正确的行为：\n\
    \n```python\na: int = 5\na = \"string\"\n```\n\n如果我在命令行上对那个文件运行mypy，我会得到一个错误：\n\
    \n```\nmypy invalid_type.py\n\nchapter3/invalid_type.py:2: error: Incompatible\
    \ types in assignment\n    (expression has type \"str\", variable has type\n \
    \   \"int\")\nFound 1 error in 1 file (checked 1 source file)\n```\n\n就这样，我的类型注解成为了抵御错误的第一道防线。每当你犯了一个错误并违背了作者的意图，类型检查器就会发现并提醒你。事实上，在大多数开发环境中，可以实时获得这种分析，在你输入时就通知你错误。（在不读取你思想的情况下，这已经是工具能尽早捕获错误的极限了，这相当不错。）\n\
    \n### 练习：找出错误\n\n这里有一些更多mypy在我的代码中捕获错误的例子。我希望你查看每个代码片段中的错误，并计时你花了多长时间找到错误或放弃，然后检查片段下面列出的输出，看看你是否正确。\n\
    \n```python\ndef read_file_and_reverse_it(filename: str) -> str:\n    with open(filename)\
    \ as f:\n        # Convert bytes back into str\n        return f.read().encode(\"\
    utf-8\")[::-1]\n```\n\n以下是显示错误的mypy输出：\n\n```\nmypy chapter3/invalid_example1.py\n\
    chapter3/invalid_example1.py:3: error: Incompatible return value type\n      \
    \                                  (got \"bytes\", expected \"str\")\nFound 1\
    \ error in 1 file (checked 1 source file)\n```\n\n哎呀，我返回的是bytes，而不是str。我调用了encode而不是decode，把返回类型搞混了。我甚至无法告诉你我在将Python\
    \ 2.7代码迁移到Python 3时犯了多少次这个错误。感谢类型检查器。\n\n这是另一个例子：\n\n```python\n# takes a list\
    \ and adds the doubled values\n# to the end\n# [1,2,3] => [1,2,3,2,4,6]\ndef add_doubled_values(my_list:\
    \ list[int]):\n    my_list.update([x*2 for x in my_list])\n\nadd_doubled_values([1,2,3])\n\
    ```\n\nmypy错误如下：\n\n```\nmypy chapter3/invalid_example2.py\nchapter3/invalid_example2.py:6:\
    \ error: \"list[int]\" has no attribute \"update\"\nFound 1 error in 1 file (checked\
    \ 1 source file)\n```\n\n另一个我犯的无心之错，在列表上调用了update而不是extend。当在集合类型之间移动时（在这种情况下是从确实提供update方法的set，到不提供update方法的list），这类错误很容易发生。\n\
    \n最后一个例子来总结：\n\n```python\n# The restaurant is named differently\n# in different\
    \ parts of the world\ndef get_restaurant_name(city: str) -> str:\n    if city\
    \ in ITALY_CITIES:\n        return \"Trattoria Viaore\"\n    if city in GERMANY_CITIES:\n\
    \        return \"Pat's Kantine\"\n    if city in US_CITIES:\n        return \"\
    Pat's Place\"\n    return None\n\nif get_restaurant_name('Boston'):\n    print(\"\
    Location Found\")\n```\n\nmypy错误如下：\n\n```\nchapter3/invalid_example3.py:14: error:\
    \ Incompatible return value type\n                                        (got\
    \ \"None\", expected \"str\")\nFound 1 error in 1 file (checked 1 source file)\n\
    ```\n\n这个很微妙。当期望一个字符串值时，我返回了None。如果所有代码只是像我上面那样有条件地检查餐厅名称来做决定，测试会通过，一切正常。即使对于负面情况也是如此，因为None在if语句中检查是完全可以的（它是假值）。这是Python动态类型回来咬我们的一个例子。\n\
    \n然而，几个月后，某个开发者会开始尝试将这个返回值用作字符串，一旦需要添加一个新城市，代码就开始尝试对None值进行操作，这会导致异常被引发。这不是很健壮；有一个潜在的代码错误正等着发生。但有了类型检查器，你可以停止担心这个，并尽早捕获这些错误。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_62_0.png)\n\n有了类型检查器，你还需要测试吗？你当然需要。类型检查器捕获一类特定的错误：不兼容类型的错误。还有很多其他类别的错误你仍然需要测试。将类型检查器视为你错误识别工具库中的一个工具。\n\
    \n在所有这些例子中，类型检查器都发现了一个正等着发生的错误。无论这个错误是否会被测试、代码审查或客户捕获，都无关紧要；类型检查器更早地捕获它，这节省了时间和金钱。类型检查器开始给我们带来静态类型语言的好处，同时仍然允许Python运行时保持动态类型。这确实是两全其美。\n\
    \n在本章开头，你会找到Guido van Rossum的一句名言。在Dropbox工作时，他发现大型代码库在没有安全网的情况下举步维艰。他成为了推动类型提示进入语言的大力支持者。如果你想让你的代码传达意图并捕获错误，今天就开始采用类型注解和类型检查吧。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_62_1.png)\n\n**讨论主题**\n\n你的代码库是否曾出现过本可以被类型检查器捕获的错误？这些错误让你付出了多少代价？有多少次是代码审查或集成测试捕获了错误？那些进入生产环境的错误呢？\n\
    \n## 何时使用类型注解\n\n现在，在你开始给所有东西添加类型之前，我需要谈谈成本。添加类型很简单，但可能做过头了。当用户尝试测试和试用代码时，他们可能会开始与类型检查器作斗争，因为他们觉得在编写所有类型注解时被拖累了。对于刚开始使用类型提示的用户来说，有一个采用成本。我也提到过我不会给所有东西都加类型注解。我不会注解我所有的变量，特别是当类型很明显的时候。我也通常不会为类中的每个小私有方法注解参数。\n\
    \n在Python 3.8及更早版本中，内置集合类型如list、dict和set不允许使用括号语法，如list[Cookbook]或dict[str,int]。相反，你需要使用typing模块中的类型注解：\n\
    \n```python\nfrom typing import Dict, List\nAuthorToCountMapping = Dict[str, int]\n\
    def count_author(\n    cookbooks: List[Cookbook]\n) -> AuthorToCountMapping:\n\
    \    # ...\n```\n\n你也可以在需要时注解变量：\n\n```python\nworkers: list[str] = find_workers_available_for_time(open_time)\n\
    numbers: list[int] = []\nratio: float = get_ratio(5,3)\n```\n\n虽然我会注解我所有的函数，但我通常不会费心去注解变量，除非我想在代码中传达一些特定的东西（比如一个与预期不同的类型）。我不想过于深入地在所有东西上都放类型注解的领域——缺乏冗长性正是吸引许多开发者使用Python的首要原因。类型会使你的代码变得杂乱，特别是当类型是显而易见的时候。\n\
    \n```python\nnumber: int = 0\ntext: str = \"useless\"\nvalues: list[float] = [1.2,\
    \ 3.4, 6.0]\nworker: Worker = Worker()\n```\n\n这些类型注解都没有提供比Python本身已经提供的更多价值。这段代码的读者知道\"\
    useless\"是一个str。记住，类型注解用于类型提示；你是在为未来提供注释以改善沟通。你不需要在每个地方都陈述显而易见的事情。\n\n### Python\
    \ 3.5之前的类型注解\n\n如果你不幸无法使用更高版本的Python，希望并未破灭。对于Python 2.7，也有类型注解的替代语法。\n\n要编写注解，你需要在注释中这样做：\n\
    \n```python\nratio = get_ratio(5,3) # type: float\ndef get_workers(open): # type:\
    \ (datetime.datetime) -> List[str]\n```\n\n这更容易被忽略，因为类型在视觉上并不靠近变量本身。如果你有能力升级到Python\
    \ 3.5，考虑这样做并使用更新的类型注解方法。"
