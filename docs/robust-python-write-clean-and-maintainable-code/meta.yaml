    \n## 操作\n\n所以现在我有一个不变量不能（轻易）被破坏的类。我有一个可以构造的类，但我无法从中更改或读取任何数据。这是因为到目前为止我只涉及了封装的一个部分：数据的隐藏。我仍然需要介绍如何将操作与数据捆绑在一起。方法登场了。\n\
