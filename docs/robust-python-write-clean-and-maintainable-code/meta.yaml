  md: 'In this chapter, you will learn about acceptance testing in Python. I''ll show
    you the behave framework, which uses the Gherkin language to define requirements
    in a whole new fashion.¹ You''ll walk through behavior-driven development (BDD)
    as a tool to clarify conversations. Acceptance testing is a crucial part of building
    a safety net; it will protect you from building the wrong thing.


    # Behavior-Driven Development


    The mismatch between customer expectations and software behavior is as old as
    software development. The problem stems from translating natural language to programming
    language. Natural language is rife with ambiguities, inconsistencies, and nuance.
    Programming languages are rigid. The computer does exactly what you tell it to
    do (even if it''s not what you meant). Even worse, it''s like a game of Telephone²
    as the requirements get passed through a few people (customers, sales, managers,
    testers) before the test is ever written.


    As with everything in the software life cycle, this error case only gets more
    costly the longer it takes to fix. Ideally, you want to find out these issues
    as you''re coming up with user requirements. This is where behavior-driven development
    comes into play.


    # The Gherkin Language


    *Behavior-driven development*, first pioneered by Daniel Terhorst-North, is a
    practice that focuses on defining the behaviors in your system. BDD focuses on
    clarifying communications; you iterate over the requirements with the end user,
    defining the behaviors they want.


    Before you write a single lick of code, you make sure that you have agreement
    on what the right thing to build is. The set of defined behaviors will *drive*
    what code you write. You work with the end user (or their proxy, such as a business
    analyst or product manager) to define your requirements as a specification. These
    specifications follow a formal language, to introduce a bit more rigidity in their
    definition. One of the most common languages for specifying requirements is Gherkin.


    Gherkin is a specification that follows the *Given-When-Then* (GWT) format. Every
    requirement is organized as follows:


    > 1 The Gherkin language was created by Aslak Hellesøy. His wife suggested that
    his BDD testing tool be named Cucumber (apparently for no specific reason), and
    he wanted to distinguish the specification language from the testing tool itself.
    Since a gherkin is a small, pickled cucumber, he continued the theme, and the
    Gherkin specification language was born.


    2 Telephone is a game where everyone sits in a circle, and one person whispers
    a message to another. The message continues to get whispered around the circle
    until it reaches the origin. Everyone has a laugh at how the message has gotten
    distorted.'
