    # Closing Thoughts


    Property-based testing does not exist to replace traditional testing; it exists
    to supplement it. When your code has well-defined inputs and outputs, testing
    with hard-coded preconditions and expected assertions is sufficient. However,
    as your code gets more complex, your tests become more complex, and you find yourself
    spending more time than you want parsing and understanding tests.


    Property-based testing is simple to use with Hypothesis in Python. It repairs
    holes in your safety net by generating new tests throughout the lifetime of your
    codebase. You use hypothesis.strategies to control exactly how your test data
    gets generated. You can even test algorithms by combining different steps with
    hypothesis.stateful testing. Hypothesis will let you focus on the properties and
    invariants of your code and express your tests more naturally.


    In the next chapter, I will wrap up the book with mutation testing. Mutation testing
    is another method of filling gaps in your safety net. Instead of finding new ways
    of testing your code, mutation code focuses on measuring the efficacy of your
    tests. It is another tool in your arsenal for more robust testing.'
