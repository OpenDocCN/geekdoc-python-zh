  md: '```

    Scenario: Texas-Style Chili

    Given a Chili-Making Machine

    When a Chili is dispensed

    Then that dish does not contain beans

    And that dish does not contain tomatoes

    ```


    It becomes much clearer what tests need to be written to act as acceptance tests.
    If the Gherkin test has any ambiguities, you can work with the end user to figure
    out what a concrete test should be. This can also help with traditionally vague
    requirements such as, “The Chili-Making Machine should be fast.” Instead, by focusing
    on a concrete test, you end up with a test like this:


    ```

    Scenario: Chili order takes less than two minutes

    Given a Chili-Making Machine

    When a Chili is ordered

    Then the Chili is dispensed to the customer within two minutes

    ```


    ![](img/d64d2be45ca85b398807d181202e7046_337_0.png)


    These requirements specifications are not a silver bullet to eliminate bugs in
    requirements. They are instead a mitigation strategy. If you have technical and
    business people review them before code is written, you will have a better chance
    of discovering ambiguities or mismatched intentions.


    Once you start defining your tests in Gherkin, you can do something awesome: you
    can make your specifications *executable*.


    # Executable Specifications


    *Executable specifications* translate a set of requirements directly to code.
    This means that not only are your requirements *testable*, but they are *tests*
    as well. When the requirements change, your tests will change at the same time.
    This is the ultimate form of *traceability*, or the ability to connect your requirements
    to specific tests or code.


    ![](img/d64d2be45ca85b398807d181202e7046_337_1.png)


    **Discussion Topic**

    How does your organization track requirements? How do you trace those requirements
    to test cases? How do you handle requirements changing? Discuss how your processes
    would change if your requirements and tests were the same thing.


    The Python module `behave` allows you to back your Gherkin requirements with concrete
    tests. It does so by associating functions with specific clauses in the requirement.'
