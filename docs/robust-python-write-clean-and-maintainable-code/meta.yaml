    \ or up to 60 seconds for a requests.exceptions.HTTPError. This is composability\
    \ at work; I can mix’n’match completely separate backoff decorators to define\
    \ the policies however I want.\n\nContrast this with writing the mechanisms directly\
    \ into the function:\n\n```\ndef save_inventory_counts(inventory):\n    retry\
    \ = True\n    retry_counter = 0\n    time_to_sleep = 1\n    while retry:\n   \
    \     try:\n            for ingredient in inventory:\n                self.inventory_db[ingredient.name]\
    \ = ingredient.count\n        except OperationException:\n            retry_counter\
    \ += 1\n            if retry_counter == 5:\n                retry = False\n  \
