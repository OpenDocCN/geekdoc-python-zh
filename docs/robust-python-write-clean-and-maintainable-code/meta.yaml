- md: "Consider the lowly spice rack in a kitchen. What sort of meals would you create\
    \ if you were to stock your spice rack exclusively with blends of spices, such\
    \ as pumpkin pie spice (cinnamon, nutmeg, ginger, and cloves) or Chinese five-spice\
    \ (cinnamon, fennel, star anise, Sichuan peppercorns, and cloves)? You'd end up\
    \ predominantly making recipes that centered on these spice mixes, such as pumpkin\
    \ pie or five-spice chicken. While these blends make specialized meals incredibly\
    \ easy to prepare, what happens if you need to make something that just uses individual\
    \ ingredients, such as a cinnamon-clove syrup? You could try to substitute pumpkin\
    \ pie spice or five-spice powder and hope that the extra ingredients don't clash,\
    \ or you could buy cinnamon and cloves individually.\n\nThe individual spices\
    \ are analogous to small, composable bits of software. You don't know what dishes\
    \ you might want to make in the future, nor do you know what business needs you\
    \ will have in the future. By focusing on discrete components, you give your collaborators\
    \ flexibility in using what they need, without trying to make suboptimal substitutions\
    \ or pulling other components along for the ride. And if you need a specialized\
    \ blend of components (such as a pumpkin pie spice), you are free to build your\
    \ application from those components. Software doesn't expire like spice mixes;\
    \ you can have your cake (or pumpkin pie) and eat it too. Build the specialized\
    \ applications from small, discrete, composable software, and you'll find that\
    \ you can reuse those components in brand new ways next week or next year.\n\n\
    You've actually seen composability before when you learned about building your\
    \ own types in Part II. I built up an array of small, discrete types that could\
    \ be reused in multiple scenarios. Each type contributed to a vocabulary of concepts\
    \ in the codebase. Developers could use these types to represent domain ideas,\
    \ but also to build upon to define new concepts. Take a look at a definition of\
    \ a soup from Chapter 9:\n\n```python\nclass ImperialMeasure(Enum):\n    TEASPOON\
    \ = auto()\n    TABLESPOON = auto()\n    CUP = auto()\n\nclass Broth(Enum):\n\
    \    VEGETABLE = auto()\n    CHICKEN = auto()\n    BEEF = auto()\n    FISH = auto()\n\
    \n@dataclass(frozen=True)\n# Ingredients added into the broth\nclass Ingredient:\n\
    \    name: str\n    amount: float = 1\n    units: ImperialMeasure = ImperialMeasure.CUP\n\
    \n@dataclass\nclass Recipe:\n    aromatics: set[Ingredient]\n    broth: Broth\n\
    \    vegetables: set[Ingredient]\n    meats: set[Ingredient]\n    starches: set[Ingredient]\n\
    \    garnishes: set[Ingredient]\n    time_to_cook: datetime.timedelta\n```\n\n\
    I was able to create a Recipe out of Ingredient, Broth, and ImperialMeasure objects.\
    \ All of these concepts could have been embedded in Recipe itself, but this would\
    \ have made reuse tougher (if somebody wanted to use an ImperialMeasure, it'd\
    \ be confusing to depend on Recipe to do so.) By keeping each of these types disparate,\
    \ I allow future maintainers to build new types, such as non-soup-related concepts,\
    \ without needing to find ways to tease apart dependencies.\n\nThis was an example\
    \ of *type composition*, where I created discrete types that could be mixed and\
    \ matched in new ways. In this chapter, I'm going to focus on other common composition\
    \ types in Python, such as composing functionality, functions, and algorithms.\
    \ Take, for instance, the simple menu at a sandwich shop, like the one in Figure\
    \ 17-1.\n\n![](img/d64d2be45ca85b398807d181202e7046_264_0.png)\n\nThis menu is\
    \ another example of composability. Diners pick two entries off the first part\
    \ of the menu, plus a side and a drink. They *compose* different parts of the\
    \ menu to get the exact lunch they want. If this menu were not composable, you\
    \ would have to list every single option to represent all the combinations possible\
    \ (and with 1,120 options, that's a menu that puts most restaurants to shame).\
    \ This is not tractable for any restaurant to handle; it's easier to break the\
    \ menu into parts that can be pieced together.\n\nI want you to think about your\
    \ code in the same way. Code doesn't become composable just by existing; you have\
    \ to actively design with composability in mind. You want to look at the classes,\
    \ functions, and data types that you create and ask how you can write them so\
    \ that future developers can reuse them.\n\nConsider an automated kitchen, creatively\
    \ named AutoKitchen, that serves as the backbone of Pat's Café. It is a fully\
    \ automated system that is able to make any dish on the menu. I want it to be\
    \ easy to add new dishes to this system; Pat's Café boasts an ever-changing menu,\
    \ and the developers are tired of having to spend a lot of time modifying large\
    \ chunks of the system each time. The design of AutoKitchen is shown in Figure\
    \ 17-2.\n\n![](img/d64d2be45ca85b398807d181202e7046_265_0.png)\n\nFigure 17-2.\
    \ AutoKitchen design\n\nThis design is fairly straightforward. The AutoKitchen\
    \ depends on various preparation mechanisms, known as *preparers*. Each preparer\
    \ depends on kitchen elements to turn ingredients into a dish component (such\
    \ as turning ground beef into a cooked hamburger). Kitchen elements, such as the\
    \ oven or grill, are issued commands to cook various ingredients; they have no\
    \ knowledge of the specific ingredients being used or the resulting dish component.\
    \ Figure 17-3 illustrates what a specific preparer might look like.\n\nThis design\
    \ is extensible, which is a good thing. Adding a new sandwich type is simple,\
    \ because I don’t have to modify any of the existing sandwich code. However, this\
    \ is not very composable. If I wanted to take dish components and reuse them for\
    \ new dishes (such as cooking bacon for a BLT wrap, or cooking hamburgers for\
    \ cheeseburger soup), I would have to bring the entire BLT Maker or Patty Melt\
    \ Maker with me. If I do that, I’d have to take a Bread Maker and Database with\
    \ me as well. This is what I want to avoid.\n\n![](img/d64d2be45ca85b398807d181202e7046_266_0.png)\n\
    \nNow, I want to introduce a new soup: potato, leek, and bacon. The Soup Preparer\
    \ already knows how to handle leeks and potatoes from other soups; I now want\
    \ the Soup Preparer to know how to make bacon. While modifying Soup Preparer,\
    \ I have a few options: introduce a dependency on a BLT Maker, write my own bacon-handling\
    \ code, or find a way to reuse just the bacon-handling part separately from the\
    \ BLT Maker.\n\nThe first option has issues: if I depend on a BLT Maker, I need\
    \ to depend on all of its physical dependencies, such as a Bread Maker. A Soup\
    \ Preparer might not want all that baggage. The second option is not great either,\
    \ because now I have duplication of bacon handling in my codebase (and once you\
    \ have two, don't be surprised if a third pops up eventually). The only good option\
    \ is to find a way to split the bacon making from the BLT Maker.\n\nHowever, code\
    \ doesn't become reusable just because you wish it to be (it would be nice, though).\
    \ You have to consciously design your code to be reusable. You need to make it\
    \ small, discrete, and mostly independent from business logic to make it composable.\
    \ And to do that, you need to separate policies from mechanisms.\n\n## Policy\
    \ Versus Mechanisms\n\nPolicies are your business logic, or the code directly\
    \ responsible for solving your business needs. The mechanisms are the pieces of\
    \ code that provide how you will enact the policies. In the previous example,\
    \ the policies of the system are the specific recipes. In contrast, how it makes\
    \ those recipes are the mechanisms.\n\nWhen you focus on making code composable,\
    \ you need to separate the policies from the mechanisms. The mechanisms are often\
    \ the thing you want to reuse; it doesn't help when they are linked together with\
    \ a policy. It's this reason why a Soup Preparer depending on a BLT Maker doesn't\
    \ make sense. You end up with policy depending on a completely separate and unrelated\
    \ policy.\n\nWhen you link two unrelated policies, you start creating a dependency\
    \ that becomes tough to break later on. As you link more and more policies, you\
    \ create spaghetti code. You get a tangled mess of dependencies, and extricating\
    \ any one dependency becomes problematic. This is why you need to be cognizant\
    \ of which parts of your codebase are policies and which are mechanisms.\n\nA\
    \ great example of policy versus mechanisms is the `logging` module in Python.\
    \ The policy outlines what you need logged and where to log it; the mechanisms\
    \ are what let you set log levels, filter log messages, and format logs.\n\nMechanically,\
    \ any module can call logging methods:\n\n```python\nlogging.basicConfig(format='%(levelname)s:%(message)s',\
    \ level=logging.DEBUG)\nlogger.warning(\"Family did not match any restaurants:\
    \ Lookup code A1503\")\n```\n\nThe `logging` module does not care what it is logging\
    \ or about the format of the log message. The `logging` module simply provides\
    \ the *how* of logging. It's up to any consuming application to define the policies,\
    \ or the *what*, which outline what needs to get logged. Separating the policy\
    \ from the mechanism makes the `logging` module reusable. You can easily extend\
    \ your codebase's functionality without pulling along heaps of baggage. This is\
    \ the model you should strive for in the mechanisms present in your codebase.\n\
    \n### Composability in the Wild\n\nOnce you start thinking about separating policies\
    \ and mechanisms, you will start to see composability patterns show up in your\
    \ everyday development life.\n\nConsider a Unix-style command line. Rather than\
    \ defining new applications, the command line gives you small discrete programs\
    \ that you can compose together through piping.\n\nInstead of writing a hyper-specialized\
    \ program, such as parsing a log to get the error code, sorted by datetime, I\
    \ could write the following on the command line:\n\n`grep -i \"ERROR\" log.txt\
    \ | cut 3,5 | sort -r`\n\nAnother example is continuous integration pipelines\
    \ with third-party integrations (such as GitHub Actions or Travis CI). Developers\
    \ want to run a series of checks and actions as part of their check-in process;\
    \ many of these checks are provided by third-party entities (such as security\
    \ scanners or pushing to a container registry). Developers don't have to know\
    \ the internals of how this is done. Instead, they define policies"
  mdcn: "想想厨房里不起眼的调料架。如果你只用混合香料来填满调料架，比如南瓜派香料（肉桂、肉豆蔻、生姜和丁香）或中国五香粉（肉桂、茴香、八角、花椒和丁香），你会做出什么样的菜肴？你最终主要会制作以这些混合香料为中心的食谱，比如南瓜派或五香鸡。虽然这些混合香料让制作特色菜肴变得异常简单，但如果你需要制作只使用单一原料的东西，比如肉桂丁香糖浆，会发生什么？你可以尝试用南瓜派香料或五香粉代替，并希望额外的原料不会冲突，或者你可以单独购买肉桂和丁香。\n\
    \n单一的香料类似于小型、可组合的软件组件。你不知道未来可能想做什么菜，也不知道未来会有什么业务需求。通过专注于离散的组件，你可以让协作者灵活地使用他们需要的东西，而无需进行次优的替换或拖拽其他组件。如果你需要一种特殊的组件混合物（比如南瓜派香料），你可以自由地从这些组件构建你的应用程序。软件不会像混合香料那样过期；你可以既拥有蛋糕（或南瓜派），又享用它。从小型、离散、可组合的软件构建专门的应用程序，你会发现下周或明年就能以全新的方式重用这些组件。\n\
    \n实际上，你在第二部分学习构建自己的类型时已经见过可组合性了。我构建了一系列小型、离散的类型，可以在多种场景中重用。每个类型都为代码库中的概念词汇做出了贡献。开发者可以使用这些类型来表示领域概念，也可以在此基础上定义新的概念。看看第9章中汤的定义：\n\
    \n```python\nclass ImperialMeasure(Enum):\n    TEASPOON = auto()\n    TABLESPOON\
    \ = auto()\n    CUP = auto()\n\nclass Broth(Enum):\n    VEGETABLE = auto()\n \
    \   CHICKEN = auto()\n    BEEF = auto()\n    FISH = auto()\n\n@dataclass(frozen=True)\n\
    # Ingredients added into the broth\nclass Ingredient:\n    name: str\n    amount:\
    \ float = 1\n    units: ImperialMeasure = ImperialMeasure.CUP\n\n@dataclass\n\
    class Recipe:\n    aromatics: set[Ingredient]\n    broth: Broth\n    vegetables:\
    \ set[Ingredient]\n    meats: set[Ingredient]\n    starches: set[Ingredient]\n\
    \    garnishes: set[Ingredient]\n    time_to_cook: datetime.timedelta\n```\n\n\
    我能够用 `Ingredient`、`Broth` 和 `ImperialMeasure` 对象创建一个 `Recipe`。所有这些概念本可以嵌入到 `Recipe`\
    \ 本身中，但这会使重用变得更加困难（如果有人想使用 `ImperialMeasure`，依赖 `Recipe` 会令人困惑。）通过保持这些类型各自独立，我允许未来的维护者构建新的类型，例如与汤无关的概念，而无需想办法拆分依赖关系。\n\
    \n这是一个*类型组合*的例子，我创建了离散的类型，可以以新的方式进行混合和匹配。在本章中，我将重点介绍 Python 中其他常见的组合类型，例如组合功能、函数和算法。以三明治店的简单菜单为例，如图\
    \ 17-1 所示。\n\n![](img/d64d2be45ca85b398807d181202e7046_264_0.png)\n\n这个菜单是可组合性的另一个例子。食客从菜单的第一部分选择两个条目，再加上一份配菜和一杯饮料。他们*组合*菜单的不同部分来获得他们想要的午餐。如果这个菜单不可组合，你将不得不列出每一个选项来代表所有可能的组合（有\
    \ 1,120 个选项，这样的菜单会让大多数餐厅相形见绌）。这对任何餐厅来说都是难以处理的；将菜单分解成可以拼凑的部分更容易。\n\n我希望你以同样的方式思考你的代码。代码不会仅仅因为存在就变得可组合；你必须积极地以可组合性为设计理念。你需要审视你创建的类、函数和数据类型，并思考如何编写它们，以便未来的开发者可以重用它们。\n\
    \n考虑一个名为 AutoKitchen 的自动化厨房，它是 Pat's Café 的核心。这是一个全自动系统，能够制作菜单上的任何菜肴。我希望向这个系统添加新菜肴变得容易；Pat's\
    \ Café 以其不断变化的菜单而自豪，开发者们厌倦了每次都要花费大量时间修改大块系统。AutoKitchen 的设计如图 17-2 所示。\n\n![](img/d64d2be45ca85b398807d181202e7046_265_0.png)\n\
    \n图 17-2. AutoKitchen 设计\n\n这个设计相当直接。AutoKitchen 依赖于各种准备机制，称为*准备器*。每个准备器依赖于厨房元素将原料转化为菜肴组件（例如将碎牛肉变成煮熟的汉堡肉饼）。厨房元素，如烤箱或烤架，被发出命令来烹饪各种原料；它们不知道正在使用的具体原料或产生的菜肴组件。图\
    \ 17-3 展示了一个特定的准备器可能的样子。\n\n这个设计是可扩展的，这是一件好事。添加新的三明治类型很简单，因为我无需修改任何现有的三明治代码。然而，这并不是非常可组合。如果我想将菜肴组件重用于新菜肴（例如为\
    \ BLT 卷饼烹饪培根，或为芝士汉堡汤烹饪汉堡肉饼），我将不得不带上整个 BLT 制作器或肉饼融化制作器。如果我这样做，我还必须带上面包制作器和数据库。这是我想避免的。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_266_0.png)\n\n现在，我想引入一种新的汤：土豆、韭葱和培根。汤准备器已经知道如何处理其他汤中的韭葱和土豆；我现在希望汤准备器知道如何制作培根。在修改汤准备器时，我有几个选择：引入对\
    \ BLT 制作器的依赖，编写自己的培根处理代码，或者找到一种方法将培根处理部分与 BLT 制作器分开重用。\n\n第一个选项有问题：如果我依赖 BLT 制作器，我就需要依赖它的所有物理依赖项，比如面包制作器。汤准备器可能不想要所有这些包袱。第二个选项也不太好，因为现在我的代码库中出现了培根处理的重复（一旦你有了两个，别惊讶最终会出现第三个）。唯一好的选择是找到一种方法将培根制作从\
    \ BLT 制作器中分离出来。\n\n然而，代码不会仅仅因为你希望它可重用就变得可重用（尽管那样会很好）。你必须有意识地设计你的代码使其可重用。你需要让它小巧、离散，并且大部分独立于业务逻辑，以使其可组合。为此，你需要将策略与机制分离。\n\
    \n## 策略与机制\n\n策略是你的业务逻辑，或者直接负责解决业务需求的代码。机制是提供如何执行策略的代码片段。在前面的例子中，系统的策略是具体的食谱。相比之下，它如何制作这些食谱则是机制。\n\
    \n当你专注于使代码可组合时，你需要将策略与机制分离。机制通常是你想要重用的东西；当它们与策略链接在一起时，重用就没有帮助了。这就是为什么汤准备器依赖 BLT\
    \ 制作器没有意义的原因。最终你会得到一个策略依赖于一个完全独立且不相关的策略。\n\n当你链接两个不相关的策略时，你开始创建一个以后很难打破的依赖。随着你链接越来越多的策略，你会创建意大利面条式代码。你会得到一团乱麻的依赖关系，而提取任何一个依赖都会变得有问题。这就是为什么你需要清楚代码库的哪些部分是策略，哪些是机制。\n\
    \n策略与机制的一个很好的例子是 Python 中的 `logging` 模块。策略概述了你需要记录什么以及在哪里记录；机制是让你设置日志级别、过滤日志消息和格式化日志的部分。\n\
    \n从机制上讲，任何模块都可以调用日志记录方法：\n\n```python\nlogging.basicConfig(format='%(levelname)s:%(message)s',\
    \ level=logging.DEBUG)\nlogger.warning(\"Family did not match any restaurants:\
    \ Lookup code A1503\")\n```\n\n`logging` 模块不关心它记录什么或日志消息的格式。`logging` 模块只是提供了记录日志的*方式*。定义策略或*内容*，概述需要记录什么，这取决于任何使用它的应用程序。将策略与机制分离使得\
    \ `logging` 模块可重用。你可以轻松扩展代码库的功能，而无需拖拽大量包袱。这是你应该努力在代码库中存在的机制中实现的模型。\n\n### 现实世界中的可组合性\n\
    \n一旦你开始思考分离策略和机制，你就会开始在日常开发生活中看到可组合性模式。\n\n考虑一个 Unix 风格的命令行。命令行没有定义新的应用程序，而是给你小型的离散程序，你可以通过管道将它们组合在一起。\n\
    \n与其编写一个高度专门化的程序，比如解析日志以获取错误代码并按日期时间排序，我可以在命令行上编写以下内容：\n\n`grep -i \"ERROR\" log.txt\
    \ | cut 3,5 | sort -r`\n\n另一个例子是带有第三方集成（如 GitHub Actions 或 Travis CI）的持续集成管道。开发者希望在签入过程中运行一系列检查和操作；许多这些检查由第三方实体提供（如安全扫描器或推送到容器注册表）。开发者不需要知道这是如何完成的内部细节。相反，他们定义策略"
