    This will generate a SQLite database that stores all the function calls made throughout
    the execution of that program. You should try to run as many parts of your system
    as you can in order to populate this database. Unit tests, integration tests,
    and test programs all contribute to populating the database.


    ![](img/d64d2be45ca85b398807d181202e7046_122_0.png)


    Because MonkeyType works by instrumenting your code using `sys.setprofile`, other
    instrumentation such as code coverage and profiling will not work at the same
    time. Any tool that uses instrumentation will need to be run separately.'
