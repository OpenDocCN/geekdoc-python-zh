  md: "# Avoiding Broken Invariants\n\nIt is incredibly important that you never,\
    \ ever construct this class if the invariants would be broken. You have two avenues\
    \ that you can choose if the caller ever constructs an object in a way such that\
    \ invariants would be broken.\n\nThrow an exception\nThis prevents the object\
    \ from being constructed. This is what I did when making sure the dough radius\
    \ was appropriate and that I had at most one sauce.\n\nMassage the data\nMake\
    \ the data conform to the invariant. I could have thrown an exception when I didn't\
    \ get toppings in the right order, but instead, I rearranged them to satisfy the\
    \ invariant.\n\n> What If You Don't Want Exceptions?\nIf you don't want to use\
    \ exceptions, you can use a function to create your class instead (also known\
    \ as a factory method). You can hide your class from help() by preceding the class\
    \ with an underscore (_), and then create a function in your module that checks\
    \ invariants and instantiates the class. If the invariants are not satisfiable,\
    \ you can return None. Make sure you are using Optional types (as covered in Chapter\
