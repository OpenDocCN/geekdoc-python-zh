    The catch is that this developer wants to A/B test these algorithms (and any other
    algorithm they come up with). With A/B testing, they want 75% of customers to
    be presented recommendations from the first algorithm and 25% of customers from
    the second. That way, they can measure how well the new algorithm works in relation
    to the old. This means your codebase has to support both algorithms (and be flexible
    to support new algorithms in the future). You don''t want to see your codebase
    littered with ugly recommendation algorithm methods.


    You need to apply composability principles to the algorithm itself. Copy-pasting
    the for loop code snippet and tweaking it is not a viable answer. To solve this,
    you once again need to separate your policies and mechanisms. This will help you
    break down the problem and improve the codebase.


    Your policy this time is the actual details of the algorithm: what you''re sorting,
    how you''re filtering, and what you''re ultimately selecting. The mechanisms are
    the iteration patterns that describe how we''re shaping the data. In fact, I''ve
    already used an iteration mechanism in my code above: sorting. Instead of manually
    sorting (and forcing readers to understand what I''m doing), I used the sorted
    method. I indicated what I want sorted and in the key to sort by, but I really
    don''t care (nor do I expect my readers to care) about the actual sorting algorithm.


    If I were to compare the two algorithms, I can break down the mechanisms into
    the following (I''ll mark policies with <angle brackets>):


    +   - Look at <a list of meals>

    - Sort based on <initial sorting criteria>

    - Select the meals with the <grouping criteria>

    - Sort the meals by <secondary sorting criteria>

    - Take top results that match <selection criteria>

    - Return up to top <number> results


    ![](img/d64d2be45ca85b398807d181202e7046_275_0.png)


    The itertools module is a fantastic source of composable algorithms, all centered
    on iteration. It serves as a great example of what you can do when you create
    abstract mechanisms.'
