    # Discussion Topic


    Do you use duck typing in your codebase? Are there places where you can pass in
    types that don''t match what the code is looking for, but things still work? Do
    you think these increase or decrease robustness for your use cases?


    # Closing Thoughts


    Types are a pillar of clean, maintainable code and serve as a communication tool
    to other developers. If you take care with types, you communicate a great deal,
    creating less burden for future maintainers. The rest of Part I will show you
    how to use types to enhance a codebase''s robustness.


    Remember, Python is dynamically and strongly typed. The strongly typed nature
    will be a boon for us; Python will notify us about errors when we use incompatible
    types. But its dynamically typed nature is something we will have to overcome
    in order to write better code. These language choices shape how Python code is
    written and you should keep them in mind as you write your code.


    In the next chapter, we''re going to talk about type annotations, which is how
    we can be explicit about the type we use. Type annotations serve a crucial role:
    our primary communication method of behaviors to future developers. They help
    overcome the limitations of a dynamically typed language and allow you to enforce
    intentions throughout a codebase.'
