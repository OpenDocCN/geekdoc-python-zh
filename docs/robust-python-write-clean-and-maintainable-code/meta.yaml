  - "[PAGE 124]\n\nWhether this is an error or not depends on the implementation of\
    \ the function. In my case, I want to be consistent, so I would change the integer\
    \ usage to Enum usage. For your codebase, you will need to determine what is acceptable\
    \ and what is not.\n\n# Pytype\n\nOne of the problems with MonkeyType is that\
    \ it only annotates code it sees at runtime. If there are branches of your code\
    \ that are costly or unable to be run, MonkeyType will not help you that much.\
    \ Fortunately, a tool exists to fill in this gap: Pytype, written by Google. Pytype\
    \ adds type annotations through static analysis, which means it does not need\
    \ to run your code to figure out types.\n\nTo run Pytype, install it with pip:\n\
    \n```\npip install pytype\n```\n\nThen, run Pytype against your code folder (e.g.,\
    \ *code_examples/chapter7*):\n\n```\npytype code_examples/chapter7\n```\n\nThis\
    \ will generate a set of *.pyi* files in a *.pytype* folder. These are very similar\
    \ to the stub files that MonkeyType created. They contain annotated function signatures\
    \ and variables that you can then copy into your source files.\n\nPytype offers\
    \ other intriguing benefits as well. Pytype is not just a type annotator; it is\
    \ a full linter and typechecker. It has a different typechecking philosophy than\
    \ other typecheckers such as mypy, Pyright, and Pyre.\n\nPytype will use inference\
    \ to do its typechecking, which means it will typecheck your code even in the\
    \ absence of type annotations. This is a great way to get the benefit of a typechecker\
    \ without having to write types throughout your codebase.\n\nPytype is also a\
    \ little more lenient on types changing in the middle of their lifetime. This\
    \ is a boon for those who fully embrace Python's dynamically typed nature. As\
    \ long as code will work at runtime, Pytype is happy. For instance:\n\n```\n#\
    \ Run in Python 3.6\ndef get_pasta_dish_ingredients(ingredients: list[Ingredient]\n\
    \                              ) -> list[str]:\n    names = ingredients\n    #\
    \ make sure there is water to boil the pasta in\n    if does_not_contain_water(ingredients)\n\
    \        names.append(\"water\")\n    return [str(i) for i in names]\n```\n\n\
    In this case, names will start off as a list of Ingredients. If water is not among\
    \ the ingredients, I add the string \"water\" to the list. At this point, the\
    \ list is heterogeneous; it contains both ingredients and strings. If you were\
    \ to annotate names as a list[Ingredient], mypy would error out in this case.\
    \ I would typically throw a red flag here as well; heterogeneous collections are\
    \ harder to reason about in the absence"
  - '[PAGE 125]


    of good type annotations. However, the next line renders both mypy and my objections
    moot. Everything is getting converted to a string when returned, which fulfills
    the annotation of the expected return type. Pytype is intelligent enough to detect
    this and consider this code to have no issues.


    Pytype''s leniency and approach to typechecking make it very forgiving for adopting
    into existing codebases. You don''t need any type annotations in order to see
    the value. This means you get all the benefits of a typechecker with very minimal
    work. High value, but low cost? Yes, please.


    However, Pytype is a double-edged sword in this case. Make sure you don''t use
    Pytype as a crutch; you should still be writing type annotations. It becomes incredibly
    easy with Pytype to think that you don''t need type annotations at all. However,
    you should still write them for two reasons. Firstly, type annotations provide
    a documentation benefit, which helps your code''s readability. Secondly, Pytype
    will be able to make even more intelligent decisions if type annotations are present.


    # Closing Thoughts


    Type annotations are incredibly useful, but there is no denying their cost. The
    larger the codebase, the higher the cost will be for practically adopting type
    annotations. Every codebase is different; you need to evaluate the value and cost
    of type annotations for your specific scenario. If type annotations are too costly
    to adopt, consider three strategies to get past that hurdle:


    *Find pain points*

    If you can eliminate entire classes of pain points through type annotations, such
    as errors, broken tests, or unclear code, you will save time and money. You target
    the areas that hurt the most, and by lessening that pain you are making it easier
    for developers to deliver value over time (which is a sure sign of maintainable
    code).


    *Target code strategically*

    Pick your spots wisely. In a large codebase, it will be near impossible to annotate
    every meaningful part of your code. Instead, focus on smaller sections that would
    see a huge benefit.


    *Lean on your tooling*

    Use mypy to help you selectively ignore files (and make sure that you are ignoring
    fewer lines of code over time). Use type annotators such as MonkeyType and Pytype
    to quickly generate types throughout your code. Don''t discount Pytype as a typechecker
    either, as it can find bugs lurking in your code with minimal setup.'
- md: "This wraps up Part I of the book. It has focused exclusively on type annotations\
    \ and typechecking. Feel free to mix and match the strategies and tools I've discussed.\
    \ You don't need to type annotate absolutely everything, as type annotations can\
    \ constrain expressiveness if too strictly applied. But you should strive to clarify\
    \ code and make it harder for bugs to crop up. You will find the balance over\
    \ time, but you need to start thinking about types in Python and how you can express\
    \ them to other developers. Remember, the goal is a maintainable codebase. People\
    \ need to understand as much of your intentions as they can from the code alone.\n\
    \nIn Part II, I'm going to focus on creating your own types. You've seen a little\
    \ of this with building your own collection types, but you can go so much further.\
    \ You'll learn about enumerations, data classes, and classes, and learn why you\
    \ should pick one over the other. You'll learn how to craft an API and subclass\
    \ types and model your data. You'll continue to build a vocabulary that improves\
    \ readability in your codebase.\n\n## PART II\n\n## Defining Your Own Types\n\n\
    Welcome to Part II, where you'll learn all about *user-defined types*. User-defined\
    \ types are types that you, as a developer, create. In the first part of this\
    \ book, I primarily focused on types that Python provides. However, these types\
    \ are built for general use cases. They don't tell you anything about the specific\
    \ domain that you are operating in. In contrast, user-defined types serve as a\
    \ conduit in which you express domain concepts in your codebase.\n\nYou need to\
    \ build types that represent your domain. Python provides a few different ways\
    \ to define your own data types, but you should take care with which one you choose.\
    \ In this part of the book, we'll go over three different user-defined types:\n\
    \n- *Enumerations (Enums)*: Enumerations provide a developer with a restricted\
    \ set of values.\n- *Data classes*: Data classes represent a relationship between\
    \ different concepts.\n- *Classes*: Classes represent a relationship between different\
    \ concepts, with an invariant that needs to be preserved.\n\nYou'll learn all\
    \ about using these types in a natural way and how they relate to one another.\
    \ At the end of Part II, we'll walk through modeling your domain data in a more\
    \ natural way. The choices you make when designing your types are crucial. By\
    \ learning the principles behind user-defined types, you will more effectively\
    \ communicate to future developers.\n\n## CHAPTER 8\n\n## User-Defined Types:\
    \ Enums\n\nIn this chapter, I’m going to focus on what a user-defined type is\
    \ and cover the simplest user-defined data type: enumerations. I’ll discuss how\
    \ to create an enumeration that will protect your code from common programming\
    \ mistakes. I’ll then go over advanced features that allow you to express your\
    \ ideas more clearly, such as creating aliases, making enumerations unique, or\
    \ providing automatically generated values.\n\n### User-Defined Types\n\nA user-defined\
    \ type is a type that you, as a developer, create. You define what data is associated\
    \ with the type and what behaviors are associated with your type. Each of these\
    \ types should tie to a singular concept. This will help other developers build\
    \ mental models about your codebase.\n\nFor instance, if I am writing restaurant\
    \ point-of-sale systems, I would expect to come across concepts about the restaurant\
    \ domain in your codebase. Concepts like restaurants, menu items, and tax calculations\
    \ should all be naturally represented in code. If I were to use lists, dictionaries,\
    \ and tuples instead, I’d force my readers to constantly reinterpret the meaning\
    \ of variables to their more natural mappings.\n\nConsider a simple function that\
    \ calculates a total with tax. Which function would you rather work with?\n\n\
    ```python\ndef calculate_total_with_tax(restaurant: tuple[str, str, str, int],\n\
    \                            subtotal: float) -> float:\n    return subtotal *\
    \ (1 + tax_lookup[restaurant[2]])\n```\n\nor\n\n```python\ndef calculate_total_with_tax(restaurant:\
    \ Restaurant,\n                            subtotal: decimal.Decimal) -> decimal.Decimal:\n\
    \    return subtotal * (1 + tax_lookup[restaurant.zip_code])\n```\n\nBy using\
    \ the custom type `Restaurant`, you give readers crucial knowledge about the behavior\
    \ of your code. Simple as it may be, it is incredibly powerful to build out these\
    \ domain concepts. Eric Evans, author of *Domain-Driven Design*, wrote, “The heart\
    \ of software is its ability to solve domain-related problems for its user.”¹\
    \ If the heart of software is the ability to solve domain-related problems, domain-specific\
    \ abstractions are the blood vessels. They are the support system, the network\
    \ that flows through your codebase, all tying back to the central life giver that\
    \ is the reason your code exists. By building up great domain-related types, you\
    \ build a healthier system.\n\nThe most readable codebases are those that can\
    \ be reasoned about, and it’s easiest to reason about the concepts that you encounter\
    \ in your day to day. Newcomers to the codebase will already have a leg up if\
    \ they are familiar with the core business concepts. You’ve spent the first part\
    \ of this book focusing on expressing intent through annotations; this next part\
    \ will focus on communicating intentions by building a shared vocabulary and making\
    \ that vocabulary available to every developer working in the codebase.\n\nThe\
    \ first way you’ll learn how to map a domain concept to a type is through Python’s\
    \ enumeration type: `Enum`.\n\n### Enumerations\n\nIn some scenarios, you want\
    \ a developer to pick one value from a list. Colors of a traffic light, pricing\
    \ plans of a web service, and HTTP methods are all great examples of this type\
    \ of relationship. To express that relationship in Python, you should use *enumerations*.\
    \ Enumerations are a construct that let you define the list of values, and developers\
    \ pick the specific value they want. Python first supported enumerations in Python\
    \ 3.4.\n\nTo illustrate what makes enumerations so special, let’s suppose you\
    \ are developing an application that makes French cooking more accessible by providing\
    \ a home-delivery network, from baguettes to beignets. It features a menu from\
    \ which hungry users can select and then receive all the ingredients and cooking\
    \ instructions by mail.\n\nOne of the most popular offerings in this app is the\
    \ customization. Users can pick which meat they want, which side, and which sauce\
    \ to prepare. One of the most essential parts of French cooking is its *mother\
    \ sauces*. These five well-known sauces are building blocks for countless other\
    \ sauces, and I want to programmatically add new ingredients to these, creating\
    \ what’s known as *daughter sauces*. This way, users can learn how French sauces\
    \ are categorized when they order their food.\n\n> ¹ Eric Evans, *Domain-Driven\
    \ Design: Tackling Complexity in the Heart of Software*. Upper Saddle River, NJ:\
    \ Addison-Wesley Professional, 2003.\n\nLet's suppose I represent the mother sauces\
    \ as a Python tuple:\n\n```python\n# Note: use UPPER_CASE variable names to denote\
    \ constant/immutable values\nMOTHER_SAUCES = (\"Béchamel\", \"Velouté\", \"Espagnole\"\
    , \"Tomato\", \"Hollandaise\")\n```\n\nWhat does this tuple communicate to other\
    \ developers?\n\n- This collection is immutable.\n- They can iterate over this\
    \ collection to get all the sauces.\n- They can retrieve a specific element through\
    \ static indexing.\n\nThe immutability and retrieval properties are important\
    \ for my application. I don't want to add or subtract any mother sauces at runtime\
    \ (such would be culinary blasphemy). Using a tuple makes it clear to future developers\
    \ that they should not change these values. Retrieval lets me choose just one\
    \ sauce, although it is a bit clunky. Every time I need to reference an element,\
    \ I can do so through static indexing:\n\n```python\nMOTHER_SAUCES[2]\n```\n\n\
    This unfortunately does not communicate intent. Every time a developer sees this,\
    \ they must remember that 2 means \"Espagnole\". Constantly correlating numbers\
    \ to sauces wastes time. This is fragile and will invariably cause mistakes. Should\
    \ somebody alphabetically sort the sauces, the indices will change, breaking the\
    \ code. Statically indexing into this tuple will not help the robustness of this\
    \ code.\n\nTo combat this, I'll make aliases for each of these:\n\n```python\n\
    BÉCHAMEL = \"Béchamel\"\nVELOUTÉ = \"Velouté\"\nESPAGNOLE = \"Espagnole\"\nTOMATO\
    \ = \"Tomato\"\nHOLLANDAISE = \"Hollandaise\"\nMOTHER_SAUCES = (BÉCHAMEL, VELOUTÉ,\
    \ ESPAGNOLE, TOMATO, HOLLANDAISE)\n```\n\nThat's a bit more code, and still doesn't\
    \ make it any easier to index into that tuple. Furthermore, there is still a lingering\
    \ issue in calling code.\n\nConsider a function that creates a daughter sauce:\n\
    \n```python\ndef create_daughter_sauce(mother_sauce: str,\n                  \
    \      extra_ingredients: list[str]):\n    # ...\n```\n\nI want you to pause a\
    \ moment and consider what this function tells future developers. I'm purposely\
    \ leaving out the implementation, because I want to talk about first impressions;\
    \ the function signature is the first thing a developer will see. Based on the\
    \ function signature alone, does this function properly convey what is allowed?"
  mdcn: "这标志着本书第一部分的结束。第一部分完全聚焦于类型注解和类型检查。你可以自由地混合使用我讨论过的各种策略和工具。你无需对所有内容都进行类型注解，因为过于严格的类型注解可能会限制表达力。但你应该努力让代码更清晰，让bug更难出现。随着时间的推移，你会找到平衡点，但你需要开始思考Python中的类型，以及如何向其他开发者表达它们。请记住，目标是构建一个可维护的代码库。人们需要仅从代码本身就能尽可能理解你的意图。\n\
    \n在第二部分中，我将专注于创建你自己的类型。你已经通过构建自己的集合类型对此有所了解，但你可以走得更远。你将学习枚举、数据类和类，并了解为何应该选择其中一种而非其他。你将学习如何设计API、子类化类型以及建模你的数据。你将继续构建一套词汇，以提高代码库的可读性。\n\
    \n## 第二部分\n\n## 定义你自己的类型\n\n欢迎来到第二部分，在这里你将全面了解*用户定义类型*。用户定义类型是你作为开发者创建的类型。在本书的第一部分，我主要关注Python提供的类型。然而，这些类型是为通用场景构建的。它们无法告诉你任何关于你所操作的具体领域的信息。相比之下，用户定义类型充当一种媒介，让你在代码库中表达领域概念。\n\
    \n你需要构建代表你领域的类型。Python提供了几种不同的方式来定义你自己的数据类型，但你应该谨慎选择使用哪一种。在本书的这一部分，我们将介绍三种不同的用户定义类型：\n\
    \n- *枚举（Enums）*：枚举为开发者提供了一组受限的值。\n- *数据类*：数据类表示不同概念之间的关系。\n- *类*：类表示不同概念之间的关系，并包含需要保持的不变量。\n\
    \n你将学习如何自然地使用这些类型，以及它们彼此之间的关系。在第二部分结束时，我们将通过更自然的方式来建模你的领域数据。你在设计类型时所做的选择至关重要。通过学习用户定义类型背后的原理，你将更有效地与未来的开发者进行沟通。\n\
    \n## 第8章\n\n## 用户定义类型：枚举\n\n在本章中，我将专注于什么是用户定义类型，并介绍最简单的用户定义数据类型：枚举。我将讨论如何创建枚举，以保护你的代码免受常见编程错误的影响。然后，我将介绍一些高级功能，让你能更清晰地表达你的想法，例如创建别名、使枚举唯一或提供自动生成的值。\n\
    \n### 用户定义类型\n\n用户定义类型是你作为开发者创建的类型。你定义与该类型相关联的数据以及与该类型相关联的行为。每种类型都应该对应一个单一的概念。这将帮助其他开发者构建关于你代码库的心智模型。\n\
    \n例如，如果我正在编写餐厅销售点系统，我期望在你的代码库中看到关于餐厅领域的概念。像餐厅、菜单项和税款计算这样的概念都应该自然地在代码中得到体现。如果我使用列表、字典和元组来代替，我就迫使我的读者不断地重新解释变量的含义，将其映射到更自然的对应物上。\n\
    \n考虑一个计算含税总额的简单函数。你更愿意使用哪个函数？\n\n```python\ndef calculate_total_with_tax(restaurant:\
    \ tuple[str, str, str, int],\n                            subtotal: float) ->\
    \ float:\n    return subtotal * (1 + tax_lookup[restaurant[2]])\n```\n\n还是\n\n\
    ```python\ndef calculate_total_with_tax(restaurant: Restaurant,\n            \
    \                subtotal: decimal.Decimal) -> decimal.Decimal:\n    return subtotal\
    \ * (1 + tax_lookup[restaurant.zip_code])\n```\n\n通过使用自定义类型 `Restaurant`，你向读者传达了关于代码行为的关键信息。尽管它可能很简单，但构建这些领域概念却具有难以置信的强大作用。《领域驱动设计》的作者埃里克·埃文斯写道：“软件的核心在于其为用户解决领域相关问题的能力。”¹\
    \ 如果软件的核心是解决领域相关问题的能力，那么领域特定的抽象就是血管。它们是支持系统，是流经你代码库的网络，所有这些都回溯到赋予代码生命的核心——你代码存在的原因。通过构建优秀的领域相关类型，你构建了一个更健康的系统。\n\
    \n最具可读性的代码库是那些可以被推理的代码库，而最容易推理的是你日常遇到的概念。如果代码库的新手熟悉核心业务概念，他们就已经领先一步了。你在本书的第一部分专注于通过注解表达意图；接下来的部分将专注于通过构建共享词汇并让每个在代码库中工作的开发者都能使用该词汇来沟通意图。\n\
    \n你将学习如何将领域概念映射到类型的第一种方式是通过Python的枚举类型：`Enum`。\n\n### 枚举\n\n在某些场景下，你希望开发者从一个列表中选择一个值。交通灯的颜色、网络服务的定价计划以及HTTP方法都是这种关系的绝佳例子。为了在Python中表达这种关系，你应该使用*枚举*。枚举是一种构造，它允许你定义值的列表，开发者从中选择他们想要的特定值。Python从3.4版本开始支持枚举。\n\
    \n为了说明枚举为何如此特别，假设你正在开发一个应用程序，通过提供从法棍到贝奈特饼的送货上门网络，让法式烹饪更易获得。它提供了一个菜单，饥饿的用户可以从中选择，然后通过邮件收到所有食材和烹饪说明。\n\
    \n这个应用中最受欢迎的功能之一是定制化。用户可以选择他们想要的肉类、配菜和酱汁。法式烹饪最基本的部分之一是它的*母酱*。这五种著名的酱汁是无数其他酱汁的基础，我想通过编程方式向这些酱汁中添加新成分，创造出所谓的*子酱*。这样，用户在点餐时就能了解法式酱汁是如何分类的。\n\
    \n> ¹ 埃里克·埃文斯，《领域驱动设计：软件核心复杂性应对之道》。新泽西州上鞍河：Addison-Wesley Professional，2003年。\n\
    \n假设我用一个Python元组来表示母酱：\n\n```python\n# 注意：使用大写变量名表示常量/不可变值\nMOTHER_SAUCES = (\"\
    Béchamel\", \"Velouté\", \"Espagnole\", \"Tomato\", \"Hollandaise\")\n```\n\n\
    这个元组向其他开发者传达了什么信息？\n\n- 这个集合是不可变的。\n- 他们可以遍历这个集合以获取所有酱汁。\n- 他们可以通过静态索引检索特定元素。\n\
    \n不可变性和检索属性对我的应用程序很重要。我不希望在运行时添加或减少任何母酱（那将是烹饪上的亵渎）。使用元组清楚地告诉未来的开发者，他们不应该更改这些值。检索让我可以选择一种酱汁，尽管有点笨拙。每次我需要引用一个元素时，我都可以通过静态索引来做到：\n\
