- md: '## What About @staticmethod and @classmethod?


    I do not often use `staticmethod` and `classmethod`. For those unfamiliar, these
    are decorators that allow you to write functions that are bound to a class instead
    of an instance (`classmethod`) and functions that live inside a class but aren''t
    bound to it in any way (`staticmethod`). To me, these are holdovers from an older
    mentality of programming where there weren''t as many robust patterns as there
    are today.


    With `staticmethod`, I almost always think that it should be a free function at
    module-level scope rather than tied to a class. With `classmethod`, there are
    a few more legitimate use cases (including some around metaprogramming), but in
    more cases than not, free functions are more robust. Free functions are easier
    to move around than classes (classes may need to be broken up or joined together),
    and I don''t have to worry about how subtypes override my class methods or static
    methods (there are some sharp edges with inheritance and class/static methods.)


    And that''s invariants. It''s not something developers talk about enough, but
    once you start thinking in terms of invariants, you''ll see a major boost to class
    maintainability. Remember, you use invariants to allow users to reason about your
    objects and reduce cognitive load. It''s OK if you take extra time writing code
    if you will pay off the costs for however many readers after.


    # Closing Thoughts


    I spent a fair amount of time on classes, especially compared to other user-defined
    data types such as enumerations and data classes. However, this was intentional.
    Classes are typically taught very early, and rarely revisited. I''ve found that
    most developers tend to overuse classes, without considering what they are meant
    for.


    As you decide how to create user-defined types, I offer the following guide for
    you:


    Dictionaries are meant for mappings from keys to values. If you are using dictionaries
    but rarely iterating over them or dynamically asking for keys, you aren''t using
    them like an associative mapping and probably need a different type. There is
    an exception when retrieving data from data sources at runtime (e.g., getting
    JSON, parsing YAML, retrieving database data, etc.), where a TypedDict is appropriate
    (see Chapter 5). However, if you don''t need to use them as dictionaries elsewhere,
    you should strive to get these into user-defined classes after parsing the data.


    Enumerations are great for representing a union of discrete scalar values. You
    don''t necessarily care about what the enumeration values are; you just need separate
    identifiers to differentiate cases in your code.


    Data classes are great for bundles of data that are mostly independent. You may
    have some restrictions on how individual fields can be set, but for the most part,
    users are free to get and set individual attributes to their heart''s content.


    Classes are all about invariants. If you have an invariant you want to preserve,
    create a class, assert that the preconditions hold when constructing, and don''t
    let any method or user access break that invariant.


    Figure 10-1 is a handy flowchart that describes these rules of thumb.


    ![](img/d64d2be45ca85b398807d181202e7046_171_0.png)


    However, knowing which type to pick is only half the battle. Once you''ve picked
    the right type, you need to make it seamless to interact with from a consumer''s
    perspective. In the next chapter, you''re going to learn how to make your user-defined
    types more natural to work with by focusing on the type''s API.


    # CHAPTER 11

    Defining Your Interfaces


    You have learned how to create your own user-defined types, but creating them
    is just half the battle. Now developers have to actually use your types. To do
    this, they use your type''s API. This is the set of types and related functions,
    along with any external functions, that a developer interacts with to use your
    code.


    Once you get your types in front of users, those types will be used (and abused)
    in ways that you never thought of. And once the developers depend on your types,
    it will be hard to change their behavior. This gives rise to what I call the *Paradox
    of Code Interfaces*:


    > You have one chance to get your interface right, but you won''t know it''s right
    until it''s used.


    As soon as developers use the types you create, they come to depend on the behavior
    that those types encompass. If you try to make a backward-incompatible change,
    you potentially break all calling code. The riskiness in changing your interface
    is proportional to the amount of outside code depending on it.


    This paradox doesn''t apply if you control all the code that depends on your type;
    you can change it. But as soon as that type hits production, and people start
    using it, you''ll find it difficult to change. In a large codebase, where robustness
    and maintainability matter, coordinating the change and buy-in needed to make
    a sweeping change is costly. It becomes near impossible if your type is used by
    entities outside your organizational control, such as open source libraries or
    platform SDKs. This quickly leads to code that is difficult to work with, and
    code that is difficult to work with will slow developers down.


    What''s worse is that you won''t truly know if an interface is natural to use
    until enough people depend on it, giving rise to the paradox. How can you even
    begin to design an interface if you don''t know how it will be used? Sure, you
    know how *you* would use the interface, and that''s a great start, but you have
    an implicit bias when creating the interface. What feels natural to you won''t
    feel natural to everyone else. Your goal is for your users to do the right things
    (and avoid the wrong things) with minimal effort. Ideally, the users should not
    need to do anything extra to use your interface correctly.


    I don''t have a silver bullet for you; there is no foolproof way of writing an
    interface that meets everyone''s needs on the first try. Instead, I''ll talk about
    some principles you can apply to give you the best chance. For the cases where
    you need to make changes to an existing API, you''ll learn mitigation strategies.
    Your API is a first impression for other developers; make it count.


    ![](img/d64d2be45ca85b398807d181202e7046_175_0.png)


    **Discussion Topic**


    What interfaces are hard to use in your codebase? Look for common errors that
    people make when using your types. Also look for parts of your interface that
    are rarely invoked, especially if you feel like they are useful. Why don''t users
    call these useful functions? Discuss what costs appear when developers encounter
    these hard-to-use interfaces.


    # Natural Interface Design


    Your goal, tough as it may seem, is to make your interface appear natural to use.
    In other words, you want to reduce friction for the callers of your code. When
    code is hard to use, the following happens:


    *Duplicated functionality*


    Some developers who find your types hard to use will write their own types, duplicating
    functionality. It may be healthy for different ideas to compete on a large scale
    (like competing open source projects), but it is not healthy for that divergence
    to be present in your codebase. Developers are presented with a multitude of types,
    not sure which one to use. With their attention split, their wires will get crossed
    and they will make mistakes, which creates bugs, which costs money. Also, if you
    want to add anything to one of these types, you need to add them in all the places
    the functionality has diverged, or you''ll create bugs, which costs money.


    *Broken mental model*


    Developers build up a mental model of the code they work with. If certain types
    are difficult to reason about, that mental model breaks. Developers will misuse
    your types, causing subtle bugs. Perhaps they don''t call methods in the order
    that you require. Perhaps they miss calling a method that they should have. Perhaps
    they just misunderstand what the code is doing and pass the wrong information
    to it. Any of these will introduce fragility into your codebase.'
  mdcn: '## 关于 `@staticmethod` 和 `@classmethod` 怎么看？


    我并不经常使用 `staticmethod` 和 `classmethod`。对于不熟悉的人来说，这些是装饰器，允许你编写绑定到类而非实例的函数（`classmethod`），以及存在于类内部但不以任何方式绑定到类的函数（`staticmethod`）。对我来说，这些是旧式编程思维的遗留物，那时还没有像今天这样多的健壮模式。


    对于 `staticmethod`，我几乎总是认为它应该是模块级作用域的自由函数，而不是绑定到一个类。对于 `classmethod`，有一些更合理的用例（包括一些元编程相关的），但在更多情况下，自由函数更健壮。自由函数比类更容易移动（类可能需要拆分或合并），而且我不必担心子类型如何覆盖我的类方法或静态方法（继承和类/静态方法之间存在一些棘手的问题）。


    这就是不变式。这不是开发者们谈论足够多的话题，但一旦你开始从不变式的角度思考，你会看到类的可维护性有显著提升。记住，你使用不变式是为了让用户能够推理你的对象并减少认知负担。如果你花额外时间编写代码，但能为之后的众多读者节省成本，那是值得的。


    # 结语


    我花了相当多的时间讨论类，特别是与其他用户定义的数据类型（如枚举和数据类）相比。然而，这是有意为之。类通常很早就被教授，而且很少被重新审视。我发现大多数开发者倾向于过度使用类，而没有考虑它们的用途。


    在你决定如何创建用户定义类型时，我提供以下指南供你参考：


    字典用于从键到值的映射。如果你使用字典但很少遍历它们或动态请求键，你就没有像关联映射那样使用它们，可能需要不同的类型。在运行时从数据源检索数据时有一个例外（例如，获取
    JSON、解析 YAML、检索数据库数据等），此时 TypedDict 是合适的（参见第 5 章）。但是，如果你不需要在其他地方将它们用作字典，你应该努力在解析数据后将它们转换为用户定义的类。


    枚举非常适合表示离散标量值的联合。你不一定关心枚举值是什么；你只需要不同的标识符来区分代码中的情况。


    数据类非常适合大部分独立的数据包。你可能对单个字段的设置方式有一些限制，但在大多数情况下，用户可以自由地获取和设置单个属性。


    类的核心是不变式。如果你有一个想要保持的不变式，就创建一个类，在构造时断言前置条件成立，并且不让任何方法或用户访问破坏这个不变式。


    图 10-1 是一个方便的流程图，描述了这些经验法则。


    ![](img/d64d2be45ca85b398807d181202e7046_171_0.png)


    然而，知道选择哪种类型只是成功的一半。一旦你选择了正确的类型，你需要从消费者的角度使其交互变得无缝。在下一章中，你将学习如何通过关注类型的 API，使你的用户定义类型更自然地使用。


    # 第 11 章

    定义你的接口


    你已经学会了如何创建自己的用户定义类型，但创建它们只是成功的一半。现在开发者必须实际使用你的类型。为此，他们使用你的类型的 API。这是开发者与之交互以使用你的代码的一组类型和相关函数，以及任何外部函数。


    一旦你的类型出现在用户面前，这些类型将以你从未想到的方式被使用（和滥用）。一旦开发者依赖你的类型，就很难改变它们的行为。这引出了我所谓的 *代码接口悖论*：


    > 你只有一次机会让你的接口正确，但直到它被使用，你才会知道它是否正确。


    一旦开发者使用你创建的类型，他们就会依赖这些类型所包含的行为。如果你试图进行向后不兼容的更改，你可能会破坏所有调用代码。更改接口的风险与依赖它的外部代码量成正比。


    如果你控制所有依赖你的类型的代码，这个悖论就不适用；你可以更改它。但一旦该类型投入生产，并且人们开始使用它，你会发现很难更改。在一个大型代码库中，健壮性和可维护性很重要，协调进行大规模更改所需的变更和共识成本很高。如果你的类型被组织控制之外的实体使用，例如开源库或平台
    SDK，这几乎变得不可能。这很快导致代码难以使用，而难以使用的代码会拖慢开发者的速度。


    更糟糕的是，你无法真正知道一个接口是否自然易用，直到足够多的人依赖它，从而产生了这个悖论。如果你不知道接口将如何被使用，你甚至如何开始设计它？当然，你知道*你*会如何使用接口，这是一个很好的开始，但你在创建接口时存在隐性偏见。对你来说感觉自然的东西，对其他人来说不一定自然。你的目标是让用户以最小的努力做正确的事情（并避免错误的事情）。理想情况下，用户应该不需要做任何额外的事情就能正确使用你的接口。


    我没有灵丹妙药给你；没有一种万无一失的方法可以在第一次尝试时就写出满足所有人需求的接口。相反，我将讨论一些你可以应用的原则，以给你最好的机会。对于需要更改现有
    API 的情况，你将学习缓解策略。你的 API 是给其他开发者的印象；让它发挥作用。


    ![](img/d64d2be45ca85b398807d181202e7046_175_0.png)


    **讨论主题**


    在你的代码库中，哪些接口难以使用？寻找人们在使用你的类型时犯的常见错误。还要寻找你接口中很少被调用的部分，特别是如果你觉得它们有用的话。为什么用户不调用这些有用的函数？讨论当开发者遇到这些难以使用的接口时会出现什么成本。


    # 自然接口设计


    你的目标，尽管看起来很难，是让你的接口看起来自然易用。换句话说，你想减少代码调用者的摩擦。当代码难以使用时，会发生以下情况：


    *功能重复*


    一些发现你的类型难以使用的开发者会编写自己的类型，导致功能重复。在大规模上，不同的想法竞争可能是健康的（比如竞争的开源项目），但在你的代码库中存在这种分歧是不健康的。开发者面临多种类型，不确定该使用哪一种。他们的注意力被分散，思路会混乱，他们会犯错，这会产生
    bug，从而造成损失。此外，如果你想向这些类型中的任何一个添加任何东西，你需要在所有功能分歧的地方添加它们，否则你会创建 bug，从而造成损失。


    *心智模型破坏*


    开发者会构建他们所使用代码的心智模型。如果某些类型难以推理，那个心智模型就会被破坏。开发者会误用你的类型，导致微妙的 bug。也许他们没有按照你要求的顺序调用方法。也许他们错过了应该调用的方法。也许他们只是误解了代码的功能，并向其传递了错误的信息。这些都会给你的代码库引入脆弱性。'
