  md: "that those methods are called from every other method in the dictionary. Built-in\
    \ collection types are built with performance in mind; many methods use inlined\
    \ code to go fast. This means that overriding one method, such as `__getitem__`,\
    \ will not be used in most dictionary methods. This certainly violates the Law\
    \ of Least Surprise, which we talked about in Chapter 1.\n\n![](img/d64d2be45ca85b398807d181202e7046_92_0.png)\n\
    \nIt is OK to subclass from the built-in collection if you are only adding methods,\
    \ but because future modifications may make this same mistake, I still prefer\
    \ to use one of the other methods of building custom collections.\n\nSo overriding\
    \ `dict` is out. Instead I'll use types from the `collections` module. For this\
    \ case, there is a handy type called `collections.UserDict`. `UserDict` fits the\
    \ exact use case that I need: I can subclass from `UserDict`, override key methods,\
    \ and get the behavior I expect.\n\n```\npython\nfrom collections import UserDict\n\
    class NutritionalInformation(UserDict):\n    def __getitem__(self, key):\n   \
    \     try:\n            return self.data[key]\n        except KeyError:\n    \
    \        pass\n        for alias in get_aliases(key):\n            try:\n    \
    \            return self.data[alias]\n            except KeyError:\n         \
    \       pass\n        raise KeyError(f\"Could not find {key} or any of its aliases\"\
    )\n```\n\nThis fits your use case exactly. You subclass from `UserDict` instead\
    \ of `dict`, and then use `self.data` to access the underlying dictionary.\n\n\
    You go run your teammate's code again:\n\n```\npython\n# arugula is the same as\
    \ rocket\n>>> print(nutrition.get(\"rocket\", \"No Ingredient Found\"))\n{\n \
    \   \"name\": \"arugula\",\n    \"calories_per_serving\": 5,\n    # ... snip ...\n\
    }\n```\n\nAnd you get the nutrition information for arugula.\n\n`UserDict` isn't\
    \ the only collection type that you can override in this case. There also is a\
    \ `UserString` and a `UserList` in the `collections` model. Anytime you want to\
    \ tweak a dictionary, string, or list, these are the collections you want to use."
