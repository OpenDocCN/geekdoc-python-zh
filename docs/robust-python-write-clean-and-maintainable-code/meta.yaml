  md: "# CHAPTER 4\nConstraining Types\n\nMany developers learn the basic type annotations\
    \ and call it a day. But we're far from done. There is a wealth of advanced type\
    \ annotations that are invaluable. These advanced type annotations allow you to\
    \ constrain types, further restricting what they can represent. Your goal is to\
    \ make illegal states unrepresentable. Developers should physically not be able\
    \ to create types that are contradictory or otherwise invalid in your system.\
    \ You can't have errors in your code if it's impossible to create the error in\
    \ the first place. You can use type annotations to achieve this very goal, saving\
    \ time and money. In this chapter I'll teach you six different techniques:\n\n\
    +   - **Optional**\n  Use to replace None references in your codebase.\n- **Union**\n\
    \  Use to present a selection of types.\n- **Literal**\n  Use to restrict developers\
    \ to very specific values.\n- **Annotated**\n  Use to provide additional description\
    \ of your types.\n- **NewType**\n  Use to restrict a type to a specific context.\n\
    - **Final**\n  Use to prevent variables from being rebound to a new value.\n\n\
    Let's start with handling None references with Optional types."
