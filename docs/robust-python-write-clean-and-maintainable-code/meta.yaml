  md: "You should absolutely look for areas with very low coverage and improve the\
    \ testing story around them.\n\nConversely, this causes many people to assume\
    \ that high coverage is a predictor of robustness, when it really isn't. You can\
    \ have every line and every branch covered by tests, and still have abysmal maintainability.\
    \ The tests could be brittle or even flat-out useless.\n\nI once worked in a codebase\
    \ that was beginning to adopt unit testing. I came across a file with the equivalent\
    \ of the following:\n\n```\ndef test_foo_can_do_something():\n    foo = Thingamajiggy()\n\
    \    foo.doSomething()\n    assert foo is not None\n\ndef test_foo_parameterized_still_does_the_right_thing():\n\
    \    foo = Thingamajiggy(y=12)\n    foo.doSomethingElse(15)\n    assert foo is\
    \ not None\n```\n\nThere were about 30 of these tests, all with good names and\
    \ following the AAA pattern (as seen in Chapter 21). But they were all effectively\
    \ useless: all they did was make sure that no exception was thrown. The worst\
    \ part of all of this was the tests actually had 100% line coverage and near >80%\
    \ branch coverage. It's not bad that the tests were checking that no exception\
    \ was thrown; it was bad that they didn't actually test the actual functions,\
    \ despite indicating otherwise.\n\nMutation testing is your best defense against\
    \ poor assumptions about code coverage. When you are measuring the efficacy of\
    \ your tests, it becomes much harder to write useless, meaningless tests while\
    \ still eliminating mutants. Mutation testing elevates coverage measurements to\
    \ become a truer predictor of robustness. Coverage metrics still won't be a perfect\
    \ proxy for business value, but mutation testing certainly makes them more valuable\
    \ as an indicator of robustness.\n\n> As mutation testing becomes more popular,\
    \ I fully expect “number of mutants eliminated” to be the new buzzword metric\
    \ replacing “100% code coverage.” While you definitely want fewer mutants to survive,\
    \ beware any goal tied to one metric out of context; this number can be gamed\
    \ just like all the others. You still need a full testing strategy to ensure robustness\
    \ in your codebase.\n\n# Closing Thoughts\n\nMutation testing will probably not\
    \ be the first tool you reach for. However, it's a perfect complement for your\
    \ testing strategy; it finds holes in your safety net and brings them to your\
    \ attention. With automated tools such as mutmut, you can leverage your"
