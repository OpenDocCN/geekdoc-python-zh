- md: "## Interface Segregation Principle\nA principle for abstraction\n\n## Dependency\
    \ Inversion Principle\nA principle for decoupling dependencies\n\nSome of these\
    \ principles will be touched upon throughout the book. Remember that all of these\
    \ are just principles. Use your best judgment in applying them.\n\n**Discussion\
    \ Topic**\n\nConsider some of the most important parts of your codebase. What\
    \ invariants are true about that system? How well are these invariants enforced,\
    \ such that developers cannot break them?\n\n## Communicating Invariants\n\nNow,\
    \ you can't realize these benefits unless you can effectively communicate them.\
    \ Nobody can reason about invariants that they don't know about. So, how do you\
    \ do that? Well, with any communication, you should consider your audience. You\
    \ have two types of people with two different use cases:\n\n*Consumers of the\
    \ class*\nThese are people who are trying to solve their own problems and are\
    \ looking for tools to help them. They may be trying to debug an issue or find\
    \ a class in a codebase that helps them out.\n\n*Future maintainers of the class*\n\
    People will add onto your class, and it's important that they do not break invariants\
    \ that all your callers have come to depend on.\n\nYou will need to keep both\
    \ in mind when designing your classes.\n\n## Consuming Your Class\n\nFirst, consumers\
    \ of your class will typically look at your source code to see how it works and\
    \ if it meets their needs. Putting assertion statements (or raising other exceptions)\
    \ in the constructor is a great way to tell a user what is and isn't possible\
