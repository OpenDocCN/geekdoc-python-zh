    \ write similar retry logic into every function that needs to handle nondeterministic\
    \ operations. It is far easier to compose decorators to define your business needs,\
    \ and avoid tedious repetition throughout your code.\n\nbackoff is not the only\
    \ useful decorator out there. There is a bevy of composable decorators that you\
    \ can use to simplify your code, such as functools.lru_cache for saving function\
