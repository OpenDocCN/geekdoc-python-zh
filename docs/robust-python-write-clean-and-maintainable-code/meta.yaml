    \n>>> {} + []\nTypeError: unsupported operand type(s) for +: 'dict' and list\n\
    ```\n\nContrast that with a weakly typed language, such as JavaScript:\n\n```\n\
    >>> [] + {}\n\"[object Object]\"\n\n>>> {} + []\n0\n```\n\nIn terms of robustness,\
    \ a strongly typed language such as Python certainly helps us out. While errors\
    \ still will show up at runtime instead of at development time, they still will\
    \ show up in an obvious TypeError exception. This reduces the time taken to debug\
    \ issues significantly, again allowing you to deliver incremental value more quickly.\n\
    \n## Are Weakly Typed Languages Inherently Not Robust?\n\nCodebases in weakly\
    \ typed languages can absolutely be robust; by no means am I dumping on those\
    \ languages. Consider the sheer amount of production-grade JavaScript that the\
    \ world runs on. However, a weakly typed language requires extra care to be robust.\
    \ It's easy to mistake the type of a variable and make incorrect assumptions.\
    \ Developers come to rely very heavily on linters, tests, and other tools to improve\
    \ maintainability.\n\n## Dynamic Versus Static\n\nThere is another typing spectrum\
    \ I need to discuss: static versus dynamic typing. This is fundamentally a difference\
    \ in handling mechanical representation of types.\n\nLanguages that offer static\
    \ typing embed their typing information in variables during build time. Developers\
    \ may explicitly add type information to variables, or some tool such as a compiler\
    \ infers types for the developer. Variables do not change their type at runtime\
    \ (hence, “static”). Proponents of static typing tout the ability to write safe\
    \ code out of the gate and to benefit from a strong safety net.\n\nDynamic typing,\
    \ on the other hand, embeds type information with the value or variable itself.\
    \ Variables can change types at runtime quite easily, because there is no type\
    \ information tied to that variable. Proponents of dynamic typing advocate the\
    \ flexibility and speed that it takes to develop; there’s nowhere near as much\
    \ fighting with compilers.\n\nPython is a dynamically typed language. As you saw\
    \ during the discussion about mechanical representation, there was type information\
    \ embedded inside the values of a variable. Python has no qualms about changing\
    \ the type of a variable at runtime:\n\n```\n>>> a = 5\n>>> a = \"string\"\n>>>\
    \ a\n\"string\"\n\n>>> a = tuple()\n>>> a\n()\n```\n\nUnfortunately, the ability\
    \ to change types at runtime is a hindrance to robust code in many cases. You\
    \ cannot make strong assumptions about a variable throughout its lifetime. As\
    \ assumptions are broken, it’s easy to write unstable assumptions on top of them,\
    \ leading to a ticking logic bomb in your code.\n\n**Are Dynamically Typed Languages\
    \ Inherently Not Robust?**\n\nJust like weakly typed languages, it is still absolutely\
    \ possible to write robust code in a dynamically typed language. You just have\
