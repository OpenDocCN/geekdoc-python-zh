    \ ran in under a second to find those bugs.\n\nIt doesn't matter if you don't\
    \ make those errors, or you if always find them in code review. There are countless\
    \ developers working in any codebase, and errors can happen anywhere. By enforcing\
    \ a linter like Pylint, you can eliminate very common, detectable errors. For\
    \ a full list of built-in checkers, see the [Pylint documentation](https://pylint.readthedocs.io/).\n\
    \n> ## Shift Errors Left\n\nOne of the common tenets of the DevOps mindset is\
    \ to “shift your errors left.” I mentioned this when discussing types, but it\
    \ applies to static analysis and tests as well. The idea is to think of your errors\
    \ in terms of their cost. How expensive is it to fix an error? It depends on where\
    \ you find that error. An error found in production by a customer is costly. Developers\
    \ have to spend time away from their normal feature development, tech support\
    \ and testers get involved, and there are risks when you have to do an emergency\
    \ deployment.\n\nThe earlier in the development cycle you are, the less expensive\
    \ it is to address errors. If you can find errors during testing, you can avoid\
    \ a slew of production costs. However, you want to find these issues even earlier,\
    \ before they ever enter into the codebase. I talked at length in Part I about\
    \ how typecheckers can shift those errors even further left, so that you find\
    \ the errors right as you develop. It's not just typecheckers that allow you to\
    \ do this, but static analysis tools such as linters and complexity checkers as\
    \ well.\n\nThese static analysis tools are your first line of defense against\
    \ errors, even more so than tests. They aren't a silver bullet (nothing is), but\
    \ they are invaluable in finding problems early. Add them to your continuous integration\
    \ pipeline and set them up as pre-commit hooks or server-side hooks in your version\
    \ control system. Save yourself time and money and don't let easy-to-detect errors\
