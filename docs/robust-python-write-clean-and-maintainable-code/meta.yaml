- img_proc: true
  md: '> While you should absolutely strive to write code cleanly, you must be prepared
    to work in codebases that aren''t a shining example of cleanliness. Software development
    is a messy endeavor, and there will be times where the purity of clean code will
    be sacrificed for various reasons, both business and technical. Use the advice
    given in this book to help drive toward cleaner code through discussions about
    maintainability.


    Maintainable code is code that...well, can be easily maintained. Maintenance begins
    immediately after the first commit and continues until not a single developer
    is looking at the project anymore. Developers will be fixing bugs, adding features,
    reading code, extracting code for use in other libraries, and more. Maintainable
    code makes these tasks frictionless. Software lives for years, if not decades.
    Focus on your maintainability *today*.


    You don''t want to be the reason systems fail, whether you are actively working
    on them or not. You need to be proactive in making your system stand the test
    of time. You need a testing strategy to be your safety net, but you also need
    to be able to avoid falling in the first place. So with all that in mind, I offer
    my definition of robustness in terms of your codebase:


    > A robust codebase is resilient and error-free in spite of constant change.


    # Why Does Robustness Matter?


    A lot of energy goes into making software do what it''s supposed to, but it''s
    not easy to know when you''re done. Development milestones are not easily predicted.
