  md: "I talked about how duck typing can be both a boon and a curse for robst code.\
    \ It's great that I can write a single function that can take so many different\
    \ types, but communicating intent through type annotations becomes challenging.\
    \ Fortunately, I can use the collections.abc classes to provide type hints:\n\n\
    ```\ndef print_items(items: collections.abc.Iterable):\n    for item in items:\n\
    \        print(item)\n```\n\nIn this case, I am indicating that items are simply\
    \ iterable through the Iterable ABC. As long as the parameter supports an __iter__\
    \ method (and most collections do), this code will typecheck.\n\nAs of Python\
    \ 3.9, there are 25 different ABCs for you to use. Check them all out in the [Python\
    \ documentation](https://docs.python.org/3/library/collections.abc.html).\n\n\
    # Closing Thoughts\n\nYou can't go far without running into collections in Python.\
    \ Lists, dictionaries, and sets are commonplace, and it's imperative that you\
    \ provide hints to the future about what collection types you're working with.\
    \ Consider whether your collections are homogeneous or heterogeneous and what\
    \ that tells future readers. For the cases where you do use heterogeneous collections,\
    \ provide enough information for other developers to reason about them, such as\
    \ a TypedDict. Once you learn the techniques to allow other developers to reason\
    \ about your collections, your codebase becomes so much more understandable.\n\
    \nAlways think through your options when creating new collections:\n\n+   - If\
    \ you are just extending a type, such as adding new methods, you can subclass\
    \ directly from collections such as a list or dictionary. However, beware the\
    \ rough edges, as there is some surprising Python behavior if a user ever overrides\
    \ a built-in method.\n- If you are looking to change out a small part of a list,\
    \ dictionary or string, use collections.UserList, collections.UserDict, or collections.UserString,\
    \ respectively. Remember to reference self.data to access the storage of the respective\
    \ type.\n- If you need to write a more complicated class with the interface of\
    \ another collection type, use collections.abc. You will need to provide your\
    \ own storage for the data inside the class and implement all required methods,\
    \ but once you do, you can customize that collection to your heart's content."
