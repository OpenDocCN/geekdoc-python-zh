- md: "## Invariants\n\nChapter 10 focused mostly on invariants (truths about your\
    \ types that must not be violated). When you're subtyping from other types, the\
    \ subtypes *must* preserve all invariants. When I subtyped Square from Rectangle,\
    \ I disregarded the invariant that heights and widths can be set independent of\
    \ one another.\n\n## Preconditions\n\nA precondition is anything that must be\
    \ true before interacting with a type's property (such as calling a function).\
    \ If the supertype defines preconditions that happen, the subtype *must not* be\
    \ more restrictive. This is what happened when I subtyped RestrictedMenuRestaurant\
    \ from Restaurant. I added an extra precondition that certain ingredients were\
    \ mandatory when changing the menu. By throwing an exception, I've made it so\
    \ that previously good data would now fail.\n\n## Postcondition\n\nA postcondition\
    \ is anything that must be true after interacting with a type's property. If a\
    \ supertype defines postconditions, the subtype must not *weaken* those postconditions.\
    \ A postcondition is weakened if any of its guarantees are not met. When I subtyped\
    \ RestrictedMenuRestaurant from Restaurant and returned early instead of changing\
    \ the menu, I violated a postcondition. The base class guaranteed a postcondition\
    \ that the menu would be updated, regardless of the menu contents. When subtyped\
    \ like I did, I could no longer guarantee that postcondition.\n\nIf at any time\
    \ you break an invariant, precondition, or postcondition in an overridden function,\
    \ you are begging for an error to show up. Here are some red flags that I look\
    \ for in the derived class's overridden functions when evaluating inheritance\
    \ relationships:\n\n## Conditionally checking arguments\n\nA good way to know\
    \ if a precondition is more restrictive is to see if there are any if statements\
    \ at the beginning of the function checking the arguments being passed in. If\
    \ there are, there's a good chance they are different from the base class's checks,\
    \ typically meaning that the derived class is restricting the arguments further.\n\
    \n## Early return statements\n\nIf a subtype's function returns early (in the\
    \ middle of the function block), this indicates that the latter part of the function\
    \ is not going to execute. Check that latter part for any postcondition guarantees;\
    \ you don't want to omit those by returning early.\n\n## Throwing an exception\n\
    \nSubtypes should only throw exceptions that match what the supertype throws (either\
    \ exactly or a derived exception type). If any exceptions are different, callers\
    \ are not going to expect them, let alone write code to catch them. It's even\
    \ worse if you throw an exception when the base class doesn't indicate any possibility\
    \ of an exception at all. The most flagrant violation of this that I've seen is\
    \ throwing NotImplementedError exceptions (or similar).\n\n## Not calling super()\n\
    \nBy definition of substitutability, the subtype must offer the same behavior\
    \ as the supertype. If you aren't calling super() as part of your subtype's overridden\
    \ functions, your subtype has no defined relationship to that behavior in code.\
    \ Even if you were to copy-paste the supertype's code into your subtype, there's\
    \ no guarantee that these will stay synchronized; a developer could make an innocuous\
    \ change to the supertype's function and not even realize that there is a subtype\
    \ that needs to change as well.\n\nYou need to be extra careful when modeling\
    \ types with inheritance. Any mistake can introduce subtle bugs that could have\
    \ catastrophic effects. When designing with inheritance, tread with utmost caution.\n\
    \n## Discussion Topic\n\nHave you encountered any of the red flags in your codebase?\
    \ Has it led to surprising behavior when inheriting from other classes? Discuss\
    \ why these break assumptions and what errors can happen in those cases.\n\n##\
    \ Design Considerations\n\nTake precautions whenever you are writing classes intended\
    \ to be derived from. Your goal is to make it as easy as possible for other developers\
    \ to write derived classes. Here are a few guidelines for writing base classes\
    \ (I’ll cover guidelines for derived classes afterward):\n\n- *Don’t change invariants*\n\
    \  Normally, changing invariants is a bad idea in the first place. Countless pieces\
    \ of code can depend on your types, and changing an invariant will break assumptions\
    \ made on your code. Unfortunately, derived classes can break if a base class\
    \ changes invariants as well. If you have to change your base class, try to only\
    \ add new functionality, not modify existing functionality.\n\n- *Be cautious\
    \ tying invariants to protected fields*\n  Protected fields are inherently meant\
    \ to be interacted with by derived classes. If you tie invariants to these fields,\
    \ you are fundamentally restricting what operations should be invoked. This creates\
    \ a tension that other developers may not be aware of. It’s better to keep invariants\
    \ to private data and force derived classes to interact with public or protected\
    \ methods in order to interact with that private data.\n\n- *Document your invariants*\n\
    \  This is the number one most important thing you can do to help your other developers.\
    \ While some invariants are representable in code (as you saw in Chapter 10),\
    \ there are simply some invariants that cannot be mathematically proven by a computer,\
    \ such as guarantees around exceptions being thrown or not. You must document\
    \ these invariants when you design your base class, and make it easy for derived\
    \ classes to discover them, such as in a docstring.\n\nUltimately, it is the derived\
    \ class’s responsibility to adhere to the base class’s invariants. If you are\
    \ writing a derived class, heed the following guidelines:\n\n- *Know the base\
    \ class invariants*\n  You can’t write a derived class properly without knowing\
    \ the invariants. It is your job to understand all the base class’s invariants\
    \ in order to preserve them. Look through code, documentation, and anything else\
    \ related to the class to understand what you should and should not be doing.\n\
    \n- *Extend functionality in the base class*\n  If you need to write code that\
    \ doesn’t jive with your current invariants, you may want to put that functionality\
    \ in the base class instead. Take the example of not supporting an overridable\
    \ method. Rather than throw a NotImplementedError, you could create a Boolean\
    \ flag indicating functionality support in the base class."
  mdcn: "## 不变量\n\n第10章主要讨论了不变量（关于你的类型必须遵守的真理）。当你从其他类型进行子类型化时，子类型*必须*保留所有不变量。当我将Square子类型化为Rectangle时，我忽略了高度和宽度可以独立设置的不变量。\n\
    \n## 前置条件\n\n前置条件是在与类型的属性（例如调用函数）交互之前必须为真的任何条件。如果超类型定义了前置条件，子类型*不能*更加严格。这就是当我将RestrictedMenuRestaurant子类型化为Restaurant时发生的情况。我添加了一个额外的前置条件，即在更改菜单时某些成分是强制性的。通过抛出异常，我使得原本有效的数据现在会失败。\n\
    \n## 后置条件\n\n后置条件是在与类型的属性交互之后必须为真的任何条件。如果超类型定义了后置条件，子类型不能*削弱*这些后置条件。如果后置条件的任何保证未得到满足，则该后置条件被削弱。当我将RestrictedMenuRestaurant子类型化为Restaurant并提前返回而不是更改菜单时，我违反了后置条件。基类保证了一个后置条件，即菜单将被更新，无论菜单内容如何。像我这样进行子类型化后，我无法再保证该后置条件。\n\
    \n如果你在重写函数中破坏了不变量、前置条件或后置条件，你就是在自找错误。以下是我评估继承关系时在派生类的重写函数中寻找的一些危险信号：\n\n## 有条件地检查参数\n\
    \n了解前置条件是否更加严格的一个好方法是查看函数开头是否有任何if语句检查传入的参数。如果有，它们很可能与基类的检查不同，这通常意味着派生类进一步限制了参数。\n\
    \n## 提前返回语句\n\n如果子类型的函数提前返回（在函数块中间），这表明函数的后半部分将不会执行。检查后半部分是否有任何后置条件保证；你不想因为提前返回而省略这些保证。\n\
    \n## 抛出异常\n\n子类型应该只抛出与超类型抛出的异常匹配的异常（完全匹配或派生异常类型）。如果任何异常不同，调用者将不会预料到它们，更不用说编写代码来捕获它们了。如果你在基类根本没有指示任何异常可能性的情况下抛出异常，那就更糟了。我见过的最公然违反这一点的情况是抛出NotImplementedError异常（或类似异常）。\n\
    \n## 不调用super()\n\n根据可替代性的定义，子类型必须提供与超类型相同的行为。如果你在子类型的重写函数中不调用super()，你的子类型在代码中与该行为没有定义的关系。即使你将超类型的代码复制粘贴到你的子类型中，也无法保证它们会保持同步；开发者可能会对超类型的函数进行无害的更改，甚至没有意识到有一个子类型也需要更改。\n\
    \n在使用继承建模类型时，你需要格外小心。任何错误都可能引入微妙的bug，这些bug可能产生灾难性的影响。在使用继承进行设计时，请极其谨慎。\n\n## 讨论主题\n\
    \n你在代码库中遇到过任何危险信号吗？它是否在从其他类继承时导致了令人惊讶的行为？讨论为什么这些会破坏假设以及在这些情况下可能发生什么错误。\n\n## 设计考虑\n\
    \n在编写旨在被派生的类时，请采取预防措施。你的目标是让其他开发者编写派生类尽可能容易。以下是编写基类的一些指南（我稍后会介绍派生类的指南）：\n\n- *不要改变不变量*\n\
    \  通常，改变不变量首先就是一个坏主意。无数的代码可能依赖于你的类型，改变不变量会破坏基于你的代码所做的假设。不幸的是，如果基类改变不变量，派生类也可能被破坏。如果你必须更改基类，请尝试只添加新功能，而不是修改现有功能。\n\
    \n- *谨慎地将不变量与受保护字段绑定*\n  受保护字段本质上是供派生类交互的。如果你将不变量与这些字段绑定，你从根本上限制了应该调用的操作。这会产生一种其他开发者可能没有意识到的紧张关系。最好将不变量保持为私有数据，并强制派生类通过公共或受保护的方法与该私有数据交互。\n\
    \n- *记录你的不变量*\n  这是你能做的最重要的事情，以帮助其他开发者。虽然一些不变量可以在代码中表示（如你在第10章所见），但有些不变量是计算机无法通过数学证明的，例如关于是否抛出异常的保证。在设计基类时，你必须记录这些不变量，并使派生类能够轻松发现它们，例如在文档字符串中。\n\
    \n最终，遵守基类的不变量是派生类的责任。如果你正在编写派生类，请注意以下指南：\n\n- *了解基类不变量*\n  如果不了解不变量，你就无法正确编写派生类。你的工作是理解所有基类的不变量以保留它们。查看代码、文档以及与类相关的任何其他内容，以了解你应该做什么和不应该做什么。\n\
    \n- *扩展基类的功能*\n  如果你需要编写与当前不变量不一致的代码，你可能希望将该功能放在基类中。以不支持可重写方法为例。你可以创建一个布尔标志来指示基类中的功能支持，而不是抛出NotImplementedError。"
