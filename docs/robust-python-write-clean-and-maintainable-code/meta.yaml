    \ use it without even knowing it. Let's look at a simple example to illustrate\
    \ what I'm talking about:\n\n```\nfrom typing import Iterable\ndef print_items(items:\
    \ Iterable):\n    for item in items:\n        print(item)\n\nprint_items([1,2,3])\n\
