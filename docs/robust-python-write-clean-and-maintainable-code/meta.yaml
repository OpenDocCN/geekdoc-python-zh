    \ a protocol is extremely simple. If you want something to be splittable, you\
    \ define Splittable in terms of a protocol:\n\n```\nfrom typing import Protocol\n\
    class Splittable(Protocol):\n    cost: int\n    name: str\n\n    def split_in_half(self)\
    \ -> tuple['Splittable', 'Splittable']:\n        \"\"\" No implementation needed\
