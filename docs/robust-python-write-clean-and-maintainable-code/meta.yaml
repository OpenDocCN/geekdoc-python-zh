- md: "In general, `Final` is best used when the variable's scope spans a large amount\
    \ of code, such as a module. It is difficult for developers to keep track of all\
    \ the uses of a variable in such large scopes; letting the typechecker catch immutability\
    \ guarantees is a boon in these cases.\n\n`Final` will not error out when mutating\
    \ an object through a function. It only prevents the variable from being rebound\
    \ (set to a new value).\n\n## Closing Thoughts\n\nYou've learned about many different\
    \ ways to constrain your types in this chapter. All of them serve a specific purpose,\
    \ from handling `None` with `Optional` to restricting to specific values with\
    \ `Literal` to preventing a variable from being rebound with `Final`. By using\
    \ these techniques, you'll be able to encode assumptions and restrictions directly\
    \ into your codebase, preventing future readers from needing to guess about your\
    \ logic. Typecheckers will use these advanced type annotations to provide you\
    \ with stricter guarantees about your code, which will give maintainers confidence\
    \ when working in your codebase. With this confidence, they will make fewer mistakes,\
    \ and your codebase will become more robust because of it.\n\nIn the next chapter,\
    \ you'll move on from type annotating single values, and learn how to properly\
    \ annotate collection types. Collection types pervade most of Python; you must\
    \ take care to express your intentions for them as well. You need to be well-versed\
    \ in all the ways you can represent a collection, including in cases where you\
    \ must create your own.\n\n# CHAPTER 5\n## Collection Types\n\nYou can’t go very\
    \ far in Python without encountering *collection types*. Collection types store\
    \ a grouping of data, such as a list of users or a lookup between restaurant or\
    \ address. Whereas other types (e.g., int, float, bool, etc.) may focus on a single\
    \ value, collections may store any arbitrary amount of data. In Python, you will\
    \ encounter common collection types such as dictionaries, lists, and sets (oh,\
    \ my!). Even a string is a type of collection; it contains a sequence of characters.\
    \ However, collections can be difficult to reason about when reading new code.\
    \ Different collection types have different behaviors.\n\nBack in Chapter 1, I\
    \ went over some of the differences between the collections, where I talked about\
    \ mutability, iterability, and indexing requirements. However, picking the right\
    \ collection is just the first step. You must understand the implications of your\
    \ collection and ensure that users can reason about it. You also need to recognize\
    \ when the standard collection types aren’t cutting it and you need to roll your\
    \ own. But the first step is knowing how to communicate your collection choices\
    \ to the future. For that, we’ll turn to an old friend: type annotations.\n\n\
    ## Annotating Collections\n\nI’ve covered type annotations for non-collection\
    \ types, and now you need to know how to annotate collection types. Fortunately,\
    \ these annotations don’t differ too much from the annotations you’ve already\
    \ learned.\n\nTo illustrate this, suppose I’m building a digital cookbook app.\
    \ I want to organize all my cookbooks digitally so I can search them by cuisine,\
    \ ingredient, or author. One of the questions I might have about a cookbook collection\
    \ is how many books from each author I have:\n\n```python\ndef create_author_count_mapping(cookbooks:\
    \ list) -> dict:\n    counter = defaultdict(lambda: 0)\n    for book in cookbooks:\n\
    \        counter[book.author] += 1\n    return counter\n```\n\nThis function has\
    \ been annotated; it takes in a list of cookbooks and will return a dictionary.\
    \ Unfortunately, while this tells me what collections to expect, it doesn't tell\
    \ me how to use the collections at all. There is nothing telling me what the elements\
    \ inside the collection are. For instance, how do I know what type the cookbook\
    \ is? If you were reviewing this code, how do you know that the use of book.author\
    \ is legitimate? Even if you do the digging to make sure book.author is right,\
    \ this code is not future-proof. If the underlying type changes, such as removing\
    \ the author field, this code will break. I need a way to catch this with my typechecker.\n\
    \nI'll do this by encoding more information with my types by using bracket syntax\
    \ to indicate information about the types *inside* the collection:\n\n```python\n\
    AuthorToCountMapping = dict[str, int]\ndef create_author_count_mapping(\n    cookbooks:\
    \ list[Cookbook]\n) -> AuthorToCountMapping:\n    counter = defaultdict(lambda:\
    \ 0)\n    for book in cookbooks:\n        counter[book.author] += 1\n    return\
    \ counter\n```\n\nI used an alias, AuthorToCountMapping, to represent a dict[str,\
    \ int]. I do this because I find it difficult sometimes to remember what the str\
    \ and the int are supposed to represent. However, I do concede that this loses\
    \ some information (readers of the code will have to find out what AuthorToCountMapping\
    \ is an alias to). Ideally, your code editor can display what the underlying type\
    \ is without you needing to look it up.\n\nI can indicate the exact types expected\
    \ in the collection. The cookbooks list contains Cookbook objects, and the return\
    \ value of the function is returning a dictionary mapping strings (keys) to integers\
    \ (values). Note that I'm using a type alias to give more meaning to my return\
    \ value. Mapping from a str to an int does not tell the user the context of the\
    \ type. Instead, I create a type alias named AuthorToCountMapping to make it clear\
    \ how this dictionary relates to the problem domain.\n\nYou need to think through\
    \ what types are contained in the collection in order to be effective in type-hinting\
    \ it. In order to do that, you need to think about homogeneous and heterogeneous\
    \ collections.\n\n## Homogeneous Versus Heterogeneous Collections\n\nHomogeneous\
    \ collections are collections in which every value has the same type. In contrast,\
    \ values in heterogeneous collections may have different types within them. From\
    \ a usability standpoint, your lists, sets, and dictionaries should nearly always\
    \ be homogeneous. Users need a way to reason about your collections, and they\
    \ can't if they don't have the guarantee that every value is the same type. If\
    \ you make a list, set, or dictionary a heterogeneous collection, you are indicating\
    \ to the user that they need to take care to handle special cases. Suppose I want\
    \ to resurrect an example from Chapter 1 for adjusting recipes for my cookbook\
    \ app:\n\n```python\ndef adjust_recipe(recipe, servings):\n    \"\"\"\n    Take\
    \ a meal recipe and change the number of servings\n    :param recipe: A list,\
    \ where the first element is the number of servings,\n                   and the\
    \ remainder of elements follow the (name, amount, unit)\n                   format,\
    \ such as (\"flour\", 1.5, \"cup\")\n    :param servings: the number of servings\n\
    \    :return list: a new list of ingredients, where the first element is the\n\
    \                  number of servings\n    \"\"\"\n    new_recipe = [servings]\n\
    \    old_servings = recipe[0]\n    factor = servings / old_servings\n    recipe.pop(0)\n\
    \    while recipe:\n        ingredient, amount, unit = recipe.pop(0)\n       \
    \ # please only use numbers that will be easily measurable\n        new_recipe.append((ingredient,\
    \ amount * factor, unit))\n    return new_recipe\n```\n\nAt the time, I mentioned\
    \ how parts of this code were ugly; one confounding factor was the fact that the\
    \ first element of the recipe list was a special case: an integer representing\
    \ the servings. This contrasts with the rest of the list elements, which are tuples\
    \ representing actual ingredients, such as (\"flour\", 1.5, \"cup\"). This highlights\
    \ the troubles of a heterogeneous collection. For every use of your collection,\
    \ the user needs to remember to handle the special case. This is predicated on\
    \ the assumption that the developer even knew about the special case in the first\
    \ place. There's no way as it stands to represent that a specific element needs\
    \ to be handled differently. Therefore, a typechecker will not catch when a developer\
    \ forgets. This leads to brittle code down the road.\n\nWhen talking about homogeneity,\
    \ it's important to talk about what a single type means. When I mention a single\
    \ type, I'm not necessarily referring to a concrete type in Python; rather, I'm\
    \ referring to a set of behaviors that define that type. A single type indicates\
    \ that a consumer must operate on every value of that type in the exact same way.\
    \ For the cookbook list, the single type is a Cookbook. For the dictionary"
  mdcn: "通常，当变量的作用域跨越大量代码（例如一个模块）时，`Final` 是最佳选择。在如此大的作用域中，开发者很难跟踪变量的所有使用情况；让类型检查器来捕获不可变性保证，在这些情况下是一大福音。\n\
    \n通过函数修改对象时，`Final` 不会报错。它只阻止变量被重新绑定（设置为新值）。\n\n## 结语\n\n在本章中，你已经了解了许多不同的方式来约束你的类型。它们都有特定的用途，从使用\
