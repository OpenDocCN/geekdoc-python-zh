    \ type of dictionary used for counting how many times an element appears. This\
    \ greatly simplifies our above code to the following:\n\n```python\nfrom collections\
    \ import Counter\ndef create_author_count_mapping(cookbooks: List[Cookbook]):\n\
    \    return Counter(book.author for book in cookbooks)\n```\n\nTake a minute to\
    \ reflect on that last example. Notice how using a Counter gives us much more\
    \ concise code without sacrificing readability. If your readers are familiar with\
    \ Counter, the meaning of this function (and how the implementation works) is\
    \ immediately apparent. This is a great example of communicating intent to the\
