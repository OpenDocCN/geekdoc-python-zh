  - "[PAGE 226]\n\n![](img/d64d2be45ca85b398807d181202e7046_226_0.png)\n\nPydantic\
    \ can work with mypy, but you may need to enable the pydantic plug-in for typechecking\
    \ in your *mypy.ini* to take advantage of all the features. Your *mypy.ini* will\
    \ need the following in it:\n\n\n[mypy]\nplugins = pydantic.mypy\n\n\nFor more\
    \ information, check out the [pydantic documentation](https://pydantic-docs.helpmanual.io/).\n\
    \nBy modeling types with pydantic, I can catch entire classes of errors without\
    \ writing my own validation logic. The pydantic data classes above catch 38 of\
    \ the 67 test cases that I came up with earlier. But I can do better. This code\
    \ still is missing functionality for those other 29 test cases, but I can use\
    \ pydantic's built-in validators to catch even more errors on type construction.\n\
    \n# Validators\n\nPydantic offers a ton of built-in *validators*. Validators are\
    \ custom types that will check for specific constraints upon a field. For instance,\
    \ if I wanted to make sure that strings were a certain size or that all integers\
    \ were positive, I could use pydantic's constrained types:\n\n```\npython\nfrom\
    \ typing import Optional\n\nfrom pydantic.dataclasses import dataclass\nfrom pydantic\
    \ import constr, PositiveInt\n\n@dataclass\nclass AccountAndRoutingNumber:\n \
