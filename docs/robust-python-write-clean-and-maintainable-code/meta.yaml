    ![](img/d64d2be45ca85b398807d181202e7046_296_0.png)


    As with the Template Method, the implementation I''ve shown is a bit different
    than what was originally described in the Gang of Four book. The original implementation
    involved classes and subclasses that wrap a single method. In Python, it''s far
    easier to just pass the single function.


    # Plug-in Architectures


    The Strategy and Template Method Patterns are great for plugging in small bits
    of functionality: a class here or a function there. However, the same patterns
    apply to your architecture as well. Being able to inject classes, modules, or
    subsystems is just as important. A Python library called stevedore is an incredibly
    useful tool for managing plug-ins.


    A plug-in is a piece of code that can be dynamically loaded at runtime. Code can
    scan for installed plug-ins, select an appropriate one, and delegate responsibilities
    to that plug-in. This is another example of extensibility; developers can focus
    on specific plug-ins without touching the core codebase.


    There are a number of benefits beyond extensibility to a plug-in architecture:


    +   - You can deploy plug-ins independently from the core, giving you more granularity
    for rolling out updates.

    - Third parties can write plug-ins without modifying your codebase.

    - Plug-ins are able to be developed in isolation from the core codebase, reducing
    the chances of creating tightly coupled code.


    To demonstrate how plug-ins work, say I want to support an ecosystem for the Ultimate
    Kitchen Assistant where users can buy and install modules (such as the Tex-Mex
    module in the last section) separately from the main kitchen assistant. Each module
    provides a set of recipes, special equipment, and storage of ingredients for the
    Ultimate Kitchen Assistant to do work. The real benefit is that each module can
    be developed separately from the Ultimate Kitchen Assistant core; each module
    is a plug-in.


    The first thing to do when designing plug-ins is determine the contract between
    the core and the various plug-ins. Ask yourself what services the core platform
    provides and what you expect the plug-ins to provide. In the case of the Ultimate
    Kitchen Assistant, Figure 19-3 demonstrates the contract I will be using in the
    following examples.'
