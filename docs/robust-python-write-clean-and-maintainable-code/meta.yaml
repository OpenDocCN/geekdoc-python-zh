    # The Magic of Hypothesis


    Hypothesis is very good at generating test cases that will find errors. It seems
    like magic, but it''s actually quite clever. In the previous example, you may
    have noticed that Hypothesis errored out on the value 5001. If you were to run
    the same code and introduce an error for values greater than 5000, you''ll find
    that the test errors out at 5001 as well. If Hypothesis is testing different values,
    shouldn''t we all see slightly different results?


    Hypothesis does something really nice for you when it finds a failure: it *shrinks*
    the test case. Shrinking is when Hypothesis tries to find the minimal input that
    still fails the test. For `integers()`, Hypothesis will try successively smaller
    numbers (or bigger numbers when dealing with negatives) until the input value
    reaches zero. Hypothesis tries to zero in (no pun intended) on the smallest value
    that still fails the test.


    To learn more about how Hypothesis generates and shrinks values, it''s worth reading
    the original [QuickCheck paper](https://www.cs.kent.ac.uk/people/staff/dat/miranda/quickcheck.pdf).
    QuickCheck was one of the first property-based tools, and even though it deals
    with the Haskell programming language, it is quite informative. Most property-based
    testing tools like Hypothesis are descendents from the ideas put forth by QuickCheck.


    # Contrast with Traditional Tests


    Property-based testing can greatly simplify the test-writing process. There are
    entire classes of problems that you do not need to worry about:


    *Easier testing of nondeterminism*


    Nondeterminism is the bane of most traditional tests. Random behavior, creating
    temporary directories, or retrieving different records from a database can make
    it incredibly hard to write tests. You have to create a specific set of output
    values in your test, and to do that, you need to be deterministic; otherwise,
    your test will keep failing. You often try to control the nondeterminism by forcing
    specific behaviors, such as forcing the same folder to always be created or seeding
    a random number generator.


    With property-based testing, nondeterminism is part of the package. Hypothesis
    will give you different inputs for each test run. You don''t have to worry about
    testing for specific values anymore; define properties and embrace the nondeterminism.
    Your codebase will be better because of it.'
  - '[PAGE 350]


    Less fragility

    When testing for specific input/output combinations, you are at the mercy of a
    slew of hard-coded assumptions. You assume that lists will always be in the same
    order, that dictionaries won''t get any key-value pairs added to them, and that
    your dependencies will never change their behavior. Any one of these seemingly
    unrelated changes can break one of your tests.


    When tests break for reasons unrelated to the functionality under test, it''s
    frustrating. The tests get a bad reputation for being flaky, and either they get
    ignored (masking true failures), or developers live with the constant nagging
    of needing to fix tests. Use property-based testing to add resilience to your
    testing.


    Better chance at finding bugs

    Property-based testing isn''t just about reducing the cost of test creation and
    maintenance. It will increase your chances of finding bugs. Even if you write
    your tests covering every path through your code today, there''s still a chance
    that you haven''t caught everything. If your functions change in a backward-incompatible
    way (say, by now erroring out on a value that you previously thought was fine),
    your luck depends on if you have a test case for that specific value. Property-based
    testing, by the nature of generating new test cases, will have a better chance
    of finding that bug over multiple runs.


    ![](img/d64d2be45ca85b398807d181202e7046_350_0.png)


    **Discussion Topic**

    Examine your current test cases and pick tests that are complicated to read. Search
    for tests that require a large amount of inputs and outputs to adequately test
    functionality. Discuss how property-based testing can replace these tests and
    simplify your test suite.


    # Getting the Most Out of Hypothesis


    I''ve just scratched the surface of Hypothesis so far. Once you really dive into
    property-based testing, you start opening up tons of doors for yourself. Hypothesis
    ships with some pretty cool features out of the box that can improve your testing
    experience.


    # Hypothesis Strategies


    In the previous section, I introduced you to the `integers()` strategy. A Hypothesis
    strategy defines how test cases are generated, as well as how the data gets shrunk
    when a test case fails. Hypothesis ships with a ton of strategies right out of
    the box. Similar to passing `integers()` into your test case, you can pass things
    like `floats()`, `text()`, or `times()` to generate values for floating-point
    numbers, strings, or date time.time objects, respectively.'
