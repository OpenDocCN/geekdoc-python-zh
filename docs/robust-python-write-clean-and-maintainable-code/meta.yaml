    \ int = None) -> None:\n    print(x)\n```\n\nThe parameter x is implicitly converted\
    \ to an Optional[int], since None is a valid value for it. If you were to do any\
    \ integer operations on x, the typechecker would flag it. However, it's better\
    \ to be more explicit and express that a value can be None (to disambiguate for\
    \ future readers).\n\nYou can set --no-implicit-optional in order to get an error,\
    \ forcing you to specify Optional. If you were to typecheck the above code with\
