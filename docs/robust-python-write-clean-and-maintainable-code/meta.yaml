    \ = Person(\"Pat\", 13, \"123 Fake St.\")\n```\n\nNotice that I tweaked the class\
    \ a bit. Instead of defining the variables like I did in a dataclass, I am defining\
    \ all the variables in a constructor. The constructor is a special method that\
    \ gets called when class is instantiated. It takes arguments needed to define\
    \ your user data type, as well as a special argument called self. The specific\
    \ name for this parameter is arbitrary, but you'll see most code use self as the\
    \ convention. Each time you instantiate a class, the self argument refers to that\
    \ specific instance; one instance's attributes won't conflict with another instance's\
    \ attributes, even though they are the same class.\n\nSo why would you ever write\
    \ a class? Dictionaries or data classes are simpler to write and involve less\
    \ ceremony. For something like the Person object listed earlier, I don't disagree.\
    \ However, a class can convey one key thing that a dictionary or data class can't\
    \ easily convey: *invariants*.\n\n# Invariants\n\nAn invariant is a property of\
    \ an entity that remains unchanged throughout the lifetime of that entity. Invariants\
    \ are the concepts that hold true about your code. Readers and writers of code\
    \ will reason about your code and depend upon that reasoning to keep everything\
    \ straight. Invariants are the building blocks for understanding your codebase.\
    \ Here are some examples of invariants:\n\n+   - Every employee has a unique ID;\
    \ no two employee IDs are duplicated.\n- Enemies in a game may only take actions\
    \ if their health points are above zero.\n- Circles may only have a positive radius.\n\
    - Pizzas will always have cheese on top of sauce.\n\nInvariants convey immutable\
    \ properties of objects. They can reflect mathematical properties, business rules,\
    \ coordination guarantees, or anything else you want to hold true. Invariants\
    \ do not have to mirror the real world; they just have to be true for *your* system.\
    \ For instance, Chicago-style deep-dish pizza aficionados may disagree with that\
    \ last pizza-related bullet, but if your system only handles cheese-on-sauce pizzas,\
    \ it's OK to encode that as an invariant. The invariant only refers to a specific\
    \ entity, too. You get to decide the scope of the invariant, whether it is true\
    \ across your system, or whether it only applies to a specific program, module,\
    \ or class. This chapter will focus on classes and their role in *preserving*\
    \ invariants."
