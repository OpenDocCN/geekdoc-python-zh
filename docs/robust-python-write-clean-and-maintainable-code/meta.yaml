    \ like every other problem in this chapter, there is a static analysis tool for\
    \ handling this: Bandit.\n\nBandit checks for common security problems. You can\
    \ find a full list in the [Bandit documentation](https://bandit.readthedocs.io),\
    \ but here is a preview of the sorts of flaws Bandit looks for:\n\n- Flask in\
    \ debug mode, which can lead to remote code execution\n- Making an HTTPS request\
    \ without certificate validation turned on\n\n⁴ There are real-world implications\
    \ to this. A quick search on the internet turns up tons of articles detailing\
