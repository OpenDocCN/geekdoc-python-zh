    splitting the work. If you''re doing this consistently, ask if restructuring the
    codebase could have mitigated the split.


    *Do commits contain large changesets?*

    Look for commits in your version control system that have a large number of files.
    This is a great indication that shotgun surgery is happening, especially if the
    same files keep showing up in multiple commits. Keep in mind this is a guideline;
    big commits don''t always indicate a problem, but if they happen frequently, it''s
    worth checking into.


    ![](img/d64d2be45ca85b398807d181202e7046_242_0.png)


    **Discussion Topic**

    Which OCP violations have you encountered in your codebase?

    How could you restructure code to avoid them?


    # Drawbacks


    Extensibility is not a panacea to all of your coding woes. In fact, you can actually
    *degrade* your codebase with too much flexibility. If you overdo the OCP and try
    to make everything configurable and extensible, you will quickly find yourself
    in a mess. The problem is that while making your code extensible reduces accidental
    complexity in making changes, it can *increase* accidental complexity in other
    areas.


    First, readability suffers. You are creating a whole new layer of abstraction
    that separates your business logic from other parts of your codebase. Anyone who
    wants to understand the entire picture has to jump through a few extra hoops.
    This will affect new developers getting up to speed, as well as hinder debugging
    efforts. You can mitigate this with good documentation and explaining your code
    structure.


    Secondly, you introduce a coupling that may not have been present before. Before,
    separate parts of the codebase were independent of each other. Now, they share
    a common subsystem; any change in that subsystem will affect all the consumers.
    I''ll go more in depth in [Chapter 16](#). Mitigate this with a strong set of
    tests.


    Use the OCP in moderation and take care when applying these principles. Use them
    too much, and your codebase will be overabstracted with a confusing tangle of
    dependencies. Use it too little, and developers will take longer to make changes
    as well as introduce more bugs. Define extension points in areas that you are
    reasonably sure that someone will have to modify again, and you will drastically
    improve your future maintainer''s experience with your codebase.'
