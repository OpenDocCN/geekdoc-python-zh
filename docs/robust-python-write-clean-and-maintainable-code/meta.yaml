  md: '# Lean on Your Tooling


    There are things that computers do well, and there are things that humans do well.
    This section is about the former. When trying to adopt type annotations, there
    are some fantastic things that automated tooling can assist with. First, let''s
    talk about the most common typechecker out there: mypy.


    I''ve covered the configuration of mypy quite extensively in Chapter 6, but there
    are a few more options I''d like to delve into that will help you adopt typechecking.
    One of the biggest problems you will run into is the sheer number of errors that
    mypy will report the first time you run it on a larger codebase. The biggest mistake
    you can make in this situation is to keep the hundreds (or thousands) of errors
    turned on and hope that developers whittle away at the errors over time.


    These errors will not get fixed in any quick fashion. If these errors are always
    turned on, you will not see the benefits of a typechecker, because it will be
    nearly impossible to detect new errors. Any new issue will simply be lost in the
    noise of the multitude of other issues.


    With mypy, you can tell the typechecker to ignore certain classes of errors or
    modules through configuration. Here''s a sample mypy file, which globally warns
    if Any types are returned, and sets config options on a per-module basis:


    ```

    # Global options:


    [mypy]

    python_version = 3.9

    warn_return_any = True


    # Per-module options:


    [mypy-mycode.foo.*]

    disallow_untyped_defs = True


    [mypy-mycode.bar]

    warn_return_any = False


    [mypy-somelibrary]

    ignore_missing_imports = True

    ```


    Using this format, you can pick and choose which errors your typechecker tracks.
    You can mask all of your existing errors, while focusing on fixing new errors.
    Be as specific as possible in defining which errors get ignored; you don''t want
    to mask new errors that show up in unrelated parts of the code.


    To be even more specific, mypy will ignore any line commented with # type: ignore.


    ```

    # typechecks just fine

    a: int = "not an int" # type: ignore

    ```'
