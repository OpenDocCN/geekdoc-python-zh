  md: '# About the Author


    **Patrick Viafore** has been working in the software industry for over 14 years,
    building and maintaining mission-critical software systems including lightning
    detection, telecommunications, and operating systems. Working with statically
    typed languages has influenced his approach to dynamically typed languages such
    as Python, and how we can make them safer and more robust. He also is an organizer
    of the HSV.py meetup, where he can observe common Python obstacles, and loves
    helping beginners and experts alike. His goal is to make computer science/software
    engineering topics more approachable to the developer community.


    Patrick currently works at Canonical, developing pipelines/tools that deploy Ubuntu
    images to public cloud providers. He also does software consulting and contracting
    through his business, Kudzera, LLC.


    # Colophon


    The animal on the cover of *Robust Python* is a Nile crocodile (*Crocodylus niloticus*),
    which lives near freshwater lakes, rivers, and swamplands throughout sub-Saharan
    Africa. It is an aggressive apex predator that hunts by submerging itself in the
    water and waiting to ambush any aquatic or terrestrial animal that comes near.
    They eat a wide variety of prey, including birds, fish, mammals, and other reptiles.
    They are also dangerous to humans, with hundreds of attacks and deaths occurring
    every year.


    Crocodiles have incredibly strong bite force, as well as conical teeth designed
    to fasten tight to their prey rather than tear flesh. These traits enable them
    to quickly grab even large animals and hold them underwater to drown. This species
    is the largest crocodile in Africa, averaging around 12–16 feet long and 500–1,600
    pounds in weight (though females are about 30% smaller than males). They have
    dark backs and mottled yellow-green sides that camouflage them in the water.


    Nile crocodiles are social animals that share basking spots and kills that are
    too large to eat alone. Females lay between 25 to 80 eggs, and protect hatchlings
    for a time (though juvenile crocodiles hunt for themselves). Despite the mother’s
    efforts, it’s estimated that only 10% of eggs hatch, and 1% of those grow to adulthood,
    due to predation by species like the Nile monitor, waterbirds, and other crocodilians.


    Many of the animals on O’Reilly covers are endangered; all of them are important
    to the world.


    The cover illustration is by Karen Montgomery, based on a black-and-white engraving
    from *Meyers Kleines Lexikon*. The cover fonts are Gilroy Semibold and Guardian
    Sans. The text font is Adobe Minion Pro; the heading font is Adobe Myriad Condensed;
    and the code font is Dalton Maag’s Ubuntu Mono.'
