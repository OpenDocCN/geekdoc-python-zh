    # The testing pyramid


    In just about any testing book, you are bound to come across a figure similar
    to Figure 21-1: a “testing pyramid.”³


    ![](img/d64d2be45ca85b398807d181202e7046_320_0.png)


    Figure 21-1. The testing pyramid


    The idea is that you want to write a lot of small, isolated unit tests. These
    are theoretically cheaper and should make up the bulk of your testing, hence they’re
    at the bottom. You have fewer integration tests, which are costly, and even fewer
    UI tests, which are very costly. Now, ever since its inception, developers have
    argued about the testing pyramid in a multitude of ways, including where the lines
    get drawn, the usefulness of unit tests, and even the shape of the triangle (I’ve
    even seen the triangle inverted).


    The truth is, it doesn’t matter what the labels are or how you separate your tests.
    What you want is your triangle to look like Figure 21-2, which focuses on the
    ratio of value to cost.


    > ³ This is known as the testing pyramid, introduced in *Succeeding with Agile*
    by Mike Cohn (Addison-Wesley Professional). Cohn originally has “Service” level
    tests in place of integration tests, but I’ve seen more iterations with “integration”
    tests as the middle layer.'
  - '[PAGE 321]


    ![](img/d64d2be45ca85b398807d181202e7046_321_0.png)


    Figure 21-2. The testing pyramid focused on value-to-cost


    Write lots of tests that have a high value-to-cost ratio. It doesn’t matter if
    they are unit tests or acceptance tests. Find ways to run them often. Make tests
    fast so that developers run them multiple times between commits to verify that
    things are still working. Keep your less valuable, slower, or more costly tests
    for testing on each commit (or at least periodically).


    The more tests you have, the fewer unknowns you have. The fewer unknowns you have,
    the more robust your codebase will be. With every change you make, you have a
    bigger safety net to check for any regression. But what if the tests are becoming
    too costly, far outweighing the cost of any impact? If you feel these tests are
    still worthwhile, you need to find a way to reduce their cost.


    The cost of a test is threefold: the initial cost of writing, the cost of running,
    and the cost for maintenance. Tests, at a minimum, will have to run for some amount
    of time, and that does cost money. However, reducing that cost often becomes an
    optimization exercise, where you look for ways of parallelizing your tests or
    running them more frequently on developer machines. You still need to reduce the
    initial cost of writing and ongoing cost of maintaining your tests. Fortunately,
    everything you’ve read in this book so far directly applies to reducing those
    costs. Your test code is just as much a part of your codebase as the rest of your
    code, and you need to make sure it is robust as well. Choose the right tools,
    organize your test cases properly, and make your tests clear to read and maintain.'
  - "[PAGE 322]\n\n![](img/d64d2be45ca85b398807d181202e7046_322_0.png)\n\n# Discussion\
    \ Topic\n\nMeasure the costs of tests in your system. Does time to write, time\
    \ to run, or time spent maintaining dominate your costs? What can you do to reduce\
    \ those costs?\n\n# Reducing Test Cost\n\nWhen you examine the value against the\
    \ cost of a test, you are gathering information that will help you prioritize\
    \ your testing strategy. Some tests may not be worth running, and some will stand\
    \ out as the first tests you want to write to maximize value. However, sometimes\
    \ you run into the case where there is a really important test that you want to\
    \ write, but it is incredibly costly to write and/or maintain. In these cases,\
    \ find a way to reduce the costs of that test. The way you write and organize\
    \ your tests is paramount to making a test cheaper to write and understand.\n\n\
    > ## Using pytest\n\nFor the examples in this chapter, I will use the popular\
    \ testing library `pytest`. There are fantastic resources for learning pytest,\
    \ such as *Python Testing with pytest: Simple, Rapid, Effective, and Scalable*\
    \ by Brian Okken (Pragmatic Bookshelf). Here, I'll cover the basics to give you\
    \ context for this chapter.\n\nA test in `pytest` is any function that is prefixed\
    \ with `test_` in a file that is also prefixed by `test_`. Here's a file named\
    \ `test_calorie_count.py` with a single test:\n\npython\nfrom nutrition import\
    \ get_calorie_count\n\ndef test_get_calorie_count():\n    assert get_calorie_count(\"\
    Bacon Cheeseburger w/ Fries\") == 1200\n\n\nTests contain assertions, or things\
    \ that should be true. pytest uses the built-in `assert` statement for assertions.\
    \ If a test's assertion is false, an `AssertionError` is raised and the test fails.\
    \ If the assertion is true, the test continues executing.\n\nIf you are hesitant\
    \ to introduce a dependency on a library, there is a built-in unit testing framework\
    \ with the `unittest` module in Python. I prefer pytest because of some advanced\
    \ features (fixtures, plug-ins, etc.), but all of the principles in this chapter\
    \ apply to other testing frameworks as well.\n\n# AAA Testing\n\nAs with production\
    \ code, focus on readability and maintainability in your test code. Communicate\
    \ your intent as clearly as possible. Future test readers will thank you if they\
    \ can see exactly what you are trying to test. When writing a test, it helps for\
    \ each test to follow the same basic pattern."
  - "[PAGE 323]\n\nOne of the most common patterns you'll find in tests is the 3A,\
    \ or AAA, test pattern.⁴ AAA stands for *Arrange-Act-Assert*. You break up each\
    \ test into three separate blocks of code, one for setting up your preconditions\
    \ (arrange), one for performing the operations that are being tested (act), and\
    \ then one for checking for any post-conditions (assert). You may also hear about\
    \ a fourth A, for *annihilate*, or your clean-up code. I'll cover each of these\
    \ steps in detail to discuss how to make your tests easier to read and maintain.\n\
    \n# Arrange\n\nThe *arrange* step is all about setting up the system in a state\
    \ that is ready to test. These are called the *preconditions* of the test. You\
    \ set up any dependencies or test data that are needed for the test to operate\
    \ correctly.\n\nConsider the following test:\n\n```\ndef test_calorie_calculation():\n\
    \n    # arrange (set up everything the test needs to run)\n    add_ingredient_to_database(\"\
    Ground Beef\", calories_per_pound=1500)\n    add_ingredient_to_database(\"Bacon\"\
    , calories_per_pound=2400)\n    add_ingredient_to_database(\"Cheese\", calories_per_pound=1800)\n\
    \    # ... snip 13 more ingredients\n\n    set_ingredients(\"Bacon Cheeseburger\
    \ w/ Fries\",\n                    ingredients=[\"Ground Beef\", \"Bacon\" ...\
    \ ])\n\n    # act (the thing getting tested)\n    calories = get_calories(\"Bacon\
    \ Cheeseburger w/ Fries\")\n\n    # assert (verify some property about the program)\n\
    \    assert calories == 1200\n\n    #annihilate (cleanup any resources that were\
    \ allocated)\n    cleanup_database()\n```\n\nFirst, I add ingredients to a database\
    \ and associate a list of ingredients with a dish called “Bacon Cheeseburger w/\
    \ Fries.” Then I find out how many calories are in the burger, check this against\
    \ a known value, and clean up the database.\n\nLook how much code there is before\
    \ I actually get to the test itself (the *get_calories* invocation). Large *arrange*\
    \ blocks are a red flag. You will have many tests that look very similar, and\
    \ you want readers to be able to know how they differ at a glance."
  - "[PAGE 324]\n\n![](img/d64d2be45ca85b398807d181202e7046_324_0.png)\n\nLarge *arrange*\
    \ blocks may indicate a complicated setup of dependencies. Any user of this code\
    \ will presumably have to set up the dependencies in a similar way. Take a step\
    \ back and ask if there are simpler ways to handle dependencies, such as using\
    \ the strategies described in Part III.\n\nIn the preceding example, if I have\
    \ to add 15 ingredients in two separate tests but set an ingredient slightly differently\
    \ to simulate substitutions, it will be difficult to eyeball how the tests differ.\
    \ Giving the tests verbose names indicating their differences is a good step to\
    \ make, but that only goes so far. Find a balance between keeping the test informative\
    \ and making it easy to read at a glance.\n\n**Consistent preconditions versus\
    \ changing preconditions.** Look through your tests and ask yourself what preconditions\
    \ are the same across sets of tests. Extract these through a function and reuse\
    \ that function across each test. Look how much easier it is to compare the following\
    \ two tests:\n\n```\npython\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Bacon\"\
    , calories_per_pound=2400)\n\n    st /etup_bacon_cheeseburger(bacon=\"Bacon\"\
    )\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n    assert\
    \ calories == 1200\n\n    cleanup_database()\n\ndef test_calorie_calculation_bacon_cheeseburger_with_substitution():\n\
    \    add_base_ingredients_to_database()\n    add_ingredient_to_database(\"Turkey\
    \ Bacon\", calories_per_pound=1700)\n\n    setup_bacon_cheeseburger(bacon=\"Turkey\
    \ Bacon\")\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1100\n\n    cleanup_database()\n```\n\nBy creating helper\
    \ functions (in this case, add_base_ingredients_to_database and setup_bacon_cheeseburger),\
    \ you take all the unimportant boilerplate of the tests and reduce it, allowing\
    \ developers to hone in on differences between tests.\n\n**Use test framework\
    \ features for boilerplate code.** Most test frameworks provide a way to run code\
    \ automatically before tests. In the built-in unittest module, you can write a\
    \ setUp function to run before every test. In pytest, you accomplish something\
    \ similar with fixtures."
- md: "A *fixture* in pytest is a way of specifying initialization and teardown code\
    \ for tests. Fixtures offer a ton of useful features, like defining dependencies\
    \ on other fixtures (letting pytest control initialization order) and controlling\
    \ initialization so that a fixture is only initialized once per module. In the\
    \ previous example, we could have used a fixture for the test_database:\n\n```python\n\
    import pytest\n\n@pytest.fixture\ndef db_creation():\n    # ... snip set up local\
    \ sqlite database\n    return database\n\n@pytest.fixture\ndef test_database(db_creation):\n\
    \    # ... snip adding all ingredients and meals\n    return database\n\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n\n    test_database.cleanup()\n```\n\nNotice how\
    \ the test has an argument for test_database now. This is the fixture at work;\
    \ the function test_database (as well as db_creation) will get called before the\
    \ test. Fixtures only become more useful as the number of tests grows. They are\
    \ composable, allowing you to mix them together and reduce code duplication. I\
    \ won't generally use them to abstract code in a single file, but as soon as that\
    \ initialization needs to be used in multiple files, fixtures are the way to go.\n\
    \n**Mocking.** Python offers duck typing (first mentioned in Chapter 2) as part\
    \ of its type system, which means that you can easily substitute types for one\
    \ another as long as they uphold the same contract (as discussed in Chapter 12).\
    \ This means that you can tackle complex dependencies in a completely different\
    \ way: use a simple mocked object instead. A *mocked* object is something that\
    \ looks identical to a production object as far as methods and fields go, but\
    \ offers simplified data.\n\nMocks are used a lot in unit tests, but you will\
    \ see their usage decline the less granular the tests become. This is because\
    \ you try to test more of the system at a higher level; the services you are mocking\
    \ are often part of the tests.\n\nFor instance, if the database in the previous\
    \ example was quite complex to set up with multiple tables and schemas, it might\
    \ not be worth setting up for every test, especially if tests share a database;\
    \ you want to keep tests isolated from one another. (I'll cover this more in a\
    \ moment.) The class handling the database might look like this:\n\n```python\n\
    class DatabaseHandler:\n    def __init__(self):\n        # ... snip complex setup\n\
    \n    def add_ingredient(self, ingredient):\n        # ... snip complex queries\n\
    \n    def get_calories_for_ingredient(self, ingredient):\n        # ... snip complex\
    \ queries\n```\n\nInstead of using this class verbatim, create a mock class that\
    \ just looks like a database handler:\n\n```python\nclass MockDatabaseHandler:\n\
    \    def __init__(self):\n        self.data = {\n            \"Ground Beef\":\
    \ 1500,\n            \"Bacon\": 2400,\n            # ... snip ...\n        }\n\
    \n    def add_ingredient(self, ingredient):\n        name, calories = ingredient\n\
    \        self.data[name] = calories\n\n    def get_calories_for_ingredient(self,\
    \ ingredient):\n        return self.data[ingredient]\n```\n\nWith the mock, I'm\
    \ just using a simple dictionary to store my data. How you mock your data will\
    \ be different for each scenario, but if you can find a way to substitute the\
    \ real object with a mock object, you can dramatically reduce the complexity of\
    \ your setup.\n\nSome people use *monkeypatching*, or swapping out methods at\
    \ run-time to inject mocks. This is OK in moderation, but if you find your tests\
    \ littered with monkeypatching, this is an antipattern. It means that you have\
    \ far too rigid a physical dependency between different modules and should look\
    \ at finding ways to make your system more modular. (Consult **Part III** for\
    \ more ideas on making code extensible.)\n\n## Annihilate\n\nTechnically, the\
    \ *annihilate* stage is the last thing you do in a test, but I’m covering it second.\
    \ Why? Because it’s inherently tied to your *arrange* step. Whatever you set up\
    \ in *arrange* needs to be torn down if it could influence other tests.\n\nYou\
    \ want your tests to be isolated from one another; it will make them easier to\
    \ maintain. One of the biggest nightmares for a test automation writer is having\
    \ tests fail depending on what order they run in (especially if you have thousands).\
    \ This is a sure sign of tests having subtle dependencies on one another. Clean\
    \ up your tests before you leave them and reduce the chances of tests interacting\
    \ with one another. Here are some strategies for dealing with test cleanup.\n\n\
    **Don’t use shared resources.** If you can get away with it, share nothing between\
    \ tests. This isn’t always feasible, but it should be your goal. If no tests share\
    \ any resources, then you don’t need to clean anything up. A shared resource can\
    \ be in Python (global variable, class variables) or in the environment (database,\
    \ file access, socket pools).\n\n**Use context managers.** Use a context manager\
    \ (discussed in Chapter 11) to ensure that resources are always cleaned up. In\
    \ my previous example, eagle-eyed readers may have noticed a bug:\n\n```python\n\
    def test_calorie_calculation_bacon_cheeseburger():\n    add_base_ingredients_to_database()\n\
    \    add_ingredient_to_database(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n\n    cleanup_database()\n```\n\nIf the assertion\
    \ fails, an exception is raised and `cleanup_database` never executes. It would\
    \ be much better to force usage through a context manager:\n\n```python\ndef test_calorie_calculation_bacon_cheeseburger():\n\
    \    with construct_test_database() as db:\n        db.add_ingredient(\"Bacon\"\
    , calories_per_pound=2400)\n        setup_bacon_cheeseburger(bacon=\"Bacon\")\n\
    \n        calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n       \
    \ assert calories == 1200\n```\n\nPut your cleanup code in the context manager\
    \ so that your test writers never have to actively think about it; it’s just done\
    \ for them.\n\n**Use fixtures.** If you are using pytest fixtures, you can use\
    \ them much like you could a context manager. You can *yield* values from a fixture,\
    \ allowing you to return to the fixture's execution after the test finishes. Observe:\n\
    \n```python\nimport pytest\n\n@pytest.fixture\ndef db_creation():\n    # ... snip\
    \  set up local sqlite database\n    return database\n\n@pytest.fixture\ndef test_database(db_creation):\n\
    \    # ... snip adding all ingredients and meals\n    try:\n        yield database\n\
    \    finally:\n        database.cleanup()\n\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n```\n\nNotice how the test_database fixture now yields\
    \ the database. When any test using this function finishes (whether it passes\
    \ or fails), the database cleanup function will always execute.\n\n## Act\n\n\
    The *act* stage is the most important part of the test. It embodies the actual\
    \ operation that you are testing. In the preceding examples, the *act* stage was\
    \ getting the calories for a specific dish. You do not want an *act* stage to\
    \ be much longer than one or two lines of code. Less is more; by keeping this\
    \ stage small, you reduce the time it takes readers to understand the meat of\
    \ the test.\n\nSometimes, you want to reuse the same *act* stage across multiple\
    \ tests. If you find yourself wanting to write the same test on the same action,\
    \ but with slightly different input data and assertions, consider *parameterizing*\
    \ your tests. Test *parameterization* is a way of running the same test on different\
    \ parameters. This allows you to write *table-driven* tests, or a way of organizing\
    \ your test data in a tabular form."
  mdcn: "在pytest中，*fixture*（测试夹具）是一种为测试指定初始化和清理代码的方式。Fixture提供了许多实用功能，例如定义对其他fixture的依赖（让pytest控制初始化顺序）以及控制初始化，使得一个fixture在每个模块中只初始化一次。在前面的例子中，我们可以为test_database使用一个fixture：\n\
    \n```python\nimport pytest\n\n@pytest.fixture\ndef db_creation():\n    # ... 省略设置本地sqlite数据库的步骤\n\
    \    return database\n\n@pytest.fixture\ndef test_database(db_creation):\n   \
    \ # ... 省略添加所有食材和餐食的步骤\n    return database\n\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n\n    test_database.cleanup()\n```\n\n注意现在测试有一个`test_database`参数。这就是fixture在起作用；函数`test_database`（以及`db_creation`）会在测试之前被调用。随着测试数量的增长，fixture会变得越来越有用。它们是可组合的，允许你将它们混合在一起，减少代码重复。我通常不会用它们来抽象单个文件中的代码，但一旦初始化需要在多个文件中使用，fixture就是最佳选择。\n\
    \n**Mocking（模拟）。** Python在其类型系统中提供了鸭子类型（第2章首次提及），这意味着只要类型遵循相同的契约（如第12章所讨论），你就可以轻松地相互替换类型。这意味着你可以用一种完全不同的方式来处理复杂的依赖：使用一个简单的模拟对象。一个*模拟*对象在方法和字段方面与生产对象看起来完全相同，但提供的是简化的数据。\n\
    \nMock在单元测试中使用很多，但随着测试粒度变粗，你会看到它们的使用频率下降。这是因为你试图在更高层次上测试更多的系统；你模拟的服务通常是测试的一部分。\n\
    \n例如，如果前面例子中的数据库设置起来相当复杂，有多个表和模式，那么为每个测试都设置它可能不值得，特别是如果测试共享一个数据库；你希望保持测试彼此隔离。（我稍后会更详细地介绍这一点。）处理数据库的类可能看起来像这样：\n\
    \n```python\nclass DatabaseHandler:\n    def __init__(self):\n        # ... 省略复杂设置\n\
    \n    def add_ingredient(self, ingredient):\n        # ... 省略复杂查询\n\n    def get_calories_for_ingredient(self,\
    \ ingredient):\n        # ... 省略复杂查询\n```\n\n与其原样使用这个类，不如创建一个模拟类，它看起来就像一个数据库处理器：\n\
    \n```python\nclass MockDatabaseHandler:\n    def __init__(self):\n        self.data\
    \ = {\n            \"Ground Beef\": 1500,\n            \"Bacon\": 2400,\n    \
    \        # ... 省略 ...\n        }\n\n    def add_ingredient(self, ingredient):\n\
    \        name, calories = ingredient\n        self.data[name] = calories\n\n \
    \   def get_calories_for_ingredient(self, ingredient):\n        return self.data[ingredient]\n\
    ```\n\n使用模拟时，我只是用一个简单的字典来存储数据。如何模拟数据会因场景而异，但如果你能找到一种方法用模拟对象替换真实对象，你就可以显著降低设置的复杂性。\n\
    \n有些人使用*猴子补丁*，即在运行时替换方法以注入模拟。适度使用是可以的，但如果你发现测试中充斥着猴子补丁，这就是一种反模式。这意味着不同模块之间的物理依赖过于严格，你应该寻找方法使你的系统更加模块化。（有关使代码可扩展的更多想法，请参阅**第三部分**。）\n\
    \n## 清理\n\n从技术上讲，*清理*阶段是你在测试中最后做的事情，但我把它放在第二位介绍。为什么？因为它与你的*准备*步骤紧密相连。你在*准备*阶段设置的任何内容，如果可能影响其他测试，都需要被拆除。\n\
    \n你希望你的测试彼此隔离；这将使它们更容易维护。测试自动化编写者最大的噩梦之一是测试失败取决于它们的运行顺序（尤其是当你有成千上万个测试时）。这肯定是测试之间存在微妙依赖的迹象。在离开测试之前清理它们，减少测试之间相互影响的机会。以下是一些处理测试清理的策略。\n\
    \n**不要使用共享资源。** 如果可以的话，测试之间不要共享任何东西。这并不总是可行的，但这应该是你的目标。如果没有测试共享任何资源，那么你就不需要清理任何东西。共享资源可以是Python中的（全局变量、类变量）或环境中的（数据库、文件访问、套接字池）。\n\
    \n**使用上下文管理器。** 使用上下文管理器（第11章讨论过）来确保资源总是被清理。在我之前的例子中，眼尖的读者可能注意到了一个bug：\n\n```python\n\
    def test_calorie_calculation_bacon_cheeseburger():\n    add_base_ingredients_to_database()\n\
    \    add_ingredient_to_database(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n\n    cleanup_database()\n```\n\n如果断言失败，会引发异常，`cleanup_database`永远不会执行。通过上下文管理器强制使用会好得多：\n\
    \n```python\ndef test_calorie_calculation_bacon_cheeseburger():\n    with construct_test_database()\
    \ as db:\n        db.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    \
    \    setup_bacon_cheeseburger(bacon=\"Bacon\")\n\n        calories = get_calories(\"\
    Bacon Cheeseburger w/ Fries\")\n\n        assert calories == 1200\n```\n\n将你的清理代码放在上下文管理器中，这样测试编写者就永远不需要主动考虑它；它会自动完成。\n\
    \n**使用fixture。** 如果你使用pytest的fixture，你可以像使用上下文管理器一样使用它们。你可以从fixture中*yield*值，允许你在测试完成后返回到fixture的执行。观察：\n\
    \n```python\nimport pytest\n\n@pytest.fixture\ndef db_creation():\n    # ... 省略设置本地sqlite数据库的步骤\n\
    \    return database\n\n@pytest.fixture\ndef test_database(db_creation):\n   \
    \ # ... 省略添加所有食材和餐食的步骤\n    try:\n        yield database\n    finally:\n     \
    \   database.cleanup()\n\ndef test_calorie_calculation_bacon_cheeseburger(test_database):\n\
    \    test_database.add_ingredient(\"Bacon\", calories_per_pound=2400)\n    setup_bacon_cheeseburger(bacon=\"\
    Bacon\")\n\n    calories = get_calories(\"Bacon Cheeseburger w/ Fries\")\n\n \
    \   assert calories == 1200\n```\n\n注意`test_database` fixture现在yield了数据库。当任何使用此函数的测试完成时（无论通过与否），数据库清理函数总会执行。\n\
    \n## 执行\n\n*执行*阶段是测试中最重要的部分。它体现了你正在测试的实际操作。在前面的例子中，*执行*阶段是获取特定菜肴的卡路里。你不希望*执行*阶段比一两行代码长太多。少即是多；通过保持这个阶段简短，你可以减少读者理解测试核心内容所需的时间。\n\
    \n有时，你想在多个测试中重用相同的*执行*阶段。如果你发现自己想在相同的操作上编写相同的测试，但输入数据和断言略有不同，请考虑*参数化*你的测试。测试*参数化*是一种在不同参数上运行相同测试的方式。这允许你编写*表驱动*测试，或以表格形式组织测试数据。"
