  md: 'You can add too many types in a Union, though. The more special cases of types
    you handle, the more code a developer has to write every time they use that type,
    and the more unwieldy the codebase becomes.


    At the far end of the spectrum lies the Any type. Any can be used to indicate
    that all types are valid in this context. This sounds appealing to get around
    special cases, but it also means that the consumers of your collection have no
    clue what to do with the values in the collection, defeating the purpose of type
    annotations in the first place.


    ![](img/d64d2be45ca85b398807d181202e7046_84_0.png)


    Developers working in a statically typed language don''t need to put in as much
    care to ensure collections are homogeneous; the static type system does that for
    them already. The challenge in Python is due to Python''s dynamically typed nature.
    It is much easier for a developer to create a heterogeneous collection without
    any warnings from the language itself.


    Heterogeneous collection types still have a lot of uses; don''t assume that you
    should use homogeneity for every collection type because it is easier to reason
    about. Tuples, for example, are often heterogeneous.


    Suppose a tuple containing a name and page count represents a Cookbook:


    ```

    Cookbook = tuple[str, int] # name, page count

    ```


    I am describing specific fields for this tuple: name and page count. This is a
    prime example of an heterogeneous collection:


    +   - Each field (name and page count) will always be in the same order.

    - All names are strings; all page counts are integers.

    - Iterating over the tuple is rare, since I won''t treat both types the same.

    - Name and page count are fundamentally different types, and should not be treated
    as equivalent.


    When accessing a tuple, you will typically index to the specific field you want:


    ```

    food_lab: Cookbook = ("The Food Lab", 958)

    odd_bits: Cookbook = ("Odd Bits", 248)


    print(food_lab[0])

    >>> "The Food Lab"


    print(odd_bits[1])

    >>> 248

    ```


    However, in many codebases, tuples like these soon become burdensome. Developers
    tire of writing cookbook[0] whenever they want a name. A better thing to do would
    be to find some way to name these fields. A first choice might be a dictionary:'
