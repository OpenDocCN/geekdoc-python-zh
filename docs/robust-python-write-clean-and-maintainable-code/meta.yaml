    \ 个可表示状态。与所有字段都归入单个实体时的 144 个状态相比。我将可表示状态空间减少了近 85%。我使得混合和匹配彼此不兼容的字段变得不可能。犯错变得更加困难，需要测试的组合也少得多。每当你使用和类型（如联合类型）时，你都在显著减少可能的可表示状态数量。\n\
