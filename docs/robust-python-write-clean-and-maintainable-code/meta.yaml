    \ in meals: | Tests fail: Syntax errors and code does no looping |\n| target -=\
    \ meal.calories | Tests fail: no warnings are ever displayed |\n| if target <\
    \ 0 | Tests fail: all meals show a warning |\n| display_warning(meal, WarningType.OVER_CALORIE_LIMIT)\
    \ | Tests fail: no warnings are shown |\n| continue | Tests pass |\n| display_checkmark(meal)\
    \ | Tests fail: checkmarks are not displayed on meals |\n\nLook at the row in\
