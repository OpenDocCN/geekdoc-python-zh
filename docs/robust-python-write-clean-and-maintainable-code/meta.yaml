    \ I indicate that the returned list should contain the same type as the passed-in\
    \ list? To achieve this, I use a generic, which is done with a TypeVar in Python:\n\
    \n```\nfrom typing import TypeVar\nT = TypeVar('T')\ndef reverse(coll: list[T])\
    \ -> list[T]:\n    return coll[::-1]\n```\n\nThis says that for a type T, reverse\
