    \ to get the list of users needing to be notified:\n\n```python\nusers_to_notify:\
    \ Dict[type, List[NotificationMethod]] = {\n    NewSpecial: [SupplierAPI(), Email(\"\
    boss@company.org\"),\n                 Email(\"marketing@company.org\"), Text(\"\
    555-2345\")],\n    IngredientsOutOfStock: [SupplierAPI(), Email(\"boss@company.org\"\
    )],\n    IngredientsExpired: [SupplierAPI(), Email(\"boss@company.org\")],\n \
    \   NewMenuItem: [Email(\"boss@company.org\"), Email(\"marketing@company.org\"\
    )]\n}\n```\n\nIn practice, this data could be coming from a config file or some\
    \ other declarative source, but for the brevity needed for a book example, it\
    \ will do. To add new users, I just add a new entry to this dictionary. Adding\
    \ new notification methods or notification types for a user is just as easy. The\
    \ code for users to notify is much easier to handle.\n\nTo put it all together,\
    \ I'll implement `send_notification` using all of these concepts:\n\n```python\n\
    def send_notification(notification: Notification):\n    try:\n        users =\
    \ users_to_notify[type(notification)]\n    except KeyError:\n        raise ValueError(\"\
    Unsupported Notification Method\")\n    for notification_method in users:\n  \
    \      notify(notification_method, notification)\n```\n\nThat's it! All of this\
    \ code for notifications can live in one file, and the rest of the codebase only\
    \ needs to know one function—`send_notification`—to interact with the notification\
    \ system. This becomes much easier to test once there's no need to interact with\
    \ any other part of the codebase. Furthermore, this code is extensible; developers\
    \ can easily add new notification types, methods, or users without trawling through\
    \ the codebase for all the myriad invocations. You want to make it easy to add\
    \ new functionality to your codebase while minimizing modifications to existing\
    \ code. This is known as the Open-Closed Principle.\n\n## Open-Closed Principle\n\
    \nThe *Open-Closed Principle* (OCP) states that code should be open for extension\
    \ and closed for modification.² This is the heart of extensibility. Our redesign\
    \ in the previous section tried to uphold this principle. Rather than requiring\
    \ new functionality to touch multiple parts of the codebase, it instead required\
    \ adding new types or functions. Even when existing functions changed, all I did\
    \ was add a new conditional check instead of modifying an existing check.\n\n\
    It may seem like all I've done is aim for code reuse, but the OCP goes a step\
    \ further. Yes, I've deduplicated the notification code, but more importantly,\
    \ I've made it easier for developers to manage the complexity. Ask yourself which\
    \ you prefer: implement-\n\n> ² The OCP was first described in *Object-Oriented\
    \ Software Construction* by Bertrand Meyer (Pearson)."
