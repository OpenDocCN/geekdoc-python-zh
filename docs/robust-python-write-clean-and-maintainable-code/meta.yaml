  md: "As developers implement these features, `declare_special` gets bigger and bigger.\
    \ It handles more and more cases, and as the logic gets more complex, the potential\
    \ for making a mistake grows. What's worse, any changes to the API (such as adding\
    \ a list of email addresses or phone numbers for texting) will have repercussions\
    \ for all the callers. At some point, doing simple things like adding a new email\
    \ address to the list of marketers touches multiple files in your codebase. This\
    \ is colloquially known as “shotgun surgery”:¹ where a single change spreads out\
    \ in a blast pattern, impacting a variety of files. Furthermore, developers are\
    \ modifying existing code, increasing the chances of a mistake. To top it off,\
    \ we've only covered `declare_special`, but `order_dish` and `check_for_expired_ingredients`\
    \ need their own custom logic as well. Handling the notification code duplicated\
    \ everywhere would be quite tedious. Ask yourself if you would enjoy having to\
    \ look for every notification snippet in the codebase just because a new user\
    \ wants text notifications.\n\nThis all stems from the code not being very extensible.\
    \ You start requiring developers to know about all the intricacies of multiple\
    \ files in order to make their changes. It will take significantly more work for\
    \ a maintainer to implement their features. Recall from Chapter 1 the discussion\
    \ between accidental complexity and necessary complexity. Necessary complexity\
    \ is intrinsic to your problem domain; accidental complexity is the complexity\
    \ you introduce. In this case, the combination of notifications, recipients, and\
    \ filters is necessary; it is a required functionality of the system.\n\nHowever,\
    \ how you implement the system dictates how much accidental complexity you incur.\
    \ The way I've described is chock full of accidental complexity. Adding any one\
    \ simple thing is quite a monumental undertaking. Requiring developers to hunt\
    \ through the codebase to find all the places that need to change is just asking\
    \ for trouble. Easy changes should be easy to make. Otherwise, extending the system\
    \ becomes a chore every single time.\n\n# The Redesign\n\nLet's look at the `declare_special`\
    \ function again:\n\n```\ndef declare_special(notification: NotificationType,\n\
