    \ 提出的思想的后代。\n\n## 与传统测试的对比\n\n基于属性的测试可以大大简化测试编写过程。有一整类问题你不需要担心：\n\n### 更容易测试非确定性\n\
    \n非确定性是大多数传统测试的祸根。随机行为、创建临时目录或从数据库中检索不同的记录会使编写测试变得异常困难。你必须在测试中创建一组特定的输出值，为此，你需要是确定性的；否则，你的测试将不断失败。你通常试图通过强制特定行为来控制非确定性，例如强制始终创建相同的文件夹或为随机数生成器设置种子。\n\
    \n使用基于属性的测试，非确定性是其中的一部分。Hypothesis 会在每次测试运行时为你提供不同的输入。你不再需要担心测试特定值；定义属性并拥抱非确定性。你的代码库将因此变得更好。\n\
    \n### 更少的脆弱性\n\n当测试特定的输入/输出组合时，你受制于大量硬编码的假设。你假设列表总是保持相同的顺序，字典不会添加任何键值对，并且你的依赖项永远不会改变其行为。这些看似无关的更改中的任何一个都可能破坏你的某个测试。\n\
    \n当测试因与被测功能无关的原因而中断时，这令人沮丧。测试因不稳定而声名狼藉，要么被忽略（掩盖了真正的失败），要么开发人员不得不忍受不断需要修复测试的困扰。使用基于属性的测试来增加测试的弹性。\n\
    \n### 更好的发现缺陷的机会\n\n基于属性的测试不仅仅是降低测试创建和维护的成本。它会增加你发现缺陷的机会。即使你今天编写的测试覆盖了代码中的每条路径，仍然有可能你没有捕获所有内容。如果你的函数以向后不兼容的方式更改（例如，现在对以前认为正常的值报错），你的运气取决于你是否有一个针对该特定值的测试用例。基于属性的测试，由于其生成新测试用例的本质，在多次运行中发现该缺陷的机会更大。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_350_0.png)\n\n**讨论主题**\n检查你当前的测试用例，挑选那些读起来复杂的测试。搜索那些需要大量输入和输出才能充分测试功能的测试。讨论基于属性的测试如何可以替代这些测试并简化你的测试套件。\n\
    \n## 充分利用 Hypothesis\n\n到目前为止，我只是触及了 Hypothesis 的皮毛。一旦你真正深入基于属性的测试，你就会为自己打开无数扇门。Hypothesis\
    \ 开箱即带有一些非常酷的功能，可以改善你的测试体验。\n\n## Hypothesis 策略\n\n在上一节中，我向你介绍了 `integers()` 策略。Hypothesis\
    \ 策略定义了如何生成测试用例，以及当测试用例失败时如何收缩数据。Hypothesis 开箱即带有很多策略。类似于将 `integers()` 传递给你的测试用例，你可以传递\
    \ `floats()`、`text()` 或 `times()` 等来分别生成浮点数、字符串或 `datetime.time` 对象的值。\n\nHypothesis\
    \ 还提供了可以将其他策略组合在一起的策略，例如构建策略的列表、元组或字典（这是第 17 章中描述的可组合性的一个绝佳例子）。例如，假设我想创建一个将菜名（文本）映射到卡路里（100\
    \ 到 2000 之间的数字）的策略：\n\n```python\nfrom hypothesis import given\nfrom hypothesis.strategies\
    \ import dictionaries, integers, text\n\n@given(dictionaries(text(), integers(min_value=100,\
    \ max_value=2000)))\ndef test_calorie_count(ingredient_to_calorie_mapping: dict[str,\
    \ int]):\n    # ... 省略 ...\n```\n\n对于更复杂的数据，你可以使用 Hypothesis 定义自己的策略。你可以映射和过滤策略，这在概念上类似于内置的\
    \ `map` 和 `filter` 函数。\n\n你也可以使用 `hypothesis.composite` 策略装饰器来定义自己的策略。我想创建一个为我创建三道菜套餐的策略，包括开胃菜、主菜和甜点。每道菜包含一个名称和一个卡路里计数：\n\
    \n```python\nfrom hypothesis import given\nfrom hypothesis.strategies import composite,\
    \ integers\n\nThreeCourseMeal = tuple[Dish, Dish, Dish]\n\n@composite\ndef three_course_meals(draw)\
    \ -> ThreeCourseMeal:\n    appetizer_calories = integers(min_value=100, max_value=900)\n\
    \    main_dish_calories = integers(min_value=550, max_value=1800)\n    dessert_calories\
    \ = integers(min_value=500, max_value=1000)\n\n    return (Dish(\"Appetizer\"\
    , draw(appetizer_calories)),\n            Dish(\"Main Dish\", draw(main_dish_calories)),\n\
    \            Dish(\"Dessert\", draw(dessert_calories)))\n\n@given(three_course_meals)\n\
    def test_three_course_meal_substitutions(three_course_meal: ThreeCourseMeal):\n\
    \    # ... 对 three_course_meal 做一些操作\n```\n\n这个例子通过定义一个名为 `three_course_meals`\
    \ 的新组合策略来工作。我创建了三个整数策略；每种类型的菜肴都有自己的策略，具有自己的最小/最大值。然后，我创建了一个具有名称和从策略中抽取的值的新菜肴。`draw`\
    \ 是一个传递给你的组合策略的函数，你用它来从策略中选择值。\n\n一旦你定义了自己的策略，你就可以在多个测试中重用它们，从而轻松地为你的系统生成新数据。要了解更多关于\
    \ Hypothesis 策略的信息，我鼓励你阅读 Hypothesis 文档。"
