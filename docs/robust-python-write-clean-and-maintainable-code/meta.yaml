    \ can help with deduplicating these types:\n\n```\nT = TypeVar(\"T\")\nAPIResponse\
    \ = Union[T, APIError]\n\ndef get_nutrition_info(recipe: str) -> APIResponse[NutritionInfo]:\n\
    \    # ...\n\ndef get_ingredients(recipe: str) -> APIResponse[list[Ingredient]]:\n\
    \    #...\n\ndef get_restaurants_serving(recipe: str) -> APIResponse[list[Restaurant]]:\n\
    \    # ...\n```\n\nNow you have a single place to control all of your API error\
    \ handling. If you were to change it, you can rely on your typechecker to catch\
    \ all the places needing changes.\n\n# Modifying Existing Types\n\nGenerics are\
    \ nice for creating your own collection types, but what if you just want to tweak\
