    \nindex = 0\nwhile index < len(text):\n    print(text[index])\n    index += 1\n\
    ```\n\nThis simple code prints each character on a separate line. This is perfectly\
    \ fine for a first pass at Python for this problem, but the solution quickly evolves\
    \ into the more Pythonic (code written in an idiomatic style that aims to emphasize\
    \ simplicity and is recognizable to most Python developers):\n\n```python\nfor\
    \ character in text:\n    print(character)\n```\n\nTake a moment and reflect on\
    \ why this option is preferable. The for loop is a more appropriate choice; it\
    \ communicates intentions more clearly. Just like collection types, the looping\
    \ construct you select explicitly communicates different concepts. Here's a list\
    \ of some common looping constructs and what they convey:\n\n### for loops\n\n\
    for loops are used for iterating over each element in a collection or range and\
    \ performing an action/side effect.\n\n```python\nfor cookbook in cookbooks:\n\
    \    print(cookbook)\n```\n\n### while loops\n\nwhile loops are used for iterating\
    \ as long as a certain condition is true.\n\n```python\nwhile is_cookbook_open(cookbook):\n\
    \    narrate(cookbook)\n```\n\n### Comprehensions\n\nComprehensions are used for\
    \ transforming one collection into another (normally, this does not have side\
    \ effects, especially if the comprehension is lazy).\n\n```python\nauthors = [cookbook.author\
    \ for cookbook in cookbooks]\n```\n\n### Recursion\n\nRecursion is used when the\
    \ substructure of a collection is identical to the structure of a collection (for\
    \ example, each child of a tree is also a tree).\n\n```python\ndef list_ingredients(item):\n\
    \    if isinstance(item, PreparedIngredient):\n        list_ingredients(item)\n\
    \    else:\n        print(ingredient)\n```\n\nYou want each line of your codebase\
    \ to deliver value. Furthermore, you want each line to clearly communicate what\
    \ that value is to future developers. This drives a need to minimize any amount\
    \ of boilerplate, scaffolding, and superfluous code. In the example above, I am\
    \ iterating over each element and performing a side effect (printing an element),\
    \ which makes the for loop an ideal looping construct. I am not wasting code.\
    \ In contrast, the while loop requires us to explicitly track looping until a\
    \ certain condition occurs. In other words, I need to track a specific condition\
