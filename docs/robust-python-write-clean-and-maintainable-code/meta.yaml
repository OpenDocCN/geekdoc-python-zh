    \nThe fact that the typechecker errors out in this case is fantastic. If any function\
    \ you depend on changes to return a new type, its return signature must be updated\
    \ to Union a new type, which forces you to update your code to handle the new\
    \ type. This means that your code will be flagged when your dependencies change\
    \ in a way that contradicts your assumptions. With the decisions you make today,\
    \ you can catch errors in the future. This is the mark of robust code; you are\
    \ making it increasingly harder for developers to make mistakes, which reduces\
    \ their error rates, which reduces the number of bugs users will experience.\n\
    \nThere is one more fundamental benefit of using a Union, but to explain it, I\
    \ need to teach you a smidge of *type theory*, which is a branch of mathematics\
    \ around type systems.\n\n# Product and Sum Types\n\nUnions are beneficial because\
    \ they help constrain representable state space. *Representable state space* is\
    \ the set of all possible combinations an object can take.\n\nTake this dataclass:\n\
    \n```\nfrom dataclasses import dataclass\n# If you aren't familiar with data classes,\
    \ you'll learn more in chapter 10\n# but for now, treat this as four fields grouped\
    \ together and what types they are\n@dataclass\nclass Snack:\n    name: str\n\
    \    condiments: set[str]\n    error_code: int\n    disposed_of: bool\n```\n\n\
    ```\nSnack(\"Hotdog\", {\"Mustard\", \"Ketchup\"}, 5, False)\n```\n\nI have a\
    \ name, the condiments that can go on top, an error code in case something goes\
    \ wrong, and if something does go wrong, a boolean to track whether I have"
