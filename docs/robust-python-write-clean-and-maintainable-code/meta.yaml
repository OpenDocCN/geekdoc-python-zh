    \ 8、9 和 10 章中探讨）。对元组进行静态索引是安全的，因为它们的大小是固定的。集合和生成器从不进行索引。\n\n此规则的例外情况包括：\n\n- \
    \  获取序列的第一个或最后一个元素（`my_list[0]` 或 `my_list[-1]`）\n-   使用字典作为中间数据类型，例如读取 JSON 或\
    \ YAML 时\n-   处理特定固定块的序列操作（例如，总是在第三个元素后分割或检查固定格式字符串中的特定字符）\n-   针对特定集合类型的性能原因\n\
    \n相比之下，*动态索引*发生在你使用一个直到运行时才知道的变量来索引集合时。这是列表和字典最合适的选择。当你在集合上迭代或使用 `index()` 函数搜索特定元素时，你会看到这一点。\n\
    \n这些是基本的集合，但还有更多方式来表达意图。以下是一些特殊的集合类型，它们在向未来传达意图方面更具表现力：\n\n`frozenset`\n一个不可变的集合。\n\
    \n`OrderedDict`\n一个根据插入时间保留元素顺序的字典。从 CPython 3.6 和 Python 3.7 开始，内置字典也会根据插入时间保留元素顺序。\n\
    \n## defaultdict\n\n一个在键缺失时提供默认值的字典。例如，我可以将我之前的示例重写如下：\n\n```python\nfrom collections\
    \ import defaultdict\ndef create_author_count_mapping(cookbooks: List[Cookbook]):\n\
    \    counter = defaultdict(lambda: 0)\n    for cookbook in cookbooks:\n      \
    \  counter[cookbook.author] += 1\n    return counter\n```\n\n这为最终用户引入了新的行为——如果他们查询字典中一个不存在的值，他们将收到一个\
    \ 0。这在某些用例中可能是有益的，但如果不是，你可以直接返回 `dict(counter)`。\n\n## Counter\n\n一种用于计算元素出现次数的特殊字典类型。这大大简化了我们上面的代码，如下所示：\n\
    \n```python\nfrom collections import Counter\ndef create_author_count_mapping(cookbooks:\
    \ List[Cookbook]):\n    return Counter(book.author for book in cookbooks)\n```\n\
    \n花点时间反思一下最后一个例子。注意使用 Counter 如何让我们获得更简洁的代码，同时不牺牲可读性。如果你的读者熟悉 Counter，这个函数的含义（以及实现如何工作）会立即显现。这是一个通过更好地选择集合类型向未来传达意图的绝佳例子。我将在第\
    \ 5 章进一步探讨集合。\n\n还有许多其他类型可以探索，包括 array、bytes 和 range。每当你遇到一个新的集合类型，无论是内置的还是其他的，问问自己它与其他集合有何不同，以及它向未来的读者传达了什么。\n\
    \n## 迭代\n\n迭代是另一个例子，你选择的抽象决定了你传达的意图。\n\n你有多少次看到这样的代码？\n\n```python\ntext = \"\
    This is some generic text\"\nindex = 0\nwhile index < len(text):\n    print(text[index])\n\
    \    index += 1\n```\n\n这段简单的代码将每个字符打印在单独的行上。对于这个问题的 Python 初次尝试来说，这完全没问题，但解决方案很快演变成更\
    \ Pythonic 的风格（以惯用风格编写的代码，旨在强调简洁性，并且大多数 Python 开发者都能识别）：\n\n```python\nfor character\
    \ in text:\n    print(character)\n```\n\n花点时间反思一下为什么这个选项更可取。for 循环是更合适的选择；它更清晰地传达了意图。就像集合类型一样，你选择的循环结构明确地传达了不同的概念。以下是一些常见循环结构及其传达内容的列表：\n\
    \n### for 循环\n\nfor 循环用于遍历集合或范围中的每个元素并执行操作/副作用。\n\n```python\nfor cookbook in\
    \ cookbooks:\n    print(cookbook)\n```\n\n### while 循环\n\nwhile 循环用于只要某个条件为真就进行迭代。\n\
    \n```python\nwhile is_cookbook_open(cookbook):\n    narrate(cookbook)\n```\n\n\
    ### 推导式\n\n推导式用于将一个集合转换为另一个集合（通常，这没有副作用，特别是如果推导式是惰性的）。\n\n```python\nauthors =\
    \ [cookbook.author for cookbook in cookbooks]\n```\n\n### 递归\n\n当集合的子结构与集合的结构相同时使用递归（例如，树的每个子节点也是一棵树）。\n\
    \n```python\ndef list_ingredients(item):\n    if isinstance(item, PreparedIngredient):\n\
    \        list_ingredients(item)\n    else:\n        print(ingredient)\n```\n\n\
    你希望代码库的每一行都能提供价值。此外，你希望每一行都能清晰地向未来的开发者传达该价值是什么。这驱动了最小化任何样板代码、脚手架和多余代码的需求。在上面的例子中，我正在遍历每个元素并执行副作用（打印一个元素），这使得\
    \ for 循环成为理想的循环结构。我没有浪费代码。相比之下，while 循环要求我们显式地跟踪循环，直到某个条件发生。换句话说，我需要跟踪一个特定的条件并在每次迭代中改变一个变量。这分散了循环提供的价值，并带来了不必要的认知负担。\n\
    \n## 最小惊讶原则\n\n偏离意图是不好的，但有一类沟通甚至更糟：当代码主动让你未来的协作者感到惊讶。你甚至应该遵守*最小惊讶原则*；当有人阅读代码库时，他们几乎不应该对行为或实现感到惊讶（当他们感到惊讶时，代码附近应该有一个很好的注释来解释为什么是这样）。这就是为什么传达意图至关重要。清晰、整洁的代码降低了误解的可能性。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_36_0.png)\n\n*最小惊讶原则*，也称为*最小惊奇原则*，指出程序应该始终以最不令用户惊讶的方式响应。³\
    \ 惊讶的行为会导致困惑。困惑会导致错误的假设。错误的假设会导致 bug。这就是你如何得到不可靠的软件。\n\n请记住，你可以编写完全正确的代码，但仍然会让未来的某人感到惊讶。在我职业生涯早期，我曾追踪过一个因内存损坏而崩溃的讨厌\
    \ bug。将代码放在调试器下或添加太多 print 语句会影响时序，导致 bug 不会显现（一个真正的“海森堡 bug”）。⁴ 与这个 bug 相关的代码实际上有数千行。\n\
    \n所以我不得不进行手动二分，将代码分成两半，通过移除另一半来看哪一半实际上有崩溃，然后在那一半代码中重复这个过程。经过两周的抓狂，我终于决定检查一个听起来无害的函数\
    \ `getEvent`。结果发现这个函数实际上是在用无效数据*设置*事件。不用说，我非常惊讶。这个函数在它所做的事情上是完全正确的，但由于我错过了代码的意图，我至少忽略了这个\
    \ bug 三天。让你的协作者感到惊讶会浪费他们的时间。\n\n很多这种惊讶最终源于复杂性。复杂性有两种类型：*必要复杂性*和*偶然复杂性*。必要复杂性是你的领域固有的复杂性。深度学习模型必然是复杂的；它们不是你浏览一下内部工作原理就能在几分钟内理解的东西。优化对象关系映射（ORM）必然是复杂的；必须考虑大量可能的用户输入。你无法消除必要复杂性，所以你最好的选择是尝试将其控制住，\n\
    \n³ Geoffrey James. *The Tao of Programming*. https://oreil.ly/NcKNK.\n⁴ 一个在被观察时表现出不同行为的\
    \ bug。SIGSOFT ’83: *Proceedings of the ACM SIGSOFT/SIGPLAN software engineering\
    \ symposium on High-level debugging*."
