    \ check (or something similar) instead.\n\n- This code asserts that the dough\
    \ radius is between 6 and 12 inches (inclusive). If this is not the case, an `AssertionError`\
    \ is thrown (preventing construction of the class).\n- This code asserts that\
    \ there is at most one sauce, throwing an `AssertionError` if that does not hold\
    \ true.\n- This code ensures that the sauce is at the beginning of our toppings\
    \ list (presumably this will be used to tell the pizza maker in what order to\
    \ lay toppings down).\n- Note that I don't explicitly do anything to preserve\
    \ that toppings can be above or below cheese. This is because the default behavior\
    \ of the implementation satisfies the invariant. However, you may still choose\
    \ to communicate the invariant to your callers through documentation.\n\n## Assertions\
    \ Versus Exceptions\n\nThroughout this book, I will use assertions in some cases,\
    \ and raise exceptions in other cases. When an assertion fails, it raises an `AssertionError`,\
    \ which is a type of exception. This may make assertions and exceptions seem interchangeable,\
    \ but I am actually picking one or the other intentionally.\n\nAssertions are\
    \ not guaranteed to execute at runtime, as your code may be deployed with options\
    \ that disable assertions. In this case, I use them for things that I always expect\
    \ to be true, unless a developer in the system messes up. It is intended to catch\
    \ mistakes during development, and it signals to other developers that it is up\
    \ to them to not create a situation that fails an assertion.\n\nExceptions, on\
    \ the other hand, indicate to a developer that something may be possible due to\
    \ user error or malicious actors. It is unlikely to happen, but other developers\
    \ must be prepared to catch the exception if something goes wrong.\n\nIf the error\
    \ is not an exceptional use case, I may choose to return an `Optional` or `Union`\
    \ instead (see Chapter 4 for more information). Note that this only applies if\
    \ the function returns a value. The constructors in this chapter do not return\
    \ any values, so using an `Optional` or `Union` is inappropriate. In these cases,\
    \ make it crystal clear to future developers that an exception (or assertion)\
    \ can be thrown, because the type-checker will not be much help.\n\n# Avoiding\
    \ Broken Invariants\n\nIt is incredibly important that you never, ever construct\
    \ this class if the invariants would be broken. You have two avenues that you\
    \ can choose if the caller ever constructs an object in a way such that invariants\
    \ would be broken.\n\nThrow an exception\nThis prevents the object from being\
    \ constructed. This is what I did when making sure the dough radius was appropriate\
    \ and that I had at most one sauce.\n\nMassage the data\nMake the data conform\
    \ to the invariant. I could have thrown an exception when I didn't get toppings\
    \ in the right order, but instead, I rearranged them to satisfy the invariant.\n\
    \n> What If You Don't Want Exceptions?\nIf you don't want to use exceptions, you\
    \ can use a function to create your class instead (also known as a factory method).\
    \ You can hide your class from help() by preceding the class with an underscore\
    \ (_), and then create a function in your module that checks invariants and instantiates\
    \ the class. If the invariants are not satisfiable, you can return None. Make\
    \ sure you are using Optional types (as covered in Chapter 4) to represent None.\n\
    \n# Note to maintainers, only create this through create_pizza_spec function\n\
    class _PizzaSpecification:\n    # ... snip class\n\ndef create_pizza_spec(dough_radius_in_inches:\
    \ int,\n                      toppings: list[str]) -> Optional[_PizzaSpecification]:\n\
    \    try:\n        return _PizzaSpecification()\n    except:\n        return None\n\
    \nIf you really want to, you can move your invariant checking to the function\
    \ itself, but at that point, you are dealing with an invariant-less type and you\
    \ should be using a data class. If you are more accustomed to functional programming\
    \ paradigms, and will be keeping most of your classes immutable, then this is\
    \ less of an issue.\n\n# Why Are Invariants Beneficial?\n\nIt is a lot of work\
    \ to write a class and come up with invariants. But I want you to consciously\
    \ think about invariants every time you group some data together. Ask yourself:\n\
    \n- Should any of this data be restricted in any form that I can't catch through\
    \ the type system (such as the order of toppings)?\n- Are some fields interdependent\
    \ (i.e., changing one field may necessitate a change in another field)?\n- Are\
    \ there guarantees I want to provide about the data?\n\nIf you answer yes to any\
    \ of these questions, you have invariants you want to preserve and should write\
    \ a class. When you choose to write a class and define a set of invariants, you're\
    \ doing a few things:\n\n1. You're adhering to the Don't Repeat Yourself (DRY)\
    \ principle.¹ Instead of littering your code with checks before object construction,\
    \ you put those checks in one place.\n2. You're putting more work on the writer\
    \ to ease the work of the reader/maintainer/caller. Your code will most likely\
    \ live longer than you work on it. By providing an invariant (and communicating\
    \ it well—see the next section), you lessen the burden of those who come after\
    \ you.\n3. You're more effectively able to reason about code. There's a reason\
    \ why languages like Ada and concepts like formal proofs are used in mission-critical\
    \ environments. They provide developers with comfort; other coders can trust your\
    \ code to a certain degree.\n\nAll of this leads to fewer bugs. You're not running\
    \ the risk of people misconstruing objects or missing a required check. You're\
    \ making an easier API for people to think about, and you reduce the risk of people\
    \ using your objects incorrectly. You will also adhere closer to the Law of Least\
    \ Surprise. You never want someone to be surprised when using your code (how many\
    \ times have you heard the phrase, \"Wait, *that's* how the class works?\"). By\
    \ defining invariants and sticking to them, there is less chance for someone to\
    \ be surprised.\n\nA dictionary simply cannot do that.\n\nConsider a pizza specification\
    \ represented by a dictionary:\n\n```\n{\n    \"dough_radius_in_inches\": 7,\n\
    \    \"toppings\": [\"tomato sauce\", \"mozzarella\", \"pepperoni\"]\n}\n```\n\
    \n> ¹ Andrew Hunt and David Thomas. *The Pragmatic Programmer: From Journeyman\
    \ to Master*. Reading, MA: Addison-Wesley, 2000.\n\nThere is no simple way for\
    \ you to force a user to construct this dictionary correctly. You would have to\
    \ rely on callers doing the right thing in every invocation (which will only become\
    \ more difficult as the codebase grows). There is also no way to prevent users\
    \ from modifying the dictionary freely and breaking invariants.\n\n![](img/d64d2be45ca85b398807d181202e7046_161_0.png)\n\
    \nIt's true, you could define methods that construct dictionaries after checking\
    \ invariants, and only mutate the dictionary through functions that also check\
    \ invariants. Or, you could certainly write a constructor and invariant-checking\
    \ methods on data classes. But if you go through all that trouble, why not write\
    \ a class? Be mindful of what your choices communicate to future maintainers.\
    \ You must be deliberate between your choice of dictionaries, data classes and\
    \ classes. Each of these abstractions conveys a very specific meaning, and if\
    \ you choose the wrong one, you'll confuse maintainers.\n\nThere's another benefit\
    \ that I haven't talked about, and it relates to the “S” in SOLID (see the next\
    \ sidebar): the Single Responsibility Principle. The Single Responsibility Principle\
    \ states that each object “should have one and only one reason to change.”² It\
    \ sounds simple, but in practice it can be a struggle to know exactly how granular\
    \ *one* reason to change is. My suggestion to you is to define a set of related\
    \ invariants (such as your dough and toppings) and write a class per set of related\
    \ invariants. If you ever find yourself writing attributes or methods that do\
    \ not directly relate to one of those invariants, your class has low *cohesion*,\
    \ which means it has too many responsibilities.\n\n### SOLID Design Principles\n\
    \nThe SOLID design principles were first described by Robert C. Martin in his\
    \ 2000 paper, “Design Principles and Design Patterns”. They are five design principles\
    \ that I have found very useful when developing in larger codebases. The SOLID\
    \ design principles are as follows:\n\n*Single Responsibility Principle*\nA principle\
    \ for reuse and consolidation of code\n\n*Open-Closed Principle*\nA principle\
    \ for extensibility\n\n*Liskov Substitution Principle*\nA principle for subtyping\n\
    \n² Robert C. Martin. “The Single Responsibility Principle.” *The Clean Code Blog*\
    \ (blog), May 8, 2014. [https://oreil.ly/ZOMxb](https://oreil.ly/ZOMxb)."
  mdcn: "错误的类型。如果你没有使用类型检查器，你就必须进行`isinstance()`检查（或类似的操作）来替代。\n\n- 这段代码断言面团半径在6到12英寸之间（包含两端）。如果情况并非如此，就会抛出一个`AssertionError`（阻止类的构造）。\n\
    - 这段代码断言最多只有一种酱料，如果该条件不成立，则抛出`AssertionError`。\n- 这段代码确保酱料位于配料列表的开头（大概是为了告诉披萨制作人按什么顺序放置配料）。\n\
    - 注意，我没有明确做任何事情来保留配料可以在奶酪之上或之下的顺序。这是因为实现的默认行为满足了不变式。但是，你仍然可以选择通过文档向调用者传达这个不变式。\n\
    \n## 断言与异常\n\n在本书中，我将在某些情况下使用断言，在其他情况下引发异常。当断言失败时，它会引发一个`AssertionError`，这是一种异常。这可能使断言和异常看起来可以互换，但我实际上是故意选择其中之一。\n\
    \n断言在运行时不保证会执行，因为你的代码可能以禁用断言的选项部署。在这种情况下，我将它们用于我始终期望为真的事情，除非系统中的开发人员搞砸了。它旨在在开发过程中捕获错误，并向其他开发人员发出信号，表明他们有责任不制造导致断言失败的情况。\n\
    \n另一方面，异常向开发人员表明，由于用户错误或恶意行为者，某些情况是可能发生的。这种情况不太可能发生，但其他开发人员必须准备好在出现问题时捕获异常。\n\n\
    如果错误不是异常用例，我可能会选择返回一个`Optional`或`Union`（有关更多信息，请参见第4章）。请注意，这仅适用于函数返回值的情况。本章中的构造函数不返回任何值，因此使用`Optional`或`Union`是不合适的。在这些情况下，要向未来的开发人员明确说明可以抛出异常（或断言），因为类型检查器不会有太大帮助。\n\
    \n# 避免破坏不变式\n\n至关重要的是，你永远、永远不要在不变式会被破坏的情况下构造这个类。如果调用者以某种方式构造对象导致不变式被破坏，你有两个途径可以选择。\n\
    \n抛出异常\n这可以防止对象被构造。这就是我在确保面团半径合适且最多只有一种酱料时所做的。\n\n调整数据\n使数据符合不变式。当配料顺序不正确时，我本可以抛出异常，但我重新排列了它们以满足不变式。\n\
    \n> 如果你不想使用异常怎么办？\n如果你不想使用异常，你可以使用一个函数来创建你的类（也称为工厂方法）。你可以通过在类名前加一个下划线（_）来对help()隐藏你的类，然后在模块中创建一个函数来检查不变式并实例化类。如果不变式无法满足，你可以返回None。确保你使用Optional类型（如第4章所述）来表示None。\n\
    \n# 注意，维护者，请仅通过create_pizza_spec函数创建此类\nclass _PizzaSpecification:\n    # ...\
    \ 省略类内容\n\ndef create_pizza_spec(dough_radius_in_inches: int,\n              \
    \        toppings: list[str]) -> Optional[_PizzaSpecification]:\n    try:\n  \
    \      return _PizzaSpecification()\n    except:\n        return None\n\n如果你真的想这样做，你可以将不变式检查移到函数本身，但那样的话，你处理的是一个没有不变式的类型，你应该使用数据类。如果你更习惯函数式编程范式，并且会保持大多数类不可变，那么这就不那么重要了。\n\
    \n# 为什么不变式有益？\n\n编写一个类并想出不变式需要大量的工作。但我希望你每次将一些数据组合在一起时，都能有意识地思考不变式。问问自己：\n\n-\
    \ 这些数据中是否有任何数据受到我无法通过类型系统捕获的任何形式的限制（例如配料的顺序）？\n- 某些字段是否相互依赖（即，更改一个字段可能需要更改另一个字段）？\n\
    - 我是否想对数据提供某些保证？\n\n如果你对其中任何一个问题的回答是肯定的，那么你就有想要保留的不变式，应该编写一个类。当你选择编写一个类并定义一组不变式时，你正在做几件事：\n\
    \n1. 你正在遵循不要重复自己（DRY）原则。¹ 你不是在对象构造之前在代码中散布检查，而是将这些检查放在一个地方。\n2. 你正在给作者增加更多工作，以减轻读者/维护者/调用者的工作。你的代码很可能比你参与它的时间更长。通过提供不变式（并很好地传达它——见下一节），你减轻了后来者的负担。\n\
    3. 你能够更有效地推理代码。像Ada这样的语言和形式证明这样的概念在关键任务环境中使用是有原因的。它们给开发者带来信心；其他编码者可以在一定程度上信任你的代码。\n\
    \n所有这些都会导致更少的bug。你不会冒着人们误解对象或错过必要检查的风险。你正在为人们创建一个更容易思考的API，并降低了人们错误使用你的对象的风险。你也将更接近地遵守最小惊讶原则。你永远不希望有人在使用你的代码时感到惊讶（你有多少次听到过“等等，*那个*就是这个类的工作方式？”这句话）。通过定义不变式并坚持它们，有人感到惊讶的可能性就更小了。\n\
    \n字典根本做不到这一点。\n\n考虑一个用字典表示的披萨规格：\n\n```\n{\n    \"dough_radius_in_inches\": 7,\n\
    \    \"toppings\": [\"tomato sauce\", \"mozzarella\", \"pepperoni\"]\n}\n```\n\
    \n> ¹ Andrew Hunt and David Thomas. *The Pragmatic Programmer: From Journeyman\
    \ to Master*. Reading, MA: Addison-Wesley, 2000.\n\n你没有办法简单地强制用户正确构造这个字典。你必须依赖调用者在每次调用时都做正确的事情（随着代码库的增长，这只会变得更加困难）。也没有办法防止用户随意修改字典并破坏不变式。\n\
    \n![](img/d64d2be45ca85b398807d181202e7046_161_0.png)\n\n确实，你可以定义在检查不变式后构造字典的方法，并且只通过也检查不变式的函数来修改字典。或者，你当然可以在数据类上编写构造函数和不变式检查方法。但如果你费了这么大劲，为什么不直接写一个类呢？注意你的选择向未来的维护者传达了什么。你必须在字典、数据类和类之间做出深思熟虑的选择。每种抽象都传达了非常特定的含义，如果你选择了错误的，你会让维护者感到困惑。\n\
    \n还有一个我还没有谈到的好处，它与SOLID中的“S”有关（见下一个侧边栏）：单一职责原则。单一职责原则指出，每个对象“应该只有一个且仅有一个改变的理由”。²\
    \ 这听起来很简单，但在实践中，确切地知道*一个*改变的理由有多细粒度可能很困难。我对你的建议是定义一组相关的不变式（例如你的面团和配料），并为每组相关的不变式编写一个类。如果你发现自己编写了与这些不变式之一没有直接关系的属性或方法，那么你的类就具有低*内聚性*，这意味着它承担了太多职责。\n\
    \n### SOLID设计原则\n\nSOLID设计原则由Robert C. Martin在其2000年的论文“设计原则和设计模式”中首次描述。它们是五个设计原则，我在开发大型代码库时发现非常有用。SOLID设计原则如下：\n\
    \n*单一职责原则*\n用于代码重用和整合的原则\n\n*开闭原则*\n用于可扩展性的原则\n\n*里氏替换原则*\n用于子类型化的原则\n\n² Robert\
    \ C. Martin. “The Single Responsibility Principle.” *The Clean Code Blog* (blog),\
    \ May 8, 2014. [https://oreil.ly/ZOMxb](https://oreil.ly/ZOMxb)."
