- md: "## Annotated Types\n\nWhat if I wanted to get even deeper and specify more\
    \ complex constraints? It would be tedious to write hundreds of literals, and\
    \ some constraints aren't able to be modeled by Literal types. There's no way\
    \ with a Literal to constrain a string to a certain size or to match a specific\
    \ regular expression. This is where Annotated comes in. With Annotated, you can\
    \ specify arbitrary metadata alongside your type annotation.\n\n```python\nx:\
    \ Annotated[int, ValueRange(3,5)]\ny: Annotated[str, MatchesRegex('[0-9]{4}')]\n\
    ```\n\nUnfortunately, the above code will not run, as ValueRange and MatchesRegex\
    \ are not built-in types; they are arbitrary expressions. You will need to write\
    \ your own metadata as part of an Annotated variable. Secondly, there are no tools\
    \ that will typecheck this for you. The best you can do until such a tool exists\
    \ is write dummy annotations or use strings to describe your constraints. At this\
    \ point, Annotated is best served as a communication method.\n\n## NewType\n\n\
    While waiting for tooling to support Annotated, there is another way to represent\
    \ more complicated constraints: NewType. NewType allows you to, well, create a\
    \ new type.\n\nSuppose I want to separate my hot dog stand code to handle two\
    \ separate cases: a hot dog in its unservable form (no plate, no napkins) and\
    \ a hot dog that is ready to serve (plated, with napkins). In my code, there exist\
    \ some functions that should only be operating on the hot dog in one case or the\
    \ other. For example, an unservable hot dog should never be dispensed to the customer.\n\
    \n```python\nclass HotDog:\n    # ... snip hot dog class implementation ...\n\n\
    def dispense_to_customer(hot_dog: HotDog):\n    # note, this should only accept\
    \ ready-to-serve hot dogs.\n    # ...\n```\n\nHowever, nothing prevents someone\
    \ from passing in an unservable hot dog. If a developer makes a mistake and passes\
    \ an unservable hot dog to this function, customers will be quite surprised to\
    \ see just their order with no plate or napkins come out of the machine.\n\nRather\
    \ than relying on developers to catch these errors whenever they happen, you need\
    \ a way for your typechecker to catch this. To do that, you can use NewType:\n\
    \n```python\nfrom typing import NewType\n\nclass HotDog:\n    '''Used to represent\
    \ an unservable hot dog'''\n    # ... snip hot dog class implementation ...\n\n\
    ReadyToServeHotDog = NewType(\"ReadyToServeHotDog\", HotDog)\n\ndef dispense_to_customer(hot_dog:\
    \ ReadyToServeHotDog):\n    # ...\n```\n\nA NewType takes an existing type and\
    \ creates a brand new type that has all the same fields and methods as the existing\
    \ type. In this case, I am creating a type ReadyToServeHotDog that is distinct\
    \ from HotDog; they are not interchangeable. What's beautiful about this is that\
    \ this type restricts implicit type conversions. You cannot use a HotDog anywhere\
    \ you are expecting a ReadyToServeHotDog (you can use a ReadyToServeHotDog in\
    \ place of HotDog, though). In the previous example, I am restricting dispense_to_customer\
    \ to only take ReadyToServeHotDog values as an argument. This prevents developers\
    \ from invalidating assumptions. If a developer were to pass a HotDog to this\
    \ method, the typechecker will yell at them:\n\n```\ncode_examples/chapter4/invalid/newtype.py:10:\
    \ error:\n    Argument 1 to \"dispense_to_customer\"\n    has incompatible type\
    \ \"HotDog\";\n    expected \"ReadyToServeHotDog\"\n```\n\nIt is important to\
    \ stress the one-way nature of this type conversion. As a developer, you can control\
    \ when your old type becomes your new type.\n\nFor example, I'll create a function\
    \ that takes an unservable HotDog and makes it ready to serve:\n\n```python\n\
    def prepare_for_serving(hot_dog: HotDog) -> ReadyToServeHotDog:\n    assert not\
    \ hot_dog.is_plated(), \"Hot dog should not already be plated\"\n    hot_dog.put_on_plate()\n\
    \    hot_dog.add_napkins()\n    return ReadyToServeHotDog(hot_dog)\n```\n\nNotice\
    \ how I'm explicitly returning a ReadyToServeHotDog instead of a normal HotDog.\
    \ This acts as a \"blessed\" function; it is the only sanctioned way that I want\
    \ developers to create a ReadyToServeHotDog. Any user trying to use a method that\
    \ takes a ReadyToServeHotDog needs to create it using prepare_for_serving first.\n\
    \nIt is important to notify users that the only way to create your new type is\
    \ through a set of \"blessed\" functions. You don't want users creating your new\
    \ type in any circumstance other than a predetermined method, as that defeats\
    \ the purpose.\n\n```python\ndef make_snack():\n    serve_to_customer(ReadyToServeHotDog(HotDog()))\n\
    ```\n\nUnfortunately, Python has no great way of telling users this, other than\
    \ a comment.\n\n```python\nfrom typing import NewType\n# NOTE: Only create ReadyToServeHotDog\
    \ using prepare_for_serving method.\nReadyToServeHotDog = NewType(\"ReadyToServeHotDog\"\
    , HotDog)\n```\n\nStill, NewType is applicable to many real-world scenarios. For\
    \ example, these are all scenarios that I've run into that a NewType would solve:\n\
    \n- Separating a str from a SanitizedString, to catch bugs like SQL injection\
    \ vulnerabilities. By making SanitizedString a NewType, I made sure that only\
    \ properly sanitized strings were operated upon, eliminating the chance of SQL\
    \ injection.\n- Tracking a User object and LoggedInUser separately. By restricting\
    \ Users with NewType from LoggedInUser, I wrote functions that were only applicable\
    \ to users that were logged in.\n- Tracking an integer that should represent a\
    \ valid User ID. By restricting the User ID to a NewType, I could make sure that\
    \ some functions were only operating on IDs that were valid, without having to\
    \ check if statements.\n\nIn Chapter 10, you'll see how you can use classes and\
    \ invariants to do something very similar, with a much stronger guarantee of avoiding\
    \ illegal states. However, NewType is still a useful pattern to be aware of, and\
    \ is much more lightweight than a full-blown class.\n\n### Type Aliases\n\nNewType\
    \ is not the same as a type alias. A type alias just provides another name for\
    \ a type and is completely interchangeable with the old type.\n\nFor example:\n\
    \n```python\nIdOrName = Union[str, int]\n```\n\nIf a function expects IdOrName,\
    \ it can take either an IdOrName or a Union[str, int] and it will typecheck just\
    \ fine, where a NewType will only work if an IdOrName is passed in.\n\nI have\
    \ found type aliases to be very helpful when I start nesting complex types, such\
    \ as Union[dict[int, User], list[dict[str, User]]]. It's much easier to give it\
    \ a conceptual name, such as IdOrNameLookup, to simplify types.\n\n## Final Types\n\
    \nFinally (pun intended), you may want to restrict a type from changing its value.\
    \ That's where Final comes in. Final, introduced in Python 3.8, indicates to a\
    \ typechecker that a variable cannot be bound to another value. For instance,\
    \ I want to start franchising out my hot dog stand, but I don't want the name\
    \ to be changed by accident.\n\n```python\nVENDOR_NAME: Final = \"Viafore's Auto-Dog\"\
    \n```\n\nIf a developer accidentally changed the name later on, they would see\
    \ an error.\n\n```python\ndef display_vendor_information():\n    vendor_info =\
    \ \"Auto-Dog v1.0\"\n    # whoops, copy-paste error, this code should be vendor_info\
    \ += VENDOR_NAME\n    VENDOR_NAME += VENDOR_NAME\n    print(vendor_info)\n```\n\
    \n```\ncode_examples/chapter4/invalid/final.py:3: error:\n    Cannot assign to\
    \ final name \"VENDOR_NAME\"\nFound 1 error in 1 file (checked 1 source file)\n\
    ```"
  mdcn: "## 注解类型\n\n如果我想更进一步，指定更复杂的约束条件呢？编写数百个字面量会很繁琐，而且有些约束无法通过字面量类型来建模。字面量无法将字符串限制为特定长度或匹配特定正则表达式。这时就需要用到`Annotated`。通过`Annotated`，你可以在类型注解旁指定任意元数据。\n\
    \n```python\nx: Annotated[int, ValueRange(3,5)]\ny: Annotated[str, MatchesRegex('[0-9]{4}')]\n\
    ```\n\n遗憾的是，上述代码无法运行，因为`ValueRange`和`MatchesRegex`不是内置类型；它们是任意表达式。你需要自己编写元数据作为`Annotated`变量的一部分。其次，目前没有工具能为你进行类型检查。在工具出现之前，你最多只能编写伪注解或用字符串描述约束。此时，`Annotated`最好作为沟通工具使用。\n\
    \n## NewType\n\n在等待工具支持`Annotated`的同时，还有另一种方式来表示更复杂的约束：`NewType`。`NewType`允许你创建一个新类型。\n\
    \n假设我想将热狗摊的代码分为两种情况处理：未准备好供应的热狗（没有盘子、没有餐巾纸）和准备好供应的热狗（装盘、配有餐巾纸）。在我的代码中，有些函数应该只处理其中一种情况的热狗。例如，未准备好供应的热狗绝不应交给顾客。\n\
    \n```python\nclass HotDog:\n    # ... 省略热狗类实现 ...\n\ndef dispense_to_customer(hot_dog:\
    \ HotDog):\n    # 注意，此函数应只接受准备好供应的热狗。\n    # ...\n```\n\n然而，没有任何机制阻止有人传入未准备好供应的热狗。如果开发者犯错，将未准备好供应的热狗传给此函数，顾客会惊讶地发现机器只吐出了他们的订单，没有盘子或餐巾纸。\n\
    \n与其依赖开发者在错误发生时捕捉它们，你需要让类型检查器来捕捉。为此，你可以使用`NewType`：\n\n```python\nfrom typing\
    \ import NewType\n\nclass HotDog:\n    '''用于表示未准备好供应的热狗'''\n    # ... 省略热狗类实现\
    \ ...\n\nReadyToServeHotDog = NewType(\"ReadyToServeHotDog\", HotDog)\n\ndef dispense_to_customer(hot_dog:\
    \ ReadyToServeHotDog):\n    # ...\n```\n\n`NewType`接受一个现有类型，并创建一个全新的类型，该类型具有与现有类型相同的所有字段和方法。在这个例子中，我创建了一个与`HotDog`不同的`ReadyToServeHotDog`类型；它们不可互换。其美妙之处在于，此类型限制了隐式类型转换。你不能在任何期望`ReadyToServeHotDog`的地方使用`HotDog`（但可以在期望`HotDog`的地方使用`ReadyToServeHotDog`）。在前面的例子中，我将`dispense_to_customer`限制为只接受`ReadyToServeHotDog`值作为参数。这防止了开发者破坏假设。如果开发者将`HotDog`传给此方法，类型检查器会报错：\n\
    \n```\ncode_examples/chapter4/invalid/newtype.py:10: error:\n    Argument 1 to\
    \ \"dispense_to_customer\"\n    has incompatible type \"HotDog\";\n    expected\
    \ \"ReadyToServeHotDog\"\n```\n\n必须强调这种类型转换的单向性。作为开发者，你可以控制旧类型何时变为新类型。\n\n例如，我将创建一个函数，接受未准备好供应的`HotDog`并使其准备好供应：\n\
    \n```python\ndef prepare_for_serving(hot_dog: HotDog) -> ReadyToServeHotDog:\n\
    \    assert not hot_dog.is_plated(), \"热狗不应已装盘\"\n    hot_dog.put_on_plate()\n\
    \    hot_dog.add_napkins()\n    return ReadyToServeHotDog(hot_dog)\n```\n\n注意我如何显式返回`ReadyToServeHotDog`而不是普通的`HotDog`。这充当了一个“受认可”的函数；这是我希望开发者创建`ReadyToServeHotDog`的唯一授权方式。任何尝试使用接受`ReadyToServeHotDog`的方法的用户都需要先使用`prepare_for_serving`来创建它。\n\
    \n重要的是要通知用户，创建新类型的唯一方式是通过一组“受认可”的函数。你不希望用户在预定方法之外的任何情况下创建你的新类型，因为这违背了初衷。\n\n```python\n\
    def make_snack():\n    serve_to_customer(ReadyToServeHotDog(HotDog()))\n```\n\n\
    遗憾的是，Python 除了注释外，没有很好的方式来告知用户这一点。\n\n```python\nfrom typing import NewType\n\
    # 注意：仅使用 prepare_for_serving 方法创建 ReadyToServeHotDog。\nReadyToServeHotDog = NewType(\"\
    ReadyToServeHotDog\", HotDog)\n```\n\n尽管如此，`NewType`适用于许多现实场景。例如，以下是我遇到过的`NewType`可以解决的所有场景：\n\
    \n- 将`str`与`SanitizedString`分开，以捕获SQL注入漏洞等错误。通过将`SanitizedString`设为`NewType`，我确保只有经过适当清理的字符串才会被操作，消除了SQL注入的可能性。\n\
