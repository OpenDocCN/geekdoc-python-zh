    )\n```\n\n# Mypy Reporting\n\nIf a typechecker fails in the forest and nobody\
    \ is around to see it, does it print an error message? How do you know that mypy\
    \ is actually checking your files, and that it will actually catch errors? Use\
    \ mypy's built-in reporting techniques to better visualize results.\n\nFirst,\
    \ you can get an HTML report about how many lines of code mypy was able to check\
    \ by passing in --html-report to mypy. This produces a HTML file that will provide\
