    \nIt's also important to know when not to use inheritance. One of the biggest\
    \ mistakes I've seen is using inheritance solely for the purpose of code reuse.\
    \ Don't get me wrong, inheritance is a great way to reuse code, but the primary\
    \ reason for inheritance is modeling a relationship where subtypes are used in\
    \ place of the supertype. If you never interact with the subtype in the code that\
    \ assumes the supertype, you aren't modeling an *is-a* relationship.\n\nIn such\
    \ cases, you want to use composition, also known as a *has-a* relationship. *Composition*\
    \ is when you put member variables inside a type. I have primarily used composition\
    \ to group types together. For instance, the restaurant from earlier:\n\n```python\n\
    class Restaurant:\n    def __init__(self,\n               name: str,\n       \
    \        location: geo.Coordinates,\n               employees: list[ops.Employee],\n\
    \               inventory: list[ops.Ingredient],\n               menu: ops.Menu,\n\
    \               finances: ops.Finances):\n        self.name = name\n        self.location\
    \ = location\n        self.employees = employees\n        # ... etc etc snip snip\
    \ ...\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_202_0.png)\n\n**Discussion\
    \ Topic**\nWhere in your codebase have you overused inheritance? Are you using\
    \ it anywhere as a conduit for reuse only? Discuss how to transform this to use\
    \ composition instead.\n\nEach of the member fields set in the constructor is\
    \ an example of composition. It doesn't make sense for a Restaurant to be substitutable\
    \ for a Menu (*is-a* relationship), but it does make sense for a restaurant to\
    \ be composed of a menu (*has-a* relationship), among other things. You should\
    \ prefer composition to inheritance anytime you need to reuse code but aren't\
    \ going to substitute types for one another.\n\nComposition is preferable to inheritance\
    \ as a reuse mechanism because it is a weaker form of coupling, which is another\
    \ term for dependencies between entities. All other things being equal, you want\
    \ weaker forms of coupling, as it makes it easier to reorganize classes and refactor\
    \ functionality. If classes have high coupling between them, changes in one more\
    \ directly affect the behavior of the other.\n\n![](img/d64d2be45ca85b398807d181202e7046_203_0.png)\n\
    \nMixins are the exception to preferring composition over inheritance, as they\
    \ are classes explicitly meant to be inherited to provide additions to a type's\
    \ interface.\n\nWith inheritance, a derived class is beholden to the base class's\
    \ changes. A developer must be cognizant of not only the public interface changing,\
    \ but also changes to invariants and protected members. By contrast, when another\
    \ class has an instance of your class, that class is only affected by a subset\
    \ of changes: those impacting the public methods and invariants it depends on.\
    \ By limiting the impact of changes, you lessen the chance of broken assumptions,\
    \ decreasing fragility. To write robust code, use inheritance judiciously.\n\n\
    ## Subtyping Outside Inheritance\n\nMost of this chapter has focused exclusively\
    \ on class-based subtyping, or inheritance. However, the notion of subtyping is\
    \ much broader, mathematically speaking. Back in Chapter 2, I described how types\
    \ are really just a communication method around behaviors. You can apply this\
    \ notion to subtypes as well: a subtype is a set of behaviors that can be completely\
    \ used in place of some other supertype's behaviors.\n\nIn fact, duck typing is\
    \ a subtype/supertype relationship as well:\n\n```python\ndef double_value(x):\n\
    \    return x + x\n\n>>> double_value(3)\n6\n>>> double_value(\"abc\")\nabcabc\n\
    ```\n\nIn this case, the supertype is the parameter. It supports the addition\
    \ method, which must return the same type as its addends. Note that a supertype\
    \ does not necessarily have to be a named type in Python; it is all about the\
    \ expected behaviors.\n\n> The guidelines earlier in this chapter around designing\
    \ your supertypes and subtypes are not exclusive to inheritance. Duck typing is\
    \ a form of subtyping; all the same guidelines apply. Also, as a consumer, make\
    \ sure that you are not passing in arguments that are not substitutable for the\
    \ supertype. Otherwise, you are making it much harder for your other developers;\
    \ duck typing obscures the supertype/subtype relationship just like inheritance\
    \ does. Stick to the guidelines in this chapter to avoid headaches.\n\n## Closing\
    \ Thoughts\n\nSubtyped relationships are a very powerful concept in programming.\
    \ You can use them to extend existing functionality without modifying it. However,\
    \ inheritance is often overused, or used improperly. Subtypes should only be used\
    \ if they are directly substitutable for their supertype. If this isn't the case,\
    \ reach for composition instead.\n\nSpecial care should be taken when introducing\
    \ supertypes or subtypes. It may not be easy for developers to know of all the\
    \ subtypes associated with a single supertype; some subtypes may even live in\
    \ other codebases. Supertypes and subtypes are very closely coupled, so be cautious\
    \ whenever you make changes. With the proper diligence, you can reap all the benefits\
    \ of subtyping without introducing a slew of headaches.\n\nIn the next chapter,\
    \ I'm going to focus on a specific application of subtyping known as protocols.\
    \ These are the missing link between the typechecker and duck typing. Protocols\
    \ bridge the gap in an important way: they help your typechecker catch some of\
    \ the errors introduced in a supertype/subtype relationship. Any time you catch\
    \ more errors, especially through a typechecker, you are contributing to the robustness\
    \ of your codebase.\n\n# CHAPTER 13\n## Protocols\n\nI have a confession to make.\
