    # Drawbacks


    Because the producer and consumer depend on a transport mechanism, they have to
    agree on the message format. In most event-driven architectures, both the producer
    and consumer agree on a common identifier and message format. This does create
    a *logical* dependency between the two but not a physical one. If either party
    changes the identifier or message format in an incompatible way, the scheme breaks
    down. And like most logical dependencies, it is difficult to link the dependencies
    together through inspection. Consult [Chapter 16](#) to learn more about how to
    mitigate these problems.


    Because of this separation of code, your typechecker will not be much help when
    things go wrong. If a consumer starts depending on the wrong event type, the type-checker
    will not flag it. Be extra careful when changing the type of a producer or consumer,
    because you will have to update all the other producers–consumers to match.


    Event-driven architectures can make debugging harder. When stepping through code
    in a debugger, you will get to the code that produces an event, but when you step
    into the transport mechanism, you often are stepping into third-party code. In
    the worst case, the code that actually transports your events may be running in
    a different process, or even on a different machine. You may need multiple debuggers
    active (one per process or system) to properly debug event-driven architectures.


    Finally, error handling becomes a little more difficult when using event-driven
    architectures. Most producers are decoupled from their consumers; when a consumer
    throws an exception or returns an error, it’s not always easy to handle it from
    the producer side.


    As a thought experiment, consider what would happen if a producer produced an
    event and five consumers consumed it. If the third consumer that was notified
    threw an exception, what should happen? Should the other consumers get the exception,
    or should the execution stop in its tracks? Should the producer know about any
    error conditions, or should the errors get swallowed up? If the producer receives
    an exception, what happens if different consumers produce different exceptions?
    There is no one right answer to all of these questions; consult the tools you’re
    using for event-driven architectures to better understand what happens in these
    cases.


    Despite these drawbacks, event-driven architectures are worthwhile in situations
    where you need to give your system much-needed flexibility. Future maintainers
    can replace your producers or consumers with minimal impact. They can bring in
    new producers and consumers to create new functionality. They can quickly integrate
    with external systems, opening the door for new partnerships. And best of all,
    they are working with small, modular systems that are easy to test in isolation
    and easy to understand.'
- md: "## Simple Events\n\nThe simplest case for event-oriented architectures is dealing\
    \ with *simple events* such as acting or alerting you when certain conditions\
    \ change. Your producer of information is the one sending the event, and your\
    \ consumer receives and acts upon the event. There are two typical ways of implementing\
    \ this: with or without a message broker.\n\n## Using a Message Broker\n\nA message\
    \ broker is a specific piece of code that acts as a transport of data. Producers\
    \ will publish data, known as a message, to a specific *topic* on the message\
    \ broker. The topic is simply a unique identifier, such as a string. It could\
    \ be something simple, like “orders,” or complex, like “sandwich order is finished.”\
    \ It’s just a namespace that distinguishes one message channel from another. Consumers\
    \ use the same identifier to *subscribe* to a topic. The message broker then sends\
    \ the message to all consumers subscribed to the topic. This type of system is\
    \ also known as *publisher/subscriber*, or pub/sub for short. Figure 18-2 shows\
    \ a hypothetical pub/sub architecture.\n\n![](img/d64d2be45ca85b398807d181202e7046_281_0.png)\n\
    \nFor this chapter, I will design the notification system for an automated drone\
    \ delivery service for restaurants. When a customer order is cooked, the drone\
    \ system kicks into action, picks up the order, and delivers the meal to the correct\
    \ address. There are five notifications that happen in this system, and I’ve broken\
    \ them down into producer–consumer in Table 18-2.\n\nTable 18-2. Producers and\
    \ consumers in the automated drone delivery system\n\n| Producer | Consumer |\n\
    | :--- | :--- |\n| Meal has finished cooking | Drone is notified for pickup |\n\
    | Meal has finished cooking | Customer is notified that the meal is cooked |\n\
    | Drone is en route | Customer is notified about an ETA |\n| Drone has delivered\
    \ meal | Customer is notified about delivery |\n| Drone has delivered meal | Restaurant\
    \ is notified about delivery |\n\nI don't want any of these systems to directly\
    \ know about one another, as the code handling customers, drones, and restaurants\
    \ should remain independent (they are maintained by separate teams and I want\
    \ to keep physical dependencies low).\n\nFirst, I will define the topics that\
    \ exist in the system: a meal has finished cooking, the drone is en route, and\
    \ the order is delivered.\n\nFor this example, I will use the Python library PyPubSub,\
    \ which is a publish-subscribe API used in single-process applications. To use\
    \ it, you need to set up code to subscribe to a topic and other code to publish\
    \ to the topic. First, you need to install pypubsub:\n\n```\npip install pypubsub\n\
    ```\n\nThen, to subscribe to the topic, you specify the topic and the function\
    \ you want to be called:\n\n```\nfrom pubsub import pub\n\ndef notify_customer_that_meal_is_done(order:\
    \ Order):\n    # ... snip ...\n\npub.subscribe(notify_customer_that_meal_is_done,\
    \ \"meal-done\")\n```\n\nThen to publish to this topic, you do the following:\n\
    \n```\nfrom pubsub import pub\n\ndef complete_order(order: Order):\n    packge_order(order)\n\
    \    pub.publish(\"meal-done\", order)\n```\n\n> Subscribers operate in the same\
    \ thread as the publisher, which means that any blocking I/O, such as waiting\
    \ on a socket to be read, will block the publisher. This will affect all other\
    \ subscribers and should be avoided.\n\nThese two pieces of code have no knowledge\
    \ of each other; all they depend upon is the PyPubSub library as well as agreeing\
    \ on the topic/message data. This makes it incredibly easy to add new subscribers:\n\
    \n```\nfrom pubsub import pub\n\ndef schedule_pick_up_for_meal(order: Order):\n\
    \    '''Schedule a drone pick-up'''\n    # ... snip ...\n\npub.subscribe(schedule_pick_up_for_meal,\
    \ \"meal-done\")\n```\n\nYou can't get much more extensible. By defining topics\
    \ that exist within the system, you can create new producers or consumers with\
    \ the utmost ease. As your system needs to grow, you extend it by interacting\
    \ with the existing messaging system.\n\nPyPubSub also comes with a few options\
    \ to help with debugging. You can add audit operations by adding your own functionality\
    \ for things like new topics being created or a message being sent. You can add\
    \ error handlers for any subscriber exception being thrown. You can also set up\
    \ subscribers for *all* topics at once. If you would like to learn more about\
    \ any of these features, or any other piece of functionality in PyPubSub, check\
    \ out the [PyPubSub documentation](https://pypubsub.readthedocs.io/).\n\n![](img/d64d2be45ca85b398807d181202e7046_283_0.png)\n\
    \nPyPubSub is meant for single-process applications; you cannot publish to code\
    \ running in other processes or systems. Other applications can be used to provide\
    \ this functionality, such as [Kafka](https://kafka.apache.org/), [Redis](https://redis.io/),\
    \ or [RabbitMQ](https://www.rabbitmq.com/). Check out each of these tool's documentation\
    \ to learn how to use them in Python.\n\n## The Observer Pattern\n\nIf you don't\
    \ want to use a message broker, you can choose to implement the Observer Pattern.¹\
    \ With the Observer Pattern, your producer contains of a list of *observers*:\
    \ the consumers in this scenario. The Observer Pattern does not need a separate\
    \ library to act as a message broker.\n\nTo avoid directly linking producers and\
    \ consumers, you need to keep the knowledge of observers *generic*. In other words,\
    \ keep any specific knowledge about the observers abstracted away. I will do this\
    \ by just using functions (type annotated as a Callable). Here is how I would\
    \ rewrite the previous example to use an Observer Pattern:\n\n```\npython\ndef\
    \ complete_order(order: Order, observers: list[Callable[Order]]):\n    package_order(order)\n\
    \    for observer_func in observers:\n        observer(order)\n```\n\nIn this\
    \ case, the producer only knows about a list of functions to call to notify. To\
    \ add new observers, you just need to add them to the list passed in as an argument.\
    \ Furthermore, since this is just function calls, your typechecker will be able\
    \ to detect when a producer or its observers change in an incompatible way, which\
    \ is a huge benefit over the message broker paradigm. It is also easier to debug,\
    \ as you don't need to step through third-party message broker code in your debugger.\n\
    \n> ¹ The Observer Pattern is first described in *Design Patterns: Elements of\
    \ Reusable Object-Oriented Software* by Erich Gamma, Richard Helm, Ralph Johnson,\
    \ and John Vlissides (Addison-Wesley Professional). This book is colloquially\
    \ known as the \"Gang of Four (GoF)\" book.\n\n## Patterns Without Classes\n\n\
    The example in this chapter is not the typical representation of the Observer\
    \ Pattern. The traditional implementation of this design pattern (as well as with\
    \ many others) is represented in a very object-oriented fashion with classes,\
    \ subclasses, inheritance, and interfaces. For example, the original Observer\
    \ Pattern might be expressed in this way in Python:\n\n```\nfrom typing import\
    \ Any\nclass Subscriber:\n    def notify(data: Any):\n        raise NotImplementedError()\n\
    \nclass Publisher:\n    def __init__(self):\n        self.subscribers = []\n\n\
    \    def add_subscriber(self, sub: Subscriber):\n        self.subscribers.append(sub)\n\
    \n    def notify_subscribers(self, data: Any):\n        for subscriber in subscribers:\n\
    \            subscriber.notify(data)\n```\n\nClasses that needed to publish or\
    \ subscribe would then inherit from the appropriate base class. This is useful\
    \ from a reuse standpoint, but it can be cumbersome to introduce classes when\
    \ the example with functions is much simpler.\n\nAs such, design patterns have\
    \ earned some criticism around the number of boilerplate classes and interfaces\
    \ needed to implement them. As the development community has evolved, public opinion\
    \ has soured toward many patterns because of their association with class-/interface-heavy\
    \ code that was described as “object-oriented” in the mid 1990s and 2000s.\n\n\
    However, do not throw away the concept of many design patterns because of how\
    \ the example was originally presented. There have been many iterations on these\
    \ patterns that simplify implementation. Most patterns don’t focus on the state\
    \ management aspect of object-oriented code but on decoupling dependencies, and\
    \ are still beneficial to larger system design.\n\nThe Observer Pattern above\
    \ does have some drawbacks. First, you are a bit more sensitive to errors that\
    \ crop up. If the observer throws an exception, the producer needs to be able\
    \ to handle that directly (or use a helper function or class to handle the notification\
    \ wrapped in a try...except). Second, the linking of producer to observer is more\
    \ direct than in the message broker paradigm. In a message broker paradigm, the\
    \ publisher and subscriber can become connected regardless of where they live\
    \ in the codebase."
  mdcn: "## 简单事件\n\n事件导向架构中最简单的情况是处理*简单事件*，例如在特定条件发生变化时执行操作或发出警报。你的信息生产者是发送事件的一方，而你的消费者则接收并响应事件。实现这一点有两种典型方式：使用或不使用消息代理。\n\
    \n## 使用消息代理\n\n消息代理是一段特定的代码，充当数据的传输者。生产者会将数据（称为消息）发布到消息代理上的特定*主题*。主题只是一个唯一标识符，例如一个字符串。它可以很简单，比如“订单”，也可以很复杂，比如“三明治订单已完成”。它只是一个命名空间，用于区分不同的消息通道。消费者使用相同的标识符来*订阅*一个主题。然后，消息代理将消息发送给所有订阅了该主题的消费者。这种类型的系统也称为*发布/订阅*，简称\
    \ pub/sub。图 18-2 展示了一个假设的 pub/sub 架构。\n\n![](img/d64d2be45ca85b398807d181202e7046_281_0.png)\n\
    \n在本章中，我将为餐厅的自动化无人机配送服务设计通知系统。当顾客的订单烹饪完成时，无人机系统就会启动，取走订单，并将餐食送到正确的地址。这个系统中会发生五种通知，我在表\
    \ 18-2 中将它们分解为生产者-消费者关系。\n\n表 18-2. 自动化无人机配送系统中的生产者和消费者\n\n| 生产者 | 消费者 |\n| :---\
    \ | :--- |\n| 餐食烹饪完成 | 无人机收到取餐通知 |\n| 餐食烹饪完成 | 顾客收到餐食已做好的通知 |\n| 无人机正在途中 | 顾客收到预计送达时间的通知\
    \ |\n| 无人机已送达餐食 | 顾客收到送达通知 |\n| 无人机已送达餐食 | 餐厅收到送达通知 |\n\n我不希望这些系统中的任何一个直接了解彼此，因为处理顾客、无人机和餐厅的代码应该保持独立（它们由不同的团队维护，我希望保持物理依赖性较低）。\n\
    \n首先，我将定义系统中存在的主题：餐食烹饪完成、无人机正在途中、订单已送达。\n\n在这个例子中，我将使用 Python 库 PyPubSub，这是一个用于单进程应用程序的发布-订阅\
    \ API。要使用它，你需要设置代码来订阅一个主题，以及其他代码来发布到该主题。首先，你需要安装 pypubsub：\n\n```\npip install\
    \ pypubsub\n```\n\n然后，要订阅一个主题，你需要指定主题和你希望被调用的函数：\n\n```\nfrom pubsub import pub\n\
    \ndef notify_customer_that_meal_is_done(order: Order):\n    # ... 省略 ...\n\npub.subscribe(notify_customer_that_meal_is_done,\
    \ \"meal-done\")\n```\n\n然后，要发布到这个主题，你需要执行以下操作：\n\n```\nfrom pubsub import pub\n\
    \ndef complete_order(order: Order):\n    packge_order(order)\n    pub.publish(\"\
    meal-done\", order)\n```\n\n> 订阅者与发布者在同一个线程中运行，这意味着任何阻塞 I/O（例如等待套接字可读）都会阻塞发布者。这将影响所有其他订阅者，应予以避免。\n\
    \n这两段代码彼此一无所知；它们只依赖于 PyPubSub 库以及对主题/消息数据的约定。这使得添加新的订阅者变得极其容易：\n\n```\nfrom pubsub\
    \ import pub\n\ndef schedule_pick_up_for_meal(order: Order):\n    '''安排无人机取餐'''\n\
    \    # ... 省略 ...\n\npub.subscribe(schedule_pick_up_for_meal, \"meal-done\")\n\
    ```\n\n没有比这更具扩展性的了。通过定义系统中存在的主题，你可以极其轻松地创建新的生产者或消费者。随着系统需求的增长，你可以通过与现有消息系统交互来扩展它。\n\
    \nPyPubSub 还提供了一些选项来帮助调试。你可以通过添加自己的功能（例如新主题被创建或消息被发送）来添加审计操作。你可以为任何订阅者抛出的异常添加错误处理程序。你还可以一次性为*所有*主题设置订阅者。如果你想了解更多关于这些功能或\
    \ PyPubSub 中任何其他功能的信息，请查看 [PyPubSub 文档](https://pypubsub.readthedocs.io/)。\n\n\
    ![](img/d64d2be45ca85b398807d181202e7046_283_0.png)\n\nPyPubSub 适用于单进程应用程序；你无法发布到运行在其他进程或系统中的代码。其他应用程序可用于提供此功能，例如\
    \ [Kafka](https://kafka.apache.org/)、[Redis](https://redis.io/) 或 [RabbitMQ](https://www.rabbitmq.com/)。请查看每个工具的文档，了解如何在\
    \ Python 中使用它们。\n\n## 观察者模式\n\n如果你不想使用消息代理，可以选择实现观察者模式。¹ 使用观察者模式，你的生产者包含一个*观察者*列表：即此场景中的消费者。观察者模式不需要单独的库来充当消息代理。\n\
    \n为了避免直接链接生产者和消费者，你需要保持观察者知识的*通用性*。换句话说，将任何关于观察者的具体知识抽象掉。我将通过仅使用函数（类型注解为 Callable）来实现这一点。以下是我将如何重写前面的例子以使用观察者模式：\n\
    \n```\npython\ndef complete_order(order: Order, observers: list[Callable[Order]]):\n\
    \    package_order(order)\n    for observer_func in observers:\n        observer(order)\n\
    ```\n\n在这种情况下，生产者只知道要调用以进行通知的函数列表。要添加新的观察者，你只需将它们添加到作为参数传入的列表中。此外，由于这只是函数调用，你的类型检查器将能够检测到生产者或其观察者何时以不兼容的方式发生变化，这比消息代理范式是一个巨大的优势。它也更容易调试，因为你不需要在调试器中逐步执行第三方消息代理代码。\n\
    \n> ¹ 观察者模式首次在 Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides 所著的《设计模式：可复用面向对象软件的基础》（Addison-Wesley\
    \ Professional）中描述。这本书通常被称为“四人帮（GoF）”之书。\n\n## 无类的模式\n\n本章中的例子并非观察者模式的典型表示。这种设计模式（以及许多其他模式）的传统实现是以非常面向对象的方式表示的，使用类、子类、继承和接口。例如，原始的观察者模式在\
    \ Python 中可能这样表达：\n\n```\nfrom typing import Any\nclass Subscriber:\n    def notify(data:\
    \ Any):\n        raise NotImplementedError()\n\nclass Publisher:\n    def __init__(self):\n\
    \        self.subscribers = []\n\n    def add_subscriber(self, sub: Subscriber):\n\
    \        self.subscribers.append(sub)\n\n    def notify_subscribers(self, data:\
    \ Any):\n        for subscriber in subscribers:\n            subscriber.notify(data)\n\
    ```\n\n需要发布或订阅的类将继承自相应的基类。从重用的角度来看，这很有用，但当使用函数的例子简单得多时，引入类可能会显得笨重。\n\n因此，设计模式因其需要实现的样板类和接口数量而受到了一些批评。随着开发社区的发展，公众对许多模式的看法已经恶化，因为它们与\
    \ 1990 年代中期和 2000 年代被描述为“面向对象”的类/接口密集型代码相关联。\n\n然而，不要因为这些模式最初的呈现方式而抛弃许多设计模式的概念。这些模式已经经历了许多迭代，简化了实现。大多数模式并不关注面向对象代码的状态管理方面，而是关注解耦依赖关系，对于大型系统设计仍然有益。\n\
    \n上面的观察者模式确实有一些缺点。首先，你对出现的错误稍微敏感一些。如果观察者抛出异常，生产者需要能够直接处理（或使用辅助函数或类来处理包装在 try...except\
    \ 中的通知）。其次，生产者到观察者的链接比在消息代理范式中更直接。在消息代理范式中，发布者和订阅者可以变得连接，无论它们在代码库中的位置如何。"
