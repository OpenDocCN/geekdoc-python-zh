  md: "# What Are Type Annotations?\n\nIn Chapter 2, you got your first glance at\
    \ a type annotation:\n\n```\ndef close_kitchen_if_past_close(point_in_time: datetime.datetime):\
    \ ❶\n    if point_in_time >= closing_time():\n        close_kitchen()\n      \
    \  log_time_closed(point_in_time)\n```\n\n❶ The type annotation here is : datetime.datetime\n\
    \nType annotations are an additional syntax notifying the user of an expected\
    \ type of your variables. These annotations serve as *type hints*; they provide\
    \ hints to the reader, but they are not actually used by the Python language at\
    \ runtime. In fact, you are completely free to ignore the hints. Consider the\
    \ following snippet of code, along with a comment written by the developer.\n\n\
    ```\n# CustomDateTime offers all the same functionality with\n# datetime.datetime.\
    \ I'm using it here for its better\n# logging facilities.\nclose_kitchen_if_past_close(CustomDateTime(\"\
    now\")) # no error\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_55_0.png)\n\
    \nIt should be a rare case where you go against a type hint. The author very clearly\
    \ intended a specific use case. If you aren't going to follow the type annotation,\
    \ you are setting yourself up for problems if the original code changes in a way\
    \ that is incompatible with the types that you are using (such as expecting a\
    \ certain function to work with that type).\n\nPython will not throw any error\
    \ at runtime in this scenario. As a matter of fact, it won't use the type annotations\
    \ at all during runtime. There is no checking or cost for using these when Python\
    \ executes. These type annotations still serve a crucial purpose: informing your\
    \ readers of the expected type. Maintainers of code will know what types they\
    \ are allowed to use when changing your implementation. Calling code will also\
    \ benefit, as developers will know exactly what type to pass in. By implementing\
    \ type annotations, you reduce friction.\n\nPut yourself in your future maintainer's\
    \ shoes. Wouldn't it be nice to come across code that is intuitive to use? You\
    \ wouldn't have to dig through function after function to determine usage. You\
    \ wouldn't assume a wrong type and then need to deal with the fallout of exceptions\
    \ and wrong behavior.\n\nConsider another piece of code that takes in employees'\
    \ availability and a restaurant's opening time, and then schedules available workers\
    \ for that day. You want to use this piece of code and you see the following:\n\
    \n```\ndef schedule_restaurant_open(open_time, workers_needed):\n```"
