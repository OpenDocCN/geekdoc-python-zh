    \ 值。\n\n这种操作被称为*积类型*；可表示状态的数量由可能值的乘积决定。问题是，并非所有这些状态都是有效的。变量 `disposed_of` 应该仅在错误代码设置为非零时才设置为\
    \ `True`。开发者会做出这个假设，并相信非法状态永远不会出现。然而，一个无辜的错误可能会导致你的整个系统崩溃。考虑以下代码：\n\n```python\n\
    def serve(snack):\n    # if something went wrong, return early\n    if snack.disposed_of:\n\
    \        return\n    # ...\n```\n\n在这种情况下，开发者在检查 `disposed_of` 之前没有先检查非零错误代码。这是一个等待发生的逻辑炸弹。只要\
