- img_proc: true
  md: "dispense_to_customer to only take ReadyToServeHotDog values as an argument.\
    \ This prevents developers from invalidating assumptions. If a developer were\
    \ to pass a HotDog to this method, the typechecker will yell at them:\n\n```\n\
    code_examples/chapter4/invalid/newtype.py:10: error:\n    Argument 1 to \"dispense_to_customer\"\
    \n    has incompatible type \"HotDog\";\n    expected \"ReadyToServeHotDog\"\n\
    ```\n\nIt is important to stress the one-way nature of this type conversion. As\
