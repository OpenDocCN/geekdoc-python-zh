- img_proc: true
  md: "```\n# check that the height is unchanged\nassert rectangle.get_height() ==\
    \ old_height\n```\n\nWith this code, what would happen if I were to pass a Square\
    \ as the argument? All of a sudden, a previously passing assertion would start\
    \ to fail, since the height of a square changes when the length changes. This\
    \ is catastrophic; the whole intention of inheritance is to extend functionality\
    \ without breaking existing code. In this case, by passing in a Square (since\
    \ it's also a Rectangle, the type checker won't complain), I have introduced a\
    \ bug just waiting to happen.\n\nThis sort of mistake impacts the derived class\
    \ as well. The error above stems from overriding set_width in Square so that the\
    \ height is changed as well. What if set_width were not overridden and the Rectangle's\
    \ set_width function were invoked? Well, if this were the case, and you passed\
    \ a Square into the function, the assertion would not fail. Instead, something\
    \ far less obvious but much more detrimental happens: the function succeeds. No\
    \ longer do you receive an AssertionError with a stack trace that leads you to\
    \ the bug. Now, you create a square that is no longer a square; the width is changed,\
    \ but the height has not. You have committed a cardinal sin and have broken the\
    \ invariants of that class.\n\nWhat makes this so sinister is that the goal of\
    \ inheritance is to decouple, or remove dependencies from, existing code and new\
    \ code. Implementers and consumers of the base class have no view into different\
    \ derived classes at runtime. It might be that the derived class definitions live\
    \ in a completely different codebase, owned by a different organization. With\
    \ this error case, you make it so that every time a derived class changes, you\
    \ need to look at every invocation and use of the base class and assess whether\
    \ or not your changes will break code.\n\nIn order to solve this, you have a few\
    \ options available to you. First, you can not inherit Square from Rectangle in\
    \ the first place and avoid the whole problem. Second, you can restrict the methods\
