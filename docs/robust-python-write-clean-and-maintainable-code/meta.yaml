    Fish 'n' Chips\")\n    assert_checkmark_on_meal(\"Fish 'n' Chips\")\n    assert_no_warnings_displayed_on_meal(\"\
    Late-Night Cookies\")\n    assert_checkmark_on_meal(\"Late-Night Cookies\")\n\
