- img_proc: true
  md: "First up for the Ultimate Kitchen Assistant is a pizza-making module. While\
    \ traditional sauce-and-cheese pizzas are great, I want the Ultimate Kitchen Assistant\
    \ to be more flexible. I want it to handle all sorts of pizza-like entities, from\
    \ a Lebanese manoush to a Korean bulgogi pizza. To make any of these pizza-like\
    \ dishes, I want the machinery to perform a similar set of steps, but let developers\
    \ tweak certain operations to make their style of pizza. Figure 19-2 describes\
    \ such a pizza-making algorithm.\n\n![](img/d64d2be45ca85b398807d181202e7046_292_0.png)\n\
    \nFigure 19-2. Pizza-making algorithm\n\nEach pizza will use the same basic steps,\
    \ but I want to be able to tweak certain steps (preparing ingredients, adding\
    \ prebake toppings, and adding postbake toppings). My goal in applying the Template\
    \ Method Pattern is to make these steps pluggable.\n\nIn its simplest incarnation,\
    \ I can pass functions into the template method:\n\n```\npython\n@dataclass\n\
    class PizzaCreationFunctions:\n    prepare_ingredients: Callable\n    add_pre_bake_toppings:\
    \ Callable\n    add_post_bake_toppings: Callable\n\ndef create_pizza(pizza_creation_functions:\
    \ PizzaCreationFunctions):\n    pizza_creation_functions.prepare_ingredients()\n\
    \    roll_out_pizza_base()\n    pizza_creation_functions.add_pre_bake_toppings()\n\
    \    bake_pizza()\n    pizza_creation_functions.add_post_bake_toppings()\n```"
  merge: -1
  pgno: 292
- img_proc: true
  md: "Now, if you want to create a pizza, you just pass in your own functions:\n\n\
    ```\npizza_creation_functions = PizzaCreationFunctions(\n    prepare_ingredients=mix_zaatar,\n\
    \    add_pre_bake_toppings=add_meat_and_halloumi,\n    add_post_bake_toppings=drizzle_olive_oil\n\
    )\n\ncreate_pizza(pizza_creation_functions)\n```\n\nThis is incredibly convenient\
    \ for any pizza, now or in the future. As new pizza-making capabilities come online,\
    \ developers need to pass their new functions into the template method. These\
    \ developers can plug in specific parts of the pizza-making algorithm to suit\
    \ their needs. They don't need to know anything about their use case at all; they\
    \ are free to grow the system without being bogged down with changing legacy code.\
    \ Suppose they want to create the bulgogi pizza. Instead of changing create_pizza,\
    \ I simply need to pass in a new PizzaCreationFunctions:\n\n```\npizza_creation_functions\
    \ = PizzaCreationFunctions(\n    prepare_ingredients=cook_bulgogi,\n    add_pre_bake_toppings=add_bulgogi_toppings,\n\
    \    add_post_bake_toppings=garnish_with_scallions_and_sesame\n)\n\ncreate_pizza(pizza_creation_functions)\n\
    ```\n\n# The Canonical Template Method Pattern\n\nThe Template Method Pattern\
    \ described in the Gang of Four book is a bit different than what I've shown in\
    \ this section. This is another case where the Gang of Four book leans heavily\
    \ on class- and inheritance-based design. In the original Template Method Pattern,\
    \ you are required to write a base class:\n\n```\nclass PizzaCreator:\n    def\
    \ roll_out_dough():\n        # snip\n    def bake():\n        # snip\n    def\
    \ serve():\n        # snip\n\n    def prepare_ingredients():\n        raise NotImplementedError()\n\
    \n    def add_pre_bake_toppings():\n        raise NotImplementedError()\n\n  \
    \  def add_post_bake_toppings():\n        raise NotImplementedError()\n```"
