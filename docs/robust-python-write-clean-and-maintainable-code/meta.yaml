    This wraps up Part I of the book. It has focused exclusively on type annotations
    and typechecking. Feel free to mix and match the strategies and tools I''ve discussed.
    You don''t need to type annotate absolutely everything, as type annotations can
    constrain expressiveness if too strictly applied. But you should strive to clarify
    code and make it harder for bugs to crop up. You will find the balance over time,
