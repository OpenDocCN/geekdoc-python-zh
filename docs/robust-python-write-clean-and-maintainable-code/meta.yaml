  md: "```\npython\ndef log_time_per_dish(dish: Dish, number_of_seconds: int):\n \
    \   dish_db[dish].time_spent.append(number_of_seconds)\n```\n\nWhenever you work\
    \ with a database (or any other I/O request), you always need to be prepared for\
    \ errors. The database may be down, the network might be out, there might be a\
    \ conflict with the data you are entering, or any other error might pop up. You\
    \ can't always rely on this code executing without errors. The business doesn't\
    \ want the code to give up on the first error; these operations should retry a\
    \ set number of times or for a certain time period before giving up.\n\nI can\
    \ use the backoff.on_exception to specify that these functions should be retried\
    \ if they throw an exception:\n\n```\npython\nimport backoff\nimport requests\n\
    from autokitchen.database import OperationException\n# setting properties of self.*_db\
    \ objects will\n# update data in the database\n@backoff.on_exception(backoff.expo,\n\
    \                     OperationException,\n                     max_tries=5)\n\
    def on_dish_ordered(dish: Dish):\n    self.dish_db[dish].count += 1\n\n@backoff.on_exception(backoff.expo,\n\
    \                     OperationException,\n                     max_tries=5)\n\
    @backoff.on_exception(backoff.expo,\n                     requests.exceptions.HTTPError,\n\
    \                     max_time=60)\ndef save_inventory_counts(inventory):\n  \
    \  for ingredient in inventory:\n        self.inventory_db[ingredient.name] =\
    \ ingredient.count\n\n@backoff.on_exception(backoff.expo,\n                  \
    \   OperationException,\n                     max_time=60)\ndef log_time_per_dish(dish:\
    \ Dish, number_of_seconds: int):\n    self.dish_db[dish].time_spent.append(number_of_seconds)\n\
    ```\n\nThrough the use of decorators, I am able to modify behavior without messing\
    \ with the function body. Each function will now back off exponentially (take\
    \ longer between each retry) when specific exceptions are raised. Each function\
    \ also has its own conditions for how much time to take or how many times to retry\
    \ before giving up completely. I've defined the policy in this code, but left\
    \ the actual *how* to do it, the mechanisms, abstracted away in the backoff library."
