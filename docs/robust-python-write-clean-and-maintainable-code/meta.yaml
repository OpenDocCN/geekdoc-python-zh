    \n尽管有这些缺点，但在你需要为系统提供急需的灵活性的情况下，事件驱动架构是值得的。未来的维护者可以以最小的影响替换你的生产者或消费者。他们可以引入新的生产者和消费者来创建新功能。他们可以快速与外部系统集成，为新的合作伙伴关系打开大门。最重要的是，他们正在使用小型、模块化的系统，这些系统易于独立测试且易于理解。"
