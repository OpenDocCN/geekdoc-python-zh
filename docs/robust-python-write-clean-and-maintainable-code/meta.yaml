  - "[PAGE 338]\n\n![](img/d64d2be45ca85b398807d181202e7046_338_0.png)\n\nBy default,\
    \ behave expects your Gherkin files to be in a folder called *features* and your\
    \ Python functions (called steps) to be in a folder called *features/steps*.\n\
    \nLet's look at the first Gherkin requirement I showed earlier in this chapter:\n\
    \n```\nFeature: Vegan-friendly menu\n\n    Scenario: Can substitute for vegan\
    \ alternative\n        Given an order containing a Cheeseburger with Fries\n \
    \       When I ask for vegan substitutions\n        Then I receive the meal with\
    \ no animal products\n```\n\nWith behave, I can write Python code that maps to\
    \ each of these GWT statements:\n\n```\nfrom behave import given, when, then\n\
    \n@given(\"an order containing a Cheeseburger with Fries\")\ndef setup_order(ctx):\n\
    \    ctx.dish = CheeseburgerWithFries()\n\n@when(\"I ask for vegan substitutions\"\
    )\ndef substitute_vegan(ctx):\n    ctx.dish.substitute_vegan_ingredients()\n\n\
    @then(\"I receive the meal with no animal products\")\ndef check_all_vegan(ctx):\n\
    \    assert all(is_vegan(ing) for ing in ctx.dish.ingredients())\n```\n\nEach\
    \ step is represented as a decorator that matches the clause of the Gherkin requirement.\
    \ The decorated function is what gets executed as part of the specification. In\
    \ the above example, the Gherkin requirement would be represented by the following\
    \ code (you do not have to write this; Gherkin does it for you):\n\n```\nfrom\
    \ behave.runner import Context\ncontext = Context()\nsetup_order(context)\nsubstitute_vegan(context)\n\
    check_all_vegan(context)\n```\n\nTo run this, first install behave:\n\n```\npip\
    \ install behave\n```\n\nThen, run behave on the folder containing your requirements\
    \ and steps:\n\n```\nbehave code_examples/chapter22/features\n```"
  - "[PAGE 339]\n\nYou will see the following as output:\n\n```\nFeature: Vegan-friendly\
    \ menu\n\n    Scenario: Can substitute for vegan alternatives\n        Given an\
    \ order containing a Cheeseburger with Fries\n        When I ask for vegan substitutions\n\
    \        Then I receive the meal with no animal products\n\n1 feature passed,\
