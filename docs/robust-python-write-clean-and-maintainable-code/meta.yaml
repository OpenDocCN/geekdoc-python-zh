    \ 0 failed, 0 skipped, 0 undefined\nTook 0m0.000s\n```\n\nWhen this code is run\
    \ in a terminal or an IDE, all the steps show up as green. If any step fails,\
    \ the step turns red and you get a stack trace of what went wrong.\n\nNow you\
    \ can tie your requirements directly to your acceptance tests. If an end user\
    \ changes their mind, they can write a new test. If the GWT clause already exists\
    \ for the new tests, that’s a win; new tests can be written without the help of\
    \ a developer. If the clauses do not already exist, that’s also a win, because\
    \ it kick-starts a conversation when the test immediately fails. Your end users\
    \ and your business people need no Python knowledge to understand what you are\
    \ testing.\n\nUse the Gherkin specifications to drive conversations about the\
    \ software that you need to build. behave allows you to tie your acceptance tests\
    \ directly to these requirements, and they serve as a way of focusing conversations.\
    \ Using BDD prevents you from jumping right into coding the wrong thing. As the\
    \ popular saying goes: “Weeks of coding will save you hours of planning.”³\n\n\
    # Additional behave Features\n\nThe previous example was a bit bare-bones, but\
    \ thankfully, behave provides some extra features to make test writing even easier.\n\
    \n# Parameterized Steps\n\nYou may have noticed that I have two Given steps that\
    \ are very similar:\n\n```\nGiven an order containing a Cheeseburger with Fries\n\
    ```\n\nand\n\n```\nGiven an order containing Meatloaf\n```\n\n3 While this quote’s\
    \ author is anonymous, I first came across it on the Programming Wisdom Twitter\
    \ account."
  - "[PAGE 340]\n\nIt'd be silly to write two similar functions to link this in Python.\
    \ behave lets you parameterize the steps to reduce the need for writing multiple\
    \ steps:\n\n```\n@given(\"an order containing {dish_name}\")\ndef setup_order(ctx,\
    \ dish_name):\n    if dish_name == \"a Cheeseburger with Fries\":\n        ctx.dish\
    \ = CheeseburgerWithFries()\n    elif dish_name == \"Meatloaf\":\n        ctx.dish\
    \ = Meatloaf()\n```\n\nAlternatively, you can stack clauses on a function if needed:\n\
    \n```\n@given(\"an order containing a Cheeseburger with Fries\")\n@given(\"a typical\
    \ drive-thru order\")\ndef setup_order(context):\n    ctx.dish = CheeseBurgerWithFries()\n\
    ```\n\nParameterizing and reusing steps will help you build up vocabulary that\
    \ is intuitive to use, which will reduce the cost of writing Gherkin tests.\n\n\
    # Table-Driven Requirements\n\nIn Chapter 21, I mentioned how you can parameterize\
    \ tests so that all your pre-conditions and assertions are defined in a table.\
    \ behave offers something very similar:\n\n```\nFeature: Vegan-friendly menu\n\
    \nScenario Outline: Vegan Substitutions\n  Given an order containing <dish_name>,\n\
    \  When I ask for vegan substitutions\n  Then <result>\n\nExamples: Vegan Substitutable\n\
    \  | dish_name                | result |\n  | a Cheeseburger with Fries | I receive\
    \ the meal with no animal products |\n  | Cobb Salad               | I receive\
    \ the meal with no animal products |\n  | French Fries             | I receive\
    \ the meal with no animal products |\n  | Lemonade                 | I receive\
    \ the meal with no animal products |\n\nExamples: Not Vegan Substitutable\n  |\
    \ dish_name    | result |\n  | Meatloaf     | a non-vegan-substitutable error\
    \ shows up |\n  | Meatballs    | a non-vegan-substitutable error shows up |\n\
    \  | Fried Shrimp | a non-vegan-substitutable error shows up |\n```\n\nbehave\
    \ will automatically run a test for each table entry. This is a great way to run\
    \ the same test on very similar data."
  - "[PAGE 341]\n\n# Step Matching\n\nSometimes, the basic decorators don't have enough\
    \ flexibility to capture what you are trying to express. You can tell behave to\
    \ use regular expression parsing in your decorators. This is useful to make the\
    \ Gherkin specifications feel more natural to write (especially getting around\
    \ complex data formats or wonky grammar issues). Here's an example that allows\
    \ you to specify dishes with an optional \"a\" or \"an\" beforehand (so that dish\
    \ names can be simplified).\n\n```\nfrom behave import use_context_matcher\n\n\
    use_step_matcher(\"re\")\n\n@given(\"an order containing [a |an ]?(?P<dish_name>.*)\"\
    )\ndef setup_order(ctx, dish_name):\n    ctx.dish = create_dish(dish_name)\n```\n\
    \n# Customizing the Test Life Cycle\n\nSometimes you need to run code before or\
    \ after your tests run. Say you need to set up a database before all the specifications\
    \ are set, or tell a service to clear its cache between test runs. Just like setUp\
    \ and tearDown in the built-in unittest module, behave offers functions that let\
    \ you hook in functions before or after steps, features, or the entire test run.\
    \ Use this to consolidate common setup code. To take full advantage of this functionality,\
    \ you can define specifically named functions in a file named environment.py.\n\
    \n```\ndef before_all(ctx):\n    ctx.database = setup_database()\n\ndef before_feature(ctx,\
    \ feature):\n    ctx.database.empty_tables()\n\ndef after_all(ctx):\n    ctx.database.cleanup()\n\
    ```\n\nCheck out the [behave documentation](https://behave.readthedocs.io/) for\
    \ more information on controlling your environment. If you are more comfortable\
    \ with pytest fixtures, check out behave [fixtures](https://behave.readthedocs.io/en/latest/fixtures.html)\
    \ for very similar ideas.\n\n![](img/d64d2be45ca85b398807d181202e7046_341_0.png)\n\
    \nFunctions like before_feature and before_scenario get the feature or scenario,\
    \ respectively, passed to them. You can key off the names of these features and\
    \ scenarios to do specific actions for specific parts of your tests."
  - "[PAGE 342]\n\n# Using Tags to Selectively Run Tests\n\nbehave also offers the\
    \ ability to tag certain tests with arbitrary text. These tags can be anything\
    \ you want: @wip for work in progress, @slow for slow running tests, @smoke for\
    \ a select few tests for running on each check-in, and so on.\n\nTo tag a test\
    \ in behave, just decorate your Gherkin scenario:\n\n```\nFeature: Vegan-friendly\
    \ Menu\n\n@smoke\n@wip\nScenario: Can substitute for vegan alternatives\n    Given\
    \ an order containing a Cheeseburger with Fries\n    When I ask for vegan substitutions\n\
    \    Then I receive the meal with no animal products\n```\n\nTo run just tests\
    \ with a specific tag, you can pass a --tags flag to your behave invocation:\n\
    \n```\nbehave code_examples/chapter22 --tags=smoke\n```\n\n![](img/d64d2be45ca85b398807d181202e7046_342_0.png)\n\
    \nIf you'd like to exclude tests from being run, prefix the tags with a hyphen,\
    \ as seen in this example where I exclude tests tagged with wip from being run:\n\
    \n```\nbehave code_examples/chapter22 --tags=-wip\n```\n\n# Report Generation\n\
    \nUsing behave and BDD to drive your acceptance testing will not pay off if you\
    \ are not involving your end users or their proxies. Find ways to make it easy\
    \ for them to understand and use the Gherkin requirements.\n\nYou can get a list\
    \ of all step definitions by invoking behave --steps-catalog.\n\nOf course, you\
    \ also need a way of showing test results to give your end users an idea of what\
    \ is working and what is not. behave lets you format outputs in a variety of different\
    \ ways (and you can define your own). Out of the box, there is also the ability\
    \ to create reports from JUnit, a unit-testing framework designed for the Java\
    \ language. JUnit writes its test results as a XML file, and a lot of tools were\
    \ built to ingest and visualize the test results.\n\nTo generate a JUnit test\
    \ report, you can pass --junit to your behave invocation. Then, you can use a\
    \ tool junit2html to get a report for all of your test cases:\n\n```\npip install\
    \ junit2html\nbehave code_examples/chapter22/features/ --junit\n```"
- md: "# xml files are in the reports folder\njunit2html <filename>\n\nAn example\
    \ output is shown in Figure 22-1.\n\n![](img/d64d2be45ca85b398807d181202e7046_343_0.png)\n\
    \nThere are plenty of JUnit report generators, so look around for one you like\
    \ and use it to produce HTML reports of your test results.\n\n## Closing Thoughts\n\
    \nIf all your tests pass but don't deliver what the end user wants, you have wasted\
    \ time and effort. It is costly to build the right thing; you want to try and\
    \ get it right the first time. Use BDD to drive crucial conversations about the\
    \ requirements for your system. Once you have requirements, use behave and the\
    \ Gherkin language to write acceptance tests. These acceptance tests become your\
    \ safety net for ensuring that you deliver what the end user wants.\n\nIn the\
    \ next chapter, you'll continue to learn how to repair holes in your safety net.\
    \ You'll learn about property-based testing with a Python tool called Hypothesis.\
    \ It can generate test cases for you, including tests you might never have thought\
    \ of. You can rest easier knowing that your tests have broader coverage than ever\
    \ before.\n\n# CHAPTER 23\n## Property-Based Testing\n\nIt is impossible to test\
    \ absolutely everything in your codebase. The best you can do is be smart in how\
    \ you target specific use cases. You look for boundary cases, paths through the\
    \ code, and any other interesting attributes of the code. Your main hope is that\
    \ you haven't left any big holes in your safety net. However, you can do better\
    \ than hope. You can fill in those gaps with property-based testing.\n\nIn this\
    \ chapter, you will learn how to do property-based testing with a Python library\
    \ called Hypothesis. You'll use Hypothesis to generate test cases for you, often\
    \ in ways you could never expect. You'll learn how to track failing test cases,\
    \ craft input data in new ways, and even have Hypothesis create combinations of\
    \ algorithms to test your software. Hypothesis will guard your codebase against\
    \ a whole new combination of errors.\n\n## Property-Based Testing with Hypothesis\n\
    \nProperty-based testing is a form of generative testing, where tools generate\
    \ test cases for you. Instead of writing test cases based on specific input/output\
    \ combinations, you define properties for your system. Properties in this context\
    \ is another name for the invariants (discussed in Chapter 10) that hold true\
    \ for your system.\n\nConsider a menu recommendation system that selects dishes\
    \ based on customer-provided constraints, such as total calories, price, and cuisine.\
    \ For this specific example, I want customers to be able to order a full meal\
    \ that falls below a specific calorie target. Here are the invariants I define\
    \ for this function:\n\n- The customer will receive three dishes: an appetizer,\
    \ a salad, and a main dish.\n- When all the dishes' calories are added together,\
    \ the sum is less than their intended target.\n\nIf I were to write this as a\
    \ pytest test that focuses on testing these properties, it would look like the\
    \ following:\n\n```python\ndef test_meal_recommendation_under_specific_calories():\n\
    \    calories = 900\n    meals = get_recommended_meal(Recommendation.BY_CALORIES,\
    \ calories)\n    assert len(meals) == 3\n    assert is_appetizer(meals[0])\n \
    \   assert is_salad(meals[1])\n    assert is_main_dish(meals[2])\n    assert sum(meal.calories\
    \ for meal in meals) < calories\n```\n\nContrast this with testing for a very\
    \ specific result:\n\n```python\ndef test_meal_recommendation_under_specific_calories():\n\
    \    calories = 900\n    meals = get_recommended_meal(Recommendation.BY_CALORIES,\
    \ calories)\n    assert meals == [Meal(\"Spring Roll\", 120),\n              \
    \       Meal(\"Green Papaya Salad\", 230),\n                     Meal(\"Larb Chicken\"\
    , 500)]\n```\n\nThe second method is testing for a very specific set of meals;\
    \ this test is more specific, but also more *fragile*. It is more likely to break\
    \ when the production code changes, such as when introducing new menu items or\
    \ changing the recommendation algorithm. The ideal test is one that only breaks\
    \ when there is a legitimate bug. Remember that tests are not free. You want to\
    \ reduce maintenance cost, and reducing the time it takes to tweak tests is a\
    \ great way of doing so.\n\nIn both cases, I am testing with a specific input:\
    \ 900 calories. In order to build a more comprehensive safety net, it's a good\
    \ idea to expand your input domain to test for more cases. In traditional test\
    \ cases, you pick which tests to write by performing *boundary value analysis*.\
    \ Boundary value analysis is when you analyze the code under test, looking for\
    \ how different inputs influence control flow, or the different execution paths\
    \ in your code.\n\nFor example, say `get_recommended_meal` raised an error if\
    \ the calorie limit were below 650. The boundary value in this case is 650; this\
    \ splits the input domain into two *equivalence classes*, or sets of values that\
    \ have the same property. One equivalence class is all the numbers underneath\
    \ 650, and another equivalence class is the values 650 and above. With boundary\
    \ value analysis, there should be three tests: one with calories under 650 calories,\
    \ one test exactly at the boundary of 650 calories, and one test with a value\
    \ higher than 650 calories. In practice, this verifies that no developer has messed\
    \ up relational operators (such as writing <= instead of <) or has made off-by-one\
    \ errors.\n\nHowever, boundary value analysis is only useful if you can easily\
    \ segment your input domain. If it is difficult to ascertain where you should\
    \ split the domain, picking boundary values will not be easy. This is where the\
    \ generative nature of Hypothesis comes in; Hypothesis generates input for test\
    \ cases. It will find boundary values for you.\n\nYou can install Hypothesis through\
    \ pip:\n\n```bash\npip install hypothesis\n```\n\nI'll modify my original property\
    \ test to let Hypothesis do the heavy lifting of generating input data.\n\n```python\n\
    from hypothesis import given\nfrom hypothesis.strategies import integers\n\n@given(integers())\n\
    def test_meal_recommendation_under_specific_calories(calories):\n    meals = get_recommended_meal(Recommendation.BY_CALORIES,\
    \ calories)\n    assert len(meals) == 3\n    assert is_appetizer(meals[0])\n \
    \   assert is_salad(meals[1])\n    assert is_main_dish(meals[2])\n    assert sum(meal.calories\
    \ for meal in meals) < calories\n```\n\nWith just a simple decorator, I can tell\
    \ Hypothesis to pick the inputs for me. In this case, I am asking Hypothesis to\
    \ generate different values of integers. Hypothesis will run this test multiple\
    \ times, trying to find a value that violates the expected properties. If I run\
    \ this test with pytest, I see the following output:\n\n```\nFalsifying example:\
    \ test_meal_recommendation_under_specific_calories(\n    calories=0,\n)\n================\
    \ short test summary info ==================\nFAILED code_examples/chapter23/test_basic_hypothesis.py::\n\
    \    test_meal_recommendation_under_specific_calories - assert 850 < 0\n```\n\n\
    Hypothesis found an error early on with my production code: the code doesn't handle\
    \ a calorie limit of zero. Now, for this case, I want to specify that I should\
    \ only be testing with a certain number of calories or above:\n\n```python\n@given(integers(min_value=900))\n\
    def test_meal_recommendation_under_specific_calories(calories):\n    # ... snip\
    \ ...\n```\n\nNow, when I run the command with pytest, I want to show some more\
    \ information about Hypothesis. I will run:\n\n```bash\npy.test code_examples/chapter23\
    \ --hypothesis-show-statistics\n```\n\nThis produces the following output:\n\n\
    ```\ncode_examples/chapter23/test_basic_hypothesis.py::\n    test_meal_recommendation_under_specific_calories:\n\
    \n- during generate phase (0.19 seconds):\n  - Typical runtimes: 0-1 ms, ~ 48%\
    \ in data generation\n  - 100 passing examples, 0 failing examples, 0 invalid\
    \ examples\n\n- Stopped because settings.max_examples=100\n```\n\nHypothesis checked\
    \ 100 different values for me, without me needing to provide any specific input.\
    \ Even better, Hypothesis will check new values every time you run this test.\
    \ Rather than restricting yourself to the same test cases time and time again,\
    \ you get a much broader blast radius in what you test. Consider all the different\
    \ developers and continuous integration pipeline systems performing tests, and\
    \ you'll realize how quickly you can catch corner cases.\n\n![](img/d64d2be45ca85b398807d181202e7046_347_0.png)\n\
    \nYou can also specify constraints on your domain by using hypothesis.assume.\
    \ You can write assumptions into your tests, such as assume(calories > 850), to\
    \ tell Hypothesis to skip any test cases that violate these assumptions.\n\nIf\
    \ I introduce an error (say something goes wrong between 5,000 and 5,200 calories\
    \ for some reason), Hypothesis catches the error within four test runs (the number\
    \ of test runs may vary for you):\n\n```\n_________ test_meal_recommendation_under_specific_calories\
    \ _________\n\n    @given(integers(min_value=900))\n>   def test_meal_recommendation_under_specific_calories(calories):\n\
    \ncode_examples/chapter23/test_basic_hypothesis.py:33:\n_ _ _ _ _ _ _ _ _ _ _\
    \ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _ _\n\ncalories = 5001\n\n\
    \    @given(integers(min_value=900))\n    def test_meal_recommendation_under_specific_calories(calories):\n\
    \        meals = get_recommended_meal(Recommendation.BY_CALORIES, calories)\n\
    >       assert len(meals) == 3\nE       TypeError: object of type 'NoneType' has\
    \ no len()\n\ncode_examples/chapter23/test_basic_hypothesis.py:35: TypeError\n\
    ```"
  mdcn: "# xml 文件位于 reports 文件夹中\njunit2html <filename>\n\n示例输出如图 22-1 所示。\n\n![](img/d64d2be45ca85b398807d181202e7046_343_0.png)\n\
    \n有许多 JUnit 报告生成器，因此你可以四处寻找一个你喜欢的，并用它来生成测试结果的 HTML 报告。\n\n## 结语\n\n如果你的所有测试都通过了，但没有交付最终用户想要的东西，那么你就浪费了时间和精力。构建正确的东西成本很高；你需要尝试一次就做对。使用\
    \ BDD 来推动关于系统需求的关键对话。一旦你有了需求，就使用 behave 和 Gherkin 语言来编写验收测试。这些验收测试将成为你确保交付最终用户所需内容的安全网。\n\
    \n在下一章中，你将继续学习如何修补安全网中的漏洞。你将了解一个名为 Hypothesis 的 Python 工具，它支持基于属性的测试。它可以为你生成测试用例，包括你可能从未想到过的测试。你可以更放心地知道，你的测试覆盖范围比以往任何时候都更广。\n\
    \n# 第 23 章\n## 基于属性的测试\n\n要测试代码库中的所有内容是不可能的。你能做的最好的事情就是在针对特定用例时保持聪明。你寻找边界情况、代码路径以及代码的任何其他有趣属性。你主要的希望是你的安全网中没有留下任何大漏洞。然而，你可以做得比希望更好。你可以用基于属性的测试来填补这些空白。\n\
    \n在本章中，你将学习如何使用一个名为 Hypothesis 的 Python 库进行基于属性的测试。你将使用 Hypothesis 为你生成测试用例，通常是以你无法预料的方式。你将学习如何跟踪失败的测试用例、以新的方式构造输入数据，甚至让\
    \ Hypothesis 创建算法组合来测试你的软件。Hypothesis 将保护你的代码库免受一整套新组合错误的影响。\n\n## 使用 Hypothesis\
    \ 进行基于属性的测试\n\n基于属性的测试是一种生成式测试形式，其中工具为你生成测试用例。你不是基于特定的输入/输出组合来编写测试用例，而是为你的系统定义属性。在此上下文中，属性是适用于你的系统不变量（在第\
    \ 10 章中讨论过）的另一个名称。\n\n考虑一个菜单推荐系统，它根据客户提供的约束条件（如总卡路里、价格和菜系）来选择菜肴。对于这个具体示例，我希望客户能够订购一顿低于特定卡路里目标的完整餐点。我为此函数定义了以下不变量：\n\
    \n- 客户将收到三道菜：一道开胃菜、一份沙拉和一道主菜。\n- 当所有菜肴的卡路里相加时，总和小于他们的预期目标。\n\n如果我要编写一个专注于测试这些属性的\
    \ pytest 测试，它将如下所示：\n\n```python\ndef test_meal_recommendation_under_specific_calories():\n\
    \    calories = 900\n    meals = get_recommended_meal(Recommendation.BY_CALORIES,\
    \ calories)\n    assert len(meals) == 3\n    assert is_appetizer(meals[0])\n \
