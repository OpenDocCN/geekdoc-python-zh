- md: "My favorite part about stevedore is that it actually can work *across* packages.\
    \ You can write plug-ins in a completely separate Python package than the core.\
    \ As long as the same namespace is used for the plug-in, stevedore can stitch\
    \ everything together. stevedore has a load of other features that are worth checking\
