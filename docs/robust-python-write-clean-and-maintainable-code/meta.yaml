  md: "> This should not come as a surprise; dereferencing None values throws an exception,\
    \ so it's the exact same behavior. In order to be able to detect exceptions through\
    \ static analysis, you typically need support in the language for checked exceptions:\
    \ exceptions that are part of your type signature that tell your static analysis\
    \ tools what exceptions to expect. Python does not support any sort of checked\
    \ exception at the time of this writing and I am doubtful it ever will, due to\
    \ the verbosity and viral nature of checked exceptions.\n\nThis isn't to say don't\
    \ use exceptions. Use them for exceptional use cases that you don't expect to\
    \ happen, but still wish to guard against, such as the network going down. Don't\
    \ use exceptions for normal behavior, such as not finding an element when searching\
    \ through a list. Remember, the return value can be enforced through typing, but\
    \ exceptions cannot.\n\nThe reason this is so tricky (and so costly) is that None\
    \ is treated as a special case. It exists outside the normal type hierarchy. Every\
    \ variable can be assigned to None. In order to combat this, you need to find\
    \ a way of representing None inside your type hierarchy. You need Optional types.\n\
    \nOptional types offer you two choices: either you have a value or you don't.\
    \ In other words, it is optional to set the variable to a value.\n\n```\nfrom\
    \ typing import Optional\nmaybe_a_string: Optional[str] = \"abcdef\" # This has\
    \ a value\nmaybe_a_string: Optional[str] = None     # This is the absence of a\
    \ value\n```\n\nThis code indicates that the variable `maybe_a_string` may optionally\
    \ contain a string. That code typechecks just fine, whether `maybe_a_string` contains\
    \ \"abcdef\" or None.\n\nAt first glance, it's not apparent what this buys you.\
    \ You still need to use None to represent the absence of a value. I have good\
    \ news for you, though. There are three benefits I associate with Optional types.\n\
    \nFirst, you communicate your intent more clearly. If a developer sees an Optional\
    \ type in a type signature, they view that as a big red flag that they should\
    \ expect None as a possibility.\n\n```\ndef dispense_bun() -> Optional[Bun]:\n\
    \    # ...\n```\n\nIf you notice a function returning an Optional value, take\
    \ heed and check for None values.\n\nSecond, you are able to further distinguish\
    \ the absence of value from an empty value. Consider the innocuous list. What\
    \ happens if you make a function call and receive an empty list? Was it just that\
    \ no results were provided back to you? Or was it that an error occurred and you\
    \ need to take explicit action? If you are receiving a raw list,"
  merge: -1
  pgno: 68
- img_proc: true
  md: "you don't know without trawling through source code. However, if you use an\
    \ Optional, you are conveying one of three possibilities:\n\n*A list with elements*\n\
    \    Valid data to be operated on\n\n*A list with no elements*\n    No error occurred,\
    \ but no data was available (provided that no data is not an error condition)\n\
    \nNone\n    An error occurred that you need to handle\n\nFinally, typecheckers\
    \ can detect Optional types and make sure that you aren't letting None values\
    \ slip through.\n\nConsider:\n\n```\ndef dispense_bun() -> Bun:\n    return Bun('Wheat')\n\
    ```\n\nLet's add some error cases to this code:\n\n```\ndef dispense_bun() ->\
    \ Bun:\n    if not are_buns_available():\n        return None\n    return Bun('Wheat')\n\
    ```\n\nWhen run with a typechecker, you get the following error:\n\n```\ncode_examples/chapter4/invalid/dispense_bun.py:12:\n\
    \    error: Incompatible return value type (got \"None\", expected \"Bun\")\n\
    ```\n\nExcellent! The typechecker will not allow you to return a None value by\
    \ default. By changing the return type from Bun to Optional[Bun], the code will\
