    # 索引


    # 前言


    著名软件工程师兼企业家马克·安德森曾有一句名言：“软件正在吞噬世界”。这话说于2011年，而随着时间的推移，这句话变得愈发真实。软件系统的复杂性与日俱增，渗透到现代生活的方方面面。而站在这个贪婪巨兽中心的，正是
    Python 语言。程序员们常常将 Python 列为最喜爱的语言之一，它无处不在：从 Web 应用到机器学习，再到开发者工具，等等。


    然而，并非所有闪光的东西都是金子。随着我们的软件系统变得越来越复杂，我们的心智模型如何映射到现实世界也变得愈发难以理解。如果不加以控制，软件系统就会变得臃肿、脆弱，最终落得个“遗留代码”的可怕名号。这些代码库常常伴随着这样的警告：“别碰这些文件；我们不知道为什么，但你一碰它就坏”，以及“哦，只有某某知道那段代码，而他两年前就去硅谷拿高薪工作了。”软件开发是一个年轻的领域，但这类言论对开发者和商业人士来说都应是令人警醒的。


    事实是，要编写经久耐用的系统，你需要在选择上深思熟正如蒂特斯·温特斯、汤姆·曼什雷克和海勒姆·赖特所言：“软件工程是随时间积分的编程。”¹ 你的代码可能会存续很长时间——我曾接手过一些项目，其代码是在我上小学时编写的。你的代码能存续多久？它会比你在当前工作的任期（或你维护那个项目的时间）更长吗？当未来有人基于你的代码构建核心组件时，你希望你的代码被如何对待？你是希望你的继任者感谢你的远见，还是诅咒你给这个世界带来的复杂性？


    1 蒂特斯·温特斯、汤姆·曼什雷克和海勒姆·赖特。《Google 软件工程：从长期编程中学到的经验教训》。塞瓦斯托波尔，加利福尼亚州：O''Reilly Media,
    Inc.，2020年。


    Python 是一门美妙的语言，但它偶尔会让面向未来的构建变得棘手。其他一些编程语言的拥护者曾指责 Python “不适合生产环境”或“仅适用于原型开发”，但事实是，许多开发者只触及了皮毛，而没有学习编写健壮
    Python 代码的所有工具和技巧。在本书中，你将学习如何做得更好。你将探索众多使 Python 代码整洁且易于维护的方法。你未来的维护者将会乐于使用你的代码，因为它从一开始就被设计得易于上手。所以，去吧，阅读这本书，展望未来，构建能够持久存在的卓越软件。


    # 谁应该阅读本书


    本书适用于任何希望以可持续和可维护的方式发展其代码的 Python 开发者。本书并非你的第一本 Python 入门书；我期望你之前已经写过 Python 代码。你应该熟悉
    Python 的控制流，并且有过使用类的经验。如果你正在寻找一本更入门的书籍，我建议你先阅读马克·卢茨（O''Reilly）所著的《学习 Python》。


    虽然我将涵盖许多高级 Python 主题，但本书的目标并非成为一本关于如何使用所有 Python 特性的操作手册。相反，这些特性是关于代码健壮性以及你的选择如何影响可维护性这一更大对话的背景。有时我会讨论一些你几乎不应该使用的策略。因为我想阐述健壮性的基本原则；理解我们为何以及如何在代码中做出决策的过程，比知道在最佳场景下使用什么工具更为重要。在实践中，最佳场景是罕见的。运用本书中的原则，从你自己的代码库中得出你自己的结论。


    本书不是一本参考书。你可以称它为一本讨论书。每一章都应该是你所在组织的开发者们共同讨论如何最好地应用这些原则的起点。成立一个读书会、讨论小组或午餐学习会来促进交流。我在每一章都提出了讨论话题以开启对话。当你遇到这些话题时，我鼓励你停下来，反思你当前的代码库。与你的同行交流，并将这些话题作为讨论你的代码、流程和工作流现状的跳板。如果你对
    Python 语言的参考书感兴趣，我衷心推荐卢西亚诺·拉马略（O''Reilly；第二版将于2021年底出版）所著的《流畅的 Python》。


    一个系统可以通过多种不同的方式变得健壮。它可以是安全加固的、可扩展的、容错的，或者更不容易引入新的错误。健壮性的每一个方面都值得用一整本书来阐述；本书专注于防止继承你代码的开发者在你的系统中引入新的错误。我将向你展示如何与未来的开发者沟通，如何通过架构模式让他们的工作更轻松，以及如何在代码库中的错误进入生产环境之前将其捕获。本书聚焦于你的
    Python 代码库的健壮性，而非整个系统的健壮性。


    我将涵盖大量信息，来自软件的许多不同领域，包括软件工程、计算机科学、测试、函数式编程和面向对象编程（OOP）。我并不期望你具备这些领域的背景知识。有些部分我会以初学者的水平进行解释；这通常是为了解构我们如何思考语言的核心基础。在很大程度上，这是一本中级水平的书籍。


    理想的读者包括：


    - 目前在大型代码库中工作，希望找到与同事更好沟通方式的开发者

    - 主要代码库的维护者，希望找到方法减轻未来维护者的负担

    - 自学成才、能写出很好的 Python 代码但需要更好地理解我们为何这样做的开发者

    - 需要重温实用开发建议的软件工程毕业生

    - 希望将他们的设计原理与健壮性基本原则联系起来的资深开发者


    本书专注于随时间推移编写软件。如果你的大部分代码是原型、一次性代码或以其他任何方式可丢弃的，那么本书中的建议最终会为你的项目带来不必要的额外工作。同样，如果你的项目很小——比如，少于一百行
    Python 代码。使代码可维护确实会增加复杂性；这是毫无疑问的。然而，我将引导你最小化这种复杂性。如果你的代码存活时间超过几周或增长到相当大的规模，你就需要考虑代码库的可持续性。


    # 关于本书


    本书涵盖了广泛的知识，跨越多个章节。它分为四个部分：


    *第一部分，使用类型为代码添加注解*


    我们将从 Python 中的类型开始。类型是语言的基础，但通常不会被深入探讨。你选择的类型很重要，因为它们传达了非常具体的意图。我们将研究类型注解以及特定注解向开发者传达的信息。我们还将介绍类型检查器以及它们如何帮助及早发现错误。'
