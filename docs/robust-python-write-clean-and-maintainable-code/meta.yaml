    \ functions. In fact, there is an entire Python module dedicated to higher-order\
    \ functions: `functools`. Most of `functools`, as well as any function composition\
    \ you write, will be in the form of decorators."
  - "[PAGE 271]\n\n# Decorators\n\nDecorators are functions that take another function\
    \ and *wrap* it, or specify behavior that must execute before the function executes.\
    \ It provides a way for you to compose functions together without requiring the\
    \ function bodies to know about each other.\n\nDecorators are one of the main\
    \ ways of wrapping functions in Python. I can rewrite the `do_twice` function\
    \ into a more generic `repeat` function like such:\n\n```\ndef repeat(func: Callable,\
    \ times: int = 1) -> Callable:\n    ''' this is a function that calls the wrapped\
    \ function\n        a specified number of times\n    '''\n    def _wrapper(*args,\
    \ **kwargs):\n        for _ in range(times):\n            func(*args, **kwargs)\n\
    \    return _wrapper\n\n@repeat(times=3)\ndef say_hello():\n    print(\"Hello\"\
    )\n\nsay_hello()\n>>> \"Hello\"\n\"Hello\"\n\"Hello\"\n```\n\nOnce again, I've\
    \ separated the policy (saying hello repeatedly) from the mechanisms (actually\
    \ repeating the function calls). That mechanism is something I can use throughout\
    \ other codebases without any repercussions. I can apply this decorator to all\
    \ sorts of functions in my codebase, such as making two hamburger patties at once\
    \ for a double cheeseburger or mass-producing specific orders for a catering event.\n\
    \nOf course, decorators can do so much more than simply repeating a function invocation.\
    \ One of my favorite decorators comes from the `backoff` library. `backoff` helps\
    \ you define *retry logic*, or the actions you take to retry nondeterministic\
    \ parts of your code. Consider the `AutoKitchen` from earlier needing to save\
    \ data in a database. It will save orders taken, current inventory levels, and\
    \ time spent making each dish.\n\nAt its simplest, the code would look like this:\n\
    \n```\n# setting properties of self.*_db objects will\n# update data in the database\n\
    def on_dish_ordered(dish: Dish):\n    dish_db[dish].count += 1\n\ndef save_inventory_counts(inventory):\n\
    \    for ingredient in inventory:\n        inventory_db[ingredient.name] = ingredient.count\n\
    ```"
- md: "## Composing Algorithms\n\nFunctions are not the only small-scale composition\
    \ you can make; you also can compose *algorithms*. Algorithms are a description\
    \ of defined steps needed to solve a problem, like sorting a collection or diffing\
    \ snippets of text. To make an algorithm composable, you again need to divorce\
    \ the policies from the mechanisms.\n\nConsider the meal recommendation for a\
    \ café meal in the last section. Suppose the algorithm is as follows:\n\n### Recommendation\
    \ Algorithm #1\n\n- Look at all daily specials\n- Sort based on number of matching\
    \ surplus ingredients\n- Select the meals with the highest number of surplus ingredients\n\
    - Sort by proximity to last meal ordered\n    (proximity is defined by number\
    \ of ingredients that match)\n- Take only results that are above 75% proximity\n\
    - Return up to top 3 results\n\nIf I wrote this all out with for loops, it might\
    \ look like this:\n\n```python\ndef recommend_meal(last_meal: Meal,\n        \
    \           specials: list[Meal],\n                   surplus: list[Ingredient])\
    \ -> list[Meal]:\n    highest_proximity = 0\n    for special in specials:\n  \
    \      if (proximity := get_proximity(special, surplus)) > highest_proximity:\n\
    \            highest_proximity = proximity\n\n    grouped_by_surplus_matching\
    \ = []\n    for special in specials:\n        if get_proximity(special, surplus)\
    \ == highest_proximity:\n            grouped_by_surplus_matching.append(special)\n\
    \n    filtered_meals = []\n    for meal in grouped_by_surplus_matching:\n    \
    \    if get_proximity(meal, last_meal) > .75:\n            filtered_meals.append(meal)\n\
    \n    sorted_meals = sorted(filtered_meals,\n                          key=lambda\
    \ meal: get_proximity(meal, last_meal),\n                          reverse=True)\n\
    \n    return sorted_meals[:3]\n```\n\nIt's not the prettiest code. If I didn't\
    \ list out the steps in text beforehand, it would take a little longer to understand\
    \ the code and make sure it is bug free. Now, suppose a developer comes to you\
    \ and tells you that not enough customers are picking recommendations and they\
    \ want to try out a different algorithm. The new algorithm goes like this:\n\n\
    ### Recommendation Algorithm #2\n\n- Look at all meals available\n- Sort based\
    \ on proximity to last meal\n- Select the meals with the highest proximity\n-\
    \ Sort the meals by number of surplus ingredients\n- Take only results that are\
    \ a special or have more than 3 surplus ingredients\n- Return up to top 5 results\n\
    \nThe catch is that this developer wants to A/B test these algorithms (and any\
    \ other algorithm they come up with). With A/B testing, they want 75% of customers\
    \ to be presented recommendations from the first algorithm and 25% of customers\
    \ from the second. That way, they can measure how well the new algorithm works\
    \ in relation to the old. This means your codebase has to support both algorithms\
    \ (and be flexible to support new algorithms in the future). You don't want to\
    \ see your codebase littered with ugly recommendation algorithm methods.\n\nYou\
    \ need to apply composability principles to the algorithm itself. Copy-pasting\
    \ the for loop code snippet and tweaking it is not a viable answer. To solve this,\
    \ you once again need to separate your policies and mechanisms. This will help\
    \ you break down the problem and improve the codebase.\n\nYour policy this time\
    \ is the actual details of the algorithm: what you're sorting, how you're filtering,\
    \ and what you're ultimately selecting. The mechanisms are the iteration patterns\
    \ that describe how we're shaping the data. In fact, I've already used an iteration\
    \ mechanism in my code above: sorting. Instead of manually sorting (and forcing\
    \ readers to understand what I'm doing), I used the sorted method. I indicated\
    \ what I want sorted and in the key to sort by, but I really don't care (nor do\
    \ I expect my readers to care) about the actual sorting algorithm.\n\nIf I were\
    \ to compare the two algorithms, I can break down the mechanisms into the following\
    \ (I'll mark policies with <angle brackets>):\n\n- Look at <a list of meals>\n\
    - Sort based on <initial sorting criteria>\n- Select the meals with the <grouping\
    \ criteria>\n- Sort the meals by <secondary sorting criteria>\n- Take top results\
    \ that match <selection criteria>\n- Return up to top <number> results\n\n![](img/d64d2be45ca85b398807d181202e7046_275_0.png)\n\
    \nThe itertools module is a fantastic source of composable algorithms, all centered\
    \ on iteration. It serves as a great example of what you can do when you create\
    \ abstract mechanisms."
  mdcn: "## 组合算法\n\n函数并非你唯一能进行的小规模组合；你还可以组合*算法*。算法是解决问题所需定义步骤的描述，例如对集合排序或比较文本片段的差异。要使算法可组合，你同样需要将策略与机制分离。\n\
    \n考虑上一节中关于咖啡馆餐食的推荐。假设算法如下：\n\n### 推荐算法 #1\n\n- 查看所有每日特餐\n- 根据匹配的剩余食材数量进行排序\n-\
    \ 选择剩余食材数量最多的餐食\n- 按与上次点餐的接近程度排序\n    （接近程度由匹配的食材数量定义）\n- 仅保留接近度高于75%的结果\n- 返回前3个结果\n\
    \n如果我用for循环将所有这些写出来，可能看起来像这样：\n\n```python\ndef recommend_meal(last_meal: Meal,\n\
    \                   specials: list[Meal],\n                   surplus: list[Ingredient])\
    \ -> list[Meal]:\n    highest_proximity = 0\n    for special in specials:\n  \
    \      if (proximity := get_proximity(special, surplus)) > highest_proximity:\n\
    \            highest_proximity = proximity\n\n    grouped_by_surplus_matching\
    \ = []\n    for special in specials:\n        if get_proximity(special, surplus)\
    \ == highest_proximity:\n            grouped_by_surplus_matching.append(special)\n\
    \n    filtered_meals = []\n    for meal in grouped_by_surplus_matching:\n    \
    \    if get_proximity(meal, last_meal) > .75:\n            filtered_meals.append(meal)\n\
    \n    sorted_meals = sorted(filtered_meals,\n                          key=lambda\
    \ meal: get_proximity(meal, last_meal),\n                          reverse=True)\n\
    \n    return sorted_meals[:3]\n```\n\n这代码并不算漂亮。如果我没有事先用文字列出步骤，理解代码并确保其无误会花费更长时间。现在，假设一位开发者找到你，说选择推荐的顾客不够多，他们想尝试不同的算法。新算法如下：\n\
    \n### 推荐算法 #2\n\n- 查看所有可用餐食\n- 根据与上次点餐的接近程度排序\n- 选择接近程度最高的餐食\n- 按剩余食材数量对餐食进行排序\n\
    - 仅保留是特餐或剩余食材超过3种的结果\n- 返回前5个结果\n\n关键在于，这位开发者想要对这些算法（以及他们提出的任何其他算法）进行A/B测试。通过A/B测试，他们希望75%的顾客看到第一个算法的推荐，25%的顾客看到第二个算法的推荐。这样，他们就能衡量新算法相对于旧算法的效果。这意味着你的代码库必须支持两种算法（并且要灵活地支持未来的新算法）。你不会希望看到你的代码库充斥着丑陋的推荐算法方法。\n\
    \n你需要将可组合性原则应用于算法本身。复制粘贴for循环代码片段并进行调整不是一个可行的解决方案。为了解决这个问题，你再次需要分离你的策略和机制。这将帮助你分解问题并改进代码库。\n\
    \n你这次的策略是算法的实际细节：你排序的内容、过滤的方式以及最终选择的内容。机制是描述我们如何塑造数据的迭代模式。事实上，我在上面的代码中已经使用了一种迭代机制：排序。我没有手动排序（并强迫读者理解我在做什么），而是使用了sorted方法。我指出了要排序的内容以及排序的键，但我实际上并不关心（也不期望我的读者关心）实际的排序算法。\n\
    \n如果我要比较这两种算法，我可以将机制分解如下（我将用<尖括号>标记策略）：\n\n- 查看<一组餐食>\n- 根据<初始排序标准>排序\n- 选择具有<分组标准>的餐食\n\
    - 按<次要排序标准>对餐食进行排序\n- 仅保留匹配<选择标准>的前几个结果\n- 返回前<数量>个结果\n\n![](img/d64d2be45ca85b398807d181202e7046_275_0.png)\n\
    \nitertools模块是可组合算法的绝佳来源，所有算法都围绕迭代展开。它很好地展示了当你创建抽象机制时可以实现的功能。"
