  md: "If --strict-optional is set (the default is different depending on the mypy\
    \ version, so be sure to double-check), this code should fail:\n\n```\nfrom typing\
    \ import Optional\nx: Optional[int] = None\nprint(x + 5)\n\ntest.py:3: error:\
    \ Unsupported operand types for + (\"None\" and \"int\")\ntest.py:3: note: Left\
    \ operand is of type \"Optional[int]\"\n```\n\nIt's worth noting that mypy also\
    \ treats None values as Optionals implicitly. I recommend turning this off, so\
