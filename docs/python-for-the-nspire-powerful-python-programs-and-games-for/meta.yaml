  - '[PAGE 12]


    # julian


    This program demonstrates two functions that are very useful for a variety of
    calendar calculations. All other programs in this chapter use one or both of these
    functions.


    jd() calculates the Julian Day Number for a given date in the year range 1582
    to 4000. This is an absolute day number used by astronomers and others to clearly
    designate the sequence for each day, without regard to leap years and other such
    complications.


    Note that for historical reasons, each astronomical day begins at noon Greenwich
    time, so there''s an extra ".5" on these Julian Day Numbers. In the programs presented
    here we add and subtract whole days to find relative dates, and this extra fractional
    part doesn''t really matter. For astronomical calculations this fractional part
    does become important.


    The mdy() function provides a way to convert a Julian Day Number back to a triplet
    of numbers for the month, day, and year for that date. This makes it easy to add
    and subtract days to get a new date accurately, without having to do any complicated
    adjustments for the number of days in each month, or for leap years.


    The example code inputs a date and outputs its Julian Day Number. Next, any Julian
    Day Number is input and the calendar date for that day is output. As shown, December
    17, 1903 has Julian Day Number 2,416,465.5 and Julian Day Number 2,500,000.5 will
    fall on September 1 in the year 2132.'
