  md: '# station_gravity


    In the movie Interstellar, the main characters start their wheel-shaped station
    spinning in space in order to generate an artificial gravity of one G, or the
    same acceleration as we experience on Earth from gravity. They spin up to a certain
    rotational velocity in order for the centrifugal force to reach one G.


    So how fast do they need to spin their station? The three factors are spin rate,
    radius of the rotation, and the G force created at the circumference. This program
    lets you input any two of these, and the third is calculated.


    Search "artificial gravity" in Wikipedia for a much more in-depth explanation
    of how this all works. If g is the number of Gs, r is the radius of spin, and
    s is the number of seconds for one complete rotation, then here''s the formula
    that ties them all together:


    ![](img/fbd07807412dd4a6618493b44ab77f1e_237_0.png)


    For example, I timed the rotation of the station shown in Interstellar with a
    stopwatch. It was spinning approximately 12 seconds per complete revolution. The
    main character stated they were then at one G, so how far out from the center
    of the rotation were they?'
