    # navigate


    This program calculates the distance and bearing between any two points on the
    surface of the Earth.


    It''s easy to find the location of a point on Earth using Google Maps. Zoom in
    to the location, right-click on the point, and select "What''s Here?" from the
    popup menu. That''s a good way to get the latitude and longitude numbers required
    as input for this program.


    The great circle route formula used here is accurate for short distances, such
    as measuring a short stretch of sidewalk in front of a school, and it''s also
    accurate for much longer distances where the spherical shape of the Earth becomes
    very important.


    The location, or GPS coordinates taken from Google Maps, of Dulce, NM and Taos,
    NM are hard coded into the program to test it out. Feel free to change these numbers,
    or to change the program to have it prompt for inputs. The core functionality
