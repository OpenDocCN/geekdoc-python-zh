  md: '# fibonacci


    The fibonacci sequence is fascinating, and this program lets you explore its features
    interactively. Starting with any two integers, where zero and one are often what
    is chosen, if you add them together to add to the list, then add the last two
    numbers on that list to get the next, and so on, you end up with a ratio between
    the last two numbers on the list that approaches the golden ratio.


    Search the Internet to learn more about the golden ratio, as there are a lot of
    curious facts where the explanation at first doesn''t seem reasonable. For example,
    the golden ratio is exactly the same as 2 * sin(54 degrees). The reason has to
    do with a pentagon shape, but I''ll let you discover those details for yourself.


    Another interesting fact is that you don''t need to start with 0 and 1 to form
    a Fibonacci sequence. In fact, you can start with any two numbers, positive or
    negative, integer or float, and the ratio of the last two numbers on the list
    will quickly approach the golden ratio. That''s weird. And you''ve just got to
    try it!


    Here''s the result of starting with 0 and 1, and iterating to grow the sequence
    20 times.'
