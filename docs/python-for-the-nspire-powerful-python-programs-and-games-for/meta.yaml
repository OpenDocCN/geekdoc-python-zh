    # bridge


    Balanced bridge circuits, also called Wheatstone bridges, are used in electronics
    for precision measurements and for other purposes. A common calculation is to
    find the value of one leg of a balanced bridge when the other three legs are known.
    For example, in the following figure we can calculate a value for R4 when R1,
    R2, and R3 are known. These values cause the ammeter across the middle to read
    zero amps. Similarly, a voltmeter across these same two nodes would read zero
    volts.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_24_0.png)


    Here''s the equation relating the four resistors:


    $R1 \times R3 = R2 \times R4$


    Note that the bridge() function uses variables z1 to z3 instead of R1 to R3. This
    is because of an awesome feature of Python, where a variable can just as easily
    contain a complex number as it can a real number. In circuit analysis, complex
    numbers are very useful for AC circuits containing'
