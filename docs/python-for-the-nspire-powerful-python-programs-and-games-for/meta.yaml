  md: '# transform


    Computer graphics games require a lot of high speed math to keep the action realistic
    and smooth. One of the core algorithms is the ability to rotate a point in the
    x,y plane around the origin by some angle. This is a huge simplification of the
    requirements of game programming, but hey, it''s a start!


    The rotate() function lets you pass a point as a list containing its x and y coordinate,
    and a rotation amount in degrees. The coordinate is rotated around the origin
    by the angle converted to radians, and the new coordinate values are returned.


    The translate() function is passed a point plus x and y values for the translation.
    The point is translated to a new location by simple addition of the translation
    amounts. The resulting x and y values are returned.


    For example, the point (2,3) will end up at (6, 7)) after a translation of (4,4),
    and near the point (1.035,3.454) after a rotation of 17 degrees around the origin.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_196_0.png)'
  merge: -1
  pgno: 196
- img_proc: true
  md: "![](img/fbd07807412dd4a6618493b44ab77f1e_197_0.png)\n\n```\nfrom math import\
    \ *\n\ndef translate(p,dx,dy):\n    x,y=p\n    return (x+dx,y+dy)\n\ndef rotate(p,a):\n\
    \    x,y=p\n    r=radians(a)\n    xr=x*cos(r)-y*sin(r)\n    yr=x*sin(r)+y*cos(r)\n\
    \    return (xr,yr)\n\np=[2,3]\ndeg=17\nprint(translate(p,4,4))\nprint(rotate(p,deg))\n\
    ```"
