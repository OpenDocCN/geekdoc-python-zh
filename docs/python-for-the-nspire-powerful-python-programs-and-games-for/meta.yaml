  md: '# rc_timing


    Many common timing circuits are based on an R-C charging configuration, the basics
    of which are shown here:


    ![](img/fbd07807412dd4a6618493b44ab77f1e_46_0.png)


    Capacitor C1 starts out with a voltage at Vi the same as V1. This starting voltage
    V1 is often zero, but it can be any voltage. When the input voltage switches to
    some other voltage V2, the capacitor starts to charge up as current flows into
    (or out of) it through R1. It takes time for the voltage at Vi to ramp up (or
    down) all the way to V2, and the details of this charging time is what this program
    is all about.


    There are six variables in this calculation; the starting applied voltage V1,
    the new applied voltage V2, the instantaneous voltage Vi, the number of seconds
    S since the applied voltage was changed, and the values for resistance R and capacitance
    C that determine the changing rate of the instantaneous voltage. The bigger the
    resistor, the slower the capacitor will charge. The greater the difference between
    the two input voltages the faster the voltage across the capacitor will change.
    And so on. Here is the equation that relates all these parameters:


    $$V_2 - V_i = (V_2 - V_1) \times e^{\frac{-S}{R \times C}}$$'
  merge: -1
  pgno: 46
- img_proc: true
  md: "This program defines a function named rc_timing() that algebraically isolates\
    \ each variable in this equation to find its value when all the other variables\
    \ are known. A second function , named rc() is designed for no other purpose than\
    \ to make entry and display of the results simpler and better. You can use either\
    \ function to get the same results, but I suggest using rc().\n\n```\ndef rc_timing(v1,v2,vi,C,R,t):\n\
    \    if not t:\n        tmp=-log((v2-vi)/(v2-v1))\n        t=tmp*R*C\n    elif\
    \ not R:\n        tmp=-log((v2-vi)/(v2-v1))\n        R=t/C/tmp\n    elif not C:\n\
    \        tmp=-log((v2-vi)/(v2-v1))\n        C=t/R/tmp\n    elif not vi:\n    \
    \    tmp=exp(-t/R/C)\n        vi=v2-tmp*(v2-v1)\n    elif not v2:\n        tmp=exp(-t/R/C)\n\
    \        v2=(tmp*v1-vi)/(tmp-1)\n    elif not v1:\n        tmp=exp(-t/R/C)\n \
    \       v1=(vi+v2*(tmp-1))/tmp\n    return [v1,v2,vi,C,R,t]\n```\n\n```\ndef rc(v1,v2,vi,C,R,t):\n\
    \    v1,v2,vi,C,R,t=rc_timing(v1,v2,vi,C,R,t)\n    print(\"v1: \",v1)\n    print(\"\
    v2: \",v2)\n    print(\"vi: \",vi)\n    print(\"C: \",C)\n    print(\"R: \",R)\n\
    \    print(\"t: \",t)\n```\n\n```\nprint(\"rc(v1,v2,vi,C,R,t)\")\nprint(\"Pass\
    \ 0 for the unknown\")\n```\n\nWhen you run this program the two functions are\
    \ defined but no further action is taken. You can then type into the shell the\
    \ rc() function, passing all six parameters. Any one, and only one, of the arguments\
    \ should be zero, and its value will be calculated using the other five arguments.\n\
    \nFor example, starting with V1 at 0 volts, then applying V2 of 5 volts, how"
  merge: -1
  pgno: 47
