  md: '# coord_3d


    There are three common coordinate systems used to designate a point''s location
    in space. Cartesian coordinates use x,y,z values, similar to x,y in a plane but
    extended into space with a z direction. Cylindrical coordinates use a radius and
    angle in the x,y plane to determine a point directly "below" the point, and a
    z value for the distance to it from the x,y plane. Spherical coordinates use a
    radial distance from the origin, and two angles to determine the angle in the
    x,y plane and the angle away from the z axis.


    In this program the variables x,y,z refer to distances along their respective
    axes. r and th (short for radius and theta) are the radius and angle for cylindrical
    coordinates, and rh, th, ph (short for rho, theta, phi) are used for spherical
    coordinates, where rho is a distance and theta and phi are angles.


    Six functions are provided, allowing conversions from any of the three coordinate
    systems to any of the others. Pass the three known coordinate values and the equivalent
    coordinate values will be returned in a list. Notice in the example source code
    that the three returned values are assigned directly from the returned list into
    separate variables. This is a very nice feature of Python, allowing functions
    to effectively return multiple values.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_206_0.png)'
