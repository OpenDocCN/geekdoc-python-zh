  md: '# newton


    The bin_search program found the roots of a function f(x) using a binary, "split
    in half" search algorithm. This program also finds roots of a function of x, but
    it uses Newton''s method, a really cool algorithm that in many cases finds roots
    extremely efficiently.


    Newton''s method is an iterative method that uses the slope of the function (also
    known as the first derivative) to help aim at where the function crosses the x
    axis. Here''s the formal definition, where f''(x) is the slope, or derivative,
    of f(x).


    ![](img/fbd07807412dd4a6618493b44ab77f1e_135_0.png)


    To demonstrate this program, we''ll find the three roots of the same function
    of x as in the bin_search program:


    ![](img/fbd07807412dd4a6618493b44ab77f1e_135_1.png)


    A quick sketch of this function in your TI-Nspire™ CX II technology calculator
    shows there are three roots between -5 and +12 along the x axis.'
