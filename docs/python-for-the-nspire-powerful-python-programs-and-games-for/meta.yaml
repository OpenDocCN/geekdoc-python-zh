  md: '# days_between_dates


    How many days will you have been on the Earth on your next birthday? This kind
    of question is easy to answer with this program. Two dates are input, they are
    converted to Julian Day Numbers, and the difference between them is output as
    the number of days between the two dates.


    The jd() function is at the core of this program. It is described in more detail
    in the julian program presented in this chapter.


    The sample calculation finds the number of days from the day Orville and Wilbur
    made their first flight (December 17, 1903) and the date of Y2K, or January 1,
    2000. The result is 35,079 days to be exact.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_15_0.png)'
