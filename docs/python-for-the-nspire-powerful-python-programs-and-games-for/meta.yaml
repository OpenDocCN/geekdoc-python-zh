  md: '# key_codes


    The ti_system module provides some useful functions for controlling your programs,
    such as get_key(). get_key() returns a string that is a character representation
    of the key pressed. For example, if the [esc] key is pressed, get_key() returns
    "esc".


    This is clear enough, but it''s hard to guess exactly what string will be returned
    when some of the keys are pressed. as just one example, the [10^x] key returns
    "10power".


    This little program helps you figure out all the codes for all the key presses.
    The program uses a while loop to watch for key presses, printing the string representations
    of all the key presses, stopping only when the [esc] key is pressed.


    Note that there are two ways to call get_key(). If no parameter is passed in the
    parenthesis the function returns instantly. In this program a digit 1 is passed
    to get_key(), causing it to wait until a key is pressed before continuing. This
    works better for what we''re trying to accomplish here, but the instant return
    can be handy in some types of interactive programs.


    Here''s a sample run where a few keys were pressed.'
