  md: "# avg_peak_rms\n\nHomes in the United States are supplied with electrical power\
    \ in the form of a sine wave with an effective voltage of about 117 volts. This\
    \ effective voltage provides the same power in watts to a resistive load as would\
    \ a DC voltage of 117 volts. Effective voltage is also called RMS, which stands\
    \ for \"Root-Mean-Squared\", because of the way it is mathematically derived.\n\
    \nMost of the time we use the effective voltage value, because it is the value\
    \ that allows quick calculation of power to a circuit. But there are two other\
    \ ways to measure a sine wave voltage. The peak voltage, at the very top point\
    \ of the sine wave, provides a \"Peak\" voltage value, and the average magnitude\
    \ of the voltage over time, without regard to polarity, provides the \"Average\"\
    \ voltage value.\n\nHere are the two main conversion equations. All the relationships\
    \ between Peak, Average, and RMS voltages can be figured out by algebraically\
    \ working with these two:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_22_0.png)\n\
    \nThis program provides the conversions between these three ways to describe a\
    \ pure sine wave voltage. Enter the one known value when prompted for it, and\
    \ just press [enter] to skip the other two. The program determines which value\
    \ you've entered, calculates the other two, and outputs all three for easy reference.\n\
    \n```\nfrom math import *\n\ndef ac_voltages(avg,peak,rms):\n    if avg:\n   \
    \     peak=pi*avg/2\n        rms=peak/sqrt(2)\n    elif peak:\n```"
