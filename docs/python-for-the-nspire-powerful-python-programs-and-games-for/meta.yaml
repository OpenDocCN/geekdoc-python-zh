  md: '# deck_of_cards


    This program creates a deck of standard playing cards, shuffles the deck, and
    then deals a hand of as many cards as you wish. The deck consists of 52 cards
    plus any number of joker cards desired.


    At the heart of this program are two functions you might want to use in the creation
    of a more complicated card game. Call deck() to create a shuffled deck, and pass
    this deck (a Python list) to card() to deal cards with no repetition.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_54_0.png)


    In this example a deck with two jokers is created and shuffled, and a hand of
    seven cards is dealt.


    The randrange() function imported from the random module creates a different deck
    every time the program is run.


    ```

    from random import *

    ```'
