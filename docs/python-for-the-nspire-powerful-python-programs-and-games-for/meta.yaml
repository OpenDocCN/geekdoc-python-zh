  md: '# concrete


    A very common problem with construction projects is to determine how many cubic
    yards of concrete to order. Typically, a driveway, sidewalk, or other area is
    measured in feet length and width, and inches in depth. This program takes these
    three values, does the proper conversions to common units, and multiplies them
    to get cubic yards.


    A great challenge to test your Python programming skills is to change this program
    to use all metric units. I kept the units in feet, inches, and cubic yards to
    match the standard units used in the United States.


    For example, the suggested thickness of a passenger car driveway is 4 inches.
    How many cubic yards of concrete will be required for a 12 foot wide driveway
    that is 15 feet long?


    ![](img/fbd07807412dd4a6618493b44ab77f1e_154_0.png)


    ```

    print("Concrete volume")

    h=float(input("Length (ft): "))

    w=float(input("Width (ft): "))

    d=float(input("Depth (in): "))

    yd=round(h*w*d/324,2)

    ```'
