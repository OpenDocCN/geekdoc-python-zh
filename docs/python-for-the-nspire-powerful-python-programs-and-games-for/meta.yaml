    \ and longitude of the Sun's zenith point on the Earth is returned in a list.\
    \ The accuracy of the Sun's position using this algorithm is within about 0.01\
    \ degree of its true location.\n\nFor example, on the 4th of July, 2022 at 12:50:00\
    \ pm in Denver, CO (time zone offset is -6 hours from Greenwich) the Sun will\
    \ be located at about 22.82 degrees north latitude and 101.37 degrees west longitude.\
    \ A quick check on Google Maps shows this spot to be in the middle of Mexico,\
    \ just north of San Luis Potosi.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_242_0.png)\n\
    \n```python\nfrom math import *\n\ndef sunloc(when):\n    ye,mo,da,ho,mi,se,tz=when\n\
    \    ta=pi*2\n    ut=ho-tz+mi/60+se/3600\n    t=367*ye-7*(ye+(mo+9)//12)//4\n\
