- md: "## 7. Other Useful Programs\n\nThis chapter presents a few programs that were\
    \ fun to create, but didn't neatly fit into any of the other chapters. One concrete\
    \ example is a program that calculates cubic yards of concrete. Another chilling\
    \ example calculates wind chill index. There's even a secret program I won't tell\
    \ you about here. Go discover it for yourself!\n\n## concrete\n\nA very common\
    \ problem with construction projects is to determine how many cubic yards of concrete\
    \ to order. Typically, a driveway, sidewalk, or other area is measured in feet\
    \ length and width, and inches in depth. This program takes these three values,\
    \ does the proper conversions to common units, and multiplies them to get cubic\
    \ yards.\n\nA great challenge to test your Python programming skills is to change\
    \ this program to use all metric units. I kept the units in feet, inches, and\
    \ cubic yards to match the standard units used in the United States.\n\nFor example,\
    \ the suggested thickness of a passenger car driveway is 4 inches. How many cubic\
    \ yards of concrete will be required for a 12 foot wide driveway that is 15 feet\
    \ long?\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_154_0.png)\n\n```\nprint(\"\
    Concrete volume\")\nh=float(input(\"Length (ft): \"))\nw=float(input(\"Width (ft):\
    \ \"))\nd=float(input(\"Depth (in): \"))\nyd=round(h*w*d/324,2)\nprint(\"Cubic\
    \ yards:\",yd)\n```\n\n## key_codes\n\nThe ti_system module provides some useful\
    \ functions for controlling your programs, such as get_key(). get_key() returns\
    \ a string that is a character representation of the key pressed. For example,\
    \ if the [esc] key is pressed, get_key() returns \"esc\".\n\nThis is clear enough,\
    \ but it's hard to guess exactly what string will be returned when some of the\
    \ keys are pressed. as just one example, the [10^x] key returns \"10power\".\n\
    \nThis little program helps you figure out all the codes for all the key presses.\
    \ The program uses a while loop to watch for key presses, printing the string\
    \ representations of all the key presses, stopping only when the [esc] key is\
    \ pressed.\n\nNote that there are two ways to call get_key(). If no parameter\
    \ is passed in the parenthesis the function returns instantly. In this program\
    \ a digit 1 is passed to get_key(), causing it to wait until a key is pressed\
    \ before continuing. This works better for what we're trying to accomplish here,\
    \ but the instant return can be handy in some types of interactive programs.\n\
    \nHere's a sample run where a few keys were pressed.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_157_0.png)\n\
    \n```\nfrom ti_system import *\n\nwhile True:\n    k=get_key(1)\n    print(k)\n\
    \    if k==\"esc\":\n        break\n```\n\n## laser_distance\n\nIf you have a\
    \ little laser distance measuring device (they're a lot of fun) you can use it\
    \ along with this program to measure distances along hard to reach lines.\n\n\
    For example, let's say you want to measure the height of a wall, from floor to\
    \ ceiling, but you don't want to get on a ladder. You can measure the distance\
    \ from your eye level, where you hold the laser device, to the floor, then to\
    \ the wall in front of you at eye level, and then to the top edge of the wall.\
    \ These are marked as points a, b, and c on this diagram:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_158_0.png)\n\
    \nIf the distance to a is 9 feet 3 inches, to b is 7 feet 9 inches, and to c is\
    \ 12 feet 10 inches, then the program calculates the height of the wall from a\
    \ to c as 14 feet 10 inches.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_159_0.png)\n\
    \nEnter the three distances sequentially, in the order they appear along the line\
    \ you are measuring. Even if the first or last measurement is the one that's perpendicular\
    \ to the line, the distance between the non-perpendicular points will always be\
    \ calculated correctly.\n\nFor example, let's say you have a giant painting on\
    \ a high wall and you want to measure its height, something like measuring b to\
    \ c in this diagram:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_160_0.png)\n\n\
    In this case, enter the distances to a, b, and c in that order (or in c, b, a\
    \ order - just keep them sequential along the line.) In this case the distance\
    \ b to c will be calculated. Here's a sample run showing a calculated height from\
    \ b to c of 10 feet 8 inches.\n\n```\n>>>from laser_distance import *\nEnter 'ft\
    \ in' to 3 pts in\na row, where one point is\nperpendicular...\nDistance a ...\
    \ ft in: 8 1\nDistance b ... ft in: 9 2\nDistance c ... ft in: 17 0\nDistance\
    \ between the two\nnon-perpendicular points:\nft in: 10 8\n>>>\n```\n\n```\nprint(\"\
    Enter 'ft in' to 3 pts in\")\nprint(\"a row, where one point is\")\nprint(\"perpendicular...\"\
    )\n\na=input(\"Distance a ... ft in: \")\na=(a.strip()+' 0').split()\na=float(a[0])+float(a[1])/12\n\
    \nb=input(\"Distance b ... ft in: \")\nb=(b.strip()+' 0').split()\nb=float(b[0])+float(b[1])/12\n\
    \nc=input(\"Distance c ... ft in: \")\nc=(c.strip()+' 0').split()\nc=float(c[0])+float(c[1])/12\n\
    \nft=0\n\nif a>b and b<c:\n    d=(a*a-b*b)**0.5\n    e=(c*c-b*b)**0.5\n    ft=d+e\n\
    \nif a<b and b<c:\n    d=(b*b-a*a)**0.5\n    e=(c*c-a*a)**0.5\n    ft=e-d\n\n\
    if a>b and b>c:\n    d=(b*b-c*c)**0.5\n    e=(a*a-c*c)**0.5\n    ft=e-d\n\nfeet=int(ft)\n\
    inch=round((ft-feet)*12)\nprint(\"Distance between the two\")\nprint(\"non-perpendicular\
    \ points:\")\nprint('ft in: ',feet,inch)\n```\n\n## miles_per_hour\n\nYour TI-Nspire™\
    \ CX II technology calculator has a clock on board (not all calculators can tell\
    \ date and time.) By using the get_key() function first described in the get_key\
    \ program earlier in this chapter, you can create a type of stopwatch. You press\
    \ one key to start timing as you pass a mile marker in the automobile you are\
    \ riding in, and press any other key when you pass the next mile marker. A little\
    \ math in the program then calculates the average miles per hour.\n\nTwo important\
    \ details to note. First, don't drive and run Python at the same time! Let someone\
    \ else do the driving while you check their speed. Second, this provides the average\
    \ speed while traveling the mile. It is quite possible to drive 40 miles per hour\
    \ for part of the mile, and 60 miles per hour the rest of the mile, and average\
    \ out at 50 miles per hour. Just keep that in mind.\n\nA challenge to consider\
    \ is to modify the program for metric measurements. Just how fast is the car going\
    \ in km/h over a 1 km (or a 1 miles distance if there are only mile markers) stretch\
    \ of road?\n\nHere's a sample run, where the mile took about 55 seconds.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_163_0.png)\n\
    \n```\nfrom ti_system import *\n\nprint(\" \")\nprint(\"Press any key at first\
    \ milepost\")\nget_key(1)\nt1=get_time_ms()\nprint(\"Press any key at next milepost\"\
    )\nget_key(1)\nt2=get_time_ms()\ns=(t2-t1)/1000\nh=s/3600\nmph=round(1/h)\nprint(\"\
    MPH: \",mph)\n```\n\n## secret\n\nThis program lets you encrypt and decrypt secret\
    \ messages. The action is a little cumbersome, but for short messages, such as\
    \ a password used elsewhere that you want to keep safe, this program does provide\
    \ a fairly high level of security.\n\nFor example, let's encrypt the spy-talk\
    \ phrase \"The dew is on the roses\" using a key of \"abc123\". First, select\
    \ 1 to do an encryption, enter the phrase, then enter the key.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_164_0.png)\n\
    \nThe encrypted data is displayed as blocks of six hexadecimal characters. That's\
    \ the data you will write down and save away, or send to your spy buddy somewhere.\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_165_0.png)\n\nTo decrypt the message,\
    \ choose 2 to start a decryption. At each \"Sec?\" prompt enter one secret block\
    \ of encrypted hexadecimal characters. Lower case is okay, and that actually makes\
    \ it easier to type them in.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_166_0.png)\n\
    \nContinue until all the code blocks are entered. Note that in some cases the\
    \ last block might have fewer than four characters, but that's okay, just enter\
    \ what was displayed after the encryption.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_167_0.png)\n\
    \nOnce the last block is entered, press [enter] one last time to get to the prompt\
    \ for the Key. Enter the secret key (you and your spy buddy will keep this key\
    \ secret), and the original message will pop up after a bit of processing."
  mdcn: "## 7. 其他实用程序\n\n本章介绍了一些创建起来很有趣，但不太适合归入其他章节的程序。一个具体的例子是计算混凝土立方码的程序。另一个令人不寒而栗的例子是计算风寒指数。甚至还有一个我不会在这里透露的秘密程序。自己去发现它吧！\n\
    \n## concrete（混凝土计算）\n\n建筑项目中一个非常常见的问题是确定需要订购多少立方码的混凝土。通常，车道、人行道或其他区域的长度和宽度以英尺为单位测量，深度以英寸为单位测量。该程序接受这三个值，进行适当的单位换算，然后将它们相乘以得到立方码数。\n\
    \n测试你 Python 编程技能的一个绝佳挑战是修改此程序以使用所有公制单位。我保留了英尺、英寸和立方码的单位，以匹配美国使用的标准单位。\n\n例如，乘用车道的建议厚度为\
    \ 4 英寸。一条 12 英尺宽、15 英尺长的车道需要多少立方码的混凝土？\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_154_0.png)\n\
    \n```\nprint(\"Concrete volume\")\nh=float(input(\"Length (ft): \"))\nw=float(input(\"\
    Width (ft): \"))\nd=float(input(\"Depth (in): \"))\nyd=round(h*w*d/324,2)\nprint(\"\
    Cubic yards:\",yd)\n```\n\n## key_codes（按键代码）\n\n`ti_system` 模块提供了一些用于控制程序的有用函数，例如\
    \ `get_key()`。`get_key()` 返回一个字符串，该字符串是按键的字符表示。例如，如果按下 [esc] 键，`get_key()` 返回\
    \ \"esc\"。\n\n这很清楚，但很难猜测按下某些键时会返回什么字符串。仅举一例，[10^x] 键返回 \"10power\"。\n\n这个小程序可以帮助你弄清楚所有按键的所有代码。该程序使用\
    \ `while` 循环来监视按键，打印所有按键的字符串表示，仅在按下 [esc] 键时停止。\n\n请注意，有两种方式调用 `get_key()`。如果括号内没有传递参数，函数会立即返回。在此程序中，向\
    \ `get_key()` 传递了一个数字 1，导致它在继续之前等待按键。这对于我们在此处尝试完成的任务效果更好，但即时返回在某些类型的交互式程序中可能很方便。\n\
    \n这是一个按下了几个键的示例运行。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_157_0.png)\n\n\
    ```\nfrom ti_system import *\n\nwhile True:\n    k=get_key(1)\n    print(k)\n\
    \    if k==\"esc\":\n        break\n```\n\n## laser_distance（激光测距）\n\n如果你有一个小型激光测距仪（它们非常有趣），你可以将其与本程序一起使用，以测量难以到达的线条上的距离。\n\
    \n例如，假设你想测量一堵墙的高度，从地板到天花板，但你不想爬梯子。你可以测量从你眼睛的高度（你手持激光设备的位置）到地板的距离，然后到你面前与眼睛齐平的墙壁的距离，最后到墙壁顶部边缘的距离。这些在图中标记为点\
    \ a、b 和 c：\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_158_0.png)\n\n如果到 a 的距离是\
    \ 9 英尺 3 英寸，到 b 是 7 英尺 9 英寸，到 c 是 12 英尺 10 英寸，那么程序会计算从 a 到 c 的墙壁高度为 14 英尺 10 英寸。\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_159_0.png)\n\n按顺序输入三个距离，顺序与它们在你测量的线上出现的顺序相同。即使第一个或最后一个测量值是垂直于该线的，非垂直点之间的距离也总是会被正确计算。\n\
    \n例如，假设你在高墙上有一幅巨大的画作，你想测量它的高度，类似于在此图中测量 b 到 c：\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_160_0.png)\n\
    \n在这种情况下，按 a、b、c 的顺序（或 c、b、a 的顺序——只需保持它们沿直线顺序）输入到 a、b 和 c 的距离。在这种情况下，将计算 b 到 c\
    \ 的距离。这是一个示例运行，显示从 b 到 c 的计算高度为 10 英尺 8 英寸。\n\n```\n>>>from laser_distance import\
    \ *\nEnter 'ft in' to 3 pts in\na row, where one point is\nperpendicular...\n\
    Distance a ... ft in: 8 1\nDistance b ... ft in: 9 2\nDistance c ... ft in: 17\
    \ 0\nDistance between the two\nnon-perpendicular points:\nft in: 10 8\n>>>\n```\n\
    \n```\nprint(\"Enter 'ft in' to 3 pts in\")\nprint(\"a row, where one point is\"\
    )\nprint(\"perpendicular...\")\n\na=input(\"Distance a ... ft in: \")\na=(a.strip()+'\
    \ 0').split()\na=float(a[0])+float(a[1])/12\n\nb=input(\"Distance b ... ft in:\
    \ \")\nb=(b.strip()+' 0').split()\nb=float(b[0])+float(b[1])/12\n\nc=input(\"\
    Distance c ... ft in: \")\nc=(c.strip()+' 0').split()\nc=float(c[0])+float(c[1])/12\n\
    \nft=0\n\nif a>b and b<c:\n    d=(a*a-b*b)**0.5\n    e=(c*c-b*b)**0.5\n    ft=d+e\n\
    \nif a<b and b<c:\n    d=(b*b-a*a)**0.5\n    e=(c*c-a*a)**0.5\n    ft=e-d\n\n\
    if a>b and b>c:\n    d=(b*b-c*c)**0.5\n    e=(a*a-c*c)**0.5\n    ft=e-d\n\nfeet=int(ft)\n\
    inch=round((ft-feet)*12)\nprint(\"Distance between the two\")\nprint(\"non-perpendicular\
    \ points:\")\nprint('ft in: ',feet,inch)\n```\n\n## miles_per_hour（英里每小时）\n\n\
    你的 TI-Nspire™ CX II 技术计算器内置时钟（并非所有计算器都能显示日期和时间）。通过使用本章前面 `get_key` 程序中首次介绍的 `get_key()`\
    \ 函数，你可以创建一种秒表。当你乘坐的汽车经过一个里程标记时，按下一个键开始计时，当你经过下一个里程标记时，按下任何其他键。程序中的一点数学运算会计算出平均英里每小时。\n\
    \n有两个重要细节需要注意。首先，不要一边开车一边运行 Python！让别人开车，而你检查他们的速度。其次，这提供了行驶一英里期间的平均速度。很可能在部分路程以\
    \ 40 英里/小时的速度行驶，其余路程以 60 英里/小时的速度行驶，平均速度为 50 英里/小时。请记住这一点。\n\n一个值得考虑的挑战是修改程序以适应公制测量。在\
    \ 1 公里（或如果只有英里标记则为 1 英里）的路段上，汽车的速度到底是多少公里/小时？\n\n这是一个示例运行，行驶一英里大约用了 55 秒。\n\n\
    ![](img/fbd07807412dd4a6618493b44ab77f1e_163_0.png)\n\n```\nfrom ti_system import\
    \ *\n\nprint(\" \")\nprint(\"Press any key at first milepost\")\nget_key(1)\n\
    t1=get_time_ms()\nprint(\"Press any key at next milepost\")\nget_key(1)\nt2=get_time_ms()\n\
    s=(t2-t1)/1000\nh=s/3600\nmph=round(1/h)\nprint(\"MPH: \",mph)\n```\n\n## secret（秘密）\n\
    \n此程序允许你加密和解密秘密消息。操作有点繁琐，但对于短消息，例如你想安全保存的其他地方使用的密码，此程序确实提供了相当高的安全性。\n\n例如，让我们使用密钥\
    \ \"abc123\" 加密间谍用语 \"The dew is on the roses\"。首先，选择 1 进行加密，输入短语，然后输入密钥。\n\n\
    ![](img/fbd07807412dd4a6618493b44ab77f1e_164_0.png)\n\n加密数据显示为六位十六进制字符块。这是你需要记下并保存，或发送给某处间谍伙伴的数据。\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_165_0.png)\n\n要解密消息，选择 2 开始解密。在每个 \"\
    Sec?\" 提示符下，输入一个加密的十六进制字符秘密块。小写字母也可以，这实际上更容易输入。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_166_0.png)\n\
    \n继续输入，直到所有代码块都输入完毕。请注意，在某些情况下，最后一个块可能少于四个字符，但没关系，只需输入加密后显示的内容即可。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_167_0.png)\n\
