    dp=float(input("Monthly deposit: "))

    ir=float(input("Interest rate: "))

    yr=float(input("Years: "))

    ir/=1200

    mo=yr*12

    fv=dp*((ir+1)**mo-1)/ir

    print("Future value: ${:,.2f}".format(fv))

