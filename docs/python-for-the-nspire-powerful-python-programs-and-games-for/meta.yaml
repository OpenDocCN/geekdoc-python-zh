  md: '# heads_in_a_row


    On the average, how many times do you need to flip a coin to get seven heads in
    a row? This can be solved with an explicit mathematical formula, as shown in the
    last line of this program, but it''s much more fun to have your calculator simulate
    a whole bunch of flips in a row to get an approximate answer. The more trials
    you do, or the more times you flip the coin, the more accurate the answer gets,
    on the average of course. This is a good example of a Monte Carlo simulation,
    where a lot of random trials can be run in a computer to get closer and closer
    to an accurate real-world answer.


    In this case, it is predicted mathematically that it takes an average of 254 flips
    of a coin in a row to get seven heads in a row. Some times less, some times more,
    but on the average it works out to 254 flips.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_67_0.png)


    The program uses the random module to generate random flips of a coin, counting
    up every time a head shows up, resetting the count when a tail shows up, and stopping
    each trial when seven heads in a row finally show up. As shown, after 200 trials,
    it took an average of 242.48 flips to get seven'
