  md: '# monty_hall


    Have you heard of the famous Monty Hall puzzle? It''s a doozy, and it baffled
    some top minds when it was first discussed.


    So, Monty shows you three doors, and states there''s a car behind one of them.
    You guess one of the doors. Before opening your door to see if you won, Monty
    opens one of the other two doors, where nothing is behind that door. Then he asks
    if you want to switch with the last door before the big reveal. Should you switch?
    Will it make any difference?


    Many people say that since there are two unopened doors left, there''s a fifty-fifty
    chance the car is behind either one. So it won''t matter if you switch before
    Monty opens your door. But it turns out that is wrong!


    This program performs a Monte Carlo simulation (this Monte is unrelated to the
    other Monty, or to the Full Monty for that matter, but that s another story.)
    The program simulates you being asked 1000 times by Monty if you want to switch,
    and it tallies the number of times you win the car if you do switch and if you
    don t switch.


    If you do switch, your odds of winning are 2 times out of 3, and if you don t
    switch your odds are 1 out of 3. In summary, the odds are in your favor, if you
    make that switch!


    If this result baffles you, read up on the Internet about the "Monty Hall Problem",
    or watch any of the several Youtube videos that cover the subject. Meanwhile,
    have fun simulating a bunch of wins with your TI-Nspire™ CX II technology calculator!'
