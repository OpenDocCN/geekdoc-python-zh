- md: "## frequency_wavelength\n\nThe electromagnetic spectrum covers a wide range\
    \ of phenomena, such as radio waves, x-rays, visible light, infra-red light, microwaves,\
    \ and so on. Each of these features falls into a band of frequencies, each frequency\
    \ has a specific wavelength, and they all travel in free space at the speed of\
    \ light.\n\nFrequency in Hertz and Wavelength in meters are the exact inverse\
    \ of each other. They are both a function of the speed of light. Here's the simplest\
    \ equation that ties all this together, where C is the speed of light:\n\n$C =\
    \ 299,792,458 \\text{ m/s}$\n\n$C = \\text{Wavelength} \\times \\text{Frequency}$\n\
    \nMost of the time, wavelength and frequency are expressed in engineering notation,\
    \ where the power of ten is a multiple of three. This notation converts easily\
    \ to prefixes such as kilo, Mega, nano, and others, making it easier to grasp\
    \ the magnitude of the value. The first function in this program, named eng(),\
    \ formats numbers into engineering notation with any desired number of significant\
    \ digits. You might want to isolate this function into a module for use in other\
    \ programs you create.\n\n```\nfrom math import *\n\ndef eng(x,d):\n    x=abs(x)\n\
    \    if x==0:\n        return \"0.0\"\n    exp=floor(log10(x))\n    mant=x/10**exp\n\
    \    r = round(mant,d-1)\n    x = r*pow(10.0,exp)\n    p = int(floor(log10(x)))\n\
    \    p3 = p//3\n    value=x/pow(10.0,3*p3)\n    s=\"{:f}\".format(value)\n   \
    \ if s[d]!=\".\":\n        s=s[0:d+1]\n    else:\n        s=s[0:d]\n    if p3!=0:\n\
    \        return \"{}e{:d}\".format(s,3*p3)\n    else:\n        return \"{}\".format(s)\n\
    \nc,f,w=299792458,0,0\nprint(\"\\nEnter known value...\")\nf=input(\"Frequency:\
    \ \")\nf=float(f) if f else 0\nif f==0:\n    w=input(\"Wavelength (m): \")\n \
    \   w=float(w) if w else 0\nif w!=0:\n    f=c/w\nif f!=0:\n    w=c/f\ndigits=5\n\
    print(\"\\nFrequency:\")\nprint(\"{} Hz\".format(eng(f,digits)))\nprint(\"\\nWavelength:\"\
    )\nprint(\"{} meters\".format(eng(w,digits)))\n```\n\nThis program prompts for\
    \ a frequency, then for a wavelength if you skip entering a value for frequency\
    \ by pressing [enter] without entering a number. The unknown value in either case\
    \ is calculated, both values are formatted into engineering notation, and the\
    \ results are output to your calculator's display.\n\nTwo example runs are shown,\
    \ the first where a frequency is the known, and second where a wavelength is the\
    \ known value. In the first example the frequency of the Helium \"People's Network\"\
    \ for the Internet of Things (IOT) is entered to calculate its wavelength. 915\
    \ megahertz has a wavelength of a little less than a third of a meter.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_33_0.png)\n\
    \nIn this second example we skip the frequency input and then enter 5 to calculate\
    \ the frequency when the wavelength is exactly 5 meters. The frequency is just\
    \ a tad less than 60 megahertz.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_34_0.png)\n\
    \nNote that the variable named digits, near the end of the program, is set to\
    \ five. Change this value if you want higher or lower precision in your answers.\n\
    \nFor easy reference, here's a list of the metric prefixes for the various engineering\
    \ notation powers of ten:\n\n| Symbol | Name | Value | Symbol | Name | Value |\n\
    | :--- | :--- | :--- | :--- | :--- | :--- |\n| Y | Yotta | 10^24 | y | yocto |\
    \ 10^-24 |\n| Z | Zetta | 10^21 | z | zepto | 10^-21 |\n| E | Exa | 10^18 | a\
    \ | atto | 10^-18 |\n| P | Peta | 10^15 | f | femto | 10^-15 |\n| T | Tera | 10^12\
    \ | p | pico | 10^-12 |\n| G | Giga | 10^9 | n | nano | 10^-9 |\n| M | Mega |\
    \ 10^6 | μ | micro | 10^-6 |\n| k | kilo | 10^3 | m | milli | 10^-3 |\n\n## led_resistor\n\
    \nLEDs are awesome. Once you know how to power them properly, you can light up\
    \ all kinds of fun artwork, gadgets, and inventions in any color and blinking\
    \ patterns imaginable. For example, the author invented a brake light for bicycles\
    \ that requires no wiring to the brakes at all, instead relying on an accelerometer\
    \ chip to determine when to flash bright red LEDs to indicate deceleration. Check\
    \ out LucidBrakes™ online.\n\nAn LED is a special type of diode, where current\
    \ flows easily in one direction through it, and not in the other direction. To\
    \ light up an LED you need to use a resistor to limit the amount of current allowed\
    \ to flow in the \"easy\" direction. This program helps you calculate the size\
    \ of that resistor. It also helps determine the current and power requirements,\
    \ to make sure no magic smoke is emitted from anything!\n\nThe standard way to\
    \ wire up an LED is with a resistor in series, and a voltage source powering them\
    \ both:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_35_0.png)\n\nHere are the\
    \ equations that tie together all the calculations we'll need in the program,\
    \ where Vs is the source voltage, Vf is the forward voltage across the LED, Vr\
    \ is the voltage across the resistor, i is the current in amps through everything,\
    \ Wr is the watts of power in the resistor, and Wf is the watts of power in the\
    \ LED.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_36_0.png)\n\nHere's the program\
    \ listing:\n\n```\ndef led_resistor(Vs,Vf,i):\n    r=(Vs-Vf)/i\n    Wr=(Vs-Vf)*i\n\
    \    Wl=Vf*i\n    return [r,Wr,Wl]\n\ndef led_current(Vs,Vf,r):\n    i=(Vs-Vf)/r\n\
    \    Wr=(Vs-Vf)*i\n    Wl=Vf*i\n    return [i,Wr,Wl]\n\nVs=float(input(\"Source\
    \ Vs: \"))\nVf=float(input(\"LED Vf: \"))\nprint(\"\\nNow enter one of these two...\"\
    )\ni=input(\"Current in amps: \")\ni=float(i) if i else 0\nr=input(\"LED resistor\
    \ in ohms: \")\nr=float(r) if r else 0\nif i:\n    r,Wr,Wl=led_resistor(Vs,Vf,i)\n\
    else:\n    i,Wr,Wl=led_current(Vs,Vf,r)\nprint(\"\\nVs: \",Vs)\nprint(\"Vf: \"\
    ,Vf)\nprint(\"R: {} ohms\".format(r))\nprint(\"i: {} amps\".format(i))\nprint(\"\
    Wres: {} watts\".format(Wr))\nprint(\"Wled: {} watts\".format(Wl))\n```\n\nThe\
    \ following two example runs first find the approximate value for a resistor when\
    \ the current is known, and the second example calculates the current when a standard\
    \ resistor is selected for the circuit.\n\nIn both cases you enter the source\
    \ voltage and the LED forward voltage (this Vf varies for LED types), and then\
    \ enter either the current in amps or the resistor value in ohms.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_37_0.png)\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_38_0.png)\n\nFor a circuit powered\
    \ with 12 volts, an LED with a forward voltage drop of 2.4 volts with 25 mA of\
    \ current through it requires an approximate resistor size of 384 ohms.\n\nThe\
    \ next run, with a voltage source of 9 volts and an LED forward voltage drop of\
    \ 2.3 volts and a standard resistor value of 270 ohms, results in a current of\
    \ about 24.8 milliamps.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_39_0.png)\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_39_1.png)\n\nIt's important not to\
    \ burn out the resistor or the LED in your circuit.\n\nResistors have a stated\
    \ wattage, and they'll be okay if Wres is less than this value. In our example,\
    \ the resistor is heated with about 0.17 watts of power, so a standard quarter\
    \ watt (0.25 watts) resistor should work fine. LEDs have a stated maximum current,\
    \ which you can also check with these results.\n\n## ohms_laws\n\nThe subject\
    \ of electricity and electronics is full of equations and formulas, but by far\
    \ the two most important equations are what we call \"Ohm's Laws\". If you learn\
    \ only how to work with the following two simple equations, you'll know enough\
    \ to be considered an electronics whiz by most everyone you know.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_41_0.png)\n\
    \nThe first equation states that voltage (Electromagnetic force) is equal to current\
    \ in amps (I) times resistance in ohms (R). The second equation states that wattage\
    \ (Power) is equal to current in amps times voltage.\n\nIt's easy to algebraically\
    \ rearrange these two equations to calculate the unknowns when any two values\
    \ are known. This program prompts you to enter any two of these four values, the\
    \ other two quantities will be calculated, and all four values will be output.\n\
    \nThis program defines a function named ohms_laws(), prints some instructions\
    \ for your review, and then stops. From then on you call the new function to calculate\
    \ all four values when any two are known.\n\nFor example, consider a 60 watt light\
    \ bulb powered by standard household 117 volts. Enter zeros for the two unknowns,\
    \ current and resistance, and the function will find these values. The current\
    \ is about half an amp, and the resistance of the bulb is about 228 ohms."
  mdcn: "## 频率与波长\n\n电磁波谱涵盖了广泛的现象，例如无线电波、X射线、可见光、红外光、微波等等。这些现象中的每一种都属于一个特定的频率范围，每个频率都有一个特定的波长，并且它们在自由空间中都以光速传播。\n\
    \n以赫兹为单位的频率和以米为单位的波长互为精确的倒数关系。它们都是光速的函数。以下是将所有这些联系在一起的最简单方程，其中C是光速：\n\n$C = 299,792,458\
    \ \\text{ m/s}$\n\n$C = \\text{波长} \\times \\text{频率}$\n\n大多数情况下，波长和频率以工程记数法表示，其中10的幂是3的倍数。这种记数法可以轻松转换为千、兆、纳等前缀，从而更容易理解数值的大小。本程序中的第一个函数名为`eng()`，它将数字格式化为具有任意所需有效位数的工程记数法。你可能希望将此函数单独放入一个模块中，以便在你创建的其他程序中使用。\n\
    \n```\nfrom math import *\n\ndef eng(x,d):\n    x=abs(x)\n    if x==0:\n     \
    \   return \"0.0\"\n    exp=floor(log10(x))\n    mant=x/10**exp\n    r = round(mant,d-1)\n\
    \    x = r*pow(10.0,exp)\n    p = int(floor(log10(x)))\n    p3 = p//3\n    value=x/pow(10.0,3*p3)\n\
    \    s=\"{:f}\".format(value)\n    if s[d]!=\".\":\n        s=s[0:d+1]\n    else:\n\
    \        s=s[0:d]\n    if p3!=0:\n        return \"{}e{:d}\".format(s,3*p3)\n\
    \    else:\n        return \"{}\".format(s)\n\nc,f,w=299792458,0,0\nprint(\"\\\
    nEnter known value...\")\nf=input(\"Frequency: \")\nf=float(f) if f else 0\nif\
    \ f==0:\n    w=input(\"Wavelength (m): \")\n    w=float(w) if w else 0\nif w!=0:\n\
    \    f=c/w\nif f!=0:\n    w=c/f\ndigits=5\nprint(\"\\nFrequency:\")\nprint(\"\
    {} Hz\".format(eng(f,digits)))\nprint(\"\\nWavelength:\")\nprint(\"{} meters\"\
    .format(eng(w,digits)))\n```\n\n此程序会提示输入频率，如果你通过按[回车]而不输入数字来跳过频率输入，则会提示输入波长。无论哪种情况，未知值都会被计算出来，两个值都会被格式化为工程记数法，结果会输出到你的计算器显示屏上。\n\
    \n示例运行展示了两种情况：第一种是已知频率，第二种是已知波长。在第一个示例中，输入了氦“人民网络”物联网的频率来计算其波长。915兆赫兹的波长略小于三分之一米。\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_33_0.png)\n\n在第二个示例中，我们跳过频率输入，然后输入5来计算当波长恰好为5米时的频率。频率略低于60兆赫兹。\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_34_0.png)\n\n请注意，程序末尾附近名为`digits`的变量被设置为五。如果你想获得更高或更低的答案精度，请更改此值。\n\
    \n为方便参考，以下是各种工程记数法10的幂对应的公制前缀列表：\n\n| 符号 | 名称 | 值 | 符号 | 名称 | 值 |\n| :--- | :---\
    \ | :--- | :--- | :--- | :--- |\n| Y | 尧 (Yotta) | 10^24 | y | 幺 (yocto) | 10^-24\
    \ |\n| Z | 泽 (Zetta) | 10^21 | z | 仄 (zepto) | 10^-21 |\n| E | 艾 (Exa) | 10^18\
    \ | a | 阿 (atto) | 10^-18 |\n| P | 拍 (Peta) | 10^15 | f | 飞 (femto) | 10^-15 |\n\
    | T | 太 (Tera) | 10^12 | p | 皮 (pico) | 10^-12 |\n| G | 吉 (Giga) | 10^9 | n |\
    \ 纳 (nano) | 10^-9 |\n| M | 兆 (Mega) | 10^6 | μ | 微 (micro) | 10^-6 |\n| k | 千\
    \ (kilo) | 10^3 | m | 毫 (milli) | 10^-3 |\n\n## LED电阻计算\n\nLED非常棒。一旦你知道如何正确地为它们供电，你就可以用任何你能想象到的颜色和闪烁模式点亮各种有趣的艺术品、小工具和发明。例如，作者发明了一种自行车刹车灯，它完全不需要连接到刹车线，而是依靠加速度计芯片来判断何时闪烁明亮的红色LED以指示减速。可以在网上查看LucidBrakes™。\n\
    \nLED是一种特殊类型的二极管，电流可以很容易地沿一个方向流过它，而另一个方向则不行。要点亮LED，你需要使用一个电阻来限制在“容易”方向上允许流过的电流量。此程序可帮助你计算该电阻的大小。它还有助于确定电流和功率要求，以确保任何部件都不会冒出神奇的烟雾！\n\
    \n连接LED的标准方法是串联一个电阻，并由一个电压源为它们供电：\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_35_0.png)\n\
    \n以下是将我们在程序中需要的所有计算联系在一起的方程，其中Vs是电源电压，Vf是LED两端的正向电压，Vr是电阻两端的电压，i是流过所有部件的电流（单位为安培），Wr是电阻的功率（单位为瓦特），Wf是LED的功率（单位为瓦特）。\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_36_0.png)\n\n以下是程序清单：\n\n```\ndef led_resistor(Vs,Vf,i):\n\
    \    r=(Vs-Vf)/i\n    Wr=(Vs-Vf)*i\n    Wl=Vf*i\n    return [r,Wr,Wl]\n\ndef led_current(Vs,Vf,r):\n\
    \    i=(Vs-Vf)/r\n    Wr=(Vs-Vf)*i\n    Wl=Vf*i\n    return [i,Wr,Wl]\n\nVs=float(input(\"\
    Source Vs: \"))\nVf=float(input(\"LED Vf: \"))\nprint(\"\\nNow enter one of these\
    \ two...\")\ni=input(\"Current in amps: \")\ni=float(i) if i else 0\nr=input(\"\
    LED resistor in ohms: \")\nr=float(r) if r else 0\nif i:\n    r,Wr,Wl=led_resistor(Vs,Vf,i)\n\
    else:\n    i,Wr,Wl=led_current(Vs,Vf,r)\nprint(\"\\nVs: \",Vs)\nprint(\"Vf: \"\
    ,Vf)\nprint(\"R: {} ohms\".format(r))\nprint(\"i: {} amps\".format(i))\nprint(\"\
    Wres: {} watts\".format(Wr))\nprint(\"Wled: {} watts\".format(Wl))\n```\n\n以下两个示例运行首先在已知电流时找到电阻的近似值，第二个示例在为电路选择标准电阻时计算电流。\n\
    \n在这两种情况下，你都需要输入电源电压和LED正向电压（此Vf因LED类型而异），然后输入以安培为单位的电流或以欧姆为单位的电阻值。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_37_0.png)\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_38_0.png)\n\n对于一个由12伏供电的电路，一个正向压降为2.4伏、通过电流为25毫安的LED需要大约384欧姆的电阻。\n\
    \n下一次运行，使用9伏电压源、LED正向压降为2.3伏以及270欧姆的标准电阻值，得到的电流约为24.8毫安。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_39_0.png)\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_39_1.png)\n\n重要的是不要烧坏电路中的电阻或LED。\n\n\
    电阻有其标称的瓦特数，如果Wres小于此值，它们就能正常工作。在我们的示例中，电阻的发热功率约为0.17瓦，因此一个标准的四分之一瓦（0.25瓦）电阻应该可以正常工作。LED有其标称的最大电流，你也可以用这些结果来检查。\n\
    \n## 欧姆定律\n\n电学和电子学的主题充满了方程和公式，但迄今为止最重要的两个方程是我们所说的“欧姆定律”。如果你只学会如何使用以下两个简单的方程，你所知道的就足以被你认识的大多数人视为电子高手。\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_41_0.png)\n\n第一个方程指出，电压（电磁力）等于以安培为单位的电流（I）乘以以欧姆为单位的电阻（R）。第二个方程指出，瓦特数（功率）等于以安培为单位的电流乘以电压。\n\
    \n当已知任意两个值时，可以很容易地通过代数方法重新排列这两个方程来计算未知量。此程序提示你输入这四个值中的任意两个，另外两个量将被计算出来，并且所有四个值都将被输出。\n\
    \n此程序定义了一个名为`ohms_laws()`的函数，打印一些供你查看的说明，然后停止。从那时起，你可以调用这个新函数，当已知任意两个值时计算所有四个值。\n\
    \n例如，考虑一个由标准家用117伏供电的60瓦灯泡。为两个未知数（电流和电阻）输入零，函数将找到这些值。电流约为半安培，灯泡的电阻约为228欧姆。"
