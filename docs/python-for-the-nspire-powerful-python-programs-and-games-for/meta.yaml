- md: "## 2. Electronics\n\nThis chapter presents a sampling of useful programs for\
    \ doing various electronics calculations. The author has used these and similar\
    \ calculations when inventing some fun gadgets, such as a bicycle brake light\
    \ that requires no wiring, you just stick it on your bike or helmet and ride!\
    \ It uses an accelerometer and some fun program code to get rid of bumps and rotations\
    \ while detecting braking and putting on a bright brake light. (LucidBrakes™)\n\
    \nWhether you are experimenting with Arduinos, Raspberry Pis, or creating your\
    \ own circuits at the component level, these calculations can come in very handy.\n\
    \n## avg_peak_rms\n\nHomes in the United States are supplied with electrical power\
    \ in the form of a sine wave with an effective voltage of about 117 volts. This\
    \ effective voltage provides the same power in watts to a resistive load as would\
    \ a DC voltage of 117 volts. Effective voltage is also called RMS, which stands\
    \ for \"Root-Mean-Squared\", because of the way it is mathematically derived.\n\
    \nMost of the time we use the effective voltage value, because it is the value\
    \ that allows quick calculation of power to a circuit. But there are two other\
    \ ways to measure a sine wave voltage. The peak voltage, at the very top point\
    \ of the sine wave, provides a \"Peak\" voltage value, and the average magnitude\
    \ of the voltage over time, without regard to polarity, provides the \"Average\"\
    \ voltage value.\n\nHere are the two main conversion equations. All the relationships\
    \ between Peak, Average, and RMS voltages can be figured out by algebraically\
    \ working with these two:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_22_0.png)\n\
    \nThis program provides the conversions between these three ways to describe a\
    \ pure sine wave voltage. Enter the one known value when prompted for it, and\
    \ just press [enter] to skip the other two. The program determines which value\
    \ you've entered, calculates the other two, and outputs all three for easy reference.\n\
    \n```python\nfrom math import *\n\ndef ac_voltages(avg,peak,rms):\n    if avg:\n\
    \        peak=pi*avg/2\n        rms=peak/sqrt(2)\n    elif peak:\n        avg=peak*2/pi\n\
    \        rms=peak/sqrt(2)\n    elif rms:\n        peak=rms*sqrt(2)\n        avg=peak*2/pi\n\
    \    return [avg,peak,rms]\n\nprint(\"\\n\\nInput one AC voltage type\\n\")\n\
    s=input(\"Average: \")\navg=float(s) if s else 0\ns=input(\"Peak: \")\npeak=float(s)\
    \ if s else 0\ns=input(\"RMS: \")\nrms=float(s) if s else 0\navg,peak,rms=ac_voltages(avg,peak,rms)\n\
    print(\"\\nAvg: \",avg)\nprint(\"Peak: \",peak)\nprint(\"RMS: \",rms)\n```\n\n\
    As shown in this sample run, a standard U.S. house wiring voltage of 117 V (RMS)\
    \ has a peak voltage of about 165 V, and an average voltage over time of about\
    \ 105 V.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_23_0.png)\n\n## bridge\n\n\
    Balanced bridge circuits, also called Wheatstone bridges, are used in electronics\
    \ for precision measurements and for other purposes. A common calculation is to\
    \ find the value of one leg of a balanced bridge when the other three legs are\
    \ known. For example, in the following figure we can calculate a value for R4\
    \ when R1, R2, and R3 are known. These values cause the ammeter across the middle\
    \ to read zero amps. Similarly, a voltmeter across these same two nodes would\
    \ read zero volts.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_24_0.png)\n\nHere's\
    \ the equation relating the four resistors:\n\n$R1 \\times R3 = R2 \\times R4$\n\
    \nNote that the bridge() function uses variables z1 to z3 instead of R1 to R3.\
    \ This is because of an awesome feature of Python, where a variable can just as\
    \ easily contain a complex number as it can a real number. In circuit analysis,\
    \ complex numbers are very useful for AC circuits containing capacitors and inductors\
    \ in addition to resistors. And yes, AC bridge circuits do follow all the same\
    \ math rules when working with these components, using complex numbers for their\
    \ respective impedances.\n\nThe following example calculates the value of the\
    \ 4th leg resistance when the first three resistors are 2700, 3900, and 5600 ohms,\
    \ and it solves a second time for complex impedances of 4+3j, 5+0j, and 3-7j.\n\
    \n```python\ndef bridge(z1,z2,z3):\n    return z1*z3/z2\n\nr1=2700\nr2=3900 #\
    \ opposite the unknown\nr3=5600\nr4=bridge(r1,r2,r3)\nprint(\"r1: \",r1)\nprint(\"\
    r2: \",r2)\nprint(\"r3: \",r3)\nprint(\"bridge(r1,r2,r3): \",r4)\n\nz1=4+3j\n\
    z2=5+0j # opposite the unknown\nz3=3-7j\nz4=bridge(z1,z2,z3)\nprint(\"z1: \",z1)\n\
    print(\"z2: \",z2)\nprint(\"z3: \",z3)\nprint(\"bridge(z1,z2,z3): \",z4)\n```\n\
    \nThe bridge() function is very small, just the first two lines of code. Most\
    \ of this program demonstrates calling the bridge() function twice, once to solve\
    \ for a pure resistive bridge, and a second time to balance a bridge composed\
    \ of complex-value impedances.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_26_0.png)\n\
    \nAs shown, the 4th resistor in the first case should be approximately 3877 ohms,\
    \ and the impedance in the second case should be 6.6-3.8j ohms.\n\n## delta_wye\n\
    \nWhen you run this program, nothing happens. Okay, a little explanation is in\
    \ order. As explained early in this book, a simple and straightforward way to\
    \ add powerful functions to your calculator is to simply define functions in a\
    \ program that you can use over and over while working on some relevant problems.\
    \ In this case, two functions are defined at run time, delta() and wye(), and\
    \ they remain in the shell ready for your use.\n\nThe delta() function converts\
    \ resistances in a wye configuration to an equivalent delta configuration. The\
    \ wye() function does the exact opposite conversion to output a wye configuration\
    \ equivalent to a delta configuration you pass to it.\n\nBoth of these functions\
    \ also work for complex-number impedances, as demonstrated in the examples. This\
    \ is a powerful feature for more advanced electronics analysis.\n\nThe delta configuration\
    \ is called that because the three resistors are arranged in a triangle, although\
    \ circuit diagrams often show them in more of a pi arrangement, as shown here\
    \ on the left. Notice that if you \"pull together\" the bottoms of RB and RC,\
    \ a triangle is formed.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_27_0.png)\n\
    \nSimilarly, the wye configuration is often shown as more of a \"T\" arrangement,\
    \ as shown here on the right. Just imagine the center point between R1, R2, and\
    \ R3 pulled down a bit and you'll see the \"Y\", or wye shape.\n\nThe delta()\
    \ function uses the following equations to find values for RA, RB, and RC that\
    \ form an equivalent set of resistances, or impedances, when given R1, R2, and\
    \ R3.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_28_0.png)\n\nThe wye() function\
    \ uses the following equations to find values for R1, R2, and R3 that form an\
    \ equivalent set of resistances, or impedances, when given RA, RB, and RC.\n\n\
    ![](img/fbd07807412dd4a6618493b44ab77f1e_28_1.png)\n\nThe first few lines of code\
    \ in the program define these delta() and wye() functions. I have added optional\
    \ print() commands at the end of the listing to remind you at runtime how to call\
    \ each of them. This is a good way to self-document functions that are defined,\
    \ but not actually called at runtime.\n\n```python\ndef delta(z1,z2,z3):\n   \
    \ tmp=z1*z2+z2*z3+z3*z1\n    return tmp/z1,tmp/z2,tmp/z3\n\ndef wye(za,zb,zc):\n\
    \    tmp=za+zb+zc\n    return zb*zc/tmp,za*zc/tmp,za*zb/tmp\n\nprint(\"\\nDelta\
    \ to Wye (R or Z)\")\nprint(\"wye(za,zb,zc)\")\nprint(\"\\nWye to Delta (R or\
    \ Z)\")\nprint(\"delta(z1,z2,z3)\")\n```\n\nHere's what is displayed immediately\
    \ after the program is run to load the functions into the shell. As you can see,\
    \ no calculations actually take place yet. The new functions are loaded and ready\
    \ to go.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_29_0.png)\n\nHere's the result\
    \ of calling each function. In the first case we convert resistances in a wye\
    \ configuration of 300, 400, and 500 ohms to the equivalent delta configuration.\
    \ The result is about 1567, 1175, and 940 ohms. The second call converts impedances\
    \ of 4+3j, 5, and 3-7j ohms from a delta configuration to equivalent wye values.\
    \ The results are the complex values 2-2.25j, 2.95-0.6j, and 1.125+1.625j ohms."
  mdcn: "## 2. 电子学\n\n本章介绍了一些用于各种电子计算的实用程序示例。作者在发明一些有趣的小工具时使用了这些及类似的计算，例如一个无需布线的自行车刹车灯，你只需将其贴在自行车或头盔上即可骑行！它使用加速度计和一些有趣的程序代码来消除颠簸和旋转，同时检测刹车并点亮明亮的刹车灯。（LucidBrakes™）\n\
    \n无论你是在使用 Arduino、Raspberry Pi 进行实验，还是在元件级别创建自己的电路，这些计算都会非常有用。\n\n## avg_peak_rms\n\
    \n美国家庭的供电形式是正弦波，有效电压约为 117 伏。这个有效电压为电阻负载提供的功率（瓦特）与 117 伏的直流电压相同。有效电压也称为 RMS，代表“均方根”，因其数学推导方式而得名。\n\
    \n大多数时候我们使用有效电压值，因为它是可以快速计算电路功率的值。但测量正弦波电压还有另外两种方式。峰值电压位于正弦波的最高点，提供“峰值”电压值；而电压随时间变化的平均幅度（不考虑极性）则提供“平均”电压值。\n\
    \n以下是两个主要的转换方程。峰值、平均值和 RMS 电压之间的所有关系都可以通过代数运算这两个方程得出：\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_22_0.png)\n\
    \n此程序提供了这三种描述纯正弦波电压方式之间的转换。在提示时输入一个已知值，然后按 [enter] 键跳过另外两个。程序会确定你输入的值，计算另外两个，并输出所有三个值以供参考。\n\
    \n```python\nfrom math import *\n\ndef ac_voltages(avg,peak,rms):\n    if avg:\n\
    \        peak=pi*avg/2\n        rms=peak/sqrt(2)\n    elif peak:\n        avg=peak*2/pi\n\
    \        rms=peak/sqrt(2)\n    elif rms:\n        peak=rms*sqrt(2)\n        avg=peak*2/pi\n\
    \    return [avg,peak,rms]\n\nprint(\"\\n\\nInput one AC voltage type\\n\")\n\
    s=input(\"Average: \")\navg=float(s) if s else 0\ns=input(\"Peak: \")\npeak=float(s)\
    \ if s else 0\ns=input(\"RMS: \")\nrms=float(s) if s else 0\navg,peak,rms=ac_voltages(avg,peak,rms)\n\
    print(\"\\nAvg: \",avg)\nprint(\"Peak: \",peak)\nprint(\"RMS: \",rms)\n```\n\n\
    如示例运行所示，标准的美国家庭布线电压 117 V (RMS) 的峰值电压约为 165 V，随时间变化的平均电压约为 105 V。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_23_0.png)\n\
    \n## bridge\n\n平衡电桥电路，也称为惠斯通电桥，在电子学中用于精密测量和其他目的。一个常见的计算是当已知其他三个臂时，求平衡电桥的一个臂的值。例如，在下图中，当已知\
    \ R1、R2 和 R3 时，我们可以计算 R4 的值。这些值使得中间的电流表读数为零安培。同样，跨接在这两个相同节点上的电压表读数将为零伏特。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_24_0.png)\n\
    \n以下是关联四个电阻的方程：\n\n$R1 \\times R3 = R2 \\times R4$\n\n请注意，bridge() 函数使用变量 z1 到\
    \ z3 而不是 R1 到 R3。这是因为 Python 的一个强大特性，变量可以像包含实数一样轻松地包含复数。在电路分析中，对于包含电容和电感（除了电阻）的交流电路，复数非常有用。是的，交流电桥电路在处理这些元件时确实遵循所有相同的数学规则，使用复数表示各自的阻抗。\n\
    \n以下示例计算了当三个电阻分别为 2700、3900 和 5600 欧姆时，第四个臂电阻的值，并再次求解复数阻抗为 4+3j、5+0j 和 3-7j 的情况。\n\
    \n```python\ndef bridge(z1,z2,z3):\n    return z1*z3/z2\n\nr1=2700\nr2=3900 #\
    \ opposite the unknown\nr3=5600\nr4=bridge(r1,r2,r3)\nprint(\"r1: \",r1)\nprint(\"\
    r2: \",r2)\nprint(\"r3: \",r3)\nprint(\"bridge(r1,r2,r3): \",r4)\n\nz1=4+3j\n\
    z2=5+0j # opposite the unknown\nz3=3-7j\nz4=bridge(z1,z2,z3)\nprint(\"z1: \",z1)\n\
    print(\"z2: \",z2)\nprint(\"z3: \",z3)\nprint(\"bridge(z1,z2,z3): \",z4)\n```\n\
    \nbridge() 函数非常小，只有前两行代码。这个程序的大部分内容演示了两次调用 bridge() 函数，一次用于求解纯电阻电桥，第二次用于平衡由复数阻抗组成的电桥。\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_26_0.png)\n\n如图所示，第一种情况下的第四个电阻应约为 3877\
    \ 欧姆，第二种情况下的阻抗应为 6.6-3.8j 欧姆。\n\n## delta_wye\n\n当你运行这个程序时，什么也不会发生。好吧，需要一点解释。正如本书前面所解释的，为你的计算器添加强大功能的一个简单直接的方法，就是在程序中定义函数，以便在处理相关问题时反复使用。在这种情况下，运行时定义了两个函数：delta()\
    \ 和 wye()，它们保留在 shell 中供你使用。\n\ndelta() 函数将星形配置的电阻转换为等效的三角形配置。wye() 函数执行完全相反的转换，输出与你传递给它的三角形配置等效的星形配置。\n\
    \n这两个函数也适用于复数阻抗，如示例所示。这是更高级电子分析的一个强大特性。\n\n三角形配置之所以得名，是因为三个电阻排列成三角形，尽管电路图通常将它们显示为更像\
    \ π 形排列，如左侧所示。请注意，如果你将 RB 和 RC 的底部“拉在一起”，就会形成一个三角形。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_27_0.png)\n\
    \n类似地，星形配置通常显示为更像“T”形排列，如右侧所示。只需想象 R1、R2 和 R3 之间的中心点向下拉一点，你就会看到“Y”形或星形。\n\ndelta()\
    \ 函数使用以下方程，在给定 R1、R2 和 R3 时，找到形成等效电阻或阻抗组的 RA、RB 和 RC 的值。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_28_0.png)\n\
    \nwye() 函数使用以下方程，在给定 RA、RB 和 RC 时，找到形成等效电阻或阻抗组的 R1、R2 和 R3 的值。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_28_1.png)\n\
    \n程序的前几行代码定义了这些 delta() 和 wye() 函数。我在清单末尾添加了可选的 print() 命令，以便在运行时提醒你如何调用每个函数。这是为已定义但未在运行时实际调用的函数进行自我文档化的好方法。\n\
    \n```python\ndef delta(z1,z2,z3):\n    tmp=z1*z2+z2*z3+z3*z1\n    return tmp/z1,tmp/z2,tmp/z3\n\
    \ndef wye(za,zb,zc):\n    tmp=za+zb+zc\n    return zb*zc/tmp,za*zc/tmp,za*zb/tmp\n\
    \nprint(\"\\nDelta to Wye (R or Z)\")\nprint(\"wye(za,zb,zc)\")\nprint(\"\\nWye\
    \ to Delta (R or Z)\")\nprint(\"delta(z1,z2,z3)\")\n```\n\n以下是程序运行后立即将函数加载到 shell\
    \ 中时显示的内容。如你所见，实际上还没有进行任何计算。新函数已加载并准备就绪。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_29_0.png)\n\
    \n以下是调用每个函数的结果。在第一种情况下，我们将星形配置中 300、400 和 500 欧姆的电阻转换为等效的三角形配置。结果约为 1567、1175\
    \ 和 940 欧姆。第二次调用将三角形配置中 4+3j、5 和 3-7j 欧姆的阻抗转换为等效的星形值。结果是复数值 2-2.25j、2.95-0.6j\
    \ 和 1.125+1.625j 欧姆。"
