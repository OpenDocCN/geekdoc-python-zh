  md: "# zround\n\nFloating point numbers in Python are easily rounded to n decimal\
    \ places using the round() function. Complex numbers, such as we are using for\
    \ electrical impedance values in several programs in this chapter, are not so\
    \ easily rounded. Look at the results displayed in the parallel program to see\
    \ how the calculated complex number value stretches clear across the calculator's\
    \ display, requiring mental rounding off to be useful.\n\nThe zround function\
    \ presented here rounds off each part of a complex number, and returns the simpler\
    \ result. If you work with complex numbers often, you'll find this function useful.\n\
    \n```\ndef zround(z,n):\n    r=round(z.real,n)\n    i=round(z.imag,n)\n    return\
    \ r+i*1j\n```\n\n```\nz=(300+400j)**(1/3)\nprint(z)\nzr=zround(z,3)\nprint(zr)\n\
    ```\n\nThe example code first calculates the cube root of the complex-number 300+400j\
    \ and prints the result. As you can see, the result has a lot of decimal places\
    \ and is likely not very useful from an electrical engineering point of view.\
    \ The result is then rounded to 3 decimal places, and the printed complex number\
    \ is much more manageable in the real world."
  merge: -1
