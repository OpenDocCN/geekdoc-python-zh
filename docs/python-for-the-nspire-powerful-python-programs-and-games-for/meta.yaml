  md: '# dice


    This program rolls a handful of six-sided dice, showing the numbers on each of
    them, their sum, and their average.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_56_0.png)


    In this example five dice are rolled, showing 5, 1, 3, 3, and 1 dots on their
    faces. The sum of the dice is 13, and the average is 2.6.


    The randint(1,6) function from the random module provides the core function used
    in this program. Many Python functions process arguments up to but not including
    the second value passed. The randint() function is different in that the arguments
    are inclusive. In this case all the integer values from 1 to 6, inclusive, are
    just as likely to be randomly returned.


    An interesting challenge would be to modify this program to throw a standard set
    of dice for Dungeons and Dragons. You''ll need one each of 4, 6, 8, 10, 12, and
    20 sided dice.


