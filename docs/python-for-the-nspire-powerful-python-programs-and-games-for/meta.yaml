    ```\n\n## radioisotope\n\nThe speed of radioactive decay in a sample is proportional\
    \ to the number of radioactive atoms in the sample. The heart of the required\
    \ calculations involves differential equations, which you can read about online\
    \ if interested. Perhaps you've heard of carbon-14 dating of ancient organic materials?\
    \ This is how they do the math for that! But this program works with any radioisotope\
