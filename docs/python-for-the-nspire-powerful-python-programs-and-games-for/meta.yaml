- md: "## parallel\n\nResistors in parallel can be replaced with a single equivalent\
    \ resistor, a technique often used in circuit analysis. The same equation works\
    \ for impedances in parallel too, so this one program works for resistances or\
    \ complex number impedances alike.\n\nThe equivalent resistance (or impedance)\
    \ is calculated with the following formula:\n\n$$\\frac{1}{R_p} = \\frac{1}{R_1}\
    \ + \\frac{1}{R_2} + \\cdots + \\frac{1}{R_n}$$\n\nHere's a sketch showing how\
    \ the multiple resistors are wired in parallel:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_43_0.png)\n\
    \nThe program defines a function named parallel(), and prints two lines of instructions.\
    \ Note that a single list of values is passed to this function, allowing any number\
    \ of parallel resistances or impedances to be processed. Just add two or more\
    \ to the list and pass the list to this function.\n\nThe example shows how square\
    \ brackets define a list.\n\n```python\ndef parallel(zlist):\n    zp=sum(1/z for\
    \ z in zlist)\n    return 1/zp\n\nprint(\"Parallel (R or Z)\")\nprint(\"parallel(list)\"\
    )\n```\n\nThe first example finds a single resistor equal to three resistors in\
    \ parallel, and the second example repeats the calculation for a list of two complex\
    \ number impedances.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_44_0.png)\n\n\
    Be sure to \"wrap\" the three resistor values into a list using square brackets,\
    \ as shown. This function expects just one argument, the list, and passing it\
    \ three separate numbers causes an error.\n\nThe result shows that resistors of\
    \ 300, 400, and 500 ohms in parallel can be replaced with one resistor of about\
    \ 128 ohms.\n\nThe next example calculates the equivalent impedance for two impedances\
    \ in parallel, the first at 300+400j, and the second at 500-600j. As shown here,\
    \ the equivalent impedance is approximately 453+138j.\n\n```python\n>>>parallel([300+400j,\
    \ 500-600j])\n(452.9411764705882+138.2352941176471j)\n```\n\n## rc_timing\n\n\
    Many common timing circuits are based on an R-C charging configuration, the basics\
    \ of which are shown here:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_46_0.png)\n\
    \nCapacitor C1 starts out with a voltage at Vi the same as V1. This starting voltage\
    \ V1 is often zero, but it can be any voltage. When the input voltage switches\
    \ to some other voltage V2, the capacitor starts to charge up as current flows\
    \ into (or out of) it through R1. It takes time for the voltage at Vi to ramp\
    \ up (or down) all the way to V2, and the details of this charging time is what\
    \ this program is all about.\n\nThere are six variables in this calculation; the\
    \ starting applied voltage V1, the new applied voltage V2, the instantaneous voltage\
    \ Vi, the number of seconds S since the applied voltage was changed, and the values\
    \ for resistance R and capacitance C that determine the changing rate of the instantaneous\
    \ voltage. The bigger the resistor, the slower the capacitor will charge. The\
    \ greater the difference between the two input voltages the faster the voltage\
    \ across the capacitor will change. And so on. Here is the equation that relates\
    \ all these parameters:\n\n$$V_2 - V_i = (V_2 - V_1) \\times e^{\\frac{-S}{R \\\
    times C}}$$\n\nThis program defines a function named rc_timing() that algebraically\
    \ isolates each variable in this equation to find its value when all the other\
    \ variables are known. A second function, named rc() is designed for no other\
    \ purpose than to make entry and display of the results simpler and better. You\
    \ can use either function to get the same results, but I suggest using rc().\n\
    \n```python\ndef rc_timing(v1,v2,vi,C,R,t):\n    if not t:\n        tmp=-log((v2-vi)/(v2-v1))\n\
    \        t=tmp*R*C\n    elif not R:\n        tmp=-log((v2-vi)/(v2-v1))\n     \
    \   R=t/C/tmp\n    elif not C:\n        tmp=-log((v2-vi)/(v2-v1))\n        C=t/R/tmp\n\
    \    elif not vi:\n        tmp=exp(-t/R/C)\n        vi=v2-tmp*(v2-v1)\n    elif\
    \ not v2:\n        tmp=exp(-t/R/C)\n        v2=(tmp*v1-vi)/(tmp-1)\n    elif not\
    \ v1:\n        tmp=exp(-t/R/C)\n        v1=(vi+v2*(tmp-1))/tmp\n    return [v1,v2,vi,C,R,t]\n\
    ```\n\n```python\ndef rc(v1,v2,vi,C,R,t):\n    v1,v2,vi,C,R,t=rc_timing(v1,v2,vi,C,R,t)\n\
    \    print(\"v1: \",v1)\n    print(\"v2: \",v2)\n    print(\"vi: \",vi)\n    print(\"\
    C: \",C)\n    print(\"R: \",R)\n    print(\"t: \",t)\n```\n\n```python\nprint(\"\
    rc(v1,v2,vi,C,R,t)\")\nprint(\"Pass 0 for the unknown\")\n```\n\nWhen you run\
    \ this program the two functions are defined but no further action is taken. You\
    \ can then type into the shell the rc() function, passing all six parameters.\
    \ Any one, and only one, of the arguments should be zero, and its value will be\
    \ calculated using the other five arguments.\n\nFor example, starting with V1\
    \ at 0 volts, then applying V2 of 5 volts, how long will it take voltage Vi to\
    \ rise to 4 volts when the resistor is 47K ohms and the capacitor is 6.8 microfarads?\
    \ Now here's the tricky part; only the unknown value, in this case the elapsed\
    \ time t, should be entered as zero. So, be sure to set V1, the starting voltage,\
    \ to a tiny value very near zero. The answer will be accurate enough, as long\
    \ as a very small value is entered for V1. The example shown uses V1 = 0.001 volts.\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_48_0.png)\n\nIn summary, in this example\
    \ we find that it takes about 0.514 seconds for a capacitor's voltage to rise\
    \ from 0 to 4 volts after 5 volts is applied across a 47K ohm resistor, when the\
    \ capacitor is 6.8 microFarads.\n\n## series\n\nResistors in series can be replaced\
    \ with a single resistor calculated as the sum of the resistances. Here's the\
    \ formula:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_49_0.png)\n\nThis formula\
    \ is also valid for complex number impedances connected in series, and the sample\
    \ code shows both a set of resistors and a set of impedances converted to equivalent\
    \ single values by calling the series() function.\n\n```python\ndef series(zlist):\n\
    \    zs=sum(z for z in zlist)\n    return zs\n\nprint(\"Series (R or Z)\")\nprint(\"\
    series(list)\")\n```\n\nThe program defines the series() function, then prints\
    \ reminder instructions for its use. In the shell, pass a list of resistances\
    \ and/or impedances to the series() function. The resulting total resistance,\
    \ or impedance, is output as a result.\n\nFor example, three resistors are wired\
    \ in series. They are 300, 400, and 500 ohms. What is the total resistance of\
    \ the circuit?\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_50_0.png)\n\nThis shows\
    \ you could replace the three resistors with one resistor of 1200 ohms.\n\nBe\
    \ sure to pass a list of two or more values to the series() function by using\
    \ the square brackets to wrap all the values into a single list argument.\n\n\
    Here's an example of passing a list of two complex-number impedances. The result\
    \ shows that impedances of 300+400j in series with 500-600j could be replaced\
    \ with a single impedance of 800-200j.\n\n## zround\n\nFloating point numbers\
    \ in Python are easily rounded to n decimal places using the round() function.\
    \ Complex numbers, such as we are using for electrical impedance values in several\
    \ programs in this chapter, are not so easily rounded. Look at the results displayed\
    \ in the parallel program to see how the calculated complex number value stretches\
    \ clear across the calculator's display, requiring mental rounding off to be useful.\n\
    \nThe zround function presented here rounds off each part of a complex number,\
    \ and returns the simpler result. If you work with complex numbers often, you'll\
    \ find this function useful.\n\n```python\ndef zround(z,n):\n    r=round(z.real,n)\n\
    \    i=round(z.imag,n)\n    return r+i*1j\n```\n\n```python\nz=(300+400j)**(1/3)\n\
    print(z)\nzr=zround(z,3)\nprint(zr)\n```\n\nThe example code first calculates\
    \ the cube root of the complex-number 300+400j and prints the result. As you can\
    \ see, the result has a lot of decimal places and is likely not very useful from\
    \ an electrical engineering point of view. The result is then rounded to 3 decimal\
    \ places, and the printed complex number is much more manageable in the real world."
  mdcn: "## 并联\n\n并联的电阻可以用一个等效电阻来替代，这是电路分析中常用的技术。同样的方程也适用于并联的阻抗，因此这个程序既可以处理电阻，也可以处理复数阻抗。\n\
    \n等效电阻（或阻抗）通过以下公式计算：\n\n$$\\frac{1}{R_p} = \\frac{1}{R_1} + \\frac{1}{R_2} + \\\
    cdots + \\frac{1}{R_n}$$\n\n下面是一个示意图，展示了多个电阻如何并联连接：\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_43_0.png)\n\
    \n该程序定义了一个名为 `parallel()` 的函数，并打印两行使用说明。请注意，该函数接受一个值列表作为参数，允许处理任意数量的并联电阻或阻抗。只需将两个或更多值添加到列表中，然后将列表传递给此函数即可。\n\
    \n示例展示了如何使用方括号定义一个列表。\n\n```python\ndef parallel(zlist):\n    zp=sum(1/z for z\
    \ in zlist)\n    return 1/zp\n\nprint(\"Parallel (R or Z)\")\nprint(\"parallel(list)\"\
    )\n```\n\n第一个示例计算了三个并联电阻的等效电阻，第二个示例则对一个包含两个复数阻抗的列表重复了计算。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_44_0.png)\n\
    \n请务必使用方括号将三个电阻值“包装”成一个列表，如示例所示。此函数只接受一个参数，即列表，传递三个单独的数字会导致错误。\n\n结果显示，300、400\
    \ 和 500 欧姆的电阻并联后，可以用一个约 128 欧姆的电阻替代。\n\n下一个示例计算了两个并联阻抗的等效阻抗，第一个为 300+400j，第二个为\
    \ 500-600j。如图所示，等效阻抗约为 453+138j。\n\n```python\n>>>parallel([300+400j, 500-600j])\n\
    (452.9411764705882+138.2352941176471j)\n```\n\n## RC 定时\n\n许多常见的定时电路基于 R-C 充电配置，其基本原理如下所示：\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_46_0.png)\n\n电容 C1 的初始电压 Vi 与 V1 相同。这个初始电压\
    \ V1 通常为零，但也可以是任何电压。当输入电压切换到另一个电压 V2 时，电流通过 R1 流入（或流出）电容，电容开始充电。电压 Vi 需要一段时间才能上升（或下降）到\
    \ V2，而这个充电时间的细节正是本程序的核心。\n\n此计算涉及六个变量：初始施加电压 V1、新的施加电压 V2、瞬时电压 Vi、自施加电压改变以来经过的秒数\
    \ S，以及决定瞬时电压变化速率的电阻 R 和电容 C 的值。电阻越大，电容充电越慢。两个输入电压之间的差值越大，电容两端的电压变化就越快。依此类推。以下是关联所有这些参数的方程：\n\
    \n$$V_2 - V_i = (V_2 - V_1) \\times e^{\\frac{-S}{R \\times C}}$$\n\n本程序定义了一个名为\
    \ `rc_timing()` 的函数，该函数通过代数方法分离此方程中的每个变量，以便在已知所有其他变量时求出其值。第二个名为 `rc()` 的函数，其唯一目的是使结果的输入和显示更简单、更友好。你可以使用任一函数获得相同的结果，但我建议使用\
    \ `rc()`。\n\n```python\ndef rc_timing(v1,v2,vi,C,R,t):\n    if not t:\n      \
    \  tmp=-log((v2-vi)/(v2-v1))\n        t=tmp*R*C\n    elif not R:\n        tmp=-log((v2-vi)/(v2-v1))\n\
    \        R=t/C/tmp\n    elif not C:\n        tmp=-log((v2-vi)/(v2-v1))\n     \
    \   C=t/R/tmp\n    elif not vi:\n        tmp=exp(-t/R/C)\n        vi=v2-tmp*(v2-v1)\n\
    \    elif not v2:\n        tmp=exp(-t/R/C)\n        v2=(tmp*v1-vi)/(tmp-1)\n \
    \   elif not v1:\n        tmp=exp(-t/R/C)\n        v1=(vi+v2*(tmp-1))/tmp\n  \
    \  return [v1,v2,vi,C,R,t]\n```\n\n```python\ndef rc(v1,v2,vi,C,R,t):\n    v1,v2,vi,C,R,t=rc_timing(v1,v2,vi,C,R,t)\n\
    \    print(\"v1: \",v1)\n    print(\"v2: \",v2)\n    print(\"vi: \",vi)\n    print(\"\
    C: \",C)\n    print(\"R: \",R)\n    print(\"t: \",t)\n```\n\n```python\nprint(\"\
    rc(v1,v2,vi,C,R,t)\")\nprint(\"Pass 0 for the unknown\")\n```\n\n运行此程序时，两个函数会被定义，但不会执行进一步操作。然后，你可以在命令行中输入\
    \ `rc()` 函数，并传递所有六个参数。其中一个且仅有一个参数应为零，其值将使用其他五个参数计算得出。\n\n例如，从 V1 为 0 伏开始，然后施加\
    \ V2 为 5 伏，当电阻为 47K 欧姆，电容为 6.8 微法拉时，电压 Vi 上升到 4 伏需要多长时间？现在是棘手的部分：只有未知值（在此例中是经过的时间\
    \ t）应输入为零。因此，请务必将初始电压 V1 设置为一个非常接近零的微小值。只要 V1 输入一个非常小的值，答案就足够精确。示例中使用了 V1 = 0.001\
    \ 伏。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_48_0.png)\n\n总之，在此示例中我们发现，当电容为\
    \ 6.8 微法拉，电阻为 47K 欧姆时，在施加 5 伏电压后，电容电压从 0 上升到 4 伏大约需要 0.514 秒。\n\n## 串联\n\n串联的电阻可以用一个等效电阻来替代，其值为各电阻之和。公式如下：\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_49_0.png)\n\n此公式同样适用于串联连接的复数阻抗，示例代码展示了通过调用\
    \ `series()` 函数将一组电阻和一组阻抗转换为等效的单个值。\n\n```python\ndef series(zlist):\n    zs=sum(z\
    \ for z in zlist)\n    return zs\n\nprint(\"Series (R or Z)\")\nprint(\"series(list)\"\
    )\n```\n\n该程序定义了 `series()` 函数，然后打印其使用提醒说明。在命令行中，将一个电阻和/或阻抗的列表传递给 `series()` 函数。结果输出的总电阻或阻抗即为计算结果。\n\
    \n例如，三个电阻串联连接，分别为 300、400 和 500 欧姆。电路的总电阻是多少？\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_50_0.png)\n\
    \n这表明你可以用一个 1200 欧姆的电阻替代这三个电阻。\n\n请务必使用方括号将两个或更多值包装成一个列表参数，然后传递给 `series()` 函数。\n\
    \n这是一个传递两个复数阻抗列表的示例。结果显示，300+400j 与 500-600j 串联的阻抗可以用一个 800-200j 的阻抗替代。\n\n##\
    \ 复数四舍五入\n\nPython 中的浮点数可以使用 `round()` 函数轻松地四舍五入到 n 位小数。而复数（例如本章多个程序中用于表示电气阻抗值的复数）则不那么容易四舍五入。查看并联程序中显示的结果，你会看到计算出的复数结果在计算器显示屏上延伸得很长，需要进行心算取整才能实用。\n\
    \n此处介绍的 `zround` 函数对复数的每个部分进行四舍五入，并返回更简洁的结果。如果你经常处理复数，你会发现这个函数很有用。\n\n```python\n\
    def zround(z,n):\n    r=round(z.real,n)\n    i=round(z.imag,n)\n    return r+i*1j\n\
    ```\n\n```python\nz=(300+400j)**(1/3)\nprint(z)\nzr=zround(z,3)\nprint(zr)\n```\n\
    \n示例代码首先计算复数 300+400j 的立方根并打印结果。如你所见，结果有很多小数位，从电气工程的角度来看可能不太实用。然后将结果四舍五入到 3 位小数，打印出的复数在实际应用中就更易于处理了。"
