    def card(d,n):\n    c=d[n]\n    if c>51:\n        return \"Joker\"\n    suit=[\"\
    Hearts\",\"Clubs\",\"Spades\",\"Diamonds\"]\n    face=[\"Ace\",\"2\",\"3\",\"\
    4\",\"5\",\"6\",\"7\",\"8\",\n          \"9\",\"10\",\"Jack\",\"Queen\",\"King\"\
    ]\n    return face[c%13]+\" of \"+suit[c//13]\n```\n\n```\nj=int(input(\"How many\
    \ jokers: \"))\nd=deck(j)\n```\n\n```\nn=int(input(\"Deal how many cards: \"))\n\
    print(\"\")\nif n>len(d):\n    msg=\"Deck has only {} cards\"\n    print(msg.format(len(d)))\n\
    else:\n    for i in range(n):\n        print(card(d,i))\n```"
