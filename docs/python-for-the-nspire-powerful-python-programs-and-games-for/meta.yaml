    # triangle_3p


    This program calculates the sides, angles, and area of a triangle given three
    points in the x,y plane.


    For example, what are sides, angles, and area of a triangle defined by the points
    (2,4), (10,4), and (2,10)?


    ![](img/fbd07807412dd4a6618493b44ab77f1e_198_0.png)


    The function triangle_3p() does all the work. Pass three points, each as a 2-number
    list, and it returns the three sides, the three angles in degrees opposite those
    sides, and the area. In this example, the sides a, b, and c are approximately
    6, 8, and 10 units in length. The angles A, B, and C opposite those sides are
    approximately 10, 36.87, and 53.13 degrees. The area of the triangle is exactly
    24 square units.'
