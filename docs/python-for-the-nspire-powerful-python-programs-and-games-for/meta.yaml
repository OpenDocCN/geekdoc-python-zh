  md: '# ohms_laws


    The subject of electricity and electronics is full of equations and formulas,
    but by far the two most important equations are what we call "Ohm''s Laws". If
    you learn only how to work with the following two simple equations, you''ll know
    enough to be considered an electronics whiz by most everyone you know.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_41_0.png)


    The first equation states that voltage (Electromagnetic force) is equal to current
    in amps (I) times resistance in ohms (R). The second equation states that wattage
    (Power) is equal to current in amps times voltage.


    It''s easy to algebraically rearrange these two equations to calculate the unknowns
    when any two values are known. This program prompts you to enter any two of these
    four values, the other two quantities will be calculated, and all four values
    will be output.


    This program defines a function named ohms_laws(), prints some instructions for
    your review, and then stops. From then on you call the new function to calculate
    all four values when any two are known.


    For example, consider a 60 watt light bulb powered by standard household 117 volts.
    Enter zeros for the two unknowns, current and resistance, and the function will
    find these values. The current is about half an amp, and the resistance of the
    bulb is about 228 ohms.'
  merge: -1
  pgno: 41
- img_proc: true
  md: "![](img/fbd07807412dd4a6618493b44ab77f1e_42_0.png)\n\n```\ndef ohms_laws(p,i,e,r):\n\
    \    if p and i:\n        e=p/i\n        r=p/(i*i)\n    elif p and e:\n      \
    \  i=p/e\n        r=(e*e)/p\n    elif p and r:\n        i=math.sqrt(p/r)\n   \
    \     e=math.sqrt(p*r)\n    elif i and e:\n        p=i*e\n        r=e/i\n    elif\
    \ i and r:\n        p=i*i*r\n        e=i*r\n    elif e and r:\n        p=(e*e)/r\n\
    \        i=e/r\n    else:\n        pass\n    return ([p,i,e,r])\n```\n\n```\n\
    print(\"ohms_laws(p,i,e,r)\")\nprint(\"Pass two known values, and zeros\")\nprint(\"\
    for the other two unknowns.\")\n```"
