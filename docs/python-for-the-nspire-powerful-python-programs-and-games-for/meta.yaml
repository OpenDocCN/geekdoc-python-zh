  md: '# clock


    Your TI-Nspire™ CX II technology calculator is capable of displaying some very
    nice color graphics, and the ti_draw module makes it all possible. This program
    demonstrates most of the graphics commands available, used here to create an animated
    analog clock face that ticks off the seconds in a visual way.


    Three other modules are imported to enable features of this program. The math
    module lets us use trigonometric functions to draw the hands of the clock at the
    correct angles as time marches on. The time module is required to access the internal
    time of your calculator. The ti_system module provides a way to redraw the clock
    face every second until you press the Esc key to stop it.


    I suggest taking a close look at the functions and other code lines of this program,
    making sure you understand how each command and function works. I have added quite
    a few comment lines to help you along. If you completely "grok" this code, you''ll
    have a very good handle on how to program your own amazing and impressive creations!


    Pay close attention to the function calls use_buffer(), paint_buffer(), and clear().
    These drastically speed up the graphics, by doing all the drawing in memory somewhere,
    and then instantly updating the completed whole image onto the display each second.
    Any animations you create will work much better if you use a background buffer
    in this way.'
