    # area_3s


    Heron''s formula lets us find the area of a triangle if the lengths of its three
    sides are known, without having to calculate angles or other distances first.
    Here''s the formula, given sides with lengths a, b, and c:


    ```

    $$s = \frac{a + b + c}{2}$$


    $$Area = \sqrt{s(s - a)(s - b)(s - c)}$$

    ```


    For example, what is the area of a triangle that has sides of 7, 11, and 17 cm?
    Input these three values into the program and the answer is calculated to be approximately
    24.44 square cm.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_181_0.png)'
