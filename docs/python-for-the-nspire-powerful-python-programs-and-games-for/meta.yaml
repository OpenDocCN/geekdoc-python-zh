    \ works with four parameters, the starting activity of a sample, its half-life,\
    \ elapsed time, and the ending activity of the sample. You input any combination\
    \ of three of these parameters and the fourth is calculated.\n\nFor example, an\
    \ isotope of chromium with a half-life of 667.2 hours has a starting activity\
    \ of 200 microcuries. What will its activity be exactly 24 hours later?\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_229_0.png)\n\
