  md: '# pi_darts


    Imagine a special dartboard that is square with a circle in it that just touches
    the square''s edges.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_86_0.png)


    If you throw darts at this dartboard completely at random, so every square inch
    has just as much chance of getting hit as any other square inch, then the ratio
    of the number of hits in the circle to the number of total throws can provide
    an estimate of the value of pi. This is easy to see because the ratio is dependent
    on the areas of the circle and the square, and the area of the circle is calculated
    using the value of pi.


    $Area = \pi * r^2$


    To simplify the program, we can just use the upper-right corner of the diagram
    above, a total area just of the full circle and square. This simplifies'
