- md: "# Python for the TI-Nspire™\n\nPowerful Python programs and games for the TI-Nspire™\
    \ CX II technology calculator\n\nby John Clark Craig\n\n## Introduction\n\n##\
    \ Why Python?\n\nPython, the world's most popular programming language, is an\
    \ ideal language for handheld calculators. The syntax is concise, easy to read,\
    \ and easy to understand, even for beginners. The language is non-proprietary,\
    \ so it runs everywhere, even on desktop and laptop computers with only minor\
    \ modifications from what you'll find in this book, and even then only in a very\
    \ few cases.\n\nPython handles number crunching well, and with its lists, strings,\
    \ and other data structures, it powerfully handles a very wide variety of programming\
    \ tasks. But perhaps the biggest advantage of learning Python via your programmable\
    \ calculator is that this knowledge will be applicable and useful no matter what\
    \ computers or systems you might work with in the future. Learn it once and you'll\
    \ have a new life skill of great value.\n\n## Python in your calculator\n\nMost\
    \ of the number crunching that takes place in Python programs is straightforward\
    \ and easy to understand. When it comes to interacting with the user to request\
    \ input and output (commonly referred to as I/O) there are some optional approaches,\
    \ and understanding some of these make it easier for you to make shorter programs,\
    \ or longer but more user friendly programs, depending on your style and programming\
    \ goals. The programs in this book use several of these approaches, and it's important\
    \ to know that you can change these programs if you prefer one type of programming\
    \ over another.\n\nAn excellent way to leverage Python in your calculator is to\
    \ simply define functions in a \"program\" file. When you run the program, nothing\
    \ visibly happens. But the function definitions are effectively added to your\
    \ calculator's toolbox, ready for your use while working in the shell. For example,\
    \ here's the contents of a very short program that defines a function named add().\n\
    \n```\ndef add(x, y):\n    return x+y\n```\n\nAfter you run this program, in the\
    \ shell you can type something like \"add(3,4)\" to get 7, or to add any two numbers\
    \ or variables together. More complicated functions can add some powerful new\
    \ capabilities to your computation toolbox!\n\nMany of the programs in this book\
    \ were created as sets of function definitions in this way. This keeps the programs\
    \ very short and easier to enter. In some cases, the programs also printed some\
    \ instructions and reminders on how to use the functions, for easy reference.\
    \ Take a look at the vectors program near the end of chapter 6 for a good example\
    \ of how to add helpful instructions, while just defining functions for later\
    \ use in the shell.\n\nThe standard way to create standalone programs in most\
    \ programming languages is to prompt the user for input data, and then to process\
    \ that data in a meaningful way to create output for the user. Throughout this\
    \ book there are several programs where you are asked to type data in response\
    \ to a prompt at run time, and then the calculations begin. Take a look at the\
    \ primes program, also in chapter 6, for an example where the program asks you\
    \ to enter the starting point to look for primes, and the number of those primes\
    \ to find.\n\nThere are a few other useful I/O tricks presented in several of\
    \ the programs in this book. It is sometimes useful to ask for a number, but to\
    \ let the user simply press [enter] without entering a number if they don't know\
    \ the value. This is actually a tricky thing to do, as a simple assignment to\
    \ a variable after an input() function call can fail if nothing is input. Take\
    \ a close look at the program arc_parts, in chapter 8 for an example where any\
    \ combination of two of four variables can be entered, and the missing ones will\
    \ be calculated. Here's a pair of code lines where an angle is entered, or a value\
    \ of zero is put in place if the user simply presses [enter].\n\n```\na=input(\"\
    Angle (deg): \")\na=float(a) if a else 0\n```\n\n### Learn by Examples\n\nThere\
    \ are many, many resources online and in other books to learn the intricacies\
    \ of the Python language. The goal of this book isn't to duplicate all this information.\
    \ Instead, there's a lot of short, useful programs that you can use \"right out\
    \ of the box\", and in putting them to use you'll learn a lot about Python indirectly.\n\
    \nIf you are looking for an absolute beginner's tutorial to help you get up to\
    \ speed with programming in Python on your TI-Nspire CX II technology calculator,\
    \ there's an excellent web site by Texas Instruments titled \"10 Minutes of Code:\
    \ Python\". I recommend taking a look at these skill building lessons. Here is\
    \ the link:\n\nhttps://education.ti.com/en/activities/ti-codes/python\n\nWhenever\
    \ you find a command that looks a little mysterious, I strongly suggest you Google\
    \ it for more information. In my opinion, this is a better way to learn a lot\
    \ of Python programming techniques, by using and experiencing the commands in\
    \ action.\n\nFor example, it took me awhile to stumble upon Python's useful zip()\
    \ function. I used it several places in the vectors program to create extremely\
    \ concise and powerful vector functions. Go Google on \"Python zip\", learn how\
    \ it works, and then you'll gain a really good understanding of how the vector\
    \ add() function works for 2d, 3d, or even bigger vectors.\n\nYour TI-Nspire™\
    \ CX II technology calculator is a very powerful learning tool, and with the addition\
    \ of Python, its mind-expanding capabilities are truly awesome!\n\n## 1. Dates\
    \ and Times\n\nHow old are you today? Next time someone asks you this question,\
    \ you can answer with the exact number of days rather than just rounding off to\
    \ the number of years. Then, to impress them even more, be sure to casually mention\
    \ the day of the week you were born.\n\nThese are the types of questions the programs\
    \ in this chapter will let you answer with ease.\n\n### calendar\n\nThis program\
    \ creates a nice one-month, single-page calendar for any month over a several-century\
    \ period of time.\n\nAt the heart of this program is a function that returns the\
    \ Julian Day Number for any date in the range of years from 1582 to 4000. This\
    \ function, named jd(), is explained in more detail later in this chapter, but\
    \ here it is used to determine the number of days in any given month, and the\
    \ day of the week for any date. From this information we can format all the days\
    \ in a given month into an easy-to-read one-month calendar.\n\nWilbur and Orville\
    \ Wright's first heavier than air flight took place on the morning of December\
    \ 17, 1903, at Kitty Hawk, North Carolina. We can run this program to see the\
    \ full one-month layout of December, 1903 and easily determine that the 17th was\
    \ a Thursday.\n\n```\nfrom ti_draw import *\n\ndef jd(m,d,y):\n    if m<3:\n \
    \       y-=1\n        m+=12\n    a=int(y/100)\n    b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n\
    \    f=int(30.6001*(m+1))\n    return b+d+e+f-1524.5\n\n# Get month and year\n\
    m=int(input(\"Month (1-12): \"))\ny=int(input(\"Year (1582-4000): \"))\nd1=int(jd(m,1,y))\n\
    dw=(d1+2)%7\nm2=m+1 if m<12 else 1\ny2=y if m<12 else y+1\nd2=int(jd(m2,1,y2))\n\
    dm=d2-d1\nmo=[\"Jan\",\"Feb\",\"Mar\",\"Apr\",\"May\",\"Jun\",\n    \"Jul\",\"\
    Aug\",\"Sep\",\"Oct\",\"Nov\",\"Dec\"]\n\n# Set spacing\nlt,tp,rs,cs=35,40,20,35\n\
    \n# Month, Year caption\ns=\"{} {}\".format(mo[m-1],y)\ndraw_text(lt+cs*2.5,tp-rs//2,s)\n\
    \n# Days of the week\ndraw_text(lt,tp+rs,\"Sun\")\ndraw_text(lt+cs,tp+rs,\"Mon\"\
    )\ndraw_text(lt+cs*2,tp+rs,\"Tue\")\ndraw_text(lt+cs*3,tp+rs,\"Wed\")\ndraw_text(lt+cs*4,tp+rs,\"\
    Thu\")\ndraw_text(lt+cs*5,tp+rs,\"Fri\")\ndraw_text(lt+cs*6,tp+rs,\"Sat\")\n\n\
    # Day numbers\nn=0\ny=tp+rs*2\nwhile n<dm:\n    n+=1\n    x=lt+cs*dw\n    s=\"\
    {:3d}\".format(n)\n    draw_text(x,y,s)\n    dw=(dw+1)%7\n    if dw==0:\n    \
    \    y+=rs\n```\n\n### date\n\nThis program uses the Julian Day Number function\
    \ to calculate the day of the week and the day of the year for a date in the range\
    \ of years from 1582 to 4000. The jd() function is described in more detail elsewhere\
    \ in this chapter.\n\nFor example, December 17, 1903 (the day Orville and Wilbur\
    \ made their first heavier-than-air flight) was a Thursday, and it was the 351st\
    \ day of the year, as shown in the following output in the Python Shell.\n\nThe\
    \ day of the year is found by subtracting the Julian Day Number for December 31\
    \ of the previous year from the selected day's Julian Day Number.\n\n```\ndef\
    \ jd(m,d,y):\n    if m<3:\n        y-=1\n        m+=12\n    a=int(y/100)\n   \
    \ b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n    f=int(30.6001*(m+1))\n```"
  mdcn: "# 适用于 TI-Nspire™ 的 Python\n\n适用于 TI-Nspire™ CX II 技术计算器的强大 Python 程序与游戏\n\
    \n作者：John Clark Craig\n\n## 引言\n\n## 为何选择 Python？\n\nPython 是全球最受欢迎的编程语言，也是手持计算器的理想语言。其语法简洁、易读易懂，即使对初学者也是如此。该语言非专有，因此可在任何地方运行，甚至在台式机和笔记本电脑上也只需对本书中的代码进行极小的修改即可运行，且仅在极少数情况下需要修改。\n\
    \nPython 擅长数值计算，并凭借其列表、字符串和其他数据结构，能够强大地处理各种编程任务。但或许通过可编程计算器学习 Python 的最大优势在于，无论你未来使用何种计算机或系统，这些知识都将适用且有用。学一次，你将掌握一项极具价值的新生活技能。\n\
    \n## 你计算器中的 Python\n\nPython 程序中进行的大多数数值计算都是直接且易于理解的。当涉及到与用户交互以请求输入和输出（通常称为 I/O）时，有几种可选方法，理解其中一些方法可以让你编写更短的程序，或者更长但更用户友好的程序，这取决于你的风格和编程目标。本书中的程序使用了其中几种方法，重要的是要知道，如果你偏好某种编程方式而非另一种，你可以修改这些程序。\n\
    \n在计算器中利用 Python 的一个绝佳方式是在“程序”文件中简单地定义函数。当你运行程序时，表面上什么也不会发生。但函数定义实际上已被添加到你的计算器工具箱中，随时准备在\
    \ shell 中使用。例如，这是一个定义了名为 `add()` 函数的非常简短的程序内容。\n\n```\ndef add(x, y):\n    return\
    \ x+y\n```\n\n运行此程序后，在 shell 中你可以输入类似 \"add(3,4)\" 的内容得到 7，或者将任意两个数字或变量相加。更复杂的函数可以为你的计算工具箱添加一些强大的新功能！\n\
    \n本书中的许多程序都是以这种方式作为一组函数定义创建的。这使得程序非常简短且易于输入。在某些情况下，程序还会打印一些关于如何使用函数的说明和提醒，以便于参考。请查看第\
    \ 6 章末尾的向量程序，这是一个很好的例子，展示了如何添加有用的说明，同时仅为在 shell 中后续使用而定义函数。\n\n在大多数编程语言中，创建独立程序的标准方式是提示用户输入数据，然后以有意义的方式处理这些数据，为用户创建输出。在本书中，有几个程序要求你在运行时输入数据以响应提示，然后计算开始。请查看第\
    \ 6 章中的质数程序，这是一个程序要求你输入查找质数的起始点以及要查找的质数数量的例子。\n\n本书的几个程序中还介绍了一些其他有用的 I/O 技巧。有时询问一个数字很有用，但如果用户不知道该值，可以让他们简单地按\
    \ [enter] 而不输入数字。这实际上是一件棘手的事情，因为在 `input()` 函数调用后，如果未输入任何内容，简单的变量赋值可能会失败。请仔细查看第\
    \ 8 章中的程序 `arc_parts`，这是一个可以输入四个变量中任意两个组合的示例，缺失的变量将被计算出来。下面是一对代码行，其中输入一个角度，或者如果用户只是按\
    \ [enter]，则放入零值。\n\n```\na=input(\"Angle (deg): \")\na=float(a) if a else 0\n\
    ```\n\n### 通过示例学习\n\n网上和其它书籍中有许多资源可以学习 Python 语言的复杂细节。本书的目标并非复制所有这些信息。相反，这里有很多简短、有用的程序，你可以“开箱即用”，通过使用它们，你将间接学到很多关于\
    \ Python 的知识。\n\n如果你正在寻找一个绝对初学者的教程，以帮助你快速掌握在 TI-Nspire CX II 技术计算器上使用 Python 编程，德克萨斯仪器公司有一个名为“10\
    \ Minutes of Code: Python”的优秀网站。我建议你看看这些技能构建课程。链接如下：\n\nhttps://education.ti.com/en/activities/ti-codes/python\n\
    \n每当你发现一个看起来有点神秘的命令时，我强烈建议你用谷歌搜索更多信息。在我看来，这是学习许多 Python 编程技巧的更好方法，通过在实践中使用和体验这些命令。\n\
    \n例如，我花了一段时间才偶然发现 Python 有用的 `zip()` 函数。我在向量程序中的多个地方使用了它，以创建极其简洁和强大的向量函数。去谷歌搜索“Python\
    \ zip”，了解它的工作原理，然后你将真正理解向量 `add()` 函数如何适用于二维、三维甚至更大的向量。\n\n你的 TI-Nspire™ CX II\
    \ 技术计算器是一个非常强大的学习工具，随着 Python 的加入，其拓展思维的能力确实令人惊叹！\n\n## 1. 日期与时间\n\n你今天多大了？下次有人问你这个问题时，你可以用确切的天数来回答，而不仅仅是四舍五入到年数。然后，为了给他们留下更深刻的印象，一定要不经意地提到你出生的星期几。\n\
    \n这些就是本章程序将让你轻松回答的问题类型。\n\n### calendar\n\n此程序为几个世纪内的任何月份创建一个漂亮的单页月历。\n\n该程序的核心是一个函数，它返回\
    \ 1582 年至 4000 年范围内任何日期的儒略日数。这个名为 `jd()` 的函数将在本章后面更详细地解释，但这里它用于确定任何给定月份的天数以及任何日期的星期几。根据这些信息，我们可以将给定月份的所有日期格式化为易于阅读的月历。\n\
    \n威尔伯和奥维尔·莱特兄弟的首次重于空气的飞行于 1903 年 12 月 17 日上午在北卡罗来纳州的基蒂霍克进行。我们可以运行此程序查看 1903 年\
    \ 12 月的完整月度布局，并轻松确定 17 日是星期四。\n\n```\nfrom ti_draw import *\n\ndef jd(m,d,y):\n\
    \    if m<3:\n        y-=1\n        m+=12\n    a=int(y/100)\n    b=2-a+int(a/4)\n\
    \    e=int(365.25*(y+4716))\n    f=int(30.6001*(m+1))\n    return b+d+e+f-1524.5\n\
    \n# 获取月份和年份\nm=int(input(\"Month (1-12): \"))\ny=int(input(\"Year (1582-4000):\
    \ \"))\nd1=int(jd(m,1,y))\ndw=(d1+2)%7\nm2=m+1 if m<12 else 1\ny2=y if m<12 else\
    \ y+1\nd2=int(jd(m2,1,y2))\ndm=d2-d1\nmo=[\"Jan\",\"Feb\",\"Mar\",\"Apr\",\"May\"\
    ,\"Jun\",\n    \"Jul\",\"Aug\",\"Sep\",\"Oct\",\"Nov\",\"Dec\"]\n\n# 设置间距\nlt,tp,rs,cs=35,40,20,35\n\
    \n# 月份、年份标题\ns=\"{} {}\".format(mo[m-1],y)\ndraw_text(lt+cs*2.5,tp-rs//2,s)\n\n\
    # 星期几\ndraw_text(lt,tp+rs,\"Sun\")\ndraw_text(lt+cs,tp+rs,\"Mon\")\ndraw_text(lt+cs*2,tp+rs,\"\
    Tue\")\ndraw_text(lt+cs*3,tp+rs,\"Wed\")\ndraw_text(lt+cs*4,tp+rs,\"Thu\")\ndraw_text(lt+cs*5,tp+rs,\"\
    Fri\")\ndraw_text(lt+cs*6,tp+rs,\"Sat\")\n\n# 日期数字\nn=0\ny=tp+rs*2\nwhile n<dm:\n\
    \    n+=1\n    x=lt+cs*dw\n    s=\"{:3d}\".format(n)\n    draw_text(x,y,s)\n \
    \   dw=(dw+1)%7\n    if dw==0:\n        y+=rs\n```\n\n### date\n\n此程序使用儒略日数函数来计算\
    \ 1582 年至 4000 年范围内日期的星期几和一年中的第几天。`jd()` 函数在本章其他地方有更详细的描述。\n\n例如，1903 年 12 月 17\
    \ 日（奥维尔和威尔伯进行首次重于空气飞行的那一天）是星期四，并且是该年的第 351 天，如下方 Python Shell 中的输出所示。\n\n一年中的第几天是通过用所选日期的儒略日数减去上一年\
    \ 12 月 31 日的儒略日数得出的。\n\n```\ndef jd(m,d,y):\n    if m<3:\n        y-=1\n     \
    \   m+=12\n    a=int(y/100)\n    b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n\
    \    f=int(30.6001*(m+1))\n```"
