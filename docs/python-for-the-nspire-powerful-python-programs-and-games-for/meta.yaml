    \ What did the phase of the moon look like on the day you were born?\n\nThese\
    \ and many other interesting and challenging questions are covered by the programs\
    \ in this chapter.\n\n## geosync_antenna\n\nSatellites orbit the Earth with an\
    \ orbital period based on their distance from the Earth. The International Space\
    \ Station is about 410 km up, and it takes about an hour and a half to complete\
    \ each orbit, whereas the Moon is about 385,000 km away, and it takes roughly\
    \ 27 days to complete one orbit.\n\nGeosynchronous satellites orbit between these\
    \ two extremes, at an altitude of about 35,786 km, where each orbit takes exactly\
    \ one day. They are located above the equator, orbiting in the same direction\
    \ that the Earth spins, with the result that they appear to stay in one spot above\
    \ the Earth all the time.\n\nThis program asks for the location on the Earth of\
    \ an antenna that is to be aimed at a geosynchronous satellite located at some\
    \ specific longitude above the equator, and calculates how to aim it. Azimuth\
    \ is the angle away from north along the horizon, where east is 90 degrees, south\
    \ is 180 degrees, and so on. Elevation angle is up from the horizon, where 90\
    \ degrees would be directly overhead.\n\nThe sign of longitudes should match Google\
    \ Maps locations. So west longitudes, such as in all of North America, are negative\
    \ numbers, and satellites with a west longitude location are also to be entered\
