    \ 33.376 degrees north, and 104.508 degrees west. The goal is to aim it at the\
    \ GOES-15 weather satellite located at 127.8 degrees west longitude. Edit these\
    \ values into the main part of the program (below the function definition, where\
    \ the code is not indented) as shown in the example. The antenna should be aimed\
    \ south-west at 218.0 degrees azimuth, and at an elevation of 43.8 degrees up\
    \ from the horizon.\n\nFor a more detailed explanation of the math involved in\
    \ this calculation, see the PDF document at [https://tinyurl.com/y3d5lvng](https://tinyurl.com/y3d5lvng).\
    \ For a list of current geosynchronous satellites, go to [https://tinyurl.com/y2ahfmwe](https://tinyurl.com/y2ahfmwe).\n\
    \n```python\nfrom math import *\n\ndef geosync(lat,lon,sat_lon):\n    la=radians(lat)\n\
    \    lo=radians(lon)\n    sl=radians(sat_lon)\n    L=sl-lo\n    D=acos(cos(la)*cos(L))\n\
    \    az=degrees(acos(-tan(la)/tan(D)))\n    az=az if L>0 else 360-az\n    cd=cos(D)\n\
    \    el=degrees(atan((cd-1/6.62)/(1-cd*cd)**.5))\n    az=round(az,2)\n    el=round(el,2)\n\
