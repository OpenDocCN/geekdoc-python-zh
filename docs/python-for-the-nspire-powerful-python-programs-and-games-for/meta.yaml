    # delta_wye


    When you run this program, nothing happens. Okay, a little explanation is in order.
    As explained early in this book, a simple and straightforward way to add powerful
    functions to your calculator is to simply define functions in a program that you
    can use over and over while working on some relevant problems. In this case, two
    functions are defined at run time, delta() and wye(), and they remain in the shell
    ready for your use.


    The delta() function converts resistances in a wye configuration to an equivalent
    delta configuration. The wye() function does the exact opposite conversion to
    output a wye configuration equivalent to a delta delta configuration you pass
    to it.


    Both of these functions also work for complex-number impedances, as demonstrated
    in the examples. This is a powerful feature for more advanced electronics analysis.


    The delta configuration is called that because the three resistors are arranged
    in a triangle, although circuit diagrams often show them in more of a pi arrangement,
    as shown here on the left. Notice that if you "pull together" the bottoms of RB
    and RC, a triangle is formed.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_27_0.png)


    Similarly, the wye configuration is often shown as more of a "T" arrangement,
    as shown here on the right. Just imagine the center point between R1, R2, and
    R3 pulled down a bit and you''ll see the "Y", or wye shape.'
