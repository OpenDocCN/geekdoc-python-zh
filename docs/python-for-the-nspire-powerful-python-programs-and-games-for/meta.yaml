  md: '# pennies


    This program is a little different, in that no attempt was made to minimize the
    number of bytes in the source code. It also calculates something totally amazing,
    so putting in a lot of explanatory comment lines and very clear, rather long variable
    names felt like the right thing to do. If you feel the results are too bizarre
    to believe, please by all means double and triple check my calculations, and let
    me know what you discover!


    Space is a very big place. Very big. I have researched and found the latest numbers
    for several important factors about stars, galaxies, and so on, and put reference
    links to places on the Internet where you can research for yourself. By the time
    you read this, some of these parameters will likely have been updated, so feel
    free to adjust the program as required.


    The exact dimensions of a U.S. penny let us calculate the size of a stack we can
    pile so many of them into. For example, a million pennies can be stacked in neat
    rows and columns into a mass very roughly the size of a desk or refrigerator.
    Keep that in mind as we proceed.


    This program uses the estimated number of stars per galaxy, the number of galaxies
    in the known Universe, the number of planets being found around stars, and so
    on, to make a guess as to how many "habitable zone" planets are out there somewhere.
    This rules out planets that are probably too hot or too cold for life as we know
    it, but it turns out there are likely many planets that are "just right". Some
    sources call these "Goldilocks planets".


    Follow through the calculations to see how big a stack of pennies would be if
    each penny represented one habitable zone planet. The answer is staggering!'
