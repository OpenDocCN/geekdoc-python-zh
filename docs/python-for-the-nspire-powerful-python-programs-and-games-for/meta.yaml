    \        else:\n            a=s/r\n    else:\n        a=.1\n        t=0\n    \
    \    while a!=t:\n            t=a\n            a=2*s*sin(a/2)/c\n        r=s/a\n\
    \    c=2*r*sin(a/2)\n    s=r*a\n    return [a,r,c,s]\n\nprint(\"\\n\\nInput two\
    \ known values\\n\")\na=input(\"Angle (deg): \")\na=float(a) if a else 0\na=radians(a)\n\
    r=input(\"Radius: \")\nr=float(r) if r else 0\nc=input(\"Chord length: \")\nc=float(c)\
    \ if c else 0\ns=input(\"Arc length: \")\ns=float(s) if s else 0\na,r,c,s=arcs(a,r,c,s)\n\
    a=degrees(a)\nprint(\"\\nAngle: \",a)\nprint(\"Radius: \",r)\nprint(\"Chord: \"\
    ,c)\nprint(\"Arc: \",s)\n```\n\n# area_3p\n\n平面上的三个x,y坐标点定义一个三角形。本程序可根据任意三个点计算三角形的面积。\n\
    \n如示例所示，将三个坐标编辑到程序中后，计算出的三角形面积为20平方单位。\n\n```python\ndef area_3p(p1,p2,p3):\n\
    \    x1,y1=p1\n    x2,y2=p2\n    x3,y3=p3\n    a=x1*y2+x2*y3+x3*y1\n    b=x1*y3+x2*y1+x3*y2\n\
