  md: '# About the author


    John Clark Craig has authored many books on programming topics, mostly covering
    versions of BASIC and Visual Basic languages as they evolved over time.


    Today his focus is on Python, the world''s most popular and easy-to-learn language,
    suitable for introducing young people to programming for the first time, yet powerful
    enough for the most challenging engineering, web design, gaming, robotic and machine
    learning ... actually ALL of today''s hot programming areas.


    In addition to writing books, John''s software projects have controlled and monitored
    huge solar energy projects, helped wind engineers design better towers for wind
    turbines, monitored natural gas and oil projects in Alaska, helped train athletes
    for the U.S. Olympics teams, aided in the design of artificial knee replacement
    parts, provided a Python library for easier 3D design using OpenSCAD, and even
    provided tools for scientifically based research into the UFO phenomenon.


    John lives in Colorado, today helping his wife with software tools that help her
    to help homeowners save lots of money by installing solar panels on rooftops.
    (See Solar-Proud.com)


    John is passionate about the Python programming language and how it can be used
    in so many diverse ways to help others make the world a better place, one programming
    line at a time.'
