    # rotate_3d


    This program inputs a 3-dimensional point in space and rotates it around each
    of the three axes by some angle in degrees.


    There are three functions in this program, one for rotating a space point around
    each axis. For demonstrating these functions, the point 3,4,5 is rotated around
    each axis by 45 degrees, and the new location in each case is output.


    These functions are at the core of many 3D graphics and other programs. I have
    used these functions to rotate antennas on the Earth to aim at geosynchronous
    satellites, and to rotate heliostats to reflect sunlight on solar energy targets.


