  md: '# pi_buffon


    The value of pi can be calculated in many ways, including simulating real-world
    randomness with random numbers. A guy named Georges-Louis de Buffon came up with
    a cool method along these lines, way back in the 18th century, way before the
    first Texas Instruments calculator was thought of. He suggested dropping needles
    randomly on a floor marked with parallel lines with fixed spacing, and counting
    the number of needles that touched one of the lines when it came to rest as compared
    to the total number dropped.


    There are many places on the Internet where you can read up on all the math involved
    in this process, all leading to an estimate of the value of pi. It really is ingenious.
    With your TI-Nspire™ CX II technology calculator you can simulate dropping thousands
    of needles in just seconds, a good feature since this method really is slow to
    converge accurately on the value of pi. You''d have to have a lot of patience
    to use real needles!


    The program asks how many needles you want to drop. Try 1,000 or perhaps 10,000
    needles for reasonable run times. Try more if you can let your calculator sit
    on a shelf and run for a long time, or less if you just want to see some crude
    estimates of pi. Here''s the result of choosing 1,000 needles:'
  merge: -1
  pgno: 84
- img_proc: true
  md: "![](img/fbd07807412dd4a6618493b44ab77f1e_85_0.png)\n\n```\nfrom random import\
    \ *\nfrom math import *\n\nneedles=1000\nhits=0\np2=pi*2\nfor i in range(needles):\n\
    \    x=random()\n    a=uniform(0,p2)\n    x2=x+cos(a)\n    if x2<0 or x2>1:\n\
    \        hits+=1\nprint(2.0*needles/hits)\n```\n\nSimilar programs for calculating\
    \ pi using random numbers are pi_darts and pi_graphics."
