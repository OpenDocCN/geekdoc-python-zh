- md: "## 5. Money and Finances\n\nThis chapter presents several programs to calculate\
    \ interest, savings, loans and other details having to do with the flow of money.\n\
    \nThe next time you're ready to buy a car, or house, or game console, you can\
    \ see how much the loan will cost you in interest, or better yet, how long it\
    \ will take to save up to pay cash.\n\n### deposits\n\nThis short program helps\
    \ you save for a goal by calculating how much money to put away in an interest\
    \ bearing account, and for how long, in order to reach your goal.\n\nFor example,\
    \ perhaps you want to get a new gaming laptop that costs $1000, and you want it\
    \ one year from today. As shown, you should start putting away $80.69 each month\
    \ in an account if it earns 7% interest.\n\n```python\nfv=float(input(\"Dollars\
    \ goal: \"))\nir=float(input(\"Interest rate: \"))\nmo=float(input(\"Months: \"\
    ))\nir/=1200\ndp=fv/((ir+1)**mo-1)*ir\ns=\"Monthly deposits: ${:.2f}\"\nprint(s.format(dp))\n\
    ```\n\n### future_value\n\nSaving up for something you want to purchase in the\
    \ future is a great way to make your money go further. The money accumulates at\
    \ some interest rate, instead of having to pay out interest on a loan, so you\
    \ basically save in two ways. This program lets you experiment to see just how\
    \ much you'll save, and to help you stay on target as you invest in yourself.\n\
    \nYou are prompted for the amount of money you can provide each month, the annual\
    \ interest rate that the money will accumulate more value, and the number of years\
    \ to tally the total. The future value is output. In the example shown, $50 is\
    \ put away each month, at an accumulating annual interest rate of 7%, and the\
    \ future value after 3 years, totalling $1996.51 is output.\n\n```python\ndp=float(input(\"\
    Monthly deposit: \"))\nir=float(input(\"Interest rate: \"))\nyr=float(input(\"\
    Years: \"))\nir/=1200\nmo=yr*12\nfv=dp*((ir+1)**mo-1)/ir\nprint(\"Future value:\
    \ ${:,.2f}\".format(fv))\n```\n\n### interest\n\nThis program calculates the interest\
    \ rate being charged for a loan when the principal, monthly payment amount, and\
    \ the number of months to make the payments are known. The calculated annual interest\
    \ rate is output.\n\nThe example shows an annual percentage rate of 10.49% is\
    \ being charged for a loan of $10,000 with monthly payments of $325 over a 3 year\
    \ period, or 36 months.\n\n```python\np=float(input(\"Principal: \"))\npmt=float(input(\"\
    Monthly payments: \"))\nn=float(input(\"Months: \"))\nr,t=1,0\nwhile t!=r:\n \
    \   t=r\n    r=pmt*((1+r)**n-1)/p/(1+r)**n\ni=round(r*1200,2)\nprint(\"APR: {}%\"\
    .format(i))\n```\n\n### months\n\nThis program calculates the number of months\
    \ required to pay off an amount of money, when the loan is accumulating interest\
    \ charges.\n\nFor example, you borrow $1,000 and agree to pay $25 each month at\
    \ 7% interest. This program tells you that it will take 49 months. The number\
    \ of months is rounded off to the nearest whole month. The good news is the last\
    \ payment will likely be less than the rest of the payments.\n\n```python\np=float(input(\"\
    Principal: \"))\nr=float(input(\"Annual Interest: \"))/1200\npmt=float(input(\"\
    Monthly payments: \"))\nn,d=0,pmt+1\nwhile d>pmt:\n    n+=1\n    d=round(p*(r*(1+r)**n)/((1+r)**n-1),2)\n\
    print(\"Months: \",n)\n```\n\n### payments\n\nThis program calculates monthly\
    \ payments for a loan given the amount, or principal of the loan, the annual percentage\
    \ rate, and the number of monthly payments to be made.\n\nThe example shows a\
    \ loan of $5000 at 9% interest rate will require 24 monthly payments of $228.42.\n\
    \n```python\np=float(input(\"Principal: \"))\nr=float(input(\"Annual Interest:\
    \ \"))/1200\nn=float(input(\"Months: \"))\npmt=p*(r*(1+r)**n)/((1+r)**n-1)\npmt=\"\
    ${}\".format(round(pmt,2))\nprint(\"Monthly payments: \",pmt)\n```\n\n### principal\n\
    \nGiven the monthly payment amount for a loan, the annual percentage rate for\
    \ the loan, and the number of months to pay the loan off, this program calculates\
    \ the original principal of the loan.\n\nFor example, given payments of $228.42\
    \ monthly for 24 months at 9% interest, the original loan amount was $4999.92.\
    \ The actual amount of the loan was probably $5000, because slight roundoff errors\
    \ can accumulate to a few cents pretty easily, as in this case.\n\n```python\n\
    pmt=float(input(\"Monthly payments: \"))\nr=float(input(\"Annual Interest: \"\
    ))/1200\nn=float(input(\"Months: \"))\np=pmt/(r*(1+r)**n)*((1+r)**n-1)\np=\"${}\"\
    .format(round(p,2))\nprint(\"Principal: \",p)\n```\n\n## 6. Numerical Calculations\n\
    \nThe programs in this chapter cover a lot of the standard calculations that calculators\
    \ and computers can do, and that you might find useful for your studies or on\
    \ the job. The programs vary from a fast way to find prime numbers, to solving\
    \ simultaneous equations, finding roots of equations, providing a complete set\
    \ of vector functions, and more.\n\n### bin_dec_hex\n\nComputers use bits and\
    \ bytes and numbers in hexadecimal and binary format all the time. This program\
    \ shows how a number can easily be converted to and from any of these formats.\n\
    \nFor example, the hexadecimal number 0x4DF3 is the same as decimal 19955, and\
    \ it's the same as the binary number 0b100110111110011. The program asks for input\
    \ in any one of the formats, and all three formats are displayed as output.\n\n\
    Note that there's an even simpler way to convert hexadecimal or binary numbers\
    \ to decimal. In the shell, at the >>> prompt simply enter the value, making sure\
    \ you add the appropriate prefix of either \"0x\" or \"0b\". The decimal value\
    \ will be displayed. To convert in the other direction, from decimal to the other\
    \ two formats, this program does the trick. Hexadecimal values can be entered\
    \ in either upper or lower case.\n\nThe last few lines of the program show how\
    \ to format a decimal integer for output in all three number formats.\n\n```python\n\
    print(\"Input one of the following\")\nprint(\"@bnn.. binary\")\nprint(\"nn..decimal\"\
    )\nprint(\"0xnn.. hexadecimal\")\nn=input(\"Number? \").lower()\nif n[0]==\"0\"\
    :\n    if n[1]==\"b\":\n        n=int(n[2:],2)\n    elif n[1]==\"x\":\n      \
    \  n=int(n[2:],16)\nelse:\n    n=int(n)\nprint(\"Hex: \",\"0x{:X}\".format(n))\n\
    print(\"Bin: \",\"0b{0:b}\".format(n))\nprint(\"Dec: \",n)\n```\n\n### binary_search\n\
    \nThis program finds roots of a function, or where the function crosses the x-axis\
    \ at y=0. Edit your function of x in the appropriately named function f(x), at\
    \ the top of the listing. Here's the function we'll work with in the example:\n\
    \n```python\ndef f(x):\n    return 0.7*x**3-7*x**2+3*x+17\n```\n\nA quick plot\
    \ of this function on your TI-Nspire™ CX II technology calculator (not using Python)\
    \ shows the function has three roots that lie somewhere between -5 and +12 on\
    \ the X axis. This program will help you find those roots fast and efficiently.\n\
    \nThe roots() function in this program is passed three values; the starting x\
    \ value for the interval to check, the ending x value, and the number of steps\
    \ to take between them. The number of steps should be sufficient that a zero-crossing\
    \ of the function won't be \"stepped over\". 100 works well in most cases. If\
    \ there's one or more roots in the designated interval, they will be returned.\n\
    \nIn this example, since we know the three roots are between -5 and +12 (the edges\
    \ of the graph), the roots() function is called like this: roots(-5, 12, 100),\
    \ and the three returned roots are printed on the display."
  mdcn: "## 5. 货币与财务\n\n本章介绍了几个用于计算利息、储蓄、贷款以及其他与资金流动相关细节的程序。\n\n下次当你准备购买汽车、房屋或游戏机时，你可以看看贷款会产生多少利息，或者更好的是，看看需要多长时间才能攒够现金支付。\n\
    \n### 存款\n\n这个简短的程序通过计算需要在有息账户中存入多少钱以及存多久，来帮助你为某个目标储蓄。\n\n例如，也许你想买一台价值1000美元的新游戏笔记本电脑，并且希望在一年后拥有它。如示例所示，如果账户利率为7%，你应该每月开始存入80.69美元。\n\
    \n```python\nfv=float(input(\"Dollars goal: \"))\nir=float(input(\"Interest rate:\
    \ \"))\nmo=float(input(\"Months: \"))\nir/=1200\ndp=fv/((ir+1)**mo-1)*ir\ns=\"\
    Monthly deposits: ${:.2f}\"\nprint(s.format(dp))\n```\n\n### 未来价值\n\n为你将来想购买的东西储蓄，是让你的钱发挥更大价值的好方法。资金以一定的利率累积，而不是需要支付贷款利息，所以你基本上是在以两种方式储蓄。这个程序让你可以尝试看看你能节省多少，并帮助你在投资自己时保持目标。\n\
    \n程序会提示你输入每月可以提供的金额、资金将累积增值的年利率，以及计算总额的年数。然后输出未来价值。在示例中，每月存入50美元，年累积利率为7%，输出3年后的未来价值，总计1996.51美元。\n\
    \n```python\ndp=float(input(\"Monthly deposit: \"))\nir=float(input(\"Interest\
