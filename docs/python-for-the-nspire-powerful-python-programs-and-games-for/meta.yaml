- md: "## fact_comb_perm\n\nThis program creates three functions that come in handy\
    \ for statistics and probability challenges. The `fact()` function returns the\
    \ factorial of an integer, `perm()` calculates the number of permutations of n\
    \ things taken r at a time, and `comb()` returns the number of combinations of\
    \ n things taken r at a time.\n\nFor this program I decided to enter the values\
    \ of n and r directly in the code, rather than prompting for the numbers using\
    \ `input()`. To try other values, enter the editor mode and change the lines where\
    \ n and r are set. For the example that follows these values are set to 52 and\
    \ 5. I used 52 because it's the number of cards in a standard deck of playing\
    \ cards.\n\nThere's more than one way to program the factorial function. Many\
    \ sources show how to use recursion, an efficient and compact concept that's useful\
    \ for other programming tasks too. I chose to use a loop to multiply all the numbers\
    \ from 1 to n together, because this is fast and doesn't eat up a whole bunch\
    \ of memory as can happen with recursion.\n\nThe `fact()` function demonstrates\
    \ how integers in Python are not limited in size, other than any limitations inherent\
    \ in the machine's memory or speed considerations. The example calculates the\
    \ factorial of 100, returning a truly huge numerical result, and this is something\
    \ most other calculators and other programming languages won't let you do. Python\
    \ is awesome!\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_66_0.png)\n\n```python\n\
    def fact(n):\n    if n<0:\n        return 0\n    if n<2:\n        return 1\n \
    \   fact=1\n    for i in range(n):\n        fact*=(i+1)\n    return fact\n\ndef\
    \ perm(n,r):\n    return fact(n)//fact(n-r)\n\ndef comb(n,r):\n    return perm(n,r)//fact(r)\n\
    \nprint(\"fact(5): \",fact(5))\nprint(\"fact(20): \",fact(20))\nprint(\"fact(100):\
    \ \",fact(100))\n\nn,r=52,5\nprint(\"n={}, r={}\".format(n,r))\nprint(\"perm(n,r):\
    \ \",perm(n,r))\nprint(\"comb(n,r): \",comb(n,r))\n```\n\n## heads_in_a_row\n\n\
    On the average, how many times do you need to flip a coin to get seven heads in\
    \ a row? This can be solved with an explicit mathematical formula, as shown in\
    \ the last line of this program, but it's much more fun to have your calculator\
    \ simulate a whole bunch of flips in a row to get an approximate answer. The more\
    \ trials you do, or the more times you flip the coin, the more accurate the answer\
    \ gets, on the average of course. This is a good example of a Monte Carlo simulation,\
    \ where a lot of random trials can be run in a computer to get closer and closer\
    \ to an accurate real-world answer.\n\nIn this case, it is predicted mathematically\
    \ that it takes an average of 254 flips of a coin in a row to get seven heads\
    \ in a row. Some times less, some times more, but on the average it works out\
    \ to 254 flips.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_67_0.png)\n\nThe program\
    \ uses the random module to generate random flips of a coin, counting up every\
    \ time a head shows up, resetting the count when a tail shows up, and stopping\
    \ each trial when seven heads in a row finally show up. As shown, after 200 trials,\
    \ it took an average of 242.48 flips to get seven heads in a row. Run this program\
    \ several times to see this average shift to values in the neighborhood of 254.\n\
    \nFeel free to experiment by changing the number of trials, or the target number\
    \ of heads in a row. Be careful though, as the program can take a long time to\
    \ run if larger numbers are used.\n\n```python\nfrom random import *\n\ngoal=7\n\
    trials=200\ntally=0\n\ndef flips():\n    n=0\n    inarow=0\n    while 1:\n   \
    \     n+=1\n        if randint(0,1):\n            inarow+=1\n        else:\n \
    \           inarow=0\n        if inarow==goal:\n            return n\n\nfor i\
    \ in range(trials):\n    tally+=flips()\n\nprint(\"\\nFlips to get\",goal,\"heads\
    \ in a row\")\nprint(\"Trials: \",trials)\nprint(\"Average: \",tally/trials)\n\
    print(\"Predicted: \",2**(goal+1)-2)\n```\n\n## hunt_direction\n\nCompared to\
    \ hunt_distance (see the next program), this game is exactly the same, only different\
    \ (one of my favorite sayings.) Your goal is to find the randomly assigned target\
    \ coordinates in a 100 x 100 grid. With each guess you are directed towards the\
    \ target using map-like directions, such as \"Move SE\" for south-east, or \"\
    Move W\" for straight west. The goal is to find the target in as few moves as\
    \ possible.\n\nHere's a sample run of the game. In this case I uncommented the\
    \ `print(x,y)` line so you can see that the target is at 57,32. The coordinates\
    \ use the bottom left corner as the origin, or x,y point of (0,0).\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_69_0.png)\n\
    \n```python\nfrom random import *\n\nx=randrange(100)\ny=randrange(100)\n# print(x,y)\n\
    \nn=0\nwhile 1:\n    n+=1\n    g=input(\"x,y? \").split(\",\")\n    a=int(g[0])\n\
    \    b=int(g[1])\n    d=\"\"\n    if b<y:d+=\"N\"\n    if b>y:d+=\"S\"\n    if\
    \ a<x:d+=\"E\"\n    if a>x:d+=\"W\"\n    if d==\"\":break\n    print(\"Move\"\
    ,d)\nprint(\"\\nBingo! at {} guesses\".format(n))\n```\n\n## hunt_distance\n\n\
    This program is a game that challenges your visual-spatial skills, as well as\
    \ your numerical and analytic thinking processes. Plus, it's fun!\n\nSomewhere\
    \ in a 100 x 100 grid there's a critter/target/goal for you to find. You enter\
    \ a coordinate pair, and the straight-line distance to the hidden spot is calculated\
    \ and shown. The goal is to find the critter/target/goal in as few guesses as\
    \ possible.\n\nYou might want to get a piece of graph paper and sketch circles\
    \ centered on your guess points. This should allow you to find the target in just\
    \ a few guesses, and it isn't cheating as long as you're having fun and learning\
    \ something about the pythagorean theorem and other analytical geometry skills.\
    \ Or, like me, you can just intuit your guesses, trying to shorten the distance\
    \ with each guess, and reverse course when getting further away. That's fun too.\n\
    \nHere's a short sample run of the game (usually it can take more than 3 guesses),\
    \ but it shows how things work:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_72_0.png)\n\
    \nNotice in the source code there's a commented out line, where it prints the\
    \ target x and y values. Feel free to uncomment this line to make the game easier.\
    \ You'll see the critter/target/goal coordinates and you can play around with\
    \ the guesses to see how the distance works out with each guess.\n\n```python\n\
    from random import *\n\nx=randrange(100)\ny=randrange(100)\n# print(x,y)\n\nn=0\n\
    while 1:\n    n+=1\n    g=input(\"x,y? \").split(\",\")\n    a=int(g[0])\n   \
    \ b=int(g[1])\n    d=((x-a)**2+(y-b)**2)**.5\n    if d==0:break\n    print(\"\
    Dist: \",d)\nprint(\"\\nBingo! at {} guesses\".format(n))\n```\n\n## jumble\n\n\
    This program asks for a word or phrase, then jumbles up the letters randomly as\
    \ many times as you want. This is handy for various anagram or word jumble puzzles\
    \ or challenges.\n\nFor example, I entered my first and last name, nine letters\
    \ in all, and asked for 5 random jumbles to be output:\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_73_0.png)\n\
    \nAlready I started to see some short words, such as OR, AIR, HOG, HAIR, and so\
    \ on. I continued to ask for more jumbles, and some bigger words started to pop\
    \ into my mind as I stared at the results, words like CHAGRIN, CIGAR, JARGON,\
    \ JOIN, and GAIN.\n\nYou can keep on shuffling as many times as you want, and\
    \ the program will end when you just press OK without entering a count.\n\n```python\n\
    from random import *\n\nprint(\"Jumble word or phrase?\")\ns=input(\"? \")\ns=list(s.replace(\"\
    \ \",\"\").upper())\nm=len(s)\nwhile 1:\n    try:\n        n=int(input(\"How many\
    \ jumbles? \"))\n    except:\n        break\n    while n:\n        n-=1\n    \
    \    for i in range(m):\n            j=randrange(m)\n            s[i],s[j]=s[j],s[i]\n\
    \        t=\"\"\n        for i in range(m):\n            t+=s[i]\n        print(t)\n\
    ```\n\n## maze\n\nThis program uses the ti_draw graphics module to sketch a random\
    \ maze on your calculator. Every time you run the program, a different maze is\
    \ drawn, so it's a new challenge every time. The random module provides the randomness.\n\
    \n![](img/fbd07807412dd4a6618493b44ab77f1e_75_0.png)\n\nThe art and science of\
    \ creating mazes is very interesting. Check out the internet if this subject is\
    \ of interest to you. Or, you can just have some fun by running this program to\
    \ see how fast you can mentally navigate from the upper left corner to the bottom\
    \ right to help keep your brain cells in good shape.\n\n```python\nfrom ti_draw\
    \ import *\nfrom random import *\n\ndef vline(x,y,w):\n    if w:\n        x1=x*w1+9\n\
    \        y1=y*w1+3\n        draw_line(x1,y1,x1,y1+w1)\n```"
  mdcn: "## fact_comb_perm\n\n本程序创建了三个在统计和概率挑战中非常有用的函数。`fact()` 函数返回一个整数的阶乘，`perm()`\
    \ 计算从 n 个物品中取 r 个的排列数，而 `comb()` 返回从 n 个物品中取 r 个的组合数。\n\n对于这个程序，我决定直接在代码中输入 n\
    \ 和 r 的值，而不是使用 `input()` 来提示输入数字。要尝试其他值，请进入编辑器模式并更改设置 n 和 r 的行。在接下来的示例中，这些值被设置为\
    \ 52 和 5。我使用 52 是因为这是一副标准扑克牌的张数。\n\n编写阶乘函数的方法不止一种。许多资料展示了如何使用递归，这是一种高效且紧凑的概念，对其他编程任务也很有用。我选择使用一个循环将从\
    \ 1 到 n 的所有数字相乘，因为这样速度快，并且不会像递归那样消耗大量内存。\n\n`fact()` 函数展示了 Python 中的整数大小不受限制，除了机器内存或速度考虑固有的限制。该示例计算了\
    \ 100 的阶乘，返回了一个真正巨大的数值结果，这是大多数其他计算器和其他编程语言无法做到的。Python 太棒了！\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_66_0.png)\n\
    \n```python\ndef fact(n):\n    if n<0:\n        return 0\n    if n<2:\n      \
    \  return 1\n    fact=1\n    for i in range(n):\n        fact*=(i+1)\n    return\
    \ fact\n\ndef perm(n,r):\n    return fact(n)//fact(n-r)\n\ndef comb(n,r):\n  \
    \  return perm(n,r)//fact(r)\n\nprint(\"fact(5): \",fact(5))\nprint(\"fact(20):\
    \ \",fact(20))\nprint(\"fact(100): \",fact(100))\n\nn,r=52,5\nprint(\"n={}, r={}\"\
    .format(n,r))\nprint(\"perm(n,r): \",perm(n,r))\nprint(\"comb(n,r): \",comb(n,r))\n\
    ```\n\n## heads_in_a_row\n\n平均而言，你需要抛多少次硬币才能连续得到七次正面？这可以用一个明确的数学公式来解决，如本程序最后一行所示，但让计算器模拟大量连续抛掷以获得近似答案要有趣得多。你进行的试验次数越多，或者抛硬币的次数越多，答案就越准确（当然是在平均意义上）。这是一个蒙特卡洛模拟的好例子，可以在计算机中运行大量随机试验，从而越来越接近准确的现实世界答案。\n\
    \n在这种情况下，数学预测表明，平均需要连续抛掷 254 次硬币才能得到七次正面。有时少一些，有时多一些，但平均下来是 254 次。\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_67_0.png)\n\
    \n该程序使用 random 模块生成随机的硬币抛掷结果，每次出现正面时计数加一，出现反面时重置计数，并在最终连续出现七次正面时停止每次试验。如图所示，在\
