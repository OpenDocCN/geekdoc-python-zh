- img_proc: true
  md: "# date\n\nThis program uses the Julian Day Number function to calculate the\
    \ day of the week and the day of the year for a date in the range of years from\
    \ 1582 to 4000. The jd() function is described in more detail elsewhere in this\
    \ chapter.\n\nFor example, December 17, 1903 (the day Orville and Wilbur made\
    \ their first heavier-than-air flight) was a Thursday, and it was the 351st day\
    \ of the year, as shown in the following output in the Python Shell.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_8_0.png)\n\
    \nThe day of the year is found by subtracting the Julian Day Number for December\
    \ 31 of the previous year from the selected day's Julian Day Number.\n\n```\n\
    def jd(m,d,y):\n    if m<3:\n        y-=1\n        m+=12\n    a=int(y/100)\n \
    \   b=2-a+int(a/4)\n    e=int(365.25*(y+4716))\n    f=int(30.6001*(m+1))\n```"
  merge: -1
  pgno: 8
- img_proc: true
  md: '```

    return b+d+e+f-1524.5


    m=int(input("Month (1-12): "))

    d=int(input("Day (1-31): "))

    y=int(input("Year (1582-4000): "))

    dj=int(jd(m,d,y))

    dn=(dj+2)%7

    dw=["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]

    print("\n{}/{}/{}".format(m,d,y))

    print("Day of week: ",dw[dn])

    dy=dj-int(jd(12,31,y-1))

    print("Day of year: ",dy)

    ```'
