    \ pennies can be stacked in neat rows and columns into a mass very roughly the\
    \ size of a desk or refrigerator. Keep that in mind as we proceed.\n\nThis program\
    \ uses the estimated number of stars per galaxy, the number of galaxies in the\
    \ known Universe, the number of planets being found around stars, and so on, to\
