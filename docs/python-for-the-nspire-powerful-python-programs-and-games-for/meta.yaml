    \    print(\"v1: \",v1)\n    print(\"v2: \",v2)\n    print(\"vi: \",vi)\n    print(\"\
    C: \",C)\n    print(\"R: \",R)\n    print(\"t: \",t)\n```\n\n```\nprint(\"rc(v1,v2,vi,C,R,t)\"\
    )\nprint(\"Pass 0 for the unknown\")\n```\n\nWhen you run this program the two\
    \ functions are defined but no further action is taken. You can then type into\
    \ the shell the rc() function, passing all six parameters. Any one, and only one,\
    \ of the arguments should be zero, and its value will be calculated using the\
    \ other five arguments.\n\nFor example, starting with V1 at 0 volts, then applying\
    \ V2 of 5 volts, how"
