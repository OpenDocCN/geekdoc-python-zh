    \ This rules out planets that are probably too hot or too cold for life as we\
    \ know it, but it turns out there are likely many planets that are \"just right\"\
    . Some sources call these \"Goldilocks planets\".\n\nFollow through the calculations\
    \ to see how big a stack of pennies would be if each penny represented one habitable\
    \ zone planet. The answer is staggering!\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_227_0.png)\n\
    \n```python\n# Pennies_us\n\n# https://tinyurl.com/yenrntau\n# Dimensions of U.S.\
