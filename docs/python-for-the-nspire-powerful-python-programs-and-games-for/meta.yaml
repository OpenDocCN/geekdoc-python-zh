    \ Be sure to enter the elapsed time in the same, matching units. In this case\
    \ both values are in hours.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_230_0.png)\n\
    \nThe final activity, measured the next day, will be 195 microcuries.\n\n```python\n\
