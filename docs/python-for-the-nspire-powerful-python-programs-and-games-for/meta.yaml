  md: '# led_resistor


    LEDs are awesome. Once you know how to power them properly, you can light up all
    kinds of fun artwork, gadgets, and inventions in any color and blinking patterns
    imaginable. For example, the author invented a brake light for bicycles that requires
    no wiring to the brakes at all, instead relying on an accelerometer chip to determine
    when to flash bright red LEDs to indicate deceleration. Check out LucidBrakes™
    online.


    An LED is a special type of diode, where current flows easily in one direction
    through it, and not in the other direction. To light up an LED you need to use
    a resistor to limit the amount of current allowed to flow in the "easy" direction.
    This program helps you calculate the size of that resistor. It also helps determine
    the current and power requirements, to make sure no magic smoke is emitted from
    anything!


    The standard way to wire up an LED is with a resistor in series, and a voltage
    source powering them both:


    ![](img/fbd07807412dd4a6618493b44ab77f1e_35_0.png)


    Here are the equations that tie together all the calculations we''ll need in the
    program, where Vs is the source voltage, Vf is the forward voltage across the
    LED, Vr is the voltage across the resistor, i is is the current in amps'
  merge: -1
  pgno: 35
- img_proc: true
  md: "through everything, Wr is the watts of power in the resistor, and Wf is the\
    \ watts of power in the LED.\n\n![](img/fbd07807412dd4a6618493b44ab77f1e_36_0.png)\n\
    \nHere's the the program listing:\n\n```\ndef led_resistor(Vs,Vf,i):\n    r=(Vs-Vf)/i\n\
    \    Wr=(Vs-Vf)*i\n    Wl=Vf*i\n    return [r,Wr,Wl]\n\ndef led_current(Vs,Vf,r):\n\
    \    i=(Vs-Vf)/r\n    Wr=(Vs-Vf)*i\n    Wl=Vf*i\n    return [i,Wr,Wl]\n\nVs=float(input(\"\
    Source Vs: \"))\nVf=float(input(\"LED Vf: \"))\nprint(\"\\nNow enter one of these\
    \ two...\")\ni=input(\"Current in amps: \")\ni=float(i) if i else 0\nr=input(\"\
    LED resistor in ohms: \")\nr=float(r) if r else 0\nif i:\n    r,Wr,Wl=led_resistor(Vs,Vf,i)\n\
    else:\n    i,Wr,Wl=led_current(Vs,Vf,r)\nprint(\"\\nVs: \",Vs)\nprint(\"Vf: \"\
