    Consider that the Sun''s elevation angle can be easily measured with a simple
    meter stick on a sunny day. I won''t go into all the details here, but note that
    the elevation angle of the Sun as measured from three equidistant points on the
    Earth, will provide all the information you need. If the Earth is flat, the elevation
    angles will behave one way, and if the Earth is round the angles will behave another
    way. (Hint: it is round.)


