  md: '# digits


    Digits is a challenging game that can be a lot of fun, or it can drive you nuts!
    It definitely will stretch your brain cells as you up your level. Level 1 is ridiculously
    easy, and yet I don''t know anyone who has solved a level 9 game at this time.
    Maybe you will be the first!


    The rules are fairly simple. The digits 1 to 9 are arranged at random in a 3 x
    3 grid, with a few of them missing. These digits are displayed in blue. You need
    to figure out what the missing digits are. Around the edges of the game are clue
    numbers, displayed in dark green. They''re located at both ends of each row and
    column, and they are the result of secretly adding or subtracting the digits in
    the given row or column.


    When you think you have the digits all figured out correctly, press [esc] to see
    the solution. The missing digits will show up in red for verification. Press [esc]
    again to erase the puzzle, and again to exit back to the shell.


    Start with skill level 1. This will create a very simple game that helps you understand
    how the game is played. Here we go:'
