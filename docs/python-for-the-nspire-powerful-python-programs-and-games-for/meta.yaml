    # triangles


    This program solves for all sides, angles, and the area of a triangle given any
    combination of three of its sides or angles.


    There are five combinations of sides and angles possible. If s represents a side,
    and a represents an angle, then the combinations that can occur as you walk around
    the triangle''s edges and angles sequentially are: sss, sas, ssa, asa, and aas.
    This program asks which condition is known, then prompts for those three parts
    and calculates all the rest, plus the area.


    The output parts are labeled s1, s2, and s3 for the sides, and a1, a2, a3 for
    the angles opposite those sides. Area is the last item output.


    For example, what are the angles and area for a triangle with sides 4, 5 and 6?


