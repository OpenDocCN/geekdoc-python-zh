  md: '# date_add_days


    This program calculates a date that is a given number of days added to a starting
    date. For example, the Wright brother''s first flight occurred on December 17,
    1903. What was the date 40,000 days in the future from that day? As shown in the
    output, June 22, 2013 is the date "way out in the future" from the day people
    first took to the air.


    ![](img/fbd07807412dd4a6618493b44ab77f1e_10_0.png)


    In case you''re wondering, yes you can add a negative number of days to find an
    earlier date.


    To perform this calculation the starting date is converted to its Julian Day Number
    using the jd() function, the number of days is added to create a second Julian
    Day Number, and the mdy() function converts that number back to a date. The Julian
    Day Number automatically takes care of leap years, varying numbers of days in
    the months, and all those details. These two functions are described in more detail
    in the julian program in this chapter.


    ```

    from math import *

    ```'
  merge: -1
  pgno: 10
- img_proc: true
  md: "```\ndef jd(m,d,y):\n    if m<3:\n        y-=1\n        m+=12\n    a=int(y/100)\n\
