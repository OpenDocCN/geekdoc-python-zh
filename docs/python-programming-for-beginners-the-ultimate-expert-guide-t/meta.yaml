    outcome = sqrt(25) # Use sqrt function directly


    print(outcome) # Output will be: 5.0


    print(pi) # Output will be: 3.141592653589793


    **Note:** Prior to importing a third-party module, you must install it using a
    package manager like `pip`.


    For instance, to install the popular `requests` module you can use the below command.


    **Command:**

    pip install requests


    Once completed, you can now import and manipulate the module in a Python script:


    **Program Code:**

    import requests


    feedback = requests.get("https://api.example.com/data")


    print(feedback.json())


    All in all, importing modules in Python is a straightforward task allowing you
    access and utilization of built-in plus third-party modules functions. Getting
    to know how to import modules not only enhances your code with powerful features
    but also fosters code reusability.


    # Renaming a Python Module'
  - '[PAGE 35]


    Python''s `import` statement, followed by `as` keyword, allows renaming of modules
    during import. This can make your code more succinct, descriptive, or avoid any
    existent naming conflicts.


    Here''s how you can rename a module using Python.


    ```

    Program Code:

    import numpy as np # ''numpy'' module is now termed as ''np''


    array = np.array([1, 2, 3]) # Access ''array'' function from ''np'' instead of
    ''numpy''


    print(array) # Output: [1 2 3]

    ```


    In this case, `numpy` module is given an alias `np`, which is now utilized to
    call any function, classes, or variables within the module.


    A similar illustration using the `pandas` module for your reference.


    ```

    Program Code:

    import pandas as pd # ''pandas'' module is renamed to ''pd''


    data = {''A'': [1, 2, 3], ''B'': [4, 5, 6]}


    df = pd.DataFrame(data) # ''DataFrame'' function is initiated from the module
    ''pd'' than ''pandas''


    print(df)

    ```


    Here, `pandas` is shortened to `pd` for accessing everything within the module.


    While renaming benefits in clearer and more compact coding, it is critical that
    the aliases are universally recognized and descriptive to maintain clarity and
    prevent potential confusion among other developers.'
- md: "## Some Popular Python Modules\n\nPython incorporates a multitude of pre-installed\
    \ modules providing a vast range of capabilities. Every Python installation comes\
    \ equipped with these in the Python Standard Library. Here are brief descriptions\
    \ of certain frequently used modules:\n\nmath: Furnishes mathematical functionalities\
    \ incorporating trigonometric, logarithmic, and exponential functions, in addition\
    \ to constants such as pi and e.\n\n```python\nimport math\n\nprint(math.sqrt(16))\
    \  # Output: 4.0\n\nprint(math.pi)  # Output: 3.141592653589793\n```\n\nrandom:\
    \ Proffers procedures for generating unpredictable numbers, choosing unpredictable\
    \ elements from sequences, and shuffling elements.\n\n```python\nimport random\n\
    \nprint(random.randint(1, 6))  # Output: A random integer between 1 and 6 (inclusive)\n\
    ```\n\nos: Dispenses procedures for interaction with the operating system, involving\
    \ manipulating file paths, generating directories, and implementing system commands.\n\
    \n```python\nimport os\n\nprint(os.getcwd())  # Output: The current working directory\n\
    ```\n\nsys: Grants access to some variables utilized or maintained by the interpreter,\
    \ like command-line arguments, the Python path, and the exit status.\n\n```python\n\
    import sys\n\nprint(sys.argv)  # Output: List of command-line arguments\n```\n\
    \ndatetime: Encloses classes for manipulating dates and times, for instance, date,\
    \ time, datetime, timedelta, and timezone.\n\n```python\nimport datetime\n\ntoday\
    \ = datetime.date.today()\n\nprint(today)  # Output: Current date (e.g., 2023-07-09)\n\
    ```\n\njson: Proposes methods to encode and decode JSON data, facilitating easy\
    \ reading and writing of JSON files or interaction with APIs.\n\n```python\nimport\
    \ json\n\ndata = {\"name\": \"Alice\", \"age\": 30}\n\njson_data = json.dumps(data)\n\
    \nprint(json_data)  # Output: '{\"name\": \"Alice\", \"age\": 30}'\n```\n\nre:\
    \ Proposes regular expression utilities for complex string processing, incorporating\
    \ searching, matching, and replacing patterns in strings.\n\n```python\nimport\
    \ re\n\npattern = r\"\\d+\"\n\ntext = \"There are 42 apples and 3 oranges.\"\n\
    \nmatches = re.findall(pattern, text)\n\nprint(matches)  # Output: ['42', '3']\n\
    ```\n\ncollections: Implements specialized container data types, like defaultdict,\
    \ namedtuple, Counter, deque, and OrderedDict.\n\n```python\nfrom collections\
    \ import Counter\n\nword_list = [\"apple\", \"banana\", \"apple\", \"orange\"\
    , \"banana\", \"apple\"]\n\ncounter = Counter(word_list)\n\nprint(counter)  #\
    \ Output: Counter({'apple': 3, 'banana': 2, 'orange': 1})\n```\n\nurllib: Includes\
    \ classes and procedures for cooperating with URLs, for example, fetching data,\
    \ parsing URLs, and managing HTTP requests.\n\n```python\nfrom urllib.request\
    \ import urlopen\n\nresponse = urlopen(\"https://www.example.com\")\n\nhtml =\
    \ response.read()\n\nprint(html)\n```\n\ncsv: Introduces classes for reading and\
    \ writing table data in CSV format.\n\n```python\nimport csv\n\nwith open(\"example.csv\"\
    , mode=\"r\") as csv_file:\n    reader = csv.reader(csv_file)\n    for row in\
    \ reader:\n        print(row)\n```\n\nThe modules mentioned above represent just\
    \ a handful of the many built-in ones available in Python. You can find a complete\
    \ list and detailed documentation in the Python Standard Library documentation\
    \ from the URL—https://docs.python.org/3/library/index.html. These built-in modules\
    \ can greatly expedite processes and effort, as they allow for the utilization\
    \ of powerful, rigorously-tested and reliable functionalities in your code.\n\n\
    ## Reloading Modules\n\nPython programming language does not automatically reload\
    \ a module if the code in the module is changed during the execution of a program.\
    \ Though, the explicit reloading of a module is feasible through the `importlib.reload()`\
    \ function.\n\nThe procedure to reload a module in Python is as follows:\n\nCommence\
    \ by importing the `importlib` module, which equips the `reload()` function.\n\
    \n```python\nimport importlib\n```\n\nProceed by importing the module that requires\
    \ reloading. Suppose there is a module titled `my_module`.\n\n```python\nimport\
    \ my_module\n```\n\nThen, should there be any alterations to the `my_module` source\
    \ code that you prefer to reload, the `importlib.reload()` function can be employed.\n\
    \n```python\nimportlib.reload(my_module)\n```\n\nPost the execution of `importlib.reload(my_module)`,\
    \ the modified version of `my_module` gets reloaded to replace the previous one.\n\
    \nThis facilitation allows the utilization of the newly introduced or altered\
    \ classes, variables, and functions from the reloaded module.\n\n**Note:** Nonetheless,\
    \ the reloading of modules might possess potential side effects, primarily when\
    \ multiple references to the module exist, the module possesses module-level state,\
    \ or the module is part of a dependency chain. As a consequence, the `reload()`\
    \ function ought to be employed with utmost care, ensuring its use will not instigate\
    \ unexpected behaviors in your program.\n\nHere is an exemplar that exhibits the\
    \ whole process:\n\n**Program Code:**\n\n```python\n# main.py\nimport my_module\n\
    import importlib\nprint(\"Initial output from my_module:\")\nmy_module.print_hello()\n\
    print(\"\\nReloading my_module...\")\nimportlib.reload(my_module)\nprint(\"\\\
    nOutput from my_module after reloading:\")\nmy_module.print_hello()\n```\n\nGiven,\
    \ in its initial state the `my_module` contains the following code:\n\n**Program\
    \ Code:**\n\n```python\n# my_module.py\ndef print_hello():\n    print(\"Hello,\
    \ World!\")\n```\n\nAfterward, modifications are made to the `my_module`:\n\n\
    **Program Code:**\n\n```python\n# my_module.py (updated)\n\ndef print_hello():\n\
    \    print(\"Hello, World! Reloaded.\")\n```\n\nThe output derived from `main.py`\
    \ would then be:\n\n**Program Code:**\n\nInitial output from my_module:\n\n```\n\
    Hello, World!\n\nReloading my_module...\n\nOutput from my_module after reloading:\n\
    \nHello, World! Reloaded.\n```\n\n## Splitting Modules\n\nOrganizing large files\
    \ into individual modules is a recommended approach which boosts code clarity,\
    \ organization, and usability. Here is a systematic guide on how to break down\
    \ a large file into separate modules:\n\n1.  Determine Logical Segments: Investigate\
    \ your bulky file, identify parts that can be modularized. These might be groups\
    \ of functions, classes, or even constants that are relative. For instance, your\
    \ file could contain utility functions, functions related to data processing or\
    \ databases. You can isolate each group to its own module.\n2.  Allocation of\
    \ New Files for Every Module: Make new Python files (`.py`) each representing\
    \ a logical component. Label your files in a descriptive way that spells out their\
    \ function or purpose. You could have `utilities.py`, `database.py`, and `data_processing.py`\
    \ files for example.\n3.  Shift Related Code into Your New Modules: Cut the code\
    \ from the bloated file and paste it into the respective new module file. Ensure\
    \ that you maintain the code format and indentation alignment. Shift imports relevant\
    \ to a particular module to the start of that module file.\n4.  Revise Your Import\
    \ Statements: In the original bloated file, substitute any moved code with import\
    \ statements that fetch the new modules. If all you need are particular functions,\
    \ classes, or variables from the new modules, then you can directly import them\
    \ with the `from ... import ...` syntax.\n\n**Program Code:**\n\n```python\n#\
    \ Sample: main.py (post-splitting)\n\nfrom utilities import some_utility_function\n\
    \nfrom database import some_database_function\n\nfrom data_processing import some_data_processing_function\n\
    \n# Your main program code follows\n```\n\n5.  Refresh Reference in the Rest of\
    \ Your Modules: If there are references to the code you've moved in other modules\
    \ of your project, you'll need to update their import instructions to fetch from\
    \ your new modules and not from the original bulky file.\n6.  Verify Your Code:\
    \ Following the bulky file split and updating of import instructions, undertake\
    \ thorough testing of your code to make sure everything works as it used to. Be\
    \ watchful for import errors, circular dependencies, and discontinued functionality.\n\
    \nBy adhering to these steps, you can efficiently break down a bulky file into\
    \ separate modules and significantly enhance your code's"
  mdcn: "## 一些流行的 Python 模块\n\nPython 包含大量预装模块，提供了广泛的功能。每个 Python 安装都在 Python 标准库中配备了这些模块。以下是一些常用模块的简要描述：\n\
    \nmath：提供数学功能，包括三角函数、对数函数和指数函数，以及 pi 和 e 等常量。\n\n```python\nimport math\n\nprint(math.sqrt(16))\
    \  # Output: 4.0\n\nprint(math.pi)  # Output: 3.141592653589793\n```\n\nrandom：提供生成随机数、从序列中随机选择元素以及打乱元素顺序的过程。\n\
    \n```python\nimport random\n\nprint(random.randint(1, 6))  # Output: A random\
    \ integer between 1 and 6 (inclusive)\n```\n\nos：提供与操作系统交互的过程，包括操作文件路径、创建目录和执行系统命令。\n\
    \n```python\nimport os\n\nprint(os.getcwd())  # Output: The current working directory\n\
    ```\n\nsys：允许访问解释器使用或维护的一些变量，例如命令行参数、Python 路径和退出状态。\n\n```python\nimport sys\n\
    \nprint(sys.argv)  # Output: List of command-line arguments\n```\n\ndatetime：包含用于操作日期和时间的类，例如\
    \ date、time、datetime、timedelta 和 timezone。\n\n```python\nimport datetime\n\ntoday\
    \ = datetime.date.today()\n\nprint(today)  # Output: Current date (e.g., 2023-07-09)\n\
    ```\n\njson：提供编码和解码 JSON 数据的方法，便于轻松读写 JSON 文件或与 API 交互。\n\n```python\nimport json\n\
    \ndata = {\"name\": \"Alice\", \"age\": 30}\n\njson_data = json.dumps(data)\n\n\
    print(json_data)  # Output: '{\"name\": \"Alice\", \"age\": 30}'\n```\n\nre：提供用于复杂字符串处理的正则表达式工具，包括在字符串中搜索、匹配和替换模式。\n\
    \n```python\nimport re\n\npattern = r\"\\d+\"\n\ntext = \"There are 42 apples\
    \ and 3 oranges.\"\n\nmatches = re.findall(pattern, text)\n\nprint(matches)  #\
    \ Output: ['42', '3']\n```\n\ncollections：实现专门的容器数据类型，如 defaultdict、namedtuple、Counter、deque\
    \ 和 OrderedDict。\n\n```python\nfrom collections import Counter\n\nword_list =\
    \ [\"apple\", \"banana\", \"apple\", \"orange\", \"banana\", \"apple\"]\n\ncounter\
    \ = Counter(word_list)\n\nprint(counter)  # Output: Counter({'apple': 3, 'banana':\
    \ 2, 'orange': 1})\n```\n\nurllib：包含用于与 URL 协作的类和过程，例如获取数据、解析 URL 和管理 HTTP 请求。\n\
    \n```python\nfrom urllib.request import urlopen\n\nresponse = urlopen(\"https://www.example.com\"\
    )\n\nhtml = response.read()\n\nprint(html)\n```\n\ncsv：引入用于读写 CSV 格式表格数据的类。\n\n\
    ```python\nimport csv\n\nwith open(\"example.csv\", mode=\"r\") as csv_file:\n\
    \    reader = csv.reader(csv_file)\n    for row in reader:\n        print(row)\n\
    ```\n\n以上提到的模块仅代表 Python 中众多内置模块的一小部分。你可以在 Python 标准库文档中找到完整列表和详细文档，网址为：https://docs.python.org/3/library/index.html。这些内置模块可以极大地加快进程并节省精力，因为它们允许你在代码中使用强大、经过严格测试且可靠的功能。\n\
    \n## 重新加载模块\n\nPython 编程语言不会在程序执行期间自动重新加载模块，如果模块中的代码发生了更改。但是，可以通过 `importlib.reload()`\
    \ 函数显式重新加载模块。\n\n在 Python 中重新加载模块的过程如下：\n\n首先导入 `importlib` 模块，它提供了 `reload()`\
    \ 函数。\n\n```python\nimport importlib\n```\n\n然后导入需要重新加载的模块。假设有一个名为 `my_module`\
    \ 的模块。\n\n```python\nimport my_module\n```\n\n接着，如果 `my_module` 的源代码有任何你希望重新加载的更改，可以使用\
    \ `importlib.reload()` 函数。\n\n```python\nimportlib.reload(my_module)\n```\n\n\
    执行 `importlib.reload(my_module)` 后，`my_module` 的修改版本将被重新加载以替换之前的版本。\n\n这允许使用重新加载模块中引入或更改的类、变量和函数。\n\
    \n**注意：** 然而，重新加载模块可能具有潜在的副作用，主要是在模块存在多个引用、模块具有模块级状态或模块是依赖链的一部分时。因此，应极其谨慎地使用 `reload()`\
    \ 函数，确保其使用不会在你的程序中引发意外行为。\n\n以下是一个展示整个过程的示例：\n\n**程序代码：**\n\n```python\n# main.py\n\
    import my_module\nimport importlib\nprint(\"Initial output from my_module:\")\n\
    my_module.print_hello()\nprint(\"\\nReloading my_module...\")\nimportlib.reload(my_module)\n\
    print(\"\\nOutput from my_module after reloading:\")\nmy_module.print_hello()\n\
    ```\n\n假设在其初始状态下，`my_module` 包含以下代码：\n\n**程序代码：**\n\n```python\n# my_module.py\n\
    def print_hello():\n    print(\"Hello, World!\")\n```\n\n之后，对 `my_module` 进行了修改：\n\
    \n**程序代码：**\n\n```python\n# my_module.py (updated)\n\ndef print_hello():\n   \
    \ print(\"Hello, World! Reloaded.\")\n```\n\n那么从 `main.py` 派生的输出将是：\n\n**程序代码：**\n\
    \nInitial output from my_module:\n\n```\nHello, World!\n\nReloading my_module...\n\
    \nOutput from my_module after reloading:\n\nHello, World! Reloaded.\n```\n\n##\
    \ 拆分模块\n\n将大文件组织成单独的模块是一种推荐的方法，可以提高代码的清晰度、组织性和可用性。以下是如何将大文件分解为单独模块的系统指南：\n\n1.\
    \  确定逻辑段：检查你的大文件，识别可以模块化的部分。这些可能是相关的函数组、类甚至常量。例如，你的文件可能包含实用函数、与数据处理或数据库相关的函数。你可以将每组隔离到自己的模块中。\n\
    2.  为每个模块分配新文件：创建新的 Python 文件（`.py`），每个文件代表一个逻辑组件。以描述性的方式命名你的文件，清楚地说明其功能或目的。例如，你可以有\
    \ `utilities.py`、`database.py` 和 `data_processing.py` 文件。\n3.  将相关代码移至新模块：从臃肿的文件中剪切代码并粘贴到相应的新模块文件中。确保保持代码格式和缩进对齐。将与特定模块相关的导入移至该模块文件的开头。\n\
    4.  修改你的导入语句：在原始臃肿的文件中，用导入新模块的语句替换任何已移动的代码。如果你只需要新模块中的特定函数、类或变量，那么你可以使用 `from\
    \ ... import ...` 语法直接导入它们。\n\n**程序代码：**\n\n```python\n# Sample: main.py (post-splitting)\n\
    \nfrom utilities import some_utility_function\n\nfrom database import some_database_function\n\
    \nfrom data_processing import some_data_processing_function\n\n# Your main program\
    \ code follows\n```\n\n5.  刷新项目中其他模块的引用：如果你的项目其他模块中有对已移动代码的引用，你需要更新它们的导入指令，使其从新模块而不是原始臃肿文件中获取。\n\
    6.  验证你的代码：在拆分臃肿文件并更新导入指令后，对你的代码进行彻底测试，以确保一切正常工作。注意导入错误、循环依赖和已停止的功能。\n\n通过遵循这些步骤，你可以有效地将大文件分解为单独模块，并显著提高代码的"
