    for num in numbers:\n    print(num)\n```\n\nThe sequence prints the below output.\n\
    \n```\n1\n\n2\n\n3\n\n4\n\n5\n```\n\nPython's `range()` function can also generate\
    \ a number range to include in the iteration:\n\n```python\nfor i in range(5):\n\
