    handy in professional or personal pursuits. By welcoming the challenges of debugging
    and refining their skills, developers enhance not only the quality of their software
    but also their personal and professional growth.'
- md: "## Debugging Commands\n\nDifferent programming languages and debugging tools\
    \ may use different core debugging commands.\n\nStill, several commands commonly\
    \ apply across different debugging situations and it is important for developers\
    \ to have an understanding about them.\n\nHere we break the basic ones for you:\n\
    \n1.  **Breakpoints**: These markers placed in specified code lines halt the debugger's\
    \ course, giving developers a chance to examine the application status at that\
    \ exact point. Breakpoints help troubleshoot problems easily. The commands that\
    \ set these breakpoints differ, for example, using `break`, `b`, or a visual marker\
    \ in a central software development platform (IDE) are some of the common ways.\n\
    2.  **Step Over**: Executing this command progresses the debugger to the immediate\
    \ line of code in the software function, while bypassing any called functions.\
    \ This is practical for gradually advancing through the code while still within\
    \ the current context. Specifically, in an IDE, it is denoted as `next`, `n`,\
    \ or using a 'clickable' prompt.\n3.  **Step Into**: Working in close resemblance\
    \ to Step Over, Step Into lets the debugger move into called functions. When this\
    \ command identifies a function call, this command pauses the debugger on the\
    \ first line of the called target function. This very command is quite vital for\
    \ going into individual functions for troubleshooting purposes. Usually, it is\
    \ denoted by `step`, `s`, or even a 'clickable' button in an IDE.\n4.  **Step\
    \ Out**: Stepping Out resumes the current function until its end, then halting\
    \ the debugger on the next line of code in the function that placed the call.\
    \ This greatly aids in quickly identifying functions that are not bug sources.\
    \ The command is often denoted as `finish`, `out`, or by using a button in an\
    \ IDE.\n5.  **Continue**: This command will resume the code execution till it\
    \ comes across a breakpoint or the code ends. This is useful in quickly navigating\
    \ through the program or overlooking parts that are irrelevant to the issue at\
    \ hand. Usually, it is showcased as `continue`, `c`, or a button in an IDE.\n\
    6.  **Inspect Variables**: Debuggers must check the variable values during debugging\
    \ to ensure their correctness. Debuggers typically have commands to show a variable's\
    \ current value or to track a variable's value during code execution. These commands\
    \ can vary and might include `print`, `display`, `watch`, or a built-in variable\
    \ viewer in an IDE.\n7.  **Call Stack**: Most debuggers let developers view the\
    \ call stack that records the active function calls at any given point in the\
    \ program. Studying the call stack could provide better insights into the sequence\
    \ of operations leading to a bug. The command for call stack view could be `backtrace`,\
    \ `bt`, `stack`, or a built-in call stack viewer in an IDE.\n\nRecognizing these\
    \ basic debugging controls in your favorite programming language and debugging\
    \ platform will increase your competence to detect and mitigate issues in your\
    \ coding significantly.\n\n## Pdb\n\nPython's integrated debugger, `pdb`, brings\
    \ a range of features into a programmer's arsenal.\n\n*Here's a glimpse of these\
    \ functionalities:*\n\n**Execution until specified line**: Achieved with the `until`\
    \ command, it enables users to resume code execution until it meets a predetermined\
    \ line or surpasses the present line. It's particularly handy when segments of\
    \ code should be overlooked in favor of a specific area for debugging.\n\n**Program\
    \ Code:**\n\n```\n(Pdb) until <line_number>\n```\n\n**Breakpoints**: `pdb` facilitates\
    \ the creation of breakpoints to halt code execution at an intended line. Using\
    \ these breakpoints, variables and the control flow can be readily inspected.\
    \ For setting a breakpoint, the `break` command must be used along with the filename\
    \ (excluding the current file) and the particular line where execution is meant\
    \ to freeze.\n\n**Program Code:**\n\n```\n(Pdb) break [<filename>:]<line_number>\n\
    ```\n\n**Incremental Movement**: Techniques to travel incrementally through the\
    \ code are available within `pdb`:\n\n- `step` or `s`: Executes the current code\
    \ line and pauses on the ensuing line or immerses into a called function, freezing\
    \ on the first line of said function.\n- `next` or `n`: Executes the current code\
    \ line and pauses on the ensuing line; doesn't dive into called functions, keeping\
    \ within the current scope.\n- `return` or `r`: The execution resumes till the\
    \ current function returns, then halts at the subsequent line in the calling function.\n\
    \n**Printing expressions and variables**: To print variable values and assess\
    \ expressions during a debugging episode, `print` or `p` command is used alongside\
    \ the expression or variable name:\n\n```\nProgram Code:\n(Pdb) print <expression_or_variable>\n\
    \n(Pdb) p <expression_or_variable>\n```\n\nAdditionally, the `pp` (pretty-print)\
    \ command provided by `pdb` delivers values in a more user-friendly form, which\
    \ is useful for intricate data structures.\n\n```\nProgram Code:\n(Pdb) pp <expression_or_variable>\n\
    ```\n\n**Code Listing**: The `list` or `l` command in `pdb` helps display source\
    \ code around the current execution line. 11 lines of code are shown by default,\
    \ with the current line being central. Specifying a range or a specific line is\
    \ also feasible:\n\n```\nProgram Code:\n(Pdb) list [<first_line>-<last_line>]\n\
    \n(Pdb) list <line_number>\n\n(Pdb) l\n```\n\n## Pdb Features\n\nUnderstanding\
    \ these abundant `pdb` features aids in making Python code debugging more productive\
    \ and controlled. Knowledge of these features is crucial for effective debugging\
    \ of Python software.\n\n`pdb`, the debugger for Python, is a robust module allowing\
    \ programmers to interactively debug their Python scripts. Breakpoints, stepwise\
    \ execution, variable inspection, and more features are offered.\n\nHere's a brief\
    \ on leveraging the `pdb` module in your Python scripts:\n\n**Importing the pdb\
    \ module**: As a prerequisite, the `pdb` module needs to be imported in the Python\
    \ script:\n\n**Program Code:**\n```python\nimport pdb\n```\n\n**Creating a breakpoint**:\
    \ Add the following lines at the preferred debugger pause point to set a breakpoint\
    \ in your code:\n\n**Program Code:**\n```python\npdb.set_trace()\n```\n\nExecution\
    \ of your script will be halted at this line, hence entering the interactive `pdb`\
    \ debugger.\n\n**Script execution**: Simply execute the Python script as always.\
    \ Upon reaching a breakpoint (a line with `pdb.set_trace()`), the debugger will\
    \ freeze the execution and present a `(Pdb)` prompt.\n\n**Debugger command usage**:\
    \ During the `(Pdb)` prompt, several debugger commands can be entered to interact\
    \ with the code.\n\nSome commonly implemented commands include:\n\n- `n` or `next`:\
    \ Execute the current line and move to the subsequent one.\n- `s` or `step`: Execute\
    \ the current line and delve into a function call if existing.\n- `c` or `continue`:\
    \ Resume execution until the next breakpoint or the script end.\n- `q` or `quit`:\
    \ Exit the debugger and conclude the script.\n- `l` or `list`: Display the source\
    \ code around the current line.\n- `p <expression>` or `print <expression>`: Evaluate\
    \ and print an expression or variable.\n- `pp <expression>`: Pretty-print an expression\
    \ or variable value.\n- `w` or `where`: Show the present location in the call\
    \ stack.\n- `u` or `up`: Move up a level in the call stack.\n- `d` or `down`:\
    \ Move down a level in the call stack.\n\n**Exiting the debugger**: To continue\
    \ executing the script post exiting the debugger, type `c` or `continue`. And\
    \ to exit the debugger and end the script, enter the `q` or `quit` command.\n\n\
    Here's an illustration of employing the `pdb` module within a basic Python script:\n\
    \n**Program Code:**\n\n```python\nimport pdb\n\ndef add(a, b):\n    return a +\
    \ b\n\ndef main():\n    x = 5\n    y = 7\n    pdb.set_trace() # Create a breakpoint\
    \ here\n    result = add(x, y)\n    print(f\"The result of {x} + {y} is {result}\"\
    )\n\nif __name__ == \"__main__\":\n    main()\n```\n\nUpon running this script,\
    \ the `pdb.set_trace()` line will cause a pause, and the interactive `pdb` debugger\
    \ will then commence. You can then harness various debugger commands to slowly\
    \ traverse your code and inspect variable values.\n\n## Whatis\n\nIn the Python\
    \ debugger `pdb`, the `whatis` command exists, aiding in the discovery of a variable\
    \ or an expression type. This instruction can offer greater comprehension of variable\
    \ types during debugging, and if need be, verification that a variable is a representation\
    \ of a particular class or type is easily achieved.\n\nUsage of the `whatis` command\
    \ entails keying in `whatis` and subsequently the variable or expression under\
    \ scrutiny, at the `(Pdb)` prompt.\n\n*This command is usually executed as follows:*\n\
    \n```\n# Using the (Pdb)\n\nwhatis <variable_or_expression>\n```\n\n*Take, for\
    \ instance, this Python script:*\n\n```python\nimport pdb\n\ndef main():\n   \
    \ my_list = [1, 2, 3, 4, 5]\n    my_str = \"Hello, World!\"\n    my_dict = {\"\
    a\": 1, \"b\": 2, \"c\": 3}\n```"
  mdcn: "## 调试命令\n\n不同的编程语言和调试工具可能使用不同的核心调试命令。\n\n尽管如此，一些命令在不同调试场景中普遍适用，开发者理解这些命令非常重要。\n\
    \n以下是我们为您梳理的基本命令：\n\n1.  **断点**：这些标记放置在指定的代码行上，会暂停调试器的执行流程，让开发者有机会检查应用程序在该确切时刻的状态。断点有助于轻松排查问题。设置这些断点的命令各不相同，例如，使用\
    \ `break`、`b` 或在集成开发环境（IDE）中使用可视化标记是一些常见方式。\n2.  **单步跳过**：执行此命令会使调试器前进到软件函数中的下一行代码，同时跳过任何被调用的函数。这在逐步推进代码且仍在当前上下文中时非常实用。具体来说，在\
    \ IDE 中，它通常表示为 `next`、`n` 或使用一个“可点击”的提示。\n3.  **单步进入**：与单步跳过非常相似，单步进入允许调试器进入被调用的函数。当此命令识别到一个函数调用时，它会将调试器暂停在被调用目标函数的第一行。此命令对于进入单个函数进行故障排除至关重要。通常，它由\
    \ `step`、`s` 或 IDE 中的“可点击”按钮表示。\n4.  **单步跳出**：单步跳出会恢复当前函数的执行直到其结束，然后将调试器暂停在调用该函数的函数的下一行代码上。这极大地有助于快速识别那些不是错误来源的函数。该命令通常表示为\
    \ `finish`、`out` 或使用 IDE 中的按钮。\n5.  **继续**：此命令将恢复代码执行，直到遇到断点或代码结束。这在快速浏览程序或跳过与当前问题无关的部分时很有用。通常，它表示为\
    \ `continue`、`c` 或 IDE 中的按钮。\n6.  **检查变量**：调试器在调试过程中必须检查变量值以确保其正确性。调试器通常有命令来显示变量的当前值或在代码执行过程中跟踪变量的值。这些命令可能各不相同，可能包括\
    \ `print`、`display`、`watch` 或 IDE 中的内置变量查看器。\n7.  **调用栈**：大多数调试器允许开发者查看调用栈，该栈记录了程序中任何给定时刻的活动函数调用。研究调用栈可以更好地理解导致错误的操作序列。查看调用栈的命令可能是\
