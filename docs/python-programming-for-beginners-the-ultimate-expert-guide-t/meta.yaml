    (Pdb) print <expression_or_variable>\n\n(Pdb) p <expression_or_variable>\n```\n\
    \n此外，`pdb` 提供的 `pp`（美观打印）命令以更用户友好的形式呈现值，这对于复杂数据结构很有用。\n\n```\n程序代码：\n(Pdb) pp\
    \ <expression_or_variable>\n```\n\n**代码列表**：`pdb` 中的 `list` 或 `l` 命令有助于显示当前执行行周围的源代码。默认显示\
