  md: '# File Opening


    Python offers the `open()` function to open files, using the structure mentioned
    below.


    **Program Code:**

    `file_variable = open(file_name, mode)`


    +   - `file_name`: Specifies the name of your desired file, which could be an
    absolute or relative path.

    - `mode`: An optional set of characters representing the mode in which you want
    to open your file.


    Some widespread modes include:


    +   - `''r''`: The read mode (default selection), which allows you to read the
    file.

    - `''w''`: The write mode enables you to write on the file. If the file doesn''t
    exist, it creates one, but if it does, the content will all be replaced.

    - `''a''`: The append mode opens the file for writing, however, it does not affect
    the existing content but only writes to the end of the file.

    - `''x''`: The exclusive creation mode opens the file for writing only when the
    file does not exist. If it does, an error pops up.

    - `''b''`: The binary mode is for reading or writing raw data like images, audio
    files etc. This mode can be merged with write, read or append mode (e.g., `''rb''`,
    `''wb''`, `''ab''`).


    As an example, here''s how to open a text file for reading.


    **Program Code:**

    `file = open("example.txt", "r")`


