  md: 'Keras, developed by François Chollet, is an open-source deep learning library
    built in Python. Designed to function atop TensorFlow, the Microsoft Cognitive
    Toolkit (CNTK), and Theano, Keras is geared towards creating an intuitive platform
    for constructing and training deep learning models. Here are some of its distinct
    attributes:


    +   1. Ease of Use: Keras is primarily user-oriented, facilitating straightforward
    defining and training of neural networks with minimal code.

    2. Modular: Keras promotes a flexible and modular design, enabling users to construct
    their neural networks by assembling various elements (layers, optimizers, activation
    functions, and more).

    3. Preprocessing and Data Augmentation: It provides built-in utilities for data
    preprocessing including image and text processing, along with techniques to augment
    data for improving model generalization.

    4. Pre-installed Models: Keras comes with multiple pre-installed models for tasks
    such as image classification and feature extraction, which can be adjusted for
    individual requirements.

    5. Customizability: Keras provides the provision for creating custom layers, loss
    functions, and optimizers, granting advanced users the flexibility to modify the
    library according to their needs.

    6. Support for Multiple Backends: Keras can operate with TensorFlow, CNTK or Theano
    as its backend, permitting easy switching.

    7. Multi-GPU and Distributed Training Support: Keras provides support for multi-GPU
    and distributed training, making it adept for training deep learning models on
    vast datasets.'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'To get Keras running, a Python environment with a supported backend (TensorFlow,
    Theano, or CNTK) is a prerequisite. Installation is best carried out with TensorFlow
    as the backend since Keras is currently a component of the TensorFlow project.
    Follow these steps:


    +   1. In case TensorFlow is not installed, one can install it using `pip`. Open
    the terminal (or Command Prompt in Windows) and execute this command:


    ```

    Program Code:

    pip install tensorflow

    ```


    This installs the latest stable version of TensorFlow. For GPU support, adhere
    to the official TensorFlow GPU installation guide available on the URL—https://www.tensorflow.org/install/gpu.


    +   2. To get Keras installed, run this command in the terminal:


    ```

    Program Code:

    pip install keras

    ```


    Upon successful installation of Keras, it can be imported into Python scripts,
    opening the doors to its robust and user-friendly API for creating deep learning
    models.


    # Pip: Unique Features and Installation


    Pip, standing for Pip Installs Packages, is the authoritative installer for software
    packages in Python, facilitating easy administering and downloading from Python
    Package Index (PyPI). It''s standard with Python 3.4 and above versions, and is
    an essential tool in the Python system with an array of features:


    +   1. Easy Package Installation: Installing PyPI packages straightforwardly by
    just a single command, `pip install <package_name>`, through Pip.'
  merge: -1
  pgno: 18
- img_proc: true
  md: '+   2. Package Handling: Pip offers the ability to oversee the packages you''ve
    installed, including launching upgrades, deleting them and listing them.

    3. Addressing Dependencies: Pip automatically detects and installs necessary package
    dependencies, which streamlines the installation procedure.

    4. Virtual Environment Integration: Pip performs in unison with virtual environments,
    allowing management of separate Python environments for different projects.

    5. Local Package Setup: Local archives or source code repositories can be used
    for installing packages, giving an edge in package handling.

    6. Customizable Package Sources: In Pip, packages can be installed from custom
    package databases or mirrors, ideal for limited network settings or for controlling
    private packages.


    With Python 3.4 or later, Pip comes embedded in your Python setup. For Pip to
    be installed or upgraded, these are the steps:


    # For Windows or macOS


    +   1. Visit the official Pip installation page with the URL—[https://pip.pypa.io/en/stable/installation/](https://pip.pypa.io/en/stable/installation/)—and
    download the `get-pip.py` file.

    2. Open the terminal (or Command Prompt for Windows) and locate the folder where
    you stored `get-pip.py`.

    3. The following command should be executed:


    Program Code:


    ```

    python get-pip.py

    ```'
