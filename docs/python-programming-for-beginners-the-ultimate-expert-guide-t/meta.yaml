    Decorator chaining''s standard procedure includes:


    +   1. Designing a common interface: Developers create an interface (or abstract
    class, depending on the used language) that both the original object and the decorators
    are implementing. This allows decorators the ability to replace the original object.

    2. Crafting the concrete object: Developers implement the original object or the
    concrete component, which will have its functionality extended by the decorators.
    This object must implement the common interface.

    3. Creating decorator classes: Developers generate one or more decorator classes
    that also employ the common interface. Each decorator class should reference an
    instance of the common interface, which can be either another decorator or the
    original object. The methods of the decorator add or modify behavior as required
    and refer the call to the referenced instance.

    4. Decorator Chaining: Initialize the original object and the decorators, and
    chain them by passing each decorator an instance of the common interface to wrap.
    The order of chaining decorators determines the sequence in which behavior is
    applied.


