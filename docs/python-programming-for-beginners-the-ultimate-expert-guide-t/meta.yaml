  md: '# Debugging Commands


    Different programming languages and debugging tools may use different core debugging
    commands.


    Still, several commands commonly apply across different debugging situations and
    it is important for developers to have an understanding about them.


    Here we break the basic ones for you:


    +   1. Breakpoints: These markers placed in specified code lines halt the debugger''s
    course, giving developers a chance to examine the application status at that exact
    point. Breakpoints help troubleshoot problems easily. The commands that set these
    breakpoints differ, for example, using `break`, `b`, or a visual marker in a central
    software development platform (IDE) are some of the common ways.

    2. Step Over: Executing this command progresses the debugger to the immediate
    line of code in the software function, while bypassing any called functions. This
    is practical for gradually advancing through the code while still within the current
    context. Specifically, in an IDE, it is denoted as `next`, `n`, or using a ''clickable''
    prompt.

    3. Step Into: Working in close resemblance to Step Over, Step Into lets the debugger
    move into called functions. When this command identifies a function call, this
    command pauses the debugger on the first line of the called target function. This
    very command is quite vital for going into individual functions for troubleshooting
    purposes. Usually, it is denoted by `step`, `s`, or even a ''clickable'' button
    in an IDE.'
  merge: -1
  pgno: 155
- img_proc: true
  md: '+   4. Step Out: Stepping Out resumes the current function until its end, then
    halting the debugger on the next line of code in the function that placed the
    call. This greatly aids in quickly identifying functions that are not bug sources.
    The command is often denoted as `finish`, `out`, or by using a button in an IDE.


    +   5. Continue: This command will resume the code execution till it comes across
    a breakpoint or the code ends. This is useful in quickly navigating through the
    program or overlooking parts that are irrelevant to the issue at hand. Usually,
    it is showcased as `continue`, `c`, or a button in an IDE.


    +   6. Inspect Variables: Debuggers must check the variable values during debugging
    to ensure their correctness. Debuggers typically have commands to show a variable''s
    current value or to track a variable''s value during code execution. These commands
    can vary and might include `print`, `display`, `watch`, or a built-in variable
    viewer in an IDE.


    +   7. Call Stack: Most debuggers let developers view the call stack that records
    the active function calls at any given point in the program. Studying the call
    stack could provide better insights into the sequence of operations leading to
    a bug. The command for call stack view could be `backtrace`, `bt`, `stack`, or
    a built-in call stack viewer in an IDE.


    Recognizing these basic debugging controls in your favorite programming language
    and debugging platform will increase your competence to detect and mitigate issues
    in your coding significantly.


