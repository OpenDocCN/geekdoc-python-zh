- md: '## Managing Directory Listings


    With Python, one has the ability to control directory listings as a result of
    `os` or `os.path` module functions. They make it possible to create, delete, list
    and manipulate directories and contents placed within them. An alternative like
    the `pathlib` module—available in Python versions 3.4 and beyond—employs an object-oriented
    way of managing file system paths.


    Demonstrations of how one can manage directory listings utilizing both `os` and
    `pathlib` modules exist as follows:


    ### Utilizing the `OS` Module


    Listing contents of a directory: Employ the function `os.listdir()`.


    ```python

    import os


    directory = "exemplary_directory"


    content = os.listdir(directory)


    print(content)

    ```


    Creation of a directory: The function `os.mkdir()` is used.


    ```python

    import os


    newly_created_directory = "fresh_directory"


    os.mkdir(newly_created_directory)

    ```


    Removal of directory: `os.rmdir()` function eliminates empty directories.


    ```python

    import os


    directory_to_eliminate = "no_content_directory"


    os.rmdir(directory_to_eliminate)

    ```


    Affirming if the indicated path leads to a directory: `os.path.isdir()` function
    verifies if paths provided are directories.


    ```python

    import os


    path = "sample_directory"


    directory_confirmation = os.path.isdir(path)


    print(directory_confirmation)

    ```


    ### With the `pathlib` Module (Python 3.4+)


    Directory contents listing: `Path.iterdir()` is utilized here to list directories.


    ```python

    from pathlib import Path

    directory = Path("sample_directory")

    content = [element for element in directory.iterdir()]

    print(content)

    ```


    Creating a directory: Apply `Path.mkdir()` to create a directory.


    ```python

    from pathlib import Path

    freshly_created_directory = Path("fresh_directory")

    freshly_created_directory.mkdir()

    ```


    Deleting a directory: `Path.rmdir()` sees to it that empty directories are removed.


    ```python

    from pathlib import Path

    directory_to_erase = Path("no_content_directory")

    directory_to_erase.rmdir()

    ```


    Confirming that a path is a directory: Apply `Path.is_dir()` to affirm a path''s
    status as a directory.


    ```python

    from pathlib import Path

    route = Path("sample_directory")

    directory_verification = route.is_dir()

    print(directory_verification)

    ```


    Both `pathlib` and `os` modules make for strong tools that manage directory listings
    in addition to conducting varieties of file system operations. The choice between
    both modules heavily hinges on user preferences and the version of Python in use.
    An example of this distinction is that while `os` is historical and procedural,
    `pathlib` works with a more contemporary, object-oriented approach.


    ## File Attributes


    File attributes present a kind of metadata concerning a file in a file system.
    These attributes may encompass details like the file''s size, the times it was
    created, modified, or accessed. Python offers the ability to fetch and modify
    file attributes with modules such as `os`, `os.path`, or for Python versions 3.4
    and beyond, the `pathlib` module.


    Given below are several demonstrations of how to interact with file attributes
    using both the `os` and `pathlib` modules:


    ### Usage of `OS` and `os.path` Modules


    Size of the file: Deploy the `os.path.getsize()` function to fetch the file size
    expressed in bytes.


    ```python

    import os


    # Defining the file path

    file_path = "example.txt"


    # Fetching the file size

    file_size = os.path.getsize(file_path)


    # Displaying the file size

    print(f"Size of the file: {file_size} bytes")

    ```


    Time of creation: The `os.path.getctime()` function determines when the file was
    created, presenting the output as a Unix timestamp. To present the timestamp in
    a viewer-friendly format, use the `datetime` module.


    ```python

    import os

    from datetime import datetime


    # Defining the file path

    file_path = "example.txt"


    # Fetching the creation time

    creation_time = os.path.getctime(file_path)


    # Formatting the time

    formatted_time = datetime.fromtimestamp(creation_time)


    # Display the time

    print(f"Time of creation: {formatted_time}")

    ```


    Time of alteration: Similarly, use the `os.path.getmtime()` function to find out
    when the file was last altered. To convert the Unix timestamp to a more human-friendly
    format, use the `datetime` module.


    ```python

    import os

    from datetime import datetime


    # Defining the file path

    file_path = "example.txt"


    # Fetching the modification time

    modification_time = os.path.getmtime(file_path)


    # Formatting the time

    formatted_time = datetime.fromtimestamp(modification_time)


    # Displaying the time

    print(f"Time of modification: {formatted_time}")

    ```


    ### Usage of `Pathlib` Module (Python 3.4+)


    Size of the file: The attribute `Path.stat().st_size` will provide the file''s
    size in bytes.


    ```python

    from pathlib import Path


    # Defining the file path

    file_path = Path("example.txt")


    # Fetching the file size

    file_size = file_path.stat().st_size


    # Displaying the file size

    print(f"Size of the file: {file_size} bytes")

    ```


    Time of creation: To fetch the creation timestamp as per the Unix standards, use
    `Path.stat().st_ctime`. A readable conversion can be accomplished by the `datetime`
    module.


    ```python

    from pathlib import Path

    from datetime import datetime


    # Defining the file path

    file_path = Path("example.txt")


    # Fetching the creation time

    creation_time = file_path.stat().st_ctime


    # Formatting the time

    formatted_time = datetime.fromtimestamp(creation_time)


    # Displaying the time

    print(f"Time of creation: {formatted_time}")

    ```


    Time of alteration: With `Path.stat().st_mtime`, you can retrieve the last modification
    timestamp. The `datetime` module helps in presenting this information in a readable
    format.


    ```python

    from pathlib import Path

    from datetime import datetime


    # Defining the file path

    file_path = Path("example.txt")


    # Fetching the modification time

    modification_time = file_path.stat().st_mtime


    # Formatting the time

    formatted_time = datetime.fromtimestamp(modification_time)


    # Displaying the time

    print(f"Time of modification: {formatted_time}")

    ```


    In Python, users have options such as `os` and `pathlib` modules to fetch and
    modify file attributes. The choice between the two depends mostly on user preference
    and Python version in use. Benefiting a more modern and object-oriented approach,
    `pathlib` may be the go-to choice for some, while others may find the straightforwardness
    associated with the more traditional `os` module more suitable.


    ## Creating Directories (Single vs. Multiple)


    In Python, directories can either be singular or multiple and can be created using
    either `os` or `pathlib` modules (only for Python 3.4 and later) which include
    functions like `os.mkdir()` and `Path.mkdir()`. These are specifically designed
    for creating singular directories.


    In scenarios where multiple or nested directories need to be built, the `os.makedirs()`
    function or `Path.mkdir(parents=True)` method come in handy.


    Let''s dive deeper into these functionalities in detail in this section.


    ### Using `os` Module


    For Single Directory Creation: The function `os.mkdir()` can be applied to create
    a single directory.


    ```python

    import os


    directory_single = "directory_single"


    os.mkdir(directory_single)

    ```


    For Multiple Nested Directories Creation: Apply the `os.makedirs()` function in
    the instance of multiple nested directories creation. This function is powerful
    as it generates all intermediate directories on the path (only if they''re non-existent).


    ```python

    import os


    directories_nested = "directory_parent/directory_child/directory_grandchild"


    os.makedirs(directories_nested)

    ```


    ### Using `Pathlib` Module (Python 3.4 and Later Versions)'
