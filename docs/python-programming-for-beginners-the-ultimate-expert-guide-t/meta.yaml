  pgno: 20
- img_proc: true
  md: '+   2. Cross-Reference: Enabled support on cross-referencing allows linkage
    within different sections in your docs and to external resources.

    3. Auto-Generation of API Docs: Autodoc extensions in Sphinx helps in auto generation
