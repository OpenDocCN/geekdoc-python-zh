  md: '# CHAPTER 1


    # Setting Up Your Virtual Environment


    Python, a high-level versatile language renowned for its simplicity, readability,
    and impressive library support, has exponentially gained prominence over the past
    few decades. It is utilized in sectors like web development, data analytics, artificial
    intelligence, and scientific computing. Having Python installed on your system
    is the primary step to tap into its potential towards providing remarkable solutions
    to real-world challenges.


    Smooth Python installation is crucial for both novices and experienced programmers,
    permitting the former to delve into learning the language devoid of hurdles to
    maintain enthusiasm and aiding the latter to efficiently explore Python''s sophisticated
    features without any limitations or restrictions.


    Understanding Python installation along with several other IDEs and tools explained
    in this chapter is a must-have skill regardless of the individual''s expertise
    level. Apart from setting up the development environment effectively, it provides
    the requisite tools and libraries for developing state-of-the-art applications.
    Understanding the installation journey enables troubleshooting and customizing
    the Python setting to cater to particular requirements. In our defense, mastering
    Python installation paves the way to becoming a seasoned Python developer.


    # Setting Up Python on Mac, Windows, and Linux


    The installation process for Python has minor variations according to the operating
    system (OS) in use. This tutorial offers detailed steps'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'for setting up Python on Mac, Windows, and Linux systems.


    # **Mac**


    Although most macOS versions come with an installed Python version, it''s generally
    outdated.


    *For the current Python version installation, follow these instructions:*


    +   1. Head over to the Python official website at [https://www.python.org/](https://www.python.org/)
    and go to the Downloads section.

    2. Select the macOS installer link to download the Mac version of the recent Python
    version. As of this book''s written date, the current Python version is 3.8.

    3. After downloading, find the `.pkg` file in your file manager and double-click
    it.

    4. Follow the prompts provided to finalize the installation.

    5. To check if the installation was successful, open Terminal from the Utilities
    menu and enter `python3 --version`. The installed Python version should be displayed.


    # **Windows**


    *The procedure for Python installation on Windows is as follows:*


    +   1. Go to the Python official website at [https://www.python.org/](https://www.python.org/)
    and proceed to the Downloads section.

    2. Select the Windows installer link to download the most recent Windows version
    of Python.

    3. After downloading, find the `.exe` file and double-click it.

    4. In the installation interface, mark the "Add Python to PATH" box and click
    "Install Now".'
  merge: -1
  pgno: 11
- img_proc: true
  md: '+   5. Follow the prompts provided to finalize the installation.

    6. To verify the installation, open the Command Prompt and type `python --version`.
    The installed Python version should be displayed.


    # **Linux**


    The majority of Linux distributions have pre-installed Python. On the off chance
    that it''s not installed, or needs upgrading to the recent Python version, follow
    the steps mentioned below.


    *For Debian-based distributions like Ubuntu:*


    +   1. Launch the Terminal.

    2. Update the package list by entering the command `sudo apt update`.

    3. Install Python by typing `sudo apt install python3`.

    4. To verify the installation, enter `python3 --version`. The installed Python
    version should be shown.


    *For Red Hat-based distributions like Fedora:*


    +   1. Launch the Terminal.

    2. Update the package list by entering the command `sudo dnf update`.

    3. Install Python by typing `sudo dnf install python3`.

    4. To verify the installation, key in `python3 --version`. The installed Python
    version should be shown.


    Adopting this guide, one can easily set up Python on a Mac, Windows, or Linux
    system, and delve into the rich world of Python programming.'
  merge: -1
  pgno: 12
