    algorithms and statistical models enabling computers to learn from data and make
    decisions or predictions. Without an explicit programming requirement, ML approaches
    empower AI systems to enhance performance and accommodate new information.


    Outlined below is some of the important rules in an AI-ML relationship:


    +   1. ML is an AI subset. Whilst AI covers various techniques and approaches
