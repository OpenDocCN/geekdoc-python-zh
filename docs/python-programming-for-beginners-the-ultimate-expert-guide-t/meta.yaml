    \ `with` statement creates a context manager safeguarding the file closure when\
    \ the block of code is exited. The contents of the file are read into the `content`\
    \ variable, and as soon as the `with` block is exited, the file is auto-closed.\n\
    \nYou can also write to a file using `with open(...) as ...` shown below:\n\n\
