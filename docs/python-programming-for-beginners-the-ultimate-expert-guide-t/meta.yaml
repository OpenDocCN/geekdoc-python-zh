    # Importing a Python Module


    The concept of importing modules in Python provides the advantage of leveraging
    the available functions in your scripts or programs. Python boosts a host of built-in
    modules as well as a substantial number of third-party modules accessible via
    Python Package Index (PyPI), which get recalled into your program using an `import`
    statement alongside the module label.


    Outlined here are several means for importing modules:'
  - '[PAGE 33]


    Fundamental Import: Direct module importation using its label allows you to exploit
    defined functions, classes, and variables. This calls for dot notation usage.


    ```

    Program Code:

    import math


    outcome = math.sqrt(25) # Activate the sqrt function in the math module


    print(outcome) # Output will be: 5.0

    ```


    Alias Import: An alias (alternative or shortened name) could be assigned to an
    imported module. This proves handy when importing modules with lengthy names or
    when naming conflicts need to be prevented.


    ```

    Program Code:

    import numpy as np


    matrix = np.array([1, 2, 3]) # Engage the array function in numpy module under
    an alias


    print(matrix) # Output will be: [1 2 3]

    ```


    Particular function or class import: You can import certain functions, classes,
    or variables from a module, this enables you to call on them directly without
    the necessity for dot notation.


    ```

    Program Code:

    from math import sqrt, pi


    outcome = sqrt(25) # Use sqrt function directly


    print(outcome) # Output will be: 5.0


    print(pi) # Output will be: 3.141592653589793

    ```


    Import all: You have the option of importing all classes, functions, and variables
    via wildcard `*` from a module. This approach is often'
  - '[PAGE 34]


    discouraged due to the possibility of naming conflicts and making it obscure to
    trace the origin of a function, class, or variable.


    **Program Code:**

