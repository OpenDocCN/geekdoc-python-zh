  md: '+   1. Expressiveness: Treating entities like functions, classes, or objects
    as first-class citizens allow for their versatile usage, leading to more expressive
    and comprehensive codes as they permit a broader range of programming patterns
    and techniques.


    2. Abstraction: Higher levels of abstraction in codes can be achieved through
    first-class objects. Higher-order functions, for example, let abstract patterns
    be created and reused across different sections of a codebase.


    3. Modularity and Reusability: Treating different constructs as first-class objects
    let developers create more modular and reusable code components, promoting concern
    separation and simplifying codebase maintenance.


    4. Dynamic Behavior: First-class objects introduce dynamic behavior in programming
    languages, allowing runtime creation of objects or functions, passing them as
