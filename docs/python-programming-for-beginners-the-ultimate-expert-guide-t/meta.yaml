    \ 函数来调节请求之间的延迟。\n\n## 如何在抓取信息时伪造你的 IP 地址\n\n在网页抓取过程中，使用备用 IP 地址有助于绕过速率限制或 IP 封禁等限制。这可以通过使用代理服务器来实现，代理服务器是你系统与目标网站之间的中介，从而隐藏你的真实\
    \ IP 地址。以下是通过 Python 的 `requests` 应用代理服务器的分步指南：\n\n首先选择一个代理服务器。有多种免费和付费的替代方案可用。像\
    \ https://free-proxy-list.net/ 这样的网站提供免费代理。然而，它们可能不如付费代理可靠和快速。一些付费代理服务提供商包括 https://www.scraperapi.com/、https://luminati.io/\
