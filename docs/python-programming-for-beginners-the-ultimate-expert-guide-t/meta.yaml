    const evenNumbers = numbers.filter(isEven); // [2, 4]

    ```


    Reduce: This function calls for a function, a list, and an optional initial value
    as input. It subsequently applies the input function systematically to the list''s
    elements, from the left towards the right, so as to compress the list into a single
    entity. This proves handy when data needs to be aggregated or combined in various
    forms.


    ```

    Program Code:

    const numbers = [1, 2, 3, 4, 5];


