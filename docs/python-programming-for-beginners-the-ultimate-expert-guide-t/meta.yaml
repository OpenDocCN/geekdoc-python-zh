- md: "## Conditional Decorators\n\nConditional decorators offer a technique through\
    \ which decorators can be applied to a function or method, depending on certain\
    \ conditions at runtime. This method is especially useful when adding or modifying\
    \ the functionality of a function based on specific configurations, environments,\
    \ or the state of an application.\n\nIn Python, this can be achieved by defining\
    \ a covering function that holds a condition, a decorator, and the original function\
    \ as its arguments. Depending on the condition, this covering function can either\
    \ apply the decorator to the original function or return the function unmodified.\n\
    \nThe below Python code exemplifies a simple conditional decorator function.\n\
    \n```python\ndef conditional_decorator(condition, decorator):\n    def wrapper(func):\n\
    \        if condition:\n            return decorator(func)\n        else:\n  \
    \          return func\n    return wrapper\n```\n\nThe one provided `conditional_decorator`\
    \ function can conditionally apply any decorator to a function. Here is an example\
    \ showcasing how to utilize `conditional_decorator` to apply a logging decorator\
    \ based on a configuration setting:\n\n```python\nimport random\n\n# Set a simple\
    \ logging decorator\ndef log_call(func):\n    def wrapper(*args, **kwargs):\n\
    \        print(f\"Calling {func.__name__} with {args} and {kwargs}\")\n      \
    \  return func(*args, **kwargs)\n    return wrapper\n\n# Set a configuration setting\
    \ (e.g., for debugging)\nDEBUG = True\n\n# Define the conditional decorator\n\
    def debug_log_call(func):\n    return conditional_decorator(DEBUG, log_call)(func)\n\
    \n# Incorporate the conditional decorator to a function\n@debug_log_call\ndef\
    \ random_number(min_value, max_value):\n    return random.randint(min_value, max_value)\n\
    \n# Call the embellished function\nnumber = random_number(1, 6)\n```\n\nIn the\
    \ presented example, the `random_number` function is decorated with `debug_log_call`,\
    \ which is a conditional decorator that utilizes the `log_call` decorator only\
    \ when the `DEBUG` setting is `True`. If `DEBUG` is `False`, then the `random_number`\
    \ function operation will not be logged.\n\nConditional Decorators offer a versatile\
    \ way of modifying the way your functions behave, depending on given conditions\
    \ or configurations. This allows the development of code that can effortlessly\
    \ adapt to various environments or requirements.\n\n## Debugging Decorators\n\n\
    Debugging decorators in code is advantageous for integrating diagnostic data or\
    \ scrutinizing the activity of functions and methods within the intrinsic framework\
    \ of your code without alterations. Decorators simplify the activation or deactivation\
    \ of debugging prospects when required.\n\nAn example is provided hereafter for\
    \ execution in Python.\n\nRecording function calls: A decorator that documents\
    \ the function, its arguments, and keyword arguments that are being initiated\
    \ is demonstrated here.\n\n```python\nimport functools\n\ndef log_call(func):\n\
    \    @functools.wraps(func)\n    def wrapper(*args, **kwargs):\n        print(f\"\
    Calling {func.__name__} with args: {args} and kwargs: {kwargs}\")\n        return\
    \ func(*args, **kwargs)\n    return wrapper\n\n@log_call\ndef add(a, b):\n   \
    \ return a + b\n\nresult = add(3, 4)\n```\n\nTime measurement of execution: A\
    \ decorator that measures and records a given function's execution time.\n\n```python\n\
    import time\n\ndef measure_time(func):\n    @functools.wraps(func)\n    def wrapper(*args,\
    \ **kwargs):\n        start = time.perf_counter()\n        result = func(*args,\
    \ **kwargs)\n        end = time.perf_counter()\n        print(f\"{func.__name__}\
    \ took {end - start:.4f} seconds to execute\")\n        return result\n    return\
    \ wrapper\n\n@measure_time\ndef slow_function(x):\n    time.sleep(x)\n    return\
    \ x * 2\n\nresult = slow_function(2)\n```\n\nRecording function results: This\
    \ decorator saves the outcome after a function execution.\n\n```python\ndef log_result(func):\n\
    \    @functools.wraps(func)\n    def wrapper(*args, **kwargs):\n        result\
    \ = func(*args, **kwargs)\n        print(f\"{func.__name__} returned {result}\"\
    )\n        return result\n    return wrapper\n\n@log_result\ndef multiply(a, b):\n\
    \    return a * b\n\nresult = multiply(3, 4)\n```\n\nThese decorators are pliable\
    \ to be used on their own or incorporated to multiply the debugging toolkits to\
    \ your functions. By employing decorators, you can also encode both function calls\
    \ and execution time concurrently.\n\n```python\n@measure_time\n@log_call\ndef\
    \ subtract(a, b):\n    return a - b\n\nresult = subtract(7, 3)\n```\n\nDebugging\
    \ decorators provide a clear-cut and repeatable approach to include diagnostic\
    \ data to your functions, assisting in troubleshooting or identifying performance\
    \ hindrances. Debugging characteristics can be comfortably controlled without\
    \ making adjustments to the original functions by using decorators.\n\n## Error\
    \ Handling Using Decorators\n\nManaging error-handling through decorators is a\
    \ technique that involves enveloping functions or methods with a layer of code\
    \ specifically designed to handle errors. This method can enhance the consistency\
    \ and automation of error handling which in turn helps keep the code clean, comprehensible,\
    \ and easy to manage.\n\nConsider the Python script below which demonstrates a\
    \ basic error-managing decorator that can catch and document accidents that may\
    \ occur within a decorated function.\n\n```python\nimport functools\nimport traceback\n\
    \ndef handle_errors(func):\n    @functools.wraps(func)\n    def wrapper(*args,\
    \ **kwargs):\n        try:\n            return func(*args, **kwargs)\n       \
    \ except Exception as e:\n            print(f\"Error in {func.__name__}: {e}\"\
    )\n            print(traceback.format_exc())\n    return wrapper\n\n@handle_errors\n\
    def divide(a, b):\n    return a / b\n\nresult = divide(4, 2)\nresult = divide(4,\
    \ 0)\n```\n\nIn the script above, the `handle_errors` decorator is designed to\
    \ catch any exceptions that the `divide` function may trigger, document the error\
    \ message and traceback, then returns `None` enabling the continuation of the\
    \ program.\n\nError-handling decorators can also be utilized to provide default\
    \ values or conduct custom error management based on the type of exception.\n\n\
    Below is an example illustrating error handling for different exception types\
    \ and provision of default values.\n\n```python\ndef handle_errors_with_default(default_value):\n\
    \    def decorator(func):\n        @functools.wraps(func)\n        def wrapper(*args,\
    \ **kwargs):\n            try:\n                return func(*args, **kwargs)\n\
    \            except ZeroDivisionError as e:\n                print(f\"Error in\
    \ {func.__name__}: division by zero\")\n            except Exception as e:\n \
    \               print(f\"Error in {func.__name__}: {e}\")\n                print(traceback.format_exc())\n\
    \            return default_value\n        return wrapper\n    return decorator\n\
    \n@handle_errors_with_default(default_value=float('inf'))\ndef safe_divide(a,\
    \ b):\n    return a / b\n\nresult = safe_divide(4, 2)\nresult = safe_divide(4,\
    \ 0)\n```\n\nIn the script above, the `handle_errors_with_default` decorator function\
    \ accepts a `default_value` argument, set to be returned during an exception.\
    \ It also includes special handling for `ZeroDivisionError` to give a more specific\
    \ error message.\n\nWrapping errors through decorators effectively aids in creating\
    \ clean, easily manageable code by centralizing and automating error handling.\
    \ This technique can also be merged with other decorators to create more advanced\
    \ and robust error management techniques."
  mdcn: "## 条件装饰器\n\n条件装饰器提供了一种技术，可以根据运行时的特定条件，将装饰器应用于函数或方法。当需要根据特定配置、环境或应用程序状态来添加或修改函数功能时，这种方法尤其有用。\n\
    \n在 Python 中，可以通过定义一个包装函数来实现，该函数将条件、装饰器和原始函数作为其参数。根据条件，这个包装函数可以将装饰器应用于原始函数，也可以返回未修改的函数。\n\
    \n以下 Python 代码示例展示了一个简单的条件装饰器函数。\n\n```python\ndef conditional_decorator(condition,\
    \ decorator):\n    def wrapper(func):\n        if condition:\n            return\
    \ decorator(func)\n        else:\n            return func\n    return wrapper\n\
    ```\n\n提供的 `conditional_decorator` 函数可以有条件地将任何装饰器应用于函数。下面是一个示例，展示了如何利用 `conditional_decorator`\
    \ 根据配置设置应用日志装饰器：\n\n```python\nimport random\n\n# Set a simple logging decorator\n\
    def log_call(func):\n    def wrapper(*args, **kwargs):\n        print(f\"Calling\
    \ {func.__name__} with {args} and {kwargs}\")\n        return func(*args, **kwargs)\n\
    \    return wrapper\n\n# Set a configuration setting (e.g., for debugging)\nDEBUG\
    \ = True\n\n# Define the conditional decorator\ndef debug_log_call(func):\n  \
    \  return conditional_decorator(DEBUG, log_call)(func)\n\n# Incorporate the conditional\
    \ decorator to a function\n@debug_log_call\ndef random_number(min_value, max_value):\n\
    \    return random.randint(min_value, max_value)\n\n# Call the embellished function\n\
    number = random_number(1, 6)\n```\n\n在上述示例中，`random_number` 函数被 `debug_log_call`\
    \ 装饰，这是一个条件装饰器，仅在 `DEBUG` 设置为 `True` 时才使用 `log_call` 装饰器。如果 `DEBUG` 为 `False`，则\
    \ `random_number` 函数的操作将不会被记录。\n\n条件装饰器提供了一种灵活的方式来修改函数的行为，具体取决于给定的条件或配置。这使得开发能够轻松适应各种环境或需求的代码成为可能。\n\
    \n## 调试装饰器\n\n在代码中使用调试装饰器，有利于在不修改代码内在框架的情况下，集成诊断数据或检查函数和方法的活动。装饰器简化了在需要时启用或禁用调试功能的过程。\n\
    \n以下是在 Python 中执行的示例。\n\n记录函数调用：此处演示了一个记录正在调用的函数、其参数和关键字参数的装饰器。\n\n```python\n\
    import functools\n\ndef log_call(func):\n    @functools.wraps(func)\n    def wrapper(*args,\
    \ **kwargs):\n        print(f\"Calling {func.__name__} with args: {args} and kwargs:\
    \ {kwargs}\")\n        return func(*args, **kwargs)\n    return wrapper\n\n@log_call\n\
    def add(a, b):\n    return a + b\n\nresult = add(3, 4)\n```\n\n执行时间测量：一个测量并记录给定函数执行时间的装饰器。\n\
    \n```python\nimport time\n\ndef measure_time(func):\n    @functools.wraps(func)\n\
    \    def wrapper(*args, **kwargs):\n        start = time.perf_counter()\n    \
    \    result = func(*args, **kwargs)\n        end = time.perf_counter()\n     \
    \   print(f\"{func.__name__} took {end - start:.4f} seconds to execute\")\n  \
    \      return result\n    return wrapper\n\n@measure_time\ndef slow_function(x):\n\
    \    time.sleep(x)\n    return x * 2\n\nresult = slow_function(2)\n```\n\n记录函数结果：此装饰器在函数执行后保存结果。\n\
    \n```python\ndef log_result(func):\n    @functools.wraps(func)\n    def wrapper(*args,\
    \ **kwargs):\n        result = func(*args, **kwargs)\n        print(f\"{func.__name__}\
    \ returned {result}\")\n        return result\n    return wrapper\n\n@log_result\n\
    def multiply(a, b):\n    return a * b\n\nresult = multiply(3, 4)\n```\n\n这些装饰器可以单独使用，也可以组合起来为你的函数添加多个调试工具。通过使用装饰器，你还可以同时记录函数调用和执行时间。\n\
    \n```python\n@measure_time\n@log_call\ndef subtract(a, b):\n    return a - b\n\
    \nresult = subtract(7, 3)\n```\n\n调试装饰器提供了一种清晰且可重复的方法，将诊断数据包含到你的函数中，有助于故障排除或识别性能瓶颈。通过使用装饰器，可以轻松控制调试特性，而无需对原始函数进行调整。\n\
    \n## 使用装饰器进行错误处理\n\n通过装饰器管理错误处理是一种技术，涉及用一层专门设计用于处理错误的代码来包裹函数或方法。这种方法可以增强错误处理的一致性和自动化，从而有助于保持代码整洁、易于理解和管理。\n\
    \n考虑下面的 Python 脚本，它演示了一个基本的错误处理装饰器，可以捕获并记录装饰函数中可能发生的异常。\n\n```python\nimport functools\n\
    import traceback\n\ndef handle_errors(func):\n    @functools.wraps(func)\n   \
    \ def wrapper(*args, **kwargs):\n        try:\n            return func(*args,\
    \ **kwargs)\n        except Exception as e:\n            print(f\"Error in {func.__name__}:\
    \ {e}\")\n            print(traceback.format_exc())\n    return wrapper\n\n@handle_errors\n\
    def divide(a, b):\n    return a / b\n\nresult = divide(4, 2)\nresult = divide(4,\
    \ 0)\n```\n\n在上面的脚本中，`handle_errors` 装饰器旨在捕获 `divide` 函数可能触发的任何异常，记录错误消息和回溯信息，然后返回\
    \ `None`，使程序能够继续执行。\n\n错误处理装饰器也可用于提供默认值或根据异常类型执行自定义错误管理。\n\n下面是一个示例，说明了针对不同异常类型的错误处理和默认值的提供。\n\
    \n```python\ndef handle_errors_with_default(default_value):\n    def decorator(func):\n\
    \        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n     \
    \       try:\n                return func(*args, **kwargs)\n            except\
    \ ZeroDivisionError as e:\n                print(f\"Error in {func.__name__}:\
    \ division by zero\")\n            except Exception as e:\n                print(f\"\
    Error in {func.__name__}: {e}\")\n                print(traceback.format_exc())\n\
    \            return default_value\n        return wrapper\n    return decorator\n\
    \n@handle_errors_with_default(default_value=float('inf'))\ndef safe_divide(a,\
    \ b):\n    return a / b\n\nresult = safe_divide(4, 2)\nresult = safe_divide(4,\
    \ 0)\n```\n\n在上面的脚本中，`handle_errors_with_default` 装饰器函数接受一个 `default_value` 参数，该参数设置为在发生异常时返回。它还包含对\
    \ `ZeroDivisionError` 的特殊处理，以提供更具体的错误消息。\n\n通过装饰器包装错误，通过集中化和自动化错误处理，有效地有助于创建整洁、易于管理的代码。这种技术也可以与其他装饰器结合使用，以创建更高级和更健壮的错误管理技术。"
