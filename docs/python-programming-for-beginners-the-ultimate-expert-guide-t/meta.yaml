    # CHAPTER 3


    # Functional Programming


    Functional programming is a programming approach that treats computation akin
    to the assessment of mathematical functionalities while avoiding state alterations
    and mutable data. Its growing popularity can be attributed to its prowess in generating
    efficient, manageable, and modular programming codes. The versatile Python language
    incorporates such functional programming methodologies, hence, empowering developers
    to reap the benefits of these programming languages while simultaneously enjoying
    the extensive Python ecosystem.


    In this section, our focus will be to uncover the potential of functional programming
    in Python while familiarizing ourselves with its fundamental tenets, such as first-class
    functions, higher-order functions, and static data. The adoption of a functional
    mindset benefits problem-solving procedures, enhances code readability, eases
    testability, and promotes more effective code reasoning. The adoption of functional
    programming techniques sets the stage for the generation of not just alluring
    codes, but also more durable and maintainable programming languages.


    As we advance further in this section, you will gain knowledge on the implementation
    of functional answers to regular programming activities, leveraging Python’s intrinsic
    functions, as well as its libraries. We will focus on the usage of Python list
