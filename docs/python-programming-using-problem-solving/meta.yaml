    # CHAPTER 3


    ## FUNDAMENTALS


    ### Objectives


    After reading this chapter, the reader should be able to


    - Understand how a program is executed.

    - Learn various methods of running a program in **Python**.

    - Understand the **print** and **input** functions in **Python**.

    - Understand the elements of a **Jupyter Notebook**.

    - Understand the importance of tokens, keywords, identifiers, and statements.


    ## 3.1 INTRODUCTION


    Our journey toward becoming a programmer would be greatly facilitated by **Python**.
    Let us start the journey by exploring the modes in which we can write and execute
    a program in **Python**. This chapter discusses various ways of executing a **Python**
    program. Before starting the discussion, let us first have a look at how a program
    is executed in languages like **C**.


    In C, the following steps are required to run a program (**Figure 3.1**):


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_76_0.png)


    **FIGURE 3.1** In C, the compiler converts the source code to the object code.
    This is followed by links, and finally, memory is allocated to the process.


    - Compilation

    - Linking

    - Loading


    A compiler converts the source code into the object code. The linker converts
    the object code to the executable code and gives it to the loader. The loader
    primarily allocates memory to the executable file. The conversion of source code
    into object code requires the following steps (Figure 3.2):


    - Lexical analysis

    - Syntactic analysis

    - Semantic analysis

    - Intermediate code generation

    - Optimization

    - Final code generation


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_77_0.png)


    **FIGURE 3.2** In C, the compiler converts the source code into object code. This
    is done in five steps. In the first step, the compiler converts the source code
    into tokens. This is followed by syntactic and semantic analyses. The intermediate
    code is then generated. Finally, the object code is generated after optimization.


    The Lexical Analyzer converts the program into recognizable tokens. The second
    step checks the syntax. The analysis of semantics is also done in this step. The
    next step generates the intermediate code. This intermediate code is optimized,
    and the last step generates the final code. In some compilers, however, some steps
    are clubbed together. For example, the syntactic and semantic analysis is done
    in the same phase in most of the C compilers.


    The above process produces optimized code, but the code generated may not be compatible.
    Therefore, the compiler produces intermediate code in languages like Java and
    C# to achieve portability. The rest of the process is done by JVM in JAVA and
    CLR in C#.


    In **Python**, all of the above steps are not needed. Moreover, in **Python**
    a **Python** bytecode is generated. In **Python**, one can run a single comment,
    a procedure, or even a big program. There are many ways to do so, discussed in
    this chapter.


    The chapter has been organized as follows. [Section 3.2](#) presents a brief discussion
    on basic input output. [Section 3.3](#) presents various ways of running a **Python**
    code in Windows. [Section 3.4](#) also presents a brief overview of the **Jupyter
    notebook**. [Section 3.5](#) discusses the **value** type and reference types.
    [Section 3.6](#) discusses tokens, keywords, and identifiers. [Section 3.7](#)
    briefly explains the types of statements. [Section 3.8](#) introduces comments.
    [Sections 3.9](#) and [3.10](#) discuss operators and the types of operators,
    respectively. [Section 3.11](#) discusses the basic data types and [Section 3.12](#)
    concludes.


    ## 3.2 BASIC INPUT OUTPUT


    This section briefly discusses the basic input/output functions in **Python**,
    primarily the **input** and the **print** function. The **input** function prompts
    the user to enter a value and store the value in some variable. To print a string,
    the **print** function can be used.


    ### 3.2.1 Print Function


    The **print** function prints the string given as the argument to the function.
    For example, the argument “Hi there” is printed in the following statements. Likewise,
    in the next statement, “**Turn Turn Turn! to everything, there is a season**”
    is printed.


    **Code:**


    ```

    print(''Hi there'')

    ```


    **Output:**


    ```

    ''Hi there''

    ```


    **Code:**


    ```

    print(''Turn Turn Turn! to everything, there is a season'')

    ```


    **Output:**


    ```

    Turn Turn Turn! to everything, there is a season

    ```


    The **print** function also accepts more than one argument, separated by commas.
    The function, in this case, prints the input string or the values of the variables
    (given as arguments). Note that all the arguments in the **print** function may
    belong to different data types. For example, in the following code, the values
    of the variables passed as the arguments, are printed.


    **Code:**


    ```

    a=10

    b=3.678

    x=''harsh''

    print(a, b, x)

    ```


    **Output:**


    ```

    10 3.678 harsh

    ```


