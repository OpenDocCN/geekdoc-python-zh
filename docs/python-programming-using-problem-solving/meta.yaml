  md: 'The data imported from a **csv** file, or for that matter any other source
    may contain missing values. **None** and **NaN** are two standard missing value
    representations in **Pandas**. The **None** is a python object, which is recognized
    by **Pandas**. The **NaN** means “Not a Number.” It is recognized by all the systems.
    The following discussion will help us to recognize and replace missing values
    in a **Pandas Data Frame**.


    # 21.6.1 To Check Null Values


    The following methods will help us to check null values.


    +   - **isnull()**: This function returns a Boolean **Data Frame** containing
    **True** at the positions having null values and **False** at the rest of the
    positions.

    - **notnull()**: This function returns a Boolean **Data Frame** containing **False**
    at the positions having null values and **True** at the rest of the positions.


    The examples that follow use the following **Data Frame**, which is created using
    the **Data_Pandas6.csv** file.


    **Code:**


    ```

    import pandas as pd

    DataFrame1=pd.read_csv(''Data_Pandas6.csv'', header=None)

    DataFrame1

    ```


    **Output:**


    | | 0 | 1 | 2 | 3 |

    |---|---|---|---|---|

    | 0 | Harsh | 36.0 | 10 | True |

    | 1 | Tanu | 30.0 | 1 | False |

    | 2 | Manu | 28.0 | 2 | True |

    | 3 | Kim | 32.0 | 1 | True |

    | 4 | Lakshay | 24.0 | 2 | False |

    | 5 | NaN | NaN | NaN | NaN |

    | 6 | Krishna | 18.0 | NaN | True |


    *Illustration 21.5:*'
