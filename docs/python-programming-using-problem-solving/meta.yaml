- md: "## CHAPTER 13\n\n## INHERITANCE\n\n### Objectives\n\nAfter reading this chapter,\
    \ the reader should be able to\n\n- Understand the concept and importance of Inheritance\n\
    - Differentiate between Inheritance and Composition\n- Understand the types of\
    \ Inheritance\n- Appreciate the role of “self” in methods\n- Understand the concept\
    \ and importance of super\n- Appreciate the need of an abstract class\n\n### 13.1\
    \ INTRODUCTION TO INHERITANCE AND COMPOSITION\n\nReaders versed with C++ must\
    \ have studied the importance of inheritance and composition. Inheritance was\
    \ projected as a path breaking concept, which promised to solve all the problems\
    \ and bring about a change in the way programming is done. Inheritance may also\
    \ create problems, much more than you can imagine.\n\nMany programmers believe\
    \ that inheritance is a black hole which somehow attracts programmers, who fall\
    \ in the trap of tall claims and end up landing themselves in a situation which\
    \ tempts them to use multiple inheritance. Multiple Inheritance is like Voldemort,\
    \ and the Object-Oriented Programming environment is Hogwarts. Therefore, it is\
    \ better to avoid Multiple Inheritance, as much as possible.\n\nObject-oriented\
    \ programming has its charm, but also comes with its own problems. So, use inheritance,\
    \ only if required. In which case, remember never ever to use Multiple Inheritance.\
    \ Also remember that anything that can be done using inheritance can be done otherwise.\
    \ Composition, introduced later in the chapter, can be easily used to accomplish\
    \ most of the tasks that can be done using inheritance.\n\nIn hindsight, inheritance\
    \ means a class would get features (all or some) from the parent class. So, when\
    \ one writes:\n\n```\nclass SoftwareDeveloper(Employee):\n    ...\n```\n\nit implies\
    \ that the class **SoftwareDeveloper** is a subclass of the class `Employee`.\
    \ This relationship falls into the category of **is a** type relationship. That\
    \ is, **Software Developer is-a Employee**.\n\nThe class from which class(es)\
    \ are derived is called **base class** and those that inherit features from the\
    \ base class are **derived classes**. In the above example, `Employee` is the\
    \ base class and **SoftwareDeveloper** is the derived class. Note that inheritance\
    \ does not affect the base class. The derived class can use the modules of the\
    \ base class in a variety of ways, discussed as follows.\n\n#### 13.1.1 Inheritance\
    \ and Methods\n\nAs far as modules are concerned, Inheritance can help the programmer\
    \ to derive the features by one of the following ways.\n\n**The method is not\
    \ present in the child class, but only in the parent class:** In such case, if\
    \ an instance of the child class calls the said method, the parent class’s method\
    \ is called. For instance, in the following snippet, the derived class does not\
    \ have method called **show()**, so calling **show** using an instance of the\
    \ derived class invokes the method of the parent class.\n\n**Code:**\n\n```\n\
    class ABC:\n    def show(self):\n        print(\"show of ABC\")\n\nclass XYZ(ABC):\n\
    \    def show1(self):\n        print(\"show of XYZ\")\n\nA = ABC()\nA.show()\n\
    B = XYZ()\nB.show()\nB.show1()\n```\n\n**The method is present in both the parent\
    \ class and in the derived class:** In such cases, if this method is invoked using\
    \ an instance of the derived class, the method of the derived class is called.\
    \ If the method is called using an instance of the base class, the method of the\
    \ base class is called. Note that in such cases, the derived class redefines the\
    \ method. This **overriding** ensures that the search of the method in the inheritance\
    \ tree ends up invoking this method only. For example, in the following snippet,\
    \ **B.show()** calls the **show()** method of the derived class, whereas **A.show()**\
    \ calls the method of the base class.\n\n**Code:**\n\n```\nclass ABC:\n    def\
    \ show(self):\n        print(\"show of ABC\")\n\nclass XYZ(ABC):\n    def show(self):\n\
    \        print(\"show of XYZ\")\n\nA = ABC()\nA.show()\nB = XYZ()\nB.show()\n\
    ```\n\n**The inherited class modifies the method of the base class** and in this\
    \ process invokes the method of the base class inside the method of the derived\
    \ class also. Note that, in the following snippet, the **show** method of the\
    \ derived class prints a message, then calls the method of the base class and\
    \ finally prints another message. Note that in this case, the method of the base\
    \ class can be called by qualifying the name of the method with the name of the\
    \ base class. For example, in the following snippet, the **show** method of the\
    \ base class can be called using **ABC.show(self)**. The importance of the **self**\
    \ argument has been explained in [section 13.3](section 13.3).\n\n**Code:**\n\n\
    ```\nclass ABC:\n    def show(self):\n        print(\"show of ABC\")\n\nclass\
    \ XYZ(ABC):\n    def show(self):\n        print(\"Something before calling the\
    \ base class function\")\n        ABC.show(self)\n        print(\"Something after\
    \ calling the base class function\")\n\nA = ABC()\nA.show()\nB = XYZ()\nB.show()\n\
    ```\n\nThe first type of inheritance would henceforth be referred to as **implicit\
    \ inheritance**. In this type, the method of the base class can be called using\
    \ an instance of the derived class.\n\nThe second type of inheritance would henceforth\
    \ be referred to as **explicit overriding**. As stated earlier, the derived class\
    \ would redefine the method of the base class and calling this method using an\
    \ instance of the derived class would invoke the method of the derived class.\n\
    \nThe third type of inheritance is the most important and practical form of overriding\
    \ methods. This type of inheritance leaves the room of not making an instance\
    \ of the base class, if not required, still using the function.\n\nThe following\
    \ illustration combines the three types of inheritance:\n\n**Illustration 13.1:**\n\
    \nCreate a class called **Student** having **__init__** and **show** methods.\
    \ The **Student** class should have a data member called **name**. The **__init__**\
    \ should assign value to **name** and **show** should display the value. Create\
    \ another class called **RegularStudent**, which would be the derived class of\
    \ the **Student** class. The class should have two methods **__init__** and **show**.\
    \ The **__init__** should assign values to **age** and should call the **__init__**\
    \ of the base class and pass the value of **name** to the base class. The **show**\
    \ method must display the data of the **Regular Student**. In addition to the\
    \ above, both classes should have methods called **random**, both of which should\
    \ be independent of each other (Figure 13.1). Find what happens when the methods\
    \ of the base class and the derived classes are called using the instances of\
    \ the base and the derived classes.\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_323_0.png)\n\
    \n**FIGURE 13.1** Class hierarchy for Illustration 13.1.\n\n*Solution:*\n\n**Code:**\n\
    \n```\nclass Student:\n    def __init__(self, name):\n        self.name = name\n\
    \    def show(self):\n        print(\"Name\\t:\" + self.name)\n    def random(self):\n\
    \        print(\"A random method in the base class\")\n\nclass RegularStudent(Student):\n\
    \    def __init__(self, name):  ## overrides the base class method\n        self.age\
    \ = 22\n        Student.__init__(self, name)\n    def show(self):  ## redefines\
    \ the base class method\n        print(\"Name (derived class)\\t:\" + self.name\
    \ + \" Age\\t:\" + str(self.age))\n    def random(self):  ## nothing to do with\
    \ the base class method\n        print(\"Random method in the derived class\"\
    )\n\nnaks = Student(\"Nakul\")\nhari = RegularStudent(\"Harsh\")\nnaks.show()\n\
    hari.show()\n## The variables can be seen outside the class also\nprint(naks.name)\n\
    print(hari.name)\n```\n\n**Output:**\n\n```\nName :Nakul\nName (derived class)\
    \ :Harsh Age :22\nNakul\nHarsh\n```\n\n#### 13.1.2 Composition\n\nMaking an instance\
    \ of another class inside a class makes things easy and helps the programmer to\
    \ accomplish many tasks. In order to understand the concept, let us consider an\
    \ example. Consider that a **Student** and his **PhDguide** are subclasses of\
    \ the **person** class. Also, the data of the **PhD guide** includes the list\
    \ of students guided by them. Hence, composition comes into play. The instantiation\
    \ of the **students** in the **PhDGuide** class can be done as explained in the\
    \ following illustration.\n\n**Illustration 13.2:**\n\nCreate a class called **Student**,\
    \ having **name** and **email** as its data members and **__init__(self, name,\
    \ email)** and **putdata(self)** as bound methods. The **__init__** function should\
    \ assign the values passed as parameters to the requisite variables. The **putdata**\
    \ function should display the data of the student. Create another class called\
    \ **PhDGuide** having **name**, **email**, and **students** as its data members.\
    \ Here, the **students** variable is the list of"
  mdcn: "## 第13章\n\n## 继承\n\n### 学习目标\n\n阅读本章后，读者应能够\n\n- 理解继承的概念及其重要性\n- 区分继承与组合\n\
    - 理解继承的类型\n- 领会“self”在方法中的作用\n- 理解super的概念及其重要性\n- 认识抽象类的必要性\n\n### 13.1 继承与组合简介\n\
    \n熟悉C++的读者一定研究过继承和组合的重要性。继承曾被视为一个突破性的概念，有望解决所有问题并改变编程方式。然而，继承也可能带来问题，甚至比你想象的要多得多。\n\
    \n许多程序员认为继承是一个黑洞，它以某种方式吸引着程序员，使其陷入夸大其词的陷阱，最终将自己置于一个诱使他们使用多重继承的境地。多重继承就像伏地魔，而面向对象编程环境就是霍格沃茨。因此，最好尽可能避免使用多重继承。\n\
    \n面向对象编程有其魅力，但也伴随着自身的问题。因此，只在需要时才使用继承。在这种情况下，切记永远不要使用多重继承。同时要记住，任何通过继承能完成的任务，都可以用其他方式完成。本章稍后介绍的组合，可以轻松用于完成大多数可以通过继承完成的任务。\n\
    \n回顾一下，继承意味着一个类将从父类获得特性（全部或部分）。因此，当编写：\n\n```\nclass SoftwareDeveloper(Employee):\n\
    \    ...\n```\n\n时，意味着**SoftwareDeveloper**类是`Employee`类的子类。这种关系属于**“是一个”**类型的关系。即，**软件开发者是一个员工**。\n\
    \n派生出其他类的类称为**基类**，而从基类继承特性的类称为**派生类**。在上面的例子中，`Employee`是基类，**SoftwareDeveloper**是派生类。请注意，继承不会影响基类。派生类可以以多种方式使用基类的模块，具体讨论如下。\n\
    \n#### 13.1.1 继承与方法\n\n就模块而言，继承可以帮助程序员通过以下方式之一派生特性。\n\n**该方法在子类中不存在，仅存在于父类中：**\
    \ 在这种情况下，如果子类的实例调用该方法，则会调用父类的方法。例如，在下面的代码片段中，派生类没有名为**show()**的方法，因此使用派生类的实例调用**show**会调用父类的方法。\n\
    \n**代码：**\n\n```\nclass ABC:\n    def show(self):\n        print(\"show of ABC\"\
    )\n\nclass XYZ(ABC):\n    def show1(self):\n        print(\"show of XYZ\")\n\n\
    A = ABC()\nA.show()\nB = XYZ()\nB.show()\nB.show1()\n```\n\n**该方法在父类和派生类中都存在：**\
