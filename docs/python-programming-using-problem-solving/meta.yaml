    # GLOSSARY


    **List:** A Python list is a sequence object. It may contain any number of elements,
    which may or may not be of the same type. They are mutable.


    **Tuples:** A tuple can contain different types of elements and are not mutable.


    **Dictionary:** A dictionary maps the index (which may be a string) to a value.


    # POINTS TO REMEMBER


    +   - Lists are mutable.

    - A list may contain different types of elements.

    - Tuples are not mutable.

    - Dictionary maps a key to a value.

    - Strings in Python are nonmutable.


