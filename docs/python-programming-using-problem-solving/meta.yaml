    \ uses looping to create patterns. Section 5.4 introduces the concept of nesting\
    \ and the processing of lists and tuples using **for** loops. The last section\
    \ concludes.\n\n## 5.2 WHILE\n\nIn Python, the **while** loop is the most commonly\
    \ used construct for repeating a task over and over again. The task is repeated\
