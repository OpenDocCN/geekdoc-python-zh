    # 1.6 COMPLEXITY


    The algorithm should be efficient both in terms of memory and time. That is, an
    algorithm should take the least amount of space and time. In order to understand
    the concept, let us consider five different algorithms to solve the same problem.
    Assume that the number of elements given as input to the algorithm is **n**. The
    first algorithm takes time proportional to **n** to accomplish the given task
    ($O(n)$), the second algorithm takes time proportional to **n²** to do the same
    task ($O(n^2)$), the third takes time proportional to **n³** ($O(n^3)$), the fourth
    takes time proportional to $\log(n)$ ($O(\log n)$) and the fifth takes time proportional
    to $n \log(n)$, that is $O(n \log n)$. This implies that, if the number of elements
    doubles, the time taken to'
  merge: -1
  pgno: 38
- img_proc: true
  md: 'accomplish the given task by the first algorithm would double, by the second
    algorithm would be four times, the third algorithm eight times, and the increase
    in time of the fourth would be less than the increase in the first and the increase
    in the time by the fifth would be less than the increase in the second. Therefore,
    the order of the time complexity would be as follows:


    $O(\log n) < O(n) < O(n \log n) < O(n^2) < O(n^3)$


    For example, linear search described in the following section takes $O(n)$ time
    whereas binary search takes $O(\log n)$ time. Therefore, binary search takes lesser
    time as compared to linear search. Merge sort and bubble sort are the two most
    popular algorithms for sorting. The merge sort takes $O(n \log n)$ time and bubble
    sort takes $O(n^2)$ time. Therefore, Merge sort has lesser time complexity vis-à-vis
    bubble sort and is hence better.


