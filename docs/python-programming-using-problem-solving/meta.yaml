    \n## 6.1 INTRODUCTION\n\nIf one has to perform a bigger task, then it is advisable\
    \ to divide it into smaller, manageable tasks. This division has many advantages,\
    \ discussed in the following sections. The units of program, which can be called\
    \ on as it is basis, take some input, process it and may generate some output\
    \ are referred to as functions.\n\n> Functions are units which perform a particular\
    \ task, take some input and may give some output.\n\nThis concept is the soul\
    \ of procedural programming. The readers familiar with C (or for that matter C++,\
    \ JAVA, C#, etc.) must be familiar with the idea and use of functions. However,\
    \ a brief discussion on the features and advantages of functions follows in the\
    \ next section.\n\nThis chapter introduces the concept of functions. The chapter\
    \ has been organized as follows. The next section briefly explains the features\
    \ of a function; the third section explains the basic terminology, and the fourth\
    \ section explains the definition and invocation of a function. The fifth section\
    \ presents a brief discussion on various types of functions. The sixth section\
    \ illustrates the concept by taking the example of linear search. The seventh\
    \ section discusses the scope of a variable, and the eighth section presents recursion.\
    \ The last section concludes.\n\n## 6.2 FEATURES OF A FUNCTION\n\nAs discussed\
    \ earlier, functions form the basis of procedural programming. One of the most\
    \ obvious advantages of using functions is the division of a program into smaller\
    \ parts. This section briefly discusses the advantages of functions.\n\n### 6.2.1.\
    \ Modular Programming\n\nA good program is divided into small parts, in such a\
    \ way that a particular part perform some specific task. The clubbing together\
    \ of similar functions gives rise to modular programming.\n\n### 6.2.2. Reusability\
    \ of Code\n\nA function can be called many times. This spares the programmer from\
    \ the horror of rewriting the same code again, which in turn can reduce the length\
    \ of the program.\n\n### 6.2.3. Manageability\n\nDividing a bigger task into smaller\
    \ functions makes the program manageable. It becomes easy to locate bugs and leads\
    \ to increased reliability. Also, it becomes easy to carry out local optimizations\
    \ in a function. To summarize, manageability leads to the following.\n\n### 6.2.3.1\
    \ Easy debugging\n\nIn order to understand why creating functions would make debugging\
    \ easy, let us consider White Box Testing. This type of testing, which uses code\
    \ for testing, requires elicitation of paths and crafting test cases catering\
    \ to them. It is easy to effectively analyse smaller functions rather than the\
    \ whole task.\n\n### 6.2.3.2 Efficient\n\nIt is essential to make code efficient\
    \ both in terms of time and memory. As a matter of fact, even in C’s compiler,\
    \ most of the code optimization is attributed to the developer rather than the\
    \ compiler.\n\nThe above factors point to the fact that dividing the task into\
    \ functions is a good practice. It may be noted here that even Object-Oriented\
    \ Programming relies on functions for implementing the behavior of a class.\n\n\
    ## 6.3 BASIC TERMINOLOGY\n\nThe importance of functions in procedural programming\
    \ has already been discussed in the previous section. This section briefly introduces\
    \ the terminology of functions and presents the syntax, which would form the foundation\
    \ stone of the discussion that follows.\n\n### 6.3.1. Name of a Function\n\nFunction\
    \ can have any legal literal name. For example, **sum1** is a valid function name,\
    \ as it satisfies all the constrains on the name (also discussed in [Section 6.4](#)).\
    \ It may be stated here that in general a class can have more than one functions\
    \ having same name but different parameters. This is referred to as overloading.\n\
    \n### 6.3.2. Arguments\n\nThe arguments of a function denote the input given to\
    \ a function. A function can have any number of arguments. As a matter of fact,\
