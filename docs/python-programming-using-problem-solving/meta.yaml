    # 7.3 THE OPEN FUNCTION AND FILE ACCESS MODES


    The files are accessed using the object created with the help of the **open()**
    function. Note that this returns a file object or a file like object. This abstraction
    is helpful for considering file as interface for communication. Therefore, this
    communication can be perceived as transfer of bytes since a file can be considered
    as a sequence of bytes.


    So, to be able to do input /output to/from a file, the **open()** function is
    needed. If the file is opened successfully, the file Object is returned. If the
    file is not opened successfully, the **IOERROR** exception is raised.


    The **open** function takes three arguments. The first argument is the name of
    the file, the second the mode in which the file is to be opened and the third
    indicates the buffer string. As a matter of fact, the third would rarely be used.
    The first argument is a string of characters, which is either a valid filename
    or a path. The path can be relative or absolute. The access'
