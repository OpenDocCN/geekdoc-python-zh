    # 11.2 CREATING NEW TYPES


    Though types are not explicitly declared in Python, they were important in other
    languages (well most of them). For example, when one says that a “number” is of
    integer type, one states the type of information and its maximum and minimum value.
    Assume that an integer takes two bytes, the maximum value of “number” would be
    32, 767, and the minimum value would be –32, 768. Moreover, saying that “number”
    is of integer type also restricts the operations that can be performed on the
    number.'
