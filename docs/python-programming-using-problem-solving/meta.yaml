- md: "## Illustration 4.1:\n\nAsk the user to enter the marks of a student in a subject.\
    \ If the marks entered are greater than 40, then print “pass”, else print “fail”.\n\
    \n## Program:\n\n```\na = input(\"Enter marks : \")\nif int(a) > 40:\n    print('Pass')\n\
    else:\n    print('Fail')\n```\n\n**Output 1:** Enter Marks : 50\nPass\n\n**Output\
    \ 2:** Enter Marks : 30\nFail\n\nLet us have a look at another example. In the\
    \ problem, the user is asked to enter a three-digit number, to find the number\
    \ obtained by reversing the order of the digits of the number; then find the sum\
    \ of the number and that obtained by reversing the order of the digits and finally,\
    \ find whether this sum contains any digit in the original number. In order to\
    \ accomplish the task, the following steps (presented in Illustration 4.2) must\
    \ be carried out.\n\n## Illustration 4.2:\n\nAsk the user to enter a three-digit\
    \ number. Call it “**num.**” Find the number obtained by reversing the order of\
    \ the digits. Find the sum of the given number and that obtained by reversing\
    \ the order of the digits. Finally, find if any digit in the sum obtained is same\
    \ as that in the original number.\n\n## Solution:\n\nThe problem can be solved\
    \ as follows.\n\n- When the user enters a number, check whether it is between\
    \ 100 and 999, both inclusive.\n- Find the digits at units, tens, and hundreds\
    \ place. Call them “u,” “t,” and “h,” respectively.\n- Find the number obtained\
    \ by reversing the order of the digits (say, “rev”) using the following formula.\n\
    \  - Number obtained by reversing the order of the digits, rev = h + t × 10 +\
    \ u × 100\n- Find the sum of the two numbers.\n  $$Sum = rev + num$$\n- The sum\
    \ may be a three-digit or a four-digit number. In any case, find the digits of\
    \ this sum. Call them “u1,” “t1,” “h1,” and “th1” (if required).\n- Set “flag\
    \ = 0.”\n- Check the following condition. If anyone is true make flag = 1. If\
    \ “sum” is a three-digit number\n  $$u == u1$$\n  $$u == t1$$\n  $$u == h1$$\n\
    \  $$t == u1$$\n  $$t == t1$$\n  $$t == h1$$\n  $$h == u1$$\n  $$h == t1$$\n \
    \ $$h == h1$$\n- If “sum” is a four-digit number, the above conditions need to\
    \ be checked along with the following conditions.\n  $$u == th1$$\n  $$t == th1$$\n\
    \  $$h == th1$$\n- The above conditions would henceforth be referred to as “set\
    \ 1.” If the value of “flag” is 1, then print “true” else print “false.”\n- The\
    \ process has been depicted in Figure 4.2.\n\n![Flowchart for Illustration 4.2.](img/46b778b4f9252bd09c63fc5fba842fc6_113_0.png)\n\
    \n**FIGURE 4.2** Flowchart for Illustration 4.2.\n\n## Program:\n\n```\nnum =\
    \ int(input('Enter a three digit number\\t:'))\nif ((num < 100) | (num > 999)):\n\
    \    print('You have not entered a number between 100 and 999')\nelse:\n    flag\
    \ = 0\n    o = num % 10\n    t = int(num / 10) % 10\n    h = int(num / 100) %\
    \ 10\n    print('o\\t:', str(o), 't\\t:', str(t), 'h\\t:', str(h))\n    rev =\
    \ h + t * 10 + o * 100\n    print('Number obtained by reversing the order of the\
    \ digits\\t:', str(rev))\n    sum1 = num + rev\n    print('Sum of the number and\
    \ that obtained by reversing the order of digits\\t:', str(sum1))\n    if sum1\
    \ < 1000:\n        o1 = sum1 % 10\n        t1 = int(sum1 / 10) % 10\n        h1\
    \ = int(sum1 / 100) % 10\n        print('o1\\t:', str(o1), 't1\\t:', str(t1),\
    \ 'h1\\t:', str(h1))\n        if ((o == o1) | (o == t1) | (o == h1) | (t == o1)\
    \ | (t == t1) | (t == h1) | (h == o1) | (h == t1) | (h == h1)):\n            print('Condition\
    \ true')\n            flag = 1\n    else:\n        o1 = sum1 % 10\n        t1\
    \ = int(sum1 / 10) % 10\n        h1 = int(sum1 / 100) % 10\n        th1 = int(sum1\
    \ / 1000) % 10\n        print('o1\\t:', str(o1), 't1\\t:', str(t1), 'h1\\t:',\
    \ str(h1), 'th1\\t:', str(th1))\n        if ((o == o1) | (o == t1) | (o == h1)\
    \ | (o == th1) | (t == o1) | (t == t1) | (t == h1) | (t == th1) | (h == o1) |\
    \ (h == t1) | (h == h1) | (h == th1)):\n            print('Condition true')\n\
    \            flag = 1\n```\n\n## Output: First run\n\nEnter a three digit number\
    \ :4\nYou have not entered a number between 100 and 999\n>>>\n\n## Output: Second\
    \ run\n\nEnter a three digit number :343\no : 3 t : 4 h : 3\nNumber obtained by\
    \ reversing the order of the digits : 343\nNo digit of the sum is same as the\
    \ original number\n>>>\n\n## Output: Third run\n\nEnter a three digit number :435\n\
    o : 5 t : 3 h : 4\nNumber obtained by reversing the order of the digits : 534\n\
    No digit of the sum is same as the original number\n>>>\n\n## Output: Fourth run\n\
    \nEnter a three digit number :121\no : 1 t : 2 h : 1\nNumber obtained by reversing\
    \ the order of the digits : 121\nSum of the number and that obtained by reversing\
    \ the order of digits: 242\no1 : 2 t1 : 4 h1 : 2\nCondition true\n>>>\n\n> TIP!\n\
    One must be careful as regards the indentation, failing which the program would\
    \ not compile. The indentation decides the beginning and end of a particular block\
    \ in Python. It is advisable not to use a combination of spaces and tabs in indentation.\
    \ Many versions of Python may treat this as a syntax error.\n\nThe **if-elif**\
    \ ladder can also be implemented using the get statement in case of dictionaries,\
    \ explained later in the chapter. The important points as regards the conditional\
    \ statements in Python are as follows.\n\n- The **if <test>** is followed by a\
    \ colon.\n- There is no need of parenthesis for the test condition. Though, enclosing\
    \ test in parenthesis would not result in an error.\n- The nested blocks in Python\
    \ are determined by indentation. Therefore, proper indentation in Python is essential.\
    \ As a matter of fact, an inconsistent indentation or no indentation would result\
    \ in errors.\n- An **if** can have any number of **if**'s nested within.\n- The\
    \ test condition in **if** must result in a **True** or a **False**.\n\n## Illustration\
    \ 4.3:\n\n*Write a program to find the greatest of the three numbers entered by\
    \ the user.*\n\n## Solution:\n\nFirst of all, ask the user to enter three numbers\
    \ (say **num1**, **num2**, and **num3**). This is followed by the condition checking\
