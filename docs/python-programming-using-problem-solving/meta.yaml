  md: '# PREFACE


    Python is a robust, procedural, object-oriented, and functional language. The
    features of the language make it tremendously valuable for web development, gaming,
    and scientific programming. Lately, the language has become incredibly popular.
    The popularity of the language can be gauged from the fact that it is currently
    being used by *Google*, *YouTube*, *Bit Torrent* and many other companies.


    This book deals with problem-solving and programming in Python. Programming is
    the soul of computer science, and designing a program requires involved expertise
    of the paradigms, along with the ability to use the standard procedures. To become
    a virtuous programmer one must, therefore, not only learn the syntax of the language
    but also develop an ability to apply the mastered concepts to solve problems.
    It may be stated here that a programming language and its syntax learned by a
    professional is of no use until the algorithms that are to be implemented have
    been well designed. Thus, a basic knowledge of data structures and algorithms
    is also essential. This is the reason that the first section of this book has
    been dedicated to problem-solving. One of the most important goals of the book
    is to make the readers understand Python’s discriminative features. The ability
    of Python to deal with multi-dimensional arrays via `NumPy` has been included.
    Python also helps in visualization via `matplotlib`. The topic has also been presented
    in [section IV](section IV).


    **Harsh Bhasin**

    **June 2023**'
