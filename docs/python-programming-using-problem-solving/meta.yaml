    \ **for** 循环来访问和操作这些对象的元素，但 Python 提供了更好的选择，即迭代器。迭代器帮助我们高效且有效地实现上述目标。在 Python\
    \ 中，也可以定义一个可迭代对象。Python 中的生成器有助于动态生成列表和序列。本章还介绍了推导式，它提供了一种优雅的方式来创建列表、元组和集合。\n\n\
    本章的组织结构如下。本章第二节将重新探讨 **for** 循环。第三节介绍了迭代器。第四节解释了如何定义可迭代对象。第五节介绍并解释了生成器。第六节讨论了推导式。\n\
    \n本章之所以重要，是因为它构成了后续章节中许多复杂任务的基础。此外，掌握这些知识将使日常任务变得简单，并使程序员免于编写冗长代码的困扰。\n\n### 9.2\
    \ “for”循环的威力\n\n**for** 循环可用于遍历列表、元组、字符串或字典。本节简要描述了 **for** 循环对上述可迭代对象的使用。让我们从\
    \ **for** 的语法开始。请注意，在以下代码中，元素从 L 中逐个提取，并且在每次迭代中，i 存储该对象。\n\n**语法：**\n\n```\nfor\
    \ i in L:\n    #do something\n```\n\nL 是列表、字符串、元组或字典\n\n当编写“**i in L**”时，其中 **L**\
    \ 是一个列表，**i** 指向列表的第一个元素，随着迭代的进行，**i** 指向第二个元素、第三个元素，依此类推。然后可以独立地操作这些元素。这个概念在示例\
    \ 9.1 中进行了说明。该示例展示了使用 **for** 循环操作列表。在示例中，给定列表包含一组数字，其中一些是正数，一些是负数。负数被追加到名为 **N**\
    \ 的列表中，而正数被追加到名为 **P** 的列表中。\n\n**示例 9.1：**\n\n*从给定列表中，将所有正数放入一个列表，负数放入另一个列表。*\n\
    \n**解决方案：**\n\n创建两个列表 **P** 和 **N**。将它们都初始化为 []。现在检查列表中的每个数字。如果数字是正数，则将其放入 P；如果数字是负数，则将其放入\
    \ N。\n\n**程序：**\n\n```\nL= [1, 2, 5, 7, -1, 3, -6, 7]\nP=[]\nN=[]\nfor num in\
    \ L:\n    if(num>0):\n        P.append(num)\n    elif (num<0):\n        N.append(num)\n\
    print('The list of positive numbers \\t:',P)\nprint('The list of negative numbers\
    \ \\t:',N)\n>>>\n```\n\n**输出：**\n\n```\nThe list of positive numbers : [1, 2,\
    \ 5, 7, 3, 7]\nThe list of negative numbers : [-1, -6]\n>>>\n```\n\n**for** 循环也可用于操作字符串。当编写“**i\
    \ in str**”时，其中 **str** 是一个字符串，**i** 指向字符串的第一个字符，随着迭代的进行，**i** 指向第二个字符、第三个字符，依此类推。然后可以独立地操作这些字符。这个概念在示例\
    \ 9.2 中进行了说明。\n\n**示例 9.2：**\n\n*要求用户输入一个字符串，并将字符串中的所有元音放入一个字符串，辅音放入另一个字符串。*\n\
    \n**解决方案：**\n\n创建两个字符串：**str1** 和 **str2**。将它们都初始化为“”。现在，检查字符串中的每个字符，如果是元音，则将其与\
    \ **str1** 连接；否则，将其与 **str2** 连接。\n\n**程序：**\n\n```\nstring =input('Enter a string\\\
    t:')\nstr1=\"\"\nstr2=\"\"\nfor i in string:\n    if((i =='a')|(i=='e')|(i=='i')|(i=='o')|(i=='u')):\n\
    \        str1=str1+str(i)\n    else :\n        str2=str2+str(i)\nprint('The string\
    \ containing the vowels is '+str1)\nprint('The string containing consonants '+str2)\n\
    >>\n```\n\n类似地，**for** 循环可用于遍历元组和字典的键，如示例 9.3 和 9.4 所示。\n\n**示例 9.3：**\n\n*此示例演示了使用\
    \ **for** 遍历元组。*\n\n**解决方案：**\n\n```\nT=(1, 2, 3)\nfor i in T:\n    print(i)\n\
    print(T)\n>>>\n```\n\n**输出：**\n\n```\n1\n2\n3\n(1, 2, 3)\n>>>\n```\n\n**示例 9.4：**\n\
    \n*此示例演示了使用 **for** 遍历字典。*\n\n**解决方案：**\n\n```\nDictionary={'Programming in C#':\
    \ 499, 'Algorithms Analysis and Design':599}\nprint(Dictionary)\nfor i in Dictionary:\n\
    \    print(i)\n>>>\n```\n\n**输出：**\n\n```\n{'Programming in C#': 499, 'Algorithms\
    \ Analysis and Design': 599}\nProgramming in C#\nAlgorithms Analysis and Design\n\
    >>>\n```\n\n### 9.3 迭代器\n\n上述任务也可以使用迭代器来完成。**“iter”** 函数返回作为参数传递的对象的迭代器。该迭代器可用于操作列表、字符串、元组、文件和字典，其方式与\
    \ **for** 循环相同。然而，使用迭代器确保了灵活性并为程序员提供了额外的能力。这将在下一节中得到证实。\n\n可以使用以下方式在列表上设置迭代器：\n\
    `<迭代器名称> = iter(<列表名称>)`\n\n迭代器可以使用 **__next__()** 方法移动到下一个元素。如前所述，迭代器可以遍历任何可迭代对象，包括列表、元组、字符串或目录。当没有更多元素时，将引发\
    \ **StopIteration** 异常。\n\n以下示例展示了使用迭代器操作列表。在示例中，给定列表包含一组数字，其中一些是正数，一些是负数。负数被追加到名为\
    \ **N** 的列表中，而正数被追加到名为 **P** 的列表中。同样的问题在示例 9.1 中使用 **for** 循环解决过。\n\n**示例 9.5：**\n\
    \n*通过使用迭代器，以下程序将列表中的正数和负数放入两个单独的列表，并在最后引发错误*"
