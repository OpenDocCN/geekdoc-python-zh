    denotes the lest element.


    Slicing is generally used to take out a subtuple from a given tuple. In the above
    case


    **T[:2]** is a sublist having all the elements of **T** starting from the first
    element till the element at the first index (not the element at index 2) that
    is (1, 3).


    **T[2:]** is a sublist having all the elements of **T** starting from the element
    at the second index (the third element as the list is a zero-based index) till
    the last element that is (5, 7, 9, 11).


    **T[1:4]** is a sublist having all the elements of **T** starting from the element
    at the first index till the element at the third index that is (3, 5, 7).


