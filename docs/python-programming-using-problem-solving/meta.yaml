  md: '# 16.2.1 Similarity and Differences Between a List and a NumPy Array


    The similarity between list and numpy array


    Both lists and **numpy** array are zero-based indexed.


    **Differences between lists and array:**


    +   (a) **numpy** array is homogeneous whereas a list can contain different types
    of elements.

    (b) The elements of a **numpy** array are stored at consecutive memory locations.

    - **Numpy arrays support vectorized operations:** If an operation can be performed
    on each element of an array, it is vectorized. The **numpy** array supports vectorized
    operations, whereas a list does not.


    # 16.3 FUNCTIONS FOR GENERATING SEQUENCES


    Having gone through the basics of the **numpy** arrays, let us visit some of the
    remarkable functions, which help in creating useful arrays.


    # 16.3.1 arange()


    The **arange** function helps to print a sequence, having some initial value (**start**),
    some final value (**stop**), the difference between the consecutive terms (**step**),
    and the data type (**dtype**). The syntax of the function and the description
    of each of the parameters are as follows.


    ```

    numpy.arange(start, stop, step, dtype)

    ```


    +   - **Start:** The starting value of the sequence

    - **Stop:** The value up to which the sequence is generated (not inducing the
    value itself)

    - **Step:** The difference between the consecutive values

    - **dtype:** The data type of the elements'
