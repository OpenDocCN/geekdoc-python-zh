    and files. However, one should be able to efficiently access and manipulate the
    elements of these objects to accomplish a given task. Though, **for** loop can
    be used to access and manipulate the elements of these objects, Python comes with
    better option namely iterators. Iterators help us to achieve the said goal efficiently
    and effectively. One can also define an iterable object, in Python. Generators,
    in Python, facilitates the dynamic generation of lists and sequences. This chapter
    also introduce comprehensions, which provide an elegant way to craft lists, tuples,
    and sets.


    The chapter has been organized as follows. The second section of this chapter
    revisits **for**. The iterators have been introduced in the third section of this
    chapter. The fourth section explains how to define an iterable object.'
