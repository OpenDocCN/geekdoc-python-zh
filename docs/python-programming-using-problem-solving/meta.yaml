  md: '# 21.5 READING FROM A CSV FILE: PANDAS.READ_CSV


    The **read_csv** method of **Pandas** helps us to read a **Comma Separated File**
    or a **csv** file. However, it may be stated that the separator in a **csv** file
    is not always a comma. Table 21.2 presents the parameters of the method and the
    examples that follow illustrate the usage of this method.


    **TABLE 21.2** The arguments of read_csv method.


    | Argument | Type | Explanation |

    | :--- | :--- | :--- |

    | filepath_or_buffer | str | This argument represents the path of the file. This
    path may include any of the following:<br>(i) http<br>(ii) ftp or<br>(iii) file
    |

    | sep | str | The default value of this argument is ",". This argument represents
    the delimiter to use. |

    | header | int, list of int | This argument represents the row number(s) to use
    as the start of the data. The default behavior is to infer the column names. |

    | names | array-like | This is an optional argument. It represents the list of
    column names to use. |

    | squeeze | bool | The default value of this argument is **False**. If the parsed
    data only contains one column then return a Series. |

    | mangle_dupe_cols | bool | The default value of this argument is **True**. This
    helps us to retain only the first one of the duplicate columns if they exist.
    |


