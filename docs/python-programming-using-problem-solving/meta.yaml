    **Pandas Series** 可以通过使用 **列表**、**NumPy 数组** 或 **字典** 来创建（图 20.2）。本节解释了创建 **Series**
    的三种方法，并给出了每种方法的示例。


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_557_1.png)


    **图 20.2** 创建 Pandas Series。


    ### 20.2.1 使用列表


    可以通过将列表传递给 **pandas.Series** 方法，将 Python 列表转换为 **Pandas Series**。例如，在下面的代码中，一个名为
    **L1** 的列表被传递给 **Series** 函数以创建 **Pandas Series**。


    传递给 **Series** 函数的列表也可以包含 **NaN** 值，例如 **L2** 的情况。通过将 **L2** 传递给 **Pandas** 的
    **Series** 函数来创建 **Series S2**。请注意，输出包含索引和值。


    **代码：**


    ```

    import pandas as pd

    L1=[90, 81, 72, 63, 54, 45, 36]

    S1=pd.Series(L1)

    print(S1)

    L2=[3, 6, 7, 1, np.nan, 8]

    S2=pd.Series(L2)

    print(S2)

    ```


    **输出：**


    ```

    0    90

    1    81

    2    72

    3    63

    4    54

    5    45

    6    36

    dtype: int64

    0    3.0

    1    6.0

    2    7.0

    3    1.0

    4    NaN

    5    8.0

    dtype: float64

    ```


    ### 20.2.2 使用 NumPy 数组


    可以通过将数组传递给 **pandas.Series** 函数，将 **NumPy** 数组转换为 **Pandas Series**。例如，在下面的代码中，一个名为
    **arr_np** 的 **NumPy** 数组被传递给 **Series** 函数以创建 **Pandas Series**。


    传递给 **Series** 函数的数组也可以包含 **NaN** 值，例如 **arr_np2** 的情况。通过将 **arr_np2** 传递给 **Pandas**
    的 **Series** 函数来创建 Series **S3**。


    **代码：**


    ```

    arr_np=np.random.randint(2,89,10)

    S3=pd.Series(arr_np)

    print(S3)

    arr_np2=np.array([2, np.nan, 9])

    S3=pd.Series(arr_np2)

    print(S3)

    ```


    **输出：**


    ```

    0    23

    1    20

    2    50

    3    70

    4    35

    5    58

    6    46

    7    65

    8    68

    9    44

    dtype: int32

    0    2.0

    1    NaN

    2    9.0

    dtype: float64

    ```


    ### 20.2.3 使用字典


    可以通过将字典传递给 **pandas.Series** 函数，将 **字典** 转换为 **Pandas Series**。例如，在下面的代码中，一个名为
    **dict_1** 的字典被传递给 **Series** 函数以创建 **Pandas Series**。在这种情况下，字典的键成为 **Series**
    的索引。


    **代码：**


    ```

    dict_1={''Harsh'':97,''Naks'':90,''Sahil'':91}

    S4=pd.Series(dict_1)

    print(S4)

    ```


    **输出：**


    ```

    Harsh    97

    Naks     90

    Sahil    91

    dtype: int64

    ```


    ## 20.3 索引、iloc、切片和布尔索引


    本节介绍了访问 **pandas Series** 元素以及从给定 **Series** 中获取 **Series** 片段的方法。本节还概述了 **loc[]**
    和 **iloc[]** 对象，并讨论了 **Series** 中的切片。可以使用 **head** 和 **tail** 方法分别显示 **Series**
    的前五个元素和后五个元素。接下来的两个小节涵盖了 **Pandas Series** 的 **head** 和 **tail** 方法。最后，讨论了 **Pandas
    Series** 的 **index** 和 **describe** 方法。可以说，**上一小节解释的布尔索引** 也可以用于 **Series**。


    ### 20.3.1 索引：loc


    可以通过将索引值放在方括号中来访问 **Series** 的元素。例如，**S1[0]** 用于访问系列 S1 中索引为 0 的元素。同样，**S1[2]**
    用于访问第三个元素。请注意，下面代码中使用的 **S1** 与 [第 20.2.1 节](Section 20.2.1) 中创建的相同，**S4** 与 [第
    20.2.3 节](Section 20.2.3) 中创建的相同。


    **代码：**


    ```

    print(S1[2])

    print(S1[0])

    print(S4[''Harsh''])

    ```


    **输出：**


    ```

    72

    90

    97

    ```


    ### 20.3.2 索引续：iloc


    **使用基于 0 的索引访问元素：** **iloc** 对象有助于以与 **NumPy** 数组相同的方式访问元素。请注意，**iloc** 也可以使用
    **iloc[-1]** 给出最后一个元素，就像 **NumPy** 数组的情况一样。该对象还有助于以与 **NumPy** 数组相同的方式对给定的 **Series**
    进行切片。请注意，下面代码中的 **S3** 与 [第 20.2.2 节](Section 20.2.2) 中创建的相同，**S4** 与 [第 20.2.3
    节](Section 20.2.3) 中创建的相同。


    **代码：**


    ```

    #访问最后一个和第二个元素

    S4.iloc[-1]

    S4.iloc[1]

    ```


    **输出：**


    ```

    91

    90

    ```


    **代码：**


    ```

    #从第二个索引检索元素到第四个索引

    #（索引 5 处的元素将不包括在内）。

    S3.iloc[2:5]

    #在 S3 被更改之前

    ```


    **输出：**


    ```

    2    50

    3    70

    4    35

    dtype: int32

    ```


    ### 20.3.3 切片


    **切片** 用于通过指定第一个和最后一个所需索引（用“:”分隔）从给定的 **Series** 创建一个新的 **Series**。例如，在下面的代码中，**S5**
    是通过从 **S2** 中获取索引 3 到 7 的元素创建的，**S6** 是从 **S4** 创建的，包含从索引“Harsh”到索引“Sahil”的值。请注意，下面代码中使用的
    **S2** 与 [第 20.2.1 节](Section 20.2.1) 中创建的相同，**S4** 与 [第 20.2.3 节](Section 20.2.3)
    中创建的相同。


    **代码：**


    ```

    S5=S2[3:7]

    print(S5)

    print(S4[''Harsh''])

    S6=S4[''Harsh'':''Sahil'']

    print(S6)

    ```


    **输出：**


    ```

    3    1.0

    4    NaN

    5    8.0

    dtype: float64

    97

    Harsh    97

    Naks     90

    Sahil    91

    dtype: int64

    ```


