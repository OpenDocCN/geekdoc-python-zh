    \  - 3.10.2 String Operators\n    - 3.10.3 Comparison Operators\n    - 3.10.4\
    \ Assignment Operators\n    - 3.10.5 Logical Operators\n    - 3.10.6 Priority\
    \ of Operators\n- 3.11 Basic Data Types\n    - 3.11.1 Integer\n    - 3.11.2 Float\n\
