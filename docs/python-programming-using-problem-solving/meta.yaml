    ```\n\nNote that to print “\\” we need to precede “\\” with another “\\”. Similarly,\
    \ to print a string in two lines we need “\\n” at the appropriate place. For example,\n\
    \n```\nprint(“HI there!\\nHow are you”)\n```\n\nprints “HI there!” and “How are\
    \ you in two different lines. The “\\t” is used for inserting a tab in a given\
    \ string. Table 3.2 shows the various **escape sequences** in **Python**.\n\n\
    **TABLE 3.2** Escape sequences in **Python**.\n\n| Escape Sequence | Description\
