    # 8.3.1 Accessing Elements of a Tuple


    The elements of a tuple can be accessed using indexing. The index of the first
    element of the tuple is 0, that of the second element is 1, and so on. The negative
    index denotes the elements from the end. For example, **T[-1]** denotes the last
    element of the list **T**, likewise, **T[-2]** denotes the second last element
    of a list (Figure 8.3).


    ```

    T = (1, 3, 5, 7, 9, 11)

    T[0] is 1

    T[-1] is 11

    T[3] is 7

    ```


