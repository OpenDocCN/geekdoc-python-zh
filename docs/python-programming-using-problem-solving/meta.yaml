  - '[PAGE 540]


    | Argument | Explanation |

    | --- | --- |

    | x | **Data:** Array or sequence of arrays |

    | bins | It is an integer, which represents the number of equal-width bins. However,
    it can also be a sequence, in which case this represents the width of different
    bins. |

    | histtype | This argument can have one of the following values.<br>It is an optional
    parameter, and its default value is “bar.”<br>- bar: This creates a bar-type histogram.
    If any arguments are passed, bars are created side by side.<br>- step: This argument
    creates a lineplot. By default, such histograms are not filled.<br>- stepfilled:
    This argument creates a lineplot, which is filled.<br>- barstacked: This argument
    helps us to create histograms stacked on one another. |

    | align | This argument controls how the histogram is placed. The possible values
    of this argument are:<br>- left: This argument centers the bars to the left,<br>-
    mid: This argument centers the bars between the edges and<br>- right: This argument
    centers the bars to the right of the edges. |

    | orientation | It is an optional argument, and the default value is “mid.”<br>This
    argument orients the bars along with the vertical or horizontal orientation. This
    argument is optional, and the default value of this argument is vertical. |

    | color | This argument represents the color or array-like of colors or None.
    It is an optional argument. And the default value of this argument is None. |

    | Stacked | It is a Boolean argument. If the value of this argument is True, then
    multiple bars are stacked on top of each other. If the value of this argument
    is False, then multiple bars are arranged side by side if histtype is “bar” or
    on top of each other if histtype is “step” |


    This method returns the following attributes (Table 19.3):


    # TABLE 19.3 The Attributes of the hist method.


    | Attribute | Explanation |

    | --- | --- |

    | narray or list of arrays | This array (or list of arrays) shows the values of
    the histogram bins. |

    | binsarray | As per the official documentation this attribute represents, “The
    edges of the bins. Length nbins + 1 (nbins left edges and right edge of the last
    bin).” |

    | patcheslist or list of lists | As per the official documentation this attribute
    represents a “Silent list of individual patches used to create the histogram or
    lists of such list if multiple input datasets.” |


