    +   - **Inheritance:** Inheritance is the process of creating subclasses from
    existing classes.

    - **Base class and derived class:** The class from which other classes are derived
    is the base class and the classes that inherit from the base class are the derived
    classes.

    - **Implicit inheritance:** In this type, the method of the base class can be
    called using an instance of the derived class.

    - **Explicit overriding:** In this type of inheritance, the derived class redefines
    the method of the base class and calling this method using an instance of the
    derived class invokes the method of the derived class.


    # POINTS TO REMEMBER


    +   - Inheritance provides reusability and increased reliability.

    - Types of inheritance are Simple Inheritance, Multiple Inheritance, Multilevel
    Inheritance, Hierarchical Inheritance, and Hybrid Inheritance.

    - Multiple inheritance may lead to ambiguity.

    - A bound method has a “self” parameter whereas an unbound method does not have
    “self” parameter.

    - A class can also be instantiated in another class.

    - **super** can be used to access the base class methods.

    - The inheritance tree is searched to find the version of the method to be invoked.


