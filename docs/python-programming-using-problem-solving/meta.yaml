  mdcn: "## 将一个文件的内容复制到另一个文件\n\n要将一个文件的内容复制到另一个文件，第一个文件以读模式打开，第二个文件以写模式打开。然后，第一个文件的行被逐行读取（使用\
    \ `read` 函数）并写入另一个文件（使用 `write` 函数）。程序如下所示。\n\n### 示例 7.7：\n\n将一个文件的内容复制到另一个文件。\n\
    \n### 解答：\n\n### 代码：\n\n```python\nf1=open('source.txt','r')\nf2=open('dest.txt','w')\n\
    char=f1.read()\nprint(char)\nf2.write(char)\nf1.close()\nf2.close()\n```\n\n###\
    \ 示例 7.8：\n\n编写一个程序来计算文件中的单词数量。\n\n### 解答：\n\n文件中的单词数量可以通过初始化 `n`（=1）并逐行读取，将行分割成单词并依次递增\
    \ **n** 的值来计算。\n\n### 代码：\n\n```python\nfname = 'source.txt'\nn = 0\nwith open(fname,\
