    ## 3.10.5 Logical Operators


    The logical operators like **or** and **and** have been discussed in detail in
    the chapter on Boolean Algebra. The **or** operator returns **TRUE** if any of
    the inputs are **TRUE**. The **and** operator returns a **TRUE** if both the inputs
    are **TRUE**. The **not** operator negates the value. The **xor** operator returns
    a **TRUE** if the inputs are alternate. The truth tables of the various operators
    follow (Tables 3.5 to 3.8). The following code illustrates the usage of binary
    logical operators. The following code creates two variables **num1** and **num2**.
    The value stored in **num1** is 0b101101 (note that the preceding value by 0b
    results in a binary number), and that stored in **num2** is 0b110110. The statement
    **num3=num1 & num2** assigns 0b100100 to **num3**. The statement **num1 ^ num2**
    takes the bitwise **xor** of **num1** and **num2** and stores the resultant number
    in **num5**. The statement **~num1** takes the bitwise **not** of **num1** and
    stores the resultant number in **num6**.


    **TABLE 3.5** Truth table of **AND**.


    | A | B | A and B |

    |---|---|---|

    | False | False | False |

    | False | True | False |

    | True | False | False |

    | True | True | True |


    **TABLE 3.6** Truth table of **OR**.


    | A | B | A or B |

    |---|---|---|

    | False | False | False |

    | False | True | True |

    | True | False | True |

    | True | True | True |


    **TABLE 3.7** Truth table of **NOT**.


    | A | not A |

    |---|---|

    | False | True |

    | True | False |


    **TABLE 3.8** Truth table of **XOR**.


    | A | B | A xor B |

    |---|---|---|

    | False | False | False |

    | False | True | True |

    | True | False | True |

    | True | True | False |


    **Code:**


    ```

    num1= 0b101101

    num2= 0b110110

    num3= num1&num2

    num4= num1|num2

    num5= num1^num2

    num6= ~num1

    print(bin(num3))

    print(bin(num4))

    print(bin(num5))

    print(bin(num6))

    ```


    **Output:**


    ```

    0b100100

    0b111111

    0b11011

    -0b101110

    ```


