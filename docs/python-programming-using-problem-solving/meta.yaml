- md: "## CHAPTER 8\n\n## LISTS, TUPLE, AND DICTIONARY\n\n### Objectives\n\nAfter\
    \ reading this chapter, the reader should be able to\n\n- Understand the difference\
    \ between list, tuple, and dictionary\n- Understand slicing and indexing\n- Understand\
    \ strings in Python\n- Understand the in-built functions of list, tuple, dictionaries\n\
    \n## 8.1 INTRODUCTION\n\nPython provides us with lists, tuples, and dictionaries,\
    \ all of which have become synonym with ease of programming and can be used in\
    \ diverse applications. In Python, a list can contain different types of elements\
    \ and is mutable whereas a tuple can contain different types of elements and is\
    \ immutable. In a dictionary, the items can be accessed using strings as indices\
    \ (Figure 8.1).\n\nDictionaries are collections in which each value is associated\
    \ with a key. This key-value pair constitutes an item in a dictionary. In order\
    \ to understand the idea, consider the following example. In the 1980s, the phone\
    \ numbers of the people in a city could be found using a telephone directory.\
    \ The directory had phone numbers of people of the city in the lexicographic order\
    \ (of names). So, using one’s name, their phone number could be found. That is,\
    \ the index of value (phone number in this case) was the name of the person. Python\
    \ dictionary uses the same idea. However, a directory could have a name twice\
    \ but in a dictionary each key is unique.\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_208_0.png)\n\
    \n**FIGURE 8.1** Lists, tuples, and dictionaries.\n\nThe following chapter discusses\
    \ strings. Strings are the sequence of characters. These data structures are used\
    \ to store text. For example, if one wants to store the name of a person, or for\
    \ that matter, his address, then strings are the most appropriate data structures.\
    \ As a matter of fact, the knowledge of strings is essential in the development\
    \ of many applications like word processors and parser.\n\nThis chapter has been\
    \ organized as follows. The second section discusses lists, the third discusses\
    \ tuples and the next section discusses dictionaries. The last section concludes.\n\
    \n## 8.2 LISTS\n\nIn Python, a list is a sequence object. A list can be an empty\
    \ list ([]) It may contain any number of elements, which may or may not be of\
    \ the same type. Also, a list can contain different types of elements, including\
    \ a list. Moreover, a list inherits many properties of a string. However, unlike\
    \ strings, they are mutable and may also contain different types of elements.\n\
    \nIn the following snippet, **L1** is an empty list, **L2** contains 2, 4, 8,\
    \ 16, 32, and 64. **L3** contains an integer (2), a string (“Harsh”), another\
    \ integer (3), another string (“Manan”), a double (4.7865), and another string\
    \ (“Ali”). **L4** is a list of lists. It contains three lists, each containing\
    \ different number of elements.\n\n### Code: Creation\n\n```\n#Empty List\nL1=[]\n\
    #Homogeneous list\nL2=[2,4,8,16,32,64]\n#Heterogenous list\nL3=[2, 'Harsh', 3,'Manan',\
    \ 4.7865,'Ali']\n#List of Lists\nL4=[[1,2],[2,4,8],[3,9,27,81]]\nprint('First\
    \ List',L1,'\\nSecond List',L2,'\\nThird List',L3)\n```\n\n### Output:\n\nFirst\
    \ List []\nSecond List [2, 4, 8, 16, 32, 64]\nThird List [2, 'Harsh', 3, 'Manan',\
    \ 4.7865, 'Ali']\n\n### 8.2.1 Accessing Elements: Indexing and Slicing\n\nThe\
    \ elements of a list can be accessed using indexing. The index of the first element\
    \ of the list is 0, that of the second element is 1, and so on. The negative index\
    \ denotes the elements from the end. For example, **L[-1]** denotes the last element\
    \ of the list **L**, likewise, **L[-2]** denotes the second last element of a\
    \ list (Figure 8.2).\n\n```\nL = [1, 21, 5, 7, 9, 11]\nL[0] is 1\nL[-1] is 11\n\
