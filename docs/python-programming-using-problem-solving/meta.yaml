    \ In order to understand the concept, let us consider five different algorithms\
    \ to solve the same problem. Assume that the number of elements given as input\
    \ to the algorithm is **n**. The first algorithm takes time proportional to **n**\
    \ to accomplish the given task ($O(n)$), the second algorithm takes time proportional\
    \ to **n²** to do the same task ($O(n^2)$), the third takes time proportional\
    \ to **n³** ($O(n^3)$), the fourth takes time proportional to $\\log(n)$ ($O(\\\
    log n)$) and the fifth takes time proportional to $n \\log(n)$, that is $O(n \\\
    log n)$. This implies that, if the number of elements doubles, the time taken\
    \ to accomplish the given task by the first algorithm would double, by the second\
    \ algorithm would be four times, the third algorithm eight times, and the increase\
    \ in time of the fourth would be less than the increase in the first and the increase\
