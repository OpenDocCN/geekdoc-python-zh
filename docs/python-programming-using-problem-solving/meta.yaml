    used for writing algorithms, in this book. The algorithm can also be represented
    as a flow chart as shown in [Figure 1.1](#figure-1.1). Pseudocode and flow chart
    are the two most commonly used ways of representing an algorithm. The third way
    of writing an algorithm can be English-like. However, this is not preferred, as
    it can be ambiguous.


