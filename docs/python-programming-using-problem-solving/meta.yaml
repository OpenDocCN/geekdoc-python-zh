    # 8.2.1 Accessing Elements: Indexing and Slicing


    The elements of a list can be accessed using indexing. The index of the first
    element of the list is 0, that of the second element is 1, and so on. The negative
    index denotes the elements from the end. For example, **L[-1]** denotes the last
    element of the list **L**, likewise, **L[-2]** denotes the second last element
    of a list (Figure 8.2).


    ```

    L = [1, 21, 5, 7, 9, 11]

    L[0] is 1

    L[-1] is 11

    L[3] is 7

    ```


