  md: 'The integer is a predefined type. Most of the languages also allow users to
    create custom types and hence extend the power of built-in types. This is essential
    as the ability to create new data types would help us to create programs which
    are near to the real world. For example, if one has to design an inventory management
    system, a type called “item” would make the matters uncomplicated. This “item”
    can have variables which are of predefined types like integers and strings.


    A new type can be created by declaring a class. A class may have many components,
    the most important of which are the attributes and its functions. This clubbing
    together of functions and data forms the basis of OOP. The functions, as we will
    see later, generally, manipulate the data members of a class. Before proceeding
    any further let us have an overview of attributes and functions.


    # 11.3 ATTRIBUTES AND FUNCTIONS


    One can perceive a class as a prototype and an object as an instance of a class.
    For example, “movie” is a class and “The Fault in Our Stars,” “Love Actually,”
    and “Sarat” are objects (Figure 11.2). A class has attributes and behavior. The
    attributes, generally, store data and the behavior is implemented using functions.
    A class can be depicted using a class diagram. A class diagram has, generally,
    three parts, the first part contains the name, the second part has attributes,
    and the third part shows the functions of a class. The basics of attributes and
    behavior have been discussed in the following section. In Figure 11.2, the class
    diagram (Movie) has only the name.'
