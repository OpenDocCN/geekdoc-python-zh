    mode. In the read mode (“r”), the file is opened, if it exists. The write mode
    (“w”) opens the file for writing. If the file already exists, the existing contents
    of the file are truncated. The append mode(“a”) opens the file for writing but
    does not truncate the existing contents. In this mode, if the file does not exist,
