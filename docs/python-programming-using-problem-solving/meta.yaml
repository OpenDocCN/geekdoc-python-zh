    \ program to check how many numeric strings are there in the tokens obtained in\
    \ question 6.\n\n# CHAPTER 9\n\n## ITERATIONS, GENERATORS, AND COMPREHENSIONS\n\
    \n### Objectives\n\nAfter reading this chapter, the reader should be able to\n\
    \n- Understand the use and application of iterators\n- Use iterators to produce\
    \ sequences\n- Use generators to generate sequences\n- Understand and use list\
    \ comprehensions\n\n### 9.1 INTRODUCTION\n\nPython is powerful due to the presence\
    \ of lists, strings, tuples, dictionary, and files. However, one should be able\
    \ to efficiently access and manipulate the elements of these objects to accomplish\
    \ a given task. Though, **for** loop can be used to access and manipulate the\
    \ elements of these objects, Python comes with better option namely iterators.\
    \ Iterators help us to achieve the said goal efficiently and effectively. One\
    \ can also define an iterable object, in Python. Generators, in Python, facilitates\
    \ the dynamic generation of lists and sequences. This chapter also introduces\
    \ comprehensions, which provide an elegant way to craft lists, tuples, and sets.\n\
    \nThe chapter has been organized as follows. The second section of this chapter\
    \ revisits **for**. The iterators have been introduced in the third section of\
    \ this chapter. The fourth section explains how to define an iterable object.\
    \ The generators have been introduced and explained in the fifth section of this\
    \ chapter. The sixth section of this chapter deals with the comprehensions.\n\n\
    The chapter assumes importance as it forms the foundation of many of the difficult\
    \ tasks presented in the following chapters. Also, the knowledge of these would\
    \ make the day to day tasks easy and spare the programmer from the horror of writing\
    \ longer codes.\n\n### 9.2 THE POWER OF “FOR”\n\nA **for** loop can be used to\
    \ iterate through a list, tuple, string, or a dictionary. This section gives a\
    \ brief description of the **for** loop for the above iterable objects. Let us\
    \ start with the syntax of **for**. Note that, in the following code, an element\
    \ from L is extracted one by one and, in each iteration, i stores the object.\n\
    \n**Syntax:**\n\n```\nfor i in L:\n    #do something\n```\n\nL is list, string,\
    \ tuple or dictionary\n\nWhen one writes “**i in L**,” where **L** is a list,\
    \ **i** points to the first element of the list and as the iteration progresses,\
    \ **i** points to the second element, the third element, and so on. These elements\
    \ can be, then, independently manipulated. The concept has been exemplified in\
    \ Illustration 9.1. The illustration shows the manipulation of a list using the\
    \ **for** loop. In the illustration, the given list contains a set of numbers,\
    \ some of them positive and some negative. The negative numbers are appended to\
    \ a list called **N**, whereas the positive numbers are appended in a list called\
    \ **P**.\n\n**Illustration 9.1:**\n\n*From a given list, put all the positive\
    \ numbers in one list and negative numbers in the other list.*\n\n**Solution:**\n\
    \nCreate two lists **P** and **N**. Initialize both of them to []. Now check each\
    \ number in the list. If the number is positive, put it in P and if the number\
    \ is negative put it in N.\n\n**Program:**\n\n```\nL= [1, 2, 5, 7, -1, 3, -6,\
    \ 7]\nP=[]\nN=[]\nfor num in L:\n    if(num>0):\n        P.append(num)\n    elif\
    \ (num<0):\n        N.append(num)\nprint('The list of positive numbers \\t:',P)\n\
    print('The list of negative numbers \\t:',N)\n>>>\n```\n\n**Output:**\n\n```\n\
    The list of positive numbers : [1, 2, 5, 7, 3, 7]\nThe list of negative numbers\
    \ : [-1, -6]\n>>>\n```\n\nA **for** loop can also be used to manipulate strings.\
    \ When one writes “**i in str,**” where **str** is a string, **i** points to the\
    \ first character of the string and as the iteration progresses, **i** points\
    \ to the second character, the third character and so on. These characters can\
    \ be, then, independently manipulated. The concept has been exemplified in Illustration\
    \ 9.2.\n\n**Illustration 9.2:**\n\n*Ask the user to enter a string and put all\
    \ the vowels of the string in one string and the consonants in the other string.*\n\
    \n**Solution:**\n\nCreate two strings: **str1** and **str2**. Initialize both\
