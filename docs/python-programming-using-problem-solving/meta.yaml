    - Appreciate the features of a **Boxplot**\n- Plot a **Histogram**\n- Plot **Pie\
    \ Charts**\n\n## 19.1 INTRODUCTION\n\nThe importance of visualization has already\
    \ been discussed in the last chapter. This chapter takes the discussion forward\
    \ and introduces some more methods of visualization.\n\nThis chapter has been\
    \ organized as follows. The second section presents an overview of the box plots,\
    \ the third section discusses histograms and frequency plots. The fourth section\
    \ presents a discussion on the pie charts. The last section concludes.\n\n## 19.2\
    \ BOX PLOT\n\nThe **Box Plot** of data shows the minimum value of the input, the\
    \ first quartile, the median, the third quartile, and the maximum value. There\
    \ is a box spanning from the first quartile to the third quartile of the data.\n\
    \nThe points at the beginning and the ends show the minimum and the maximum value\
    \ of the input. The beginning of the box indicates the position of the first quartile\
    \ and the end of the box indicates the position of the third quartile. The line\
    \ in the middle indicates the median of the data. Figure 19.1 shows the structure\
    \ of the box plot.\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_535_0.png)\n\n\
    The **boxplot** method of the **matplotlib.pyplot** package helps us to plot a\
    \ **Box Plot**. This method takes the following parameters (Table 19.1).\n\n**TABLE\
    \ 19.1** Arguments of the boxplot method.\n\n| Argument | Data Type | Explanation\
    \ |\n| :--- | :--- | :--- |\n| x | Array or a Sequence of vectors | This parameter\
    \ presents the input data. |\n| notch | bool | This is an optional parameter.\
    \ The default value of this parameter is **False**. If the value of this parameter\
    \ is **True**, a notched box plot is produced. It represents the Confidence Interval\
    \ around the median. |\n| vert | bool | If this parameter is **True**, the plots\
    \ are drawn vertically; if **False**, the plots are horizontal. |\n\nThis method\
    \ returns a **dictionary**. The **dictionary** has the following keys (As per\
    \ the official documentation at https://matplotlib.org/3.1.1/api/_as_gen/matplotlib.pyplot.boxplot.html):\n\
    \n- **boxes**: The quartile’s and median’s confidence intervals.\n- **medians**:\
    \ Lines at the medians of each column of the data.\n- **whiskers**: The lines\
    \ extending to the most extreme, nonoutlier data points.\n- **caps**: The lines\
    \ at the ends of the whiskers.\n- **fliers:** Points representing data that extend\
    \ beyond the whiskers.\n- **means:** Points or lines representing the means.\n\
    \nThe following example shows the **boxplot** of the **Iris** dataset. The dataset\
    \ has 150 samples (rows) and four features (columns). The four features are:\n\
    \n- **sepal length** in cm\n- **sepal width** in cm\n- **petal length** in cm\n\
    - **petal width** in cm\n\nThe following code uses the first 100 samples of the\
    \ data to plot a **boxplot**. Note the **boxplots** of each of the four features\
    \ in [Figure 19.2](#).\n\n**Code:**\n\n```\nfrom sklearn.datasets import load_iris\n\
    Data=load_iris()\nData=Data.data[:100,:]\nplt.boxplot(Data)\n```\n\n**Output:**\n\
    \n![](img/46b778b4f9252bd09c63fc5fba842fc6_536_0.png)\n\n**FIGURE 19.2** The **boxplot**\
    \ of **Iris** data.\n\nHaving seen the **boxplot** of the **Iris** dataset, let\
    \ us have a look at what happens if the value of **showmeans** parameter is passed\
    \ as **True**.\n\n## EXAMPLE 19.1:\n\nThe following code uses the **showmeans\
    \ = True**. The output is shown in [Figure 19.3](Figure 19.3). Observe the indicators\
    \ at the means of each of the **boxplot** (of each feature).\n\n## Code:\n\n```\n\
    plt.boxplot(Data, showmeans=True)\n```\n\n## Output:\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_537_0.png)\n\
    \n**FIGURE 19.3** The **boxplot** of Iris data with **showmeans = true**.\n\n\
    ## 19.3 FREQUENCY PLOTS AND HISTOGRAM\n\nAccording to the **National Institute\
    \ of Standards and Technology (NIST)**, a **Frequency Plot** is a graphical data\
    \ analysis method for summarizing the distributional information of a variable.\
    \ The response variable is divided into equal-sized intervals, called **bins**.\
    \ The **number of occurrences** of the response variable is then calculated for\
    \ each bin.\n\nA **Frequency Plot** consists of:\n\n- **Vertical Axis:** Frequencies\n\
    - **Horizontal axis:** The midpoint of each interval\n\nAs per **NIST**, there\
    \ are four types of **Frequency Plots** ([Figure 19.4](Figure 19.4))"
