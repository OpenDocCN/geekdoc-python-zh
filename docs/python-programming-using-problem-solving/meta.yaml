    # 11.4.4 Data Hiding


    The data hiding, is another important principle of object-oriented programming.
    As stated in the above discussion, the accessibility of data can be governed in
    a class. The data that is accessible all throughout the program is referred to
    as global data. The data private to a class is one that can be accessed only by
    the class members. There are other access specifiers as well, explained in the
    following sections.


    In C++, for example, the data in a class is generally kept private. That is, only
    the member functions of the class can access the data. This ensures that the data
    is not accidentally changed. The functions, on the other hand, are public, in
    C++. The public functions can be accessed anywhere in the program (Figure 11.5).
    In C++, JAVA, C#, etc., there is another access specifier, which is protected.
    If a member is to be accessed in the class and its derived class, then protected
    specifier is used. C# and JAVA also have some other specifiers like internal.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_286_0.png)


    **FIGURE 11.5** Access specifiers public and private.


    Having stated the above convention, it must be clarified that deciding what is
    private and what is public is the discretion of the design and development team
    of the project. There is no hard and fast rule so as to what should be private
    and what should be public. The designers must decide on the accessibility of a
    member based on their needs.


    This protection of data is not related to the security of data but to accidental
    change. This is needed so that the data can be changed only via'
