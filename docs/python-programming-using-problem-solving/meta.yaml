  md: 'Slicing can be used to find the subset of a **numpy-array**. For a 1-D array,
    arr


    +   - arr[:k] generates an array consisting of elements from indices 0 to (k-1).

    - arr[k:] generates an array consisting of elements from indices k to the last
    element.

    - arr[k:m] generates an array consisting of elements from indices k to that at
    index (m-1).

    - arr[k:-1] generates an array consisting of elements from indices k to the second
    last.

    - arr[-k:-m] generates an array consisting of elements from the k<sup>th</sup>
    last to (m-1)<sup>th</sup> last.


    Table 16.3 shows slicing in 1D arrays.


    # **TABLE 16.3** Slicing in 1D numpy arrays.


    | Array | Output if the input is arr1 |

    | :--- | :--- |

    | arr1 | [36 18 44 50 27 59 17 63 72 20] |

    | arr1[:3] | array([36, 18, 44]) |

    | arr1[3:] | array([50, 27, 59, 17, 63, 72, 20]) |

    | arr1[2:7] | array([44, 50, 27, 59, 17]) |

    | arr1[3:-1] | array([50, 27, 59, 17, 63, 72]) |

    | arr1[-5:-1] | array([59, 17, 63, 72]) |


    Slicing in a 2D array creates a subarray. To understand the above concept, refer
