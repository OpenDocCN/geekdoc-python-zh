    \ and **c2** of a class called **Complex**, **c1+c2** invokes the **__add__**\
    \ method. Similarly, the – operator would invoke the **__sub__** method, the *\
    \ operator would invoke the **__mul__** method and so on. Table 14.1 shows the\
    \ methods and the operator due to which the method is invoked.\n\nTABLE 14.1 Methods\
    \ for overloading binary operators.\n\n| Task | Method | Explanation |\n| :---\
