    \ represented by big omega, that is, Ω(). The upper bound would be henceforth\
    \ represented by big Oh, that is, O(). The formal definition of the two follows.\n\
    \n## Big O: O()\n\nThe worst-case behavior of an algorithm is depicted by the\
