    **FIGURE 8.2** Indexing in Python Lists. Note that **L[0]** denotes the first
    element, **L[1]** denotes the second element and **L[-1]** (that is **L[5]**)
    denotes the last element.


    Slicing is generally used to take out a sublist from a given list. In the above
    case


    **L[:2]** is a sublist having all the elements of **L** starting from the first
    element till the element at the first index (not the element at index 2) that
    is [1, 3].


    **L[2:]** is a sublist having all the elements of **L** starting from the element
    at the second index till the last element that is [5, 7, 9 , 11].'
