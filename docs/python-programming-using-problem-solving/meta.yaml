    **Visualization** helps us to understand the given data. It is important as it
    provides an insight into the results and may help uncover the underlying patterns.
    Moreover, the growing importance of data analytics and Machine Learning has exponentially
    enhanced the value of **Visualization**. Figure 18.1 shows the advantages of Visualization.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_501_0.png)


    **FIGURE 18.1** Visualization.


    This chapter discusses the **pyplot** module of the **matplotlib** package for
