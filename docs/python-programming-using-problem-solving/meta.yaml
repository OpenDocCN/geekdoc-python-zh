    \            {\n                Print(\"Item found at \",i);\n               \
    \ Flag=1;\n            }\n        i++;\n    }\nif(Flag==0)\n    {\n        Print(\"\
    Not found\");\n    }\n}\n```\n\n# **Linear Search: Flow Chart**"
