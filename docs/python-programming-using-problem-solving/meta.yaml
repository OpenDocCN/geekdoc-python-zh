    # 1.8 CONCLUSION


    Algorithms are the set of steps used to accomplish a given task, efficiently and
    effectively. An algorithm must be definite, and each instruction should be unambiguous.
    There are many ways of representing the steps to accomplish the given task: by
    simply writing the instruction in English, by drawing the flowchart, or by writing
    the pseudocode. An algorithm must generate at least one output. Moreover, a good
    algorithm should be efficient both in terms of memory and computation time. The
    asymptotic complexity helps us to ascertain the efficiency of an algorithm. Problem-solving
    using algorithms is an involved process and requires due deliberation and intricate
    analysis. Some algorithms like linear search, binary search, etc., have been presented
    in this chapter. Readers, new to programming, may find it difficult to get hold
    of some of the procedures presented in this chapter. However, they should cover
    the procedural programming presented in Section II of this book and revisit this
    chapter. This chapter is a door to the fascinating world of problem-solving and
    Python would be your friend in this long journey. So, let us meet our new friend
    “Python” in the next chapter.


    # GLOSSARY


    **Algorithm:** Set of steps written to accomplish a given computing task.'
