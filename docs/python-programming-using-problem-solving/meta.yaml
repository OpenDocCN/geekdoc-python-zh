    \nIn using “if” and “while,” the programmer checks the condition passed in “if”\
    \ or “while.” If the condition is true, the block following “if” or “while” is\
    \ executed, otherwise it is not executed. We can also define the Boolean operators\
    \ for a user defined object. In order to accomplish this task, the programmer\
    \ would require some method that helps in the overloading. Python provides two\
    \ Boolean operators __bool__ and __len__. The __bool__ method returns a true if\
    \ the requisite condition is met, otherwise it returns a false. The __len__ method\
    \ finds the length of the data member and returns false if it is null. The Boolean\
    \ condition can be checked using the __len__ method, only if the __bool__ for\
    \ that class is not defined. In case both __len__ and __bool__ are defined in\
    \ a class, __bool__ takes precedence over __len__."
