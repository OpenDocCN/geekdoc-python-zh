    # 11.4.7 Reusability


    The procedural programming came with almost no reusability. Modular programming
    allowed reusability but only to a certain extent. The functions could be used
    on as it is basis of modular programming. In OOP, the concept of reusability could
    be used in its full force. The concept of inheritance, introduced above and explained
    in [Chapter 13](Chapter 13) of this book, helps the programmer to reuse a code
    as per the requirement and that to the relevant part. As a matter of fact, reusability
    is one of the USPs of the object-oriented paradigm.


    # 11.5 CONCLUSION


    While designing software, one must keep in mind the entities he is going to work
    on. The nitty-gritty can be decided at a later stage. As a matter of fact, the
    popular literature does not consider the details of the operation as a matter
    of concern for the OOP. Hiding unnecessary details is, therefore, an important
    part of OOP.


    For example, in developing the website for movies, the entity central to the problem
    is “Movie.” So, one starts with an empty class called “movie.” The designer must
    then decide on the attributes needed to implement the functions. The attributes
    constitute the data members of the said class. This is followed by the decision
    regarding the implementation details of the behavior of the class. The functions
    are then designed for this purpose. Finally, the things like inheritance and polymorphism,
    discussed later, come into play.'
