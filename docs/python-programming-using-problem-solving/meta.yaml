    # 12.1 INTRODUCTION TO CLASSES


    A class is a real or a virtual entity, having importance to the problem at hand
    and sharp physical boundaries. The concept of classes has been discussed in the
    previous chapter. This chapter takes the discussion forward and explores the issues
    involved in the implementation. It is easier to make a class in Python as compared
    to other programming languages. A class, in Python, can hold any kind and any
    amount of data. Those with C++ background might find the syntax and use of variables
    odd. The mechanism of classes in Python is inspired not just by C++ but also by
    Modula-3.


    A class in Python can be **subclassed**. All types of inheritance including **multiple
    inheritance** are supported in Python. **Method overriding** is also allowed in
    Python. The dynamic nature of classes makes Python stand apart from other languages.
    Classes can be created at runtime.'
