    \ by 1). The following program implements the logic.\n\n### Program:\n\n```\n\
    a = int(input('Enter the first number'))\nb = int(input('Enter the second number'))\n\
    power=1\ni = 1\nwhile i<=b:\n    power = power*a\n    i=i+1\nelse:\n    print(str(a)+'to\
