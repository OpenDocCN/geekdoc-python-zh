    However, some problems like the in-order, the pre-order, and the post-order traversals
    of trees; the Depth First Search and Breadth First Search of graphs; binary search,
    Quicksort and Merge sort, etc., can be easily solved using recursion. It may be
    stated here that a problem that can be solved using recursion can also be solved
    iteratively.


    Recursion uses run-time-stack, which provides a Last-In-First-Out access. In order
    to understand this, let us consider the example of calculating factorial using
    recursion. The factorial of a number can be calculated using the following formula.


    $$fac(n) = n * fac(n - 1)$$

    $$fac(1) = 1$$


    Evaluating $fac(3)$ would require multiplying $fac(2)$ with 3. The evaluation
    of $fac(2)$ would require multiplying $fac(1)$ with 2. The value of $fac(1)$ is
    1. So, in the above example, $fac(3)$ calls $fac(2)$ which calls $fac(1)$.'
