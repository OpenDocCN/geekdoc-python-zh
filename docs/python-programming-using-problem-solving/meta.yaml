    ## 11.4 ELEMENTS OF OBJECT-ORIENTED PROGRAMMING


    The following discussion briefly outlines the elements of OOP. The concepts like
    encapsulation, data hiding, and polymorphism have been discussed in this section.
    Even if things appear a bit abstract at this stage, the reader is advised not
    to skip the section.


    ### 11.4.1 Class


    A class is a real or a virtual entity, having importance to a problem at hand
    and having sharp physical boundaries. A class can be a real entity. For example,
    when one develops software for a car wash company, then “Car,” is central to the
    software, and hence, there would be a class called “Car.” A class can also be
    a virtual entity; for example, in developing a student management system, a “student”
    class is crafted, which is a virtual entity. In both examples, the entity is crafted
    as it is important to the problem at hand.


    The example of the “student” class can be taken further. The class would have
    attributes which are needed in the program. The selection of attributes would
    decide the physical boundaries of the class. Note that we would not need unnecessary
    details like the number of cars a student has or where he went last evening. This
    is because there is no point in storing those details for an educational institute
    for which we are making the student management system.


    Examples of some of the classes that are central to the stated software are as
    follows (Table 11.1).


    **TABLE 11.1** Examples of classes central to various systems.


    | System | Class central to the software |

    | :--- | :--- |

    | Student management system | Student |

    | Employee management system | Employee |

    | Inventory control | Item |

    | Library management | Book |

    | Movie review | Movie |

    | Airline management | Flight |

    | Examination | Test |


    ### 11.4.2 Object


    Consider a student management system, which stores the data of each student of
    a school. Note that the operator would deal with an individual student, not a
    student’s idea, while entering the data. Thus, class depicts the idea of a student,
    and the objects denote the individual students.


    An object is an instance of a class. The objects interact with each other and
    get the work done. Generally, a class can have any number of objects. One can
    even form an array of Objects. The example “movie” had “m” as an object. As a
    matter of fact, we make an object and call the methods of a class (those which
    can be called).


    In object-oriented paradigm, the program revolves around an object and therefore
    the type of programming is termed as object-oriented program. Calling a method
    of an object is equivalent to sending message to an object.


    ### 11.4.3 Encapsulation


    The class is an entity, which has both data and functions. The clubbing together
    of the data and the functions that operate on the data is called encapsulation.
    Encapsulation, as a matter of fact, is one of the core principles of Object-Oriented
    Paradigm. Encapsulation not only makes it easier to handle objects but also improves
    the manageability of the Software.


    Moreover, the functions in a class can be used in a variety of ways. For example,
    the accessibility of data members and member functions can also be managed, using
    access specifiers, as explained in the following subsection.


    ### 11.4.4 Data Hiding


    The data hiding, is another important principle of object-oriented programming.
    As stated in the above discussion, the accessibility of data can be governed in
    a class. The data that is accessible all throughout the program is referred to
    as global data. The data private to a class is one that can be accessed only by
    the class members. There are other access specifiers as well, explained in the
    following sections.


    In C++, for example, the data in a class is generally kept private. That is, only
    the member functions of the class can access the data. This ensures that the data
    is not accidentally changed. The functions, on the other hand, are public, in
    C++. The public functions can be accessed anywhere in the program (Figure 11.5).
    In C++, JAVA, C#, etc., there is another access specifier, which is protected.
    If a member is to be accessed in the class and its derived class, then protected
    specifier is used. C# and JAVA also have some other specifiers like internal.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_286_0.png)


    **FIGURE 11.5** Access specifiers public and private.


    Having stated the above convention, it must be clarified that deciding what is
    private and what is public is the discretion of the design and development team
    of the project. There is no hard and fast rule so as to what should be private
    and what should be public. The designers must decide on the accessibility of a
    member based on their needs.


    This protection of data is not related to the security of data but to accidental
    change. This is needed so that the data can be changed only via the functions
    which have the authority to change data.


    ### 11.4.5 Inheritance


    Classes are made so that they can be subclassed. This art of creating subclass(es)
    is called inheritance. For example, the movie class can be subclassed into various
    classes like art_movie, commercial_movie etc. Likewise, the student class can
    be subclassed into “regular student” and “part_time_student.” In both examples,
    the subclass has many things in common in the base class (class from which the
    class has been derived). In addition, each subclass can have functions and data
    which belong to the subclass only.


    For example, the student class can have attributes, namely name, date_of_birth,
    address, etc. The regular subclass student will use all the above data members
    and can also have an attribute like attendance associated with it. The class from
    which classes are subclassed would be called the base class, and the subclasses
    would be called derived classes.


    For example, in Figure 11.6, the movie is the base class, and commercial_movie
    and art_movie are the derived classes.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_287_0.png)


    **FIGURE 11.6** Deriving classes from other classes is inheritance. There are
    many types of inheritance. This figure shows hierarchical inheritance.


    ### 11.4.6 Polymorphism


    Poly means many and morphism means forms, so polymorphism means many forms. Polymorphism
    can be implemented in many ways. One of the simplest examples of polymorphism
    is operator overloading. Operator overloading, in general, means using the same
    operator in more than one way. For example, “+” is used between integers to add,
    with strings for concatenation, and even can be used with user-defined data types,
    as explained in Chapter 17 of this book.


    Likewise, function overloading means having more than one function with the same
    name, in a class, with different arguments. Various forms of polymorphism are
    explained in [Chapter 16](Chapter 16) of this book.


    ### 11.4.7 Reusability


    The procedural programming came with almost no reusability. Modular programming
    allowed reusability but only to a certain extent. The functions could be used
    on as it is basis of modular programming. In OOP, the concept of reusability could
    be used in its full force. The concept of inheritance, introduced above and explained
    in [Chapter 13](Chapter 13) of this book, helps the programmer to reuse a code
    as per the requirement and that to the relevant part. As a matter of fact, reusability
    is one of the USPs of the object-oriented paradigm.


    ## 11.5 CONCLUSION


    While designing software, one must keep in mind the entities he is going to work
    on. The nitty-gritty can be decided at a later stage. As a matter of fact, the
    popular literature does not consider the details of the operation as a matter
    of concern for the OOP. Hiding unnecessary details is, therefore, an important
    part of OOP.


    For example, in developing the website for movies, the entity central to the problem
    is “Movie.” So, one starts with an empty class called “movie.” The designer must
    then decide on the attributes needed to implement the functions. The attributes
    constitute the data members of the said class. This is followed by the decision
    regarding the implementation details of the behavior of the class. The functions
    are then designed for this purpose. Finally, the things like inheritance and polymorphism,
    discussed later, come into play.'
