  md: '**Zero-based indexing:** The arrays are zero-based indexed, that is the first
    element can be accessed by writing **arr[0]**, the second by **arr[1]**, and so
    on.


    **Vectors:** A 1-dimensional array is called a vector.


    **Multi-dimensional arrays:** A multi-dimensional array may have more than one
    dimension. For example,


    $$A = \begin{bmatrix} 1 & 2 & 3 \ 4 & 5 & 6 \ 7 & 8 & 9 \end{bmatrix}$$


    is a 2-dimensional array containing three rows and three columns. The element
    at the intersection of the first row and the first column is denoted as $A[0,
    0]$, that at the third row and second column is denoted as $A[2, 1]$, and so on.
    These arrays would henceforth be called matrices (or matrix (singular)).


    **Storage:** The matrices can be stored in one of the following formats:


    *Row major:* In this technique, the first row is stored in the memory, followed
    by the second row, and so on. For example,


    $$A = \begin{bmatrix} 1 & 2 & 3 \ 4 & 5 & 6 \ 7 & 8 & 9 \end{bmatrix}$$


    is stored as


    1, 2, 3, 4, 5, 6, 7, 8, 9


    in the row-major format.


    *Column major:* In this technique, the first column is stored in the memory, followed
    by the second column, and so on. For example,


    $$A = \begin{bmatrix} 1 & 2 & 3 \ 4 & 5 & 6 \ 7 & 8 & 9 \end{bmatrix}$$'
  merge: -1
