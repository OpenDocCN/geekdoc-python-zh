  md: "```\nResult is  : 0.6666666666666666\nException caught:ZeroDivisionError\n\
    >>>\n```\n\n# 15.5 CRAFTING USER DEFINED EXCEPTIONS\n\nSo far, we have seen the\
    \ automatic exception handling capabilities of Python. That is, even if there\
    \ is no **try/except**, Python handles exceptions. The use of **try/except** has\
