  md: 'attributes (data members) and behavior (class methods). However, at times these
    classes must be extended to be able to solve some specific problem without having
    to meddle with the original class. To be able to do so, the language should support
    inheritance. As a matter of fact, the presence of classes in the language is primarily
    because it can be inherited. Inheritance is, as per most of the authors, one of
    the most essential features of Object-Oriented Language.


    Using inheritance one can create new classes (derived classes) from existing class
    (Base Class(es)). Note that a derived class can even have more than one base class,
    referred to as **Multiple Inheritance**, which is one of the most undesirable
    forms of inheritance. Also, a base class can itself be a derived class of some
    other class. The derived class will have all the allowed features of the base
    class plus some futures of its own.


