    The second type is more complex in which the program stops working or behaves\
    \ in an undesirable way while executing. This may be due to:\n\n- incorrect user\
    \ input,\n- inability to open a file,\n- accessing something which the program\
    \ does not have authority to and so on.\n\nThese are referred to as exceptions.\
    \ Exceptions are “Events that modify the flow of the program”[1]. Python invokes\
    \ exception handling mechanism in case of such errors. The exception handling\
    \ can also be invoked by the programmer.\n\nExceptions handling mechanisms are\
    \ used to handle some undesirable situations. So, if something undeniable comes\
    \ up, the control must have a place to go (part of the code), where that situation\
    \ can be handled. To understand the point, consider the following example.\n\n\
    Suppose you intend to design a machine learning technique to identify whether\
    \ a given EEG shows an epileptic spike. You must decide the algorithm, the language,\
    \ the tool etc. However, you are not able to get the data. What will you do? Simply\
    \ abandon the project and go to the exception handling part. That is, an exception\
    \ will occur when situations like the above crop up. Let us consider one of the\
    \ most common examples of exception handling. If one is crafting a program to\
    \ divide two numbers entered by the user, an exception should be raised if the\
    \ denominator entered is zero.\n\nOne of the most common ways of handling exception\
    \ is to craft a block, where one expects exception to occur. If somewhere in that\
    \ block, an exception is raised, the control goes to the part which handles the\
    \ exception. The block where you expect exception to come is the **try** block\
    \ and the part where it will be handled is in the **except** block. The chapter\
    \ discusses some more ways to handle exceptions. However, the readers from C++\
    \ or C# background would be familiar with the above technique and hence would\
    \ find it easy and intuitive. Though Python has a mechanism to handle exceptions,\
    \ the reader should also learn how to create his own classes to handle exceptions.\
    \ Therefore, the reader must revisit the chapter on classes and objects.\n\nException\
    \ handling, in Python, can be done using either of the following.\n\n- try/except\n\
    - try/except/finally\n- raise and\n- assert\n\nThe chapter, though, concentrates\
    \ on the first three. The chapter has been organized as follows. Section 15.2\
    \ discusses the importance and mechanism of Exception Handling, Section 15.3 presents\
    \ some of the most common Exceptions in Python, Section 15.4 summarizes the process\
    \ by taking an example, Section 15.5 presents another example of Exception Handling\
    \ and the last section concludes.\n\n## 15.2 IMPORTANCE AND MECHANISM\n\nException\
    \ handling mechanism can help the programmer to notify something. For example,\
    \ consider the problem discussed in the previous section. You have the EEG of\
    \ the patients, and you want to find the epileptic spike in the EEG. If you are\
    \ not able to find the spike, you can simply raise an exception. This technique\
    \ is better compared to the conventional method of returning an integer code on\
    \ being able to find something (or for that matter, not find something). Likewise,\
    \ on detecting some special case or an unusual condition, an exception can be\
    \ raised.\n\nAt the runtime, if an error crops up, an exception is raised. This\
    \ exception can be handled by the corresponding **except** or can be simply ignored.\
    \ Moreover, if there is no provision to handle the exception, in the code, the\
    \ Pythons’ default error handling mechanism comes into play. As stated earlier,\
    \ on encountering an error condition, the execution is restored after the **try**\
