    # ## 16.9.6 Power


    # ### 16.9.6.1 Using the ** operator


    An array to the power of scalar results in the creation of a matrix in which each
    element is raised to the power of that number.


    For example, if


    $$A = \begin{bmatrix} 2 & 4 & 3 \ 5 & 6 & 8 \ 0 & 1 & 4 \end{bmatrix}$$


    Then, A ** 2 becomes


    $$\begin{bmatrix} 2 & 4 & 3 \ 5 & 6 & 8 \ 0 & 1 & 4 \end{bmatrix} ** 2 = \begin{bmatrix}
    4 & 16 & 9 \ 25 & 36 & 64 \ 0 & 1 & 16 \end{bmatrix}$$


