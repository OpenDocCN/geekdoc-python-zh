    # 1.4 STRATEGIES FOR PROBLEM-SOLVING: RECURSION VERSUS ITERATION


    Algorithms can be recursive or iterative. Recursion is the invocation of a function
    inside that function. In order to develop a code using recursion, one must express
    a function in terms of itself (with reduced values of the parameters) and should
    specify the base condition(s) to serve as the stopping criteria. For example,
    the *nth* Fibonacci term can be expressed as the sum of the (*n*-1)th and (*n*-2)th
    Fibonacci terms. Since, the evaluation of *nth* Fibonacci term requires two previous
    results of evaluation, two base conditions must be specified. The first and the
    second terms of this sequence are 1 and 1. Therefore the function can be written
    as follows.


    $$fib(n) = fib(n-1) + fib(n-2)$$

    $$fib(1) = 1$$

    $$fib(2) = 1$$


    That is, to find the fifth Fibonacci term, we need to find the sum of the fourth
    and the third term. The fourth Fibonacci term can be found by adding the third
    and the second term. The third Fibonacci term can be found by'
