    # 14.3 METHODS FOR OVERLOADING BINARY OPERATORS


    The following methods (Table 14.1) help in overloading the binary operators like
    +, -, *, and /. The operators operate on two operands: **self** and another instance
    of the requisite class. When an operator is used between objects, the corresponding
    methods are invoked. For example, for objects **c1** and **c2** of a class called
    **Complex**, **c1+c2** invokes the **__add__** method. Similarly, the – operator
    would invoke the **__sub__** method, the * operator would invoke the **__mul__**
    method and so on. Table 14.1 shows the methods and the operator due to which the
    method is invoked.


    TABLE 14.1 Methods for overloading binary operators.


    | Task | Method | Explanation |

    | :--- | :--- | :--- |

    | Addition | __add__ | Helps in overloading the + operator. Generally, takes two
    arguments: The positional parameter and the instance to be added. |

    | Subtraction | __sub__ | Helps in overloading the – operator. Generally, takes
    two arguments: The positional parameter and the instance to be subtracted. |

    | Multiplication | __mul__ | Helps in overloading the * operator. Generally, takes
    two arguments: The positional parameter and the instance to be multiplied. |

    | Division | __truediv__ | Helps in overloading the / operator. Generally, takes
    two arguments: The positional parameter and the instance to be divided. |


    The use of the above operators has been explained in the following section.


    # 14.4 OVERLOADING BINARY OPERATORS: THE FRACTION EXAMPLE'
