  md: 'easily and intuitively. For example, consider the following series:


    1, 1, 2, 3, 5, 8, 13, ...


    Note that each term of this series is the sum of the previous two terms, the first
    and the second term being 1 and 1, respectively. This series is referred to as
    Fibonacci series. The series is due to the famous rabbit problem, which has been
    described as follows.


    # 6.8.1. Rabbit Problem


    Initially, there is a single pair of rabbits. This pair of rabbits do not breed
    for the first two months, after which they generate a pair of rabbits every month.
    This way, there is a single pair of rabbit for the first two months, after which
    the series become 2, 3, 5, 8, 13, and so on. The formation of the series is depicted
    in Table 6.1. R0 refers to the first pair, R01 refers to the pair generated from
    R0, in the third month. Likewise, R02 is the pair generated from R0 in the fourth
    month.


    TABLE 6.1 Fibonacci series.


    | Month | Pair of rabbits | Number of pair |

    | :--- | :--- | :--- |

    | 1 | R0 | 1 |

    | 2 | R0 | 1 |

    | 3 | R0 -> R01 | 2 |

    | 4 | R0 -> R01, R02 | 3 |

    | 5 | R0 -> R01 (->R010), R02, R03 | 5 |

    | 6 | R0 -> R01 (->R010, R011), R02 (->R020), R03, R04 | 8 |


    Note that in the above series, each term is the sum of the preceding two terms.
    The series can be mathematically represented as follows.


    ```

    $$ \text{fib}(n) = \begin{cases} 1, & \text{for } n = 1 \ 1, & \text{for } n =
    2 \ \text{fib}(n-1) + \text{fib}(n-2) & \end{cases} $$

    ```'
