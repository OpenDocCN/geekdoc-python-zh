    ## 前言


    Python 是一种健壮的、过程式的、面向对象的和函数式的语言。该语言的特性使其在网页开发、游戏和科学编程方面极具价值。最近，该语言变得异常流行。其流行程度可以从它目前被
    *Google*、*YouTube*、*Bit Torrent* 以及许多其他公司使用这一事实中得到衡量。


    本书涉及 Python 中的问题解决和编程。编程是计算机科学的灵魂，设计一个程序需要深入掌握范式，并具备使用标准程序的能力。因此，要成为一名优秀的程序员，不仅要学习语言的语法，还要培养将掌握的概念应用于解决问题的能力。这里可以指出，专业人员学习的编程语言及其语法，除非要实现的算法已经设计良好，否则是没有用的。因此，数据结构和算法的基础知识也是必不可少的。这就是本书第一部分专门用于问题解决的原因。本书最重要的目标之一是让读者理解
    Python 的独特特性。Python 通过 `NumPy` 处理多维数组的能力已被包含在内。Python 还通过 `matplotlib` 帮助进行可视化。该主题也在
    [第 IV 部分](section IV) 中进行了介绍。


