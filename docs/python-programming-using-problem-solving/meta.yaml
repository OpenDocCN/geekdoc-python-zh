    \nFIGURE 17.4 vsplit(arr, <array>).\n\nThe following examples demonstrate the\
    \ use of the above functions for carrying out some assorted tasks.\n\n## Illustration\
    \ 17.7:\n\nGenerate an array of random integers between 5 and 75 having a shape\
