  mdcn: "## 第二部分：面向对象编程\n\n### 类与对象\n\n你需要为一家**洗车**公司开发软件。该公司希望软件能够存储**汽车**的详细信息并生成发票。经过充分讨论，决定创建一个名为**car**的类，包含以下成员。\n\
