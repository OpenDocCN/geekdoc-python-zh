    \ item (press 0 to end)\\n')\n        #print('\\nItem entered \\t:',str(item))\n\
    \    print('\\nList \\n')\n    print(L)\n    findMax(L)\nexcept:\n    print('Run\
    \ time error')\nfinally:\n    print('This is always executed')\n```\n\n**Output\
    \ (first run):**\n\n```\nEnter items (press 0 to end)\n1\nEnter item (press 0\
    \ to end)\n4\nEnter item (press 0 to end)\n2\nEnter item (press 0 to end)\n89\n\
    Enter item (press 0 to end)\n3\nEnter item (press 0 to end)\n0\n\nList\n\n['1',\
    \ '4', '2', '89', '3']\nMaximum  : 89\nThis is always executed\n>>>\n```\n\n**Output\
    \ (second run):**\n\n```\nEnter items (press 0 to end)\n3\nEnter item (press 0\
    \ to end)\n1\nEnter item (press 0 to end)\n7\nEnter item (press 0 to end)\nharsh\n\
    Run time error\nThis is always executed\n>>>\n```\n\n## 15.7 CONCLUSION\n\nThe\
    \ chapter presented a remarkable way to deal with exceptions. Though Python has\
    \ an inbuilt mechanism to deal with exceptions, the knowledge of Exception Handling\
    \ makes programs more effective, user-friendly, and robust. The first step would\
    \ be to identify the part of the code, where exceptions are likely to come, and\
    \ put the part in the **try** block. The exceptions can also be manually caught\
    \ and handled in the **except** block. The **finally** block handles the unhandled\
    \ exceptions and also executes even if there is no exception. The chapter also\
    \ presents some of the most common Exceptions that can be caught in Python. The\
    \ reader should use the concepts learned in this chapter in their programs. Happy\
    \ Programming!\n\n## GLOSSARY\n\n### try/except :Syntax\n\n```\ntry:\n    ##code\
    \ where exception is expected\nexcept<Exception>:\n    ##code to handle the exception\n\
    ## rest of the program\n```\n\n### Manually raising exceptions: Syntax:\n\n```\n\
    try:\n    raise <something>\nexcept<something>:\n    ##code which handles the\
