    \ where **m** is the number of columns. The number of columns can be perceived\
    \ as the number of elements in each row.\n\nThe inner loop has one statement,\
    \ which calculates the element. At the end of each iteration (of the outer loop),\
    \ a new line is printed using the **print()** function.\n\n## Illustration 5.10:\n\
    \nGenerate a $n \\times m$, matrix, wherein each element ($a_{ij}$), is given\
