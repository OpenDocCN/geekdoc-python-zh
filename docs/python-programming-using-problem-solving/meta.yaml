    your moment toward the more important topics.


    **Array:** An array is a group of elements of the same type stored at consecutive
    memory locations. In the following example, the numbers 8, 1, 5, 89, and 45 are
    stored in an array called **arr**.


    ```

    arr = array([8, 1, 5, 89, 45])

    ```


    Note that the elements are of the same type (all of them are integers) and are
    stored at consecutive memory locations.'
