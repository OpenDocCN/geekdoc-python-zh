    # 7.4 PYTHON FUNCTIONS FOR FILE HANDLING


    Python provides various library functions to carry out the standard tasks. The
    functions help us to read from a file, write to a file, and to append something
    in the existing file. Moreover, Python also provides the programmer with functions
    to take the cursor to a particular location, or to read from a given location.


    # 7.4.1. The Essential Ones


    The use of these functions has been briefly explained in this section. The reader
    is expected to experiment with the functions in order to get a clear insight.


    # The read() function


    The function reads bytes in a string. It may take an integer argument indicating
    the number of bytes to read. If the argument is −1, the files must be read to
    the end. Also, if no argument is given, the default is taken as −1.


    TIP!'
  - '[PAGE 188]


    *read() is same as read(-1)*


    If the content of the file is larger than the memory then only the content which
    can fit into the memory would be read. Moreover, when the read operation ends,
    a “(an empty string) is returned.


    # **readline() and readlines()**


    The **readline()** method is used to read a line, till the newline character is
    read. It may be stated here that the newline character is retained in the string
    that is returned. The **readlines()** method reads all the lines from a given
    file and returns a list of strings.


    # **write() and writelines()**


    The **write()** method writes the string in a given file. The method is complementary
    to the **read()** method. The **writelines()** method write a list of strings
    to the file.


    > **TIP!**

    *There is no writeline() method in Python 3.x*


    # **seek()**


    The **seek** function takes the cursor to the stated position in the given file.
    The position is decided with respect to the offset given. The offset can be 0,
    1 or 2. “0” indicates the beginning of the file. The value “1” indicates the current
    position and the value 2 indicates the “end of the file.”


    # **tell()**


    The **tell()** function is complementary to the **seek()** function. The function
    returns the position of the cursor.


    # **close()**


    The **close()** function closes the file. The object should be assigned to another
    file after it is closed. Though Python closes a file after a program finishes
    (see Garbage Collection), it is advisable to close the file when the'
  - '[PAGE 189]


    required task is accomplished. The repercussions of not closing the file can be
    observed at the most unexpected times.


    # fileno()


    The **fileno()** function returns a descriptor for the file. For example, the
    descriptor of the file named “Textfile.txt,” in the following snippet is 3.


    ```

    >>>f=open(''Textfile.txt'')

    >>>f.fileno()

    3

    ```


    # 7.4.2. The OS Methods


    The methods which deal with the issues related to operating system help the programmer
    to create a generic program. The methods also spare the programmer from the horror
    of dealing with the uncanny formatting details. For example, the end of a line
    is represented by different character sets in different operating systems. In
    Unix, a newline is indicated by “\n,” In MAC the newline character is “\r” in
    DOS it is “\r\n.” Similarly, file separator Unix is “/”, whereas that in windows
    is “\” and that in MAC is “:”. There inconsistencies make the life of a programmer
    miserable. This is the reason why a consistent approach is needed to handle such
    situations. Table 7.2 presents the names and functions of some of the most important
    **OS methods**.


