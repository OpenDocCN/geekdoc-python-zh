    A = ABC()\nA.show()\nB = XYZ()\nB.show()\n```\n\n**继承的类修改了基类的方法**，并且在此过程中，在派生类的方法内部也调用了基类的方法。请注意，在下面的代码片段中，派生类的**show**方法打印一条消息，然后调用基类的方法，最后打印另一条消息。请注意，在这种情况下，可以通过用基类的名称限定方法的名称来调用基类的方法。例如，在下面的代码片段中，可以使用**ABC.show(self)**调用基类的**show**方法。**self**参数的重要性已在[第13.3节](section\
