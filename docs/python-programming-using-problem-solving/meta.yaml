    \ parser.\n\nStrings, in Python, can be enclosed in single quotes or double quotes,\
    \ or even in triple quotes. Though, there is no difference between a string enclosed\
    \ in single quotes or double quotes. That is “harsh” is same as “harsh.” Triple\
    \ quotes are generally used in special cases as discussed later in this chapter.\
    \ Strings in Python, come with wide variety of operators and in-build functions.\n\
    \nThe chapter examines various aspects of strings, like nonmutability, traversal,\
    \ operators, and in-build functions. One of the most prominent difference between\
    \ a string and a list is nonmutability. Once a value is given to a string, one\
    \ cannot change the value of a character present at a particular position. For\
    \ the users familiar with “C,” “C++,” “C#,” or “Java,” the operators discussed\
    \ in the chapter, notably * would be a pleasant surprise. Moreover, Python provides\
    \ many build-in functions to help the programmers to handle strings.\n\nThis chapter\
    \ examines the above issues and exemplifies them. The chapter has been organized\
    \ as follows. The second section of the chapter explores the use of standard **for**\
