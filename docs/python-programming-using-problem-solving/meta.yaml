    \ (NIST)** 的定义，**频率图** 是一种图形化数据分析方法，用于总结变量的分布信息。响应变量被划分为大小相等的区间，称为 **组距**。然后计算每个组距内响应变量的\
    \ **出现次数**。\n\n**频率图** 包含：\n\n- **纵轴：** 频率\n- **横轴：** 每个区间的中点\n\n根据 **NIST**，有四种类型的\
    \ **频率图**（[图19.4](#)）"
