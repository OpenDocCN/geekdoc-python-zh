    # 11.4.5 Inheritance


    Classes are made so that they can be subclassed. This art of creating subclass(es)
    is called inheritance. For example, the movie class can be subclassed into various
    classes like art_movie, commercial_movie etc. Likewise, the student class can
    be subclassed into “regular student” and “part_time_student.” In both examples,
    the subclass has many things in common in the base class (class from which the
    class has been derived). In addition, each subclass can have functions and data
    which belong to the subclass only.


    For example, the student class can have attributes, namely name, date_of_birth,
    address, etc. The regular subclass student will use all the above data members
    and can also have an attribute like attendance associated with it. The class from
    which classes are subclassed would be called the base class, and the subclasses
    would be called derived classes.


    For example, in Figure 11.6, the movie is the base class, and commercial_movie
    and art_movie are the derived classes.


