  mdcn: "## 5.5 结论\n\n重复执行任务是一项极其重要的工作。在各种情况下，为了完成不同的任务，都需要这样做。本章介绍了 Python 中两个最重要的循环结构，并通过简单的例子演示了循环结构的使用。循环中包含循环被称为嵌套。本章通过模式和列表的列表解释了循环的嵌套。接下来的章节将简要回顾其中一种结构，并比较迭代器和生成器的使用。读者应尝试解决本章末尾的问题，以加深理解。可以说，Python\
    \ 还提供了其他结构，可以大大简化程序编写。目前，请尝试各种排列组合，观察输出并学习。\n\n## 术语表\n\n1. 循环意味着将一个任务重复执行特定次数。\n\
    2. for 循环的语法\n    for i in range(n):\n        ...\n        ...\n    或\n    for\
    \ i in range(n, m):\n        ...\n        ...\n    或\n    for i in range (_, _,\
    \ ...)\n        ...\n        ...\n        ...\n3. while 循环的语法\n    while <测试条件>:\n\
    \        ...\n\n## 要点回顾\n\n- Python 中的循环可以使用 **while** 和 **for** 来实现。\n- “while”\
    \ 是 Python 中最常见的循环结构。\n- **while** 块中的语句会一直执行，直到测试条件不再为真。\n- 如果循环在没有 break 的情况下结束，则会执行\
    \ else 部分。\n- “for” 可以用于所有 “while” 能使用的场合。\n- “for” 通常用于处理列表、元组、矩阵等。\n- **range**\
    \ (n) 表示从 0 到 (n-1) 的值。\n- **range** (m, n) 表示从 m 到 (n-1) 的所有值。\n- 循环可以嵌套在另一个循环中。\n\
    - 可以有任意层数的嵌套，尽管这并不理想。\n\n## 练习题\n\n### 选择题\n\n1. 以下代码的输出是什么？\n    ```\n    a=8\n\
