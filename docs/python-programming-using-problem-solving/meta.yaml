    - **explode:** This argument gives the offset of each wedge. It is an optional\
    \ argument.\n- **labels:** This argument represents a sequence of strings depicting\
    \ the labels for each wedge. It is an optional argument.\n- **colors:** This argument\
    \ sets the colors of each wedge.\n- **autopct:** It is an optional argument. This\
    \ argument sets the label showing the percentage will be placed inside the wedge.\n\
