    \ should be 4 (if the value of n is 5). In case the value of **i** is 1, the number\
    \ of spaces should be 3 and so on. Also, note that after the inner loop ends,\
    \ a new line is printed using the **print()** function.\n\n## Program:\n\n```\n\
    n = input('Enter the number of rows')\nm = int(n)\nfor i in range(m):\n    for\
    \ j in range(0, (m-i-1)):\n        print(' ', end=\"\")\n    for k in range(0,\
    \ 2*i+1):\n        print('*',end=\"\")\n    print()\n```\n\n## Output:\n\n```\n\
