- md: "## 13.3 METHODS\n\n函数和方法的重要性在本书的第一节中已经阐述过。如前所述，方法只是类中具有特殊位置参数的函数。实际上，方法帮助程序员完成许多任务。方法可以是绑定的或未绑定的。未绑定的方法没有\
    \ **self** 作为参数。这里值得一提的是，在 Python 3.X 中，未绑定的方法与函数相同，而在 Python 2.X 中，它是一种不同的类型。另一方面，绑定的方法在通过类的实例限定访问方法时，将\
    \ **self** 作为第一个位置参数。这里，类的实例不需要被传递。\n\n尽管存在上述差异，但不应忽视两种类型之间的以下相似之处。\n\n- Python\
    \ 中的方法也是一个对象。绑定和未绑定的方法都是对象。\n- 同一个方法既可以作为绑定方法调用，也可以作为未绑定方法调用。\n\n接下来的讨论和说明将阐明第二点。\n\
    \n### 13.3.1 绑定方法\n\n方法可以通过多种方式调用。如果方法的第一个位置参数是 **self**，则它是绑定的。在这种情况下，类的实例可以通过传递必要的参数来调用该方法。\n\
