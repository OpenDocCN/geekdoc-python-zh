    # 18.3 PLOTTING LINES AND CURVES


    This section presents some of the ways to plot lines, curves, and scatter diagrams.
    Note that, in a line plot, the points, passed as an argument to the **plot** functions,
    are joined by straight lines. In the case of a scatter diagram, these points are
    plotted but are not joined by lines. The **plot** function can be used to plot
    both line plots and scatter plots. By default, the function displays a line plot.
    This section discusses the **plot(X)**, **plot(X, Y)**, **plot(<2D array>)** and
    **scatter diagrams**.


    # 18.3.1 Plot(X)


    The **plot** function may take a list (or an array) as its argument and plot the
    values in the list. To understand this, consider the following example, in which
    a list **L=[1, 4, 8, 10]** is passed to the **plot** function. The **xlabel**
    is set to the string **X-Axis** and the **ylabel** is set to **Y-Axis**. The plotted
    figure would be saved as **line.png**. Figure 18.3 shows the output of the program.


    **Code:**


    ```

    import matplotlib.pyplot as plt

    plt.plot([1,4,8,10])

    plt.xlabel("X Axis")

    plt.ylabel("Y Axis")

    plt.show()

    plt.savefig("line.png",dpi=80)

    ```


