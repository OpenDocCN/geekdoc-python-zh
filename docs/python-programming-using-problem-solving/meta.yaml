    \ are not related. It can be calculated as follows.\n\nFor a set $X = \\{x_1,\
    \ x_2, ..., x_n\\}$ and $Y = \\{y_1, y_2, ..., y_n\\}$\n\n$$Cov(X,Y) = \\frac{\\\
    sum_{i=1}^{n}(x_i - \\bar{x})(y_i - \\bar{y})}{n-1}$$\n\nWhere,\n\n$$\\bar{x}\
    \ = \\frac{x_1 + x_2 + ... + x_n}{n} \\text{ and } \\bar{y} = \\frac{y_1 + y_2\
    \ + ... + y_n}{n}$$\n\nCovariance can be found by using the following code.\n\n\
    ## Code:\n\n```\nX=np.random.randint(5,90,20)\nY=np.random.randint(5,100,20)\n\
    dev_x=X-np.mean(X)\ndev_y=Y-np.mean(Y)\ncov1=(np.dot(dev_x, dev_y))/20\nprint(cov1)\n\
    ```\n\nThe **cov** function of the **numpy** package takes arguments and generates\
    \ an array of covariance. That is,\n\n$$Cov(X_1, X_2) = \\begin{bmatrix} cov(X_1,\
    \ X_1) & cov(X_1, X_2) \\\\ cov(X_2, X_1) & cov(X_2, X_2) \\end{bmatrix}$$\n\n\
    Where, $cov(X_1, X_1)$ is the covariance between $X_1$ and $X_1$ and $cov(X_1,\
    \ X_2)$ is the covariance between $X_1$ and $X_2$. For example, for the following\
    \ code\n\n**Code:**\n\n```\nX=np.random.randint(5,90,20)\nY=np.random.randint(5,100,20)\n\
    print(X)\nprint(Y)\ncov2=np.cov(X,Y)\nprint(cov2)\n```\n\n**Output:**\n\n```\n\
    [[562.40789474 -66.98684211]\n [-66.98684211 628.02894737]]\n```\n\n## 17.6 CORRELATION\n\
    \nCorrelation is another measure of dependency on two variables. This measure\
    \ gives the direction of the relationship between the variables. As per the Oxford\
    \ dictionary, it is “a mutual relationship or connection between two or more things.”\
    \ The covariance between two sets $X$ and $Y$ is given by,\n\n$$Correlation(X,Y)\
    \ = \\frac{Covariance(X,Y)}{\\sigma(X)\\sigma(Y)}$$\n\nwhere $\\sigma(X)$ is the\
    \ standard deviation of $X$ and $\\sigma(Y)$ is the standard deviation of $Y$.\n\
    \nThe following code calculates the correlation between X and Y.\n\n**Code:**\n\
    \n```\nX=np.random.randint(5,90,20)\nY=np.random.randint(5,100,20)\ndev_x=X-np.mean(X)\n\
    dev_y=Y-np.mean(Y)\ncorr=(np.dot(dev_x, dev_y))/(20*np.std(X)*np.std(Y))\nprint(corr)\n\
    ```\n\nThe correlation coefficient can also be calculated using the **numpy.corrcoef(X,\
