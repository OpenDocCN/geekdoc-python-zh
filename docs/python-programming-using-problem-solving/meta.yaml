    num3 = num1 + num2

    ```


    # 3.7.2 Assignment Statements


    Assignment statements bind names to values and modify the items of objects in
    which mutation is allowed. The first statement, for example, assigns the value
    stored in num2 to num1, and the second statement assigns 4 to the second element
    of a list L:


    ```

    num1 = num2

    L[1] = 4

    ```


