    \ 44]\n [ 8 21 9 30 70 9 37 25]]\nSecond subarray:\n[[ 8 60 63 72 66 36 59 54]]\n\
    Third subarray: [[30 45 20 13 22 36 21 45]]\n```\n\n## 17.3.3 Split\n\nThe above\
    \ tasks can also be accomplished using the **split** function. This function takes\
    \ the array, the number of divisions (or the array indicating divisions), and\
    \ the **axis** as the arguments. The function works in almost the same manner\
    \ as the above two functions. The following illustrations demonstrate the use\
    \ of this function.\n\n## Illustration 17.15:\n\n*Refer to Illustration 17.7 Accomplish\
    \ the task using the **split** function.*\n\n### Solution:\n\n```python\narr1=np.random.randint(5,75,(4,8))\n\
    print(arr1)\nsub1, sub2=np.split(arr1,2, axis=1)\nprint('First subarray:\\n',sub1)\n\
    print('Second subarray:\\n',sub2)\n```\n\n## Illustration 17.16:\n\nRefer to Illustration\
    \ 17.8 Accomplish the task using the **split** function.\n\n### Solution:\n\n\
    ```python\narr1=np.random.randint(5,75,(4,8))\nprint(arr1)\nsub1, sub2, sub3,\
    \ sub4=np.split(arr1,4, axis=1)\nprint('First subarray:\\n',sub1)\nprint('Second\
    \ subarray:\\n',sub2)\nprint('Third subarray:\\n',sub3)\nprint('Fourth subarray:\\\
    n',sub4)\n```\n\n## Illustration 17.17:\n\nRefer to Illustration 17.10. Accomplish\
    \ the task using the **split** function.\n\n### Solution:\n\n```python\narr1=np.random.randint(5,75,(4,8))\n\
    print(arr1)\nsub1, sub2, sub3=np.split(arr1,[2,5], axis=1)\nprint('First subarray:\\\
    n',sub1)\nprint('Second subarray:\\n',sub2)\nprint('Third subarray:\\n',sub3)\n\
    ```\n\n## Illustration 17.18:\n\nRefer to Illustration 17.11 Accomplish the task\
    \ using the **split** function.\n\n### Solution:\n\n```python\narr1=np.random.randint(5,75,(4,8))\n\
    print(arr1)\nsub1, sub2=np.split(arr1,2, axis=0)\nprint('First subarray:\\n',sub1)\n\
    print('Second subarray:\\n',sub2)\n```\n\n## Illustration 17.19:\n\nRefer to Illustration\
    \ 17.12 Accomplish the task using the **split** function.\n\n### Solution:\n\n\
    ```python\narr1=np.random.randint(5,75,(4,8))\nprint(arr1)\nsub1, sub2, sub3,\
    \ sub4=np.split(arr1,4, axis=0)\nprint('First subarray:\\n',sub1)\nprint('Second\
    \ subarray:\\n',sub2)\nprint('Third subarray:\\n',sub3)\nprint('Fourth subarray:\\\
    n',sub4)\n```\n\n## Illustration 17.20:\n\nRefer to Illustration 17.14. Accomplish\
    \ the task using the **split** function.\n\n### Solution:\n\n```python\narr1=np.random.randint(5,75,(4,8))\n\
    print(arr1)\nsub1, sub2, sub3=np.split(arr1,[2,3], axis=0)\nprint('First subarray:\\\
    n',sub1)\nprint('Second subarray:\\n',sub2)\nprint('Third subarray:\\n',sub3)\n\
    ```\n\n## 17.3.4 Extract\n\nThis function extracts the elements of the given array\
    \ based on some condition. It takes two arguments:\n\n- the condition and\n- the\
    \ array.\n\nThe signature of the function is as follows:\n\n```python\nnumpy.extract(condition,\
    \ arr)\n```\n\nThe condition can be a Boolean array. In this case, the locations\
    \ at which **True** exist in this array (condition) would be used to extract elements\
    \ from the array passed as the second argument. In the other case, the nonzero\
    \ elements from this array are used for extracting elements from the second array.\
    \ The following illustrations give an insight into the working of this function.\n\
    \n## Illustration 17.21:\n\nGenerate a 2-D array of random integers having 7 rows\
    \ and 9 columns. The integers in the array should be in the range of 0 to 255.\n\
    \n### Solution:\n\n### Code:\n\n```python\nimport numpy as np\narr1=np.random.randint(0,255,(7,9))\n\
    print(arr1)\n```\n\n### Output:\n\n```\n[[116 218 124 57 202 210 138 102 5]\n\
    \ [ 21 102 18 29 241 81 10 190 177]\n [114 205 215 124 141 163 19 141 3]\n [ 38\
    \ 205 22 234 194 91 238 101 127]\n [ 75 41 108 7 211 4 203 251 231]\n [ 28 50\
    \ 55 253 122 84 97 5 46]\n [157 171 221 184 227 241 167 167 154]]\n```\n\n## Illustration\
    \ 17.22:\n\nNow extract the elements which are divisible by 7, from the array\
    \ generated in the above illustration.\n\n### Solution:\n\n### Code:\n\n```python\n\
    condition1=np.mod(arr1,7)==0\narr2=np.extract(condition1, arr1)\nprint(arr2)\n\
    ```\n\n### Output:\n\n```\n[210 21 91 238 7 203 231 28 84 154]\n```\n\nNote that\
    \ **condition1** is nothing more than an array containing **True** (at the locations\
    \ where elements are divisible by 7) and **False** (at the locations where elements\
    \ are not divisible by 7).\n\n```python\nprint(condition1)\n[[False False False\
    \ False False  True False False False]\n [ True False False False False False\
    \ False False False]\n [False False False False False False False False False]\n\
    \ [False False False False False  True  True False False]\n [False False False\
    \  True False False  True False  True]\n [ True False False False False  True\
    \ False False False]\n [False False False False False False False False True]]\n\
    ```\n\n**TRY:**\n*Execute arr1[arr2] and report the result*\n\nThe **compress**\
    \ function can be used along with the **extract** function for applying a condition\
    \ to the rows or columns of a 2-D array. The following illustration gives an overview\
    \ of the mechanism to extract relevant subset from a given array. The illustration\
    \ aims to select every third row and every third column from a given 2-D array.\
    \ To accomplish the task, an array containing numbers from 0 to the number of\
    \ rows is generated. This array is subjected to condition `<array> mod 3 ==0`\
    \ (**r_c**). Likewise, an array containing numbers from 0 to the number of columns\
    \ are generated. This array is subjected to condition `<array> mod 3 ==0` (**c_c**).\
    \ The compress function is then used to select the required rows, followed by\
    \ the required columns.\n\n## Illustration 17.23:\n\n*Select every third row and\
    \ every third column from a given 2-D array.*\n\n### Solution:\n\nThe process\
    \ has already been explained, the code is as follows.\n\n```python\nr=np.arange(arr1.shape[0])\n\
    c=np.arange(arr1.shape[1])\nr_c=np.mod(r,3)==0\nc_c=np.mod(c,3)==0\nprint(r_c)\n\
    print(c_c)\narr3=np.compress(r_c,arr1, axis=0)\nprint(arr3)\narr4=np.compress(c_c,\
    \ arr1, axis=1)\nprint(arr4)\n```\n\n### Output:\n\n```\n[ True False False True\
    \ False False True]\n[ True False False True False False True False False]\n[[116\
    \ 218 124  57 202 210 138 102   5]\n [ 38 205  22 234 194  91 238 101 127]\n [157\
    \ 171 221 184 227 241 167 167 154]]\n[[116  57 138]\n [ 21  29  10]\n [114 124\
    \  19]\n [ 38 234 238]\n [ 75   7 203]\n [ 28 253  97]\n [157 184 167]]\n```\n\
    \n## Illustration 17.24:\n\nAccomplish the task of Illustration 17.23 without\
    \ using the **compress** function.\n\n### Solution:\n\n```python\nr=np.arange(arr1.shape[0])\n\
    c=np.arange(arr1.shape[1])\nr_cond=np.mod(r,3)==0\nc_cond=np.mod(c,3)==0\nr_c1=np.arange(arr1.shape[0])\n\
    r_c=r_c1[r_cond]\narr3=arr1[r_c, :]\nc_c1=np.arange(arr1.shape[1])\nc_c=c_c1[c_cond]\n\
    arr3=arr3[:, c_c]\nprint(arr3)\n```\n\n### Output:\n\n```\n[[116  57 138]\n [\
    \ 38 234 238]\n [157 184 167]]\n```\n\n## 17.4 VARIANCE\n\nThe meaning of the\
    \ word “variance,” as per Oxford Dictionary, is “The fact or quality of being\
    \ different, divergent, or inconsistent.” In statistics, variance is a method\
    \ to calculate the spread of a set of numbers. So, if a set has low variance,\
    \ it is concentrated. If the given set of numbers has a large variance, it is\
    \ scattered to a larger extend.\n\nMathematically, variance denotes the difference\
    \ of a random variable from its expected value. It can be found by taking the\
    \ average of the squares of the differences between the elements of a set and\
    \ the mean value. The standard deviation is the square root of the variance.\n\
    \nFor a set X = {x_i, x_2, ..., x_n}\n\nStandard Deviation = √Variance = √(Σ_{i=1}^n\
    \ (x_i - x̄)² / n)\n\nWhere,\n\nx̄ = (x_1 + x_2 + ... + x_n) / n\n\nThe variance\
    \ can be calculated as follows. First of all, the mean of the given set of numbers\
    \ is found using **numpy.mean**. This is followed by finding the square of deviations\
    \ of the elements from the mean and then dividing the result by the number of\
    \ elements. Finally, the square root of the result so obtained is taken. The code\
    \ follows.\n\n```python\nx_mean=np.mean(X)\nsq_deviations=(X-x_mean)**2\nprint(sq_deviations)\n\
