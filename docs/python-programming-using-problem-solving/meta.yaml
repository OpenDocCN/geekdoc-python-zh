    ## 20.2 CREATING PANDAS SERIES


    A **Pandas Series** can be created by using a **List**, a **Numpy array**, or
    a **dictionary** (Figure 20.2). This section explains the three ways of creating
    a **Series** and presents examples of each method.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_557_1.png)


    **FIGURE 20.2** Creating Pandas Series.


    ### 20.2.1 Using List


    A Python list can be converted into a **Pandas Series** by passing the list in
    the **pandas.Series** method. For example, in the following code, a list called
    **L1** is passed in the **Series** function to create a **Pandas Series**.


    The list passed in the **Series** function can also contain **NaN** values, like
    in the case of **L2**. The **Series S2** is created by passing **L2** in the **Series**
    function of **Pandas**. Note that the output contains the index along with the
    values.


    **Code:**


    ```

    import pandas as pd

    L1=[90, 81, 72, 63, 54, 45, 36]

    S1=pd.Series(L1)

    print(S1)

    L2=[3, 6, 7, 1, np.nan, 8]

    S2=pd.Series(L2)

    print(S2)

    ```


    **Output:**


    ```

    0    90

    1    81

    2    72

    3    63

    4    54

    5    45

    6    36

    dtype: int64

    0    3.0

    1    6.0

    2    7.0

    3    1.0

    4    NaN

    5    8.0

    dtype: float64

    ```


    ### 20.2.2 Using NumPy Arrays


    A **NumPy** array can be converted into a **Pandas Series** by passing the array
    in the **pandas.Series** function. For example, in the following code, a **NumPy**
    array called **arr_np** is passed in the **Series** function to create a **Pandas
    Series**.


    The array, passed in the **Series** function, can also contain **NaN** values,
    like in the case of **arr_np2**. The Series **S3** is created by passing **arr_np2**
    in the **Series** function of **Pandas**.


    **Code:**


    ```

    arr_np=np.random.randint(2,89,10)

    S3=pd.Series(arr_np)

    print(S3)

    arr_np2=np.array([2, np.nan, 9])

    S3=pd.Series(arr_np2)

    print(S3)

    ```


    **Output:**


    ```

    0    23

    1    20

    2    50

    3    70

    4    35

    5    58

    6    46

    7    65

    8    68

    9    44

    dtype: int32

    0    2.0

    1    NaN

    2    9.0

    dtype: float64

    ```


    ### 20.2.3 Using Dictionary


    A **Dictionary** can be converted into a **Pandas Series** by passing the dictionary
    in the **pandas.Series** function. For example, in the following code, a dictionary
    called **dict_1** is passed in the **Series** function to create a **Pandas Series**.
    In such cases, the key to the dictionary becomes the index of the **Series**.


    **Code:**


    ```

    dict_1={''Harsh'':97,''Naks'':90,''Sahil'':91}

    S4=pd.Series(dict_1)

    print(S4)

    ```


    **Output:**


    ```

    Harsh    97

    Naks     90

    Sahil    91

    dtype: int64

    ```


    ## 20.3 INDEXING, ILOC, SLICING, AND BOOLEAN INDEX


    This section presents the ways to access the elements of a **pandas Series** and
    getting a segment of a **Series** out of a given **Series**. This section also
    presents an overview of the **loc[]** and **iloc[]** objects and discusses slicing
    in **Series**. The first five elements and the last five elements of a **Series**
    can be displayed using the **head** and the **tail** methods respectively. The
    next two subsections cover the **head** and the **tail** methods of the **Pandas
    Series**. Finally, the **index** and **describe** the methods of the **Pandas
    Series** have been discussed. It may be stated that the **Boolean indexing, explained
    in the last subsection**, can also be used in **Series**.


    ### 20.3.1 Indexing: loc


    An element of a **Series** can be accessed by passing the value of the index in
    square brackets. For example, **S1[0]** is used to access the element at index
    0, of the series S1. Likewise, **S1[2]** is used to access the third element.
    Note that **S1** used in the following code is the same as that created in [Section
    20.2.1](Section 20.2.1) and **S4** is the same as that created in [Section 20.2.3](Section
    20.2.3).


    **Code:**


    ```

    print(S1[2])

    print(S1[0])

    print(S4[''Harsh''])

    ```


    **Output:**


    ```

    72

    90

    97

    ```


    ### 20.3.2 Indexing Continued: iloc


    **Accessing elements using 0 based indices:** The **iloc** object helps to access
    elements in the same manner as a **NumPy** array. Note that, **iloc** can also
