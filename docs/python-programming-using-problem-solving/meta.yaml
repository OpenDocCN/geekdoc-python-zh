    ## SECTION I


    ## ALGORITHMIC PROBLEM-SOLVING AND PYTHON FUNDAMENTALS


    This section deals with algorithms and introduces Python. It contains three chapters
    namely “Introduction to Algorithms,” “Introduction to Python,” and “Fundamentals.”
    The first chapter presents the definition of an algorithm, the features of a good
    algorithm, and the ways of writing an algorithm. The asymptotic complexity has
    also been discussed in the chapter. The chapter also discusses the differences
    between recursive and iterative algorithms. Algorithms of some common problems
    have also been included in this chapter. The second chapter introduces Python.
    The features of the language, its chronology, and its applications have been discussed
    in the third chapter. The chapter also presents a brief overview of the control
    structures used in Python. It also describes the installation of Anaconda, which
    is an immensely popular Data Science platform. These chapters are the building
    blocks of the chapters that follow.


    ## CHAPTER 1


    ## ALGORITHMIC PROBLEM-SOLVING


    ## Objectives


    After reading the chapter, the reader should be able to


    - Understand the importance of algorithms.

    - Understand the features of a good algorithm.

    - Understand the ways of writing an algorithm.

    - Understand asymptotic notations.

    - Differentiate between recursive and iterative algorithms.


    ## 1.1 INTRODUCTION


    This chapter introduces problem-solving and algorithms. Let us begin our discussion
    by understanding the term algorithm. The word algorithm comes from “algorithmi,”
    from the title “Algoritmi De Numero Indorum,” a book written by Muhammad Ibn Musa
    Al-Khwarizmi, who was a Persian Mathematician. The word was corrupted and became
    “Algorism.” Finally, in the nineteenth century, it became algorithm. Interestingly,
    the book stated above was on Indian numerals. Lately, the word algorithm is identified
    with any procedure applied to accomplish a given computing task.


    An algorithm directs how to solve a problem and there can be many algorithms to
    solve the same problem. However, not all of them are effective and efficient.
    Also, it is desirable that in the sequence of steps for accomplishing a task,
    each step should be as basic as possible. The task should be completed in a finite
    number of steps. So, a good algorithm should be finite, and each instruction should
    be unambiguous.


    Algorithms are implemented using programming languages. However, designing an
    algorithm cannot be automated as it is, an art [1]. Art cannot be automated, but
    you can at least learn approaches like Divide and Conquer, Backtracking, Branch
    and Bound, Dynamic programming, Greedy approaches, etc. Learning these approaches
    would not only help you in Computer Science but also help in other disciplines
    like Computational Biology, Finance, etc.


    Algorithms are used everywhere, right from your set-top box to the machine that
    gathers biometric data. The advancements in the field of algorithms have changed
    the lives of millions. The page rank algorithm of Larry Page has helped in the
    creation of Google, which is a part of our life. The routing algorithms allowed
    packets to be transferred from one computer to another via the shortest paths
    and helped in the advancement of communication. Likewise, the pre-processing algorithms
    for magnetic resonance imaging have helped scientists to develop computer-aided
    techniques for the diagnosis of diseases. The conventional techniques clubbed
    together with the latest advancements like Deep Learning have been able to solve
    many problems in the society.


    ## 1.2 DEFINITION AND CHARACTERISTICS


    Having seen the importance of algorithms, let us now move to their formal definition
    and understand their features. An algorithm is a sequence of steps used to accomplish
    a given task. It processes the input and generates some output. The most essential
    elements of an algorithm are input, output, correctness, efficiency, and definiteness.


    The number of input arguments can even be zero. For example, some of the pseudo-random
    number generators, do not take any argument to generate a random number. However,
    there must be at least one output. The first thing that should be taken care of
    while designing an algorithm is its correctness. An algorithm that is not correct,
    is of no use. No amount of fancy controls or sophisticated techniques can replace
    correctness. Also, there can be numerous ways to solve a given problem but not
    all of them are equally efficient.


    The efficiency of an algorithm is also important. The algorithm should be efficient
    both in terms of time and space. That is, it should take the minimum possible
    time and space. For example, linear search and binary search are the two most
    important techniques of searching. The first takes $O(n)$ time, while the second
    takes $O(\log n)$ time. That is, a list having 1024 elements would take time of
    order of 1024 units, in the case of linear search, and would take time proportional
    to 10 units, in the case of binary search. Hence, the choice of an efficient algorithm
    is immensely important to make an effective model. The meaning of O has been explained
    in [Section 1.5](#section-1.5).


    The above discussion can be summarized as follows:


    - an algorithm takes zero or more input,

    - it produces at least one output,

    - it must be correct,

    - it should be efficient, both in terms of memory and space, and

    - it should not be ambiguous.


    ## 1.3 NOTATIONS: PSEUDOCODE AND FLOW CHART


    In order to appreciate the discussion, let us come back to the example of linear
    search. In linear search, a list is searched for an item by looking for the item
    iteratively, that is at each position of the list. The algorithm for linear search
