    # 8.1 INTRODUCTION


    Python provides us with lists, tuples, and dictionaries, all of which have become
    synonym with ease of programming and can be used in diverse applications. In Python,
    a list can contain different types of elements and is mutable whereas a tuple
    can contain different types of elements and is immutable. In a dictionary, the
    items can be accessed using strings as indices (Figure 8.1).


    Dictionaries are collections in which each value is associated with a key. This
    key-value pair constitutes an item in a dictionary. In order to understand the
    idea, consider the following example. In the 1980s, the phone numbers of the people
    in a city could be found using a telephone directory. The directory had phone
    numbers of people of the city in the lexicographic order (of names). So, using
    one’s name, their phone number could be found. That is, the index of value (phone
    number in this case) was the name of the person. Python dictionary uses the same
    idea. However, a directory could have a name twice but in a dictionary each key
    is unique.'
