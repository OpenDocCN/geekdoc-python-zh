    # 21.6.2 dropna()


    The data imported from a **csv** file (or other sources for that matter) may contain
    missing values. The **Data Frame** contains **NaN** at these positions. The **dropna()**
    method helps the programmer to deal with these values. This method takes the following
    parameters:


