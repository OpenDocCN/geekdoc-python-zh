    \ the requisite condition is met, otherwise it returns a false. The __len__ method\
    \ finds the length of the data member and returns false if it is null. The Boolean\
    \ condition can be checked using the __len__ method, only if the __bool__ for\
    \ that class is not defined. In case both __len__ and __bool__ are defined in\
    \ a class, __bool__ takes precedence over __len__."
