    # 18.2 THE PLOT FUNCTION


    We start our discussion by plotting the values of a list. A plot can be instantiated
    using the **plot** function of the **pyplot** package. To generate a basic plot,
    a list **L**, having **n** values (index: 0 to (n-1)), can be passed as an argument
    to the **plot** function. In the plot so generated, the **X-axis** would'
  - '[PAGE 503]


    have values from 0 to (n-1) and **Y-axis** would have the values from the given
    list. For example, if


    L = [3, 5, 9, 6, 8]


    is passed to the **plot** function. Then, **X-axis** will have values from 0 to
    4 (note that there are five elements in the list, having indices from 0 to 4).
    The corresponding values in the **Y-axis** will be 3, 5, 9, 6, and 8. That is,
    (0, 3), (1, 5), (2, 9), (3, 6), and (4,8) are shown in the graph ([Figure 18.2](#)).


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_503_0.png)


    Now, let us move to the parameters of the **plot** function. The discussion that
    follows introduces parameters namely **xlabel**, **ylabel**, **axis**, **xlim**,
    **ylim**, **xticks**, and **yticks**.


    # 18.2.1 xlabel


    The **xlabel** attribute associates a label with the **X-axis**. The value of
    **xlabel** is a string.


    # 18.2.2 ylabel


    The ylable attribute associates a label with the **Y-axis**. The value of **ylabel**
    is a string.


    # 18.2.3 axis'
