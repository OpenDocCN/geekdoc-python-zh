    \ condition. Those of you from JAVA background must be familiar with **finally**.\
    \ It is for handling the termination condition, whether an exception has occurred.\
    \ For example, in designing software the concluding screen must appear, whether\
    \ the exception has occurred or for that matter the memory of objects must be\
