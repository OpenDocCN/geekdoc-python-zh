    print(''The type of i is '',t)

    ```


    **输出：**


    ```

    The value of i is Nikhil

    The type of i is <class ''str''>

    ```


    如前所述，**input()** 函数接受字符串作为输入；因此，无需像整数或浮点数那样进行额外的转换。在以下代码片段中，用户输入一个字符串，然后一个名为 **num**
