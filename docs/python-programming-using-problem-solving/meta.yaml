    # 13.5 CLASS INTERFACE AND ABSTRACT CLASSES


    At times the classes are crafted so that they can be subclassed. While designing,
    there is no intention of instantiating these classes. That is, these classes would
    not be instantiated but would only be used to create derived classes that are
    called abstract classes. In order to understand the concept, let us consider an
    example. The following example has four classes: **BaseClass**, **Derived1**,
    **Derived2**, and **Derived3**.


    The **BaseClass** has two methods: **method1** and **method2**. The first method
    has some tasks associated with it, whereas the second wants the derived class
    to implement it. The derived class should, to be able to call this method, must
    have a method called **action**. The first derived class (**Derived1**) replaces
    **method1**. So, if an instance of **Derived1** calls **method1**, the version
    defined in **Derived1** would be called. The second method extends **method1**,
    it adds something to **method1** and also calls the **BaseClass** version of **method1**.
    When **method1** is called from **Derived2**, the **BaseClass** version is called,
    as the search in the inheritance tree invokes the base class version of the method.
    The third derived class (**Derived3**) also implements the **action** method defined
    in the base class. Note that when **method2** is called through an instance of
    **Derived3**, the base class version of **method2** is invoked. This version calls
    **action** and a new search is initiated, thus resulting in the invocation of
    action of **Derived3**. Illustration 13.9 presents the code.


    Note that the above concept can be extended, and a class may have methods that
    would be implemented by the derived classes. Interestingly,'
