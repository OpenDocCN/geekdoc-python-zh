    ## 15.5 CRAFTING USER DEFINED EXCEPTIONS\n\nSo far, we have seen the automatic\
    \ exception handling capabilities of Python. That is, even if there is no **try/except**,\
    \ Python handles exceptions. The use of **try/except** has also been discussed.\
    \ The use of **raise** makes the exception handling more meaningful, as one can\
    \ raise specific exceptions as per the needs. However, so far, we have not seen\
    \ how to deal with the situation, which requires us to raise a user defined exception.\
    \ This section discusses the crafting and use of user defined exceptions.\n\n\
    Suppose there is a situation, where a specific exception (as per the need of the\
    \ program), is to be raised. However, there is no predefined exception to handle\
    \ that situation. In such cases, a class which would handle the exception needs\
    \ to be created. The particular class should be a subclass of the **Exception**\
    \ class, so that we can use it for raising exceptions. When the situation arises,\
    \ the exception could be raised, as shown in the following illustration. In the\
    \ illustration that follows, a class called **MyError**, which derives **Exception**\
    \ has been created. The **__init__** of this class may contain the message, which\
    \ would be printed, when the exception occurs. While raising the exception, the\
    \ keyword **raise**, followed by the name of the class has written. The reader\
    \ should observe the output and understand that it will print the message written\
    \ in **__init__** followed by the message in the **except** block. Though, this\
    \ is just a dummy example, it gives an idea of how to craft classes that handle\
    \ exceptions.\n\n**Code:**\n\n```\nclass MyError (Exception):\n    def __init__(self):\n\
    \        print('My Error type error')\ndef divide(a, b):\n    try:\n        if\
    \ b==0:\n            raise MyError\n        d=a/b\n        print('Result is\\\
    t:',str(d))\n    except MyError:\n        print('Exception caught : MyError ')\n\
    divide(2,3)\ndivide(2,0)\n>>>\n```\n\n**Output:**\n\n```\nResult is  : 0.6666666666666666\n\
    My Error type error\nException caught: My Error\n>>>\n```\n\n## 15.6 AN EXAMPLE\
    \ OF EXCEPTION HANDLING\n\nThe following program finds the maximum number from\
    \ a given list. The idea is simple. Initially, we assigned first item to **max**.\
    \ Then we traverse the items of the given list. While traversing, if any element\
    \ is greater than that stored in **max**, then assign that number to the variable\
    \ **max**. At the end, print the value of **max**. The following program and the\
    \ corresponding output will illustrate this.\n\n**Code:**\n\n```\ndef findMax(L):\n\
    \    max =L[0]\n    for item in L:\n        if item>max:\n            max =item\n\
    \    print('Maximum\\t:',str(max))\n\nL=[2, 10, 5, 89, 9]\nfindMax(L)\n>>>\n```\n\
    \n**Output:**\n\n```\nMaximum:89\n>>>\n```\n\nNote that if the contents of the\
    \ list L are strings (e.g. L=['Harsh', 'Nakul', 'Naved', 'Sahil']), the strings\
    \ would be compared as per the rules and the largest (“Sahil”) would be printed.\
    \ That is, the program works for integers, strings, or floats. However, for the\
    \ following list, an exception would be raised.\n\n```\nL= [2, 'Harsh', 3.67]\n\
    ```\n\n**Output:**\n\n```\nTraceback (most recent call last):\n  File \"C:/Python/Exception\
    \ handling/Example/findMax.py\", line 15, in <module>\n    findMax(L)\n  File\
    \ \"C:/Python/Exception handling/Example/findMax.py\", line 4, in findMax\n  \
    \  if item>max:\nTypeError: unorderable types: str() > int()\n>>>\n```\n\nThe\
    \ problem can be handled by putting the part of the code where the problem is\
    \ likely to come, in the **try** block. Moreover, if all the items of the list\
    \ were entered by the user, the possibility of a runtime error cropping up would\
    \ be higher. In such cases, the programmer must make sure that everything, including\
    \ the input of items and calling the function should be in the try block. The\
    \ following code presents the version of the program, where items are entered\
    \ by the user and exception handling should be implemented. Note that the first\
    \ run produces an expected result, whereas the second run results in runtime error\
    \ and hence, it will invoke exception handling mechanism.\n\n**Code:**\n\n```\n\
    def findMax(L):\n    max =L[0]\n    for item in L:\n        if item>max:\n   \
    \         max =item\n    print('Maximum\\t:',str(max))\n\nL=[]\nitem=input('Enter\
    \ items (press 0 to end)\\n')\ntry:\n    while int(item) !=0:\n        L.append(item)\n\
