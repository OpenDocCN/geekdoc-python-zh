    \ underscore. Furthermore, the name of an identifier must not begin with a digit\
    \ but can contain a digit. Interestingly, in **Python**, the names have their\
    \ scope, as discussed in the following chapters. Moreover, **identifiers** can\
    \ also contain some special characters in **Python**. Also, **identifiers** are\
    \ case-sensitive.\n\n## 3.6.3 Python Escape Sequence\n\n**Escape sequences** are\
    \ used to print special symbols in strings. Here, it may be stated that one cannot\
    \ directly print some characters in a string. For example, to print “**Hi How\\\
