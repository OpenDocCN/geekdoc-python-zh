    ```\nDataFrame1.dropna()\n```\n\n**Output:**\n\n| | 0 | 1 | 2 | 3 |\n|---|---|---|---|---|\n\
    | 0 | Harsh | 36.0 | 10 | True |\n| 1 | Tanu | 30.0 | 1 | False |\n| 2 | Manu\
