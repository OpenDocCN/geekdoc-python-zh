    \ Choice Questions\n- Theory\n- Application\n\n## CHAPTER 2: INTRODUCTION TO PYTHON\n\
    \n- 2.1 Introduction\n- 2.2 Features of Python\n    - 2.2.1 Easy\n    - 2.2.2\
    \ Type and Run\n    - 2.2.3 Syntax\n    - 2.2.4 Mixing\n    - 2.2.5 Dynamic Typing\n\
