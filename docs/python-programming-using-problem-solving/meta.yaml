    # 13.2.1 Need for Inheritance


    In very large programs, it is difficult to code and debug a class. Once the programmer
    has crafted a class, there is little need to meddle with it. If one needs to craft
    classes having the same features as the class that has been developed (and add
    some more features to it), then it makes sense to derive classes from the existing
    class. So, inheritance helps to reuse a code. Reusing the code has its own advantages.
    It not only saves time but also money. The reliability of the program also increases
    by reusing a code. One can also develop his class by extending classes developed
    by others. That is, inheritance helps in distributing libraries. Inheritance also
    helps to implement a design that is more intuitive, better, and practical. Inheritance
    also has some disadvantages.


    *Inheritance is important because of the following factors:*


    +   - Reusability

    - Increased Reliability

    - Distributing libraries

    - Intuitive, better programs


