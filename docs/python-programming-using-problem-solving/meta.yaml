    # 17.4 VARIANCE\n\nThe meaning of the word “variance,” as per Oxford Dictionary,\
    \ is “The fact or quality of being different, divergent, or inconsistent.” In\
    \ statistics, variance is a method to calculate the spread of a set of numbers.\
    \ So, if a set has low variance, it is concentrated. If the given set of numbers\
    \ has a large variance, it is scattered to a larger extend.\n\nMathematically,\
    \ variance denotes the difference of a random variable from its expected value.\
    \ It can be found by taking the average of the squares of the differences between\
    \ the elements of a set and the mean value. The standard deviation is the square\
    \ root of the variance.\n\nFor a set X = {x_i, x_2, ..., x_n}\n\nStandard Deviation\
    \ = √Variance = √(Σ_{i=1}^n (x_i - x̄)² / n)\n\nWhere,\n\nx̄ = (x_1 + x_2 + ...\
    \ + x_n) / n\n\nThe variance can be calculated as follows. First of all, the mean\
    \ of the given set of numbers is found using **numpy.mean**. This is followed\
    \ by finding the square of deviations of the elements from the mean and then dividing\
    \ the result by the number of elements. Finally, the square root of the result\
    \ so obtained is taken. The code follows.\n\n```\nx_mean=np.mean(X)\nsq_deviations=(X-x_mean)**2\n\
    print(sq_deviations)\nsum_sq_dev=np.sum(sq_deviations)\nprint(sum_sq_dev)\nav1=sum_sq_dev/len(X)\n\
    var=np.sqrt(av1)\n```"
