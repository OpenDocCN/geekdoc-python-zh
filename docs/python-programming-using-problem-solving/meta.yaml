  md: '# CHAPTER 6


    # FUNCTIONS


    # Objectives


    After reading this chapter, the reader should be able to


    +   - Appreciate the importance of modular programming

    - Understand the components and types of functions

    - Implement Linear Search using functions

    - Understand the concept of scope of a variable

    - Understand and use recursion


    # 6.1 INTRODUCTION


    If one has to perform a bigger task, then it is advisable to divide it into smaller,
    manageable tasks. This division has many advantages, discussed in the following
    sections. The units of program, which can be called on as it is basis, take some
    input, process it and may generate some output are referred to as functions.


    > Functions are units which perform a particular task, take some input and may
    give some output.


    This concept is the soul of procedural programming. The readers familiar with
    C (or for that matter C++, JAVA, C#, etc.) must be familiar with the idea and
    use of functions. However, a brief discussion on the features and advantages of
    functions follows in the next section.'
  merge: -1
  pgno: 156
- img_proc: true
  md: 'This chapter introduces the concept of functions. The chapter has been organized
    as follows. The next section briefly explains the features of a function; the
    third section explains the basic terminology, and the fourth section explains
    the definition and invocation of a function. The fifth section presents a brief
    discussion on various types of functions. The sixth section illustrates the concept
    by taking the example of linear search. The seventh section discusses the scope
    of a variable, and the eighth section presents recursion. The last section concludes.


    # 6.2 FEATURES OF A FUNCTION


    As discussed earlier, functions form the basis of procedural programming. One
    of the most obvious advantages of using functions is the division of a program
    into smaller parts. This section briefly discusses the advantages of functions.


    # 6.2.1. Modular Programming


    A good program is divided into small parts, in such a way that a particular part
    perform some specific task. The clubbing together of similar functions gives rise
    to modular programming.


    # 6.2.2. Reusability of Code


    A function can be called many times. This spares the programmer from the horror
    of rewriting the same code again, which in turn can reduce the length of the program.


    # 6.2.3. Manageability


    Dividing a bigger task into smaller functions makes the program manageable. It
    becomes easy to locate bugs and leads to increased reliability. Also, it becomes
    easy to carry out local optimizations in a function. To summarize, manageability
    leads to the following.'
  merge: -1
  pgno: 157
- img_proc: true
  md: '# 6.2.3.1 Easy debugging


    In order to understand why creating functions would make debugging easy, let us
    consider White Box Testing. This type of testing, which uses code for testing,
    requires elicitation of paths and crafting test cases catering to them. It is
    easy to effectively analyse smaller functions rather than the whole task.


    # 6.2.3.2 Efficient


    It is essential to make code efficient both in terms of time and memory. As a
    matter of fact, even in C’s compiler, most of the code optimization is attributed
    to the developer rather than the compiler.


    The above factors point to the fact that dividing the task into functions is a
    good practice. It may be noted here that even Object-Oriented Programming relies
    on functions for implementing the behavior of a class.


    # 6.3 BASIC TERMINOLOGY


    The importance of functions in procedural programming has already been discussed
    in the previous section. This section briefly introduces the terminology of functions
    and presents the syntax, which would form the foundation stone of the discussion
    that follows.


    # 6.3.1. Name of a Function


    Function can have any legal literal name. For example, **sum1** is a valid function
    name, as it satisfies all the constrains on the name (also discussed in [Section
    6.4](#)). It may be stated here that in general a class can have more than one
    functions having same name but different parameters. This is referred to as overloading.


    # 6.3.2. Arguments


    The arguments of a function denote the input given to a function. A function can
    have any number of arguments. As a matter of fact, it is'
  merge: -1
  pgno: 158
- img_proc: true
  md: 'possible that a function may not have any argument.


    # 6.3.3. Return Value


    A function may or may not return a value. The beauty of Python lies in not specifying
    the return type and hence using the same functions for returning various data
    types.


    In Python, a function can be made in the command prompt. This implies that unlike
    C (or for that matter C++, JAVA, or C#) a function need not be a part of a program.
    Moreover, the return type, as described in this section, need not to be mentioned.
    This inculcates flexibility in the procedures.


    # 6.4 DEFINITION AND INVOCATION


    This section discusses how to define a function and call a function that has already
    been defined. The definition of a function depicts the behavior. The task to be
    performed by the function is contained in its definition. In the discussion that
    follows, the components of a function have been explained in detail.


    The invocation of a function means calling a function. As is explained in Section
    6.8: a function can also be called within itself. This is referred to as recursion.


    It may also be noted that a function is defined only once. However, it can be
    called any number of times.


