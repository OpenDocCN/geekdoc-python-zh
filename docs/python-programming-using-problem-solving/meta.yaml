    \n# 13.2.1 Need for Inheritance\n\nIn very large programs, it is difficult to\
    \ code and debug a class. Once the programmer has crafted a class, there is little\
    \ need to meddle with it. If one needs to craft classes having the same features\
    \ as the class that has been developed (and add some more features to it), then\
