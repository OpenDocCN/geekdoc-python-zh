    <字典名>.get('<要搜索的值>', '默认值>')\n```\n\n示例4.5演示了get构造的使用。\n\n## 示例 4.5：\n\n*此示例包含一个目录，其中包含书名和对应的年份。后面的语句查找给定书名的出版年份。如果未找到该名称，则显示字符串（作为get的第二个参数）“Bad\
