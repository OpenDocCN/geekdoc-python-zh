    \      n = int(n/2)\n    print(i)\n    #用户输入的 n 值为 10\n    ```\n    (a) 4\n  \
    \  (b) 5\n    (c) 无限\n    (d) 代码无法编译\n\n4. 当迭代次数未知时，可以使用哪种循环？\n    (a) while\n\
    \    (b) for\n    (c) 两者都可以\n    (d) 以上都不是\n\n5. for 循环可以有多少层嵌套？\n    (a) 2\n\
    \    (b) 3\n    (c) 两者都可以\n    (d) 代码无法编译\n\n6. n = int(input('Enter number'))\n\
