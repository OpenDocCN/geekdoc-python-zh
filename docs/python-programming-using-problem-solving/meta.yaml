  md: '# 16.4 AGGREGATE FUNCTIONS


    The **numpy** module contains many aggregate functions. The various functions,
    along with their brief explanations, are as follows:


    +   - **numpy.sum:** It finds the sum of the elements of the argument (e.g. a
    list or an array).

    - **numpy.prod:** It finds the product of the elements of the argument (e.g. a
    list or an array).

    - **numpy.mean:** It finds the mean of the elements of the argument (e.g. a list
    or an array).

    - **numpy.std:** It finds the standard deviation of the elements of the argument.

    - **numpy.var:** It finds the variance of the elements of the argument.

    - **numpy.max:** It finds the maximum element of the argument. In the case of
    a list or a 1D array, the maximum element would be displayed. However, in the
    case of a 2D array, the axis along which the maximum element is desired can also
    be mentioned. Here, **axis=0** indicates rows and **axis=1** indicates columns.

    - **numpy.min:** It finds the minimum element of the argument. In the case of
    a list or a 1D array, the minimum element would be displayed. However, in the
    case of a 2D array, the axis along which the minimum element is desired can also
    be mentioned. Here, **axis=0** indicates rows and **axis=1** indicates columns.

    - **numpy.argmin:** It finds the position (index) of the minimum element.

    - **numpy.argmax:** It finds the position of the maximum element.

    - **numpy.median:** It finds the median of the elements of the argument.

    - **numpy.percentile:** It finds the percentile of the elements of the argument.
    The percentile (25 etc.) is the second argument.

    - **numpy.any:** It finds if any element of the given argument is present in the
    list.

    - **numpy.all:** It finds if all the elements of the given argument are present
    in the list.


