    \ g(n) \\leq f(n) \\leq c_2 \\times g(n)$\n\nIt may also be noted that,\n\n$f(n)\
    \ = O(g(n))$ and\n$f(n) = \\Omega(g(n))$\nthen,\n$f(n) = \\Theta(g(n))$\n\n##\
    \ 1.6 COMPLEXITY\n\nThe algorithm should be efficient both in terms of memory\
