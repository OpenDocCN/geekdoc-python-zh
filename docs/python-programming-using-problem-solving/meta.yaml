    - $Y_{min}$

    - $X_{max}$

    - $Y_{max}$


    indicating the minimum value of the X-axis, that of the Y-axis, the maximum value
    of the X-axis, and the maximum value of the Y-axis.


    # 18.2.4 xlim, ylim


    The **pyplot** also provides the **xlim** and **ylim** arguments for setting the
    limits of the **X** and the **Y**-axis respectively.


    # 18.2.5 xticks, yticks


    The ticks on the **X** and the **Y**-axis can be set by using the **xticks** and
    **yticks** functions. These functions take a list containing the values to be
    displayed on the axes.


    Having seen the parameters of the **plot** function, let us now move to some of
    the useful methods associated with the **plot** function. The following discussion
    introduces the **show** and the **savefig** methods associated with the **plot**
    module.


    # 18.2.6 show


    The **show** method displays the figure.


