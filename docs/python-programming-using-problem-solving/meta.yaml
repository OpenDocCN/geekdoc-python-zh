    \    print(L)\n    findMax(L)\nexcept:\n    print('Run time error')\n```\n\n**输出（第一次运行）：**\n\
    \n```\n>>>\nEnter items (press 0 to end)\n3\nEnter item (press 0 to end)\n2\n\
