    # 12.4 SCOPE OF DATA MEMBERS


    The **scope** of a namespace is the region where it is directly accessible. In
    fact, in Python, scopes are used dynamically. In determining the scope of a namespace,
    the following rules are followed.


    +   - First of all, the innermost scope is searched

    - Then the scope of enclosing functions is searched

    - This is followed by searching the global namespaces

    - Finally, the build in names are seen


    The nonlocal statements rebind the variables in the global scope. In order to
    understand this concept, consider the following code. The following points, concerning
    the code, are worth noting.


