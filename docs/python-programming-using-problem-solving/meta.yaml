    ### 3.11.1 Integer


    As stated earlier, the type of variable need not be specified in **Python**. So,
    to create an integer-type variable, one can simply assign an integer value to
    an object. For example, in the following snippet, **i** has been assigned the
    value **10**. Note that the type of a variable can be determined by using the
    **type()** function. Here, the type of **i** has been stored in a variable called
    **t**. The value of ‘t’ <class, ‘int’> is displayed n printing.


    **Code:**


    ```

    i=10

    print(''The value of i is '',i)

    t=type(i)

    print(''The type of i is '',t)

    ```


    **Output:**


    ```

    The value of i is 10

    The type of i is <class ''int''>

    ```


    #Python automatically finds the data type of variable. We do not need to mention
    the type of variable.


    One can use the **input()** function to take input from the user. The **input()**
    function takes a string as an argument displayed on the screen. The input of the
    user is taken as a string. To convert it into an integer, the **int()** function
    is used. In the snippet that follows, the number entered by the user is converted
    into an integer, and then a variable called **num** points to the location that
    stores the number.


    **Code:**


    ```

    num=int (input (''Enter a number\t:''))

    print (''You have entered\t:'', num)

    ```


    **Output:**


    ```

    Enter a number :34

    You have entered: 34

    ```


