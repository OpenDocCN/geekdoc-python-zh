- md: "## 14.2 __INIT__ REVISITED\n\nThe `__init__` function has already been explained.\
    \ This function initializes the members of a class. Earlier it was stated that\
    \ `__init__` could not be overloaded, which is partly true. Though one cannot\
    \ have two `__init__`'s in the same class, there is a way to implement constructor\
    \ overloading, explained in the following discussion.\n\nLet us revisit `__init__`.\
    \ The purpose of `__init__` is to initialize the members of the class. In the\
    \ following example (Illustration 14.1), a class called **Complex** has two members:\
    \ **real** and **imaginary**, which are initialized by the parameters of the `__init__`\
    \ function. Note that, the members of the class are denoted by **self.real** and\
    \ **self.imaginary** and the parameters of the functions are **real** and **imaginary**.\
    \ The example has a function called **putData** to display the values of the members.\
    \ In the `__main__()` function, **c1** is an instance of the class **Complex**.\
    \ The object **c1** is initialized by 5 and 3 and the **putData()** of the class\
    \ has been called to display the “**Complex Number.**”\n\n**Illustration 14.1:**\n\
    \nCreate a class called **Complex**, having two members **real** and **imaginary**.\
    \ The class should have **\\_\\_init\\_\\_**, which takes two parameters to initialize\
    \ the values of **real** and **imaginary** respectively and a function called\
    \ **putData**, to display the Complex number. Create an instance of the Complex\
    \ number in the **\\_\\_main\\_\\_()** function, initialize it by (5, 3) and display\
    \ the number by invoking the **putData** function.\n\n# Code:\n\n```\nclass Complex:\n\
    \    def __init__(self, real, imaginary):\n        self.real = real\n        self.imaginary\
    \ = imaginary\n    def putData(self):\n        print(self.real,\" +i \",self.imaginary)\n\
    \ndef __main__():\n    c1=Complex(5, 3)\n    c1.putData()\n__main__()\n```\n\n\
    # Output:\n\n```\n5 +i    3\n```\n\nLet us consider another example (Illustration\
    \ 14.2) which deals with the implementation of vectors. In the example, a class\
    \ called **Vector** has two data members namely **args** and **length**. Since\
    \ **args** can contain any number of items, the **\\_\\_init\\_\\_** has **\\\
    *args** as the parameter. The **putData** function displays the **Vector** and\
    \ the **\\_\\_len\\_\\_** function calculates the length of the **Vector** (the\
    \ number of arguments).\n\n# Illustration 14.2:\n\nCreate a class called **Vector**,\
    \ which can be instantiated with a vector of any length. Design the requisite\
    \ **\\_\\_init\\_\\_** function and a function to overload the **len** operator.\
    \ The class should also have a **putData** function to display the vector. Instantiate\
    \ the class with a vector having:\n\n- no element\n- one element\n- two elements\n\
    - three elements\n\nDisplay each vector and display the length.\n\n# Code:\n\n\
    ```\nclass Vector:\n    def __init__(self, * args):\n        self.args=args\n\
    \    def putData(self):\n        print(self.args)\n        print('Length ',len(self))\n\
    \    def __len__(self):\n        self.length = len(self.args)\n        return(self.length)\n\
    def __main__():\n    v0= Vector()\n    v0.putData()\n    v1 = Vector(2)\n    v1.putData()\n\
    \    v2 = Vector(3, 4)\n    v2.putData()\n    v3 = Vector(7, 8, 9)\n    v3.putData()\n\
    \n__main__()\n```\n\n# Output:\n\n```\n()\nLength 0\n(2,)\nLength 1\n(3, 4)\n\
    Length 2\n(7, 8, 9)\nLength 3\n>>>\n```\n\nNote that the above example, __init__\
    \ has the same effect as having many constructors with different parameters. Though\
    \ __init__ has not been overloaded in the literal sense, the program has same\
    \ effect as that of one having overloaded constructors.\n\n## 14.2.1 Overloading\
    \ __init__(Sort of)\n\nConstructors can be overloaded (part of) by assigning **None**\
    \ to the arguments (some or all, except for the positional argument). To understand\
    \ the point, consider a class called **Complex**. The class must have two constructors,\
