    \ of user defined exceptions.\n\nSuppose there is a situation, where a specific\
    \ exception (as per the need of the program), is to be raised. However, there\
    \ is no predefined exception to handle that situation. In such cases, a class\
    \ which would handle the exception needs to be created. The particular class should\
    \ be a subclass of the **Exception** class, so that we can use it for raising\
    \ exceptions. When the situation arises, the exception could be raised, as shown\
    \ in the following illustration. In the illustration that follows, a class called\
    \ **MyError**, which derives **Exception** has been created. The **__init__**\
    \ of this class may contain the message, which would be printed, when the exception\
    \ occurs. While raising the exception, the keyword **raise**, followed by the\
    \ name of the class has written. The reader should observe the output and understand\
    \ that it will print the message written in **__init__** followed by the message\
    \ in the **except** block. Though, this is just a dummy example, it gives an idea\
    \ of how to craft classes that handle exceptions.\n\n**Code:**\n\n```\nclass MyError\
    \ (Exception):\n    def __init__(self):\n        print('My Error type error')\n\
    def divide(a, b):\n    try:\n        if b==0:\n            raise MyError\n   \
    \     d=a/b\n```"
