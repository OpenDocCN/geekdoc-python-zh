    ====================\nname\t\t\t: Hari\nname\t\t\t: Nakul\n>>>\n```\n\nHowever,\
    \ methods can also be crafted without the **self** argument. These are unbound\
    \ methods. The concept has been discussed in [Section 13.3.2](#) of this chapter.\
    \ The method of a class is an instance method by default. So, generally, the method\
    \ of a class can be called by creating an instance of the class and using the\
    \ dot operator to call the method. Note that this was the case in languages like\
    \ C#, JAVA, etc.\n\nHowever, there are other types of methods as well. For example,\
    \ static methods do not require the instance of a class as their first argument.\n\
    \n# 13.3.5 Calling the Base Class Function Using Super\n\nThe functions of the\
    \ base class can be called **super**. In fact, **super** can be used to call any\
    \ function of the base class and it clearly depicts the calling of the base class’s\
    \ function. In order to understand the usage of **super**, let us consider the\
    \ following example. In the following example, **BaseClass** has two methods:\
    \ **__init__** and **printData**. **__init__** has one positional parameter and\
    \ one parameter that initializes **data** (the data member of the **BaseClass**).\
    \ The **DerivedClass** is the derived class of the **BaseClass**. This class has\
    \ **__init__**, which takes a positional parameter (**self**), and two other parameters.\
    \ The first initializes the data member of **DerivedClass** and the second is\
    \ passed onto the **__init__** of the base class (**BaseClass**) using **super**.\
    \ The **super** takes the name of the class (**DerivedClass**), the positional\
    \ parameter (**self**) and calls the **__init__** of the base class by passing\
    \ all parameters except the positional parameter. Note that the second function\
    \ also uses **super** in the same manner.\n\n# Code:\n\n```\nclass BaseClass:\n\
    \    def __init__(self, data):\n        self.data=data\n```"
- md: "## 13.4 SEARCH IN INHERITANCE TREE\n\nAn object is searched in the inheritance\
    \ tree, in a bottom-up fashion. First of all, the class searches for the given\
    \ object. If it is found, then the found object is used to accomplish the given\
    \ task. If not, then its super class (Base Class) is searched for the object.\
    \ In the case of more than one base classes, ambiguity can be there.\n\nFor example,\
    \ in the following illustration, the **Derived1** class has been derived from\
    \ **BaseClass**. The **show()** method of this class displays the values of “**data1**”\
    \ and “**data**.” The former is in the class and hence its value is displayed.\
    \ However, if the former is not in the class, the inheritance tree is searched\
    \ for the object. Note that “**data**” exists in the base class (**BaseClass**)\
    \ and hence its value would be displayed. This is true for methods also. Even\
    \ if the derived class does not have a particular method, it can be invoked if\
    \ it exists in the parent class or in any other class, up in the inheritance tree.\n\
    \n![](img/46b778b4f9252bd09c63fc5fba842fc6_350_0.png)\n\n**FIGURE 13.11** The\
    \ class hierarchy for given illustration.\n\n# Code:\n\n```python\nclass BaseClass:\n\
    \    def __init__(self,data):\n        self.data=data\n    def show(self):\n \
    \       print(\"\\nData\\t:\",self.data)\n\nclass Derived1(BaseClass):\n    def\
    \ __init__(self,data,data1):\n        self.data1=data1\n        BaseClass.__init__(self,data)\n\
    \    def show(self):\n        print(\"\\nData\\t:\",self.data1,\"\\nBase class\
    \ data\\t:\",self.data)\n\nclass Derived2(BaseClass):\n    def __init__(self,data,data2):\n\
    \        self.data2=data2\n        BaseClass.__init__(self,data)\n    def show(self):\n\
    \        print(\"\\nData\\t:\",self.data2,\"\\nBase class data\\t:\",self.data)\n\
    \nX=BaseClass(1)\nX.show()\nprint(X.data)\nY=Derived1(2,3)\nY.show()\nZ=Derived2(4,5)\n\
    Z.show()\n```\n\n# Output:\n\n```\n========= RUN C:/Python/Inheritance/InheritanceTree.py\
    \ =========\nData : 1\n1\nData : 3\nBase class data : 2\nData : 5\nBase class\
    \ data : 4\n```\n\n## 13.5 CLASS INTERFACE AND ABSTRACT CLASSES\n\nAt times the\
    \ classes are crafted so that they can be subclassed. While designing, there is\
    \ no intention of instantiating these classes. That is, these classes would not\
    \ be instantiated but would only be used to create derived classes that are called\
    \ abstract classes. In order to understand the concept, let us consider an example.\
    \ The following example has four classes: **BaseClass**, **Derived1**, **Derived2**,\
    \ and **Derived3**.\n\nThe **BaseClass** has two methods: **method1** and **method2**.\
    \ The first method has some tasks associated with it, whereas the second wants\
    \ the derived class to implement it. The derived class should, to be able to call\
    \ this method, must have a method called **action**. The first derived class (**Derived1**)\
    \ replaces **method1**. So, if an instance of **Derived1** calls **method1**,\
    \ the version defined in **Derived1** would be called. The second method extends\
    \ **method1**, it adds something to **method1** and also calls the **BaseClass**\
    \ version of **method1**. When **method1** is called from **Derived2**, the **BaseClass**\
    \ version is called, as the search in the inheritance tree invokes the base class\
    \ version of the method. The third derived class (**Derived3**) also implements\
    \ the **action** method defined in the base class. Note that when **method2**\
    \ is called through an instance of **Derived3**, the base class version of **method2**\
    \ is invoked. This version calls **action** and a new search is initiated, thus\
    \ resulting in the invocation of action of **Derived3**. Illustration 13.9 presents\
    \ the code.\n\nNote that the above concept can be extended, and a class may have\
    \ methods that would be implemented by the derived classes. Interestingly, Python\
    \ has a provision that such classes would not be instantiated until all such methods\
    \ are not defined. Such base classes are called abstract classes.\n\n# Illustration\
    \ 13.9:\n\nImplement the following hierarchy. “method1” of **Derived1** should\
    \ replace **method1** of the base class, **method1** of **Derived2** should extend\
    \ **method1** of the base class and **action** of **Derived3** should implement\
    \ **method2** of the **BaseClass**.\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_352_0.png)\n\
    \n**FIGURE 13.12** Class hierarchy for Illustration 13.9.\n\n# Solution:\n\n```python\n\
    class BaseClass:\n    def method1(self):\n        print(\"In BaseClass from method1\"\
    )\n    def method2(self):\n        self.action()\nclass Derived1(BaseClass):\n\
    \    def method1(self):\n        print(\"A new method, has got nothing to do with\
    \ that of the base class\")\nclass Derived2(BaseClass):\n    def method1(self):\n\
    \        print(\"A method that extends the base class method\")\n        BaseClass.method1(self)\n\
    class Derived3(BaseClass):\n    def action(self):\n        print(\"\\nImplementing\
    \ the base class method\")\n\nfor className in (Derived1, Derived2, Derived3):\n\
    \    print(\"\\nClass\\t:\",className)\n    className().method1()\nX=Derived3()\n\
    X.method2()\n```\n\n**Output:**\n\n```\nClass  : <class '__main__.Derived1'>\n\
    A new method, has got nothing to do with that of the base class\nClass  : <class\
    \ '__main__.Derived2'>\nA method that extends the base class method\nIn BaseClass\
    \ from method1\nClass  : <class '__main__.Derived3'>\nIn BaseClass from method1\n\
    Implementing the base class method\n```\n\n## 13.6 CONCLUSION\n\nThis chapter\
    \ introduced the concept of Inheritance, which is one of the most important ingredients\
    \ of Object-Oriented Programming. Inheritance, as explained in the chapter helps\
    \ the program in reusing the code and making the program more structured. However,\
    \ it should be used wisely, as in many cases, it leads to problems like ambiguity.\
    \ The reader must also appreciate that it is not always necessary to use inheritance.\
    \ Most of the tasks can be accomplished using composition. However, even if using\
    \ inheritance becomes a necessity, be clear about the type of inheritance required,\
    \ the type of methods calls required and the use of bound methods. The discussion\
    \ on Object-Oriented Programming Paradigms continues in the next chapter also,\
    \ wherein the concept of Operator Overloading has been introduced. The last chapter,\
    \ this chapter, and the next one would help the reader to successfully develop\
    \ software using OOP.\n\n# GLOSSARY\n\n- **Inheritance:** Inheritance is the process\
    \ of creating subclasses from existing classes.\n- **Base class and derived class:**\
    \ The class from which other classes are derived is the base class and the classes\
    \ that inherit from the base class are the derived classes.\n- **Implicit inheritance:**\
    \ In this type, the method of the base class can be called using an instance of\
    \ the derived class.\n- **Explicit overriding:** In this type of inheritance,\
    \ the derived class redefines the method of the base class and calling this method\
    \ using an instance of the derived class invokes the method of the derived class.\n\
    \n# POINTS TO REMEMBER\n\n- Inheritance provides reusability and increased reliability.\n\
    - Types of inheritance are Simple Inheritance, Multiple Inheritance, Multilevel\
    \ Inheritance, Hierarchical Inheritance, and Hybrid Inheritance.\n- Multiple inheritance\
    \ may lead to ambiguity.\n- A bound method has a “self” parameter whereas an unbound\
    \ method does not have “self” parameter.\n- A class can also be instantiated in\
    \ another class.\n- **super** can be used to access the base class methods.\n\
    - The inheritance tree is searched to find the version of the method to be invoked.\n\
    \n# EXERCISES\n\n## Multiple Choice Questions\n\n1. A class that cannot be instantiated\
    \ until all its methods have been defined by its subclass(es) is called\n(a) Abstract\
    \ class\n(b) Meta class"
  mdcn: "## 13.4 在继承树中搜索\n\n对象在继承树中以自底向上的方式被搜索。首先，类会搜索给定的对象。如果找到，则使用找到的对象来完成给定的任务。如果没有找到，则在其超类（基类）中搜索该对象。在存在多个基类的情况下，可能会出现歧义。\n\
    \n例如，在下面的示例中，**Derived1** 类派生自 **BaseClass**。该类的 **show()** 方法显示“**data1**”和“**data**”的值。前者存在于类中，因此其值会被显示。然而，如果前者不在类中，则会在继承树中搜索该对象。请注意，“**data**”存在于基类（**BaseClass**）中，因此其值会被显示。对于方法也是如此。即使派生类没有某个特定方法，如果该方法存在于父类或继承树中的任何其他类中，也可以调用它。\n\
    \n![](img/46b778b4f9252bd09c63fc5fba842fc6_350_0.png)\n\n**图 13.11** 给定示例的类层次结构。\n\
    \n# 代码：\n\n```python\nclass BaseClass:\n    def __init__(self,data):\n       \
    \ self.data=data\n    def show(self):\n        print(\"\\nData\\t:\",self.data)\n\
    \nclass Derived1(BaseClass):\n    def __init__(self,data,data1):\n        self.data1=data1\n\
    \        BaseClass.__init__(self,data)\n    def show(self):\n        print(\"\\\
    nData\\t:\",self.data1,\"\\nBase class data\\t:\",self.data)\n\nclass Derived2(BaseClass):\n\
    \    def __init__(self,data,data2):\n        self.data2=data2\n        BaseClass.__init__(self,data)\n\
    \    def show(self):\n        print(\"\\nData\\t:\",self.data2,\"\\nBase class\
    \ data\\t:\",self.data)\n\nX=BaseClass(1)\nX.show()\nprint(X.data)\nY=Derived1(2,3)\n\
    Y.show()\nZ=Derived2(4,5)\nZ.show()\n```\n\n# 输出：\n\n```\n========= RUN C:/Python/Inheritance/InheritanceTree.py\
    \ =========\nData : 1\n1\nData : 3\nBase class data : 2\nData : 5\nBase class\
    \ data : 4\n```\n\n## 13.5 类接口与抽象类\n\n有时，类被设计成可以被子类化。在设计时，并没有实例化这些类的意图。也就是说，这些类不会被实例化，而只会用于创建称为抽象类的派生类。为了理解这个概念，让我们考虑一个例子。以下示例包含四个类：**BaseClass**、**Derived1**、**Derived2**\
    \ 和 **Derived3**。\n\n**BaseClass** 有两个方法：**method1** 和 **method2**。第一个方法有一些相关的任务，而第二个方法希望派生类来实现它。派生类为了能够调用此方法，必须有一个名为\
    \ **action** 的方法。第一个派生类（**Derived1**）替换了 **method1**。因此，如果 **Derived1** 的实例调用\
    \ **method1**，将调用在 **Derived1** 中定义的版本。第二个方法扩展了 **method1**，它向 **method1** 添加了一些内容，并且也调用了\
    \ **BaseClass** 版本的 **method1**。当从 **Derived2** 调用 **method1** 时，会调用 **BaseClass**\
    \ 版本，因为在继承树中的搜索会调用该方法的基类版本。第三个派生类（**Derived3**）也实现了基类中定义的 **action** 方法。请注意，当通过\
    \ **Derived3** 的实例调用 **method2** 时，会调用 **method2** 的基类版本。此版本调用 **action** 并启动新的搜索，从而导致调用\
    \ **Derived3** 的 action。插图 13.9 展示了代码。\n\n请注意，上述概念可以扩展，一个类可能拥有将由派生类实现的方法。有趣的是，Python\
    \ 提供了一种机制，即在所有此类方法未被定义之前，此类不会被实例化。这样的基类称为抽象类。\n\n# 插图 13.9：\n\n实现以下层次结构。**Derived1**\
    \ 的 “method1” 应替换基类的 **method1**，**Derived2** 的 **method1** 应扩展基类的 **method1**，**Derived3**\
    \ 的 **action** 应实现 **BaseClass** 的 **method2**。\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_352_0.png)\n\
    \n**图 13.12** 插图 13.9 的类层次结构。\n\n# 解答：\n\n```python\nclass BaseClass:\n    def\
    \ method1(self):\n        print(\"In BaseClass from method1\")\n    def method2(self):\n\
    \        self.action()\nclass Derived1(BaseClass):\n    def method1(self):\n \
    \       print(\"A new method, has got nothing to do with that of the base class\"\
    )\nclass Derived2(BaseClass):\n    def method1(self):\n        print(\"A method\
    \ that extends the base class method\")\n        BaseClass.method1(self)\nclass\
    \ Derived3(BaseClass):\n    def action(self):\n        print(\"\\nImplementing\
    \ the base class method\")\n\nfor className in (Derived1, Derived2, Derived3):\n\
    \    print(\"\\nClass\\t:\",className)\n    className().method1()\nX=Derived3()\n\
    X.method2()\n```\n\n**输出：**\n\n```\nClass  : <class '__main__.Derived1'>\nA new\
    \ method, has got nothing to do with that of the base class\nClass  : <class '__main__.Derived2'>\n\
    A method that extends the base class method\nIn BaseClass from method1\nClass\
    \  : <class '__main__.Derived3'>\nIn BaseClass from method1\nImplementing the\
    \ base class method\n```\n\n## 13.6 结论\n\n本章介绍了继承的概念，这是面向对象编程最重要的组成部分之一。正如本章所解释的，继承有助于程序重用代码并使程序结构更加清晰。然而，应该明智地使用它，因为在许多情况下，它会导致歧义等问题。读者还必须认识到，并不总是需要使用继承。大多数任务可以通过组合来完成。然而，即使使用继承成为必要，也要清楚所需的继承类型、所需的方法调用类型以及绑定方法的使用。关于面向对象编程范式的讨论将在下一章继续，其中介绍了运算符重载的概念。上一章、本章和下一章将帮助读者成功地使用\
    \ OOP 开发软件。\n\n# 术语表\n\n- **继承：** 继承是从现有类创建子类的过程。\n- **基类和派生类：** 其他类从中派生的类是基类，从基类继承的类是派生类。\n\
    - **隐式继承：** 在这种类型中，可以使用派生类的实例调用基类的方法。\n- **显式重写：** 在这种类型的继承中，派生类重新定义基类的方法，并使用派生类的实例调用此方法会调用派生类的方法。\n\
    \n# 要点回顾\n\n- 继承提供了可重用性和更高的可靠性。\n- 继承的类型有简单继承、多重继承、多级继承、层次继承和混合继承。\n- 多重继承可能导致歧义。\n\
    - 绑定方法有一个 “self” 参数，而非绑定方法没有 “self” 参数。\n- 类也可以在另一个类中被实例化。\n- 可以使用 **super** 来访问基类方法。\n\
    - 搜索继承树以找到要调用的方法版本。\n\n# 练习\n\n## 多项选择题\n\n1. 一个类，直到其所有方法都被其子类定义后才能被实例化，称为\n(a)\
    \ 抽象类\n(b) 元类"
