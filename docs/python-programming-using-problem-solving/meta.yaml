    ```


    要将字符串转换为 **浮点数**，需要使用 **float()** 函数。在以下代码片段中，用户输入的数字被转换为 **浮点数**，然后一个名为 **num**
    的变量指向存储该数字的位置。


    **代码：**


    ```

