    # ## 2.2 FEATURES OF PYTHON


    As stated earlier, Python is a simple but powerful language. It is portable and
    free. It has built-in object types and many libraries. This section briefly discusses
    the features of Python.


    # ### 2.2.1 Easy


    Python is easy to learn and understand. As a matter of fact, if you are from a
    programming background, you would find it elegant and uncluttered. The removal
    of braces and parenthesis makes the code short and sweet. Also, some of the tasks
    in Python are quite easy. For example, swapping numbers in Python is as easy as
    writing $(a, b) = (b, a)$.


    It may also be stated here that learning something new is an involved and intricate
    task. However, the simplicity of Python makes this learning almost a cakewalk.
    Moreover, learning its advanced features, though a bit intricate, but worth the
    effort. It is also easy to understand a project written in this language. The
    code is concise and effective, which makes it understandable.'
  - '[PAGE 56]


    # 2.2.2 Type and Run


    In most of the projects, testing something new requires scores of changes and
    hence recompilations and re-runs. This makes testing code a difficult and time-consuming
    task. In Python, code can be executed easily. As a matter of fact, we run scripts
    in Python. As we will see later in this chapter, it also provides users with an
    interactive environment to run independent commands.


    # 2.2.3 Syntax


    The Syntax of Python is easy; this makes the learning and understanding process
    easy. The three main features that make this language attractive are that it is
    simple, small, and flexible.


    # 2.2.4 Mixing


    If one is working on a big project, with a big team, it might be the case that
    some team members are good in other languages. This may lead to some of the modules,
    in some other language, wanting to be embedded with the Python code. Python, in
    fact, allows and even supports this.


    # 2.2.5 Dynamic Typing


    Python has its own way of managing memory associated with objects. When an object
    is created in Python, memory is dynamically allocated to it. When the object’s
    life cycle ends, the memory is taken back from it. This memory management of Python
    makes the programs more efficient.


    # 2.2.6 Built-in Object Types


    As we will see in the next chapter Python has built-in object types. This makes
    the task, to be accomplished, easy, and manageable. Moreover, the issues related
    to these objects are beautifully handled by the language.'
- md: '## 2.2.7 Numerous Libraries and Tools


    In Python, the task to be accomplished becomes easy, really easy. This is because
    most of the common tasks (as a matter of fact, not so common tasks also), have
    already been handled in Python. For example, it has libraries that help users
    to develop GUIs, write mobile applications, incorporate security features, and
    even read MRIs. As we will see in the following chapters, the libraries and supporting
    tools make even intricate tasks like pattern recognition easy.


    ## 2.2.8 Portable


    A program written in Python can run on almost every known platform. Be it Windows,
    Linux, or Mac. It may also be stated here that Python is written in C. However,
    some versions of this language are written in JAVA as well.


    ## 2.2.9 Free


    Python is not propriety software. One can download Python compilers; from among
    the various available choices. Moreover, no known legal issues are involved in
    the distribution of the code developed in Python.


    ## 2.3 THE PARADIGMS


    This section briefly introduces the three major paradigms. Note that Python fully
    supports the first two: procedural and object-oriented programming. However, it
    also supports some other features like tail optimization, etc.


    ### 2.3.1 Procedural


    In procedural language, a program is a set of statements that execute sequentially.
    The only option a program has in terms of manageability is dividing the program
    into small modules. “C,” for example, is a procedural language. Python supports
    procedural programming. The fifth section of this book deals with procedural programming.


    ### 2.3.2 Object-Oriented


    This type of language primarily focuses on instances of a class. The instance
    of a class is called object. A class, here, is a real or a virtual entity, having
    importance to the problem at hand, and has sharp physical boundaries. For example,
    in a program that deals with student management, “student” can be a class. Its
    instances are made, and the task at hand can be accomplished by communicating
    via methods. Python is object-oriented language. Section III of this book deals
    with object-oriented programming.


    ### 2.3.3 Functional


    In functional programming, each computation is treated as the result of the evaluation
    of a mathematical function. Python also supports functional programming. Moreover,
    Python supports immutable data, tail optimization, etc. This must be music to
    the ears of those from a functional programming background. Here, it may be stated
    that functional programming is beyond the scope of this book. However, some of
    the above features will be discussed in the chapters that follow.


    ## 2.4 CHRONOLOGY AND USES


    This section briefly discusses Python’s chronology and motivates the reader to
    bind with the language.


    ### 2.4.1 Chronology


    Python, which is a multiparadigm language, was conceived in the late 1980s. The
    implementation of Python began in December 1989, when Guido Van Rossum, who was
    working in Centrum Wiskunde & Informatica, decided to do something useful during
    his Christmas holidays. He actually wanted to work on the successor of the ABC
    programming language.


    The next version, Python 2, was released on October 16, 2000, followed by Python
    3, released on December 3, 2008. However, it was not backward compatible. In 2017,
    Google announced work on Python 2.7.


    Some languages, like Perl, believe in providing options as more than one way of
    doing a task. On the other hand, Python believes in the fact that there is one
    obvious way of doing a task and therefore has a small core. Python supports object-oriented
    programming and procedural programming. It partly supports functional programming.
    Even though it has a small core, the standard library support is vast. It is simple,
    less cluttered, and has an extendible interpreter.


    The principles on which Python is based can be seen by typing `import this` in
    the interpreter. This presents the “Zen of Python.”


    ```

    >>import this

    ```


    ```

    The Zen of Python, by Tim Peters

    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    Complex is better than complicated.

    Flat is better than nested.

    Sparse is better than dense.

    Readability counts.

    Special cases aren’t special enough to break the rules.

    Although practicality beats purity.

    Errors should never pass silently.

    Unless explicitly silenced.

    In the face of ambiguity, refuse the temptation to guess.

    There should be one-- and preferably only one --obvious way to do it.

    Although that way may not be obvious at first unless you’re Dutch.

    Now is better than never.

    Although never is often better than *right* now.

    If the implementation is hard to explain, it’s a bad idea.

    If the implementation is easy to explain, it may be a good idea.

    Namespaces are one honking great idea -- let’s do more of those!

    ```


    It may also be stated that Python rejects the patches that provide marginal speed
    increases instead of a less understandable code. The features of Python have been
    discussed in the next section of this chapter. It may be stated that those following
    the above rules are said to use a Pythonic way of programming.


    The continuous betterment of this language has been possible because of a dedicated
    group of people committed to supporting the cause of providing the world with
    an easy yet powerful language. The growth of this language has given rise to the
    creation of many interest groups and forums for Python. A change in the language
    can be bought about by what is generally referred to as PEP (Python Enhancement
    Project). The PSF (Python Software Foundation) takes care of this.


    ### 2.4.2 Uses


    Python is being used to accomplish many tasks, the most important of which are
    as follows.


    - GUI development

    - Scripting Web Pages

    - Database Programming

    - Prototyping

    - Gaming

    - Component-based programming


    If you are working in Unix or Linux, you need not install Python because it is
    generally pre-installed. If you work on Windows or Mac, you need to download Python.
    Once you have decided to download Python, look for its latest version. The reader
    is requested to ensure that the version they intend to download is not an alpha
    or a beta version. The next section briefly discusses the steps for downloading
    Anaconda, an open-source distribution.


    Many development environments are available for Python. Some of them are as follows.


    1. PyDev with Eclipse

    2. Emacs

    3. Vim

    4. TextMate

    5. Gedit

    6. Idle

    7. PIDA (Linux) (VIM Based)

    8. NotePad++ (Windows)

    9. BlueFish (Linux)


    There are some more options available. However, this book uses IDLE and Anaconda.
    The next section presents the steps involved in the installation of Anaconda.


    ## 2.5 INSTALLATION OF ANACONDA


    In order to install Anaconda, go to https://docs.continuum.io/anaconda/install
    and select the installer (Windows or Mac OS or Linux). This section presents the
    steps involved in installing Anaconda on the Windows Operating System.


    First, one must choose the installer based on their processor (32-bit or 64-bit).
    After this, click on the selected installer and download the executable file.
    The installer would ask you to install the software on the default location. It
    may happen that during installation, you might have to disable the anti-virus
    software. Figure 2.2(a)–(g) takes the reader through the installation.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_62_0.png)


    **FIGURE 2.2(a)** The welcome screen of the installer asks the user to close all
    running applications and then click Next.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_62_1.png)


    **FIGURE 2.2(b)** The Licence agreement to install Anaconda3 4.3.0 (32-bit).


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_63_0.png)


    **FIGURE 2.2(c)** In the third step, the user is required to choose whether he
    wants to install Anaconda for a single user or for all users.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_63_1.png)


    **FIGURE 2.2(d)** The user then needs to select the folder in which it will install.'
  mdcn: '## 2.2.7 丰富的库和工具


    在Python中，要完成的任务变得简单，非常简单。这是因为大多数常见任务（实际上，一些不那么常见的任务也一样）在Python中都已有现成的解决方案。例如，它拥有帮助用户开发图形用户界面、编写移动应用程序、集成安全功能，甚至读取核磁共振成像的库。正如我们将在后续章节中看到的，这些库和辅助工具使得像模式识别这样复杂的任务也变得简单。


    ## 2.2.8 可移植性


    用Python编写的程序几乎可以在所有已知平台上运行。无论是Windows、Linux还是Mac。这里也可以说明，Python是用C语言编写的。然而，该语言的某些版本也是用JAVA编写的。


    ## 2.2.9 免费


    Python不是专有软件。人们可以从各种可用选择中下载Python编译器。此外，分发用Python开发的代码不涉及任何已知的法律问题。


    ## 2.3 编程范式


    本节简要介绍三种主要的编程范式。请注意，Python完全支持前两种：过程式编程和面向对象编程。然而，它也支持一些其他特性，如尾调用优化等。


    ### 2.3.1 过程式


    在过程式语言中，程序是一组按顺序执行的语句。程序在可管理性方面的唯一选择是将程序划分为小模块。例如，“C”就是一种过程式语言。Python支持过程式编程。本书的第五部分将讨论过程式编程。


    ### 2.3.2 面向对象


    这种语言主要关注类的实例。类的实例称为对象。这里的类是一个真实或虚拟的实体，对当前问题很重要，并且有明确的物理边界。例如，在一个处理学生管理的程序中，“学生”可以是一个类。创建它的实例，并通过方法进行通信来完成手头的任务。Python是一种面向对象的语言。本书的第三部分将讨论面向对象编程。


    ### 2.3.3 函数式


    在函数式编程中，每个计算都被视为数学函数求值的结果。Python也支持函数式编程。此外，Python支持不可变数据、尾调用优化等。对于有函数式编程背景的人来说，这无疑是好消息。这里需要说明的是，函数式编程超出了本书的范围。然而，上述一些特性将在后续章节中讨论。


    ## 2.4 历史沿革与用途


    本节简要讨论Python的历史沿革，并激励读者与这门语言建立联系。


    ### 2.4.1 历史沿革


    Python是一种多范式语言，构思于20世纪80年代末。Python的实现始于1989年12月，当时在Centrum Wiskunde & Informatica工作的Guido
    Van Rossum决定在圣诞假期做些有用的事情。他实际上想开发ABC编程语言的后续版本。


    下一个版本Python 2于2000年10月16日发布，随后是Python 3，于2008年12月3日发布。然而，它并不向后兼容。2017年，Google宣布停止对Python
    2.7的支持。


    一些语言，如Perl，相信提供多种方式来完成一项任务。另一方面，Python相信完成一项任务应该有一种显而易见的方式，因此其核心很小。Python支持面向对象编程和过程式编程。它部分支持函数式编程。尽管它的核心很小，但标准库支持非常广泛。它简单、不杂乱，并且拥有可扩展的解释器。


    Python所基于的原则可以通过在解释器中输入`import this`来查看。这会呈现“Python之禅”。


    ```

    >>import this

    ```


    ```

    The Zen of Python, by Tim Peters

    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    Complex is better than complicated.

    Flat is better than nested.

    Sparse is better than dense.

    Readability counts.

    Special cases aren’t special enough to break the rules.

    Although practicality beats purity.

    Errors should never pass silently.

    Unless explicitly silenced.

    In the face of ambiguity, refuse the temptation to guess.

    There should be one-- and preferably only one --obvious way to do it.

    Although that way may not be obvious at first unless you’re Dutch.

    Now is better than never.

    Although never is often better than *right* now.

    If the implementation is hard to explain, it’s a bad idea.

    If the implementation is easy to explain, it may be a good idea.

    Namespaces are one honking great idea -- let’s do more of those!

    ```


    还需要说明的是，Python拒绝那些只能带来边际速度提升却使代码更难理解的补丁。Python的特性将在本章的下一节中讨论。可以说，遵循上述规则的人使用的是Pythonic的编程方式。


    这种语言的持续改进得益于一个致力于为世界提供一门简单而强大的语言的专门团队。这种语言的发展催生了许多Python兴趣小组和论坛。语言的变更通常通过所谓的PEP（Python增强提案）来实现。PSF（Python软件基金会）负责此事。


    ### 2.4.2 用途


    Python被用于完成许多任务，其中最重要的如下：


    - 图形用户界面开发

    - 网页脚本编写

    - 数据库编程

    - 原型设计

    - 游戏开发

    - 基于组件的编程


    如果你在Unix或Linux上工作，你不需要安装Python，因为它通常是预装的。如果你在Windows或Mac上工作，你需要下载Python。一旦你决定下载Python，请寻找其最新版本。请读者确保他们打算下载的版本不是alpha或beta版本。下一节将简要讨论下载开源发行版Anaconda的步骤。


    Python有许多可用的开发环境。其中一些如下：


    1. PyDev with Eclipse

    2. Emacs

    3. Vim

    4. TextMate

    5. Gedit

    6. Idle

    7. PIDA (Linux) (VIM Based)

    8. NotePad++ (Windows)

    9. BlueFish (Linux)


    还有更多选择。然而，本书使用IDLE和Anaconda。下一节将介绍安装Anaconda的步骤。


    ## 2.5 安装Anaconda


    要安装Anaconda，请访问 https://docs.continuum.io/anaconda/install 并选择安装程序（Windows或Mac
    OS或Linux）。本节介绍在Windows操作系统上安装Anaconda的步骤。


    首先，必须根据处理器（32位或64位）选择安装程序。之后，单击所选安装程序并下载可执行文件。安装程序会要求你将软件安装在默认位置。在安装过程中，你可能需要禁用防病毒软件。图2.2(a)–(g)将引导读者完成安装过程。


