    # 17.5 COVARIANCE


    The covariance of two sets is a tool that helps us to compare two arrays. The
    covariance gives an idea about how close the datasets are. If the value of covariance
    is a large positive number, it indicates that the two variables are highly correlated
    and the increase in one results in an increase in others. In case of a high negative
    correlation, the two variables are highly correlated and the increase in one results
    in a decrease in others. Zero correlation indicates the variables are not related.
    It can be calculated as follows.


    For a set $X = \{x_1, x_2, ..., x_n\}$ and $Y = \{y_1, y_2, ..., y_n\}$


    $$Cov(X,Y) = \frac{\sum_{i=1}^{n}(x_i - \bar{x})(y_i - \bar{y})}{n-1}$$


    Where,


    $$\bar{x} = \frac{x_1 + x_2 + ... + x_n}{n} \text{ and } \bar{y} = \frac{y_1 +
    y_2 + ... + y_n}{n}$$


    Covariance can be found by using the following code.


    # Code:


    ```

    X=np.random.randint(5,90,20)

    Y=np.random.randint(5,100,20)

    dev_x=X-np.mean(X)

    dev_y=Y-np.mean(Y)

    cov1=(np.dot(dev_x, dev_y))/20

    print(cov1)

    ```'
