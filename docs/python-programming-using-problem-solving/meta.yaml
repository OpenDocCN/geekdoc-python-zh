  md: '+   - **Inheritance:** Inheritance is the process of creating subclasses from
    existing classes.

    - **Base class and derived class:** The class from which other classes are derived
    is the base class and the classes that inherit from the base class are the derived
    classes.

    - **Implicit inheritance:** In this type, the method of the base class can be
    called using an instance of the derived class.

    - **Explicit overriding:** In this type of inheritance, the derived class redefines
    the method of the base class and calling this method using an instance of the
    derived class invokes the method of the derived class.


