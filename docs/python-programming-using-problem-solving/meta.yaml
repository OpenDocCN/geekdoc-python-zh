  md: 'Dictionaries in Python are also a kind of associate arrays. They contain key-value
    pairs, where a key can be any nonmutable data structure like a string, tuple,
    etc. In Python, one can create a dictionary using curly braces. The elements of
    a dictionary are separated by a comma and each element has two parts: a key and
    a value. The key, in a dictionary, can be any immutable object e.g., a string.
    The value corresponding to a particular key is written by putting a colon after
    the key. For example, the following statement creates a dictionary called **PersonAge**.
    The first element of the dictionary has “Harsh” as a key and the value corresponding
    to this key is 100. The second element of the dictionary has “Rohan” as its key
    and the value corresponding to this key is 21 and the third element of the dictionary
    has “Tarush” as key and the value corresponding to this key is 21. The **print**
    function can be used to print the dictionary. The dictionary has been shown in
