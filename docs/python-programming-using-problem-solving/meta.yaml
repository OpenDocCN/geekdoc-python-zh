    # 10.3.2 The Replication Operator (*)


    The replication operator in Python, replicates the strings as many times as the
    first operand. The operator operates on two operands: the first being a number
    and the second being a string. The result is a string in which the input string
    is repeated as many times as the first argument. In the example that follows,
    the result has been stored in a variable called **result1**.


    ```

    name=input(''Enter your name\t:'')

    print(''Hi'', '' '', name)

    str1=input(''Enter a string\t:'')

    num=int(input(''Enter a number\t:''))

    result1=num*str1

    print(result1)

    ```


    # Output:


    ```

    >>>

    ==================== RUN C:/Python/String/operator2.py ====================

    Enter your name :harsh

    Hi harsh

    Enter a string :abc

    Enter a number :4

    abcabcabcabc

    >>>

    ```


    # 10.3.3 The Membership Operator


    The membership operator checks whether a given string is in a given list or not.
    The operator returns a **True**, if the first string is a part of the given list,
    otherwise it returns a **False**.'
