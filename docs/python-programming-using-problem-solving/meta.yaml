    \ the inheritance tree is searched for the object. Note that “**data**” exists\
    \ in the base class (**BaseClass**) and hence its value would be displayed. This\
    \ is true for methods also. Even if the derived class does not have a particular\
    \ method, it can be invoked if it exists in the parent class or in any other class,\
    \ up in the inheritance tree."
