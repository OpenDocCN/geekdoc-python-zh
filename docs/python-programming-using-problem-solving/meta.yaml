  md: "[0. 0. 1.]]\n\n# 16.7 INDEXING\n\nA **numpy** 1-D array is zero-based indexed.\
    \ The first element of the array can be accessed by writing the name of the array\
    \ followed by square brackets containing 0, that is\n\nIf arr=[364, 3748, 347,\
    \ 849, 374], then **arr[0]** is 364.\n\nLikewise, the second element can be accessed\
    \ using **arr[1]**, the third by **arr[2]**, and so on. The last element can be\
    \ accessed by writing **arr[-1]**. The second last element is accessed by writing\
    \ **arr[-2]** and so on. Figure 16.3 presents examples of the indexes of a given\
    \ array.\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_424_0.png)\n\nIn the case\
    \ of 2-D arrays, **arr[i, j]** indicates the element at the i<sup>th</sup> row\
    \ and the j<sup>th</sup> column. For example, consider an array with 5 rows and\
    \ 3 columns, wherein each element is between 7 and 80. The array can be generated\
    \ by writing the following code.\n\n**Code:**\n\n```\narr1=np.random.randint(7,80,(5,3))\n\
    print(arr1)\n```\n\n**Output:**\n\n```\n[[46 69 53]\n [79 52 53]\n [69 60 12]\n\
    \ [38 32 76]\n [ 7 40 75]]\n```"
