    ## 21.2.1 Functions: Head, Tail, and Describe


    ### 21.2.1.1 head()


    The **head()** function displays the first five rows of a **Data Frame**. For
    example, **Students_df.head()** displays the first five rows of **Students_df**.


    ### 21.2.2 tail()


    The **tail()** function displays the last five rows of a **Data Frame**. For example,
    **Students_df.tail()** displays the last five values of **Students_df**.


    ### 21.2.3 columns


    This displays the **column(s)** of the given **Data Frame**. For example, **Students_df.columns**
    show the columns of the **Data Frame Students_df**.


    Code:


    ```

    Students_df.columns

    ```


    Output:

    Index([''Names'', ''Age'', ''Perc_Prev''], dtype=''object'')


    ### 21.2.4 describe()


    The **describe** method of the **Data Frame** object displays the following information
    about the numeric columns of a **Data Frame**:


    - **count**: This gives the number of the items in the Column.

    - **mean**: This gives the average of the items in the Column.

    - **min**: This gives the minimum of the items in the Column.

    - **max**: This gives the maximum of the items in the Column.

    - **25%, 50%, 75%**: These three denote the 25%, 50% and the 75% values.

    - **std**: This gives the standard deviation of the items in the Column.


    An example of the describe function is as follows.


    Code:

    ```

    Students_df.describe()

    ```


    Output:


    | _ | Age | Perc_Prev |

    |---|---|---|

    | count | 11.000000 | 11.000000 |

    | mean | 18.909091 | 85.063636 |

    | std | 1.300350 | 7.983267 |

    | min | 17.000000 | 67.000000 |

    | 25% | 18.000000 | 79.650000 |

    | 50% | 19.000000 | 89.000000 |

    | 75% | 20.000000 | 90.600000 |

    | max | 21.000000 | 92.000000 |


    ## 21.3 BOOLEAN INDEX


    In a **Data Frame**, the required condition can be specified inside the square
    brackets, to get the rows that satisfy the given condition. For example, to display
    the records in which the age of a student is greater than 19 from the **Students_df**,
    the following code can be written.


    **Code:**


    ```

    Students_df[Students_df[''Age'']>18]

    ```


    **Output:**


    | Names | Age | Perc_Prev |

    |---|---|---|

    | 1 | Ajay | 19 | 90.2 |

    | 4 | Amay | 19 | 92.0 |

    | 5 | Biyoy | 20 | 91.0 |

    | 6 | Bimal | 21 | 90.0 |

    | 7 | Binay | 20 | 89.0 |

    | 8 | Darvesh | 19 | 92.0 |

    | 10 | Ela | 20 | 67.0 |


    Likewise, you can state any Boolean statement involving a column, in the square
    brackets.


    ## 21.4 SORTING, DESCRIPTIVE STATISTICS, AND APPLYING STRING FUNCTIONS


    This section discusses the various methods of the **Data Frame** data structure
    of **Pandas**: to sort the values of a **Column**, find the minimum value, maximum
    value, the mean, median, mode, and standard deviation of the values in a column.


    ### 21.4.1 sort_values()


    This method sorts the items of the given **Column** of a **Data Frame**. This
    also displays the indexes of the sorted arrays. For example, **Students_df[''Age''].sort_values()**
    sorts the elements of the columns “Age.”


    **Code:**


    ```

    Students_df[''Age''].sort_values()

    ```


    **Output:**


    ```

    2 17

    9 17

    0 18

    3 18

    1 19

    4 19

    8 19

    5 20

    7 20

    10 20

    6 21

    Name: Age, dtype: int64

    ```


    ### 21.4.2 Finding Maximum, Minimum, Median, Standard Deviation, Mean, and Count
    of Values


    The following methods (Table 21.1) help us to get the required statistics from
    a column of a given **Data Frame**.


    **TABLE 21.1** Functions to find the maximum, minimum, sum, median, standard deviation,
    variance, mode, quantile, and value count of a column of a Data Frame.


    | Name of the function | Explanation | Example | Output |

    | :--- | :--- | :--- | :--- |

    | **max** | This function finds the maximum value from the specified column of
    a Data Frame. | Students_df[''Age''].max() | 21 |

    | **min** | This function finds the minimum value from the specified column of
    a Data Frame. | Students_df[''Age''].min() | 17 |

    | **sum** | This function finds the sum of values from the specified column of
    a Data Frame. | Students_df[''Age''].sum() | 208 |

    | **median** | This function finds the median of the value from the specified
    column of a Data Frame. | Students_df[''Age''].median() | 19.0 |

    | **std** | This function finds the standard deviation of values from a given
    column of a Data Frame. | Students_df[''Age''].std() | 1.3003 |

    | **var** | This function finds the variance of values from the specified column
    of a Data Frame. | Students_df[''Age''].var() | 1.6909 |

    | **mode** | This function finds the mode of values from the specified column
    of a Data Frame. | Students_df[''Age''].mode() | 0    19<br>1    20<br>dtype:
    int64 |

    | **quantile** | This function finds the quantile of values from the specified
    column of a Data Frame. For example, quantile(0.25) finds the 25th quantile and
    quantile(0.50) finds the 50th quantile of a given column of a Data Frame. | Students_df[''Age''].quantile(0.25)<br>Students_df[''Age''].quantile(0.75)
    | 18.0<br>19.0 |

    | **value_counts** | This function counts the frequencies of values in the specified
    column of a Data Frame. | c=Students_df[''Age''].value_counts()<br>print(c) |
