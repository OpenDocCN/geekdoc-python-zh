    \ r, n):\n    i=1;\n    while i<=n:\n        yield(a*pow(a, i-1))\n        i+=1\n\
    \na=int(input('Enter the first term of the geometric progression\\t:'))\nr=int(input('Enter\
    \ the common ratio of the geometric progression\\t:'))\nn=int(input('Enter the\
    \ number of terms of the geometric progression\\t:'))\ngp=geometric_progression(a,\
    \ r, n)\nfor i in gp:\n    print(i)\n>>>\n```"
