    \n**FIGURE 19.4** Types of Frequency Plots.\n\n# How to draw a Frequency Plot\n\
    \nTo draw the frequency plot,\n\n+   - Draw the histogram.\n- Join the center\
    \ of the bars of the histogram.\n\n# EXAMPLE 2:\n\nConsider the following array:\n\
