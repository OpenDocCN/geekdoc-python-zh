  md: "# Illustration 5.9:\n\nAsk the user to enter the number of rows and write a\
    \ program to generate the following pattern in Python.\n\n```\n    *\n   ***\n\
    \  *****\n *******\n*********\n```\n\n# Solution:\n\nThe value of **i** denotes\
    \ the row number in the following program. In each row, the number of stars is\
    \ equal to the row number. The values of **k**, in each iteration, denote the\
    \ number of stars in each row, which ranges from 0 to **(2*i +1)**. This loop\
    \ is, therefore, nested. The leading spaces are governed by the value of **j**,\
    \ which ranges from 0 to **(m - i -1)**. This is because if the value of **i**\
    \ is 0, the number of spaces should be 4 (if the value of n is 5). In case the\
    \ value of **i** is 1, the number of spaces should be 3 and so on. Also, note\
    \ that after the inner loop ends, a new line is printed using the **print()**\
    \ function.\n\n# Program:\n\n```\nn = input('Enter the number of rows')\nm = int(n)\n\
    for i in range(m):\n    for j in range(0, (m-i-1)):\n        print(' ', end=\"\
    \")\n    for k in range(0, 2*i+1):\n        print('*',end=\"\")\n    print()\n\
    ```\n\n# Output:\n\n```\nEnter the number of rows6\n    *\n   ***\n  *****\n *******\n\
    ```"
