    # CHAPTER 12


    # CLASSES AND OBJECTS


    # Objectives


    After reading this chapter, the reader should be able to


    +   - Understand how to create a class in Python

    - Instantiate a class

    - Differentiate between instance and class variables

    - Use constructors and destructors

    - Understand the types of Constructors


    # 12.1 INTRODUCTION TO CLASSES


    A class is a real or a virtual entity, having importance to the problem at hand
    and sharp physical boundaries. The concept of classes has been discussed in the
    previous chapter. This chapter takes the discussion forward and explores the issues
    involved in the implementation. It is easier to make a class in Python as compared
    to other programming languages. A class, in Python, can hold any kind and any
    amount of data. Those with C++ background might find the syntax and use of variables
    odd. The mechanism of classes in Python is inspired not just by C++ but also by
    Modula-3.


    A class in Python can be **subclassed**. All types of inheritance including **multiple
    inheritance** are supported in Python. **Method overriding** is also allowed in
    Python. The dynamic nature of classes makes Python stand apart from other languages.
    Classes can be created at runtime.'
- md: "In a class, all data members are **public** in nature. That is, they can be\
    \ accessed anywhere in the program. The member functions in a class are all **virtual**.\
    \ In a class, all the member functions must have the first argument as the object\
    \ representing that class, henceforth referred to as **self**. Interestingly,\
    \ all the build types are themselves classes, and they can be extended by the\
    \ programmer.\n\nNote that multiple names can be associated with the same object.\
    \ This gives the programmer the same power as that in languages supporting pointers.\
    \ Using pointers, for example, an object can be passed to a function using just\
    \ one argument, and the change done by the function is visible in the calling\
    \ function. In the case of Python, **aliasing** (having multiple names for the\
    \ same object) can be used to accomplish the above task.\n\nThis chapter has been\
    \ organized as follows. [Section 12.2](#) discusses the definition of a class,\
    \ and [Section 12.3](#) explains the creation of an object. [Section 12.4](#)\
    \ discusses the scope of data members, and [Section 12.5](#) presents the concept\
    \ of nesting. [Section 12.6](#) discusses constructors, and [Sections 12.7](#)\
    \ and [12.8](#) present a brief discussion on overloading and destructors. The\
    \ last section concludes.\n\n## 12.2 DEFINING A CLASS\n\nIn Python, a class can\
    \ be defined using the **class** keyword. The **class** keyword is followed by\
    \ the name of the class. This is followed by the body of the class (at proper\
    \ indentation).\n\n**Syntax**\n\n```\nclass <name of the class>:\n    def <function\
    \ name>(<arguments>):\n        ...\n    <members>\n```\n\nConsider, for example,\
    \ the **employee** class, having data members **name** and **age** and member\
    \ functions **getdata()** and **putdata()**. It was stated earlier that every\
    \ function in the class must have at least one argument, which is **self**. The\
    \ functions of a class are defined in the traditional way. The **getdata()** function\
    \ asks for the values of **name** and **age** of the user. The data members are\
    \ accessed via **self**, as they belong to the class and not just the function.\
    \ Likewise, the **putdata()** function displays the values of the data members.\
    \ Note that the members of a class are accessed via **self**.\n\n> TIP!\n- *A\
    \ class definition has functions but can also have other members.*\n\n## 12.3\
    \ CREATING AN OBJECT\n\nAn object is created by associating a name with an instance\
    \ of the class, initialized using the default constructor. For example, in creating\
    \ an Object of the `employee` class, the following statements are used.\n\n```\n\
    e1=employee()\n```\n\nHere, **e1** is the name of the object and **employee()**\
    \ is the constructor of the class. An Object can also be created using a parameterized\
    \ constructor, as explained in the following sections. The creation of an object\
    \ is referred to as **instantiation**.\n\nThe function of a class can be called\
    \ using the dot operator. For example, to call the **getdata()** function of the\
    \ employee class, the following statements are used.\n\n```\ne1.getdata()\n```\n\
    \nLikewise, the other methods of a class can be called using the dot operator.\n\
    \n```\nCode:\nclass employee:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\ne1= employee()\n\
    e1.getdata()\ne1.putdata()\n>>>\n```\n\n```\n==================== RUN C:/Python/Class/employee.py\
    \ ====================\nEnter name :Harsh\nEnter age :28\nName : Harsh\nAge :\
    \ 28\n>>>\n```\n\n**TIP!**\n\n*An object supports the following operations:*\n\
    \n- Instantiation\n- Attribute references\n\n## 12.4 SCOPE OF DATA MEMBERS\n\n\
    The **scope** of a namespace is the region where it is directly accessible. In\
    \ fact, in Python, scopes are used dynamically. In determining the scope of a\
    \ namespace, the following rules are followed.\n\n- First of all, the innermost\
    \ scope is searched\n- Then the scope of enclosing functions is searched\n- This\
    \ is followed by searching the global namespaces\n- Finally, the build in names\
    \ are seen\n\nThe nonlocal statements rebind the variables in the global scope.\
    \ In order to understand this concept, consider the following code. The following\
    \ points, concerning the code, are worth noting.\n\n- The value of **a** for all\
    \ instances of the class is 5, until a function, that changes the value of **a**,\
    \ is called.\n- In **putdata()**, **a** does not exists, **a** is local to **getdata()**\n\
    - **b** can be accessed in both the functions as **b** is a data member of the\
    \ class (note that every time **b** is called, **self.b** is used)\n\nOn the basis\
    \ of the above discussion, the user is expected to find out why the following\
    \ code produces the following output.\n\n**Code:**\n\n```\nclass demo_class:\n\
    \    a=5\n    def getdata(self,b):\n        a=7;\n        self.b=b\n    def putdata(self):\n\
    \        print('The value of \\'a\\' is',a,'and that of \\'b\\' is',self.b)\n\n\
    d=demo_class()\nd.getdata(9)\nd.putdata()\nd.putdata()\n    File \"C:/Python/Class/variable_visibility.py\"\
    , line 7, in putdata\n    print('The value of \\'a\\' is',a,'and that of \\'b\\\
    ' is',self.b)\nNameError: name 'a' is not defined\n```\n\nIn the following code\
    \ **b** is a member of the class. Here, **self.b=b** means the data member **b**\
    \ of the class (**self.b**) is assigned value **b**, which is the second argument\
    \ of the function **getdata()**. **c** is local to **getdata()**, so **c** of\
    \ **getdata()** is not same as that of **putdata()**.\n\n### Definition: Instance\
    \ Variable and Class Variable\n\nAn instance variable is unique to each instance,\
    \ and all instances share a class variable. In the following code, **b** can be\
    \ assigned a different value for each instance, but **c** remains the same.\n\n\
    **Code:**\n\n```\nclass demo_class:\n    a=5\n    def getdata(self,b):\n     \
    \   c=7;\n        self.b=b\n        print('\\'c\\' is ',c,' and \\'b\\' is ',self.b)\n\
    \    def other_function(self):\n        c=3\n        print('Value',c)\n    def\
    \ putdata(self):\n        print('\\'b\\' is',self.b)\n```\n\n```\nd=demo_class()\n\
    d.getdata(9)\nprint(d.a)\nd.other_function()\nd.putdata()\ne=demo_class()\nprint(e.a)\n\
    >>>\n```\n\n```\n==========      RUN      C:/Python/Class/variable_visibility2.py\n\
    ==========\n```\n\n'c' is 7 and 'b' is 9\n5\nValue 3\n'b' is 9\n5\n\nIn addition\
    \ to the above, a global data member can be made outside the class, which is accessible\
    \ to all the methods (until the scope of the data member is changed). In the following\
    \ code, **a** is common for all instances of the class, **b** is a data member\
    \ of the class, **f** is global, and **c** is a local variable.\n\n**Code:**\n\
    \n```\nglobal f\nf=7\nclass demo_class:\n    a=5\n    def getdata(self,b):\n \
    \       c=7;\n        self.b=b\n        print('\\'c\\' is ',c,' and \\'b\\' is\
    \ ',self.b,'\\'f\\'',f)\n    def other_function(self):\n        c=3\n        print('Value',c)\n\
    \    def putdata(self):\n        print('\\'b\\' is',self.b)\n\nd=demo_class()\n\
    d.getdata(9)\nprint(d.a)\nd.other_function()\nd.putdata()\ne=demo_class()\nprint(e.a)\n\
    >>>\n==========      RUN      C:/Python/Class/variable_visibility2.py\n==========\n\
    'c' is 7 and 'b' is 9 'f' 7\n5\nValue 3\n'b' is 9\n5\n```\n\n## 12.5 NESTING\n\
    \nThe designing of a class requires conceptualization of an entity, which has\
    \ attributes and behavior. The object can be used in another class also. That\
    \ is, a class can also have the objects of another class as its members. This\
    \ is called nesting. Note that the attributes of a class can themselves be entities.\
    \ For example, in the following code, an instance of the **date** class is created\
    \ in the **student** class. This makes sense, as **student** is an entity having\
    \ attributes that are themselves objects (like date).\n\n**Code:**\n\n```\nclass\
    \ date:\n    def getdata(self):\n        self.dd=input('Enter date (dd)\\t:')\n\
    \        self.mm=input('Enter month (mm)\\t:')\n        self.yy=input('Enter year\
    \ (yy)\\t:')\n    def display(self):\n        print(self.dd,':',self.mm,':',self.yy)\n\
    class student:\n    def getdata(self):\n        self.name=input('Enter name\\\
    t:')\n        self.dob= date()\n        self.dob.getdata()\n    def putdata(self):\n\
    \        print('Name \\t:',self.name)\n        self.dob.display()\ns= student()\n\
    ```"
  mdcn: "在一个类中，所有数据成员本质上都是**公有**的。也就是说，它们可以在程序中的任何位置被访问。类中的所有成员函数都是**虚函数**。在类中，所有成员函数的第一个参数必须是代表该类的对象，此后称为**self**。有趣的是，所有内置类型本身也是类，并且可以由程序员进行扩展。\n\
    \n请注意，多个名称可以关联到同一个对象。这赋予了程序员与支持指针的语言中相同的能力。例如，使用指针，一个对象可以通过一个参数传递给函数，并且函数所做的更改在调用函数中是可见的。在Python的情况下，可以使用**别名**（为同一对象拥有多个名称）来完成上述任务。\n\
    \n本章的组织结构如下。[第12.2节](#)讨论类的定义，[第12.3节](#)解释对象的创建。[第12.4节](#)讨论数据成员的作用域，[第12.5节](#)介绍嵌套的概念。[第12.6节](#)讨论构造函数，[第12.7节](#)和[第12.8节](#)简要讨论重载和析构函数。最后一节进行总结。\n\
    \n## 12.2 定义一个类\n\n在Python中，可以使用**class**关键字来定义一个类。**class**关键字后面跟着类的名称。然后是类的主体（具有正确的缩进）。\n\
    \n**语法**\n\n```\nclass <name of the class>:\n    def <function name>(<arguments>):\n\
    \        ...\n    <members>\n```\n\n例如，考虑**employee**类，它拥有数据成员**name**和**age**以及成员函数**getdata()**和**putdata()**。前面已经提到，类中的每个函数都必须至少有一个参数，即**self**。类的函数以传统方式定义。**getdata()**函数向用户请求**name**和**age**的值。数据成员通过**self**访问，因为它们属于类而不仅仅是函数。同样，**putdata()**函数显示数据成员的值。请注意，类的成员通过**self**访问。\n\
    \n> 提示！\n- *类定义可以有函数，但也可以有其他成员。*\n\n## 12.3 创建一个对象\n\n通过将一个名称与类的实例关联来创建对象，该实例使用默认构造函数初始化。例如，在创建`employee`类的对象时，使用以下语句。\n\
    \n```\ne1=employee()\n```\n\n这里，**e1**是对象的名称，**employee()**是类的构造函数。也可以使用参数化构造函数来创建对象，如以下各节所述。对象的创建称为**实例化**。\n\
    \n可以使用点运算符调用类的函数。例如，要调用employee类的**getdata()**函数，使用以下语句。\n\n```\ne1.getdata()\n\
    ```\n\n同样，可以使用点运算符调用类的其他方法。\n\n```\nCode:\nclass employee:\n    def getdata(self):\n\
    \        self.name=input('Enter name\\t:')\n        self.age=input('Enter age\\\
    t:')\n    def putdata(self):\n        print('Name\\t:',self.name)\n        print('Age\\\
    t:',self.age)\ne1= employee()\ne1.getdata()\ne1.putdata()\n>>>\n```\n\n```\n====================\
    \ RUN C:/Python/Class/employee.py ====================\nEnter name :Harsh\nEnter\
    \ age :28\nName : Harsh\nAge : 28\n>>>\n```\n\n**提示！**\n\n*对象支持以下操作：*\n\n- 实例化\n\
    - 属性引用\n\n## 12.4 数据成员的作用域\n\n命名空间的**作用域**是其可直接访问的区域。实际上，在Python中，作用域是动态使用的。在确定命名空间的作用域时，遵循以下规则。\n\
    \n- 首先，搜索最内层的作用域\n- 然后搜索封闭函数的作用域\n- 接着搜索全局命名空间\n- 最后，查看内置名称\n\nnonlocal语句重新绑定全局作用域中的变量。为了理解这个概念，请考虑以下代码。关于该代码，以下几点值得注意。\n\
    \n- 对于类的所有实例，**a**的值为5，直到调用一个更改**a**值的函数。\n- 在**putdata()**中，**a**不存在，**a**是**getdata()**的局部变量\n\
    - **b**可以在两个函数中被访问，因为**b**是类的数据成员（请注意，每次调用**b**时，使用的是**self.b**）\n\n基于上述讨论，用户应找出为什么以下代码会产生以下输出。\n\
    \n**代码：**\n\n```\nclass demo_class:\n    a=5\n    def getdata(self,b):\n     \
    \   a=7;\n        self.b=b\n    def putdata(self):\n        print('The value of\
    \ \\'a\\' is',a,'and that of \\'b\\' is',self.b)\n\nd=demo_class()\nd.getdata(9)\n\
    d.putdata()\nd.putdata()\n    File \"C:/Python/Class/variable_visibility.py\"\
    , line 7, in putdata\n    print('The value of \\'a\\' is',a,'and that of \\'b\\\
    ' is',self.b)\nNameError: name 'a' is not defined\n```\n\n在以下代码中，**b**是类的成员。这里，**self.b=b**意味着类的数据成员**self.b**被赋值为**b**，即函数**getdata()**的第二个参数。**c**是**getdata()**的局部变量，因此**getdata()**中的**c**与**putdata()**中的**c**不同。\n\
    \n### 定义：实例变量和类变量\n\n实例变量对每个实例都是唯一的，所有实例共享一个类变量。在以下代码中，**b**可以为每个实例分配不同的值，但**c**保持不变。\n\
    \n**代码：**\n\n```\nclass demo_class:\n    a=5\n    def getdata(self,b):\n     \
    \   c=7;\n        self.b=b\n        print('\\'c\\' is ',c,' and \\'b\\' is ',self.b)\n\
    \    def other_function(self):\n        c=3\n        print('Value',c)\n    def\
    \ putdata(self):\n        print('\\'b\\' is',self.b)\n```\n\n```\nd=demo_class()\n\
    d.getdata(9)\nprint(d.a)\nd.other_function()\nd.putdata()\ne=demo_class()\nprint(e.a)\n\
    >>>\n```\n\n```\n==========      RUN      C:/Python/Class/variable_visibility2.py\n\
    ==========\n'c' is 7 and 'b' is 9\n5\nValue 3\n'b' is 9\n5\n```\n\n除了上述内容，还可以在类外部创建全局数据成员，该成员可被所有方法访问（直到数据成员的作用域被更改）。在以下代码中，**a**对于类的所有实例是公共的，**b**是类的数据成员，**f**是全局变量，**c**是局部变量。\n\
    \n**代码：**\n\n```\nglobal f\nf=7\nclass demo_class:\n    a=5\n    def getdata(self,b):\n\
    \        c=7;\n        self.b=b\n        print('\\'c\\' is ',c,' and \\'b\\' is\
    \ ',self.b,'\\'f\\'',f)\n    def other_function(self):\n        c=3\n        print('Value',c)\n\
    \    def putdata(self):\n        print('\\'b\\' is',self.b)\n\nd=demo_class()\n\
    d.getdata(9)\nprint(d.a)\nd.other_function()\nd.putdata()\ne=demo_class()\nprint(e.a)\n\
    >>>\n==========      RUN      C:/Python/Class/variable_visibility2.py\n==========\n\
    'c' is 7 and 'b' is 9 'f' 7\n5\nValue 3\n'b' is 9\n5\n```\n\n## 12.5 嵌套\n\n类的设计需要对一个具有属性和行为的实体进行概念化。对象也可以在另一个类中使用。也就是说，一个类也可以拥有另一个类的对象作为其成员。这称为嵌套。请注意，类的属性本身也可以是实体。例如，在以下代码中，在**student**类中创建了一个**date**类的实例。这是有意义的，因为**student**是一个实体，其属性本身是对象（如日期）。\n\
    \n**代码：**\n\n```\nclass date:\n    def getdata(self):\n        self.dd=input('Enter\
    \ date (dd)\\t:')\n        self.mm=input('Enter month (mm)\\t:')\n        self.yy=input('Enter\
    \ year (yy)\\t:')\n    def display(self):\n        print(self.dd,':',self.mm,':',self.yy)\n\
    class student:\n    def getdata(self):\n        self.name=input('Enter name\\\
    t:')\n        self.dob= date()\n        self.dob.getdata()\n    def putdata(self):\n\
    \        print('Name \\t:',self.name)\n        self.dob.display()\ns= student()\n\
    ```"
