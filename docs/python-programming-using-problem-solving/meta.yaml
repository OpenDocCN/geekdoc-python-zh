    \    - 2.4.1 Chronology\n    - 2.4.2 Uses\n- 2.5 Installation of Anaconda\n- 2.6\
    \ Implementation of an Algorithm: Statement, state, Control Blocks, and Functions\n\
    \    - 2.6.1 Statement\n    - 2.6.2 State\n    - 2.6.3 Control Flow\n- 2.7 Conclusion\n\
    \nGlossary\n\nPoints to Remember\n\nResources\n\nExercises\n\n- Multiple Choice\
    \ Questions\n- Theory\n\n## CHAPTER 3: FUNDAMENTALS\n\n- 3.1 Introduction\n- 3.2\
    \ Basic Input Output\n    - 3.2.1 Print Function\n    - 3.2.2 Input\n- 3.3 Running\
    \ a Program\n    - 3.3.1 Using the Command Prompt\n    - 3.3.2 Executing Programs\
