- md: "## 9.6 COMPREHENSIONS\n\nThe aim of a programming language is to make things\
    \ easy for a programmer. A task, though, can be performed in many ways but the\
    \ one which requires least coding is the most appealing to a coder. Python has\
    \ many features which facilitate programming. Comprehensions are one of them.\
    \ Comprehensions allow sequences to be built from other sequences. Comprehensions\
    \ can be used for lists, dictionary and set comprehension. In the earlier version\
    \ of Python (Python 2.0) only list comprehensions were allowed. However, in the\
    \ newer versions comprehensions can also be used with dictionary and sets also.\n\
    \nThe following illustration explains the use of comprehensions to generate lists\
    \ in various cases.\n\n- The **range(n)** function generates numbers up to n.\
    \ The first comprehension generates the list of numbers which are cubes of all\
    \ the numbers generated by the range function.\n- The second comprehension works\
    \ in the same way but generates 3 to the power of $x$.\n- The third comprehension\
    \ generates a list having numbers generated by the range (n) function, which are\
    \ multiple of 5.\n- In the fourth comprehension the comprehension takes the words\
    \ of sentence “Winter is coming” and generates a list containing the word in caps,\
    \ in running and the length of the word.\n- Comprehensions can also be used to\
    \ generate lists, satisfying a given condition.\n\n### Illustration 9.13:\n\n\
    Generate the following lists using comprehensions.\n\n- $x^3$, $x$ from 0 to 9\n\
    - $3^x$, $x$ from 2 to 10\n- All the multiples of 5 from the previous list\n-\
    \ The caps, running version and the length of each word in the sentence “Winter\
    \ is coming”\n\n### Solution:\n\n```\nL1 = [x**3 for x in range(10)]\nprint(L1)\n\
    L2 = [3**x for x in range(2, 10, 1)]\nprint(L2)\nL3 = [x for x in L2 if x%5==0]\n\
    print(L3)\nString = \"Winter is coming\".split()\nprint(String)\nString_cases=[[w.upper(),\
    \ w.lower(), len(w)] for w in String]\nfor i in String_cases:\n    print(i)\n\
    list1 = [1, '4', 9, 'a', 0, 4]\nsquare_int = [ x**2 for x in list1 if type(x)==int]\n\
    print(square_int)\n>>>\n```\n\n### Output:\n\n```\n[0, 1, 8, 27, 64, 125, 216,\
    \ 343, 512, 729]\n[9, 27, 81, 243, 729, 2187, 6561, 19683]\n[]\n['Winter', 'is',\
    \ 'coming']\n['WINTER', 'winter', 6]\n['IS', 'is', 2]\n['COMING', 'coming', 7]\n\
    [1, 81, 0, 16]\n>>>\n```\n\nA comprehension contains the input sequence along\
    \ with the expression that represents the members. A comprehension may also have\
    \ an optional predicate expression.\n\nIn order to understand the concept, let\
    \ us consider one more illustration in which a list of temperatures in Celsius\
    \ is given and the corresponding list containing the temperatures in Kelvin are\
    \ to generated. The temperatures in Celsius and Kelvin are related as follows.\n\
    \nKelvin(T) = Celsius(T) + 273.16\n\n### Illustration 9.14:\n\nGiven a list containing\
    \ temperatures in Celsius, generate a list containing temperatures in Kelvin.\n\
    \n### Solution:\n\nThe list **L_kelvin**, is a list where in each element is 273.16\
    \ more than the corresponding element in **L_cel**. Note that the task has been\
    \ accomplished in the definition of the list **L_Kelvin** itself.\n\n### Program:\n\
    \n```\nL_Cel = [21.2, 56.6, 89.2, 90,1, 78.1]\nL_Kelvin = [x +273.16 for x in\
    \ L_Cel]\nprint('The output list')\nfor i in L_Kelvin:\n    print(i)\n```\n\n\
    ### Output:\n\n```\nThe output list\n294.36\n329.76000000000005\n362.36\n363.16\n\
    274.16\n351.26\n>>>\n```\n\nAnother important application of comprehension is\
    \ to generate the Cartesian product of two sets.\n\nThe cross product of two sets,\
    \ A and B, is a set containing tuples of the form (x, y), where x belongs to the\
    \ set A and y belongs to the set B. Illustration 9.15 implements the program.\n\
    \n### Illustration 9.15:\n\nFind the Cartesian product of two given sets.\n\n\
    ### Solution:\n\n```\nA= ['a', 'b', 'c']\nB= [1, 2, 3, 4]\nAXB = [(x, y) for x\
    \ in A for y in B]\nfor i in AXB:\n    print(i)\n>>>\n```\n\n### Output:\n\n```\n\
    ('a', 1)\n('a', 2)\n('a', 3)\n('a', 4)\n('b', 1)\n('b', 2)\n('b', 3)\n('b', 4)\n\
    ('c', 1)\n('c', 2)\n('c', 3)\n('c', 4)\n>>>\n```\n\nThe above program is important\
    \ because the concept of relations and hence functions, in mathematics, originates\
    \ from the cross product. As a matter of fact, any subset of A × B is a relation\
    \ from A to B. There are four types of relations in mathematics: one to one, one\
    \ to many, many to one, and many to many. Out of these relations one to one and\
    \ many to one are referred to as functions.\n\n## 9.7 CONCLUSION\n\nThe chapter\
    \ explained the use of **for** for iterating over a list, string, tuple, or a\
    \ dictionary. It may be stated here that in C or C++, **for** is generally used\
    \ for the same purpose as **while**. However, in Python, **for** can be used to\
    \ visit each element individually. Note that this can also be done in JAVA or\
    \ C#. In order to define an iterable object, **__iter__** and **__next__** needs\
    \ to be defined for the class. The reader is also expected to take note of the\
    \ fact that **yield** and **return** perform different tasks in Python. The use\
    \ of these two has been demonstrated in the illustrations. Finally, while defining\
    \ a list, each element can be crafted as per the need of the question. The chapter,\
    \ though easy, becomes important in the light of excessive use of these techniques\
    \ in machine learning and pattern recognition tasks.\n\n## GLOSSARY\n\n- Iterator\
    \ takes an iterable object and helps to traverse the object\n- \\_\\_next\\_\\\
    _(): It produces the next value of the iterable object\n- \\_\\_iter\\_\\_():\
    \ It helps in iteration\n\n## POINTS TO REMEMBER\n\n- The **for** statement can\
    \ be used for looping over a list, string, tuple, file, and dictionary.\n- **Iter**\
    \ takes an object and returns corresponding iterator.\n- \\_\\_next\\_\\_ gives\
    \ us the next element.\n- **Built-in** functions like list etc. accept iterators\
    \ as arguments.\n- A generator produces sequence of results.\n- **Yield** is used\
    \ when many values are to be produced from a function/generator.\n\n## EXERCISES\n\
    \n### Multiple Choice Questions\n\n1. Which of the following can be an argument\
    \ in \\_\\_iter()\\_\\_\n(a) string\n(b) tuple\n(c) list\n(d) dictionary\n(e)\
    \ all of the above\n\n2. The **iter** takes which type of object?\n(a) iterable\n\
    (b) Any object\n(c) Comprehension\n(d) Generator\n\n3. What is the function of\
    \ **_next()_**?\n(a) To produce next object of the iteration\n(b) To produce a\
    \ new iteration\n(c) To iterate through a generator\n(d) None of the above\n\n\
    4. Which of the following transfers the control to the calling function?\n(a)\
    \ return\n(b) yield\n(c) both\n(d) one of the above\n\n5. Which of the following\
    \ does not transfer the control to the calling function?\n(a) return\n(b) yield\n\
    (c) both\n(d) one of the above\n\n6. Which of the following is essentially used\
    \ in generators?\n(a) yield\n(b) return\n(c) both\n(d) none of the above\n\n7.\
    \ Which of the following is true?\n(a) One can use iterators with generators\n\
    (b) One can use iterators with list\n(c) One can use iterators with comprehensions\n\
    (d) All of the above\n\n8. Which of the following can be itered using a for loop\n\
    (a) string\n(b) list\n(c) tuple\n(d) all of the above\n\n9. Which of the following\
    \ can be itered using **a for** loop\n(a) string\n(b) comprehension\n(c) file\n\
    (d) all of the above\n\n10. Which of the following behaves in the same manner\
    \ as the combination of **_iter()_** and **_next()_**\n(a) for\n(b) if\n(c) both\n\
    (d) none of the above\n\n### Theory\n\n1. Explain the iteration protocol in Python.\n\
    2. What is the function of a Generator?\n3. What is the difference between yield\
    \ and return?\n4. What are list comprehensions? Explain how comprehensions help\
    \ in evading the use of loops.\n5. Explore some of the iteration tools in Python.\n\
    \n### Programming Exercise\n\n(For references regarding AP, GP, HP, primes refer\
    \ to the references given at the end of this book)\n\n1. Write a generator that\
    \ produces the terms of arithmetic progression.\n2. For the above question write\
    \ the corresponding iterator class.\n3. Write a generator that produces the terms\
    \ of a geometrical progression.\n4. For the above question write the corresponding\
    \ iterator class.\n5. Write a generator that produces the terms of a harmonic\
    \ progression.\n6. For the above question write the corresponding iterator class.\n\
    7. Write a generator that produces all the prime numbers up to a given number.\n\
    8. For the above question write the corresponding iterator class.\n9. Write a\
    \ generator that produces all the Fibonacci numbers up to n.\n10. For the above\
    \ question write the corresponding iterator class.\n11. Write a generator that\
    \ produces all the Armstrong numbers up to n.\n12. For the above question write\
    \ the corresponding iterator class.\n13. Write a generator that produces Pythagoras\
    \ triples in the range (1, 20).\n14. For the above question write the corresponding\
    \ iterator class.\n15. Write a generator that produces all the multiples of 6\
    \ up to the given number.\n16. For the above question write the corresponding\
    \ iterator class.\n17. Write a list comprehension that produces all the numbers\
    \ which are multiple of 2 or 5."
  mdcn: "## 9.6 推导式\n\n编程语言的目标是让程序员的工作更轻松。然而，一项任务可以通过多种方式完成，但需要最少编码的方式对程序员最具吸引力。Python\
    \ 拥有许多便于编程的特性，推导式就是其中之一。推导式允许从其他序列构建序列。推导式可用于列表、字典和集合推导。在早期版本的 Python（Python 2.0）中，只允许列表推导。然而，在较新的版本中，推导式也可以用于字典和集合。\n\
    \n以下示例说明了在各种情况下使用推导式生成列表的方法。\n\n- **range(n)** 函数生成从 0 到 n-1 的数字。第一个推导式生成由 range\
    \ 函数生成的所有数字的立方组成的列表。\n- 第二个推导式以相同的方式工作，但生成 $3^x$。\n- 第三个推导式生成一个列表，其中包含由 range(n)\
    \ 函数生成的、是 5 的倍数的数字。\n- 在第四个推导式中，推导式获取句子 “Winter is coming” 的单词，并生成一个包含大写单词、小写单词和单词长度的列表。\n\
    - 推导式也可用于生成满足给定条件的列表。\n\n### 示例 9.13：\n\n使用推导式生成以下列表。\n\n- $x^3$，其中 $x$ 从 0 到\
    \ 9\n- $3^x$，其中 $x$ 从 2 到 10\n- 上述列表中所有 5 的倍数\n- 句子 “Winter is coming” 中每个单词的大写、小写形式及其长度\n\
    \n### 解答：\n\n```\nL1 = [x**3 for x in range(10)]\nprint(L1)\nL2 = [3**x for x\
    \ in range(2, 10, 1)]\nprint(L2)\nL3 = [x for x in L2 if x%5==0]\nprint(L3)\n\
    String = \"Winter is coming\".split()\nprint(String)\nString_cases=[[w.upper(),\
    \ w.lower(), len(w)] for w in String]\nfor i in String_cases:\n    print(i)\n\
    list1 = [1, '4', 9, 'a', 0, 4]\nsquare_int = [ x**2 for x in list1 if type(x)==int]\n\
    print(square_int)\n>>>\n```\n\n### 输出：\n\n```\n[0, 1, 8, 27, 64, 125, 216, 343,\
    \ 512, 729]\n[9, 27, 81, 243, 729, 2187, 6561, 19683]\n[]\n['Winter', 'is', 'coming']\n\
    ['WINTER', 'winter', 6]\n['IS', 'is', 2]\n['COMING', 'coming', 7]\n[1, 81, 0,\
    \ 16]\n>>>\n```\n\n推导式包含输入序列以及表示成员的表达式。推导式还可以有一个可选的谓词表达式。\n\n为了理解这个概念，让我们再看一个示例，其中给定一个摄氏温度列表，需要生成相应的开尔文温度列表。摄氏温度和开尔文温度的关系如下：\n\
    \n开尔文(T) = 摄氏(T) + 273.16\n\n### 示例 9.14：\n\n给定一个包含摄氏温度的列表，生成一个包含开尔文温度的列表。\n\n\
    ### 解答：\n\n列表 **L_kelvin** 是一个列表，其中每个元素比 **L_cel** 中对应的元素大 273.16。请注意，该任务在列表 **L_Kelvin**\
    \ 的定义中就已完成。\n\n### 程序：\n\n```\nL_Cel = [21.2, 56.6, 89.2, 90,1, 78.1]\nL_Kelvin\
    \ = [x +273.16 for x in L_Cel]\nprint('The output list')\nfor i in L_Kelvin:\n\
    \    print(i)\n```\n\n### 输出：\n\n```\nThe output list\n294.36\n329.76000000000005\n\
    362.36\n363.16\n274.16\n351.26\n>>>\n```\n\n推导式的另一个重要应用是生成两个集合的笛卡尔积。\n\n两个集合 A\
    \ 和 B 的叉积是一个包含形如 (x, y) 的元组的集合，其中 x 属于集合 A，y 属于集合 B。示例 9.15 实现了该程序。\n\n### 示例\
    \ 9.15：\n\n求两个给定集合的笛卡尔积。\n\n### 解答：\n\n```\nA= ['a', 'b', 'c']\nB= [1, 2, 3, 4]\n\
    AXB = [(x, y) for x in A for y in B]\nfor i in AXB:\n    print(i)\n>>>\n```\n\n\
    ### 输出：\n\n```\n('a', 1)\n('a', 2)\n('a', 3)\n('a', 4)\n('b', 1)\n('b', 2)\n('b',\
    \ 3)\n('b', 4)\n('c', 1)\n('c', 2)\n('c', 3)\n('c', 4)\n>>>\n```\n\n上述程序很重要，因为数学中关系（进而函数）的概念源于叉积。事实上，A\
    \ × B 的任何子集都是从 A 到 B 的一个关系。数学中有四种类型的关系：一对一、一对多、多对一和多对多。在这些关系中，一对一和多对一被称为函数。\n\n\
    ## 9.7 结论\n\n本章解释了使用 **for** 遍历列表、字符串、元组或字典的方法。这里需要说明的是，在 C 或 C++ 中，**for** 通常与\
    \ **while** 用于相同的目的。然而，在 Python 中，**for** 可以用来逐个访问每个元素。请注意，这在 JAVA 或 C# 中也可以实现。为了定义一个可迭代对象，需要为该类定义\
    \ **__iter__** 和 **__next__**。读者还应注意，**yield** 和 **return** 在 Python 中执行不同的任务。这两个的使用已在示例中进行了演示。最后，在定义列表时，每个元素都可以根据问题的需要进行设计。尽管本章内容简单，但由于这些技术在机器学习和模式识别任务中的广泛使用，它变得非常重要。\n\
    \n## 术语表\n\n- 迭代器接受一个可迭代对象并帮助遍历该对象\n- \\_\\_next\\_\\_()：它产生可迭代对象的下一个值\n- \\_\\\
    _iter\\_\\_()：它有助于迭代\n\n## 要点回顾\n\n- **for** 语句可用于遍历列表、字符串、元组、文件和字典。\n- **iter**\
    \ 接受一个对象并返回相应的迭代器。\n- \\_\\_next\\_\\_ 给出下一个元素。\n- **内置**函数如 list 等接受迭代器作为参数。\n\
    - 生成器产生一系列结果。\n- 当需要从函数/生成器产生多个值时，使用 **yield**。\n\n## 练习题\n\n### 选择题\n\n1. 以下哪项可以作为\
    \ \\_\\_iter()\\_\\_ 的参数？\n(a) 字符串\n(b) 元组\n(c) 列表\n(d) 字典\n(e) 以上所有\n\n2. **iter**\
    \ 接受哪种类型的对象？\n(a) 可迭代对象\n(b) 任何对象\n(c) 推导式\n(d) 生成器\n\n3. **_next()_** 的功能是什么？\n\
    (a) 产生迭代的下一个对象\n(b) 产生一个新的迭代\n(c) 遍历生成器\n(d) 以上都不是\n\n4. 以下哪项将控制权转移给调用函数？\n(a)\
    \ return\n(b) yield\n(c) 两者都是\n(d) 以上之一\n\n5. 以下哪项不将控制权转移给调用函数？\n(a) return\n\
    (b) yield\n(c) 两者都是\n(d) 以上之一\n\n6. 以下哪项本质上用于生成器？\n(a) yield\n(b) return\n(c)\
    \ 两者都是\n(d) 以上都不是\n\n7. 以下哪项是正确的？\n(a) 可以在生成器中使用迭代器\n(b) 可以在列表中使用迭代器\n(c) 可以在推导式中使用迭代器\n\
    (d) 以上所有\n\n8. 以下哪项可以使用 for 循环进行迭代？\n(a) 字符串\n(b) 列表\n(c) 元组\n(d) 以上所有\n\n9. 以下哪项可以使用\
    \ **for** 循环进行迭代？\n(a) 字符串\n(b) 推导式\n(c) 文件\n(d) 以上所有\n\n10. 以下哪项的行为与 **_iter()_**\
    \ 和 **_next()_** 的组合相同？\n(a) for\n(b) if\n(c) 两者都是\n(d) 以上都不是\n\n### 理论题\n\n1.\
    \ 解释 Python 中的迭代协议。\n2. 生成器的功能是什么？\n3. yield 和 return 之间有什么区别？\n4. 什么是列表推导式？解释推导式如何帮助避免使用循环。\n\
    5. 探索 Python 中的一些迭代工具。\n\n### 编程练习\n\n（关于等差数列、等比数列、调和数列、素数的参考资料，请参阅本书末尾给出的参考文献）\n\
