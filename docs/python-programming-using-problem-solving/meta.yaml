    # 3.5 VALUE TYPE AND REFERENCE TYPE


    This course aims to make the student capable of solving problems by writing programs.
    We need input from the user to write a program and generally store it somewhere.
    To store an input, we need variables. A variable in **Python** refers to a location
    where a value is placed; hence, they are **reference-type variables** against
    languages like **C**.


    For example, in **C** language, to make an **integer-type variable** and store
    7 in it, we write


    ```

    int i = 7;

    ```


    In the **C** language, this makes a variable called *i* and stores 7 in binary
    format. Whereas, in **Python** writing


    ```

    i = 7

    ```


    make a variable called *i* which refers to a location where 7 is stored. (Figure
    3.8).


