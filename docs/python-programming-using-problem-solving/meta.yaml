  md: '# CHAPTER 11


    # INTRODUCTION TO OBJECT-ORIENTED PARADIGM


    # Objectives


    After reading this chapter, the reader should be able to


    +   - Understand the elements of object-oriented paradigm

    - Understand the concept of a class and define an object

    - Define encapsulation, inheritance, and polymorphism


    # 11.1 INTRODUCTION


    In the preceding chapters, the control structures of Python were discussed. The
    chapters discussed loops, conditional statements, etc. However, these constructs
    are an integral part of other procedural languages also. In a procedure, each
    instruction tells the computer what needs to be done, and these procedures constitute
    a program in such languages. Python not only supports procedural programming but
    also supports object-oriented programming (OOP). This chapter introduces the principles
    of OOP and explains the need for and importance of classes and objects. The chapter
    also discusses the difference between OOP and procedural programming.


    It may be stated here that the topics discussed in this chapter will be discussed
    in detail in the following chapters. Some of the readers, not familiar with C++
    (or for that matter C# or JAVA) may find the discussion abstract, but things will
    become clear as we proceed.'
  merge: -1
  pgno: 276
- img_proc: true
  md: 'As stated earlier, in procedural programming, each statement tells the program
    what needs to be done. For example, the following code asks the user for the input,
    calculates the square root of the number entered by the user, and displays the
    result.


    **Code:**


    ```

    a=float(input("Enter a number\t:"))

    b=math.sqrt(a)

    b

    ```


    **Output:**


    ```

    Enter a number :67

    8.18535277187245

    ```


    This strategy is good if the program is very small. Often, telling the computer
    what to do, step by step, works if the task to be accomplished is not very complex.
    In such cases, no other paradigm is needed.


    In the case of a moderately large program, division into functions makes the task
    easier. The division of a larger program into modules makes the program manageable
    and helps achieve code’s reusability. The functions generally accomplish a clearly
    defined task and become handy whenever that particular task is to be accomplished.
    The reader is advised to go through the chapter on functions in order to understand
    the advantages of functions. The clubbing of functions, on some basis, gives rise
    to what is commonly referred to as modules. This programming paradigm is called
    modular programming.


    The problem with the above paradigm is that the accidental clubbing together of
    unrelated functions is far from real-world situations and hence becomes a source
    of problems at some point in time. Moreover, the approach does not restrict the
    access of data in any module and jeopardize the sanctity of the data.


    It may be noted that the data should not be accessible to all the modules. The
    accessibility of data must be managed with utmost care; otherwise, a module, which
    should not have alerted the data as per the program logic, might change the data.'
  merge: -1
  pgno: 277
- img_proc: true
  md: 'In order to understand the gravity of the problem, let us take the example
    of C. In C, a variable can be global or local. If it is global, then any module
    can change it. But, on the other hand, if it is local, then other modules would
    not be able to access it. So, there is nothing in between.


    The solution to the above problem is to model the software in such a way that
    the design is conceptually as close to the real world as possible. This modeling
    of real-world situations requires the creation of entities having both attributes
    and behavior. The clubbing together of data and the functions that manipulate
    the data would be helpful in crafting the above entities. These entities would
    henceforth be referred to as classes. The instances of classes are objects, and
    the paradigm is called object-oriented paradigm. Various programming paradigms
    and their disadvantages have been summarized in Figure 11.1.


