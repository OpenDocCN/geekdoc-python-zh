    \ exit occurs without a **break**, then the **else** part of the construct executes.\
    \ The syntax of the loop is as follows.\n\n```\nSyntax\nwhile test:\n    ...\n\
    \    ...\nelse:\n    ...\n```\n\nIt may be stated here that the indentation determines\
    \ the body of the loop. This is the reason why one must be extremely careful in\
    \ indentation. Also, the **else** part, which is an addition in Python is optional.\
    \ In order to understand the concept, let us go through the following Illustrations.\n\
    \n### Illustration 5.1:\n\nAsk the user to enter a number and calculate its factorial.\n\
    \n### Solution:\n\nThe factorial of a number n is defined as follows.\n$$factorial\
    \ = 1 \\times 2 \\times 3 \\times \\dots \\times n$$\nThat is, the factorial of\
    \ a number, **n**, is the product of **n** terms starting from 1. To calculate\
    \ the factorial of a given number, first of all, the user is asked to input a\
    \ number. The number is then converted into integer. This is followed by the initialization\
    \ of **“factorial”** by 1. Then a **while** loop successively multiplies **i**\
    \ to **“factorial”** (note that after each iteration, the value of **i** increases\
    \ by 1). The following program calculates the factorial of a number entered by\
    \ the user.\n\n### Program:\n\n```\nn = input('Enter number whose factorial is\
    \ required')#ask user to enter number\nm = int(n)#convert the input to an integer\n\
    factorial = 1#initialize\ni=1# counter\nwhile i<=m:\n    factorial =factorial*i\n\
    \    i=i+1\nprint('\\factorial of '+str(m)+' is '+str(factorial))\n```\n\n###\
