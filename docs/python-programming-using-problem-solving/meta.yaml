    # 19.4 THE PIE CHART


    The **matplotlib.pyplot.pie** plots a pie chart using the array x, given as an
    input. Each wedge, in a Pie chart, has an area proportionate to the value. In
    the chart, the wedges are plotted counterclockwise. The arguments of the **pie**
    function are as follows.


    +   - **x:** This argument represents the sequence of the values.

    - **explode:** This argument gives the offset of each wedge. It is an optional
    argument.

    - **labels:** This argument represents a sequence of strings depicting the labels
    for each wedge. It is an optional argument.

    - **colors:** This argument sets the colors of each wedge.

    - **autopct:** It is an optional argument. This argument sets the label showing
    the percentage will be placed inside the wedge.


    The following illustrations would help us to understand the plotting of a pie
    chart, using the above arguments. The reader is expected to analyze the effect
    of each argument by observing the output.


