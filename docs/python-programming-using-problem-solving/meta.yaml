  md: 'is stored as


    1, 4, 7, 2, 5, 8, 3, 6, 9


    in the column-major format.


    **Axes:** In **numpy**, axis = i denotes the axes. In a 1-dimensional array, the
    elements are stored at axis = 0. In the case of a 2-dimensional array axis = 0
    denotes rows, axis = 1 denotes columns (Figure 16.2) and in the case of a 3-dimensional
    array axis = 2 denotes the number of matrices. Axes denote the dimensions. So,
    for 1 dimensional array, axis = 0; for a 2-dimensional array, axis = 0 and 1 and
    for a 3-dimensional array axis = 0, 1, and 2.


    ![](img/46b778b4f9252bd09c63fc5fba842fc6_413_0.png)


    **FIGURE 16.2** Axes in a **numpy** array.


    **Shape:** The shape of a 1-dimensional array is the number of elements in the
    array. For example, if


    $A = array([8,1,5,89,45])$


    then $A. shape = 5$.


    The shape of a 2-dimensional array is (*the number of rows, the number of columns*).
    For example, if


    $A = \begin{bmatrix} 1 & 2 & 3 \ 4 & 5 & 6 \ 7 & 8 & 9 \end{bmatrix}$


    then the shape of the array is (3, 3).


    **Rank:** The number of axes in a **numpy** array is the rank of the array. That
    is, the rank of a 3-D array would be 3.


    **List to an array:** The function **numpy.array(L)**, converts the list **L**
    to a **numpy** array.'
