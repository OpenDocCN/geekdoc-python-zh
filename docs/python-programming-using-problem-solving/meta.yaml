    # 14.6 OVERLOADING THE > AND < OPERATORS


    The greater than (>) and less than (<) operators work in the usual manner for
    the integers, fractions, and some other predefined types. However, to be able
    to use these operators for user defined classes, the programmer must overload
    the operators. In Python, greater than (>) and less than(<) can be overloaded
    using the `__gt__` and `__lt__`. The `__gt__` returns a **true** or a **false**
    depending upon whether the first object is greater than the second or not. Similarly,
    the `__lt__` returns a **true** or a **false** depending upon whether the first
    object is less than the second or not.


    The following example overloads the `__gt__` and `__lt__` for a class called **Data**.
    The **Data** class has a data member called “value.” The `__gt__` compares the
    value of the instance (**self**) and that of another instance (**other**). If
    the value of the instance is greater than that of the other instance then a **true**
    is returned, otherwise a **false** is returned. Similarly, the `__lt__` compares
    the value of the instance (**self**) and that of another instance(**other**).
    If the value of the instance is smaller than that of the other instance then a
    **true** is returned, otherwise a **false** is returned.


