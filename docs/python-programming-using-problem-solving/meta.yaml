- md: "## 12.6 CONSTRUCTOR\n\nNote that each time a class is instantiated, a constructor\
    \ (e.g., **e1=employee()**) is used. In C++ terminology, a constructor is a function\
    \ with the same name as the class and initializes the data members. The above\
    \ examples used default constructors, which the programmer did not make. One can\
    \ initialize the objects as per the need by crafting constructors. The following\
    \ discussion focuses on two types of constructors: **default** and **parameterized**.\
    \ A **default constructor** does not take any argument (e.g., the **employee()**\
    \ constructor). In Python, the constructors are called using functions with the\
    \ same name as the class’s. However, they are implemented by making the **__init__()**\
    \ function inside the class.\n\nIn the following code, the object **e1** behaves\
    \ as expected. The values entered by the user in the **getdata()** function are\
    \ displayed when **putdata()** is called. In case of **e2**, the function **getdata()**\
    \ is not called; therefore, the values assigned in **__init__()** are displayed.\n\
    \n**Code:**\n\n```\nclass employee:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def\
    \ __init__(self):\n        self.name='ABC'\n        self.age=20\n\ne1= employee()\n\
    e1.getdata()\ne1.putdata()\ne2=employee()\ne2.putdata()\n```\n\n```\n>>>\n=============\
    \ RUN C:/Python/Class/Constructor1.py =============\nEnter name :Harsh\nEnter\
    \ age:28\nName : Harsh\nAge : 28\nName: ABC\nAge: 20\n>>>\n```\n\nA **parameterized\
    \ constructor** is one that takes arguments, for example, in the following code,\
    \ the parameterized constructor, which takes two parameters **name** and **age**\
    \ has been created. In order to assign the values to the Object, the instantiation\
    \ must be of the form:\n\n```\ne2=employee('Naved', 32)\n```\n\nNote that while\
    \ defining the parameterized **__init__**, the first parameter is always “**self,**”\
    \ the rest of the parameters are the values to be assigned to different data members\
    \ of the class. In the case of employee class, three parameters, “**self,**” “**name,**”\
    \ and “**age**” are given.\n\n**Code:**\n\n```\nclass employee:\n    def getdata(self):\n\
    \        self.name=input('Enter name\\t:')\n        self.age=input('Enter age\\\
    t:')\n    def putdata(self):\n        print('Name\\t:',self.name)\n        print('Age\\\
    t:',self.age)\n    def __init__(self, name, age):\n        self.name=name\n  \
    \      self.age=age\n    def __del__():\n        print('Done')\n\n#e1=employee()\n\
    #e1.getdata()\n#e1.putdata()\ne2=employee('Naved', 32)\ne2.putdata()\n```\n\n\
    ```\n>>>\n==================\t\t\tRUN\t\t\tC:/Python/Class/Constructor2.py\n==================\n\
    Name :Naved\nAge :32\n>>>\n```\n\n## 12.7 MULTIPLE __INIT__(s)\n\nHaving the same\
    \ name function in a class, with different number of parameters, or different\
    \ types of parameters, is called **function overloading**. In C++, JAVA, C#, etc.,\
    \ the constructors can also be overloaded; one can have more than one constructor,\
    \ each having different parameters. In Python, however, we cannot have more than\
    \ one __init__ in a class. For example, an error crops up if we try executing\
    \ the following code.\n\nNote, that if one makes a parameterized __init__, Python\
    \ looks for the rest of the parameters in the instantiation.\n\n**Code:**\n\n\
    ```\nclass employee:\n    def getdata(self):\n        self.name=input('Enter name\\\
    t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n      \
    \  print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def __init__(self,\
    \ name, age):\n        self.name=name\n        self.age=age\n\ne1= employee()\n\
    e1.getdata()\ne1.putdata()\ne2=employee('Naved', 32)\ne2.putdata()\n>>>\n```\n\
    \n```\n================ RUN C:/Python/Class/Constructor2.py ================\n\
    Traceback (most recent call last):\n  File \"C:/Python/Class/Constructor2.py\"\
    , line 11, in <module>\n    e1=employee()\nTypeError: __init__() missing 2 required\
    \ positional arguments: 'name' and 'age'\n>>>\n```\n\nHaving studied the importance\
    \ and implementation of constructors, let us now implement a constructor; let\
    \ us revisit the “movie” class, created above. The following code has a movie\
    \ class, which contains a **getdata()** and **putdata()** function and **__init__(self)**\
    \ for initializing the variables. Note that the object “m” does not call the **getdata()**\
    \ function but just **putdata()**. The values assigned in the constructor are\
    \ displayed.\n\n**Code:**\n\n```\nclass movie:\n    def getdata(self):\n     \
    \   self.name=input('Enter name\\t:')\n        self.year=int(input('Enter year\\\
    t:'))\n        self.genre=input('Enter genre\\t:')\n        self.director=input('Enter\
    \ the name of the director\\t:')\n        self.producer=input('Enter the producer\\\
    t:')\n        L=[]\n        item=input('Enter the name of the actor\\t:')\n  \
    \      L.append(item)\n        choice=input('Press \\'y\\' for more \\'n\\' to\
    \ quit')\n        while(choice == \"y\"):\n            item=input('Enter the name\
    \ of the actor\\t:')\n            L.append(item)\n            choice=input('Enter\
    \ \\'y\\' for more \\'n\\' to quit')\n        self.actors=L\n        self.music_director=input('Enter\
    \ the name of the music director\\t:')\n\n    def putdata(self):\n        print('Name\\\
    t:',self.name)\n        print('Year\\t',self.year)\n        print('Genre\\t:',self.genre)\n\
    \        print('Director\\t:',self.director)\n        print('Producer\\t:',self.producer)\n\
    \        print('Music_director\\t:',self.music_director)\n        print('Actors\\\
    t:',self.actors)\n\n    def __init__(self):\n        self.name='Fault'\n     \
    \   self.year=2015\n        self.genre='Drama'\n        self.director='XYZ'\n\
    \        self.producer='ABC'\n        self.music_director='LMN'\n        self.actors=['A1',\
    \ 'A2', 'A3', 'A4']\n\nm=movie()\n#m.getdata()\nm.putdata()\n```\n\n```\n================\
    \ RUN C:\\Python\\Class\\class_basic2.py ================\nName        : Fault\n\
    Year        2015\nGenre       : Drama\nDirector    : XYZ\nProducer    : ABC\n\
    Music_director :LMN\nActors      :['A1', 'A2', 'A3', 'A4']\n```\n\n## 12.8 DESTRUCTORS\n\
    \nA constructor initializes the data members of a class, and a destructor frees\
    \ the memory. The destructor is created using `__del__` and called by writing\
    \ the keyword `del` and the name of the Object. The following code exemplifies\
    \ a destructor in the employee class described in the previous sections.\n\n**Code:**\n\
    \n```\nclass employee:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def\
    \ __init__(self, name, age):\n        self.name=name\n        self.age=age\n \
    \   def __del__(self):\n        print('Done')\n\n#e1=employee()\n#e1.getdata()\n\
    #e1.putdata()\ne2=employee('Naved', 32)\ne2.putdata()\ndel e2\n```\n\n```\n====================\
    \ RUN C:/Python/Class/Constructor2.py ====================\nName  : Naved\nAge\
    \   : 32\nDone\n```\n\nThe next example is the same as that of the previous one.\
    \ However, the following code also demonstrates the use of `__class__.__name__`,\
    \ which displays the name of the object that calls the function. This is useful\
    \ as the name of the object whose destructor (or any method) is being called can\
    \ be displayed while debugging.\n\n**Code:**\n\n```\nclass employee:\n    def\
    \ getdata(self):\n        self.name=input('Enter name\\t:')\n        self.age=input('Enter\
    \ age\\t:')\n    def putdata(self):\n        print('Name\\t:',self.name)\n   \
    \     print('Age\\t:',self.age)\n    def __init__(self, name, age):\n        self.name=name\n\
    \        self.age=age\n    def __del__(self):\n        print(__class__.__name__,'Done')\n\
    \n#e1=employee()\n#e1.getdata()\n#e1.putdata()\ne2=employee('Naved', 32)\ne2.putdata()\n\
    del e2\n>>>\n```\n\n```\n================ RUN C:/Python/Class/Constructor2.py\
    \ ================\nName :Naved\nAge :32\nemployee Done\n>>>\n```\n\nThe docstring\
    \ associated with the class can be mentioned in the definition of the class within\
    \ three double quotes (\"\"\" ... \"\"\"). The docstring associated with the class\
    \ can be accessed through __doc__, as shown in the following example.\n\n**Code:**\n\
    \n```\nclass employee:\n    \"\"\"The employee class\"\"\"\n    def getdata(self):\n\
    \        self.name=input('Enter name\\t:')\n        self.age=input('Enter age\\\
    t:')\n    def putdata(self):\n        print('Name\\t:',self.name)\n        print('Age\\\
    t:',self.age)\n    def __init__(self):\n```"
  mdcn: "## 12.6 构造函数\n\n请注意，每次实例化一个类时，都会使用一个构造函数（例如，**e1=employee()**）。用C++的术语来说，构造函数是一个与类同名的函数，用于初始化数据成员。上面的例子使用了程序员未编写的默认构造函数。人们可以根据需要通过编写构造函数来初始化对象。以下讨论重点介绍两种类型的构造函数：**默认构造函数**和**参数化构造函数**。**默认构造函数**不接受任何参数（例如，**employee()**构造函数）。在Python中，构造函数通过与类同名的函数来调用。然而，它们是通过在类内部实现**__init__()**函数来完成的。\n\
    \n在下面的代码中，对象**e1**的行为符合预期。当调用**putdata()**时，用户在**getdata()**函数中输入的值会被显示出来。对于**e2**，由于没有调用**getdata()**函数，因此显示的是在**__init__()**中赋值的值。\n\
    \n**代码：**\n\n```\nclass employee:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def\
    \ __init__(self):\n        self.name='ABC'\n        self.age=20\n\ne1= employee()\n\
    e1.getdata()\ne1.putdata()\ne2=employee()\ne2.putdata()\n```\n\n```\n>>>\n=============\
    \ RUN C:/Python/Class/Constructor1.py =============\nEnter name :Harsh\nEnter\
    \ age:28\nName : Harsh\nAge : 28\nName: ABC\nAge: 20\n>>>\n```\n\n**参数化构造函数**是接受参数的构造函数，例如，在下面的代码中，创建了一个接受两个参数**name**和**age**的参数化构造函数。为了给对象赋值，实例化必须采用以下形式：\n\
    \n```\ne2=employee('Naved', 32)\n```\n\n请注意，在定义参数化的**__init__**时，第一个参数始终是“**self,**”，其余参数是要赋给类不同数据成员的值。对于employee类，给出了三个参数：“**self,**”、“**name,**”和“**age**”。\n\
    \n**代码：**\n\n```\nclass employee:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def\
    \ __init__(self, name, age):\n        self.name=name\n        self.age=age\n \
    \   def __del__():\n        print('Done')\n\n#e1=employee()\n#e1.getdata()\n#e1.putdata()\n\
    e2=employee('Naved', 32)\ne2.putdata()\n```\n\n```\n>>>\n==================\t\t\
    \tRUN\t\t\tC:/Python/Class/Constructor2.py\n==================\nName :Naved\n\
    Age :32\n>>>\n```\n\n## 12.7 多个 __init__()\n\n在类中拥有同名但参数数量不同或参数类型不同的函数，称为**函数重载**。在C++、JAVA、C#等语言中，构造函数也可以重载；可以拥有多个构造函数，每个构造函数具有不同的参数。然而，在Python中，一个类中不能有多个__init__。例如，如果我们尝试执行以下代码，就会出现错误。\n\
    \n请注意，如果定义了一个参数化的__init__，Python会在实例化时寻找其余的参数。\n\n**代码：**\n\n```\nclass employee:\n\
    \    def getdata(self):\n        self.name=input('Enter name\\t:')\n        self.age=input('Enter\
    \ age\\t:')\n    def putdata(self):\n        print('Name\\t:',self.name)\n   \
    \     print('Age\\t:',self.age)\n    def __init__(self, name, age):\n        self.name=name\n\
    \        self.age=age\n\ne1= employee()\ne1.getdata()\ne1.putdata()\ne2=employee('Naved',\
    \ 32)\ne2.putdata()\n>>>\n```\n\n```\n================ RUN C:/Python/Class/Constructor2.py\
    \ ================\nTraceback (most recent call last):\n  File \"C:/Python/Class/Constructor2.py\"\
    , line 11, in <module>\n    e1=employee()\nTypeError: __init__() missing 2 required\
    \ positional arguments: 'name' and 'age'\n>>>\n```\n\n在学习了构造函数的重要性和实现之后，现在让我们来实现一个构造函数；让我们重新审视上面创建的“movie”类。下面的代码包含一个movie类，其中包含一个**getdata()**和**putdata()**函数，以及一个用于初始化变量的**__init__(self)**。请注意，对象“m”没有调用**getdata()**函数，而只是调用了**putdata()**。构造函数中赋值的值被显示出来。\n\
    \n**代码：**\n\n```\nclass movie:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.year=int(input('Enter year\\t:'))\n        self.genre=input('Enter\
    \ genre\\t:')\n        self.director=input('Enter the name of the director\\t:')\n\
    \        self.producer=input('Enter the producer\\t:')\n        L=[]\n       \
    \ item=input('Enter the name of the actor\\t:')\n        L.append(item)\n    \
    \    choice=input('Press \\'y\\' for more \\'n\\' to quit')\n        while(choice\
    \ == \"y\"):\n            item=input('Enter the name of the actor\\t:')\n    \
    \        L.append(item)\n            choice=input('Enter \\'y\\' for more \\'n\\\
    ' to quit')\n        self.actors=L\n        self.music_director=input('Enter the\
    \ name of the music director\\t:')\n\n    def putdata(self):\n        print('Name\\\
    t:',self.name)\n        print('Year\\t',self.year)\n        print('Genre\\t:',self.genre)\n\
    \        print('Director\\t:',self.director)\n        print('Producer\\t:',self.producer)\n\
    \        print('Music_director\\t:',self.music_director)\n        print('Actors\\\
    t:',self.actors)\n\n    def __init__(self):\n        self.name='Fault'\n     \
    \   self.year=2015\n        self.genre='Drama'\n        self.director='XYZ'\n\
    \        self.producer='ABC'\n        self.music_director='LMN'\n        self.actors=['A1',\
    \ 'A2', 'A3', 'A4']\n\nm=movie()\n#m.getdata()\nm.putdata()\n```\n\n```\n================\
    \ RUN C:\\Python\\Class\\class_basic2.py ================\nName        : Fault\n\
    Year        2015\nGenre       : Drama\nDirector    : XYZ\nProducer    : ABC\n\
    Music_director :LMN\nActors      :['A1', 'A2', 'A3', 'A4']\n```\n\n## 12.8 析构函数\n\
    \n构造函数初始化类的数据成员，而析构函数则释放内存。析构函数使用`__del__`创建，并通过编写关键字`del`和对象名称来调用。下面的代码示例展示了前面章节中描述的employee类中的析构函数。\n\
    \n**代码：**\n\n```\nclass employee:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def\
    \ __init__(self, name, age):\n        self.name=name\n        self.age=age\n \
    \   def __del__(self):\n        print('Done')\n\n#e1=employee()\n#e1.getdata()\n\
    #e1.putdata()\ne2=employee('Naved', 32)\ne2.putdata()\ndel e2\n```\n\n```\n====================\
    \ RUN C:/Python/Class/Constructor2.py ====================\nName  : Naved\nAge\
    \   : 32\nDone\n```\n\n下一个例子与前一个相同。然而，下面的代码还演示了`__class__.__name__`的用法，它显示调用该函数的对象的名称。这很有用，因为在调试时可以显示正在调用其析构函数（或任何方法）的对象的名称。\n\
    \n**代码：**\n\n```\nclass employee:\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def\
    \ __init__(self, name, age):\n        self.name=name\n        self.age=age\n \
    \   def __del__(self):\n        print(__class__.__name__,'Done')\n\n#e1=employee()\n\
    #e1.getdata()\n#e1.putdata()\ne2=employee('Naved', 32)\ne2.putdata()\ndel e2\n\
    >>>\n```\n\n```\n================ RUN C:/Python/Class/Constructor2.py ================\n\
    Name :Naved\nAge :32\nemployee Done\n>>>\n```\n\n与类关联的文档字符串可以在类的定义中用三个双引号（\"\"\
    \" ... \"\"\")提及。与类关联的文档字符串可以通过__doc__访问，如下例所示。\n\n**代码：**\n\n```\nclass employee:\n\
    \    \"\"\"The employee class\"\"\"\n    def getdata(self):\n        self.name=input('Enter\
    \ name\\t:')\n        self.age=input('Enter age\\t:')\n    def putdata(self):\n\
    \        print('Name\\t:',self.name)\n        print('Age\\t:',self.age)\n    def\
    \ __init__(self):\n```"
