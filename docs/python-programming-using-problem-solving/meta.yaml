    ![](img/46b778b4f9252bd09c63fc5fba842fc6_55_0.png)


    **FIGURE 2.1** Some of the applications of Python.


    The chapter has been organized as follows. Section 2.2 discusses the features
    of Python. Section 2.3 discusses the programming language paradigms supported
