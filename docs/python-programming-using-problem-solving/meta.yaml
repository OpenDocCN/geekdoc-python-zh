    # 18.1 INTRODUCTION


    The advent of **IoT** (Internet of Things) and related technologies have facilitated
    the collection of huge amounts of data. However, this data can help us to make
    informed decisions only if we can analyze it and extract information from it.
    This analysis can be based on the statistics and trends that originate from this
    data. Another way of analyzing the given data is by using **Visualization** that
    is by drawing plots, pi-charts, histograms, etc.


    > **Visualization**


    It refers to a way of conveying intangible and tangible ideas using visual imagery.
    It may refer to the graphical representation of information using tools like scatter
    plots, line plots, bars, histograms, frequency graphs, etc.'
