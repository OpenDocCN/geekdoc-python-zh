    - (g) putdata()：显示数据\n- (h) __init__()：初始化成员\n- (i) del：析构函数\n- (j) capacity：当前存储容量。\n\
    \n1.  创建一个名为**car**的类，以促进所需软件的开发。\n2.  创建该类的两个实例并显示数据。第一个实例应显示使用**putdata()**函数输入的数据，第二个应显示使用**__init__(self)**方法赋值的数据。\n\
    3.  创建一个汽车数组。要求用户输入n辆汽车的数据并显示这些数据。\n4.  查找注册号中包含“HR51”的汽车。\n5.  查找由“Maruti”制造的汽车。\n\
    6.  查找在2007年之前制造的汽车。\n7.  查找车主姓名为“Harsh”的汽车。\n8.  查找车主姓名以“A”开头且在2014年之后制造的汽车。\n\
    9.  查找具有特定类型发动机（由用户输入）的汽车。\n10. 查找容量最大的汽车。\n\n### 运算符重载\n\n11. 创建一个名为**vector**的类，它有三个数据成员\n\
    \    - (a) x1：向量的x分量\n    - (b) y1：向量的y分量\n    - (c) z1：向量的z分量\n    该类应有一个名为**getdata()**的方法，用于从用户处获取数据；**putdata()**，用于显示数据；**__init__**，构造函数。\n\
    \n12. 创建一个名为vectors的类，并创建两个vector实例：**v1**和**v2**。显示这两个对象的数据。\n\n13. 向量的模可以定义如下。如果\
    \ $v_1 = x_1 \\vec{i} + y_1 \\vec{j} + z_1 \\vec{k}$，那么 $|v_1| = \\sqrt{x_1^2\
    \ + y_1^2 + z_1^2}$。创建一个向量数组。要求用户输入n个向量的数据，并找出模最大的向量。\n\n14. 在上述向量（问题13）中，找出y分量为0的向量。\n\
    \n15. 两个向量 $v_1$ 和 $v_2$ 可以通过减去两个向量的对应分量来相减。即如果 $v_1 = x_1 \\vec{i} + y_1 \\vec{j}\
    \ + z_1 \\vec{k}$ 且 $v_2 = x_2 \\vec{i} + y_2 \\vec{j} + z_2 \\vec{k}$，那么\n  \
    \  $$v_1 - v_2 = (x_1 - x_2)\\vec{i} + (y_1 - y_2)\\vec{j} + (z_1 - z_2)\\vec{k}.$$\n\
    \    使用上述概念，为该类重载 - 运算符。\n\n16. 两个向量 $v_1$ 和 $v_2$ 可以通过将两个向量的对应分量相加来求和。即如果 $v_1\
    \ = x_1 \\vec{i} + y_1 \\vec{j} + z_1 \\vec{k}$ 且 $v_2 = x_2 \\vec{i} + y_2 \\\
    vec{j} + z_2 \\vec{k}$，那么\n    $$v_1 + v_2 = (x_1 + x_2) \\vec{i} + (y_1 + y_2)\
    \ \\vec{j} + (z_1 + z_2) \\vec{k}.$$\n    使用上述概念，为该类重载 + 运算符。\n\n17. 两个向量的点积可以通过将两个向量对应分量的乘积相加得到。即，如果\
    \ $v_1 = x_1 \\vec{i} + y_1 \\vec{j} + z_1 \\vec{k}$ 且 $v_2 = x_2 \\vec{i} + y_2\
    \ \\vec{j} + z_2 \\vec{k}$，那么\n    $$v_1 \\cdot v_2 = (x_1 \\cdot x_2) + (y_1\
    \ \\cdot y_2) + (z_1 \\cdot z_2)$$\n    使用上述概念，为该类重载 . 运算符。\n\n18. 一个假设的称为递增的操作可以定义如下。如果\
    \ $v_1 = x_1 \\vec{i} + y_1 \\vec{j} + z_1 \\vec{k}$，那么\n    $$v_1 ++ = (x_1 ++)\
    \ \\vec{i} + (y_1 ++) \\vec{j} + (z_1 ++) \\vec{k}$$\n    使用上述概念，为该类重载 ++ 运算符。\n\
    \n19. 一个假设的称为递减的操作可以定义如下。如果 $v_1 = x_1 \\vec{i} + y_1 \\vec{j} + z_1 \\vec{k}$，那么\n\
    \    $$v_1 -- = (x_1 --) \\vec{i} + (y_1 --) \\vec{j} + (z_1 --) \\vec{k}$$\n\
    \    使用上述概念，为该类重载 — 运算符。\n\n20. 对于向量类，重载一元（–）运算符。\n\n### 继承\n\n21. 创建一个名为**Book**的类，包含以下成员。\n\
    \    - (a) 书名：字符串\n    - (b) 作者：列表\n    - (c) 年份：出版年份\n    - (d) ISSN：字符串\n  \
    \  - (e) 出版社：出版社名称\n    该类应有**getdata()**、**putdata()**和**__init__()**作为其方法。\n\
    \n22. 创建两个子类：**TextBook**和**ReferenceBook**，包含必要的数据成员。演示上述层次结构中重写的使用。\n\n23. 现在，创建**TextBook**类的三个子类，即**SocialScience**、**Engineering**和**Management**。每个类应定义其版本的**getdata()**和**putdata()**。创建这些子类的实例并调用派生类的方法。\n\
    \n24. 创建一个名为**XBook**的类，它是**TextBook**和**ReferenceBook**的子类，并演示这如何导致歧义。\n\n25.\
    \ 创建一个名为**ABC**的类，并设计该类的一个类方法和一个实例方法。\n\n### 异常处理\n\n26. 创建一个名为**array**的类，它包含一个数组和**max**（数组可容纳的最大元素数），以及执行必要任务的方法**getdata()**和**putdata()**。\n\
    \n27. 现在创建一个类来引发自定义异常。应引发该异常，以便用户不能输入超过**max**的元素。\n\n28. 如果用户输入的不是整数，应引发异常，并显示必要的消息。\n\
