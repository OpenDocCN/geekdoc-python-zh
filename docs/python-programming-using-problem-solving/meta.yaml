- md: "## CHAPTER 10\n\n## STRINGS\n\n## Objectives\n\nAfter reading this chapter,\
    \ the reader should be able to\n\n- Understand the concept and importance of strings\n\
    - Understand various string operators\n- Learn about the built-in functions to\
    \ manipulate strings\n\n## 10.1 INTRODUCTION\n\nStrings are the sequence of characters.\
    \ These data structures are used to store text. For example, if one wants to store\
    \ the name of a person, or for that matter, his address, then strings are the\
    \ most appropriate data structures. As a matter of fact, the knowledge of strings\
