    \ if type(x)==int]\nprint(square_int)\n>>>\n```\n\n# **Output:**\n\n```\n[0, 1,\
    \ 8, 27, 64, 125, 216, 343, 512, 729]\n[9, 27, 81, 243, 729, 2187, 6561, 19683]\n\
