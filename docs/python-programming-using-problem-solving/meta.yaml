  md: '31. Find the number of edges in the graph. (Note that the number of 1’s in
    the 2-D array is not same as the number of edges in the graph).


    32. Find the vertex connected to the maximum number of edges.


    33. Find if the graph has a cycle.


    34. Ask the user to enter the initial vertex and the final vertex and find if
    there is a path from the initial to the final vertex.


    35. In the above question find whether there are more than one paths from the
    initial to the final vertex and find the shortest path.


    36. Now, in place of 1’s asks the user to enter a finite number representing the
    cost of the edge from the vertex i to the vertex j. Find the shortest path from
    the source vertex to all other vertices.


    37. Write a program to find the spanning tree of the graph.


    38. Write a program to find whether the graph is a tree.


    39. A tree can be represented using a two-dimensional array having n rows and
    two columns. In each row the first column is i and the second column is j, means
    that there is an edge from i to j. Ask the user to enter the requisite data and
    display the tree (just the list of vertices and edges associated with them).


    Create a binary tree using a doubly linked list. For this tree accomplish the
