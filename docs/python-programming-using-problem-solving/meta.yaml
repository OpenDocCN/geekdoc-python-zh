    as its arguments. In fact, the function can have three arguments. These arguments
    are discussed in the next section. The open function returns an object of the
    file. The object then uses the library functions to read the file, write into
    it or append it. Finally, the memory space occupied by the object is freed using
    the **close()** function. The mechanism has been depicted in the following figure
    (Figure 7.1).


