    of the paradigms, along with the ability to use the standard procedures. To become
    a virtuous programmer one must, therefore, not only learn the syntax of the language
    but also develop an ability to apply the mastered concepts to solve problems.
    It may be stated here that a programming language and its syntax learned by a
    professional is of no use until the algorithms that are to be implemented have
