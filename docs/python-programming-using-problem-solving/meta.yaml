- img_proc: true
  md: "In a generator, the values are generated as and when we proceed. So, if one\
    \ comes back to the function after a particular value is generated, then and instead\
    \ of starting from the beginning the function starts from the point where we let\
    \ off.\n\nThe task seems difficult but has an advantage. The concept can help\
    \ the programmer to generate lists containing the desired sequences. For example,\
    \ if one wants to dynamically generate a list containing the terms of an arithmetic\
    \ progression, in which each term is “d” more than the first term, generators\
    \ come to the rescue. Similarly, the sequences like geometric progression, Fibonacci\
    \ series etcetera can be easily generated using generator.\n\nPython comes with\
    \ **yield**, which helps to start from the point where we let of. This is markedly\
    \ different from **return** used in normal functions which does not save the state\
    \ where we let off. If the function having **return** is called again it starts\
    \ all over again.\n\nThe following illustration exemplifies the use of generators\
    \ to produce simple sequences like arithmetic progression, geometric progression,\
    \ Fibonacci series, etc.\n\n# Illustration 9.9:\n\n*Write a generator to produce\
    \ arithmetic progression, where in the first term, the common difference and the\
    \ number of terms is entered by the user.*\n\n# **Solution:**\n\n```\ndef arithmetic_progression(a,\
    \ d, n):\n    i=1\n    while i<=n:\n        yield (a+(i-1)*d)\n        i+=1\n\
    a=int(input('Enter the first term of the arithmetic progression\\t:'))\nd=int(input('Enter\
    \ the common differ nce of the arithmetic progression\\t:'))\nn=int(input('Enter\
    \ the number of terms of the arithmetic progression\\t:'))\nap = arithmetic_progression(a,\
    \ d, n)\nprint(ap)\n```"
