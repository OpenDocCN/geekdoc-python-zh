- md: "As stated earlier, in procedural programming, each statement tells the program\
    \ what needs to be done. For example, the following code asks the user for the\
    \ input, calculates the square root of the number entered by the user, and displays\
    \ the result.\n\n**Code:**\n\n```\na=float(input(\"Enter a number\\t:\"))\nb=math.sqrt(a)\n\
    b\n```\n\n**Output:**\n\n```\nEnter a number :67\n8.18535277187245\n```\n\nThis\
    \ strategy is good if the program is very small. Often, telling the computer what\
    \ to do, step by step, works if the task to be accomplished is not very complex.\
    \ In such cases, no other paradigm is needed.\n\nIn the case of a moderately large\
    \ program, division into functions makes the task easier. The division of a larger\
    \ program into modules makes the program manageable and helps achieve code’s reusability.\
    \ The functions generally accomplish a clearly defined task and become handy whenever\
    \ that particular task is to be accomplished. The reader is advised to go through\
    \ the chapter on functions in order to understand the advantages of functions.\
    \ The clubbing of functions, on some basis, gives rise to what is commonly referred\
    \ to as modules. This programming paradigm is called modular programming.\n\n\
    The problem with the above paradigm is that the accidental clubbing together of\
    \ unrelated functions is far from real-world situations and hence becomes a source\
    \ of problems at some point in time. Moreover, the approach does not restrict\
    \ the access of data in any module and jeopardize the sanctity of the data.\n\n\
    It may be noted that the data should not be accessible to all the modules. The\
    \ accessibility of data must be managed with utmost care; otherwise, a module,\
    \ which should not have alerted the data as per the program logic, might change\
    \ the data.\n\nIn order to understand the gravity of the problem, let us take\
    \ the example of C. In C, a variable can be global or local. If it is global,\
    \ then any module can change it. But, on the other hand, if it is local, then\
    \ other modules would not be able to access it. So, there is nothing in between.\n\
    \nThe solution to the above problem is to model the software in such a way that\
    \ the design is conceptually as close to the real world as possible. This modeling\
    \ of real-world situations requires the creation of entities having both attributes\
    \ and behavior. The clubbing together of data and the functions that manipulate\
    \ the data would be helpful in crafting the above entities. These entities would\
    \ henceforth be referred to as classes. The instances of classes are objects,\
    \ and the paradigm is called object-oriented paradigm. Various programming paradigms\
    \ and their disadvantages have been summarized in Figure 11.1.\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_278_0.png)\n\
    \n**FIGURE 11.1** Programming paradigms.\n\n## 11.2 CREATING NEW TYPES\n\nThough\
    \ types are not explicitly declared in Python, they were important in other languages\
    \ (well most of them). For example, when one says that a “number” is of integer\
    \ type, one states the type of information and its maximum and minimum value.\
