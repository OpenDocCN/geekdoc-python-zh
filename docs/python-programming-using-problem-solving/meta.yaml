    \ can be used with strings. The in-built functions used for accomplishing various\
    \ tasks have been dealt with in the fourth section. The fifth section deals with\
    \ the concept of indexing and slicing. The sixth section deals with the features\
    \ of strings and the last section concludes.\n\n## 10.2 LOOPS REVISED\n\nThe traversal\
    \ of a strings has already been discussed in the previous chapter. A brief description\
    \ of the topic has been presented in this section.\n\nAs stated earlier, strings\
    \ are iterable objects, therefore standard loops (read **for** and **while**)\
    \ can be used to iterate though them. The **for** loop helps to iterate through\
    \ each character by storing the character in some variable. The following illustration\
    \ depicts the use of a **for** loop to iterate a string.\n\n**Illustration 10.1:**\n\
    \n*Ask the user to enter a string and print each character using a for loop.*\n\
    \n**Listing:**\n\n```\nstr1= input('Enter a string\\t:')\nfor i in str1:\n   \
    \ print('Character \\t:',i)\n```\n\n**Output:**\n\n```\n==================== RUN\
    \ C:/Python/String/str2.py ====================\nEnter a string :harsh\nCharacter\
    \ : h\nCharacter : a\nCharacter : r\nCharacter : s\nCharacter : h\n```\n\nThe\
    \ above procedure can also help us to find the length of string. Note that there\
    \ is a built-in function to accomplish this task. However, the purpose here is\
    \ to be able to use the **for** loop in order to imitate the **len** function.\
    \ In the following illustration, a variable called length is initialized to 0,\
    \ and is incremented as we proceed.\n\n**Illustration 10.2:**\n\nAsk the user\
    \ to enter a string and find its length.\n\n**Listing:**\n\n```\nname=input('Enter\
    \ your name\\t');\nlength=0\nfor i in name:\n    length=length +1\nprint('The\
    \ length of ',name,' is ',length)\n```\n\n**Output:**\n\n```\nEnter your name\
    \ harsh\nThe length of harsh is 5\n```\n\nThe ability to handle each character\
    \ individually, in a string, makes tasks like basic cryptography manageable. In\
    \ order to understand the concept, consider the following example. The example\
    \ that follows, displaces the characters two positions to the right. This is referred\
    \ to as transposition. The next example shifts the characters by “k” positions,\
    \ where “k” is entered by the user.\n\n**Illustration 10.3:**\n\nAsk the user\
    \ to enter a string and displace each character by two positions to the right.\n\
    \n**Solution:**\n\n```\nstr1=input('Enter the string\\t:')\ni=0\nstr2=\"\"\nwhile\
    \ i<len(str1):\n    str2[i]=str1[(i+2)%len(str1)]\nprint(str2)\n```\n\n**Illustration\
    \ 10.4:**\n\nAsk the user to enter a string and displace each character by k positions\
    \ to the right.\n\n**Solution:**\n\n```\nstr1=input('Enter the string\\t:')\n\
    k=int(input('Enter the value of k\\t:'))\ni=0\nstr2=\"\"\nwhile i<len(str1):\n\
    \    str2+=str1[(i+k)%len(str1)]\n    print(str2)\n    i+=1\nprint(str2)\n```\n\
    \n**Output:**\n\n```\n================ RUN C:/Python/String/transposition.py ================\n\
    Enter the string :harsh\nEnter the value of k :4\nh\nhh\nhha\nhhar\nhhars\nhhars\n\
    ```\n\nSubstitution means replacing a symbol with some other symbol. This replacement\
    \ would result in the formation of another string by a given string. Loops can\
    \ be used for substitution. The example that follows implements one of the most\
    \ basic substitutions. Here, each character is replaced by a character obtained\
    \ by adding two to the ASCII value of the character and finding the requisite\
    \ character.\n\n**Illustration 10.5:**\n\nAsk the user to enter a string. Replace\
    \ each character by that obtained by adding two to the ASCII value of that character.\n\
    \n**Solution:**\n\n```\nstr1=input('Enter the string\\t:')\nk=int(input('Enter\
    \ the value of k\\t:'))\ni=0\nstr2=\"\"\nwhile i<len(str1):\n    str2+=str((ascii(str1[i])+k))\n\
    \    print(str2)\n    i+=1\nprint(str2)\n```\n\n## 10.3 STRING OPERATORS\n\nPython\
    \ provides the programmer with a wide variety of extremely useful operators to\
    \ manipulate strings. These operators help a user to perform involved tasks with\
    \ ease and efficiency. Here, it may be stated that the replication and membership\
    \ operators make Python stand apart from its counterparts. This section briefly\
    \ introduces and exemplifies the operators.\n\n### 10.3.1 The Concatenation Operator\
    \ (+)\n\nThe concatenation operator takes two strings and produces a concatenated\
    \ string. The operator acts on values as well as variables. In the example that\
    \ follows, the result generated by applying the concatenation operators have been\
    \ stored in variables called **result1** and **str2**.\n\n```\nname=input('Enter\
    \ your name\\t:')\nresult1 = 'Hi'+' there'\nprint(result1)\nstr1='Hello'\nstr2=str1\
    \ + ' '+name\nprint(str2)\n```\n\n**Output:**\n\n```\n==================== RUN\
    \ C:/Python/String/operator1.py ====================\nEnter your name :Harsh\n\
    Hi there\nHello Harsh\n```\n\n### 10.3.2 The Replication Operator (*)\n\nThe replication\
    \ operator in Python, replicates the strings as many times as the first operand.\
    \ The operator operates on two operands: the first being a number and the second\
    \ being a string. The result is a string in which the input string is repeated\
    \ as many times as the first argument. In the example that follows, the result\
    \ has been stored in a variable called **result1**.\n\n```\nname=input('Enter\
    \ your name\\t:')\nprint('Hi', ' ', name)\nstr1=input('Enter a string\\t:')\n\
    num=int(input('Enter a number\\t:'))\nresult1=num*str1\nprint(result1)\n```\n\n\
    **Output:**\n\n```\n==================== RUN C:/Python/String/operator2.py ====================\n\
    Enter your name :harsh\nHi harsh\nEnter a string :abc\nEnter a number :4\nabcabcabcabc\n\
    ```\n\n### 10.3.3 The Membership Operator\n\nThe membership operator checks whether\
    \ a given string is in a given list or not. The operator returns a **True**, if\
    \ the first string is a part of the given list, otherwise it returns a **False**.\n\
    \n18. Write a list comprehension that converts a list containing the temperature\
    \ in degree to that in Fahrenheit.\n19. Write a list comprehension that produces\
    \ all the prime numbers.\n20. Write a list comprehension that produces all the\
    \ numbers which leave remainder 1 when divided by 5.\n21. Write a list comprehension\
    \ that produces all the vowels of a given string.\n22. Write a list comprehension\
    \ that produces the fourth power of numbers of a given list.\n23. Write a list\
    \ comprehension that produces the absolute powers of numbers in a given list."
  mdcn: "## 第10章\n\n## 字符串\n\n## 学习目标\n\n阅读本章后，读者应能够\n\n- 理解字符串的概念及其重要性\n- 理解各种字符串运算符\n\
    - 了解用于操作字符串的内置函数\n\n## 10.1 引言\n\n字符串是字符的序列。这种数据结构用于存储文本。例如，如果想存储一个人的姓名，或者他的地址，那么字符串是最合适的数据结构。事实上，字符串的知识对于开发许多应用程序（如文字处理器和解析器）至关重要。\n\
    \n在Python中，字符串可以用单引号或双引号括起来，甚至可以用三引号括起来。不过，用单引号或双引号括起来的字符串没有区别。也就是说，“harsh”和“harsh”是相同的。三引号通常用于特殊情况，如本章后面所述。Python中的字符串提供了多种运算符和内置函数。\n\
    \n本章探讨了字符串的各个方面，如不可变性、遍历、运算符和内置函数。字符串和列表之间最显著的区别之一是不可变性。一旦给字符串赋值，就不能更改特定位置上字符的值。对于熟悉“C”、“C++”、“C#”或“Java”的用户来说，本章讨论的运算符，特别是*，将是一个惊喜。此外，Python提供了许多内置函数来帮助程序员处理字符串。\n\
    \n本章探讨了上述问题并举例说明。本章的组织结构如下。本章的第二节探讨了标准**for**和**while**循环在字符串中的使用。第三节讨论了可用于字符串的运算符。用于完成各种任务的内置函数在第四节中讨论。第五节讨论了索引和切片的概念。第六节讨论了字符串的特性，最后一节是总结。\n\
    \n## 10.2 循环回顾\n\n字符串的遍历已经在前一章中讨论过。本节对该主题进行了简要描述。\n\n如前所述，字符串是可迭代对象，因此可以使用标准循环（即**for**和**while**）来遍历它们。**for**循环通过将字符存储在某个变量中来帮助遍历每个字符。以下示例展示了使用**for**循环遍历字符串。\n\
    \n**示例 10.1：**\n\n*要求用户输入一个字符串，并使用for循环打印每个字符。*\n\n**代码清单：**\n\n```\nstr1= input('Enter\
    \ a string\\t:')\nfor i in str1:\n    print('Character \\t:',i)\n```\n\n**输出：**\n\
    \n```\n==================== RUN C:/Python/String/str2.py ====================\n\
    Enter a string :harsh\nCharacter : h\nCharacter : a\nCharacter : r\nCharacter\
    \ : s\nCharacter : h\n```\n\n上述过程也可以帮助我们找到字符串的长度。请注意，有一个内置函数可以完成此任务。然而，这里的目的是能够使用**for**循环来模拟**len**函数。在下面的示例中，一个名为length的变量被初始化为0，并在我们进行过程中递增。\n\
    \n**示例 10.2：**\n\n要求用户输入一个字符串并找出其长度。\n\n**代码清单：**\n\n```\nname=input('Enter your\
    \ name\\t');\nlength=0\nfor i in name:\n    length=length +1\nprint('The length\
    \ of ',name,' is ',length)\n```\n\n**输出：**\n\n```\nEnter your name harsh\nThe\
    \ length of harsh is 5\n```\n\n能够单独处理字符串中的每个字符，使得基本密码学等任务变得可管理。为了理解这个概念，请看下面的例子。下面的例子将字符向右移动两个位置。这被称为转置。下一个例子将字符移动“k”个位置，其中“k”由用户输入。\n\
    \n**示例 10.3：**\n\n要求用户输入一个字符串，并将每个字符向右移动两个位置。\n\n**解决方案：**\n\n```\nstr1=input('Enter\
    \ the string\\t:')\ni=0\nstr2=\"\"\nwhile i<len(str1):\n    str2[i]=str1[(i+2)%len(str1)]\n\
