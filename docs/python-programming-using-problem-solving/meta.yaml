    \ case the **real** and **imaginary** part of **Complex** should be initialized\
    \ with the arguments of __init__ and in the second the **real** and **imaginary**\
    \ should become zero. One of the simplest solutions is to check if the two arguments\
    \ are **NONE** or not. If both of them are **NONE**, the data members should be\
    \ zero. In the second case, they should contain the arguments, passed in __init__.\
    \ Though, the following program (Illustration 14.3) does not have two __init__'s,\
    \ the above task has been accomplished.\n\n# Illustration 14.3:\n\nConstruct a\
    \ class called **Complex** having **real** and **ima** as its data members. The\
    \ class should have an __init__, for initializing the data members and **putData**\
    \ for displaying the complex number:\n\n# Code:\n\n```\nclass Complex:\n    def\
    \ __init__(self, real=None, ima=None):\n        if ((real == None)&(ima==None)):\n\
    \            self.real=0\n            self.ima=0\n        else:\n            self.real=real\n\
