  md: 'While storing data, the format of the data should be taken care of. At the
    programmer’s level, however, the data can be stored in files or in databases.
    Databases store and manage related data. The ease of retrieval, the security and
    flexibility make database one of the most important topics in Computer Science.
    The concept of databases, their usage and related issues constitute a dedicated
    subject. This chapter, however, only concentrates on file handling.


    A file can be perceived as set of records, where each record has some fields.
    The fields, in turn, store data. Files, as discussed later, can have many formats.
    The chapter, though, concentrates on binary and text files. The two formats differ
    in the how the end of a line is represented, the representation of the end of
    the file and in the storage of standard data types. A file may have certain permissions
    associated with it. For example, one may not have the write permissions for a
    file which is to be used by the operating system. For that matter, a user may
    not even have the read permissions for such files. Such constraints are kept in
    mind while writing programs for file handling.


    Python provides many functions to carry out the operations related to file handling.
    The creation of a file, writing data to a file, reading the data, appending something
    to the file and standard directory operations have been discussed in this chapter.
    Moreover, to make the things interesting, the use of the above operations in encryption
    has also been discussed.


    The chapter has been organized as follows. The second section discusses the general
    file handling mechanism. The third section discusses the **open()** function and
    the various modes in which a file can be opened. The fourth section discusses
    the functions for reading and writing to the file. The section also introduces
    the functions to get and set the position of a cursor in a file. The fifth section
    briefly discusses the Command Line Arguments, and the last section, concludes.


