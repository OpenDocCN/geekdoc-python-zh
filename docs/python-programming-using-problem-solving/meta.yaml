    # ## 18.5 THE BAR CHART


    In a **Bar Chart**, the categorical values are represented using vertical or horizontal
    bars. The lengths of these bars are proportional to the represented values. The
    **matplotlib.pyplot.bar** package is used to plot a bar plot.


    The **bar** so plotted starts from the bottom and the dimensions are given by
    the **width** and the **height** parameters of the **bar** method. The parameters
    of the **bar** method are as follows:


    +   - **x:** This parameter represents the coordinates of bars.

    - **height:** This parameter represents the heights of the bar(s).

    - **width:** This parameter represents the width of the bar(s).'
  - "[PAGE 524]\n\n+   - **bottom:** This parameter represents the vertical string\
    \ position(s).\n- **color:** This argument sets the color of the bar. It is an\
    \ optional argument. It can be a single number or a sequence of n elements.\n\
    - **edgecolor:** This argument sets the color of the edges.\n- **linewidth:**\
    \ This argument sets the width of the edges.\n- **orientation:** This argument\
    \ can have the following values:\n  - \"horizontal\"\n  - \"vertical\"\n\nEach\
