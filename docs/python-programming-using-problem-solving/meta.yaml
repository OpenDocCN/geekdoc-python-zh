    # 9.6 COMPREHENSIONS


    The aim of a programming language is to make things easy for a programmer. A task,
    though, can be performed in many ways but the one which requires least coding
    is the most appealing to a coder. Python has many features which facilitate programming.
    Comprehensions are one of them. Comprehensions allow sequences to be built from
    other sequences. Comprehensions can be used for lists, dictionary and set comprehension.
    In the earlier version of Python (Python 2.0) only list comprehensions were allowed.
    However, in the newer versions comprehensions can also be used with dictionary
    and sets also.


    The following illustration explains the use of comprehensions to generate lists
    in various cases.


    +   - The **range(n)** function generates numbers up to n. The first comprehension
    generates the list of numbers which are cubes of all the numbers generated by
    the range function.

    - The second comprehension works in the same way but generates 3 to the power
    of $x$.

    - The third comprehension generates a list having numbers generated by the range
    (n) function, which are multiple of 5.

    - In the fourth comprehension the comprehension takes the words of sentence “Winter
    is coming” and generates a list containing the word in caps, in running and the
    length of the word.

    - Comprehensions can also be used to generate lists, satisfying a given condition.


    # Illustration 9.13:'
  - "[PAGE 246]\n\nGenerate the following lists using comprehensions.\n\n+   - $x^3$,\
    \ $x$ from 0 to 9\n- $3^x$, $x$ from 2 to 10\n- All the multiples of 5 from the\
    \ previous list\n- The caps, running version and the length of each word in the\
    \ sentence “Winter is coming”\n\n# **Solution:**\n\n```\nL1 = [x**3 for x in range(10)]\n\
    print(L1)\nL2 = [3**x for x in range(2, 10, 1)]\nprint(L2)\nL3 = [x for x in L2\
    \ if x%5==0]\nprint(L3)\nString = \"Winter is coming\".split()\nprint(String)\n\
    String_cases=[[w.upper(), w.lower(), len(w)] for w in String]\nfor i in String_cases:\n\
