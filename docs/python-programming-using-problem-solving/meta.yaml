    Maximum : 98\n>>>\n```\n\n**Output (Second run):**\n\n```\nEnter items (press\
    \ 0 to end)\n2\nEnter item (press 0 to end)\n8\nEnter item (press 0 to end)\n\
    Harsh\nRun time error\n>>>\n```\n\nAlso note that if a **finally** is added to\
    \ the code. The statements in finally will always be executed, whether the exception\
    \ occurs. The code that contains both **finally** and **except** is represented\
    \ as follows. Note that the first output produces the expected result, and it\
