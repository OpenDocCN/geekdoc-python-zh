    of this chapter. This section revisits the topic and sheds light on the creation
    and manipulation of a Data Frame.


    The following points are worth noting regarding a Data Frame.


    +   - A Data Frame has a row axis (axis=0). The index of a row is known as the
    **index**. These indices can be Strings or Integers.

    - A Data Frame has a column axis (axis=1). The index of a column is known as the
    **column name**.

    - The values of cells in a Data Frame can be changed.'
