    \ 11  9 12\n 14 19  9]\nShape    : (20,)\n```\n\n## 17.3 数组的拆分\n\n在了解了用于连接数组的方法之后，我们现在来讨论数组的拆分。以下小节讨论\
    \ **hsplit**、**vsplit**、**split** 和 **extract**，用于从给定数组中查找子集。\n\n### 17.3.1 hsplit\n\
    \n如果第二个参数是一个数字，**numpy.hsplit** 函数会将数组水平分割成相等的部分。如果第二个参数是一个数组，该函数的工作方式如图 17.2\
    \ 所示。\n\n图 17.1 展示了将给定数组拆分为两个相等部分和四个相等部分的过程。请注意，如果列数不能被第二个参数整除，则会导致错误。\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_478_0.png)\n\
    \n图 17.2 展示了当第二个参数是数组时，给定数组是如何被拆分的。第二个参数中的元素数量比分割次数少一。第二个参数的元素是给定数组被拆分的索引位置。\n\
    \n![](img/46b778b4f9252bd09c63fc5fba842fc6_478_1.png)\n\n### 17.3.2 vsplit\n\n\
    如果第二个参数是一个数字，**numpy.vsplit** 函数会将数组垂直分割成相等的部分。如果第二个参数是一个数组，该函数的工作方式如图 17.4 所示。\n\
    \n图 17.3 展示了将给定数组拆分为两个相等部分和四个相等部分的过程。请注意，如果行数不能被第二个参数整除，则会导致错误。\n\n![](img/46b778b4f9252bd09c63fc5fba842fc6_479_0.png)\n\
    \n**图 17.3** vsplit(arr, <integer>)。\n\n图 17.4 展示了当 **vsplit** 的第二个参数是数组时，给定数组是如何被拆分的。第二个数组中的元素数量比分割次数少一。第二个参数的元素是给定数组被拆分的索引位置。\n\
    \n![](img/46b778b4f9252bd09c63fc5fba842fc6_479_1.png)\n\n图 17.4 vsplit(arr, <array>)。\n\
    \n以下示例演示了如何使用上述函数来执行一些不同的任务。\n\n## 示例 17.7：\n\n生成一个形状为 (4, 8) 的随机整数数组，整数范围在 5\
