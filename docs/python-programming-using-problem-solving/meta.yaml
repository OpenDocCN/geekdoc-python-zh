    # 11.4 ELEMENTS OF OBJECT-ORIENTED PROGRAMMING


    The following discussion briefly outlines the elements of OOP. The concepts like
    encapsulation, data hiding, and polymorphism have been discussed in this section.
    Even if things appear a bit abstract at this stage, the reader is advised not
    to skip the section.


    # 11.4.1 Class


    A class is a real or a virtual entity, having importance to a problem at hand
    and having sharp physical boundaries. A class can be a real entity. For example,
    when one develops software for a car wash company, then “Car,” is central to the
    software, and hence, there would be a class called “Car.” A class can also be
    a virtual entity; for example, in developing a student management system, a “student”
    class is crafted, which is a virtual entity. In both examples, the entity is crafted
    as it is important to the problem at hand.


    The example of the “student” class can be taken further. The class would have
    attributes which are needed in the program. The selection of attributes would
    decide the physical boundaries of the class. Note that we would not need unnecessary
    details like the number of cars a student has or where he went last evening. This
    is because there is no point in storing those details for an educational institute
    for which we are making the student management system.


    Examples of some of the classes that are central to the stated software are as
    follows (Table 11.1).


    TABLE 11.1 Examples of classes central to various systems.'
