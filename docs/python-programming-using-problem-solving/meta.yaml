    # 13.3 METHODS


    The importance of functions and methods has already been stated in the first section
    of this book. Methods are, as stated earlier, just functions with a special positional
    parameter, within a class. Methods, in fact, help the programmer to accomplish
    many tasks. Methods can be bound or unbound. The unbound methods do not have **self**
    as a parameter. It is worth mentioning here that, in Python 3.X, the unbound methods
    are the same as functions, whereas in Python 2.X, it is a different type. The
    bound methods, on the other hand, have **self** as the first positional parameter,
    when a method is accessed through qualifying an instance of a class. Here, the
    instance of the class need not to be passed.


    In spite of the above differences, the following similarities between the two
    types may not be missed.'
