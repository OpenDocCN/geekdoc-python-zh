  md: '# 7.6 IMPLEMENTATION AND ILLUSTRATIONS


    Having seen the mechanism of file handling, the functions and the attributes,
    let us now have a look at the usage of the above functions and the implantation
    of an interesting task. We will begin with writing something to a file (say “TextFile.txt”),
    after opening the file in the write mode. The **open** function, in this case,
    would have two parameters: name of the file(“TextFile.txt”) and the mode (“w”).
    Also, the file needs to be closed. Note that the **write** function returns the
    number of bytes written in the file.


    ```

    >>> f = open(''TextFile.txt'',''w'')

    >>> f.write(''Hi there\nHow are you?'')

    21

    >>>f.close()

    ```


    The **read** function reads the bytes of the given file. The **read** function,
    as stated earlier, may not take any argument. This implies reading file till the
    end. The read text can be stored in a string (“text”).


    ```

    >>> text=f.read()

