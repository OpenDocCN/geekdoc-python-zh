    \ its intended job with a **finally** and **finally** can be used for cleanup\
    \ actions or for de-allocating memory and so on.\n\n**Code:**\n\n```\ndef findMax(L):\n\
    \    max =L[0]\n    for item in L:\n        if item>max:\n            max =item\n\
    \    print('Maximum\\t:',str(max))\nL=[]\nitem=input('Enter items (press 0 to\
