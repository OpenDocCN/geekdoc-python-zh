    \ = f(n), for all n > 0 and\n\n$f(n) \\leq c \\times g(n)$\n\n## Omega: Ω()\n\n\
    The best-case behavior of an algorithm is depicted by the asymptotic lower-bound\
    \ notation. For any two functions $f(n)$ and $g(n)$\n\n$\\Omega(g(n)) = f(n)$,\
    \ for all $n > 0$ and\n$f(n) \\geq c \\times g(n)$\n\n## Theta: Θ()\n\nThe *asymptotically\
    \ tight bound* for a function $f(n)$ can be defined as follows. For any two functions\
