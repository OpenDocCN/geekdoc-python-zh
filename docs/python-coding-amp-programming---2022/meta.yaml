  md: "# Hangman Game Script\n\n```\n=======\"\"\", \"\"\"\\n\\n+---+\\n|   |\\n|\
    \   o\\n|  /\\|\\n|  / \\|\\n|     |\\n=========\"\"\"\"]\\n\\nclass Hangman:\\\
    n    def __init__(self, word):\\n        self.word = word\\n        self.missed_letters\
    \ = []\\n        self.guessed_letters = []\\n\\n    def guess(self, letter):\\\
    n        if letter in self.word and letter not in self.guessed_letters:\\n   \
    \         self.guessed_letters.append(letter)\\n        elif letter not in self.word\
    \ and letter not in self.missed_letters:\\n            self.missed_letters.append(letter)\\\
    n        else:\\n            return False\\n        return True\\n\\n    def hangman_over(self):\\\
    n        return self.hangman_won() or (len(self.missed_letters) == 6)\\n\\n  \
    \  def hangman_won(self):\\n        if \"_\" not in self.hide_word():\\n     \
    \       return True\\n        return False\\n\\n    def hide_word(self):\\n  \
    \      rtn = \"\"\\n        for letter in self.word:\\n            if letter not\
    \ in self.guessed_letters:\\n                rtn += \"_\"\\n            else:\\\
    n                rtn += letter\\n        return rtn\\n\\n    def print_game_status(self):\\\
    n        print(board[len(self.missed_letters)])\\n        print(\"Word:\" + self.hide_word())\\\
    n        print(\"Letters Missed:\")\\n        for letter in self.missed_letters:\\\
    n            print(letter,)\\n        print()\\n        print(\"Letters Guessed:\"\
    )\\n        for letter in self.guessed_letters:\\n            print(letter,)\\\
    n        print()\\n\\ndef rand_word():\\n    bank = \"ability about above absolute\
    \ accessible accommodation accounting beautiful bookstore calculator clever engaged\
    \ engineer enough handsome refrigerator opposite socks interested strawberry backgammon\
    \ anniversary confused dangerous entertainment exhausted impossible overweight\
    \ temperature vacation scissors accommodation appointment decrease development\
    \ earthquake environment brand environment necessary\"\\n    luggage responsible\
    \ ambassador circumstance congratulate frequent\".split()\\n    return bank[random.randint(0,\
    \ len(bank))]\n```\n\n```\ndef main():\\n    game = Hangman(rand_word())\\n  \
    \  while not game.hangman_over():\\n        game.print_game_status()\\n      \
    \  user_input = input(\"\\nEnter a letter: \")\\n        game.guess(user_input)\\\
    n\\n    game.print_game_status()\\n    if game.hangman_won():\\n        print(\"\
    \\nCongratulations! You have won!!\")\\n    else:\\n        print(\"\\nSorry,\
    \ you have lost.\")\\n        print(\"The word was: \", game.word)\\n\\n    print(\"\
    \\nGoodbye!\\n\")\\n\\nif __name__ == \"__main__\":\\n    main()\n```\n\n# QUIT()\n\
    \nSince this is the last example in our Python code repository, we thought we’d\
    \ go out with a bang and feature the hangman gallows being drawn with each incorrect\
    \ guess of the word. Don’t worry if it looks misaligned in the text here, this\
    \ is merely due to the differences between using the Python IDLE editor and pasting\
    \ the code into a word processor (which formats things differently).\n\nThere’s\
    \ plenty you can do to improve, enhance and expand on what we’ve presented here.\
