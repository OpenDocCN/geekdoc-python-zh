    \ that is: helping to drive such technological projects as the Large Hadron Collider,\
    \ collating the petabytes of data that made up the first image of a Black Hole\
    \ and creating the next generation of Artificial Intelligence. It doesn’t take\
    \ long to get to grips with Python, but you need to start small. This guide will\
