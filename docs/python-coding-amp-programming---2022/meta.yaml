    # # Listing and Moving Files


    ### STEP 5

    The next number relates to the size of the file, in bytes. In Linux each text
    file is made up of letters and each letter takes up a byte, so our names.txt file
    has 37 bytes and 37 characters in the document. Files and directories can be extremely
    large and hard to determine, so use `ls -lh`. The "h" argument humanises the number,
    making it easier to read.


    ```

    bash

    pi@raspberrypi ~ $ ls -l

    total 44K

    drwxr-xr-x  7 pi pi 4.0K May 11 21:15 .

    drwxr-xr-x 22 pi pi 4.0K May 11 21:23 ..

    -rw-r--r--  1 pi pi   37 May 11 21:56 articles.txt

    drwxr-xr-x  2 pi pi 4.0K Apr 21 17:56 Desktop

    drwxr-xr-x  5 pi pi 4.0K Apr 21 14:50 Documents

    drwxr-xr-x  3 pi pi 4.0K Apr 21 14:56 Downloads

    drwxr-xr-x  3 pi pi 4.0K Apr 17 18:48 indiecity

    drwxr-xr-x  2 pi pi 4.0K Apr 17 12:53 python_games

    pi@raspberrypi ~ $ ls -lh

    total 44K

    drwxr-xr-x  7 pi pi 4.0K May 11 21:15 .

    drwxr-xr-x 22 pi pi 4.0K May 11 21:23 ..

    -rw-r--r--  1 pi pi   37 May 11 21:56 articles.txt

    drwxr-xr-x  2 pi pi 4.0K Apr 21 17:56 Desktop

    drwxr-xr-x  5 pi pi 4.0K Apr 21 14:50 Documents

    drwxr-xr-x  3 pi pi 4.0K Apr 21 14:56 Downloads

    drwxr-xr-x  3 pi pi 4.0K Apr 17 18:48 indiecity

    drwxr-xr-x  2 pi pi 4.0K Apr 17 12:53 python_games

    ```


    ### STEP 6

    Finally, you should be aware that there are many hidden files in Linux. These
    are listed using the `-a` argument. Hidden files and directories begin with a
    dot (.), so you should never start a file or directory with a dot, unless you
    want to hide it. Typically, you can combine all three arguments together into
    the command `ls -lah`.


    ```

    bash

    pi@raspberrypi ~ $ ls -lah

    total 52K

    drwxr-xr-x  8 pi pi 4.0K May 11 21:14 .

    drwxr-xr-x 22 pi pi 4.0K May 11 21:23 ..

    drwxr-xr-x  2 root root 4.0K Jan  1  1970 .aptitude

    drwxr-xr-x  5 pi pi 4.0K Apr 21 14:56 .bash

    drwxr-xr-x  1 pi pi   37 May 11 21:56 articles.txt

    drwxr-xr-x  2 pi pi 4.0K Apr 21 17:56 Desktop

    drwxr-xr-x  5 pi pi 4.0K Apr 21 14:50 Documents

    drwxr-xr-x  3 pi pi 4.0K Apr 21 14:56 Downloads

    drwxr-xr-x  3 pi pi 4.0K Apr 17 18:48 indiecity

    drwxr-xr-x  2 pi pi 4.0K Apr 17 12:53 python_games

    drwxr-xr-x  3 pi pi 4.0K May 11 21:14 .cache

    drwxr-xr-x  1 pi pi 4.0K Apr 21 13:05 .config

    drwxr-xr-x  2 pi pi 4.0K Apr 21 00:00 .dvdrip

    drwxr-xr-x  2 pi pi 4.0K Apr 21 11:55 .dropbox

    drwxr-xr-x  1 pi pi 4.0K May 11 07:36 .dropbox.cache

    drwxr-xr-x  2 pi pi 4.0K Apr 21 17:17 .fontconfig

    drwxr-xr-x  2 pi pi 4.0K Apr 17 17:12 .dmrc

    drwxr-xr-x  5 pi pi 4.0K Apr 21 14:50 .gnome2

    drwxr-xr-x  2 pi pi 4.0K Apr 21 07:45 .local

    drwxr-xr-x  2 pi pi 4.0K Apr 20 13:45 .pcmanfm

    drwxr-xr-x  2 pi pi 4.0K Apr 21 18:15 .fontconfig

    ```


    # # SOME COMMON DIRECTORIES


    Now that you know how to view the contents of your hard drive you’ll start to
    notice a lot of directories with names like bin, sbin, var and dev. These are
    the files and directories that you are kept away from on a Mac, and won’t encounter
    on a Windows PC.


    ### STEP 1

    Enter: `ls -lah /` to view all of the files and directories, including the hidden
    items, in the root directory of your hard drive. Here you will see all the items
    that make up your Raspbian OS (which is a version of Linux). It’s worth taking
    the time to know some of them.


    ```

    bash

    pi@raspberrypi ~ $ ls -lah /

    total 82K

    drwxr-xr-x 22 root root 4.0K May 11 21:23 .

    drwxr-xr-x  2 root root 4.0K Jan  1  1970 bin

    drwxr-xr-x  3 root root 4.0K Jan  1  1970 boot

    drwxr-xr-x  2 root root 4.0K Jan  1  1970 dev

    drwxr-xr-x 12 root root 4.0K Apr 21 07:45 etc

    drwxr-xr-x 109 root root 4.0K May 11 20:06 home

    drwxr-xr-x  3 root root 4.0K Jan  1  1970 lib

    drwxr-xr-x  2 root root 4.0K May 11 21:23 lost+found

    drwxr-xr-x  3 root root 4.0K Apr 21 07:45 media

    drwxr-xr-x  2 root root 4.0K May 11 00:00 mnt

    drwxr-xr-x  2 root root 4.0K Jan  1  1970 opt

    drwxr-xr-x 85 root root    0 May 11 10:26 proc

    drwx------  2 root root 4.0K May 11 10:26 root

    drwxr-xr-x 10 root root 4.0K Apr 21 14:56 run

    drwxr-xr-x  2 root root 4.0K Jan  1  1970 sbin

    drwxr-xr-x  2 root root 4.0K Jun 29  2012 sys

    drwxrwxrwt 12 root root 4.0K May 11 21:23 tmp

    drwxr-xr-x 10 root root 4.0K Apr 21 14:56 usr

    drwxr-xr-x 12 root root 4.0K Apr 21 07:45 var

    ```


    ### STEP 3

    Entering: `ls /home` displays the contents of your home directory, which contains
    pi; the directory that you start in. So, entering: `ls /home/pi` is the same as
    just `ls` from the default home directory. This is where you are expected to place
    most of the documents you create. Don’t confuse home with “usr”; the /usr directory
    is where find you find program tools and libraries.


    ```

    bash

    pi@raspberrypi ~ $ ls

    articles.txt  Desktop  Documents  Downloads  indiecity  names.txt  python_games

    pi@raspberrypi ~ $ ls /home

    pi

    pi@raspberrypi ~ $ ls /home/pi

    articles.txt  Desktop  Documents  Downloads  indiecity  names.txt  python_games

    ```


    ### STEP 2

    Bin is a directory that stores binaries. This is the Linux way of saying programs
    or applications.

    Sbin is for system binaries, which are the programs that make up your system.
    Dev contains references to your devices: hard drive, keyboard, mouse and so on.
    Etc contains your system configuration files.


    ```

    bash

    pi@raspberrypi ~ $ ls /bin

    bash      bzip2     chgrp     chown     csplit    dd        domainname fgconsole
    gz

    bash2     bzip2     chmod     chroot    cut       df        dumpfs     fusermount
    gzip

    bunzip2   bzip2recover chown chvt     cpio      diff      date       echo       fgconsole

    bunzip2   ccat      clear     dd        cpio2tar  dir       dump       ed         fgconsole

    bunzip2   cat       chattr    dhcpcd    cpio      egrep     dirname    ed         fgconsole

    pi@raspberrypi ~ $

    ```


    ### STEP 4

    Lib is a directory that contains libraries of code that are referred to by other
    programs (different programs share files in Lib). “Var” is short for various,
    which is mostly files used by the system, but you may need to work with items
    here. Finally there is a directory called “tmp”, which is for temporary files;
    files placed here are on your system for the short term and can be deleted from
    the system.


    ```

    bash

    pi@raspberrypi ~ $ ls /var

    backups  cache  lib  local  lock  log  mail  opt  run  spool  swap  tmp  www

    pi@raspberrypi ~ $

    ```'
- md: '## Creating and Deleting Files


    Being able to create and delete a file is an everyday computing skill. However,
    when using the Linux Terminal, there’s an element of care required, chiefly because
    any deleted files aren’t placed in the system recycle bin.


    ## CREATING FILES


    Once you learn to recognise the files and directories that make up Raspbian OS,
    it’s time to discover how to make your own. Knowing how to make, edit and delete
    files and directories is essential if you want to make your own projects.


    **STEP 1** We’re going to create a file using a command called Touch. Touch is
    an interesting command that reaches out to a file, or directory, and updates it
    (this changes the system time as if you’d just opened the file). You can see Touch
    in access using “ls -l” and checking the time next to a directory (such as Scratch).


    **STEP 3** If you try to touch a file that doesn’t exist, you create a blank file
    with that name. Try it now. Type `touch testfile` and `ls -l` to view the files.
    You’ll now have a new file in your home directory called “testfile”. Notice that
    the size of the file is 0, because it has nothing in it.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiCity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiCity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    **STEP 2** Now enter: `touch Scratch` and `ls -l` again and notice that the time
    has changed. It now matches the current time. You might be wondering what this
    has to do with creating files or directories. Touch has a second, more popular,
    use, which is to create files.


    **STEP 4** A quick word about file names: remember that Linux is case sensitive,
    so if you now enter: `touch Testfile` (with a capital T), it doesn’t update ‘testfile’;
    instead, it creates a second file called ‘Testfile’. Enter: `ls -l` to see both
    files. This is confusing, so most people stick with using lowercase letters at
    all times.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiCity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ touch Scratch

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiCity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiCity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:08 testfile

    pi@raspberrypi ~ $ touch Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiCity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:08 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:10 Testfile

    pi@raspberrypi ~ $ _

    ```


    **STEP 5** Another important thing to know is never to use a space in your file
    names. If you try to enter: `touch test file`, you create a document called "test"
    and another called "file". Technically there are ways to create files containing
    a space but you should always use an underscore character ("_") instead of a space,
    such as "touch test_file".


    **STEP 6** Here are some other files names to avoid: `#%&\|<>?/$!":@+|=.` The
    full stop (.) is used to create an extension to a file; usually used to indicate
    a file type, such as textfile.txt or compressedfile.zip, and starting a file with
    a full stop makes it invisible. Don''t use full stop in place of a space though;
    stick to underscores.


    ```

    pi@raspberrypi ~ $ touch test file

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:01 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:12 Testfile

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch don''t.use(oddsymbols&in<filenames>or-you''ll"confu

    ```


    ## REMOVING FILES


    We''ve created some files that we don''t want, so how do we go about removing
    them? It turns out that deleting files in your Raspberry Pi is really easy, which
    may be a problem, so be careful.


    **STEP 1** Enter `ls -l` to view the files in your home directory. If you''ve
    followed the steps before then you should have three files: "test", "testfile",
    and "Testfile". We''re going to get rid of these items because they were created
    as an example.


    **STEP 3** We''re going to use a wildcard (*) to delete our next two files, but
    again this is something you really need to do with care. First use "ls" to list
    the files and make sure it''s the one you want to delete. Enter `ls test*` to
    view files that match the word "test" and any other characters. The "*" character
    is called a "wildcard" and it means any characters here.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:01 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:46 Testfile

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 5 pi pi 4096 Jul  9 08:36 Documents

    drwx------ 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 3 pi pi 4096 Jul  9 08:36 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 test

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 testfile

    pi@raspberrypi ~ $ ls test*

    test  testfile

    pi@raspberrypi ~ $ _

    ```


    **STEP 2** To get rid of files you use the "rm" command. Enter `rm Testfile` to
    delete the file called "Testfile" (with the uppercase "t"). Enter: `ls -l` and
    you''ll find it''s gone. Where is it? It''s not in the Trash or Recycle Bin, like
    on a Mac or Windows PC. It''s deleted completely and cannot be recovered. Bear
    this in mind and always think before deleting files.


    **STEP 4** We see that "ls test*" matches two files: "test" and "testfile", but
    not the file called "file". That''s because it didn''t match the "test" part of
    "test*". Check carefully over groups of files you want to remove (remember you
    can''t recover them) and replace the "ls" with "rm". Enter `rm test*` to remove
    both files. Finally enter `rm file` to get rid of the confusing file.


    ```

    pi@raspberrypi ~ $ rm Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:01 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

